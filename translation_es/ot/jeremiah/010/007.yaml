translation:
  language: es
  text: ¿Quién no te temerá[a], oh Rey de las naciones? Porque esto se te debe[b]; porque entre todos los sabios de las naciones y en todos sus reinos, no hay nadie como tú.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Quién no debería temerte...?» La pregunta retórica hebrea puede expresar tanto lo que ocurrirá como lo que es propio o debido.'
    reason: alternative_reading
  - marker: b
    text: 'O: «esto te corresponde» / «esto te conviene». El sentido es que tal temor pertenece justamente a Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרָאֲךָ
  english_pob_choice: would not fear you
  chosen_spanish: te temerá
  alternatives_spanish:
  - no te temerá
  - dejará de temerte
  - te reverenciará
  lexicon: HALOT
  rationale: La pregunta retórica hebrea con מִי לֹא + imperfecto puede expresar la idea de '¿quién no...?' o '¿quién no debería...?' En español, 'temer' conserva la fuerza léxica de ירא y no la debilita a 'reverenciar'; la forma interrogativa transmite bien el valor retórico sin añadir tiempo futuro como afirmación literal.
- source_word: מֶלֶךְ הַגּוֹיִם
  english_pob_choice: King of the nations
  chosen_spanish: Rey de las naciones
  alternatives_spanish:
  - Rey de los pueblos
  - rey sobre las naciones
  lexicon: HALOT
  rationale: '''Rey de las naciones'' reproduce de manera directa el sintagma constructo y mantiene el título real aplicado a Dios. ''Naciones'' conserva el alcance universal del hebreo.'
- source_word: יָאָתָה
  english_pob_choice: this is your due
  chosen_spanish: esto te corresponde
  alternatives_spanish:
  - esto te es debido
  - esto te pertenece
  - esto te conviene
  lexicon: HALOT
  rationale: El verbo expresa lo que es apropiado, debido o propio. 'Esto te corresponde' comunica de forma natural en español la idea de que el temor pertenece justamente a Yahvé, sin sobrecargar la frase con una explicación interpretativa.
- source_word: חַכְמֵי הַגּוֹיִם
  english_pob_choice: the wise men of the nations
  chosen_spanish: los sabios de las naciones
  alternatives_spanish:
  - los hombres sabios de las naciones
  - los sabios entre las naciones
  lexicon: HALOT
  rationale: חכמים alude a personas sabias, consejeros o sabios. 'Los sabios de las naciones' es natural en español y conserva el sentido colectivo sin introducir un género innecesariamente restrictivo.
- source_word: מַלְכוּתָם
  english_pob_choice: their kingdoms
  chosen_spanish: sus reinos
  alternatives_spanish:
  - sus reinos reales
  - sus dominios
  lexicon: HALOT
  rationale: מַלְכוּתָם refiere al ámbito de gobierno o reino. 'Sus reinos' es la equivalencia más clara y bíblicamente transparente en español.
- source_word: מֵאֵין כָּמוֹךָ
  english_pob_choice: there is none like you
  chosen_spanish: no hay nadie como tú
  alternatives_spanish:
  - no hay otro como tú
  - no existe ninguno como tú
  lexicon: HALOT
  rationale: La expresión idiomática comunica incomparabilidad absoluta. 'No hay nadie como tú' es una formulación idiomática natural en español y preserva el sentido sin añadir matices doctrinales.
- source_word: כִּי ... כִּי
  english_pob_choice: For ... for ...
  chosen_spanish: Porque ... porque ...
  alternatives_spanish:
  - Pues ... pues ...
  - Ya que ... porque ...
  lexicon: HALOT
  rationale: 'Repetir ''porque'' conserva la progresión argumentativa del hebreo: primero la razón de la pregunta retórica, luego la fundamentación en la incomparable singularidad de Yahvé.'
theological_decisions:
- issue: Tetragrámaton / nombre divino implícito en el vocativo
  english_pob_reading: King of the nations
  chosen_spanish_reading: Rey de las naciones
  alternative_spanish_readings:
  - Rey de los pueblos
  - oh Rey de las naciones
  rationale: El hebreo dirige la frase a Yahvé como Rey universal. El español mantiene la majestad del título y la directividad del vocativo con 'oh', sin sustituir el nombre divino por una máscara litúrgica.
  doctrine_reference: Translation philosophy §3
- issue: Temor reverente vs. miedo
  english_pob_reading: fear you
  chosen_spanish_reading: te temerá
  alternative_spanish_readings:
  - te reverenciará
  - te respetará
  rationale: La frase conserva la tensión bíblica de temor/awe sin resolverla en mera cortesía religiosa. 'Temer' retiene la fuerza teológica del hebreo y el carácter de respuesta adecuada ante la soberanía divina.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: se conserva la dirección vocativa con ''oh'' y se refleja יָאָתָה mediante una expresión más natural y precisa en español que ''es fitting'', equivalente al ajuste de ''this is your due''.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' en la explicación teológica, pero no era necesario en el texto del versículo porque el hebreo aquí usa un vocativo descriptivo ('Rey de las naciones').
  - Se eligió 'temer' en vez de 'reverenciar' para no debilitar la carga semántica del hebreo.
  - '''Naciones'' se usó de forma uniforme para הַגּוֹיִם, coherente con el registro bíblico y con la traducción inglesa auditada.'
  - La puntuación y el orden de las cláusulas siguen de cerca el paralelismo hebreo y la decisión inglesa de mantener dos כי consecutivos.
