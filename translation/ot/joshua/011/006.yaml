id: JOS.11.6
reference: Joshua 11:6
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֣ה אֶל יְהוֹשֻׁעַ֮ אַל תִּירָ֣א מִ/פְּנֵי/הֶם֒ כִּֽי מָחָ֞ר כָּ/עֵ֣ת הַ/זֹּ֗את אָנֹכִ֞י נֹתֵ֧ן אֶת כֻּלָּ֛/ם חֲלָלִ֖ים לִ/פְנֵ֣י יִשְׂרָאֵ֑ל אֶת סוּסֵי/הֶ֣ם תְּעַקֵּ֔ר וְ/אֶת מַרְכְּבֹתֵי/הֶ֖ם תִּשְׂרֹ֥ף בָּ/אֵֽשׁ־־־־־־׃
translation:
  text: And Yahweh said to Joshua[a], “Do not fear them, for tomorrow at this time I am giving all of them over before Israel as slain men[b]. You shall hamstring their horses and burn their chariots with fire.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tomorrow about this time.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'I am giving all of them before Israel as slain men,' that is, delivering them for Israel to strike down.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional small-caps covenantal form rather than transliteration.
- source_word: אַל תִּירָא
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: A direct and natural rendering of the prohibition with ירא. 'Do not fear' is slightly more formal and concise, matching the Hebrew imperative well.
- source_word: מִפְּנֵיהֶם
  chosen: because of them
  alternatives:
  - before them
  - on account of them
  - in their presence
  lexicon: HALOT
  rationale: The idiom with פחד/ירא + מפני commonly expresses fear caused by someone. 'Because of them' communicates the causal sense more clearly in modern English than the more literal 'before them.'
- source_word: מָחָר כָּעֵת הַזֹּאת
  chosen: tomorrow at this time
  alternatives:
  - tomorrow about this time
  - tomorrow at this same time
  lexicon: HALOT
  rationale: This is a standard temporal idiom meaning roughly the same time on the next day. 'At this time' is clear and idiomatic.
- source_word: אָנֹכִי נֹתֵן
  chosen: I am giving
  alternatives:
  - I will give
  - I am about to give
  lexicon: HALOT
  rationale: The participle נֹתֵן with the independent pronoun gives a vivid, imminent sense. 'I am giving' preserves that aspectual force better than a simple future, while still fitting the promise context.
- source_word: אֶת כֻּלָּם חֲלָלִים
  chosen: all of them over ... as slain men
  alternatives:
  - all of them ... slain
  - all of them over ... dead
  - all of them over ... as corpses
  lexicon: HALOT
  rationale: חֲלָלִים refers to those slain in battle, not merely 'dead.' Rendering it with 'slain men' preserves the martial sense. 'Over' is supplied in English to make sense of נֹתֵן with the following phrase 'before Israel.'
- source_word: לִפְנֵי יִשְׂרָאֵל
  chosen: before Israel
  alternatives:
  - to Israel
  - into the presence of Israel
  - in front of Israel
  lexicon: HALOT
  rationale: The phrase is kept relatively literal. In context it conveys that the enemies will be delivered for Israel to defeat, but 'before Israel' preserves the Hebrew spatial idiom without over-paraphrasing.
- source_word: תְּעַקֵּר
  chosen: hamstring
  alternatives:
  - cripple
  - disable the tendons of
  lexicon: HALOT
  rationale: The verb in this military context refers to disabling horses by cutting the leg tendons. 'Hamstring' is the established precise English equivalent and is more accurate than the vaguer 'cripple.'
- source_word: מַרְכְּבֹתֵיהֶם
  chosen: their chariots
  lexicon: HALOT
  rationale: Standard rendering of the military vehicle term; no contextual reason to vary.
- source_word: תִּשְׂרֹף בָּאֵשׁ
  chosen: burn ... with fire
  alternatives:
  - burn up
  - set ... on fire
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'with fire.' Though somewhat redundant in English, retaining it reflects the source emphasis and avoids unnecessary smoothing.
