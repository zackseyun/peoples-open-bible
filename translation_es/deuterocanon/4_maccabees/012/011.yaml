translation:
  language: es
  text: «¡Hombre impío!», dijo, «tirano impísimo de todos los perversos[a], ¿no te avergonzaste, después de recibir de Dios los bienes y el poder real, de matar a sus siervos y torturar a los practicantes de la piedad[b]?»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tirano más impío de todos los hombres perversos». El griego acumula superlativos y lenguaje de clase para intensificar la acusación.
    reason: lexical_alternative
  - marker: b
    text: «Practicantes de la piedad» también podría traducirse «devotos de la piedad» o, más literalmente, «ascetas de la piedad».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀνόσιε
  english_pob_choice: You unholy man
  chosen_spanish: Tú, hombre impío
  alternatives_spanish:
  - Tú, hombre profano
  - Tú, hombre irreligioso
  - Tú, hombre sin piedad
  lexicon: LSJ
  rationale: El vocativo expresa reproche religioso y moral. «Impío» conserva la fuerza de ἀνόσιος y es natural en español bíblico; «hombre» se añade para que el vocativo suene idiomático.
- source_word: πάντων τῶν πονηρῶν ἀσεβέστατε
  english_pob_choice: most ungodly tyrant of all wicked men
  chosen_spanish: tirano más impío de todos los hombres perversos
  alternatives_spanish:
  - tirano más irreligioso de todos los hombres perversos
  - tirano impísimo de todos los perversos
  - tirano más impío entre los hombres perversos
  lexicon: LSJ
  rationale: 'Se mantiene la acumulación insultante del griego: superlativo + clase de personas malvadas. «Perversos» refleja πονηρῶν con un matiz moral fuerte y natural en español; «más impío» conserva ἀσεβέστατε.'
- source_word: τύραννε
  english_pob_choice: tyrant
  chosen_spanish: tirano
  alternatives_spanish:
  - régulo
  - gobernante
  - señor
  lexicon: LSJ
  rationale: Aquí τύραννος es peyorativo, no un título neutral. «Tirano» conserva la condena política y moral del original.
- source_word: οὐκ ᾐδέσθης
  english_pob_choice: were you not ashamed
  chosen_spanish: ¿no te avergonzaste
  alternatives_spanish:
  - ¿no sentiste vergüenza?
  - ¿no te dio vergüenza?
  - ¿no te contenías por respeto?
  lexicon: LSJ
  rationale: La pregunta retórica acusa falta de vergüenza ante una acción moralmente indebida. «Avergonzaste» reproduce bien la carga acusatoria y funciona con naturalidad en español.
- source_word: παρὰ τοῦ θεοῦ λαβὼν
  english_pob_choice: after receiving ... from God
  chosen_spanish: después de recibir de Dios
  alternatives_spanish:
  - habiendo recibido de Dios
  - al recibir de Dios
  lexicon: LSJ
  rationale: El participio anterior se vierte con una relación temporal clara en español. «Después de recibir» hace explícita la secuencia sin alterar el sentido.
- source_word: τὰ ἀγαθὰ
  english_pob_choice: good things
  chosen_spanish: los bienes
  alternatives_spanish:
  - las cosas buenas
  - las bendiciones
  - los beneficios
  lexicon: LSJ
  rationale: En español, «los bienes» comunica mejor la amplitud de τὰ ἀγαθὰ sin añadir una interpretación demasiado devocional. Mantiene la referencia general a dones recibidos.
- source_word: τὴν βασιλείαν
  english_pob_choice: kingship
  chosen_spanish: la realeza
  alternatives_spanish:
  - el reino
  - el poder real
  - el reinado
  lexicon: LSJ
  rationale: En este contexto se trata del estatus o dignidad real concedida, no principalmente del territorio. «Realeza» preserva el carácter de investidura soberana.
- source_word: τοὺς θεράποντας αὐτοῦ
  english_pob_choice: his servants
  chosen_spanish: a sus siervos
  alternatives_spanish:
  - a sus servidores
  - a sus ministros
  - a sus servidores fieles
  lexicon: LSJ
  rationale: «Siervos» mantiene la relación de servicio perteneciente a Dios y conserva el tono bíblico sin convertirlos en un oficio eclesiástico específico.
- source_word: κατακτείνειν
  english_pob_choice: to kill
  chosen_spanish: matar
  alternatives_spanish:
  - dar muerte
  - asesinar
  - sacrificar
  lexicon: LSJ
  rationale: El verbo es directo e intensivo; «matar» es el equivalente más claro y sobrio en español. No se añade un matiz más técnico que el griego no exige aquí.
- source_word: τοὺς τῆς εὐσεβείας ἀσκητάς
  english_pob_choice: the practitioners of godliness
  chosen_spanish: a los practicantes de la piedad
  alternatives_spanish:
  - a los devotos de la piedad
  - a los ascetas de la piedad
  - a los ejercitados en la piedad
  lexicon: LSJ
  rationale: Se conserva la idea de práctica disciplinada vinculada a εὐσέβεια. «Piedad» es una traducción fiel y comprensible en español; «practicantes» retiene el énfasis en el ejercicio de una virtud.
- source_word: στρεβλοῦν
  english_pob_choice: to torture
  chosen_spanish: torturar
  alternatives_spanish:
  - atormentar
  - poner en el potro
  - retorcer
  lexicon: LSJ
  rationale: El verbo apunta a tortura física; «torturar» es la equivalencia más precisa y clara. Evita reducirlo a un mero sufrimiento interno.
theological_decisions:
- issue: εὐσέβεια en un contexto de martirio judío
  english_pob_reading: godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción
  - godliness
  rationale: En español, «piedad» transmite mejor la virtud de reverencia y fidelidad práctica a Dios en este contexto. «Devoción» podría sonar más subjetiva, y «godliness» no es apropiado en el texto final.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: 'θεράποντας αὐτοῦ: relación con Dios sin crear cargo eclesiástico'
  english_pob_reading: servants
  chosen_spanish_reading: siervos
  alternative_spanish_readings:
  - servidores
  - ministros
  - atendientes
  rationale: «Siervos» conserva la relación de pertenencia y servicio a Dios sin introducir una categoría ministerial posterior. Mantiene la tensión del texto entre dignidad y subordinación.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: El audit trail inglés fue revisado para preferir «wicked men» sobre «evil men»; en español se refleja con «hombres perversos», que conserva el tono moral negativo sin sonar forzado. También se mantuvo la acumulación retórica del griego, sin suavizarla ni convertirla en una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto solo cuando aparece el nombre divino; aquí el texto dice θεοῦ y se traduce «Dios» conforme al contexto.
  - Se prefirió vocabulario sobrio y bíblico («impío», «siervos», «piedad») sin arcaísmos innecesarios.
  - Se preserva la fuerza retórica del vocativo y de la cadena de acusaciones, evitando una reducción estilística.
