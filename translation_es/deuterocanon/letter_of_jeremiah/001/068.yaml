translation:
  language: es
  text: Por tanto, de ninguna manera nos es evidente que sean dioses; por eso no les teman.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατʼ οὐδένα οὖν τρόπον
  english_pob_choice: in no way
  chosen_spanish: de ninguna manera
  alternatives_spanish:
  - en modo alguno
  - de ningún modo
  lexicon: LSJ
  rationale: La locución griega intensifica la negación de forma total. «De ninguna manera» reproduce esa fuerza categórica en español actual y mantiene el tono enfático sin sonar artificial.
- source_word: φανερὸν
  english_pob_choice: evident
  chosen_spanish: evidente
  alternatives_spanish:
  - claro
  - manifiesto
  - patente
  lexicon: LSJ
  rationale: En esta construcción predicativa, «evidente» expresa bien lo que es manifiesto o percibible para los observadores, conservando el matiz epistémico del griego.
- source_word: θεοί
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - seres divinos
  lexicon: LSJ
  rationale: El plural θεοί se rinde de manera directa como «dioses» para conservar la fuerza polémica del pasaje contra la idolatría.
- source_word: διὸ
  english_pob_choice: so
  chosen_spanish: así que
  alternatives_spanish:
  - por tanto
  - por eso
  lexicon: LSJ
  rationale: La partícula inferencial se expresa con una conexión natural en español. «Así que» conserva la consecuencia del argumento y fluye bien en la frase completa.
- source_word: μὴ φοβῆσθε
  english_pob_choice: do not fear
  chosen_spanish: no les tengan miedo
  alternatives_spanish:
  - no teman
  - no les teman
  lexicon: LSJ
  rationale: El imperativo prohíbe el temor hacia los ídolos. «No les tengan miedo» comunica con claridad la relación de temor dirigido a ellos en español contemporáneo, sin perder el valor imperativo.
theological_decisions:
- issue: Referencia de αὐτούς en la última cláusula
  english_pob_reading: them = the idols falsely regarded as gods
  chosen_spanish_reading: ellos = los ídolos que falsamente son considerados dioses
  alternative_spanish_readings:
  - no teman a ellos
  - no teman a los dioses falsos
  rationale: El antecedente inmediato y el desarrollo del pasaje apuntan a los ídolos. La traducción mantiene la acusación antiidolátrica sin añadir una glosa explicativa en el texto principal.
  doctrine_reference: Primacía del original y preservación de la argumentación antiidolátrica sin suavizarla.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego y el audit trail inglés: mantiene la negación intensiva, el predicado epistémico y la inferencia final, con una sintaxis española natural.'
  spanish_consistency_notes:
  - Se usa «dioses» para θεοί en sentido polémico, no «seres divinos».
  - Se conserva la negación absoluta de κατʼ οὐδένα οὖν τρόπον con una locución idiomática española.
  - El imperativo final se dirige a los oyentes respecto de los ídolos, no a una idea abstracta del temor.
