revisions:
- from: y lo que hizo al ejército de Egipto[a], a sus caballos y a sus carros, cuando hizo que las aguas del Mar Rojo se desbordaran sobre ellos, mientras ellos los perseguían a ustedes, y Yahvé los destruyó hasta este día.
  to: y lo que hizo al ejército de Egipto, a sus caballos y a sus carros, cuando hizo que las aguas del Mar Rojo[a] se desbordaran sobre ellos, mientras los perseguían, y Yahvé los destruyó hasta este día.
  rationale: Se corrige el anclaje de la nota para que documente «Mar Rojo», que es el término relevante de יַם סוּף, y se repara la cláusula temporal eliminando el pronombre espurio «los» antes de «a ustedes». Además, se suaviza la redacción a «mientras los perseguían», que conserva el sentido del hebreo y su simultaneidad con español natural.
