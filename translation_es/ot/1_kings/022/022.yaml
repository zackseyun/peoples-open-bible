review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea y la decisión teológica del POB: el espíritu propone salir, ser un espíritu de mentira, hablar por medio de los profetas y recibe una comisión directa para inducir y lograr su objetivo. Sin embargo, «haz así» no comunica con la misma naturalidad e idiomaticidad en español el hebreo וַעֲשֵׂה כֵן ni el inglés auditado «do so»; «hazlo así» o «hazlo de ese modo» preserva mejor el sentido de actuar de la manera indicada. El resto de las elecciones principales están alineadas con el hebreo y con la auditoría inglesa.'
  spanish_quality_summary: El español es claro, digno y mayormente natural. «Saldré», «seré», «en la boca de todos sus profetas» y «prevalecerás» funcionan bien. «Tú lo inducirás» es defendible y está bien respaldado por nota. La principal aspereza es «Sal; y haz así», donde el punto y coma y la expresión «haz así» suenan menos naturales de lo deseable en español bíblico moderno. Conviene simplificar a «Sal y hazlo así».
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Espíritu» está bien contextualizado; no aparece Yahvé, Mesías/Cristo ni otros términos de glosario sensibles. La decisión «espíritu de mentira» concuerda con la alternativa inglesa documentada y la nota «espíritu de falsedad» conserva el matiz léxico.
  issues:
  - severity: medium
    issue: «haz así» suena poco idiomático para וַעֲשֵׂה כֵן
    rationale: Aunque es comprensible, en español natural «haz así» suele sugerir una demostración gestual más que ‘actúa de esa manera’. El hebreo y el POB inglés apuntan a ‘hazlo así / hazlo de ese modo / haz eso’. «Hazlo así» preserva mejor el mandato idiomático.
  - severity: low
    issue: Puntuación en «Sal; y haz así»
    rationale: 'El punto y coma antes de «y» resulta innecesario y algo duro en una cita breve. Una coordinación simple fluye mejor en español: «Sal y hazlo así».'
  revised_spanish_text: 'Y dijo[a]: «Saldré y seré un espíritu de mentira en la boca de todos sus profetas». Y dijo: «Tú lo inducirás[b], y además prevalecerás. Sal y hazlo así».'
  revised_footnotes:
