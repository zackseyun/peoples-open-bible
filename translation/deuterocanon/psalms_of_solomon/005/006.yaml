theological_decisions:
- issue: Anthropological singular/generic force of ἄνθρωπος
  chosen_reading: Retain 'man' in the singular
  alternative_readings:
  - Translate generically as 'humanity' or 'a human being'
  rationale: The verse speaks of representative man under divine assessment in the singular. Following the project's gender-accurate policy, the masculine singular is preserved rather than neutralized.
