- from: Coral y cristal no se mencionan[a][b][c], y la adquisición de la sabiduría está por encima de las perlas.
  to: El coral[a][c] y el cristal no valen la pena mencionarlos[b], y la adquisición de la sabiduría está por encima de las perlas.
  rationale: Se ajusta la cláusula verbal para reflejar mejor el modismo comparativo hebreo (‘no valen la pena mencionarlos’), se corrige el anclaje de la nota sobre «rubíes» para que recaiga sobre «coral», y se mejora la naturalidad del español con los artículos definidos.
