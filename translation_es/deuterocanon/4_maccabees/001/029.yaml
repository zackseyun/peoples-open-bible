translation:
  language: es
  text: Cada una de estas, la razón que todo lo realiza[a], purificando por completo, podando, entrelazando, elevando y transformando de toda manera[b], domestica los materiales del carácter y de las pasiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la razón que obra de toda manera». El raro adjetivo griego subraya la eficacia integral de la razón y su capacidad de actuar de múltiples modos.
    reason: lexical_alternative
  - marker: b
    text: 'El griego acumula una serie de participios con imágenes de oficio y formación: purificar, podar, entrelazar, elevar y transformar. La secuencia presenta a la razón como quien da forma al material interior de la persona.'
    reason: cultural_note
lexical_decisions:
- source_word: ὧν ἕκαστος
  english_pob_choice: Each of these
  chosen_spanish: Cada una de estas cosas
  alternatives_spanish:
  - Cada una de ellas
  - Cada uno de estos
  lexicon: LSJ
  rationale: El griego retoma elementos previos de modo distributivo. «Cada una de estas cosas» conserva esa referencia anafórica y suena natural en español.
- source_word: ὁ πανεγώργος λογισμός
  english_pob_choice: all-accomplishing reason / all-working reason
  chosen_spanish: la razón omnienérgica
  alternatives_spanish:
  - la razón que todo lo obra
  - la razón de eficacia universal
  - la razón todobrante
  lexicon: LSJ
  rationale: λογισμός aquí es la facultad racional. πανεγώργος es raro y subraya capacidad de obrar en múltiples modos; «omnienérgica» intenta preservar ese matiz de poder activo total sin reducirlo a una frase explicativa demasiado larga.
- source_word: περικαθαίρων
  english_pob_choice: thoroughly purifying
  chosen_spanish: purificando por completo
  alternatives_spanish:
  - purificando totalmente
  - limpiando por completo
  lexicon: LSJ
  rationale: El prefijo περὶ intensifica la acción. «Purificando por completo» mantiene el valor intensivo y el tono de proceso continuo del participio.
- source_word: ἀποκνίζων
  english_pob_choice: pruning away
  chosen_spanish: podando
  alternatives_spanish:
  - cortando
  - raspando
  - recortando
  lexicon: LSJ
  rationale: El verbo es raro y sugiere quitar lo sobrante o áspero. «Podando» conserva la imagen de remoción selectiva y encaja con la serie de imágenes artesanales y de cultivo.
- source_word: περιπλέκων
  english_pob_choice: entwining
  chosen_spanish: entrelazando
  alternatives_spanish:
  - entretejiendo
  - trenzando
  - envolviendo
  lexicon: LSJ
  rationale: El sentido literal apunta a enrollar o tejer alrededor. «Entrelazando» reproduce bien la imagen de formación y enlace de elementos internos.
- source_word: ἐπάρδων
  english_pob_choice: elevating / raises up
  chosen_spanish: elevando
  alternatives_spanish:
  - alzando
  - levantando
  - subiendo
  lexicon: LSJ
  rationale: El participio continúa la secuencia formativa. «Elevando» conserva el movimiento ascendente con un registro formal y claro.
- source_word: πάντα τρόπον μεταχέων
  english_pob_choice: transforming in every way
  chosen_spanish: transformando en todo sentido
  alternatives_spanish:
  - cambiando de todas las maneras
  - reformando por todos los medios
  lexicon: LSJ
  rationale: La expresión indica alteración por completo y por todos los medios. «En todo sentido» comunica amplitud y totalidad sin forzar una interpretación técnica.
- source_word: ἐξημεροῖ
  english_pob_choice: tames
  chosen_spanish: domestica
  alternatives_spanish:
  - amansa
  - sojuzga
  - apacigua
  lexicon: LSJ
  rationale: El verbo significa hacer manso o civilizado. «Domestica» conserva la idea de volver manejable lo indómito; en español puede sonar más fuerte que «amansa», pero sigue siendo fiel al campo semántico.
- source_word: τὰς τῶν ἠθῶν καὶ παθῶν ὕλας
  english_pob_choice: the raw materials of character and passions
  chosen_spanish: los materiales del carácter y de las pasiones
  alternatives_spanish:
  - la materia de las costumbres y de las pasiones
  - los materiales de las disposiciones morales y de las pasiones
  lexicon: LSJ
  rationale: ὕλη es materia o material. Se conserva la metáfora sin añadir «crudos» ni otra intensificación no explícita. ἤθη se vierte por «carácter» para mantener la oposición antropológica con πάθη.
theological_decisions:
- issue: λoγισμός como facultad rectora en 4 Macabeos
  english_pob_reading: reason
  chosen_spanish_reading: razón
  alternative_spanish_readings:
  - facultad racional
  - juicio racional
  - mente racional
  rationale: En 4 Macabeos λογισμός es un concepto central de la antropología moral y filosófica del libro. «Razón» es conciso, idiomático y mantiene la función rectora sin importar una terminología posterior.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: πάθη como impulsos internos y no sufrimientos externos
  english_pob_reading: passions
  chosen_spanish_reading: pasiones
  alternative_spanish_readings:
  - emociones
  - deseos
  - sufrimientos
  rationale: Aquí πάθη designa movimientos internos sujetos al dominio de la razón, no padecimientos externos. «Pasiones» conserva la fuerza ética del término y su contraste con ἤθη.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Metáfora formativa aplicada a la razón
  english_pob_reading: craft-like imagery shaping the inner material of a person
  chosen_spanish_reading: serie de imágenes de formación y cultivo
  alternative_spanish_readings:
  - imágenes artesanales
  - imágenes de trabajo manual
  - imágenes de jardinería
  rationale: El griego apila participios que sugieren purificar, podar, entrelazar, elevar y transformar. El español mantiene esa progresión metafórica sin explicitarla demasiado en el texto principal.
  doctrine_reference: DOCTRINE.md §Optimal equivalence
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés que ajustó la sintaxis y reforzó la correspondencia con la serie participial griega. En español, se evitó una paráfrasis excesiva, pero se conservó la progresión de acciones y el cierre con la metáfora de los materiales internos.
  spanish_consistency_notes:
  - Se mantuvo «razón» para λογισμός, coherente con el POB inglés y con el uso filosófico de 4 Macabeos.
  - Se prefirió «pasiones» para πάθη y «carácter» para ἤθη, para preservar la distinción antropológica del texto.
  - Se evitó traducir ὕλη con un término espiritualizante; se conserva la metáfora de materiales.
  - El orden de participios en español sigue de cerca el griego, pero con ajuste natural de sintaxis para lectura pública.
