  to: 'Pero si no pueden decirme, entonces ustedes me darán treinta prendas de lino[a] y treinta cambios de ropa.” Y ellos le dijeron: “Di tu acertijo, y oigámoslo.”'
  rationale: Se ajustó ‘decírmelo’ a ‘decirme’ para seguir más de cerca el hebreo y la revisión auditada; se cambió ‘tu enigma’ por ‘tu acertijo’ para una equivalencia más natural y precisa de חידה; se reemplazó ‘lo escucharemos’ por ‘oigámoslo’ para reflejar el cohortativo; y se añadió una nota léxica para סְדִינִים conforme al rastro de auditoría inglés. También se prefirió ‘cambios de ropa’ como formulación más ampliamente clara en español neutral.
