translation:
  language: es
  text: No dejarán nada de él hasta la mañana, y lo que quede[a] hasta la mañana lo quemarán con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que sobra de él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תוֹתִירוּ
  english_pob_choice: leave
  chosen_spanish: dejarán
  alternatives_spanish:
  - dejarán sin usar
  - dejarán restante
  - reservarán
  lexicon: HALOT
  rationale: El causativo de יתר expresa dejar algo sobrante o restante. En español, «dejar» comunica con naturalidad la prohibición de retener una parte del cordero, sin añadir matices ajenos al mandato.
- source_word: מִמֶּנּוּ
  english_pob_choice: of it
  chosen_spanish: de él
  alternatives_spanish:
  - de ello
  - del mismo
  - de eso
  lexicon: HALOT
  rationale: El pronombre enclítico exige referencia al sacrificio mencionado. «De él» es la forma más directa y natural en español para mantener la referencia material al animal sin expandir el sentido.
- source_word: עַד בֹּקֶר
  english_pob_choice: until morning
  chosen_spanish: hasta la mañana
  alternatives_spanish:
  - hasta que amanezca
  - hasta el amanecer
  - hasta la mañana siguiente
  lexicon: HALOT
  rationale: La frase marca límite temporal. «Hasta la mañana» reproduce ese límite de modo claro y neutral, sin precisar más de lo que el hebreo dice.
- source_word: הַנֹּתָר
  english_pob_choice: what remains
  chosen_spanish: lo que quede
  alternatives_spanish:
  - lo que queda
  - el resto
  - lo sobrante
  lexicon: HALOT
  rationale: El participio señala la porción remanente. «Lo que quede» conserva el valor de lo restante de manera idiomática en español y evita endurecer el sustantivo abstracto.
- source_word: בָּאֵשׁ
  english_pob_choice: with fire
  chosen_spanish: con fuego
  alternatives_spanish:
  - en el fuego
  - por medio del fuego
  - al fuego
  lexicon: HALOT
  rationale: La preposición ב con «fuego» indica medio o instrumento. «Con fuego» mantiene el sentido instrumental de la orden de quemar.
- source_word: תִּשְׂרֹפוּ
  english_pob_choice: you shall burn
  chosen_spanish: lo quemarán
  alternatives_spanish:
  - lo quemarán ustedes
  - deberán quemarlo
  - lo deben quemar
  lexicon: HALOT
  rationale: En contexto legal, el imperfecto expresa instrucción obligatoria. «Lo quemarán» conserva el valor directivo sin sobrecargar el español con perífrasis modal innecesaria.
theological_decisions:
- issue: Carácter normativo del mandato sobre el resto de la carne pascual
  english_pob_reading: A direct prohibition followed by a required disposal instruction
  chosen_spanish_reading: Una prohibición directa seguida de una instrucción obligatoria para desechar lo restante
  alternative_spanish_readings:
  - Una simple indicación práctica sin fuerza legal
  - Una sugerencia ritual opcional
  rationale: 'El hebreo presenta dos mandatos consecutivos: no dejar nada hasta la mañana y quemar lo que quede. La traducción preserva ese carácter normativo sin añadir interpretación simbólica no explicitada en el verso.'
  doctrine_reference: Principio de primacía del texto original y preservación de la fuerza imperativa
- issue: Ambigüedad de la porción remanente
  english_pob_reading: what remains / what is left over of it
  chosen_spanish_reading: lo que quede de él
  alternative_spanish_readings:
  - lo que reste de él
  - el sobrante de él
  - lo que haya quedado
  rationale: El hebreo mantiene la referencia al residuo sin definirlo conceptualmente. «Lo que quede» conserva esa tensión y permite entender el resto como porción material remanente.
  doctrine_reference: No resolver una tensión léxica que el texto deja abierta
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés: conserva el doble mandato, mantiene la referencia al remanente sin ampliarla y usa un español natural y ritualmente claro. No se detectaron revisiones necesarias respecto del acuerdo de alta coincidencia.'
  spanish_consistency_notes:
  - Se mantiene «de él» para la referencia al animal sacrificial, coherente con el antecedente singular implícito.
  - Se conserva el paralelismo de las dos cláusulas temporales con «hasta la mañana».
  - Se usa «fuego» de forma instrumental, en línea con la fuerza de בָּאֵשׁ.
  - La nota a pie de página ofrece una alternativa léxica breve sin introducir una segunda interpretación teológica.
