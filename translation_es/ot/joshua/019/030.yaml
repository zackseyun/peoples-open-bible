translation:
  language: es
  text: 'Uma[a], Afec y Rehob: veintidós ciudades, con sus aldeas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus asentamientos' o 'sus caseríos'; el hebreo se refiere a lugares rurales dependientes asociados con las ciudades mencionadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֻמָה
  english_pob_choice: Ummah
  chosen_spanish: Umá
  alternatives_spanish:
  - Uma
  - Ummah
  lexicon: HALOT
  rationale: Es un nombre propio de lugar dentro de una lista territorial; se translitera en vez de traducirse. Se adapta la forma inglesa auditada a una grafía española natural, manteniendo la base consonántica del hebreo.
- source_word: אֲפֵק
  english_pob_choice: Aphek
  chosen_spanish: Afec
  alternatives_spanish:
  - Aphek
  - Aphec
  lexicon: HALOT
  rationale: Topónimo propio. En español bíblico, 'Afec' evita una grafía inglesa innecesaria y conserva el valor identificador del nombre.
- source_word: רְחֹב
  english_pob_choice: Rehob
  chosen_spanish: Rehob
  alternatives_spanish:
  - Rejob
  - Rejov
  lexicon: HALOT
  rationale: Topónimo propio ya bien asentado en español bíblico como 'Rehob'; se conserva la transliteración estándar para no oscurecer la identificación geográfica.
- source_word: עָרִים
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - pueblos
  - towns
  lexicon: HALOT
  rationale: Sustantivo colectivo que resume los asentamientos enumerados. 'Ciudades' sigue la convención de las listas de repartición territorial y conserva el contraste con las aldeas dependientes.
- source_word: עֶשְׂרִים וּשְׁתַּיִם
  english_pob_choice: twenty-two
  chosen_spanish: veintidós
  alternatives_spanish:
  - veinte y dos
  lexicon: HALOT
  rationale: Número cardinal simple; 'veintidós' es la forma natural y exacta en español contemporáneo.
- source_word: חַצְרֵיהֶן
  english_pob_choice: their villages
  chosen_spanish: sus aldeas
  alternatives_spanish:
  - sus asentamientos
  - sus caseríos
  - sus hamlets
  lexicon: HALOT
  rationale: חָצֵר en listas territoriales designa dependencias rurales asociadas a una ciudad principal. 'Aldeas' expresa bien la relación subordinada sin forzar un tecnicismo; 'sus' reproduce el posesivo del hebreo.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo del TM/WLC y coincide con el audit trail inglés en la estructura nominal de una lista de localidades. Se mantuvo la enumeración breve con dos puntos para reflejar el valor resumitivo de 'ciudades, veintidós, y sus aldeas' sin añadir información. No hay revisiones textuales relevantes registradas para este versículo en el paquete dado.
  spanish_consistency_notes:
  - Se usó 'Afec' para uniformidad con la transliteración española habitual de אֲפֵק en listas bíblicas.
  - Se prefirió 'aldeas' frente a 'poblados' porque preserva mejor la relación de dependencia rural implícita en חַצְרֵיהֶן.
  - Se conservó la secuencia de nombres propios sin artículos para mantener el estilo de catálogos territoriales.
