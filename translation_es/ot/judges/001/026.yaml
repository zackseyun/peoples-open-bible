translation:
  language: es
  text: Y el hombre fue a la tierra de los hititas, y edificó una ciudad, y le puso por nombre Luz; ese sigue siendo su nombre hasta hoy.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - anduvo
  - partió
  lexicon: HALOT
  rationale: El qal wayyiqtol de הלך expresa avance narrativo simple. En español, «fue» conserva la naturalidad narrativa sin sobrecargar con matices de partida o viaje que el hebreo no exige aquí.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - la persona
  lexicon: HALOT
  rationale: Se mantiene la referencia definida a la figura ya mencionada en el contexto. «El hombre» es la forma más directa y natural en español para el hebreo אישי definido.
- source_word: אֶרֶץ הַחִתִּים
  english_pob_choice: the land of the Hittites
  chosen_spanish: la tierra de los hititas
  alternatives_spanish:
  - el país de los hititas
  - la tierra de Hattí
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tierra de los hititas». «Tierra» preserva la construcción semítica y el valor geográfico-étnico sin precisar indebidamente una entidad política.
- source_word: וַיִּבֶן עִיר
  english_pob_choice: built a city
  chosen_spanish: edificó una ciudad
  alternatives_spanish:
  - construyó una ciudad
  - fundó una ciudad
  lexicon: HALOT
  rationale: בנה con עִיר permite «edificar» o «construir». Se eligió «edificó» por su registro digno y su proximidad semántica, evitando «fundó», que añade una interpretación no explícita del verbo.
- source_word: וַיִּקְרָא שְׁמָהּ לוּז
  english_pob_choice: called its name Luz
  chosen_spanish: le puso por nombre Luz
  alternatives_spanish:
  - la llamó Luz
  - nombró Luz
  lexicon: HALOT
  rationale: El hebreo usa la fórmula idiomática «llamó su nombre». En español, «le puso por nombre» conserva la fuerza nominativa de la expresión sin sonar forzado. «Le» recupera el referente femenino de «ciudad».
- source_word: ל֔וּז
  english_pob_choice: Luz
  chosen_spanish: Luz
  alternatives_spanish:
  - Luz
  lexicon: HALOT
  rationale: Se translitera el topónimo como nombre propio tradicional y reconocible en español bíblico.
- source_word: הוּא שְׁמָהּ
  english_pob_choice: That is its name
  chosen_spanish: ese es su nombre
  alternatives_spanish:
  - esa es su nombre
  - así se llama
  lexicon: HALOT
  rationale: La cláusula enfática con הוּא funciona como afirmación demostrativa. «Ese es su nombre» reproduce bien la fuerza de «that is its name» sin volverla demasiado explicativa.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta el día de hoy
  - todavía hoy
  lexicon: HALOT
  rationale: La expresión temporal hebrea se vierte con la locución idiomática natural «hasta hoy», equivalente a «to this day» en español bíblico contemporáneo.
translation_notes:
  revision_awareness: El inglés POB pasó de punto a punto y coma entre las dos cláusulas finales para reflejar mejor el flujo del hebreo; en español se mantuvo una coordinación fluida con coma y punto y coma antes de la cláusula conclusiva, conservando el valor narrativo continuo del original.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o cualquier sustitución reverencial porque el versículo no contiene el nombre divino.
  - Se preservó el topónimo «Luz» como transliteración estable.
  - Se mantuvo un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - No se introdujeron notas textuales ni variantes porque el hebreo y el audit trail inglés coinciden estrechamente en este versículo.
