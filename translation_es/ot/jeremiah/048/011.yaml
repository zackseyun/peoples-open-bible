translation:
  language: es
  text: Moab ha estado en reposo desde su juventud[a], y ha permanecido tranquilo sobre sus heces; no ha sido trasvasado de vasija en vasija, ni ha ido al destierro. Por tanto, su sabor ha permanecido en él, y su olor no ha cambiado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre sus lías». La imagen hebrea es la del vino dejado en reposo sobre su sedimento, sin ser trasvasado.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁאֲנַן
  english_pob_choice: has been at ease
  chosen_spanish: ha estado en reposo
  alternatives_spanish:
  - ha estado tranquilo
  - ha estado seguro
  - ha estado sin sobresaltos
  lexicon: HALOT
  rationale: La idea no es solo calma interior, sino una condición prolongada de tranquilidad/no perturbación. «Ha estado en reposo» transmite ese estado estable con dignidad y sin forzar la imagen.
- source_word: מִנְּעוּרָיו
  english_pob_choice: from his youth
  chosen_spanish: desde su juventud
  alternatives_spanish:
  - desde joven
  - desde sus años mozos
  lexicon: HALOT
  rationale: Conserva el valor temporal directo del hebreo y mantiene la personificación masculina singular de Moab.
- source_word: שֹׁקֵט
  english_pob_choice: has been undisturbed
  chosen_spanish: ha permanecido tranquilo
  alternatives_spanish:
  - ha permanecido en calma
  - ha estado sin ser perturbado
  lexicon: HALOT
  rationale: El predicado complementa la primera expresión y refuerza la imagen de una quietud continua; «tranquilo» es natural en español y conserva la idea de no haber sido removido.
- source_word: אֶל שְׁמָרָיו
  english_pob_choice: on his dregs
  chosen_spanish: sobre sus heces
  alternatives_spanish:
  - sobre sus lías
  - sobre sus sedimentos
  lexicon: HALOT
  rationale: «Heces» es el equivalente español más directo de la imagen enológica; mantiene el sentido figurado del vino asentado sobre su sedimento. Se conserva la tensión lexical porque el lenguaje bíblico usa la metáfora del vino sin explicarla en exceso.
- source_word: הוּרַק
  english_pob_choice: has not been poured
  chosen_spanish: no ha sido vaciado
  alternatives_spanish:
  - no ha sido derramado
  - no ha sido trasvasado
  lexicon: HALOT
  rationale: En contexto de trasiego de vino, «vaciado» comunica la transferencia de un recipiente a otro de manera clara. «Trasvasado» sería más técnico; «vaciado» es más accesible y mantiene la imagen.
- source_word: מִכְּלִי אֶל כֶּלִי
  english_pob_choice: from vessel to vessel
  chosen_spanish: de vasija en vasija
  alternatives_spanish:
  - de recipiente en recipiente
  - de jarra en jarra
  lexicon: HALOT
  rationale: «Vasija» conserva el tono bíblico y concreto del hebreo, y funciona bien con el movimiento repetido de un recipiente a otro.
- source_word: וּבַגּוֹלָה
  english_pob_choice: into exile
  chosen_spanish: al destierro
  alternatives_spanish:
  - a la cautividad
  - al exilio
  lexicon: HALOT
  rationale: «Destierro» comunica el desplazamiento forzoso en un registro natural para el español bíblico. «Exilio» sería correcto, pero «destierro» refleja mejor el matiz de expulsión/deportación en este contexto profético.
- source_word: טַעְמוֹ
  english_pob_choice: his taste
  chosen_spanish: su sabor
  alternatives_spanish:
  - su gusto
  - su sabor característico
  lexicon: HALOT
  rationale: En la metáfora del vino, «sabor» es el equivalente idiomático más claro y lector-friendly en español. Conserva la referencia sensorial sin introducir una paráfrasis interpretativa.
- source_word: עָמַד ... בּוֹ
  english_pob_choice: has remained in him
  chosen_spanish: ha permanecido en él
  alternatives_spanish:
  - ha quedado en él
  - ha seguido en él
  lexicon: HALOT
  rationale: La frase hebrea indica permanencia o persistencia. «Ha permanecido en él» expresa bien la estabilidad del sabor dentro de la metáfora.
- source_word: רֵיחוֹ
  english_pob_choice: his scent
  chosen_spanish: su olor
  alternatives_spanish:
  - su aroma
  - su fragancia
  lexicon: HALOT
  rationale: «Olor» es neutral y directo; evita sobrecargar la imagen con un matiz demasiado positivo como «aroma», y conserva la relación paralela con «sabor».
- source_word: נָמָר
  english_pob_choice: has not changed
  chosen_spanish: no ha cambiado
  alternatives_spanish:
  - no se ha alterado
  - no ha mudado
  lexicon: HALOT
  rationale: El verbo expresa cambio/alteración. «No ha cambiado» es claro y natural, y mantiene el paralelismo con el sabor que permanece igual.
theological_decisions:
- issue: Personificación de Moab con singular masculino
  english_pob_reading: Retain masculine singular ('his youth,' 'his dregs,' 'his taste,' 'his scent')
  chosen_spanish_reading: Conservar el singular masculino ('su juventud', 'sus heces', 'su sabor', 'su olor')
  alternative_spanish_readings:
  - Usar formas neutras o plurales para la nación
  - Reformular todo en tercera persona plural
  rationale: El hebreo personifica a Moab como entidad singular masculina. El español puede conservar esa personificación sin crear ambigüedad, manteniendo la fuerza literaria y la correspondencia gramatical del texto.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El borrador sigue de cerca la última revisión inglesa, que se mantuvo sin cambios. La única decisión relevante para el español fue elegir equivalentes naturales que preservan la metáfora del vino y la personificación masculina de Moab sin suavizar la imagen.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología estándar del proyecto cuando no aparece explícitamente en este versículo.
  - Se conservaron los posesivos masculinos singulares para Moab en todo el versículo.
  - Se prefirió «destierro»/«vasija»/«heces» por claridad y continuidad con el registro profético, sin borrar la metáfora enológica.
  - La nota al pie se ancló en «heces» porque en español también surge la alternativa tradicional «lías».
