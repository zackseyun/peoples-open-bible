revisions:
- from: Con su aliento los cielos se embellecen[a]; su mano atravesó[b] a la serpiente fugitiva[c].
  to: Por su aliento los cielos quedan hermoseados[a]; su mano atravesó[b] la serpiente fugitiva[c].
  rationale: Se hace un ajuste menor para reflejar mejor el sentido instrumental de בְּרוּחוֹ y, sobre todo, el valor causativo/resultativo de שִׁפְרָה según la auditoría inglesa. También se pule la nota alternativa para una sintaxis española más natural.
