  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro de auditoría inglés en casi todo: imperativo directo a Aarón y sus hijos, separación de las cosas santas, profanación del nombre santo y cierre con «Yo soy Yahvé». Sin embargo, la cláusula relativa «el cual ellos santifican para mí» en español queda demasiado pegada a «mi santo nombre», cuando la decisión teológica documentada indica que el referente principal son «las cosas santas». Además, «para mí» no refleja tan bien como «a mí» la revisión inglesa final «to me» y su cercanía formal al dativo hebreo.'
  spanish_quality_summary: El texto es legible y digno, pero «el cual ellos santifican para mí» suena algo rígido y, por concordancia inmediata, induce una lectura errónea del relativo. Una leve reestructuración mejora la claridad sin perder cercanía al hebreo. El resto del español es natural y apropiado para registro bíblico contemporáneo.
  glossary_alignment: 'Alineación general buena: יהוה -> «Yahvé» correctamente; קדשי -> «cosas santas» mantiene amplitud cultual; בני ישראל -> «hijos de Israel» preserva la fórmula formal; חלל -> «profanen» correcto. La principal corrección necesaria es sintáctica/semántica en la relativa, no terminológica.'
  issues:
