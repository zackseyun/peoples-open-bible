review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia del hebreo: Israel envía mensajeros al rey de Edom, hace una petición de paso, Edom no atiende, luego también envía al rey de Moab, este no consiente, e Israel permanece en Cades. Sin embargo, en la segunda cláusula falta el complemento explícito de ''envió'' (''mensajeros''), que aunque puede sobrentenderse, en español suena algo elíptico y menos claro que el original. Además, ''así que'' introduce un matiz más interpretativo/consecutivo que el simple avance narrativo de וַיֵּשֶׁב.'
  spanish_quality_summary: El texto es claro y mayormente natural. 'Permítenos pasar por tu tierra' es correcto y legible. 'No escuchó' es aceptable, aunque en español bíblico-natural 'no quiso escuchar' o 'no hizo caso' podría explicitar mejor el sentido; no es imprescindible cambiarlo. La mejora principal es hacer explícito 'mensajeros' en la segunda misión y sustituir 'así que' por una conexión más narrativa como 'de modo que' o simplemente coordinar con coma para no sobreinterpretar.
  glossary_alignment: No hay términos del glosario principal en juego salvo topónimos. 'Cades' es defendible como forma castellana tradicional, aunque 'Cades' frente a 'Kadesh' es una decisión estilística; no entra en conflicto con la guía del proyecto. Las decisiones léxicas sobre 'mensajeros', 'no quiso' y 'se quedó' son básicamente coherentes con la auditoría inglesa.
  issues:
  - severity: medium
    issue: 'La segunda ocurrencia de שׁלח queda demasiado elíptica en español: ''Y también envió al rey de Moab''.'
    rationale: El hebreo dice simplemente 'envió', pero el contexto previo aporta 'mensajeros'. En español, 'envió al rey de Moab' puede leerse momentáneamente como si enviara al propio rey, no mensajeros a él. Añadir 'mensajeros' preserva mejor el sentido diplomático.
  - severity: low
    issue: '''Así que Israel se quedó en Cades'' añade una conexión consecutiva algo más fuerte que el hebreo.'
    rationale: וַיֵּשֶׁב sigue la narrativa; 'así que' interpreta causalmente. 'Y Israel se quedó en Cades' o 'de modo que Israel permaneció en Cades' sería más cercano.
  revised_spanish_text: 'Entonces Israel envió mensajeros al rey de Edom, diciendo: «Por favor, permítenos pasar por tu tierra»[a]; pero el rey de Edom no escuchó. Y también envió mensajeros al rey de Moab, pero este no quiso[b], y Israel se quedó en Cades.'
  revised_footnotes:
