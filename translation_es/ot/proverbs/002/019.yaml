translation:
  language: es
  text: Todos los que entran en ella[a] no vuelven, ni alcanzan[b] los senderos de la vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «van a ella» o «vienen a ella». El hebreo probablemente lleva aquí un matiz sexual en el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «llegan a» o «obtienen» los senderos de la vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - Todos los
  - Toda persona que
  - Quienes
  lexicon: HALOT
  rationale: «Todos» conserva la fuerza comprehensiva del hebreo y suena natural al abrir un proverbio en español.
- source_word: בָּאֶיהָ
  english_pob_choice: who go in to her
  chosen_spanish: van a ella
  alternatives_spanish:
  - entran en ella
  - vienen a ella
  - se acercan a ella
  lexicon: HALOT
  rationale: El hebreo con sufijo femenino apunta a la mujer prohibida del contexto. En español, «van a ella» preserva la dirección idiomática sin volver la frase demasiado brusca; la nota documenta que el original puede implicar «entrar a ella» y connotaciones sexuales.
- source_word: יְשׁוּבוּן
  english_pob_choice: do not return
  chosen_spanish: no vuelven
  alternatives_spanish:
  - no regresan
  - no vuelven atrás
  - no retornan
  lexicon: HALOT
  rationale: «No vuelven» expresa la negación de שׁוב con naturalidad proverbial en español. Mantiene el valor general de la sentencia sin forzar un futuro o una explicación ajena al texto.
- source_word: יַשִּׂיגוּ
  english_pob_choice: attain
  chosen_spanish: alcanzan
  alternatives_spanish:
  - llegan a
  - consiguen
  - alcanzan a
  lexicon: HALOT
  rationale: «Alcanzan» refleja bien el sentido de להגיע/alcanzar, «llegar a, alcanzar, lograr» en el contexto de caminos. Evita la idea de «recuperar» algo, que el pasaje no dice.
- source_word: אָרְחוֹת
  english_pob_choice: paths
  chosen_spanish: senderos
  alternatives_spanish:
  - caminos
  - sendas
  - rutas
  lexicon: HALOT
  rationale: «Senderos» mantiene la imagen sapiencial de un camino moral o vital y suena natural junto con «vida» en español.
- source_word: חַיִּים
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - vida
  - la vida verdadera
  - vida
  lexicon: HALOT
  rationale: Aunque el hebreo es plural idiomático, en español el singular «la vida» comunica con claridad la expresión fija «senderos de la vida».
theological_decisions:
- issue: Fuerza de la negación sapiencial
  english_pob_reading: A general wisdom statement about the ruinous end of joining the adulterous woman, not an absolute metaphysical impossibility of repentance in every individual case.
  chosen_spanish_reading: Una sentencia general de sabiduría sobre el final ruinosa de unirse a la mujer adúltera, no una afirmación metafísica absoluta de que toda persona quede excluida de arrepentirse.
  alternative_spanish_readings:
  - Una afirmación absoluta de que nadie que vaya a ella jamás podrá volver
  - Una descripción del resultado normal y grave de ese camino
  rationale: El hebreo usa una negación directa en lenguaje sapiencial. La traducción conserva su severidad sin suavizarla ni convertirla en una regla doctrinal absoluta; así se preserva la tensión teológica documentada por el POB inglés.
  doctrine_reference: Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La versión inglesa más reciente sustituyó «regain» por «attain» para reflejar con más precisión יַשִּׂיגוּ; por eso se eligió «alcanzan» en vez de una idea de recuperar o volver a obtener. También se mantuvo la negación proverbial fuerte de לֹא יְשׁוּבוּ/ן sin convertirla en una paráfrasis atenuada.
  spanish_consistency_notes:
  - Se evitó «Cristo»/«SEÑOR» porque el versículo no contiene referencia directa a esos términos.
  - Se prefirió «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - «Vida» se mantuvo en singular idiomático para reflejar el uso sapiencial de חַיִּים.
  - La combinación «van a ella» / «no vuelven» conserva un español fluido sin borrar el trasfondo sexual sugerido por el hebreo en el contexto inmediato.
