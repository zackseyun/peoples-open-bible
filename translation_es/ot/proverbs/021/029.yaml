review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura antitética del hebreo y el sentido general del versículo. Sin embargo, debilita dos decisiones importantes del rastro POB: 1) הֵעֵז בְּפָנָיו se expresa mejor con una referencia explícita al rostro/semblante para preservar el idiomatismo facial documentado en la nota inglesa; 2) יָשָׁר se alinea mejor con «recto» que con «justo», ya que el inglés auditado fijó «upright» y en Proverbios el contraste ético-conductual con «recto» es más preciso que el campo semántico de justicia forense o general que puede sugerir «justo».'
  spanish_quality_summary: La redacción es natural y legible, pero «se muestra atrevido» pierde la imagen concreta del rostro, y «el justo» suena algo menos exacto en este contexto sapiencial que «el recto». «Hace firme su camino» es claro, aunque «afianza su camino» suena un poco más idiomático; aun así, no es necesario cambiarlo para fidelidad. La frase revisada mantiene un español moderno y digno, con mejor correspondencia al hebreo y al audit trail.
  glossary_alignment: 'No hay términos del glosario maestro especialmente activados aquí. La principal alineación léxica requerida es con las decisiones auditadas: «upright» → «recto» preferible a «justo» en este verso; y la imagen de הֵעֵז בְּפָנָיו debe conservarse con «rostro/semblante» en el texto o al menos de forma más visible que en el borrador actual.'
  issues:
  - severity: medium
    issue: Se pierde en el texto principal la imagen idiomática del rostro en הֵעֵז בְּפָנָיו.
    rationale: El inglés POB eligió «puts on a bold face» precisamente para conservar el idiomatismo facial. «Se muestra atrevido» comunica audacia, pero elimina del texto principal la metáfora fuente y la desplaza por completo a la nota.
  - severity: medium
    issue: «Justo» no refleja tan precisamente יָשָׁר como «recto» en este proverbio.
    rationale: El audit trail fijó «upright», no «righteous/just». En literatura sapiencial, יָשָׁר suele apuntar a rectitud de conducta; «justo» en español puede introducir matices distintos y reduce la correspondencia léxica documentada.
  revised_spanish_text: El hombre malvado pone un rostro atrevido[a], pero el recto hace firme su camino.
  revised_footnotes:
  - marker: a
    text: 'O: «endurece su rostro»; el hebreo describe a alguien que hace audaz o endurece su semblante.'
    reason: lexical_alternative
  revision_rationale: La revisión restaura en el texto principal la imagen del rostro presente en הֵעֵז בְּפָנָיו, en línea con la decisión inglesa «puts on a bold face», y sustituye «justo» por «recto» para reflejar mejor יָשָׁר en el contexto sapiencial. Se conserva «hace firme su camino» porque representa adecuadamente יכין דרכיו y sigue siendo claro en español.
