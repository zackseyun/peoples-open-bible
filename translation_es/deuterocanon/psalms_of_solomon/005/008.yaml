  timestamp: '2026-05-07T23:00:05Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del griego: una súplica para que la mano de Dios no pese sobre la comunidad, con el resultado evitado de pecar bajo constricción. Sin embargo, ''hagas pesada tu mano'' suena poco natural en español, y ''por necesidad'' inclina más a carencia o necesidad objetiva que a constricción/presión, mientras que διʼ ἀνάγκην en este contexto apunta mejor a compulsión o presión forzada.'
  spanish_quality_summary: La redacción actual es comprensible pero algo rígida. 'No hagas pesada tu mano sobre nosotros' es gramatical, pero no es la manera más idiomática y digna en español bíblico actual. 'No cargues tu mano sobre nosotros' preserva mejor la imagen y la fuerza opresiva. Además, 'no sea que' refleja con más naturalidad el matiz de advertencia de ἵνα μὴ / 'lest' en este registro.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La elección relevante aquí es idiomática y semántica: mantener ''mano'' por χείρ y evitar diluir διʼ ἀνάγκην. Conviene ajustar ''por necesidad'' a ''forzados'' para expresar mejor la constricción del original y del audit trail inglés (''under compulsion'').'
  issues:
  - severity: medium
    issue: '''hagas pesada tu mano'' suena poco natural en español'
    rationale: Aunque es cercano al griego, la expresión resulta algo forzada. Una forma como 'cargues tu mano sobre nosotros' conserva la metáfora corporal y comunica mejor la opresión en español legible y digno.
  - severity: medium
    issue: '''por necesidad'' no representa con suficiente precisión διʼ ἀνάγκην en este contexto'
    rationale: En español, 'por necesidad' suele oírse como 'porque hacía falta' o 'por carencia', mientras que aquí la idea es presión o compulsión. 'Forzados' o 'bajo compulsión' se alinean mejor con la decisión inglesa auditada.
  - severity: low
    issue: '''para que no'' es correcto, pero ''no sea que'' encaja mejor con el registro formal y la advertencia implícita'
    rationale: Dado que el inglés POB revisado optó por 'lest', una solución española equivalente y natural en registro bíblico es 'no sea que'.
  revised_spanish_text: No cargues tu mano sobre nosotros[a], no sea que pequemos forzados.
  revised_footnotes:
  - marker: a
    text: 'O: «No hagas pesada tu mano sobre nosotros, no sea que pequemos por necesidad».'
