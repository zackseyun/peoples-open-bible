translation:
  language: es
  text: Busqué en mi corazón cómo atraer mi carne con vino[a], mientras mi corazón me guiaba con sabiduría, y cómo asir la insensatez, hasta ver qué era bueno para los hijos del hombre[b] hacer bajo los cielos durante el número de los días de sus vidas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «atraer mi carne con vino» traduce un hebreo difícil; puede referirse a poner a prueba el placer corporal por medio del vino, mientras todavía se conserva un sabio dominio propio.
    reason: lexical_alternative
  - marker: b
    text: 'O: «para la humanidad». El hebreo dice «para los hijos del hombre», una expresión masculina de alcance general para la humanidad.'
    reason: alternative_reading
lexical_decisions:
- source_word: תַּרְתִּי
  english_pob_choice: I searched
  chosen_spanish: Busqué
  alternatives_spanish:
  - Exploré
  - Indagué
  lexicon: HALOT
  rationale: El verbo expresa una búsqueda interior, deliberada y experimental. «Busqué» comunica bien ese esfuerzo reflexivo en español sin endurecer el tono.
- source_word: בְלִבִּי
  english_pob_choice: in my heart
  chosen_spanish: en mi corazón
  alternatives_spanish:
  - dentro de mí
  - en mi interior
  lexicon: HALOT
  rationale: לֵב designa el centro interior de la persona, no solo el sentimiento. «En mi corazón» conserva la antropología hebrea y suena natural en español.
- source_word: לִמְשׁוֹךְ בַּיַּיִן אֶת בְּשָׂרִי
  english_pob_choice: how to draw my flesh with wine
  chosen_spanish: cómo atraer mi carne con vino
  alternatives_spanish:
  - cómo arrastrar mi carne con vino
  - cómo deleitar mi cuerpo con vino
  lexicon: HALOT
  rationale: La expresión hebrea es difícil y mantiene una ambigüedad importante. «Atraer» conserva la idea de mover o atraer hacia el vino sin cerrar del todo el sentido; «carne» traduce בשר con la fuerza literal y antropológica que el proyecto preserva.
- source_word: בְּשָׂרִי
  english_pob_choice: my flesh
  chosen_spanish: mi carne
  alternatives_spanish:
  - mi cuerpo
  lexicon: HALOT
  rationale: Se mantiene «carne» para respetar el vocabulario del hebreo y la posible tensión entre lo corporal y lo existencial en Eclesiastés.
- source_word: וְלִבִּי נֹהֵג בַּחָכְמָה
  english_pob_choice: while my heart was guiding me with wisdom
  chosen_spanish: mientras mi corazón me guiaba con sabiduría
  alternatives_spanish:
  - mientras mi corazón se conducía con sabiduría
  - mientras mi corazón me conducía con sabiduría
  lexicon: HALOT
  rationale: נהג expresa conducir o guiar. En español, «me guiaba con sabiduría» deja claro el sujeto y conserva la imagen de un control interior sabio.
- source_word: וְלֶאֱחֹז
  english_pob_choice: and to lay hold of
  chosen_spanish: y cómo asir
  alternatives_spanish:
  - y cómo agarrar
  - y cómo aprehender
  lexicon: HALOT
  rationale: אחז significa tomar o sujetar firmemente. «Asir» es breve, digno y bastante cercano al hebreo.
- source_word: בְּסִכְלֻת
  english_pob_choice: folly
  chosen_spanish: la insensatez
  alternatives_spanish:
  - la necedad
  - la locura
  lexicon: HALOT
  rationale: En Eclesiastés, סכלות funciona como término temático contrastado con sabiduría. «Insensatez» comunica la falta de sensatez y evita un matiz demasiado coloquial.
- source_word: עַד אֲשֶׁר אֶרְאֶה
  english_pob_choice: until I might see
  chosen_spanish: hasta ver
  alternatives_spanish:
  - hasta que viera
  - hasta que pudiera ver
  lexicon: HALOT
  rationale: El giro prospectivo del hebreo se puede expresar naturalmente con «hasta ver» en español, manteniendo la finalidad de la investigación.
- source_word: אֵי זֶה טוֹב
  english_pob_choice: what was good
  chosen_spanish: qué era bueno
  alternatives_spanish:
  - qué resultaba bueno
  - cuál era lo bueno
  lexicon: HALOT
  rationale: La pregunta busca discernir lo verdaderamente bueno. «Qué era bueno» es claro y directo, y conserva el valor evaluativo del adjetivo.
- source_word: לִבְנֵי הָאָדָם
  english_pob_choice: for the sons of man
  chosen_spanish: para los hijos del hombre
  alternatives_spanish:
  - para la humanidad
  - para los seres humanos
  - para los hijos de Adán
  lexicon: HALOT
  rationale: Se preserva la forma masculina-genericizada del hebreo. «Hijos del hombre» refleja mejor la expresión original que una neutralización inmediata; el matiz inclusivo puede explicarse aparte.
- source_word: תַּחַת הַשָּׁמַיִם
  english_pob_choice: under the heavens
  chosen_spanish: bajo los cielos
  alternatives_spanish:
  - debajo de los cielos
  - bajo el cielo
  lexicon: HALOT
  rationale: El hebreo usa plural. «Bajo los cielos» conserva esa forma y el registro elevado del libro.
- source_word: מִסְפַּר יְמֵי חַיֵּיהֶם
  english_pob_choice: during the number of the days of their lives
  chosen_spanish: durante el número de los días de su vida
  alternatives_spanish:
  - durante la cuenta de los días de su vida
  - a lo largo de los días de su vida
  lexicon: HALOT
  rationale: Se mantiene «número» para no borrar la expresión concreta del hebreo. «Su vida» puede leerse colectivamente y suena natural en español; la pluralidad referida por el hebreo queda explicada en nota.
theological_decisions:
- issue: Expresión masculina genérica de בני האדם
  english_pob_reading: the sons of man; a masculine-generic expression for humanity
  chosen_spanish_reading: los hijos del hombre
  alternative_spanish_readings:
  - la humanidad
  - los seres humanos
  rationale: Se conserva la forma masculina del hebreo en el texto principal, siguiendo el principio de mantener la expresión representativa cuando el original la usa. La alternativa inclusiva puede consignarse en nota para claridad sin borrar la forma fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; contested term אָדָם
- issue: Valor de בשר en este contexto
  english_pob_reading: my flesh; difficult Hebrew; testing bodily pleasure through wine while still retaining wise self-control
  chosen_spanish_reading: mi carne
  alternative_spanish_readings:
  - mi cuerpo
  - mi ser corporal
  rationale: «Carne» preserva el término bíblico y la dificultad del hebreo. No se suaviza a «cuerpo» porque eso podría cerrar la tensión entre placer corporal y autocontrol que el contexto sugiere.
  doctrine_reference: DOCTRINE.md §Lexical transparency; contested term בשר
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa que ajustó la sintaxis a «how to draw my flesh with wine» y conserva la ambigüedad experimental del verso. En español se optó por una solución igualmente cercana y natural, sin resolver en exceso la frase difícil de בְּשָׂרִי.
  spanish_consistency_notes:
  - Se conserva «corazón» para לֵב en coherencia con el tratamiento antropológico del proyecto.
  - Se mantiene «carne» para בשר, en lugar de «cuerpo», por consistencia léxica y transparencia.
  - Se traduce יהוה como «Yahvé» en el proyecto, pero este verso no lo contiene.
  - Se prefiere una estructura coordinada con «cómo... y cómo...» para reflejar el paralelismo del hebreo.
