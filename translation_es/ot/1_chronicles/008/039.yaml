translation:
  language: es
  text: 'Los hijos de Eshek, su hermano: Ulam su primogénito[a], Jeús, el segundo, y Elifélet, el tercero.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y los hijos de Eshek, su hermano…». El hebreo comienza con una conjunción, que en el estilo genealógico español suele dejarse implícita.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Ahora bien, los hijos de
  lexicon: HALOT
  rationale: En un encabezado genealógico español, «los hijos de» comunica de manera natural la relación de descendencia que el hebreo expresa con בני. El prefijo conjuntivo inicial se mantiene en la estructura del verso, pero sin forzar un «y» inicial innecesario en español.
- source_word: עֵשֶׁק
  english_pob_choice: Eshek
  chosen_spanish: Eshek
  alternatives_spanish:
  - Esek
  lexicon: Nombre propio (transliteración convencional)
  rationale: Se conserva el nombre propio por transliteración, siguiendo el texto base y la convención establecida para este personaje.
- source_word: אָחִיו
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - su pariente
  - su hermano de clan
  lexicon: HALOT
  rationale: «Hermano» preserva el sentido literal ordinario del sustantivo y coincide con la lectura genealógica del contexto. No hay razón suficiente para debilitarlo a «pariente».
- source_word: אוּלָם
  english_pob_choice: Ulam
  chosen_spanish: Ulam
  lexicon: Nombre propio (transliteración convencional)
  rationale: Nombre propio mantenido por transliteración.
- source_word: בְּכֹרוֹ
  english_pob_choice: his firstborn
  chosen_spanish: su primogénito
  alternatives_spanish:
  - su hijo mayor
  - su primero
  lexicon: HALOT
  rationale: «Primogénito» reproduce con precisión el valor léxico de בְּכֹר y conserva la relación genealógica mejor que una paráfrasis como «hijo mayor».
- source_word: יְעוּשׁ
  english_pob_choice: Jeush
  chosen_spanish: Jeús
  alternatives_spanish:
  - Jeush
  lexicon: Nombre propio (transliteración convencional)
  rationale: Se usa una transliteración española naturalizada como «Jeús», cercana a la forma inglesa del audit trail y a la pronunciación habitual en español bíblico, sin traducir el nombre.
- source_word: הַשֵּׁנִי
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el otro
  - el siguiente
  lexicon: HALOT
  rationale: El ordinal se traduce de forma directa para mantener la secuencia genealógica exacta.
- source_word: וֶאֱלִיפֶלֶט
  english_pob_choice: and Eliphelet
  chosen_spanish: y Elifelet
  alternatives_spanish:
  - y Eliphelet
  - y Eliphalet
  lexicon: Nombre propio (transliteración convencional)
  rationale: Se conserva la coordinación explícita y se adapta el nombre a una forma española clara y reconocible, «Elifelet», sin alterar su identidad propia.
- source_word: הַשְּׁלִשִׁי
  english_pob_choice: the third
  chosen_spanish: el tercero
  alternatives_spanish:
  - el tercer hijo
  lexicon: HALOT
  rationale: «El tercero» reproduce el ordinal del hebreo de manera simple y fiel al orden de nacimiento.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene un estilo genealógico directo y conserva la secuencia de nacimiento con «firstborn / second / third». No se reportan revisiones aplicadas ni discrepancias textuales; la versión española sigue ese mismo patrón con ajuste natural al español.
  spanish_consistency_notes:
  - Se evitó «Cristo», «SEÑOR» y otras sustituciones no presentes en el pasaje.
  - «Primogénito» conserva la fuerza léxica de בְּכֹר.
  - Los nombres propios se transliteran de manera consistente y readable para español.
  - La estructura genealógica se mantiene compacta, conforme al estilo del contexto de Crónicas.
