review_pass:
  verdict: revise
  source_alignment_summary: El borrador español transmite correctamente la estructura comparativa y el contraste central entre escasez con paz y abundancia con conflicto. Sin embargo, en זִבְחֵי el original, confirmado por la auditoría inglesa, apunta mejor a la comida festiva asociada al sacrificio que al acto sacrificial desnudo; «sacrificios» solo empobrece la imagen de abundancia doméstica. El resto de los elementos principales está bien alineado con el hebreo.
  spanish_quality_summary: El español es claro y legible, pero «trozo de pan seco» es menos vívido que la imagen proverbial de una porción mínima, y «casa llena de sacrificios» suena algo antinatural en español, como si la casa estuviera llena de víctimas u ofrendas en vez de banquetes. «Pleito» es posible, pero «discordia» o «contienda» encaja mejor con el registro proverbial y con «paz».
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. La principal cuestión léxica es mantener la decisión documentada para זִבְחֵי: no reducirla a «sacrificios» en el texto principal cuando la auditoría inglesa optó por «sacrificial feasts» para preservar tanto el trasfondo cultual como la idea de abundante comida. La nota puede conservar la alternativa «sacrificios».'
  issues:
  - severity: medium
    issue: «sacrificios» en el texto principal reduce indebidamente זִבְחֵי
    rationale: La decisión inglesa auditada eligió «sacrificial feasts» porque el proverbio contrasta una comida escasa con una casa de abundancia festiva. «Sacrificios» conserva el campo cultual, pero pierde la idea de banquete/comida abundante y suena menos natural en español dentro de «casa llena de…».
  - severity: low
    issue: «pleito» es menos proverbial que alternativas como «discordia»
    rationale: רִיב denota contienda o conflicto interpersonal. «Pleito» es entendible, pero en un proverbio sapiencial «discordia» fluye mejor y evita un matiz demasiado coloquial o jurídico en algunos contextos hispanos.
  - severity: low
    issue: La nota al pie no refleja bien la opción principal si el texto se corrige
    rationale: Si el texto principal adopta «banquetes sacrificiales», la nota debe presentar la alternativa breve «sacrificios», no repetirla como si fuera la lectura principal.
  revised_spanish_text: Mejor es un trozo de pan seco con paz que una casa llena de banquetes sacrificiales[a] con discordia.
  revised_footnotes:
  - marker: a
    text: O «sacrificios»; el hebreo puede referirse tanto a sacrificios como a comidas sacrificiales o, más generalmente, a abundante comida asociada con el sacrificio.
    reason: lexical_alternative
  revision_rationale: Se ajusta זִבְחֵי a «banquetes sacrificiales» para preservar la decisión léxica auditada y la imagen de abundancia festiva del proverbio, manteniendo en nota la alternativa «sacrificios». También se sustituye «pleito» por «discordia» para un registro sapiencial más natural y ampliamente legible en español.
