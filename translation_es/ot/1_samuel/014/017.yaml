translation:
  language: es
  text: 'Entonces Saúl dijo al pueblo que estaba con él: «Por favor, hagan un recuento[a] y vean quién se ha ido de entre nosotros». Ellos hicieron el recuento, y he aquí que no estaban Jonatán ni su escudero.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pasen lista» / «hagan un recuento»; el verbo hebreo puede significar revisar o contar a los presentes.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּקְדוּ / וַיִּפְקְדוּ
  english_pob_choice: take a count / took a count
  chosen_spanish: hagan un recuento / hicieron el recuento
  alternatives_spanish:
  - hagan un censo / hicieron el censo
  - revísenlos / los revisaron
  - hagan una pasada de lista / pasaron lista
  lexicon: HALOT
  rationale: En este contexto פקד se refiere a comprobar quiénes están presentes, no a nombrar ni castigar. «Hacer un recuento» conserva la idea de contar o verificar la presencia con español natural y mantiene la repetición del verbo en la respuesta narrativa.
- source_word: נָא
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - les ruego
  - ahora
  - por favor, les ruego
  lexicon: HALOT
  rationale: נא suaviza la orden. «Por favor» comunica bien el tono de petición respetuosa en español moderno sin volver arcaico el registro.
- source_word: וּרְאוּ
  english_pob_choice: and see
  chosen_spanish: y vean
  alternatives_spanish:
  - y miren
  - y averigüen
  - y comprueben
  lexicon: HALOT
  rationale: El mandato no es solo visual sino de constatación. «Vean» sigue de cerca el hebreo y funciona de modo idiomático en español; el contexto ya aclara que se trata de verificar quién falta.
- source_word: מִי הָלַךְ מֵעִמָּנוּ
  english_pob_choice: who has gone from among us
  chosen_spanish: quién se ha ido de entre nosotros
  alternatives_spanish:
  - quién nos ha dejado
  - quién se ha apartado de nosotros
  - quién ha salido de entre nosotros
  lexicon: HALOT
  rationale: La construcción expresa salida del grupo. «De entre nosotros» refleja mejor el matiz comunitario que una simple traducción con «nos dejó», y «se ha ido» es natural en español sin perder la idea de partida.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí que
  alternatives_spanish:
  - y miren
  - e inmediatamente resultó que
  - y resultó que
  lexicon: HALOT
  rationale: הנה introduce un hallazgo llamativo. «Y he aquí que» conserva el valor narrativo de descubrimiento, con un tono ligeramente solemne apropiado para el texto bíblico.
- source_word: אֵין יוֹנָתָן וְנֹשֵׂא כֵלָיו
  english_pob_choice: Jonathan and his armor-bearer were not there
  chosen_spanish: no estaban Jonatán ni su escudero
  alternatives_spanish:
  - faltaban Jonatán y su escudero
  - no se encontraban Jonatán ni su escudero
  - Jonatán y su escudero no estaban presentes
  lexicon: HALOT
  rationale: El hebreo afirma su no-presencia. «No estaban» es una forma natural y fiel en español. «Escudero» comunica la función militar del נֹשֵׂא כֵלָיו; «armas» o «armamento» sería menos preciso para la relación personal y de servicio.
theological_decisions:
- issue: No-presencia de Jonatán y su portador de armas
  english_pob_reading: Jonathan and his armor-bearer were not there
  chosen_spanish_reading: no estaban Jonatán ni su escudero
  alternative_spanish_readings:
  - faltaban Jonatán y su escudero
  - no se encontraban Jonatán ni su escudero
  rationale: 'No hay una cuestión doctrinal, sino de fidelidad narrativa. La redacción elegida evita exagerar o suavizar la ausencia y conserva el sentido simple del hebreo: al hacer el recuento, constataron que ambos faltaban.'
  doctrine_reference: Narrative fidelity; no doctrinal issue
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura inglesa auditada y su decisión principal para פקד como comprobación de presencia, manteniendo la repetición verbal en español para reflejar el paralelo entre el imperativo y la respuesta narrativa. No se registraron revisiones textuales en el paquete fuente, y el consenso de revisión indica alta concordancia.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando el texto lo requiere, pero este versículo no contiene el nombre divino.
  - Se mantiene «Jonatán» con la forma usual española del nombre bíblico.
  - «Escudero» se eligió por su claridad tradicional y su correspondencia funcional con נֹשֵׂא כֵלָיו.
  - 'La puntuación reproduce una división narrativa clara: discurso directo, respuesta de acción, y conclusión con hallazgo.'
