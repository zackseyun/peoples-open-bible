- from: ¡Mira![a] Su esperanza se frustra[b]; ¿acaso uno no queda abatido con solo verlo?
  to: He aquí[a], su esperanza resulta falsa[b]; ¿acaso no queda uno abatido con solo verlo?
  rationale: Se ajusta el registro de הֵן a un español más digno («He aquí») y, sobre todo, se corrige נִכְזָבָה para reflejar mejor el sentido documentado de 'resultar falsa' en vez de solo 'frustrarse'. La pregunta retórica final se conserva porque es fiel, idiomática y clara en español.
