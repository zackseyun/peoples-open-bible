    issue: La nota [a] está anclada a 'Ezequías' pero explica el verbo 'No oigan/escuchen'.
    rationale: Esto produce una incoherencia formal entre texto y nota. Las notas deben anclarse exactamente en la palabra o frase relevante.
  - severity: high
    issue: Falta una nota para el modismo עֲשׂוּ אִתִּי בְרָכָה ('hagan conmigo una bendición').
    rationale: El rastro auditado en inglés preserva explícitamente la literalidad en nota; el español debe conservar esa decisión, especialmente porque la traducción principal es idiomática.
  - severity: medium
    issue: '''Salgan hacia mí'' es poco natural en español bíblico actual.'
    rationale: Aunque intenta reflejar אֵלַי, en español suena forzado. 'Salgan a mí' conserva mejor la literalidad del movimiento hacia el hablante dentro del registro bíblico, o alternativamente podría suavizarse con otra formulación.
  - severity: low
    issue: La nota [b] no refleja la razón preservada en inglés sobre el distributivo repetido אִישׁ.
    rationale: La nota inglesa b documenta el valor distributivo de 'cada uno'; en español no es obligatoria una nota sobre 'aljibe', pero sí es preferible conservar la observación distributiva si se usa nota.
