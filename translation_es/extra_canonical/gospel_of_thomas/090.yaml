translation:
  language: es
  text: 'Jesús dijo: «Vengan a mí, porque mi yugo es bueno[a] y mi señorío es gentil[b]; y encontrarán descanso[c] para ustedes mismos[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término copto es ⲭⲣⲏⲥⲧⲟⲥ, derivado de χρηστός (“bueno/agradable/amable”), no χριστός (“Cristo”). Por eso se traduce «bueno» y no como título.
    reason: lexical_alternative
  - marker: b
    text: «Señorío» intenta reflejar el sustantivo abstracto copto ⲙⲛⲧϫⲟⲉⲓⲥ, “dominio/autoridad de señor”. Compárese Mateo 11:28–30; Tomás, sin embargo, dice «mi señorío es gentil», no la formulación canónica.
    reason: cross_reference
  - marker: c
    text: «Descanso» traduce el préstamo griego ⲁⲛⲁⲡⲁⲩⲥⲓⲥ (ἀνάπαυσις). El códice muestra una leve incertidumbre ortográfica en la upsilon, pero la lectura es segura.
    reason: lacuna_or_restoration
  - marker: d
    text: El copto dice literalmente «para ustedes mismos» (dativo de ventaja con matiz reflexivo), no solo «para ustedes». A diferencia de Mateo 11:29, aquí no dice «para sus almas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲉⲓⲛⲧⲱⲧⲛ ϣⲁⲁⲛⲟⲕ
  english_pob_choice: Come to me
  chosen_spanish: Vengan a mí
  alternatives_spanish:
  - Vengan ustedes a mí
  - Acérquense a mí
  lexicon: Layton, Coptic Grammar; Lambdin, Introduction to Sahidic Coptic
  rationale: El imperativo plural se expresa de modo natural con «Vengan»; el destinatario «a mí» mantiene el valor direccional del coptico y la fuerza invitatoria del dicho.
- source_word: ⲟⲩⲭⲣⲏⲥⲧⲟⲥ
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - amable
  - agradable
  lexicon: Crum, Coptic Dictionary
  rationale: El término coptico corresponde a χρηστός, no a “Cristo”; «bueno» comunica bien el valor básico de la palabra sin cargarla de resonancias ajenas al pasaje.
- source_word: ⲛⲁϩⲃ
  english_pob_choice: yoke
  chosen_spanish: yugo
  lexicon: Crum, Coptic Dictionary
  rationale: La metáfora agrícola y figurada se conserva directamente en español con «yugo».
- source_word: ⲙⲛⲧϫⲟⲉⲓⲥ
  english_pob_choice: lordship
  chosen_spanish: señorío
  alternatives_spanish:
  - dominio
  - gobierno
  - autoridad
  lexicon: Crum, Coptic Dictionary
  rationale: «Señorío» mantiene la abstracción derivada de «señor» y preserva la relación de autoridad sin reducirla a un término demasiado técnico o excesivamente político.
- source_word: ⲟⲩⲣⲙⲣⲁϣ
  english_pob_choice: gentle
  chosen_spanish: amable
  alternatives_spanish:
  - manso
  - suave
  - benigno
  lexicon: Crum, Coptic Dictionary
  rationale: En español, «amable» funciona bien para una cualidad de trato o de ejercicio de autoridad; conserva la suavidad del predicado sin sonar forzado.
- source_word: ⲛⲁϩⲉ
  english_pob_choice: you will find
  chosen_spanish: hallarán
  alternatives_spanish:
  - encontrarán
  lexicon: Layton, Coptic Grammar
  rationale: El futuro plural es claro en español con «hallarán»; evita una traducción demasiado literal pero mantiene el resultado prometido.
- source_word: ⲁⲛⲁⲡⲁⲩⲥⲓⲥ
  english_pob_choice: rest
  chosen_spanish: descanso
  alternatives_spanish:
  - reposo
  - alivio
  lexicon: Crum, Coptic Dictionary (Greek loanword)
  rationale: «Descanso» es la forma más natural y transparente para el lector en español, y conserva el sentido básico del préstamo griego de “resto/reposo”.
- source_word: ⲛⲁⲛⲧⲱⲧⲛ
  english_pob_choice: for yourselves
  chosen_spanish: para ustedes mismos
  alternatives_spanish:
  - para ustedes
  - para sí mismos
  lexicon: Lambdin, Introduction to Sahidic Coptic
  rationale: La dativa de ventaja con matiz reflexivo queda explícita con «para ustedes mismos», evitando que el lector pierda el énfasis del coptico.
theological_decisions:
- issue: ⲟⲩⲭⲣⲏⲥⲧⲟⲥ como adjetivo y no título cristológico
  english_pob_reading: The word is ⲭⲣⲏⲥⲧⲟⲥ (from Greek χρηστός, “good/pleasant/kind”), not ⲭⲣιⲥτὸς (“Christ”). Hence “good,” not a title.
  chosen_spanish_reading: «bueno» en lugar de cualquier forma de «Cristo»
  alternative_spanish_readings:
  - «Cristo»
  - «el Ungido»
  rationale: El coptico distingue claramente χρηστός de χριστός; mantener «bueno» evita introducir un título donde el texto no lo da y conserva la tensión lexical documentada.
  doctrine_reference: Distinción léxica entre χρηστός y χριστός; no se colapsa el adjetivo en un título mesiánico.
- issue: matiz relacional de ⲙⲛⲧϫⲟⲉⲓⲥ
  english_pob_reading: my lordship is gentle
  chosen_spanish_reading: mi señorío es amable
  alternative_spanish_readings:
  - mi dominio es amable
  - mi autoridad es amable
  - mi gobierno es amable
  rationale: «Señorío» reproduce la abstracción de la forma nominal y conserva la relación de autoridad personal; evita diluir el matiz social y jerárquico que el texto presenta.
  doctrine_reference: Lexema abstracto derivado de «señor»; se respeta la relación de autoridad sin forzar una equivalencia doctrinal específica.
translation_notes:
  revision_awareness: 'Se siguió el estado revisado más reciente del contexto inglés (sin cambios pendientes) y se mantuvo el acuerdo alto del control cruzado. La redacción española conserva las decisiones léxicas auditadas: χρηστός ≠ χριστός, ⲙⲛⲧϫⲟⲉⲓⲥ como sustantivo abstracto y el matiz reflexivo de “for yourselves”.'
  spanish_consistency_notes:
  - Se usó «Jesús» para el sujeto explícito y se mantuvo el imperativo plural natural en español.
  - Se preservó la distinción entre «bueno» y cualquier lectura cristológica de «Cristo».
  - «Señorío» se eligió como término consistente con el valor abstracto de ⲙⲛⲧϫⲟⲉⲓⲥ.
  - «Descanso» refleja el préstamo de ἀνάπαυσις sin sobrecargar el verso con lenguaje eclesiástico tradicional.
