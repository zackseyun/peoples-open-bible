translation:
  language: es
  text: 'Entonces Gad, el profeta, dijo a David[a]: «No te quedes en la fortaleza. Ve y dirígete a la tierra de Judá». Así David se fue al bosque de Heret.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ve y ven a la tierra de Judá». El verbo hebreo puede traducirse como «venir/entrar» o, según el contexto, de manera más general como «ir a» o «dirigirse a».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el vidente
  lexicon: HALOT
  rationale: נָבִיא es el término estándar para ‘profeta’; ‘vidente’ correspondería a otro término hebreo y no está justificado por el texto.
- source_word: לֹא תֵשֵׁב
  english_pob_choice: Do not stay
  chosen_spanish: No te quedes
  alternatives_spanish:
  - No permanezcas
  - No habites
  lexicon: HALOT
  rationale: יָשַׁב puede significar sentarse, habitar o permanecer; aquí el mandato es situacional y español moderno ‘quedarse’ expresa bien la orden sin perder el sentido.
- source_word: בַּמְּצוּדָה
  english_pob_choice: in the stronghold
  chosen_spanish: en la fortaleza
  alternatives_spanish:
  - en el refugio fortificado
  - en la plaza fuerte
  lexicon: HALOT
  rationale: מְצוּדָה designa un lugar fortificado o de refugio. ‘Fortaleza’ es un equivalente natural en español y mantiene la imagen defensiva del contexto de David.
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Vete
  - PartE
  lexicon: HALOT
  rationale: El imperativo de הלך se traduce de forma directa y natural como ‘ve’.
- source_word: וּבָאתָ לְּךָ אֶרֶץ יְהוּדָה
  english_pob_choice: and come for yourself to the land of Judah
  chosen_spanish: y entra en la tierra de Judá
  alternatives_spanish:
  - y ve a la tierra de Judá
  - y ven para ti a la tierra de Judá
  lexicon: HALOT
  rationale: בוא puede ser ‘venir’, ‘entrar’ o ‘llegar’ según el punto de vista. Aquí, desde la meta del movimiento, ‘entra en’ comunica bien el desplazamiento hacia ese territorio. El לְךָ es un énfasis idiomático difícil de reproducir sin torpeza en español; se deja implícito porque no añade contenido proposicional claro.
- source_word: אֶרֶץ יְהוּדָה
  english_pob_choice: the land of Judah
  chosen_spanish: la tierra de Judá
  alternatives_spanish:
  - el territorio de Judá
  - la región de Judá
  lexicon: HALOT
  rationale: אֶרֶץ con nombre propio tribal indica territorio. ‘Tierra de Judá’ preserva ese valor geográfico y bíblico con naturalidad en español.
- source_word: יַעַר חָרֶת
  english_pob_choice: the forest of Hereth
  chosen_spanish: el bosque de Heret
  alternatives_spanish:
  - el bosque de Jaret
  - el bosque de Heret
  lexicon: HALOT
  rationale: יַעַר es ‘bosque’ o ‘selva’; ‘bosque’ resulta claro y digno en español. El topónimo se translitera como Heret para mantener la forma del nombre propio sin añadir una vocalización no atestiguada en el texto base.
- source_word: וַיָּבֹא
  english_pob_choice: came to
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - entró
  lexicon: HALOT
  rationale: בוא, en este cierre narrativo, puede expresarse naturalmente como ‘llegó’. En español fluye mejor con el desplazamiento hacia un lugar concreto y conserva el sentido de arribo.
theological_decisions:
- issue: Tratamiento del nombre divino ausente en el versículo pero contexto narrativo de mandato profético
  english_pob_reading: No explicit divine-name issue in the verse
  chosen_spanish_reading: No se introduce ninguna glosa teológica adicional; el verso se traduce de forma estrictamente narrativa.
  alternative_spanish_readings:
  - Añadir una nota teológica sobre la autoridad profética
  - Explicitar intervención divina en el mandato
  rationale: El hebreo y la POB inglesa presentan una instrucción profética sin referencia directa al nombre divino en este versículo. Cualquier ampliación teológica excedería la evidencia textual.
  doctrine_reference: Sola Scriptura / restricción al contenido explícito del texto
translation_notes:
  revision_awareness: La versión inglesa revisada reorientó בוא hacia una traducción consistente con ‘come’ y añadió ‘for yourself’ para לְךָ. En español, el valor idiomático de לְךָ se deja implícito para evitar una construcción forzada, y בוא se resuelve con ‘entra’/‘llegó’ según la naturalidad del español y el movimiento narrativo.
  spanish_consistency_notes:
  - Se mantiene ‘Judá’ y no ‘Judea’ porque el contexto es territorial-tribal, no la región del período posterior.
  - ‘Fortaleza’ conserva mejor la idea de un lugar defendido que ‘castillo’ o ‘bastión’ en este pasaje.
  - Se usa ‘bosque’ para יַעַר, coherente con un lugar arbolado sin forzar una imagen moderna distinta.
