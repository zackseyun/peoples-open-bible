translation:
  language: es
  text: Porque él causa dolor, pero venda las heridas; él quebranta[a], pero sus manos sanan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aplasta, pero su mano sana». El hebreo pasa de un sustantivo singular («su mano») a un verbo plural («sanan»); la traducción principal usa «sus manos» para reflejar el sentido del texto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento de la afirmación anterior. En español, «Porque» conserva bien el valor causal/explicativo sin volver la línea innecesariamente pesada.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: HALOT
  rationale: El pronombre independiente conserva el énfasis del hebreo. En español, «él» ya puede expresar ese sujeto enfático en contexto poético.
- source_word: יַכְאִיב
  english_pob_choice: causes pain
  chosen_spanish: causa dolor
  alternatives_spanish:
  - hiere
  - aflige
  - lastima
  lexicon: HALOT
  rationale: El hifil de כאב comunica causar dolor o malestar. «Causa dolor» es directo y evita anticipar la imagen más concreta del siguiente verbo.
- source_word: וְיֶחְבָּשׁ
  english_pob_choice: but he binds up
  chosen_spanish: pero venda
  alternatives_spanish:
  - y venda
  - pero lo venda
  - pero lo venda y lo cubre
  lexicon: HALOT
  rationale: חבש aquí se refiere a vendar o envolver una herida. «Venda» refleja bien esa imagen en español. El «pero» reproduce el contraste poético que el inglés POB también marcó.
- source_word: יִמְחַץ
  english_pob_choice: he shatters
  chosen_spanish: hiere
  alternatives_spanish:
  - aplasta
  - quebranta
  - desmenuza
  lexicon: HALOT
  rationale: Aunque el inglés POB eligió «shatters» para intensificar la imagen, el verbo hebreo מחץ puede expresar golpear o herir con fuerza. En español, «hiere» mantiene la pareja léxica con el primer hemistiquio y evita forzar un término demasiado interpretativo.
- source_word: וְיָדוֹ
  english_pob_choice: but his hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - su mano
  - y su mano
  lexicon: HALOT
  rationale: El escrito hebreo tiene forma singular con sufijo, pero el verbo siguiente es plural femenino, lo que el POB inglés resolvió con un plural idiomático. En español, «sus manos» conserva esa concordancia natural y el sentido colectivo/poético.
- source_word: תִּרְפֶּינָה
  english_pob_choice: heal
  chosen_spanish: sanan
  alternatives_spanish:
  - sanarán
  - curan
  - restauran
  lexicon: HALOT
  rationale: רפא significa sanar/curar. En español, el presente «sanan» funciona bien en poesía y refleja el plural verbal del hebreo sin añadir tiempo futuro no exigido por el texto.
theological_decisions:
- issue: Atribución directa a Dios tanto del dolor como de la sanidad
  english_pob_reading: The verse is rendered to preserve the text's direct attribution of both pain and healing to God.
  chosen_spanish_reading: El verso mantiene la atribución directa a Dios de causar dolor y de sanar.
  alternative_spanish_readings:
  - Dios permite el dolor, pero sana
  - Él disciplina, pero luego cura
  rationale: El hebreo presenta a Dios como sujeto de ambas acciones. La redacción española no suaviza esa tensión teológica ni la reinterpreta como mera permisión.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y la revisión más reciente, que no introdujo cambios; la única tensión relevante es la oscilación hebrea entre singular («su mano») y plural verbal, resuelta aquí de modo idiomático en español.
  spanish_consistency_notes:
  - Se usa «Dios» implícito por el sujeto pronominal del hebreo, sin introducirlo explícitamente para no añadir material no presente en el verso.
  - Se conserva el paralelismo antitético con «pero» en ambos hemistiquios.
  - La elección «sanan» mantiene la concordancia con «sus manos» y evita una forma singular que ocultaría la señal morfológica del hebreo.
