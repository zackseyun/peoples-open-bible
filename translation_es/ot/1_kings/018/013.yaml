base_translation:
  language: en
  yaml_path: translation/ot/1_kings/018/013.yaml
  text: Has it not been told to my lord what I did when Jezebel was killing the prophets of Yahweh—how I hid a hundred of the prophets of Yahweh[a], fifty men in each cave, and provided them with bread and water?
  footnotes:
