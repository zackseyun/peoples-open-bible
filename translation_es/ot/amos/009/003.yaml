base_translation:
  language: en
  yaml_path: translation/ot/amos/009/003.yaml
  text: And if they hide themselves on the summit of Carmel[a], from there I will search them out and take them; and if they conceal themselves from before my eyes on the floor of the sea, from there I will command the serpent[b], and it will bite them.
  footnotes:
  - marker: a
    text: Or 'at the bottom of the sea' for 'on the floor of the sea.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the snake.' The Hebrew noun can denote either 'snake' or 'serpent.'
    reason: lexical_alternative
