translation:
  language: es
  text: Llena a Sión con tu esplendor, y llena tu templo con tu gloria.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio griego de este versículo dice algo muy distinto: «Allí juega y realiza tus pensamientos, y no peques con palabra soberbia», lo que indica una divergencia textual considerable respecto de la forma hebrea conservada.'
    reason: textual_variant
lexical_decisions:
- source_word: מלא
  english_pob_choice: Fill
  chosen_spanish: Llena
  alternatives_spanish:
  - Llena de
  - Colma
  lexicon: HALOT
  rationale: El imperativo pide que Sión y el templo sean llenados; «llena» es la equivalencia natural y directa en español, sin añadir contenido no presente en el hebreo.
- source_word: ציון
  english_pob_choice: Zion
  chosen_spanish: Sión
  alternatives_spanish:
  - Jerusalén
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; «Sión» conserva la referencia bíblica específica que el hebreo usa, en lugar de interpretarla como «Jerusalén».
- source_word: הודך
  english_pob_choice: your splendor
  chosen_spanish: tu esplendor
  alternatives_spanish:
  - tu majestad
  - tu hermosura
  - tu gloria
  lexicon: HALOT
  rationale: הוד expresa resplandor, majestad o esplendor. «Esplendor» mantiene el matiz poético distinguible de כבוד y evita repetir «gloria» en ambos miembros.
- source_word: מכבודך
  english_pob_choice: and your temple with your glory
  chosen_spanish: tu templo con tu gloria
  alternatives_spanish:
  - y con tu gloria tu templo
  - y tu templo de tu gloria
  lexicon: HALOT
  rationale: El hebreo es elíptico; el verbo del primer miembro se sobreentiende. En español, «tu templo con tu gloria» conserva la construcción instrumental/sustantiva sin forzar una paráfrasis.
- source_word: היכלך
  english_pob_choice: your temple
  chosen_spanish: tu templo
  alternatives_spanish:
  - tu palacio
  - tu santuario
  lexicon: HALOT
  rationale: En este contexto de Sión, היכל se refiere al templo/santuario de Dios. «Templo» es la opción más clara y publicable en español.
- source_word: כבודך
  english_pob_choice: your glory
  chosen_spanish: tu gloria
  alternatives_spanish:
  - tu honor
  - tu majestad
  lexicon: HALOT
  rationale: כבוד se traduce de manera estándar como «gloria» aquí, manteniendo la terminología bíblica común y la paralelidad poética.
theological_decisions:
- issue: Divergencia textual entre el hebreo conservado y el testimonio griego
  english_pob_reading: The Greek witness at this verse reads very differently ('There play, and carry out your thoughts, and do not sin with a proud word'), indicating a substantial textual divergence from the extant Hebrew form.
  chosen_spanish_reading: 'La traducción principal sigue el hebreo preservado: una petición para llenar Sión y el templo con esplendor y gloria.'
  alternative_spanish_readings:
  - 'Seguir el griego: ''Allí juega y realiza tus pensamientos, y no peques con palabra soberbia'''
  - Presentar ambas formas en el texto principal
  rationale: El proyecto traduce desde el testigo hebreo disponible para Sirácida, consultando el griego como control. Aquí la divergencia es sustancial, de modo que el griego se registra como variante, no como texto base.
  doctrine_reference: PHILOSOPHY.md § What we are translating
- issue: Distinción poética entre הוד y כבוד
  english_pob_reading: Render הוד as 'splendor' and כבוד as 'glory'
  chosen_spanish_reading: Render הוד as «esplendor» and כבוד as «gloria»
  alternative_spanish_readings:
  - Traducir ambos como «gloria»
  - Traducir הוד como «majestad» y כבוד como «gloria»
  rationale: El hebreo usa dos términos cercanos pero no idénticos. Mantener la distinción en español conserva la textura poética del verso sin añadir una diferencia doctrinal que el texto no exige.
  doctrine_reference: DOCTRINE.md § Translation philosophy 5
translation_notes:
  revision_awareness: Se mantuvo la línea principal basada en el hebreo conservado, en coherencia con el audit trail inglés y sin adoptar la lectura griega divergente como texto base. No hubo cambios frente a la última pasada revisada.
  spanish_consistency_notes:
  - Se usó «Sión» como nombre propio bíblico, no «Jerusalén», para respetar el término hebreo.
  - Se conservó la distinción entre «esplendor» y «gloria» para reflejar la diferencia entre הוד y כבוד.
  - La nota al pie marca explícitamente la divergencia textual griega, como en el audit trail inglés.
