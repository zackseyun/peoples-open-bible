translation:
  language: es
  text: Pero, después de muy poco tiempo[a], Lisias, guardián[b] del rey, pariente y encargado de los asuntos[c], tomando muy a mal lo ocurrido,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de un poco de tiempo»; la expresión griega intensifica la brevedad del intervalo.
    reason: lexical_alternative
  - marker: b
    text: O «regente» para «guardián»; ἐπίτροπος puede designar a alguien encargado de la supervisión real.
    reason: lexical_alternative
  - marker: c
    text: O «ministro principal» para «encargado de los asuntos»; la frase griega dice literalmente «sobre los asuntos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετʼ ὀλίγον δὲ παντελῶς χρονίσκον
  english_pob_choice: after a very short time
  chosen_spanish: después de un tiempo muy breve
  alternatives_spanish:
  - después de un poco de tiempo
  - al cabo de muy poco tiempo
  - después de un brevísimo lapso
  lexicon: LSJ
  rationale: La combinación griega intensifica la brevedad del intervalo. «Un tiempo muy breve» conserva esa intensidad de manera natural en español sin sonar mecánico.
- source_word: παντελῶς
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - del todo
  - completamente
  - sumamente
  lexicon: LSJ
  rationale: Aquí λειτουργa como intensificador de χρονίσκον; «muy» reproduce bien la fuerza adverbial sin cargar el español con un matiz impropio de totalidad.
- source_word: χρονίσκον
  english_pob_choice: short time
  chosen_spanish: tiempo breve
  alternatives_spanish:
  - poco tiempo
  - breve intervalo
  - lapso breve
  lexicon: LSJ
  rationale: El diminutivo apunta a una duración pequeña. «Tiempo breve» es claro y fiel al sentido temporal.
- source_word: ἐπίτροπος
  english_pob_choice: guardian
  chosen_spanish: guardián
  alternatives_spanish:
  - regente
  - administrador
  - encargado
  lexicon: LSJ
  rationale: En relación con el rey, el término indica a alguien puesto a cargo de su tutela o supervisión. «Guardián» mantiene esa función de custodia sin forzar un título político más técnico que el griego no exige aquí.
- source_word: συγγενὴς
  english_pob_choice: kinsman
  chosen_spanish: pariente
  alternatives_spanish:
  - familiar
  - consanguíneo
  - de la familia
  lexicon: LSJ
  rationale: El griego denota relación de parentesco. «Pariente» es la opción más directa y natural en español.
- source_word: ἐπὶ τῶν πραγμάτων
  english_pob_choice: the one over affairs
  chosen_spanish: encargado de los asuntos
  alternatives_spanish:
  - administrador de los asuntos
  - jefe de los asuntos
  - ministro principal
  lexicon: LSJ
  rationale: La frase es literalmente «sobre los asuntos/matters» y parece señalar una función administrativa. «Encargado de los asuntos» preserva la idea de responsabilidad sin imponer un cargo más preciso que el texto no explicita.
- source_word: λίαν βαρέως φέρων
  english_pob_choice: taking ... very hard
  chosen_spanish: al ver con mucha amargura
  alternatives_spanish:
  - tomándolo muy a mal
  - sintiéndolo muy gravemente
  - afligido en gran manera
  lexicon: LSJ
  rationale: El modismo φέρειν βαρέως expresa sufrir o resentir intensamente algo. «Con mucha amargura» comunica la carga emocional de manera idiomática en español; se entiende como reacción afectiva a lo sucedido.
- source_word: ἐπὶ τοῖς γεγονόσι
  english_pob_choice: the events
  chosen_spanish: lo ocurrido
  alternatives_spanish:
  - los hechos
  - lo que había sucedido
  - los acontecimientos
  lexicon: LSJ
  rationale: El participio perfecto remite a lo ya sucedido. «Lo ocurrido» es natural, inclusivo y mantiene la referencia a los acontecimientos recientes.
translation_notes:
  revision_awareness: El texto griego disponible presenta una sintaxis suspendida al final de la cláusula; la traducción española conserva esa apertura sin completar el pensamiento, porque el verso continúa en el contexto inmediato. El audit trail inglés no requirió cambios sustantivos y sólo ofrece alternativas léxicas que se reflejan en las notas.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evitó «SEÑOR» como máscara y también «Cristo», pues no hay terminología cristológica en este pasaje.
  - «Guardián» y «encargado de los asuntos» buscan mantener la tensión entre cargo formal y descripción funcional, conforme al griego y al audit trail.
  - «Lo ocurrido» preserva la referencia a hechos pasados sin añadir interpretación.
