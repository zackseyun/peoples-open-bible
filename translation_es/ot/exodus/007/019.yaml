    issue: Las notas al pie están ancladas en lugares incorrectos del texto.
    rationale: La nota [a] aparece tras «Moisés», pero su contenido explica «y en la madera y en la piedra». La nota [b] está tras «Egipto», aunque también comenta la cláusula final sobre vasos. Esto incumple la disciplina requerida de anclar cada nota exactamente en la palabra o frase relevante.
