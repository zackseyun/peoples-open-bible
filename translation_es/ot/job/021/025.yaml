translation:
  language: es
  text: mientras otro muere con amargura en el alma y no ha disfrutado de lo bueno[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y no ha comido de lo bueno»; el hebreo conserva la imagen de comer para expresar la experiencia de disfrutar lo bueno o el bienestar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/זֶה
  english_pob_choice: while another
  chosen_spanish: mientras otro
  alternatives_spanish:
  - y éste
  - pero éste
  - y este hombre
  lexicon: HALOT
  rationale: El hebreo introduce un contraste comparativo entre dos casos; en español, «mientras otro» conserva esa oposición de manera natural y evita una repetición demasiado literal de «y éste».
- source_word: יָמוּת
  english_pob_choice: dies
  chosen_spanish: muere
  alternatives_spanish:
  - morirá
  - está muriendo
  lexicon: HALOT
  rationale: En el paralelismo poético, el imperfecto funciona como descripción general. «Muere» refleja bien ese valor gnómico en español.
- source_word: בְּ/נֶפֶשׁ מָרָה
  english_pob_choice: with a bitter soul
  chosen_spanish: con alma amarga
  alternatives_spanish:
  - en amargura de alma
  - con espíritu amargo
  - en alma amarga
  lexicon: HALOT
  rationale: Se conserva נֶפֶשׁ con «alma», como en la decisión inglesa de mantener la imagen interior. «Amarga» reproduce la cualidad afectiva sin neutralizarla en una abstracción como «triste» o «afligida».
- source_word: וְ/לֹא אָכַל
  english_pob_choice: and has not enjoyed
  chosen_spanish: y no ha disfrutado
  alternatives_spanish:
  - y no ha comido
  - y no ha gustado
  - y no ha participado de
  lexicon: HALOT
  rationale: El verbo hebreo conserva la metáfora de comer, pero el contexto pide el sentido idiomático de participar de algo bueno. «Ha disfrutado» recoge ese valor sin perder claridad en español.
- source_word: בַּ/טּוֹבָה
  english_pob_choice: good
  chosen_spanish: del bien
  alternatives_spanish:
  - de lo bueno
  - de la bondad
  - de bienes
  lexicon: HALOT
  rationale: '«הַטּוֹבָה» es amplio: bien, bienestar, prosperidad, lo bueno. «Del bien» mantiene la apertura semántica del hebreo mejor que «prosperidad», que sería más restrictivo.'
translation_notes:
  revision_awareness: El texto español sigue de cerca la lectura revisada del inglés POB («has not enjoyed good»), evitando el giro más literal «ha comido del bien» como texto principal, pero preservándolo en nota por su valor imagético en el hebreo.
  spanish_consistency_notes:
  - Se mantiene «alma» para נֶפֶשׁ, en coherencia con la decisión lexical inglesa de no reducir el término a «vida».
  - Se conserva el contraste poético del verso con una estructura breve y directa, apta para lectura pública.
  - «Del bien» intenta sostener la amplitud semántica de טוֹבָה sin imponer una sola interpretación (prosperidad, bienestar o lo bueno).
