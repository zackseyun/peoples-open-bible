id: TOB.12.19
reference: Tobit 12:19
source:
  edition: lxx-swete-1909
  text: πάσας τὰς ἡμέρας ὠπτανόμην ὑμῖν, καὶ οὐκ ἔφαγον οὐδὲ ἔπιον, ἀλλὰ ὅρασιν ὑμεῖς ἐθεωρεῖτε.
  language: Greek
  pages:
  - 859
  confidence: high
  validation: agree
translation:
  text: All the days I was appearing to you[a], but I neither ate nor drank; rather, you were seeing a vision.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I appeared to you ... but what you were observing was a vision.' The Greek imperfects can be rendered either with ongoing force ('was appearing,' 'were seeing') or more simply in English as past events.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάσας τὰς ἡμέρας
  chosen: All the days
  alternatives:
  - All those days
  - Throughout all the days
  lexicon: LSJ
  rationale: A straightforward temporal expression. 'All the days' keeps the Greek wording closely while remaining natural enough in English.
- source_word: ὠπτανόμην
  chosen: I was appearing
  alternatives:
  - I appeared
  - I was visible
  - I made myself seen
  lexicon: LSJ
  rationale: The verb is related to appearing/being seen, fitting Raphael's explanation that his presence was perceptible but not ordinary embodied participation. The imperfect favors a durative sense, so 'I was appearing' best reflects the ongoing state across the period.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - before you
  lexicon: LSJ
  rationale: Simple dative of indirect relation; 'to you' is the most direct rendering.
- source_word: οὐκ ἔφαγον οὐδὲ ἔπιον
  chosen: I neither ate nor drank
  alternatives:
  - I did not eat or drink
  lexicon: LSJ
  rationale: This preserves the paired negation and the balanced structure of the Greek.
- source_word: ἀλλὰ
  chosen: rather
  alternatives:
  - but
  - instead
  lexicon: LSJ
  rationale: 'The conjunction marks correction or contrast: not literal eating and drinking, but something else from the observers'' perspective. ''Rather'' captures that corrective force well.'
- source_word: ὅρασιν
  chosen: a vision
  alternatives:
  - an appearance
  - a sight
  lexicon: LSJ
  rationale: ὅρασις commonly denotes a vision or visible manifestation. 'A vision' best conveys that what they perceived was not ordinary physical consumption.
- source_word: ὑμεῖς ἐθεωρεῖτε
  chosen: you were seeing
  alternatives:
  - you saw
  - you were observing
  - you were beholding
  lexicon: LSJ
  rationale: The imperfect suggests continued perception rather than a single moment. 'You were seeing' preserves that aspect and matches the explanatory tone of the verse.
