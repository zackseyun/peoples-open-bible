translation:
  language: es
  text: Y ahora[a], ¿qué diremos, Dios nuestro, después de esto? Porque hemos abandonado tus mandamientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿qué habremos de decir?». El imperfecto hebreo también puede expresarse con un matiz más formal o deliberativo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Pero ahora
  - Entonces ahora
  lexicon: HALOT
  rationale: Conserva el enlace discursivo de ו con el adverbio temporal עתה sin imponer una relación adversativa que el hebreo no exige.
- source_word: מַה נֹּאמַר
  english_pob_choice: what shall we say
  chosen_spanish: ¿qué diremos?
  alternatives_spanish:
  - ¿qué debemos decir?
  - ¿qué podemos decir?
  lexicon: HALOT
  rationale: El imperfecto en este contexto de oración y confesión tiene fuerza deliberativa/rhetórica. En español, '¿qué diremos?' mantiene la pregunta abierta y solemne sin añadir modalización extra.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: Dios nuestro
  alternatives_spanish:
  - nuestro Dios
  - oh Dios nuestro
  lexicon: HALOT
  rationale: La forma posesiva funciona como vocativo en la oración. 'Dios nuestro' conserva la dirección implícita a Dios con un orden natural y reverente en español.
- source_word: אַחֲרֵי זֹאת
  english_pob_choice: after this
  chosen_spanish: después de esto
  alternatives_spanish:
  - tras esto
  - después de esta cosa
  lexicon: HALOT
  rationale: Expresión temporal idiomática que remite a la situación de culpa y crisis ya mencionada. 'Después de esto' es claro y fiel sin ampliar el referente.
- source_word: עָזַבְנוּ
  english_pob_choice: have forsaken
  chosen_spanish: hemos abandonado
  alternatives_spanish:
  - hemos desamparado
  - hemos dejado
  lexicon: HALOT
  rationale: En un contexto pactual y moral, עזב implica abandonar lo debido. 'Abandonado' comunica bien la gravedad en español; 'forsaken' en inglés se vuelve aquí 'abandonado' por ser la opción más natural y menos arcaizante.
- source_word: מִצְוֺתֶיךָ
  english_pob_choice: your commandments
  chosen_spanish: tus mandamientos
  alternatives_spanish:
  - tus preceptos
  - tus mandatos
  lexicon: HALOT
  rationale: '''Mandamientos'' reproduce el peso formal y pactual de מצוות mejor que ''mandatos'', y encaja con el registro bíblico sin caer en un calco duro.'
theological_decisions:
- issue: Tono de confesión y culpa
  english_pob_reading: A rhetorical confession of guilt and speechlessness before God
  chosen_spanish_reading: Una confesión retórica de culpa y de incapacidad para responder ante Dios
  alternative_spanish_readings:
  - Una simple pregunta sobre qué decir a continuación
  - Una petición neutral de guía
  rationale: La frase no es una consulta neutral; expresa vergüenza, reconocimiento de culpa y silenciamiento ante Yahvé. La traducción conserva esa tensión penitencial sin explicitar más de lo que dice el hebreo.
  doctrine_reference: Preservar la tensión teológica del texto en lugar de resolverla interpretativamente
translation_notes:
  revision_awareness: 'Se siguió el tramo auditado en inglés: se mantuvo la decisión revisada de traducir el imperfecto como una pregunta deliberativa/formal (''what shall we say''), y se evitó suavizar la fuerza confesional del versículo. También se respetó el valor pactual de ''forsaken'' y ''commandments'' sin pasar a un registro menos solemne.'
  spanish_consistency_notes:
  - Se usó 'Dios' como traducción de אֱלֹהֵינוּ en vocativo, con orden natural para el español.
  - '''Mandamientos'' se mantuvo como término técnico bíblico para מצוות.'
  - El versículo conserva un tono de oración confesional, no meramente narrativo.
  - Se evitó 'SEÑOR' porque el hebreo aquí dice אֱלֹהֵינוּ y no el tetragrámaton.
