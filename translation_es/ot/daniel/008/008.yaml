revisions:
- from: Y el macho cabrío de las cabras creció hasta volverse muy grande; y cuando tuvo fuerza, el gran cuerno fue quebrado, y en su lugar subieron cuatro cuernos notables[a] hacia los cuatro vientos del cielo[b].
  to: Y el macho cabrío creció hasta volverse muy grande; y cuando tuvo fuerza, el gran cuerno fue quebrado, y en su lugar[b] subieron cuatro cuernos notables[a] hacia los cuatro vientos del cielo.
  rationale: Se corrige la naturalidad de צְפִיר הָעִזִּים con ‘macho cabrío’ y se reubica la nota [b] sobre ‘en su lugar’, donde realmente corresponde según תַּחְתֶּיהָ. El resto del verso puede mantenerse porque representa fielmente la sintaxis y la imaginería del hebreo.
