revisions:
- from: Y Judas se desvió hacia Azoto[a], la tierra de extranjeros, y derribó sus altares, y quemó con fuego las imágenes esculpidas de sus dioses, y saqueó el botín de las ciudades[b], y regresó a Judea.
  to: Y Judas se desvió hacia Azoto[a], la tierra de extranjeros, y derribó sus altares, y quemó con fuego las imágenes esculpidas de sus dioses, y saqueó el botín de las ciudades, y regresó a Judea.
  rationale: Se elimina la nota [b] para alinear el español con la auditoría inglesa final, que decidió mantener a Judas como sujeto continuo en el texto principal y no conservar la observación sobre el plural griego como nota activa en esta línea. El resto del versículo puede mantenerse tal como está, pues es fiel al griego y suena natural en español.
