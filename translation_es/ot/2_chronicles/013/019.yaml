revisions:
- from: Abías persiguió a Jeroboam y le capturó Betel y sus ciudades hijas[a], Jeshaná y sus ciudades hijas[b], y Efrón y sus ciudades hijas.
  to: Abías persiguió a Jeroboam y tomó de su poder Betel y sus ciudades hijas[a], Jeshaná y sus ciudades hijas, y Efrón y sus ciudades hijas[b].
  rationale: Se reemplaza «le capturó» por «tomó de su poder» para reflejar mejor el hebreo militar y sonar natural en español con ciudades como objeto. Se conserva «ciudades hijas» en el texto principal para respetar la decisión léxica del POB de mantener la metáfora hebrea, pero se mejora la nota explicativa. También se mueve la nota textual [b] a «Efrón», que es donde corresponde la observación sobre la lectura alternativa «Ofra».
  reviewer_model: gpt-5.4
