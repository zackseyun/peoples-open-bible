translation:
  language: es
  text: El que honra a su padre tendrá muchos días[a], y el que honra a su madre retribuye a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «y el que obedece al Señor dará descanso a su madre». El hebreo y el griego difieren sustancialmente en la segunda línea.'
    reason: alternative_reading
lexical_decisions:
- source_word: מְכַבֵּד
  english_pob_choice: honors
  chosen_spanish: honra
  alternatives_spanish:
  - respeta
  - glorifica
  - estima
  lexicon: HALOT
  rationale: El participio expresa dar el honor debido a los padres; en español, «honra» comunica esa obligación relacional con naturalidad y dignidad, sin perder el valor ético del mandato.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - a su padre
  - a su padre
  lexicon: HALOT
  rationale: El sufijo de 3ms se refleja con «su» para conservar la referencia individualizada del hebreo y mantener el paralelismo con «su madre».
- source_word: יִרְבּוּ יָמָיו
  english_pob_choice: will have long days
  chosen_spanish: tendrá muchos días
  alternatives_spanish:
  - vivirá largos días
  - tendrá largos días
  - sus días serán muchos
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «se multiplicarán sus días / sus días serán muchos». «Tendrá muchos días» conserva esa formulación semítica con más fidelidad que una paráfrasis interpretativa como «vivirá largo tiempo».
- source_word: וּגְמוּל אֱלֹהִים עַל
  english_pob_choice: repays God
  chosen_spanish: repaga a Dios
  alternatives_spanish:
  - retribuye a Dios
  - le paga a Dios
  - da retribución a Dios
  lexicon: HALOT
  rationale: La frase hebrea es condensada y algo áspera; la POB inglesa la toma en sentido de una acción de retribución dirigida a Dios. «Repaga a Dios» reproduce esa fuerza con un español comprensible, manteniendo la tensión semántica sin suavizarla indebidamente.
- source_word: אִמּוֹ
  english_pob_choice: his mother
  chosen_spanish: a su madre
  alternatives_spanish:
  - a su madre
  lexicon: HALOT
  rationale: Se conserva el sufijo posesivo de 3ms para mantener el paralelo con la primera línea y la sintaxis del hebreo.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego en la segunda colon
  english_pob_reading: The Hebrew is primary; the main line says that honoring one’s mother is a repayment directed toward God, while the Greek parallel differs substantially.
  chosen_spanish_reading: 'Seguir el hebreo en el texto principal: honrar a la madre se expresa como repagar a Dios.'
  alternative_spanish_readings:
  - quien obedece al Señor dará descanso a su madre
  - el que escucha al Señor descansará a su madre
  rationale: Como el hebreo está disponible y es de alta confianza, el texto principal debe seguirlo. El paralelo griego se preserva como lectura alternativa importante porque cambia el sujeto y el verbo de la segunda cola y no debe borrarse la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: priorizar el hebreo cuando se conserva; DOCTRINE.md: conservar tensiones textuales significativas en lugar de resolverlas en silencio'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail al evitar una perífrasis innecesaria antes de «repaga a Dios». También conserva la decisión de traducir la segunda cola desde el hebreo como texto principal, sin ocultar la divergencia griega documentada.
  spanish_consistency_notes:
  - Se usa «honra» para el verbo ético de dar debido honor a los padres, en coherencia con el registro bíblico y sin recurrir a «glorifica», que sería demasiado fuerte en español.
  - Se evita «SEÑOR» en el texto principal porque el testimonio base aquí es hebreo con אֱלֹהִים; el nombre divino no aparece explícitamente en el versículo hebreo transmitido.
  - «Repaga a Dios» conserva la aspereza del hebreo y la interpretación auditada de la POB inglesa, sin convertirla en una paráfrasis devocional más suave.
