  text: Fathers, do not provoke your children, so that they may not become discouraged.
translation:
  language: ko
  text: 아버지들이여, 여러분의 자녀들을 격동시키지[a] 마십시오. 그들이 낙심하지 않도록 함입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「자극하다」, 「분개시키다」. 헬라어 ἐρεθίζω는 부정적 의미로 「자극·도발」을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πατέρες
  english_pob_choice: Fathers
  chosen_korean: 아버지들
  alternatives_korean:
  - 부모들
  lexicon: BDAG
  rationale: 헬라어는 명시적 「아버지들」. 성별-정확성 원칙 유지.
- source_word: μὴ ἐρεθίζετε
  english_pob_choice: do not provoke
  chosen_korean: 격동시키지 마십시오
  alternatives_korean:
  - 자극하지 마십시오
  - 분개시키지 마십시오
  lexicon: BDAG
  rationale: ἐρεθίζω의 부정적 「격동·자극」을 살린다.
- source_word: τὰ τέκνα ὑμῶν
  english_pob_choice: your children
  chosen_korean: 여러분의 자녀들
  alternatives_korean:
  - 너희 자녀들
  lexicon: BDAG
  rationale: 표준.
- source_word: ἵνα μὴ ἀθυμῶσιν
  english_pob_choice: so that they may not become discouraged
  chosen_korean: 그들이 낙심하지 않도록 함입니다
  alternatives_korean:
  - 그들이 의기소침해지지 않도록
  - 그들이 마음이 상하지 않도록
  lexicon: BDAG
  rationale: ἀθυμέω의 「용기·마음을 잃음」을 「낙심」으로 옮긴다(한국 교회의 정립된 표현).
