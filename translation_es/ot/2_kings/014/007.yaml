revisions:
- from: Él hirió a Edom en el Valle de la Sal[a], diez mil hombres; capturó Sela en batalla, y llamó su nombre Jokteel, hasta hoy.
  to: Él abatió a diez mil de Edom en el Valle de la Sal[a], capturó Sela en batalla y le puso por nombre Jokteel, hasta el día de hoy.
  rationale: Se reemplaza «hirió» por «abatió» para reflejar mejor la fuerza militar de הִכָּה en contexto de bajas. Se elimina «hombres» y se adopta «diez mil de Edom» para respetar más de cerca el hebreo y la revisión del POB inglés. Se mejora la naturalidad española con «le puso por nombre» en vez de «llamó su nombre», y se ajusta la puntuación y la fórmula final a «hasta el día de hoy».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:46:49Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general bien la secuencia del hebreo: derrotó/golpeó a Edom, en el Valle de la Sal, diez mil, capturó Sela en batalla y le dio un nombre que permanece hasta el presente del narrador. Sin embargo, dos decisiones no preservan bien ni la fuerza ni la forma del original auditado: «hirió» debilita הִכָּה en contexto militar con resultado cuantificado, y «diez mil hombres» añade un sustantivo no expreso cuando el inglés auditado fue revisado precisamente para acercarse a «ten thousand of Edom».'
  spanish_quality_summary: El español es mayormente claro, pero la puntuación con punto y coma tras «diez mil hombres» suena trabada, y «llamó su nombre» resulta demasiado calcado y poco idiomático en español bíblico moderno. «Le puso por nombre» o «llamó ...» conserva el sentido con mejor legibilidad. «Hasta hoy» es aceptable, aunque «hasta el día de hoy» refleja más plenamente la fórmula hebrea.
  glossary_alignment: No hay términos del glosario mayor afectados. El topónimo «Sela» y la nota léxica están bien manejados. La transliteración «Jokteel» es defendible en español. El principal ajuste lexical es preferir una forma como «derribó/abatió» o una construcción equivalente para הִכָּה, y evitar explicitar «hombres» contra la revisión auditada inglesa.
  issues:
  - severity: high
    issue: «hirió» para הִכָּה
    rationale: En este contexto de combate con una cifra de diez mil, «hirió» sugiere herir sin necesariamente abatir o derrotar, y queda más débil que el hebreo y que «struck down» del POB inglés.
  - severity: high
    issue: Adición de «hombres» en «diez mil hombres»
    rationale: El hebreo no expresa «hombres», y el audit trail inglés cambió deliberadamente «Edomites» a «of Edom» para ceñirse más al original. El español debe evitar esa explicitación innecesaria.
  - severity: medium
    issue: «llamó su nombre» es un calco poco natural
    rationale: Aunque intenta reflejar la fórmula hebrea, en español suena rígido e impropio. «Le puso por nombre» preserva la fórmula de nombramiento con mejor naturalidad.
  - severity: low
    issue: Puntuación poco natural en la primera cláusula
    rationale: La coma y el punto y coma alrededor de «diez mil» entorpecen la lectura. Una redacción lineal mejora la fluidez sin perder formalidad.
  revised_spanish_text: Él abatió a diez mil de Edom en el Valle de la Sal[a], capturó Sela en batalla y le puso por nombre Jokteel, hasta el día de hoy.
  revised_footnotes:
  - marker: a
    text: «Sela» también puede entenderse en su sentido léxico como «la peña» o «la roca»; aquí, sin embargo, probablemente funciona como nombre de lugar.
    reason: lexical_alternative
