    text: Or 'among the shepherds.' The Hebrew term likely refers more specifically to sheep breeding than to shepherding in general.
    reason: lexical_alternative
  - marker: b
    text: Or 'against Israel.' The preposition can carry either sense in prophetic contexts; 'concerning' is chosen here as the broader superscriptional wording.
    reason: alternative_reading
