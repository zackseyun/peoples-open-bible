    text: 'Hebreo: «ungir en ellas»; la idea es la unción ritual realizada mientras las vestiduras están puestas, no necesariamente una unción hecha con las vestiduras como instrumento.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «llenar la mano»; modismo sacerdotal de instalación u ordenación. Se vierte aquí con «investirlos» para dar un español natural sin perder el sentido ritual.'
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige el punto principal de fidelidad: בָהֶם / בָם debe reflejarse como «en ellas», no «con ellas», porque las vestiduras funcionan como el marco en que se realiza la unción y la instalación sacerdotal. También se ajusta «sagradas» a «santas» para acercarse mejor al expediente POB sin sacrificar naturalidad. Se conserva «investirlos» como solución española clara para el modismo מלא יד, respaldada por nota.'
