review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido global del hebreo: salida a la guerra, comisión divina, oración a Yahvé, y orientación hacia la ciudad escogida y la casa edificada para su nombre. Sin embargo, la nota [a] no corresponde bien al texto base ni al rastro de auditoría inglés: mezcla indebidamente בַּדֶּרֶךְ אֲשֶׁר תִּשְׁלָחֵם (''por el camino que tú los envíes'') con דֶּרֶךְ הָעִיר (''hacia la ciudad''). Además, en el texto principal ''mirando hacia la ciudad'' introduce un matiz visual no explícito; ''hacia la ciudad'' preserva mejor la orientación sin añadir imagen extra.'
  spanish_quality_summary: 'El español es claro y digno, con buen registro bíblico y terminología adecuada (''Yahvé'', ''casa'', ''para tu nombre''). La sintaxis es natural. La principal mejora necesaria es afinar la frase direccional y corregir la nota [a] para que explique la alternativa real del segmento correspondiente. También conviene alinear mejor la nota con el inglés POB: la alternativa es ''de cara a la ciudad'' o similar, no una glosa sobre ''el camino hacia el que tú los envíes''.'
  glossary_alignment: 'Buena alineación con los términos del proyecto: יהוה → ''Yahvé'' correctamente; הַבַּיִת → ''la casa'' correctamente, con nota aclaratoria sobre ''templo''. No hay conflicto doctrinal. La decisión sobre דֶּרֶךְ הָעִיר debe mantenerse como orientación (''hacia la ciudad'') sin sobreinterpretar.'
  issues:
