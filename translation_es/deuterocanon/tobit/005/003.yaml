translation:
  language: es
  text: 'Y le dio la nota escrita[a] y le dijo: «Busca para ti un hombre que vaya contigo, y le daré salario mientras yo viva; luego ve a recibir la plata[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego χειρόγραφον se refiere a un documento escrito a mano. Aquí alude a la nota o comprobante relacionado con el depósito, más que a una carta genérica.
    reason: source_note
  - marker: b
    text: O «el dinero». El griego ἀργύριον literalmente significa «plata», pero aquí se refiere a los fondos depositados.
    reason: lexical_alternative
lexical_decisions:
- source_word: χειρόγραφον
  english_pob_choice: written note
  chosen_spanish: escrito
  alternatives_spanish:
  - documento escrito
  - nota escrita
  - recibo
  lexicon: LSJ
  rationale: El griego designa algo escrito a mano o un documento escrito. En este contexto, por el paralelismo semítico y el acto de entregar el comprobante asociado al depósito, 'escrito' conserva la concreción sin fijar indebidamente la forma jurídica.
- source_word: Ζήτησον σεαυτῷ ἄνθρωπον
  english_pob_choice: Find for yourself a man
  chosen_spanish: Busca para ti un hombre
  alternatives_spanish:
  - Encuentra para ti un hombre
  - Busca a alguien para ti
  - Consíguete un hombre
  lexicon: LSJ
  rationale: Se mantiene ἄνθρωπον como 'un hombre' porque el griego es explícitamente masculino singular. 'Busca para ti' refleja el imperativo y suena natural en español sin perder el sentido de procurarse un acompañante.
- source_word: συμπορεύσεταί σοι
  english_pob_choice: will go with you
  chosen_spanish: vaya contigo
  alternatives_spanish:
  - te acompañe
  - viaje contigo
  - camine contigo
  lexicon: LSJ
  rationale: El verbo compuesto expresa ir/juntar el camino con otro. 'Vaya contigo' conserva el movimiento y funciona bien dentro de la subordinada de finalidad.
- source_word: μισθὸν
  english_pob_choice: wages
  chosen_spanish: salario
  alternatives_spanish:
  - paga
  - jornal
  - retribución
  lexicon: LSJ
  rationale: En este contexto de contratación de un acompañante de viaje, μισθός es compensación por servicio. 'Salario' comunica esa idea de pago pactado con claridad en español moderno.
- source_word: ἕως ζῶ
  english_pob_choice: while I live
  chosen_spanish: mientras yo viva
  alternatives_spanish:
  - mientras viva
  - durante mi vida
  - en tanto viva
  lexicon: LSJ
  rationale: La forma idiomática expresa duración hasta el final de la vida del hablante. 'Mientras yo viva' sigue de cerca la sintaxis y suena natural en español.
- source_word: τὸ ἀργύριον
  english_pob_choice: the silver / the money
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  - la plata depositada
  - el dinero depositado
  lexicon: LSJ
  rationale: ἀργύριον literalmente es 'plata', pero en el contexto refiere a fondos depositados. 'La plata' permite conservar la literalidad semántica y, a la vez, ser comprensible para lectores actuales.
translation_notes:
  revision_awareness: Se siguió el tramo revisado del inglés auditado, especialmente la preferencia por la lectura temporal de ἕως ζῶ (“while I live”), y se mantuvo el equivalente concreto para ἀργύριον como “la plata”.
  spanish_consistency_notes:
  - Se preservó la distinción entre un documento escrito y el dinero/fondos depositados.
  - Se mantuvo el masculino singular explícito de ἄνθρωπον.
  - Se eligió una formulación natural para el mandato y la promesa de pago sin borrar la concreción del griego.
