  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: adquirir לֵב como facultad de discernimiento, amar la propia vida, guardar תבונה y hallar el bien. Sin embargo, la elección principal «adquiere corazón» en el texto corre demasiado literal para el español y no sigue la decisión semántica auditada del POB, que entendió לֵּב aquí como «sentido/sensatez» más que el órgano/metáfora emocional. La nota puede preservar el literal hebreo.'
  spanish_quality_summary: El español es claro, pero «adquiere corazón» suena poco idiomático y sugiere valor afectivo o valentía, no discernimiento sapiencial. «Hallará el bien» y «ama su propia vida» funcionan bien. Para legibilidad y fidelidad conceptual, conviene una formulación principal como «adquiere sensatez» o «adquiere entendimiento», dejando «corazón» en nota.
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. La cuestión principal es léxica: לֵּב en literatura sapiencial debe expresarse en español de modo cognitivo en el texto principal cuando el literal «corazón» enturbia el sentido. «Entendimiento» para תְּבוּנָה y «vida» para נֶפֶשׁ están bien alineados.'
  issues:
  - severity: medium
    issue: «adquiere corazón» en el texto principal
    rationale: Aunque es literal, en español moderno no comunica naturalmente la idea sapiencial de discernimiento/juicio. Puede leerse como metáfora afectiva o de ánimo, alejándose del sentido fuente y de la decisión auditada del POB.
  - severity: low
