translation:
  language: es
  text: El que anda en integridad teme a Yahvé, pero aquel cuyos caminos son torcidos[a] lo desprecia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''el que es torcido en sus caminos''; el hebreo describe a una persona desviada o torcida en su conducta.'
    reason: lexical_alternative
  - marker: b
    text: El sufijo pronominal en 'lo desprecia' se entiende más naturalmente como referido a Yahvé; alternativamente, algunos lo toman de manera más general.
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹלֵךְ
  english_pob_choice: walks
  chosen_spanish: anda
  alternatives_spanish:
  - camina
  - vive
  lexicon: HALOT
  rationale: En Proverbios, הלך expresa el modo de vivir o conducirse. 'Anda' conserva la imagen de movimiento/conducta sin sonar tan mecánico como 'camina' en español, y comunica bien la idea sapiencial de conducta habitual.
- source_word: בְּיָשְׁרוֹ
  english_pob_choice: in his uprightness
  chosen_spanish: en integridad
  alternatives_spanish:
  - en su integridad
  - con integridad
  - en rectitud
  lexicon: HALOT
  rationale: יׁשר/יֹשֶׁר comunica rectitud moral y conductual. 'En integridad' es natural en español bíblico contemporáneo y evita añadir un posesivo que el texto hebreo no exige en la forma revisada del audito inglés.
- source_word: יְרֵא יְהוָה
  english_pob_choice: fears Yahweh
  chosen_spanish: teme a Yahvé
  alternatives_spanish:
  - reverencia a Yahvé
  - teme al Señor
  lexicon: HALOT
  rationale: El hebreo usa el verbo ירא con YHWH como fórmula sapiencial estable. 'Teme a Yahvé' preserva el peso teológico y la fórmula tradicional de 'temor de Yahvé' sin suavizarla a 'reverencia'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del texto hebreo según la política POB, en forma reconocible y no sustitutiva.
- source_word: וּנְל֖וֹז
  english_pob_choice: the one whose ways are crooked
  chosen_spanish: el que es torcido
  alternatives_spanish:
  - el de caminos torcidos
  - el que es depravado
  - el que es de conducta torcida
  lexicon: HALOT
  rationale: נלוז denota algo torcido, desviado o perverso. En español, 'el que es torcido' mantiene la cualidad moral y evita convertirlo en una mera descripción de carácter sin fuerza ética.
- source_word: דְּרָכָ֣יו
  english_pob_choice: whose ways
  chosen_spanish: en sus caminos
  alternatives_spanish:
  - en sus senderos
  - de sus caminos
  lexicon: HALOT
  rationale: '''Caminos'' es la manera española estándar de representar דֶּרֶךְ en contextos sapienciales, refiriéndose a la pauta de conducta. La preposición ''en'' conserva la construcción adjetival del hebreo y produce una frase fluida en español.'
- source_word: בּוֹזֵֽהוּ
  english_pob_choice: despises him
  chosen_spanish: lo desprecia
  alternatives_spanish:
  - lo menosprecia
  - lo desdeña
  - desprecia a Yahvé
  lexicon: HALOT
  rationale: בזה significa despreciar, tener en poco o tratar con desdén. 'Lo desprecia' refleja la contundencia del verbo. El pronombre queda deliberadamente no explicitado en el texto para mantener la ambigüedad contextual del hebreo, aunque el antecedente más natural es Yahvé.
theological_decisions:
- issue: Referente del sufijo pronominal en בּוֹזֵהוּ
  english_pob_reading: 'The suffix refers to the LORD: ''despises him.'''
  chosen_spanish_reading: '''lo desprecia'' deja el referente implícito, con lectura principal a Yahvé.'
  alternative_spanish_readings:
  - lo desprecia a él
  - desprecia a Yahvé
  - desprecia al Señor
  rationale: La estructura antitética sugiere que el contraste opone temer a Yahvé con despreciarlo; sin embargo, el hebreo permite cierta apertura referencial. En español, dejar el pronombre sin antecedente explícito preserva la tensión documentada y evita fijar de modo excesivo una referencia que el texto no marca de forma inequívoca.
  doctrine_reference: Preservar la tensión textual cuando el pronombre admite más de una lectura; elegir la lectura más contextual sin borrar alternativas.
- issue: Valor semántico de 'temer' en ירא con YHWH
  english_pob_reading: fears Yahweh
  chosen_spanish_reading: teme a Yahvé
  alternative_spanish_readings:
  - reverencia a Yahvé
  - respeta a Yahvé
  rationale: El proverbio usa la fórmula sapiencial clásica del temor de Yahvé, que en español bíblico debe conservar su fuerza religiosa y ética. 'Teme' comunica mejor la gravedad reverente del texto que una paráfrasis más suave.
  doctrine_reference: Conservar el lenguaje tradicional cuando forma parte de una fórmula teológica estable y significativa.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail al no añadir posesivo innecesario en la primera cola; además, se mantuvo la preferencia por 'Yahvé' para יהוה y se preservó la ambigüedad controlada del sufijo final, conforme al debate textual documentado en el inglés POB.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יהוה, conforme a la política terminológica del proyecto.
  - Se usó 'caminos' para דְּרָכָיו en el sentido sapiencial de conducta habitual.
  - Se eligió 'teme' como equivalente de ירא con sentido de temor reverente, no meramente emocional.
  - Se evitó introducir 'su' antes de 'integridad', en línea con la revisión del audit trail.
  - Se conservó un registro claro y sobrio, apto para publicación e interoperable con el estilo POB.
