translation:
  language: es
  text: Porque el oro con que son adornados para hermosura, si alguien no le quita el empañamiento[a], de ningún modo brillará; pues ni aun cuando eran fundidos se daban cuenta de ello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «corrosión»; ἰόν puede referirse a la capa que empaña o corroe el metal.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιτίθενται
  english_pob_choice: are adorned
  chosen_spanish: se adornan
  alternatives_spanish:
  - se visten
  - se engalanan
  - son adornados
  lexicon: LSJ
  rationale: El verbo medio/pasivo expresa que las imágenes quedan provistas de adorno de oro. «Se adornan» comunica bien el estado resultante en español sin sugerir una acción autosuficiente extraña al contexto.
- source_word: εἰς κάλλος
  english_pob_choice: for beauty
  chosen_spanish: para hermosura
  alternatives_spanish:
  - para belleza
  - para esplendor
  - como adorno
  lexicon: LSJ
  rationale: La frase indica finalidad o resultado ornamental. «Para hermosura» conserva el valor estético y suena natural y digno en español bíblico contemporáneo.
- source_word: ἐκμάξῃ
  english_pob_choice: wipes off
  chosen_spanish: quita
  alternatives_spanish:
  - borra
  - limpia
  - arrastra
  lexicon: LSJ
  rationale: En el contexto metalúrgico, la imagen es la de retirar la capa superficial. «Quita» es breve y claro; el complemento «el tizne» mantiene la concreción del acto de limpiar.
- source_word: ἰόν
  english_pob_choice: tarnish
  chosen_spanish: tizne
  alternatives_spanish:
  - suciedad
  - corrosión
  - oxidación
  lexicon: LSJ
  rationale: El griego ἰός puede significar herrumbre/corrosión o suciedad que empaña el metal. Dado que el inglés POB optó por «tarnish» para oro, «tizne» preserva la idea de capa opaca o suciedad adherida sin forzar una imagen de óxido literal sobre el oro.
- source_word: οὐ μὴ στίλψωσιν
  english_pob_choice: it will certainly not shine
  chosen_spanish: de ningún modo brillará
  alternatives_spanish:
  - no brillará en absoluto
  - ciertamente no resplandecerá
  - de ninguna manera relucirá
  lexicon: LSJ
  rationale: La negación enfática οὐ μή pide una negación fuerte. «De ningún modo brillará» reproduce bien la fuerza absoluta y mantiene el foco en el oro adornado como objeto que no llega a resplandecer.
- source_word: ἐχωνεύοντο
  english_pob_choice: were being cast
  chosen_spanish: eran fundidos
  alternatives_spanish:
  - se estaban fundiendo
  - eran vaciados
  - se estaban moldeando
  lexicon: LSJ
  rationale: El verbo se refiere al proceso de trabajo del metal por fusión/casting. «Eran fundidos» es fiel y natural en español; conserva el sentido de fabricación de ídolos de metal sin añadir detalles técnicos no explícitos.
- source_word: ᾐσθάνοντο
  english_pob_choice: did they perceive it
  chosen_spanish: se daban cuenta de ello
  alternatives_spanish:
  - lo percibían
  - eran conscientes de ello
  - lo notaban
  lexicon: LSJ
  rationale: El verbo expresa percibir/ser consciente. «Se daban cuenta de ello» transmite la falta total de percepción sin sonar forzado; además mantiene el paralelismo con el argumento polémico contra los ídolos inertes.
theological_decisions:
- issue: El sujeto de la última cláusula y el alcance de la negación de conciencia
  english_pob_reading: The clause is rendered to emphasize the idols' total lack of perception even in the process of their own casting.
  chosen_spanish_reading: La traducción deja a las imágenes como referentes implícitos del proceso y subraya que no tenían conciencia ni siquiera cuando eran fundidas.
  alternative_spanish_readings:
  - ni aun cuando eran fundidos no lo percibían
  - ni siquiera durante su fundición se daban cuenta
  - no tenían conciencia ni aun al ser fundidas
  rationale: 'El griego sostiene la ironía antiidolátrica: objetos inertes no perciben nada ni en su propia fabricación. En español conviene mantener esa fuerza polémica sin explicar de más el pronombre final, preservando la tensión del original.'
  doctrine_reference: Preservar el argumento antiidolátrico del texto; primacía del sentido del original sobre la tradición devocional.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «rust» por «tarnish» para ἰόν, especialmente apto para oro. La traducción española siguió esa revisión y evitó «herrumbre» por su asociación más estrecha con el hierro, optando por «tizne» como equivalente más natural de una capa que opaca el brillo del metal.
  spanish_consistency_notes:
  - Se mantuvo «brillará» para reflejar στίλψωσιν con registro claro y bíblico.
  - «Eran fundidos» conserva el proceso metalúrgico de ἐχωνεύοντο sin convertirlo en un detalle interpretativo adicional.
  - El texto usa «Yahvé» como norma del proyecto cuando aparece el nombre divino; este versículo no lo contiene.
  - No se empleó «Cristo/Mesías» porque no aparece terminología mesiánica en este pasaje.
