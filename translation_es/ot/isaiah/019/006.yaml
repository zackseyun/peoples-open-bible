translation:
  language: es
  text: Los ríos[a] apestarán; los canales de Egipto[b] menguarán y se secarán; la caña y el junco[c] se marchitarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se volverán fétidos». El verbo hebreo es raro, y la idea es que las aguas se corrompen o despiden un mal olor.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «los canales de Matzor»; aquí «Matzor» se entiende mejor como un nombre poético de Egipto.
    reason: lexical_alternative
  - marker: c
    text: O «papiro» para «junco»; el término hebreo alude a vegetación de marisma asociada con las riberas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶאֶזְנִיחוּ
  english_pob_choice: will stink
  chosen_spanish: apestarán
  alternatives_spanish:
  - olirán mal
  - se volverán fétidos
  - despedirán hedor
  lexicon: HALOT
  rationale: El hebreo raro sugiere que las aguas se vuelven putrefactas o desprenden mal olor. «Apestarán» comunica con naturalidad ese efecto olfativo sin perder la fuerza degradante del juicio.
- source_word: נְהָר֔וֹת
  english_pob_choice: the rivers
  chosen_spanish: los ríos
  alternatives_spanish:
  - los arroyos
  - los cauces
  lexicon: HALOT
  rationale: Es la equivalencia directa y clara para el plural del sustantivo, manteniendo el paralelismo con «canales» en la línea siguiente.
- source_word: דָּלֲל֥וּ
  english_pob_choice: will dwindle
  chosen_spanish: menguarán
  alternatives_spanish:
  - bajarán
  - se reducirán
  - disminuirán
  lexicon: HALOT
  rationale: El verbo expresa hacerse más bajos, débiles o escasos; «menguarán» conserva esa idea de reducción del caudal con buen español literario.
- source_word: וְחָרְב֖וּ
  english_pob_choice: dry up
  chosen_spanish: se secarán
  alternatives_spanish:
  - se agostarán
  - se volverán secos
  lexicon: HALOT
  rationale: Con aguas como sujeto, «se secarán» es la forma más natural y fiel para indicar que los canales pierden completamente el agua.
- source_word: יְאֹרֵ֣י
  english_pob_choice: the canals
  chosen_spanish: los canales
  alternatives_spanish:
  - los cauces
  - los conductos
  lexicon: HALOT
  rationale: En contexto egipcio, el término alude a canales o brazos del Nilo; «canales» transmite ese matiz sin sobreinterpretar.
- source_word: מָצ֑וֹר
  english_pob_choice: of Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - de Matzor
  - de Matzór
  lexicon: HALOT
  rationale: 'Sigo la lectura contextual documentada en el POB inglés: aquí es un nombre poético de Egipto. En español, «de Egipto» hace explícita la referencia geográfica sin perder el trasfondo textual.'
- source_word: קָנֶ֥ה
  english_pob_choice: reed
  chosen_spanish: caña
  alternatives_spanish:
  - junco
  - cañaveral
  lexicon: HALOT
  rationale: El término designa vegetación de ribera; «caña» es natural en español y mantiene la imagen vegetal de borde de agua.
- source_word: וָס֖וּף
  english_pob_choice: rush
  chosen_spanish: junco
  alternatives_spanish:
  - papiro
  - totora
  - caña
  lexicon: HALOT
  rationale: «Junco» distingue bien esta planta de la caña anterior y conserva el paralelismo botánico. «Papiro» sería más interpretativo y menos general.
- source_word: קָמֵֽלוּ
  english_pob_choice: will wither
  chosen_spanish: se marchitarán
  alternatives_spanish:
  - se secarán
  - se desvanecerán
  lexicon: HALOT
  rationale: Para plantas, «se marchitarán» expresa la pérdida de vigor y la sequedad progresiva, evitando repetir demasiado «se secarán».
theological_decisions:
- issue: Lectura de מָצוֹר como nombre poético de Egipto
  english_pob_reading: of Egypt
  chosen_spanish_reading: de Egipto
  alternative_spanish_readings:
  - de Matzor
  - de Matzór
  rationale: 'No hay cambio doctrinal, pero sí una decisión histórica/geográfica importante: el POB inglés entiende מָצוֹר como designación poética de Egipto. En español sigo esa lectura para que el sentido sea inmediato al lector.'
  doctrine_reference: Isaiah 19:6 context; lexical/poetic geography rather than doctrine
translation_notes:
  revision_awareness: 'El texto base y la revisión reciente coinciden en que no hacía falta un cambio mayor. Mantengo la solución de sentido del POB inglés: olor fétido para las aguas, «canales de Egipto» para מָצוֹר y dos términos vegetales diferenciados para la segunda cola poética.'
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece.
  - Mantuve «Egipto» como explicitación contextual de מָצוֹר, coherente con la nota inglesa.
  - Conservé la distinción léxica entre «caña» y «junco» para reflejar el paralelismo del hebreo.
  - Elegí verbos distintos para agua («apestarán», «menguarán», «se secarán») y plantas («se marchitarán») para preservar el contraste poético.
