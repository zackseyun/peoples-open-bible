translation:
  language: es
  text: Y cuando los hombres oyeron sus palabras y observaron su rostro, ella les pareció extraordinariamente hermosa.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὡς δὲ ἤκουσαν
  english_pob_choice: And when they heard
  chosen_spanish: Y cuando oyeron
  alternatives_spanish:
  - Y al oír
  - Y cuando escucharon
  lexicon: BDAG
  rationale: La cláusula temporal con ὡς y aoristo se rinde naturalmente con «y cuando». «Oyeron» mantiene la relación directa con las palabras dichas, sin añadir matiz interpretativo.
- source_word: οἱ ἄνδρες
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - los soldados
  lexicon: BDAG
  rationale: ἄνδρες es un plural masculino común. «Los hombres» es la correspondencia más directa y evita especificar «soldados», algo que el griego de este versículo no dice.
- source_word: τὰ ῥήματα αὐτῆς
  english_pob_choice: her words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - lo que ella dijo
  - sus dichos
  lexicon: BDAG
  rationale: ῥήματα designa palabras habladas o dichos. «Sus palabras» conserva la concreción y la forma plural del original.
- source_word: κατενόησαν
  english_pob_choice: observed
  chosen_spanish: observaron
  alternatives_spanish:
  - miraron atentamente
  - notaron
  - consideraron
  lexicon: BDAG
  rationale: κατανοέω aquí implica atención visual deliberada. «Observaron» reproduce bien esa mirada atenta sobre el rostro.
- source_word: τὸ πρόσωπον αὐτῆς
  english_pob_choice: her face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  - su semblante
  - su apariencia
  lexicon: BDAG
  rationale: πρόσωπον es literalmente «rostro/cara». «Rostro» suena más digno en español bíblico actual y conserva la referencia concreta al semblante.
- source_word: θαυμάσιον
  english_pob_choice: marvelous
  chosen_spanish: maravillosa
  alternatives_spanish:
  - admirable
  - asombrosa
  - maravillable
  lexicon: BDAG
  rationale: θαυμάσιος expresa algo digno de admiración o maravilla. «Maravillosa» mantiene el tono elevado y la valoración positiva de la belleza.
- source_word: τῷ κάλλει
  english_pob_choice: in beauty
  chosen_spanish: en belleza
  alternatives_spanish:
  - por su belleza
  - en hermosura
  lexicon: BDAG
  rationale: El dativo expresa respecto o esfera. «En belleza» es fiel y comprensible; «hermosura» sería más literaria, pero menos neutra.
- source_word: σφόδρα
  english_pob_choice: exceedingly
  chosen_spanish: sobremanera
  alternatives_spanish:
  - excesivamente
  - en gran manera
  - muchísimo
  lexicon: BDAG
  rationale: σφόδρα intensifica con fuerza. «Sobremanera» conserva un registro elevado y corresponde bien al énfasis final del griego.
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete (1909) para Judith 10:14. La nota auditada en inglés señala la alternativa de leer «observed/looked closely at» para κατενόησαν y reconoce el giro idiomático de «she was before them marvelous in beauty exceedingly»; la redacción española integra ambos puntos sin desplazar el sentido literal.
  spanish_consistency_notes:
  - Se conserva el registro bíblico contemporáneo y digno, evitando arcaísmos innecesarios.
  - No se introduce una glosa interpretativa para «before them»; se traduce idiomáticamente con la valoración global de la oración.
  - Se mantiene la concreción de «rostro» frente a alternativas más abstractas como «apariencia».
