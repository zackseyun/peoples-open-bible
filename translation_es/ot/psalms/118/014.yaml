translation:
  language: es
  text: Yah, mi fuerza y canto[a], ha llegado a ser mi salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: la forma corta del nombre divino «Yah», no el tetragrámaton completo «Yahvé».'
