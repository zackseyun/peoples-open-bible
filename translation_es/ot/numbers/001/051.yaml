source:
  edition: WLC
  text: וּ/בִ/נְסֹ֣עַ הַ/מִּשְׁכָּ֗ן יוֹרִ֤ידוּ אֹת/וֹ֙ הַ/לְוִיִּ֔ם וּ/בַ/חֲנֹת֙ הַ/מִּשְׁכָּ֔ן יָקִ֥ימוּ אֹת֖/וֹ הַ/לְוִיִּ֑ם וְ/הַ/זָּ֥ר הַ/קָּרֵ֖ב יוּמָֽת׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/001/051.yaml
  text: When the tabernacle is to set out[a], the Levites shall take it down; and when the tabernacle is to camp, the Levites shall set it up. And the outsider who comes near shall be put to death.
  footnotes:
  - marker: a
    text: Or 'the stranger' or 'the unauthorized person'; the Hebrew refers to one not authorized to approach the sanctuary.
    reason: lexical_alternative
