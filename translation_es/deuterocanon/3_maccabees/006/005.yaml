  language: en
  yaml_path: translation/deuterocanon/3_maccabees/006/005.yaml
  text: You shattered Sennacherib[a], the mighty king of the Assyrians, who had become arrogant because of his innumerable forces, who had already brought the whole land under his hand by the spear, and who had exalted himself against your holy city, speaking grievous things with boasting and insolence—you, Master[c][b], making your power plain to many nations.
  footnotes:
  - marker: a
    text: Or 'harsh' or 'terrible' king of the Assyrians'; the Greek adjective can denote something weighty, grievous, or oppressive.
    reason: lexical_alternative
  - marker: b
    text: Literally 'had already taken the whole land under his hand by the spear.'
    reason: lexical_alternative
  - marker: c
    text: The address here is 'Master' (Greek despotēs), not the more common 'Lord' (kyrios).
    reason: lexical_alternative
