translation:
  language: es
  text: ¡Miren[a]! El Señor Yahvé[b] viene con poder; y su brazo gobierna para él.[c] Miren, su recompensa está con él[d], y su retribución delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La interjección hebrea הִנֵּה se conserva como llamada profética de atención. «¡Miren!» mantiene el énfasis deíctico sin recurrir a la formulación más arcaica «He aquí».
    reason: alternative_reading
  - marker: b
    text: El hebreo dice אֲדֹנָי יְהוִה, un título compuesto que incluye el nombre divino YHWH. Se vierte como «el Señor Yahvé» para preservar ambos elementos del original según la convención del proyecto para יְהוָה.
    reason: theological_note
  - marker: c
    text: O «su brazo está gobernando en favor de él» o «su brazo gobierna por él». El hebreo puede expresarse con matiz más explícitamente durativo o de representación.
    reason: lexical_alternative
  - marker: d
    text: O «su salario». שָׂכָר puede referirse a recompensa o remuneración; aquí «recompensa» encaja mejor en el contexto profético.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - ¡Miren
  - ¡He aquí
  - ¡Vean
  lexicon: HALOT
  rationale: El hebreo funciona como interjección profética de señalamiento y énfasis. «¡Miren!» conserva la fuerza de llamada directa en español actual sin volver la línea artificialmente arcaica.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé
  - el Señor YHWH
  lexicon: HALOT
  rationale: La POB inglesa refleja el título compuesto evitando una redundancia como «Señor SEÑOR». En español, «el Señor Yahvé» conserva ambos elementos del título y sigue la convención del proyecto para יְהוָה.
- source_word: בְּחָזָק
  english_pob_choice: with strength
  chosen_spanish: con poder
  alternatives_spanish:
  - con fuerza
  - con poder
  - en fuerza
  lexicon: HALOT
  rationale: La preposición con ḥāzāq aquí expresa modo/acompañamiento. «Con poder» suena natural y mantiene la idea de venida poderosa sin convertirlo en epíteto.
- source_word: יָבֹוא
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - viene
  - vendrá
  - está viniendo
  lexicon: HALOT
  rationale: El imperfecto profético puede expresarse en español con presente de certeza. «Viene» conserva la inmediatez proclamativa que la POB inglesa buscó con «comes».
- source_word: וּזְרֹעוֹ
  english_pob_choice: and his arm
  chosen_spanish: y su brazo
  alternatives_spanish:
  - y su brazo
  - y su poder
  lexicon: HALOT
  rationale: Se mantiene la metáfora corporal bíblica de «brazo» como instrumento de fuerza y acción, en lugar de abstraerla a «poder».
- source_word: מֹשְׁלָה לוֹ
  english_pob_choice: rules for him
  chosen_spanish: gobierna para él
  alternatives_spanish:
  - rige para él
  - gobierna en favor de él
  - ejerce dominio para él
  lexicon: HALOT
  rationale: «מֹשְׁלָה» expresa ejercer dominio/gobierno. «Para él» conserva el valor de referencia o ventaja de לֹו, sin forzar una paráfrasis interpretativa.
- source_word: שְׂכָרוֹ
  english_pob_choice: his reward
  chosen_spanish: su recompensa
  alternatives_spanish:
  - su recompensa
  - su salario
  - sus wages
  lexicon: HALOT
  rationale: «Recompensa» comunica bien el sentido de שָׂכָר en contexto profético y evita el matiz más comercial de «salario».
- source_word: אִתּוֹ
  english_pob_choice: is with him
  chosen_spanish: está con él
  alternatives_spanish:
  - está con él
  - va con él
  lexicon: HALOT
  rationale: La expresión de acompañamiento se vierte de manera directa y natural con «está con él».
- source_word: וּפְעֻלָּתוֹ
  english_pob_choice: and his recompense
  chosen_spanish: y su paga
  alternatives_spanish:
  - y su paga
  - y su compensación
  - y su retribución
  lexicon: HALOT
  rationale: En paralelo con «recompensa», «paga» reproduce de forma accesible la noción de retribución/compensación inherente a פְעֻלָּה, sin perder el vínculo semántico con remuneración.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - delante de él
  - ante él
  - frente a él
  lexicon: HALOT
  rationale: «Delante de él» mantiene la imagen espacial y el paralelismo poético de forma clara en español contemporáneo.
theological_decisions:
- issue: Tratamiento del Tetragrámaton dentro del título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor YHWH
  rationale: La fuente hebrea contiene el nombre divino יְהוָה, que en este proyecto se vierte como «Yahvé». En el título compuesto, usar «el Señor Yahvé» preserva ambos componentes sin la redundancia de «Señor Señor», y mantiene visible el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Aspecto verbal del anuncio profético en יָבֹוא
  english_pob_reading: comes
  chosen_spanish_reading: viene
  alternative_spanish_readings:
  - vendrá
  - está viniendo
  rationale: El hebreo imperfecto en proclamación profética permite presente de certeza. En español, «viene» comunica mejor la vigencia solemne del anuncio sin añadir un matiz temporal no necesario.
  doctrine_reference: Hebrew imperfective/prohetic present (contextual syntax)
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; este borrador sigue esa línea de alta concordancia y conserva las decisiones ya auditadas, adaptándolas al español con el término del proyecto para YHWH y con un español natural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme a la terminología del proyecto.
  - Se conserva la metáfora de «brazo» en lugar de sustituirla por una abstracción como «poder».
  - «Recompensa / paga» preserva el paralelismo de שְׂכָר / פְעֻלָּה sin borrar la tensión semántica entre ambos sustantivos.
  - El doble llamado profético de הִנֵּה se refleja con una exclamación repetida en español para conservar el énfasis retórico.
