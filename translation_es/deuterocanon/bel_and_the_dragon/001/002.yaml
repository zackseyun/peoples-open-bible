translation:
  language: es
  text: Y Ciro el persa recibió su reino, y Daniel era compañero del rey y honrado por encima de todos sus amigos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cortesanos» o «compañeros»; en contextos reales, «amigos» puede referirse a los allegados cercanos del rey en la corte.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέλαβεν
  english_pob_choice: received
  chosen_spanish: recibió
  alternatives_spanish:
  - tomó posesión de
  - obtuvo
  - heredó
  lexicon: BDAG
  rationale: El verbo griego comunica la entrada de Ciro en posesión del poder real. «Recibió» conserva esa idea sin añadir un matiz de usurpación ni de herencia que el texto no explicita.
- source_word: τὴν βασιλείαν αὐτοῦ
  english_pob_choice: his kingdom
  chosen_spanish: su reino
  alternatives_spanish:
  - su realeza
  - su reinado
  - el reino
  lexicon: BDAG
  rationale: En este contexto narrativo, βασιλεία se refiere al ámbito real o reino de Ciro. «Su reino» suena natural en español y mantiene la amplitud semántica de dominio/rey en una sola expresión.
- source_word: συνβιωτής
  english_pob_choice: a companion
  chosen_spanish: compañero
  alternatives_spanish:
  - íntimo asociado
  - cercano compañero
  - uno que convivía con él
  lexicon: LSJ
  rationale: El término sugiere una relación estrecha en el entorno real. «Compañero» preserva la cercanía relacional sin forzar el valor literal de convivencia en un español poco natural.
- source_word: ἔνδοξος
  english_pob_choice: honored
  chosen_spanish: honrado
  alternatives_spanish:
  - distinguido
  - tenido en honor
  - glorioso
  lexicon: BDAG
  rationale: El adjetivo expresa ser tenido en alta estima. «Honrado» comunica bien esa valoración cortesana sin exagerar el sentido hacia «glorioso».
- source_word: ὑπὲρ πάντας τοὺς φίλους αὐτοῦ
  english_pob_choice: above all his friends
  chosen_spanish: por encima de todos sus amigos
  alternatives_spanish:
  - por encima de todos sus compañeros
  - más que todos sus cortesanos
  lexicon: BDAG
  rationale: Se conserva «amigos» en el cuerpo del texto, como hace la POB inglesa, porque el griego usa φίλοι. Aunque en contexto real puede aludir a allegados de corte, el texto base mantiene la forma léxica y la nota recoge esa posibilidad.
theological_decisions:
- issue: Nuance of courtly 'friends' (φίλοι)
  english_pob_reading: friends
  chosen_spanish_reading: amigos
  alternative_spanish_readings:
  - cortesanos
  - compañeros
  rationale: La lectura principal mantiene la equivalencia formal con φίλοι. En contextos monárquicos helenísticos, el término puede funcionar como designación de allegados de corte; por eso se conserva la ambigüedad en una nota sin reemplazar el término del texto.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la edición griega de Swete y el audit trail inglés: mantiene la secuencia narrativa, traduce βασιλεία como «reino» y conserva la ambigüedad cortesana de φίλοι mediante nota, sin añadir explicaciones interpretativas no presentes en el original.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - «Ciro» y no «Cyrus» para la forma española estable de nombre propio.
  - «Compañero» conserva la cercanía relacional del raro συνβιωτής sin sobrerinterpretar la convivencia literal.
  - El estilo busca ser bíblico y claro en español moderno, sin calco mecánico del inglés.
