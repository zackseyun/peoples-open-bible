review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del hebreo y del POB en inglés: preserva el mandato de tratar al sacerdote como santo, el sentido cultual amplio de לֶחֶם como «alimento», la repetición de קדשׁ y el nombre divino «Yahvé». Sin embargo, falla en un punto importante de alineación gramatical: מְקַדִּשְׁכֶם es segunda persona plural («ustedes/vosotros»), no singular, por lo que «el que te santifica» no refleja fielmente el hebreo.'
  spanish_quality_summary: El español es claro, digno y mayormente natural. «Lo tratarás como santo» y «porque ofrece el alimento de tu Dios» funcionan bien. «Santo será para ti» es aceptable, aunque algo marcado; no requiere cambio. La principal mejora necesaria es ajustar la concordancia pronominal final para evitar mezclar singular y plural en una frase de alcance comunitario.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: «Yahvé» para יהוה, «santo/santifica» para la red de קדשׁ, y «alimento» con nota para la alternativa literal «pan». No hay conflicto léxico serio aparte de la persona/número en «te santifica», que contradice la morfología hebrea.'
  issues:
  - severity: high
    issue: 'La frase final usa singular: «el que te santifica».'
    rationale: El hebreo מְקַדִּשְׁכֶם lleva sufijo 2mp, «que los/les santifica» o «que os santifica». El singular «te» altera la referencia del texto y rompe la concordancia con la dirección comunitaria del versículo.
  - severity: low
    issue: Hay ligera tensión entre el singular del mandato («Lo tratarás… tu Dios… para ti») y el plural final.
    rationale: Esto proviene del propio hebreo, que combina formas singulares de dirección con un cierre plural. En español conviene conservar esa irregularidad significativa, pero resolviéndola de manera natural con «los santifica» o «os santifica».
  revised_spanish_text: Lo tratarás como santo[a], porque ofrece el alimento de tu Dios. Santo será para ti, porque santo soy yo, Yahvé, el que los santifica.
  revised_footnotes:
  - marker: a
    text: O «el pan de tu Dios». Aquí «pan» probablemente se refiere de manera más amplia a las ofrendas de alimento presentadas a Dios.
    reason: lexical_alternative
  revision_rationale: Se conserva la red léxica y teológica del original y del POB en inglés, pero se corrige la referencia pronominal final para reflejar fielmente el sufijo plural hebreo en מְקַדִּשְׁכֶם. «Los santifica» mantiene un español neutral y comprensible sin perder la tensión formal del original.
