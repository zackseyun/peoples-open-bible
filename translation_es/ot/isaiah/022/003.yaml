  yaml_path: translation/ot/isaiah/022/003.yaml
  text: All your rulers have fled together[a]; they were captured without the bow. All of your fugitives who were found were captured together[b]; they had fled far away.
  footnotes:
  - marker: a
    text: Hebrew literally, 'were bound from/without the bow.' The sense may be that they were captured without needing archery or without having a bow in hand.
    reason: lexical_alternative
  - marker: b
    text: Or 'all of yours who were found were bound together; they fled from afar.' The Hebrew syntax of the final clause is compressed and allows slightly different construals.
    reason: alternative_reading
