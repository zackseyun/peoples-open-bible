translation:
  language: es
  text: ¡Ah[a], Ariel, Ariel, la ciudad donde David acampó! Añadan año tras año; que las fiestas sigan su curso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ariel es aquí un nombre para Jerusalén; el hebreo también puede evocar ‘hogar del altar’ o ‘león de Dios’.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Ah
  chosen_spanish: ¡Ah!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de!
  - ¡Woe!
  lexicon: HALOT
  rationale: El hebreo funciona como interjección exclamativa o de llamado, no necesariamente como una denuncia de ‘ay de’ en español. ‘¡Ah!’ conserva la apertura exclamativa amplia que el POB inglés quiso mantener con ‘Ah’.
- source_word: אֲרִיאֵל
  english_pob_choice: Ariel
  chosen_spanish: Ariel
  alternatives_spanish:
  - altar hoguera
  - león de Dios
  lexicon: HALOT
  rationale: En el contexto inmediato se trata de un nombre para Jerusalén; por eso se translitera en el texto principal. Las posibles cargas semánticas se preservan aparte sin resolver la ambigüedad del hebreo.
- source_word: קִרְיַת
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - ciudad de
  - la urbe
  lexicon: HALOT
  rationale: El constructo identifica a Ariel como una ciudad. ‘La ciudad’ es natural en español y mantiene la función apposicional del hebreo.
- source_word: חָנָה
  english_pob_choice: encamped
  chosen_spanish: acampó
  alternatives_spanish:
  - encampó
  - habitó
  - se estableció
  lexicon: HALOT
  rationale: El verbo expresa la idea de acampar/establecer un campamento. ‘Acampó’ es idiomático en español y conserva el matiz histórico-militar asociado con David.
- source_word: סְפוּ
  english_pob_choice: Add
  chosen_spanish: Añadan
  alternatives_spanish:
  - Añadan más
  - Sigan añadiendo
  - Sumen
  lexicon: HALOT
  rationale: El imperativo plural pide continuar o agregar tiempo. ‘Añadan’ refleja bien la tersedad del hebreo y el valor de progresión del original.
- source_word: שָׁנָה עַל שָׁנָה
  english_pob_choice: year to year
  chosen_spanish: año tras año
  alternatives_spanish:
  - año a año
  - año sobre año
  - de año en año
  lexicon: HALOT
  rationale: La expresión reiterativa se vierte de manera natural en español con un giro idiomático equivalente. ‘Año tras año’ conserva la repetición cíclica.
- source_word: חַגִּים
  english_pob_choice: the feasts
  chosen_spanish: las fiestas
  alternatives_spanish:
  - las fiestas solemnes
  - las festividades
  - las solemnidades
  lexicon: HALOT
  rationale: ‘Fiestas’ comunica adecuadamente el sentido cultual de חַגִּים en un español bíblico claro, sin cargarlo con un término eclesiástico ajeno al texto.
- source_word: יִנְקֹפוּ
  english_pob_choice: run their round
  chosen_spanish: sigan su curso
  alternatives_spanish:
  - den la vuelta
  - completen su ciclo
  - pasen su ronda
  lexicon: HALOT
  rationale: El verbo sugiere circularidad o recorrer un ciclo. ‘Sigan su curso’ expresa en español la repetición anual sin imponer una imagen demasiado mecánica.
theological_decisions:
- issue: Cómo tratar Ariel como topónimo y a la vez conservar su posible carga semántica
  english_pob_reading: Retain 'Ariel' in the main text as a place-name for Jerusalem, with semantic alternatives footnoted.
  chosen_spanish_reading: Mantener ‘Ariel’ como nombre de Jerusalén en el texto principal, con nota sobre sus posibles resonancias semánticas.
  alternative_spanish_readings:
  - Traducir como ‘altar hoguera’
  - Traducir como ‘león de Dios’
  rationale: El paralelismo y la apposición inmediata señalan un referente geográfico concreto. La transliteración preserva el juego profético sin obligar a escoger una sola interpretación para el lector español.
  doctrine_reference: 'Principio POB: transliterar nombres cuando el texto los usa como designación propia y preservar la tensión lexical donde el hebreo la mantiene.'
translation_notes:
  revision_awareness: Pasaje sin revisiones recientes en el paquete fuente; se sigue la lectura de alta concordancia ya auditada, manteniendo la decisión inglesa de ‘Ah’ para הוֹי y la transliteración de Ariel.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva un registro profético sobrio y bíblico, evitando tanto el tono litúrgico rígido como la paráfrasis libre.
  - ‘Fiestas’ se usa en sentido cultual, no como celebración secular.
  - La cadencia española intenta reflejar la brevedad y el paralelismo del hebreo sin calco sintáctico artificial.
