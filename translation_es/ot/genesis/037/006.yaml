translation:
  language: es
  text: 'Y les dijo: «Escuchen, por favor, este sueño que soñé[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo repite el sustantivo y el verbo cognados: «este sueño que soñé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él les dijo
  alternatives_spanish:
  - Entonces él dijo
  - Y dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, «Y él les dijo» conserva ese flujo sin forzar un calco. Se explicita el pronombre por claridad narrativa natural.
- source_word: אֲלֵי־הֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a sus hermanos
  lexicon: HALOT
  rationale: El dativo pronominal español «les» expresa adecuadamente el destinatario del habla. El contexto ya identifica a los hermanos, por lo que no es necesario explicitarlo en el texto principal.
- source_word: שִׁמְעוּ
  english_pob_choice: listen
  chosen_spanish: escuchen
  alternatives_spanish:
  - oigan
  - presten atención
  lexicon: HALOT
  rationale: El imperativo plural de שׁמע pide atención obediente; «escuchen» es natural en español y conserva el sentido de atender lo que se dice.
- source_word: נָא
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - les ruego
  - ahora
  lexicon: HALOT
  rationale: נָא suaviza la petición; «Por favor» reproduce bien la función discursiva en español contemporáneo sin añadir solemnidad innecesaria.
- source_word: הַחֲלוֹם הַזֶּה
  english_pob_choice: this dream
  chosen_spanish: este sueño
  alternatives_spanish:
  - este sueño, este
  - el sueño este
  lexicon: HALOT
  rationale: El sustantivo con demostrativo se vierte de manera natural como «este sueño». En español, esta forma comunica la proximidad demostrativa sin perder claridad.
- source_word: אֲשֶׁר חָלָמְתִּי
  english_pob_choice: that I dreamed
  chosen_spanish: que soñé
  alternatives_spanish:
  - que tuve
  - que había soñado
  lexicon: HALOT
  rationale: El hebreo repite el sustantivo cognado con el verbo («sueño… soñé»). En español, «sueño… soñé» mantiene esa relación léxica de forma fiel y idiomática; la nota explica la repetición original.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto principal junto a la palabra correspondiente. También se mantuvo una puntuación final de cita natural en español.
  spanish_consistency_notes:
  - Se usó una formulación directa y narrativa adecuada para diálogo bíblico.
  - Se evitó el calco mecánico de «oigan» o «escuchen» con orden rígida; «escuchen» funciona bien en contexto plural.
  - Se preservó la repetición léxica hebrea en la nota, mientras que el texto principal usa una forma española fluida.
