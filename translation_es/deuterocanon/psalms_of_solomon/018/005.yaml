translation:
  language: es
  text: para apartar un alma enseñable[a] de la necedad en ignorancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un alma obediente» o «un alma lista para escuchar».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστρέψαι
  english_pob_choice: to turn away
  chosen_spanish: apartar
  alternatives_spanish:
  - volver
  - desviar
  lexicon: LSJ
  rationale: En este contexto verbal de movimiento moral, «apartar» comunica bien la idea direccional de separar o mover lejos de una condición, y suena natural en español sin perder el matiz de ἀπό.
- source_word: ψυχὴν
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser interior
  lexicon: LSJ
  rationale: «Alma» conserva el peso antropológico y religioso de ψυχή mejor que una paráfrasis psicológica, y es comprensible en registro bíblico español.
- source_word: εὔκοον
  english_pob_choice: receptive / teachable
  chosen_spanish: dócil
  alternatives_spanish:
  - enseñable
  - receptiva
  - obediente
  lexicon: LSJ
  rationale: El griego sugiere alguien que escucha con facilidad y es maleable a la instrucción. «Dócil» recoge esa disposición enseñable sin fijar demasiado una obediencia formal; mantiene la tensión entre receptividad y obediencia documentada por la tradición auditada.
- source_word: ἀμαθίας
  english_pob_choice: foolishness
  chosen_spanish: necedad
  alternatives_spanish:
  - ignorancia
  - falta de entendimiento
  lexicon: LSJ
  rationale: Se evita «ignorancia» para no confundir este término con ἀγνοίᾳ, que ya aparece en la misma línea. «Necedad» preserva la dimensión moral e intelectual negativa de ἀμαθία.
- source_word: ἐν ἀγνοίᾳ
  english_pob_choice: in ignorance
  chosen_spanish: en la ignorancia
  alternatives_spanish:
  - por ignorancia
  - en desconocimiento
  lexicon: LSJ
  rationale: «En la ignorancia» reproduce de forma directa la relación adverbial y mantiene la distinción con ἀμαθία. Es una formulación natural en español y suficientemente literal para el texto base.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incluyendo el marcador de nota [a] dentro del texto principal, anclado en la frase correspondiente. La redacción también conserva la distinción griega entre ἀμαθία («necedad») y ἀγνοία («ignorancia»), siguiendo el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo un estilo bíblico sobrio y moderno, evitando calcos innecesarios.
  - «Alma» y «dócil» funcionan bien juntos en español litúrgico y conservan el carácter antropológico y pedagógico del griego.
  - La nota [a] está anclada exactamente en la expresión que admite las alternativas documentadas.
