translation:
  language: es
  text: 'Entonces se dijeron uno a otro: «No estamos obrando bien. Este día es un día de buenas noticias, y guardamos silencio. Si esperamos hasta la luz de la mañana, el castigo[a] nos alcanzará. Así que ahora, vengan, vayamos e informémoslo a la casa del rey[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice literalmente: «culpa» o «iniquidad nos hallará». La POB inglesa entiende aquí el sentido de consecuencia y traduce «castigo».'
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «la casa del rey» como «la casa real» o «el palacio real».
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא כֵן אֲנַחְנוּ עֹשִׂים
  english_pob_choice: We are not doing right
  chosen_spanish: No estamos haciendo lo correcto
  alternatives_spanish:
  - No estamos obrando bien
  - Esto no es lo que debemos hacer
  lexicon: HALOT
  rationale: La construcción hebrea expresa una evaluación moral directa. En español, 'No estamos haciendo lo correcto' conserva el juicio ético sin volverlo calcado ni más interpretativo de lo necesario.
- source_word: יוֹם בְּשֹׂרָה
  english_pob_choice: a day of good news
  chosen_spanish: un día de buenas noticias
  alternatives_spanish:
  - un día de noticias
  - un día de felices nuevas
  lexicon: HALOT
  rationale: בְּשֹׂרָה puede significar noticias, especialmente de victoria o liberación. 'Buenas noticias' comunica bien ese valor y suena natural en español contemporáneo.
- source_word: מַחְשִׁים
  english_pob_choice: we are keeping silent
  chosen_spanish: guardamos silencio
  alternatives_spanish:
  - estamos callados
  - no decimos nada
  lexicon: HALOT
  rationale: El participio hifil aquí apunta a una silenciosa abstención deliberada. 'Guardamos silencio' transmite esa acción continuada y voluntaria con buena naturalidad en español.
- source_word: וְחִכִּינוּ עַד א֥וֹר הַבֹּקֶר
  english_pob_choice: If we wait until the light of morning
  chosen_spanish: Si esperamos hasta la luz de la mañana
  alternatives_spanish:
  - Si demoramos hasta el amanecer
  - Si aguardamos hasta la luz del alba
  lexicon: HALOT
  rationale: La cláusula funciona condicionalmente en contexto. 'La luz de la mañana' refleja más plenamente אוֹר הַבֹּקֶר que un simple 'mañana' y mantiene la imagen de claridad naciente.
- source_word: וּמְצָאָנוּ עָוֹן
  english_pob_choice: punishment will overtake us
  chosen_spanish: el castigo nos alcanzará
  alternatives_spanish:
  - la culpa nos alcanzará
  - la iniquidad nos hallará
  - seremos hallados culpables
  lexicon: HALOT
  rationale: El hebreo dice literalmente que 'guilt/iniquity will find us'. En contexto, la consecuencia esperada es una sanción por haber ocultado la noticia; 'el castigo nos alcanzará' preserva la fuerza figurada sin perder el sentido probable adoptado por la POB inglesa revisada.
- source_word: לְכוּ וְנָבֹאָה
  english_pob_choice: come, let us go
  chosen_spanish: vengan, vamos
  alternatives_spanish:
  - vamos, entremos
  - vengan, entremos
  lexicon: HALOT
  rationale: La combinación imperativa + cohortativo pide acción inmediata. 'Vengan, vamos' es una exhortación natural en español y deja abierto el destino que sigue en el verso.
- source_word: וְנַגִּידָה
  english_pob_choice: and report it
  chosen_spanish: y démosle aviso
  alternatives_spanish:
  - y lo informemos
  - y lo reportemos
  - y anunciemos
  lexicon: HALOT
  rationale: נגד en hifil significa comunicar o declarar. 'Démosle aviso' conserva el acto de comunicar con urgencia; el dativo implícito se expresa de manera fluida en español.
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: the king’s household
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - el palacio del rey
  - la casa real
  - el hogar del rey
  lexicon: HALOT
  rationale: La expresión literal 'casa del rey' es transparente y fiel al hebreo. Aunque puede abarcar el ámbito palaciego o la casa real, esta forma mantiene la amplitud semántica sin decidir de más.
theological_decisions:
- issue: 'עָוֹן en la frase וּמְצָאָנוּ עָוֹן: culpa/iniquidad vs. castigo'
  english_pob_reading: The English POB revises from 'guilt will overtake us' to 'punishment will overtake us,' while noting the literal Hebrew 'guilt/iniquity will find us.'
  chosen_spanish_reading: el castigo nos alcanzará
  alternative_spanish_readings:
  - la culpa nos alcanzará
  - la iniquidad nos hallará
  - seremos hallados culpables
  rationale: En este contexto narrativo, la expresión probablemente alude a la consecuencia penal de ocultar la noticia, no solo a un estado interior de culpa. 'Castigo' sigue la lectura revisada de la POB inglesa y comunica bien el efecto esperado, sin borrar que el hebreo literalmente habla de que la culpa/iniquidad 'nos hallará'.
  doctrine_reference: Lexical-theological judgment on culpability and consequence; not a doctrinal prooftext.
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa: ''We are not doing right'' y ''punishment will overtake us'', manteniendo además las demás decisiones ya auditadas sobre ''good news'', ''keeping silent'', la lectura condicional de ''If we wait...'', y ''the king’s household''.'
  spanish_consistency_notes:
  - Se usa 'Dios' solo donde el texto no emplea el nombre divino; aquí no hay referencia a יהוה.
  - Se mantiene 'buenas noticias' para יוֹם בְּשֹׂרָה, evitando términos litúrgicos más marcados como 'evangelio' que el hebreo no exige en este contexto.
  - '''Casa del rey'' se conserva por su amplitud semántica y para no reducir prematuramente el hebreo a un solo referente arquitectónico.'
