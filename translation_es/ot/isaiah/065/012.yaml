- from: Y os destinaré a la espada[a], y todos vosotros caeréis[b] ante la matanza, porque llamé y no respondisteis; hablé y no escuchasteis. E hicisteis lo malo a mis ojos, y escogisteis lo que yo no me complací[c][d].
  to: Y os destinaré a la espada[a], y todos se arrodillarán[b] para la matanza, porque llamé y no respondisteis; hablé y no escuchasteis[c]. Y hicisteis lo malo a mis ojos, y escogisteis lo que no me agradó[d].
  rationale: Se corrige la frase final para que sea gramatical y fiel a חפץ; se restaura en el verbo principal la imagen de doblar la rodilla en vez de solo «caer»; y se añade la nota léxica sobre שמע que el POB inglés preserva. También se suaviza «todos vosotros» a una forma más neutral sin cambiar el sentido.
