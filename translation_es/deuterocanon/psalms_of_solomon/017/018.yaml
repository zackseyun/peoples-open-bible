review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del griego: οἱ ἀγαπῶντες συναγωγὰς ὁσίων = «los que amaban las asambleas de los santos», ἔφυγοσαν = «huyeron», y la imagen de στρουθία ... ἀπὸ κοίτης αὐτῶν está bien captada con gorriones y «lugar de descanso». Sin embargo, «volaron lejos» añade el matiz de distancia que no está en ἐξεπετάσθησαν; el griego y la POB auditada expresan más bien «salieron/volaron fuera/volaron alejándose».'
  spanish_quality_summary: El español es claro y natural. La frase principal suena digna y legible. No obstante, «volaron lejos de» es una pequeña sobretraducción; «se fueron volando de» o «salieron volando de» suena natural y más exacto. También conviene ajustar la nota d, ya que ya no debe presentar una alternativa menos natural que el texto principal.
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. «Asambleas» para συναγωγάς está bien con nota alternativa; «santos» es aceptable para ὁσίων aunque la nota debe preservar la alternativa inglesa principal «los santos» / «los consagrados» / «los piadosos» con cuidado. La imaginería de «gorriones» y «lugar de descanso» sigue la rationale documentada para στρουθία y κοίτη.
  issues:
  - severity: medium
    issue: «volaron lejos» añade un matiz no presente en ἐξεπετάσθησαν
    rationale: El verbo griego, según la revisión auditada, describe acción aviar de volar fuera/alejarse, no específicamente distancia grande. «Lejos» sobreinterpreta el movimiento.
  - severity: low
    issue: La nota d no corresponde bien a la mejor explicación del verbo
    rationale: Si el texto principal se corrige a «se fueron volando» o similar, la nota debería conservar la alternativa más literal «volaron fuera», no dejarla como simple variante de un principal menos preciso.
  - severity: low
    issue: La nota b no preserva la alternativa inglesa principal «holy ones» con suficiente cercanía
    rationale: La POB inglesa documenta «saints» como alternativa a «holy ones». En español, si el texto principal usa «santos», una nota útil debe ofrecer una alternativa cercana como «los consagrados» o «los santos/los piadosos»; «piadosos» y «devotos» solos desplazan el eje semántico hacia piedad.
  revised_spanish_text: Los que amaban las asambleas[a] de los santos[b] huyeron de ellas; como gorriones, se fueron volando de su lugar de descanso[c][d].
