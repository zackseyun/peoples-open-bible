id: JOS.19.33
reference: Joshua 19:33
source:
  edition: WLC
  text: וַ/יְהִ֣י גְבוּלָ֗/ם מֵ/חֵ֨לֶף מֵֽ/אֵל֜וֹן בְּ/צַעֲנַנִּ֗ים וַ/אֲדָמִ֥י הַנֶּ֛קֶב וְ/יַבְנְאֵ֖ל עַד לַקּ֑וּם וַ/יְהִ֥י תֹצְאֹתָ֖י/ו הַ/יַּרְדֵּֽן־׃
translation:
  text: And their border was from Heleph[a], from the oak in Zaannannim, and Adami-nekeb and Jabneel, as far as Lakkum[b]; and its end was at the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from Elon-bezaanannim”; the Hebrew may be read either as a place name or as “the oak in/of Zaannannim.”
    reason: alternative_reading
  - marker: b
    text: Hebrew literally, “its outgoings were the Jordan,” an idiom for the border’s terminal points reaching the Jordan.
    reason: lexical_alternative
lexical_decisions:
- source_word: גְבוּלָם
  chosen: their border
  alternatives:
  - their territory boundary
  - their borderland
  lexicon: HALOT
  rationale: גְּבוּל commonly denotes a boundary or border line. With the 3mp suffix it refers to the border of the tribe just mentioned (Naphtali). 'Border' is natural English in this territorial-list context.
- source_word: מֵחֵלֶף
  chosen: from Heleph
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per project philosophy for names.
- source_word: מֵאֵלוֹן בְּצַעֲנַנִּים
  chosen: from the oak in Zaannannim
  alternatives:
  - from Elon-bezaanannim
  - from the terebinth in Zaannannim
  - from the oak of Zaannannim
  lexicon: HALOT
  rationale: אֵלוֹן can denote a large tree, often rendered 'oak' or 'terebinth.' Here the syntax favors the common noun 'the oak' with the following place name, rather than treating the whole as a single toponym. 'Oak' is the more familiar English choice; the toponymic alternative is preserved in a footnote.
- source_word: וַאֲדָמִי הַנֶּקֶב
  chosen: and Adami-nekeb
  alternatives:
  - and Adami, the pass
  - and Adami-ha-neqeb
  lexicon: HALOT
  rationale: Best taken as a compound place name in this boundary list. Although נֶקֶב can mean a pass or pierced place, the sequence of names supports transliteration of the established toponym.
- source_word: וְיַבְנְאֵל
  chosen: and Jabneel
  lexicon: HALOT
  rationale: Proper place name; standard transliteration.
- source_word: עַד לַקּוּם
  chosen: as far as Lakkum
  alternatives:
  - to Lakkum
  lexicon: HALOT
  rationale: עַד marks extent up to a place. 'As far as' reads smoothly in an itinerary-style border description.
- source_word: תֹּצְאֹתָיו
  chosen: its boundary ends
  alternatives:
  - its outgoings
  - its extremities
  - its border points
  lexicon: HALOT
  rationale: The noun literally refers to goings out, exits, or extremities. In boundary descriptions it denotes the terminal points or outer limits of the border. 'Boundary ends' preserves the concrete territorial sense without archaic 'outgoings.'
- source_word: הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: Standard geographical designation. 'The Jordan' is idiomatic and sufficient; 'River' is implied by usage.
