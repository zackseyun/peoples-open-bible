    text: Or 'out of the pit.' The Hebrew bor can denote a pit, cistern, or dungeon; here 'cistern' fits the narrative setting.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the courtyard of the guardhouse' or 'in the court of the prison.' The Hebrew expression refers to the guarded detention area.
    reason: lexical_alternative
