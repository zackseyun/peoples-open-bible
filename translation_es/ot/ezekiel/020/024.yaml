translation:
  language: es
  text: porque no practicaron mis juicios, rechazaron mis estatutos, profanaron mis sábados, y sus ojos iban tras los ídolos[a] de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo גִּלּוּלִים es un término fuertemente despectivo para los ídolos; algunas traducciones lo intensifican con expresiones como «ídolos repugnantes» o «ídolos de estiércol».
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: יַעַן introduce la causa de la acción divina anunciada en el contexto; «porque» es el conector causal más natural en español y preserva la relación explicativa.
- source_word: מִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis juicios
  alternatives_spanish:
  - mis reglas
  - mis ordenanzas
  lexicon: HALOT
  rationale: מִשְׁפָּט puede referirse a decisiones o disposiciones legales del pacto. «Juicios» conserva el campo jurídico-formal que la POB inglesa mantuvo con «judgments».
- source_word: עָשׂוּ
  english_pob_choice: did not practice
  chosen_spanish: no practicaron
  alternatives_spanish:
  - no hicieron
  - no llevaron a cabo
  lexicon: HALOT
  rationale: Con mandatos del pacto como objeto, «practicar» comunica mejor la observancia continua que el más mecánico «hacer», sin apartarse del valor verbal de cumplimiento.
- source_word: חֻקּוֹתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis prescripciones
  lexicon: HALOT
  rationale: חֻקּוֹת es un término legal-covenantal establecido; «estatutos» distingue bien este concepto de מִשְׁפָּטַי y coincide con el registro bíblico en español.
- source_word: מָאַסוּ
  english_pob_choice: they rejected
  chosen_spanish: rechazaron
  alternatives_spanish:
  - despreciaron
  - repudiaron
  lexicon: HALOT
  rationale: מָאַס expresa rechazo/repudio. «Rechazaron» es claro y directo; evita intensificar más de lo que exige el contexto, aunque la idea de desprecio permanece implícita.
- source_word: שַׁבְּתוֹתַי
  english_pob_choice: my Sabbaths
  chosen_spanish: mis sábados
  alternatives_spanish:
  - mis días de reposo
  - mis días de sábado
  lexicon: HALOT
  rationale: En español, «Sábados» comunica el conjunto de observancias sabáticas de forma breve y reconocible. Se mantiene el plural del hebreo y su valor pactal.
- source_word: חִלֵּלוּ
  english_pob_choice: they profaned
  chosen_spanish: profanaron
  alternatives_spanish:
  - desecraron
  - contaminaron
  lexicon: HALOT
  rationale: En contexto cultual, חלל en piel significa tratar como común o profano. «Profanaron» preserva el peso teológico y ritual sin paráfrasis.
- source_word: אַחֲרֵי
  english_pob_choice: were after
  chosen_spanish: estuvieron tras
  alternatives_spanish:
  - siguieron tras
  - iban tras
  lexicon: HALOT
  rationale: La construcción expresa orientación/deseo hacia algo. «Estuvieron tras» conserva la imagen hebrea y funciona con «sus ojos» en español.
- source_word: גִּלּוּלֵי
  english_pob_choice: the idols
  chosen_spanish: los ídolos
  alternatives_spanish:
  - los ídolos repugnantes
  - los ídolos de estiércol
  lexicon: HALOT
  rationale: גִּלּוּלִים es un término despectivo para ídolos. El texto principal mantiene «ídolos» por legibilidad; la carga peyorativa se documenta en nota para no sobrerrepresentar el insulto en la línea.
- source_word: אֲבוֹתָם
  english_pob_choice: of their fathers
  chosen_spanish: de sus padres
  alternatives_spanish:
  - de sus antepasados
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus padres». Se mantiene el término masculino-familiar por fidelidad al original y para conservar la referencia generacional concreta.
- source_word: הָיוּ עֵינֵיהֶם
  english_pob_choice: their eyes were
  chosen_spanish: sus ojos estuvieron
  alternatives_spanish:
  - sus ojos estaban
  - sus ojos miraban
  lexicon: HALOT
  rationale: La expresión hebrea comunica orientación interior hacia el objeto deseado. «Estuvieron» reproduce de modo sobrio la construcción de estado + dirección, manteniendo la imagen de los ojos.
theological_decisions:
- issue: Término despectivo גִּלּוּלִים
  english_pob_reading: the idols
  chosen_spanish_reading: los ídolos
  alternative_spanish_readings:
  - los ídolos repugnantes
  - los ídolos de estiércol
  rationale: La POB inglesa preserva el sentido básico en el texto y reserva la ironía fuerte para una nota. En español, el mismo equilibrio evita exagerar el insulto en la línea principal, pero deja visible la tensión semántica.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 6
- issue: Retención del término familiar masculino אֲבוֹתָם
  english_pob_reading: of their fathers
  chosen_spanish_reading: de sus padres
  alternative_spanish_readings:
  - de sus antepasados
  rationale: El hebreo usa un término masculino explícito. Se conserva «padres» en vez de neutralizar a «antepasados», siguiendo la fidelidad gender-accurate del proyecto y manteniendo la referencia genealógica concreta.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios y el cotejo general mostró alta concordancia; por ello, este borrador sigue de cerca las decisiones auditadas del inglés POB, manteniendo el equilibrio entre literalidad, claridad y nota léxica.
  spanish_consistency_notes:
  - Se mantiene «mis juicios» y «mis estatutos» como par legal-covenantal diferenciado.
  - «Sábados» conserva el plural hebreo y la referencia a las observancias sabáticas.
  - «Estuvieron tras» preserva la imagen idiomática de orientación del deseo sin convertirla en una paráfrasis explicativa.
  - La nota [a] queda anclada en «ídolos» para documentar la carga despectiva del hebreo sin sobrecargar el texto principal.
