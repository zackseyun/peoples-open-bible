translation:
  language: es
  text: La corona de los sabios es su riqueza[a], pero la necedad de los necios es necedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo algunas versiones e intérpretes antiguos: «la riqueza de los necios es necedad». El Texto Masorético dice literalmente: «la necedad de los necios es necedad».'
    reason: alternative_reading
lexical_decisions:
- source_word: עֲטֶרֶת
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - ornamento
  - guirnalda
  lexicon: HALOT
  rationale: El sustantivo designa una corona o guirnalda como símbolo de honor. En español, «corona» es la opción más natural y conserva la imagen de distinción visible.
- source_word: חֲכָמִים
  english_pob_choice: the wise
  chosen_spanish: los sabios
  alternatives_spanish:
  - los que son sabios
  - los hombres sabios
  lexicon: HALOT
  rationale: El plural funciona como sustantivo colectivo para personas sabias en general. «Los sabios» es idiomático y no añade un matiz masculino innecesario.
- source_word: עָשְׁרָם
  english_pob_choice: their wealth
  chosen_spanish: su riqueza
  alternatives_spanish:
  - sus riquezas
  - su abundancia
  lexicon: HALOT
  rationale: El término apunta a riqueza o bienes materiales con sufijo de tercera persona plural. «Su riqueza» comunica bien el valor general y mantiene la relación posesiva.
- source_word: אִוֶּלֶת
  english_pob_choice: folly
  chosen_spanish: necedad
  alternatives_spanish:
  - insensatez
  - fatuidad
  - locura
  lexicon: HALOT
  rationale: En el contexto sapiencial, el término expresa necedad como cualidad moral e intelectual. «Necedad» es claro en español y funciona bien en el paralelismo proverbial.
- source_word: כְּסִילִים
  english_pob_choice: fools
  chosen_spanish: los necios
  alternatives_spanish:
  - los insensatos
  - los tontos
  lexicon: HALOT
  rationale: El sustantivo designa a los necios en sentido sapiencial, no solo a personas poco listas. «Los necios» conserva ese peso moral y evita una lectura demasiado coloquial.
- source_word: אִוֶּלֶת כְּסִילִים אִוֶּלֶת
  english_pob_choice: the folly of fools is folly
  chosen_spanish: la necedad de los necios es necedad
  alternatives_spanish:
  - la riqueza de los necios es necedad
  - la necedad de los necios es la necedad
  lexicon: HALOT
  rationale: La lectura masorética repite אִוֶּלֶת, produciendo una tautología enfática que el POB inglés preserva como «folly ... folly». En español, «la necedad de los necios es necedad» mantiene la repetición y la tensión literaria; no se suaviza hacia la lectura alternativa, aunque esta se documenta en nota.
theological_decisions:
- issue: Preservación de la repetición tautológica del hebreo masorético frente a lecturas interpretativas antiguas
  english_pob_reading: The folly of fools is folly.
  chosen_spanish_reading: la necedad de los necios es necedad
  alternative_spanish_readings:
  - la riqueza de los necios es necedad
  - la necedad de los necios es la necedad
  rationale: El hebreo masorético repite el mismo sustantivo, y el POB inglés decide conservar esa repetición como recurso intencional de sabiduría proverbial. La traducción española mantiene la misma tensión sin armonizarla con una lectura alternativa.
  doctrine_reference: Textual criticism / wisdom literature parallelism
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo masorético y con la decisión auditada del POB inglés de preservar la repetición enfática final. No se requirieron revisiones respecto del contexto inglés; se mantuvo la lectura principal y se documentó la alternativa antigua en nota.
  spanish_consistency_notes:
  - Se usó «corona» para עֲטֶרֶת, coherente con la metáfora honorífica y con el valor proverbial del verso.
  - Se eligió «necedad» para אִוֶּלֶת y «necios» para כְּסִילִים, manteniendo la familia léxica pero distinguiendo sustantivo de referente.
  - La nota a pie de página refleja la variante documentada en el POB inglés sin desplazar el texto principal.
