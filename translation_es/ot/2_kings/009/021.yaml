translation:
  language: es
  text: 'Entonces Joram dijo[a]: «¡Enganchen!» Y engancharon su carro. Entonces Joram, rey de Israel, y Ocozías, rey de Judá, salieron, cada uno en su carro, para encontrarse con Jehú, y lo hallaron en la parcela de Nabot el jezreelita.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice formalmente «y él enganchó su carro»; el sentido probable es que la orden fue ejecutada por sirvientes o asistentes.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱסֹר
  english_pob_choice: Harness!
  chosen_spanish: ¡Apresten!
  alternatives_spanish:
  - ¡Aprovechen!
  - ¡Enganchen!
  - ¡Apresten el carro!
  lexicon: HALOT
  rationale: En contexto de carro de guerra, el imperativo apunta a sujetar/poner listo el carro para partir. «Apresten» comunica la orden breve y urgente de forma natural en español sin perder el matiz militar.
- source_word: וַיֶּאְסֹר רִכְבּוֹ
  english_pob_choice: they harnessed his chariot
  chosen_spanish: aprestaron su carro
  alternatives_spanish:
  - le aprestaron su carro
  - aprestaron el carro del rey
  - le engancharon el carro
  lexicon: HALOT
  rationale: El hebreo es formalmente «y él aprestó/ató su carro», pero el contexto favorece que la acción la ejecutaran sirvientes o asistentes. En español, una forma impersonal con sujeto tácito plural conserva el sentido narrativo y evita atribuirle al rey el trabajo manual.
- source_word: אִישׁ בְּרִכְבּוֹ
  english_pob_choice: each in his chariot
  chosen_spanish: cada uno en su carro
  alternatives_spanish:
  - cada cual en su carro
  - cada uno en su propio carro
  - uno en su carro
  lexicon: HALOT
  rationale: אִישׁ funciona distributivamente aquí; «cada uno» reproduce esa distribución de modo claro y natural. «Carro» mantiene el referente de los carros reales/militares del pasaje.
- source_word: לִקְרַאת יֵהוּא
  english_pob_choice: to meet Jehu
  chosen_spanish: para salir al encuentro de Jehú
  alternatives_spanish:
  - para encontrar a Jehú
  - para ir al encuentro de Jehú
  - para encontrarse con Jehú
  lexicon: HALOT
  rationale: La expresión idiomática hebrea indica movimiento en dirección a alguien para reunirse con él. «Salir al encuentro» preserva ese dinamismo mejor que un simple «encontrar».
- source_word: וַיִּמְצָאֻהוּ
  english_pob_choice: they found him
  chosen_spanish: lo hallaron
  alternatives_spanish:
  - lo encontraron
  - se toparon con él
  - dieron con él
  lexicon: HALOT
  rationale: «Hallaron» es una opción sobria y bíblica en español que corresponde bien a מצא. Evita sobrecargar el verbo con un matiz interpretativo adicional.
- source_word: בְּחֶלְקַת נָבוֹת
  english_pob_choice: in the plot of land of Naboth
  chosen_spanish: en la parcela de tierra de Nabot
  alternatives_spanish:
  - en el terreno de Nabot
  - en la parcela de Nabot
  - en el campo de Nabot
  lexicon: HALOT
  rationale: חלקה designa una porción o parcela de terreno con fuerte matiz de propiedad. «Parcela de tierra» conserva esa precisión jurídica/territorial mejor que «campo», que puede sonar más general.
- source_word: הַיִּזְרְעֵאלִי
  english_pob_choice: the Jezreelite
  chosen_spanish: el jezreelita
  alternatives_spanish:
  - el de Jezreel
  - el israelita de Jezreel
  lexicon: HALOT
  rationale: Se conserva el gentilicio para mantener la identificación tradicional de Nabot. «Jezreelita» es transparente y corresponde directamente al hebreo.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo masorético y el audit trail inglés de la POB. Se mantuvo la lectura narrativa estándar del verbo en la secuencia de la orden del rey, la salida de los dos reyes y el encuentro en la propiedad de Nabot. No se detectaron revisiones textuales relevantes que alteren el contenido de la línea.
  spanish_consistency_notes:
  - Se usó «carro» de manera consistente para el vehículo real/militar, en lugar de «carreta» o «carruaje», por ser el término más natural en este contexto bíblico.
  - Se prefirió el nombre «Jehú» y el gentilicio «jezreelita» para mantener continuidad con la onomástica bíblica en español.
  - «Lo hallaron» conserva el tono narrativo directo y la correspondencia con el inglés POB «they found him».
