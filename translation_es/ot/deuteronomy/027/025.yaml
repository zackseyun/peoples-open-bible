review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español comunica bien el sentido principal del hebreo: una maldición de pacto contra quien recibe soborno para causar la muerte de un inocente, seguida por la respuesta litúrgica del pueblo. Sin embargo, la nota al pie actual no refleja fielmente la alternativa literal preservada por el inglés POB. El hebreo דָּם נָקִי es literalmente ''sangre inocente'', no ''vida de sangre inocente'', y לְהַכּוֹת corresponde mejor a ''derribar/golpear de muerte'' que a ''golpear una vida''.'
  spanish_quality_summary: El texto principal es natural, claro y digno en español eclesial general. 'Maldito el que acepta un soborno para matar a un inocente' suena idiomático y conserva bien la fuerza judicial. La única reparación necesaria es la nota al pie, cuya redacción literal actual es torpe y poco fiel al hebreo.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto. ''Maldito'', ''soborno'' y ''Amén'' están bien elegidos. La decisión de expresar el idiomatismo como ''a un inocente'' en el texto principal es legítima, siempre que la nota preserve la alternativa literal correcta: ''para derramar/matar sangre inocente'' o ''para derribar a una persona de sangre inocente'' explicada como modismo. Aquí conviene seguir más de cerca la auditoría inglesa: ''para derribar a una persona inocente'' con nota ''Literalmente, “para derribar sangre inocente”''.'
  issues:
  - severity: medium
    issue: La nota al pie literaliza incorrectamente el hebreo como «para golpear una vida de sangre inocente».
    rationale: נֶפֶשׁ aquí se entiende como 'persona', no 'vida' en esa construcción, y דָּם נָקִי es la expresión literal relevante ('sangre inocente'). La nota debe preservar la alternativa documentada por el POB inglés, no crear una literalización híbrida y poco natural.
  revised_spanish_text: 'Maldito el que acepta un soborno para matar a un inocente[a], y todo el pueblo dirá: «Amén».'
  revised_footnotes:
  - marker: a
    text: Literalmente, «para derribar sangre inocente». El hebreo usa un giro idiomático que se refiere a matar a una persona inocente.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural en español. Se corrige únicamente la nota al pie para que refleje con precisión la alternativa literal del hebreo y la documentación del POB inglés sobre el idiomatismo 'sangre inocente'.
