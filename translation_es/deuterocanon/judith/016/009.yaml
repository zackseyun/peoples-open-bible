translation:
  language: es
  text: Su sandalia capturó su mirada, y su belleza cautivó su alma; la espada[a] le atravesó el cuello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «daga»; ἀκινάκης designa un arma corta de tipo oriental, cercana a una espada corta o daga.
    reason: lexical_alternative
lexical_decisions:
- source_word: σανδάλιον
  english_pob_choice: sandal
  chosen_spanish: sandalia
  alternatives_spanish:
  - calzado
  - zapato
  lexicon: LSJ
  rationale: El griego nombra una sandalia, no un calzado genérico. «Sandalia» conserva el detalle concreto del adorno de Judith y sigue de cerca la decisión del POB en inglés.
- source_word: ἥρπασε
  english_pob_choice: captured
  chosen_spanish: arrebató
  alternatives_spanish:
  - capturó
  - seizgó
  - captó
  lexicon: LSJ
  rationale: El verbo tiene fuerza de arrebatar o arrebatar violentamente. En español, «arrebató» comunica la irrupción del efecto visual sin volverlo torpe o excesivamente literal.
- source_word: ὀφθαλμὸν
  english_pob_choice: eye
  chosen_spanish: la mirada
  alternatives_spanish:
  - el ojo
  - la vista
  - la atención
  lexicon: LSJ
  rationale: Aunque el griego es singular y literalmente significa «ojo», en español «arrebatar la mirada» expresa con naturalidad el sentido idiomático de la atención visual que quedó prendida por ella. Se conserva el alcance del singular sin sonar extraño.
- source_word: κάλλος
  english_pob_choice: beauty
  chosen_spanish: belleza
  alternatives_spanish:
  - hermosura
  - encanto
  - lozanía
  lexicon: LSJ
  rationale: «Belleza» es la equivalencia más directa y sobria para κάλλος, que aquí describe su atractivo visible en el contexto poético.
- source_word: ᾐχμαλώτισεν
  english_pob_choice: took ... captive
  chosen_spanish: cautivó
  alternatives_spanish:
  - capturó
  - hizo cautiva
  - tomó cautiva
  lexicon: LSJ
  rationale: El verbo mantiene la metáfora de tomar en cautiverio. «Cautivó su alma» preserva la imagen de sometimiento interior con un español natural; evita suavizarlo a «ganó» o «conquistó».
- source_word: ψυχὴν
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser
  - espíritu
  lexicon: LSJ
  rationale: En este contexto poético, «alma» comunica bien el interior de la persona afectado por la belleza. «Espíritu» podría sugerir un matiz distinto y «vida» reduciría la carga poética.
- source_word: ἀκινάκης
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - daga
  - sable corto
  - akinaces
  lexicon: LSJ
  rationale: El término designa un arma corta de tipo oriental. La traducción principal como «espada» prioriza claridad para lectores en español, mientras que la alternativa más precisa queda reflejada en la nota textual.
- source_word: διῆλθεν
  english_pob_choice: passed through
  chosen_spanish: atravesó
  alternatives_spanish:
  - pasó a través de
  - penetró
  - perforó
  lexicon: LSJ
  rationale: «Atravesó» transmite de forma natural la acción de pasar completamente por el cuello y mantiene la literalidad básica del verbo sin endurecerlo innecesariamente.
- source_word: τράχηλον
  english_pob_choice: neck
  chosen_spanish: cuello
  alternatives_spanish:
  - garganta
  - nuca
  lexicon: LSJ
  rationale: El sentido normal de τράχηλος es «cuello». «Cuello» es la opción más directa y clara en español.
theological_decisions:
- issue: Conservar la fuerza metafórica de la escena de seducción y muerte
  english_pob_reading: Retain conquest imagery in both clauses ('captured his eye' / 'took his soul captive')
  chosen_spanish_reading: Mantener la imagen de cautiverio en ambas cláusulas («arrebató la mirada» / «cautivó su alma»).
  alternative_spanish_readings:
  - «captó su atención» / «ganó su corazón»
  - «fascinó su vista» / «conquistó su interior»
  rationale: El griego usa lenguaje de captura y cautiverio para describir el efecto de la belleza antes de la muerte. La versión española preserva esa tensión poética y no la suaviza con fórmulas afectivas más modernas.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; original-language primacy in poetic texts'
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete con acuerdo alto del audit trail en inglés; no se registraron revisiones aplicadas y la redacción final mantiene la metáfora de captura y el arma de tipo oriental señalada en la nota inglesa.
  spanish_consistency_notes:
  - 'Se mantuvo un registro léxico coherente: sandalia / mirada / belleza / alma / espada / cuello.'
  - Se evitó «Señor» u այլ terminología no pertinente; no hay nombres divinos en este versículo.
  - La nota al pie marca la alternativa lexical importante que el POB en inglés preservó para ἀκινάκης.
