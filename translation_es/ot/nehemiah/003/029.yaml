base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/003/029.yaml
  text: After him Zadok son of Immer made repairs opposite his house[a], and after him Shemaiah son of Shecaniah, keeper of the East Gate[c][b], made repairs.
