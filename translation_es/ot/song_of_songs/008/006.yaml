translation:
  language: es
  text: Ponme como un sello sobre tu corazón, como un sello sobre tu brazo; porque el amor es tan fuerte como la muerte, y los celos tan inexorables como el Seol[a]. Sus destellos son destellos de fuego[b], una llama de Yah[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los celos tan crueles como el sepulcro»; el hebreo «Seol» también puede entenderse más generalmente como el reino de los muertos.'
    reason: alternative_reading
  - marker: b
    text: 'O: «sus chispas son chispas de fuego».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «una llama de Yah»; posiblemente una expresión intensiva: «una llama poderosa» o «una llama ardiente».'
    reason: alternative_reading
lexical_decisions:
- source_word: שִׂימֵנִי
  english_pob_choice: Set me
  chosen_spanish: Ponme
  alternatives_spanish:
  - Colócame
  - Pónme
  lexicon: HALOT
  rationale: 'Imperativo 2ms con sufijo de 1cs: un pedido directo e íntimo. «Ponme» conserva la concisión y la fuerza del original con un español natural y digno.'
- source_word: כַחוֹתָם
  english_pob_choice: as a seal
  chosen_spanish: como un sello
  alternatives_spanish:
  - como un signet
  - como un sello de autenticación
  lexicon: HALOT
  rationale: חוֹתָם designa un sello o signet usado para marcar propiedad e identidad. «Sello» es claro y mantiene la metáfora sin tecnicismo innecesario.
- source_word: עַל לִבֶּךָ
  english_pob_choice: upon your heart
  chosen_spanish: sobre tu corazón
  alternatives_spanish:
  - en tu corazón
  - sobre tu pecho
  lexicon: HALOT
  rationale: Se conserva la ubicación metafórica y el paralelismo con el brazo. «Sobre» refleja el registro poético y la idea de estar fijado o colocado encima.
- source_word: עַל זְרוֹעֶךָ
  english_pob_choice: upon your arm
  chosen_spanish: sobre tu brazo
  alternatives_spanish:
  - en tu brazo
  lexicon: HALOT
  rationale: זְרוֹעַ es «brazo». Se mantiene el contraste entre corazón y brazo, interioridad y manifestación externa.
- source_word: עַזָּה כַמָּוֶת אַהֲבָה
  english_pob_choice: for love is as strong as death
  chosen_spanish: porque el amor es tan fuerte como la muerte
  alternatives_spanish:
  - porque el amor es fuerte como la muerte
  lexicon: HALOT
  rationale: עַזָּה expresa fuerza/poder; «tan fuerte como» reproduce bien la comparación enfática y el paralelismo poético.
- source_word: קָשָׁה כִשְׁאול קִנְאָה
  english_pob_choice: jealousy as relentless as Sheol
  chosen_spanish: los celos tan inexorables como el Seol
  alternatives_spanish:
  - los celos tan crueles como el Seol
  - los celos tan duros como el Seol
  - el celo tan inexorable como el Seol
  lexicon: HALOT
  rationale: קִנְאָה puede ser «celos», «celo» o «ardor»; aquí se conserva «celos» por su valor léxico y afectivo. קָשָׁה describe algo duro/riguroso; «inexorables» comunica bien la idea de implacabilidad en relación con Seol sin suavizar la tensión del hebreo.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: el Seol
  alternatives_spanish:
  - Sheol
  - el sepulcro
  - la tumba
  lexicon: HALOT
  rationale: Se preserva el término hebreo en forma hispana para no reducirlo a una tumba física. La nota puede mantener la posibilidad interpretativa de «la tumba» o «el sepulcro».
- source_word: רְשָׁפֶיהָ / רִשְׁפֵּי אֵשׁ
  english_pob_choice: Its flashes are flashes of fire
  chosen_spanish: Sus destellos son destellos de fuego
  alternatives_spanish:
  - Sus chispas son chispas de fuego
  - Sus relámpagos son relámpagos de fuego
  lexicon: HALOT
  rationale: רֶשֶׁף puede expresar chispa, resplandor o ráfaga ígnea. «Destellos» preserva la vivacidad poética y funciona bien con la repetición enfática del hebreo.
- source_word: שַׁלְהֶבֶתְ יָה
  english_pob_choice: a flame of Yah
  chosen_spanish: una llama de Yah
  alternatives_spanish:
  - una llama de Yahvé
  - una llama poderosa
  - una llama ardiente
  lexicon: HALOT
  rationale: El texto hebreo contiene explícitamente יָה; se conserva «Yah» para no borrar el elemento teofórico. «Llama» es natural en español y respeta el énfasis poético.
theological_decisions:
- issue: Si שַׁלְהֶבֶתְ יָה debe leerse como referencia explícita al nombre divino o como intensificador poético
  english_pob_reading: 'Retain explicit divine-name element: ''a flame of Yah'''
  chosen_spanish_reading: 'Conservar el elemento del nombre divino: «una llama de Yah»'
  alternative_spanish_readings:
  - una llama poderosa
  - una llama ardiente
  - una llama de Yahvé
  rationale: El hebreo incluye יָה de forma explícita. Mantenerlo en la traducción hace visible la huella del texto fuente y deja abierta la fuerza teológica y poética del giro.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo traducir קִנְאָה en un contexto amoroso sin borrar su tensión léxica
  english_pob_reading: Keep lexical core with 'jealousy'
  chosen_spanish_reading: Conservar el núcleo léxico con «celos»
  alternative_spanish_readings:
  - celo
  - ardor
  - pasión
  rationale: Aunque el contexto es amoroso, el sustantivo hebreo suele expresar celos o celo con matiz de exclusividad. «Celos» preserva mejor esa tensión que una palabra más suave.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto quedó sin modificaciones respecto del pase anterior. El control cruzado reportó alta concordancia y solo observaciones menores.'
  spanish_consistency_notes:
  - Se conserva «Yah» en vez de sustituirlo por una perífrasis que oculte el elemento del nombre divino.
  - «Seol» se mantiene como transliteración hispanizada para preservar la especificidad del término hebreo.
  - Se usa «celos» para reflejar la fuerza léxica de קִנְאָה sin convertirla en «pasión» o «ardor».
  - Se prefirió «destellos» para רְשָׁפִים / רִשְׁפֵּי אֵשׁ por su naturalidad en español y por respetar la repetición poética del hebreo.
