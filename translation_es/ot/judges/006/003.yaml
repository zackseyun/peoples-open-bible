review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura iterativa del hebreo (וְהָיָה אִם ...), el sentido agrícola de זָרַע, los nombres propios Madián/Amalec y el avance hostil expresado por עלה. También preserva adecuadamente la decisión auditada de verter el sufijo singular עָלָיו con plural natural en español. Sin embargo, la nota al pie está anclada al sintagma equivocado: la observación sobre «contra él/ellos» debe ir donde aparece «contra ellos», no en «Oriente».'
  spanish_quality_summary: 'El español es claro y bíblicamente legible. No obstante, «Y sucedía que, cuando» suena algo pesado; «Y sucedía que cuando» o «Cada vez que» sería más natural. Además, la repetición de «subían ... y subían» resulta torpe; conviene coordinar una sola vez el sujeto compuesto y luego expresar «subían contra ellos». La mayor corrección necesaria es técnica: reubicar la nota al pie al lugar correcto.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Madián», «Amalec», «Israel» y «contra ellos» están bien. «Los hijos de Oriente» es defendible por su cercanía al hebreo, aunque «los pueblos de Oriente» sería más idiomático; no es un problema grave. No intervienen términos teológicos sensibles del glosario principal.
  issues:
  - severity: medium
    issue: La nota al pie [a] está colocada en «Oriente» pero comenta el sufijo singular de «contra él/ellos».
    rationale: El anclaje debe coincidir exactamente con la palabra o frase relevante en `spanish_text`. Tal como está, induce a pensar que la nota explica «Oriente», cuando en realidad explica עָלָיו.
  - severity: low
    issue: La secuencia «subían Madián, Amalec y los hijos de Oriente, y subían contra ellos» es algo torpe en español.
    rationale: Aunque refleja la repetición verbal hebrea, en español puede conservarse el sentido con una sola mención del sujeto compuesto y un predicado más fluido, sin pérdida de fidelidad.
  - severity: low
    issue: «Y sucedía que, cuando» suena ligeramente recargado.
    rationale: La construcción es comprensible, pero una formulación como «Y sucedía que cuando» mejora la naturalidad sin alterar el valor iterativo.
  revised_spanish_text: Y sucedía que cuando Israel sembraba, Madián, Amalec y los hijos de Oriente subían contra ellos[a].
  revised_footnotes:
  - marker: a
    text: El hebreo tiene el sufijo singular «contra él», referido colectivamente a Israel; en español se vierte de forma natural como «contra ellos».
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido iterativo y el valor de los términos hebreos, pero se corrige el anclaje de la nota al pie para que corresponda a «contra ellos», y se mejora levemente la fluidez española eliminando la repetición innecesaria de «subían».
