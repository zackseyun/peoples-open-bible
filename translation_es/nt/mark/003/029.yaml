translation:
  language: es
  text: pero cualquiera que blasfeme contra el Espíritu Santo nunca tiene perdón[a], sino que es culpable de un pecado eterno[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: “no tiene perdón hacia la era”, es decir, “nunca tiene perdón” o “no tiene perdón para siempre”.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «está sujeto a un pecado eterno».'
    reason: lexical_alternative
  - marker: c
    text: Algunos manuscritos leen “juicio eterno” o “condenación eterna” en lugar de “pecado eterno”.
    reason: textual_variant
lexical_decisions:
- source_word: ὃς δ’ ἂν
  english_pob_choice: but whoever
  chosen_spanish: pero cualquiera que
  alternatives_spanish:
  - y cualquiera que
  - sin embargo, cualquiera que
  lexicon: BDAG
  rationale: La construcción indefinida con ὃς ἂν se vierte con naturalidad en español como “cualquiera que”. El δέ es levemente adversativo en este contexto, por lo que “pero” mantiene el contraste con la cláusula anterior sin volver el español forzado.
- source_word: βλασφημήσῃ
  english_pob_choice: blasphemes
  chosen_spanish: blasfeme
  alternatives_spanish:
  - hable injuriosamente
  - revile
  lexicon: BDAG
  rationale: “Blasfeme” conserva la fuerza religiosa y teológica del verbo griego βλασφημέω. Otras opciones son más explicativas o menos precisas para este contexto.
- source_word: εἰς τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: against the Holy Spirit
  chosen_spanish: contra el Espíritu Santo
  alternatives_spanish:
  - hacia el Espíritu Santo
  - en contra del Espíritu Santo
  lexicon: BDAG
  rationale: Aunque εἰς literalmente puede significar “hacia/into”, con βλασφημέω funciona idiomáticamente como el objeto o blanco de la ofensa. “Contra el Espíritu Santo” es la equivalencia más natural y fiel en español.
- source_word: οὐκ ἔχει ἄφεσιν
  english_pob_choice: never has forgiveness
  chosen_spanish: nunca tiene perdón
  alternatives_spanish:
  - no tiene perdón
  - jamás tiene perdón
  lexicon: BDAG
  rationale: ἄφεσις puede ser “perdón” o “remisión”. En este contexto, “perdón” comunica con claridad la falta absoluta expresada por la negación y la frase temporal siguiente. “Nunca” refleja el valor idiomático de εἰς τὸν αἰῶνα sin necesidad de sobrecargar el texto principal.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: never
  chosen_spanish: nunca
  alternatives_spanish:
  - para siempre
  - por la era
  - hasta la eternidad
  lexicon: BDAG
  rationale: Literalmente significa “hasta/para el siglo o era”, pero en contextos negativos el giro idiomático equivale a “nunca” o “para siempre”. En español, “nunca” encaja de manera directa con “tiene perdón” y reproduce bien el efecto del griego.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: Aquí ἀλλά introduce un contraste fuerte entre “no tiene perdón” y la consecuencia afirmativa. En español, “sino que” expresa con mayor precisión esa corrección/contraposición que un simple “pero”.
- source_word: ἔνοχός ἐστιν
  english_pob_choice: is guilty
  chosen_spanish: es culpable
  alternatives_spanish:
  - está sujeto a
  - es responsable
  lexicon: BDAG
  rationale: ἔνοχος puede significar “culpable” o “liable”. “Es culpable” es la opción más clara y natural en español, y mantiene la idea de estar sujeto a la imputación del pecado señalado.
- source_word: αἰωνίου ἁμαρτήματος
  english_pob_choice: of an eternal sin
  chosen_spanish: de un pecado eterno
  alternatives_spanish:
  - de un pecado de duración eterna
  - de un pecado de la era
  lexicon: BDAG
  rationale: El texto griego leído aquí es ἁμαρτήματος (“pecado”), no κρίσεως (“juicio”). Por eso la traducción principal debe decir “pecado eterno”. “Eterno” conserva la cualidad durativa/escatológica de αἰωνίου sin suavizarla.
theological_decisions:
- issue: Naturaleza del pecado imperdonable
  english_pob_reading: Retain the text's direct wording about blasphemy against the Holy Spirit without adding interpretive qualifiers.
  chosen_spanish_reading: Mantener la formulación directa sobre blasfemar contra el Espíritu Santo, sin añadir una explicación doctrinal al cuerpo del versículo.
  alternative_spanish_readings:
  - rechazar persistentemente el testimonio del Espíritu
  - atribuir al diablo la obra del Espíritu
  rationale: El versículo mismo enuncia la falta con sobriedad. Para no resolver la tensión teológica que el pasaje deja abierta, el texto español sigue de cerca la forma del griego y reserva la explicación para el contexto, no para la traducción principal.
  doctrine_reference: Preservar la tensión teológica sin clausurarla interpretativamente.
- issue: Variante textual al final del versículo
  english_pob_reading: Translate the SBLGNT reading 'eternal sin.'
  chosen_spanish_reading: Traducir la lectura del SBLGNT como 'pecado eterno'.
  alternative_spanish_readings:
  - juicio eterno
  - condenación eterna
  rationale: La forma presentada por el texto base es ἁμαρτήματος, así que la traducción principal debe reflejar 'pecado'. La variante conocida se conserva como nota para mantener la auditabilidad textual.
  doctrine_reference: Priorizar la lectura griega provista y anotar la variante textual conocida.
translation_notes:
  revision_awareness: El pasaje fue revisado en el último pase y quedó sin cambios; esta versión mantiene la misma decisión de traducir directamente la lectura SBLGNT ἁμαρτήματος y de expresar el valor idiomático de εἰς τὸν αἰῶνα mediante 'nunca'.
  spanish_consistency_notes:
  - Se mantiene 'Espíritu Santo' como forma fija para πνεῦμα τὸ ἅγιον.
  - Se evita 'SEÑOR' o perífrasis doctrinales no presentes en el griego.
  - '''perdón'' se usa para ἄφεσις por ser la equivalencia más natural en este contexto.'
  - '''pecado eterno'' conserva la lectura griega documentada y deja la variante textual en nota.'
