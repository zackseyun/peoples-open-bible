translation:
  language: es
  text: Dieron Hebrón a Caleb[a], como había dicho Moisés, y expulsó de allí a los tres hijos de Anac.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los tres descendientes de Anac» o «los tres anakitas». El hebreo dice «hijos de Anac», lo cual puede referirse a descendencia de clan y no necesariamente a hijos inmediatos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  english_pob_choice: They gave
  chosen_spanish: Le dieron
  alternatives_spanish:
  - Y le dieron
  - Se la dieron
  lexicon: HALOT
  rationale: El verbo נתן en narración se traduce de forma directa con "dar"; el dativo לְכָלֵב se expresa naturalmente en español como "le". Se omite la conjunción inicial para un estilo fluido, sin perder la secuencia narrativa.
- source_word: לְכָלֵב
  english_pob_choice: to Caleb
  chosen_spanish: a Caleb / le
  alternatives_spanish:
  - para Caleb
  - a Caleb
  lexicon: HALOT
  rationale: El nombre propio se mantiene como Caleb. El complemento indirecto se integra con el pronombre clítico "le" para evitar una construcción pesada y conservar la relación verbal del hebreo.
- source_word: אֶת חֶבְרוֹן
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  alternatives_spanish:
  - la ciudad de Hebrón
  lexicon: HALOT
  rationale: El objeto directo es el topónimo Hebrón; en español se conserva el nombre propio con acento gráfico estándar. No se añade "ciudad" porque el hebreo no lo explicita.
- source_word: כַּאֲשֶׁר דִּבֶּר מֹשֶׁה
  english_pob_choice: as Moses had said
  chosen_spanish: como había dicho Moisés
  alternatives_spanish:
  - como había hablado Moisés
  - tal como Moisés había dicho
  lexicon: HALOT
  rationale: כַּאֲשֶׁר introduce comparación temporal/normativa, y דִּבֶּר aquí se entiende bien como "dijo" en español moderno. El pluscuamperfecto refleja la referencia anterior a la palabra de Moisés.
- source_word: וַיּוֹרֶשׁ
  english_pob_choice: he drove out
  chosen_spanish: expulsó
  alternatives_spanish:
  - desposeyó
  - echó de allí
  lexicon: HALOT
  rationale: El hiphil de ירש puede implicar despojar o expulsar para tomar posesión. En este contexto, con un objeto humano y lugar de origen, "expulsó" comunica la acción de manera natural en español sin perder la fuerza de desalojo.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: HALOT
  rationale: La referencia retoma Hebrón de forma adverbial. "De allí" es la opción más idiomática en español y mantiene la relación espacial del hebreo.
- source_word: אֶת שְׁלֹשָׁה בְּנֵי הָעֲנָק
  english_pob_choice: the three sons of Anak
  chosen_spanish: a los tres hijos de Anac
  alternatives_spanish:
  - a los tres descendientes de Anac
  - a los tres anakitas
  lexicon: HALOT
  rationale: Se conserva la transparencia del hebreo con "hijos de Anac". "Hijos" puede señalar descendencia/clan además de filiación inmediata; por eso se registra la alternativa interpretativa en nota. "Anac" sigue la forma española habitual del nombre.
translation_notes:
  revision_awareness: Se siguió el testimonio hebreo WLC y se mantuvo alta concordancia con la traducción inglesa auditada. La única tensión relevante es la expresión בני הענק, que en español puede sonar biológica si se vierte literalmente; por eso se conserva en el texto principal y se explicitan sus posibles sentidos en la nota.
  spanish_consistency_notes:
  - Se usa «Hebrón» y «Anac» con acentuación y forma española estándar.
  - Se mantiene el verbo de desalojo en sentido fuerte («expulsó») para reflejar el hiphil de ירש sin suavizarlo en exceso.
  - El pronombre dativo «le» reproduce la relación de לְכָלֵב de manera natural en español.
  - No se introduce «Mesías», «SEÑOR» ni otros términos no presentes en este versículo.
