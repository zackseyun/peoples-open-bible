translation:
  language: es
  text: Y todo el oro de la contribución[a] que presentaron a Yahvé fue de dieciséis mil setecientos cincuenta siclos, de los jefes de millares y de los jefes de centenas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la ofrenda'; tradicionalmente, 'la ofrenda elevada'. El término hebreo denota una contribución apartada para Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... was
  chosen_spanish: y ... fue
  alternatives_spanish:
  - y ... era
  - entonces ... fue
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce el total de la suma; en español, 'y ... fue' mantiene la conexión discursiva y expresa el resultado de manera natural.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todo el
  alternatives_spanish:
  - todo
  - la totalidad de
  lexicon: HALOT
  rationale: '''כָּל'' marca totalidad; ''todo el'' conserva ese valor sin sonar forzado en español.'
- source_word: זְהַב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - el oro
  lexicon: HALOT
  rationale: El sustantivo material se traduce de forma directa. En español, 'oro' funciona naturalmente con el artículo implícito en la sintaxis del verso.
- source_word: הַתְּרוּמָה
  english_pob_choice: the contribution
  chosen_spanish: la contribución
  alternatives_spanish:
  - la ofrenda
  - la contribución elevada
  lexicon: HALOT
  rationale: La POB inglesa eligió 'contribution' para reflejar el sentido de algo apartado/dedicado. 'Contribución' es claro y conserva el matiz de entrega separada sin recurrir a la fórmula tradicional oscura.
- source_word: אֲשֶׁר הֵרִימוּ
  english_pob_choice: that they presented
  chosen_spanish: que presentaron
  alternatives_spanish:
  - que levantaron
  - que ofrecieron
  lexicon: HALOT
  rationale: '''הֵרִימוּ'' en este contexto cultual indica poner aparte o presentar como don dedicado. ''Presentaron'' expresa bien ese acto en español y evita una imagen demasiado literal de ''levantar''.'
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - al Yahvé
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: La norma del proyecto pide 'Yahvé' para יְהוָה en el texto principal. Aquí 'a Yahvé' mantiene la direccionalidad de dedicación del hebreo לְ y evita la sustitución por 'Señor'.
- source_word: שִׁשָּׁה עָשָׂר אֶלֶף שְׁבַע מֵאוֹת וַחֲמִשִּׁים
  english_pob_choice: sixteen thousand seven hundred and fifty
  chosen_spanish: dieciséis mil setecientos cincuenta
  alternatives_spanish:
  - '16.750'
  - dieciséis mil setecientos y cincuenta
  lexicon: HALOT
  rationale: Se conserva el valor numérico exacto con una formulación natural en español estándar.
- source_word: שָׁקֶל
  english_pob_choice: shekels
  chosen_spanish: siclos
  alternatives_spanish:
  - shekels
  lexicon: HALOT
  rationale: '''Siclo'' es el equivalente español asentado para la unidad de peso antigua; el plural concuerda con el número.'
- source_word: מֵאֵת
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - procedentes de
  - por parte de
  lexicon: HALOT
  rationale: La preposición indica fuente/origen de la contribución. 'De' reproduce con naturalidad esa relación en español.
- source_word: שָׂרֵי הָאֲלָפִים
  english_pob_choice: the commanders of the thousands
  chosen_spanish: los jefes de los millares
  alternatives_spanish:
  - los comandantes de los millares
  - los jefes sobre los millares
  lexicon: HALOT
  rationale: '''שָׂרֵי'' puede ser jefes, oficiales o comandantes. ''Jefes'' es amplio y fiel. ''Millares'' conserva el sustantivo plural ligado a unidades organizativas/militares.'
- source_word: וּמֵאֵת שָׂרֵי הַמֵּאוֹת
  english_pob_choice: and from the commanders of the hundreds
  chosen_spanish: y de los jefes de las centenas
  alternatives_spanish:
  - y de los comandantes de las centenas
  - y de los jefes sobre las centenas
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la frase anterior. 'Centenas' traduce literalmente el término numérico-organizativo y preserva la estructura del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton. El proyecto español emplea 'Yahvé' como forma principal, preservando el nombre del pacto sin el reemplazo convencional por mayúsculas.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Naturaleza de תְּרוּמָה en contexto de botín dedicado
  english_pob_reading: the contribution
  chosen_spanish_reading: la contribución
  alternative_spanish_readings:
  - la ofrenda
  - la ofrenda elevada
  rationale: No se trata de una simple donación civil, sino de algo apartado para Yahvé. 'Contribución' conserva el valor de entrega dedicada y evita imponer una terminología cultual tradicional que en español puede oscurecer el sentido.
  doctrine_reference: HALOT; contexto de ofrenda dedicada en Números 31
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios posteriores en el texto base y el cotejo indicó alto acuerdo. La redacción española sigue la decisión inglesa auditada de usar un término claro para תְּרוּמָה y conserva la referencia explícita al nombre divino.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' en el texto principal, conforme a la terminología del proyecto para יְהוָה.
  - '''Contribución'' se usó de modo consistente con la decisión inglesa auditada y se explicó en nota la alternativa tradicional ''ofrenda elevada''.'
  - Se evitó 'SEÑOR' como máscara del nombre divino y se conservó la estructura cuantitativa y administrativa del hebreo.
