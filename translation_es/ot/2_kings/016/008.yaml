translation:
  language: es
  text: Acaz tomó la plata y el oro que se hallaban en la casa de Yahvé y en las tesorerías de la casa del rey, y envió un soborno[a] al rey de Asiria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tributo' o 'regalo'; la palabra hebrea comúnmente lleva el sentido de soborno.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - se llevó
  - recogió
  lexicon: HALOT
  rationale: El wayyiqtol de לקח se expresa naturalmente en español narrativo con el pasado simple 'tomó'. Mantiene la acción directa sin añadir matices no presentes en el hebreo.
- source_word: הַכֶּסֶף
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - la plata dinero
  - el dinero de plata
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto 'plata', paralelo a 'oro', como material/riqueza valiosa, sin convertirlo en una suma monetaria explícita.
- source_word: הַזָּהָב
  english_pob_choice: the gold
  chosen_spanish: el oro
  alternatives_spanish:
  - oro
  lexicon: HALOT
  rationale: Se mantiene el metal precioso de forma directa y paralela a 'plata'.
- source_word: הַנִּמְצָא
  english_pob_choice: that was found
  chosen_spanish: que se hallaban
  alternatives_spanish:
  - que estaban disponibles
  - que se encontraron
  lexicon: HALOT
  rationale: El participio pasivo comunica lo que estaba a disposición/ubicado allí. En español, 'se hallaban' fluye mejor y conserva la pasividad sin exagerar.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: Se sigue la decisión del POB de transliterar el Nombre divino como 'Yahvé'. 'Casa' conserva el paralelismo con 'casa del rey' y evita sustituir por 'templo' sin necesidad.
- source_word: וּבְאֹצְרוֹת
  english_pob_choice: and in the treasuries
  chosen_spanish: y en los tesoros
  alternatives_spanish:
  - y en las tesorerías
  - y en las cámaras del tesoro
  lexicon: HALOT
  rationale: '''Tesoros'' comunica bien el lugar/depósito de bienes en español y evita una forma demasiado técnica. Aunque el plural hebreo puede sugerir depósitos, el contexto de riqueza real favorece esta elección.'
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: the king’s house
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - el palacio del rey
  - la residencia del rey
  lexicon: HALOT
  rationale: Se preserva la repetición de 'casa' del hebreo y la correspondencia con 'casa de Yahvé', manteniendo el contraste literario.
- source_word: וַיִּשְׁלַח
  english_pob_choice: and sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - remitió
  lexicon: HALOT
  rationale: El verbo de envío se expresa de forma directa con 'envió'. La referencia al objeto enviado queda implícita en el sintagma siguiente, como en el hebreo.
- source_word: לְמֶלֶךְ אַשּׁוּר
  english_pob_choice: to the king of Assyria
  chosen_spanish: al rey de Asiria
  alternatives_spanish:
  - al rey asirio
  lexicon: HALOT
  rationale: Se mantiene la construcción simple y transparente del texto fuente.
- source_word: שֹׁחַד
  english_pob_choice: a bribe
  chosen_spanish: un soborno
  alternatives_spanish:
  - un tributo
  - un regalo
  lexicon: HALOT
  rationale: '''Soborno'' refleja el sentido habitual y moralmente cargado de שֹׁחַד en este contexto, sin suavizarlo con ''tributo'' o ''regalo''. Aunque el inglés POB anotó esas alternativas, el contexto narrativo favorece claramente la lectura negativa.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue el principio del POB de no ocultar el Nombre propio del pacto. En español, 'Yahvé' es la forma principal elegida para el Tetragrama, manteniendo continuidad con la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: שֹׁחַד en contexto político
  english_pob_reading: bribe
  chosen_spanish_reading: soborno
  alternative_spanish_readings:
  - tributo
  - regalo
  rationale: El contexto describe un pago motivado por conveniencia política y no un homenaje neutro. Traducirlo como 'soborno' conserva la valoración ética y la tensión documental de la fuente.
  doctrine_reference: HALOT / English POB lexical note on שֹׁחַד
translation_notes:
  revision_awareness: La redacción sigue el pass de revisión que eliminó el añadido explicativo innecesario ('it as') y conserva la estructura directa 'envió un soborno al rey de Asiria' en español, sin introducir un objeto pronominal adicional.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo 'casa de Yahvé' / 'casa del rey' como rasgo literario central del versículo.
  - Se evitó 'templo' para בֵּית יְהוָה a fin de conservar la fórmula literal del hebreo y la terminología POB.
  - No se añadió nota al pie porque el versículo puede traducirse fielmente sin ambigüedad textual adicional en español.
