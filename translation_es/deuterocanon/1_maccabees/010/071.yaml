    issue: «enfrentémonos allí» sobretraduce συγκριθῶμεν ἑαυτοῖς en el texto principal
    rationale: El expediente inglés eligió una formulación más contenida («let us meet there») y dejó «engage one another» como alternativa de nota. El español principal debería conservar esa misma cautela y dejar la confrontación explícita para nota.
  - severity: medium
    issue: «baja a nosotros» es poco idiomático en español
    rationale: Aunque reproduce literalmente πρὸς ἡμᾶς, en español suena forzado. «Baja adonde estamos» preserva el movimiento hacia el interlocutor sin calco extraño.
  - severity: low
    issue: La nota [a] no corresponde bien a la alternativa auditada
    rationale: «Midámonos allí» desplaza el sentido hacia medición o comparación competitiva. La alternativa documentada en inglés es más bien «entablemos combate / enfrentémonos», es decir, confrontación directa.
