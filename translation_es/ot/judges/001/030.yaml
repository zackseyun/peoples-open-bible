translation:
  language: es
  text: Zabulón no expulsó a los habitantes de Quitrón ni a los habitantes de Nahalol[a], así que los cananeos[b] vivieron entre ellos y quedaron sometidos a trabajos forzados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Nahalal»; la tradición inglesa y pasajes relacionados a veces conservan esa forma del nombre.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «el cananeo habitó en medio de él/ello», con un singular colectivo para el pueblo y un sufijo singular que probablemente se refiere a Zabulón como tribu.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹרִישׁ
  english_pob_choice: drive out
  chosen_spanish: expulsó
  alternatives_spanish:
  - desposeyó
  - echó fuera
  lexicon: HALOT
  rationale: En Jueces 1 este Hiphil de ירש indica quitar o remover a los habitantes anteriores del territorio. «Expulsó» comunica bien la acción de sacar a un pueblo de la tierra sin cargar el texto con un tecnicismo innecesario.
- source_word: יוֹשְׁבֵי
  english_pob_choice: inhabitants of
  chosen_spanish: habitantes de
  alternatives_spanish:
  - los que habitaban en
  - residentes de
  lexicon: HALOT
  rationale: El participio de ישב designa a quienes moran en un lugar. «Habitantes de» es natural en español y conserva el sentido territorial.
- source_word: קִטְרוֹן
  english_pob_choice: Kitron
  chosen_spanish: Quitrón
  alternatives_spanish:
  - Kitrón
  lexicon: Nombre propio transliterado
  rationale: Se mantiene el nombre propio en forma castellana adaptada, con ortografía transparente para lectores en español.
- source_word: נַהֲלֹל
  english_pob_choice: Nahalol
  chosen_spanish: Nahalol
  alternatives_spanish:
  - Nahalal
  lexicon: Nombre propio transliterado
  rationale: Se conserva la vocalización de este versículo. «Nahalal» es una variante tradicional, pero aquí «Nahalol» refleja más de cerca la forma hebrea dada.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: el cananeo[b]
  alternatives_spanish:
  - los cananeos
  lexicon: HALOT
  rationale: El hebreo usa singular colectivo. En español puede mantenerse la singularidad lexical para no borrar la forma del original; la nota explica que funciona colectivamente.
- source_word: בְּקִרְבּוֹ
  english_pob_choice: among them
  chosen_spanish: en medio de ellos
  alternatives_spanish:
  - en su interior
  - entre ellos
  lexicon: HALOT
  rationale: La preposición + sustantivo expresa estar dentro del grupo o en su centro. «En medio de ellos» comunica de manera natural la relación colectiva que el inglés POB resolvió con «among them».
- source_word: לָמַס
  english_pob_choice: forced labor
  chosen_spanish: esclavos de trabajos forzados
  alternatives_spanish:
  - trabajo forzado
  - servicio forzoso
  - corvea
  lexicon: HALOT
  rationale: El término מַס en este contexto denota labor obligatoria impuesta a una población sometida. «Esclavos de trabajos forzados» conserva la fuerza coercitiva y evita reducirlo a un simple tributo monetario.
- source_word: וַיִּהְיוּ לָמַס
  english_pob_choice: became forced labor
  chosen_spanish: llegaron a ser esclavos de trabajos forzados
  alternatives_spanish:
  - fueron puestos a trabajos forzados
  - quedaron sometidos a trabajos forzados
  lexicon: HALOT
  rationale: La cláusula expresa el estado resultante. La redacción elegida mantiene el valor de cambio de estado sin convertirlos literalmente en «trabajo»; además preserva el plural implícito que el inglés POB explicitó con «laborers».
theological_decisions:
- issue: Singular colectivo en הַכְּנַעֲנִי y referencia tribal en el sufijo de בְּקִרְבּוֹ
  english_pob_reading: Render collectively as 'the Canaanites lived among them'
  chosen_spanish_reading: Mantener «el cananeo» como singular colectivo y explicarlo en nota
  alternative_spanish_readings:
  - los cananeos vivieron entre ellos
  - el cananeo vivió en medio de él/ello
  rationale: No es un asunto doctrinal sino de representación del hebreo. El singular colectivo y el sufijo singular se conservan en la traducción principal para no perder la tensión formal del texto; la nota aclara el valor colectivo entendido por el lector.
  doctrine_reference: Principios de traducción POB §5-6 (consistencia y legibilidad; excepciones documentadas)
translation_notes:
  revision_awareness: La versión inglesa revisada añadió «laborers» para hacer más natural el plural de quienes quedaron sometidos a trabajos forzados. En español se reflejó ese matiz con «esclavos de trabajos forzados», evitando una lectura demasiado abstracta de לָמַס.
  spanish_consistency_notes:
  - Se usó «Yahvé» según el estándar del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se evitó «SEÑOR» y también «Cristo», porque no corresponden al contenido del versículo.
  - «Cananeo» se dejó en singular por fidelidad al colectivo hebreo, con explicación en nota; la alternancia plural sigue disponible como lectura interpretativa.
  - «Trabajos forzados» preserva el valor coercitivo de מַס sin convertirlo en un mero impuesto o tributo.
