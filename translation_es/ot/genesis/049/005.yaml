translation:
  language: es
  text: Simeón y Leví son hermanos[a]; las armas de violencia son sus espadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «las armas de violencia son sus implementos». El término hebreo vertido aquí como «sus espadas» es raro e incierto; traducciones antiguas tienen «sus moradas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוֹן
  english_pob_choice: Simeon
  chosen_spanish: Simeón
  alternatives_spanish:
  - Simeón
  lexicon: HALOT
  rationale: Nombre propio transliterado con la forma castellana habitual y reconocible; no se traduce el nombre.
- source_word: וְלֵוִי
  english_pob_choice: and Levi
  chosen_spanish: y Leví
  alternatives_spanish:
  - y Levi
  lexicon: HALOT
  rationale: Conjunción simple más nombre propio; se conserva la forma transparente del nombre con acentuación española para lectura natural.
- source_word: אַחִים
  english_pob_choice: are brothers
  chosen_spanish: son hermanos
  alternatives_spanish:
  - son hermanos
  - son parientes
  lexicon: HALOT
  rationale: El sustantivo significa literalmente 'hermanos'. En español se necesita un verbo copulativo implícito en la cláusula nominal; 'son' expresa la relación directa sin añadir matiz ajeno.
- source_word: כְּלֵי
  english_pob_choice: weapons
  chosen_spanish: las armas
  alternatives_spanish:
  - los instrumentos
  - los utensilios
  - las herramientas
  lexicon: HALOT
  rationale: En este contexto poético, junto con 'violencia', el campo semántico apunta a implementos de agresión. 'Armas' mantiene la fuerza hostil sin forzar una interpretación demasiado específica.
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - crueldad
  - maldad violenta
  - violencia / crueldad
  lexicon: HALOT
  rationale: Es la equivalencia más directa e idiomática de חָמָס; conserva la denuncia moral y el valor de violencia dañina.
- source_word: מְכֵרֹתֵיהֶם
  english_pob_choice: their swords
  chosen_spanish: sus espadas
  alternatives_spanish:
  - sus implementos
  - sus armas
  - sus moradas
  lexicon: HALOT
  rationale: La palabra es rara y de sentido incierto. Siguiendo el audit trail inglés, se ofrece una lectura concreta que encaja con el paralelismo de armas de violencia, sin ocultar la incertidumbre léxica.
theological_decisions:
- issue: Tratamiento del término raro מְכֵרֹתֵיהֶם
  english_pob_reading: their swords, with a footnote noting the lexical uncertainty and older 'habitations' reading
  chosen_spanish_reading: sus espadas, con nota sobre la alternativa 'sus implementos' y la posibilidad tradicional de 'sus moradas'
  alternative_spanish_readings:
  - sus implementos
  - sus instrumentos
  - sus moradas
  rationale: No hay base suficiente para fijar un sentido único. La traducción principal conserva la opción concreta adoptada por el POB inglés, mientras la nota preserva la tensión textual y la antigua tradición de traducción.
  doctrine_reference: Principio de transparencia textual y cautela ante lexema raro; no implica una decisión doctrinal.
translation_notes:
  revision_awareness: Se siguió el pasaje inglés con alta concordancia y sin revisiones aplicadas; se mantuvo la decisión léxica principal, preservando en nota la incertidumbre del término raro.
  spanish_consistency_notes:
  - Se usó «Simeón» y «Leví» con acentuación castellana habitual, manteniendo la transparencia transliterada.
  - Se eligió «armas» en lugar de «instrumentos» en el texto principal para reflejar el tono hostil del contexto, pero se preservó la alternativa en la nota.
  - Se evitó la traducción eclesiástica tradicional de 'moradas' en el cuerpo del texto por no ser la lectura principal adoptada en el POB inglés, aunque se conserva como alternativa histórica en la nota.
