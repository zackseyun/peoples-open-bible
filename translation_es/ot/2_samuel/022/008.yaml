translation:
  language: es
  text: Entonces la tierra tembló y se estremeció; los cimientos de los cielos temblaron y fueron sacudidos, porque se encendió su ira[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque él estaba airado». Lit. «porque su ira ardió» o «se encendió su ira».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּגְעַשׁ
  english_pob_choice: shook
  chosen_spanish: tembló
  alternatives_spanish:
  - se estremeció
  - se agitó
  lexicon: HALOT
  rationale: El hebreo expresa agitación violenta de la tierra en lenguaje poético. «Tembló» comunica el movimiento sísmico con naturalidad en español y evita repetir de modo excesivo la siguiente acción paralela.
- source_word: וַתִּרְעַשׁ
  english_pob_choice: quaked
  chosen_spanish: se estremeció
  alternatives_spanish:
  - tembló
  - se sacudió
  lexicon: HALOT
  rationale: Este verbo intensifica la sacudida. «Se estremeció» conserva la idea de conmoción fuerte y distingue el segundo verbo del primero sin perder el paralelismo.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra firme
  - el mundo
  lexicon: HALOT
  rationale: En este contexto teofánico y cósmico, «la tierra» reproduce bien el alcance amplio del hebreo.
- source_word: מוֹסְדוֹת הַשָּׁמַיִם
  english_pob_choice: the foundations of the heavens
  chosen_spanish: los cimientos de los cielos
  alternatives_spanish:
  - los fundamentos de los cielos
  - las bases de los cielos
  lexicon: HALOT
  rationale: Se preserva la imagen cosmológica con una expresión formal y transparente. «Cimientos» mantiene la metáfora estructural del hebreo y «cielos» refleja el plural hebreo.
- source_word: יִרְגָּזוּ
  english_pob_choice: trembled
  chosen_spanish: se agitaron
  alternatives_spanish:
  - tremblaron
  - temblaron
  lexicon: HALOT
  rationale: El verbo denota conmoción o agitación. «Se agitaron» funciona bien con el sujeto plural y sostiene el nivel poético del pasaje.
- source_word: וַיִּתְגָּעֲשׁוּ
  english_pob_choice: were shaken
  chosen_spanish: fueron sacudidos
  alternatives_spanish:
  - se sacudieron
  - se estremecieron
  lexicon: HALOT
  rationale: La forma reflexiva/intensiva sugiere sacudida fuerte. «Fueron sacudidos» conserva la fuerza de la imagen y el matiz pasivo/reflexivo documentado en la fuente inglesa.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: «Porque» expresa con claridad la relación causal en español contemporáneo sin añadir matiz explicativo indebido.
- source_word: חָרָה לוֹ
  english_pob_choice: he was angry
  chosen_spanish: él se enojó
  alternatives_spanish:
  - ardió su ira
  - se encendió su ira
  lexicon: HALOT
  rationale: El hebreo es un modismo de ira ardiente; el sentido principal es la indignación divina. «Se enojó» comunica la idea en español moderno sin perder la atribución de ira a Dios en el contexto.
theological_decisions:
- issue: Antropopatismo de la ira divina
  english_pob_reading: because he was angry
  chosen_spanish_reading: porque él se enojó
  alternative_spanish_readings:
  - porque ardió su ira
  - porque su ira se encendió
  rationale: El texto hebreo atribuye ira a Dios en lenguaje poético-teofánico. La traducción mantiene esa afirmación sin suavizarla ni explicarla en exceso, preservando la tensión teológica del original.
  doctrine_reference: Antropopatismo bíblico; lenguaje poético sobre la ira divina
translation_notes:
  revision_awareness: 'La revisión inglesa reciente prefirió una correspondencia más cercana al hebreo para el primer par verbal y mantuvo la idea de sacudida pasiva/reflexiva en el segundo. En español se refleja esa distinción con dos verbos cercanos pero no idénticos: «tembló y se estremeció» / «se agitaron y fueron sacudidos».'
  spanish_consistency_notes:
  - Se mantiene «cielos» en plural para reflejar la forma hebrea y el paralelo con la imaginería cósmica.
  - Se evita «SEÑOR»; no aparece el nombre divino en este versículo.
  - Se conserva un registro poético pero comprensible para lectura eclesial contemporánea.
