translation:
  language: es
  text: Mejor es vivir en una tierra desierta que vivir con una mujer pendenciera y airada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que vivir con una mujer contenciosa y airada». El término final puede entenderse como describiendo su disposición («airada») o el efecto que produce en otros («irritante», «provocadora»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: It is better
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Es mejor
  - Más vale
  lexicon: HALOT
  rationale: El hebreo presenta un adjetivo predicativo comparativo que abre un proverbio. En español, «Mejor es» conserva la forma proverbial y el sentido comparativo sin añadir más contenido del que el texto exige.
- source_word: שֶׁבֶת
  english_pob_choice: to live
  chosen_spanish: vivir
  alternatives_spanish:
  - habitar
  - dwell
  lexicon: HALOT
  rationale: Aquí funciona como infinitivo verbal de residencia estable. «Vivir» es natural en español y comunica permanencia mejor que una transliteración más rígida como «habitar» o «morar».
- source_word: בְּאֶרֶץ מִדְבָּר
  english_pob_choice: in a desert land
  chosen_spanish: en una tierra desierta
  alternatives_spanish:
  - en una tierra de desierto
  - en el desierto
  - en una tierra de soledad
  lexicon: HALOT
  rationale: La combinación preserva tanto אֶרֶץ («tierra») como מִדְבָּר («desierto / región baldía»). «Tierra desierta» suena natural en español y conserva la idea de un lugar inhóspito e inhabitado.
- source_word: מֵאֵשֶׁת
  english_pob_choice: than with a ... wife
  chosen_spanish: que con una mujer
  alternatives_spanish:
  - que con una esposa
  - que con una mujer de
  lexicon: HALOT
  rationale: El comparativo hebreo se expresa con «que». «Mujer» mantiene la referencia de manera directa y algo más abierta que «esposa», sin introducir un matiz conyugal más estrecho que el del hebreo.
- source_word: מדונים
  english_pob_choice: quarrelsome
  chosen_spanish: pendenciera
  alternatives_spanish:
  - contenciosa
  - quarrelosa
  - de pleito
  lexicon: HALOT
  rationale: El sustantivo plural abstracto funciona atributivamente con «mujer» y describe una disposición a la disputa. «Pendenciera» transmite habitual conflictividad con buen registro idiomático; «contenciosa» queda como alternativa más literal y más cercana a la tradición léxica de «contención».
- source_word: וָכָעַס
  english_pob_choice: angry
  chosen_spanish: airada
  alternatives_spanish:
  - enojada
  - enfadada
  - airada y enojada
  lexicon: HALOT
  rationale: El final puede expresar la ira de la mujer o el efecto provocador de su carácter. «Airada» refleja el campo semántico de כעס («ira, enojo») y mantiene un tono sobrio; la decisión deja abierta la tensión lexical señalada en el audit trail inglés.
translation_notes:
  revision_awareness: El inglés POB revisó el final de «vexing» a «angry» para reflejar con más precisión כָּעַס. La versión española sigue esa revisión con «airada», pero conserva en nota la posibilidad de una lectura alternativa ligada al efecto provocador del término.
  spanish_consistency_notes:
  - Se mantuvo «mujer» en lugar de «esposa» para no estrechar innecesariamente el hebreo אֵשֶׁת; la ambigüedad relacional queda dentro del proverbio.
  - '«Pendenciera» y «airada» reproducen dos rasgos distintos del paralelismo: conflicto relacional y enojo/disposición irritable.'
  - La puntuación y el orden buscan sonar proverbial en español sin perder la comparación implícita del hebreo.
