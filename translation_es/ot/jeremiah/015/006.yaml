  - marker: b
    text: O «de cambiar de parecer» / «de desistir de castigar». El verbo hebreo puede referirse a retirar o suavizar un juicio ya anunciado; no implica arrepentimiento moral en Dios.
    reason: theological_note
  revision_rationale: Se conserva el sentido fuente y la terminología del proyecto, pero se sustituye «relentarme» por «ceder», una opción idiomática y comprensible en español que comunica el cese o retiro del juicio sin sugerir arrepentimiento moral. Se reubican y reescriben las notas para que expliquen correctamente los puntos léxicos relevantes. También se elimina la repetición innecesaria de «tú» para mejorar la fluidez.
