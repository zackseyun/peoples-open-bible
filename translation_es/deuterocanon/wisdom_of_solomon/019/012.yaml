lexical_decisions:
- source_word: εἰς
  english_pob_choice: for
  chosen_spanish: para
  alternatives_spanish:
  - a fin de
  - con el propósito de
  lexicon: LSJ
  rationale: Con παραμυθίαν, εἰς expresa finalidad o resultado. En español, «para» comunica de modo natural la finalidad de la provisión sin volver la frase pesada.
- source_word: παραμυθίαν
  english_pob_choice: comfort
  chosen_spanish: consuelo
  alternatives_spanish:
  - comfort
  - consolación
  - alivio
  lexicon: LSJ
  rationale: El sustantivo puede significar consuelo o consolación. «Consuelo» es la opción más natural y digna en español, y conserva el matiz de alivio afectivo de la provisión divina.
- source_word: ἀνέβη
  english_pob_choice: came up
  chosen_spanish: subieron
  alternatives_spanish:
  - vinieron
  - ascendieron
  - subió
  lexicon: LSJ
  rationale: El verbo indica movimiento ascendente. En español, con el sujeto colectivo «las codornices», el plural verbal mantiene el sentido del colectivo inglés y la imagen de movimiento desde el mar.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: su
  alternatives_spanish:
  - para ellos
  - a ellos
  lexicon: LSJ
  rationale: El dativo marca beneficio. En español, «para su consuelo» integra el destinatario de manera idiomática y evita una construcción rígida.
- source_word: ἀπὸ θαλάσσης
  english_pob_choice: from the sea
  chosen_spanish: del mar
  alternatives_spanish:
  - desde el mar
  - desde el agua
  lexicon: LSJ
  rationale: La preposición y el sustantivo se traducen de forma directa. «Del mar» conserva la imagen y es plenamente natural en español.
- source_word: ὀρτυγομήτρα
  english_pob_choice: quail
  chosen_spanish: codornices
  alternatives_spanish:
  - codorniz
  - quail
  lexicon: LSJ
  rationale: El término designa codorniz. Dado que el contexto habla de la provisión de aves al pueblo, el plural español es más natural y explícito que el singular colectivo, sin perder la fuerza del original.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail al mantener la relación de finalidad entre εἰς παραμυθίαν y el beneficio del pueblo, prefiriendo una formulación nominal («para su consuelo») en vez de una verbalización más libre.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otra máscara, porque este versículo no contiene el nombre divino.
  - Se mantuvo un registro sobrio y bíblico, sin arcaísmos innecesarios.
  - Se eligió el plural «codornices» por claridad contextual, aunque el griego emplea un singular colectivo.
