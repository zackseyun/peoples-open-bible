  text: יְהִ֤י פִסַּת בַּ֨ר בָּ/אָרֶץ֮ בְּ/רֹ֪אשׁ הָ֫רִ֥ים יִרְעַ֣שׁ כַּ/לְּבָנ֣וֹן פִּרְי֑/וֹ וְ/יָצִ֥יצוּ מֵ֝/עִ֗יר כְּ/עֵ֣שֶׂב הָ/אָֽרֶץ־׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/072/016.yaml
  text: May there be abundance of grain in the land[a]; on the tops of the mountains may its fruit wave like Lebanon; and may they blossom from the city like the grass of the earth.
  footnotes:
