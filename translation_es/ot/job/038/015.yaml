translation:
  language: es
  text: A los impíos se les niega su luz, y el brazo levantado[a] es quebrado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Brazo» aquí probablemente simboliza fuerza o poder, especialmente poder violento.
    reason: lexical_alternative
  - marker: b
    text: O «el brazo levantado será quebrado». El imperfecto hebreo puede entenderse como futuro además de presente vívido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִמָּנַע
  english_pob_choice: is withheld
  chosen_spanish: es retenida
  alternatives_spanish:
  - es withheld
  - es impedida
  - se le niega
  lexicon: HALOT
  rationale: 'El nifal imperfecto expresa pasividad: algo queda retenido o impedido. "Es retenida" conserva la voz pasiva y suena natural en español bíblico contemporáneo.'
- source_word: מֵרְשָׁעִים
  english_pob_choice: from the wicked
  chosen_spanish: de los impíos
  alternatives_spanish:
  - de los malvados
  - de los perversos
  lexicon: HALOT
  rationale: La preposición de separación se expresa de modo natural con "de". "Impíos" mantiene la categoría moral general sin añadir matices no exigidos por el hebreo.
- source_word: אוֹרָם
  english_pob_choice: their light
  chosen_spanish: su luz
  alternatives_spanish:
  - la luz de ellos
  - su claridad
  lexicon: HALOT
  rationale: El posesivo español singular/plural puede funcionar de manera inclusiva aquí. "Su luz" es la forma más fluida y conserva la idea de una luz que les pertenece o de la que disfrutan.
- source_word: וּזְרוֹעַ
  english_pob_choice: and the arm
  chosen_spanish: y el brazo
  alternatives_spanish:
  - y la fuerza
  - y el antebrazo
  lexicon: HALOT
  rationale: Se conserva la imagen literal de "brazo", como en el hebreo, para no borrar el valor metafórico de fuerza o poder que queda implícito.
- source_word: רָמָה
  english_pob_choice: uplifted
  chosen_spanish: enaltecido
  alternatives_spanish:
  - levantado
  - elevado
  - alzando
  lexicon: HALOT
  rationale: El adjetivo/participio de רום describe algo levantado o en alto. "Enaltecido" mantiene la elevación y puede sugerir la actitud arrogante o poderosa del brazo, sin forzar una paráfrasis.
- source_word: תִּשָּׁבֵר
  english_pob_choice: is broken
  chosen_spanish: es quebrado
  alternatives_spanish:
  - será quebrado
  - es roto
  - se quiebra
  lexicon: HALOT
  rationale: El nifal de שבר admite un presente gnómico en poesía. "Es quebrado" conserva la pasividad y el tono sentencioso; "quebrado" también mantiene un registro digno y bíblico.
theological_decisions:
- issue: La luz negada a los impíos en clave de juicio divino
  english_pob_reading: Their light is withheld from the wicked.
  chosen_spanish_reading: Su luz es retenida de los impíos.
  alternative_spanish_readings:
  - La luz les es retenida a los impíos.
  - Su luz se les niega a los impíos.
  rationale: El hebreo presenta una acción de impedimento o privación. La redacción española mantiene la idea de juicio sin desplazar el foco hacia una explicación doctrinal más amplia que la del versículo.
  doctrine_reference: Providencia y juicio divino en la poesía de Job; cf. Job 38:12-15 en contexto.
- issue: El brazo como símbolo de poder violento o arrogante
  english_pob_reading: ‘Arm’ here likely symbolizes strength or power, especially violent power.
  chosen_spanish_reading: el brazo enaltecido
  alternative_spanish_readings:
  - el brazo levantado
  - la fuerza enaltecida
  - el poder alzado
  rationale: Se conserva el término corporal literal y se deja que el contexto sugiera su valor simbólico. Esto evita borrar la tensión entre imagen física y sentido figurado que el audit trail documenta.
  doctrine_reference: Lenguaje figurado en la poesía sapiencial; cf. Job 38:15, nota sobre el símbolo del brazo.
translation_notes:
  revision_awareness: 'Concordante con el último pase revisado: no se requieren cambios sustantivos respecto del consenso alto del texto fuente; se mantiene la lectura poética presente/gnómica para el pasivo final y la imagen literal del brazo, con nota explicativa sobre su valor simbólico.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto la exija explícitamente; este versículo no contiene el Tetragrámaton.
  - Se prefirió «impíos» por ser término bíblico claro y de amplio alcance, alineado con el campo semántico de רְשָׁעִים.
  - Se conservó el paralelismo breve de dos cola, propio del hebreo poético.
  - No se usó «Cristo» ni otra terminología cristológica, pues el pasaje no la contiene.
  - El tiempo verbal español se eligió para permitir una lectura gnómica sin introducir futuro obligatorio.
