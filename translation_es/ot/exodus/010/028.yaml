review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo: Faraón despide a Moisés, lo amenaza, prohíbe volver a ver su ''rostro'' y anuncia muerte si lo vuelve a ver. Conserva acertadamente la repetición de פָּנַי con ''rostro'' y vierte bien בְּיוֹם con ''el día que''. La única desalineación significativa está en la nota [a], que presenta como alternativa idiomática exactamente la misma redacción usada en el texto principal y no reproduce con claridad la relación entre la forma idiomática y el hebreo literal.'
  spanish_quality_summary: El español es natural, claro y digno. 'Aléjate de mí', 'Cuídate' y 'morirás' funcionan bien en registro bíblico moderno. Sin embargo, la nota [a] necesita reparación editorial para evitar redundancia y para expresar con mejor español la alternativa y el literal hebreo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Rostro' para פָּנַי está bien justificado y preserva la decisión auditada de mantener 'face' en vez de resolverla como 'presencia' en el cuerpo del texto. No aparecen términos sensibles del glosario mayor (Yahvé, Mesías, etc.) en este versículo.
  issues:
  - severity: medium
    issue: La nota [a] repite como alternativa la misma frase del texto principal.
    rationale: El texto principal dice 'no vuelvas a ver mi rostro', y la nota [a] ofrece 'no vuelvas a ver mi rostro' como opción idiomática. Eso vuelve la nota defectuosa editorialmente y no ayuda al lector a distinguir entre la opción adoptada, otras opciones idiomáticas y el literal hebreo.
  - severity: low
    issue: La formulación de la nota [a] puede sonar algo forzada en 'no añadas a ver mi rostro'.
    rationale: Como explicación del literal hebreo, conviene una formulación más clara en español, por ejemplo 'no sigas viendo mi rostro' como apoyo idiomático, manteniendo la aclaración de que literalmente el hebreo usa 'añadir' + infinitivo.
  revised_spanish_text: 'Entonces el faraón le dijo: «Aléjate de mí. Cuídate; no vuelvas a ver mi rostro[a], porque el día que veas mi rostro[b], morirás».'
  revised_footnotes:
  - marker: a
    text: 'O: "no veas más mi rostro" o "nunca vuelvas a ver mi rostro". El hebreo dice literalmente: "no añadas a ver mi rostro".'
    reason: lexical_alternative
  - marker: b
    text: '"Mi rostro" también puede entenderse como "mi presencia", pero el hebreo repite "rostro" para conservar el énfasis.'
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal, que es fiel y natural, pero se corrige la nota [a] para eliminar la redundancia con la redacción principal y representar mejor la alternativa idiomática frente al literal hebreo.
