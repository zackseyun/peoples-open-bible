translation:
  language: es
  text: Mueren en la juventud, y su vida entre los prostitutos de culto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entre los consagrados». El término hebreo probablemente alude a varones vinculados con prostitución cultual pagana.'
    reason: alternative_reading
lexical_decisions:
- source_word: תָּמֹת
  english_pob_choice: die
  chosen_spanish: mueren
  alternatives_spanish:
  - mueren
  - perecen
  - llegan a su fin
  lexicon: HALOT
  rationale: El hebreo usa una forma verbal de מות con sujeto colectivo en el marco del versículo. En español, 'mueren' comunica de manera natural la idea sin añadir matices interpretativos ajenos al texto.
- source_word: בַּנֹּעַר
  english_pob_choice: in youth
  chosen_spanish: en la juventud
  alternatives_spanish:
  - en su juventud
  - cuando son jóvenes
  - siendo jóvenes
  lexicon: HALOT
  rationale: '''נֹעַר'' indica la etapa de juventud o temprana vida. ''En la juventud'' conserva la brevedad y la referencia temporal del hebreo.'
- source_word: נַפְשָׁם
  english_pob_choice: they
  chosen_spanish: mueren
  alternatives_spanish:
  - su alma
  - su vida
  - ellos
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ funciona idiomáticamente como el sujeto afectado por la muerte. En español, la idea se expresa de forma natural con el verbo plural 'mueren', evitando una formulación literal como 'su alma muere' que resultaría extraña.
- source_word: וְחַיָּתָם
  english_pob_choice: their life
  chosen_spanish: su vida
  alternatives_spanish:
  - su vida
  - su existencia
  - su vitalidad
  lexicon: HALOT
  rationale: El sustantivo derivado de חיה refiere aquí a la vida o duración vital. 'Su vida' mantiene la paralela del hebreo y evita añadir un verbo que el texto no da.
- source_word: בַּקְּדֵשִׁים
  english_pob_choice: among the cult prostitutes
  chosen_spanish: entre los prostitutos sagrados
  alternatives_spanish:
  - entre los prostitutos de culto
  - entre los dedicados
  - entre los prostitutos del santuario
  lexicon: HALOT
  rationale: קְדֵשִׁים en este contexto no significa simplemente 'consagrados', sino varones vinculados a práctica sexual cultual ilícita. 'Prostitutos sagrados' intenta conservar tanto la raíz de santidad/consagración como el matiz negativo que el POB documenta.
theological_decisions:
- issue: Sentido de קְדֵשִׁים
  english_pob_reading: male cult prostitutes
  chosen_spanish_reading: prostitutos sagrados
  alternative_spanish_readings:
  - consagrados
  - prostitutos del templo
  - varones consagrados
  rationale: La evidencia auditada del POB favorece la lectura histórica y cultual negativa del término. 'Prostitutos sagrados' mantiene la tensión entre la forma etimológica y el sentido probable, sin suavizarlo hacia una lectura genérica de santidad.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Se siguió el pasaje hebreo directo y el ajuste del POB inglés que eliminó el verbo añadido en la segunda cola. La decisión principal en español fue cómo reflejar קְדֵשִׁים: se conservó el valor cultual negativo documentado por el audit trail, pero con una formulación española que deja visible la tensión entre ''sagrados/consagrados'' y el uso despectivo o técnico del término. No se añadió un verbo inexistente en la segunda cola.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otras máscaras porque el versículo no contiene el nombre divino.
  - '''En la juventud'' mantiene la concisión del hebreo.'
  - La segunda cola se deja nominal, como en el hebreo, sin insertar un verbo de cierre.
  - '''Prostitutos sagrados'' es una solución deliberadamente tensa para conservar el doble valor histórico-semántico del término.'
