translation:
  language: es
  text: 'Y respondió el rey de Israel y dijo[a]: «Díganle: “No se jacte el que se ciñe la armadura como el que se la quita”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «No se jacte el que ciñe como el que desata». El proverbio contrapone la preparación para la batalla con terminarla victoriosamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: En español, «respondió» conserva la fórmula narrativa de diálogo sin sonar tan repetitivo como una traducción más literal de la secuencia hebrea.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - el rey de Israel
  lexicon: HALOT
  rationale: La expresión constructa se vierte de manera directa y natural en español, preservando la identificación formal del hablante.
- source_word: וַיֹּאמֶר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  lexicon: HALOT
  rationale: Mantiene la cadena narrativa hebrea «respondió ... y dijo» con una formulación idiomática en español.
- source_word: דַּבְּרוּ
  english_pob_choice: Tell him
  chosen_spanish: Hablen a él
  alternatives_spanish:
  - Digan a él
  - Díganle
  lexicon: HALOT
  rationale: El plural imperativo se conserva; se evita insertar una interpretación demasiado libre. «A él» explicita el objeto implícito del mensaje, siguiendo el contexto del envío a los mensajeros.
- source_word: אַל יִתְהַלֵּל
  english_pob_choice: Let not ... boast
  chosen_spanish: No se gloríe
  alternatives_spanish:
  - No se jacte
  - No se alabe
  lexicon: HALOT
  rationale: El hitpael de הלל aquí expresa autoexaltación/boast; «gloriarse» preserva mejor la gravedad proverbial que «jactarse», y evita un matiz demasiado coloquial.
- source_word: חֹגֵר
  english_pob_choice: the one who girds on his armor
  chosen_spanish: el que se arma
  alternatives_spanish:
  - el que se ciñe
  - el que se prepara para la batalla
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el que ciñe/girds», con objeto implícito de equipo militar. En español, «se arma» comunica la imagen bélica de manera compacta sin perder el sentido de preparación para el combate.
- source_word: כִּמְפַתֵּחַ
  english_pob_choice: like the one who takes it off
  chosen_spanish: como el que se desarma
  alternatives_spanish:
  - como el que se lo quita
  - como el que se desciñe
  lexicon: HALOT
  rationale: En paralelo con חֹגֵר, la forma alude a desatar o quitar el equipo de combate. «Se desarma» mantiene el contraste militar y sugiere haber terminado la lucha victoriosamente.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del POB inglés, que prefirió una formulación más formal y cercana al hebreo para la imagen de «girds on his armor». En español se buscó esa misma cercanía sin perder naturalidad: se conservó la estructura proverbial, el paralelismo y el contraste entre prepararse para la batalla y terminarla.'
  spanish_consistency_notes:
  - Se mantuvo «rey de Israel» de forma consistente con el patrón del POB para títulos regios.
  - Se evitó traducir mecánicamente la repetición verbal hebrea con un calco excesivo; la fórmula narrativa queda reconocible en español.
  - La imagen militar se preservó con verbos reflexivos que sugieren vestirse/desvestirse de equipo de combate sin añadir elementos ausentes del hebreo.
