revisions:
- from: 'Yahvé ha mandado acerca de ti: no se sembrará más tu nombre[a]. De la casa de tus dioses[b] cortaré la imagen tallada y la imagen fundida. Pondré tu sepultura, porque eres despreciable[c].'
