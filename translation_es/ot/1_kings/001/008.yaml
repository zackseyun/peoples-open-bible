    text: 'O «los valientes de David». El hebreo dice literalmente: «los valientes que eran/de David».'
    reason: lexical_alternative
  revision_rationale: Se corrige una nota defectuosa y se mejora la naturalidad del español sin alterar el sentido del hebreo ni la justificación léxica del POB inglés. La frase sobre los גִּבּוֹרִים conserva la explicitud relacional con una formulación más idiomática.
