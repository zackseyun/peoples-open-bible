translation:
  language: es
  text: Su santuario se volvió como un hombre glorioso.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Su templo se volvió como un hombre de gloria» o «Su templo se volvió como un hombre honrado». El griego ναός puede traducirse «templo» o «santuario», y ἔνδοξος puede significar «glorioso» u «honrado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ναὸς
  english_pob_choice: sanctuary
  chosen_spanish: santuario
  alternatives_spanish:
  - templo
  - santuario del templo
  lexicon: LSJ
  rationale: ναός puede referirse al templo o al santuario. En este contexto de personificación de Jerusalén, «santuario» conserva el matiz cultual y evita forzar el sentido a todo el complejo del templo.
- source_word: ἐγένετο
  english_pob_choice: became
  chosen_spanish: llegó a ser
  alternatives_spanish:
  - se hizo
  - se convirtió en
  lexicon: LSJ
  rationale: El aoristo de γίνομαι expresa cambio de estado. «Llegó a ser» comunica transformación sin sonar demasiado mecánico en español.
- source_word: ἔνδοξος
  english_pob_choice: of honor / glorious / honored
  chosen_spanish: de gloria
  alternatives_spanish:
  - glorioso
  - honrado
  - de honor
  lexicon: LSJ
  rationale: ἔνδοξος puede significar «glorioso» u «honrado». «De gloria» mantiene el sustantivo abstracto y reproduce bien la dignidad del griego sin cerrar innecesariamente la ambigüedad entre gloria y honor.
- source_word: ὡς ἀνὴρ ἔνδοξος
  english_pob_choice: like a man of glory
  chosen_spanish: como un hombre de gloria
  alternatives_spanish:
  - como un hombre glorioso
  - como un hombre honrado
  lexicon: LSJ
  rationale: La comparación conserva la imagen masculina singular del griego. «Hombre de gloria» sigue de cerca la estructura inglesa revisada y mantiene la tensión entre honor y gloria presente en ἔνδοξος.
- source_word: αὐτῆς
  english_pob_choice: her
  chosen_spanish: su
  alternatives_spanish:
  - de ella
  - suya
  lexicon: LSJ
  rationale: El posesivo español «su» expresa de manera natural la referencia femenina a Jerusalén personificada, sin necesidad de repetir «de ella».
translation_notes:
  revision_awareness: La versión inglesa fue revisada de «a man of honor» a «a man of glory» para ajustarse más de cerca a ἔνδοξος. La traducción española conserva esa preferencia por «gloria», pero deja visible la alternativa «glorioso/honrado» en nota.
  spanish_consistency_notes:
  - Se mantuvo el registro solemne y breve del verso griego.
  - «Santuario» se prefirió sobre «templo» por la decisión lexical auditada en inglés.
  - La comparación no se expandió; se preservó la estructura simple del original.
