  text: וַ/יְצַ֤ו אֹתָ/ם֙ לֵ/אמֹ֔ר כֹּ֣ה תֹאמְר֔וּ/ן לַֽ/אדֹנִ֖/י לְ/עֵשָׂ֑ו כֹּ֤ה אָמַר֙ עַבְדְּ/ךָ֣ יַעֲקֹ֔ב עִם לָבָ֣ן גַּ֔רְתִּי וָ/אֵחַ֖ר עַד עָֽתָּה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/032/005.yaml
  text: 'And he commanded them[a], saying[c][b], “Thus you shall say to my lord Esau: ‘Thus says your servant Jacob: I have sojourned with Laban and have stayed until now.’”'
  footnotes:
  - marker: a
    text: Or “I have lived as a foreigner with Laban and stayed there until now.” The verb rendered “have sojourned” can emphasize residing as an outsider.
    reason: lexical_alternative
  - marker: b
    text: “Your servant” is a deferential self-designation before Esau, not necessarily a statement of literal servitude.
    reason: cultural_note
  - marker: c
    text: Or '‘Thus says your servant Jacob, “I have sojourned with Laban and have remained until now.”’”'.
    reason: previous_rendering
