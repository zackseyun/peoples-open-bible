translation:
  language: es
  text: Guarda mis mandamientos y vive, y guarda mi instrucción como la pupila[a] de tu ojo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la niña de tu ojo». El hebreo usa un modismo que alude a la pupila, imagen de algo que debe guardarse con el mayor cuidado.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמֹר
  english_pob_choice: Keep
  chosen_spanish: Guarda
  alternatives_spanish:
  - Guarda con cuidado
  - Observa
  lexicon: HALOT
  rationale: שׁמר en imperativo puede significar guardar, vigilar o observar. En español, «guarda» conserva la idea de custodia atenta y funciona naturalmente con mandamientos.
- source_word: מִצְוֺתַי
  english_pob_choice: my commandments
  chosen_spanish: mis mandamientos
  alternatives_spanish:
  - mis mandatos
  - mis órdenes
  lexicon: HALOT
  rationale: מִצְוָה se ajusta bien a «mandamiento» en un contexto de sabiduría y exhortación pactal. El posesivo de primera persona se mantiene directamente.
- source_word: וֶחְיֵה
  english_pob_choice: and live
  chosen_spanish: y vive
  alternatives_spanish:
  - para que vivas
  - y vivirás
  lexicon: HALOT
  rationale: La forma breve y coordinada del hebreo se refleja mejor con una imperativa simple en español, manteniendo la parataxis y el sentido de resultado implícito.
- source_word: וְתוֹרָתִי
  english_pob_choice: and my instruction
  chosen_spanish: y mi instrucción
  alternatives_spanish:
  - y mi ley
  - y mi enseñanza
  lexicon: HALOT
  rationale: En Proverbios, תּוֹרָה suele significar instrucción sapiencial, no solo ley jurídica. «Instrucción» comunica esa amplitud sin cargar el texto con un sentido exclusivamente legal.
- source_word: כְּאִישׁוֹן
  english_pob_choice: as the pupil
  chosen_spanish: como la pupila
  alternatives_spanish:
  - como el centro
  - como la niña
  lexicon: HALOT
  rationale: אִישׁוֹן en este modismo se refiere a la pupila del ojo. «Pupila» es transparente para el lector moderno y preserva la imagen de algo extremadamente delicado y digno de resguardo.
- source_word: עֵינֶיךָ
  english_pob_choice: of your eye
  chosen_spanish: de tu ojo
  alternatives_spanish:
  - de tus ojos
  lexicon: HALOT
  rationale: Aunque la forma hebrea es gramaticalmente plural/dual, el modismo en contexto apunta al ojo como unidad expresiva. «Tu ojo» conserva la naturalidad del modismo en español.
theological_decisions:
- issue: Sentido de תּוֹרָה en Proverbios
  english_pob_reading: instruction
  chosen_spanish_reading: instrucción
  alternative_spanish_readings:
  - ley
  - enseñanza
  rationale: La lectura de sabiduría aquí es pedagógica y formativa. «Instrucción» evita reducir תּוֹרָה a legislación mosaica y mantiene la voz exhortativa del padre/maestro.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; documented lexical choice in wisdom context.'
translation_notes:
  revision_awareness: La base auditada en inglés pasó de 'like' a 'as' para la comparación final; en español se decidió usar «como» por ser la forma comparativa más natural y fiel en este contexto. Se conservó la equivalencia semántica de תורתי como «mi instrucción» y la imagen idiomática de la pupila del ojo.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque este verso no contiene יהוה; el texto habla en primera persona de la instrucción del hablante.
  - Se prefirió «mandamientos» sobre «mandatos» para mantener la correspondencia tradicional de מִצְוֺתַי sin perder naturalidad.
  - Se mantuvo «instrucción» para תּוֹרָה conforme al contexto sapiencial, en línea con la auditoría inglesa.
  - La comparación se expresó con «como», que en español transmite el mismo valor comparativo de manera idiomática.
  - La nota de pie conserva la alternativa idiomática tradicional «la niña de tu ojo» porque el hebreo admite esa equivalencia culturalmente asentada, aunque «pupila» sea más transparente.
