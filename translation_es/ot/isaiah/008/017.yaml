review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: esperar a Yahvé, mantener el modismo ''ocultar su rostro'', conservar ''la casa de Jacob'' y expresar la esperanza dirigida a él. Sin embargo, la primera preposición está mal orientada en español frente al hebreo לַיהוָה: ''esperaré en Yahvé'' desplaza el sentido de ''esperar a/por Yahvé''. Además, la nota [a] quedó anclada a ''Yahvé'' cuando en realidad corresponde al participio ''que oculta su rostro''.'
  spanish_quality_summary: La redacción es clara y digna, pero 'esperaré en Yahvé' suena menos natural y menos fiel que 'esperaré a Yahvé'. También conviene evitar la repetición exacta de 'esperaré' mediante 'pondré mi esperanza en él', que expresa bien קוה y mejora la fluidez sin apartarse del sentido.
  glossary_alignment: Se alinea correctamente con la política del proyecto al usar 'Yahvé' para יהוה y mantener el modismo 'oculta su rostro'. 'Casa de Jacob' también está bien conservado. La principal desalineación está en la decisión léxica para לַיהוָה, que debe reflejar espera dirigida hacia Yahvé, no ubicación/confianza expresada por 'en'.
  issues:
  - severity: high
    issue: Preposición incorrecta en 'esperaré en Yahvé'
    rationale: El hebreo וְחִכִּיתִי לַיהוָה expresa esperar a/por Yahvé. En español, 'esperar en' no es la forma natural aquí y además confunde esta cola con la última, donde sí corresponde 'en él' con קוה idiomático.
  - severity: medium
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota sobre el participio ('que oculta / está ocultando / ha ocultado') debe ir en la frase verbal correspondiente, no sobre 'Yahvé'.
  - severity: low
    issue: Repetición poco elegante de 'esperaré' en ambas colas
    rationale: No es erróneo, pero 'y en él esperaré' suena algo rígido. 'Y pondré mi esperanza en él' preserva la distinción entre חכה y קוה y mejora la legibilidad.
  revised_spanish_text: Y esperaré a Yahvé, que oculta[a] su rostro de la casa de Jacob[b], y pondré mi esperanza en él.
  revised_footnotes:
  - marker: a
    text: 'O: «que está ocultando su rostro» o «que ha ocultado su rostro». El participio hebreo puede entenderse como acción continua o característica.'
