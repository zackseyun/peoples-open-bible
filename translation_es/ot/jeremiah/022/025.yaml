revisions:
- from: Y yo te entregaré en mano de los que buscan tu vida[a], en mano de aquellos de quienes tú tiemblas, en mano de Nabucodonosor, rey de Babilonia[b], y en mano de los caldeos.
  to: Y yo te entregaré en manos de los que buscan tu vida, en manos de aquellos a quienes temes, en manos de Nabucodonosor[a], rey de Babilonia, y en manos de los caldeos[b].
  rationale: 'Se ajusta «de quienes tú tiemblas» a «a quienes temes» por fidelidad semántica y naturalidad en español. Se cambia «en mano de» a «en manos de» para una lectura más idiomática sin perder la imagen hebrea repetida. Se realinean las notas con el audit trail inglés: la variante del nombre se ancla a «Nabucodonosor», y se añade la alternativa contextual para «los caldeos». Se elimina la nota adicional sobre «vida», porque no forma parte de las alternativas preservadas en la POB inglesa y no es necesaria para evitar ambigüedad en español.'
  reviewer_model: gpt-5.4
