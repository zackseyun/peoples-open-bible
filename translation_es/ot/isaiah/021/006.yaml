translation:
  language: es
  text: 'Pues así me dijo el Señor: «Ve, coloca al centinela[a]; que informe lo que vea».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «coloca al centinela; lo que vea, que informe».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduce la razón o fundamento del dicho profético; en español, «Porque» transmite bien la conexión discursiva sin sonar forzado.
- source_word: כֹה אָמַר
  english_pob_choice: thus ... said
  chosen_spanish: así me dijo
  alternatives_spanish:
  - así dijo
  - de este modo me habló
  lexicon: HALOT
  rationale: La fórmula profética queda natural en español con «así me dijo»; conserva el carácter de declaración recibida por el profeta y el pasado narrativo del hebreo.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Dios
  - mi Señor
  lexicon: HALOT
  rationale: אֲדֹנָי es el título divino, no el nombre YHWH. En español, «el Señor» es la forma natural y reverente para este título, sin sustituirlo por el nombre propio Yahvé.
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Sal
  lexicon: HALOT
  rationale: Imperativo directo y breve; «Ve» es la correspondencia más natural y fiel.
- source_word: הַעֲמֵד
  english_pob_choice: station
  chosen_spanish: coloca
  alternatives_spanish:
  - pon
  - establece
  - destina
  lexicon: HALOT
  rationale: El causativo de עמד aquí pide la idea de hacer que alguien quede puesto en su lugar. «Coloca» conserva la acción de situar al centinela sin sonar demasiado técnico.
- source_word: הַמְצַפֶּה
  english_pob_choice: the watchman
  chosen_spanish: al centinela
  alternatives_spanish:
  - al vigilante
  - al atalaya
  lexicon: HALOT
  rationale: El participio sustantivado de צפה designa a quien vela/observa. «Centinela» es un equivalente claro y natural en español militar o de guardia; evita el arcaísmo de «atalaya» y el matiz más genérico de «vigilante».
- source_word: אֲשֶׁר יִרְאֶה
  english_pob_choice: what he sees
  chosen_spanish: lo que vea
  alternatives_spanish:
  - lo que vea con sus ojos
  - todo lo que vea
  lexicon: HALOT
  rationale: La cláusula relativa expresa el contenido de lo que debe comunicar; «lo que vea» mantiene la subordinación y el sentido prospectivo/jussivo del contexto.
- source_word: יַגִּיד
  english_pob_choice: let him report
  chosen_spanish: que informe
  alternatives_spanish:
  - que lo declare
  - que lo diga
  lexicon: HALOT
  rationale: La forma jussiva exige una orden indirecta. «Que informe» conserva la función de comunicar formalmente lo observado, equivalente al «let him report» del audit trail.
theological_decisions:
- issue: Título divino אֲדֹנָי frente al nombre Yahvé
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor, Yahvé
  rationale: El texto hebreo usa אֲדֹנָי como título divino. En esta línea, la traducción española mantiene el título reverente «el Señor»; no se sustituye por Yahvé porque el original aquí no lleva el Tetragrama.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; reservar Yahvé para יהוה/YHWH.'
- issue: Alcance de la orden final
  english_pob_reading: let him report what he sees
  chosen_spanish_reading: que informe lo que vea
  alternative_spanish_readings:
  - que declare lo que vea
  - que diga lo que vea
  rationale: La instrucción no pide una proclamación solemne sino comunicar el contenido observado. «Informar» conserva la idea de hacer saber con exactitud lo visto, sin añadir énfasis doctrinal no presente en el verso.
  doctrine_reference: Uso léxico contextual del imperativo/jussivo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo masorético y el consenso del audit trail inglés. Se preserva la fórmula profética, el título divino como «el Señor» y la instrucción final en forma jussiva natural en español. No se detectaron revisiones pendientes en el contexto fuente.
  spanish_consistency_notes:
  - Se usa «el Señor» para אֲדֹנָי, manteniendo la convención del proyecto para títulos divinos sin introducir el Tetragrama.
  - «Centinela» se eligió por claridad contemporánea y corresponde al watchman del contexto militar/de vigilancia.
  - «Que informe» reproduce la fuerza jussiva de יַגִּיד sin sobretraducir a una declaración solemne.
