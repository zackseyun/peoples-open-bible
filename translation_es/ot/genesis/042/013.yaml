translation:
  language: es
  text: 'Y dijeron[a]: “Nosotros, tus siervos, somos doce hermanos, hijos de un solo hombre en la tierra de Canaán. Y he aquí, el menor está hoy con nuestro padre, y uno ya no está.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y uno no está», una expresión eufemística que puede significar «ha desaparecido» o implicar muerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they said
  chosen_spanish: Y les dijeron
  alternatives_spanish:
  - Entonces dijeron
  - Y dijeron
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se expresa naturalmente en español con coordinación simple. Añadí el objeto indirecto 'les' porque el contexto muestra que hablan a un funcionario egipcio; mantiene la relación discursiva sin sobretraducir.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus esclavos
  alternatives_spanish:
  - tus siervos
  - tus servidores
  lexicon: HALOT
  rationale: POB documenta 'slaves' por fuerza léxica de עבד. Aunque el habla es deferente, en español 'esclavos' conserva la auto-humillación verbal y evita suavizar el término. La relación cortesana queda clara por el contexto, no por atenuación léxica.
- source_word: אַחִים אֲנַחְנוּ
  english_pob_choice: we ... are twelve brothers
  chosen_spanish: somos doce hermanos
  alternatives_spanish:
  - somos hermanos, doce en número
  lexicon: HALOT
  rationale: La apposición hebrea se rinde con el orden idiomático español. 'Doce hermanos' preserva el dato numérico y la identificación fraterna sin perder fluidez.
- source_word: בְּנֵי אִישׁ אֶחָד
  english_pob_choice: sons of one man
  chosen_spanish: hijos de un solo hombre
  alternatives_spanish:
  - hijos de un hombre
  - los hijos de un solo hombre
  lexicon: HALOT
  rationale: '''Hijos'' es la forma natural en español para בני en este contexto genealógico. ''Un solo hombre'' mantiene el énfasis en la unidad paterna que el hebreo subraya.'
- source_word: בְּאֶרֶץ כְּנָעַן
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - en Canaán
  lexicon: HALOT
  rationale: Se conserva 'tierra' porque está explícita en el hebreo y forma parte del marco histórico-geográfico.
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y behold
  lexicon: HALOT
  rationale: '''He aquí'' reproduce el valor presentacional y formal de הִנֵּה sin volverlo coloquial. Es una opción bíblica clara en español contemporáneo.'
- source_word: הַקָּטֹן
  english_pob_choice: the youngest
  chosen_spanish: el menor
  alternatives_spanish:
  - el más joven
  - el menor de todos
  lexicon: HALOT
  rationale: En este marco fraternal, el término denota al menor de los hermanos. 'El menor' es natural en español y conserva la referencia relativa sin añadir interpretación afectiva.
- source_word: אֶת אָבִינוּ
  english_pob_choice: is with our father
  chosen_spanish: está hoy con nuestro padre
  alternatives_spanish:
  - está con nuestro padre
  - permanece hoy con nuestro padre
  lexicon: HALOT
  rationale: El אֶת acompaña compañía/relación, no objeto directo. 'Está... con' expresa correctamente la compañía; 'hoy' traduce הַיּוֹם y mantiene el contraste temporal del relato.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en este momento
  - ahora
  lexicon: HALOT
  rationale: Adverbio temporal directo, sin ampliación innecesaria.
- source_word: וְהָאֶחָד אֵינֶנּוּ
  english_pob_choice: and one is no more
  chosen_spanish: y uno ya no está
  alternatives_spanish:
  - y uno no está
  - y uno ya no existe
  - y uno ya no vive
  lexicon: HALOT
  rationale: Se conserva la ambigüedad eufemística del hebreo 'no está/no es'. 'Ya no está' mantiene la reserva narrativa que POB preserva con 'is no more', sin decidir explícitamente entre ausencia y muerte.
theological_decisions:
- issue: Tensión sobre el destino de José en 'uno ya no está'
  english_pob_reading: one is no more
  chosen_spanish_reading: uno ya no está
  alternative_spanish_readings:
  - uno ya no vive
  - uno se fue
  rationale: El hebreo admite un eufemismo que puede aludir a desaparición o muerte. La versión española conserva esa ambigüedad en vez de resolverla, respetando la perspectiva de los hermanos y la prudencia narrativa del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Registro reverente de הִנֵּה
  english_pob_reading: And behold
  chosen_spanish_reading: Y he aquí
  alternative_spanish_readings:
  - Y mira
  - Y ve
  rationale: Se elige una fórmula bíblica y formal que reproduce el efecto discursivo del original sin modernizarlo en exceso.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
- issue: Fuerza léxica de עבד en contexto deferencial
  english_pob_reading: your servants
  chosen_spanish_reading: tus esclavos
  alternative_spanish_readings:
  - tus siervos
  - tus servidores
  rationale: Aunque el habla es cortesana, el término base mantiene fuerza servil. POB evita suavizar la autodenominación para no perder la carga social del vocablo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se siguió el nivel de formalidad de la última revisión inglesa, que prefirió 'behold' sobre 'look' por un registro más elevado. En español se reflejó con 'he aquí'. También se atendió la nota auditada sobre la ambigüedad de אֵינֶנּוּ, conservándola sin explicitar muerte.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el Tetragrámaton cuando aparezca en el entorno del proyecto, aunque este versículo no lo contiene.
  - '''Hijos'' conserva el masculino específico del hebreo, coherente con el contexto genealógico de los hermanos de José.'
  - No se normalizó 'tus esclavos' a 'siervos' porque la política léxica del proyecto distingue la fuerza de עבד en contextos pertinentes.
