base_translation:
  language: en
  yaml_path: translation/ot/exodus/013/017.yaml
  text: Now when Pharaoh let the people go[a], God did not lead them by the way of the land of the Philistines, though it was near; for God said[b], “Lest the people change their minds when they see war and return to Egypt.”
  footnotes:
  - marker: a
    text: Or 'for it was near.' The Hebrew conjunction can be read causally; the main text renders it concessively for smoother English sense in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'regret it' or 'relent.' The Hebrew verb here refers to a change of mind when faced with war.
    reason: lexical_alternative
