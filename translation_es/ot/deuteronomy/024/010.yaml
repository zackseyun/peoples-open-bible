translation:
  language: es
  text: Cuando prestes a tu prójimo algo[a], no entrarás en su casa para tomar su prenda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si prestas a tu prójimo algo, no entrarás en su casa para tomar lo que él dio en prenda».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: En este caso legal, כִּי introduce una situación jurídica concreta. «Cuando» conserva bien el valor casuístico que el POB inglés resolvió con «When», aunque «Si» también sería posible.
- source_word: תַשֶּׁה
  english_pob_choice: you lend
  chosen_spanish: prestes
  alternatives_spanish:
  - des en préstamo
  - hagas un préstamo a
  lexicon: HALOT
  rationale: El verbo en hifil expresa el acto de prestar o conceder crédito. «Prestes» es natural en español y mantiene la relación con el sustantivo cognado siguiente.
- source_word: בְרֵעֲךָ
  english_pob_choice: your neighbor
  chosen_spanish: tu prójimo
  alternatives_spanish:
  - tu vecino
  - tu compañero
  lexicon: HALOT
  rationale: «Prójimo» comunica bien la idea de miembro cercano de la comunidad del pacto. «Vecino» es posible, pero puede sonar más limitado o cotidiano que el hebreo en este contexto.
- source_word: מַשַּׁאת מְאוּמָה
  english_pob_choice: anything
  chosen_spanish: algo
  alternatives_spanish:
  - cualquier cosa
  - algo que sea
  lexicon: HALOT
  rationale: 'La expresión intensifica la amplitud: una deuda/préstamo de «algo en absoluto». En español, «algo» en esta construcción con el verbo «prestar» suena más natural y conserva la indeterminación del hebreo sin recargarla.'
- source_word: לֹא תָבֹא אֶל בֵּיתוֹ
  english_pob_choice: you shall not go into his house
  chosen_spanish: no entrarás en su casa
  alternatives_spanish:
  - no irás a su casa
  - no te meterás en su casa
  lexicon: HALOT
  rationale: 'El prohibitivo legal se vierte con futuro de mandato: «no entrarás». «Casa» reproduce bien ביתו y mantiene el registro sobrio del mandato.'
- source_word: לַעֲבֹט עֲבֹטוֹ
  english_pob_choice: to take his pledge
  chosen_spanish: para tomar su prenda
  alternatives_spanish:
  - para tomar lo que dio en prenda
  - para cobrar su garantía
  lexicon: HALOT
  rationale: עֲבוֹט es el objeto dado en garantía; «prenda» es el equivalente jurídico más claro en español. «Tomar» evita exagerar la fuerza del verbo y sigue de cerca la función del infinitivo.
theological_decisions:
- issue: Término para רֵעַ en un contexto de obligación comunitaria
  english_pob_reading: your neighbor
  chosen_spanish_reading: tu prójimo
  alternative_spanish_readings:
  - tu vecino
  - tu hermano de comunidad
  rationale: No se trata de una mera cercanía geográfica, sino de una relación social y ética dentro del pueblo. «Prójimo» comunica esa dimensión comunitaria sin sobreexplicar.
  doctrine_reference: Ética del pacto y responsabilidad comunitaria (cf. Levítico 19:18 en su uso comunitario de רֵעַ).
translation_notes:
  revision_awareness: El POB inglés revisó «make your neighbor a loan of anything» a «lend your neighbor anything» por naturalidad y precisión. La versión española sigue esa corrección con «Cuando prestes a tu prójimo algo», manteniendo el paralelismo legal y evitando una paráfrasis más pesada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - «Prójimo» se usa aquí por el valor comunitario del hebreo רֵעַ, no como traducción automática de «neighbor».
  - «Prenda» se eligió para עֲבוֹט por su claridad jurídica en español y por coincidir con la función de garantía del objeto.
