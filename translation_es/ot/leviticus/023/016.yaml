    rationale: 'La fórmula inicial con comillas y dos puntos («''O: ...''») resulta poco natural. Conviene estilizarla en español sin alterar el contenido.'
  revised_spanish_text: Contarán cincuenta días[a], hasta el día después del séptimo sábado; entonces presentarán una ofrenda nueva de grano a Yahvé.
