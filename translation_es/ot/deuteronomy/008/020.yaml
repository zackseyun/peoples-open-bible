review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura comparativa hebrea («Como/Así como… así…»), conserva correctamente «Yahvé» para יְהוָה, y mantiene la fórmula de pacto «escuchar la voz de». También respeta el valor causal de עֵקֶב con «porque» y el futuro de juicio «perecerán».
  spanish_quality_summary: 'El texto es claro y digno, pero tiene un detalle de estilo y fidelidad menor: en español natural no se repite «así» en ambos miembros de la correlación; «Como las naciones… así perecerán ustedes» o «Así como… así…» es posible, pero la redacción actual suena algo pesada por añadir además «ustedes» dos veces. También conviene mejorar la nota al pie: la alternativa inglesa es «obey the LORD your God», no «obedecieron a la voz de Yahvé su Dios», que mezcla la alternativa con la literalidad. Debe expresarse mejor en español como «obedecieron a Yahvé su Dios» o «obedecieron a Yahvé, su Dios».'
  glossary_alignment: 'Alineado en general con la terminología del proyecto: יְהוָה → «Yahvé»; אֱלֹהֵיכֶם → «su Dios»; la idiomática שׁמע בקול se conserva en el texto principal. No hay conflicto doctrinal. La revisión solo afina la naturalidad y la precisión de la nota léxica.'
  issues:
  - severity: medium
    issue: Nota al pie alternativa mal formulada
    rationale: La nota española da como alternativa «obedecieron a la voz de Yahvé su Dios», pero la alternativa documentada en inglés es «obey the LORD your God», no una combinación híbrida con «voz». Esto puede confundir al lector sobre qué es literal y qué es dinámico.
  - severity: low
    issue: Correlación comparativa algo pesada en español
    rationale: «Así como… así ustedes…» no es incorrecto, pero suena más natural y bíblico en español «Como las naciones… así perecerán ustedes». La revisión mejora fluidez sin alterar el sentido.
  revised_spanish_text: Como las naciones que Yahvé está destruyendo delante de ustedes, así perecerán ustedes, porque no escucharon la voz de Yahvé su Dios.[a]
  revised_footnotes:
  - marker: a
    text: 'O: «obedecieron a Yahvé su Dios». El hebreo dice literalmente «escuchar la voz de Yahvé su Dios», una expresión que a menudo incluye la idea de obediencia.'
    reason: lexical_alternative
  revision_rationale: Se mantiene el sentido y las decisiones léxicas principales del borrador, pero se corrige la nota para reflejar con precisión la alternativa documentada y se suaviza la sintaxis comparativa para un español más natural y fiel al tono bíblico.
