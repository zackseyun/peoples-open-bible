translation:
  language: es
  text: los que abandonan los senderos de la rectitud[a] para caminar por los caminos de la oscuridad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que abandonan los senderos de lo recto».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֹזְבִים
  english_pob_choice: who abandon
  chosen_spanish: los que abandonan
  alternatives_spanish:
  - los que dejan
  - los que forsacan
  lexicon: HALOT
  rationale: El participio funciona de manera sustantiva y describe una clase de personas. «Abandonan» transmite el acto deliberado de apartarse de un camino recto, con naturalidad en español moderno.
- source_word: אָרְחוֹת
  english_pob_choice: the paths of
  chosen_spanish: los senderos de
  alternatives_spanish:
  - los caminos de
  - las sendas de
  lexicon: HALOT
  rationale: En sabiduría, אֹרַח designa un curso de vida o conducta. «Senderos» mantiene la imagen de trayectoria y suena más natural que una traducción demasiado rígida; además conserva la relación paralela con «sendas».
- source_word: יֹשֶׁר
  english_pob_choice: uprightness
  chosen_spanish: la rectitud
  alternatives_spanish:
  - la uprightness
  - lo recto
  - la integridad
  lexicon: HALOT
  rationale: En este contexto sapiencial, יֹשֶׁר expresa la cualidad moral de rectitud. «Rectitud» comunica bien esa idea en español y preserva el valor ético del término sin explicarlo de más.
- source_word: לָלֶכֶת
  english_pob_choice: to walk
  chosen_spanish: caminar
  alternatives_spanish:
  - andar
  - ir
  lexicon: HALOT
  rationale: הלך se usa metafóricamente para la conducta. «Caminar» conserva esa metáfora moral y resulta idiomático en español.
- source_word: בְּדַרְכֵי
  english_pob_choice: in the ways of
  chosen_spanish: por sendas de
  alternatives_spanish:
  - en los caminos de
  - por los caminos de
  lexicon: HALOT
  rationale: El constructo plural de דֶּרֶךְ puede expresarse como «sendas» o «caminos». «Por sendas de» conserva mejor la imagen de movimiento en una trayectoria marcada.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  - oscuridad moral
  - lo oscuro
  lexicon: HALOT
  rationale: En Proverbios la oscuridad tiene fuerza metafórica moral. «Oscuridad» es claro y natural en español; evita explicitar «mal» o «maldad» en el texto principal, preservando la tensión metafórica.
theological_decisions:
- issue: Metáfora moral de la oscuridad
  english_pob_reading: Rendered 'darkness' without explicating it as evil in the main text.
  chosen_spanish_reading: Se mantiene «oscuridad» sin convertirla en una glosa moral explícita.
  alternative_spanish_readings:
  - maldad
  - tinieblas
  - mal
  rationale: El hebreo usa la imagen sapiencial de caminos claros versus oscuros. Traducirlo por una abstracción como «mal» interpretaría en lugar de reproducir la figura retórica. Se conserva así la tensión teológica y literaria del texto.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: El contexto auditado coincide ampliamente con la versión inglesa existente; no se requieren revisiones sustanciales. Se preserva la metáfora sapiencial y la construcción participial substantiva, con ajustes naturales para el español.
  spanish_consistency_notes:
  - Se mantiene «rectitud» para יֹשֶׁר, en línea con el sentido ético de sabiduría.
  - Se conserva la imaginería de camino/senda para אָרְחוֹת y דֶּרֶךְ.
  - Se evita «SEÑOR» u otra sustitución porque no aparece el nombre divino en este versículo.
  - 'La nota al pie recoge la alternativa lexical documentada en el audit trail inglés: «what is right».'
