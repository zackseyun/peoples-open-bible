translation:
  language: es
  text: Y ofrecerás el segundo cordero entre los atardeceres[a]; como la ofrenda de grano de la mañana y su libación, así lo ofrecerás como ofrenda por fuego[b], aroma agradable a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «entre los atardeceres», expresión tradicional que a menudo se entiende como «al atardecer».'
    reason: lexical_alternative
  - marker: b
    text: O «ofrenda alimenticia».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֶּבֶשׂ הַשֵּׁנִי
  english_pob_choice: the second lamb
  chosen_spanish: el segundo cordero
  alternatives_spanish:
  - el segundo carnero
  - la segunda oveja
  lexicon: HALOT
  rationale: En contextos sacrificiales, כֶּבֶשׂ se refiere normalmente a un cordero. Conservo 'segundo' para reflejar la secuencia respecto de la ofrenda matutina.
- source_word: תַּעֲשֶׂה
  english_pob_choice: you shall offer
  chosen_spanish: ofrecerás
  alternatives_spanish:
  - harás
  - prepararás
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es literalmente amplio ('hacer'), en instrucciones sacrificiales el sentido idiomático en español es 'ofrecer'.
- source_word: בֵּין הָעַרְבָּיִם
  english_pob_choice: between the evenings
  chosen_spanish: entre las tardes
  alternatives_spanish:
  - al atardecer
  - entre el atardecer y la noche
  lexicon: HALOT
  rationale: Conservo la expresión casi literal para preservar la opacidad temporal del hebreo. 'Entre las tardes' comunica la forma idiomática sin resolverla del todo; la alternativa más natural queda en nota.
- source_word: כְּמִנְחַת הַבֹּקֶר
  english_pob_choice: like the morning grain offering
  chosen_spanish: como la ofrenda vegetal de la mañana
  alternatives_spanish:
  - como la ofrenda de grano de la mañana
  - como la ofrenda de la mañana
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacerdotal es la ofrenda vegetal/grano, no una ofrenda genérica. 'Vegetal' conserva el carácter de cereal/panificado sin sonar técnico en exceso.
- source_word: וּכְנִסְכּוֹ
  english_pob_choice: and its drink offering
  chosen_spanish: y su ofrenda de libación
  alternatives_spanish:
  - y su ofrenda de bebida
  - y su libación
  lexicon: HALOT
  rationale: נֶסֶךְ designa la ofrenda derramada. 'Libación' es el equivalente cultual más preciso y natural en español bíblico.
- source_word: אִשֵּׁה
  english_pob_choice: a food offering
  chosen_spanish: ofrenda consumida por fuego
  alternatives_spanish:
  - ofrenda de fuego
  - ofrenda quemada
  lexicon: HALOT
  rationale: Mantengo la fuerza léxica de 'consumida por fuego', que preserva el elemento del fuego mejor que 'ofrenda alimenticia'. La fórmula explicita el sacrificio por fuego sin perder el sentido cultual.
- source_word: רֵיחַ נִיחֹחַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: aroma agradable
  alternatives_spanish:
  - aroma placentero
  - olor grato
  lexicon: HALOT
  rationale: La fórmula sacrificial comunica aceptación/grato olor. 'Aroma agradable' es natural en español y conserva el valor metafórico sin exagerar.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahveh
  lexicon: HALOT
  rationale: 'Sigo el término proyectado por el marco POB para el nombre divino: Yahvé. La preposición ''a'' refleja el destinatario del ofrecimiento.'
theological_decisions:
- issue: Temporal idiom בֵּין הָעַרְבָּיִם
  english_pob_reading: between the evenings
  chosen_spanish_reading: entre las tardes
  alternative_spanish_readings:
  - al atardecer
  - entre el atardecer y la noche
  rationale: La expresión hebrea es deliberadamente idiomática y su alcance exacto se debate. Mantener una formulación casi literal preserva esa tensión interpretativa; una nota ofrece una equivalencia más idiomática sin cerrar el sentido.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. En coherencia con la política del proyecto, se mantiene el nombre divino en forma transliterada en vez de ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje presenta alto acuerdo con la revisión más reciente: no se registran cambios de contenido en el tramo auditado. La versión española conserva la misma estructura sacrificial y la misma apertura interpretativa sobre la expresión temporal.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma del nombre divino, conforme al marco del proyecto.
  - '''Ofrenda vegetal'' se usa para מִנְחָה en contexto sacerdotal, distinguiéndola de una ofrenda genérica.'
  - '''Ofrenda de libación'' y ''ofrenda consumida por fuego'' preservan la terminología cultual del hebreo sin domesticarla excesivamente.'
  - La nota sobre 'entre las tardes' preserva la ambigüedad temporal documentada en el audit trail.
