translation:
  language: es
  text: Y todos tus hijos[a] serán enseñados por Yahvé, y grande será la paz[b] de tus hijos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tus hijos varones' en ambos casos; el hebreo בנים puede denotar hijos varones o hijos en sentido más general.
    reason: lexical_alternative
  - marker: b
    text: '''Paz'' (shalom) también puede llevar el sentido de plenitud, bienestar o florecimiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל
  english_pob_choice: And all
  chosen_spanish: Y todos
  alternatives_spanish:
  - Y todo
  - Y cada uno
  lexicon: HALOT
  rationale: El hebreo une la conjunción con כָּל para introducir una continuación poética. En español, 'Y todos' conserva con naturalidad el valor colectivo del texto y evita la rigidez de 'y todo' o el individualismo de 'cada uno'.
- source_word: בָּנַיִ/ךְ
  english_pob_choice: your children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos e hijas
  - tus niños
  - tus hijos varones
  lexicon: HALOT
  rationale: בנים puede significar 'hijos' en sentido colectivo o 'varones' en sentido más estrecho. Aquí el paralelismo y la dirección a Sion personificada favorecen una referencia colectiva; 'tus hijos' mantiene esa amplitud sin restringirla innecesariamente.
- source_word: לִמּוּדֵי
  english_pob_choice: taught
  chosen_spanish: serán enseñados
  alternatives_spanish:
  - serán instruidos
  - serán discípulos de
  - serán formados
  lexicon: HALOT
  rationale: La forma denota los que reciben enseñanza. En español, el pasivo 'serán enseñados' refleja bien el valor predicativo y la acción divina implicada por el contexto, sin añadir matices eclesiásticos no presentes en el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé', conforme al criterio del proyecto para el Tetragrámaton, evitando el sustituto titular y manteniendo la auditable identificación personal del nombre revelado.
- source_word: וְ/רַב
  english_pob_choice: great will be
  chosen_spanish: grande será
  alternatives_spanish:
  - abundante será
  - será mucha
  - será grande
  lexicon: HALOT
  rationale: רַב funciona aquí de modo predicativo con orden poético invertido. 'Grande será' reproduce el énfasis del hebreo y suena natural en español bíblico contemporáneo.
- source_word: שְׁלֹום
  english_pob_choice: the peace
  chosen_spanish: la paz
  alternatives_spanish:
  - el bienestar
  - la plenitud
  - la prosperidad
  lexicon: HALOT
  rationale: '''Paz'' es la equivalencia básica y más transparente para שׁלום en este contexto, mientras que el alcance semántico más amplio queda mejor preservado en nota.'
theological_decisions:
- issue: Alcance de 'tus hijos' en una promesa dirigida a Sion/Jerusalén personificada
  english_pob_reading: Rendered generically as 'your children' without specifying ethnic, ecclesial, or exclusively male referents.
  chosen_spanish_reading: Se traduce de manera genérica como 'tus hijos', sin concretar si se trata de hijos varones, descendientes, ciudadanos o una lectura eclesial posterior.
  alternative_spanish_readings:
  - tus hijos varones
  - tus descendientes
  - tus habitantes
  rationale: El hebreo mantiene la imagen poética de Sion como madre. La versión española conserva esa tensión sin resolverla con una identificación doctrinal posterior ni restringir indebidamente el alcance del sustantivo.
  doctrine_reference: Mantener la imaginería de Sion y la tensión de género/collectividad sin sobreexplicación interpretativa.
- issue: Alcance semántico de שָׁלוֹם
  english_pob_reading: '''Peace'' can also carry the sense of wholeness, well-being, or flourishing.'
  chosen_spanish_reading: '''Paz'' en el texto principal, con la amplitud semántica preservada en nota.'
  alternative_spanish_readings:
  - plenitud
  - bienestar
  - florecimiento
  rationale: En español, 'paz' es la forma más directa y reconocible; sin embargo, el término hebreo excede la ausencia de conflicto. Se mantiene la palabra básica y se documenta su campo semántico para no empobrecer el original.
  doctrine_reference: No reducir el shalom bíblico a mera ausencia de guerra; conservar su densidad semántica.
translation_notes:
  revision_awareness: 'El borrador coincide en sustancia con el trazo inglés auditado: mantiene el paralelismo, la referencia colectiva de בנים y la traducción del Tetragrámaton como nombre propio. No hay revisiones previas aplicadas en el paquete de fuente, y el control cruzado reporta alta concordancia sin objeciones.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, según la terminología del proyecto.
  - '''Hijos'' mantiene el mismo alcance colectivo en ambas apariciones de בָּנַיִךְ.'
  - 'Se conserva el paralelismo poético con sintaxis española natural: sujeto colectivo + pasivo + predicado de abundancia.'
  - Las notas a pie de página siguen el orden de los marcadores y corresponden exactamente a las alternativas relevantes del original.
