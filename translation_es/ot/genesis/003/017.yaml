base_translation:
  language: en
  yaml_path: translation/ot/genesis/003/017.yaml
  text: And to Adam he said[a], “Because you listened to the voice of your wife and ate from the tree about which I commanded you, saying, ‘You shall not eat from it,’ the ground is cursed because of you[f][e][d][c][b]; in painful toil you shall eat from it all the days of your life.”
