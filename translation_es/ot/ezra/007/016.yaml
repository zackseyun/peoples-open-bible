translation:
  language: es
  text: y toda la plata y el oro que halles en toda la provincia de Babilonia, junto con la ofrenda voluntaria[a] del pueblo y de los sacerdotes, que voluntariamente ofrecen para la casa de su Dios[b] que está en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el don voluntario”. El término arameo denota un regalo dado de buena voluntad, especialmente en contexto del templo.
    reason: lexical_alternative
  - marker: b
    text: “La casa de su Dios” se refiere al templo en Jerusalén.
    reason: cultural_note
lexical_decisions:
- source_word: וְכֹל
  english_pob_choice: and all
  chosen_spanish: y todo
  alternatives_spanish:
  - y toda la totalidad de
  - y cuanto
  lexicon: HALOT
  rationale: Conserva la fuerza inclusiva de כֹּל y coordina naturalmente con la lista de metales y ofrenda.
- source_word: כְּסַף וּדְהַב
  english_pob_choice: the silver and gold
  chosen_spanish: la plata y el oro
  alternatives_spanish:
  - el plata y el oro
  - la plata y oro
  lexicon: HALOT
  rationale: La pareja de metales preciosos se expresa de modo natural en español con artículo definido; 'plata y oro' mantiene el paralelismo y la claridad.
- source_word: דִּי תְהַשְׁכַּח
  english_pob_choice: that you find
  chosen_spanish: que halles
  alternatives_spanish:
  - que encuentres
  - que puedas hallar
  lexicon: HALOT
  rationale: '''Halles'' reproduce el sentido simple de encontrar/obtener y conserva el matiz directo de la cláusula relativa dirigida a Esdras.'
- source_word: בְּכֹל מְדִינַת בָּבֶל
  english_pob_choice: in all the province of Babylon
  chosen_spanish: en toda la provincia de Babilonia
  alternatives_spanish:
  - por toda la provincia de Babilonia
  - en la provincia entera de Babilonia
  lexicon: HALOT
  rationale: '''Provincia'' refleja el valor administrativo de מְדִינָה; ''toda'' conserva la extensión total del territorio.'
- source_word: עִם הִתְנַדָּבוּת
  english_pob_choice: together with the freewill offering
  chosen_spanish: junto con la ofrenda voluntaria
  alternatives_spanish:
  - junto con el don voluntario
  - con la ofrenda voluntaria
  lexicon: HALOT
  rationale: '''Ofrenda voluntaria'' preserva el matiz cultual del sustantivo y traduce de forma idiomática la contribución dada libremente.'
- source_word: עַמָּא וְכָהֲנַיָּא
  english_pob_choice: of the people and the priests
  chosen_spanish: del pueblo y de los sacerdotes
  alternatives_spanish:
  - del pueblo y los sacerdotes
  - del pueblo y de los sacerdotes
  lexicon: HALOT
  rationale: El genitivo se expresa de forma natural en español; se mantiene la referencia al pueblo y al sacerdocio como donantes.
- source_word: מִתְנַדְּבִין
  english_pob_choice: who are freely offering
  chosen_spanish: que voluntariamente ofrecen
  alternatives_spanish:
  - que están ofreciendo voluntariamente
  - que se ofrecen de voluntad
  lexicon: HALOT
  rationale: El participio se vierte como acción en curso/habitual; 'voluntariamente' conserva la raíz semántica de libre disposición.
- source_word: לְבֵית אֱלָהֲהֹם
  english_pob_choice: for the house of their God
  chosen_spanish: para la casa de su Dios
  alternatives_spanish:
  - para el templo de su Dios
  - para la casa de su Dios
  lexicon: HALOT
  rationale: Se conserva la imagen literal de 'casa' para mantener el idiomático bíblico, sin sustituirla por 'templo' en el texto principal.
- source_word: דִּי בִירוּשְׁלֶם
  english_pob_choice: that is in Jerusalem
  chosen_spanish: que está en Jerusalén
  alternatives_spanish:
  - que se halla en Jerusalén
  - en Jerusalén
  lexicon: HALOT
  rationale: La relativa especifica la ubicación de la casa de Dios; 'está' es claro y fiel al valor locativo.
theological_decisions:
- issue: '¿Cómo traducir הִתְנַדָּבוּת / מִתְנַדְּבִין: ''voluntaria/ofrenda voluntaria'' o ''donación''?'
  english_pob_reading: The Aramaic term denotes a gift given willingly, especially in a temple context.
  chosen_spanish_reading: ofrenda voluntaria / voluntariamente ofrecen
  alternative_spanish_readings:
  - donación
  - ofrenda libre
  - ofrenda de voluntad
  rationale: '''Ofrenda voluntaria'' conserva el sentido de regalo dado libremente y su contexto de culto; ''voluntariamente ofrecen'' mantiene la relación léxica entre sustantivo y participio.'
  doctrine_reference: Ofertas voluntarias en contexto del culto del templo (cf. uso bíblico de נדב).
- issue: ¿Debe explicitarse 'casa' como 'templo' en el texto principal?
  english_pob_reading: ‘House of their God’ refers to the temple in Jerusalem.
  chosen_spanish_reading: casa de su Dios
  alternative_spanish_readings:
  - templo de su Dios
  - casa-templo de su Dios
  rationale: Se preserva la metáfora institucional 'casa' del original; la aclaración conceptual queda implícita sin borrar el término bíblico base.
  doctrine_reference: Lenguaje del templo en el AT, especialmente la 'casa' de Dios en Jerusalén.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto arameo y el expediente inglés: conserva la coordinación de metales, el valor administrativo de ''provincia'', la raíz de voluntariedad en הִתְנַדָּבוּת/מִתְנַדְּבִין y la metáfora ''casa'' sin reemplazarla por una paráfrasis más interpretativa. No se registran revisiones previas en el paquete fuente; por tanto, el borrador se alinea con el estado más reciente sin cambios documentados.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo usa 'su Dios', por lo que no aplica aquí.
  - Se preserva 'casa' en lugar de 'templo' en el texto principal para respetar la metáfora del original y la audit trail inglesa.
  - El estilo es de español bíblico moderno, evitando arcaísmos innecesarios como 'hallares' o 'deliberadamente' sin perder fidelidad.
