translation:
  language: es
  text: ¿Por qué[a], pues, me sacaste del vientre? Yo habría muerto, y ningún ojo me habría visto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yo habría muerto, y ningún ojo me vería». Los imperfectos hebreos pueden traducirse de manera más formal, pero el contexto favorece un sentido contrafactual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָמָה
  english_pob_choice: Why, then,
  chosen_spanish: ¿Por qué, pues,
  alternatives_spanish:
  - ¿Y por qué
  - ¿Por qué
  lexicon: HALOT
  rationale: La partícula interrogativa con waw enlaza con la queja anterior; «pues» comunica esa relación discursiva sin volver la frase artificial en español.
- source_word: מֵרֶחֶם
  english_pob_choice: from the womb
  chosen_spanish: del vientre
  alternatives_spanish:
  - del seno materno
  - del vientre materno
  lexicon: HALOT
  rationale: «Vientre» conserva la imagen corporal concreta de nacimiento. En español bíblico suena natural y fiel; «seno materno» sería más explicativo que el hebreo.
- source_word: הֹצֵאתָנִי
  english_pob_choice: did you bring me out
  chosen_spanish: me sacaste
  alternatives_spanish:
  - me hiciste salir
  - me trajiste fuera
  lexicon: HALOT
  rationale: El hifil de יצא expresa causar la salida; «sacaste» reproduce bien la acción y mantiene el tono directo de la queja dirigida a Dios.
- source_word: אֶגְוַע
  english_pob_choice: I should have died
  chosen_spanish: Yo habría muerto
  alternatives_spanish:
  - Yo habría expirado
  - Yo hubiera muerto
  lexicon: HALOT
  rationale: El imperfecto aquí tiene sentido contrafactual en el lamento; «habría muerto» expresa en español la situación irreal con naturalidad y sin perder la tensión.
- source_word: וְעַיִן לֹא תִרְאֵנִי
  english_pob_choice: and no eye would have seen me
  chosen_spanish: y ningún ojo me habría visto
  alternatives_spanish:
  - y ningún ojo me vería
  - y no me habría visto ningún ojo
  lexicon: HALOT
  rationale: «Ojo» funciona como metonimia de observador; «ningún ojo» transmite el hebreo con claridad y conserva el contraste entre existir/no haber sido visto.
translation_notes:
  revision_awareness: La versión española sigue de cerca el sentido contrafactual destacado en el audit trail inglés, pero lo expresa con sintaxis natural para un lector hispanohablante. No se detectaron revisiones textuales adicionales en el material de control.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por el contexto inmediato, sin añadirlo al texto porque el hebreo no lo nombra aquí.
  - Se prefirió «pues» para reflejar la función discursiva de וְלָמָה sin sobrecargar la línea.
  - La imagen de «vientre» se conservó literal para respetar el paralelo con la nacencia y la muerte no vista.
