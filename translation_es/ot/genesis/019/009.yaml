    changes_summary: Changed “Get back” to “Stand back” for a more natural imperative; changed “live as a foreigner” to “sojourn” to reflect the verb more precisely; changed “keeps acting as judge” to “acts as judge” for a closer rendering; removed “very” from “pressed very hard” since the Hebrew intensifies the pressing but “pressed hard” is sufficient and formal.
translation:
  language: es
  text: 'Y dijeron[a]: «¡Hazte a un lado!». Luego dijeron: «Este[b] vino a residir como extranjero, y ahora se pone a juzgar. Ahora te haremos más daño que a ellos[c]». Y presionaron con fuerza[d] contra el hombre, contra Lot, y se acercaron para romper la puerta.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Retrocede!»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Este forastero»; el hebreo es despectivo hacia Lot como recién llegado.'
    reason: lexical_alternative
  - marker: c
    text: Lit. «te haremos mal más que a ellos», un modismo de amenaza de daño mayor.
    reason: lexical_alternative
  - marker: d
    text: El verbo expresa aquí presión insistente y empuje violento; también puede traducirse «apremiaron» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֶּשׁ הָלְאָה
  english_pob_choice: Stand back!
  chosen_spanish: ¡Hazte a un lado!
  alternatives_spanish:
  - ¡Retrocede!
  - ¡Apártate!
  lexicon: HALOT
  rationale: La expresión es una orden hostil para apartarse. En español, «¡Hazte a un lado!» comunica el tono imperativo y despectivo con naturalidad, sin volverlo más formal de lo que exige el hebreo.
- source_word: הָאֶחָד
  english_pob_choice: This fellow / This one
  chosen_spanish: Este forastero
  alternatives_spanish:
  - Este
  - Este hombre
  lexicon: HALOT
  rationale: El hebreo es despectivo y apunta a Lot como un extraño. «Forastero» preserva esa carga social de outsider; «este» solo sería demasiado breve para el español, y «este hombre» suaviza el matiz.
- source_word: בָּא לָגוּר
  english_pob_choice: came to sojourn
  chosen_spanish: vino a residir como extranjero
  alternatives_spanish:
  - vino a sojornar
  - vino a vivir como extranjero
  lexicon: HALOT
  rationale: גוּר expresa residir como no nativo, no solo una visita breve. «Vino a residir como extranjero» conserva el valor social del verbo y evita un arcaísmo opaco como «sojornar».
- source_word: וַיִּשְׁפֹּט שָׁפוֹט
  english_pob_choice: acts as judge
  chosen_spanish: se pone a juzgar
  alternatives_spanish:
  - actúa como juez
  - juzga con presunción
  lexicon: HALOT
  rationale: La construcción con infinitivo absoluto intensifica la acción y aquí transmite reproche. «Se pone a juzgar» conserva la idea de presunción y la acusación de que Lot interviene como árbitro de ellos.
- source_word: נָרַע לְךָ מֵהֶם
  english_pob_choice: we will treat you worse than them
  chosen_spanish: te haremos más daño que a ellos
  alternatives_spanish:
  - te trataremos peor que a ellos
  - te haremos peor que a ellos
  lexicon: HALOT
  rationale: El hebreo usa un modismo de hacer mal/daño. «Te haremos más daño que a ellos» mantiene el sentido de amenaza física o moral sin sobretraducir a un registro interpretativo excesivo.
- source_word: וַיִּפְצְרוּ
  english_pob_choice: pressed hard against
  chosen_spanish: apremiaron
  alternatives_spanish:
  - presionaron con fuerza
  - insistieron con violencia
  lexicon: HALOT
  rationale: En este contexto, el verbo incluye presión insistente y avance violento; por eso se traslada con un verbo que en español puede abarcar tanto la urgencia como el empuje. El adverbio siguiente refuerza esa fuerza.
- source_word: בָאִישׁ בְּלוֹט
  english_pob_choice: against the man, against Lot
  chosen_spanish: al hombre, a Lot
  alternatives_spanish:
  - contra el hombre, contra Lot
  - contra el hombre, es decir, Lot
  lexicon: HALOT
  rationale: La repetición preposicional hebrea es enfática, pero en español «al hombre, a Lot» deja ver la referencia doble sin forzar una duplicación pesada en la sintaxis. El contexto ya indica que la presión va dirigida contra Lot.
- source_word: מְאֹד
  english_pob_choice: very much
  chosen_spanish: mucho
  alternatives_spanish:
  - muy fuertemente
  - en gran manera
  lexicon: HALOT
  rationale: מְאֹד intensifica la acción. En español, «mucho» ligado a «apremiaron» produce una fuerza idiomática natural y conserva la intensidad del original.
- source_word: וַיִּגְּשׁוּ לִשְׁבֹּר הַדָּלֶת
  english_pob_choice: came near to break down the door
  chosen_spanish: se acercaron para romper la puerta
  alternatives_spanish:
  - se acercaron para derribar la puerta
  - avanzaron para romper la puerta
  lexicon: HALOT
  rationale: נגשׁ indica acercarse con intención; שׁבר, aquí, destruir/romper la puerta. «Romper la puerta» preserva el verbo sin añadir «derribar» como interpretación más específica.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa que prefirió una imperativa más natural, una referencia más precisa al valor social de גור y una reducción de la redundancia de ‘very hard’. En español, la formulación intenta conservar esas mejoras sin perder el matiz de hostilidad y presión física del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se eligió un registro bíblico moderno y no arcaizante; por eso se evita «sojornar» y se usa una construcción clara para לָגוּר.
  - «Apremiaron mucho» intenta conservar la intensidad de מְאֹד sin duplicar innecesariamente adverbios en español.
  - Se conserva la estructura repetitiva del hebreo en la medida en que el español lo permite, especialmente en la referencia a Lot y la amenaza comparativa.
