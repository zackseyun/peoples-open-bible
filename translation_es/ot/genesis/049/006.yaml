translation:
  language: es
  text: No entre mi alma en su consejo[a]; no se una mi honor[b] a su asamblea. Porque en su furor mataron a un hombre, y en su capricho desjarretaron un buey[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su consejo secreto»; סוֹד puede significar un consejo confidencial o íntimo.
    reason: lexical_alternative
  - marker: b
    text: O «mi gloria no se una a su asamblea».
    reason: lexical_alternative
  - marker: c
    text: Hebreo שׁוֹר suele leerse tradicionalmente «buey». Algunos interpretan las consonantes de otro modo y traducen la línea «derribaron un muro».
    reason: alternative_reading
lexical_decisions:
- source_word: בְּסֹדָם
  english_pob_choice: their council
  chosen_spanish: su consejo
  alternatives_spanish:
  - su consejo secreto
  - su cónclave
  - su consulta
  lexicon: HALOT
  rationale: סוֹד puede significar consejo confidencial, círculo íntimo o consejo deliberativo. En español, «consejo» preserva bien el sentido de un grupo deliberante y permite mantener abierta la posible connotación de intimidad/secreto sin sobretraducir.
- source_word: תָּבֹא נַפְשִׁי
  english_pob_choice: let my soul not enter
  chosen_spanish: No entre mi alma
  alternatives_spanish:
  - No me una
  - No entre yo
  - No entre mi ser
  lexicon: HALOT
  rationale: La forma jussiva con אַל expresa prohibición o deseo negativo. «Mi alma» conserva el hebraísmo poético y la distancia retórica del hablante mejor que reducirlo a un simple «yo».
- source_word: בִּקְהָלָם
  english_pob_choice: their assembly
  chosen_spanish: su asamblea
  alternatives_spanish:
  - su congregación
  - su reunión
  - su compañía
  lexicon: HALOT
  rationale: קָהָל se refiere a una asamblea reunida. «Asamblea» es natural en español y mantiene el paralelismo con «consejo».
- source_word: תֵּחַד כְּבֹדִי
  english_pob_choice: let my honor not be joined
  chosen_spanish: no se una mi honor
  alternatives_spanish:
  - no sea unido mi honor
  - no se asocie mi honor
  - no se junte mi honra
  lexicon: HALOT
  rationale: יחד expresa unión o ser unido. כָּבוֹד se vierte mejor aquí como «honor», porque Jacob se distancia de la violencia de sus hijos en términos de dignidad y reputación personales; «gloria» podría sonar más teológica de lo que exige el contexto.
- source_word: בְאַפָּם
  english_pob_choice: in their anger
  chosen_spanish: en su furor
  alternatives_spanish:
  - en su ira
  - cuando estaban airados
  - en su enojo
  lexicon: HALOT
  rationale: אַף idiomáticamente expresa ira/enojo. «Furor» recoge bien la intensidad de la reacción y encaja con el tono poético del reproche, sin desviar el sentido básico.
- source_word: הָרְגוּ אִישׁ
  english_pob_choice: they killed a man
  chosen_spanish: mataron a un hombre
  alternatives_spanish:
  - dieron muerte a un hombre
  - mataron a un varón
  lexicon: HALOT
  rationale: Se conserva el singular אִישׁ como «un hombre», lo que mantiene la referencia concreta y evita generalizar la alusión histórica.
- source_word: וּבִרְצֹנָם
  english_pob_choice: in their self-will
  chosen_spanish: en su capricho
  alternatives_spanish:
  - en su propia voluntad
  - en su voluntad propia
  - en su arbitrio
  lexicon: HALOT
  rationale: רָצוֹן puede significar deseo, voluntad o complacencia. En este contexto negativo, «capricho» comunica bien el carácter voluntarioso y descontrolado del acto; «voluntad propia» también sería posible, pero suena menos incisivo en español.
- source_word: עִקְּרוּ
  english_pob_choice: they hamstrung
  chosen_spanish: desjarretaron
  alternatives_spanish:
  - hamstrajeron
  - les cortaron los jarretes
  - mancaron
  lexicon: HALOT
  rationale: El verbo en este contexto describe la mutilación de un animal para dejarlo inutilizado. «Desjarretar» es el equivalente castellano preciso y natural para la acción de cortar los jarretes o corvejones.
- source_word: שׁוֹר
  english_pob_choice: an ox
  chosen_spanish: un buey
  alternatives_spanish:
  - un toro
  - un buey/novillo
  - un animal
  lexicon: HALOT
  rationale: שׁוֹר designa un bovino, y en español «buey» resulta plenamente comprensible y acorde con el acto de desjarretar. Se mantiene la lectura tradicional del término frente a la alternativa textual «muro» preservada en nota.
theological_decisions:
- issue: Distanciamiento poético de Jacob respecto de la violencia de Simeón y Leví mediante «mi alma» y «mi honor»
  english_pob_reading: Let my soul not enter their council; let my honor not be joined to their assembly.
  chosen_spanish_reading: No entre mi alma en su consejo; no se una mi honor a su asamblea.
  alternative_spanish_readings:
  - No me una yo a su asamblea
  - No entre mi ser en su consejo; no se una mi gloria a su asamblea
  rationale: La construcción hebrea es poética y autoexcluyente. Mantener «alma» y «honor» conserva la fuerza retórica y evita reducir el paralelismo a una simple negación narrativa.
  doctrine_reference: Translation philosophy §§5–6
- issue: Sentido de כָּבוֹדִי en un contexto de repudio moral
  english_pob_reading: my honor
  chosen_spanish_reading: mi honor
  alternative_spanish_readings:
  - mi gloria
  - mi reputación
  rationale: «Honor» comunica dignidad personal y encaja mejor en español actual con el rechazo de Jacob a ser asociado con el crimen. «Gloria» podría sugerir un registro teológico que el contexto no exige.
  doctrine_reference: Translation philosophy §§5–6
- issue: Interpretación de שׁוֹר en el colon final
  english_pob_reading: an ox
  chosen_spanish_reading: un buey
  alternative_spanish_readings:
  - un toro
  - un buey [lectura tradicional]
  rationale: Se mantiene la lectura tradicional del sustantivo para el sentido concreto de una mutilación animal. La alternativa textual a «muro» queda reflejada en nota para no borrar la tensión interpretativa documentada.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Se corrigió la alineación de las notas al texto en español: todos los marcadores usados en las notas aparecen exactamente anclados en el verso, y se eliminó la anterior desreferencia entre marcador y texto. El resto del contenido sigue el pasaje hebreo y el audit trail inglés sin cambios sustantivos.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «honor» para כָּבוֹדִי por coherencia con el valor de dignidad personal en el contexto poético.
  - Se usó «buey» para שׁוֹר en la línea principal, con la lectura alternativa «muro» preservada en nota por fidelidad al debate textual documentado.
  - Se eligió un español natural pero suficientemente literal, conservando el paralelismo sintáctico del hebreo.
