translation:
  language: es
  text: Y no vayan tras otros dioses, para servirles y postrarse ante ellos[a]; ni me provoquen a ira con la obra de sus manos, y no les haré daño[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «seguir otros dioses».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y no traeré desastre sobre ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּלְכוּ אַחֲרֵי
  english_pob_choice: go after
  chosen_spanish: vayan tras
  alternatives_spanish:
  - sigan
  - vayan detrás de
  lexicon: HALOT
  rationale: El hebreo literalmente expresa la idea de ir detrás de alguien o algo, con sentido de adhesión y lealtad. «Vayan tras» conserva esa imagen sin sonar forzado en español.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - dioses extranjeros
  lexicon: HALOT
  rationale: La expresión denota deidades distintas de Yahvé. «Otros dioses» es la forma más directa y natural, sin añadir el matiz de extranjería que el hebreo no explicita aquí.
- source_word: לְעָבְדָם
  english_pob_choice: to serve them
  chosen_spanish: para servirles
  alternatives_spanish:
  - para adorarlos
  - para rendirles servicio
  lexicon: HALOT
  rationale: עבד, en contexto de deidades, puede implicar servicio cultual, pero el sentido base es «servir». Se mantiene esa distinción frente al verbo siguiente, para no fusionar dos acciones diferentes.
- source_word: וּלְהִשְׁתַּחֲוֺת לָהֶם
  english_pob_choice: and to bow down to them
  chosen_spanish: y postrarse ante ellos
  alternatives_spanish:
  - y inclinarse ante ellos
  - y adorarlos
  lexicon: HALOT
  rationale: השתחוה describe el acto físico de postrarse o inclinarse en reverencia. «Postrarse ante ellos» conserva ese gesto y evita reducirlo a un sentido más general de adoración.
- source_word: תַכְעִיסוּ אֹתִי
  english_pob_choice: provoke me to anger
  chosen_spanish: me provoquen a ira
  alternatives_spanish:
  - me irriten
  - me hagan enojar
  lexicon: HALOT
  rationale: 'El hifil de כעס tiene fuerza causativa: provocar a ira. «Provoquen a ira» reproduce bien la forma profética y su gravedad.'
- source_word: בְּמַעֲשֵׂה יְדֵיכֶם
  english_pob_choice: by the work of your hands
  chosen_spanish: con la obra de sus manos
  alternatives_spanish:
  - por la obra de sus manos
  - por lo que sus manos han hecho
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para aquello fabricado por humanos, especialmente ídolos en este contexto. «Con la obra de sus manos» preserva la frase bíblica y la referencia a producción humana.
- source_word: וְלֹא אָרַע לָכֶם
  english_pob_choice: and I will do you no harm
  chosen_spanish: y no les haré daño
  alternatives_spanish:
  - y no les causaré mal
  - y no les traeré desastre
  lexicon: HALOT
  rationale: El verbo en este contexto comunica causar daño o calamidad. «No les haré daño» es claro en español y mantiene el sentido directo sin introducir una paráfrasis más explicativa.
theological_decisions:
- issue: La última cláusula puede entenderse como daño general o como calamidad judicial.
  english_pob_reading: and I will do you no harm
  chosen_spanish_reading: y no les haré daño
  alternative_spanish_readings:
  - y no les traeré desastre
  - y no los castigaré
  rationale: El hebreo usa una negación con verbo causativo de רעע, que en contexto puede abarcar daño o desastre. Se eligió una formulación simple y fiel, sin especificar más de lo que el texto exige, aunque el trasfondo incluye la posibilidad de calamidad.
  doctrine_reference: Jeremías 25:6; cf. uso profético de רעע como daño/calamidad
- issue: La secuencia de verbos distingue servicio religioso y postración física.
  english_pob_reading: to serve them and to bow down to them
  chosen_spanish_reading: para servirles y postrarse ante ellos
  alternative_spanish_readings:
  - para adorarlos y postrarse ante ellos
  - para servirles y adorarlos
  rationale: El texto hebreo usa dos verbos distintos; conservar esa distinción evita borrar la diferencia entre servicio cultual y el acto corporal de inclinarse o postrarse. Eso respeta la tensión lexical del pasaje.
  doctrine_reference: Jeremías 25:6; distinción entre עבד y השתחוה
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo y el audit trail en inglés. No hubo revisiones aplicadas en la última pasada; la presente propuesta mantiene la lectura estable con equivalentes españoles más naturales pero sin perder la distinción entre «servir» y «postrarse», ni la ambigüedad del cierre entre «daño» y posible «desastre».
  spanish_consistency_notes:
  - Se usa «Yahvé» por consistencia del proyecto cuando el texto hebreo se refiere al habla divina implícita de contexto profético, aunque en este versículo no aparece el tetragrámaton de forma explícita.
  - Se mantuvo «otros dioses» en vez de «dioses ajenos» para no añadir un matiz no presente en אֲחֵרִים.
  - Se prefirió «servirles» frente a «adorarlos» para conservar la distinción con el verbo siguiente.
  - Se usó el pronombre de trato plural de segunda persona («vayan», «sus») en coherencia con el hebreo plural.
  - La nota final de «daño» deja abierta la posibilidad de «desastre» que el audit trail inglés documenta, sin obligar una especificación interpretativa.
