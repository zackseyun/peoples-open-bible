review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura causal del hebreo, conserva la distinción entre אַף y חֵמָה, y comunica adecuadamente que el pueblo es consumido por la ira divina y perturbado/aterrorizado por su furor. Sin embargo, la colocación de las notas está invertida respecto a los términos a los que corresponden en inglés y por sentido léxico: la nota sobre alternativas de כָלִינוּ debe anclarse en «consumidos», y la nota sobre alternativas de נִבְהָלְנוּ debe anclarse en el segundo verbo.'
  spanish_quality_summary: El español es claro y digno. «Porque somos consumidos por tu ira, y por tu furor somos aterrados» es comprensible, pero «somos aterrados» suena algo menos natural en español bíblico moderno que «quedamos aterrados» o «somos aterrorizados». Aun así, el problema principal es de anclaje de notas, no de inteligibilidad. Se puede conservar una redacción muy cercana con una ligera mejora de fluidez.
  glossary_alignment: No hay términos de glosario mayor comprometidos aquí. La diferenciación «ira» / «furor» está bien justificada y se alinea con la decisión inglesa de mantener dos términos distintos para la ira divina.
  issues:
  - severity: high
    issue: Las notas al pie están ancladas al término equivocado en el texto español.
    rationale: La nota a explica alternativas de כָלִינוּ («somos consumidos / llegamos a nuestro fin»), pero está puesta tras «ira». La nota b explica alternativas de נִבְהָלְנוּ («sobrecogidos / turbados / aterrados»), pero está puesta tras «furor». Esto desorienta al lector y no preserva correctamente el rastro de auditoría del POB.
  - severity: medium
    issue: «Somos aterrados» es menos idiomático en español que otras opciones posibles.
    rationale: Aunque entendible y cercano al valor pasivo/resultativo, en español suena algo forzado. «Quedamos aterrados» expresa bien el resultado del verbo נבהל y mejora la naturalidad sin perder intensidad.
  revised_spanish_text: Porque somos consumidos[a] por tu ira, y por tu furor quedamos aterrados[b].
  revised_footnotes:
