    reason: source_note
  - marker: b
    text: 'Hebreo: también puede entenderse como «y la oscuridad pueda palparse» o «y uno pueda sentir la oscuridad». El verbo final es raro y sugiere una oscuridad tangible.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «sea sentida» por «se pueda sentir la oscuridad» para lograr un español natural y digno, manteniendo la fuerza perceptible/palpable del verbo hebreo raro y la ambigüedad preservada en la nota. El resto del versículo permanece fiel al texto fuente y a la terminología del proyecto.
