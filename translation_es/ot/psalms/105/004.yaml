review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: mantiene los dos imperativos paralelos (''Busquen''), preserva ''Yahvé'' para יְהוָה, traduce וְעֻזּוֹ como ''y su fuerza'', y conserva la imagen de פָנָיו como ''su rostro''. La nota también retiene la alternativa idiomática ''presencia''.'
  spanish_quality_summary: El español es claro y natural, pero el orden de 'siempre' en el texto principal y en la nota suena menos fiel al matiz de תָּמִיד que 'continuamente'. Además, en español bíblico y eclesial 'busquen siempre su rostro' es entendible, pero 'busquen su rostro continuamente' se alinea mejor con la evidencia fuente y con la auditoría inglesa.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: ''Yahvé'' para יְהוָה, ''fuerza'' para עֹז, y conservación de ''rostro'' frente a la alternativa interpretativa ''presencia''. No hay conflictos doctrinales relevantes.'
  issues:
  - severity: medium
    issue: '''siempre'' debilita ligeramente el valor aspectual de תָּמִיד frente a ''continuamente'''
    rationale: Aunque 'siempre' puede ser aceptable, la auditoría inglesa eligió 'continually' para reflejar constancia continua. 'Continuamente' comunica mejor ese matiz en español y evita una lectura meramente general de 'siempre'.
  - severity: low
    issue: La nota al pie con 'su presencia siempre' suena menos natural en español
    rationale: Como alternativa idiomática, 'busquen continuamente su presencia' o simplemente 'su presencia continuamente' refleja mejor el flujo del español y mantiene la correspondencia con el orden lógico de la cláusula.
  revised_spanish_text: Busquen a Yahvé y su fuerza[a]; busquen su rostro continuamente.
  revised_footnotes:
