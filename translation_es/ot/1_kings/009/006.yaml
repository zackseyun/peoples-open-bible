base_translation:
  language: en
  yaml_path: translation/ot/1_kings/009/006.yaml
  text: But if you or your sons turn away from following me[a], and do not keep my commandments and my statutes that I have set before you, and go and serve other gods and bow down to them,
  footnotes:
