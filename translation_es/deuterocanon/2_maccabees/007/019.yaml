translation:
  language: es
  text: Pero tú[a], no pienses que saldrás inocente por haber intentado luchar contra Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por haber intentado oponerte a Dios». El verbo griego es literalmente «luchar contra Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ δὲ
  english_pob_choice: But as for you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Pero en cuanto a ti
  - Pero tú, por tu parte
  lexicon: LSJ
  rationale: Conserva el contraste adversativo de δέ y el énfasis del pronombre σὺ de manera natural en español. 'Pero tú' mantiene la confrontación directa sin recargar el estilo.
- source_word: μὴ νομίσῃς
  english_pob_choice: do not suppose
  chosen_spanish: no pienses
  alternatives_spanish:
  - no supongas
  - no imagines
  lexicon: LSJ
  rationale: νομίζω expresa aquí una suposición errónea o autoengaño. 'No pienses' es claro y directo en español; 'no supongas' también sería viable, pero suena un poco más abstracto.
- source_word: ἀθῷος
  english_pob_choice: innocent
  chosen_spanish: inocente
  alternatives_spanish:
  - sin culpa
  - libre de culpa
  - quedará impune
  lexicon: LSJ
  rationale: '''Inocente'' es la equivalencia más natural y fiel al sentido básico de exento de culpa o responsabilidad. Se evita ''impune'' como traducción principal porque introduce con más fuerza la idea de castigo evitado que la noción de culpa.'
- source_word: ἔσεσθαι
  english_pob_choice: you will be
  chosen_spanish: quedarás
  alternatives_spanish:
  - serás
  - estarás
  lexicon: LSJ
  rationale: El futuro infinitivo en discurso indirecto se expresa de modo natural con 'quedarás' en español, destacando el estado resultante que el hablante niega. 'Serás inocente' también es posible, pero suena más estático.
- source_word: θεομαχεῖν
  english_pob_choice: to fight against God
  chosen_spanish: combatir contra Dios
  alternatives_spanish:
  - luchar contra Dios
  - pelear contra Dios
  - oponerte a Dios
  lexicon: LSJ
  rationale: 'Se conserva la imagen verbal fuerte del compuesto griego: una acción hostil dirigida contra Dios. ''Combatir contra Dios'' refleja mejor la literalidad y la tensión teológica que una versión más general como ''oponerte a Dios''.'
- source_word: ἐπιχειρήσας
  english_pob_choice: having attempted
  chosen_spanish: habiendo intentado
  alternatives_spanish:
  - tras haber intentado
  - después de intentar
  lexicon: LSJ
  rationale: El participio aoristo se vierte con un gerundio perfecto español para conservar su relación previa y causal respecto de la advertencia principal. 'Habiendo intentado' es formal y transparente.
theological_decisions:
- issue: ἔνοχη culpa vs. resultado de la acción
  english_pob_reading: do not suppose that you will be innocent, having attempted to fight against God.
  chosen_spanish_reading: no pienses que quedarás inocente, habiendo intentado combatir contra Dios.
  alternative_spanish_readings:
  - no pienses que quedarás impune
  - no imagines que estarás libre de culpa
  rationale: La advertencia no solo apunta a un eventual castigo, sino a la imposibilidad de considerarse libre de culpa después de una acción hostil contra Dios. 'Quedarás inocente' preserva la acusación moral y la tensión del original sin resolverla hacia un simple resultado jurídico.
  doctrine_reference: Preservar la tensión moral y teológica del texto; el lenguaje acusa una resistencia real contra Dios mismo.
- issue: θεομαχεῖν como hostilidad directa a Dios
  english_pob_reading: having attempted to fight against God
  chosen_spanish_reading: habiendo intentado combatir contra Dios
  alternative_spanish_readings:
  - habiendo intentado oponerte a Dios
  - habiendo intentado guerrear contra Dios
  rationale: Se mantiene la fuerza del verbo compuesto y su referencia directa a Dios, no solo al pueblo. La formulación literal evita suavizar la acusación teológica.
  doctrine_reference: Primacía del texto griego y preservación de la tensión teológica original.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego y la revisión inglesa más reciente, especialmente en la relación participial de ἐπιχειρήσας. Se evitó traducir mecánicamente desde el inglés cuando una solución española más natural podía conservar mejor la fuerza del original.
  spanish_consistency_notes:
  - Se usó 'Dios' para θεός y la referencia es directa y singular.
  - Se conservó el verbo de confrontación fuerte ('combatir') para θεομαχεῖν, en línea con la nota léxica inglesa.
  - '''No pienses'' reproduce el tono de advertencia y autoengaño de μὴ νομίσῃς sin endurecer innecesariamente el español.'
  - El participio aoristo se expresó con 'habiendo intentado' para mantener la secuencia anterior a la advertencia principal.
