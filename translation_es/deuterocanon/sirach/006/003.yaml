translation:
  language: es
  text: Consumirá tus hojas[a] y arrancará de raíz[b] tu fruto, y te dejará como un árbol seco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo es difícil en varios puntos de este verso; el paralelo griego apoya el sentido de «tus hojas» y un desenlace destructivo para «tu fruto».
    reason: textual_variant
  - marker: b
    text: O «destruirá tu fruto». El verbo hebreo subyacente es incierto aquí, y el griego lee «destruir/perder».
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלֶיךָ
  english_pob_choice: your leaves
  chosen_spanish: las hojas
  alternatives_spanish:
  - sobre ti
  - contra ti
  lexicon: HALOT
  rationale: Aunque la forma hebrea es difícil, el paralelo griego τὰ φύλλα σου confirma el sentido de «tus hojas». En español conviene mantener la imagen arbórea, no una lectura preposicional literal que rompería el paralelismo con «tu fruto».
- source_word: תֹּאכַל
  english_pob_choice: it will consume
  chosen_spanish: te consumirá
  alternatives_spanish:
  - comerá
  - devorará
  lexicon: HALOT
  rationale: El verbo básico es «comer/consumir». En el contexto figurado, «consumirá» conserva la fuerza destructiva del hebreo y del griego καταφάγεσαι sin sonar demasiado crudo o mecánico en español.
- source_word: וּפֶרְיְךָ
  english_pob_choice: your fruit
  chosen_spanish: tu fruto
  alternatives_spanish:
  - tu producción
  - tu cosecha
  lexicon: HALOT
  rationale: «Fruto» es la traducción más directa y mantiene la metáfora del árbol. «Producción» o «cosecha» suavizarían la imagen y la volverían menos coherente con «hojas» y «árbol seco».
- source_word: תְּשָׁרֵשׁ
  english_pob_choice: uproot
  chosen_spanish: destruirá
  alternatives_spanish:
  - arrancará de raíz
  - desarraigará
  - exterminará
  lexicon: HALOT
  rationale: El hebreo es incierto y el paralelo griego ἀπολέσεις apunta a «destruir/perder». En español, «destruirá» mantiene esa amplitud sin forzar una imagen botánica demasiado específica que no está asegurada por la evidencia.
- source_word: וְהִנִיחַתְךָ
  english_pob_choice: leave you
  chosen_spanish: te dejará
  alternatives_spanish:
  - te abandonará
  - te pondrá
  lexicon: HALOT
  rationale: La forma causativa admite «dejar» en contexto, y el griego ἀφήσεις refuerza la idea de abandono. «Te dejará» es natural y fiel al valor resultante.
- source_word: כְּעֵץ יָבֵשׁ
  english_pob_choice: like a dry tree
  chosen_spanish: como árbol seco
  alternatives_spanish:
  - como árbol seco y sin savia
  - como árbol marchito
  lexicon: HALOT
  rationale: «Árbol seco» reproduce con sobriedad el símil final. «Seco» es más directo que «marchito» y conserva la dureza de la imagen.
theological_decisions:
- issue: Base textual hebrea con apoyo del griego en un pasaje de lectura difícil
  english_pob_reading: Translate primarily from the extant Hebrew while allowing the Greek parallel to clarify difficult forms and syntax.
  chosen_spanish_reading: Traducir principalmente desde el hebreo conservado, usando el paralelo griego para aclarar las formas y el sentido difíciles.
  alternative_spanish_readings:
  - 'Seguir solo el hebreo de manera más literal: «Sobre ti comerá...»'
  - 'Seguir más de cerca el griego: «Tus hojas te devorará y tus frutos destruirá...»'
  rationale: La evidencia hebrea es la base principal, pero la nota de desajuste mayor y el griego paralelo confirman la imaginería de hojas, fruto y árbol seco. La versión española debe reflejar esa resolución sin ocultar que el hebreo es textual y sintácticamente difícil.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde Sirácida se conserva; usar el paralelo griego como entrada real.'
translation_notes:
  revision_awareness: 'Sin cambios necesarios según la última revisión: el pasaje mantiene alta concordancia y solo presenta cuestiones menores de lectura textual y elección léxica.'
  spanish_consistency_notes:
  - Se conserva «fruto» para mantener la metáfora arbórea con «hojas» y «árbol seco».
  - Se evita una paráfrasis explicativa que diluya la dureza del símil final.
  - Las notas a y b reflejan la tensión textual documentada en el audit trail inglés, sin suavizarla.
