  to: Sabe[a], pues, que Yahvé tu Dios, él es Dios, el Dios fiel, que guarda el pacto y el amor constante[b] para los que lo aman y para los que guardan sus mandamientos, hasta mil generaciones[c].
  rationale: 'Se propone una reparación pequeña pero importante: cambiar ''la fidelidad'' por ''el amor constante'' para representar mejor חֶסֶד según la evidencia léxica y el inglés auditado (''steadfast love''), además de mejorar la naturalidad del español en la construcción ''guardar el pacto y ...''. Se actualiza la nota correspondiente para reflejar ese ajuste.'
