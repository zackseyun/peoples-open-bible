translation:
  language: es
  text: Y partió de allí de noche, y siguió hasta la fortaleza[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «fuerte» o «lugar fortificado»; ὀχύρωμα designa un lugar defendido o fortificado en general, no necesariamente una estructura específica.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆρεν
  english_pob_choice: set out
  chosen_spanish: partió
  alternatives_spanish:
  - salió
  - se puso en camino
  - se fue
  lexicon: LSJ
  rationale: ἀπῆρεν expresa la salida o partida desde un lugar. «Partió» comunica bien en español la idea de iniciar el desplazamiento sin añadir matices innecesarios.
- source_word: ἐκεῖθεν
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: LSJ
  rationale: Adverbio de lugar que marca el punto de partida. «De allí» es natural y fiel; «desde allí» también sería posible, pero «de allí» mantiene fluidez.
- source_word: νυκτός
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - durante la noche
  lexicon: LSJ
  rationale: El genitivo funciona adverbialmente y señala movimiento nocturno. «De noche» es la forma más idiomática y clara en español.
- source_word: ἐπορεύετο
  english_pob_choice: went on
  chosen_spanish: siguió
  alternatives_spanish:
  - iba
  - prosiguió
  - continuó
  lexicon: LSJ
  rationale: El imperfecto de πορεύομαι indica acción en curso. «Siguió» transmite bien el avance continuado sin introducir explícitamente la llegada.
- source_word: ἕως ἐπὶ τὸ ὀχύρωμα
  english_pob_choice: as far as the stronghold
  chosen_spanish: hasta la fortaleza
  alternatives_spanish:
  - hasta el fuerte
  - hasta la plaza fortificada
  - hasta la fortificación
  lexicon: LSJ
  rationale: ὀχύρωμα denota un lugar fortificado. «Fortaleza» preserva el sentido militar y es natural en español; «fuerte» también sería viable, pero «fortaleza» ofrece mayor amplitud semántica.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del inglés auditado, evitando añadir la idea explícita de que el personaje «llegó»; por eso se prefiere «siguió hasta la fortaleza» en lugar de una formulación que cierre el movimiento con llegada afirmada.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y sobrio, sin arcaísmos innecesarios.
  - «Fortaleza» se usa como equivalente contextual de ὀχύρωμα, dejando abierta la alternativa semántica documentada en la nota.
  - No se introduce mayúscula reverencial ni terminología eclesiástica ajena al contexto narrativo.
