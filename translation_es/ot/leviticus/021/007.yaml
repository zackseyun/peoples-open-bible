translation:
  language: es
  text: No tomarán una prostituta ni una mujer profanada[a], ni una mujer divorciada de su marido; porque él es santo para su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contaminada». El término hebreo puede referirse a una mujer cuyo estado ha sido profanado o degradado.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִשָּׁה זֹנָה
  english_pob_choice: a woman who is a prostitute
  chosen_spanish: mujer prostituta
  alternatives_spanish:
  - mujer ramera
  - mujer promiscua
  lexicon: HALOT
  rationale: זֹנָה denota una mujer dedicada a la prostitución. «Prostituta» es la opción clara y contemporánea en español y conserva el valor léxico sin el arcaísmo de «ramera».
- source_word: חֲלָלָה
  english_pob_choice: profaned
  chosen_spanish: profanada
  alternatives_spanish:
  - profanada/contaminada
  - deshonrada
  lexicon: HALOT
  rationale: En este contexto sacerdotal, el término describe a una mujer cuyo estado ha sido profanado o degradado. «Profanada» mantiene la relación formal con el lenguaje de santidad del versículo y evita suavizar la tensión lexical.
- source_word: יִקָּחוּ
  english_pob_choice: shall not take
  chosen_spanish: No tomarán
  alternatives_spanish:
  - No se casarán con
  - No recibirán
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente «tomar», usado para tomar esposa en matrimonio. «No tomarán» preserva la forma de la fuente; el contexto hace claro el sentido matrimonial sin añadir una paráfrasis.
- source_word: גְּרוּשָׁה מֵאִישָׁהּ
  english_pob_choice: a woman divorced from her husband
  chosen_spanish: mujer divorciada de su marido
  alternatives_spanish:
  - mujer divorciada
  - mujer separada de su marido
  lexicon: HALOT
  rationale: La frase hebrea explicita el divorcio «de su marido». En español, «divorciada de su marido» reproduce más plenamente la construcción que simplemente «divorciada».
- source_word: קָדֹשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - consagrado
  lexicon: HALOT
  rationale: En la legislación sacerdotal, «santo» es el equivalente natural y tradicional de קָדֹשׁ, y conserva el registro teológico del texto mejor que una explicación perifrástica.
- source_word: לֵאלֹהָיו
  english_pob_choice: to his God
  chosen_spanish: para su Dios
  alternatives_spanish:
  - a su Dios
  - de su Dios
  lexicon: HALOT
  rationale: El lamed expresa relación/dedicación. «Para su Dios» comunica bien la pertenencia consagrada y mantiene el matiz de propósito/relación presente en la construcción.
theological_decisions:
- issue: Cambio de número entre el mandato plural y la razón en singular
  english_pob_reading: The singular refers to the individual priest governed by the law, while the preceding plurals address priests collectively.
  chosen_spanish_reading: El plural «No tomarán» dirige la norma a los sacerdotes en conjunto, mientras que «él es santo» mantiene el motivo aplicado a cada sacerdote individual.
  alternative_spanish_readings:
  - El singular podría tomarse como un uso genérico para la clase sacerdotal.
  rationale: La alternancia plural-singular está en el hebreo y no conviene nivelarla. En español, la traducción conserva esa tensión con una norma colectiva seguida por una fundamentación individual.
  doctrine_reference: Translation philosophy §1, §5
- issue: Lenguaje de santidad y profanación en una restricción matrimonial
  english_pob_reading: Use 'profaned' in the main text without expanding the text into later interpretive categories.
  chosen_spanish_reading: Mantener «profanada» en el texto principal sin añadir categorías interpretativas posteriores.
  alternative_spanish_readings:
  - Usar «profanada» como nota y dejar una forma más general en el texto.
  - Usar «contaminada» para enfatizar la impureza ritual.
  rationale: El versículo presenta una restricción de santidad sacerdotal. «Profanada» preserva la fuerza cultual-moral del hebreo y evita introducir explicaciones ajenas al enunciado.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «defiled» por «profaned» para acercarse más a חֲלָלָה y mantener consistencia con el lenguaje de santidad/profanación. Esta glosa se refleja en español con «profanada» en el texto principal y una nota alternativa breve para preservar la ambigüedad léxica documentada.
  spanish_consistency_notes:
  - Se usó «Yahvé» no es necesario aquí porque el texto hebreo dice «su Dios» (לֵאלֹהָיו), no el nombre divino.
  - Se mantuvo el registro legal-sacerdotal con verbos directos y sin expandir «tomar» a una paráfrasis interpretativa.
  - «Marido» reproduce el referente relacional explícito de אִישָׁהּ y suena natural en español bíblico contemporáneo.
