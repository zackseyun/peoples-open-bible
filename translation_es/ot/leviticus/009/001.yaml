    issue: 'Frase temporal poco natural: «en el día octavo»'
    rationale: Aunque cercana a la forma hebrea, en español suena más idiomático «el octavo día» o «en el octavo día». El proyecto pide evitar calcos rígidos cuando vuelven la gramática española menos natural.
  - severity: low
    issue: 'Puntuación innecesaria en la serie: coma tras «Aarón»'
    rationale: En una enumeración simple de complementos, «llamó a Aarón, a sus hijos y a los ancianos de Israel» no requiere más que la coma normal antes del segundo elemento; puede mantenerse, pero una redacción más limpia mejora la lectura.
  revised_spanish_text: Y sucedió el octavo día que Moisés llamó a Aarón, a sus hijos y a los ancianos de Israel[a].
