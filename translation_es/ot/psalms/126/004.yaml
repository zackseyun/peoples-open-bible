review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: imperativo dirigido a Yahvé, el modismo שוב את־שבות como restauración amplia con alternativa de cautiverio/exilio en nota, y la imagen de los cauces del Néguev. Sin embargo, «nuestras fortunas» no suena natural en español bíblico actual y puede sugerir riqueza material más que la restauración integral de la condición del pueblo.'
  spanish_quality_summary: La redacción es en general clara y digna. «Restaura ... como torrentes en el Néguev» funciona bien, pero «nuestras fortunas» es poco idiomático. «Nuestra suerte» o «nuestra condición» comunica mejor el modismo en español natural. También conviene quitar la comilla sobrante al inicio de la justificación teológica en los metadatos, pero eso no afecta el texto bíblico.
  glossary_alignment: Se alinea correctamente con la terminología del proyecto en «Yahvé». No hay conflicto relevante con otras entradas del glosario. La elección de «torrentes» para כַּאֲפִיקִים es defendible y está bien apoyada por la nota cultural.
  issues:
  - severity: medium
    issue: «nuestras fortunas» es una formulación poco natural y potencialmente engañosa en español
    rationale: Aunque intenta calcar «our fortunes», en español suele asociarse a riquezas o bienes, y no expresa con claridad la restauración del estado del pueblo. «Nuestra suerte» preserva mejor el sentido idiomático amplio del hebreo sin cerrarlo a cautiverio literal.
  - severity: low
    issue: La nota a debe sonar más natural en español
    rationale: «desterrados» puede funcionar, pero «exiliados» conecta mejor con el trasfondo del salmo y con la alternativa documentada en inglés. Además, la redacción puede simplificarse levemente sin perder precisión.
  revised_spanish_text: Restaura nuestra suerte[a], oh Yahvé[b], como torrentes en el Néguev.
