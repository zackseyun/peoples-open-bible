translation:
  language: es
  text: 'Toda carne se desgasta como una prenda[a], y el decreto eterno es: «Muriendo, morirán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo final es breve y difícil; literalmente expresa algo como «el que muere, muere» o «muriendo, mueren». El paralelo griego aclara el sentido como un decreto antiguo de muerte universal.
    reason: alternative_reading
lexical_decisions:
- source_word: כָּל הַבָּשָׂר / πᾶσα σὰρξ
  english_pob_choice: All flesh
  chosen_spanish: Toda carne
  alternatives_spanish:
  - Toda humanidad
  - Todo ser humano
  - Todo mortal
  lexicon: HALOT; LXX σάρξ
  rationale: «Carne» conserva el idiomatismo hebreo y griego para la totalidad de los mortales, sin suavizarlo a una abstracción. «Toda carne» mantiene la fuerza concreta del original y su universalidad.
- source_word: כַּבֶּגֶד / ὡς ἱμάτιον
  english_pob_choice: like a garment
  chosen_spanish: como un vestido
  alternatives_spanish:
  - como un vestido
  - como una prenda
  - como ropa
  lexicon: HALOT; LXX ἱμάτιον
  rationale: «Vestido» comunica de manera natural la imagen de una prenda que se gasta. Evita el calco áspero «como un ropaje» y sigue de cerca la comparación de algo que se consume con el uso.
- source_word: יִבְלֶה / παλαιοῦται
  english_pob_choice: wears out
  chosen_spanish: se desgasta
  alternatives_spanish:
  - se envejece
  - se gasta
  - se vuelve viejo
  lexicon: HALOT; LXX παλαιοῦται
  rationale: El verbo hebreo y el griego apuntan al deterioro por el paso del tiempo o del uso. «Se desgasta» es idiomático en español y conserva la imagen material del vestido.
- source_word: וְחֹק עוֹלָם / ἡ ... διαθήκη ἀπʼ αἰῶνος
  english_pob_choice: the everlasting decree
  chosen_spanish: el decreto eterno
  alternatives_spanish:
  - el estatuto eterno
  - la ordenanza perpetua
  - la disposición de antaño
  lexicon: HALOT; LXX διαθήκη
  rationale: חֹק puede ser estatuto, decreto u ordenanza fija. «Decreto eterno» transmite bien la idea de una norma estable y universal. Se evita «pacto» porque en este contexto la fórmula describe una sentencia/orden permanente, no un pacto relacional.
- source_word: גֹּוֵעַ יִגְוָעוּ / Θανάτῳ ἀποθανῇ
  english_pob_choice: Dying, they shall die
  chosen_spanish: Morir, morirán
  alternatives_spanish:
  - Muriendo, morirán
  - al morir, morirán
  - ciertamente morirán
  lexicon: HALOT; LXX Θανάτῳ ἀποθανῇ
  rationale: La expresión hebrea es tersa y enfática; el griego paralelo conserva la idea de muerte segura. «Morir, morirán» reproduce en español la fuerza enfática sin imponer una lectura más interpretativa que la fuente.
theological_decisions:
- issue: Cómo renderizar la cláusula final difícil sin borrar la tensión entre el hebreo y el griego
  english_pob_reading: and the everlasting decree is, “Dying, they shall die.”
  chosen_spanish_reading: 'y el decreto eterno es: «Morir, morirán».'
  alternative_spanish_readings:
  - 'y el decreto eterno es: «Muriendo, morirán»'
  - 'y el decreto eterno es: «Ciertamente morirán»'
  rationale: El hebreo transmite una construcción enfática difícil; el griego aporta una confirmación interpretativa del sentido de muerte inevitable. La versión española conserva la brevedad y la fuerza retórica del original sin ocultar que el giro es una forma enfática de decir muerte universal.
  doctrine_reference: 'PHILOSOPHY.md: preservar con honestidad las dificultades del texto y usar el paralelo griego como ayuda de traducción cuando aclara el sentido sin anular el hebreo.'
translation_notes:
  revision_awareness: La redacción corrige cualquier residuo inglés y evita el calco directo del borrador previo. En particular, se sustituyó «All flesh» por «Toda carne», «wears out» por «se desgasta» y se unificó la cláusula final en español natural con fuerza enfática, sin dejar frases en inglés ni citas híbridas.
  spanish_consistency_notes:
  - Se mantuvo «carne» para preservar el idioma bíblico de mortalidad universal.
  - «Decreto eterno» traduce de forma transparente la idea de חֹק עוֹלָם como norma fija y permanente.
  - La puntuación española usa comillas angulares para la cita directa y respeta la cadencia breve del original.
