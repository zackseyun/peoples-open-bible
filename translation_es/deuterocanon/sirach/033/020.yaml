translation:
  language: es
  text: Al hijo y a la esposa[a], al hermano y al amigo, no les des autoridad sobre ti durante tu vida; y no entregues tus bienes[b] a otro, para que no te arrepientas y tengas que pedir que te los devuelvan[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mujer'. El griego γυναικί puede significar 'mujer' o 'esposa'; en esta lista de relaciones domésticas, 'esposa' parece más probable.
    reason: lexical_alternative
  - marker: b
    text: O 'tus posesiones' o 'tu dinero'. El griego χρήματα puede abarcar bienes, posesiones o dinero.
    reason: lexical_alternative
  - marker: c
    text: Lit., 'para que no, habiendo sentido pesar, tengas necesidad respecto de ellos'. La idea es que, después de entregar tus bienes, quizá tengas que pedirlos de vuelta.
    reason: lexical_alternative
lexical_decisions:
- source_word: υἱῷ
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - niño
  - hijo varón
  lexicon: LSJ
  rationale: El dativo singular masculino se refiere de manera directa a 'son'; en español, 'hijo' reproduce el parentesco sin añadir matices innecesarios.
- source_word: γυναικί
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - esposa
  lexicon: LSJ
  rationale: En esta lista relacional de ámbito doméstico, 'esposa' expresa mejor el vínculo que 'mujer', que en español puede sonar más genérico o ambiguo.
- source_word: μὴ δῷς ἐξουσίαν ἐπὶ σέ
  english_pob_choice: do not give authority over yourself
  chosen_spanish: no les des autoridad sobre ti
  alternatives_spanish:
  - no les des control sobre ti
  - no les entregues poder sobre ti
  lexicon: LSJ
  rationale: ἐξουσία conserva la idea de autoridad/poder. 'Autoridad sobre ti' sigue de cerca la construcción y mantiene la fuerza formal sin sonar forzado.
- source_word: ἐν ζωῇ σου
  english_pob_choice: during your lifetime
  chosen_spanish: durante tu vida
  alternatives_spanish:
  - mientras vivas
  - en tu vida
  lexicon: LSJ
  rationale: La expresión marca el límite temporal de la advertencia; 'durante tu vida' es natural en español y fiel al alcance del griego.
- source_word: τὰ χρήματά σου
  english_pob_choice: your possessions
  chosen_spanish: tus bienes
  alternatives_spanish:
  - tus posesiones
  - tu dinero
  - tus propiedades
  lexicon: LSJ
  rationale: χρήματα puede abarcar bienes, posesiones o dinero. 'Bienes' preserva la amplitud semántica sin reducirlo solo a dinero.
- source_word: ἑτέρῳ
  english_pob_choice: another
  chosen_spanish: a otro
  alternatives_spanish:
  - a otra persona
  - a alguien más
  lexicon: LSJ
  rationale: El dativo indefinido se traduce de forma simple y directa como 'a otro'.
- source_word: ἵνα μὴ μεταμεληθεὶς
  english_pob_choice: lest you regret it
  chosen_spanish: para que no te arrepientas
  alternatives_spanish:
  - para que no cambies de parecer
  - no sea que te arrepientas
  lexicon: LSJ
  rationale: μεταμέλομαι suele implicar arrepentirse o lamentar después. 'Arrepientas' comunica bien el giro posterior que advierte el texto.
- source_word: δέῃ περὶ αὐτῶν
  english_pob_choice: have to plead for it
  chosen_spanish: tengas que pedir por ellos
  alternatives_spanish:
  - tengas que suplicar por ellos
  - te veas necesitado respecto de ellos
  - tengas que pedirlos de vuelta
  lexicon: LSJ
  rationale: La forma expresa quedar en necesidad respecto de lo entregado. 'Tengas que pedir por ellos' conserva la idea de dependencia posterior y respeta el plural del antecedente.
theological_decisions:
- issue: Traducción de γυναικί en una lista familiar
  english_pob_reading: wife
  chosen_spanish_reading: esposa
  alternative_spanish_readings:
  - mujer
  - esposa
  rationale: 'No hay una tensión doctrinal aquí, pero sí una decisión de contexto: en la secuencia ''hijo, esposa, hermano, amigo'', ''esposa'' comunica mejor el vínculo relacional y evita una generalización innecesaria de ''mujer''.'
  doctrine_reference: n/a
translation_notes:
  revision_awareness: La redacción sigue el consenso del texto griego de Swete 1909 y el ajuste reciente del POB inglés, que prefirió 'possessions' frente a 'property' y corrigió el referente final al plural ('them'). En español se reflejó esa amplitud con 'bienes' y el plural 'ellos'.
  spanish_consistency_notes:
  - Se mantiene el tratamiento directo en singular ('tu vida', 'te arrepientas') como en el griego.
  - Se evita 'SEÑOR' u otras fórmulas no presentes, porque el versículo no contiene el nombre divino.
  - '''Autoridad sobre ti'' conserva la fuerza formal de ἐξουσία sin recurrir a un término eclesiástico.'
  - El final 'por ellos' mantiene el referente plural de τὰ χρήματά σου y de la revisión inglesa más reciente.
