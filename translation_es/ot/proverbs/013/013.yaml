translation:
  language: es
  text: El que desprecia una palabra será arruinado por ella[a][b], pero el que teme el mandamiento será recompensado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un asunto». דָבָר puede significar «palabra», «asunto» o «cosa».
    reason: lexical_alternative
  - marker: b
    text: O «sufrirá por ella» o «se traerá ruina sobre sí».
    reason: lexical_alternative
  - marker: c
    text: O «será retribuido». El hebreo, más literalmente, significa «será pagado / recompensado».
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּז
  english_pob_choice: despises
  chosen_spanish: desprecia
  alternatives_spanish:
  - menosprecia
  - mira con desprecio
  - desprecia con arrogancia
  lexicon: HALOT
  rationale: El participio expresa tener algo en poco o con desprecio. «Desprecia» es natural en español y conserva la fuerza moral del hebreo sin volver la línea artificial.
- source_word: לְדָבָר
  english_pob_choice: a word
  chosen_spanish: una palabra
  alternatives_spanish:
  - una cosa
  - un asunto
  - la palabra
  lexicon: HALOT
  rationale: דָבָר puede significar «palabra», «asunto» o «cosa». En este proverbio, «una palabra» mantiene la apertura léxica y la correspondencia proverbial sin sobrerreducir el sentido.
- source_word: יֵחָבֶל לוֹ
  english_pob_choice: will be ruined by it
  chosen_spanish: será arruinado por ella
  alternatives_spanish:
  - sufrirá por ella
  - le acarreará ruina
  - se arruinará por causa de ella
  lexicon: HALOT
  rationale: El nifal de חבל comunica venir a ruina o sufrir daño. «Será arruinado por ella» conserva esa idea y hace explícita la relación causal del pronombre en español.
- source_word: וִירֵא
  english_pob_choice: he who fears
  chosen_spanish: el que teme
  alternatives_spanish:
  - el que reverencia
  - el que está en temor reverente
  - quien teme
  lexicon: HALOT
  rationale: יָרֵא expresa temor reverente. «El que teme» conserva el término bíblico directo y funciona bien en el paralelismo sapiencial.
- source_word: מִצְוָה
  english_pob_choice: the commandment
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - el mandato
  - la instrucción
  - el precepto
  lexicon: HALOT
  rationale: מִצְוָה designa un mandamiento o mandato; «el mandamiento» preserva su peso normativo y suena natural en español bíblico actual.
- source_word: יְשֻׁלָּם
  english_pob_choice: will be rewarded
  chosen_spanish: será recompensado
  alternatives_spanish:
  - será retribuido
  - recibirá recompensa
  - será pagado
  lexicon: HALOT
  rationale: El pual de שלם significa ser pagado/retribuido. «Será recompensado» conserva la idea de retribución positiva sin reducirla a una sola imagen de salario o paga.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: el que
  alternatives_spanish:
  - ese
  - tal persona
  - él
  lexicon: HALOT
  rationale: El pronombre explícito añade énfasis. En español, la repetición de «el que» hace una equivalencia natural del sujeto proverbial y mantiene la referencia masculina genérica sin forzar un «él» redundante.
theological_decisions:
- issue: Lenguaje masculino representativo en proverbio sapiencial
  english_pob_reading: Retain masculine singular in the second colon ('he who fears') while using 'whoever' in the first for natural English parallelism.
  chosen_spanish_reading: Conservar el valor representativo del masculino singular con «el que...» en ambos hemistiquios.
  alternative_spanish_readings:
  - 'usar lenguaje totalmente inclusivo: «quien... quien...»'
  - 'usar masculino explícito: «él que... él que...»'
  rationale: El hebreo emplea formas masculinas singulares de modo genérico en la literatura sapiencial. «El que... el que...» suena natural en español y mantiene el paralelismo sin neutralizar indebidamente la forma del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Valor retributivo positivo de יְשֻׁלָּם
  english_pob_reading: will be rewarded
  chosen_spanish_reading: será recompensado
  alternative_spanish_readings:
  - será retribuido
  - recibirá recompensa
  - será pagado
  rationale: El contexto contrasta la ruina con una retribución favorable. «Recompensado» refleja ese resultado positivo, como en la revisión inglesa, sin perder la base de retribución del verbo.
  doctrine_reference: HALOT, שׁלם (pual)
translation_notes:
  revision_awareness: La revisión inglesa cambió «repaid» por «rewarded» para captar mejor el sentido positivo del hebreo en este contexto. La versión española sigue esa revisión con «será recompensado», manteniendo a la vez la posibilidad léxica de retribución señalada por el audit trail.
  spanish_consistency_notes:
  - Se mantiene Yahvé solo cuando el texto fuente lo exija; este versículo no contiene el nombre divino.
  - «Mandamiento» se usa como equivalente de מִצְוָה conforme al registro bíblico normativo.
  - «Recompensado» refleja la revisión positiva del audit trail inglés, evitando una lectura meramente mercantil de «pagado».
  - Los marcadores de nota se colocan en el mismo orden y con la misma función alternativa que en el texto inglés, adaptados a español.
