translation:
  language: es
  text: Y después de haber reunido, de hombre en hombre[a], dos mil dracmas de plata, las envió a Jerusalén para que se ofreciera un sacrificio por el pecado, obrando muy bien y noblemente, pues estaba razonando acerca de la resurrección.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego κατʼ ἀνδρολόγιον es una expresión algo técnica; puede significar una colecta o tasación hecha individualmente, “de hombre en hombre”, por cabeza, o según el registro de los hombres.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιησάμενός τε κατʼ ἀνδρολόγιον
  english_pob_choice: after taking up a collection man by man
  chosen_spanish: después de haber reunido una contribución[a]
  alternatives_spanish:
  - después de haber hecho una colecta de hombre en hombre
  - después de haber reunido una contribución por cabeza
  - después de haber realizado una recaudación individual
  lexicon: LSJ
  rationale: κατʼ ἀνδρολόγιον es una expresión técnica y distributiva; en español, 'una contribución' mantiene el hecho de la recaudación sin forzar una reconstrucción administrativa incierta. La nota explica la posibilidad de una colecta individual o por cabeza, que el griego sugiere pero no especifica del todo.
- source_word: ἀργυρίου δραχμὰς δισχιλίας
  english_pob_choice: two thousand silver drachmas
  chosen_spanish: dos mil dracmas de plata
  alternatives_spanish:
  - dos mil dracmas de plata
  - dos mil dracmas argentarias
  lexicon: LSJ
  rationale: La forma española natural es 'dracmas de plata', que conserva la moneda y el material indicado por el genitivo de ἀργύριον. 'Dracmas argentarias' sería menos idiomática en español.
- source_word: προσαγαγεῖν περὶ ἁμαρτίας θυσίαν
  english_pob_choice: to provide a sin offering
  chosen_spanish: para que se ofreciera un sacrificio por el pecado
  alternatives_spanish:
  - para ofrecer un sacrificio por el pecado
  - para que se presentara una ofrenda por el pecado
  - para proporcionar un sacrificio por el pecado
  lexicon: BDAG
  rationale: 'El infinitivo expresa finalidad: el dinero se envía para que se realice el rito. ''Se ofreciera'' conserva la pasiva/impersonalidad del acto cultual; ''sacrificio por el pecado'' refleja con claridad περὶ ἁμαρτίας θυσίαν sin imponer una formulación más técnica que el español no exige.'
- source_word: πάνυ καλῶς καὶ ἀστείως πράττων
  english_pob_choice: acting very well and nobly
  chosen_spanish: obrando muy bien y noblemente
  alternatives_spanish:
  - actuando muy bien y noblemente
  - obrando muy bien y con dignidad
  - actuando muy bien y honorablemente
  lexicon: LSJ
  rationale: καλῶς se traduce naturalmente por 'bien' con valor moral; ἀστείως aquí significa con nobleza, decoro o corrección. 'Obrando' suena más bíblico y menos coloquial que 'actuando'.
- source_word: ὑπὲρ ἀναστάσεως διαλογιζόμενος
  english_pob_choice: because he was reasoning about the resurrection
  chosen_spanish: pues estaba razonando acerca de la resurrección
  alternatives_spanish:
  - porque meditaba acerca de la resurrección
  - porque estaba considerando la resurrección
  - en razón de la resurrección
  lexicon: BDAG
  rationale: διαλογίζομαι implica deliberación o razonamiento; 'estaba razonando' preserva esa actividad mental. 'Acerca de la resurrección' mantiene la referencia directa del griego sin añadir 'de los muertos' que no aparece explícitamente en este versículo.
theological_decisions:
- issue: Commendation of Judas's action in sending money for a sin offering
  english_pob_reading: 'The verse is translated straightforwardly as explicit approval: ''acting very well and nobly,'' without softening the commendation.'
  chosen_spanish_reading: La frase 'obrando muy bien y noblemente' conserva la aprobación explícita del texto, sin atenuarla.
  alternative_spanish_readings:
  - obrando de manera neutral
  - procediendo de forma aceptable
  rationale: El griego expresa evaluación positiva intensa (πάνυ καλῶς καὶ ἀστείως). La traducción no debe rebajar ese juicio moral, aunque la práctica descrita pueda discutirse doctrinalmente en otras tradiciones.
  doctrine_reference: Preservar la tensión teológica sin resolverla; primacía del texto original sobre la tradición de traducción.
- issue: ἀνάστασις without an explicit genitive
  english_pob_reading: The noun appears without an explicit genitive. 'The resurrection' is the most direct rendering; the broader context supplies that it concerns the dead, but the translation should not add words absent from the Greek.
  chosen_spanish_reading: '''La resurrección'' queda implícita de manera suficiente en el español, sin añadir ''de los muertos''.'
  alternative_spanish_readings:
  - la resurrección de los muertos
  - la resurrección general
  rationale: El griego no añade un complemento; por fidelidad, conviene no introducir una precisión doctrinal que el versículo no formula.
  doctrine_reference: No importar afirmaciones doctrinales que el texto no dice.
translation_notes:
  revision_awareness: El pasaje fue revisado en el ciclo más reciente sin cambios sustantivos; el consenso de control fue alto, con solo observaciones menores. La redacción española conserva la fuerza aprobatoria del original y la ambigüedad técnica de κατʼ ἀνδρολόγιον sin sobreinterpretarla.
  spanish_consistency_notes:
  - Se mantiene 'dracmas' para la moneda antigua, con especificación de plata conforme al genitivo griego.
  - Se usa 'resurrección' sin ampliación, siguiendo la economía del griego.
  - '''Sacrificio por el pecado'' conserva el matiz cultual de περὶ ἁμαρτίας θυσίαν sin recurrir a una formulación más doctrinalizada.'
  - Se prefiere 'obrando' para un registro bíblico digno y natural en español.
  - La nota a pie de página se ancla solo en la expresión técnica de la colecta, que en español requiere aclaración adicional.
