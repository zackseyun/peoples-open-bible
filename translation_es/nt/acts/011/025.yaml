lexical_decisions:
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - salió fuera
  - se fue
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι expresa salida y desplazamiento. En español, 'salió' comunica de manera natural esa idea sin perder el matiz direccional; 'se fue' sería más general y 'salió fuera' resulta redundante.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector narrativo leve. 'Entonces' mantiene el avance de la narración en español sin introducir contraste fuerte.
- source_word: εἰς Ταρσόν
  english_pob_choice: to Tarsus
  chosen_spanish: a Tarso
  alternatives_spanish:
  - hacia Tarso
  - a la ciudad de Tarso
  lexicon: BDAG
  rationale: Con verbo de movimiento, εἰς indica destino. 'A Tarso' es la forma más natural y fiel en español; 'hacia Tarso' debilita la llegada como meta.
- source_word: ἀναζητῆσαι
  english_pob_choice: to look for
  chosen_spanish: para buscar
  alternatives_spanish:
  - para buscar a
  - para buscarlo
  - para encontrar
  lexicon: BDAG
  rationale: 'El infinitivo expresa propósito: fue con el fin de hallar a Saulo. ''Buscar'' reproduce bien ese valor; ''encontrar'' desplaza el énfasis del intento al resultado, y ''buscarlo'' añade un referente implícito no necesario.'
- source_word: Σαῦλον
  english_pob_choice: Saul
  chosen_spanish: Saulo
  alternatives_spanish:
  - Saúl
  lexicon: BDAG
  rationale: Se conserva la forma transliterada del nombre propio siguiendo la convención del proyecto y el uso bíblico estándar en español para este nombre.
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés coinciden estrechamente; no se introducen cambios de sentido. La principal decisión en español fue elegir un verbo natural ('salió') y un conector narrativo ('Entonces') que conserven el movimiento y el propósito del original.
  spanish_consistency_notes:
  - Se mantuvo el nombre propio 'Saulo' para corresponder al griego Σαῦλον y al uso bíblico tradicional en español.
  - Se evitó una traducción más literal como 'salió hacia Tarso' porque en español 'a Tarso' ya expresa adecuadamente la dirección/destino.
  - La nota de pie conserva alternativas léxicas reales sin sobreinterpretar el matiz del infinitivo ἀναζητῆσαι.
