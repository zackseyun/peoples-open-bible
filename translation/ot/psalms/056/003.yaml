theological_decisions:
- issue: Interpretation of מָרוֹם
  chosen_reading: from on high
  alternative_readings:
  - O Most High
  - proudly
  rationale: The verse's final term is syntactically compressed and admits multiple construals. Rendering it as 'from on high' avoids importing a direct address to God unless the Hebrew clearly requires it, while still preserving the elevated/exalted sense. The vocative reading 'O Most High' is possible and traditional in some translations, so it is preserved in a footnote rather than resolved dogmatically in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
