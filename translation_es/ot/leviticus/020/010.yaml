  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura casuística, la repetición legal del delito, el término relacional «prójimo» y la inclusión explícita de ambas partes culpables. Sin embargo, la fórmula penal «ciertamente serán muertos» no es la mejor equivalencia de מוֹת יוּמַת en español natural y digno; suena calcada y menos fiel al valor pasivo jurídico que «ciertamente serán condenados a muerte» o «ciertamente serán puestos a muerte».
  spanish_quality_summary: El español es claro y mayormente natural, con buen registro bíblico-legal. La frase principal funciona bien, pero «serán muertos» resulta poco idiomática y torpe en español contemporáneo eclesial. También conviene cerrar la puntuación del inciso con raya española sin la coma adicional antes de la principal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Prójimo» para רֵעַ está bien justificado. «Adúltero / adúltera» preserva la simetría del hebreo. La revisión propuesta mantiene el contenido del POB inglés y mejora la fórmula legal de pena capital sin añadir método de ejecución.
  issues:
  - severity: medium
    issue: La fórmula «ciertamente serán muertos» es un calco poco natural.
    rationale: Aunque intenta reflejar el énfasis de מוֹת יוּמַת, en español suena forzado y menos claro que una formulación jurídica idiomática como «ciertamente serán condenados a muerte» o «ciertamente serán puestos a muerte». El POB inglés preserva voz pasiva legal; la versión española debe hacerlo también con naturalidad.
  - severity: low
    issue: Puntuación del inciso mejorable.
    rationale: La secuencia «—si ...—, el ...» funciona, pero en español con raya parentética suele fluir mejor sin la coma tras la raya de cierre en este contexto.
  revised_spanish_text: Si un hombre comete adulterio con la mujer de otro hombre —si comete adulterio con la mujer de su prójimo[a]—, el adúltero y la adúltera ciertamente serán condenados a muerte.
  revised_footnotes:
