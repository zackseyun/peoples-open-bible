translation:
  language: es
  text: Y haré la casa[a] de Acab como la casa de Jeroboam hijo de Nabat, y como la casa de Baasa hijo de Ahías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dinastía de Acab ... dinastía de Jeroboam ... dinastía de Baasa». Aquí «casa» se refiere a una casa real o línea dinástica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/נָתַתִּי
  english_pob_choice: And I will make
  chosen_spanish: Y haré
  alternatives_spanish:
  - Y pondré
  - Y entregaré
  lexicon: HALOT
  rationale: En esta fórmula de juicio, נתן tiene valor causativo y el inglés POB lo expresó como 'make'. En español, 'haré' comunica mejor ese sentido dinámico sin volver la frase artificiosa.
- source_word: בֵּית אַחְאָב
  english_pob_choice: the house of Ahab
  chosen_spanish: la casa de Ahab
  alternatives_spanish:
  - la casa de Ahab
  - la dinastía de Ahab
  lexicon: HALOT
  rationale: Se conserva 'casa' para mantener el hebraísmo dinástico del texto. 'Dinastía' explica el sentido, pero es más interpretativa y pierde la metáfora heredada.
- source_word: כְּ/בֵית
  english_pob_choice: like the house of
  chosen_spanish: como la casa de
  alternatives_spanish:
  - como la casa de
  - igual que la casa de
  lexicon: HALOT
  rationale: El prefijo comparativo כ se refleja con 'como', que conserva de manera clara la comparación formal del hebreo.
- source_word: יָרָבְעָם בֶּן נְבָט
  english_pob_choice: Jeroboam son of Nebat
  chosen_spanish: Jeroboam hijo de Nabat
  alternatives_spanish:
  - Jeroboam hijo de Nebat
  - Jeroboam, hijo de Nabat
  lexicon: HALOT
  rationale: Los nombres propios se transliteran de forma estándar al español. 'Hijo de' reproduce limpiamente la construcción filial sin añadir lectura explicativa.
- source_word: וּ/כְ/בֵית
  english_pob_choice: and like the house of
  chosen_spanish: y como la casa de
  alternatives_spanish:
  - y como la casa de
  - e igual que la casa de
  lexicon: HALOT
  rationale: Se mantiene el paralelismo entre las dos cláusulas comparativas con una coordinación natural en español.
- source_word: בַּעְשָׁא בֶן אֲחִיָּה
  english_pob_choice: Baasha son of Ahijah
  chosen_spanish: Baasa hijo de Ahías
  alternatives_spanish:
  - Baasa hijo de Ahías
  - Baasa, hijo de Ahías
  lexicon: HALOT
  rationale: Se translitera el nombre al español de manera reconocible y se conserva el vínculo genealógico con 'hijo de'.
theological_decisions:
- issue: Sentido de 'house' en contexto real/dinástico
  english_pob_reading: Hebrew 'house' here refers to a royal house or line.
  chosen_spanish_reading: '''casa'' conserva el sentido de casa real o línea dinástica.'
  alternative_spanish_readings:
  - '''dinastía'' aclara el sentido histórico-político.'
  - '''familia'' suaviza la metáfora, pero es menos precisa.'
  rationale: El POB inglés preserva la metáfora de 'house' y la explica en nota. En español se mantiene 'casa' en el texto principal para no borrar la forma hebrea, dejando la aclaración como nota.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preservation of biblical metaphor with explicit lexical note.'
translation_notes:
  revision_awareness: 'El registro inglés revisado no muestra cambios: la traducción base y la nota lexical sobre ''house'' se mantienen estables. La versión española conserva esa decisión y la expresa con una nota equivalente en español.'
  spanish_consistency_notes:
  - Se usa 'casa' de manera consistente para reproducir el hebraísmo dinástico del original.
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se prefieren formas breves y naturales ('haré', 'hijo de') para preservar la fluidez sin introducir paráfrasis.
