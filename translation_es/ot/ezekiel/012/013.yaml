    text: La afirmación de que será llevado a Babilonia pero no la verá suele entenderse a la luz de 2 Reyes 25:7 y Jeremías 39:7; 52:11.
    reason: cross_reference
  revision_rationale: 'La revisión es menor y estilístico-semántica: cambia ''traeré'' por ''llevaré'' para expresar mejor en español el movimiento hacia Babilonia, y fortalece el matiz adversativo con ''sin embargo''. El resto del borrador preserva fielmente el sentido del hebreo y las decisiones documentadas por POB.'
