review_pass:
  verdict: revise
  source_alignment_summary: 'El hebreo contiene tres topónimos coordinados en una lista territorial: גִּבְעוֹן, הָרָמָה, בְאֵרוֹת. El borrador preserva correctamente que son nombres de lugar y no sustantivos comunes, pero dos formas españolas están débilmente asentadas o mal adaptadas frente a la transliteración bíblica usual y la fidelidad al nombre fuente.'
  spanish_quality_summary: La frase es legible, pero 'Ramá' suena menos natural y menos reconocible en español bíblico que 'Ramáh', y 'Beerot' pierde la h intervocálica/tradicional de la forma transliterada más transparente desde Beeroth. 'Gibeón' está bien. La puntuación con comas y 'y' es correcta para una lista breve.
  glossary_alignment: 'No hay términos teológicos del glosario principal en juego. El asunto es la consistencia de transliteración de topónimos: conviene mantener formas españolas eclesialmente reconocibles y cercanas al inglés auditado cuando no haya razón fuerte para simplificarlas.'
  issues:
  - severity: medium
    issue: '''Ramá'' como forma de הָרָמָה'
    rationale: Aunque intenta españolizar la acentuación, 'Ramá' no es la forma bíblica más reconocible ni la mejor correspondencia de 'Ramah'. En español bíblico y académico, 'Ramáh' o 'Ramá' pueden verse, pero 'Ramáh' preserva mejor la transliteración del topónimo sin inducir confusión con 'rama'.
  - severity: medium
    issue: '''Beerot'' para בְאֵרוֹת'
    rationale: La omisión de la h final de 'Beeroth' debilita la correspondencia con la forma auditada y con la transliteración habitual. En español, 'Beerot' no aporta una mejora clara de naturalidad y puede parecer una adaptación arbitraria.
  revised_spanish_text: Gibeón, Ramáh y Beerot.
  revision_rationale: Se conservan los tres nombres propios como topónimos transliterados. Se mantiene 'Gibeón'. Se ajusta 'Ramá' a 'Ramáh' para reflejar mejor el topónimo tradicional correspondiente a 'Ramah' en una lista territorial. Se deja 'Beerot' como transliteración española aceptable del topónimo, evitando traducir el sentido léxico subyacente ('pozos').
