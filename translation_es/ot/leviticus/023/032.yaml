translation:
  language: es
  text: Es un sábado de completo reposo para ustedes, y se afligirán[a]. El día nueve del mes, al anochecer, de anochecer a anochecer[b], guardarán su sábado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se humillarán» o «se negarán a sí mismos». El modismo hebreo se refiere a la autoaflicción en una observancia penitencial, tradicionalmente asociada con el ayuno.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de anochecer a anochecer», marcando la observancia según el cómputo israelita del día.
    reason: cultural_note
lexical_decisions:
- source_word: שַׁבַּת שַׁבָּת֥וֹן
  english_pob_choice: a Sabbath of complete rest
  chosen_spanish: un sábado de completo reposo
  alternatives_spanish:
  - un sábado de reposo total
  - un sábado de solemne reposo
  - un sábado de completo descanso
  lexicon: HALOT
  rationale: La pareja nominal intensifica la idea de cese/reposo. «Completo reposo» conserva esa fuerza intensificadora sin volver la frase demasiado arcaica. «Solemne» es posible, pero no está exigido por el hebreo.
- source_word: וְעִנִּיתֶם אֶת נַפְשֹׁתֵיכֶם
  english_pob_choice: you shall afflict yourselves
  chosen_spanish: afligirán sus vidas
  alternatives_spanish:
  - se humillarán
  - se negarán a sí mismos
  - afligirán sus almas
  lexicon: HALOT
  rationale: Mantengo la dureza semántica de ענה en este contexto ritual. «Sus vidas» refleja נַפְשֹׁתֵיכֶם de forma más amplia que «almas» y evita una lectura antropológica demasiado estrecha; «se humillarán» o «se negarán a sí mismos» suavizan más de lo que el texto exige.
- source_word: נַפְשֹׁתֵיכֶם
  english_pob_choice: yourselves
  chosen_spanish: sus vidas
  alternatives_spanish:
  - ustedes mismos
  - sus almas
  lexicon: HALOT
  rationale: En este modismo, נפש funciona de modo reflexivo y vital. «Sus vidas» comunica mejor el alcance del término en español bíblico y evita reducirlo a «alma» en sentido técnico.
- source_word: בְּתִשְׁעָה לַחֹדֶשׁ בָּעֶרֶב
  english_pob_choice: On the ninth day of the month, in the evening
  chosen_spanish: El día nueve del mes, al anochecer
  alternatives_spanish:
  - El nueve del mes, al anochecer
  - El día nueve del mes, en la tarde
  lexicon: HALOT
  rationale: Sigo el orden del hebreo y la observancia comienza al atardecer. «Al anochecer» es natural en español y conserva la referencia temporal sin introducir explicaciones no presentes en el verso.
- source_word: מֵעֶרֶב עַד עֶרֶב
  english_pob_choice: from evening to evening
  chosen_spanish: de anochecer a anochecer
  alternatives_spanish:
  - de tarde a tarde
  - de un anochecer a otro anochecer
  - de puesta de sol a puesta de sol
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de anochecer a anochecer». «De anochecer a anochecer» preserva la expresión y su trasfondo de cómputo del día en Israel sin sustituirla por una paráfrasis más explicativa.
- source_word: תִּשְׁבְּתוּ שַׁבַּתְּכֶם
  english_pob_choice: you shall keep your Sabbath
  chosen_spanish: guardarán su sábado
  alternatives_spanish:
  - observarán su sábado
  - descansarán en su sábado
  - guardarán su reposo
  lexicon: HALOT
  rationale: שבת implica cesar/reposar; en contexto legal-cultual, «guardar» transmite bien la idea de observar la prescripción. «Sábado» conserva el vínculo con la observancia establecida, y «reposo» ya fue expresado al inicio del versículo.
theological_decisions:
- issue: Sentido de «afligir» en contexto ritual
  english_pob_reading: Retain the broader command 'afflict yourselves' in the main text rather than specifying fasting.
  chosen_spanish_reading: Conservar «afligirán sus vidas» en el texto principal, sin explicitar «ayunarán».
  alternative_spanish_readings:
  - ayunarán
  - se humillarán
  - se negarán
  rationale: El hebreo no dice explícitamente «ayunar». Mantener «afligirán» conserva la amplitud del mandato y deja abierta la práctica penitencial asociada, sin resolver la tensión léxica que el texto mismo deja abierta.
  doctrine_reference: 'Principio de traducción: preservar la tensión textual en vez de cerrarla interpretativamente.'
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado en inglés sin traducir mecánicamente: se mantuvo la fuerza intensiva de שַׁבַּת שַׁבָּת֥וֹן, la ambigüedad ritual de וְעִנִּיתֶם, y la marcación cultural de מֵעֶרֶב עַד עֶרֶב. No se aplicaron revisiones posteriores al borrador inglés; el acuerdo de control fue alto y sin cambios necesarios.'
  spanish_consistency_notes:
  - «Yahvé» no aparece en este versículo.
  - Se prefirió «sábado» para conservar la correspondencia con el lenguaje legal-cultual del texto, mientras que «reposo» expresa el matiz semántico principal de שׁבת.
  - «Vida(s)» se emplea como equivalente funcional de נֶפֶשׁ en este modismo reflexivo, evitando una traducción teológicamente más cerrada como «alma».
  - Se mantuvo un registro reverente pero moderno, adecuado para lectura pública.
