review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: petición de perdón, referencia a pecados/transgresiones contra Dios, y petición de compasión ante los captores. Sin embargo, hay desajustes menores pero reales: el marcador [a] está anclado en el lugar incorrecto, porque la nota trata la cláusula final, no «ha pecado»; «rebeliones» en el texto principal no sigue la elección auditada del POB inglés, que prefirió «transgressions» con «rebellions» como alternativa léxica en nota; y «cautivadores» suena menos natural que «captores» o una expansión equivalente. También conviene ajustar «de ellos» a «por ellos» o reestructurar para un español más natural.'
  spanish_quality_summary: 'El español es comprensible, pero tiene varios detalles de naturalidad y precisión editorial: el anclaje de nota es erróneo; «delante de sus cautivadores» es entendible pero poco idiomático en registro bíblico moderno; «para que ellos tengan compasión de ellos» suena torpe por la repetición pronominal y por «de ellos». Una redacción más limpia y fiel sería «y concédeles compasión ante quienes los llevaron cautivos, para que tengan compasión de ellos[a]».'
  glossary_alignment: 'No hay conflicto con términos troncales del glosario como Yahvé/Mesías/Espíritu. Sí hay una desviación de la decisión léxica auditada: פשע / פשע se documentó en inglés como «transgressions» en el texto principal, dejando «rebellions» como alternativa. En español conviene reflejar eso con «transgresiones» en el texto y «rebeliones» en nota. «Compasión» está bien para רחמים/רחם, y «perdona» también.'
  issues:
  - severity: high
    issue: La nota [a] está colocada en «ha pecado» pero comenta la cláusula final.
    rationale: Esto rompe la correspondencia requerida entre anclaje y contenido de nota. La nota debe ir donde aparece «para que tengan compasión…» o equivalente.
  - severity: medium
    issue: El texto principal usa «rebeliones» donde la base auditada prefirió «transgresiones».
    rationale: El POB inglés conservó «rebellions» como alternativa léxica en nota, no como elección principal. En español debe seguirse esa decisión salvo razón fuerte, que aquí no se justifica.
  - severity: medium
    issue: «Cautivadores» es poco natural en español bíblico moderno.
    rationale: Aunque semánticamente posible, suena forzado. «Captores» o «quienes los llevaron cautivos» comunica mejor שֹׁבֵיהֶם.
  - severity: medium
    issue: «para que ellos tengan compasión de ellos» es torpe e innecesariamente repetitivo.
    rationale: La cláusula final se puede expresar de forma más idiomática como «para que tengan compasión de ellos» o «para que les tengan compasión», manteniendo el sentido.
  - severity: low
    issue: «ha pecado» con sujeto colectivo es posible, pero «han pecado» fluye mejor al retomar luego «todas sus transgresiones».
    rationale: No es un error, pero el plural armoniza mejor con los referentes plurales subsiguientes y con el hebreo verbal plural.
  revised_spanish_text: y perdona a tu pueblo, que ha pecado contra ti, y todas sus transgresiones[b] que han cometido contra ti; y concédeles compasión ante quienes los llevaron cautivos, para que tengan compasión de ellos[a].
  revised_footnotes:
  - marker: a
    text: 'También puede entenderse: «y tendrán compasión de ellos». La cláusula final puede leerse como resultado además de propósito.'
    reason: alternative_reading
  - marker: b
    text: «Transgresiones» también puede traducirse «rebeliones», enfatizando la ruptura de pacto contra Dios.
    reason: lexical_alternative
