  glossary_alignment: No hay conflicto con la terminología del proyecto. 'Impuro' para טָמֵא en contexto levítico es adecuado. No aparecen términos de glosario mayor como Yahvé/Mesías. La decisión de mantener 'polvo' sin especificar 'yeso' o 'revoque' concuerda con la revisión inglesa auditada.
