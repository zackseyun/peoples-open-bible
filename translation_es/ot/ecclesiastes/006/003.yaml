  source_alignment_summary: 'El borrador refleja bien la estructura condicional, la referencia a «un hombre», la longevidad, «su alma», la falta de satisfacción con lo bueno y la privación de sepultura. También conserva adecuadamente el valor discursivo posible de אָמַרְתִּי con «digo». Sin embargo, falla en dos puntos importantes del sentido y del rastro de auditoría inglés: 1) la comparación final en hebreo/inglés es de condición («better off»), no meramente una comparación absoluta («es mejor que él»); 2) הַנָּפֶל se documentó en la POB inglesa como «the stillborn child», con alternativas en nota, mientras que «el abortivo» en español suena técnico, impersonal y menos claro.'
