review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa y los principales valores fuente: movimiento ascendente desde Eglón hacia Hebrón, acompañamiento de todo Israel con Josué, y ataque militar contra la ciudad. Sin embargo, hay un desajuste verbal importante: el hebreo singular וַיַּעַל tiene como sujeto principal a Josué, seguido por la aposición/colectivo «y todo Israel con él». Por eso la forma más fiel y natural es «subió», no «subieron».'
  spanish_quality_summary: 'El español es claro y legible, pero la coma tras «Josué[a]» es innecesaria y algo torpe. También conviene ajustar la nota al estilo normal de notas: sin comillas externas innecesarias y con redacción más natural. «Contra ella» es aceptable en español porque retiene el femenino de la ciudad, y la nota ayuda a evitar ambigüedad.'
  glossary_alignment: No hay términos del glosario doctrinal principal en juego. Los topónimos «Eglón» y «Hebrón» son apropiados. La elección «todo Israel» concuerda con el uso del proyecto. «Contra ella» preserva adecuadamente el femenino del hebreo, respaldado por nota.
  issues:
  - severity: high
    issue: Concordancia verbal en «subieron»
    rationale: 'El verbo hebreo וַיַּעַל está en 3ª persona masculina singular. Aunque «todo Israel con él» acompaña a Josué, el texto presenta a Josué como sujeto principal: «Entonces Josué, y todo Israel con él, subió…». El plural español altera ese detalle sintáctico del original.'
  - severity: low
    issue: Puntuación poco natural tras «Josué[a]»
    rationale: La coma después del sujeto simple seguido de aposición expandida no ayuda a la fluidez en español bíblico moderno. La frase se lee mejor sin esa coma inicial.
  - severity: low
    issue: Redacción mejorable de la nota
    rationale: 'La nota actual contiene comillas y dos puntos poco naturales para el formato de notas. Puede expresarse con más claridad: «Hebreo: “contra ella”, con pronombre femenino que se refiere a la ciudad de Hebrón.»'
  revised_spanish_text: Entonces Josué[a] y todo Israel con él subió de Eglón a Hebrón, y pelearon contra ella.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «contra ella», con pronombre femenino que se refiere a la ciudad de Hebrón.'
    reason: lexical_alternative
