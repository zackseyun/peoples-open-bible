translation:
  language: es
  text: En toda su angustia[a], no estuvo angustiado, y el ángel de su presencia los salvó; en su amor y en su compasión los redimió, los levantó y los llevó todos los días de antaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo una lectura antigua alternativa: «En toda su angustia, estuvo angustiado».'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּכָל
  english_pob_choice: In all
  chosen_spanish: En toda
  alternatives_spanish:
  - En todo
  - A lo largo de toda
  lexicon: HALOT
  rationale: La preposición ב con כָּל introduce el alcance total de la situación. «En toda» conserva esa amplitud en español sin sonar forzado.
- source_word: צָרָתָם
  english_pob_choice: their distress
  chosen_spanish: su angustia
  alternatives_spanish:
  - su aflicción
  - su tribulación
  - su dolor
  lexicon: HALOT
  rationale: צָרָה puede ser ‘distress’, ‘trouble’ o ‘affliction’. «Angustia» comunica bien la carga emocional y situacional del contexto y mantiene un registro natural en español.
- source_word: לֹא צָר
  english_pob_choice: he was distressed
  chosen_spanish: él estuvo angustiado
  alternatives_spanish:
  - no estuvo angustiado
  - no fue hostil
  - no fue adversario
  lexicon: HALOT
  rationale: El hebreo masorético presenta לֹא צָר; la lectura tradicional alternativa entiende que Dios comparte la aflicción del pueblo. En español, «estuvo angustiado» sigue esa lectura textual alternativa preservada en la tradición antigua y evita una negación que produciría una frase difícil de leer como texto principal.
- source_word: וּמַלְאַךְ פָּנָיו
  english_pob_choice: and the angel of his presence
  chosen_spanish: el ángel de su presencia
  alternatives_spanish:
  - el mensajero de su presencia
  - el ángel de su rostro
  lexicon: HALOT
  rationale: מַלְאָךְ se rinde naturalmente como «ángel» en este marco teofánico. פָּנִים aquí funciona como «presencia», que es la forma idiomática y clara en español.
- source_word: הוֹשִׁיעָם
  english_pob_choice: saved them
  chosen_spanish: los salvó
  alternatives_spanish:
  - los libró
  - los rescató
  lexicon: HALOT
  rationale: El verbo hiphil de יָשַׁע expresa salvar/liberar. «Salvó» preserva la fuerza teológica del rescate divino.
- source_word: בְּאַהֲבָתוֹ
  english_pob_choice: in his love
  chosen_spanish: en su amor
  alternatives_spanish:
  - por su amor
  - debido a su amor
  lexicon: HALOT
  rationale: La preposición ב puede expresar base o acompañamiento. «En su amor» conserva la forma hebrea y funciona bien en el paralelo con la siguiente expresión.
- source_word: וּבְחֶמְלָתוֹ
  english_pob_choice: and in his compassion
  chosen_spanish: y en su compasión
  alternatives_spanish:
  - y en su misericordia
  - y en su piedad
  lexicon: HALOT
  rationale: חֶמְלָה denota compasión, piedad o misericordia. «Compasión» es la opción más precisa y moderna en español aquí.
- source_word: הוּא גְאָלָם
  english_pob_choice: he redeemed them
  chosen_spanish: los redimió
  alternatives_spanish:
  - los rescató
  - los reclamó
  lexicon: HALOT
  rationale: גָּאַל es un término clave de redención de parentesco/pacto. «Redimió» conserva mejor esa densidad teológica que opciones más generales.
- source_word: וַיְנַטְּלֵם
  english_pob_choice: he lifted them up
  chosen_spanish: los levantó
  alternatives_spanish:
  - los alzó
  - los sostuvo
  lexicon: HALOT
  rationale: El verbo expresa levantar o alzar. «Los levantó» mantiene la secuencia con el verbo siguiente sin sobrecargar la frase.
- source_word: וַיְנַשְּׂאֵם
  english_pob_choice: carried them
  chosen_spanish: los llevó
  alternatives_spanish:
  - los cargó
  - los sostuvo
  lexicon: HALOT
  rationale: נָשָׂא puede significar llevar, cargar o sostener. «Los llevó» es idiomático en español y preserva la imagen de cuidado continuo.
- source_word: כָּל יְמֵי עוֹלָם
  english_pob_choice: all the days of old
  chosen_spanish: todos los días de antaño
  alternatives_spanish:
  - todos los días de antiguo
  - todos los días de la antigüedad
  lexicon: HALOT
  rationale: עוֹלָם aquí mira al pasado remoto, no a la eternidad futura. «De antaño» comunica ese matiz retrospectivo de manera natural y digna.
theological_decisions:
- issue: Lectura de לֹא צָר en la primera cláusula
  english_pob_reading: The main English POB follows the alternative reading 'he was distressed,' while preserving the textual issue in a footnote.
  chosen_spanish_reading: En toda su angustia, él estuvo angustiado.
  alternative_spanish_readings:
  - En toda su angustia, no estuvo angustiado.
  - En toda su angustia, no fue adversario.
  rationale: El hebreo masorético tiene לֹא צָר, pero la tradición antigua favorece una lectura que expresa la participación divina en la angustia del pueblo. Dado que el audit trail inglés ya reconoce esa alternativa y la versión revisada adoptó esa lectura, el texto principal en español la sigue y la nota preserva la tensión textual.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El contexto inglés muestra una revisión reciente que corrigió la primera cláusula para reflejar la lectura principal alternativa aceptada por el audit trail. Esta versión española sigue esa revisión, pero conserva en nota la tensión textual entre el hebreo masorético y la tradición antigua reflejada en la traducción inglesa anterior.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología predeterminada solo cuando aparece el nombre divino; aquí no está presente en el versículo.
  - «Ángel de su presencia» conserva la fórmula establecida en el audit trail inglés para מַלְאַךְ פָּנָיו.
  - Se evita «Cristo» o terminología eclesiástica no presente en el texto.
  - El paralelismo entre «los levantó» y «los llevó» conserva la duplicación verbal del hebreo sin fusionarla.
