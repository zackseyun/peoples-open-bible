translation:
  language: es
  text: Y pondrá su mano sobre la cabeza del macho cabrío y lo degollará en el lugar donde degüellan el holocausto delante de Yahvé. Es una ofrenda por el pecado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «ofrenda de purificación». El término hebreo חַטָּאת puede denotar tanto el pecado como la ofrenda asociada con quitar la impureza o el pecado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָמַךְ יָדוֹ
  english_pob_choice: shall lay his hand
  chosen_spanish: pondrá su mano
  alternatives_spanish:
  - apoyará su mano
  - impondrá su mano
  lexicon: HALOT
  rationale: En el contexto sacrificial, סמך יד indica el gesto ritual de colocar la mano sobre la víctima. 'Pondrá su mano' conserva la acción concreta sin sonar forzado; 'impondrá' es posible, pero en español puede sugerir un matiz litúrgico posterior que no está explícito en el hebreo.
- source_word: עַל רֹאשׁ הַשָּׂעִיר
  english_pob_choice: on the head of the goat
  chosen_spanish: sobre la cabeza del macho cabrío
  alternatives_spanish:
  - sobre la cabeza del cabro
  - sobre la cabeza del chivo
  lexicon: HALOT
  rationale: שׂעיר aquí designa el macho cabrío del rito. 'Macho cabrío' preserva el valor específico y solemne del término en español bíblico sin depender de un coloquialismo regional.
- source_word: וְשָׁחַט אֹתוֹ
  english_pob_choice: and slaughter it
  chosen_spanish: y lo degollará
  alternatives_spanish:
  - y lo sacrificará
  - y lo matará
  lexicon: HALOT
  rationale: שחט es el verbo técnico de degollar/degollar ritualmente. 'Degollará' mantiene la concreción del acto sacrificial mejor que 'sacrificará', que es más general, y mejor que 'matará', que pierde el matiz ritual.
- source_word: בִּמְקוֹם אֲשֶׁר יִשְׁחַט אֶת הָעֹלָה
  english_pob_choice: in the place where they slaughter the burnt offering
  chosen_spanish: en el lugar donde degüellan el holocausto
  alternatives_spanish:
  - en el lugar donde sacrifican el holocausto
  - en el lugar donde se degüella el holocausto
  lexicon: HALOT
  rationale: La forma hebrea es activa e indefinida; en español, 'donde degüellan' refleja bien ese valor procedimental sin introducir innecesariamente una pasiva. 'Holocausto' sigue la terminología sacrificial tradicional para עֹלָה, cuyo sentido básico es ofrenda totalmente quemada.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé' según la convención del proyecto, y 'delante de' reproduce la fórmula cultual estable sin suavizarla a una mera ubicación espacial.
- source_word: חַטָּאת הוּא
  english_pob_choice: It is a sin offering
  chosen_spanish: Es una ofrenda por el pecado
  alternatives_spanish:
  - Es una ofrenda de purificación
  - Es un sacrificio por el pecado
  lexicon: HALOT
  rationale: 'חטאת tiene una tensión lexical relevante: puede referir tanto al pecado como a la ofrenda asociada. En español, ''ofrenda por el pecado'' conserva esa relación semántica sin decidir excesivamente a favor de una sola lectura; además, mantiene la audibilidad del término en contexto ritual.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La pauta del proyecto exige renderizar el Tetragrama como 'Yahvé' en el texto principal. Esto preserva el nombre de pacto en lugar de reemplazarlo por una convención de ocultamiento.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de חַטָּאת en contexto sacrificial
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de purificación
  - ofrenda de pecado
  rationale: El hebreo permite una tensión entre pecado y purificación. La traducción elegida mantiene la relación con el pecado sin cerrar la discusión exegética, y evita una opción demasiado técnica que pudiera oscurecer la lectura pública.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it; §5 Consistency of key terms, or documented exception
translation_notes:
  revision_awareness: El texto sigue la última revisión del audit trail al conservar la estructura activa e indefinida del verbo de matanza en la subordinada ('donde degüellan...'). También mantiene la decisión revisada de reflejar más directamente el proceso ritual en vez de una pasiva española menos cercana al hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar español del proyecto, coherente con el tratamiento del Tetragrama en otros pasajes.
  - '''Degollar'' se usa para שחט por consistencia con el registro sacrificial técnico.'
  - '''Ofrenda por el pecado'' preserva la tensión semántica de חַטָּאת sin desplazarla a un lenguaje puramente moral o puramente purificador.'
