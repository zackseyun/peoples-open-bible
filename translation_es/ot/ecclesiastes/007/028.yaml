translation:
  language: es
  text: 'lo que mi alma aún buscaba, pero no hallé: un hombre entre mil[a] hallé, pero una mujer entre todos estos[b] no hallé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uno de mil».
    reason: lexical_alternative
  - marker: b
    text: La expresión «entre todos estos» probablemente alude al conjunto completo considerado en la búsqueda de Qohelet; el versículo informa de su hallazgo, no necesariamente de una afirmación universal sobre todas las mujeres.
    reason: cultural_note
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: lo que
  alternatives_spanish:
  - que
  - lo cual
  lexicon: HALOT
  rationale: La partícula relativa continúa el pensamiento anterior; en español, «lo que» reproduce con naturalidad esa retomada sin volverla demasiado rígida.
- source_word: עוֹד
  english_pob_choice: still
  chosen_spanish: aún
  alternatives_spanish:
  - todavía
  - aún así
  lexicon: HALOT
  rationale: 'Expresa continuidad de la búsqueda pasada: «aún» conserva el matiz de persistencia del verbo, con tono natural en español.'
- source_word: בִּקְשָׁה נַפְשִׁי
  english_pob_choice: my soul sought
  chosen_spanish: mi alma buscaba
  alternatives_spanish:
  - yo buscaba
  - mi ser buscaba
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de «mi alma» como sujeto interno, y el imperfecto se vierte con un aspecto durativo («buscaba») que refleja mejor la acción continua que el español simple pretérito.
- source_word: וְלֹא מָצָאתִי
  english_pob_choice: but I did not find
  chosen_spanish: pero no hallé
  alternatives_spanish:
  - y no hallé
  - pero no encontré
  lexicon: HALOT
  rationale: El contraste adversativo se expresa naturalmente con «pero»; «hallé» preserva una dicción sobria y bíblica sin depender de un calco del inglés.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un ser humano
  lexicon: HALOT
  rationale: Aquí el contraste directo con «mujer» exige el valor masculino específico. «Un hombre» evita neutralizar una oposición que el hebreo presenta de forma explícita.
- source_word: אֶחָד מֵאֶלֶף
  english_pob_choice: one man among a thousand
  chosen_spanish: un hombre entre mil
  alternatives_spanish:
  - uno de entre mil
  - un hombre de cada mil
  lexicon: HALOT
  rationale: «Entre mil» transmite el giro comparativo de selección dentro de un grupo y suena más natural que una fórmula más analítica; no se resuelve el posible matiz de «uno de cada mil» porque el hebreo lo deja abierto.
- source_word: מָצָאתִי
  english_pob_choice: I found
  chosen_spanish: hallé
  alternatives_spanish:
  - encontré
  lexicon: HALOT
  rationale: «Hallé» conserva el registro literario de la declaración sapiencial y corresponde directamente al perfecto hebreo en el reporte autobiográfico.
- source_word: וְאִשָּׁה
  english_pob_choice: but a woman
  chosen_spanish: pero una mujer
  alternatives_spanish:
  - y una mujer
  lexicon: HALOT
  rationale: Aunque la waw hebrea es simple, el español requiere marcar la oposición con «pero» para reflejar el contraste del pasaje.
- source_word: בְּכָל אֵלֶּה
  english_pob_choice: among all these
  chosen_spanish: entre todas estas
  alternatives_spanish:
  - entre todos estos
  - en todas estas
  lexicon: HALOT
  rationale: La frase se entiende como referencia al conjunto bajo consideración en la búsqueda; «entre todas estas» conserva esa referencia grupal sin añadir universalidad absoluta.
- source_word: לֹא מָצָאתִי
  english_pob_choice: I did not find
  chosen_spanish: no hallé
  alternatives_spanish:
  - no encontré
  - no hallé ninguna
  lexicon: HALOT
  rationale: La negación directa del verbo mantiene la sobriedad del hebreo; se evita intensificar con «ninguna» para no cerrar el alcance interpretativo más de lo que el texto exige.
theological_decisions:
- issue: Posible lectura universalizante o despectiva respecto de las mujeres
  english_pob_reading: The verse reports Qoheleth's finding in his search, not a universal claim about women everywhere.
  chosen_spanish_reading: El versículo reporta el hallazgo de Qohelet en su búsqueda, no una afirmación universal sobre todas las mujeres.
  alternative_spanish_readings:
  - Una paráfrasis que suavice la fuerza del contraste
  - Una lectura que convierta la frase en juicio doctrinal sobre las mujeres
  rationale: La traducción debe conservar la franqueza del texto y, al mismo tiempo, evitar extender el alcance de la observación más allá del contexto literario de la investigación sapiencial. No se atenúa el contraste hombre/mujer, pero tampoco se universaliza.
  doctrine_reference: Mantener la tensión literaria sin resolverla; lectura contextual del discurso sapiencial.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el registro y las decisiones del audit trail en inglés, con ajuste natural al español: se conserva la metáfora de «mi alma», el contraste adversativo y la posible ambigüedad numérica de «entre mil / una de mil» sin resolverla de forma interpretativa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se conserva «hallé» para uniformidad sapiencial y para distinguirlo de un español más coloquial.
  - No se neutraliza el contraste hombre/mujer, porque el hebreo y el audit trail lo presentan de manera explícita.
