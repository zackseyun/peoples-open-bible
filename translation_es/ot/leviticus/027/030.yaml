    issue: Orden poco natural en «santo es para Yahvé»
    rationale: Aunque comprensible, en español moderno y eclesial suena más natural «es santo para Yahvé». Esto preserva el predicado nominal del hebreo sin afectar el sentido.
  - severity: medium
    issue: La nota al pie no presenta una alternativa real
    rationale: La nota repite casi exactamente el texto principal en vez de recoger una variante formal o lexical significativa, como hace la auditoría inglesa con «es de Yahvé».
  revised_spanish_text: Todo diezmo[a] de la tierra, de la semilla de la tierra y del fruto del árbol, pertenece a Yahvé; es santo para Yahvé.
  revised_footnotes:
