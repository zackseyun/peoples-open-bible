revisions:
- from: Cuando construyas una casa nueva[a], harás un parapeto para tu techo, para que no pongas culpa de sangre sobre tu casa, si alguien cae de él.
  to: Cuando construyas una casa nueva[a], harás un parapeto para tu techo, para que no incurras en culpa de sangre sobre tu casa, si alguien cae del techo.
  rationale: Se ajusta la expresión de responsabilidad legal para que el español sea natural y fiel al sentido de «bloodguilt», y se explicita el referente final para evitar ambigüedad pronominal. Se conserva «parapeto» y la nota léxica porque reflejan bien la evidencia fuente y la auditoría inglesa.
