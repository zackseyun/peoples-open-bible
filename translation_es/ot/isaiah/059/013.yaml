translation:
  language: es
  text: Transgrediendo y negando a Yahvé, y apartándonos de seguir a nuestro Dios, hablando opresión y rebelión[a], concibiendo y pronunciando desde el corazón[b] palabras de falsedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rebeldía»; el sustantivo hebreo también puede traducirse «apostasía» o «rebelión».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «desde el corazón», expresión que señala que las palabras falsas nacen de una intención interior, no solo de la voz externa.
    reason: cultural_note
lexical_decisions:
- source_word: פָּשֹׁעַ
  english_pob_choice: transgressing
  chosen_spanish: transgrediendo
  alternatives_spanish:
  - rebelándose
  - cometiendo transgresión
  lexicon: HALOT
  rationale: El infinitivo verbal expresa una acción continua de quebrantar el pacto o la ley. «Transgrediendo» conserva el valor verbal y la idea de culpa moral sin estrecharlo solo a rebelión política.
- source_word: וְכַחֵשׁ בַּיהוָה
  english_pob_choice: and denying Yahweh
  chosen_spanish: y negando a Yahvé
  alternatives_spanish:
  - y mintiendo contra Yahvé
  - y obrando falsamente contra Yahvé
  lexicon: HALOT
  rationale: כחש admite «negar», «mentir» o «tratar falsamente». Con בְּ/ב la referencia a la relación con Dios pide una formulación de repudio; «negando a Yahvé» comunica bien la negación del pacto.
- source_word: בַּיהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al SEÑOR
  - a Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de traducir el Tetragrámaton como «Yahvé» en el texto principal, manteniendo explícito el nombre divino del pacto.
- source_word: וְנָסוֹג מֵאַחַר אֱלֹהֵינוּ
  english_pob_choice: and turning back from following our God
  chosen_spanish: y volviéndose atrás de seguir a nuestro Dios
  alternatives_spanish:
  - y apartándose de seguir a nuestro Dios
  - y retrocediendo de detrás de nuestro Dios
  lexicon: HALOT
  rationale: נסוג expresa retroceso o retirada; מֵאַחַר, «de detrás de / de seguir a», se vierte en español de modo natural como «de seguir a nuestro Dios», preservando la imagen relacional de seguimiento.
- source_word: דַּבֶּר
  english_pob_choice: speaking
  chosen_spanish: hablando
  alternatives_spanish:
  - diciendo
  - pronunciando
  lexicon: HALOT
  rationale: Introduce el contenido de la acusación siguiente. «Hablando» es la forma más directa y conserva el paralelismo verbal.
- source_word: עֹשֶׁק
  english_pob_choice: oppression
  chosen_spanish: opresión
  alternatives_spanish:
  - extorsión
  - injusticia opresiva
  lexicon: HALOT
  rationale: El sustantivo denota trato opresivo e injusto; «opresión» es el equivalente español más amplio y fiel.
- source_word: וְסָרָה
  english_pob_choice: revolt
  chosen_spanish: revuelta
  alternatives_spanish:
  - rebelión
  - apostasía
  lexicon: HALOT
  rationale: El término puede significar desviación, rebelión o apostasía. «Revuelta» mantiene la fuerza de oposición defiante sin forzar un tecnicismo eclesiástico donde el hebreo no lo exige.
- source_word: הֹרוֹ וְהֹגוֹ
  english_pob_choice: conceiving and uttering
  chosen_spanish: concibiendo y pronunciando
  alternatives_spanish:
  - ideando y hablando
  - maquinando y diciendo
  lexicon: HALOT
  rationale: Los verbos describen el paso de lo interior a lo exterior. «Concibiendo y pronunciando» refleja ese movimiento desde la formación interna hasta la expresión verbal.
- source_word: מִלֵּב
  english_pob_choice: from the heart
  chosen_spanish: desde el corazón
  alternatives_spanish:
  - del corazón
  - de lo íntimo
  lexicon: HALOT
  rationale: La frase señala el origen interior de las palabras falsas. «Desde el corazón» es idiomático en español y conserva la imagen hebrea de procedencia interior.
- source_word: דִּבְרֵי שָׁקֶר
  english_pob_choice: words of falsehood
  chosen_spanish: palabras de falsedad
  alternatives_spanish:
  - palabras mentirosas
  - palabras falsas
  lexicon: HALOT
  rationale: La construcción indica palabras caracterizadas por engaño. «Palabras de falsedad» conserva el giro nominal del hebreo y su tono formal.
theological_decisions:
- issue: Cómo renderizar el nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo el estándar del proyecto en español, se preserva el nombre del pacto como «Yahvé» en lugar de una sustitución litúrgica.
  doctrine_reference: Contested terms — יְהוָה / YHWH → Yahvé
- issue: Sentido de וְסָרָה en el contexto del pacto
  english_pob_reading: revolt
  chosen_spanish_reading: revuelta
  alternative_spanish_readings:
  - rebelión
  - apostasía
  rationale: Aunque el contexto es claramente de infidelidad contra Dios, el sustantivo hebreo es más amplio que el tecnicismo «apostasía». «Revuelta» preserva la gravedad teológica sin sobreespecificar.
  doctrine_reference: 'Translation philosophy #3, #6'
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo y el audit trail inglés sin cambios sustanciales respecto del último pase revisado; no se documentaron revisiones aplicadas y la evaluación cruzada indicó alto acuerdo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino conforme al estándar del proyecto.
  - Se conserva el paralelismo interno del verso con una cadena verbal participial en español.
  - «Opresión» y «revuelta» preservan el campo semántico de injusticia y desviación sin introducir lectura doctrinal adicional.
  - La nota sobre «desde el corazón» se coloca para reflejar la observación semántica del hebreo y la nota de auditoría inglesa.
