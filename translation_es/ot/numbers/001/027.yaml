lexical_decisions:
- source_word: פְּקֻדֵיהֶם
  english_pob_choice: those counted
  chosen_spanish: los contados
  alternatives_spanish:
  - los registrados
  - los contabilizados
  - los que fueron contados
  lexicon: HALOT
  rationale: El participio pasivo de פקד en este contexto censal denota a las personas incluidas en el conteo. «Los contados» reproduce bien la fuerza breve del hebreo y mantiene el sentido de censo sin añadir «hombres», que aquí no está explicitado.
- source_word: לְמַטֵּה
  english_pob_choice: from the tribe of
  chosen_spanish: de la tribu de
  alternatives_spanish:
  - de parte de la tribu de
  - pertenecientes a la tribu de
  - de entre la tribu de
  lexicon: HALOT
  rationale: La construcción ל + מַטֶּה marca afiliación tribal en la serie del censo. En español, «de la tribu de» es la forma más natural y fiel al valor relacional del hebreo.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: HALOT
  rationale: Nombre propio tribal en su forma española habitual y bíblicamente reconocible.
- source_word: אַרְבָּעָה וְשִׁבְעִים אֶלֶף וְשֵׁשׁ מֵאוֹת
  english_pob_choice: seventy-four thousand six hundred
  chosen_spanish: setenta y cuatro mil seiscientos
  alternatives_spanish:
  - cuatro y setenta mil y seiscientos
  lexicon: HALOT
  rationale: Se usa el orden numérico idiomático del español moderno para una cifra exacta, preservando el valor total del hebreo sin forzar una sintaxis arcaizante.
