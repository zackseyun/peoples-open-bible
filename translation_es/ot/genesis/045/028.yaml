translation:
  language: es
  text: 'E Israel dijo[a]: «¡Basta! José, mi hijo, aún vive. Iré y lo veré antes de morir».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Es suficiente». El hebreo רַב funciona aquí como una exclamación de suficiencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  - entonces dijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se expresa de forma natural en español con un verbo de habla simple; aquí «dijo» mantiene la progresión sin forzar un conector redundante. El sujeto explícito «E Israel» ya marca la secuencia narrativa.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Jacob
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente a Israel, por lo que se conserva ese nombre propio en lugar de armonizar con «Jacob».
- source_word: רַב
  english_pob_choice: Enough!
  chosen_spanish: ¡Basta!
  alternatives_spanish:
  - Es suficiente
  - ¡Suficiente!
  lexicon: HALOT
  rationale: En este contexto exclamativo, רַב expresa suficiencia y alivio repentino. «¡Basta!» reproduce bien la fuerza breve e inmediata del hebreo en español natural.
- source_word: עוֹד
  english_pob_choice: still
  chosen_spanish: aún
  alternatives_spanish:
  - todavía
  - todavía sigue
  lexicon: HALOT
  rationale: Con חָי, עוֹד marca continuidad de estado. «Aún» mantiene la idea de que José permanece vivo sin añadir matices innecesarios.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: mi hijo
  alternatives_spanish:
  - mi hijo querido
  - mi muchacho
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de manera directa. «Mi hijo» preserva el tono familiar y afectivo del hebreo.
- source_word: חָי
  english_pob_choice: alive
  chosen_spanish: vive
  alternatives_spanish:
  - está vivo
  - está con vida
  lexicon: HALOT
  rationale: Aunque el hebreo es un adjetivo predicativo, en español la formulación más natural en este contexto es «vive»; comunica el mismo estado sin sonar rígida.
- source_word: אֵלְכָה
  english_pob_choice: I will go
  chosen_spanish: Iré
  alternatives_spanish:
  - Voy a ir
  - Déjame ir
  lexicon: HALOT
  rationale: El cohortativo expresa determinación. «Iré» transmite resolución firme en español sin introducir una modalidad extra que el hebreo no exige.
- source_word: וְאֶרְאֶנּוּ
  english_pob_choice: and see him
  chosen_spanish: y lo veré
  alternatives_spanish:
  - y lo veré a él
  - y lo miraré
  lexicon: HALOT
  rationale: El verbo de ver con sufijo directo se vierte de forma simple como «lo veré»; el objeto directo está claro por el contexto y el español evita una redundancia innecesaria.
- source_word: בְּטֶרֶם
  english_pob_choice: before
  chosen_spanish: antes de
  alternatives_spanish:
  - antes que
  - previo a
  lexicon: HALOT
  rationale: La preposición temporal introduce la acción todavía no ocurrida. «Antes de» es la equivalencia natural en español.
- source_word: אָמֽוּת
  english_pob_choice: I die
  chosen_spanish: morir
  alternatives_spanish:
  - muera
  - muera yo
  lexicon: HALOT
  rationale: En la cláusula temporal española, el infinitivo resulta más idiomático tras «antes de». Conserva el sentido futuro respecto del hablante sin sobrecargar la sintaxis.
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente: sin cambios aplicados y con acuerdo alto entre auditoría y revisión. La redacción española se ajusta al hebreo y al camino lexical del POB en inglés, preservando la exclamación de suficiencia y el uso explícito de «Israel».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiere; aquí no aparece.
  - Se conserva «Israel» como nombre propio, en línea con el hebreo explícito.
  - La exclamación «¡Basta!» busca naturalidad española sin diluir la fuerza de רַב.
  - Se usa una sintaxis clara y bíblica sin recurrir a formulaciones arcaizantes innecesarias.
