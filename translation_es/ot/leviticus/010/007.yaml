review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: prohibición de salir de la entrada de la tienda de reunión, advertencia de muerte, motivo dado por el aceite de la unción de Yahvé sobre ellos, y cierre narrativo de obediencia a Moisés. Sin embargo, hay dos ajustes importantes de fidelidad y naturalidad: 1) לֹא תֵצְאוּ en contexto exhortativo dirigido directamente a Aarón y sus hijos se expresa mejor en español como segunda persona plural directa (''no salgan'') o como futuro de mandato sin cambiar la persona; el borrador usa ''no saldrán'', que puede sonar más predictivo que prohibitivo; 2) פֶּן se representa mejor aquí como advertencia de consecuencia (''no sea que mueran'') que como finalidad (''para que no mueran'').'
  spanish_quality_summary: El español es claro y comprensible, pero puede mejorarse para sonar más natural y preciso en registro bíblico moderno. 'No salgan' suena más idiomático que 'no saldrán' en una prohibición directa. 'No sea que mueran' conserva mejor el tono solemne de advertencia. También conviene omitir la nota al pie actual, porque no añade una alternativa real útil al lector y solo comenta la preposición de manera redundante.
  glossary_alignment: 'La terminología clave está bien alineada con el proyecto: יְהוָה → ''Yahvé''; אֹהֶל מוֹעֵד → ''tienda de reunión''; שֶׁמֶן מִשְׁחַת יְהוָה → ''el aceite de la unción de Yahvé''. No hay conflicto doctrinal ni terminológico mayor. ''Conforme a la palabra de Moisés'' es aceptable y fiel.'
  issues:
  - severity: medium
    issue: La prohibición 'no saldrán' suena menos directa que el hebreo imperf. negativo en discurso mandatorio.
    rationale: Aunque puede funcionar como futuro de mandato, en español bíblico moderno 'no salgan' comunica con más claridad la orden directa a los destinatarios inmediatos.
  - severity: medium
    issue: '''Para que no mueran'' cambia la advertencia de consecuencia por un matiz de finalidad/previsión.'
    rationale: 'פֶּן introduce un aviso de resultado temido: ''no sea que mueran'' o ''no vayan a morir''. La opción actual es comprensible, pero menos exacta.'
  - severity: low
    issue: La nota [a] es innecesaria y poco informativa para el lector final.
    rationale: No preserva una alternativa exegéticamente significativa; solo explica literalmente 'desde la entrada', algo que no requiere nota en español.
  revised_spanish_text: Y no salgan de la entrada de la tienda de reunión, no sea que mueran, porque el aceite de la unción de Yahvé está sobre ustedes». Y ellos hicieron conforme a la palabra de Moisés.
  revision_rationale: Se ajusta la prohibición a una forma española más directa y natural ('no salgan') y se corrige פֶּן a una advertencia de consecuencia ('no sea que mueran'). Se elimina la nota innecesaria. Se conserva la terminología del proyecto, especialmente 'Yahvé' y 'tienda de reunión'.
