translation:
  language: es
  text: Y antes de él no hubo rey como él[a], que volvió a Yahvé[b] con todo su corazón, con toda su alma y con toda su fuerza[c], conforme a toda la ley de Moisés[d]; ni después de él se levantó nadie como él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no hubo antes de él rey como él». El hebreo coloca la comparación al inicio para subrayar la singularidad del rey.'
    reason: alternative_reading
  - marker: b
    text: 'O: «se volvió a Yahvé». שׁוּב con אֶל puede expresar regreso en fidelidad de pacto y arrepentimiento.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «con toda su fortaleza». מְאֹד aquí expresa totalidad de capacidad, no solo fuerza física.'
    reason: lexical_alternative
  - marker: d
    text: «Con todo su corazón, con toda su alma y con toda su fuerza» evoca Deuteronomio 6:5.
    reason: cross_reference
lexical_decisions:
- source_word: וְכָמֹהוּ / לְפָנָיו
  english_pob_choice: And before him there was no king like him
  chosen_spanish: Y antes de él no hubo rey como él
  alternatives_spanish:
  - Y no hubo antes de él rey como él
  - Y delante de él no había rey como él
  lexicon: HALOT
  rationale: La inversión hebrea expresa comparación enfática y anterioridad temporal. En español, «antes de él» transmite con naturalidad la prioridad cronológica sin perder la exclusividad del juicio.
- source_word: שָׁב אֶל יְהוָה
  english_pob_choice: turned to Yahweh
  chosen_spanish: se volvió a Yahvé
  alternatives_spanish:
  - volvió a Yahvé
  - regresó a Yahvé
  - se convirtió a Yahvé
  lexicon: HALOT
  rationale: שׁוּב con אֶל puede expresar volver/volverse en sentido de lealtad de pacto y arrepentimiento. «Se volvió a Yahvé» conserva ese movimiento relacional sin imponer una sola glosa interpretativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: consistency with project default for YHWH
  rationale: El texto hebreo usa el Tetragrámaton directamente. La pauta del proyecto pide «Yahvé» como nombre divino principal en español, preservando el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: בְּכָל לְבָבוֹ
  english_pob_choice: with all his heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - con todo su ser interior
  - con toda su voluntad
  lexicon: HALOT
  rationale: La expresión antropológica es idiomática y corresponde al lenguaje bíblico conocido. «Corazón» comunica bien la sede de intención, afecto y voluntad en español bíblico contemporáneo.
- source_word: וּבְכָל נַפְשׁוֹ
  english_pob_choice: and with all his soul
  chosen_spanish: con toda su alma
  alternatives_spanish:
  - con toda su vida
  - con todo su ser
  lexicon: HALOT
  rationale: «Alma» mantiene la tríada deuteronómica y el eco intertextual de Deuteronomio 6:5, sin diluir el paralelismo de la fórmula.
- source_word: וּבְכָל מְאֹדוֹ
  english_pob_choice: and with all his might
  chosen_spanish: con toda su fuerza
  alternatives_spanish:
  - con todo su poder
  - con toda su energía
  - con toda su fortaleza
  lexicon: HALOT
  rationale: מְאֹד en esta fórmula denota totalidad de capacidad o intensidad. En español, «fuerza» es una alternativa válida a «mighty/strength» y evita una rigidez innecesaria; conserva la idea de entrega plena.
- source_word: כְּכֹל תּוֹרַת מֹשֶׁה
  english_pob_choice: according to all the law of Moses
  chosen_spanish: conforme a toda la ley de Moisés
  alternatives_spanish:
  - según toda la ley de Moisés
  - de acuerdo con toda la ley de Moisés
  - conforme a toda la instrucción de Moisés
  lexicon: HALOT
  rationale: En este contexto evaluativo-legal, תּוֹרָה se refiere al corpus normativo mosaico. «Ley» es claro y formal en español; «conforme a» refleja bien el estándar de conducta.
- source_word: וְאַחֲרָיו לֹא קָם כָּמֹהוּ
  english_pob_choice: nor did any like him arise after him
  chosen_spanish: ni después de él se levantó otro como él
  alternatives_spanish:
  - ni después de él surgió otro como él
  - ni se levantó después de él alguien como él
  lexicon: HALOT
  rationale: קָם aquí significa surgir/levantarse en el sentido de aparecer como sucesor comparable. «Se levantó otro como él» conserva la imagen verbal y la afirmación absoluta de unicidad.
theological_decisions:
- issue: Eco de Deuteronomio 6:5 en la descripción de la devoción de Josías
  english_pob_reading: Retain the triad 'heart... soul... might' in the main text
  chosen_spanish_reading: Conservar «corazón... alma... fuerza» en la línea principal
  alternative_spanish_readings:
  - corazón... alma... poder
  - corazón... alma... fortaleza
  rationale: El hebreo reproduce la fórmula deuteronómica de entrega total. Mantener la tríada visible ayuda a que el lector perciba el eco intertextual sin perder precisión ni naturalidad en español.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La elección sigue el principio del proyecto de no ocultar el nombre del pacto detrás de una sustitución tradicional. «Yahvé» es el equivalente español más estable para la transliteración del Tetragrámaton.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ahora todos los marcadores de nota [a], [b] y [c] aparecen explícitamente en el texto español exactamente en los lugares correspondientes. No se añadieron notas sin anclaje.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantuvo la tríada antropológica «corazón, alma y fuerza» para preservar el eco de Deuteronomio 6:5.
  - «Ley de Moisés» se conserva por claridad contextual y por la lectura legal del pasaje.
  - La clausula final mantiene el paralelismo absoluto con una formulación natural en español.
  - No se introdujo lenguaje eclesiástico tradicional ajeno al hebreo, salvo donde coincide con la terminología bíblica estable.
