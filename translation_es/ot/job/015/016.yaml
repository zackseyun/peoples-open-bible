translation:
  language: es
  text: Cuánto menos un hombre detestable y corrupto[a], que bebe la injusticia[b] como agua!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «impuro» o «fétido» para «corrupto» (hebreo נֶאֱלָח), un término raro que expresa estar contaminado o mancillado.
    reason: lexical_alternative
  - marker: b
    text: O «iniquidad» o «maldad» para «injusticia».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף כִּי
  english_pob_choice: how much less
  chosen_spanish: ¡Cuánto menos!
  alternatives_spanish:
  - ¡cuánto más!
  - ciertamente no
  lexicon: HALOT
  rationale: La expresión introduce un argumento a fortiori desde el versículo anterior. En español, «¡cuánto menos!» reproduce con naturalidad la lógica de menor a mayor imposibilidad, mejor que una traducción literal de valor concesivo.
- source_word: נִתְעָב
  english_pob_choice: detestable
  chosen_spanish: detestable
  alternatives_spanish:
  - abominable
  - repugnante
  lexicon: HALOT
  rationale: El participio nifal expresa a alguien moralmente repulsivo o abominable. «Detestable» conserva esa fuerza moral en español sin sonar excesivamente arcaico.
- source_word: נֶאֱלָח
  english_pob_choice: corrupt
  chosen_spanish: corrupto
  alternatives_spanish:
  - sucio
  - fétido
  - manchado
  lexicon: HALOT
  rationale: El término raro apunta a estar contaminado, impuro o moralmente manchado. «Corrupto» comunica bien la idea ética de corrupción y mantiene la tensión con la nota alternativa de «filthy/filthy» del inglés POB.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - humanidad
  lexicon: HALOT
  rationale: El hebreo usa el singular masculino אִישׁ en un enunciado representativo. «Un hombre» preserva la forma del original y la lectura genérica sin neutralizar el género gramatical.
- source_word: שֹׁתֶה
  english_pob_choice: who drinks
  chosen_spanish: que bebe
  alternatives_spanish:
  - bebiendo
  - que está bebiendo
  lexicon: HALOT
  rationale: 'El participio se vierte con una relativa natural en español para conservar el sentido habitual o continuo: no un acto aislado, sino una disposición estable.'
- source_word: כַמַּיִם
  english_pob_choice: like water
  chosen_spanish: como agua
  alternatives_spanish:
  - igual que agua
  - cual agua
  lexicon: HALOT
  rationale: La comparación es directa y sencilla. «Como agua» preserva la imagen de facilidad, abundancia y naturalidad del hebreo.
- source_word: עַוְלָה
  english_pob_choice: injustice
  chosen_spanish: la injusticia
  alternatives_spanish:
  - la iniquidad
  - el wrongdoing
  - la maldad
  lexicon: HALOT
  rationale: El sustantivo designa lo torcido, injusto o moralmente errado. «La injusticia» mantiene la fuerza ética concreta y evita trasladarlo a un vocabulario doctrinal más técnico de lo que el contexto exige.
theological_decisions:
- issue: Lenguaje masculino representativo
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - la humanidad
  rationale: El hebreo presenta un singular masculino representativo para hablar de la condición humana. Se conserva «un hombre» por fidelidad formal y porque el contexto no pide neutralización.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Campo moral de עַוְלָה
  english_pob_reading: injustice
  chosen_spanish_reading: la injusticia
  alternative_spanish_readings:
  - la iniquidad
  - la maldad
  - lo injusto
  rationale: 'No hay una carga doctrinal especial que obligue a términos eclesiásticos tradicionales. «La injusticia» mantiene el contraste ético del verso: el hombre bebe el mal con la misma facilidad con que bebe agua.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
translation_notes:
  revision_awareness: El paquete fuente y la auditoría inglesa muestran alta concordancia y ninguna revisión aplicada; se conserva la lógica a fortiori de אַף כִּי, el paralelismo moral fuerte de נִתְעָב/נֶאֱלָח, y la imagen de beber el mal como agua sin suavizarla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera del versículo porque aquí no aparece el nombre divino.
  - Se usa «injusticia» de forma consistente con la opción principal inglesa y se deja la alternativa léxica en nota.
  - La puntuación exclamativa refleja el valor retórico de la expresión a fortiori inicial.
