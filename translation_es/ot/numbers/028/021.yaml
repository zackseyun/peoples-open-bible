- from: Una décima [a] prepararás para cada cordero, para los siete corderos.
  to: Una décima parte[a] prepararás para cada cordero, para los siete corderos.
  rationale: Se ajusta la medida a una formulación española más natural y clara («una décima parte») sin añadir «de un efa» al texto principal, en línea con la revisión inglesa auditada. Se conserva la nota sobre la repetición distributiva del hebreo y se evita una redacción principal que podría resultar opaca para lectores hispanos.
