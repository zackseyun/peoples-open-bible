translation:
  language: es
  text: Harás la túnica del efod totalmente de azul[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "toda de azul", es decir, hecha por completo de material azul.'
    reason: lexical_alternative
  - marker: b
    text: El término hebreo traducido "azul" puede referirse a una tela costosa teñida en la gama del azul al azul púrpura.
    reason: cultural_note
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: You shall make
  chosen_spanish: Harás
  alternatives_spanish:
  - Y harás
  - Deberás hacer
  lexicon: HALOT
  rationale: La forma verbal hebrea funciona aquí como mandato instruccional en segunda persona masculina singular. En español, el futuro simple transmite bien la orden normativa sin sonar tan calcado como 'tú harás', y encaja con el tono legal del pasaje.
- source_word: מְעִיל
  english_pob_choice: robe
  chosen_spanish: manto
  alternatives_spanish:
  - túnica
  - ropa exterior
  lexicon: HALOT
  rationale: En contexto sacerdotal, 'מְעִיל' designa una prenda exterior ceremonial. 'Manto' comunica mejor esa función y conserva cierta solemnidad; 'túnica' podría sugerir otra prenda y 'ropa exterior' es demasiado genérico.
- source_word: הָאֵפֹד
  english_pob_choice: the ephod
  chosen_spanish: del efod
  alternatives_spanish:
  - del efod sacerdotal
  - del efod
  lexicon: HALOT
  rationale: Se conserva el término técnico transliterado porque es una vestidura sacerdotal específica y el hebreo la vincula estrechamente con el efod. La traducción no debe sustituirlo por una glosa incierta.
- source_word: כְּלִיל
  english_pob_choice: entirely
  chosen_spanish: todo
  alternatives_spanish:
  - enteramente
  - completamente
  - por completo
  lexicon: HALOT
  rationale: El adjetivo expresa totalidad. En español, 'todo de azul' refleja naturalmente la construcción y mantiene la fuerza de 'entirely of blue' sin volverla artificial.
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul púrpura
  - azul fino
  - teñido de azul
  lexicon: HALOT
  rationale: El término se refiere al tejido teñido característico del santuario. 'Azul' es la equivalencia más clara y publica; las opciones más específicas son posibles, pero exceden la certeza del término en este verso aislado.
translation_notes:
  revision_awareness: El texto inglés POB fue revisado sin cambios y conserva alto acuerdo con el control cruzado. La versión española sigue de cerca la estructura y las decisiones léxicas auditadas, manteniendo la totalidad del color y el término técnico del efod.
  spanish_consistency_notes:
  - Se mantiene 'efod' como término técnico transliterado, en línea con la política del proyecto para vestiduras sacerdotales específicas.
  - '''Manto'' evita una traducción demasiado genérica y preserva la idea de una prenda exterior ceremonial.'
  - '''Todo de azul'' conserva la noción de totalidad sin imponer una paráfrasis interpretativa más amplia.'
