revisions:
- from: No comerás ninguna res[a]. La podrás dar al forastero[b] que está dentro de tus puertas[c], y él la comerá; o la podrás vender a un extranjero[d]. Porque tú eres un pueblo santo para Yahvé tu Dios. No cocerás un cabrito[e] en la leche de su madre.
  to: No comerás ningún animal muerto[a]. Se lo podrás dar al residente extranjero[b] que está dentro de tus puertas[c][d], y él podrá comerlo; o lo podrás vender a un extranjero. Porque tú eres un pueblo santo para Yahvé tu Dios. No cocerás un cabrito[e] en la leche de su madre.
  rationale: Se corrige el error léxico principal reemplazando 'res' por 'animal muerto', que sí refleja נְבֵלָה con apoyo de nota. Se mejora la precisión de גֵּר con 'residente extranjero', manteniendo la distinción con נָכְרִי. Se reubica la nota sobre la fuerza legal de los verbos a la cláusula adecuada y se suaviza la sintaxis a 'Se lo podrás dar ... y él podrá comerlo' para una lectura española más natural sin perder el matiz permisivo.
