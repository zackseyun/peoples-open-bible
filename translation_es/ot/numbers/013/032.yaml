translation:
  language: es
  text: 'Así que trajeron a los hijos de Israel[c] un mal informe acerca de la tierra que habían explorado[a], diciendo: “La tierra por la que pasamos para explorarla[b] es una tierra que devora a sus habitantes[d], y toda la gente que vimos en medio de ella son hombres de gran tamaño[e].”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "propagaron un mal informe" o, más fuertemente, "difamaron la tierra".
    reason: lexical_alternative
  - marker: b
    text: O "espiar" / "reconocer".
    reason: lexical_alternative
  - marker: c
    text: Hebreo "hijos de Israel"; designación pactual estándar del pueblo de Israel.
    reason: cultural_note
  - marker: d
    text: O "una tierra que consume a sus habitantes".
    reason: lexical_alternative
  - marker: e
    text: O "hombres de estatura", aquí refiriéndose al tamaño físico imponente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִיאוּ
  english_pob_choice: brought
  chosen_spanish: trajeron
  alternatives_spanish:
  - sacaron
  - propagaron
  lexicon: HALOT
  rationale: El hebreo con דִּבָּה expresa la idea de poner o difundir un informe; en español, “trajeron” conserva la imagen de llevar un reporte a otro grupo, sin forzar una lectura demasiado interpretativa. “Propagaron” sería más explícito pero menos cercano al giro hebreo.
- source_word: דִּבַּת
  english_pob_choice: a bad report
  chosen_spanish: un mal informe
  alternatives_spanish:
  - un informe malo
  - una calumnia
  lexicon: HALOT
  rationale: “Mal informe” comunica la valoración negativa del reporte sin introducir de entrada la acusación más fuerte de “calumnia”. Mantiene bien la tensión entre informe desfavorable y posible difamación.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: HALOT
  rationale: En este contexto narrativo y de promesa, “tierra” es la equivalencia natural en español para el hebreo הארץ, preservando el sentido geográfico-covenantal.
- source_word: תָּרוּ / לָתוּר
  english_pob_choice: had explored / to explore
  chosen_spanish: habían explorado / explorarla
  alternatives_spanish:
  - habían espiado / espiarla
  - habían inspeccionado / inspeccionarla
  lexicon: HALOT
  rationale: El verbo תור tiene el sentido de explorar o reconocer. “Explorar” es claro y fiel, y evita cargar el texto con connotaciones de espionaje que el contexto no exige en la forma básica del verbo.
- source_word: אֶל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los israelitas
  - a los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la designación corporativa masculina explícita del hebreo. “Hijos de Israel” es un equivalente tradicional y transparente que deja visible la forma del texto fuente.
- source_word: עָבַרְנוּ בָהּ
  english_pob_choice: we passed
  chosen_spanish: pasamos por ella
  alternatives_spanish:
  - atravesamos
  - fuimos por ella
  lexicon: HALOT
  rationale: El verbo עבר con la preposición ב expresa pasar por/en medio de. “Pasamos por ella” suena natural en español y preserva la relación espacial del hebreo.
- source_word: אֶרֶץ אֹכֶלֶת יוֹשְׁבֶיהָ
  english_pob_choice: a land that devours its inhabitants
  chosen_spanish: una tierra que devora a sus habitantes
  alternatives_spanish:
  - una tierra que consume a sus habitantes
  - una tierra que se come a sus habitantes
  lexicon: HALOT
  rationale: “Devora” reproduce bien la imagen vigorosa y ominosa del participio אֹכֶלֶת. “Consume” es posible, pero menos vívido; “se come” sería demasiado coloquial para este registro.
- source_word: יוֹשְׁבֶיהָ
  english_pob_choice: its inhabitants
  chosen_spanish: sus habitantes
  alternatives_spanish:
  - los que habitan en ella
  - sus moradores
  lexicon: HALOT
  rationale: “Habitantes” es la correspondencia moderna más natural para el participio sustantivado en este contexto. Mantiene el referente colectivo sin perder claridad.
- source_word: וְכָל הָעָם
  english_pob_choice: and all the people
  chosen_spanish: y toda la gente
  alternatives_spanish:
  - y todo el pueblo
  - y toda la población
  lexicon: HALOT
  rationale: “Gente” aquí conserva el sentido colectivo de עָם en un registro natural. “Pueblo” también es válido, pero “gente” evita una posible lectura demasiado institucional en español.
- source_word: בְתוֹכָהּ
  english_pob_choice: in it
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - dentro de ella
  - en ella
  lexicon: HALOT
  rationale: La frase hebrea literalmente es “en su interior/medio”. “En medio de ella” preserva esa imagen espacial con naturalidad en español y evita aplanar el matiz de interioridad.
- source_word: אַנְשֵׁי מִדּוֹת
  english_pob_choice: men of great size
  chosen_spanish: hombres de gran tamaño
  alternatives_spanish:
  - hombres de gran estatura
  - hombres de gran medida
  lexicon: HALOT
  rationale: La expresión apunta a hombres físicamente imponentes. “Gran tamaño” transmite el sentido en español actual sin desplazarlo hacia “estatura” en sentido social o figurado. Se mantiene la ambigüedad controlada de מידות sin inventar un tecnicismo.
theological_decisions:
- issue: Conservación de la designación corporativa masculina בְּנֵי יִשְׂרָאֵל
  english_pob_reading: to the sons of Israel
  chosen_spanish_reading: a los hijos de Israel
  alternative_spanish_readings:
  - a los israelitas
  - a los hijos de Jacob
  rationale: Se retiene la forma explícitamente masculina del hebreo, conforme al principio de transparencia del proyecto. No se neutraliza a “israelitas” porque la fuente marca una formulación heredada y covenantal que conviene dejar visible.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rango semántico de דִּבָּה en contexto narrativo
  english_pob_reading: a bad report
  chosen_spanish_reading: un mal informe
  alternative_spanish_readings:
  - una calumnia
  - un informe difamatorio
  rationale: El contexto muestra un reporte negativo y desalentador. “Mal informe” conserva esa carga sin elevar automáticamente el grado jurídico-moral a “calumnia”, lo cual quedaría para un matiz interpretativo más fuerte.
  doctrine_reference: HALOT דִּבָּה; contexto narrativo de Números 13
- issue: Imagen metafórica de אֶרֶץ אֹכֶלֶת יוֹשְׁבֶיהָ
  english_pob_reading: a land that devours its inhabitants
  chosen_spanish_reading: una tierra que devora a sus habitantes
  alternative_spanish_readings:
  - una tierra que consume a sus habitantes
  - una tierra que se come a sus habitantes
  rationale: La metáfora se mantiene con fuerza en español para no suavizar la retórica temerosa de los espías. “Devora” conserva tanto la violencia de la imagen como su tono de exageración alarmista.
  doctrine_reference: HALOT אכל; figura retórica preservada
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de “brought out” a “brought” para mayor naturalidad. En español se reflejó directamente con “trajeron”, evitando una construcción artificiosa equivalente a “trajeron fuera”. También se mantuvo la secuencia discursiva y la lista de alternativas semánticas relevantes del aparato inglés.
  spanish_consistency_notes:
  - Se usó “Yahvé” no pertinente aquí porque el versículo no contiene el tetragrámaton.
  - Se prefirió “hijos de Israel” para mantener visible la forma hebrea בְּנֵי יִשְׂרָאֵל.
  - “Explorar” se eligió como equivalente principal de תור, con “espiar” reservado como alternativa anotada por su matiz más fuerte.
  - Se conservó la imagen metafórica “devora” para אֹכֶלֶת, en línea con la equivalencia óptima del texto fuente.
  - El orden de las notas sigue la correspondencia del aparato inglés, con adaptación al español y sin reusar marcadores.
