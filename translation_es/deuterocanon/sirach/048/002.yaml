translation:
  language: es
  text: Él les quebró el bastón del pan[a], y en su celo los redujo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «bastón del pan», un modismo para la provisión de alimento; el paralelo griego dice: «trajo hambre sobre ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וישבר
  english_pob_choice: He broke
  chosen_spanish: Él les quebró
  alternatives_spanish:
  - Él les rompió
  - Él les quebrantó
  lexicon: HALOT
  rationale: El verbo hebreo שבר en esta forma expresa quebrar/romper con sentido concreto. «Quebró» conserva la imagen fuerte del acto sin añadir interpretación.
- source_word: מטה לחם
  english_pob_choice: staff of bread
  chosen_spanish: sustento de pan
  alternatives_spanish:
  - vara de pan
  - apoyo de pan
  - provisión de pan
  lexicon: HALOT
  rationale: En español, «sustento de pan» comunica el idiomatismo hebreo como provisión alimentaria de modo natural y digno. Mantiene la idea del soporte que sostiene la vida, sin volverlo opaco como una traducción demasiado literal.
- source_word: ובקנאתו
  english_pob_choice: and in his zeal
  chosen_spanish: y en su celo
  alternatives_spanish:
  - y por su celo
  - y en su pasión
  lexicon: HALOT
  rationale: קנאה aquí apunta al celo ardiente por Dios, no a celos en sentido posesivo. «Celo» reproduce bien ese valor y se ajusta al uso bíblico en español.
- source_word: המעיטם
  english_pob_choice: he diminished them
  chosen_spanish: los disminuyó
  alternatives_spanish:
  - los redujo
  - los hizo pocos
  lexicon: HALOT
  rationale: El hiphil de מעט significa hacer menos, reducir. «Los disminuyó» sigue de cerca la elección inglesa revisada y conserva la fuerza del verbo sin requerir una paráfrasis.
theological_decisions:
- issue: Cómo reflejar el idiomatismo hebreo מטה לחם frente al paralelo griego de hambre/famine
  english_pob_reading: Retain the idiom in the main text, with the famine sense preserved in a footnote.
  chosen_spanish_reading: Mantener el sentido idiomático de provisión de alimento en el texto principal, con nota que explicite la equivalencia con «hambre/famine» del paralelo griego.
  alternative_spanish_readings:
  - Él les trajo hambre
  - Él les quitó el pan
  - Él quebró su provisión de pan
  rationale: El hebreo es la base primaria de este versículo, pero el griego confirma que el modismo se refiere a privación de alimento. La redacción española debe conservar la imagen y, a la vez, aclarar el sentido para el lector.
  doctrine_reference: Principio de primacía de la fuente original y equivalencia óptima; uso responsable del paralelo griego como testigo interpretativo.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa al preferir un verbo más natural y formal para המעיטם («los disminuyó») mientras conserva el idiomático «sustento de pan» del hebreo, aclarado en nota por el paralelo griego.
  spanish_consistency_notes:
  - Se mantuvo «celo» para קנאה, en continuidad con el valor teológico de fervor por Dios.
  - Se evitó «SEÑOR» porque este versículo no contiene el tetragrámaton; el sujeto está implícito en el contexto narrativo.
  - «Disminuyó» preserva la idea de reducir la cantidad o importancia sin introducir matices ajenos al texto.
