translation:
  language: es
  text: 'Cántico de las subidas[a]. De David.


    Yahvé, mi corazón no se ha ensoberbecido, ni mis ojos se han alzado en alto[b]; no he andado en cosas demasiado grandes ni en cosas demasiado maravillosas para mí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Por David» o «Para David»; el sobrescrito hebreo puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
  - marker: b
    text: O «mis ojos no se han levantado en soberbia»; la expresión hebrea se refiere a una mirada arrogante o autoexaltada.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  english_pob_choice: A Song of Ascents
  chosen_spanish: Cántico de ascensos
  alternatives_spanish:
  - Cántico de subidas
  - Cántico de peregrinación
  lexicon: HALOT
  rationale: Conservo el título tradicional del pequeño conjunto de salmos y traduzco מַעֲלוֹת de forma suficientemente literal como «ascensos», manteniendo la imagen de «subidas» sin convertirla en una paráfrasis devocional.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  lexicon: HALOT
  rationale: La preposición lamed en los sobrescritos permite varias relaciones. «De David» mantiene la ambigüedad documental que el POB inglés preserva, sin cerrar indebidamente la cuestión de autoría, pertenencia o dedicación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El proyecto español usa «Yahvé» para el Tetragrámaton, reproduciendo el nombre divino propio en vez de sustituirlo por un título. «Yahvé» es la forma establecida en este marco editorial.
- source_word: גָבַהּ לִבִּי
  english_pob_choice: my heart is not proud
  chosen_spanish: mi corazón no se ha ensoberbecido
  alternatives_spanish:
  - mi corazón no está orgulloso
  - mi corazón no se ha vuelto altivo
  lexicon: HALOT
  rationale: El hebreo dice literalmente que el corazón no se ha «elevado». En español, «ensoberbecido» conserva la fuerza moral del orgullo sin perder la imagen de elevación interna mejor que una simple equivalencia psicológica.
- source_word: רָמוּ עֵינַי
  english_pob_choice: my eyes are not raised high
  chosen_spanish: mis ojos se han alzado
  alternatives_spanish:
  - mis ojos no están altivos
  - mis ojos no se han levantado en soberbia
  lexicon: HALOT
  rationale: Mantengo la imagen corporal de los ojos levantados, que en hebreo expresa arrogancia. La forma pasiva/reflexiva en español suena natural y conserva el gesto de autoexaltación.
- source_word: הִלַּכְתִּי
  english_pob_choice: I have not walked
  chosen_spanish: no he andado
  alternatives_spanish:
  - no he caminado
  - no me he conducido
  lexicon: HALOT
  rationale: «Andar» reproduce bien el hebreo de conducta o modo de vida y evita endurecer el verso con una formulación demasiado abstracta.
- source_word: בִּגְדֹלֹות
  english_pob_choice: in things too great
  chosen_spanish: en grandezas
  alternatives_spanish:
  - en cosas grandes
  - en asuntos demasiado grandes
  lexicon: HALOT
  rationale: El plural sustantivado refiere a asuntos de magnitud fuera del alcance propio. «Grandezas» condensa esa idea y funciona bien en español poético; el siguiente miembro ya aporta la noción de exceso personal.
- source_word: וּבְנִפְלָאוֹת
  english_pob_choice: and too wondrous
  chosen_spanish: y en cosas maravillosas
  alternatives_spanish:
  - y en maravillas
  - y en cosas extraordinarias
  lexicon: HALOT
  rationale: נִפְלָאוֹת designa cosas maravillosas o extraordinarias. «Cosas maravillosas» conserva el paralelismo con «grandezas» y mantiene el tono del original sin sobreinterpretar.
- source_word: מִמֶּנִּי
  english_pob_choice: for me
  chosen_spanish: demasiado altas para mí
  alternatives_spanish:
  - más allá de mí
  - que me sobrepasan
  lexicon: HALOT
  rationale: La preposición expresa que esas cosas exceden la capacidad o la medida propia del hablante. «Demasiado altas para mí» da en español el valor comparativo y la imagen espacial del hebreo, como hace el POB inglés con su explicación «beyond me».
theological_decisions:
- issue: Nombre divino en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  rationale: Se preserva el nombre propio del pacto, no una sustitución titulada. Esto sigue la línea doctrinal del POB de no enmascarar el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
- issue: Ambigüedad de לְדָוִד en el sobrescrito
  english_pob_reading: Of David
  chosen_spanish_reading: De David
  alternative_spanish_readings:
  - Por David
  - Para David
  rationale: La formulación evita decidir entre autoría, asociación o dedicación. Mantiene la tensión documental que el audit trail inglés considera deliberadamente abierta.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El cotejo más reciente indica alta concordancia con el inglés POB y no registra cambios aplicados; esta versión española sigue ese estado estable, preservando la ambigüedad de לְדָוִד, el nombre divino y la imagen paralela de corazón/ojos/andar. No se requiere resolver tensiones textuales adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «De David» en el sobrescrito para conservar la ambigüedad documental.
  - «Mi corazón» y «mis ojos» conservan la paralelidad hebrea sin modernizarla en exceso.
  - «Demasiado altas para mí» recoge el valor de exceso/capacidad del hebreo מִמֶּנִּי sin volverlo explicativo en el texto principal.
