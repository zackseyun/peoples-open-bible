translation:
  language: es
  text: 'Por tanto, así dice Yahvé, el Dios de los ejércitos, el Señor: En todas las plazas habrá llanto, y en todas las calles dirán: «¡Ay! ¡Ay!»[a]. Llamarán al labrador al duelo, y a los que conocen el lamento[b] al llanto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡Ay de mí! ¡Ay de mí!». El grito hebreo הוֹ הוֹ es una exclamación de lamentación; «¡Ay! ¡Ay!» se eligió para enfatizar el duelo más que una denuncia.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los que conocen el lamento», probablemente refiriéndose a personas diestras o profesionales en el duelo.
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Marca la conclusión inferida del contexto anterior. «Por tanto» conserva bien el valor argumentativo y el tono profético sin sonar demasiado coloquial.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - esto dice
  - así ha dicho
  lexicon: HALOT
  rationale: Es la fórmula profética estándar. «Así dice» mantiene la forma solemne y directa del hebreo sin sobreexplicar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término del proyecto para el Nombre divino, preservando su fuerza de pacto y evitando el reemplazo por una máscara litúrgica.
- source_word: אֱלֹהֵי צְבָאוֹת
  english_pob_choice: the God of hosts
  chosen_spanish: el Dios de los ejércitos
  alternatives_spanish:
  - el Dios de los ejércitos celestiales
  - el Dios de las huestes
  lexicon: HALOT
  rationale: «צְבָאוֹת» puede referirse a huestes o ejércitos; en español, «los ejércitos» comunica con claridad la majestad y el alcance militar/cósmico del título.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  - mi Señor
  lexicon: HALOT
  rationale: Aquí funciona como título divino en aposición. «El Señor» es la forma natural y reverente en español para Adonai en este contexto.
- source_word: בְּכָל רְחֹבוֹת
  english_pob_choice: In all the squares
  chosen_spanish: en todas las plazas
  alternatives_spanish:
  - en todos los espacios abiertos
  - en todas las explanadas
  lexicon: HALOT
  rationale: «רְחֹבוֹת» son lugares públicos amplios de la ciudad. «Plazas» comunica mejor ese espacio urbano que una traducción más genérica.
- source_word: מִסְפֵּד
  english_pob_choice: wailing
  chosen_spanish: luto
  alternatives_spanish:
  - lamento
  - llanto
  lexicon: HALOT
  rationale: En la primera aparición, el sustantivo describe el duelo público como estado/escena general; «luto» funciona bien en español para ese marco colectivo, sin perder solemnidad.
- source_word: חוּצוֹת
  english_pob_choice: streets
  chosen_spanish: calles
  alternatives_spanish:
  - callejones
  - vías
  lexicon: HALOT
  rationale: Contrasta naturalmente con «plazas». «Calles» expresa de forma clara las vías urbanas públicas del texto.
- source_word: הוֹ הוֹ
  english_pob_choice: Alas! Alas!
  chosen_spanish: ¡Ay! ¡Ay!
  alternatives_spanish:
  - ¡Ay de mí! ¡Ay de mí!
  - ¡Woe! ¡Woe!
  lexicon: HALOT
  rationale: Es una exclamación de lamentación. «¡Ay! ¡Ay!» reproduce el grito de duelo en español sin convertirlo en un oráculo de denuncia.
- source_word: וְקָרְאוּ
  english_pob_choice: They will call
  chosen_spanish: Llamarán
  alternatives_spanish:
  - Convocarán
  - Citarán
  lexicon: HALOT
  rationale: El verbo indica convocar a alguien para participar en el rito funerario. «Llamarán» es natural y mantiene la idea de convocatoria.
- source_word: אִכָּר
  english_pob_choice: the farmer
  chosen_spanish: al labrador
  alternatives_spanish:
  - al agricultor
  - al campesino
  lexicon: HALOT
  rationale: «אִכָּר» designa al trabajador del campo; «labrador» conserva el matiz tradicional de quien trabaja la tierra, sin volverse demasiado técnico.
- source_word: אֶל אֵבֶל
  english_pob_choice: to mourning
  chosen_spanish: al duelo
  alternatives_spanish:
  - al luto
  - al llanto
  lexicon: HALOT
  rationale: La preposición expresa convocatoria hacia la participación en el duelo. «Duelo» en español funciona bien como acto/estado de luto convocado públicamente.
- source_word: יֹדְעֵי נֶהִי
  english_pob_choice: those who know lamentation
  chosen_spanish: a los que conocen el lamento
  alternatives_spanish:
  - a los que saben llorar
  - a los expertos en duelo
  lexicon: HALOT
  rationale: Se conserva la literalidad de la expresión hebrea, que alude probablemente a dolientes especializados. Así se mantiene la tensión entre sentido literal y probable referencia cultural.
- source_word: וּמִסְפֵּד
  english_pob_choice: and to wailing
  chosen_spanish: al llanto
  alternatives_spanish:
  - al lamento
  - al duelo
  lexicon: HALOT
  rationale: En la cláusula final, el paralelo sugiere el acto audible de llanto o lamento como destino de los llamados. «Llanto» conserva el carácter sonoro y emotivo del término.
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio divino para conservar el peso del pacto y la identificación deliberada del texto profético. Se evita la sustitución por un título funcional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: 'Acumulación de títulos divinos: «Yahvé, el Dios de los ejércitos, el Señor»'
  english_pob_reading: Yahweh, the God of hosts, the Lord
  chosen_spanish_reading: Yahvé, el Dios de los ejércitos, el Señor
  alternative_spanish_readings:
  - Yahvé, Dios de los ejércitos, el Señor
  - Yahvé, el Dios de las huestes, el Señor
  rationale: El hebreo acumula títulos para intensificar la majestad y autoridad del oráculo. En español se conserva la serie completa sin nivelarla ni fusionarla.
  doctrine_reference: Lectura sintáctica del hebreo con aposición titulada
translation_notes:
  revision_awareness: 'Se integró la revisión más reciente del inglés POB en el orden final de la cláusula: «a los que conocen el lamento al llanto», reflejando que el grupo convocado es el sujeto de la llamada final. La traducción española sigue esa estructura sintáctica y mantiene la repetición semántica entre duelo/lamento/llanto sin invertir los complementos.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del Nombre divino en este proyecto.
  - Se mantiene «el Señor» para אֲדֹנָי como título, no como sustituto del Tetragrámaton.
  - Se conserva el contraste espacial «plazas / calles» siguiendo el paralelismo del hebreo.
  - Se evita traducir mecánicamente «hosts» con un calco poco natural; «ejércitos» es transparente en español y compatible con el título bíblico.
