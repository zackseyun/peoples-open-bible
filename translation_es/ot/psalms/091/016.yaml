translation:
  language: es
  text: Le saciaré de larga vida, y le mostraré mi salvación[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mi liberación'. El término hebreo puede referirse al rescate de un peligro, así como a la salvación en un sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹרֶךְ יָמִים
  english_pob_choice: length of days
  chosen_spanish: larga vida
  alternatives_spanish:
  - larga duración
  - muchos días
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'longitud de días'. En español, 'larga vida' comunica con naturalidad el valor idiomático de una vida prolongada sin perder el sentido de abundancia temporal. 'Larga duración' sería más pegado a la forma, pero menos idiomático en este contexto poético.
- source_word: אַשְׂבִּיעֵהוּ
  english_pob_choice: I will satisfy him
  chosen_spanish: le saciaré
  alternatives_spanish:
  - le satisfaré
  - lo saciaré plenamente
  lexicon: HALOT
  rationale: El verbo en hifil expresa causar saciedad o plenitud. 'Le saciaré' conserva la fuerza de 'satisfy' y en español poético puede aplicarse a la plenitud de vida dada por Dios. 'Satisfaré' es posible, pero 'saciaré' mantiene mejor la imagen de llenura.
- source_word: וְאַרְאֵהוּ
  english_pob_choice: and I will show him
  chosen_spanish: y le mostraré
  alternatives_spanish:
  - y le haré ver
  - y le dejaré ver
  lexicon: HALOT
  rationale: El hifil de ראה indica hacer ver o mostrar. 'Le mostraré' es la equivalencia más directa y natural en español, preservando la agencia divina explícita en el verbo.
- source_word: בִּישׁוּעָתִי
  english_pob_choice: my salvation
  chosen_spanish: mi salvación
  alternatives_spanish:
  - mi liberación
  - la salvación que doy
  lexicon: HALOT
  rationale: Se conserva 'salvación' porque es el equivalente léxico más directo y mantiene la amplitud teológica del término, que puede abarcar rescate concreto y salvación en sentido más amplio. 'Liberación' sería una lectura válida en ciertos contextos, pero reduciría la amplitud que el texto permite.
theological_decisions:
- issue: Alcance de יְשׁוּעָה en un salmo de protección divina
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - liberación
  rationale: En este cierre del salmo, el término puede referirse tanto al rescate de peligro como a la salvación en sentido más amplio. 'Salvación' preserva esa tensión y su resonancia canónica, sin excluir la idea de liberación concreta.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El auditor inglés indica alta concordancia y sin cambios en la última revisión; por eso se mantiene la línea semántica del POB en español, con ajuste idiomático natural en 'larga vida'.
  spanish_consistency_notes:
  - Se mantiene 'salvación' como término clave para יְשׁוּעָה, evitando reducirlo a 'liberación'.
  - Se conserva la primera persona divina ('Le saciaré... y le mostraré...') conforme al hebreo y al POB inglés.
  - El tono es poético y formal, apto para lectura eclesial sin recurrir a fórmulas tradicionales que oscurezcan el texto.
