lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: And he went
  chosen_spanish: Y fue
  alternatives_spanish:
  - Y fue
  - Entonces fue
  - Luego fue
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración con valor de pasado simple. En español, «fue» comunica el movimiento de manera natural y sobria; «y» conserva la secuencia narrativa del hebreo sin forzar una paraphrasis.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: HALOT
  rationale: La expresión indica procedencia desde el lugar ya mencionado. «De allí» es claro, idiomático y mantiene la repetición estilística del versículo.
- source_word: הַר הַכַּרְמֶל
  english_pob_choice: Mount Carmel
  chosen_spanish: el monte Carmelo
  alternatives_spanish:
  - Monte Carmelo
  - el monte del Carmelo
  lexicon: HALOT
  rationale: Como topónimo, el nombre se conserva de forma reconocible en español. «Monte Carmelo» sigue la convención bíblica común y refleja adecuadamente el sustantivo geográfico הַר.
- source_word: וּמִשָּׁם
  english_pob_choice: and from there
  chosen_spanish: y de allí
  alternatives_spanish:
  - y desde allí
  - entonces de allí
  lexicon: HALOT
  rationale: La conjunción más el adverbio repiten el patrón de desplazamiento. «Y de allí» preserva la cadencia y la simetría del texto hebreo.
- source_word: שָׁב
  english_pob_choice: he returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió de regreso
  lexicon: HALOT
  rationale: En contexto de viaje, שׁוּב expresa el retorno. «Volvió» es natural en español y suficientemente formal; no añade matices no presentes en el hebreo.
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  alternatives_spanish:
  - Samaría
  lexicon: HALOT
  rationale: Se conserva el topónimo bíblico estándar en español. «Samaria» es la forma ampliamente reconocible y fiel al nombre propio del texto.
