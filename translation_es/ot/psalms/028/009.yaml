translation:
  language: es
  text: Salva a tu pueblo y bendice tu herencia[a]; pastoréalos y llévalos[b] para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'heredad'; el hebreo también puede expresar la idea de posesión heredada o patrimonio de pacto.
    reason: lexical_alternative
  - marker: b
    text: O 'cárgalos' o 'levántalos'; el hebreo puede significar llevar, cargar o alzar, además de la idea de sostener con cuidado.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹשִׁיעָה
  english_pob_choice: Save
  chosen_spanish: Salva
  alternatives_spanish:
  - Sálvanos
  - Libra
  - Danos salvación
  lexicon: HALOT
  rationale: Es un imperativo dirigido a Dios; en español, "salvar" comunica de manera directa la petición sin añadir expansión interpretativa. "Salva" conserva la fuerza verbal y la dimensión de liberación/salvación.
- source_word: עַמֶּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - tu pueblo escogido
  lexicon: HALOT
  rationale: '"Pueblo" mantiene el sentido colectivo y de pertenencia al pacto de forma natural en español.'
- source_word: בָרֵךְ
  english_pob_choice: bless
  chosen_spanish: bendice
  alternatives_spanish:
  - bendice con favor
  - concede bendición a
  lexicon: HALOT
  rationale: Imperativo de bendición en una súplica litúrgica; "bendice" es la equivalencia directa y digna en español.
- source_word: נַחֲלָתֶךָ
  english_pob_choice: your inheritance
  chosen_spanish: tu heredad
  alternatives_spanish:
  - tu herencia
  - tu posesión
  lexicon: HALOT
  rationale: '"Heredad" conserva el matiz bíblico de posesión recibida y el vínculo de pertenencia a Yahvé, con buen registro en español bíblico. Se prefirió sobre "herencia" para evitar la posible asociación moderna solo patrimonial o testamentaria.'
- source_word: רְעֵם
  english_pob_choice: shepherd them
  chosen_spanish: pastóralos
  alternatives_spanish:
  - apaciéntalos
  - enséñalos
  - guíalos como pastor
  lexicon: HALOT
  rationale: El verbo רעה abarca la acción de pastorear, no solo alimentar. "Pastóralos" mantiene la metáfora pastoral completa; es más fiel que reducirlo a "alimentarlos".
- source_word: נַשְּׂאֵם
  english_pob_choice: carry them
  chosen_spanish: llévalos
  alternatives_spanish:
  - sosténlos
  - cárgalos
  - levántalos
  lexicon: HALOT
  rationale: נשא puede significar llevar, cargar o alzar. En paralelo con el pastoreo, "llévalos" comunica cuidado protector en español natural sin perder la idea de sostener/cargar.
- source_word: עַד הָעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por la eternidad
  lexicon: HALOT
  rationale: Expresa duración continua e indefinida de forma idiomática y sobria en español.
theological_decisions:
- issue: Metáfora pastoral en רְעֵם
  english_pob_reading: shepherd them
  chosen_spanish_reading: pastóralos
  alternative_spanish_readings:
  - apaciéntalos
  - guíalos como pastor
  rationale: Se preserva la imagen bíblica del pastor que cuida, guía y alimenta. "Pastóralos" evita reducir el verbo a una sola acción y mantiene la amplitud semántica del hebreo.
  doctrine_reference: Translation philosophy §1, §6
- issue: Relación de pertenencia en נַחֲלָתֶךָ
  english_pob_reading: your inheritance
  chosen_spanish_reading: tu heredad
  alternative_spanish_readings:
  - tu herencia
  - tu posesión
  rationale: La expresión presenta al pueblo como posesión asignada a Yahvé; "heredad" conserva el registro pactal y evita una lectura meramente económica o sucesoria.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El expediente inglés está estable: la revisión más reciente indica sin cambios y alta concordancia general. Se mantuvo la misma línea exegética, trasladando al español la distinción entre pastorear y simplemente alimentar, y entre llevar/cargar y solo levantar.'
  spanish_consistency_notes:
  - Se evitó "SEÑOR" como sustituto de Yahvé, siguiendo la política del proyecto y el trasfondo hebreo del salmo.
  - Se prefirió "heredad" por su resonancia bíblica y pactal, aunque "herencia" sigue siendo una alternativa viable.
  - '"Pastóralos" conserva la metáfora completa; "apaciéntalos" sería posible, pero puede sonar más estrecho en español.'
  - '"Para siempre" traduce de forma natural עַד הָעוֹלָם sin perder la duración indefinida.'
