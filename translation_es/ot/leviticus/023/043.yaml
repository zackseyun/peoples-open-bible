translation:
  language: es
  text: para que sus generaciones sepan que yo hice habitar a los hijos de Israel en cabañas[a], cuando los saqué de la tierra de Egipto. Yo soy Yahvé su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en refugios'. El hebreo sukkot se refiere a moradas temporales o refugios; también puede traducirse 'tabernáculos' en la terminología tradicional.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: HALOT
  rationale: Expresa con naturalidad la finalidad o propósito introducido por לְמַעַן, sin añadir matices ajenos al texto.
- source_word: יֵדְעוּ
  english_pob_choice: may know
  chosen_spanish: sepan
  alternatives_spanish:
  - conozcan
  - puedan saber
  lexicon: HALOT
  rationale: El imperfecto de finalidad se rinde bien con un subjuntivo de propósito; 'sepan' conserva el valor intencional y es idiomático en español.
- source_word: דֹרֹתֵיכֶם
  english_pob_choice: your generations
  chosen_spanish: sus generaciones
  alternatives_spanish:
  - sus descendientes
  - las generaciones de ustedes
  lexicon: HALOT
  rationale: Mantiene el alcance multigeneracional y el tono de pacto. Se evita una paráfrasis más interpretativa como 'descendientes'.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo que deben saber; 'que' es el equivalente español más natural.
- source_word: בַסֻּכּוֹת
  english_pob_choice: in booths
  chosen_spanish: en cabañas[a]
  alternatives_spanish:
  - en chozas
  - en refugios
  - en tabernáculos
  lexicon: HALOT
  rationale: '''סֻכּוֹת'' designa viviendas temporales. ''Cabañas'' comunica bien la idea en español y mantiene el sentido de morada provisional. Se añade nota por la alternativa lexical del inglés POB y la posible asociación festiva tradicional.'
- source_word: הוֹשַׁבְתִּי
  english_pob_choice: I made ... dwell
  chosen_spanish: hice habitar
  alternatives_spanish:
  - hice morar
  - hice que ... vivieran
  lexicon: HALOT
  rationale: El hiphil es causativo; 'hice habitar' conserva esa fuerza mejor que una forma simple como 'establecí'.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene el paralelismo literal del hebreo y la forma masculina corporativa que el texto usa.
- source_word: בְּהוֹצִיאִי
  english_pob_choice: when I brought ... out
  chosen_spanish: cuando los saqué
  alternatives_spanish:
  - al sacarlos
  - mientras los sacaba
  lexicon: HALOT
  rationale: El infinitivo con ב expresa circunstancia temporal; 'cuando los saqué' es natural en español y conserva la referencia a la acción del éxodo.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - fuera de la tierra de Egipto
  lexicon: HALOT
  rationale: '''Tierra'' refleja con mayor fidelidad el sustantivo הארץ y conserva el tono bíblico-covenantal del exilio y la liberación.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ''Yahvé'', preservando el nombre divino personal sin sustituirlo por un título.'
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios, de ustedes
  - su Dios propio
  lexicon: HALOT
  rationale: Equivale al fórmulario de pacto final, con posesivo de segunda persona plural en español bíblico natural.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el nombre propio divino. Conforme al criterio del proyecto, se lo translitera como 'Yahvé' en lugar de sustituirlo por un título enmascarado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor corporativo de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se conserva la forma masculina plural del hebreo para no neutralizar el dato formal del original, aunque su referencia sea corporativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
- issue: Lexema temporal y cultual de בַסֻּכּוֹת
  english_pob_reading: in booths
  chosen_spanish_reading: en cabañas
  alternative_spanish_readings:
  - en chozas
  - en refugios
  - en tabernáculos
  rationale: '''Cabañas'' comunica en español la idea de moradas temporales sin depender de una tradición eclesiástica fija. Se conserva la tensión entre el sentido general de refugio temporal y la asociación cultual de la fiesta.'
  doctrine_reference: HALOT s.v. סֻכָּה; nota lexical del POB sobre 'booths/shelters/tabernacles'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés, que aclaró la preposición de origen/''de la tierra de Egipto'' y mantuvo la explicitación del nombre divino. En español se optó por una equivalencia natural y auditable: ''la tierra de Egipto'' para הארץ, ''hice habitar'' para el causativo de הוֹשַׁבְתִּי, y ''Yahvé'' para יְהוָה conforme al estándar del proyecto.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrámaton, en coherencia con el criterio general del proyecto.
  - Se usa 'hijos de Israel' para reflejar la forma hebrea literal y su valor corporativo.
  - '''Cabañas'' preserva la referencia a moradas temporales sin imponer el término litúrgico ''tabernáculos''.'
