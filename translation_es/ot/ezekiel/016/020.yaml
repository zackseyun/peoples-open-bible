    issue: La nota al pie está anclada en la frase equivocada.
    rationale: El marcador [a] aparece en «prostitución», pero la nota explica «O “para ellos”», que corresponde a לָהֶם / «a ellos». Esto confunde al lector y no preserva fielmente el aparato de la POB inglesa.
  - severity: medium
    issue: Falta una nota léxica para «prostitución».
    rationale: La auditoría inglesa conserva alternativas para מִתַּזְנוּתֵךְ («your whoring / your harlotry»). El español debería reflejar una nota equivalente si se está manteniendo el aparato de alternativas significativas.
  - severity: medium
    issue: «que habías dado a luz para mí» suena poco natural en español.
    rationale: Aunque intenta reflejar לִי, la formulación no es la más idiomática. «que me habías dado a luz» comunica mejor en español la relación reclamada por el hablante sin perder el sentido fuente.
  - severity: low
    issue: La pregunta final puede sonar más natural.
    rationale: «¿Fue demasiado poca cosa tu prostitución?» es inteligible, pero «¿Acaso fue poca cosa tu prostitución?» fluye mejor en español general y mantiene la fuerza retórica.
