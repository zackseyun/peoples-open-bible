translation:
  language: es
  text: Y vivió Lamec quinientos noventa y cinco años[a] después de haber engendrado a Noé, y engendró hijos e hijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vivió, después de haber engendrado a Noé, quinientos noventa y cinco años».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַֽ/יְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - estuvo vivo
  - vivió durante
  lexicon: HALOT
  rationale: En la fórmula genealógica de Génesis 5, חיה en wayyiqtol expresa el periodo de vida transcurrido; «vivió» es la opción natural y fiel en español.
- source_word: לֶ֗מֶךְ
  english_pob_choice: Lamech
  chosen_spanish: Lamec
  alternatives_spanish:
  - Lamech
  lexicon: convención bíblica española
  rationale: Se adapta el nombre propio a la forma usual en español bíblico, manteniendo la identificación inequívoca del personaje.
- source_word: אַֽחֲרֵי֙
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - tras
  - luego de
  lexicon: HALOT
  rationale: Marca la relación temporal posterior al nacimiento de Noé; «después de» es claro y idiomático en español.
- source_word: הוֹלִיד֣/וֹ
  english_pob_choice: he fathered
  chosen_spanish: haber engendrado a
  alternatives_spanish:
  - haber sido padre de
  - haber dado a luz a
  lexicon: HALOT
  rationale: El hifil de ילד en genealogías indica la acción paterna de engendrar/fomentar descendencia; «haber engendrado a» preserva ese matiz sin calcar de forma áspera.
- source_word: חָמֵ֤שׁ וְ/תִשְׁעִים֙ ... וַ/חֲמֵ֥שׁ מֵאֹ֖ת שָׁנָ֑ה
  english_pob_choice: five hundred and ninety-five years
  chosen_spanish: quinientos noventa y cinco años
  alternatives_spanish:
  - quinientos y noventa y cinco años
  - noventa y cinco años y quinientos años
  lexicon: HALOT
  rationale: El hebreo suma 95 + 500 años; en español se expresa de forma natural como una sola cifra compuesta, manteniendo el total sin alterar el sentido.
- source_word: שָׁנָ֔ה / שָׁנָ֑ה
  english_pob_choice: years
  chosen_spanish: años
  alternatives_spanish:
  - año
  lexicon: HALOT
  rationale: Aunque el hebreo use la forma singular tras numerales, el sentido en español es plural en este contexto.
- source_word: וַ/יּ֥וֹלֶד
  english_pob_choice: he fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - engendró hijos
  - tuvo
  lexicon: HALOT
  rationale: Se conserva el verbo genealógico y su fuerza paternal específica; «engendró» es el equivalente más directo y solemne en español.
- source_word: בָּנִ֖ים וּ/בָנֽוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - niños y niñas
  - descendencia
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente descendencia masculina y femenina; «hijos e hijas» lo comunica de manera clara y natural en español sin neutralizar la distinción.
translation_notes:
  revision_awareness: La redacción española sigue la lectura consolidada del auditorio inglés, que reordenó la cláusula temporal por claridad sin cambiar el valor del hebreo. Se mantiene el orden natural del español con la duración antes del complemento temporal, preservando la fórmula genealógica.
  spanish_consistency_notes:
  - Se usa «engendrar» para el verbo genealógico paterno de ילד, en continuidad con el valor lexical del auditorio inglés.
  - Se usa «hijos e hijas» para reflejar la duplicación explícita del hebreo y evitar la generalización a «hijos».
  - Se emplea «Lamec» como forma española estándar del nombre propio, coherente con el registro bíblico en español.
