translation:
  language: es
  text: entonces, que mi esposa muela para otro hombre[a], y que otros hombres se arrodillen sobre ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «que otros hombres se acuesten con ella»; «se arrodillen sobre ella» probablemente es un eufemismo sexual en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּטְחַן
  english_pob_choice: grind
  chosen_spanish: muela
  alternatives_spanish:
  - trabaje moliendo
  - sea molida para otro
  lexicon: HALOT
  rationale: טחן significa literalmente «moler»; en este juramento/auto-maldición conviene conservar la imagen concreta del trabajo de molino sin resolverla en una paráfrasis.
- source_word: לְאַחֵר
  english_pob_choice: for another man
  chosen_spanish: para otro hombre
  alternatives_spanish:
  - para otro
  - para alguien más
  lexicon: HALOT
  rationale: אַחֵר = «otro». En este contexto la referencia personal masculina está implicada por la mención de la esposa y el paralelismo con «otros hombres».
- source_word: אִשְׁתִּי
  english_pob_choice: my wife
  chosen_spanish: mi mujer
  alternatives_spanish:
  - mi esposa
  lexicon: HALOT
  rationale: El sentido contextual es «mi esposa». Se prefirió «mi mujer» porque en español mantiene con más naturalidad el registro relacional del hebreo sin perder claridad.
- source_word: וְעָלֶיהָ
  english_pob_choice: over her
  chosen_spanish: sobre ella
  alternatives_spanish:
  - encima de ella
  - por encima de ella
  lexicon: HALOT
  rationale: עַל con sufijo se conserva como «sobre» para mantener la imagen espacial y la posible carga humillante del gesto.
- source_word: יִכְרְעוּן
  english_pob_choice: kneel
  chosen_spanish: se inclinen
  alternatives_spanish:
  - se arrodillen
  - la posean
  lexicon: HALOT
  rationale: כּרע significa «doblarse, arrodillarse, inclinarse». En español «se inclinen» conserva la forma literal; la posible fuerza sexual queda documentada en la nota.
- source_word: אֲחֵרִין
  english_pob_choice: other men
  chosen_spanish: otros hombres
  alternatives_spanish:
  - los demás
  - otros
  lexicon: HALOT
  rationale: El plural masculino se hace explícito como «otros hombres» para evitar ambigüedad en español y reflejar el contraste con la esposa de Job.
theological_decisions:
- issue: Presencia de un eufemismo sexual probable en el paralelismo
  english_pob_reading: Maintain literal imagery in the main text and preserve the sexual implication in a footnote.
  chosen_spanish_reading: Mantener la imagen literal en el texto principal y explicar en nota que podría implicar un eufemismo sexual.
  alternative_spanish_readings:
  - que mi mujer se acueste con otro hombre, y que otros hombres se acuesten con ella
  - que mi mujer sea de otro hombre, y que otros hombres la posean
  rationale: El hebreo usa verbos concretos («moler» / «inclinarse») que en este contexto probablemente funcionan de manera eufemística. Para respetar la tensión documental, el texto principal no la explicita; la nota preserva la lectura probable sin imponerla como si fuera inequívoca.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con la revisión más reciente: no se requieren cambios respecto del análisis auditado; se mantiene la equivalencia óptima y la nota sobre el eufemismo probable.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto general, pero este versículo no contiene el nombre divino.
  - Se conserva el paralelo verbal concreto («muela» / «se inclinen») para reflejar la imagen hebrea sin suavizarla.
  - «Mi mujer» se usa como equivalente natural de אִשְׁתִּי en este contexto poético, sin perder el sentido de esposa.
  - La nota a marca la ambigüedad semántica documentada en el audit trail y evita sobrerresolver el eufemismo.
