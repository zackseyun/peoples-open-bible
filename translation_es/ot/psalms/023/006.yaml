translation:
  language: es
  text: Ciertamente, el bien y el amor constante me perseguirán[a] todos los días de mi vida, y habitaré[b] en la casa de Yahvé por longitud de días[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «me seguirán». El verbo hebreo es más vívido: presenta el bien y el amor constante de Dios como yendo tras el salmista con iniciativa activa.'
    reason: lexical_alternative
  - marker: b
    text: O «volveré». La puntuación masorética favorece «habitaré», pero «volveré» es una alternativa antigua y relevante.
    reason: alternative_reading
  - marker: c
    text: O «para siempre». La expresión hebrea dice literalmente «por longitud de días», un modismo de duración continua o prolongada.
    reason: alternative_reading
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Solo
  - Sin duda
  - Ciertamente
  lexicon: HALOT
  rationale: La partícula introduce una afirmación confiada y conclusiva, no restricción. «Ciertamente» comunica bien esa seguridad en español natural y digno.
- source_word: טוֹב
  english_pob_choice: goodness
  chosen_spanish: el bien
  alternatives_spanish:
  - la bondad
  - el bien
  - lo bueno
  lexicon: HALOT
  rationale: En paralelo con חֶסֶד, el sustantivo expresa beneficio/bienestar otorgado por Dios. «El bien» conserva el valor abstracto y la amplitud semántica sin reducirlo a una cualidad moral genérica.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: la fidelidad
  alternatives_spanish:
  - la misericordia
  - el amor constante
  - la lealtad pactal
  lexicon: HALOT
  rationale: En este contexto poético, חֶסֶד combina amor leal, favor constante y compromiso de pacto. «Fidelidad» capta la idea de lealtad perseverante en español claro, aunque ninguna sola palabra agota el término.
- source_word: יִרְדְּפוּנִי
  english_pob_choice: will pursue me
  chosen_spanish: me perseguirán
  alternatives_spanish:
  - me seguirán
  - me irán tras
  - me perseguirán
  lexicon: HALOT
  rationale: 'El verbo hebreo es fuerte: perseguir, ir tras con impulso. «Me perseguirán» conserva la imagen vívida de una persecución invertida, donde el bien de Dios va tras el salmista.'
- source_word: כָּל יְמֵי חַיָּי
  english_pob_choice: all the days of my life
  chosen_spanish: todos los días de mi vida
  alternatives_spanish:
  - durante toda mi vida
  - todos mis días
  lexicon: HALOT
  rationale: Es la equivalencia idiomática más natural y completa en español, manteniendo tanto la totalidad temporal como la referencia personal.
- source_word: וְשַׁבְתִּי
  english_pob_choice: I will dwell
  chosen_spanish: habitaré
  alternatives_spanish:
  - dormiré
  - volveré
  - residiré
  lexicon: HALOT
  rationale: Aunque la tradición de traducción también conoce «volveré», la forma masorética apoya el sentido de ישׁב, «habitar». «Habitaré» suena natural y conserva la permanencia en la casa de Yahvé.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en la casa del Señor
  - en la casa de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé», conforme al criterio editorial del proyecto, y se conserva la imagen concreta de la casa como lugar de presencia y comunión.
- source_word: לְאֹרֶךְ יָמִים
  english_pob_choice: for length of days
  chosen_spanish: por largo tiempo
  alternatives_spanish:
  - para larga duración
  - para siempre
  - por طول de días
  lexicon: HALOT
  rationale: El hebreo es idiomático y literalmente dice «para longitud de días». «Por largo tiempo» transmite la duración prolongada sin resolverla demasiado pronto en «para siempre».
theological_decisions:
- issue: Duración de לְאֹרֶךְ יָמִים
  english_pob_reading: for length of days
  chosen_spanish_reading: por largo tiempo
  alternative_spanish_readings:
  - para siempre
  - por muchos días
  rationale: La expresión puede sugerir duración extensa o, interpretativamente, perpetuidad. Se conserva una formulación abierta para no eliminar la tensión poética entre una duración prolongada y una posible lectura de permanencia indefinida.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Tono activo de יִרְדְּפוּנִי
  english_pob_reading: will pursue me
  chosen_spanish_reading: me perseguirán
  alternative_spanish_readings:
  - me seguirán
  - me acompañarán
  rationale: La imagen no es meramente de acompañamiento, sino de acción decidida que invierte la expectativa de amenaza. Mantener «perseguirán» preserva esa fuerza retórica y teológica.
  doctrine_reference: Translation philosophy §2 (Preserve source imagery and force)
- issue: Sentido de וְשַׁבְתִּי
  english_pob_reading: I will dwell
  chosen_spanish_reading: habitaré
  alternative_spanish_readings:
  - volveré
  - me quedaré
  rationale: Se sigue el apoyo masorético para el sentido de permanencia en la casa de Yahvé. La alternativa «volveré» queda implícitamente reconocida como tradición de traducción, pero no se adopta en el texto principal.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo masorético y el audit trail inglés: mantiene la fuerza de יִרְדְּפוּנִי con «perseguirán», conserva el nombre divino como Yahvé, y deja abierta la duración de לְאֹרֶךְ יָמִים sin cerrarla excesivamente. No se aplicaron revisiones adicionales tras el último pase, que quedó sin cambios.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme a la política del proyecto.
  - Se eligió «habitaré» para וְשַׁבְתִּי por coherencia con el sentido masorético de permanencia.
  - «El bien y la fidelidad» mantiene el paralelismo poético y evita suavizar el verbo fuerte «perseguirán».
  - Las notas al pie conservan alternativas relevantes sin deshacer la lectura principal.
