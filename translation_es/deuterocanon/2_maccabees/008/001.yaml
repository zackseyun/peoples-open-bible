revisions:
- from: Pero Judas[a], el que también era llamado Macabeo, y los que con él se infiltraban en secreto en las aldeas, iban llamando a sus parientes; y, recibiendo a los que habían permanecido en el judaísmo, reunían como unos seis mil.
  to: Pero Judas, también llamado Macabeo, y los que estaban con él, entrando furtivamente en las aldeas sin ser notados, iban llamando a sus parientes; y, recibiendo a los que habían permanecido en el judaísmo[a], llegaron a reunir unos seis mil.
  rationale: La revisión corrige el anclaje de la nota al término correcto («judaísmo»), suaviza «se infiltraban» a una formulación más fiel al matiz de movimiento sigiloso del griego, y mejora la naturalidad de la cláusula final con «llegaron a reunir unos seis mil». También simplifica la identificación de Judas/Macabeo en un español más fluido sin perder precisión.
  reviewer_model: gpt-5.4
