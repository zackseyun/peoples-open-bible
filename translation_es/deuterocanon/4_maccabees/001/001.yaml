revisions:
- from: Puesto que estoy a punto de presentar un argumento muy filosófico —si la razón piadosa es dueña absoluta[a] de las pasiones—, con justicia les aconsejaría que presten atención fervorosa a la filosofía.
  to: Puesto que estoy a punto de demostrar un argumento muy filosófico —si la razón piadosa es dueña absoluta[a] de las pasiones—, con razón les aconsejaría que presten esmerada atención a la filosofía.
  rationale: Se ajusta 'presentar' a 'demostrar' para reflejar mejor ἐπιδείκνυσθαι y la decisión POB; 'con justicia' a 'con razón' para ὀρθῶς; y 'atención fervorosa' a 'esmerada atención' para un español más natural y más cercano a προθύμως προσέχητε. Se conserva 'razón piadosa', 'pasiones' y el énfasis de dominio pleno de αὐτόδεσποτός.
