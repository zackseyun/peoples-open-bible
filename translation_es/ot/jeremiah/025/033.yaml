    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «sobre la faz del suelo».'
    reason: lexical_alternative
  revision_rationale: Se corrigió la apertura para evitar un calco no idiomático («habrá los muertos») y expresar naturalmente el futuro/resultado del hebreo. Se reemplazó «los muertos de Yahvé» por «las víctimas de Yahvé» para preservar mejor la fuerza judicial de חַלְלֵי יְהוָה en español claro. También se ajustó la colocación de la nota literal para que ancle correctamente a «sobre la superficie del suelo», y se mejoró la redacción de la nota alternativa sobre la agencia divina.
