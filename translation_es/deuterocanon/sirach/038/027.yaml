translation:
  language: es
  text: Así también todo artesano y planificador[a], que se afana de noche como de día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es breve: «todo artesano y planificador». El paralelo griego amplía la escena con un constructor o maestro artesano, y con grabadores que perseveran sin dormir para terminar la obra. El texto principal sigue de cerca al hebreo, mientras la nota reconoce la ampliación explicativa del griego.'
    reason: alternative_reading
lexical_decisions:
- source_word: אף
  english_pob_choice: So too
  chosen_spanish: Así también
  alternatives_spanish:
  - también así
  - de igual modo
  - así mismo
  lexicon: HALOT
  rationale: El hebreo אף introduce continuidad comparativa. «Así también» conserva ese enlace y suena natural en español formal.
- source_word: עשה חרש
  english_pob_choice: craftsman
  chosen_spanish: artesano
  alternatives_spanish:
  - obrero
  - oficial
  - artífice
  lexicon: HALOT
  rationale: La combinación hebrea es compacta y alude a un trabajador hábil en oficio manual. «Artesano» reproduce bien esa amplitud sin estrecharlo a un oficio específico.
- source_word: וחשב
  english_pob_choice: planner
  chosen_spanish: planificador
  alternatives_spanish:
  - diseñador
  - maestro de obras
  - proyectista
  lexicon: HALOT
  rationale: El POB en inglés pasó de «designer» a «planner» para reflejar mejor la idea de quien concibe o planifica. «Planificador» conserva esa fuerza devisoria en un español claro y formal.
- source_word: לילה כיום
  english_pob_choice: by night as by day
  chosen_spanish: de noche como de día
  alternatives_spanish:
  - por la noche como de día
  - noche y día
  - de noche igual que de día
  lexicon: HALOT
  rationale: La expresión idiomática hebrea comunica esfuerzo continuo. «De noche como de día» preserva el paralelismo y la idea de labor constante sin añadir matices ajenos.
- source_word: יגיע
  english_pob_choice: labors
  chosen_spanish: trabaja
  alternatives_spanish:
  - se afana
  - toma trabajo
  - labora
  lexicon: HALOT
  rationale: El verbo expresa trabajo intenso, pero en español la frase completa queda más fluida con «trabaja». El contexto ya transmite la fatiga y constancia implícitas.
translation_notes:
  revision_awareness: El borrador sigue la decisión revisada del POB inglés de traducir וחשב como idea de planificación, no como un mero «diseñador». También conserva la prioridad del hebreo conciso, con una nota que deja visible la expansión interpretativa del griego.
  spanish_consistency_notes:
  - Se emplea «artesano» para חרש y «planificador» para וחשב, manteniendo la distinción conceptual sin cargar el verso con tecnicismos modernos.
  - La frase temporal «de noche como de día» reproduce el paralelismo hebreo de forma idiomática y lectura pública.
  - No se introduce terminología eclesiástica innecesaria; el registro permanece sobrio y accesible.
