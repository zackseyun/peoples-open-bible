translation:
  language: es
  text: 'Entonces Saúl dijo: «He pecado. Vuelve, mi hijo David, porque no te haré daño otra vez, ya que mi vida[a] tuvo valor ante tus ojos en este día. Mira, he obrado neciamente y me he desviado muchísimo[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi alma fue preciosa ante tus ojos». Aquí נֶפֶשׁ se refiere a la vida o persona de Saúl en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y he errado mucho».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָטָאתִי
  english_pob_choice: I have sinned
  chosen_spanish: He pecado
  alternatives_spanish:
  - Yo pequé
  lexicon: HALOT
  rationale: El perfecto hebreo expresa confesión inmediata; en español, el pretérito perfecto compuesto transmite bien la admisión vigente sin sonar forzado.
- source_word: שׁוּב
  english_pob_choice: Return
  chosen_spanish: Vuélvete
  alternatives_spanish:
  - Regresa
  - Vuelve
  lexicon: HALOT
  rationale: El imperativo de שוב pide un giro o retorno; «vuélvete» conserva ese movimiento verbal directo con tono solemne y bíblico.
- source_word: בְּנִי דָוִד
  english_pob_choice: my son David
  chosen_spanish: David, hijo mío
  alternatives_spanish:
  - mi hijo David
  - hijo mío, David
  lexicon: HALOT
  rationale: El vocativo combina parentesco y nombre. En español, poner el nombre primero suena más natural y mantiene el valor afectivo y retórico del apelativo.
- source_word: לֹא אָרַע לְךָ עוֹד
  english_pob_choice: I will not do you harm again
  chosen_spanish: no te haré daño otra vez
  alternatives_spanish:
  - no te haré mal otra vez
  - no te dañaré de nuevo
  lexicon: HALOT
  rationale: El verbo comunica causar daño/evil a alguien; «hacer daño» es la forma idiomática y fiel en español, y «otra vez» reproduce el valor de עוֹד en contexto.
- source_word: תַּחַת אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: ya que
  alternatives_spanish:
  - porque
  - puesto que
  lexicon: HALOT
  rationale: La construcción introduce la razón de la promesa de Saúl. «Ya que» da la causalidad con naturalidad y mantiene el registro narrativo formal.
- source_word: יָקְרָה נַפְשִׁי בְּעֵינֶיךָ
  english_pob_choice: my life was precious in your eyes
  chosen_spanish: mi vida fue preciosa a tus ojos
  alternatives_spanish:
  - mi alma fue preciosa a tus ojos
  - mi vida fue valiosa a tus ojos
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí designa la vida o persona de Saúl en el contexto narrativo; «vida» evita importar una antropología ajena al pasaje. «Preciosa a tus ojos» preserva el hebraísmo sin endurecerlo.
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: this day
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - en este día
  lexicon: HALOT
  rationale: El sintagma solemne puede expresarse con «hoy» en español sin pérdida de sentido, y fluye mejor en el discurso directo.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: El marcador discursivo llama la atención sobre la conclusión de Saúl; «Mira» es natural en español moderno y conserva la función retórica.
- source_word: הִסְכַּלְתִּי
  english_pob_choice: I have acted foolishly
  chosen_spanish: he obrado neciamente
  alternatives_spanish:
  - he actuado neciamente
  - he sido necio
  lexicon: HALOT
  rationale: El verbo en contexto describe conducta insensata, no solo falta de inteligencia; «he obrado neciamente» mantiene el matiz de acción culpable.
- source_word: וָאֶשְׁגֶּה הַרְבֵּה מְאֹד
  english_pob_choice: and have gone very far astray
  chosen_spanish: y me he extraviado mucho
  alternatives_spanish:
  - y he errado mucho
  - y me he desviado muchísimo
  lexicon: HALOT
  rationale: שגה expresa errar o extraviarse. «Me he extraviado mucho» conserva el sentido de desviación grave; el intensificador hebreo se refleja con «mucho» en un español sobrio.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en la confesión de Saúl
  english_pob_reading: Rendered as 'my life' rather than 'my soul'
  chosen_spanish_reading: «mi vida» en vez de «mi alma»
  alternative_spanish_readings:
  - mi alma fue preciosa a tus ojos
  - mi persona fue preciosa a tus ojos
  rationale: En el contexto narrativo, David ha preservado la vida de Saúl; el hebreo נֶפֶשׁ se refiere aquí a la vida concreta de Saúl, no a una afirmación doctrinal sobre el alma. Traducir «vida» sigue la evidencia contextual y evita sobrecargar el pasaje.
  doctrine_reference: Principio de primacía del idioma original sobre la tradición de traducción; no importar afirmaciones doctrinales que el texto no exige.
translation_notes:
  revision_awareness: 'La redacción sigue el último pasaje revisado del audit trail inglés: conserva «do you harm again» como «no te haré daño otra vez» y refleja el intensificador final con «me he extraviado mucho», evitando debilitarlos. También mantiene la alternativa lexical sobre נֶפֶשׁ y שגה en notas breves y publicables.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «vida» para נֶפֶשׁ por el contexto narrativo inmediato, en coherencia con el criterio POB.
  - Se evitó «SEÑOR» y se mantuvo un registro bíblico moderno sin arcaísmos innecesarios.
  - «Vuélvete» conserva el imperativo hebreo de retorno sin añadir matices no presentes en el original.
  - La puntuación y el vocativo buscan una lectura natural en español de uso eclesial amplio.
