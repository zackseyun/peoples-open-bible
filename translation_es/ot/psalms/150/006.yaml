revisions:
- from: Que todo lo que respira alabe a Yah[a]. ¡Alaben a Yah!
  to: Todo lo que tiene aliento alabe a Yah. ¡Alaben a Yah[a]!
  rationale: Se reubica la nota al imperativo final, que es donde corresponde la alternativa «¡Aleluya!». Se ajusta «lo que respira» a «lo que tiene aliento» para reflejar mejor נְשָׁמָה y conservar una imagen más cercana al hebreo sin perder naturalidad en español. Se elimina el «Que» inicial para una línea más directa y poética.
