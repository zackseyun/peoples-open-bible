translation:
  language: es
  text: 'Su madre le dijo: «Tu maldición sea sobre mí, hijo mío. Solo escucha mi voz[a], y ve y tráemelos[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «escucha mi voz», un modismo que también puede significar «obedéceme».'
    reason: lexical_alternative
  - marker: b
    text: El objeto «los» está implícito por el verso anterior y se refiere a los cabritos.
    reason: cross_reference
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  - le respondió
  lexicon: HALOT
  rationale: En narración bíblica, el verbo de decir se vierte naturalmente como «le dijo»; conserva la relación interpersonal y evita una construcción rígida.
- source_word: אִמּוֹ
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - la madre de él
  - su mamá
  lexicon: HALOT
  rationale: «Su madre» reproduce con naturalidad el sujeto con sufijo posesivo y mantiene el registro digno del relato.
- source_word: עָלַי
  english_pob_choice: on me
  chosen_spanish: sobre mí
  alternatives_spanish:
  - en mí
  - encima de mí
  lexicon: HALOT
  rationale: La preposición expresa que la maldición recaiga o se cargue sobre la hablante; «sobre mí» conserva esa fuerza mejor que un giro más interpretativo.
- source_word: קִלְלָתְךָ
  english_pob_choice: your curse
  chosen_spanish: tu maldición
  alternatives_spanish:
  - la maldición que te corresponda
  - tu maldecir
  lexicon: HALOT
  rationale: El sustantivo con sufijo de 2ms se entiende como la maldición que pudiera venir sobre Jacob; «tu maldición» mantiene el vínculo morfológico directo sin explicitar más de lo que el hebreo dice.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijito mío
  lexicon: HALOT
  rationale: El vocativo con sufijo se vierte de modo natural y afectivo como «hijo mío».
- source_word: אַךְ
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solamente
  - Pero
  lexicon: HALOT
  rationale: Aquí marca restricción y énfasis; «Solo» comunica bien la limitación exhortativa del hebreo.
- source_word: שְׁמַע בְּקֹלִי
  english_pob_choice: listen to my voice
  chosen_spanish: escucha mi voz
  alternatives_spanish:
  - obedece mi voz
  - escúchame
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y puede implicar obediencia; se conserva la imagen de «voz» en español para no perder la textura del original, mientras el contexto deja claro el sentido exhortativo.
- source_word: וְלֵךְ
  english_pob_choice: and go
  chosen_spanish: y ve
  alternatives_spanish:
  - y anda
  - y marcha
  lexicon: HALOT
  rationale: Imperativo breve y secuencial; «y ve» es la forma más natural y fiel en español.
- source_word: קַח לִי
  english_pob_choice: get them for me
  chosen_spanish: tráemelos
  alternatives_spanish:
  - tómalos para mí
  - consíguemelos
  lexicon: HALOT
  rationale: El objeto está implícito por el verso anterior; en español, para que el mandato suene natural y claro, se explicita mediante el pronombre enclítico «-los». «Tráemelos» conserva la dinámica del encargo sin añadir interpretación doctrinal.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo y el expediente inglés: mantiene la fórmula idiomática «escucha mi voz» en el cuerpo del texto, explicando en nota su posible sentido de obediencia; además, explicita en español el objeto implícito de «tráemelos» para evitar ambigüedad y reflejar el antecedente inmediato del versículo previo. No se añadieron decisiones teológicas porque el pasaje es narrativo y no presenta variantes doctrinales relevantes.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantiene un registro bíblico contemporáneo y digno, sin arcaísmos innecesarios.
  - Se usa «voz» en lugar de sustituir directamente por «obedece» para preservar el modismo hebreo documentado.
  - 'La relación posesiva y vocativa se mantiene con formas naturales del español: «su madre», «hijo mío».'
