review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo y del POB inglés: פקד se entiende correctamente como contar/enumerar; נשיאי העדה como dirigentes comunitarios; y las expresiones genealógicas se conservan. Sin embargo, hay un problema léxico importante en «los hijos de los coatitas»: el hebreo singular gentilicio הַקְּהָתִי significa «el coatita / de Coat», y el propio rastro inglés lo explica como «sons of the Kohathite», es decir, el grupo descendiente de Coat. En español, «hijos de los coatitas» sugiere una generación adicional y resulta menos fiel que «los hijos de Coat» o simplemente «los coatitas».'
  spanish_quality_summary: El español es claro y digno, pero «Así que» suena más consecutivo/colloquial de lo necesario para un simple wayyiqtol narrativo; «Entonces» o nada sería más natural. «Los hijos de los coatitas» es además torpe en español bíblico y menos inteligible que una forma más directa. El resto —«líderes de la congregación», «por sus clanes», «casas paternas»— es legible y adecuado.
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto. La única desalineación relevante es la formulación de בְּנֵי הַקְּהָתִי: conviene evitar «hijos de los coatitas» y usar una forma que refleje mejor el origen en Coat. «Casas paternas» preserva correctamente el tecnicismo kinship de בית אבות.'
  issues:
  - severity: high
    issue: «los hijos de los coatitas» distorsiona la relación genealógica de בְּנֵי הַקְּהָתִי
    rationale: El hebreo no dice «hijos de los coatitas» como una segunda generación de coatitas, sino literalmente «hijos del coatita / de Coat», es decir, los descendientes o clan de Coat. En español, la forma actual introduce una capa genealógica extra y suena poco natural.
  - severity: medium
    issue: «Así que» no refleja tan bien el flujo narrativo simple
    rationale: La partícula española añade un matiz consecutivo o inferencial que el hebreo no exige aquí. «Entonces» o una oración directa narrativa es más fiel y natural.
  - severity: low
    issue: La nota [b] reproduce la misma imprecisión del texto principal
    rationale: Al decir «hijos del coatita ... grupo/clan coatita descendiente de Coat», la explicación es cercana, pero conviene alinear nota y texto principal con una formulación inequívoca en español.
  revised_spanish_text: Entonces Moisés, Aarón y los líderes de la congregación contaron a los hijos de Coat[a][b], por sus clanes y por sus casas paternas[c].
