id: 2SA.14.3
reference: 2 Samuel 14:3
source:
  edition: WLC
  text: וּ/בָאת֙ אֶל הַ/מֶּ֔לֶךְ וְ/דִבַּ֥רְתְּ אֵלָ֖י/ו כַּ/דָּבָ֣ר הַ/זֶּ֑ה וַ/יָּ֧שֶׂם יוֹאָ֛ב אֶת הַ/דְּבָרִ֖ים בְּ/פִֽי/הָ־־׃
translation:
  text: Then go to the king and speak to him in this way[a]. And Joab put the words in her mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'put the words in her mouth' is an idiom meaning that Joab supplied her with the exact speech to say.
    reason: cultural_note
lexical_decisions:
- source_word: וּבָאת
  chosen: Then go
  alternatives:
  - And you shall come
  - And go
  lexicon: HALOT
  rationale: 'Qal perfect 2fs with prefixed conjunction in instructional sequence functions imperativally/futuristically: Joab is telling the woman what to do next. ''Then go'' gives natural English sequence while preserving the directive force addressed to a woman.'
- source_word: אֶל־הַמֶּלֶךְ
  chosen: to the king
  alternatives:
  - before the king
  lexicon: HALOT
  rationale: אֶל marks motion toward; 'to the king' is the plain sense. 'Before the king' is possible in courtly context but less direct than the Hebrew here.
- source_word: וְדִבַּרְתְּ אֵלָיו
  chosen: and speak to him
  alternatives:
  - and you shall speak to him
  - and tell him
  lexicon: HALOT
  rationale: דבר with אֶל commonly means 'speak to.' 'Tell him' would be slightly more interpretive; 'speak to him' stays closer to the source while remaining idiomatic.
- source_word: כַּדָּבָר הַזֶּה
  chosen: like this
  alternatives:
  - according to this word
  - in this manner
  lexicon: HALOT
  rationale: The phrase introduces the manner/content of the speech Joab is scripting. 'Like this' is concise modern English that captures the demonstrative force without woodenly rendering דָבָר as 'word'.
- source_word: וַיָּשֶׂם
  chosen: put
  alternatives:
  - placed
  - set
  lexicon: HALOT
  rationale: שׂים literally means 'put/set/place.' In this idiom with 'words' and 'mouth,' 'put' is the standard and clearest English rendering.
- source_word: אֶת־הַדְּבָרִים
  chosen: the words
  alternatives:
  - these words
  - the matter
  lexicon: HALOT
  rationale: Plural דְּבָרִים here refers to the specific speech Joab supplied. 'The words' preserves the concrete wording better than the more abstract 'the matter.'
- source_word: בְּפִיהָ
  chosen: in her mouth
  alternatives:
  - on her lips
  lexicon: HALOT
  rationale: This is a Hebrew idiom for supplying someone with what to say. 'In her mouth' preserves the vivid idiom and is understandable in English, especially in biblical narrative.
