translation:
  language: es
  text: Y todos los actos de su poder y de su poderío, y la narración completa de la grandeza de Mardoqueo, a quien el rey engrandeció, ¿no están escritos en el libro de las crónicas[a] de los reyes de Media y Persia?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el libro de los anales de los reyes de Media y Persia'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲשֵׂה
  english_pob_choice: acts
  chosen_spanish: actos
  alternatives_spanish:
  - hechos
  - obras
  lexicon: HALOT
  rationale: En este contexto de registro histórico-cortesano, 'actos' comunica bien una serie de acciones registradas oficialmente. 'Hechos' también es posible, pero 'actos' conserva mejor el tono narrativo formal.
- source_word: תָקְפּוֹ
  english_pob_choice: his power
  chosen_spanish: su poder
  alternatives_spanish:
  - su autoridad
  - su fuerza
  lexicon: HALOT
  rationale: El sustantivo puede abarcar vigor, fuerza efectiva o poder. 'Poder' es la opción más natural en español para la capacidad real de actuar del rey, sin reducirlo a fuerza física.
- source_word: גְבוּרָתוֹ
  english_pob_choice: might
  chosen_spanish: su valentía
  alternatives_spanish:
  - su bravura
  - su fuerza
  lexicon: HALOT
  rationale: Dado que el término añade intensidad y vigor al paralelo con 'poder', 'valentía' preserva el matiz de energía/potencia heroica. No se trata aquí de coraje moral en sentido moderno, pero sí de una palabra española de registro elevado que evita la simple repetición de 'poder'.
- source_word: וּפָרָשַׁת
  english_pob_choice: the full account
  chosen_spanish: la narración completa
  alternatives_spanish:
  - el relato completo
  - la exposición detallada
  lexicon: HALOT
  rationale: La palabra apunta a una exposición desarrollada, no solo a una mención breve. 'Narración completa' transmite bien la idea de un informe extendido y formal.
- source_word: גְּדֻלַּת מָרְדֳּכַי
  english_pob_choice: the greatness of Mordecai
  chosen_spanish: la grandeza de Mardoqueo
  alternatives_spanish:
  - la exaltación de Mardoqueo
  - la elevación de Mardoqueo
  lexicon: HALOT
  rationale: El sustantivo expresa grandeza o alta condición. 'Grandeza' conserva el enlace directo con el hebreo y la dignidad del ascenso de Mardoqueo.
- source_word: אֲשֶׁר גִּדְּל֖וֹ הַמֶּלֶךְ
  english_pob_choice: to which the king raised him
  chosen_spanish: a quien el rey engrandeció
  alternatives_spanish:
  - a quien el rey elevó
  - a quien el rey promovió
  lexicon: HALOT
  rationale: El verbo en piel significa hacer grande, engrandecer, elevar en honor o rango. 'Engrandeció' es la opción más fiel y directa en español bíblico contemporáneo.
- source_word: הֲלוֹא הֵם כְּתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: ¿No están escritos?
  alternatives_spanish:
  - ¿Acaso no están escritos?
  - ¿No fueron escritos?
  lexicon: HALOT
  rationale: La forma retórica negativa-interrogativa se conserva con naturalidad en español. Se mantiene el tono de apelación a un registro documental conocido.
- source_word: סֵפֶר דִּבְרֵי הַיָּמִים
  english_pob_choice: the Book of the Chronicles
  chosen_spanish: el libro de las crónicas
  alternatives_spanish:
  - el libro de los anales
  - el libro de los registros
  lexicon: HALOT
  rationale: '''Crónicas'' es la equivalencia tradicional y clara para este tipo de registro oficial. ''Anales'' se preserva como alternativa válida, pero ''crónicas'' es más reconocible para lectores bíblicos en español.'
- source_word: לְמַלְכֵי מָדַי וּפָרָס
  english_pob_choice: of the Kings of Media and Persia
  chosen_spanish: de los reyes de Media y de Persia
  alternatives_spanish:
  - para los reyes de Media y Persia
  - de los reyes medo-persas
  lexicon: HALOT
  rationale: La fórmula apunta al ámbito histórico de esos monarcas y sus anales. 'De los reyes de Media y de Persia' es la construcción más transparente y formal en español.
theological_decisions:
- issue: El retrato del rey y el eco de archivo histórico oficial
  english_pob_reading: The verse presents a courtly historical summary and rhetorical question without theological embellishment.
  chosen_spanish_reading: Se conserva como una afirmación histórica y cortesana, sin añadir interpretación devocional.
  alternative_spanish_readings:
  - con tono más interpretativo o homilético
  rationale: El texto no introduce enseñanza doctrinal directa; por eso la traducción debe mantener su carácter documental. La pregunta retórica se deja intacta para reflejar el valor de autoridad del registro histórico.
  doctrine_reference: Narrativa histórica bíblica; no hay afirmación doctrinal explícita en el versículo.
translation_notes:
  revision_awareness: La versión inglesa auditada presenta alta concordancia y no muestra revisiones aplicadas; por ello la redacción española sigue de cerca las decisiones léxicas establecidas, manteniendo el paralelismo entre 'poder' y 'valentía' y el cierre documental sobre el libro de las crónicas.
  spanish_consistency_notes:
  - Se conserva 'Mardoqueo' para el nombre propio, conforme al uso bíblico en español.
  - Se usa 'Media y de Persia' con repetición de la preposición para fluidez natural y fidelidad a la fórmula hebrea.
  - La pregunta retórica final mantiene el énfasis documental del hebreo y del inglés auditado.
