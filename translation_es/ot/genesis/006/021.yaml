translation:
  language: es
  text: Y tú[a], toma para ti de toda clase de alimento que sea comestible, y reúnelo contigo; y será alimento para ti y para ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que pueda comerse». La cláusula relativa hebrea puede entenderse como una descripción de alimentos aptos para ser consumidos.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח
  english_pob_choice: take
  chosen_spanish: toma
  alternatives_spanish:
  - recibe
  - lleva
  lexicon: HALOT
  rationale: El imperativo de לקח pide una orden directa; «toma» conserva esa inmediatez y no introduce matices de obtención o traslado que el contexto no exige.
- source_word: לְךָ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti mismo
  - para tu propio uso
  lexicon: HALOT
  rationale: El dativo tras el imperativo expresa aquí beneficio o referencia personal. «Para ti» es natural en español y mantiene la responsabilidad de Noé sin sonar recargado.
- source_word: מִכָּל מַאֲכָל
  english_pob_choice: some of every kind of food
  chosen_spanish: de todo alimento
  alternatives_spanish:
  - de cada clase de alimento
  - de toda clase de alimento
  lexicon: HALOT
  rationale: La combinación מִן + כָּל con מַאֲכָל comunica la amplitud del abastecimiento. «De todo alimento» preserva la cobertura total sin forzar una lectura de literalidad absoluta que en español sería torpe.
- source_word: מַאֲכָל
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - provisión
  lexicon: HALOT
  rationale: El sustantivo designa lo que se come. «Alimento» es un equivalente digno y amplio en español bíblico contemporáneo.
- source_word: אֲשֶׁר יֵאָכֵל
  english_pob_choice: that is edible
  chosen_spanish: que sea comestible
  alternatives_spanish:
  - que pueda comerse
  - que es comestible
  lexicon: HALOT
  rationale: La relativa con נִפְעַל de אכל señala aptitud para ser comido. «Que sea comestible» transmite bien esa cualidad y evita el eco procesual de «que es comido».
- source_word: וְאָסַפְתָּ אֵלֶיךָ
  english_pob_choice: and gather it to yourself
  chosen_spanish: y júntalo contigo
  alternatives_spanish:
  - y recógelo contigo
  - y guárdalo contigo
  lexicon: HALOT
  rationale: אָסַף significa reunir/juntar. «Júntalo contigo» conserva la idea de reunir los víveres cerca de Noé y refleja el movimiento implícito de אֵלֶיךָ sin introducir almacenamiento no explicitado.
- source_word: וְהָיָה
  english_pob_choice: and it shall be
  chosen_spanish: y será
  alternatives_spanish:
  - y llegará a ser
  - y estará
  lexicon: HALOT
  rationale: El valor consecutivo-resultativo pide una forma futura natural en español. «Será» mantiene el enlace lógico con lo anterior y la sobriedad del hebreo.
- source_word: לְךָ וְלָהֶם
  english_pob_choice: for you and for them
  chosen_spanish: para ti y para ellos
  alternatives_spanish:
  - para ti y para los animales
  - para ti y para éstos
  lexicon: HALOT
  rationale: La repetición de la preposición se conserva para distinguir claramente a Noé de los demás seres vivientes mencionados en el contexto.
- source_word: לְאָכְלָה
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - para comer
  - para consumo
  lexicon: HALOT
  rationale: Aunque literalmente apunta a «para comer», en español «alimento» expresa con naturalidad la función final del suministro y evita una perífrasis pesada.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del texto inglés que ajustó la cláusula relativa para expresar aptitud de consumo; en español se resolvió con «que sea comestible», manteniendo la alternativa explicativa en nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el Tetragrámaton.
  - Se evitó «Cristo»/«Mesías» porque no corresponde al pasaje.
  - Se mantuvo un registro bíblico moderno y claro, sin arcaísmos innecesarios.
  - La nota [a] está anclada explícitamente en «comestible» para cumplir la disciplina de marcadores.
