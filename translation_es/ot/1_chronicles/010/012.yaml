    text: Or 'under the terebinth.' The Hebrew אֵלָה can refer to a large tree of the terebinth/oak type.
    reason: lexical_alternative
  - marker: b
    text: The broader narrative identifies the location as Jabesh-gilead; here the Hebrew text abbreviates it to 'Jabesh.'
    reason: cross_reference
