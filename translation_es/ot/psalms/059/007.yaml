translation:
  language: es
  text: Vuelven al atardecer; gruñen[a] como perros y andan por la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aúllan». El verbo hebreo puede denotar un ruido fuerte semejante al de un animal; aquí se elige «gruñen» para mantener la imagen amenazante.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשׁוּבוּ
  english_pob_choice: they return
  chosen_spanish: vuelven
  alternatives_spanish:
  - regresan
  - vuelven de nuevo
  - retornan
  lexicon: HALOT
  rationale: El verbo hebreo שוב expresa volver o regresar. «Vuelven» conserva el sentido básico, es natural en español y mantiene la repetición del movimiento descrito en el verso.
- source_word: לָעֶרֶב
  english_pob_choice: at evening
  chosen_spanish: al atardecer
  alternatives_spanish:
  - por la tarde
  - en la tarde
  - al caer la tarde
  lexicon: HALOT
  rationale: La partícula temporal con ערב señala el momento del día. «Al atardecer» comunica bien el valor temporal y encaja con el cuadro poético de actividad nocturna.
- source_word: יֶהֱמוּ
  english_pob_choice: they growl
  chosen_spanish: gruñen
  alternatives_spanish:
  - aúllan
  - emiten un bramido
  - hacen un ruido fuerte
  lexicon: HALOT
  rationale: El verbo המה puede denotar un ruido fuerte, animal o amenazante. «Gruñen» preserva la imagen canina y la carga hostil sin exagerar hacia un sentido más específico como «aúllan».
- source_word: כַּכָּלֶב
  english_pob_choice: like dogs
  chosen_spanish: como perros
  alternatives_spanish:
  - como un perro
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular genérico, en español el plural es más natural para concordar con el sujeto plural y conservar la imagen colectiva de una jauría o grupo de perros.
- source_word: וִיסוֹבְבוּ
  english_pob_choice: go around the city
  chosen_spanish: rodean
  alternatives_spanish:
  - andan alrededor
  - recorren
  - merodean
  lexicon: HALOT
  rationale: El verbo סבב significa ir alrededor o dar vueltas. «Rodean» expresa con fidelidad la acción circular y resulta más idiomático que una frase más literal pero más pesada.
- source_word: עִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - una ciudad
  lexicon: HALOT
  rationale: Aunque el hebreo no lleva artículo, el contexto poético apunta a una ciudad concreta. En español, «la ciudad» es la forma más natural y fiel al referente del texto.
translation_notes:
  revision_awareness: 'El auditable inglés POB pasó de «like a dog» a «like dogs» por concordancia con el sujeto plural, y luego de «prowl around» a «go around» para evitar añadir matiz interpretativo. El español sigue esa línea: usa plural («como perros») por naturalidad y un verbo neutro («rodean») sin intensificar innecesariamente el movimiento.'
  spanish_consistency_notes:
  - Se mantiene el registro poético y directo, sin arcaísmos innecesarios.
  - No se introduce una nota de variante porque el verso no requiere resolver una tensión textual adicional en español.
  - «Atardecer» respeta el valor temporal de לָעֶרֶב y evita sobretraducirlo como una hora exacta.
