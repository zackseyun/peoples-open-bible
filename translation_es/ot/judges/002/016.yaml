review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: «Yahvé» por יְהוָה, «levantó» por וַיָּקֶם, «jueces» por שֹׁפְטִים, y «de la mano de los que los saqueaban» preserva adecuadamente מִיַּד שֹׁסֵיהֶם. La única desviación material frente al rastro auditado en inglés está en וַיּוֹשִׁיעוּם: el inglés principal eligió «they saved them», dejando «delivered» como alternativa en nota. El español invierte esa relación al poner «los libraron» en texto principal y «los salvaron» en nota.'
  spanish_quality_summary: 'El español es claro y digno, pero la nota [a] es impropia: convierte «Yahvé» en una alternativa de sí mismo y no aporta información útil. Además, para alinear mejor con la decisión léxica principal del POB, conviene usar «los salvaron» en el texto y dejar «los libraron» como alternativa en nota. El resto de la redacción suena natural y fiel.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Yahvé» preserva correctamente el Tetragrámaton; «jueces» mantiene la terminología del libro; «saqueaban» conserva el matiz de despojo violento. La corrección necesaria es ajustar ישׁע para que el texto principal siga la elección auditada «saved» → «salvaron», con «libraron» como nota alternativa.'
  issues:
  - severity: medium
    issue: La elección principal para וַיּוֹשִׁיעוּם no sigue la decisión auditada del POB en inglés.
    rationale: El inglés principal tiene «they saved them» y la alternativa en nota es «they delivered them». El borrador español pone «los libraron» en texto y «los salvaron» en nota, invirtiendo la jerarquía documentada sin razón contextual fuerte.
  - severity: medium
    issue: La nota [a] sobre «Yahvé» es redundante e incorrecta.
    rationale: La nota dice «O «Yahvé»», pero el texto principal ya tiene «Yahvé». No preserva una alternativa real ni responde a una ambigüedad del español.
  revised_spanish_text: Entonces Yahvé levantó jueces, y ellos los salvaron[a] de la mano de los que los saqueaban.
  revised_footnotes:
  - marker: a
    text: O «los libraron».
    reason: lexical_alternative
  revision_rationale: Se elimina la nota redundante sobre «Yahvé» y se ajusta וַיּוֹשִׁיעוּם para que el texto principal refleje la elección auditada del POB («saved them» → «los salvaron»), dejando «los libraron» como alternativa léxica válida en nota. El resto del versículo se mantiene por su fidelidad al hebreo y su buena legibilidad en español.
