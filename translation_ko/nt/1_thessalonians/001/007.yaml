id: 1TH.1.7
reference: 1 Thessalonians 1:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὥστε γενέσθαι ὑμᾶς ⸀τύπον πᾶσιν τοῖς πιστεύουσιν ἐν τῇ Μακεδονίᾳ καὶ ⸀ἐν τῇ Ἀχαΐᾳ.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/001/007.yaml
  text: so that you became an example to all the believers in Macedonia and in Achaia[a].
  footnotes:
  - marker: a
    text: Or "a model" or "a pattern."
    reason: lexical_alternative
translation:
  language: ko
  text: 그리하여 여러분은 마게도냐와 아가야에 있는 모든 믿는 이들에게 본보기[a]가 되었습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「본」, 「모범」, 「전형」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: so that
  chosen_korean: 그리하여
  alternatives_korean:
  - 그래서
  - 그 결과
  lexicon: BDAG
  rationale: 결과 절을 이끄는 접속사. 합쇼체 산문에서 「그리하여」가 자연스러우면서도 결과의 흐름을 분명히 한다.
- source_word: γενέσθαι ... τύπον
  english_pob_choice: became an example
  chosen_korean: 본보기가 되었습니다
  alternatives_korean:
  - 본이 되었습니다
  - 모범이 되었습니다
  lexicon: BDAG
  rationale: τύπος는 따를 만한 본·모범. 「본보기」가 가장 일상적이며 분명한 한국어 등가어. 「본」은 더 짧지만 다의어로 모호할 수 있다.
- source_word: πᾶσιν τοῖς πιστεύουσιν
  english_pob_choice: to all the believers
  chosen_korean: 모든 믿는 이들에게
  alternatives_korean:
  - 모든 신자들에게
  - 믿는 모든 이들에게
  lexicon: BDAG
  rationale: 분사가 명사화된 표현. 「믿는 이들」이 「신자」보다 본문의 분사적 현재성(믿고 있는)을 더 잘 담는다.
- source_word: ἐν τῇ Μακεδονίᾳ
  english_pob_choice: in Macedonia
  chosen_korean: 마게도냐에 있는
  alternatives_korean:
  - 마케도니아에 있는
  lexicon: BDAG
  rationale: 한국 교회 전통의 지명 「마게도냐」를 채택한다. 한국어 성경 독자에게 가장 친숙한 형태이다.
- source_word: ἐν τῇ Ἀχαΐᾳ
  english_pob_choice: in Achaia
  chosen_korean: 아가야에
  alternatives_korean:
  - 아카이아에
  lexicon: BDAG
  rationale: 한국 교회 전통의 지명 「아가야」를 채택한다.
