translation:
  language: es
  text: el milano[a], y el halcón según su especie,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación precisa de estas aves es incierta; alternativamente, la primera puede traducirse «buitre» y la segunda «milano».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּאָה
  english_pob_choice: the kite
  chosen_spanish: la milana
  alternatives_spanish:
  - el milano
  - el buitre
  lexicon: HALOT
  rationale: El hebreo nombra un ave rapaz de identificación incierta. En español, «milana» comunica mejor que un tecnicismo zoológico la idea de un ave de presa común en listas de aves inmundas, y mantiene la incertidumbre señalada por la POB inglesa. «Buitre» es posible, pero menos probable en este contexto; «milano» es también viable, aunque «milana» evita una sonoridad demasiado localista en algunos registros.
- source_word: הָאַיָּה
  english_pob_choice: the falcon
  chosen_spanish: el halcón
  alternatives_spanish:
  - la milana
  - el milano
  lexicon: HALOT
  rationale: אַיָּה designa un ave rapaz. «Halcón» conserva el sentido general y distingue esta ave de la primera, siguiendo la decisión inglesa de mantener dos nombres distintos dentro del campo semántico de aves de presa.
- source_word: לְמִינָהּ
  english_pob_choice: according to its kind
  chosen_spanish: según su especie
  alternatives_spanish:
  - conforme a su especie
  - según su clase
  lexicon: HALOT
  rationale: La expresión hebrea clasifica al animal dentro de su tipo. «Según su especie» es una forma natural y fiel en español, y preserva la fuerza taxonómica de לְמִינָהּ mejor que una paráfrasis más libre.
- source_word: וְאֶת ... וְאֶת
  english_pob_choice: the ... and the ...
  chosen_spanish: la ... y el ...
  alternatives_spanish:
  - la ... y la ...
  - el ... y el ...
  lexicon: función sintáctica del marcador de objeto directo
  rationale: El hebreo usa el marcador de objeto directo y la coordinación del listado; en español no se traduce de manera explícita. Se refleja con artículo definido y conjunción dentro de una enumeración natural.
translation_notes:
  revision_awareness: 'El pasaje coincide en sustancia con la revisión más reciente del POB en inglés: no hubo cambios textuales relevantes, y la incertidumbre zoológica permanece sin resolver de forma definitiva. La traducción española conserva esa tensión lexical con una nota alternativa.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y legible para lectores generales.
  - Se conserva la incertidumbre taxonómica sin forzar una identificación moderna cerrada.
  - «Según su especie» reproduce de manera natural el valor clasificatorio de לְמִינָהּ.
