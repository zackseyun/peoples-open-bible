  text: גַּ֛ם כִּֽי יִתְנ֥וּ בַ/גּוֹיִ֖ם עַתָּ֣ה אֲקַבְּצֵ֑/ם וַ/יָּחֵ֣לּוּ מְּעָ֔ט מִ/מַּשָּׂ֖א מֶ֥לֶךְ שָׂרִֽים־׃
base_translation:
  language: en
  yaml_path: translation/ot/hosea/008/010.yaml
  text: Even though they hire among the nations[a], now I will gather them[c][b]; and they will begin to be diminished because of the burden of the king and princes.
  footnotes:
  - marker: a
    text: Or 'Even though they give among the nations'; the Hebrew likely carries the sense of paying or hiring foreign allies in context.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of 'and they will begin to diminish' is difficult; alternatives include 'and they will writhe a little' or 'and they will become few because of the burden/tribute.'
    reason: alternative_reading
  - marker: c
    text: '''The burden of the king of princes'' may refer to the oppressive tribute imposed by an imperial overlord.'
    reason: cultural_note
