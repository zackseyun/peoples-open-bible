review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura imprecatoria del hebreo, mantiene la lista de males de la casa de Joab y en general sigue de cerca tanto la evidencia fuente como la auditoría inglesa. Sin embargo, hay dos problemas de alineación: el marcador [a] está anclado en ‘padre’ aunque la nota corresponde a ‘leproso’, y ‘sea cortado de la casa de Joab’ suena menos natural en español que una formulación más idiomática que preserve el valor de כרת sin perder claridad.'
  spanish_quality_summary: El español es mayormente claro, digno y legible. ‘Caiga sobre la cabeza de Joab’ funciona bien. ‘Quien tenga una secreción’ es comprensible aunque algo clínico; no requiere cambio. La mejora principal es reubicar la nota y suavizar ligeramente la sintaxis de ‘nunca sea cortado de la casa de Joab’ a una forma más natural sin sacrificar la fuerza de la maldición.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé o Mesías. Las decisiones léxicas principales son adecuadas: ‘leproso’ con nota aclaratoria, ‘pan’ para לָחֶם, y una formulación con ‘bastón’ para מַחֲזִיק בַּפֶּלֶךְ, preservando en nota la alternativa ‘huso’.'
  issues:
  - severity: high
    issue: El marcador de nota [a] está colocado en ‘su padre’ pero la nota explica ‘leproso’.
    rationale: 'Esto rompe la disciplina requerida de notas: cada marcador debe aparecer exactamente en la palabra o frase pertinente. Aquí induce al lector a pensar que la nota comenta ‘casa de su padre’, cuando en realidad trata מְצֹרָע.'
  - severity: medium
    issue: ‘Nunca sea cortado de la casa de Joab’ es literal pero poco natural en español.
    rationale: La fórmula hebrea debe conservar la fuerza de ‘cut off’, pero en español suena más claro ‘que nunca falte de la casa de Joab...’ o una estructura equivalente. En este contexto la negación expresa que tales aflicciones nunca cesen en la casa de Joab.
  - severity: low
    issue: La nota b da primero la alternativa y luego la lectura del texto principal.
    rationale: No es incorrecto, pero conviene que la nota deje claro que ‘huso’ es la alternativa y que ‘bastón’ es la decisión textual principal anclada en el texto.
  revised_spanish_text: Caiga sobre la cabeza de Joab y sobre toda la casa de su padre; y que nunca falte de la casa de Joab quien tenga una secreción, o sea leproso[a], o se apoye en un bastón[b], o caiga a espada, o carezca de pan.
  revised_footnotes:
