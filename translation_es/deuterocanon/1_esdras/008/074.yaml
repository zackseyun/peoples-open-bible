translation:
  language: es
  text: Y por causa de nuestros pecados y de los pecados de nuestros padres[a], fuimos entregados, junto con nuestros hermanos, nuestros reyes y nuestros sacerdotes, a los reyes de la tierra[b], a la espada, al cautiverio y al saqueo[c], en vergüenza, hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por nuestros pecados y los pecados de nuestros padres». El griego διά con acusativo expresa causa; ambas formulaciones conservan esa relación causal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a los reyes del país». El griego γῆ puede significar «tierra» o «país»; aquí se mantiene «tierra» como giro más amplio para gobernantes terrenales extranjeros.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «al pillaje» o «al despojo» para «al saqueo». El término griego señala ser entregados al botín.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τὰς ἁμαρτίας ἡμῶν καὶ τῶν πατέρων ἡμῶν
  english_pob_choice: because of our sins and the sins of our fathers
  chosen_spanish: por causa de nuestros pecados y de los pecados de nuestros padres
  alternatives_spanish:
  - a causa de nuestros pecados y de los pecados de nuestros padres
  - por nuestros pecados y los pecados de nuestros padres
  lexicon: BDAG
  rationale: διά con acusativo expresa causa. «Por causa de» preserva el valor causal de forma natural en español y mantiene explícita la relación con los pecados propios y ancestrales.
- source_word: παρεδόθημεν
  english_pob_choice: we were handed over
  chosen_spanish: fuimos entregados
  alternatives_spanish:
  - fuimos entregados en manos de
  - fuimos entregados a
  lexicon: BDAG
  rationale: El pasivo de παραδίδωμι indica quedar bajo el poder de otro. «Fuimos entregados» es claro y conserva el peso judicial/covenantal sin suavizarlo.
- source_word: σὺν τοῖς ἀδελφοῖς ἡμῶν
  english_pob_choice: together with our brothers
  chosen_spanish: junto con nuestros hermanos
  alternatives_spanish:
  - con nuestros hermanos
  - junto con nuestros hermanos y parientes
  lexicon: BDAG
  rationale: ἀδελφοί se refiere literalmente a hermanos; en este lamento nacional puede abarcar al pueblo en general, pero «hermanos» conserva la forma del texto y el vínculo comunitario.
- source_word: σὺν τοῖς βασιλεῦσιν ἡμῶν καὶ σὺν τοῖς ἱερεῦσιν ἡμῶν
  english_pob_choice: our kings, and our priests
  chosen_spanish: nuestros reyes y nuestros sacerdotes
  alternatives_spanish:
  - nuestros reyes y nuestros sacerdotes
  - junto con nuestros reyes y junto con nuestros sacerdotes
  lexicon: BDAG
  rationale: Tras «junto con» la primera vez, el español coordina con naturalidad los otros miembros de la serie. Se mantiene el paralelo entre el pueblo, la realeza y el sacerdocio.
- source_word: τοῖς βασιλεῦσιν τῆς γῆς
  english_pob_choice: to the kings of the earth
  chosen_spanish: a los reyes de la tierra
  alternatives_spanish:
  - a los reyes de la tierra
  - a los reyes del país
  lexicon: BDAG
  rationale: γῆ puede significar «tierra» o «país». Aquí el contraste con reyes extranjeros y el marco de juicio favorecen «tierra», que reproduce bien el giro bíblico de alcance general sin perder el sentido de gobernantes humanos.
- source_word: εἰς ῥομφαίαν
  english_pob_choice: to the sword
  chosen_spanish: a la espada
  alternatives_spanish:
  - a la espada
  - para la espada
  lexicon: BDAG
  rationale: ῥομφαία designa una espada, y en fórmulas de juicio la expresión idiomática en español es «a la espada», que comunica muerte violenta o guerra.
- source_word: αἰχμαλωσίαν
  english_pob_choice: captivity
  chosen_spanish: al cautiverio
  alternatives_spanish:
  - a la cautividad
  - al cautiverio
  lexicon: BDAG
  rationale: El término expresa ser llevado preso. «Cautiverio» es el equivalente más natural y mantiene la secuencia triádica con espada y saqueo.
- source_word: προνομὴν
  english_pob_choice: plundering
  chosen_spanish: al saqueo
  alternatives_spanish:
  - al pillaje
  - al despojo
  lexicon: LSJ
  rationale: El sustantivo indica ser entregados al pillaje. «Saqueo» transmite con precisión la acción/resultante y es idiomático en español bíblico sin volverse arcaizante.
- source_word: μετὰ αἰσχύνης
  english_pob_choice: with shame
  chosen_spanish: con vergüenza
  alternatives_spanish:
  - con vergüenza
  - con deshonra
  lexicon: BDAG
  rationale: αἰσχύνη implica vergüenza o deshonra. «Con vergüenza» conserva la humillación moral y social de manera directa; «deshonra» es posible pero algo más interpretativa.
- source_word: μέχρι τῆς σήμερον ἡμέρας
  english_pob_choice: to this present day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta este día
  - hasta hoy
  lexicon: BDAG
  rationale: El modismo marca continuidad hasta el presente. «Hasta el día de hoy» es natural en español y preserva el valor de persistencia temporal.
theological_decisions:
- issue: Culpa corporativa y generacional
  english_pob_reading: Retain 'our sins and the sins of our fathers' as a straightforward statement of communal and ancestral culpability.
  chosen_spanish_reading: Mantener «nuestros pecados y de los pecados de nuestros padres» como afirmación directa de culpa comunitaria y ancestral.
  alternative_spanish_readings:
  - «nuestros pecados y los de nuestros antepasados»
  - «nuestros pecados y los pecados de quienes nos precedieron»
  rationale: El griego nombra explícitamente tanto los pecados de la comunidad actual como los de los padres. La traducción debe conservar esa lógica de solidaridad pactual sin suavizarla ni resolverla artificialmente.
  doctrine_reference: Preservar la tensión teológica en vez de armonizarla.
translation_notes:
  revision_awareness: La versión anterior falló porque los marcadores de nota [a] y [b] no estaban insertados en el texto español. Esta revisión los ancla explícitamente en «padres[a]» y «saqueo[b]», conservando además el contenido lexical previamente documentado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto no porque aparezca en este versículo, sino para coherencia terminológica general del corpus.
  - «Fuimos entregados» conserva el pasivo de παραδίδωμι sin convertirlo en una explicación interpretativa.
  - La serie «espada, cautiverio y saqueo» refleja la enumeración triádica del griego sin añadir elementos.
  - «Reyes de la tierra» sigue la lectura amplia de γῆ como en la auditoría inglesa; en español es la opción más natural y fiel al giro bíblico.
