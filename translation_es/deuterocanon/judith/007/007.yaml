translation:
  language: es
  text: Y él inspeccionó las subidas de su ciudad[a], y tomó control de las fuentes de agua[b] y se apoderó de ellas, y apostó junto a ellas campamentos de hombres de guerra; y él mismo volvió a su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los ascensos» o «los caminos de subida» a su ciudad. El griego destaca las rutas cuesta arriba que conducen a la ciudad.
    reason: lexical_alternative
  - marker: b
    text: El verbo griego es raro; también puede entenderse como «aseguró» o «bloqueó» las fuentes de agua.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεσκέψατο
  english_pob_choice: inspected
  chosen_spanish: inspeccionó
  alternatives_spanish:
  - examinó
  - revisó
  - observó
  lexicon: LSJ
  rationale: En este contexto militar, el verbo expresa una revisión estratégica de las vías de acceso a la ciudad; 'inspeccionó' conserva el sentido de reconocimiento táctico sin sugerir una visita cordial.
- source_word: ἀναβάσεις
  english_pob_choice: approaches to
  chosen_spanish: subidas
  alternatives_spanish:
  - ascensos
  - accesos en subida
  - caminos de subida
  lexicon: LSJ
  rationale: Literalmente son 'ascensos' o subidas; en español, 'subidas' conserva la imagen topográfica y el movimiento ascendente hacia la ciudad. La nota recoge la alternativa interpretativa de los accesos.
- source_word: τὰς πηγὰς τῶν ὑδάτων
  english_pob_choice: the springs of water
  chosen_spanish: las fuentes de agua
  alternatives_spanish:
  - los manantiales
  - las fuentes
  - los manantiales de agua
  lexicon: LSJ
  rationale: '''Fuentes de agua'' comunica la referencia concreta a los puntos de abastecimiento, sin perder la idea de manantiales naturales que son objetivo militar.'
- source_word: ἐφώδευεν
  english_pob_choice: took control of
  chosen_spanish: ocupó
  alternatives_spanish:
  - aseguró
  - bloqueó
  - guardó
  lexicon: LSJ
  rationale: El verbo es raro y, en combinación con la acción siguiente, indica control militar del lugar. 'Ocupó' expresa esa toma de posesión estratégica sin insinuar una fortificación literal.
- source_word: προκατέλαβε
  english_pob_choice: seized
  chosen_spanish: ocupó
  alternatives_spanish:
  - tomó posesión de
  - capturó
  - se apoderó de
  lexicon: LSJ
  rationale: El compuesto indica tomar por adelantado o adueñarse estratégicamente; en español, 'ocupó' mantiene el matiz militar y evita duplicar excesivamente la idea de 'seized'.
- source_word: ἐπέστησεν
  english_pob_choice: stationed
  chosen_spanish: puso
  alternatives_spanish:
  - apostó
  - colocó
  - estableció
  lexicon: LSJ
  rationale: En contexto militar, el verbo se usa para colocar tropas en un lugar. 'Puso' con el complemento concreto 'campamentos' resulta natural y fiel.
- source_word: παρεμβολὰς
  english_pob_choice: camps
  chosen_spanish: campamentos
  alternatives_spanish:
  - acamapamientos
  - campamentos militares
  - trincheras
  lexicon: LSJ
  rationale: '''Campamentos'' conserva la idea de presencia militar organizada junto a las fuentes; es más claro en español que un calco más técnico.'
- source_word: ἀνδρῶν πολεμιστῶν
  english_pob_choice: fighting men
  chosen_spanish: hombres guerreros
  alternatives_spanish:
  - hombres de guerra
  - soldados
  - guerreros
  lexicon: LSJ
  rationale: La frase subraya que son hombres combatientes. 'Hombres guerreros' conserva la doble idea de masculinidad y beligerancia, evitando suavizar el término a un equivalente más genérico.
- source_word: ἀνέζευξεν
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - se retiró
  - levantó el campamento y volvió
  - marchó de regreso
  lexicon: LSJ
  rationale: El verbo puede sugerir también levantar el campamento o retirarse. 'Volvió' transmite el movimiento final de regreso a su pueblo con naturalidad; la ambigüedad se mantiene en la nota.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que prefirió 'approaches to their city' y evitó una traducción demasiado literal de un supuesto 'fortify'. Por eso el español no añade fortificación literal, sino control/ocupación estratégica de las fuentes y las subidas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo requiera; aquí no aparece.
  - Se preserva un registro narrativo sobrio y militar, sin añadir matices devocionales inexistentes.
  - '''Hombres guerreros'' se usa de forma consistente con el valor explícito del griego ἀνδρῶν πολεμιστῶν.'
