translation:
  language: es
  text: Comeréis grasa hasta saciaros[a], y beberéis sangre hasta la embriaguez, de mi sacrificio, el cual he sacrificado para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de mi banquete sacrificial que he preparado para ustedes». El hebreo usa lenguaje sacrificial de manera literal («mi sacrificio... he sacrificado»), mientras que el contexto más amplio deja claro que se trata de un banquete sobre los muertos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲכַלְתֶּם
  english_pob_choice: you will eat
  chosen_spanish: comeréis
  alternatives_spanish:
  - y comeréis
  - comerán
  lexicon: HALOT
  rationale: El perfecto conversivo en discurso profético se entiende naturalmente como futuro. «Comeréis» conserva la segunda persona plural dirigida a los convocados del contexto y suena idiomático en español.
- source_word: חֵלֶב
  english_pob_choice: fat
  chosen_spanish: grasa
  alternatives_spanish:
  - sebo
  - materia grasa
  lexicon: HALOT
  rationale: El término básico es «grasa». En español suena más natural que «sebo» y mantiene la imagen sacrificial sin introducir una especificación innecesaria en el texto principal.
- source_word: לְשָׂבְעָה
  english_pob_choice: until you are full
  chosen_spanish: hasta saciaros
  alternatives_spanish:
  - hasta quedar satisfechos
  - hasta la saciedad
  lexicon: HALOT
  rationale: La forma expresa resultado o alcance. «Hasta saciaros» conserva la idea de plenitud/saciedad en una construcción breve y natural para español bíblico moderno.
- source_word: וּשְׁתִיתֶם
  english_pob_choice: and you will drink
  chosen_spanish: y beberéis
  alternatives_spanish:
  - y beberán
  - y tomaréis
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la primera cláusula y la misma segunda persona plural profética. «Beberéis» es la equivalencia directa y clara.
- source_word: דָּם
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - la sangre
  lexicon: HALOT
  rationale: Equivalente léxico directo. Se conserva el carácter chocante de la imagen sacrificial y de juicio.
- source_word: לְשִׁכָּרוֹן
  english_pob_choice: to drunkenness
  chosen_spanish: hasta la embriaguez
  alternatives_spanish:
  - para embriaguez
  - hasta emborracharos
  lexicon: HALOT
  rationale: El sustantivo denota embriaguez/intoxicación. «Hasta la embriaguez» mantiene el valor nominal y el paralelismo con «hasta saciaros», a la vez que suena natural en español.
- source_word: מִזִּבְחִי
  english_pob_choice: from my sacrifice
  chosen_spanish: de mi sacrificio
  alternatives_spanish:
  - de mi ofrenda
  - de mi banquete sacrificial
  lexicon: HALOT
  rationale: El sustantivo con sufijo de primera persona se traduce de manera directa como «mi sacrificio». «De» refleja la procedencia y preserva la formulación literal repetida en el hebreo.
- source_word: אֲשֶׁר זָבַחְתִּי לָכֶם
  english_pob_choice: that I have sacrificed for you
  chosen_spanish: que he sacrificado para vosotros
  alternatives_spanish:
  - que he inmolado para vosotros
  - que he preparado para vosotros como sacrificio
  lexicon: HALOT
  rationale: Se conserva la repetición deliberada del verbo זבח con «sacrificado». «Para vosotros» reproduce לָכֶם de modo directo y mantiene el sentido de beneficio/destinación en la imagen judicial.
theological_decisions:
- issue: Lenguaje sacrificial aplicado al juicio divino
  english_pob_reading: Retain explicit sacrificial language rather than softening to a feast interpretation in the main text.
  chosen_spanish_reading: 'Conservar el lenguaje sacrificial explícito: «de mi sacrificio que he sacrificado para vosotros».'
  alternative_spanish_readings:
  - de mi banquete sacrificial que he preparado para vosotros
  - de mi ofrenda que he preparado para vosotros
  rationale: El verso presenta la destrucción de los ejércitos bajo la metáfora de un sacrificio consumido por aves y bestias. Mantener la repetición de «sacrificio / sacrificado» conserva la fuerza teológica del juicio divino y la ironía del hebreo sin suavizarla.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «to drunkenness» por una formulación más natural; en español se resolvió con «hasta la embriaguez», que conserva el sustantivo abstracto y la fuerza de la imagen. El resto del texto mantiene la decisión auditada de conservar el lenguaje sacrificial literal en la cláusula final.
  spanish_consistency_notes:
  - Se empleó «vosotros» para reflejar la segunda persona plural del hebreo y mantener la concordancia interna con el sujeto plural implícito del versículo.
  - Se evitó «SEÑOR» o «Yahvé» porque este versículo no contiene el Tetragrámaton ni una referencia directa al nombre divino.
  - Se mantuvo una sintaxis breve y paralela para reflejar el hebreo y conservar el tono profético.
  - «Sacrificio / sacrificado» se dejó sin suavizar para no perder la tensión lexical-teológica documentada en el audit trail.
