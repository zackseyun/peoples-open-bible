revisions:
- from: 'En cuanto a mí[a], yo dije: «Oh Yahvé, sé benigno conmigo; sana mi alma, porque he pecado contra ti».'
  to: 'En cuanto a mí, dije: «Oh Yahvé, ten misericordia de mí; sana mi alma[a], porque he pecado contra ti».'
  rationale: Se corrige el anclaje de la nota para que coincida con «alma», se elimina la redundancia de «yo» tras «En cuanto a mí», y se reemplaza «sé benigno conmigo» por «ten misericordia de mí», una formulación más natural y eclesialmente inteligible para la súplica de חָנֵּנִי en este contexto penitencial.
