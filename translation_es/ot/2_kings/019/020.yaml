    issue: «has orado a mí» es un calco antinatural en español
    rationale: Aunque intenta reflejar אֵלַי, en español neutro y eclesial «orar a mí» no suena natural. Debe expresarse con una construcción idiomática que preserve que la oración fue dirigida a Dios.
  - severity: medium
    issue: La nota al pie no ofrece una alternativa real
    rationale: El texto de la nota repite esencialmente la misma redacción del cuerpo, por lo que no cumple función útil como alternativa lexical documentada.
