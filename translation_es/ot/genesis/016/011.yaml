review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja fielmente el sentido del hebreo: el ángel de Yahvé habla a Agar, anuncia su embarazo y el nacimiento de un hijo, ordena el nombre Ismael y da la razón: Yahvé ha oído su aflicción. También conserva correctamente «Yahvé» para יְהוָה y mantiene la alternativa léxica «mensajero».'
  spanish_quality_summary: 'La redacción es clara y digna, pero tiene dos detalles mejorables: «dijo[a] a ella» suena calcado y poco natural en español; y «llamarás su nombre Ismael» es demasiado literal y resulta poco idiomático. Una leve revisión produce un español más natural sin perder el patrón bíblico.'
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: יְהוָה → «Yahvé», מַלְאַךְ → «ángel» con nota «mensajero», עָנְיֵךְ → «aflicción». No hay conflicto doctrinal. Se recomienda ajustar solo la formulación idiomática de la frase de nombramiento.'
  issues:
  - severity: medium
    issue: Orden poco natural en «dijo[a] a ella»
    rationale: Aunque comprensible, el español bíblico-natural prefiere «le dijo[a]» o «dijo[a] a Agar» si se explicitara el referente. «A ella» después del verbo suena innecesariamente calcado del inglés/hebreo.
  - severity: medium
    issue: Fórmula de nombramiento «llamarás su nombre Ismael» suena forzada en español
    rationale: La estructura preserva el hebraísmo, pero en español actual y eclesial resulta más natural «le pondrás por nombre Ismael» o «llamarás a tu hijo Ismael». Dado el objetivo de español claro y digno, conviene una adaptación idiomática mínima.
  revised_spanish_text: 'Entonces el ángel de Yahvé le dijo[a]: «Mira, estás encinta y darás a luz un hijo, y le pondrás por nombre Ismael, porque Yahvé ha oído tu aflicción».'
