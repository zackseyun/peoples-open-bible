translation:
  language: es
  text: Moisés entregó el tributo[a], la contribución para Yahvé[b], a Eleazar el sacerdote, tal como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'gravamen' o 'impuesto' para la porción tasada tomada del botín.
    reason: lexical_alternative
  - marker: b
    text: O 'la ofrenda para Yahvé'; tradicionalmente, 'la ofrenda elevada de Yahvé'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: gave
  chosen_spanish: entregó
  alternatives_spanish:
  - dio
  - entregó
  lexicon: HALOT
  rationale: El verbo נתן en esta narrativa expresa una entrega efectiva de una porción apartada; en español, 'entregó' comunica mejor el paso formal de esa porción que un simple 'dio'.
- source_word: מֶכֶס
  english_pob_choice: tribute
  chosen_spanish: tributo
  alternatives_spanish:
  - levy
  - impuesto
  - cuota
  lexicon: HALOT
  rationale: En este contexto de botín de guerra, מֶכֶס designa una porción tasada o exigida del botín. 'Tributo' conserva la idea de porción obligada sin trasladarla a un sistema fiscal moderno.
- source_word: תְּרוּמַת יְהוָה
  english_pob_choice: the contribution for Yahweh
  chosen_spanish: la contribución para Yahvé
  alternatives_spanish:
  - la ofrenda para Yahvé
  - la contribución de Yahvé
  - la ofrenda elevada para Yahvé
  lexicon: HALOT
  rationale: תְּרוּמָה tiene el sentido de algo apartado o contribuido para uso sagrado. 'Contribución para Yahvé' mantiene el valor de porción dedicada y evita una terminología ritual más técnica de lo que el verso exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio en español como 'Yahvé', siguiendo la decisión del proyecto de no ocultar el Tetragrámaton con una sustitución titulativa.
- source_word: לְאֶלְעָזָר הַכֹּהֵן
  english_pob_choice: to Eleazar the priest
  chosen_spanish: a Eleazar el sacerdote
  alternatives_spanish:
  - al sacerdote Eleazar
  - a Eleazar, el sacerdote
  lexicon: HALOT
  rationale: 'La apposición hebrea se reproduce de forma directa y natural en español: ''Eleazar el sacerdote''. ''Sacerdote'' mantiene el término estándar sin ampliar el cargo más allá del texto.'
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת־מֹשֶׁה
  english_pob_choice: just as Yahweh had commanded Moses
  chosen_spanish: tal como Yahvé había mandado a Moisés
  alternatives_spanish:
  - como Yahvé había mandado a Moisés
  - justo como Yahvé había mandado a Moisés
  lexicon: HALOT
  rationale: '''Tal como'' expresa conformidad exacta con la orden previa. ''Había mandado'' reproduce con naturalidad el sentido retrospectivo del hebreo en narración.'
theological_decisions:
- issue: Representación del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente; por coherencia con la política del proyecto, se traslada como 'Yahvé' y no se sustituye por un título. Esto preserva el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
- issue: Función de תְּרוּמָה en este contexto
  english_pob_reading: the contribution for Yahweh
  chosen_spanish_reading: la contribución para Yahvé
  alternative_spanish_readings:
  - la ofrenda para Yahvé
  - la porción apartada para Yahvé
  rationale: Aunque תְּרוּמָה puede sonar sacrificial en otros contextos, aquí el auditorio recibe una porción apartada del botín. 'Contribución' conserva la tensión entre don sagrado y cuota asignada, sin imponer una lectura litúrgica no explicitada.
  doctrine_reference: HALOT; contexto de reparto del botín en Números 31
- issue: Naturaleza de מֶכֶס
  english_pob_reading: tribute
  chosen_spanish_reading: tributo
  alternative_spanish_readings:
  - tributo tasado
  - cuota
  - gravamen
  rationale: El término apunta a una porción tasada del botín, no a un impuesto civil moderno. 'Tributo' comunica esa obligación de entrega y permite mantener la ambigüedad útil entre impuesto, tasa o porción exigida.
  doctrine_reference: HALOT; contexto militar-administrativo de Números 31
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia entre el texto hebreo, la traducción inglesa auditada y la revisión posterior, sin cambios necesarios en el sentido básico. Se mantuvo la relación exacta entre el tributo del botín, la contribución consagrada a Yahvé y su entrega a Eleazar conforme al mandato divino.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera consistente para el Tetragrámaton.
  - '''Tributo'' se reservó para מֶכֶס como porción tasada del botín, evitando ''impuesto'' por anacronismo.'
  - '''Contribución'' conserva el matiz de algo apartado para uso sagrado sin convertirlo en término técnico de rito.'
  - '''Sacerdote'' reproduce la apposición del hebreo sin añadir explicaciones inexistentes en el verso.'
