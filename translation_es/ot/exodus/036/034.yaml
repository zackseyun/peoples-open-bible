translation:
  language: es
  text: Recubrió de oro los armazones[a], e hizo de oro sus anillos como alojamientos para las barras[b], y recubrió de oro las barras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tablas» o «planchas». El término hebreo designa los miembros estructurales de madera del tabernáculo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «casas para las barras», una expresión idiomática para los alojamientos o receptáculos de las barras.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְּרָשִׁים
  english_pob_choice: the frames
  chosen_spanish: los marcos
  alternatives_spanish:
  - las tablas
  - las planchas
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, קְרָשִׁים designa los miembros estructurales verticales. En español, «marcos» comunica mejor su función arquitectónica que «tablas», sin perder concreción ni añadir interpretación excesiva.
- source_word: צִפָּה / וַיְצַף
  english_pob_choice: overlaid
  chosen_spanish: recubrió
  alternatives_spanish:
  - cubrió
  - plaqueó
  lexicon: HALOT
  rationale: El verbo expresa la acción de aplicar una capa de oro sobre otra superficie. «Recubrió» transmite esa idea con naturalidad en español bíblico contemporáneo y evita el tecnicismo de «plaqueó».
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro puro
  lexicon: HALOT
  rationale: El término es material y directo. «Oro» conserva la repetición enfática del hebreo en las tres apariciones sin sobreespecificar la calidad del metal.
- source_word: טַבְּעֹתָם
  english_pob_choice: their rings
  chosen_spanish: sus anillos
  alternatives_spanish:
  - sus aros
  - sus sortijas
  lexicon: HALOT
  rationale: Aquí se trata de aros metálicos fijados a los marcos; «anillos» es el equivalente más claro y natural en español, sin usar «sortijas», que sería engañoso.
- source_word: עָשָׂה
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - formó
  lexicon: HALOT
  rationale: El verbo común «hacer» reproduce bien el valor simple de עשה. «Hizo» permite mantener la sobriedad del texto y coordina con la construcción siguiente.
- source_word: בָּתִּים
  english_pob_choice: holders
  chosen_spanish: soportes
  alternatives_spanish:
  - receptáculos
  - casquillos
  - sockets
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «casas», pero idiomáticamente se refiere a piezas que reciben o sostienen las barras. «Soportes» expresa la función con claridad sin falsificar la imagen técnica.
- source_word: לַבְּרִיחִם
  english_pob_choice: for the bars
  chosen_spanish: para las barras
  alternatives_spanish:
  - para los travesaños
  - para los pasadores
  lexicon: HALOT
  rationale: בְּרִיחִים son las barras transversales que unen la estructura. «Barras» es la traducción más estable y comprensible; «travesaños» sería posible, pero menos directa.
theological_decisions:
- issue: Terminología de construcción sagrada sin reescritura teológica
  english_pob_reading: A plain description of the tabernacle construction, with lexical precision and no added doctrinal gloss.
  chosen_spanish_reading: Una descripción sobria de la construcción del tabernáculo, manteniendo el léxico técnico sin añadir interpretación teológica.
  alternative_spanish_readings:
  - Una formulación más devocional o explicativa
  - Una paráfrasis que explicite el simbolismo
  rationale: El versículo enumera acciones de fabricación; el español debe conservar el carácter técnico y narrativo del hebreo. No se introduce simbolismo no presente en el texto.
  doctrine_reference: Éxodo 36:34; fidelidad descriptiva del texto narrativo
- issue: Imagen idiomática de בָּתִּים לַבְּרִיחִם
  english_pob_reading: Literally 'houses for the bars,' an idiom for holders or receptacles for the bars.
  chosen_spanish_reading: «soportes para las barras», conservando la función idiomática sin traducir de manera cruda «casas»
  alternative_spanish_readings:
  - «receptáculos para las barras»
  - «alojamientos para las barras»
  rationale: La frase hebrea es idiomática. En español, una traducción literal de «casas» sería oscura y poco natural; «soportes» conserva la idea funcional y respeta la evidencia del audit trail.
  doctrine_reference: Nota lexical sobre בָּתִּים en el aparato auditado
translation_notes:
  revision_awareness: El audit trail inglés muestra alta concordancia, sin revisiones aplicadas y sin cambios necesarios en la última pasada. La versión española sigue esa lectura estable, conservando el paralelismo del hebreo y la repetición de «oro» en cada miembro correspondiente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo exige; este versículo no lo contiene.
  - Se prefirió «marcos» para קְרָשִׁים siguiendo la función estructural del contexto del tabernáculo.
  - Se evitó «SEÑOR» y otras sustituciones interpretativas porque el versículo es puramente descriptivo.
  - «Anillos» y «barras» se usan como términos técnicos coherentes con la construcción del santuario.
  - La puntuación reproduce una sola oración compuesta, en paralelo con el hebreo y el inglés auditado.
