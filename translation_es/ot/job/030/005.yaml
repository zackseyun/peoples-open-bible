  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran medida la revisión inglesa auditada: mantiene el pasivo de יְגֹרָשׁוּ, deja implícito el sujeto de יָרִיעוּ, y conserva la comparación hostil con el ladrón. Sin embargo, «del medio» suena poco idiomático y además la nota b describe incorrectamente «gritan» como impersonal; en español sigue siendo un plural sin sujeto expreso, no un verbo impersonal. También conviene mejorar la fluidez de «como tras un ladrón».'
  spanish_quality_summary: La frase es comprensible, pero «Son expulsados del medio» resulta rígida y poco natural en español eclesial general. «Desde en medio» o «de en medio» comunica mejor la separación desde un interior/colectivo. «Gritan tras ellos» es aceptable, pero «como cuando se persigue a un ladrón» explicita mejor la comparación implícita sin distorsionar el sentido. La nota sobre el sujeto necesita corrección terminológica.
  glossary_alignment: 'No hay términos teológicos principales en juego. Las decisiones léxicas clave están razonablemente alineadas con el rastro POB: גֵּו se puede reflejar aquí como «en medio» con nota alternativa hacia «barranco/valle/hondonada»; יְגֹרָשׁוּ como «son expulsados»; עָלֵימוֹ con sentido hostil direccional; כַּגַּנָּב requiere una comparación idiomática en español.'
  issues:
