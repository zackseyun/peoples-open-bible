translation:
  text: And that they should circumcise their sons according to the covenant that was established with them[a], and that they should not turn aside from this, neither to the right nor to the left, from any path that the LORD commanded; and that we should keep ourselves from all fornication and uncleanness, and that we should put away from among us every act of fornication and uncleanness. And if a woman among you commits harlotry, or even a daughter, burn her with fire, and let them not commit fornication after their eyes and after their heart, and let them not take wives for themselves from the daughters of Canaan, for the seed of Canaan will be uprooted from the land. And he told them of the judgment of the Watchers[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'circumcise their sons according to the covenant' is contextually inferred from the Abrahamic covenant formula; the wording is compressed in this witness.
    reason: lexical_alternative
    anchor_ref: '20:2'
  - marker: a
    text: The command about a woman or daughter who commits harlotry is severe and legal in tone; the Ge'ez is explicit about burning with fire.
    reason: cultural_note
    anchor_ref: '20:2'
  - marker: a
    text: '''The judgment of the Watchers'' refers to the punishment of the rebellious heavenly beings known from Enochic tradition.'
    reason: cross_reference
    anchor_ref: '20:2'
  - marker: b
    text: Or 'destroyed'.
    reason: previous_rendering
  - marker: c
    text: Or ''.
    reason: previous_rendering
