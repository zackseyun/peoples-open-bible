translation:
  language: es
  text: Guardarán mis sábados y reverenciarán mi santuario[a]. Yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «temerán mi santuario». El verbo hebreo puede significar «temer» o «reverenciar»; aquí se refiere al debido respeto santo por el lugar sagrado de Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁבְּתֹתַי
  english_pob_choice: my Sabbaths
  chosen_spanish: mis días de reposo
  alternatives_spanish:
  - mis sábados
  - mis reposos sabáticos
  lexicon: HALOT
  rationale: El hebreo está en plural y se refiere a las observancias sabáticas de Yahvé. En español, «días de reposo» comunica la función cultual sin sonar técnico de más; «sábados» podría leerse como los días de la semana y perder el matiz ritual.
- source_word: תִּשְׁמֹרוּ
  english_pob_choice: you shall keep
  chosen_spanish: guardarán
  alternatives_spanish:
  - observarán
  - mantendrán
  lexicon: HALOT
  rationale: שׁמר puede significar guardar, observar o custodiar. «Guardar» conserva la idea de vigilancia y fidelidad pactal; en plural impersonal con sentido exhortativo suena natural en español bíblico actual.
- source_word: מִקְדָּשִׁי
  english_pob_choice: my sanctuary
  chosen_spanish: mi santuario
  alternatives_spanish:
  - mi lugar santo
  - mi santo lugar
  lexicon: HALOT
  rationale: מִקְדָּשׁ designa un espacio sagrado. «Santuario» es la equivalencia directa y natural en español, sin especificar indebidamente tabernáculo o templo.
- source_word: תִּירָאוּ
  english_pob_choice: revere
  chosen_spanish: reverenciarán
  alternatives_spanish:
  - temerán
  - sentirán temor reverente
  lexicon: HALOT
  rationale: ירא puede significar temer o reverenciar. Aquí el contexto es el respeto santo debido al lugar de la presencia divina; «reverenciar» preserva esa fuerza sin reducirla a miedo emocional.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», según la convención del proyecto, en vez de sustituirlo por un título. Esto mantiene visible la referencia personal del pacto.
- source_word: אֲנִי יְהוָה
  english_pob_choice: I am Yahweh / I am the LORD
  chosen_spanish: Yo soy Yahvé
  alternatives_spanish:
  - Yo, Yahvé
  - Yo soy el Señor
  lexicon: HALOT
  rationale: La fórmula funciona como autoidentificación enfática. En español, «Yo soy Yahvé» es breve, solemne y fiel al hebreo; evita ocultar el nombre propio tras un título.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el Señor
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se mantiene el nombre propio divino en español para reflejar la lectura POB y la transparencia frente al original, en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Sentido de ירא con el santuario
  english_pob_reading: revere my sanctuary
  chosen_spanish_reading: reverenciarán mi santuario
  alternative_spanish_readings:
  - temerán mi santuario
  - tendrán temor reverente de mi santuario
  rationale: En este contexto cultual, la orden apunta al debido respeto santo por el espacio consagrado a la presencia de Dios. «Reverenciar» expresa mejor esa relación que «temer», sin negar la posible amplitud semántica del verbo hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source tension without flattening it'
translation_notes:
  revision_awareness: Se comparó el hebreo masorético con el rastro auditado en inglés. No hubo revisiones aplicadas en el original inglés; la versión española sigue la misma lectura y conserva la tensión léxica de ירא mediante una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino conforme al estándar del proyecto.
  - «Santuario» conserva la terminología cultual establecida.
  - La nota explica la alternativa «temer» para no borrar la ambigüedad semántica del hebreo.
  - La formulación verbal en español se ajusta a un mandato general con valor jurídico/cultual.
