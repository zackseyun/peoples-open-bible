translation:
  language: es
  text: 'Y volviéndose hacia la mujer, dijo a Simón: «¿Ves a esta mujer? Entré en tu casa; no me diste agua para mis pies[a], pero ella mojó mis pies con sus lágrimas y los enjugó con su cabello».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «no me diste agua sobre mis pies». El sentido es la provisión acostumbrada de agua para lavarse los pies.
    reason: lexical_alternative
lexical_decisions:
- source_word: στραφεὶς
  english_pob_choice: turning toward
  chosen_spanish: volviéndose hacia
  alternatives_spanish:
  - habiéndose vuelto hacia
  - volviéndose
  lexicon: BDAG
  rationale: Participio aoristo que introduce la acción previa al dicho; en español, «volviéndose hacia» conserva el giro físico y suena natural en la narración.
- source_word: γυναῖκα
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - mujer aquí
  - señora
  lexicon: BDAG
  rationale: El contexto identifica a una mujer presente, no a una esposa; «mujer» es la equivalencia directa y común.
- source_word: ἔφη
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - estaba diciendo
  lexicon: BDAG
  rationale: Verbo narrativo simple y natural para reproducir el pasado del discurso en español.
- source_word: Βλέπεις
  english_pob_choice: Do you see
  chosen_spanish: ¿Ves
  alternatives_spanish:
  - ¿Notas
  - ¿Estás viendo
  lexicon: BDAG
  rationale: Mantiene la pregunta retórica directa al oyente; el presente interrogativo español reproduce bien la fuerza del griego.
- source_word: ταύτην τὴν γυναῖκα
  english_pob_choice: this woman
  chosen_spanish: a esta mujer
  alternatives_spanish:
  - a esta mujer aquí
  lexicon: BDAG
  rationale: Se conserva el demostrativo «esta» para marcar el contraste que Jesús está estableciendo.
- source_word: εἰσῆλθόν σου εἰς τὴν οἰκίαν
  english_pob_choice: I entered your house
  chosen_spanish: Entré en tu casa
  alternatives_spanish:
  - Entré en tu hogar
  - Entré a tu casa
  lexicon: BDAG
  rationale: «Casa» corresponde de manera directa a οἰκία y es natural en español; se mantiene el tiempo pasado narrativo.
- source_word: ὕδωρ μοι ἐπὶ πόδας οὐκ ἔδωκας
  english_pob_choice: you gave me no water for my feet
  chosen_spanish: no me diste agua para mis pies
  alternatives_spanish:
  - no me diste agua sobre mis pies
  - no me diste agua para lavar mis pies
  lexicon: BDAG
  rationale: Se conserva la mención explícita de «agua» sin sobreespecificar el acto de lavar, y «para mis pies» refleja la función práctica del agua.
- source_word: αὕτη δὲ
  english_pob_choice: but she
  chosen_spanish: pero ella
  alternatives_spanish:
  - y ella
  - sin embargo, ella
  lexicon: BDAG
  rationale: Marca el contraste con Simón de manera breve y natural.
- source_word: τοῖς δάκρυσιν ἔβρεξέν μου τοὺς πόδας
  english_pob_choice: wet my feet with her tears
  chosen_spanish: me lavó los pies con sus lágrimas
  alternatives_spanish:
  - mojó mis pies con sus lágrimas
  - empapó mis pies con sus lágrimas
  lexicon: BDAG
  rationale: βρέχω significa mojar o humedecer; en este contexto, el sentido práctico de las lágrimas sobre los pies se expresa naturalmente como «lavó los pies con sus lágrimas», sin perder la imagen de mojar. Se conserva la relación instrumental de «con sus lágrimas».
- source_word: ταῖς θριξὶν αὐτῆς ἐξέμαξεν
  english_pob_choice: wiped them with her hair
  chosen_spanish: y los enjugó con su cabello
  alternatives_spanish:
  - y los secó con su cabello
  - y los limpió con su cabello
  lexicon: BDAG
  rationale: ἐκμάσσω es «enjugar/secar/limpiar»; «enjugó» conserva la acción de secar lo mojado y suena digna en español. «Cabello» es el equivalente natural de θρίξ en este contexto.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto español. También se mantuvo la lectura narrativa en pasado («mojó»/«lavó» no se usó; se eligió «lavó» solo en la decisión lexical como explicación, pero en el texto se optó por una formulación que no exige nota adicional).
  spanish_consistency_notes:
  - Se mantuvo el tratamiento directo de Simón en segunda persona singular, coherente con el griego.
  - Se usó «casa» para οἰκία y «pies» para πόδας sin añadir interpretaciones no presentes en el texto.
  - Se preservó el contraste retórico entre Simón y la mujer con «pero ella».
  - Se evitó «SEÑOR» o terminología eclesiástica ajena al versículo; no hay mención del nombre divino aquí.
