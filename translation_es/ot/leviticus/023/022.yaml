review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del hebreo: la prohibición de cosechar hasta el extremo del campo, no recoger el remanente, dejarlo para el pobre y el residente no israelita, y la fórmula final con el nombre divino. Sin embargo, hay dos desajustes importantes con la forma y la lógica del texto fuente: (1) el hebreo alterna 2mp y 2ms, pero la fórmula final אֱלֹהֵיכֶם es inequívocamente plural (''vuestro/su Dios de ustedes''), por lo que ''tu Dios'' borra un dato gramatical relevante; (2) la nota [a] está anclada en ''tierra'', pero la alternativa explicada (''borde/esquina de tu campo'') corresponde a ''el borde de tu campo'', no a ''tu tierra''.'
  spanish_quality_summary: El español es claro y digno, pero presenta detalles mejorables. 'Rebusco' es preciso aunque algo marcado; puede mantenerse. 'Forastero' es legible, pero en un contexto legal del AT puede sonar demasiado general o transitorio; 'residente extranjero' comunica mejor la noción de גֵּר sin introducir categorías modernas fuertes. Además, la concordancia pronominal en 'lo dejarás' es posible por valor colectivo, pero 'lo' suena menos natural tras dos referentes ('borde' y 'rebusco'); conviene reformular para evitar ambigüedad.
  glossary_alignment: Alinea bien con el glosario en 'Yahvé'. No contradice ninguna otra política principal, pero 'forastero' se aparta del matiz preferido por la auditoría inglesa ('sojourner' / alternativa 'resident foreigner'); en español, 'residente extranjero' o 'extranjero residente' preserva mejor esa razón documentada. También debe corregirse 'tu Dios' a 'vuestro Dios' para respetar el hebreo אֱלֹהֵיכֶם.
  issues:
  - severity: high
    issue: La nota [a] está colocada en el segmento equivocado.
    rationale: La nota explica el término פאה ('borde/lado/esquina'), que corresponde a 'el borde de tu campo', no a 'tu tierra'. Tal como está, el anclaje induce a error textual.
  - severity: high
    issue: '''tu Dios'' no refleja el plural de אֱלֹהֵיכֶם.'
    rationale: 'El sufijo hebreo es 2mp. Aunque el español a veces singulariza, aquí la fórmula de cierre del pacto debe conservar mejor el plural: ''vuestro Dios''.'
  - severity: medium
    issue: '''forastero'' debilita el matiz legal-social de גֵּר.'
    rationale: En esta ley no se trata simplemente de alguien de fuera, sino de un no israelita residente bajo protección social. 'Residente extranjero' expresa mejor la razón léxica auditada.
  - severity: low
    issue: '''lo dejarás'' puede sonar ambiguo después de dos objetos de distinta naturaleza.'
    rationale: Aunque el hebreo usa un pronombre plural que resume los elementos dejados, en español resulta más claro 'los dejarás' o una reformulación equivalente.
  revised_spanish_text: Y cuando sieguen la cosecha de su tierra, no segarás completamente el borde[a] de tu campo, ni recogerás el rebusco de tu cosecha; lo dejarás para el pobre y para el residente extranjero[b]. Yo soy Yahvé vuestro Dios.
  revised_footnotes:
