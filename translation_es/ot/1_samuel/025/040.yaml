    text: O «para casarse contigo»; literalmente, «para tomarte ... como esposa».
    reason: lexical_alternative
  revision_rationale: Se corrige el topónimo a la forma española habitual «Carmelo» y se ajusta la nota para reflejar con precisión la alternativa matrimonial del hebreo sin ambigüedad de sujeto. El resto del borrador preserva bien el sentido y la formulación del original.
