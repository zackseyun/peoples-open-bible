translation:
  language: es
  text: Ciertamente no verán la tierra que juré a sus padres[a][b], y ninguno de los que me despreciaron verá la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «si ven la tierra»; en esta fórmula de juramento, el sentido es enfáticamente negativo: «ciertamente no verán la tierra».'
    reason: lexical_alternative
  - marker: b
    text: 'O «antepasados». Hebreo: «padres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: they certainly shall not
  chosen_spanish: ciertamente no
  alternatives_spanish:
  - seguramente no
  - no verán
  lexicon: HALOT
  rationale: En esta fórmula de juramento, אִם funciona idiomáticamente como negación enfática. En español, «ciertamente no» comunica esa fuerza judicial sin conservar un condicional que el contexto no pide.
- source_word: יִרְאוּ
  english_pob_choice: shall see
  chosen_spanish: verán
  alternatives_spanish:
  - han de ver
  - verán por sí mismos
  lexicon: HALOT
  rationale: ראה aquí significa ‘ver’ en el sentido de experimentar o llegar a la tierra prometida. El futuro simple en español mantiene la solemnidad y la relación con el juicio divino.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: En Números, הארץ alude a la tierra prometida. «La tierra» conserva el idioma bíblico sin añadir una explicitación que el hebreo no da en esta cláusula.
- source_word: נִשְׁבַּעְתִּי
  english_pob_choice: I swore
  chosen_spanish: juré
  alternatives_spanish:
  - hice juramento
  - lo juré
  lexicon: HALOT
  rationale: El verbo lleva fuerza de juramento. «Juré» es breve, natural y transmite el peso pactual del acto divino.
- source_word: לַאֲבֹתָם
  english_pob_choice: to their fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus padres varones
  - a sus antepasados
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘a sus padres’. En español «padres» conserva esa forma y evita neutralizar sin necesidad, mientras mantiene el referente patriarcal del pacto.
- source_word: וְכָל
  english_pob_choice: and none of
  chosen_spanish: y ninguno de
  alternatives_spanish:
  - y todos ... no
  - y ninguno de ellos
  lexicon: HALOT
  rationale: La construcción distributiva con la negación siguiente se expresa con naturalidad como «y ninguno de», preservando el alcance total sin un calco torpe.
- source_word: מְנַאֲצַי
  english_pob_choice: those who despised me
  chosen_spanish: los que me despreciaron
  alternatives_spanish:
  - los que me trataron con desprecio
  - los que me desdeñaron
  lexicon: HALOT
  rationale: נאץ expresa desprecio o desdén hacia Dios. «Despreciaron» reproduce bien la gravedad moral y teológica del término.
- source_word: לֹא יִרְאוּהָ
  english_pob_choice: shall see it
  chosen_spanish: la verá
  alternatives_spanish:
  - no la verán
  - la verán
  lexicon: HALOT
  rationale: El sufijo pronominal remite a «la tierra»; por eso se traduce con «la». La concordancia singular en español se ajusta al antecedente singular y mantiene la repetición enfática del hebreo.
theological_decisions:
- issue: Fórmula de juramento con אִם
  english_pob_reading: 'Render as emphatic negation: ''they certainly shall not see'''
  chosen_spanish_reading: «ciertamente no verán» como negación enfática
  alternative_spanish_readings:
  - «si ven la tierra»
  - «no verán la tierra» sin intensificador
  rationale: La construcción hebrea es una fórmula de juramento cuyo sentido aquí no es condicional sino condenatorio. En español, el adverbio enfático conserva la fuerza del veredicto divino sin oscurecerla.
  doctrine_reference: Translation philosophy §1, §6
- issue: Tratamiento de לַאֲבֹתָם
  english_pob_reading: '''their fathers'' in the main text'
  chosen_spanish_reading: «a sus padres»
  alternative_spanish_readings:
  - «a sus antepasados»
  rationale: El texto hebreo usa un término masculino familiar y pactual. «Padres» mantiene la forma fuente y el vínculo con los patriarcas, sin introducir una neutralización que el original no exige.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo de auditoría es alto y el texto base quedó sin modificaciones necesarias.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícito solo en los criterios del proyecto; este versículo no contiene el nombre divino explícito.
  - Se preservó el paralelo semántico entre «la tierra» y «la verá» con pronombre femenino singular para reflejar el antecedente hebreo.
  - Se evitó introducir «tierra prometida» en el texto principal para no ampliar más allá del hebreo; esa explicitación queda solo como alternativa conceptual.
  - Se conservó «padres» como forma fuente, en línea con la decisión auditada de no neutralizar automáticamente el término.
