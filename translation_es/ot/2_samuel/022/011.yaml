translation:
  language: es
  text: Él cabalgó sobre un querubín y voló; apareció[a] sobre las alas del viento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue visto». El verbo hebreo puede entenderse como «fue visto» o «apareció».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּרְכַּב
  english_pob_choice: he rode
  chosen_spanish: cabalgó
  alternatives_spanish:
  - montó
  - iba montado
  lexicon: HALOT
  rationale: El verbo de raíz רכב expresa montar/cabalgar. "Cabalgó" conserva la imagen dinámica y resulta natural en español formal; "montó" puede sonar más neutro, pero menos evocador en este contexto poético.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: HALOT
  rationale: La relación espacial aquí es la de apoyo y colocación. "Sobre" es la forma más directa y solemne en español para este cuadro poético.
- source_word: כְּרוּב
  english_pob_choice: cherub
  chosen_spanish: querubín
  alternatives_spanish:
  - querub
  lexicon: HALOT
  rationale: El sustantivo hebreo designa la criatura celestial conocida en la tradición bíblica. En español, "querubín" es el término establecido y transparente; "querub" suena menos natural.
- source_word: וַיָּעֹף
  english_pob_choice: and flew
  chosen_spanish: y voló
  alternatives_spanish:
  - y voló velozmente
  - y sobrevoló
  lexicon: HALOT
  rationale: עוף significa "volar". "Voló" preserva el sentido básico sin añadir matices no requeridos por el hebreo.
- source_word: וַיֵּרָא
  english_pob_choice: he appeared
  chosen_spanish: se manifestó
  alternatives_spanish:
  - apareció
  - fue visto
  lexicon: HALOT
  rationale: La forma nifal de ראה puede leerse como "ser visto" o "aparecer/manifiestarse". Dado el contexto teofánico y la decisión inglesa reciente de preferir "appeared", "se manifestó" mantiene la pasividad relativa y expresa con dignidad la idea de manifestación sin borrar la tensión entre visibilidad y aparición.
- source_word: כַּנְפֵי
  english_pob_choice: the wings of
  chosen_spanish: las alas de
  alternatives_spanish:
  - las alas del
  lexicon: HALOT
  rationale: כַּנְפֵי es el constructo plural de "ala". "Las alas de" conserva la imagen corporal-poética del hebreo con naturalidad en español.
- source_word: רוּחַ
  english_pob_choice: the wind
  chosen_spanish: el viento
  alternatives_spanish:
  - la tempestad
  - el espíritu
  lexicon: HALOT
  rationale: En este contexto poético, רוּחַ se refiere naturalmente al viento. "El viento" es la opción más fiel y menos interpretativa; "el espíritu" desviaría el sentido.
theological_decisions:
- issue: Cómo renderizar la forma verbal de ראה en un contexto teofánico sin resolver la ambigüedad
  english_pob_reading: He appeared on the wings of the wind.
  chosen_spanish_reading: Se manifestó sobre las alas del viento.
  alternative_spanish_readings:
  - Apareció sobre las alas del viento.
  - Fue visto sobre las alas del viento.
  rationale: El hebreo permite tanto una lectura pasiva ('fue visto') como una lectura de manifestación ('apareció'). La tradición auditada en inglés pasó de 'was seen' a 'appeared' para mayor naturalidad, pero sin abandonar la tensión del texto. 'Se manifestó' conserva la idea de aparición divina y no borra la posibilidad de visibilidad implícita.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La base inglesa auditada muestra una revisión reciente desde "he was seen" a "he appeared" para la segunda cola, manteniendo la imaginería poética. La versión española refleja esa preferencia contextual con "se manifestó", sin cerrar por completo la ambigüedad del nifal hebreo.
  spanish_consistency_notes:
  - Se mantuvo "querubín" como término bíblico estándar para כְּרוּב.
  - Se prefirió "el viento" frente a opciones más interpretativas como "la tempestad".
  - La construcción verbal "se manifestó" busca equilibrar fidelidad formal y lectura natural en español, en línea con el registro poético del pasaje.
