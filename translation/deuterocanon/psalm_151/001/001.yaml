theological_decisions:
- issue: Rendering of familial language
  chosen_reading: brothers
  alternative_readings:
  - siblings
  rationale: The Greek is masculine and the narrative setting concerns David's male brothers. A gender-neutral rendering would obscure the source's specificity.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Degree of David's status in the family
  chosen_reading: small ... younger
  alternative_readings:
  - least ... youngest
  rationale: The verse presents David as comparatively insignificant and junior, but the Greek wording does not require the stronger interpretive rendering 'least' or the superlative 'youngest.' The translation preserves the tension without importing later narrative conclusions.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
