translation:
  language: es
  text: 'Y el límite tocó Tabor[a], Shahazuma y Bet-semesh; y el extremo de su límite fue el Jordán[b]: dieciséis ciudades con sus aldeas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alcanzó» o «se encontró con»; el verbo hebreo puede indicar que una línea de frontera entra en contacto con un lugar.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «las salidas de su límite fueron el Jordán», fórmula de frontera que señala el extremo o alcance del límite.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָגַע
  english_pob_choice: touched
  chosen_spanish: tocó
  alternatives_spanish:
  - alcanzó
  - llegó a
  - se encontró con
  lexicon: HALOT
  rationale: En descripciones de fronteras, פגע puede expresar que una línea de límite entra en contacto con un lugar. «Tocó» conserva esa relación espacial de manera natural en español sin forzar una interpretación adicional.
- source_word: הַגְּבוּל
  english_pob_choice: the border
  chosen_spanish: el límite
  alternatives_spanish:
  - la frontera
  - el borde
  lexicon: HALOT
  rationale: En textos de repartición territorial, גְּבוּל se refiere al contorno o línea delimitadora de un territorio. «Límite» suena claro y natural en español bíblico moderno.
- source_word: בְּתָבוֹר
  english_pob_choice: Tabor
  chosen_spanish: Tabor
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera sin traducir su significado léxico.
- source_word: וְשַׁחֲצוּמָה
  english_pob_choice: Shahazumah
  chosen_spanish: Sahazuma
  alternatives_spanish:
  - Shahazuma
  - Sahazumá
  lexicon: HALOT
  rationale: Nombre propio; se mantiene en forma transliterada adaptada a la ortografía española para facilitar lectura, sin añadir significado no explicitado por el texto.
- source_word: וּבֵית שֶׁמֶשׁ
  english_pob_choice: Beth-shemesh
  chosen_spanish: Bet-semes
  alternatives_spanish:
  - Betshemesh
  - Casa del Sol
  lexicon: HALOT
  rationale: Nombre propio de lugar. Se translitera en forma breve y reconocible en español; no se vierte como «Casa del Sol» porque el texto lo presenta como topónimo fijo.
- source_word: וְהָיוּ תֹּצְאוֹת גְּבוּלָם
  english_pob_choice: and the end of their border was
  chosen_spanish: y las salidas de su límite estuvieron
  alternatives_spanish:
  - y el final de su límite fue
  - y las extremidades de su límite estuvieron
  lexicon: HALOT
  rationale: תֹּצְאוֹת literalmente es «salidas», «salidas/extremidades» en fórmulas de límite. Se conserva la imagen y la fórmula territorial; «estuvieron» refleja el valor verbal de הָיוּ sin sobreinterpretar el movimiento.
- source_word: הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: Nombre propio del río; en español bíblico «el Jordán» es idiomático y suficiente.
- source_word: עָרִים שֵׁשׁ עֶשְׂרֵה
  english_pob_choice: sixteen cities
  chosen_spanish: dieciséis ciudades
  alternatives_spanish:
  - 16 ciudades
  lexicon: HALOT
  rationale: Construcción numérica directa; se expresa de forma natural y exacta en español.
- source_word: וְחַצְרֵיהֶן
  english_pob_choice: with their villages
  chosen_spanish: con sus aldeas
  alternatives_spanish:
  - y sus aldeas
  - con sus poblados
  lexicon: HALOT
  rationale: חָצֵר en listados territoriales puede referirse a dependencias o asentamientos menores asociados a las ciudades. «Aldeas» preserva bien el sentido de poblados dependientes sin cargar una equivalencia demasiado técnica.
theological_decisions:
- issue: Fórmula geográfica «las salidas de su límite estuvieron en el Jordán»
  english_pob_reading: Literally, 'the outgoings of their border were the Jordan,' a boundary formula referring to the border's endpoint or extent.
  chosen_spanish_reading: «las salidas de su límite estuvieron en el Jordán» conserva la fórmula y el sentido de término/extensión del borde territorial.
  alternative_spanish_readings:
  - «el extremo de su límite fue el Jordán»
  - «y su límite terminaba en el Jordán»
  rationale: No hay una cuestión doctrinal, sino de fidelidad a la fórmula territorial hebrea. Se preserva la imagen de «salidas» porque el POB inglés también retiene esa tensión literal a la vez que la explica en nota.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de WLC y la decisión auditada del POB inglés. Se mantuvieron los nombres propios transliterados, la fórmula territorial con «salidas de su límite», y el cierre numérico exacto, sin introducir aclaraciones no sustentadas por el fuente.
  spanish_consistency_notes:
  - Se usa «límite» para גְּבוּל de modo consistente con pasajes de repartición territorial.
  - Se mantiene «Jordán» como nombre del río, sin añadir «río» salvo que el contexto lo exigiera.
  - Se transliteran topónimos como nombres fijos y no se traducen por su etimología.
  - Se conserva la tensión literal de תֹּצְאוֹת en el cuerpo y se explica en nota para lectura fluida.
  - Se emplea español moderno, pero con sintaxis suficientemente sobria para un registro bíblico público.
