- from: 'Y he aquí[a], gozo y alegría, matando ganado y sacrificando ovejas, comiendo carne y bebiendo vino: «Comamos y bebamos, porque mañana moriremos».'
  to: 'Y he aquí[a], gozo y alegría, matando ganado y degollando ovejas, comiendo carne y bebiendo vino: «Comamos y bebamos, porque mañana moriremos».'
  rationale: Se corrige 'sacrificando ovejas' a 'degollando ovejas' para evitar un matiz ritual no apoyado por la decisión léxica auditada, y se repara la nota al pie para que refleje una alternativa verdaderamente distinta y más literal al lema hebreo.
