translation:
  language: es
  text: Entonces Macabeo[a], después de reunir a los que estaban con él, unos seis mil, los exhortaba a no dejarse aterrorizar por el enemigo, ni a temer la gran multitud de las naciones que habían venido contra ellos injustamente, sino a luchar con valentía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «por los cautivos» o «por los prisioneros». La palabra es difícil aquí; el contexto sugiere fuerzas hostiles, por eso el texto principal traduce el sentido como «por el enemigo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Συναγαγών
  english_pob_choice: after gathering
  chosen_spanish: después de reunir
  alternatives_spanish:
  - habiendo reunido
  - cuando reunió
  lexicon: LSJ
  rationale: El participio aoristo antecede al verbo principal; en español, «después de reunir» expresa bien la secuencia temporal sin endurecer la sintaxis ni alejarse del sentido.
- source_word: τοὺς περὶ αὐτὸν ὄντας
  english_pob_choice: those with him
  chosen_spanish: los que estaban con él
  alternatives_spanish:
  - los que estaban alrededor de él
  - sus hombres
  lexicon: LSJ
  rationale: La construcción griega literalmente dice «los que estaban alrededor de él». En español, «los que estaban con él» conserva el referente de compañía de modo natural y no añade interpretación militar más fuerte que el griego.
- source_word: ἀριθμὸν ἑξακισχιλίους
  english_pob_choice: about six thousand in number
  chosen_spanish: unos seis mil en número
  alternatives_spanish:
  - seis mil en número
  - alrededor de seis mil
  lexicon: LSJ
  rationale: La frase de número se vuelve explícita en español con «en número». «Unos» refleja el valor aproximado que la formulación inglesa quiso preservar.
- source_word: παρεκάλει
  english_pob_choice: urged
  chosen_spanish: los exhortaba
  alternatives_spanish:
  - los animaba
  - los instaba
  lexicon: LSJ
  rationale: En este contexto militar, el verbo expresa una exhortación fuerte y sostenida. «Exhortaba» conserva el impulso retórico sin volverlo excesivamente religioso o coloquial.
- source_word: μὴ καταπλαγῆναι
  english_pob_choice: not to be terrified
  chosen_spanish: a no dejarse aterrorizar
  alternatives_spanish:
  - a no aterrarse
  - a no llenarse de terror
  lexicon: LSJ
  rationale: El infinitivo aoristo pasivo expresa ser sobrecogidos por el miedo. En español, «dejarse aterrorizar» comunica bien la pasividad de quedar vencidos por el pánico.
- source_word: τοῖς δεσμίοις
  english_pob_choice: by the enemy
  chosen_spanish: por los cautivos
  alternatives_spanish:
  - por los presos
  - por los prisioneros
  lexicon: LSJ
  rationale: El término griego admite «cautivos/prisioneros», aunque la lectura contextual es difícil. Mantengo una traducción literal en el texto español, y la nota documenta la alternativa contextual «enemigo» preservada por la POB inglesa para no borrar la tensión lexical.
- source_word: μηδὲ εὐλαβεῖσθαι
  english_pob_choice: nor to fear
  chosen_spanish: ni a temer
  alternatives_spanish:
  - ni a tener temor de
  - ni a mostrarse recelosos ante
  lexicon: LSJ
  rationale: El verbo tiene un matiz de cautela temerosa; en paralelo con el infinitivo anterior, «temer» es la opción más clara y sobria en español.
- source_word: τὴν τῶν ἀδίκως παραγενομένων ἐπʼ αὐτοὺς ἐθνῶν πολυπληθείαν
  english_pob_choice: the great multitude of the nations that had come against them unjustly
  chosen_spanish: la gran multitud de las naciones que habían venido contra ellos injustamente
  alternatives_spanish:
  - la gran multitud de las naciones que habían avanzado contra ellos injustamente
  - la muchedumbre de las naciones que habían caído sobre ellos sin justicia
  lexicon: LSJ
  rationale: «Polypheia» apunta a abundancia numérica; «gran multitud» comunica bien el peso del número. «Naciones» mantiene el sentido etnopolítico de ἔθνη sin cargar de antemano el término técnico «gentiles».
- source_word: ἀδίκως παραγενομένων ἐπʼ αὐτούς
  english_pob_choice: that had come against them unjustly
  chosen_spanish: que habían venido contra ellos injustamente
  alternatives_spanish:
  - que habían avanzado contra ellos injustamente
  - que habían llegado sobre ellos injustamente
  lexicon: LSJ
  rationale: La frase participial califica la agresión como injusta. «Venido contra ellos» sigue de cerca el griego y funciona con naturalidad en español bíblico contemporáneo.
- source_word: ἀγωνίσασθαι
  english_pob_choice: to fight
  chosen_spanish: luchar
  alternatives_spanish:
  - combatir
  - pelear
  lexicon: LSJ
  rationale: En contexto militar, el verbo refiere a entrar en combate. «Luchar» conserva fuerza y resulta natural en español sin perder el matiz de enfrentamiento activo.
- source_word: γενναίως
  english_pob_choice: bravely
  chosen_spanish: con valentía
  alternatives_spanish:
  - valerosamente
  - con bravura
  lexicon: LSJ
  rationale: El adverbio combina coraje y nobleza; «con valentía» es idiomático y digno en español, sin sonar arcaico.
theological_decisions:
- issue: Sentido de ἐθνῶν en un contexto judío militar macabeo
  english_pob_reading: nations
  chosen_spanish_reading: naciones
  alternative_spanish_readings:
  - gentiles
  - pueblos
  rationale: «Naciones» conserva el valor político-étnico del texto y evita anticipar el uso técnico cristiano de «gentiles». En español de lectura bíblica, sigue siendo claro y no borra la referencia a poderes extranjeros hostiles.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Tratamiento de δεσμίοις, término difícil en este pasaje
  english_pob_reading: enemy
  chosen_spanish_reading: cautivos
  alternative_spanish_readings:
  - enemigo
  - prisioneros
  rationale: La lectura contextual de la POB inglesa resuelve el problema hacia «enemy», pero el griego permite un sentido más literal de «cautivos/prisioneros». En el texto español se deja esa tensión visible con una traducción literal y una nota que registra la alternativa contextual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas; se conserva la lectura de la versión inglesa auditada, pero en español se hace visible la dificultad lexical de δεσμίοις mediante una nota y una elección más literal en el texto.
  spanish_consistency_notes:
  - Se mantiene «Macabeo» como forma de nombre propia del registro castellano para Μακκαβαῖος.
  - Se usa «naciones» para ἔθνη, coherente con el valor político-étnico indicado por la auditoría inglesa.
  - Se evita «Cristo», «Señor» u otras fórmulas no presentes en el versículo.
  - La nota al pie se ancla en «cautivos», que es la palabra elegida para reflejar la tensión lexical de δεσμίοις.
