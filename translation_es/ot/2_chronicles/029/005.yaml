translation:
  language: es
  text: 'Y él les dijo: “Escúchenme[a], levitas. Ahora conságrense, y consagren la casa de Yahvé, el Dios de sus padres, y quiten la impureza[b] del lugar santo[c]”.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Óiganme». El hebreo usa un imperativo plural con sufijo de primera persona; ambas opciones traducen la llamada directa.
    reason: lexical_alternative
  - marker: b
    text: O «la inmundicia» o «la contaminación ritual». El término hebreo se refiere a aquello que contamina el santuario.
    reason: lexical_alternative
  - marker: c
    text: O «del santuario».
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמָעוּנִי
  english_pob_choice: Listen to me
  chosen_spanish: Escúchenme
  alternatives_spanish:
  - Óiganme
  - Atiéndanme
  lexicon: HALOT
  rationale: El imperativo plural con sufijo de primera persona exige una exhortación directa. «Escúchenme» suena natural en español moderno y conserva la fuerza de la llamada inmediata; «Óiganme» es posible, pero menos idiomático en este contexto de instrucción cultual.
- source_word: הַ/לְוִיִּם
  english_pob_choice: Levites
  chosen_spanish: levitas
  alternatives_spanish:
  - levitas
  lexicon: HALOT
  rationale: Nombre del grupo sacerdotal-levítico. En español bíblico «levitas» es transparente y estándar; no requiere transliteración.
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Ya
  - En este momento
  lexicon: HALOT
  rationale: Marca de urgencia temporal. «Ahora» comunica la inmediatez sin añadir matices no presentes en el hebreo.
- source_word: הִֽתְקַדְּשׁ֗וּ
  english_pob_choice: consecrate yourselves
  chosen_spanish: conságrense
  alternatives_spanish:
  - santifíquense
  - háganse santos
  lexicon: HALOT
  rationale: El hitpael tiene sentido reflexivo de preparación cultual. «Conságrense» preserva el campo semántico ritual y resulta más natural que «santifíquense» en español contemporáneo, aunque ambas opciones serían viables.
- source_word: וְ/קַדְּשׁוּ֙
  english_pob_choice: and consecrate
  chosen_spanish: y consagren
  alternatives_spanish:
  - y santifiquen
  lexicon: HALOT
  rationale: Se conserva la repetición del verbo קדשׁ con el mismo núcleo léxico en español para reflejar la paronomasia y la secuencia imperativa del hebreo.
- source_word: בֵּ֤ית יְהוָה֙
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahweh
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el giro literal «casa de Yahvé» para respetar la forma hebrea y la terminología POB sobre el nombre divino. «Templo» es interpretativo y no necesario aquí.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue la convención POB de rendir el Tetragrámaton como «Yahvé», preservando el nombre propio divino en vez de sustituirlo por un título.
- source_word: אֱלֹהֵי אֲבֹתֵי/כֶם
  english_pob_choice: the God of your fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  lexicon: HALOT
  rationale: Se conserva la fórmula de pacto y filiación del hebreo. «Padres» refleja la forma fuente y es la opción POB habitual; «antepasados» explicita el referente, pero se aleja del giro original.
- source_word: וְ/הוֹצִ֥יאוּ
  english_pob_choice: and remove
  chosen_spanish: y saquen
  alternatives_spanish:
  - y aparten
  - y quiten
  lexicon: HALOT
  rationale: El verbo causativo implica retirar algo de un lugar. «Saquen» mantiene la imagen concreta de extraer algo fuera del recinto santo y suena más vívido que «quiten».
- source_word: הַ/נִּדָּ֖ה
  english_pob_choice: the uncleanness
  chosen_spanish: la impureza
  alternatives_spanish:
  - la inmundicia
  - la contaminación ritual
  lexicon: HALOT
  rationale: El sustantivo puede designar contaminación ritual que profana el santuario. «Impureza» preserva esa carga cultual sin introducir un término demasiado físico o moralizante como «inmundicia».
- source_word: מִן הַ/קֹּֽדֶשׁ
  english_pob_choice: from the holy place
  chosen_spanish: del lugar santo
  alternatives_spanish:
  - del santuario
  - de lo santo
  lexicon: HALOT
  rationale: Aquí קֹדֶשׁ apunta al ámbito sagrado del templo. «Lugar santo» comunica bien el espacio sacro en español; «santuario» también sería posible, pero «lugar santo» refleja con más precisión el componente locativo.
theological_decisions:
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton de forma explícita. La política POB evita la sustitución por un título y preserva el nombre propio divino; en español, «Yahvé» es la forma adoptada para mantener esa distinción.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Naturaleza de הַנִּדָּה en contexto cultual
  english_pob_reading: the uncleanness
  chosen_spanish_reading: la impureza
  alternative_spanish_readings:
  - la inmundicia
  - la contaminación ritual
  rationale: En este versículo la referencia no es suciedad ordinaria sino aquello que contamina el recinto sagrado. «Impureza» mantiene la tensión cultual y evita reducir el término a una noción meramente higiénica.
  doctrine_reference: Lexical note on cultic impurity in sanctuary contexts
- issue: Sentido de מִן הַקֹּדֶשׁ
  english_pob_reading: from the holy place
  chosen_spanish_reading: del lugar santo
  alternative_spanish_readings:
  - del santuario
  rationale: El hebreo puede señalar el área santa del templo, no solo una abstracción de santidad. «Lugar santo» conserva el valor locativo y deja abierta la referencia al recinto sagrado.
  doctrine_reference: Cultic-space terminology in temple purification passages
translation_notes:
  revision_awareness: 'La redacción española sigue el acuerdo alto del expediente inglés y adopta las decisiones revisadas que favorecen una formulación más natural sin perder la fuerza cultual: se mantiene la repetición de קדשׁ con «conságrense / consagren», y para הוֹצִיאוּ se prefiere un verbo de extracción directa («saquen») acorde con la revisión inglesa que priorizó «remove» sobre una imagen más pesada de «carry out».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme a la convención POB española.
  - Se conserva la raíz léxica de קדשׁ con «conságrense / consagren» para reflejar la repetición hebrea.
  - «Lugar santo» funciona aquí como equivalente espacial de קֹדֶשׁ y no como abstracción de santidad.
  - «Impureza» se usa en sentido cultual; no debe leerse como inmoralidad general.
