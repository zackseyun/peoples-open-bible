revisions:
- from: 'Pero ahora Yahvé ha hablado, diciendo: “Dentro de tres años, como los años de un jornalero, la gloria de Moab será abatida, con toda su gran multitud; y el remanente será [a] poco, muy pequeño, no poderoso.”'
  to: 'Pero ahora Yahvé ha hablado, diciendo: “Dentro de tres años[a], como los años de un jornalero, la gloria de Moab será abatida[b], con toda su gran multitud; y el remanente será escaso, muy pequeño[c], no poderoso.”'
  rationale: Se corrige una formulación española poco idiomática ('será poco' -> 'será escaso'), se reubica la nota temporal en su frase correspondiente y se añaden las dos alternativas léxicas significativas que el rastro inglés documenta para mantener fidelidad al audit trail y mejor legibilidad en español.
