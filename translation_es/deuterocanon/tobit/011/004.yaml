revisions:
- from: Pero toma la hiel[a] del pez en tu mano. Y siguieron adelante[b], y el perro los siguió detrás de ellos.
  to: Pero toma la hiel[a] del pez en tu mano. Y siguieron adelante[b], y el perro iba detrás de ellos.
  rationale: Se mantiene la traducción general, pero se corrige la última cláusula para evitar la redundancia de «los siguió detrás de ellos». «El perro iba detrás de ellos» preserva mejor el sentido narrativo de acompañamiento con posición posterior y suena natural en español.
