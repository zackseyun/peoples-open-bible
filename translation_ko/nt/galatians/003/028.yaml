  lexicon: BDAG
  rationale: 본문은 사회적 신분의 폐지를 선포하는 강한 대조이며, 매임의 무게를 살리기 위해 「노예」를 택한다. 갈 4장의 하갈 알레고리와도 일관된다.
- source_word: ἄρσεν καὶ θῆλυ
  english_pob_choice: male and female
  chosen_korean: 남자와 여자
