translation:
  language: es
  text: Después de decir estas cosas[a], lo llevaron a la rueda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, la rueda de tortura usada en este relato de martirio.
    reason: cultural_note
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: LSJ
  rationale: El demostrativo neutro plural se refleja mejor con un plural español explícito. «Estas cosas» conserva la referencia retrospectiva al discurso anterior sin reducirla a un singular más vago.
- source_word: εἰπόντα
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habiendo dicho
  - después de decir
  lexicon: BDAG
  rationale: El participio aoristo se vierte de manera natural con una subordinada temporal en español. «Después de que dijo» mantiene la anterioridad de la acción sin sonar forzado.
- source_word: παρῆγον
  english_pob_choice: they led
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo condujeron
  - lo iban llevando
  lexicon: LSJ
  rationale: En este contexto de martirio, el imperfecto de παράγω expresa conducción forzada. «Lo llevaron» comunica el movimiento impuesto con naturalidad y sin añadir matiz procesal innecesario.
- source_word: ἐπὶ
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - hasta
  lexicon: BDAG
  rationale: Con verbo de movimiento, ἐπί puede expresar dirección. En español, «a» es la opción más sobria y fiel aquí, sin sugerir todavía contacto físico con el instrumento.
- source_word: τὸν τροχόν
  english_pob_choice: the wheel
  chosen_spanish: la rueda
  alternatives_spanish:
  - la rueda de tortura
  - el torno
  lexicon: LSJ
  rationale: τροχός significa literalmente «rueda». En español, «rueda» conserva el término base y deja que el contexto martirial indique su función. Evita sobreinterpretar el objeto antes de tiempo.
theological_decisions:
- issue: Referencia al instrumento de tortura sin explicitar su forma técnica
  english_pob_reading: the wheel
  chosen_spanish_reading: la rueda
  alternative_spanish_readings:
  - la rueda de tortura
  - el torno
  rationale: La lectura inglesa preserva el sustantivo simple y aclara el sentido en nota. En español se conserva esa misma sobriedad para no cerrar la ambigüedad lexical del griego más de lo que el texto obliga.
  doctrine_reference: none
translation_notes:
  revision_awareness: El contexto crítico y la auditoría inglesa muestran acuerdo alto y ninguna revisión aplicada; por eso la redacción española sigue de cerca el griego y preserva la misma sobriedad lexical de la edición inglesa.
  spanish_consistency_notes:
  - Se mantiene «rueda» para τροχός, en paralelo con el inglés «the wheel» y con nota explicativa.
  - Se conserva un orden natural en español con una subordinada temporal inicial, sin perder la secuencia participial del griego.
  - No se introduce terminología eclesiástica ni interpretativa ajena al pasaje.
