    rationale: El hebreo יְהוֹאָחָז corresponde a Jehoahaz/Joacaz. 'Joaquías' remite a otro nombre distinto y cambia el personaje mencionado, por lo que es un error sustancial de fidelidad al texto fuente.
  revised_spanish_text: Joacaz tenía veintitrés años cuando comenzó a reinar, y reinó tres meses en Jerusalén. El nombre de su madre era Hamutal, hija de Jeremías, de Libna.
