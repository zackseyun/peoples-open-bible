translation:
  language: es
  text: ¿No somos consideradas por él como extranjeras? Pues nos ha vendido y de hecho ha consumido por completo nuestro dinero[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha consumido por completo nuestra plata». El hebreo usa un modismo de «comer» con infinitivo absoluto enfático para expresar consumo total; literalmente, «ha comido, sí, nuestra plata».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹוא
  english_pob_choice: Are ... not
  chosen_spanish: ¿No ...?
  alternatives_spanish:
  - ¿Acaso no ...?
  - ¿No es verdad que ...?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera respuesta afirmativa. En español, «¿No ...?» reproduce bien ese valor sin sobreexplicar.
- source_word: נָכְרִיּוֹת
  english_pob_choice: foreigners
  chosen_spanish: extranjeras
  alternatives_spanish:
  - forasteras
  - ajenas
  - extrañas
  lexicon: HALOT
  rationale: El término describe a personas tratadas como ajenas al grupo familiar. Como el hablante son dos mujeres, «extranjeras» mantiene el matiz de extrañeza/alienación con referencia natural en español.
- source_word: נֶחְשַׁבְנוּ לוֹ
  english_pob_choice: are ... regarded by him
  chosen_spanish: somos considerados por él
  alternatives_spanish:
  - hemos sido considerados por él
  - somos tenidos por él
  lexicon: HALOT
  rationale: El nifal expresa ser tenidos por/considerados. El presente pasivo español conserva el valor de la pregunta retórica y su fuerza vigente en la queja.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la pregunta anterior. «Porque» es claro y natural en español, sin perder la relación explicativa.
- source_word: מְכָרָנוּ
  english_pob_choice: he has sold us
  chosen_spanish: nos ha vendido
  alternatives_spanish:
  - nos vendió
  lexicon: HALOT
  rationale: El perfecto hebreo presenta una acción concluida con efecto presente; el perfecto compuesto español comunica bien esa relevancia actual.
- source_word: וַיֹּאכַל גַּם אָכוֹל
  english_pob_choice: has indeed completely consumed
  chosen_spanish: ha devorado por completo
  alternatives_spanish:
  - ha consumido por completo
  - ha comido hasta acabar
  lexicon: HALOT
  rationale: El hebreo usa un verbo de comer con infinitivo absoluto intensificador. «Ha devorado por completo» conserva la metáfora de consumo total y el énfasis de plenitud, sin suavizarla en exceso.
- source_word: אֶת כַּסְפֵּנוּ
  english_pob_choice: our money
  chosen_spanish: nuestro dinero
  alternatives_spanish:
  - nuestra plata
  - nuestro salario
  lexicon: HALOT
  rationale: כֶּסֶף puede significar «plata» o «dinero». En este contexto económico, «nuestro dinero» resulta más natural en español y conserva la denuncia de pérdida patrimonial.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el ajuste auditado del inglés, conservando la pregunta retórica, la queja por la venta y el modismo intensivo de «comer/devorar» con valor de consumo total. Se optó por un español natural y publicable, sin perder la fuerza acusatoria del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva el plural femenino implícito con «extrajeras» para reflejar que habla Lea y Raquel.
  - Se eligió «dinero» en el texto principal y se deja «plata» como alternativa en nota para reflejar כֶּסֶף.
