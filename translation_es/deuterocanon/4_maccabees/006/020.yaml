review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido global del griego: la idea de que sería deshonroso seguir con vida por poco tiempo mientras se sufre burla pública por cobardía. Sin embargo, varias elecciones suenan poco idiomáticas en español y una de ellas debilita la naturalidad sin aportar fidelidad adicional.'
  spanish_quality_summary: 'La redacción actual es comprensible, pero contiene giros poco naturales: ''por un poco de tiempo'', ''siendo burlados'', y especialmente ''a causa de cobardía''. Una formulación más natural y digna en español bíblico moderno sería ''por un poco más de tiempo'', ''mientras todos se burlan de nosotros'' o ''mientras somos objeto de burla de todos'', y ''por cobardía''.'
  glossary_alignment: 'No hay términos del glosario teológico principal en disputa aquí. Las decisiones léxicas principales son adecuadas en principio: αἰσχρόν -> ''vergonzoso'', ἐπιβιώσομεν -> ''siguiéramos viviendo'', καταγελώμενοι -> campo semántico de burla, δειλία -> ''cobardía''. La revisión propuesta mejora la idiomaticidad sin apartarse de las decisiones auditadas en inglés.'
  issues:
  - severity: medium
    issue: '''por un poco de tiempo'' es poco idiomático'
    rationale: Aunque comprensible, suena calcado. El griego ὀλίγον χρόνον y el inglés 'for a little while' se expresan mejor en español como 'por un poco más de tiempo' o 'por poco tiempo'.
  - severity: medium
    issue: '''siendo burlados por todos'' suena forzado'
    rationale: El participio pasivo καταγελώμενοι expresa burla continua, pero en español 'siendo burlados' no es la opción más natural. 'mientras todos se burlan de nosotros' conserva el sentido de modo y duración de forma más fluida.
  - severity: low
    issue: '''a causa de cobardía'' es gramatical pero poco natural'
    rationale: Para ἐπὶ δειλίᾳ, 'por cobardía' transmite mejor la causa en español natural y mantiene la fuerza moral del término.
  revised_spanish_text: Porque sería vergonzoso si siguiéramos viviendo por un poco más de tiempo, y aun ese tiempo mientras todos se burlan de nosotros por cobardía.
  revision_rationale: 'Se ajustó la redacción para que suene natural y digna en español sin perder ninguno de los elementos del griego: vergüenza moral, continuación breve de la vida, burla pública generalizada y causa de esa burla. ''Por un poco más de tiempo'' expresa mejor ἐπιβιώσομεν + ὀλίγον χρόνον; ''mientras todos se burlan de nosotros'' representa idiomáticamente καταγελώμενοι πρὸς ἀπάντων; y ''por cobardía'' reproduce con claridad ἐπὶ δειλίᾳ.'
