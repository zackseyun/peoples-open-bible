translation:
  language: es
  text: Y Simón desplegó su fuerza y entabló combate con la falange[a], porque la caballería había quedado desordenada[b][c]; y fueron aplastados por él y huyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘se enfrentó a la falange’.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: ‘el caballo’; es decir, la caballería.'
    reason: lexical_alternative
  - marker: c
    text: O ‘había sido deshecha’ / ‘había sido desorganizada’, refiriéndose a la pérdida de cohesión de la caballería.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέλυσεν
  english_pob_choice: deployed
  chosen_spanish: desplegó
  alternatives_spanish:
  - soltó
  - puso en movimiento
  - sacó
  lexicon: LSJ
  rationale: En contexto militar con τὴν δύναμιν αὐτοῦ, el verbo no se refiere a una liberación literal sino a poner la fuerza en acción. 'Desplegó' comunica bien la maniobra militar en español y conserva el valor dinámico del original.
- source_word: τὴν δύναμιν αὐτοῦ
  english_pob_choice: his force
  chosen_spanish: su fuerza
  alternatives_spanish:
  - su ejército
  - sus tropas
  lexicon: LSJ
  rationale: δύναμις aquí nombra el contingente militar o fuerza combatiente. 'Su fuerza' preserva el sentido colectivo sin especificar más de lo que el griego dice.
- source_word: συνῆψεν πρὸς τὴν φάλαγγα
  english_pob_choice: joined battle with the phalanx
  chosen_spanish: se unió a la falange
  alternatives_spanish:
  - entabló combate con la falange
  - cerró con la falange
  - se enfrentó a la falange
  lexicon: LSJ
  rationale: La expresión indica entrar en combate contra esa formación. 'Se unió a la falange' reproduce de forma natural la idea de trabar combate; en nota se conserva la alternativa más explícita.
- source_word: φάλαγγα
  english_pob_choice: phalanx
  chosen_spanish: falange
  alternatives_spanish:
  - línea de batalla
  - formación de infantería
  lexicon: LSJ
  rationale: Se mantiene el término técnico histórico-militar para conservar la especificidad helenística del texto.
- source_word: ἡ γὰρ ἵππος
  english_pob_choice: the cavalry
  chosen_spanish: la caballería
  alternatives_spanish:
  - los jinetes
  - el caballo
  lexicon: LSJ
  rationale: Literalmente es 'el caballo', pero el sentido colectivo militar es caballería. El español necesita el término colectivo para claridad; la nota preserva la literalidad.
- source_word: ἐξελύθη
  english_pob_choice: had been thrown into disorder
  chosen_spanish: había quedado desordenada
  alternatives_spanish:
  - había sido desbandada
  - había quedado deshecha
  - había sido quebrada
  lexicon: LSJ
  rationale: El pasivo del mismo verbo sugiere pérdida de cohesión o desorganización. 'Había quedado desordenada' expresa ese colapso sin anticipar demasiado el verbo final de huida.
- source_word: συνετρίβησαν
  english_pob_choice: were crushed
  chosen_spanish: fueron aplastados
  alternatives_spanish:
  - fueron quebrados
  - fueron triturados
  - fueron destrozados
  lexicon: LSJ
  rationale: El verbo denota derrota decisiva y quebrantamiento en batalla. 'Fueron aplastados' es fuerte y natural en español, acorde con el contexto bélico.
- source_word: ἀπʼ αὐτοῦ
  english_pob_choice: by him
  chosen_spanish: por él
  alternatives_spanish:
  - ante él
  - de delante de él
  lexicon: LSJ
  rationale: La frase puede expresar agencia o alejamiento de la presencia de alguien. Tras 'fueron aplastados', 'por él' comunica directamente que la derrota ocurrió a manos de Simón.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el ajuste final del inglés POB: mantiene la acción militar compacta de συνῆψεν πρὸς τὴν φάλαγγα con una fórmula española natural, y refleja ἀπʼ αὐτοῦ de manera directa como agencia (''por él'') en vez de una lectura espacial. También conserva la nota sobre ἵππος/ caballería y el valor de desorden del pasivo ἐξελύθη.'
  spanish_consistency_notes:
  - Se usa 'falange' como término técnico histórico, no como 'formación de batalla', para conservar la especificidad del original.
  - '''Caballería'' se mantiene para ἵππος por claridad española; la nota preserva la literalidad griega.'
  - La secuencia verbal 'quedó desordenada' → 'fueron aplastados' → 'huyeron' reproduce la progresión narrativa del griego sin añadir elementos interpretativos.
