    text: O 'su piel.'
    reason: lexical_alternative
  - marker: b
    text: O 'su excremento'; פֶּרֶשׁ se refiere de manera concreta a estiércol, no solo a desecho general.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota [b] para que corresponda al término hebreo פִּרְשׁוֹ ('su estiércol'). Además, se ajusta 'su piel' a 'su cuero' para que la nota [a] vuelva a ser una alternativa real y refleje mejor la distinción del expediente inglés entre 'hide' y 'skin', manteniendo un español natural en contexto sacrificial.
