translation:
  language: es
  text: 'Y de Dan dijo: «Dan es un cachorro de león; da un salto[a] desde Basán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «salta desde Basán». El verbo hebreo sugiere un movimiento repentino de salto o irrupción.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְדָן
  english_pob_choice: And of Dan
  chosen_spanish: Y de Dan
  alternatives_spanish:
  - Y para Dan
  - Y respecto de Dan
  lexicon: HALOT
  rationale: La preposición y la conjunción introducen otra bendición tribal. En español, «Y de Dan» conserva el valor de pertenencia/relación del hebreo sin sonar forzado.
- source_word: אָמַר
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - declaró
  - habló
  lexicon: HALOT
  rationale: El verbo de reporte normal en español bíblico moderno y claro es «dijo»; mantiene la fórmula narrativa sin añadir énfasis indebido.
- source_word: דָּן
  english_pob_choice: Dan
  chosen_spanish: Dan
  lexicon: nombre propio
  rationale: Nombre tribal propio transliterado de forma estándar.
- source_word: גּוּר אַרְיֵה
  english_pob_choice: a lion’s cub
  chosen_spanish: un cachorro de león
  alternatives_spanish:
  - un león joven
  - un leoncillo
  lexicon: HALOT
  rationale: «Cachorro de león» comunica bien la idea de gūr como animal joven y conserva la imagen literal del hebreo con español natural.
- source_word: יְזַנֵּק
  english_pob_choice: he leaps out
  chosen_spanish: salta
  alternatives_spanish:
  - da un salto
  - salta fuera
  - se lanza
  lexicon: HALOT
  rationale: El verbo expresa un movimiento súbito de salto o arrebato. En español, «salta» es breve y fiel; el complemento «desde Basán» recoge el origen. Se evita «se lanza» por ser más interpretativo.
- source_word: מִן הַבָּשָׁן
  english_pob_choice: from Bashan
  chosen_spanish: desde Basán
  alternatives_spanish:
  - de Basán
  - fuera de Basán
  lexicon: HALOT
  rationale: El valor de origen se expresa con naturalidad mediante «desde». «Basán» conserva el nombre geográfico con transliteración estándar.
translation_notes:
  revision_awareness: El texto hebreo y la tradición auditada en inglés coinciden estrechamente; se mantuvo la imagen leonina y el movimiento súbito con equivalencia óptima, sin cambios textuales relevantes.
  spanish_consistency_notes:
  - Se mantuvo «Basán» con acento gráfico español para el topónimo.
  - Se prefirió «cachorro de león» por su naturalidad y precisión frente a «león joven».
  - La puntuación con comillas españolas y dos puntos reproduce de modo claro la introducción del oráculo.
