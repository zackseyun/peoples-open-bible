translation:
  language: es
  text: Y traerás la ofrenda de cereal[a], que se hace con estas cosas, para Yahvé[b]; y el sacerdote la presentará al sacerdote, y la acercará al altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda de grano». El hebreo מִנְחָה en Levítico 2 designa una ofrenda cultual hecha de cereal o grano, no una dádiva genérica.
    reason: lexical_alternative
  - marker: b
    text: O «a Yahvé». La preposición hebrea puede expresar tanto dedicación como dirección.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבֵאתָ
  english_pob_choice: And you shall bring
  chosen_spanish: Y traerás
  alternatives_spanish:
  - Y deberás traer
  - Entonces traerás
  lexicon: HALOT
  rationale: El hebreo usa una forma injuntiva en estilo legal. En español, el futuro simple expresa bien el mandato/instrucción. Mantengo la conexión de la cláusula con «Y»."
- source_word: הַמִּנְחָה
  english_pob_choice: the grain offering
  chosen_spanish: la ofrenda de cereal
  alternatives_spanish:
  - la ofrenda de grano
  - la ofrenda vegetal
  lexicon: HALOT
  rationale: En Levítico 2, מִנְחָה es la ofrenda cultual de cereal/grano, no una dádiva genérica. «Ofrenda de cereal» comunica el referente ritual de modo claro en español contemporáneo.
- source_word: אֲשֶׁר יֵעָשֶׂה מֵאֵלֶּה
  english_pob_choice: that is made from these things
  chosen_spanish: que se hace de estas cosas
  alternatives_spanish:
  - que se prepara de estas cosas
  - que se hace con esto
  lexicon: HALOT
  rationale: La pasiva del hebreo describe algo «hecho» a partir de los elementos anteriores. «De estas cosas» conserva el demostrativo sin precisar más de lo que el texto dice.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el Dios Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la terminología del proyecto, Yahvé. Aquí el ל expresa dedicación/consagración del sacrificio, por eso «para» es más natural que una dirección física estricta.
- source_word: וְהִקְרִיבָהּ
  english_pob_choice: and he shall present it
  chosen_spanish: y la presentará
  alternatives_spanish:
  - y la ofrecerá
  - y la acercará
  lexicon: HALOT
  rationale: קרב en este contexto cultual tiene el sentido de presentar/ofrecer acercando la ofrenda. «La presentará» evita confundir este verbo con el siguiente y preserva la secuencia ritual.
- source_word: אֶל הַכֹּהֵן
  english_pob_choice: to the priest
  chosen_spanish: al sacerdote
  alternatives_spanish:
  - al sacerdote oficiante
  - ante el sacerdote
  lexicon: HALOT
  rationale: כֹּהֵן es «sacerdote». En español «sacerdote» es el término más estable y comprensible, y aquí el movimiento hacia él se entiende por el contexto.
- source_word: וְהִגִּישָׁהּ
  english_pob_choice: and he shall bring it near
  chosen_spanish: y la acercará
  alternatives_spanish:
  - y la llevará más cerca
  - y la presentará
  lexicon: HALOT
  rationale: 'נגשׁ significa «acercar/traer cerca». Mantengo una traducción distinta de קרב para conservar la diferencia verbal del hebreo: primero se presenta al sacerdote y luego se acerca al altar.'
- source_word: אֶל הַמִּזְבֵּחַ
  english_pob_choice: to the altar
  chosen_spanish: al altar
  alternatives_spanish:
  - hasta el altar
  - ante el altar
  lexicon: HALOT
  rationale: «Al altar» reproduce de forma natural la dirección de אֶל y es el equivalente cultual más claro en español.
theological_decisions:
- issue: Cómo rendir el nombre divino יהוה
  english_pob_reading: Yahweh / to Yahweh
  chosen_spanish_reading: Yahvé / para Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - a Yahvé
  rationale: El proyecto español exige usar «Yahvé» para יהוה, no la sustitución litúrgica «SEÑOR». En esta frase, «para Yahvé» expresa bien la dedicación sacrificial del ל sin perder el nombre propio divino.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre los dos verbos rituales consecutivos
  english_pob_reading: present it ... bring it near
  chosen_spanish_reading: la presentará ... la acercará
  alternative_spanish_readings:
  - la ofrecerá ... la presentará
  - la entregará ... la acercará
  rationale: El hebreo distingue entre הִקְרִיב (presentar/ofrecer acercando) y הִגִּישׁ (acercar/traer cerca). En español conviene mantener dos verbos diferentes para no borrar esa secuencia ritual.
  doctrine_reference: Leviticus 2:8 ritual action sequence
- issue: Naturaleza de מִנְחָה en este contexto
  english_pob_reading: grain offering
  chosen_spanish_reading: ofrenda de cereal
  alternative_spanish_readings:
  - ofrenda de grano
  - oblación
  rationale: «Ofrenda de cereal» comunica el sentido técnico de מִנְחָה en Levítico 2 sin caer en un término demasiado tradicional o demasiado genérico. Preserva la idea de ofrenda material elaborada a partir de los elementos mencionados.
  doctrine_reference: Leviticus 2 cultic terminology
translation_notes:
  revision_awareness: El contexto de revisión indica que el versículo fue mantenido sin cambios sustanciales en la pasada más reciente, pero el cruce automático marcó ‘major-issues’. Por eso se conserva la secuencia verbal del hebreo y se explicitan las decisiones clave sobre יהוה y מִנְחָה, en lugar de seguir una traducción tradicional que ocultaría el nombre divino.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה.
  - Se conserva la distinción verbal entre «presentar» y «acercar» para reflejar קרב / נגשׁ.
  - «Sacerdote» se mantiene como término bíblico estándar para כֹּהֵן.
  - El registro es formal y readable, evitando arcaísmos innecesarios.
