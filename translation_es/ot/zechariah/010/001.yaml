translation:
  language: es
  text: Pidan a Yahvé lluvia en la época de la lluvia tardía[a]; Yahvé hace nubes de tormenta[b], y les dará chubascos de lluvia, a cada uno hierba en el campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en la temporada de la lluvia tardía' o 'lluvia tardía'.
    reason: lexical_alternative
  - marker: b
    text: O 'hace relámpagos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁאֲלוּ
  english_pob_choice: Ask
  chosen_spanish: Pedid
  alternatives_spanish:
  - Pedid a
  - Pidan
  lexicon: HALOT
  rationale: El imperativo plural pide una orden directa. 'Pedid' conserva el valor exhortativo sin añadir un objeto verbal innecesario en español; la relación con Yahvé se expresa con 'a Yahvé'.
- source_word: מֵיְהוָה
  english_pob_choice: Yahweh / the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino en la forma de la casa POB en español. El hebreo expresa fuente/origen con מִן, pero en español 'pedid a Yahvé' comunica de manera natural la dirección de la súplica.
- source_word: מָטָר
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - agua de lluvia
  - precipitación
  lexicon: HALOT
  rationale: Es el equivalente normal y transparente de מָטָר en este contexto agrícola.
- source_word: בְּעֵת מַלְקוֹשׁ
  english_pob_choice: in the time of the latter rain
  chosen_spanish: en la época de la lluvia tardía
  alternatives_spanish:
  - en la temporada de la lluvia tardía
  - en la época de la lluvia de primavera
  lexicon: HALOT
  rationale: מַלְקוֹשׁ refiere la lluvia tardía del ciclo agrícola. 'Lluvia tardía' retiene con fidelidad la referencia técnica; 'época' reproduce bien el valor temporal de בְּעֵת.
- source_word: עֹשֶׂה חֲזִיזִים
  english_pob_choice: makes storm clouds
  chosen_spanish: hace nubes de tormenta
  alternatives_spanish:
  - hace relámpagos
  - hace destellos de luz
  lexicon: HALOT
  rationale: חֲזִיזִים puede aludir a fenómenos de tormenta o relámpagos. En este contexto de lluvia, 'nubes de tormenta' comunica con naturalidad el fenómeno meteorológico sin perder la imagen de poder atmosférico.
- source_word: וּמְטַר גֶּשֶׁם
  english_pob_choice: showers of rain
  chosen_spanish: lluvia abundante
  alternatives_spanish:
  - chaparrones
  - aguacero
  lexicon: HALOT
  rationale: La combinación intensifica la idea de lluvia. 'Lluvia abundante' transmite la plenitud sin sonar redundante o excesivamente literal en español.
- source_word: יִתֵּן לָהֶם
  english_pob_choice: he will give them
  chosen_spanish: dará a cada uno
  alternatives_spanish:
  - les dará
  - dará a ellos
  lexicon: HALOT
  rationale: El verbo imperfecto se vierte como futuro en la secuencia promesa-acción. La expresión distributiva refleja el sentido de reparto individual del hebreo.
- source_word: לְאִישׁ
  english_pob_choice: to each one
  chosen_spanish: a cada uno
  alternatives_spanish:
  - a cada hombre
  - a cada persona
  lexicon: HALOT
  rationale: אִישׁ es singular masculino, pero aquí funciona distributivamente. 'A cada uno' mantiene la distribución sin forzar una formulación más marcada por género que oscurezca el sentido colectivo.
- source_word: עֵשֶׂב
  english_pob_choice: vegetation
  chosen_spanish: hierba
  alternatives_spanish:
  - vegetación
  - pasto
  - plantas
  lexicon: HALOT
  rationale: En esta combinación agrícola, 'hierba' es la opción breve y natural en español para el alimento/cobertura vegetal del campo.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el terreno
  - en la parcela
  lexicon: HALOT
  rationale: '''Campo'' reproduce con claridad el espacio agrícola general del hebreo.'
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La POB en español debe ser transparente con el nombre propio del pacto. 'Yahvé' conserva la decisión teológica y filológica de no ocultar el Tetragrámaton bajo un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor distributivo de לְאִישׁ
  english_pob_reading: to each one
  chosen_spanish_reading: a cada uno
  alternative_spanish_readings:
  - a cada hombre
  - a cada persona
  rationale: El hebreo usa un singular masculino representativo. Se mantiene la distribución sin neutralizar innecesariamente la forma del original ni introducir una lectura doctrinal distinta.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que prefirió 'latter rain' sobre 'spring rain' por mayor precisión léxica, y 'each one' sobre 'each man' por naturalidad; en español se conservó la precisión agrícola de 'lluvia tardía' y la distribución con 'a cada uno'. También se atendió la alternativa léxica de חֲזִיזִים ('storm clouds' / 'lightning flashes'), resolviéndola en favor de una imagen meteorológica natural en español.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente con el estándar POB en español.
  - Se evita 'SEÑOR' como máscara del nombre divino.
  - Se mantiene un registro bíblico contemporáneo, claro y reverente.
  - La cláusula final conserva la distribución individual del hebreo sin sobrecargarla con precisión possessiva no explícita.
