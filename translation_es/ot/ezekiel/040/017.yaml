revisions:
- from: Entonces me llevó al atrio exterior[a], y he aquí, había cámaras y un pavimento hecho para el atrio, todo alrededor, todo alrededor; treinta cámaras estaban sobre el pavimento.
  to: Entonces me llevó al atrio exterior[a], y he aquí, había aposentos y un pavimento hecho para el atrio, todo alrededor, todo alrededor; treinta aposentos estaban junto al pavimento.
  rationale: Se ajusta la relación espacial final para evitar el español engañoso «sobre el pavimento» y para reflejar mejor el valor relacional de אֶל en este contexto arquitectónico. También se cambia «cámaras» por «aposentos» para una lectura más natural y bíblicamente idiomática en español, manteniendo el mismo sentido fuente. La nota se conserva de forma más precisa y breve, anclada en el texto según el formato requerido.
