translation:
  language: es
  text: Ezequiel vio una visión[a], y describió las clases del carro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: “Ezequiel, quien vio una visión de gloria que le fue mostrada sobre un carro de querubines.” El hebreo es más breve y quizá preserve una redacción comprimida o incierta en “las clases del carro”.'
    reason: alternative_reading
lexical_decisions:
- source_word: וחזקאל
  english_pob_choice: Ezekiel
  chosen_spanish: Ezequiel
  alternatives_spanish:
  - Ezequiel el profeta
  lexicon: Nombre propio bíblico estándar
  rationale: Es un nombre propio; en español bíblico natural se usa la forma Ezequiel, equivalente al inglés POB y fiel al hebreo.
- source_word: ראה
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - vio claramente
  - contempló
  lexicon: HALOT
  rationale: El verbo hebreo simple ראה pide un pasado directo en español; 'vio' conserva la observación visual sin añadir intensidad no exigida.
- source_word: מראה
  english_pob_choice: a vision
  chosen_spanish: una visión
  alternatives_spanish:
  - una aparición
  - un espectáculo
  lexicon: HALOT
  rationale: En contexto profético, מראה remite a una visión profética; 'visión' mantiene ese valor y también concuerda con el paralelo griego ὅρασιν.
- source_word: ויגד
  english_pob_choice: described
  chosen_spanish: describió
  alternatives_spanish:
  - contó
  - declaró
  - relató
  lexicon: HALOT
  rationale: נגד en hifil puede significar 'contar/manifestar'; dado que el objeto es 'las clases del carro', 'describió' comunica mejor la idea de exponer sus rasgos o categorías, como en el audit trail inglés.
- source_word: זני
  english_pob_choice: the kinds of
  chosen_spanish: las clases de
  alternatives_spanish:
  - los tipos de
  - las formas de
  - los detalles del
  lexicon: HALOT
  rationale: El hebreo transmitido זני es inusual pero apunta a 'kinds/sorts'; 'clases' preserva esa noción de categorías o aspectos sin forzar una reconstrucción mayor.
- source_word: מרכבה
  english_pob_choice: the chariot
  chosen_spanish: el carro
  alternatives_spanish:
  - la carroza
  - el carro de guerra
  - el carro-trono
  lexicon: HALOT
  rationale: מרכבה literalmente es 'carro/chariot'. En español bíblico, 'carro' es claro y sobrio; evita importar 'carro-trono' al texto principal, dado que el hebreo conservado no explicita esa ampliación.
theological_decisions:
- issue: Relación entre el hebreo breve y el paralelo griego más explícito sobre la visión de gloria y los querubines
  english_pob_reading: Keep the Hebrew-based concise wording in the main text while allowing the Greek to inform the sense of 'vision.'
  chosen_spanish_reading: Mantener en el texto principal la redacción breve basada en el hebreo, dejando el testimonio griego como nota explicativa.
  alternative_spanish_readings:
  - Ezequiel vio una visión de gloria que le fue mostrada sobre un carro de querubines.
  - Ezequiel vio una visión y describió el carro de los querubines.
  rationale: La política del proyecto da prioridad al hebreo conservado de Sirácides cuando está disponible, pero el paralelo griego ayuda a perfilar el sentido. Aquí el hebreo es más corto y quizá comprimido en זני; por eso no se introduce en el cuerpo una expansión teológica no explicitada por el hebreo, aunque la nota recoge el griego más completo.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde Sirácides sobrevive; usar el griego como control y apoyo; preservar la ambigüedad textual cuando no se puede resolver con certeza.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el pasaje fue verificado en el pase más reciente como unchanged.
  spanish_consistency_notes:
  - Se usó 'Ezequiel' como nombre propio estándar y 'visión' para מראה, en línea con el registro profético.
  - '''Carro'' mantiene el valor literal de מרכבה sin anticipar la expansión interpretativa del paralelo griego.'
  - '''Clases de'' conserva la rareza semántica de זני, evitando resolverla demasiado y respetando la tensión textual documentada.'
