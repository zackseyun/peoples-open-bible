  yaml_path: translation/ot/2_samuel/019/027.yaml
  text: And he has slandered your servant to my lord the king[a], for your servant said, ‘I will saddle the donkey for myself so that I may ride on it and go with the king,’ because your servant is lame.
  footnotes:
