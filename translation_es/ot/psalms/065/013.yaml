    reason: lexical_alternative
  revision_rationale: Se ajusta מִדְבָּר a una expresión que evita la imagen demasiado específica de un desierto arenoso y mantiene el marco de terreno silvestre de pastoreo. Se devuelve al verbo principal una imagen más cercana a 'drip' ('gotean') y se preserva en nota la alternativa de abundancia ('rebosan') conforme al expediente inglés. Se cambia 'se ciñen de' por 'se ciñen con' para mayor naturalidad, y 'regocijo' aproxima mejor el sustantivo גִיל que la más genérica 'alegría' sin perder legibilidad.
