  rationale: 'Se aplica una corrección menor de estilo y fidelidad idiomática: «ante sus propios ojos» expresa de forma más natural en español el hebreo בְּעֵינָיו y preserva mejor la tensión teológica documentada por la POB inglesa. La nota se ajusta en paralelo para conservar consistencia estilística.'
