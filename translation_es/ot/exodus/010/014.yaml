translation:
  language: es
  text: Y las langostas subieron sobre toda la tierra de Egipto y se posaron por todo el territorio de Egipto, muy grave[a]; nunca antes había habido langostas como ellas, ni después de ellas volverá a haber algo semejante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «muy pesado». La expresión describe la invasión de langostas como extraordinariamente intensa o grave.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: came up
  chosen_spanish: subieron
  alternatives_spanish:
  - vinieron
  - ascendieron
  lexicon: HALOT
  rationale: עלה conserva la imagen de movimiento ascendente o de irrupción. En español, 'subieron' mantiene esa imagen sin sonar forzado en el contexto de la plaga.
- source_word: הָאַרְבֶּה
  english_pob_choice: the locusts
  chosen_spanish: los saltamontes
  alternatives_spanish:
  - las langostas
  - la plaga de langostas
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo; el inglés POB opta por plural colectivo. En español, 'saltamontes' comunica el insecto devastador en un registro más neutral y evita el tropo eclesiástico de 'langostas' si se quiere dejar abierto el sentido zoológico-colectivo.
- source_word: עַל כָּל אֶרֶץ מִצְרַיִם
  english_pob_choice: over all the land of Egypt
  chosen_spanish: sobre toda la tierra de Egipto
  alternatives_spanish:
  - sobre toda la tierra de Egipto
  - por toda la tierra de Egipto
  lexicon: HALOT
  rationale: אֶרֶץ aquí es territorio nacional, no 'tierra' en sentido cosmológico. 'Tierra de Egipto' conserva el paralelo directo con el hebreo y la formulación auditable del POB inglés.
- source_word: וַיָּנַח
  english_pob_choice: settled
  chosen_spanish: se posaron
  alternatives_spanish:
  - se asentaron
  - descansaron
  lexicon: HALOT
  rationale: נוח describe la llegada a reposo. Para insectos, 'se posaron' reproduce el efecto de asentarse sobre el territorio con naturalidad en español.
- source_word: בְּכֹל גְּבוּל מִצְרָיִם
  english_pob_choice: within all the territory of Egypt
  chosen_spanish: dentro de todo el territorio de Egipto
  alternatives_spanish:
  - en todo el territorio de Egipto
  - a lo largo de todos los límites de Egipto
  lexicon: HALOT
  rationale: גְּבוּל puede significar límite, frontera o territorio. Siguiendo la decisión inglesa de captar la extensión distributiva, 'dentro de todo el territorio' expresa la cobertura total sin reducirlo a una mera línea fronteriza.
- source_word: כָּבֵד מְאֹד
  english_pob_choice: very severe
  chosen_spanish: muy pesados[a]
  alternatives_spanish:
  - muy graves
  - sumamente pesados
  lexicon: HALOT
  rationale: כָּבֵד significa literalmente 'pesado'. La POB inglesa retuvo la tensión semántica con una nota, evitando añadir 'swarm'. En español, 'muy pesados' preserva la metáfora física; la nota explica que el hebreo describe la invasión como extraordinariamente grave o pesada.
- source_word: לֹא הָיָה כֵן אַרְבֶּה כָּמֹהוּ
  english_pob_choice: Never before had there been locusts like it
  chosen_spanish: nunca antes había habido saltamontes como ellos
  alternatives_spanish:
  - nunca antes hubo saltamontes como ellos
  - jamás había habido nada semejante entre los saltamontes
  lexicon: HALOT
  rationale: La comparación se refiere a la plaga como colectividad. 'Como ellos' conserva el referente plural del español, alineado con el plural colectivo ya introducido.
- source_word: וְאַחֲרָיו לֹא יִהְיֶה כֵן
  english_pob_choice: nor will there be again after it
  chosen_spanish: ni después de ellos volverá a haber así
  alternatives_spanish:
  - ni después habrá algo así
  - ni volverá a haber algo semejante después
  lexicon: HALOT
  rationale: 'La clausula final completa el paralelismo temporal: incomparable antes e incomparable después. ''Volverá a haber así'' conserva el valor comparativo general del hebreo sin forzar un sustantivo inexistente en el texto.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el tramo auditado del POB inglés, pero ajusta la imagen idiomática al español: mantiene el verbo de ascenso para וַיַּעַל, conserva la idea de extensión total para בְּכֹל גְּבוּל מִצְרָיִם y preserva la tensión de כָּבֵד מְאֹד mediante una nota lexical en lugar de resolverla plenamente como ''severo'' o ''grave''.'
  spanish_consistency_notes:
  - Se usa 'Egipto' y 'tierra/territorio' de forma consistente con el hebreo אֶרֶץ / גְּבוּל.
  - Se evita 'SEÑOR' u otras sustituciones teológicas porque el versículo no contiene el Nombre divino.
  - Se mantiene una equivalencia colectiva para el sustantivo singular hebreo אַרְבֶּה, reflejándolo en plural español por claridad lectora.
  - La nota[a] preserva la tensión léxica de כָּבֵד מְאֹד en lugar de ocultarla con una paráfrasis interpretativa.
