source:
  edition: SBLGNT
  text: οὐ γὰρ ἐκάλεσεν ἡμᾶς ὁ θεὸς ἐπὶ ἀκαθαρσίᾳ ἀλλ’ ἐν ἁγιασμῷ.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/004/007.yaml
  text: For God did not call us for uncleanness[b][a], but in holiness.
  footnotes:
  - marker: a
    text: Or 'for impurity.' The Greek term can denote moral impurity, especially sexual impurity in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'in sanctification.' The Greek can refer to holiness as a state or to sanctification as the process of being made holy.
    reason: lexical_alternative
translation:
  language: ko
  text: 하나님께서는 우리를 부정함[a]을 위하여 부르신 것이 아니라, 거룩함[b] 가운데 부르셨기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「불결함」. 본 문맥에서는 도덕적·성적 부정을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「성화 가운데」. 헬라어는 거룩한 상태와 거룩하게 되어가는 과정 모두를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάλεσεν ἡμᾶς ὁ θεὸς ἐπὶ ἀκαθαρσίᾳ
  english_pob_choice: God did not call us for uncleanness
  chosen_korean: 하나님께서는 우리를 부정함을 위하여 부르신 것이 아니라
  alternatives_korean:
  - 우리를 더러움에 이르도록 부르신 것이 아니라
  - 우리를 부정함에로 부르신 것이 아니라
  lexicon: BDAG
  rationale: ἐπί + 여격은 부르심의 목적·결과 영역. 「~을 위하여」가 한국어 자연 흐름과 신학적 무게를 함께 담는다.
- source_word: ἐν ἁγιασμῷ
  english_pob_choice: in holiness
  chosen_korean: 거룩함 가운데
  alternatives_korean:
  - 거룩 안에서
  - 성화 가운데
  lexicon: BDAG
  rationale: ἐν의 처소·영역 의미를 「가운데」로 보존한다. 4:3과 어휘 일관성.
