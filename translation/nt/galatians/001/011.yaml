id: GAL.1.11
reference: Galatians 1:11
source:
  edition: SBLGNT
  text: Γνωρίζω ⸀γὰρ ὑμῖν, ἀδελφοί, τὸ εὐαγγέλιον τὸ εὐαγγελισθὲν ὑπ’ ἐμοῦ ὅτι οὐκ ἔστιν κατὰ ἄνθρωπον·
translation:
  text: For I make known to you[a], brothers[b], that the gospel proclaimed by me is not according to man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or brothers and sisters
    reason: lexical_alternative
  - marker: b
    text: Literally not according to man; the phrase may also mean not according to human standards.
    reason: lexical_alternative
lexical_decisions:
- source_word: Γνωρίζω
  chosen: I want you to know
  alternatives:
  - I make known to you
  - I inform you
  lexicon: BDAG
  rationale: Though the verb literally means 'make known,' this clause functions idiomatically as a discourse marker introducing an important clarification. 'I want you to know' preserves the force in natural modern English without adding content.
- source_word: γὰρ
  chosen: For
  alternatives:
  - Now
  - Indeed
  lexicon: BDAG
  rationale: γάρ gives the reason or explanation for the preceding discussion, and 'For' best preserves that connective force.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and, in Pauline usage, often addresses the whole believing community. Per doctrine, the main text stays gender-accurate with 'brothers,' while the inclusive sense is preserved in a footnote.
- source_word: εὐαγγέλιον
  chosen: gospel
  alternatives:
  - good news
  lexicon: BDAG
  rationale: '''Gospel'' is the standard concise rendering here and communicates the technical Pauline sense more precisely than the broader ''good news.'''
- source_word: τὸ εὐαγγελισθὲν ὑπ’ ἐμοῦ
  chosen: proclaimed by me
  alternatives:
  - preached by me
  - announced by me
  lexicon: BDAG
  rationale: The participle refers to Paul's act of proclaiming the gospel. 'Proclaimed by me' is clear, natural, and preserves the public heralding sense.
- source_word: κατὰ ἄνθρωπον
  chosen: of human origin
  alternatives:
  - according to man
  - according to human standards
  - humanly devised
  lexicon: BDAG
  rationale: 'This idiom most naturally points to source or derivation in context: Paul''s gospel is not derived from merely human origin. ''Of human origin'' communicates the sense clearly in modern English without overparaphrasing.'
