    text: O «su lugar». El hebreo tiene un sufijo femenino singular, literalmente «su lugar de ella», probablemente personificando la ciudad bajo juicio; algunas traducciones lo expresan de manera más impersonal.
    reason: alternative_reading
  revision_rationale: Se ajusta la frase verbal para lograr un español natural y fiel al sentido intensivo de כָּלָה יַעֲשֶׂה; se sustituye «la oscuridad» por «las tinieblas» para una imaginería profética más idiomática; y se afina la nota para explicar mejor el femenino singular hebreo y la posible personificación, manteniendo la ambigüedad deliberada del texto principal.
