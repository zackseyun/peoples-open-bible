translation:
  language: es
  text: Pero líbranos[a] por tu mano, y ayúdame, pues estoy sola y no tengo a nadie fuera de ti, Señor. Tú tienes conocimiento de todas las cosas,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «rescátanos» o «libéranos»; el griego pide una liberación urgente del peligro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ῥῦσαι
  english_pob_choice: rescue
  chosen_spanish: líbranos
  alternatives_spanish:
  - rescatarnos
  - salvarnos
  - libéranos
  lexicon: BDAG
  rationale: El verbo griego expresa una petición urgente de liberación de peligro. En español, «líbranos» conserva la súplica breve y natural en oración, y mantiene la fuerza implícita de rescate sin introducir un matiz doctrinal más amplio que «salvarnos».
- source_word: ἐν χειρί σου
  english_pob_choice: by your hand
  chosen_spanish: con tu mano
  alternatives_spanish:
  - por tu mano
  - en tu mano
  lexicon: LEH
  rationale: La expresión es idiomática y señala agencia o instrumento. «Con tu mano» comunica la acción divina de manera natural en español y conserva la imagen sin sonar rígido.
- source_word: βοήθησόν μοι
  english_pob_choice: help me
  chosen_spanish: ayúdame
  alternatives_spanish:
  - ven en mi ayuda
  - socórreme
  lexicon: BDAG
  rationale: Es la equivalencia más directa y natural para la súplica imperativa. Mantiene el tono de oración sin sobrecargar el registro.
- source_word: τῇ μόνῃ
  english_pob_choice: who am alone
  chosen_spanish: yo, que estoy sola
  alternatives_spanish:
  - la que estoy sola
  - la sola
  lexicon: LSJ
  rationale: El participio/dativo femenino describe a la hablante y su soledad. «Yo, que estoy sola» hace explícita la referencia a la primera persona y conserva el peso de aislamiento que el contexto exige.
- source_word: μὴ ἔχουσῃ εἰ μὴ σέ
  english_pob_choice: have no one except you
  chosen_spanish: no tengo a nadie excepto a ti
  alternatives_spanish:
  - no tengo a nadie sino a ti
  - no poseo a nadie más que a ti
  lexicon: BDAG
  rationale: La frase griega refuerza la absoluta falta de apoyo humano. «No tengo a nadie excepto a ti» reproduce esa exclusividad de manera clara y fiel en español.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  lexicon: BDAG
  rationale: En esta invocación a Dios, «Señor» es el equivalente reverente y natural en español. Mantiene el valor vocativo de Κύριε sin oscurecer el tono orante.
- source_word: πάντων γνῶσιν ἔχεις
  english_pob_choice: You have knowledge of all things
  chosen_spanish: Tú tienes conocimiento de todas las cosas
  alternatives_spanish:
  - Tú conoces todas las cosas
  - Tú posees conocimiento de todo
  lexicon: LEH
  rationale: La construcción griega combina el sustantivo «conocimiento» con el verbo «tener». «Tienes conocimiento de todas las cosas» preserva esa estructura más formal y no reduce de inmediato la frase al simple verbo «conocer».
theological_decisions:
- issue: Tratamiento de Κύριε como invocación divina
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: El contexto es una oración dirigida a Dios, así que la forma vocativa en español debe ser reverente y estándar. «Señor» mantiene la lectura devocional del texto sin atenuarla.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El texto inglés auditado no trae notas ni revisiones aplicadas; la traducción sigue de cerca el griego de Swete 1909 y conserva la sintaxis orante y la acumulación de dependencia personal sin añadir elementos no atestiguados.
  spanish_consistency_notes:
  - Se mantuvo el vocativo religioso «Señor» para Κύριε, en concordancia con el valor divino del contexto.
  - Se eligió «líbranos» para conservar la urgencia del verbo ῥῦσαι, y se explicó la alternativa en nota.
  - Se preservó la imagen instrumental de «con tu mano» sin sustituirla por una explicación más interpretativa.
  - Se evitó traducir mecánicamente «You know» porque el griego usa «tienes conocimiento»; por eso se mantuvo la estructura nominal en español.
