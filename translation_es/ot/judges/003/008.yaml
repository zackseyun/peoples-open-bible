review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo y sigue las decisiones principales del POB: «Yahvé», «los vendió», «sirvieron», «los hijos de Israel» y el topónimo transliterado. Sin embargo, no preserva con suficiente fidelidad el hebraísmo בְּיַד, porque «en mano de» suena antinatural en español; «en manos de» mantiene mejor la imagen y la claridad. Además, hay un desajuste de notas: la nota [a] en español comenta la ira encendida, pero en el texto [a] está anclada a «Israel»; y falta una nota para «los hijos de Israel», que sí está documentada en la auditoría inglesa.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero requiere pulido menor para naturalidad y consistencia editorial. «en mano de» debe corregirse a «en manos de». La colocación de notas debe rehacerse para que cada ancla corresponda al contenido de su nota. La transliteración «Cusán-risatáin» es legible, pero conviene una forma más estable y transparente como «Cusán-risataim» para representar mejor רִשְׁעָתַיִם sin sobreadaptación.
  glossary_alignment: 'Alineación buena en términos clave: יְהוָה > «Yahvé», וַיִּמְכְּרֵם > «los vendió», וַיַּעַבְדוּ > «sirvieron», בְנֵי יִשְׂרָאֵל > «los hijos de Israel». La única corrección terminológica relevante es ajustar בְּיַד a «en manos de» por fidelidad idiomática en español. Se conserva «Aram-naharaim» con nota alternativa apropiada.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada al lugar equivocado.
    rationale: En el texto, [a] aparece después de «Israel», pero la nota explica «la ira ... se encendió/ardió». El marcador debe ir sobre la expresión correspondiente o la nota debe eliminarse.
  - severity: medium
    issue: Falta la nota para «los hijos de Israel».
    rationale: La auditoría inglesa conserva una nota explicando que esta es la expresión hebrea literal frente a «los israelitas». Esa decisión significativa debe preservarse también en español.
  - severity: low
    issue: «en mano de» suena poco natural en español.
    rationale: Aunque intenta conservar בְּיַד, la forma idiomática comprensible y fiel en español es «en manos de», que mantiene la imagen sin sonar forzada.
  - severity: low
    issue: La forma «Cusán-risatáin» parece sobreadaptada.
    rationale: «Cusán-risataim» representa de manera más transparente el nombre hebreo רִשְׁעָתַיִם y evita una castellanización fonética innecesaria.
  revised_spanish_text: Entonces la ira de Yahvé se encendió[a] contra Israel, y los vendió en manos de Cusán-risataim, rey de Aram-naharaim[b]. Y los hijos de Israel[c] sirvieron a Cusán-risataim ocho años.
  revised_footnotes:
