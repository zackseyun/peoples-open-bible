translation:
  language: es
  text: 'Entonces me dijo: «Este es el lugar donde los sacerdotes cocerán el sacrificio por la culpa[a] y el sacrificio por el pecado, y donde hornearán la ofrenda vegetal, para no llevar las ofrendas al atrio exterior[b] para hacer santo al pueblo[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «ofrenda por la culpa» o «ofrenda de culpa». El hebreo אָשָׁם es una categoría sacrificial específica; «sacrificio por la culpa» mantiene su función cultual sin depender de una denominación eclesiástica fija.'
    reason: lexical_alternative
  - marker: b
    text: «Atrio exterior» conserva el término arquitectónico de Ezequiel; también podría decirse «patio exterior», pero «atrio» es más técnico en este contexto del templo.
    reason: lexical_alternative
  - marker: c
    text: 'También: «para consagrar al pueblo» o «para santificar al pueblo». El verbo hebreo significa hacer santo; en este contexto del templo puede implicar santidad transmitida por contacto con ofrendas sagradas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  english_pob_choice: Then he said to me
  chosen_spanish: Entonces me dijo
  alternatives_spanish:
  - Y me dijo
  - Luego me dijo
  lexicon: HALOT
  rationale: La secuencia narrativa del waw consecutivo se expresa con «entonces» para conservar el avance natural del relato en español sin añadir contenido interpretativo.
- source_word: זֶה הַמָּקוֹם
  english_pob_choice: This is the place
  chosen_spanish: Este es el lugar
  alternatives_spanish:
  - Este es el sitio
  - Este es el lugar señalado
  lexicon: HALOT
  rationale: «Lugar»/«lugar» es la forma más directa y natural para מָקוֹם; «sitio» sería posible, pero menos neutro en registro bíblico.
- source_word: יְבַשְּׁלוּ
  english_pob_choice: shall boil
  chosen_spanish: cocerán
  alternatives_spanish:
  - hervirán
  - cocinarán
  lexicon: HALOT
  rationale: En contexto sacrificial, בשל puede referirse a cocer por hervor o por cocción ritual. «Cocerán» mantiene precisión sin forzar en español moderno la imagen técnica de «hervirán».
- source_word: הָאָשָׁם
  english_pob_choice: the guilt offering
  chosen_spanish: el sacrificio por la culpa
  alternatives_spanish:
  - la ofrenda por la culpa
  - la ofrenda de culpa
  lexicon: HALOT
  rationale: Se evita el calco «holocausto» o traducciones tradicionales menos precisas. «Sacrificio por la culpa» comunica la función cultual de אָשָׁם con claridad en español amplio; se conserva la categoría sacrificial sin resolverla a un término eclesial fijo.
- source_word: הַחַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: el sacrificio por el pecado
  alternatives_spanish:
  - la ofrenda por el pecado
  - la ofrenda por el pecado / purificación
  lexicon: HALOT
  rationale: «Sacrificio por el pecado» sigue la categoría cultual de חַטָּאת y permite mantener el paralelismo con אָשָׁם. Se evita cerrar la tensión entre pecado y purificación, que el término hebreo puede abarcar según contexto.
- source_word: אֲשֶׁר יֹאפוּ אֶת הַמִּנְחָה
  english_pob_choice: and where they shall bake the grain offering
  chosen_spanish: y donde cocerán la ofrenda vegetal
  alternatives_spanish:
  - y donde hornearán la ofrenda vegetal
  - y donde cocerán la ofrenda de cereal
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacerdotal se traduce de forma funcional como «ofrenda vegetal», evitando un término que en español actual podría sonar demasiado técnico o regional. «Cocerán» mantiene paralelismo con el primer verbo y no obliga a decidir entre hornear y cocer cuando el hebreo solo indica preparación culinaria.
- source_word: לְבִלְתִּי הוֹצִיא אֶל הֶחָצֵר הַחִיצוֹנָה
  english_pob_choice: so as not to bring them out into the outer court
  chosen_spanish: para no sacarlos al atrio exterior
  alternatives_spanish:
  - para no llevarlos al atrio exterior
  - a fin de no sacarlos al patio exterior
  lexicon: HALOT
  rationale: 'El complemento directo queda sobreentendido por el contexto: las ofrendas mencionadas. «Sacarlos» conserva la referencia implícita sin añadir un pronombre o sustantivo explicativo innecesario. «Atrio exterior» reproduce el término arquitectónico usado en Ezequiel; «patio» sería más general y menos técnico.'
- source_word: לְקַדֵּשׁ אֶת הָעָם
  english_pob_choice: to make the people holy
  chosen_spanish: para hacer santo al pueblo
  alternatives_spanish:
  - para santificar al pueblo
  - para consagrar al pueblo
  lexicon: HALOT
  rationale: Se conserva la fuerza causal de קָדַשׁ en hiphil con «hacer santo», que refleja mejor la idea de transmisión de santidad que «consagrar» en español puede sugerir de manera más institucional. «Pueblo» mantiene el objeto colectivo del texto.
theological_decisions:
- issue: Transmisión de santidad en לְקַדֵּשׁ אֶת הָעָם
  english_pob_reading: The clause refers to preventing the offerings from being taken into the outer court in a way that would transmit sanctity to the people.
  chosen_spanish_reading: La cláusula se entiende como prevención de que las ofrendas salgan al atrio exterior de modo que su santidad se comunique al pueblo.
  alternative_spanish_readings:
  - para no profanar al pueblo
  - para evitar contacto indebido con cosas santas sin énfasis en transmisión de santidad
  rationale: El contexto inmediato es cultual y arquitectónico; la finalidad del espacio de cocción es evitar que las ofrendas sean trasladadas a un área menos restringida donde la santidad pudiera transmitirse por contacto. Se preserva así la tensión teológica del verbo sin convertirlo en una explicación doctrinal posterior.
  doctrine_reference: Translation philosophy §3; mantener la tensión teológica en lugar de resolverla
- issue: Elección de vocabulario sacrificial para אָשָׁם y חַטָּאת
  english_pob_reading: guilt offering / sin offering
  chosen_spanish_reading: sacrificio por la culpa / sacrificio por el pecado
  alternative_spanish_readings:
  - ofrenda por la culpa / ofrenda por el pecado
  - sacrificio de reparación / ofrenda por expiación
  rationale: En español, «sacrificio» hace explícita la categoría ritual sin imponer una terminología litúrgica tradicional distinta. Se conserva el paralelismo del verso y la diferencia entre ambos tipos de ofrenda, sin fusionarlos bajo un solo término general.
  doctrine_reference: 'Lexical policy: mantener categorías cultuales diferenciadas'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audio-trail inglés, manteniendo la cláusula final como propósito directo («para hacer santo al pueblo») y evitando añadidos interpretativos como «por consiguiente» o «de este modo». La versión española también conserva la estructura del paralelismo sacrificial y el cierre final de propósito.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el Tetragrámaton.
  - Se usa «sacrificio» para las categorías cultuales אָשָׁם y חַטָּאת para preservar su carácter ritual y la distinción lexical.
  - «Atrio exterior» sigue la terminología arquitectónica de Ezequiel de manera coherente con otras secciones del templo visionario.
  - «Hacer santo» se conserva como reflejo del hiphil de קדש, evitando neutralizar la posible transmisión de santidad.
