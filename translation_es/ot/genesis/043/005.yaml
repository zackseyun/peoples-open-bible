translation:
  language: es
  text: 'Pero si no lo envías, no descenderemos, porque el hombre nos dijo: «No verán mi rostro[a], a menos que su hermano esté con ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «No verán mi rostro», un modismo que significa presentarse ante alguien o entrar en su presencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La forma condicional va con matiz adversativo por el contraste con la oferta anterior; «Pero si» reproduce mejor esa fuerza que un simple «si».
- source_word: אֵינְךָ מְשַׁלֵּחַ
  english_pob_choice: you will not send him
  chosen_spanish: no lo despides
  alternatives_spanish:
  - no lo enviarás
  - no estás despidiéndolo
  lexicon: HALOT
  rationale: El hebreo expresa una negativa ligada a la decisión del padre; en español, el presente de valor prospectivo «no lo despides» comunica bien la negativa condicionada sin forzar un futuro mecánico. «Lo» retoma el referente implícito del contexto.
- source_word: לֹא נֵרֵד
  english_pob_choice: we will not go down
  chosen_spanish: no descenderemos
  alternatives_spanish:
  - no bajaremos
  lexicon: HALOT
  rationale: «Descenderemos» conserva el verbo del movimiento hacia Egipto sin perder naturalidad; «bajaremos» sería también posible, pero algo menos solemne.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la negativa; «porque» es la equivalencia más clara y directa en español.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - ese hombre
  lexicon: HALOT
  rationale: Se conserva la referencia genérica y no identificada desde la perspectiva de los hermanos. «El hombre» mantiene esa distancia narrativa.
- source_word: אָמַר אֵלֵינוּ
  english_pob_choice: said to us
  chosen_spanish: nos dijo
  alternatives_spanish:
  - nos habló
  - nos habló diciendo
  lexicon: HALOT
  rationale: «Nos dijo» reproduce de forma natural la introducción del discurso directo y evita una perífrasis innecesaria.
- source_word: לֹא תִרְאוּ פָנַי
  english_pob_choice: You will not see my face
  chosen_spanish: No verán mi rostro[a]
  alternatives_spanish:
  - No verán mi cara[a]
  - No se presentarán ante mí
  lexicon: HALOT
  rationale: «Rostro» conserva el idiomático «ver la faz/rostro» con dignidad y claridad; aunque el hebreo dice literalmente «mi פנים», la imagen de presencia o audiencia se mantiene. Se evita «aparecer ante mí» en el texto principal para no perder la metáfora source-grounded.
- source_word: בִּלְתִּי
  english_pob_choice: unless
  chosen_spanish: sino con
  alternatives_spanish:
  - a menos que
  - excepto si
  lexicon: HALOT
  rationale: En esta construcción el sentido es condicional-exceptivo. «Sino con» expresa de forma idiomática en español la condición indispensable sin alejarse del valor de exclusión del hebreo.
- source_word: אֲחִיכֶם
  english_pob_choice: your brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - vuestro hermano
  - el hermano de ustedes
  lexicon: HALOT
  rationale: El hebreo conserva el singular genérico sin nombrar a Benjamín. En español, «su hermano» mantiene el referente implícito y fluye en el marco de tratamiento plural.
- source_word: אִתְּכֶם
  english_pob_choice: is with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - está con ustedes
  - entre ustedes
  lexicon: HALOT
  rationale: El hebreo es nominal y el español puede omitir el verbo sin pérdida de sentido. «Con ustedes» conserva la concisión de la cláusula final y el matiz de compañía requerida.
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado de la POB inglesa: se mantiene la fuerza condicional-adversativa de וְאִם, la referencia implícita a Benjamín, y el modismo de «ver mi rostro» con una nota explicativa equivalente a la inglesa. No se detectaron revisiones aplicadas en el pasaje base.'
  spanish_consistency_notes:
  - Se mantuvo el referente implícito sin añadir «Benjamín» al texto principal.
  - Se conservó la imagen corporal de «rostro» para reflejar el modismo hebreo.
  - El registro es bíblico contemporáneo, con puntuación y comillas españolas.
  - La solución «sino con» expresa en español la exclusión/condición de בִּלְתִּי sin volverse literalista.
