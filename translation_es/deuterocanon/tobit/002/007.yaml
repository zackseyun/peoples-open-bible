  to: Y lloré. Y cuando el sol se puso, fui, cavé y lo enterré.
  rationale: Se ajusta «me fui» a «fui» para reflejar con más neutralidad ᾠχόμην y se simplifica la cláusula temporal para un español más natural, sin alterar el sentido ni añadir información ausente del griego.
