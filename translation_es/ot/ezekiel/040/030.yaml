translation:
  language: es
  text: 'Y había vestíbulos[a] alrededor, alrededor: veinticinco codos de largo y cinco codos de ancho.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pórticos» o «porches» para el término arquitectónico traducido aquí como «vestíbulos».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלַמּוֹת
  english_pob_choice: vestibules
  chosen_spanish: vestíbulos
  alternatives_spanish:
  - pórticos
  - porches
  - vestíbulos arquitectónicos
  lexicon: HALOT
  rationale: El término hebreo nombra una estructura arquitectónica del complejo del templo. «Vestíbulos» conserva el matiz de acceso/antecámara y evita el posible sonido doméstico de «porches». Se mantiene el plural como en el hebreo y en la audit trail inglesa.
- source_word: סָבִיב סָבִיב
  english_pob_choice: all around, all around
  chosen_spanish: todo alrededor, todo alrededor
  alternatives_spanish:
  - alrededor, alrededor
  - en derredor, en derredor
  - por todos lados
  lexicon: HALOT
  rationale: La duplicación en hebreo es enfática y distributiva. Repetirla en español preserva esa insistencia, en lugar de comprimirla en una sola expresión.
- source_word: אֹרֶךְ
  english_pob_choice: long
  chosen_spanish: de largo
  alternatives_spanish:
  - largo
  - en longitud
  lexicon: HALOT
  rationale: 'Se vierte adverbialmente en una frase de medida para que el español suene natural: «veinticinco codos de largo». Mantiene el valor dimensional sin añadir paráfrasis.'
- source_word: חָמֵשׁ וְעֶשְׂרִים אַמָּה
  english_pob_choice: twenty-five cubits
  chosen_spanish: veinticinco codos
  alternatives_spanish:
  - cinco y veinte codos
  - veinticinco codos de medida
  lexicon: HALOT
  rationale: Se usa el orden numérico normal del español moderno. «Codos» conserva la unidad antigua estándar, sin convertirla a unidades modernas.
- source_word: רֹחַב
  english_pob_choice: wide
  chosen_spanish: de ancho
  alternatives_spanish:
  - ancho
  - en anchura
  lexicon: HALOT
  rationale: Como con «de largo», se elige una construcción natural en español para expresar la medida paralela del texto.
- source_word: חָמֵשׁ אַמּוֹת
  english_pob_choice: five cubits
  chosen_spanish: cinco codos
  alternatives_spanish:
  - cinco codos de ancho
  - cinco codos en anchura
  lexicon: HALOT
  rationale: Se mantiene la literalidad de la medida y la concordancia plural normal en español.
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante/vocalizado del WLC y la auditoría inglesa sin cambios de revisión pendientes; la única tensión relevante es el término arquitectónico אֵלַמּוֹת, resuelta en español con «vestíbulos» y una nota alternativa conservando opciones semánticas cercanas.
  spanish_consistency_notes:
  - Se preservó la repetición enfática de סָבִיב סָבִיב con una duplicación equivalente en español.
  - Se mantuvo la unidad antigua «codos» para no introducir una conversión no presente en la fuente.
  - La puntuación con dos puntos refleja la estructura descriptiva del hebreo y de la versión inglesa auditada.
