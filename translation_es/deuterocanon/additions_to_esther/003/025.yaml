translation:
  language: es
  text: Y tú sabes que yo aborrecí la gloria de los que no tienen ley, y aborrezco el lecho[a] de los incircuncisos y de todo extranjero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el lecho matrimonial» o «la unión sexual»; el griego «lecho» puede funcionar como metonimia de relaciones matrimoniales o sexuales.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμίσησα
  english_pob_choice: I hated
  chosen_spanish: yo aborrecí
  alternatives_spanish:
  - yo odié
  - yo he aborrecido
  lexicon: BDAG
  rationale: El aoristo expresa una acción pasada; «aborrecí» conserva la fuerza de «hated» sin debilitarla. «Odié» es posible, pero «aborrecer» suena más solemne y reproduce mejor la intensidad del contexto de oración.
- source_word: δόξαν
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el honor
  - el esplendor
  - el prestigio
  lexicon: BDAG
  rationale: Aquí δόξα puede indicar esplendor o rango. «Gloria» mantiene el registro elevado y coincide con la decisión inglesa de no reducirlo a mera reputación.
- source_word: ἀνόμων
  english_pob_choice: of the lawless
  chosen_spanish: de los sin ley
  alternatives_spanish:
  - de los impíos
  - de los malvados
  - de los transgresores
  lexicon: BDAG
  rationale: Se conserva la relación con νόμος mediante una expresión transparente en español. «Sin ley» reproduce el matiz lexical de «lawless» mejor que opciones más moralizantes como «impíos».
- source_word: βδελύσσομαι
  english_pob_choice: I abhor
  chosen_spanish: aborrezco
  alternatives_spanish:
  - detesto
  - aborrezco profundamente
  - me repugna
  lexicon: BDAG
  rationale: El verbo expresa fuerte repulsión. «Aborrezco» comunica esa intensidad de manera natural en español y corresponde al valor solemne de «abhor».
- source_word: κοίτην
  english_pob_choice: the bed
  chosen_spanish: el lecho
  alternatives_spanish:
  - la cama
  - el lecho matrimonial
  - la unión sexual
  lexicon: BDAG
  rationale: «Lecho» conserva la imagen de «bed» con un tono más bíblico y digno en español. Permite que la posible alusión marital o sexual permanezca implícita, como en el griego.
- source_word: ἀπεριτμήτων
  english_pob_choice: of the uncircumcised
  chosen_spanish: de los incircuncisos
  alternatives_spanish:
  - de los no circuncidados
  lexicon: BDAG
  rationale: La forma griega es un plural adjetival y se traduce literalmente. «Incircuncisos» es la forma más directa y reconocible en español bíblico.
- source_word: παντὸς ἀλλοτρίου
  english_pob_choice: of every foreigner
  chosen_spanish: de todo extranjero
  alternatives_spanish:
  - de todo forastero
  - de todo extraño
  - de todo ajeno
  lexicon: BDAG
  rationale: En este contexto, junto a «incircuncisos», ἀλλότριος apunta naturalmente a una persona de fuera. «Extranjero» es claro y mantiene la amplitud de «every foreigner».
theological_decisions:
- issue: Cómo reflejar el sentido de κοίτη sin explicitar de más la metáfora
  english_pob_reading: the bed
  chosen_spanish_reading: el lecho
  alternative_spanish_readings:
  - el lecho matrimonial
  - la unión sexual
  rationale: La imagen del texto fuente es suficientemente fuerte sin necesidad de concretarla. «El lecho» preserva la tensión entre imagen literal y posible referencia sexual, como en la lectura inglesa.
  doctrine_reference: 'Translation philosophy: optimal equivalence; no añadir especificidad interpretativa no exigida por el texto.'
- issue: Cómo preservar el matiz de ἀνόμων sin convertirlo en una categoría moral más amplia
  english_pob_reading: of the lawless
  chosen_spanish_reading: de los sin ley
  alternative_spanish_readings:
  - de los impíos
  - de los malvados
  rationale: «Sin ley» mantiene el vínculo léxico con νόμος y evita reemplazar una categoría textual precisa por otra más general. La decisión sigue la prioridad de transparencia original.
  doctrine_reference: Original-language primacy; conservar la fuerza lexical del término fuente.
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente, que indica que no se requerían cambios adicionales. La redacción española mantiene la sintaxis y el contraste aspectual del original: pasado para ἐμίσησα y presente para βδελύσσομαι.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando corresponde; este versículo no contiene el nombre divino.
  - Se conservó el paralelismo entre «aborrecí» y «aborrezco» para reflejar el cambio de aspecto verbal del griego.
  - Se eligió «lecho» para preservar la metáfora con posible sentido sexual sin sobreglosarla.
  - Se optó por «sin ley» para reproducir la transparencia de ἀνόμων, aunque «incircuncisos» se traduce literalmente para ἀπεριτμήτων.
