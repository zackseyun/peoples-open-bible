review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura del hebreo: comparación con aves, Yahvé de los Ejércitos como sujeto, protección de Jerusalén, y la cadena verbal final. También mantiene el eco pascual de פָּסֹחַ mediante una expresión de ''pasar''. Sin embargo, ''pasando por alto'' en español moderno suele significar ''ignorar/omitir'' y distorsiona la imagen de protección y liberación presente en el contexto y en la decisión inglesa ''passing over''.'
  spanish_quality_summary: 'El español es claro y digno, pero hay un ajuste importante de naturalidad y fidelidad semántica: ''pasando por alto'' introduce una acepción idiomática ajena al pasaje. Además, la nota alternativa ''saliendo de largo'' suena poco natural en español general. El resto del verso fluye bien y usa terminología del proyecto correctamente.'
  glossary_alignment: 'Se alinea bien con los términos base del proyecto: יְהוָה → ''Yahvé''; צְבָאוֹת → ''de los Ejércitos''; lenguaje verbal preservado con ''protegiendo'', ''librando'', ''rescatando''. No hay conflicto con Mesías/Cristo ni otros términos doctrinales. La única excepción a reparar es la formulación española de פָּסֹחַ para preservar el eco de Pascua sin caer en un modismo engañoso.'
  issues:
  - severity: medium
    issue: '''pasando por alto'' para פָּסֹחַ'
    rationale: Aunque formalmente puede reflejar 'passing over', en español actual normalmente significa 'ignorar' o 'omitir', lo que debilita o tergiversa el sentido de protección/salvación y el eco de la Pascua.
  - severity: low
    issue: Nota con alternativa 'saliendo de largo'
    rationale: La frase es poco idiomática en español neutro y no ayuda al lector a captar la alternativa semántica principal. Conviene usar opciones más naturales como 'pasando de largo' o 'perdonando'/'protegiendo' según la razón anotada.
  revised_spanish_text: 'Como aves que vuelan, así Yahvé de los Ejércitos protegerá a Jerusalén: protegiendo y librando, pasando de largo[a] y rescatando.'
  revised_footnotes:
  - marker: a
    text: O «perdonando» o «protegiendo»; el verbo hebreo también evoca el lenguaje de la Pascua en Éxodo.
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'pasando por alto' por 'pasando de largo' para conservar mejor el sentido de פָּסֹחַ y su eco de la Pascua sin activar el modismo moderno de 'ignorar/omitir'. También se ajusta la nota para ofrecer alternativas españolas más naturales y más cercanas a la explicación auditada del inglés ('sparing' o 'protecting'). No se requieren más cambios.
