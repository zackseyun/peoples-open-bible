translation:
  language: es
  text: En el santuario interior[a] hizo dos querubines de madera de olivo, cada uno de diez codos[b] de altura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «en el Lugar Santísimo».
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, «su altura era de diez codos»; el singular se entiende distributivamente, refiriéndose a cada uno de los dos querubines.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּדְּבִיר
  english_pob_choice: in the inner sanctuary
  chosen_spanish: en el santuario interior
  alternatives_spanish:
  - en el lugar santísimo
  - en el Santo de los Santos
  - en la cámara interior
  lexicon: HALOT
  rationale: דְּבִיר designa la cámara interior del templo; en español, «santuario interior» conserva el sentido arquitectónico y sagrado sin imponer de entrada una formulación técnica posterior. «Lugar santísimo» es posible, pero puede sonar más litúrgico que descriptivo.
- source_word: כְרוּבִים
  english_pob_choice: cherubim
  chosen_spanish: querubines
  alternatives_spanish:
  - querubines
  - querubines sagrados
  lexicon: HALOT
  rationale: El hebreo plural se refiere al ser celestial específico. En español, «querubines» mantiene el término bíblico y es más natural que transliterar «cherubim».
- source_word: עֲצֵי שָׁמֶן
  english_pob_choice: of olivewood
  chosen_spanish: de madera de olivo
  alternatives_spanish:
  - de madera de olivo
  - de olivo
  - de madera de aceituno
  lexicon: HALOT
  rationale: La expresión denota madera procedente del olivo. «Madera de olivo» comunica el material de forma clara y natural en español, sin perder la referencia botánica.
- source_word: עֶשֶׂר אַמּוֹת
  english_pob_choice: ten cubits
  chosen_spanish: de diez codos
  alternatives_spanish:
  - de diez codos
  - de diez codos de alto
  lexicon: HALOT
  rationale: אַמָּה corresponde al codo como medida antigua. Se conserva «codos» para reflejar fielmente la unidad de medida del texto.
- source_word: קוֹמָתוֹ
  english_pob_choice: each ten cubits high
  chosen_spanish: cada uno de ... de altura
  alternatives_spanish:
  - cada uno de ... de altura
  - su altura era de ...
  - cada uno medía ... de alto
  lexicon: HALOT
  rationale: El sufijo singular hebreo («su altura») funciona distributivamente respecto de los dos querubines. En español, «cada uno de diez codos de altura» expresa ese valor distributivo con claridad y sin forzar el singular.
theological_decisions:
- issue: Ubicación del objeto sagrado en el templo
  english_pob_reading: in the inner sanctuary
  chosen_spanish_reading: en el santuario interior
  alternative_spanish_readings:
  - en el lugar santísimo
  - en el Santo de los Santos
  rationale: La frase hebrea describe la cámara interior del templo. «Santuario interior» mantiene la referencia espacial y sagrada sin decidir más de lo necesario entre posibles equivalencias tradicionales.
  doctrine_reference: 1 Reyes 6:19-23; comparación terminológica con Éxodo 26:33-34
- issue: Número y referencia distributiva de la medida
  english_pob_reading: each ten cubits high
  chosen_spanish_reading: cada uno de diez codos de altura
  alternative_spanish_readings:
  - cada uno medía diez codos de alto
  - su altura era de diez codos
  rationale: El hebreo usa singular con sufijo, pero el sentido es distributivo para los dos querubines. El español elegido preserva ese valor sin ocultar la tensión gramatical.
  doctrine_reference: Principios de traducción literal-distributiva en contextos coordinados; cf. 1 Reyes 6:24
translation_notes:
  revision_awareness: 'Coincide con la lectura aprobada del POB inglés: ''in the inner sanctuary... each ten cubits high'', sin revisiones aplicadas en la pasada más reciente. Se mantiene la misma estructura semántica, con adaptación idiomática al español y preservando la nota distributiva de la medida.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; este versículo no lo contiene.
  - Se mantiene «querubines» como término bíblico técnico, evitando reemplazos por vocabulario devocional más libre.
  - La medida antigua se conserva como «codos» para coherencia con el registro bíblico y el audit trail en inglés.
  - «Santuario interior» evita una sobreinterpretación; si se optara por «lugar santísimo», sería una nota de equivalencia interpretativa, no una corrección del sentido básico.
