translation:
  language: es
  text: Una espada contra los adivinos[a], y se volverán necios; una espada contra sus guerreros[b], y quedarán consternados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los mentirosos». El hebreo בַּדִּים puede referirse de forma más amplia a habladores falsos o engañadores; aquí se eligió «adivinos» porque en Jeremías este grupo suele encuadrarse como pronosticadores engañosos.
    reason: lexical_alternative
  - marker: b
    text: O «y quedarán aterrados». El verbo hebreo puede abarcar temor, consternación o colapso, además de la idea de quedar abatidos.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶרֶב
  english_pob_choice: A sword is against
  chosen_spanish: Una espada contra
  alternatives_spanish:
  - La espada contra
  - Una espada está contra
  lexicon: HALOT
  rationale: En hebreo funciona como anuncio abreviado de juicio; en español, «Una espada contra» conserva la fuerza elíptica sin volver la frase antinatural. Se omite un verbo explícito porque el giro profético lo permite y la concisión del hebreo lo respalda.
- source_word: אֶל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - a
  - sobre
  lexicon: HALOT
  rationale: Aquí la preposición marca dirección hostil. «Contra» es el equivalente natural en español y preserva el valor adversativo del texto.
- source_word: הַבַּדִּים
  english_pob_choice: the diviners
  chosen_spanish: los adivinos
  alternatives_spanish:
  - los mentirosos
  - los falsos profetas
  - los habladores falsos
  lexicon: HALOT
  rationale: Sigo la decisión inglesa de leer בַּדִּים en este contexto babilónico como prognosticadores engañosos. «Adivinos» comunica bien esa función en español y evita reducirlo solo a «mentirosos», aunque esa posibilidad queda detrás del término hebreo.
- source_word: וְנֹאָלוּ
  english_pob_choice: and they will become fools
  chosen_spanish: y se volverán necios
  alternatives_spanish:
  - y actuarán neciamente
  - y quedarán como necios
  - y serán hechos necios
  lexicon: HALOT
  rationale: El hebreo expresa volverse o quedar necio, con ironía profética. «Se volverán necios» conserva ese cambio de estado mejor que una simple descripción de conducta.
- source_word: גִּבּוֹרֶיהָ
  english_pob_choice: her warriors
  chosen_spanish: sus guerreros
  alternatives_spanish:
  - sus valientes
  - sus héroes
  - sus hombres poderosos
  lexicon: HALOT
  rationale: En este contexto militar, «guerreros» es la equivalencia más clara y natural. Mantiene el referente colectivo y la fuerza del sustantivo hebreo.
- source_word: וָחָתּוּ
  english_pob_choice: and they will be dismayed
  chosen_spanish: y se acobardarán
  alternatives_spanish:
  - y serán consternados
  - y quedarán aterrados
  - y se desalentarán
  lexicon: HALOT
  rationale: Aunque חתת puede abarcar quebranto o consternación, la revisión inglesa fijó «dismayed». En español, «se acobardarán» transmite bien el colapso anímico y militar sin exagerar la imagen de destrucción física.
translation_notes:
  revision_awareness: La versión inglesa más reciente mantuvo «diviners» para בַּדִּים y cambió la última cláusula de «shattered» a «dismayed». Esta propuesta sigue esa revisión y refleja el matiz de חתת con una solución española menos física y más anímica.
  spanish_consistency_notes:
  - He mantenido «Yahvé» fuera del versículo porque no aparece en el texto hebreo de este versículo.
  - Conservo una sintaxis breve y profética para imitar la elipsis del hebreo sin volver la frase oscura.
  - «Adivinos» y «guerreros» siguen el registro bélico-oracular del contexto de Jeremías.
