  text: ὅτι καθὼς περισσεύει τὰ παθήματα τοῦ Χριστοῦ εἰς ἡμᾶς, οὕτως διὰ τοῦ Χριστοῦ περισσεύει καὶ ἡ παράκλησις ἡμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/001/005.yaml
  text: For just as the sufferings of Christ overflow to us, so also through Christ our comfort overflows.
  footnotes:
  - marker: a
    text: Or 'the sufferings for Christ.' The Greek may denote sufferings belonging to Christ or sufferings endured on his account.
    reason: alternative_reading
  - marker: b
    text: '''Christ'' may also be rendered ''Messiah'' where the title sense is foregrounded.'
    reason: lexical_alternative
translation:
  language: ko
  text: 메시아의 고난이 우리에게 넘치는 것같이, 우리의 위로도 메시아를 통하여 넘치기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παθήματα
  english_pob_choice: sufferings
  chosen_korean: 고난
  alternatives_korean:
  - 고통
  - 수난
  lexicon: BDAG
  rationale: παθήματα는 수난·고통의 경험을 가리키며, 환난(θλῖψις)의 외적 압박과 구별된다. 「고난」으로 옮긴다.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of Christ
  chosen_korean: 메시아의
  alternatives_korean:
  - 그리스도의
  lexicon: BDAG
  rationale: 본 절에서도 칭호의 무게가 살아 있으므로 「메시아」로 통일한다.
- source_word: περισσεύει
  english_pob_choice: overflow
  chosen_korean: 넘치다
  alternatives_korean:
  - 풍성하다
  lexicon: BDAG
  rationale: 동일 동사의 반복을 한국어 「넘치다」로 통일하여 평행 구조를 보존한다.
