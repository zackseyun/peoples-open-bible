  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה הִנְ/נִ֥י נֹתֵ֛ן לִ/נְבוּכַדְרֶאצַּ֥ר מֶֽלֶךְ בָּבֶ֖ל אֶת אֶ֣רֶץ מִצְרָ֑יִם וְ/נָשָׂ֨א הֲמֹנָ֜/הּ וְ/שָׁלַ֤ל שְׁלָלָ/הּ֙ וּ/בָזַ֣ז בִּזָּ֔/הּ וְ/הָיְתָ֥ה שָׂכָ֖ר לְ/חֵילֽ/וֹ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/029/019.yaml
  text: 'Therefore thus says the Lord GOD: Behold[a], I am giving the land of Egypt to Nebuchadnezzar king of Babylon, and he will carry off its multitude, plunder its spoil, and seize its booty; and it will be wages for his army.'
  footnotes:
