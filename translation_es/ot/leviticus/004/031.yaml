review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido del hebreo: quitar toda la grasa, conforme al procedimiento de los sacrificios de paz, quemarla en el altar como aroma aceptable para Yahvé, y luego la fórmula cultual de expiación y perdón. Sin embargo, hay dos desajustes relevantes con la evidencia y el rastro POB: (1) la nota [a] en español no corresponde a la nota inglesa, que preserva la alternativa para זֶבַח הַשְּׁלָמִים (''sacrificios/ofrendas de comunión'') y no para ''grasa''; (2) ''la víctima de los sacrificios de paz'' añade especificidad interpretativa (''víctima'') que el texto base y la decisión inglesa evitaron en el cuerpo principal.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorar en precisión y naturalidad cultual. 'La víctima de los sacrificios de paz' suena algo pesada y añade una noción no explícita; 'el sacrificio de paz' o mejor 'el sacrificio de las ofrendas de paz' es más fiel. La frase final 'le será perdonado' es comprensible, pero 'será perdonado' refleja mejor el resultado personal de וְנִסְלַח לוֹ y se alinea con el POB inglés.
  glossary_alignment: Se mantiene correctamente 'Yahvé' para יהוה. 'Grasa' para חֵלֶב, 'quemará' para וְהִקְטִיר, y 'aroma grato' para לְרֵיחַ נִיחֹחַ son aceptables. 'Hará expiación' es una opción española válida para כפר en este contexto, aunque 'hará expiación por él' debe mantenerse sin expansión. La principal corrección terminológica es devolver la nota alternativa a שְׁלָמִים ('ofrendas de comunión') y no a 'grasa'.
  issues:
  - severity: high
    issue: La nota [a] está anclada a 'grasa' pero el rastro POB la reserva para la alternativa de זֶבַח הַשְּׁלָמִים.
    rationale: La auditoría inglesa documenta la alternativa 'fellowship offerings' para la categoría sacrificial, no una alternativa textual principal sobre 'fat'. Reubicar la nota preserva la trazabilidad lexical del proyecto.
  - severity: medium
    issue: '''La víctima de los sacrificios de paz'' añade ''víctima'', ausente del hebreo y evitado por la decisión inglesa principal.'
    rationale: Aunque el contexto sacrificial involucra un animal, el hebreo dice 'sacrificio de las ofrendas de paz'. Añadir 'víctima' introduce interpretación innecesaria en el texto principal.
  - severity: medium
    issue: La formulación 'le será perdonado' es menos directa que 'será perdonado'.
    rationale: El hebreo expresa el resultado para la persona ('y él será perdonado'). 'Le será perdonado' en español puede sugerir elipsis del objeto del perdón; 'será perdonado' es más idiomático y cercano al POB inglés.
  revised_spanish_text: Y quitará toda su grasa, como se quita la grasa del sacrificio de las ofrendas de paz[a]; y el sacerdote la quemará sobre el altar, como aroma grato[b] para Yahvé. Y el sacerdote hará expiación por él, y será perdonado.
  revised_footnotes:
  - marker: a
    text: 'O: ''del sacrificio de las ofrendas de comunión''.'
    reason: lexical_alternative
  - marker: b
    text: 'Expresión sacrificial fija: literalmente, ''para aroma agradable''. Indica aceptación cultual ante Yahvé, no solo un olor físico.'
    reason: cultural_note
  revision_rationale: 'Se corrige la ubicación y el contenido de la nota lexical para que siga la auditoría POB: la alternativa corresponde a שְׁלָמִים, no a ''grasa''. También se elimina ''víctima'', que añadía interpretación no explícita, y se ajusta la cláusula final a ''será perdonado'' para reflejar mejor el resultado personal del hebreo y la redacción del POB inglés.'
