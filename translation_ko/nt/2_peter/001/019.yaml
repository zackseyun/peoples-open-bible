id: 2PE.1.19
reference: 2 Peter 1:19
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἔχομεν βεβαιότερον τὸν προφητικὸν λόγον, ᾧ καλῶς ποιεῖτε προσέχοντες ὡς λύχνῳ φαίνοντι ἐν αὐχμηρῷ τόπῳ, ἕως οὗ ἡμέρα διαυγάσῃ καὶ φωσφόρος ἀνατείλῃ ἐν ταῖς καρδίαις ὑμῶν·
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/001/019.yaml
  text: And we have the prophetic word more certain[a], to which you do well to pay attention as to a lamp shining in a dark place[b], until the day dawns and the morning star rises in your hearts.
  footnotes:
  - marker: a
    text: Or 'And we have the prophetic word more sure.' The Greek can be understood either as the prophetic word being confirmed by the apostolic witness, or as emphasizing the prophetic word's sure character.
    reason: alternative_reading
  - marker: b
    text: '''Morning star'' may echo a Messianic image; compare Rev 22:16.'
    reason: cross_reference
translation:
  language: ko
  text: 또한 우리에게는 더욱 확실하게 된 예언의 말씀이 있으니, 여러분이 어두운 곳에 비치는 등불 같이 거기에 주의를 기울이는 것은 잘하는 일입니다 — 날이 새고 샛별이 여러분의 마음 속에 떠오를 때까지.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: βεβαιότερον τὸν προφητικὸν λόγον
  english_pob_choice: the prophetic word more certain
  chosen_korean: 더욱 확실하게 된 예언의 말씀
  alternatives_korean:
  - 더욱 확고한 예언의 말씀
  lexicon: BDAG
  rationale: 비교급 βεβαιότερον의 강조를 살린다. 사도적 증언이 예언의 말씀을 더욱 확증한다는 함의도 포섭한다.
- source_word: φωσφόρος
  english_pob_choice: morning star
  chosen_korean: 샛별
  alternatives_korean:
  - 새벽별
  - 계명성
  lexicon: BDAG
  rationale: 새벽을 알리는 별. 메시아적 이미지(계 22:16)와 호응.
- source_word: αὐχμηρῷ τόπῳ
  english_pob_choice: dark place
  chosen_korean: 어두운 곳
  alternatives_korean:
  - 음침한 곳
  - 메마른 곳
  lexicon: BDAG
  rationale: αὐχμηρός는 본래 「메마른·음침한」을 뜻하나, 문맥상 빛에 대비되는 어둠을 표현.
