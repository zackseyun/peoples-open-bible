  text: וְ/נֽוֹדְעָה֙ הַֽ/חַטָּ֔את אֲשֶׁ֥ר חָטְא֖וּ עָלֶ֑י/הָ וְ/הִקְרִ֨יבוּ הַ/קָּהָ֜ל פַּ֤ר בֶּן בָּקָר֙ לְ/חַטָּ֔את וְ/הֵבִ֣יאוּ אֹת֔/וֹ לִ/פְנֵ֖י אֹ֥הֶל מוֹעֵֽד־׃
