translation:
  language: es
  text: He aquí[a], yo envío a mi mensajero, y él allanará el camino delante de mí. Y de pronto vendrá a su templo el Señor a quien ustedes buscan, y el mensajero del pacto en quien ustedes se complacen. He aquí, él viene[b], dice Yahvé de los Ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi ángel» / «el ángel del pacto»; la palabra hebrea מַלְאָךְ puede significar tanto «mensajero» como «ángel».
    reason: lexical_alternative
  - marker: b
    text: 'Traducción tradicional: «Yahvé de las Huestes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: ¡Miren!, Yo estoy
  alternatives_spanish:
  - ¡He aquí!
  - Miren, yo estoy
  lexicon: HALOT
  rationale: La partícula deíctica expresa anuncio enfático e inminente. «Miren» conserva el tono profético y es natural en español; se mantiene la primera persona explícita para reflejar el hebreo.
- source_word: שֹׁלֵחַ
  english_pob_choice: sending
  chosen_spanish: estoy enviando
  alternatives_spanish:
  - voy a enviar
  - envío
  lexicon: HALOT
  rationale: El participio con הִנְנִי comunica acción en curso con certeza o inminencia. El progresivo español reproduce mejor esa vividez que un futuro simple.
- source_word: מַלְאָכִי
  english_pob_choice: my messenger
  chosen_spanish: mi mensajero
  alternatives_spanish:
  - mi ángel
  lexicon: HALOT
  rationale: En este contexto la función de preparación del camino favorece «mensajero». Se conserva «ángel» como alternativa lexical posible, pero no como texto principal.
- source_word: וּפִנָּה
  english_pob_choice: and he will clear
  chosen_spanish: allanará
  alternatives_spanish:
  - preparará
  - limpiará el camino
  lexicon: HALOT
  rationale: El verbo implica dejar listo el camino quitando obstáculos. «Allanar» comunica bien esa idea en español sin perder la imagen de preparación.
- source_word: דֶרֶךְ לְפָנָי
  english_pob_choice: the way before me
  chosen_spanish: el camino delante de mí
  alternatives_spanish:
  - el camino ante mí
  - la senda delante de mí
  lexicon: HALOT
  rationale: «Delante de mí» conserva la relación espacial y la primera persona divina. «Camino» es el equivalente más natural y fiel al sustantivo hebreo.
- source_word: וּפִתְאֹם
  english_pob_choice: And suddenly
  chosen_spanish: Y de pronto
  alternatives_spanish:
  - Y súbitamente
  - Y repentinamente
  lexicon: HALOT
  rationale: El adverbio marca irrupción inesperada. «De pronto» es una correspondencia idiomática clara en español y mantiene la abrupta transición.
- source_word: יָבֹוא אֶל הֵיכָלוֹ
  english_pob_choice: will come to his temple
  chosen_spanish: vendrá a su templo
  alternatives_spanish:
  - entrará en su templo
  - vendrá a su palacio/templo
  lexicon: HALOT
  rationale: En contexto cultual, הֵיכָל corresponde a «templo». El futuro español expresa la venida sin añadir interpretación adicional.
- source_word: הָאָדוֹן
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el amo
  - el dueño
  lexicon: HALOT
  rationale: «Señor» conserva el carácter de título elevado y es la forma más natural en español para este personaje esperado; «amo» o «dueño» rebajan indebidamente el registro.
- source_word: אֲשֶׁר אַתֶּם מְבַקְשִׁים
  english_pob_choice: whom you seek
  chosen_spanish: a quien ustedes buscan
  alternatives_spanish:
  - a quien ustedes están buscando
  - a quien buscan
  lexicon: HALOT
  rationale: El participio expresa una búsqueda continua o habitual; en español «buscan» transmite bien esa disposición sin sonar forzado. Se mantiene el objeto personal con «a quien».
- source_word: וּמַלְאַךְ הַבְּרִית
  english_pob_choice: and the messenger of the covenant
  chosen_spanish: y el mensajero del pacto
  alternatives_spanish:
  - y el ángel del pacto
  - y el mensajero de la alianza
  lexicon: HALOT
  rationale: Se elige «pacto» para reflejar el término bíblico de relación obligante y porque es el equivalente más transparente en este marco. «Mensajero» conserva la ambigüedad entre función humana o celestial sin resolverla.
- source_word: אֲשֶׁר אַתֶּם חֲפֵצִים
  english_pob_choice: in whom you delight
  chosen_spanish: en quien ustedes se complacen
  alternatives_spanish:
  - en quien ustedes se deleitan
  - a quien ustedes desean
  lexicon: HALOT
  rationale: חפץ puede expresar deleite, agrado o deseo. «Se complacen» evita un matiz meramente sensual y preserva la preferencia positiva del sujeto.
- source_word: הִנֵּה בָא
  english_pob_choice: behold, he is coming
  chosen_spanish: miren, él viene
  alternatives_spanish:
  - he aquí que viene
  - miren, viene
  lexicon: HALOT
  rationale: La fórmula repite el énfasis profético. «Viene» puede funcionar en presente de inminencia y mantiene la fuerza viva del hebreo; se antepone «miren» para reproducir el segundo anuncio enfático.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los Armados
  - Yahvé de los ejércitos
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto: יהוה = «Yahvé». צְבָאוֹת se vierte como «de los Ejércitos» para conservar el sentido militar/cósmico con la mayúscula reverencial del título divino.'
theological_decisions:
- issue: Relación entre «el Señor» y «el mensajero del pacto»
  english_pob_reading: Render both titles straightforwardly in the main text without collapsing them into one figure or separating them interpretively.
  chosen_spanish_reading: Traducir ambos títulos con claridad, sin fusionarlos ni separarlos de manera interpretativa.
  alternative_spanish_readings:
  - Identificar explícitamente a ambos como la misma figura
  - Marcar al mensajero como totalmente distinto del Señor
  rationale: El hebreo permite una relación estrecha entre las expresiones, pero no obliga a resolverla en la traducción. La redacción española preserva la tensión teológica sin imponer una explicación.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Renderización de הָאָדוֹן en un contexto con lectura mesiánica
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el amo
  - el maestro
  rationale: «Señor» mantiene el tono alto del título y es compatible con la lectura mesiánica histórica, sin añadir una identificación más explícita de la que el hebreo da por sí mismo.
  doctrine_reference: Titulación bíblica; preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el pasaje; la lectura española sigue de cerca el texto hebreo y el criterio auditado del POB en inglés.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usa «mensajero» para מַלְאָךְ en la línea principal, manteniendo la alternativa «ángel» en nota.
  - Se emplea «pacto» para הַבְּרִית siguiendo el uso bíblico del término relacional.
  - «Ejércitos» traduce צְבָאוֹת de modo transparente y consistente con el proyecto.
