translation:
  language: es
  text: Y todo el pueblo cayeron rostro en tierra, y adoraron y bendijeron hacia el cielo[a] al que les había dado prosperidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al cielo»; el griego puede expresar dirección («hacia el cielo») o, como circunlocución reverente, referencia a Dios en el cielo.
    reason: alternative_reading
  - marker: b
    text: O «al que les había dado éxito».
    reason: alternative_reading
lexical_decisions:
- source_word: πᾶς ὁ λαός
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo entero
  - toda la gente
  lexicon: LSJ
  rationale: «Pueblo» reproduce bien el colectivo πᾶς ὁ λαός y es natural en español bíblico sin volverlo una paráfrasis nacional-política más fuerte de lo que exige el contexto.
- source_word: ἔπεσον ... ἐπὶ πρόσωπον
  english_pob_choice: fell on their faces
  chosen_spanish: cayó rostro en tierra
  alternatives_spanish:
  - cayeron rostro en tierra
  - se postraron con el rostro en tierra
  lexicon: LSJ
  rationale: La expresión griega es un modismo de postración. En español, «caer rostro en tierra» conserva la imagen corporal y la reverencia; el singular verbal con sujeto colectivo es posible, pero la forma plural también sería válida.
- source_word: προσεκύνησαν
  english_pob_choice: worshiped
  chosen_spanish: adoraron
  alternatives_spanish:
  - se postraron
  - rindieron homenaje
  lexicon: BDAG
  rationale: En este marco de culto y acción litúrgica, «adoraron» expresa mejor el valor reverente y dirigido a Dios que un simple gesto de postración.
- source_word: ηὐλόγησαν
  english_pob_choice: blessed
  chosen_spanish: bendijeron
  alternatives_spanish:
  - alabaron
  - dijeron bendiciones
  lexicon: BDAG
  rationale: «Bendijeron» mantiene la forma verbal de la fuente y la relación con Dios como destinatario de la bendición/alabanza sin sustituirla por un término más interpretativo.
- source_word: εἰς οὐρανόν
  english_pob_choice: toward heaven
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - al cielo
  - hacia el cielo
  lexicon: LSJ
  rationale: La frase puede indicar dirección literal o una circunlocución reverente para Dios en el cielo. «Hacia el cielo» conserva esa ambigüedad y la orientación del gesto mejor que una solución plenamente explícita.
- source_word: τὸν εὐοδώσαντα αὐτούς
  english_pob_choice: the one who had prospered them
  chosen_spanish: al que les había dado prosperidad
  alternatives_spanish:
  - al que les había dado éxito
  - al que les había hecho prosperar
  lexicon: BDAG
  rationale: El participio articular funciona como designación reverente de Dios. «Dar prosperidad» refleja bien εὐοδόω en español y deja abierta la identificación implícita sin nombrarla de modo más explícito que el griego.
theological_decisions:
- issue: Referencia implícita a Dios en el participio articular
  english_pob_reading: An implicit reference to God, expressed as a reverent circumlocution rather than naming God directly.
  chosen_spanish_reading: Una referencia implícita a Dios, expresada como circunloquio reverente sin nombrarlo directamente.
  alternative_spanish_readings:
  - «al que les había prosperado» con referencia más abierta
  - «a Dios, que les había dado prosperidad» con explicitación
  rationale: La construcción griega permite hablar de Dios sin nombrarlo de forma directa. La traducción conserva esa reserva reverente en el texto principal y no resuelve la ambigüedad más de lo que exige el original.
  doctrine_reference: Preservar la tensión literaria y teológica del texto fuente; primacía del original sobre la explicitación traductora.
translation_notes:
  revision_awareness: El pasaje griego está en buen acuerdo con la fuente auditada y no requiere enmiendas textuales. La revisión inglesa más reciente indicó que no eran necesarios cambios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí el versículo usa una circunlocución hacia el cielo para aludir reverentemente a Dios sin nombrarlo.
  - «Adoraron» se reserva para culto verdadero; no se reduce a mera inclinación física.
  - «Bendijeron» conserva el paralelo con el griego ηὐλόγησαν y evita reemplazarlo por una sola idea de alabanza.
