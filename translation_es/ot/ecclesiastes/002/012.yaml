translation:
  language: es
  text: Así que me volví para considerar la sabiduría[a], la locura y la necedad; porque ¿qué puede hacer el hombre que viene después del rey? Solo lo que ya se ha hecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¿qué es el hombre que viene después del rey—qué han hecho ya a él/eso?». La cláusula final es difícil y también puede entenderse como «Solo lo que ya se ha hecho».'
    reason: alternative_reading
lexical_decisions:
- source_word: וּפָנִיתִי
  english_pob_choice: So I turned
  chosen_spanish: Así que me volví
  alternatives_spanish:
  - Y me volví
  - Entonces me volví
  lexicon: HALOT
  rationale: פנה en qal expresa un giro de atención o de enfoque. «Así que me volví» conserva el cambio de rumbo discursivo y suena natural en español, sin perder el valor reflexivo del movimiento.
- source_word: לִרְאוֹת
  english_pob_choice: to consider
  chosen_spanish: para considerar
  alternatives_spanish:
  - para ver
  - para examinar
  lexicon: HALOT
  rationale: Aunque el verbo básico es «ver», aquí introduce una evaluación intelectual de objetos abstractos. «Considerar» comunica bien ese sentido reflexivo en español.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - wisdom transliterated as sabiduría
  lexicon: HALOT
  rationale: חָכְמָה tiene el valor estándar de sabiduría práctica e intelectual. «Sabiduría» es el equivalente español estable y preciso.
- source_word: וְהוֹלֵלֹוֹת
  english_pob_choice: madness
  chosen_spanish: la locura
  alternatives_spanish:
  - la insensatez
  - la demencia
  lexicon: HALOT
  rationale: El término contrasta con la sabiduría y denota conducta desordenada o desquiciada. «Locura» mantiene el contraste fuerte sin sobreinterpretar el matiz.
- source_word: וְסִכְל֑וּת
  english_pob_choice: folly
  chosen_spanish: la necedad
  alternatives_spanish:
  - la estupidez
  - la insensatez
  lexicon: HALOT
  rationale: סִכְלוּת apunta a necedad/falta de juicio. «Necedad» permite un registro bíblico claro en español y evita confundirla con simple torpeza intelectual.
- source_word: מֶה הָאָדָם
  english_pob_choice: what can the man do
  chosen_spanish: ¿qué puede hacer el hombre?
  alternatives_spanish:
  - ¿qué puede hacer un hombre?
  - ¿qué puede hacer el ser humano?
  lexicon: HALOT
  rationale: La construcción es difícil y el hebreo es conciso. La pregunta retórica en español necesita completarse de manera natural; «el hombre» conserva el singular genérico señalado por la auditoría inglesa, sin neutralizarlo indebidamente.
- source_word: שֶׁיָּבוֹא אַחֲרֵי הַמֶּלֶךְ
  english_pob_choice: who comes after the king
  chosen_spanish: que viene después del rey
  alternatives_spanish:
  - que vendrá después del rey
  - que llega después del rey
  lexicon: HALOT
  rationale: El participio/tiempo verbal en español presente funciona bien como valor gnómico o genérico en una pregunta retórica. «Después del rey» mantiene la relación sucesoria.
- source_word: אֵת אֲשֶׁר כְּבָר עָשׂוּהוּ
  english_pob_choice: Only what has already been done
  chosen_spanish: Solo lo que ya se había hecho
  alternatives_spanish:
  - Solo lo que ya se ha hecho
  - Solo aquello que ya se había hecho
  - Solo lo que ya habían hecho
  lexicon: HALOT
  rationale: 'El hebreo final es comprimido y ambiguo respecto del sufijo. La lectura española más prudente y fluida es impersonal/pasiva: «solo lo que ya se había hecho», que conserva la cautela del audit trail sin fijar innecesariamente un objeto personal.'
theological_decisions:
- issue: Cómo reflejar אָדָם en la pregunta retórica sin borrar su singularidad genérica
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - un hombre
  - el ser humano
  rationale: La auditoría inglesa opta por un singular masculino genérico y no por un plural abstracto. «El hombre» conserva esa singularidad gramatical y su fuerza representativa en español, sin convertirla en una categoría más vaga.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
- issue: Cómo tratar la cláusula final ambigua sin afirmar más de lo que permite el hebreo
  english_pob_reading: Only what has already been done
  chosen_spanish_reading: Solo lo que ya se había hecho
  alternative_spanish_readings:
  - Solo lo que ya se ha hecho
  - Solo lo que ya habían hecho
  - Solo aquello que ya se había hecho
  rationale: El texto hebreo permite varias lecturas y la versión inglesa conserva la cautela. En español, la formulación impersonal evita especificar sujeto u objeto donde el original no lo hace con claridad, manteniendo la tensión textual.
  doctrine_reference: DOCTRINE.md §Textual caution; Ecclesiastes 2:12 difficult clause
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; el borrador español sigue la lectura de alta concordancia y conserva la cautela del tramo final difícil sin introducir una interpretación nueva.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «sabiduría», «locura» y «necedad» para distinguir los tres términos hebreos sin colapsarlos en un solo campo semántico.
  - Se prefirió un español bíblico actual y claro, evitando calcos duros como «ver sabiduría».
  - La nota al pie marca la dificultad del final del versículo y ofrece la alternativa preservada por el audit trail inglés.
