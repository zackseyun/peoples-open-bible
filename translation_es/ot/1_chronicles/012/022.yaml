    reason: lexical_alternative
  - marker: c
    text: O «capitanes» o «jefes» para «comandantes».
    reason: lexical_alternative
  revision_rationale: Se ajusta «jefes» a «comandantes» para reflejar mejor שָׂרִים en contexto militar y alinearse con la decisión auditada del POB. Se mejora la naturalidad de «banda de incursión» a «grupo de incursión». Se refuerza la expresión גִבּוֹרֵי חַיִל con «valientes guerreros», que mantiene mejor el perfil militar que la redacción previa.
