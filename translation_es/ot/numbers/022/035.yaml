base_translation:
  language: en
  yaml_path: translation/ot/numbers/022/035.yaml
  text: Then the angel of Yahweh said to Balaam[a], “Go with the men, but only the word that I speak to you[c][b], that you shall speak.” So Balaam went with the officials of Balak.
