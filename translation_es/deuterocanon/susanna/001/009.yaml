revisions:
- from: Les torcieron la mente y apartaron sus ojos para no mirar al cielo ni recordar los juicios justos[a][b].
  to: Pervirtieron su mente[a] y apartaron sus ojos para no mirar al cielo ni recordar los juicios justos[b].
  rationale: 'Se corrige la agencia errónea de «Les torcieron la mente» a una forma reflexiva de hecho narrativo con sujeto plural implícito: «Pervirtieron su mente». Esta opción además recoge bien la nota léxica del POB sobre la fuerza moral de διέστρεψαν. Se mantiene el resto del verso porque es fiel, natural y teológicamente sobrio.'
