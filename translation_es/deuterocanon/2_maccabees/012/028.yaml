translation:
  language: es
  text: Pero, después de invocar al Soberano[a], que con juicios[b] destroza las fuerzas de los enemigos, tomaron la ciudad bajo su control[c], y abatieron a veinticinco mil de los que estaban dentro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Poderoso» o «el Gobernante» para el título divino.
    reason: lexical_alternative
  - marker: b
    text: La expresión griega transmitida aquí es inusual; el sentido se entiende como el obrar de Dios en juicio contra los enemigos.
    reason: textual_variant
  - marker: c
    text: O «capturaron la ciudad»; literalmente, «tomaron la ciudad bajo mano».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπικαλεσάμενοι
  english_pob_choice: after calling on
  chosen_spanish: después de invocar
  alternatives_spanish:
  - después de llamar sobre
  - después de clamar a
  lexicon: BDAG
  rationale: 'El participio aoristo expresa una acción previa: primero invocan a Dios y luego toman la ciudad. «Invocar» conserva el valor religioso y la secuencia narrativa con buena naturalidad en español.'
- source_word: τὸν δυνάστην
  english_pob_choice: the Sovereign
  chosen_spanish: el Soberano
  alternatives_spanish:
  - el Poderoso
  - el Gobernante
  - el Potentado
  lexicon: LSJ
  rationale: El término funciona aquí como título divino de dominio y poder. «Soberano» mantiene la idea de autoridad suprema sin forzar un título bíblico tradicional que el griego no usa aquí.
- source_word: μετὰ κρίτους
  english_pob_choice: with judgments
  chosen_spanish: con juicios
  alternatives_spanish:
  - con actos de juicio
  - mediante juicios
  - con sentencias
  lexicon: LSJ
  rationale: La forma transmitida es inusual, pero el sentido apunta al obrar judicial de Dios contra el enemigo. «Con juicios» sigue de cerca el griego y preserva la tensión textual documentada.
- source_word: συντρίβοντα
  english_pob_choice: shatters
  chosen_spanish: destroza
  alternatives_spanish:
  - rompe
  - hace pedazos
  - aplasta
  lexicon: BDAG
  rationale: El participio presente describe la acción característica del Soberano. «Destroza» comunica con fuerza la derrota violenta sin volverse demasiado coloquial.
- source_word: τὰς τῶν πολεμίων ὀλκάς
  english_pob_choice: the forces of the enemies
  chosen_spanish: las fuerzas de los enemigos
  alternatives_spanish:
  - el poder de los enemigos
  - la fuerza de los enemigos
  - las huestes de los enemigos
  lexicon: LSJ
  rationale: Aunque ὀλκάς puede tener otros valores en griego, aquí el contexto militar exige el sentido de poder/fuerza enemiga. «Fuerzas» reproduce bien la revisión del audit trail en inglés y su lectura contextual.
- source_word: ἔλαβον τὴν πόλιν ὑποχείριον
  english_pob_choice: they took the city under their control
  chosen_spanish: tomaron la ciudad bajo su control
  alternatives_spanish:
  - capturaron la ciudad
  - tomaron la ciudad sometida
  - la pusieron bajo su mano
  lexicon: LSJ
  rationale: ὑποχείριος comunica sujeción al poder de alguien. «Bajo su control» transmite captura y sometimiento de forma clara en español, manteniendo la fuerza del giro sin perder inteligibilidad.
- source_word: κατέστρωσαν
  english_pob_choice: struck down
  chosen_spanish: derribaron
  alternatives_spanish:
  - tumbaron
  - abatieron
  - mataron
  lexicon: LSJ
  rationale: En contexto militar el verbo expresa abatir a muchos. «Derribaron» conserva la violencia del acto sin introducir una formulación más explícita que el griego no exige por sí sola.
- source_word: τῶν ἔνδον
  english_pob_choice: of those inside
  chosen_spanish: de los de dentro
  alternatives_spanish:
  - de los que estaban dentro
  - de los habitantes dentro
  - de los del interior
  lexicon: LSJ
  rationale: La frase designa a quienes estaban dentro de la ciudad. «De los de dentro» es breve, natural y fiel, sin añadir especificaciones no presentes en el texto.
- source_word: εἰς μυριάδας δύο πεντακισχιλίους
  english_pob_choice: twenty-five thousand
  chosen_spanish: veinticinco mil
  alternatives_spanish:
  - hasta veinticinco mil
  - como veinticinco mil
  lexicon: LSJ
  rationale: La expresión numérica totaliza 25,000. En español, la cifra directa es la forma más clara y exacta, sin perder el valor cuantitativo del original.
theological_decisions:
- issue: Título divino τὸν δυνάστην
  english_pob_reading: the Sovereign
  chosen_spanish_reading: el Soberano
  alternative_spanish_readings:
  - el Poderoso
  - el Gobernante
  rationale: Se conserva el carácter de título para Dios enfatizando dominio y autoridad. «Soberano» es un equivalente digno y preciso que evita introducir un nombre o título más confesional que el griego no especifica aquí.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Acción divina expresada por μετὰ κρίτους
  english_pob_reading: with judgments
  chosen_spanish_reading: con juicios
  alternative_spanish_readings:
  - con actos de juicio
  - mediante juicios
  rationale: La frase señala que Dios derrota al enemigo mediante un obrar de juicio. La traducción conserva esa fuerza judicial y no la diluye en una mera noción abstracta de castigo.
  doctrine_reference: 'DOCTRINE.md: Preserve textual/theological tension where present.'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió «forces» para ὀλκάς, no «strength». En español se reflejó esa decisión con «fuerzas». También se mantuvo la lectura documentada de la frase textual inusual μετὰ κρίτους mediante una nota, y se conservó la idea de captura/sometimiento de ὑποχείριον sin reducirla a un simple «capturaron».
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma predeterminada para el nombre divino solo cuando el texto lo requiera explícitamente; aquí el título es τὸν δυνάστην, por lo que se traduce como «el Soberano».
  - «Invocar» preserva mejor el acto cultual previo que un simple «llamar».
  - «De los de dentro» evita introducir «hombres» o «habitantes» que el griego no especifica.
  - 'La puntuación mantiene la estructura narrativa y causal del original: invocación, acción divina, toma de la ciudad y cifra de muertos.'
