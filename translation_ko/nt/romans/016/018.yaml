  text: For such people do not serve our Lord Messiah, but their own belly, and by smooth talk and flattery they deceive the hearts of the unsuspecting.
translation:
  language: ko
  text: 그런 자들은 우리 주 메시아를 섬기지 않고 자기들의 배를 섬깁니다. 부드러운 말과 아첨하는 말로 순박한 자들의 마음을 미혹합니다.
  philosophy: optimal-equivalence
