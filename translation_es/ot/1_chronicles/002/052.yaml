translation:
  language: es
  text: 'Y Shobal, padre[a] de Quiriat-jearim, tuvo hijos: Haroeh[c], la mitad de los manahetitas[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fundador de Quiriat-jearim»; en genealogías, «padre de» puede denotar al antepasado o al fundador principal asociado con una ciudad.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la mitad de los menuhot»; también puede entenderse como «la mitad de Menujot» o «la mitad de los habitantes/clan de Menujot (Manahat)».'
    reason: lexical_alternative
  - marker: c
    text: Haroeh puede reflejar un nombre personal que en algunas tradiciones se vierte como «Reaía».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּהְיוּ בָנִים לְשׁוֹבָל
  english_pob_choice: And Shobal ... had sons
  chosen_spanish: Y hubo hijos para Shobal
  alternatives_spanish:
  - Y Shobal tuvo hijos
  - Y le nacieron hijos a Shobal
  lexicon: HALOT
  rationale: El hebreo usa una construcción idiomática equivalente a “hubo hijos para X”. En español, “hubo hijos para Shobal” mantiene la forma relacional y la transparencia genealógica sin forzar una paráfrasis demasiado libre.
- source_word: אֲבִי קִרְיַת יְעָרִים
  english_pob_choice: the father of Kiriath-jearim
  chosen_spanish: padre de Quiriat-jearim
  alternatives_spanish:
  - fundador de Quiriat-jearim
  - ancestro de Quiriat-jearim
  lexicon: HALOT
  rationale: Se conserva “padre de” porque el texto genealógico puede denotar antepasado, fundador o figura principal asociada con la ciudad. En español, “padre de” es lo más literal y deja abierta esa tensión documentada.
- source_word: קִרְיַת יְעָרִים
  english_pob_choice: Kiriath-jearim
  chosen_spanish: Quiriat-jearim
  alternatives_spanish:
  - Kiriat-jearim
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. Se translitera con la forma española usual “Quiriat” para facilitar lectura sin traducir el topónimo.
- source_word: הָרֹאֶה
  english_pob_choice: Haroeh
  chosen_spanish: Haroeh
  alternatives_spanish:
  - Reaía
  - el vidente
  lexicon: HALOT
  rationale: En esta lista genealógica la forma funciona como nombre propio. Se mantiene la transliteración para no imponer una identificación interpretativa distinta de la reflejada en el audit trail inglés.
- source_word: חֲצִי הַמְּנֻחוֹת
  english_pob_choice: half of the Manahathites
  chosen_spanish: la mitad de los manahetitas
  alternatives_spanish:
  - la mitad de Menujot
  - la mitad de los habitantes de Menujot
  - la mitad de los habitantes de Manahat
  lexicon: HALOT
  rationale: La expresión hebrea es ambigua entre un gentilicio/clan y una referencia más topográfica. “Manahetitas” comunica con claridad el valor gentilicio probable, mientras que las alternativas preservan la lectura más literalmente toponímica.
theological_decisions:
- issue: Sentido de “padre de” en una genealogía ligada a una ciudad
  english_pob_reading: the father of Kiriath-jearim may denote the ancestor or leading founder associated with the town
  chosen_spanish_reading: padre de Quiriat-jearim se deja en el texto como fórmula genealógica abierta a antepasado o fundador
  alternative_spanish_readings:
  - fundador de Quiriat-jearim
  - ancestro de Quiriat-jearim
  rationale: No se estrecha el término a una sola opción histórica. La redacción conserva la ambigüedad documentada por el POB inglés y permite la lectura genealógica o fundacional según el contexto.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El texto sigue de cerca el estado más reciente del registro inglés, que no requirió cambios de revisión y fue evaluado con alta concordancia. Se mantuvieron las tres tensiones documentadas: “padre de”/fundador, la ambigüedad de חֲצִי הַמְּנֻחוֹת, y el posible nombre alternativo de Haroeh.'
  spanish_consistency_notes:
  - Se usa “Quiriat-jearim” para el topónimo de manera uniforme.
  - Se preserva la transliteración “Haroeh” por tratarse de un nombre propio en la lista.
  - Se eligió “manahetitas” para reflejar el probable sentido de gentilicio sin eliminar la alternativa más literal en nota.
  - Se evitó sustituir “padre de” por “fundador” en el cuerpo para no borrar la ambigüedad genealógica documentada.
