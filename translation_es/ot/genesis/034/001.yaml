- from: Ahora Dina[a], la hija de Lea, a quien ella había dado a luz a Jacob, salió para ver a las hijas de la tierra.
  to: Dina[a], la hija de Lea, que ella le había dado a luz a Jacob, salió para ver a las hijas de la tierra.
  rationale: Se ajusta la cláusula relativa para que el español sea natural y fiel al hebreo, preservando la idea de que Lea dio a luz a Dina para Jacob. También se elimina «Ahora» para evitar un calco innecesario del inglés y mejorar la lectura en español. La nota léxica se mantiene porque refleja correctamente la alternativa contextual documentada en el audit trail inglés.
