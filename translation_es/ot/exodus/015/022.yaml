translation:
  language: es
  text: Entonces Moisés hizo avanzar a Israel desde el Mar de las Cañas[a], y salieron a la región árida de Shur. Anduvieron tres días en la región árida y no hallaron agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente se traduce «Mar Rojo»; en hebreo, «Mar de las Cañas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּסַּע
  english_pob_choice: led ... on
  chosen_spanish: hizo avanzar
  alternatives_spanish:
  - hizo partir
  - condujo adelante
  - los puso en marcha
  lexicon: HALOT
  rationale: El piel/causativo de נסע expresa que Moisés provocó el movimiento del pueblo. «Hizo avanzar» conserva bien ese valor causativo en español y suena natural en narrativa bíblica.
- source_word: מִיַּם סוּף
  english_pob_choice: from the Sea of Reeds
  chosen_spanish: del Mar de las Cañas
  alternatives_spanish:
  - del Mar de Reeds
  - del Mar Rojo
  lexicon: HALOT
  rationale: El hebreo apunta literalmente a un mar asociado con juncos o cañas. Se evita «Mar Rojo» por ser tradicional pero menos fiel al léxico hebreo; «Mar de las Cañas» comunica el sentido básico de forma transparente en español.
- source_word: מִדְבַּר שׁוּר
  english_pob_choice: the wilderness of Shur
  chosen_spanish: el desierto de Shur
  alternatives_spanish:
  - el desierto/las tierras áridas de Shur
  - el desierto de Sur
  lexicon: HALOT
  rationale: Aquí se eligió «desierto» porque en español bíblico funciona de manera natural para מִדְבָּר y evita la posible carga técnica de «wilderness». Se mantiene el nombre propio Shur en transliteración.
- source_word: וַיֵּצְאוּ
  english_pob_choice: they went out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron
  - se salieron
  - partieron
  lexicon: HALOT
  rationale: El verbo יצא se rinde de manera directa con «salieron», que conserva el movimiento narrativo sin sobrecargar la frase.
- source_word: שְׁלֹשֶׁת יָמִים
  english_pob_choice: three days
  chosen_spanish: tres días
  alternatives_spanish:
  - por tres días
  - durante tres días
  lexicon: HALOT
  rationale: La construcción hebrea expresa duración; «tres días» es la forma más sobria y fiel en español. El contexto ya permite entender el lapso.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - por el desierto
  - en la región desértica
  lexicon: HALOT
  rationale: Se repite «desierto» para mantener consistencia con el sintagma anterior y una lectura fluida en español. En este contexto no se requiere distinguir entre «wilderness» y «desert».
- source_word: לֹא מָצְאוּ מָיִם
  english_pob_choice: found no water
  chosen_spanish: no hallaron agua
  alternatives_spanish:
  - no encontraron agua
  - no tuvieron agua
  lexicon: HALOT
  rationale: «Hallaron» es idiomático y reverente en español bíblico, y reproduce con precisión la negación del hallazgo. «No encontraron agua» sería plenamente válido, pero menos sobrio; «no tuvieron agua» introduce una idea distinta.
translation_notes:
  revision_awareness: 'La versión sigue de cerca el texto hebreo WLC y coincide con la decisión auditada del POB en inglés: mantener la referencia al Sea of Reeds, renderizar el causativo de נסע de forma natural, y conservar la secuencia narrativa sin añadir información interpretativa.'
  spanish_consistency_notes:
  - Se mantiene «Moisés» y «Israel» como nombres propios estándar en español.
  - Se usa «desierto» para מִדְבָּר en ambos ocurrencias del versículo para uniformidad y naturalidad.
  - La nota al pie conserva la alternativa tradicional sin convertirla en lectura principal.
  - No se añade artículo indefinido antes de «agua», siguiendo el hebreo directo y el uso normal en español bíblico.
