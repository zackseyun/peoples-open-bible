  to: No he ocultado tu justicia[a] dentro de mi corazón; he hablado de tu fidelidad y de tu salvación[b]. No he encubierto tu amor fiel[c] ni tu verdad a la gran asamblea[d].
  rationale: Se corrige la nota [a] para que presente una alternativa genuina. Se ajusta חסד a «amor fiel», que preserva mejor la lealtad estable del término. Se cambia «ante la gran asamblea» por «a la gran asamblea» para reflejar mejor el valor más natural de לְ con כחד y alinearse con la decisión principal auditada en inglés, manteniendo la alternativa en nota.
