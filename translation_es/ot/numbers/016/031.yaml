translation:
  language: es
  text: Y cuando acabó de hablar todas estas palabras, el suelo que estaba debajo de ellos se partió.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y aconteció que
  - Y ocurrió que
  - Y al
  lexicon: HALOT
  rationale: La construcción narrativa introduce la acción siguiente en secuencia inmediata; en español, «y cuando» conserva la relación temporal sin el giro artificial de «aconteció que».
- source_word: כְּכַלֹּתוֹ לְדַבֵּר
  english_pob_choice: he had finished speaking
  chosen_spanish: acabó de hablar
  alternatives_spanish:
  - terminó de hablar
  - cuando hubo terminado de hablar
  - al acabar de hablar
  lexicon: HALOT
  rationale: El infinitivo constructo con el sufijo indica completar la acción de hablar antes del evento principal. «Acabó de hablar» comunica bien la conclusión del discurso en un español natural y conserva la secuencia temporal.
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
  - todas estas palabras dichas
  - todos estos dichos
  - todas estas cosas
  lexicon: HALOT
  rationale: En este contexto de discurso directo, דברים tiene el sentido más básico de «palabras» o «dichos». Se mantiene «palabras» por fidelidad léxica y claridad en español.
- source_word: וַתִּבָּקַע
  english_pob_choice: split open
  chosen_spanish: se abrió
  alternatives_spanish:
  - se partió
  - se hendió
  - se rajó
  lexicon: HALOT
  rationale: בקע expresa la apertura violenta de una superficie. «Se abrió» es legible y natural; el contexto ya da la idea de ruptura súbita, aunque alternativas como «se partió» o «se hendió» son más marcadas.
- source_word: הָאֲדָמָה
  english_pob_choice: the ground
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - el terreno
  - la tierra
  lexicon: HALOT
  rationale: אדמה puede ser «suelo», «tierra» o «terreno». Aquí la imagen de la tierra que se abre bajo las personas funciona con naturalidad en español con «la tierra», sin perder el sentido físico del pasaje.
- source_word: אֲשֶׁר תַּחְתֵּיהֶם
  english_pob_choice: that was beneath them
  chosen_spanish: que estaba debajo de ellos
  alternatives_spanish:
  - que estaba bajo ellos
  - bajo ellos
  - debajo de ellos
  lexicon: HALOT
  rationale: La cláusula relativa conserva la localización exacta del hebreo. «Que estaba debajo de ellos» reproduce con claridad la relación espacial sin comprimir demasiado la imagen.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó «as soon as» a «when» y reforzó la literalidad de «the ground that was beneath them»; por ello el español mantiene una transición temporal simple («Y cuando») y conserva explícitamente la relación espacial con una cláusula relativa.
  spanish_consistency_notes:
  - Se mantiene el estilo bíblico moderno y digno, sin recurrir a la máscara «SEÑOR» ni a arcaísmos innecesarios.
  - Se preserva la imagen súbita de la apertura del suelo/tierra sin añadir elementos interpretativos.
  - La frase «acabó de hablar» respeta la conclusión del discurso y su relación inmediata con el evento siguiente.
