translation:
  language: es
  text: Que te alabe otro[a], y no tu propia boca; un extraño[b], y no tus propios labios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «otro»; el hebreo זָר puede referirse a alguien distinto de uno mismo, sin insistir necesariamente en la idea de «extranjero».
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa aquí un segundo término, נָכְרִי, distinto de זָר en el primer hemistiquio; por eso se mantiene una variación en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהַלֶּלְךָ
  english_pob_choice: Let another praise you
  chosen_spanish: Que te alabe otro
  alternatives_spanish:
  - Que te praise otro
  - Que otro te alabe
  lexicon: HALOT
  rationale: El jussivo exhorta a que la alabanza venga de otro. «Que te alabe» conserva el valor exhortativo y el verbo de alabanza, y «otro» refleja el contraste con la autoalabanza sin añadir contenido.
- source_word: זָר
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - un extraño
  - alguien más
  - un forastero
  lexicon: HALOT
  rationale: En el primer hemistiquio el énfasis es sobre alguien distinto de uno mismo, no necesariamente sobre extranjería étnica. «Otro» sigue la decisión revisada del texto inglés y evita sobredeterminar el término.
- source_word: פִיךָ
  english_pob_choice: your own mouth
  chosen_spanish: tu propia boca
  alternatives_spanish:
  - tu boca
  - tu mismo boca
  lexicon: HALOT
  rationale: «Tu propia boca» expresa con naturalidad el contraste reflexivo implícito en el proverbio y refuerza que la alabanza no debe venir de uno mismo.
- source_word: נָכְרִי
  english_pob_choice: a stranger
  chosen_spanish: un extraño
  alternatives_spanish:
  - un forastero
  - un extranjero
  - un desconocido
  lexicon: HALOT
  rationale: Aquí se preserva la variación hebrea frente a זָר. «Un extraño» mantiene la distinción poética y puede sugerir también alguien ajeno o no cercano, sin borrar el matiz del segundo término.
- source_word: שְׂפָתֶיךָ
  english_pob_choice: your own lips
  chosen_spanish: tus propios labios
  alternatives_spanish:
  - tus labios
  - tus mismos labios
  lexicon: HALOT
  rationale: «Tus propios labios» reproduce el paralelismo con «tu propia boca» y mantiene la oposición entre la voz ajena y la autoexaltación.
- source_word: וְלֹא ... וְאַל
  english_pob_choice: and not ... and not
  chosen_spanish: y no ... y no
  alternatives_spanish:
  - pero no ... y no
  - ni ... ni
  lexicon: HALOT
  rationale: Las dos negaciones se conservan de forma paralela. «Y no» respeta la estructura hebrea y su ritmo proverbial en español.
translation_notes:
  revision_awareness: 'Se atendió al fallo previo: ahora cada marcador de nota aparece exactamente en el texto español. También se conserva la distinción hebrea entre זָר y נָכְרִי, siguiendo el audit trail inglés y su revisión.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo proverbial con dos miembros negativos.
  - Se evitó uniformar ambos sustantivos hebreos en una sola palabra española.
  - Se usó español neutral y litúrgicamente digno, sin calco excesivo.
  - Se prefirió «alabe» para conservar el valor exhortativo del jussivo hebreo.
