translation:
  language: es
  text: Tú ungirás sus ojos con la hiel[a], y cuando le pique[b], se los frotará, y los velos blancos[c] se desprenderán, y te verá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bilis». El término griego designa la hiel/bilis, aquí usada como sustancia medicinal.
    reason: lexical_alternative
  - marker: b
    text: O «cuando le escueza» o «cuando le arda». El griego usa un lenguaje corporal vívido para el efecto irritante en los ojos.
    reason: lexical_alternative
  - marker: c
    text: O «las opacidades blancas» o «las manchas/placas blancas»; el término se refiere a opacidades blanquecinas de los ojos, no necesariamente a cataratas en sentido médico moderno.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγχρισον
  english_pob_choice: anoint
  chosen_spanish: ungirás
  alternatives_spanish:
  - untarás
  - aplicarás
  lexicon: LSJ
  rationale: ἐγχρίω expresa aplicar una sustancia frotándola o extendiéndola sobre algo. En español, «ungir» conserva el acto de aplicar sobre los ojos y mantiene un registro digno; «untar» es posible pero más áspero, y «aplicar» pierde el matiz de fricción/unción.
- source_word: χολὴν
  english_pob_choice: gall
  chosen_spanish: hiel
  alternatives_spanish:
  - bilis
  lexicon: LSJ
  rationale: χολή denota literalmente hiel/bilis. «Hiel» es una equivalencia bíblica y natural en español, y permite mantener el sentido de sustancia medicinal sin forzar un tecnicismo médico.
- source_word: δηχθεὶς
  english_pob_choice: when it stings
  chosen_spanish: cuando le pique
  alternatives_spanish:
  - cuando le escueza
  - cuando le arda
  lexicon: LSJ
  rationale: El participio sugiere un efecto punzante o mordiente. «Picar» en español comunica bien el ardor/molestia aguda en los ojos y conserva la viveza corporal del griego sin volverse demasiado clínico.
- source_word: διατρίψει
  english_pob_choice: he will rub them
  chosen_spanish: se los frotará
  alternatives_spanish:
  - se los restregará
  - se los tallará
  lexicon: LSJ
  rationale: El verbo indica frotar repetidamente o a fondo. «Frotará» es claro y natural; la forma pronominal «se los frotará» expresa el objeto implícito (los ojos) con fluidez en español.
- source_word: ἀποβαλεῖται
  english_pob_choice: will come away
  chosen_spanish: se le quitarán
  alternatives_spanish:
  - caerán
  - se desprenderán
  lexicon: LSJ
  rationale: El medio comunica la salida o remoción de las opacidades como efecto del frotamiento. «Se le quitarán» es idiomático y no añade una imagen mecánica excesiva; «caerán» o «se desprenderán» suenan más literales pero menos naturales.
- source_word: τὰ λευκώματα
  english_pob_choice: the white films
  chosen_spanish: las manchas blancas
  alternatives_spanish:
  - las opacidades blancas
  - las películas blancas
  lexicon: LSJ
  rationale: λευκώματα designa opacidades blanquecinas en los ojos. «Manchas blancas» es comprensible y publication-readable en español; evita el término médico moderno «cataratas», que podría sobreinterpretar el diagnóstico.
- source_word: ὄψεταί σε
  english_pob_choice: he will see you
  chosen_spanish: te verá
  alternatives_spanish:
  - volverá a verte
  lexicon: LSJ
  rationale: El griego dice simplemente que «te verá». «Te verá» reproduce el contenido sin añadir explícitamente la recuperación de la vista, que queda sugerida por el contexto pero no formulada en esta cláusula.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió una instrucción futura natural («You shall anoint») y ajustó el verbo sensorial a «stings». En español se reflejó ese imperativo con futuro exhortativo («Tú ungirás») y se mantuvo el matiz corporal de irritación con «cuando le pique»; no se añadió la idea de recuperación de la vista más allá de «te verá».
  spanish_consistency_notes:
  - Se mantuvo la terminología de contacto corporal con un verbo de aplicación directa («ungir») en vez de una paráfrasis clínica.
  - Se evitó «Cristo»/«Mesías» porque no aparecen en el versículo.
  - 'La secuencia verbal conserva el orden del griego: aplicar la sustancia, efecto irritante, frotamiento, remoción de las opacidades y visión final.'
