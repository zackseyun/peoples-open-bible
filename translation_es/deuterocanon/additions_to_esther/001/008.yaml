  - marker: b
    text: Or 'their own evils' or 'the disasters facing them.' The phrase τὰ ἑαυτῶν κακά refers to the harms or calamities they feared would come upon them.
    reason: lexical_alternative
  - marker: c
    text: Or 'they prepared to be destroyed.' The infinitive ἀπολέσθαι can emphasize either perishing or being destroyed.
    reason: lexical_alternative
