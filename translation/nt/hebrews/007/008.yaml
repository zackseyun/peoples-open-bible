id: HEB.7.8
reference: Hebrews 7:8
source:
  edition: SBLGNT
  text: καὶ ὧδε μὲν δεκάτας ἀποθνῄσκοντες ἄνθρωποι λαμβάνουσιν, ἐκεῖ δὲ μαρτυρούμενος ὅτι ζῇ.
translation:
  text: And here mortal men receive tithes[a], but there he is testified to be living.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'there it is testified of him that he lives.' The Greek keeps the statement in the form of scriptural testimony rather than directly asserting Melchizedek's literal immortality.
    reason: alternative_reading
lexical_decisions:
- source_word: ὧδε
  chosen: here
  alternatives:
  - in this case
  lexicon: BDAG
  rationale: Spatial/deictic adverb contrasting the present Levitical setting with the scriptural scene introduced by ἐκεῖ. 'Here' preserves the author's rhetorical contrast succinctly.
- source_word: δεκάτας
  chosen: tithes
  alternatives:
  - tenths
  lexicon: BDAG
  rationale: Standard rendering for the cultic/legal practice in context. 'Tenths' is more literal etymologically but less idiomatic in English Bible usage.
- source_word: ἀποθνῄσκοντες ἄνθρωποι
  chosen: mortal men
  alternatives:
  - men who die
  - dying men
  lexicon: BDAG
  rationale: The participle modifies ἄνθρωποι and highlights their mortality in contrast to Melchizedek's scriptural portrayal as living. 'Mortal men' is concise and natural while preserving the force of the present participle.
- source_word: ἄνθρωποι
  chosen: men
  alternatives:
  - people
  - human beings
  lexicon: BDAG
  rationale: Gender-accurate rendering per project philosophy. In this priestly comparison the referent is male priests, not generic humanity, so 'men' is appropriate.
- source_word: λαμβάνουσιν
  chosen: receive
  alternatives:
  - collect
  - take
  lexicon: BDAG
  rationale: A straightforward rendering that fits the context of receiving tithes without adding interpretive nuance.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that case
  lexicon: BDAG
  rationale: Maintains the paired contrast with ὧδε ('here ... there'), referring to the scriptural presentation of Melchizedek.
- source_word: μαρτυρούμενος
  chosen: he is testified to
  alternatives:
  - it is testified of him
  - he is witnessed
  lexicon: BDAG
  rationale: Passive participle with an implicit subject carried from the Melchizedek discussion. English requires making the personal reference explicit. 'He is testified to' preserves the passive and the evidentiary force.
- source_word: ὅτι ζῇ
  chosen: to be living
  alternatives:
  - that he lives
  - that he is alive
  lexicon: BDAG
  rationale: Complements the passive expression smoothly in English. The present tense is preserved; the point is not an ontological claim derived apart from Scripture, but the scriptural testimony's portrayal.
