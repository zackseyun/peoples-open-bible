translation:
  language: es
  text: 'Entonces Amazías dijo a Amós: «Vidente, ve, huye a la tierra de Judá, y come allí pan[a], y profetiza allí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «gana allí tu sustento» / «gánate allí la vida»; la expresión «come pan» probablemente lleva el sentido de ganarse allí la vida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֹזֶה
  english_pob_choice: Seer
  chosen_spanish: Vidente
  alternatives_spanish:
  - visionario
  - profeta
  lexicon: HALOT
  rationale: חֹזֶה nombra a alguien que ve visiones; en español, «vidente» conserva mejor esa fuerza específica que «profeta», que sería más amplio y borraría la distinción con נָבִיא.
- source_word: לֵךְ
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - vete
  - anda
  lexicon: HALOT
  rationale: El imperativo es directo y breve. «Ve» reproduce bien la orden sin añadir matiz excesivo.
- source_word: בְּרַח לְךָ
  english_pob_choice: flee away
  chosen_spanish: huye
  alternatives_spanish:
  - escapa
  - vete de aquí
  lexicon: HALOT
  rationale: 'ברח exige urgencia: «huye» transmite la orden de salir precipitadamente. El matiz de לְךָ queda sugerido por el imperativo enfático en contexto, sin forzar una perífrasis poco natural.'
- source_word: אֶרֶץ יְהוּדָה
  english_pob_choice: the land of Judah
  chosen_spanish: la tierra de Judá
  alternatives_spanish:
  - el país de Judá
  - Judá
  lexicon: HALOT
  rationale: אֶרֶץ es literalmente «tierra»/«país». «La tierra de Judá» mantiene el valor geográfico-político del hebreo y suena natural en español bíblico.
- source_word: וֶאֱכָל שָׁם לֶחֶם
  english_pob_choice: and eat bread there
  chosen_spanish: y come allí pan
  alternatives_spanish:
  - y gana allí tu sustento
  - y vive allí
  lexicon: HALOT
  rationale: Se preserva la imagen literal «come allí pan», porque el hebreo usa un modismo que el contexto puede implicar como medio de vida. La lectura idiomática se deja para nota, no para el texto principal.
- source_word: תִּנָּבֵא
  english_pob_choice: prophesy
  chosen_spanish: profetiza
  alternatives_spanish:
  - actúa como profeta
  - pronuncia profecías
  lexicon: HALOT
  rationale: El verbo español «profetiza» es la correspondencia más directa y clara para el verbo profético hebreo, sin perder la referencia a la acción de hablar en nombre de Dios.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then Amaziah said
  chosen_spanish: Entonces Amazías dijo
  alternatives_spanish:
  - Y Amazías dijo
  lexicon: HALOT
  rationale: '«Entonces» reproduce bien el avance narrativo del waw consecutivo. Se mantiene el nombre propio con acento español usual: «Amazías».'
theological_decisions:
- issue: Cómo tratar el modismo hebreo «come allí pan»
  english_pob_reading: Keep the literal expression 'eat bread there' in the main text, with a footnote noting the likely livelihood sense.
  chosen_spanish_reading: Mantener «come allí pan» en el texto principal, con nota que indique la posible idea de ganarse la vida allí.
  alternative_spanish_readings:
  - gana allí tu sustento
  - vive allí de tu oficio
  rationale: El hebreo es literalmente alimentario, pero el contexto sugiere que Amazías le está diciendo a Amós que se vaya a Judá a buscarse el sustento como profeta. Para no borrar la tensión entre imagen literal y sentido contextual, se conserva la frase original y se explicita la implicación en nota.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo WLC y la decisión auditada de la POB inglesa de conservar «eat bread there» en el cuerpo principal, añadiendo una nota para el sentido idiomático de sustento. También refleja la revisión inglesa que mantuvo la secuencia imperativa sin incisos innecesarios.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; en este versículo no aparece.
  - Se mantiene «Vidente» para חֹזֶה y no se lo nivela a «profeta», para respetar la distinción léxica.
  - Se conserva el modismo literal «come allí pan» con nota explicativa, siguiendo la evidencia del hebreo y la POB inglesa.
  - Se adapta «Amaziah» como «Amazías» y «Amos» como «Amós» según la ortografía bíblica usual en español.
