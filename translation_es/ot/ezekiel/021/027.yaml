    issue: «carneros» en lugar de «arietes» para כָּרִים
    rationale: En contexto de asedio, el referente es militar, no animal. El English POB escogió «battering rams» como lectura principal. «Carneros» en español moderno induce una lectura literal errónea y no preserva adecuadamente el sentido establecido por la evidencia y la auditoría.
  - severity: medium
    issue: La nota [b] está anclada al término equivocado
    rationale: La nota habla de alternativas para דָּיֵק («baluarte», «torre de asedio», etc.), pero el ancla aparece en «terraplén», que corresponde a סֹלְלָה. Debe ir en «muro de asedio» o equivalente al final.
  - severity: low
    issue: «gritería de guerra» es menos preciso que «grito de guerra»
    rationale: Aunque comunica clamor militar, «grito de guerra» representa con mayor naturalidad y precisión el valor de תְּרוּעָה en esta frase.
