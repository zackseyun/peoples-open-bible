review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: fórmula profética futura, primera persona divina, destrucción de todas las naciones que vienen contra Jerusalén. Sin embargo, «me dispondré a destruir» desplaza demasiado el valor léxico de אֲבַקֵּשׁ, que en el audit trail se preserva como «seek» con nota alternativa para el matiz de determinación. En español conviene mantener ese núcleo con «buscaré destruir» o «buscaré destruir / trataré de destruir», y dejar la alternativa resuelta en nota.'
  spanish_quality_summary: El español es claro y digno, pero «Y acontecerá en aquel día que...» suena más pesado de lo necesario. Una redacción más natural y fiel al estilo profético moderno es «Y en aquel día buscaré destruir...». Además, la nota actual repite exactamente la lectura principal en vez de dar una alternativa real.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto en este versículo. «Jerusalén», «naciones» y la primera persona divina están bien. La corrección principal es lexical: preservar mejor בקש como «buscar» en el texto principal, con «me dispondré a» como alternativa explicativa si se desea.'
  issues:
  - severity: medium
    issue: El verbo principal אֲבַקֵּשׁ se tradujo como «me dispondré a» en el texto principal.
    rationale: El hebreo y el audit trail inglés conservaron el núcleo léxico de «seek / seek to», con nota para el matiz intensivo «set myself to». «Me dispondré a» adelanta la alternativa y pierde la base léxica documentada.
  - severity: medium
    issue: La nota al pie no ofrece una alternativa distinta del texto principal.
    rationale: 'La nota dice «O: “me dispondré a destruir”», pero esa ya es la lectura del texto. Una nota lexical_alternative debe presentar una opción realmente alternativa.'
  - severity: low
    issue: «Y acontecerá en aquel día que...» resulta algo rígido en español contemporáneo.
    rationale: Aunque no es incorrecto, el hebreo puede verterse con mayor naturalidad como «Y en aquel día...», preservando la fórmula profética sin un giro pesado.
  revised_spanish_text: Y en aquel día buscaré destruir a todas las naciones que vengan contra Jerusalén[a].
  revised_footnotes:
  - marker: a
    text: 'O: «me dispondré a destruir». El verbo hebreo puede enfatizar una intención decidida, no solo la idea de buscar.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el texto principal para preservar mejor el valor léxico documentado de אֲבַקֵּשׁ («buscaré»), dejando en nota la alternativa que enfatiza determinación resuelta. También se aligera la fórmula introductoria para un español más natural y fiel al uso profético sin pérdida de sentido.
