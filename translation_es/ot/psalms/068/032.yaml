review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: la venida desde Egipto y el gesto de Cus hacia Dios. Sin embargo, necesita ajustes menores para alinearse mejor con el expediente inglés y con el sentido fuente: el texto principal dejó sin traducir «Nobles» al español natural, y la nota b no preserva la alternativa significativa documentada en inglés sobre el valor singular/personificado del sufijo en «sus manos».'
  spanish_quality_summary: La frase es generalmente clara y digna, pero «Nobles» con mayúscula inicial suena a anglicismo/no traducido en contexto; debe ser «Los nobles» o simplemente «Nobles» en minúscula. Para español natural y buena sintaxis poética, «Los nobles vendrán de Egipto» funciona mejor. «Cus» es aceptable como transliteración española. «se apresurará a extender sus manos hacia Dios» es legible, aunque «a Dios» sería algo más directo; no es un error grave.
  glossary_alignment: No hay conflicto con los términos teológicos por defecto. El topónimo «Cus» sigue la decisión de transliterar כּוּשׁ. «Dios» para אֱלֹהִים es correcto. No interviene Yahvé/Mesías/Espíritu. La nota a debe corregir «envíos» por «enviados» o mejor «emisarios», para reflejar adecuadamente el alternativo inglés «envoys».
  issues:
  - severity: high
    issue: El texto principal conserva «Nobles» de forma no idiomática y con mayúscula inicial.
    rationale: Parece un arrastre del inglés más que español terminado. El hebreo חַשְׁמַנִּים debe aparecer en español natural; «Los nobles» expresa bien el grupo humano prominente.
  - severity: medium
    issue: La nota a usa «envíos» en vez de «enviados»/«emisarios».
    rationale: «Envíos» significa remesas o despachos, no personas. El alternativo inglés «envoys» requiere un sustantivo personal en español.
  - severity: medium
    issue: La nota b no preserva la alternativa real del expediente inglés.
    rationale: Repite esencialmente el texto principal en lugar de señalar la posibilidad «su mano / sus manos» con sujeto singular personificado («Cus se apresurará...»), que es precisamente la observación morfosintáctica del inglés.
  revised_spanish_text: Los nobles[a] vendrán de Egipto; Cus[b] se apresurará a extender sus manos hacia Dios.
  revised_footnotes:
  - marker: a
    text: O «emisarios» o «príncipes» para «nobles». El raro término hebreo probablemente se refiere a personas prominentes de Egipto.
    reason: lexical_alternative
  - marker: b
    text: O «Cus se apresurará a extender su mano a Dios». El hebreo usa un sufijo singular con la nación personificada.
    reason: lexical_alternative
  revision_rationale: La revisión corrige un anglicismo/no traducción en el texto principal («Nobles» → «Los nobles»), mejora la nota léxica («envíos» → «emisarios») y restituye la alternativa documentada sobre el singular personificado de Cus en la nota b. Se mantiene «hacia Dios» como opción aceptable de dirección, aunque «a Dios» también sería posible.
