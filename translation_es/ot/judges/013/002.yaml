translation:
  language: es
  text: Ahora bien, había un hombre de Zora[a], del clan de los danitas, y se llamaba Manoa. Su esposa era estéril y no había dado a luz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de Zorah». El hebreo indica origen o procedencia; aquí se usa la forma española «Zora».
    reason: lexical_alternative
  - marker: b
    text: 'O «y no había tenido hijos». El hebreo literalmente dice: «y no había dado a luz», sin objeto expreso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now there was
  chosen_spanish: Ahora bien, había
  alternatives_spanish:
  - Y había
  - Había
  lexicon: HALOT
  rationale: La forma narrativa introductoria expresa la entrada de una nueva escena. «Ahora bien, había» conserva ese valor discursivo en español sin sonar demasiado literal.
- source_word: אִישׁ אֶחָד
  english_pob_choice: a certain man
  chosen_spanish: un hombre
  alternatives_spanish:
  - cierto hombre
  - un hombre determinado
  lexicon: HALOT
  rationale: En español, «un hombre» basta para reflejar la introducción narrativa de un personaje aún no desarrollado, sin forzar una fórmula menos natural como «cierto hombre».
- source_word: מִצָּרְעָה
  english_pob_choice: from Zorah
  chosen_spanish: de Zora
  alternatives_spanish:
  - desde Zora
  - de Zorah
  lexicon: HALOT
  rationale: El hebreo marca origen/localidad. Se translitera el topónimo con la forma española usual «Zora», manteniendo la referencia geográfica.
- source_word: מִמִּשְׁפַּחַת הַדָּנִי
  english_pob_choice: from the clan of the Danites
  chosen_spanish: de la familia de los danitas
  alternatives_spanish:
  - del clan de los danitas
  - de la tribu de Dan
  lexicon: HALOT
  rationale: מִשְׁפָּחָה designa un grupo de parentesco menor que la tribu. «Familia» es un equivalente natural en español y conserva la precisión sin imponer «tribu».
- source_word: וּשְׁמוֹ מָנוֹחַ
  english_pob_choice: and his name was Manoah
  chosen_spanish: y se llamaba Manoa
  alternatives_spanish:
  - y su nombre era Manoa
  - y el nombre de él era Manoa
  lexicon: HALOT
  rationale: La fórmula hebrea de identificación narrativa se vierte con una construcción idiomática en español. «Manoa» preserva el nombre propio en forma española convencional.
- source_word: עֲקָרָה
  english_pob_choice: was barren
  chosen_spanish: era estéril
  alternatives_spanish:
  - era barren
  - no podía concebir
  lexicon: HALOT
  rationale: «Estéril» comunica de manera natural y digna la condición descrita por el hebreo. «Barren» no es idiomático en español; «no podía concebir» sería más explicativo de lo que el texto afirma.
- source_word: וְלֹא יָלָדָה
  english_pob_choice: and had not borne children
  chosen_spanish: y no había dado a luz
  alternatives_spanish:
  - y no había parido
  - y no había tenido hijos
  lexicon: HALOT
  rationale: El verbo ילד en este contexto femenino se refiere a dar a luz/bear children. «No había dado a luz» conserva la fuerza verbal sin añadir el plural «hijos», que no está explícito en el hebreo.
theological_decisions:
- issue: La tensión entre esterilidad y falta de parto en la clausula final
  english_pob_reading: His wife was barren and had not borne children.
  chosen_spanish_reading: Su esposa era estéril y no había dado a luz.
  alternative_spanish_readings:
  - Su esposa era estéril y no había tenido hijos.
  - Su esposa era estéril y no había dado hijos a luz.
  rationale: 'Se mantienen ambas afirmaciones del hebreo: esterilidad y ausencia de parto. La segunda cláusula no se simplifica a «no tenía hijos», porque el texto enfatiza el hecho de no haber dado a luz, no solo el estado resultante.'
  doctrine_reference: Narrative birth-announcement context; no doctrinal claim beyond the plain sense of the text.
translation_notes:
  revision_awareness: 'La versión inglesa revisada cambió «had not borne a child» por «had not borne children» para reflejar mejor la ausencia de especificación en el hebreo. La traducción española sigue esa revisión al evitar singularizar el resultado y al mantener una formulación abierta: «no había dado a luz».'
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» solo cuando corresponda; en este versículo no aparece un término divino.
  - Se conserva «danitas» como gentilicio colectivo para reflejar la referencia tribal sin cambiarla por «tribu de Dan».
  - El nombre propio se normaliza como «Manoa» en español, siguiendo uso bíblico común y pronunciación natural.
