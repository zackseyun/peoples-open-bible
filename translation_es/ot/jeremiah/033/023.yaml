translation:
  language: es
  text: Y la palabra de Yahvé vino a Jeremías, diciendo,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y ... vino
  alternatives_spanish:
  - Y ... llegó
  - Y sucedió que
  lexicon: HALOT
  rationale: El hebreo narrativo introduce la fórmula profética con un verbo de ocurrencia/llegada. En español, «vino» reproduce de manera natural y sobria la llegada de la palabra sin forzar un calco como «sucedió» que suena más marcado o más arcaico en este contexto.
- source_word: דְּבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el asunto
  lexicon: HALOT
  rationale: En la fórmula profética דְּבַר יְהוָה, «palabra» preserva el valor de revelación divina y corresponde bien al uso bíblico en español. «Mensaje» es posible, pero suaviza el peso técnico de la expresión.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino יְהוָה se vierte en el texto español como «Yahvé», conforme al estándar del proyecto. Mantiene el nombre propio del pacto en lugar de sustituirlo por un título como «Señor».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición marca destinatario o dirección. En español, «a» es la equivalencia más natural y directa para introducir a Jeremías como receptor de la palabra.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Jeremía
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma española estándar.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: La fórmula introductoria de discurso directo en hebreo se expresa de forma idiomática con «diciendo», que mantiene el enlace sintáctico con la palabra revelada sin añadir contenido nuevo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se conserva el nombre propio divino en español como «Yahvé», siguiendo la convención del proyecto y evitando la sustitución litúrgica «SEÑOR», que ocultaría el Tetragrámaton presente en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado presenta alta concordancia y no requiere revisión sustantiva; el español sigue de cerca la fórmula profética del hebreo con adaptación idiomática mínima.
  spanish_consistency_notes:
  - Se mantiene la terminología del proyecto para יְהוָה como «Yahvé».
  - Se conserva «palabra» en la fórmula profética, por su valor técnico y transparente.
  - No se añaden notas al pie porque no hay una alternativa textual o lexical que deba anclarse explícitamente en este versículo.
