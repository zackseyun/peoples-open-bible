  yaml_path: translation/ot/2_chronicles/021/012.yaml
  text: 'Then a letter came to him from Elijah the prophet[a], saying, “Thus says Yahweh, the God of David your father: Because you have not walked in the ways of Jehoshaphat your father or in the ways of Asa king of Judah,”'
