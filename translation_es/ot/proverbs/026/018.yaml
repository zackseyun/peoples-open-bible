translation:
  language: es
  text: Como un loco[a] que dispara tizones[b], flechas y muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Loco» traduce aquí la idea de actuar de manera insensata o delirante; el hebreo también puede entenderse como «como uno que actúa insensatamente» o «como una persona delirante».
    reason: lexical_alternative
  - marker: b
    text: «Tizones» también puede traducirse como «proyectiles incendiarios» o «dardos encendidos».
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמִתְלַהְלֵהַּ
  english_pob_choice: Like a madman
  chosen_spanish: Como un loco
  alternatives_spanish:
  - Como uno que actúa insensatamente
  - Como una persona delirante
  - Como un hombre temerario
  lexicon: HALOT
  rationale: 'El prefijo כ expresa comparación: «como». La forma hitpael de הלל aquí no es «alabar», sino comportarse de manera irracional o desordenada. «Loco» conserva la fuerza idiomática y la imagen vívida del proverbio; las alternativas son más explicativas o más débiles.'
- source_word: הַיֹּרֶה
  english_pob_choice: who shoots
  chosen_spanish: que dispara
  alternatives_spanish:
  - que arroja
  - que lanza
  lexicon: HALOT
  rationale: ירֶה se usa normalmente de disparar proyectiles; como el verso menciona flechas, «dispara» mantiene mejor la imagen de arma/proyectil que «arroja» o «lanza».
- source_word: זִקִּים
  english_pob_choice: firebrands
  chosen_spanish: tizones
  alternatives_spanish:
  - brasas ardientes
  - dardos encendidos
  - proyectiles incendiarios
  lexicon: HALOT
  rationale: El término puede referirse a objetos ardientes lanzados. «Tizones» comunica en español la idea de madera encendida y peligrosa sin sonar demasiado técnico; las alternativas son más interpretativas o menos naturales.
- source_word: חִצִּים
  english_pob_choice: arrows
  chosen_spanish: flechas
  alternatives_spanish:
  - saetas
  lexicon: HALOT
  rationale: Es el equivalente normal de חִצִּים. «Flechas» es claro y natural en español contemporáneo.
- source_word: וָמָוֶת
  english_pob_choice: and death
  chosen_spanish: y muerte
  alternatives_spanish:
  - y daño mortal
  - y destrucción
  lexicon: HALOT
  rationale: El hebreo dice literalmente «y muerte». Se conserva el sustantivo abstracto para no suavizar ni reinterpretar el cierre abrupto del proverbio.
translation_notes:
  revision_awareness: Texto redactado directamente desde el hebreo de WLC y contrastado con el audit trail inglés de la POB. Se conservó la comparación inicial, el participio con sentido de conducta irracional, la imaginería de proyectiles incendiarios y el final abrupto «y muerte» sin suavizarlo.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto lo requiera; en este verso no aparece.
  - Se mantuvo un registro moderno y bíblico en español, evitando arcaísmos innecesarios.
  - «Flechas» y «tizones» conservan la secuencia de proyectiles sin añadir elementos ajenos al hebreo.
