translation:
  language: es
  text: Se volvieron hacia mí, dándome la espalda y no el rostro[a]; y aunque les enseñé, levantándome temprano y enseñando[b], no quisieron escuchar para recibir corrección.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «la espalda ... y no el rostro». Se conserva la imagen corporal hebrea para expresar rechazo relacional.
    reason: lexical_alternative
  - marker: b
    text: O «madrugando y enseñando». El hebreo es un modismo para instrucción repetida, diligente y persistente.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּפְנוּ
  english_pob_choice: They turned
  chosen_spanish: Se volvieron
  alternatives_spanish:
  - Se apartaron
  - Dieron la vuelta
  lexicon: HALOT
  rationale: El verbo expresa el acto de volverse en dirección contraria a Dios. «Se volvieron» conserva el movimiento relacional sin añadir una paráfrasis más fuerte que el hebreo.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: hacia mí
  alternatives_spanish:
  - a mí
  - contra mí
  lexicon: HALOT
  rationale: La preposición marca dirección hacia el hablante. «Hacia mí» preserva mejor el matiz direccional que un simple «a mí», y evita introducir la idea de hostilidad explícita que no está en la forma misma.
- source_word: עֹרֶף ... וְלֹא פָנִים
  english_pob_choice: their back ... and not their face
  chosen_spanish: dándome la espalda ... y no el rostro
  alternatives_spanish:
  - mostrándome la nuca ... y no el rostro
  - la espalda ... y no el rostro
  lexicon: HALOT
  rationale: En español, «dar la espalda» es el equivalente idiomático natural del hebreo, y comunica rechazo o desprecio sin perder la imagen corporal. «El rostro» refleja con dignidad el contraste con «espalda»; el singular funciona de modo distributivo como en el inglés auditado.
- source_word: וְלַמֵּד אֹתָם
  english_pob_choice: though I taught them
  chosen_spanish: y aunque les enseñé
  alternatives_spanish:
  - y les enseñé
  - mientras les enseñaba
  lexicon: HALOT
  rationale: 'La construcción tiene fuerza concesiva en contexto: Dios instruyó al pueblo a pesar de su resistencia. «Aunque les enseñé» reproduce esa relación mejor que una coordinación simple.'
- source_word: הַשְׁכֵּם וְלַמֵּד
  english_pob_choice: rising early and teaching
  chosen_spanish: levantándome temprano y enseñando
  alternatives_spanish:
  - madrugando y enseñando
  - levantándome de madrugada y enseñando
  - enseñando con diligencia y repetidamente
  lexicon: HALOT
  rationale: El idiomático hebreo de «levantarse temprano» expresa insistencia y diligencia profética. La forma participial en español conserva la imagen de acción continua y el valor adverbial del original.
- source_word: וְאֵינָם שֹׁמְעִים
  english_pob_choice: they would not listen
  chosen_spanish: no quisieron escuchar
  alternatives_spanish:
  - no escuchaban
  - no escucharon
  lexicon: HALOT
  rationale: El hebreo indica resistencia volitiva, no mera sordera física. «No quisieron escuchar» mantiene el matiz de rechazo deliberado mejor que un pretérito neutral.
- source_word: לָקַחַת מוּסָר
  english_pob_choice: to receive correction
  chosen_spanish: para aceptar corrección
  alternatives_spanish:
  - para recibir corrección
  - para aceptar disciplina
  - para recibir instrucción
  lexicon: HALOT
  rationale: «Musar» abarca corrección, disciplina e instrucción con tono formativo y amonestador. «Aceptar corrección» comunica bien la respuesta requerida en español y mantiene abierta la amplitud semántica del término.
translation_notes:
  revision_awareness: 'Esta redacción sigue de cerca el hebreo de Jeremías 32:33 y mantiene las decisiones auditadas de la POB en inglés: el contraste corporal «espalda/rostro», la fuerza concesiva de «though I taught them», el modismo profético de «rising early and teaching» y el matiz volitivo de «they would not listen». No se detectaron revisiones textuales que alteren el sentido base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en el cuerpo del proyecto, pero en este versículo el sujeto implícito de la primera persona está representado por «mí»; no requiere máscara nominal.
  - «Corrección» se eligió como término principal para musar, manteniendo la amplitud semántica de disciplina/instrucción en la nota.
  - Se evita «Señor» y también «Cristo», ya que no aparecen en el versículo ni en su trasfondo inmediato.
  - La puntuación separa con punto y coma la primera acusación de la segunda cláusula concesiva, reflejando la estructura retórica del hebreo.
