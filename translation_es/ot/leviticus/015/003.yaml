    rationale: 'La justificación inglesa prioriza el valor de separación/origen: ‘from his discharge’. ‘Por causa de’ introduce una relación causal no preferida por el expediente.'
  - severity: low
    issue: Naturalidad de ‘corra con su flujo’
    rationale: Es comprensible pero algo rígido en español. Aun así, puede mantenerse por cercanía al verbo hebreo/inglés si el resto se corrige.
