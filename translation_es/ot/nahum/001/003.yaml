    issue: La nota al pie ofrece alternativas españolas poco naturales o incompletas.
    rationale: '«Y de ningún modo absolverá» carece de objeto y en español queda abrupto; «y ciertamente no dejará inocente» también queda truncado. Dado que la nota pretende preservar alternativas formales documentadas por el POB inglés, conviene expresar esas opciones con español jurídico-natural: «de ningún modo absolverá al culpable» / «ciertamente no lo dejará impune».'
  - severity: low
    issue: La puntuación con dos puntos tras «Yahvé» es menos fluida que la pausa enfática del inglés.
    rationale: 'No es infiel, pero un guion largo refleja mejor la aposición enfática: «Yahvé—su camino...». En español bíblico moderno también puede usarse coma o reestructuración. Es un ajuste estilístico menor, no doctrinal.'
