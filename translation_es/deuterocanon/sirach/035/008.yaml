translation:
  language: es
  text: Presenta tu ofrenda con mirada alegre[b][a], y dedica tu diezmo con alegría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo conservado de este versículo es difícil y parece estar parcialmente corrupto en algunos lugares; se ha usado el paralelo griego para recuperar el sentido probable, especialmente en las dos primeras cláusulas.
    reason: textual_variant
  - marker: b
    text: 'Literalmente, el griego dice: «en pocas cosas, muchas», un giro idiomático que puede expresar abundancia o generosidad aun en una formulación breve.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κεφαλαίωσον λόγον
  english_pob_choice: Sum up your speech
  chosen_spanish: Resume tu discurso
  alternatives_spanish:
  - Suma tu discurso
  - Concluye tu խոսp?
  - Pon en suma tu palabra
  lexicon: BDAG; LSJ
  rationale: El griego usa un imperativo de condensar o llevar a cabeza lo dicho; en español, 'resume' comunica con naturalidad la idea de sintetizar el discurso sin perder el matiz exhortativo.
- source_word: ἐν ὀλίγοις πολλά
  english_pob_choice: in few words say much
  chosen_spanish: en pocas palabras di mucho
  alternatives_spanish:
  - con pocas palabras di mucho
  - en pocas palabras, mucho
  - en breve, di mucho
  lexicon: BDAG
  rationale: La expresión griega es idiomática y contrasta lo breve con lo abundante. 'En pocas palabras di mucho' reproduce bien la economía verbal con estilo publicable en español.
- source_word: γίνου ὡς γινώσκων
  english_pob_choice: Be like one who knows
  chosen_spanish: sé como quien sabe
  alternatives_spanish:
  - sé como uno que sabe
  - pórtate como quien entiende
  - actúa como alguien que sabe
  lexicon: BDAG
  rationale: El comparativo exhortativo se vuelve más natural en español con 'sé como quien sabe', que mantiene la exhortación sapiencial sin sobrecargar el texto.
- source_word: ἅμα σιωπῶν
  english_pob_choice: and yet keeps silent
  chosen_spanish: al mismo tiempo, calla
  alternatives_spanish:
  - y a la vez guarda silencio
  - y, al mismo tiempo, permanece callado
  lexicon: BDAG
  rationale: '''σιωπῶν'' enfatiza el acto de callar/guardar silencio en paralelo con el saber; la formulación española conserva esa tensión de prudencia sapiencial.'
translation_notes:
  revision_awareness: El borrador anterior se apartaba por completo del contenido de Sirach 35:8. Esta versión vuelve al paralelo griego y evita mezclar este versículo con la escena de ofrenda y diezmo de otra tradición textual.
  spanish_consistency_notes:
  - Se prefirió 'discurso' para λόγον como sustantivo colectivo natural en español.
  - Se conservó la tensión sapiencial de hablar mucho con pocas palabras y, a la vez, guardar silencio prudente.
  - No se usó 'Cristo', 'SEÑOR' ni terminología doctrinal ajena al versículo.
  - Los marcadores de nota [a] y [b] están anclados en el texto principal y corresponden exactamente a las notas incluidas.
