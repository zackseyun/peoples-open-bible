  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: interjección inicial, autoidentificación maternal, «viuda», «sola» y el cierre con un adjetivo de lamento. También sigue correctamente la revisión inglesa al mantener «hijos hermosos» en lugar de una interpretación como «nobles». Sin embargo, «madre de muchos» queda incompleto en español porque πολύπαις significa tener muchos hijos, no simplemente ser madre de muchas personas; conviene explicitar «muchos hijos».'
  spanish_quality_summary: El texto es generalmente legible y digno, pero «¡Oh, yo...!» suena torpe en español natural, y «madre de muchos» es poco idiomático y potencialmente ambiguo. «Muy doliente mujer» es aceptable, aunque algo rígido; con leves ajustes de puntuación y completando «hijos» tras «muchos», el resultado queda más fiel y más natural sin apartarse del original.
  glossary_alignment: No hay términos teológicos de proyecto implicados. Las decisiones léxicas principales están en línea con el expediente inglés, salvo que el español debe expresar mejor el sentido de πολύπαις como «de muchos hijos». Se conserva «hermosos» para καλλίπαις, en sintonía con la revisión auditada.
  issues:
  - severity: medium
    issue: «madre de muchos» omite «hijos»
    rationale: πολύπαις significa ‘con muchos hijos’. En español, «madre de muchos» puede sonar incompleto o referirse a muchas personas en general.
  - severity: medium
    issue: «¡Oh, yo...!» es poco natural en español
    rationale: Aunque intenta reflejar ἐγώ, el griego no exige una reproducción tan literal de «yo» en esa posición. En español exclamativo suena forzado; conviene una formulación más idiomática que conserve la autoidentificación.
  - severity: low
    issue: La nota sobre «madre» atribuye el valor a πολύπαις de manera algo imprecisa
    rationale: El matiz maternal surge del conjunto de la frase y del contexto, no de que πολύπαις por sí solo signifique literalmente «madre». La nota puede aclararse.
