translation:
  language: es
  text: 'Entonces Manoah se levantó y fue tras su esposa[a], y llegó al hombre y le dijo: «¿Eres tú el hombre que hablaste a la mujer?» Y él dijo[c][b]: «Yo soy».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «siguiendo a su esposa». El hebreo literalmente dice «después de su esposa».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la mujer», no «mi esposa».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «Yo soy él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  lexicon: HALOT
  rationale: El verbo narrativo indica levantarse para ponerse en marcha. En español, «se levantó» comunica bien el inicio de la acción sin sonar forzado ni demasiado arcaico.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - anduvo
  - se encaminó
  lexicon: HALOT
  rationale: El sentido básico es ir. «Fue» es la opción natural en español para este desplazamiento narrativo.
- source_word: אַחֲרֵי אִשְׁתּוֹ
  english_pob_choice: after his wife
  chosen_spanish: tras su esposa
  alternatives_spanish:
  - después de su esposa
  - siguiendo a su esposa
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «después de / tras». En este contexto narrativo, «tras su esposa» conserva la relación espacial o de seguimiento sin añadir más de lo que el texto dice.
- source_word: וַיָּבֹא אֶל הָאִישׁ
  english_pob_choice: came to the man
  chosen_spanish: vino al hombre
  alternatives_spanish:
  - se acercó al hombre
  - fue al hombre
  lexicon: HALOT
  rationale: בוא con אֶל admite «venir a». «Vino al hombre» mantiene la dirección del movimiento y la designación narrativa «el hombre».
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - el visitante
  lexicon: HALOT
  rationale: Se conserva la referencia superficial del hebreo. Aunque el lector sabe por el contexto amplio que se trata del mensajero de Yahvé, aquí el texto lo llama simplemente «el hombre».
- source_word: הַאַתָּה
  english_pob_choice: Are you
  chosen_spanish: ¿Eres tú
  alternatives_spanish:
  - ¿Eres tú, acaso
  - ¿Eres tú mismo
  lexicon: HALOT
  rationale: La pregunta directa se expresa de forma natural en español con «¿Eres tú». Mantiene el énfasis interrogativo sin sobretraducir.
- source_word: אֲשֶׁר דִּבַּרְתָּ אֶל הָאִשָּׁה
  english_pob_choice: who spoke to the woman
  chosen_spanish: que hablaste a la mujer
  alternatives_spanish:
  - que hablaste con la mujer
  - que le hablaste a la mujer
  lexicon: HALOT
  rationale: 'Se sigue de cerca el hebreo: el relativo y el verbo en segunda persona apuntan a una acción dirigida «a la mujer». «Hablaste a» preserva mejor la preposición אֶל que «hablaste con».'
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - mi esposa
  lexicon: HALOT
  rationale: Aunque Manoah se refiere a su esposa, el hebreo dice «la mujer». Se conserva esa forma para no borrar la tensión léxica documentada por el texto.
- source_word: אָֽנִי
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy yo
  - Yo mismo
  lexicon: HALOT
  rationale: La respuesta hebrea es una autoidentificación muy breve. «Yo soy» la reproduce con naturalidad y mantiene abierta la posibilidad de la alternativa «Yo soy él» sin imponerla.
theological_decisions:
- issue: Identidad del interlocutor
  english_pob_reading: Render הָאִישׁ as 'the man' rather than 'the angel'
  chosen_spanish_reading: Traducir הָאִישׁ como «el hombre»
  alternative_spanish_readings:
  - el ángel
  - el mensajero
  rationale: El contexto más amplio identifica al personaje, pero este versículo lo nombra únicamente como «el hombre». Se preserva la perspectiva narrativa inmediata sin adelantar una identificación explícita que el hebreo de este versículo no hace.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje hebreo y el criterio auditado de la POB en inglés sin cambios sustantivos respecto del sentido: se mantiene la secuencia narrativa, la referencia a «el hombre» y la autoidentificación breve «Yo soy».'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como terminología base del proyecto, aunque este versículo no lo menciona explícitamente.
  - «la mujer» se mantiene donde el hebreo usa referencia genérica, evitando sustituirla por «mi esposa».
  - La forma verbal «Yo soy» conserva la brevedad del original y permite la nota alternativa sin forzar una explicación teológica adicional.
