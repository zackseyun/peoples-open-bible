  - severity: low
    issue: La nota al pie sobre «sus hijos» puede expresarse con mayor claridad.
    rationale: La formulación actual repite «hijos» para ambos sentidos y podría distinguir mejor entre «hijos varones» y «hijos» en sentido general.
