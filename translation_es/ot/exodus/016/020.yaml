translation:
  language: es
  text: Pero ellos no escucharon a Moisés[a], y algunos hombres dejaron parte de él hasta la mañana, y le brotaron gusanos[b] y hedió; y Moisés se enojó con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no hicieron caso a Moisés». El hebreo puede implicar negarse a escuchar, con sentido de desobediencia.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «gusanos surgieron en él» o «le brotaron gusanos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְעוּ אֶל מֹשֶׁה
  english_pob_choice: did not listen to Moses
  chosen_spanish: no escucharon a Moisés
  alternatives_spanish:
  - no obedecieron a Moisés
  - no hicieron caso a Moisés
  lexicon: HALOT
  rationale: שׁמע con אֶל puede significar oír/escuchar con la idea de prestar atención o acatar. ‘No escucharon’ conserva esa amplitud y permite que el contexto comunique la desobediencia sin introducirla como glosa principal.
- source_word: וַיּוֹתִרוּ
  english_pob_choice: left some of it
  chosen_spanish: guardaron parte de ello
  alternatives_spanish:
  - dejaron algo de ello
  - guardaron algo de ello
  lexicon: HALOT
  rationale: El verbo en hifil expresa dejar sobrante o retener una porción. ‘Guardaron parte de ello’ comunica que retuvieron una porción de manera no autorizada y suena natural en español bíblico actual.
- source_word: אֲנָשִׁים
  english_pob_choice: some men
  chosen_spanish: algunos hombres
  alternatives_spanish:
  - algunas personas
  - unos hombres
  lexicon: HALOT
  rationale: El hebreo es masculino plural explícito. ‘Algunos hombres’ conserva el matiz de un grupo indefinido de varones sin neutralizarlo.
- source_word: מִמֶּנּוּ
  english_pob_choice: of it
  chosen_spanish: de ello
  alternatives_spanish:
  - de él
  - de eso
  lexicon: HALOT
  rationale: El referente es el maná. ‘De ello’ evita ambigüedad de género en español y mantiene la referencia anafórica sin sobrecargar el estilo.
- source_word: עַד בֹּקֶר
  english_pob_choice: until morning
  chosen_spanish: hasta la mañana
  alternatives_spanish:
  - hasta la mañana siguiente
  - hasta el amanecer
  lexicon: HALOT
  rationale: ‘Hasta la mañana’ es la equivalencia más natural y fiel al valor temporal del hebreo.
- source_word: וַיָּרֻם תּוֹלָעִים
  english_pob_choice: it bred worms
  chosen_spanish: crió gusanos
  alternatives_spanish:
  - aparecieron gusanos en ello
  - le nacieron gusanos
  lexicon: HALOT
  rationale: La construcción hebrea describe el surgimiento de gusanos en el maná. ‘Crió gusanos’ conserva la fuerza narrativa y el resultado repulsivo, sin explicitar más de lo que el texto dice.
- source_word: וַיִּבְאַשׁ
  english_pob_choice: stank
  chosen_spanish: hedió
  alternatives_spanish:
  - apestó
  - se pudrió
  lexicon: HALOT
  rationale: El verbo significa oler mal, volverse fétido. ‘Hedió’ es breve, directo y corresponde al tono vívido del relato.
- source_word: וַיִּקְצֹף
  english_pob_choice: was angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se indignó
  - se encendió en ira
  lexicon: HALOT
  rationale: La raíz indica enojo/ira. ‘Se enojó’ comunica la reacción de Moisés con naturalidad; ‘se indignó’ podría intensificar sin necesidad el matiz.
- source_word: עֲלֵהֶם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - contra ellos
  - sobre ellos
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente dice ‘sobre/contra ellos’, en español la combinación natural con ‘enojarse’ es ‘con ellos’. Mantiene la relación interpersonal sin perder la idea de reproche.
theological_decisions:
- issue: Alcance de שׁמע con אֶל en un contexto de desobediencia
  english_pob_reading: did not listen to Moses; the disobedient implication is clear from context without importing 'obey' into the main text
  chosen_spanish_reading: no escucharon a Moisés
  alternative_spanish_readings:
  - no obedecieron a Moisés
  - no hicieron caso a Moisés
  rationale: El texto hebreo permite escuchar con sentido de atender/acatar. En español, ‘no escucharon’ deja que el contexto narrativo muestre la desobediencia, evitando reemplazar el verbo de recepción por uno más interpretativo.
  doctrine_reference: Éxodo 16:19-20; obediencia al mandato divino comunicado por Moisés
- issue: Relación entre maná retenido y corrupción posterior
  english_pob_reading: some men left some of it until morning, and it bred worms and stank
  chosen_spanish_reading: algunos hombres guardaron parte de ello hasta la mañana, y crió gusanos y hedió
  alternative_spanish_readings:
  - algunos hombres dejaron algo de ello hasta la mañana, y crió gusanos y hedió
  - algunos hombres retuvieron algo de ello hasta la mañana, y crió gusanos y hedió
  rationale: La secuencia debe mostrar que la retención indebida produjo corrupción real. ‘Guardaron parte de ello’ conserva tanto la acción humana como el resultado narrado sin suavizar la advertencia del texto.
  doctrine_reference: Éxodo 16:19-21; provisión, desobediencia y consecuencia
- issue: Sujeto humano explícito y plural masculino
  english_pob_reading: some men
  chosen_spanish_reading: algunos hombres
  alternative_spanish_readings:
  - algunas personas
  - unos hombres
  rationale: El hebreo no usa un sustantivo genérico neutro; el plural masculino es parte de la forma del verso. Mantenerlo en español preserva la precisión lexical del original.
  doctrine_reference: Precisión gramatical del texto hebreo
translation_notes:
  revision_awareness: 'He seguido el cierre del audit trail inglés: la revisión reciente ajustó la idea a ''left some of it'', que he reflejado como ''guardaron parte de ello''/''dejaron algo de ello'' en las alternativas, manteniendo la porción retenida sin añadir contenido. La traducción principal se mantiene alineada con el veredicto de alta concordancia y con las decisiones léxicas del POB en inglés.'
  spanish_consistency_notes:
  - Usé «Moisés» para מֹשֶׁה y mantuve el referente del maná con el neutro «ello» para evitar ambigüedad de género.
  - Mantuve «Yahvé» fuera del versículo porque el hebreo aquí no contiene el nombre divino ni un equivalente directo.
  - Elegí registros breves y narrativos ('crió gusanos', 'hedió', 'se enojó') para conservar el tono seco del relato.
  - No introduje una glosa explícita de 'obedecieron' en el texto principal, reservando esa lectura para la nota, en coherencia con el audit trail inglés.
