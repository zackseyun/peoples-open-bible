translation:
  language: es
  text: Porque Yahvé da sabiduría[a]; de su boca proceden el conocimiento y la comprensión[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pues Yahvé da sabiduría».'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «de su boca»; la imagen es que el conocimiento y la comprensión proceden del habla de Yahvé.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «discernimiento» para «comprensión».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como forma transparente y auditable en español. 'Yahvé' corresponde al criterio del POB en vez de sustituirlo por un título. 'El SEÑOR' ocultaría el nombre propio; 'Jehová' no es la forma adoptada por el proyecto.
- source_word: יִתֵּן
  english_pob_choice: gives
  chosen_spanish: da
  alternatives_spanish:
  - dará
  - otorga
  lexicon: HALOT
  rationale: El imperfecto proverbial expresa una verdad general, no solo futuro. 'Da' suena natural en español y conserva el valor gnómico mejor que una forma futura.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - destreza
  lexicon: HALOT
  rationale: '''Sabiduría'' es el equivalente básico y establecido para חָכְמָה en Proverbios, y preserva el campo semántico central del libro.'
- source_word: מִפִּיו
  english_pob_choice: from his mouth come
  chosen_spanish: de su boca proceden
  alternatives_spanish:
  - de su boca salen
  - de su boca vienen
  lexicon: HALOT
  rationale: La imagen literal es 'de su boca'. En español, 'proceden' comunica con naturalidad la procedencia de conocimiento y comprensión sin borrar la metáfora de la palabra divina.
- source_word: דַּעַת
  english_pob_choice: knowledge
  chosen_spanish: el conocimiento
  alternatives_spanish:
  - conocimiento
  - saber
  lexicon: HALOT
  rationale: Se mantiene el sustantivo 'conocimiento' para reflejar el paralelismo sapiencial con 'comprensión' y la pareja conceptual del hebreo.
- source_word: וּתְבוּנָה
  english_pob_choice: understanding
  chosen_spanish: la comprensión
  alternatives_spanish:
  - el entendimiento
  - el discernimiento
  lexicon: HALOT
  rationale: '''תְבוּנָה'' puede rendirse por ''entendimiento'' o ''discernimiento''. Se elige ''comprensión'' para un español claro y digno, manteniendo la fuerza intelectual del término sin fijar una sola connotación técnica.'
theological_decisions:
- issue: Tratamiento del nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La decisión teológica y editorial del POB es no enmascarar el Tetragrámaton. En español, 'Yahvé' preserva el nombre propio de Dios revelado a Israel y evita la sustitución por un título. 'El SEÑOR' eliminaría esa transparencia; 'Jehová' no sigue la convención adoptada por el proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El contexto de revisión reciente indica 'sin cambios' y alta concordancia con el paquete fuente; por eso se mantiene la estructura breve, el paralelismo sapiencial y la metáfora de la boca divina sin expansión interpretativa.
  spanish_consistency_notes:
  - 'Se preserva el paralelismo de dos miembros: sabiduría / conocimiento y comprensión.'
  - Se mantiene el nombre divino como 'Yahvé' de forma consistente con el estándar del proyecto.
  - '''Comprensión'' se usa aquí como término amplio y publicable; se deja nota alternativa para ''discernimiento'' porque el hebreo admite esa oscilación.'
  - La puntuación con punto y coma refleja dos cláusulas coordinadas en un proverbio de una sola línea.
