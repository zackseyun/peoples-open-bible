translation:
  language: es
  text: Entonces Moisés tomó un poco del aceite de la unción y de la sangre que estaba sobre el altar, y roció sobre Aarón, sobre sus vestiduras, sobre sus hijos, y sobre las vestiduras de sus hijos con él; así consagró a Aarón, a sus vestiduras, a sus hijos, y a las vestiduras de sus hijos con él.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «santificó a Aarón, a sus vestiduras, a sus hijos, y a las vestiduras de sus hijos con él».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took some of
  chosen_spanish: tomó de parte de
  alternatives_spanish:
  - tomó
  - tomó de
  lexicon: HALOT
  rationale: El hebreo expresa que Moisés tomó una porción, no la totalidad, porque el verbo va seguido de מִן. En español, «tomó de parte de» comunica bien esa idea partitiva sin sonar forzado.
- source_word: מִשֶּׁמֶן הַמִּשְׁחָה
  english_pob_choice: some of the anointing oil
  chosen_spanish: el aceite de la unción
  alternatives_spanish:
  - algo del aceite de la unción
  - del aceite de la unción
  lexicon: HALOT
  rationale: «Aceite de la unción» conserva el sentido cultual y suena natural en español. La partitividad ya quedó sugerida por «tomó de parte de».
- source_word: וּמִן הַדָּם אֲשֶׁר עַל הַמִּזְבֵּחַ
  english_pob_choice: and some of the blood that was on the altar
  chosen_spanish: y de la sangre que estaba sobre el altar
  alternatives_spanish:
  - y de la sangre que había sobre el altar
  - y de la sangre sobre el altar
  lexicon: HALOT
  rationale: «De la sangre» reproduce el valor partitivo de מִן. La relativa «que estaba sobre el altar» refleja con claridad אֲשֶׁר עַל הַמִּזְבֵּחַ.
- source_word: וַיַּז
  english_pob_choice: sprinkled it
  chosen_spanish: la roció
  alternatives_spanish:
  - la asperjó
  - la salpicó
  lexicon: HALOT
  rationale: En contexto ritual, el verbo describe aplicar líquido por aspersión. «Roció» es el equivalente español más natural y digno; «asperjó» sería más técnico, pero menos transparente.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - en
  lexicon: HALOT
  rationale: La repetición de עַל indica ubicación y destinatarios del acto. «Sobre» conserva la estructura del hebreo y funciona bien en español litúrgico contemporáneo.
- source_word: בְּגָדָיו
  english_pob_choice: his garments
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus vestiduras
  lexicon: HALOT
  rationale: «Vestidos» es una opción clara y solemne para el contexto sacerdotal. «Vestiduras» es posible, pero suena más arcaico; «ropas» es más general.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus descendientes
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino plural y en el contexto se trata de los hijos sacerdotales, «hijos» sigue el uso normal y claro del español. El contexto deja ver que se trata de los varones implicados en la ordenación.
- source_word: בִּגְדֵי בָנָיו אִתּוֹ
  english_pob_choice: the garments of his sons with him
  chosen_spanish: los vestidos de sus hijos con él
  alternatives_spanish:
  - los vestidos de sus hijos que estaban con él
  - las vestiduras de sus hijos con él
  lexicon: HALOT
  rationale: Se conserva la cadena de constructo con una expresión natural en español. «Con él» queda unido a la cláusula como en el hebreo, sin explicitar más de lo que el texto dice.
- source_word: וַיְקַדֵּשׁ
  english_pob_choice: so he consecrated
  chosen_spanish: así consagró
  alternatives_spanish:
  - y santificó
  - y lo consagró
  lexicon: HALOT
  rationale: En este contexto de investidura sacerdotal, «consagró» comunica bien el acto de apartar para servicio sagrado. Mantiene el valor ritual sin imponer una lectura doctrinal posterior.
- source_word: אֶת אַהֲרֹן ... וְאֶת בִּגְדֵי בָנָיו אִתּוֹ
  english_pob_choice: Aaron, his garments, his sons, and the garments of his sons with him
  chosen_spanish: a Aarón, a sus vestidos, a sus hijos y a los vestidos de sus hijos con él
  alternatives_spanish:
  - Aarón, sus vestidos, sus hijos y los vestidos de sus hijos con él
  - a Aarón y a sus vestidos y a sus hijos y a los vestidos de sus hijos con él
  lexicon: HALOT
  rationale: El español requiere repetir la preposición para marcar con claridad cada objeto directo coordinado. Se preserva la lista completa de personas y prendas consagradas.
theological_decisions:
- issue: קדשׁ en la ordenación sacerdotal
  english_pob_reading: consecrated
  chosen_spanish_reading: consagró
  alternative_spanish_readings:
  - santificó
  - hizo santo
  rationale: Aquí קדשׁ no describe un estado moral abstracto, sino el apartamiento ritual de Aarón y sus prendas e hijos para el servicio sacerdotal. «Consagró» expresa ese sentido funcional y cultual con buena inteligibilidad en español.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Referente masculino plural en בָּנָיו
  english_pob_reading: his sons
  chosen_spanish_reading: sus hijos
  alternative_spanish_readings:
  - sus hijos varones
  - sus descendientes
  rationale: El hebreo especifica un masculino plural, y el contexto sacerdotal confirma que se trata de los hijos varones de Aarón. En español, «hijos» es suficiente y natural, sin perder la referencia contextual.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el trayecto auditado en inglés. No hay revisiones aplicadas en el registro fuente; la decisión principal en español fue hacer explícita la partitividad de מִן con una fórmula idiomática y mantener el verbo ritual «consagró» para קדשׁ.
  spanish_consistency_notes:
  - Se mantiene Yahvé no porque no aparezca en este versículo, sino como norma general del proyecto; aquí no aplica.
  - Se usa un registro sobrio y culto, evitando calcos como «asperjó» si resultan menos transparentes para una lectura amplia.
  - La repetición de «sobre» y de las frases con «a» conserva la cadencia enumerativa del hebreo sin oscurecer la sintaxis española.
