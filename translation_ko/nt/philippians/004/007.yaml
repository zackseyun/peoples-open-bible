id: PHP.4.7
reference: Philippians 4:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἡ εἰρήνη τοῦ θεοῦ ἡ ὑπερέχουσα πάντα νοῦν φρουρήσει τὰς καρδίας ὑμῶν καὶ τὰ νοήματα ὑμῶν ἐν Χριστῷ Ἰησοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/007.yaml
  text: And the peace of God, which surpasses all understanding, will guard your hearts and your minds in Messiah Jesus.
translation:
  language: ko
  text: 그리하면 모든 지각을 뛰어넘는 하나님의 평강이 메시아 예수[a] 안에서 여러분의 마음과 생각을 지켜 줄 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도 예수」. Χριστός를 칭호로 옮기는 본 번역의 원칙에 따라 「메시아」로 번역한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: καί
  english_pob_choice: And
  chosen_korean: 그리하면
  alternatives_korean:
  - 그리고
  - 그러면
  lexicon: BDAG
  rationale: 6절의 명령(염려하지 말고 기도·간구·감사로 아뢰라)에 이어지는 결과·약속을 도입하므로, 단순 접속 「그리고」보다 「그리하면」이 한국어 문맥의 약속적 흐름을 자연스럽게 살린다.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_korean: 평강
  alternatives_korean:
  - 평화
  - 온전한 평안
  lexicon: BDAG
  rationale: 본 번역의 εἰρήνη 기본 옮김. 한국 교회의 「하나님의 평강」 정형어는 사회적 평화(平和)보다 깊은 내적·관계적 온전함을 담는다. 가장 외워지는 구절 중 하나이지만, 합쇼체 일관성 안에서 자연스럽게 정착된 「평강」을 유지한다.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_korean: 하나님의
  alternatives_korean:
  - 하나님께로부터 오는
  lexicon: BDAG
  rationale: 속격을 단순 「~의」로 보존하여 본문의 압축을 흐트러뜨리지 않는다.
- source_word: ὑπερέχουσα
  english_pob_choice: which surpasses
  chosen_korean: 뛰어넘는
  alternatives_korean:
  - 능가하는
  - 초월하는
  lexicon: BDAG
  rationale: 「뛰어넘다」가 인간 인지를 초과한다는 능동적·생생한 함의를 자연스럽게 담는다. 「초월하는」은 다소 추상적·철학적 어감이 강하다.
- source_word: πάντα νοῦν
  english_pob_choice: all understanding
  chosen_korean: 모든 지각
  alternatives_korean:
  - 모든 생각
  - 모든 이해
  lexicon: BDAG
  rationale: 한국 교회의 정형어 「지각」(知覺)이 νοῦς의 인지·이해의 한계를 잘 담으며, 7절 후반의 「생각」(νοήματα)과 어휘적 중복을 피한다.
- source_word: φρουρήσει
  english_pob_choice: will guard
  chosen_korean: 지켜 줄 것입니다
  alternatives_korean:
  - 지킬 것입니다
  - 호위할 것입니다
  lexicon: BDAG
  rationale: 군사적 「수호」의 함의를 가진 미래 능동. 합쇼체 「지켜 줄 것입니다」는 신적 보호의 약속을 따뜻하게 전달한다.
- source_word: καρδίας
  english_pob_choice: hearts
  chosen_korean: 마음
  lexicon: BDAG
  rationale: 성경적 「마음」은 정서·의지·내적 인격의 중심을 가리키며 한국어 「마음」이 그 의미를 그대로 담는다.
- source_word: νοήματα
  english_pob_choice: minds
  chosen_korean: 생각
  alternatives_korean:
  - 사상
  - 생각들
  lexicon: BDAG
  rationale: νοήματα는 구체적 사고·심상의 작용을 가리키므로 「생각」이 가장 자연스럽다. 앞의 「마음」과 짝지어 내적 인격 전체를 표현한다.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_korean: 메시아 예수 안에서
  alternatives_korean:
  - 그리스도 예수 안에서
  - 메시아 예수와 연합하여
  lexicon: BDAG
  rationale: 본 번역의 칭호 번역 원칙에 따라 「메시아」를 유지한다. 한국 교회 전통의 「그리스도 예수」는 칭호성이 가려지므로 각주에 둔다.
theological_decisions:
- issue: ἐν Χριστῷ Ἰησοῦ에서 Χριστός를 칭호로 번역
  chosen_reading: 메시아 예수 안에서
  alternative_readings:
  - 그리스도 예수 안에서
  rationale: 본 번역은 칭호로 기능하는 Χριστός를 칭호로 번역한다. 본문은 「메시아이신 예수」 안에서의 신자의 위치를 가리키므로 칭호의 무게가 유지된다.
  doctrine_reference: 'Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
