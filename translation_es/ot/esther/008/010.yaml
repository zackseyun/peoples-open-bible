translation:
  language: es
  text: Escribió en nombre del rey Asuero, lo selló con el anillo de sello del rey, y envió cartas por medio de correos a caballo, montados en corceles reales[a], hijos de yeguas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los términos hebreos para los caballos en este versículo son raros y difíciles. La frase traducida aquí de forma más literal como 'corceles reales, hijos de yeguas' también puede entenderse de manera más interpretativa como animales del servicio postal o de la caballeriza real.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְתֹּב
  english_pob_choice: He wrote
  chosen_spanish: Escribió
  alternatives_spanish:
  - Entonces escribió
  - Y escribió
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se vierte con pretérito simple en español para mantener la sucesión narrativa sin añadir explicaciones.
- source_word: בְּשֵׁם הַמֶּלֶךְ אֲחַשְׁוֵרֹשׁ
  english_pob_choice: in the name of King Ahasuerus
  chosen_spanish: en el nombre del rey Asuero
  alternatives_spanish:
  - bajo el nombre del rey Asuero
  - en nombre del rey Asuero
  lexicon: HALOT
  rationale: La expresión בְּשֵׁם conserva la idea de actuar con autoridad oficial; 'en el nombre de' es la forma española más natural y fiel al uso idiomático.
- source_word: וַיַּחְתֹּם בְּטַבַּעַת הַמֶּלֶךְ
  english_pob_choice: sealed it with the king’s signet ring
  chosen_spanish: lo selló con el anillo de sello del rey
  alternatives_spanish:
  - lo selló con el sello del rey
  - lo selló con el anillo real
  lexicon: HALOT
  rationale: טַבַּעַת en contexto real designa el instrumento de sellar; 'anillo de sello' explicita bien la función sin perder el referente.
- source_word: וַיִּשְׁלַח סְפָרִים
  english_pob_choice: and sent letters
  chosen_spanish: y envió cartas
  alternatives_spanish:
  - y despachó documentos
  - y envió escritos
  lexicon: HALOT
  rationale: סְפָרִים aquí alude a comunicaciones escritas oficiales; 'cartas' comunica con naturalidad el carácter documental en español.
- source_word: בְּיַד הָרָצִים
  english_pob_choice: by couriers
  chosen_spanish: por medio de correos
  alternatives_spanish:
  - por mano de los correos
  - por los corredores
  lexicon: HALOT
  rationale: בְּיַד expresa agencia/instrumento; 'por medio de' evita el calco y 'correos' transmite la función de mensajeros oficiales.
- source_word: בַּסּוּסִים
  english_pob_choice: on horses
  chosen_spanish: a caballo
  alternatives_spanish:
  - sobre caballos
  - montados en caballos
  lexicon: HALOT
  rationale: La frase preposicional se vuelve naturalmente 'a caballo' en español, manteniendo el sentido instrumental/locrativo.
- source_word: רֹכְבֵי
  english_pob_choice: riding
  chosen_spanish: montados en
  alternatives_spanish:
  - cabalgando
  - jineteando
  lexicon: HALOT
  rationale: El participio describe a los correos; 'montados en' conserva la relación entre los mensajeros y sus cabalgaduras en una estructura fluida.
- source_word: הָרֶכֶשׁ
  english_pob_choice: the royal steeds
  chosen_spanish: caballos reales
  alternatives_spanish:
  - corceles reales
  - caballos de la casa real
  lexicon: HALOT
  rationale: רֶכֶשׁ es un término raro para caballos selectos; 'caballos reales' mantiene el contexto cortesano sin sobreinterpretar la clase exacta.
- source_word: הָאֲחַשְׁתְּרָנִים
  english_pob_choice: the royal
  chosen_spanish: reales
  alternatives_spanish:
  - de servicio real
  - del correo real
  lexicon: HALOT
  rationale: Dado que el hebreo es difícil y el audit trail inglés lo trata de modo adjetival, 'reales' preserva la cautela sin introducir una precisión no garantizada.
- source_word: בְּנֵי הָרַמָּכִים
  english_pob_choice: the sons of mares
  chosen_spanish: los hijos de las yeguas
  alternatives_spanish:
  - los hijos de las mares
  - la descendencia de las yeguas
  lexicon: HALOT
  rationale: Se mantiene la literalidad del giro semítico 'hijos de' para no borrar la tensión léxica del hebreo; 'yeguas' expresa el referente femenino equino de forma clara en español.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que retrocedió desde una paráfrasis interpretativa ('bred from swift stock') a una rendición más literal ('the sons of mares'). Por eso la versión española conserva la expresión concreta y no añade rasgos como 'rápidos' o 'de raza'.
  spanish_consistency_notes:
  - Se mantuvo 'en el nombre de' para reflejar el valor idiomático de autoridad oficial.
  - Se prefirió 'anillo de sello' por ser la expresión española más clara para טַבַּעַת en contexto real.
  - La última cláusula se dejó deliberadamente literal para preservar la rareza del hebreo y su posible ambigüedad zoológica o de linaje.
  - Se usó 'correos' para los רָצִים porque en español comunica mejor su función oficial que 'corredores'.
