  language: en
  yaml_path: translation/ot/numbers/019/018.yaml
  text: Then a clean man shall take hyssop and dip it in the water[a], and sprinkle it on the tent, on all the vessels, on the persons who were there, and on the one who touched the bone, or the slain body, or the dead person[b], or the grave.
  footnotes:
  - marker: a
    text: Or 'a man who is clean.' The Hebrew is singular masculine.
    reason: lexical_alternative
  - marker: b
    text: Or 'the slain' or 'a slain body.' The Hebrew term refers specifically to one killed violently, distinguishing it from the more general 'dead person' in the next phrase.
    reason: lexical_alternative
