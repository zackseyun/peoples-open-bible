  text: 내가 자랑하고자 한다면 어리석은 자가 되지 않을 것입니다. 진실을 말하는 것이기 때문입니다. 그러나 나는 삼갑니다. 아무도 나를 보고 듣는 것 이상으로 나를 평가하지 못하게 하려는 것입니다.
