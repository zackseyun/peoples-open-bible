translation:
  language: es
  text: Luego entra, y cierra la puerta detrás de ti y detrás de tus hijos; y vierte en todos estos recipientes[a]; y aparta los llenos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vasijas». El término hebreo es amplio y puede abarcar distintos tipos de recipientes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאת
  english_pob_choice: Then go in
  chosen_spanish: Luego entra
  alternatives_spanish:
  - Y entrarás
  - Y ve adentro
  lexicon: HALOT
  rationale: El hebreo expresa una acción secuencial e imperativa dirigida a la mujer. «Luego entra» conserva la sucesión indicada por el waw y suena natural en español sin perder el valor directivo.
- source_word: וְסָגַרְתְּ הַדֶּלֶת
  english_pob_choice: shut the door
  chosen_spanish: cierra la puerta
  alternatives_spanish:
  - sella la puerta
  - enciérrala
  lexicon: HALOT
  rationale: סגר puede ser «cerrar» o «cerrar con firmeza». En español, «cierra la puerta» comunica bien la instrucción; «shut» no exige necesariamente un término más fuerte que «cerrar» en este contexto.
- source_word: בַּעֲדֵךְ וּבְעַד בָּנַיִךְ
  english_pob_choice: behind yourself and behind your sons
  chosen_spanish: detrás de ti y detrás de tus hijos
  alternatives_spanish:
  - tras de ti y tras tus hijos
  - a tus espaldas y a espaldas de tus hijos
  lexicon: HALOT
  rationale: La preposición con la puerta indica exclusión espacial; «detrás de ti» preserva esa imagen concreta y mantiene la repetición hebrea. Se prefirió «hijos» porque el contexto inmediato ya lo especifica así en la POB inglesa, aunque el hebreo es más general en forma.
- source_word: וְיָצַקְתְּ עַל
  english_pob_choice: pour into
  chosen_spanish: vierte sobre
  alternatives_spanish:
  - derrama en
  - vacía sobre
  lexicon: HALOT
  rationale: יצק significa verter/pour. Aunque la combinación con recipientes podría sugerir «en», el hebreo usa עַל; «vierte sobre» conserva mejor esa preposición, dejando que el contexto determine el acto de llenarlos con aceite.
- source_word: כָּל הַכֵּלִים הָאֵלֶּה
  english_pob_choice: all these containers
  chosen_spanish: todos estos recipientes
  alternatives_spanish:
  - todos estos vasos
  - todos estos utensilios
  lexicon: HALOT
  rationale: כֵּלִים es un término amplio. «Recipientes» es natural en español y mantiene la amplitud del término sin reducirlo a un tipo específico de vasija.
- source_word: וְהַמָּלֵא תַּסִּיעִי
  english_pob_choice: set aside the full ones
  chosen_spanish: aparta los llenos
  alternatives_spanish:
  - separa los llenos
  - retira los llenos
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo/adjetivo singular con valor colectivo o genérico; la revisión inglesa favoreció el plural por sentido. En español, «los llenos» transmite naturalmente la idea de los recipientes ya llenos y evita forzar un singular que sonaría menos claro.
translation_notes:
  revision_awareness: La POB inglesa revisó «the full one» a «the full ones» para reflejar mejor el valor genérico/colectivo del singular hebreo. La redacción española adopta directamente un plural equivalente («los llenos») para expresar ese mismo ajuste sin añadir interpretación extra.
  spanish_consistency_notes:
  - Se mantuvo un registro directo e instruccional, acorde con el hebreo imperativo.
  - Se preservó la repetición espacial de «detrás de ti y detrás de tus hijos» para no suavizar la imagen del texto.
  - «Recipientes» se usó como término amplio y fácilmente comprensible para כֵּלִים.
  - La solución «los llenos» refleja la decisión revisada de la POB inglesa y evita un singular artificial en español.
