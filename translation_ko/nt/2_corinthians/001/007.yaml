translation:
  language: ko
  text: 여러분에 대한 우리의 소망이 확고합니다. 우리는 여러분이 고난에 동참한 것같이 위로에도 동참한 줄을 알기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐλπὶς
  english_pob_choice: hope
  chosen_korean: 소망
  alternatives_korean:
  - 희망
  lexicon: BDAG
  rationale: 바울의 신학 어휘로 「소망」이 정립된 등가어. 「희망」은 일반어로 신학적 무게가 약하다.
- source_word: βεβαία
  english_pob_choice: firm
  chosen_korean: 확고하다
  alternatives_korean:
  - 굳건하다
  - 견고하다
  lexicon: BDAG
  rationale: βέβαιος는 흔들리지 않는 확실성을 가리킨다.
- source_word: κοινωνοί
  english_pob_choice: share in
  chosen_korean: 동참하다
  alternatives_korean:
  - 함께 나누다
  - 교제하다
  lexicon: BDAG
  rationale: κοινωνός는 적극적 참여자를 가리키며, 본 문맥에서 「동참하다」가 가장 적절하다.
