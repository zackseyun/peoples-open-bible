translation:
  language: es
  text: 'y para el sacrificio de paz[a]: dos reses[b], cinco carneros, cinco machos cabríos, cinco corderos machos de un año. Esta fue la ofrenda de Pagiel hijo de Ocran.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «sacrificios de paz», «sacrificios de comunión» u «ofrendas de bienestar» para el término hebreo tradicionalmente vertido «ofrendas de paz» o «sacrificios de paz».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «dos reses»; muchas traducciones lo vierten más específicamente como «dos bueyes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  english_pob_choice: and for the sacrifice of
  chosen_spanish: y para el sacrificio de
  alternatives_spanish:
  - y para una ofrenda de
  - y como sacrificio de
  lexicon: HALOT
  rationale: La preposición y conjunción introducen otro elemento de la lista ritual. En español, 'para el sacrificio de' conserva la relación funcional sin sonar forzado.
- source_word: הַשְּׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: los sacrificios de paz
  alternatives_spanish:
  - las ofrendas de paz
  - los sacrificios de comunión
  - las ofrendas de bienestar
  lexicon: HALOT
  rationale: '''שְׁלָמִים'' corresponde al sacrificio ritual tradicionalmente llamado ''peace offerings''. En español, ''sacrificios de paz'' mantiene la categoría cultual y permite escuchar el vínculo con shalom sin sustituirlo por una paráfrasis explicativa.'
- source_word: בָּקָר שְׁנַיִם
  english_pob_choice: two cattle
  chosen_spanish: dos reses
  alternatives_spanish:
  - dos cabezas de ganado
  - dos bueyes
  - dos vacunos
  lexicon: HALOT
  rationale: '''בָּקָר'' es un término colectivo para ganado vacuno. ''Reses'' comunica bien el colectivo en español y evita especificar ''bueyes'' cuando el hebreo no lo hace.'
- source_word: אֵילִם חֲמִשָּׁה
  english_pob_choice: five rams
  chosen_spanish: cinco carneros
  alternatives_spanish:
  - cinco machos de oveja
  - cinco borregos
  lexicon: HALOT
  rationale: '''אֵילִם'' designa carneros, no solo ovejas macho en general. ''Carneros'' es el equivalente directo y natural en español.'
- source_word: עַתֻּדִים חֲמִשָּׁה
  english_pob_choice: five male goats
  chosen_spanish: cinco machos cabríos
  alternatives_spanish:
  - cinco cabritos machos
  - cinco chivos
  lexicon: HALOT
  rationale: '''עַתֻּדִים'' se refiere a machos cabríos. ''Machos cabríos'' conserva la precisión lexical y el registro bíblico adecuado.'
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  english_pob_choice: five male lambs a year old
  chosen_spanish: cinco corderos macho de un año
  alternatives_spanish:
  - cinco corderos de un año
  - cinco corderos machos de un año
  lexicon: HALOT
  rationale: El hebreo combina כְּבָשִׂים con 'hijos de un año', indicando animales jóvenes de un año. 'Corderos macho de un año' conserva la edad y la distinción sexual que el inglés POB explicitó.
- source_word: זֶה קָרְבַּן
  english_pob_choice: This was the offering of
  chosen_spanish: Esta fue la ofrenda de
  alternatives_spanish:
  - Esta fue la presentación de
  - Este fue el ofrecimiento de
  lexicon: HALOT
  rationale: La fórmula final resume la entrega ritual. 'Ofrenda' es la forma natural y fiel para קָרְבָּן en este contexto.
- source_word: פַּגְעִיאֵל בֶּן עָכְרָן
  english_pob_choice: Pagiel son of Ocran
  chosen_spanish: Pagiel hijo de Ocran
  alternatives_spanish:
  - Pagiel, hijo de Ocran
  lexicon: HALOT
  rationale: Los nombres propios se transliteran y el patronímico se vierte con la fórmula usual 'hijo de'.
theological_decisions:
- issue: יַחַס sacrificial del término שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: sacrificios de paz
  alternative_spanish_readings:
  - ofrendas de paz
  - sacrificios de comunión
  - ofrendas de bienestar
  rationale: No hay indicio en el texto de una reinterpretación doctrinal; la decisión es léxica. 'Sacrificios de paz' mantiene la categoría ritual tradicional sin ocultar el matiz de shalom presente en el hebreo.
  doctrine_reference: Levítico 3; Números 7:17-83
- issue: Especificación de la clase animal בָּקָר
  english_pob_reading: two cattle
  chosen_spanish_reading: dos reses
  alternative_spanish_readings:
  - dos bueyes
  - dos cabezas de ganado
  rationale: El hebreo no precisa que sean bueyes; por eso la traducción evita sobredeterminar la especie. 'Reses' conserva el carácter colectivo y la cautela semántica del original.
  doctrine_reference: Números 7:3-8; HALOT, בָּקָר
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo y con el audit trail inglés sin revisiones aplicadas; se conservó la estructura enumerativa y la fórmula final de dedicación.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió 'ofrenda' para קָרְבָּן y 'sacrificios de paz' para שְׁלָמִים, coherente con el inventario cultual del capítulo.
  - Se evitó traducir בָּקָר como 'bueyes' en el texto principal para no añadir una especificación no dada por el hebreo.
