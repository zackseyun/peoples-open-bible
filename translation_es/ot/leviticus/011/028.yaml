translation:
  language: es
  text: Quien lleve su carcasa[a] lavará su ropa y será impuro hasta la tarde. Son impuros para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus carcasas». El hebreo puede entenderse distributivamente de los animales en vista.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנֹּשֵׂא
  english_pob_choice: Whoever carries
  chosen_spanish: Quien lleve
  alternatives_spanish:
  - El que lleve
  - Cualquiera que lleve
  lexicon: HALOT
  rationale: El participio con artículo tiene valor genérico y legal. «Quien lleve» comunica bien esa generalidad en español sin volver la frase pesada o demasiado repetitiva.
- source_word: נִבְלָתָם
  english_pob_choice: their carcass
  chosen_spanish: su cadáver
  alternatives_spanish:
  - sus cadáveres
  - su cuerpo muerto
  lexicon: HALOT
  rationale: נְבֵלָה designa el cadáver o carroña de un animal. En español, «cadáver» mantiene el sentido básico; el singular con posesivo plural refleja el valor distributivo posible del hebreo, como en la nota inglesa.
- source_word: יְכַבֵּס בְּגָדָיו
  english_pob_choice: shall wash his clothes
  chosen_spanish: lavará su ropa
  alternatives_spanish:
  - deberá lavar su ropa
  - lavará sus vestidos
  lexicon: HALOT
  rationale: El imperfecto legal expresa obligación/instrucción. «Lavará» conserva esa fuerza normativa sin necesidad de un auxiliar más explícito. «Ropa» es más natural que «vestidos» en español moderno y sigue siendo fiel al campo semántico.
- source_word: וְטָמֵא
  english_pob_choice: and be unclean
  chosen_spanish: y quedará impuro
  alternatives_spanish:
  - y será impuro
  - y estará impuro
  lexicon: HALOT
  rationale: En la ley ritual, טמא describe un estado resultante. «Quedará impuro» comunica el cambio de estado y conserva la categoría ritual sin introducir culpa moral. Se usa «impuro» para evitar la rigidez de «impu ro» como simple calco de «unclean» mientras se mantiene el sentido técnico.
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el atardecer
  - hasta la noche
  lexicon: HALOT
  rationale: «Hasta la tarde» es claro y natural en español bíblico contemporáneo. «La tarde» mantiene la referencia al período del día indicado por el hebreo con artículo.
- source_word: טְמֵאִים הֵמָּה לָכֶם
  english_pob_choice: They are unclean for you
  chosen_spanish: Son impuros para ustedes
  alternatives_spanish:
  - Están impuros para ustedes
  - Son impuros para vosotros
  lexicon: HALOT
  rationale: La clausula resumitiva declara el estado ritual de los animales en relación con Israel. «Son impuros para ustedes» conserva la referencia relacional de לָכֶם y mantiene la lectura legal general en un español amplio y readable.
theological_decisions:
- issue: Terminología ritual de טמא
  english_pob_reading: unclean
  chosen_spanish_reading: impuro
  alternative_spanish_readings:
  - inmundo
  - contaminado
  rationale: En Levítico, טמא es un término técnico de impureza ritual. «Impuro» preserva esa categoría en español contemporáneo sin cargarla automáticamente de sentido moral. Se evita «inmundo» por sonar arcaico y «contaminado» por sugerir solo suciedad física o química.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: Valor distributivo de «su» en נִבְלָתָם
  english_pob_reading: their carcass / their carcasses
  chosen_spanish_reading: su cadáver
  alternative_spanish_readings:
  - sus cadáveres
  - el cadáver de cada uno
  rationale: El hebreo plural posesivo puede entenderse distributivamente según el contexto de los animales mencionados antes. El singular en español sigue la opción inglesa («carcass») y evita una pluralidad que podría sonar menos natural en una ley general. Se conserva la nota de alternativa en el aparato crítico implícito mediante el marcador.
  doctrine_reference: Translation philosophy §2 (Source-text primacy and documented ambiguity)
translation_notes:
  revision_awareness: La revisión inglesa más reciente indica que no hubo cambios respecto de la versión auditada, y el cotejo externo reporta alta concordancia. Por eso se mantiene el mismo sentido base, ajustado solo a una formulación española natural y fiel al hebreo.
  spanish_consistency_notes:
  - 'Se conserva una terminología ritual consistente: טמא -> «impuro».'
  - «Yahvé» no aparece en este versículo; no se introduce ninguna sustitución innecesaria.
  - Se mantiene el registro legal y general del participio hebreo con «Quien lleve».
  - La nota[a] se ancla en el sintagma nominal correspondiente para reflejar la alternativa distributiva del hebreo.
