translation:
  language: es
  text: Cuando Jabín rey de Hazor lo oyó[a][b], envió a Jobab rey de Madón, y al rey de Shimrón[c], y al rey de Acsaf.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y aconteció que, cuando Jabín rey de Hazor oyó». La fórmula narrativa hebrea se expresa aquí de manera idiomática como «Cuando ... lo oyó».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice simplemente «oyó»; «lo» está implícito por el contexto precedente.
    reason: cross_reference
  - marker: c
    text: Algunos identifican «Shimrón» aquí con «Shimrón-merón» mencionado en Josué 12:20.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי כִּשְׁמֹעַ
  english_pob_choice: When ... heard of it
  chosen_spanish: Cuando ... lo oyó
  alternatives_spanish:
  - Y aconteció que, cuando ... oyó
  - Ahora bien, cuando ... oyó
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce una circunstancia temporal. En español natural, «Cuando ... lo oyó» comunica la relación temporal sin el calco rígido de «y aconteció». El objeto «lo» expresa el contenido oído, como hace el inglés con «of it», apoyado por el contexto inmediato.
- source_word: יָבִין
  english_pob_choice: Jabin
  chosen_spanish: Jabin
  alternatives_spanish:
  - Yabín
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se mantiene la forma ya asentada en la tradición bíblica en español y coherente con la transliteración del POB.
- source_word: מֶלֶךְ חָצוֹר
  english_pob_choice: king of Hazor
  chosen_spanish: rey de Hazor
  alternatives_spanish:
  - el rey de Hazor
  lexicon: HALOT
  rationale: La cadena constructa se vierte de manera directa con «rey de». En español la ausencia del artículo es natural en este contexto narrativo, aunque «el rey de» también sería posible.
- source_word: וַיִּשְׁלַח
  english_pob_choice: he sent to
  chosen_spanish: envió a
  alternatives_spanish:
  - envió mensaje a
  - mandó a
  lexicon: HALOT
  rationale: El verbo שׁלח con אֶל permite simplemente «envió a». No se añaden mensajeros, porque no están explícitos en el hebreo. «Mandó a» es posible, pero «envió a» conserva mejor la neutralidad del texto.
- source_word: אֶל יוֹבָב
  english_pob_choice: to Jobab
  chosen_spanish: a Jobab
  alternatives_spanish:
  - a Yobab
  lexicon: HALOT
  rationale: La preposición se vierte con «a». Se conserva la transliteración tradicional del nombre propio.
- source_word: מֶלֶךְ מָדוֹן
  english_pob_choice: king of Madon
  chosen_spanish: rey de Madón
  alternatives_spanish:
  - el rey de Madón
  lexicon: HALOT
  rationale: Se mantiene la misma estructura nominal que en el hebreo. El acento gráfico en español ayuda a la pronunciación de este topónimo.
- source_word: שִׁמְרוֹן
  english_pob_choice: Shimron
  chosen_spanish: Shimrón
  alternatives_spanish:
  - Shimrón-merón
  lexicon: HALOT
  rationale: El texto hebreo de este versículo dice simplemente שִׁמְרוֹן. Se adopta esa forma en español. La variante extendida «Shimrón-merón» queda como posible identificación tradicional, pero no se incorpora al texto principal.
- source_word: אַכְשָׁף
  english_pob_choice: Achshaph
  chosen_spanish: Acsaf
  alternatives_spanish:
  - Acsáf
  - Acsaf
  lexicon: HALOT
  rationale: Se conserva el nombre del lugar con una transliteración española que refleja mejor la consonancia hebrea y resulta legible en español bíblico.
theological_decisions:
- issue: Fórmula narrativa hebrea וַיְהִי כִּשְׁמֹעַ
  english_pob_reading: 'Rendered idiomatically as a temporal clause: ''When ... heard of it.'''
  chosen_spanish_reading: Cuando ... lo oyó
  alternative_spanish_readings:
  - Y aconteció que, cuando ... oyó
  - Ahora bien, cuando ... oyó
  rationale: No hay una carga doctrinal especial, pero sí una tensión de traducción entre literalidad formal e idiomatismo narrativo. Se opta por una cláusula temporal natural en español sin perder el valor discursivo del hebreo.
  doctrine_reference: Narrative syntax; no doctrinal issue.
translation_notes:
  revision_awareness: 'El inglés POB mantiene una solución idiomática para la fórmula narrativa («When ... heard of it») y reserva en nota la literalidad más formal. También observa que el hebreo solo dice «heard», con el objeto implícito por el contexto. Esta versión española conserva esa estrategia: expresa el objeto implícito con «lo» y documenta la alternativa más formal en nota. Se sigue además la forma del texto hebreo para Shimron, sin expandirla a una identificación tradicional no presente en este versículo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de «SEÑOR» solo cuando el texto corresponda al nombre divino; aquí no aparece.
  - Se mantiene transliteración para nombres propios geográficos y personales.
  - «Oyó» se usa con objeto pronominal implícito/expreso por contexto, equivalente al inglés POB «heard of it».
  - La puntuación reproduce la cadencia narrativa del hebreo sin sobrecargarla con añadidos explicativos.
