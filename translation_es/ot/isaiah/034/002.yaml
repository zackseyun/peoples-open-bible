revisions:
- from: Porque Yahvé tiene indignación[a] contra todas las naciones, y furor contra todo su ejército; los ha consagrado a la destrucción[b]; los ha entregado al degüello.
  to: Porque Yahvé tiene indignación contra todas las naciones, y furor contra toda su hueste[a]; los ha destinado a la destrucción[b]; los ha entregado a la matanza.
  rationale: Se reubican y corrigen las notas para que reflejen las alternativas léxicas realmente documentadas en la auditoría inglesa. Se cambia «ejército» por «hueste» para preservar mejor el alcance colectivo de צבא, con nota aclaratoria «ejércitos». Se reemplaza «consagrado a la destrucción» por «destinado a la destrucción» para mantener la fuerza judicial de חרם sin la connotación positiva de «consagrar». Se ajusta «al degüello» a «a la matanza» por mayor precisión léxica respecto de טבח.
