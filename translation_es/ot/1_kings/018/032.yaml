translation:
  language: es
  text: Y con las piedras edificó un altar en el nombre de Yahvé, e hizo una zanja alrededor del altar, como de la capacidad de dos seahs de semilla[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «como la medida de dos seahs de semilla», un modismo que indica el tamaño o la capacidad de la zanja.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּבְנֶה אֶת הָאֲבָנִים מִזְבֵּחַ
  english_pob_choice: with the stones he built an altar
  chosen_spanish: Y con las piedras edificó un altar
  alternatives_spanish:
  - Y edificó las piedras como un altar
  - Y reconstruyó el altar con las piedras
  lexicon: HALOT
  rationale: El hebreo presenta un uso instrumental de las piedras para la acción de edificar el altar. «Con las piedras» conserva ese valor sin imponer una reconstrucción explícita que depende del contexto inmediato más que de esta cláusula.
- source_word: בְּשֵׁם
  english_pob_choice: in the name of
  chosen_spanish: en el nombre de
  alternatives_spanish:
  - por el nombre de
  - por causa del nombre de
  lexicon: HALOT
  rationale: 'La expresión בְּשֵׁם se entiende de manera natural como una fórmula locativa/relacional: «en el nombre de». En español es la opción más clara y fiel al giro hebreo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino como «Yahvé», conforme al criterio del proyecto para el Tetragrámaton, en lugar de sustituirlo por un título o por la máscara tradicional.
- source_word: וַיַּעַשׂ תְּעָלָה
  english_pob_choice: he made a trench
  chosen_spanish: hizo una zanja
  alternatives_spanish:
  - hizo un foso
  - hizo un canal
  lexicon: HALOT
  rationale: תְּעָלָה designa una zanja, foso o canal. «Zanja» funciona bien en español moderno y conserva la idea de una excavación alrededor del altar.
- source_word: כְּבֵית סָאתַיִם זֶרַע
  english_pob_choice: like the capacity for two seahs of seed
  chosen_spanish: de la capacidad de dos seahs de semilla
  alternatives_spanish:
  - como para dos seahs de semilla
  - de la medida de dos seahs de semilla
  lexicon: HALOT
  rationale: La frase es idiomática y alude al tamaño/capacidad de la zanja. Se conserva «seahs» como unidad antigua, y «de la capacidad de» refleja mejor el sentido literal que una paráfrasis interpretativa más amplia.
- source_word: סָבִיב
  english_pob_choice: around
  chosen_spanish: alrededor de
  alternatives_spanish:
  - en torno a
  - rodeando
  lexicon: HALOT
  rationale: סָבִיב expresa una disposición circular. «Alrededor de» es la forma natural y precisa en español.
theological_decisions:
- issue: 'Nombre divino en el altar: יהוה'
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo usa el Tetragrámaton de forma directa. Se preserva el nombre propio divino como «Yahvé», coherente con la política terminológica del proyecto y más transparente que una sustitución titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Expresión de medida antigua en la zanja
  english_pob_reading: like the capacity for two seahs of seed
  chosen_spanish_reading: de la capacidad de dos seahs de semilla
  alternative_spanish_readings:
  - como para dos seahs de semilla
  - de la medida de dos seahs de semilla
  rationale: La frase hebrea es compacta y no requiere una modernización excesiva. Mantener la unidad «seahs» conserva la referencia antigua y evita borrar la tensión entre literalidad y función idiomática.
  doctrine_reference: 'POB audit trail: cultural_note sobre medida idiomática'
translation_notes:
  revision_awareness: El inglés POB fue revisado desde «large enough for» a «like the capacity for» para reflejar con más literalidad la expresión hebrea. La versión española sigue esa decisión al usar «de la capacidad de» y conservar la medida antigua sin reinterpretarla como dimensión moderna.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton en coherencia con la política terminológica del proyecto.
  - Se conserva una sintaxis sobria y lineal, adecuada para un registro bíblico moderno en español.
  - «Zanja» se usa de forma consistente con el valor de תְּעָלָה y no se sustituye por términos más interpretativos.
  - La nota al pie ancla la ambigüedad de medida sin resolverla en exceso, en paralelo con el inglés POB.
