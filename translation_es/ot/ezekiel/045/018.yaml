translation:
  language: es
  text: 'Así dice el Señor Yahvé: En el primer mes, el primer día del mes, tomarás un toro del ganado, sin defecto, y purificarás[a] el santuario.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «harás expiación por el santuario». El verbo hebreo aquí es un término ritual que puede denotar purificación o descontaminación del pecado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor DIOS
  - el Señor Yahveh
  lexicon: HALOT
  rationale: El hebreo combina el título אֲדֹנָי con el nombre divino YHWH. En español, "Señor Yahvé" conserva la distinción del original sin recurrir al ocultamiento por mayúsculas. Se evita "Señor DIOS" porque en español suena menos natural y no refleja de forma tan directa el nombre propio divino.
- source_word: בָּרִאשׁוֹן
  english_pob_choice: In the first month
  chosen_spanish: En el primer mes
  alternatives_spanish:
  - En el primero
  - En el mes primero
  lexicon: HALOT
  rationale: El contexto calendárico exige explicitar "mes" en español, como hace la versión inglesa. "En el primer mes" comunica el sentido temporal de manera natural y fiel.
- source_word: בְּאֶחָד לַחֹדֶשׁ
  english_pob_choice: on the first day of the month
  chosen_spanish: el primer día del mes
  alternatives_spanish:
  - el día uno del mes
  - el primero del mes
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de fecha que indica el día primero del mes. En español, "el primer día del mes" es claro, idiomático y mantiene la precisión del dato calendárico.
- source_word: תִּקַּח
  english_pob_choice: you shall take
  chosen_spanish: tomarás
  alternatives_spanish:
  - deberás tomar
  - has de tomar
  lexicon: HALOT
  rationale: En contexto legal/instruccional, el imperfecto hebreo funciona como mandato. "Tomarás" conserva esa fuerza directiva con un registro formal adecuado.
- source_word: פַּר בֶּן בָּקָר
  english_pob_choice: a bull from the herd
  chosen_spanish: un toro del ganado
  alternatives_spanish:
  - un toro de la manada
  - un novillo del ganado
  lexicon: HALOT
  rationale: La frase designa un toro bovino procedente del ganado. "Toro del ganado" es natural en español y evita introducir una especificación de edad que el hebreo no exige de manera explícita.
- source_word: תָּמִים
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin defecto alguno
  lexicon: HALOT
  rationale: En lenguaje cultual, la idea es la integridad del animal para el sacrificio. "Sin defecto" transmite bien el valor sacrificial y evita un giro demasiado literal o arcaizante.
- source_word: וְחִטֵּאתָ
  english_pob_choice: you shall purify
  chosen_spanish: purificarás
  alternatives_spanish:
  - harás expiación por
  - limpiarás ritualmente
  lexicon: HALOT
  rationale: El verbo חטא en piel, con objeto cultual, puede significar purificar o descontaminar ritualmente. Se conserva "purificarás" para reflejar la lectura principal de la POB inglesa y mantener abierta la tensión con la opción expiatoria.
- source_word: הַמִּקְדָּשׁ
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el templo
  lexicon: HALOT
  rationale: מקדש se refiere al ámbito sagrado o santuario. "Santuario" es la equivalencia española más amplia y cultualmente exacta para este pasaje.
theological_decisions:
- issue: Sentido ritual de וְחִטֵּאתָ aplicado al santuario
  english_pob_reading: you shall purify the sanctuary
  chosen_spanish_reading: purificarás el santuario
  alternative_spanish_readings:
  - harás expiación por el santuario
  - limpiarás ritualmente el santuario
  rationale: El hebreo presenta una acción ritual de purificación aplicada al santuario. "Purificarás" evita cerrar prematuramente la interpretación en un lenguaje de expiación más técnico, pero mantiene abierta esa posibilidad como alternativa válida de traducción.
  doctrine_reference: Preservar la tensión léxica y cultual del texto; equivalencia óptima
translation_notes:
  revision_awareness: La versión sigue de cerca el texto hebreo y el juicio auditado de la POB inglesa. No se registran revisiones previas en este pasaje; se conservan las tensiones léxicas relevantes, especialmente en el verbo ritual חטא.
  spanish_consistency_notes:
  - Se usa "Yahvé" como forma española para YHWH, conforme al criterio del proyecto.
  - Se mantiene "santuario" para מקדש, en coherencia con el registro cultual del pasaje.
  - Se opta por "purificarás" para וְחִטֵּאתָ, preservando la alternativa expiatoria sin imponerla en el texto principal.
  - La fecha se expresa con un orden natural en español, sin perder el valor literal del hebreo.
