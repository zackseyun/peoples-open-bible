translation:
  language: es
  text: Yahvé hizo así[a], y llegó un gran enjambre a la casa de Faraón y a las casas de sus siervos; y, por toda la tierra de Egipto, la tierra quedó arruinada por causa del enjambre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un enjambre pesado»; el hebreo puede referirse a una masa enorme de insectos, tradicionalmente entendida como moscas.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton en español como «Yahvé», conforme al criterio del POB de no sustituirlo por un título. Es la forma más estable en español para reflejar el nombre personal de Dios sin ocultarlo.
- source_word: וַיַּעַשׂ ... כֵּן
  english_pob_choice: did so
  chosen_spanish: hizo así
  alternatives_spanish:
  - hizo de ese modo
  - actuó conforme a ello
  lexicon: HALOT
  rationale: La secuencia verbal comunica cumplimiento de lo anunciado; «hizo así» es natural en español y mantiene la relación directa con la orden previa sin expandir el sentido.
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - entró
  lexicon: HALOT
  rationale: Aunque literalmente es «vino/came», en español «llegó» funciona bien para el ingreso del enjambre a los espacios nombrados y evita una repetición áspera con los complementos direccionales.
- source_word: עָרֹב
  english_pob_choice: swarm
  chosen_spanish: enjambre
  alternatives_spanish:
  - swarm
  - plaga de insectos
  - moscas
  lexicon: HALOT
  rationale: Se conserva la ambigüedad léxica del hebreo. «Enjambre» refleja la idea de masa de insectos sin identificar la especie, como hace la traducción inglesa con «swarm».
- source_word: כָּבֵד
  english_pob_choice: heavy
  chosen_spanish: fuerte
  alternatives_spanish:
  - grande
  - muy pesado
  - severo
  lexicon: HALOT
  rationale: En español, «fuerte» expresa bien la intensidad de la plaga de manera natural. Se evita «pesado» por sonar menos idiomático aquí, aunque el hebreo literalmente diga «pesado».
- source_word: בֵּיתָה פַרְעֹה
  english_pob_choice: into Pharaoh’s house
  chosen_spanish: a la casa de Faraón
  alternatives_spanish:
  - a la casa real de Faraón
  - al palacio de Faraón
  lexicon: HALOT
  rationale: Se conserva «casa» como en el hebreo, sin sustituirla por «palacio», que sería más interpretativo. La preposición «a» rinde bien la dirección del movimiento en español.
- source_word: וּבֵית עֲבָדָיו
  english_pob_choice: into his servants’ houses
  chosen_spanish: a las casas de sus siervos
  alternatives_spanish:
  - a las casas de sus servidores
  - a la casa de sus siervos
  lexicon: HALOT
  rationale: Se traduce distributivamente en plural para hacer natural en español la construcción hebrea. Se prefiere «siervos» como equivalente más cercano y tradicionalmente más fiel al campo semántico de עבדים que «servidores».
- source_word: וּבְכָל אֶרֶץ מִצְרַיִם
  english_pob_choice: throughout all the land of Egypt
  chosen_spanish: en toda la tierra de Egipto
  alternatives_spanish:
  - por toda la tierra de Egipto
  - en toda la región de Egipto
  lexicon: HALOT
  rationale: «En toda la tierra de Egipto» comunica la extensión total con claridad y fidelidad. «Tierra» mantiene la correspondencia bíblica habitual para אֶרֶץ.
- source_word: תִּשָּׁחֵת הָאָרֶץ
  english_pob_choice: the land was ruined
  chosen_spanish: la tierra quedó arruinada
  alternatives_spanish:
  - la tierra fue devastada
  - la tierra fue destruida
  - la tierra quedó corrompida
  lexicon: HALOT
  rationale: El nifal de שׁחת indica ruina o devastación. «Quedó arruinada» conserva el resultado del daño sin forzar una destrucción total; «arruinada» funciona bien en español actual.
- source_word: מִפְּנֵי הֶעָרֹב
  english_pob_choice: because of the swarm
  chosen_spanish: por causa del enjambre
  alternatives_spanish:
  - a causa del enjambre
  - debido al enjambre
  - por el enjambre
  lexicon: HALOT
  rationale: La construcción causal hebrea se rinde de forma clara con «por causa de». Se mantiene el mismo referente léxico de «enjambre» para no perder cohesión semántica.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la política del POB, se preserva el nombre propio divino en español como «Yahvé», en lugar de ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Ambigüedad léxica de עָרֹב
  english_pob_reading: swarm
  chosen_spanish_reading: enjambre
  alternative_spanish_readings:
  - moscas
  - plaga de insectos
  - swarm
  rationale: La evidencia del hebreo no obliga a identificar la especie. Se conserva la indeterminación con «enjambre», alineada con la decisión inglesa de mantener la ambigüedad y con la nota tradicional sobre posibles moscas.
  doctrine_reference: HALOT lexical note on עָרֹב
- issue: Intensidad de כָּבֵד aplicado al enjambre
  english_pob_reading: heavy
  chosen_spanish_reading: fuerte
  alternative_spanish_readings:
  - grande
  - pesado
  - muy severo
  rationale: La intensidad del término se expresa en español con un adjetivo natural y dinámico. «Fuerte» preserva la fuerza del hebreo sin sonar extraño en la frase.
  doctrine_reference: HALOT lexical note on כָּבֵד
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente, que no introdujo cambios sustantivos y confirmó un alto grado de acuerdo con la traducción inglesa auditada.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para יְהוָה.
  - Se preservó la ambigüedad de עָרֹב con «enjambre» y la nota alternativa correspondiente.
  - Se tradujo בית como «casa» y no como «palacio» para mantener cercanía al hebreo.
  - Se usó «tierra de Egipto» para אֶרֶץ מִצְרַיִם, siguiendo el patrón bíblico habitual en español.
