id: ROM.5.10
reference: Romans 5:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰ γὰρ ἐχθροὶ ὄντες κατηλλάγημεν τῷ θεῷ διὰ τοῦ θανάτου τοῦ υἱοῦ αὐτοῦ, πολλῷ μᾶλλον καταλλαγέντες σωθησόμεθα ἐν τῇ ζωῇ αὐτοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/romans/005/010.yaml
  text: For if[a], while we were enemies, we were reconciled to God through the death of his Son, much more, having been reconciled, will we be saved by his life.
  footnotes:
  - marker: a
    text: Or, 'will we be saved in his life.'
    reason: alternative_reading
translation:
  language: ko
  text: 우리가 원수였을 때에 그분 아들의 죽음을 통해 하나님과 화해되었다면, 이제 화해된 우리가 그분의 생명으로 구원받게 될 것은 훨씬 더 확실합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐχθροὶ
  english_pob_choice: enemies
  chosen_korean: 원수
  lexicon: BDAG
  rationale: 관계적 적대 상태를 「원수」로 직접 표현.
- source_word: κατηλλάγημεν
  english_pob_choice: were reconciled
  chosen_korean: 화해되었다면
  alternatives_korean:
  - 화목하게 되었다면
  lexicon: BDAG
  rationale: καταλλάσσω의 표준어. 「화목」도 가능하나 「화해」가 현대적이고 명료.
- source_word: διὰ τοῦ θανάτου τοῦ υἱοῦ αὐτοῦ
  english_pob_choice: through the death of his Son
  chosen_korean: 그분 아들의 죽음을 통해
  lexicon: BDAG
  rationale: 수단의 διά.
- source_word: ἐν τῇ ζωῇ αὐτοῦ
  english_pob_choice: by his life
  chosen_korean: 그분의 생명으로
  alternatives_korean:
  - 그분의 삶 안에서
  lexicon: BDAG
  rationale: 죽음/생명의 대조 안에서 수단적 ἐν. 부활하신 그분의 생명을 통해 구원이 완성됨.
