translation:
  language: es
  text: 'Y Acab dijo a Abdías: «Ve por la tierra a todos los manantiales de agua y a todos los wadis[a]. Quizá encontremos pasto y mantengamos vivos al caballo y al mulo, para no tener que destruir[b] nada del ganado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Wadi» puede traducirse también «arroyo», «torrente» o «cauce estacional». En este pasaje de sequía, el matiz geográfico de un cauce que lleva agua solo por temporadas es el más probable.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «cortar de» el ganado. La expresión hebrea probablemente significa reducir o eliminar animales por falta de alimento.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּאָרֶץ
  english_pob_choice: through the land
  chosen_spanish: por la tierra
  alternatives_spanish:
  - a través de la tierra
  - por todo el país
  - en la tierra
  lexicon: HALOT
  rationale: El hebreo con לֵךְ + בָּאָרֶץ expresa desplazamiento por una zona, no mera ubicación. «Por la tierra» conserva la idea de recorrido de búsqueda sin sonar tan rígido como una traducción más literal.
- source_word: מַעְיְנֵי הַמַּיִם
  english_pob_choice: the springs of water
  chosen_spanish: los manantiales de agua
  alternatives_spanish:
  - las fuentes de agua
  - los manantiales
  - los nacientes de agua
  lexicon: HALOT
  rationale: «Manantiales» conserva el sentido concreto de fuentes naturales de agua. Añadir «de agua» refleja la construcción hebrea sin perder naturalidad en español.
- source_word: הַנְּחָלִים
  english_pob_choice: the wadis
  chosen_spanish: los wadis
  alternatives_spanish:
  - los cauces secos
  - los torrentes
  - los arroyos
  lexicon: HALOT
  rationale: En este contexto de sequía, el término geográfico técnico «wadi» comunica mejor la posible referencia a cauces estacionales. Se mantiene el préstamo con nota porque en español «arroyo» o «torrente» pueden desdibujar la imagen del terreno seco.
- source_word: חָצִיר
  english_pob_choice: grass
  chosen_spanish: pasto
  alternatives_spanish:
  - hierba
  - forraje
  - pasto verde
  lexicon: HALOT
  rationale: Aquí el término apunta a vegetación apta para alimentar animales. «Pasto» es natural en español y más directamente pastoral/forrajero que «hierba».
- source_word: וּנְחַיֶּה
  english_pob_choice: and keep ... alive
  chosen_spanish: mantendremos vivos
  alternatives_spanish:
  - y conservaremos con vida
  - y dejaremos vivir
  - y preservaremos con vida
  lexicon: HALOT
  rationale: El hifil expresa causar o conservar vida. «Mantendremos vivos» reproduce bien la intención práctica de conseguir alimento para sostener a los animales.
- source_word: סוּס וָפֶרֶד
  english_pob_choice: horse and mule
  chosen_spanish: al caballo y al mulo
  alternatives_spanish:
  - al caballo y la mula
  - a los caballos y mulos
  lexicon: HALOT
  rationale: El hebreo usa singulars genéricos; en español, el singular con artículo definido comunica clases representativas de animales de trabajo y conserva la concisión del texto.
- source_word: וְלֹא נַכְרִית מֵהַבְּהֵמָה
  english_pob_choice: so that we do not have to destroy any of the livestock
  chosen_spanish: para no tener que destruir parte del ganado
  alternatives_spanish:
  - para no destruir nada del ganado
  - para no tener que eliminar parte del ganado
  - para que no se pierda parte del ganado
  lexicon: HALOT
  rationale: 'כרת en esta construcción es idiomático: no se trata de cortar literalmente, sino de eliminar o perder animales por falta de forraje. «Parte del ganado» refleja el valor partitivo de מִן y evita una formulación demasiado abstracta.'
- source_word: מֵהַבְּהֵמָה
  english_pob_choice: any of the livestock
  chosen_spanish: parte del ganado
  alternatives_spanish:
  - alguno del ganado
  - del ganado
  - algún animal
  lexicon: HALOT
  rationale: «Ganado» funciona como término colectivo para animales domésticos de labor y alimentación. «Parte del» conserva la partitividad implícita y evita restringir el sentido a vacunos.
translation_notes:
  revision_awareness: La redacción sigue el sentido revisado del audit trail inglés, que prefirió una idea natural de eliminación del ganado en lugar de una traducción demasiado literal de «cut off». También conserva el matiz geográfico de נחל como cauce estacional, coherente con el contexto de sequía.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo exija explícitamente; este versículo no lo contiene.
  - Se usa «Abdías» como forma española estándar del nombre propio.
  - Se conserva «wadis» con nota porque el término técnico es importante para el contexto y no tiene equivalente único y preciso en español.
  - No se añade puntuación interpretativa fuera de la sintaxis necesaria para la claridad en español.
