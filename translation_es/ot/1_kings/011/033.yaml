review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español no preserva fielmente varias decisiones léxicas documentadas ni el texto hebreo. El hebreo repite אֱלֹהֵי (''dios de'') para Ashtoreth, Chemosh y Milcom; el borrador cambia los tres a ''diosa'', lo cual contradice explícitamente la decisión del POB de mantener la forma del hebreo en el texto principal y dejar la aclaración en nota al menos para Ashtoreth. También ''Quemos, la diosa de Moab'' y ''Milcom, la diosa de los hijos de Amón'' son errores de sentido, porque Chemosh y Milcom son deidades masculinas en el contexto. El resto de la sintaxis general sigue bien el original: causal ''porque'', ''me han abandonado'', ''se han postrado'', ''no han andado en mis caminos'', y la comparación con David.'
  spanish_quality_summary: El español es generalmente legible, pero contiene errores graves de género semántico y una nota desanclada respecto del texto principal. 'Lo recto ante mis ojos y mis estatutos y mis juicios' es literal y algo duro, pero aceptable dentro de la filosofía del proyecto; no requiere reestructuración si se quiere seguir de cerca el hebreo. Conviene además mantener coherencia terminológica con el audit trail y mejorar la exactitud de las notas.
  glossary_alignment: 'No hay conflicto con términos nucleares del glosario como Yahvé/Mesías. Sí hay desalineación importante con la política documentada para אֱלֹהֵי en este versículo: debe mantenerse ''el dios de...'' en el texto principal, especialmente con Astarté/Ashtoret, y la alternativa femenina va en nota. ''Milcom'' está bien en el texto principal. ''Estatutos'' y ''juicios'' concuerdan con las decisiones del proyecto.'
  issues:
  - severity: high
    issue: Se cambió 'el dios de los sidonios' a 'la diosa de los sidonios' en el texto principal.
    rationale: El hebreo dice literalmente אֱלֹהֵי צִדֹנִין, y el English POB decidió conservar esa forma en el cuerpo del texto, dejando 'goddess' solo como alternativa en nota. El borrador contradice la evidencia fuente y la decisión auditada.
  - severity: high
    issue: Se tradujo Chemosh como 'la diosa de Moab'.
    rationale: El hebreo tiene אֱלֹהֵי מוֹאָב, 'el dios de Moab'. Además, Chemosh no debe feminizarse por analogía con Astarté. Esto altera el sentido.
  - severity: high
    issue: Se tradujo Milcom como 'la diosa de los hijos de Amón'.
    rationale: El hebreo tiene אֱלֹהֵי בְנֵי עַמּוֹן, 'el dios de los amonitas / hijos de Amón'. Milcom no debe feminizarse. Es un error semántico claro.
  - severity: medium
    issue: La nota [a] ofrece una alternativa que ya está en el texto principal.
    rationale: Si el texto principal dice 'la diosa de los sidonios', la nota 'O la diosa de los sidonios' queda incoherente. Debe restablecerse el texto principal a 'el dios...' para que la nota cumpla su función.
  - severity: low
    issue: Falta una nota sobre la traducción rígida del tramo final solo si se desea reflejar el audit trail completo.
    rationale: El English POB incluye una nota de alternativa de redacción sobre la construcción con 'to do'. No es estrictamente necesario crearla en español, pero puede omitirse si no introduce ambigüedad nueva. No impide aprobación tras corregir lo principal.
