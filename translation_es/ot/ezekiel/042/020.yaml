translation:
  language: es
  text: Lo midió por los cuatro lados[a]; tenía un muro todo alrededor, quinientos codos de largo y quinientos codos de ancho, para hacer separación entre lo santo y lo común[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘hacia los cuatro vientos’ o ‘en las cuatro direcciones’.
    reason: lexical_alternative
  - marker: b
    text: O ‘entre lo santo y lo profano’. El hebreo contrapone lo santo con lo común, es decir, lo que no está apartado como santo.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאַרְבַּע רוּחוֹת
  english_pob_choice: on the four sides
  chosen_spanish: hacia los cuatro puntos cardinales
  alternatives_spanish:
  - en las cuatro direcciones
  - por los cuatro lados
  lexicon: HALOT
  rationale: רוּחוֹת puede significar ‘vientos’ o ‘direcciones’; en contexto arquitectónico la idea es direccional. ‘Hacia los cuatro puntos cardinales’ conserva esa orientación espacial en un español natural y evita una calca demasiado rígida.
- source_word: מְדָדוֹ
  english_pob_choice: He measured it
  chosen_spanish: Lo midió
  alternatives_spanish:
  - Él lo midió
  - Lo había medido
  lexicon: HALOT
  rationale: El verbo expresa la acción de medir con sufijo objeto de 3ms; en español el objeto ‘lo’ resulta claro y natural. Se mantiene el sentido directo sin añadir precisión no presente en el hebreo.
- source_word: חוֹמָה לוֹ סָבִיב סָבִיב
  english_pob_choice: it had a wall all around
  chosen_spanish: tenía un muro alrededor
  alternatives_spanish:
  - tenía un muro por todos lados
  - tenía un muro todo alrededor
  lexicon: HALOT
  rationale: חוֹמָה es ‘muro’ o ‘muralla’. La repetición de סָבִיב intensifica el encierro; en español basta con ‘alrededor’ para conservar el énfasis sin sonar redundante o forzado.
- source_word: אֹרֶךְ חֲמֵשׁ מֵאוֹת וְרֹחַב חֲמֵשׁ מֵאוֹת
  english_pob_choice: five hundred cubits long and five hundred cubits wide
  chosen_spanish: quinientos codos de largo y quinientos codos de ancho
  alternatives_spanish:
  - con una longitud de quinientos codos y una anchura de quinientos codos
  - cincocientos codos de largo y cincocientos codos de ancho
  lexicon: HALOT
  rationale: La revisión inglesa agregó ‘cubits’ por claridad, y el hebreo deja implícita la unidad en el contexto de medición. ‘Codos’ es la equivalencia técnica más fiel en español bíblico y hace explícita la medida sin extrapolarla.
- source_word: לְהַבְדִּיל
  english_pob_choice: to make a separation
  chosen_spanish: para hacer separación
  alternatives_spanish:
  - para separar
  - para establecer una separación
  lexicon: HALOT
  rationale: El infinitivo indica propósito. ‘Hacer separación’ refleja la función del muro y preserva el matiz nominal/purposivo del hebreo mejor que un verbo simple, aunque ‘para separar’ también sería posible.
- source_word: בֵּין הַקֹּדֶשׁ לְחֹל
  english_pob_choice: between the holy and the common
  chosen_spanish: entre lo santo y lo común
  alternatives_spanish:
  - entre lo santo y lo profano
  - entre lo sagrado y lo común
  lexicon: HALOT
  rationale: חֹל designa lo no santo, lo común, no necesariamente lo moralmente corrupto. ‘Lo común’ mantiene la categoría cultual de la oposición con ‘lo santo’ mejor que ‘lo profano’, que podría sugerir una carga ética más fuerte de la que el texto expresa.
theological_decisions:
- issue: Distinción cultual entre santidad y común
  english_pob_reading: Render חֹל as 'the common' rather than 'the profane.'
  chosen_spanish_reading: ‘Lo común’ frente a ‘lo santo’
  alternative_spanish_readings:
  - ‘lo profano’ frente a ‘lo santo’
  - ‘lo ordinario’ frente a ‘lo santo’
  rationale: El pasaje trata de espacio sagrado y separación ritual. Traducir חֹל como ‘lo común’ preserva la oposición cultual sin cargar el término con una connotación moral que el hebreo no exige.
  doctrine_reference: Mantener la distinción entre lo consagrado y lo no consagrado según el sentido inmediato del texto, sin añadir implicaciones doctrinales externas.
translation_notes:
  revision_awareness: La revisión inglesa más reciente añadió explícitamente ‘cubits’ en las dimensiones, y esta decisión se reflejó en español con ‘codos’. También se conservó la preferencia final de ‘the common’ sobre ‘the profane’ para חֹל, manteniendo la distinción cultual del original.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ no porque aparezca en este versículo, sino por la terminología general del proyecto; aquí no aplica.
  - Se eligió ‘lo santo’/‘lo común’ para reflejar la oposición cultual del hebreo y la nota inglesa, evitando ‘profano’ como traducción principal.
  - ‘Codos’ se usa como unidad técnica porque la revisión auditada del inglés añadió la explicitación de la medida, y el contexto de Ezequiel es de medición arquitectónica.
