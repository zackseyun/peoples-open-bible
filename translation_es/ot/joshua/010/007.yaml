translation:
  language: es
  text: Entonces Josué subió de Gilgal, él y todos los hombres de guerra con él[a], y todos los hombres valientes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «todo el pueblo de guerra»; aquí se traduce «todos los hombres de guerra» para expresar en español natural el sentido militar de la frase.'
    reason: lexical_alternative
  - marker: b
    text: O «todos los hombres de valor».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - subió hacia arriba
  - se encaminó
  lexicon: HALOT
  rationale: עלה expresa movimiento ascendente; en español bíblico y moderno, 'subió' conserva la dirección sin añadir matiz militar no explicitado por el verbo.
- source_word: מִן הַגִּלְגָּל
  english_pob_choice: from Gilgal
  chosen_spanish: de Gilgal
  alternatives_spanish:
  - desde Gilgal
  - fuera de Gilgal
  lexicon: HALOT
  rationale: La preposición מן se rinde de forma directa y natural con 'de' o 'desde'; 'de Gilgal' mantiene concisión y fidelidad al punto de partida.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - Josué mismo
  lexicon: HALOT
  rationale: El pronombre enfático se conserva con 'él' en aposición, reflejando que Josué fue personalmente el que subió.
- source_word: כָל עַם הַמִּלְחָמָה
  english_pob_choice: all the fighting men
  chosen_spanish: todo el pueblo de guerra
  alternatives_spanish:
  - todos los hombres de guerra
  - toda la gente de guerra
  - todo el ejército
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'todo el pueblo de la guerra/batalla'. Se mantiene la forma más cercana al hebreo y se deja la fuerza militar en el sustantivo 'guerra', con la alternativa idiomática explicada en nota.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - a su lado
  lexicon: HALOT
  rationale: Equivalente directo del sufijo pronominal con la preposición עם.
- source_word: כֹל גִּבּוֹרֵי הֶחָיִל
  english_pob_choice: all the mighty men of valor
  chosen_spanish: todos los valientes guerreros
  alternatives_spanish:
  - todos los hombres valientes
  - todos los hombres de valor
  - todos los guerreros valerosos
  lexicon: HALOT
  rationale: גִּבּוֹרֵי הֶחָיִל es una fórmula fija para combatientes probados y capaces. 'Valientes guerreros' comunica fuerza y pericia sin recurrir a una expresión demasiado arcaica en español; la nota preserva la alternativa más literal de la POB inglesa.
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente en el final de la frase, distinguiendo el grupo principal ('todo el pueblo de guerra') de la fórmula final ('todos los valientes guerreros') y manteniendo un registro bíblico claro y publicable.
  spanish_consistency_notes:
  - Se conserva 'Josué' como forma estándar del nombre propio.
  - '''Guerra'' se usa para reflejar el genitivo hebreo ''de la guerra/batalla'' sin borrar su matiz colectivo.'
  - La coordinación con comas reproduce el paralelismo del hebreo.
  - No se introduce 'Cristo', 'SEÑOR' ni terminología eclesial no presente en el texto.
