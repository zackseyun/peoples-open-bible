    text: 'O: «si ustedes se están volviendo a Yahvé con todo su corazón».'
    reason: lexical_alternative
  - marker: b
    text: El plural hebreo «Astartés» probablemente se refiere a manifestaciones, imágenes o formas cultuales asociadas con la diosa Astoret/Astarté.
    reason: cultural_note
  - marker: c
    text: 'O: «preparen su corazón para Yahvé».'
    reason: lexical_alternative
  - marker: d
    text: 'Hebreo: «de la mano de los filisteos», un modismo para hablar de ser librados de su poder.'
    reason: lexical_alternative
  revision_rationale: 'La revisión alinea mejor el español con la evidencia fuente y con la auditoría inglesa: restituye como lectura principal el sentido preferido de orientar el corazón a Yahvé, elimina una adición innecesaria en la nota [a], mejora el alcance sintáctico de «de en medio de ustedes» para incluir también «las Astartés», y pule la naturalidad del español sin perder precisión.'
