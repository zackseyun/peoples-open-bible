translation:
  language: es
  text: 'De estos pueden comer: la langosta según su especie[a], y la langosta calva según su especie, y el grillo según su especie, y el saltamontes según su especie.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación exacta de los nombres hebreos de estos insectos, más allá de «langosta», es incierta; las traducciones tradicionales incluyen «langosta calva» para סָּלְעָם y «grillo» para חַרְגֹּל.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה מֵהֶם
  english_pob_choice: These of them
  chosen_spanish: Estos de ellos
  alternatives_spanish:
  - Estos entre ellos
  - De estos, de ellos
  lexicon: HALOT
  rationale: La frase introduce un subconjunto permitido dentro del grupo ya mencionado. «Estos de ellos» conserva la relación partitiva de manera cercana al hebreo y funciona en español sin forzar una paráfrasis.
- source_word: תֹּאכֵלוּ
  english_pob_choice: you may eat
  chosen_spanish: ustedes pueden comer
  alternatives_spanish:
  - ustedes comerán
  - ustedes comerán de
  lexicon: HALOT
  rationale: En este contexto legal-dietario, el imperfecto expresa permiso. «Pueden comer» comunica la autorización de forma natural en español moderno sin perder el sentido permisivo.
- source_word: הָאַרְבֶּה
  english_pob_choice: the locust
  chosen_spanish: la langosta
  alternatives_spanish:
  - la langosta migratoria
  - el saltamontes
  lexicon: HALOT
  rationale: El término hebreo designa la langosta como insecto comestible conocido. En español, «langosta» es la equivalencia más estable y fiel al uso tradicional, aunque puede incluir el matiz de saltamontes en sentido amplio.
- source_word: לְמִינוֹ / לְמִינֵהוּ
  english_pob_choice: according to its kind
  chosen_spanish: según su especie
  alternatives_spanish:
  - conforme a su especie
  - por su especie
  lexicon: HALOT
  rationale: La fórmula taxonómica se traduce de manera transparente con «según su especie», que preserva la estructura clasificatoria del hebreo y resulta natural en español.
- source_word: הַסָּלְעָם
  english_pob_choice: the bald locust
  chosen_spanish: el salam
  alternatives_spanish:
  - la langosta calva
  - el saltamontes de cierto tipo
  lexicon: HALOT
  rationale: Como la identificación exacta es incierta, se conserva un trasliterado funcional, «salam», para no fingir certeza zoológica donde el hebreo no la ofrece. Se evita imponer una equivalencia tradicional demasiado específica sin respaldo seguro.
- source_word: הַחַרְגֹּל
  english_pob_choice: the cricket
  chosen_spanish: el grillo
  alternatives_spanish:
  - el grillo
  - la cigarra
  lexicon: HALOT
  rationale: «Grillo» es el nombre español más natural para un ortóptero pequeño y refleja bien la decisión inglesa de usar un insecto común pese a la incertidumbre de identificación exacta.
- source_word: הֶחָגָב
  english_pob_choice: the grasshopper
  chosen_spanish: el saltamontes
  alternatives_spanish:
  - la langosta
  - el saltador
  lexicon: HALOT
  rationale: Para distinguirlo de אַרְבֶּה en el mismo versículo, «saltamontes» expresa con claridad el insecto tipo hopper y mantiene la diferenciación léxica que el inglés POB también conserva.
translation_notes:
  revision_awareness: El texto inglés final quedó sin cambios en la pasada de revisión más reciente; la presente propuesta sigue esa lectura estable, pero ajusta la forma española para conservar la precisión léxica y evitar sobreespecificar la identidad de los insectos cuando el hebreo es incierto.
  spanish_consistency_notes:
  - Se mantiene «según su especie» de manera uniforme para לְמִינוֹ / לְמִינֵהוּ.
  - Se evita «SEÑOR» u otras sustituciones irrelevantes, porque el versículo no contiene el nombre divino.
  - Se preserva la distinción entre los cuatro nombres de insectos sin forzar equivalencias idénticas entre términos distintos.
