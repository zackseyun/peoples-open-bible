translation:
  language: es
  text: 'Y le dijo a Aarón: «Toma para ti un ternero del ganado[a] para ofrenda por el pecado, y un carnero para holocausto, ambos sin defecto, y preséntalos delante de Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «un ternero, un hijo del ganado»; es decir, un bovino joven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y le dijo
  alternatives_spanish:
  - Entonces le dijo
  - Y dijo
  lexicon: HALOT
  rationale: La forma narrativa hebrea se conserva de manera natural en español con una coordinación simple. «Le dijo» mantiene el flujo narrativo sin sobreinterpretar la secuencia.
- source_word: אֶל אַהֲרֹן
  english_pob_choice: to Aaron
  chosen_spanish: a Aarón
  alternatives_spanish:
  - para Aarón
  lexicon: HALOT
  rationale: אֶל introduce al destinatario directo; en español, «a Aarón» es la equivalencia natural y directa.
- source_word: קַח לְךָ
  english_pob_choice: Take for yourself
  chosen_spanish: Toma para ti
  alternatives_spanish:
  - Toma
  - Consigue para ti
  lexicon: HALOT
  rationale: Se conserva el matiz personal/reflexivo de לְךָ con «para ti», sin sonar forzado en español.
- source_word: עֵגֶל בֶּן בָּקָר
  english_pob_choice: a calf, a son of the herd
  chosen_spanish: un ternero, un hijo del ganado
  alternatives_spanish:
  - un becerro, un hijo del ganado
  - un ternero, hijo del ganado
  lexicon: HALOT
  rationale: Se mantiene el sabor apposicional del hebreo y la tensión lexical documentada. «Ternero» comunica el animal joven; «hijo del ganado» refleja la expresión literal de בן בקר.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para expiación por el pecado
  alternatives_spanish:
  - como expiación por el pecado
  - para ofrenda por el pecado
  lexicon: HALOT
  rationale: En este contexto sacrificial, חטאת puede referirse a la ofrenda de expiación. Se opta por una formulación explicativa y reverente que expresa su función, sin perder el sentido ritual.
- source_word: וְאַיִל
  english_pob_choice: and a ram
  chosen_spanish: y un carnero
  alternatives_spanish:
  - y un macho carnero
  - y un cordero macho
  lexicon: HALOT
  rationale: אַיִל es el término estándar para un carnero en contexto sacrificial; «carnero» es claro y natural en español.
- source_word: לְעֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - como holocausto
  - para ofrenda quemada
  lexicon: HALOT
  rationale: «Holocausto» es el término tradicional y técnico que corresponde a עֹלָה en el lenguaje sacrificial bíblico.
- source_word: תְּמִימִם
  english_pob_choice: both without blemish
  chosen_spanish: ambos sin defecto
  alternatives_spanish:
  - ambos perfectos
  - sin defecto
  lexicon: HALOT
  rationale: El plural concuerda con los dos animales; «sin defecto» expresa el requisito cultual de integridad sin añadir interpretación.
- source_word: וְהַקְרֵב
  english_pob_choice: and present them
  chosen_spanish: y preséntalos
  alternatives_spanish:
  - y ofrécelos
  - y acércalos
  lexicon: HALOT
  rationale: En contexto cultual, הקרב significa hacer acercar/presentar ante Dios. «Preséntalos» conserva el valor ritual y suena natural en español.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el criterio doctrinal del proyecto para el nombre divino: «Yahvé». «Delante de» reproduce la fórmula cultual de presencia ante Dios.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. Conforme al criterio doctrinal del proyecto, se lo vierte como «Yahvé» en vez de ocultarlo con una convención de sustitución.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Naturaleza de לְחַטָּאת
  english_pob_reading: for a sin offering
  chosen_spanish_reading: para expiación por el pecado
  alternative_spanish_readings:
  - para ofrenda por el pecado
  - como expiación por el pecado
  rationale: La palabra puede designar la ofrenda sacrificial más que el pecado abstracto. Se elige una expresión que comunica su finalidad expiatoria sin reducirla a una simple abstracción moral.
  doctrine_reference: Levítico sacrificial system / Levitical offering terminology
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto español en el lugar correspondiente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino, en coherencia con el criterio del proyecto.
  - Se usó «holocausto» y «expiación por el pecado» para reflejar el vocabulario sacrificial técnico del hebreo.
  - Se conservó el sabor literal de «un hijo del ganado» como nota lexical implícita en la redacción española, sin sobreparafrasear.
  - El marcador de nota [a] está anclado en «para ti[a]» para evitar inconsistencias de validación.
