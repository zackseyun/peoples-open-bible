base_translation:
  language: en
  yaml_path: translation/ot/2_kings/021/003.yaml
  text: And he rebuilt the high places that Hezekiah his father had destroyed[a], and he erected altars for Baal, and made an Asherah, as Ahab king of Israel had done[c][b], and he bowed down to all the host of heaven and served them.
  footnotes:
  - marker: a
    text: Or 'an Asherah pole'; the Hebrew אֲשֵׁרָה can refer to a cult object associated with Asherah, and in some contexts may also evoke the goddess herself.
    reason: lexical_alternative
  - marker: b
    text: '''The host of heaven'' refers to the sun, moon, stars, or heavenly powers regarded as objects of worship.'
    reason: cultural_note
  - marker: c
    text: Or 'as Ahab king of Israel had made'.
    reason: previous_rendering
