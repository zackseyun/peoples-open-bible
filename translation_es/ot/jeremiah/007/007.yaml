translation:
  language: es
  text: entonces haré que habiten en este lugar, en la tierra que di a vuestros padres[a], desde antaño y para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a vuestros antepasados». El hebreo dice «a vuestros padres».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁכַּנְתִּי
  english_pob_choice: then I will let you dwell
  chosen_spanish: entonces yo los haré habitar
  alternatives_spanish:
  - entonces yo los dejaré habitar
  - entonces yo los haré morar
  - entonces yo haré que habiten
  lexicon: HALOT
  rationale: El verbo hebreo es causativo (Hifil) de שׁכן, por lo que conviene reflejar la idea de hacer/permitir habitar. «Haré habitar» conserva mejor la fuerza causativa que un simple «habitarán», y suena natural en español bíblico contemporáneo.
- source_word: בַּמָּקוֹם הַזֶּה
  english_pob_choice: in this place
  chosen_spanish: en este lugar
  alternatives_spanish:
  - en este sitio
  - aquí, en este lugar
  lexicon: HALOT
  rationale: מָקוֹם significa «lugar». «Este lugar» reproduce con claridad el demostrativo sin sobreespecificar el referente geográfico o cultual más allá del hebreo.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra/país
  lexicon: HALOT
  rationale: Aquí אֶרֶץ es la tierra prometida o concedida a los padres. «Tierra» mantiene el valor covenantal y geográfico mejor que «país» en este contexto.
- source_word: אֲשֶׁר נָתַתִּי
  english_pob_choice: that I gave
  chosen_spanish: que di
  alternatives_spanish:
  - que he dado
  - que yo di
  lexicon: HALOT
  rationale: El perfecto hebreo funciona aquí como pasado simple en estilo profético-narrativo. «Que di» es directo y fiel, sin cargar el texto con un aspecto más durativo del que exige el hebreo.
- source_word: לַאֲבֹתֵיכֶם
  english_pob_choice: to your fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus antepasados
  - a sus padres/antepasados
  lexicon: HALOT
  rationale: «Padres» reproduce la forma masculina del hebreo אָבוֹת. En español, «sus padres» mantiene la referencia de segunda persona plural sin forzar una nota genérica; la alternativa «antepasados» queda como posibilidad semántica, pero no como texto principal.
- source_word: לְמִן עוֹלָם וְעַד עוֹלָם
  english_pob_choice: from of old and forever
  chosen_spanish: desde antaño y para siempre
  alternatives_spanish:
  - desde antiguo y para siempre
  - desde tiempos antiguos y para siempre
  - desde la eternidad y para siempre
  lexicon: HALOT
  rationale: עוֹלָם aquí abarca un tramo temporal remoto hacia el pasado y una permanencia hacia el futuro. «Desde antaño» capta el valor de antigüedad/remoto sin imponer una lectura metafísica más fuerte; «para siempre» preserva la duración indefinida futura. Se evita «desde la eternidad» porque puede sugerir una formulación doctrinal más cargada que el hebreo en este contexto.
theological_decisions:
- issue: Alcance de la promesa de permanencia en la tierra
  english_pob_reading: Render the statement as a conditional promise of continued dwelling, without importing unconditionality.
  chosen_spanish_reading: Se presenta como una promesa de continuidad en la tierra, sin añadir en la traducción una afirmación de posesión absoluta e incondicional.
  alternative_spanish_readings:
  - Se traduce como concesión absoluta e irrevocable de la tierra
  - Se neutraliza la promesa hasta volverla solo una descripción histórica
  rationale: El versículo aparece dentro de un contexto exhortativo-condicional. Por eso la traducción debe mantener la promesa sin resolver debates teológicos más amplios sobre la permanencia del pacto o de la tierra. «Haré habitar» deja la afirmación abierta en su propio marco discursivo.
  doctrine_reference: Preservar la tensión teológica del contexto inmediato sin armonizarla artificialmente.
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente, donde la frase temporal modifica toda la concesión de la tierra y no solo el verbo 'dar'. Por eso se colocó la secuencia temporal al final de la cláusula en español, de modo natural, sin aislarla como si fuera un complemento del verbo únicamente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en este proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefirió «tierra» para אֶרֶץ por su valor covenantal.
  - Se evitó «ancestros» en el texto principal para conservar la forma masculina explícita del hebreo, pero se documenta como alternativa.
  - «Desde antaño y para siempre» conserva la amplitud temporal sin forzar una fórmula litúrgica tradicional.
