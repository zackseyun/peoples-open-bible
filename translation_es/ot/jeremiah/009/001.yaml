translation:
  language: es
  text: ¡Oh[a], si tuviera un lugar de hospedaje para viajeros[d] en el desierto, para poder dejar a mi pueblo e irme de ellos! Porque todos ellos son adúlteros[b], una asamblea[c] de traidores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «¿Quién me dará en el desierto un lugar de hospedaje para viajeros?», un modismo que expresa deseo: «¡Oh, si tuviera…!»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «infieles»; en contexto profético, también puede evocar infidelidad de pacto, no solo adulterio literal.'
    reason: alternative_reading
  - marker: c
    text: 'O: «compañía» o «grupo» de traidores.'
    reason: lexical_alternative
  - marker: d
    text: 'Otra posible redacción: «¡Oh, si tuviera en el desierto un lugar de hospedaje para viajeros!»'
    reason: previous_rendering
lexical_decisions:
- source_word: מִי יִתְּנֵנִי
  english_pob_choice: Oh, that I had
  chosen_spanish: ¡Oh, si tuviera…!
  alternatives_spanish:
  - ¿Quién me diera…?
  - Si tan solo tuviera…
  lexicon: HALOT
  rationale: El hebreo es una expresión optativa de deseo, no una pregunta literal. «¡Oh, si tuviera…!» conserva ese valor de lamento en español natural y fiel al impulso del texto.
- source_word: בַמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto árido
  - en la región despoblada
  lexicon: HALOT
  rationale: «Desierto» transmite bien el ámbito deshabitado del hebreo מִדְבָּר. «Wilderness» en inglés corresponde aquí a un espacio árido y apartado, no necesariamente a un desierto estrictamente geográfico.
- source_word: מְלוֹן אֹרְחִים
  english_pob_choice: a travelers' lodging place
  chosen_spanish: un lugar de hospedaje de viajeros
  alternatives_spanish:
  - un albergue para viajeros
  - una posada de viajeros
  lexicon: HALOT
  rationale: La imagen es la de un refugio o alojamiento de paso para caminantes. «Lugar de hospedaje de viajeros» mantiene el matiz de sitio provisional sin añadir elementos no presentes en el hebreo.
- source_word: וְאֶעֶזְבָה
  english_pob_choice: so that I might leave
  chosen_spanish: para poder dejar
  alternatives_spanish:
  - y dejar
  - para dejar
  lexicon: HALOT
  rationale: El cohortativo expresa propósito o resultado deseado. «Para poder dejar» conserva esa finalidad volitiva en un español claro y no demasiado formal.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi pueblo querido
  lexicon: HALOT
  rationale: «Mi pueblo» reproduce la relación comunitaria y pactal del hablante con Judá. En español, «pueblo» suena más bíblico y preciso que «gente».
- source_word: וְאֵלְכָה מֵאִתָּם
  english_pob_choice: and go away from them
  chosen_spanish: e irme lejos de ellos
  alternatives_spanish:
  - y apartarme de ellos
  - e irme de entre ellos
  lexicon: HALOT
  rationale: La combinación de verbo de movimiento y separación se vierte de modo natural con «irme lejos de ellos», que mantiene la distancia relacional expresada por el hebreo.
- source_word: כִּי כֻלָּם
  english_pob_choice: For all of them
  chosen_spanish: Porque todos ellos
  alternatives_spanish:
  - Pues todos ellos
  - Ya que todos ellos
  lexicon: HALOT
  rationale: «Porque» conserva la función causal del כִּי en este contexto. «Todos ellos» mantiene el énfasis sobre la totalidad.
- source_word: מְנָאֲפִים
  english_pob_choice: adulterers
  chosen_spanish: adúlteros
  alternatives_spanish:
  - adúlteras/os espirituales
  - infieles
  lexicon: HALOT
  rationale: Se conserva el término concreto «adúlteros» para no diluir la fuerza lexical del participio. En Jeremías la imagen puede tener resonancia metafórica de infidelidad de pacto, pero el texto mantiene la acusación corporal y moral.
- source_word: עֲצֶרֶת
  english_pob_choice: an assembly of
  chosen_spanish: una asamblea
  alternatives_spanish:
  - un grupo
  - una compañía
  lexicon: HALOT
  rationale: Aunque el término puede sonar solemne, aquí funciona como colectivo despectivo. «Asamblea» mantiene el valor de conjunto reunido y permite la ironía profética.
- source_word: בֹּגְדִים
  english_pob_choice: traitors
  chosen_spanish: de traidores
  alternatives_spanish:
  - de pérfidos
  - de infieles
  lexicon: HALOT
  rationale: «Traidores» traduce con fuerza el sentido de בגד como actuar con traición o deslealtad. La construcción «asamblea de traidores» respeta la apposición hebrea.
theological_decisions:
- issue: Si «adúlteros» debe suavizarse a una lectura exclusivamente metafórica de infidelidad de pacto
  english_pob_reading: Retain the concrete term 'adulterers' in the main text, allowing prophetic metaphorical resonance without replacing the lexical meaning.
  chosen_spanish_reading: Mantener «adúlteros» en el texto principal, dejando que la resonancia profética de infidelidad de pacto permanezca sin sustituir el término concreto.
  alternative_spanish_readings:
  - infieles
  - adúlteros espirituales
  rationale: Jeremías usa con frecuencia el lenguaje de adulterio tanto en sentido literal como metafórico. La traducción no debe resolver la tensión eliminando la acusación concreta; conviene preservarla para que el lector perciba ambas capas.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La redacción española sigue el ajuste del audit trail inglés que prefiere colocar «en el desierto» después del sintagma de hospedaje para una sintaxis más natural, sin perder el paralelismo del hebreo. También conserva la tensión documentada entre la acusación literal de adulterio y la posible carga metafórica de infidelidad.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrama; este versículo no lo contiene.
  - Se mantiene «adúlteros» y «traidores» en sentido fuerte, conforme al valor léxico del hebreo y al auditoría inglesa.
  - «Desierto» se emplea como equivalente idiomático de מִדְבָּר en un contexto profético de aislamiento.
