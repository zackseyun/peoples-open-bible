translation:
  language: es
  text: Pero después de un período de tres años, Jasón envió a Menelao, el hermano del ya mencionado Simón, para llevar el dinero al rey y para entregar escritos[a] acerca de asuntos necesarios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para presentar informes escritos acerca de asuntos necesarios». El griego ὑπομνηματισμοὺς puede referirse a memorandos o a informes escritos, y el matiz administrativo exacto es incierto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ τριετῆ χρόνον
  english_pob_choice: But after a period of three years
  chosen_spanish: Pero después de un período de tres años
  alternatives_spanish:
  - Después de tres años
  - Pero después de tres años
  lexicon: LSJ
  rationale: μετά con acusativo expresa tiempo posterior; τριετῆ χρόνον indica literalmente un período de tres años. «Período de tres años» conserva la duración sin sonar forzado en español, y «Pero» refleja el valor transicional de δέ.
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: LSJ
  rationale: El aoristo de ἀποστέλλω se expresa de forma natural con «envió» en narración. Mantiene el sentido simple de comisionar o remitir a alguien.
- source_word: Μενέλαον
  english_pob_choice: Menelaus
  chosen_spanish: Menelao
  lexicon: transliteración
  rationale: Nombre propio transliterado a la forma usual en español bíblico y académico.
- source_word: τὸν τοῦ προσηνομένου Σίμωνος ἀδελφόν
  english_pob_choice: the brother of the aforementioned Simon
  chosen_spanish: el hermano del mencionado Simón
  alternatives_spanish:
  - el hermano del citado Simón
  - el hermano de Simón, antes mencionado
  lexicon: LSJ
  rationale: 'προσηνομένου tiene fuerza anafórica: remite a un Simón ya mencionado. «Mencionado» conserva esa referencia de manera clara y neutral en español.'
- source_word: παρακομίζοντα τὰ χρήματα τῷ βασιλεῖ
  english_pob_choice: to carry the money to the king
  chosen_spanish: para llevar el dinero al rey
  alternatives_spanish:
  - para transportar el dinero al rey
  - para conducir el dinero al rey
  lexicon: LSJ
  rationale: 'El participio expresa finalidad: Menelao fue enviado para trasladar el dinero al rey. «Llevar» es idiomático y suficientemente preciso para τὰ χρήματα en este contexto administrativo.'
- source_word: περὶ πραγμάτων ἀναγκαίων
  english_pob_choice: concerning necessary matters
  chosen_spanish: acerca de asuntos necesarios
  alternatives_spanish:
  - sobre asuntos necesarios
  - respecto de cuestiones necesarias
  lexicon: LSJ
  rationale: πράγματα puede significar asuntos, negocios o cuestiones. «Asuntos necesarios» preserva la vaguedad del griego sin concretar indebidamente el contenido.
- source_word: ὑπομνηματισμοὺς τελέσοντα
  english_pob_choice: to deliver memoranda concerning necessary matters
  chosen_spanish: para entregar memorandos acerca de asuntos necesarios
  alternatives_spanish:
  - para presentar memorandos acerca de asuntos necesarios
  - para entregar informes escritos acerca de asuntos necesarios
  lexicon: LSJ
  rationale: La revisión inglesa prefirió «deliver memoranda» para reflejar mejor el contexto administrativo de ὑπομνηματισμοὺς τελέσοντα. En español, «entregar memorandos» conserva ese matiz documental y de presentación/submisión, sin forzar una paráfrasis más interpretativa.
translation_notes:
  revision_awareness: La base inglesa revisada sustituyó «complete memoranda» por «deliver memoranda» para reflejar mejor ὑπομνηματισμοὺς τελέσοντα como presentación o entrega de documentos/memorandos. La versión española sigue esa revisión y mantiene la ambigüedad administrativa mediante la nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo subyacente lo requiere; este versículo no contiene el nombre divino.
  - Se mantiene la transliteración «Menelao» y «Jasón» conforme al uso bíblico español consistente.
  - Se traduce con «dinero» para τὰ χρήματα, evitando una especificación más técnica que el contexto no exige.
  - «Asuntos necesarios» conserva la vaguedad del griego y evita armonizar con un contenido administrativo no explicitado.
