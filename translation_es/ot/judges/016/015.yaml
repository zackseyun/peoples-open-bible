translation:
  language: es
  text: 'Entonces ella le dijo: «¿Cómo puedes decir: “Te amo”, si tu corazón no está conmigo? Ya son tres veces que te has burlado[a] de mí y no me has dicho en qué consiste tu gran fuerza».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «has jugado conmigo», «me has engañado» o «me has hecho quedar como un tonto». El verbo hebreo expresa tratar a alguien a la ligera mediante una burla engañosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  english_pob_choice: How can
  chosen_spanish: ¿Cómo puedes…?
  alternatives_spanish:
  - ¿Cómo es que puedes…?
  - ¿De qué manera puedes…?
  lexicon: HALOT
  rationale: La pregunta retórica exige en español una fórmula natural que mantenga la incredulidad de Dalila. «¿Cómo puedes…?» conserva bien esa fuerza sin volverlo áspero o artificioso.
- source_word: אֲהַבְתִּיךְ
  english_pob_choice: I love you
  chosen_spanish: Te amo
  alternatives_spanish:
  - Te he amado
  - Yo te amo
  lexicon: HALOT
  rationale: El perfecto hebreo en diálogo directo expresa aquí una afirmación de amor vigente; en español, «Te amo» transmite mejor esa vivencia inmediata que una perífrasis pasada.
- source_word: לִבְּךָ אֵין אִתִּי
  english_pob_choice: your heart is not with me
  chosen_spanish: tu corazón no está conmigo
  alternatives_spanish:
  - tu corazón no está conmigo en absoluto
  - tu corazón no es mío
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea del corazón como centro de lealtad e ինտención. «No está conmigo» mantiene el sentido relacional sin convertirlo en una afirmación de posesión.
- source_word: זֶה שָׁלֹשׁ פְּעָמִים
  english_pob_choice: These three times
  chosen_spanish: Ya son tres veces
  alternatives_spanish:
  - Estas tres veces
  - Tres veces ya
  lexicon: HALOT
  rationale: 'La secuencia demostrativa-numérica suena más natural en español como recapitulación: «Ya son tres veces». Conserva la referencia a hechos previos repetidos.'
- source_word: הֵתַלְתָּ בִּי
  english_pob_choice: you have mocked me
  chosen_spanish: te has burlado de mí
  alternatives_spanish:
  - me has tomado el pelo
  - me has engañado
  - me has hecho objeto de burla
  lexicon: HALOT
  rationale: El verbo hebreo implica jugar con alguien mediante engaño o mofa. «Te has burlado de mí» preserva el agravio personal y la combinación de burla y engaño mejor que una traducción demasiado suave.
- source_word: הִגַּדְתָּ לִּי
  english_pob_choice: have not told me
  chosen_spanish: no me has dicho
  alternatives_spanish:
  - no me has contado
  - no me has dado a conocer
  lexicon: HALOT
  rationale: En este contexto conversacional, «no me has dicho» expresa con claridad el valor de informar o revelar algo, sin elevar innecesariamente el registro.
- source_word: בַּמֶּה כֹּחֲךָ גָדוֹל
  english_pob_choice: in what your great strength lies
  chosen_spanish: en qué consiste tu gran fuerza
  alternatives_spanish:
  - dónde está tu gran fuerza
  - por qué tu fuerza es tan grande
  - en qué radica tu gran fuerza
  lexicon: HALOT
  rationale: La pregunta no pide un lugar físico sino la base o naturaleza de la fuerza de Sansón. «En qué consiste» comunica bien esa indagación de fondo en español.
translation_notes:
  revision_awareness: El texto inglés auditado ya estaba en acuerdo alto con la fuente hebrea y no registró revisiones aplicadas; esta versión española sigue de cerca ese sentido estable, preservando la tensión léxica de הֵתַלְתָּ como burla engañosa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni una referencia directa al nombre divino.
  - Se usa «corazón» para לֵב/לִבְּךָ siguiendo el valor idiomático de lealtad interna, no como órgano físico.
  - Se prefiere «fuerza» para כֹּחַ, en concordancia con el campo semántico de capacidad/poder en el relato de Sansón.
  - El registro es digno y directo, evitando arcaísmos innecesarios y conservando la vivacidad del diálogo narrativo.
