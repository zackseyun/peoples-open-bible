base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/058.yaml
  text: Jesus said[a], "Blessed is the person who has labored[f][e][d][c][b]; he has found life."
  footnotes:
  - marker: a
    text: Makarios (ⲙⲁⲕⲁⲣⲓⲟⲥ) can nuance “happy” or “fortunate” as well as “blessed.”
    reason: lexical_alternative
  - marker: b
    text: ⲡⲣⲱⲙⲉ denotes a human being generically; “person” avoids implying male-only reference though “man” is a possible rendering.
    reason: lexical_alternative
  - marker: c
    text: ϩⲓⲥⲉ ranges from “labor/toil” to “suffer/be distressed”; some translate “Blessed is the one who has suffered.”
    reason: lexical_alternative
  - marker: d
    text: The independent pronoun ⲁⲛⲧⲟϥ is emphatic; the translation carries this forward as “that one has found life” rather than “he himself has found life.”
    reason: dialect_note
  - marker: e
    text: Printed form ⲁⲡⲱⲛϩ likely reflects orthographic variation; normalized Sahidic expects ⲉⲡⲱⲛϩ as the object of ϩⲉ.
    reason: textual_variant
  - marker: f
    text: Or 'that one has found life'.
    reason: previous_rendering
