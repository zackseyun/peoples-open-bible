translation:
  language: es
  text: Saquearán tu riqueza y despojarán tu mercancía. Derribarán tus muros y demolerán tus casas espléndidas. Arrojarán tus piedras[a], tus maderos y tu polvo en medio de las aguas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu polvo». El hebreo puede significar «polvo», «tierra» o, en este contexto, los escombros de una ciudad demolida.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלְלוּ
  english_pob_choice: will plunder
  chosen_spanish: saquearán
  alternatives_spanish:
  - despojarán
  - plunderán
  lexicon: HALOT
  rationale: En este contexto bélico y de pillaje, «saquearán» comunica bien la toma violenta de bienes y es natural en español. Mantiene el sentido de despojo militar del hebreo.
- source_word: חֵילֵךְ
  english_pob_choice: your wealth
  chosen_spanish: tu riqueza
  alternatives_spanish:
  - tus bienes
  - tus recursos
  - tu fortuna
  lexicon: HALOT
  rationale: El campo semántico de חַיִל puede incluir fuerza, ejército o riqueza. Siguiendo el contexto económico de Tiro y el POB inglés, «riqueza» refleja mejor el valor arrebatado.
- source_word: בָזְזוּ
  english_pob_choice: loot
  chosen_spanish: robarán
  alternatives_spanish:
  - saquearán
  - despojarán
  lexicon: HALOT
  rationale: Para evitar una repetición demasiado pesada de «saquearán», «robarán» conserva la idea de toma violenta. No diluye el paralelo hebreo de verbos de despojo.
- source_word: רְכֻלָּתֵךְ
  english_pob_choice: your merchandise
  chosen_spanish: tu mercancía
  alternatives_spanish:
  - tus mercaderías
  - tus bienes de comercio
  - tu comercio
  lexicon: HALOT
  rationale: El término se refiere a bienes de intercambio comercial. «Mercancía» es claro, concreto y corresponde al sentido económico de la frase.
- source_word: הָרְסוּ
  english_pob_choice: will tear down
  chosen_spanish: derribarán
  alternatives_spanish:
  - destruirán
  - tirarán abajo
  lexicon: HALOT
  rationale: Aplicado a muros, el verbo pide una imagen de demolición estructural. «Derribarán» es preciso y natural en español.
- source_word: חוֹמוֹתַיִךְ
  english_pob_choice: your walls
  chosen_spanish: tus muros
  alternatives_spanish:
  - tus paredes
  - tus fortificaciones
  lexicon: HALOT
  rationale: En un contexto de ciudad fortificada, «muros» transmite mejor la referencia urbana defensiva que «paredes».
- source_word: בָתֵּי חֶמְדָּתֵךְ
  english_pob_choice: your splendid houses
  chosen_spanish: tus casas espléndidas
  alternatives_spanish:
  - tus casas hermosas
  - tus casas preciosas
  - tus casas lujosas
  lexicon: HALOT
  rationale: La expresión denota casas deseables/deliciosas, es decir, ricas o lujosas. «Espléndidas» mantiene la valoración positiva sin volverla más interpretativa de lo debido.
- source_word: יִתֹּצוּ
  english_pob_choice: will demolish
  chosen_spanish: demolerán
  alternatives_spanish:
  - destruirán
  - derribarán
  lexicon: HALOT
  rationale: El verbo comunica demolición de estructuras. «Demolerán» completa bien el paralelo con «derribarán» y conserva la fuerza de ruina total.
- source_word: אֲבָנַיִךְ
  english_pob_choice: your stones
  chosen_spanish: tus piedras
  alternatives_spanish:
  - tus piedras de construcción
  - tus bloques
  lexicon: HALOT
  rationale: El hebreo es literal; «piedras» es la equivalencia más directa para los restos de construcción que serán arrojados al agua.
- source_word: עֵצַיִךְ
  english_pob_choice: your timbers
  chosen_spanish: tus maderos
  alternatives_spanish:
  - tus vigas
  - tu madera
  lexicon: HALOT
  rationale: En un conjunto con piedras y polvo de edificios derribados, «maderos» suena natural y conserva la referencia a material de construcción.
- source_word: עֲפָרֵךְ
  english_pob_choice: your dust
  chosen_spanish: tu polvo
  alternatives_spanish:
  - tu tierra
  - tus escombros
  - tu polvo de ruina
  lexicon: HALOT
  rationale: El POB inglés opta por «dust» para reflejar el hebreo עָפָר de forma más cercana que «rubble». En español, «polvo» es la correspondencia más directa y permite mantener la imagen de completa desintegración.
- source_word: בְּתוֹךְ מַיִם
  english_pob_choice: into the midst of the waters
  chosen_spanish: al medio de las aguas
  alternatives_spanish:
  - en medio de las aguas
  - al seno de las aguas
  - dentro de las aguas
  lexicon: HALOT
  rationale: Se conserva la pluralidad y la fuerza imagística del hebreo. «Al medio de las aguas» reproduce de manera idiomática el movimiento hacia el interior del agua.
- source_word: יָשִׂימוּ
  english_pob_choice: will throw
  chosen_spanish: arrojarán
  alternatives_spanish:
  - pondrán
  - echarán
  lexicon: HALOT
  rationale: Aunque el verbo básico es «poner/colocar», el contexto de destrucción y desecho exige el matiz de arrojar. «Arrojarán» es fiel al sentido contextual y al registro.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y toma como guía la solución auditada del POB inglés: despojo bélico para שָׁלַל/בָזַז, ruina estructural para הָרַס/נתץ, y el cierre imagístico con piedras, maderos y עָפָר arrojados al agua. Se evitó una traducción demasiado literal de עֲפָרֵךְ con una palabra que sonara extraña en español, por lo que se mantiene «polvo» con nota alternativa, en línea con el ajuste final del inglés auditado.'
  spanish_consistency_notes:
  - Se mantuvo el tuteo singular femenino («tu», «tus») por corresponder a la dirección a Tiro.
  - Se prefirió vocabulario económico concreto («riqueza», «mercancía») para conservar el contraste entre botín y bienes comerciales.
  - Se usó «aguas» en plural para respetar el hebreo y la imagen del texto.
  - «Espléndidas» equilibra claridad y dignidad sin introducir una explicación interpretativa excesiva.
