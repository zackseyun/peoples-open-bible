translation:
  language: es
  text: 'Entonces ella le habló con palabras como estas[a], diciendo: «El esclavo hebreo que nos trajiste vino a mí para burlarse de mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para hacer escarnio de mí», quizá con un matiz sexual o de abuso.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּדַבֵּר
  english_pob_choice: Then she spoke
  chosen_spanish: Entonces ella le habló
  alternatives_spanish:
  - Y ella habló
  - Entonces ella dijo
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración. En español, «le habló» conserva el movimiento verbal dirigido al interlocutor y suena natural en un contexto narrativo.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Potifar
  lexicon: HALOT
  rationale: El pronombre retoma a su esposo por contexto; el clítico «le» evita sobrecargar la frase y mantiene la referencia implícita del hebreo.
- source_word: כַּדְּבָרִים הָאֵלֶּה
  english_pob_choice: with words like these
  chosen_spanish: con palabras como estas
  alternatives_spanish:
  - según estas palabras
  - en estos términos
  lexicon: HALOT
  rationale: La construcción comparativa se expresa con naturalidad en español mediante «con palabras como estas», que conserva el sentido introductorio del reporte sin volverlo literalista.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - 'así:'
  - y dijo
  lexicon: HALOT
  rationale: Es la fórmula quotativa estándar; «diciendo» introduce el discurso directo de manera fiel y fluida.
- source_word: בָּא אֵלַי
  english_pob_choice: came to me
  chosen_spanish: vino a mí
  alternatives_spanish:
  - entró a mí
  - se llegó a mí
  lexicon: HALOT
  rationale: «Vino a mí» reproduce el movimiento hacia la hablante sin añadir una connotación sexual que el hebreo aún no especifica por sí mismo.
- source_word: הָעֶבֶד
  english_pob_choice: slave
  chosen_spanish: el esclavo
  alternatives_spanish:
  - el siervo
  - el criado
  lexicon: HALOT
  rationale: Se conserva la fuerza social del término. «Esclavo» refleja mejor el vínculo de dependencia que «siervo» o «criado».
- source_word: הָעִבְרִי
  english_pob_choice: Hebrew
  chosen_spanish: hebreo
  alternatives_spanish:
  - hombre hebreo
  lexicon: HALOT
  rationale: El etnónimo funciona de forma atributiva/appositiva; «hebreo» es la forma breve y clara en español.
- source_word: אֲשֶׁר הֵבֵאתָ לָּנוּ
  english_pob_choice: whom you brought to us
  chosen_spanish: que trajiste para nosotros
  alternatives_spanish:
  - que nos trajiste
  - que trajiste a nosotros
  lexicon: HALOT
  rationale: La frase refleja el reproche dirigido al esposo y preserva el plural de la casa/entorno. «Para nosotros» conserva el valor relacional del dative plural en este contexto doméstico.
- source_word: לְצַחֶק בִּי
  english_pob_choice: to mock me
  chosen_spanish: para burlarse de mí
  alternatives_spanish:
  - para hacer burla de mí
  - para jugar conmigo
  - para hacer deporte de mí
  lexicon: HALOT
  rationale: En este contexto acusatorio, צחק comunica burla o trato ofensivo. «Burlarse de mí» conserva esa carga y permite la ambigüedad contextual de abuso sin sobredeterminarla.
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura inglesa auditada y la imagen hebrea del versículo, manteniendo la secuencia narrativa, el destinatario implícito y la ambigüedad de צחק en un registro español publicable.
  spanish_consistency_notes:
  - Se usa «hebreo» y «esclavo» conforme al criterio léxico del proyecto.
  - Se conserva el discurso directo con dos puntos y comillas angulares, según la puntuación española.
  - El marcador [a] está anclado en la expresión verbal que contiene la alternativa léxica relevante.
