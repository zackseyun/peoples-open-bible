base_translation:
  language: en
  yaml_path: translation/ot/1_kings/020/034.yaml
  text: Then he said to him[a], “The cities that my father took from your father I will restore, and you may make streets for yourself in Damascus, as my father made in Samaria.” And I, in the treaty[c][b], will let you go.” So he made a treaty with him and let him go.
  footnotes:
  - marker: a
    text: Or 'marketplaces' or 'quarters'; the Hebrew word literally means 'streets/open places' and may refer here to commercial districts granted by treaty.
    reason: lexical_alternative
  - marker: b
    text: Or 'with this covenant I will let you go.' The Hebrew word can also be rendered 'covenant,' but here it refers to a political treaty.
    reason: alternative_reading
  - marker: c
    text: Literally 'cut a covenant/treaty with him,' a standard Hebrew idiom for formally making a binding agreement.
    reason: cultural_note
