translation:
  language: es
  text: Porque su amor leal ha prevalecido sobre nosotros, y la fidelidad[a] de Yahvé es para siempre. ¡Alaben a Yah!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «verdad».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base o motivo de la doxología anterior; en español, «Porque» conserva bien la relación explicativa y el tono poético.
- source_word: גָבַר
  english_pob_choice: has prevailed
  chosen_spanish: ha prevalecido
  alternatives_spanish:
  - es grande
  - ha sido poderoso
  - ha vencido
  lexicon: HALOT
  rationale: El verbo expresa fuerza que vence o supera; «ha prevalecido» mantiene la imagen de poder activo sin perder naturalidad en español.
- source_word: עָלֵינוּ
  english_pob_choice: over us
  chosen_spanish: sobre nosotros
  alternatives_spanish:
  - contra nosotros
  - sobre nosotros
  lexicon: HALOT
  rationale: Con גבר, la preposición comunica dominio o fuerza ejercida «sobre» alguien. «Sobre nosotros» preserva esa imagen.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor leal
  alternatives_spanish:
  - su amor constante
  - su misericordia
  - su amor de pacto
  lexicon: HALOT
  rationale: חסד combina amor y lealtad pactal. «Amor leal» es una opción española clara que mantiene ambos matices sin reducirlo solo a misericordia.
- source_word: וֶאֱמֶת
  english_pob_choice: the faithfulness
  chosen_spanish: la fidelidad
  alternatives_spanish:
  - la verdad
  - la fidelidad
  lexicon: HALOT
  rationale: La revisión inglesa favorece aquí el sentido de fidelidad en paralelo con חסד. En español, «fidelidad» transmite mejor la dimensión relacional y pactal que «verdad» en este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton según la norma del proyecto en español, evitando la sustitución por un título.
- source_word: לְעוֹלָם
  english_pob_choice: is forever
  chosen_spanish: es para siempre
  alternatives_spanish:
  - permanece para siempre
  - es eterno
  lexicon: HALOT
  rationale: La fórmula nominal hebrea se vierte de manera natural como una afirmación de permanencia continua.
- source_word: הַלְלוּ יָהּ
  english_pob_choice: Praise Yah!
  chosen_spanish: ¡Alaben a Yah!
  alternatives_spanish:
  - ¡Alaben a Yah!
  - ¡Aleluya!
  - ¡Alaben al SEÑOR!
  lexicon: HALOT
  rationale: Se traduce el imperativo y el nombre abreviado divino, preservando la fuerza exhortativa y la forma corta «Yah» en lugar de solo transliterar.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el nombre propio de Dios. La política del proyecto en español favorece «Yahvé» para preservar el Tetragrámaton sin ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de אֱמֶת junto a חֶסֶד
  english_pob_reading: faithfulness
  chosen_spanish_reading: fidelidad
  alternative_spanish_readings:
  - verdad
  - fidelidad
  rationale: Aunque אֱמֶת puede significar «verdad», aquí la pareja con חֶסֶד favorece el sentido de confiabilidad/fidelidad pactal. Se mantiene esa lectura sin borrar la posible resonancia de «verdad» en otros contextos.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: הַלְלוּ יָהּ como exhortación litúrgica
  english_pob_reading: Praise Yah!
  chosen_spanish_reading: ¡Alaben a Yah!
  alternative_spanish_readings:
  - ¡Aleluya!
  - ¡Alaben a Yah!
  rationale: La forma española conserva el imperativo plural y el nombre breve divino, evitando reemplazar la expresión por un simple préstamo litúrgico que diluya su transparencia semántica.
  doctrine_reference: POB Spanish naming and transliteration conventions
translation_notes:
  revision_awareness: El audit trail inglés comenzó con «truth» para אֱמֶת y luego fue revisado a «faithfulness» por ajuste contextual; la versión española refleja esa revisión con «fidelidad» en el texto principal, manteniendo el paralelismo con חֶסֶד y la lectura pactal. También se preserva la decisión del proyecto de traducir el Tetragrámaton como Yahvé y de verter הַלְלוּ יָהּ como una exhortación directa, no como una simple transliteración.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar español del proyecto.
  - Se usa «amor leal» para חֶסֶד como equivalente idiomático comprensible y teológicamente sobrio.
  - Se usa «fidelidad» para אֱמֶת en el texto principal, con nota alternativa que conserva la posibilidad de «verdad».
  - Se conserva el paralelismo poético con una estructura coordinada breve y solemne.
  - «¡Alaben a Yah!» reproduce el imperativo plural del hebreo y el nombre breve divino sin sustituirlo por una fórmula eclesiástica más tradicional.
