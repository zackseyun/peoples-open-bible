translation:
  language: es
  text: Los hijos[a] de Israel partieron de Ramesés[b] y acamparon en Sucot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas»; tradicionalmente, «los hijos de Israel». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: «Ramesés» también se escribe «Raamsés» en algunas traducciones.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: set out
  chosen_spanish: partieron
  alternatives_spanish:
  - salieron
  - se pusieron en marcha
  - viajaron
  lexicon: HALOT
  rationale: נסע describe aquí la salida de una etapa del itinerario; «partieron» comunica con naturalidad el movimiento narrativo de dejar un lugar para continuar.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijos de Israel». En español, «los hijos de Israel» conserva bien la forma y el tono bíblico sin perder claridad.
- source_word: מֵרַעְמְסֵס
  english_pob_choice: from Rameses
  chosen_spanish: de Ramesés
  alternatives_spanish:
  - desde Ramesés
  - de Raamsés
  lexicon: HALOT
  rationale: La preposición מִן indica procedencia. Se mantiene la transliteración convencional «Ramesés», ajustada a la ortografía española.
- source_word: וַיַּחֲנוּ
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon allí
  - se acamparon
  - encamparon
  lexicon: HALOT
  rationale: חנה se refiere a establecer el campamento. «Acamparon» es claro y fiel al sentido itinerante del texto.
- source_word: בְּסֻכֹּת
  english_pob_choice: at Succoth
  chosen_spanish: en Sucot
  alternatives_spanish:
  - en Succot
  - en Sucot
  lexicon: HALOT
  rationale: La preposición ב expresa ubicación. «En Sucot» reproduce de manera natural el valor locativo; el nombre propio se translitera en forma usual en español.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente las notas al texto mediante [a] y [b] en los nombres propios, manteniendo el sentido itinerante del hebreo y la equivalencia auditada del POB inglés.
  spanish_consistency_notes:
  - Se preservó la estructura narrativa breve del versículo.
  - Se evitó la traducción por «encamparon» porque en español actual suena más marcada y menos natural que «acamparon».
  - Se mantuvo la forma plural «los hijos de Israel» en coherencia con la literalidad hebrea y el criterio del POB inglés.
