revisions:
- from: Así que salió de parte de Faraón y suplicó a Yahvé[a].
  to: Así que salió de la presencia de Faraón y suplicó a Yahvé[a].
  rationale: Se corrige únicamente la frase que vierte מֵעִם para reflejar con fidelidad la salida de la presencia de Faraón. El resto del versículo ya preserva bien el sentido fuente, la terminología del proyecto y la legibilidad en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:26:56Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la secuencia narrativa y la súplica intensa de וַיֶּעְתַּר, y preserva correctamente יְהוָה como «Yahvé». Sin embargo, «de parte de Faraón» no refleja fielmente מֵעִם, que aquí significa separación de la presencia o compañía de Faraón, no procedencia representativa.
  spanish_quality_summary: El texto es claro y natural en general, pero «salió de parte de Faraón» suena impropio en español bíblico y moderno, porque normalmente significa «en nombre de» o «procedente de un mensaje de». «Salió de la presencia de Faraón» o «salió de junto a Faraón» es más idiomático y más fiel.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; עתר → «suplicó» es una opción fuerte y legible; Faraón está bien. La única desviación relevante está en מֵעִם, cuya decisión léxica debe corregirse.'
  issues:
  - severity: high
    issue: «de parte de Faraón» traduce inadecuadamente מֵעִם
    rationale: מֵעִם expresa separación de estar con/al lado de alguien, es decir, «de junto a», «de la presencia de». En español, «de parte de» suele significar «en nombre de» o «procedente de», lo que altera el sentido narrativo.
  - severity: low
    issue: La rationale léxica para מֵעִם justifica una expresión no idiomática
    rationale: La explicación afirma que «de parte de» comunica apartarse de estar con Faraón, pero en uso real del español no comunica eso con claridad. Conviene ajustar tanto el texto como la decisión léxica en la documentación interna.
  revised_spanish_text: Así que salió de la presencia de Faraón y suplicó a Yahvé[a].
  revised_footnotes:
  - marker: a
    text: O «rogó con insistencia a Yahvé» o «imploró a Yahvé». El verbo hebreo expresa una súplica ferviente.
    reason: lexical_alternative
  revision_rationale: Se corrige únicamente la frase que vierte מֵעִם para reflejar con fidelidad la salida de la presencia de Faraón. El resto del versículo ya preserva bien el sentido fuente, la terminología del proyecto y la legibilidad en español.
