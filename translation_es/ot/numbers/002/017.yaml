review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: la tienda de reunión sale en marcha con el campamento de los levitas en medio de los campamentos, y el orden de salida corresponde al orden de acampar. Sin embargo, la colocación de las notas está invertida respecto de las decisiones léxicas documentadas: la nota [a] debe anclarse en ''su lugar'' / ''su puesto'' para עַל יָדוֹ, y la nota [b] en ''estandartes'' para לְדִגְלֵיהֶם. Además, la nota actual [b] es tautológica (''según sus estandartes'' para ''según sus estandartes'') y no preserva correctamente la alternativa inglesa ''according to their standards''.'
  spanish_quality_summary: El español es claro, natural y digno. 'Entonces partirá', 'la tienda de reunión', 'en medio de los campamentos' y 'cada uno en su lugar' son buenas opciones. La puntuación puede fluir mejor sin coma antes de 'según sus estandartes', pero no es un error grave. La reparación necesaria es principalmente de notas y anclajes.
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Tienda de reunión' es fiel a אֹהֶל מוֹעֵד, 'levitas' y 'estandartes' están bien, y no hay asunto del nombre divino en este versículo. La decisión 'partirán' para נָסַע es aceptable en contexto de marcha.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en 'tienda de reunión' pero explica עַל יָדוֹ ('en su lugar' / 'en su puesto').
    rationale: Las notas deben aparecer exactamente en la palabra o frase relevante del texto español. Aquí el contenido de la nota no corresponde a 'tienda de reunión' sino a la expresión distributiva de posición asignada.
  - severity: medium
    issue: La nota [b] es defectuosa y tautológica.
    rationale: Dice 'O según sus estandartes para según sus estandartes', lo que no aporta alternativa real. Debe reflejar la alternativa documentada 'según sus enseñas/estandartes' o 'por sus estandartes' con explicación del término tribal/organizativo.
  - severity: low
    issue: La distribución de marcadores no sigue el orden de las decisiones léxicas pertinentes al texto final.
    rationale: Aunque menor, el proyecto exige marcadores únicos y correctamente ubicados; conviene reasignarlos para evitar confusión editorial.
