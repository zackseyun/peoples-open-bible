review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: huida de los beerotitas a Gitaim, permanencia allí y continuidad temporal hasta el presente del narrador. También conserva adecuadamente el matiz contrastivo de וַ con «Pero». Sin embargo, «han vivido allí como forasteros» suena algo débil para גָּרִים, que aquí apunta más específicamente a residentes no nativos o extranjeros residentes.'
  spanish_quality_summary: El español es claro y legible, pero puede afinarse. «Beerotitas» es la forma correcta frente a la discrepancia interna «los beerotitas»/«Beerotitas» en la justificación. «Han vivido allí» es aceptable, aunque «han vivido allí» con «como extranjeros residentes» da mejor precisión semántica que «como forasteros». La nota actual («residentes foráneos») suena menos natural en español bíblico general que «extranjeros residentes».
  glossary_alignment: No hay términos teológicos mayores en juego. El tratamiento de גָּרִים conviene alinearlo mejor con el razonamiento del POB inglés («sojourners» / alternativa «resident foreigners»), usando en español «extranjeros residentes» en texto o nota para preservar el matiz social-legal sin anglicismo ni tecnicismo innecesario.
  issues:
  - severity: medium
    issue: «como forasteros» subrepresenta el matiz de גָּרִים
    rationale: «Forasteros» comunica ajenidad, pero no tan claramente la idea de residencia como no nativos. El participio hebreo apunta a morar allí en condición de extranjeros/residentes temporales.
  - severity: low
    issue: La nota usa «residentes foráneos», giro poco natural
    rationale: Aunque comprensible, suena más calcado y menos idiomático que «extranjeros residentes», que expresa mejor la alternativa léxica preservada por el POB inglés.
  - severity: low
    issue: Inconsistencia ortográfica en la documentación interna del gentilicio
    rationale: El texto lleva «beerotitas», pero la racionalización menciona «Beerotitas». Conviene normalizar; en el texto principal «beerotitas» es aceptable por ir tras artículo y en minúscula.
  revised_spanish_text: Pero los beerotitas huyeron a Gitaim y han vivido allí como extranjeros residentes hasta hoy[a].
  revised_footnotes:
  - marker: a
    text: 'O: «han estado viviendo allí como forasteros hasta hoy».'
    reason: lexical_alternative
  revision_rationale: Se ajusta גָּרִים en el texto principal a «extranjeros residentes» para preservar mejor el sentido de residencia no nativa implícito en el hebreo y en la auditoría inglesa. Se mantiene una alternativa más idiomática y menos técnica («forasteros») en nota. No se requieren cambios adicionales de estructura ni de tiempo verbal.
