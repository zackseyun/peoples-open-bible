review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido general de juicio agrícola y respeta «Yahvé», pero debilita una decisión clave del origen: עוֹלֵל יְעוֹלְלוּ no es simplemente «serán despojados por completo», sino una imagen enfática de rebusca/vendimia exhaustiva. Además, «del resto de Israel como de una vid» suena forzado frente al comparativo hebreo «como una vid». La cláusula final refleja correctamente la acción repetida, pero el sintagma del objeto necesita corrección formal y mejor anclaje de nota.'
  spanish_quality_summary: 'La redacción es comprensible, pero presenta problemas de naturalidad y corrección: «serán[a]» ancla mal la nota, la nota habla de «sobre los sarmientos» cuando ese texto ya aparece en la traducción, «las sarmientos» es incorrecto gramaticalmente, y «como de una vid» resulta poco idiomático. Una revisión breve puede dejar el versículo claro, digno y fiel.'
  glossary_alignment: Alineado con la política del proyecto en «Yahvé». «De los ejércitos» es aceptable para צְבָאוֹת. Conviene preferir «remanente» sobre «resto» aquí, porque el inglés auditado eligió «remnant» por su resonancia contextual y teológica, y en español bíblico es natural. Para עוֹלֵל יְעוֹלְלוּ debe preservarse más explícitamente la imagen de rebuscar/vendimiar exhaustivamente.
  issues:
  - severity: high
    issue: Se pierde la metáfora agrícola principal en «serán despojados por completo».
    rationale: El hebreo intensifica el verbo «rebuscar/vendimiar»; el inglés POB documenta «thoroughly glean». «Despojar» comunica resultado, pero no la imagen agrícola que estructura todo el versículo.
  - severity: medium
    issue: «como de una vid» suena poco natural y no refleja bien el comparativo simple.
    rationale: כַגֶּפֶן significa «como una vid». La preposición «de» no está motivada por el hebreo y entorpece la lectura.
  - severity: high
    issue: Error gramatical en «las sarmientos».
    rationale: '«Sarmientos» es masculino plural: «los sarmientos».'
  - severity: medium
    issue: La nota al pie está mal anclada y mal formulada respecto del texto revisado.
    rationale: El marcador [a] aparece en «serán», pero la variante debatida corresponde a סַלְסִלּוֹת, es decir, al término final («sarmientos»/«ramas»/«zarcillos»/«cestas»). Además, no debe ofrecer como alternativa exacta lo que ya está en el texto.
  - severity: medium
    issue: «resto de Israel» es posible, pero menos alineado que «remanente de Israel».
    rationale: La decisión inglesa prioriza «remnant» por su fuerza contextual; «remanente» es plenamente natural en español bíblico y preserva mejor esa resonancia.
  revised_spanish_text: 'Así dice Yahvé de los ejércitos: rebuscarán por completo el remanente de Israel como una vid; vuelve a pasar tu mano, como vendimiador, sobre los sarmientos[a].'
  revised_footnotes:
  - marker: a
    text: O posiblemente «zarcillos»; el término hebreo es raro y su referente preciso es debatido. Algunos también lo han entendido como «cestas».
    reason: lexical_alternative
  revision_rationale: La revisión restaura la metáfora agrícola enfática de עוֹלֵל יְעוֹלְלוּ con «rebuscarán por completo», mejora la naturalidad de «como una vid», corrige el error gramatical «los sarmientos», mueve la nota al término realmente debatido, y alinea mejor שְׁאֵרִית con «remanente». No se requiere adjudicación adicional porque los ajustes son claros y de bajo riesgo doctrinal, manteniendo la nota de incertidumbre léxica ya documentada.
