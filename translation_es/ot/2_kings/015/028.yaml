translation:
  language: es
  text: Hizo lo malo[a] a los ojos de Yahvé[b]. No se apartó de los pecados de Jeroboam, hijo de Nabat, que hizo pecar a Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘lo malo’ conserva el valor idiomático de la fórmula hebrea עשה הרע, que en español no requiere explicitar ‘lo que era’.
    reason: lexical_alternative
  - marker: b
    text: Se mantiene el modismo hebreo ‘a los ojos de Yahvé’ para reflejar la evaluación divina literal del texto.
    reason: spanish_style_note
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  lexicon: HALOT
  rationale: El hebreo introduce la fórmula regnal con un wayyiqtol de עשה. En español, el pasado simple ‘Hizo’ comunica con naturalidad la acción evaluativa sin cargar una conjunción narrativa innecesaria.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  lexicon: HALOT
  rationale: La expresión fija עשה הרע pide en español un complemento sustantivado. ‘Lo malo’ conserva la fuerza evaluativa del hebreo sin volverse rígido o explicativo.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: a los ojos de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - a la vista de Yahvé
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de evaluación divina con una formulación natural en español. ‘Yahvé’ sigue el estándar del proyecto para יְהוָה.
- source_word: לֹא סָר
  english_pob_choice: He did not turn away
  chosen_spanish: No se apartó
  alternatives_spanish:
  - No se desvió
  - No se alejó
  lexicon: HALOT
  rationale: סור con מן en este contexto significa apartarse o retirarse de una práctica previa. ‘No se apartó’ preserva bien el sentido moral y resulta idiomático en español.
- source_word: מִן חַטֹּאות
  english_pob_choice: from the sins
  chosen_spanish: de los pecados
  alternatives_spanish:
  - de los delitos
  - de las faltas
  lexicon: HALOT
  rationale: El plural חטאות se vierte de manera directa como ‘pecados’. En español, la preposición ‘de’ expresa con naturalidad la dependencia tras ‘apartarse’.
- source_word: יָרָבְעָם בֶּן נְבָט
  english_pob_choice: Jeroboam son of Nebat
  chosen_spanish: Jeroboam, hijo de Nabat
  alternatives_spanish:
  - Jeroboam hijo de Nabat
  - Jeroboam, el hijo de Nabat
  lexicon: HALOT
  rationale: Se conserva el patronímico en forma clara y bíblica. ‘Nabat’ refleja la transliteración habitual del nombre hebreo en español.
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  english_pob_choice: who caused Israel to sin
  chosen_spanish: que hizo pecar a Israel
  alternatives_spanish:
  - que causó a Israel a pecar
  - que llevó a Israel a pecar
  lexicon: HALOT
  rationale: El hiphil de חטא es causativo. En español, ‘hizo pecar’ mantiene el valor causativo de modo natural y directo; ‘causó’ resultaría más abstracto.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el estándar del proyecto en español es ‘Yahvé’. Se evita la sustitución litúrgica por ‘SEÑOR’ para mantener la transparencia con la fuente original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura hebrea y el audit trail inglés, sin cambios pendientes indicados en la última revisión; se conservan la fórmula regnal, el modismo de evaluación y el causativo de חטא.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה.
  - Se mantiene ‘pecados’ para חטאות en la fórmula regnal.
  - Se conserva el nombre ‘Nabat’ como transliteración breve y estándar.
  - La puntuación separa con claridad la evaluación regnal y la cláusula causal final.
