  confidence: high
  validation: agree
translation:
  text: and to prepare earth and water[a], because I will go out against them in my wrath, and I will cover the whole face of the earth with the feet of my army, and I will give them over to plunder by them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Earth and water'' likely refers to tokens of submission demanded by a conquering king.'
    reason: cultural_note
lexical_decisions:
- source_word: ἑτοιμάζειν
  chosen: to prepare
  alternatives:
  - to make ready
  - to get ready
  lexicon: BDAG
  rationale: The infinitive continues the command sequence. 'Prepare' is straightforward modern English and preserves the broad sense without over-specifying the object or manner.
- source_word: γῆν καὶ ὕδωρ
  chosen: earth and water
  alternatives:
  - land and water
  lexicon: LSJ
  rationale: Literally 'earth and water.' In context this likely evokes the ancient gesture of submission by offering 'earth and water,' but the Greek itself is simply the pair of nouns. The more literal rendering is kept in the main text, with the idiomatic force preserved in a footnote.
- source_word: ἐξελεύσομαι
  chosen: I will go out
  alternatives:
  - I will march out
  - I will come forth
  lexicon: BDAG
  rationale: The verb is literally 'go out.' In military context 'march out' is possible, but 'go out' preserves the source wording while remaining intelligible.
- source_word: ἐν θυμῷ μου
  chosen: in my wrath
  alternatives:
  - in my anger
  - in my fury
  lexicon: BDAG
  rationale: θυμός here denotes intense anger. 'Wrath' best matches the elevated, royal-threat context without becoming archaic.
- source_word: καλύψω πᾶν τὸ πρόσωπον τῆς γῆς
  chosen: I will cover the whole face of the earth
  alternatives:
  - I will cover the whole surface of the land
  lexicon: LSJ
  rationale: This preserves the idiom 'face of the earth' found widely in biblical style. 'Earth' is preferred over 'land' because πᾶν and the sweeping rhetoric suggest universalizing conquest language.
- source_word: τοῖς ποσὶν τῆς δυνάμεώς μου
  chosen: with the feet of my army
  alternatives:
  - with the feet of my force
  - with my troops' feet
  lexicon: LSJ
  rationale: δύναμις in this context refers to military force. 'Army' is the clearest idiomatic English equivalent. The image is of trampling occupation, so 'feet' is retained literally.
- source_word: δώσω αὐτοὺς εἰς διαρπαγὴν αὐτοῖς
  chosen: I will give them over to plunder by them
  alternatives:
  - I will hand them over as spoil to them
  - I will give them to be plundered by them
  lexicon: LSJ
  rationale: The construction is awkward in Greek but clearly conveys handing the conquered over for plunder to the attacking forces. 'Give them over to plunder by them' preserves both the passive sense and the repeated pronoun without smoothing away the syntax.
