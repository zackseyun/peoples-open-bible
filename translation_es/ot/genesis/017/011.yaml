translation:
  language: es
  text: Circuncidarán la carne de su prepucio[a], y esto será una señal del pacto entre mí y ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “un signo del pacto”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְמַלְתֶּם
  english_pob_choice: You shall circumcise
  chosen_spanish: Circuncidaréis
  alternatives_spanish:
  - Y circuncidaréis
  - Debéis circuncidar
  lexicon: HALOT
  rationale: El verbo hebreo, en este contexto de instrucción del pacto, funciona con fuerza directiva y futura. El futuro simple español transmite bien esa obligación/instrucción sin añadir explicaciones ni debilitar el mandato.
- source_word: בְּשַׂר
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - carne
  - el tejido
  lexicon: HALOT
  rationale: Se mantiene el sentido concreto de בָּשָׂר como 'carne', que es la forma natural y tradicional del acto de circuncisión en español bíblico, sin sustituirlo por una paráfrasis anatómica más técnica.
- source_word: עָרְלַתְכֶם
  english_pob_choice: of your foreskin
  chosen_spanish: de vuestro prepucio
  alternatives_spanish:
  - de vuestra incircuncisión
  - de vuestra piel
  lexicon: HALOT
  rationale: En este contexto anatómico concreto, el término español preciso y transparente es 'prepucio'. 'Incircuncisión' sería más abstracto y perdería la referencia física explícita del hebreo.
- source_word: וְהָיָה
  english_pob_choice: and it shall be
  chosen_spanish: y será
  alternatives_spanish:
  - y llegará a ser
  - y vendrá a ser
  lexicon: HALOT
  rationale: La cópula/futuro hebrea se expresa con naturalidad en español como 'será', manteniendo el valor prospectivo de la cláusula sin sobreinterpretar el proceso.
- source_word: לְאוֹת
  english_pob_choice: a sign
  chosen_spanish: por señal
  alternatives_spanish:
  - como señal
  - por signo
  lexicon: HALOT
  rationale: '''Señal'' es el equivalente más claro de אוֹת en lenguaje de pacto. La preposición ''por'' comunica adecuadamente la función resultativa o de valor de la circuncisión como señal, sin convertirla en una mera metáfora.'
- source_word: בְּרִית
  english_pob_choice: the covenant
  chosen_spanish: el pacto
  alternatives_spanish:
  - la alianza
  - el convenio
  lexicon: HALOT
  rationale: Se conserva 'pacto' porque es la terminología bíblica común y transparente para בְּרִית en español. 'Alianza' es posible, pero puede sonar menos precisa en este marco bíblico específico.
- source_word: בֵּינִי וּבֵינֵיכֶם
  english_pob_choice: between me and you
  chosen_spanish: entre mí y vosotros
  alternatives_spanish:
  - entre yo y ustedes
  - entre mí y ustedes
  lexicon: HALOT
  rationale: La preposición relacional 'entre' reproduce la estructura hebrea con fidelidad. 'Vosotros' mantiene el plural dirigido al grupo, sin perder la correspondencia con la forma pronominal del hebreo.
theological_decisions:
- issue: Naturaleza de la circuncisión como señal del pacto
  english_pob_reading: a sign of the covenant
  chosen_spanish_reading: por señal del pacto
  alternative_spanish_readings:
  - como señal del pacto
  - una señal del pacto
  rationale: La traducción conserva el peso teológico de la circuncisión como marca pactual, sin añadir interpretaciones sacramentales ni reducirla a un mero símbolo vacío. 'Por señal' deja visible su función dentro del pacto, en línea con el texto hebreo y la cautela del POB inglés.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la última revisión. La decisión española sigue de cerca la lectura inglesa aprobada y la fuente hebrea, sin introducir revisiones textuales adicionales.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; aquí no aparece el Tetragrámaton en la cláusula traducida.
  - Se mantiene 'pacto' como término bíblico consistente para בְּרִית.
  - 'Se conserva el paralelismo de la cláusula hebrea: mandato + resultado/significado del mandato.'
