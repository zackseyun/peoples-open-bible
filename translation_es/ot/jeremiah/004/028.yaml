revisions:
- from: Por causa de esto la tierra[l] hará duelo, y los cielos de arriba se oscurecerán, porque yo he hablado, yo he dispuesto[m], y no me he arrepentido[n], ni me volveré atrás de ello.
  to: Por causa de esto la tierra[a] estará de duelo, y los cielos en lo alto se oscurecerán, porque he hablado, he determinado[b], no he cedido[c], ni volveré atrás de ello.
  rationale: Se corrige la traducción de נִחַמְתִּי para evitar la idea errónea de arrepentimiento moral en Dios y alinearla con la decisión lexical/theológica auditada del POB. También se mejora la naturalidad del español con «estará de duelo», «en lo alto» y «ni volveré atrás de ello», y se normalizan los marcadores de notas a a/b/c conforme a las instrucciones del proyecto.
