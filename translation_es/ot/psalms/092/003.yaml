  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: infinitivo de propósito/continuación, contraste temporal mañana/noches, y el paralelismo entre חֶסֶד y אֱמוּנָה. Sin embargo, la nota al pie está anclada en la frase equivocada: la alternativa ''noche tras noche'' corresponde a בַּלֵּילוֹת (''por las noches''), no a ''amor constante''.'
