revisions:
- from: ¡Tocad la trompeta en Sión con la trompeta de señal para los santos[a]!
  to: Toquen la trompeta en Sión con trompeta de señal para los santos[a],
  rationale: Se ajusta el imperativo a un español más neutral («Toquen»), se mejora la naturalidad sintáctica del instrumento («con trompeta de señal...»), se conserva la lectura objetiva de ἁγίων («para los santos») documentada en la auditoría, y se elimina una puntuación enfática no exigida por el griego. La nota alternativa mantiene «convocatoria» como opción léxica para σημασίας.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:04:57Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien el imperativo Σαλπίσατε, el locativo ἐν Σιὼν y el instrumental ἐν σάλπιγγι. También sigue la línea auditada de entender ἁγίων con fuerza objetiva. Sin embargo, «de señal para los santos» suena forzado en español y no preserva con suficiente claridad la relación interna de σημασίας ἁγίων. La exclamación añadida no está motivada por el griego.
  spanish_quality_summary: «Tocad» es correcto pero algo peninsular; para un español neutral y ampliamente eclesial, «Toquen» o «Hagan sonar» funciona mejor. «Con la trompeta de señal para los santos» resulta poco idiomático. Una formulación como «con trompeta de convocatoria para los santos» o «con la trompeta de la señal santa» implicaría interpretaciones distintas; la opción más clara y natural, manteniendo la lectura objetiva auditada, es «con trompeta de señal para los santos».
  glossary_alignment: No hay términos del glosario mayor en juego salvo «Sión», bien usado. «Santos» es aceptable para ἁγίων, aunque «los santos» puede sonar más fijado teológicamente que «los consagrados» o «los santos»; aquí se mantiene por continuidad con la auditoría, pero conviene no volverlo más estrecho de lo necesario.
  issues:
  - severity: medium
    issue: Registro dialectal de «Tocad»
    rationale: Aunque comprensible, «Tocad» no es la opción más neutral para un español latinoamericano ampliamente legible. «Toquen» mantiene el imperativo plural con mejor ajuste al objetivo de estilo.
  - severity: medium
    issue: 'Frase poco natural: «con la trompeta de señal para los santos»'
    rationale: 'La secuencia es gramatical pero dura en español. Suena más natural omitir el artículo inicial y mantener el valor instrumental: «con trompeta de señal para los santos».'
  - severity: low
    issue: Exclamaciones no presentes en el griego
    rationale: El original es imperativo, pero no requiere signos de exclamación en español bíblico; conviene no intensificar sin base textual.
  revised_spanish_text: Toquen la trompeta en Sión con trompeta de señal para los santos[a],
  revised_footnotes:
  - marker: a
    text: 'O: «con trompeta de convocatoria para los santos».'
    reason: lexical_alternative
  revision_rationale: Se ajusta el imperativo a un español más neutral («Toquen»), se mejora la naturalidad sintáctica del instrumento («con trompeta de señal...»), se conserva la lectura objetiva de ἁγίων («para los santos») documentada en la auditoría, y se elimina una puntuación enfática no exigida por el griego. La nota alternativa mantiene «convocatoria» como opción léxica para σημασίας.
