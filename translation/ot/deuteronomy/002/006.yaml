id: DEU.2.6
reference: Deuteronomy 2:6
source:
  edition: WLC
  text: אֹ֣כֶל תִּשְׁבְּר֧וּ מֵֽ/אִתָּ֛/ם בַּ/כֶּ֖סֶף וַ/אֲכַלְתֶּ֑ם וְ/גַם מַ֜יִם תִּכְר֧וּ מֵ/אִתָּ֛/ם בַּ/כֶּ֖סֶף וּ/שְׁתִיתֶֽם־׃
translation:
  text: You shall buy food from them with silver[a], so that you may eat; and you shall also buy water from them with silver, so that you may drink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and eat' / 'and drink.' The Hebrew sequence can be rendered more literally, but here it expresses the intended result of buying the provisions.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹכֶל
  chosen: food
  alternatives:
  - provisions
  - something to eat
  - grain
  lexicon: HALOT
  rationale: אֹכֶל is a general term for food/edible provision, not necessarily limited to grain in this context. 'Food' is natural modern English and broad enough to match the Hebrew.
- source_word: תִּשְׁבְּרוּ
  chosen: you shall buy
  alternatives:
  - you shall purchase
  - you shall procure
  lexicon: HALOT
  rationale: From שׁבר in the sense 'buy grain/food.' In context it refers to obtaining food by payment. 'Buy' is the clearest idiomatic English equivalent.
- source_word: מֵאִתָּם
  chosen: from them
  lexicon: HALOT
  rationale: 'The preposition plus pronoun indicates source: Israel is to obtain provisions from the people of Seir/Edom rather than seize them.'
- source_word: בַּכֶּסֶף
  chosen: with silver
  alternatives:
  - for silver
  - with money
  lexicon: HALOT
  rationale: Literally 'with the silver.' 'Silver' preserves the concrete Hebrew expression for payment. 'Money' would be more interpretive; 'with silver' remains clear in English.
- source_word: וַאֲכַלְתֶּם
  chosen: so that you may eat
  alternatives:
  - and eat
  - then you shall eat
  lexicon: HALOT
  rationale: Although formally a waw + perfect, in this instructional context it expresses intended result or consequence after purchase. 'So that you may eat' communicates the purpose/result naturally in English while preserving the sequence.
- source_word: וְגַם
  chosen: and ... also
  alternatives:
  - and also
  - also
  lexicon: HALOT
  rationale: The combination adds a second parallel instruction about water. Rendering with 'and ... also' preserves the additive force.
- source_word: מַיִם
  chosen: water
  lexicon: HALOT
  rationale: Straightforward lexical equivalent.
- source_word: תִּכְרוּ
  chosen: you shall buy
  alternatives:
  - you shall obtain
  - you shall dig for
  lexicon: HALOT
  rationale: Though כרה can elsewhere mean 'dig,' in this commercial parallel with food and the phrase 'from them with silver' it means acquiring water by purchase. 'Buy' best reflects the contextual sense.
- source_word: וּשְׁתִיתֶם
  chosen: so that you may drink
  alternatives:
  - and drink
  - then you shall drink
  lexicon: HALOT
  rationale: As with 'so that you may eat,' this conveys the purpose/result of the purchase in idiomatic English.
