base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/009/002.yaml
  text: And she said[a], “O Lord, God of my father Simeon, to whom you gave a sword in his hand for vengeance against foreigners, who loosed a virgin’s womb for defilement and bared her thigh for shame and profaned her womb for disgrace—though you said, ‘It shall not be so’[c][b]; yet they did it.”
  footnotes:
  - marker: a
    text: Or, more explicitly, “who violated the virgin’s womb.” The Greek expression is euphemistic but clearly refers to sexual violation.
    reason: lexical_alternative
  - marker: b
    text: “Bared the thigh” is a sexual-shame idiom; compare similar biblical uses of uncovering nakedness or thigh imagery for humiliation and violation.
    reason: cultural_note
  - marker: c
    text: The prayer alludes to the Simeon-Dinah episode in Genesis 34, interpreting Simeon’s violence as vengeance for the outrage committed.
    reason: cross_reference
