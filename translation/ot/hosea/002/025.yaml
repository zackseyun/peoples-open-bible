theological_decisions:
- issue: Rendering the covenant-reversal names symbolically rather than transliterating them
  chosen_reading: Translate the names as 'No Mercy' and 'Not My People' in the main text
  alternative_readings:
  - Lo-ruhamah
  - Lo-ammi
  rationale: Hosea's theology in this verse depends on the reversal of the children's symbolic names. Translating the names makes the restoration oracle immediately intelligible in English while preserving the prophetic force. The transliterated forms are worth preserving in a footnote for readers familiar with traditional renderings.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
- issue: Gendered singular response of the restored people
  chosen_reading: Retain singular masculine 'he will say'
  alternative_readings:
  - they will say
  - it will say
  rationale: The Hebrew explicitly uses a 3ms pronoun and verb. Keeping 'he' follows the gender-accurate principle and preserves the personified singular representation of the people, rather than smoothing it to a plural corporate response.
  doctrine_reference: 'Translation philosophy: gender-accurate over gender-neutral'
