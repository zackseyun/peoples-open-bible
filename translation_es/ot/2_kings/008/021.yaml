base_translation:
  language: en
  yaml_path: translation/ot/2_kings/008/021.yaml
  text: So Joram crossed over to Zair[a], with all the chariots with him. Then he arose by night and struck Edom, which had surrounded him, and the commanders of the chariots[b]; but the people fled to their tents.
  footnotes:
  - marker: a
    text: Or possibly 'to Seir'; the Hebrew place name צָעִירָה is difficult, and some take it as a variant related to Seir/Edom rather than the distinct place name Zair.
    reason: alternative_reading
  - marker: b
    text: '''Fled to their tents'' is a Hebrew idiom meaning they dispersed and returned home.'
    reason: cultural_note
