revisions:
- from: Y he aquí[a], ellos nos están pagando viniendo a expulsarnos de tu posesión, que tú nos diste como herencia.
  to: Y he aquí[a], ellos nos están pagando así al venir a expulsarnos de tu posesión, que tú nos diste como herencia.
  rationale: Se ajusta «nos están pagando viniendo» a «nos están pagando así al venir» para comunicar mejor la retribución irónica y mejorar la naturalidad del español, sin alterar el sentido fuente ni la distinción teológica entre la posesión de Dios y la herencia de Israel.
