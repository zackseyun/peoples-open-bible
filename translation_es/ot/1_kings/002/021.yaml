lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: And she said
  chosen_spanish: Y ella dijo
  alternatives_spanish:
  - Entonces dijo
  - Y dijo
  lexicon: HALOT
  rationale: El waw narrativo avanza la secuencia. «Y ella dijo» conserva el flujo simple del hebreo y hace explícito el sujeto femenino sin añadir interpretación.
- source_word: יֻתַּן
  english_pob_choice: Let ... be given
  chosen_spanish: sea dada
  alternatives_spanish:
  - sea entregada
  - que se le dé
  lexicon: HALOT
  rationale: El pasivo jussivo expresa una petición o propuesta. En español, «sea dada» mantiene esa fuerza exhortativa/peticionaria sin volverlo un futuro meramente descriptivo.
- source_word: אֲבִישַׁג
  english_pob_choice: Abishag
  chosen_spanish: Abisag
  alternatives_spanish:
  - Abiság
  lexicon: Transliteración estándar
  rationale: Se adapta el nombre propio a la grafía española habitual, conservando la identificación personal sin introducir una forma ajena al español bíblico.
- source_word: הַשֻּׁנַמִּית
  english_pob_choice: the Shunammite
  chosen_spanish: la sunamita
  alternatives_spanish:
  - la mujer de Sunem
  lexicon: HALOT
  rationale: El gentilicio se vierte con el equivalente español natural «sunamita», que preserva la designación de origen de forma concisa y reconocible.
- source_word: לַאֲדֹנִיָּהוּ
  english_pob_choice: to Adonijah
  chosen_spanish: a Adonías
  alternatives_spanish:
  - para Adonías
  lexicon: HALOT
  rationale: La preposición ל introduce el destinatario en esta construcción matrimonial; «a Adonías» reproduce de manera directa el valor del complemento indirecto.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu propio hermano
  lexicon: HALOT
  rationale: El sufijo de segunda persona masculina singular se conserva en «tu». «Hermano» mantiene la relación familiar y el tono apelativo del contexto.
- source_word: לְאִשָּׁה
  english_pob_choice: as a wife
  chosen_spanish: como esposa
  alternatives_spanish:
  - por esposa
  - para esposa
  lexicon: HALOT
  rationale: En este marco matrimonial, la construcción señala la función/estatus conyugal. «Como esposa» suena natural en español y preserva el sentido formal sin añadir matices no explícitos.
translation_notes:
  revision_awareness: La revisión más reciente indica alta concordancia y que no hubo cambios necesarios; por eso se mantiene una solución estable y sobria, sin introducir variantes textuales ni aclaraciones no requeridas por el hebreo.
  spanish_consistency_notes:
  - Se mantiene el nombre divino fuera de este versículo porque no aparece en el hebreo.
  - Se usa «sunamita» como equivalente normalizado del gentilicio hebreo, coherente con el registro bíblico en español.
  - «Adonías» sigue la adaptación española del nombre propio, consistente con el resto de la obra.
