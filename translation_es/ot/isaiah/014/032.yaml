revisions:
- from: ¿Y qué responderá a los mensajeros de la nación? Que Yahvé ha fundado a Sion, y en ella se refugiarán los afligidos de su pueblo.
  to: ¿Y qué responderá a los mensajeros[a] de la nación? Que Yahvé ha fundado Sion, y en ella se refugiarán los afligidos[b] de su pueblo.
  rationale: Se corrige la construcción española impropia 'ha fundado a Sion' a 'ha fundado Sion', que es más fiel y natural para יסד. También se restauran las notas léxicas significativas preservadas por la auditoría inglesa para mantener la transparencia traductológica del proyecto.
  reviewer_model: gpt-5.4
