translation:
  language: es
  text: Puso su ojo sobre sus corazones[a], para mostrarles la grandeza de sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su mirada»; literalmente, «su ojo». El griego usa una imagen singular y antropomórfica.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθηκεν
  english_pob_choice: He set
  chosen_spanish: Puso
  alternatives_spanish:
  - Colocó
  - Puso fijamente
  - Fijó
  lexicon: LSJ
  rationale: τίθημι en aoristo se puede verter de modo directo con un verbo simple de acción pasada. «Puso» conserva la fuerza concreta del verbo sin volverlo demasiado interpretativo.
- source_word: τὸν ὀφθαλμὸν αὐτοῦ
  english_pob_choice: his eye
  chosen_spanish: su ojo
  alternatives_spanish:
  - su mirada
  - su vista
  lexicon: LSJ
  rationale: El griego es singular y literal («su ojo»). En español, mantener «ojo» conserva la imagen antropomórfica que el texto presenta; «mirada» sería más interpretativo.
- source_word: ἐπὶ τὰς καρδίας αὐτῶν
  english_pob_choice: upon their hearts
  chosen_spanish: sobre sus corazones
  alternatives_spanish:
  - en sus corazones
  - hacia sus corazones
  - sobre sus mentes
  lexicon: LSJ
  rationale: «Corazones» preserva la metáfora bíblica del centro interior de la persona. «Sobre» reproduce de manera natural ἐπί en este contexto, y evita reducir el sentido a «mente».
- source_word: δεῖξαι
  english_pob_choice: to show
  chosen_spanish: para mostrarles
  alternatives_spanish:
  - para revelarles
  - para darles a conocer
  lexicon: LSJ
  rationale: El infinitivo expresa finalidad. «Para mostrarles» es directo y mantiene la relación visual con «ojo» del miembro anterior.
- source_word: τὸ μεγαλεῖον
  english_pob_choice: the greatness
  chosen_spanish: la grandeza
  alternatives_spanish:
  - la majestad
  - la magnificencia
  - lo grande
  lexicon: LSJ
  rationale: «Grandeza» preserva el sustantivo abstracto del griego y encaja bien con el genitivo siguiente, sin limitar el término a una sola faceta como «majestad».
- source_word: τῶν ἔργων αὐτοῦ
  english_pob_choice: of his works
  chosen_spanish: de sus obras
  alternatives_spanish:
  - de sus hechos
  - de lo que hizo
  lexicon: LSJ
  rationale: «Obras» es el equivalente natural en español para ἔργα en literatura sapiencial y conserva el alcance amplio de las acciones divinas.
theological_decisions:
- issue: Imagen antropomórfica de la percepción divina
  english_pob_reading: Retain the concrete image 'He set his eye upon their hearts'
  chosen_spanish_reading: 'Conservar la imagen concreta: «Puso su ojo sobre sus corazones»'
  alternative_spanish_readings:
  - Vigiló sus corazones
  - Dirigió su atención a sus corazones
  rationale: El griego usa una imagen corporal y no una abstracción. La versión española conserva esa tensión entre el «ojo» divino y el interior humano, en lugar de suavizarla.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto quedó confirmado como coherente con el original griego y con el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se conserva el singular antropomórfico «su ojo», alineado con la nota inglesa sobre τὸν ὀφθαλμὸν αὐτοῦ.
  - «Corazones» se usa en sentido bíblico del centro interior, sin sustituirlo por «mente».
