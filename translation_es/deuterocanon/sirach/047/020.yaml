translation:
  language: es
  text: Tú pusiste una mancha en tu honor, y profanaste tu lecho[a], trayendo ira sobre tu descendencia y gemido sobre tu cama[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: “y profanaste tu descendencia” en lugar de “y profanaste tu lecho”.'
    reason: textual_variant
  - marker: b
    text: 'El griego termina: “y angustia por tu necedad”, en vez de “y gemido sobre tu cama”.'
    reason: textual_variant
lexical_decisions:
- source_word: ותתן מום
  english_pob_choice: You put a blemish
  chosen_spanish: pusiste una mancha
  alternatives_spanish:
  - pusiste un defecto
  - diste una mancha
  lexicon: HALOT; Greek μῶμον
  rationale: El hebreo dice literalmente “diste un defecto/mancha”. En español, “pusiste una mancha” comunica bien la acción causativa y conserva la imagen concreta de deshonra, sin sonar forzado.
- source_word: בכבודך
  english_pob_choice: on your honor
  chosen_spanish: en tu honor
  alternatives_spanish:
  - sobre tu gloria
  - sobre tu honra
  lexicon: HALOT; Greek δόξα
  rationale: כבוד puede significar “gloria” u “honor”. Aquí el contexto reprocha una deshonra moral y dinástica, por lo que “honor” funciona de manera más natural en español. “Honra” sería posible, pero “honor” mantiene mejor el registro actual.
- source_word: ותחלל
  english_pob_choice: and profaned
  chosen_spanish: y profanaste
  alternatives_spanish:
  - y contaminaste
  - y mancillaste
  lexicon: HALOT
  rationale: חלל en piel transmite la idea fuerte de profanar o tratar como común lo que debía ser santo. “Profanaste” conserva esa fuerza religiosa y moral.
- source_word: יצועיך
  english_pob_choice: your bed
  chosen_spanish: tu lecho
  alternatives_spanish:
  - tu cama
  - tu cama matrimonial
  lexicon: HALOT
  rationale: El término hebreo se refiere literalmente a un lugar de acostarse, con posible trasfondo sexual. “Lecho” suena más digno y bíblico en español, y permite mantener esa connotación sin explicitar más de lo que el texto dice.
- source_word: להביא אף
  english_pob_choice: bringing wrath
  chosen_spanish: trayendo ira
  alternatives_spanish:
  - para traer ira
  - y traer ira
  lexicon: HALOT
  rationale: La construcción expresa resultado o consecuencia. “Trayendo ira” conserva ese efecto causal en español y expresa con claridad el juicio consecuente.
- source_word: על צאצאיך
  english_pob_choice: on your offspring
  chosen_spanish: sobre tu descendencia
  alternatives_spanish:
  - sobre tus hijos
  - sobre tus descendientes
  lexicon: HALOT
  rationale: צאצאים abarca descendencia o posteridad. “Descendencia” es amplio y adecuado para el sentido dinástico del pasaje.
- source_word: ואנחה
  english_pob_choice: and groaning
  chosen_spanish: y gemido
  alternatives_spanish:
  - y lamentación
  - y angustia
  lexicon: HALOT
  rationale: אנחה puede significar gemido, suspiro o lamento. “Gemido” preserva el peso emotivo del término y funciona bien en paralelo con la ira.
- source_word: על משכבך
  english_pob_choice: on your couch
  chosen_spanish: sobre tu estrado
  alternatives_spanish:
  - sobre tu lecho
  - en tu cama
  lexicon: HALOT
  rationale: משכב puede significar lugar de acostarse, cama o lecho. Como ya se usó “lecho” para יצועיך, “estrado” evita repetición y permite una lectura estilística sobria; aun así, la imagen de reposo/posamiento personal sigue siendo recognoscible.
theological_decisions:
- issue: Relación entre la culpa sexual y sus consecuencias finales
  english_pob_reading: 'The verse describes the consequences of Solomon''s sexual/marital unfaithfulness: wrath upon his descendants and personal groaning in his later life.'
  chosen_spanish_reading: 'El versículo presenta las consecuencias de la infidelidad sexual y marital de Salomón: ira sobre su descendencia y gemido personal en su posterior aflicción.'
  alternative_spanish_readings:
  - El versículo puede leerse más ampliamente como un lamento por su necedad, sin enfatizar tanto la dimensión sexual.
  - La frase final podría entenderse como un gemido sobre tu lecho, o como angustia por tu necedad, según la tradición textual griega.
  rationale: El hebreo conserva dos menciones relacionadas con el ámbito del acostarse/lecho, lo que refuerza la conexión entre la falta y sus consecuencias. La lectura hebrea es la principal, pero la variante griega se preserva en nota para no borrar la tensión textual.
  doctrine_reference: Sirach 47:20; textual criticism of Hebrew vs. Greek witness
- issue: Tratamiento de la variante textual griega en la cláusula final
  english_pob_reading: Greek ends, 'and anguish over your folly,' rather than 'and groaning on your couch.'
  chosen_spanish_reading: Se conserva el hebreo en el texto principal y se anota la cláusula griega alternativa con ‘angustia por tu necedad’.
  alternative_spanish_readings:
  - ‘y angustia por tu necedad’
  - ‘y gemido sobre tu lecho’
  rationale: La POB en inglés marcó explícitamente la variante griega. En español conviene mantener esa alternativa visible para transparencia textual, sin desplazar el testimonio hebreo principal.
  doctrine_reference: Sirach 47:20 textual variant
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo como texto principal, en coherencia con el expediente auditado, y se preservaron en notas las dos variantes griegas documentadas por la POB inglesa. No se introdujeron cambios respecto del último pase de revisión indicado en el expediente.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ fuera del versículo porque no aparece el nombre divino en este segmento.
  - Se usó ‘descendencia’ para צאצאים por amplitud semántica y coherencia con el tono dinástico.
  - Se prefirió ‘lecho’ y ‘estrado’ para evitar calcos innecesarios y conservar el paralelismo poético del hebreo.
  - Se evitó ‘SEÑOR’ y ‘Cristo’ por no corresponder a los términos de este versículo.
  - La puntuación conserva una cadencia poética natural en español, sin suavizar la fuerza de la reprensión.
