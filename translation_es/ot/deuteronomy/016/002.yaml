translation:
  language: es
  text: Y sacrificarás la Pascua a Yahvé tu Dios[a], del rebaño y del ganado, en el lugar que Yahvé escogerá para hacer habitar allí su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «La Pascua» aquí va junto con «del rebaño y del ganado». Algunos entienden que esto incluye no solo la víctima pascual misma, sino también los sacrificios de la fiesta asociados con la Pascua y los panes sin levadura.
    reason: alternative_reading
lexical_decisions:
- source_word: וְזָבַחְתָּ
  english_pob_choice: And you shall sacrifice
  chosen_spanish: Y sacrificarás
  alternatives_spanish:
  - Y ofrecerás en sacrificio
  - Y degollarás como sacrificio
  lexicon: HALOT
  rationale: זבח expresa acción sacrificial cultual, no simple matar. «Sacrificarás» conserva el valor ritual y la fuerza jussiva/instructiva del hebreo en español natural.
- source_word: פֶּסַח
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - el sacrificio de Pascua
  - la ofrenda de Pascua
  lexicon: HALOT
  rationale: Aquí פֶּסַח funciona como objeto de «sacrificar» y puede abarcar la celebración pascual o la víctima/rito. «La Pascua» mantiene la concisión del hebreo y es idiomática en español; el matiz sacrificial queda en el verbo y en la nota.
- source_word: לַיהוָה אֱלֹהֶיךָ
  english_pob_choice: to Yahweh your God
  chosen_spanish: a Yahvé tu Dios
  alternatives_spanish:
  - para Yahvé tu Dios
  - a Yahvé, tu Dios
  lexicon: HALOT
  rationale: La preposición ל expresa dedicación/dirección del sacrificio. Se conserva «Yahvé» según la norma del proyecto y «tu Dios» para reproducir el vínculo pactual del hebreo.
- source_word: צֹאן וּבָקָר
  english_pob_choice: from the flock and the herd
  chosen_spanish: de la oveja y del ganado
  alternatives_spanish:
  - del rebaño y del ganado
  - de los animales del rebaño y del ganado
  lexicon: HALOT
  rationale: Los sustantivos colectivos hebreos son literalmente «flock and herd». En español, «de la oveja y del ganado» reproduce la referencia a animales del rebaño y del ganado sin sobreinterpretar especies; la elección sigue la pista del inglés POB pero la vuelve más natural en español.
- source_word: בַּמָּקוֹם
  english_pob_choice: at the place
  chosen_spanish: en el lugar
  alternatives_spanish:
  - en el sitio
  - en aquel lugar
  lexicon: HALOT
  rationale: La frase remite al santuario central elegido por Dios. «En el lugar» es la equivalencia natural y suficientemente precisa en español.
- source_word: אֲשֶׁר יִבְחַר יְהוָה
  english_pob_choice: that Yahweh will choose
  chosen_spanish: que Yahvé escogerá
  alternatives_spanish:
  - que Yahvé elegirá
  - que Yahvé habrá de escoger
  lexicon: HALOT
  rationale: יִבְחַר apunta a una elección futura de Yahvé. «Escogerá» conserva la sencillez del hebreo y la relación con la idea de lugar elegido por Dios.
- source_word: לְשַׁכֵּן שְׁמוֹ שָׁם
  english_pob_choice: to make his name dwell there
  chosen_spanish: para hacer habitar allí su nombre
  alternatives_spanish:
  - para hacer morar allí su nombre
  - para poner allí su nombre
  lexicon: HALOT
  rationale: La forma causativa de שכן exige un verbo causativo en español. «Hacer habitar» conserva la metáfora de la presencia/nombre divino sin reducirla a una mera mención nominal; «allí» reproduce שָׁם con claridad.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Conforme a la terminología del proyecto, se preserva el nombre pactual como «Yahvé», evitando la sustitución litúrgica por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Alcance de פֶּסַח junto con צֹאן וּבָקָר
  english_pob_reading: Retain the Hebrew wording without harmonizing away the broader livestock reference.
  chosen_spanish_reading: Mantener «la Pascua» junto con «de la oveja y del ganado» sin armonizar la referencia.
  alternative_spanish_readings:
  - explicar en el texto «la Pascua, es decir, el sacrificio pascual y las ofrendas de la fiesta»
  - traducir directamente «el sacrificio de Pascua»
  rationale: El hebreo es más amplio que la víctima pascual aislada y menciona animales del rebaño y del ganado. La redacción española conserva esa amplitud en el cuerpo principal y deja la explicación interpretativa en nota, en vez de resolverla prematuramente.
  doctrine_reference: DOCTRINE.md Translation philosophy 1 and 3
translation_notes:
  revision_awareness: El pasaje presenta alto grado de acuerdo en el control cruzado; no se requieren cambios sustantivos respecto del sentido base. Se mantuvo la tensión documentada entre «la Pascua» y la mención más amplia de «la oveja y del ganado», con nota explicativa en vez de armonización.
  spanish_consistency_notes:
  - Se conserva «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se emplea «sacrificarás» para זבח por su valor cultual.
  - 'Se traduce לְשַׁכֵּן שְׁמוֹ שָׁם con una construcción causativa natural: «hacer habitar allí su nombre».'
  - Se mantiene la nota sobre la amplitud de פֶּסַח sin introducir terminología eclesiástica ajena al hebreo.
