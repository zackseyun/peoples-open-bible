    issue: Falta la explicitación del distributivo אִישׁ
    rationale: El hebreo אִישׁ נַחֲלָתוֹ significa distributivamente «cada uno su heredad / cada uno su herencia». El borrador «su heredad» deja ese valor solo implícito y debilita la precisión semántica del original y del POB inglés («have each taken possession of his inheritance»).
  revised_spanish_text: No volveremos a nuestras casas hasta que los hijos de Israel hayan tomado posesión cada uno de su heredad[a].
