  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: עֲמַל como esfuerzo penoso, הַכְּסִילִים como plural, y la cláusula final con lectura principal singular y alternativa colectiva en nota. Sin embargo, «cómo ir» introduce un matiz metodológico que el hebreo no exige; con ידע + infinitivo, aquí conviene algo más directo como «ir». Además, dado que el hebreo אֶל עִיר es indefinido y el rastro léxico inglés originalmente lo documenta así, «a una ciudad» preserva mejor la fuerza proverbial genérica que «a la ciudad».'
  spanish_quality_summary: El texto es claro y natural, pero puede sonar más idiomático y más cercano al hebreo con «no sabe ir a una ciudad» en vez de «no sabe cómo ir a la ciudad». «Los agota» y «necios» funcionan bien en español eclesial legible. La nota al pie necesita ajustarse para corresponder exactamente al texto revisado y evitar comillas y formato innecesariamente pesados.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Necios» para כְּסִילִים es apropiado. «Trabajo» para עֲמַל es aceptable en contexto sapiencial. No intervienen términos teológicos mayores del glosario. La principal corrección es semántico-sintáctica, no terminológica.
  issues:
