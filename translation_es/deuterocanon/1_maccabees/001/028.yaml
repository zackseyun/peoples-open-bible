review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: conserva el temblor de la tierra, la referencia a sus habitantes y la metáfora de la casa de Jacob vistiéndose de vergüenza. Sin embargo, la nota al pie no preserva correctamente la alternativa léxica documentada en inglés, porque el texto principal ya dice «la tierra» y la alternativa debía ser «el país» o «la tierra/territorio», no «la tierra» otra vez.'
  spanish_quality_summary: El español es natural, digno y claramente legible. «Tembló», «habitaban en ella» y «se vistió de vergüenza» funcionan bien. El único problema real es la nota, que resulta internamente incoherente y poco útil para el lector.
  glossary_alignment: No hay términos del glosario principal del proyecto en disputa aquí. «Casa de Jacob» y «vergüenza» están bien alineados con la racionalidad léxica y teológica documentada. La metáfora de ἐνεδύσατο αἰσχύνην se conserva adecuadamente.
  issues:
  - severity: medium
    issue: La nota al pie repite «la tierra» como alternativa al texto principal «la tierra».
    rationale: 'El inglés auditado dice: Or ''the land shook.'' La alternativa relevante para γῆ no es repetir «la tierra», sino ofrecer una opción más estrecha como «el país» o «la tierra/territorio». Tal como está, la nota no informa una alternativa real y no corresponde fielmente al expediente auditado.'
  revised_spanish_text: Y la tierra tembló[a] por los que habitaban en ella, y toda la casa de Jacob se vistió de vergüenza.
  revised_footnotes:
  - marker: a
    text: O «el país tembló». El griego γῆ puede significar «tierra» o «país/territorio».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque representa fielmente el griego y su fuerza poética. Solo se corrige la nota al pie para que exprese una alternativa léxica real y alineada con la POB inglesa auditada.
