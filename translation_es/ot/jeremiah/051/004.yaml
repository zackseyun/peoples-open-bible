  rationale: Se reemplaza 'los muertos' por 'los abatidos' para reflejar mejor el sentido violento y bélico de חֲלָלִים, en mejor paralelo con 'los traspasados', sin volver el español torpe ni excesivamente interpretativo.
  reviewer_model: gpt-5.4
