review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del hebreo: la copia de la ley debe estar con el rey, él debe leer en ella toda su vida, para aprender a temer a Yahvé, guardar las palabras de esta ley y estos estatutos, y hacerlos. Mantiene correctamente «Yahvé», «temer», «guardar», «ley» y «estatutos». Sin embargo, «para cumplirlos» en la cláusula final suaviza y desplaza el hebreo לַעֲשֹׂתָם, que es más literalmente «para hacerlos».'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos ajustes de naturalidad/fidelidad. Primero, la nota [a] está mal anclada: la alternativa «leer de él» corresponde a «leerá en él», no a «estará con él». Segundo, «para hacerlos» o «para ponerlos por obra» refleja mejor el original que «para cumplirlos». El resto fluye bien y es ampliamente legible en español eclesial neutro.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé», ירא → «temer», שׁמר → «guardar», תּוֹרָה → «ley», חֻקִּים → «estatutos». La única desviación relevante es לַעֲשֹׂתָם, donde el inglés auditado prefirió «to do them» y el español debería acercarse más a «hacerlos».'
  issues:
  - severity: medium
    issue: La nota [a] está colocada en «con él» en vez de en «leerá en él».
    rationale: La nota explica la alternativa de וְקָרָא בוֹ («leer en/de él»), no la frase וְהָיְתָה עִמּוֹ («estará con él»). Tal como está, el anclaje induce a error.
  - severity: medium
    issue: «Para cumplirlos» es más interpretativo que el hebreo.
    rationale: לַעֲשֹׂתָם significa literalmente «para hacerlos». «Cumplirlos» es idiomático, pero se aleja de la decisión léxica auditada y reduce la concreción del original.
  revised_spanish_text: Y estará con él, y leerá en él[a] todos los días de su vida, para que aprenda a temer a Yahvé su Dios, a guardar todas las palabras de esta ley y estos estatutos[b][c], para hacerlos.
  revised_footnotes:
  - marker: a
    text: O «leer de él». El hebreo dice literalmente «leer en él».
    reason: lexical_alternative
  - marker: b
    text: O «reverenciar a Yahvé su Dios».
    reason: lexical_alternative
  - marker: c
    text: «Yahvé» traduce el nombre divino YHWH.
    reason: alternative_reading
  revision_rationale: Se reubica la nota [a] en la frase correcta, «leerá en él», porque esa es la expresión a la que corresponde la alternativa léxica. Además, se cambia «para cumplirlos» por «para hacerlos» para reflejar con mayor fidelidad el hebreo לַעֲשֹׂתָם y la decisión auditada «to do them», sin perder claridad en español.
