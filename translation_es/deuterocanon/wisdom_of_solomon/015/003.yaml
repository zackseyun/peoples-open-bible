lexical_decisions:
- source_word: ἐπίστασθαί
  english_pob_choice: to know
  chosen_spanish: conocerte
  alternatives_spanish:
  - saber de ti
  - conocerte bien
  - conocerte plenamente
  lexicon: BDAG
  rationale: El infinitivo griego expresa conocimiento personal y cognoscitivo. En español, el complemento directo pronominal «conocerte» comunica de forma natural esa relación sin añadir explicación innecesaria.
- source_word: ὁλόκληρος
  english_pob_choice: complete
  chosen_spanish: completa
  alternatives_spanish:
  - entera
  - perfecta
  - íntegra
  lexicon: LSJ
  rationale: 'Con δικαιοσύνη funciona de manera predicativa: una justicia que es íntegra o completa. «Completa» mantiene la idea de plenitud con español actual y claro.'
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia plena
  lexicon: BDAG
  rationale: Aunque el inglés POB eligió «righteousness» como lectura principal, en español «justicia» puede abarcar mejor la densidad ética y teológica del término sin perder la tensión léxica documentada; por eso se mantiene la alternativa explícita en nota.
- source_word: εἰδέναι
  english_pob_choice: to know
  chosen_spanish: el conocer
  alternatives_spanish:
  - el saber
  - el reconocer
  lexicon: BDAG
  rationale: 'Se conserva el paralelismo verbal del griego con un infinitivo sustantivado: «el conocer». Esto permite reflejar la repetición enfática del texto.'
- source_word: κράτος
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - mando
  - dominio
  lexicon: BDAG
  rationale: «Poder» es la equivalencia más natural en español para la fuerza eficaz de Dios aquí, sin añadir connotaciones políticas que «dominio» podría sugerir.
- source_word: ῥίζα
  english_pob_choice: root
  chosen_spanish: raíz
  alternatives_spanish:
  - origen
  - base
  - fundamento
  lexicon: LSJ
  rationale: La metáfora vegetal está explícita en el griego y se conserva literalmente como «raíz».
- source_word: ἀθανασίας
  english_pob_choice: immortality
  chosen_spanish: inmortalidad
  alternatives_spanish:
  - no mortalidad
  - incorrupción
  lexicon: BDAG
  rationale: «Inmortalidad» es el equivalente idiomático y transparente en español, adecuado al registro sapiencial del pasaje.
theological_decisions:
- issue: Valor de δικαιοσύνη en el contexto sapiencial
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia completa
  rationale: El versículo presenta el conocimiento de Dios como realidad recta y plena; en español, «justicia» conserva la amplitud semántica y la tensión entre sentido moral, relacional y forense. La nota registra la alternativa «justicia» frente a la lectura inglesa principal «righteousness» sin cerrar indebidamente el campo semántico.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (δικαιοσύνη → righteousness; justice preserved where relevant)'
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no requirió cambios; esta versión conserva la estructura paralela del griego, mantiene la metáfora de «raíz» y documenta la alternativa léxica principal para δικαιοσύνη en la nota.
  spanish_consistency_notes:
  - 'Se preserva el paralelismo de los dos infinitivos griegos con dos construcciones nominales en español: «el conocerte» / «el conocer».'
  - Se evita sustituir «Yahvé» o «Mesías» porque el versículo no los contiene.
  - La nota a documenta la tensión lexicográfica principal entre «justicia» y «rectitud» sin imponer una solución tradicionalizada.
