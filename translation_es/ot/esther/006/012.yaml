translation:
  language: es
  text: Entonces Mardoqueo volvió a la puerta del rey, pero Amán se fue apresuradamente[a] a su casa, de duelo y con la cabeza cubierta[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue llevado a su casa», conservando el matiz pasivo del verbo hebreo.
    reason: lexical_alternative
  - marker: b
    text: Cubrirse la cabeza era un signo cultural de duelo, humillación o luto.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió a
  lexicon: HALOT / שׁוּב
  rationale: El verbo expresa el retorno a un lugar previo. «Volvió» es natural en español y conserva el sentido de regreso narrativo sin añadir matices no presentes.
- source_word: שַׁעַר הַמֶּלֶךְ
  english_pob_choice: the king’s gate
  chosen_spanish: la puerta del rey
  alternatives_spanish:
  - la puerta real
  - la puerta del palacio del rey
  lexicon: HALOT / constructo nominal
  rationale: El hebreo designa la puerta asociada al rey o al complejo real. «La puerta del rey» mantiene la relación posesiva del original con claridad y sin sobreinterpretar.
- source_word: נִדְחַף
  english_pob_choice: hurried
  chosen_spanish: se fue apresuradamente
  alternatives_spanish:
  - fue impelido
  - fue llevado
  - salió corriendo
  lexicon: HALOT / nifal de דחף
  rationale: La forma hebrea puede sugerir un ser empujado o impulsado, pero en el contexto el efecto narrativo es que Amán sale de inmediato en humillación. «Se fue apresuradamente» comunica la rapidez sin introducir un agente externo no explicitado.
- source_word: בֵּיתוֹ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su casa
  lexicon: HALOT
  rationale: «Casa» reproduce el sustantivo concreto del hebreo y encaja con el registro narrativo. «Hogar» sería más interpretativo.
- source_word: אָבֵל
  english_pob_choice: mourning
  chosen_spanish: de duelo
  alternatives_spanish:
  - en duelo
  - llorando
  - en luto
  lexicon: HALOT
  rationale: El adjetivo hebreo describe su estado de aflicción. «De duelo» conserva ese estado y resulta idiomático en español contemporáneo.
- source_word: וַחֲפוּי רֹאשׁ
  english_pob_choice: with his head covered
  chosen_spanish: con la cabeza cubierta
  alternatives_spanish:
  - con la cabeza tapada
  - con la cabeza velada
  lexicon: HALOT / idiomático
  rationale: La expresión conserva la imagen concreta del hebreo. En español, «cabeza cubierta» es claro y mantiene el valor cultural del gesto sin reemplazarlo por una explicación interpretativa.
theological_decisions:
- issue: El matiz pasivo/impelido de נִדְחַף
  english_pob_reading: Or 'was driven to his house,' preserving the passive force of the Hebrew verb.
  chosen_spanish_reading: «se fue apresuradamente» en el texto principal, con la posibilidad implícita de una lectura más fuerte de ser impelido.
  alternative_spanish_readings:
  - fue impelido a su casa
  - fue llevado a su casa
  - fue empujado a su casa
  rationale: La forma hebrea permite un matiz pasivo, pero el contexto enfatiza la salida precipitada y vergonzosa de Amán. El español principal evita atribuir un agente externo no mencionado, sin perder la fuerza narrativa; las alternativas preservan el matiz pasivo cuando se quiera explicitar.
  doctrine_reference: Ninguna doctrina en disputa; decisión de aspecto y voz verbal.
- issue: Gesto cultural de cubrirse la cabeza
  english_pob_reading: Covering the head was a cultural sign of grief, humiliation, or mourning.
  chosen_spanish_reading: Conservar «con la cabeza cubierta» para respetar el signo cultural de duelo y humillación.
  alternative_spanish_readings:
  - en señal de duelo
  - en señal de humillación
  - cubriéndose la cabeza
  rationale: El hebreo usa una imagen cultural concreta. La traducción principal la conserva para no diluir la escena; la nota puede aclarar su valor cultural sin sustituir el texto.
  doctrine_reference: Ninguna doctrina en disputa; decisión cultural y semántica.
translation_notes:
  revision_awareness: 'Se mantiene alta concordancia con el inglés POB auditado: se conserva el retorno de Mardoqueo, la salida humillada de Amán, el posible matiz pasivo de נִדְחַף y la imagen concreta de la cabeza cubierta. No se requirieron cambios respecto de la revisión más reciente.'
  spanish_consistency_notes:
  - Se usa «Mardoqueo» y «Amán» como formas españolas habituales y reconocibles.
  - «La puerta del rey» conserva la relación posesiva del hebreo sin introducir términos palaciegos adicionales.
  - «De duelo» y «con la cabeza cubierta» mantienen el paralelismo descriptivo del hebreo.
  - Las notas a y b están ancladas en el texto principal y corresponden a alternativas reales documentadas en el audit trail.
