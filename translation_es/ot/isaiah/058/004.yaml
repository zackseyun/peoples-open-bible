translation:
  language: es
  text: 'Miren: ayunan para pleito y contienda, y para golpear con un puño malvado[a]. Hoy no ayunan para hacer oír su voz en lo alto[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «con un puño de maldad».'
    reason: lexical_alternative
  - marker: b
    text: «En lo alto» puede aludir al ámbito celestial, es decir, a hacer que su voz sea oída delante de Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Escuchen
  lexicon: HALOT
  rationale: La partícula introduce una exhortación enfática y de confrontación. «Miren» suena natural en español moderno y conserva el llamado a prestar atención mejor que una forma más arcaica.
- source_word: לְרִיב
  english_pob_choice: for strife
  chosen_spanish: para pleito
  alternatives_spanish:
  - para contienda
  - para disputa
  lexicon: HALOT
  rationale: רִיב puede expresar pleito, disputa o contienda. «Pleito» transmite bien el tono de conflicto denunciado por el profeta y funciona con el siguiente sustantivo.
- source_word: וּמַצָּה
  english_pob_choice: and contention
  chosen_spanish: y contienda
  alternatives_spanish:
  - y pelea
  - y querella
  lexicon: HALOT
  rationale: מַצָּה apunta a conflicto o disputa. «Contienda» mantiene el paralelo semántico con רִיב sin sonar redundante en español.
- source_word: תָּצוּמוּ
  english_pob_choice: you fast
  chosen_spanish: ayunan
  alternatives_spanish:
  - están ayunando
  - ayunan ustedes
  lexicon: HALOT
  rationale: El verbo en contexto expresa acción habitual o reiterada. En español, el presente simple comunica bien esa práctica reprochada.
- source_word: וּלְהַכּוֹת
  english_pob_choice: and to strike
  chosen_spanish: y para golpear
  alternatives_spanish:
  - y para dar golpes
  - y para herir
  lexicon: HALOT
  rationale: El infinitivo con לְ expresa propósito. «Golpear» conserva la fuerza verbal directa sin introducir una connotación más técnica que la del hebreo.
- source_word: בְּאֶגְרֹף רֶשַׁע
  english_pob_choice: with a wicked fist
  chosen_spanish: con un puño de maldad
  alternatives_spanish:
  - con un puño malvado
  - con un puño inicuo
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y puede leerse literalmente como «puño de maldad». Esa forma conserva la relación constructa del original y mantiene la tensión léxica que la nota inglesa también preserva.
- source_word: לֹא תָצוּמוּ כַיּוֹם
  english_pob_choice: You are not fasting today
  chosen_spanish: Hoy no ayunan
  alternatives_spanish:
  - No ayunan hoy
  - No están ayunando hoy
  lexicon: HALOT
  rationale: El hebreo contrasta su ayuno actual con lo que Dios aprueba. La reordenación en español hace natural el énfasis temporal de כַיּוֹם sin perder la negación del reproche.
- source_word: לְהַשְׁמִיעַ
  english_pob_choice: to make ... heard
  chosen_spanish: hacer que ... sea oída
  alternatives_spanish:
  - hacer oír
  - causar que ... sea escuchada
  lexicon: HALOT
  rationale: El hifil de שמע tiene valor causativo. «Hacer que sea oída» refleja esa causatividad y permite vincularla con «voz» de manera idiomática en español.
- source_word: בַּמָּרוֹם
  english_pob_choice: on high
  chosen_spanish: en lo alto
  alternatives_spanish:
  - en las alturas
  - en el cielo
  lexicon: HALOT
  rationale: מָרוֹם significa altura o lugar alto. «En lo alto» conserva la expresión espacial abierta del hebreo y evita explicitar «cielo» o «Dios» más de lo que el texto dice.
- source_word: קוֹלְכֶם
  english_pob_choice: your voice
  chosen_spanish: su voz
  alternatives_spanish:
  - su clamor
  - su voz
  lexicon: HALOT
  rationale: קוֹל suele significar voz, sonido o clamor. Aquí se refiere al grito u oración que pretenden hacer oír; «voz» mantiene la correspondencia más directa con el término hebreo.
theological_decisions:
- issue: Sentido de "en lo alto"
  english_pob_reading: Retain the spatial expression 'on high' without explicitly specifying God or heaven.
  chosen_spanish_reading: Mantener «en lo alto» sin decir explícitamente «en el cielo» o «ante Dios».
  alternative_spanish_readings:
  - en el cielo
  - ante Dios
  rationale: El hebreo dice literalmente «en la altura» y sugiere audición divina, pero no la nombra. Conservar la expresión espacial preserva la reserva del texto y su posible doble referencia al ámbito celestial y a la audiencia de Dios.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: He seguido la revisión más reciente del inglés POB en la cláusula final, reflejando el contraste hebreo entre su ayuno y el propósito verdadero del ayuno. También preservé la construcción idiomática de בְּאֶגְרֹף רֶשַׁע mediante una nota que mantiene la alternativa más literal.
  spanish_consistency_notes:
  - Usé «Yahvé» cuando el contexto exige el nombre divino; aquí no aparece ningún tetragrama ni equivalente directo, por lo que no era necesario introducirlo.
  - Mantuve «contienda/pleito» como par de conflicto profético sin suavizarlo a «desacuerdo», para no rebajar la denuncia.
  - Elegí «ayunan» en presente simple para un hábito reprochado, coherente con el valor contextual del hebreo.
  - Conservé «voz» en lugar de «clamor» como traducción principal de קוֹל, porque la frase subraya el acto de hacer audible la voz.
