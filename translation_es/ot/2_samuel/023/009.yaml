  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Los nombres y términos clave están bien manejados. 'Filisteos', 'David' y la literalidad de 'habían subido' concuerdan con el expediente inglés. La transliteración 'Ajohí' es aceptable dado el razonamiento documentado, y la alternativa 'ajojita' queda en nota.
