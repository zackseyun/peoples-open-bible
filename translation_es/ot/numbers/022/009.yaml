  text: 'Entonces Dios vino a Balaam y dijo: «¿Quiénes son estos hombres contigo?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - vino
  - llegó
  - se acercó
  lexicon: HALOT
  rationale: El waw narrativo y el verbo בוא en secuencia histórica se expresan naturalmente en español con «vino». «Llegó» sería posible, pero «vino a Balaam» conserva mejor la dirección del movimiento hacia él.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - un dios
  - la divinidad
  lexicon: HALOT
  rationale: El contexto narrativo y el verbo singular indican al Dios verdadero hablando personalmente. «Dios» reproduce ese referente de manera directa y sin introducir una paráfrasis.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: En español, «vino a Balaam» expresa con naturalidad la dirección marcada por אֶל. Mantiene el valor direccional sin sobrerrefinarlo.
- source_word: בִּלְעָם
  english_pob_choice: Balaam
  chosen_spanish: Balaam
  alternatives_spanish:
  - Balaam
  lexicon: nombre propio
  rationale: Se conserva la transliteración estándar del nombre propio.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - declaró
  lexicon: HALOT
  rationale: En la introducción de discurso directo, «dijo» es la equivalencia natural y más fiel en español.
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: Quiénes
  alternatives_spanish:
  - Quién
  - Qué personas
  lexicon: HALOT
  rationale: El interrogativo busca identificar a varias personas; por eso en español se usa el plural «Quiénes».
- source_word: הָאֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - gente
  lexicon: HALOT
  rationale: El sustantivo hebreo es masculino plural y en el relato se refiere a varones presentes. «Hombres» conserva ese rasgo lexical y evita neutralizar innecesariamente el referente.
- source_word: הָאֵלֶּה
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - aquellos
  lexicon: HALOT
  rationale: El demostrativo señala a personas presentes en la escena; «estos» refleja mejor esa deixis inmediata.
- source_word: עִמָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - a tu lado
  lexicon: HALOT
  rationale: El sufijo pronominal de segunda persona se expresa con naturalidad en español como «contigo», preservando la cercanía discursiva del hebreo.
theological_decisions:
- issue: Referente de אֱלֹהִים en contexto narrativo
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - un dios
  - la divinidad
  rationale: Aunque אֱלֹהִים puede tener otros valores, aquí el verbo singular y el desarrollo del relato apuntan al Dios de Israel hablando a Balaam. «Dios» refleja ese referente sin añadir comentario doctrinal.
  doctrine_reference: Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: El texto sigue la lectura inglesa auditada sin cambios de revisión, con una adaptación española natural y sin necesidad de notas textuales.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en este contexto singular personal.
  - Se conserva la deixis directa con «estos» y «contigo».
  - El nombre propio se translitera como «Balaam» para coherencia con el resto del proyecto.
