review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro del POB inglés: llegada de los mensajeros, habla dirigida a Abigail, y propósito matrimonial expresado con «tomarte ... como esposa». Sin embargo, hay dos puntos mejorables para mayor fidelidad y naturalidad: «en Carmel» debe ajustarse a la forma española habitual «en Carmelo», y la nota alternativa «para casarte» no expresa bien el sujeto implícito; la alternativa correcta es «para casarse contigo» o similar.'
  spanish_quality_summary: El texto es claro y digno, pero «Carmel» suena anglicado o transliterado de forma no idiomática en español bíblico general; «Carmelo» es más legible. El resto fluye bien. «Siervos» es aceptable en este contexto. La construcción «para tomarte para sí como esposa» es fiel, aunque algo rígida; sigue siendo comprensible y adecuada para el proyecto.
  glossary_alignment: No hay términos teológicos sensibles de nivel proyecto en este versículo. «Siervos» para עַבְדֵי es una excepción contextual razonable frente al valor por defecto «esclavo», ya que aquí son emisarios de David y no se enfatiza condición servil. No hay conflictos con Yahvé/Mesías/Espíritu u otros términos base.
  issues:
  - severity: medium
    issue: Topónimo «Carmel»
    rationale: El hebreo הַכַּרְמֶלָה se refiere al lugar Carmelo. En español bíblico común, «Carmelo» es la forma natural y reconocible; «Carmel» suena importado del inglés y reduce la legibilidad.
  - severity: medium
    issue: Nota al pie «para casarte»
    rationale: Como alternativa a «tomarte ... como esposa», «para casarte» es ambiguo o puede sugerir que Abigail se casa activamente sin expresar el referente de David. La equivalencia más precisa es «para casarse contigo» o «para tomarte por esposa».
  revised_spanish_text: 'Así que los siervos de David llegaron a Abigail en Carmelo y le hablaron[a], diciendo: «David nos ha enviado a ti para tomarte para sí como esposa».'
  revised_footnotes:
