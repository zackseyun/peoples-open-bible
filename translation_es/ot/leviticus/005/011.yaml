base_translation:
  language: en
  yaml_path: translation/ot/leviticus/005/011.yaml
  text: But if his means are not sufficient for two turtledoves or two young pigeons[a], then he shall bring as his offering for the sin that he has committed a tenth of an ephah of fine flour for a sin offering. He shall put no oil on it and place no frankincense on it, because it is a sin offering.
  footnotes:
