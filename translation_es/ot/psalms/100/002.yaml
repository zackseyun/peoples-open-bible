translation:
  language: es
  text: Sirvan a Yahvé con alegría[a]; vengan delante de él con gritos jubilosos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con canto jubiloso»; el término hebreo puede designar una alabanza vocal gozosa, ya sea gritada o cantada.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִבְדוּ
  english_pob_choice: Serve
  chosen_spanish: Sirvan
  alternatives_spanish:
  - Sirvan
  - Adoren
  - Trabajen para
  lexicon: HALOT
  rationale: El imperativo plural de עבד, aplicado a Yahvé, conserva el sentido amplio de servicio devoto u obediente. «Sirvan» mantiene el vínculo léxico sin reducirlo solo a adoración litúrgica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como el nombre propio «Yahvé», preservando en español el nombre divino revelado a Israel en lugar de sustituirlo por un título.
- source_word: בְּשִׂמְחָה
  english_pob_choice: with gladness
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - con regocijo
  lexicon: HALOT
  rationale: 'La preposición marca modo: el servicio debe realizarse en una disposición de alegría. «Con alegría» es natural en español y conserva ese matiz afectivo.'
- source_word: בֹּאוּ
  english_pob_choice: come
  chosen_spanish: vengan
  alternatives_spanish:
  - vengan
  - acérquense
  - entren
  lexicon: HALOT
  rationale: El imperativo plural de בוא se expresa de forma directa con «vengan». «Entren» sería más específico de acceso a un recinto de lo que exige el verso por sí solo.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en su presencia
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «a/before su rostro/presencia». «Delante de él» conserva la relación espacial y resulta idiomática en español.
- source_word: בִּרְנָנָה
  english_pob_choice: with joyful shouting
  chosen_spanish: con gritos jubilosos
  alternatives_spanish:
  - con canto jubiloso
  - con aclamaciones de júbilo
  - con gritos de alegría
  lexicon: HALOT
  rationale: רננה puede denotar grito resonante, júbilo vocal o canto exultante. «Gritos jubilosos» preserva mejor el componente vocal y exuberante que «canto», sin forzar una interpretación más estrecha.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el nombre propio del pacto en español como «Yahvé», coherente con la decisión POB de no ocultar el Tetragrámaton bajo un sustituto titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: no hubo revisiones aplicadas y el control cruzado reporta alta concordancia. Se conservaron las decisiones principales sobre el nombre divino y sobre רננה como expresión vocal jubilosa.'
  spanish_consistency_notes:
  - Se mantuvo un registro uniforme de imperativos plurales en español («Sirvan», «vengan»).
  - Se preservó la traducción del Tetragrámaton como «Yahvé» en vez de una sustitución reverencial.
  - La nota de pie de página se ancla en «gritos jubilosos» para reflejar la alternativa semántica del término hebreo.
  - El registro general busca ser bíblico y natural en español, sin archaísmos innecesarios.
