    text: O «un ungüento compuesto» o «un perfume mezclado»; el hebreo enfatiza una preparación aromática expertamente compuesta.
    reason: lexical_alternative
  revision_rationale: Se corrige «de ello» a «lo» para reflejar el objeto directo hebreo אֹתוֹ. Se sustituye «mezcla aromática» por «un perfume compuesto» para representar mejor רֹקַח / מִרְקַחַת y alinearse con la racionalidad léxica auditada, manteniendo español natural y digno. Se ajusta la repetición final a «un aceite de santa unción» para preservar el paralelismo del verso. La nota al pie se reubica en el término aromático compuesto, que es donde el POB inglés documentó las alternativas significativas.
