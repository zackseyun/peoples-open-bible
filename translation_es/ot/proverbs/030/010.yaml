translation:
  language: es
  text: No calumnies a un esclavo[a] ante su amo, no sea que te maldiga y quedes culpable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervo» para עֶבֶד; aquí se usa «esclavo» para reflejar la condición de dependencia vinculada al término en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּלְשֵׁ֣ן
  english_pob_choice: slander
  chosen_spanish: calumnies
  alternatives_spanish:
  - hables mal de
  - denuncies falsamente a
  - difames
  lexicon: HALOT
  rationale: El verbo hebreo implica hablar mal de alguien de manera dañina y maliciosa. "Calumniar" conserva bien esa fuerza negativa en español y encaja con el tono sapiencial prohibitivo del verso.
- source_word: עֶ֭בֶד
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  lexicon: HALOT
  rationale: El contexto subraya la condición social subordinada y vulnerable del individuo. "Esclavo" mantiene la fuerza lexical que la POB inglesa documenta para עֶבֶד; "siervo" suavizaría indebidamente el término.
- source_word: אֶל אדנ/ו
  english_pob_choice: to his master
  chosen_spanish: ante su señor
  alternatives_spanish:
  - a su amo
  - a su dueño
  lexicon: HALOT
  rationale: La preposición aquí expresa la relación del acto de denunciar o hablar mal hacia la autoridad del esclavo. "Ante su señor" refleja naturalmente el movimiento relacional del hebreo; "amo" o "dueño" son posibles, pero "señor" preserva el registro social sin introducir un matiz demasiado doméstico.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - no vaya a
  lexicon: HALOT
  rationale: פֶּן introduce una advertencia de consecuencia. En español, "para que no" comunica con claridad el resultado temido y mantiene el sentido proverbial de precaución.
- source_word: יְקַלֶּלְךָ
  english_pob_choice: he curse you
  chosen_spanish: te maldiga
  alternatives_spanish:
  - te maldiga con una maldición
  - te curse
  lexicon: HALOT
  rationale: En este contexto, קלל en piel expresa maldecir, no solo insultar. "Maldiga" es la equivalencia natural en español y conserva la gravedad del acto.
- source_word: וְאָשָׁמְתָּ
  english_pob_choice: and you become guilty
  chosen_spanish: quedes culpable
  alternatives_spanish:
  - y seas hallado culpable
  - y incurras en culpa
  lexicon: HALOT
  rationale: La raíz אשם señala incurrir en culpa o quedar responsable ante una falta. "Quedes culpable" es idiomático y comunica el resultado moral-jurídico sin añadir explicación ajena al texto.
theological_decisions:
- issue: Trato del estatus social del עֶבֶד
  english_pob_reading: slave is used here to reflect the bonded social status implied by the term in this context.
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  rationale: No se suaviza el término porque el proverbio depende de la vulnerabilidad concreta del עֶבֶד. Mantener "esclavo" preserva la tensión social y evita una lectura domesticada del texto.
  doctrine_reference: Lexical-social context of wisdom literature
- issue: Valor del resultado de la maldición y la culpa
  english_pob_reading: lest he curse you and you become guilty.
  chosen_spanish_reading: para que no te maldiga y quedes culpable
  alternative_spanish_readings:
  - no sea que te maldiga y seas culpable
  - para que no te maldiga y incurras en culpa
  rationale: La versión española mantiene la secuencia de advertencia y consecuencia moral sin diluir la causalidad implícita del hebreo. "Quedes culpable" refleja el estado resultante más que una mera emoción de culpa.
  doctrine_reference: Wisdom moral accountability
- issue: Renderización de אֶל אדנו
  english_pob_reading: to his master
  chosen_spanish_reading: ante su señor
  alternative_spanish_readings:
  - a su amo
  - a su dueño
  rationale: Se evita convertir automáticamente el término en un vocativo religioso o en un tecnicismo esclavista moderno. "Señor" aquí es una relación social del contexto, no una referencia divina.
  doctrine_reference: Context-sensitive honorific/social title
translation_notes:
  revision_awareness: 'Se revisó el equilibrio entre fidelidad lexical y fluidez: la POB inglesa usa ''slave'' por la fuerza social del término; en español se conservó esa opción. La advertencia פֶּן y la conclusión וְאָשָׁמְתָּ se mantuvieron en una estructura breve y proverbial, sin expandir el sentido.'
  spanish_consistency_notes:
  - Se mantuvo 'esclavo' para עֶבֶד conforme al criterio POB documentado.
  - '''Señor'' se usa en sentido social-contextual, no como sustituto del nombre divino.'
  - La cláusula final conserva el resultado moral-jurídico de אשם con un español natural y no técnico.
