base_translation:
  language: en
  yaml_path: translation/ot/numbers/002/002.yaml
  text: The sons of Israel shall camp[a], each man by his banner, according to the signs of their fathers’ houses; they shall camp facing the tent of meeting[c][b], all around it.
  footnotes:
  - marker: a
    text: Or “standard” for “banner.” The Hebrew דֶּגֶל refers to a tribal or military identifying banner.
    reason: lexical_alternative
  - marker: b
    text: Or “The Israelites” for “The sons of Israel.” The more literal wording preserves the familial idiom of the Hebrew.
    reason: lexical_alternative
  - marker: c
    text: Traditional English often has “tabernacle” for “tent of meeting.”
    reason: lexical_alternative
