translation:
  language: es
  text: Hadad huyó a Egipto[a], junto con algunos hombres edomitas de entre los siervos de su padre; y Hadad era un muchacho joven[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «a venir a Egipto». El hebreo suele usar «venir» donde en español idiomático diríamos «ir» o simplemente mencionaríamos el destino.
    reason: lexical_alternative
  - marker: b
    text: O «un niño pequeño» o «un muchacho pequeño». La expresión hebrea recalca que Hadad aún era muy joven.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְרַח
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - fue huyendo
  - escapó
  lexicon: HALOT
  rationale: ברח en qal expresa huir o escapar. En español, «huyó» es natural, conciso y mantiene el valor narrativo de evasión sin sobreinterpretar.
- source_word: אֲדַד
  english_pob_choice: Hadad
  chosen_spanish: Hadad
  alternatives_spanish:
  - Hadad
  lexicon: convención onomástica
  rationale: Nombre propio transliterado de forma estándar; se conserva sin adaptación.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  - Hadad
  lexicon: uso pronominal enfático
  rationale: El pronombre independiente aporta énfasis o aposición. En español se refleja de modo natural con «él» después del nombre propio.
- source_word: וַאֲנָשִׁים אֲדֹמִיִּים
  english_pob_choice: and some Edomite men
  chosen_spanish: algunos hombres edomitas
  alternatives_spanish:
  - hombres edomitas
  - hombres de Edom
  lexicon: HALOT
  rationale: אֲנָשִׁים son «hombres» y אֲדֹמִיִּים especifica su procedencia/identidad edomita. «Algunos» conserva bien el carácter indefinido del grupo sin añadir número exacto.
- source_word: מֵעַבְדֵי אָבִיו
  english_pob_choice: from among his father's servants
  chosen_spanish: de entre los siervos de su padre
  alternatives_spanish:
  - de entre los servidores de su padre
  - entre los siervos de su padre
  lexicon: HALOT
  rationale: עֶבֶד en este contexto de corte/servicio real puede ser «siervo» o «servidor». Se prefiere «siervos» para mantener el vínculo léxico con el campo de servicio doméstico y evitar suavizar el término.
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - con Hadad
  lexicon: preposición + sufijo
  rationale: La preposición con sufijo se traduce de forma directa; la duplicación pronominal en español ayuda a mantener la relación de acompañamiento.
- source_word: לָבוֹא מִצְרָיִם
  english_pob_choice: to Egypt
  chosen_spanish: a ir a Egipto
  alternatives_spanish:
  - a venir a Egipto
  - para ir a Egipto
  lexicon: HALOT
  rationale: El infinitivo con destino expresa propósito o resultado de la huida. «A ir a Egipto» conserva la idea semítica subyacente de movimiento hacia el destino; la nota explica la posibilidad más literal «venir».},{
theological_decisions:
- issue: Cómo reflejar el valor de יִבְרַח junto con el infinitivo de destino לָבוֹא
  english_pob_reading: Fled to Egypt, ...; more literally, 'to come to Egypt.'
  chosen_spanish_reading: Huyó a Egipto ...; literalmente, 'a venir a Egipto'
  alternative_spanish_readings:
  - escapó a Egipto
  - fue a Egipto
  rationale: 'No hay una cuestión doctrinal, sino de fidelidad semántica: se conserva el matiz de huida y la construcción direccional del hebreo en una nota.'
  doctrine_reference: none
- issue: Cómo verter נַעַר קָטָן
  english_pob_reading: a young boy
  chosen_spanish_reading: un joven muchacho
  alternative_spanish_readings:
  - un muchacho pequeño
  - un niño pequeño
  - un joven niño
  rationale: La expresión hebrea subraya juventud y pequeñez/escasa edad. «Joven muchacho» suena algo redundante, pero conserva ambas ideas sin volverla infantilizante en exceso; la nota puede recoger que también puede entenderse como «muchacho pequeño».
  doctrine_reference: none
translation_notes:
  revision_awareness: El testimonio inglés revisado cambió «small boy» por «young boy» para mayor naturalidad formal, sin alterar el sentido de נַעַר קָטָן. La versión española sigue ese ajuste semántico y evita una traducción demasiado rígida.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto cuando aparezca el Nombre divino, aunque en este versículo no ocurre.
  - Se usa «siervos» para עַבְדֵי por coherencia con el campo léxico de servicio doméstico/cortesano; no se suaviza a «servidores» salvo necesidad contextual.
  - La construcción «él y algunos hombres edomitas de entre... con él» preserva la sintaxis algo pesada del hebreo sin volverla ininteligible.
  - El matiz de edad en נַעַר קָטָן queda reforzado por la nota, para no perder la tensión entre «joven» y «pequeño».
