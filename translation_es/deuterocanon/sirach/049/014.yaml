translation:
  language: es
  text: Pocos han sido creados en la tierra como Enoc[a][b], y él también fue llevado arriba[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Pocos han sido creados en la tierra como Enoc, y él también fue tomado …». La palabra final hebrea es difícil aquí; el griego paralelo lee «de la tierra», pero el texto principal sigue aquí el sentido de «fue llevado arriba».'
    reason: textual_variant
  - marker: b
    text: 'El griego tiene una formulación más fuerte: «No se creó ni uno solo como Enoc sobre la tierra». El testimonio hebreo lee «pocos» y no una negación absoluta.'
    reason: alternative_reading
  - marker: c
    text: O «fue tomado». La expresión recuerda la tradición del traslado de Enoc por Dios (compárese Génesis 5:24).
    reason: lexical_alternative
lexical_decisions:
- source_word: מעט
  english_pob_choice: Few
  chosen_spanish: Pocos
  alternatives_spanish:
  - Pocas personas
  - No muchos
  lexicon: HALOT
  rationale: El hebreo מעט expresa cantidad reducida; en español, «pocos» comunica esa idea sin convertirla en una negación absoluta. Mantiene la tensión con el testimonio griego, que es más fuerte, sin borrar la base hebrea.
- source_word: נוצרו
  english_pob_choice: have been created
  chosen_spanish: han sido creados
  alternatives_spanish:
  - fueron formados
  - han llegado a existir
  lexicon: HALOT
  rationale: El pasivo plural se rinde mejor con una pasiva compuesta que suena natural en español y conserva la fuerza de un acto de creación/formación atribuido a Dios.
- source_word: כחנוך
  english_pob_choice: like Enoch
  chosen_spanish: como Enoc
  alternatives_spanish:
  - igual que Enoc
  - tal como Enoc
  lexicon: HALOT
  rationale: La partícula כ marca comparación; «como Enoc» es la forma más directa y natural en español.
- source_word: וגם הוא
  english_pob_choice: and he too
  chosen_spanish: y él también
  alternatives_spanish:
  - y aun él
  - y hasta él
  lexicon: HALOT
  rationale: La adición enfática se conserva con «también», que reproduce el alcance inclusivo del hebreo y encaja con el tono de la frase.
- source_word: נלקח
  english_pob_choice: was taken
  chosen_spanish: fue tomado
  alternatives_spanish:
  - fue llevado
  - fue tomado en alto
  lexicon: HALOT
  rationale: «Fue tomado» preserva el idiomático bíblico de la remoción de Enoc sin especificar más de lo que el verso afirma directamente. La alternativa «fue llevado» podría sonar más interpretativa.
- source_word: פנים
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra para sí
  - de delante
  lexicon: HALOT
  rationale: El final hebreo es difícil; el paralelo griego dice ἀπὸ τῆς γῆς, «de la tierra». Por eso la frase principal sigue ese sentido, mientras la nota deja constancia de la variante textual.
theological_decisions:
- issue: Cómo expresar la remoción excepcional de Enoc sin sobrerresolución doctrinal
  english_pob_reading: was taken up / was taken from the earth
  chosen_spanish_reading: fue tomado
  alternative_spanish_readings:
  - fue tomado de la tierra
  - fue llevado arriba
  rationale: 'La POB inglesa conserva sobriedad: afirma la remoción excepcional de Enoc y deja abierta la formulación exacta. En español, «fue tomado» mantiene esa reserva y evita imponer una explicación más desarrollada que el versículo no explicita.'
  doctrine_reference: Preservar la tensión textual y teológica.
translation_notes:
  revision_awareness: La revisión más reciente del inglés reemplazó «from the earth» por «up» para reflejar mejor el hebreo; sin embargo, el propio contexto auditado sigue señalando la dificultad del final hebreo y el apoyo del griego ἀπὸ τῆς γῆς. Por eso la redacción española mantiene la sobriedad de «fue tomado» y las notas registran tanto la variante hebrea problemática como la alternativa «tomado en alto».
  spanish_consistency_notes:
  - Se usa «Enoc» para el nombre propio, conforme al uso bíblico en español.
  - Se evita «SEÑOR» u otra sustitución porque no aparece el Tetragrámaton en este versículo.
  - No se introduce «Cristo», pues el pasaje no lo contiene.
  - La pasiva «han sido creados»/«fue tomado» conserva el tono bíblico sin volverlo arcaizante.
  - La nota a sostiene la variante textual; la nota b preserva la diferencia de fuerza entre el hebreo y el griego, sin eliminarla.
