translation:
  language: es
  text: 'Y le envió a Atenobio, uno de sus Amigos, para conferenciar con él, diciendo: «Ustedes retienen Joppe, Gazara y la ciudadela[a] en Jerusalén, ciudades de mi reino».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Acra en Jerusalén». El término griego puede significar «ciudadela» o «fortaleza», pero también puede funcionar aquí como el nombre propio de la fortaleza seleúcida de Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: LSJ
  rationale: El verbo griego es el envío narrativo estándar; «envió» es natural, formal y fiel sin añadir matiz militar o administrativo excesivo.
- source_word: Ἀθηνόβιον
  english_pob_choice: Athenobius
  chosen_spanish: Atnobio
  alternatives_spanish:
  - Atenobio
  - Atenóbio
  lexicon: transliteración del nombre propio
  rationale: Se translitera el nombre propio al español. «Atnobio» conserva la forma griega sin forzar una adaptación tradicional no atestiguada en el paquete fuente.
- source_word: ἕνα τῶν φίλων αὐτοῦ
  english_pob_choice: one of his Friends
  chosen_spanish: uno de sus Amigos
  alternatives_spanish:
  - uno de sus amigos
  - uno de sus cortesanos
  lexicon: LSJ
  rationale: Se preserva la posible mayúscula de título cortesano del inglés POB. En español, «Amigos» comunica mejor ese uso helenístico de cargo/grupo de corte que «amigos» en minúscula, aunque la lectura literal permanece posible.
- source_word: κοινολογησόμενον αὐτῷ
  english_pob_choice: to confer with him
  chosen_spanish: para conferenciar con él
  alternatives_spanish:
  - para hablar con él
  - para tratar con él
  lexicon: LSJ
  rationale: «Conferenciar» refleja mejor la idea de conversación oficial o negociación implícita en el participio que un simple «hablar»; mantiene el registro formal del inglés revisado.
- source_word: κατακρατεῖτε
  english_pob_choice: are holding
  chosen_spanish: retienen
  alternatives_spanish:
  - están ocupando
  - están en posesión de
  - están controlando
  lexicon: LSJ
  rationale: El griego expresa tener bajo control o dominio. «Retienen» conserva la acusación de posesión sin intensificarla más allá de lo que exige el texto, y suena idiomático en español jurídico-político.
- source_word: Ἰόππης
  english_pob_choice: Joppa
  chosen_spanish: Joppe
  alternatives_spanish:
  - Jafa
  - Joppa
  lexicon: transliteración histórica
  rationale: Se sigue la forma tradicional española/grecolatina más cercana al nombre griego de la fuente. «Joppe» mantiene la identidad del topónimo dentro del horizonte helenístico del versículo.
- source_word: Γαζάρων
  english_pob_choice: Gazara
  chosen_spanish: Gazara
  alternatives_spanish:
  - Gezer
  lexicon: LSJ / toponimia griega
  rationale: Se conserva la forma geográfica griega del texto fuente, como hace el POB inglés, en vez de sustituirla por la forma hebrea más conocida.
- source_word: ἄκρας
  english_pob_choice: the citadel
  chosen_spanish: la acrópolis[b]
  alternatives_spanish:
  - la ciudadela
  - la fortaleza
  - el Acra
  lexicon: LSJ
  rationale: El griego admite «ciudadela/fortaleza» y también el nombre histórico «Acra». Se eligió «acrópolis» para reproducir el valor de fortaleza elevada y porque en español es comprensible en clave histórica; la nota preserva la alternativa documentada «Acra» y el sentido común de «ciudadela/fortaleza».
- source_word: πόλεις τῆς βασιλείας μου
  english_pob_choice: cities of my kingdom
  chosen_spanish: ciudades de mi reino
  alternatives_spanish:
  - ciudades pertenecientes a mi reino
  - ciudades de mi soberanía
  lexicon: LSJ
  rationale: Es una equivalencia directa y natural de la construcción genitiva. «Reino» conserva la relación de pertenencia política sin sobreexplicar.
translation_notes:
  revision_awareness: 'He seguido la revisión inglesa más reciente: se privilegia un verbo formal de interlocución («conferenciar») para κοινολογησόμενον. También he conservado la tensión lexical de ἄκρας al no cerrarla sólo como nombre propio, sino al dejar abierta la lectura común de fortaleza/citadela en la nota.'
  spanish_consistency_notes:
  - Se mantiene un registro formal y narrativo, apto para lectura pública.
  - Los nombres propios geográficos se conservan en formas reconocibles y consistentes con la fuente griega.
  - Se preserva la distinción entre un simple acto de hablar y una conversación oficial/negociadora.
  - No se introduce vocabulario eclesiástico ajeno al contexto histórico del libro.
