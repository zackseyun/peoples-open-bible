translation:
  language: es
  text: «Miren, vienen días —declara Yahvé— en que la ciudad será reconstruida[a] para Yahvé, desde la Torre de Hananel hasta la Puerta de la Esquina.»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «será edificada»; el pasivo hebreo puede indicar tanto edificar como reedificar, aunque el contexto de restauración favorece «reconstruida».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - He aquí
  - Vean
  lexicon: HALOT
  rationale: En español bíblico moderno, «Miren» conserva la fuerza deíctica e introductoria de הִנֵּה sin sonar tan arcaico como «He aquí» en un registro contemporáneo. Mantiene el tono profético de llamada de atención.
- source_word: יָמִים
  english_pob_choice: days are coming
  chosen_spanish: vienen días
  alternatives_spanish:
  - se acercan días
  - los días vienen
  lexicon: HALOT
  rationale: La idiomática profética en español fluye mejor como «vienen días». Expresa la llegada de un tiempo futuro sin añadir contenido interpretativo ajeno al hebreo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: «Declara» preserva la fórmula profética solemne de נְאֻם mejor que un simple «dice». Se mantiene «Yahvé» según la norma del proyecto para יְהוָה.
- source_word: וְנִבְנְתָה
  english_pob_choice: will be rebuilt
  chosen_spanish: será reconstruida
  alternatives_spanish:
  - será edificada
  - será reedificada
  lexicon: HALOT
  rationale: El pasivo nifal puede indicar construir o reconstruir; por el contexto restaurativo, «reconstruida» comunica mejor la idea de restauración urbana. «Reedificada» también es posible, pero «reconstruida» es más natural en español contemporáneo.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Se conserva el sustantivo general sin expandirlo, tal como en el hebreo. El contexto ya identifica la ciudad como Jerusalén, pero el texto no lo dice explícitamente aquí.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  lexicon: HALOT
  rationale: 'La preposición לָ/לְ aquí expresa pertenencia o dedicación; en español, «para Yahvé» comunica bien ese sentido consagratorio y evita la posible ambigüedad de «a». '
- source_word: מִמִּגְדַּל חֲנַנְאֵל
  english_pob_choice: from the Tower of Hananel
  chosen_spanish: desde la Torre de Hananel
  alternatives_spanish:
  - desde la torre de Hananel
  - desde Hananel
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado y se traduce el sustantivo común con mayúscula por tratarse de un topónimo. «Desde» refleja el punto de partida del recorrido delimitador.
- source_word: שַׁעַר הַפִּנָּה
  english_pob_choice: the Corner Gate
  chosen_spanish: la Puerta de la Esquina
  alternatives_spanish:
  - la Puerta Angular
  - la puerta de la esquina
  lexicon: HALOT
  rationale: «Puerta de la Esquina» mantiene el valor composicional del hebreo y evita imponer una terminología eclesiástica o arqueológica no documentada en el texto base. «Angular» es posible, pero más interpretativo; «de la Esquina» es transparente y fiel.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: El texto hebreo contiene el Tetragrammaton directamente. Conforme al criterio del proyecto, se conserva el nombre divino personal «Yahvé» en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés POB fue revisado y quedó sin cambios; la presente propuesta sigue su lectura general, pero ajusta el español a la evidencia hebrea y a la terminología del proyecto, especialmente en el nombre divino y en el valor restaurativo del pasivo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - «Puerta de la Esquina» sigue el mismo patrón composicional que otras topografías bíblicas en español y conserva transparencia semántica.
  - No se expande «la ciudad» a «Jerusalén» para no añadir un referente no explicitado en el versículo.
