translation:
  text: 'Because of this[a], do not let me be heard[b];

    and do not let me be known by judgment or by any other power.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The sequence ⲕⲉⲙⲁ likely represents the Greek loan ⲕⲣⲓⲙⲁ (“judgment”); OCR
      may have dropped ⲣⲓ. If not ⲕⲣⲓⲙⲁ, the sense is uncertain and could reflect
      another noun.
    reason: textual_variant
  - marker: b
    text: ⲟⲉⲓϣ commonly means “strength/power”; hence “any other power.”
    reason: cultural_note
lexical_decisions:
- source_word: ⲉⲧⲃⲉ ⲡⲁⲓ
  chosen: Because of this
  alternatives:
  - For this reason
  - Concerning this
  lexicon: Crum; Lambdin §303 (etbe as causal)
  rationale: ⲉⲧⲃⲉ regularly introduces causal grounds; “Because of this” preserves
    explicit causal force and cadence.
- source_word: ⲙⲡⲣ ⲣⲁⲧ ⲥⲱⲧⲙ ⲛⲥⲱⲓ
  chosen: do not let me be heard
  alternatives:
  - do not cause me to be heard
  - do not permit me to be heard
  lexicon: Crum s.v. ⲥⲱⲧⲙ; Lambdin §167 (r-ⲁⲧ causative; mpr negative jussive)
  rationale: Negative prospective/jussive ⲙⲡⲣ + causative ⲣⲁⲧ with ⲥⲱⲧⲙ (“hear”) yields
    “do not let/cause [to] hear.” Passive English best captures the impersonal permissive
    sense.
- source_word: ⲁⲩⲱ
  chosen: and
  alternatives:
  - and also
  lexicon: Crum s.v. ⲁⲩⲱ
  rationale: Simple connective; no adversative force indicated.
- source_word: ⲙⲡⲣ ⲣⲁⲧ ⲥⲟⲟⲩⲛ ⲙⲙⲟⲓ
  chosen: do not let me be known
  alternatives:
  - do not cause me to be known
  - do not permit knowledge of me
  lexicon: Crum s.v. ⲥⲟⲟⲩⲛ
  rationale: Parallel causative construction to the prior cola; preserves the paired
    prohibition and rhythm.
- source_word: ⲛ ⲕⲣⲓⲙⲁ ⲏ ⲛⲕⲉⲟⲩⲟⲉⲓϣ
  chosen: by judgment or by any other power
  alternatives:
  - in judgment or in any other strength
  - through judgment or any other might
  lexicon: LSJ s.v. κρῖμα (Greek loan in Coptic); Crum s.v. ⲟⲉⲓϣ (strength, power)
  rationale: The OCR likely reads the Greek loan ⲕⲣⲓⲙⲁ (judgment); ⲟⲉⲓϣ is well-attested
    as ‘strength/power.’ Preposition ⲛ- supports an instrumental/locative sense; “by”
    conservatively renders it without over-specifying agency.
parallelism_check: 'The two prohibitions are parallel (mpr r-at + verb + 1sg object):
  “do not let me be heard / do not let me be known.” The added prepositional phrase
  (“by judgment or by any other power”) naturally attaches to the second cola, preserving
  the paired cadence without collapsing them.'
voice_check: The first-person speaker remains explicit (“me”), addressing hearers
  with prohibitions. The imperatival/jussive tone and enigmatic self-withholding align
  with Thunder’s authoritative, paradoxical voice without smoothing it into exposition.
alignment_risk_note: Alignment confidence is low and the OCR is fragmentary. The consult
  block suggests a line about unique existence and lack of a judge, while the Coptic
  here appears to be prohibitions about being heard/known, with a likely Greek loan
  ⲕⲣⲓⲙⲁ (judgment). It is possible that adjacent lines have been mis-mapped, and that
  part of this phrase (especially the final truncated ⲙⲡⲣⲣⲁⲧ…) belongs with a different
  segment. I render only what is reasonably supported by the visible forms, flagging
  ⲕⲣⲓⲙⲁ as a likely but OCR-sensitive reading.
