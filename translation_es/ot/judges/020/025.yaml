translation:
  language: es
  text: Benjamín salió de Gibeá para encontrarse con ellos el segundo día[a], y mataron a otros dieciocho mil hombres de Israel por tierra[b]; todos estos eran de los que sacaban la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra ellos» para לִקְרָאתָם; la expresión hebrea puede denotar un encuentro hostil en un contexto militar.
    reason: lexical_alternative
  - marker: b
    text: O «los hijos de Israel» para «Israel». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió fuera
  - vino
  lexicon: HALOT
  rationale: יצא en narrativa expresa salir o partir. En español, «salió» es natural y conserva el movimiento desde Gibeá sin añadir interpretación.
- source_word: לִקְרָאתָם
  english_pob_choice: to meet them
  chosen_spanish: para encontrarse con ellos
  alternatives_spanish:
  - contra ellos
  - para hacerles frente
  lexicon: HALOT
  rationale: La expresión puede implicar encuentro hostil. «Para encontrarse con ellos» mantiene la forma básica del hebreo, mientras que el contexto bélico deja clara la confrontación.
- source_word: מִן הַגִּבְעָה
  english_pob_choice: from Gibeah
  chosen_spanish: de Gibeá
  alternatives_spanish:
  - desde Gibeá
  - de la Gibeá
  lexicon: HALOT
  rationale: Es un complemento de procedencia simple. Se translitera el topónimo según la práctica POB.
- source_word: בַּיּוֹם הַשֵּׁנִי
  english_pob_choice: on the second day
  chosen_spanish: en el segundo día
  alternatives_spanish:
  - al segundo día
  - en el día segundo
  lexicon: HALOT
  rationale: La forma ordinal del hebreo se refleja con una construcción directa y clara en español.
- source_word: וַיַּשְׁחִיתוּ
  english_pob_choice: they struck down
  chosen_spanish: derribaron
  alternatives_spanish:
  - destruyeron
  - mataron
  lexicon: HALOT
  rationale: En contexto de combate y con cifra de muertos, el verbo comunica acción letal. «Derribaron» conserva la imagen corporal del golpe sin perder el sentido de matanza.
- source_word: בִּבְנֵי יִשְׂרָאֵל
  english_pob_choice: of the sons of Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de los hijos de Israel
  - de los hijos de Israel
  lexicon: HALOT
  rationale: El inglés revisado optó por una forma más natural, y el hebreo permite entender la referencia nacional. «De Israel» es más fluido en español, aunque el trasfondo literal «hijos de Israel» queda reconocido en la nota.
- source_word: עוֹד
  english_pob_choice: another
  chosen_spanish: a otros
  alternatives_spanish:
  - otra vez
  - todavía
  lexicon: HALOT
  rationale: Aquí marca una cifra adicional tras pérdidas previas. «A otros» transmite la idea de un nuevo grupo añadido a los muertos.
- source_word: שְׁמֹנַת עָשָׂר אֶלֶף אִישׁ
  english_pob_choice: eighteen thousand men
  chosen_spanish: dieciocho mil hombres
  alternatives_spanish:
  - dieciocho mil varones
  - dieciocho mil soldados
  lexicon: HALOT
  rationale: Es la equivalencia directa del numeral más איש. «Hombres» es natural en español y conserva la referencia humana del hebreo; «soldados» interpretaría de más.
- source_word: אָרְצָה
  english_pob_choice: to the ground
  chosen_spanish: hasta el suelo
  alternatives_spanish:
  - a tierra
  - al suelo
  lexicon: HALOT
  rationale: La forma direccional de ארץ aquí expresa caída mortal al piso. «Hasta el suelo» es idiomático en español y refleja el movimiento descendente.
- source_word: כָּל אֵלֶּה
  english_pob_choice: all these
  chosen_spanish: todos estos
  alternatives_spanish:
  - todos ellos
  - todos los que
  lexicon: HALOT
  rationale: Demostrativo directo y transparente, sin añadir elementos ajenos al texto.
- source_word: שֹׁלְפֵי חָרֶב
  english_pob_choice: drawing the sword
  chosen_spanish: los que sacaban la espada
  alternatives_spanish:
  - los que desenvainaban la espada
  - espaderos
  lexicon: HALOT
  rationale: La expresión participial hebrea es literal y vívida. «Los que sacaban la espada» conserva la imagen de desenvainar/extraer el arma sin convertirla en un sustantivo más interpretativo.
translation_notes:
  revision_awareness: El texto hebreo y el aparato inglés coinciden sustancialmente. Sigo la revisión inglesa que hace más natural la referencia nacional al traducir בִּבְנֵי יִשְׂרָאֵל como «de Israel», pero en español conservo una nota que deja auditable la literalidad «hijos de Israel». También mantengo la fuerza participial de שֹׁלְפֵי חָרֶב con una perífrasis verbal natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «Benjamín» y «Gibeá» como transliteraciones consistentes con el proyecto.
  - «Espada» se conserva de manera literal para חָרֶב, sin suavizar a un término militar genérico.
