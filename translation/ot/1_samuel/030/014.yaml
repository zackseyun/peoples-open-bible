id: 1SA.30.14
reference: 1 Samuel 30:14
source:
  edition: WLC
  text: אֲנַ֡חְנוּ פָּשַׁ֜טְנוּ נֶ֧גֶב הַ/כְּרֵתִ֛י וְ/עַל אֲשֶׁ֥ר לִֽ/יהוּדָ֖ה וְ/עַל נֶ֣גֶב כָּלֵ֑ב וְ/אֶת צִקְלַ֖ג שָׂרַ֥פְנוּ בָ/אֵֽשׁ־־־׃
translation:
  text: We raided the Negev of the Kerethites[a], and the territory that belongs to Judah, and the Negev of Caleb; and we burned Ziklag with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Cherethites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּשַׁטְנוּ
  chosen: raided
  alternatives:
  - made a raid on
  - invaded
  - spread out over
  lexicon: HALOT
  rationale: In this military context the verb denotes making a raid/plundering incursion, not merely 'spreading out.' 'Raided' is concise, idiomatic, and fits the Amalekite speaker's report.
- source_word: נֶגֶב
  chosen: Negev
  alternatives:
  - south
  - southern region
  lexicon: HALOT
  rationale: Here נגב likely refers to the southern dryland region/territory rather than merely the compass direction. Retaining 'Negev' preserves the geographic sense and avoids flattening repeated usage in the verse.
- source_word: הַכְּרֵתִי
  chosen: the Kerethites
  alternatives:
  - the Cherethites
  lexicon: HALOT
  rationale: A people-group name is intended. 'Kerethites' is a straightforward transliteration from the Hebrew consonants; 'Cherethites' is the traditional English form and is preserved as an alternative.
- source_word: וְעַל אֲשֶׁר לִיהוּדָה
  chosen: and the territory that belongs to Judah
  alternatives:
  - and against what belongs to Judah
  - and upon the area of Judah
  - and the region of Judah
  lexicon: HALOT
  rationale: The preposition על after פשט can extend the list of targets raided. The relative clause אשר ליהודה is most naturally rendered as territory/property belonging to Judah. This avoids an overly wooden 'upon what was Judah's' while preserving possession.
- source_word: נֶגֶב כָּלֵב
  chosen: the Negev of Caleb
  alternatives:
  - the southern region of Caleb
  - the south of Caleb
  lexicon: HALOT
  rationale: This likely denotes the southern district associated with Caleb's clan/territory. 'Negev of Caleb' preserves the Hebrew structure and geographic nuance better than a generic 'south of Caleb.'
- source_word: שָׂרַפְנוּ בָאֵשׁ
  chosen: we burned Ziklag with fire
  alternatives:
  - we set Ziklag on fire
  - we burned down Ziklag
  lexicon: HALOT
  rationale: The Hebrew explicitly uses the verb 'burn' plus the instrument 'with fire.' English can sound redundant, but retaining 'with fire' reflects the source emphasis and keeps the confession vivid.
- source_word: צִקְלַג
  chosen: Ziklag
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
