lexical_decisions:
- source_word: ⲧⲡⲗⲁⲛⲏ (plane)
  chosen: Error
  alternatives:
  - Deception
  - Wandering
  lexicon: Crum; Layton
  rationale: In Valentinian usage, Plane is a hypostatized power opposed to Truth.
    Rendering it as Error preserves the personified, reified quality and the theological
    contrast with Truth.
- source_word: ⲁⲧⲙⲉⲉⲩⲉ
  chosen: Forgetfulness
  alternatives:
  - Unmindfulness
  - Thoughtlessness
  lexicon: Crum; Layton
  rationale: Negative prefix ⲁⲧ- on ⲙⲉⲉⲩⲉ (thought, understanding) yields the established
    technical term for cosmic oblivion. Capitalization marks its hypostatized role.
- source_word: ⲡⲉⲉⲓ
  chosen: the All
  alternatives:
  - the Totality
  - the Whole
  lexicon: Crum
  rationale: Set phrase in NH texts for the totality of beings/aeons. 'The All' maintains
    the cosmological register.
- source_word: ⲡⲧⲏⲣϥ
  chosen: root
  alternatives:
  - origin
  - radical
  lexicon: Crum
  rationale: Metaphor of rootedness contrasts Truth’s stability with Error’s lack
    of origin. The passage explicitly states Error has no root.
- source_word: ⲥⲁⲩⲛⲉ
  chosen: distress
  alternatives:
  - anguish
  - sorrow
  lexicon: Crum
  rationale: Occurs with dread/fear and fog imagery; 'distress' fits the cluster without
    over-interpreting as emotional pain only. Alternatives noted.
- source_word: ⲟⲩⲱⲛϩ
  chosen: was manifested
  alternatives:
  - came to be
  - was revealed
  lexicon: Crum; Layton
  rationale: In NH texts ⲟⲩⲱⲛϩ often carries revelatory force. Here, knowledge 'was
    manifested' so Forgetfulness might be dissolved.
- source_word: (phrase) ⲙⲁⲧⲉⲣⲙⲉⲥⲟⲥ / ⲙⲉⲥⲟⲥ (implied)
  chosen: those who are in the middle
  alternatives:
  - the intermediates
  - those in the midst
  lexicon: NH usage (consulted); Crum (mesos)
  rationale: 'Standard Valentinian motif: Error seeks to capture the middle realm.
    Rendering keeps the technical cosmological nuance.'
- source_word: ⲡⲓⲱⲧ
  chosen: the Father
  alternatives: []
  lexicon: Crum
  rationale: Core title for the Source; capitalization follows theological convention
    in the treatise.
- source_word: (phrase) ⲙⲡⲓⲱⲧ ⲛ̄ⲧⲁϥ… / ⲛⲧⲁⲧⲙⲡⲓⲱⲧ
  chosen: ignorance of the Father
  alternatives:
  - not knowing the Father
  lexicon: Crum
  rationale: Summarizes the genitive construction that grounds the coming-to-be of
    distress and Forgetfulness.
technical_vocabulary_note: This section personifies Error (Coptic plane) and Forgetfulness
  (ⲁⲧⲙⲉⲉⲩⲉ) as active powers. We capitalize these to signal their hypostatized, technical
  status in Valentinian cosmology. 'The All' renders ⲡⲉⲉⲓ, the conventional term for
  the totality. We preserve the metaphors of fog, root, and imprisonment without domestication.
  Where the text contrasts what is 'from' the Father with what is 'on account of'
  him, we keep that prepositional nuance to protect the theological point that Forgetfulness
  is not of the Father's essence.
textual_note: 'Drafted directly from the Codex I, p. 18 OCR. The flow matches the
  well-attested sequence: search for the Source; ignorance begets distress; Error’s
  strengthening; its delusive preparation; the admonition to disregard Error because
  it lacks a root; and the clarification that Forgetfulness is not from the Father
  but arose because he was unknown, while knowledge is manifested from within him
  to dissolve Forgetfulness. Some individual lexemes (e.g., ⲥⲁⲩⲛⲉ ‘distress/anguish’)
  bear a range of senses; choices are documented below. No adjustments were made from
  later translations; phrasing aims to reflect the Coptic idiom without flattening
  the theological register.'
