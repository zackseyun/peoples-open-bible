base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/035/009.yaml
  text: Conaniah[a], and Shemaiah and Nethanel his brothers, and Hashabiah and Jeiel and Jozabad, the chiefs of the Levites, contributed to the Levites for the Passover offerings five thousand and five hundred head of cattle.
  footnotes:
