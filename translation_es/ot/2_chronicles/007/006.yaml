base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/007/006.yaml
  text: And the priests were standing at their posts[a], and the Levites with the instruments of song to Yahweh, which David the king had made to give thanks to Yahweh, for his steadfast love endures forever, when David offered praise by their hand; and the priests were blowing trumpets opposite them[c][b], while all Israel was standing.
  footnotes:
  - marker: a
    text: Or 'with the musical instruments of the LORD.' The Hebrew phrase may mean instruments dedicated to the LORD or instruments used for the LORD's song.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'For his steadfast love is forever,' an idiom commonly rendered 'For his steadfast love endures forever.'
    reason: lexical_alternative
  - marker: c
    text: Or 'when David praised through them.' The Hebrew is compressed and likely means that the Levites rendered Davidic praise as his agents.
    reason: alternative_reading
