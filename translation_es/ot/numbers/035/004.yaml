  to: Y los [a]ejidos[a] de las ciudades que ustedes den a los levitas serán desde el muro de la ciudad hacia afuera, mil codos alrededor[b].
  rationale: Se corrige la persona verbal para reflejar mejor el hebreo de segunda persona plural en contexto instructivo y se normaliza la nota b. Se conserva «ejidos» porque transmite bien el terreno comunal/periférico de las ciudades levíticas y está respaldado por la nota léxica.
