review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido general del griego: una παραβολή/proverbio procedente de un necio es rechazada, porque él no la dirá en el momento adecuado. Conserva bien ἀπὸ στόματος, μωροῦ, ἀποδοκιμασθήσεται y la relación causal de οὐ γὰρ μὴ. Sin embargo, el pronombre en español debería concordar con «proverbio» y la expresión temporal puede sonar más natural.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «lo dirá» no concuerda con el antecedente femenino implícito del griego solo si se vierte como «parábola» en nota; en el texto principal, con «proverbio», conviene «lo». El problema real está en la explicación léxica, donde aparece el error tipográfico «Neceo». Además, «en su tiempo oportuno» es comprensible pero menos idiomático que «en su debido tiempo» o «en el momento oportuno».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Necio» para μωροῦ y «proverbio» para παραβολή están bien justificados; la nota con «parábola» preserva la alternativa documentada por el POB inglés.
  issues:
  - severity: medium
    issue: La frase «en su tiempo oportuno» suena poco natural en español.
    rationale: Aunque comunica καιρός, la combinación es torpe. «En su debido tiempo» preserva la idea de tiempo apropiado con mejor fluidez y registro sapiencial.
  - severity: low
    issue: 'Error tipográfico en la rationale léxica: «Neceo».'
    rationale: Debe decir «Necio». No afecta el texto bíblico, pero sí la calidad editorial del registro.
  revised_spanish_text: De la boca de un necio[a] se rechazará un proverbio, porque ciertamente no lo dirá en su debido tiempo.
  revised_footnotes:
  - marker: a
    text: O «una parábola», si παραβολή se toma en sentido más amplio que «proverbio».
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la expresión temporal a un español más natural y plenamente fiel a ἐν καιρῷ αὐτῆς: «en su debido tiempo». Se conserva la estructura y el sentido del original, así como la nota léxica sobre παραβολή.'
