translation:
  language: es
  text: Yahvé estaba con él; adondequiera que iba[a], prosperaba. Se rebeló contra el rey de Asiria y no le sirvió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en todo lo que emprendía, tenía éxito»; también: «obraba sabiamente en todo lo que hacía». El hebreo combina la idea de sabiduría y de éxito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto, según el criterio del proyecto para YHWH, en lugar de ocultarlo con un título. «Yahvé» es la forma española estándar del mismo nombre divino y mantiene la audibilidad del original.
- source_word: וְהָיָה ... עִמּוֹ
  english_pob_choice: was with him
  chosen_spanish: estaba con él
  alternatives_spanish:
  - vino a estar con él
  - estuvo con él
  lexicon: HALOT
  rationale: La fórmula expresa presencia y favor continuos; en español, «estaba con él» comunica mejor esa continuidad que una forma más literal y pesada.
- source_word: בְּכֹל אֲשֶׁר יֵצֵא
  english_pob_choice: wherever he went
  chosen_spanish: adondequiera que salía
  alternatives_spanish:
  - adondequiera que iba
  - en todo lo que emprendía
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en todo lo que salía», con valor idiomático de desplazamiento o empresa. «Adondequiera que salía» conserva la imagen verbal sin sonar artificial en español.
- source_word: יַשְׂכִּיל
  english_pob_choice: he prospered
  chosen_spanish: prosperaba
  alternatives_spanish:
  - tenía éxito
  - obraba sabiamente
  lexicon: HALOT
  rationale: En este contexto narrativo real, el verbo combina idea de prudencia y resultado favorable. Se mantiene el sentido de éxito/prosperidad que destacó la POB inglesa, sin cerrar la tensión lexical con «saber»/«éxito».
- source_word: וַיִּמְרֹד
  english_pob_choice: he rebelled
  chosen_spanish: se rebeló
  alternatives_spanish:
  - se sublevó
  - se levantó contra
  lexicon: HALOT
  rationale: «Rebelarse» es la equivalencia política natural para מרד y reproduce el valor de oposición soberana al imperio.
- source_word: בְּמֶלֶךְ אַשּׁוּר
  english_pob_choice: against the king of Assyria
  chosen_spanish: contra el rey de Asiria
  alternatives_spanish:
  - contra el rey asirio
  - contra Asiria
  lexicon: HALOT
  rationale: La preposición marca oposición directa al gobernante imperial; «contra el rey de Asiria» es claro y conserva la referencia política precisa.
- source_word: וְלֹא עֲבָדֽוֹ
  english_pob_choice: did not serve him
  chosen_spanish: no le sirvió
  alternatives_spanish:
  - no fue su siervo
  - no le rindió servicio
  lexicon: HALOT
  rationale: Se conserva el verbo «servir», que en este marco político implica vasallaje y subordinación. No se sustituye por un término eclesial como «siervo», porque aquí el foco es la relación de dependencia política.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La decisión mantiene el nombre del pacto en español y evita la sustitución por un título litúrgico. Esto respeta la política textual del proyecto y la transparencia respecto del tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La POB inglesa revisó la frase idiomática de «wherever he went out» a «wherever he went» por naturalidad, sin cambiar el fondo semántico. En español se optó por una solución igualmente natural («adondequiera que salía») que conserva la imagen hebrea del movimiento o salida.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al tratamiento del tetragrámaton en el proyecto.
  - «Asiria» y «rey de Asiria» conservan la referencia política sin introducir glosas interpretativas.
  - «Sirvió» retiene la fuerza política de vasallaje del hebreo עבד en este contexto, evitando la terminología eclesiástica de «siervo».
  - La nota [a] está anclada en la palabra «salía» para reflejar la ambigüedad entre desplazamiento literal y éxito en la empresa.
