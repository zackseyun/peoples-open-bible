translation:
  language: es
  text: Así, los hijos de Israel dieron a los levitas estas ciudades con sus pastizales, como Yahvé había mandado por medio de Moisés[a], por suertes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la mano de Moisés», hebraísmo que expresa agencia mediada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  english_pob_choice: gave
  chosen_spanish: dieron
  alternatives_spanish:
  - entregaron
  - asignaron
  lexicon: HALOT
  rationale: El imperfecto consecutivo narra la acción de dar/entregar las ciudades. «Dieron» es natural en español y conserva la sencillez del verbo base נתן sin agregar matices no atestiguados.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se preserva la expresión literalmente equivalente a «sons of Israel», en lugar de nivelarla a una forma más general. «Hijos» mantiene la forma de parentesco del hebreo y su valor etnónimo.
- source_word: לַלְוִיִּם
  english_pob_choice: to the Levites
  chosen_spanish: a los levitas
  alternatives_spanish:
  - para los levitas
  lexicon: HALOT
  rationale: El dativo se expresa naturalmente con «a». «Levitas» corresponde de manera directa al grupo tribal designado.
- source_word: הֶעָרִים הָאֵלֶּה
  english_pob_choice: these cities
  chosen_spanish: estas ciudades
  alternatives_spanish:
  - las ciudades estas
  lexicon: HALOT
  rationale: El demostrativo indica las ciudades recién enumeradas. «Estas ciudades» conserva la deixis y suena natural en español.
- source_word: מִגְרְשֵׁיהֶן
  english_pob_choice: their pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - sus terrenos de pasto
  - sus tierras de pasto
  - sus dehesas
  lexicon: HALOT
  rationale: En contextos de repartición urbana, מִגְרָשׁ designa el terreno abierto alrededor de la ciudad, destinado en la práctica a pastoreo y uso comunal. «Pastizales» comunica esa función sin volverlo técnico de más; se evita «alrededores» porque pierde la referencia concreta al uso del terreno.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: Introduce conformidad con el mandato divino. «Como» es breve y fiel; en este contexto funciona como equivalente de conformidad normativa.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - mandó
  lexicon: HALOT
  rationale: El pluscuamperfecto refleja que la acción de repartir ocurre conforme a un mandato previo. «Mandado» conserva el tono bíblico de צוה sin necesidad de intensificar a «ordenado».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé», preservando el nombre divino en el texto principal en vez de sustituirlo por «Señor».'
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: by the hand of Moses
  chosen_spanish: por medio de Moisés
  alternatives_spanish:
  - por la mano de Moisés
  - por Moisés
  lexicon: HALOT
  rationale: Se opta por una equivalencia idiomática que exprese agencia mediada. «Por medio de Moisés» comunica con claridad el hebraísmo בְּיַד sin sonar rígido en español; se mantiene la idea de mediación, no de autoría directa.
- source_word: בַּגּוֹרָל
  english_pob_choice: by lot
  chosen_spanish: por sorteo
  alternatives_spanish:
  - por la suerte
  - por suertes
  lexicon: HALOT
  rationale: El reparto se hizo mediante selección por suertes. «Por sorteo» es claro y contemporáneo en español; conserva el procedimiento de asignación sin introducir una imagen moderna ajena al contexto.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Señor
  rationale: El texto hebreo usa directamente el Tetragrámaton. En coherencia con la política del proyecto, se translitera como «Yahvé» para preservar el nombre del pacto y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה / YHWH'
- issue: Valor de בְּיַד מֹשֶׁה
  english_pob_reading: by the hand of Moses
  chosen_spanish_reading: por medio de Moisés
  alternative_spanish_readings:
  - por la mano de Moisés
  - por Moisés
  rationale: La expresión hebrea marca agencia mediada. La lectura española elegida evita una literalidad que podría sonar extraña sin perder la idea de que Yahvé mandó a través de Moisés.
  doctrine_reference: Hebraísmo de agencia mediada; sin conflicto doctrinal, pero sí de estilo y precisión semántica
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del audit trail: el cambio de «along with» a «with» confirma un registro más formal y natural. En español se mantuvo esa misma preferencia con «con sus pastizales», sin añadir elementos interpretativos ajenos al hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con la política del proyecto para יהוה.
  - «Hijos de Israel» conserva la forma literal del hebreo, alineada con la decisión inglesa de mantener «sons of Israel».
  - «Por medio de Moisés» traduce el hebraísmo בְּיַד como agencia mediada y no como simple autoría.
  - «Por sorteo» refleja el procedimiento de reparto por lotes/suertes sin sobreexplicarlo.
  - Se mantiene un registro bíblico claro y moderno, evitando el calco pesado salvo donde la fuente lo exige.
