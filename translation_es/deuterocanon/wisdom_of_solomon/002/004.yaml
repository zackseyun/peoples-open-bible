review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido global del griego: olvido del nombre, falta de memoria de las obras, y la vida que pasa con imágenes de nube y niebla. Sin embargo, hay dos desajustes importantes con la auditoría inglesa y el griego: el anclaje de la nota [a] está colocado en «con el tiempo» aunque la nota trata ἴχνη νεφέλης; y «abatida» para βαρυνθεῖσα debilita la imagen física de «hecha pesada / cargada» documentada en la decisión léxica inglesa.'
  spanish_quality_summary: El español es claro y digno, pero conviene reparar el anclaje de nota y mejorar una elección léxica para mayor precisión imagética. «Será cargada por su calor» suena menos natural; «hecha pesada por su calor» preserva mejor el matiz físico, aunque algo literal. La opción más equilibrada y legible es «cargada por su calor», que mantiene la materialidad mejor que «abatida».
  glossary_alignment: No hay términos del glosario maestro especialmente activados aquí. «Obras», «vida», «niebla» y «rayos del sol» están alineados con las decisiones documentadas. La principal corrección requerida es léxica/imagentiva, no terminológica.
  issues:
  - severity: high
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota [a] explica la alternativa para ἴχνη νεφέλης («la huella/el rastro de una nube»), pero en el texto aparece sobre «con el tiempo», que corresponde a ἐν χρόνῳ. Esto rompe la trazabilidad del aparato y puede confundir al lector.
  - severity: medium
    issue: «Abatida» no refleja bien βαρυνθεῖσα.
    rationale: El griego y la auditoría inglesa destacan la idea física de ser «hecha pesada / weighed down» por el calor. «Abatida» transmite más bien decaimiento o postración, no el efecto material de peso que refuerza la imagen de la niebla bajo el sol.
  - severity: low
    issue: La nota [b] podría inducir confusión sobre qué palabra comenta.
    rationale: La nota compara «se desvanecerá» con διασκεδασθήσεται, y el anclaje actual en «niebla» funciona solo indirectamente. Es aceptable si el marcador se entiende como nota de la cláusula, pero conviene mantenerlo junto al segmento relevante de la comparación.
  revised_spanish_text: y nuestro nombre será olvidado con el tiempo, y nadie recordará nuestras obras; y nuestra vida pasará como la huella[a] de una nube, y será dispersada como niebla[b], ahuyentada por los rayos del sol y cargada por su calor.
  revised_footnotes:
