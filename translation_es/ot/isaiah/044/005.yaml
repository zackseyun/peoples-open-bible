base_translation:
  language: en
  yaml_path: translation/ot/isaiah/044/005.yaml
  text: This one will say[a], ‘I am Yahweh’s’; another will call himself by the name of Jacob; and another will write on his hand[c][b], ‘Belonging to Yahweh,’ and will name himself by the name of Israel.
  footnotes:
