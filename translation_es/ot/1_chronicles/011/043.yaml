  text: Hanan hijo de Maacá[a] y Josafat el mithnita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo יוֹשָׁפָט aquí usa una forma más breve que la forma más conocida del nombre, a menudo representada como 'Jehosafat'; por eso aquí se usa 'Josafat'.
