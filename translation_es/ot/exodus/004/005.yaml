    issue: «se ha aparecido a ti» es una formulación española poco natural para נִרְאָה אֵלֶיךָ
    rationale: Aunque intenta reflejar el valor de aparición divina, en español estándar la construcción adecuada es «se te ha aparecido». La forma actual suena forzada y debilita la legibilidad sin aportar mayor fidelidad.
  - severity: low
    issue: La decisión léxica de נִרְאָה justifica una forma menos idiomática que la necesaria
    rationale: El matiz perfectivo puede mantenerse con «se te ha aparecido»; no hace falta recurrir a una construcción extraña para preservar la voz/media de la aparición divina.
