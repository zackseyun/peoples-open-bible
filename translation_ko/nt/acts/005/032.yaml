  yaml_path: translation/nt/acts/005/032.yaml
  text: And we are witnesses of these things[a], and so is the Holy Spirit[c][b], whom God has given to those who obey him.
  footnotes:
  - marker: a
    text: Or 'these words' or 'these matters.'
    reason: lexical_alternative
  - marker: b
    text: 'Greek ''and the Holy Spirit,'' with the sense carried over from the previous clause: ''and [is witness] the Holy Spirit.'''
