translation:
  language: es
  text: 'Pero si sus medios no alcanzan para un cordero, entonces traerá a Yahvé, como su ofrenda por la culpa por el pecado que cometió, dos tórtolas o dos pichones: uno para una ofrenda por el pecado[a] y otro para un holocausto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para una ofrenda de purificación». El hebreo חַטָּאת puede referirse tanto al ‘pecado’ como a la ofrenda asociada con quitar la impureza o el pecado en contextos sacrificiales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַגִּיע יָדוֹ דֵּי שֶׂה
  english_pob_choice: his means do not suffice for a sheep
  chosen_spanish: sus medios no alcanzan para un cordero
  alternatives_spanish:
  - su mano no alcanza para un cordero
  - no puede costear un cordero
  lexicon: HALOT
  rationale: El hebreo usa un modismo económico de ‘alcanzar la mano’ suficiente para un animal. En español, ‘sus medios no alcanzan’ conserva claramente la idea de capacidad financiera sin volver el texto rígido; ‘cordero’ expresa la referencia sacrificial de שֶׂה de manera natural.
- source_word: אֲשָׁמוֹ
  english_pob_choice: his guilt offering
  chosen_spanish: su ofrenda por la culpa
  alternatives_spanish:
  - su ofrenda por el delito
  - su ofrenda de reparación
  lexicon: HALOT
  rationale: אשם puede abarcar ‘culpa’ y la ofrenda asociada. Se opta por ‘ofrenda por la culpa’ para mantener el vínculo semántico con la culpa personal y reflejar la ofrenda cultual sin imponer una sola solución técnica en español.
- source_word: אֲשֶׁר חָטָא
  english_pob_choice: for the sin that he committed
  chosen_spanish: por el pecado que cometió
  alternatives_spanish:
  - por el pecado que pecó
  - por lo que cometió
  lexicon: HALOT
  rationale: La cláusula especifica la falta vinculada con la ofrenda. ‘Pecado que cometió’ comunica el sentido causal y narrativo del original, evitando una traducción demasiado literal que sonaría extraña en español.
- source_word: שְׁתֵּי תֹרִים
  english_pob_choice: two turtledoves
  chosen_spanish: dos tórtolas
  alternatives_spanish:
  - dos palomitas torcaces
  - dos tórtolas comunes
  lexicon: HALOT
  rationale: Tórtolas es el equivalente zoológico estándar para תורים en legislación sacrificial. ‘Tórtolas’ es claro y digno en español; se evita una explicación excesiva en el texto principal.
- source_word: שְׁנֵי בְנֵי יוֹנָה
  english_pob_choice: two young pigeons
  chosen_spanish: dos pichones
  alternatives_spanish:
  - dos pichones de paloma
  - dos polluelos de paloma
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice ‘hijos de paloma’, es decir, crías jóvenes. ‘Pichones’ transmite de forma natural la edad juvenil del ave y mantiene la brevedad del pasaje.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahvé el cual es Dios
  lexicon: HALOT
  rationale: Se mantiene ‘Yahvé’ conforme al criterio español del proyecto para el nombre divino, sin enmascararlo con ‘SEÑOR’. La preposición ‘a’ conserva la dirección cultual de la ofrenda.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para ofrenda por el pecado
  alternatives_spanish:
  - para ofrenda por la culpa
  - para ofrenda de purificación
  lexicon: HALOT
  rationale: En contexto sacrificial, חטאת puede referirse tanto al pecado como a la ofrenda. Se elige ‘ofrenda por el pecado’ para mantener la tensión lexical y seguir el sentido cultual de la serie de ofrendas.
- source_word: לְעֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - para ofrenda quemada
  - para ofrenda totalmente consumida
  lexicon: HALOT
  rationale: ‘Holocausto’ es el término español tradicional y exacto para עֹלָה como sacrificio completamente quemado. Se preserva su valor técnico cultual sin expandir innecesariamente el texto.
theological_decisions:
- issue: 'Naturaleza de חַטָּאת: pecado u ofrenda purificadora'
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda por la purificación
  - ofrenda purificadora
  rationale: El contexto legal-sacrificial permite entender חטאת como la ofrenda asociada al pecado/impureza. En español, ‘ofrenda por el pecado’ conserva el vínculo con la culpa sin cerrar la discusión académica sobre su función purificadora.
  doctrine_reference: Preservar la tensión léxica documentada; no resolverla de manera indebida en el texto principal.
- issue: Uso del nombre divino
  english_pob_reading: to Yahweh
  chosen_spanish_reading: a Yahvé
  alternative_spanish_readings:
  - al Señor
  - a YHWH
  rationale: El proyecto exige reflejar el tetragrámaton con ‘Yahvé’ en el texto principal. Esto evita la sustitución litúrgica por ‘Señor’ y mantiene la trazabilidad al hebreo original.
  doctrine_reference: Convención editorial del proyecto para יהוה / YHWH.
translation_notes:
  revision_awareness: La versión se mantiene alineada con la última pasada sin cambios necesarios y con el control cruzado de alta concordancia. Se ajustó el español para que sea publicable y fiel al hebreo, conservando la tensión de חטאת y el registro cultual de la ofrenda.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ conforme al estándar del proyecto.
  - Se usó ‘ofrenda por el pecado’ para חַטָּאת, dejando abierta la alternativa cultual sin forzarla en el texto principal.
  - ‘Holocausto’ se reservó para עֹלָה por claridad terminológica y coherencia bíblica en español.
  - ‘Tórtolas’ y ‘pichones’ reflejan adecuadamente las aves sacrificiales sin recurrir a calcos.
  - La nota al pie sobre שֶׂה preserva la alternativa ‘oveja/cordero’ porque el hebreo permite un término más general que el español debe concretar.
