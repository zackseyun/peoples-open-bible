translation:
  language: es
  text: del dulce mundo. No forcemos la necesidad[a], ni nos jactemos en nuestro propio potro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No compelamos lo inevitable» o «No hagamos violencia a la necesidad». La expresión griega es condensada y puede referirse a no apresurar la prueba inevitable.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «nuestro propio rack». στρέβλη se refiere a un instrumento de tortura.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γλυκέος
  english_pob_choice: sweet
  chosen_spanish: dulce
  alternatives_spanish:
  - placentero
  - querido
  lexicon: LSJ
  rationale: «γλυκύς» significa literalmente «dulce». En español, «dulce» conserva la metáfora de la atracción del mundo presente sin añadir interpretación emocional ajena al griego.
- source_word: κόσμου
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - orden
  - ornamento
  - vida presente
  lexicon: LSJ
  rationale: Aquí κόσμος se refiere al mundo presente o a la esfera de la vida mundana, no a «orden» ni «ornamento». «Mundo» es la equivalencia natural y mantiene el contraste moral del pasaje.
- source_word: μὴ βιαζώμεθα
  english_pob_choice: let us not force
  chosen_spanish: No forcemos
  alternatives_spanish:
  - No compulsemos
  - No hagamos violencia a
  lexicon: LSJ
  rationale: El verbo medio exhortativo expresa presión violenta o forzada sobre algo necesario. «No forcemos» conserva brevedad y el matiz de empuje coercitivo mejor que una formulación más débil.
- source_word: τὴν ἀνάγκην
  english_pob_choice: necessity
  chosen_spanish: la necesidad
  alternatives_spanish:
  - lo inevitable
  - la constricción
  lexicon: LSJ
  rationale: ἀνάγκη puede significar necesidad, compulsión o inevitabilidad. «La necesidad» mantiene la abstracción del griego y deja abierta la tensión entre necesidad, inevitabilidad y sufrimiento inevitable.
- source_word: μηδὲ κενοδοξήσωμεν
  english_pob_choice: nor let us boast
  chosen_spanish: ni nos jactemos
  alternatives_spanish:
  - ni nos gloriemos vanamente
  - ni seamos vanagloriosos
  lexicon: LSJ
  rationale: El verbo alude a jactancia vacía o vanagloria. «Nos jactemos» es idiomático en español y, en este contexto, comunica el acto de autoexaltación sin suavizarlo.
- source_word: ἐπὶ τῇ ἑαυτῶν στρέβλῃ
  english_pob_choice: in our own torture-rack
  chosen_spanish: en nuestra propia tortura
  alternatives_spanish:
  - en nuestro propio potro
  - en nuestro propio tormento
  lexicon: LSJ
  rationale: στρέβλη designa un instrumento de tortura, especialmente el potro o el rack. En español, «tortura» mantiene la fuerza del campo semántico para lectores modernos; «potro» sería más literal, pero menos transparente fuera de contextos técnicos. La posesión reflexiva «nuestra propia» conserva el énfasis de ἑαυτῶν.
theological_decisions:
- issue: Sentido de μὴ βιαζώμεθα τὴν ἀνάγκην en contexto martirial
  english_pob_reading: The speaker urges the brothers not to hasten or intensify the inevitable ordeal by their own choice.
  chosen_spanish_reading: El hablante exhorta a los hermanos a no precipitar ni agravar por su propia voluntad la prueba inevitable.
  alternative_spanish_readings:
  - No resistamos la necesidad
  - No violemos lo que la necesidad exige
  rationale: La frase griega es condensada y deja tensión interpretativa. En este contexto de martirio, la lectura más coherente es no provocar ni adelantar la prueba inevitable mediante una actuación temeraria o autoexaltada, sin resolver en exceso la ambigüedad del original.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Valor de ἐπὶ con dativo en κενοδοξήσωμεν ἐπὶ τῇ ἑαυτῶν στρέβλῃ
  english_pob_reading: nor let us boast in our own torture-rack.
  chosen_spanish_reading: ni nos jactemos en nuestra propia tortura.
  alternative_spanish_readings:
  - ni nos jactemos sobre nuestra propia tortura
  - ni nos gloriemos en nuestro propio potro
  rationale: 'Siguiendo la revisión inglesa, el ἐπὶ con dativo se entiende de modo locativo/relacional: jactarse ''en'' la situación o ''en'' medio de ella. «En» es natural en español y evita un calco como «sobre».'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La versión española sigue la última revisión inglesa en el valor de ἐπὶ con dativo («en») y mantiene la misma estructura breve de tres miembros: mundo dulce, no forzar la necesidad, no jactarse en la tortura. También conserva la ambigüedad contextual de ἀνάγκη y de στρέβλη sin domesticar el trasfondo martirial.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere; aquí no aplica.
  - Se mantiene «mundo» para κόσμος y no se sustituye por «orden» o «adorno».
  - Se evita «siervo» porque no hay δοῦλος en este versículo.
  - Se prefiere «jactemos» para κενοδοξέω por su fuerza negativa y su naturalidad en español.
  - Se conserva la imagen dura de la tortura sin eufemizarla con «sufrimiento» como traducción principal.
