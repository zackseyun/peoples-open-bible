translation:
  language: es
  text: 'Y así le sucedió: el pueblo lo pisoteó en la puerta[a][b], y murió.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y así fue para él», es decir, los acontecimientos ocurrieron exactamente como se había dicho.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «junto a la puerta» o «en el portal». El término hebreo puede referirse al área de la puerta de la ciudad o al complejo de entrada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לוֹ כֵן
  english_pob_choice: And so it happened to him
  chosen_spanish: Y así le sucedió
  alternatives_spanish:
  - Y así le aconteció
  - Y así fue para él
  - Y ocurrió así para él
  lexicon: HALOT
  rationale: La expresión hebrea con היה + ל + pronombre + כן comunica que los hechos ocurrieron exactamente como se había dicho. «Y así le sucedió» es natural en español y conserva el sentido de cumplimiento sin explicitar más de lo que el hebreo dice.
- source_word: וַיִּרְמְסוּ
  english_pob_choice: trampled
  chosen_spanish: lo atropelló
  alternatives_spanish:
  - lo pisotearon
  - lo aplastaron bajo los pies
  - lo pisotearon y aplastaron
  lexicon: HALOT
  rationale: רמס denota pisotear/trampear bajo los pies. «Atropelló» aquí se usa en sentido figurado y narrativo de ser embestido y pisoteado por la multitud; sin embargo, la alternativa más directa en español bíblico sería «lo pisotearon». Se conserva la fuerza violenta del verbo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la multitud
  - el pueblo entero
  lexicon: HALOT
  rationale: עם designa al conjunto de personas. «El pueblo» mantiene la referencia formal al colectivo hebreo y sigue de cerca la elección inglesa, aunque en español «la multitud» también podría captar el movimiento de aglomeración.
- source_word: בַּשַּׁעַר
  english_pob_choice: in the gate
  chosen_spanish: en la puerta
  alternatives_spanish:
  - en la puerta de la ciudad
  - en el portón
  - en la entrada
  lexicon: HALOT
  rationale: שַׁעַר puede referirse al área de la puerta/portón de la ciudad o al complejo de acceso. «En la puerta» es claro y natural en español, y conserva el sentido del espacio de acceso urbano sin sobreespecificar.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y así murió
  - y falleció
  lexicon: HALOT
  rationale: El waw consecutivo se rinde de manera simple y directa. «Y murió» reproduce la narración sin añadir una relación causal explícita que ya se desprende del contexto inmediato.
theological_decisions:
- issue: Cumplimiento narrativo sin comentario teológico explícito
  english_pob_reading: The verse is rendered to show that the officer's fate occurred exactly as foretold, without adding explicit theological commentary in the main text.
  chosen_spanish_reading: 'El verso se traduce como un relato de cumplimiento exacto: lo anunciado se cumple en los hechos, sin insertar una glosa teológica en el cuerpo principal.'
  alternative_spanish_readings:
  - «Así cayó sobre él el juicio»
  - «Se cumplió sobre él lo anunciado»
  rationale: El hebreo narra el desenlace de forma directa. La traducción mantiene ese carácter narrativo y deja que el contexto previo muestre el vínculo con la profecía, sin resolver la tensión con una explicitación interpretativa excesiva.
  doctrine_reference: Preservar la tensión entre narración y cumplimiento profético; primacía del texto original frente a la tradición interpretativa.
translation_notes:
  revision_awareness: El último pase de revisión indicó alta concordancia y no introdujo cambios; se mantiene la solución ya aprobada, con adaptación al español y conservación de las alternativas léxicas pertinentes.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como convención general del proyecto, pero en este versículo no aparece el nombre divino.
  - Se elige una formulación breve y directa para reflejar el hebreo narrativo sin cargar el texto con interpretaciones.
  - Se usa «el pueblo» para mantener el referente colectivo del hebreo עם.
  - Las notas al pie distinguen la alternativa de cumplimiento idiomático y la ambigüedad espacial de שַׁעַר.
