translation:
  language: es
  text: Sean avergonzados y humillados los que buscan mi vida[a]; vuelvan atrás y queden avergonzados los que maquinan mi daño[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los que buscan mi alma'; el hebreo usa un modismo que significa buscar la vida de alguien.
    reason: lexical_alternative
  - marker: b
    text: O 'los que maquinan mal contra mí'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵבֹשׁוּ
  english_pob_choice: be put to shame
  chosen_spanish: Sean avergonzados
  alternatives_spanish:
  - sean puestos en vergüenza
  - sean humillados
  lexicon: HALOT
  rationale: El hebreo qal de בוש expresa experimentar vergüenza o quedar avergonzado. En español, 'sean avergonzados' conserva bien la fuerza desiderativa/imprecatoria del contexto sin volverlo meramente descriptivo.
- source_word: וְיִכָּלְמוּ
  english_pob_choice: and humiliated
  chosen_spanish: y humillados
  alternatives_spanish:
  - y deshonrados
  - y confundidos
  lexicon: HALOT
  rationale: כלם en nifal intensifica el campo semántico de vergüenza/deshonra. 'Humillados' mantiene el matiz pasivo/resultativo y la progresión del paralelismo.
- source_word: מְבַקְשֵׁי נַפְשִׁי
  english_pob_choice: those who seek my life
  chosen_spanish: los que buscan mi vida
  alternatives_spanish:
  - los que buscan mi alma
  - los que me buscan
  lexicon: HALOT
  rationale: El hebreo con נֶפֶשׁ en este giro hostil es un modismo para buscar la vida de alguien, es decir, querer matarlo. 'Mi vida' es la opción más natural y fiel en español.
- source_word: יִסֹּגוּ אָחוֹר
  english_pob_choice: turn back
  chosen_spanish: vuelvan atrás
  alternatives_spanish:
  - retrocedan
  - se vuelvan hacia atrás
  lexicon: HALOT
  rationale: סוג con אָחוֹר expresa retirada o reversión. 'Vuelvan atrás' reproduce el sentido idiomático y el movimiento de derrota deseado en el salmo.
- source_word: וְיַחְפְּרוּ
  english_pob_choice: and be disgraced
  chosen_spanish: y queden avergonzados
  alternatives_spanish:
  - y sean deshonrados
  - y sean confundidos
  lexicon: HALOT
  rationale: חפר en este contexto pertenece al campo de la vergüenza y la deshonra, no a un sentido literal de cavar. 'Queden avergonzados' mantiene la relación con los verbos previos sin introducir una diferencia artificial demasiado fuerte en español.
- source_word: חֹשְׁבֵי רָעָתִי
  english_pob_choice: those who devise my harm
  chosen_spanish: los que maquinan mi mal
  alternatives_spanish:
  - los que maquinan mi daño
  - los que idean mal contra mí
  lexicon: HALOT
  rationale: חשב implica planear o idear con intención. רָעָה con sufijo de primera persona en este contexto apunta al mal/daño dirigido contra el salmista. 'Maquinan mi mal' es breve, natural y conserva la intención hostil.
theological_decisions:
- issue: Fuerza imprecatoria y valor verbal
  english_pob_reading: 'The English POB renders the verbs as petitions/wishes: ''Let ... be put to shame ... let ... turn back ...'''
  chosen_spanish_reading: 'Se expresa como deseo/petición implícita: ''Sean avergonzados... vuelvan atrás...'''
  alternative_spanish_readings:
  - Serán avergonzados... volverán atrás...
  - Que sean avergonzados... que vuelvan atrás...
  rationale: En el contexto oracional del salmo, los imperfectos funcionan de modo volitivo/imprecatorio. El español admite el subjuntivo exhortativo sin necesidad de añadir 'que', y así conserva la dimensión de súplica y juicio pedido a Dios.
  doctrine_reference: Translation philosophy §1, §3
- issue: Idiomático de נֶפֶשׁ en contexto hostil
  english_pob_reading: The English POB notes that 'those who seek my soul' would be a lexical alternative, but 'my life' best reflects the idiom.
  chosen_spanish_reading: '''Mi vida'' en el texto principal, no ''mi alma''.'
  alternative_spanish_readings:
  - mi alma
  - mí
  rationale: En español, 'alma' podría sugerir el yo interior o el aspecto espiritual y oscurecería el hebraísmo. 'Mi vida' comunica con claridad el objetivo violento implícito en el modismo.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés revisado: mantiene la secuencia de dos pares verbales de vergüenza/deshonra, conserva el modismo de ''buscar mi vida'' y refleja la revisión final de חֹשְׁבֵי como un verbo de ideación/maquinación más formal que ''plot''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se evita 'Cristo/Mesías' porque no hay terminología mesiánica en el versículo.
  - '''Vida'' traduce נֶפֶשׁ en el modismo hostil, coherente con el criterio POB de preservar el valor idiomático y no una traducción mecánica de ''alma''.'
  - Los dos pares de verbos se mantienen diferenciados con 'avergonzados/humillados' y 'vuelvan atrás/queden avergonzados' para no borrar el paralelismo del hebreo.
