translation:
  language: es
  text: Porque ahora cuentas mis pasos[a]; no mantienes vigilancia sobre mi pecado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «numeras mis pasos».
    reason: lexical_alternative
  - marker: b
    text: O «no vigilas mi pecado» o «no estás atento a mi pecado».
