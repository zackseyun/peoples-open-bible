translation:
  language: es
  text: y su ofrenda de cereal y sus libaciones, para los toros, para los carneros y para los corderos, según su número, conforme a la norma establecida[a];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según el procedimiento prescrito». El hebreo כַּמִּשְׁפָּט se refiere a la regla o manera establecida para estas ofrendas.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָתָם
  english_pob_choice: their grain offering
  chosen_spanish: su ofrenda de cereal
  alternatives_spanish:
  - su ofrenda
  - su ofrenda vegetal
  lexicon: HALOT
  rationale: En contexto sacrificial, מִנְחָה designa la ofrenda que acompaña al holocausto; en español, «ofrenda de cereal» conserva el sentido técnico sin sonar tan arcaico como otras opciones, y mantiene la precisión cultual del hebreo.
- source_word: נִסְכֵּיהֶם
  english_pob_choice: their drink offerings
  chosen_spanish: sus libaciones
  alternatives_spanish:
  - sus ofrendas líquidas
  - sus ofrendas de bebida
  lexicon: HALOT
  rationale: נֶסֶךְ se refiere a la ofrenda derramada de líquido. «Libaciones» es exacto y reconocido en español bíblico; «sus libaciones» preserva el carácter ritual del término.
- source_word: לַפָּרִים
  english_pob_choice: for the bulls
  chosen_spanish: para los toros
  alternatives_spanish:
  - para los bueyes
  - para los novillos
  lexicon: HALOT
  rationale: El hebreo distribuye las ofrendas asociadas a cada clase de animal. «Toros» comunica bien el referente sacrificial en español general y mantiene la relación distributiva del ל.
- source_word: לָאֵילִם
  english_pob_choice: for the rams
  chosen_spanish: para los carneros
  alternatives_spanish:
  - para los machos de oveja
  lexicon: HALOT
  rationale: אֵילִים se refiere a carneros, el equivalente natural en español para el animal sacrificial listado.
- source_word: וְלַכְּבָשִׂים
  english_pob_choice: and for the lambs
  chosen_spanish: y para los corderos
  alternatives_spanish:
  - y para los borregos
  lexicon: HALOT
  rationale: כְּבָשִׂים corresponde a corderos en este contexto litúrgico; esta elección es clara y estándar en español.
- source_word: בְּמִסְפָּרָם
  english_pob_choice: according to their number
  chosen_spanish: según su número
  alternatives_spanish:
  - de acuerdo con su número
  - por su número
  lexicon: HALOT
  rationale: La preposición בְּ con מִסְפָּרָם indica correspondencia proporcional con la cantidad de animales. «Según su número» es idiomático y conserva la idea de asignación en proporción.
- source_word: כַּמִּשְׁפָּט
  english_pob_choice: according to the ordinance
  chosen_spanish: conforme al estatuto
  alternatives_spanish:
  - según el rito prescrito
  - conforme a la norma
  lexicon: HALOT
  rationale: Aquí מִשְׁפָּט tiene un sentido legal-cultual de procedimiento establecido. «Estatuto» refleja bien esa norma prescrita y evita reducirlo solo a un «orden» abstracto; además conserva la tensión entre regla y procedimiento ritual que el POB inglés nota en su alternativa.
translation_notes:
  revision_awareness: El texto coincide de manera alta con el original hebreo y con la auditoría inglesa; no se registran revisiones aplicadas en el paquete fuente. Se ha mantenido la distribución ritual de las ofrendas y la nota alternativa para כַּמִּשְׁפָּט, siguiendo la tensión lexical documentada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto cuando el tetragrámaton aparezca; en este versículo no ocurre.
  - Se usa un registro bíblico moderno y sobrio, evitando calcos innecesarios.
  - «Ofrenda de cereal» y «libaciones» sostienen el lenguaje técnico sacrificial sin sustituirlo por términos más genéricos.
