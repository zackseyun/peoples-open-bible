id: PSA.102.11
reference: Psalms 102:11
source:
  edition: WLC
  text: מִ/פְּנֵֽי זַֽעַמְ/ךָ֥ וְ/קִצְפֶּ֑/ךָ כִּ֥י נְ֝שָׂאתַ֗/נִי וַ/תַּשְׁלִיכֵֽ/נִי־׃
translation:
  text: because of your indignation and your wrath[a], for you have lifted me up and cast me away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and cast me away.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - from before
  - on account of
  lexicon: HALOT
  rationale: 'In this causal construction with divine anger terms following, the preposition with פָּנִים functions idiomatically to express cause: ''because of'' or ''on account of,'' not spatial ''from before.'''
- source_word: זַעַמְךָ
  chosen: your indignation
  alternatives:
  - your anger
  - your fury
  lexicon: HALOT
  rationale: זַעַם denotes strong anger or indignation. 'Indignation' preserves the elevated poetic register and distinguishes it slightly from the following קצף rather than flattening both to the same English word.
- source_word: וְקִצְפֶּךָ
  chosen: and your wrath
  alternatives:
  - and your anger
  - and your fury
  lexicon: HALOT
  rationale: קֶצֶף commonly denotes wrath. Rendering it as 'wrath' maintains the poetic pairing with זַעַם while preserving a distinction between the two near-synonyms.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Here כִּי introduces the explanatory ground for the psalmist''s condition: ''for/because you have lifted me up and thrown me away.'' ''For'' fits English poetic style and preserves the explanatory force.'
- source_word: נְשָׂאתַנִי
  chosen: you have lifted me up
  alternatives:
  - you have carried me
  - you have raised me
  lexicon: HALOT
  rationale: נשא has a broad semantic range including lift, carry, bear, raise. In this poetic image paired with 'thrown me away,' 'lifted me up' best preserves the vivid sequence of being picked up only to be cast aside.
- source_word: וַתַּשְׁלִיכֵנִי
  chosen: and thrown me away
  alternatives:
  - and cast me away
  - and hurled me away
  lexicon: HALOT
  rationale: שלך means throw/cast. 'Thrown me away' communicates both force and rejection in contemporary English. 'Cast me away' is a strong formal alternative, but slightly more archaic.
