translation:
  language: es
  text: ustedes que odian el bien y aman el mal, que arrancan[a] su piel de encima de ellos y su carne de encima de sus huesos—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les arrancan la piel y la carne de sus huesos».
    reason: alternative_reading
lexical_decisions:
- source_word: שֹׂנְאֵי
  english_pob_choice: hate
  chosen_spanish: odian
  alternatives_spanish:
  - son los que odian
  - quienes odian
  lexicon: HALOT
  rationale: El participio hebreo funciona aquí de manera sustantiva en un contexto de reprensión directa. En español, «odian» mantiene la fuerza de acusación inmediata y suena natural después del vocativo implícito, sin añadir una perífrasis innecesaria.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - el bueno
  lexicon: HALOT
  rationale: En el contraste moral con «mal», «el bien» comunica con claridad el sustantivo abstracto del hebreo y conserva la oposición ética breve y tajante.
- source_word: אֹהֲבֵי
  english_pob_choice: love
  chosen_spanish: aman
  alternatives_spanish:
  - son los que aman
  - quienes aman
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «odian» y el valor verbal del participio en una dirección acusatoria directa.
- source_word: רעה
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la maldad
  - lo malo
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «evil», en español bíblico «el mal» expresa con precisión la oposición moral paralela a «el bien» y resulta más idiomático que «la maldad» en este pareado breve.
- source_word: גֹּזְלֵי
  english_pob_choice: strip
  chosen_spanish: arrancan
  alternatives_spanish:
  - despojan
  - quitan por la fuerza
  - roban
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar arrebatar violentamente; en la metáfora corporal del verso, «arrancan» conserva mejor la crudeza física que un verbo más abstracto como «roban» o «despojan».
- source_word: עוֹרָם
  english_pob_choice: their skin
  chosen_spanish: su piel
  alternatives_spanish:
  - su piel
  lexicon: HALOT
  rationale: «Piel» es el equivalente natural y exacto en español para el cuerpo humano; «su» refleja el posesivo plural hebreo.
- source_word: מֵעֲלֵיהֶם
  english_pob_choice: from off them
  chosen_spanish: de sobre ellos
  alternatives_spanish:
  - de ellos
  - de encima de ellos
  lexicon: HALOT
  rationale: La construcción hebrea tiene un matiz espacial intensivo. «De sobre ellos» preserva esa imagen mejor que el simple «de ellos».
- source_word: וּשְׁאֵרָם
  english_pob_choice: their flesh
  chosen_spanish: su carne
  alternatives_spanish:
  - su cuerpo
  - su carne
  lexicon: HALOT
  rationale: En español, «carne» reproduce con mayor fidelidad el sentido anatómico y la imagen de desmembramiento que «cuerpo», y mantiene el paralelo con piel y huesos.
- source_word: מֵעַל עַצְמוֹתָם
  english_pob_choice: from off their bones
  chosen_spanish: de sobre sus huesos
  alternatives_spanish:
  - de encima de sus huesos
  - de sus huesos
  lexicon: HALOT
  rationale: Se conserva el paralelismo con «de sobre ellos» y la imaginería violenta del original. La preposición compuesta evita suavizar el cuadro a un simple «de sus huesos».
theological_decisions:
- issue: Violencia metafórica de explotación extrema
  english_pob_reading: Retain the graphic skin-and-bones imagery as a metaphor of extreme oppression rather than softening it into abstract exploitation language.
  chosen_spanish_reading: Mantener la imaginería corporal cruda —piel, carne, huesos— como metáfora de opresión depredadora extrema.
  alternative_spanish_readings:
  - parafrasear como «que los explotan sin piedad»
  - suavizar a una descripción más abstracta de abuso
  rationale: El hebreo usa imágenes deliberadamente chocantes para denunciar a los gobernantes corruptos. La traducción española debe conservar esa tensión y no resolverla en abstracciones que atenúen el impacto profético.
  doctrine_reference: Principio de primacía del original y preservación de la fuerza retórica profética; no neutralizar la metáfora.
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés de máxima concordancia: no se registraron revisiones aplicadas y el revisor confirmó acuerdo completo. La redacción española conserva esa misma lectura, con una sola nota para la variante léxica de la imaginería corporal.'
  spanish_consistency_notes:
  - Se usó «el bien / el mal» para mantener el contraste moral conciso del hebreo.
  - Se preservó la repetición espacial «de sobre» para reflejar el hebreo מֵעַל / מֵעֲלֵי sin atenuar la violencia.
  - Se eligió «carne» y «huesos» por su correspondencia anatómica directa y su papel en la metáfora de despojo.
  - El tono es de reprensión directa, por eso se prefirieron verbos en segunda persona plural implícita con participios traducidos de forma verbal.
