review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el griego y el rastro auditado en casi todos los puntos: ὃς δ’ ἂν = «pero cualquiera que», βλασφημήσῃ = «blasfeme», εἰς τὸ πνεῦμα τὸ ἅγιον = «contra el Espíritu Santo», οὐκ ἔχει ἄφεσιν εἰς τὸν αἰῶνα = «nunca tiene perdón», y αἰωνίου ἁμαρτήματος = «de un pecado eterno». También preserva correctamente la variante textual en nota. El único desajuste relevante es la nota b: el inglés auditado conserva la alternativa «is liable to an eternal sin», que en español debe reflejarse mejor como «está expuesto a / queda sujeto a un pecado eterno» o similar, no «es responsable de», que cambia el matiz semántico de ἔνοχος.'
  spanish_quality_summary: El texto principal es claro, natural y de registro digno. «Nunca tiene perdón» suena idiomático en español y comunica bien εἰς τὸν αἰῶνα en contexto negativo. La puntuación y legibilidad son buenas. Solo conviene reparar la formulación de la nota léxica alternativa para no introducir un matiz jurídico menos preciso.
  glossary_alignment: 'La terminología del proyecto está bien respetada: «Espíritu Santo» para πνεῦμα τὸ ἅγιον, «perdón» para ἄφεσις, y «pecado eterno» para αἰωνίου ἁμαρτήματος conforme al SBLGNT. No hay conflicto con las directrices sobre Yahvé, Mesías/Cristo, esclavo, etc. La decisión «culpable» en el texto principal es adecuada; la alternativa en nota debe alinearse mejor con el valor de ἔνοχος como «liable/sujeto a».'
  issues:
  - severity: medium
    issue: La nota b traduce la alternativa de ἔνοχός ἐστιν como «es responsable de un pecado eterno».
    rationale: «Responsable de» no reproduce con precisión el matiz de ἔνοχος en este contexto, que según el rastro auditado es «liable to» más que agencia causal o mera responsabilidad. En español suena más fiel «está sujeto a un pecado eterno» o «queda expuesto a un pecado eterno».
  revised_spanish_text: pero cualquiera que blasfeme contra el Espíritu Santo nunca tiene perdón[a], sino que es culpable de un pecado eterno[b][c].
  revised_footnotes:
  - marker: a
    text: 'Literalmente: «no tiene perdón hacia la era», es decir, «nunca tiene perdón» o «no tiene perdón para siempre».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «está sujeto a un pecado eterno».'
    reason: lexical_alternative
  - marker: c
    text: Algunos manuscritos leen «juicio eterno» o «condenación eterna» en lugar de «pecado eterno».
    reason: textual_variant
  revision_rationale: El texto principal puede mantenerse. Se ajusta solo la nota b para reflejar con mayor fidelidad la alternativa documentada para ἔνοχος («liable to») y se pule la puntuación de la nota a quitando comillas externas innecesarias.
