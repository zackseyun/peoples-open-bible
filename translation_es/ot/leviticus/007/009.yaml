translation:
  language: es
  text: Y toda ofrenda de cereal[a] que se hornee en el horno, y todo lo preparado en sartén o sobre una plancha[b], pertenecerá al sacerdote que la presente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'ofrenda de grano'.
    reason: lexical_alternative
  - marker: b
    text: O 'hecho en una sartén honda o sobre una plancha plana'. Los dos términos hebreos para utensilios probablemente se refieren a implementos de cocción distintos.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָה
  english_pob_choice: grain offering
  chosen_spanish: ofrenda de cereal
  alternatives_spanish:
  - ofrenda
  - ofrenda vegetal
  - ofrenda de grano
  lexicon: HALOT
  rationale: En el contexto sacrificial levítico, מִנְחָה no es una ofrenda cualquiera, sino la ofrenda de cereal/grano. 'Ofrenda de cereal' mantiene el sentido cultual sin depender de una fórmula eclesiástica tradicional.
- source_word: תֵּאָפֶה בַּתַּנּוּר
  english_pob_choice: is baked in the oven
  chosen_spanish: se hornee en el horno
  alternatives_spanish:
  - se cueza en el horno
  - sea cocida en el horno
  lexicon: HALOT
  rationale: El verbo pasivo transmite bien con 'se hornee'. 'Horno' conserva el referente concreto del utensilio. Mantiene el valor de preparación por cocción sin añadir matices ajenos al texto.
- source_word: נַעֲשָׂה
  english_pob_choice: prepared
  chosen_spanish: lo preparado
  alternatives_spanish:
  - hecho
  - cocinado
  - preparado
  lexicon: HALOT
  rationale: En este contexto de ofrendas, 'preparado' es la opción más natural y suficientemente amplia para no sobreespecificar el método. El participio sustantivado evita repetir un verbo innecesario.
- source_word: בַּמַּרְחֶשֶׁת
  english_pob_choice: pan
  chosen_spanish: sartén
  alternatives_spanish:
  - pan
  - cazuela
  - recipiente hondo para cocinar
  lexicon: HALOT
  rationale: El término designa un utensilio de cocina; 'sartén' comunica bien al lector español una vasija de cocción distinta de la siguiente. Aunque 'pan' es posible, 'sartén' resulta más idiomático y claro.
- source_word: וְעַל מַחֲבַת
  english_pob_choice: or on a griddle
  chosen_spanish: o sobre plancha
  alternatives_spanish:
  - o sobre una plancha
  - o sobre griddle
  - o sobre comal
  lexicon: HALOT
  rationale: '''Plancha'' refleja un utensilio más plano y distingue el objeto del anterior. Se evita ''comal'' por regionalidad, y ''griddle'' por no ser natural en español bíblico.'
- source_word: לַכֹּהֵן
  english_pob_choice: shall belong to the priest
  chosen_spanish: pertenecerá al sacerdote
  alternatives_spanish:
  - será del sacerdote
  - quedará para el sacerdote
  lexicon: HALOT
  rationale: La preposición ל indica asignación/posesión. 'Pertenecerá' expresa con claridad la transferencia legal del derecho sobre la ofrenda y preserva el sentido distributivo del original.
- source_word: הַמַּקְרִיב
  english_pob_choice: who presents
  chosen_spanish: que la presente
  alternatives_spanish:
  - que la ofrece
  - que la presenta
  lexicon: HALOT
  rationale: El participio hifil de קרב en contexto sacrificial es 'presentar/ofrecer'. 'Presente' suena natural en español y mantiene el registro ritual sin caer en una traducción arcaizante.
- source_word: אֹתָהּ
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - la
  - esa
  - la ofrenda
  lexicon: HALOT
  rationale: El pronombre femenino remite a la ofrenda. En español conviene mantener la referencia directa con 'la' para evitar pesadez y conservar la cohesión sintáctica.
- source_word: לוֹ תִהְיֶה
  english_pob_choice: shall belong to
  chosen_spanish: pertenecerá
  alternatives_spanish:
  - será suya
  - le corresponderá
  - será para él
  lexicon: HALOT
  rationale: La construcción expresa asignación legal. 'Pertenecerá' une claridad idiomática y fuerza jurídica, sin borrar la relación de posesión que el hebreo establece.
translation_notes:
  revision_awareness: El texto sigue de cerca el testimonio hebreo masorético y coincide sustancialmente con la lectura auditada en inglés. Se conserva la distinción entre los dos utensilios de cocción, pero en español se optó por términos naturales y reconocibles ('sartén' y 'plancha') en lugar de calcos menos transparentes.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparece el Tetragrámaton; este versículo no lo contiene.
  - '''Ofrenda de cereal'' se usa aquí en continuidad con el valor cultual de מִנְחָה.'
  - '''Sacerdote'' se conserva por ser el término español estándar para כֹּהֵן en este contexto ritual.'
  - '''Pertenecerá'' expresa la asignación legal sin recurrir a una fórmula arcaica.'
