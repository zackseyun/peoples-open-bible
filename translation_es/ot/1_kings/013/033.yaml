translation:
  language: es
  text: Después de este hecho[a], Jeroboam no se apartó de su mal camino, sino que otra vez hizo sacerdotes de los lugares altos de entre todo el pueblo. A cualquiera que lo deseara, lo investía[b], y llegaba a ser uno de los sacerdotes de los lugares altos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'después de esta cosa/hecho'; דָּבָר puede significar 'cosa', 'asunto' o 'hecho'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'le llenaba la mano', un modismo hebreo para instalar o consagrar a alguien para servicio sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַר הַדָּבָר הַזֶּה
  english_pob_choice: After this event
  chosen_spanish: Después de este hecho
  alternatives_spanish:
  - Después de este evento
  - Después de esta cosa
  lexicon: HALOT
  rationale: דָּבָר puede significar 'palabra', 'cosa' o 'asunto/hecho'. 'Después de este hecho' comunica con naturalidad la referencia narrativa sin alejarse del hebreo.
- source_word: לֹא שָׁב ... מִדַּרְכּוֹ הָרָעָה
  english_pob_choice: did not turn from his evil way
  chosen_spanish: no se volvió de su mal camino
  alternatives_spanish:
  - no se arrepintió de su mal camino
  - no regresó de su mal camino
  lexicon: HALOT
  rationale: שׁוּב conserva la imagen concreta de volverse/volver. En español, 'no se volvió de su mal camino' mantiene esa metáfora sin introducir de lleno el lenguaje teológico de 'arrepentirse' como lectura principal.
- source_word: וַיָּשָׁב
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - y volvió
  - y regresó
  lexicon: HALOT
  rationale: El segundo שׁוּב funciona idiomáticamente con el verbo siguiente para indicar repetición. 'Otra vez' expresa esa repetición de manera natural en español.
- source_word: וַיַּעַשׂ מִקְצוֹת הָעָם כֹּהֲנֵי בָמוֹת
  english_pob_choice: made priests of the high places from among all the people
  chosen_spanish: hizo sacerdotes de los lugares altos de entre todo el pueblo
  alternatives_spanish:
  - hizo sacerdotes de los lugares altos de entre la gente
  - escogió sacerdotes de los lugares altos de entre todo el pueblo
  lexicon: HALOT
  rationale: מִקְצוֹת הָעָם es idiomático y apunta a personas tomadas del conjunto del pueblo sin restricción adecuada. 'De entre todo el pueblo' preserva la amplitud y la indiscriminación del gesto.
- source_word: כֹּהֲנֵי בָמוֹת
  english_pob_choice: priests of the high places
  chosen_spanish: sacerdotes de los lugares altos
  alternatives_spanish:
  - sacerdotes para los lugares altos
  - sacerdotes de los santuarios altos
  lexicon: HALOT
  rationale: בָּמוֹת se refiere a santuarios/localidades de culto elevadas e ilegítimas en este contexto. 'Lugares altos' es la equivalencia estable y más reconocible en español bíblico, sin reemplazarla por una formulación eclesiástica tradicional no requerida por el texto.
- source_word: הֶחָפֵץ
  english_pob_choice: Whoever desired it
  chosen_spanish: Al que lo deseaba
  alternatives_spanish:
  - El que deseaba
  - Quienquiera que lo quisiera
  lexicon: HALOT
  rationale: El participio con artículo tiene sentido genérico. 'Al que lo deseaba' conserva el valor abierto y personal de la fórmula, en español más fluido que una traducción demasiado literal.
- source_word: יְמַלֵּא אֶת יָדוֹ
  english_pob_choice: he ordained him
  chosen_spanish: lo instalaba
  alternatives_spanish:
  - le llenaba la mano
  - lo ordenaba
  - lo consagraba
  lexicon: HALOT
  rationale: El hebreo usa un modismo para instalar o consagrar a un servicio sacerdotal. 'Lo instalaba' comunica la función del gesto y deja espacio para la nota que preserve el modismo literal.
- source_word: וִיהִי כֹּהֲנֵי בָמוֹת
  english_pob_choice: and he became one of the priests of the high places
  chosen_spanish: y llegó a ser uno de los sacerdotes de los lugares altos
  alternatives_spanish:
  - y llegó a ser sacerdote de los lugares altos
  - y fue uno de los sacerdotes de los lugares altos
  lexicon: HALOT
  rationale: El hebreo tiene predicado plural con sujeto singular, indicando incorporación al grupo. 'Llegó a ser uno de...' hace explícita esa pertenencia sin perder el sentido colectivo.
theological_decisions:
- issue: Si traducir שׁוּב en clave moral como 'arrepentirse'
  english_pob_reading: did not turn from his evil way
  chosen_spanish_reading: no se volvió de su mal camino
  alternative_spanish_readings:
  - no se arrepintió de su mal camino
  - no se convirtió de su mal camino
  rationale: El texto describe un cambio moral que el hebreo expresa con la imagen concreta de volver/turnar. Se evita importar un tecnicismo teológico como lectura principal donde el verbo no lo exige.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo reflejar en español el modismo sacerdotal יְמַלֵּא אֶת יָדוֹ
  english_pob_reading: he ordained him
  chosen_spanish_reading: lo instalaba
  alternative_spanish_readings:
  - lo consagraba
  - le llenaba la mano
  rationale: El modismo señala instalación en servicio sacerdotal. 'Lo instalaba' comunica el efecto funcional en español, mientras la nota preserva el sentido literal para auditoría textual.
  doctrine_reference: Translation philosophy §5, §6
translation_notes:
  revision_awareness: La versión inglesa revisada ajustó 'priests of the high places' a 'priests of the high places' con artículo definido. En español se refleja de manera natural como 'sacerdotes de los lugares altos', manteniendo la referencia definida sin añadir énfasis no sustentado por el hebreo.
  spanish_consistency_notes:
  - Se conserva 'Jeroboam' como nombre propio sin adaptación.
  - '''lugares altos'' se usa consistentemente para בָמוֹת.'
  - Se mantiene el paralelismo entre la negativa inicial ('no se volvió') y la acción posterior ('otra vez hizo').
  - Se evita 'SEÑOR' porque el versículo no contiene el Tetragrámaton ni cita directa del nombre divino.
