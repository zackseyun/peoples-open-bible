review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: כִּי como conector explicativo, הַמֶּלֶךְ como sujeto definido, confianza en Yahvé, y la estabilidad resultante por medio de/bajo חֶסֶד del Altísimo. Sin embargo, el anclaje de notas está invertido respecto a su contenido: la nota [a] está colocada en «Yahvé» pero explica la preposición y חֶסֶד; la nota [b] está colocada en «sacudido» pero en realidad esa es la nota correcta para יִמּוֹט. Además, «fidelidad constante» para חֶסֶד es posible, pero en el texto principal pierde el matiz afectivo-relacional destacado por la POB inglesa con «steadfast love»; «amor fiel» o «amor constante» preserva mejor el equilibrio, dejando «fidelidad de pacto» para nota.'
  spanish_quality_summary: El español es claro y digno. «Porque» suena natural, aunque «Pues» también sería posible en contexto poético. La frase «por la fidelidad constante del Altísimo» es comprensible pero algo menos idiomática y menos cercana al matiz usual de חֶסֶד que «por el amor fiel del Altísimo». El resto del verso fluye bien.
  glossary_alignment: Se alinea correctamente con el glosario del proyecto en «Yahvé» para יהוה y «Altísimo» para עֶלְיוֹן. No hay conflicto terminológico mayor, pero חֶסֶד en el texto principal conviene representarlo con una formulación que no reduzca demasiado el campo semántico; «amor fiel» mantiene mejor la combinación de amor leal y fidelidad pactual. Las notas deben usar marcadores únicos y colocarse donde corresponde en el texto.
  issues:
  - severity: high
    issue: Marcador de nota [a] anclado en el lugar equivocado
    rationale: La nota [a] explica «por la fidelidad constante del Altísimo» y la ambigüedad de la preposición con חֶסֶד, pero en el texto está colocada tras «Yahvé». Esto incumple la disciplina de notas y puede inducir a error al lector.
  - severity: medium
    issue: Renderización principal de חֶסֶד como «fidelidad constante»
    rationale: Aunque defendible, suena algo abstracta y atenúa el componente de amor leal/amor firme que la POB inglesa conservó con «steadfast love». En español bíblico y eclesial, «amor fiel» comunica mejor el conjunto semántico.
  - severity: low
    issue: La nota [a] omite la alternativa más natural en español para steadfast love
    rationale: La nota menciona «amor leal» y «fidelidad de pacto», pero dado el ajuste recomendado al texto principal conviene armonizarla con «amor fiel» como formulación principal y dejar las otras como alternativas.
  revised_spanish_text: Porque el rey confía en Yahvé, y por el amor fiel[a] del Altísimo no será sacudido[b].
  revised_footnotes:
  - marker: a
    text: O «por el amor constante del Altísimo»; la preposición hebrea puede entenderse de modo instrumental o locativo, y חֶסֶד también puede traducirse «fidelidad de pacto».
    reason: lexical_alternative
  - marker: b
    text: O «no será movido» o «no vacilará».
    reason: lexical_alternative
  revision_rationale: La revisión corrige el anclaje de las notas para que coincidan con las palabras que explican y ajusta חֶסֶד en el texto principal a «amor fiel», una opción más natural en español y más cercana al equilibrio semántico de «steadfast love» con posibilidad de matiz pactual mantenida en la nota. Se conserva «Yahvé», «Altísimo» y «no será sacudido», que son fieles al hebreo y al criterio del proyecto.
