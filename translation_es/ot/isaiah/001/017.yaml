translation:
  language: es
  text: Aprendan a hacer el bien; busquen la justicia, corrijan al opresor[a]; hagan justicia al huérfano, aboguen por la viuda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al oprimido» o «enderecen al oprimido». El hebreo es difícil, y חָמוֹץ puede entenderse de otra manera.
    reason: alternative_reading
lexical_decisions:
- source_word: לִמְדוּ
  english_pob_choice: Learn
  chosen_spanish: Aprendan
  alternatives_spanish:
  - Aprended
  - Aprendan a
  lexicon: HALOT
  rationale: El imperativo plural pide una exhortación directa. «Aprendan» comunica una instrucción formativa y natural en español moderno, manteniendo el valor de aprendizaje/práctica del verbo למד.
- source_word: הֵיטֵב
  english_pob_choice: to do good
  chosen_spanish: a hacer el bien
  alternatives_spanish:
  - bien
  - a obrar bien
  - a hacer lo bueno
  lexicon: HALOT
  rationale: El adverbio modifica la serie imperativa con un sentido ético. En español, «hacer el bien» expresa de forma clara e idiomática el contenido moral implícito, sin sobretraducir.
- source_word: דִּרְשׁוּ
  english_pob_choice: seek
  chosen_spanish: busquen
  alternatives_spanish:
  - busquen con empeño
  - procuren
  lexicon: HALOT
  rationale: דרש en este contexto exhorta a perseguir activamente algo valioso. «Busquen» es una equivalencia directa y comprensible, preservando la fuerza del mandato.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - lo recto
  - la rectitud
  lexicon: HALOT
  rationale: En el marco profético-social, משפט designa justicia en sentido legal y moral. «La justicia» es la opción más natural y fiel al contexto.
- source_word: אַשְּׁרוּ
  english_pob_choice: correct
  chosen_spanish: corrijan
  alternatives_spanish:
  - pongan derecho
  - enderezan
  - rectifiquen
  lexicon: HALOT
  rationale: El verbo en piel sugiere enderezar o poner en orden una situación. «Corrijan» conserva la idea de rectificación con un español claro y sobrio.
- source_word: חָמוֹץ
  english_pob_choice: the oppressor
  chosen_spanish: al opresor
  alternatives_spanish:
  - al oprimido
  - al violento
  - al injusto
  lexicon: HALOT
  rationale: 'Se sigue la lectura activa adoptada en el POB inglés: una persona que oprime o comete injusticia. «Al opresor» mantiene la tensión léxica documentada; la lectura pasiva queda preservada en nota.'
- source_word: שִׁפְטוּ
  english_pob_choice: judge for
  chosen_spanish: hagan justicia a
  alternatives_spanish:
  - juzguen por
  - defiendan a
  - fallen en favor de
  lexicon: HALOT
  rationale: שפט aquí expresa dictar o administrar justicia en favor de alguien. «Hagan justicia a» conserva el registro jurídico y resulta idiomático en español.
- source_word: יָתוֹם
  english_pob_choice: the fatherless
  chosen_spanish: el huérfano
  alternatives_spanish:
  - el desamparado sin padre
  - el niño sin padre
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «el padreless», en español bíblico y contemporáneo «huérfano» transmite la misma categoría social vulnerable con mayor claridad natural.
- source_word: רִיבוּ
  english_pob_choice: plead for
  chosen_spanish: aboguen por
  alternatives_spanish:
  - intercedan por
  - litiguen por
  - defiendan la causa de
  lexicon: HALOT
  rationale: ריב tiene fuerza de contienda o alegato legal. «Aboguen por» comunica bien la función de defensa jurídica y mantiene el tono forense del pasaje.
- source_word: אַלְמָנָה
  english_pob_choice: the widow
  chosen_spanish: la viuda
  alternatives_spanish:
  - la viuda
  lexicon: HALOT
  rationale: Es la equivalencia estándar y exacta de אלמנה, una figura clave de vulnerabilidad social en el texto.
theological_decisions:
- issue: Lectura de אַשְּׁרוּ חָמוֹץ
  english_pob_reading: correct the oppressor
  chosen_spanish_reading: corrijan al opresor
  alternative_spanish_readings:
  - corrijan la opresión
  - ayuden al oprimido
  - pongan derecho al oprimido
  rationale: Se mantiene la lectura activa documentada en el POB inglés, porque el hebreo permite entender חָמוֹץ como un agente que oprime. La formulación española conserva esa tensión sin resolverla por paráfrasis, y la alternativa pasiva queda indicada en nota para no ocultar la ambigüedad real.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa auditada indica que no hubo cambios en la última pasada de revisión. Esta propuesta sigue ese estado estable, conservando la decisión léxica central sobre אַשְּׁרוּ חָמוֹץ y reflejando en español la misma ambigüedad documentada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo porque no aparece el nombre divino.
  - Se usa «la justicia» y no «juicio» por el contexto profético-social.
  - Se prefiere «el huérfano» a «el padreless» literal por naturalidad y claridad en español, sin cambiar el referente social.
  - Se conserva el registro imperativo plural con verbos en trato de ustedes, coherente con un español bíblico contemporáneo y público.
