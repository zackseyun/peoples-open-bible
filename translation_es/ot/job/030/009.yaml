  text: Y ahora he llegado a ser su canto[a], y soy para ellos un dicho[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su canción burlona»; el hebreo «su canto» probablemente lleva en este contexto un sentido de burla.
