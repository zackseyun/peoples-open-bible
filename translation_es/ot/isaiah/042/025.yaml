    text: 'O: «la furia de su ira».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la violencia / fiereza de la guerra».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «no entendió». El singular se refiere a Israel como pueblo personificado.'
    reason: alternative_reading
  - marker: d
    text: 'Literalmente: «no lo puso sobre el corazón».'
    reason: lexical_alternative
  revision_rationale: 'Se ajustó la redacción para reflejar mejor el hebreo y el estilo español natural: se reemplazó ''Así que'' por ''Por eso''; ''la fuerza de la batalla'' por ''el ímpetu de la batalla''; ''lo encendió todo alrededor'' por ''lo abrasó por todos lados''; y el modismo final por ''no se lo tomó a pecho'', dejando la literalidad en nota. También se suavizó ''ardió en él'' a ''ardía en él'' para una secuencia más natural en español con el efecto continuo del juicio.'
