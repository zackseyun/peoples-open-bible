translation:
  language: es
  text: Acerca a Aarón y a sus hijos a la entrada de la tienda de reunión, y lávalos con agua.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְהִקְרַבְתָּ
  english_pob_choice: bring ... near
  chosen_spanish: acerca
  alternatives_spanish:
  - trae ... cerca
  - presenta
  lexicon: HALOT
  rationale: El piel/hiphil de קרב expresa hacer que alguien se acerque; «acerca» conserva mejor el matiz causativo y el contexto ritual que un simple «trae». «Presenta» sería posible, pero añade una formalidad interpretativa menos explícita en español.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: convención bíblica española
  rationale: Se conserva el nombre propio con la adaptación gráfica habitual en español bíblico, que es clara y reconocible para el lector hispanohablante.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos varones
  alternatives_spanish:
  - sus hijos
  - sus descendientes
  lexicon: HALOT
  rationale: El hebreo señala descendencia masculina; sin embargo, en español «hijos varones» puede sonar más explícito de lo necesario para este versículo. La frase «sus hijos» mantiene la naturalidad y, en este contexto sacerdotal, sigue remitiendo adecuadamente a los varones de Aarón.
- source_word: פֶּתַח
  english_pob_choice: entrance
  chosen_spanish: entrada
  alternatives_spanish:
  - umbral
  - puerta
  lexicon: HALOT
  rationale: «Entrada» es el equivalente natural y preciso en español para el punto de acceso al recinto, sin sobrecargar el texto con un matiz arquitectónico más específico de lo que el hebreo exige.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - el tabernáculo de reunión
  - la tienda del encuentro
  lexicon: HALOT
  rationale: «Tienda de reunión» reproduce de forma directa la expresión tradicional del hebreo y evita sustituirla por «tabernáculo», que puede cargar una tradición eclesiástica no requerida por el texto. «Reunión» conserva el sentido del lugar designado para encontrarse.
- source_word: וְרָחַצְתָּ
  english_pob_choice: wash
  chosen_spanish: láv[a]los
  alternatives_spanish:
  - lava
  - baña
  lexicon: HALOT
  rationale: «Lavar» es la forma más natural en español para רחץ aquí; «bañar» sería más específico de inmersión o aseo corporal de lo que el texto afirma. Se mantiene el carácter ritual sin añadir detalles.
- source_word: בַּמָּיִם
  english_pob_choice: with water
  chosen_spanish: con agua
  alternatives_spanish:
  - en agua
  lexicon: HALOT
  rationale: Aunque el hebreo usa ב, en español la instrumentalidad se expresa naturalmente con «con agua». «En agua» es posible, pero menos idiomático en este contexto ritual.
translation_notes:
  revision_awareness: Concordancia alta con el texto fuente y el audit trail inglés; no se observan revisiones aplicadas ni tensiones textuales que requieran nota crítica adicional.
