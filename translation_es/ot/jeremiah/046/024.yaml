revisions:
- from: La hija de Egipto[a] es puesta en vergüenza; es entregada en manos de un pueblo del norte.
  to: La hija de Egipto es avergonzada; es entregada en la mano de[a] un pueblo del norte.
  rationale: Se corrige una formulación española poco idiomática («es puesta en vergüenza») por «es avergonzada», que conserva mejor el pasivo de juicio del hebreo en un español natural. También se reubica la nota al pie en la frase que realmente comenta y se alinea el texto principal con el modismo hebreo singular documentado en la auditoría inglesa.
