translation:
  language: es
  text: Ahora Noé tenía seiscientos años[a], y el diluvio estaba sobre la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Noé tenía seiscientos años de edad». El hebreo expresa literalmente una fórmula de edad idiomática.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y el diluvio era aguas sobre la tierra». El hebreo es más literalmente estructurado; el texto principal da el sentido idiomático en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/נֹחַ
  english_pob_choice: Now Noah
  chosen_spanish: Ahora Noé
  alternatives_spanish:
  - Y Noé
  lexicon: HALOT
  rationale: El וְ introduce la continuación narrativa; en español, «Ahora» funciona bien como enlace discursivo sin perder la relación con el verso anterior. El nombre propio se translitera como «Noé».
- source_word: בֶּן שֵׁשׁ מֵאֹות שָׁנָה
  english_pob_choice: was six hundred years old
  chosen_spanish: tenía seiscientos años
  alternatives_spanish:
  - era de seiscientos años
  - tenía seiscientos años de edad
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática («hijo de seiscientos años»). En español, «tenía seiscientos años» expresa con naturalidad el sentido de edad sin volverla mecánica.
- source_word: וְ/הַ/מַּבּוּל
  english_pob_choice: the flood
  chosen_spanish: el diluvio
  alternatives_spanish:
  - el flood
  - la inundación
  lexicon: HALOT
  rationale: מַבּוּל designa el gran diluvio bíblico. «Diluvio» es el término español más natural y reverente, y preserva mejor el alcance narrativo del pasaje que «inundación».
- source_word: הָיָה
  english_pob_choice: was
  chosen_spanish: estaba
  alternatives_spanish:
  - era
  - fue
  lexicon: HALOT
  rationale: El hebreo dice literalmente «era/estaba». En español, con un estado situado «sobre la tierra», «estaba» reproduce mejor la construcción resultativa sin introducir un verbo eventivo no atestiguado en el texto final.
- source_word: מַיִם
  english_pob_choice: waters
  chosen_spanish: —
  alternatives_spanish:
  - aguas
  - aguas del diluvio
  lexicon: HALOT
  rationale: El texto hebreo menciona explícitamente «aguas», pero la revisión inglesa optó por no repetir «waters» en el texto principal. En español, para no sobrecargar la frase ni forzar una estructura poco natural, se integra el sentido en «el diluvio» y se deja constancia de la tensión literal en la nota textual.
- source_word: עַל הָאָֽרֶץ
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - sobre la tierra/país
  lexicon: HALOT
  rationale: עַל se traduce de forma directa por «sobre». הָאָרֶץ puede significar «tierra» o «país/territorio»; en este contexto del diluvio universal, «la tierra» es la mejor equivalencia contextual en español.
theological_decisions:
- issue: Alcance de הָאָרֶץ
  english_pob_reading: earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - el territorio
  rationale: En el contexto del relato del diluvio, el sentido global es la tierra como esfera del juicio. «La tierra» mantiene ese alcance sin estrechar indebidamente el texto.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, con excepción documentada)
- issue: Relación entre «diluvio» y «aguas»
  english_pob_reading: the flood was upon the earth
  chosen_spanish_reading: el diluvio estaba sobre la tierra
  alternative_spanish_readings:
  - las aguas del diluvio estaban sobre la tierra
  - el diluvio vino sobre la tierra
  rationale: La elección conserva la estructura simple del hebreo sin añadir un verbo de llegada. Aunque el hebreo incluye «aguas», el español puede comunicar fielmente el cuadro narrativo con «diluvio»; la tensión literal se documenta en nota.
  doctrine_reference: Translation philosophy §3 (fidelidad al texto base con claridad idiomática)
translation_notes:
  revision_awareness: El borrador inglés pasó de una formulación más dinámica («when the floodwaters came upon the earth») a una más literal («and the flood was upon the earth»). Este draft español sigue la revisión más literal en la estructura principal, pero conserva en nota la tensión entre el hebreo, que menciona «aguas», y la fluidez idiomática en español.
  spanish_consistency_notes:
  - Se usa «Noé» para el nombre propio bíblico estándar.
  - Se conserva «diluvio» para מַבּוּל por consistencia con el léxico bíblico del relato de Génesis 6–9.
  - Se prefiere «tierra» para הָאָרֶץ en este contexto universal, no «país» ni «territorio».
  - Se evita «SEÑOR» u otras sustituciones irrelevantes; no hay léxico divino en este versículo.
  - Se mantiene un español moderno, sobrio y publicable, sin calco excesivo.
