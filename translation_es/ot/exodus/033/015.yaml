review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: condición sobre la presencia de Dios, ruego/prohibición subsiguiente, y la idea de no avanzar desde el lugar actual. También preserva correctamente la nota léxica sobre פָּנֶיךָ como «rostro»/«presencia». Sin embargo, «si tu presencia no va» suena algo poco natural en español bíblico claro, y «no nos hagas subir» es fiel pero puede afinarse para sonar más directo y natural sin perder el causativo.'
  spanish_quality_summary: La redacción es mayormente clara, pero «tu presencia no va» resulta algo brusca y menos idiomática que «no va con nosotros». Además, la ausencia de «con nosotros» deja implícita una relación de acompañamiento que el contexto y el participio הֹלְכִים comunican con fuerza. La frase revisada mejora la legibilidad y mantiene dignidad estilística.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Presencia» para פָּנֶיךָ está bien justificado, con alternativa literal en nota. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La revisión mantiene la decisión teológica documentada.
  issues:
  - severity: medium
    issue: «Si tu presencia no va» es poco idiomático en español
    rationale: Aunque formalmente comprensible, en español suena incompleto o rígido. Dado el contexto de acompañamiento divino, «si tu presencia no va con nosotros» expresa mejor el sentido sin añadir una paráfrasis indebida.
  - severity: low
    issue: «no nos hagas subir» puede suavizarse estilísticamente
    rationale: Es una representación válida del causativo hifil, pero «no nos saques de aquí» sería menos precisa porque perdería el matiz de עלה. Conviene conservar «hacer subir», pero en una frase más natural junto con el ajuste previo.
  revised_spanish_text: 'Entonces él le dijo[a]: «Si tu presencia no va con nosotros, no nos hagas subir de aquí».'
  revised_footnotes:
  - marker: a
    text: Literalmente, «tu rostro». En hebreo, «rostro» suele funcionar como una manera de hablar de la presencia personal.
    reason: lexical_alternative
