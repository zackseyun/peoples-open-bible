translation:
  language: es
  text: Yo, yo soy el que los consuela. ¿Quién eres tú para que temas al hombre que muere, y al hijo del hombre[a], que será hecho como la hierba?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un ser humano». Aquí «hijo del hombre» es un modismo para la humanidad ordinaria, no necesariamente un título mesiánico.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָנֹכִי אָנֹכִי
  english_pob_choice: I, I
  chosen_spanish: Yo, yo
  alternatives_spanish:
  - Yo mismo
  - Yo solo
  lexicon: HALOT
  rationale: La repetición es enfática y conviene conservarla en español, aunque con la duplicación de 'yo' se evita una construcción forzada y se mantiene la fuerza retórica del hebreo.
- source_word: ה֖וּא
  english_pob_choice: he
  chosen_spanish: soy el que
  alternatives_spanish:
  - soy él
  - soy el mismo
  lexicon: HALOT
  rationale: En esta fórmula de autoidentificación, el hebreo usa 'él' idiomáticamente con el primer pronombre. En español, 'yo soy el que' comunica mejor la identificación enfática sin perder el valor del hebreo.
- source_word: מְנַחֶמְכֶם
  english_pob_choice: who comforts you
  chosen_spanish: el que los consuela
  alternatives_spanish:
  - su consolador
  - el que está consolándolos
  lexicon: HALOT
  rationale: El participio expresa acción característica o continua. 'El que los consuela' conserva el matiz durativo y suena natural; 'consuela' mantiene la relación verbal directa mejor que un sustantivo.
- source_word: מִי אַתְּ
  english_pob_choice: Who are you
  chosen_spanish: ¿Quién eres tú
  alternatives_spanish:
  - ¿Quién entonces eres tú?
  - ¿Quién eres tú?
  lexicon: HALOT
  rationale: La pregunta retórica se expresa con naturalidad en español con '¿Quién eres tú?'. Se conserva el femenino del hebreo en el trasfondo, aunque el español no marque género en la segunda persona singular.
- source_word: וַתִּירְאִי
  english_pob_choice: that you fear
  chosen_spanish: para que temas
  alternatives_spanish:
  - para que tengas miedo
  - para que estés temiendo
  lexicon: HALOT
  rationale: El verbo ירא transmite temor ante una amenaza humana. 'Para que temas' refleja bien el valor verbal y el tono de reproche retórico en español.
- source_word: אֱנוֹשׁ
  english_pob_choice: man
  chosen_spanish: al hombre
  alternatives_spanish:
  - al ser humano
  - al mortal
  lexicon: HALOT
  rationale: '''אֱנוֹשׁ'' resalta la fragilidad humana; ''al hombre'' conserva el contraste breve del hebreo y funciona bien con el participio siguiente que desarrolla la mortalidad.'
- source_word: יָמוּת
  english_pob_choice: who dies
  chosen_spanish: que muere
  alternatives_spanish:
  - que va a morir
  - mortal
  lexicon: HALOT
  rationale: El imperfecto expresa la certeza de la muerte humana. 'Que muere' es conciso y mantiene la caracterización sin añadir futuro explícito.
- source_word: בֶּן אָדָם
  english_pob_choice: the son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - hijo de la humanidad
  lexicon: HALOT
  rationale: Se conserva la literalidad de la expresión para preservar el paralelismo con אֱנוֹשׁ y la textura poética del hebreo. En español puede sonar bíblica y transparente a la vez.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - humanidad
  - ser humano
  lexicon: HALOT
  rationale: Dentro del giro idiomático 'hijo de hombre', 'hombre' mantiene la literalidad del hebreo y la coordinación semántica con 'al hombre' anterior.
- source_word: חָצִיר
  english_pob_choice: grass
  chosen_spanish: pasto
  alternatives_spanish:
  - hierba
  - césped
  lexicon: HALOT
  rationale: '''חָצִיר'' en poesía profética suele denotar vegetación frágil y pasajera. ''Pasto'' comunica la imagen de transitoriedad de manera natural en español; ''hierba'' también sería posible, pero ''pasto'' evita posibles lecturas culinarias o botánicas modernas.'
- source_word: יִנָּתֵן
  english_pob_choice: is made like
  chosen_spanish: será como
  alternatives_spanish:
  - es puesto como
  - es hecho como
  lexicon: HALOT
  rationale: El Niphal de נתן aquí funciona de modo idiomático/comparativo. 'Será como pasto' expresa el resultado comparativo con claridad y evita una calca poco natural; mantiene la idea de degradación a algo transitorio.
theological_decisions:
- issue: Sentido de בֶּן אָדָם en un contexto no mesiánico
  english_pob_reading: the son of man
  chosen_spanish_reading: hijo de hombre
  alternative_spanish_readings:
  - ser humano
  - hijo de la humanidad
  rationale: Se conserva la expresión literal para no borrar la textura poética ni resolver de antemano una posible asociación cristológica. En este versículo funciona como paralelo de 'al hombre que muere', es decir, humanidad ordinaria y frágil.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica; mantener literalidad cuando el contexto permite la ambigüedad y no forzar una interpretación explicativa en el texto principal.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés y el hebreo: conserva la repetición enfática inicial, el paralelismo entre אֱנוֹשׁ y בֶּן אָדָם, y el valor comparativo final de יִנָּתֵן. No se aplicaron revisiones adicionales respecto del estado revisado más reciente, que ya estaba marcado como sin cambios.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino cuando aparezca; en este versículo no aparece explícitamente, por lo que no se usa.
  - Se preserva el registro bíblico formal con español moderno y natural, evitando paráfrasis interpretativas excesivas.
  - '''Hijo de hombre'' se deja literal y se aclara en nota para sostener la transparencia auditable.'
