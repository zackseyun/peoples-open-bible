- from: Así que Hathac vino y le contó a Ester las palabras de Mardoqueo[a].
  to: Entonces Hathac vino y le dijo a Ester las palabras de Mardoqueo[a].
  rationale: Se reemplaza 'Así que' por 'Entonces' para reflejar mejor la simple progresión narrativa del hebreo sin añadir una inferencia lógica. Se cambia 'le contó' por 'le dijo' para sonar más natural y preciso en español al transmitir palabras ajenas, manteniendo la literalidad de 'las palabras de Mardoqueo' apoyada por la nota.
