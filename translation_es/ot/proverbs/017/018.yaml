review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido global del hebreo: un individuo insensato entra en una obligación de fianza mediante el gesto idiomático de la mano, y lo hace delante de su prójimo. También preserva adecuadamente חֲסַר לֵב como falta de juicio y עֹרֵב עֲרֻבָּה con lenguaje de fianza.'
  spanish_quality_summary: El español es claro y legible, pero hay dos ajustes importantes. Primero, «da la mano» en español suele sugerir saludo o acuerdo general, y no refleja tan bien como conviene el hebreo תּוֹקֵעַ כָּף ni la revisión inglesa «strikes hands». Segundo, «saliendo fiador» suena algo coloquial y menos directo que «haciéndose fiador» o «constituyéndose en fiador». Además, conviene quitar el espacio antes de la nota [a].
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Prójimo» para רֵעֵהוּ es aceptable en registro bíblico. «Entendimiento» representa bien la fuerza sapiencial de חֲסַר לֵב, aunque la nota literal debe mantenerse. Se recomienda una formulación más precisa para el gesto de la mano y para la fianza.
  issues:
  - severity: medium
    issue: «da la mano» subrepresenta el modismo תּוֹקֵעַ כָּף
    rationale: En español, «dar la mano» suele entenderse como saludo o cortesía. El hebreo describe el gesto legal de golpear/estrechar la mano para contraer una garantía. «estrecha la mano» comunica mejor el acto convencional sin sonar torpe.
  - severity: medium
    issue: «saliendo fiador» es menos natural y menos preciso que otra opción jurídica sencilla
    rationale: Aunque es comprensible, «salir fiador» tiene un matiz idiomático más coloquial. «haciéndose fiador» expresa con más claridad el valor participial de עֹרֵב y conserva el sentido legal.
  - severity: low
    issue: Espaciado incorrecto antes de la nota [a]
    rationale: En el texto español no debe haber espacio entre la palabra anclada y el marcador de nota.
  revised_spanish_text: El hombre que carece de entendimiento[a] estrecha la mano[b], haciéndose fiador[c] delante de su prójimo.
