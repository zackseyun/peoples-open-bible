translation:
  language: es
  text: Y colgarán de él toda la gloria de la casa de su padre[a], la descendencia y las ramificaciones[b], todo utensilio pequeño, desde los cuencos[c] hasta todos los cántaros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda la gloria de la casa de su padre».
    reason: lexical_alternative
  - marker: b
    text: El hebreo probablemente distingue los descendientes principales y las líneas menores de la familia.
    reason: cultural_note
  - marker: c
    text: O «desde los cuencos hasta todos los odres».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתָלוּ
  english_pob_choice: And they will hang
  chosen_spanish: Y colgarán
  alternatives_spanish:
  - Y colgarán de
  - Y penderán
  lexicon: HALOT
  rationale: El verbo hebreo indica literalmente ‘colgar’. En español, «colgarán» conserva la imagen física y también la fuerza metafórica de depender de algo o alguien.
- source_word: עָלָיו
  english_pob_choice: on him
  chosen_spanish: de él
  alternatives_spanish:
  - sobre él
  - en él
  lexicon: HALOT
  rationale: En español, la construcción natural con «colgar» es «colgar de él». Mantiene la idea del soporte/peg y evita una calca poco idiomática.
- source_word: כָּל כְּבוֹד בֵּית אָבִיו
  english_pob_choice: all the glory of his father’s house
  chosen_spanish: toda la gloria de la casa de su padre
  alternatives_spanish:
  - todo el honor de la casa de su padre
  - toda la gloria de la casa paterna
  lexicon: HALOT
  rationale: כָּבוֹד puede ser ‘gloria’ u ‘honor’. El texto auditado privilegia «glory» por cercanía léxica, y en español «gloria» conserva mejor el peso, la dignidad y la relevancia social del linaje.
- source_word: הַצֶּאֱצָאִים
  english_pob_choice: the offspring
  chosen_spanish: la descendencia
  alternatives_spanish:
  - los descendientes
  - la prole
  lexicon: HALOT
  rationale: El término apunta a lo que ‘sale’ de una familia, es decir, sus descendientes. «La descendencia» suena natural en español y mantiene el valor colectivo.
- source_word: וְהַצְּפִעוֹת
  english_pob_choice: the offshoots
  chosen_spanish: las ramas
  alternatives_spanish:
  - los retoños
  - las ramificaciones
  lexicon: HALOT
  rationale: La expresión es rara y probablemente conserva la metáfora botánica para ramas familiares secundarias. «Las ramas» preserva esa imagen sin forzar una equivalencia demasiado técnica.
- source_word: כְּלֵי הַקָּטָן
  english_pob_choice: every small vessel
  chosen_spanish: todos los utensilios pequeños
  alternatives_spanish:
  - todo recipiente pequeño
  - todos los vasos pequeños
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para objeto/recipiente/utensilio. «Utensilios pequeños» es comprensible en español y mantiene el sentido de objetos menores colgados del soporte.
- source_word: מִכְּלֵי הָאַגָּנוֹת
  english_pob_choice: from the bowls
  chosen_spanish: desde los cuencos
  alternatives_spanish:
  - desde los tazones
  - desde las vasijas
  lexicon: HALOT
  rationale: אַגָּנוֹת se refiere a recipientes abiertos tipo cuenco o basin. «Cuencos» funciona bien en español moderno y encaja con la serie de objetos.
- source_word: וְעַד כָּל כְּלֵי הַנְּבָלִים
  english_pob_choice: to all the jars
  chosen_spanish: hasta todos los cántaros
  alternatives_spanish:
  - hasta todas las vasijas
  - hasta todos los odres
  lexicon: HALOT
  rationale: En este contexto de recipientes, נְבָלִים se entiende mejor como recipientes grandes de barro o piel, no como instrumentos musicales. «Cántaros» transmite un recipiente mayor en español sin introducir la ambigüedad de «odres».
theological_decisions:
- issue: Metáfora del peg y la casa de Eliacim
  english_pob_reading: The verse depicts Eliakim as the support on whom the entire prestige and dependent members of his family will be hung, using the image of household vessels hung on a peg.
  chosen_spanish_reading: El verso presenta a Eliacim como el soporte del que dependerán la honra de su casa y sus miembros, mediante la imagen de utensilios colgados de un gancho.
  alternative_spanish_readings:
  - Una descripción puramente literal de objetos colgados
  - Una imagen exclusiva de carga o nepotismo
  rationale: El contexto inmediato (vv. 23–25) desarrolla explícitamente la metáfora del clavo/gancho. La traducción conserva la imagen sin suprimir la posible tensión entre linaje, prestigio y dependencia representada por los objetos colgados.
  doctrine_reference: Isaías 22:23–25, contexto del ‘clavo’/soporte
- issue: קָטָן y la escala de los objetos
  english_pob_reading: every small vessel
  chosen_spanish_reading: todos los utensilios pequeños
  alternative_spanish_readings:
  - todo recipiente pequeño
  - todos los objetos menores
  rationale: El hebreo contrasta objetos pequeños con recipientes mayores en una cadena de imágenes. «Utensilios pequeños» mantiene la gradación y no reduce innecesariamente el campo semántico de כְּלִי.
  doctrine_reference: Lexicografía de כְּלִי en HALOT
- issue: נְבָלִים como recipientes, no instrumentos
  english_pob_reading: jars
  chosen_spanish_reading: cántaros
  alternative_spanish_readings:
  - odres
  - vasijas grandes
  rationale: Aunque נֶבֶל puede denotar un instrumento musical en otros contextos, aquí la lista es de recipientes domésticos. La lectura de ‘cántaros’ sigue la decisión del audit trail de entenderlo como contenedor.
  doctrine_reference: Contexto léxico inmediato de recipientes
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail al preferir «gloria» para כָּבוֹד y al mantener una sintaxis fluida con coma implícita en español. También respeta la decisión revisada de distinguir dos términos familiares con una metáfora vegetal suave, sin perder la transición a la imagen de recipientes.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto solo cuando corresponda; este versículo no contiene el tetragrámaton.
  - «Gloria» se emplea para כָּבוֹד conforme al audit trail; no se sustituye por «honor» en el texto principal.
  - «Descendencia» y «ramas» preservan la doble imagen familiar/botánica sin sobreexplicar.
  - «Cuencos» y «cántaros» mantienen la serie de recipientes domésticos en español natural.
