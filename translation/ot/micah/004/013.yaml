id: MIC.4.13
reference: Micah 4:13
source:
  edition: WLC
  text: ק֧וּמִי וָ/ד֣וֹשִׁי בַת צִיּ֗וֹן כִּֽי קַרְנֵ֞/ךְ אָשִׂ֤ים בַּרְזֶל֙ וּ/פַרְסֹתַ֨יִ/ךְ֙ אָשִׂ֣ים נְחוּשָׁ֔ה וַ/הֲדִקּ֖וֹת עַמִּ֣ים רַבִּ֑ים וְ/הַחֲרַמְתִּ֤י לַֽ/יהוָה֙ בִּצְעָ֔/ם וְ/חֵילָ֖/ם לַ/אֲד֥וֹן כָּל הָ/אָֽרֶץ־־־׃
translation:
  text: Rise and thresh[a], daughter Zion, for I will make your horn iron, and I will make your hooves bronze; you will crush many peoples, and I will devote their gain to Yahweh[b], and their wealth to the Lord of all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'put under the ban'; the Hebrew verb can denote devoting something to God, often with the sense of being placed under a ban for destruction.
    reason: lexical_alternative
  - marker: b
    text: Or 'their gain' or 'their plunder'; the Hebrew term often carries the sense of profit gained by greed or injustice.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֧וּמִי
  chosen: Rise
  alternatives:
  - Get up
  - Arise
  lexicon: HALOT
  rationale: Imperative feminine singular from קום, calling daughter Zion to action. 'Rise' is concise, natural, and preserves the summons without archaic tone.
- source_word: וָדֹשִׁי
  chosen: and thresh
  alternatives:
  - and tread
  - and trample
  lexicon: HALOT
  rationale: From דושׁ, used for threshing grain by trampling. 'Thresh' preserves the agricultural metaphor that frames Zion's victory, better than the more generic 'trample'.
- source_word: בַת צִיּוֹן
  chosen: daughter Zion
  alternatives:
  - Daughter Zion
  - daughter of Zion
  lexicon: HALOT
  rationale: A personified title for Zion/Jerusalem. 'daughter Zion' is a transparent, idiomatic prophetic expression in English and preserves the vocative force.
- source_word: קַרְנֵךְ
  chosen: your horn
  lexicon: HALOT
  rationale: Literal 'horn,' a common biblical image of strength and offensive power. The metaphor should be retained rather than interpreted away as 'strength'.
- source_word: אָשִׂים בַּרְזֶל
  chosen: I will make ... iron
  alternatives:
  - I will set ... as iron
  lexicon: HALOT
  rationale: The idiom expresses transformation or endowment. 'I will make your horn iron' is natural English and preserves the divine agency.
- source_word: וּפַרְסֹתַיִךְ
  chosen: your hooves
  alternatives:
  - your hoofs
  lexicon: HALOT
  rationale: Literal plural/dual form referring to the feet of a trampling animal. 'Hooves' fits the threshing metaphor and pairs naturally with 'horn.'
- source_word: נְחוּשָׁה
  chosen: bronze
  alternatives:
  - copper
  - brass
  lexicon: HALOT
  rationale: Biblical נְחוּשָׁה commonly denotes bronze/copper alloy in martial imagery. 'Bronze' is the standard and most likely rendering in this context.
- source_word: וַהֲדִקּוֹת
  chosen: you will crush
  alternatives:
  - you will beat in pieces
  - you will pulverize
  lexicon: HALOT
  rationale: The verb conveys pounding or crushing. 'You will crush' is strong, readable, and suits the image of threshing many peoples.
- source_word: עַמִּים רַבִּים
  chosen: many peoples
  alternatives:
  - many nations
  lexicon: HALOT
  rationale: עַמִּים is more literally 'peoples' than 'nations.' In prophetic contexts it often refers to ethnic groups collectively; 'many peoples' preserves that nuance.
- source_word: וְהַחֲרַמְתִּי
  chosen: I will devote
  alternatives:
  - I will dedicate
  - I will put under the ban
  lexicon: HALOT
  rationale: From חרם in the causative, indicating consecration/devotion to God, often by placing something under ban. 'Devote' preserves the theological force without importing a narrower technical phrase into the main text.
- source_word: בִּצְעָם
  chosen: their unjust gain
  alternatives:
  - their gain
  - their plunder
  - their ill-gotten gain
  lexicon: HALOT
  rationale: בצע often carries the sense of gain acquired by greed or unjust profit. 'Unjust gain' preserves the moral nuance better than the neutral 'gain' and is less colloquial than 'ill-gotten gain'.
- source_word: וְחֵילָם
  chosen: their wealth
  alternatives:
  - their riches
  - their resources
  - their strength
  lexicon: HALOT
  rationale: חֵיל can denote wealth, resources, or military strength. In parallel with 'gain' and in a context of dedicating spoils to God, 'wealth' best fits.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition marks dedication to Israel's covenant God.
- source_word: לַאֲדוֹן כָּל הָאָרֶץ
  chosen: to the Lord of all the earth
  alternatives:
  - to the Master of all the earth
  lexicon: HALOT
  rationale: אָדוֹן is best rendered 'Lord' here as a divine title. 'of all the earth' emphasizes universal sovereignty and should remain explicit.
