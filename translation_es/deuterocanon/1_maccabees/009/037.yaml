translation:
  language: es
  text: Después de estas palabras, se informó a Jonatán y a Simón, su hermano, que los hijos de Jambri celebraban una gran boda, y llevaban a la novia desde Nadabát, hija de uno de los grandes nobles de Canaán, con un gran cortejo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con una gran procesión». El griego παραπομπή puede designar la escolta que acompaña o la procesión festiva misma.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ δὲ τοὺς λόγους τούτους
  english_pob_choice: After these words
  chosen_spanish: Después de estas palabras
  alternatives_spanish:
  - Después de estos hechos
  - Después de estos acontecimientos
  lexicon: LSJ
  rationale: «λόγοι» puede referirse aquí a palabras o a un asunto/reportaje previo; en español, «después de estas palabras» conserva la conexión inmediata con el contexto y suena natural sin ampliar indebidamente el sentido.
- source_word: ἀπηγγέλησαν
  english_pob_choice: it was reported
  chosen_spanish: se informó
  alternatives_spanish:
  - les informaron
  - fue dado aviso
  lexicon: LSJ
  rationale: La pasiva impersonal griega se refleja bien con una construcción impersonal en español; evita introducir un sujeto no explicitado por el texto.
- source_word: Ἰωναθὰν καὶ Σίμωνι τῷ ἀδελφῷ αὐτοῦ
  english_pob_choice: to Jonathan and Simon his brother
  chosen_spanish: a Jonatán y a Simón, su hermano
  alternatives_spanish:
  - a Jonatán y a Simón su hermano
  - a Jonatán y a Simón, hermano de él
  lexicon: LSJ
  rationale: El dativo marca destinatario. La coma ayuda a identificar a Simón como hermano de Jonatán sin perder fluidez en español.
- source_word: Υἱοὶ Ἰαμβρὶ
  english_pob_choice: the sons of Jambri
  chosen_spanish: los hijos de Jambri
  alternatives_spanish:
  - la casa de Jambri
  - el clan de Jambri
  lexicon: LSJ
  rationale: «Hijos de» conserva el patronímico/grupal del griego y evita sustituirlo por una paráfrasis sociológica no exigida por la fuente.
- source_word: ποιοῦσιν γάμον μέγαν
  english_pob_choice: were holding a great wedding
  chosen_spanish: celebraban una gran boda
  alternatives_spanish:
  - hacían una gran boda
  - celebraban un gran banquete de bodas
  lexicon: LSJ
  rationale: La expresión griega es idiomática; en español, «celebraban una gran boda» transmite el acto festivo con naturalidad y mantiene el valor de μέγαν sin añadir «banquete» como elemento explícito.
- source_word: ἄγουσι τὴν νύμφην
  english_pob_choice: were bringing the bride
  chosen_spanish: llevaban a la novia
  alternatives_spanish:
  - traían a la novia
  - guiaban a la novia
  lexicon: LSJ
  rationale: «ἄγω» en este contexto admite llevar/traer/acompañar. «Llevaban a la novia» es claro y acorde con el movimiento descrito en una procesión nupcial.
- source_word: ἀπὸ Ναδαβάθ
  english_pob_choice: from Nadabath
  chosen_spanish: desde Nadabát
  alternatives_spanish:
  - de Nadabát
  - desde Nadabat
  lexicon: LSJ
  rationale: Se translitera el topónimo según la forma griega y se adapta la acentuación al español para lectura fluida.
- source_word: θυγατέρα ἑνὸς τῶν μεγάλων μεγιστάνων Χαναάν
  english_pob_choice: the daughter of one of the great nobles of Canaan
  chosen_spanish: hija de uno de los grandes nobles de Canaán
  alternatives_spanish:
  - hija de uno de los grandes magnates de Canaán
  - hija de uno de los principales señores de Canaán
  lexicon: LSJ
  rationale: «μεγιστάν» denota un alto dignatario o noble; «nobles» es claro y suficientemente cercano. Se conserva «grandes» porque el griego lo duplica junto con el rango elevado.
- source_word: μετὰ παραπομπῆς μεγάλης
  english_pob_choice: with a large escort
  chosen_spanish: con un gran cortejo
  alternatives_spanish:
  - con una gran escolta
  - con un gran desfile
  lexicon: LSJ
  rationale: «παραπομπή» puede referirse tanto a escolta como a procesión acompañante. «Cortejo» en español abarca bien el acompañamiento ceremonial nupcial y preserva la ambigüedad entre escolta y procesión.
theological_decisions:
- issue: Naturaleza del acompañamiento nupcial final
  english_pob_reading: with a large escort / Or 'with a great procession.'
  chosen_spanish_reading: con un gran cortejo
  alternative_spanish_readings:
  - con una gran escolta
  - con un gran desfile nupcial
  rationale: El griego παραπομπή admite tanto la escolta que acompaña como la procesión festiva misma. «Cortejo» conserva esa tensión sin forzar una sola interpretación.
  doctrine_reference: None (lexical/semantic issue)
translation_notes:
  revision_awareness: Se siguió el contexto auditado en inglés y el griego de Swete (1909), manteniendo la ambigüedad de παραπομπή mediante «cortejo», equivalente funcional de la nota inglesa sobre «escort/procession». No se aplicaron revisiones posteriores en el paquete, y el texto se mantuvo alineado con la lectura de alta concordancia.
  spanish_consistency_notes:
  - Se usa «Jonatán» y «Simón» conforme a la forma española habitual de los nombres bíblicos.
  - Se conserva «Canaán» y el topónimo «Nadabát» en transliteración coherente.
  - Se evita «SEÑOR» u այլ terminología no pertinente, porque el versículo no contiene el Tetragrámaton ni κύριος como variante relevante.
  - «Cortejo» se eligió como solución española que puede abarcar tanto escolta como procesión, manteniendo la tensión semántica del original.
