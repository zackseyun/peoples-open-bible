  to: Consumirá la descendencia de tu ganado y el fruto de tu tierra, hasta que seas destruido; no te dejará grano, vino nuevo ni aceite, ni terneros de tu manada ni corderos[a] de tu rebaño, hasta destruirte.
  rationale: Se reemplazó «el fruto de tu ganado» por «la descendencia de tu ganado» para expresar claramente el sentido idiomático hebreo con animales. Se ajustó «mosto» a «vino nuevo» para seguir más de cerca la decisión auditada. Se cambió «crías de tu ganado» por «terneros de tu manada» para preservar la especificidad introducida en la revisión inglesa («calves of your herd»). Se eliminó la nota innecesaria sobre «Consumirá» y se conservó solo la nota léxica útil sobre «corderos / crías de tu rebaño».
  reviewer_model: gpt-5.4
