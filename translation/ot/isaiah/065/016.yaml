theological_decisions:
- issue: Rendering of בֵּאלֹהֵי אָמֵן
  chosen_reading: the God of Amen
  alternative_readings:
  - the God of truth
  - the faithful God
  rationale: The Hebrew noun אָמֵן is unusual as a divine epithet. Rather than flattening it to an abstract quality, the main text preserves the lexical form 'Amen' and its rich connotations of firmness, faithfulness, and truth. Because 'God of truth' is a longstanding and plausible interpretive rendering, it is preserved in a footnote to maintain transparency and theological tension.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Scope of בָּאָרֶץ
  chosen_reading: in the land
  alternative_readings:
  - in the earth
  rationale: The Hebrew can denote either the land or the earth. The immediate Isaianic context can support either a local-covenantal or broader renewed-creation sense. The main text uses 'land' as the more restrained rendering, while preserving 'earth' in a footnote rather than resolving the scope too strongly.
  doctrine_reference: Translation philosophy §§1, 3, 5
