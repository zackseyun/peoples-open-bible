translation:
  language: es
  text: 'Y aconteció en aquel año, al comienzo del reinado de Sedequías, rey de Judá, en el cuarto año, en el quinto mes, que Hananías hijo de Azur, el profeta de Gabaón, me habló en la casa de Yahvé, en presencia[a] de los sacerdotes y de todo el pueblo, diciendo[b]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ante los ojos de», un modismo que significa públicamente o en presencia de.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo contiene tanto «al comienzo del reinado de Sedequías» como «en el cuarto año»; se mantiene esta doble formulación sin armonizarla.
    reason: textual_variant
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: Forma narrativa breve que conserva la función introductoria del wayyiqtol sin sonar forzada en español.
- source_word: בַּשָּׁנָה הַהִיא
  english_pob_choice: in that year
  chosen_spanish: en aquel año
  alternatives_spanish:
  - en ese año
  - durante aquel año
  lexicon: HALOT
  rationale: «Aquel» reproduce bien la deixis referencial del hebreo y su tono narrativo.
- source_word: בְּרֵאשִׁית מַמְלֶכֶת
  english_pob_choice: at the beginning of the reign of
  chosen_spanish: al comienzo del reinado de
  alternatives_spanish:
  - al principio del reinado de
  - al inicio del reinado de
  lexicon: HALOT
  rationale: «Reinado» expresa mejor מַמְלֶכֶת en este contexto que «reino», y «al comienzo de» mantiene la temporalidad de apertura.
- source_word: צִדְקִיָּה מֶלֶךְ יְהוּדָה
  english_pob_choice: Zedekiah king of Judah
  chosen_spanish: Sedequías, rey de Judá
  alternatives_spanish:
  - Sedecías, rey de Judá
  lexicon: HALOT
  rationale: Se usa la forma castellana más extendida del nombre propio, sin alterar el título real.
- source_word: בַּשָּׁנָה הָרְבִעִית
  english_pob_choice: in the fourth year
  chosen_spanish: en el cuarto año
  alternatives_spanish:
  - en año cuarto
  lexicon: HALOT
  rationale: Renderización cronológica directa y natural en español.
- source_word: בַּחֹדֶשׁ הַחֲמִישִׁי
  english_pob_choice: in the fifth month
  chosen_spanish: en el quinto mes
  alternatives_spanish:
  - en el mes quinto
  lexicon: HALOT
  rationale: Equivalente calendárico simple y claro; se evita imponer un nombre moderno de mes.
- source_word: אָמַר אֵלַי
  english_pob_choice: spoke to me
  chosen_spanish: me habló
  alternatives_spanish:
  - me dijo
  lexicon: HALOT
  rationale: «Hablar» funciona de modo natural con el complemento indirecto y enlaza bien con la cita siguiente.
- source_word: חֲנַנְיָה בֶן עַזּוּר
  english_pob_choice: Hananiah son of Azzur
  chosen_spanish: Hananías hijo de Azur
  alternatives_spanish:
  - Ananías hijo de Azur
  lexicon: HALOT
  rationale: Nombre propio hebreo adaptado al uso bíblico en español; se conserva la relación filiativa literal.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta reconocido
  lexicon: HALOT
  rationale: Traducción directa del título, sin añadir matices que el hebreo no explicita aquí.
- source_word: אֲשֶׁר מִגִּבְעוֹן
  english_pob_choice: from Gibeon
  chosen_spanish: de Gabaón
  alternatives_spanish:
  - de Gibeón
  lexicon: HALOT
  rationale: Se elige la forma tradicional y ampliamente reconocible en español para el topónimo bíblico.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «casa»; el nombre divino se vierte como Yahvé según el estándar del proyecto.
- source_word: לְעֵינֵי
  english_pob_choice: in the sight of
  chosen_spanish: en presencia de
  alternatives_spanish:
  - a la vista de
  - delante de
  lexicon: HALOT
  rationale: Expresa la función pública del hebreo idiomático de modo natural en español y sin calco innecesario.
- source_word: הַכֹּהֲנִים וְכָל הָעָם
  english_pob_choice: the priests and all the people
  chosen_spanish: los sacerdotes y de todo el pueblo
  alternatives_spanish:
  - los sacerdotes y todo el pueblo
  lexicon: HALOT
  rationale: Se mantiene el paralelo de los dos grupos presentes; la preposición se ajusta al español con fluidez.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: Marca la introducción de discurso directo y permite cerrar la unidad con naturalidad.
theological_decisions:
- issue: Cronological tension between 'at the beginning of the reign of Zedekiah' and 'in the fourth year'
  english_pob_reading: Preserve both expressions as translated without harmonization
  chosen_spanish_reading: 'Preservar ambas expresiones: «al comienzo del reinado de Sedequías... en el cuarto año»'
  alternative_spanish_readings:
  - armonizar las fechas
  - suavizar «al comienzo»
  rationale: El hebreo conserva ambas marcas temporales; la traducción no debe resolver la tensión ni borrar la posible discrepancia textual o cronológica.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre propio divino en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se corrigió la ubicación de las marcas de nota para que [a] y [b] aparezcan exactamente en el texto español. También se mantuvo la tensión cronológica del hebreo y el nombre divino conforme al estándar del proyecto.
  spanish_consistency_notes:
  - Se usó Yahvé para יְהוָה de acuerdo con el criterio editorial del proyecto.
  - Se prefirió «reinado» para מַמְלֶכֶת en una fórmula de datación histórica.
  - Se conservó la literalidad de la escena pública con «en presencia de» para לְעֵינֵי.
  - 'Los nombres propios se adaptaron al uso bíblico estándar del español: Sedequías, Hananías, Azur, Gabaón.'
