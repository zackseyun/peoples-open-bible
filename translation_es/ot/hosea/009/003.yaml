translation:
  language: es
  text: No permanecerán en la tierra de Yahvé[a]; Efraín volverá a Egipto[b], y en Asiria comerán alimento impuro[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "morarán en la tierra de Yahvé".
    reason: lexical_alternative
  - marker: b
    text: '"Egipto" puede entenderse de modo literal o como imagen tipológica de nueva esclavitud/exilio; el hebreo mantiene la tensión junto con la referencia a Asiria.'
    reason: theological_note
  - marker: c
    text: O "comida impura" o "lo impuro".
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשְׁבוּ
  english_pob_choice: remain
  chosen_spanish: habitarán
  alternatives_spanish:
  - permanecerán
  - morarán
  - vivirán
  lexicon: HALOT
  rationale: El verbo ישב puede significar residir o habitar. En este contexto de juicio y exilio, el español necesita expresar la permanencia en la tierra más que el acto físico de sentarse. "Habitarán" conserva el valor residencial y la relación con la tierra sin sonar mecánico; la negación deja claro que no seguirán viviendo allí.
- source_word: בְּאֶרֶץ יְהוָה
  english_pob_choice: in the land of the LORD
  chosen_spanish: la tierra de Yahvé
  alternatives_spanish:
  - la tierra del SEÑOR
  - la tierra de Yahvé
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino según el estándar del proyecto: Yahvé. En español, "la tierra de Yahvé" comunica posesión y pacto de manera natural. Evita la convención de máscara litúrgica y mantiene la fuerza teológica del hebreo.'
- source_word: וְשָׁב
  english_pob_choice: will return
  chosen_spanish: volverá
  alternatives_spanish:
  - regresará
  - retornará
  lexicon: HALOT
  rationale: El futuro profético de שוב se expresa de forma natural con "volverá". En español transmite el movimiento de regreso sin sobrerregularidad formal.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraín
  lexicon: HALOT
  rationale: Se translitera el nombre propio con la forma usual en español bíblico. Se conserva el referente metonímico del reino del norte sin sustituirlo por una glosa interpretativa.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - Egipto
  lexicon: HALOT
  rationale: Nombre geográfico estándar en español. Se mantiene el lugar tal como aparece en el hebreo, sin resolver en el texto principal la posible tensión tipológica o literal.
- source_word: וּבְאַשּׁוּר
  english_pob_choice: and in Assyria
  chosen_spanish: y en Asiria
  alternatives_spanish:
  - y en Asiria
  lexicon: HALOT
  rationale: Se conserva la coordinación simple del hebreo con "y". "Asiria" es la forma española estándar del topónimo.
- source_word: טָמֵא
  english_pob_choice: unclean food
  chosen_spanish: alimento impuro
  alternatives_spanish:
  - comida impura
  - alimento inmundo
  - lo impuro
  lexicon: HALOT
  rationale: El adjetivo טָמֵא funciona sustantivamente con el verbo comer y refiere impureza ritual/cultual. "Alimento impuro" suena natural en español y preserva esa fuerza sin reducirlo a higiene ni borrar el valor ceremonial.
- source_word: יֹאכֵלוּ
  english_pob_choice: they will eat
  chosen_spanish: comerán
  alternatives_spanish:
  - comerán
  - ellos comerán
  lexicon: HALOT
  rationale: Futuro simple natural en español. El sujeto ya está claro por el contexto; no hace falta explicitarlo.
theological_decisions:
- issue: Sentido de 'Egipto' en el contexto de exilio y juicio
  english_pob_reading: Retain the literal place name 'Egypt' in the main text without resolving whether the reference is literal, typological, or rhetorical.
  chosen_spanish_reading: Conservar 'Egipto' literalmente en el texto principal, sin decidir allí si funciona de modo literal, tipológico o retórico.
  alternative_spanish_readings:
  - Interpretar 'Egipto' solo como imagen de esclavitud/exilio
  - Sustituirlo por Asiria como único destino literal
  rationale: El hebreo nombra Egipto de forma explícita y, a la vez, menciona Asiria. La traducción debe preservar esa tensión en vez de armonizarla. Por eso el texto principal mantiene el topónimo sin explicarlo, y la nota recoge la posibilidad interpretativa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Fuerza cultual de טָמֵא
  english_pob_reading: Render as 'unclean food' to preserve ritual/covenantal impurity rather than a merely hygienic or generic sense.
  chosen_spanish_reading: Traducirlo como 'alimento impuro' para conservar la impureza ritual/covenantal y no un sentido meramente higiénico.
  alternative_spanish_readings:
  - '''comida impura'''
  - '''cosas impuras'''
  - '''lo impuro'''
  rationale: En este contexto, la cuestión no es sanidad sino la imposibilidad de guardar la pureza pactal en el exilio. 'Alimento impuro' comunica ese campo semántico de manera clara y publicable en español.
  doctrine_reference: 'Lexical theology: cultic impurity and covenant separation in exile.'
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y ningún cambio necesario; este borrador sigue esa línea, conservando la tensión de Egipto/Asiria y la fuerza cultual de טָמֵא sin resolverlas en el texto principal.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma principal del nombre divino, conforme al estándar del proyecto.
  - Se usa Efraín como metónimo del reino del norte, sin sustituirlo por 'Israel'.
  - La negación inicial conserva el matiz de residencia continua, adecuado al juicio de exilio.
  - Las notas usan alternativas breves y no duplican marcadores.
