translation:
  language: es
  text: Tesoro precioso y aceite hay en la morada de un hombre sabio[a], pero un hombre necio los traga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «devora» o «consume». El verbo hebreo es literalmente «traga», una imagen vívida para el uso imprudente de los recursos.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹצָר
  english_pob_choice: treasure
  chosen_spanish: tesoros
  alternatives_spanish:
  - tesoro
  - riquezas
  - depósito
  lexicon: HALOT
  rationale: El sustantivo denota bienes valiosos guardados. En español, el plural naturaliza la coordinación con «aceite» y permite reflejar mejor el carácter acumulativo del proverbio sin cambiar el sentido básico de riqueza almacenada.
- source_word: נֶחְמָד
  english_pob_choice: precious
  chosen_spanish: preciosos
  alternatives_spanish:
  - preciados
  - valiosos
  - deseables
  lexicon: HALOT
  rationale: El adjetivo expresa algo valioso o deseable. «Preciosos» conserva la idea de alto valor y encaja de modo idiomático con «tesoros».
- source_word: וָשֶׁמֶן
  english_pob_choice: and oil
  chosen_spanish: y aceite
  alternatives_spanish:
  - y aceite de oliva
  - y aceite valioso
  lexicon: HALOT
  rationale: שֶׁמֶן designa aceite en general; el hebreo no especifica oliva. «Aceite» preserva la forma del original y su valor doméstico/económico sin añadir precisión no dada por el texto.
- source_word: בִּנְוֵה
  english_pob_choice: in the dwelling of
  chosen_spanish: en la morada de
  alternatives_spanish:
  - en la casa de
  - en el hogar de
  - en la vivienda de
  lexicon: HALOT
  rationale: El término se refiere a un lugar de residencia o habitación. «Morada» mantiene un registro sobrio y formal, cercano a la imagen proverbial del texto hebreo.
- source_word: חָכָם
  english_pob_choice: a wise man
  chosen_spanish: un hombre sabio
  alternatives_spanish:
  - un sabio
  - una persona sabia
  lexicon: HALOT
  rationale: Aquí el hebreo funciona sustantivamente y en masculino singular representativo. «Un hombre sabio» preserva la forma proverbial y la correspondencia con el paralelismo de género del original.
- source_word: וּכְסִיל
  english_pob_choice: but a foolish man
  chosen_spanish: pero un hombre necio
  alternatives_spanish:
  - pero un necio
  - pero una persona necia
  lexicon: HALOT
  rationale: כְּסִיל es el término sapiencial para el necio. «Hombre necio» conserva el paralelismo con «hombre sabio» y mantiene la fuerza tipológica del proverbio.
- source_word: יְבַלְּעֶנּוּ
  english_pob_choice: swallows them up
  chosen_spanish: los traga
  alternatives_spanish:
  - los devora
  - los consume
  - se los traga
  lexicon: HALOT
  rationale: El verbo בלע significa literalmente «tragar» y en contexto describe un consumo imprudente y destructivo. «Los traga» mantiene la imagen vívida sin sobreexplicar; el plural «los» concuerda con «tesoros y aceite» siguiendo la revisión auditada del inglés.
theological_decisions:
- issue: Antropología proverbial en masculino singular
  english_pob_reading: 'Render with masculine singular forms: ''a wise man ... a foolish man'''
  chosen_spanish_reading: 'Mantener las formas masculinas singulares: «un hombre sabio ... un hombre necio»'
  alternative_spanish_readings:
  - una persona sabia ... una persona necia
  - los sabios ... el necio
  rationale: El hebreo usa formas masculinas singulares con valor representativo/generico. En español, conservar «hombre» y el singular refleja mejor la estructura del proverbio y su paralelismo, sin pretender restringir indebidamente la aplicación del dicho.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table for אָדָם
- issue: Imagen de consumo destructivo en יְבַלְּעֶנּוּ
  english_pob_reading: a foolish man swallows them up
  chosen_spanish_reading: un hombre necio los traga
  alternative_spanish_readings:
  - un hombre necio los devora
  - un hombre necio los consume
  - un necio se los traga
  rationale: La idea principal no es solo comer, sino absorber o gastar de modo imprudente lo que debería conservarse. «Los traga» preserva la metáfora corporal fuerte del hebreo sin suavizarla; el plural se mantiene por la coordinación de dos bienes.
  doctrine_reference: Lexical force of בלע in wisdom literature; revision audit for agreement with plural objects
translation_notes:
  revision_awareness: La revisión auditada del inglés cambió «it up» por «them up» para concordar con los dos objetos («treasure and oil»). Por eso el español usa «los» y no un singular, y conserva el verbo concreto «traga» para reflejar el hebreo בלע.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino ni una cita explícita del Tetragrámaton.
  - Se usó «aceite» sin precisar «de oliva», porque el hebreo no lo especifica.
  - Se prefirió «morada» por registro y fidelidad imagética, sin convertirlo en una parapráfrasis doméstica más libre.
  - La nota a pie de página se ancla en «traga» para conservar la alternativa léxica documentada en el POB inglés.
