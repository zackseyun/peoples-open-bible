translation:
  language: es
  text: Y aconteció[a] que, cuando acabó de hablar a Saúl, el alma de Jonatán quedó ligada al alma de David[b], y Jonatán lo amó como a su propia alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y sucedió».'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo repite נֶפֶשׁ («alma») tres veces en este versículo: «el alma de Jonatán ... el alma de David ... su propia alma».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa wayyiqtol de היה introduce una nueva escena. «Aconteció» conserva el valor formular y el tono bíblico sin sonar demasiado arcaico en español.
- source_word: כְּכַלֹּתוֹ לְדַבֵּר
  english_pob_choice: when he had finished speaking
  chosen_spanish: cuando acabó de hablar
  alternatives_spanish:
  - cuando terminó de hablar
  - al acabar de hablar
  lexicon: HALOT
  rationale: La relación temporal expresa que la acción siguiente ocurre al concluir el habla. «Acabó de hablar» transmite bien el valor secuencial del hebreo sin forzar un pluscuamperfecto innecesario en español.
- source_word: אֶל שָׁאוּל
  english_pob_choice: to Saul
  chosen_spanish: con Saúl
  alternatives_spanish:
  - a Saúl
  - ante Saúl
  lexicon: HALOT
  rationale: Aunque אֶל suele ser direccional, en el contexto de hablar la preposición española más natural es «con». El sentido comunicativo del pasaje exige relación verbal con Saúl, no mera dirección espacial.
- source_word: נֶפֶשׁ
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser
  - alma
  lexicon: HALOT
  rationale: El hebreo repite נֶפֶשׁ tres veces con fuerza relacional. En español, «alma» conserva mejor esa repetición y la intensidad personal que «vida» o «ser», mientras mantiene la tensión lexical visible.
- source_word: נִקְשְׁרָה
  english_pob_choice: was bound
  chosen_spanish: quedó ligada
  alternatives_spanish:
  - fue unida
  - quedó unida
  - fue ligada
  lexicon: HALOT
  rationale: De קשר, la imagen es de unión fuerte. «Quedó ligada» expresa el estado resultante y mantiene la metáfora de vínculo; evita un calco demasiado rígido como «atada» y preserva la lectura relacional.
- source_word: בְּנֶפֶשׁ דָּוִד
  english_pob_choice: to David’s soul
  chosen_spanish: al alma de David
  alternatives_spanish:
  - con el alma de David
  - en el alma de David
  lexicon: HALOT
  rationale: La construcción mantiene explícita la repetición de נֶפֶשׁ. En español, «al alma de David» comunica el vínculo directo sin perder la estructura textual del hebreo.
- source_word: וַיֶּאֱהָבוֹ
  english_pob_choice: Jonathan loved him
  chosen_spanish: Jonatán lo amó
  alternatives_spanish:
  - Jonatán lo amaba
  - Jonatán comenzó a amarlo
  lexicon: HALOT
  rationale: אהב expresa amor/afecto real. «Lo amó» sigue de cerca el verbo hebreo y evita introducir matices aspectuales no requeridos por el texto.
- source_word: כְּנַפְשׁוֹ
  english_pob_choice: as his own soul
  chosen_spanish: como a su propia alma
  alternatives_spanish:
  - como a sí mismo
  - como a su propia vida
  lexicon: HALOT
  rationale: La comparación repite נֶפֶשׁ y expresa identificación intensa. «Como a su propia alma» preserva la repetición léxica; el «a» es una adaptación idiomática española necesaria para una comparación natural.
theological_decisions:
- issue: Naturaleza del vínculo entre Jonatán y David
  english_pob_reading: Jonathan’s soul was bound to David’s soul; Jonathan loved him as his own soul.
  chosen_spanish_reading: el alma de Jonatán quedó ligada al alma de David, y Jonatán lo amó como a su propia alma
  alternative_spanish_readings:
  - el alma de Jonatán se unió al alma de David
  - Jonatán amó a David como a sí mismo
  rationale: La traducción conserva la fuerza del vínculo personal sin añadir contenido romántico o sexual que el hebreo no especifica. También evita reducir la relación a simple alianza política, manteniendo la tensión interpretativa presente en el texto.
  doctrine_reference: 'Principio POB: preservar la tensión textual y no importar afirmaciones doctrinales o interpretativas que el pasaje no formule explícitamente.'
translation_notes:
  revision_awareness: El control cruzado reportó alta concordancia y sin cambios necesarios; esta redacción mantiene la lectura principal del audit trail inglés, pero ajusta la sintaxis para español natural y conserva la repetición de נֶפֶשׁ mediante «alma».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo requiere.
  - Se mantiene «Jonatán» y «Saúl» como formas estándar en español bíblico.
  - Se conserva la repetición semántica de נֶפֶשׁ mediante «alma» para no ocultar la estructura lexical del versículo.
  - «Lo amó» evita sobreinterpretaciones; no se añade lenguaje romántico ni técnico no presente en el hebreo.
