base_translation:
  language: en
  yaml_path: translation/ot/ruth/001/002.yaml
  text: The man's name was Elimelech[a], and his wife's name was Naomi, and the names of his two sons were Mahlon and Chilion. They were Ephrathites from Bethlehem in Judah[c][b]. They came to the fields of Moab and were there.
  footnotes:
  - marker: a
    text: Or 'the country of Moab' or 'the territory of Moab'; Hebrew 'the fields of Moab.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and were there' or 'and stayed there'; Hebrew literally, 'and they were there.'
    reason: lexical_alternative
  - marker: c
    text: Chilion may also be spelled 'Kilion' in English transliteration.
    reason: lexical_alternative
