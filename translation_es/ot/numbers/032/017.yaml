    issue: «nos alistaremos» para נֵחָלֵץ
    rationale: El verbo español suele sugerir inscribirse/enrolarse o prepararse, pero no necesariamente armarse. La decisión auditada en inglés prioriza la fuerza reflexiva de ‘arm ourselves’. «Nos armaremos» preserva mejor el matiz militar sin sonar forzado.
