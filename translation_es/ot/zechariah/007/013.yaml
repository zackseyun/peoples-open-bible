  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יְהוָה → «Yahvé» y צְבָאוֹת → «de los Ejércitos». La alternativa tradicional debe figurar como nota ligada al título divino, no al verbo «escuchar».'
