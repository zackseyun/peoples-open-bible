translation:
  language: es
  text: El rey Demetrio, a Lasthenes su padre[a][b], saludos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Fórmula epistolar griega: literalmente, «El rey Demetrio a Lasthenes su padre, regocijarse».'
    reason: lexical_alternative
