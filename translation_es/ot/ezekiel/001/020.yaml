translation:
  language: es
  text: Adondequiera que el espíritu quisiera ir[a], allí iban; y las ruedas fueron levantadas junto a ellos[b], porque el espíritu[c] de la criatura viviente estaba en las ruedas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «viento» o «aliento»; el hebreo רוּחַ puede abarcar estos sentidos. Aquí se refiere al espíritu animador o director en la visión.
    reason: lexical_alternative
  - marker: b
    text: O «opuestas a ellos» o «correspondientes a ellos» para la idea de «junto a ellos».
    reason: lexical_alternative
  - marker: c
    text: Algunos lectores entienden «espíritu» aquí como una referencia al Espíritu de Dios; el hebreo no hace esa identificación explícita.
    reason: alternative_reading
lexical_decisions:
- source_word: הָרוּחַ / רוּחַ
  english_pob_choice: the spirit / the spirit
  chosen_spanish: el espíritu / el espíritu
  alternatives_spanish:
  - el viento
  - el aliento
  - el Espíritu
  lexicon: HALOT
  rationale: רוּחַ puede significar viento, aliento o espíritu. En este contexto visionario se trata del impulso animador o rector que guía el movimiento de las criaturas vivientes y de las ruedas. «Espíritu» en minúscula conserva ese sentido sin identificarlo de manera explícita con el Espíritu Santo.
- source_word: עַל אֲשֶׁר יִהְיֶה שָּׁם
  english_pob_choice: Wherever
  chosen_spanish: Adondequiera que
  alternatives_spanish:
  - Dondequiera que
  - Allí donde
  - En cualquier lugar donde
  lexicon: HALOT
  rationale: La construcción introduce una cláusula relativa indefinida de lugar. «Adondequiera que» comunica bien el sentido distributivo y direccional de la frase en español natural.
- source_word: לָלֶכֶת ... יֵלֵכוּ
  english_pob_choice: wanted to go ... they went
  chosen_spanish: quisiera ir ... iban
  alternatives_spanish:
  - quisiera ir ... fueron
  - iba a ir ... iban
  - tenía que ir ... iban
  lexicon: HALOT
  rationale: El infinitivo con רוּחַ más el verbo imperfecto expresa dirección o intención de movimiento. «Quisiera ir» mantiene esa orientación volitiva sin endurecerla; «iban» preserva la acción simple y continua de la escena.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  - allí mismo
  lexicon: HALOT
  rationale: El adverbio direccional se expresa con naturalidad en español como «allí», manteniendo la referencia al lugar hacia donde se movían.
- source_word: הָאוֹפַנִּים
  english_pob_choice: the wheels
  chosen_spanish: las ruedas
  alternatives_spanish:
  - los carros
  - la rueda
  lexicon: HALOT
  rationale: אוֹפַנִּים se refiere claramente a las ruedas vistas en la visión. «Las ruedas» es la traducción clara y estándar.
- source_word: יִנָּשְׂאוּ
  english_pob_choice: were lifted up
  chosen_spanish: eran levantadas
  alternatives_spanish:
  - fueron levantadas
  - se alzaban
  - subían
  lexicon: HALOT
  rationale: El nifal de נשׂא es pasivo/reflexivo aquí. «Eran levantadas» conserva el matiz pasivo y encaja con la descripción visionaria.
- source_word: לְעֻמָּתָם
  english_pob_choice: alongside them
  chosen_spanish: junto a ellos
  alternatives_spanish:
  - enfrente de ellos
  - correspondiendo a ellos
  - al lado de ellos
  lexicon: HALOT
  rationale: La preposición puede indicar posición correspondiente o al lado de. En este contexto de movimiento, «junto a ellos» es la opción española más clara e idiomática.
- source_word: הַחַיָּה
  english_pob_choice: the living creature
  chosen_spanish: la criatura viviente
  alternatives_spanish:
  - el ser viviente
  - el ser vivo
  - la criatura viva
  lexicon: HALOT
  rationale: Aunque el contexto amplio presenta varias criaturas vivientes, el hebreo usa singular colectivo. «La criatura viviente» mantiene el número gramatical y la referencia visionaria.
theological_decisions:
- issue: Cómo traducir רוּחַ sin resolver si alude al Espíritu Santo
  english_pob_reading: lowercase 'spirit'
  chosen_spanish_reading: «espíritu» en minúscula
  alternative_spanish_readings:
  - «Espíritu»
  - «Espíritu de Dios»
  rationale: El texto describe el principio animador o directivo dentro de la visión. No identifica explícitamente al Espíritu Santo; por eso se mantiene «espíritu» en minúscula para preservar la tensión teológica sin añadir una precisión doctrinal que el hebreo no exige.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés: «wanted to go» se reflejó en español con una formulación volitiva natural («quisiera ir»), y la conjunción antes de la cláusula de las ruedas se mantuvo con «y». También se respetó la nota de tensión teológica sobre la posible identificación del espíritu con el Espíritu de Dios sin resolverla explícitamente.'
  spanish_consistency_notes:
  - Se mantuvo «espíritu» en minúscula de manera consistente para no sobreinterpretar la visión.
  - «Las ruedas» conserva el plural concreto de הָאוֹפַנִּים.
  - «Junto a ellos» evita cargar la frase con una lectura única de לְעֻמָּתָם.
  - La secuencia verbal busca sonar natural en español sin perder el carácter de movimiento guiado de la imagen.
