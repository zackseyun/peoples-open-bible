translation:
  language: es
  text: Si se desvía, lo atará con ataduras[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego dice algo muy distinto: «Y de nuevo volverá rectamente hacia él, lo alegrará y le revelará las cosas ocultas de ella». Esto probablemente refleja una forma textual distinta de Sirach.'
    reason: textual_variant
  - marker: b
    text: El hebreo «lo atará con ataduras» también puede entenderse más específicamente como «lo atará con grillos» o, si el verbo se lee de otra manera, «yo lo ataré».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La cláusula es condicional; «Si» preserva la fuerza hipotética sin convertirla en tiempo narrativo.
- source_word: יָסוּר
  english_pob_choice: he turns aside
  chosen_spanish: se desvía
  alternatives_spanish:
  - se aparta
  - se retira
  lexicon: HALOT
  rationale: El hebreo sugiere apartarse del camino o desviarse; «se desvía» conserva esa imagen de desvío con español natural.
- source_word: וַאֲסַרְתִיהוּ
  english_pob_choice: she will bind him
  chosen_spanish: lo atará
  alternatives_spanish:
  - ella lo atará
  - yo lo ataré
  lexicon: HALOT
  rationale: Sigo la lectura del POB inglés que entiende a Sabiduría como sujeto femenino tácito. En español, el sujeto puede quedar implícito en la forma verbal sin perder la referencia a Sabiduría en el contexto.
- source_word: בָאֲסוּרִים
  english_pob_choice: with bonds
  chosen_spanish: con lazos
  alternatives_spanish:
  - con ataduras
  - con cadenas
  - con grillos
  lexicon: HALOT
  rationale: El sustantivo indica vínculos o ataduras. «Lazos» es amplio y literal, y evita especificar metal o prisión donde el hebreo no lo exige.
theological_decisions:
- issue: Identidad del sujeto de la segunda cláusula
  english_pob_reading: 'The subject is Wisdom: ''she will bind him.'''
  chosen_spanish_reading: 'Sabiduría es el sujeto implícito: «lo atará».'
  alternative_spanish_readings:
  - «ella lo atará»
  - «lo atará» con sujeto no explicitado
  rationale: El contexto inmediato personifica a Sabiduría como agente. En español, mantener el verbo en tercera persona singular sin sujeto expreso conserva esa personificación y la fluidez, sin borrar la interpretación del POB.
  doctrine_reference: Preservar la personificación sapiencial y la tensión textual, sin resolverla artificialmente.
- issue: Diferencia textual con el paralelo griego
  english_pob_reading: The Greek parallel reads quite differently here and likely reflects a different textual form.
  chosen_spanish_reading: La nota debe conservar que el griego paralelo es sustancialmente distinto y no sustituye el hebreo base.
  alternative_spanish_readings:
  - Traducir conforme al griego
  - fusionar hebreo y griego en el texto principal
  rationale: El texto base hebreo está atestiguado con alta confianza; el griego se documenta como variante/forma textual diferente. Esto preserva la prioridad del testimonio hebreo y deja visible la tensión textual.
  doctrine_reference: Primacía de la fuente original disponible y transparencia textual.
translation_notes:
  revision_awareness: 'El inglés POB revisó la cláusula para eliminar «and departs from her», porque el hebreo no lo expresa de manera explícita. La traducción española sigue esa revisión: no añade un complemento que el hebreo no dice, pero sí conserva la idea de desviarse y el acto de atar con ataduras. También mantiene visible la divergencia del paralelo griego en una nota.'
  spanish_consistency_notes:
  - Usar «Sabiduría» como referente contextual sin necesidad de repetirlo en el texto principal.
  - Preferir «lazos»/«ataduras» para בָאֲסוּרִים en este contexto sapiencial.
  - Mantener un registro sobrio y bíblico, evitando archaísmos innecesarios.
  - No incorporar «de ella» ni otros complementos no presentes en el hebreo base.
