translation:
  language: es
  text: Pon para ti hitos[a]; pon para ti señales[b]. Pon tu corazón en la calzada, el camino por donde andaste. Vuelve, virgen Israel[c]; vuelve a estas tus ciudades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señales de camino» para «hitos».
    reason: lexical_alternative
  - marker: b
    text: O «mojones»; el hebreo es raro, pero aquí probablemente designa marcadores a lo largo de la ruta.
    reason: lexical_alternative
  - marker: c
    text: «Vuelve» puede abarcar tanto el regreso del exilio como la vuelta a la lealtad del pacto.
    reason: alternative_reading
lexical_decisions:
- source_word: הַצִּיבִי
  english_pob_choice: Set up
  chosen_spanish: Pon
  alternatives_spanish:
  - Coloca
  - Establece
  lexicon: HALOT
  rationale: Imperativo femenino singular de una raíz que pide fijar o levantar marcadores visibles. En español, «pon» comunica la acción de colocar de manera natural y conserva la fuerza imperativa sin sonar forzado.
- source_word: צִיֻּנִים
  english_pob_choice: road markers
  chosen_spanish: hitos
  alternatives_spanish:
  - señales
  - mojones
  - marcas de camino
  lexicon: HALOT
  rationale: El contexto es de viaje y orientación en una ruta de regreso. «Hitos» es breve, claro y apto para marcadores visibles en el camino; mantiene la idea de señales de ruta sin imponer una lectura técnica innecesaria.
- source_word: שִׂמִי
  english_pob_choice: place
  chosen_spanish: pon
  alternatives_spanish:
  - coloca
  - ponte
  lexicon: HALOT
  rationale: Imperativo de שׂים. Se coordina naturalmente con el primer mandato y evita una repetición más pesada como «coloca» en ambos miembros.
- source_word: תַּמְרוּרִים
  english_pob_choice: guideposts
  chosen_spanish: señales
  alternatives_spanish:
  - señales de guía
  - mojones
  - postes guía
  lexicon: HALOT
  rationale: La POB inglesa entiende el término en paralelo con צִיֻּנִים como marcadores de ruta, no como «cosas amargas». En español, «señales» preserva esa función general y deja abierta la posible especificación contextual.
- source_word: שִׁתִי לִבֵּךְ
  english_pob_choice: Set your heart toward
  chosen_spanish: Pon tu corazón en
  alternatives_spanish:
  - Dirige tu corazón hacia
  - Fija tu corazón en
  lexicon: HALOT
  rationale: La metáfora hebrea de orientar el corazón se conserva con «poner el corazón», expresión natural en español bíblico y moderno. «En» funciona bien con la imagen de atención enfocada al trayecto.
- source_word: לַמְסִלָּה
  english_pob_choice: the highway
  chosen_spanish: la calzada
  alternatives_spanish:
  - el camino alto
  - la carretera
  - la vía
  lexicon: HALOT
  rationale: מְסִלָּה denota una vía construida o levantada. «Calzada» comunica una vía preparada y elevada sin depender de un término demasiado moderno o demasiado técnico.
- source_word: דֶּרֶךְ
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la vía
  - la ruta
  lexicon: HALOT
  rationale: En aposición con la calzada, דֶּרֶךְ amplía la imagen sin reducirla. «Camino» es el equivalente natural y amplio en español.
- source_word: הלכתי
  english_pob_choice: you went
  chosen_spanish: por donde andaste
  alternatives_spanish:
  - por donde fuiste
  - por donde caminaste
  lexicon: HALOT
  rationale: La forma verbal hebrea apunta al recorrido real hecho antes. «Andaste» reproduce el movimiento de ir/caminar con sencillez; la frase relativa mantiene el sentido de la senda recorrida.
- source_word: שׁוּבִי
  english_pob_choice: Return
  chosen_spanish: Vuelve
  alternatives_spanish:
  - Regresa
  - Vuelve de nuevo
  lexicon: HALOT
  rationale: El imperativo שוב conserva aquí una tensión entre regreso físico del exilio y vuelta de lealtad pactal. «Vuelve» es directo y no estrecha el sentido a una sola dimensión.
- source_word: בְּתוּלַת יִשְׂרָאֵל
  english_pob_choice: virgin Israel
  chosen_spanish: virgen de Israel
  alternatives_spanish:
  - virgen Israel
  - doncella de Israel
  lexicon: HALOT
  rationale: Se preserva la personificación profética del pueblo. El genitivo «de Israel» hace la construcción más natural en español sin perder la fuerza metafórica.
- source_word: עָרַיִךְ אֵלֶּה
  english_pob_choice: these your cities
  chosen_spanish: estas tus ciudades
  alternatives_spanish:
  - tus ciudades estas
  - estas ciudades tuyas
  lexicon: HALOT
  rationale: El demostrativo y el sufijo posesivo enfatizan pertenencia y cercanía. «Estas tus ciudades» refleja ese doble énfasis de manera clara y solemne.
theological_decisions:
- issue: Alcance de שוב en el llamado al regreso
  english_pob_reading: Render as 'Return' without specifying only spiritual repentance or only geographic repatriation.
  chosen_spanish_reading: Vuelve, sin restringirlo solo a arrepentimiento espiritual ni solo a regreso geográfico.
  alternative_spanish_readings:
  - Arrepiéntete
  - Regresa del exilio
  - Vuelve en fidelidad
  rationale: El contexto inmediato habla de marcas en el camino y de ciudades, lo que favorece el regreso concreto; en Jeremías, sin embargo, el retorno suele cargar también resonancias de restauración del pacto. La formulación española conserva ambas posibilidades sin resolver la tensión.
  doctrine_reference: Preservar la tensión teológica sin estrechar el alcance del mandato.
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y la revisión más reciente, que no introdujo cambios. La versión española sigue la misma lectura de marcadores de ruta y conserva la tensión de שוב, ajustando la idiomaticidad al español sin perder el paralelismo hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general, pero este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» como sustituto no presente en el texto fuente.
  - Se preservó el paralelismo entre los dos mandatos iniciales y el llamado final al regreso.
  - Se usó lenguaje natural en español, pero con suficiente literalidad para reflejar la imaginería de ruta del hebreo.
