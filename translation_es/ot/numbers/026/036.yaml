lexical_decisions:
- source_word: וְ/אֵלֶּה
  english_pob_choice: And these were
  chosen_spanish: Y estos fueron
  alternatives_spanish:
  - Y estos son
  - Ahora estos fueron
  lexicon: HALOT
  rationale: 'La fórmula introductoria de la lista genealógica/censal se expresa en español con pasado para reflejar la secuencia del registro: ''Y estos fueron''. Mantiene la función de enlace de la conjunción y la fuerza demostrativa de ''estos'' sin sonar forzado.'
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - la descendencia de
  lexicon: HALOT
  rationale: En este contexto genealógico, 'hijos de' reproduce de manera fiel el modismo hebreo. Aunque el referente es una línea clanil y no necesariamente hijos inmediatos, el español puede conservar esa fórmula sin perder inteligibilidad.
- source_word: שׁוּתָלַח
  english_pob_choice: Shuthelah
  chosen_spanish: Shutéla
  alternatives_spanish:
  - Shutelah
  - Shutela
  lexicon: transliteración convencional
  rationale: Se translitera el nombre propio de forma reconocible en español, ajustando la acentuación para guiar la lectura. No se traduce el nombre.
- source_word: לְ/עֵרָן
  english_pob_choice: of Eran
  chosen_spanish: de Erán
  alternatives_spanish:
  - para Erán
  - Erán
  lexicon: HALOT
  rationale: La preposición ל en esta fórmula de subdivisión se vierte naturalmente como 'de', indicando pertenencia o derivación dentro de la línea censal. Se mantiene el nombre propio con acento gráfico para lectura en español.
- source_word: מִשְׁפַּחַת
  english_pob_choice: the clan of
  chosen_spanish: la familia de
  alternatives_spanish:
  - el clan de
  - la casa de
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por 'clan' por precisión administrativa, en español 'familia de' comunica bien la unidad de parentesco y evita un término que en algunos registros eclesiales puede sonar más técnico de lo necesario. La relación de subgrupo sigue siendo clara por el contexto.
- source_word: הָ/עֵרָנִי
  english_pob_choice: the Eranites
  chosen_spanish: los eranitas
  alternatives_spanish:
  - la familia eranita
  - el eránita
  lexicon: HALOT
  rationale: 'El gentilicio se expresa en plural como nombre de grupo: ''eranitas''. Esta forma es natural en español para un colectivo descendiente de Erán y conserva el matiz patronímico del hebreo.'
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y el audit trail inglés, conservando la fórmula genealógica/censal sin expansión interpretativa. No se reportan revisiones posteriores relevantes en el paquete fuente.
