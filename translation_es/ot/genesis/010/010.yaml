translation:
  language: es
  text: El comienzo de su reino fue Babel[a], Érec, Acad y Calneh[b], en la tierra de Sinar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Babilonia» para Babel.
    reason: lexical_alternative
  - marker: b
    text: Érec suele identificarse con la antigua Uruk; Acad con Akkad.
    reason: cultural_note
lexical_decisions:
- source_word: וַתְּהִי
  english_pob_choice: was
  chosen_spanish: fue
  alternatives_spanish:
  - era
  - llegó a ser
  lexicon: HALOT
  rationale: El imperfecto consecutivo de היה funciona aquí como una cópula narrativa simple. «Fue» reproduce con naturalidad el valor pasado en español sin añadir matiz causal o de transformación que el contexto no exige.
- source_word: רֵאשִׁית
  english_pob_choice: The beginning of
  chosen_spanish: El comienzo de
  alternatives_spanish:
  - El principio de
  - La primera parte de
  lexicon: HALOT
  rationale: En este contexto, con «su reino» y una lista de ciudades, «comienzo» conserva la idea de inicio o centro inicial sin forzar «capital» o «ciudad principal», que irían más allá del hebreo y del audit trail inglés.
- source_word: מַמְלַכְתּוֹ
  english_pob_choice: his kingdom
  chosen_spanish: su reino
  alternatives_spanish:
  - su reinado
  - su dominio real
  lexicon: HALOT
  rationale: «Reino» es la manera más clara de reflejar מַמְלָכָה en una lista de territorios/ciudades. «Reinado» pondría el foco en la duración o ejercicio del gobierno, y «dominio real» suena más interpretativo.
- source_word: בָּבֶל
  english_pob_choice: Babel
  chosen_spanish: Babel
  alternatives_spanish:
  - Babilonia
  lexicon: HALOT
  rationale: Se conserva la forma hebrea transliterada, en línea con la decisión auditada en inglés. «Babel» también mantiene mejor la conexión literaria con Génesis 11 que «Babilonia».
- source_word: וְאֶרֶךְ
  english_pob_choice: Erech
  chosen_spanish: Erej
  alternatives_spanish:
  - Erec
  - Uruk
  lexicon: HALOT
  rationale: Se translitera el nombre propio al español de forma legible. «Erej» adapta la forma tradicional inglesa «Erech» a la ortografía española sin introducir la identificación histórica «Uruk» en el texto principal.
- source_word: וְאַכַּד
  english_pob_choice: Accad
  chosen_spanish: Acad
  alternatives_spanish:
  - Akkad
  - Accad
  lexicon: HALOT
  rationale: Se prefiere «Acad» como transliteración natural en español. «Akkad» es una forma académica útil, pero no es necesaria en el texto principal.
- source_word: וְכַלְנֵה
  english_pob_choice: Calneh
  chosen_spanish: Calné
  alternatives_spanish:
  - Calneh
  - Calno
  lexicon: HALOT
  rationale: Se mantiene el nombre propio con adaptación española de acentuación gráfica para lectura fluida. La forma hebrea masorética corresponde a «Calneh», y el texto español la refleja como «Calné» sin introducir una variante no atestiguada aquí.
- source_word: בְּאֶרֶץ שִׁנְעָר
  english_pob_choice: in the land of Shinar
  chosen_spanish: en la tierra de Sinar
  alternatives_spanish:
  - en Sinar
  - en el país de Sinar
  lexicon: HALOT
  rationale: «Tierra» conserva el valor geográfico de אֶרֶץ y mantiene la formulación bíblica natural en español. «Sinar» sigue la transliteración habitual del topónimo.
translation_notes:
  revision_awareness: Se revisó el texto inglés POB y su aparato crítico; no se registraron cambios de revisión aplicados. La traducción española sigue la misma decisión de conservar los nombres propios transliterados y de entender רֵאשִׁית como «comienzo» en vez de una noción más específica como «capital» o «parte principal».
  spanish_consistency_notes:
  - Se conserva «Babel» en el texto principal para mantener la coherencia con la política POB y con la conexión intertextual con Génesis 11.
  - Se usa «tierra de Sinar» porque el hebreo tiene אֶרֶץ y no solo un topónimo desnudo.
  - 'Los nombres propios se adaptan al español de forma legible: Erej, Acad, Calné, sin desplazar el sentido histórico al texto principal.'
  - No se introduce lenguaje confesional tradicional como «SEÑOR» o «Babilonia» en ausencia de una razón textual para hacerlo.
