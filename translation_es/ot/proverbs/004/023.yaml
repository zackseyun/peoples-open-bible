translation:
  language: es
  text: Por encima de toda vigilancia[a], guarda tu corazón, porque de él brotan los manantiales[b] de la vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, ‘más que toda guarda’ o ‘sobre toda vigilancia’; el hebreo expresa una prioridad absoluta de custodia.
    reason: lexical_alternative
  - marker: b
    text: O ‘fuentes/orígenes de la vida’. La imagen hebrea puede entenderse como salidas, fuentes o brotes de vida; ‘manantiales’ conserva la metáfora con claridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכָּל מִשְׁמָר
  english_pob_choice: more than all guarding
  chosen_spanish: Sobre toda guarda[a]
  alternatives_spanish:
  - más que toda guardia
  - por encima de toda vigilancia
  - más que toda custodia
  lexicon: HALOT
  rationale: 'El hebreo usa una construcción comparativa/intensiva: literalmente, ‘sobre toda guardia’ o ‘más que toda vigilancia’. En español, ‘Sobre toda guarda’ conserva la prioridad absoluta y el tono proverbial sin volver la frase pesada. Se deja la nota para explicitar la comparación subyacente.'
- source_word: נְצֹר
  english_pob_choice: Guard
  chosen_spanish: guarda
  alternatives_spanish:
  - guarda con diligencia
  - custodia
  - vigila
  lexicon: HALOT
  rationale: El imperativo pide protección activa. ‘Guarda’ es breve, enérgico y mantiene el juego de vigilancia con מִשְׁמָר mejor que una paráfrasis más larga.
- source_word: לִבֶּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu interior
  - tu ser interior
  lexicon: HALOT
  rationale: Se conserva ‘corazón’ literalmente, porque en antropología hebrea es el centro de pensamiento, voluntad y afectos. ‘Corazón’ es la opción más fiel y reconocible en español bíblico contemporáneo.
- source_word: תּוֹצְאוֹת
  english_pob_choice: springs
  chosen_spanish: manantiales
  alternatives_spanish:
  - fuentes
  - salidas
  - emanaciones
  lexicon: HALOT
  rationale: El término puede referirse a salidas, fuentes u orígenes. ‘Manantiales’ comunica bien la imagen de vida que brota desde el interior y resulta natural en español, preservando la metáfora acuática del hebreo.
- source_word: חַיִּים
  english_pob_choice: life
  chosen_spanish: de la vida
  alternatives_spanish:
  - de vida
  - de las vidas
  lexicon: HALOT
  rationale: Aunque el hebreo está en plural, funciona aquí como sustantivo abstracto. ‘De la vida’ mantiene la referencia singular colectiva natural en español.
theological_decisions:
- issue: Alcance antropológico de ‘corazón’
  english_pob_reading: Retain 'heart' literally as the center of inner life, without reducing it to emotions alone.
  chosen_spanish_reading: Conservar ‘corazón’ literalmente como centro de la vida interior, no solo de los sentimientos.
  alternative_spanish_readings:
  - mente
  - interior
  - ser interior
  rationale: El proverbio habla con el lenguaje antropológico típico del hebreo. Traducir ‘corazón’ evita reducir el mandato a emociones y preserva el marco conceptual del texto.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El inglés auditado revisó la primera redacción de ‘above all guarding’ a ‘more than all guarding’ para naturalizar la comparación sin perder el énfasis hebreo. La versión española sigue esa misma línea intensiva con ‘Sobre toda guarda’ y conserva la imagen final de flujo vital mediante ‘manantiales’.
  spanish_consistency_notes:
  - Se mantiene ‘corazón’ de forma literal y antropológicamente amplia, coherente con el tratamiento del hebreo bíblico en el proyecto.
  - Se evita ‘Señor’ o terminología ajena al versículo; el texto depende solo de vocabulario sapiencial directo.
  - ‘Guarda’ funciona aquí como verbo imperativo y como eco nominal de la idea de custodia, preservando la concisión proverbial.
  - ‘Manantiales’ ofrece una solución clara para תּוֹצְאוֹת sin caer en el tradicional pero opaco ‘salidas’ o ‘issues’.
