revisions:
- from: En todo lo que yo les he dicho[a], tengan cuidado[b]; y el nombre de otros dioses no lo mencionarán[c]; no se oirá sobre tu boca.
  to: En todo lo que les he dicho, tengan cuidado[a]; y el nombre de otros dioses no mencionarán[b]; no se oirá en sus labios[c].
  rationale: Se eliminó el pronombre objeto innecesario, se sustituyó la expresión poco idiomática «sobre tu boca» por «en sus labios», y se armonizó la referencia al destinatario para una lectura natural en español manteniendo el sentido legal del hebreo y del POB inglés. También se simplificaron las notas para conservar solo alternativas léxicas realmente útiles.
