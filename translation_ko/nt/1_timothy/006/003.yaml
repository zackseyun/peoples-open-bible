  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「우리 주 예수 메시아의 말씀」 그 자체.
    reason: lexical_alternative
  - marker: b
    text: 헬라어는 「예수 그리스도」; 본 번역은 칭호의 무게를 살려 「예수 메시아」로 옮긴다.
    reason: alternative_reading
