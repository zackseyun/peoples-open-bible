translation:
  language: es
  text: Apresten los caballos; monten, jinetes; tomen su puesto con los cascos puestos. Pulan las lanzas[a]; pónganse la armadura[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bruñan las lanzas». El hebreo también puede expresar la idea de hacerlas relucir.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo «siryonot»: armadura corporal, posiblemente cotas de malla o corazas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִסְרוּ
  english_pob_choice: Harness
  chosen_spanish: Apresten
  alternatives_spanish:
  - Atréven
  - Aten
  - Ajusten
  lexicon: HALOT
  rationale: En contexto militar, el imperativo pide dejar listos los caballos para la acción; «apresten» comunica preparación inmediata mejor que un simple «aten». No se pierde la fuerza imperativa del hebreo.
- source_word: הַסּוּסִים
  english_pob_choice: the horses
  chosen_spanish: los caballos
  alternatives_spanish:
  - los caballos de guerra
  - los équidos
  lexicon: HALOT
  rationale: «Caballos» es el equivalente natural y directo del sustantivo plural definido; el contexto militar ya está dado por el verso.
- source_word: וַעֲלוּ
  english_pob_choice: mount up
  chosen_spanish: monten
  alternatives_spanish:
  - suban
  - ábranse paso
  lexicon: HALOT
  rationale: Con jinetes, el valor idiomático es subir al caballo; en español «monten» conserva la orden militar con naturalidad.
- source_word: הַפָּרָשִׁים
  english_pob_choice: you horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - caballeros
  - caballería
  lexicon: HALOT
  rationale: El hebreo se dirige a los montados; «jinetes» expresa esa vocación directa sin cargar el texto con un vocativo innecesariamente explícito.
- source_word: וְהִתְיַצְּבוּ
  english_pob_choice: take your stand
  chosen_spanish: pónganse de pie
  alternatives_spanish:
  - tomen su puesto
  - háganse presentes
  - párense firmes
  lexicon: HALOT
  rationale: La idea militar es colocarse en formación. «Pónganse de pie» conserva el verbo de postura; la continuación «con los cascos puestos» mantiene el marco bélico de manera clara en español.
- source_word: בְּכֹובָעִים
  english_pob_choice: with helmets on
  chosen_spanish: con los cascos puestos
  alternatives_spanish:
  - con yelmos puestos
  - con cascos
  - con los yelmos
  lexicon: HALOT
  rationale: «Cascos» es un equivalente comprensible y moderno para el término militar de cabeza. Se eligió una formulación que refleje el estado de estar equipados, no solo portar el objeto.
- source_word: מִרְקוּ
  english_pob_choice: Polish
  chosen_spanish: Abrillen
  alternatives_spanish:
  - Pulen
  - Lustren
  - Bricen
  lexicon: HALOT
  rationale: El verbo implica hacer relucir o frotar hasta dejar brillante; «abrillen» preserva la imagen de brillo/preparación que el POB también permitió con «burnish/polish».
- source_word: הָרְמָחִים
  english_pob_choice: the spears
  chosen_spanish: las lanzas
  alternatives_spanish:
  - las spears
  - las picas
  - las jabalinas
  lexicon: HALOT
  rationale: «רְמָחִים» puede referir a lanzas o spears; «lanzas» es el término militar más natural en español y mantiene el campo semántico de arma larga ofensiva.
- source_word: לִבְשׁוּ
  english_pob_choice: put on
  chosen_spanish: pónganse
  alternatives_spanish:
  - vistan
  - colóquense
  - átense
  lexicon: HALOT
  rationale: El imperativo de לבשׁ se expresa de forma natural en español con «ponerse» para prendas/equipo. Aquí el complemento «la armadura» hace claro el sentido de equiparse.
- source_word: הַסִּרְיֹנֹת
  english_pob_choice: the armor
  chosen_spanish: la armadura
  alternatives_spanish:
  - la coraza
  - las corazas
  - la cota de malla
  lexicon: HALOT
  rationale: El término designa armamento corporal; «armadura» conserva la amplitud del hebreo y evita estrecharlo indebidamente a una pieza específica como «coraza» o «cota de malla».
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audito inglés: mantiene la secuencia de comandos militares y conserva la ambigüedad léxica de מִרְקוּ y סִּרְיֹנֹת mediante notas, sin añadir contenido interpretativo no sustentado.'
  spanish_consistency_notes:
  - Se mantuvo un registro militar claro y contemporáneo, evitando arcaísmos innecesarios.
  - Se usaron términos generales («armadura», «lanzas») cuando el hebreo es más amplio o menos específico que opciones más técnicas.
  - La nota sobre las lanzas preserva la tensión entre «polish» y «burnish» del POB inglés.
  - La nota sobre la armadura preserva la posible especificidad material del hebreo sin fijarla indebidamente.
