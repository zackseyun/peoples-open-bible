id: 1PE.2.18
reference: 1 Peter 2:18
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Οἱ οἰκέται ὑποτασσόμενοι ἐν παντὶ φόβῳ τοῖς δεσπόταις, οὐ μόνον τοῖς ἀγαθοῖς καὶ ἐπιεικέσιν ἀλλὰ καὶ τοῖς σκολιοῖς.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/018.yaml
  text: 'Household servants, submitting yourselves to your masters with all respect, not only to the good and gentle but also to the crooked.'
translation:
  language: ko
  text: '가복[a]된 여러분, 온갖 두려움으로 주인들에게 복종하십시오. 선하고 너그러운 주인들에게뿐 아니라 비뚤어진 주인들에게도 그리하십시오.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '「가복」(οἰκέτης)은 「집에 속한 종」으로, 일반적 δοῦλος(종)와는 구별된다. 베드로는 의도적으로 가내 노예를 가리키는 어휘를 택하여, 1세기 그레코-로만 가정 안의 실제 매인 자들을 직접 부른다. 본문은 그들의 매임의 부당성을 미화하지 않는다 — 「비뚤어진」 주인의 존재 자체가 그 현실의 폭로다.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκέται
  english_pob_choice: Household servants
  chosen_korean: 가복(家僕)
  alternatives_korean:
  - 가정 노예들
  - 집안의 종들
  - 가내 노예들
  lexicon: BDAG
  rationale: οἰκέτης는 δοῦλος와 명백히 구별되는 별도의 어휘다. 「가복」은 한국어에서 「집에 속한 종」이라는 정확한 등가어로, 1세기 가내 노예의 사회적 위치를 그대로 담는다. 「가정 노예」도 가능하나 행정적 어감이 강하고, 「종」은 δοῦλος와 구별이 사라진다.
- source_word: δεσπόταις
  english_pob_choice: masters
  chosen_korean: 주인들
  alternatives_korean:
  - 상전들
  - 가장들
  lexicon: BDAG
  rationale: δεσπότης는 「절대 권한을 가진 주인」. 「주인」으로 옮긴다.
- source_word: ἐν παντὶ φόβῳ
  english_pob_choice: with all respect
  chosen_korean: 온갖 두려움으로
  alternatives_korean:
  - 모든 경외함으로
  - 깊은 두려움으로
  lexicon: BDAG
  rationale: φόβος를 직역하여 「두려움」으로 옮긴다. EN POB의 「respect」로 평이화하지 않는다 — 본문은 가내 노예의 실제 두려움을 미화하지 않으며, 「온갖 두려움」이 곧 2:19-20의 부당한 고난과 연결된다.
- source_word: τοῖς ἀγαθοῖς καὶ ἐπιεικέσιν
  english_pob_choice: the good and gentle
  chosen_korean: 선하고 너그러운
  alternatives_korean:
  - 좋고 관대한
  lexicon: BDAG
  rationale: ἐπιεικής의 「공정·관용」을 「너그러운」으로 옮긴다.
- source_word: τοῖς σκολιοῖς
  english_pob_choice: the crooked
  chosen_korean: 비뚤어진
  alternatives_korean:
  - 굽은
  - 부당한
  lexicon: BDAG
  rationale: σκολιός의 문자적 「굽은·뒤틀린」 의미를 살려 「비뚤어진」으로 옮긴다. 도덕적 부패함을 가리킨다.
theological_decisions:
- issue: οἰκέτης와 δοῦλος의 구별 보존
  chosen_reading: '「가복」으로 옮겨 δοῦλος와 별개 어휘임을 명시 (각주로 설명)'
  alternative_readings:
  - 「종」으로 통합
  - 「가정 노예」
  rationale: 베드로는 일반적 δοῦλος가 아니라 의도적으로 οἰκέτης라는 별도 단어를 사용해 가내 노예를 직접 부른다. 글로서리 정책에 따라 두 단어를 한국어에서도 구별한다.
  doctrine_reference: 'DOCTRINE.md: 원어 우선; 매임 어휘의 정확한 구별'
- issue: 2:18-25 단락에서 가내 노예의 부당한 고난을 미화하지 않음
  chosen_reading: '「온갖 두려움」「비뚤어진 주인」「부당하게 고난당하면서」 등을 직역으로 보존; 가내 노예제 자체를 옹호하지 않고 메시아의 본받기로 향함'
  alternative_readings:
  - 「두려움」을 「존경」으로 평이화
  - 「비뚤어진」을 「엄한」으로 완화
  rationale: 베드로전서는 가내 노예제를 옹호하거나 미화하지 않는다. 부당한 매임의 현실을 그대로 직시하면서, 메시아의 본을 따라 부당한 고난을 견디는 길을 제시한다 (2:21-25). 본문의 강도를 약화시키지 않는다.
  doctrine_reference: 'DOCTRINE.md: 원어의 진실하고 강한 의미 보존; 미화·완화 회피'
