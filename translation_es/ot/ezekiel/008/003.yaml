translation:
  language: es
  text: Entonces extendió lo que parecía una mano[a] y me tomó por un mechón de mi cabello, y el Espíritu[b] me alzó entre la tierra y los cielos y me llevó a Jerusalén en visiones de Dios, a la entrada de la puerta interior que mira al norte, donde estaba el asiento de la imagen de los celos que provoca celos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la semejanza de una mano».
    reason: lexical_alternative
  - marker: b
    text: O «viento» o «un espíritu» para רוּחַ.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּבְנִית יָד
  english_pob_choice: what looked like a hand
  chosen_spanish: la forma de una mano
  alternatives_spanish:
  - lo que parecía una mano
  - la semejanza de una mano
  lexicon: HALOT
  rationale: תַּבְנִית indica forma, diseño o semejanza. En español, «la forma de una mano» conserva la imagen visual sin afirmar una mano literal, manteniendo la cautela del contexto visionario.
- source_word: בְּצִיצִת רֹאשִׁי
  english_pob_choice: by a lock of my head
  chosen_spanish: por un mechón de mi cabeza
  alternatives_spanish:
  - por un copete de mi cabeza
  - por un mechón de mi cabello
  lexicon: HALOT
  rationale: צִיצִת aquí apunta a un mechón, tupé o mata de cabello. «Mechón de mi cabeza» suena natural en español y conserva la concreción corporal de la escena.
- source_word: רוּחַ
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - un espíritu
  - el viento
  lexicon: HALOT
  rationale: En este contexto de transporte profético y visión, el término puede ser viento, espíritu o el Espíritu divino. Se mantiene «el Espíritu» por la lectura contextual más probable, sin borrar la ambigüedad semántica documentada.
- source_word: בֵּין הָאָרֶץ וּבֵין הַשָּׁמַיִם
  english_pob_choice: between the earth and the heavens
  chosen_spanish: entre la tierra y los cielos
  alternatives_spanish:
  - entre la tierra y el cielo
  - entre la tierra y los cielos
  lexicon: HALOT
  rationale: Se preserva la forma plural hebrea שָׁמַיִם con «cielos», que comunica mejor la elevación del lenguaje visionario. «Tierra» mantiene el paralelismo.
- source_word: בְּמַרְאוֹת אֱלֹהִים
  english_pob_choice: in visions of God
  chosen_spanish: en visiones de Dios
  alternatives_spanish:
  - en visiones divinas
  - en una visión de Dios
  lexicon: HALOT
  rationale: 'El hebreo usa el plural «visiones», que conviene conservar. «De Dios» mantiene la apertura del genitivo: puede indicar procedencia o cualidad, sin cerrarlo innecesariamente.'
- source_word: פֶּתַח שַׁעַר הַפְּנִימִית
  english_pob_choice: the entrance of the inner gate
  chosen_spanish: la entrada de la puerta interior
  alternatives_spanish:
  - la entrada del portón interior
  - el acceso de la puerta interior
  lexicon: HALOT
  rationale: «Entrada» traduce פֶּתַח y «puerta» traduce שַׁעַר con una construcción natural en español. «Interior» preserva el valor relacional del hebreo.
- source_word: הַפּוֹנֶה צָפוֹנָה
  english_pob_choice: that faces north
  chosen_spanish: que mira al norte
  alternatives_spanish:
  - que da al norte
  - que faces north
  lexicon: HALOT
  rationale: La forma participial se vierte idiomáticamente como «que mira al norte», clara y fiel al sentido direccional.
- source_word: מוֹשַׁב
  english_pob_choice: the seat of
  chosen_spanish: el asiento de
  alternatives_spanish:
  - el lugar de
  - la sede de
  lexicon: HALOT
  rationale: מוֹשַׁב puede denotar asiento, lugar de permanencia o emplazamiento. «Asiento de» conserva la idea de ubicación fija, y también el eco de un trono o sede idolátrica sin añadir más de lo que dice el texto.
- source_word: סֵמֶל
  english_pob_choice: image
  chosen_spanish: imagen
  alternatives_spanish:
  - ídolo
  - figura
  lexicon: HALOT
  rationale: «Imagen» es suficientemente preciso y menos interpretativo que «ídolo», dejando que el contexto de abominación cargue el matiz ofensivo.
- source_word: הַקִּנְאָה
  english_pob_choice: jealousy
  chosen_spanish: los celos
  alternatives_spanish:
  - la celosía
  - la envidia
  lexicon: HALOT
  rationale: En contexto pactal, קִנְאָה se refiere a celos/ardor celoso. En español, «celos» mantiene la idea de reacción provocada; el plural se usa aquí en la expresión fija «imagen de los celos» para reflejar la construcción nominal sin forzar una abstracción ajena al registro bíblico.
- source_word: הַמַּקְנֶה
  english_pob_choice: that provokes jealousy
  chosen_spanish: que provoca celos
  alternatives_spanish:
  - que causa celos
  - que mueve a celos
  lexicon: HALOT
  rationale: El participio de קנא tiene fuerza causativa. «Que provoca celos» conserva el juego verbal del hebreo entre el sustantivo y el verbo, aunque en español el enlace natural exige ajustar el orden.
theological_decisions:
- issue: 'רוּחַ en el transporte visionario: ¿viento, espíritu o el Espíritu divino?'
  english_pob_reading: the Spirit
  chosen_spanish_reading: el Espíritu
  alternative_spanish_readings:
  - un espíritu
  - el viento
  rationale: La escena es de visión profética y traslado sobrenatural. Por eso se conserva la lectura personal/divina, siguiendo la decisión inglesa y sin eliminar la gama semántica del hebreo; la ambigüedad queda documentada en nota.
  doctrine_reference: Mantener la tensión semántica del texto; no resolver artificialmente la polisemia de רוּחַ.
translation_notes:
  revision_awareness: 'Se sigue la decisión revisada más reciente sin cambios: la línea mantiene la lectura de visión profética con «el Espíritu», y el texto inglés/audit trail no muestra revisiones aplicadas. La redacción española conserva las mismas tensiones léxicas documentadas (forma de una mano, רוּחַ, imagen/celos) sin suavizarlas más allá de lo necesario para un español natural.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa «el Espíritu» con mayúscula por la lectura teológica documentada; la nota preserva las alternativas semánticas.
  - «Cielos» conserva el plural hebreo שָׁמַיִם.
  - «Imagen de los celos» y «que provoca celos» reproducen el juego de palabras del hebreo.
  - Se prefirió «entrada de la puerta interior» frente a una formulación más literal pero menos natural en español.
