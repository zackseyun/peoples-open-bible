translation:
  language: es
  text: Apartaron los holocaustos, para darlos por divisiones de las casas paternas a los hijos del pueblo[a], para presentarlos a Yahvé, como está escrito en el libro de Moisés; y así también con el ganado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al pueblo» o «a los laicos». El hebreo dice literalmente «a los hijos del pueblo», una expresión basada en clanes que distingue a la población general de los sacerdotes y levitas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסִירוּ
  english_pob_choice: They removed
  chosen_spanish: apartaron
  alternatives_spanish:
  - removieron
  - separaron
  - retiraron
  lexicon: HALOT
  rationale: El hebreo hifil de סור expresa hacer que algo sea quitado o apartado de su lugar. En español, 'apartaron' comunica bien la acción de separar las ofrendas para su distribución ritual, sin sugerir una eliminación indebida.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offerings
  chosen_spanish: las ofrendas quemadas
  alternatives_spanish:
  - la ofrenda quemada
  - las ofrendas ascendentes
  - los holocaustos
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, el contexto es colectivo; por eso el sentido plural está justificado. 'Ofrendas quemadas' evita el tecnicismo eclesiástico 'holocaustos' y conserva el valor sacrificial de עֹלָה sin volverlo demasiado etimológico.
- source_word: לְתִתָּם
  english_pob_choice: to give them
  chosen_spanish: para darlas
  alternatives_spanish:
  - para entregarlas
  - para distribuirlas
  lexicon: HALOT
  rationale: 'El infinitivo con sufijo indica propósito: apartarlas para darlas. ''Darlas'' mantiene la cercanía al hebreo y permite que las frases siguientes especifiquen el reparto.'
- source_word: לְמִפְלַגּוֹת
  english_pob_choice: by divisions
  chosen_spanish: por divisiones
  alternatives_spanish:
  - según divisiones
  - en divisiones
  - por turnos
  lexicon: HALOT
  rationale: La idea es una organización por grupos establecidos. 'Por divisiones' refleja el procedimiento administrativo y ritual sin añadir un matiz no atestiguado.
- source_word: לְבֵית אָבוֹת
  english_pob_choice: of the fathers’ houses
  chosen_spanish: según las casas paternas
  alternatives_spanish:
  - de las casas paternas
  - según las casas de los padres
  - por casas de familias
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula de organización clánica. 'Casas paternas' preserva la estructura formal y evita perder el vínculo genealógico y administrativo del término.
- source_word: לִבְנֵי הָעָם
  english_pob_choice: to the sons of the people
  chosen_spanish: a los hijos del pueblo
  alternatives_spanish:
  - al pueblo
  - a la gente del pueblo
  - a los laicos
  lexicon: HALOT
  rationale: Se conserva la estructura literal 'hijos del pueblo' para respetar la expresión hebrea y su distinción entre la población general y los oficiales cultuales. 'Hijos' funciona como equivalente natural de בני en este contexto.
- source_word: לְהַקְרִיב לַיהוָה
  english_pob_choice: to present to Yahweh
  chosen_spanish: para presentarlas a Yahvé
  alternatives_spanish:
  - para ofrecerlas a Yahvé
  - para acercarlas a Yahvé
  lexicon: HALOT
  rationale: הקריב en contexto sacrificial significa presentar/ofrecer. 'Presentarlas' es natural en español y conserva la idea de acercar la víctima u ofrenda para Yahvé, siguiendo el estándar POB de usar 'Yahvé' para el nombre divino.
- source_word: כַּכָּתוּב בְּסֵפֶר מֹשֶׁה
  english_pob_choice: as it is written in the Book of Moses
  chosen_spanish: como está escrito en el libro de Moisés
  alternatives_spanish:
  - tal como está escrito en el libro de Moisés
  - como está escrito en el Libro de Moisés
  lexicon: HALOT
  rationale: La fórmula remite a instrucción mosaica escrita. En español, 'libro de Moisés' es suficientemente claro y fiel; no se capitaliza 'Libro' porque el hebreo no exige una designación técnica en mayúscula.
- source_word: וְכֵן לַבָּקָר
  english_pob_choice: and so also with the cattle
  chosen_spanish: y así también con el ganado
  alternatives_spanish:
  - y lo mismo con el ganado
  - y también con los bueyes
  - y así también con el ganado vacuno
  lexicon: HALOT
  rationale: La cláusula final es elíptica y extiende el mismo procedimiento a los animales bovinos. 'Ganado' comunica el conjunto de bovinos en un registro natural; 'también' preserva la extensión del procedimiento.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo el criterio del proyecto, se preserva el nombre del pacto como 'Yahvé' en el texto principal, en vez de ocultarlo con 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Gendered expression in לִבְנֵי הָעָם
  english_pob_reading: sons of the people
  chosen_spanish_reading: los hijos del pueblo
  alternative_spanish_readings:
  - el pueblo
  - los laicos
  - la gente
  rationale: La expresión hebrea es masculina y representativa. Se mantiene la forma masculina en español para no neutralizar el dato gramatical del original; el sentido colectivo queda claro por el contexto ritual de distribución.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con la auditoría inglesa y no requiere cambios sustanciales. Se mantiene la distribución ritual, la expresión clánica masculina y el nombre divino Yahvé, sin aplanar el hebreo ni introducir terminología eclesiástica ajena al texto.
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' para el Tetragrámaton, conforme al estándar del proyecto.
  - '''Casas paternas'' conserva la fórmula administrativa-clánica del hebreo.'
  - '''Hijos del pueblo'' mantiene la forma masculina representativa del original.'
  - '''Ofrendas quemadas'' evita el calco rígido ''holocaustos'' y conserva el sentido sacrificial.'
  - La clausula final 'y así también con el ganado' reproduce la brevedad elíptica del hebreo.
