    reason: lexical_alternative
  revision_rationale: Se conserva el borrador casi por completo, pero se cambia 'los ha cumplido' por 'los ha puesto por obra' para reflejar mejor la distinción hebrea entre guardar los estatutos y efectivamente hacerlos, en línea con la decisión auditada del English POB.
