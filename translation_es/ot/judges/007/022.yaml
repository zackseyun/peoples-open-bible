  - severity: high
    issue: La nota [a] no ofrece una alternativa real y duplica el texto principal.
    rationale: La nota dice «O “se tocaron los trescientos cuernos de carnero”» cuando esa misma es la lectura principal. Esto invalida la función de nota alternativa y no preserva correctamente el audit trail.
  - severity: medium
