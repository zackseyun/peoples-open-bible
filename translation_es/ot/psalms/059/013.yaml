translation:
  language: es
  text: El pecado de su boca, la palabra de sus labios[a]; que sean atrapados en su soberbia[b], a causa de la maldición y la mentira que dicen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por el pecado de su boca, la palabra de sus labios, que sean atrapados en su soberbia; y por la maldición y la falsedad que hablan».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y a causa de su soberbia»; el hebreo también puede entenderse con matiz causal o instrumental.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַטַּאת
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - culpa
  - ofensa
  lexicon: HALOT
  rationale: En este contexto el sustantivo expresa mal moral en el hablar, no un sacrificio por el pecado. «Pecado» es la equivalencia más directa y natural en español.
- source_word: פִּימוֹ
  english_pob_choice: their mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - su boca
  - sus bocas
  lexicon: HALOT
  rationale: El singular hebreo con sufijo plural funciona de modo colectivo-poético. «Su boca» conserva ese efecto, como en el inglés POB, sin forzar una pluralización innecesaria.
- source_word: דְּבַר
  english_pob_choice: the word of
  chosen_spanish: la palabra de
  alternatives_spanish:
  - el dicho de
  - la expresión de
  lexicon: HALOT
  rationale: La construcción en hebreo es genitiva y paralela con «sus labios». «La palabra de» mantiene la formulación poética y la relación entre boca y labios.
- source_word: שְׂפָתֵימוֹ
  english_pob_choice: their lips
  chosen_spanish: sus labios
  alternatives_spanish:
  - su hablar
  - su lenguaje
  lexicon: HALOT
  rationale: Se conserva la imagen corporal literal porque el versículo subraya el hablar pecaminoso mediante el paralelismo boca/labios.
- source_word: וְיִלָּכְד֥וּ
  english_pob_choice: let them be caught
  chosen_spanish: que sean atrapados
  alternatives_spanish:
  - que sean apresados
  - que queden atrapados
  lexicon: HALOT
  rationale: El nifal imperfecto funciona aquí con valor jussivo en un contexto de imprecación. «Que sean atrapados» expresa bien ese deseo y suena natural en español.
- source_word: בִגְאוֹנָם
  english_pob_choice: in their pride
  chosen_spanish: en su soberbia
  alternatives_spanish:
  - en su orgullo
  - por su arrogancia
  - en su altivez
  lexicon: HALOT
  rationale: גאון aquí denota autoexaltación arrogante. «Soberbia» comunica mejor en español la idea de orgullo altivo y culpable, más que un orgullo neutro.
- source_word: וּמֵאָלָה
  english_pob_choice: because of the curse
  chosen_spanish: por la maldición
  alternatives_spanish:
  - a causa de la maldición
  - por el juramento maldito
  - por la imprecación
  lexicon: HALOT
  rationale: La preposición מִן tiene aquí sentido causal. El sustantivo admite «maldición» y también «maldición/imprecación»; se eligió una forma clara y breve que mantiene el paralelismo con la frase siguiente.
- source_word: וּמִכַּחַשׁ
  english_pob_choice: the lie
  chosen_spanish: la mentira
  alternatives_spanish:
  - la falsedad
  - el engaño
  lexicon: HALOT
  rationale: כחש puede referirse a falsedad o engaño. «La mentira» es concisa y se coordina bien con «la maldición» en la secuencia poética.
- source_word: יְסַפֵּרוּ
  english_pob_choice: they tell
  chosen_spanish: dicen
  alternatives_spanish:
  - relatan
  - declaran
  - cuentan
  lexicon: HALOT
  rationale: Aunque ספר suele significar «contar/relatar», aquí se refiere de forma general a lo que siguen diciendo. «Dicen» es la opción más natural en español con «la mentira».
theological_decisions:
- issue: Fuerza imprecatoria del verbo jussivo
  english_pob_reading: let them be caught
  chosen_spanish_reading: que sean atrapados
  alternative_spanish_readings:
  - caigan atrapados
  - que queden presos
  rationale: El hebreo expresa un ruego/jussivo dentro de una imprecación. La versión española conserva el tono de petición de juicio sin suavizarlo a mera predicción.
  doctrine_reference: Salmos imprecatorios; juicio divino sobre la maldad de la palabra
- issue: Sentido causal de la cláusula final
  english_pob_reading: because of the curse and the lie that they tell
  chosen_spanish_reading: por la maldición y la mentira que dicen
  alternative_spanish_readings:
  - a causa de la maldición y la mentira que dicen
  - por la maldición y la falsedad que dicen
  rationale: Se preserva la relación causal indicada por מִן, evitando una lectura meramente aditiva. La frase final explica el motivo de la caída, no un segundo tema independiente.
  doctrine_reference: Recompensa/retribución moral; responsabilidad por palabras perversas
translation_notes:
  revision_awareness: 'La base inglesa revisada mantiene la estructura: pecado de la boca / palabra de los labios / atrapados en la soberbia / por la maldición y la mentira. La versión española sigue esa arquitectura, pero ajusta «because of» a «por» para un causal más natural en español y usa «soberbia» para reflejar mejor גאון como autoexaltación arrogante. También se preserva la opción alternativa de leer la cláusula inicial y la causal final de forma ligeramente distinta, como en la nota inglesa a.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto solo cuando el texto lo requiera; en este versículo no aparece.
  - Se conserva el paralelismo corporal boca/labios sin sustituirlo por un resumen abstracto.
  - «Soberbia» se usa aquí como término moralmente marcado, equivalente al orgullo arrogante del hebreo.
  - La puntuación española refleja una sola oración con semicolon implícito mediante coma y punto y coma, acorde al ritmo poético.
