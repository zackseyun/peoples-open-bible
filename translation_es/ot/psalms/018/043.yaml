translation:
  language: es
  text: Los trituraba como polvo ante el viento[a][b]; como lodo en las calles los derramaba[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los aplastaba como polvo». El verbo hebreo también puede llevar la idea de moler o pulverizar.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sobre la faz del viento», un modismo hebreo para algo que es arrastrado o dispersado por el viento.
    reason: lexical_alternative
  - marker: c
    text: O «como barro en las calles los vertía».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶשְׁחָקֵם
  english_pob_choice: I beat them fine
  chosen_spanish: Los desmenuzaba
  alternatives_spanish:
  - Los trituraba
  - Los molía
  - Los aplastaba
  lexicon: HALOT
  rationale: El hebreo en qal con sufijo de 3ª plural expresa la idea de pulverizar o reducir a polvo. «Desmenuzar» comunica bien esa acción de deshacer en partículas sin perder naturalidad en español.
- source_word: כְּעָפָר
  english_pob_choice: like dust
  chosen_spanish: como polvo
  alternatives_spanish:
  - como polvo fino
  - como tierra
  lexicon: HALOT
  rationale: עָפָר designa polvo/tierra suelta. «Polvo» es claro y natural en español, y conserva la imagen de pulverización.
- source_word: עַל־פְּנֵי רוּחַ
  english_pob_choice: before the wind
  chosen_spanish: ante el viento
  alternatives_spanish:
  - sobre la faz del viento
  - en la faz del viento
  - antes del viento
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «sobre la faz del viento», una imagen idiomática de ser arrastrado o dispersado. «Ante el viento» mantiene esa fuerza idiomática en español sin sonar rígido.
- source_word: כְּטִיט חוּצוֹת
  english_pob_choice: like mud in the streets
  chosen_spanish: como lodo en las calles
  alternatives_spanish:
  - como barro en las calles
  - como fango en las calles
  - como lodo de las calles
  lexicon: HALOT
  rationale: טִיט es lodo/barro/fango; חוּצוֹת son calles o espacios públicos. «Lodo en las calles» conserva la imagen degradante y es comprensible en español amplio.
- source_word: אֲרִיקֵם
  english_pob_choice: I poured them out
  chosen_spanish: los derramaba
  alternatives_spanish:
  - los vaciaba
  - los vertía
  - los esparcía
  lexicon: HALOT
  rationale: El hiphil de ריק comunica vaciar o derramar. «Derramar» recoge bien la acción de verter/verter fuera, y se integra con la imagen del lodo en la calle.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado final indicado es de alta concordancia y sin modificaciones necesarias.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, evitando calcos innecesarios.
  - Se preserva la imaginería hebrea de pulverización y derramamiento sin suavizarla.
  - «Polvo», «viento», «lodo» y «calles» se eligieron por claridad pública y fidelidad semántica.
  - Las notas alternativas conservan la tensión entre el sentido literal del hebreo y la fluidez del español.
