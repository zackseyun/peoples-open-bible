revisions:
- from: Tus flechas son afiladas[a]; los pueblos caen debajo de ti; están en el corazón de los enemigos del rey.
  to: Tus flechas son afiladas[a]; los pueblos caen ante ti; tus flechas están en el corazón de los enemigos del rey.
  rationale: Se ajusta «debajo de ti» a «ante ti» para un español más natural en poesía de victoria, y se repite «tus flechas» en la última cláusula para resolver la elipsis de manera clara sin añadir una acción interpretativa ausente del hebreo. Se conserva «del rey» y la compresión poética general del versículo.
