review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura participial y el sentido general del hebreo: el opresor hiere a pueblos con furia y domina a naciones con ira. También intenta preservar la compresión de la cláusula final. Sin embargo, la nota b no refleja bien la alternativa documentada en el rastro inglés: allí la alternativa es que la cláusula final describa a las naciones como perseguidas sin descanso, no simplemente ''una persecución implacable sobre las naciones''. Además, la nota a introduce ''sin restricción'' como si fuera parte del texto base, cuando la nota inglesa presenta ''without sparing'' como alternativa a ''without restraint''; en español conviene formular la alternativa directamente desde el hebreo de modo más claro.'
  spanish_quality_summary: 'El texto principal es legible y digno. ''Golpeando a los pueblos… dominando a las naciones…'' funciona bien en español. ''Con persecución implacable'' es aceptable como solución española a la cláusula final difícil, aunque algo abstracta. El principal problema de calidad está en las notas: ''la cola final es comprimido'' es poco natural; mejor ''la cláusula final es condensada/comprimida''. También conviene pulir la nota a para que suene natural y precisa en español eclesial.'
  glossary_alignment: 'No hay conflictos con la terminología del proyecto: no aparecen Yahvé, Mesías, etc. Se mantiene bien la distinción עמים = ''pueblos'' y גוים = ''naciones''. ''Dominando'' para רֹדֶה es defendible en contexto opresivo, aunque ''gobernando'' sería más literal. ''Furia'' e ''ira'' preservan el paralelismo semántico correctamente.'
  issues:
  - severity: medium
    issue: La nota b no conserva con precisión la alternativa de lectura documentada.
    rationale: El rastro inglés dice que la cláusula final también puede entenderse como describiendo a las naciones siendo perseguidas sin descanso. La redacción actual ('una persecución implacable sobre las naciones') desplaza esa alternativa hacia un sustantivo abstracto y no refleja claramente el valor pasivo/alternativo.
  - severity: low
    issue: La nota a está redactada de forma poco natural y algo confusa.
    rationale: 'La formulación actual con comillas y ''para la idea de'' suena torpe. Conviene expresar de manera directa la alternativa léxica española derivada del hebreo: ''O: «sin escatimar»''.'
  - severity: low
    issue: La nota b contiene una discordancia y una formulación poco idiomática.
    rationale: Debe decir 'la cláusula final es comprimida/condensada', no 'la cola final es comprimido'.
  revised_spanish_text: golpeando a los pueblos con furia, con un golpe incesante[a], dominando a las naciones con ira[b], con persecución implacable.
  revised_footnotes:
  - marker: a
    text: 'O: «sin escatimar».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo de la cláusula final es condensado y también puede entenderse como describiendo a las naciones perseguidas sin descanso.
    reason: alternative_reading
  revision_rationale: 'Se conserva el texto principal porque es fiel y natural en español. Se corrigen las notas para alinearlas con el expediente inglés y con el hebreo: la nota a ahora da una alternativa léxica clara y concisa; la nota b refleja con precisión la lectura alternativa de las naciones como objeto de persecución continua y mejora la naturalidad del español.'
