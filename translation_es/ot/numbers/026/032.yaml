  - Se usa ‘de’ para reflejar la relación distributiva implícita en el hebreo, evitando una coordinación plana que oscurezca la fórmula.
  - 'Los nombres propios se transliteran con ortografía española natural: Shemida, Héfer, shemidaitas, heferitas.'
