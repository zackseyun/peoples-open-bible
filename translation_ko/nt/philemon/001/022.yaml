id: PHM.1.22
reference: Philemon 1:22
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἅμα δὲ καὶ ἑτοίμαζέ μοι ξενίαν, ἐλπίζω γὰρ ὅτι διὰ τῶν προσευχῶν ὑμῶν χαρισθήσομαι ὑμῖν.
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/022.yaml
  text: At the same time also prepare a guest room for me[b][a], for I hope that through your prayers I will be granted to you.
  footnotes:
  - marker: a
    text: Or 'lodging' or 'hospitality'; the Greek term can refer either to the act of hospitality or to the place prepared for a guest.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will be granted to you' or 'I will be given to you'; the Greek verb carries the sense of being freely or graciously given, likely implying God's agency.
    reason: lexical_alternative
translation:
  language: ko
  text: 동시에 나를 위해 묵을 곳[a]도 준비해 주십시오. 여러분의 기도를 통해 내가 여러분에게 은혜로 주어지기[b]를 바라기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「숙소」 또는 「환대」. 헬라어 ξενία는 환대의 행위 자체 또는 손님을 위해 준비된 장소를 함께 가리킬 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「여러분에게 허락되다」 또는 「여러분에게 주어지다」. 헬라어 동사는 값없이·은혜로 주어진다는 의미를 담으며, 하나님의 행위를 함축한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅμα δὲ καὶ
  english_pob_choice: At the same time also
  chosen_korean: 동시에 ... 도
  alternatives_korean:
  - 그와 함께
  - 그리고 동시에
  lexicon: BDAG
  rationale: ἅμα는 「동시에」, καὶ는 추가의 「도」. 한국어 어순에서 「동시에 ~도」가 추가 부탁의 흐름을 자연스럽게 살린다.
- source_word: ἑτοίμαζέ
  english_pob_choice: prepare
  chosen_korean: 준비해 주십시오
  alternatives_korean:
  - 준비하십시오
  - 마련해 주십시오
  lexicon: BDAG
  rationale: 현재 명령형. 합쇼체 「준비해 주십시오」가 정중한 부탁의 무게를 살린다.
- source_word: μοι
  english_pob_choice: for me
  chosen_korean: 나를 위해
  alternatives_korean:
  - 내게
  lexicon: BDAG
  rationale: 여격의 수혜자 의미.
- source_word: ξενίαν
  english_pob_choice: a guest room
  chosen_korean: 묵을 곳
  alternatives_korean:
  - 숙소
  - 손님방
  - 머물 곳
  lexicon: BDAG
  rationale: ξενία는 환대 또는 숙소. ἑτοίμαζε + μοι와 결합한 구체적 의미는 머물 장소. 「묵을 곳」이 한국어로 자연스럽고 격식 있는 손님 영접의 어조를 살린다.
- source_word: ἐλπίζω γὰρ ὅτι
  english_pob_choice: for I hope that
  chosen_korean: ~기를 바라기 때문입니다
  alternatives_korean:
  - 내가 ~하기를 바랍니다
  - ~기를 소망하기 때문입니다
  lexicon: BDAG
  rationale: γάρ는 부탁의 이유. ἐλπίζω + ὅτι의 내용을 합쇼체 종결 「~기를 바라기 때문입니다」로 자연스럽게 마무리한다.
- source_word: διὰ τῶν προσευχῶν ὑμῶν
  english_pob_choice: through your prayers
  chosen_korean: 여러분의 기도를 통해
  alternatives_korean:
  - 여러분의 기도로 말미암아
  - 여러분의 기도로
  lexicon: BDAG
  rationale: 복수 ὑμῶν은 빌레몬과 가정 회중을 함께 가리킨다. 「여러분」으로 복수성을 살린다. διά + 속격의 도구 의미를 「~을 통해」로 옮긴다.
- source_word: χαρισθήσομαι
  english_pob_choice: will be graciously given
  chosen_korean: 은혜로 주어지기
  alternatives_korean:
  - 허락되기
  - 주어지기
  - 은혜로 허락되기
  lexicon: BDAG
  rationale: χαρίζομαι의 미래 수동태. 「은혜로 거저 준다」의 의미. 본 번역은 χαρ- 어휘군의 은혜 뉘앙스를 살려 「은혜로 주어지기」로 옮긴다. 단순 「허락되기」는 은혜 함의가 약하다.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_korean: 여러분에게
  alternatives_korean:
  - 그대들에게
  lexicon: BDAG
  rationale: 복수 여격. 빌레몬과 가정 회중 모두를 가리킨다.
theological_decisions:
- issue: χαρισθήσομαι의 의미와 행위 주체
  chosen_reading: 바울 자신이 수신자들에게 은혜로 주어지기를 바람 — 하나님의 행위를 영어 본문에 명시하지 않고 함축
  alternative_readings:
  - 내가 여러분에게 풀려나기를
  - 내가 여러분에게 허락되기를
  rationale: 수동태는 하나님을 함축적 행위자로 가리키며, 동사의 은혜 뉘앙스도 보존되어야 한다. 본 번역은 「풀려나기」 같은 옥살이 명시는 피하고(헬라어가 명시하지 않음), 은혜의 무게는 「은혜로 주어지기」로 살린다.
  doctrine_reference: 'Preserve theological tension rather than resolve it; original-language primacy'
