- from: Y el voto de una viuda o de una mujer divorciada —todo aquello con que se haya obligado— quedará en firme contra ella[a].
  to: Y el voto de una viuda o de una mujer divorciada—todo aquello por lo que se haya obligado a sí misma—quedará en firme contra ella[a].
  rationale: La revisión hace explícito el sentido reflexivo de עַל נַפְשָׁהּ («a sí misma») y mejora la naturalidad de la nota alternativa, manteniendo el tono legal y la fidelidad a las decisiones del POB inglés.
