translation:
  language: es
  text: He aquí[a], yo estoy levantando contra ellos a los medos, que no valoran la plata ni desean el oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no consideran valiosa la plata» y «no se deleitan en el oro». El hebreo subraya que los medos no están motivados por pago ni atraídos por la riqueza.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - He aquí
  - Miren pues
  - Vean
  lexicon: HALOT
  rationale: La partícula deíctica anuncia una proclamación profética y llama la atención. En español, «Miren» conserva el efecto apelativo de «Behold» con naturalidad contemporánea; «He aquí» es más tradicional, pero menos corriente en español moderno.
- source_word: מֵעִיר
  english_pob_choice: I am stirring up
  chosen_spanish: yo estoy incitando
  alternatives_spanish:
  - yo estoy despertando
  - yo estoy levantando
  - yo levantaré
  lexicon: HALOT
  rationale: El hifil de עור expresa provocar o poner en acción. En este contexto bélico, «incitando» refleja bien la idea de mover a una nación contra otra. Se evita un futuro simple porque el inglés POB conserva un valor progresivo/inminente.
- source_word: עֲלֵיהֶם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - sobre contra ellos
  lexicon: HALOT
  rationale: La preposición על con contexto hostil exige un matiz adversativo, no espacial. «Contra ellos» expresa mejor el sentido militar del hebreo.
- source_word: אֶת מָדָי
  english_pob_choice: the Medes
  chosen_spanish: los medos
  alternatives_spanish:
  - Media
  - los medos
  lexicon: HALOT
  rationale: Se trata del pueblo/nación, no solo del territorio. «Los medos» es el etnónimo natural en español y mantiene la referencia histórica.
- source_word: כֶּסֶף לֹא יַחְשֹׁבוּ
  english_pob_choice: do not value silver
  chosen_spanish: no estiman la plata
  alternatives_spanish:
  - no consideran la plata
  - no valoran la plata
  - no hacen caso de la plata
  lexicon: HALOT
  rationale: חשב aquí significa estimar, considerar valioso, no simplemente pensar. «No estiman la plata» conserva la fuerza evaluativa del verbo y deja claro que no se dejan sobornar ni mover por riqueza.
- source_word: וְזָהָב לֹא יַחְפְּצוּ בוֹ
  english_pob_choice: do not delight in gold
  chosen_spanish: ni se deleitan en el oro
  alternatives_spanish:
  - ni desean el oro
  - ni encuentran placer en el oro
  - ni lo codician
  lexicon: HALOT
  rationale: חפץ comunica deseo, agrado o deleite. «Se deleitan en» reproduce el matiz afectivo del inglés POB y evita reducirlo a mera apetencia material. El pronombre בו queda incorporado de forma idiomática en español.
theological_decisions:
- issue: La voz del anuncio profético y la agencia divina en el verbo causativo
  english_pob_reading: I am stirring up the Medes against them
  chosen_spanish_reading: yo estoy incitando contra ellos a los medos
  alternative_spanish_readings:
  - yo levantaré contra ellos a los medos
  - yo estoy despertando contra ellos a los medos
  rationale: El hebreo presenta a Yahvé como quien pone en marcha a los medos. La traducción mantiene la agencia divina explícita sin suavizarla. El presente progresivo comunica acción en curso o inminente, coherente con el valor participial del original.
  doctrine_reference: Providencia divina; soberanía de Dios sobre las naciones
- issue: La duplicación semántica de riqueza y la negativa a la motivación económica
  english_pob_reading: who do not value silver and do not delight in gold
  chosen_spanish_reading: que no estiman la plata ni se deleitan en el oro
  alternative_spanish_readings:
  - que no valoran la plata ni desean el oro
  - que no consideran la plata ni aman el oro
  rationale: El hebreo insiste en que los medos no son movidos por soborno ni por botín. Se preserva la doble negativa y la distinción entre plata y oro, sin reducirla a una sola idea general de riqueza.
  doctrine_reference: Juicio histórico; desapego de la codicia en el instrumento del juicio
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado recientemente y quedó sin cambios. La versión española sigue de cerca el mismo perfil de equivalencia óptima, manteniendo la fuerza profética, la agencia divina y la doble expresión de desapego económico sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se usa «medos» como etnónimo consistente con el referente histórico del hebreo.
  - Se mantiene «plata» y «oro» como paralelismo léxico explícito, en vez de generalizar a «riqueza».
  - Se conserva la primera persona divina explícita («yo») para reflejar la autocitación profética del hebreo.
  - La nota a pie de página recoge alternativas léxicas reales sin duplicar el sentido principal del texto.
