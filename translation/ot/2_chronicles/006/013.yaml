theological_decisions:
- issue: Meaning of כִּיּוֹר in this context
  chosen_reading: Rendered contextually as 'platform' rather than the more common 'basin/laver.'
  alternative_readings:
  - bronze basin
  - bronze stand
  rationale: The narrative says Solomon set it in the court and stood on it; the listed dimensions also fit a dais-like structure. Translating as 'basin' would mislead readers into imagining a vessel used for washing. This is a lexical-contextual decision, not a doctrinal one, but it affects the scene significantly.
  doctrine_reference: Translation philosophy §1, Original-language primacy over translation tradition; §5, Consistency of key terms, or documented exception.
