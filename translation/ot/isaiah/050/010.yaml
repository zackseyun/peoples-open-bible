theological_decisions:
- issue: Identity of 'his servant'
  chosen_reading: Retained as 'his servant' without specifying the servant's identity in the translation.
  alternative_readings:
  - the prophet
  - Israel
  - the Servant figure with messianic significance
  rationale: The immediate context in Isaiah includes the Servant motif, and Christian readers may see messianic significance, but the verse itself does not explicitly identify the servant. To preserve theological tension and avoid importing a narrower doctrinal claim than the text states, the translation leaves the referent implicit.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of שֹׁמֵעַ
  chosen_reading: Rendered with auditory-attentive sense ('listening to') rather than explicit obedience in the main text.
  alternative_readings:
  - obeying
  - heeding
  rationale: Hebrew שׁמע often includes obedience, but the lexical core is hearing/listening. Because the context supports both attentiveness and obedience, the main text preserves the more basic sense and a footnote records the stronger alternative.
  doctrine_reference: Preserve theological tension rather than resolve it.
