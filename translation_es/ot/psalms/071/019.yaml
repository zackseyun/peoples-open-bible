translation:
  language: es
  text: Y tu rectitud[a], oh, Dios, llega hasta las alturas[b]—tú que has hecho grandes cosas. Oh, Dios, ¿quién como tú?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “justicia”. El hebreo צדקה puede denotar rectitud o justicia según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O “se extiende hasta el cielo”. El hebreo literalmente significa “hasta altura/lugar alto”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/צִדְקָתְ/ךָ
  english_pob_choice: And your righteousness
  chosen_spanish: Y tu justicia
  alternatives_spanish:
  - Y tu justicia
  - Y tu rectitud
  lexicon: HALOT; POB audit trail for צדקה / δικαιοσύνη
  rationale: El contexto de alabanza a Dios permite en español 'justicia' como equivalente natural de צדקה, manteniendo la fuerza moral/covenantal reconocida por el POB. 'Rectitud' también es posible, pero 'justicia' conserva mejor la amplitud semántica y la tensión documentada con 'righteousness'/'justice'.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - oh Dios
  lexicon: HALOT
  rationale: Aquí el hebreo funciona como vocativo en poesía; por eso 'oh Dios' refleja mejor la dirección del habla que un simple 'Dios'.
- source_word: עַד מָרוֹם
  english_pob_choice: reaches to the heights
  chosen_spanish: llega hasta las alturas
  alternatives_spanish:
  - se extiende hasta las alturas
  - llega hasta el alto lugar
  - se eleva hasta lo alto
  lexicon: HALOT
  rationale: La imagen espacial 'hasta altura/lo alto' se preserva con un español fluido. 'Las alturas' comunica el alcance elevado sin forzar 'cielo', que el texto no explicita.
- source_word: אֲשֶׁר עָשִׂיתָ גְדֹלוֹת
  english_pob_choice: you who have done great things
  chosen_spanish: tú que has hecho grandes cosas
  alternatives_spanish:
  - tú que has hecho grandes obras
  - porque has hecho grandes cosas
  - ya que has hecho grandes cosas
  lexicon: HALOT
  rationale: La cláusula relativa se mantiene en español con 'tú que', conservando la relación sintáctica del hebreo y la alabanza directa a Dios.
- source_word: גְדֹלוֹת
  english_pob_choice: great things
  chosen_spanish: grandes cosas
  alternatives_spanish:
  - grandes obras
  - grandes hechos
  lexicon: HALOT
  rationale: '''Grandes cosas'' es la opción más directa e idiomática en español para el plural sustantivado; evita estrechar indebidamente a ''obras'' o ''hechos''.'
- source_word: מִי כָמוֹךָ
  english_pob_choice: who is like you?
  chosen_spanish: ¿quién como tú?
  alternatives_spanish:
  - ¿quién es como tú?
  - ¿quién se compara contigo?
  lexicon: HALOT
  rationale: La fórmula hebrea de incomparabilidad en español suena natural como '¿quién como tú?', conservando el impulso retórico del original.
theological_decisions:
- issue: 'צדקה aplicada a Dios: justicia o rectitud/righteousness'
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia
  rationale: El POB documenta la tensión lexical entre 'righteousness' y 'justice'. En español, 'justicia' comunica con claridad el atributo moral de Dios y mantiene la alternativa reconocida por el análisis del hebreo, sin borrar la amplitud del término.
  doctrine_reference: 'DOCTRINE.md: términos controvertidos para δικαιοσύνη / righteousness vs. justice; aplicado analógicamente a צדקה'
- issue: 'עַד מָרוֹם: extensión espacial sin identificar ''cielo'' como glosa obligatoria'
  english_pob_reading: reaches to the heights
  chosen_spanish_reading: llega hasta las alturas
  alternative_spanish_readings:
  - se extiende hasta las alturas
  - llega hasta el cielo
  rationale: El texto hebreo dice literalmente 'hasta altura/lo alto'. La versión española preserva la metáfora espacial sin convertirla en una identificación más específica de la que el hebreo exige. Se conserva así la tensión entre alcance y elevación.
  doctrine_reference: POB lexical note on עַד מָרוֹם / 'unto height/high place'
translation_notes:
  revision_awareness: 'Se siguió el estado revisado más reciente con acuerdo alto y sin cambios necesarios; la decisión española conserva las dos tensiones principales del verso documentadas en el audit trail: צדקה (justicia/rectitud) y עַד מָרוֹם (hasta las alturas / hasta el lugar alto).'
  spanish_consistency_notes:
  - Se usa 'oh Dios' como vocativo para las dos ocurrencias de אֱלֹהִים.
  - Se mantiene 'grandes cosas' para גְדֹלוֹת, coherente con el POB inglés.
  - 'Se conserva la pregunta retórica final en forma directa y breve: ''¿quién como tú?'''
  - Se evita 'SEÑOR' o 'Yahvé' porque el verso hebreo dice אֱלֹהִים, no el Tetragrámaton.
