translation:
  language: es
  text: Pero invoco al Dios de mis padres[a], para que sea misericordioso con mi pueblo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Dios de mis antepasados»; también «el Dios ancestral».
    reason: lexical_alternative
  - marker: b
    text: O «mi nación», «mis compatriotas» o, más literalmente, «mi linaje».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπικαλοῦμαι
  english_pob_choice: I call upon
  chosen_spanish: invoco
  alternatives_spanish:
  - llamo sobre mí
  - apelo a
  - clamo a
  lexicon: BDAG
  rationale: En este contexto de súplica solemne, «invoco» comunica una apelación dirigida a Dios con tono formal y devocional. Evita la calidez más libre de «clamo a» y mantiene mejor la fuerza de una llamada implorante.
- source_word: πατρῷον
  english_pob_choice: of my fathers
  chosen_spanish: de mis padres
  alternatives_spanish:
  - ancestral
  - de mis antepasados
  - de mis padres y antepasados
  lexicon: LSJ
  rationale: El griego señala lo perteneciente a los antepasados o padres. «De mis padres» reproduce bien la relación histórica y covenantal en español natural, sin cargar el sintagma con una abstracción como «ancestral».
- source_word: θεόν
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios verdadero
  lexicon: BDAG
  rationale: Es la equivalencia directa y normal de θεόν. Aquí el modificador πατρῷον ya aporta la caracterización histórica del Dios de Israel.
- source_word: ὅπως
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - que
  - a fin de que
  - con el fin de que
  lexicon: BDAG
  rationale: La cláusula expresa finalidad/petición. «Para que» suena natural en español y conserva la relación de propósito sin volver el estilo rígido.
- source_word: ἐλέως
  english_pob_choice: merciful
  chosen_spanish: misericordioso
  alternatives_spanish:
  - misericorde
  - benigno
  - compasivo
  lexicon: LSJ
  rationale: 'Con γένηται funciona como predicativo: Dios ha de mostrarse misericordioso. «Misericordioso» es la opción más clara y digna en español bíblico actual.'
- source_word: γένηται
  english_pob_choice: he may be
  chosen_spanish: sea
  alternatives_spanish:
  - llegue a ser
  - se muestre
  - se vuelva
  lexicon: BDAG
  rationale: En una petición con predicado adjetival, el español natural es «sea misericordioso». Evita sugerir un cambio en la naturaleza divina y conserva el valor oracional del griego.
- source_word: τῷ γένει μου
  english_pob_choice: to my nation
  chosen_spanish: con mi nación
  alternatives_spanish:
  - con mi pueblo
  - con mi gente
  - con mi linaje
  lexicon: BDAG
  rationale: γένος puede abarcar linaje, pueblo o nación. Siguiendo la decisión inglesa revisada hacia «nation», «nación» preserva el alcance colectivo sin reducirlo a familia biológica. La preposición «con» refleja mejor el giro español de misericordia dirigida hacia un grupo.
theological_decisions:
- issue: Alcance de τῷ γένει μου
  english_pob_reading: my nation
  chosen_spanish_reading: mi nación
  alternative_spanish_readings:
  - mi pueblo
  - mi linaje
  - mi gente
  rationale: En el contexto martirial, el hablante intercede por su colectivo judío, no solo por parientes inmediatos. «Mi nación» mantiene el alcance comunitario amplio que la revisión inglesa quiso subrayar, sin introducir la connotación moderna equivocada de «raza».
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor de πατρῷον θεόν
  english_pob_reading: the God of my fathers
  chosen_spanish_reading: el Dios de mis padres
  alternative_spanish_readings:
  - el Dios ancestral
  - el Dios de mis antepasados
  rationale: 'La formulación conserva el matiz histórico-pactual: el Dios reconocido por la línea de los padres de Israel. «De mis padres» es idiomático en español bíblico y no diluye la referencia a la fidelidad transmitida de generación en generación.'
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que ajustó τῷ γένει μου de «my people» a «my nation». En español se optó por «mi nación» para reflejar ese alcance colectivo amplio, mientras que πατρῷον θεόν se mantuvo como «el Dios de mis padres» por ser la equivalencia más idiomática y fiel al matiz ancestral-covenantal del griego.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεόν y no se introdujo «SEÑOR», porque el griego aquí dice θεόν y no κύριος.
  - Se eligió «misericordioso» para ἐλέως porque el predicado con γένηται pide un adjetivo natural en español.
  - «Nación» se usa en sentido colectivo étnico-histórico, no moderno-político.
  - La puntuación conserva el tono de oración breve y solemne del original.
