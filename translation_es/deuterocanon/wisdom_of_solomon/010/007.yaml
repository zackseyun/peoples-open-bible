translation:
  language: es
  text: cuya maldad todavía tiene como testimonio una tierra yerma humeante[a], plantas que dan fruto que nunca madura, y una columna de sal en pie como memorial de un alma incrédula[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Alude a la mujer de Lot en Génesis 19:26, aunque este versículo no la nombra explícitamente.
    reason: cross_reference
  - marker: b
    text: 'O: «de un alma infiel». El griego ἀπιστούσης puede denotar incredulidad o falta de fidelidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἧς
  english_pob_choice: whose
  chosen_spanish: cuyo
  alternatives_spanish:
  - de la cual
  - de quien
  lexicon: LSJ
  rationale: El relativo genitivo femenino se expresa naturalmente en español con 'cuyo', manteniendo la relación posesiva con los testimonios que siguen.
- source_word: μαρτύριον
  english_pob_choice: witness
  chosen_spanish: testimonio
  alternatives_spanish:
  - testigo
  - evidencia
  lexicon: LSJ
  rationale: '''Testimonio'' conserva la idea de algo que da testimonio o sirve como prueba, y suena más natural en español que una calca directa de ''witness''.'
- source_word: τῆς πονηρίας
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - maldad moral
  - perversidad
  - mal
  lexicon: LSJ
  rationale: El contexto apunta a mal moral; 'maldad' comunica bien el juicio ético sin volverlo excesivamente abstracto.
- source_word: καπνιζομένη
  english_pob_choice: smoking
  chosen_spanish: humeante
  alternatives_spanish:
  - todavía humeante
  - echando humo
  - ahumada
  lexicon: LSJ
  rationale: '''Humeante'' expresa el estado visible del terreno con naturalidad en español y recoge la imagen del participio presente.'
- source_word: χέρσος
  english_pob_choice: wasteland
  chosen_spanish: desierto
  alternatives_spanish:
  - tierra yerma
  - tierra baldía
  - desolación
  lexicon: LSJ
  rationale: '''Desierto'' funciona aquí como tierra devastada y sin cultivo. Se evita ''baldío'' por sonar más técnico o localista, aunque es una alternativa cercana.'
- source_word: ἀτελέστιοι
  english_pob_choice: never ripens
  chosen_spanish: nunca madura
  alternatives_spanish:
  - que nunca llega a madurar
  - inmaduro
  - sin madurar
  lexicon: LSJ
  rationale: El adjetivo remite a lo que no llega a su culminación; en español, con frutos, 'nunca madura' comunica mejor la idea que un calco adjetival.
- source_word: ὥρας
  english_pob_choice: in season
  alternatives_spanish:
  - a tiempo
  - en su tiempo
  - en sazón
  lexicon: LSJ
  rationale: La revisión inglesa eliminó 'in season' por no estar sustentado por el griego; por eso no se introduce ninguna equivalencia temporal en el texto español.
- source_word: καρποφοροῦντα φυτά
  english_pob_choice: plants bearing fruit
  chosen_spanish: plantas que dan fruto
  alternatives_spanish:
  - plantas fructíferas
  - plantas frutales
  - plantas que producen fruto
  lexicon: LSJ
  rationale: La construcción participial se vierte de forma clara y fiel con 'que dan fruto', preservando la imagen agrícola del original.
- source_word: ἀπιστούσης ψυχῆς
  english_pob_choice: of an unbelieving soul
  chosen_spanish: de un alma incrédula
  alternatives_spanish:
  - de un alma infiel
  - de un alma sin fe
  - de un alma que no creyó
  lexicon: LSJ
  rationale: '''Incrédula'' mantiene el valor de incredulidad/desconfianza sin añadir una identificación explícita que el griego no nombra.'
- source_word: μνημεῖον
  english_pob_choice: memorial
  chosen_spanish: memorial
  alternatives_spanish:
  - monumento
  - recuerdo
  - señal
  lexicon: LSJ
  rationale: Se conserva 'memorial' porque el objeto físico funciona como recordatorio con valor conmemorativo.
- source_word: ἑστηκυῖα στήλη ἁλός
  english_pob_choice: a pillar of salt standing
  chosen_spanish: una columna de sal en pie
  alternatives_spanish:
  - una columna de sal que permanece en pie
  - una columna de sal erguida
  - una columna de sal de pie
  lexicon: LSJ
  rationale: '''En pie'' transmite el participio perfecto con una solución idiomática y sobria en español, manteniendo la imagen de permanencia.'
theological_decisions:
- issue: Identificación del 'alma incrédula' y la 'columna de sal'
  english_pob_reading: Translate descriptively without naming the figure, preserving the allusion to Lot's wife.
  chosen_spanish_reading: Traducir de forma descriptiva sin nombrar a la figura, conservando la alusión bíblica sin introducir más de lo que el griego dice.
  alternative_spanish_readings:
  - Nombrar explícitamente a la mujer de Lot en el texto principal
  - Añadir una explicación interpretativa en el cuerpo del versículo
  rationale: El griego no nombra a la figura; por fidelidad de fuente, la versión española conserva la descripción y deja la identificación implícita.
  doctrine_reference: Primacía del texto fuente; no importar identificaciones tradicionales que el versículo no expresa explícitamente.
translation_notes:
  revision_awareness: La revisión inglesa eliminó 'in season' por no estar sustentado por el griego; por eso el español no introduce una equivalencia temporal adicional. También se mantuvo la lectura descriptiva de la 'columna de sal' sin nombrar a la figura aludida, en línea con el audit trail.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - '''Memorial'' se conserva por coherencia con el valor conmemorativo del objeto.'
  - Se evita 'siempre' o 'todavía' adicionales que no estén exigidos por el griego, salvo 'todavía' implícito en el adverbio temporal ya reflejado por el contexto en español.
  - '''Incrédula'' se mantiene para conservar la ambigüedad entre incredulidad e infidelidad, tal como refleja el inglés POB.'
