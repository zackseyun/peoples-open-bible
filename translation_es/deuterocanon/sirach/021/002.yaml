review_pass:
  verdict: revise
  source_alignment_summary: El borrador español sigue correctamente la base griega documentada para Sirácida 21:2, no la línea hebrea desajustada. Sin embargo, no preserva la revisión más reciente del expediente inglés, que reemplazó indebidamente la traducción griega por una traducción del hebreo desalineado. Dado que la evidencia fuente y las decisiones léxicas/teológicas favorecen claramente el griego, el texto español actual sí refleja la fuente real mejor que el texto inglés revisado; aun así, necesita un pequeño ajuste de estilo y una nota léxica más ceñida al expediente inglés.
  spanish_quality_summary: 'El español es claro y natural. La única mejora recomendable en el texto principal es usar el imperativo más directo y bíblicamente natural «Huye» en vez de «Huya», ya que el versículo griego está en segunda persona singular y el resto de la frase usa «te». También conviene simplificar la nota léxica: «víbora» añade especificidad no exigida y «serpiente venenosa» es interpretativo.'
  glossary_alignment: 'Alineado con la terminología del proyecto en los puntos relevantes: ἁμαρτία -> «pecado» está bien preservado; ὄφις -> «serpiente» es adecuado; no hay términos del glosario mayor en disputa. La decisión de seguir el griego por desajuste del hebreo está bien documentada y debe mantenerse.'
  issues:
  - severity: medium
    issue: Desajuste pronominal/persona verbal en «Huya ... si te acercas»
    rationale: '«Huya» es imperativo/forma de tratamiento de usted, mientras «te acercas» y «te morderá» son tuteo. El griego usa segunda persona singular directa; en español conviene uniformar con «Huye». '
  - severity: low
    issue: Nota léxica española añade alternativas demasiado específicas
    rationale: La nota «víbora» o «serpiente venenosa» introduce una precisión zoológica que el inglés auditado no exige. Basta con conservar «serpiente» y, si se menciona alternativa, «serpiente»/«ofidio» no mejora; mejor mantener solo la observación sobre «faz/presencia».
  - severity: medium
    issue: Conflicto interno del expediente inglés revisado
    rationale: La revisión aplicada en inglés sustituyó el texto por una traducción del hebreo desalineado, lo cual contradice la evidencia fuente, las decisiones léxicas y teológicas, y la nota textual. El español no debe seguir esa revisión errónea.
  revised_spanish_text: Huye del pecado como de la presencia de una serpiente[b][a]; porque si te acercas, te morderá.
  revised_footnotes:
  - marker: a
    text: Literalmente, «huye del pecado como de la faz/presencia de una serpiente». La imagen griega es muy concreta.
    reason: lexical_alternative
  - marker: b
    text: La línea hebrea conservada en la fuente proporcionada no coincide con el griego de este versículo y parece reflejar un desajuste de ubicación textual; por eso la traducción principal sigue aquí el testimonio griego.
    reason: textual_variant
  revision_rationale: Se corrige la persona verbal para mantener coherencia con «te acercas / te morderá» y con el imperativo griego de segunda persona singular. También se depura la nota léxica para no introducir especificidad zoológica no sustentada por ὄφις. Se mantiene la traducción basada en el griego, porque es la lectura fuente estable y coherente con el expediente, pese a la revisión inglesa conflictiva.
