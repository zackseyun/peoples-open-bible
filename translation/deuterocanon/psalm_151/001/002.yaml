id: PS151.1.2
reference: Psalm 151 1:2
source:
  edition: lxx-swete-1909
  text: αἱ χεῖρές μου ἐποίησαν ὄργανον, οἱ δάκτυλοί μου ἥρμοσαν ψαλτήριον.
  language: Greek
  pages:
  - 432
  confidence: high
translation:
  text: My hands made an instrument[a]; my fingers fashioned a lyre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a psaltery,' a traditional term for the Greek ψαλτήριον, a stringed instrument.
    reason: lexical_alternative
lexical_decisions:
- source_word: αἱ χεῖρές μου
  chosen: My hands
  alternatives:
  - My own hands
  lexicon: BDAG
  rationale: Straightforward possessive phrase; English keeps the emphatic first-person possession without adding unnecessary emphasis.
- source_word: ἐποίησαν
  chosen: made
  alternatives:
  - fashioned
  - crafted
  lexicon: BDAG
  rationale: The common verb ποιέω here denotes making or producing. 'Made' is the most natural modern English equivalent and fits the parallel with the second clause.
- source_word: ὄργανον
  chosen: an instrument
  alternatives:
  - a musical instrument
  - a tool
  lexicon: LSJ
  rationale: ὄργανον can mean tool or instrument broadly, but in this poetic context, immediately paired with ψαλτήριον, the musical sense is primary. 'An instrument' preserves the broader Greek term while allowing the next clause to specify the type.
- source_word: οἱ δάκτυλοί μου
  chosen: my fingers
  lexicon: BDAG
  rationale: Direct lexical equivalent; the plural is naturally rendered in English.
- source_word: ἥρμοσαν
  chosen: fitted together
  alternatives:
  - arranged
  - joined
  - tuned
  lexicon: LSJ
  rationale: From ἁρμόζω, the verb can mean fit together, join, or adapt. In context of constructing an instrument, 'fitted together' best captures assembly rather than later tuning or mere arrangement.
- source_word: ψαλτήριον
  chosen: a lyre
  alternatives:
  - a psaltery
  - a harp
  lexicon: LSJ
  rationale: ψαλτήριον denotes a stringed instrument. 'Psaltery' is traditional but opaque in modern English; 'harp' is possible but less precise. 'Lyre' is a clear, accessible rendering for an ancient plucked string instrument in this context.
