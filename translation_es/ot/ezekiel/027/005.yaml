translation:
  language: es
  text: Con cipreses de Senir[a][b] construyeron toda tu tablazón; tomaron un cedro del Líbano para hacerte un mástil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación exacta del hebreo בְּרוֹשִׁים es incierta; puede referirse también a enebros o abetos.
    reason: lexical_alternative
  - marker: b
    text: Senir es un nombre regional asociado con el monte Hermón (cf. Dt 3:9).
    reason: cross_reference
lexical_decisions:
- source_word: בְּרוֹשִׁים
  english_pob_choice: cypresses
  chosen_spanish: cipreses
  alternatives_spanish:
  - enebros
  - abetos
  lexicon: HALOT
  rationale: El hebreo בְּרוֹשִׁים nombra una conífera cuya identificación exacta no es segura. En español, 'cipreses' suena natural, formal y compatible con la imagen de construcción naval; se conserva la incertidumbre mediante nota con alternativas.
- source_word: מִשְּׂנִיר
  english_pob_choice: from Senir
  chosen_spanish: de Senir
  alternatives_spanish:
  - de Shenir
  lexicon: HALOT
  rationale: Es un topónimo, por lo que se translitera. 'Senir' mantiene la forma estándar en español y refleja el nombre regional asociado con Hermón.
- source_word: בָּנוּ לָךְ
  english_pob_choice: they built ... for you
  chosen_spanish: construyeron ... para ti
  alternatives_spanish:
  - hicieron ... para ti
  - edificaron ... para ti
  lexicon: HALOT
  rationale: El verbo בנה expresa edificar o construir. En el contexto de embarcaciones, 'construyeron' conserva la imagen de fabricación sin forzar una equivalencia arquitectónica impropia.
- source_word: אֵת כָּל לֻחֹתָיִם
  english_pob_choice: all your planking
  chosen_spanish: todas tus planchas
  alternatives_spanish:
  - todas tus tablas
  - todo tu forro de tablas
  lexicon: HALOT
  rationale: לוּחַ se refiere a tabla/plano/planchón. 'Planchas' es un colectivo natural en español para el entablado de un barco y mantiene el sentido técnico del inglés POB.
- source_word: אֶרֶז מִלְּבָנוֹן
  english_pob_choice: a cedar from Lebanon
  chosen_spanish: un cedro del Líbano
  alternatives_spanish:
  - madera de cedro del Líbano
  lexicon: HALOT
  rationale: El sustantivo singular puede leerse concretamente como un árbol/cedro individual. 'Un cedro del Líbano' sigue de cerca la sintaxis del hebreo y sirve bien para el mástil del siguiente miembro.
- source_word: לָקָחוּ
  english_pob_choice: they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - llevaron
  - usaron
  lexicon: HALOT
  rationale: לקח significa tomar. 'Tomaron' es cercano al hebreo y suficientemente natural en español; evita ampliar indebidamente el gesto a 'llevaron' o 'usaron'.
- source_word: לַעֲשׂוֹת תֹּרֶן
  english_pob_choice: to make a mast
  chosen_spanish: para hacer un mástil
  alternatives_spanish:
  - para fabricar un mástil
  - para hacer tu mástil
  lexicon: HALOT
  rationale: תֹּרֶן es 'mástil'. 'Para hacer un mástil' reproduce el infinitivo final sin añadir posesivo donde el hebreo no lo pone directamente en ese sustantivo.
- source_word: עָלָיִךְ
  english_pob_choice: for you
  chosen_spanish: para ti
  alternatives_spanish:
  - sobre ti
  - encima de ti
  lexicon: HALOT
  rationale: Aunque עַל suele significar 'sobre/en', aquí la construcción funciona idiomáticamente como referencia a la nave/persona femenina destinataria. 'Para ti' comunica la relación funcional en español y preserva la segunda persona femenina singular.
theological_decisions:
- issue: Metáfora de Tiro como nave/persona femenina
  english_pob_reading: The English keeps the second feminine singular address ('your', 'you') and the shipping metaphor without flattening it.
  chosen_spanish_reading: 'Se mantiene el tratamiento en segunda persona femenina singular: ''tus'' y ''ti''.'
  alternative_spanish_readings:
  - tus ... para usted
  - sus ... para ella
  rationale: El hebreo se dirige a Tiro como una entidad personificada/feminizada; conservar la segunda persona singular evita perder la fuerza retórica y la personificación profética.
  doctrine_reference: N/A — decisión retórica y poética del texto profético.
translation_notes:
  revision_awareness: El borrador inglés revisado cambió 'cypress trees' por 'cypresses' para una redacción más natural; en español se reflejó directamente con 'cipreses'. Se mantuvo la estructura del miembro poético y la secuencia verbal del hebreo.
  spanish_consistency_notes:
  - Se usó 'Líbano' con artículo en el nombre geográfico ('del Líbano') como es natural en español.
  - Se conservó la metáfora naval y la dirección femenina singular del discurso.
  - '''Planchas'' evita el calco rígido de ''planking'' y mantiene el valor colectivo técnico.'
