translation:
  language: es
  text: Entonces Ptolomeo, tomándolo aparte[a], trasladó al rey a una columnata, como para reanimarlo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El participio griego ἀπολαβών deja implícito su objeto; «lo» se suple por el contexto.
    reason: alternative_reading
  - marker: b
    text: El griego ὡς ἀναψύχοντα también puede significar «como para refrescarlo» o «como para darle alivio».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅθεν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - por eso
  - así que
  - de allí
  lexicon: LSJ
  rationale: En este contexto narrativo, la partícula introduce la acción que sigue de manera consecutiva. «Entonces» conserva el enlace lógico sin forzar un matiz espacial que en español sonaría menos natural.
- source_word: ἀπολαβών
  english_pob_choice: took him
  chosen_spanish: lo llevó
  alternatives_spanish:
  - lo tomó
  - lo apartó
  - habiéndolo tomado
  lexicon: LSJ
  rationale: El participio griego presupone un objeto implícito recuperable por el contexto. En español, «lo llevó» expresa de forma natural la idea de retirarlo o conducirlo a otro lugar, sin añadir una explicación ajena al texto.
- source_word: περίστυλον
  english_pob_choice: colonnade
  chosen_spanish: peristilo
  alternatives_spanish:
  - colonnada
  - pórtico
  - patio columnado
  lexicon: LSJ
  rationale: El término designa un espacio rodeado de columnas. Se conserva «peristilo» porque es un término técnico preciso y transparente en contexto arquitectónico, y permite mantener la correspondencia con el griego sin perder el sentido.
- source_word: ὡς ἀναψύχοντα
  english_pob_choice: as though to revive him
  chosen_spanish: como para reanimar
  alternatives_spanish:
  - como para refrescarlo
  - como para darle alivio
  - como si fuera a reanimarlo
  lexicon: LSJ
  rationale: ἀναψύχω puede significar refrescar, aliviar o reanimar. En esta escena, donde se traslada al rey, «reanimar» comunica mejor la posible idea de recuperarlo de un desfallecimiento o agitación. «Como para» conserva el valor de aparente propósito o pretexto del ὡς.
- source_word: μετέθηκεν
  english_pob_choice: moved
  chosen_spanish: lo llevó
  alternatives_spanish:
  - lo trasladó
  - lo movió
  - lo colocó
  lexicon: LSJ
  rationale: El verbo indica traslado o cambio de lugar. «Lo llevó» funciona bien en español narrativo y refleja el movimiento efectivo hacia el peristilo.
- source_word: τὸν βασιλέα
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al soberano
  - al monarca
  lexicon: LSJ
  rationale: Es el objeto directo explícito del verbo y se traduce con la forma natural «al rey».
- source_word: ὁ Πτολεμαῖος
  english_pob_choice: Ptolemy
  chosen_spanish: Ptolomeo
  alternatives_spanish:
  - Tolomeo
  lexicon: LSJ
  rationale: Transliteración estándar del nombre propio en español bíblico e histórico.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada y se mantuvo sin cambios; por eso la redacción española sigue de cerca las decisiones léxicas ya justificadas, ajustándolas a un español natural y sobrio.
  spanish_consistency_notes:
  - Se conserva el nombre propio como «Ptolomeo», conforme a uso bíblico e histórico en español.
  - Se evita «SEÑOR» o equivalentes porque no aparece el tetragrámaton ni un sustituto divino en este versículo.
  - La construcción «como para» reproduce adecuadamente el valor de ὡς con participio de finalidad aparente o pretexto.
