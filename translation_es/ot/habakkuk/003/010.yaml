  - marker: b
    text: O «pasó». El verbo hebreo es el común para pasar por o junto a algo; «pasó de largo» hace más vívida la fuerza del torrente en la escena.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «levantó sus manos en alto». Algunos entienden «manos» como metáfora de las olas que se elevan.
    reason: lexical_alternative
