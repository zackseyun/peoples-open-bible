translation:
  language: es
  text: El que confía en sus riquezas caerá[a], pero los justos florecerán como hojas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como una hoja».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בּוֹטֵחַ
  english_pob_choice: trusts
  chosen_spanish: confía
  alternatives_spanish:
  - se apoya
  - pone su confianza
  lexicon: HALOT
  rationale: El participio de בטח expresa confianza o seguridad puesta en algo. «Confía» es natural en español y conserva la fuerza proverbial de la advertencia contra una falsa seguridad.
- source_word: בְּעָשְׁרוֹ
  english_pob_choice: in his wealth
  chosen_spanish: en sus riquezas
  alternatives_spanish:
  - en su riqueza
  - en su abundancia
  lexicon: HALOT
  rationale: עֹשֶׁר denota riqueza/riquezas. «Riquezas» reproduce bien el plural de bienes acumulados y suena idiomático en español bíblico contemporáneo.
- source_word: הוּא
  english_pob_choice: (implicit in English)
  chosen_spanish: caerá
  alternatives_spanish:
  - él caerá
  - caerá él
  lexicon: 'morphology: emphatic independent pronoun'
  rationale: El pronombre independiente añade énfasis en hebreo, pero en español puede quedar implícito por la forma verbal. El efecto enfático se conserva por la estructura sentenciosa.
- source_word: יִפֹּל
  english_pob_choice: will fall
  chosen_spanish: caerá
  alternatives_spanish:
  - caerá en desgracia
  - se derrumbará
  lexicon: HALOT
  rationale: El imperfecto proverbial expresa consecuencia general. «Caerá» es breve, directo y suficientemente amplio para no especificar más de lo que el hebreo dice.
- source_word: וְכֶעָלֶה
  english_pob_choice: like leaves
  chosen_spanish: como hojas
  alternatives_spanish:
  - como una hoja
  - como follaje
  lexicon: HALOT
  rationale: Aunque el sustantivo hebreo es singular, el paralelo con los justos y la imagen vegetal permiten un plural colectivo en español. «Como hojas» sigue la revisión inglesa final y mantiene la metáfora de crecimiento y vitalidad.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - las personas justas
  lexicon: HALOT
  rationale: El adjetivo sustantivado funciona como grupo caracterizado por la justicia. «Los justos» es la equivalencia más estable y digna en español.
- source_word: יִפְרָחוּ
  english_pob_choice: will flourish
  chosen_spanish: florecerán
  alternatives_spanish:
  - brotarán
  - prosperarán
  lexicon: HALOT
  rationale: פרח puede significar florecer o prosperar. «Florecerán» preserva la imagen botánica explícita del paralelismo con las hojas y comunica bien el contraste con «caerá».
theological_decisions:
- issue: Alcance genérico del sujeto inicial
  english_pob_reading: Whoever trusts in his wealth
  chosen_spanish_reading: El que confía en sus riquezas
  alternative_spanish_readings:
  - Quien confía en sus riquezas
  - El que pone su confianza en sus riquezas
  rationale: El hebreo es masculino singular pero genérico, típico del proverbio. «El que» conserva esa forma sapiencial en español sin perder el alcance universal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Imagen de עָלֶה en la comparación final
  english_pob_reading: like leaves
  chosen_spanish_reading: como hojas
  alternative_spanish_readings:
  - como una hoja
  - como follaje
  rationale: La revisión inglesa prefirió «leaves» por ser más directo que «foliage». En español, el plural «hojas» transmite de forma natural la imagen colectiva de vitalidad vegetal sin forzar una singularidad innecesaria.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
translation_notes:
  revision_awareness: La redacción sigue la lectura inglesa revisada final («will flourish like leaves») y evita una paráfrasis más amplia. Se mantuvo la tensión entre la singularidad léxica de עָלֶה y su valor colectivo en el símil, resolviéndola en español con el plural natural «hojas».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - «Los justos» mantiene el sustantivo plural adjetival sin ampliar a «personas justas».
  - La estructura proverbial breve se conserva sin añadir elementos interpretativos.
