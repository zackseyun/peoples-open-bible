  text: וְ/גָלֻ֣ת הַֽ/חֵל הַ֠/זֶּה לִ/בְנֵ֨י יִשְׂרָאֵ֤ל אֲשֶֽׁר כְּנַעֲנִים֙ עַד צָ֣רְפַ֔ת וְ/גָלֻ֥ת יְרוּשָׁלִַ֖ם אֲשֶׁ֣ר בִּ/סְפָרַ֑ד יִֽרְשׁ֕וּ אֵ֖ת עָרֵ֥י הַ/נֶּֽגֶב־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/obadiah/001/020.yaml
  text: And the exiles of this army of the sons of Israel[a], who are among the Canaanites as far as Zarephath, and the exiles of Jerusalem who are in Sepharad[b], will possess the cities of the Negev.
  footnotes:
  - marker: a
    text: Or 'this army'; the Hebrew term is difficult and has also been understood in other ways, including 'wealth' or similar senses.
    reason: lexical_alternative
  - marker: b
    text: Sepharad is an uncertain place name; some identify it with Spain, but the Hebrew name is retained here.
    reason: cultural_note
