translation:
  language: es
  text: un hombre entendido, de los hijos de Mooli[a], hijo de Leví, hijo de Israel—Asebebías[b], y sus hijos y hermanos, diez[c];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo hebreo tiene «Mahli» en lugar de «Mooli».
    reason: alternative_reading
  - marker: b
    text: El paralelo hebreo da el nombre como «Sherebías»; el griego aquí lee Asebebías.
    reason: alternative_reading
  - marker: c
    text: El paralelo hebreo lee «dieciocho» en lugar de «diez».
    reason: textual_variant
lexical_decisions:
- source_word: ἄνδρα
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - uno
  lexicon: BDAG
  rationale: El griego está en acusativo masculino singular y señala a un individuo varón concreto; «hombre» conserva esa referencia de forma natural en español y coincide con el paralelo semítico אִישׁ.
- source_word: ἐπιστήμονα
  english_pob_choice: of understanding
  chosen_spanish: entendido
  alternatives_spanish:
  - sabio
  - con conocimiento
  - experto
  lexicon: LSJ
  rationale: El adjetivo comunica conocimiento/insight más que pericia técnica. «Entendido» mantiene la idea de comprensión y suena idiomático en español, sin volverlo más técnico de lo que exige el griego.
- source_word: τῶν υἱῶν Μοολὶ
  english_pob_choice: from the sons of Mooli
  chosen_spanish: de los hijos de Mooli
  alternatives_spanish:
  - de los descendientes de Mooli
  - de los hijos de Mahli
  lexicon: LSJ
  rationale: Se conserva la fórmula genealógica del griego con «hijos de». La forma griega Μοολί se translitera como «Mooli» en el texto principal; la forma hebrea paralela no se sustituye en el cuerpo porque el griego es la base primaria.
- source_word: τοῦ Λευὶ
  english_pob_choice: son of Levi
  chosen_spanish: hijo de Leví
  alternatives_spanish:
  - de Leví
  lexicon: LSJ
  rationale: En español, repetir «hijo de» hace explícita la cadena genealógica y sigue el valor del genitivo en este contexto.
- source_word: τοῦ Ἰσραήλ
  english_pob_choice: son of Israel
  chosen_spanish: hijo de Israel
  alternatives_spanish:
  - de Israel
  lexicon: LSJ
  rationale: Se mantiene la misma solución genealógica para conservar la estructura de linaje del pasaje.
- source_word: Ἀσεβηβίαν
  english_pob_choice: Asebebias
  chosen_spanish: Asebebías
  alternatives_spanish:
  - Sherebías
  - Asebibías
  lexicon: LSJ
  rationale: Se translitera directamente el nombre griego principal en el texto español. La forma hebrea paralela distinta se reserva para la nota, ya que el griego es la fuente primaria.
- source_word: τοὺς υἱοὺς καὶ τοὺς ἀδελφούς
  english_pob_choice: his sons and brothers
  chosen_spanish: y sus hijos y hermanos
  alternatives_spanish:
  - y los hijos y hermanos con él
  - y sus niños y hermanos
  lexicon: BDAG
  rationale: 'La lectura más natural en español es tomar la frase como dependiente del nombre propio precedente, por lo que se expresa con posesivo implícito en el contexto: «sus hijos y hermanos». «Hijos» conserva el valor genealógico masculino del griego.'
- source_word: δέκα
  english_pob_choice: ten
  chosen_spanish: diez
  alternatives_spanish:
  - dieciocho
  lexicon: LSJ
  rationale: Se mantiene el número del testimonio griego primario. La variante hebrea paralela se registra en la nota, pero no desplaza la lectura principal.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando todos los marcadores de nota dentro del texto español. La puntuación final con punto y coma se mantiene para reflejar la puntuación griega, conforme a la revisión más reciente.
  spanish_consistency_notes:
  - Se conservó la secuencia genealógica con «hijo de» para claridad y fidelidad al griego.
  - Se transliteraron los nombres propios según la forma griega principal, sin sustituirlos por la forma hebrea en el cuerpo del texto.
  - Se mantuvo «diez» como lectura principal por prioridad del griego, dejando la variante hebrea en nota.
