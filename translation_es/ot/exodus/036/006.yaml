    text: 'O: «se hizo un anuncio en el campamento». El hebreo dice literalmente: «hicieron pasar una voz».'
    reason: lexical_alternative
  - marker: b
    text: «Ofrenda del santuario» también puede traducirse «contribución del santuario», «contribución sagrada» u «ofrenda para el santuario».
    reason: lexical_alternative
  revision_rationale: 'Se corrigieron dos puntos principales: la prohibición se reformuló en plural natural («Ni hombre ni mujer hagan…») para reflejar mejor el hebreo, y la cláusula final se volvió idiomática («al pueblo se le impidió seguir trayendo más») para expresar adecuadamente el nifal pasivo de כלא. Además, se preservó en nota la alternativa léxica de לִתְרוּמַת הַקֹּדֶשׁ, que estaba ausente del borrador, y se retuvo en otra nota el modismo hebreo de «hacer pasar una voz».'
