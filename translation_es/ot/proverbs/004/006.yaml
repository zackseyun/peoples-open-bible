translation:
  language: es
  text: No la abandones[a], y ella te guardará; ámala, y ella te protegerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, la sabiduría, personificada como mujer en este pasaje.
    reason: cultural_note
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagas
  - Nunca
  lexicon: HALOT
  rationale: אַל con el imperfecto expresa prohibición. En español, la negación simple 'No' es la forma más natural y fiel sin añadir énfasis no explícito en el hebreo.
- source_word: תַּעַזְבֶהָ
  english_pob_choice: forsake her
  chosen_spanish: la abandones
  alternatives_spanish:
  - la dejes
  - la desampares
  lexicon: HALOT
  rationale: עָזַב puede significar dejar, abandonar o forsake. 'Abandonar' transmite mejor la fuerza relacional de la amonestación; en la forma negativa suena más natural como 'No la abandones'.
- source_word: וְתִשְׁמְרֶךָּ
  english_pob_choice: and she will keep you
  chosen_spanish: y ella te guardará
  alternatives_spanish:
  - y ella te mantendrá
  - y ella te preservará
  lexicon: HALOT
  rationale: שׁמר abarca guardar, cuidar y vigilar. 'Guardar' mantiene el vínculo semántico con el siguiente verbo y conserva la imagen protectora sin volverla demasiado interpretativa.
- source_word: אֱהָבֶהָ
  english_pob_choice: love her
  chosen_spanish: ámala
  alternatives_spanish:
  - quiérela
  - amála
  lexicon: HALOT
  rationale: אהב se traduce de manera directa como amar. El imperativo con enclítico 'ámala' conserva la sencillez lexical del hebreo y el objeto femenino señalado por la morfología.
- source_word: וְתִצְּרֶךָּ
  english_pob_choice: and she will guard you
  chosen_spanish: y ella te protegerá
  alternatives_spanish:
  - y ella te guardará
  - y ella te custodiará
  lexicon: HALOT
  rationale: נצר suele implicar guardar con cuidado protector. 'Proteger' explicita bien ese matiz en español, mientras que 'guardará' se reserva en la primera cola para reflejar la diferencia de matiz entre שׁמר y נצר.
theological_decisions:
- issue: Personificación femenina de la sabiduría
  english_pob_reading: Retain feminine pronouns ('her,' 'she') for wisdom
  chosen_spanish_reading: Mantener los pronombres femeninos ('la', 'ella') para la sabiduría personificada
  alternative_spanish_readings:
  - Usar 'eso' o 'la sabiduría' repetidamente
  - Neutralizar con una forma impersonal
  rationale: El hebreo usa sufijos y formas verbales femeninas porque la sabiduría está personificada como mujer en el contexto inmediato. Conservar esa referencia en español preserva la textura literaria y evita aplanar la imagen original.
  doctrine_reference: Poética sapiencial; filosofía de traducción §1, §4, §5
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo con alta concordancia respecto al audit trail en inglés. Se ajusta la primera cola a una negación natural en español y se conserva la personificación femenina mediante pronombres coherentes.
  spanish_consistency_notes:
  - Se mantiene la referencia femenina a la sabiduría en todo el versículo.
  - Se distingue semánticamente entre 'guardar' y 'proteger' para reflejar שׁמר y נצר sin perder fluidez.
  - El registro es moderno y digno, apto para lectura eclesial amplia.
