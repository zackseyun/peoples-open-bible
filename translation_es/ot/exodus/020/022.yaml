    changes_summary: Changed 'spoken with you' to 'spoken to you' for closer lexical accuracy to the Hebrew while preserving natural formal English.
translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés: «Así dirás a los hijos de Israel[a]: Ustedes mismos han visto que he hablado con ustedes desde el cielo[c][b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» o «los hijos de Israel». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «les he hablado». El hebreo dice más literalmente «he hablado con ustedes», destacando el encuentro directo.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «desde los cielos». En español, «desde el cielo» es la forma idiomática habitual en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue el principio del proyecto para el nombre divino. En español, «Yahvé» conserva el nombre pactual sin ocultarlo tras una sustitución litúrgica.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y dijo
  - Y habló
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» comunica bien la secuencia en español moderno sin perder el valor narrativo.
- source_word: כֹּה תֹאמַר
  english_pob_choice: Thus you shall say
  chosen_spanish: Así dirás
  alternatives_spanish:
  - Esto es lo que dirás
  - De esta manera dirás
  lexicon: HALOT
  rationale: Es una fórmula de mensajero. «Así dirás» conserva el tono formal y la función declarativa del hebreo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  - los hijos de Jacob
  lexicon: HALOT
  rationale: El hebreo es literalmente masculino plural en constructo. Se mantiene «hijos» para respetar la forma léxica y la designación corporativa.
- source_word: אַתֶּם
  english_pob_choice: You yourselves
  chosen_spanish: Ustedes mismos
  alternatives_spanish:
  - Ustedes
  - Vosotros mismos
  lexicon: HALOT
  rationale: El pronombre independiente es enfático. «Ustedes mismos» expresa esa insistencia mejor que un simple «ustedes».
- source_word: רְאִיתֶם
  english_pob_choice: have seen
  chosen_spanish: han visto
  alternatives_spanish:
  - vieron
  lexicon: HALOT
  rationale: El perfecto español comunica una acción pasada con relevancia presente, equivalente al valor evidencial que el inglés POB marcó con presente perfecto.
- source_word: מִן הַשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - desde los cielos
  - desde el cielo mismo
  lexicon: HALOT
  rationale: En español bíblico y actual, «cielo» es la forma natural para este uso, aunque el hebreo esté en plural. «Desde el cielo» mantiene la idiomaticidad y el sentido original.
- source_word: דִּבַּרְתִּי עִמָּכֶם
  english_pob_choice: I have spoken to you
  chosen_spanish: he hablado con ustedes
  alternatives_spanish:
  - les he hablado
  - he hablado a ustedes
  lexicon: HALOT
  rationale: El hebreo usa עִם, literalmente «con», que sugiere encuentro directo. «He hablado con ustedes» preserva mejor ese matiz que la mera dirección «a/les».
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo emplea el tetragrámaton. Se conserva el nombre propio divino en español para no enmascarar la referencia pactual del Sinaí.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Designación corporativa בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  - los hijos de Jacob
  rationale: Se mantiene la forma masculina plural explícita del hebreo, conforme al principio de precisión morfológica del proyecto, sin perder el sentido colectivo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió el matiz de «spoken with you» a «spoken to you», pero mantuvo la nota lexical sobre עִם. En español se preserva el valor más literal de עִם con «he hablado con ustedes», mientras el contexto direccional queda implícito por la estructura natural de la oración.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se prefiere «cielo» en singular por idiomaticidad española, aunque se anota el plural hebreo.
  - Se mantiene «he hablado con ustedes» para reflejar la cercanía relacional de עִם sin caer en una traducción mecánica.
  - «Ustedes mismos» reproduce el énfasis del pronombre independiente אַתֶּם.
  - La puntuación con dos puntos introduce adecuadamente la fórmula de encargo profético.
