  to: 'Mira: los cielos y los cielos más altos[a], el abismo[b] y la tierra; cuando él desciende sobre ellos, quedan inmóviles[c]; en su visitación, tiemblan.'
  rationale: La revisión alinea el español con las decisiones auditadas del POB sin perder la evidencia hebrea. Se reemplaza el calco «los cielos de los cielos» por el idiomático «los cielos más altos», se restituye el matiz teológico-formal de «en su visitación», y se mejora la imagen verbal de עוֹמְדִים con «quedan inmóviles», que contrasta mejor con «tiemblan». También se corrigen y reubican las notas para que correspondan exactamente a los lugares anclados en el texto.
