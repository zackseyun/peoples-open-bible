revisions:
- from: Recordaré las misericordias de Yahvé[a], las alabanzas de Yahvé, conforme a todo lo que Yahvé nos ha hecho[b][c], y la gran bondad para la casa de Israel, que él les ha hecho conforme a su compasión y conforme a la abundancia de su misericordia.
  to: Haré memoria del amor fiel de Yahvé[a], de las alabanzas de Yahvé, conforme a todo lo que Yahvé nos ha concedido[b][c], y de la gran bondad a la casa de Israel, que él les ha concedido conforme a su compasión y conforme a la abundancia de su amor fiel.
  rationale: 'La revisión restituye dos decisiones centrales del expediente fuente: traduce חסד de forma consistente con un término español que preserve mejor el amor leal/pactal («amor fiel») y reemplaza «nos ha hecho / les ha hecho» por «nos ha concedido / les ha concedido», que comunica la beneficencia contextual de גמל con español natural. También cambia «Recordaré» por «Haré memoria de» para reflejar mejor el matiz declarativo del verbo hebreo en contexto de alabanza. Se mantienen «Yahvé», «alabanzas» y «casa de Israel», ajustando solo lo necesario para mayor fidelidad y legibilidad.'
