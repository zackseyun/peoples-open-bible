translation:
  language: es
  text: 'Con respecto a Edom: así dice Yahvé de los ejércitos: ¿Acaso ya no hay sabiduría en Temán? ¿Ha perecido el consejo de entre los prudentes[a]? ¿Se ha corrompido[b] su sabiduría?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de los entendidos' o 'de los que entienden'; el término hebreo se refiere a personas discernientes, no a 'hijos'.
    reason: lexical_alternative
  - marker: b
    text: 'También puede traducirse: ''¿Se ha vuelto corrupta su sabiduría?''. El hebreo sugiere deterioro, corrupción o algo que se echó a perder.'
    reason: alternative_reading
lexical_decisions:
- source_word: לֶאֱדוֹם
  english_pob_choice: Concerning Edom
  chosen_spanish: Con respecto a Edom
  alternatives_spanish:
  - Acerca de Edom
  - Contra Edom
  lexicon: HALOT
  rationale: El prefijo ל en encabezados proféticos introduce el tema u objeto del oráculo. En español, 'Con respecto a' conserva ese valor encabezador sin forzar 'contra', que sería más interpretativo.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así dijo
  - esto dice
  lexicon: HALOT
  rationale: La fórmula profética exige un presente formular y solemne; 'así dice' reproduce bien el valor del mensajero y su vigencia oracular.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de las huestes
  - Yahvé de los ejércitos celestiales
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton como 'Yahvé'. 'De los ejércitos' conserva de forma directa la imaginería de צְבָאוֹת sin sustituirla por una equivalencia más interpretativa.
- source_word: הַאֵין עוֹד
  english_pob_choice: Is there no longer
  chosen_spanish: ¿Acaso ya no hay
  alternatives_spanish:
  - ¿No hay ya
  - ¿No queda ya
  lexicon: HALOT
  rationale: La pregunta expresa cesación o ausencia continuada; 'ya no hay' comunica ese sentido con naturalidad en español y mantiene la fuerza retórica.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - habilidad
  lexicon: HALOT
  rationale: '''Sabiduría'' es la correspondencia más directa y amplia; en este contexto alude a la reputación sabia de Temán/Edom.'
- source_word: בְּתֵימָן
  english_pob_choice: in Teman
  chosen_spanish: en Temán
  alternatives_spanish:
  - en Temán,
  - en la región de Temán
  lexicon: HALOT
  rationale: Topónimo conservado de forma transparente; 'en' refleja la localización indicada por la preposición hebrea.
- source_word: אָבְדָה עֵצָה
  english_pob_choice: Has counsel perished
  chosen_spanish: Ha perecido el consejo
  alternatives_spanish:
  - Se ha perdido el consejo
  - Ha desaparecido el consejo
  lexicon: HALOT
  rationale: '''Perecer'' reproduce el valor fuerte de אָבַד y ''consejo'' corresponde bien al campo semántico de עֵצָה en un contexto de sabiduría.'
- source_word: מִבָּנִים
  english_pob_choice: from the prudent
  chosen_spanish: de entre los prudentes
  alternatives_spanish:
  - de los entendidos
  - de entre los que entienden
  lexicon: HALOT
  rationale: Aunque la forma hebrea es problemática y el POB inglés opta por 'the prudent' con nota alternativa, en español 'de entre los prudentes' conserva el valor humano/discernidor y evita la lectura literal de 'hijos'.
- source_word: נִסְרְחָה
  english_pob_choice: Has their wisdom become corrupted
  chosen_spanish: Se ha corrompido
  alternatives_spanish:
  - Se ha echado a perder
  - Se ha podrido
  - Se ha vuelto corrupta
  lexicon: HALOT
  rationale: El verbo sugiere deterioro, corrupción o echarse a perder. 'Se ha corrompido' es formal, natural y preserva la imagen de algo que se ha echado a perder sin suavizarla.
- source_word: חָכְמָתָם
  english_pob_choice: their wisdom
  chosen_spanish: su sabiduría
  alternatives_spanish:
  - su prudencia
  - su habilidad
  lexicon: HALOT
  rationale: Se mantiene el sustantivo de sabiduría con posesivo singular concordante en español, fiel al referente colectivo de Edom.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se aplica el default del proyecto para el Nombre divino. 'Yahvé' conserva la distinción frente a 'Señor' y mantiene la transparencia frente al texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido del oráculo sobre Edom
  english_pob_reading: Concerning Edom
  chosen_spanish_reading: Con respecto a Edom
  alternative_spanish_readings:
  - Contra Edom
  - Acerca de Edom
  rationale: La preposición ל en encabezados proféticos introduce la materia del oráculo; no obliga por sí sola a leer un matiz hostil explícito. Por eso se prefiere una formulación temática y sobria.
  doctrine_reference: HALOT / uso profético de ל en encabezados de oráculo
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail inglés que reemplazó 'become spoiled' por 'become corrupted' para una formulación más natural y formal; por ello se eligió 'se ha corrompido' como equivalente español principal. También se respetó la decisión del POB inglés de evitar una traducción literal de מִבָּנִים como 'hijos', optando por una lectura humana/discernidora.
  spanish_consistency_notes:
  - Se usa 'Yahvé' según el estándar del proyecto para יְהוָה.
  - '''Sabiduría'' se mantiene en ambas apariciones para conservar la cohesión léxica del versículo.'
  - '''Con respecto a Edom'' funciona como encabezado oracular y evita imponer un matiz más fuerte que el que exige el hebreo.'
  - La nota [a] queda anclada en 'corrompido[a]' para cumplir la validación y señalar la alternativa lexical relevante.
