revisions:
- from: Cuando la nube permanecía sobre el tabernáculo por muchos días, los hijos de Israel guardaban la carga de Yahvé[a] y no se ponían en marcha.
  to: Cuando la nube permanecía sobre el tabernáculo por muchos días, los hijos de Israel guardaban el encargo[a] de Yahvé y no se ponían en marcha.
  rationale: Se revisa únicamente el núcleo léxico problemático מִשְׁמֶרֶת יְהוָה. «El encargo de Yahvé» preserva mejor que «la carga de Yahvé» la idea de una responsabilidad confiada por Yahvé que Israel debía guardar/observar. Se corrige también la nota para que sea plenamente española, clara y coherente con la justificación léxica del audit trail. No se requiere adjudicación adicional porque la corrección es directa y no doctrinalmente controvertida.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:30:10Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura temporal del hebreo y preserva correctamente «Yahvé» para יְהוָה y «los hijos de Israel» para בְנֵי יִשְׂרָאֵל. También refleja adecuadamente la idea de permanencia prolongada de la nube y la no partida del campamento. Sin embargo, מִשְׁמֶרֶת יְהוָה no está bien resuelto como «la carga de Yahvé», porque en español eso sugiere peso o carga física/emocional más que deber, encargo u obligación que debe guardarse.
  spanish_quality_summary: El texto es legible y de tono bíblico moderno, pero «guardaban la carga de Yahvé» suena poco idiomático e induce una lectura equivocada. Además, la nota actual mezcla inglés («charge») con español y ofrece «cargo»/«encargo» de forma algo confusa. El resto del versículo lee con naturalidad.
  glossary_alignment: Hay buena alineación con los términos del proyecto en «Yahvé» y «los hijos de Israel». La principal desalineación léxica está en מִשְׁמֶרֶת, donde el inglés auditado escogió «charge» con matiz de deber/encargo; en español debe reflejarse mejor como «encargo», «mandato» u «obligación». «Encargo» conserva bien la idea de una responsabilidad confiada y funciona naturalmente con «guardaron».
  issues:
  - severity: high
    issue: «la carga de Yahvé» traduce deficientemente מִשְׁמֶרֶת יְהוָה
    rationale: «Carga» en español no comunica de manera natural la idea de deber/encargo/obligación que se guarda u observa; puede malentenderse como peso. El hebreo y la auditoría inglesa apuntan a una responsabilidad o encargo de Yahvé.
  - severity: medium
    issue: La nota al pie actual es defectuosa y contiene inglés incrustado
    rationale: La explicación «la charge/guardia de Yahvé» no es aceptable como nota final en español y no aclara bien las alternativas léxicas. Debe reformularse enteramente en español.
  - severity: low
    issue: El imperfecto «permanecía/guardaban/se ponían» puede leerse como habitual más que puntual
    rationale: No es una falla grave, porque en español bíblico narrativo puede funcionar, pero «permanecía... guardaron... no partían» o mantener la concordancia narrativa puede sonar más firme. Aun así, no exige cambio si se conserva la cláusula temporal general.
  revised_spanish_text: Cuando la nube permanecía sobre el tabernáculo por muchos días, los hijos de Israel guardaban el encargo[a] de Yahvé y no se ponían en marcha.
  revised_footnotes:
  - marker: a
    text: O «la obligación de Yahvé» o «la encomienda de Yahvé». El hebreo puede expresar la idea de un deber o encargo que Yahvé les había confiado para guardar.
    reason: lexical_alternative
  revision_rationale: Se revisa únicamente el núcleo léxico problemático מִשְׁמֶרֶת יְהוָה. «El encargo de Yahvé» preserva mejor que «la carga de Yahvé» la idea de una responsabilidad confiada por Yahvé que Israel debía guardar/observar. Se corrige también la nota para que sea plenamente española, clara y coherente con la justificación léxica del audit trail. No se requiere adjudicación adicional porque la corrección es directa y no doctrinalmente controvertida.
