review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del griego: ἕξω → «tendré», αὐτὴν → «por medio de ella», ἀθανασίαν → «inmortalidad», y ἀπολείψω con orientación a generaciones futuras. También preserva correctamente la apertura teológica de «inmortalidad». Sin embargo, «un recuerdo eterno» suena menos fiel que «un recuerdo perdurable» o «una memoria eterna/perdurable» para μνήμην αἰώνιον, porque en español «dejar un recuerdo a alguien» puede sugerir más bien un objeto o impresión subjetiva, mientras que el griego apunta a un recuerdo/memoria duradera de la persona entre los posteriores. Además, la nota b usa una formulación algo torpe: «muerte no experimentada personalmente» no es español natural.'
  spanish_quality_summary: El texto es claro y digno, pero requiere un ajuste de naturalidad y precisión semántica. «Por medio de ella tendré inmortalidad» funciona muy bien. El segmento final mejora con «dejaré una memoria perdurable entre los que vengan después de mí», que suena más idiomático en registro bíblico y representa mejor la idea de memoria duradera/reputación. La nota b debe simplificarse para sonar natural y comprensible en español eclesial amplio.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, δοῦλος, etc. «Inmortalidad» concuerda con la decisión inglesa y preserva la tensión teológica. La personificación femenina de la Sabiduría se conserva correctamente en «ella» y en la nota léxica.
  issues:
  - severity: medium
    issue: «un recuerdo eterno» para μνήμην αἰώνιον es semánticamente débil en español
    rationale: Aunque no es incorrecto, «dejar un recuerdo a los que vendrán» puede leerse como dejarles algo para recordar, no como dejar una memoria perdurable de sí mismo. El griego se orienta a remembrance/memorial lasting among later generations.
  - severity: low
    issue: 'La nota b contiene una paráfrasis poco natural: «muerte no experimentada personalmente»'
    rationale: La explicación busca expresar 'deathlessness', pero la frase suena forzada en español. Conviene una redacción más idiomática como «inmortalidad personal» o «no morir».
  revised_spanish_text: Y por medio de ella tendré inmortalidad[a][b], y dejaré una memoria perdurable entre los que vengan después de mí.
  revised_footnotes:
  - marker: a
    text: O «mediante ella» o «con ella»; el pronombre se refiere a la Sabiduría personificada como femenina.
    reason: lexical_alternative
  - marker: b
    text: La expresión «inmortalidad» puede entenderse como inmortalidad personal o, en conexión con la cláusula siguiente, como un legado perdurable; el griego deja abierta la relación entre ambas ideas.
    reason: alternative_reading
  revision_rationale: Se ajusta «un recuerdo eterno ... a los que vendrán» a «una memoria perdurable entre los que vengan» para reflejar con más precisión μνήμην αἰώνιον y evitar una lectura menos natural en español. También se mejora la redacción de la nota teológica para que sea idiomática y fiel a la apertura del griego.
