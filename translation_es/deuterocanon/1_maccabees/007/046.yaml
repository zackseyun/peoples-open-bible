translation:
  language: es
  text: Y salieron de todas las aldeas de Judea por todos lados, y los flanquearon[a]; y estos se volvieron contra aquellos[b], y todos cayeron a espada, y no quedó de ellos ni uno solo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo griego también puede entenderse más generalmente como «los rodearon» o «tuvieron ventaja sobre ellos» en esta escena de batalla.
    reason: alternative_reading
  - marker: b
    text: 'El griego tiene una secuencia comprimida y algo áspera: «y estos se volvieron contra estos», dejando implícitos en el contexto los referentes exactos de los pronombres.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθον
  english_pob_choice: came out
  chosen_spanish: salieron
  alternatives_spanish:
  - salieron afuera
  - vinieron
  lexicon: LSJ
  rationale: El verbo griego narra movimiento de salida; «salieron» es natural en español y conserva el sentido simple y narrativo sin agregar dirección ajena al texto.
- source_word: κωμῶν
  english_pob_choice: villages
  chosen_spanish: aldeas
  alternatives_spanish:
  - pueblos
  - villajes
  lexicon: LSJ
  rationale: κώμη designa una población pequeña, normalmente más cercana a «aldea» que a «pueblo» o «ciudad». «Aldeas» mantiene el valor geográfico y funciona bien en español bíblico moderno.
- source_word: κυκλόθεν
  english_pob_choice: all around
  chosen_spanish: de alrededor
  alternatives_spanish:
  - por todas partes
  - en derredor
  lexicon: LSJ
  rationale: La idea es circumferencial y táctica. «De alrededor» expresa la distribución en torno a un punto sin volver la frase pesada o arcaizante.
- source_word: ὑπερεφέρων
  english_pob_choice: outflanked
  chosen_spanish: los rodearon
  alternatives_spanish:
  - los flanquearon
  - les tomaron ventaja
  lexicon: LSJ
  rationale: El griego es difícil y el contexto bélico exige una solución que exprese ventaja posicional. «Los rodearon» recoge la fuerza táctica que el inglés POB explicó con «outflanked», sin imponer una precisión técnica que el griego no asegura del todo.
- source_word: ἀνέστρεφον
  english_pob_choice: turned back
  chosen_spanish: se volvieron
  alternatives_spanish:
  - retrocedieron
  - se dieron vuelta
  lexicon: LSJ
  rationale: El verbo puede significar volver o girarse hacia atrás. «Se volvieron» conserva esa ambigüedad narrativa y suena natural en español de combate.
- source_word: οὗτοι πρὸς τούτους
  english_pob_choice: these turned back against them
  chosen_spanish: éstos se volvieron contra aquéllos
  alternatives_spanish:
  - unos contra otros se volvieron
  - éstos volvieron contra aquellos
  lexicon: LSJ
  rationale: Los pronombres griegos son elípticos y algo ásperos. La solución española mantiene la oposición entre dos grupos sin inventar identidades más específicas que las que el contexto ofrece.
- source_word: ἔπεσαν πάντες ῥομφαίᾳ
  english_pob_choice: they all fell by the sword
  chosen_spanish: todos cayeron a espada
  alternatives_spanish:
  - todos cayeron por la espada
  - todos fueron abatidos a espada
  lexicon: LSJ
  rationale: La expresión es un modismo bélico. «Cayeron a espada» reproduce el valor idiomático de manera breve y readable; «a espada» conserva la referencia instrumental del griego.
- source_word: οὐ κατελείφθη ἐξ αὐτῶν οὐδὲ εἷς
  english_pob_choice: not even one of them was left
  chosen_spanish: no quedó de ellos ni uno solo
  alternatives_spanish:
  - no se dejó de ellos ni uno
  - no quedó ninguno de ellos
  lexicon: LSJ
  rationale: La negación enfática subraya destrucción total. «No quedó de ellos ni uno solo» preserva el énfasis de οὐδὲ εἷς con un español solemne y claro.
translation_notes:
  revision_awareness: Se tomó en cuenta el audit trail inglés y la valoración de moderado acuerdo con observaciones de issues mayores. La redacción española evita endurecer indebidamente el valor de ὑπερεφέρων y conserva la ambigüedad referencial de los pronombres griegos con una nota explicativa.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, evitando calcos excesivamente literales donde el español requería fluidez.
  - Se usó «aldeas» para κώμαι por su cercanía semántica y naturalidad en castellano.
  - Se eligió una solución bélica idiomática para ἔπεσαν πάντες ῥομφαίᾳ, sin perder la referencia a la espada.
  - La nota a conserva la tensión textual del griego sin resolver artificialmente los referentes pronominales.
  - La nota b preserva la alternativa semántica documentada por el POB inglés para ὑπερεφέρων.
