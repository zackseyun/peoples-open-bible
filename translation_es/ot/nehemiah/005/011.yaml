translation:
  language: es
  text: Por favor, devuélvanles hoy mismo sus campos, sus viñas, sus olivares y sus casas, y la centésima parte[a] del dinero, del grano, del vino nuevo y del aceite que ustedes les han venido exigiendo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la centésima» / «el uno por ciento» del dinero, del grano, del vino nuevo y del aceite; el hebreo probablemente se refiere a la porción que les estaban exigiendo.
    reason: lexical_alternative
  - marker: b
    text: O «que ustedes les están cobrando» o «que ustedes les prestan con interés».
    reason: alternative_reading
lexical_decisions:
- source_word: הָשִׁיבוּ
  english_pob_choice: restore
  chosen_spanish: devuélvanles
  alternatives_spanish:
  - restáurenles
  - restitúyanles
  - denles de vuelta
  lexicon: HALOT
  rationale: El imperativo de שוב en causativo pide una acción de devolución o restitución. En español, «devuélvanles» comunica con naturalidad tanto la devolución de bienes como la restitución de exacciones indebidas, sin perder la fuerza directiva del mandato.
- source_word: נָא
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - les ruego
  - les pido por favor
  - ahora
  lexicon: HALOT
  rationale: La partícula suaviza el mandato. «Por favor» mantiene el tono suplicante y directo en español contemporáneo, mejor que una fórmula arcaizante.
- source_word: כְּהַיּוֹם
  english_pob_choice: this very day
  chosen_spanish: hoy mismo
  alternatives_spanish:
  - este mismo día
  - hoy
  - así como hoy
  lexicon: HALOT
  rationale: La expresión transmite urgencia e inmediatez. «Hoy mismo» conserva el énfasis temporal y suena natural en español.
- source_word: שְׂדֹתֵיהֶם
  english_pob_choice: their fields
  chosen_spanish: sus campos
  alternatives_spanish:
  - sus campos de labor
  - sus terrenos
  - sus parcelas
  lexicon: HALOT
  rationale: El término hebreo designa tierras de cultivo; «campos» es el equivalente claro y directo.
- source_word: כַּרְמֵיהֶם
  english_pob_choice: their vineyards
  chosen_spanish: sus viñas
  alternatives_spanish:
  - sus viñedos
  - sus vinedos
  lexicon: HALOT
  rationale: כרם se refiere de forma estándar a plantaciones de vid. «Viñas» mantiene la concreción agrícola y el paralelismo de la lista.
- source_word: זֵיתֵיהֶם
  english_pob_choice: their olive orchards
  chosen_spanish: sus olivares
  alternatives_spanish:
  - sus huertos de olivos
  - sus olivares de olivos
  - sus arboledas de olivo
  lexicon: HALOT
  rationale: En esta lista de propiedades agrarias, el término apunta a una posesión de olivos, no a árboles individuales. «Olivares» expresa con naturalidad esa realidad patrimonial.
- source_word: וּבָתֵּיהֶם
  english_pob_choice: and their houses
  chosen_spanish: y sus casas
  alternatives_spanish:
  - y sus viviendas
  - y sus hogares
  lexicon: HALOT
  rationale: בָּתִּים es el término común para casas. «Casas» conserva la literalidad y el valor de propiedad del contexto.
- source_word: וּמְאַת
  english_pob_choice: the hundredth part
  chosen_spanish: la centésima parte
  alternatives_spanish:
  - el ciento por ciento
  - el cientoavo
  - el uno por ciento
  lexicon: HALOT
  rationale: El hebreo expresa literalmente una fracción de cien. «La centésima parte» mantiene esa forma y evita resolver prematuramente si se trata de un interés técnico o de una porción exigida.
- source_word: הַכֶּסֶף
  english_pob_choice: the money
  chosen_spanish: del dinero
  alternatives_spanish:
  - de la plata
  - del efectivo
  lexicon: HALOT
  rationale: כֶּסֶף puede significar plata o dinero. Aquí, en una enumeración económica, «dinero» comunica mejor la función de la deuda o exacción.
- source_word: הַדָּגָן
  english_pob_choice: the grain
  chosen_spanish: del grano
  alternatives_spanish:
  - del cereal
  - del cereal cosechado
  - del trigo
  lexicon: HALOT
  rationale: El sustantivo es un término general para cereal o grano. «Grano» conserva el sentido genérico sin restringirlo indebidamente.
- source_word: הַתִּירוֹשׁ
  english_pob_choice: the new wine
  chosen_spanish: del vino nuevo
  alternatives_spanish:
  - del vino fresco
  - del mosto
  - del vino recién hecho
  lexicon: HALOT
  rationale: תִּירוֹשׁ suele denotar vino nuevo o recién producido. «Vino nuevo» sigue la distinción léxica que la tradición inglesa auditada marcó.
- source_word: הַיִּצְהָר
  english_pob_choice: the oil
  chosen_spanish: del aceite
  alternatives_spanish:
  - del aceite de oliva
  - del aceite nuevo
  lexicon: HALOT
  rationale: יִצְהָר se refiere normalmente al aceite, especialmente de oliva. «Aceite» es la forma más literal y suficientemente clara en español, dado el contexto agrícola.
- source_word: אֲשֶׁר אַתֶּם נֹשִׁים בָּהֶם
  english_pob_choice: that you have been exacting from them
  chosen_spanish: que ustedes les han venido exigiendo
  alternatives_spanish:
  - que ustedes les están cobrando
  - que ustedes les cobran intereses
  - que ustedes les han estado cobrando
  lexicon: HALOT
  rationale: El participio de נשה aquí apunta a una práctica continuada de exigir o apremiar una deuda, sin obligar a una sola tecnicidad financiera. «Han venido exigiendo» preserva el aspecto continuado y la dureza del reclamo, en línea con la lectura auditada.
theological_decisions:
- issue: Alcance de נֹשִׁים en un contexto de injusticia económica
  english_pob_reading: rendered as 'have been exacting from them' rather than a narrower technical term like 'charging interest'
  chosen_spanish_reading: «les han venido exigiendo» en lugar de «les cobran intereses» o «les prestan con usura»
  alternative_spanish_readings:
  - les cobran intereses
  - les prestan con usura
  - les están cobrando
  rationale: 'El contexto denuncia una opresión económica amplia: tierras, casas y productos. La forma verbal hebrea puede abarcar la presión del acreedor sin precisar un mecanismo único. La versión española conserva esa tensión y evita cerrar indebidamente el sentido.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el packet hebreo y la auditoría inglesa: se conserva la lista de propiedades y bienes, la fracción «centésima parte», y la ambigüedad de נֹשִׁים sin resolverla a un término técnico único. No se detectaron revisiones previas que alteren el sentido base.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando aparezca el nombre divino; en este versículo no aplica.
  - «Vino nuevo» y «aceite» mantienen el paralelismo agrario del hebreo.
  - La forma plural de respeto no se usa; «ustedes» refleja el plural explícito del hebreo.
  - «Olivares» se eligió por contexto de propiedad agraria, no como traducción de árboles individuales.
