review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja en general la estructura del latín: ''Ahora ustedes están aquí'' para nunc uos hic estis, ''sus hermanos están dentro de ustedes'' para fratres uestri introrsum uestrum sunt, y mantiene correctamente la prótasis incompleta de ''Si...''. Sin embargo, la nota al pie [a] no preserva la evidencia fuente ni el rastro de auditoría inglés: el inglés marca una lectura anterior más larga y erróneamente segmentada, mientras que la nota española actual solo repite el texto principal. Además, ''enseñaren su corazón'' suena menos fiel y menos idiomático que ''instruyan/instruyeren su corazón'' para erudieritis cor uestrum.'
  spanish_quality_summary: 'El texto es legible, digno y ampliamente comprensible, pero tiene dos puntos mejorables: 1) la nota al pie es redundante e inservible; 2) ''mandaren a su mente'' es comprensible pero algo forzado en español, mientras que ''mandan a su mente'' también sonaría extraño si se modernizara; conviene mantener el registro formal con ''mandaren a su mente'' o suavizar a ''gobiernen su mente'', pero por fidelidad a imperare la primera puede sostenerse. En cambio, ''instruyeren su corazón'' suena mejor y más cercano al latín que ''enseñaren su corazón''.'
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. Las decisiones para 'mente' y 'corazón' preservan la distinción entre sensus y cor. No aplica Yahvé/Mesías/etc. La revisión propuesta mantiene fidelidad léxica sin introducir calcos torpes.
  issues:
  - severity: medium
    issue: La nota [a] es incorrecta como nota textual/audit trail.
    rationale: La nota actual repite exactamente el texto principal ('Ahora ustedes están aquí, y sus hermanos están dentro de ustedes') y no corresponde a la nota inglesa, que documenta una traducción previa de otro segmento textual. Debe o bien eliminarse, o bien reemplazarse por una nota que refleje correctamente la lectura previa documentada.
  - severity: medium
    issue: '''enseñaren su corazón'' es menos idiomático y menos preciso para erudieritis cor uestrum.'
    rationale: En español bíblico-natural, 'instruir el corazón' preserva mejor la idea de formación interior y la cercanía a erudire. 'Enseñar el corazón' suena menos natural porque sugiere enseñar algo al corazón de forma más externa.
  - severity: low
    issue: El anclaje [a] en el texto solo existe para sostener una nota innecesaria.
    rationale: Si se conserva una nota, debe aportar información real. Si no, el marcador debe eliminarse para no recargar el texto.
  revised_spanish_text: Ahora ustedes están aquí, y sus hermanos están dentro de ustedes. Si, pues, mandaren a su mente y instruyeren su corazón,
  revised_footnotes: []
  revision_rationale: Se elimina la nota [a] porque no aporta una variante real y además no refleja el rastro de auditoría inglés. Se sustituye 'enseñaren su corazón' por 'instruyeren su corazón' para mayor fidelidad a erudieritis y mejor naturalidad en español eclesial formal. Se conserva 'mandaren a su mente' por su cercanía a imperaueritis sensui uestro, aunque suene solemne.
