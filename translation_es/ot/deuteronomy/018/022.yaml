translation:
  language: es
  text: Cuando un profeta hable en nombre de Yahvé[a], y la palabra[b] no ocurra ni suceda, esa es la palabra que Yahvé no ha dicho. El profeta la ha dicho con presunción[c]; no le temas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «En nombre de» traduce la fórmula hebrea בְּשֵׁם, que expresa autoridad y representación; aquí indica que el profeta afirma hablar con la autorización de Yahvé.
    reason: lexical_alternative
  - marker: b
    text: 'O: «el asunto» o «la cosa»; el hebreo דָּבָר puede referirse tanto a la palabra hablada como al hecho anunciado. También: «no se cumpla».'
    reason: lexical_alternative
  - marker: c
    text: «Con presunción» comunica la idea de atrevimiento arrogante y voluntarioso implícita en זָדוֹן.
    reason: cultural_note
lexical_decisions:
- source_word: יְדַבֵּר
  english_pob_choice: speaks
  chosen_spanish: hable
  alternatives_spanish:
  - dice
  - declara
  lexicon: HALOT
  rationale: En una cláusula legal condicional, el imperfecto hebreo expresa una acción general o futura; «hable» conserva ese valor y mantiene la conexión verbal con «ha hablado» al final del versículo.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: un profeta
  alternatives_spanish:
  - el profeta
  lexicon: HALOT
  rationale: El hebreo usa el artículo en un caso representativo, no para identificar a un profeta específico. En español, «un profeta» expresa mejor el sentido genérico de la prueba legal.
- source_word: בְּשֵׁם יְהוָה
  english_pob_choice: in the name of Yahweh
  chosen_spanish: en nombre de Yahvé
  alternatives_spanish:
  - por el nombre de Yahvé
  lexicon: HALOT
  rationale: Es la fórmula idiomática de autoridad representada por el nombre divino; «en nombre de» es la equivalencia natural en español para la expresión hebrea.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la directriz del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» y no sustituirlo por un título como «SEÑOR».'
- source_word: הַדָּבָר
  english_pob_choice: the thing
  chosen_spanish: la cosa
  alternatives_spanish:
  - el asunto
  - la palabra
  lexicon: HALOT
  rationale: דָּבָר puede abarcar palabra, asunto o cosa. Aquí la repetición del término y el contraste con el cumplimiento permiten «la cosa» como opción sobria y fiel al audit trail en inglés.
- source_word: וְלֹא יִהְיֶה ... וְלֹא יָבֹא
  english_pob_choice: does not happen or come about
  chosen_spanish: no ocurra ni suceda
  alternatives_spanish:
  - no ocurra ni llegue a pasar
  - no se cumpla
  lexicon: HALOT
  rationale: La pareja verbal intensifica la no realización. «Ocurra ni suceda» refleja ambas formas sin usar un giro arcaico, y conserva el matiz de cumplimiento fallido.
- source_word: הוּא הַדָּבָר
  english_pob_choice: that is the thing
  chosen_spanish: esa es la cosa
  alternatives_spanish:
  - ese es el asunto
  - eso es la cosa
  lexicon: HALOT
  rationale: 'El pronombre enfático identifica con fuerza el referente: «esa es la cosa» preserva la referencia demostrativa y la repetición de דָּבָר.'
- source_word: אֲשֶׁר לֹא דִבְּרוֹ יְהוָה
  english_pob_choice: that Yahweh has not spoken
  chosen_spanish: que Yahvé no ha hablado
  alternatives_spanish:
  - que Yahvé no habló
  - que Yahvé no dijo
  lexicon: HALOT
  rationale: El perfecto español («no ha hablado») funciona naturalmente como conclusión derivada del fracaso de la predicción y conserva el vínculo entre palabra pronunciada y origen divino.
- source_word: בְּזָדוֹן
  english_pob_choice: presumptuously
  chosen_spanish: con presunción
  alternatives_spanish:
  - presuntuosamente
  - con arrogancia
  - con insolencia
  lexicon: HALOT
  rationale: זָדוֹן denota presunción arrogante y voluntariosa. «Con presunción» suena natural en español y mantiene la fuerza ética/legal sin suavizar el término.
- source_word: דִּבְּרוֹ הַנָּבִיא
  english_pob_choice: The prophet has spoken it
  chosen_spanish: El profeta la ha hablado
  alternatives_spanish:
  - El profeta la habló
  - El profeta lo ha dicho
  lexicon: HALOT
  rationale: Se conserva el objeto explícito con el pronombre femenino «la», que remite a «la cosa». «Ha hablado» preserva el nexo con דִבֵּר como acto de hablar en nombre de otro.
- source_word: לֹא תָגוּר מִמֶּנּוּ
  english_pob_choice: you shall not fear him
  chosen_spanish: no le temas
  alternatives_spanish:
  - no lo temas
  - no tengas miedo de él
  - no te aterrorices por él
  lexicon: HALOT
  rationale: גור en este contexto expresa temer o quedar intimidado. «No le temas» reproduce el mandato legal con naturalidad bíblica en español y evita un calco innecesario.
theological_decisions:
- issue: Modo de expresar el nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La directriz del proyecto exige transliterar el Tetragrámaton en la forma «Yahvé». Esto preserva el nombre personal de Dios en el texto y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de la prueba profética
  english_pob_reading: The verse is rendered as an objective test of whether a claimed prophetic word came from the LORD, without importing broader doctrinal claims about all prophecy beyond the verse itself.
  chosen_spanish_reading: El versículo se presenta como una prueba objetiva de si la palabra atribuida a Yahvé procede realmente de él, sin ampliar el alcance a una teoría general de la profecía.
  alternative_spanish_readings:
  - Una regla doctrinal amplia sobre toda profecía
  - Una descripción de cualquier ministerio profético
  rationale: 'La redacción española conserva el marco jurídico-textual del hebreo: cumplimiento o no cumplimiento como criterio, junto con la presunción del profeta, sin añadir inferencias que el verso no formula.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; do not import doctrinal claims the text does not make'
translation_notes:
  revision_awareness: Se siguió el auditable cambio del inglés POB que pasó de un referente más específico a uno genérico («a prophet») y de «matter» a «thing», manteniendo en español la repetición de דָּבָר y el cierre legal con una prohibición directa. También se respetó la decisión posterior del audito inglés de evitar un giro arcaico para la no realización («happen or come about»), usando un par verbal natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva la repetición de «la cosa» / «esa es la cosa» para reflejar דָּבָר en ambas apariciones.
  - Se usa el mandato negativo directo «no le temas» para la clausura legal, con tono bíblico pero natural.
  - El pronombre femenino «la» corresponde a «la cosa» y preserva la cohesión referencial del versículo.
