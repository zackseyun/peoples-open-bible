translation:
  language: es
  text: En todas tus obras sé preeminente[a]; no des una mancha[b] a tu honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobresaliente/excelente» para ὑπεράγων.
    reason: lexical_alternative
  - marker: b
    text: O «no des una mancha a tu honor/reputación»; también, «no traigas mancha sobre tu honor».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν πᾶσι τοῖς ἔργοις σου
  english_pob_choice: In all your works
  chosen_spanish: En todas tus obras
  alternatives_spanish:
  - En todos tus hechos
  - En todo lo que hagas
  lexicon: LSJ
  rationale: ἔργα puede significar obras, hechos o acciones. «Obras» conserva la cercanía al griego y suena natural en español; πᾶσι exige un sentido totalizante, bien expresado por «todas».
- source_word: γίνου
  english_pob_choice: be
  chosen_spanish: sé
  alternatives_spanish:
  - hazte
  - llega a ser
  lexicon: LSJ
  rationale: El imperativo de γίνομαι aquí funciona exhortando a una conducta o estado. «Sé» es el equivalente imperativo más natural en español y mantiene la fuerza directiva.
- source_word: ὑπεράγων
  english_pob_choice: preeminent
  chosen_spanish: preeminente
  alternatives_spanish:
  - sobresaliente
  - excelente
  - superior
  lexicon: LSJ
  rationale: El término expresa exceder o sobresalir. «Preeminente» conserva el matiz formal adoptado por la POB en inglés y evita diluir la idea de excelencia por encima de lo común.
- source_word: μὴ δῷς
  english_pob_choice: do not give
  chosen_spanish: no des
  alternatives_spanish:
  - no causes
  - no permitas
  lexicon: LSJ
  rationale: La prohibición con μή + aoristo subjuntivo se traduce de modo directo como «no des», manteniendo la estructura verbal y el objeto metafórico que sigue.
- source_word: μῶμον
  english_pob_choice: a blemish
  chosen_spanish: un defecto
  alternatives_spanish:
  - una mancha
  - un reproche
  - una tacha
  lexicon: LSJ
  rationale: μῶμος/μῶμον puede ser mancha, defecto o reproche. «Defecto» conserva la idea de una falla visible o censurable y funciona bien con «honor» en español; se mantiene la metáfora sin cargarla excesivamente con un tono jurídico.
- source_word: ἐν τῇ δόξῃ σου
  english_pob_choice: to your honor
  chosen_spanish: a tu honor
  alternatives_spanish:
  - en tu gloria
  - sobre tu reputación
  lexicon: LSJ
  rationale: En este contexto sapiencial, δόξα apunta a honor/reputación más que a un sentido teológico de «gloria». «A tu honor» expresa de forma idiomática el daño que no debe causarse a la honra propia.
theological_decisions:
- issue: Sentido de δόξα en un texto sapiencial ético
  english_pob_reading: honor
  chosen_spanish_reading: honor
  alternative_spanish_readings:
  - gloria
  - reputación
  rationale: El marco del versículo es la conducta y la preservación del buen nombre. «Honor» refleja mejor el valor social y ético de δόξα aquí, sin introducir un tono litúrgico que no está respaldado por el contexto.
  doctrine_reference: Sabiduría ética del texto; primacía del contexto léxico sobre una equivalencia automática con «gloria».
translation_notes:
  revision_awareness: El borrador sigue de cerca la última revisión inglesa al reflejar ὑπεράγων como un término más formal y mantener el paralelismo entre excelencia conductual y evitación del reproche. También conserva la decisión contextual de traducir δόξα como honor/reputación en un dicho sapiencial, no como gloria en sentido teológico.
  spanish_consistency_notes:
  - Se mantiene el tutear singular, coherente con la forma exhortativa breve del proverbio.
  - «Obras» y «honor» conservan el registro sapiencial y la relación entre conducta y reputación.
  - La nota sobre ὑπεράγων ofrece una alternativa semántica sin debilitar la lectura principal.
  - La nota sobre μῶμον preserva la metáfora del daño visible o censurable sin imponer una sola equivalencia excesiva.
