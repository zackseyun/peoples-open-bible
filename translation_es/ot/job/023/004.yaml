translation:
  language: es
  text: Yo expondría mi causa[a] ante él, y llenaría mi boca de argumentos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi caso». משפט aquí tiene sentido forense.
    reason: lexical_alternative
  - marker: b
    text: O «reprensiones», «pruebas» o «controversias» para «argumentos».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶעֶרְכָה
  english_pob_choice: I would lay out
  chosen_spanish: yo expondría
  alternatives_spanish:
  - yo ordenaría
  - yo presentaría
  - yo pondría en orden
  lexicon: HALOT
  rationale: El verbo hebreo sugiere poner en orden o disponer algo de manera deliberada. En español, «expondría» comunica bien la acción de presentar de forma ordenada en un contexto formal o judicial, sin sonar excesivamente técnico.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: La expresión conserva el valor relacional y forense de «ante su presencia». «Delante de él» suena natural en español y mantiene la imagen de presentar el caso frente a Dios.
- source_word: מִשְׁפָּט
  english_pob_choice: my case
  chosen_spanish: mi caso
  alternatives_spanish:
  - mi causa
  - mi juicio
  - un caso legal
  lexicon: HALOT
  rationale: Aquí משפט tiene sentido jurídico/forense. «Mi caso» reproduce de forma idiomática la idea de una causa que se presenta en tribunal, como reflejó la traducción inglesa del POB.
- source_word: וּפִי
  english_pob_choice: my mouth
  chosen_spanish: mi boca
  alternatives_spanish:
  - mi boca misma
  - mis labios
  lexicon: HALOT
  rationale: Se conserva el giro corporal literal. «Mi boca» funciona naturalmente con el verbo siguiente y mantiene la imagen hebrea sin perder claridad.
- source_word: אֲמַלֵּא
  english_pob_choice: fill
  chosen_spanish: llenaría
  alternatives_spanish:
  - colmaría
  - repletaría
  lexicon: HALOT
  rationale: El imperfecto mantiene aquí un valor hipotético/volitivo. «Llenaría» conserva la imagen verbal de llenar la boca con contenidos de defensa o argumentación.
- source_word: תוֹכָחוֹת
  english_pob_choice: arguments
  chosen_spanish: argumentos
  alternatives_spanish:
  - reprensiones
  - pruebas
  - controversias
  - objeciones
  lexicon: HALOT
  rationale: El sustantivo puede abarcar reprensión, corrección o argumentación. En este contexto judicial, «argumentos» expresa mejor la fuerza dialéctica de Job al presentar su razón, tal como lo documenta el audit trail inglés.
theological_decisions:
- issue: Imaginería forense al hablar Job ante Dios
  english_pob_reading: Render the verse in legal/courtroom language without softening Job's boldness.
  chosen_spanish_reading: 'Mantener el lenguaje judicial: «mi caso», «delante de él», «argumentos».'
  alternative_spanish_readings:
  - expresar mi queja
  - presentar mi causa
  - hablarle con reproches
  rationale: La combinación de ערך + משפט + תוכחות evoca una presentación ordenada de una causa ante un juez. En español conviene conservar esa tensión sin suavizarla a una mera queja devocional ni volverla más irreverente de lo que el hebreo exige.
  doctrine_reference: 'Principio POB: preservar la tensión teológica y la primacía del original; no domesticar la audacia de Job.'
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura aprobada del POB en inglés y conserva el marco forense señalado en la auditoría, sin introducir revisiones nuevas.
  spanish_consistency_notes:
  - Se usó «Dios» implícito mediante el pronombre «él», como en el hebreo y en la traducción inglesa, porque el contexto inmediato ya identifica al interlocutor.
  - Se evitó «SEÑOR» para respetar el nombre divino cuando no aparece explícitamente aquí.
  - «Argumentos» mantiene el tono adversarial sin convertirlo en mera «reprimenda».
