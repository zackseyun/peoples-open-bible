  to: Allí está Elam y toda su multitud, alrededor de su sepultura; todos ellos, muertos a espada, los que cayeron a espada, que descendieron incircuncisos a la tierra de abajo[a], los que infundieron su terror en la tierra de los vivos; y llevaron su vergüenza con los que descienden al foso.
  rationale: Se corrige la ubicación y el contenido de la nota para alinearlos con el English POB y con el hebreo אֶרֶץ תַּחְתִּיּוֹת. También se fortalece חֲלָלִים con ‘muertos a espada’ y se mejora la naturalidad del español en las frases espaciales, manteniendo la imaginería del texto y la carga teológica de ‘incircuncisos’.
