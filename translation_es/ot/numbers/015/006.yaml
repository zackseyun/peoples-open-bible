translation:
  language: es
  text: O para un carnero prepararás una ofrenda de cereal, de flor de harina mezclada con aceite, dos décimas[a], con un tercio de un hin de aceite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente «dos décimas»; la unidad mayor se sobreentiende por el sistema de medidas sacrificiales, como en la expresión más completa «dos décimas de un efa» en otros pasajes.
    reason: cultural_note
lexical_decisions:
- source_word: א֤וֹ
  english_pob_choice: Or
  chosen_spanish: O
  alternatives_spanish:
  - O si
  - Y
  lexicon: HALOT
  rationale: La partícula introduce una alternativa dentro de la serie de ofrendas; en español, «O» conserva esa relación disyuntiva sin añadir condicionalidad explícita.
- source_word: לָ/אַ֨יִל֙
  english_pob_choice: for a ram
  chosen_spanish: para un carnero
  alternatives_spanish:
  - para el carnero
  lexicon: HALOT
  rationale: אַיִל es «carnero». En una instrucción sacrificial, «para un carnero» expresa bien la destinación de la ofrenda; el artículo no es necesario en español.
- source_word: תַּעֲשֶׂ֣ה
  english_pob_choice: you shall prepare
  chosen_spanish: prepararás
  alternatives_spanish:
  - harás
  - harás preparar
  lexicon: HALOT
  rationale: En contexto ritual, עשה no se traduce de modo mecánico como «hacer», sino como la acción de disponer/preparar la ofrenda. El futuro exhortativo conserva el tono instruccional.
- source_word: מִנְחָ֔ה
  english_pob_choice: a grain offering
  chosen_spanish: una ofrenda vegetal
  alternatives_spanish:
  - una ofrenda de cereal
  - una ofrenda de grano
  lexicon: HALOT
  rationale: Para מִנְחָה, «ofrenda vegetal» mantiene la referencia a una ofrenda de producto vegetal/harina sin depender de una fórmula litúrgica más interpretativa; conserva la categoría sacrificial con lectura amplia y clara para español.
- source_word: סֹ֖לֶת
  english_pob_choice: of fine flour
  chosen_spanish: de flor de harina
  alternatives_spanish:
  - de harina fina
  - de flor fina de harina
  lexicon: HALOT
  rationale: סֹלֶת designa harina fina. «Flor de harina» es una equivalencia tradicional y precisa en español bíblico, y evita una perífrasis menos natural.
- source_word: שְׁנֵ֣י עֶשְׂרֹנִ֑ים
  english_pob_choice: two-tenths
  chosen_spanish: dos décimas
  alternatives_spanish:
  - dos décimos
  - dos diezmos
  lexicon: HALOT
  rationale: La frase es literalmente «dos décimas»; en español eso reproduce la medida fraccionaria breve del hebreo. Se mantiene la elipsis del sistema sacrificial, como en el inglés POB.
- source_word: בְּלוּלָ֥ה
  english_pob_choice: mixed
  chosen_spanish: mezclada
  alternatives_spanish:
  - mezclado
  - amasada
  lexicon: HALOT
  rationale: El participio pasivo describe la harina ya incorporada con el aceite; «mezclada» concuerda con «ofrenda» en español y expresa la pasiva sin recargar.
- source_word: בַ/שֶּׁ֖מֶן
  english_pob_choice: with oil
  chosen_spanish: con aceite
  alternatives_spanish:
  - en aceite
  lexicon: HALOT
  rationale: La relación instrumental/associativa se expresa naturalmente con «con aceite», equivalente directo de la mezcla ritual.
- source_word: שְׁלִשִׁ֥ית הַ/הִֽין
  english_pob_choice: a third of a hin
  chosen_spanish: un tercio de un hin
  alternatives_spanish:
  - la tercera parte de un hin
  lexicon: HALOT
  rationale: Es una medida fraccionaria con unidad antigua conservada. «Un tercio de un hin» es claro, natural y fiel al sistema metrológico del texto.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y el POB inglés, conservando la elipsis metrológica de «dos décimas» y la unidad antigua «hin»; no se introdujeron cambios textuales respecto del estado auditado más reciente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando el hebreo lo exigiera; este versículo no contiene el tetragrámaton.
  - Se evitó «Cristo»/«SEÑOR» por no corresponder al léxico del versículo.
  - «Ofrenda vegetal» se usó como opción de POB coherente con el campo semántico de מִנְחָה sin imponer una terminología eclesiástica más fija que el hebreo.
  - La nota de medida aclara la elipsis sin expandir el texto principal más allá de lo sustentado por el original.
