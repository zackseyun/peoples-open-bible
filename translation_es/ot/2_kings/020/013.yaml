revisions:
- from: Y Ezequías les prestó atención y les mostró todo su casa de tesoros[a] —la plata, el oro, los aromas, el aceite fino, su casa de armas[c], y todo lo que se hallaba en sus almacenes[b]. No hubo nada en su casa ni en todo su dominio[d] que Ezequías no les mostrara.
  to: 'Ezequías les prestó atención[a] y les mostró toda su casa del tesoro[b]: la plata, el oro, las especias, el aceite fino, su armería[c], y todo lo que se hallaba en sus almacenes. No hubo nada en su casa ni en todo su dominio[d] que Ezequías no les mostrara.'
  rationale: La revisión corrige un problema gramatical importante en 'todo su casa de tesoros', mejora la naturalidad del español con 'especias' y 'armería', y conserva las alternativas léxicas del rastro inglés en notas claras y bien ancladas. No cambia el sentido del original, solo lo expresa de manera más fiel y legible en español.
