- from: Así que escucharás la voz de Yahvé tu Dios, y harás sus mandamientos y sus estatutos, que yo te mando hoy[a].
  to: Por tanto, escucharás la voz de Yahvé tu Dios y harás sus mandamientos y sus estatutos, que yo te mando hoy[a].
  rationale: 'Se realiza una reparación menor de estilo y enlace discursivo: «Por tanto» sustituye a «Así que» para lograr un español más natural, solemne y adecuado al contexto de pacto, sin cambiar el sentido. Se mantiene el resto del texto y la nota léxica porque son fieles al hebreo y al rastro de auditoría inglés.'
