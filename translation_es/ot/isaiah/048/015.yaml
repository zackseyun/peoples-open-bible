translation:
  language: es
  text: Yo, yo he hablado; ciertamente, lo he llamado[a]; lo he traído, y haré prosperar su camino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los pronombres «lo» y «su» se refieren a aquel a quien Dios ha llamado y traído; en contexto, comúnmente se entiende que es Ciro (véase Isaías 48:14).
    reason: cross_reference
  - marker: b
    text: 'O: «y haré que su camino prospere». El hebreo tiene un verbo causativo, literalmente «haré prosperar su camino».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי אֲנִי
  english_pob_choice: I, I
  chosen_spanish: Yo, yo
  alternatives_spanish:
  - Yo solo
  - Yo mismo
  lexicon: HALOT
  rationale: La repetición del pronombre es enfática y retórica. «Yo, yo» conserva mejor la reiteración hebrea que fundirla en una sola forma.
- source_word: דִּבַּרְתִּי
  english_pob_choice: have spoken
  chosen_spanish: he hablado
  alternatives_spanish:
  - hablé
  - he dicho
  lexicon: HALOT
  rationale: El perfecto verbal expresa una declaración ya realizada. «He hablado» mantiene el valor perfectivo y suena natural en español.
- source_word: אַף
  english_pob_choice: indeed
  chosen_spanish: sí
  alternatives_spanish:
  - ciertamente
  - en verdad
  - además
  lexicon: HALOT
  rationale: Aquí introduce y refuerza la afirmación precedente. «Sí» conserva el matiz confirmatorio y la fuerza enfática sin sobrecargar la frase.
- source_word: קְרָאתִיו
  english_pob_choice: have called him
  chosen_spanish: lo he llamado
  alternatives_spanish:
  - lo he convocado
  - lo he convocado
  lexicon: HALOT
  rationale: El verbo puede ser «llamar» o «convocar». Se eligió «llamado» como equivalente directo y natural; el objeto masculino queda en pronombre, como en el hebreo.
- source_word: הֲבִיאֹתִיו
  english_pob_choice: have brought him
  chosen_spanish: lo he traído
  alternatives_spanish:
  - lo he llevado
  - lo he hecho venir
  lexicon: HALOT
  rationale: La forma causativa de בוא permite «traer» / «hacer venir». «Lo he traído» refleja bien la acción causativa y conserva la concisión del original.
- source_word: וְהִצְלִיחַ
  english_pob_choice: I will make his way prosper
  chosen_spanish: haré prosperar
  alternatives_spanish:
  - haré que prospere
  - le haré prosperar
  lexicon: HALOT
  rationale: El hebreo usa un causativo. «Haré prosperar» reproduce esa causatividad mejor que un intransitivo como «prosperará».
- source_word: דַּרְכּוֹ
  english_pob_choice: his way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su ruta
  - su curso
  lexicon: HALOT
  rationale: «Camino» es el equivalente más directo y abarca tanto trayectoria como empresa o proceder. Se preserva así la imagen hebrea sin explicitar más de la cuenta.
theological_decisions:
- issue: Referente masculino singular de «lo / su»
  english_pob_reading: Retained as an unspecified masculine singular referent in the translation, referring contextually to the agent God has called and brought, commonly understood here as Cyrus.
  chosen_spanish_reading: Se mantiene el referente masculino singular implícito («lo», «su») sin nombrarlo en el texto principal; en contexto se entiende comúnmente como Ciro.
  alternative_spanish_readings:
  - Nombrar explícitamente a Ciro en el texto principal
  - Generalizar a «su escogido» o «su instrumento»
  rationale: El hebreo no repite el nombre propio en este versículo. La traducción conserva los pronombres para no introducir información ajena al texto, aunque el contexto inmediato apunta a Ciro.
  doctrine_reference: Primacía del texto original; preservar la tensión contextual sin resolverla por tradición.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión final del audit trail: el sujeto de la última cláusula es primera persona («yo haré prosperar»), no tercera persona. Se evitó una formulación que desplazara el sujeto al «él».'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de los tres perfectos divinos con «he hablado / lo he llamado / lo he traído».
  - Se preservó la repetición enfática del pronombre inicial con «Yo, yo».
  - Se usó «camino» de forma consistente con el campo semántico de conducta, trayectoria o empresa.
  - El pronombre objeto y posesivo se dejaron implícitos como en el hebreo, sin nombrar a Ciro en el cuerpo del versículo.
