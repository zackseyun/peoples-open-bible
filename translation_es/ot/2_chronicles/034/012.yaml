base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/034/012.yaml
  text: And the men were working faithfully in the work[a], and over them were appointed Jahath and Obadiah the Levites, from the sons of Merari, and Zechariah and Meshullam, from the sons of the Kohathites, to oversee; and the Levites[b], all who were skilled with musical instruments.
  footnotes:
