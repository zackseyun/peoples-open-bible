translation:
  language: es
  text: Les sonreí[a]; no lo creían; y no abatieron[b] la luz de mi rostro[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Me reí de ellos». El hebreo también puede expresar sorpresa ante la condescendencia o el favor de Job.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no hicieron caer». El hebreo dice literalmente «no hicieron caer» o «no derribaron».'
    reason: previous_rendering
  - marker: c
    text: Hebreo «la luz de mi rostro», un modismo para una expresión facial radiante o favorable.
    reason: cultural_note
lexical_decisions:
- source_word: אֶשְׂחַק
  english_pob_choice: I smiled
  chosen_spanish: sonreí
  alternatives_spanish:
  - reí
  - me reí
  lexicon: HALOT
  rationale: El verbo puede expresar reír o sonreír; en este contexto de favor y trato digno, «sonreí» comunica mejor la actitud benévola sin sugerir burla ni risa sonora.
- source_word: אֲלֵהֶם
  english_pob_choice: at them
  chosen_spanish: a ellos
  alternatives_spanish:
  - hacia ellos
  - contra ellos
  lexicon: HALOT
  rationale: La preposición con este verbo marca dirección u orientación hacia otras personas. «A ellos» es natural en español y conserva el vínculo interpersonal.
- source_word: לֹא יַאֲמִינוּ
  english_pob_choice: they did not believe it
  chosen_spanish: no lo podían creer
  alternatives_spanish:
  - no creyeron
  - no lo creían
  lexicon: HALOT
  rationale: El hebreo dice literalmente «no creyeron», pero aquí el sentido es de asombro ante el trato favorable de Job. «No lo podían creer» transmite esa fuerza idiomática sin abandonar el contenido.
- source_word: וְאוֹר פָּנַי
  english_pob_choice: the light of my face
  chosen_spanish: la luz de mi rostro
  alternatives_spanish:
  - la luz de mi semblante
  - el resplandor de mi rostro
  - mi rostro alegre
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «luz» aplicada al rostro, que en español puede entenderse como expresión favorable o alegre. «Rostro» suena más natural que «faz» o «semblante» en este contexto.
- source_word: לֹא יַפִּילוּן
  english_pob_choice: they did not cast down
  chosen_spanish: no hicieron caer
  alternatives_spanish:
  - no abatieron
  - no apagaron
  - no dejaron caer
  lexicon: HALOT
  rationale: El verbo en hifil expresa causar caída. En español, «no hicieron caer» mantiene la metáfora básica y permite que la frase con «luz» conserve su fuerza sin endurecerla con una imagen menos clara.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado auditado del inglés: mantiene la literalidad de «did not believe it» y conserva la imagen de «light of my face» en vez de sustituirla por una paráfrasis interpretativa. En español, se eligió una solución idiomática equivalente («no lo podían creer») para preservar el matiz de asombro señalado en el audit trail.'
  spanish_consistency_notes:
  - Se mantiene «rostro» para פָּנַי como forma transparente y amplia en español bíblico.
  - No se introdujo «Cristo», «SEÑOR» ni terminología teológica ajena al versículo.
  - La puntuación con punto y coma refleja las dos cláusulas coordinadas del hebreo y el tratamiento del inglés POB.
