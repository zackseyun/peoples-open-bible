revisions:
- from: Si un hombre peca contra otro hombre[a], Dios lo juzgará; pero si un hombre peca contra Yahvé, ¿quién intercederá por él?[b] Pero no escuchaban la voz de su padre, porque Yahvé deseó darles muerte.
  to: Si un hombre peca contra otro hombre[a], Dios lo juzgará; pero si un hombre peca contra Yahvé, ¿quién intercederá por él?[b] Pero no quisieron escuchar la voz de su padre, porque Yahvé deseó darles muerte.
  rationale: Se ajustó «no escuchaban» a «no quisieron escuchar» para reflejar mejor la negativa deliberada expresada por el hebreo y preservada en el inglés auditado como «would not listen». Se mantuvo el resto porque representa fielmente el sentido fuente, la terminología del proyecto y un español natural y digno.
