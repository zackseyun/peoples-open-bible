translation:
  language: es
  text: 'David le dijo[a]: «¿De dónde vienes?» Y él le dijo: «Me he escapado del campamento de Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «¿De dónde has venido?»'
    reason: alternative_reading
lexical_decisions:
- source_word: אֵי מִזֶּה / Where have you come from?
  english_pob_choice: Where have you come from? / From where do you come?
  chosen_spanish: ¿De dónde vienes?
  alternatives_spanish:
  - ¿De dónde has venido?
  - ¿De dónde procedes?
  lexicon: HALOT
  rationale: La pregunta hebrea pide origen o procedencia. En español, «¿De dónde vienes?» expresa con naturalidad esa procedencia y conserva el valor interrogativo del original sin volverlo más formal de lo necesario. «¿De dónde has venido?» sería una alternativa más cercana al matiz de movimiento completado, pero menos directa en español bíblico moderno.
- source_word: תָּבוֹא
  english_pob_choice: have you come
  chosen_spanish: vienes
  alternatives_spanish:
  - has venido
  - llegas
  lexicon: HALOT
  rationale: Aunque el verbo hebreo está en imperfecto, en esta pregunta directa funciona como interrogación sobre procedencia. En español, el presente «vienes» comunica la pregunta idiomática equivalente; «has venido» preserva más explícitamente el aspecto completivo, pero suena más marcado.
- source_word: מִמַּחֲנֵה יִשְׂרָאֵל
  english_pob_choice: from the camp of Israel
  chosen_spanish: del campamento de Israel
  alternatives_spanish:
  - del campamento de Israel
  - del campamento israelita
  lexicon: HALOT
  rationale: מַחֲנֶה designa un campamento, con frecuencia militar. «Campamento» mantiene esa imagen y el genitivo «de Israel» sigue la construcción hebrea. Se evita suavizarlo como «de Israel» a secas, porque se perdería el dato del campamento.
- source_word: נִמְלָטְתִּי
  english_pob_choice: I have escaped
  chosen_spanish: Me he escapado
  alternatives_spanish:
  - He escapado
  - He huido
  - Me he librado
  lexicon: HALOT
  rationale: El nifal de מלט expresa escape o librarse de un peligro. «Me he escapado» conserva el sentido de salida lograda y suena natural en español. «He huido» sería posible, pero centra más la huida que el escape consumado; «me he librado» introduciría una idea más interpretativa.
- source_word: וַיֹּאמֶר ... וַיֹּאמֶר
  english_pob_choice: said ... said
  chosen_spanish: le dijo ... le dijo
  alternatives_spanish:
  - dijo ... dijo
  - preguntó ... respondió
  lexicon: HALOT
  rationale: El hebreo repite simplemente «dijo» para ambos turnos de habla. En español, añadir pronombres dativos («le dijo») mantiene la relación discursiva sin introducir un verbo interpretativo como «preguntó/respondió» que el texto no expresa de manera directa.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - —
  lexicon: standard transliteration
  rationale: Se conserva el nombre propio tradicionalmente transliterado en español.
translation_notes:
  revision_awareness: No se aplicaron revisiones previas en el paquete de auditoría; la alineación con el inglés POB es alta y el resultado requiere solo adaptación idiomática al español.
  spanish_consistency_notes:
  - Se mantiene «campamento» para מַחֲנֶה conforme al valor militar del término.
  - Se traduce el movimiento con presente idiomático español («vienes») sin perder la procedencia interrogada.
  - Se conserva la repetición verbal del hebreo con dos miembros de habla, sin convertirla en «preguntó/respondió».
