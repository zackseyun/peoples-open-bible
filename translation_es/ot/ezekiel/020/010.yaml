revisions:
- from: Así los saqué de la tierra de Egipto y los hice entrar en el desierto.
  to: Así los saqué de la tierra de Egipto y los llevé al desierto.
  rationale: Se ajusta la segunda cláusula para lograr un español más natural y ampliamente legible, manteniendo el sentido fuente de conducirlos hacia el desierto. «Los llevé al desierto» preserva adecuadamente la acción causativa en contexto y mejora la fluidez respecto a «los hice entrar en el desierto».
  reviewer_model: gpt-5.4
