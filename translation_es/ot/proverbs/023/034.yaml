translation:
  language: es
  text: Y serás como uno que yace en el corazón del mar[a], como uno que yace en la punta del mástil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en la punta del aparejo'. El hebreo חִבֵּל puede referirse al aparejo, a cuerdas o a equipo náutico relacionado; 'mástil' refleja una interpretación contextual tradicional.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיִיתָ
  english_pob_choice: And you will be
  chosen_spanish: Y serás
  alternatives_spanish:
  - Y tú serás
  - Y llegarás a ser
  lexicon: HALOT
  rationale: El perfecto con waw en este contexto exhortativo/consecuencial se expresa naturalmente en español con futuro simple; mantiene la segunda persona y el sentido de resultado de la advertencia.
- source_word: כְּשֹׁכֵב
  english_pob_choice: like one lying down
  chosen_spanish: como uno que yace
  alternatives_spanish:
  - como uno que está acostado
  - como uno que se acuesta
  lexicon: HALOT
  rationale: El participio describe el estado de estar tendido; 'yace' conserva la imagen sin sugerir sueño ni acción voluntaria, y suena más natural en este contexto.
- source_word: בְּלֶב יָם
  english_pob_choice: in the heart of the sea
  chosen_spanish: en el corazón del mar
  alternatives_spanish:
  - en medio del mar
  - en el centro del mar
  lexicon: HALOT
  rationale: '''Corazón'' retiene la metáfora hebrea de לֵב y su fuerza imagética. ''En medio del mar'' aclara, pero debilita la metáfora que el texto preserva.'
- source_word: בְּרֹאשׁ
  english_pob_choice: on the top of
  chosen_spanish: sobre la punta de
  alternatives_spanish:
  - en la cima de
  - en la parte superior de
  lexicon: HALOT
  rationale: רֹאשׁ puede ser 'cabeza' o 'parte superior'; en esta imagen náutica, 'sobre la punta de' transmite precariedad y ubicación elevada sin sonar artificial.
- source_word: חִבֵּל
  english_pob_choice: the mast
  chosen_spanish: el mástil
  alternatives_spanish:
  - la jarcia
  - el aparejo
  - las cuerdas
  lexicon: HALOT
  rationale: El audit trail inglés optó finalmente por 'mast' por ser una interpretación tradicional y formal; en español, 'mástil' conserva esa lectura contextual y es más transparente para el lector que 'jarcia', aunque ambas posibilidades siguen implícitas en el hebreo.
translation_notes:
  revision_awareness: El audit trail inglés pasó de 'rigging' a 'mast' en una revisión reciente para reflejar mejor el hebreo y mantener un registro más formal; la versión española sigue esa decisión contextual, pero conserva en nota la amplitud semántica de חִבֵּל.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se evitó 'Señor' y cualquier paráfrasis devocional que no esté en el hebreo.
  - '''Mástil'' funciona mejor que ''jarcia'' en español general; la nota conserva la alternativa semántica del hebreo.'
  - La simetría de los dos miembros poéticos se conserva con una repetición casi paralela de 'como uno que yace'.
