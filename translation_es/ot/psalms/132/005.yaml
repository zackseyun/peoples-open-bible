translation:
  language: es
  text: hasta que encuentre un lugar para Yahvé, moradas[a] para el Poderoso de Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más tradicionalmente, «tabernáculos». El sustantivo hebreo está en plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  - hasta el momento en que
  lexicon: HALOT
  rationale: En español, la construcción natural para marcar el límite temporal de la promesa u juramento es 'hasta que'. Conserva el valor de término de la acción sin añadir matices no presentes en el hebreo.
- source_word: אֶמְצָא
  english_pob_choice: I find
  chosen_spanish: encuentre
  alternatives_spanish:
  - encuentro
  - llegue a encontrar
  lexicon: HALOT
  rationale: El qal imperfecto en este contexto expresa la intención futura del hablante; en español, el subjuntivo tras 'hasta que' comunica bien esa expectativa futura.
- source_word: מָקוֹם
  english_pob_choice: a place
  chosen_spanish: un lugar
  alternatives_spanish:
  - un sitio
  - un lugar apropiado
  lexicon: HALOT
  rationale: '''Lugar'' es la equivalencia más natural y amplia en español, sin especificar más de lo que el sustantivo hebreo requiere.'
- source_word: לַ/יהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - para Yahvé Dios
  - para el Señor
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé' según la terminología del proyecto, evitando la sustitución por una máscara litúrgica. La preposición 'para' refleja היטב el ל de destino o intención.
- source_word: מִשְׁכָּנ֗וֹת
  english_pob_choice: a dwelling place
  chosen_spanish: una morada
  alternatives_spanish:
  - unas moradas
  - una tienda de morada
  - un tabernáculo
  lexicon: HALOT
  rationale: Aunque el hebreo es plural, el audit trail inglés revisado privilegia un referente singular más natural en contexto. En español, 'morada' transmite el sentido de residencia/dwelling sin recurrir a 'tabernáculo', que sería más tradicional que transparente.
- source_word: לַ/אֲבִ֥יר
  english_pob_choice: for the Mighty One
  chosen_spanish: para el Poderoso
  alternatives_spanish:
  - para el Fuerte
  - para el Valiente
  lexicon: HALOT
  rationale: אביר como epíteto divino expresa fuerza/poder. 'Poderoso' conserva esa fuerza semántica en un español digno y claro.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Ya‘akov
  lexicon: HALOT
  rationale: Nombre propio bíblico tradicionalmente asentado en español; mantener 'Jacob' favorece la inteligibilidad y la continuidad bíblica.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton de forma explícita. La política del proyecto para español es usar 'Yahvé' en el texto principal, preservando el nombre pactal en lugar de ocultarlo bajo una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Número de מִשְׁכָּנוֹת
  english_pob_reading: a dwelling place
  chosen_spanish_reading: una morada
  alternative_spanish_readings:
  - moradas
  - tabernáculos
  rationale: El hebreo plural señala una forma plural léxica, pero el contexto del verso en español fluye mejor con una referencia singular. No se fuerza el plural en el cuerpo del texto; se deja constancia de la tensión textual en la nota.
  doctrine_reference: 'DOCTRINE.md Contested terms: lexical plurality and contextual singularity'
translation_notes:
  revision_awareness: El audit trail inglés revisó la frase de 'dwelling places' a 'a dwelling place' por naturalidad y por el sentido contextual singular. Esta versión española sigue esa revisión, pero preserva la tensión morfológica del plural hebreo en una nota, sin imponer un plural artificial en el texto principal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יהוה, conforme a la política del proyecto.
  - '''Poderoso de Jacob'' mantiene la estructura titulativa del hebreo sin convertirla en una paráfrasis.'
  - La elección de 'morada' evita un calco técnico ('tabernáculos') en el texto principal y deja la alternativa documentada en la nota.
  - El verbo en subjuntivo ('encuentre') es adecuado tras 'hasta que' y refleja la intención futura del hablante.
