translation:
  language: es
  text: 'Entonces el rey mandó[a], y aquellos hombres que habían acusado maliciosamente a Daniel fueron traídos y arrojados al foso de los leones: ellos, sus hijos varones y sus esposas. Y antes de llegar al fondo del foso, los leones se apoderaron de ellos y les trituraron todos los huesos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Modismo arameo, literalmente «comieron sus piezas»; es decir, acusaron o calumniaron a Daniel con malicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲמַר
  english_pob_choice: Then ... commanded
  chosen_spanish: Entonces ... mandó
  alternatives_spanish:
  - entonces ... ordenó
  - entonces ... dijo
  lexicon: HALOT
  rationale: En contexto real, la forma verbal introduce una acción ejecutiva del rey, no una mera locución. «Mandó» conserva la fuerza de orden real; «Entonces» refleja la secuencia narrativa.
- source_word: וְהַיְתִיו
  english_pob_choice: were brought
  chosen_spanish: fueron traídos
  alternatives_spanish:
  - fueron llevados
  - fueron hechos venir
  lexicon: HALOT
  rationale: El causativo arameo indica que los hicieron comparecer o llegar al lugar. «Fueron traídos» es natural en español y mantiene el pasivo causado.
- source_word: גֻּבְרַיָּא אִלֵּךְ
  english_pob_choice: those men
  chosen_spanish: esos hombres
  alternatives_spanish:
  - aquellos hombres
  - esos varones
  lexicon: HALOT
  rationale: 'El demostrativo señala al grupo ya identificado: los acusadores de Daniel. «Esos hombres» conserva la referencia específica sin sonar forzado.'
- source_word: אֲכַלוּ קַרְצֹוהִי דִּי דָנִיֵּאל
  english_pob_choice: had maliciously accused Daniel
  chosen_spanish: habían acusado maliciosamente a Daniel
  alternatives_spanish:
  - habían calumniado a Daniel
  - habían denunciado a Daniel
  - habían comido las piezas de Daniel
  lexicon: HALOT
  rationale: La expresión aramea es un modismo literal de «comer sus piezas», con el sentido de acusar o calumniar. «Acusado maliciosamente» preserva la carga hostil y judicial; no se reduce a una mera acusación neutral.
- source_word: וּלְגֹב אַרְיָוָתָא רְמוֹ
  english_pob_choice: were ... thrown into the lions’ den
  chosen_spanish: fueron arrojados al foso de los leones
  alternatives_spanish:
  - fueron echados al foso de los leones
  - fueron lanzados al foso de los leones
  - fueron arrojados a la cueva de los leones
  lexicon: HALOT
  rationale: גּוֹב significa foso/den. «Foso de los leones» es la forma española estable y fiel al contexto; «arrojados» conserva la violencia judicial.
- source_word: אִנּוּן בְּנֵיהוֹן וּנְשֵׁיהוֹן
  english_pob_choice: they, their sons, and their wives
  chosen_spanish: ellos, sus hijos y sus esposas
  alternatives_spanish:
  - ellos, sus hijos y sus mujeres
  - ellos, sus hijos y sus mujeres
  lexicon: HALOT
  rationale: El texto menciona explícitamente «hijos» y «esposas». «Esposas» es más claro y digno en español actual que «mujeres», sin suavizar la inclusión familiar.
- source_word: וְלָא מְטוֹ לְאַרְעִית גֻּבָּא
  english_pob_choice: before they reached the bottom of the den
  chosen_spanish: antes de llegar al fondo del foso
  alternatives_spanish:
  - antes de tocar el suelo del foso
  - antes de llegar al fondo de la cueva
  lexicon: HALOT
  rationale: La frase literal es «no llegaron al fondo/suelo del foso». «Antes de llegar al fondo del foso» comunica con precisión la idea temporal y espacial en español natural.
- source_word: עַד דִּי
  english_pob_choice: before
  chosen_spanish: antes de
  alternatives_spanish:
  - hasta que
  - hasta
  lexicon: HALOT
  rationale: En esta construcción negativa-temporal, «antes de» transmite mejor que «hasta que» el sentido de que la acción de los leones ocurrió previo a completar el descenso.
- source_word: שְׁלִטוּ בְהוֹן אַרְיָוָתָא
  english_pob_choice: the lions overpowered them
  chosen_spanish: los leones se apoderaron de ellos
  alternatives_spanish:
  - los leones los dominaron
  - los leones vencieron a ellos
  - los leones los sobrepujaron
  lexicon: HALOT
  rationale: El verbo expresa dominio, control o superioridad violenta. «Se apoderaron de ellos» comunica bien la toma de dominio en español, en continuidad con el cuadro narrativo.
- source_word: וְכָל גַּרְמֵיהוֹן הַדִּקוּ
  english_pob_choice: and crushed all their bones
  chosen_spanish: y les trituraron todos los huesos
  alternatives_spanish:
  - y les quebraron todos los huesos
  - y les aplastaron todos los huesos
  - y quebraron todos sus huesos
  lexicon: HALOT
  rationale: La raíz indica destrucción/fractura de los huesos. «Trituraron» reproduce la intensidad total del daño con claridad; «les» permite mantener el objeto afectado en español natural.
theological_decisions:
- issue: Castigo que incluye a hijos y esposas
  english_pob_reading: 'Retain the text''s plain historical statement: ''they, their sons, and their wives,'' without softening or moral commentary.'
  chosen_spanish_reading: 'Conservar la afirmación histórica desnuda: «ellos, sus hijos y sus esposas», sin atenuarla ni generalizarla.'
  alternative_spanish_readings:
  - ellos y sus familias
  - ellos, sus hijos y sus mujeres
  - ellos solos
  rationale: El versículo incluye explícitamente a la familia. La traducción no debe borrar esa severidad narrativa ni reemplazarla por un término más general que reduzca la precisión del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: No se requirieron cambios respecto al último pase del contexto inglés; se mantiene la lectura óptimo-equivalente y la decisión de no suavizar el modismo arameo ni el castigo familiar explícito.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el Tetragrámaton.
  - Se usa «foso de los leones» para גּוֹב אַרְיָוָתָא, consistente con el contexto de Daniel 6.
  - Se conserva el matiz hostil de אֲכַלוּ קַרְצֹוהִי con una nota explicativa, porque el español no reproduce de forma natural el modismo literal.
  - Se prefirió «esposas» a «mujeres» por claridad referencial y dignidad estilística, sin alterar el sentido del hebreo/aramaico.
