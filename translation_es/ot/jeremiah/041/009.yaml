translation:
  language: es
  text: Ahora bien, la cisterna en la que Ismael había arrojado todos los cadáveres de los hombres a quienes había matado por causa de Guedalías[a] era la que el rey Asa había hecho por causa de Baasa, rey de Israel[b]. Ismael hijo de Natanías la llenó con los muertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘a quienes había matado junto con Guedalías’. La expresión hebrea ‘por la mano/lado de Guedalías’ es difícil y depende del contexto.'
    reason: alternative_reading
  - marker: b
    text: 'O: ‘por temor de Baasa, rey de Israel’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבּוֹר
  english_pob_choice: the cistern
  chosen_spanish: la cisterna
  alternatives_spanish:
  - el pozo
  - el hoyo
  lexicon: HALOT
  rationale: ‘בּוֹר’ puede ser pozo, cisterna o fosa; aquí, por tratarse de una obra hecha por el rey Asa, ‘cisterna’ comunica mejor un depósito artificial y no una simple excavación.
- source_word: הִשְׁלִיךְ שָׁם
  english_pob_choice: had thrown ... into
  chosen_spanish: había arrojado
  alternatives_spanish:
  - había echado
  - había lanzado
  lexicon: HALOT
  rationale: ‘הִשְׁלִיךְ’ expresa arrojar/echar. En español, ‘arrojar’ conserva con fuerza la acción violenta sin volverse demasiado mecánico.
- source_word: פִּגְרֵי
  english_pob_choice: corpses
  chosen_spanish: cadáveres
  alternatives_spanish:
  - cuerpos
  - muertos
  lexicon: HALOT
  rationale: ‘פֶּגֶר’ se refiere a un cuerpo muerto. ‘Cadáveres’ mantiene el matiz crudo y directo de la palabra hebrea.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de las personas
  lexicon: HALOT
  rationale: El plural hebreo es masculino; ‘hombres’ conserva esa precisión gramatical y el referente masculino del relato.
- source_word: הִכָּה
  english_pob_choice: had struck down
  chosen_spanish: había matado
  alternatives_spanish:
  - había herido de muerte
  - había derribado
  lexicon: HALOT
  rationale: En este contexto de muerte, ‘הִכָּה’ equivale a matar/derribar mortalmente. ‘Había matado’ es más natural en español que ‘había golpeado’ o ‘había herido’.
- source_word: בְּיַד גְּדַלְיָהוּ
  english_pob_choice: because of Gedaliah
  chosen_spanish: por causa de Guedalías
  alternatives_spanish:
  - a causa de Guedalías
  - por orden de Guedalías
  - junto con Guedalías
  lexicon: HALOT
  rationale: La frase hebrea es difícil. Siguiendo la lectura contextual del POB inglés, ‘por causa de’ evita atribuir la acción a Guedalías y refleja una relación causal o circunstancial vinculada a él.
- source_word: הוּא אֲשֶׁר עָשָׂה
  english_pob_choice: was the one that ... had made
  chosen_spanish: era la que el rey Asa había hecho
  alternatives_spanish:
  - era la que Asa había hecho
  - fue la que el rey Asa hizo
  lexicon: HALOT
  rationale: La construcción resumptiva identifica la cisterna mencionada con la que hizo Asa. ‘Era la que... había hecho’ suena natural en español y mantiene la identificación.
- source_word: מִפְּנֵי בַּעְשָׁא
  english_pob_choice: because of Baasha
  chosen_spanish: por causa de Baasa
  alternatives_spanish:
  - a causa de Baasa
  - por temor de Baasa
  lexicon: HALOT
  rationale: La preposición puede expresar causa o temor. Como el POB inglés opta por una causal amplia, ‘por causa de’ conserva esa amplitud sin fijar indebidamente la motivación.
- source_word: מִלֵּא
  english_pob_choice: filled
  chosen_spanish: la llenó
  alternatives_spanish:
  - la hizo llenar
  - la colmó
  lexicon: HALOT
  rationale: ‘מִלֵּא’ es ‘llenar’. ‘La llenó’ es la forma más directa y clara en español.
- source_word: חֲלָלִים
  english_pob_choice: the slain
  chosen_spanish: con los caídos
  alternatives_spanish:
  - con los muertos
  - con los muertos en combate
  lexicon: HALOT
  rationale: ‘חֲלָלִים’ designa a los muertos o caídos por violencia. ‘Con los caídos’ conserva el sentido de los muertos violentamente sin añadir una especificación no explícita en el hebreo.
theological_decisions:
- issue: Relación causal en la frase ‘בְּיַד גְּדַלְיָהוּ’
  english_pob_reading: 'because of Gedaliah / alternative: whom he had killed because of Gedaliah, or whom he had killed along with Gedaliah'
  chosen_spanish_reading: por causa de Guedalías
  alternative_spanish_readings:
  - a causa de Guedalías
  - a quienes había matado junto con Guedalías
  - a quienes había matado por mano de Guedalías
  rationale: El hebreo es ambivalente y el POB inglés preserva esa dificultad con nota. En español se mantiene una formulación causal amplia que no resuelve en exceso la frase ni borra la tensión interpretativa.
  doctrine_reference: Ninguna; decisión de exégesis textual y sintáctica.
- issue: Referencia histórica a Asa y Baasa
  english_pob_reading: the cistern that King Asa had made because of Baasha king of Israel
  chosen_spanish_reading: la cisterna que el rey Asa había hecho por causa de Baasa, rey de Israel
  alternative_spanish_readings:
  - la cisterna que Asa había hecho a causa de Baasa, rey de Israel
  - la cisterna que el rey Asa había hecho por temor de Baasa, rey de Israel
  rationale: Se conserva el vínculo histórico sin imponer ‘por temor’, aunque esa sea una posibilidad lexical. ‘Por causa de’ sigue la amplitud del audit trail inglés y permite la lectura histórica del pasaje.
  doctrine_reference: Ninguna; contexto histórico-narrativo.
translation_notes:
  revision_awareness: Seguí la revisión más reciente del texto fuente inglés, que mantiene ‘because of Gedaliah’ como opción preferida y reconoce la dificultad de la frase hebrea בְּיַד גְּדַלְיָהוּ. También conservé la identificación resumptiva de la cisterna hecha por Asa y la referencia causal a Baasa sin forzar ‘por temor’ en el cuerpo principal.
  spanish_consistency_notes:
  - Usé ‘Yahvé’ no aparece en este versículo; no fue necesario aplicar el estándar del nombre divino.
  - Mantengo ‘Guedalías’ como transliteración española consistente de Gedaliah.
  - Preferí ‘cadáveres’ para פִּגְרֵי y ‘caídos’ para חֲלָלִים para distinguir dos términos cercanos sin perder el matiz violento.
  - 'Conservo un orden natural en español: identificación de la cisterna, referencia histórica a Asa/Baasa, y cierre con la acción de Ismael.'
