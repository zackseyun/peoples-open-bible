translation:
  language: es
  text: Y, después de dar a los que estaban con él la consigna[a], “Victoria de Dios”, atacó de noche el recinto real con los mejores jóvenes armados, mató a unos dos mil hombres en el campamento, y abatió al elefante principal junto con el que iba en su torre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La palabra griega σύνθημα puede significar “consigna”, “contraseña”, “señal” o “grito de batalla”. En contexto militar es una palabra o señal convenida; aquí se expresa en voz alta como “Victoria de Dios”.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “el que estaba en la estructura tipo casa”, probablemente el ocupante de la torre o asiento montado sobre el elefante.
    reason: cultural_note
lexical_decisions:
- source_word: ἀναδοὺς
  english_pob_choice: after giving
  chosen_spanish: después de dar
  alternatives_spanish:
  - habiendo dado
  - tras dar
  lexicon: LSJ
  rationale: El participio aoristo introduce una acción previa al ataque. “Después de dar” conserva la secuencia temporal con español natural y sin añadir más de lo que el griego indica.
- source_word: τοῖς περὶ αὐτὸν
  english_pob_choice: those around him
  chosen_spanish: a los que estaban con él
  alternatives_spanish:
  - a los de su alrededor
  - a sus hombres
  lexicon: LSJ
  rationale: Es una expresión idiomática para sus acompañantes. La forma elegida mantiene la referencia humana y evita un calco duro.
- source_word: σύνθημα
  english_pob_choice: battle cry
  chosen_spanish: la contraseña
  alternatives_spanish:
  - la consigna
  - la señal
  - la palabra clave
  lexicon: LSJ
  rationale: En contexto militar σύνθημα es una señal o palabra convenida. En español, “contraseña” refleja mejor esa función de reconocimiento táctico que “grito de batalla”, aunque el contenido se pronuncie en voz alta.
- source_word: Θεοῦ Νίκην
  english_pob_choice: God’s Victory
  chosen_spanish: “Victoria de Dios”
  alternatives_spanish:
  - “La victoria de Dios”
  - “Dios vence”
  lexicon: LSJ
  rationale: La frase funciona como contenido de la contraseña. Se conserva la genitividad (“de Dios”) y el carácter de lema breve. “Victoria” en mayúscula se mantiene como eco formular, no como título aparte.
- source_word: νεανίσκων ἀρίστων κεκοσμημένων
  english_pob_choice: the finest armed young men
  chosen_spanish: con los mejores jóvenes armados
  alternatives_spanish:
  - con jóvenes bien equipados
  - con jóvenes excelentes en armas
  lexicon: LSJ
  rationale: κεκοσμημένων alude a estar bien equipados o pertrechados; “armados” comunica el sentido militar en español actual. “Los mejores” conserva ἀρίστων sin sobreexplicar.
- source_word: ἐπιβαλὼν
  english_pob_choice: he attacked
  chosen_spanish: atacó
  alternatives_spanish:
  - se lanzó contra
  - cayó sobre
  lexicon: LSJ
  rationale: En narrativa militar el participio expresa el asalto. “Atacó” es directo y fiel al valor verbal sin perder naturalidad.
- source_word: νύκτωρ
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - durante la noche
  lexicon: LSJ
  rationale: Adverbio temporal sencillo; “de noche” es la opción más fluida en español.
- source_word: τὴν βασιλικὴν αὐλήν
  english_pob_choice: the royal court
  chosen_spanish: la corte real
  alternatives_spanish:
  - el patio real
  - el recinto real
  lexicon: LSJ
  rationale: αὐλή puede significar patio, recinto o corte; en este contexto militar se refiere al ámbito real/royal. “Corte real” es el equivalente más inteligible en español, sin excluir el matiz espacial.
- source_word: τὴν παρεμβολὴν
  english_pob_choice: the camp
  chosen_spanish: del campamento
  alternatives_spanish:
  - del campamento militar
  - de la acampada
  lexicon: LSJ
  rationale: Término militar estándar para el campamento o encampment. Se integra con el genitivo de manera natural en español.
- source_word: ἀνεῖλεν εἰς ἄνδρας δυσχιλίους
  english_pob_choice: struck down about two thousand men
  chosen_spanish: derribó a unos dos mil hombres
  alternatives_spanish:
  - mató a unos dos mil hombres
  - hizo caer a unos dos mil hombres
  lexicon: LSJ
  rationale: ἀναιρέω puede significar matar o derribar; el contexto bélico admite una traducción violenta. “Derribó” conserva el movimiento del griego y “unos dos mil” respeta el valor aproximado.
- source_word: τὸν πρωτεύοντα τῶν ἐλεφάντων
  english_pob_choice: the leading elephant
  chosen_spanish: al elefante principal
  alternatives_spanish:
  - al elefante que iba delante
  - al elefante más destacado
  lexicon: LSJ
  rationale: La expresión designa al elefante de primera posición o principal en la formación. “Principal” es claro en español y mantiene la idea de preeminencia.
- source_word: σὺν τῷ κατʼ οἰκίαν ὄντι
  english_pob_choice: together with its rider
  chosen_spanish: junto con el que iba en su torre
  alternatives_spanish:
  - junto con su jinete
  - junto con el ocupante de su torre
  lexicon: LSJ
  rationale: Literalmente, “el que está en la estructura tipo casa”, probablemente la torre o howdah del elefante. “El que iba en su torre” conserva la imagen y evita decidir prematuramente por “jinete”, que podría sugerir cabalgadura ordinaria.
- source_word: συνέθηκεν
  english_pob_choice: cut down
  chosen_spanish: abatió
  alternatives_spanish:
  - mató
  - derribó
  lexicon: LSJ
  rationale: En contexto el verbo comunica destruir o liquidar al elefante y a su ocupante. “Abatió” funciona bien para una acción letal y no repite exactamente “derribó” del miembro anterior.
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés, especialmente la decisión de tratar σύνθημα como señal militar audible y Θεοῦ Νίκην como lema breve. También se respetó la nota cultural sobre τῷ κατʼ οἰκίαν ὄντι, preservando la imagen del ocupante en la torre del elefante.
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” como norma de proyecto solo cuando el texto fuente lo requiera; este versículo no contiene el tetragrámaton, por lo que aparece “Dios” en el lema.
  - Se prefirió “contraseña” en la nota, pero no en el texto principal, para no sobrecargar la línea narrativa con una equivalencia demasiado moderna.
  - “Corte real” se eligió para αὐλή por su inteligibilidad; la nota implícita del recinto queda absorbida por el contexto bélico.
  - Se evitó “siervo” para δοῦλος porque no aparece en este versículo y no corresponde introducir terminología no presente en la fuente.
