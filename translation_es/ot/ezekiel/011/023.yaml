translation:
  language: es
  text: Y la gloria de Yahvé subió de en medio de la ciudad y se detuvo sobre el monte que está al oriente de la ciudad[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ascendió» para «subió».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «que está al oriente de la ciudad»; posiblemente «que está delante de la ciudad», según la orientación espacial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - se elevó
  lexicon: HALOT
  rationale: עלה expresa movimiento hacia arriba. «Subió» conserva el dinamismo concreto del verbo y suena natural en español sin perder la imagen de partida de la gloria.
- source_word: כְּבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahweh
  - la gloria del Yahvé
  lexicon: HALOT
  rationale: Se mantiene el sustantivo «gloria» para כָּבוֹד y se usa «Yahvé» como equivalente español del nombre divino, conforme al criterio del proyecto.
- source_word: מֵעַל תּוֹךְ הָעִיר
  english_pob_choice: from the midst of the city
  chosen_spanish: de en medio de la ciudad
  alternatives_spanish:
  - de dentro de la ciudad
  - desde el centro de la ciudad
  lexicon: HALOT
  rationale: La combinación de מֵעַל con תּוֹךְ pide la idea de salida desde el interior/medio. «De en medio de la ciudad» reproduce el sentido sin forzar una calca extraña en español.
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se puso
  alternatives_spanish:
  - estuvo
  - se quedó de pie
  lexicon: HALOT
  rationale: עמד puede traducirse simplemente como «estuvo/de pie», pero aquí el movimiento narrativo de instalarse en un lugar se expresa de modo natural con «se puso sobre», evitando una rigidez innecesaria.
- source_word: עַל הָהָר
  english_pob_choice: on the mountain
  chosen_spanish: sobre el monte
  alternatives_spanish:
  - en el monte
  - sobre la montaña
  lexicon: HALOT
  rationale: הַר puede ser «monte» o «montaña». «Monte» encaja bien en un contexto bíblico y conserva el tono solemne del pasaje.
- source_word: אֲשֶׁר מִקֶּדֶם לָעִיר
  english_pob_choice: that is east of the city
  chosen_spanish: que está al oriente de la ciudad
  alternatives_spanish:
  - que está al este de la ciudad
  - que está delante de la ciudad
  lexicon: HALOT
  rationale: מִקֶּדֶם puede significar «al este de» o, según orientación, «delante de». En este contexto geográfico, «al oriente de» es claro, tradicional y fiel al probable sentido espacial.
theological_decisions:
- issue: Renderizar יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se preserva el nombre propio divino en español con la forma establecida por el proyecto, en lugar de sustituirlo por un título en mayúsculas. Esto mantiene la transparencia respecto del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido direccional de מִקֶּדֶם
  english_pob_reading: east of the city / possibly in front of the city
  chosen_spanish_reading: al oriente de la ciudad
  alternative_spanish_readings:
  - delante de la ciudad
  - al este de la ciudad
  rationale: La nota inglesa conserva la ambigüedad posible de מִקֶּדֶם, pero en una referencia topográfica como esta la lectura geográfica es la más probable. «Al oriente» permite reflejar esa dirección sin negar la alternativa semántica.
  doctrine_reference: DOCTRINE.md Hermeneutical clarity on spatial terms
translation_notes:
  revision_awareness: 'Coincide con el sentido del texto base y con la auditoría inglesa: no se requieren cambios sustanciales respecto del pasaje ya revisado; se conserva la imagen de la gloria saliendo de la ciudad y quedándose sobre el monte oriental.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - «Subió» conserva la imagen verbal concreta de עלה sin sobretraducción.
  - «De en medio de la ciudad» evita un calco duro de מֵעַל תּוֹךְ הָעִיר y preserva el sentido compositivo.
  - «Al oriente» refleja la opción geográfica principal y deja abierta la alternativa direccional documentada.
  - El tono es bíblico y sobrio, sin recurrir a fórmulas eclesiásticas que oculten el nombre divino.
