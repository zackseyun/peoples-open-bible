review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: la victoria no depende de la fuerza humana acumulada, sino de la fuerza que procede del ámbito divino. Sin embargo, hay dos problemas de fidelidad/forma: (1) «de los cielos» no corresponde al singular griego ἐκ τοῦ οὐρανοῦ y en español bíblico natural aquí debe ser «del cielo»; (2) la segunda cláusula «sino la fuerza es...» es poco idiomática y no refleja con buena fluidez el contraste griego.'
  spanish_quality_summary: 'La redacción actual suena forzada: «la multitud de la fuerza» y «sino la fuerza es de los cielos» son comprensibles, pero poco naturales en español. Una formulación como «una multitud de fuerza» y «sino que la fuerza viene del cielo» conserva el sentido y mejora mucho la legibilidad. También conviene limpiar la nota al pie, que mezcla inglés («might») y comillas poco naturales.'
  glossary_alignment: 'No hay términos del glosario mayor en conflicto directo. La decisión teológica de mantener «cielo» como circunloquio reverente es correcta, pero debe hacerse en singular: «del cielo», no «de los cielos». La repetición de «fuerza» para δύναμις / ἰσχύς es defendible y está en línea con la auditoría inglesa.'
  issues:
  - severity: medium
    issue: «de los cielos» traduce el singular griego τοῦ οὐρανοῦ
    rationale: El texto fuente dice literalmente «del cielo». En español, además, «del cielo» es la forma más natural para este circunloquio reverente.
  - severity: medium
    issue: La cláusula «sino la fuerza es de los cielos» es poco idiomática
    rationale: Aunque comunica el sentido, suena calcada. «Sino que la fuerza viene del cielo» expresa mejor el contraste adversativo y la procedencia indicada por ἐκ.
  - severity: low
    issue: «multitud de la fuerza» suena rígido en español
    rationale: No es incorrecto, pero «una multitud de fuerza» o «gran fuerza» sería más natural. Dado que el inglés auditado preserva la idea de cantidad acumulada, «una multitud de fuerza» mantiene mejor esa matización.
  - severity: low
    issue: La nota al pie contiene inglés y formulación poco pulida
    rationale: La glosa «force/might» debe estar plenamente en español y conviene explicar con claridad la alternativa léxica sin mezclar idiomas.
  revised_spanish_text: porque la victoria en la guerra no está en una multitud de fuerza[a], sino que la fuerza viene del cielo.
