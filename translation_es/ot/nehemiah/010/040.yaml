translation:
  language: es
  text: Porque los hijos de Israel y los hijos de Leví llevarán la contribución del grano, del vino nuevo y del aceite a las cámaras, donde están los utensilios del santuario, y los sacerdotes que ministran, y los porteros, y los cantores. Y no descuidaremos la casa de nuestro Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no abandonaremos la casa de nuestro Dios'. El hebreo también puede expresar la idea de forsake/abandonar, aunque aquí el énfasis práctico es no descuidar su sostenimiento.
    reason: alternative_reading
lexical_decisions:
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Mantiene el paralelismo formal con 'los hijos de Leví' y refleja con transparencia la expresión hebrea filial usada por el texto.
- source_word: בְנֵי הַלֵּוִי
  english_pob_choice: the sons of Levi
  chosen_spanish: los hijos de Leví
  alternatives_spanish:
  - los levitas
  lexicon: HALOT
  rationale: Conserva la correspondencia estructural con 'los hijos de Israel' y sigue de cerca la formulación hebrea.
- source_word: תְּרוּמָה
  english_pob_choice: the contribution
  chosen_spanish: la contribución
  alternatives_spanish:
  - la ofrenda
  - la ofrenda alzada
  lexicon: HALOT
  rationale: '''Contribución'' comunica bien el sentido de algo apartado y entregado para uso sagrado sin recurrir a un tecnicismo menos claro para lectores modernos.'
- source_word: דָּגָן
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - cereal
  - trigo
  lexicon: HALOT
  rationale: En este contexto designa la producción cerealera de manera general; 'grano' preserva esa amplitud.
- source_word: תִּירוֹשׁ
  english_pob_choice: new wine
  chosen_spanish: mosto
  alternatives_spanish:
  - vino nuevo
  - vino fresco
  lexicon: HALOT
  rationale: En español 'mosto' puede expresar mejor el producto vitivinícola recién obtenido y conserva el matiz agrícola del término.
- source_word: יִּצְהָר
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  lexicon: HALOT
  rationale: En la tríada agrícola el referente es el aceite de oliva; 'aceite' es la forma breve y usual en español bíblico.
- source_word: לְּשָׁכוֹת
  english_pob_choice: the chambers
  chosen_spanish: las cámaras
  alternatives_spanish:
  - los aposentos
  - las habitaciones
  lexicon: HALOT
  rationale: '''Cámaras'' conserva el valor arquitectónico del término para dependencias del templo; evita reducirlo a una simple ''habitación'' doméstica.'
- source_word: כְּלֵי הַמִּקְדָּשׁ
  english_pob_choice: the vessels of the sanctuary
  chosen_spanish: los utensilios del santuario
  alternatives_spanish:
  - los vasos del santuario
  - los objetos del santuario
  lexicon: HALOT
  rationale: '''Utensilios'' abarca los implementos del servicio sagrado sin restringirlos a vasos; ''santuario'' traduce adecuadamente מִקְדָּשׁ.'
- source_word: הַכֹּהֲנִים הַמְשָׁרְתִים
  english_pob_choice: the priests who minister
  chosen_spanish: los sacerdotes que ministran
  alternatives_spanish:
  - los sacerdotes que sirven
  - los sacerdotes ministeriales
  lexicon: HALOT
  rationale: '''Ministran'' refleja el servicio cultual continuo de los sacerdotes; ''sacerdotes'' es el equivalente natural y claro en español.'
- source_word: הַשּׁוֹעֲרִים
  english_pob_choice: the gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardas de la puerta
  - los guardianes de la entrada
  lexicon: HALOT
  rationale: '''Porteros'' es un equivalente tradicional y comprensible en contexto del templo; preserva la función de custodiar las puertas.'
- source_word: הַמְשֹׁרְרִים
  english_pob_choice: the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantores del templo
  - los cantantes
  lexicon: HALOT
  rationale: '''Cantores'' es más idiomático en registro bíblico-culto que ''cantantes'' y mantiene la referencia a la función litúrgica.'
- source_word: לֹא נַעֲזֹב
  english_pob_choice: we will not neglect
  chosen_spanish: no descuidaremos
  alternatives_spanish:
  - no abandonaremos
  - no dejaremos
  lexicon: HALOT
  rationale: La carga no es mera salida física sino falta de sostenimiento del templo; 'descuidaremos' comunica mejor el compromiso práctico y cultual.
- source_word: בֵּית אֱלֹהֵינוּ
  english_pob_choice: the house of our God
  chosen_spanish: la casa de nuestro Dios
  alternatives_spanish:
  - el templo de nuestro Dios
  - la morada de nuestro Dios
  lexicon: HALOT
  rationale: Conserva la idiomática hebrea 'casa de nuestro Dios' sin sustituirla por una interpretación más explícita que el texto no exige.
theological_decisions:
- issue: Paralelismo de grupos masculinos filiales
  english_pob_reading: the sons of Israel ... the sons of Levi
  chosen_spanish_reading: los hijos de Israel ... los hijos de Leví
  alternative_spanish_readings:
  - los israelitas ... los levitas
  rationale: Se retiene la forma filial masculina para preservar el paralelismo retórico y la cercanía al hebreo, en vez de neutralizar la expresión.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sentido de no abandonar la casa de Dios
  english_pob_reading: we will not neglect the house of our God
  chosen_spanish_reading: no descuidaremos la casa de nuestro Dios
  alternative_spanish_readings:
  - no abandonaremos la casa de nuestro Dios
  - no desampararemos la casa de nuestro Dios
  rationale: El contexto es el sostén y mantenimiento del culto del templo; 'descuidaremos' recoge esa fuerza práctica mejor que una simple idea de alejamiento físico.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB inglés: la conexión natural entre ''the chambers'' y la cláusula siguiente, y la elección de ''And'' frente a ''So''. En español se reflejó con ''a las cámaras'' y la continuidad de ''Y'' sin introducir una conclusión explicativa ajena al hebreo.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque no aparece el tetragrámaton en este texto; se usó 'Dios' para אֱלֹהים según el estándar del proyecto.
  - '''Mosto'' se eligió para תִּירוֹשׁ por su valor natural en español bíblico; si se requiere mayor literalidad agrícola, ''vino nuevo'' sigue siendo una alternativa documentada.'
  - '''Sacerdotes'', ''porteros'' y ''cantores'' conservan un registro eclesial comprensible en español sin perder la función cultual del texto.'
