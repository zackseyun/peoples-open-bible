    reason: lexical_alternative
  revision_rationale: Se reubicó la nota al verbo pertinente para cumplir la disciplina de anclaje y se pulió levemente la puntuación para mejorar la fluidez del español sin alterar el sentido. También se mantiene la alternativa aspectual documentada en el expediente inglés, pero expresada de forma natural en español.
