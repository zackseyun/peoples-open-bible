translation:
  language: es
  text: Aun si crían a sus hijos[a], yo los dejaré en duelo por sus hijos, de modo que no quede hombre alguno; porque en verdad[b], ¡ay de ellos cuando me aparte de ellos!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus hijos varones»; el sustantivo hebreo puede referirse específicamente a hijos varones, aunque a menudo designa descendencia en sentido amplio.
    reason: lexical_alternative
  - marker: b
    text: O «cuando me aleje de ellos». El hebreo puede poner el acento en la retirada de Dios como pérdida de favor y presencia en juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: Even if
  chosen_spanish: Aunque
  alternatives_spanish:
  - Aun si
  - Incluso si
  lexicon: HALOT
  rationale: La construcción introduce un valor concesivo-condicional. En español, «aunque» comunica bien la concesión sin sonar forzado, manteniendo la fuerza de la frase.
- source_word: יְגַדְּלוּ
  english_pob_choice: they raise
  chosen_spanish: críen
  alternatives_spanish:
  - críen a
  - levanten
  - eduquen
  lexicon: HALOT
  rationale: El pi‘el de גדל puede referirse a criar o educar hijos. «Críen» es natural en español y conserva la idea de rearing without overexplication.
- source_word: בְּנֵיהֶם
  english_pob_choice: their children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - su descendencia
  lexicon: HALOT
  rationale: Aunque בנים puede decir «hijos varones», aquí el contexto permite el sentido colectivo de descendencia. «Sus hijos» evita restringir indebidamente el término.
- source_word: וְשִׁכַּלְתִּים
  english_pob_choice: I will bereave them
  chosen_spanish: yo los dejaré sin hijos
  alternatives_spanish:
  - yo los privaré de hijos
  - yo los dejaré en duelo por sus hijos
  lexicon: HALOT
  rationale: «Bereave» expresa pérdida de hijos con carga de dolor, pero en español «dejaré sin hijos» comunica de forma clara el resultado judicial. Se mantiene el impacto punitivo del verbo sin añadir elementos no explícitos.
- source_word: מֵאָדָם
  english_pob_choice: so that not a man remains
  chosen_spanish: de modo que no quede hombre alguno
  alternatives_spanish:
  - hasta que no quede hombre
  - para que no quede nadie
  lexicon: HALOT
  rationale: La frase hebrea intensifica la desolación hasta la ausencia de varón/persona humana. «Hombre alguno» conserva la referencia a אדם como individuo humano y refleja bien la lectura del POB en inglés.
- source_word: כִּי גַם
  english_pob_choice: for indeed
  chosen_spanish: porque en verdad
  alternatives_spanish:
  - pues en verdad
  - sí, porque
  lexicon: HALOT
  rationale: La combinación funciona de modo enfático y explicativo. «Porque en verdad» mantiene el matiz de refuerzo solemne y resulta idiomático en español bíblico contemporáneo.
- source_word: א֥וֹי לָהֶ֖ם
  english_pob_choice: woe to them
  chosen_spanish: ¡ay de ellos!
  alternatives_spanish:
  - ¡ay para ellos!
  - ¡pobre de ellos!
  lexicon: HALOT
  rationale: Es la fórmula profética clásica de lamentación y juicio. «¡Ay de ellos!» preserva la solemnidad y evita sustituirla por un giro menos bíblico.
- source_word: בְּשׂוּרִי מֵהֶם
  english_pob_choice: when I depart from them
  chosen_spanish: cuando me aparte de ellos
  alternatives_spanish:
  - cuando me aleje de ellos
  - cuando me retire de ellos
  lexicon: HALOT
  rationale: 'El verbo סור con prefijo ב expresa circunstancia temporal: el desastre sucede cuando Dios se aparta. «Me aparte de ellos» conserva la lectura relacional y la primera persona divina del hebreo.'
theological_decisions:
- issue: La retirada divina como juicio covenantal en la cláusula final
  english_pob_reading: The clause refers to God's departure/withdrawal from the people as an act of judgment.
  chosen_spanish_reading: La cláusula se entiende como el apartarse de Dios de su pueblo en juicio.
  alternative_spanish_readings:
  - el alejarse de Dios por parte del pueblo
  - la retirada de la protección divina
  rationale: El sufijo de primera persona en בְּשׂוּרִי favorece que sea Dios quien se aparta. La traducción preserva esa tensión sin suavizarla ni convertirla en una formulación doctrinal más amplia que el texto no explicita.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés, que ajustó la segunda cláusula de «of every man» a «so that not a man remains» para reflejar con más naturalidad el sentido intensivo de la desolación. La versión española reproduce ese énfasis con «de modo que no quede hombre alguno».
  spanish_consistency_notes:
  - Se usa «Dios» implícito en la primera persona verbal del discurso divino, sin añadir el nombre donde el hebreo no lo introduce explícitamente.
  - Se mantiene «hijos» en sentido amplio, con nota para la alternativa masculina específica.
  - Se conserva el tono profético solemne con «¡ay de ellos!» y una estructura sintáctica sobria.
  - La expresión final se traduce con un verbo de apartarse para retener la idea de retirada de presencia/favor sin perder la literalidad del movimiento verbal.
