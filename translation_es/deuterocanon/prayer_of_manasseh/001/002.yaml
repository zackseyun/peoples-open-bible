translation:
  language: es
  text: el que hizo el cielo y la tierra, con todas sus huestes[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo su adorno» o «todo su orden». El griego κόσμος aquí probablemente se refiere al conjunto ordenado que pertenece al cielo y a la tierra, no a una segunda mención del «mundo».
