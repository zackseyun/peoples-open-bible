translation:
  language: es
  text: Ahora Gedeón tuvo setenta hijos varones[a], nacidos de él, porque tenía muchas esposas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «los que salieron de sus lomos», un modismo hebreo para su descendencia biológica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְגִדְעוֹן
  english_pob_choice: Now Gideon had
  chosen_spanish: Ahora Gedeón tuvo
  alternatives_spanish:
  - Y Gedeón tuvo
  - Gedeón tuvo
  lexicon: HALOT
  rationale: La partícula inicial con ל marca relación posesiva/existencial; en español, "tuvo" expresa de forma natural la posesión de hijos. "Ahora" conserva el enlace discursivo de waw sin forzar una literalidad extraña.
- source_word: הָיוּ
  english_pob_choice: had
  chosen_spanish: tuvo
  alternatives_spanish:
  - había para él
  - había
  lexicon: HALOT
  rationale: En esta construcción hebrea de posesión, el sentido es posesivo más que meramente existencial. "Tuvo" es la forma idiomática y clara en español.
- source_word: שִׁבְעִים בָּנִים
  english_pob_choice: seventy sons
  chosen_spanish: setenta hijos
  alternatives_spanish:
  - setenta varones
  - setenta descendientes
  lexicon: HALOT
  rationale: בָּנִים puede significar específicamente "hijos" en español, pero "hijos" es el equivalente natural y más amplio que mantiene el sentido filial del texto sin cambiar el referente.
- source_word: יֹצְאֵי יְרֵכוֹ
  english_pob_choice: his own offspring
  chosen_spanish: sus propios descendientes
  alternatives_spanish:
  - los que salieron de sus lomos
  - los que salieron de su muslo
  - su propia descendencia biológica
  lexicon: HALOT
  rationale: El hebreo usa un idiomatismo corporal para indicar descendencia biológica. "Sus propios descendientes" preserva el sentido sin calco duro; la nota mantiene visible la imagen hebrea.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la cantidad de hijos. "Porque" es la equivalencia directa y clara en español.
- source_word: נָשִׁים רַבּוֹת
  english_pob_choice: many wives
  chosen_spanish: muchas esposas
  alternatives_spanish:
  - muchas mujeres
  - numerosas esposas
  lexicon: HALOT
  rationale: En este contexto posesivo, נָשִׁים se refiere a esposas, no simplemente a mujeres. "Esposas" evita ambigüedad en español y conserva el dato social del texto.
- source_word: הָיוּ לוֹ
  english_pob_choice: he had
  chosen_spanish: tenía
  alternatives_spanish:
  - había para él
  - le pertenecían
  lexicon: HALOT
  rationale: La construcción hebrea expresa posesión. "Tenía" es el equivalente natural en español y mantiene la lectura descriptiva sin añadir juicio.
theological_decisions:
- issue: Descripción de una familia poligínica sin evaluación explícita
  english_pob_reading: Translate descriptively as 'many wives' without moral commentary.
  chosen_spanish_reading: Traducir descriptivamente como "muchas esposas" sin comentario moral.
  alternative_spanish_readings:
  - '"muchas mujeres" para suavizar'
  - añadir una glosa de aprobación o desaprobación
  rationale: El versículo informa el estado familiar de Gedeón; no lo aprueba ni lo condena de forma explícita. La traducción debe conservar ese valor descriptivo y no importar una valoración doctrinal ausente.
  doctrine_reference: 'Principio de traducción: no introducir afirmaciones teológicas o morales que el texto no formula.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el control cruzado reporta alto acuerdo; se conserva la lectura principal y la nota lexical para el idiomatismo de descendencia.
  spanish_consistency_notes:
  - Se usa "Gedeón" como forma estable del nombre propio.
  - Se evita "SEÑOR" o terminología de sustitución porque el pasaje no contiene el nombre divino.
  - '"Hijos" se mantiene como traducción natural de בָּנִים en este contexto familiar.'
  - '"Esposas" refleja el valor contextual de נָשִׁים y evita la ambigüedad de "mujeres".'
  - La nota al pie conserva la metáfora corporal hebrea sin sobrecargar el texto principal.
