translation:
  language: es
  text: Quien sacrifique a cualquier dios, excepto a Yahvé únicamente, será consagrado[a] a destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será puesto bajo el anatema» o «será totalmente destruido». El verbo hebreo implica quedar irrevocablemente dedicado a destrucción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹבֵחַ
  english_pob_choice: Whoever sacrifices
  chosen_spanish: Quienquiera que sacrifique
  alternatives_spanish:
  - El que sacrifica
  - Quien sacrifique
  lexicon: HALOT
  rationale: El participio qal funciona sustantivamente y pide en español una construcción general e impersonal. «Quienquiera que» conserva el valor indefinido de la norma legal; «sacrifique» mantiene el matiz cultual de un sacrificio ritual, no solo de una ofrenda amplia.
- source_word: לָאֱלֹהִים
  english_pob_choice: to any god
  chosen_spanish: a cualquier dios
  alternatives_spanish:
  - a dioses
  - a un dios
  - a Dios/dioses
  lexicon: HALOT
  rationale: En este contexto, אֱלֹהִים es genérico y remite a una deidad distinta de Yahvé. «A cualquier dios» expresa con naturalidad la fuerza distributiva y evita sugerir pluralidad legítima o un singular indefinido demasiado débil.
- source_word: יָחֳרָם
  english_pob_choice: shall be devoted to destruction
  chosen_spanish: será entregado al anatema
  alternatives_spanish:
  - será destruido por completo
  - será puesto bajo el anatema
  - será consagrado a destrucción
  lexicon: HALOT
  rationale: El hophʿal de חרם incluye la idea de quedar puesto bajo חרם, un estado de consagración irreversible para destrucción. «Entregado al anatema» preserva el peso legal-teológico y mantiene visible el término técnico sin reducirlo a mera destrucción física.
- source_word: בִּלְתִּי
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - salvo
  - a menos que
  lexicon: HALOT
  rationale: Aquí introduce una cláusula exceptiva. «Excepto» es la forma más clara y natural en español moderno para marcar la exclusión.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé solo
  - a Jehová
  - al SEÑOR
  lexicon: HALOT
  rationale: Siguiendo la política del proyecto, el tetragrámaton se rinde como «Yahvé». La preposición «a» conserva el régimen del verbo sacrificial en español.
- source_word: לְבַדּוֹ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - únicamente
  - por sí solo
  lexicon: HALOT
  rationale: 'La idea es de exclusividad: el sacrificio se permite únicamente a Yahvé. «Solo» es la forma más natural y directa en español para esa exclusión absoluta.'
theological_decisions:
- issue: Término penal חרם en una ley contra el sacrificio idolátrico
  english_pob_reading: shall be devoted to destruction
  chosen_spanish_reading: será entregado al anatema
  alternative_spanish_readings:
  - será destruido por completo
  - será puesto bajo el anatema
  - será consagrado a destrucción
  rationale: El hebreo no expresa solo ejecución, sino la noción legal-cultual de quedar bajo חרם, apartado irrevocablemente para destrucción. «Anatema» conserva esa densidad técnica en español, aunque requiere nota explicativa para lectores que no conozcan el término.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la terminología base del proyecto en español, se translitera como «Yahvé» para preservar el nombre del pacto en lugar de ocultarlo con un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
translation_notes:
  revision_awareness: El paquete fuente muestra acuerdo alto y no registra revisiones aplicadas; por eso se mantiene la lectura auditada sin introducir cambios de sentido. La principal adaptación al español es conservar el término técnico «anatema» en la cláusula penal y explicarlo en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la terminología del proyecto para יהוה.
  - «Dios» no se usa aquí porque el hebreo dice אֱלֹהִים en un sentido genérico de cualquier deidad distinta de Yahvé.
  - «Anatema» se conserva como término técnico para reflejar חרם y no se reduce a «destrucción» en el texto principal.
  - La cláusula exceptiva con «excepto» refleja correctamente בִּלְתִּי en español natural.
