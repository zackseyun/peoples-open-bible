revisions:
- from: Al ver sus ojos[a], se apasionó por ellos y envió mensajeros a ellos, a Caldea[b].
  to: A la vista de sus ojos[a], los deseó con pasión y envió mensajeros a ellos en Caldea[b].
  rationale: Se reemplaza 'Al ver sus ojos' por 'A la vista de sus ojos' para reflejar más fielmente la formulación explícita del hebreo sin introducir la ambigüedad española de que ella vio los ojos de otros. Se intensifica עגב con 'los deseó con pasión', que conserva el matiz erótico mejor que 'se apasionó por'. También se ajusta el cierre a 'a ellos en Caldea' para una sintaxis española más clara, manteniendo en nota la alternativa direccional documentada.
