translation:
  language: es
  text: Que no haya batalla[a] entre nosotros. Yo vendré con pocos hombres, para ver vuestros rostros[b] en paz[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Batalla» traduce μάχη y conserva el tono militar del pasaje; «combate» o «lucha» también serían posibles, pero menos específicos aquí.
    reason: lexical_alternative
  - marker: b
    text: «Rostros» retiene la imagen literal de τὰ πρόσωπα. En español podría entenderse también como «presencia», pero la formulación concreta es más cercana al griego.
    reason: lexical_alternative
  - marker: c
    text: «En paz» sigue de cerca μετ’ εἰρήνης y expresa un encuentro sin hostilidad; también podría verterse «pacientemente» solo de manera incorrecta, o «en amistad» con un matiz más interpretativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ ἔστω
  english_pob_choice: Let there be no
  chosen_spanish: Que no haya
  alternatives_spanish:
  - No haya
  - Que no exista
  lexicon: BDAG
  rationale: La construcción prohibitiva se vierte de forma natural en español con un subjuntivo exhortativo. «Que no haya» conserva la fuerza directiva sin sonar forzado.
- source_word: μάχη
  english_pob_choice: battle
  chosen_spanish: batalla
  alternatives_spanish:
  - combate
  - lucha
  - conflicto
  lexicon: BDAG
  rationale: En el contexto militar de 1 Macabeos, «batalla» comunica bien el sentido de enfrentamiento armado. «Combate» o «lucha» serían posibles, pero menos precisos para el registro narrativo aquí.
- source_word: ἀνὰ μέσον ἐμοῦ καὶ ὑμῶν
  english_pob_choice: between me and you
  chosen_spanish: entre nosotros
  alternatives_spanish:
  - entre mí y vosotros
  - entre mí y ustedes
  lexicon: BDAG
  rationale: El griego distingue entre el hablante singular y los destinatarios; en español, «entre nosotros» preserva la relación bilateral de manera más fluida. Se evita una formulación excesivamente literal que sonaría menos natural.
- source_word: ἥξω
  english_pob_choice: I will come
  chosen_spanish: vendré
  alternatives_spanish:
  - iré
  - llegaré
  lexicon: BDAG
  rationale: El futuro de ἥκω expresa venir/llegar. «Vendré» sigue la perspectiva del hablante y es la opción más natural en español.
- source_word: ἐν ἀνδράσιν ὀλίγοις
  english_pob_choice: with a few men
  chosen_spanish: con pocos hombres
  alternatives_spanish:
  - con unos pocos hombres
  - acompañado de pocos hombres
  - con un pequeño grupo de hombres
  lexicon: BDAG
  rationale: Aunque el griego usa ἐν, el valor contextual es de acompañamiento. «Con pocos hombres» reproduce esa idea con naturalidad. Se conserva «hombres» porque el contexto es de séquito masculino armado.
- source_word: ἵνα ἴδω
  english_pob_choice: so that I may see
  chosen_spanish: para ver
  alternatives_spanish:
  - para que yo vea
  - a fin de ver
  lexicon: BDAG
  rationale: La cláusula expresa propósito. En español, «para ver» es una equivalente natural y concisa; mantiene la finalidad sin añadir dureza innecesaria.
- source_word: ὑμῶν τὰ πρόσωπα
  english_pob_choice: your faces
  chosen_spanish: vuestros rostros
  alternatives_spanish:
  - vuestras caras
  - vosotros en persona
  - vuestra presencia
  lexicon: BDAG
  rationale: Se conserva la imagen literal de «rostros» para reflejar el griego y mantener la concreción idiomática de un encuentro personal. «Rostros» suena más digno que «caras» en este registro.
- source_word: μετ’ εἰρήνης
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - con paz
  - en amistad
  lexicon: BDAG
  rationale: La expresión indica un encuentro sin hostilidad. «En paz» es la forma más directa y natural en español, y mantiene el matiz relacional del griego.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa presentan alta concordancia y no requieren revisión textual adicional; se ha mantenido la estructura semántica principal sin introducir cambios interpretativos.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; este versículo no contiene el nombre divino.
  - Se mantiene un registro sobrio y bíblico, evitando calcos rígidos cuando el español pide una formulación más natural.
  - Se preserva la imagen concreta de «rostros» por corresponder al griego y por ser idiomática en un marco de encuentro personal.
