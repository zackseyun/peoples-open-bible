  source_alignment_summary: 'El borrador sigue bien el hebreo y el paralelo griego en las dos mitades del versículo: mantiene el sentido de קנא como celos maritales, conserva la imagen de אֵשֶׁת חֵיקֶךָ, y refleja la advertencia de פן con ''no sea que''. Sin embargo, en español ''la esposa de tu seno'' suena poco natural y puede sugerir una relación filial o una imagen corporal extraña; conviene una formulación idiomática que preserve la metáfora de intimidad. Además, la nota c contradice el expediente inglés: el POB inglés decidió hacer explícita la idea de instrucción malvada, mientras el borrador español dice que el texto principal conserva solo la forma breve del hebreo.'
