id: 1JN.1.1
reference: 1 John 1:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ὃ ἦν ἀπ’ ἀρχῆς, ὃ ἀκηκόαμεν, ὃ ἑωράκαμεν τοῖς ὀφθαλμοῖς ἡμῶν, ὃ ἐθεασάμεθα καὶ αἱ χεῖρες ἡμῶν ἐψηλάφησαν, περὶ τοῦ λόγου τῆς ζωῆς—
base_translation:
  language: en
  yaml_path: translation/nt/1_john/001/001.yaml
  text: What was from the beginning[a], what we have heard, what we have seen with our eyes, what we looked upon and our hands have touched[b], concerning the word of life—
  footnotes:
  - marker: a
    text: Or 'That which was from the beginning.' The Greek uses a neuter relative pronoun, which may point broadly to the apostolic witness concerning the Son rather than naming him directly as 'he.'
    reason: alternative_reading
  - marker: b
    text: Or 'the Word of life.' The phrase may refer personally to the Son, in deliberate resonance with John 1:1, or to the life-giving message concerning him.
    reason: lexical_alternative
translation:
  language: ko
  text: 태초부터 계셨던 것, 우리가 들었던 것, 우리 눈으로 보았던 것, 우리가 바라보았고 우리 손으로 만져 보았던 것, 곧 생명의 말씀[a]에 관하여—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「생명의 말씀이신 분」. 헬라어 λόγος τῆς ζωῆς는 인격적으로 아들(요한복음 1:1의 울림)을 가리킬 수도 있고, 그분에 관한 생명을 주는 메시지를 가리킬 수도 있다. 본문은 중성 관계대명사(Ὃ)로 시작하므로 명시적으로 「분」으로 한정하지 않고 모호성을 살린다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὃ … ἀπ’ ἀρχῆς
  english_pob_choice: What was from the beginning
  chosen_korean: 태초부터 계셨던 것
  alternatives_korean:
  - 처음부터 있었던 것
  - 태초부터 있었던 분
  lexicon: BDAG
  rationale: 중성 관계대명사 Ὃ는 인격적 「그분」으로 한정하지 않고 사도적 증언의 총체를 가리킨다. 한국어 「것」으로 중성성을 보존하되, 동사는 「계셨던」으로 옮겨 신적 존재의 무게를 살린다.
- source_word: ἀκηκόαμεν / ἑωράκαμεν / ἐθεασάμεθα / ἐψηλάφησαν
  english_pob_choice: we have heard / seen / looked upon / touched
  chosen_korean: 들었던 / 보았던 / 바라보았고 / 만져 보았던
  alternatives_korean:
  - 체험한
  lexicon: BDAG
  rationale: 현재완료 4중 누적(들음·봄·응시·만짐)으로 점층되는 증언의 무게를 한국어 과거 관형형 「-던」으로 보존한다. 헬라어의 ψηλαφάω(만져 봄)는 육화의 물리적 증언을 강조하므로 「만져 보았던」으로 옮긴다.
- source_word: λόγου τῆς ζωῆς
  english_pob_choice: the word of life
  chosen_korean: 생명의 말씀
  alternatives_korean:
  - 생명에 관한 말씀
  - 생명이신 말씀
  lexicon: BDAG
  rationale: λόγος는 「말씀」으로 옮겨 요한복음 1:1의 울림을 보존한다. 「생명의」 속격은 동격적(생명이신 말씀)일 수도 목적격적(생명에 관한 말씀)일 수도 있다 — 모호성을 각주로 둔다.
theological_decisions:
- issue: 중성 관계대명사와 λόγος의 지시 대상
  chosen_reading: 중성 「것」으로 옮기고 「말씀」을 대문자화하지 않는다
  alternative_readings:
  - 「태초부터 계셨던 분」으로 인격화
  - 「생명의 말씀이신 분」으로 명시
  rationale: 헬라어 본문은 중성 관계대명사를 쓰고 있으며 「말씀」의 대문자화도 본문에 표지되어 있지 않다. 영어 POB가 그러하듯 본문의 형식을 보존하여 신학적 긴장을 해소하지 않는다 — 인격적 지시(아들)와 선포된 메시지의 의미가 함께 살아 있도록 한다.
  doctrine_reference: DOCTRINE.md §5 — preserve theological tension
