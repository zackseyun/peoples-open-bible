translation:
  language: es
  text: y las aguas de Jarkón[a] y de Rakkón, con el territorio[b] frente a Jope.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo también puede entenderse como el nombre de lugar 'Me-jarkón' en vez de la frase transparente 'las aguas de Jarkón'.
    reason: lexical_alternative
  - marker: b
    text: O 'el límite' o 'la frontera' frente a Jope.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מֵי
  english_pob_choice: and the waters of
  chosen_spanish: y las aguas de
  alternatives_spanish:
  - y de las aguas de
  - y el manantial de
  lexicon: HALOT
  rationale: La forma hebrea se entiende mejor como el constructo de 'aguas', no como un simple 'desde'. En español, 'las aguas de' conserva la referencia a una corriente o curso de agua asociado al topónimo sin forzar una transliteración opaca.
- source_word: הַיַּרְק֖וֹן
  english_pob_choice: Jarkon
  chosen_spanish: Jarkón
  alternatives_spanish:
  - el Jarkón
  - Jarquón
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera en español como 'Jarkón' para mantener cercanía fonética y claridad bíblica. No se expresa con artículo en el texto principal, siguiendo el uso normal de topónimos.
- source_word: וְ/הָֽ/רַקּ֑וֹן
  english_pob_choice: and Rakkon
  chosen_spanish: y de Rakkón
  alternatives_spanish:
  - y Rakkón
  - y del Rakkón
  lexicon: HALOT
  rationale: Se conserva el segundo topónimo como nombre propio. El 'de' español sigue naturalmente la serie 'las aguas de ... y de ...' sin introducir una lectura distinta.
- source_word: עִֽם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  - incluyendo
  lexicon: HALOT
  rationale: '''Con'' reproduce el vínculo de acompañamiento o adición entre la mención de los lugares y la cláusula territorial siguiente.'
- source_word: הַ/גְּב֖וּל
  english_pob_choice: the territory
  chosen_spanish: el territorio
  alternatives_spanish:
  - el borde
  - la frontera
  - el límite
  lexicon: HALOT
  rationale: Aunque גְּבוּל puede significar 'límite', 'frontera' o 'territorio', aquí el contexto topográfico favorece una zona/distrito asociado a un límite. 'Territorio' evita una rigidez excesiva y sigue la decisión inglesa auditada.
- source_word: מ֥וּל
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - opuesto a
  - enfrente de
  - delante de
  lexicon: HALOT
  rationale: En español, 'frente a' comunica bien la relación espacial de correspondencia con Jope. Conserva la idea de ubicación relativa sin sonar demasiado abstracta.
- source_word: יָפֽוֹ
  english_pob_choice: Joppa
  chosen_spanish: Jope
  alternatives_spanish:
  - Jaffa
  - Joppa
  lexicon: HALOT
  rationale: '''Jope'' es la forma bíblica tradicional en español y corresponde al topónimo conocido en la literatura bíblica. Se usa por inteligibilidad y porque evita una forma modernizada que cambiaría el registro del texto.'
translation_notes:
  revision_awareness: 'El texto inglés POB opta por una equivalencia óptima con nota de alternativa lexical para ''the waters of Jarkon'' frente a ''Me-jarkon'', y conserva ''territory'' con nota alternativa para ''border/boundary''. Esta versión española mantiene esas dos tensiones sin borrarlas: traduce de manera transparente, pero deja indicada la posible lectura topográfica tradicional y la ambigüedad de גְּבוּל.'
  spanish_consistency_notes:
  - 'Se mantiene la transliteración de topónimos con acento gráfico español: Jarkón, Rakkón.'
  - Se evita 'SEÑOR' u otras sustituciones teológicas, porque el versículo no contiene referencias divinas.
  - '''Jope'' se usa como forma bíblica española para יָפוֹ, coherente con el registro del pasaje.'
  - Las notas al pie preservan la alternativa lexical sin convertirla en paráfrasis del texto principal.
