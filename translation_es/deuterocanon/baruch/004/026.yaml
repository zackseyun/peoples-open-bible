translation:
  language: es
  text: Mis consentidos[a] recorrieron caminos ásperos; fueron llevados como un rebaño arrebatado por enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mis delicados» o «Mis tiernos». El término griego señala a quienes fueron criados en suavidad o comodidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ τρυφεροί μου
  english_pob_choice: My pampered ones
  chosen_spanish: Mis consentidos
  alternatives_spanish:
  - Mis delicados
  - Mis tiernos
  - Mis mimados
  lexicon: LSJ
  rationale: τρυφερός puede indicar delicadeza, suavidad o crianza en comodidad; en este lamento el contraste con el sufrimiento presente es central. En español, «consentidos» conserva mejor la idea de haber sido criados en comodidad o trato delicado, sin sonar tan técnico o tan ambiguo como «tiernos».
- source_word: ἐπορεύθησαν
  english_pob_choice: traveled
  chosen_spanish: caminaron
  alternatives_spanish:
  - fueron
  - viajaron
  - anduvieron
  lexicon: LSJ
  rationale: El aoristo de πορεύομαι expresa ir o desplazarse. «Caminaron» funciona de manera natural con «caminos ásperos» y mantiene una imagen concreta de desplazamiento, sin añadir una interpretación excesiva.
- source_word: ὁδοὺς τραχείας
  english_pob_choice: rough roads
  chosen_spanish: caminos ásperos
  alternatives_spanish:
  - caminos duros
  - sendas ásperas
  - rutas escabrosas
  lexicon: LSJ
  rationale: ὁδός es «camino» y τραχύς significa áspero, áspero/rugoso o duro. «Caminos ásperos» preserva la concreción del original y sugiere dificultad física y dolorosa en español idiomático.
- source_word: ἤρθησαν
  english_pob_choice: were carried off
  chosen_spanish: fueron llevados
  alternatives_spanish:
  - fueron arrebatados
  - fueron sacados
  - fueron trasladados
  lexicon: LSJ
  rationale: En este contexto pasivo, αἴρω no es un simple «elevar», sino una remoción forzosa. «Fueron llevados» mantiene la pasividad del sujeto; la violencia del acto queda reforzada por la comparación siguiente con un rebaño arrebatado.
- source_word: ὡς ποίμνιον
  english_pob_choice: like a flock
  chosen_spanish: como un rebaño
  alternatives_spanish:
  - como un rebaño pequeño
  - como un hato
  - como un grupo de ovejas
  lexicon: LSJ
  rationale: ποίημνιον denota un rebaño o pequeño rebaño. En español, «rebaño» es la equivalencia más natural y mantiene la imagen pastoral sin forzar el diminutivo.
- source_word: ἡρπασμένον
  english_pob_choice: seized
  chosen_spanish: arrebatado
  alternatives_spanish:
  - robado
  - secuestrado
  - asaltado
  lexicon: LSJ
  rationale: De ἁρπάζω, «arrebatado» comunica mejor la súbita captura violenta que «seized» en español. Además, enlaza bien con la imagen de seres tomados por la fuerza.
- source_word: ὑπὸ ἐχθρῶν
  english_pob_choice: by enemies
  chosen_spanish: por enemigos
  alternatives_spanish:
  - por los enemigos
  - por adversarios
  - por hostiles
  lexicon: LSJ
  rationale: El plural ἐχθρῶν es directo y se traduce naturalmente con «enemigos». Se conserva el plural para no estrechar el sentido del texto griego.
theological_decisions:
- issue: Imagen del rebaño y el sentido de exilio/captura
  english_pob_reading: The verse depicts the speaker's people/children as vulnerable exiles forcibly removed, using a simile of a flock seized by enemies.
  chosen_spanish_reading: El versículo presenta a los suyos como vulnerables y forzosamente desplazados, mediante la comparación con un rebaño arrebatado por enemigos.
  alternative_spanish_readings:
  - El versículo podría leerse más generalmente como una imagen de sufrimiento, sin precisar destierro ni captura.
  - La imagen podría referirse solo a pérdida o desamparo, sin implicar una remoción violenta concreta.
  rationale: El griego ofrece una comparación, no una afirmación doctrinal desarrollada. La traducción debe conservar la metáfora de desplazamiento violento sin resolverla en una explicación más específica que el texto no exige.
  doctrine_reference: Preservar la tensión metafórica sin sobreinterpretar.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego de Baruc 4:26 y el criterio óptimo-equiparativo del registro inglés: mantiene el contraste entre la vida suave anterior y el desplazamiento violento, sin añadir contenido doctrinal ni suavizar la imagen de captura. No se requirieron revisiones adicionales según el historial de auditoría.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - Se traduce τρυφεροί con un matiz de crianza en comodidad («consentidos») para conservar la tensión léxica documentada por el audit trail.
  - «Rebaño» preserva la imagen pastoral sin borrar el tono de vulnerabilidad del pasaje.
  - «Arrebatado» refuerza la violencia implícita en ἁρπάζω y armoniza con la comparación final.
