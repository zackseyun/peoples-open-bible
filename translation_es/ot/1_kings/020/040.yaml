base_translation:
  language: en
  yaml_path: translation/ot/1_kings/020/040.yaml
  text: And as your servant was busy here and there[a], he was gone. Then the king of Israel said to him, “So shall your judgment be[c][b]; you yourself have decided it.”
  footnotes:
  - marker: a
    text: Or “was doing this and that.” The Hebrew idiom means being occupied in various directions or tasks.
    reason: lexical_alternative
  - marker: b
    text: Literally, “and he was not,” meaning the man under guard was no longer present.
    reason: lexical_alternative
  - marker: c
    text: Or “your sentence” / “your verdict”; the line means the king accepts the speaker’s own stated standard of judgment against him.
    reason: lexical_alternative
