translation:
  language: es
  text: 'Cuando Saúl volvió de perseguir a los filisteos, le dijeron, diciendo: «He aquí, David está en el desierto de En-gedi».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Y sucedió que cuando
  - Ahora bien, cuando
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce una circunstancia temporal. «Cuando» conserva la función y suena natural en español moderno sin cargar la frase.
- source_word: שָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - retornó
  lexicon: HALOT
  rationale: En contexto, el verbo indica que Saúl regresó de una campaña de persecución militar. «Volvió» transmite bien ese regreso en español común y digno.
- source_word: מֵאַחֲרֵי פְּלִשְׁתִּים
  english_pob_choice: from pursuing the Philistines
  chosen_spanish: de perseguir a los filisteos
  alternatives_spanish:
  - de ir tras los filisteos
  - de seguir a los filisteos
  lexicon: HALOT
  rationale: La expresión hebrea comunica una persecución hostil; en español, «de perseguir» preserva el sentido idiomático sin calco innecesario.
- source_word: וַיַּגִּדוּ לוֹ
  english_pob_choice: they told him
  chosen_spanish: le avisaron
  alternatives_spanish:
  - le dijeron
  - le informaron
  lexicon: HALOT
  rationale: El verbo puede significar decir, informar o notificar. Aquí «le avisaron» refleja una comunicación puntual y natural en narrativa.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y le dijeron
  - así
  lexicon: HALOT
  rationale: Mantiene la fórmula quotativa hebrea antes del discurso directo.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: «הִנֵּה» llama la atención sobre el reporte. «Mira» conserva esa fuerza deíctica en un español claro; «He aquí» sería más formal pero más arcaizante.
- source_word: בְּמִדְבַּר
  english_pob_choice: in the wilderness of
  chosen_spanish: en el desierto de
  alternatives_spanish:
  - en el desierto
  - en la región desierta de
  lexicon: HALOT
  rationale: Aunque מִדְבָּר puede ser «desierto» o «estepa/yermo», aquí el lugar se presenta como una zona despoblada. «Desierto» es una opción válida y transparente para el lector español.
- source_word: עֵין גֶּדִי
  english_pob_choice: En-gedi
  chosen_spanish: En-gadi
  alternatives_spanish:
  - En-gedi
  lexicon: Toponym convention
  rationale: Se conserva el nombre propio del lugar en transliteración adaptada al español bíblico. «En-gadi» evita una pronunciación demasiado anglicizada y mantiene la identificación del topónimo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «Look» por «Behold» para un registro más formal; en español se optó por «Mira», que conserva la fuerza de llamada sin sonar arcaico. El resto del verso se mantuvo en consonancia con el sentido narrativo y la alta concordancia del control cruzado.
  spanish_consistency_notes:
  - Se mantuvo la distinción narrativa simple sin añadir sujeto explícito innecesario.
  - Se preservó el topónimo como nombre propio transliterado en forma breve y reconocible.
  - No se introdujo una nota al pie porque no había una ambigüedad lexical que requiriera marcador anclado en el texto.
