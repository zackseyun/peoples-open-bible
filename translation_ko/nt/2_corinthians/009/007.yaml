  text: Each one should give as he has decided in his heart[a], not out of grief or compulsion[b], for God loves a cheerful giver.
translation:
  language: ko
  text: 각자 마음에 정한 대로 할 것이며, 슬픔으로나 억지로 하지 말아야 합니다. 하나님은 기쁘게 주는 사람을 사랑하시기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προῄρηται
  english_pob_choice: has decided
  chosen_korean: 정한 대로
  lexicon: BDAG
  rationale: 완료 중간태. 자신의 마음 속에서 미리 결단함.
  alternatives_korean:
  - 미리 결심한 대로
- source_word: ἀνάγκη
  english_pob_choice: compulsion
  chosen_korean: 억지로
  lexicon: BDAG
  rationale: 외부적 강요. 「억지로」가 자연스럽다.
  alternatives_korean:
  - 강요로
  - 필요로
- source_word: ἱλαρόν
  english_pob_choice: cheerful
  chosen_korean: 기쁘게 주는
  lexicon: BDAG
  rationale: 형용사 ἱλαρός는 「기쁘게, 즐거이」. 한국어 「기쁘게 주는 사람」이 가장 자연스럽고 본문의 가벼움·자발성을 잘 담는다.
  alternatives_korean:
  - 즐겁게 주는
  - 흔쾌히 주는
- source_word: δότην
  english_pob_choice: giver
  chosen_korean: 주는 사람
  lexicon: BDAG
  rationale: 명사 「주는 자」. 표준 등가어.
  alternatives_korean:
  - 베푸는 자
