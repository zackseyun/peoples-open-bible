revisions:
- from: No te negaré[a], oh disciplina instruida por la ley, ni te perdonaré[b], amada autocontrol.
  to: No te negaré[a], oh disciplina formada por la ley, ni te escatimaré[b], amado dominio propio.
  rationale: 'Se corrigen dos problemas principales: «te perdonaré» se reemplaza por «te escatimaré» para reflejar mejor φείσομαί, y «amada autocontrol» se sustituye por «amado dominio propio» para lograr concordancia gramatical y un registro más natural y digno. También se mejora «disciplina instruida por la ley» a «disciplina formada por la ley», que conserva la relación con νόμος sin sonar tan pasiva o extraña. Se mantienen el apóstrofe y la personificación exigidos por el griego y por la auditoría inglesa.'
