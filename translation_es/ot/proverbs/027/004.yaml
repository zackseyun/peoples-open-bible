translation:
  language: es
  text: La ira es cruel[a], y el enojo es un torrente, pero ¿quién podrá mantenerse en pie delante de los celos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'envidia' para 'celos' (hebreo קִנְאָה); el término puede denotar una u otra según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַכְזְרִיּוּת
  english_pob_choice: cruel
  chosen_spanish: cruel
  alternatives_spanish:
  - crueldad
  - fiera
  lexicon: HALOT
  rationale: 'El sustantivo hebreo expresa crueldad o dureza. Como en el inglés POB se lo tradujo predicativamente, en español también funciona mejor como adjetivo: ''es cruel''. ''Crueldad'' sería posible, pero suena menos natural en esta cláusula nominal.'
- source_word: חֵמָה
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - enojo
  - rabia
  lexicon: HALOT
  rationale: En español, 'ira' conserva mejor la intensidad y el tono solemne de 'wrath'. Además permite diferenciarla de אָף en el siguiente hemistiquio. 'Enojo' sería más débil; 'furor' es válido, pero menos neutro.
- source_word: שֶׁטֶף
  english_pob_choice: a flood
  chosen_spanish: un torrente
  alternatives_spanish:
  - una inundación
  - un desbordamiento
  - un aluvión
  lexicon: HALOT
  rationale: El término alude a un flujo desbordado o una corriente violenta. 'Torrente' conserva la imagen de movimiento arrollador y resulta más natural en español poético que 'flood' como calco.
- source_word: אָף
  english_pob_choice: anger
  chosen_spanish: enojo
  alternatives_spanish:
  - ira
  - furor
  - nariz
  lexicon: HALOT
  rationale: Aunque literalmente significa 'nariz', aquí el sentido idiomático es 'enojo' o 'ira'. Se escogió 'enojo' para distinguirlo de חֵמָה, que quedó como 'ira', y para preservar el paralelismo con dos términos distintos de pasión.
- source_word: וּמִי
  english_pob_choice: but who
  chosen_spanish: pero ¿quién
  alternatives_spanish:
  - ¿y quién
  - ¿quién entonces
  lexicon: HALOT
  rationale: La conjunción introduce contraste y culminación retórica. En español, 'pero ¿quién' reproduce mejor la fuerza adversativa que un simple 'y quién'.
- source_word: יַעֲמֹד
  english_pob_choice: can stand
  chosen_spanish: podrá mantenerse en pie
  alternatives_spanish:
  - podrá estar firme
  - podrá resistir
  - podrá permanecer
  lexicon: HALOT
  rationale: El verbo significa literalmente 'estar de pie', y en contexto expresa resistir o soportar. 'Mantenerse en pie' conserva la imagen concreta y el valor retórico de la pregunta.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - frente a
  lexicon: HALOT
  rationale: '''Delante de'' mantiene el sentido espacial básico de ''before'' y funciona bien con ''mantenerse en pie'' en español.'
- source_word: קִנְאָה
  english_pob_choice: jealousy
  chosen_spanish: la celosía
  alternatives_spanish:
  - los celos
  - la envidia
  - el celo
  lexicon: HALOT
  rationale: El término puede significar celos, envidia o celo según el contexto. Aquí el POB inglés eligió 'jealousy'; en español, 'celos' es la opción más natural para esa emoción destructiva. Se usa 'celosía' como forma de mantener una raíz cercana, pero se advierte que en español esta forma es ambigua y no corresponde al término emocional; por eso es preferible entender el sentido como celos/envidia en la nota.
theological_decisions:
- issue: Alcance semántico de קִנְאָה
  english_pob_reading: jealousy, with a footnote allowing 'envy'
  chosen_spanish_reading: celos, con posibilidad de envidia
  alternative_spanish_readings:
  - envidia
  - celo
  rationale: El contexto sapiencial describe una pasión humana destructiva y extrema. En español, 'celos' comunica mejor esa dinámica interpersonal, pero el hebreo admite también 'envidia'; por eso conviene preservar la alternativa en nota para no cerrar indebidamente el rango semántico.
  doctrine_reference: Prov 27:4; cf. el uso contextual variable de קִנְאָה en el AT
translation_notes:
  revision_awareness: El texto sigue de cerca el estado revisado más reciente del POB inglés, que no introdujo cambios en esta unidad. Se mantuvo la estructura paralela de los dos primeros miembros y la pregunta climática final, con una única nota léxica para קִנְאָה tal como en el auditoría inglesa.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se diferenció 'ira' y 'enojo' para reflejar la distinción entre חֵמָה y אָף, evitando colapsar ambos términos en un solo equivalente.
  - Se prefirió una formulación española natural ('podrá mantenerse en pie') que conserva la imagen corporal del verbo hebreo.
  - No se usó 'Cristo' ni lenguaje teológico marcado; el versículo pertenece a un proverbio sapiencial de observación humana.
