translation:
  language: es
  text: 'Y él dijo: «Sin duda volveré a ti por este tiempo el año que viene[a], y he aquí que Sara, tu esposa, tendrá un hijo». Y Sara estaba escuchando a la entrada de la tienda, detrás de él[b][c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «como el tiempo de la vida»; idiomáticamente, «por este tiempo el año que viene».'
    reason: lexical_alternative
  - marker: b
    text: 'O, más literalmente: «y él estaba detrás de él»; los pronombres hebreos son breves, y el sentido es que Sara estaba en la entrada de la tienda detrás del hablante.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «a la entrada de la tienda, y estaba detrás de él».'
    reason: previous_rendering
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Entonces dijo
  - Y dijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se vierte de forma simple y directa con «Y él dijo», manteniendo el flujo hebreo sin añadir identificación del hablante.
- source_word: שׁוֹב אָשׁוּב
  english_pob_choice: I will surely return
  chosen_spanish: Volveré sin falta
  alternatives_spanish:
  - Ciertamente volveré
  - Volveré de seguro
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + imperfecto intensifica la acción; «sin falta» reproduce en español la fuerza enfática con naturalidad y sin exagerar el matiz.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - a usted
  lexicon: HALOT
  rationale: El objeto de segunda persona masculina singular se traduce con «a ti»; el texto no exige formalidad ni introducir el nombre de Abraham.
- source_word: כָּעֵת חַיָּה
  english_pob_choice: about this time next year
  chosen_spanish: por este tiempo el año que viene
  alternatives_spanish:
  - como a esta sazón del año próximo
  - para esta misma época del año que viene
  lexicon: HALOT
  rationale: El hebreo es idiomático y en contexto señala el mismo momento de la estación siguiente. «Por este tiempo el año que viene» conserva el valor temporal natural para el lector hispano.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y mira bien
  lexicon: HALOT
  rationale: «He aquí» mantiene la fuerza deíctica y solemne del hebreo, compatible con el registro bíblico en español.
- source_word: בֵן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un varón
  - un hijo varón
  lexicon: HALOT
  rationale: En español actual, la promesa de nacimiento se expresa de forma más natural como «tendrá un hijo». Aunque el hebreo dice literalmente «un hijo», la construcción castellana evita dureza y mantiene el sentido.
- source_word: לְשָׂרָה אִשְׁתֶּךָ
  english_pob_choice: Sarah your wife will have a son
  chosen_spanish: Sara, tu esposa, tendrá un hijo
  alternatives_spanish:
  - Sara, tu mujer, tendrá un hijo
  - habrá para Sara, tu esposa, un hijo
  lexicon: HALOT
  rationale: La preposición ל expresa beneficio/posesión en la promesa de nacimiento; el español lo comunica con una estructura posesiva natural. Se conserva «Sara» y «tu esposa» sin añadir explicaciones.
- source_word: שָׂרָה שֹׁמַעַת
  english_pob_choice: Sarah was listening
  chosen_spanish: Sara estaba escuchando
  alternatives_spanish:
  - Sara escuchaba
  - Sara oía
  lexicon: HALOT
  rationale: El participio indica acción en curso; «estaba escuchando» reproduce ese aspecto durativo mejor que un pretérito simple.
- source_word: פֶּתַח הָאֹהֶל
  english_pob_choice: at the entrance of the tent
  chosen_spanish: a la entrada de la tienda
  alternatives_spanish:
  - a la entrada de la carpa
  - en la entrada de la tienda
  lexicon: HALOT
  rationale: «Ohel» puede traducirse por «tienda» en castellano bíblico contemporáneo; «entrada» conserva la imagen espacial de la frase constructa.
- source_word: וְהוּא אַחֲרָיו
  english_pob_choice: and it was behind him
  chosen_spanish: detrás de él
  alternatives_spanish:
  - y estaba detrás de él
  - y la entrada estaba detrás de él
  lexicon: HALOT
  rationale: La referencia pronominal es tersa en hebreo. En español, el sentido espacial se expresa con «detrás de él» sin forzar un antecedente implícito que el contexto ya hace claro.
theological_decisions:
- issue: Identidad del hablante en la primera cláusula
  english_pob_reading: Rendered simply as 'he' without specifying 'the LORD' or 'one of the men' in this verse.
  chosen_spanish_reading: «Y él dijo» sin identificar explícitamente al hablante.
  alternative_spanish_readings:
  - «Y Yahvé dijo»
  - «Y uno de los hombres dijo»
  rationale: El hebreo de este versículo no repite la identidad del hablante con un sustantivo explícito; mantener «él» preserva la tensión narrativa y evita resolver aquí una identificación que depende del contexto inmediato más amplio.
  doctrine_reference: Conservar la tensión literaria y narrativa del texto sin adelantar una identificación interpretativa.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que prefirió «at the entrance of the tent» por encima de «at the tent entrance», y conserva la solución discursiva compacta para el final de la escena. También mantiene la fuerza idiomática de כָּעֵת חַיָּה como referencia temporal del año siguiente, tal como quedó asentado en el audit trail.
  spanish_consistency_notes:
  - Se usa «Yahvé» en textos donde el hebreo explícitamente lo exige; aquí no aparece el tetragrámaton, así que no se introduce.
  - Se mantiene «Sara» y no «Sarai», conforme al nombre ya usado en este pasaje.
  - Se traduce וְהִנֵּה con «he aquí» por consistencia con el tono anunciativo de la POB en español.
  - Se evita «SEÑOR» como sustituto del nombre divino porque este versículo no contiene יהוה y el problema aquí es la identidad del hablante, no el reemplazo del tetragrámaton.
