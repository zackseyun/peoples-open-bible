id: EST.2.18
reference: Esther 2:18
source:
  edition: WLC
  text: וַ/יַּ֨עַשׂ הַ/מֶּ֜לֶךְ מִשְׁתֶּ֣ה גָד֗וֹל לְ/כָל שָׂרָי/ו֙ וַ/עֲבָדָ֔י/ו אֵ֖ת מִשְׁתֵּ֣ה אֶסְתֵּ֑ר וַ/הֲנָחָ֤ה לַ/מְּדִינוֹת֙ עָשָׂ֔ה וַ/יִּתֵּ֥ן מַשְׂאֵ֖ת כְּ/יַ֥ד הַ/מֶּֽלֶךְ־׃
translation:
  text: Then the king gave a great banquet for all his officials and servants—the banquet of Esther—and he granted relief to the provinces and gave gifts according to the king’s bounty[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he made a holiday for the provinces' or 'he granted remission to the provinces.' The Hebrew term can refer broadly to relief, rest, or remission.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'according to the hand of the king,' an idiom for generosity or measure fitting a king.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁתֶּה גָדוֹל
  chosen: a great banquet
  alternatives:
  - a great feast
  lexicon: HALOT
  rationale: מִשְׁתֶּה denotes a drinking feast or banquet; 'banquet' fits courtly context better than the broader 'feast.' גָדוֹל is straightforwardly 'great.'
- source_word: לְכָל שָׂרָיו וַעֲבָדָיו
  chosen: for all his officials and servants
  alternatives:
  - for all his princes and servants
  - for all his nobles and attendants
  lexicon: HALOT
  rationale: שָׂרִים in Persian court context refers to high officials/princes; 'officials' is clearer in modern English. עֲבָדִים literally 'servants,' here likely royal functionaries broadly; 'servants' preserves the lexical sense without over-specifying.
- source_word: אֵת מִשְׁתֵּה אֶסְתֵּר
  chosen: the banquet of Esther
  alternatives:
  - Esther's banquet
  - a banquet for Esther
  lexicon: HALOT
  rationale: The construct phrase most naturally means 'the banquet of Esther.' In English this can denote a banquet associated with Esther, likely in her honor. 'Esther's banquet' is possible, but the more literal phrasing preserves the Hebrew relation while remaining readable.
- source_word: וַהֲנָחָה לַמְּדִינוֹת עָשָׂה
  chosen: he granted relief to the provinces
  alternatives:
  - he made a holiday for the provinces
  - he gave remission to the provinces
  lexicon: HALOT
  rationale: הֲנָחָה can denote rest, relief, or remission. In this royal-celebration context it likely refers to a tax remission or public holiday-like relief. 'Granted relief' preserves the semantic breadth without forcing a narrower interpretation.
- source_word: מַשְׂאֵת
  chosen: gifts
  alternatives:
  - presents
  - portions
  lexicon: HALOT
  rationale: In this context מַשְׂאֵת refers to something bestowed by the king, likely gifts or largesse. 'Gifts' is idiomatic and broad enough to cover the likely sense.
- source_word: כְּיַד הַמֶּלֶךְ
  chosen: in keeping with the king’s bounty
  alternatives:
  - according to the king's hand
  - as befits the king
  - according to the king's means
  lexicon: HALOT
  rationale: Literally 'according to the hand of the king,' an idiom expressing measure commensurate with royal capacity or generosity. 'In keeping with the king’s bounty' conveys the idiomatic sense in natural English.
- source_word: וַיַּעַשׂ
  chosen: gave
  alternatives:
  - made
  - held
  lexicon: HALOT
  rationale: Although the verb is literally 'made/did,' English idiom for hosting a banquet is 'gave' or 'held.' 'Gave' reads naturally and matches the event-hosting sense.
