  text: μείνατε ἐν ἐμοί, κἀγὼ ἐν ὑμῖν. καθὼς τὸ κλῆμα οὐ δύναται καρπὸν φέρειν ἀφ’ ἑαυτοῦ ἐὰν μὴ ⸀μένῃ ἐν τῇ ἀμπέλῳ, οὕτως οὐδὲ ὑμεῖς ἐὰν μὴ ἐν ἐμοὶ ⸀μένητε.
base_translation:
  language: en
  yaml_path: translation/nt/john/015/004.yaml
  text: Remain in me[a], and I in you. Just as the branch is not able to bear fruit by itself unless it remains in the vine, so neither can you unless you remain in me.
  footnotes:
  - marker: a
    text: Or 'Abide in me, and I in you.' The verb μένω can also be rendered 'abide,' a traditional English rendering that emphasizes ongoing dwelling or continuance.
    reason: lexical_alternative
translation:
  language: ko
  text: 내 안에 거하십시오. 그러면 나도 여러분 안에 거하겠습니다. 가지가 포도나무에 거하지 않으면 스스로 열매를 맺을 수 없는 것처럼, 여러분도 내 안에 거하지 않으면 열매를 맺을 수 없습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '헬라어 μένω는 「머무르다·지속하다」의 뜻으로, 요한복음의 핵심 동사 중 하나이며 본 단락(15:1-11)에 10회 반복된다. 한국어 「거하다」로 일관되게 옮긴다.'
    reason: lexical_alternative
