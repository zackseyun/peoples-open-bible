translation:
  language: es
  text: Porque tú eres quien creó todas las cosas y gobierna sobre todo; tú eres un soberano justo[a], y juzgas a los que actúan con insolencia y arrogancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un gobernante justo». El griego puede entenderse de modo que δυνάστης sea «gobernante» o «soberano», y δίκαιος conserva el sentido de rectitud y justicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺ γὰρ εἶ
  english_pob_choice: For you are
  chosen_spanish: Porque tú eres
  alternatives_spanish:
  - Porque tú mismo eres
  - Pues tú eres
  lexicon: LSJ
  rationale: γάρ introduce una explicación o fundamento; en español, «Porque» conserva esa relación causal/explicativa. El énfasis de σὺ queda bien expresado con el pronombre explícito «tú» sin volver la frase pesada.
- source_word: ὁ κτίσας
  english_pob_choice: the one who created
  chosen_spanish: el que creó
  alternatives_spanish:
  - el creador de
  - el que hizo
  lexicon: LSJ
  rationale: El participio aoristo con artículo funciona sustantivamente. «El que creó» conserva el valor verbal y la relación directa con Dios, evitando convertirlo demasiado pronto en un título nominal.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - el universo entero
  lexicon: LSJ
  rationale: La expresión abarca la totalidad de lo creado. «Todas las cosas» es una equivalencia natural y solemne en español, fiel al alcance comprehensivo del griego.
- source_word: τῶν ὅλων ἐπικρατῶν
  english_pob_choice: rules over all
  chosen_spanish: ejerce dominio sobre todo
  alternatives_spanish:
  - reina sobre todo
  - manda sobre todo
  - es soberano sobre todo
  lexicon: LSJ
  rationale: ἐπικρατέω expresa ejercer poder o dominio. «Ejerce dominio sobre todo» conserva la fuerza activa del verbo sin imponer un vocabulario posterior innecesario; «reina sobre todo» también sería posible, pero puede sonar más monárquico que el griego aquí.
- source_word: δυνάστης
  english_pob_choice: sovereign
  chosen_spanish: un soberano
  alternatives_spanish:
  - un gobernante
  - un potentado
  - un señor poderoso
  lexicon: LSJ
  rationale: δυνάστης designa a quien detenta poder o dominio. «Soberano» comunica autoridad suprema en un registro digno; se mantiene el matiz de poder legítimo que el inglés POB expresó con «sovereign».
- source_word: δίκαιος
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justo y recto
  lexicon: LSJ
  rationale: Aquí δίκαιος califica el carácter del gobernante en el marco del juicio. «Justo» preserva el doble trasfondo de rectitud moral y equidad judicial; el inglés POB dejó abierta la alternativa «just», y el español la refleja de forma natural.
- source_word: τοὺς ὕβρει καὶ ἀγερωχίᾳ τι πράσσοντας
  english_pob_choice: those who act with insolence and arrogance
  chosen_spanish: a los que actúan con insolencia y arrogancia
  alternatives_spanish:
  - a los que obran con insolencia y soberbia
  - a los que se conducen con insolencia y altivez
  lexicon: LSJ
  rationale: La construcción participial describe a personas que se comportan de cierto modo; «actúan con» transmite bien esa acción continuada. «Insolencia» refleja ὕβρις en su tono de desprecio abusivo, y «arrogancia» mantiene ἀγερωχία como soberbia altanera.
- source_word: κρίνεις
  english_pob_choice: you judge
  chosen_spanish: juzgas
  alternatives_spanish:
  - condenas
  - dictas juicio
  lexicon: LSJ
  rationale: κρίνω aquí conserva su sentido judicial amplio. «Juzgas» reproduce ese valor sin añadir más de lo que el griego dice explícitamente.
theological_decisions:
- issue: δίκαιος aplicado a Dios en un contexto de gobierno y juicio
  english_pob_reading: righteous / just sovereign
  chosen_spanish_reading: soberano justo
  alternative_spanish_readings:
  - soberano recto
  - gobernante justo
  rationale: 'El texto une soberanía y juicio moral. «Soberano justo» mantiene ambas dimensiones: autoridad real y rectitud moral. Se evita una paráfrasis que diluya la tensión entre gobierno y juicio.'
  doctrine_reference: 'DOCTRINE.md: δικαιοσύνη / justica-righteousness default rationale (justo/recto según contexto)'
- issue: ἐπικρατῶν y el alcance del dominio divino
  english_pob_reading: rules over all
  chosen_spanish_reading: ejerce dominio sobre todo
  alternative_spanish_readings:
  - rige sobre todo
  - es soberano sobre todo
  rationale: La frase griega destaca dominio efectivo sobre la totalidad. «Ejerce dominio» mantiene el matiz verbal de control activo y evita una traducción demasiado estática.
  doctrine_reference: 'DOCTRINE.md: divine sovereignty / rule terminology'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de Swete y refleja el auditorio inglés de la POB: se conservan la explicación causal de γάρ, el participio sustantivado de κτίσας, el alcance total de τὰ πάντα y la fuerza judicial de κρίνεις. Se incorporó una decisión explícita para δίκαιος en la línea del audit trail inglés, donde «righteous» y «just» permanecen como alternativas válidas.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el nombre divino está presente explícitamente; aquí el pasaje habla directamente a Dios sin el tetragrámaton.
  - Se prefirió «soberano» para δυνάστης por coherencia con el audit trail, pero la nota preserva la alternativa «gobernante» si el contexto editorial lo requiere.
  - Se mantuvo «insolencia y arrogancia» para reflejar la pareja semántica ὕβρει / ἀγερωχίᾳ sin suavizarla.
