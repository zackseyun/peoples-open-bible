translation:
  language: es
  text: junto con todo su reinado y su poder, y los tiempos que pasaron sobre él[a], y sobre Israel, y sobre todos los reinos de las tierras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que vinieron sobre él». El hebreo dice literalmente «que pasaron sobre él».
    reason: lexical_alternative
  - marker: b
    text: O «todos los reinos de los países». El hebreo usa el plural «tierras», probablemente en referencia a territorios o naciones circundantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִם
  english_pob_choice: along with
  chosen_spanish: junto con
  alternatives_spanish:
  - con
  lexicon: HALOT
  rationale: Expresa de manera natural en español la relación de acompañamiento del cierre del registro, manteniendo el valor asociativo del hebreo sin forzar una glosa más pesada.
- source_word: מַלְכוּתוֹ
  english_pob_choice: his reign
  chosen_spanish: su reinado
  alternatives_spanish:
  - su reino
  - su realeza
  lexicon: HALOT
  rationale: Como en el inglés POB, el contexto es una síntesis de la vida y gobierno de David; 'reinado' conserva el sentido durativo/abstracto mejor que el territorio de 'reino'.
- source_word: גְבוּרָתוֹ
  english_pob_choice: his might
  chosen_spanish: su poder
  alternatives_spanish:
  - su fuerza
  - su valentía
  - sus hazañas poderosas
  lexicon: HALOT
  rationale: '''Poder'' comunica bien la fuerza y capacidad militar/regia del sustantivo. ''Fuerza'' también sería posible, pero ''poder'' suena más amplio y adecuado al paralelo con ''reinado''.'
- source_word: הָעִתִּים
  english_pob_choice: the times
  chosen_spanish: los tiempos
  alternatives_spanish:
  - las circunstancias
  - los períodos
  lexicon: HALOT
  rationale: La forma plural se conserva de manera directa. 'Tiempos' mantiene la amplitud semántica de períodos/circunstancias de la vida de David.
- source_word: אֲשֶׁר עָבְרוּ עָלָיו
  english_pob_choice: that passed over him
  chosen_spanish: que pasaron sobre él
  alternatives_spanish:
  - que vinieron sobre él
  - que le sobrevinieron
  - que cayeron sobre él
  lexicon: HALOT
  rationale: Se preserva la imagen idiomática del hebreo, como hizo el POB en inglés, porque es transparente en español y evita perder la metáfora del 'pasar sobre'.
- source_word: וְעַל יִשְׂרָאֵל
  english_pob_choice: and over Israel
  chosen_spanish: y sobre Israel
  alternatives_spanish:
  - y acerca de Israel
  - y respecto de Israel
  lexicon: HALOT
  rationale: Mantiene el paralelismo de la preposición repetida ('sobre él', 'sobre Israel', 'sobre todos...'), conservando el ritmo y la relación de incidencia de los acontecimientos.
- source_word: כָּל מַמְלְכֹת הָאֲרָצוֹת
  english_pob_choice: all the kingdoms of the lands
  chosen_spanish: todos los reinos de las tierras
  alternatives_spanish:
  - todos los reinos de los países
  - todos los reinos de la tierra
  lexicon: HALOT
  rationale: Se conserva el plural hebreo 'tierras', como en el POB inglés, para reflejar la referencia a territorios/naciones circundantes y no universalizar indebidamente la expresión.
theological_decisions:
- issue: Cómo renderizar el cierre histórico que enumera el reinado, el poder y los tiempos de David sin añadir interpretación
  english_pob_reading: A concise summary of David's reign, might, and the times that passed over him and over Israel and over all the kingdoms of the lands.
  chosen_spanish_reading: 'Una síntesis histórica: su reinado, su poder y los tiempos que le sobrevinieron/pasaron sobre él, sobre Israel y sobre los reinos vecinos.'
  alternative_spanish_readings:
  - Una referencia a sus hechos poderosos
  - Una alusión a las circunstancias que experimentó
  rationale: No se introduce un sentido teológico nuevo; se conserva la función de colofón histórico del versículo. La expresión 'pasaron sobre él' mantiene la tensión idiomática del hebreo sin resolverla de forma interpretativa.
  doctrine_reference: 2 Samuel 23:1; 1 Crónicas 29:29-30
- issue: Si traducir 'lands' como 'tierras' o suavizarlo como 'países'
  english_pob_reading: all the kingdoms of the lands
  chosen_spanish_reading: todos los reinos de las tierras
  alternative_spanish_readings:
  - todos los reinos de los países
  - todos los reinos de la tierra
  rationale: '''Tierras'' reproduce el plural hebreo y evita un alcance más global que no está en el texto. También conserva la posibilidad de referirse a territorios/naciones circundantes, como indica el audit trail inglés.'
  doctrine_reference: Salmo 72:11; 1 Crónicas 29:30
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés y no requiere cambios de revisión sustantivos. Se mantuvo la imagen idiomática de 'pasar sobre' y el plural 'tierras', siguiendo las decisiones léxicas ya validadas en el texto base.
  spanish_consistency_notes:
  - Se usa 'reinado' para מַלְכוּת, coherente con el valor abstracto/durativo del contexto.
  - Se evita 'SEÑOR' o 'Yahvé' porque el versículo no contiene el nombre divino.
  - Se mantiene 'sobre' en la serie paralela para reflejar la estructura repetitiva del hebreo.
  - '''Tierras'' conserva el plural del original y la ambigüedad geográfica del cierre.'
