revisions:
- from: Y traerás la ofrenda de cereal[a], que se hace de estas cosas para Yahvé, y la presentará al sacerdote, y la acercará al altar.
  to: Y traerás la ofrenda de cereal[a], que se hace con estas cosas, para Yahvé[b]; y el sacerdote la presentará al sacerdote, y la acercará al altar.
  rationale: 'Se revisa para corregir el problema principal de claridad y fidelidad en español: el cambio de sujeto debe explicitarse. También se añade la nota preposicional que preserva la alternativa documentada para לַיהוָה. Se mejora levemente la naturalidad con «con estas cosas».'
