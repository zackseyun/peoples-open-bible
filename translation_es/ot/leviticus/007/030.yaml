  text: יָדָ֣י/ו תְּבִיאֶ֔ינָה אֵ֖ת אִשֵּׁ֣י יְהוָ֑ה אֶת הַ/חֵ֤לֶב עַל הֶֽ/חָזֶה֙ יְבִיאֶ֔/נּוּ אֵ֣ת הֶ/חָזֶ֗ה לְ/הָנִ֥יף אֹת֛/וֹ תְּנוּפָ֖ה לִ/פְנֵ֥י יְהוָֽה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/007/030.yaml
  text: His own hands shall bring the food offerings of Yahweh; he shall bring the fat with the breast[a], that the breast may be waved as a wave offering before Yahweh.
  footnotes:
