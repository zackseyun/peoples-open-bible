    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y sucedió que
  alternatives_spanish:
  - Y aconteció que
  - Y fue que
  - Y ocurrió que
  lexicon: HALOT
  rationale: El hebreo usa la fórmula narrativa וַיְהִי, que introduce avance temporal. En español, 'Y sucedió que' conserva el valor de transición narrativa sin sonar tan rígido como una traducción literal palabra por palabra.
- source_word: מִקְצֵה
  english_pob_choice: at the end of
  chosen_spanish: al cabo de
  alternatives_spanish:
  - al final de
  - después de
  - al término de
  lexicon: HALOT
  rationale: La construcción marca el punto alcanzado tras transcurrir un período. 'Al cabo de' expresa de forma natural ese valor temporal en español.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: seven days
  chosen_spanish: siete días
  alternatives_spanish:
  - siete jornadas
  lexicon: HALOT
  rationale: La secuencia numérica es directa y no requiere expansión. 'Días' preserva el valor temporal básico del hebreo.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - la palabra de Yahweh
  - la palabra del SEÑOR
  - un mensaje de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética con 'la palabra de'. 'Palabra' conserva el carácter formal de la expresión hebrea, y 'Yahvé' sigue el criterio del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El nombre divino se vierte según la norma del proyecto en español como 'Yahvé', forma ya asentada y transparente para el lector hispanohablante.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - me
  lexicon: HALOT
  rationale: La preposición con sufijo pronominal se expresa de manera directa en español con 'a mí', manteniendo la dirección del habla divina hacia el profeta.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: El infinitivo introductorio se conserva con una forma verbal natural en español para introducir el discurso siguiente sin añadir contenido ajeno.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se sigue la decisión doctrinal del proyecto de no ocultar el Tetragrámaton tras una sustitución. En español, 'Yahvé' comunica el nombre propio del pacto con naturalidad y claridad.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula profética דְבַר יְהוָה
  english_pob_reading: the word of Yahweh came to me
  chosen_spanish_reading: la palabra de Yahvé vino a mí
  alternative_spanish_readings:
  - vino a mí una palabra de Yahvé
  - me vino palabra de Yahvé
  rationale: Se preserva la construcción profética tradicional sin diluirla en una paráfrasis demasiado libre. 'La palabra de Yahvé' mantiene el peso revelacional del hebreo.
  doctrine_reference: Uso profético estándar en el texto hebreo; ninguna tensión doctrinal adicional
translation_notes:
  revision_awareness: 'El texto inglés auditado fue revisado recientemente y no requirió cambios; se conservó la misma lectura semántica básica: fórmula narrativa + temporalidad cumplida + fórmula profética. La principal adaptación fue hacer explícita en español la norma del proyecto para el nombre divino como ''Yahvé''.'
  spanish_consistency_notes:
  - Se mantiene el tono profético formal y sobrio.
  - '''Yahvé'' se usa de manera consistente para יְהוָה, conforme a la política del proyecto.'
  - 'La puntuación introduce dos segmentos claros: marco temporal y llegada de la palabra divina.'
  - No se añadió contenido interpretativo ajeno al hebreo.
