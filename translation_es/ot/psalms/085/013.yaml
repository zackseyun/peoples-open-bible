translation:
  language: es
  text: En verdad[a], Yahvé dará lo que es bueno, y nuestra tierra dará su fruto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el bien» o «bienes buenos». La expresión hebrea es amplia y puede incluir tanto el bien moral como el material según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Indeed
  chosen_spanish: En verdad
  alternatives_spanish:
  - También
  - Ciertamente
  - Sí
  lexicon: HALOT
  rationale: גַּם funciona aquí como partícula enfática más que como simple adición. En español, «En verdad» comunica mejor la fuerza de énfasis y seguridad del contexto poético que un «También» meramente acumulativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: La convención del proyecto para יְהוָה es «Yahvé», transliteración reverente del nombre divino. Se evita la sustitución por un título como «el SEÑOR», y en español «Yahvé» es la forma preferida para mantener el nombre personal del pacto.
- source_word: יִתֵּן
  english_pob_choice: will give
  chosen_spanish: dará
  alternatives_spanish:
  - dará
  - va a dar
  - otorgará
  lexicon: HALOT
  rationale: El imperfecto expresa aquí valor futuro en contexto de promesa. «Dará» es natural y conserva el sentido de expectativa divina sin sobrecargar el registro.
- source_word: הַטּוֹב
  english_pob_choice: what is good
  chosen_spanish: lo que es bueno
  alternatives_spanish:
  - el bien
  - lo bueno
  - bienes buenos
  lexicon: HALOT
  rationale: La expresión con artículo es amplia y puede abarcar bien moral o material. «Lo que es bueno» preserva esa amplitud sin estrecharla a bienes concretos ni reducirla a una abstracción demasiado técnica.
- source_word: וְאַרְצֵנוּ
  english_pob_choice: and our land
  chosen_spanish: y nuestra tierra
  alternatives_spanish:
  - y nuestra tierra
  - y nuestro país
  - y nuestra región
  lexicon: HALOT
  rationale: אֶרֶץ en este marco agrícola se refiere a la tierra del pueblo. «Nuestra tierra» mantiene la referencia territorial y la resonancia agraria mejor que opciones más políticas como «país».
- source_word: תִּתֵּן
  english_pob_choice: will yield
  chosen_spanish: dará
  alternatives_spanish:
  - dará
  - rendirá
  - producirá
  lexicon: HALOT
  rationale: Aunque literalmente es «dará», el verbo aplicado a la tierra alude a su producción agrícola. En español, «dará su fruto» comunica de manera natural la imagen sin perder el movimiento del hebreo.
- source_word: יְבוּלָהּ
  english_pob_choice: its produce
  chosen_spanish: su fruto
  alternatives_spanish:
  - su produce
  - su cosecha
  - su fruto
  lexicon: HALOT
  rationale: יְבוּל designa la producción o rendimiento de la tierra. «Su fruto» es una equivalencia idiomática clara en español bíblico contemporáneo, compatible con el contexto agrícola; se evita una traducción demasiado técnica o pesada.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se preserva el nombre propio divino y no se sustituye por una designación funcional. «Yahvé» sigue la norma terminológica del proyecto para el Tetragrámaton y mantiene la referencia directa al Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Amplitud semántica de הַטּוֹב
  english_pob_reading: what is good
  chosen_spanish_reading: lo que es bueno
  alternative_spanish_readings:
  - el bien
  - bienes buenos
  - lo bueno
  rationale: La frase hebrea no obliga a limitar el sentido a beneficios materiales ni a un bien exclusivamente moral. La versión española conserva esa amplitud, permitiendo que el contexto determine el alcance.
  doctrine_reference: HALOT / contexto poético-sapiencial
- issue: Imagen agrícola de la segunda cola
  english_pob_reading: our land will yield its produce
  chosen_spanish_reading: nuestra tierra dará su fruto
  alternative_spanish_readings:
  - nuestra tierra producirá su cosecha
  - nuestra tierra rendirá su fruto
  - nuestra tierra dará su produce
  rationale: El hebreo atribuye a la tierra la acción de producir. «Dará su fruto» mantiene la metáfora agrícola de forma idiomática y fiel, sin banalizar el paralelismo poético.
  doctrine_reference: Contexto agrícola de Salmo 85:13
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no hubo cambios necesarios en el texto inglés de referencia y el acuerdo cruzado fue alto. La redacción española sigue esa lectura estable, conservando el énfasis de גַּם, el nombre divino como Yahvé y la imagen agrícola final.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme a la terminología del proyecto.
  - Se usa un equivalente idiomático para el par tierra/fruto, evitando una calca áspera.
  - La nota de alternativa solo se aplica a הַטּוֹב, donde la amplitud semántica está documentada en el audit trail.
