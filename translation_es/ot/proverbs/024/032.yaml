translation:
  language: es
  text: Entonces yo vi y lo tomé a pecho[a]; vi y recibí instrucción[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «puse mi corazón»; el hebreo dice literalmente «puse mi corazón».
    reason: lexical_alternative
  - marker: b
    text: O «recibí disciplina» o «aprendí una lección».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶחֱזֶה
  english_pob_choice: Then I saw
  chosen_spanish: Entonces yo vi
  alternatives_spanish:
  - Y vi
  - Entonces contemplé
  lexicon: HALOT
  rationale: חזה expresa ver/percibir con atención. «Entonces yo vi» conserva el valor narrativo y la observación directa sin volverlo arcaico. Añadir «yo» ayuda a reflejar el énfasis del pronombre independiente אָנֹכִי en español natural.
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  - —
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis. En español, «yo» puede expresarlo con sobriedad; «yo mismo» sería demasiado enfático para este contexto sapiencial.
- source_word: אָשִׁית לִבִּי
  english_pob_choice: took it to heart
  chosen_spanish: puse mi corazón
  alternatives_spanish:
  - puse mi mente
  - lo tomé a pecho
  - dirigí mi corazón
  lexicon: HALOT
  rationale: Literalmente es «puse mi corazón». En español, esa forma mantiene la imagen hebrea y la decisión interior de atender con seriedad. Se evita «lo tomé a pecho» por su matiz más emocional que reflexivo.
- source_word: רָאִיתִי
  english_pob_choice: I looked
  chosen_spanish: vi
  alternatives_spanish:
  - miré
  - contemplé
  lexicon: HALOT
  rationale: El verbo de ver se repite en paralelo con el primer miembro. Aquí se conserva de forma simple y directa como «vi», que mantiene el paralelismo y no exige una variación innecesaria.
- source_word: לָקַחְתִּי מוּסָר
  english_pob_choice: received instruction
  chosen_spanish: recibí instrucción
  alternatives_spanish:
  - recibí disciplina
  - aprendí una lección
  - tomé corrección
  lexicon: HALOT
  rationale: מוּסָר en literatura sapiencial puede ser instrucción, disciplina o corrección. Se elige «instrucción» como en la POB inglesa, porque preserva el sentido pedagógico sin cargar el verso con un matiz punitivo.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se alinea con el estado de alta concordancia y conserva el paralelismo observacional/reflexivo del hebreo.
  spanish_consistency_notes:
  - 'Se mantiene el orden retórico: ver → poner el corazón → ver → recibir instrucción.'
  - Se conservan imágenes hebreas transparentes cuando el español puede soportarlas sin sonar forzado.
  - Se usa «corazón» en sentido bíblico de centro de la voluntad y la reflexión, no como emoción exclusivamente afectiva.
