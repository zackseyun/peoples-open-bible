translation:
  language: es
  text: Al cabo de cuarenta días, Noé abrió la ventana del arca que había hecho.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: At the end of forty days
  chosen_spanish: Al cabo de
  alternatives_spanish:
  - Y sucedió que
  - Y aconteció que
  lexicon: HALOT
  rationale: El hebreo usa una fórmula narrativa de transición, pero en español la introducción temporal directa resulta más natural y fiel al flujo del versículo. "Al cabo de" recoge bien el valor temporal de la expresión sin cargar el estilo.
- source_word: מִקֵּץ
  english_pob_choice: at the end of
  chosen_spanish: al cabo de
  alternatives_spanish:
  - después de
  - al final de
  lexicon: HALOT
  rationale: La preposición con קֵץ marca el punto alcanzado tras un lapso; "al cabo de" comunica ese sentido temporal con buena naturalidad en español.
- source_word: אַרְבָּעִים יוֹם
  english_pob_choice: forty days
  chosen_spanish: cuarenta días
  alternatives_spanish:
  - un período de cuarenta días
  lexicon: HALOT
  rationale: La construcción cardinal + sustantivo se expresa de forma directa como "cuarenta días". No hace falta expandirla más en español.
- source_word: וַיִּפְתַּח
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - descubrió
  - descorrió
  lexicon: HALOT
  rationale: פתח aquí significa abrir. "Abrió" es la equivalencia más directa y clara.
- source_word: חַלּוֹן
  english_pob_choice: window
  chosen_spanish: ventana
  alternatives_spanish:
  - abertura
  - ventanilla
  lexicon: HALOT
  rationale: En el contexto del arca, el sustantivo designa una ventana o abertura similar. "Ventana" es la forma más natural y precisa en español.
- source_word: הַתֵּבָה
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - la caja
  - la nave
  lexicon: HALOT
  rationale: En Génesis 6–9, תֵּבָה se refiere de manera estable al arca de Noé. "Arca" es el término tradicional y fiel a este referente específico.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he had made
  chosen_spanish: que había hecho
  alternatives_spanish:
  - que hizo
  - que había construido
  lexicon: HALOT
  rationale: El relativo introduce una acción anterior a la apertura; el pluscuamperfecto español ayuda a reflejar esa anterioridad narrativa. "Hecho" sigue de cerca el verbo hebreo עָשָׂה sin forzar una especificación no presente en el texto.
translation_notes:
  revision_awareness: Se ha corregido el problema previo eliminando notas al pie no ancladas en el texto. El versículo queda sin footnotes porque la elección española puede expresarse de manera clara y sin añadir ambigüedad textual que requiera nota.
  spanish_consistency_notes:
  - Se mantiene "arca" para תֵּבָה en coherencia con la terminología habitual del relato de Noé.
  - Se evita la fórmula arcaizante "sucedió que" porque no aporta una precisión adicional necesaria en este versículo.
  - El orden temporal inicial en español conserva la relación entre el lapso de cuarenta días y la acción de Noé.
