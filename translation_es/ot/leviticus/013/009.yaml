    text: 'Hebreo צָרַעַת: tradicionalmente se ha traducido «lepra», pero probablemente abarca un conjunto más amplio de afecciones cutáneas graves que la lepra moderna.'
    reason: lexical_alternative
  revision_rationale: Se ajusta «en un hombre» a «en una persona» para reflejar mejor el valor genérico de אָדָם en español natural y ampliamente legible. Se cambia «afección» por «lesión» para representar con más precisión y naturalidad el valor visible/diagnóstico de נֶגַע en Levítico 13. Se conserva «lepra» con nota explicativa, en continuidad con la auditoría inglesa.
