translation:
  language: es
  text: Y llamó a Edna, su esposa; y, tomando un documento, escribió un contrato y lo selló.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκάλεσεν
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - citó
  lexicon: BDAG
  rationale: En español, "llamó" reproduce de manera natural y directa el valor básico del verbo sin introducir una formalidad que el contexto no exige.
- source_word: Ἔδναν
  english_pob_choice: Edna
  chosen_spanish: Edna
  lexicon: convención onomástica
  rationale: Se mantiene el nombre propio mediante transliteración estándar.
- source_word: γυναῖκα αὐτοῦ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  lexicon: BDAG
  rationale: Aquí γυνή está determinado por el posesivo y el contexto doméstico/legal, por lo que "esposa" comunica mejor el vínculo matrimonial que "mujer".
- source_word: λαβὼν βιβλίον
  english_pob_choice: taking a document
  chosen_spanish: tomando un documento
  alternatives_spanish:
  - tomando un libro
  - tomando un rollo
  - tomando un escrito
  lexicon: BDAG
  rationale: '"Documento" expresa en español moderno la función legal de βιβλίον en este pasaje, sin obligar a decidir innecesariamente entre libro, rollo o escrito.'
- source_word: ἔγραψεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - redactó
  - escribió por escrito
  lexicon: BDAG
  rationale: El verbo pide simplemente "escribió"; "redactó" sería posible, pero añade un matiz más técnico que el griego no obliga a especificar.
- source_word: συγγραφήν
  english_pob_choice: a contract
  chosen_spanish: un contrato
  alternatives_spanish:
  - un acuerdo escrito
  - una escritura contractual
  lexicon: LSJ
  rationale: συγγραφή designa un escrito contractual o acuerdo formal. "Contrato" mantiene el valor jurídico y es claro para el lector español sin sobreinterpretar como "contrato matrimonial" más allá del contexto inmediato.
- source_word: ἐσφραγίσαντο
  english_pob_choice: sealed it
  chosen_spanish: lo selló
  alternatives_spanish:
  - lo sellaron
  - le puso el sello
  lexicon: BDAG
  rationale: El texto griego presenta acción singular en este contexto narrativo; por eso se traduce "lo selló". En español, "sellar" conserva la imagen concreta del acto legal.
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de una formulación interpretiva (''marriage contract'', ''they sealed it'') a una más cercana al griego (''contract'', ''sealed it''). La redacción española sigue esa revisión: evita explicitar ''matrimonial'' en el cuerpo del texto y refleja el sujeto singular del verbo final.'
  spanish_consistency_notes:
  - Se usó "esposa" para γυνή en un contexto legal-doméstico, coherente con el sentido del pasaje.
  - '"Documento" y "contrato" preservan el campo jurídico de la escena sin forzar una denominación técnica ajena al español actual.'
  - No se añadieron notas de pie porque la elección léxica principal ya cubre la ambigüedad sin requerir variantes textuales adicionales.
