  yaml_path: translation/nt/revelation/022/017.yaml
  text: And the Spirit and the bride say[a], “Come.” And let the one who hears say, “Come.” And let the one who is thirsty come[c][b]; let the one who desires take the water of life freely.
  footnotes:
  - marker: a
    text: Or “without cost” or “as a gift.”
    reason: lexical_alternative
  - marker: b
    text: The first two calls, “Come,” are commonly understood as an appeal for the Lord’s coming; the following clauses then invite the thirsty and willing person to come and receive life.
    reason: alternative_reading
  - marker: c
    text: Or 'the one who wants it'.
    reason: previous_rendering
