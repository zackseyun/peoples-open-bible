  chosen_reading: at home
  alternative_readings:
  - in the house
  rationale: This is primarily a lexical-contextual decision rather than a doctrinal one. The phrase can denote being at home, and this fits the narrative setting in Capernaum. Because the Greek could also be read more literally, the alternative is preserved in a footnote to maintain transparency and avoid overstating certainty.
