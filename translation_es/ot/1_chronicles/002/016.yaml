lexical_decisions:
- source_word: וַאֲחֹתֵיהֶם
  english_pob_choice: Their sisters were
  chosen_spanish: Sus hermanas eran
  alternatives_spanish:
  - Y sus hermanas eran
  - Ahora bien, sus hermanas eran
  lexicon: HALOT
  rationale: El hebreo introduce un dato genealógico adicional con el posesivo de tercera persona plural. En español, 'Sus hermanas eran' conserva la relación posesiva y el plural sin añadir matiz narrativo innecesario.
- source_word: צְרוּיָה
  english_pob_choice: Zeruiah
  chosen_spanish: Zeruía
  alternatives_spanish:
  - Zeruiah
  lexicon: Nombre propio transliterado
  rationale: Se mantiene el nombre propio en forma hispana habitual y legible, sin sustituirlo por un equivalente interpretativo.
- source_word: וַאֲבִיגָיִל
  english_pob_choice: Abigail
  chosen_spanish: Abigail
  lexicon: Nombre propio transliterado
  rationale: Se conserva la forma tradicional del nombre en español, que coincide con el uso extendido y no altera el sentido del texto.
- source_word: וּבְנֵי צְרוּיָה
  english_pob_choice: The sons of Zeruiah
  chosen_spanish: Los hijos de Zeruía
  alternatives_spanish:
  - Y los hijos de Zeruía
  lexicon: HALOT
  rationale: La construcción de cadena posesiva se vierte de manera natural como 'los hijos de Zeruía', preservando la relación familiar sin forzar un calco sintáctico.
- source_word: אַבְשַׁי
  english_pob_choice: Abishai
  chosen_spanish: Abisai
  alternatives_spanish:
  - Abishai
  lexicon: Nombre propio transliterado
  rationale: Se adopta la forma española más asentada y pronunciable, manteniendo la identificación del personaje.
- source_word: וְיוֹאָב
  english_pob_choice: Joab
  chosen_spanish: Joab
  lexicon: Nombre propio transliterado
  rationale: Se conserva la forma tradicional del nombre en español.
- source_word: וַעֲשָׂהאֵל
  english_pob_choice: and Asahel
  chosen_spanish: y Asael
  alternatives_spanish:
  - y Asahel
  lexicon: Nombre propio transliterado
  rationale: Se usa la forma española corriente 'Asael', fiel al nombre hebreo y común en biblias españolas.
- source_word: שְׁלֹשָׁה
  english_pob_choice: three
  chosen_spanish: tres
  lexicon: HALOT
  rationale: Se mantiene el numeral final como en el hebreo, que funciona como resumen explícito del total de hijos de Zeruía.
theological_decisions:
- issue: Si el versículo debe conservar el remate numérico 'tres' o tratarlo como redundante editorialmente.
  english_pob_reading: Retains 'three' explicitly rather than omitting it as redundant.
  chosen_spanish_reading: Conserva 'tres' al final.
  alternative_spanish_readings:
  - Omitir 'tres' por considerarlo obvio en la lista
  - Reformular como 'y eran tres'
  rationale: El hebreo cierra con un numeral independiente que resume la lista; conservarlo evita borrar un detalle textual y refleja mejor la estructura del verso.
  doctrine_reference: Fidelidad textual y transparencia de traducción
translation_notes:
  revision_awareness: El texto inglés auditado fue calificado con alta concordancia y no recibió cambios en la última revisión; esta versión española sigue esa lectura sin introducir expansiones interpretativas.
