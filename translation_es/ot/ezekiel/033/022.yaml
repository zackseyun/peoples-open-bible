translation:
  language: es
  text: Ahora la mano de Yahvé había estado sobre mí en la tarde, antes de que llegara el fugitivo[a], y había abierto mi boca antes de que él viniera a mí por la mañana. Así fue abierta mi boca, y ya no seguí mudo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «antes de que llegara el sobreviviente». El término hebreo se refiere a uno que ha escapado y sobrevivido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיַד יְהוָה
  english_pob_choice: the hand of Yahweh / the LORD
  chosen_spanish: la mano de Yahvé
  alternatives_spanish:
  - la mano del Señor
  lexicon: HALOT
  rationale: Conservo el hebraísmo profético «la mano de Yahvé», que en español comunica la acción o influencia poderosa de Dios sobre el profeta. No sustituyo el nombre divino por un título, porque el hebreo usa el Tetragrámaton directamente.
- source_word: הָיְתָה אֵלַי
  english_pob_choice: had been upon me
  chosen_spanish: había estado sobre mí
  alternatives_spanish:
  - estuvo sobre mí
  - había venido sobre mí
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja bien el estado previo que se extiende hasta el momento narrado. «Sobre mí» mantiene el valor idiomático de la preposición hebrea y la imagen profética de la mano divina recayendo sobre el profeta.
- source_word: בָּעֶרֶב
  english_pob_choice: in the evening
  chosen_spanish: en la tarde
  alternatives_spanish:
  - en la noche
  - al atardecer
  lexicon: HALOT
  rationale: El hebreo nombra el tramo temporal de manera simple. «En la tarde» es natural en español amplio y preserva el valor temporal sin añadir matices no garantizados.
- source_word: הַפָּלִיט
  english_pob_choice: the fugitive
  chosen_spanish: el fugitivo
  alternatives_spanish:
  - el sobreviviente
  - el escapado
  lexicon: HALOT
  rationale: Sigo la opción léxica de «fugitivo» para el que escapó de la catástrofe y llegó como mensajero. «Sobreviviente» es posible, pero en español diluye más el vínculo con la idea de escape que el término hebreo contiene.
- source_word: וַיִּפְתַּח אֶת פִּי
  english_pob_choice: he had opened my mouth
  chosen_spanish: había abierto mi boca
  alternatives_spanish:
  - abrió mi boca
  - me había dado habla
  lexicon: HALOT
  rationale: Mantengo la expresión concreta «abrir mi boca», que enlaza con la mutidad previa de Ezequiel. El tiempo verbal reproduce la secuencia narrativa marcada por el contexto y la revisión del POB inglés.
- source_word: עַד בּוֹא אֵלַי בַּבֹּקֶר
  english_pob_choice: before he came to me in the morning
  chosen_spanish: antes de que él llegara a mí en la mañana
  alternatives_spanish:
  - hasta que él llegó a mí en la mañana
  - cuando él llegó a mí en la mañana
  lexicon: HALOT
  rationale: El hebreo marca el límite temporal previo a la llegada del fugitivo. «Antes de que» evita la lectura de duración prolongada que podría sugerir «hasta que», y conserva la relación temporal corregida en la auditoría inglesa.
- source_word: וַיִּפָּתַח פִּי
  english_pob_choice: my mouth was opened
  chosen_spanish: fue abierta mi boca
  alternatives_spanish:
  - mi boca se abrió
  - mi boca fue abierta
  lexicon: HALOT
  rationale: El nifal se expresa con voz pasiva en español para preservar la idea de apertura sufrida/recibida. Invierto el orden a «fue abierta mi boca» para darle un tono más solemne y bíblico, sin perder claridad.
- source_word: וְלֹא נֶאֱלַמְתִּי עוֹד
  english_pob_choice: and I was no longer mute
  chosen_spanish: y ya no estuve mudo
  alternatives_spanish:
  - y ya no fui mudo
  - y no me quedé mudo
  lexicon: HALOT
  rationale: «Mudo» transmite la incapacidad de hablar, que es la fuerza del verbo hebreo en este contexto narrativo. «Ya no estuve» comunica el cese de esa condición de modo natural en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: El texto hebreo usa directamente el nombre del pacto. Sigo el criterio del proyecto de transliterarlo como «Yahvé», no de ocultarlo bajo un título, para conservar la identidad nominal de Dios en el pasaje.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Agencia en «había abierto mi boca»
  english_pob_reading: The subject is the LORD
  chosen_spanish_reading: El sujeto implícito es Yahvé
  alternative_spanish_readings:
  - lectura impersonal del contexto
  - se abrió mi boca
  rationale: Aunque el sujeto no se repite en la cláusula, el antecedente inmediato es «la mano de Yahvé», por lo que la acción se entiende como divina. Conservo esa agencia implícita en español para no diluir la conexión teológica del versículo con la acción directa de Yahvé sobre el profeta.
  doctrine_reference: Contexto narrativo de Ezequiel 33 y continuidad de la mudez/restauración del habla
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del POB inglés, que ajustó la secuencia temporal para reflejar con mayor precisión el hebreo: «before he came to me in the morning» y la relación previa entre la apertura de la boca y la llegada del fugitivo. Además, se conserva la lectura de agente divino implícito y el paralelismo entre «abrir mi boca» y «mi boca fue abierta».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה según la terminología base del proyecto.
  - Se conserva «fugitivo» con nota alternativa, en paralelo con la opción léxica inglesa auditable.
  - La cláusula pasiva «fue abierta mi boca» respeta el nifal y mantiene la conexión con la mudez previa de Ezequiel.
  - «Ya no estuve mudo» evita un calco duro y comunica el cese de la condición sin añadir interpretación extra.
