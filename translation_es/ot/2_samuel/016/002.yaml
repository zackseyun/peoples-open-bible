    reason: lexical_alternative
  - marker: b
    text: Or, 'summer produce.' The Hebrew term can refer broadly to fruit gathered in the summer season.
    reason: lexical_alternative
  - marker: c
    text: Or, 'the attendants' or 'the servants' for 'the young men.'
    reason: lexical_alternative
