translation:
  language: es
  text: Porque, ¿de qué modo se reeduca a un hombre que por hábito come solo un tipo de alimento[a], y es un glotón y un borracho, si no es evidente que la razón es dueña de las pasiones?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «persona delicada para la comida», o «uno que desea comidas especiales» para la palabra griega rara traducida aquí como «come solo un tipo de alimento».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεὶ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: LSJ
  rationale: Introduce una pregunta retórica explicativa que sostiene el argumento anterior; «Porque» conserva la conexión lógica de manera natural en español.
- source_word: τίνα τρόπον
  english_pob_choice: how
  chosen_spanish: ¿de qué modo?
  alternatives_spanish:
  - ¿cómo?
  - ¿por qué medio?
  lexicon: LSJ
  rationale: La pregunta griega es retórica y formal; «¿de qué modo?» mantiene el matiz explicativo sin sonar mecánico.
- source_word: μονοφάγος
  english_pob_choice: greedy for delicacies
  chosen_spanish: come solo un tipo de alimento
  alternatives_spanish:
  - es delicado para la comida
  - es un comilón de exquisiteces
  - solo come ciertas comidas
  lexicon: LSJ
  rationale: 'La revisión inglesa del expediente corrigió la lectura hacia un valor más preciso y literal: alguien restringido a un solo alimento o tipo de comida. El español refleja esa restricción sin añadir un juicio de gusto que el griego no exige aquí.'
- source_word: τὸ ἦθος
  english_pob_choice: by habit
  chosen_spanish: por hábito
  alternatives_spanish:
  - por costumbre
  - en su conducta
  lexicon: LSJ
  rationale: El sintagma describe un rasgo asentado o habitual, no solo una acción aislada; «por hábito» reproduce bien el valor adverbial.
- source_word: γαστρίμαργος
  english_pob_choice: a glutton
  chosen_spanish: un glotón
  alternatives_spanish:
  - un voraz
  - un tragón
  lexicon: LSJ
  rationale: Término vicioso claro en español para apetito desordenado; conserva el tono moral del original.
- source_word: μέθυσος
  english_pob_choice: a drunkard
  chosen_spanish: un borracho
  alternatives_spanish:
  - un ebrio
  - un bebedor
  lexicon: LSJ
  rationale: Designa a una persona caracterizada por la embriaguez habitual, no solo a alguien que está ebrio en el momento.
- source_word: μεταπαιδεύεται
  english_pob_choice: is retrained
  chosen_spanish: se retrena
  alternatives_spanish:
  - se reeduca
  - se disciplina para cambiar
  lexicon: LSJ
  rationale: «Retrena» conserva la imagen pedagógica de un proceso de formación o readiestramiento, más precisa que una mera reformulación moralizante.
- source_word: δῆλον
  english_pob_choice: clear
  chosen_spanish: evidente
  alternatives_spanish:
  - claro
  - manifiesto
  lexicon: LSJ
  rationale: 'Equivale de modo natural a la evaluación lógica del argumento: «si no es evidente que...». '
- source_word: κύριός
  english_pob_choice: master
  chosen_spanish: dueña
  alternatives_spanish:
  - señora
  - dueño
  - amo
  lexicon: LSJ
  rationale: Aquí κύριος expresa dominio funcional sobre las pasiones, no un título divino. «Dueña» mantiene la idea de gobierno/posesión; en el español de la frase, por concordancia con «la razón», funciona como personificación.
- source_word: παθῶν
  english_pob_choice: the passions
  chosen_spanish: las pasiones
  alternatives_spanish:
  - los impulsos
  - los apetitos
  - las emociones
  lexicon: LSJ
  rationale: En este contexto filosófico-moral, πάθη alude a impulsos desordenados o pasiones; «pasiones» preserva el campo técnico.
- source_word: ὁ λογισμός
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el raciocinio
  - el pensamiento racional
  - la mente racional
  lexicon: LSJ
  rationale: En 4 Macabeos λογισμός funciona como facultad gobernante y racional; «la razón» es la equivalencia más directa y transparente en español.
theological_decisions:
- issue: κύριος en contexto filosófico no divino
  english_pob_reading: master
  chosen_spanish_reading: dueña / dueña de las pasiones
  alternative_spanish_readings:
  - amo
  - señor
  - dueño
  rationale: No se trata del título divino «Señor», sino de dominación funcional de la razón sobre las pasiones. La personificación femenina de «la razón» permite una frase española natural sin perder el valor de autoridad.
  doctrine_reference: 'DOCTRINE.md: traducir κύριος por contexto cuando no funciona como título divino.'
- issue: Genero gramatical y concordancia con ὁ λογισμός
  english_pob_reading: reason is master of the passions
  chosen_spanish_reading: la razón es dueña de las pasiones
  alternative_spanish_readings:
  - la razón es dueña sobre las pasiones
  - la razón domina las pasiones
  rationale: El griego usa un sustantivo masculino, pero en español «razón» es femenino; la concordancia natural obliga a «dueña». Se conserva el contenido semántico de dominio sin forzar la gramática española.
  doctrine_reference: 'DOCTRINE.md §4: fidelidad semántica con concordancia idiomática cuando la lengua meta lo exige.'
translation_notes:
  revision_awareness: 'El expediente inglés muestra una revisión importante de μονοφάγος: pasó de una paráfrasis interpretativa a una lectura más precisa («eating only one kind of food»). La versión española sigue esa revisión y evita introducir la idea de «delicias» o «exquisiteces» que el ajuste final no respalda. También conserva la estructura retórica y el contraste filosófico entre apetito y razón.'
  spanish_consistency_notes:
  - Se mantiene «razón» para λογισμός conforme al uso filosófico de 4 Macabeos.
  - Se conserva «pasiones» para πάθη por su valor técnico moral.
  - «Retrena» reproduce el matiz de formación/disciplinamiento del verbo sin moralizarlo excesivamente.
  - El femenino de «la razón» exige «dueña»; no se usa «Señor» porque no hay referencia divina en κύριος aquí.
