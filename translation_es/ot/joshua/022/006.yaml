translation:
  language: es
  text: Entonces Josué los bendijo y los despidió[a], y se fueron a sus tiendas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus hogares»; literalmente, «sus tiendas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבָרְכֵם
  english_pob_choice: blessed them
  chosen_spanish: los bendijo
  alternatives_spanish:
  - les dio su bendición
  - pronunció una bendición sobre ellos
  lexicon: HALOT
  rationale: El piel de ברך aquí expresa la acción de bendecir a los que se despiden. «Los bendijo» conserva la forma directa y natural en español sin añadir explicaciones que el hebreo no exige.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Yehoshúa
  lexicon: convención onomástica bíblica
  rationale: El nombre propio se adapta a la forma española estándar y reconocible para el lector bíblico.
- source_word: וַיְשַׁלְּחֵם
  english_pob_choice: sent them away
  chosen_spanish: los despidió
  alternatives_spanish:
  - los envió
  - los mandó irse
  lexicon: HALOT
  rationale: En este contexto de despedida, «despidió» comunica el valor de liberar o enviar al final de la reunión. Evita una redundancia pesada con «los envió» y conserva el matiz narrativo de partida.
- source_word: וַיֵּלְכוּ
  english_pob_choice: they went
  chosen_spanish: fueron
  alternatives_spanish:
  - se fueron
  - partieron
  lexicon: HALOT
  rationale: «Fueron» reproduce de manera sobria el verbo de movimiento. «Se fueron» o «partieron» pueden sonar más marcados; el hebreo aquí es simple y consecutivo.
- source_word: אֶל אָהֳלֵיהֶם
  english_pob_choice: to their tents
  chosen_spanish: a sus tiendas
  alternatives_spanish:
  - a sus hogares
  - a sus campamentos
  lexicon: HALOT
  rationale: El sustantivo significa literalmente «tiendas». Se mantiene esa imagen concreta, ya que el contexto histórico y narrativo la hace clara; «hogares» sería una metonimia no requerida por el texto.
translation_notes:
  revision_awareness: 'El texto hebreo y la POB inglesa coinciden sin revisiones sustantivas; se conserva la estructura narrativa breve: bendición, despedida y partida hacia las tiendas.'
  spanish_consistency_notes:
  - Se mantiene «Josué» como forma estable del nombre propio.
  - Se conserva el paralelismo verbal breve del hebreo con una sintaxis castellana natural.
  - «Tiendas» se deja literalmente para respetar la imagen concreta del texto fuente.
