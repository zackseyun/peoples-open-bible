translation:
  language: es
  text: Como la grasa[a] separada de la ofrenda sagrada[b], así fue David de entre los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Grasa'' refleja el sentido concreto de חֵלֶב / στέαρ; también podría traducirse ''sebo'' en un sentido más técnico.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo es conciso en 'de lo sagrado'; el griego paralelo ayuda a aclarar la comparación sacrificial y puede entenderse más explícitamente como 'de la ofrenda de bienestar/comunión'.
    reason: textual_variant
lexical_decisions:
- source_word: כחלב / στέαρ
  english_pob_choice: as the fat
  chosen_spanish: como la grasa
  alternatives_spanish:
  - como el sebo
  - como la porción grasa
  lexicon: HALOT; LXX στέαρ
  rationale: חֵלֶב y el griego στέαρ señalan grasa/sebo en sentido concreto y cultual. 'Grasa' es claro en español moderno y mantiene la imagen sacrificial sin volverla abstracta como 'la mejor parte'.
- source_word: מורם / ἀφωρισμένον
  english_pob_choice: set apart
  chosen_spanish: separada
  alternatives_spanish:
  - apartada
  - consagrada
  - levantada
  lexicon: HALOT; LXX ἀφωρισμένον
  rationale: El verbo/participio expresa una porción retirada o distinguida del resto dentro de un contexto sacrificial. 'Separada' preserva la idea cultual de distinción y se ajusta bien al giro español de la comparación.
- source_word: מקדש / σωτηρίου
  english_pob_choice: from the sacred offering
  chosen_spanish: del sacrificio sagrado
  alternatives_spanish:
  - de la ofrenda sagrada
  - de la ofrenda de comunión
  - de lo consagrado
  lexicon: HALOT; LXX σωτηρίου
  rationale: El hebreo es breve y el griego apunta a un sacrificio/ofrenda concreta. 'Sacrificio sagrado' comunica la esfera cultual sin imponer un tecnicismo más estrecho que el hebreo no explicita por completo.
- source_word: כן דוד מישראל / οὕτως Δαυεὶδ ἀπὸ τῶν υἱῶν Ἰσραήλ
  english_pob_choice: so was David from Israel
  chosen_spanish: así fue David de entre los hijos de Israel
  alternatives_spanish:
  - así fue David de Israel
  - así David fue apartado de Israel
  - así fue David entre los hijos de Israel
  lexicon: HALOT; LXX ἀπὸ τῶν υἱῶν Ἰσραήλ
  rationale: La comparación presenta a David como distinguido dentro de Israel, y el griego hace explícita la separativa 'de entre los hijos de Israel'. 'De entre' mantiene el matiz elativo/separativo mejor que un simple 'de Israel'.
theological_decisions:
- issue: Distinción de David sin añadir una formulación doctrinal ajena al verso
  english_pob_reading: Render the comparison as David being 'from Israel' in a context that implies being set apart, rather than expanding to 'chosen by God from Israel.'
  chosen_spanish_reading: Presentar a David como distinguido de entre Israel, sin añadir explícitamente que fue 'elegido por Dios' en esta línea.
  alternative_spanish_readings:
  - David fue escogido de Israel
  - David fue apartado por Dios de Israel
  rationale: El verso usa una comparación cultual para señalar honra y separación, pero no nombra aquí la acción divina de elección. La redacción conserva esa fuerza teológica sin resolverla con lenguaje no presente en el texto.
  doctrine_reference: Preservar la tensión teológica del texto; no importar afirmaciones doctrinales que el verso no formula.
translation_notes:
  revision_awareness: La versión inglesa revisó 'As the fat set apart...' a 'As the fat is set apart...' para reflejar mejor el participio hebreo. La línea española usa 'separada' para conservar ese valor participial y la comparación cultual, apoyándose también en la lectura separativa explícita del griego.
  spanish_consistency_notes:
  - Se mantiene 'grasa' para חֵלֶב / στέαρ, coherente con el valor concreto del término en contexto sacrificial.
  - Se conserva un registro bíblico sobrio y legible en español, evitando una paráfrasis doctrinal de 'escogido' que el verso no dice explícitamente.
  - '''De entre los hijos de Israel'' refleja mejor el matiz separativo del griego que un simple ''de Israel''.'
