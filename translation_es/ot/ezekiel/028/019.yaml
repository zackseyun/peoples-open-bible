translation:
  language: es
  text: Todos los que te conocen entre los pueblos quedan horrorizados ante ti[a]; te has vuelto un espanto[b], y no existirás más jamás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre las naciones».
    reason: lexical_alternative
  - marker: b
    text: O «terrores» / «un objeto de terror».
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - Cada uno
  lexicon: HALOT
  rationale: כָּל introduce una totalidad distributiva; «Todos» es natural en español y conserva el alcance colectivo del hebreo.
- source_word: יוֹדְעֶיךָ
  english_pob_choice: who know you
  chosen_spanish: que te conocen
  alternatives_spanish:
  - que te conocieron
  - tus conocidos
  lexicon: HALOT
  rationale: El participio con sufijo 2ms designa a quienes conocen al destinatario. «Que te conocen» mantiene el valor general y no restringe innecesariamente a pasado.
- source_word: בָּעַמִּים
  english_pob_choice: among the peoples
  chosen_spanish: entre los pueblos
  alternatives_spanish:
  - entre las naciones
  - entre los pueblos de la tierra
  lexicon: HALOT
  rationale: עַמִּים es plural de «pueblos». «Entre los pueblos» preserva la imagen y evita introducir «naciones» como única opción.
- source_word: שָׁמְמ֖וּ
  english_pob_choice: are appalled
  chosen_spanish: se horrorizan
  alternatives_spanish:
  - se asombran
  - quedan desolados
  - quedan horrorizados
  lexicon: HALOT
  rationale: El verbo expresa impacto atónito y horror/desolación ante el juicio. «Se horrorizan» comunica con fuerza la reacción emocional sin perder el matiz de consternación.
- source_word: עָלֶ֑י/ךָ
  english_pob_choice: at you
  chosen_spanish: de ti
  alternatives_spanish:
  - por ti
  - contra ti
  lexicon: HALOT
  rationale: Con שמם, la preposición marca el objeto o causa de la reacción. En español, «se horrorizan de ti» suena natural y transmite la repulsión provocada por la persona.
- source_word: בַּלָּהוֹת
  english_pob_choice: a horror
  chosen_spanish: un espanto
  alternatives_spanish:
  - terrores
  - un objeto de terror
  - un horror
  lexicon: HALOT
  rationale: El plural puede funcionar como predicado de terror/espanto. «Un espanto» suena idiomático en español y conserva la idea de algo aterrador o espantoso.
- source_word: הָיִיתָ
  english_pob_choice: have become
  chosen_spanish: te has vuelto
  alternatives_spanish:
  - has llegado a ser
  - te hiciste
  lexicon: HALOT
  rationale: Aunque formalmente es perfecto, en este oráculo judicial presenta un estado resultante. «Te has vuelto» expresa bien el cambio de condición.
- source_word: וְאֵינְךָ
  english_pob_choice: you will be no more
  chosen_spanish: ya no existes
  alternatives_spanish:
  - ya no eres
  - ya no estarás
  lexicon: HALOT
  rationale: La negación existencial con sufijo comunica inexistencia o desaparición. «Ya no existes» reproduce esa fuerza con claridad en español.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: La expresión idiomática indica duración perpetua. «Para siempre» es la forma más natural y fiel en español.
theological_decisions:
- issue: Fuerza final de la fórmula de desaparición irreversible
  english_pob_reading: '''you will be no more forever'' as emphatic final disappearance in a judgment oracle.'
  chosen_spanish_reading: '''ya no existes para siempre'' as emphatic final disappearance in a judgment oracle.'
  alternative_spanish_readings:
  - ya no existirás para siempre
  - ya no serás para siempre
  - desaparecerás para siempre
  rationale: Se conserva la tensión del hebreo entre negación existencial y duración perpetua, sin suavizar la sentencia ni convertirla en una paráfrasis doctrinal.
  doctrine_reference: Preservar la fuerza retórica del oráculo y la primacía del texto original sobre la tradición de traducción.
translation_notes:
  revision_awareness: El contexto inglés POB muestra acuerdo alto y no registra revisiones aplicadas; la versión española sigue esa lectura sin introducir cambios textuales o interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantiene «pueblos» para בָּעַמִּים, coherente con el valor plural de עַמִּים.
  - Se evita traducir la negación final como simple futuro sin valor existencial; «ya no existes para siempre» preserva el efecto de desaparición irreversible.
  - «Espanto» mantiene un registro digno y bíblico, compatible con la fuerza de בַּלָּהוֹת sin recurrir a una paráfrasis excesiva.
