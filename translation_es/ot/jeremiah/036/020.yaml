translation:
  language: es
  text: Entonces fueron al rey en el patio, y depositaron el rollo en la cámara de Elisama el escriba[a], y le informaron todas las palabras al oído del rey[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el secretario».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en los oídos del rey», un modismo que significa «a oídos del rey» o «en presencia del rey».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: Then they went
  chosen_spanish: Entonces fueron
  alternatives_spanish:
  - Y fueron
  - Entonces vinieron
  lexicon: HALOT
  rationale: La forma wayyiqtol avanza la narración; en español, «entonces» conserva la secuencia y «fueron» comunica el movimiento hacia el rey de manera natural.
- source_word: חָצֵרָה
  english_pob_choice: in the court
  chosen_spanish: en el patio
  alternatives_spanish:
  - en la corte
  - en el atrio
  lexicon: HALOT
  rationale: El hebreo expresa dirección/ubicación hacia el recinto real. «Patio» es claro y natural en español; «atrio» o «corte» podrían sugerir otros matices menos seguros aquí.
- source_word: הַמְּגִלָּה
  english_pob_choice: the scroll
  chosen_spanish: el rollo
  alternatives_spanish:
  - el manuscrito
  - el pergamino
  lexicon: HALOT
  rationale: Aunque «scroll» suele traducirse «rollo» en español, aquí mantiene la referencia a un escrito enrollado sin añadir precisión material no explícita.
- source_word: הִפְקִדוּ
  english_pob_choice: they deposited
  chosen_spanish: depositaron
  alternatives_spanish:
  - dejaron en custodia
  - confiaron
  lexicon: HALOT
  rationale: El hiphil de פקד en este contexto implica poner algo en resguardo. «Depositaron» conserva la acción concreta y el valor de dejarlo para custodia sin explicitar más de lo necesario.
- source_word: בְּלִשְׁכַּת
  english_pob_choice: in the chamber of
  chosen_spanish: en la cámara de
  alternatives_spanish:
  - en el cuarto de
  - en la oficina de
  lexicon: HALOT
  rationale: «Cámara» preserva el matiz formal y oficial del término, más adecuado que «cuarto» u «oficina» en un contexto palaciego.
- source_word: אֱלִישָׁמָע
  english_pob_choice: Elishama
  chosen_spanish: Elisama
  alternatives_spanish:
  - Elishama
  lexicon: Convención onomástica española
  rationale: Se usa la forma tradicionalizada en español «Elisama», ampliamente inteligible y establecida para este nombre bíblico.
- source_word: הַסֹּפֵר
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  lexicon: HALOT
  rationale: «Escriba» conserva el valor oficial/cortesano y la correspondencia directa del sustantivo, sin sustituirlo por un cargo más moderno y menos preciso.
- source_word: וַיַּגִּידוּ
  english_pob_choice: they reported
  chosen_spanish: dieron a conocer
  alternatives_spanish:
  - informaron
  - contaron
  lexicon: HALOT
  rationale: La raíz נגד comunica decir/manifestar formalmente. «Dieron a conocer» refleja bien la idea de comunicar contenido de manera explícita en un contexto de corte.
- source_word: בְּאָזְנֵי הַמֶּלֶךְ
  english_pob_choice: in the hearing of the king
  chosen_spanish: en oídos del rey
  alternatives_spanish:
  - a oídos del rey
  - delante del rey
  lexicon: HALOT
  rationale: Se conserva el hebraísmo literal porque el idioma español lo entiende y preserva el color idiomático del original. Es preferible a suavizarlo por completo, ya que el POB inglés también lo retiene mediante nota.
- source_word: אֵת כָּל הַדְּבָרִים
  english_pob_choice: all the words
  chosen_spanish: todas las palabras
  alternatives_spanish:
  - todas las cosas
  - todos los asuntos
  lexicon: HALOT
  rationale: «Palabras» mantiene la referencia al contenido leído del rollo y preserva el énfasis verbal/textual del hebreo mejor que «asuntos» o «cosas».
translation_notes:
  revision_awareness: 'La revisión inglesa reciente reemplazó una subordinación temporal por una serie más directa de acciones coordinadas. Esta versión española refleja esa secuencia explícita: fueron, depositaron y dieron a conocer.'
  spanish_consistency_notes:
  - Se mantiene una terminología sobria y formal, apta para registro bíblico contemporáneo.
  - Se conserva el hebraísmo «en oídos del rey» con nota, siguiendo la decisión auditada del texto base en inglés.
  - Se evita introducir «SEÑOR» o equivalentes innecesarios, ya que este versículo no contiene el tetragrámaton ni una cita directa de él.
