translation:
  language: es
  text: Él te ha acercado[a], y a todos tus hermanos, los hijos de Leví, contigo; pero ustedes también buscan el sacerdocio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y a todos tus hermanos, los levitas, contigo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  english_pob_choice: has brought you near
  chosen_spanish: te ha acercado
  alternatives_spanish:
  - te ha traído cerca
  - te ha hecho acercarte
  lexicon: HALOT
  rationale: El verbo hiphil de קרב expresa causar cercanía o acceso. «Te ha acercado» conserva bien esa idea de acercamiento relacional y cultual, y en español suena natural sin perder la fuerza del reproche.
- source_word: אֹתְךָ
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: Pronombre objeto directo masculino singular
  rationale: El hebreo usa un objeto directo singular masculino; en español, el clítico «te» es la forma más natural y precisa en esta construcción.
- source_word: וְאֶת כָּל אַחֶיךָ בְנֵי לֵוִי
  english_pob_choice: and all your brothers, the sons of Levi
  chosen_spanish: y contigo a todos tus hermanos, los hijos de Leví
  alternatives_spanish:
  - y a todos tus hermanos, los levitas
  - y a todos tus hermanos, los hijos de Leví
  lexicon: HALOT
  rationale: «Hermanos» traduce literalmente אַחֶיךָ, y «los hijos de Leví» mantiene la apposición explícita de בְנֵי לֵוִי. Se evita sustituirlo sin más por «los levitas» para conservar la transparencia formal del hebreo.
- source_word: אִתָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con ustedes
  lexicon: Contexto sintáctico
  rationale: Aunque la vocalización del texto mostrado puede parecer femenina, el sentido contextual es claramente «con ustedes / contigo» referido al grupo de Koré y sus compañeros. «Contigo» encaja bien en la sintaxis española con el dativo anterior.
- source_word: וּבִקַּשְׁתֶּם
  english_pob_choice: yet you are seeking
  chosen_spanish: y además buscan
  alternatives_spanish:
  - y buscan también
  - pero buscan
  lexicon: HALOT
  rationale: בקש puede significar «buscar» o «pretender/solicitar». En este contexto la idea es que, además de lo ya concedido, todavía pretenden algo más. «Y además buscan» preserva la adición y la reproche implícito; en español el presente simple funciona bien como valor de acusación vigente.
- source_word: גַּם
  english_pob_choice: as well
  chosen_spanish: además
  alternatives_spanish:
  - también
  - incluso
  lexicon: HALOT
  rationale: גַּם añade una pretensión adicional. «Además» comunica esa ampliación de manera clara y digna en español.
- source_word: כְּהֻנָּה
  english_pob_choice: the priesthood
  chosen_spanish: el sacerdocio
  alternatives_spanish:
  - el oficio sacerdotal
  - el sacerdocio mismo
  lexicon: HALOT
  rationale: El término designa el estatus/función sacerdotal, no solo una actividad. «El sacerdocio» preserva esa distinción institucional entre el servicio levítico y el sacerdocio aarónico.
theological_decisions:
- issue: Distinción cultual entre levitas y sacerdotes
  english_pob_reading: the priesthood
  chosen_spanish_reading: el sacerdocio
  alternative_spanish_readings:
  - el oficio sacerdotal
  - el servicio sacerdotal
  rationale: La reprensión apunta a que se busca un cargo que excede el servicio levítico ya concedido. «El sacerdocio» mantiene la diferencia teológica e institucional central del pasaje.
  doctrine_reference: Números 16:10; distinción levítica-sacerdotal en la Torá
translation_notes:
  revision_awareness: La redacción sigue el alto acuerdo del último control de revisión y conserva la tensión entre la cercanía concedida por Dios y la pretensión de buscar un rango cultual mayor.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando aparece el nombre divino; aquí no aparece.
  - Se conserva «Leví» con acento agudo conforme al uso español bíblico estándar.
  - Se prefirió un presente acusativo («buscan») por naturalidad en español, sin perder el sentido de reproche continuo del hebreo.
