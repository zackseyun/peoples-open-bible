translation:
  language: es
  text: Pero para tus consagrados[a] había una luz muy grande; al oír su voz, pero sin ver su forma, puesto que ellos no habían sufrido las mismas cosas[b], los tenían por bienaventurados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus santos». El griego ὁσίοις se refiere a los que son piadosos o consagrados a Dios.
    reason: lexical_alternative
  - marker: b
    text: El griego ἐπεπώθεισαν es difícil en este contexto. Aunque a menudo puede significar «haber anhelado», aquí se entiende, por el contexto, en el sentido de no haber pasado por las mismas aflicciones.
    reason: alternative_reading
lexical_decisions:
- source_word: τοῖς ... ὁσίοις σου
  english_pob_choice: for your holy ones
  chosen_spanish: para tus santos
  alternatives_spanish:
  - para tus santos fieles
  - para tus hombres santos
  lexicon: LSJ
  rationale: ὅσιοι denota personas piadosas o consagradas a Dios. En español, «santos» comunica bien esa pertenencia y mantiene una lectura bíblica natural; «santos fieles» o «hombres santos» serían más explicativos, pero menos directos.
- source_word: μέγιστον ... φῶς
  english_pob_choice: very great light
  chosen_spanish: una luz muy grande
  alternatives_spanish:
  - la mayor luz
  - una luz grandísima
  lexicon: LSJ
  rationale: μέγιστον expresa superlativo. «Una luz muy grande» conserva la fuerza sin sonar forzado en español; «la mayor luz» podría sonar más absoluto de lo que exige el contexto.
- source_word: φωνὴν
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  lexicon: LSJ
  rationale: Aquí el contraste con μορφή favorece «voz» más que «sonido», porque sugiere percepción personal y no mero ruido.
- source_word: μορφὴν
  english_pob_choice: form
  chosen_spanish: forma
  alternatives_spanish:
  - apariencia
  - figura
  lexicon: LSJ
  rationale: «Forma» mantiene el contraste entre oír y no ver, sin añadir rasgos físicos que el griego no especifica.
- source_word: ἐπεπώθεισαν
  english_pob_choice: had not suffered the same things
  chosen_spanish: no habían sufrido las mismas cosas
  alternatives_spanish:
  - no habían padecido lo mismo
  - no habían experimentado las mismas cosas
  lexicon: LSJ
  rationale: 'Sigo la lectura contextual adoptada en el audit trail: el verbo es difícil, pero aquí se entiende en sentido experiencial/aflictivo, no como «desear». «Sufrir» conserva la carga de aflicción implícita en el contexto de los juicios.'
- source_word: ἐμακάριζον
  english_pob_choice: they counted them blessed
  chosen_spanish: los tenían por bienaventurados
  alternatives_spanish:
  - los consideraban dichosos
  - los contaban por benditos
  lexicon: LSJ
  rationale: μακαρίζω significa llamar o contar bienaventurado. «Los tenían por bienaventurados» preserva el matiz bíblico y evita una paráfrasis excesiva.
theological_decisions:
- issue: Referente implícito de los participios y del verbo finito
  english_pob_reading: The Egyptians/hearers are the ones hearing the Israelites' voice without seeing their form, and then counting them blessed.
  chosen_spanish_reading: Los oyentes implícitos son quienes oyen la voz de los santos sin ver su forma y luego los declaran bienaventurados.
  alternative_spanish_readings:
  - Los santos son quienes oyen otra voz sin ver forma alguna
  - La frase es demasiado comprimida y podría reflejar una percepción mutua
  rationale: La sintaxis y el contexto narrativo de la plaga de tinieblas favorecen que los opresores perciban indirectamente a los justos y reconozcan su dicha. La traducción mantiene esa relación sin explicitar más de lo que el griego permite.
  doctrine_reference: Wisdom of Solomon 18:1 in context of the plagues narrative
translation_notes:
  revision_awareness: 'El draft sigue la revisión más reciente del audit trail, que corrigió el sentido de ἐπεπώθεισαν para negarlo en contexto: «had not suffered the same things». Se mantiene la estructura general de la traducción inglesa aprobada, pero se reexpresa en español natural y se conservan las tensiones léxicas relevantes.'
  spanish_consistency_notes:
  - Se usa «santos» como equivalente principal de ὁσίοις, coherente con el valor bíblico-religioso de la palabra sin recurrir a un calco eclesiástico inevitable.
  - Se usa «forma» para μορφή para mantener el contraste visual/sonoro.
  - Se conserva «bienaventurados» para μακαρίζω por su resonancia bíblica y su precisión semántica.
  - Se evita «SEÑOR» porque este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
