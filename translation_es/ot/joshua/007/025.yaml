translation:
  language: es
  text: 'Y Josué dijo[a]: «¿Por qué nos has traído desgracia? Yahvé te traerá desgracia en este día». Y todo Israel lo apedreó con piedras[c][b], y los quemaron con fuego y los apedrearon con piedras.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¿Por qué nos has perturbado? Yahvé te perturbará»; se conserva el juego de palabras con el mismo verbo, aquí expresado como «traer desgracia».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo pasa del singular («lo») al plural («los») después de nombrar a Acán; la traducción conserva ese cambio sin armonizarlo.
    reason: alternative_reading
  - marker: c
    text: En este versículo se usan dos verbos hebreos distintos para la lapidación; ambos se refieren a ejecución por piedras y se traducen de manera similar en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲכַרְתָּנוּ / יַעְכֳּרְךָ
  english_pob_choice: have troubled us / will trouble you
  chosen_spanish: nos has causado problema / te causará problema
  alternatives_spanish:
  - nos has turbado / te turbará
  - nos has traído trouble / te traerá trouble
  lexicon: HALOT
  rationale: El hebreo usa el mismo verbo para ambas cláusulas, con juego de palabras. En español, «causar problema» conserva bien la repetición y el contraste recíproco sin sonar demasiado arcaico. «Turbado» es posible, pero pierde algo del matiz concreto de perturbación o desastre del contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton como nombre propio divino. «Yahvé» es natural en español bíblico y mantiene la referencia personal del nombre revelado, en lugar de sustituirlo por un título.
- source_word: בַּיּוֹם הַזֶּה
  english_pob_choice: this day
  chosen_spanish: este día
  alternatives_spanish:
  - hoy
  - en este día
  lexicon: HALOT
  rationale: «Este día» refleja con sobriedad la inmediatez solemne del hebreo y conserva el tono formal del juicio.
- source_word: וַיִּרְגְּמוּ אֹתוֹ ... אֶבֶן
  english_pob_choice: stoned him with stones
  chosen_spanish: lo apedreó con piedras
  alternatives_spanish:
  - lo lapidó
  - lo apedrearon con piedras
  lexicon: HALOT
  rationale: El hebreo expresa ejecución por pedradas y mantiene objeto e instrumento. En español, «apedrear con piedras» conserva esa redundancia enfática mejor que un simple «lapidar». Se usa singular en «lo apedreó» para reflejar el pronombre singular del texto hebreo en esta primera mención.
- source_word: וַיִּשְׂרְפוּ אֹתָם בָּאֵשׁ
  english_pob_choice: they burned them with fire
  chosen_spanish: los quemaron con fuego
  alternatives_spanish:
  - los incendiaron
  - los quemaron
  lexicon: HALOT
  rationale: «Quemar con fuego» mantiene el énfasis instrumental del hebreo. Se conserva el plural «los» para reflejar el cambio textual del singular al plural, sin armonizarlo.
- source_word: וַיִּסְקְלוּ אֹתָם בָּאֲבָנִים
  english_pob_choice: stoned them with stones
  chosen_spanish: los apedrearon con piedras
  alternatives_spanish:
  - los lapidaron
  - los cubrieron con piedras
  lexicon: HALOT
  rationale: El segundo verbo también denota lapidación. Como en inglés, el español no puede distinguir fácilmente ambos verbos sin forzar el estilo, así que se mantiene la traducción equivalente y se documenta la variación léxica.
theological_decisions:
- issue: Cambio de singular a plural tras la referencia a Acán
  english_pob_reading: Retain the Hebrew shift from singular ('him') to plural ('them') in the main text.
  chosen_spanish_reading: 'Conservar el paso de singular a plural: primero «lo», después «los».'
  alternative_spanish_readings:
  - Uniformar todo en singular refiriéndolo solo a Acán
  - Interpretar el plural únicamente como sus pertenencias
  rationale: El texto masorético cambia explícitamente de singular a plural. Mantener ese desplazamiento evita suavizar una tensión real del pasaje y deja abierta la amplitud del juicio según el contexto narrativo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó la primera cláusula de 'have brought trouble on us' a 'have troubled us' para una correspondencia léxica más estrecha. La redacción española adopta un equivalente igualmente directo («causado problema» / «causará problema») y conserva el paralelismo verbal. También se respetó la observación sobre el cambio de singular a plural en los pronombres y la doble lapidación con dos verbos hebreos distintos.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton en todo el texto.
  - Se conserva «apedrear con piedras» para reflejar la concreción del hebreo, aunque resulte redundante.
  - Se mantiene el cambio de número del texto hebreo sin explicitarlo en el cuerpo principal más allá de la gramática española.
  - El registro es formal y publicable, evitando calcos innecesarios pero preservando el sentido auditado.
