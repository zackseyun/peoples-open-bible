translation:
  language: es
  text: Entonces Joab salió de la presencia de David y envió mensajeros tras Abner[a], y lo hicieron volver del pozo de Sirá. Pero David no lo sabía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O quizá «desde Bor-Sirá», si el hebreo se toma como un nombre de lugar y no como «el pozo de Sirá».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - partió
  lexicon: HALOT
  rationale: יצא en la secuencia narrativa expresa movimiento de salida; «salió» conserva ese valor de manera natural en español.
- source_word: מֵעִם דָּוִד
  english_pob_choice: from David
  chosen_spanish: de donde estaba David
  alternatives_spanish:
  - de David
  - alejándose de David
  lexicon: HALOT
  rationale: La expresión con עִם marca movimiento desde la compañía de alguien. «De donde estaba David» hace explícita esa relación sin sonar forzado en español.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - emisarios
  lexicon: HALOT
  rationale: En este contexto son agentes humanos enviados con un encargo, no seres celestiales; «mensajeros» comunica bien ese sentido.
- source_word: אַחֲרֵי אַבְנֵר
  english_pob_choice: after Abner
  chosen_spanish: tras Abner
  alternatives_spanish:
  - en pos de Abner
  - en persecución de Abner
  lexicon: HALOT
  rationale: אַחֲרֵי indica seguimiento o persecución. «Tras Abner» mantiene la brevedad y deja que el contexto sugiera la acción de alcanzarlo.
- source_word: וַיָּשִׁבוּ אֹתוֹ
  english_pob_choice: they brought him back
  chosen_spanish: lo hicieron volver
  alternatives_spanish:
  - lo trajeron de vuelta
  - lo regresaron
  lexicon: HALOT
  rationale: El causativo de שוב pide una expresión causativa en español. «Lo hicieron volver» refleja con fidelidad la fuerza verbal sin una literalidad extraña.
- source_word: מִבּוֹר הַסִּרָה
  english_pob_choice: from the well of Sirah
  chosen_spanish: desde el pozo de Sirá
  alternatives_spanish:
  - desde el pozo de Sira
  - desde Bor-Sirá
  lexicon: HALOT
  rationale: בּוֹר puede ser pozo, cisterna o foso. «Pozo» es una opción natural aquí; se conserva la posibilidad de leerlo como topónimo en la nota textual.
- source_word: וְדָוִד לֹא יָדָע
  english_pob_choice: But David did not know it
  chosen_spanish: Pero David no lo sabía
  alternatives_spanish:
  - Y David no lo sabía
  - Pero David no estaba enterado
  lexicon: HALOT
  rationale: ידע en este contexto indica falta de conocimiento acerca de la acción de Joab. «No lo sabía» es idiomático y conserva el sentido completo.
translation_notes:
  revision_awareness: 'La versión en español sigue el texto hebreo con apoyo del control auditado en inglés: conserva la secuencia narrativa, el carácter humano de los mensajeros, la ambigüedad de בּוֹר הַסִּרָה y el hecho de que David no supo lo ocurrido. No se requirieron revisiones sustanciales respecto del análisis base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «mensajeros» para מלאכים en sentido humano narrativo, no «ángeles».
  - Se preserva la ambigüedad de la expresión toponímica/lexical mediante nota.
  - El orden español se ajusta para fluidez sin alterar la progresión hebrea de acciones.
