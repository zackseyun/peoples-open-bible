    reason: lexical_alternative
  - marker: b
    text: 'O: «la presa no cesa», conservando la idea de violencia depredadora continua.'
    reason: alternative_reading
  - marker: c
    text: «Saqueo» también puede traducirse «robo violento»; el término hebreo evoca despojo por la fuerza.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «ciudad de sangre» por «ciudad sanguinaria» para comunicar con claridad en español el idiomatismo hebreo y mantener la fuerza acusatoria del verso, mientras la nota preserva el literal «ciudad de sangres». Se corrige la redacción de la nota [a], se añade la alternativa léxica de פֶּרֶק según el rastro inglés, y se ajusta «no se aparta» a «nunca se aparta» para reflejar mejor el valor durativo de לֹא יָמִישׁ.
