revisions:
- from: Y cuando el rey hubo dado su aprobación[a], y él hubo obtenido el control del cargo, inmediatamente volvió a sus compatriotas hacia el modo de vida griego.
  to: Y cuando el rey dio su aprobación[a] y él tomó control del cargo, inmediatamente desvió a sus compatriotas al modo de vida griego.
  rationale: Se sustituyó «hubo dado / hubo obtenido» por formas más naturales en español narrativo, sin perder la secuencia de acciones previas. Se reemplazó «volvió ... hacia» por «desvió ... al», que expresa mejor la acción causativa de μετέστησε y produce una frase idiomática y clara sobre la helenización cultural.
