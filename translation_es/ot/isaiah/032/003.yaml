    text: O ‘no estarán cegados’. El verbo hebreo puede denotar ojos que ya no están impedidos u oscurecidos.
    reason: lexical_alternative
  revision_rationale: Se reemplaza ‘oscuros’ por ‘velados’ para reflejar con más naturalidad en español la idea de ojos ya no impedidos u oscurecidos, en línea con la decisión inglesa revisada ‘will not be dim’. Se mantiene la nota alternativa con ‘cegados’ como opción más fuerte ya documentada, y se corrige la colocación del marcador de nota.
