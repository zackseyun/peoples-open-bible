  text: וְ/ה֤וּא יַשְׁקִ֨ט וּ/מִ֥י יַרְשִׁ֗עַ וְ/יַסְתֵּ֣ר פָּ֭נִים וּ/מִ֣י יְשׁוּרֶ֑/נּוּ וְ/עַל גּ֖וֹי וְ/עַל אָדָ֣ם יָֽחַד׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/job/034/029.yaml
  text: If he gives quietness[a], who can condemn? If he hides his face[c][b], who can behold him? This is so for a nation and for a man alike.
  footnotes:
  - marker: a
    text: Or 'who can declare him guilty?' The Hebrew verb can carry a forensic sense of pronouncing someone wicked or guilty.
    reason: lexical_alternative
  - marker: b
    text: Or 'who can see him?' The verb means 'look at' or 'behold.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'and upon a nation and upon a man together'; the sense is that this applies equally to both a nation and an individual man.
    reason: lexical_alternative
