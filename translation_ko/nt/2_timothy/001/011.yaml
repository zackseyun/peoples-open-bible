lexical_decisions:
- source_word: ἐτέθην
  english_pob_choice: I was appointed
  chosen_korean: 세움을 받았습니다
  alternatives_korean:
  - 임명되었습니다
  - 정해졌습니다
  lexicon: BDAG
  rationale: τίθημι의 수동태로, 신적 행위자(하나님)에 의한 임명을 함의한다. 「세움을 받다」는 그 수동적·신적 임명의 의미를 자연스럽게 담는다.
- source_word: κῆρυξ
