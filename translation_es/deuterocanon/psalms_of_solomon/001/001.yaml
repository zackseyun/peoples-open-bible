translation:
  language: es
  text: Clamé a Yahvé cuando fui afligido[a] hasta el fin[b], a Dios cuando los pecadores[c] atacaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en mi ser afligido»; el infinitivo articular con ἐν también puede expresarse de manera más literal en español.'
    reason: previous_rendering
  - marker: b
    text: 'O posiblemente: «completamente» o «continuamente»; la expresión «hasta el fin» traduce εἰς τέλος de forma bastante literal y puede funcionar como intensificador idiomático.'
    reason: lexical_alternative
  - marker: c
    text: El verbo griego detrás de «atacaron» es difícil. Puede sugerir también «vinieron contra mí» u otra acción hostil; la traducción sigue el sentido probable en este lamento.
    reason: alternative_reading
lexical_decisions:
- source_word: ἘΒΟΗΣΑ
  english_pob_choice: I cried out
  chosen_spanish: Clamé
  alternatives_spanish:
  - Grité
  - Exclamé
  lexicon: LSJ
  rationale: El aoristo de βοάω expresa un clamor urgente dirigido a Dios. En español, «clamé» conserva el tono de súplica intensa sin sonar tan mecánico como «grité» en un contexto de oración.
- source_word: πρὸς Κύριον
  english_pob_choice: to the Lord
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al Señor
  - al Dueño
  lexicon: LSJ
  rationale: El proyecto pide Yahvé para יהוה; aquí Κύριον aparece como el destinatario divino de la oración. «A Yahvé» preserva la dirección del clamor y evita la máscara «SEÑOR».
- source_word: ἐν τῷ θλίβεσθαί με
  english_pob_choice: when I was afflicted
  chosen_spanish: cuando fui afligido
  alternatives_spanish:
  - en mi ser afligido
  - cuando estaba afligido
  lexicon: LSJ
  rationale: El infinitivo articular con ἐν es temporal/circunstancial. «Cuando fui afligido» comunica ese valor temporal y mantiene la pasiva de θλίβεσθαι sin convertirla solo en un sustantivo abstracto.
- source_word: εἰς τέλος
  english_pob_choice: to the end
  chosen_spanish: hasta el fin
  alternatives_spanish:
  - completamente
  - del todo
  - continuamente
  lexicon: LSJ
  rationale: La frase es literal y puede intensificar duración o extremidad. «Hasta el fin» es una forma natural en español que conserva la fuerza y deja abierta la ambigüedad idiomática documentada por el POB.
- source_word: πρὸς τὸν θεὸν
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - al Dios
  lexicon: LSJ
  rationale: Se mantiene el paralelismo con la primera mitad del verso. «A Dios» es la forma directa y natural para el destinatario del clamor.
- source_word: ἐν τῷ ἐπιδέσθαι
  english_pob_choice: when sinners attacked
  chosen_spanish: cuando los pecadores atacaron
  alternatives_spanish:
  - cuando los pecadores vinieron contra mí
  - cuando los pecadores se abalanzaron
  lexicon: LSJ
  rationale: El verbo es difícil; el contexto de lamentación sugiere una acción hostil. «Atacaron» transmite la idea probable sin afirmar de manera excesiva una sola matización del verbo.
- source_word: ἁμαρτωλοῦς
  english_pob_choice: sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los malvados
  - los injustos
  lexicon: LSJ
  rationale: El sustantivo denota personas pecadoras. El artículo en español naturaliza la referencia y conserva el paralelo con el discurso de lamentación.
theological_decisions:
- issue: Tratamiento del título divino κύριος en un contexto de oración
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: La política del proyecto para el nombre divino favorece «Yahvé» cuando el contexto apunta al Dios de Israel. Aunque el griego tenga Κύριον, la dirección de la súplica y el paralelismo con θεὸν justifican explicitar el nombre divino en español.
  doctrine_reference: 'DOCTRINE.md: divine name handling; κύριος alluding to YHWH'
- issue: Conservar el paralelismo entre «al Señor» y «a Dios»
  english_pob_reading: Retain both titles in parallel
  chosen_spanish_reading: 'Mantener la doble apelación: «a Yahvé ... a Dios»'
  alternative_spanish_readings:
  - Fusionar las dos apelaciones
  - reducir a una sola referencia
  rationale: El verso repite la dirección del clamor con dos miembros paralelos. Mantener ambos preserva la estructura poética y la intensificación de la lamentación.
  doctrine_reference: Poetic parallelism; address to God in lament psalms
- issue: Cómo reflejar la dificultad del verbo ἐπιδέσθαι sin sobrerresolverla
  english_pob_reading: when sinners attacked
  chosen_spanish_reading: cuando los pecadores atacaron
  alternative_spanish_readings:
  - cuando los pecadores vinieron contra mí
  - cuando los pecadores me asaltaron
  rationale: La traducción conserva la lectura contextual probable sin borrar la nota de incertidumbre lexical. «Atacaron» es suficientemente amplio para incluir las posibles matizaciones hostiles del verbo.
  doctrine_reference: Lexical ambiguity handling in source-grounded translation
translation_notes:
  revision_awareness: 'El texto inglés de referencia tuvo una corrección importante en la primera mitad del verso: la expresión temporal de ἐν τῷ θλίβεσθαί με pasó a «when I was afflicted», y se mantuvo «to the end» como literal de εἰς τέλος. También se consolidó la lectura hostil de ἐπιδέσθαι en la segunda mitad. La versión española sigue esa revisión y conserva la ambigüedad documentada en notas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» según el estándar del proyecto para el nombre divino.
  - Se mantiene «Dios» para θεός y el paralelismo poético del verso.
  - «Pecadores» traduce ἁμαρτωλοῦς de forma directa y bíblicamente reconocible en español.
  - Se evita suavizar el contraste entre el clamor a Yahvé y a Dios, porque el griego conserva ambas apelaciones.
  - La puntuación reproduce dos miembros paralelos unidos por coma, como en el original.
