translation:
  language: es
  text: Por tanto, en aquel tiempo, cuando todos los pueblos oyeron el sonido de la corneta, la flauta, la lira, el trígono[a], el salterio, y toda clase de música, todos los pueblos, naciones y lenguas se postraron y adoraron la imagen de oro que había levantado el rey Nabucodonosor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación exacta de varios nombres de instrumentos es incierta. «Trígono» puede referirse a un arpa triangular, y «salterio» puede denotar una clase de cítara o arpa.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל־קֳבֵל דְּנָה
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: La locución aramea introduce una consecuencia; «Por eso» mantiene esa fuerza inferencial en español con naturalidad y sin perder el enlace lógico del relato.
- source_word: בֵּהּ זִמְנָא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese momento
  - entonces
  lexicon: HALOT
  rationale: La expresión marca el momento narrativo de la ejecución del mandato. «En aquel tiempo» es idiomático y conserva el matiz temporal sin sobreprecisar.
- source_word: כְּדִי שָׁמְעִין
  english_pob_choice: when ... heard
  chosen_spanish: cuando ... oyeron
  alternatives_spanish:
  - al oír
  - tan pronto como oyeron
  lexicon: HALOT
  rationale: El participio con כְּדִי expresa simultaneidad temporal. «Cuando» conserva la secuencia sin añadir una inmediatez que el hebreo/aramaico no exige explícitamente.
- source_word: כָּל עַמְמַיָּא
  english_pob_choice: all the peoples
  chosen_spanish: todos los pueblos
  alternatives_spanish:
  - todos los pueblos del imperio
  - todas las gentes
  lexicon: HALOT
  rationale: El plural distingue grupos étnicos o colectivos. «Pueblos» reproduce esa fuerza mejor que un singular genérico.
- source_word: קָל
  english_pob_choice: the sound
  chosen_spanish: el sonido
  alternatives_spanish:
  - la voz
  - el ruido
  lexicon: HALOT
  rationale: Aquí se trata del sonido audible de los instrumentos, no de una voz hablada.
- source_word: קַרְנָא
  english_pob_choice: horn
  chosen_spanish: corneta
  alternatives_spanish:
  - cuerno
  - trompeta
  lexicon: HALOT
  rationale: Aunque el término es amplio, en español «corneta» funciona como equivalente natural de un instrumento de viento de este tipo; evita una especificación más técnica no asegurada por el texto.
- source_word: מַשְׁרוֹקִיתָא
  english_pob_choice: pipe
  chosen_spanish: flauta
  alternatives_spanish:
  - pífano
  - flauta dulce
  lexicon: HALOT
  rationale: Es un instrumento de viento; «flauta» es el equivalente comprensible y musicalmente natural, sin pretender fijar una identificación demasiado precisa.
- source_word: קיתרס
  english_pob_choice: lyre
  chosen_spanish: lira
  alternatives_spanish:
  - cítara
  - kithara
  lexicon: HALOT
  rationale: El préstamo arameo apunta a un cordófono emparentado con la kithara griega. «Lira» ofrece un equivalente claro en español y mantiene el carácter de instrumento de cuerda.
- source_word: שַׂבְּכָא
  english_pob_choice: trigon
  chosen_spanish: trígono
  alternatives_spanish:
  - arpa triangular
  - sambuca
  lexicon: HALOT
  rationale: La identificación exacta es incierta. «Trígono» conserva la solución tradicional sin fingir una precisión moderna que el texto no garantiza.
- source_word: פְּסַנְטֵרִין
  english_pob_choice: psaltery
  chosen_spanish: salterio
  alternatives_spanish:
  - psalterio
  - cítara
  lexicon: HALOT
  rationale: «Salterio» es el equivalente tradicional en español para este instrumento de cuerda; la identificación concreta sigue siendo incierta, pero el término es reconocido y fiel al conjunto de instrumentos enumerados.
- source_word: וְכֹל זְנֵי זְמָרָא
  english_pob_choice: and every kind of music
  chosen_spanish: y toda clase de música
  alternatives_spanish:
  - y toda suerte de música
  - y todo tipo de música
  lexicon: HALOT
  rationale: La frase resume la lista precedente y amplía el alcance a la totalidad de la música/instrumentación. «Toda clase de música» conserva esa amplitud de manera natural.
- source_word: נָפְלִין
  english_pob_choice: fell down
  chosen_spanish: se postraron
  alternatives_spanish:
  - cayeron
  - se inclinaron
  lexicon: HALOT
  rationale: El verbo literal es «caer», pero aquí expresa la postura de postración. «Se postraron» comunica el gesto corporal con mayor claridad en español y prepara el paralelo con «adoraron».
- source_word: סָגְדִין
  english_pob_choice: worshiped
  chosen_spanish: adoraron
  alternatives_spanish:
  - rindieron culto
  - se postraron ante
  lexicon: HALOT
  rationale: En el contexto cultual de la imagen, el acto va más allá de una simple reverencia civil. «Adoraron» preserva esa fuerza religiosa, en línea con la lectura inglesa.
- source_word: לְצֶלֶם דַּהֲבָא
  english_pob_choice: the golden image
  chosen_spanish: la imagen de oro
  alternatives_spanish:
  - la imagen dorada
  - el ídolo de oro
  lexicon: HALOT
  rationale: «Imagen de oro» conserva el hebraísmo/aramaísmo del constructo sin añadir la carga interpretativa de «ídolo», aunque el contexto sea idolátrico.
- source_word: דִּי הֲקֵים
  english_pob_choice: that ... had set up
  chosen_spanish: que había levantado
  alternatives_spanish:
  - que había erigido
  - que había establecido
  lexicon: HALOT
  rationale: El verbo significa «levantar/erigir». «Había levantado» reproduce el sentido de la construcción y mantiene el perfecto anterior al acto de adoración.
- source_word: נְבוּכַדְנֶצַּר מַלְכָּא
  english_pob_choice: King Nebuchadnezzar
  chosen_spanish: el rey Nabucodonosor
  alternatives_spanish:
  - el rey Nebucadnezar
  - Nabucodonosor, el rey
  lexicon: HALOT
  rationale: El título sigue al nombre en arameo; en español es natural anteponer el artículo y el título pospuesto, manteniendo la referencia histórica clara.
theological_decisions:
- issue: Naturaleza del acto frente a la imagen
  english_pob_reading: worshiped
  chosen_spanish_reading: adoraron
  alternative_spanish_readings:
  - rindieron culto
  - se postraron ante
  rationale: El contexto no describe mera cortesía política, sino una acción religiosa ante una imagen de oro. «Adoraron» conserva esa carga cultual sin exceder el texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se siguió el razonamiento auditado del texto inglés: se mantuvo la secuencia temporal y la fuerza cultual del acto, pero se ajustaron los nombres de instrumentos a equivalentes españoles naturales y reconocibles, preservando la incertidumbre donde el original no permite precisión.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «pueblos» para עַמְמַיָּא y «naciones» para אֻמַיָּא, manteniendo la tríada diferenciada.
  - Se tradujo el acto final con un verbo de adoración y se separó de la postración física para reflejar la doble dimensión del arameo.
  - Se evitó sobrerinterpretar los instrumentos; donde el español dispone de un equivalente tradicional claro, se usó, y donde no, se mantuvo una solución cauta.
