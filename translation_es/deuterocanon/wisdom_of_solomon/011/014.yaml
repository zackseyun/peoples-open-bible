translation:
  language: es
  text: Pues rechazaron con burla al que hacía mucho había sido arrojado cuando fue expuesto[a]; pero al final de aquellos sucesos se maravillaron[b], cuando tuvieron sed, a diferencia de los justos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, el niño que una vez fue expuesto y arrojado; una alusión a Moisés.
    reason: cross_reference
  - marker: b
    text: 'O: «al final de los desenlaces»; el griego puede referirse al resultado final de los sucesos que se habían desarrollado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἐκθέσει
  english_pob_choice: at his exposure
  chosen_spanish: en su exposición
  alternatives_spanish:
  - cuando fue expuesto
  - en su abandono
  lexicon: LSJ
  rationale: ἔκθεσις se refiere aquí a la exposición de un niño, es decir, al hecho de ser puesto afuera y abandonado. «En su exposición» conserva el sustantivo concreto y mantiene la alusión histórica sin explicitarla de más en el texto principal.
- source_word: ῥιφέντα
  english_pob_choice: been cast out
  chosen_spanish: había sido arrojado
  alternatives_spanish:
  - había sido echado
  - había sido arrojado fuera
  lexicon: BDAG
  rationale: El participio de ῥίπτω comunica la idea de ser arrojado o echado. «Había sido arrojado» reproduce bien la fuerza verbal y suena natural en español.
- source_word: ἀπεῖπον
  english_pob_choice: they rejected
  chosen_spanish: rechazaron
  alternatives_spanish:
  - repudiaron
  - desconocieron
  lexicon: LSJ
  rationale: El verbo expresa rechazo o repudio. «Rechazaron» es directo y fiel al sentido de la acción de los egipcios.
- source_word: χλευάζοντες
  english_pob_choice: with mockery
  chosen_spanish: con burla
  alternatives_spanish:
  - burlándose
  - con escarnio
  lexicon: BDAG
  rationale: El participio marca el modo del rechazo. «Con burla» conserva el matiz adverbial y evita una paráfrasis demasiado libre.
- source_word: ἐπὶ τέλει
  english_pob_choice: at the end
  chosen_spanish: al final
  alternatives_spanish:
  - al fin
  - en el desenlace
  lexicon: LSJ
  rationale: La expresión señala la etapa conclusiva de los acontecimientos. «Al final» es claro, sobrio y acorde con el griego.
- source_word: τῶν ἐκβάσεων
  english_pob_choice: of those events
  chosen_spanish: de aquellos sucesos
  alternatives_spanish:
  - de aquellos desenlaces
  - de aquellos resultados
  lexicon: LSJ
  rationale: ἐκβάσεις puede significar desenlaces, resultados o curso de los acontecimientos. «Sucesos» mantiene el carácter narrativo y evita una solución demasiado técnica.
- source_word: ἐθαύμασαν
  english_pob_choice: they marveled
  chosen_spanish: se maravillaron
  alternatives_spanish:
  - se asombraron
  - quedaron maravillados
  lexicon: BDAG
  rationale: El aoristo expresa asombro. «Se maravillaron» es una equivalencia natural y digna en español.
- source_word: οὐχ ὅμοια δικαίοις
  english_pob_choice: unlike the righteous
  chosen_spanish: no como los justos
  alternatives_spanish:
  - diferente de los justos
  - de modo distinto a los justos
  lexicon: LSJ
  rationale: La frase contrasta la sed de ellos con la de los justos del contexto previo. «No como los justos» conserva el contraste sin volverlo interpretativo.
- source_word: διψήσαντες
  english_pob_choice: having thirsted
  chosen_spanish: habiendo tenido sed
  alternatives_spanish:
  - después de tener sed
  - cuando tuvieron sed
  lexicon: BDAG
  rationale: El participio circunstancial se puede expresar en español con una construcción de perfecto compuesto. «Habiendo tenido sed» retiene la relación temporal y la referencia a la sed.
theological_decisions:
- issue: Alusión al niño expuesto y luego rechazado
  english_pob_reading: The verse refers to Moses, once exposed as an infant and later rejected by the Egyptians, without naming him explicitly in the translation.
  chosen_spanish_reading: El versículo alude a Moisés de manera indirecta, sin nombrarlo en el texto principal.
  alternative_spanish_readings:
  - Nombrarlo explícitamente como Moisés en el texto principal.
  - Añadir una paráfrasis explicativa dentro del versículo.
  rationale: El griego describe a la figura por alusión y no por nombre. Mantener esa reserva respeta la economía del original y evita introducir una glosa interpretativa en el cuerpo del texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se siguió el último pass de revisión del inglés POB: se mantuvo la reordenación que pone el rechazo como acción principal del sujeto, se conservó la alusión implícita al niño expuesto, y se reflejó el valor de ἐκβάσεις con una opción española sobria que no fuerza una interpretación técnica. También se preservó el contraste final entre su sed y la de los justos.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponde; este versículo no lo contiene.
  - Se prefirió «justos» para δικαίοις, manteniendo el sustantivo/adjetivo en forma natural y reconocible en español bíblico.
  - «Con burla» conserva el valor adverbial de χλευάζοντες sin introducir un giro más interpretativo que el griego.
  - La frase «al final de aquellos sucesos» deja abierta la alternativa de «resultados/desenlaces», como en la nota inglesa.
