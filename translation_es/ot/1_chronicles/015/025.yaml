translation:
  language: es
  text: Entonces David, y los ancianos de Israel, y los jefes de los millares, fueron a llevar el arca del pacto de Yahvé desde la casa de Obed-edom con alegría.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: So ... went
  chosen_spanish: Así ... iban
  alternatives_spanish:
  - Y aconteció ...
  - Y sucedió ...
  lexicon: HALOT
  rationale: El waw-consecutivo introduce la escena narrativa; en español, «Así» conserva la transición discursiva sin forzar una fórmula más pesada. El verbo en forma perifrástica mantiene la acción en marcha y respeta el valor de contexto.
- source_word: זִקְנֵי יִשְׂרָאֵל
  english_pob_choice: the elders of Israel
  chosen_spanish: los ancianos de Israel
  alternatives_spanish:
  - los mayores de Israel
  lexicon: HALOT
  rationale: Es la equivalencia normal y precisa del grupo de liderazgo reconocido en Israel; no requiere ampliación interpretativa.
- source_word: שָׂרֵי הָאֲלָפִים
  english_pob_choice: the commanders of the thousands
  chosen_spanish: los jefes de los millares
  alternatives_spanish:
  - los capitanes de millares
  - los comandantes de los millares
  lexicon: HALOT
  rationale: שָׂרֵי expresa jefatura o autoridad, y אֲלָפִים conserva la idea de unidades de mil. «Jefes de los millares» refleja la estructura hebrea con naturalidad en español y evita una sobreinterpretación militar excesiva.
- source_word: הַהֹלְכִים
  english_pob_choice: went
  chosen_spanish: iban
  alternatives_spanish:
  - fueron
  - andaban
  lexicon: HALOT
  rationale: El participio describe a los grupos como sujetos en movimiento en la escena; «iban» reproduce bien ese trasfondo progresivo en español y se integra con «a subir».
- source_word: לְהַעֲלוֹת
  english_pob_choice: to bring up
  chosen_spanish: a subir
  alternatives_spanish:
  - a traer arriba
  - a hacer subir
  lexicon: HALOT
  rationale: En este contexto cultual, עלה conserva el sentido de trasladar hacia arriba o hacia un lugar más alto/relevante. «A subir» es natural en español y mantiene el verbo de movimiento sin añadir matices ajenos.
- source_word: אֲרוֹן בְּרִית יְהוָה
  english_pob_choice: the ark of the covenant of Yahweh
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca de la alianza de Yahvé
  - el arca del pacto de Yahvé
  lexicon: HALOT
  rationale: «Arca del pacto» sigue de cerca la cadena constructa y conserva el vocabulario POB sobre el nombre divino. «Pacto» es preferible aquí como término bíblico sobrio y consistente; «alianza» sería posible, pero no es necesaria por este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el criterio doctrinal del proyecto: el Tetragrama se vierte por transliteración, no por sustitución titulante. «Yahvé» es la forma española más establecida y legible para el nombre divino.'
- source_word: מִן בֵּית עֹבֵד אֱדֹם
  english_pob_choice: from the house of Obed-edom
  chosen_spanish: desde la casa de Obed-edom
  alternatives_spanish:
  - de la casa de Obed-edom
  lexicon: HALOT
  rationale: «Desde» da con claridad la idea direccional del hebreo מִן en este movimiento de traslado, y suena natural en español.
- source_word: בְּשִׂמְחָה
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - en alegría
  lexicon: HALOT
  rationale: La preposición ב aquí funciona adverbialmente. «Con alegría» es idiomático en español y preserva el tono celebrativo sin añadir una paráfrasis.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrama, y la política del proyecto pide transliterarlo en lugar de sustituirlo por un título. «Yahvé» mantiene el nombre personal del Dios del pacto y es la forma elegida en español para este registro.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión inglesa más reciente indicó que no había cambios necesarios; por tanto, este borrador español sigue de cerca la lectura auditada sin introducir variantes textuales ni decisiones no respaldadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma uniforme del nombre divino.
  - Se conserva «arca del pacto» en lugar de «arca de la alianza» para coherencia terminológica con el registro bíblico del proyecto.
  - Se usa «con alegría» para reflejar el valor adverbial de בְּשִׂמְחָה sin sobretraducir.
