revisions:
- from: 'Así dice Yahvé: Contén tu voz del llanto y tus ojos de las lágrimas[a], porque hay recompensa para tu trabajo, declara Yahvé[b], y ellos volverán de la tierra del enemigo.'
  to: 'Así dice Yahvé: Refrena tu voz para que no llore[a] y tus ojos de derramar lágrimas, porque hay recompensa para tu trabajo, declara Yahvé[b], y ellos volverán de la tierra del enemigo.'
  rationale: Se hicieron ajustes menores para que el español suene natural sin perder las imágenes del hebreo. «Refrena tu voz para que no llore» comunica mejor la exhortación dirigida a Raquel personificada, mientras que la nota preserva la alternativa más literal. «Tus ojos de derramar lágrimas» corrige un giro poco idiomático y mantiene el paralelismo corporal del original. El resto del verso permanece fiel al texto fuente y a las decisiones auditadas del POB.
  reviewer_model: gpt-5.4
