  yaml_path: translation/ot/ezekiel/031/008.yaml
  text: Cedars did not overshadow it in the garden of God[a]; cypresses did not compare with its boughs, and plane trees were not like its branches[b]. No tree in the garden of God compared with it in its beauty.
