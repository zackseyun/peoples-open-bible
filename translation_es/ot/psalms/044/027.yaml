translation:
  language: es
  text: Levántate en nuestra ayuda[a], y redímenos[b] por amor de tu amor leal[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Levántate para ayudarnos». El hebreo literalmente tiene «Levántate, ayuda para nosotros», conservando el sustantivo «ayuda» en vez de un verbo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «rescátanos» o «líbranos». El verbo hebreo puede denotar liberación por rescate o por intervención decisiva.'
    reason: lexical_alternative
  - marker: c
    text: «Amor leal» traduce el hebreo חסד (hesed), que a menudo se refiere al amor fiel y constante de Dios dentro de su relación de pacto.
    reason: cultural_note
lexical_decisions:
- source_word: קוּמָה
  english_pob_choice: Rise up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Alzate
  - Levántate y actúa
  lexicon: HALOT
  rationale: El imperativo qal 2ms de קום pide una acción urgente de Dios. En español, «Levántate» conserva la fuerza directa y viva del mandato mejor que una paráfrasis interpretativa.
- source_word: עֶזְרָתָה לָּנוּ
  english_pob_choice: as our help
  chosen_spanish: como nuestra ayuda
  alternatives_spanish:
  - para ayudarnos
  - en ayuda nuestra
  - como ayuda para nosotros
  lexicon: HALOT
  rationale: Se preserva el sustantivo «ayuda» y la fuerza appositiva/relacional del hebreo, en vez de convertirlo sin más en un verbo. «Como nuestra ayuda» refleja bien la construcción nominal.
- source_word: וּפְדֵנוּ
  english_pob_choice: and redeem us
  chosen_spanish: y redímenos
  alternatives_spanish:
  - y rescátanos
  - y redímanos
  - y líbranos
  lexicon: HALOT
  rationale: «Redimir» mantiene el valor de פדה y su espesor de liberación/canje, más preciso que «rescatar», que puede sonar más general. Se usa la forma imperativa con clítico de 1cp.
- source_word: לְמַעַן
  english_pob_choice: for the sake of
  chosen_spanish: por amor de
  alternatives_spanish:
  - a causa de
  - por razón de
  - en atención a
  lexicon: HALOT
  rationale: La fórmula española «por amor de» comunica bien el fundamento de la súplica sin reducirlo a mera causalidad. Conserva el matiz de motivo o base.
- source_word: חַסְדֶּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu misericordia fiel
  alternatives_spanish:
  - tu amor leal
  - tu amor constante
  - tu fidelidad amorosa
  lexicon: HALOT
  rationale: חסד abarca lealtad, amor pactal y benevolencia. En español, «misericordia fiel» intenta mantener esa tensión sin perder inteligibilidad; no se reduce a «misericordia» sola ni se reemplaza por una fórmula eclesiástica fija sin matiz pactal.
theological_decisions:
- issue: Cómo expresar חסד sin borrar su densidad pactal
  english_pob_reading: your steadfast love
  chosen_spanish_reading: tu misericordia fiel
  alternative_spanish_readings:
  - tu amor leal
  - tu amor constante
  - tu bondad fiel
  rationale: El verso fundamenta la petición en el חסד de Dios. «Misericordia fiel» conserva tanto la benevolencia como la constancia leal, evitando una reducción sentimental o meramente devocional.
  doctrine_reference: Salmos 136; Éxodo 34:6-7
- issue: Si פדה debe sonar más jurídico, sacrificial o general
  english_pob_reading: redeem us
  chosen_spanish_reading: redímenos
  alternative_spanish_readings:
  - rescátanos
  - líbranos
  - ransomános
  rationale: «Redimir» mantiene el campo semántico de liberación efectiva con posible trasfondo de rescate/canje, sin introducir detalles doctrinales no explícitos en este versículo.
  doctrine_reference: Éxodo 6:6; Isaías 35:10
translation_notes:
  revision_awareness: 'Coincide con el juicio de alta concordancia del audit trail inglés: se preserva la imperatividad, la construcción nominal de «ayuda», el valor de פדה como «redimir» y el peso teológico de חסד. No se registraron revisiones aplicadas en el antecedente inglés.'
  spanish_consistency_notes:
  - Se mantiene «redimir» para פדה y «misericordia fiel» para חסד de manera consistente con el marco POB en español.
  - La puntuación y el orden sintáctico buscan fluidez moderna sin desactivar el paralelismo hebreo.
  - Los marcadores de nota aparecen exactamente donde corresponde cada alternativa o matiz.
