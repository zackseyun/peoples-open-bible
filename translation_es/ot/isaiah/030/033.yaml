- from: Porque Topet[a] ya está preparada desde hace tiempo[b]; sí, está dispuesta para el rey. La han hecho profunda y ancha, con una pira de fuego y abundante leña. El aliento de Yahvé, como un torrente de azufre[c], la enciende.
  to: Porque Topet[a] ya está preparada desde hace tiempo[b]; sí, está dispuesta para el rey. La ha hecho profunda y ancha, con una pira de fuego y abundante leña. El aliento de Yahvé, como un torrente de azufre[c], la enciende.
  rationale: Se mantiene el texto casi intacto, pero se corrige «La han hecho» a «La ha hecho» para reflejar mejor los verbos hebreos en singular. También se reescribe la nota c para ajustarla al motivo léxico documentado sin introducir formulaciones anglicadas o confusas en español.
