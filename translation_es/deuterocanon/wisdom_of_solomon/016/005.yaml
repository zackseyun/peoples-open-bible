  - severity: low
    issue: «eran destruidos» suena algo calcado
    rationale: Aunque es fiel al imperfecto pasivo διεφθείροντο, en español bíblico natural suena mejor «iban siendo destruidos» o «estaban siendo destruidos». Esto conserva el proceso en desarrollo y mejora la fluidez.
