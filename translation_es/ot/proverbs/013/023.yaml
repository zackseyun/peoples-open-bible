translation:
  language: es
  text: Hay abundante alimento en el barbecho[a] de los pobres, pero hay quien es arrasado por falta de justicia.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Barbecho» también puede traducirse como «tierra arada» o «tierra recién labrada».
    reason: lexical_alternative
  - marker: b
    text: O «hay lo que es arrasado sin justicia». El segundo hemistiquio hebreo es compacto y también puede traducirse de manera más impersonal.
    reason: alternative_reading
lexical_decisions:
- source_word: רָב
  english_pob_choice: abundant
  chosen_spanish: abundancia de
  alternatives_spanish:
  - mucho
  - abundante
  - gran cantidad de
  lexicon: HALOT
  rationale: El hebreo usa un predicado de cantidad sobre אֹכֶל; en español, «abundancia de» comunica con naturalidad la idea de gran provisión sin volver la frase pesada.
- source_word: אֹכֶל
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - alimento
  - provisión
  lexicon: HALOT
  rationale: El término abarca comida o producto comestible. «Alimento» funciona bien en un proverbio agrícola y evita restringir demasiado el sentido a una sola comida.
- source_word: נִיר
  english_pob_choice: fallow ground
  chosen_spanish: la tierra
  alternatives_spanish:
  - el barbecho
  - la tierra en barbecho
  - la tierra arada
  lexicon: HALOT
  rationale: El POB inglés opta por una imagen agraria específica; en español, «la tierra» conserva la metáfora sin forzar un tecnicismo que podría sonar menos natural. La nota conserva las alternativas léxicas documentadas.
- source_word: רָאשִׁים
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los necesitados
  - la gente pobre
  lexicon: HALOT
  rationale: Aunque la forma hebrea es inusual, el consenso auditado la entiende como referencia a personas pobres. «Los pobres» es la correspondencia más directa y compacta en español.
- source_word: וְיֵשׁ
  english_pob_choice: but some are
  chosen_spanish: pero hay quien
  alternatives_spanish:
  - y hay
  - pero hay algunos
  lexicon: HALOT
  rationale: La revisión inglesa ajustó la segunda cola para reflejar mejor la construcción singular. «Pero hay quien» reproduce ese matiz impersonal/singular con naturalidad en español.
- source_word: נִסְפֶּה
  english_pob_choice: swept away
  chosen_spanish: es arrasado
  alternatives_spanish:
  - es barrido
  - perece
  - es destruido
  lexicon: HALOT
  rationale: El nifal de ספָה expresa ser arrastrado o destruido. «Es arrasado» mantiene la pasiva y la fuerza de pérdida violenta sin añadir un mecanismo específico que el hebreo no explicita.
- source_word: בְּלֹא מִשְׁפָּט
  english_pob_choice: for lack of justice
  chosen_spanish: por falta de justicia
  alternatives_spanish:
  - sin justicia
  - por injusticia
  - por falta de juicio
  lexicon: HALOT
  rationale: מִשְׁפָּט puede ser justicia, juicio o derecho. La lectura auditada favorece la ausencia de justicia como causa; «por falta de justicia» lo expresa con claridad y preserva la crítica social.
theological_decisions:
- issue: Efecto social del segundo hemistiquio
  english_pob_reading: The verse contrasts the productive potential available even to the poor with the reality that some are nevertheless ruined because justice is absent.
  chosen_spanish_reading: El proverbio contrasta la posibilidad de abundancia aun en la tierra de los pobres con el hecho de que alguien puede ser arrasado cuando falta la justicia.
  alternative_spanish_readings:
  - '...con el hecho de que algunos son arrasados...'
  - '...con el hecho de que se pierde el fruto por mala administración...'
  rationale: La frase בלא משפט se entiende mejor en su sentido ético-jurídico, no meramente administrativo. La traducción mantiene esa crítica social sin ampliar el texto más allá de lo que el hebreo permite.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La revisión inglesa reciente reordenó el primer colon para acercarlo más al hebreo y cambió una construcción plural por una singular impersonal («there is one who...»). En español se refleja ese ajuste con «hay quien», manteniendo el paralelo y la singularidad de la forma verbal hebrea.
  spanish_consistency_notes:
  - Se preservó la terminología POB de «justicia» para מִשְׁפָּט, en lugar de desplazarla por «juicio» o «derecho», porque el contexto proverbial enfatiza el orden ético-social.
  - Se evitó «Señor» u otra convención eclesiástica porque no aplica en este versículo; no hay nombre divino explícito.
  - La cláusula inicial se mantuvo breve y nominal para respetar la compacta sintaxis poética del hebreo.
