translation:
  language: es
  text: Dios establece a los solitarios en un hogar; hace salir a los prisioneros a la prosperidad[a], pero los rebeldes habitan en una tierra reseca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la abundancia»; el término hebreo raro también puede entenderse, para algunos, como «con canto» u otra expresión de liberación gozosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios
  lexicon: HALOT
  rationale: El referente es el Dios de Israel y el contexto exige sujeto singular; «Dios» es la forma natural y fiel en español.
- source_word: מ֘וֹשִׁ֤יב
  english_pob_choice: settles
  chosen_spanish: establece
  alternatives_spanish:
  - hace habitar
  - pone
  - asienta
  lexicon: HALOT
  rationale: El causativo de ישׁב expresa hacer habitar o fijar en una morada; «establece» conserva la acción causativa y suena natural en español.
- source_word: יְחִידִים
  english_pob_choice: the solitary
  chosen_spanish: los solitarios
  alternatives_spanish:
  - los solitarios
  - los aislados
  - los solos
  lexicon: HALOT
  rationale: El término denota personas solas o aisladas; «los solitarios» preserva el matiz sin convertirlo únicamente en emoción psicológica.
- source_word: בַּיְתָה
  english_pob_choice: in a home
  chosen_spanish: en un hogar
  alternatives_spanish:
  - en una casa
  - en un hogar
  - en una morada
  lexicon: HALOT
  rationale: בַּיִת puede ser casa u hogar/household. «Hogar» comunica pertenencia y resguardo, manteniendo la imagen de residencia sin reducirla solo al edificio.
- source_word: מוֹצִיא
  english_pob_choice: brings out
  chosen_spanish: hace salir
  alternatives_spanish:
  - saca
  - conduce fuera
  - hace salir
  lexicon: HALOT
  rationale: El causativo de יצא es hacer salir; «hace salir» preserva con claridad la fuerza verbal y el paralelismo.
- source_word: אֲסִירִים
  english_pob_choice: prisoners
  chosen_spanish: los prisioneros
  alternatives_spanish:
  - los prisioneros
  - los cautivos
  - los presos
  lexicon: HALOT
  rationale: Se refiere a personas atadas o encarceladas; «los prisioneros» es el equivalente moderno más claro.
- source_word: בַּכּוֹשָׁרוֹת
  english_pob_choice: into prosperity
  chosen_spanish: a la prosperidad
  alternatives_spanish:
  - a la abundancia
  - con canto
  - a la dicha
  lexicon: HALOT
  rationale: La forma rara admite varias lecturas; se mantiene la decisión del POB inglés de reflejar un resultado positivo y se deja abierta la alternativa léxica en nota.
- source_word: אַךְ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - pero
  - sin embargo
  - mas
  lexicon: HALOT
  rationale: Marca contraste fuerte entre la acción benéfica de Dios y la suerte de los rebeldes; «pero» expresa bien ese giro adversativo.
- source_word: סוֹרֲרִים
  english_pob_choice: the rebellious
  chosen_spanish: los rebeldes
  alternatives_spanish:
  - los rebeldes
  - los obstinados
  lexicon: HALOT
  rationale: El participio describe resistencia pertinaz o rebeldía; «los rebeldes» es idiomático y preciso.
- source_word: שָׁכְנ֥וּ
  english_pob_choice: dwell
  chosen_spanish: habitan
  alternatives_spanish:
  - habitan
  - viven
  - moran
  lexicon: HALOT
  rationale: El perfecto se usa de manera gnómica en poesía; «habitan» mantiene el valor durativo y literario en español.
- source_word: צְחִיחָה
  english_pob_choice: a parched land
  chosen_spanish: una tierra reseca
  alternatives_spanish:
  - una tierra reseca
  - una tierra árida
  - un país seco
  lexicon: HALOT
  rationale: El sustantivo expresa sequedad extrema; «tierra reseca» es claro y poético en español, equivalente al contraste con hogar y prosperidad.
theological_decisions:
- issue: Sentido de la acción divina hacia los solitarios
  english_pob_reading: God provides belonging and settled dwelling for isolated people.
  chosen_spanish_reading: Dios da hogar y ubicación estable a personas aisladas.
  alternative_spanish_readings:
  - Dios pone a los solitarios en familias
  - Dios integra a los aislados en una casa
  rationale: El hebreo dice «solitarios» y «casa/hogar»; se evita estrecharlo a «familias», porque בַּיִת es singular y puede referir hogar o casa-estado de pertenencia. «Hogar» preserva la imagen y la amplitud semántica.
  doctrine_reference: Principio de primacía del idioma original; equivalencia óptima sin domesticar el texto.
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura auditada del POB inglés y mantiene la incertidumbre léxica de בַּכּוֹשָׁרוֹת mediante nota, sin resolverla de forma dogmática. No hay cambios respecto a la base revisada; se conservó el contraste poético entre hogar/prosperidad y tierra reseca.
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהִים conforme al sentido singular del contexto.
  - Se prefirió «solitarios» y «rebeldes» para conservar el tono descriptivo del hebreo.
  - «Hogar» se eligió por su valor de pertenencia, pero la nota evita cerrar la ambigüedad de בַּיִת.
  - «A la prosperidad» reproduce la opción auditada del POB inglés y queda anclada con nota por la rareza del término hebreo.
