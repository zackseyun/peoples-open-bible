translation:
  language: es
  text: Zacarías, hijo de Meshelemías, era portero a la entrada de la tienda de reunión[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «portero a la puerta de la tienda de reunión».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכַרְיָה
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zequerías
  lexicon: HALOT
  rationale: Es nombre propio; en español bíblico y moderno, la forma establecida y más reconocible es Zacarías. Se conserva la transliteración habitual, no una traducción.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: El contexto genealógico inmediato favorece el parentesco directo. En español, 'hijo de' reproduce con naturalidad ese valor filial; 'descendiente de' sería más amplio de lo que el hebreo aquí exige.
- source_word: מְשֶׁלֶמְיָה
  english_pob_choice: Meshelemiah
  chosen_spanish: Meshelemías
  alternatives_spanish:
  - Meshelemia
  lexicon: HALOT
  rationale: Nombre propio transliterado siguiendo la convención española bíblica. La terminación -ías refleja de forma natural la adaptación de nombres hebreos con -yāh.
- source_word: שֹׁעֵר
  english_pob_choice: gatekeeper
  chosen_spanish: portero
  alternatives_spanish:
  - guardian de la puerta
  - doorkeeper
  lexicon: HALOT
  rationale: Aunque el inglés POB elige 'gatekeeper' por el matiz funcional, en español 'portero' comunica de manera clara y digna la función de custodio de la entrada. 'Guardián de la puerta' sería más literal pero menos natural; 'doorkeeper' sería un calco innecesario.
- source_word: פֶּתַח
  english_pob_choice: entrance
  chosen_spanish: entrada
  alternatives_spanish:
  - umbral
  - acceso
  - puerta
  lexicon: HALOT
  rationale: פֶּתַח designa la abertura o punto de ingreso. 'Entrada' es la opción más natural en español y mantiene la relación con el oficio de portero.
- source_word: לְאֹהֶל
  english_pob_choice: to the tent
  chosen_spanish: del tabernáculo
  alternatives_spanish:
  - de la tienda
  - al tabernáculo
  lexicon: HALOT
  rationale: En la frase fija אֹהֶל מוֹעֵד, el referente cultual es el santuario. En español, 'tabernáculo' es la designación tradicional y clara del lugar sagrado; aunque el inglés POB prefiere mantener 'tent of meeting', en español 'tienda de reunión' suena más torpe y menos reconocible. Se mantiene el sentido del espacio santuario sin borrar el referente hebreo.
- source_word: מוֹעֵד
  english_pob_choice: meeting
  chosen_spanish: del encuentro
  alternatives_spanish:
  - de reunión
  - señalado
  lexicon: HALOT
  rationale: Se conserva el valor relacional de מוֹעֵד como momento/lugar de encuentro señalado. 'Del encuentro' mantiene la idea de cita o reunión sagrada sin recurrir a una paráfrasis excesiva.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: el tabernáculo del encuentro
  alternatives_spanish:
  - la tienda del encuentro
  - el tabernáculo de reunión
  lexicon: HALOT
  rationale: La expresión fija se vierte con el término español eclesial y bíblicamente conocido 'tabernáculo', pero se añade 'del encuentro' para no perder el componente semántico de מוֹעֵד. Así se preserva la designación cultual sin ocultar la base hebrea.
translation_notes:
  revision_awareness: El texto hebreo presenta una línea genealógica y funcional muy breve; la versión española sigue de cerca la sintaxis del original, pero adopta equivalencias naturales para nombres propios y para la expresión cultual fija אֹהֶל מוֹעֵד. El audit trail inglés mantiene 'tent of meeting'; aquí se opta por 'tabernáculo del encuentro' por inteligibilidad en español, sin perder la referencia al santuario.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto base lo exige explícitamente; aquí no aparece.
  - Se conserva un registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - '''Portero'' se usa funcionalmente para שֹׁעֵר, sin intentar imponer una terminología ritual más técnica que el español no requiere en este versículo.'
