revisions:
- from: Así que Jehú montó y fue a Jezreel[a], porque Joram estaba allí[b], y Ahazías, rey de Judá, había bajado a ver a Joram.
  to: Así que Jehú montó y fue a Jezreel, porque Joram estaba acostado allí, y Ahazías, rey de Judá, había bajado a ver[a] a Joram.
  rationale: Se corrige «estaba allí» a «estaba acostado allí» para preservar el valor de שֹׁכֵב y la precisión del POB inglés. También se elimina la nota mal planteada sobre «Jezreel» y se reancla la nota léxica al verbo «ver», donde realmente corresponde. No se requiere adjudicación adicional porque la corrección es directa y de baja complejidad.
