base_translation:
  language: en
  yaml_path: translation/ot/daniel/003/023.yaml
  text: And these three men—Shadrach[a], Meshach[b], and Abed-nego—fell bound into the midst of the blazing furnace.
  footnotes:
  - marker: a
    text: Or, more interpretively, 'were thrown into the midst of the blazing furnace.' The Aramaic verb itself is simply 'fell,' though the surrounding context explains that they had been cast in.
    reason: lexical_alternative
  - marker: b
    text: Traditional English versions often read 'the burning fiery furnace.' The Aramaic expression refers to a furnace characterized by blazing fire.
    reason: lexical_alternative
