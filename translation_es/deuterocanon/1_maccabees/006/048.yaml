translation:
  language: es
  text: Y desde el campamento[a] del rey subieron para ir a su encuentro en Jerusalén, y el rey acampó en Judea y en el monte Sión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «encampamiento» para «campamento» y, correspondientemente, una forma afín en la referencia militar posterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεμβολῆς
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campa
  - encampamiento
  lexicon: LSJ
  rationale: En contexto militar, παρεμβολή designa el lugar donde se aloja un ejército. «Campamento» es natural en español moderno y conserva el sentido militar sin perder la claridad narrativa.
- source_word: ἀνέβησαν
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - subieron hacia
  - ascendieron
  lexicon: LSJ
  rationale: El verbo griego indica subida literal; en Jerusalén, el movimiento ascendente también es topográfico. «Subieron» conserva esa fuerza sin añadir matices militares no presentes en el texto.
- source_word: εἰς συνάντησιν αὐτῶν
  english_pob_choice: to meet them
  chosen_spanish: para encontrarse con ellos
  alternatives_spanish:
  - para ir a su encuentro
  - para encontrarlos
  lexicon: LSJ
  rationale: La construcción expresa ir al encuentro de alguien. En español, «para encontrarse con ellos» comunica el valor idiomático de manera clara y fiel.
- source_word: παρενέβαλεν
  english_pob_choice: encamped
  chosen_spanish: acampó
  alternatives_spanish:
  - levantó su campamento
  - se acampó
  lexicon: LSJ
  rationale: El aoristo militar de παρεμβάλλω se traduce de forma natural por «acampó». Mantiene la relación léxica con el sustantivo anterior y evita una paráfrasis excesiva.
- source_word: Ἰουδαίαν
  english_pob_choice: Judea
  chosen_spanish: Judea
  alternatives_spanish:
  - la región de Judea
  - Judá
  lexicon: LSJ
  rationale: En la narrativa histórica helenística, Ἰουδαία nombra la región político-geográfica de Judea. «Judea» es la forma española estándar y precisa.
- source_word: ὄρος Σιών
  english_pob_choice: Mount Zion
  chosen_spanish: el monte Sión
  alternatives_spanish:
  - el monte de Sión
  - monte Sión
  lexicon: LSJ
  rationale: La forma española tradicional y transparente es «el monte Sión», que preserva el nombre propio y el referente geográfico bíblico.
theological_decisions:
- issue: No hay término teológico disputado; el reto es principalmente topográfico y militar.
  english_pob_reading: The verse is read straightforwardly as a movement and encampment report.
  chosen_spanish_reading: El versículo se traduce como un reporte de desplazamiento y acampada, sin añadir explicaciones interpretativas.
  alternative_spanish_readings:
  - Una lectura más libre podría expandir el movimiento como «marcharon» o «se dirigieron»
  - 'Otra podría hacer explícita la confrontación: «salieron al encuentro»'
  rationale: El griego presenta acciones narrativas concretas. La versión española conserva esa sobriedad y no introduce inferencias sobre estrategia o intensidad del movimiento.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan de forma alta; no se registran revisiones aplicadas. La versión española sigue la misma línea de estabilidad, conservando el paralelismo entre el sustantivo militar inicial y el verbo final.
  spanish_consistency_notes:
  - He mantenido «campamento» y «acampó» como pareja léxica natural para reflejar la repetición militar del griego.
  - He preservado «Judea» y «el monte Sión» como topónimos estándar y transparentes.
  - La dirección ascendente de ἀνέβησαν se refleja con «subieron», que además funciona bien con la convención bíblica de subir a Jerusalén.
