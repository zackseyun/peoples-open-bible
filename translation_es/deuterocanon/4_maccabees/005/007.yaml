    rationale: El griego tiene por objeto τὴν ... σαρκοφαγίαν, femenino. En español conviene concordar con «la [acción/comida]» o reformular para evitar ambigüedad.
  - severity: low
    issue: «el comer de la carne» es comprensible pero algo tieso
    rationale: Una formulación más natural como «comer la carne de este animal» conserva el sentido de σαρκοφαγία sin perder precisión.
