review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura temporal y procedimental del hebreo: «Cuando ... entre», «entrará», y «saldrá» conservan bien el valor instructivo de וּבְבֹא / יָבֹא / יֵצֵא. «El príncipe» preserva adecuadamente הַנָּשִׂיא sin sobreinterpretación. También comunica bien la simetría de וּבְדַרְכּוֹ con «por el mismo camino». Sin embargo, el anclaje de la nota [a] está colocado en «príncipe», cuando la nota explica la expresión «por su camino» / «por el mismo camino». Eso rompe la correspondencia entre nota y lugar textual. Además, la nota [b] sobre «vestíbulo» no es necesaria para preservar una alternativa significativa del inglés; puede mantenerse, pero en este caso recarga el texto sin aportar una ambigüedad nueva imprescindible.'
  spanish_quality_summary: El español es claro, natural y digno. «Vestíbulo de la puerta» es comprensible, aunque «pórtico de la puerta» se acerca mejor al valor arquitectónico de אוּלָם y armoniza mejor con la elección inglesa «porch». La revisión principal necesaria es de ubicación y economía de notas. La frase revisada fluye mejor si la nota léxica se ancla en «mismo camino».
  glossary_alignment: 'La terminología clave está bien alineada con las pautas del proyecto: «el príncipe» para הַנָּשִׂיא, sin importación mesiánica; no hay conflicto con términos de glosario mayores. La única mejora sugerida es preferir «pórtico» sobre «vestíbulo» para acercarse más a אוּלָם y al rastro de auditoría inglés, aunque ambos son defendibles.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «príncipe» pero explica «por su camino».
    rationale: Las instrucciones requieren que cada nota aparezca en el lugar pertinente del texto. Tal como está, la nota induce confusión porque no comenta «príncipe» sino la ruta de salida.
  - severity: low
    issue: La nota [b] sobre «vestíbulo» es prescindible.
    rationale: El inglés no exige nota en este punto, y el español no crea una ambigüedad nueva que obligue a documentarla. Puede omitirse para mantener limpieza editorial.
  - severity: low
    issue: «Vestíbulo» es aceptable, pero «pórtico» refleja mejor oulam en este contexto arquitectónico.
    rationale: אוּלָם en contextos templarios suele referirse al pórtico/porche de una estructura. «Vestíbulo» no es incorrecto, pero puede sonar más interior y menos fiel a la imagen espacial del hebreo.
  revised_spanish_text: Cuando el príncipe entre, entrará por el pórtico de la puerta, y saldrá por el mismo camino[a].
  revised_footnotes:
  - marker: a
    text: Literalmente, «por su camino», es decir, sale por la misma ruta por la que entró.
