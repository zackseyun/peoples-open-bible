translation:
  language: es
  text: No retrasarás la plenitud de tu cosecha y el flujo de tu lagar[a]. Me darás el primogénito de tus hijos varones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "tu producción completa y tu jugo/vino". Los términos hebreos probablemente se refieren al producto cosechado y al producto líquido exprimido; la pareja agrícola exacta puede ser grano y vino, o más generalmente rendimiento sólido y líquido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְלֵאָתְךָ
  english_pob_choice: the fullness of your harvest
  chosen_spanish: la plenitud de tu cosecha
  alternatives_spanish:
  - tu producción completa
  - la plenitud de tu producción
  - la plenitud de tu cosecha y recolección
  lexicon: HALOT
  rationale: מְלֵאָה expresa la idea de plenitud o de rendimiento completo. En este contexto legal agrícola, 'plenitud de tu cosecha' conserva la referencia concreta al producto debido sin volverla demasiado técnica. 'Cosecha' hace natural en español la idea de lo ya recolectado.
- source_word: וְדִמְעֲךָ
  english_pob_choice: the outflow of your press
  chosen_spanish: el derrame de tu lagar
  alternatives_spanish:
  - el flujo de tu prensa
  - el mosto de tu lagar
  - el derrame de tu prensa
  lexicon: HALOT
  rationale: El término hebreo puede aludir literalmente a 'lágrima', pero en un contexto agrícola se refiere al líquido exprimido, asociado con el lagar o la prensa. 'Derrame de tu lagar' mantiene la imagen del líquido obtenido por prensado sin restringir innecesariamente a vino solamente.
- source_word: לֹא תְאַחֵר
  english_pob_choice: You shall not delay
  chosen_spanish: No retrasarás
  alternatives_spanish:
  - No demorarás
  - No pospondrás
  - No tardarás
  lexicon: HALOT
  rationale: El verbo en este contexto legal prohíbe aplazar o retener lo debido. 'No retrasarás' comunica la fuerza normativa de forma natural en español, con un tono adecuado para ley.
- source_word: בְּכוֹר
  english_pob_choice: the firstborn
  chosen_spanish: el primogénito
  alternatives_spanish:
  - el primero nacido
  - el primer nacido
  lexicon: HALOT
  rationale: '''Primogénito'' es el término español más establecido para la categoría legal de firstborn y mantiene el sentido técnico del hebreo.'
- source_word: בָּנֶיךָ
  english_pob_choice: of your sons
  chosen_spanish: de tus hijos
  alternatives_spanish:
  - de tus hijos varones
  - de tus hijos e hijas
  lexicon: HALOT
  rationale: Aunque el hebreo dice 'tus hijos' en forma masculina, en español 'hijos' comunica tanto la filiación masculina del texto como el conjunto de descendientes masculinos en este marco legal. Se prefiere esta forma por claridad y porque el término siguiente ya es 'primogénito'.
- source_word: תִּתֶּן לִּי
  english_pob_choice: You shall give to me
  chosen_spanish: Me darás
  alternatives_spanish:
  - Darás a mí
  - Me entregarás
  - Tú me darás
  lexicon: HALOT
  rationale: La obligación legal se expresa de manera directa y natural con 'Me darás'. Conserva el destinatario enfático del hebreo sin volver la frase pesada.
theological_decisions:
- issue: Sentido agrícola de מְלֵאָה / דִמְעָה
  english_pob_reading: The verse commands prompt offering of both solid produce and liquid produce, followed by dedication of the firstborn son.
  chosen_spanish_reading: El versículo manda no retrasar tanto la cosecha completa como el producto líquido obtenido por prensado, y luego entregar el primogénito de los hijos.
  alternative_spanish_readings:
  - El versículo habla específicamente de grano y vino.
  - El versículo se refiere de manera general a primicias sin distinguir dos tipos de producto.
  rationale: 'La redacción española conserva la doble referencia: producto sólido/agrícola y producto líquido, sin reducir el segundo término a ''vino'' ni perder la imagen del lagar. Así se evita estrechar más de lo que permite el hebreo.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 2
- issue: Tratamiento de בָּנֶיךָ en un contexto legal
  english_pob_reading: sons
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - hijos varones
  - niños
  rationale: Aunque el hebreo usa una forma masculina, en español 'hijos' es la forma más clara para el lector general y no altera la obligación legal del pasaje. No se neutraliza a 'niños' porque el contexto no habla de infantes, sino de descendencia masculina primogénita.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: La versión española sigue de cerca la lectura auditada del POB en inglés y conserva la ambigüedad agrícola documentada en el pie de nota. No se introdujeron cambios de sentido frente al examen reciente; se ajustó la formulación para que suene natural en español sin perder la fuerza legal del original.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' implícito solo donde el hebreo no lo expresa explícitamente; este versículo usa forma de primera persona divina ('me'), así que no se añadió ningún nombre divino en el texto.
  - Se prefirió 'primogénito' por ser el equivalente español técnico y reconocido de בְּכוֹר.
  - Se evitó 'SEÑOR' y también se evitó traducir el segundo miembro como 'tears', que sería engañoso en este contexto agrícola.
