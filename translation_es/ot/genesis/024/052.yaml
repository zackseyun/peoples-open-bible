revisions:
- from: Y sucedió que, al oír el siervo de Abraham[a] sus palabras, se inclinó hasta el suelo ante Yahvé[b].
  to: Y cuando el siervo de Abraham[a] oyó sus palabras, se postró en tierra ante Yahvé[b][c].
  rationale: Se ajusta la apertura a una forma narrativa más natural en español («Y cuando...»), y se fortalece la traducción de וַיִּשְׁתַּחוּ אַרְצָה con «se postró en tierra», que refleja mejor la intensidad física del gesto. Se conserva «siervo» por contexto y «Yahvé» según el estándar del proyecto. Además, se añade una nota para preservar la alternativa léxica de inclinación/adoración presente en la auditoría inglesa.
  reviewer_model: gpt-5.4
