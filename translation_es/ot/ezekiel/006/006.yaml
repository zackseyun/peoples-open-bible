translation:
  language: es
  text: En todas sus moradas, las ciudades serán asoladas y los lugares altos serán desolados, para que sus altares sean asolados y desolados, y sus ídolos[a] sean quebrados y lleguen a su fin, y sus altares de incienso[b] sean derribados, y sus obras sean borradas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo גִּלּוּלִים: término despectivo para ídolos, posiblemente con el sentido de ídolos ''inmundos'' o ''repugnantes''.'
    reason: lexical_alternative
  - marker: b
    text: O 'sus pilares del sol' / 'sus imágenes del sol'; el término hebreo se refiere a un objeto cultual debatido, posiblemente asociado con el culto solar.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹשְׁבֹתֵיכֶם
  english_pob_choice: your dwelling places
  chosen_spanish: sus lugares de habitación
  alternatives_spanish:
  - sus moradas
  - sus asentamientos
  lexicon: HALOT
  rationale: El hebreo designa lugares donde se habita o se tiene residencia. "Lugares de habitación" conserva ese sentido amplio sin volver el texto administrativo ni demasiado técnico.
- source_word: הֶעָרִים תֶּחֱרַבְנָה
  english_pob_choice: the cities will be laid waste
  chosen_spanish: las ciudades serán asoladas
  alternatives_spanish:
  - las ciudades serán arruinadas
  - las ciudades quedarán desoladas
  lexicon: HALOT
  rationale: חרב expresa devastación o ruina por juicio. "Serán asoladas" comunica bien esa fuerza en español bíblico moderno y mantiene la imagen de destrucción total.
- source_word: הַבָּמוֹת
  english_pob_choice: the high places
  chosen_spanish: los lugares altos
  alternatives_spanish:
  - los altos lugares
  - los santuarios de altura
  lexicon: HALOT
  rationale: '"Lugares altos" es una forma natural en español para el término cultual técnico. Conserva la referencia a los sitios ilícitos de adoración sin explicitar más de lo que el hebreo dice.'
- source_word: תִּישָׁמְנָה
  english_pob_choice: will be desolated
  chosen_spanish: serán desolados
  alternatives_spanish:
  - quedarán desolados
  - serán hechos desolados
  lexicon: HALOT
  rationale: El verbo expresa volverse desolado. "Serán desolados" sigue de cerca la forma verbal repetida en el versículo y evita añadir una perífrasis innecesaria.
- source_word: יֶחֶרְב֨וּ וְיֶאְשְׁמ֜וּ מִזְבְּחֽוֹתֵיכֶם
  english_pob_choice: your altars may be laid waste and desolated
  chosen_spanish: sus altares sean asolados y desolados
  alternatives_spanish:
  - sus altares sean arruinados y desolados
  - sus altares sean devastados y desolados
  lexicon: HALOT
  rationale: Se preserva la doble intensificación del hebreo con dos verbos cercanos pero no idénticos. "Asolados y desolados" mantiene el paralelismo y la severidad del juicio.
- source_word: גִּלּוּלֵיכֶם
  english_pob_choice: your idols
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus ídolos detestables
  - sus ídolos inmundos
  lexicon: HALOT
  rationale: El término es un vocablo despectivo para ídolos. En el texto principal conviene "ídolos" por claridad; el matiz peyorativo queda implícito y se puede explicar en nota.
- source_word: וְנִשְׁבְּרוּ וְנִשְׁבְּתוּ
  english_pob_choice: broken and brought to an end
  chosen_spanish: quebrados y puestos fin
  alternatives_spanish:
  - hechos pedazos y abolidos
  - quebrados y abolidos
  lexicon: HALOT
  rationale: El primer verbo es quebrar/romper; el segundo expresa cesar o terminar. "Puestos fin" intenta conservar esa segunda idea, aunque en español suena más natural como complemento verbal que como simple adjetivo.
- source_word: חַמָּנֵיכֶם
  english_pob_choice: your incense altars
  chosen_spanish: sus altares de incienso
  alternatives_spanish:
  - sus pilares solares
  - sus imágenes solares
  lexicon: HALOT
  rationale: El término es debatido y puede aludir a un objeto cultual vinculado con incienso o con culto solar. Se opta por "altares de incienso" en el texto principal, dejando abiertas las alternativas documentadas.
- source_word: וְנִמְחוּ
  english_pob_choice: wiped out
  chosen_spanish: borradas
  alternatives_spanish:
  - borrados
  - aniquiladas
  lexicon: HALOT
  rationale: נמחה expresa borrar, borrar por completo u obliterar. "Borradas" es la forma española más natural para el cierre del catálogo de destrucción y conserva la imagen de eliminación total.
- source_word: מַעֲשֵׂיכֶם
  english_pob_choice: your works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - lo que han hecho
  lexicon: HALOT
  rationale: En el contexto de idolatría, el término puede referirse tanto a obras hechas por ellos como al producto de sus actos. "Obras" permite esa amplitud sin perder concreción.
theological_decisions:
- issue: Conservación de la severidad contra la idolatría sin suavizar la acusación
  english_pob_reading: Use direct judgment language ('high places,' 'altars,' 'idols,' 'incense altars') and preserve the pejorative nuance of גִּלּוּלִים in a footnote rather than paraphrasing.
  chosen_spanish_reading: 'Mantener lenguaje directo de juicio: "lugares altos", "altares", "ídolos", "altares de incienso"; explicar el matiz despectivo de גִּלּוּלִים en nota en vez de endurecer o suavizar el texto principal.'
  alternative_spanish_readings:
  - Reformular como condena general de falsa religión
  - Poner "ídolos inmundos" en el texto principal
  rationale: El pasaje concreta la destrucción de centros y objetos de culto idolátrico. El español principal debe conservar esa especificidad sin amplificarla con adjetivos interpretativos, reservando el matiz pejorativo para nota.
  doctrine_reference: Translation philosophy items 1, 3, 5, 6
- issue: Respeto del paralelismo verbal hebreo en la cadena de destrucción
  english_pob_reading: The repeated devastation verbs should be kept distinct, especially the combination of 'laid waste/desolated,' 'broken/brought to an end,' and 'cut down.'
  chosen_spanish_reading: 'Reproducir la cadena con verbos emparejados: "asoladas y desolados", "quebrados y puestos fin", "derribados", "borradas".'
  alternative_spanish_readings:
  - Reducir la serie a un solo verbo de destrucción por segmento
  - Repetir siempre "destruidos"
  rationale: El hebreo acumula verbos para intensificar el juicio. La traducción debe conservar esa progresión y evitar aplanar el efecto retórico y semántico.
  doctrine_reference: Formal correspondence with source verbal aspect and parallelism
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail, que afinó la frase inglesa final de 'made desolate' a 'desolated' para ceñirse más al hebreo repetido. Por eso se eligieron formas españolas que reflejan el mismo verbo de estado/resultado ('asoladas', 'desolados') sin introducir perífrasis adicionales. También se conservó la doble intensificación de las destrucciones y el cierre con 'borradas' para rendir וְנִמְחוּ como obliteración final.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el hebreo del pasaje lo requiera; en este versículo no aparece el nombre divino.
  - Se mantiene "ídolos" como término principal para גִּלּוּלִים, dejando el matiz despectivo para nota.
  - '"Lugares altos" se conserva como término cultual técnico, coherente con el uso POB de "high places".'
  - Se evita "SEÑOR" como sustituto del nombre divino porque no corresponde a este versículo ni al criterio editorial del proyecto.
  - La serie verbal conserva paralelismo y no colapsa los verbos hebreos en un solo término genérico.
