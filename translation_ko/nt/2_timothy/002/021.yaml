id: 2TI.2.21
reference: 2 Timothy 2:21
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐὰν οὖν τις ἐκκαθάρῃ ἑαυτὸν ἀπὸ τούτων, ἔσται σκεῦος εἰς τιμήν, ἡγιασμένον, ⸀εὔχρηστον τῷ δεσπότῃ, εἰς πᾶν ἔργον ἀγαθὸν ἡτοιμασμένον.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/021.yaml
  text: Therefore, if anyone cleanses himself from these things, he will be a vessel for honor, sanctified, useful to the Master, prepared for every good work.
translation:
  language: ko
  text: 그러므로 누구든지 이러한 것들로부터 자신을 깨끗하게 하면, 귀하게 쓰일 그릇이 될 것입니다. 거룩하게 구별되고 주인에게 유익하며, 모든 선한 일을 위하여 준비된 그릇입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκκαθάρῃ ἑαυτὸν ἀπὸ τούτων
  english_pob_choice: cleanses himself from these things
  chosen_korean: 이러한 것들로부터 자신을 깨끗하게 하면
  alternatives_korean:
  - 이런 것들에서 자기를 정결케 하면
  - 이러한 일들에서 자신을 청결케 하면
  lexicon: BDAG
  rationale: ἐκκαθαίρω의 접두사 ἐκ-는 「철저히·완전히」를 강조한다. 「깨끗하게 하다」가 한국어로 가장 자연스러우며 의미를 담는다.
- source_word: ἡγιασμένον
  english_pob_choice: sanctified
  chosen_korean: 거룩하게 구별되고
  alternatives_korean:
  - 거룩하게 되고
  - 성별되고
  lexicon: BDAG
  rationale: 완료 분사 ἡγιασμένον의 「이미 거룩하게 구별된 상태」를 「거룩하게 구별된」으로 옮긴다. 단순한 「거룩한」보다 행위자(하나님)의 구별 행위를 함의한다.
- source_word: εὔχρηστον τῷ δεσπότῃ
  english_pob_choice: useful to the Master
  chosen_korean: 주인에게 유익하며
  alternatives_korean:
  - 주인에게 쓸모 있고
  - 주인에게 요긴하며
  lexicon: BDAG
  rationale: δεσπότης는 「주인·집주인」을 가리키며, 큰 집의 비유에 자연스럽다. εὔχρηστος는 「유익한·쓸모 있는」.
- source_word: εἰς πᾶν ἔργον ἀγαθὸν ἡτοιμασμένον
  english_pob_choice: prepared for every good work
  chosen_korean: 모든 선한 일을 위하여 준비된 그릇입니다
  alternatives_korean:
  - 모든 선한 일에 준비된 그릇
  - 온갖 선한 일을 위해 갖추어진
  lexicon: BDAG
  rationale: 3:17의 「모든 선한 일에 합당하도록 갖추어진」(ἐξηρτισμένος)과 연결되는 표현. 「선한 일」은 한국 성서 전통에서 익숙하다.
