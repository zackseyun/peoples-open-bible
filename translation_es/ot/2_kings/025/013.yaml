  yaml_path: translation/ot/2_kings/025/013.yaml
  text: And the Chaldeans broke in pieces the bronze pillars that were in the house of Yahweh[a], and the stands, and the bronze sea that was in the house of Yahweh[b], and carried their bronze to Babylon.
