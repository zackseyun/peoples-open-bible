revisions:
- from: 'Y le dijo: «Yo soy Yahvé, que te saqué de Ur de los caldeos para darte esta tierra para poseerla»[a][b].'
  to: 'Y le dijo: «Yo soy Yahvé[a], que te saqué de Ur de los caldeos para darte esta tierra en posesión»[b].'
  rationale: Se reancla la nota [a] a la expresión que realmente comenta, 'Yo soy Yahvé'. Además, se mejora la naturalidad del español reemplazando la construcción repetitiva 'para darte esta tierra para poseerla' por 'para darte esta tierra en posesión', que mantiene fielmente el sentido de לָתֶת לְךָ ... לְרִשְׁתָּהּ y suena más idiomático en español eclesial contemporáneo.
