- from: Y tú, acuéstate sobre tu lado izquierdo, y pon la iniquidad de la casa de Israel sobre él; por el número de los días que te acuestes sobre él, llevarás su iniquidad.[a]
  to: Y tú, acuéstate sobre tu lado izquierdo, y pon la iniquidad de la casa de Israel sobre él; por el número de los días que te acuestes sobre él, llevarás la iniquidad de ellos.[a]
  rationale: Se ajusta el último sintagma a «la iniquidad de ellos» para reflejar con mayor claridad el sufijo plural hebreo עֲוֺנָם y alinearse mejor con el inglés auditado («their iniquity»), sin perder la naturalidad del español ni alterar la tensión semántica preservada por «iniquidad».
