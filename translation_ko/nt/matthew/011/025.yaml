id: MAT.11.25
reference: Matthew 11:25
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἐν ἐκείνῳ τῷ καιρῷ ἀποκριθεὶς ὁ Ἰησοῦς εἶπεν· Ἐξομολογοῦμαί σοι, πάτερ κύριε τοῦ οὐρανοῦ καὶ τῆς γῆς, ὅτι ⸀ἔκρυψας ταῦτα ἀπὸ σοφῶν καὶ συνετῶν, καὶ ἀπεκάλυψας αὐτὰ νηπίοις·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/011/025.yaml
  text: 'At that time Jesus answered and said[a], “I praise you, Father, Lord of heaven and earth, because you hid these things from the wise and understanding[b], and revealed them to little children.”'
  footnotes:
  - marker: a
    text: Or 'I thank you.' The Greek verb can express thanksgiving as well as praise or open acknowledgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'infants.' Here 'little children' likely carries a metaphorical sense for those who are humble or childlike in receptivity.
    reason: lexical_alternative
translation:
  language: ko
  text: '그때에 예수님이 응답하여 말씀하셨습니다. 「하늘과 땅의 주님이신 아버지, 제가 아버지께 감사드립니다. 이것들을 지혜로운 자들과 슬기로운 자들에게는 숨기시고 어린아이들에게는 나타내셨기 때문입니다.'
  philosophy: optimal-equivalence
theological_decisions:
- issue: 11:25 아버지-아들 계시 관계 (위격 인식론)
  chosen_reading: 아버지께서 「숨기시고」 「나타내시는」 주권
  alternative_readings:
  - 중립적 「알리시고」
  rationale: 본문은 ἔκρυψας/ἀπεκάλυψας의 강한 대조로 아버지의 선택적 계시를 드러낸다. 이는 11:27의 「아무도 아들을 알지 못한다」 선언과 한 단위를 이룬다. 한국어 「숨기시고/나타내셨기」로 옮겨 본문의 신적 주권을 약화하지 않는다.
  doctrine_reference: 'DOCTRINE.md: §1 원어 우선; §5 본문의 신학적 무게 보존'
