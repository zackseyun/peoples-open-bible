translation:
  language: es
  text: el que los sacó de la tierra de Egipto para ser su Dios. Yo soy Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘YHWH’ (tradicionalmente traducido ‘el SEÑOR’; alternativamente transliterado ‘Yahvé’).'
    reason: alternative_reading
lexical_decisions:
- source_word: הַמּוֹצִיא
  english_pob_choice: who brought ... out
  chosen_spanish: el que los sacó
  alternatives_spanish:
  - quien los sacó
  - el que los hizo salir
  lexicon: HALOT
  rationale: El participio causativo funciona como descripción relativa de Yahvé; en español, ‘el que los sacó’ conserva el valor relacional y la acción completada en un giro natural y fiel.
- source_word: אֶתְכֶם
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - os
  - ustedes
  lexicon: HALOT
  rationale: El hebreo marca 2.ª persona plural. En un registro bíblico neutro para español latinoamericano, ‘los’ mantiene el plural sin forzar un voseo o una forma demasiado marcada regionalmente.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: out of the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - fuera de la tierra de Egipto
  lexicon: HALOT
  rationale: ‘De la tierra de Egipto’ conserva la fórmula del éxodo y el sustantivo ‘tierra’, que es parte del valor convencional del hebreo, sin recargar el español.
- source_word: לִהְיוֹת לָכֶם לֵאלֹהִים
  english_pob_choice: to be your God
  chosen_spanish: para ser su Dios
  alternatives_spanish:
  - para ser Dios de ustedes
  - para ser su Dios y ustedes su pueblo
  lexicon: HALOT
  rationale: La fórmula de pacto se expresa de modo natural como ‘ser su Dios’. ‘Para’ reproduce la finalidad del infinitivo; ‘su’ preserva la relación plural y evita la rigidez de ‘Dios para ustedes’.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El nombre divino se vierte como ‘Yahvé’ según el principio del proyecto para YHWH, manteniendo la identificación personal del pacto sin la sustitución por ‘SEÑOR’.
theological_decisions:
- issue: Fórmula de pacto ‘ser su Dios’
  english_pob_reading: to be your God
  chosen_spanish_reading: para ser su Dios
  alternative_spanish_readings:
  - para ser Dios de ustedes
  - para ser vuestro Dios
  rationale: La frase expresa la relación de pacto entre Yahvé e Israel. ‘Ser su Dios’ es la forma española más clara y fiel, y conserva la reciprocidad implícita sin añadir contenido no presente en el hebreo.
  doctrine_reference: Formula covenantal of divine relationship in the Pentateuch
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto concluye con la autoidentificación divina. ‘Yahvé’ sigue el estándar del proyecto para el Tetragrámaton y evita la máscara litúrgica ‘el SEÑOR’, preservando el nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El inglés auditado mantuvo la frase de pacto y la nota sobre el nombre divino; la revisión más reciente no introdujo cambios. La versión española sigue esa misma decisión textual y teológica, adaptando solo la forma idiomática natural del español.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como término del nombre divino en coherencia con el estándar del proyecto.
  - Se conserva la fórmula de pacto ‘ser su Dios’ sin ampliaciones interpretativas.
  - El plural hebreo de segunda persona se expresa de forma natural con ‘su’ en español, evitando marcadores regionales.
