theological_decisions:
- issue: Euphemistic death formula
  chosen_reading: Translate ὕπνωσεν ὕπνῳ καλῷ as 'fell asleep in a good sleep' rather than 'died peacefully.'
  alternative_readings:
  - died peacefully
  - went to his rest
  rationale: The Greek deliberately uses sleep language, common in testamentary and biblical death scenes. Preserving it maintains literary texture and avoids interpretive flattening.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Fragmentary final prophecy line
  chosen_reading: Include the commonly reconstructed sense that Dan foretold Israel's forgetting God and estrangement from inheritance and kin.
  alternative_readings:
  - End the chapter at verse 2 because the OCR/Greek line is truncated
  - Translate only 'Nevertheless Dan prophesied to them that they would forget...' and leave the rest incomplete
  rationale: The surviving line in the provided Greek is visibly truncated after ἐπιλά-, but enough remains to support the standard sense of covenantal forgetting and estrangement. A footnote flags the textual incompleteness rather than omitting the verse entirely.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 4
