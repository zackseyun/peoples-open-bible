    issue: El marcador de nota [a] está anclado a «adivinación falsa» pero la nota explica la frase de los juramentos.
    rationale: Las instrucciones requieren que el marcador aparezca en la palabra o frase relevante. Aquí induce a error editorial y debe colocarse junto al sintagma difícil.
  - severity: medium
    issue: «para ellos» en «han jurado juramentos sobre juramentos para ellos» suena poco idiomático y oscurece la relación semántica de לָהֶם.
    rationale: En este contexto, el dativo/pronombre se entiende mejor en español como obligación que recae «sobre ellos», coherente con la alternativa inglesa documentada «oaths upon oaths for them» y con el sentido contextual de juramentos vinculantes aunque despreciados.
  - severity: low
    issue: La repetición literal puede mantenerse, pero conviene una forma española un poco más natural.
    rationale: Preservar la aspereza es correcto, pero «juramentos sobre juramentos sobre ellos» transmite mejor el hebreo difícil que «para ellos» sin introducir una paráfrasis fuerte.
  revised_spanish_text: Y será para ellos como una adivinación falsa ante sus ojos; han jurado juramentos sobre juramentos sobre ellos[a], pero él hace recordar la culpa, para que sean capturados.
