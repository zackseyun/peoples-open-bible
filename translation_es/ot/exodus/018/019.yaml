review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la secuencia y el sentido general del hebreo: exhortación a escuchar, ofrecimiento de consejo, deseo/bendición sobre la presencia de Dios, función mediadora de Moisés y presentación de los casos ante Dios. Sin embargo, hay desajustes en el aparato de notas y una formulación española algo rígida en «Tú sé para el pueblo», que conviene suavizar sin perder la transparencia del original.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero tiene dos problemas de legibilidad/fidelidad editorial: la nota [a] está anclada a «voz» aunque en realidad comenta «y que Dios esté contigo», y falta el equivalente de la nota inglesa sobre «before God»/«the matters» según el orden y anclaje correctos. Además, «Tú sé para el pueblo» suena poco natural; «Sé tú para el pueblo» mantiene la literalidad con mejor fluidez. También conviene eliminar el pronombre redundante en «y tú llevarás».'
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: אֱלֹהִים se vierte correctamente como «Dios». No aparecen términos con defaults sensibles como Yahvé, Mesías, esclavo, etc. La decisión de mantener una forma menos interpretativa para הֱיֵה אַתָּה לָעָם es coherente, pero requiere una redacción española más idiomática y un mejor manejo de las notas alternativas.'
  issues:
  - severity: high
    issue: La nota [a] está anclada al lugar equivocado.
    rationale: En el texto español, [a] aparece tras «mi voz», pero la nota explica «que Dios esté contigo», es decir, el segmento וִיהִי אֱלֹהִים עִמָּךְ. Esto rompe la correspondencia entre texto y nota exigida por el proyecto.
  - severity: medium
    issue: Falta reflejar correctamente el patrón de notas del inglés para «before God» y «the matters».
    rationale: El inglés distingue una nota alternativa para la función representativa y una nota cultural para «the matters». En español, la nota [c] existe, pero no está anclada de la manera más útil; conviene anclarla a «asuntos». Además, el orden de notas debe ser único y coherente en el texto revisado.
  - severity: medium
    issue: «Tú sé para el pueblo» suena forzado en español.
    rationale: Aunque es formalmente cercano al hebreo, el orden marcado «Tú sé» resulta poco natural. «Sé tú para el pueblo» preserva el énfasis y la estructura sin caer en un calco tosco.
  - severity: low
    issue: «y tú llevarás» añade énfasis innecesario.
    rationale: El segundo «tú» no aporta contraste claro en español y endurece la frase. «y llevarás» basta para conservar el valor instructivo del hebreo.
  revised_spanish_text: Ahora escucha mi voz; te aconsejaré, y que Dios esté contigo[a]. Sé tú para el pueblo delante de Dios[b], y llevarás los asuntos[c] a Dios.
