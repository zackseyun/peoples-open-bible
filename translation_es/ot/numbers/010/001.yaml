lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - habló
  lexicon: HALOT
  rationale: La forma narrativa waw-consecutiva con דבר introduce un acto de habla nuevo. En español, «habló» conserva mejor que «dijo» el matiz de pronunciación formal y se ajusta bien a la fórmula «habló... diciendo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como el nombre divino «Yahvé» en la política española del proyecto, preservando el nombre personal del pacto y evitando la sustitución por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - a
  lexicon: HALOT
  rationale: La preposición marca el destinatario del discurso; en español, «a» es la equivalencia natural y precisa para introducir el complemento indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Se mantiene el nombre propio en su forma española establecida, inteligible y estándar en contexto bíblico.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - diciendo
  lexicon: HALOT
  rationale: El infinitivo constructo introduce la fórmula de discurso directo; «diciendo» reproduce compactamente el hebreo sin añadir una conjunción que el texto no exige.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa el nombre del pacto directamente. La opción «Yahvé» conserva ese nombre propio en español y sigue la decisión doctrinal del proyecto de no ocultarlo bajo una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con el trazado auditado en inglés: el verbo narrativo se conserva como un acto de habla formal, el Tetragrámaton se traduce por el nombre divino «Yahvé», y la fórmula de discurso final se mantiene compacta sin expansión innecesaria.'
  spanish_consistency_notes:
  - 'Se mantiene el orden natural del español con sujeto explícito pospuesto al verbo: «Yahvé habló a Moisés, diciendo,».'
  - Se evita «SEÑOR» por coherencia con la política del proyecto para יְהוָה.
  - El marcador de nota [a] está anclado en el nombre divino para reflejar la decisión lexical documentada.
