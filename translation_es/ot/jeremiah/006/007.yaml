translation:
  language: es
  text: Como un pozo[a] mantiene frescas sus aguas, así ella mantiene fresca su maldad. Violencia y destrucción[b] se oyen en ella; delante de mí continuamente hay enfermedad y heridas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Como una cisterna mantiene fresca su agua, así ella mantiene fresca su maldad». El verbo hebreo es difícil, y algunos entienden la imagen como un pozo o cisterna que produce o conserva agua continuamente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «violencia y devastación» o «violencia y despojo».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «delante de mi rostro continuamente, enfermedad y herida»; la expresión puede leerse de manera literal o metafórica para la condición de la ciudad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּהָקִיר
  english_pob_choice: keeps ... fresh
  chosen_spanish: mantiene frescas
  alternatives_spanish:
  - las enfría
  - las hace frías
  - las deja fluir
  lexicon: HALOT
  rationale: El verbo es difícil y el contexto compara un pozo con sus aguas. En español, 'mantiene frescas' conserva la idea de una condición sostenida y natural de las aguas sin imponer una explicación excesivamente técnica del verbo hebreo.
- source_word: בור
  english_pob_choice: well
  chosen_spanish: pozo
  alternatives_spanish:
  - cisterna
  - hoyo
  lexicon: HALOT
  rationale: '''Pozo'' es el equivalente más natural en español para la imagen de un depósito asociado con agua en esta comparación. ''Cisterna'' es posible, pero en español sugiere con más fuerza almacenamiento que la imagen viva del versículo.'
- source_word: מֵימֶיהָ
  english_pob_choice: its waters
  chosen_spanish: sus aguas
  alternatives_spanish:
  - su agua
  lexicon: HALOT
  rationale: El plural hebreo se conserva bien con 'aguas', que suena natural en español y mantiene la relación posesiva con el pozo.
- source_word: הֵקֵרָה
  english_pob_choice: keeps ... fresh
  chosen_spanish: mantiene fresca
  alternatives_spanish:
  - enfría
  - hace frías
  - deja fluir
  lexicon: HALOT
  rationale: 'Se repite el mismo valor verbal para sostener el paralelismo del símil: así como el pozo conserva sus aguas, así Jerusalén conserva su maldad.'
- source_word: רָעָתָהּ
  english_pob_choice: her evil
  chosen_spanish: su maldad
  alternatives_spanish:
  - su mal
  - su maldad
  lexicon: HALOT
  rationale: En este contexto el sentido moral es el más probable, y 'maldad' comunica bien la condena profética sin perder la amplitud semántica básica del término.
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - opresión
  - injusticia
  lexicon: HALOT
  rationale: '''Violencia'' es la traducción estándar y encaja con la denuncia profética de brutalidad social.'
- source_word: וָשֹׁד
  english_pob_choice: and destruction
  chosen_spanish: y destrucción
  alternatives_spanish:
  - y ruina
  - y devastación
  - y despojo
  lexicon: HALOT
  rationale: '''Destrucción'' mantiene la fuerza de la pareja de términos y resulta natural junto a ''violencia'' en español.'
- source_word: יִשָּׁמַע בָּהּ
  english_pob_choice: are heard in her
  chosen_spanish: se oyen en ella
  alternatives_spanish:
  - se oye en ella
  - resuenan en ella
  lexicon: HALOT
  rationale: El pasivo/imperfectivo expresa lo que se percibe continuamente dentro de la ciudad. 'Se oyen en ella' suena natural en español y conserva la personificación femenina.
- source_word: עַל פָּנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  - ante mí
  lexicon: HALOT
  rationale: '''Delante de mí'' reproduce de forma idiomática la expresión hebrea y mantiene la perspectiva divina directa.'
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - sin cesar
  lexicon: HALOT
  rationale: '''Continuamente'' comunica la duración incesante del estado descrito.'
- source_word: חֳלִי
  english_pob_choice: sickness
  chosen_spanish: enfermedad
  alternatives_spanish:
  - dolencia
  - aflicción
  lexicon: HALOT
  rationale: En español, 'enfermedad' comunica bien la imagen corporal del versículo y encaja con 'heridas' sin resolver prematuramente si la frase es literal o metafórica.
- source_word: וּמַכָּה
  english_pob_choice: and wounds
  chosen_spanish: y heridas
  alternatives_spanish:
  - y golpes
  - y daño
  - y llagas
  lexicon: HALOT
  rationale: '''Heridas'' preserva la imagen concreta de lesión corporal y armoniza con ''enfermedad'' en la clausura del versículo.'
theological_decisions:
- issue: Personificación femenina de Jerusalén/Sion
  english_pob_reading: Retain feminine reference with 'she' and 'her'
  chosen_spanish_reading: Mantener la referencia femenina con 'ella' y posesivos femeninos implícitos
  alternative_spanish_readings:
  - usar 'eso' o 'eso' para la ciudad
  - neutralizar con 'la ciudad'
  rationale: El hebreo usa sufijos femeninos que personifican la ciudad. Mantener 'ella' preserva la retórica profética y el tono relacional del texto sin añadir interpretación doctrinal.
  doctrine_reference: Translation philosophy §1, §6
- issue: Naturaleza de חֳלִי וּמַכָּה
  english_pob_reading: Render as concrete 'sickness and wounds' while allowing metaphorical force
  chosen_spanish_reading: Traducir como 'enfermedad y heridas' conservando la posible fuerza metafórica
  alternative_spanish_readings:
  - '''aflicción y golpes'''
  - '''dolencia y castigo'''
  rationale: Los términos concretos se mantienen para no resolver de antemano si describen una condición física, moral o ambas. Así se respeta la tensión del original y del audit trail en inglés.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El audit trail en inglés indica alta concordancia, sin revisiones aplicadas y con acuerdo completo entre revisores; esta versión española mantiene esa lectura estable y conserva las mismas tensiones léxicas principales sin suavizarlas.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' en este versículo solo implícitamente en la referencia divina de primera persona; no aparece el Tetragrámaton en el texto hebreo citado aquí.
  - Se evita 'SEÑOR' porque el versículo usa primera persona divina, no una cita explícita del nombre divino.
  - Se mantiene la personificación femenina de la ciudad con 'ella' para reflejar los sufijos hebreos.
  - '''Pozo'' se usa como equivalente lector-friendly sin cerrar del todo la opción de ''cisterna'', indicada en nota.'
  - '''Heridas'' y ''enfermedad'' conservan el campo corporal y no fuerzan una lectura exclusivamente moral.'
