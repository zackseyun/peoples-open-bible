  text: וְ/לָקַ֧ח הַ/כֹּהֵ֛ן מַ֥יִם קְדֹשִׁ֖ים בִּ/כְלִי חָ֑רֶשׂ וּ/מִן הֶֽ/עָפָ֗ר אֲשֶׁ֤ר יִהְיֶה֙ בְּ/קַרְקַ֣ע הַ/מִּשְׁכָּ֔ן יִקַּ֥ח הַ/כֹּהֵ֖ן וְ/נָתַ֥ן אֶל הַ/מָּֽיִם־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/005/017.yaml
  text: Then the priest shall take holy water in an earthen vessel[c][b][a], and the priest shall take some of the dust that is on the floor of the tabernacle and put it into the water.
  footnotes:
  - marker: a
    text: Or 'sacred water.' The Hebrew simply means water set apart as holy for ritual use.
    reason: lexical_alternative
  - marker: b
    text: Or 'in a clay vessel' or 'in a pottery vessel.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from the ground of the tabernacle.' The Hebrew term can mean 'ground' or 'floor'; 'floor' fits the tabernacle setting well.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
