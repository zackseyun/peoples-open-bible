    reason: lexical_alternative
  revision_rationale: 'Se revisa el término principal para alinear el español con el hebreo מָעוֹן y con la decisión principal de la POB inglesa: «morada» conserva la metáfora espacial de habitación. «Refugio» y «habitación» quedan como alternativas en una sola nota correctamente anclada. Se elimina la nota erróneamente colocada sobre «Señor» y la duplicación de notas.'
