translation:
  language: es
  text: No te familiarices con un hombre necio[a], no sea que desprecie a los nobles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «No deshonres a un hombre en su vejez, pues también algunos de nosotros envejecemos». El griego difiere sustancialmente del hebreo conservado en este versículo.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תְּרַגִּיל
  english_pob_choice: Do not become familiar with
  chosen_spanish: No te hagas familiar con
  alternatives_spanish:
  - No te acostumbres a
  - No entables trato habitual con
  - No te familiarices con
  lexicon: HALOT
  rationale: La forma hebrea expresa no entrar en una relación habitual o cercana; en español, «hacerse familiar con» conserva esa idea de familiaridad progresiva sin sonar tan pesada como un calco literal.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo es masculino singular y la advertencia se formula en esa forma; «un hombre» mantiene el referente y la precisión léxica del original.
- source_word: אֱוִיל
  english_pob_choice: foolish
  chosen_spanish: necio
  alternatives_spanish:
  - fatuo
  - insensato
  - tonto
  lexicon: HALOT
  rationale: «Necio» es un término sobrio y bíblicamente natural para la categoría sapiencial de אֱוִיל, sin rebajarlo al registro coloquial de «tonto».
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - o de lo contrario
  lexicon: HALOT
  rationale: La cláusula final de advertencia se expresa mejor en español con «no sea que», que reproduce con naturalidad el valor prevenido de פֶּן.
- source_word: יָבוּז
  english_pob_choice: he show contempt
  chosen_spanish: desprecie
  alternatives_spanish:
  - muestre desprecio por
  - desoiga con desprecio a
  - menoscabe
  lexicon: HALOT
  rationale: En este contexto, el verbo hebreo denota actuar con desprecio; «desprecie» comunica bien esa actitud de menosprecio social y moral.
- source_word: לִנְדִיבִים
  english_pob_choice: for nobles
  chosen_spanish: a los nobles
  alternatives_spanish:
  - a los príncipes
  - a los notables
  - a los generosos
  lexicon: HALOT
  rationale: El hebreo apunta a personas de rango o nobleza; «los nobles» preserva el matiz de estatus sin imponer una interpretación más específica que la del texto hebreo.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego
  english_pob_reading: The English POB follows the Hebrew primary reading and notes the Greek alternative in a footnote.
  chosen_spanish_reading: Se traduce el hebreo como texto principal y se expone la lectura griega en nota.
  alternative_spanish_readings:
  - No deshonres a un hombre en su vejez, pues también algunos de nosotros envejecen.
  rationale: Para Sirácida, el hebreo disponible tiene primacía textual; sin embargo, la lectura griega transmitida es sustancialmente distinta y debe quedar visible para auditoría y comparación.
  doctrine_reference: 'PHILOSOPHY.md: primacía del hebreo cuando se conserva, con preservación transparente de alternativas significativas en paralelo griego.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió «become familiar with» por encima de una formulación más mecánica. En español, «No te hagas familiar con» busca el mismo equilibrio entre precisión semántica y naturalidad, sin diluir la advertencia sapiencial. También se mantiene visible la divergencia sustancial entre el hebreo y el griego.
  spanish_consistency_notes:
  - Se usó «necio» para mantener el registro sapiencial y evitar un coloquialismo excesivo.
  - Se prefirió «los nobles» para reflejar el término de rango social del hebreo.
  - La nota al pie está anclada únicamente en la frase del verso que conecta con la lectura alternativa griega.
