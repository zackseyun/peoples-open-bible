translation:
  language: es
  text: los que se sientan entre las sepulturas y pasan la noche en lugares ocultos[a], los que comen carne de cerdo y el caldo de cosas impuras está en sus vasijas[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘en lugares escondidos’; el término hebreo es difícil y también se ha entendido como ‘en lugares guardados’ o, menos probablemente por el contexto, ‘en lugares sitiados’.
    reason: lexical_alternative
  - marker: b
    text: O ‘sopa’ o ‘estofado’ de cosas impuras.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיֹּשְׁבִים
  english_pob_choice: who sit
  chosen_spanish: los que se sientan
  alternatives_spanish:
  - los que habitan
  - los que permanecen
  lexicon: HALOT
  rationale: El participio sustantivado describe a un grupo caracterizado por su conducta continua. 'Los que se sientan' conserva la imagen concreta y el valor participial, como 'who sit' en el audit trail.
- source_word: בַּקְּבָרִים
  english_pob_choice: among the graves
  chosen_spanish: entre las sepulturas
  alternatives_spanish:
  - en las sepulturas
  - entre las tumbas
  lexicon: HALOT
  rationale: קברים puede referirse a sepulcros o tumbas; 'sepulturas' es claro en español y mantiene el ámbito funerario. 'Entre' refleja bien el valor contextual de la preposición en esta escena de asociación con los muertos.
- source_word: וּבַנְּצוּרִים
  english_pob_choice: in hidden places
  chosen_spanish: en lugares ocultos[a]
  alternatives_spanish:
  - en lugares escondidos
  - en lugares guardados
  - en lugares sitiados
  lexicon: HALOT
  rationale: El término es difícil y el contexto favorece un sentido de ocultamiento; por eso se usa 'lugares ocultos'. La nota preserva la incertidumbre semántica y las otras posibilidades documentadas.
- source_word: יָלִינוּ
  english_pob_choice: spend the night
  chosen_spanish: pasan la noche
  alternatives_spanish:
  - pernoctan
  - se quedan a pasar la noche
  lexicon: HALOT
  rationale: La raíz לין expresa pernoctar o permanecer durante la noche. 'Pasan la noche' es natural en español y mantiene el aspecto durativo/nocturno del verbo.
- source_word: הָאֹכְלִים
  english_pob_choice: who eat
  chosen_spanish: los que comen
  alternatives_spanish:
  - los que están comiendo
  lexicon: HALOT
  rationale: Se mantiene la estructura participial sustantivada con una relativa en español. 'Los que comen' es directo y fiel.
- source_word: בְּשַׂר הַחֲזִיר
  english_pob_choice: pig's flesh
  chosen_spanish: carne de cerdo
  alternatives_spanish:
  - carne de puerco
  - carne del cerdo
  lexicon: HALOT
  rationale: '''Carne de cerdo'' es el equivalente moderno más claro y conserva el carácter concreto y ofensivo ritualmente del original, sin pasar a una expresión culinaria más suave.'
- source_word: ו/פרק
  english_pob_choice: and broth
  chosen_spanish: y el caldo
  alternatives_spanish:
  - y la sopa
  - y el estofado
  lexicon: HALOT
  rationale: Siguiendo el audit trail, el sustantivo raro se entiende mejor como un líquido o caldo. 'Caldo' funciona en español y conserva la imagen de una preparación contenida.
- source_word: פִּגֻּלִים
  english_pob_choice: unclean things
  chosen_spanish: cosas impuras
  alternatives_spanish:
  - cosas inmundas
  - cosas abominables
  - cosas contaminadas ritualmente
  lexicon: HALOT
  rationale: פִּגּוּל designa lo ritualmente detestable/impuro. 'Cosas impuras' comunica la fuerza de la impureza ritual sin sobreexplicar ni desplazar el término hacia una categoría doctrinal posterior.
- source_word: כְּלֵיהֶם
  english_pob_choice: their vessels
  chosen_spanish: está en sus vasos
  alternatives_spanish:
  - está en sus recipientes
  - está en sus utensilios
  - está en sus vasijas
  lexicon: HALOT
  rationale: כְּלִי es amplio y puede referirse a recipientes. 'Vasos' permite un español breve y natural en el contexto de bebida/comida, aunque 'recipientes' o 'vasijas' también serían posibles. Se conserva la ambigüedad del plural posesivo.
theological_decisions:
- issue: Lenguaje de impureza ritual sin suavizar la imagen
  english_pob_reading: Retain concrete impurity language without expanding it into later doctrinal categories.
  chosen_spanish_reading: 'Conservar el lenguaje concreto de impureza ritual: carne de cerdo, caldo y cosas impuras en sus vasos.'
  alternative_spanish_readings:
  - traducir más genéricamente como 'alimentos prohibidos'
  - usar 'abominaciones' en lugar de 'cosas impuras'
  rationale: El verso denuncia prácticas concretas asociadas con impureza y culto ilícito. La redacción española mantiene esa materialidad y no la sustituye por una formulación más abstracta o teológica que el texto no explicita.
  doctrine_reference: 'Principio POB: primacía del texto original y preservación de la tensión lexical/theológica.'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail, que prefirió 'hidden places' frente a 'secret places' por ser una solución más natural y léxicamente ajustada; por eso la traducción española usa 'lugares ocultos' y conserva la nota de ambigüedad. También se siguió la lectura revisada de 'broth' como 'caldo'.
  spanish_consistency_notes:
  - Se mantuvo 'cosas impuras' para preservar la fuerza ritual de פִּגּוּל sin introducir categorías doctrinales ajenas.
  - Se evitó 'SEÑOR' o 'Yahvé' porque este versículo no contiene el tetragrámaton ni una referencia directa a él.
  - La estructura total conserva la secuencia participial del hebreo con relativas españolas ('los que...').
  - '''Vasos'' se eligió como término amplio y natural, compatible con el contexto alimentario, sin fijar innecesariamente el objeto como ''ollas'' o ''recipientes''.'
