  rationale: Se ajusta la puntuación inicial para una lectura más natural en español, se conserva el valor deíctico de הִנֵּה con una nota, y se añade la nota requerida sobre la frase hebrea difícil וְכֹבֶד מַשָּׂאָה, en línea con la auditoría inglesa. También se cambia «densa humareda» a «humo denso» para una correspondencia más transparente con la formulación inglesa revisada, sin perder la imagen poética.
