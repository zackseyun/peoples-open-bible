translation:
  language: es
  text: Así David y toda la casa de Israel iban subiendo el arca de Yahvé con aclamación[a] y con el sonido del cuerno[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con gritos de júbilo»; תְרוּעָה puede denotar una aclamación festiva o un clamor jubiloso.
    reason: lexical_alternative
  - marker: b
    text: O «con el sonido de la trompeta»; שׁוֹפָר designa un cuerno, a menudo de carnero.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדָוִד ... וְכָל בֵּית יִשְׂרָאֵל
  english_pob_choice: David and all the house of Israel
  chosen_spanish: David y toda la casa de Israel
  alternatives_spanish:
  - David y todo Israel
  - David y toda la familia de Israel
  lexicon: HALOT
  rationale: Conservo la expresión constructa 'casa de Israel', que en español es natural y preserva el matiz corporativo/familiar del hebreo mejor que una simplificación a 'todo Israel'.
- source_word: מַעֲלִים
  english_pob_choice: were bringing up
  chosen_spanish: estaban subiendo
  alternatives_spanish:
  - subían
  - iban subiendo
  - estaban trayendo arriba
  lexicon: HALOT
  rationale: El participio/forma verbal en contexto narrativo expresa acción en curso; 'estaban subiendo' mantiene ese aspecto progresivo y refleja el movimiento ascendente asociado con el arca.
- source_word: אֲרוֹן
  english_pob_choice: ark
  chosen_spanish: arca
  alternatives_spanish:
  - arca sagrada
  - arca
  lexicon: HALOT
  rationale: '''Arca'' es la correspondencia directa y clara en español para אֲרוֹן; no se requiere ampliación interpretativa.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Sigo el default del proyecto para el nombre divino y uso 'Yahvé' en español, preservando el nombre del pacto en vez de reemplazarlo por una máscara titulada.
- source_word: בִּתְרוּעָה
  english_pob_choice: with shouting
  chosen_spanish: con júbilo
  alternatives_spanish:
  - con gritos de júbilo
  - con aclamación
  - con grito jubiloso
  lexicon: HALOT
  rationale: תְרוּעָה puede denotar grito jubiloso o aclamación festiva; en español 'júbilo' comunica bien el matiz celebrativo sin forzar una repetición innecesaria con la frase siguiente.
- source_word: וּבְקוֹל שׁוֹפָר
  english_pob_choice: with the sound of the horn
  chosen_spanish: con el sonido del cuerno
  alternatives_spanish:
  - con el sonido del shofar
  - con el sonido de la trompeta
  - con el sonido del cuerno de carnero
  lexicon: HALOT
  rationale: שׁוֹפָר es un cuerno ritual; 'cuerno' es más fuente-cercano que 'trompeta' y evita introducir un instrumento metálico no indicado por el hebreo. 'Sonido del cuerno' mantiene la construcción קול + instrumento.
theological_decisions:
- issue: Nombre divino יְהוָה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la política del proyecto, el español debe preservar el nombre divino como 'Yahvé' para no ocultarlo bajo una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de תְרוּעָה
  english_pob_reading: shouting
  chosen_spanish_reading: júbilo
  alternative_spanish_readings:
  - gritos de júbilo
  - aclamación
  - clamor
  rationale: No reduzco el término a simple ruido ni lo vuelvo estrictamente militar; en este contexto procesional encaja mejor el sentido festivo/jubiloso que el hebreo permite.
  doctrine_reference: HALOT, תְרוּעָה
translation_notes:
  revision_awareness: El control cruzado indica alta coincidencia con el análisis fuente y sin cambios requeridos en la revisión más reciente. La formulación española conserva el aspecto progresivo de מַעֲלִים, el valor corporativo de 'casa de Israel' y el paralelismo entre 'júbilo' y 'sonido del cuerno' sin sobrecargar la frase.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como nombre divino principal, coherente con el estándar del proyecto en español.
  - '''Casa de Israel'' preserva la formulación hebrea y evita la nivelación a ''todo Israel''.'
  - '''Cuerno'' se prefiere a ''trompeta'' por fidelidad al שׁוֹפָר bíblico.'
  - La puntuación y el orden siguen un español natural y publicable sin perder la sintaxis fuente-cercana.
