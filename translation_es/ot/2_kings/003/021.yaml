review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: Moab oye del avance de los reyes, hay una movilización general de los aptos para la guerra, y toman posición en la frontera. Sin embargo, la nota [a] está mal anclada y explica ''contra ellos'', que no necesita nota y además desplaza la nota que en el audit trail corresponde al modismo militar ''ceñirse el cinturón... y mayores''. También conviene ajustar la redacción de ese modismo en español para que suene más natural y claro.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'todos los que podían ponerse un cinturón y en adelante' suena forzado en español. 'Desde todo el que podía ceñirse un cinturón en adelante' conserva demasiado la sintaxis hebrea; mejor una formulación natural que preserve la imagen concreta y el sentido de edad militar. 'Se apostaron junto a la frontera' es posible, pero 'se pusieron en la frontera' o 'tomaron posición en la frontera' refleja mejor עמד על הגבול sin añadir demasiado matiz militar. También sobra el punto y coma antes de la última cláusula.
  glossary_alignment: 'No hay términos del glosario maestro directamente en juego. Las decisiones léxicas principales están bien encaminadas: ''Moab'' como colectivo, ''oyó'', ''habían subido'', y ''pelear contra ellos''. La principal desalineación es de notas: debe preservarse la nota sobre el modismo de edad militar y, si se mantiene una nota léxica sobre וַיִּצָּעֲקוּ, anclarla en ''se reunieron'' o equivalente.'
  issues:
  - severity: high
    issue: La nota [a] está anclada a 'ellos' y explica 'contra ellos', en vez de anclarse al modismo 'ponerse un cinturón... y en adelante'.
    rationale: El audit trail inglés documenta la nota cultural para la expresión hebrea sobre edad militar, no para בם ('contra ellos'). La nota actual no preserva la justificación documentada y crea una nota innecesaria.
  - severity: medium
    issue: La expresión 'todos los que podían ponerse un cinturón y en adelante' suena poco idiomática en español.
    rationale: Aunque intenta conservar la imagen concreta, 'ponerse un cinturón' no comunica con claridad el modismo de aptitud/edad militar. 'Ceñirse un cinturón' es más cercano a la imagen original y más natural en registro bíblico moderno.
  - severity: low
    issue: '''Se apostaron junto a la frontera'' añade un matiz algo más técnico que el hebreo básico ''se pusieron/estuvieron en la frontera''.'
    rationale: עמד על הגבול significa tomar posición en la frontera. 'Tomaron posición en la frontera' o 'se pusieron en la frontera' preserva bien el sentido sin sonar excesivamente interpretativo.
  revised_spanish_text: Y todo Moab oyó que los reyes habían subido para pelear contra ellos, y se reunieron[a], todos los que podían ceñirse un cinturón[b] y mayores, y tomaron posición en la frontera.
  revised_footnotes:
  - marker: a
    text: 'O: ''se movilizaron'' / ''fueron convocados''. El verbo hebreo aquí probablemente expresa una reunión militar, no solo una llamada o un grito.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, 'desde todo el que se ciñe un cinturón y hacia arriba', un modismo para los de edad militar y mayores.
    reason: cultural_note
  revision_rationale: 'Se corrigió la alineación de las notas para reflejar el audit trail: la nota cultural ahora explica el modismo hebreo de edad militar y la nota léxica queda en el verbo de movilización. También se mejoró la naturalidad del español con ''ceñirse un cinturón'' y ''tomaron posición en la frontera'', manteniendo fielmente el sentido fuente.'
