  rationale: Se reemplaza 'serían presa' por 'serían botín' para reflejar con mayor precisión el sentido de בַּז como botín/despojo de guerra. Se conservan el resto de las decisiones, que son fieles y naturales en español, y se ajusta la nota léxica correspondiente para que coincida con el texto revisado.
