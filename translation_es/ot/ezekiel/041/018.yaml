translation:
  language: es
  text: Había querubines y palmeras hechos en él[a], con una palmera entre querubín y querubín; y cada querubín tenía dos rostros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tallados’; el hebreo dice literalmente ‘hechos’, y en este contexto arquitectónico probablemente se refiere a decoración trabajada o tallada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשׂ֥וּי
  english_pob_choice: were made on it
  chosen_spanish: fueron hechos sobre él
  alternatives_spanish:
  - fueron tallados sobre él
  - fueron labrados sobre él
  - fueron fabricados sobre él
  lexicon: HALOT
  rationale: El participio pasivo de עשה expresa que los motivos fueron ‘hechos’. En este contexto de ornamentación arquitectónica, el español puede conservar esa lectura básica sin forzar ‘tallados’ en el texto principal; ‘sobre él’ sigue el contexto de la superficie decorada.
- source_word: כְּרוּבִ֖ים
  english_pob_choice: cherubim
  chosen_spanish: querubines
  alternatives_spanish:
  - querubines
  - querubes
  lexicon: HALOT
  rationale: ‘Querubines’ es la forma natural y reverente en español para el plural de כְּרוּב. Mantiene el registro arquitectónico/visionario y evita una forma demasiado coloquial.
- source_word: וְ/תִֽמֹרִ֑ים
  english_pob_choice: and palm trees
  chosen_spanish: y palmeras
  alternatives_spanish:
  - y palmas
  - y figuras de palmera
  - y motivos de palmera
  lexicon: HALOT
  rationale: El sustantivo plural aquí designa motivos de palmera en la decoración del templo. ‘Palmeras’ conserva la imagen concreta con naturalidad en español.
- source_word: וְ/תִֽמֹרָה֙
  english_pob_choice: a palm tree
  chosen_spanish: una palmera
  alternatives_spanish:
  - una palma
  - una figura de palmera
  lexicon: HALOT
  rationale: 'El singular se entiende distributivamente: una palmera entre cada querubín y querubín. ‘Palmera’ es transparente y mantiene la correspondencia con el plural anterior.'
- source_word: בֵּין כְּר֣וּב לִ/כְר֔וּב
  english_pob_choice: between cherub and cherub
  chosen_spanish: entre querubín y querubín
  alternatives_spanish:
  - entre un querubín y otro
  - entre cada par de querubines
  lexicon: HALOT
  rationale: La construcción hebrea es distributiva y repetitiva. ‘Entre querubín y querubín’ preserva ese patrón formal sin añadir interpretación.
- source_word: וּ/שְׁנַ֥יִם פָּנִ֖ים לַ/כְּרוּב
  english_pob_choice: each cherub had two faces
  chosen_spanish: y cada querubín tenía dos rostros
  alternatives_spanish:
  - y el querubín tenía dos rostros
  - y con dos rostros para cada querubín
  - y cada querubín tenía dos caras
  lexicon: HALOT
  rationale: La idea literal es ‘dos פנים para el querubín’. ‘Rostros’ es mejor que ‘caras’ en español bíblico porque conserva la referencia anatómica/figural solemne y el vínculo con el contexto inmediato.
theological_decisions:
- issue: Naturaleza descriptiva de la decoración del templo
  english_pob_reading: Render as literal decorative cherubim and palm-tree motifs without allegorical expansion.
  chosen_spanish_reading: Traducir como motivos decorativos literales de querubines y palmeras, sin alegorizar ni añadir simbolismo no explícito.
  alternative_spanish_readings:
  - Interpretar las figuras como símbolos teológicos desarrollados
  - Suavizar el pasaje hacia una lectura puramente ornamental sin mantener la literalidad
  rationale: El hebreo describe ornamentos del templo. La versión española debe reflejar esa descripción sin importar un significado doctrinal o tipológico que el texto no afirma aquí.
  doctrine_reference: 'Principio POB: no introducir afirmaciones doctrinales no dadas por el texto; conservar la tensión y la literalidad donde el pasaje es descriptivo.'
translation_notes:
  revision_awareness: 'Coincide con el pasaje inglés auditado en la lectura de la decoración del templo: cherubim/querubines y palm-tree motifs/palmeras, con la misma nota de alternativa lexical para עשה. No se detectan revisiones aplicadas en el paquete inglés; la redacción española mantiene esa estabilidad y conserva la ambigüedad productiva entre ‘hechos’ y ‘tallados’.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - Se eligió ‘querubines’ por registro bíblico natural y no ‘querubes’, que suena menos estándar.
  - ‘Rostros’ preserva mejor el tono bíblico que ‘caras’ en este contexto.
  - La nota a pie de página se ancla en ‘hechos’ para reflejar la alternativa lexical documentada sin duplicarla en otro lugar.
