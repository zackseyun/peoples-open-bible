    rationale: יָגוֹר expresa temor/dread; «temblar de alguien» no es la formulación más natural ni la más precisa en español bíblico actual. «a quienes temes» o «ante quienes tienes miedo» comunica mejor el sentido.
  - severity: medium
    issue: Falta la nota alternativa para «los caldeos» = «los babilonios», presente en el audit trail inglés.
    rationale: El encargo pide preservar alternativas significativas cuando la POB inglesa las conserva. Aquí se documentó explícitamente que el término puede referirse más ampliamente a las fuerzas babilonias.
  - severity: high
