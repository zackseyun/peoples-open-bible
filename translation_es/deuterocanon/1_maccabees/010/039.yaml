translation:
  language: es
  text: Ptolemaida y el territorio adyacente a ella los he dado en donación[a] al santuario en Jerusalén, para los gastos principales del santuario.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Ptolemaida y lo que le pertenece" o "Ptolemaida y el distrito anexado a ella".'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πτολεμαΐδα
  english_pob_choice: Ptolemais
  chosen_spanish: Ptolemaida
  alternatives_spanish:
  - Ptolemais
  lexicon: LSJ
  rationale: Es un nombre propio geográfico; en español es natural transliterarlo como Ptolemaida, manteniendo la referencia histórica sin traducirlo.
- source_word: τὴν προσκυροῦσαν αὐτῇ
  english_pob_choice: the territory adjoining it
  chosen_spanish: el territorio adyacente a ella
  alternatives_spanish:
  - lo que le pertenece
  - el distrito anexado a ella
  - la región contigua a ella
  lexicon: LSJ
  rationale: La expresión participial indica lo que está unido o contiguo a la ciudad. 'Territorio adyacente' transmite bien el sentido administrativo y geográfico en español.
- source_word: δέδωκα
  english_pob_choice: I have given
  chosen_spanish: lo he dado
  alternatives_spanish:
  - lo di
  lexicon: BDAG/LSJ
  rationale: El perfecto griego se refleja mejor con un perfecto español, porque la donación se presenta como acto vigente y no solo como acción pasada.
- source_word: δόμι
  english_pob_choice: as a gift
  chosen_spanish: como don
  alternatives_spanish:
  - como regalo
  - como donación
  lexicon: LSJ
  rationale: La forma transmitida es inusual, pero el sentido es de donación. 'Don' preserva el registro elevado y la idea de ofrenda/cesión formal.
- source_word: τοῖς ἁγίοις τοῖς ἐν Ἰερουσαλήμ
  english_pob_choice: to the sanctuary in Jerusalem
  chosen_spanish: al santuario en Jerusalén
  alternatives_spanish:
  - a los santos en Jerusalén
  - a los santos de Jerusalén
  lexicon: BDAG/LSJ
  rationale: Siguiendo la revisión del POB inglés, aquí ἅγιοι se entiende en contexto administrativo-templario como referencia al santuario o su servicio sagrado, no como 'santos' en sentido eclesial.
- source_word: εἰς τὴν προκαθήκουσαν δαπάνην
  english_pob_choice: for the principal expenses
  chosen_spanish: para los gastos principales
  alternatives_spanish:
  - para los gastos necesarios
  - para el gasto regular
  - para los gastos previos
  lexicon: LSJ
  rationale: προκαθήκουσαν es una forma extraña en el testimonio y sugiere lo que corresponde primero o lo que está asignado de antemano. 'Gastos principales' conserva la idea de prioridad sin forzar una precisión que el griego no garantiza.
- source_word: τοῖς ἁγίοις
  english_pob_choice: of the sanctuary
  chosen_spanish: del santuario
  alternatives_spanish:
  - para lo sagrado
  - para las cosas sagradas
  lexicon: LSJ
  rationale: En la cláusula final, repetir 'a los santos' en español sería incoherente con el contexto de gastos. La referencia más probable es al uso sagrado o al servicio del santuario, por eso se expresa con 'del santuario'.
theological_decisions:
- issue: Sentido de ἅγιοι en contexto de administración del templo
  english_pob_reading: The first occurrence refers to the sanctuary in Jerusalem; the final phrase is also read in relation to sanctuary expenses rather than persons.
  chosen_spanish_reading: La primera referencia se entiende como el santuario en Jerusalén; la cláusula final también se refiere a gastos del santuario, no a personas santas.
  alternative_spanish_readings:
  - a los santos en Jerusalén
  - para los santos
  rationale: No es una disputa doctrinal mayor, pero sí afecta si el don se lee como apoyo a personas o al culto del templo. El contexto de gastos y administración favorece la lectura orientada al santuario.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: He seguido la revisión más reciente del POB inglés, que desplazó la lectura de 'holy ones in Jerusalem' hacia 'sanctuary in Jerusalem' y prefirió 'principal expenses' para προκαθήκουσαν δαπάνην. La redacción española intenta mantener esa decisión, pero conservando la transparencia del texto griego y del registro administrativo del pasaje.
  spanish_consistency_notes:
  - Se mantiene 'santuario' para τοῖς ἁγίοις en ambos puntos, conforme al contexto templario y a la revisión inglesa.
  - '''Ptolemaida'' se usa como forma española del topónimo, manteniendo la transliteración propia de nombres geográficos.'
  - '''Don'' conserva un tono formal y refleja mejor la cesión diplomática que una simple ''donación'' moderna.'
