translation:
  language: es
  text: 'Entonces Johanán hijo de Quereáh dijo privadamente a Guedalías en Mizpá[a], diciendo: “Por favor, déjame ir y matar a Ismael hijo de Netanías, y nadie sabrá[b]. ¿Por qué ha de quitarte la vida[c], para que todos los de Judá que están reunidos junto a ti sean dispersados, y perezca el remanente de Judá?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en secreto' / 'secretamente'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''y ningún hombre sabrá''; el sentido es genérico: ''nadie sabrá''.'
    reason: lexical_alternative
  - marker: c
    text: O '¿Por qué ha de matarte?'. Lit., '¿Por qué ha de herirte—vida?'; la frase hebrea es idiomática y alude a quitarte la vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּסֵּתֶר
  english_pob_choice: privately
  chosen_spanish: en secreto
  alternatives_spanish:
  - privadamente
  - secretamente
  lexicon: HALOT
  rationale: El sustantivo con preposición expresa la idea de ocultamiento o secreto. En español, 'en secreto' comunica con naturalidad la conversación reservada sin perder el matiz de que no fue pública.
- source_word: בַּמִּצְפָּה
  english_pob_choice: at Mizpah
  chosen_spanish: en Mizpá
  alternatives_spanish:
  - en Mizpa
  - en la ciudad de Mizpá
  lexicon: HALOT
  rationale: Se conserva el topónimo transliterado como nombre propio geográfico. 'En Mizpá' es la forma más natural para indicar el lugar de la conversación.
- source_word: אֵלְכָה נָּא
  english_pob_choice: Please let me go
  chosen_spanish: Por favor, déjame ir
  alternatives_spanish:
  - Permíteme ir, por favor
  - Te ruego que me dejes ir
  lexicon: HALOT
  rationale: El cohortativo con נָא es una petición cortés o insistente. 'Por favor, déjame ir' mantiene la fuerza volitiva y el tono suplicante sin sobreactuar.
- source_word: וְאַכֶּה
  english_pob_choice: and strike down
  chosen_spanish: y herir
  alternatives_spanish:
  - y golpear
  - y matar
  lexicon: HALOT
  rationale: נכה significa literalmente 'golpear/herir'. En este contexto el golpe tiene intención letal, pero 'herir' conserva la literalidad básica mejor que 'matar', que interpreta más el resultado. Dado que el español puede sonar más natural con este verbo, el contexto de asesinato ya deja clara la intención.
- source_word: וְאִישׁ לֹא יֵדָע
  english_pob_choice: and no one will know
  chosen_spanish: y nadie lo sabrá
  alternatives_spanish:
  - y ningún hombre lo sabrá
  - y nadie sabrá de ello
  lexicon: HALOT
  rationale: El hebreo usa 'hombre' de forma genérica, pero en español 'nadie lo sabrá' comunica mejor el sentido sin forzar una marca de género que aquí no aporta claridad.
- source_word: לָמָּה יַכֶּכָּה נֶפֶשׁ
  english_pob_choice: Why should he take your life
  chosen_spanish: ¿Por qué ha de quitarte la vida?
  alternatives_spanish:
  - ¿Por qué ha de herirte?
  - ¿Por qué ha de matarte?
  lexicon: HALOT
  rationale: La secuencia hebrea es idiomática y alude a una agresión mortal. 'Quitarte la vida' conserva el sentido de la frase y su nivel idiomático, sin volverla demasiado cruda ni demasiado explicativa.
- source_word: וְנָפֹצוּ
  english_pob_choice: would be scattered
  chosen_spanish: sean dispersados
  alternatives_spanish:
  - se dispersen
  - serían dispersados
  lexicon: HALOT
  rationale: El verbo expresa dispersión del grupo. En una oración de finalidad con 'para que', el subjuntivo pasivo 'sean dispersados' fluye de modo natural en español y mantiene la relación causal.
- source_word: כָּל יְהוּדָה
  english_pob_choice: all the Judahites
  chosen_spanish: todos los de Judá
  alternatives_spanish:
  - todo Judá
  - todos los judíos
  lexicon: HALOT
  rationale: Aquí se refiere al pueblo de Judá, no solo al territorio. 'Todos los de Judá' evita tanto la rigidez de un calco como la posible anacronía de 'judíos' en este contexto histórico.
- source_word: הַנִּקְבָּצִים אֵלֶיךָ
  english_pob_choice: who are gathered to you
  chosen_spanish: que se han reunido contigo
  alternatives_spanish:
  - que están reunidos contigo
  - que se reúnen contigo
  lexicon: HALOT
  rationale: El participio señala a los que están congregados en torno a Guedalías. 'Se han reunido contigo' expresa bien el estado resultante y la dirección relacional de אֵלֶיךָ.
- source_word: שְׁאֵרִית יְהוּדָה
  english_pob_choice: the remnant of Judah
  chosen_spanish: el remanente de Judá
  alternatives_spanish:
  - el resto de Judá
  - la supervivencia de Judá
  lexicon: HALOT
  rationale: '''Remanente'' es el término bíblico habitual y conserva la carga histórica y teológica de שְׁאֵרִית. ''De Judá'' mantiene la referencia al pueblo como comunidad sobreviviente.'
- source_word: וְאָבְדָה
  english_pob_choice: would perish
  chosen_spanish: perezca
  alternatives_spanish:
  - perezcan
  - sería destruido
  lexicon: HALOT
  rationale: אבד puede significar perecer, ser destruido o perderse. En español, 'perezca' funciona bien con el paralelismo del verso y conserva la gravedad de la ruina anunciada.
theological_decisions:
- issue: Uso de 'Judá' como designación del pueblo en vez de 'judíos'
  english_pob_reading: all the Judahites
  chosen_spanish_reading: todos los de Judá
  alternative_spanish_readings:
  - todos los judíos
  - todo Judá
  rationale: El pasaje describe al grupo histórico que rodea a Guedalías después de la catástrofe, no una categoría religiosa posterior. 'Todos los de Judá' preserva esa identidad político-ética sin anacronismo.
  doctrine_reference: Historiografía bíblica y continuidad del pueblo del pacto en contexto exílico/postexílico.
- issue: Renderizar נֶפֶשׁ como 'vida' en la pregunta retórica
  english_pob_reading: take your life
  chosen_spanish_reading: quitarte la vida
  alternative_spanish_readings:
  - matarte
  - herirte
  rationale: La pregunta apunta al peligro mortal para Guedalías. 'Quitarte la vida' recoge la fuerza idiomática de נֶפֶשׁ como vida personal, evitando una literalidad poco transparente en español.
  doctrine_reference: 'Antropología bíblica: נֶפֶשׁ como vida/personalidad del individuo.'
- issue: Valor de la dispersión como consecuencia del asesinato
  english_pob_reading: so that all the Judahites who are gathered to you would be scattered
  chosen_spanish_reading: para que todos los de Judá que se han reunido contigo sean dispersados
  alternative_spanish_readings:
  - y así todos los de Judá... se dispersarían
  - para que se dispersen
  rationale: La frase expresa una consecuencia histórica y comunitaria, no solo un efecto inmediato. Mantener 'sean dispersados' conserva el peso de la amenaza sobre la comunidad reunida alrededor de Guedalías.
  doctrine_reference: Tema bíblico del remanente y la fragilidad de la comunidad del pacto.
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la revisión más reciente del inglés POB: conserva la idea de conversación privada/secreta, actualiza la negación genérica a ''nadie'', y mantiene la interpretación idiomática de la pregunta retórica sobre la vida de Guedalías. También conserva la estructura causal final con dispersión del pueblo y el remanente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como convención del proyecto solo cuando aparece explícitamente el nombre divino; este versículo no lo contiene.
  - Se mantiene 'remanente' para שְׁאֵרִית por coherencia con la terminología bíblica del proyecto.
  - '''Judá'' se refiere aquí al pueblo histórico; no se sustituye por ''judíos'' para evitar anacronismo.'
  - Se emplea 'Guedalías' y 'Johanán' como transliteraciones españolas consistentes con el tono bíblico y la pronunciación aproximada.
