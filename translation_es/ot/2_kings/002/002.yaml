    reason: lexical_alternative
  revision_rationale: Se ajustó la fórmula de juramento para que el español sea idiomático y fiel al valor del hebreo y a la decisión auditada en inglés. «Y por tu vida» comunica mejor וְחֵי נַפְשְׁךָ que «y vive tu vida», y «no te dejaré» expresa con naturalidad la negación implícita tras אִם.
