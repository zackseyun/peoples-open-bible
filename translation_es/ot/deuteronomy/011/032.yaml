revisions:
- from: Y ustedes cuidarán de poner por obra todos los estatutos y los decretos[a] que yo presento ante ustedes hoy.
  to: Y se cuidarán de cumplir todos los estatutos y los juicios que yo pongo delante de ustedes hoy[a].
  rationale: Se ajusta מִשְׁפָּטִים a ‘juicios’ para preservar la distinción jurídica frente a ‘estatutos’; se simplifica לַעֲשׂוֹת a ‘cumplir’ por mayor naturalidad; y se afina el modismo נֹתֵן לִפְנֵיכֶם como ‘pongo delante de ustedes’, con una nota más clara y natural en español. ‘Se cuidarán de’ conserva bien la fuerza de שׁמר + infinitivo.
  reviewer_model: gpt-5.4
