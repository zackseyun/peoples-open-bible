  rationale: Se corrigieron los verbos de singular a plural para reflejar con fidelidad la segunda persona plural del hebreo y la acusación dirigida al grupo. Se mantuvieron «casa», «lleva mi nombre», «somos librados» y «abominaciones» porque preservan adecuadamente las decisiones léxicas y teológicas documentadas en la auditoría inglesa.
