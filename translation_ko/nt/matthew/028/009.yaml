  text: ⸀καὶ ⸀ἰδοὺ Ἰησοῦς ⸀ὑπήντησεν αὐταῖς λέγων· Χαίρετε· αἱ δὲ προσελθοῦσαι ἐκράτησαν αὐτοῦ τοὺς πόδας καὶ προσεκύνησαν αὐτῷ.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/028/009.yaml
  text: And behold[a], Jesus met them, saying, “Greetings!” And they came up, took hold of his feet[b], and worshiped him.
  footnotes:
  - marker: a
    text: Or “Rejoice!” The Greek χαίρετε is literally a plural imperative, but in context it functions as a greeting.
    reason: lexical_alternative
  - marker: b
    text: Or “bowed down to him” / “paid homage to him.” The Greek προσεκύνησαν can denote prostration or homage; here it likely carries the stronger sense of worship in light of the resurrection context.
    reason: alternative_reading
translation:
  language: ko
  text: 그리고 보아라, 예수께서 그들을 만나 말씀하셨습니다, 「평안하십시오!」 그러자 그들이 다가와 그의 발을 붙잡고 그에게 경배하였습니다.
  philosophy: optimal-equivalence
