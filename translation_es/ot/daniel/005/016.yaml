  text: But I have heard about you that you are able to give interpretations and to solve difficulties[a]. Now, if you are able to read the writing and make its interpretation known to me, you shall be clothed with purple, and a chain of gold shall be put around your neck[b], and you shall rule as third in the kingdom.
