base_translation:
  language: en
  yaml_path: translation/ot/genesis/020/014.yaml
  text: Then Abimelech took sheep and cattle[a], and male slaves and female slaves, and gave them to Abraham[c][b]; and he returned Sarah his wife to him.
  footnotes:
  - marker: a
    text: Or 'flocks' for 'sheep'; the Hebrew צֹאן can refer more broadly to small livestock.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'male slaves and female slaves.' Some translations use 'servants,' but the context of transfer as property favors 'slaves.'
    reason: lexical_alternative
  - marker: c
    text: Or 'restored Sarah, his wife, to him.'
    reason: lexical_alternative
