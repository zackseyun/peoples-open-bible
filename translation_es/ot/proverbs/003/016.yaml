translation:
  language: es
  text: Larga vida[a] está en su mano derecha; en su mano izquierda hay riquezas y honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «largura de días».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹרֶךְ יָמִים
  english_pob_choice: Length of days
  chosen_spanish: Largura de días
  alternatives_spanish:
  - larga vida
  - longitud de días
  lexicon: HALOT
  rationale: La frase hebrea es un giro nominal poético. «Largura de días» mantiene más de cerca la imagen literal de «length of days» que la paráfrasis «larga vida», preservando el paralelismo y la forma sapiencial del hebreo; en español suena un poco marcado, pero sigue siendo entendible y auditable.
- source_word: בִּימִינָהּ
  english_pob_choice: in her right hand
  chosen_spanish: en su mano derecha
  alternatives_spanish:
  - a su derecha
  - en la diestra
  lexicon: HALOT
  rationale: La preposición ב aquí se expresa naturalmente con «en»; «su» conserva el sufijo femenino de la sabiduría personificada. «Mano derecha» reproduce el sentido corporal y mantiene el paralelismo con «mano izquierda».
- source_word: בִּשְׂמֹאולָהּ
  english_pob_choice: in her left hand
  chosen_spanish: en su mano izquierda
  alternatives_spanish:
  - a su izquierda
  - en la siniestra
  lexicon: HALOT
  rationale: Se conserva la estructura paralela de la línea anterior. «Izquierda» es el equivalente natural de שְׂמֹאל, y «su» vuelve a reflejar la personificación femenina del contexto.
- source_word: עֹשֶׁר
  english_pob_choice: riches
  chosen_spanish: riquezas
  alternatives_spanish:
  - riqueza
  - bienes
  lexicon: HALOT
  rationale: «Riquezas» reproduce bien el sustantivo plural/sustantivado hebreo en el registro poético y empareja con «honra», siguiendo la decisión inglesa de evitar una expansión interpretativa.
- source_word: כָבוֹד
  english_pob_choice: honor
  chosen_spanish: honra
  alternatives_spanish:
  - honor
  - gloria
  lexicon: HALOT
  rationale: En español «honra» comunica el valor social de estima y respeto que el contexto sapiencial sugiere mejor que «gloria», que podría sonar más teológica. «Honor» también sería posible, pero «honra» conserva un tono clásico y claro.
theological_decisions:
- issue: Referente de los sufijos femeninos en «su mano»
  english_pob_reading: The feminine pronouns refer to personified wisdom from the immediate context.
  chosen_spanish_reading: Los posesivos femeninos se refieren a la sabiduría personificada del contexto inmediato.
  alternative_spanish_readings:
  - una referencia a una mujer literal
  - una personificación menos marcada
  rationale: El hebreo presenta a la sabiduría como figura femenina que ofrece dones. La traducción debe mantener esa personificación literaria sin convertirla en una entidad doctrinal independiente ni neutralizar el género gramatical del texto.
  doctrine_reference: Proverbios 1–9; Translation philosophy §3
translation_notes:
  revision_awareness: El informe inglés muestra alta concordancia y ninguna revisión aplicada; por eso la versión española sigue de cerca el texto hebreo, conservando la metáfora corporal y la personificación femenina sin añadir explicaciones al cuerpo principal.
  spanish_consistency_notes:
  - Se mantiene «su» para reflejar el sufijo femenino singular de la sabiduría personificada.
  - «Honra» se usa por registro sapiencial y por la preferencia del POB de conservar el matiz de social esteem frente a una ampliación teológica.
  - La nota al pie ofrece la alternativa más natural en español («larga vida») para la frase hebrea «length of days».
