    reason: lexical_alternative
  - marker: b
    text: 'El griego paralelo dice: ''Da fragancia y memorial de flor de harina, y haz rica la ofrenda, como quien no existe''—con una frase final sustancialmente diferente. Aquí se sigue el testimonio hebreo, usando el griego como control para el sentido sacrificial.'
    reason: alternative_reading
