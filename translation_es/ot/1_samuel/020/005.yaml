translation:
  language: es
  text: 'David dijo a Jonatán: «Mira, mañana es la luna nueva[b], y yo debo sentarme con el rey a comer. Pero déjame ir, para que pueda esconderme en el campo hasta el tercer atardecer[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta la tarde del tercer día». La expresión hebrea es elíptica.
    reason: lexical_alternative
  - marker: b
    text: «Luna nueva» se refiere a la observancia mensual de la luna nueva, a menudo marcada por una comida especial.
    reason: cultural_note
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Observa
  - Fíjate
  lexicon: HALOT
  rationale: Expresa la llamada de atención de manera natural en español, conservando el valor deíctico sin volverlo solemne o arcaico.
- source_word: חֹדֶשׁ מָחָר
  english_pob_choice: tomorrow is the new moon
  chosen_spanish: mañana es la luna nueva
  alternatives_spanish:
  - mañana es el novilunio
  - mañana es la festividad de la luna nueva
  - mañana es la nueva luna
  lexicon: HALOT
  rationale: En este contexto de banquete cortesano, חֹדֶשׁ alude a la observancia de la luna nueva. «Luna nueva» comunica bien la referencia cultual y calendárica en español.
- source_word: יָשֹׁב אֵשֵׁב
  english_pob_choice: I ought to sit
  chosen_spanish: debo sentarme
  alternatives_spanish:
  - debería sentarme
  - tengo que sentarme
  - me corresponde sentarme
  lexicon: HALOT
  rationale: La duplicación verbal hebrea intensifica obligación o expectativa. «Debo sentarme» conserva la fuerza normativa sin sonar mecánico en español.
- source_word: עִם הַמֶּלֶךְ לֶאֱכֹל
  english_pob_choice: with the king to eat
  chosen_spanish: con el rey a comer
  alternatives_spanish:
  - con el rey para comer
  - con el rey en la comida
  - a la mesa con el rey
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de sentarse con el rey para comer. «A comer» es una forma natural en español y cercana al infinitivo hebreo.
- source_word: וְשִׁלַּחְתַּנִי
  english_pob_choice: But let me go
  chosen_spanish: Pero déjame ir
  alternatives_spanish:
  - y despídeme
  - y envíame lejos
  - y permíteme irme
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «y me enviarás», en contexto es una petición de permiso para ausentarse. «Déjame ir» transmite la intención pragmática sin perder la base verbal.
- source_word: וְנִסְתַּרְתִּי
  english_pob_choice: that I may hide myself
  chosen_spanish: para que pueda esconderme
  alternatives_spanish:
  - y me esconderé
  - para esconderme
  - y pueda esconderme
  lexicon: HALOT
  rationale: La relación de propósito/resultando está mejor expresada en español con «para que pueda», que refleja la secuencia intencional de la frase hebrea.
- source_word: בַשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en la campaña
  - en el terreno
  lexicon: HALOT
  rationale: «Campo» comunica de forma natural el espacio exterior rural que indica שָׂדֶה, sin sobretraducirlo como «campo abierto» o «countryside».
- source_word: עַד הָעֶרֶב הַשְּׁלִשִׁית
  english_pob_choice: until the third evening
  chosen_spanish: hasta la tercera tarde
  alternatives_spanish:
  - hasta la tarde del tercer día
  - hasta el tercer atardecer
  - hasta la noche del tercer día
  lexicon: HALOT
  rationale: Se conserva la expresión breve y algo elíptica del hebreo. «Tercera tarde» refleja la forma literal; el matiz temporal queda señalado en la nota textual.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió «I ought to sit» frente a una formulación más débil. En español se refleja con «debo sentarme», manteniendo la obligación/expectativa sin añadir interpretación extra. También se conserva el cierre elíptico como «hasta la tercera tarde», con nota aclaratoria.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no aplica.
  - Se conserva «Jonatán» y «David» con la forma española usual de nombres propios bíblicos.
  - La secuencia verbal mantiene el orden narrativo del hebreo sin forzar una reescritura idiomática excesiva.
  - La ambigüedad de 'la tercera tarde' se preserva en el texto y se aclara en nota, conforme al tratamiento auditado del inglés POB.
