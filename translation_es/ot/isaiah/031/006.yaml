revisions:
- from: ¡Vuelvan a aquel[a] contra quien los hijos de Israel se han rebelado profundamente!
  to: Vuelvan al que tanto[a] se han rebelado los hijos de Israel.
  rationale: Se hace un ajuste menor para mejorar la naturalidad del español sin perder la compresión ni la implicatura del hebreo. Se elimina la exclamación, se reemplaza la construcción más pesada «a aquel contra quien» por «al que», y se expresa la intensificación con «tanto», que suena más idiomático en español bíblico moderno. La nota conserva la alternativa más literal y aclara el referente implícito.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:23:17Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: un llamado plural a volver, con la construcción relativa implícita y la idea de rebelión intensificada. Sin embargo, «a aquel contra quien» suena algo rígido en español y no aprovecha del todo la alternativa auditada en inglés («al que» / «a quien»).'
  spanish_quality_summary: El texto es claro y fiel, pero «a aquel contra quien» resulta algo pesado y poco natural para lectura eclesial continua. «Vuelvan al que tanto[a] se han rebelado los hijos de Israel» suena más idiomático y mantiene la compresión del hebreo. También conviene evitar el signo de exclamación inicial/final, ya que el hebreo es un imperativo profético, no necesariamente exclamativo.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Los hijos de Israel» preserva correctamente בְּנֵי יִשְׂרָאֵל. No se introduce indebidamente «Yahvé». «Se han rebelado» es adecuado para סָרָה, y «tanto» funciona mejor que «profundamente» como intensificador natural en español para הֶעְמִיקוּ + סָרָה en esta construcción.
  issues:
  - severity: medium
    issue: 'Expresión relativa poco natural: «a aquel contra quien»'
    rationale: Aunque es fiel, en español suena forzada y pesada. La construcción hebrea es compacta; una forma como «al que» o «a quien» preserva mejor esa compresión y mejora la legibilidad.
  - severity: low
    issue: Uso de exclamaciones no exigido por el original
    rationale: El hebreo tiene un imperativo plural, pero no requiere signos de exclamación. En una traducción bíblica principal, la puntuación sobria suele ser preferible.
  - severity: medium
    issue: «Profundamente» es comprensible, pero algo tieso con «rebelarse»
    rationale: La intensificación de הֶעְמִיקוּ puede representarse de manera más natural en español con «tanto» o «tan profundamente». «Tanto se han rebelado» mantiene bien la fuerza sin sonar calcado.
  revised_spanish_text: Vuelvan al que tanto[a] se han rebelado los hijos de Israel.
  revised_footnotes:
