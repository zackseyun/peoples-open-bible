review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido general del hebreo: ocasión temporal/legal («Cuando»), idiomático «hacer un censo», pago individual a Yahvé, rescate «por su vida», y propósito de evitar una plaga. Sin embargo, omite en el texto principal el matiz de לִפְקֻדֵיהֶם («según los registrados/contados entre ellos»), que en el inglés auditado se conservó explícitamente. Además, «cada uno» atenúa la precisión masculina distributiva de אִישׁ frente a la decisión documentada «cada hombre».'
  spanish_quality_summary: El español es claro y natural, pero puede afinarse para reflejar mejor tanto la estructura del original como la política de género exacto del proyecto. «Cuando hagas un censo de los hijos de Israel, según los registrados entre ellos» suena digno y comprensible. «Cada hombre dará» es algo más literal que «cada uno» y sigue siendo legible en español eclesial general.
  glossary_alignment: 'Alineación buena en términos clave: יהוה → «Yahvé», בְּנֵי יִשְׂרָאֵל → «los hijos de Israel», כֹּפֶר → «rescate», נֶפֶשׁ → «vida», נֶגֶף → «plaga». La principal desalineación es no conservar suficientemente לִפְקֻדֵיהֶם y suavizar אִישׁ a «cada uno» en vez de «cada hombre», contrario a la rationale de gender-accurate.'
  issues:
  - severity: medium
    issue: לִפְקֻדֵיהֶם no está representado distintivamente en el texto principal.
    rationale: El borrador absorbe esta frase en «cuando los cuentes», pero el versículo ya repite después בִּפְקֹד אֹתָם dos veces. Así se pierde la diferenciación entre «según los registrados entre ellos» y «cuando los cuentes» preservada en la auditoría inglesa.
  - severity: medium
    issue: «cada uno» debilita la fuerza distributiva masculina de אִישׁ.
    rationale: La política del proyecto favorece precisión de género cuando el original la marca. «Cada hombre» refleja mejor la decisión documentada sin volver el español antinatural.
  - severity: low
    issue: Falta la nota alternativa equivalente a la nota inglesa sobre «los israelitas».
    rationale: El inglés preserva una alternativa lexical para בְּנֵי יִשְׂרָאֵל. Conviene mantenerla también en español, especialmente porque «hijos de Israel» puede sentirse más formal o marcado.
  revised_spanish_text: Cuando hagas un censo de los hijos de Israel[a], según los registrados entre ellos, cada hombre dará a Yahvé un rescate por su vida[b] cuando los cuentes, para que no haya entre ellos ninguna plaga cuando los cuentes.
  revised_footnotes:
  - marker: a
    text: O «los israelitas». Lit. «levantes la cabeza de los hijos de Israel», un modismo para hacer un censo.
    reason: lexical_alternative
  - marker: b
    text: O «por sí mismo»; hebreo néfesh suele significar «vida» o «persona», no solo «alma».
    reason: lexical_alternative
  revision_rationale: La revisión restaura el matiz administrativo de לִפְקֻדֵיהֶם con «según los registrados entre ellos», preserva mejor la decisión de género exacto con «cada hombre», y añade la alternativa «los israelitas» ya documentada en la auditoría inglesa. El resto del borrador era sólido y se conserva.
