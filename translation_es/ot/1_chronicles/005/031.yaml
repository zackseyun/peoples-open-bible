lexical_decisions:
- source_word: וַ/אֲבִישׁ֨וּעַ֙
  english_pob_choice: Abishua
  chosen_spanish: Abisúa
  alternatives_spanish:
  - Abisúa
  lexicon: HALOT
  rationale: Nombre propio; se translitera al español con ortografía bíblica natural. Se conserva la forma simple del nombre sin explicarlo ni adaptarlo, siguiendo el carácter genealógico del texto.
- source_word: הוֹלִ֣יד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - procreó
  lexicon: HALOT
  rationale: En contexto genealógico, el verbo hifil de ילד expresa causar descendencia o engendrar. En español, 'engendró' conserva esa relación genealogía-lineal con dignidad y sin el tono más coloquial de 'fue padre de'.
- source_word: בֻּקִּ֔י
  english_pob_choice: Bukki
  chosen_spanish: Bukí
  alternatives_spanish:
  - Bukki
  lexicon: HALOT
  rationale: Nombre propio; se mantiene transliterado. Se adapta la acentuación al español para una lectura natural, sin alterar la identidad del nombre.
- source_word: וּ/בֻקִּ֖י
  english_pob_choice: and Bukki
  chosen_spanish: y Bukí
  alternatives_spanish:
  - Bukí
  lexicon: HALOT
  rationale: La waw conjuntiva se traduce con 'y' para conservar la sucesión simple de la genealogía. Se mantiene la forma del nombre de manera consistente.
- source_word: עֻזִּֽי
  english_pob_choice: Uzzi
  chosen_spanish: Uzzi
  alternatives_spanish:
  - Uzi
  lexicon: HALOT
  rationale: Nombre propio bíblico; se conserva la transliteración usual. En español, 'Uzzi' evita confusión con el nombre moderno 'Uzi' y refleja mejor la forma bíblica.
translation_notes:
  revision_awareness: El inglés POB ya estaba en acuerdo alto con la fuente y no requirió revisión sustantiva; la versión española sigue de cerca la estructura genealógica hebrea y conserva la cadena verbal repetida. No se introdujeron glosas ni variantes textuales.
  spanish_consistency_notes:
  - 'Se mantuvo un estilo genealógico breve y paralelo: nombre + verbo + objeto + nombre.'
  - Se conservó la repetición de 'engendró' para reflejar la misma forma verbal en hebreo.
  - Se usó transliteración consistente para los nombres propios, con ajuste ortográfico mínimo al español cuando mejora la pronunciación.
  - No se añadió artículo antes de los nombres, conforme al uso genealógico bíblico en español.
