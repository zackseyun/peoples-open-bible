revisions:
- from: Pero tú[a], no pienses que quedarás inocente, habiendo intentado combatir contra Dios.
  to: Pero tú[a], no pienses que saldrás inocente por haber intentado luchar contra Dios.
  rationale: Se ajusta «quedarás inocente» a «saldrás inocente» para expresar de manera más natural en español la idea de no resultar libre de culpa. Se cambia «habiendo intentado» por «por haber intentado» para reflejar mejor la fuerza causal del participio griego en un español digno y claro. «Luchar contra Dios» mantiene la fuerza literal de θεομαχεῖν con mejor naturalidad que «combatir contra Dios».
