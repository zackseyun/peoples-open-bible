translation:
  language: es
  text: Y se celebró la boda de Tobías con regocijo durante siete días.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤχθη
  english_pob_choice: was celebrated
  chosen_spanish: se celebró
  alternatives_spanish:
  - se llevó a cabo
  - fue celebrada
  - se realizó
  lexicon: LSJ
  rationale: El aoristo pasivo de ἄγω en este giro idiomático expresa la realización de un acontecimiento. En español, 'se celebró' transmite de forma natural que la fiesta nupcial tuvo lugar, sin perder el valor eventivo del pasivo.
- source_word: ὁ γάμος
  english_pob_choice: the wedding
  chosen_spanish: la boda
  alternatives_spanish:
  - el matrimonio
  - las bodas
  - la celebración nupcial
  lexicon: LSJ
  rationale: Aquí γάμος apunta a la celebración nupcial, no al estado abstracto de matrimonio. 'Boda' suena natural en español y conserva el matiz festivo del contexto.
- source_word: Τωβεία
  english_pob_choice: Tobiah’s
  chosen_spanish: de Tobías
  alternatives_spanish:
  - de Tobías
  - de Tobit
  lexicon: LSJ
  rationale: 'El genitivo indica pertenencia: la boda de Tobías. Se usa ''Tobías'' para mantener la transliteración preferida en el proyecto, en lugar de la forma latinizada ''Tobias''.'
- source_word: μετʼ εὐφροσύνης
  english_pob_choice: with rejoicing
  chosen_spanish: con regocijo
  alternatives_spanish:
  - con alegría
  - con júbilo
  - alegremente
  lexicon: LSJ
  rationale: La frase preposicional expresa alegría festiva acompañante. 'Con regocijo' conserva el sustantivo y el tono celebrativo sin sonar forzado.
- source_word: ἑπτὰ ἡμέρας
  english_pob_choice: for seven days
  chosen_spanish: durante siete días
  alternatives_spanish:
  - por siete días
  - siete días
  lexicon: LSJ
  rationale: El acusativo indica duración. 'Durante siete días' expresa con claridad la extensión temporal en un español natural.
translation_notes:
  revision_awareness: El texto griego y el registro de auditoría en inglés muestran alta concordancia y no requieren variantes textuales ni notas de tensión doctrinal. La revisión más reciente indicó que no había cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene el nombre propio como 'Tobías' según la preferencia del proyecto para transliterar nombres.
  - Se eligió 'boda' y no 'matrimonio' para conservar el sentido festivo del contexto inmediato.
  - Se prefirió una construcción pasiva refleja natural en español ('se celebró') para reproducir el evento celebrado sin calcar el griego.
