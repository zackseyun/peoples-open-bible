review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: dos cláusulas paralelas con δόσις, una que no beneficia al destinatario y otra cuyo retorno es doble. Sin embargo, «don» no es la mejor opción aquí para δόσις en español bíblico general, porque suele sugerir capacidad dada por Dios o don espiritual más que un acto/objeto de dar. El sentido proverbial del contraste entre una dádiva infructuosa y una dádiva con retorno doble se preserva mejor con «regalo» o «dádiva»; en este contexto «regalo» suena más natural y claro.'
  spanish_quality_summary: La redacción es clara y gramatical, pero «Hay un don… y hay un don…» suena menos natural y algo equívoca en español eclesial contemporáneo. «Regalo» mejora la legibilidad. Además, en la nota, «devolución» no encaja tan bien como equivalente de ἀνταπόδομα; «retorno» o «retribución» representan mejor la reciprocidad sin reducirla a una devolución material.
  glossary_alignment: 'No hay conflicto con la terminología teológica principal del proyecto. La decisión principal es léxica: δόσις se alinea mejor con «regalo» en el texto principal y con «dar» en la alternativa de nota; λυσιτελήσει -> «te aprovechará» es aceptable; ἀνταπόδομα -> «retribución» en el texto y «retorno» en la nota mantienen bien el campo semántico.'
  issues:
  - severity: medium
    issue: «don» para δόσις en el texto principal
    rationale: Aunque posible en abstracto, en español bíblico y eclesial «don» suele asociarse con un don espiritual, talento o gracia concedida, no con un regalo o acto de dar en un proverbio sapiencial. Esto introduce una connotación ajena al griego y reduce la claridad.
  - severity: low
    issue: «devolución» en la nota alternativa
    rationale: «Devolución» suena más concreta y material, como devolver un objeto, mientras que ἀνταπόδομα abarca retorno, retribución o pago recíproco. «Retorno» preserva mejor la amplitud del original.
  revised_spanish_text: Hay un regalo[a] que no te aprovechará, y hay un regalo cuya retribución es doble.
  revised_footnotes:
  - marker: a
    text: 'O: «Hay un dar que no te beneficiará, y hay un dar cuyo retorno es doble».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «don» por «regalo» para reflejar mejor δόσις en español natural y evitar la connotación de don espiritual o capacidad especial. Se ajusta la nota para usar «retorno» en lugar de «devolución», más cercano al valor amplio de ἀνταπόδομα.
