translation:
  language: es
  text: 'los que vinieron con Zorobabel fueron Jeshúa[a], Nehemías, Azarías, Raamía, Nahamani, Mardoqueo, Bilsán, Misperet, Bigvai, Nehum y Baaná[c][b]. El número de los hombres del pueblo de Israel:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En la lista paralela de Esdras 2:2, el nombre aparece como Reelaías.
    reason: alternative_reading
  - marker: b
