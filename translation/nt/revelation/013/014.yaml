id: REV.13.14
reference: Revelation 13:14
source:
  edition: SBLGNT
  text: καὶ πλανᾷ ⸀τοὺς κατοικοῦντας ἐπὶ τῆς γῆς διὰ τὰ σημεῖα ἃ ἐδόθη αὐτῷ ποιῆσαι ἐνώπιον τοῦ θηρίου, λέγων τοῖς κατοικοῦσιν ἐπὶ τῆς γῆς ποιῆσαι εἰκόνα τῷ θηρίῳ, ⸂ὃς ἔχει⸃ τὴν πληγὴν ⸂τῆς μαχαίρης καὶ ἔζησεν⸃.
translation:
  text: And it deceives those who dwell on the earth because of the signs that it was given to perform in the presence of the beast[c][b][a], telling those who dwell on the earth to make an image for the beast that had the wound of the sword and yet lived.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'leads astray those who dwell on the earth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to make an image of the beast'; the Greek more literally says 'an image for the beast.'
    reason: lexical_alternative
  - marker: c
    text: Or 'that had the sword wound and came to life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλανᾷ
  chosen: deceives
  alternatives:
  - leads astray
  lexicon: BDAG
  rationale: Present active indicative; 'deceives' is clear modern English and captures the causative sense of misleading. 'Leads astray' is a viable alternative but slightly more interpretive in English style.
- source_word: κατοικοῦντας / κατοικοῦσιν ἐπὶ τῆς γῆς
  chosen: those who dwell on the earth
  alternatives:
  - the inhabitants of the earth
  - those who live on the earth
  lexicon: BDAG
  rationale: Revelation repeatedly uses this expression as a thematic designation. 'Those who dwell on the earth' preserves the verbal force and intertextual consistency better than the more idiomatic 'inhabitants of the earth.'
- source_word: διὰ τὰ σημεῖα
  chosen: because of the signs
  alternatives:
  - by the signs
  - through the signs
  lexicon: BDAG
  rationale: διά with the accusative can express reason or means. Here the signs are the instrumental basis by which deception occurs; 'because of' is natural English that preserves the causal-instrumental force without overstating agency.
- source_word: σημεῖα
  chosen: signs
  alternatives:
  - miraculous signs
  - wonders
  lexicon: BDAG
  rationale: The noun itself is 'signs.' Adding 'miraculous' would import an explanatory nuance not explicit in the word, though the context implies extraordinary acts.
- source_word: ἐδόθη αὐτῷ ποιῆσαι
  chosen: it was given to perform
  alternatives:
  - it was granted to do
  - he was allowed to perform
  lexicon: BDAG
  rationale: The passive ἐδόθη is a standard apocalyptic divine-permission passive. 'It was given to perform' stays close to the Greek while remaining readable. The neuter/grammatical ambiguity is represented in English by impersonal passive rather than making the subject explicit.
- source_word: ἐνώπιον τοῦ θηρίου
  chosen: in the presence of the beast
  alternatives:
  - before the beast
  lexicon: BDAG
  rationale: '''In the presence of'' is idiomatic and preserves the spatial-relational sense of ἐνώπιον.'
- source_word: λέγων
  chosen: telling
  alternatives:
  - saying to
  - commanding
  lexicon: BDAG
  rationale: The participle introduces the content of the deception. 'Telling' is smoother English than wooden 'saying to' and does not overstate the force as 'commanding' might.
- source_word: ποιῆσαι εἰκόνα τῷ θηρίῳ
  chosen: to make an image for the beast
  alternatives:
  - to make an image of the beast
  - to make a statue for the beast
  lexicon: BDAG
  rationale: The dative τῷ θηρίῳ is most naturally rendered 'for the beast' here, indicating dedication or reference. 'Of the beast' is possible by implication, but the Greek does not use a genitive. 'Image' is broader and more faithful than 'statue.'
- source_word: εἰκόνα
  chosen: image
  alternatives:
  - likeness
  - statue
  lexicon: BDAG
  rationale: '''Image'' is the standard rendering and preserves the broader semantic range, including cultic representation.'
- source_word: ὃς ἔχει τὴν πληγὴν τῆς μαχαίρης
  chosen: that had the wound of the sword
  alternatives:
  - which has the wound of the sword
  - that had the sword wound
  lexicon: BDAG
  rationale: The relative clause modifies 'the beast.' Although ἔχει is present, English often uses past tense in a relative clause describing a prior defining event in narrative context. 'The wound of the sword' is more formally transparent than the smoother 'sword wound,' though the latter is preserved as an alternative.
- source_word: μάχαιρα
  chosen: sword
  alternatives:
  - dagger
  - short sword
  lexicon: BDAG
  rationale: Standard rendering in Revelation; 'sword' is conventional and sufficiently precise without over-specifying the weapon type.
- source_word: καὶ ἔζησεν
  chosen: and yet lived
  alternatives:
  - and lived
  - and came to life
  - and revived
  lexicon: BDAG
  rationale: 'The aorist of ζάω here marks survival/restoration after the wound. ''And yet lived'' brings out the adversative force implied by the context: despite the wound, the beast lived. ''Came to life'' could suggest resurrection more strongly than the Greek requires in this clause.'
