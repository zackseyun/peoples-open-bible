translation:
  language: es
  text: 'Y los hijos de Mica: Pitón[a], Melec, Tarea y Acaz.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Nombre también escrito «Tahrea» en algunas tradiciones inglesas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los descendientes de
  - Los hijos de
  lexicon: HALOT
  rationale: En una lista genealógica, בני se entiende en sentido inmediato de filiación. En español, 'hijos de' conserva mejor el valor genealógico directo que 'descendientes de', y la coordinación inicial 'Y' preserva la secuencia del hebreo.
- source_word: מִיכָה
  english_pob_choice: Micah
  chosen_spanish: Mica
  alternatives_spanish:
  - Miqueas
  lexicon: HALOT
  rationale: Es un nombre propio. 'Mica' refleja la transliteración breve del hebreo en español; 'Miqueas' es la forma habitual del profeta y aquí podría inducir a confusión con otra persona.
- source_word: פִּיתוֹן
  english_pob_choice: Pithon
  chosen_spanish: Pitón
  alternatives_spanish:
  - Pithon
  lexicon: HALOT
  rationale: Nombre propio transliterado. En español se adapta la vocalización a una forma legible, manteniendo la correspondencia fonética básica del hebreo.
- source_word: וָמֶלֶךְ
  english_pob_choice: Melech
  chosen_spanish: Melec
  alternatives_spanish:
  - Melech
  - Rey
  lexicon: HALOT
  rationale: Aunque el lexema común מֶלֶךְ significa 'rey', aquí la función es onomástica dentro de una genealogía. Por eso se conserva como nombre propio, no como sustantivo común. 'Melec' es una transliteración más natural para el español que 'Melech'.
- source_word: וְתַאְרֵעַ
  english_pob_choice: Tarea
  chosen_spanish: Tarea
  alternatives_spanish:
  - Tahrea
  lexicon: HALOT
  rationale: Nombre propio transliterado. La forma española sigue de cerca la vocalización elegida por la POB inglesa, preservando también la posibilidad de la variante tradicional indicada en la nota.
- source_word: וְאָחָז
  english_pob_choice: Ahaz
  chosen_spanish: Ahaz
  alternatives_spanish:
  - Acaz
  lexicon: HALOT
  rationale: Nombre propio. Se mantiene la forma transliterada que coincide con la elección inglesa de la POB; 'Acaz' sería la adaptación tradicional española, pero aquí se conserva la equivalencia más directa con el hebreo.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa coinciden en leer una simple lista genealógica sin problemas textuales relevantes. La única variación documentada es la ortografía alternativa de uno de los nombres propios.
  spanish_consistency_notes:
  - Se conserva el orden y la estructura enumerativa del hebreo.
  - Los nombres propios se transliteran de forma consistente y se evita traducir מֶלֶךְ como 'rey' porque funciona aquí como antropónimo.
  - La nota al pie marca únicamente la variante ortográfica documentada para Tarea/Tahrea.
