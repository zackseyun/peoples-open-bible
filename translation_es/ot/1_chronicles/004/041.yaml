    rationale: La nota inglesa preserva una sola alternativa textual. Mantener una sola nota clara mejora la legibilidad y evita sobrecargar el texto.
  - severity: low
    issue: «Los dedicaron a destrucción» es algo poco idiomático en español.
    rationale: Aunque comprensible, suena forzado. «Los consagraron al exterminio» o «los dedicaron a la destrucción» comunica mejor el valor técnico de חרם en español eclesial legible.
