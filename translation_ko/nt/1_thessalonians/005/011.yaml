  lexicon: BDAG
  rationale: 4:18의 「위로」와 구분해 5장의 권면 흐름에서는 「격려」가 본 절 정황에 더 적합하다.
- source_word: οἰκοδομεῖτε εἷς τὸν ἕνα
  english_pob_choice: build up one another
  chosen_korean: 한 사람씩 서로를 세워 주십시오
