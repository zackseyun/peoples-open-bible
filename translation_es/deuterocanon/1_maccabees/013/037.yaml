  to: Y a los ancianos y al pueblo[a] de los judíos, saludos. Hemos recibido la corona de oro y la rama de palma[b] que ustedes enviaron, y estamos dispuestos a hacer con ustedes una gran paz y a escribir a los funcionarios encargados para concederles remisiones[c].
