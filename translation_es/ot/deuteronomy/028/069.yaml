translation:
  language: es
  text: Estas son las palabras del pacto que Yahvé mandó a Moisés concertar con los hijos de Israel en la tierra de Moab[a], aparte del pacto que hizo con ellos en Horeb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «cortar un pacto» ... «el pacto que cortó con ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estas
  lexicon: HALOT
  rationale: 'El demostrativo plural introduce una fórmula de cierre o resumen; en español suena natural suministrar el verbo copulativo: «Estas son».'
- source_word: דִבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - los términos de
  - los asuntos de
  lexicon: HALOT
  rationale: דברי en esta construcción remite al contenido verbal del pacto. «Palabras de» conserva el sentido directo y es idiomático en español.
- source_word: הַבְּרִית
  english_pob_choice: the covenant
  chosen_spanish: el pacto
  alternatives_spanish:
  - el convenio
  - la alianza
  lexicon: HALOT
  rationale: En español bíblico, «pacto» comunica bien la relación jurídica y solemne; evita una terminología eclesiástica más cargada y sigue el uso del texto fuente.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - comandó
  lexicon: HALOT
  rationale: El verbo expresa una instrucción autoritativa de Yahvé a Moisés. «Mandó» es claro y fiel al valor verbal sin sonar excesivamente técnico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en forma directa, conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: לִכְרֹת
  english_pob_choice: to make
  chosen_spanish: para hacer
  alternatives_spanish:
  - para cortar
  - para establecer
  lexicon: HALOT
  rationale: Se mantiene el sentido idiomático general del hebreo en el texto principal. La imagen literal de «cortar» se preserva como posibilidad lexical implícita por el verbo fuente.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la forma masculina y corporativa del hebreo sin neutralizarla, siguiendo la preferencia de mantener visible la forma de la fuente.
- source_word: בְּאֶרֶץ מוֹאָב
  english_pob_choice: in the land of Moab
  chosen_spanish: en la tierra de Moab
  alternatives_spanish:
  - en Moab
  lexicon: HALOT
  rationale: La frase completa reproduce con precisión el marco geográfico y formal del original.
- source_word: מִלְּבַד
  english_pob_choice: besides
  chosen_spanish: aparte de
  alternatives_spanish:
  - además de
  - fuera de
  lexicon: HALOT
  rationale: La expresión marca distinción respecto del pacto anterior en Horeb; «aparte de» comunica bien la relación de adición/exceptuación.
- source_word: כָּרַת
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - cortó
  - estableció
  lexicon: HALOT
  rationale: Se usa el equivalente idiomático natural en español para la fórmula de pacto. El sentido literal de «cortar» queda implícito en el trasfondo semántico del hebreo.
- source_word: בְּחֹרֵב
  english_pob_choice: at Horeb
  chosen_spanish: en Horeb
  alternatives_spanish:
  - en el Horeb
  - en el monte Horeb
  lexicon: HALOT
  rationale: Se conserva el topónimo hebreo sin armonizarlo con otras designaciones; la preposición española sigue el marco locativo del texto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La forma principal en español debe reflejar el nombre divino revelado en el texto fuente, no una sustitución titulada. «Yahvé» es la forma adoptada por el proyecto para mantener transparencia textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fórmula de pacto con lenguaje masculino corporativo
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: El hebreo dice literalmente «hijos de Israel». Se preserva la forma visible del original en vez de neutralizarla, porque aquí funciona de modo corporativo y no introduce ambigüedad doctrinal.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto español junto a «Moab».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente con la política del proyecto para el nombre divino.
  - Se conservó «pacto» para בְּרִית y «Horeb» como topónimo sin armonización.
  - Se evitó el calco rígido de «cortar un pacto» en el cuerpo principal, pero se dejó la alternativa semántica en la nota.
  - La construcción «los hijos de Israel» preserva la forma corporativa masculina del hebreo.
