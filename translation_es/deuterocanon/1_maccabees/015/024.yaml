translation:
  language: es
  text: Y escribió una copia de eso a Simón, el sumo sacerdote.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀντίγραφον
  english_pob_choice: copy
  chosen_spanish: copia
  alternatives_spanish:
  - duplicado
  - traslado escrito
  lexicon: LSJ
  rationale: El sustantivo designa una reproducción escrita del documento. «Copia» conserva el sentido administrativo natural en español sin añadir precisiones que el griego no exige.
- source_word: αὐτῶν
  english_pob_choice: of it
  chosen_spanish: de ello
  alternatives_spanish:
  - de él
  - de ellos
  lexicon: LSJ
  rationale: Aunque la forma griega es plural, el contexto remite al contenido o documento ya mencionado como una unidad. En español, «de ello» evita una referencia plural artificial.
- source_word: ἔγραψεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - redactó
  - mandó por escrito
  lexicon: LSJ
  rationale: El verbo básico significa «escribió». «Escribió» es fiel y natural; no se introduce la idea de envío, que no está explícita en el versículo.
- source_word: Σίμωνι
  english_pob_choice: Simon
  chosen_spanish: Simón
  alternatives_spanish:
  - Simeón
  lexicon: LSJ
  rationale: El nombre propio se adapta de forma estándar al español bíblico como «Simón», que es la forma más reconocible en este contexto histórico.
- source_word: ἀρχιερεῖ
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - sumo pontífice
  - pontífice
  lexicon: LSJ
  rationale: «Sumo sacerdote» es la equivalencia bíblica natural en español para ἀρχιερεύς y conserva con claridad la función cultual y política del cargo.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo; no se requieren notas textuales ni variantes. La solución española sigue de cerca la sintaxis del original sin sobreexplicar el acto de escribir.
  spanish_consistency_notes:
