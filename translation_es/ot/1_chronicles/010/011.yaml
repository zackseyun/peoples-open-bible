    issue: 'Forma toponímica poco natural: «Jabes-galaad»'
    rationale: Aunque se entiende, en español bíblico general la forma más clara y estándar es «Jabes de Galaad». La grafía con guion y «galaad» en minúscula tras guion suena menos idiomática y menos reconocible para lectores hispanohablantes.
