translation:
  language: es
  text: 'Y hoy has declarado qué bien me has hecho[a]: cuando Yahvé me entregó en tu mano[b], no me mataste.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «has dado a conocer hoy el bien que me has hecho» o «la bondad que me has mostrado».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cuando Yahvé me entregó en tu mano»; el verbo también puede traducirse «me puso en tu poder» o «me entregó».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִגַּדְתָּ
  english_pob_choice: have declared
  chosen_spanish: has declarado
  alternatives_spanish:
  - has dado a conocer
  - has hecho saber
  lexicon: HALOT / BDB נגד (Hiphil)
  rationale: El verbo en Hifil expresa declarar, contar o hacer saber. 'Has declarado' conserva la acción verbal y suena natural en español sin perder la idea de manifestar públicamente lo sucedido.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  - este día
  lexicon: HALOT 3117
  rationale: Adverbio temporal directo. 'Hoy' es la equivalencia más natural y fiel en español contemporáneo.
- source_word: עָשִׂיתָה אִתִּי טוֹבָה
  english_pob_choice: what good you have done to me
  chosen_spanish: lo bueno que has hecho conmigo
  alternatives_spanish:
  - la bondad que has mostrado conmigo
  - el bien que has hecho conmigo
  lexicon: HALOT 2896 / 6213
  rationale: La construcción hebrea es literalmente 'el bien que hiciste conmigo'. En español, 'lo bueno que has hecho conmigo' refleja el valor neutro/abstracto de טוֹבָה sin forzar 'bondad', y mantiene el matiz de acción beneficiosa.
- source_word: סִגְּרַנִי
  english_pob_choice: gave me
  chosen_spanish: me entregó
  alternatives_spanish:
  - me entregó en tus manos
  - me puso en tu poder
  - me dejó a tu alcance
  lexicon: HALOT 5462
  rationale: El verbo סגר aquí tiene el sentido de entregar/poner a disposición de otro en un contexto de poder o control. 'Me entregó' preserva ese valor sin caer en el calco 'me cerró'. El complemento siguiente 'en tu mano' completa la imagen idiomática.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: YHWH'
  rationale: 'Se mantiene el nombre divino tal como exige la política del proyecto: ''Yahvé'' en el texto principal, no una sustitución por título como ''el SEÑOR''.'
- source_word: בְּיָדְךָ
  english_pob_choice: into your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en tu poder
  - en tus manos
  lexicon: HALOT 3027
  rationale: La imagen hebrea de 'mano' como poder o dominio se conserva de forma transparente. 'En tu mano' es idiomático en español bíblico y comunica la figura sin explicarla de más.
- source_word: וְלֹא הֲרַגְתָּנִי
  english_pob_choice: you did not kill me
  chosen_spanish: y no me mataste
  alternatives_spanish:
  - y no me diste muerte
  - y no me mataste a mí
  lexicon: HALOT 2026
  rationale: Verbo directo y claro. 'Matar' comunica sin ambigüedad el acto negado y corresponde bien al hebreo.
theological_decisions:
- issue: Nombre divino YHWH en un discurso citado de Saúl
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Aunque el hablante citado es Saúl, el nombre divino debe mantenerse. 'Yahvé' conserva la referencia personal del pacto y sigue la terminología del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor semántico de סגר en contexto de entrega a otro
  english_pob_reading: gave me / delivered me / handed me over
  chosen_spanish_reading: me entregó
  alternative_spanish_readings:
  - me entregó en tu mano
  - me puso en tu poder
  - me entregó a ti
  rationale: No se traduce como 'cerró' ni se neutraliza el matiz de estar en poder ajeno. 'Me entregó' deja abierta la imagen de ser puesto bajo la autoridad de otro, que el contexto completa con 'en tu mano'.
  doctrine_reference: 'DOCTRINE.md: preserve source metaphors unless Spanish requires clarification'
translation_notes:
  revision_awareness: La redacción española sigue el ajuste reciente del audit trail inglés, donde se prefirió una expresión más natural para la cláusula hebrea de טוֹבָה ('what good'). En español, se optó por 'lo bueno que has hecho conmigo' para conservar esa misma precisión y naturalidad. También se mantuvo la imagen idiomática de 'mano' y se preservó el nombre divino 'Yahvé' conforme a la política del proyecto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el estándar del proyecto para יְהוָה.
  - Se evita 'SEÑOR' como sustitución del nombre divino.
  - La construcción 'en tu mano' conserva la metáfora bíblica del dominio/poder.
  - No se emplea 'siervo' ni 'Cristo' porque no aparecen en este versículo.
