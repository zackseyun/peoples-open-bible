    text: O 'emisión' o 'descarga'.
    reason: lexical_alternative
  - marker: b
    text: O 'de su carne'.
    reason: lexical_alternative
  revision_rationale: Se corrige el imperativo al plural para reflejar fielmente las formas hebreas y se sustituye 'emisión' por 'flujo' para una expresión más natural y precisa del término legal-ritual זָב/זוֹבוֹ en español. Se mantienen 'los hijos de Israel', 'Cuando' y 'de su cuerpo' conforme al expediente inglés y al sentido del hebreo.
