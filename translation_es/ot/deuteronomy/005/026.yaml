revisions:
- from: Porque, ¿quién de toda carne[a] ha oído la voz del Dios vivo, que hablaba desde en medio del fuego, como nosotros, y ha vivido?
  to: Porque, ¿quién de toda carne[a] ha oído la voz del Dios vivo, que habla de en medio del fuego, como nosotros la hemos oído, y ha vivido?
  rationale: 'Se conserva la fidelidad al hebreo y al POB inglés, pero se corrigen dos puntos de estilo/fidelidad menores: «de en medio del fuego» por mayor naturalidad y precisión espacial, y «que habla» para reflejar mejor el participio hebreo. Además, se explicita el verbo en «como nosotros la hemos oído» para mejorar la legibilidad en español sin añadir significado nuevo.'
