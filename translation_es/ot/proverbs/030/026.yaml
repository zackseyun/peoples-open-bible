  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión «damanes» para שְׁפַנִּים es defendible y está documentada con nota. Se mantiene «un pueblo» correctamente para עַם. No hay términos teológicos sensibles en este versículo.
