translation:
  language: es
  text: Un esclavo prudente[a] gobernará sobre un hijo que avergüenza, y entre los hermanos[b] compartirá la herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “siervo”. El hebreo עֶבֶד puede denotar cualquiera de los dos, pero aquí se prefirió “esclavo” porque la fuerza del proverbio depende de la inversión social de una persona subordinada que llega a gobernar sobre un hijo que avergüenza.
    reason: lexical_alternative
  - marker: b
    text: O “hermanos y hermanas”. El hebreo “hermanos” refleja el término familiar masculino y probablemente se refiere al grupo de herederos de la familia.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶבֶד
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  lexicon: HALOT
  rationale: 'El hebreo עֶבֶד puede significar “esclavo” o “siervo”. Aquí se conserva “esclavo” porque el proverbio depende del contraste social: alguien de condición subordinada llega a gobernar sobre un hijo deshonroso. “Siervo” suavizaría esa inversión de estatus.'
- source_word: מַשְׂכִּיל
  english_pob_choice: prudent
  chosen_spanish: prudente
  alternatives_spanish:
  - sabio
  - con discernimiento
  - hábil
  lexicon: HALOT
  rationale: El participio comunica actuar con entendimiento práctico, no solo posesión de conocimiento. “Prudente” expresa bien esa sensatez aplicada y funciona naturalmente en castellano proverbial.
- source_word: יִמְשֹׁל
  english_pob_choice: will rule over
  chosen_spanish: gobernará sobre
  alternatives_spanish:
  - reinará sobre
  - tendrá autoridad sobre
  lexicon: HALOT
  rationale: El verbo משל indica ejercer dominio o autoridad. “Gobernará sobre” conserva la relación de mando y el paralelismo con el reverso social del proverbio.
- source_word: בְּבֵן
  english_pob_choice: over a son
  chosen_spanish: sobre un hijo
  alternatives_spanish:
  - sobre el hijo
  lexicon: HALOT
  rationale: El hebreo no marca un hijo específico; en forma proverbial, el artículo indefinido español transmite mejor esa generalidad.
- source_word: מֵבִישׁ
  english_pob_choice: who brings shame
  chosen_spanish: que avergüenza
  alternatives_spanish:
  - vergonzoso
  - que causa vergüenza
  - deshonroso
  lexicon: HALOT
  rationale: 'El participio tiene fuerza verbal: describe al que produce vergüenza. “Que avergüenza” conserva esa acción, en vez de convertirla solo en un adjetivo estático.'
- source_word: וּבְתוֹךְ אַחִים
  english_pob_choice: among brothers
  chosen_spanish: entre los hermanos
  alternatives_spanish:
  - en medio de los hermanos
  - entre hermanos
  lexicon: HALOT
  rationale: La expresión señala el ámbito familiar de reparto de herencia. “Entre los hermanos” es natural en español y preserva el plural masculino explícito del hebreo.
- source_word: יַחֲלֹק
  english_pob_choice: he will share
  chosen_spanish: repartirá
  alternatives_spanish:
  - compartirá
  - recibirá una parte de
  - dividirá
  lexicon: HALOT
  rationale: Con “herencia”, חלק apunta al reparto o distribución del patrimonio familiar. “Repartirá” mantiene la idea de asignación de porciones sin perder la fluidez castellana.
- source_word: נַחֲלָה
  english_pob_choice: the inheritance
  chosen_spanish: la herencia
  alternatives_spanish:
  - el patrimonio
  - la posesión heredada
  - la heredad
  lexicon: HALOT
  rationale: נַחֲלָה se refiere a la propiedad recibida por herencia o porción asignada. “La herencia” es claro y fiel al sentido jurídico-familiar del pasaje.
theological_decisions:
- issue: Lenguaje familiar masculino en אַחִים
  english_pob_reading: brothers
  chosen_spanish_reading: los hermanos
  alternative_spanish_readings:
  - los hijos
  - los hermanos y hermanas
  - los miembros de la familia
  rationale: El hebreo usa explícitamente el plural masculino. Se mantiene “los hermanos” para respetar la forma del texto, aunque el contexto sugiere el grupo de herederos familiares en sentido amplio.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La revisión inglesa más reciente osciló entre “slave” y “servant”, pero el fijado final del audit trail volvió a “slave” por coherencia con la política terminológica. La redacción española sigue ese final y conserva la tensión social del proverbio.
  spanish_consistency_notes:
  - Se mantiene “esclavo” para עֶבֶד, en coherencia con el valor lexical preferido cuando la subordinación social es relevante.
  - Se usa “prudente” para מַשְׂכִּיל, un equivalente estable en Proverbios que expresa discernimiento práctico.
  - “Gobernará sobre” reproduce la relación de dominio de משל sin elevar el registro más allá de lo exigido por el texto.
  - “Entre los hermanos” conserva el plural masculino de אַחִים sin neutralizarlo.
  - “Herencia” transmite adecuadamente נַחֲלָה en un contexto de reparto patrimonial familiar.
