    reason: lexical_alternative
  - marker: c
    text: O «de la tierra» en sentido más amplio, «de la tierra entera».
    reason: lexical_alternative
  revision_rationale: Se corrige «reptiles» a una expresión más amplia para reflejar רֶמֶשׂ, y «los haré dormir» a «los haré reposar» para conservar mejor el causativo de שׁכב sin introducir la idea específica de sueño. Se mantienen «pacto», «para ellos» y la acumulación «arco, espada y guerra». También se añaden notas equivalentes a las alternativas preservadas en el POB inglés y se deja «tierra» con nota para no cerrar del todo la amplitud semántica, mientras el texto principal sigue siendo compatible con el sentido territorial contextual.
