translation:
  language: es
  text: 'Habla a los hijos de Israel[a] y diles: «Cuando entren en la tierra que yo les doy, la tierra observará un sábado para Yahvé[c]».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «la tierra guardará un sábado para Yahvé». El hebreo personifica la tierra como observando reposo sabático.
    reason: lexical_alternative
  - marker: c
    text: «Yahvé» traduce el nombre divino YHWH.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Dirige tu palabra a
  lexicon: HALOT
  rationale: El imperativo piél de דבר introduce una instrucción divina formal. En español, «Habla» conserva la orden directa y el tono sobrio del mandato legal sin volverlo más explicativo de lo que permite el hebreo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos/niños de Israel
  - los israelitas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijos de Israel». En español, «hijos de Israel» mantiene la filiación del original; «israelitas» sería más natural, pero suaviza la forma lexical que el POB inglés preservó.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  english_pob_choice: and say to them
  chosen_spanish: y diles
  alternatives_spanish:
  - y di a ellos
  - y háblales
  lexicon: HALOT
  rationale: La secuencia verbal continúa la instrucción. «Diles» es idiomático y conserva el carácter directo del mandato. La forma más literal «di a ellos» suena forzada en español.
- source_word: כִּי תָבֹאוּ
  english_pob_choice: When you come
  chosen_spanish: Cuando entren
  alternatives_spanish:
  - Si entran
  - Cuando ustedes entren
  lexicon: HALOT
  rationale: כִּי introduce aquí una circunstancia temporal esperada. En español, el futuro de subjuntivo no es necesario; «Cuando entren» expresa bien la situación prevista en la legislación.
- source_word: אֶל הָאָרֶץ
  english_pob_choice: into the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - a la tierra
  - dentro de la tierra
  lexicon: HALOT
  rationale: Con בוא + אֶל, el sentido es de entrada al territorio. «En la tierra» suena más natural en español que «en/ a la tierra» y comunica la llegada al ámbito prometido; la idea de entrada queda ya en el verbo «entren».
- source_word: אֲשֶׁר אֲנִי נֹתֵן לָכֶם
  english_pob_choice: that I am giving to you
  chosen_spanish: que yo les doy
  alternatives_spanish:
  - que yo les estoy dando
  - que yo les estoy concediendo
  lexicon: HALOT
  rationale: El participio נֹתֵן puede expresar acción continua o inminente. En español, «les doy» mantiene la vivacidad del don divino sin sonar artificial; el matiz progresivo puede anotarse, pero no es obligatorio en la línea principal.
- source_word: וְשָׁבְתָה הָאָרֶץ
  english_pob_choice: then the land shall observe a Sabbath
  chosen_spanish: la tierra guardará un sábado
  alternatives_spanish:
  - la tierra descansará
  - la tierra observará un sábado
  lexicon: HALOT
  rationale: El hebreo personifica la tierra como sujeto que «descansa/cesa». «Guardará un sábado» conserva la personificación y el carácter de observancia, siguiendo la solución del POB inglés de «observe a Sabbath» sin imponer un término eclesiástico ajeno.
- source_word: שַׁבָּת
  english_pob_choice: a Sabbath
  chosen_spanish: un sábado
  alternatives_spanish:
  - un sabat
  - un descanso sabático
  lexicon: HALOT
  rationale: En este contexto legal, el sustantivo designa el período/acto sabático. «Un sábado» es comprensible y conserva la literalidad del término, evitando una paráfrasis más interpretativa.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino en la forma de la política del POB en español: «Yahvé». La preposición ל admite valor direccional o dedicativo; «para Yahvé» expresa bien la dedicación del reposo sabático a él.'
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton. Siguiendo la directriz del proyecto en español, se renderiza como «Yahvé» en el texto principal, preservando el nombre del pacto en vez de ocultarlo con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Personificación de la tierra
  english_pob_reading: the land shall observe a Sabbath
  chosen_spanish_reading: la tierra guardará un sábado
  alternative_spanish_readings:
  - la tierra descansará un sábado
  - la tierra observará un sábado
  rationale: El hebreo atribuye a la tierra la acción de cesar/descansar. La versión española mantiene esa personificación para no diluir el efecto literario y teológico del texto legal.
  doctrine_reference: Leviticus 25 sabbatical-year legislation; lexical note on וְשָׁבְתָה
- issue: Preposición לַיהוָה
  english_pob_reading: to Yahweh
  chosen_spanish_reading: para Yahvé
  alternative_spanish_readings:
  - a Yahvé
  - de Yahvé
  rationale: Aquí ל tiene valor de dedicación/relación cultual. «Para Yahvé» comunica de forma natural que el sábado pertenece a su esfera y está consagrado a él.
  doctrine_reference: Leviticus 25:2 cultic dedication reading
translation_notes:
  revision_awareness: El audit trail inglés revisó la frase de la tierra de ‘keep a Sabbath’ a ‘observe a Sabbath’ por naturalidad formal; la versión española adopta una solución equivalente, ‘guardará un sábado’, que conserva la personificación y la observancia sabática sin perder fluidez.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה, conforme al estándar español del proyecto.
  - Se conserva la filiación literal «hijos de Israel» en el cuerpo principal, con nota alternativa para lector moderno.
  - «Un sábado» reproduce el sustantivo sabático sin sustituirlo por una explicación larga; el contexto cultual hace clara la referencia.
  - La puntuación con comillas angulares no se emplea para mantener compatibilidad editorial simple; las comillas simples delimitan bien el discurso directo en esta línea breve.
