    text: Or, 'Does it not concern you, all you who pass by?' The Hebrew opening is elliptical, literally 'not to you,' and can be understood as an appeal for attention or sympathy.
    reason: lexical_alternative
  - marker: b
    text: Or 'pain' or 'affliction' instead of 'sorrow' for the repeated Hebrew word.
    reason: lexical_alternative
