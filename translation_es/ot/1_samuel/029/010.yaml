translation:
  language: es
  text: Ahora levántate temprano por la mañana, tú y los esclavos de tu señor que vinieron contigo. Levántense temprano por la mañana, y cuando haya luz para ustedes[a], vayan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando amanezca para ustedes, vayan» / «al clarear, vayan». La cláusula hebrea dice literalmente: «y es luz para ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  - Pues ahora
  lexicon: HALOT
  rationale: Marca discursiva de transición inmediata. «Ahora» comunica con naturalidad el paso a la instrucción sin añadir matiz no presente en el hebreo.
- source_word: הַשְׁכֵּם
  english_pob_choice: rise early
  chosen_spanish: levántense temprano
  alternatives_spanish:
  - levántate temprano
  - madruguen
  lexicon: HALOT
  rationale: El verbo expresa levantarse o emprender la acción desde temprano. En español, «levántense temprano» conserva el tono imperativo y la idea de anticipación; el sujeto plural queda claro por el contexto.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - de mañana
  lexicon: HALOT
  rationale: La referencia temporal se expresa de modo natural como «por la mañana». Mantiene la claridad sin sobrecargar la frase.
- source_word: וְעַבְדֵי אֲדֹנֶיךָ
  english_pob_choice: you and your master's servants
  chosen_spanish: tú y los esclavos de tu señor
  alternatives_spanish:
  - tú y los siervos de tu señor
  - tú y los servidores de tu señor
  lexicon: HALOT
  rationale: Se conserva la fuerza léxica de עֶבֶד con «esclavos», coherente con el valor de esclavo/siervo que POB documenta cuando el término es pleno y no honorífico. «Señor» aquí es posesivo humano, no título divino, y mantiene la referencia al dueño/amado de esos esclavos.
- source_word: אֲשֶׁר בָּאוּ אִתָּךְ
  english_pob_choice: who came with you
  chosen_spanish: que vinieron contigo
  alternatives_spanish:
  - que han venido contigo
  - los que vinieron contigo
  lexicon: HALOT
  rationale: La cláusula relativa identifica a los esclavos acompañantes. «Vinieron contigo» reproduce el sentido narrativo simple del perfecto y su relación con el acompañamiento.
- source_word: וְהִשְׁכַּמְתֶּם
  english_pob_choice: Rise early in the morning
  chosen_spanish: Levántense temprano por la mañana
  alternatives_spanish:
  - Y levántense temprano por la mañana
  - Madruguen por la mañana
  lexicon: HALOT
  rationale: La repetición del mandato en el hebreo se conserva con una segunda imperativa independiente. Aunque el inglés POB suaviza la repetición del sujeto en la segunda cláusula, el español puede mantenerla de forma natural para reflejar la estructura fuente.
- source_word: וְאוֹר לָכֶם
  english_pob_choice: and it is light for you
  chosen_spanish: y cuando haya luz para ustedes
  alternatives_spanish:
  - y les amanezca
  - y esté claro para ustedes
  - y sea de día para ustedes
  lexicon: HALOT
  rationale: El hebreo dice literalmente «y luz para ustedes». Se eligió una paráfrasis controlada, «cuando haya luz para ustedes», para expresar la idea temporal sin perder la imagen de luz; evita traducir mecánicamente con una construcción poco natural en español.
- source_word: וָלֵכוּ
  english_pob_choice: go
  chosen_spanish: vayan
  alternatives_spanish:
  - váyanse
  - salgan
  lexicon: HALOT
  rationale: Imperativo plural de הלך. «Vayan» es directo y fiel; no añade la idea de despedida que tendría «váyanse».
theological_decisions:
- issue: Tratamiento de אֲדֹנֶיךָ / tu señor
  english_pob_reading: your master's servants
  chosen_spanish_reading: tu señor
  alternative_spanish_readings:
  - tu amo
  - tu dueño
  - tu señor
  rationale: Aquí no se trata del nombre divino ni de un título teológico, sino del propietario humano de los esclavos. «Señor» en español conserva la relación jerárquica sin confundirla con Yahvé; el contexto evita toda ambigüedad cultual.
  doctrine_reference: No aplica; decisión de referencia social y contextual
- issue: Valor de עַבְדֵי
  english_pob_reading: servants
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - servidores
  rationale: POB suele reservar «esclavo» para la fuerza léxica de δοῦλος/עבד cuando el contexto no suaviza el término. Aquí la relación de pertenencia al señor es explícita, por lo que «esclavos» evita domesticar el texto con un matiz más honorífico.
  doctrine_reference: No aplica; decisión léxica con implicación social
- issue: Cláusula temporal de וְאוֹר לָכֶם
  english_pob_reading: and it is light for you
  chosen_spanish_reading: y cuando haya luz para ustedes
  alternative_spanish_readings:
  - y es luz para ustedes
  - y les amanece
  - y al clarear
  rationale: El hebreo conserva una imagen de luz asociada al momento de partir. La redacción española mantiene esa imagen, pero la vuelve idiomática y clara para el lector moderno sin borrar la ambigüedad entre amanecer, claridad o primera luz.
  doctrine_reference: No aplica; decisión aspectual/lexical
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo WLC y toma como guía el audit trail inglés, especialmente la repetición del mandato «rise early in the morning» y la nota sobre la cláusula literal «and it is light for you». Se preservó la secuencia imperativa doble y la imagen de la luz, aunque en español se optó por una formulación temporal más natural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa «esclavos» para עבד en línea con el valor léxico fuerte del término en contexto social.
  - Se evita «señor» como título divino; aquí funciona únicamente como posesivo humano.
  - La puntuación conserva dos oraciones imperativas paralelas, reflejando la repetición del hebreo.
