translation:
  language: ko
  text: 그러나 그날과 그 시는 아무도 모릅니다 — 하늘의 천사들도, 아들도 — 오직 아버지 외에는.
  philosophy: optimal-equivalence
theological_decisions:
- issue: 24:36 「아들도」(οὐδὲ ὁ υἱός) 보존
  chosen_reading: 「하늘의 천사들도, 아들도」 — 본문 그대로
  alternative_readings:
  - 일부 사본의 생략 (필사자에 의한 신학적 완화)
  rationale: 본문은 인자이신 예수께서 그 날과 시를 모르신다고 분명히 말한다. 일부 후대 필사본은 이 표현이 그리스도의 신성에 부담이 된다고 보아 「아들도」를 삭제했으나, 가장 오래된 사본들과 마가복음 13:32 평행 본문 모두 이 표현을 보존한다. 본 번역도 본문 그대로 보존하여 종말의 시각이 아버지께만 알려져 있다는 본문의 강조점을 흐리지 않는다. 또한 종말론적 시간 무지의 본문이 어느 한 신학 체계(전천년·후천년 등)를 결정하지 않도록 단정적 해석을 더하지 않는다.
  doctrine_reference: 'DOCTRINE.md §1, §5: render the source''s strongest plain meaning; do not impose a single eschatological framework'
