  revision_rationale: Se corrige la coordinación verbal del primer par de imperativos para reflejar mejor el paralelismo hebreo y sonar natural en español. Se reubica la nota [b] al lugar correcto, ya que explica la pareja rara de verbos de ceguera/aturdimiento y no 'tambalean'. También se mejora שֵׁכָר con 'bebida embriagante' por claridad panhispánica. Mantengo el mandato reflexivo 'cieguense' para preservar la decisión del POB, aunque requiere la ortografía estándar con tilde en edición final.
