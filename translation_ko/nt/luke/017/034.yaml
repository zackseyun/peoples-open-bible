  yaml_path: translation/nt/luke/017/034.yaml
  text: I tell you[a], on that night there will be two on one bed; one will be taken[b], and the other will be left.
  footnotes:
  - marker: a
    text: Or 'one will be taken along' for παραλημφθήσεται; the verb itself does not specify here whether the taking is for deliverance or for judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'will be left behind'; the shorter 'will be left' is used in the main text to avoid importing later eschatological associations not explicit in the Greek.
    reason: lexical_alternative
