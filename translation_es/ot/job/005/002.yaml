translation:
  language: es
  text: Pues la irritación mata al insensato, y los celos[a] dan muerte al simple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «envidia». El término hebreo puede denotar cualquiera de los dos sentidos; aquí se refiere a una pasión destructiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Ciertamente
  - Ya que
  lexicon: HALOT
  rationale: El hebreo introduce una afirmación explicativa dentro del argumento de Elifaz. «Pues» conserva bien el enlace discursivo en español sin forzar una causalidad demasiado rígida.
- source_word: לֶאֱוִיל
  english_pob_choice: the fool
  chosen_spanish: el insensato
  alternatives_spanish:
  - el necio
  - el tonto
  - el insensato
  lexicon: HALOT
  rationale: אֱוִיל en sabiduría describe una persona moralmente torpe, no solo poco inteligente. «Insensato» comunica mejor ese matiz en español y mantiene el tono proverbial.
- source_word: יַהֲרָג
  english_pob_choice: kills
  chosen_spanish: mata
  alternatives_spanish:
  - da muerte a
  - asesina
  - mata
  lexicon: HALOT
  rationale: El imperfecto qal expresa aquí una verdad general. «Mata» es natural en español y conserva la fuerza letal del verbo sin arcaísmo.
- source_word: כָּעַשׂ
  english_pob_choice: vexation
  chosen_spanish: la irritación
  alternatives_spanish:
  - la vexación
  - la ira
  - la molestia
  lexicon: HALOT
  rationale: כַּעַשׂ puede abarcar provocación, irritación o disgusto interior. «Irritación» refleja bien la pasión perturbadora y destructiva que el texto pone en paralelo con קִנְאָה.
- source_word: וּפֹתֶה
  english_pob_choice: the simple
  chosen_spanish: el simple
  alternatives_spanish:
  - el ingenuo
  - el ingenuo de mente sencilla
  - el simple
  lexicon: HALOT
  rationale: פֹּתֶה designa al fácil de persuadir en el lenguaje sapiencial. «El simple» mantiene ese registro técnico y proverbial.
- source_word: תָּמִית
  english_pob_choice: puts ... to death
  chosen_spanish: mata
  alternatives_spanish:
  - da muerte a
  - hace morir
  - mata
  lexicon: HALOT
  rationale: Aunque el hebreo es causativo, en este paralelismo español basta con «mata» para conservar la energía del enunciado sin sobrecargarlo.
- source_word: קִנְאָה
  english_pob_choice: jealousy
  chosen_spanish: la envidia
  alternatives_spanish:
  - los celos
  - la envidia
  - el celo
  lexicon: HALOT
  rationale: Aquí la emoción paralela a כָּעַשׂ parece una pasión destructiva. La nota conserva la alternativa documentada entre «envidia» y «celos», y evita desdibujar el alcance del término.
translation_notes:
  revision_awareness: Se mantuvo el sentido sapiencial general y el paralelismo del hebreo. Se optó por un español más natural que el calco «vexación», sin perder el contraste emocional entre כָּעַשׂ y קִנְאָה, y se preservó la alternativa léxica documentada en nota.
  spanish_consistency_notes:
  - Se tradujo יהוה como «Yahvé» por norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se evitó «Cristo» y cualquier terminología cristológica porque el texto no lo requiere.
  - Se conservó el paralelismo verbal con dos formas simples («mata ... mata») para reflejar la brevedad del hebreo.
  - «El simple» se mantuvo como término sapiencial técnico, coherente con el audit trail en inglés.
