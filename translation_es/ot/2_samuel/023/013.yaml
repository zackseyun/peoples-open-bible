    text: Or 'during harvest.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew חַיַּת פְּלִשְׁתִּים, literally 'living thing/animal of the Philistines,' here used idiomatically for a military band or troop.
    reason: lexical_alternative
