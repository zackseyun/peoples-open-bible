translation:
  language: es
  text: 'Los hijos de Quenaz: Otoniel y Seraía[a]. Y los hijos de Otoniel: Hatat.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma hebrea וּשְׂרָיָה puede representarse en español de varias maneras; «Seraía» conserva mejor la cercanía con el hebreo, aunque algunas versiones prefieren «Seraías» por acomodación a la ortografía española.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Descendientes de
  lexicon: HALOT
  rationale: En una fórmula genealógica, בְּנֵי se expresa de manera natural y transparente en español como «los hijos de». Conserva el valor genealógico sin cargar artificialmente el conector inicial como una simple coordinación cuando abre una nueva línea familiar.
- source_word: קְנַז
  english_pob_choice: Kenaz
  chosen_spanish: Quenaz
  alternatives_spanish:
  - Kenaz
  lexicon: HALOT
  rationale: Nombre propio. Se opta por «Quenaz» para reflejar de forma más cercana la pronunciación española del grupo inicial /k/ ante vocal frontal, sin alterar la identidad del nombre bíblico.
- source_word: עָתְנִיאֵל
  english_pob_choice: Othniel
  chosen_spanish: Otoniel
  alternatives_spanish:
  - Otniel
  - Othniel
  lexicon: HALOT
  rationale: Nombre propio. «Otoniel» es la forma española más establecida y legible, y conserva el referente del nombre hebreo sin forzar una transliteración excesivamente inglesa.
- source_word: וּשְׂרָיָה
  english_pob_choice: and Seraiah
  chosen_spanish: Seraía
  alternatives_spanish:
  - Seraías
  - Seraiah
  lexicon: HALOT
  rationale: Nombre propio con prefijo conjuntivo en hebreo. Se omite aquí el «y» inicial porque en español la coordinación ya queda implícita por la puntuación y por la estructura paralela del verso. La forma «Seraía» refleja la vocalización hebrea y evita cargar el nombre con una terminación castellana distinta de la base semítica.
- source_word: וּבְנֵי עָתְנִיאֵל
  english_pob_choice: And the sons of Othniel
  chosen_spanish: Y los hijos de Otoniel
  alternatives_spanish:
  - Y los descendientes de Otoniel
  - Los hijos de Otoniel
  lexicon: HALOT
  rationale: Se conserva la repetición genealógica del hebreo con «Y los hijos de Otoniel», manteniendo la continuidad del linaje y el paralelismo del versículo.
- source_word: חֲתַת
  english_pob_choice: Hathath
  chosen_spanish: Hatat
  alternatives_spanish:
  - Hatat
  - Jatat
  lexicon: HALOT
  rationale: Nombre propio. Se opta por una transliteración simple y consistente en español, sin duplicar consonantes que no aportan claridad al lector hispano.
