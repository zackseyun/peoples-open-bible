    text: 'Hebreo: «los días de su hevel»; hevel también puede traducirse «vanidad», «vapor» o «aliento», subrayando la transitoriedad y la elusividad de la vida.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la fórmula fija de Eclesiastés a «bajo el sol», se mejora la naturalidad de la comparación con «como una sombra», y se mueve el marcador de nota para que ancle con mayor precisión la decisión léxica sobre הֶבֶל en «vida fugaz».
