translation:
  language: es
  text: Sigue adelante[a], forastero; ordena la mesa, y si tienes algo en la mano, aliméntame con ello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «peregrino» o «residente extranjero» para πάροικε. El término griego señala a alguien que vive como ajeno, no plenamente integrado en la casa o la comunidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάρελθε
  english_pob_choice: Move along
  chosen_spanish: Pasa adelante
  alternatives_spanish:
  - Sigue
  - Avanza
  - Pasa
  lexicon: LSJ
  rationale: El imperativo de παρέρχομαι aquí suena a una orden directa para que el otro se aparte o continúe. «Pasa adelante» conserva ese matiz imperativo sin sonar demasiado técnico ni demasiado duro para el español actual.
- source_word: πάροικε
  english_pob_choice: sojourner
  chosen_spanish: forastero
  alternatives_spanish:
  - forastero residente
  - advenedizo
  - huésped
  lexicon: LSJ
  rationale: πάροικος designa a quien vive como externo a la casa o comunidad. En español, «forastero» transmite mejor la condición de alguien ajeno que «huésped», y evita el tecnicismo de «residente forastero». Se mantiene la distancia social del original.
- source_word: κόσμησον
  english_pob_choice: set the table in order
  chosen_spanish: ordena la mesa
  alternatives_spanish:
  - dispón la mesa
  - prepara la mesa
  - pon la mesa en orden
  lexicon: LSJ
  rationale: 'Aquí κοσμέω tiene sentido práctico: disponer, ordenar, preparar. «Ordena la mesa» es natural en español y conserva la idea de dejarla lista.'
- source_word: τράπεζαν
  english_pob_choice: the table
  chosen_spanish: la mesa
  alternatives_spanish:
  - la mesa de comer
  - la tabla
  lexicon: LSJ
  rationale: El sustantivo es literal y doméstico; «mesa» es la correspondencia normal en español.
- source_word: εἴ τι
  english_pob_choice: if you have anything
  chosen_spanish: si tienes algo
  alternatives_spanish:
  - si hay algo
  - si algo tienes
  lexicon: LSJ
  rationale: La construcción se vuelve más natural en español como «si tienes algo», que reproduce la condición práctica del original sin añadir material extraño.
- source_word: ἐν τῇ χειρί σου
  english_pob_choice: in your hand
  chosen_spanish: en la mano
  alternatives_spanish:
  - a mano
  - contigo
  lexicon: LSJ
  rationale: 'Se conserva la imagen concreta de la mano. En español, el posesivo puede omitirse con naturalidad en este contexto: «en la mano».'
- source_word: ψώμισόν
  english_pob_choice: feed me with it
  chosen_spanish: aliméntame con ello
  alternatives_spanish:
  - dame un bocado de ello
  - sírveme con ello
  - dame de ello
  lexicon: LSJ
  rationale: ψωμίζω implica dar alimento o dar de comer, a menudo en porciones. «Aliméntame con ello» mantiene la acción directa y la dependencia expresada por el griego, sin volverla demasiado suave.
- source_word: με
  english_pob_choice: me
  chosen_spanish: me
  lexicon: LSJ
  rationale: El objeto directo personal se conserva explícito, como en el griego, para mantener la rudeza y la inmediatez de la frase.
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete 1909 y el rastro auditado en inglés. En particular, se conservó la fuerza imperativa de Πάρελθε, el valor de outsider de πάροικε y el sentido práctico de κόσμησον con τράπεζαν. La redacción española se ajusta a un registro digno y publicable, sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se evitó «Señor» o formulaciones litúrgicas porque no corresponden al griego de este versículo.
  - Se prefirió un vocabulario de distancia social («forastero») para πάροικε, coherente con la nota léxica del POB en inglés.
  - La imagen concreta de «la mano» se mantuvo para ἐν τῇ χειρί σου; no se sustituyó por una expresión más idiomática que borrara la concreción del original.
  - «Aliméntame» conserva la fuerza de ψώμισόν frente a opciones más débiles como «dame algo».
