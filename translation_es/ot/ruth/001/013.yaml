translation:
  language: es
  text: ¿Los esperarían hasta que crecieran? ¿Se abstendrían[a] de ser de un hombre por causa de ellos? No, hijas mías, porque para mí es mucho más amargo que para ustedes, porque la mano de Yahvé ha salido contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Permanecerían sin casarse por ellos?». El verbo hebreo es raro y probablemente se refiere a abstenerse del matrimonio mientras se espera a futuros esposos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּשַׂבֵּ֗רְנָה
  english_pob_choice: would you wait
  chosen_spanish: ¿Esperarían por ellos?
  alternatives_spanish:
  - ¿Confiarían en ellos?
  - ¿Tendrían esperanza de ellos?
  lexicon: HALOT
  rationale: El verbo raro apunta aquí a esperar/aguardar con expectativa respecto de hijos hipotéticos. «Esperarían» conserva la fuerza práctica de la pregunta de Noemí sin volverla abstracta como «tener esperanza».
- source_word: עַד אֲשֶׁ֣ר יִגְדָּ֔לוּ
  english_pob_choice: until they were grown
  chosen_spanish: hasta que crecieran
  alternatives_spanish:
  - hasta que fueran adultos
  - hasta que llegaran a la madurez
  lexicon: HALOT
  rationale: La referencia es al crecimiento de los hijos hipotéticos hasta la madurez. «Crecieran» es natural en español y preserva el valor temporal sin añadir una explicación innecesaria.
- source_word: תֵּֽעָגֵ֔נָה
  english_pob_choice: would you refrain from belonging to a man
  chosen_spanish: ¿Se abstendrían de pertenecer a un hombre?
  alternatives_spanish:
  - ¿Permanecerían sin casarse?
  - ¿Se negarían a tomar marido?
  lexicon: HALOT
  rationale: El verbo es raro y el POB inglés preserva la orientación matrimonial. «Abstenerse de pertenecer a un hombre» mantiene la tensión literal del hebreo y deja visible el matiz idiomático que el contexto aclara.
- source_word: לְ/בִלְתִּי הֱיוֹת לְ/אִישׁ
  english_pob_choice: from belonging to a man
  chosen_spanish: de pertenecer a un hombre
  alternatives_spanish:
  - de ser para un hombre
  - de estar casadas con un hombre
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y alude al matrimonio. «Pertenecer a un hombre» conserva la forma relacional del original mejor que una simple paráfrasis con «casarse», que suavizaría la imagen.
- source_word: אַ֣ל בְּנֹתַ֗/י
  english_pob_choice: No, my daughters
  chosen_spanish: No[a], hijas mías
  alternatives_spanish:
  - No, hijas mías
  - No, hijas mías, no
  lexicon: HALOT
  rationale: Aquí אַל funciona como rechazo emotivo, no como prohibición formal. «No» transmite la negativa discursiva de Noemí con naturalidad en español.
- source_word: כִּֽי מַר לִ֤/י מְאֹד֙ מִ/כֶּ֔ם
  english_pob_choice: for it is much more bitter for me than for you
  chosen_spanish: porque para mí es mucho más amargo que para ustedes
  alternatives_spanish:
  - porque para mí es muchísimo más amargo que para ustedes
  - porque mi amargura es mayor que la de ustedes
  lexicon: HALOT
  rationale: «Amargo» comunica la metáfora de מר. «Mucho más» sigue de cerca מְאֹד sin intensificar indebidamente a «muchísimo».
- source_word: יָצְאָ֥ה בִ֖/י יַד יְהוָֽה
  english_pob_choice: the hand of Yahweh has gone out against me
  chosen_spanish: ha salido la mano de Yahvé
  alternatives_spanish:
  - me ha alcanzado la mano de Yahvé
  - la mano de Yahvé se ha vuelto contra mí
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de la mano que «sale» como agente de aflicción. El añadido «contra mí» sigue el valor adversativo que el contexto exige, sin borrar la tensión teológica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar POB de transliterar el Tetragrámaton como «Yahvé», preservando el nombre divino personal y evitando la sustitución por un título.
theological_decisions:
- issue: Atribución de aflicción a la acción de Yahvé
  english_pob_reading: because the hand of Yahweh has gone out against me
  chosen_spanish_reading: pues contra mí ha salido la mano de Yahvé
  alternative_spanish_readings:
  - porque la mano de Yahvé se ha vuelto contra mí
  - pues la mano de Yahvé me ha alcanzado
  rationale: El hebreo atribuye explícitamente el dolor de Noemí a la acción de Yahvé. La traducción conserva esa tensión teológica sin suavizarla ni explicarla, como hace el POB inglés.
  doctrine_reference: Preservar la tensión teológica del texto narrativo; no resolver el problema del sufrimiento mediante paráfrasis
- issue: Sentido de la pregunta sobre el estado matrimonial futuro de las nueras
  english_pob_reading: Would you refrain from belonging to a man for them?
  chosen_spanish_reading: ¿Se abstendrían de pertenecer a un hombre?
  alternative_spanish_readings:
  - ¿Permanecerían sin casarse?
  - ¿Evitarían casarse?
  rationale: El hebreo usa una expresión rara que el contexto orienta hacia el matrimonio. Se mantiene la rareza lexical en español para no perder el matiz ni ocultar la ambigüedad documentada.
  doctrine_reference: Mantener la tensión léxica documentada; no reemplazarla por una frase más común que borre el color del original
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió «refrain from» para תֵּעָגֵנָה y «much more bitter» para מְאֹד. En español se reflejan esas decisiones con un verbo formal («abstenerse») y con «mucho más amargo», manteniendo además la imagen de la «mano de Yahvé» y el nombre divino explícito.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «mano de Yahvé» como imagen idiomática de acción divina.
  - «Pertenecer a un hombre» mantiene el eje matrimonial del hebreo sin reemplazarlo por una formulación eclesiástica.
  - El tono es reverente pero contemporáneo, acorde con español bíblico público y legible.
