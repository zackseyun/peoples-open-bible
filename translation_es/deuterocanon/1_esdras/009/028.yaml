review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva correctamente la estructura de lista y el sentido de καὶ ἐκ τῶν υἱῶν como fórmula genealógica/listal: «Y de los hijos de Zamot». También respeta la decisión del POB de seguir el griego de 1 Esdras en vez de armonizar con el paralelo hebreo. Sin embargo, varias transliteraciones se apartan innecesariamente del testimonio griego visible o de la lógica de transliteración ya documentada: Ἐλειάσειμος queda mejor como «Eleiasimo» o «Eleiasimos» según política, pero el audit trail inglés fijó «Eleiasimus»; en español conviene una adaptación coherente, no una reconfiguración libre. Más importante, Ὀθονίας pierde la aspiración/consonante theta en «Otonías», y Ἰαριμώθ queda demasiado abreviado en «Jarimot» si se busca conservar la forma griega completa reflejada por el inglés «Jarimoth».'
  spanish_quality_summary: 'El español es claro y legible, con puntuación natural. No hay problemas de sintaxis. La principal necesidad de revisión está en la consistencia de transliteración de nombres propios: el texto mezcla adaptación española razonable con reducciones que pueden alejarse del griego más de lo deseable. También conviene mover la nota [a] de «Zamot» a la primera lista de nombres afectada, ya que la nota se refiere a varios nombres del versículo, no específicamente a Zamot; pero mantenerla en Zamot sigue siendo aceptable si se busca un único ancla temprana.'
  glossary_alignment: 'No hay términos teológicos mayores en juego. La revisión se centra en la política del proyecto sobre nombres propios: seguir el griego primario de 1 Esdras y no armonizar con Esdras/Nehemías. Para eso, conviene preservar mejor las formas griegas: «Otonías» debería ser «Othonías», y «Jarimot» debería ser «Jarimot» o «Jarimot(h)» según la convención española; dado que el borrador ya elimina h final muda, «Jarimot» puede aceptarse. «Zamot» como adaptación española de Zamoth es defendible. «Sabados» y «Zeralías» están bien. La nota de incertidumbre textual debe mantenerse.'
  issues:
  - severity: medium
    issue: «Otonías» omite la theta de Ὀθονίας
    rationale: La forma griega tiene θ, y el audit trail inglés la preserva en «Othonias». En español, «Othonías» conserva mejor el vínculo con el griego sin volverse ilegible.
  - severity: low
    issue: La transliteración general no es del todo consistente entre adaptación española y conservación de forma griega
    rationale: «Zamot» y «Jarimot» adaptan, mientras «Sabados» conserva más de cerca el griego. Esto no invalida el texto, pero una ligera normalización mejora fidelidad y consistencia.
  - severity: low
    issue: La nota [a] está anclada en «Zamot», aunque su alcance real abarca varios nombres del versículo
    rationale: No es un error grave, pero el contenido de la nota describe la lista completa. Puede mantenerse por economía editorial.
  revised_spanish_text: 'Y de los hijos de Zamot[a]: Elíadas, Eleiasimo, Othonías, Jarimot, Sabados[b] y Zeralías.'
  revised_footnotes:
  - marker: a
    text: La lista sigue el texto griego de 1 Esdras; no se armoniza con paralelos hebreos o con Esdras/Nehemías cuando los nombres difieren.
    reason: alternative_reading
  - marker: b
    text: La transcripción del testimonio griego presenta una ligera incertidumbre en nombres propios; por eso se conserva una transliteración prudente.
    reason: textual_variant
  revision_rationale: Se corrige «Otonías» a «Othonías» para reflejar con mayor fidelidad Ὀθονίας y alinearse con la lógica del audit trail de seguir la forma griega. Se conservan las demás decisiones del borrador porque son legibles en español y siguen sustancialmente la política de no armonizar con el hebreo paralelo. «Jarimot» se mantiene como adaptación española aceptable de la forma griega, al omitir solo una h final no fonética.
