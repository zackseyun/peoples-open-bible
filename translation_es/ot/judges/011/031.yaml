translation:
  language: es
  text: entonces lo que salga por las puertas de mi casa a recibirme cuando vuelva en paz de los amonitas será de Yahvé[a], y lo ofreceré en holocausto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será para Yahvé, o lo ofreceré en holocausto». Algunos intérpretes toman la conjunción hebrea aquí en sentido disyuntivo, de modo que el voto admitiría dos posibilidades según qué fuera lo que saliera a su encuentro.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַיּוֹצֵא אֲשֶׁר יֵצֵא
  english_pob_choice: whatever comes out
  chosen_spanish: cualquiera que salga
  alternatives_spanish:
  - lo que salga
  - quien salga
  - el que salga
  lexicon: HALOT
  rationale: El hebreo combina un participio y una relativa verbal para mantener abierta la referencia. En español, «cualquiera que salga» preserva esa apertura mejor que una forma ya cerrada a persona o animal, y sigue siendo natural en el contexto del voto.
- source_word: מִדַּלְתֵי בֵיתִי
  english_pob_choice: from the doors of my house
  chosen_spanish: por las puertas de mi casa
  alternatives_spanish:
  - de las puertas de mi casa
  - desde el umbral de mi casa
  - de la entrada de mi casa
  lexicon: HALOT
  rationale: «Puertas» refleja con fidelidad דַּלְתֵי en plural constructo. «Por las puertas» suena más natural en español para expresar el punto de salida sin perder la imagen literal del hebreo.
- source_word: לִקְרָאתִי
  english_pob_choice: to meet me
  chosen_spanish: a recibirme
  alternatives_spanish:
  - a encontrarme
  - a salir a mi encuentro
  - a saludarme
  lexicon: HALOT
  rationale: La idea es de salida para encuentro. «A recibirme» comunica bien el movimiento hacia Jefté y evita una formulación excesivamente rígida, manteniendo el sentido de encuentro personal.
- source_word: בְּשׁוּבִי בְשָׁלוֹם
  english_pob_choice: when I return in peace
  chosen_spanish: cuando vuelva en paz
  alternatives_spanish:
  - cuando regrese en paz
  - cuando vuelva sano y salvo
  - al volver en paz
  lexicon: HALOT
  rationale: «En paz» conserva el valor hebreo de bienestar y retorno seguro, no solo la ausencia de guerra. «Cuando vuelva» reproduce de manera fluida el valor temporal del participio con preposición.
- source_word: מִבְּנֵי עַמּוֹן
  english_pob_choice: from the Ammonites
  chosen_spanish: de los amonitas
  alternatives_spanish:
  - de los hijos de Amón
  - de entre los amonitas
  lexicon: HALOT
  rationale: El nombre de pueblo es la forma natural en español y mantiene la referencia histórica. «Amonitas» sigue de cerca el uso estándar sin introducir una paráfrasis interpretativa.
- source_word: וְהָיָה לַיהוָה
  english_pob_choice: shall be Yahweh’s
  chosen_spanish: será de Yahvé
  alternatives_spanish:
  - pertenecerá a Yahvé
  - será para Yahvé
  - será consagrado a Yahvé
  lexicon: HALOT
  rationale: En la línea del POB, se mantiene «Yahvé» en el texto principal por transparencia con el nombre divino. «Será de Yahvé» conserva la idea de pertenencia/dedicación sin resolver de antemano si el voto implica o no sacrificio.
- source_word: וְהַעֲלִיתִהוּ עוֹלָה
  english_pob_choice: and I will offer it up as a burnt offering
  chosen_spanish: y lo ofreceré en holocausto
  alternatives_spanish:
  - y lo ofreceré como holocausto
  - y lo subiré como ofrenda quemada
  - y lo presentaré como holocausto
  lexicon: HALOT
  rationale: «Holocausto» es el término español asentado para עוֹלָה y preserva el valor sacrificial específico. «Ofreceré» comunica היטב el hifil de עלה como acto cultual de presentación, y el objeto directo neutro «lo» mantiene abierta la referencia del antecedente.
theological_decisions:
- issue: Render del nombre divino יהוה en el texto principal
  english_pob_reading: shall be Yahweh’s
  chosen_spanish_reading: será de Yahvé
  alternative_spanish_readings:
  - será del Señor
  - pertenecerá a Yahvé
  rationale: Se sigue el estándar del proyecto de traducir יהוה como «Yahvé» en el texto principal, en vez de sustituirlo por una forma enmascarada. Esto mantiene la transparencia del testimonio textual y la coherencia con el enfoque del POB.
  doctrine_reference: 'Terminología del proyecto: יהוה / YHWH -> Yahvé'
- issue: 'Naturaleza del voto de Jefté: una sola consecuencia o dos alternativas'
  english_pob_reading: Single outcome with conjunctive 'and.'
  chosen_spanish_reading: 'Una sola secuencia: dedicación a Yahvé y ofrenda en holocausto.'
  alternative_spanish_readings:
  - 'Dos alternativas: será de Yahvé, o lo ofreceré en holocausto.'
  - Lectura abierta sin precisar la relación entre ambas cláusulas.
  rationale: El hebreo usa la conjunción normal ו, que en la lectura principal se entiende como continuidad de una sola promesa. Sin embargo, la discusión interpretativa sobre una posible lectura disyuntiva se conserva mediante nota, para no borrar la tensión textual y teológica del pasaje.
  doctrine_reference: 'Translation philosophy §3: preservar tensiones teológicas; nota audit trail sobre la posible lectura disyuntiva'
translation_notes:
  revision_awareness: El texto sigue la lectura estable del auditable English POB y conserva la misma tensión interpretativa sobre la conjunción ו; no se introdujeron cambios respecto del estado revisado más reciente del original inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en el cuerpo del texto conforme a la terminología del proyecto.
  - «Holocausto» se usa de manera consistente para עוֹלָה, evitando sustituciones como «ofrenda quemada».
  - La referencia abierta de הַיּוֹצֵא se preservó con «cualquiera que salga» y el pronombre neutro «lo» en la segunda cláusula.
  - La nota a conserva la alternativa disyuntiva sin imponerla en el texto principal.
