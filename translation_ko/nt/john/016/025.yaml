  name: Korean
  variant: '표준어 / modern formal-polite (합쇼체)'
source:
  edition: SBLGNT
  text: Ταῦτα ἐν παροιμίαις λελάληκα ὑμῖν· ⸀ἔρχεται ὥρα ὅτε οὐκέτι ἐν παροιμίαις λαλήσω ὑμῖν ἀλλὰ παρρησίᾳ περὶ τοῦ πατρὸς ⸀ἀπαγγελῶ ὑμῖν.
base_translation:
  language: en
  yaml_path: translation/nt/john/016/025.yaml
  text: I have spoken these things to you in figures of speech[a]. An hour is coming when I will no longer speak to you in figures of speech[c][b], but will tell you plainly about the Father.
  footnotes:
  - marker: a
    text: Or 'parables' or 'veiled sayings'; the Greek word here refers to figurative or indirect speech.
    reason: lexical_alternative
  - marker: b
    text: Or 'A time is coming.' John often uses 'hour' with theological significance.
    reason: lexical_alternative
  - marker: c
    text: Or 'openly' or 'with frankness'; here the sense is direct, non-figurative speech.
    reason: lexical_alternative
translation:
  language: ko
  text: 내가 이것들을 비유로 여러분에게 말했습니다. 때가 오는데, 그때에는 내가 더 이상 비유로 여러분에게 말하지 않고, 아버지에 대해 명확하게 알려 드리겠습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「비유들」이나 「가려진 말」. 본 헬라어는 비유적·간접적 발화를 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「때가 오고 있다」. 요한복음은 「때」를 신학적 의미로 자주 사용한다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「드러내어」, 「숨김 없이」. 본문에서는 비유적이지 않은 직접적 발화의 뜻이다.
    reason: lexical_alternative
