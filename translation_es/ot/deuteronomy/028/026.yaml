translation:
  language: es
  text: Tu cadáver[a] será alimento para toda ave del cielo[b] y para las bestias de la tierra, y no habrá quien las espante[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu cuerpo muerto» o «tu cuerpo sin vida». El hebreo transmite un sentido degradante en este contexto de juicio.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «ave del cielo» y «bestias de la tierra»; es una pareja fija cielo/tierra que enfatiza exposición total y deshonra.
    reason: cultural_note
  - marker: c
    text: Es decir, no habrá nadie que ahuyente a las aves y bestias que se alimentan del cuerpo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: will become
  chosen_spanish: será
  alternatives_spanish:
  - llegará a ser
  - se convertirá en
  lexicon: HALOT
  rationale: El verbo perfecto con sentido consecutivo en este contexto de maldición expresa una consecuencia futura; en español, «será» comunica bien el resultado sin forzar una perífrasis innecesaria.
- source_word: נִבְלָתְךָ
  english_pob_choice: your carcass
  chosen_spanish: tu cadáver
  alternatives_spanish:
  - tu cuerpo muerto
  - tu cuerpo sin vida
  lexicon: HALOT
  rationale: El hebreo tiene el sentido de un cuerpo muerto con matiz degradante. «Cadáver» conserva la dureza del juicio; «tu cadáver» mantiene la segunda persona y la carga de deshonra sin sonar artificialmente crudo en español.
- source_word: לְמַאֲכָל
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - presa
  lexicon: HALOT
  rationale: Aquí el complemento indica aquello en que el cuerpo se convierte para ser comido. «Alimento» suena más sobrio y fiel al resultado del texto que una paráfrasis más amplia.
- source_word: לְכָל עוֹף הַשָּׁמַיִם
  english_pob_choice: for every bird of the sky
  chosen_spanish: para toda ave del cielo
  alternatives_spanish:
  - para toda ave de los cielos
  - para cada ave del cielo
  lexicon: HALOT
  rationale: «Ave» evita la posible limitación de «pájaro» y mantiene el registro elevado. «Del cielo» refleja literalmente la imagen hebrea y preserva la pareja cielo/tierra.
- source_word: וּלְבֶהֱמַת הָאָרֶץ
  english_pob_choice: and for the beasts of the earth
  chosen_spanish: y para las bestias de la tierra
  alternatives_spanish:
  - y para los animales de la tierra
  - y para las fieras de la tierra
  lexicon: HALOT
  rationale: «Bestias» conserva el tono ominoso del juicio. «De la tierra» reproduce la correspondencia con «del cielo» y mantiene la pareja fija cielo/tierra del hebreo.
- source_word: וְאֵין מַחֲרִיד
  english_pob_choice: and there will be no one to frighten them away
  chosen_spanish: y no habrá quien las espante
  alternatives_spanish:
  - y no habrá quien las ahuyente
  - y no habrá quien las haga huir
  lexicon: HALOT
  rationale: El sentido es que nadie ahuyentará a las aves y bestias del cadáver. «Espante» reproduce bien el valor de causar temor para que se aparten, con un español natural.
theological_decisions:
- issue: La deshonra del cadáver expuesto como maldición del pacto
  english_pob_reading: Your carcass will become food ... and there will be no one to frighten them away.
  chosen_spanish_reading: Tu cadáver será alimento ... y no habrá quien las espante.
  alternative_spanish_readings:
  - Tu cuerpo muerto será alimento ...
  - Tu cadáver será comida ...
  rationale: La frase expresa no solo muerte sino humillación pública bajo la maldición. «Cadáver» y «alimento» preservan esa vergüenza sin suavizar el juicio ni introducir interpretación extra.
  doctrine_reference: Deuteronomio 28:26; contexto de maldiciones del pacto
- issue: La imagen fija de cielo y tierra como total exposición
  english_pob_reading: bird of the sky ... beasts of the earth
  chosen_spanish_reading: ave del cielo ... bestias de la tierra
  alternative_spanish_readings:
  - ave de los cielos ... bestias del campo
  - pájaros del cielo ... animales de la tierra
  rationale: El hebreo usa una pareja formulada que abarca totalmente el ámbito creado. Mantener «del cielo / de la tierra» preserva la estructura retórica y su fuerza totalizante.
  doctrine_reference: Deuteronomio 28:26; figura retórica del binomio cielo/tierra
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que hay alto acuerdo con el chequeo cruzado, por lo que este borrador sigue de cerca el sentido confirmado del texto fuente y del audit trail en inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto cuando el texto no contiene el tetragrámaton en este versículo.
  - Se preserva el tono de juicio y la degradación implícita en נִבְלָה con «cadáver».
  - Se conserva la pareja retórica «cielo/tierra» para reflejar la formulación hebrea fija.
  - El pronombre de objeto «las» en «las espante» se refiere a las aves y bestias mencionadas colectivamente en el verso.
