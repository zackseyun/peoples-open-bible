  rationale: Se reemplaza «sino por» por «excepto por» para mejorar la naturalidad del español sin apartarse de la decisión auditada en inglés («except by a strong hand»). También se armoniza la nota con el texto principal («el rey de Egipto») y se pule su redacción para mayor claridad.
