review_pass:
  verdict: approve
  source_alignment_summary: 'El borrador español refleja fielmente la pregunta retórica del hebreo: לָמָּה זֶּה como «¿Por qué hay…?», מְחִיר como «un precio», בְּיַד con la imagen conservada en «en la mano de», כְּסִיל como «necio», לִקְנוֹת חָכְמָה como «para comprar sabiduría», y וְלֶב אָיִן interpretado de manera inteligible como «si no tiene entendimiento». La nota conserva correctamente la alternativa literal «y no hay corazón» y explica el campo semántico antropológico de לֵב.'
  spanish_quality_summary: El español es natural, claro y digno. «Necio» encaja bien en el registro sapiencial, y la sintaxis fluye bien en español. Aunque «si no tiene entendimiento» se aparta de la literalidad de «corazón», la nota lo compensa adecuadamente y evita una expresión potencialmente equívoca en español moderno.
  glossary_alignment: No hay términos del glosario de proyecto en juego que entren en conflicto. La elección de «necio», «sabiduría» y «entendimiento» concuerda con el uso contextual y con la justificación lexical documentada. La conservación de «corazón» en nota sigue bien la rationale auditada.
  issues:
  - severity: low
    issue: La frase «en la mano del necio» suena algo literal en español.
    rationale: Sin embargo, sigue siendo comprensible y preserva la imagen posesiva del hebreo, por lo que no requiere corrección.
  - severity: low
    issue: «Si no tiene entendimiento» explicita el sentido más que la metáfora hebrea.
    rationale: Esto ya está respaldado por la nota literal y por la decisión inglesa revisada hacia «no sense»; no constituye infidelidad.
