translation:
  language: es
  text: 'Yahvé envía desde Sion el cetro[a] de tu fuerza: gobierna en medio de tus enemigos[b][c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cetro» también puede entenderse como «vara» o «bastón»; el contexto real favorece la imagen de insignia de autoridad.
    reason: lexical_alternative
  - marker: b
    text: También puede leerse «enviará» o, de manera más interpretativa, «extiende».
    reason: lexical_alternative
  - marker: c
    text: O «gobierna entre tus enemigos».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַטֵּה
  english_pob_choice: scepter
  chosen_spanish: cetro
  alternatives_spanish:
  - vara
  - bastón
  - cetro de mando
  lexicon: HALOT
  rationale: En este salmo real, el objeto simboliza autoridad regia. «Cetro» conserva la imagen concreta y la fuerza de gobierno que el inglés POB quiso destacar con «scepter», sin perder la posibilidad de que el término pueda abarcar una vara o bastón en otros contextos.
- source_word: עֻזְּךָ
  english_pob_choice: your strength
  chosen_spanish: de tu poder
  alternatives_spanish:
  - de tu fuerza
  - de tu vigor
  - de tu fortaleza
  lexicon: HALOT
  rationale: El hebreo expresa la cualidad de fuerza asociada al cetro. «Poder» comunica bien la fuerza soberana en español bíblico moderno y se ajusta naturalmente a «cetro de tu poder»; «fuerza» también sería posible, pero aquí «poder» suena más regio.
- source_word: יִשְׁלַח
  english_pob_choice: sends forth
  chosen_spanish: envía
  alternatives_spanish:
  - mandará
  - despacha
  - extiende
  lexicon: HALOT
  rationale: El verbo significa enviar, mandar o despachar. «Envía» mantiene la acción verbal directa del texto; el matiz de salida «from Zion» ya está expresado por «desde Sion». No se adopta «extiende» como decisión principal porque es más interpretativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio en transliteración, conforme al criterio del proyecto, en lugar de sustituirlo por un título como «Señor».
- source_word: מִצִּיּוֹן
  english_pob_choice: from Zion
  chosen_spanish: desde Sion
  alternatives_spanish:
  - de Sion
  lexicon: HALOT
  rationale: La expresión locativa indica procedencia. «Desde Sion» refleja con claridad el punto de origen y suena natural en español; se mantiene el nombre propio tradicionalmente transliterado como «Sion».
- source_word: רְדֵה
  english_pob_choice: rule
  chosen_spanish: gobierna
  alternatives_spanish:
  - reina
  - domina
  - ejerce dominio
  lexicon: HALOT
  rationale: El imperativo de רדה pide gobernar o ejercer dominio. «Gobierna» es claro y natural en español, y conserva el carácter de mandato real sin sobrecargarlo con «domina», que puede sonar más duro.
- source_word: בְּקֶרֶב
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - entre
  - en el centro de
  lexicon: HALOT
  rationale: «En medio de» preserva la imagen espacial del hebreo y coincide con la decisión inglesa de mantener la escena dramática del reinado rodeado de adversarios.
- source_word: אֹיְבֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - tus adversarios
  - los que te odian
  lexicon: HALOT
  rationale: Traducción directa del sustantivo plural con sufijo de segunda persona masculina singular.
theological_decisions:
- issue: Imaginería real con posible lectura mesiánica
  english_pob_reading: Retain the royal language in a way that allows both the immediate royal sense and the broader messianic significance recognized in Christian interpretation.
  chosen_spanish_reading: Conservar el lenguaje real de modo que sostenga tanto el sentido monárquico inmediato como la posibilidad de una lectura mesiánica más amplia.
  alternative_spanish_readings:
  - Traducir de manera más genérica para atenuar la imagen real
  - Expresar de forma explícitamente mesiánica en el texto principal
  rationale: El hebreo presenta a una figura real que recibe apoyo divino y una orden de gobierno. La traducción no debe resolver por adelantado la tensión canónica; por eso se mantiene el lenguaje regio sin introducir una identificación doctrinal explícita en el versículo mismo.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: La versión coincide con el pasaje hebreo y con el auditorio inglés POB en lo esencial; se ajustó el español para sonar natural y mantener la imagen regia, el origen en Sion y la tensión entre traducción literal y matiz interpretativo.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el Nombre divino, conforme al criterio del proyecto.
  - «Sion» se mantiene como nombre propio bíblico en español.
  - «Cetro» se eligió como término principal por la imaginería real; la nota conserva las alternativas léxicas.
  - «Gobierna» preserva el imperativo de realeza sin añadir teología no explícita en el hebreo.
  - La puntuación con dos puntos refleja la relación entre la acción divina y la orden al rey.
