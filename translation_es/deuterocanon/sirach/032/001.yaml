base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/032/001.yaml
  text: If they have made you the leader[a], do not exalt yourself; be among them like one of them. Care for them, and then recline; prepare what is needed[c][b], and then take your place.
  footnotes:
  - marker: a
    text: 'The opening clause in the Hebrew witness is bracketed in Kahana''s edition: ''If they have made you the leader, do not exalt yourself.'' The surrounding lines strongly support this banquet-host setting, and the Greek parallel also reflects meal-related instruction in this section, though it differs substantially in wording.'
    reason: textual_variant
  - marker: b
    text: Or 'look after them' for 'Care for them.' The Hebrew verb can emphasize practical concern as well as inward solicitude.
    reason: lexical_alternative
  - marker: c
    text: '''Recline'' reflects the posture customary at formal ancient meals.'
    reason: cultural_note
