  rationale: 'Se reubicaron y ajustaron las notas para seguir la auditoría inglesa y la evidencia hebrea: la referencia probable a la muerte se ancla a «descansarás», y se añadió la nota escatológica para «al fin de los días». Además, «heredad» se sustituyó por «porción asignada» para reflejar mejor גּוֹרָל y mejorar la claridad. También se aligeró la puntuación para un español más natural.'
