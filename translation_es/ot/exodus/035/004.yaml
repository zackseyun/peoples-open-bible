- from: 'Entonces Moisés dijo a toda la congregación de los hijos de Israel[a]: «Esta es la cosa[b] que Yahvé ha mandado, diciendo»'
  to: 'Entonces Moisés dijo a toda la congregación[a] de los hijos de Israel[b]: «Esto es lo que[c] Yahvé ha mandado, diciendo»'
  rationale: Se reemplaza «Esta es la cosa» por «Esto es lo que» para lograr un español natural y fiel a la función introductoria de זֶה הַדָּבָר en este contexto. Se añaden y ajustan notas para preservar las alternativas léxicas importantes registradas en el audit trail inglés, especialmente para «los hijos de Israel».
