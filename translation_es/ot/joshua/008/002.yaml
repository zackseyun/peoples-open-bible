  to: Harás con Hai y con su rey como hiciste con Jericó y con su rey. Solo su botín y su ganado podrán saquear para ustedes[a]. Tiende una emboscada[b] detrás de la ciudad.
  rationale: Se reubican las notas en las palabras correctas según el hebreo y la POB inglesa, se simplifica la cláusula del botín para evitar redundancia, y se reemplaza 'Pon una emboscada para ti' por una orden idiomática en español. Las revisiones preservan el sentido fuente y la lógica lexical documentada.
