  to: El dinero[a] de la ofrenda por la culpa y el dinero de las ofrendas por el pecado no debía llevarse a la casa de Yahvé[b]; pertenecía a los sacerdotes.
  rationale: Se ajusta כֶּסֶף a 'dinero' para seguir la decisión léxica auditada del POB en un contexto financiero/administrativo; se conserva 'plata' como alternativa literal en nota. Se cambia 'no se llevaba' por 'no debía llevarse' para reflejar mejor el valor normativo de לֹא יוּבָא, y 'era para' por 'pertenecía a' para expresar con más precisión la asignación posesiva a los sacerdotes. También se reordenan las notas para que cada ancla corresponda con claridad a su explicación.
