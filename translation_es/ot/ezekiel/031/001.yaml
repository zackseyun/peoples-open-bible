    text: 'Hebreo: «YHWH». Tradicionalmente se vierte «el SEÑOR»; alternativamente, «Yahvé».'
    reason: alternative_reading
  revision_rationale: 'Se ajustan dos expresiones de fecha para cumplir mejor con la equivalencia óptima y la legibilidad del español neutral: «en el mes tercero» → «en el tercer mes» y «a primero del mes» → «el primer día del mes». Se conserva «Y sucedió» y la fórmula profética con «Yahvé», que sí representan fielmente el hebreo y la política terminológica del proyecto.'
