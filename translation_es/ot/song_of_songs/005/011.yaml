translation:
  language: es
  text: Su cabeza es como oro finísimo[a]; sus rizos son ondulados[b], negros como un cuervo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oro fino»; el hebreo usa dos términos para el oro juntos, para dar énfasis.
    reason: lexical_alternative
  - marker: b
    text: O «rizados»; el hebreo emplea un término raro y poético que puede sugerir cabello en ondas o en rizos.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאשׁוֹ
  english_pob_choice: His head
  chosen_spanish: Su cabeza
  alternatives_spanish:
  - Su cabeza
  - Su coronilla
  - Su semblante principal
  lexicon: HALOT
  rationale: El hebreo רֹאשׁ denota aquí la cabeza de manera literal dentro de una descripción corporal poética; 'Su cabeza' conserva la imagen concreta sin perder naturalidad en español.
- source_word: כֶּתֶם פָּז
  english_pob_choice: finest gold
  chosen_spanish: el más fino oro
  alternatives_spanish:
  - oro finísimo
  - oro refinado
  - el oro más fino
  lexicon: HALOT
  rationale: La combinación de dos términos de oro intensifica la calidad superlativa. 'El más fino oro' mantiene ese énfasis y refleja bien la acumulación hebrea sin volverla demasiado explicativa.
- source_word: קְוּצּוֹתָיו
  english_pob_choice: his locks
  chosen_spanish: sus rizos
  alternatives_spanish:
  - sus mechones
  - sus cabellos
  - sus trenzas
  lexicon: HALOT
  rationale: El término designa mechones o rizos colgantes. 'Rizos' comunica bien la imagen poética y permite enlazar con la descripción siguiente de forma fluida.
- source_word: תַּלְתַּלִּים
  english_pob_choice: wavy
  chosen_spanish: ondulados
  alternatives_spanish:
  - rizados
  - en ondas
  - curvos
  lexicon: HALOT
  rationale: Es un vocablo raro y poético que sugiere cabello en ondas o rizos. 'Ondulados' conserva la ambigüedad y evita precisar más de lo que el hebreo garantiza.
- source_word: שְׁחֹר֖וֹת
  english_pob_choice: black
  chosen_spanish: negros
  alternatives_spanish:
  - oscuros
  lexicon: HALOT
  rationale: El adjetivo indica negrura de manera directa; 'negros' es la equivalencia más simple y fiel en español.
- source_word: כָּעוֹרֵב
  english_pob_choice: as a raven
  chosen_spanish: como un cuervo
  alternatives_spanish:
  - como un cuervo negro
  - como un corvo
  lexicon: HALOT
  rationale: El hebreo usa una comparación con ave negra para intensificar el color. 'Como un cuervo' es idiomático en español y conserva la imagen comparativa; aunque el inglés POB usa 'raven', en español 'cuervo' es el equivalente más natural y claro.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió 'finest gold' frente a 'purest gold' para reflejar más directamente כֶּתֶם פָּז; por eso se eligió en español una fórmula superlativa equivalente que preserve la acumulación intensiva del hebreo.
  spanish_consistency_notes:
  - Se mantuvo un registro poético y digno, acorde con una descripción corporal en el Cantar.
  - '''Oro'' se colocó con artículo y superlativo para reproducir la intensidad del hebreo y sonar natural en español.'
  - La imagen aviar final se conservó sin glosa adicional porque 'como un cuervo' ya comunica la comparación de color de forma clara.
