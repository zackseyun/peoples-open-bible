review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura proverbial y el sentido básico del hebreo: la falta de combustible apaga el fuego, y la ausencia del נרגן hace que la contienda se calme. Sin embargo, la decisión principal para נִרְגָּן se aparta del énfasis documentado en el POB inglés, que prefirió ''whisperer'' para preservar la imagen de murmurar o hablar dañinamente en secreto. «Chismoso» capta parte del campo semántico, pero desplaza el foco hacia el chisme general y debilita la imaginería de murmuración/voz susurrada.'
  spanish_quality_summary: El español es claro, natural y digno. «A falta de leña, el fuego se apaga» suena muy bien en español bíblico contemporáneo. «La contienda se aquieta» también es adecuado. La principal mejora es elegir un término más alineado con la imagen hebrea y con la auditoría inglesa; «murmurador» funciona mejor que «chismoso» en este registro.
  glossary_alignment: No hay términos teológicos sensibles del glosario mayor en este versículo. La cuestión léxica clave es נִרְגָּן. Para respetar la rationale del POB, conviene usar «murmurador» en el texto principal y mantener «chismoso» como alternativa contextual en nota. La nota actual además incluye el anglicismo «gossip», impropio en una nota española, y debe corregirse.
  issues:
