lexical_decisions:
- source_word: דְּדָן
  english_pob_choice: Dedan
  chosen_spanish: Dedán
  alternatives_spanish:
  - Dedan
  lexicon: HALOT
  rationale: Nombre propio geográfico; se translitera al español con acento agudo para reflejar la acentuación habitual y mantener la identificación del lugar.
- source_word: רֹכַלְתֵּךְ
  english_pob_choice: traded with you
  chosen_spanish: comerciaba contigo
  alternatives_spanish:
  - traficaba contigo
  - era tu comerciante
  lexicon: HALOT
  rationale: El verbo רכל en contexto mercantil expresa actividad comercial. 'Comerciaba contigo' conserva la relación directa con Tiro sin sonar tan idiomáticamente rígido como una traducción literal de 'traded with you'.
- source_word: בְּבִגְדֵי
  english_pob_choice: in ... cloths
  chosen_spanish: en mantos
  alternatives_spanish:
  - en telas
  - en prendas
  - en vestidos
  lexicon: HALOT
  rationale: בגד puede ser 'vestido/ropa', pero en esta lista comercial se trata de mercancías textiles. 'Mantos' comunica un artículo textil de comercio sin reducirlo a ropa personal.
- source_word: חֹפֶשׁ
  english_pob_choice: saddle
  chosen_spanish: de montar
  alternatives_spanish:
  - de silla de montar
  - para montar
  - de cabalgar
  lexicon: HALOT
  rationale: La palabra es incierta y el POB inglés la trató como un término textil especializado ligado al equipo de monta. En español, 'de montar' conserva esa ambigüedad productiva y evita concretar más de lo que el hebreo permite.
- source_word: לְרִכְבָּה
  english_pob_choice: for riding
  chosen_spanish: de montar
  alternatives_spanish:
  - para montar
  - para cabalgar
  - para la montura
  lexicon: HALOT
  rationale: רכב se refiere a montar/ir montado. 'De montar' se alinea con la frase anterior y reproduce la función del tejido en el contexto de la montura sin sobreespecificar el tipo de animal o vehículo.
translation_notes:
  revision_awareness: El texto inglés POB reciente permanece sin cambios tras la revisión; la versión española sigue la misma decisión interpretativa sobre el término textil incierto y conserva la ambigüedad documentada.
  spanish_consistency_notes:
  - Se usa 'Dedán' como transliteración consistente de topónimo.
  - '''Comerciaba contigo'' mantiene el tono relacional del hebreo dirigido a Tiro.'
  - La secuencia 'mantos de montar' intenta reproducir la combinación de mercancía textil + finalidad ecuestre sin añadir especificaciones no atestiguadas.
