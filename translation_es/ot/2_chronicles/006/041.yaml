review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido del hebreo: mantiene «Yahvé Dios», la súplica «levántate», el «lugar de reposo», la metáfora de vestirse de salvación y la ambigüedad de בַטּוֹב. Sin embargo, hay dos desajustes frente al rastro auditado: (1) la nota [a] está anclada en «levántate», pero su contenido trata alternativas de «tu poder/tu fuerza» del arca, no del imperativo; (2) «para tu lugar de reposo» suena menos natural que «a tu lugar de reposo» para לְנוּחֶךָ en este contexto direccional.'
  spanish_quality_summary: El español es claro y digno, pero conviene una reparación menor para naturalidad y consistencia editorial. «A tu lugar de reposo» fluye mejor. La nota [a] actual contiene un error léxico y además «alza-te» está mal escrito. «Tus fieles» y «en lo bueno» son lecturas aceptables y legibles.
  glossary_alignment: Alinea correctamente con la terminología del proyecto en «Yahvé», «Dios», «salvación» y «fieles». La elección «poder» para עֻזֶּךָ es defendible, aunque el inglés auditado prefirió «strength»; no requiere cambio porque la nota puede preservar «fuerza/fortaleza» como alternativas. No hay conflicto doctrinal que exija adjudicación.
  issues:
  - severity: high
    issue: La nota [a] está mal asignada y no corresponde al texto anclado.
    rationale: En el texto, [a] aparece en «levántate[a]», pero la nota debería documentar alternativas para «el arca de tu poder/fuerza», no para el imperativo. Además, el rastro inglés conserva esa alternativa léxica para עֻזֶּךָ, no para קוּמָה.
  - severity: medium
    issue: «para tu lugar de reposo» es menos natural que «a tu lugar de reposo».
    rationale: לְנוּחֶךָ aquí expresa destino hacia el lugar de reposo. En español de lectura bíblica, «a tu lugar de reposo» comunica mejor el movimiento implícito en «levántate» sin perder fidelidad.
  - severity: low
    issue: 'La nota actual de «levántate» contiene una forma incorrecta: «alza-te».'
    rationale: Si se conservara una nota para el imperativo, la grafía correcta sería «álzate». Pero como la nota debe moverse a «poder», este problema desaparece con la revisión.
  revised_spanish_text: Y ahora, Yahvé Dios, levántate a tu lugar de reposo, tú y el arca de tu poder[a]. Que tus sacerdotes, Yahvé Dios, se vistan de salvación, y que tus fieles[b] se alegren en lo bueno[c].
  revised_footnotes:
