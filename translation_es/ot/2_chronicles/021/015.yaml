    issue: «una enfermedad de tus entrañas» suena menos natural y menos preciso que una construcción con preposición causal/origen.
    rationale: La auditoría inglesa revisó explícitamente a «from a disease of your bowels». En español, «sufrirás ... por una enfermedad de tus entrañas» o «a causa de» expresa mejor la relación entre el sufrimiento general y la afección específica.
  - severity: medium
