translation:
  language: es
  text: Y el reino, el dominio y la grandeza de los reinos bajo todo el cielo serán dados al pueblo de los santos del Altísimo[a]. Su reino será un reino eterno[b], y todos los dominios le servirán[c] y le obedecerán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'al pueblo de los seres santos del Altísimo' o 'al pueblo santo del Altísimo'.
    reason: lexical_alternative
  - marker: b
    text: 'El arameo conserva pronombres singulares: ''Su reino ... todos los dominios le servirán y le obedecerán''. Esto puede señalar al gobernante representativo visto antes en la visión, aun cuando el reino es dado a los santos.'
    reason: alternative_reading
  - marker: c
    text: '''Servir'' también puede llevar el sentido de ''adorar'' en Daniel cuando el servicio se rinde a una figura divina.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְכוּתָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el dominio real
  lexicon: HALOT
  rationale: En este contexto apocalíptico, el término abarca tanto el ámbito real como el ejercicio del poder. 'Reino' es la forma más natural en español y conserva la concreción del dato político-teológico.
- source_word: שָׁלְטָנָא
  english_pob_choice: the dominion
  chosen_spanish: el dominio
  alternatives_spanish:
  - la autoridad
  - el poder
  lexicon: HALOT
  rationale: El término expresa poder de gobierno. 'Dominio' mantiene la relación con el campo semántico de soberanía y corresponde al uso repetido del pasaje.
- source_word: רְבוּתָא
  english_pob_choice: the greatness
  chosen_spanish: la grandeza
  alternatives_spanish:
  - la majestad
  - la magnitud
  lexicon: HALOT
  rationale: El sustantivo señala grandeza o magnitud. 'Grandeza' reproduce bien el registro elevado sin añadir una interpretación más específica que la del texto.
- source_word: דִּי מַלְכְוָת תְּחוֹת כָּל שְׁמַיָּא
  english_pob_choice: of the kingdoms under all heaven
  chosen_spanish: de los reinos bajo todos los cielos
  alternatives_spanish:
  - de los reinos bajo todo el cielo
  - de los reinos de debajo de todos los cielos
  lexicon: HALOT
  rationale: La expresión idiomática aramea apunta a la totalidad del orden terrenal. 'Bajo todos los cielos' conserva la amplitud del modismo sin forzar una paráfrasis explicativa.
- source_word: יְהִיבַת
  english_pob_choice: shall be given
  chosen_spanish: serán dados
  alternatives_spanish:
  - será dado
  - serán entregados
  lexicon: HALOT
  rationale: Aunque la forma verbal es perfecta, en este contexto visionario funciona proféticamente. El plural en español concuerda con los tres sustantivos coordinados iniciales y evita una construcción torpe.
- source_word: לְעַם
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a la nación
  lexicon: HALOT
  rationale: '''Pueblo'' es el colectivo más fiel y natural en español para עַם; mantiene la referencia comunitaria sin introducir la noción moderna de nación-estado.'
- source_word: קַדִּישֵׁי עֶלְיוֹנִין
  english_pob_choice: of the saints of the Most High
  chosen_spanish: de los santos del Altísimo
  alternatives_spanish:
  - de los santos del Más Alto
  - de los santos del Dios Altísimo
  lexicon: HALOT
  rationale: '''Santos'' preserva el valor léxico de קַדִּישִׁין y es idiomático en español bíblico. ''Altísimo'' traduce עֶלְיוֹנִין con el artículo implícito del título divino, sin reemplazarlo por una glosa.'
- source_word: מַלְכוּתֵהּ
  english_pob_choice: His kingdom
  chosen_spanish: Su reino
  alternatives_spanish:
  - Su realeza
  - Su dominio
  lexicon: HALOT
  rationale: Se conserva el sufijo singular masculino. El posesivo 'su' mantiene la ambigüedad referencial observada en el audit trail, sin resolverla artificialmente en plural.
- source_word: מַלְכוּת עָלַם
  english_pob_choice: an everlasting kingdom
  chosen_spanish: un reino eterno
  alternatives_spanish:
  - un reino para siempre
  - un reino perpetuo
  lexicon: HALOT
  rationale: '''Eterno'' comunica la duración sin fin que expresa la construcción aramea. En español suena más natural que un giro como ''para siempre'' en este predicado nominal.'
- source_word: שָׁלְטָנַיָּא
  english_pob_choice: all dominions
  chosen_spanish: todos los dominios
  alternatives_spanish:
  - todas las autoridades
  - todos los poderes
  lexicon: HALOT
  rationale: El plural puede designar soberanías o poderes gobernantes. 'Dominios' preserva la continuidad léxica con שָׁלְטָנָא y deja abierta la referencia a autoridades o esferas de gobierno.
- source_word: יִפְלְחוּן
  english_pob_choice: shall serve him
  chosen_spanish: le servirán
  alternatives_spanish:
  - le prestarán servicio
  - le adorarán
  lexicon: HALOT
  rationale: '''Servir'' mantiene el campo semántico amplio del verbo, que puede incluir servicio rendido a una figura divina o regia. La traducción no restringe indebidamente el sentido a ''adorar''.'
- source_word: וְיִשְׁתַּמְּעוּן
  english_pob_choice: and obey him
  chosen_spanish: y le obedecerán
  alternatives_spanish:
  - y le escucharán
  - y se someterán a él
  lexicon: HALOT
  rationale: El valor de 'oír' en contexto real se expresa naturalmente como obediencia. 'Le obedecerán' conserva la relación de gobierno y la coordinación con 'le servirán'.
theological_decisions:
- issue: Referente singular en la segunda oración
  english_pob_reading: 'Retain the singular: ''His kingdom ... all dominions shall serve and obey him,'' allowing the text''s tension between the saints receiving the kingdom and the singular ruler''s everlasting reign to remain.'
  chosen_spanish_reading: 'Mantener el singular: ''Su reino ... todos los dominios le servirán y le obedecerán'', dejando en pie la tensión entre el reino dado al pueblo de los santos y el reinado singular que sigue.'
  alternative_spanish_readings:
  - '''Su reino ... todos los dominios les servirán y les obedecerán'''
  - '''Su reino ... todos los dominios servirán y obedecerán al reino'''
  rationale: El arameo conserva sufijos y pronombres singulares. Traducirlos en singular respeta la forma del texto y no resuelve de antemano la relación entre el pueblo santo y la figura real del capítulo.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Alcance de 'santos del Altísimo'
  english_pob_reading: Translate as 'the people of the saints of the Most High' with 'saints' retained in the main text.
  chosen_spanish_reading: Traducir 'los santos del Altísimo' dentro de 'al pueblo de los santos del Altísimo', conservando tanto el valor colectivo como el léxico de 'santos'.
  alternative_spanish_readings:
  - '''el pueblo santo del Altísimo'''
  - '''el pueblo de los santos del Altísimo'''
  rationale: La expresión puede entenderse corporativamente como el pueblo santo de Dios, pero el léxico de קַדִּישִׁין es 'santos/seres santos'. 'Pueblo' aclara la colectividad, mientras 'santos' preserva la terminología recibida.
  doctrine_reference: Translation philosophy §5 Consistency of key terms, or documented exception.
translation_notes:
  revision_awareness: 'He tenido en cuenta la revisión más reciente del audit trail: se preserva el carácter singular de los pronombres en la segunda oración y se evita añadir un segundo objeto explícito después de ''servir'', reflejando que un solo ''le'' gobierna ambos verbos en español.'
  spanish_consistency_notes:
  - Se usa 'Altísimo' para עֶלְיוֹנִין de manera consistente con el título divino.
  - Se mantiene 'santos' en lugar de 'santas ones' o 'santos' para preservar la terminología bíblica habitual y el valor lexical del arameo.
  - 'Se traduce la serie inicial con paralelismo nominal: ''el reino, el dominio y la grandeza''.'
  - Se conserva la ambigüedad teológica del sujeto singular con posesivo y dativo singulares.
  - '''Dominios'' se repite para mantener la conexión léxica con שָׁלְטָנָא / שָׁלְטָנַיָּא.'
