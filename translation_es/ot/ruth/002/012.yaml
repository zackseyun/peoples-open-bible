translation:
  language: es
  text: Que Yahvé recompense tu obra, y que tu recompensa[a] sea completa de parte de Yahvé, Dios de Israel, bajo cuyas alas has venido a buscar refugio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu salario sea completo». El término hebreo puede denotar salario o recompensa, y «completa» hace eco de la misma raíz que el verbo «recompense».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְשַׁלֵּם
  english_pob_choice: may ... repay
  chosen_spanish: repague
  alternatives_spanish:
  - pague de vuelta
  - recompense
  lexicon: HALOT
  rationale: El piel con valor jussivo expresa un deseo o bendición. En español, «repague» conserva la idea de retribución y la relación semántica con la recompensa, sin volverla una simple repetición mecánica de «hacer completo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino aparece explícitamente en el hebreo; se mantiene como «Yahvé» según la convención terminológica del proyecto, evitando la sustitución por un título.
- source_word: פָּעֳלֵךְ
  english_pob_choice: your work
  chosen_spanish: tu obra
  alternatives_spanish:
  - tu trabajo
  - tu acción
  lexicon: HALOT
  rationale: פֹּעַל puede significar trabajo, obra o actividad. «Tu obra» es natural en español y preserva el sentido de las acciones fieles de Rut como base de la retribución.
- source_word: וּתְהִי
  english_pob_choice: and may ... be
  chosen_spanish: y sea
  alternatives_spanish:
  - y que sea
  - y pueda ser
  lexicon: HALOT
  rationale: La forma jussiva continúa la bendición. «Y sea» mantiene el valor volitivo en un español elegante y breve.
- source_word: מַשְׂכֻּרְתֵּךְ
  english_pob_choice: your reward
  chosen_spanish: tu recompensa
  alternatives_spanish:
  - tus salarios
  - tu paga
  lexicon: HALOT
  rationale: En este contexto no se trata de salario contractual sino de retribución concedida por Dios; «recompensa» comunica mejor ese matiz que «paga» o «salarios».
- source_word: שְׁלֵמָה
  english_pob_choice: be full
  chosen_spanish: completa
  alternatives_spanish:
  - plena
  - llena
  lexicon: HALOT
  rationale: La raíz שׁלם comunica plenitud/completitud. «Completa» conserva esa relación y refleja mejor la idea de una retribución íntegra.
- source_word: מֵעִם
  english_pob_choice: from
  chosen_spanish: de parte de
  alternatives_spanish:
  - de
  - procedente de
  lexicon: HALOT
  rationale: La preposición indica origen; en español bíblico fluido, «de parte de» expresa bien la procedencia personal de la recompensa sin sonar demasiado técnico.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Construcción estándar en español; «Dios de Israel» mantiene el vínculo de pacto y la identificación histórica sin añadir elementos ajenos al hebreo.
- source_word: אֲשֶׁר בָּאת לַחֲסוֹת
  english_pob_choice: under whose wings you have come to seek refuge
  chosen_spanish: bajo cuyas alas has venido a buscar refugio
  alternatives_spanish:
  - a quien has venido para refugiarte
  - bajo cuyas alas has venido a ampararte
  lexicon: HALOT
  rationale: La imagen de las «alas» debe conservarse por su fuerza metafórica y covenantal. «Has venido a buscar refugio» traduce bien la finalidad del infinitivo לַחֲסוֹת con un español claro y reverente.
- source_word: תַּחַת כְּנָפָיו
  english_pob_choice: under whose wings
  chosen_spanish: bajo cuyas alas
  alternatives_spanish:
  - debajo de sus alas
  - bajo su amparo
  lexicon: HALOT
  rationale: Se preserva la metáfora de protección sin reemplazarla por una abstracción como «amparo», de modo que la imagen permanezca auditable y visible en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. La lectura «Yahvé» respeta la decisión doctrinal del proyecto de no ocultar el nombre personal de Dios tras un sustituto titular.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre recompensa humana y recompensa de Yahvé
  english_pob_reading: your reward be full from Yahweh
  chosen_spanish_reading: sea completa tu recompensa de parte de Yahvé
  alternative_spanish_readings:
  - sea plena tu recompensa de Yahvé
  - se complete tu recompensa de Yahvé
  rationale: 'La frase conserva la tensión del hebreo: la recompensa es real y total, pero proviene de Yahvé. «De parte de» expresa la fuente personal sin borrar el matiz de procedencia.'
  doctrine_reference: Ruth 2:12 context and Hebrew מֵעִם + covenant blessing language
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia entre traducción y revisión; no se requieren cambios sustantivos respecto del sentido de la fuente. Se conservan el paralelismo de bendición, la metáfora de las alas y la ambigüedad léxica de מַשְׂכֻּרְתֵּךְ en una nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה de manera consistente con la política del proyecto.
  - Se mantiene «alas» como metáfora, no se reduce a «protección».
  - «Recompensa» se usa para מַשְׂכֻּרְתֵּךְ, reservando «salario» como alternativa anotada por la polisemia del hebreo.
  - La sintaxis reproduce el tono de bendición volitiva con dos cláusulas coordinadas por «y».
