translation:
  language: es
  text: Yo también tengo entendimiento[a] como ustedes; no soy inferior a ustedes. ¿Y quién no sabe cosas como estas?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «yo también tengo un corazón como el de ustedes». Aquí «corazón» se refiere a la facultad de entender o pensar.
