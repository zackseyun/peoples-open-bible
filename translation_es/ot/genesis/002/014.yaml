translation:
  language: es
  text: Y el nombre del tercer río es Hidéquel[a]; es el que pasa al oriente de Asur[b]. Y el cuarto río es el Eufrates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hidéquel es tradicionalmente identificado con el Tigris.
    reason: alternative_reading
  - marker: b
    text: O «al oriente de Asiria»; hebreo «al oriente de Asur».
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁם
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - designación
  lexicon: HALOT
  rationale: En la fórmula nominal del versículo, «nombre» es la correspondencia directa y natural en español, conservando la estructura del hebreo sin sobreinterpretarla.
- source_word: נָּהָר
  english_pob_choice: river
  chosen_spanish: río
  alternatives_spanish:
  - corriente
  - arroyo
  lexicon: HALOT
  rationale: El término hebreo designa un río; «río» es claro y exacto en español.
- source_word: שְּׁלִישִׁי
  english_pob_choice: third
  chosen_spanish: tercer
  alternatives_spanish:
  - tercero
  lexicon: HALOT
  rationale: Adjetivo ordinal; en español, ante sustantivo masculino singular, «tercer» es la forma idiomática de «tercero».
- source_word: חִדֶּקֶל
  english_pob_choice: Hiddekel
  chosen_spanish: Hidéquel
  alternatives_spanish:
  - Hiddequel
  - Tigris
  lexicon: HALOT
  rationale: Se translitera el nombre hebreo para mantener la forma del texto fuente. Se conserva la identificación tradicional en una nota, sin sustituir el nombre del texto por el equivalente tradicional.
- source_word: הוּא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - es el que
  - se trata de
  lexicon: HALOT
  rationale: El pronombre funciona predicativamente; en español se expresa de forma natural con «es», manteniendo la identificación del referente.
- source_word: הֹלֵךְ
  english_pob_choice: goes
  chosen_spanish: va
  alternatives_spanish:
  - fluye
  - corre
  lexicon: HALOT
  rationale: Aunque literalmente el participio es «ir/caminar», para un río en español «va» conserva mejor la imagen verbal del hebreo que un verbo más interpretativo como «fluye».
- source_word: קִדְמַת
  english_pob_choice: east of
  chosen_spanish: al oriente de
  alternatives_spanish:
  - al este de
  - delante de
  lexicon: HALOT
  rationale: En uso geográfico, la construcción señala dirección/orientación; «al oriente de» es idiomático y refleja con precisión la relación espacial.
- source_word: אַשּׁוּר
  english_pob_choice: Asshur
  chosen_spanish: Asur
  alternatives_spanish:
  - Asiria
  lexicon: HALOT
  rationale: Se conserva la forma hebrea del nombre propio. «Asiria» queda como alternativa de lectura geográfica, pero no reemplaza la forma del texto en el cuerpo principal.
- source_word: רְבִיעִי
  english_pob_choice: fourth
  chosen_spanish: cuarto
  alternatives_spanish:
  - cuarta
  lexicon: HALOT
  rationale: Ordinal directo y transparente.
- source_word: פְרָת
  english_pob_choice: the Euphrates
  chosen_spanish: el Éufrates
  alternatives_spanish:
  - Perat
  lexicon: HALOT
  rationale: Se usa el nombre español convencional del río, que comunica claramente al lector moderno y corresponde a la identificación histórica estándar.
translation_notes:
  revision_awareness: El pasaje fue revisado y no requirió cambios en la última pasada; la versión inglesa auditada permanece con acuerdo alto, por lo que la redacción española sigue de cerca la estructura y las decisiones léxicas documentadas, especialmente en los nombres propios y la relación espacial de קִדְמַת אַשּׁוּר.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conserva la transliteración del nombre hebreo Hidéquel en el texto principal, con nota de identificación tradicional.
  - «Al oriente de» se eligió por ser más natural en español bíblico actual que un calco como «este de».
  - Se usó «Asur» en el texto principal para respetar la forma hebrea; la nota ofrece «Asiria» como alternativa geográfica.
  - Se mantiene el nombre convencional «Éufrates» por claridad y uso establecido en español.
