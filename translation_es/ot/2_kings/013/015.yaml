translation:
  language: es
  text: 'Entonces Eliseo le dijo[a]: «Toma un arco y flechas». Entonces tomó un arco y flechas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «Entonces tomó para sí un arco y flechas», aunque el hebreo se entiende más naturalmente como «le dijo», refiriéndose a Eliseo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» reproduce bien la secuencia en español sin sonar mecánico.
- source_word: לּוֹ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: 'El sufijo pronominal de 3ms funciona naturalmente como complemento indirecto en español: «le dijo».'
- source_word: אֱלִישָׁע
  english_pob_choice: Elisha
  chosen_spanish: Eliseo
  alternatives_spanish:
  - Elíseo
  lexicon: convención bíblica española
  rationale: Nombre propio tradicional y transparente en español bíblico, manteniendo la identificación del personaje.
- source_word: קַח
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Tome
  lexicon: HALOT
  rationale: Imperativo singular directo de לקח; «Toma» es claro y fiel al tono imperativo del hebreo.
- source_word: קֶשֶׁת
  english_pob_choice: a bow
  chosen_spanish: un arco
  alternatives_spanish:
  - un arco de guerra
  lexicon: HALOT
  rationale: El sustantivo designa el arma; en español «arco» es el equivalente natural. El artículo indefinido es idiomático aunque no aparezca explícitamente en hebreo.
- source_word: וְחִצִּים
  english_pob_choice: and arrows
  chosen_spanish: y flechas
  alternatives_spanish:
  - y saetas
  lexicon: HALOT
  rationale: חִצִּים son flechas; «flechas» es más claro y contemporáneo que «saetas» para una lectura pública.
- source_word: וַיִּקַּח
  english_pob_choice: So he took
  chosen_spanish: Y él tomó
  alternatives_spanish:
  - Entonces tomó
  lexicon: HALOT
  rationale: La waw consecutiva continúa la narración. Añadir «él» hace explícito el sujeto y mantiene la fluidez en español, sin alterar el sentido.
- source_word: קֶשֶׁת וְחִצִּים
  english_pob_choice: a bow and arrows
  chosen_spanish: un arco y flechas
  alternatives_spanish:
  - arco y flechas
  lexicon: HALOT
  rationale: Se conserva la repetición del objeto en la segunda mitad del versículo, como en el hebreo, sin reducirlo ni fusionarlo.
translation_notes:
  revision_awareness: 'La revisión inglesa eliminó la lectura alternativa «to him / for himself» en la segunda mitad por considerar que el hebreo no expresa allí movimiento explícito. En español, por eso no se agregó ningún complemento direccional ni reflexivo en la cláusula final; se siguió el hebreo llanamente: «Y él tomó un arco y flechas».'
  spanish_consistency_notes:
  - Se mantiene el nombre «Eliseo» como forma española estándar de אֱלִישָׁע.
  - Se preserva la repetición del objeto «un arco y flechas» en ambas mitades del versículo, reflejando la repetición hebrea.
  - No se usó «SEÑOR» ni terminología no presente en el texto; el versículo no contiene el nombre divino ni tensiones teológicas especiales.
