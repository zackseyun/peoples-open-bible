    issue: La nota [a] está anclada a la palabra equivocada.
    rationale: La nota ofrece alternativas para כְּכֹל תֹּעֲבוֹת הַגּוֹיִם ('como... abominaciones...', 'siguiendo... prácticas detestables...'), pero en el texto aparece sobre 'infidelidad', que corresponde a לִמְעָול מַעַל. Esto rompe la trazabilidad entre texto y nota.
  - severity: low
    issue: La puntuación con punto y coma antes de 'y contaminaron' suena innecesariamente rígida.
    rationale: El hebreo encadena acciones coordinadas; en español moderno una coma mantiene mejor el flujo sin perder dignidad ni precisión.
