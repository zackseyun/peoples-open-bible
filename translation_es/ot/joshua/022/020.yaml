  text: הֲ/ל֣וֹא עָכָ֣ן בֶּן זֶ֗רַח מָ֤עַל מַ֨עַל֙ בַּ/חֵ֔רֶם וְ/עַֽל כָּל עֲדַ֥ת יִשְׂרָאֵ֖ל הָ֣יָה קָ֑צֶף וְ/הוּא֙ אִ֣ישׁ אֶחָ֔ד לֹ֥א גָוַ֖ע בַּ/עֲוֺנֽ/וֹ׀־־־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/joshua/022/020.yaml
  text: Was it not Achan son of Zerah who acted unfaithfully in the matter of what was devoted to destruction[b][a], and wrath came upon all the congregation of Israel? And that man did not perish alone in his iniquity.
  footnotes:
  - marker: a
    text: Or, 'regarding the devoted things'; Hebrew חֵרֶם refers to what was placed under the ban, devoted to God for destruction.
    reason: lexical_alternative
  - marker: b
    text: Or, 'though he was one man, he did not perish alone in his iniquity.'
    reason: alternative_reading
