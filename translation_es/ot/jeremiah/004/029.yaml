  to: Al sonido del jinete y del arquero[a], toda ciudad huye[b]; se meten en los matorrales[c] y suben entre las peñas. Toda ciudad queda abandonada, y ningún hombre[d] habita en ellas.
  rationale: 'La revisión es menor: se mejora la naturalidad del español en la cláusula final, se hace más idiomática la acción de esconderse en los matorrales, y se limpian detalles editoriales en las notas. El sentido del hebreo y las decisiones documentadas del POB se conservan intactos.'
