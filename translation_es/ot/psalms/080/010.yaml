translation:
  language: es
  text: Tú despejaste el terreno[a] delante de ella, y echó raíces[b] y llenó el país[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "preparaste un lugar". El verbo hebreo puede expresar también la idea de hacer espacio o preparar el terreno delante de la vid.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, "echó sus raíces"; es una expresión hebrea que comunica que quedó firmemente establecida.
    reason: lexical_alternative
  - marker: c
    text: O "la tierra", según se entienda el alcance como más local o más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּנִּיתָ
  english_pob_choice: cleared
  chosen_spanish: despejaste el terreno
  alternatives_spanish:
  - preparaste un lugar
  - hiciste espacio
  lexicon: HALOT
  rationale: El verbo en piel comunica quitar obstáculos o dejar libre un espacio delante de la vid. En español, "despejaste el terreno" conserva la imagen agrícola y el valor causativo sin sonar mecánico.
- source_word: לְפָנֶיהָ
  english_pob_choice: before it
  chosen_spanish: delante de ella
  alternatives_spanish:
  - para ella
  - ante ella
  lexicon: HALOT
  rationale: El sufijo hebreo es femenino singular y se refiere a la vid. En español, "delante de ella" refleja con naturalidad la relación espacial del hebreo sin convertir la frase en explicación interpretativa.
- source_word: וַתַּשְׁרֵשׁ
  english_pob_choice: it took root
  chosen_spanish: echó raíces
  alternatives_spanish:
  - echó raíz
  - se arraigó
  lexicon: HALOT
  rationale: El verbo expresa que la planta se estableció firmemente. "Echó raíces" es una forma natural en español que preserva la idea de arraigo sin añadir intensidad no explícita en el hebreo.
- source_word: שָׁרָשֶׁיהָ
  english_pob_choice: root
  chosen_spanish: raíces
  alternatives_spanish:
  - raíz
  - raíces firmes
  lexicon: HALOT
  rationale: El hebreo dice literalmente "sus raíces"; en español el plural es el equivalente directo y mantiene la metáfora vegetal. No se requiere singularizarlo como idiomatismo obligatorio.
- source_word: וַתְּמַלֵּא
  english_pob_choice: filled
  chosen_spanish: llenó
  alternatives_spanish:
  - colmó
  - cubrió
  lexicon: HALOT
  rationale: '"Llenó" reproduce el valor básico de מלא y conserva la expansión de la imagen. "Cubrió" sería más interpretativo y no es necesario aquí.'
- source_word: אָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el suelo
  lexicon: HALOT
  rationale: En este contexto poético, "la tierra" comunica bien el alcance espacial del crecimiento. Se evita "el mundo" por ir más allá de la probable referencia metafórica del salmo.
theological_decisions:
- issue: Referente de la vid y alcance de la imagen
  english_pob_reading: Render the agricultural metaphor straightforwardly without making the national referent explicit in the verse itself.
  chosen_spanish_reading: Mantener la metáfora agrícola sin explicitar en el verso que la vid representa a Israel.
  alternative_spanish_readings:
  - Israel echó raíces y llenó la tierra
  - La vid de Israel echó raíces y llenó la tierra
  rationale: El contexto mayor del salmo identifica la vid con Israel, pero este hemistiquio se expresa en imagen poética. Conservar la metáfora sin ampliarla respeta la tensión interpretativa y evita introducir información explicativa ajena al hebreo inmediato.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente al no añadir intensificación como "profundamente". También evita resolver la imagen de la vid con una paráfrasis explícita, en línea con la lectura auditada en inglés.
  spanish_consistency_notes:
  - Se mantiene "la tierra" como opción amplia pero no mundializante, coherente con el hebreo אֶרֶץ y con el contexto del salmo.
  - '"Delante de ella" conserva el referente femenino del hebreo sin forzarlo a una adaptación teológica en el texto principal.'
  - Se usa un español natural de registro bíblico moderno, evitando el calco "y echó raíces sus raíces" que sería menos idiomático en español.
