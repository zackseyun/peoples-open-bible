review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en sus elementos principales: ''comieron'' deja implícito el objeto de ἐφάγοσαν; ''los hijos de Israel'' preserva οἱ υἱοὶ Ἰσραήλ; ''se habían apartado'' refleja adecuadamente χωρισθέντες con fuerza reflexiva; ''abominaciones'' mantiene βδελυγμάτων; y ''buscando a Yahvé'' representa ζητοῦντες τὸν κύριον con una decisión coherente con la política del proyecto sobre el nombre divino. La principal desalineación está en la nota [a]: el marcador se ancla a ''cautividad'', pero el contenido de la nota trata en parte del objeto implícito de ''comieron'', lo cual corresponde al verbo, no al sintagma nominal.'
  spanish_quality_summary: 'El español es claro y digno, pero ''los que eran de la cautividad'' suena algo forzado; ''los que venían de la cautividad'' o ''los que eran de la cautividad'' ambos pueden funcionar, pero el borrador actual sigue siendo inteligible. El problema real es de legibilidad editorial: la nota [a] mezcla dos asuntos distintos y queda mal anclada. Conviene conservar una sola nota [a] en ''comieron[a]'' para explicar el objeto implícito, ya que ese es el único punto que verdaderamente requiere aclaración. La nota [b] está bien formulada.'
  glossary_alignment: 'La terminología está mayormente alineada con el glosario del proyecto: ''Yahvé'' para el referente divino, ''abominaciones'' para βδελυγμάτων, y lenguaje de separación fuerte. No hay conflicto importante de glosario. La decisión de usar ''Yahvé'' para κύριον en este contexto es defendible bajo la política del proyecto.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada a 'cautividad', pero explica principalmente el objeto implícito de 'comieron'.
    rationale: Según el rastro POB, la nota inglesa [a] aclara que 'ate' se refiere a la comida de la Pascua. En español, esa nota debe ir en el verbo correspondiente, no en 'cautividad', para evitar confusión exegética y editorial.
  - severity: low
    issue: La nota [a] también redefine 'los que eran de la cautividad', aunque ese punto no necesita nota aquí.
    rationale: El contenido añadido sobre 'provenían de la cautividad' no corresponde a una ambigüedad que exija nota y mezcla dos explicaciones distintas en una sola nota.
  revised_spanish_text: Y comieron[a] los hijos de Israel, los que eran de la cautividad, todos los que se habían apartado de las abominaciones de las naciones de la tierra[b], buscando a Yahvé.
  revised_footnotes:
  - marker: a
    text: Es decir, comieron la comida de la Pascua; el objeto es implícito en el griego por el contexto precedente.
    reason: cross_reference
  - marker: b
    text: O 'de los pueblos de la tierra'. La expresión alude a los habitantes circundantes cuyas prácticas se consideraban contaminantes.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la ubicación y el contenido de la nota [a] para alinearla con el audit trail inglés y con el griego: la aclaración corresponde al verbo ''comieron'', no a ''cautividad''. El texto base español se mantiene sustancialmente igual porque es fiel y natural en lo demás.'
