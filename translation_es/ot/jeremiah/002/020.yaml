review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo y sigue de cerca la auditoría inglesa: liberación previa, rechazo de servir y acusación de prostitución idolátrica. Sin embargo, hay un problema importante en «Sí, sobre toda colina alta...»: el hebreo עַל aquí se expresa mejor en español como «en» y la locución estereotipada profética suena más natural como «en toda colina alta y bajo todo árbol frondoso». Además, «debajo de» es correcto pero menos idiomático que «bajo» en esta fórmula. El resto de las decisiones principales son defendibles, incluyendo «No serviré» y la conservación de la imagen explícita de prostitución.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «sobre toda colina alta» suena algo forzado y poco natural para el registro bíblico en español. «Te echabas como prostituta» transmite bien la imagen, aunque «te tendías» sería también posible; no exige corrección. Las notas son útiles, pero la nota b debería conservar de modo más explícito la literalidad hebrea «bajo todo árbol frondoso/verde» como fórmula profética, no solo la explicación cultural.
  glossary_alignment: No hay conflicto con los términos del proyecto. No aparece Yahvé en este versículo. La decisión «No serviré» concuerda con la racionalidad léxica documentada para עבד. La imagen de זֹנָה se mantiene explícita como «prostituta», en línea con la política teológica. «Coyundas» preserva bien la metáfora del yugo, aunque es algo técnico; sigue siendo aceptable.
  issues:
  - severity: medium
    issue: «sobre toda colina alta» es una preposición poco natural para עַל en esta fórmula profética
    rationale: Aunque literalmente posible, en español bíblico natural la expresión idiomática es «en toda colina alta» o «sobre cada colina elevada» solo en contextos específicos. Aquí «en» evita rigidez y preserva mejor la fórmula estereotipada de lugares de culto idolátrico.
  - severity: low
    issue: «debajo de todo árbol frondoso» puede mejorarse a «bajo todo árbol frondoso»
    rationale: Ambas opciones son correctas, pero «bajo» es más fluido y más habitual en español bíblico y literario para esta construcción paralela.
  - severity: low
    issue: La nota b omite la referencia literal a la fórmula hebrea
    rationale: La auditoría inglesa conserva explícitamente «under every green tree» como expresión fija. La nota española debería reflejar que se trata de la fórmula hebrea literal asociada a culto idolátrico, no solo su explicación interpretativa.
