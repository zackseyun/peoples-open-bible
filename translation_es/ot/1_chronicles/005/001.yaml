base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/005/001.yaml
  text: Now the sons of Reuben[a], the firstborn of Israel—for he was the firstborn, but because he defiled his father’s bed, his birthright was given to the sons of Joseph son of Israel[b], though not to be enrolled by birthright—
  footnotes:
  - marker: a
    text: Or, 'his father’s couch.' The Hebrew is literally plural ('beds/couches'), an idiom for the marriage bed.
    reason: lexical_alternative
  - marker: b
    text: Or, 'but not to be reckoned in the genealogy according to the birthright.' The clause indicates that the birthright passed to Joseph’s sons without making them the genealogically listed firstborn.
    reason: alternative_reading
