translation:
  language: es
  text: Los bendijo para siempre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos testigos marginales añaden: «con una bendición pura y santa».'
    reason: textual_variant
lexical_decisions:
- source_word: ηυλογησεν
  english_pob_choice: He blessed
  chosen_spanish: Los bendijo
  alternatives_spanish:
  - Los dio su bendición
  - Los bendijo con una bendición
  lexicon: BDAG
  rationale: El aoristo de εὐλογέω en este contexto narrativo se traduce con naturalidad como «bendijo». El objeto implícito se expresa en español con «los» para hacer explícita la referencia a las personas presentes, como hace el inglés POB con «them».
- source_word: τους αιωνας
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: La expresión temporal de duración continua en lenguaje de bendición se vierte de manera idiomática en español como «para siempre». «Por los siglos» sería más literal, pero menos natural en esta línea breve.
theological_decisions:
- issue: Lectura breve de la bendición frente a variantes amplificadas
  english_pob_reading: 'Translate the extant short Greek wording as a simple enduring blessing: ''He blessed them forever.'''
  chosen_spanish_reading: 'Traducir la forma breve conservada: «Los bendijo para siempre».'
  alternative_spanish_readings:
  - Los bendijo por los siglos.
  - Los bendijo con una bendición pura y santa, para siempre.
  rationale: El texto base griego transmitido es muy breve. Las ampliaciones marginales que añaden «pura y santa» deben mantenerse aparte, no incorporarse silenciosamente al cuerpo del versículo. La traducción principal conserva la duración indefinida sin resolver las variantes en el texto principal.
  doctrine_reference: Preservar las variantes textuales en nota, no fusionarlas con el texto base.
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó «all» porque πάντες aparece solo en testigos variantes y no pertenece al texto principal. Por eso el español no introduce ningún equivalente de «todos», y sigue la lectura breve del griego base.
  spanish_consistency_notes:
  - Se mantiene «bendijo» para εὐλογέω en sentido narrativo.
  - Se evita «SEÑOR» o fórmulas litúrgicas no presentes en el griego.
  - La nota conserva la variante textual con un marcador único, sin mezclarla en el texto principal.
