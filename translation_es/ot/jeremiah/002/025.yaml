translation:
  language: es
  text: 'Guarda tus pies de quedar descalzos y tu garganta de la sed. Pero dijiste[a]: «¡No hay esperanza! No, porque he amado a extraños, y tras ellos iré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «forasteros». En este contexto puede referirse metafóricamente a dioses extranjeros, amantes extranjeros o naciones/alianzas extranjeras.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְעִי
  english_pob_choice: Keep ... from
  chosen_spanish: Retén ... de
  alternatives_spanish:
  - Impide ... de
  - Aguarda ... de
  lexicon: HALOT
  rationale: El imperativo femenino singular pide una orden directa a Judá personificada. «Retén ... de» conserva la fuerza prohibitiva y suena natural en español sin perder el valor de restricción.
- source_word: רַגְלֵךְ
  english_pob_choice: your feet
  chosen_spanish: tus pies
  alternatives_spanish:
  - tu pie
  - tus pasos
  lexicon: HALOT
  rationale: 'Aunque el hebreo usa singular con sufijo de 2ª femenina, el sentido colectivo en español se expresa mejor con plural: «tus pies». Mantiene la imagen del avance fatigado.'
- source_word: מִיָּחֵף
  english_pob_choice: from going unshod
  chosen_spanish: de andar descalzos
  alternatives_spanish:
  - de ir descalza
  - de estar descalza
  lexicon: HALOT
  rationale: «Descalzos» comunica la imagen concreta de ir sin calzado; con el plural de «pies» resulta idiomático en español y conserva el cuadro de desgaste por el camino.
- source_word: וְגֹרֹנֵךְ
  english_pob_choice: and your throat
  chosen_spanish: tu garganta
  alternatives_spanish:
  - tu cuello
  - tu garganta y cuello
  lexicon: HALOT
  rationale: El contexto con la sed apunta claramente a «garganta». Es más preciso que «cuello» y mantiene la fuerza corporal de la expresión hebrea.
- source_word: מִצִּמְאָה
  english_pob_choice: from thirst
  chosen_spanish: de la sed
  alternatives_spanish:
  - de tener sed
  - de la sequedad
  lexicon: HALOT
  rationale: El sustantivo hebreo se refleja directamente con «sed». Es la forma más clara y fiel en español.
- source_word: נוֹאָשׁ
  english_pob_choice: It is hopeless
  chosen_spanish: ¡Es desesperante!
  alternatives_spanish:
  - ¡No hay esperanza!
  - ¡Es inútil!
  lexicon: HALOT
  rationale: La forma expresa resignación y desesperanza. «Desesperante» preserva el tono emocional del rechazo sin volverlo excesivamente explicativo.
- source_word: לֹא
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - ¡No!
  - De ninguna manera
  lexicon: HALOT
  rationale: Aquí funciona como rechazo enfático de la advertencia anterior. «No» conserva brevedad e intensidad.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la respuesta rebelde de Judá. «Porque» hace explícita la relación causal en español.
- source_word: אָהַבְתִּי
  english_pob_choice: I have loved
  chosen_spanish: he amado
  alternatives_spanish:
  - he querido
  - amo
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una disposición ya asumida. «He amado» conserva el aspecto y la fuerza volitiva/afectiva del verbo.
- source_word: זָרִים
  english_pob_choice: strangers
  chosen_spanish: a extraños
  alternatives_spanish:
  - a forasteros
  - a extranjeros
  lexicon: HALOT
  rationale: «Extraños» preserva la amplitud metafórica sin reducir de antemano el referente a personas, dioses o alianzas. Mantiene la tensión interpretativa documentada por POB.
- source_word: וְאַחֲרֵיהֶם אֵלֵךְ
  english_pob_choice: and after them I will go
  chosen_spanish: y tras ellos iré
  alternatives_spanish:
  - y detrás de ellos iré
  - y los seguiré
  lexicon: HALOT
  rationale: «Tras ellos iré» reproduce el orden y la idea de seguir detrás de los objetos deseados. «Tras» es breve y literario sin volverse arcaico.
theological_decisions:
- issue: Alcance de זָרִים en la metáfora de adulterio espiritual
  english_pob_reading: Retain the broader metaphorical term 'strangers' in the main text, allowing it to encompass foreign gods and possibly foreign nations/allies.
  chosen_spanish_reading: Conservar «extraños» en el texto principal, permitiendo que abarque dioses extranjeros, amantes extranjeros o incluso naciones/alianzas extranjeras.
  alternative_spanish_readings:
  - dioses extranjeros
  - forasteros
  - naciones extranjeras o alianzas
  rationale: El contexto de Jeremías mezcla imaginería matrimonial e idolátrica. Traducir de forma más específica resolvería prematuramente una tensión que el texto deja abierta; «extraños» mantiene la ambigüedad productiva.
  doctrine_reference: Preservar la tensión teológica y metafórica en lugar de cerrarla por adelantado.
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando el marcador de nota [a] directamente en el texto español junto a «dijiste», de modo que la nota de alternativa léxica quede anclada correctamente. Se mantuvo la lectura amplia de זָרִים conforme al audit trail en inglés.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «extraños» y no un término más estrecho para no resolver la ambigüedad metafórica del hebreo.
  - Se mantuvo un registro sobrio y publicable, evitando calcos excesivamente literales donde el español natural exige ajuste sintáctico.
