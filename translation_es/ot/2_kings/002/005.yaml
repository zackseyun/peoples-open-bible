translation:
  language: es
  text: 'Entonces los hijos de los profetas que estaban en Jericó se acercaron a Eliseo y le dijeron[a]: «¿Sabes que hoy Yahvé está quitando a tu amo de sobre tu cabeza?» Y él dijo: «Yo también lo sé; guarden silencio».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de estar sobre ti»; el hebreo dice literalmente «de sobre tu cabeza», un modismo para la remoción de quien está en autoridad sobre otro.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי הַנְּבִיאִים
  english_pob_choice: the sons of the prophets
  chosen_spanish: los hijos de los profetas
  alternatives_spanish:
  - los discípulos de los profetas
  - la comunidad profética
  lexicon: HALOT
  rationale: La expresión hebrea se conserva de manera transparente; «hijos de los profetas» refleja el idiomismo sin interpretar de más el grupo.
- source_word: וַיִּגְּשׁוּ
  english_pob_choice: came near
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se aproximaron
  - vinieron cerca
  lexicon: HALOT
  rationale: «Se acercaron» es un español natural y conserva el movimiento hacia Eliseo sin volverlo más interpretativo que el hebreo.
- source_word: אֲשֶׁר בִּירִיחוֹ
  english_pob_choice: who were at Jericho
  chosen_spanish: que estaban en Jericó
  alternatives_spanish:
  - que vivían en Jericó
  - de Jericó
  lexicon: HALOT
  rationale: «Estaban en Jericó» expresa la localización del grupo de forma idiomática en español.
- source_word: הֲיָדַעְתָּ
  english_pob_choice: Do you know
  chosen_spanish: ¿Sabes
  alternatives_spanish:
  - ¿Te has dado cuenta de
  - ¿Estás consciente de
  lexicon: HALOT
  rationale: En contexto, la pregunta expresa conocimiento presente; «¿Sabes?» mantiene la fuerza interrogativa natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue la política del proyecto para el Tetragrámaton: «Yahvé» en español, conservando el nombre propio divino y evitando la sustitución por un título.'
- source_word: לֹקֵחַ
  english_pob_choice: is taking
  chosen_spanish: está quitando
  alternatives_spanish:
  - está tomando
  - va a quitar
  lexicon: HALOT
  rationale: El participio expresa una acción en curso o inminente; «está quitando» conserva la inmediatez del hebreo y suena natural en español.
- source_word: אֲדֹנֶיךָ
  english_pob_choice: your master
  chosen_spanish: tu señor
  alternatives_spanish:
  - tu amo
  - tu maestro
  lexicon: HALOT
  rationale: En este contexto relacional humano, «señor» comunica la relación de superioridad/respetabilidad con naturalidad en español bíblico, sin cargar el término con el valor teológico de «Señor».
- source_word: מֵעַל רֹאשֶׁךָ
  english_pob_choice: from over your head
  chosen_spanish: de sobre tu cabeza
  alternatives_spanish:
  - de encima de ti
  - de encima de tu cabeza
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo, que puede aludir idiomáticamente a la remoción de una autoridad; no se resuelve esa tensión en el texto principal.
- source_word: גַּם אֲנִי יָדַעְתִּי
  english_pob_choice: I also know
  chosen_spanish: Yo también lo sé
  alternatives_spanish:
  - También yo lo sé
  - Sí, también lo sé
  lexicon: HALOT
  rationale: La forma española mantiene el énfasis de גַּם + pronombre explícito y suena natural en el diálogo.
- source_word: הֶחֱשׁוּ
  english_pob_choice: be silent
  chosen_spanish: callaos
  alternatives_spanish:
  - callad
  - estad en silencio
  lexicon: HALOT
  rationale: El imperativo plural breve reproduce la tersura y autoridad de la orden de Eliseo. Se elige la forma de tratamiento plural que mejor encaja con el diálogo bíblico.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: La lectura del POB en inglés preserva el nombre divino; en español, «Yahvé» es la forma establecida por la política del proyecto y mantiene el valor del Tetragrámaton como nombre propio, no como título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Expresión idiomática מֵעַל רֹאשֶׁךָ
  english_pob_reading: retain the concrete expression 'from over your head' in the main text
  chosen_spanish_reading: conservar «de sobre tu cabeza» en el texto principal
  alternative_spanish_readings:
  - de encima de ti
  - de sobre ti
  - removiendo a tu autoridad
  rationale: Se mantiene la imagen concreta y la posible tensión idiomática, tal como hace la edición inglesa, para no cerrar prematuramente si la frase alude al retiro físico de Elías o a su autoridad sobre Eliseo.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se tuvo en cuenta el control de revisión más reciente, que indica acuerdo alto y sin cambios pendientes; por eso la redacción sigue de cerca el texto hebreo y la auditoría inglesa sin introducir reinterpretaciones nuevas.
  spanish_consistency_notes:
  - Se preserva «Yahvé» de acuerdo con la terminología base del proyecto.
  - «Hijos de los profetas» mantiene la idiomaticidad hebrea en vez de sustituirla por una paráfrasis explicativa.
  - La nota al pie conserva la tensión semántica de מֵעַל רֹאשֶׁךָ sin resolverla en el cuerpo del texto.
  - «Callaos» reproduce el imperativo plural breve del hebreo y el tono directo de Eliseo.
