  text: כֹּ֡ל אֲשֶׁר֩ נִשְׁמַת ר֨וּחַ חַיִּ֜ים בְּ/אַפָּ֗י/ו מִ/כֹּ֛ל אֲשֶׁ֥ר בֶּ/חָֽרָבָ֖ה מֵֽתוּ־׃
