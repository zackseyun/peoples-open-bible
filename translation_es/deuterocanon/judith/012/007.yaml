    text: Or 'ravine' or 'gorge' for 'valley.'
    reason: lexical_alternative
  - marker: b
    text: The Greek verb here is the same root later used for 'baptize'; in this context it refers to washing or bathing, not Christian baptism.
    reason: lexical_alternative
