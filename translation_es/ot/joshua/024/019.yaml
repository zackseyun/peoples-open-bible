base_translation:
  language: en
  yaml_path: translation/ot/joshua/024/019.yaml
  text: And Joshua said to the people[a], “You are not able to serve Yahweh, for he is a holy God; he is a jealous God[b]. He will not forgive your transgressions and your sins.”
  footnotes:
  - marker: a
    text: 'Hebrew: ''holy God,'' with plural morphology in the words for ''God'' and ''holy'' but singular sense: literally, ''Gods holy he.'' The singular pronoun shows the reference is to the one God of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'He will not bear/carry away your transgressions and your sins.' The Hebrew idiom is commonly used for forgiveness.
    reason: alternative_reading
