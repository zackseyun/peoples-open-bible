translation:
  language: es
  text: Y libró muchas guerras, y se apoderó de fortalezas, y masacró a reyes,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συνεστήσατο
  english_pob_choice: waged
  chosen_spanish: emprendió
  alternatives_spanish:
  - hizo
  - libró
  - entabló
  lexicon: LSJ
  rationale: En esta construcción con πολέμους, el verbo expresa que se dedicó a hacer o llevar a cabo guerras. 'Emprendió' conserva el valor de iniciar y sostener acciones bélicas sin sonar forzado en español.
- source_word: πολέμους πολλούς
  english_pob_choice: many wars
  chosen_spanish: muchas guerras
  alternatives_spanish:
  - muchas campañas
  - muchos combates
  lexicon: LSJ
  rationale: πόλεμος en plural se refiere a conflictos bélicos amplios; 'guerras' es el equivalente más directo y no reduce indebidamente el alcance a batallas aisladas.
- source_word: ἐκράτησεν
  english_pob_choice: seized
  chosen_spanish: se apoderó de
  alternatives_spanish:
  - tomó
  - capturó
  - ganó control de
  lexicon: LSJ
  rationale: κρατέω aquí implica obtener dominio o posesión por la fuerza. 'Se apoderó de' comunica mejor esa toma violenta que un simple 'tomó'.
- source_word: ὀχυρωμάτων
  english_pob_choice: strongholds
  chosen_spanish: fortalezas
  alternatives_spanish:
  - fortificaciones
  - plazas fuertes
  - lugares fortificados
  lexicon: LSJ
  rationale: ὀχύρωμα designa un lugar fortificado. 'Fortalezas' es natural en español y mantiene la idea de posición militar defendida.
- source_word: ἔσφαξεν
  english_pob_choice: slaughtered
  chosen_spanish: masacró
  alternatives_spanish:
  - degolló
  - mató
  - sacrificó
  lexicon: LSJ
  rationale: σφάζω es un verbo fuerte de matanza violenta. 'Masacró' preserva esa crudeza y la intensidad del acto mejor que 'mató'.
- source_word: βασιλεῖς
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - monarcas
  - gobernantes
  lexicon: LSJ
  rationale: 'El sustantivo es específico: ''reyes''. Mantenerlo evita diluir el título político presente en el griego.'
translation_notes:
  revision_awareness: La revisión más reciente indica que el texto base quedó sin cambios y con alta concordancia; por ello, la versión española sigue de cerca el sentido del griego sin necesidad de introducir variantes explicativas.
