  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: 'si fideles pro carissimis. [Et respondit ad me et dixit: quoniam inueniisti gratiam ante oculos meos, et hoc demonstrabo tibi: dies iudicii dies decretorius est, et omnibus signaculum ueritatis ostendet; quemadmodum enim non mittit pater filium, uel filius patrem, uel dominus seruum], uel fidus carissimum, ut pro'
  language: Latin
translation:
  text: 'And he answered me and said[a], “Because you have found favor before my eyes, I will show you this also: the day of judgment is a decisive day and will display to all the seal of truth. For just as a father does not send a son, or a son a father, or a master a slave, or a friend a beloved one[b], to speak on his behalf in the judgment'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Part of this verse belongs to the restored fragment absent from most medieval Latin manuscripts. The examples stress personal non-transferability in ordinary life as an analogy for the final judgment.
    reason: recovered_fragment
    anchor_ref: 7:104
  - marker: b
    text: Or 'and displays to all the seal of truth. For just as now a father'.
    reason: previous_rendering
