translation:
  language: es
  text: Y temieron mucho, porque Gabaón era una ciudad grande, como una de las ciudades reales, y porque era más grande que Hai, y todos sus hombres eran poderosos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos sus hombres eran guerreros valientes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּֽירְאוּ
  english_pob_choice: they feared
  chosen_spanish: temieron
  alternatives_spanish:
  - tuvieron miedo
  - temían
  lexicon: HALOT
  rationale: El hebreo expresa temor real en narrativa; «temieron» conserva el verbo y el avance narrativo. «Tuvieron miedo» sería más explicativo, pero menos compacto.
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: mucho
  alternatives_spanish:
  - grandemente
  - en gran manera
  lexicon: HALOT
  rationale: Como intensificador adverbial, «mucho» suena natural en español con «temieron» y evita un giro demasiado marcado.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa del temor; «porque» preserva la relación causal de manera clara.
- source_word: עִיר גְּדוֹלָה
  english_pob_choice: a great city
  chosen_spanish: una ciudad grande
  alternatives_spanish:
  - una ciudad importante
  - una ciudad magnífica
  lexicon: HALOT
  rationale: Aquí גָּדוֹל describe tamaño y/o importancia. «Ciudad grande» mantiene esa amplitud sin restringir el sentido a lo meramente físico ni introducir una valoración más interpretativa.
- source_word: גִּבְעוֹן
  english_pob_choice: Gibeon
  chosen_spanish: Gabaón
  alternatives_spanish:
  - Gibeón
  - Givón
  lexicon: uso bíblico tradicional en español
  rationale: Se usa la forma bíblica asentada en español «Gabaón», más reconocible para lectores de iglesia que una transliteración más literal.
- source_word: כְּאַחַת עָרֵי הַמַּמְלָכָה
  english_pob_choice: like one of the royal cities
  chosen_spanish: como una de las ciudades reales
  alternatives_spanish:
  - como una de las ciudades del reino
  - como una ciudad de la realeza
  lexicon: HALOT
  rationale: La comparación apunta a una ciudad de rango real o perteneciente a un reino. «Ciudades reales» conserva la fuerza de estatus y la cadencia del hebreo sin volverlo mecánico.
- source_word: וְכִי
  english_pob_choice: and because
  chosen_spanish: y porque
  alternatives_spanish:
  - y que
  - y pues
  lexicon: HALOT
  rationale: Mantiene el paralelismo causal de la frase hebrea y evita una subordinación más pesada.
- source_word: הִיא גְדוֹלָה מִן הָעַי
  english_pob_choice: it was greater than Ai
  chosen_spanish: era más grande que Hai
  alternatives_spanish:
  - era mayor que Hai
  - era más importante que Hai
  lexicon: HALOT
  rationale: «Más grande» reproduce el comparativo de גָּדוֹל con naturalidad en español. «Hai» sigue la forma castellana tradicional del topónimo.
- source_word: וְכָל אֲנָשֶׁיָהָ גִּבֹּרִים
  english_pob_choice: and all its men were mighty
  chosen_spanish: y todos sus hombres eran valientes
  alternatives_spanish:
  - y todos sus hombres eran poderosos
  - y todos sus hombres eran guerreros valientes
  lexicon: HALOT
  rationale: אֲנָשִׁים aquí se refiere al grupo masculino apto para la guerra; «hombres» conserva ese matiz. «Valientes» traduce bien גִּבֹּרִים en este contexto militar sin redundar en «guerreros».
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo y el audit trail inglés. No se detectaron revisiones posteriores que exigieran ajustes; la traducción mantiene la estructura causal doble y la comparación de estatus/tamaño de Gabaón frente a Hai.
  spanish_consistency_notes:
  - Se preservó el paralelismo de las dos cláusulas causales con «porque... y porque...».
  - 'Se mantuvo una terminología bíblica natural en español para los topónimos: Gabaón y Hai.'
  - «Ciudades reales» se eligió para reflejar el rango del hebreo sin convertir la frase en una paráfrasis interpretativa.
