translation:
  language: es
  text: 'Y todos los que queden en tu casa vendrán a postrarse ante él por una moneda de plata y una hogaza de pan[a], y dirán: «Por favor, incorpórame[b] a una de las funciones sacerdotales, para que pueda comer un pedacito de pan».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por una pequeña moneda de plata»; el hebreo nombra una unidad pequeña de plata.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «úneme a una de las funciones sacerdotales». El verbo hebreo también puede expresarse como «adjuntar», «agregar» o «adherir».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנּוֹתָר
  english_pob_choice: left
  chosen_spanish: los que queden
  alternatives_spanish:
  - los restantes
  - los sobrevivientes
  lexicon: HALOT
  rationale: El participio expresa a los que permanecen después del juicio sobre la casa de Elí. En español, «los que queden» comunica con naturalidad esa idea de remanente sin perder el sentido de supervivencia implícito.
- source_word: בְּבֵיתְךָ
  english_pob_choice: in your house
  chosen_spanish: en tu casa
  alternatives_spanish:
  - de tu casa
  - en tu hogar
  lexicon: HALOT
  rationale: «Casa» conserva el valor dinástico/familiar del hebreo, no solo el de edificio. «En tu casa» resulta fiel y natural en español.
- source_word: לְהִשְׁתַּחֲוֺת לוֹ
  english_pob_choice: to bow down to him
  chosen_spanish: a postrarse ante él
  alternatives_spanish:
  - a inclinarse ante él
  - a arrodillarse ante él
  lexicon: HALOT
  rationale: El verbo puede implicar postración física y rendición respetuosa. «Postrarse ante él» preserva mejor la fuerza corporal y social que un simple «inclinarse».
- source_word: לַאֲגֹרַת כֶּסֶף
  english_pob_choice: for a piece of silver
  chosen_spanish: por una moneda de plata
  alternatives_spanish:
  - por un pedazo de plata
  - por una pequeña pieza de plata
  lexicon: HALOT
  rationale: אֲגוֹרָה es una unidad pequeña de valor. «Moneda de plata» expresa la idea monetaria sin introducir un tecnicismo poco transparente para el lector en español.
- source_word: כִּכַּר לָחֶם
  english_pob_choice: a loaf of bread
  chosen_spanish: un pan de pan
  alternatives_spanish:
  - una hogaza de pan
  - un pan redondo
  lexicon: HALOT
  rationale: כִּכָּר puede designar un pan redondo o una unidad de pan. Sin un equivalente directo y breve perfectamente natural, se optó por mantener el sustantivo «pan» con el artículo para conservar la imagen literal del hebreo, aunque la expresión sigue siendo algo marcada.
- source_word: סְפָחֵנִי
  english_pob_choice: attach me
  chosen_spanish: úneme
  alternatives_spanish:
  - atráeme
  - incorpórame
  lexicon: HALOT
  rationale: El verbo comunica ser añadido o adherido a un grupo o función. «Úneme» refleja esa petición de ser incorporado a un puesto sacerdotal sin sonar demasiado técnico.
- source_word: נָא
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - te ruego
  - te pido
  lexicon: HALOT
  rationale: Marca ruego o súplica; «Por favor» es la equivalencia moderna más natural en español.
- source_word: אַחַת הַכְּהֻנּוֹת
  english_pob_choice: one of the priestly offices
  chosen_spanish: una de las funciones sacerdotales
  alternatives_spanish:
  - uno de los oficios sacerdotales
  - uno de los cargos sacerdotales
  - una de las labores sacerdotales
  lexicon: HALOT
  rationale: El plural de כְּהֻנָּה aquí puede aludir a funciones o cargos sacerdotales más que a un “sacerdocio” abstracto. «Funciones sacerdotales» preserva la pluralidad y evita fijar indebidamente un sentido institucional más rígido.
- source_word: לֶאֱכֹל פַּת לָחֶם
  english_pob_choice: so that I may eat a morsel of bread
  chosen_spanish: para que pueda comer un pedacito de pan
  alternatives_spanish:
  - para comer un trozo de pan
  - para comer un bocado de pan
  lexicon: HALOT
  rationale: פַּת es una porción pequeña o bocado. «Pedacito de pan» conserva la humildad y escasez de la petición, con un español claro y fluido.
theological_decisions:
- issue: Referencia del «él» ante quien se postrarán
  english_pob_reading: The pronoun refers to the acting priestly authority before whom Eli's surviving descendants will humble themselves.
  chosen_spanish_reading: El pronombre se mantiene como «él», sin especificar más, para conservar la humillación ante la autoridad sacerdotal vigente.
  alternative_spanish_readings:
  - ante quien
  - ante él, es decir, el sacerdote de entonces
  - ante el que ejerza la autoridad sacerdotal
  rationale: 'El hebreo presenta una inversión de estatus: los sobrevivientes de la casa de Elí se postrarán ante la autoridad sacerdotal. En español conviene mantener la referencia singular sin sobreexplicarla en el texto principal.'
  doctrine_reference: 1 Samuel 2:36; reversible humillación de la casa de Elí
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el criterio revisado del POB en inglés para סְפָחֵנִי como «attach me»; en español se prefirió «úneme» para conservar la idea de ser incorporado a una función. Se mantuvo la nota alternativa sobre la pequeña unidad de plata y se amplió en español la ambigüedad de כְּהֻנּוֹת como funciones/cargos sacerdotales.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; en este versículo no aplica.
  - Se mantiene «casa» para el valor dinástico de בַּיִת.
  - «Postrarse» se reserva para gestos de sumisión o reverencia física fuerte.
  - «Funciones sacerdotales» evita imponer de entrada un matiz doctrinal más estrecho que el hebreo plural.
  - La imagen final de «pedacito de pan» busca reflejar la escasez y el tono humillante de la súplica.
