review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo y del rastro POB inglés: pregunta-respuesta visionaria, preservación de «veo», mantenimiento de «y he aquí», énfasis de «todo de oro», repetición literal «siete y siete» y destino de los conductos hacia las lámparas. Sin embargo, hay ajustes menores necesarios para una representación más natural y fiel en español: «candelabro» puede sugerir velas más que lámparas, mientras que «candelero» o «soporte de lámparas» encaja mejor con מְנוֹרָה; además, la repetición de «de él» suena torpe donde el español puede usar «encima» o «arriba» sin perder referencia.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero tiene giros algo rígidos: «respondí» añade un matiz no exigido por ויאמר; «encima de él ... sobre él ... en la parte superior de él» repite una construcción poco idiomática. Una revisión ligera mejora la fluidez sin apartarse del original. «Copa» funciona, y «conductos» es aceptable, aunque «tubos» también sería natural.'
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. La decisión más relevante es מְנוֹרָה: conviene evitar «candelabro» en el texto principal por posible asociación con velas; «candelero» preserva mejor el referente cultual tradicional y el soporte de lámparas. Las notas léxicas están bien orientadas, pero deben ajustarse al término principal revisado.'
  issues:
  - severity: medium
    issue: «candelabro» para מְנוֹרָה en el texto principal
    rationale: Aunque comprensible, en español común suele asociarse a velas. Dado que el versículo menciona explícitamente «lámparas», «candelero» armoniza mejor con el objeto descrito y con el uso bíblico tradicional inteligible.
  - severity: low
    issue: «respondí» añade matiz no presente en ויאמר
    rationale: El hebreo simplemente repite «y dije». «Respondí» no distorsiona gravemente, pero sí interpreta la función del habla. «Y dije» es más cercano y suficiente.
  - severity: low
    issue: Repetición poco natural de «de él»
    rationale: «Encima de él ... sobre él ... en la parte superior de él» resulta pesada en español. Puede simplificarse a «encima» y «arriba», manteniendo la referencia al candelero.
