translation:
  language: es
  text: 'Por tanto, yo te doy este mandato, diciendo: «Apartarás tres ciudades para ti».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «designarás tres ciudades para ti». El verbo hebreo puede significar «separar», «apartar» o, en este contexto, «designar».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: La frase introduce una conclusión lógica. «Por tanto» conserva con naturalidad el valor inferencial de la construcción hebrea sin añadir interpretación extra.
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. En español, el sujeto explícito «yo» basta para reflejar esa prominencia sin sobretraducirla con un reflexivo enfático.
- source_word: מְצַוְּךָ
  english_pob_choice: am commanding you
  chosen_spanish: te mando
  alternatives_spanish:
  - te estoy mandando
  - te ordeno
  - te doy este mandato
  lexicon: HALOT
  rationale: El participio con sufijo expresa una acción directiva en curso. «Te mando» comunica con claridad la fuerza imperativa de צוה en un registro bíblico natural en español; «te ordeno» sería más duro, y «te estoy mandando» resultaría menos idiomático.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dice
  - así
  lexicon: HALOT
  rationale: La fórmula quotativa introduce el contenido de la orden. «Diciendo» mantiene visible la estructura del hebreo y es plenamente natural en español bíblico.
- source_word: שָׁלֹשׁ עָרִים
  english_pob_choice: three cities
  chosen_spanish: tres ciudades
  alternatives_spanish:
  - tres poblaciones
  - tres ciudades de refugio
  lexicon: HALOT
  rationale: La combinación numeral + sustantivo es directa. No se añade «de refugio» porque el hebreo de este versículo solo dice «ciudades»; esa especificación viene por contexto, no por el enunciado inmediato.
- source_word: תַּבְדִּיל
  english_pob_choice: shall set apart
  chosen_spanish: apartarás
  alternatives_spanish:
  - separarás
  - designarás
  - pondrás aparte
  lexicon: HALOT
  rationale: El verbo en hifil puede significar separar o apartar; en este contexto jurídico, «apartarás» conserva la idea de separar para un uso especial sin convertirla de inmediato en un término más abstracto como «designarás».
- source_word: לָךְ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para vosotros
  - para ti mismo
  lexicon: HALOT
  rationale: El sufijo de segunda persona singular se refleja de forma transparente con «para ti». Aunque el destinatario es corporativo, el hebreo conserva el singular del discurso pactual.
theological_decisions:
- issue: Tratamiento del singular singular pactual en un mandato comunitario
  english_pob_reading: Render as singular 'you' without converting to plural or adding interpretive explanation in the main text.
  chosen_spanish_reading: Mantener el singular «te / ti» en el texto principal.
  alternative_spanish_readings:
  - 'Convertir a plural: «les mando»'
  - 'Usar una construcción impersonal: «deben apartarse tres ciudades»'
  rationale: El hebreo dirige la ley a Israel en singular, conservando el estilo pactual directo. El español mantiene esa forma sin despersonalizarla ni pluralizarla artificialmente.
  doctrine_reference: Principio de consistencia formal con atención a la forma del destinatario en el texto fuente
- issue: Valor jurídico de בדל en el contexto de ciudades de refugio
  english_pob_reading: shall set apart
  chosen_spanish_reading: apartarás
  alternative_spanish_readings:
  - designarás
  - separarás
  rationale: «Apartar» conserva simultáneamente la idea de separación material y de destinación oficial. «Designar» expresa bien la función, pero atenúa la imagen concreta de separar algo para un uso específico.
  doctrine_reference: 'Contexto legal de Deuteronomio 19: establecimiento de ciudades de refugio'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente hebreo y la decisión auditada en inglés: conserva la conclusión lógica, el sujeto enfático, la fórmula quotativa y el verbo jurídico con una opción española que mantiene la tensión entre separar y designar. No hay revisiones previas registradas en el caso fuente.'
  spanish_consistency_notes:
  - Se usa «Dios / Yahvé» según corresponda en otros contextos; aquí no aparece ningún nombre divino.
  - Se mantiene el singular pactual («te», «ti») por fidelidad a la forma hebrea.
  - El orden y la puntuación reflejan un estilo bíblico claro en español sin depender de calcos innecesarios.
  - La nota de pie marca la alternativa léxica principal porque el verbo admite más de una matización legítima en contexto.
