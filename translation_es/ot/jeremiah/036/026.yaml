translation:
  language: es
  text: Entonces el rey mandó a Jerameel, hijo del rey[a], y a Seraías, hijo de Azriel, y a Selemías, hijo de Abdeel, prender a Baruc el escriba y a Jeremías el profeta; pero Yahvé los ocultó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «tomar». Aquí el sentido es el de aprehender o prender a los dos hombres.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַוֶּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio la orden de
  lexicon: HALOT
  rationale: El hebreo expresa una orden autoritativa del rey. En español, "mandó" comunica con naturalidad ese carácter sin sonar más duro de lo que exige el contexto.
- source_word: יְרַחְמְאֵל בֶּן הַמֶּלֶךְ
  english_pob_choice: Jerahmeel the king’s son
  chosen_spanish: Jerameel, hijo del rey
  alternatives_spanish:
  - Jerameel, el príncipe
  - Jerameel, hijo real
  lexicon: HALOT
  rationale: Se conserva la relación filial explícita del hebreo. "Hijo del rey" es más directo que "príncipe" y evita sustituir la forma del texto por un título interpretativo.
- source_word: שְׂרָיָהוּ בֶן עַזְרִיאֵל
  english_pob_choice: Seraiah son of Azriel
  chosen_spanish: Seraías hijo de Azriel
  alternatives_spanish:
  - Seraías, hijo de Azriel
  lexicon: HALOT
  rationale: Los nombres propios se transliteran de manera estable. La construcción genealógica se mantiene con "hijo de" para reflejar con claridad la identificación patronímica.
- source_word: שֶׁלֶמְיָהוּ בֶּן עַבְדְּאֵל
  english_pob_choice: Shelemiah son of Abdeel
  chosen_spanish: Selemías hijo de Abdeel
  alternatives_spanish:
  - Selemías, hijo de Abdeel
  lexicon: HALOT
  rationale: Se conserva la transliteración del nombre y la relación patronímica literal, como en el hebreo.
- source_word: לָקַחַת
  english_pob_choice: to seize
  chosen_spanish: para que se apoderaran de
  alternatives_spanish:
  - para apresarlos
  - para capturar
  - para que los prendieran
  lexicon: HALOT
  rationale: El sentido aquí es hostil y coercitivo. "Apoderarse de" comunica la intención de capturarlos sin introducir una categoría legal moderna como "arrestar".
- source_word: בָּרוּךְ הַסֹּפֵר
  english_pob_choice: Baruch the scribe
  chosen_spanish: Baruc el escriba
  alternatives_spanish:
  - Baruc el secretario
  lexicon: HALOT
  rationale: '"Escriba" refleja el valor textual y literario de סֹפֵר en este contexto profético. "Secretario" es posible, pero menos transparente para la función del personaje en el pasaje.'
- source_word: יִרְמְיָהוּ הַנָּבִיא
  english_pob_choice: Jeremiah the prophet
  chosen_spanish: Jeremías el profeta
  alternatives_spanish:
  - el profeta Jeremías
  lexicon: HALOT
  rationale: '"Profeta" es la equivalencia directa de נָבִיא y preserva el título del personaje sin reordenar innecesariamente el sintagma.'
- source_word: וַיַּסְתִּרֵם
  english_pob_choice: hid them
  chosen_spanish: los ocultó
  alternatives_spanish:
  - los escondió
  - los escondió Yahvé
  lexicon: HALOT
  rationale: La forma causativa expresa que Yahvé hizo que no fueran hallados. "Los ocultó" mantiene la acción divina de forma concisa y digna, aunque "los escondió" también sería válido en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: usar "Yahvé" como nombre propio divino en el texto principal, evitando la sustitución por un título.'
theological_decisions:
- issue: Interpretación de וַיַּסְתִּרֵם con sujeto divino
  english_pob_reading: Yahweh hid them.
  chosen_spanish_reading: Yahvé los ocultó.
  alternative_spanish_readings:
  - Yahvé los escondió.
  - Los ocultó Yahvé.
  rationale: El hebreo nombra explícitamente a Yahvé como sujeto al final de la cláusula. La traducción debe conservar esa agencia divina y no volverla impersonal.
  doctrine_reference: 'DOCTRINE.md: Rendering the divine name יְהוָה YHWH → Yahvé'
- issue: Valor de לָקַחַת en el contexto narrativo
  english_pob_reading: to seize
  chosen_spanish_reading: para que se apoderaran de
  alternative_spanish_readings:
  - para apresarlos
  - para capturarlos
  rationale: El contexto es una acción de captura hostil ordenada por el rey. "Apoderarse de" expresa la violencia implícita sin forzar un tecnicismo jurídico ajeno al hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: Revisado contra el hebreo masorético y el expediente auditado en inglés. Se preservó la relación patronímica, el matiz hostil de לָקַחַת, y la agencia explícita de Yahvé al final del versículo. No hubo cambios sustanciales en la última revisión auditada.
  spanish_consistency_notes:
  - Se usa "Yahvé" de forma consistente para יְהוָה.
  - Se mantiene "escriba" para סֹפֵר y "profeta" para נָבִיא.
  - Los nombres propios se transliteran de manera uniforme en español.
  - La puntuación refleja una sola cláusula principal seguida de la subordinada final con punto y coma, para conservar el flujo narrativo del hebreo.
