translation:
  language: es
  text: No se apartará de la oscuridad; la llama secará sus brotes[b], y por el soplo de su boca[a] desaparecerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y por el soplo de Su boca desaparecerá», si la frase final se entiende como referida a Dios y no al impío.'
    reason: alternative_reading
  - marker: b
    text: '«Brotes» refleja una imagen vegetal: el impío es presentado como un árbol cuyos renuevos tiernos son quemados y secados.'
    reason: cultural_note
lexical_decisions:
- source_word: יָסוּר ... מִנִּי חֹשֶׁךְ
  english_pob_choice: He will not depart from darkness
  chosen_spanish: No se apartará de la oscuridad
  alternatives_spanish:
  - No se desviará de la oscuridad
  - No escapará de la oscuridad
  lexicon: HALOT
  rationale: סור con מן expresa apartarse o retirarse; en este contexto conserva la idea de no poder salir de la oscuridad/calamidad. «Apartarse de» mantiene la cercanía formal y suena natural en español.
- source_word: יֹנַקְתּוֹ
  english_pob_choice: his shoots
  chosen_spanish: sus brotes
  alternatives_spanish:
  - sus retoños
  - sus renuevos
  - sus chupones
  lexicon: HALOT
  rationale: El término nombra un brote o renuevo vegetal. «Brotes» preserva la imagen arbórea del juicio y es más claro y digno en español que una traducción botánica más técnica.
- source_word: תְּיַבֵּשׁ שַׁלְהָבֶת
  english_pob_choice: a flame will dry up
  chosen_spanish: la llama secará
  alternatives_spanish:
  - una llama secará
  - la llama marchitará
  - una llama consumirá
  lexicon: HALOT
  rationale: יַבֵּשׁ en piel implica secar o hacer marchitar; שַׁלְהָבֶת es llama o resplandor ardiente. «La llama secará» conserva el paralelismo con el lenguaje vegetal sin añadir una imagen distinta como «consumirá».
- source_word: וְיָסוּר
  english_pob_choice: he will pass away
  chosen_spanish: pasará
  alternatives_spanish:
  - se apartará
  - desaparecerá
  - perecerá
  lexicon: HALOT
  rationale: El segundo יסור apunta al resultado final del castigo. «Pasará» es breve y sobrio en español; deja espacio para la idea de desaparición o muerte sin imponer una glosa más interpretativa.
- source_word: בְּרוּחַ פִּיו
  english_pob_choice: by the breath of his mouth
  chosen_spanish: por el soplo de su boca
  alternatives_spanish:
  - por el aliento de su boca
  - por el soplo de su boca
  - por el viento de su boca
  lexicon: HALOT
  rationale: רוּחַ aquí puede ser aliento, soplo o viento. «Soplo» comunica bien la fuerza concreta de una emisión desde la boca y preserva la ambigüedad entre aliento y ráfaga destructiva mejor que una formulación más interpretativa.
- source_word: פִּיו
  english_pob_choice: his mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - su boca
  - Su boca
  lexicon: HALOT
  rationale: El sufijo de tercera persona singular encaja naturalmente con el hombre impío del contexto inmediato. Se mantiene «su boca» en la línea principal y no se resuelve aquí el posible cambio de referente.
theological_decisions:
- issue: Referente de «su boca» en la cláusula final
  english_pob_reading: the wicked man's mouth
  chosen_spanish_reading: la boca del impío en el contexto inmediato
  alternative_spanish_readings:
  - la boca de Dios
  - la boca de Yahvé
  rationale: La referencia más cercana en la sintaxis es el hombre impío descrito en el discurso. Sin embargo, la frase puede leerse también como instrumento de juicio divino; por eso se conserva la tensión en nota en vez de resolverla silenciosamente.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de armonizarla de antemano'
translation_notes:
  revision_awareness: 'El borrador sigue el sentido ya estabilizado en la POB inglesa: permanencia en la oscuridad, imagen vegetal de destrucción y el posible doble referente de la cláusula final. No se introducen cambios doctrinales ni se resuelven las ambigüedades auditadas.'
  spanish_consistency_notes:
  - Se usa «oscuridad» para חֹשֶׁךְ en sentido de calamidad o tinieblas, no «tinieblas» por estilo.
  - Se mantiene la imagen arbórea con «brotes» para יֹנַקְתוֹ, evitando términos demasiado técnicos.
  - «Soplo» se conserva para רוּחַ por su amplitud semántica y por su naturalidad en español bíblico contemporáneo.
  - No se sustituye «Yahvé» aquí porque el hebreo no contiene el Tetragrámaton explícito; la nota conserva la posible lectura divina sin forzarla en el texto principal.
