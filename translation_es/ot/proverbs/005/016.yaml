translation:
  language: es
  text: ¿Han de derramarse tus fuentes por fuera?[a][b], corrientes de agua en las calles?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Que tus fuentes se derramen por fuera, corrientes de agua en las calles». La forma hebrea puede leerse así, pero el contexto más amplio favorece una pregunta retórica.'
    reason: alternative_reading
  - marker: b
    text: La imagen del agua se refiere metafóricamente a la vitalidad sexual y a la descendencia de un hombre en el contexto de la fidelidad matrimonial (véase Prov. 5:15–18).
    reason: cross_reference
lexical_decisions:
- source_word: יָפ֣וּצוּ
  english_pob_choice: should ... be scattered
  chosen_spanish: deberían ... dispersarse
  alternatives_spanish:
  - se dispersen
  - sean dispersadas
  - que se dispersen
  lexicon: HALOT
  rationale: El verbo expresa dispersión o esparcimiento; en este contexto la POB inglesa opta por una forma interrogativa que conserva la fuerza exhortativa. En español, «deberían» mantiene esa lectura retórica mejor que un simple indicativo, y «dispersarse» conserva la idea de esparcimiento.
- source_word: מַעְיְנֹתֶיךָ
  english_pob_choice: your springs
  chosen_spanish: tus fuentes
  alternatives_spanish:
  - tus manantiales
  - tus surgentes
  - tus fuentes de agua
  lexicon: HALOT
  rationale: מַעְיָן designa un manantial, fuente o spring. «Fuentes» es natural en español y puede mantener el valor metafórico sin sonar demasiado técnico. Se evita «manantiales» por ser más explicativo y menos directo en el paralelismo poético.
- source_word: חוּצָה
  english_pob_choice: abroad
  chosen_spanish: afuera
  alternatives_spanish:
  - fuera
  - en público
  - al exterior
  lexicon: HALOT
  rationale: El adverbio indica exterioridad o desplazamiento hacia fuera. «Afuera» reproduce bien el movimiento fuera del ámbito propio y resulta más idiomático en español contemporáneo que «abroad» literalizado.
- source_word: בָּרְחֹבוֹת
  english_pob_choice: in the streets
  chosen_spanish: en las calles
  alternatives_spanish:
  - en las plazas
  - en los espacios públicos
  - en las vías
  lexicon: HALOT
  rationale: רְחֹבוֹת se refiere a lugares amplios o públicos; «calles» es la equivalencia más clara y natural. Conserva el contraste entre lo privado y lo público en el contexto inmediato.
- source_word: פַּלְגֵי מָיִם
  english_pob_choice: streams of water
  chosen_spanish: corrientes de agua
  alternatives_spanish:
  - arroyos de agua
  - canales de agua
  - corrientes acuáticas
  lexicon: HALOT
  rationale: פֶּלֶג puede significar canal, corriente o corriente dividida de agua. «Corrientes de agua» reproduce la imagen poética con suficiente literalidad y suena fluido en español; «arroyos» sería posible, pero añade una concreción no requerida por el hebreo.
theological_decisions:
- issue: 'Lectura retórica: pregunta versus mandato'
  english_pob_reading: 'Render as a rhetorical question: ''Should your springs be scattered abroad...?'''''
  chosen_spanish_reading: 'Pregunta retórica: «¿Deberían tus fuentes dispersarse afuera...?».'
  alternative_spanish_readings:
  - 'Mandato: «Que tus fuentes se dispersen afuera...».'
  - 'Indicativo: «Tus fuentes se dispersan afuera...».'
  - 'Jussivo más literal: «Sean dispersadas tus fuentes afuera...».'
  rationale: En el contexto inmediato de Proverbios 5:15–18, la exhortación favorece una pregunta retórica que reprende y no aprueba la dispersión. «Deberían» preserva esa tensión admonitoria sin convertir el verso en mandato positivo, lo cual chocaría con el versículo 17.
  doctrine_reference: Proverbios 5:15–18; coherencia contextual de la advertencia sobre fidelidad conyugal
translation_notes:
  revision_awareness: 'El texto sigue el acuerdo alto con la revisión más reciente: no se detectaron cambios necesarios respecto de la evaluación inglesa; se conservó la lectura retórica preferida y la imaginería acuática-metafórica del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo «fuentes» como equivalente amplio de מַעְיְנֹתֶיךָ para conservar el paralelismo con «corrientes de agua».
  - «Afuera» y «en las calles» reflejan la oposición entre ámbito privado y público presente en el hebreo y en el contexto cercano.
  - Se evitó «SEÑOR» porque este verso no contiene el tetragrámaton ni una cita de κύριος; por tanto, no aplica la convención de Yahvé.
