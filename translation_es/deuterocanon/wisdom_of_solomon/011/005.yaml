translation:
  language: es
  text: Porque por las mismas cosas mediante las cuales fueron castigados sus enemigos, ellos mismos, cuando estaban necesitados[a], recibieron un beneficio por esas mismas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando estaban perplejos», «cuando estaban sin salida» o «en dificultad». El participio griego puede sugerir necesidad, desconcierto o desamparo.
    reason: lexical_alternative
lexical_decisions:
- source_word: διʼ ὧν ... διὰ τούτων
  english_pob_choice: by the very things through which ... by these same things
  chosen_spanish: por las mismas cosas mediante las cuales ... por esas mismas cosas
  alternatives_spanish:
  - por las cosas por las cuales ... por estas mismas cosas
  - mediante las mismas cosas por las cuales ... mediante estas mismas cosas
  lexicon: LSJ
  rationale: El griego repite la relación instrumental para subrayar una inversión irónica. «Por las mismas cosas» conserva el paralelismo y la correspondencia enfática sin volver el español torpe.
- source_word: ἐκολάσθησαν
  english_pob_choice: were punished
  chosen_spanish: fueron castigados
  alternatives_spanish:
  - fueron punidos
  - fueron chastigados
  lexicon: BDAG
  rationale: El verbo expresa tratamiento punitivo. «Fueron castigados» es natural en español y mantiene el sentido de sanción/retribución.
- source_word: οἱ ἐχθροὶ αὐτῶν
  english_pob_choice: their enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - los enemigos de ellos
  lexicon: BDAG
  rationale: La posesión en español se expresa de forma natural con «sus» y no añade matiz ajeno al griego.
- source_word: αὐτοὶ
  english_pob_choice: they themselves
  chosen_spanish: ellos mismos
  alternatives_spanish:
  - ellos
  - ellos en persona
  lexicon: BDAG
  rationale: El pronombre es enfático y contrasta al pueblo con sus enemigos. «Ellos mismos» conserva ese énfasis.
- source_word: ἀποροῦντες
  english_pob_choice: when in need
  chosen_spanish: cuando estaban en necesidad
  alternatives_spanish:
  - cuando estaban perplejos
  - cuando estaban sin salida
  - cuando estaban necesitados
  lexicon: LSJ
  rationale: En este contexto el participio puede indicar necesidad, desconcierto o desamparo. «Cuando estaban en necesidad» retiene la amplitud semántica sin restringirlo solo a confusión mental.
- source_word: εὐεργετήθησαν
  english_pob_choice: were benefited
  chosen_spanish: fueron beneficiados
  alternatives_spanish:
  - recibieron beneficio
  - fueron tratados con bondad
  - fueron ayudados
  lexicon: BDAG
  rationale: La pasiva indica recepción de un beneficio. «Fueron beneficiados» mantiene el contraste formal con «fueron castigados» y evita especificar más de lo que el texto dice.
theological_decisions:
- issue: Reversión instrumental en la acción divina
  english_pob_reading: The same means punished the enemies and benefited God's people.
  chosen_spanish_reading: Las mismas cosas sirven como medio tanto de castigo para los enemigos como de beneficio para el pueblo de Dios.
  alternative_spanish_readings:
  - La contraposición puede expresarse de forma más general sin repetir el paralelo instrumental.
  - El verso podría suavizar la repetición para sonar más idiomático.
  rationale: La repetición instrumental διʼ ὧν ... διὰ τούτων es central en el sentido literario y teológico del pasaje. Mantenerla en español preserva la lógica de inversión sin añadir interpretación doctrinal externa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se mantiene en alta concordancia con la adjudicación final y con el audit trail inglés.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o traducciones de máscara porque este versículo no contiene el nombre divino.
  - Se conserva el paralelismo instrumental del griego para reflejar la inversión retórica del pasaje.
  - «Beneficiados» se mantiene junto a «castigados» para sostener el contraste léxico del original.
