translation:
  language: es
  text: Y el muslo derecho lo darán como contribución al sacerdote, de sus sacrificios de paz[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la pierna derecha’.
    reason: lexical_alternative
  - marker: b
    text: O ‘como una ofrenda’; tradicionalmente, ‘como ofrenda mecida’.
    reason: lexical_alternative
  - marker: c
    text: O ‘sacrificios de comunión’ o ‘sacrificios de bienestar’.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹק
  english_pob_choice: thigh
  chosen_spanish: pierna
  alternatives_spanish:
  - muslo
  - pierna superior
  lexicon: HALOT
  rationale: El término hebreo designa la parte superior de la pata del animal. En español, 'muslo' puede sonar más antropomórfico o demasiado estrecho; 'pierna' comunica mejor la pieza sacrificable, aunque es algo más amplio. Se conserva la precisión suficiente sin forzar un tecnicismo poco natural.
- source_word: הַיָּמִין
  english_pob_choice: right
  chosen_spanish: derecha
  alternatives_spanish:
  - de la derecha
  - lado derecho
  lexicon: HALOT
  rationale: El hebreo especifica el lado derecho como la porción señalada. 'Derecha' reproduce de forma directa esa marcación ritual.
- source_word: תִּתְּנוּ
  english_pob_choice: you shall give
  chosen_spanish: darán
  alternatives_spanish:
  - darán ustedes
  - deberán dar
  lexicon: HALOT
  rationale: En una instrucción legal, el plural imperfectivo se expresa naturalmente en español con futuro de mandato. 'Darán' conserva la fuerza directiva sin volver la frase artificiosa.
- source_word: תְרוּמָה
  english_pob_choice: contribution
  chosen_spanish: contribución
  alternatives_spanish:
  - ofrenda
  - donación
  - porción ofrecida
  lexicon: HALOT
  rationale: '''Contribución'' sigue de cerca la decisión auditada en inglés y comunica una porción apartada y entregada. ''Ofrenda'' es posible, pero podría borrar la idea de porción asignada; ''heave offering'' no se traslada por ser opaco para el lector español.'
- source_word: לַכֹּהֵן
  english_pob_choice: to the priest
  chosen_spanish: al sacerdote
  alternatives_spanish:
  - al sacerdote oficiant
  - al presbítero
  lexicon: HALOT
  rationale: El singular se conserva y 'sacerdote' es el equivalente directo y claro en español bíblico. No se introduce terminología eclesial posterior.
- source_word: מִזִּבְחֵי
  english_pob_choice: from your sacrifices
  chosen_spanish: de entre los sacrificios
  alternatives_spanish:
  - de los sacrificios
  - de entre tus sacrificios
  lexicon: HALOT
  rationale: 'La preposición marca procedencia/separación: la porción se toma de entre las ofrendas sacrificadas. El español ''de entre'' refleja mejor ese origen que un simple ''de''. Se omite la posesión explícita aquí porque ya queda incorporada en ''sus ofrendas'' al final.'
- source_word: שַׁלְמֵיכֶם
  english_pob_choice: peace offerings
  chosen_spanish: ofrendas de paz
  alternatives_spanish:
  - ofrendas de comunión
  - ofrendas de bienestar
  lexicon: HALOT
  rationale: Se adopta 'ofrendas de paz' como equivalente bíblico comprensible y relativamente estable en español. 'Comunión' o 'bienestar' expresan matices válidos, pero cambian el registro o resultan menos inmediatos en este contexto legal.
- source_word: וְאֵת
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Además
  - Luego
  lexicon: HALOT
  rationale: La conjunción enlaza con la instrucción anterior; el marcador de objeto no se traduce. 'Y' conserva el flujo discursivo simple y natural.
translation_notes:
  revision_awareness: El texto inglés auditado no recibió revisiones; el estado más reciente indica que no hubo cambios y el veredicto fue de alta concordancia. La presente redacción mantiene esa línea y traslada al español las mismas decisiones léxicas esenciales, adaptándolas a un registro natural y publicable.
  spanish_consistency_notes:
  - Se mantiene el valor singular de לַכֹּהֵן con 'al sacerdote'.
  - '''Contribución'' conserva la función de porción apartada, evitando imponer ''ofrenda mecida'' en el cuerpo principal.'
  - '''Ofrendas de paz'' sigue la elección auditada de ''peace offerings'' para consistencia terminológica.'
  - Las notas alternativas se preservan porque el inglés POB documenta ambigüedades léxicas reales en 'thigh/leg', 'contribution/heave offering' y 'peace/fellowship/well-being offerings'.
