revisions:
- from: Y sucedía que, cuando Israel sembraba, subían Madián, Amalec y los hijos de Oriente[a], y subían contra ellos.
  to: Y sucedía que cuando Israel sembraba, Madián, Amalec y los hijos de Oriente subían contra ellos[a].
  rationale: Se conserva el sentido iterativo y el valor de los términos hebreos, pero se corrige el anclaje de la nota al pie para que corresponda a «contra ellos», y se mejora levemente la fluidez española eliminando la repetición innecesaria de «subían».
