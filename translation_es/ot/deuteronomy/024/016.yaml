    rationale: El hebreo usa de nuevo el Hophil de מות, igual que en las dos primeras cláusulas. 'Morirá' amplía indebidamente el sentido a muerte en general y contradice la decisión teológica documentada de limitar el alcance a la pena capital judicial.
  - severity: medium
