translation:
  language: es
  text: Y entonces, después de que cada uno escribió su propia declaración, los sellaron y los pusieron debajo de la almohada[a] de Darío el rey,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «debajo de la cabecera de Darío el rey». El griego προσκεφάλαιον puede denotar una almohada o un apoyo para la cabeza.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: then
  chosen_spanish: Y entonces
  alternatives_spanish:
  - Entonces
  - Y en ese momento
  lexicon: LSJ
  rationale: El adverbio temporal marca el avance narrativo; «y entonces» conserva la secuencia y el tono fluido del relato en español.
- source_word: γράψαντες
  english_pob_choice: after each had written
  chosen_spanish: después de que cada uno había escrito
  alternatives_spanish:
  - habiendo escrito cada uno
  - tras escribir cada uno
  lexicon: LSJ
  rationale: El participio aoristo expresa anterioridad respecto a los verbos principales; esta construcción española preserva esa relación temporal con naturalidad.
- source_word: ἕκαστος
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada persona
  - cada cual
  lexicon: LSJ
  rationale: El distributivo se expresa de forma directa e idiomática con «cada uno».
- source_word: τὸν ἑαυτοῦ λόγον
  english_pob_choice: his own statement
  chosen_spanish: su propia declaración
  alternatives_spanish:
  - su propio escrito
  - su propio alegato
  - su propia palabra
  lexicon: LSJ
  rationale: En este contexto de concurso judicial, λόγος se refiere a lo que cada participante presenta por escrito; «declaración» conserva el sentido proposicional y escrito sin forzar un término técnico más estrecho.
- source_word: ἐσφραγίσαντο
  english_pob_choice: they sealed them
  chosen_spanish: la sellaron
  alternatives_spanish:
  - las sellaron
  - les pusieron sello
  lexicon: LSJ
  rationale: El griego medio indica que el contenido escrito quedó sellado. En español, el referente es la declaración singular de cada uno; por eso se usa singular colectivo en la oración y el verbo «sellar».
- source_word: ἔθηκαν
  english_pob_choice: placed
  chosen_spanish: la pusieron
  alternatives_spanish:
  - la colocaron
  - la dejaron
  lexicon: LSJ
  rationale: Verbo narrativo simple; «poner» es natural en español y mantiene el movimiento del relato.
- source_word: ὑπὸ τὸ προσκεφάλαιον
  english_pob_choice: under the pillow
  chosen_spanish: debajo del almohadón[a]
  alternatives_spanish:
  - debajo de la almohada[a]
  - debajo del cabezal[a]
  lexicon: LSJ
  rationale: προσκεφάλαιον puede referirse a una almohada o apoyo para la cabeza. «Almohadón» suena más natural en español bíblico moderno que «pillow» calco, y la nota preserva la alternativa «almohada» / «cabezal».
- source_word: Δαρείου τοῦ βασιλέως
  english_pob_choice: of Darius the king
  chosen_spanish: de Darío el rey
  alternatives_spanish:
  - del rey Darío
  - de Darío, el rey
  lexicon: LSJ
  rationale: Se conserva el orden solemne del griego y del inglés auditado; «Darío el rey» reproduce la cadencia formal del pasaje.
translation_notes:
  revision_awareness: El texto base inglés y el griego concuerdan de manera alta; no se detectaron revisiones aplicadas ni cambios de sentido relevantes. Se mantuvo la secuencia narrativa, el carácter formal del registro y la ambigüedad léxica de προσκεφάλαιον mediante nota.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el pasaje no contiene el tetragrámaton ni una alusión directa al nombre divino.
  - Se eligió «declaración» para λόγος por el contexto de una respuesta escrita en un concurso, no como «palabra» aislada.
  - El referente del sellado se entiende colectivamente en español, aunque el griego usa un objeto plural implícito en el contexto narrativo.
