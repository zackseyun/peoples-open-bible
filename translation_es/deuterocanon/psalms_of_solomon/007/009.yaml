translation:
  language: es
  text: Tú nos dirigirás en el tiempo de tu ayuda[a], para tener misericordia de la casa de Jacob para el día en que les prometiste[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tú nos encaminarás». El verbo griego puede expresar también la idea de hacer recto el camino o dirigir la marcha.'
    reason: lexical_alternative
  - marker: b
    text: La forma verbal final es textualmente difícil; aquí se entiende en contexto como «les prometiste». Una posibilidad más literal, pero menos adecuada al contexto, sería «les prometí».
    reason: textual_variant
lexical_decisions:
- source_word: κατευθυνεῖς
  english_pob_choice: you will direct
  chosen_spanish: Tú nos dirigirás
  alternatives_spanish:
  - Tú nos guiarás
  - Tú nos encaminarás
  - Tú enderezarás nuestro camino
  lexicon: BDAG
  rationale: El verbo expresa dirección/encaminamiento del camino. «Dirigirás» conserva la correspondencia léxica con la revisión inglesa final y suena natural en español. Mantiene la imagen de orientación divina sin añadir interpretaciones.
- source_word: ἐν καιρῷ
  english_pob_choice: in the time of
  chosen_spanish: en el tiempo de
  alternatives_spanish:
  - en el momento de
  - en la ocasión de
  - en la temporada de
  lexicon: BDAG
  rationale: La frase señala un tiempo señalado, no mera duración. «En el tiempo de» refleja bien ἐν + dativo y mantiene el valor temporal específico.
- source_word: ἀντιλήψεως
  english_pob_choice: help
  chosen_spanish: tu ayuda
  alternatives_spanish:
  - tu auxilio
  - tu apoyo
  - tu socorro
  lexicon: BDAG
  rationale: El sustantivo denota ayuda o asistencia. «Ayuda» es claro y directo en español; «auxilio» o «socorro» serían posibles, pero «ayuda» conserva el sentido amplio sin sobrecargarlo.
- source_word: τοῦ ἐλεῆσαι
  english_pob_choice: to have mercy on
  chosen_spanish: para tener misericordia de
  alternatives_spanish:
  - para mostrar misericordia a
  - para apiadarte de
  - para compadecerte de
  lexicon: BDAG
  rationale: El infinitivo expresa propósito. «Tener misericordia de» mantiene el registro bíblico y la fuerza compasiva del verbo, sin traducirlo de forma mecánica ni suavizarlo.
- source_word: τὸν οἶκον Ἰακώβ
  english_pob_choice: the house of Jacob
  chosen_spanish: la casa de Jacob
  alternatives_spanish:
  - la familia de Jacob
  - el linaje de Jacob
  - el pueblo de Jacob
  lexicon: BDAG
  rationale: Se conserva la expresión colectiva y covenantal del griego. «Casa de Jacob» reproduce la resonancia bíblica y evita sustituirla por un equivalente interpretativo como «Israel».
- source_word: εἰς ἡμέραν
  english_pob_choice: in the day
  chosen_spanish: en el día
  alternatives_spanish:
  - para el día
  - hasta el día
  - para aquel día
  lexicon: BDAG
  rationale: La construcción apunta a un día concreto esperado en el horizonte del texto. «En el día» sigue de cerca la formulación revisada en inglés y mantiene la referencia temporal.
- source_word: ἐπηγγείλω αὐτοῖς
  english_pob_choice: you promised them
  chosen_spanish: les prometiste
  alternatives_spanish:
  - les hiciste una promesa
  - yo les prometí
  - se lo prometiste
  lexicon: BDAG
  rationale: 'La forma griega es textualmente difícil. En contexto, la lectura más coherente es una segunda persona dirigida a Dios: «les prometiste». Se conserva así la decisión auditada de la POB inglesa sin introducir una solución más especulativa.'
theological_decisions:
- issue: Conservar la expresión «la casa de Jacob» en vez de reemplazarla por una forma más explicativa
  english_pob_reading: Retained 'the house of Jacob' in the main text.
  chosen_spanish_reading: Se mantiene «la casa de Jacob».
  alternative_spanish_readings:
  - Israel
  - el pueblo de Israel
  - la casa de Israel
  rationale: El griego nombra específicamente «la casa de Jacob». Mantener la expresión conserva la textura bíblica y el lenguaje de pacto sin importar una interpretación más amplia que el texto no exige.
  doctrine_reference: Primacía del texto original y consistencia terminológica; no borrar resonancias pactales documentadas.
- issue: Resolver la forma verbal difícil ἐπηγγείλω αὐτοῖς sin romper la dirección de la oración
  english_pob_reading: understood here in context as 'you promised them'
  chosen_spanish_reading: «les prometiste»
  alternative_spanish_readings:
  - «yo les prometí»
  - «les fue prometido»
  rationale: La lectura contextual trata la frase como una promesa hecha por Dios al pueblo. La traducción española sigue esa decisión, manteniendo la segunda persona y la coherencia devocional del pasaje.
  doctrine_reference: Lectura contextual guiada por el audit trail; honestidad textual ante una forma difícil.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: se prefirió una correspondencia más cercana de κατευθυνεῖς como «dirigirás», de ἐν como «en», de ἐλεῆσαι como «tener misericordia de», y de εἰς ἡμέραν ἐν ᾗ como «en el día que». La única tensión textual importante es ἐπηγγείλω αὐτοῖς, que se resuelve en español conforme a la lectura contextual ya adoptada en la POB inglesa.'
  spanish_consistency_notes:
  - Se mantiene «Jacob» y no «Israel» para respetar la expresión del griego.
  - Se usa «misericordia» en un registro bíblico natural en español.
  - Se evita «SEÑOR» porque aquí no aparece el tetragrámaton ni una convención de ocultamiento nominal en el texto fuente.
  - La puntuación y el orden siguen un español moderno y litúrgicamente legible, sin calcos innecesarios.
