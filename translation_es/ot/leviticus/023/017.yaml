revisions:
- from: Desde sus moradas traeréis dos panes de ofrenda mecida[a]; serán de dos décimas de efa de flor de harina, cocidos con levadura[b], como primicias para Yahvé.
  to: De sus moradas traerán dos panes para ofrenda mecida; serán de dos décimas[a] de efa de flor de harina, horneados con levadura[b], como primicias para Yahvé.
  rationale: Se corrige la expresión verbal de horneado para reflejar con mayor precisión el hebreo y mejorar la naturalidad del español. También se ajusta el inicio a un español más neutro y se reubica la nota de medida en el lugar correspondiente.
  reviewer_model: gpt-5.4
