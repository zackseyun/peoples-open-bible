translation:
  text: 1 And after their vengeance has come from the Lord[5], the priesthood will fail. 2 Then the Lord will raise up a new priest, to whom all the words of the Lord will be revealed; and he will execute a judgment of truth upon the earth for many days. 3 And his star will rise in heaven like a king, giving light with the light of knowledge like the sun by day, and he will be magnified in the inhabited world. 4 He will shine forth like the sun upon the earth, and he will remove all darkness from under heaven, and there will be peace in all the earth. 5 The heavens will rejoice in his days, and the earth will be glad, and the clouds will rejoice; and the angels of the glory of the Lord's presence will be glad in him. 6 The heavens will be opened, and from the temple of glory sanctification will come upon him with a fatherly voice, as from Abraham to Isaac. 7 And the glory of the Most High will be spoken over him, and a spirit of understanding and sanctification will rest upon him. 8 For he will give the majesty of the Lord to his sons in truth forever, and there will be no successor to him for generation upon generation, forever. 9 And during his priesthood the nations will be multiplied in knowledge upon the earth, and they will be enlightened by the grace of the Lord. During his priesthood sin will fail, and the lawless will cease from evil. 10 And indeed he will open the gates of paradise, and he will remove the threatening sword against Adam. 11 And he will give the holy ones to eat from the tree of life, and the spirit of holiness will be upon them. 12 And Beliar will be bound by him, and he will give authority to his children to trample on evil spirits. 13 And the Lord will rejoice over his children, and he will take pleasure in his beloved ones forever. 14 Then Abraham and Isaac and Jacob will exult, and I will be glad[10][9b][9a][7], and all the holy ones will put on righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '5'
    text: Some witnesses add, 'and the knowledge of the Lord will be poured out upon the earth like the water of the seas.'
    reason: textual_variant
  - marker: '7'
    text: Some witnesses add, 'in the water.'
    reason: textual_variant
  - marker: 9a
    text: Some witnesses add, 'but Israel will be diminished in ignorance and darkened in grief.'
    reason: textual_variant
  - marker: 9b
    text: Some witnesses add, 'but the righteous will rest in him.'
    reason: textual_variant
  - marker: '10'
    text: The threatening sword alludes to the sword set to guard the way to the tree of life after Adam's expulsion from Eden.
    reason: cross_reference
lexical_decisions:
- source_word: ἱερωσύνη
  chosen: priesthood
  alternatives:
  - priestly office
  lexicon: BDAG
  rationale: The chapter's central theme is the cessation and renewal of priestly mediation. 'Priesthood' is the most natural and theologically weighty English equivalent.
- source_word: ἱερέα καινόν
  chosen: a new priest
  alternatives:
  - a fresh priest
  lexicon: BDAG
  rationale: καινός emphasizes newness in kind or epochal renewal. 'A new priest' preserves the prophetic force without over-interpreting the figure.
- source_word: κρίσιν ἀληθείας
  chosen: a judgment of truth
  alternatives:
  - true judgment
  - judgment in truth
  lexicon: BDAG
  rationale: The genitive is preserved in a slightly formal way to retain the testamentary and prophetic register.
- source_word: οἰκουμένη
  chosen: inhabited world
  alternatives:
  - world
  lexicon: BDAG
  rationale: This term often denotes the inhabited earth rather than the cosmos in abstraction. 'Inhabited world' preserves that nuance.
- source_word: ἀναλάμψει
  chosen: will shine forth
  alternatives:
  - will blaze forth
  - will appear in splendor
  lexicon: BDAG
  rationale: The verb carries luminous imagery. 'Shine forth' fits the surrounding sun/star language and keeps the elevated tone.
- source_word: ἁγίασμα
  chosen: sanctification
  alternatives:
  - holiness
  - a holy gift
  - consecration
  lexicon: BDAG
  rationale: The phrase likely denotes a holy endowment coming upon the priestly figure. 'Sanctification' keeps the abstract sacred sense without specifying an object not explicit in the Greek.
- source_word: φωνῆς πατρικῆς
  chosen: a fatherly voice
  alternatives:
  - a paternal voice
  lexicon: BDAG
  rationale: The adjective points to paternal character. 'Fatherly voice' is readable and preserves the familial, covenantal resonance.
- source_word: πνεῦμα συνέσεως καὶ ἁγιασμοῦ
  chosen: a spirit of understanding and sanctification
  alternatives:
  - a spirit of insight and holiness
  lexicon: BDAG
  rationale: The pair should remain somewhat formal and prophetic. 'Understanding' and 'sanctification' preserve the conceptual texture of the Greek.
- source_word: μεγαλωσύνην
  chosen: majesty
  alternatives:
  - greatness
  - magnificence
  lexicon: BDAG
  rationale: In context this denotes divine grandeur communicated by the priestly figure. 'Majesty' is concise and elevated.
- source_word: διαδοχή
  chosen: successor
  alternatives:
  - succession
  - continuation
  lexicon: BDAG
  rationale: The statement concerns the uniqueness and non-transferability of this priestly office. 'There will be no successor to him' expresses the sense clearly.
- source_word: τὰ ἔθνη
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: BDAG
  rationale: In this Jewish testamentary context, 'the nations' is the broadest and least overdetermined rendering; 'Gentiles' would import later Christian usage too strongly.
- source_word: φωτισθήσονται
  chosen: will be enlightened
  alternatives:
  - will be illumined
  lexicon: BDAG
  rationale: The knowledge/light motif dominates the chapter. 'Enlightened' preserves both cognitive and revelatory force.
- source_word: καταπαύσουσιν εἰς κακά
  chosen: will cease for evil
  alternatives:
  - will stop doing evil
  - will come to an end in evil
  lexicon: BDAG
  rationale: The Greek is somewhat compressed. This rendering stays close to the wording while signaling cessation of wicked activity.
- source_word: παράδεισος
  chosen: paradise
  alternatives:
  - garden
  lexicon: BDAG
  rationale: The term had already developed a recognized sacred sense beyond a generic garden. 'Paradise' best fits the eschatological context.
- source_word: ἀπειλοῦσαν ῥομφαίαν
  chosen: the threatening sword
  alternatives:
  - the menacing sword
  lexicon: BDAG
  rationale: The participle describes the sword as threatening or menacing. The phrase alludes to Eden while remaining faithful to the Greek wording.
- source_word: πνεῦμα ἁγιωσύνης
  chosen: the spirit of holiness
  alternatives:
  - a holy spirit
  lexicon: BDAG
  rationale: The anarthrous/arthrous nuance is less important here than preserving the quality term ἁγιωσύνη. 'Spirit of holiness' avoids prematurely collapsing the phrase into later doctrinal shorthand.
- source_word: Βελίαρ
  chosen: Beliar
  alternatives:
  - Belial
  lexicon: BDAG
  rationale: The Greek witness reads Beliar. The translation follows the Greek form rather than normalizing to the more familiar Hebrew-derived spelling.
- source_word: πατεῖν ἐπὶ τὰ πονηρὰ πνεύματα
  chosen: to trample on evil spirits
  alternatives:
  - to tread upon evil spirits
  lexicon: BDAG
  rationale: The idiom conveys victorious authority. 'Trample on' is vivid and natural in English while preserving the force.
- source_word: ἐνδύσονται δικαιοσύνην
  chosen: will put on righteousness
  alternatives:
  - will be clothed with righteousness
  lexicon: BDAG
  rationale: The clothing metaphor should remain visible. 'Put on righteousness' is direct and preserves the image.
