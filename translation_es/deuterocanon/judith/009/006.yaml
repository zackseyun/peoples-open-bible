  glossary_alignment: No hay conflicto con la terminología base del proyecto. «juicio» para κρίσις y «caminos» para ὁδοί están bien. «conocimiento previo» para πρόγνωσις es defendible como opción accesible, aunque menos técnica que «presciencia».
