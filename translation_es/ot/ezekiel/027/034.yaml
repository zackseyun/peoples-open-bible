translation:
  language: es
  text: Al tiempo en que fuiste quebrada por los mares, en las profundidades de las aguas, tus mercancías[a] y toda tu compañía[b] en medio de ti cayeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mercancías» traduce el término comercial en sentido amplio; también puede entenderse como «bienes» o «mercaderías».
    reason: lexical_alternative
  - marker: b
    text: «Compañía» refleja el grupo reunido en torno a Tiro; puede abarcar habitantes, comerciantes y gente de navegación.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵת
  english_pob_choice: At the time
  chosen_spanish: Al tiempo en que
  alternatives_spanish:
  - Cuando
  - En el tiempo en que
  lexicon: HALOT
  rationale: El sustantivo temporal introduce la circunstancia del derrumbe; «al tiempo en que» conserva el valor nominal con naturalidad en español, sin perder la referencia temporal concreta.
- source_word: נִשְׁבֶּרֶת
  english_pob_choice: you were broken
  chosen_spanish: fuiste quebrantada
  alternatives_spanish:
  - fuiste rota
  - fuiste quebrada
  - fuiste destrozada
  lexicon: HALOT
  rationale: El nifal de שבר expresa quedar roto/quebrado; «quebrantada» mantiene la fuerza del golpe y suena natural en un oráculo de lamento, sin añadir la especificación marítima de «naufragada».
- source_word: מִיַּמִּים
  english_pob_choice: by the seas
  chosen_spanish: por los mares
  alternatives_spanish:
  - por el mar
  - a causa de los mares
  - por las aguas
  lexicon: HALOT
  rationale: La preposición puede marcar causa/agencia; «por los mares» reproduce esa fuerza destructiva y respeta el plural hebreo.
- source_word: בְּמַעֲמַקֵּי מָיִם
  english_pob_choice: in the depths of the waters
  chosen_spanish: en las profundidades de las aguas
  alternatives_spanish:
  - en lo profundo de las aguas
  - en las profundidades del mar
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «en las profundidades de aguas»; la opción elegida conserva la imagen y el plural sin simplificarlo a «mar».
- source_word: מַעֲרָבֵךְ
  english_pob_choice: your wares
  chosen_spanish: tus mercancías
  alternatives_spanish:
  - tus bienes
  - tus géneros
  - tus mercaderías
  lexicon: HALOT
  rationale: En Ezequiel 27 el término se refiere a los bienes comerciales/carga de Tiro. «Mercancías» es el equivalente español más directo y amplio para ese campo semántico.
- source_word: וְכָל קְהָלֵךְ
  english_pob_choice: and all your company
  chosen_spanish: y toda tu compañía
  alternatives_spanish:
  - y toda tu asamblea
  - y toda tu gente
  - y todo tu conjunto
  lexicon: HALOT
  rationale: קהל designa un grupo reunido. «Compañía» encaja mejor que «asamblea» en el contexto mercantil y marítimo, sin reducir el sentido colectivo.
- source_word: בְּתוֹכֵךְ
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - dentro de ti
  - en tu interior
  lexicon: HALOT
  rationale: Es una expresión espacial común; «en medio de ti» conserva el matiz de localización interna y funciona bien con la imagen de la ciudad/embarcación.
- source_word: נָפָלוּ
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - se hundieron
  - perecieron
  - se desplomaron
  lexicon: HALOT
  rationale: El verbo básico es «caer». En este contexto puede implicar pérdida o hundimiento, pero «cayeron» mantiene el verbo hebreo sin explicitar más de lo que el texto dice.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: se mantuvo la estructura temporal inicial, la imagen de ruptura por los mares y la paralela mención de mercancías y compañía. Se evitó introducir vocabulario interpretativo como «naufragio» o «asamblea» para no forzar el contexto marítimo/comercial.'
  spanish_consistency_notes:
  - Se preservó el plural de «mares/aguas» conforme al hebreo y al POB inglés.
  - «Mercancías» y «compañía» mantienen el campo comercial-marítimo sin añadir tecnicismos innecesarios.
  - La puntuación sigue una sintaxis española natural con las comas que separan la cláusula temporal y el resultado final.
