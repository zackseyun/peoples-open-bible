translation:
  language: es
  text: Porque él mismo echó fuera a los que estaban alineados para la batalla en la ciudad santa a Persia[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «expulsó» o «arrojó fuera»; el verbo griego es enérgico y expresa una remoción decisiva.
    reason: lexical_alternative
  - marker: b
    text: O «los que estaban dispuestos en orden de combate»; el participio griego es un término militar para personas alineadas para el combate.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  - él personalmente
  lexicon: LSJ
  rationale: El pronombre intensivo refuerza la agencia directa; «él mismo» conserva ese énfasis mejor que un simple «él».
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: LSJ
  rationale: En español, «porque» expresa bien el valor explicativo/conectivo del griego en este contexto, manteniendo la relación con la frase anterior.
- source_word: ἐξέβρασεν
  english_pob_choice: drove ... out
  chosen_spanish: expulsó
  alternatives_spanish:
  - echó
  - desterró
  - arrojó fuera
  lexicon: LSJ
  rationale: El verbo griego es fuerte y de remoción decisiva. «Expulsó» preserva esa fuerza con un verbo natural en español sin suavizar el sentido.
- source_word: τοὺς παρατασσομένους
  english_pob_choice: those arrayed for battle
  chosen_spanish: los que se habían alineado para la batalla
  alternatives_spanish:
  - los dispuestos en orden de combate
  - los alineados para el combate
  - los combatientes
  lexicon: LSJ
  rationale: El participio describe una disposición militar. «Se habían alineado para la batalla» comunica la formación de combate sin reducirlo a una etiqueta genérica como «combatientes».
- source_word: ἐν τῇ ἁγίᾳ πόλει
  english_pob_choice: in the holy city
  chosen_spanish: en la ciudad santa
  alternatives_spanish:
  - dentro de la ciudad santa
  - en la ciudad sagrada
  lexicon: LSJ
  rationale: «Ciudad santa» es la equivalencia natural y fiel de la designación sacra del texto griego.
- source_word: εἰς τὴν Περσίδα
  english_pob_choice: out into Persia
  chosen_spanish: hacia Persia
  alternatives_spanish:
  - a Persia
  - hasta Persia
  - hacia el país de Persia
  lexicon: LSJ
  rationale: El griego marca movimiento hacia Persia; en español, con «expulsó» ya presente, «hacia Persia» conserva el destino sin añadir un matiz direccional innecesariamente redundante.
theological_decisions:
- issue: Énfasis en la agencia del sujeto
  english_pob_reading: The subject is rendered emphatically as 'he himself,' preserving the text's stress on direct agency without specifying beyond the immediate context.
  chosen_spanish_reading: Se conserva el énfasis en la agencia directa con «él mismo», sin introducir interpretación adicional.
  alternative_spanish_readings:
  - un simple «él»
  - «él personalmente»
  rationale: El texto subraya quién actúa; la traducción mantiene ese énfasis y evita diluirlo, pero no añade una lectura doctrinal que el verso no exprese explícitamente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el control de concordancia informó acuerdo alto con observaciones menores, por lo que se mantiene una solución española directa y auditables las opciones léxicas clave.
  spanish_consistency_notes:
  - Se mantiene «ciudad santa» para ἁγίᾳ πόλει, en continuidad con el valor sacral del original.
  - «Expulsó» conserva la fuerza de ἐξέβρασεν sin recurrir a un calco extraño.
  - «Él mismo» reproduce el matiz intensivo de αὐτὸς.
  - La preposición «hacia» evita sobreinterpretar εἰς sin perder el movimiento de destino.
