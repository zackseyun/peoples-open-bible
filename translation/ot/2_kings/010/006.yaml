id: 2KI.10.6
reference: 2 Kings 10:6
source:
  edition: WLC
  text: וַ/יִּכְתֹּ֣ב אֲלֵי/הֶם֩ סֵ֨פֶר שֵׁנִ֜ית לֵ/אמֹ֗ר אִם לִ֨/י אַתֶּ֜ם וּ/לְ/קֹלִ֣/י אַתֶּ֣ם שֹׁמְעִ֗ים קְחוּ֙ אֶת רָאשֵׁי֙ אַנְשֵׁ֣י בְנֵֽי אֲדֹנֵי/כֶ֔ם וּ/בֹ֧אוּ אֵלַ֛/י כָּ/עֵ֥ת מָחָ֖ר יִזְרְעֶ֑אלָ/ה וּ/בְנֵ֤י הַ/מֶּ֨לֶךְ֙ שִׁבְעִ֣ים אִ֔ישׁ אֶת גְּדֹלֵ֥י הָ/עִ֖יר מְגַדְּלִ֥ים אוֹתָֽ/ם׀־׀־־־׃
translation:
  text: So he wrote them a second letter[a], saying, “If you are on my side and if you are listening to my voice, take the heads of the men, the sons of your master, and come to me at this time tomorrow at Jezreel.” Now the king’s sons, seventy men, were with the leading men of the city[c][b], who were raising them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'if you obey me.' The Hebrew says literally, 'if you are listening to my voice,' an idiom that often includes obedience.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'take the heads of the men, the sons of your master'—that is, the severed heads of your master's sons.
    reason: lexical_alternative
  - marker: c
    text: Or, 'to Jezreel.' The Hebrew form includes a directional ending.
    reason: lexical_alternative
lexical_decisions:
- source_word: סֵפֶר שֵׁנִית
  chosen: a second letter
  alternatives:
  - another letter
  - a second document
  lexicon: HALOT
  rationale: סֵפֶר in this epistolary context is best rendered 'letter' rather than the broader 'book/document.' שֵׁנִית marks sequence, hence 'second.'
- source_word: אִם לִי אַתֶּם
  chosen: If you are on my side
  alternatives:
  - If you are mine
  - If you are for me
  lexicon: HALOT
  rationale: The idiom expresses allegiance or loyalty to Jehu. 'On my side' communicates the relational force naturally in English without overparaphrasing.
- source_word: וּלְקוֹלִי אַתֶּם שֹׁמְעִים
  chosen: if you are listening to my voice
  alternatives:
  - if you obey me
  - if you listen to me
  lexicon: HALOT
  rationale: שׁמע with קוֹל often carries the sense of hearing with obedience. 'Listening to my voice' preserves the Hebrew expression, while the obedience nuance is contextually evident.
- source_word: קְחוּ אֶת רָאשֵׁי
  chosen: take the heads of
  alternatives:
  - bring the heads of
  - take the head of
  lexicon: HALOT
  rationale: The plural construct רָאשֵׁי with the following plural phrase indicates literal heads, i.e., severed heads. 'Take the heads of' preserves the grim directness of the Hebrew.
- source_word: אַנְשֵׁי בְנֵי אֲדֹנֵיכֶם
  chosen: the men, the sons of your master
  alternatives:
  - the sons of your master
  - the male descendants of your lord
  lexicon: HALOT
  rationale: The Hebrew is awkwardly appositional. אַנְשֵׁי likely functions as an individuating term before 'sons of your master.' Rendering both elements preserves the wording rather than smoothing it away. The sense is the male royal sons whose heads are demanded.
- source_word: כָּעֵת מָחָר
  chosen: at this time tomorrow
  alternatives:
  - by this time tomorrow
  - tomorrow at this time
  lexicon: HALOT
  rationale: This is a standard temporal idiom meaning the corresponding time on the next day.
- source_word: יִזְרְעֶאלָה
  chosen: at Jezreel
  alternatives:
  - to Jezreel
  lexicon: HALOT
  rationale: The directional he can indicate motion toward Jezreel, but with the command to come and the temporal phrase, idiomatic English here is 'at Jezreel,' indicating the destination meeting place.
- source_word: וּבְנֵי הַמֶּלֶךְ שִׁבְעִים אִישׁ
  chosen: Now the king’s sons, seventy men,
  alternatives:
  - Now the king had seventy sons
  - the king’s sons were seventy men
  lexicon: HALOT
  rationale: The clause is parenthetical background information. Retaining the appositional 'seventy men' reflects the Hebrew count expression.
- source_word: אֶת גְּדֹלֵי הָעִיר
  chosen: with the leading men of the city
  alternatives:
  - with the great men of the city
  - with the nobles of the city
  lexicon: HALOT
  rationale: גְּדֹלֵי refers to prominent or powerful civic leaders. 'Leading men' is clear modern English and preserves the masculine reference.
- source_word: מְגַדְּלִים אוֹתָם
  chosen: who were raising them
  alternatives:
  - who were bringing them up
  - who were rearing them
  lexicon: HALOT
  rationale: 'The participle gives ongoing background action: the city leaders were acting as guardians or caretakers of the royal sons.'
