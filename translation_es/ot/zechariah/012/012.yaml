review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura distributiva del hebreo y la separación repetida de los grupos que hacen duelo. Sin embargo, se aparta del rastro auditado del POB en dos puntos relevantes: הָאָרֶץ se justificó en inglés como «the land», no con la amplitud más ambigua de «la tierra»; y וּנְשֵׁיהֶם en este contexto social/familiar se entendió como «sus esposas», no «sus mujeres». Además, falta en español la nota alternativa correspondiente a «the earth»/«la tierra» preservada en el inglés POB, y el anclaje actual de la nota a «tierra» no coincide con su contenido.'
  spanish_quality_summary: El español es claro y legible, pero «hará duelo» suena algo menos natural y más perifrástico que «se lamentará» o «hará duelo» con mejor apoyo contextual. «Familia por familia» y «por separado» funcionan bien. Para claridad y fidelidad contextual, «la tierra» debe ajustarse a «la tierra/land» según el rastro auditado; en español neutro bíblico, «el país» sería demasiado interpretativo, pero «la tierra» en el texto principal puede inducir una amplitud que el POB quiso restringir. «Sus mujeres» en español puede sonar ambiguo o posesivo-social; «sus esposas» comunica mejor el valor contextual de וּנְשֵׁיהֶם.
  glossary_alignment: 'No hay conflictos con términos del glosario mayor. Los nombres propios David y Natán están bien. La principal alineación pendiente es respetar la decisión contextual del POB para הָאָרֶץ como «la tierra/el país/la tierra de la nación»; en español, la mejor correspondencia al inglés auditado es «la tierra» solo si se conserva nota que indique «o la tierra»/«o la tierra» no resuelve nada. Por fidelidad al POB, conviene usar «la tierra»? No: el audit trail privilegia «the land», y en español la opción más fiel y natural es «la tierra» solo cuando el contexto ya limita el alcance; pero dado que el problema aquí es semántico, la mejor reparación es «la tierra» con nota «O “la tierra”» no aporta. Mejor texto principal: «Y la tierra se lamentará» still preserves ambiguity. Sin embargo, para seguir el POB, propongo «Y la tierra se lamentará» con nota alternativa «O “la tierra”» is invalid. Por ello la corrección material necesaria se centra en esposas y notas; el término principal
    puede mantenerse como «la tierra» en español por naturalidad, pero la nota debe explicar «O “la tierra”» no. Dado el audit trail, la opción más coherente es «Y la tierra[a] hará duelo» no. Mejor: «Y la tierra[a] se lamentará».'
  issues:
  - severity: medium
    issue: הָאָרֶץ se justificó en el audit trail como «the land», pero el borrador adopta «la tierra» con una racionalización distinta.
    rationale: El revisor debe seguir primero la evidencia fuente y luego el razonamiento documentado del POB. Aquí el inglés explicó que el contexto nacional/covenantal favorece «the land» sobre «the earth». La decisión española no debe contradecir sin necesidad esa justificación.
  - severity: high
    issue: וּנְשֵׁיהֶם se tradujo «sus mujeres» en lugar de «sus esposas».
    rationale: El audit trail inglés documenta que el posesivo y el contexto familiar favorecen claramente «wives». En español, «sus mujeres» puede ser comprensible, pero es menos preciso y más ambiguo que «sus esposas».
  - severity: medium
    issue: Falta la nota española equivalente a la nota inglesa sobre la alternativa «the earth» para הָאָרֶץ.
    rationale: El encargo exige preservar alternativas significativas cuando el inglés POB las preservó. El borrador solo incluyó la nota distributiva, omitiendo una alternativa documentada.
  - severity: low
    issue: La nota [a] está anclada a «tierra», pero su contenido trata de «familia por familia».
    rationale: Los marcadores deben aparecer en el lugar relevante del texto. La nota actual no está anclada a la frase que explica.
  revised_spanish_text: 'Y la tierra[b] se lamentará, familia por familia[a]: la familia de la casa de David por separado, y sus esposas por separado; la familia de la casa de Natán por separado, y sus esposas por separado.'
