translation:
  language: es
  text: 'Entonces[a], cuando los guardaespaldas pusieron delante ruedas, descoyuntadores, máquinas de estirar, ganchos de garra, catapultas[b], calderos, sartenes, tornillos para los pulgares, manos de hierro, cuñas y las brasas vivas del fuego, el tirano, tomando la palabra, dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Varios nombres de instrumentos en este versículo son raros o técnicos; por eso algunas equivalencias son aproximadas. Entre alternativas posibles están ‘rompearticulaciones’ para ‘descoyuntadores’, ‘racks’ para ‘máquinas de estirar’ y ‘prensas para dedos’ para ‘tornillos para los pulgares’.
    reason: lexical_alternative
  - marker: b
    text: El griego dice ‘catapultas’, un elemento inusual en esta lista. La traducción conserva la lectura del texto en vez de sustituirla por un instrumento de tortura conjectural.
    reason: alternative_reading
lexical_decisions:
- source_word: τροχούς
  english_pob_choice: wheels
  chosen_spanish: ruedas
  alternatives_spanish:
  - ruedas de tortura
  - ruedas para tortura
  lexicon: LSJ
  rationale: El sentido básico es ‘ruedas’. En una lista de instrumentos de tortura, el referente probable es tortura con ruedas, pero el sustantivo griego por sí mismo no especifica más; ‘ruedas’ conserva esa precisión y evita añadir una glosa no exigida.
- source_word: ἀρθρενβόλους
  english_pob_choice: joint-rackers
  chosen_spanish: descoyuntadores
  alternatives_spanish:
  - rompearticulaciones
  - desarticuladores
  lexicon: LSJ
  rationale: Es un compuesto raro ligado a las articulaciones/miembros. ‘Descoyuntadores’ comunica la función de dislocar o sacar de coyuntura sin forzar una identificación más precisa de la que permite el griego.
- source_word: στρεβλωτήριά
  english_pob_choice: stretching-machines
  chosen_spanish: máquinas de estirar
  alternatives_spanish:
  - racks
  - máquinas de tortura
  lexicon: LSJ
  rationale: El término remite a aparatos para torcer, estirar o atormentar. ‘Máquinas de estirar’ es transparente en español moderno y mantiene el valor instrumental del sustantivo.
- source_word: τροχαντῆρας
  english_pob_choice: clawing hooks
  chosen_spanish: ganchos de garra
  alternatives_spanish:
  - ganchos
  - garfios
  lexicon: LSJ
  rationale: Denota instrumentos curvos o con gancho usados en tortura. ‘Ganchos de garra’ conserva la imagen de un implemento ganchudo y violento sin afirmar una identificación técnica más concreta.
- source_word: καταπέλτας
  english_pob_choice: catapults
  chosen_spanish: catapultas
  alternatives_spanish:
  - máquinas de arrojar
  - lanzadores
  lexicon: LSJ
  rationale: El valor ordinario del término es ‘catapultas’. Aunque resulta inusual en una lista de tortura, el texto griego lo presenta de manera directa, por lo que se conserva.
- source_word: λέβητας
  english_pob_choice: cauldrons
  chosen_spanish: calderos
  alternatives_spanish:
  - ollas grandes
  - calderas
  lexicon: LSJ
  rationale: Designa un recipiente metálico grande para hervir. ‘Calderos’ es un equivalente natural en español y encaja con el contexto de instrumentos calentados.
- source_word: τήγανά
  english_pob_choice: frying pans
  chosen_spanish: sartenes
  alternatives_spanish:
  - sartenes para freír
  - parrillas
  lexicon: LSJ
  rationale: El término refiere a recipientes planos para cocinar o calentar. ‘Sartenes’ es la correspondencia idiomática más clara en español.
- source_word: δακτυλήθρας
  english_pob_choice: thumbscrews
  chosen_spanish: tornillos para los pulgares
  alternatives_spanish:
  - prensas para dedos
  - tornillos para dedos
  lexicon: LSJ
  rationale: La palabra se relaciona con los dedos y en contexto alude a un instrumento para comprimirlos. ‘Tornillos para los pulgares’ mantiene la imagen instrumental sin adoptar una equivalencia histórica demasiado específica que el griego no exige.
- source_word: χεῖρας σιδηρᾶς
  english_pob_choice: iron hands
  chosen_spanish: manos de hierro
  alternatives_spanish:
  - garras de hierro
  - pinzas de hierro
  lexicon: LSJ
  rationale: Literalmente es ‘manos de hierro’. La traducción conserva la imagen vívida y no la sustituye por una reconstrucción técnica que el texto no explicita.
- source_word: σφῆνας
  english_pob_choice: wedges
  chosen_spanish: cuñas
  alternatives_spanish:
  - estacas
  - astillas
  lexicon: LSJ
  rationale: El sentido normal es ‘cuñas’. En contexto de tortura, probablemente se trata de cuñas usadas de modo violento, pero se preserva el valor léxico simple.
- source_word: τὰ ζώπυρα τοῦ πυρός
  english_pob_choice: the live coals of the fire
  chosen_spanish: las brasas vivas del fuego
  alternatives_spanish:
  - las brasas ardientes del fuego
  - las ascuas vivas del fuego
  lexicon: LSJ
  rationale: La frase apunta a brasas/ascuas encendidas. ‘Brasas vivas del fuego’ conserva la vivacidad y la redundancia enfática del griego.
- source_word: οἱ δορυφόροι
  english_pob_choice: the bodyguards
  chosen_spanish: los guardias
  alternatives_spanish:
  - los escoltas
  - los lanceros
  lexicon: LSJ
  rationale: Aunque literalmente es ‘portadores de lanza’, en contexto real denota a los guardias del rey o tirano. ‘Guardias’ suena natural en español y transmite bien la función.
- source_word: προέθεσαν
  english_pob_choice: set out
  chosen_spanish: sacaron
  alternatives_spanish:
  - colocaron delante
  - dispusiaron
  lexicon: LSJ
  rationale: El verbo significa poner delante o presentar. En español narrativo, ‘sacaron’ comunica de forma natural que los guardias exhibieron o trajeron los instrumentos ante el tirano.
- source_word: ὑπολαβὼν
  english_pob_choice: took up the matter
  chosen_spanish: tomando la palabra
  alternatives_spanish:
  - respondiendo
  - retomando la palabra
  lexicon: LSJ
  rationale: El participio introduce la respuesta discursiva del tirano. ‘Tomando la palabra’ expresa con naturalidad el paso a su intervención.
- source_word: ὁ τύραννος
  english_pob_choice: the tyrant
  chosen_spanish: el tirano
  alternatives_spanish:
  - el rey
  - el gobernante
  lexicon: LSJ
  rationale: El texto usa explícitamente ‘tirano’, un calificativo cargado moralmente importante en 4 Macabeos. No debe suavizarse a ‘rey’ o ‘gobernante’.
theological_decisions:
- issue: Conservación del juicio moral sobre el gobernante mediante τύραννος
  english_pob_reading: the tyrant
  chosen_spanish_reading: el tirano
  alternative_spanish_readings:
  - el rey
  - el gobernante
  rationale: La obra enmarca al opresor con un término evaluativo; traducirlo como ‘el tirano’ preserva esa valoración y evita neutralizar la postura del autor.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego de Swete 1909 y el expediente auditado en inglés. La revisión más reciente no introdujo cambios, y el contraste de control indicó acuerdo sustancial con observaciones menores; por eso se mantuvieron las lecturas raras o técnicamente inciertas sin normalizarlas.
  spanish_consistency_notes:
  - Se usa ‘tirano’ de manera consistente para τύραννος, conforme al valor evaluativo del texto.
  - Se conserva ‘catapultas’ aun siendo un elemento inesperado, porque el griego lo lee así explícitamente.
  - Se evita ‘SEÑOR’ o equivalentes de ocultamiento, ya que este versículo no contiene el tetragrámaton ni κύριος como sustituto divino.
  - Las equivalencias de instrumentos se mantienen transparentes y no se reemplazan por términos eclesiásticos o tradicionales sin base en la fuente.
