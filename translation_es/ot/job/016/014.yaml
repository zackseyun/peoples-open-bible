translation:
  language: es
  text: Irrumpe contra mí con brecha sobre brecha[a]; se lanza contra mí como un guerrero[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «brecha sobre brecha», conservando más literalmente la repetición del hebreo.
    reason: lexical_alternative
  - marker: b
    text: «Guerrero» también podría traducirse «hombre poderoso» o «campeón».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִפְרְצֵנִי
  english_pob_choice: he breaks through me
  chosen_spanish: me atraviesa
  alternatives_spanish:
  - me rompe
  - me irrumpe
  - me abre brecha en mí
  lexicon: HALOT
  rationale: פרץ expresa romper o abrir violentamente una abertura. «Me atraviesa» comunica el golpe penetrante y hostil sin perder la imagen de irrupción; en español resulta más natural que un calco como «me rompe a través». La preposición enfática del hebreo se mantiene en el sentido del ataque directo sobre el hablante.
- source_word: פֶרֶץ / עַל פְּנֵי פָרֶץ
  english_pob_choice: breach upon breach
  chosen_spanish: brecha sobre brecha
  alternatives_spanish:
  - brecha tras brecha
  - una brecha tras otra
  - brecha sobre abertura
  lexicon: HALOT
  rationale: El sustantivo פֶרֶץ significa «brecha» o «ruptura», y la repetición conserva la acumulación de asaltos. «Brecha sobre brecha» refleja la imagen hebrea de superposición/piling up y mantiene la tensión literaria que la POB inglesa preserva con «breach upon breach».
- source_word: יָרוּץ
  english_pob_choice: he rushes
  chosen_spanish: corre hacia mí
  alternatives_spanish:
  - se lanza contra mí
  - acude corriendo contra mí
  - irrumpe corriendo contra mí
  lexicon: HALOT
  rationale: רוץ describe un movimiento rápido y agresivo; en este contexto hostil, «corre hacia mí» comunica el avance inmediato. «Se lanza contra mí» sería más interpretativo y militar; se evitó para no intensificar más allá del hebreo.
- source_word: עָלַי
  english_pob_choice: at me
  chosen_spanish: hacia mí
  alternatives_spanish:
  - contra mí
  - sobre mí
  - atacando me
  lexicon: HALOT
  rationale: La preposición con un verbo de ataque puede expresar dirección y hostilidad. «Hacia mí» conserva el movimiento de acercamiento del verbo en un español claro; «contra mí» sería posible, pero desplaza el matiz direccional hacia una oposición explícita.
- source_word: כְּגִבּוֹר
  english_pob_choice: like a warrior
  chosen_spanish: como un guerrero
  alternatives_spanish:
  - como un poderoso
  - como un héroe
  - como un campeón
  lexicon: HALOT
  rationale: גִּבּוֹר puede significar «guerrero», «poderoso» o «campeón». Dado el paralelismo con el ataque y la corrida hostil, «guerrero» reproduce bien la imagen bélica de la POB inglesa y es transparente para el lector hispanohablante.
translation_notes:
  revision_awareness: La versión sigue de cerca el texto hebreo y mantiene la repetición enfática del sustantivo פֶרֶץ, en línea con la revisión inglesa sin cambios (high agreement, minor issues).
  spanish_consistency_notes:
  - Se usa «brecha» de manera consistente para פֶרֶץ, preservando la repetición del original.
  - Se evita «SEÑOR» u այլ terminología no presente en el versículo; no hay nombres divinos aquí.
  - «Guerrero» mantiene el valor de גִּבּוֹר sin forzar el matiz a «mighty man» en español corriente.
