revisions:
- from: Yahvé conoce los pensamientos del hombre[a][b][c], porque son vanidad.
  to: Yahvé conoce los pensamientos del hombre[a], que[b] son vanidad[c].
  rationale: 'Se ajusta el texto principal para seguir la decisión auditada de כִּי como ''that/que'' en vez de hacer causal la conjunción en el texto. También se reubican las notas en los términos que realmente comentan: ''hombre'', la conjunción ''que'' y ''vanidad''. Esto mejora tanto la fidelidad al rastro de auditoría como la claridad para el lector español.'
  reviewer_model: gpt-5.4
