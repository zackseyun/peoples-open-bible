- from: Y el varón incircunciso que no sea circuncidado en la carne de su prepucio, esa persona[a][b] será cortada de entre su pueblo; ha quebrantado mi pacto.
  to: Y el varón incircunciso que no haya sido circuncidado en la carne de su prepucio, esa persona[a][b] será cortada de entre su pueblo; ha quebrantado mi pacto.
  rationale: Se hace una reparación menor para que el español exprese con mayor naturalidad y precisión la condición pasiva general del hebreo («no haya sido circuncidado»). También se simplifica la nota léxica sobre נֶפֶשׁ para mantenerla fiel al rastro auditado sin añadir una explicación antropológica más amplia de lo necesario.
