  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: מַשָּׂא como encabezado profético, Arabia como tema del oráculo, יַעַר como bosque/espesura, תָּלִינוּ como pasar la noche, y אֹרְחוֹת דְּדָנִים como caravanas de dedanitas. Sin embargo, en el texto español principal se pierde una distinción fuente-importante al renderizar בַּעְרַב como «de Arabia» en vez de «en Arabia», cuando el POB inglés y la decisión léxica documentada preservan explícitamente la repetición geográfica: «In the forest in Arabia».'
  spanish_quality_summary: El español es claro y digno, pero «En el bosque de Arabia» suaviza demasiado la doble referencia preposicional del hebreo y puede sonar más posesivo/atributivo que locativo. También conviene capitalizar «Dedanitas» para mayor claridad etnónima/toponímica en contexto bíblico. El orden actual de notas [a][b][c] sobre «pasarán la noche» no refleja idealmente sus anclajes semánticos; es mejor anclar [a] a «oráculo», [b] a «bosque», y [c] a «caravanas».
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Oráculo» para מַשָּׂא y «caravanas» para אֹרְחוֹת están bien justificados. La corrección principal es mantener el valor locativo de בַּעְרַב como «en Arabia», no convertirlo en relación atributiva «de Arabia».
  issues:
  - severity: medium
    issue: בַּעְרַב fue traducido en el texto principal como «de Arabia»
    rationale: El hebreo repite la referencia locativa y el POB inglés documenta «in Arabia». «De Arabia» cambia la relación sintáctica a una modificación nominal y no preserva tan de cerca la estructura y énfasis del original.
  - severity: low
    issue: Anclaje de notas al final del verbo en vez de en las palabras relevantes
    rationale: La nota sobre מַשָּׂא debe anclarse a «oráculo», la de יַעַר a «bosque», y la de אֹרְחוֹת a «caravanas». Así se ajusta mejor al principio de notas léxicas localizadas y evita confusión.
  - severity: low
    issue: «dedanitas» en minúscula
    rationale: Aunque no siempre obligatorio en gentilicios, en este contexto bíblico como etnónimo derivado de Dedán, «Dedanitas» mejora la legibilidad y armoniza con el uso de nombre propio.
  revised_spanish_text: 'Un oráculo[a] acerca de Arabia: En el bosque[b] en Arabia pasarán la noche, oh caravanas[c] de Dedanitas.'
