translation:
  language: es
  text: Los reyes de la tierra no creyeron[a], ni ninguno de los habitantes del mundo, que un adversario y un enemigo entrara[b] por las puertas de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no pensaron que fuera posible». El hebreo expresa incredulidad respecto de lo que iba a ocurrir.
    reason: lexical_alternative
  - marker: b
    text: O «viniera». Lit. «viniera/llegara». El hebreo usa un verbo de venir; el español lo vierte como «entrara» para hacer explícito el sentido de acceso por las puertas.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶאֱמִינוּ
  english_pob_choice: did not believe
  chosen_spanish: no lo creyeron
  alternatives_spanish:
  - no lo aceptaron
  - no pensaron que fuera posible
  lexicon: HALOT
  rationale: El hiphil de אמן expresa aquí creer algo como verdadero o creíble. En español, «no lo creyeron» conserva con naturalidad esa incredulidad directa, sin añadir matices ajenos al hebreo.
- source_word: מַלְכֵי אֶרֶץ
  english_pob_choice: the kings of the earth
  chosen_spanish: los reyes de la tierra
  alternatives_spanish:
  - los reyes del país
  - los reyes del mundo
  lexicon: HALOT
  rationale: אֶרֶץ puede significar «tierra» o «país», pero el paralelo con «los habitantes del mundo» favorece un alcance amplio. «Los reyes de la tierra» conserva el registro elevado y la amplitud del hebreo.
- source_word: וְכָל יֹשְׁבֵי תֵבֵל
  english_pob_choice: nor did any of the inhabitants of the world
  chosen_spanish: ni ninguno de los habitantes del mundo
  alternatives_spanish:
  - ni todos los habitantes del mundo
  - y todos los habitantes del mundo
  lexicon: HALOT
  rationale: La negación coordinada se vuelve natural en español con «ni ninguno de». תֵבֵל designa el mundo habitado; por eso «del mundo» mantiene el alcance universal del verso.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo que no se creyó, así que «que» reproduce con claridad la subordinación del discurso indirecto.
- source_word: יָבֹא
  english_pob_choice: would enter
  chosen_spanish: entrara
  alternatives_spanish:
  - entraría
  - viniera
  lexicon: HALOT
  rationale: El hebreo expresa la llegada/entrada esperada del enemigo; en español, el subjuntivo «entrara» comunica bien ese contenido dentro de la oración subordinada sin forzar una perífrasis menos natural.
- source_word: צַר
  english_pob_choice: an adversary
  chosen_spanish: un adversario
  alternatives_spanish:
  - un enemigo
  - un opresor
  lexicon: HALOT
  rationale: צַר nombra al que se opone o acosa. «Adversario» preserva el valor léxico distintivo y evita repetir de forma plana el término siguiente.
- source_word: וְאוֹיֵב
  english_pob_choice: and an enemy
  chosen_spanish: y un enemigo
  alternatives_spanish:
  - o un enemigo
  lexicon: HALOT
  rationale: אוֹיֵב es el término común para «enemigo». Mantener ambos sustantivos distingue la doble designación enfática del hebreo.
- source_word: בְּשַׁעֲרֵי יְרוּשָׁלִָם
  english_pob_choice: the gates of Jerusalem
  chosen_spanish: por las puertas de Jerusalén
  alternatives_spanish:
  - en las puertas de Jerusalén
  - a las puertas de Jerusalén
  lexicon: HALOT
  rationale: El hebreo usa ב con el sustantivo de «puertas» tras un verbo de movimiento. En español, «por las puertas de Jerusalén» comunica la idea de irrupción/entrada de manera idiomática y fiel al contexto.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que prefirió «would enter» frente a «could enter», porque el hebreo señala un hecho esperado/previsto, no solo una posibilidad abstracta. La redacción española sigue esa línea con un subjuntivo subordinado que preserva la expectativa futura dentro del discurso indirecto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - «Tierra» y «mundo» conservan la distinción hebrea entre אֶרֶץ y תֵבֵל.
  - Se evitó uniformar צַר y אוֹיֵב en un solo término para preservar la duplicación enfática del original.
