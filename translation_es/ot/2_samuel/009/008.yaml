translation:
  language: es
  text: 'Y se postró y dijo: «¿Qué es tu siervo[a], que te hayas vuelto hacia[b] un perro muerto como yo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Un perro muerto» es un modismo de extrema auto-humillación y devaluación personal.
    reason: cultural_note
  - marker: b
    text: O «prestado atención a» o «tenido consideración de». El hebreo dice literalmente «te has vuelto hacia», imagen de atención benigna o consideración graciosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: bowed down
  chosen_spanish: se postró
  alternatives_spanish:
  - se inclinó
  - se arrodilló
  - rindió homenaje
  lexicon: HALOT
  rationale: El hebreo וַיִּשְׁתַּחוּ expresa una postura de reverencia o sumisión. En español, «se postró» conserva el gesto físico con dignidad y sin forzar una lectura exclusivamente cultual o exclusivamente cortesana.
- source_word: מֶה עַבְדֶּךָ
  english_pob_choice: What is your servant
  chosen_spanish: ¿Qué es tu siervo?
  alternatives_spanish:
  - ¿Quién es tu siervo?
  - ¿Qué soy yo, tu siervo?
  lexicon: HALOT
  rationale: La pregunta hebrea es idiomática y de auto-humillación. «¿Qué es tu siervo?» mantiene el giro literal y la voz humilde mejor que una paráfrasis más libre.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - que
  - porque
  lexicon: HALOT
  rationale: En esta cláusula, כִּי introduce el contenido o resultado de la pregunta retórica. «Para que» comunica bien la relación de motivo/resultado en español sin perder la fuerza del hebreo.
- source_word: פָנִיתָ אֶל
  english_pob_choice: you have turned toward
  chosen_spanish: te hayas fijado en
  alternatives_spanish:
  - te hayas vuelto hacia
  - hagas caso de
  - te hayas vuelto a
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice «volverte hacia», pero aquí el sentido es de atención benigna y reconocimiento de un superior hacia un inferior. «Te hayas fijado en» conserva la idea de atención graciosa en un español natural.
- source_word: הַכֶּלֶב הַמֵּת
  english_pob_choice: a dead dog
  chosen_spanish: un perro muerto
  alternatives_spanish:
  - un perro muerto como este
  - un perro muerto así
  lexicon: HALOT
  rationale: La imagen es una auto-depreciación extrema. «Perro muerto» reproduce el valor idiomático con claridad en español y evita suavizar la fuerza de la expresión.
- source_word: אֲשֶׁר כָּמוֹנִי
  english_pob_choice: like me
  chosen_spanish: como yo
  alternatives_spanish:
  - tal como yo
  - semejante a mí
  lexicon: HALOT
  rationale: El relativo final compara al hablante con el «perro muerto». «Como yo» es conciso y fiel, y mantiene la auto-humillación de la comparación.
translation_notes:
  revision_awareness: 'Alineado con el audit trail inglés de POB: se preserva el gesto de postración, la auto-humillación de la fórmula hebrea y la imagen idiomática de «perro muerto», con una decisión española equivalente para פנה אֶל que expresa atención graciosa sin borrar la metáfora de dirección.'
  spanish_consistency_notes:
  - Se mantiene «siervo» por la auto-referencia cortesana del hebreo, no «esclavo», siguiendo el valor contextual documentado.
  - «Se postró» y «perro muerto» conservan el tono de humillación sin suavizar la expresión.
  - El marcador [a] se ubica en el verbo de atención para sostener la alternativa semántica del hebreo.
