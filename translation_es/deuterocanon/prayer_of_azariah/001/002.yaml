translation:
  language: es
  text: Entonces Azarías se puso de pie y oró así[a], y, abriendo su boca, dio gracias al Señor junto con sus compañeros en medio del fuego, mientras el horno era calentado intensamente por los caldeos. Y dijeron,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «confesó» o «alabó»; el verbo griego puede expresar confesión, acción de gracias o alabanza según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: στὰς
  english_pob_choice: stood
  chosen_spanish: se puso de pie
  alternatives_spanish:
  - estuvo en pie
  - se levantó
  lexicon: LSJ
  rationale: El participio aoristo funciona de manera adverbial antes del verbo principal. En español, «se puso de pie» conserva la acción narrativa sin sonar rígido o demasiado calcado.
- source_word: προσηύξατο
  english_pob_choice: prayed
  chosen_spanish: oró
  alternatives_spanish:
  - oró en oración
  - hizo oración
  lexicon: LSJ
  rationale: «Oró» es la forma directa y natural en español para προσεύχομαι en este contexto litúrgico/narrativo.
- source_word: οὕτως
  english_pob_choice: thus
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - de este modo
  lexicon: LSJ
  rationale: Introduce el contenido de la oración; «así» mantiene el tono formal y la relación cercana con el griego.
- source_word: ἀνοίξας τὸ στόμα αὐτοῦ
  english_pob_choice: opening his mouth
  chosen_spanish: al abrir su boca
  alternatives_spanish:
  - habiendo abierto su boca
  - abriendo su boca
  lexicon: LSJ
  rationale: Es una expresión narrativa solemne de habla formulaica. «Al abrir su boca» conserva el matiz elevado sin reducirlo a simplemente «dijo».
- source_word: ἐξωμολογεῖτο
  english_pob_choice: gave thanks
  chosen_spanish: dio gracias
  alternatives_spanish:
  - confesó
  - alabó
  lexicon: LSJ
  rationale: La revisión inglesa optó por «gave thanks» para reflejar mejor el contexto. En español, «dio gracias» reproduce esa decisión y sigue permitiendo la tensión semántica del verbo, que también puede implicar confesión o alabanza según el contexto.
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Dios
  lexicon: LSJ
  rationale: En este contexto judío de Escritura, κύριος se refiere reverentemente a Dios; «Señor» es la correspondencia natural en español.
- source_word: ἅμα τοῖς συνεταίροις αὐτοῦ
  english_pob_choice: together with his companions
  chosen_spanish: junto con sus compañeros
  alternatives_spanish:
  - con sus compañeros
  - junto a sus compañeros
  lexicon: LSJ
  rationale: «Compañeros» expresa bien συνεταῖροι como los otros jóvenes que están con él; «junto con» preserva la idea de acompañamiento.
- source_word: ἐν μέσῳ τῷ πυρί
  english_pob_choice: in the midst of the fire
  chosen_spanish: en medio del fuego
  alternatives_spanish:
  - en medio de las llamas
  - en el centro del fuego
  lexicon: LSJ
  rationale: La locución española «en medio del fuego» mantiene la imagen viva y la solemnidad del original.
- source_word: ὑποκαιομένης τῆς καμίνου
  english_pob_choice: while the furnace was being intensely heated
  chosen_spanish: mientras el horno era calentado intensamente
  alternatives_spanish:
  - mientras el horno estaba siendo avivado
  - mientras el horno ardía con fuerza
  lexicon: LSJ
  rationale: El griego expresa un estado en curso del horno con un valor intensivo. «Era calentado intensamente» conserva ese aspecto progresivo y la fuerza del adverbio sin añadir información ajena.
- source_word: ὑπὸ τῶν Χαλδαίων
  english_pob_choice: by the Chaldeans
  chosen_spanish: por los caldeos
  alternatives_spanish:
  - por los babilonios
  lexicon: LSJ
  rationale: El texto griego nombra explícitamente a los caldeos; se retiene esa designación en español en vez de generalizarla.
- source_word: σφόδρα
  english_pob_choice: intensely
  chosen_spanish: intensamente
  alternatives_spanish:
  - muchísimo
  - en gran manera
  lexicon: LSJ
  rationale: Modifica la intensidad del calentamiento del horno. «Intensamente» es preciso y natural en español contemporáneo formal.
- source_word: καὶ εἶπαν
  english_pob_choice: And they said,
  chosen_spanish: Y dijeron,
  alternatives_spanish:
  - Y dijo,
  lexicon: LSJ
  rationale: Se conserva el plural del texto transmitido, que introduce el canto/oración como voz compartida, en coherencia con la mención previa de sus compañeros.
theological_decisions:
- issue: Sentido de ἐξωμολογεῖτο en una oración que mezcla confesión y alabanza/acción de gracias
  english_pob_reading: gave thanks
  chosen_spanish_reading: dio gracias
  alternative_spanish_readings:
  - confesó
  - alabó
  rationale: La revisión más reciente del POB inglés privilegia «gave thanks» por el contexto inmediato. En español, «dio gracias» reproduce esa lectura sin borrar la posibilidad semántica de confesión o alabanza que el verbo puede tener; así se preserva la tensión teológica en lugar de resolverla de forma exclusiva.
  doctrine_reference: Preservar la tensión lexical y teológica del texto; documentar alternativas sin imponer una sola reducción semántica.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que cambió «confessed» por «gave thanks» para ἐξωμολογεῖτο. Por eso el español adopta «dio gracias» en el texto principal y conserva en nota las alternativas semánticas documentadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica aquí, porque κύριος en este contexto griego corresponde reverentemente a «Señor».
  - Se mantuvo «caldeos» por fidelidad al etnónimo explícito del griego.
  - Se conservó el plural final «Y dijeron» siguiendo el texto transmitido y la referencia a los compañeros.
