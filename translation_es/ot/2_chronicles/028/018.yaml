translation:
  language: es
  text: Y los filisteos habían hecho incursiones en las ciudades de la Sefelá y del Négueb de Judá, y capturaron Bet-semes, Ajalón, Gederot, Soko[a] y sus aldeas, Timna y sus aldeas, y Gimzo y sus aldeas; y se establecieron allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Soco».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְלִשְׁתִּים
  english_pob_choice: And the Philistines
  chosen_spanish: Y los filisteos
  alternatives_spanish:
  - Ahora los filisteos
  - Los filisteos
  lexicon: HALOT
  rationale: Se mantiene el etnónimo bíblico directo. El encabezamiento con 'Y' conserva la continuidad narrativa del hebreo y del POB en inglés.
- source_word: פָּשְׁטוּ
  english_pob_choice: had raided
  chosen_spanish: habían hecho incursiones
  alternatives_spanish:
  - habían invadido
  - habían asolado
  - habían saqueado
  lexicon: HALOT
  rationale: El verbo expresa incursiones militares previas al listado de capturas. 'Habían hecho incursiones' preserva la idea de ataque repetido o de pillaje sin forzar una traducción más específica de saqueo si el contexto no la exige.
- source_word: בְּעָרֵי הַשְּׁפֵלָה וְהַנֶּגֶב לִיהוּדָה
  english_pob_choice: the cities of the lowland and the Negeb of Judah
  chosen_spanish: las ciudades de la Sefelá y del Négueb de Judá
  alternatives_spanish:
  - las ciudades de la llanura baja y del Négueb de Judá
  - las ciudades de los montes bajos y del sur de Judá
  lexicon: HALOT
  rationale: '''Sefelá'' y ''Négueb'' conservan los nombres geográficos técnicos del texto. En español, la transliteración mantiene la identificación regional mejor que una glosa general como ''sur'' o ''llanura baja''.'
- source_word: וַיִּלְכְּדוּ
  english_pob_choice: they captured
  chosen_spanish: capturaron
  alternatives_spanish:
  - tomaron
  - apresaron
  - se apoderaron de
  lexicon: HALOT
  rationale: Verbo militar normal para tomar ciudades; 'capturaron' es preciso y natural en español.
- source_word: בֵּית שֶׁמֶשׁ
  english_pob_choice: Beth-shemesh
  chosen_spanish: Bet-semes
  alternatives_spanish:
  - Bet Shemesh
  - Betsames
  lexicon: HALOT
  rationale: Se translitera el topónimo con forma clara y uniforme en español bíblico moderno.
- source_word: אַיָּלוֹן
  english_pob_choice: Aijalon
  chosen_spanish: Ajalón
  alternatives_spanish:
  - Ayalón
  lexicon: HALOT
  rationale: Ajalón es una forma asentada y legible en español; respeta el nombre propio sin depender de la grafía inglesa.
- source_word: הַגְּדֵרוֹת
  english_pob_choice: Gederoth
  chosen_spanish: Gederot
  alternatives_spanish:
  - Gederot(h)
  lexicon: HALOT
  rationale: Topónimo transliterado de manera directa. Se evita añadir terminaciones ajenas al español.
- source_word: שׂוֹכוֹ
  english_pob_choice: Soko
  chosen_spanish: Soco
  alternatives_spanish:
  - Soko
  - Socó
  lexicon: HALOT
  rationale: Se conserva la variante española que la nota auditada del POB deja abierta como alternativa textual/lexical en inglés. 'Soco' es una forma breve y publicable en español.
- source_word: וּבְנוֹתֶיהָ / בְּנֹתֶיהָ
  english_pob_choice: and its villages
  chosen_spanish: y sus aldeas
  alternatives_spanish:
  - y sus hijas
  - y sus ciudades dependientes
  - y sus poblados
  lexicon: HALOT
  rationale: La expresión hebrea literalmente 'sus hijas' es un idiomático geográfico. 'Aldeas' comunica la relación de dependencia sin sonar artificial en español.
- source_word: תִּמְנָה
  english_pob_choice: Timnah
  chosen_spanish: Timna
  alternatives_spanish:
  - Timná
  lexicon: HALOT
  rationale: Topónimo transliterado. 'Timna' es transparente y consistente con el uso bíblico en español contemporáneo.
- source_word: גִּמְזוֹ
  english_pob_choice: Gimzo
  chosen_spanish: Gimzo
  lexicon: HALOT
  rationale: Topónimo propio transliterado directamente.
- source_word: וַיֵּשְׁבוּ שָׁם
  english_pob_choice: and they settled there
  chosen_spanish: y se establecieron allí
  alternatives_spanish:
  - y habitaron allí
  - y vivieron allí
  - y se asentaron allí
  lexicon: HALOT
  rationale: '''Se establecieron'' comunica ocupación y residencia tras la conquista, de manera natural y fiel al contexto militar.'
theological_decisions:
- issue: Preservación de los nombres geográficos técnicos frente a glosas interpretativas
  english_pob_reading: the cities of the lowland and the Negeb of Judah
  chosen_spanish_reading: las ciudades de la Sefelá y del Négueb de Judá
  alternative_spanish_readings:
  - las ciudades de la llanura baja y del sur de Judá
  - las ciudades de la región baja y del Négueb de Judá
  rationale: La decisión mantiene términos regionales específicos que funcionan como topónimos bíblicos y no solo como descripciones generales. Esto evita perder el valor histórico-geográfico del versículo.
  doctrine_reference: Principio de precisión textual y geográfica en la traducción bíblica
translation_notes:
  revision_awareness: 'Coincide con el estado revisado más reciente del POB inglés: no hubo cambios aplicados y el control cruzado reportó alto acuerdo. La versión española sigue la misma decisión sobre el topónimo ambiguo de שׂוֹכוֹ, manteniendo una alternativa en nota.'
  spanish_consistency_notes:
  - Se usa 'Y' inicial para conservar el enlace narrativo del hebreo.
  - Se mantiene 'Yahvé' como norma del proyecto, aunque este versículo no contiene el nombre divino explícito.
  - Se evita 'Señor' o glosas devocionales no presentes en el texto.
  - Los topónimos se transliteran de forma consistente en español bíblico moderno.
  - '''Sefelá'' y ''Négueb'' se conservan como nombres regionales técnicos para no diluir el referente histórico.'
