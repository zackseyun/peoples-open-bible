translation:
  language: es
  text: Porque la esperanza de la arrogancia es pecado[a], y su fuente hace brotar maldad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Porque el principio del orgullo es pecado, y el que se aferra a él derramará abominación». El griego refleja una primera cláusula notablemente distinta y amplía la segunda.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִקְוֵה
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - principio
  - comienzo
  - manantial
  - fuente
  lexicon: HALOT
  rationale: El hebreo מִקְוֵה puede expresar esperanza o aquello en lo que uno confía; aquí el contexto sapiencial favorece una abstracción moral, por lo que «esperanza» conserva el sentido principal del testimonio hebreo. Se evita introducir el valor de «principio» del griego en el texto principal, pero se documenta como alternativa textual.
- source_word: זָדוֹן
  english_pob_choice: arrogance
  chosen_spanish: arrogancia
  alternatives_spanish:
  - orgullo
  - insolencia
  - presunción
  lexicon: HALOT
  rationale: זָדוֹן designa una actitud de orgullo presuntuoso y desafiante. «Arrogancia» comunica bien esa postura en español moderno y mantiene la cercanía semántica con la opción inglesa del POB y con ὑπερηφανία del griego.
- source_word: חֵטְא
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - falta
  - ofensa
  lexicon: HALOT
  rationale: El hebreo חֵטְא es el término corriente para «pecado». En español bíblico contemporáneo, «pecado» es la equivalencia más directa y natural, y también coincide con ἁμαρτία en el paralelo griego.
- source_word: מְקוֹרָהּ
  english_pob_choice: its source
  chosen_spanish: su fuente
  alternatives_spanish:
  - su manantial
  - su origen
  - su spring
  lexicon: HALOT
  rationale: La imagen hebrea es la de una fuente o manantial que produce algo. «Su fuente» conserva la metáfora hídrica y suena natural en español; además, permite enlazar con el verbo siguiente sin forzar una reinterpretación.
- source_word: יַבִּיעַ
  english_pob_choice: pours out
  chosen_spanish: derrama
  alternatives_spanish:
  - brota
  - mana
  - hace brotar
  lexicon: HALOT
  rationale: El verbo hebreo sugiere un fluir o brotar abundante desde una fuente. «Derrama» comunica bien esa salida continua en español y mantiene la imagen de algo que se vierte desde la fuente.
- source_word: זִמָּה
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - deprava­ción
  - iniquidad
  - perversidad
  lexicon: HALOT
  rationale: זִמָּה puede abarcar maldad, plan perverso o conducta vergonzosa. En este contexto sapiencial, «maldad» preserva el alcance moral amplio sin restringirlo a una esfera sexual o a una matiz demasiado técnico.
theological_decisions:
- issue: Diferencia entre el hebreo «mִקְוֵה זָדוֹן» y el griego «ἀρχὴ ὑπερηφανίας»
  english_pob_reading: For the hope of arrogance is sin, and its source pours out wickedness.
  chosen_spanish_reading: Porque la esperanza de la arrogancia es pecado, y su fuente derrama maldad.
  alternative_spanish_readings:
  - Porque el principio del orgullo es pecado, y el que se aferra a él derramará abominación.
  - Porque el comienzo de la soberbia es pecado, y su fuente derrama abominación.
  rationale: Se sigue el testimonio hebreo conservado como base principal para Sirácide, porque el proyecto da primacía al original superviviente cuando existe. El griego se mantiene como lectura alternativa importante en nota, ya que presenta una primera cláusula distinta y una segunda más enfática; no se incorpora al cuerpo para no borrar la tensión textual documentada.
  doctrine_reference: Translation philosophy §1; principio de primacía de la evidencia original superviviente sobre la tradición de traducción.
- issue: Valor de «זִמָּה» en este contexto
  english_pob_reading: wickedness
  chosen_spanish_reading: maldad
  alternative_spanish_readings:
  - abominación
  - depravación
  - maldad vergonzosa
  rationale: Aunque el griego usa βδέλυγμα («abominación»), el hebreo ofrece un término más amplio que puede referirse a maldad o perversidad. «Maldad» evita estrechar indebidamente el sentido y deja visible la diferencia con el griego, que el POB inglés nota en su pie.
  doctrine_reference: PHILOSOPHY.md sobre no uniformar artificialmente las tradiciones hebrea y griega; mantener tensiones léxicas relevantes.
translation_notes:
  revision_awareness: 'No se aplicaron revisiones posteriores en el expediente: el último pase indica que no hubo cambios necesarios. Se conservó la tensión textual entre el hebreo y el griego sin fusionarlos en una sola paráfrasis.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiere explícitamente; aquí no aparece.
  - Se mantuvo «pecado» para חֵטְא y no «falta», por consistencia con el valor moral directo del término.
  - «Maldad» preserva el alcance general de זִמָּה y evita intensificarla sin base suficiente.
  - La puntuación reproduce una estructura breve y sapiencial, con primera cláusula causal y segunda coordinada.
