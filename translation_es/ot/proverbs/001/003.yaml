review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura de propósito y el sentido general de formación sapiencial, pero no preserva adecuadamente la distinción léxica de la tríada ética hebrea. צֶדֶק, מִשְׁפָּט y מֵישָׁרִים están diferenciados en la evidencia fuente y en el POB inglés como 'righteousness, justice, and equity/uprightness'; el español draft los redistribuye como 'justicia, derecho y rectitud', lo que desplaza מִשְׁפָּט hacia un tecnicismo menos natural ('derecho') y hace perder la mejor correspondencia de צֶדֶק como 'rectitud'. Además, 'prudencia sabia' suena poco idiomático y algo redundante para הַשְׂכֵּל.
  spanish_quality_summary: La frase es comprensible, pero 'prudencia sabia' no suena natural en español eclesial general. 'Derecho' en una lista ética puede leerse como sistema legal o derechos subjetivos, no como 'justicia'. Una formulación más clara y fiel es 'para recibir instrucción en prudencia, rectitud, justicia y equidad', que mantiene buen paralelismo y legibilidad.
  glossary_alignment: 'No hay términos del glosario principal comprometidos aquí. Sin embargo, a nivel léxico-teológico del proyecto, conviene conservar la diferenciación semántica: צֶדֶק -> ''rectitud'', מִשְׁפָּט -> ''justicia'', מֵישָׁרִים -> ''equidad'' con nota alternativa ''rectitud''/''lo recto'' si se desea reflejar el campo semántico. ''Instrucción'' para מוּסַר y ''recibir'' para לָקַחַת están bien alineados.'
  issues:
  - severity: medium
    issue: הַשְׂכֵּל traducido como 'prudencia sabia'
    rationale: La expresión es redundante y poco idiomática en español. El hebreo apunta a prudencia práctica o sensatez en la conducta; 'prudencia' basta y suena natural.
  - severity: high
    issue: צֶדֶק / מִשְׁפָּט / מֵישָׁרִים no se distinguen con suficiente fidelidad
    rationale: El borrador usa 'justicia, derecho y rectitud', pero 'derecho' no es la mejor opción contextual para מִשְׁפָּט y la correspondencia más fiel al triángulo semántico es 'rectitud, justicia y equidad'.
  - severity: medium
    issue: Falta nota para la alternativa léxica de מֵישָׁרִים preservada en el POB inglés
    rationale: El POB inglés conserva 'uprightness' como alternativa a 'equity'. En español conviene reflejar esa alternativa para no perder el matiz de 'rectitud/lo recto'.
  revised_spanish_text: para recibir instrucción en prudencia, rectitud, justicia y equidad[a].
