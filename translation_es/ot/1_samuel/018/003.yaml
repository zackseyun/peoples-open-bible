translation:
  language: es
  text: Entonces Jonatán hizo una alianza con David[b][a], porque lo amaba como a su propia alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, ‘cortó una alianza’.
    reason: lexical_alternative
  - marker: b
    text: 'O: ‘en su amor por él’. Los pronombres hebreos son formalmente ambiguos, pero el contexto favorece: Jonatán amaba a David como a su propia alma.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּכְרֹת
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - cortó
  - concertó
  - estableció
  lexicon: HALOT
  rationale: El hebreo expresa literalmente ‘cortar’ un pacto, pero en español ‘hizo un pacto’ comunica de forma natural el sentido idiomático de כרת ברית sin perder la solemnidad del acto. Se mantiene la alternativa literal en nota.
- source_word: יְהוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: Convención onomástica bíblica en español
  rationale: Se usa la forma española estándar del nombre propio, ampliamente reconocible para lectores bíblicos en español.
- source_word: וְדָוִד
  english_pob_choice: and David
  chosen_spanish: y David
  alternatives_spanish:
  - David
  lexicon: Convención onomástica bíblica en español
  rationale: La conjunción hebrea es aditiva y el nombre propio se conserva en su forma española estándar.
- source_word: בְּרִית
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - pacto solemne
  - convenio
  lexicon: HALOT
  rationale: ‘ברית’ puede traducirse como ‘pacto’ o ‘alianza’; en español ‘pacto’ expresa bien el carácter formal y vinculante. ‘Alianza’ también es posible, pero ‘pacto’ evita asociaciones modernas demasiado genéricas y mantiene la fuerza relacional del término.
- source_word: בְּאַהֲבָתוֹ
  english_pob_choice: because he loved
  chosen_spanish: porque lo amaba
  alternatives_spanish:
  - por su amor por él
  - en su amor por él
  - porque le amaba
  lexicon: HALOT
  rationale: El prefijo בְּ se entiende en sentido causal o circunstancial. En español, ‘porque lo amaba’ transmite con claridad la base afectiva del pacto, sin forzar una construcción demasiado literal.
- source_word: אֹתוֹ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: Pronombre de objeto directo
  rationale: El objeto directo se expresa de modo natural con ‘lo’ en español. El referente es David, conforme al contexto inmediato.
- source_word: כְּנַפְשׁוֹ
  english_pob_choice: as his own soul
  chosen_spanish: como a su propia alma
  alternatives_spanish:
  - como a sí mismo
  - como a su propia vida
  - como a su propio ser
  lexicon: HALOT
  rationale: ‘נפשׁ’ puede significar ‘alma’, ‘vida’ o ‘ser’. Se conserva ‘alma’ para respetar la imagen hebrea y su resonancia bíblica; el ‘como a’ ayuda a naturalizar la comparación en español sin eliminar el paralelismo original.
theological_decisions:
- issue: Referente de los pronombres en la cláusula causal
  english_pob_reading: Jonathan loved David as his own soul.
  chosen_spanish_reading: Jonatán amaba a David como a su propia alma.
  alternative_spanish_readings:
  - David amaba a Jonatán como a su propia alma
  - la frase es formalmente ambigua fuera del contexto
  rationale: Aunque la forma pronominal hebrea podría considerarse ambigua en aislamiento, el contexto inmediato favorece claramente a Jonatán como sujeto del amor y a David como objeto. La traducción sigue ese referente contextual sin añadir interpretaciones extrañas.
  doctrine_reference: Mantener la tensión textual y resolver solo lo que el contexto inmediato permite resolver.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: sujeto singular (‘Jonatán’) con verbo singular, y cláusula causal conservada. Se mantiene la expresión comparativa ‘como a su propia alma’ para reflejar la imagen hebrea, con nota para la literalidad idiomática de ‘cortar un pacto’ y para la ambigüedad formal de los pronombres.'
  spanish_consistency_notes:
  - Se usa ‘Jonatán’ como forma española consistente del nombre.
  - Se evita ‘SEÑOR’ porque el texto no contiene el Tetragrámaton ni un sustituto necesario.
  - ‘Pacto’ se elige como equivalente principal de בְּרִית, en línea con el valor formal del término.
  - Se conserva ‘alma’ para נֶפֶשׁ por fidelidad léxica y resonancia bíblica.
  - El orden de la oración sigue la sintaxis española natural sin perder la relación causal del hebreo.
