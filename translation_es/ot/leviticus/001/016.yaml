review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia ritual y las decisiones léxicas principales del hebreo: quitar el buche, con sus plumas, echarlo junto al altar, en el lado oriental, al lugar de las cenizas. Sin embargo, no preserva adecuadamente el aparato de notas del POB inglés: la nota [a] fue reemplazada por una alternativa de verbo que no está documentada en el inglés, y falta la nota sobre la alternativa léxica de מֻרְאָתוֹ (''crop/craw''). Además, la nota [b] cambió de función: el inglés documenta la lectura alternativa ''with its filth'' para בְּנֹצָתָהּ, pero el español la movió a una nota estilística sobre ''lado oriente''.'
  spanish_quality_summary: El texto es mayormente natural y legible, pero 'al lado oriente' suena poco idiomático en español general y requiere nota compensatoria innecesaria. 'En el lado oriental' o 'en el lado este' es más claro y digno. También conviene ajustar el pronombre de objeto a femenino ('la echará'), ya que se refiere a la parte removida (la molleja/el buche/la parte extraída), aunque el antecedente inmediato en español puede variar; una formulación con 'la' evita aspereza. 'Quitará su buche con sus plumas' es entendible, pero en español sacrificial 'le quitará el buche con sus plumas' fluye mejor.
  glossary_alignment: No hay conflictos con terminología teológica de proyecto. Léxicamente, 'buche' para מֻרְאָתוֹ y 'plumas' para בְּנֹצָתָהּ están alineados con el razonamiento auditado. Debe restaurarse la nota alternativa sobre 'buche'/'papo' o 'buche'/'craw' de forma útil en español, y conservarse la nota sobre la posible traducción 'con su suciedad' para בְּנֹצָתָהּ.
  issues:
  - severity: high
    issue: La nota [a] no corresponde al aparato crítico del POB inglés.
    rationale: El inglés usa [a] para la alternativa léxica de 'its crop' ('its craw'), pero el español la reasignó a 'quitará/retirará', lo cual altera la documentación auditada.
  - severity: high
    issue: Falta la nota sobre la lectura alternativa de בְּנֹצָתָהּ.
    rationale: El POB inglés conserva explícitamente la alternativa 'with its filth'; el español debe preservar esa información en nota, no reemplazarla por una observación estilística sobre 'lado oriente'.
  - severity: medium
    issue: '''Al lado oriente'' es poco natural en español general.'
    rationale: Aunque comprensible, suena calcado. 'En el lado oriental' comunica mejor קֵדְמָה sin necesidad de nota estilística.
  - severity: low
    issue: La construcción verbal puede mejorarse en naturalidad ritual.
    rationale: '''Le quitará el buche...'' y ''la echará...'' suenan más naturales que ''quitará su buche...'' y ''lo echará'', manteniendo el mismo sentido.'
  revised_spanish_text: Le quitará el buche[a] con sus plumas[b], y la echará junto al altar, en el lado oriental, al lugar de las cenizas.
  revised_footnotes:
