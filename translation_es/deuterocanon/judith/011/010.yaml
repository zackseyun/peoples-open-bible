    rationale: Aunque ἐκδικάται puede reflejar la idea de vindicación/ejecución de justicia, en este contexto paralelo a «ni la espada prevalece» el sentido es que no les sobreviene castigo o derrota. La formulación actual puede entenderse al revés o sonar extraña para lectores hispanos.
