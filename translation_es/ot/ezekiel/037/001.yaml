translation:
  language: es
  text: La mano de Yahvé estuvo sobre mí[a], y me sacó por el Espíritu de Yahvé y me puso en medio del valle[b]; y ella estaba llena de huesos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el Espíritu de Yahvé». El hebreo puede expresar tanto el medio instrumental («por el Espíritu») como la esfera o estado de la experiencia profética.'
    reason: alternative_reading
  - marker: b
    text: «Valle» también puede rendirse como «llanura» o «valle ancho».
    reason: alternative_reading
lexical_decisions:
- source_word: יַד יְהוָה
  english_pob_choice: the hand of Yahweh
  chosen_spanish: la mano de Yahvé
  alternatives_spanish:
  - la mano de Yahvé sobre mí
  - la mano de Yahvé
  lexicon: HALOT
  rationale: Conservo la imagen concreta de ‘mano’ y el nombre divino ‘Yahvé’, siguiendo la decisión POB de no sustituir el nombre por un título. En español, ‘estuvo sobre mí’ expresa bien la idea de influencia o presión profética sin convertirla en abstracción.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto fuente usa el Tetragrámaton; la política española del proyecto es ‘Yahvé’. Se evita el reemplazo litúrgico ‘SEÑOR’ para preservar la transparencia con el hebreo.
- source_word: וַיּוֹצִאֵנִי
  english_pob_choice: he brought me out
  chosen_spanish: me sacó
  alternatives_spanish:
  - me llevó fuera
  - me trajo fuera
  lexicon: HALOT
  rationale: El causativo de יצא admite ‘sacar’ o ‘hacer salir’. ‘Me sacó’ es natural en español y mantiene la acción de traslado sin añadir matices no exigidos por el hebreo.
- source_word: בְּרוּחַ יְהוָה
  english_pob_choice: by the Spirit of Yahweh
  chosen_spanish: por el Espíritu de Yahvé
  alternatives_spanish:
  - en el Espíritu de Yahvé
  - por el viento de Yahvé
  lexicon: HALOT
  rationale: Sigo la lectura POB de agencia instrumental, ‘por’, que en español comunica bien el medio del traslado profético. ‘Espíritu’ preserva la fuerza teológica frente a una lectura meteorológica de ‘viento’, que aquí no es la preferida por el contexto.
- source_word: וַיְנִיחֵנִי
  english_pob_choice: and set me down
  chosen_spanish: me puso
  alternatives_spanish:
  - me dejó
  - me colocó
  lexicon: HALOT
  rationale: El hiphil de נוח expresa causar reposo o ubicación. ‘Me puso’ es breve, idiomático y suficientemente preciso en español para el gesto de dejar a Ezequiel en un lugar determinado.
- source_word: בְּתוֹךְ הַבִּקְעָה
  english_pob_choice: in the middle of the valley
  chosen_spanish: en medio del valle
  alternatives_spanish:
  - en el centro del valle
  - en medio de la llanura
  lexicon: HALOT
  rationale: ‘En medio de’ reproduce fielmente בְּתוֹךְ. ‘Valle’ sigue la opción POB y es suficientemente amplia para la posible referencia a una depresión o llanura; no fuerzo ‘llanura’ porque el contexto inmediato permite ‘valle’ con naturalidad.
- source_word: מְלֵאָה עֲצָמוֹת
  english_pob_choice: full of bones
  chosen_spanish: estaba lleno de huesos
  alternatives_spanish:
  - estaba repleto de huesos
  - estaba lleno de huesos
  lexicon: HALOT
  rationale: ‘Estaba lleno de huesos’ mantiene la crudeza de la imagen hebrea. Aunque ‘valle’ es femenino, el verbo concuerda con ‘este’ implícito referido al lugar; la construcción española busca claridad narrativa sin perder el referente local.
theological_decisions:
- issue: 'רוּחַ יְהוָה: agente espiritual o fenómeno natural'
  english_pob_reading: by the Spirit of Yahweh
  chosen_spanish_reading: por el Espíritu de Yahvé
  alternative_spanish_readings:
  - en el Espíritu de Yahvé
  - por el viento de Yahvé
  rationale: La escena describe una experiencia profética de transporte y comisión divina; por eso ‘Espíritu’ conserva la lectura teológica preferida por el POB. No se descarta totalmente la polisemia de רוּחַ, pero en esta sección la agencia personal de Dios domina el sentido.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y la primacía del texto original; no reducir רוּחַ a una categoría meramente natural.'
translation_notes:
  revision_awareness: 'Coincide con la revisión inglesa más reciente: no hubo cambios posteriores al borrador base; la versión española sigue la lectura aprobada de alto acuerdo, conservando la ambigüedad de רוּחַ mediante nota y manteniendo ‘valle’ como opción principal.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ de forma consistente para יְהוָה.
  - Se conserva la imagen concreta de ‘mano’ sin paraphrasearla como ‘poder’.
  - ‘Espíritu’ se escribe con mayúscula cuando refiere al Espíritu de Yahvé.
  - 'La sintaxis española privilegia claridad narrativa sin perder la secuencia verbal del hebreo: estar sobre, sacar, poner, y describir el lugar.'
  - Se evita ‘SEÑOR’ por coherencia con la terminología del proyecto y la transparencia del nombre divino.
