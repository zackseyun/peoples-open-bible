id: PHP.1.13
reference: Philippians 1:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὥστε τοὺς δεσμούς μου φανεροὺς ἐν Χριστῷ γενέσθαι ἐν ὅλῳ τῷ πραιτωρίῳ καὶ τοῖς λοιποῖς πᾶσιν,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/013.yaml
  text: so that my chains in Messiah have become known throughout the whole imperial guard and to all the rest,
translation:
  language: ko
  text: 그리하여 메시아 안에서[a] 내가 매인 일이 온 친위대[b]와 그 밖의 모든 사람에게 알려지게 되었고,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「메시아를 위하여」. 헬라어 ἐν Χριστῷ는 바울의 결박이 메시아와의 연합 안에서 또는 메시아를 향한 충성 때문에 일어났음을 함께 가리킬 수 있다.
    reason: alternative_reading
  - marker: b
    text: 또는 「온 프라이토리움 전체에」. 헬라어 πραιτώριον은 황제의 친위대 또는 황실 관저를 가리킬 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: so that
  chosen_korean: 그리하여
  alternatives_korean:
  - 그래서
  - 그 결과
  lexicon: BDAG
  rationale: ὥστε는 결과를 도입한다. 「그리하여」가 합쇼체 산문에서 자연스럽다.
- source_word: δεσμούς
  english_pob_choice: chains
  chosen_korean: 매인 일
  alternatives_korean:
  - 결박
  - 사슬
  - 옥에 갇힘
  lexicon: BDAG
  rationale: δεσμοί는 문자적으로 「사슬」이지만 환유적으로 옥에 매인 상태를 가리킨다. 「매인 일」이 그 상태를 자연스럽게 한국어로 옮긴다.
- source_word: φανεροὺς ... γενέσθαι
  english_pob_choice: have become known
  chosen_korean: 알려지게 되었고
  alternatives_korean:
  - 드러나게 되었고
  - 분명해지게 되었고
  lexicon: BDAG
  rationale: 형용사 + 부정사로 결과적 공개·인식을 표현한다. 「알려지게 되었다」가 자연스럽다.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_korean: 메시아 안에서
  alternatives_korean:
  - 메시아를 위하여
  - 메시아 안에 있는
  lexicon: BDAG
  rationale: 영어 POB가 결국 「in Messiah」를 본문으로 정착시켰다(연합·영역의 의미 보존). 한국어 「~ 안에서」가 바울의 「그리스도 안에」 정형 표현을 그대로 옮긴다.
- source_word: Χριστῷ
  english_pob_choice: Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 본 번역의 원칙에 따라 칭호 Χριστός를 「메시아」로 옮긴다.
- source_word: πραιτωρίῳ
  english_pob_choice: imperial guard
  chosen_korean: 친위대
  alternatives_korean:
  - 프라이토리움
  - 황실 친위대
  - 총독 관저
  lexicon: BDAG
  rationale: 빌립보서의 πραιτώριον은 로마의 황실 친위대를 가리킨다는 해석이 일반적이다. 「친위대」가 가장 자연스러운 한국어 등가어이다.
- source_word: τοῖς λοιποῖς πᾶσιν
  english_pob_choice: to all the rest
  chosen_korean: 그 밖의 모든 사람에게
  alternatives_korean:
  - 그 외 모든 사람에게
  - 나머지 모든 이에게
  lexicon: BDAG
  rationale: 친위대 너머의 더 넓은 범위를 가리킨다. 「그 밖의 모든 사람에게」가 자연스럽고 포괄적이다.
theological_decisions:
- issue: ἐν Χριστῷ의 의미 — 영역인가 원인인가
  chosen_reading: 메시아 안에서
  alternative_readings:
  - 메시아를 위하여
  rationale: 헬라어 ἐν Χριστῷ는 바울의 정형 표현으로, 「그리스도 안에」의 연합·영역 의미를 우선시한다. 영어 POB도 최종적으로 「in Messiah」로 정착했다. 결박의 원인적 함의(「~을 위하여」)는 각주로 보존한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
