translation:
  text: For even among birds[a], some, making their nests on houses, protect their young.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tame ones, building in the roofs of houses, protect their nestlings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πετεινῶν
  chosen: birds
  alternatives:
  - flying creatures
  - birds of the air
  lexicon: LSJ
  rationale: The genitive plural refers broadly to birds. 'Birds' is the natural and sufficiently precise English equivalent.
- source_word: ἥμερα
  chosen: some
  alternatives:
  - the tame ones
  - domesticated ones
  lexicon: LSJ
  rationale: The adjective means 'tame' or 'domesticated.' In context it distinguishes one class of birds from others; English reads more naturally with 'some' while the domesticated nuance is carried by their nesting around houses. A more formal rendering like 'the tame ones' is possible but stiffer.
- source_word: κατὰ τὰς οἰκίας
  chosen: of houses
  alternatives:
  - around houses
  - in houses
  lexicon: LSJ
  rationale: With ὀροφοποιοῦντα, the phrase indicates location in relation to houses. 'Of houses' in the phrase 'under the eaves of houses' best captures the domestic setting without overtranslating.
- source_word: ὀροφοποιοῦντα
  chosen: making their nests under the eaves
  alternatives:
  - building on roofs
  - nesting in the roof
  - making nests in the house-roof
  lexicon: LSJ
  rationale: The compound literally relates to roof-making/roof-dwelling activity. In context of birds and houses, it refers to nesting in the roof area or under the eaves. 'Making their nests under the eaves' conveys the likely sense in idiomatic English.
- source_word: προασπίζει
  chosen: defend
  alternatives:
  - protect
  - shield
  lexicon: LSJ
  rationale: The verb means to defend or protect. 'Defend' preserves the active, combative nuance appropriate to parental protection.
- source_word: νεοττῶν
  chosen: their young
  alternatives:
  - nestlings
  - chicks
  lexicon: LSJ
  rationale: The term denotes young birds. 'Their young' is broad and natural; 'nestlings' is more technical, while 'chicks' may sound too specific.
