    rationale: Aunque נחל puede referirse a un torrente estacional, aquí la acción de hacer/cavar hoyos recae mejor sobre el «cauce» o «lecho» que sobre el agua misma. «Cauce» mejora precisión y legibilidad.
  - severity: low
    issue: Formato incorrecto del marcador de nota «[ a ]»
    rationale: Las instrucciones exigen marcadores exactos como «[a]», sin espacios internos.
