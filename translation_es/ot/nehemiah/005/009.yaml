revisions:
- from: 'Así dije[a]: «Lo que ustedes hacen no es bueno. ¿No deben andar en el temor de nuestro Dios, a causa del reproche de las naciones, nuestros enemigos?»'
  to: 'Entonces dije[a]: «Lo que ustedes hacen no es bueno. ¿No deberían andar en el temor de nuestro Dios a causa del reproche de las naciones, nuestros enemigos?»'
  rationale: Se ajusta la apertura a un español narrativo más natural («Entonces dije»), se armoniza la pregunta retórica con la fuerza exhortativa del hebreo («¿No deberían andar...?») y con la decisión documentada de mantener la metáfora ética de «andar», y se elimina la coma innecesaria antes de la frase motivacional. La nota al pie se reubica para reflejar una alternativa real del hebreo en español; la nota original sobre «para evitar el reproche» no debe inventarse aquí porque el encargo exige notas solo cuando el marcador aparece en el texto revisado, y la revisión mínima prioriza claridad y coherencia interna del registro.
