translation:
  text: Then Judah said to Jacob his father, saying to him, "Bend your bow, father,
    and send out your arrows and strike down the enemy and kill the adversary; and
    may you have strength, for we will not kill your brother, because he is such,
    and because he is your kinsman we will give him honor." Then Jacob bent his bow
    and sent forth an arrow and struck Esau his brother on his right breast and killed
    him. And again he sent an arrow and struck Adoran the Aramean on the left breast
    and drove him back and killed him. Then the sons of Jacob and their slaves went
    out from the four sides of the tower. And Judah went out first, and Naphtali and
    Gad with him, and fifty slaves with him, on the south side of the tower, and they
    killed all whom they found before them, and not one of them escaped. And Levi
    and Dan and Asher went out on the east side of the tower, and fifty men with them,
    and they killed the warriors of Moab and Ammon. And Reuben and Issachar and Zebulun
    went out on the north side of the tower, and fifty men with them, and they killed
    the fighters of Philistia. And Simeon and Benjamin and Enoch the son of Reuben
    went out on the west side of the tower, and fifty men with them, and they killed
    of Edom and of the Horites four hundred strong and warlike men. And six hundred
    fled, and four of Esau’s sons fled with them, and they left their father lying
    slain, as he had fallen on the hill that is in Adurim. And the sons of Jacob pursued
    after them as far as Mount Seir. But Jacob buried his brother in the hill that
    is in Adurim, and he returned to his house, and they comforted him there.
