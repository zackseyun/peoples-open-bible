    text: O «divorciarla»; el hebreo dice literalmente «enviarla lejos», una expresión común para la separación matrimonial en contextos legales.
    reason: lexical_alternative
  revision_rationale: Se ajusta el texto para conservar mejor el sentido y la estrategia del POB inglés a la vez que se mejora la naturalidad del español. «Ha traído mala fama sobre» comunica el idiomático שֵׁם רָע sin el giro poco natural «poner un mal nombre». «Enviarla lejos» preserva mejor el hebreo לְשַׁלְּחָהּ y deja la explicitación jurídica «divorciarla» en nota, como en el expediente inglés. «Todos sus días» mantiene el hebraísmo temporal en español natural.
