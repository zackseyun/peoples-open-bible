theological_decisions:
- issue: Moral characterization of the ruler's conduct
  chosen_reading: Rendered the vice terms in strong ethical language ('shameless debaucheries') without softening them or importing later doctrinal categories.
  alternative_readings:
  - More euphemistic renderings such as 'immoral behavior'
  rationale: The Greek is morally forceful and should remain so, but the verse does not require specifically theological jargon beyond the ethical condemnation present in the text.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Reference of pronouns in the final clause
  chosen_reading: Took ἐκείνου to refer back to the same royal figure, yielding 'following his will.'
  alternative_readings:
  - Following that man's will with a different antecedent implied
  rationale: The immediate context favors the ruler as antecedent; no doctrinal issue is at stake, but the syntax requires an explicit English referent.
  doctrine_reference: Translation philosophy §1
