lexical_decisions:
- source_word: וּתְנוּ בָהֵן אֵשׁ
  english_pob_choice: and put fire in them
  chosen_spanish: y pongan fuego en ellos
  alternatives_spanish:
  - y coloquen fuego en ellos
  lexicon: HALOT
  rationale: נתן con בְּ/בָּהֵן, referido a los incensarios del contexto inmediato, pide en español un verbo natural como «poner»; «pongan» conserva el mandato y «fuego» traduce אֵשׁ sin suavizar la imagen ritual.
- source_word: וְשִׂימוּ עֲלֵיהֶן קְטֹרֶת
  english_pob_choice: and place incense on them
  chosen_spanish: y coloquen incienso sobre ellos
  alternatives_spanish:
  - y pongan incienso sobre ellos
  lexicon: HALOT
  rationale: שִׂימוּ con עֲלֵיהֶן expresa colocar encima; «coloquen… sobre ellos» suena natural y mantiene la relación espacial con los incensarios. «Incienso» traduce קְטֹרֶת de manera directa y cultual.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula cultual de comparecencia «delante de» para לִפְנֵי, y se usa «Yahvé» según el criterio del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el nombre divino tal como pide la norma española del proyecto, evitando la sustitución por un título enmascarado.
- source_word: מָחָר
  english_pob_choice: tomorrow
  chosen_spanish: mañana
  lexicon: HALOT
  rationale: Adverbio temporal directo y transparente.
- source_word: וְהָיָה
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y será
  lexicon: HALOT
  rationale: En español, «Entonces» expresa bien la función discursiva de introducir el resultado/prueba, sin forzar una perífrasis literal.
- source_word: הָאִישׁ אֲשֶׁר יִבְחַר יְהוָה
  english_pob_choice: the man whom Yahweh chooses
  chosen_spanish: el hombre a quien Yahvé escoja
  alternatives_spanish:
  - el hombre que Yahvé escogerá
  - el hombre que Yahvé elija
  lexicon: HALOT
  rationale: Se mantiene la singularidad masculina de הָאִישׁ con «el hombre» y se traduce el יחס relativo con «a quien»; el subjuntivo «escoja» refleja en español la acción futura dentro de la cláusula relativa.
- source_word: הוּא הַקָּדוֹשׁ
  english_pob_choice: he is the holy one
  chosen_spanish: ese es el santo
  alternatives_spanish:
  - él es el santo
  - ese es el que es santo
  lexicon: HALOT
  rationale: El artículo en הַקָּדוֹשׁ hace que no sea solo un adjetivo predicativo; «el santo» preserva el valor nominal. Se elige «ese» para reproducir la fuerza demostrativa del hebreo y del contexto de prueba.
- source_word: רַב לָכֶם
  english_pob_choice: You have gone too far
  chosen_spanish: ¡Mucho es para ustedes, hijos de Leví!
  alternatives_spanish:
  - ¡Basta ya, hijos de Leví!
  - ¡Demasiado es para ustedes, hijos de Leví!
  lexicon: HALOT
  rationale: 'La expresión admite un rango semántico de suficiencia/exceso. Aquí se conserva más cerca de la literalidad hebrea para no borrar la tensión documentada por el POB: el sentido puede entenderse como reprensión de exceso o como «es suficiente para ustedes»; el contexto retórico sigue siendo el de reproche.'
- source_word: בְּנֵי לֵוִי
  english_pob_choice: sons of Levi
  chosen_spanish: hijos de Leví
  alternatives_spanish:
  - descendientes de Leví
  - levitas
  lexicon: HALOT
  rationale: Se mantiene la imagen genealógica de בני con «hijos» y el nombre propio «Leví», preservando la textura hebrea y el modo de interpelación directa.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa el Tetragrama directamente; en esta serie el nombre divino no se enmascara con «Señor». «Yahvé» es la forma normativa en español para el proyecto, manteniendo la identidad pactal del nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de רַב לָכֶם en la reprensión final
  english_pob_reading: You have gone too far
  chosen_spanish_reading: ¡Mucho es para ustedes, hijos de Leví!
  alternative_spanish_readings:
  - ¡Basta ya, hijos de Leví!
  - ¡Demasiado es para ustedes, hijos de Leví!
  rationale: El hebreo es deliberadamente breve y punzante; conviene no disolverlo en una interpretación excesiva. La redacción elegida conserva la ambigüedad entre suficiencia y exceso, dejando visible la tensión lexical documentada por el POB.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source plain sense'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura inglesa auditada, pero vuelve al hebreo para conservar dos tensiones relevantes: (1) el juego ritual de poner fuego e incienso sobre los incensarios, y (2) la expresión final רַב לָכֶם, que puede ser reprensión de exceso o de suficiencia. No se introdujeron revisiones textuales; el estado más reciente indicó que no hacía falta cambiar el contenido base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - «Incienso» se mantiene como término cultual fijo para קְטֹרֶת.
  - «Hijos de Leví» conserva la literalidad genealógica frente a la generalización «levitas».
  - La nota al pie se ancla en la frase final para preservar la alternativa lexical sin alterar el texto principal.
