base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/018/022.yaml
  text: When a prophet speaks in the name of Yahweh[a], and the thing does not happen or come about, that is the thing that Yahweh has not spoken. The prophet has spoken it presumptuously[c][b]; you shall not fear him.
  footnotes:
  - marker: a
    text: Or 'the word' instead of 'the matter' for Hebrew דָּבָר; the term can refer both to the spoken message and to the event foretold.
    reason: lexical_alternative
  - marker: b
    text: Or 'does not occur or come to pass.'
    reason: lexical_alternative
  - marker: c
    text: '''Presumptuously'' conveys arrogant, willful presumption in speaking without the LORD''s authorization.'
    reason: cultural_note
