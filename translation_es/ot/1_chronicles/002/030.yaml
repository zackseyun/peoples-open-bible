lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Ahora bien, los hijos de
  lexicon: HALOT
  rationale: En un encabezado genealógico, בְּנֵי introduce una lista de descendientes; en español natural y fiel, 'Los hijos de' comunica el mismo tipo de relación sin forzar una conjunción inicial que no aporta contenido en la línea.
- source_word: נָדָב
  english_pob_choice: Nadab
  chosen_spanish: Nadab
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar.
- source_word: סֶלֶד
  english_pob_choice: Seled
  chosen_spanish: Seled
  lexicon: HALOT
  rationale: Nombre propio transliterado consistentemente en ambos lugares del versículo.
- source_word: וְאַפָּיִם
  english_pob_choice: and Appaim
  chosen_spanish: y Apaim
  alternatives_spanish:
  - y Appaim
  lexicon: HALOT
  rationale: Aunque la forma recuerda el sustantivo común relacionado con 'nariz/rostro', aquí funciona como nombre propio en contexto genealógico; por eso se translitera y no se traduce.
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - entonces murió
  lexicon: HALOT
  rationale: El wayyiqtol de מוּת narra una acción pasada en secuencia. 'Murió' es la forma natural y directa en español; la secuencia ya queda implícita por el contexto narrativo.
- source_word: לֹא בָנִים
  english_pob_choice: without sons
  chosen_spanish: sin hijos
  alternatives_spanish:
  - sin hijos varones
  - sin descendencia masculina
  lexicon: HALOT
  rationale: Hebreo literalmente 'no hijos'; en español genealógico 'sin hijos' es idiomático y conserva el sentido de ausencia de descendencia directa. Aunque 'hijos' puede abarcar varones y mujeres en algunos contextos, aquí la nota inglesa muestra que la referencia concreta es la falta de hijos/descendencia masculina; por eso no se fuerza una ampliación innecesaria en el texto principal.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que hay alta concordancia con el control cruzado; esta versión mantiene esa estabilidad, conservando la estructura genealógica y la ambigüedad mínima de לֹא בָנִים en una nota alternativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo nombra explícitamente el Tetragrámaton; este versículo no lo contiene.
  - Se conserva la transliteración de nombres propios sin castellanizarlos.
  - '''Hijos'' en la línea principal sigue el valor genealógico natural del hebreo, mientras la nota recoge la alternativa más literal y la equivalencia idiomática.'
  - Se evita añadir conectores explicativos que no estén en el hebreo más allá de la gramática española necesaria.
