  to: Si un hombre hace un voto a Yahvé, o jura un juramento para atarse con una obligación vinculante[a], no quebrantará su palabra[b]; hará conforme a todo lo que haya salido de su boca.
  rationale: Se corrige el error principal del aparato moviendo [a] desde 'Yahvé' al sintagma que realmente comenta. Además, se ajusta la cláusula final a 'haya salido de su boca' para reflejar mejor el valor del hebreo sin perder naturalidad. Se mantienen 'Yahvé', 'quebrantará su palabra' y la nota literal sobre 'profanará', porque representan bien tanto la fuente como la filosofía del POB.
