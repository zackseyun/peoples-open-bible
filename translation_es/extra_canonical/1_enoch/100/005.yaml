base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/100/005.yaml
  text: And he will appoint guardians from among the holy angels over all the righteous and holy ones[a], and they will guard them like the pupil of an eye, until every evil and every sin comes to an end. And even if the righteous sleep a long sleep[c][b], they have nothing to fear.
  footnotes:
  - marker: a
    text: '''Like the pupil of an eye'' is an idiom for something guarded with extreme care; compare the more familiar biblical expression ''apple of the eye.'''
    reason: lexical_alternative
  - marker: b
    text: '''Sleep a long sleep'' likely refers to death or the state of the dead, but the text itself keeps the euphemism of sleep.'
    reason: lexical_alternative
  - marker: c
    text: Or 'guardians over all the righteous and holy from among the holy angels'.
    reason: previous_rendering
