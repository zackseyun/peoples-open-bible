base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/013/010.yaml
  text: Give thanks to the Lord rightly[a], and bless the King of the ages, so that his tent may again be built for you with joy[c][b]; and so that he may gladden the captives within you and love the afflicted within you for all the generations of the age.
  footnotes:
  - marker: a
    text: Or 'the exiles' for 'the captives'; the Greek literally refers to those taken captive, likely with the sense of displaced exiles in context.
    reason: lexical_alternative
  - marker: b
    text: '''King of the ages'' may also be rendered ''eternal King.'' The main text keeps the Greek expression more closely.'
    reason: lexical_alternative
  - marker: c
    text: 'The address appears to be to Jerusalem/Zion personified: ''within you'' refers to people restored and rejoicing within the city.'
    reason: cultural_note
