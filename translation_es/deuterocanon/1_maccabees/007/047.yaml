translation:
  language: es
  text: Y tomaron los despojos y el botín[a], y cortaron la cabeza de Nicanor y su mano derecha, que él había extendido con arrogancia, y los llevaron y los exhibieron junto a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cerca de Jerusalén». El griego dice literalmente «junto a Jerusalén» y no precisa el lugar exacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκῦλα
  english_pob_choice: spoils
  chosen_spanish: despojos
  alternatives_spanish:
  - botín
  - presa
  lexicon: LSJ
  rationale: σκῦλα se refiere a los despojos tomados al enemigo. «Despojos» conserva el sentido militar y el plural acumulativo; se distingue bien de la palabra siguiente para no aplanar la dupla léxica del griego.
- source_word: προνομὴν
  english_pob_choice: plunder
  chosen_spanish: botín
  alternatives_spanish:
  - despojo
  - presa
  lexicon: LSJ
  rationale: Como término distinto de σκῦλα, añade la idea de bienes arrebatados como presa. «Botín» mantiene esa segunda pieza de la acumulación sin duplicar exactamente el primer sustantivo.
- source_word: ἀφεῖλαν
  english_pob_choice: they cut off
  chosen_spanish: cortaron
  alternatives_spanish:
  - separaron
  - quitaron
  lexicon: LSJ
  rationale: En el contexto de «cabeza» y «mano derecha», el verbo implica seccionamiento. «Cortaron» hace explícita la acción de forma natural en español.
- source_word: δεξιὰν
  english_pob_choice: right hand
  chosen_spanish: mano derecha
  alternatives_spanish:
  - brazo derecho
  lexicon: LSJ
  rationale: La correspondencia más directa con el griego es «mano derecha». Aunque en español podría decirse «brazo» en algunos contextos, aquí no es necesario apartarse del sentido más preciso.
- source_word: ἐξέτεινεν
  english_pob_choice: had stretched out
  chosen_spanish: había extendido
  alternatives_spanish:
  - había alargado
  - había tendido
  lexicon: LSJ
  rationale: 'El imperfectivo queda bien reflejado en una forma pluscuamperfectiva en español: la mano era la que él había extendido previamente. «Extendido» mantiene el vínculo con el gesto de desafío.'
- source_word: ἐν ὑπερηφάνως
  english_pob_choice: in arrogance
  chosen_spanish: con arrogancia
  alternatives_spanish:
  - con orgullo
  - en soberbia
  lexicon: LSJ
  rationale: La expresión comunica altivez culpable. «Con arrogancia» preserva mejor la carga moral que un simple «orgullosamente».
- source_word: ἤνεγκαν
  english_pob_choice: brought
  chosen_spanish: los llevaron
  alternatives_spanish:
  - los trajeron
  - los transportaron
  lexicon: LSJ
  rationale: En la secuencia narrativa, el verbo indica traslado. «Los llevaron» suena natural y conserva el movimiento hacia Jerusalén implícito en el contexto.
- source_word: ἐξέτειναν
  english_pob_choice: displayed
  chosen_spanish: los exhibieron
  alternatives_spanish:
  - los mostraron
  - los extendieron
  lexicon: LSJ
  rationale: Aunque literalmente es «extendieron», aquí la función es la exposición pública de los restos. «Exhibieron» comunica esa finalidad sin perder el gesto visible del original.
- source_word: παρὰ τὴν Ἰερουσαλήμ
  english_pob_choice: beside Jerusalem
  chosen_spanish: junto a Jerusalén
  alternatives_spanish:
  - cerca de Jerusalén
  - al lado de Jerusalén
  lexicon: LSJ
  rationale: παρά con acusativo señala proximidad o ubicación al lado de. «Junto a Jerusalén» es fiel y no especifica más de lo que el griego dice.
theological_decisions:
- issue: Tratamiento público de los restos de Nicanor
  english_pob_reading: Rendered descriptively as a historical act of judgment and triumph without adding moral commentary.
  chosen_spanish_reading: Se vierte como relato histórico de juicio y triunfo, sin añadir interpretación moral ajena al verso.
  alternative_spanish_readings:
  - Se moraliza como castigo ejemplar
  - Se localiza en un sitio específico como la puerta o el templo
  rationale: El texto narra la acción y menciona la arrogancia de Nicanor, pero no desarrolla una glosa teológica adicional. La traducción conserva la tensión narrativa sin resolverla por anticipado.
  doctrine_reference: Primacía del texto fuente y preservación de la tensión narrativa; no sobreinterpretar el acto más allá de lo explicitado.
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audit trail inglés: no hubo revisiones aplicadas en la última pasada y el control cruzado marcó alta concordancia. Se mantuvo la distinción entre σκῦλα y προνομὴν, la idea de severidad en ἀφεῖλαν, y la localización abierta de παρά + acusativo sin convertirla en un sitio más específico.'
  spanish_consistency_notes:
  - Se preserva el registro narrativo militar con vocabulario transparente para lectores eclesiales hispanohablantes.
  - Se evita «SEÑOR» u otras convenciones no pertinentes; no hay léxico de nombre divino en este verso.
  - «Exhibieron» mantiene la finalidad pública del acto sin introducir un matiz judicial adicional no expresado en el griego.
