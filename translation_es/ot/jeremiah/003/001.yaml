translation:
  language: es
  text: 'Se dice[a]: «Si un hombre despide a su esposa, y ella se va de él y llega a ser la mujer de otro hombre[b], ¿volverá a ella otra vez? ¿No quedará totalmente contaminada aquella tierra? Pero tú te has prostituido con muchos amantes, ¿y volverías a mí?», declara Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y, sin embargo, vuelve a mí», tomando la cláusula final como una invitación imperativa en vez de una pregunta retórica.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «llega a ser de otro hombre», es decir, llega a ser la mujer de otro hombre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵאמֹר
  english_pob_choice: It is said
  chosen_spanish: Se dice
  alternatives_spanish:
  - Diciendo
  - Se dice así
  lexicon: HALOT
  rationale: La forma infinitiva funciona aquí como fórmula introductoria impersonal. «Se dice» conserva el valor de cita/introducción sin forzar un sujeto explícito que el hebreo no da.
- source_word: הֵן
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - He aquí
  - Supongamos
  lexicon: HALOT
  rationale: En este planteamiento de caso hipotético-legal, «si» expresa naturalmente la condición que abre la comparación.
- source_word: יְשַׁלַּח ... אֶת אִשְׁתּוֹ
  english_pob_choice: sends away his wife
  chosen_spanish: despide a su esposa
  alternatives_spanish:
  - envía lejos a su esposa
  - repudia a su esposa
  lexicon: HALOT
  rationale: שׁלח en este contexto matrimonial alude al acto de despedir/repudiar a la esposa. «Despide» mantiene cercanía semántica y resulta natural en español; «repudia» es posible pero algo más técnico y tradicional.
- source_word: וְהָלְכָה מֵאִתּוֹ
  english_pob_choice: and she goes from him
  chosen_spanish: y ella se va de él
  alternatives_spanish:
  - y se aparta de él
  - y sale de su lado
  lexicon: HALOT
  rationale: La imagen de movimiento se conserva de modo directo. «Se va de él» sigue de cerca el hebreo sin sonar rígido.
- source_word: וְהָיְתָה לְאִישׁ אַחֵר
  english_pob_choice: and becomes another man’s
  chosen_spanish: y llega a ser de otro hombre
  alternatives_spanish:
  - y pertenece a otro hombre
  - y se convierte en esposa de otro hombre
  lexicon: HALOT
  rationale: 'El hebreo es elíptico: literalmente «llega a ser para otro hombre». «Llega a ser de otro hombre» conserva la tensión de pertenencia/matrimonio sin añadir demasiado, y deja visible la ironía legal.'
- source_word: הֲיָשׁוּב אֵלֶיהָ עוֹד
  english_pob_choice: will he return to her again?
  chosen_spanish: ¿volverá a ella otra vez?
  alternatives_spanish:
  - ¿volvería a ella otra vez?
  - ¿volverá de nuevo a ella?
  lexicon: HALOT
  rationale: שוב es «volver/retornar». La interrogación retórica se mantiene en español con una formulación clara y sobria.
- source_word: הֲלוֹא חָנוֹף תֶּחֱנַף הָאָרֶץ הַהִיא
  english_pob_choice: Would not that land be utterly polluted?
  chosen_spanish: ¿No será completamente profanada esa tierra?
  alternatives_spanish:
  - ¿No quedará aquella tierra totalmente contaminada?
  - ¿No será gravemente mancillada esa tierra?
  lexicon: HALOT
  rationale: El verbo חנף puede llevar la idea de profanar/contaminar/mancillar; «profanada» conserva mejor el campo semántico cultual y moral, y «completamente» refleja la intensificación del infinitivo absoluto con el verbo finito.
- source_word: וְאַתְּ זָנִית
  english_pob_choice: But you have prostituted yourself
  chosen_spanish: Pero tú te has prostituido
  alternatives_spanish:
  - Pero tú has cometido prostitución
  - Pero tú has fornicado
  lexicon: HALOT
  rationale: זנה es el término profético clásico para infidelidad de pacto expresada con metáfora sexual. «Te has prostituido» mantiene la fuerza del verbo y evita suavizarlo; el reflexivo es idiomático en español.
- source_word: רֵעִים רַבִּים
  english_pob_choice: with many lovers
  chosen_spanish: con muchos amantes
  alternatives_spanish:
  - con muchos compañeros
  - con muchos amados
  lexicon: HALOT
  rationale: En este contexto metafórico, רֵעִים no significa amistades neutrales sino vínculos sexuales/alianzas infieles. «Amantes» comunica el sentido que el inglés POB fijó con «lovers».
- source_word: וְשׁוֹב אֵלַי
  english_pob_choice: and would you return to me?
  chosen_spanish: y ¿volverás a mí?
  alternatives_spanish:
  - y vuelve a mí
  - y volverías a mí?
  lexicon: HALOT
  rationale: 'La forma admite lectura exhortativa o interrogativa. Aquí se sigue la lectura retórica del audit trail: la pregunta conserva la tensión legal y profética, sin resolverla en una invitación suavizada.'
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según el estándar del proyecto. «Declara» conserva el registro profético solemne del fórmula נְאֻם.
theological_decisions:
- issue: 'Lectura de וְשׁוֹב אֵלַי: ¿invitación imperativa o pregunta retórica?'
  english_pob_reading: rhetorical question
  chosen_spanish_reading: pregunta retórica
  alternative_spanish_readings:
  - 'invitación imperativa: «y vuelve a mí»'
  - suavización exhortativa con matiz de gracia
  rationale: El flujo inmediato de preguntas legales sobre divorcio favorece la lectura retórica. Se preserva así la tensión profética del pasaje, evitando resolver de antemano si el cierre es un llamado gracioso o una acusación irónica. La alternativa queda abierta por fidelidad al texto y a la tradición interpretativa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje se traduce con coherencia respecto del audit trail inglés, sin cambios de revisión pendientes; se conserva la ambigüedad final documentada y la metáfora sexual-profética sin atenuarla.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino conforme al estándar del proyecto.
  - Se mantiene el registro profético sobrio, evitando arcaísmos innecesarios.
  - «Prostituido» y «amantes» reflejan la metáfora de infidelidad de pacto sin sustituirla por un lenguaje más suave.
  - La cláusula final queda en forma interrogativa para respetar la lectura priorizada por el POB, con nota que preserva la alternativa imperativa.
