  rationale: Se corrige la desalineación principal con el POB inglés sustituyendo «afección de lepra» por «enfermedad de la piel», que preserva la amplitud semántica de צָרַעַת sin importar una categoría médica moderna. Se recolocan las notas al pie en los lugares pertinentes. También se suaviza el español en dos puntos menores («todo» y «él está limpio») para mantener un estilo natural, claro y digno sin perder la fuerza legal del original.
