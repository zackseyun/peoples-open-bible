review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: mandato a Jeremías, fórmula profética, nombre divino «Yahvé», condición «si no», metáfora de caminar y «mi ley» con nota para «instrucción». Sin embargo, hay dos problemas de alineación: (1) el marcador [a] está anclado en «ellos» pero la nota trata sobre «escuchan», así que la nota no corresponde al lugar del texto; (2) «andando en mi ley» suena menos natural y algo ambiguo en español para expresar לָלֶכֶת בְּתוֹרָתִי, donde conviene una formulación más idiomática que mantenga la metáfora de conducta.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «Y dirás a ellos» es menos natural que «Y les dirás», y «Si no me escuchan, andando en mi ley» resulta forzado. «Si no me escuchan al andar en mi ley» o «si no me escuchan andando conforme a mi ley» mejoraría; la primera mantiene mejor la cercanía con el inglés auditado y el hebreo. También conviene corregir la ubicación de la nota [a] para cumplir la disciplina editorial.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: יהוה → «Yahvé» correctamente; תּוֹרָה → «ley» con alternativa «instrucción» bien documentada. No hay conflictos con otros términos doctrinales clave.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «ellos» pero explica «escuchan».
    rationale: Las instrucciones requieren que cada marcador aparezca en la palabra o frase pertinente. Aquí el contenido de la nota no corresponde a «a ellos», sino al verbo «me escuchan».
  - severity: medium
    issue: «Y dirás a ellos» es gramatical pero poco natural en español bíblico moderno.
    rationale: «Y les dirás» expresa el mismo sentido de אֲלֵיהֶם de forma más idiomática y fluida, sin pérdida de formalidad ni precisión.
  - severity: medium
    issue: «Si no me escuchan, andando en mi ley» suena torpe y deja débil la relación sintáctica entre escuchar y caminar.
    rationale: El hebreo y la revisión inglesa vinculan el escuchar con la conducta expresada por «caminar». En español, «si no me escuchan[a] al andar en mi ley[b]» mantiene mejor la relación y la legibilidad.
  revised_spanish_text: 'Y les dirás: «Así dice Yahvé: Si no me escuchan[a] al andar en mi ley[b] que he puesto delante de ustedes»'
