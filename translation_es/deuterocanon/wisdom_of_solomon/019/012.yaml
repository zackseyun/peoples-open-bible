revisions:
- from: Porque las codornices subieron del mar para su consuelo.[a]
  to: Porque la codorniz subió del mar para su consuelo.[a]
  rationale: Se cambia «las codornices subieron» por «la codorniz subió» para reflejar el singular colectivo del griego ὀρτυγομήτρα y para que la nota auditada tenga sentido en español. Se mantiene «para su consuelo» porque representa bien εἰς παραμυθίαν con un español natural y digno. La nota se ajusta para presentar el plural como alternativa española posible, no como la forma elegida en el texto principal.
