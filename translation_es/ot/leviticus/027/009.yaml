translation:
  language: es
  text: Y si es un animal del cual presentan una ofrenda a Yahvé[a], todo lo que de él se dé a Yahvé será santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «del que presentan una ofrenda a Yahvé». La redacción hebrea puede entenderse de dos maneras: como un animal apto para ser presentado como ofrenda, o como un animal del cual efectivamente se presenta una ofrenda.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Y si
  - Pero si
  - Si
  lexicon: HALOT
  rationale: La coordinación condicional conserva el enlace del hebreo ו sin volver la frase pesada; en español, «Y si» suena natural en una secuencia legal.
- source_word: בְּהֵמָה
  english_pob_choice: animal
  chosen_spanish: animal
  alternatives_spanish:
  - bestia
  - ganado
  - res
  lexicon: HALOT
  rationale: El término es genérico y, en este contexto sacrificial, «animal» comunica con claridad la categoría sin restringirla indebidamente a ganado.
- source_word: אֲשֶׁר יַקְרִיבוּ מִמֶּנָּה קָרְבָּן לַיהוָה
  english_pob_choice: from which they present an offering to Yahweh
  chosen_spanish: de entre los cuales presentan una ofrenda a Yahvé
  alternatives_spanish:
  - de los cuales presentan una ofrenda a Yahvé
  - de los que se presenta una ofrenda a Yahvé
  - de los cuales se ofrece una ofrenda a Yahvé
  lexicon: HALOT
  rationale: Se mantiene el sentido sacrificial de יַקְרִיבוּ como 'presentar/ofrecer' y se conserva la relación partitiva de מִמֶּנָּה. «De entre los cuales» expresa con más naturalidad en español la idea de un conjunto de animales del cual se toma para ofrenda, sin perder la alternativa interpretativa documentada.
- source_word: קָרְבָּן
  english_pob_choice: offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - ofrenda
  - presentación
  - obla ción
  lexicon: HALOT
  rationale: «Ofrenda» es el equivalente más claro y natural en español para el término sacrificial, conservando el registro cultual.
- source_word: לַֽ/יהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  - para Yahvé
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de renderizar el Nombre divino como «Yahvé» en el texto principal, manteniendo la referencia al nombre del pacto sin disfrazarla como título.
- source_word: כֹּל אֲשֶׁר יִתֵּן
  english_pob_choice: everything that one gives
  chosen_spanish: todo lo que se dé
  alternatives_spanish:
  - todo lo que uno dé
  - todo lo que se da
  - todo cuanto se dé
  lexicon: HALOT
  rationale: La construcción hebrea es genérica e indefinida; en español, una pasiva impersonal refleja mejor el valor general que un sujeto masculino explícito.
- source_word: מִמֶּנּוּ
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - de él
  - de eso
  - de ese animal
  lexicon: HALOT
  rationale: El pronombre retoma el sustantivo singular colectivo «animal». «De él» mantiene la referencia sin añadir glosa interpretativa en el texto principal.
- source_word: יִהְיֶה קֹּדֶשׁ
  english_pob_choice: shall be holy
  chosen_spanish: será santo
  alternatives_spanish:
  - será santo
  - será sagrado
  - quedará consagrado
  lexicon: HALOT
  rationale: «Santo» conserva el campo de קֹדֶשׁ en lenguaje legal-cultual. «Será santo» expresa el estado resultante sin forzar una paráfrasis más explicativa.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El packet inglés ya documenta la decisión de no ocultar el Nombre detrás de un título. En español, «Yahvé» reproduce esa elección y preserva la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH'
- issue: Ambigüedad de la frase sacrificial אֲשֶׁר יַקְרִיבוּ מִמֶּנָּה קָרְבָּן
  english_pob_reading: from which they present an offering / of which they bring an offering
  chosen_spanish_reading: de entre los cuales presentan una ofrenda
  alternative_spanish_readings:
  - de los cuales presentan una ofrenda
  - de los que se ofrece una ofrenda
  - de entre los cuales se toma una ofrenda
  rationale: 'El inglés POB conserva la ambigüedad hebrea: puede describir animales aptos para ofrenda o un animal del cual efectivamente se presenta una ofrenda. La redacción española mantiene esa apertura con una formulación partitiva natural y no la cierra hacia una sola interpretación.'
  doctrine_reference: Lexical note in English POB footnote a
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del texto hebreo y del audit trail inglés. La principal decisión fue conservar la ambigüedad de la cláusula sacrificial, además de reflejar el Nombre divino como «Yahvé» conforme al criterio del proyecto. No se requirieron cambios posteriores al último pase revisado en el contexto inglés.
  spanish_consistency_notes:
  - Se mantuvo el registro legal-cultual con vocabulario sencillo y transparente.
  - Se evitó 'SEÑOR' porque el criterio del proyecto exige traducir el Tetragrámaton como 'Yahvé'.
  - Se eligió una construcción impersonal en español para reproducir el valor genérico de la forma verbal hebrea.
  - «Santo» se conservó para קֹדֶשׁ en lugar de 'sagrado' por continuidad terminológica con el campo legal de santidad.
