    rationale: Aunque es cierta como observación estilística, desplaza una nota lexical más relevante y no corresponde a una alternativa significativa preservada por la auditoría inglesa.
  revised_spanish_text: Harás una pila[a] de bronce[b], con su base[c] de bronce, para lavar; y la pondrás entre la tienda de reunión y el altar, y pondrás allí agua.
