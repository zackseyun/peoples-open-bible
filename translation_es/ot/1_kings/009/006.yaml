translation:
  language: es
  text: Pero si ustedes[a] o sus hijos se apartan de seguirme, y no guardan mis mandamientos y mis estatutos que he puesto ante ustedes, y van y sirven a otros dioses, y se postran ante ellos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ustedes y sus hijos». El hebreo puede entenderse como una advertencia dirigida a Salomón junto con su descendencia; el texto principal expresa la fuerza condicional que recae sobre él o su línea real.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: La partícula es condicional; en español, "Pero si" comunica bien el giro discursivo adversativo que el inglés POB expresó con "But if" sin añadir contenido ajeno al hebreo.
- source_word: שׁוֹב תְּשֻׁבוּן
  english_pob_choice: turn away
  chosen_spanish: se apartan
  alternatives_spanish:
  - se vuelven atrás
  - se desvían
  - apartan
  lexicon: HALOT
  rationale: El infinitivo absoluto con el verbo intensifica la idea de apartarse en contexto de apostasía. "Se apartan" expresa bien la ruptura de seguimiento sin traducir mecánicamente con un calco de "turn".
- source_word: אַתֶּם וּבְנֵיכֶם
  english_pob_choice: you or your sons
  chosen_spanish: ustedes o sus hijos
  alternatives_spanish:
  - ustedes y sus hijos
  - ustedes y sus descendientes
  - ustedes o sus descendientes
  lexicon: HALOT
  rationale: El hebreo permite entender el destinatario como Salomón y su línea real. "Hijos" conserva el valor masculino/dinástico de בנים; "o" reproduce la alternativa contextual resaltada por el POB en inglés.
- source_word: מֵאַחֲרַי
  english_pob_choice: from following me
  chosen_spanish: de seguirme
  alternatives_spanish:
  - de ir tras de mí
  - de seguir detrás de mí
  lexicon: HALOT
  rationale: La expresión idiomática alude al seguimiento leal del Señor. "De seguirme" mantiene la relación de discípulo/súbdito fiel sin volver la frase demasiado literal.
- source_word: וְלֹא תִשְׁמְרוּ
  english_pob_choice: and do not keep
  chosen_spanish: y no guardan
  alternatives_spanish:
  - y no observan
  - y no cumplen
  lexicon: HALOT
  rationale: שמר con mandamientos se vierte naturalmente como "guardar" en español bíblico y moderno. Mantiene el matiz de custodiar/obedecer normas pactales.
- source_word: מִצְוֺתַי
  english_pob_choice: my commandments
  chosen_spanish: mis mandamientos
  alternatives_spanish:
  - mis órdenes
  - mis preceptos
  lexicon: HALOT
  rationale: '"Mandamientos" preserva el registro legal-covenantal y coincide con el valor usual de מצוות en este contexto.'
- source_word: חֻקֹּתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis ordenanzas
  lexicon: HALOT
  rationale: 'Se conserva la distinción entre dos tipos de estipulaciones: mandamientos y estatutos. "Estatutos" es el equivalente español más estable para חוקים en contexto legal.'
- source_word: אֲשֶׁר נָתַתִּי לִפְנֵיכֶם
  english_pob_choice: that I have set before you
  chosen_spanish: que he puesto delante de ustedes
  alternatives_spanish:
  - que he puesto ante ustedes
  - que les he dado delante
  - que he presentado delante de ustedes
  lexicon: HALOT
  rationale: El hebreo usa una fórmula de presentación de la ley ante el pueblo. "He puesto delante de ustedes" conserva el valor idiomático y evita un calco menos natural.
- source_word: וַהֲלַכְתֶּם
  english_pob_choice: and go
  chosen_spanish: y van
  alternatives_spanish:
  - y caminan
  - y se van
  lexicon: HALOT
  rationale: 'Aquí el verbo introduce la secuencia de apostasía: ir y servir a otros dioses. "Van" es idiomático y mantiene el encadenamiento verbal del hebreo.'
- source_word: וַעֲבַדְתֶּם אֱלֹהִים אֲחֵרִים
  english_pob_choice: and serve other gods
  chosen_spanish: y sirven a otros dioses
  alternatives_spanish:
  - y adoran a otros dioses
  - y rinden servicio a otros dioses
  lexicon: HALOT
  rationale: עבד conserva mejor su fuerza con "servir" que con "adorar"; así se distingue de la postración posterior y se respeta la doble acción idolátrica.
- source_word: וְהִשְׁתַּחֲוִיתֶם לָהֶם
  english_pob_choice: and bow down to them
  chosen_spanish: y se postran ante ellos
  alternatives_spanish:
  - y se inclinan ante ellos
  - y se prosternan ante ellos
  lexicon: HALOT
  rationale: El verbo apunta a postración física o reverencia. "Se postran ante ellos" conserva la imagen concreta y evita confundirlo con el servicio del miembro anterior.
theological_decisions:
- issue: Alcance dinástico de la advertencia
  english_pob_reading: The warning is addressed to Solomon and his royal descendants, rendered 'you or your sons.'
  chosen_spanish_reading: La advertencia se dirige a ustedes o a sus hijos, es decir, a Salomón y a su descendencia real.
  alternative_spanish_readings:
  - La advertencia se dirige a ustedes y a sus hijos.
  - La advertencia se dirige al pueblo en general.
  rationale: En el contexto inmediato de 1 Reyes 9, Yahvé habla a Salomón sobre la casa davídica y el templo. Traducir con "ustedes o sus hijos" mantiene la posibilidad alternativa señalada por el POB y preserva la dimensión dinástica sin generalizar indebidamente.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Distinción entre servir y postrarse en la idolatría
  english_pob_reading: serve other gods and bow down to them
  chosen_spanish_reading: y sirven a otros dioses, y se postran ante ellos
  alternative_spanish_readings:
  - y adoran a otros dioses
  - y se inclinan ante ellos
  rationale: El hebreo separa עבד de השתחוה. Mantener "servir" y "postrarse" evita fusionar dos actos distintos de idolatría y conserva la tensión lexical del original.
  doctrine_reference: Lexical distinction in the source text
translation_notes:
  revision_awareness: El texto inglés revisado eliminó un sujeto explícito repetido antes de "go" para mayor fluidez. La versión española sigue esa misma economía sintáctica, manteniendo la secuencia verbal natural "y van y sirven..." sin introducir repeticiones innecesarias.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como nombre divino conforme al criterio del proyecto, aunque en este versículo el nombre no aparece explícitamente en el hebreo citado.
  - Se preservó la distinción entre "mandamientos" y "estatutos".
  - Se distinguió "servir" de "postrarse" para reflejar dos verbos hebreos diferentes.
  - Se eligió "ustedes" en lugar de un singular reverencial para conservar el valor plural/dinástico sugerido por el hebreo.
