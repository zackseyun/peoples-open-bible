review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: la rareza de una אֵשֶׁת חַיִל, la pregunta retórica מִי יִמְצָא, y la comparación de valor con פְּנִינִים. Sin embargo, se aparta del rastro auditado del POB en un punto importante: el inglés eligió como principal ''wife of noble character'' por el contexto doméstico, dejando ''woman'' como alternativa en nota; el español invierte esa decisión y pone ''Mujer de noble carácter'' en el texto principal. Además, la nota a es incoherente porque presenta como alternativa exactamente la lectura ya puesta en el texto principal.'
  spanish_quality_summary: El español es claro y digno, pero requiere ajustes menores de fidelidad y pulido. 'Mujer de noble carácter' suena natural, aunque menos alineado con la decisión contextual del POB. '¿quién la hallará?' es comprensible, pero '¿quién puede hallarla?' reproduce mejor el matiz retórico de rareza de מִי יִמְצָא y el inglés 'who can find?'. La nota c actualmente repite el texto principal y por tanto no funciona como alternativa real.
  glossary_alignment: 'No hay conflictos teológicos ni terminológicos mayores del glosario del proyecto. El asunto principal es de decisión léxica contextual: אֵשֶׁת debe ir como ''Esposa de'' en el texto principal para seguir el POB auditado, con ''Mujer de'' en nota como alternativa. ''Joyas'' para פְּנִינִים y ''valor'' para מִכְרָהּ están bien alineados.'
  issues:
  - severity: high
    issue: La elección principal de אֵשֶׁת no sigue la decisión auditada del POB.
    rationale: El POB en inglés puso 'A wife of noble character' como texto principal y reservó 'A woman of noble character' para nota, porque el contexto del hogar favorece 'wife'. El borrador español invierte esa relación sin justificación suficiente.
  - severity: medium
    issue: La nota [a] está invertida y es internamente defectuosa.
    rationale: La nota dice que 'Mujer de noble carácter' también puede entenderse como 'esposa...', pero 'Mujer de noble carácter' ya está en el texto principal. Debe explicarse al revés si se adopta 'Esposa de...' en el texto, o eliminarse si no.
  - severity: medium
    issue: La nota [c] no ofrece una alternativa real.
    rationale: 'Actualmente repite exactamente la redacción del texto principal: ''Su valor está muy por encima de las joyas''. La evidencia inglesa preserva una variante equivalente a ''Su valor está muy por encima de las joyas'' / ''Su worth is far above jewels''; en español conviene distinguirla, por ejemplo ''Su valor está muy por encima de las joyas'' frente a ''Su valor es muy superior al de las joyas'' o usar el texto principal con ''vale mucho más que...''.'
  - severity: low
    issue: '''¿quién la hallará?'' es aceptable pero menos preciso que ''¿quién puede hallarla?''.'
    rationale: El imperfecto expresa rareza retórica más que simple futuro. 'Puede' comunica mejor el matiz del inglés auditado 'who can find?' y suena natural en español contemporáneo.
  - severity: low
    issue: 'Hay un detalle de calidad en las decisiones léxicas: aparece ''su worth'' como alternativa española.'
    rationale: Es un anglicismo accidental en metadatos, no en el texto bíblico, pero conviene corregirlo en revisión editorial.
