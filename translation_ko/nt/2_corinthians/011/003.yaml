id: 2CO.11.3
reference: '2 Corinthians 11:3'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: φοβοῦμαι δὲ μή πως, ὡς ὁ ὄφις ⸂ἐξηπάτησεν Εὕαν⸃ ἐν τῇ πανουργίᾳ αὐτοῦ, ⸀φθαρῇ τὰ νοήματα ὑμῶν ἀπὸ τῆς ἁπλότητος ⸂καὶ τῆς ἁγνότητος⸃ τῆς εἰς τὸν Χριστόν.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/011/003.yaml
  text: But I fear that somehow[a], just as the serpent deceived Eve by his cunning[d][c][b], your minds may be corrupted from the sincerity and purity that are toward Messiah.
translation:
  language: ko
  text: 그러나 나는 두렵습니다. 뱀이 자기 간계로 하와를 속인 것처럼, 여러분의 생각이 메시아를 향한 순전함과 정결함에서 떠나 부패해 버릴까 두렵습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὄφις
  english_pob_choice: serpent
  chosen_korean: 뱀
  lexicon: BDAG
  rationale: 창 3장의 뱀. 한국어 표준.
- source_word: ἐξηπάτησεν
  english_pob_choice: deceived
  chosen_korean: 속인
  lexicon: BDAG
  rationale: 강조형 ἐξαπατάω. 「속이다」가 분명하다.
  alternatives_korean:
  - 기만한
- source_word: πανουργίᾳ
  english_pob_choice: cunning
  chosen_korean: 간계
  lexicon: BDAG
  rationale: 「악한 술수」. 「간계」가 신약에서 정착된 한국어 어휘.
  alternatives_korean:
  - 교활함
  - 술수
- source_word: νοήματα
  english_pob_choice: minds
  chosen_korean: 생각
  lexicon: BDAG
  rationale: '10:5와 일관성. 「생각」으로 옮긴다.'
- source_word: ἁπλότης
  english_pob_choice: sincerity
  chosen_korean: 순전함
  lexicon: BDAG
  rationale: 여기서는 헌금 문맥의 「관대함」이 아니라 메시아를 향한 「단일한 마음, 순전함」. 「순전함」이 그 의미를 살린다.
  alternatives_korean:
  - 단순함
  - 진실함
- source_word: ἁγνότης
  english_pob_choice: purity
  chosen_korean: 정결함
  lexicon: BDAG
  rationale: 앞 절 ἁγνός 어계와 호응.
