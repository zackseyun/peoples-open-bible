  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo y del POB inglés: condición explicativa con כִּי אִם, nombre transliterado Kain, pregunta temporal con עַד מָה, Asur transliterado, y el verbo de cautiverio. Sin embargo, «es para quemarse» introduce en español un matiz reflexivo/intransitivo que no preserva bien la idea de destino a ser consumido o quemado. El hebreo לְבָעֵר y el POB inglés «is for burning» apuntan mejor a «es para ser quemado» o equivalente.'
