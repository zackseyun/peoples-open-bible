translation:
  language: es
  text: «Desde ahora puedo morir[a]». Y lloraron ambos. Entonces Tobit salió hacia la puerta y tropezó; pero su hijo corrió hacia él,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «Desde ahora moriré», un modismo que expresa que su anhelo se ha cumplido y que está lista para morir en paz.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ τοῦ νῦν
  english_pob_choice: From now on
  chosen_spanish: Desde ahora
  alternatives_spanish:
  - De ahora en adelante
  - A partir de ahora
  lexicon: LSJ
  rationale: La expresión griega es temporal e idiomática. «Desde ahora» conserva el valor de punto de partida sin volverlo artificial en español. Mantiene la inmediatez emocional del contexto.
- source_word: ἀποθανοῦμαι
  english_pob_choice: I can die
  chosen_spanish: puedo morir
  alternatives_spanish:
  - moriré
  - ya puedo morir
  lexicon: LSJ
  rationale: 'El inglés POB entiende aquí un modismo de satisfacción cumplida, no una predicción fría. En español, «puedo morir» transmite bien esa idea de plenitud emocional: ya ha visto lo que anhelaba.'
- source_word: ἔκλαυσαν
  english_pob_choice: wept
  chosen_spanish: lloraron
  alternatives_spanish:
  - lloraron con dolor
  - sollozaron
  lexicon: LSJ
  rationale: «Lloraron» comunica el acto de llanto en un registro natural y digno. «Sollozaron» sería más específico, pero no está exigido por el griego.
- source_word: ἀμφότεροι
  english_pob_choice: both of them
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos de ellos
  lexicon: LSJ
  rationale: «Ambos» es la forma más natural y compacta en español para marcar con claridad a las dos personas.
- source_word: ἐξήρχετο
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - iba saliendo
  - se encaminó hacia afuera
  lexicon: LSJ
  rationale: Aunque el imperfecto sugiere acción en progreso, el español narrativo suele preferir el aorístico natural «salió» para este movimiento. El contexto ya conserva la progresión con la frase siguiente.
- source_word: πρὸς τὴν θύραν
  english_pob_choice: toward the door
  chosen_spanish: hacia la puerta
  alternatives_spanish:
  - a la puerta
  - para la puerta
  lexicon: LSJ
  rationale: La preposición πρός con acusativo expresa dirección. «Hacia la puerta» preserva esa orientación sin sonar rígido.
- source_word: προσεκόπτεν
  english_pob_choice: stumbled
  chosen_spanish: tropezó
  alternatives_spanish:
  - iba tropezando
  - tropezaba
  lexicon: LSJ
  rationale: El verbo σημαίνει chocar/tropezar. En español, «tropezó» es la equivalencia más clara y fluida para la escena de Tobit moviéndose con dificultad.
- source_word: προσέδραμεν
  english_pob_choice: ran to him
  chosen_spanish: corrió hacia él
  alternatives_spanish:
  - fue corriendo hacia él
  - corrió a su encuentro
  lexicon: LSJ
  rationale: El griego subraya movimiento rápido hacia una persona. «Corrió hacia él» reproduce bien esa inmediatez sin añadir matices no presentes en el texto.
theological_decisions:
- issue: Valor idiomático de ἀποθανοῦμαι
  english_pob_reading: Rendered as 'I can die' rather than a strictly predictive 'I will die.'
  chosen_spanish_reading: «puedo morir» en vez de «moriré»
  alternative_spanish_readings:
  - «ya puedo morir»
  - «moriré»
  rationale: 'No se trata de una afirmación doctrinal, sino de un modismo de alivio y plenitud. «Puedo morir» conserva esa tensión: la persona expresa que ya está satisfecha y preparada para morir en paz.'
  doctrine_reference: Translation philosophy §1, §6
- issue: Continuidad narrativa del sujeto en Tobit
  english_pob_reading: Kept the Greek sequence as given, with Tobit as the one who went out and stumbled.
  chosen_spanish_reading: 'Se mantiene la secuencia griega: Tobit es quien sale y tropieza.'
  alternative_spanish_readings:
  - Reordenar la frase para aliviar la dificultad narrativa
  - Suavizar el tropiezo con una formulación interpretativa
  rationale: El texto base griego se sigue de cerca, sin armonizarlo con tradiciones ampliadas ni resolver la secuencia por paráfrasis. La dificultad narrativa se conserva como parte del testimonio textual.
  doctrine_reference: 'PHILOSOPHY.md: Swete LXX as primary Greek source for deuterocanonical books'
translation_notes:
  revision_awareness: El borrador sigue la lectura griega de Swete para Tobit 11:10 y conserva la estructura narrativa del pasaje. Se reflejó la nota inglesa sobre el modismo de ἀποθανοῦμαι mediante una solución española equivalente, sin volverla más predictiva de lo que el contexto permite. No se observan revisiones aplicadas en el audit trail más allá de la lectura estable.
  spanish_consistency_notes:
  - Se usa «Tobit» de forma consistente con la tradición del libro en español.
  - «ambos» mantiene la referencia dual explícita del griego.
  - Se prefirió «hacia la puerta» para conservar dirección sin sobrecargar la escena.
  - El tropiezo se expresa con un verbo simple y natural, acorde al contexto de la ceguera de Tobit.
