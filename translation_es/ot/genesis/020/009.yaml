review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Abimelec llama a Abraham, formula dos preguntas retóricas, describe la consecuencia moral sobre él y su reino, y concluye con una acusación normativa. Sin embargo, «¿Qué has hecho con nosotros?» no es la mejor representación de מֶה עָשִׂיתָ לָּנוּ, que significa «¿Qué nos has hecho?» o «¿Qué has hecho contra nosotros/a nosotros?», no simplemente «con nosotros». Además, los marcadores de notas están anclados en lugares equivocados: la nota [a] corresponde a la alternativa de «¿Y en qué he pecado contra ti?» y la [b] a «cosas que no se deben hacer», no a «le dijo» ni a «contra ti».'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos ajustes de naturalidad/fidelidad: cambiar «¿Qué has hecho con nosotros?» por «¿Qué nos has hecho?» para evitar ambigüedad en español, y reubicar los marcadores de nota al segmento pertinente. El resto del verso es legible y adecuado: «¿Y en qué he pecado contra ti...?» funciona bien; «has traído sobre mí y sobre mi reino un gran pecado» preserva el peso ético; «cosas que no se deben hacer» es idiomático.'
  glossary_alignment: No hay términos del glosario principal en disputa aquí. «Pecado» para חטא/חטאה está bien conservado y mantiene la fuerza moral; «reino» para מַמְלַכְתִּי es correcto. No se detectan conflictos con las convenciones de Yahvé/Mesías/etc.
  issues:
  - severity: medium
    issue: «¿Qué has hecho con nosotros?» debilita el sentido de לָּנוּ
    rationale: El hebreo מֶה עָשִׂיתָ לָּנוּ expresa daño o acción dirigida hacia «nosotros». En español, «hacer con nosotros» puede sonar a mera interacción o manejo, mientras que «¿Qué nos has hecho?» comunica mejor la queja acusatoria del original.
  - severity: high
    issue: Los marcadores de notas [a] y [b] están anclados en frases incorrectas
    rationale: La nota [a] ofrece la alternativa de וּמֶה חָטָאתִי לָךְ, por lo que debe aparecer junto a «¿Y en qué he pecado contra ti?». La nota [b] explica la alternativa de מַעֲשִׂים אֲשֶׁר לֹא יֵעָשׂוּ, así que debe ir junto a «cosas que no se deben hacer». En el borrador actual, [a] aparece tras «le dijo» y [b] tras «contra ti», lo cual desinforma al lector.
  revised_spanish_text: 'Entonces Abimelec llamó a Abraham y le dijo: «¿Qué nos has hecho? ¿Y en qué he pecado contra ti[a], para que hayas traído sobre mí y sobre mi reino un gran pecado? Has hecho conmigo cosas que no se deben hacer[b]».'
  revised_footnotes:
