translation:
  language: es
  text: Y ahora, Yahvé, que la palabra que has hablado acerca de tu siervo y acerca de su casa[a] sea confirmada para siempre, y haz conforme a lo que has hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su dinastía» o «su linaje». En este contexto, «casa» puede referirse al hogar, a la descendencia o a la dinastía real.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, siguiendo la norma del proyecto de transliterarlo como 'Yahvé' en vez de sustituirlo por un título.
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: La conjunción más el adverbio temporal introducen el giro de la oración; 'Y ahora' preserva el enlace discursivo y el tono peticional.
- source_word: הַדָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el asunto
  - la promesa
  lexicon: HALOT
  rationale: Aunque el sentido contextual es el de una promesa divina, 'palabra' refleja con mayor cercanía el hebreo y mantiene el vínculo con lo que Yahvé ha dicho.
- source_word: אֲשֶׁר דִּבַּרְתָּ
  english_pob_choice: that you have spoken
  chosen_spanish: que has hablado
  alternatives_spanish:
  - que hablaste
  - que has dicho
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte de forma natural en español con pretérito perfecto compuesto, que expresa una palabra dicha antes y todavía vigente en la petición.
- source_word: עַל עַבְדְּךָ
  english_pob_choice: concerning your servant
  chosen_spanish: acerca de tu siervo
  alternatives_spanish:
  - sobre tu esclavo
  - respecto de tu siervo
  lexicon: HALOT
  rationale: Se mantiene 'siervo' porque el contexto es de súplica reverente y no exige la fuerza lexical de 'esclavo'; 'acerca de' traduce bien el valor relacional de עַל en este pasaje.
- source_word: וְעַל בֵּיתוֹ
  english_pob_choice: and concerning his house
  chosen_spanish: y acerca de su casa
  alternatives_spanish:
  - y acerca de su dinastía
  - y acerca de su familia
  lexicon: HALOT
  rationale: Se conserva 'casa' en el texto principal para respetar el término de pacto, que puede abarcar casa, linaje o dinastía según el contexto.
- source_word: יֵאָמֵן
  english_pob_choice: be established
  chosen_spanish: sea estable
  alternatives_spanish:
  - sea confirmado
  - permanezca firme
  lexicon: HALOT
  rationale: El nifal de אמן comunica firmeza/confirmación; 'sea estable' suena natural en español y conserva la idea de permanencia y confirmación de la palabra divina.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - para toda la vida
  lexicon: HALOT
  rationale: Equivalencia idiomática y solemne para la duración indefinida expresada por el hebreo.
- source_word: וַעֲשֵׂה כַּאֲשֶׁר דִּבַּרְתָּ
  english_pob_choice: and do as you have spoken
  chosen_spanish: y haz conforme a lo que has hablado
  alternatives_spanish:
  - y actúa conforme a lo que has dicho
  - y haz como has dicho
  lexicon: HALOT
  rationale: '''Conforme a lo que has hablado'' preserva el paralelismo con ''palabra/has hablado'' y expresa con precisión la petición de que Dios actúe según su promesa.'
theological_decisions:
- issue: Sentido de 'su casa' en el contexto davídico
  english_pob_reading: Retain 'his house' in the main text, allowing the covenantal sense of David's household/dynasty to stand without narrowing it.
  chosen_spanish_reading: Mantener 'su casa' en el texto principal, dejando que el sentido de casa, linaje o dinastía quede abierto por el contexto.
  alternative_spanish_readings:
  - su dinastía
  - su familia
  rationale: En 1 Crónicas 17 la promesa no se limita a una vivienda; sin embargo, el hebreo usa el término cargado de pacto 'casa'. La traducción principal lo conserva y una nota puede explicitar las posibilidades contextuales.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo con el control de revisión y no requiere cambios sustantivos respecto del texto fuente auditado; se mantiene la terminología de pacto ('casa') y la forma del nombre divino como 'Yahvé'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - '''Siervo'' se conserva por el tono reverente del contexto.'
  - '''Casa'' se retiene como término de pacto, con nota para su posible sentido dinástico.'
  - '''Palabra'' y ''has hablado'' preservan la repetición léxica del hebreo y del audit trail inglés.'
