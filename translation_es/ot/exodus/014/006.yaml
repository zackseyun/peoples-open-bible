translation:
  language: es
  text: Así que aparejó su carro y tomó consigo a su pueblo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "lo dejó listo"; el verbo hebreo literalmente significa "atar" o "sujetar", aquí en el sentido de preparar el tiro del carro para partir.'
    reason: lexical_alternative
  - marker: b
    text: '"Su pueblo" probablemente se refiere al contingente que acompañaba al faraón; el hebreo dice "su pueblo", no explícitamente "su ejército".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאְסֹר
  english_pob_choice: harnessed
  chosen_spanish: hizo aparejar
  alternatives_spanish:
  - enganchó
  - ató
  - preparó
  lexicon: HALOT
  rationale: El verbo hebreo אסר significa literalmente 'atar' o 'sujetar', pero en el contexto de carros comunica la preparación del tiro para salir. En español, 'hizo aparejar' conserva esa acción concreta sin volverse demasiado técnica ni perder el matiz de preparación vehicular.
- source_word: רִכְבּוֹ
  english_pob_choice: his chariot
  chosen_spanish: su carro
  alternatives_spanish:
  - su carro de guerra
  - su carroza
  - su carruaje
  lexicon: HALOT
  rationale: El singular con sufijo apunta naturalmente al carro de Faraón. 'Carro' es la forma breve y fiel; 'carro de guerra' explicita demasiado y 'carroza/carruaje' suenan menos adecuados al contexto militar.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su gente
  - su ejército
  - sus hombres
  lexicon: HALOT
  rationale: עַם significa primariamente 'pueblo'. Aunque el contexto sugiere un contingente militar, el hebreo no dice explícitamente 'ejército'. 'Su pueblo' preserva esa ambigüedad documental; 'su ejército' sería una especificación interpretativa.
- source_word: לָקַח עִמּוֹ
  english_pob_choice: took with him
  chosen_spanish: tomó consigo
  alternatives_spanish:
  - llevó consigo
  - tomó con él
  lexicon: HALOT
  rationale: La combinación verbal-preposicional expresa llevar a alguien consigo. 'Tomó consigo' es natural en español y conserva la relación cercana entre el sujeto y quienes lo acompañan.
theological_decisions:
- issue: Qué designa 'su pueblo' en un marco militar
  english_pob_reading: '''His people'' likely refers to the force accompanying Pharaoh; the Hebrew says ''his people,'' not explicitly ''his army''.'
  chosen_spanish_reading: '''su pueblo'' se mantiene sin convertirlo en ''su ejército''.'
  alternative_spanish_readings:
  - '''su ejército'''
  - '''sus hombres'''
  rationale: La decisión evita borrar la tensión semántica del hebreo. Aunque el contexto apunta a una fuerza armada, la fuente no usa el término técnico 'ejército'; por fidelidad auditable conviene conservar la expresión más amplia.
  doctrine_reference: Fidelidad lexical al sentido del texto hebreo en contexto narrativo-histórico
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con la auditoría inglesa y no requiere revisión textual adicional; se conserva la ambigüedad de עַמּוֹ señalada en el informe y se adapta 'harnessed' a un español natural y fiel.
  spanish_consistency_notes:
  - Se prefiere 'Yahvé' para el tetragrámaton cuando corresponda, aunque este versículo no lo contiene.
  - Se mantiene 'pueblo' en lugar de 'ejército' para respetar la no-explicitación del hebreo.
  - '''Tomó consigo'' reproduce de modo idiomático la secuencia verbal sin añadir contenido interpretativo.'
