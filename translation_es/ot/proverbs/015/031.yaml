revisions:
- from: El oído que escucha la corrección de la vida[a][b] morará entre los sabios.
  to: El oído que escucha la reprensión que da vida[a][b] permanecerá entre los sabios.
  rationale: 'Se ajusta el texto principal para reflejar mejor el sentido fuente y la decisión documentada en el POB inglés: una reprensión que conduce a la vida. ''Reprensión'' preserva mejor la fuerza de תּוֹכַחַת, ''que da vida'' ofrece un español más claro y fiel que ''de la vida'', y ''permanecerá'' expresa naturalmente el uso figurado de תָּלִין. Las notas conservan las alternativas más literales y la imagen verbal hebrea.'
