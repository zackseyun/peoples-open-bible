    text: 'O: «de seguir tras las ovejas con cría».'
    reason: lexical_alternative
  - marker: b
    text: «Herencia» también puede traducirse «posesión» o «patrimonio».
    reason: lexical_alternative
  revision_rationale: La revisión corrige un calco poco natural ('desde el seguir a') por una expresión idiomática que sí refleja el hebreo מֵאַחַר, y mejora la naturalidad de עָלוֹת con 'ovejas que crían'. Se conserva la imagen pastoral explícita, el paralelismo Jacob/Israel y la nota sobre 'herencia'.
