lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - habló y dijo
  lexicon: HALOT
  rationale: El verbo דבר en fórmulas narrativas de revelación introduce un acto formal de habla. En español, 'habló' conserva ese tono solemne y funciona bien con la continuación 'diciendo', sin duplicar innecesariamente la fórmula con 'dijo'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio mediante la transliteración española establecida por el proyecto. 'Yahvé' mantiene el Tetragrama como nombre personal del pacto, en lugar de sustituirlo por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición de dirección/objeto indirecto se expresa naturalmente en español con 'a' cuando introduce al destinatario del habla.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico con forma española convencional y plenamente inteligible.
- source_word: לֵּאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo funciona como fórmula de introducción del discurso. 'Diciendo' reproduce la continuidad del habla de forma natural en español y evita una paráfrasis excesiva.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrama. La traducción española sigue la decisión del proyecto de preservar el nombre divino como 'Yahvé', no como sustituto titular, para mantener visible la identidad revelada de Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y que el acuerdo con la fuente era alto; esta redacción sigue ese estado sin introducir variantes no sustentadas.
  spanish_consistency_notes:
  - Se mantiene la fórmula narrativa completa con verbo de habla + infinitivo introductorio, sin convertirla en una paráfrasis libre.
  - El nombre divino se normaliza como 'Yahvé', en coherencia con la terminología del proyecto para יְהוָה.
  - Se usa puntuación española estándar con coma antes de 'diciendo' para reflejar la cadencia de la fórmula hebrea.
