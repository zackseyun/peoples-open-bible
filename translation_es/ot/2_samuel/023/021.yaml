translation:
  language: es
  text: Él también hirió a un egipcio[a], un hombre de apariencia notable. El egipcio tenía una lanza en la mano, y bajó hacia él con una vara[b], le arrebató la lanza de la mano del egipcio y lo mató con su propia lanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un hombre hermoso» o «un hombre de apariencia notable». La frase hebrea se refiere de manera amplia a la apariencia del egipcio; algunos intérpretes, influidos por el paralelo en 1 Crónicas 11:23, entienden que sugiere una estatura inusual.
    reason: lexical_alternative
  - marker: b
    text: O «con un bastón», «con un palo» o «con un garrote». El hebreo שֵׁבֶט puede denotar una vara, bastón, cetro o garrote según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  english_pob_choice: He also
  chosen_spanish: Él también
  alternatives_spanish:
  - Y él
  - Él
  lexicon: HALOT
  rationale: El hebreo agrega el pronombre con la conjunción para continuar la lista de hazañas; «también» reproduce bien el valor aditivo sin volver rígida la sintaxis en español.
- source_word: הִכָּה
  english_pob_choice: struck down
  chosen_spanish: derribó
  alternatives_spanish:
  - golpeó
  - hirió
  - mató
  lexicon: HALOT
  rationale: En este contexto bélico, el verbo comunica un golpe decisivo de combate sin adelantar la muerte explícita que el versículo afirma después; «derribó» conserva esa progresión narrativa.
- source_word: אִישׁ מִצְרִי
  english_pob_choice: an Egyptian
  chosen_spanish: un egipcio
  alternatives_spanish:
  - un hombre egipcio
  - un hombre, egipcio
  lexicon: HALOT
  rationale: La construcción étnica es natural en español y transmite el referente sin añadir una palabra innecesaria.
- source_word: אשר מַרְאֶה
  english_pob_choice: a man of impressive appearance
  chosen_spanish: un hombre de apariencia notable
  alternatives_spanish:
  - un hombre hermoso
  - un hombre de gran estatura
  - un hombre de aspecto impresionante
  lexicon: HALOT
  rationale: מַרְאֶה alude al aspecto visible en general. «Apariencia notable» conserva la amplitud semántica sin decidir por belleza o estatura exclusivamente.
- source_word: וּבְיַד הַמִּצְרִי חֲנִית
  english_pob_choice: The Egyptian had a spear in his hand
  chosen_spanish: El egipcio tenía una lanza en la mano
  alternatives_spanish:
  - Y en la mano del egipcio había una lanza
  - Con una lanza en la mano el egipcio
  lexicon: HALOT
  rationale: La posesión se expresa de forma idiomática y clara en español, manteniendo la imagen concreta del arma en la mano.
- source_word: וַיֵּרֶד אֵלָיו
  english_pob_choice: he went down to him
  chosen_spanish: descendió hacia él
  alternatives_spanish:
  - fue hacia él
  - bajó hacia él
  - avanzó hacia él
  lexicon: HALOT
  rationale: יַרַד conserva el movimiento literal de descenso; «descendió hacia él» mantiene esa imagen y resulta comprensible en español narrativo.
- source_word: בַּשָּׁבֶט
  english_pob_choice: with a staff
  chosen_spanish: con un bastón
  alternatives_spanish:
  - con una vara
  - con un palo
  - con un cetro
  lexicon: HALOT
  rationale: שֵׁבֶט admite varios sentidos. Aquí funciona como instrumento de combate o palo; «bastón» es el equivalente más natural en español sin forzar la imagen a «club».
- source_word: וַיִּגְזֹל
  english_pob_choice: snatched
  chosen_spanish: le arrebató
  alternatives_spanish:
  - le quitó por la fuerza
  - se apoderó de
  - le arrancó
  lexicon: HALOT
  rationale: El verbo expresa toma violenta y rápida; «arrebató» preserva el matiz de fuerza mejor que un simple «tomó».
- source_word: וַיַּהַרְגֵהוּ
  english_pob_choice: killed him
  chosen_spanish: lo mató
  alternatives_spanish:
  - lo hirió de muerte
  - lo mató a él
  - lo dio muerte
  lexicon: HALOT
  rationale: הרג es el verbo normal para matar; «lo mató» es directo, claro y plenamente fiel.
- source_word: בַּחֲנִיתוֹ
  english_pob_choice: with his own spear
  chosen_spanish: con su propia lanza
  alternatives_spanish:
  - con la lanza del mismo
  - con su lanza
  lexicon: HALOT
  rationale: El sufijo pronominal se refiere naturalmente al egipcio, resaltando la inversión irónica de la acción; «su propia lanza» hace explícito ese referente en español.
theological_decisions:
- issue: Relación entre el golpe inicial y la muerte final
  english_pob_reading: The first clause says he struck down the Egyptian, while the last clause states he killed him with the spear, preserving narrative sequence.
  chosen_spanish_reading: Se mantiene «derribó» en la primera cláusula y «lo mató» al final, para no borrar la secuencia entre el golpe inicial y la muerte explícita.
  alternative_spanish_readings:
  - «mató» en la primera cláusula
  - «hirió» en la primera cláusula
  rationale: El hebreo distingue entre el impacto de combate inicial y la acción letal final. La traducción no debe fusionarlos ni suavizarlos.
  doctrine_reference: Principio de consistencia textual y progresión narrativa; no aplica una doctrina específica.
- issue: Alcance de מַרְאֶה
  english_pob_reading: a man of impressive appearance, with a note that some interpreters infer unusual stature from the parallel in 1 Chronicles 11:23.
  chosen_spanish_reading: «un hombre de apariencia notable», con nota alternativa sobre belleza o gran estatura.
  alternative_spanish_readings:
  - «un hombre hermoso»
  - «un hombre de gran estatura»
  rationale: El hebreo de Samuel habla de la apariencia visible en general; la posible inferencia de estatura viene del paralelo, no de una imposición del versículo mismo.
  doctrine_reference: Principio de prioridad del texto fuente y uso responsable de paralelos.
- issue: Sentido de שֵׁבֶט
  english_pob_reading: staff/rod/club depending on context; English chose 'staff' and footnoted alternatives.
  chosen_spanish_reading: «bastón» en el texto principal, con nota alternativa sobre «vara» o «palo».
  alternative_spanish_readings:
  - «vara»
  - «palo»
  - «cetro»
  rationale: El término es semánticamente amplio. «Bastón» comunica bien un objeto de mano sin imponer un grado de formalidad litúrgica ajeno al contexto bélico.
  doctrine_reference: Principio lexicográfico y de transparencia semántica.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo WLC y toma como guía el audit trail inglés POB. Se reflejó la revisión más reciente que evitó introducir una adversativa inexistente en el hebreo; por eso se usa «y» donde el origen solo coordina la acción. También se preservó la progresión narrativa entre el primer golpe, el desarme y la muerte final, y se mantuvo la amplitud semántica de מַרְאֶה y שֵׁבֶט con notas alternativas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; aquí no aplica.
  - Se mantuvo «lanza» para חֲנִית y «bastón» para שֵׁבֶט, evitando mezclar términos militares distintos.
  - Se evitó traducir mecánicamente el orden inglés; la sintaxis española fue ajustada sin perder el encadenamiento verbal del hebreo.
  - El pronombre de 3.ª persona en «le arrebató» y «lo mató» conserva la referencia al egipcio y evita ambigüedad en español.
