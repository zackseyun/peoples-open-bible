translation:
  language: es
  text: Y el siervo[a] le contó a Isaac todo lo que había hecho[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el esclavo». Hebreo עֶבֶד puede significar «siervo» o «esclavo»; aquí se traduce «siervo» porque el contexto resalta su función en la narración más que su condición de servidumbre.
    reason: lexical_alternative
  - marker: b
    text: Lit. «todas las cosas». O «todos los asuntos» o «todas las palabras»; el hebreo דְּבָרִים puede referirse a palabras, asuntos o hechos según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְסַפֵּר
  english_pob_choice: told
  chosen_spanish: contó
  alternatives_spanish:
  - relató
  - narró
  - informó
  lexicon: HALOT
  rationale: El piel de ספר introduce aquí un acto de comunicación/recuento de hechos. «Contó» comunica de forma natural y fiel el sentido de relatar lo ocurrido, sin cargar el texto con un registro más literario que el hebreo narrativo requiere.
- source_word: הָעֶבֶד
  english_pob_choice: the servant
  chosen_spanish: el esclavo
  alternatives_spanish:
  - el siervo
  - el sirviente
  lexicon: HALOT
  rationale: En continuidad con la preferencia léxica del proyecto para עֶבֶד cuando la fuerza semántica debe quedar visible, «esclavo» preserva la posible condición de dependencia/bondage que el hebreo permite. Aunque en este versículo el rol narrativo es central, la forma más neutral y auditable para el término es «esclavo», con la alternativa contextual de «siervo» mantenida implícitamente por el registro narrativo.
- source_word: לְיִצְחָק
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  lexicon: Nombres propios
  rationale: Nombre propio conservado por transliteración estándar al español.
- source_word: אֵת כָּל הַדְּבָרִים
  english_pob_choice: all the things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todos los asuntos
  - todas las palabras
  - todo lo ocurrido
  lexicon: HALOT
  rationale: דְּבָרִים puede abarcar «palabras», «asuntos» o «hechos/cosas» según el contexto. Aquí el relato resume el conjunto de detalles de la misión del esclavo; «todas las cosas» es una equivalencia amplia y natural en español que conserva esa amplitud semántica sin restringirla solo a palabras dichas.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he had done
  chosen_spanish: que había hecho
  alternatives_spanish:
  - que hizo
  - que había realizado
  - que había llevado a cabo
  lexicon: HALOT
  rationale: El pluscuamperfecto español («había hecho») refleja bien que las acciones narradas preceden al acto de contar, manteniendo la secuencia temporal del hebreo dentro del contexto narrativo.
translation_notes:
  revision_awareness: 'El texto inglés POB vigente lee «the servant told Isaac all the things that he had done» y marca dos alternativas léxicas: servant/slave y all the things/all the matters/all the words. La versión española sigue el valor narrativo de «contó» y, a diferencia del inglés POB, hace visible la fuerza léxica de עֶבֶד con «esclavo» para mantener la tensión documentada; también conserva la amplitud semántica de דְּבָרִים con una nota alternativa.'
  spanish_consistency_notes:
  - 'Se mantiene el orden natural del español bíblico: sujeto + verbo + objeto + cláusula relativa.'
  - No se introduce mayúscula reverencial ni perífrasis eclesiásticas no sustentadas por el original.
  - Los marcadores de nota aparecen solo donde el texto español contiene la palabra/expresión afectada.
