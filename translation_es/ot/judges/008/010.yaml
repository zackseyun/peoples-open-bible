revisions:
- from: Ahora Sébaj y Zalmuna estaban en Carkor[a], y su campamento estaba con ellos, como quince mil hombres, todos los que habían quedado de todo el campamento de los hijos del oriente; y los que habían caído eran ciento veinte mil hombres que sacaban la espada.
  to: Ahora Sébaj y Zalmuna estaban en Karkor[a], y su campamento estaba con ellos, unos quince mil, todos los que habían quedado de todo el campamento de los hijos del oriente; y los que habían caído eran ciento veinte mil hombres que desenvainaban espada.
  rationale: Se ajusta el topónimo principal a «Karkor» para concordar con la auditoría y el hebreo documentado, dejando «Carkor» como alternativa en nota. Se mejora la naturalidad de la aproximación numérica con «unos quince mil». Se sustituye «sacaban la espada» por «desenvainaban espada» para representar con más precisión y fuerza el modismo marcial hebreo שֹׁלֵף חָרֶב. No se requiere adjudicación adicional.
