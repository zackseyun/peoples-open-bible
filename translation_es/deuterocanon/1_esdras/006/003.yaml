translation:
  language: es
  text: En aquel tiempo Sisines[a], el gobernador de Siria y Fenicia, estaba presente con ellos, junto con Sathrabuzanes y sus asociados; y les dijo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego tiene un verbo singular («y dijo»), lo que hace más natural entender a Sisines como el hablante principal, aunque va acompañado por Sathrabuzanes y otros asociados.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν αὐτῷ τῷ χρόνῳ
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - En aquel mismo tiempo
  lexicon: LSJ
  rationale: Es una expresión temporal narrativa estándar. «En aquel tiempo» conserva la relación secuencial sin forzar un matiz excesivo en αὐτῷ.
- source_word: παρῆν
  english_pob_choice: was present
  chosen_spanish: estaba presente
  alternatives_spanish:
  - vino
  - apareció
  - llegó
  lexicon: BDAG
  rationale: El verbo subraya la presencia, no el movimiento. «Estaba presente» respeta ese énfasis y suena natural en español.
- source_word: πρὸς αὐτούς
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - ante ellos
  - para con ellos
  lexicon: BDAG
  rationale: Con παρῆν, la preposición expresa relación de presencia con el grupo; «con ellos» reproduce bien el sentido idiomático.
- source_word: Σισίννης
  english_pob_choice: Sisinnes
  chosen_spanish: Sisinnes
  alternatives_spanish:
  - Sisines
  lexicon: LSJ
  rationale: Nombre propio transliterado desde el griego. Se mantiene la forma cercana al original y al uso habitual en inglés POB.
- source_word: ὁ ἔπαρχος
  english_pob_choice: the governor
  chosen_spanish: el gobernador
  alternatives_spanish:
  - el prefecto
  - el gobernador provincial
  lexicon: BDAG
  rationale: ἔπαρχος designa a un funcionario con autoridad regional. «Gobernador» es la equivalencia más clara y accesible en español moderno.
- source_word: Συρίας καὶ Φοινίκης
  english_pob_choice: of Syria and Phoenicia
  chosen_spanish: de Siria y Fenicia
  alternatives_spanish:
  - sobre Siria y Fenicia
  lexicon: LSJ
  rationale: Los genitivos señalan el territorio de su cargo. En español, «de Siria y Fenicia» expresa esa relación de manera natural.
- source_word: καὶ Σαθραβουζάνης
  english_pob_choice: along with Sathrabuzanes
  chosen_spanish: junto con Sathrabuzanes
  alternatives_spanish:
  - y Sathrabuzanes
  lexicon: LSJ
  rationale: «Junto con» comunica que Sathrabuzanes acompaña a Sisinnes, sin insinuar una relación distinta a la del listado de oficiales.
- source_word: οἱ συνέταιροι
  english_pob_choice: his associates
  chosen_spanish: sus asociados
  alternatives_spanish:
  - sus compañeros
  - sus colegas
  - los asociados
  lexicon: BDAG
  rationale: συνέταιροι puede significar asociados, compañeros o colegas. Aquí, por el contexto administrativo, «sus asociados» mantiene la fuerza relacional sin volverla comercial.
- source_word: καὶ εἶπεν αὐτοῖς
  english_pob_choice: and he said to them,
  chosen_spanish: y les dijo,
  alternatives_spanish:
  - y les habló
  - y dijo a ellos
  lexicon: BDAG
  rationale: El verbo está en singular; por el contexto inmediato, la voz principal se atribuye a Sisinnes. «Les dijo» es la forma más directa y natural en español.
