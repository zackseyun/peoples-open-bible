base_translation:
  language: en
  yaml_path: translation/ot/2_kings/023/010.yaml
  text: And he defiled Topheth[a], which is in the Valley of Ben-hinnom[c][b], so that no man might make his son or his daughter pass through the fire to Molech.
  footnotes:
  - marker: a
    text: 'Hebrew: ''make his son or his daughter pass through the fire,'' a cultic idiom referring to offering children in a rite associated with Molech, likely child sacrifice.'
    reason: cultural_note
  - marker: b
    text: Or 'no one.' Hebrew 'man' is singular masculine with generic force here.
    reason: lexical_alternative
  - marker: c
    text: Or possibly 'for Molech'; less likely, some understand the consonants as 'to the king.'
    reason: alternative_reading
