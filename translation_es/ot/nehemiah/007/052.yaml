    text: O «Nefusim». El hebreo aquí se refleja más directamente con una forma como «Nefusésim».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los miembros de la casa de
  lexicon: HALOT
  rationale: En una lista genealógica como esta, בְּנֵי introduce linajes o grupos familiares. «Los hijos de» conserva la forma recurrente del hebreo y es idiomático en español bíblico; «descendientes de» sería más interpretativo y perdería la cadencia del listado.
- source_word: בֵסַי
  english_pob_choice: Besai
  chosen_spanish: Besai
  alternatives_spanish:
  - Bessai
  lexicon: HALOT
  rationale: Es un nombre propio. Se translitera en lugar de traducirse. «Besai» sigue de cerca la forma hebrea y mantiene la consistencia con una transliteración directa.
- source_word: מְעוּנִים
  english_pob_choice: Meunim
  chosen_spanish: Meunim
  alternatives_spanish:
  - Meunitas
  lexicon: HALOT
  rationale: Aunque puede funcionar como designación de un grupo étnico, en esta serie genealógica el texto inglés POB lo conserva como forma transliterada. En español, «Meunim» preserva la ambigüedad y evita imponer un etnónimo interpretativo.
- source_word: נפושסים
  english_pob_choice: Nephushesim
  chosen_spanish: Nefusésim
  alternatives_spanish:
  - Nefusésim
  - Nephusim
  lexicon: HALOT
  rationale: El hebreo apunta a un nombre/grupo propio dentro de la lista. Se prefiere una transliteración española que refleje la forma consonántica y sea pronunciable. «Nefusésim» adapta la secuencia a ortografía española sin borrar la base del nombre.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; el texto inglés más reciente permanece sin cambios y el consenso de revisión indica alta concordancia.
  spanish_consistency_notes:
  - Se mantiene la estructura repetitiva del hebreo con «los hijos de» para conservar el carácter genealógico del versículo.
  - Se conserva la transliteración de los nombres propios para no añadir interpretaciones no explicitadas por el texto fuente.
  - Se usa acentuación española en «Nefusésim» para facilitar lectura en español sin alejarse del nombre hebreo representado.
