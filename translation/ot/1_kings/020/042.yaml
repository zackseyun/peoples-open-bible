theological_decisions:
- issue: Rendering חֵרֶם terminology in a judgment oracle
  chosen_reading: devoted to destruction
  alternative_readings:
  - under my ban
  - doomed to destruction
  rationale: The term carries covenant-judgment force, not merely personal hostility. 'Devoted to destruction' preserves that theological weight without relying on the less transparent English term 'ban.'
