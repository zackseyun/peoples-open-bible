revisions:
- from: Y harás los marcos[a] para el tabernáculo de madera de acacia, de pie.
  to: Y harás los marcos[a] de madera de acacia para el tabernáculo, erguidos.
  rationale: Se reordenó «de madera de acacia» para que modifique claramente a «marcos» y no a «tabernáculo». Se cambió «de pie» por «erguidos» para expresar la orientación de עֹמְדִים con español más natural y adecuado al contexto constructivo. Se conserva la nota léxica sobre «marcos/tablas».
  reviewer_model: gpt-5.4
