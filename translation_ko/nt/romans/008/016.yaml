id: ROM.8.16
reference: Romans 8:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: αὐτὸ τὸ πνεῦμα συμμαρτυρεῖ τῷ πνεύματι ἡμῶν ὅτι ἐσμὲν τέκνα θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/romans/008/016.yaml
  text: The Spirit himself testifies with our spirit that we are God's children[a][b][c].
translation:
  language: ko
  text: 성령께서 친히 우리의 영과 더불어, 우리가 하나님의 자녀임을 증언하십니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: αὐτὸ τὸ πνεῦμα
  english_pob_choice: The Spirit himself
  chosen_korean: 성령께서 친히
  lexicon: BDAG
  rationale: 강조형. 신적 성령.
- source_word: τῷ πνεύματι ἡμῶν
  english_pob_choice: with our spirit
  chosen_korean: 우리의 영과 더불어
  alternatives_korean:
  - 우리의 영에게
  lexicon: BDAG
  rationale: 본 절은 두 영(성령/우리의 영)의 명시적 대조. 두 번째 πνεῦμα는 신자의 인격적 영이므로 「영」(소문자). 본 과제 정책.
- source_word: συμμαρτυρεῖ
  english_pob_choice: testifies with
  chosen_korean: 더불어 ... 증언하십니다
  lexicon: BDAG
  rationale: συν- 공동 증언.
- source_word: τέκνα θεοῦ
  english_pob_choice: God's children
  chosen_korean: 하나님의 자녀
  lexicon: BDAG
  rationale: τέκνα는 「자녀」 — υἱοί(8:14, 17)와 구별. 본 과제 정책.
theological_decisions:
- issue: 두 πνεῦμα의 분별 — 성령과 우리의 영
  chosen_reading: 첫 πνεῦμα = 성령, 둘째 πνεῦμα = 우리의 영
  alternative_readings:
  - 둘 다 「성령」으로 일치
  rationale: 헬라어 본문이 명시적으로 αὐτὸ τὸ πνεῦμα(성령 친히)와 τῷ πνεύματι ἡμῶν(우리의 영)을 구분하므로, 한국어에서도 「성령」/「우리의 영」으로 분별. 본 과제 정책 명시 — 「8:16 our spirit」.
  doctrine_reference: '본 과제 용어집: πνεῦμα 분별'
