revisions:
- from: Y la mano de Yahvé se agravó contra los hombres de Asdod[a], y los devastó, y los hirió con tumores, Asdod y su territorio.
  to: Y la mano de Yahvé pesó sobre la gente de Asdod[a]; los devastó y los hirió con tumores, a Asdod y a su territorio.
  rationale: Se cambió «se agravó» por «pesó sobre» para reflejar con más fidelidad y naturalidad el modismo hebreo de juicio opresivo. Se sustituyó «los hombres de Asdod» por «la gente de Asdod» para evitar restringir el referente a varones y concordar mejor con el sentido de los habitantes. Se suavizó ligeramente la puntuación para mejorar la fluidez del español sin perder el contenido ni la apposición final «Asdod y su territorio».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:42:35Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador preserva bien la estructura básica del hebreo: mantiene la imagen de la mano de Yahvé, el juicio contra los habitantes de Asdod, la devastación, el golpe con עפלים y la extensión a Asdod y su territorio. Sin embargo, «se agravó» no refleja bien el modismo hebreo «la mano ... fue pesada»; en español sugiere que la mano misma empeoró, no que pesó opresivamente sobre ellos. Además, «los hombres de Asdod» es más estrecho que «los habitantes / la gente de Asdod».'
  spanish_quality_summary: El texto es mayormente claro, pero «se agravó» suena poco natural en español bíblico moderno y «los hombres de Asdod» puede leerse como varones, no población. Una leve revisión mejora fidelidad y legibilidad sin perder dignidad. La nota al pie está bien formulada y bien anclada.
  glossary_alignment: Se alinea correctamente con la política del proyecto al usar «Yahvé» para יְהוָה. «Tumores» con nota alternativa también concuerda con la decisión léxica auditada. No hay conflicto terminológico mayor fuera de la necesidad de ajustar el modismo de «la mano ... fue pesada» y la referencia a los habitantes.
  issues:
  - severity: medium
    issue: «la mano de Yahvé se agravó» no transmite bien el hebraísmo
    rationale: וַתִּכְבַּד יַד יְהוָה expresa que la mano de Yahvé pesó fuertemente / fue pesada contra ellos. «Se agravó» en español es menos idiomático y desplaza la imagen hacia un empeoramiento abstracto.
  - severity: medium
    issue: «los hombres de Asdod» restringe indebidamente el referente
    rationale: הָאַשְׁדּוֹדִים se refiere a los habitantes o la gente de Asdod, no específicamente a los varones. «La gente de Asdod» o «los habitantes de Asdod» refleja mejor el alcance.
  - severity: low
    issue: Coma excesiva en la cadena verbal
    rationale: La repetición «..., y los devastó, y los hirió...» no es imposible, pero suena algo trabada en español moderno. Puede aligerarse sin apartarse del original.
  revised_spanish_text: Y la mano de Yahvé pesó sobre la gente de Asdod[a]; los devastó y los hirió con tumores, a Asdod y a su territorio.
  revised_footnotes:
  - marker: a
    text: O «con hinchazones»; tradicionalmente, algunos lo traducen más específicamente como «con hemorroides».
    reason: lexical_alternative
  revision_rationale: Se cambió «se agravó» por «pesó sobre» para reflejar con más fidelidad y naturalidad el modismo hebreo de juicio opresivo. Se sustituyó «los hombres de Asdod» por «la gente de Asdod» para evitar restringir el referente a varones y concordar mejor con el sentido de los habitantes. Se suavizó ligeramente la puntuación para mejorar la fluidez del español sin perder el contenido ni la apposición final «Asdod y su territorio».
