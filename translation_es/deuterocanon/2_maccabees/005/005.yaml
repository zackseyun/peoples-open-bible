  yaml_path: translation/deuterocanon/2_maccabees/005/005.yaml
  text: But when a false rumor arose that Antiochus had passed from life[a], Jason, taking no fewer than a thousand men, launched a sudden attack against the city. When those on the wall had been driven back, and at last the city was already being taken, Menelaus fled into the citadel.
