translation:
  language: es
  text: Y ahora[a], has querido bendecir la casa de tu siervo, para que esté delante de ti para siempre; porque tú, Yahvé, la has bendecido[c][b], y está bendecida para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te has mostrado dispuesto a bendecir»; también puede entenderse como «has consentido bendecir» o «has decidido bendecir».'
    reason: lexical_alternative
  - marker: b
    text: «Casa» aquí probablemente tiene fuerza dinástica, no solo el sentido de una vivienda física.
    reason: cultural_note
  - marker: c
    text: 'O: «y que esté bendecida para siempre». El hebreo puede leerse por algunos como una expresión de deseo, aunque la forma es más naturalmente una afirmación de bendición perdurable.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva la partícula conjuntiva ו y el adverbio temporal עתה. En español, «Y ahora» mantiene mejor el enlace discursivo y el tono de transición de la oración.
- source_word: הוֹאַ֨לְתָּ
  english_pob_choice: you have been pleased
  chosen_spanish: te has complacido
  alternatives_spanish:
  - has querido
  - has consentido
  - has emprendido
  lexicon: HALOT
  rationale: El verbo expresa disposición favorable o consentimiento. «Te has complacido» comunica esa voluntad benevolente en un registro natural y reverente, sin perder la idea de consentimiento divino.
- source_word: לְבָרֵךְ
  english_pob_choice: to bless
  chosen_spanish: bendecir
  alternatives_spanish:
  - conceder bendición a
  lexicon: HALOT
  rationale: Infinitivo de finalidad directo; «bendecir» es el equivalente español normal y fiel al acto de favor divino.
- source_word: בֵּית עַבְדְּךָ
  english_pob_choice: the house of your servant
  chosen_spanish: la casa de tu siervo
  alternatives_spanish:
  - la casa de tu esclavo
  - el linaje de tu siervo
  - la casa de tu servidor
  lexicon: HALOT
  rationale: «Casa» preserva la amplitud dinástica/familiar de בַּיִת en este contexto davídico, y «siervo» mantiene la formulación bíblica y devocional del hebreo. «Servidor» suaviza demasiado el término; «esclavo» sería más literal pero no corresponde al uso establecido en este contexto.
- source_word: לִהְיוֹת לְעוֹלָם לְפָנֶיךָ
  english_pob_choice: that it may be before you forever
  chosen_spanish: para que esté delante de ti para siempre
  alternatives_spanish:
  - para estar delante de ti para siempre
  - para que permanezca delante de ti para siempre
  lexicon: HALOT
  rationale: La expresión conserva el valor relacional/covenantal de «delante de ti» y la duración de לְעוֹלָם. «Esté» refleja bien el propósito/resultadode la cláusula sin forzar una lectura exclusivamente futura.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte conforme al criterio del proyecto como «Yahvé», preservando el nombre divino en vez de sustituirlo por un título.
- source_word: בֵּרַכְתָּ
  english_pob_choice: have blessed
  chosen_spanish: la has bendecido
  alternatives_spanish:
  - la bendijiste
  lexicon: HALOT
  rationale: Perfecto hebreo con relevancia presente; en español, el perfecto compuesto comunica adecuadamente el hecho ya realizado que fundamenta la afirmación siguiente.
- source_word: וּמְבֹרָךְ לְעוֹלָם
  english_pob_choice: and it is blessed forever
  chosen_spanish: y está bendecida para siempre
  alternatives_spanish:
  - y será bendecida para siempre
  - y may está bendecida para siempre
  lexicon: HALOT
  rationale: El participio pasivo funciona de modo resultativo/estativo; «está bendecida» preserva el estado permanente derivado de la bendición divina, sin introducir una modalidad optativa no explícita.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se mantiene el nombre propio divino en español conforme al estándar del proyecto, evitando la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de la cláusula final וּמְבֹרָךְ לְעוֹלָם
  english_pob_reading: declarative/resultative ('and it is blessed forever')
  chosen_spanish_reading: declarativa/resultativa ('y está bendecida para siempre')
  alternative_spanish_readings:
  - optativa ('y sea bendecida para siempre')
  - futuro ('y será bendecida para siempre')
  rationale: El participio pasivo es más naturalmente estativo/resultativo que jussivo. En el contexto de la oración de David, la bendición ya concedida sostiene la afirmación de un estado permanente de bendición.
  doctrine_reference: 'DOCTRINE.md: Hebrew verbal aspect and participial stative/resultative readings'
translation_notes:
  revision_awareness: 'No se aplicaron revisiones al pasaje: la versión de auditoría más reciente indica que no eran necesarios cambios y el cotejo externo reportó alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usó «bendecir/bendecida» para preservar el campo léxico de blessing del hebreo y del audit trail en inglés.
  - «Casa» se conservó por su carga dinástica en este contexto davídico.
  - La cláusula final se tradujo de forma declarativa/resultativa para respetar el participio pasivo hebreo.
