translation:
  language: es
  text: Entonces Saúl y sus hombres fueron a buscarlo. Y le dijeron a David que Saúl venía, así que él bajó a la peña[a] y se quedó en el desierto de Maón. Cuando Saúl lo oyó, persiguió a David en el desierto de Maón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Peña» traduce un término hebreo que también puede entenderse como «roca», «peñasco» o «risco»; probablemente se refiere a una formación rocosa notable o a un refugio natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבַקֵּשׁ
  english_pob_choice: to seek him
  chosen_spanish: a buscarlo
  alternatives_spanish:
  - a որոնarlo
  - a buscar a David
  lexicon: HALOT
  rationale: El infinitivo expresa propósito; en español, «a buscarlo» comunica naturalmente la finalidad de ir en pos de David. «Buscar» mantiene la fuerza del hebreo sin sonar arcaico.
- source_word: וַיַּגִּדוּ לְדָוִד
  english_pob_choice: And they told David
  chosen_spanish: Y se lo hicieron saber a David
  alternatives_spanish:
  - Y le dijeron a David
  - Y le informaron a David
  lexicon: HALOT
  rationale: El verbo hebreo es activo plural; en español, «se lo hicieron saber» conserva el sujeto plural implícito y el valor informativo del verbo. Se evita una pasiva impersonal que debilitaría la acción directa.
- source_word: וַיֵּרֶד
  english_pob_choice: he went down
  chosen_spanish: entonces él bajó
  alternatives_spanish:
  - entonces descendió
  - entonces se bajó
  lexicon: HALOT
  rationale: «Bajó» es el equivalente más natural para el movimiento descendente. Se mantiene la dirección espacial del hebreo sin forzar un calco.
- source_word: הַסֶּלַע
  english_pob_choice: the rock
  chosen_spanish: la peña
  alternatives_spanish:
  - la roca
  - el peñasco
  - la roca prominente
  lexicon: HALOT
  rationale: El sustantivo puede referirse a una formación rocosa destacada o fortaleza natural. «Peña» en español bíblico y moderno es comprensible y transmite mejor la idea de una masa rocosa prominente que «piedra»; «roca» queda como alternativa válida.
- source_word: וַיֵּשֶׁב
  english_pob_choice: stayed
  chosen_spanish: se quedó
  alternatives_spanish:
  - permaneció
  - habitó
  - se estableció
  lexicon: HALOT
  rationale: En contexto narrativo, el verbo expresa permanecer en un lugar. «Se quedó» es idiomático en español y conserva la noción de residencia temporal.
- source_word: בְּמִדְבַּר מָעוֹן / מִדְבַּר מָעוֹן
  english_pob_choice: in the wilderness of Maon
  chosen_spanish: en el desierto de Maón
  alternatives_spanish:
  - en el desierto/páramo de Maón
  - en la región desértica de Maón
  - en el desierto de Maón
  lexicon: HALOT
  rationale: מִדְבָּר puede abarcar desierto, yermo o territorio deshabitado; aquí se eligió «desierto» porque es conciso y transparente, aunque no implica necesariamente arena. El topónimo se conserva como Maón.
- source_word: וַיִּרְדֹּף אַחֲרֵי
  english_pob_choice: he pursued
  chosen_spanish: persiguió a David
  alternatives_spanish:
  - dio persecución a David
  - fue tras David
  - lo persiguió
  lexicon: HALOT
  rationale: El giro hebreo significa perseguir a alguien; en español, «persiguió a David» integra naturalmente el valor de אַחֲרֵי sin recargar la frase. El pronombre objeto se explicita como David para claridad referencial.
- source_word: וַיֵּלֶךְ שָׁאוּל וַאֲנָשָׁיו
  english_pob_choice: So Saul and his men went
  chosen_spanish: Así que Saúl y sus hombres fueron
  alternatives_spanish:
  - Entonces Saúl y sus hombres fueron
  - Saúl y sus hombres fueron
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración con consecuencia; «Así que» reproduce bien ese enlace causal/consecutivo en español. «Fueron» es natural y fiel al desplazamiento narrativo.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto hebreo y el trazado de la POB inglesa, manteniendo las decisiones clave: movimiento de búsqueda, aviso a David, descenso a la formación rocosa, permanencia en el desierto de Maón y persecución de Saúl. Se conservó la ambigüedad útil de הַסֶּלַע mediante una nota léxica.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se preservó el nombre propio «Maón» en transliteración uniforme.
  - Se usó «desierto» para מִדְבָּר por claridad y coherencia con el español bíblico contemporáneo.
  - Se mantuvo la referencia pronominal clara con «lo»/«David» para evitar ambigüedad en español.
