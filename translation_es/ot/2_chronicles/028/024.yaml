revisions:
- from: Ajaz reunió los utensilios de la casa de Dios y los cortó en piezas los utensilios de la casa de Dios[a], y cerró las puertas de la casa de Yahvé; además, se hizo altares en cada esquina de Jerusalén.
  to: Ajaz reunió los utensilios de la casa de Dios e hizo pedazos los utensilios de la casa de Dios[a], cerró las puertas de la casa de Yahvé y se hizo altares en cada esquina de Jerusalén.
  rationale: Se corrige la sintaxis defectuosa de la segunda cláusula para que el español sea natural y fiel al hebreo repetitivo. «Hizo pedazos» comunica bien la violencia de וַיְקַצֵּץ y la nota conserva la alternativa más literal «cortó en pedazos». También se simplifica la puntuación para reflejar mejor la cadena narrativa del original.
