translation:
  language: es
  text: Pero de las ciudades de estos pueblos que Yahvé tu Dios te da como herencia[a], no dejarás con vida a ningún ser que respire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «cualquier cosa que respire». Hebreo: «todo ser que respira».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Solo
  - Sin embargo
  lexicon: HALOT
  rationale: Rַק introduce una excepción respecto de la instrucción anterior; en español, «Pero» expresa bien ese giro adversativo sin volverlo mecánico.
- source_word: מֵעָרֵי
  english_pob_choice: from the cities of
  chosen_spanish: de las ciudades de
  alternatives_spanish:
  - desde las ciudades de
  - entre las ciudades de
  lexicon: HALOT
  rationale: La preposición מִן con «ciudades» se conserva naturalmente con «de», manteniendo la idea de un subconjunto dentro del conjunto mayor.
- source_word: הָעַמִּים הָאֵלֶּה
  english_pob_choice: these peoples
  chosen_spanish: estos pueblos
  alternatives_spanish:
  - estas naciones
  lexicon: HALOT
  rationale: «Pueblos» refleja con mayor cercanía el valor léxico de עַמִּים y evita cargar el texto con la connotación moderna de «naciones».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención editorial de la POB en español para el Tetragrama: «Yahvé», preservando el nombre divino y no sustituyéndolo por un título.'
- source_word: נֹתֵן
  english_pob_choice: is giving
  chosen_spanish: te da
  alternatives_spanish:
  - te está dando
  - te está entregando
  lexicon: HALOT
  rationale: El participio tiene fuerza progresiva; en español, «te da» comunica de forma natural la acción divina en curso, sin sobrecargar el registro.
- source_word: נַחֲלָה
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - como posesión
  - como patrimonio
  lexicon: HALOT
  rationale: «Herencia» preserva el peso pactal y territorial de נַחֲלָה. «Posesión» suaviza demasiado la carga covenantal del término.
- source_word: לֹא תְחַיֶּה
  english_pob_choice: you shall not let any living thing remain alive
  chosen_spanish: no dejarás con vida
  alternatives_spanish:
  - no permitirás que viva
  - no perdonarás la vida a
  lexicon: HALOT
  rationale: El piel causativo de חיה se expresa con naturalidad en español mediante «dejar con vida», conservando la fuerza causativa sin introducir una paráfrasis excesiva.
- source_word: כָּל נְשָׁמָה
  english_pob_choice: any living thing remain alive / any breathing thing
  chosen_spanish: ninguna cosa que respire
  alternatives_spanish:
  - ningún ser que respire
  - ningún aliento
  lexicon: HALOT
  rationale: נְשָׁמָה denota literalmente «respiración / cosa que respira». En este contexto bélico, «cosa que respire» retiene la imagen concreta mejor que «alma» o «ser vivo».
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La POB evita la sustitución reverencial y mantiene el nombre personal del pacto. En español, «Yahvé» es la forma de la línea editorial y conserva la referencia directa al Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Término de herencia pactal נַחֲלָה
  english_pob_reading: as an inheritance
  chosen_spanish_reading: como herencia
  alternative_spanish_readings:
  - como posesión
  - como patrimonio
  rationale: «Herencia» conserva el trasfondo de asignación pactal de tierra, en lugar de reducir el término a mera propiedad o tenencia.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
- issue: Alcance de נְשָׁמָה en contexto bélico
  english_pob_reading: any living thing remain alive / any breathing thing
  chosen_spanish_reading: ninguna cosa que respire
  alternative_spanish_readings:
  - ningún ser que respire
  - ningún ser viviente
  rationale: El hebreo literal habla de respiración; la formulación española mantiene la imagen sin diluirla en una equivalencia más abstracta.
  doctrine_reference: HALOT; source-text lexical force
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió de «breathing thing» a «living thing» por naturalidad, pero la base hebrea sigue siendo נְשָׁמָה («aliento/respiración»). Por eso el español conserva la imagen concreta de la respiración y no la generaliza a «ser vivo».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al criterio editorial español del proyecto.
  - «Herencia» se usa en sentido pactal, no meramente posesivo.
  - «Cosa que respire» conserva el paralelismo con la nota de alternativa del inglés y la fuerza léxica de נְשָׁמָה.
  - Se eligió un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
