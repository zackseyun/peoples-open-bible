review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: la escena de asamblea presente (נִצָּבִים ... הַיּוֹם), la comparecencia delante de Yahvé, la enumeración de grupos, y la expresión distributiva masculina כֹּל אִישׁ יִשְׂרָאֵל. También mantiene correctamente ''Yahvé'' para יְהוָה y conserva la opción más literal ''sus cabezas / sus tribus'' con nota explicativa. Sin embargo, la nota al pie [a] está anclada en ''hoy'' pero comenta la expresión final ''todos los hombres de Israel'', lo que desajusta la evidencia auditada y la disciplina de anclaje.'
  spanish_quality_summary: El español es claro y mayormente natural. No obstante, la combinación 'sus cabezas, sus tribus' suena algo áspera en español, aunque es defendible por fidelidad al listado hebreo y queda aclarada por la nota. El problema principal de calidad editorial es la colocación incorrecta de la nota [a]. También conviene usar raya o punto y coma fuerte para marcar mejor la aposición/enumeración final, como ya hace el inglés con dash.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה > ''Yahvé''; אֱלֹהֵיכֶם > ''su Dios''; זִקְנֵיכֶם > ''sus ancianos''; שֹׁטְרֵיכֶם > ''sus oficiales''; כֹּל אִישׁ יִשְׂרָאֵל > ''todos los hombres de Israel''. No hay conflicto doctrinal; solo se requiere corregir el anclaje de la nota lexical alternativa.'
  issues:
  - severity: medium
    issue: La nota [a] está colocada en 'hoy' pero su contenido trata 'cada hombre de Israel' / 'todo hombre de Israel'.
    rationale: Según el inglés auditado y la propia nota, la alternativa corresponde a כֹּל אִישׁ יִשְׂרָאֵל, no a הַיּוֹם. Las notas deben anclarse exactamente donde pertenece la variante para evitar confusión exegética y editorial.
  - severity: low
    issue: La puntuación antes de 'todos los hombres de Israel' puede reflejar mejor el cierre de la enumeración.
    rationale: Un guion largo o puntuación equivalente ayuda a representar que 'todos los hombres de Israel' resume/distribuye la asamblea masculina tras la lista de categorías, como en el inglés auditado.
  revised_spanish_text: 'Ustedes están de pie hoy, todos ustedes, delante de Yahvé su Dios: sus cabezas, sus tribus, sus ancianos[b] y sus oficiales; todos los hombres de Israel[a].'
  revised_footnotes:
  - marker: a
    text: 'O: «cada hombre de Israel». El hebreo dice literalmente «todo hombre de Israel», una expresión distributiva.'
    reason: lexical_alternative
  - marker: b
    text: «Sus cabezas» también puede entenderse idiomáticamente como «sus líderes», o, uniendo más de cerca la frase siguiente, como «las cabezas de sus tribus».
    reason: alternative_reading
  revision_rationale: Se conserva la traducción base porque es fiel al hebreo y al expediente del POB, pero se mueve la nota [a] a la frase que realmente comenta ('todos los hombres de Israel') y se ajusta levemente la puntuación para mayor claridad en español.
