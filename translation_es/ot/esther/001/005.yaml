base_translation:
  language: en
  yaml_path: translation/ot/esther/001/005.yaml
  text: And when these days were completed[a], the king gave a banquet for all the people who were present in Susa the citadel, from great to small, for seven days[d][c][b], in the court of the garden of the king’s palace.
  footnotes:
  - marker: a
    text: Or 'feast'; the Hebrew term often refers to a drinking banquet.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the citadel of Susa.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from the greatest to the least,' an idiom meaning people of every rank.
    reason: lexical_alternative
  - marker: d
    text: The final term may also be rendered 'pavilion' or 'house'; 'palace' best fits the royal setting.
    reason: lexical_alternative
