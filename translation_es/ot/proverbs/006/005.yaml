translation:
  language: es
  text: Escápate[a] como gacela[b] de la mano del cazador, y como ave de la mano del trampero[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Líbrate» o «huye». El imperativo hebreo lleva el sentido de librarse con urgencia.
    reason: lexical_alternative
  - marker: b
    text: «Gacela» también puede traducirse como «cierva» o, tradicionalmente, «corza».
    reason: lexical_alternative
  - marker: c
    text: O «de la mano del que tiende trampas». El hebreo nombra a la persona que pone lazos o trampas.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנָּצֵל
  english_pob_choice: Rescue yourself
  chosen_spanish: Escápate
  alternatives_spanish:
  - Rescátate
  - Líbrate
  - Evade
  lexicon: HALOT
  rationale: 'El niphal imperativo 2ms tiene fuerza exhortativa y reflexiva: se urge al destinatario a salir libre con prontitud. En español, «Escápate» comunica mejor la urgencia y el movimiento inmediato que una forma más abstracta como «rescátate», manteniendo el impulso del hebreo sin perder naturalidad.'
- source_word: כִּצְבִי
  english_pob_choice: like a gazelle
  chosen_spanish: como gacela
  alternatives_spanish:
  - como cierva
  - como venado
  - como corzo
  lexicon: HALOT
  rationale: צְבִי se refiere con más precisión a una gacela; por eso se evita el término más amplio «venado» y se conserva la imagen concreta del hebreo. «Gacela» es claro, digno y fiel al imaginario poético.
- source_word: מִיָּד
  english_pob_choice: from the hand
  chosen_spanish: de la mano
  alternatives_spanish:
  - del poder
  - del dominio
  - del control
  lexicon: HALOT
  rationale: Se mantiene la imagen literal de «mano», porque el hebreo usa יָד de modo concreto y metafórico a la vez. En este proverbio la imagen de caza funciona mejor si no se reemplaza por una abstracción como «poder».
- source_word: וּכְצִפּוֹר
  english_pob_choice: and like a bird
  chosen_spanish: y como ave
  alternatives_spanish:
  - y como pájaro
  - y como un ave pequeña
  - y como un ave
  lexicon: HALOT
  rationale: צִפּוֹר es un término general para ave/pájaro. «Ave» conserva el registro poético y amplio del hebreo; «pájaro» sería más coloquial y menos solemne.
- source_word: מִיַּד יָקוּשׁ
  english_pob_choice: from the hand of the fowler
  chosen_spanish: de la mano del cazador
  alternatives_spanish:
  - de la mano del trampero
  - de la mano del que tiende trampas
  - de la mano del fowler
  lexicon: HALOT
  rationale: יָקוּשׁ designa al que pone trampas o lazos. Dado que el contexto es una imagen de captura de animales, «cazador» comunica de manera natural la figura del perseguidor, aunque «trampero» preservaría con más literalidad la idea de lazos. Se mantiene «de la mano» para conservar el paralelismo con el primer hemistiquio.
translation_notes:
  revision_awareness: La redacción sigue el sentido imperativo urgente del hebreo, conserva el paralelismo «de la mano / de la mano» y mantiene la imagen animal sin suavizar la referencia al agente que captura. No se introdujeron cambios respecto del audit trail inglés; sólo se adaptó la elección zoológica y la equivalencia del agente a un español natural y fiel.
  spanish_consistency_notes:
  - Se mantuvo el registro poético y admonitorio del proverbio.
  - Se conservó la duplicación de «de la mano» para reflejar el paralelismo hebreo.
  - Se eligió «ave» por su mayor dignidad literaria frente a «pájaro».
  - No se sustituyó la metáfora concreta por abstractions como «poder» o «dominio».
