theological_decisions:
- issue: Anthropomorphic cultic language for divine acceptance
  chosen_reading: Render the idiom of smelling as 'delight in' in the main text
  alternative_readings:
  - Render more literally as 'I will not smell in/at your solemn assemblies'
  - Render as 'I will not accept the pleasing aroma of your assemblies'
  rationale: The Hebrew uses anthropomorphic sacrificial language to express divine non-acceptance. Since the direct object is the assemblies themselves, a strictly literal 'smell' is potentially opaque in English. The main text therefore gives the idiomatic force, while a footnote preserves the literal imagery for auditability.
  doctrine_reference: Translation philosophy §1, §3, §6
