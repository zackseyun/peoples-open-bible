translation:
  language: es
  text: No obstante[a], el pueblo todavía ofrecía sacrificios en los lugares altos, pero solo a Yahvé, su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sin embargo, el pueblo seguía ofreciendo sacrificios en los lugares altos, pero solo a Yahvé, su Dios.»'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבָל
  english_pob_choice: Nevertheless
  chosen_spanish: No obstante
  alternatives_spanish:
  - Sin embargo
  - Pero
  lexicon: HALOT
  rationale: La partícula introduce contraste concesivo con lo anterior; «No obstante» conserva ese giro adversativo con tono natural y algo elevado, acorde con el estilo bíblico en español.
- source_word: ע֣וֹד
  english_pob_choice: still
  chosen_spanish: seguía
  alternatives_spanish:
  - todavía
  - aún
  lexicon: HALOT
  rationale: La idea principal es continuidad pese al contexto previo. El verbo perifrástico «seguía sacrificando» expresa mejor esa persistencia que un adverbio suelto.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la población
  lexicon: HALOT
  rationale: En narrativa histórica, עָם refiere colectivamente a la comunidad nacional; «el pueblo» es la equivalencia más natural y fiel.
- source_word: זֹבְחִים
  english_pob_choice: sacrificed
  chosen_spanish: sacrificando
  alternatives_spanish:
  - ofrecían sacrificios
  - sacrificaban
  lexicon: HALOT
  rationale: El participio verbal hebreo presenta acción en curso. La forma progresiva «seguía sacrificando» refleja mejor la continuidad que un pasado simple aislado.
- source_word: בַּבָּמוֹת
  english_pob_choice: at the high places
  chosen_spanish: en los lugares altos
  alternatives_spanish:
  - en los altos lugares
  - en los altares altos
  lexicon: HALOT
  rationale: «Lugares altos» comunica el término técnico bíblico בָּמוֹת de manera comprensible en español, sin perder su referencia cultual a santuarios locales elevados.
- source_word: רַק
  english_pob_choice: but only
  chosen_spanish: pero solo
  alternatives_spanish:
  - solo
  - sino solo
  lexicon: HALOT
  rationale: 'La partícula limita el objeto de la acción y, en contexto, mantiene el contraste correctivo: no a otros dioses, sino únicamente a Yahvé.'
- source_word: לַיהוָה
  english_pob_choice: to the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - al Yahvé
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto, el Tetragrámaton se vierte «Yahvé». El dativo con ל marca destinatario/objeto del sacrificio, por lo que «a Yahvé» resulta idiomático y fiel.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - Dios de ellos
  - su propio Dios
  lexicon: HALOT
  rationale: El sufijo pronominal plural se expresa naturalmente como «su Dios» en español. El referente sigue siendo Yahvé, el Dios perteneciente a ellos.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. La política del proyecto pide preservarlo como «Yahvé» en el cuerpo principal para mantener transparencia y auditable fidelidad al original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tensión sobre los lugares altos
  english_pob_reading: The people continued sacrificing at unauthorized high places, though the sacrifices were directed only to the LORD their God.
  chosen_spanish_reading: El pueblo seguía sacrificando en los lugares altos, pero solo a Yahvé su Dios.
  alternative_spanish_readings:
  - El pueblo seguía ofreciendo sacrificios en los lugares altos, dedicados solo a Yahvé su Dios.
  - El pueblo seguía sacrificando en los lugares altos, aunque únicamente a Yahvé su Dios.
  rationale: La sintaxis hebrea limita el objeto de los sacrificios con רַק לַיהוָה אֱלֹהֵיהֶם; no dice que los lugares altos fueran aceptables, sino que la adoración allí persistía y estaba restringida a Yahvé. La traducción conserva esa tensión sin suavizarla.
  doctrine_reference: 'DOCTRINE.md: Lexical/Theological tensions — high places and object limitation'
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que no requirió cambios y mostró alto acuerdo entre las verificaciones. La redacción española mantiene la tensión del hebreo entre la persistencia de los lugares altos y la limitación del objeto del sacrificio.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, conforme a la política del proyecto.
  - «Lugares altos» preserva el término técnico בָּמוֹת con claridad idiomática.
  - «Su Dios» refleja el sufijo pronominal plural sin perder la referencia a Yahvé.
  - La estructura «pero solo» conserva la restricción de רַק sin borrar el contraste adversativo de אֲבָל.
