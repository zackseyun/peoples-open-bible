translation:
  language: es
  text: El que clama con espíritu amargo y en el dolor de su alma, y al oírse su clamor, su Roca[a] oirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «No apartes tu ojo del que pide, y no des ocasión a un hombre para que te maldiga». El testimonio hebreo, en cambio, destaca que la Roca del afligido oirá su clamor.'
    reason: alternative_reading
lexical_decisions:
- source_word: צוֹעֵק
  english_pob_choice: one crying out
  chosen_spanish: Uno que clama
  alternatives_spanish:
  - el que clama
  - una persona que clama
  - el necesitado que clama
  lexicon: HALOT
  rationale: El participio hebreo presenta a una persona en acto de clamar; «uno que clama» / «uno que clama» conserva ese valor continuo y evita suavizarlo en una simple descripción.
- source_word: מַר רוּחַ
  english_pob_choice: in bitter spirit
  chosen_spanish: con espíritu amargo
  alternatives_spanish:
  - en espíritu amargo
  - amargado de espíritu
  - con un espíritu amargo
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «amargo de espíritu». En español, «con espíritu amargo» comunica la misma interioridad afligida sin volver la frase torpe.
- source_word: בִּכְאֵב נַפְשׁוֹ
  english_pob_choice: in the pain of his soul
  chosen_spanish: en el dolor de su alma
  alternatives_spanish:
  - en el dolor de su ser interior
  - en la pena de su alma
  - en la aflicción de su alma
  lexicon: HALOT
  rationale: נפש aquí apunta al ser interior o la vida del afligido; «alma» mantiene la elevación sapiencial del texto y corresponde al uso idiomático del hebreo en este contexto.
- source_word: וּבְקוֹל צַעֲקָתוֹ
  english_pob_choice: at the sound of his cry
  chosen_spanish: al sonido de su clamor
  alternatives_spanish:
  - a la voz de su clamor
  - cuando su clamor resuene
  - al oírse su clamor
  lexicon: HALOT
  rationale: «Voz» y «sonido» son posibles; «al sonido de su clamor» preserva la imagen auditiva del hebreo y resulta natural en español.
- source_word: צוּרוֹ
  english_pob_choice: his Rock
  chosen_spanish: su Roca
  alternatives_spanish:
  - su peña
  - su protector
  - Dios
  lexicon: HALOT
  rationale: El hebreo usa el epíteto divino «su Roca». Se conserva la metáfora porque tiene peso teológico propio y no debe reducirse a «Dios» sin necesidad.
- source_word: יִשְׁמַע
  english_pob_choice: will hear
  chosen_spanish: oirá
  alternatives_spanish:
  - escuchará
  - escucha
  - estará oyendo
  lexicon: HALOT
  rationale: 'En este enunciado sapiencial, el futuro español transmite bien la consecuencia esperada: la Roca del afligido responderá oyendo su clamor.'
theological_decisions:
- issue: Relación entre el testimonio hebreo y el paralelo griego
  english_pob_reading: The Hebrew witness instead emphasizes that the afflicted person's Rock will hear his cry.
  chosen_spanish_reading: 'Se sigue el hebreo como texto principal: el afligido clama y su Roca lo oye.'
  alternative_spanish_readings:
  - 'Una versión griega: No apartes tu ojo del que pide, y no des ocasión a un hombre para que te maldiga.'
  - Una lectura mixta que añada explícitamente la prohibición inicial griega al texto principal.
  rationale: El hebreo transmitido aquí ofrece una línea afirmativa sobre el oír de la Roca; el griego paralelo contiene una exhortación distinta. Mantener el hebreo en el texto principal preserva la primacía de la fuente base, mientras que la divergencia griega se documenta en nota donde corresponde.
  doctrine_reference: Primacía de la fuente original; preservación de variantes significativas
- issue: Sentido de נפש
  english_pob_reading: soul
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - vida
  - ser interior
  - vida interior
  rationale: En literatura sapiencial, נפש puede abarcar vida, persona o interioridad. «Alma» comunica bien la angustia profunda sin imponer una antropología posterior al texto.
  doctrine_reference: Antropología bíblica en literatura sapiencial
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail, que eliminó la cláusula introductoria apoyada por el griego y dejó como texto base el hebreo: el afligido clama, y su Roca lo oye. La nota conserva la divergencia griega sin desplazar el hebreo del texto principal.'
  spanish_consistency_notes:
  - Se conserva «Roca» con mayúscula para reflejar el epíteto divino del hebreo.
  - Se evita «SEÑOR» porque el texto hebreo aquí no usa el tetragrámaton explícitamente en esta línea.
  - «Clama» y «clamor» mantienen el paralelismo interno del versículo.
  - El futuro «oirá» respeta el valor consecuencial del hebreo en el contexto sapiencial.
