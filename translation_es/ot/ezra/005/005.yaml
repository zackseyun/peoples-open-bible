  to: Pero el ojo de su Dios estaba puesto sobre los ancianos de los judíos[a], y no los hicieron parar hasta que un decreto[b] llegara a Darío; entonces enviarían de vuelta una carta[c] acerca de este asunto.
  rationale: La revisión mantiene todas las decisiones semánticas del texto fuente y del rastro de auditoría inglés, pero corrige calcos y giros poco idiomáticos en español. 'Estaba puesto sobre' conserva la imagen del ojo divino mejor que 'estaba sobre'; 'llegara a Darío' expresa con naturalidad la remisión pendiente del decreto; y se simplifica la cláusula final quitando el pronombre innecesario. También se mejora la nota alternativa de [a] para que suene natural en español.
