translation:
  language: es
  text: El hombre que mira a la mesa de otro, su vida no se cuenta como vida; se contamina con comida ajena[b], pero el hombre que conoce por dentro se cuidará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: 'El hebreo del final es difícil: literalmente apunta a algo como «un hombre que conoce el secreto de las entrañas» o de lo interior. El griego lo interpreta como una advertencia de prudencia y autocontrol; por eso el español conserva la idea de conocimiento interior sin sobreexplicarla.'
    reason: alternative_reading
lexical_decisions:
- source_word: איש / ἀνὴρ
  english_pob_choice: A man
  chosen_spanish: El hombre
  alternatives_spanish:
  - Una persona
  lexicon: HALOT; BDAG
  rationale: Conserva el masculino singular representativo del original y del POB inglés. En español, «el hombre» transmite mejor la forma proverbial y sapiencial que una neutralización más abstracta.
- source_word: משגיח / βλέπων
  english_pob_choice: watches
  chosen_spanish: mira
  alternatives_spanish:
  - observa
  - fija la vista en
  - vigila
  lexicon: HALOT; LSJ
  rationale: El verbo apunta a poner la mirada hacia algo ajeno, con matiz de atención y deseo. «Mira» evita una sobreinterpretación de vigilancia activa y mantiene la imagen de la mesa ajena.
- source_word: שלחן זר / ἀλλοτρίαν τράπεζαν
  english_pob_choice: another’s table
  chosen_spanish: la mesa de otro
  alternatives_spanish:
  - la mesa ajena
  - la mesa de un extraño
  - la mesa de otro hombre
  lexicon: HALOT; LSJ
  rationale: «De otro» preserva la idea de pertenencia ajena sin cargar innecesariamente el sentido étnico o social de «extraño/forastero». Corresponde bien al sentido del hebreo y al griego.
- source_word: אין חייו למנות חיים / οὐκ ἔχει βίον ἐν λογισμῷ ζωῆς
  english_pob_choice: his life is not to be counted as life
  chosen_spanish: su vida no se cuenta como vida
  alternatives_spanish:
  - su vida no merece contarse como vida
  - su vida no tiene vida en el cómputo de la vida
  lexicon: HALOT; LSJ
  rationale: La frase es idiomática y enfática. «No se cuenta como vida» conserva la paradoja sin exagerar con una paráfrasis más amplia, y refleja el juego de «vida» del hebreo y del griego.
- source_word: מעוג לנפש מטעמו / ἀλισγήσει ψυχὴν αὐτοῦ ἐν ἐδέσμασιν ἀλλοτρίοις
  english_pob_choice: he pollutes himself with another man’s food
  chosen_spanish: se contamina con comida ajena
  alternatives_spanish:
  - se mancha con alimento ajeno
  - se contamina con manjares ajenos
  - contamina su alma con comida ajena
  lexicon: HALOT; LSJ
  rationale: El griego aclara que la acción es de contaminación moral/ritual ligada a alimentos ajenos. «Se contamina» reproduce el verbo con fuerza suficiente sin forzar «alma» en un contexto de comer; «comida ajena» mantiene la pertenencia a otro sin perder claridad.
- source_word: ψυχὴν
  english_pob_choice: appetite / self (in food context)
  chosen_spanish: se
  alternatives_spanish:
  - su apetito
  - su alma
  - su ser
  lexicon: LSJ; HALOT
  rationale: En español, el reflexivo ya puede llevar el valor de la persona afectada por la contaminación. Así se evita imponer «alma» donde el contexto alimentario pide más bien la persona en su relación con la comida.
- source_word: ἐπιστήμων καὶ πεπαιδευμένος / יודע סוד מעים
  english_pob_choice: a man who knows inwardly
  chosen_spanish: el hombre que conoce por dentro
  alternatives_spanish:
  - el hombre que conoce el secreto de lo interior
  - el hombre instruido y entendido
  - el hombre que sabe lo interno
  lexicon: LSJ; HALOT
  rationale: El final es oscuro en hebreo y el griego lo interpreta en clave de prudencia y formación. «Conoce por dentro» conserva la idea de conocimiento interior sin añadir un contenido doctrinal o psicológico no explicitado por el texto.
- source_word: φυλάξεται
  english_pob_choice: will beware
  chosen_spanish: estará prevenido
  alternatives_spanish:
  - se guardará
  - tomará precauciones
  - se cuidará
  lexicon: BDAG; LSJ
  rationale: «Estará prevenido» expresa vigilancia prudente y autocontrol, adecuado al cierre sapiencial. Mantiene el valor de cautela personal sin sonar excesivamente moderno o técnico.
theological_decisions:
- issue: Qué hacer con «vida» repetida en el primer hemistiquio
  english_pob_reading: his life is not to be counted as life
  chosen_spanish_reading: su vida no se cuenta como vida
  alternative_spanish_readings:
  - su vida no merece contarse como vida
  - su existencia no es vida
  rationale: Se conserva la repetición para no borrar la tensión retórica del hebreo y del griego. La duplicación subraya que una vida dependiente de la mesa ajena no alcanza la plenitud sapiencial que el texto presupone.
  doctrine_reference: Sabiduría bíblica sobre dependencia, integridad y autosuficiencia moral; no doctrina sistemática.
- issue: Si «ψυχὴν» debe traducirse como «alma»
  english_pob_reading: he pollutes himself with another man’s food
  chosen_spanish_reading: se contamina con comida ajena
  alternative_spanish_readings:
  - contamina su alma con comida ajena
  - se mancha interiormente con comida ajena
  rationale: 'Aunque el griego dice literalmente «alma», en este contexto la POB inglesa ya adoptó una solución contextual para no falsear el sentido. El español sigue esa línea: la contaminación recae sobre la persona entera en relación con la comida, sin imponer una antropología más abstracta que la del pasaje.'
  doctrine_reference: Antropología bíblica y lenguaje sapiencial; no una afirmación doctrinal sobre la inmortalidad del alma.
- issue: Cómo entender el final oscuro sobre «conocer por dentro»
  english_pob_reading: a man who knows inwardly will beware
  chosen_spanish_reading: el hombre que conoce por dentro estará prevenido
  alternative_spanish_readings:
  - el hombre instruido y entendido estará prevenido
  - el hombre que conoce el secreto interior se guardará
  rationale: 'El hebreo es difícil y el griego ofrece una interpretación prudencial. La formulación española mantiene esa ambigüedad controlada: conocimiento interior que desemboca en cautela práctica, sin resolver de forma excesiva el contenido exacto de ese conocimiento.'
  doctrine_reference: Sabiduría práctica y dominio propio; cf. literatura sapiencial en general.
translation_notes:
  revision_awareness: 'La versión inglesa revisada de la POB redujo la interpretación explícita en el segundo hemistiquio y simplificó el final a un saber interior. Esta traducción española sigue esa revisión: evita ampliar a «delicadezas» o «apetito» y mantiene una clausula final prudente, más cercana al griego interpretativo y al hebreo oscuro.'
  spanish_consistency_notes:
  - Se usa «mesa de otro» para mantener la equivalencia con «another’s table» y no introducir una connotación de extranjería nacional.
  - Se evita «alma» en el segundo hemistiquio porque el contexto alimentario pide una formulación más natural en español y la POB inglesa también opta por una solución contextual.
  - 'La frase final conserva ambigüedad controlada: «conoce por dentro» refleja el saber interior sin cerrar el sentido hebreo oscuro.'
  - «Contamina» conserva la fuerza del verbo griego de mancha/impureza, apropiado para un proverbio sapiencial.
  - Las notas a y b se anclan en los puntos donde el español podría sugerir lecturas alternativas o requerir aclaración lexical.
