      sound is manifold…,” but the Coptic here is the deny/confess couplet. This suggests
      a mapping slip in this region of the page; translation follows the Coptic as
      given.
    reason: alignment_note
  - marker: b
    text: Or 'Those who deny me confess me,\nand those who confess me deny me.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲁⲣⲛⲁ
  chosen: deny
  alternatives:
  - renounce
  - disown
  lexicon: Crum, Coptic Dictionary; Layton, A Coptic Grammar (and Coptic in 20 Lessons)
  rationale: Standard Sahidic loan from Gk. arneomai; in confessional contexts, “deny”
    best preserves the stark paradox with “confess.”
- source_word: ϩⲟⲙⲟⲗⲟⲅⲉⲓ
  chosen: confess
  alternatives:
  - acknowledge
  - profess
  lexicon: Crum, s.v. ϩⲟⲙⲟⲗⲟⲅⲉⲓ; Liddell-Scott for the Greek loan; Layton, A Coptic
    Grammar
  rationale: Greek loan ὁμολογεῖν in Sahidic typically means confess/acknowledge;
    “confess” keeps the religious-judicial register and pairs antithetically with
    “deny.”
- source_word: ⲛⲉⲧ– (relative)
  chosen: those who
  alternatives:
  - the ones who
  - whoever
  lexicon: Layton, A Coptic Grammar § relative clauses; Crum, grammatical notes
  rationale: Relative determiner introducing a substantive clause; “those who” is
    the most neutral English equivalent here.
- source_word: ⲙ̄ⲙⲟⲉⲓ (obj. of 1sg)
  chosen: me
  alternatives:
  - me (myself)
  lexicon: Layton, pronominal object forms; Crum, pronominal entries
  rationale: Direct object enclitic/pronominal form for 1st person singular; simple
    “me” is idiomatic and accurate.
parallelism_check: 'The two cola mirror each other with the verbs inverted: deny/confess
  :: confess/deny. The paradoxical antimetabole is preserved verbatim in English,
  maintaining the sharpness of the pair without smoothing.'
voice_check: Although this couplet lacks an explicit “I am,” the first-person object
  (“me”) anchors the same authoritative speaker as in the surrounding “I” speeches.
  The imperative, paradox-bearing voice remains direct and unsoftened.
alignment_risk_note: Alignment confidence is only medium, and the consult block for
