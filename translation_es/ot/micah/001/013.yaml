    issue: «Ajusta» no refleja con suficiente precisión רְתֹם
    rationale: El verbo hebreo manda enganchar/uncir/preparar el carro con el animal. «Ajusta» puede entenderse como acomodar o arreglar, y debilita la imagen concreta.
  - severity: medium
    issue: «para la hija de Sion» debe ajustarse a «a la hija de Sion»
    rationale: El audit trail inglés fue revisado específicamente de «for» a «to» para reflejar mejor ל. En español, «a» reproduce mejor esa relación sin forzar el sentido.
  - severity: low
    issue: Falta una nota sobre la personificación femenina en «habitante de Laquis»
    rationale: El inglés conserva una nota indicando que יוֹשֶׁבֶת es femenino singular dirigido a la ciudad como mujer. En español conviene preservarla, ya que «habitante» no marca género.
