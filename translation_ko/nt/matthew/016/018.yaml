id: MAT.16.18
reference: Matthew 16:18
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: κἀγὼ δέ σοι λέγω ὅτι σὺ εἶ Πέτρος, καὶ ἐπὶ ταύτῃ τῇ πέτρᾳ οἰκοδομήσω μου τὴν ἐκκλησίαν, καὶ πύλαι ᾅδου οὐ κατισχύσουσιν αὐτῆς·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/016/018.yaml
  text: 'And I also say to you that you are Peter[a], and on this rock I will build my church[b], and the gates of Hades will not prevail against it.'
translation:
  language: ko
  text: '「그리고 나도 너에게 말한다. 너는 베드로요, 내가 이 바위 위에 내 교회를 세우리니, 하데스의 문들이 그것을 이기지 못할 것이다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「이 바위 위에」는 베드로 자신, 베드로의 고백, 또는 고백자이자 대표 사도로서의 베드로를 가리키는 것으로 해석될 수 있다. 헬라어는 Πέτρος(베드로, 남성형 「바위」)와 πέτρᾳ(여성형 「바위」)의 의도적 언어유희를 사용한다.
    reason: alternative_reading
  - marker: b
    text: 헬라어 「하데스(ᾅδης)」, 곧 죽은 자들의 영역. 전통적으로 「음부」 또는 「지옥」으로 옮겨졌다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πέτρος
  english_pob_choice: Peter
  chosen_korean: 베드로
  lexicon: BDAG
  rationale: 한국 성경 정착 음역. πέτρα(바위)와의 언어유희를 위해 다음 어휘에 「바위」를 명시한다.
- source_word: ἐπὶ ταύτῃ τῇ πέτρᾳ
  english_pob_choice: on this rock
  chosen_korean: 이 바위 위에
  alternatives_korean:
  - 이 반석 위에
  lexicon: BDAG
  rationale: πέτρα를 「바위」로 옮겨 Πέτρος(베드로)와의 언어유희를 한국어로 환기한다. 「반석」은 한국 성경 정착어이나 「베드로」와 음운적 연관이 없어 언어유희가 가려진다. 「바위」는 일반 명사로도 자연스럽고 어휘적 명확성을 살린다.
- source_word: μου τὴν ἐκκλησίαν
  english_pob_choice: my church
  chosen_korean: 내 교회
  alternatives_korean:
  - 내 회중
  lexicon: BDAG
  rationale: 글로사리상 ἐκκλησία는 일반적으로 「회중」을 우선하나, 16:18은 EN POB가 「church」를 채택하여 그리스도의 종말론적 공동체로서의 제도적·언약적 무게를 살린 본문이다. 한국 성경 정착어 「교회」가 그 무게에 부합한다.
- source_word: πύλαι ᾅδου
  english_pob_choice: the gates of Hades
  chosen_korean: 하데스의 문들
  alternatives_korean:
  - 음부의 문들
  - 죽은 자들의 영역의 문들
  lexicon: BDAG
  rationale: ᾅδης는 죽음·죽은 자들의 영역. 한국 성경 정착어 「음부」는 의미가 모호해졌으므로 「하데스」로 음역하고 각주로 설명을 보존한다.
- source_word: κατισχύσουσιν αὐτῆς
  english_pob_choice: prevail against it
  chosen_korean: 그것을 이기지 못할 것이다
  lexicon: BDAG
  rationale: κατισχύω는 「-에 대해 이기다·압도하다」. 자연스러운 한국어로 옮긴다.
theological_decisions:
- issue: Πέτρος/πέτρα 언어유희와 「이 바위」의 지시 대상
  chosen_reading: 너는 베드로요, 내가 이 바위 위에 내 교회를 세우리니
  alternative_readings:
  - 너는 반석이요, 내가 이 반석 위에 내 교회를 세우리니
  - 너는 베드로요, 내가 이 반석 위에 내 교회를 세우리니
  rationale: 본문은 베드로의 이름(Πέτρος, 남성형)과 「바위(πέτρᾳ, 여성형)」 사이의 의도적 언어유희를 통해 핵심을 전달한다. 한국 성경 전통의 「반석」은 「베드로」와 음운적·어휘적 연결이 단절되어 본문의 핵심 수사가 사라진다. 「바위」를 채택하여 음운 연결(베드로/바위)을 환기하고 본문의 의도적 어구를 보존한다. 「이 바위」의 지시 대상은 (1) 베드로 자신, (2) 베드로의 고백, (3) 고백자이자 대표 사도로서의 베드로 — 세 해석 모두 본문에서 열려 있으므로 본문은 모호성을 보존하고 각주로 옵션을 명시한다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; preserve theological tension rather than resolve it'
- issue: ἐκκλησία를 「교회」로 옮기는 결정
  chosen_reading: 교회
  alternative_readings:
  - 회중
  - 모임
  rationale: 글로사리 기본값은 「회중」이나, 본문은 종말론적 「그리스도의 모임」으로서 마태가 의도적으로 ἐκκλησία를 사용한 두 곳(16:18, 18:17) 중 하나이다. 「교회」는 한국어 신앙 공동체 전통의 정착어로, 본문의 언약 공동체적·제도적 함의에 가장 부합한다.
  doctrine_reference: 'DOCTRINE.md: Contextual judgment; established Korean ecclesial usage where source supports it'
