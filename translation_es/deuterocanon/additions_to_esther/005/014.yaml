translation:
  language: es
  text: Porque por estos medios pensó que[a], después de dejarnos desolados, transferiría el dominio de los persas a los macedonios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de habernos dejado desiertos» o «después de habernos dejado desolados». La frase participial griega λαβὼν ἡμᾶς ἐρήμους es idiomática y admite más de una matización en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ γὰρ τῶν τρόπων τούτων
  english_pob_choice: For by these methods
  chosen_spanish: Porque por estos medios
  alternatives_spanish:
  - Pues por estas maneras
  - Porque por estos procedimientos
  - Pues por estos métodos
  lexicon: LSJ
  rationale: τρόποι puede significar maneras, modos o métodos. «Por estos medios» comunica bien la idea instrumental o estratégica en un contexto político de maniobra, sin volverlo más interpretativo de lo que exige el griego. γάρ se refleja con «Porque» para conservar la conexión explicativa.
- source_word: ᾠήθη
  english_pob_choice: he thought
  chosen_spanish: pensó
  alternatives_spanish:
  - supuso
  - imaginó
  - creyó
  lexicon: LSJ
  rationale: La forma aorista expresa una evaluación o suposición. «Pensó» es natural en español y conserva la relación sintáctica con la construcción que sigue.
- source_word: λαβὼν ἡμᾶς ἐρήμους
  english_pob_choice: after making us desolate
  chosen_spanish: después de habernos dejado desolados
  alternatives_spanish:
  - después de hacernos desolados
  - habiéndonos dejado desolados
  - después de dejarnos desolados
  lexicon: LSJ
  rationale: La combinación participial es idiomática y no conviene calcarla. «Después de habernos dejado desolados» expresa con claridad la acción previa al verbo principal y mantiene el matiz de desolación.
- source_word: ἐρήμους
  english_pob_choice: desolate
  chosen_spanish: desolados
  alternatives_spanish:
  - desiertos
  - arrasados
  - sin habitantes
  lexicon: LSJ
  rationale: ἐρήμους abarca la idea de estar desierto, arruinado o devastado. «Desolados» funciona bien en español bíblico y evita restringir demasiado el sentido.
- source_word: τὴν τῶν Περσῶν ἐπικράτησιν
  english_pob_choice: the dominion of the Persians
  chosen_spanish: el dominio de los persas
  alternatives_spanish:
  - el poder de los persas
  - la supremacía de los persas
  - el reino de los persas
  lexicon: LSJ
  rationale: ἐπικράτησις denota dominio, supremacía o control. «Dominio» es una opción formal y fiel que preserva la fuerza política del sustantivo sin añadir una noción de reino que no está explícita.
- source_word: εἰς τοὺς Μακεδόνας μετάξει
  english_pob_choice: he would transfer ... to the Macedonians
  chosen_spanish: transferiría ... a los macedonios
  alternatives_spanish:
  - pasaría ... a los macedonios
  - entregaría ... a los macedonios
  - trasladaría ... a los macedonios
  lexicon: LSJ
  rationale: μετάξει tiene el sentido de transferir o trasladar de una parte a otra. «Transferiría» conserva el valor político de cambiar la posesión o el dominio sin sobreinterpretar el verbo.
- source_word: τοὺς Μακεδόνας
  english_pob_choice: the Macedonians
  chosen_spanish: a los macedonios
  alternatives_spanish:
  - a Macedonia
  - a los de Macedonia
  lexicon: LSJ
  rationale: El etnónimo se traduce directamente como «macedonios». El acusativo con εἰς se refleja naturalmente con «a» en español.
theological_decisions:
- issue: Lectura político-histórica de la adición griega
  english_pob_reading: Render the political claim straightforwardly without harmonizing it to later historical formulations.
  chosen_spanish_reading: Traducir la afirmación política de forma directa, sin suavizarla ni convertirla en una paráfrasis histórica posterior.
  alternative_spanish_readings:
  - Interpretarlo como una referencia general al cambio de imperio hacia los griegos
  - Ajustarlo a una formulación más tradicional sobre el reino persa
  rationale: El griego nombra específicamente persas y macedonios y habla de un traslado de dominio. La versión española conserva ese dato histórico-político sin armonizarlo con otras formulaciones.
  doctrine_reference: Principio de primacía del texto original sobre la tradición de traducción; conservar la terminología del pasaje cuando el contexto no obliga a reinterpretarla.
translation_notes:
  revision_awareness: Se corrigió el anclaje de nota para que el marcador [a] aparezca exactamente en el texto principal. La redacción española sigue la revisión inglesa más reciente al usar una construcción natural para λαβὼν ἡμᾶς ἐρήμους y mantener «dominio» para ἐπικράτησις.
  spanish_consistency_notes:
  - Se usa «dominio» para ἐπικράτησις en un registro formal y político.
  - Se mantiene «macedonios» como etnónimo directo.
  - Se evita «SEÑOR» porque no hay aquí referencia al nombre divino.
  - La nota [a] está anclada en la expresión que introduce la ambigüedad participial.
