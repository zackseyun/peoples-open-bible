base_translation:
  language: en
  yaml_path: translation/ot/exodus/013/003.yaml
  text: Then Moses said to the people[a], “Remember this day in which you came out from Egypt, from the house of slavery, because Yahweh brought you out from there by a strong hand[c][b]; and no leavened bread shall be eaten.”
