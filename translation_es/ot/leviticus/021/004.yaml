  glossary_alignment: No hay conflictos con la terminología del proyecto. «Contaminarse» para impureza ritual y «profanarse» para חלל están bien diferenciados. «Esposo» es una buena correspondencia para la lectura principal de בַּעַל, con la alternativa preservada en nota.
