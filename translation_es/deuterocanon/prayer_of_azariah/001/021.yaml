    issue: «por todo su dominio» traduce débilmente ἀπὸ πάσης τῆς δυναστείας
    rationale: La preposición ἀπό no se representa bien con «por» en este contexto. «Por todo su dominio» suena causal o distributivo y no comunica bien «from/in relation to all their dominion». Una opción como «en todo su dominio» o «en toda su dominación» refleja mejor la esfera total de su poder sin sobreinterpretar.
  - severity: low
