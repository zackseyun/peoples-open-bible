id: ISA.23.4
reference: Isaiah 23:4
source:
  edition: WLC
  text: בּ֣וֹשִׁי צִיד֔וֹן כִּֽי אָמַ֣ר יָ֔ם מָע֥וֹז הַ/יָּ֖ם לֵ/אמֹ֑ר לֹֽא חַ֣לְתִּי וְ/לֹֽא יָלַ֗דְתִּי וְ/לֹ֥א גִדַּ֛לְתִּי בַּחוּרִ֖ים רוֹמַ֥מְתִּי בְתוּלֽוֹת־־־׃
translation:
  text: Be ashamed[a], Sidon, for the sea has spoken, the stronghold of the sea, saying, “I have not been in labor, and I have not given birth[c][b], and I have not raised young men or exalted virgins.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the fortress of the sea” or “the sea’s stronghold.” The phrase may personify the sea in its strength or allude to Tyre as a maritime stronghold.
    reason: lexical_alternative
  - marker: b
    text: Or “I have not travailed.”
    reason: lexical_alternative
  - marker: c
    text: Or “maidens” or “young women”; Hebrew specifically uses a term commonly denoting virgins.
    reason: lexical_alternative
lexical_decisions:
- source_word: בּוֹשִׁי
  chosen: Be ashamed
  alternatives:
  - Be put to shame
  - Lament
  lexicon: HALOT
  rationale: Qal imperative feminine singular from בושׁ, addressed to Sidon as a feminine city. 'Be ashamed' preserves the imperative force and the shame motif better than a softer rendering like 'lament.'
- source_word: צִידוֹן
  chosen: Sidon
  rationale: Standard English transliteration of the Phoenician city name.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the imperative; 'for' fits natural English in prophetic discourse.
- source_word: יָם
  chosen: the sea
  lexicon: HALOT
  rationale: Taken literally as 'the sea,' personified as speaking. The article is supplied in English for naturalness.
- source_word: מָעוֹז הַיָּם
  chosen: the stronghold of the sea
  alternatives:
  - the fortress of the sea
  - the sea's stronghold
  lexicon: HALOT
  rationale: מָעוֹז denotes a stronghold/fortress. The construct-like relation with הים is preserved. This likely appositionally further identifies the sea in its powerful, fortified aspect, possibly alluding to Tyre's maritime security, but the translation keeps the Hebrew imagery rather than interpreting it away.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard rendering introducing direct speech.
- source_word: לֹא חַ֣לְתִּי
  chosen: I have not been in labor
  alternatives:
  - I have not travailed
  - I have not writhed in labor
  lexicon: HALOT
  rationale: From חול/חיל in the sense of labor pains or writhing. 'Been in labor' is idiomatic modern English and fits the childbirth sequence that follows.
- source_word: יָלַדְתִּי
  chosen: given birth
  alternatives:
  - borne children
  lexicon: HALOT
  rationale: Direct childbirth verb; 'given birth' is clear and natural.
- source_word: גִדַּלְתִּי
  chosen: raised
  alternatives:
  - reared
  - made great
  lexicon: HALOT
  rationale: In this context of offspring, 'raised' best conveys bringing children to maturity rather than the broader sense 'made great.'
- source_word: בַּחוּרִים
  chosen: young men
  alternatives:
  - sons
  - youths
  lexicon: HALOT
  rationale: בחורים refers to young men/youths, not specifically 'sons.' 'Young men' preserves the gendered contrast with 'virgins' in the next colon.
- source_word: רוֹמַמְתִּי
  chosen: brought up
  alternatives:
  - exalted
  - reared
  lexicon: HALOT
  rationale: Though the root often means 'raise high/exalt,' in parallel with גִדַּלְתִּי and with children as object, it idiomatically conveys bringing up or rearing. 'Brought up' preserves the developmental sense in smooth English.
- source_word: בְתוּלוֹת
  chosen: virgins
  alternatives:
  - young women
  - maidens
  lexicon: HALOT
  rationale: בתולות most directly means 'virgins.' Because the Hebrew specifically marks unmarried virgin daughters/maidens, 'virgins' is more precise than the broader 'young women.'
