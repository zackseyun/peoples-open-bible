source:
  edition: SBLGNT
  text: αὐτὸς γάρ ἐστιν ἡ εἰρήνη ἡμῶν, ὁ ποιήσας τὰ ἀμφότερα ἓν καὶ τὸ μεσότοιχον τοῦ φραγμοῦ λύσας, τὴν ἔχθραν ἐν τῇ σαρκὶ αὐτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/002/014.yaml
  text: For he himself is our peace, who made both one and broke down the dividing wall of the barrier—the hostility—in his flesh,
translation:
  language: ko
  text: 그분 자신이 우리의 평화[a]이시니, 그분은 둘을 하나로 만드시고, 막아 가르던 담—곧 적의[b]—를 자기 육체로[c] 허무신 분이며—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: τὰ ἀμφότερα는 본 문맥상 유대인과 이방인을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 「적의」(ἔχθραν)는 「막아 가르던 담」과 동격으로, 그 담의 정체를 폭로한다.
    reason: lexical_alternative
  - marker: c
    text: 「자기 육체로」(ἐν τῇ σαρκὶ αὐτοῦ)는 그분의 육체적 죽음을 통해서이지, 그분의 인성을 제거함으로써가 아니다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡ εἰρήνη ἡμῶν
  english_pob_choice: our peace
  chosen_korean: 우리의 평화
  alternatives_korean:
  - 우리의 평강
  lexicon: BDAG
  rationale: 본 절은 인사 정식의 「평강」과 달리 둘을 화목케 하는 평화 자체를 가리키므로 「평화」가 더 무게 있게 들린다.
- source_word: τὸ μεσότοιχον τοῦ φραγμοῦ
  english_pob_choice: the dividing wall of the barrier
  chosen_korean: 막아 가르던 담
  alternatives_korean:
  - 가운데를 가로막은 담
  - 둘 사이의 가로막
  lexicon: BDAG
  rationale: 본문 이미지(둘 사이를 가로질러 막은 벽)를 「막아 가르던 담」으로 옮긴다.
theological_decisions:
- issue: 「적의」의 위치
  chosen_reading: 14절 끝의 「적의」를 「막아 가르던 담」과 동격으로 두어 그 담의 정체를 폭로하는 흐름으로 옮긴다.
  alternative_readings:
  - 「적의를 자기 육체로 죽이시고」(16절과 연결)
  rationale: 헬라어 어순상 「적의」(τὴν ἔχθραν)가 「자기 육체로」 앞에 오므로 「담—곧 적의—」 동격 흐름이 자연스럽다. 16절의 「적의를 죽이심」은 본 절의 「허무심」과 짝을 이룬다.
  doctrine_reference: 'PHILOSOPHY.md: Preserve rhetorical structure.'
