base_translation:
  language: en
  yaml_path: translation/ot/leviticus/025/050.yaml
  text: He shall calculate with his buyer from the year he sold himself to him until the year of jubilee[a], and the price of his sale shall be according to the number of years[b]; like the days of a hired worker he shall be with him.
  footnotes:
  - marker: a
    text: Or, 'from the year of his sale to him.' The Hebrew expression can be rendered more formally, but the context indicates that the man had sold himself into service.
    reason: lexical_alternative
  - marker: b
    text: Or, 'like the days of a hired laborer.' The comparison indicates that the valuation is to be reckoned as hired service rather than perpetual ownership.
    reason: lexical_alternative
