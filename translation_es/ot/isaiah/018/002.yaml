translation:
  language: es
  text: 'enviando enviados por mar[a], en embarcaciones de papiro sobre la superficie de las aguas: «Vayan, mensajeros veloces, a una nación alta y de piel lisa[b], a un pueblo temido por todas partes, una nación de mandato sobre mandato[c] y que pisotea, cuya tierra los ríos dividen[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en barcos de juncia/papiro».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «una nación estirada y pulida»; la frase probablemente describe la apariencia física del pueblo.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «una nación de línea sobre línea» o similar; la expresión es oscura.
    reason: lexical_alternative
  - marker: d
    text: O «cuya tierra los ríos saquean/arruinan».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֹּׁלֵחַ
  english_pob_choice: sending
  chosen_spanish: enviando
  alternatives_spanish:
  - el que envía
  - que envía
  lexicon: HALOT
  rationale: El participio hebreo con artículo funciona aquí como descripción continua, no como verbo finito; en español, el gerundio conserva ese valor descriptivo y enlaza con el contexto inmediato.
- source_word: צִירִים
  english_pob_choice: envoys
  chosen_spanish: enviados
  alternatives_spanish:
  - mensajeros
  - embajadores
  lexicon: HALOT
  rationale: El término se usa en un contexto diplomático/internacional. «Enviados» conserva el matiz oficial sin forzar un término más técnico que en español podría sonar demasiado moderno o eclesiástico.
- source_word: בַּיָּם
  english_pob_choice: by sea
  chosen_spanish: por mar
  alternatives_spanish:
  - sobre el mar
  - por el mar
  lexicon: HALOT
  rationale: La frase indica medio o ruta de envío. «Por mar» es la manera natural en español de expresar transporte por vía marítima.
- source_word: וּבִכְלֵי גֹמֶא
  english_pob_choice: in papyrus vessels
  chosen_spanish: en vasos de papiro
  alternatives_spanish:
  - en barcos de papiro
  - en embarcaciones de juncia
  lexicon: HALOT
  rationale: «כְלֵי» apunta a recipientes/artefactos construidos, y el material es גֹמֶא (papiro/juncia). «Vasos de papiro» mantiene la imagen material y deja abierta la forma exacta del medio de transporte, como en el audit trail inglés.
- source_word: עַל פְּנֵי מַיִם
  english_pob_choice: over the surface of the waters
  chosen_spanish: sobre la superficie de las aguas
  alternatives_spanish:
  - sobre las aguas
  - por la superficie de las aguas
  lexicon: HALOT
  rationale: La idiomática hebrea «sobre la faz/superficie de» se comunica con naturalidad en español mediante «sobre la superficie de las aguas», preservando la imagen sin calco rígido.
- source_word: לְכוּ
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Salgan
  - Procedan
  lexicon: HALOT
  rationale: El imperativo plural se traduce de forma directa con «Vayan», en español natural y acorde con el estilo sobrio del proyecto.
- source_word: מַלְאָכִים קַלִּים
  english_pob_choice: swift messengers
  chosen_spanish: mensajeros veloces
  alternatives_spanish:
  - mensajeros rápidos
  - mensajeros ligeros
  lexicon: HALOT
  rationale: קַלִּים aquí expresa rapidez, no ligereza física. «Veloces» reproduce bien la idea de prisa o rapidez y suena digno en español bíblico moderno.
- source_word: גּוֹי מְמֻשָּׁךְ וּמוֹרָט
  english_pob_choice: a nation tall and smooth-skinned
  chosen_spanish: una nación alta y pulida
  alternatives_spanish:
  - una nación extendida y pulida
  - una nación alargada y rasurada
  lexicon: HALOT
  rationale: La frase es difícil y probablemente describe el aspecto físico del pueblo. «Alta y pulida» mantiene el par descriptivo sin imponer una reconstrucción más interpretativa que la evidencia hebrea permite en español.
- source_word: עַם נוֹרָא מִן הוּא וָהָלְאָה
  english_pob_choice: a people feared far and wide
  chosen_spanish: a un pueblo temido lejos y ampliamente
  alternatives_spanish:
  - a un pueblo temido desde allí y más allá
  - a un pueblo temible por doquier
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y ambigua. «Lejos y ampliamente» conserva el alcance espacial de la recepción del temor, aunque suene menos idiomático que la opción inglesa; se evita una paráfrasis más fuerte que borre la tensión del original.
- source_word: גּוֹי קַו קָו
  english_pob_choice: a nation of command upon command
  chosen_spanish: una nación de mandato sobre mandato
  alternatives_spanish:
  - una nación de línea sobre línea
  - una nación de regla sobre regla
  lexicon: HALOT
  rationale: El hebreo es oscuro; el audit trail inglés terminó revisando «line upon line» hacia una lectura más directiva/ordenada. «Mandato sobre mandato» conserva esa repetición enfática y mantiene la dificultad interpretativa sin cerrar indebidamente el sentido.
- source_word: וּמְבוּסָה
  english_pob_choice: trampling down
  chosen_spanish: de pisoteo
  alternatives_spanish:
  - y que pisa
  - y de aplastamiento
  lexicon: HALOT
  rationale: La raíz se relaciona con pisar/tramplear. En español, «de pisoteo» preserva la cualidad/acción nominal del hebreo y evita decidir demasiado pronto entre sujeto activo o descripción del efecto.
- source_word: אֲשֶׁר בָּזְאוּ נְהָרִים אַרְצוֹ
  english_pob_choice: whose land the rivers divide
  chosen_spanish: cuya tierra los ríos dividen
  alternatives_spanish:
  - cuya tierra los ríos saquean
  - cuya tierra los ríos arruinan
  lexicon: HALOT
  rationale: El verbo es difícil; el contexto geográfico favorece la idea de ríos que atraviesan o dividen la tierra. Se conserva la lectura principal del audit trail, dejando abiertas las alternativas más literales en la nota.
translation_notes:
  revision_awareness: El borrador sigue de cerca el último estado revisado del inglés POB, pero ajusta el cierre oscuro de קַו קָו a una solución española igualmente abierta («mandato sobre mandato») y conserva la alternativa material de גֹמֶא en una nota. También evita introducir un equivalente demasiado interpretativo para מְמֻשָּׁךְ/מוֹרָט, manteniendo una descripción física sobria acorde con el audit trail.
  spanish_consistency_notes:
  - Se mantuvo Yahvé fuera de este versículo porque el texto hebreo no lo contiene explícitamente.
  - Se usó un registro bíblico moderno, pero no arcaizante.
  - Se evitó «SEÑOR» y «Cristo» porque no corresponden a este pasaje.
  - «Mensajeros» y «enviados» se reservaron para distinguir צִירִים de מַלְאָכִים.
  - La puntuación con dos puntos introduce correctamente la cita imperativa.
  - La nota a se ancla en «vasos de papiro» para preservar la alternativa de material/forma del medio de transporte.
