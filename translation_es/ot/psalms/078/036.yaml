translation:
  language: es
  text: Pero lo halagaron[a] con su boca, y con su lengua le mintieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo engañaron» o «lo sedujeron». El verbo hebreo puede abarcar esas ideas, pero aquí probablemente se refiere a un habla aduladora e insincera.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְפַתּוּהוּ
  english_pob_choice: they flattered him
  chosen_spanish: lo engañaron
  alternatives_spanish:
  - lo halagaron
  - lo sedujeron
  - lo persuadieron con engaño
  lexicon: HALOT
  rationale: El piel de פתה puede abarcar seducir, engañar, persuadir o halagar. El inglés POB opta por una equivalencia dinámica que destaque el habla insincera; en español, «lo engañaron» conserva la falsedad intencional y encaja con la segunda cola sobre mentir con la lengua. «Halagaron» sería posible, pero suena más específico y menos abarcador para el paralelismo del versículo.
- source_word: בְּפִיהֶם
  english_pob_choice: with their mouth
  chosen_spanish: con su boca
  alternatives_spanish:
  - con su boca
  - por su boca
  lexicon: HALOT
  rationale: La preposición ב aquí expresa medio o instrumento. En español, «con su boca» reproduce de forma natural la imagen colectiva singular del hebreo y evita una construcción más literal pero menos idiomática como «por su boca».
- source_word: וּבִלְשׁוֹנָם
  english_pob_choice: and with their tongue
  chosen_spanish: y con su lengua
  alternatives_spanish:
  - y con su lengua
  - y por su lengua
  lexicon: HALOT
  rationale: 'לָשׁוֹן se mantiene como «lengua» para conservar la concreción poética y el paralelismo con «boca». El singular con sufijo plural se refleja naturalmente en español con un posesivo singular colectivo: «su lengua».'
- source_word: יְכַזְּבוּ
  english_pob_choice: they lied
  chosen_spanish: mintieron
  alternatives_spanish:
  - hablaron falsamente
  - fueron falsos
  lexicon: HALOT
  rationale: כזב en piel expresa mentir o actuar con falsedad. «Mintieron» es la forma más directa y clara en español, en línea con la decisión del POB inglés de mantener la acusación verbal explícita.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - contra él
  lexicon: HALOT
  rationale: El lamed con sufijo marca aquí el destinatario de su habla falsa. En español, el pronombre átono «le» expresa de manera natural el objeto indirecto y mantiene la referencia a Dios sin sobrecargar el verso.
theological_decisions:
- issue: Si el versículo afirma que los humanos lograron engañar a Dios o sólo que le dirigieron palabras hipócritas.
  english_pob_reading: The verse describes insincere, flattering speech directed toward God, not actual deception of God.
  chosen_spanish_reading: El versículo describe un habla insincera y engañosa dirigida a Dios, no que Dios haya sido realmente engañado.
  alternative_spanish_readings:
  - El versículo podría leerse más literalmente como que «lo engañaron».
  - El versículo podría suavizarse como simple adulación sin la fuerza de engaño.
  rationale: 'La tradición poética del salmo denuncia la hipocresía de Israel. En español conviene preservar esa tensión: el texto acusa la tentativa de engaño y la falsedad del discurso, pero no requiere afirmar que Dios fue efectivamente defraudado.'
  doctrine_reference: Mantener la tensión teológica entre la conducta humana y la omnisciencia divina; equivalencia óptima guiada por el contexto del salmo.
translation_notes:
  revision_awareness: El contexto de auditoría inglesa mantiene alta concordancia y no registra revisiones aplicadas; por eso el español sigue la misma línea interpretativa sin introducir cambios de sentido.
  spanish_consistency_notes:
  - Se mantiene «boca» y «lengua» para conservar el paralelismo corporal del hebreo.
  - Se usa «le» para el destinatario del habla falsa, coherente con el objeto indirecto en español.
  - El verso evita terminología eclesiástica tradicional que atenúe la fuerza acusatoria del texto.
  - La nota al pie preserva la ambigüedad léxica del piel de פתה, como en el aparato inglés.
