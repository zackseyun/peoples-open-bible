translation:
  language: es
  text: Ordena a los hijos de Israel que den a los levitas[a], de la heredad de su posesión, ciudades para habitar; y ustedes darán a los levitas tierras de pastoreo[b] alrededor de las ciudades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas»; el hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: El término designa el terreno abierto que rodea la ciudad, usado especialmente para pastoreo y otros usos comunales.
    reason: cultural_note
lexical_decisions:
- source_word: צַו
  english_pob_choice: Command
  chosen_spanish: Ordena
  alternatives_spanish:
  - Comanda
  - Da la orden de
  lexicon: HALOT
  rationale: El imperativo hebreo requiere fuerza directiva clara. «Ordena» conserva el valor mandatorio sin sonar excesivamente militar o arcaico en español.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se preserva la literalidad del hebreo para mantener transparencia frente al texto fuente. «Hijos» reproduce el vínculo lexical con בְּנֵי y evita borrar la forma masculina marcada del original.
- source_word: וְנָתְנוּ
  english_pob_choice: that they give
  chosen_spanish: que den
  alternatives_spanish:
  - y den
  - que entreguen
  lexicon: HALOT
  rationale: El waw con perfecto tiene fuerza injuntiva dentro del mandato. «Que den» expresa de manera natural en español el resultado mandado, sin perder el carácter exhortativo.
- source_word: לַלְוִיִּם
  english_pob_choice: to the Levites
  chosen_spanish: a los levitas
  alternatives_spanish:
  - a los levitas
  - para los levitas
  lexicon: HALOT
  rationale: Dativo de destinatario directo. «Levitas» es la forma estable en español bíblico y corresponde al grupo sacerdotal/tribal del texto.
- source_word: מִנַּחֲלַת אֲחֻזָּתָם
  english_pob_choice: from the inheritance of their possession
  chosen_spanish: de la heredad de su posesión
  alternatives_spanish:
  - de la herencia de su posesión
  - de su heredad posesional
  lexicon: HALOT
  rationale: Se mantienen ambos sustantivos hebreos, נַחֲלָה y אֲחֻזָּה, porque el texto distingue dos nociones legales relacionadas con la tierra. «Heredad» y «posesión» conservan esa doble referencia con lenguaje bíblico comprensible.
- source_word: עָרִים לָשָׁבֶת
  english_pob_choice: cities to live in
  chosen_spanish: ciudades para habitar
  alternatives_spanish:
  - ciudades para vivir
  - ciudades donde habitar
  lexicon: HALOT
  rationale: La construcción de infinitivo indica propósito. «Habitar» es más cercano al registro bíblico y preserva la idea de residencia estable mejor que una simple equivalencia cotidiana.
- source_word: מִגְרָשׁ
  english_pob_choice: pasturelands
  chosen_spanish: terrenos de pasto
  alternatives_spanish:
  - pastizales
  - tierras de pastoreo
  - terrenos abiertos
  lexicon: HALOT
  rationale: El término designa el espacio abierto alrededor de la ciudad, con uso comunal y de pastoreo. «Terrenos de pasto» comunica esa función sin restringirlo indebidamente a un solo tipo de uso agrícola.
- source_word: לֶעָרִים סְבִיבֹתֵיהֶם
  english_pob_choice: around the cities
  chosen_spanish: alrededor de las ciudades
  alternatives_spanish:
  - en torno a las ciudades
  - alrededor de sus ciudades
  lexicon: HALOT
  rationale: La frase especifica la ubicación periférica del מִגְרָשׁ. Se evita añadir un demostrativo no necesario y se mantiene la referencia genérica del hebreo revisado en la auditoría inglesa.
- source_word: תִּתְּנוּ
  english_pob_choice: you shall give
  chosen_spanish: vosotros daréis
  alternatives_spanish:
  - daréis
  - vosotros debéis dar
  lexicon: HALOT
  rationale: El verbo está en segunda persona plural, y el español necesita reflejar ese cambio de destinatario respecto al verbo anterior. «Vosotros daréis» mantiene la distinción formal del hebreo; aunque no sea la forma más habitual en algunas regiones, aquí ayuda a preservar el contraste del texto fuente.
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente: se entendió el final como «alrededor de las ciudades», sin el añadido «aquellas». También se preservó el cambio verbal de tercera a segunda persona plural, que la auditoría inglesa señaló como relevante.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el nombre divino aparece en el texto; aquí no aplica.
  - Se mantuvo «levitas» por consistencia con la terminología POB y la referencia tribal/legal del pasaje.
  - Se eligió «habitar» y «terrenos de pasto» para conservar el registro bíblico sin caer en calco rígido.
  - La alternancia de persona verbal en español refleja la alternancia del hebreo entre וְנָתְנוּ y תִּתְּנוּ.
