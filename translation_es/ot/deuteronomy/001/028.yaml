translation:
  language: es
  text: '¿Adónde subimos nosotros? Nuestros hermanos[a] han derretido nuestros corazones, diciendo: «El pueblo es más grande y más alto que nosotros; las ciudades son grandes y fortificadas hasta los cielos[b]; y además, vimos allí a los descendientes de Anac[c]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «han hecho derretir nuestros corazones»; es decir, «nos han desalentado».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «fortificadas en los cielos», una expresión hiperbólica para fortificaciones extremadamente altas.'
    reason: cultural_note
  - marker: c
    text: 'O: «anaceos» o «hijos de Anac».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָנָה
  english_pob_choice: Where
  chosen_spanish: ¿Adónde
  alternatives_spanish:
  - ¿Dónde
  - ¿Hacia dónde
  lexicon: HALOT
  rationale: El interrogativo pregunta por destino o dirección de ascenso; «adónde» conserva ese valor mejor que «dónde» en español.
- source_word: עֹלִים
  english_pob_choice: are going up
  chosen_spanish: subimos
  alternatives_spanish:
  - estamos subiendo
  - vamos subiendo
  lexicon: HALOT
  rationale: El hebreo expresa movimiento de ascenso en primera persona plural. En español, el presente simple reproduce de manera natural la pregunta y la idea de avanzar/subir.
- source_word: אַחֵינוּ
  english_pob_choice: Our brothers
  chosen_spanish: Nuestros hermanos
  alternatives_spanish:
  - Nuestros parientes
  - Nuestros compatriotas
  lexicon: HALOT
  rationale: La forma masculina plural con sufijo de primera persona plural se conserva con «hermanos», manteniendo el lenguaje relacional del texto.
- source_word: הֵמַסּוּ אֶת לְבָבֵנוּ
  english_pob_choice: have melted our hearts
  chosen_spanish: han derretido nuestro corazón
  alternatives_spanish:
  - han hecho derretir nuestro corazón
  - nos han desalentado
  lexicon: HALOT
  rationale: El hebreo usa una imagen vívida de ablandar/derretir el corazón como pérdida de valor. «Derretido nuestro corazón» conserva la metáfora; «desalentado» explicita el sentido, pero atenúa la imagen.
- source_word: עַם גָּדוֹל וָרָם מִמֶּנּוּ
  english_pob_choice: The people are greater and taller than we are
  chosen_spanish: El pueblo es más grande y más alto que nosotros
  alternatives_spanish:
  - El pueblo es más grande y más elevado que nosotros
  - Es un pueblo demasiado grande y alto para nosotros
  lexicon: HALOT
  rationale: «גדול» y «רם» combinan tamaño y altura. «Más grande y más alto» sigue de cerca la doble comparación sin forzar un equivalente idiomático ajeno al texto.
- source_word: עָרִים גְּדֹלֹת וּבְצוּרֹת בַּשָּׁמָיִם
  english_pob_choice: the cities are great and fortified up to the heavens
  chosen_spanish: las ciudades son grandes y fortificadas hasta los cielos
  alternatives_spanish:
  - las ciudades son grandes y fortificadas en los cielos
  - las ciudades son grandes y fortificadas hasta el cielo
  lexicon: HALOT
  rationale: «Fortificadas» corresponde a בְּצוּרֹת. «Hasta los cielos» conserva la hipérbole hebrea y la pluralidad del sustantivo «cielos» mejor que una reducción a «el cielo».
- source_word: וְגַם
  english_pob_choice: and besides
  chosen_spanish: y además
  alternatives_spanish:
  - y también
  - y aparte
  lexicon: HALOT
  rationale: La conjunción agrega otro motivo de temor en la cita reportada. «Y además» transmite bien el valor acumulativo sin perder naturalidad.
- source_word: בְּנֵי עֲנָקִים
  english_pob_choice: the sons of the Anakim
  chosen_spanish: los hijos de los anaceos
  alternatives_spanish:
  - los anaceos
  - los descendientes de Anac
  lexicon: HALOT
  rationale: Se mantiene la referencia étnica/etnográfica del grupo con una forma española comprensible. «Hijos de los anaceos» conserva la semi-literalidad del hebreo y su asociación tradicional con ese pueblo.
- source_word: רָאִינוּ שָׁם
  english_pob_choice: we saw ... there
  chosen_spanish: vimos allí
  alternatives_spanish:
  - hemos visto allí
  - allí vimos
  lexicon: HALOT
  rationale: El pasado simple encaja con el relato inmediato. «Allí» mantiene la deixis de שָׁם sin añadir explicación.
theological_decisions:
- issue: Conservación de la metáfora de desánimo interno
  english_pob_reading: have melted our hearts; that is, have discouraged us
  chosen_spanish_reading: han derretido nuestro corazón
  alternative_spanish_readings:
  - nos han desalentado
  - nos han quitado el ánimo
  rationale: Se preserva la imagen corporal del hebreo en el texto principal. El sentido de desánimo queda implícito por el contexto narrativo, sin borrar la tensión léxica entre metáfora e interpretación.
  doctrine_reference: Antropología bíblica y lenguaje figurado del corazón como centro de voluntad y valor
- issue: Hiperbole espacial en la fortificación
  english_pob_reading: fortified up to the heavens
  chosen_spanish_reading: fortificadas hasta los cielos
  alternative_spanish_readings:
  - fortificadas hasta el cielo
  - fortificadas en los cielos
  rationale: La expresión hebrea es hiperbólica y debe mantenerse como tal. «Hasta los cielos» preserva el registro bíblico y evita convertir la imagen en una simple descripción arquitectónica.
  doctrine_reference: Poética e hipérbole en la narrativa bíblica
- issue: Identificación del grupo étnico de ענקים
  english_pob_reading: the sons of the Anakim / Anakites or descendants of Anak
  chosen_spanish_reading: los hijos de los anaceos
  alternative_spanish_readings:
  - los anaceos
  - los descendientes de Anac
  rationale: Se eligió una forma que suene natural en español y conserve el vínculo con el grupo mencionado en la tradición bíblica. La frase sigue siendo suficientemente transparente para lectores que conozcan el término por el contexto.
  doctrine_reference: Onomástica y etnónimos en traducción bíblica
translation_notes:
  revision_awareness: La redacción sigue de cerca el pasaje hebreo y el audit trail en inglés sin depender mecánicamente del inglés. Se conserva la metáfora de «derretir el corazón», la hipérbole «hasta los cielos» y la referencia al grupo de los ענקים, con ajuste natural al español. No se requirieron revisiones previas adicionales.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Hermanos» conserva el plural masculino del hebreo y su función retórica en el contexto.
  - «Cielos» en plural mantiene el tono bíblico y la imagen del hebreo.
  - No se introdujeron términos doctrinales ajenos al texto; la traducción prioriza la imagen original y su inteligibilidad en español.
