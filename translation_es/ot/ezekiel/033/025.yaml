translation:
  language: es
  text: 'Por tanto, diles[a]: «Así dice el Señor Yahvé: comen con la sangre, alzan sus ojos hacia sus ídolos[c] y derraman sangre[b]; ¿y poseerán entonces la tierra?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «diles» o «habla con ellos».'
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula final funciona como pregunta retórica de reprensión: «¿y poseerán entonces la tierra?».'
    reason: theological_note
  - marker: c
    text: Término despectivo para «ídolos» en Ezequiel.
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así pues
  lexicon: HALOT
  rationale: La partícula inferencial introduce la conclusión de la acusación previa; «Por tanto» conserva bien ese valor conclusivo en español natural.
- source_word: אֱמֹר אֲלֵיהֶם
  english_pob_choice: say to them
  chosen_spanish: diles
  alternatives_spanish:
  - diles a ellos
  - háblales
  lexicon: HALOT
  rationale: La comisión profética directa puede expresarse de forma concisa en español sin perder el acto de habla imperativo.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  english_pob_choice: Thus says the Lord GOD
  chosen_spanish: Así dice el Señor Yahvé
  alternatives_spanish:
  - Así dice el Señor Dios
  - Así ha dicho el Señor Yahvé
  lexicon: HALOT
  rationale: 'Se conserva la fórmula profética y el nombre divino según la convención del proyecto para יְהוָה: «Yahvé». «Señor» representa אֲדֹנָי.'
- source_word: עַל הַדָּם תֹּאכֵלוּ
  english_pob_choice: You eat with the blood
  chosen_spanish: comen con la sangre
  alternatives_spanish:
  - comen sobre la sangre
  - comen sangre
  lexicon: HALOT
  rationale: «Con la sangre» comunica de manera clara la imagen idiomática sin estrecharla excesivamente; mantiene la tensión léxica del hebreo sobre la infracción vinculada a la sangre.
- source_word: וְעֵינֵיכֶם תִּשְׂאוּ אֶל גִּלּוּלֵיכֶם
  english_pob_choice: and you lift up your eyes to your idols
  chosen_spanish: alzan sus ojos hacia sus ídolos
  alternatives_spanish:
  - levantan sus ojos hacia sus ídolos
  - dirigen sus ojos a sus ídolos
  lexicon: HALOT
  rationale: «Alzar los ojos hacia» reproduce el hebraísmo y su matiz de orientación/devoción; «ídolos» es el equivalente natural de גִּלּוּלִים, conservando el referente.
- source_word: גִּלּוּלֵיכֶם
  english_pob_choice: your idols
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus ídolos despreciables
  - sus ídolos inmundos
  lexicon: HALOT
  rationale: En el texto principal se prefiere el equivalente transparente «ídolos»; el tono despectivo del término hebreo queda documentado en la nota correspondiente.
- source_word: וְדָם תִּשְׁפֹּכוּ
  english_pob_choice: and you shed blood
  chosen_spanish: y derraman sangre
  alternatives_spanish:
  - y vierten sangre
  - y derraman sangre inocente
  lexicon: HALOT
  rationale: «Derramar sangre» es el giro idiomático español habitual para el hebreo de homicidio/violencia; mantiene la fuerza acusatoria sin añadir especificación no dada por el texto.
- source_word: וְהָאָרֶץ תִּירָשׁוּ
  english_pob_choice: Shall you then possess the land?
  chosen_spanish: ¿y poseerán entonces la tierra?
  alternatives_spanish:
  - ¿y entonces heredarán la tierra?
  - ¿y poseerán la tierra entonces?
  lexicon: HALOT
  rationale: Se conserva la pregunta retórica de reproche. «Poseer» refleja bien תִּירָשׁוּ en este contexto jurídico-covenantal, sin forzar «heredar» como si fuera exclusivamente terminología técnica.
theological_decisions:
- issue: Nombre divino en la fórmula profética
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Jehová
  rationale: El texto hebreo tiene אֲדֹנָי + יְהוָה; en español se conserva la distinción entre el título «Señor» y el nombre propio divino «Yahvé», conforme a la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de la cláusula final
  english_pob_reading: Shall you then possess the land?
  chosen_spanish_reading: ¿y poseerán entonces la tierra?
  alternative_spanish_readings:
  - ¿y entonces poseerán la tierra?
  - ¿y poseerán la tierra?
  rationale: Se mantiene el valor de desafío indignado del hebreo como pregunta retórica, sin convertirla en afirmación ni suavizar la acusación.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source sense in readable modern Spanish'
translation_notes:
  revision_awareness: El texto sigue la revisión de puntuación del audit trail inglés, uniendo la cláusula final como pregunta retórica de reproche tras las acusaciones previas. Se evitó una traducción mecánica de «Lord GOD» y se adoptó la terminología del proyecto para el nombre divino.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה y «Señor» para אֲדֹנָי, siguiendo la política del proyecto.
  - Se preservó el paralelismo acusatorio en una sola frase con punto y coma antes de la pregunta final, en correspondencia con la revisión inglesa.
  - Se evitó «SEÑOR» como máscara del nombre divino y se usó una forma natural de español bíblico contemporáneo.
