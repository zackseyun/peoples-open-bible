  to: Cuando llegues allá, busca allí a Jehú, hijo de Joásafat, hijo de Nimsi. Entra, hazlo levantarse de entre sus hermanos, y llévalo a un cuarto interior[a].
  rationale: Se corrige la colocación del marcador de nota para que ancle la explicación de חֶדֶר בְּחָדֶר en «cuarto interior», y se mejora la naturalidad de וּרְאֵה שָׁם con «busca allí a», que preserva el sentido de localizar a Jehú sin el giro extraño «mira allá por».
