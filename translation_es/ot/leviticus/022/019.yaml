translation:
  language: es
  text: para vuestra aceptación[a], ha de ser un macho sin defecto[b], de entre el ganado, las ovejas o las cabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que seáis aceptados». La expresión hebrea «para vuestra aceptación» también puede entenderse en relación con la aceptación de los oferentes.
    reason: alternative_reading
  - marker: b
    text: O «sin defecto». El término hebreo denota un animal libre de defecto y apto para el sacrificio.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִרְצֹנְכֶם
  english_pob_choice: for your acceptance
  chosen_spanish: para vuestra aceptación
  alternatives_spanish:
  - para que seáis aceptados
  - para vuestro favor
  - para vuestro agrado
  lexicon: HALOT
  rationale: La frase nominal con ל + רָצוֹן y sufijo de 2.ª persona plural expresa la condición de aceptabilidad del sacrificio en relación con los oferentes. 'Para vuestra aceptación' mantiene ese valor cultual de aceptabilidad sin convertirlo en una construcción verbal que resuelva la tensión interpretativa.
- source_word: תָּמִים
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin defecto alguno
  - íntegro
  lexicon: HALOT
  rationale: En contexto sacrificial, תמים describe un animal libre de defecto físico. 'Sin defecto' comunica con claridad el requisito ritual en español moderno y preserva la idea de integridad física; 'sin mancha' es una alternativa viable, pero algo más figurada.
- source_word: זָכָר
  english_pob_choice: male
  chosen_spanish: macho
  alternatives_spanish:
  - macho
  - varón
  lexicon: HALOT
  rationale: Como rasgo zoológico del animal sacrificial, 'macho' es el equivalente natural y preciso en español; 'varón' no resulta idiomático para ganado.
- source_word: בַּבָּקָר
  english_pob_choice: from the cattle
  chosen_spanish: de entre el ganado
  alternatives_spanish:
  - del ganado vacuno
  - de las reses
  - del vacuno
  lexicon: HALOT
  rationale: El hebreo presenta una categoría de procedencia/selección dentro del ganado bovino. 'De entre el ganado' conserva bien la partitiva y suena natural en español, evitando una terminología demasiado técnica o restrictiva.
- source_word: בַּכְּשָׂבִים
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - los corderos
  - las ovejas
  lexicon: HALOT
  rationale: כְּשָׂבִים puede abarcar ovejas y, según contexto, corderos; aquí funciona como una de las categorías animales del listado. 'Las ovejas' es la opción más amplia y segura para el español.
- source_word: וּבָעִזִּים
  english_pob_choice: the goats
  chosen_spanish: las cabras
  alternatives_spanish:
  - las cabras
  - las cabras y/o los cabritos
  lexicon: HALOT
  rationale: עִזִּים designa cabras. En español, 'cabras' expresa la categoría zoológica de forma directa; el contexto de lista sacrificial no exige especificar cabritos.
theological_decisions:
- issue: Aceptabilidad del sacrificio vs. aceptación de los oferentes
  english_pob_reading: for your acceptance
  chosen_spanish_reading: para vuestra aceptación
  alternative_spanish_readings:
  - para que seáis aceptados
  - para vuestro favor
  rationale: El hebreo permite oír tanto la aceptabilidad de la ofrenda como la aceptación de quienes la presentan. Se conserva la formulación nominal para no cerrar la ambigüedad teológica y ritual, en línea con la decisión auditada del POB en inglés.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en vez de resolverla)
translation_notes:
  revision_awareness: La base inglesa revisada sustituyó 'sound' por 'without blemish' para תמים; por eso el español adopta 'sin defecto' y no un equivalente de 'sano'. Se mantiene además la estructura nominal de לִרְצֹנְכֶם para conservar la ambigüedad cultual documentada en el audit trail.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplicable aquí, pues el versículo no contiene el Nombre divino.
  - Se traduce el campo semántico sacrificial con terminología moderna y sobria, evitando arcaísmos innecesarios.
  - 'Se conserva una lista de categorías animales en paralelo: ganado / ovejas / cabras.'
  - '''Sin defecto'' funciona aquí como equivalente funcional de ''sin mancha'' / ''sin defecto físico'' sin añadir interpretación doctrinal.'
