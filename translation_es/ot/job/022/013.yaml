revisions:
- from: 'Pero tú dices[a]: «¿Qué sabe Dios? ¿Puede juzgar a través de la oscuridad espesa?»'
  to: 'Pero tú dices: «¿Qué sabe Dios? ¿Puede juzgar a través de la densa oscuridad[a][b]?».'
