  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Λέγω οὖν, μὴ ἔπταισαν ἵνα πέσωσιν; μὴ γένοιτο· ἀλλὰ τῷ αὐτῶν παραπτώματι ἡ σωτηρία τοῖς ἔθνεσιν, εἰς τὸ παραζηλῶσαι αὐτούς.
base_translation:
  language: en
  yaml_path: translation/nt/romans/011/011.yaml
  text: So I say[a], they did not stumble so as to fall, did they? May it never be! Rather, by their trespass salvation has come to the Gentiles[d][c][b], to make them jealous.
  footnotes:
  - marker: a
    text: Or 'so that they might fall'—the Greek distinguishes 'stumble' from 'fall,' and the question expects the answer no.
    reason: lexical_alternative
  - marker: b
    text: Or 'through their transgression.'
    reason: lexical_alternative
  - marker: c
    text: Greek 'the nations'; in this context, 'Gentiles' means the non-Jewish peoples.
    reason: lexical_alternative
  - marker: d
    text: Or 'to provoke them to jealousy'; the sense may include stirring them to seek the same salvation.
    reason: alternative_reading
translation:
  language: ko
  text: 그러면 내가 묻겠습니다. 그들이 넘어지려고 실족한 것입니까? 결코 그렇지 않습니다! 도리어 그들의 범죄로 인하여 구원이 이방인에게 이르렀으니, 이는 그들을 시기하게 하기 위함입니다.
  philosophy: optimal-equivalence
