review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general la escena zoológica del hebreo y del POB inglés: anidar, poner huevos, protección materna y reunión de aves rapaces. Sin embargo, hay dos desajustes importantes con el rastro auditado: (1) וּבָקְעָה corresponde a ‘hatch them’, no a ‘incubará’; y (2) דַיּוֹת se auditó como ‘kites’, por lo que ‘halcones’ desplaza el referente a otra rapaz más específica y menos adecuada. También conviene reflejar mejor el distributivo femenino de אִשָּׁה רְעוּתָהּ con ‘cada una con su pareja’.'
  spanish_quality_summary: El español es claro y legible, pero ‘los incubará’ repite en esencia la nota alternativa de דגר y debilita la progresión verbal del original. ‘Halcones’ suena natural, pero aquí induce una identificación equivocada frente a ‘milanos’, que además ya aparece como alternativa en la nota y es la equivalencia más alineada con el POB inglés. ‘Sí’ por אַךְ es aceptable, aunque ‘ciertamente’ o ‘en verdad’ también servirían; no requiere cambio obligatorio.
  glossary_alignment: 'No hay términos teológicos principales en juego. En léxico zoológico incierto, ‘serpiente flechera’ es una solución defendible para קִפּוֹז con nota. La revisión propuesta mejora la fidelidad a las decisiones léxicas auditadas: וּבָקְעָה → ‘los hará salir del cascarón’ y דַיּוֹת → ‘milanos’, manteniendo nota de alternativas (‘buitres’ / ‘aves de rapiña’).'
  issues:
  - severity: high
    issue: וּבָקְעָה fue traducido como ‘los incubará’
    rationale: El verbo בקע significa ‘partir/abrir’, y en el contexto de huevos el POB inglés lo resolvió como ‘hatch them’. ‘Incubar’ duplica la idea de דגר/empollar y borra la secuencia anidar → poner huevos → eclosionar → cobijar/empollar.
  - severity: high
    issue: דַיּוֹת fue traducido como ‘halcones’
    rationale: El expediente léxico auditado favorece ‘kites’, que en español corresponde mejor a ‘milanos’. ‘Halcones’ cambia el tipo de ave y reduce la fidelidad al análisis fuente/POB.
  - severity: medium
    issue: אִשָּׁה רְעוּתָהּ quedó como ‘cada uno con su pareja’
    rationale: El hebreo usa imaginería femenina distributiva para las aves; ‘cada una con su pareja’ preserva mejor esa concordancia sin sonar antinatural.
  - severity: low
    issue: La nota b explica ‘empollar/incubar’ pero el texto principal ya usaba ‘incubará’ para otro verbo
    rationale: Esto genera confusión entre בקע y דגר. La nota debe quedar anclada al verbo de cobijo/empolle, no al de eclosión.
  revised_spanish_text: Allí anidará la serpiente flechera, pondrá huevos[a], los hará salir del cascarón y los cobijará[b] en su sombra; sí, allí se reunirán los milanos[c], cada una con su pareja.
