translation:
  language: es
  text: 'Y él les dijo: «Tengo hoy ciento veinte años; ya no puedo salir y entrar[a], y Yahvé me ha dicho: “No pasarás este Jordán”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «salir y entrar», un modismo que puede referirse tanto a la actividad ordinaria como al hecho de liderar al pueblo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֲלֵהֶם
  english_pob_choice: And he said to them
  chosen_spanish: Y él les dijo
  alternatives_spanish:
  - Entonces les dijo
  - Y les dijo
  lexicon: HALOT
  rationale: El hebreo narrativo פשוט del wayyiqtol se vierte de manera natural con una coordinación simple en español. Se mantiene el sujeto explícito por claridad y para conservar el énfasis del discurso directo.
- source_word: בֶּן מֵאָה וְעֶשְׂרִים שָׁנָה
  english_pob_choice: one hundred twenty years old
  chosen_spanish: ciento veinte años
  alternatives_spanish:
  - de ciento veinte años
  - ciento veinte años de edad
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de edad; en español lo más natural y fiel es una simple declaración de edad. Se omite literalmente 'hijo de' porque sería artificial y no comunicaría bien el sentido.
- source_word: אָנֹכִי הַיּוֹם
  english_pob_choice: I am ... today
  chosen_spanish: hoy
  alternatives_spanish:
  - yo hoy
  - hoy yo
  lexicon: HALOT
  rationale: אָנֹכִי aporta énfasis de primera persona y הַיּוֹם marca la actualidad. En español el énfasis queda suficientemente reflejado con la inserción de 'hoy' en posición natural dentro de la oración.
- source_word: לֹא אוּכַל עוֹד
  english_pob_choice: I can no longer
  chosen_spanish: ya no puedo
  alternatives_spanish:
  - no puedo más
  - ya no soy capaz de
  lexicon: HALOT
  rationale: La combinación de יכול con עוֹד expresa incapacidad continuada. 'Ya no puedo' comunica bien la pérdida de capacidad sin sonar más dura o menos natural que otras opciones.
- source_word: לָצֵאת וְלָבוֹא
  english_pob_choice: go out and come in
  chosen_spanish: salir ni entrar
  alternatives_spanish:
  - salir y entrar
  - ir y venir
  - salir y volver a entrar
  lexicon: HALOT
  rationale: Se conserva el par verbal y su posible valor idiomático sin forzar una interpretación restrictiva. En español, con negación, 'salir ni entrar' resulta idiomático y reproduce la fórmula hebrea de manera comprensible.
- source_word: וַיהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Conforme a la norma terminológica del proyecto, el Tetragrámaton se traduce por 'Yahvé' para preservar el nombre del pacto y evitar el sustituto litúrgico.
- source_word: אָמַר אֵלַי
  english_pob_choice: has said to me
  chosen_spanish: me ha dicho
  alternatives_spanish:
  - me dijo
  - ha hablado conmigo
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte con presente perfecto español para expresar una palabra divina previa con vigencia actual en el contexto del discurso.
- source_word: לֹא תַעֲבֹר
  english_pob_choice: You shall not cross
  chosen_spanish: No pasarás
  alternatives_spanish:
  - No cruzarás
  - No atravesarás
  lexicon: HALOT
  rationale: עָבַר con el Jordán significa cruzar/pasar de una margen a otra. 'Pasarás' es la opción más natural y bíblicamente transparente en español; mantiene el valor de prohibición divina.
- source_word: אֶת הַיַּרְדֵּן הַזֶּה
  english_pob_choice: this Jordan
  chosen_spanish: este Jordán
  alternatives_spanish:
  - este río Jordán
  - el Jordán
  lexicon: HALOT
  rationale: Se conserva el demostrativo deíctico hebreo y el nombre propio sin añadir 'río', que no está explícito en el texto.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo emplea el Tetragrámaton directamente. La norma del proyecto en español pide 'Yahvé' en el texto principal, preservando el nombre del pacto de forma auditable y evitando el reemplazo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Valor de לָצֵאת וְלָבוֹא
  english_pob_reading: go out and come in
  chosen_spanish_reading: salir ni entrar
  alternative_spanish_readings:
  - ir y venir
  - salir y entrar
  rationale: Se preserva el posible carácter idiomático de la fórmula sin reducirla a una sola esfera de sentido en el cuerpo principal. El español mantiene la forma proverbial y permite la lectura de incapacidad general o de liderazgo, según el contexto.
  doctrine_reference: Deuteronomy 31:2 discourse context
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no cambió la decisión principal; el texto español sigue la lectura auditada de alta concordancia y mantiene las mismas decisiones semánticas: edad idiomática, incapacidad para salir y entrar, nombre divino Yahvé y prohibición de cruzar el Jordán.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה conforme a la terminología española del proyecto.
  - Se mantiene 'pasar' para עָבַר por ser la forma más natural de 'cross' en español con el Jordán como objeto.
  - '''Salir ni entrar'' conserva la fórmula idiomática con negación y evita sobrerinterpretar el alcance.'
  - La puntuación de diálogo sigue una presentación bíblica moderna y legible en español.
