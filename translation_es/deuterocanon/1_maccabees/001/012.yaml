lexical_decisions:
- source_word: ἠγαύθη
  english_pob_choice: pleased
  chosen_spanish: les agradó
  alternatives_spanish:
  - les gustó
  - les pareció bien
  - fue de su agrado
  lexicon: LSJ
  rationale: El verbo griego indica una recepción favorable del asunto; en español, «les agradó» comunica esa aprobación de forma natural y sin forzar una pasiva poco idiomática.
- source_word: ὁ λόγος
  english_pob_choice: the proposal
  chosen_spanish: la propuesta
  alternatives_spanish:
  - la palabra
  - el asunto
  - el plan
  lexicon: LSJ
  rationale: En este contexto, λόγος no significa «palabra» aislada, sino la sugerencia o iniciativa presentada. «La propuesta» conserva el referente concreto y resulta claro en español.
- source_word: ἐν ὀφθαλμοῖς αὐτῶν
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a sus ojos
  - a su vista
  - en su parecer
  lexicon: LSJ
  rationale: La expresión griega es un modismo de evaluación («en sus ojos»). El español puede expresar directamente el resultado del modismo con «les agradó» sin perder el sentido de aprobación.
translation_notes:
  revision_awareness: La revisión inglesa reciente no modificó el sentido básico del versículo; se mantiene la equivalencia dinámica controlada con una nota literal que conserva el modismo griego subyacente.
  spanish_consistency_notes:
