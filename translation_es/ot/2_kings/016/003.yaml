    text: 'O: «ofreció a su hijo en el fuego»; el hebreo literalmente dice «hizo pasar a su hijo por el fuego», un modismo asociado con un rito pagano condenado.'
    reason: alternative_reading
  revision_rationale: Se reubica la nota al modismo que realmente explica, se ajusta su contenido para reflejar la alternativa documentada en el POB inglés, y se elimina una nota innecesaria sobre 'naciones'. El texto principal permanece sustancialmente igual porque ya era fiel al hebreo y a la terminología del proyecto.
