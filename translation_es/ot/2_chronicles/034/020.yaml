translation:
  language: es
  text: 'Entonces el rey mandó a Hilkías, a Ahicam hijo de Safán, a Abdón hijo de Mica[a], a Safán el escriba y a Asaías, siervo del rey, diciendo[b]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El Texto Masorético dice «Abdón hijo de Mica». El paralelo en 2 Reyes 22:12 tiene «Achbor hijo de Micaías».
    reason: textual_variant
  - marker: b
    text: O «Asaías, el oficial del rey». El hebreo literalmente dice «el siervo del rey», que puede designar un funcionario de la corte.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio la orden a
  lexicon: HALOT
  rationale: El hebreo expresa una orden real directa. En español, «mandó» conserva bien el tono autoritativo y suena natural en narrativa bíblica; «ordenó» también sería posible, pero «mandó» mantiene mejor la concisión del original.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Se trata del referente inmediato del contexto; «el rey» es la forma más clara y fiel al sustantivo definido hebreo.
- source_word: חִלְקִיָּהוּ
  english_pob_choice: Hilkiah
  chosen_spanish: Hilkías
  alternatives_spanish:
  - Hilkía
  lexicon: transliteración tradicional adaptada al español
  rationale: Se conserva el nombre propio en forma castellana habitual. La tilde refleja la acentuación natural en español y evita una grafía rígidamente inglesa.
- source_word: אֲחִיקָם בֶּן שָׁפָן
  english_pob_choice: Ahikam son of Shaphan
  chosen_spanish: Ahicam hijo de Safán
  alternatives_spanish:
  - Ahicam, hijo de Safán
  - Ajicam hijo de Safán
  lexicon: transliteración tradicional adaptada al español
  rationale: «Hijo de» reproduce de manera natural בן. Los nombres se adaptan a una ortografía española legible sin alterar la identificación genealógica.
- source_word: עַבְדּוֹן בֶּן מִיכָה
  english_pob_choice: Abdon son of Micah
  chosen_spanish: Abdón hijo de Mica
  alternatives_spanish:
  - Abdón, hijo de Mica
  - Abdón hijo de Miquea
  lexicon: transliteración tradicional adaptada al español
  rationale: Se sigue el texto masorético de Crónicas, como en el inglés POB. «Mica» conserva la forma breve del nombre hebreo; no se armoniza con 2 Reyes para no borrar la variante textual documentada.
- source_word: שָׁפָן הַסּוֹפֵר
  english_pob_choice: Shaphan the scribe
  chosen_spanish: Safán el escriba
  alternatives_spanish:
  - Safán el secretario
  lexicon: HALOT
  rationale: סֹפֵר puede significar «escriba» o «secretario». Se elige «escriba» porque preserva la forma léxica y la transparencia del término; «secretario» queda como alternativa contextual.
- source_word: עֲשָׂיָה עֶבֶד הַמֶּלֶךְ
  english_pob_choice: Asaiah the king’s servant
  chosen_spanish: Asaías, siervo del rey
  alternatives_spanish:
  - Asaías, servidor del rey
  - Asaías, oficial del rey
  lexicon: HALOT
  rationale: Aunque עֶבֶד literalmente es «siervo»/«esclavo», en contexto cortesano puede designar un funcionario de la corte. Se mantiene «siervo del rey» para preservar la tensión léxica que el POB inglés dejó abierta con su nota alternativa.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: Es la fórmula de introducción del discurso. «Diciendo» suena natural en español bíblico y señala que el contenido sigue en el versículo siguiente.
theological_decisions:
- issue: 'Título o cargo de Asaías: «siervo» frente a «oficial»'
  english_pob_reading: The Hebrew literally reads 'the king’s servant,' which can denote a court official.
  chosen_spanish_reading: «siervo del rey», con la posibilidad contextual de un cargo cortesano
  alternative_spanish_readings:
  - oficial del rey
  - funcionario del rey
  rationale: No se debe borrar la literalidad de עֶבֶד. A la vez, el contexto cortesano permite entender un cargo oficial. Por eso el texto principal conserva «siervo» y la alternativa queda preservada para lectura contextual.
  doctrine_reference: lexical/theological note on court office terminology; no doctrinal dispute
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de origen; la cruz de control indica alto acuerdo y ninguna modificación pendiente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí no aparece el tetragrámaton.
  - Se usa una transliteración española legible para los nombres propios, con acentuación natural cuando corresponde.
  - «Escriba» se conserva para סֹפֵר por fidelidad léxica, evitando sustituirlo por un término eclesiástico más interpretativo.
  - «Siervo del rey» preserva la tensión entre literalidad y posible cargo oficial, conforme a la nota auditada del inglés POB.
