revisions:
- from: Como guardianes de un campo[a], han estado contra ella en derredor, porque contra mí se ha rebelado, dice Yahvé.
  to: Como guardianes de un campo[a], están contra ella en derredor, porque contra mí se ha rebelado, declara Yahvé.
  rationale: Se corrige הָיוּ a presente («están») para preservar la vividez profética e inmediatez del cerco, conforme a la decisión auditada. Se ajusta «dice Yahvé» a «declara Yahvé» para reflejar mejor נְאֻם יְהוָה y mantener un tono profético más solemne, sin alterar el sentido. Se conservan la imagen, el referente femenino implícito y la nota léxica existente.
