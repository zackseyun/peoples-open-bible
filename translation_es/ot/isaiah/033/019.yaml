    rationale: En contexto, אֵין בִּינָה describe ausencia de inteligibilidad/comprensión respecto de la lengua o para el oyente. En español, «de lengua tartamuda, sin comprensión» puede leerse como una caracterización cognitiva del hablante. Una reformulación adjetival evita la ambigüedad.
  - severity: low
