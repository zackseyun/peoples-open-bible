translation:
  language: es
  text: 'Yo digo[a]: «Solo palabras de los labios: consejo y fuerza para la guerra». Ahora, ¿en quién has confiado, que te has rebelado contra mí?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Yo dije»; muchos entienden aquí el sentido como «Tú dices», y el paralelo de 2 Reyes 18:20 apoya esa lectura.'
    reason: alternative_reading
lexical_decisions:
- source_word: אָמַרְתִּי
  english_pob_choice: I say / You say
  chosen_spanish: Yo digo
  alternatives_spanish:
  - Yo dije
  - Tú dices
  lexicon: HALOT
  rationale: La forma hebrea es primera persona singular perfecta, pero el contexto del discurso y el testimonio paralelo de 2 Reyes 18:20 permiten entenderla de manera idiomática como introducción de la cita. En español, «Yo digo» conserva la forma de primera persona y deja visible la tensión textual; «Tú dices» sería una interpretación contextual posible, pero aquí no es la lectura principal.
- source_word: אַךְ
  english_pob_choice: but / only
  chosen_spanish: solo
  alternatives_spanish:
  - pero
  - solamente
  - ciertamente
  lexicon: HALOT
  rationale: El valor limitativo de la partícula se integra naturalmente en «solo» dentro de la frase siguiente. Así se conserva el matiz restrictivo sin añadir una conjunción adversativa que el hebreo no exige de manera explícita en este punto.
- source_word: דְּבַר שְׂפָתַיִם
  english_pob_choice: only words of the lips
  chosen_spanish: palabras de los labios
  alternatives_spanish:
  - meras palabras
  - palabras vacías
  - puro hablar de labios
  lexicon: HALOT
  rationale: La expresión hebrea es imagética y literal. «Palabras de los labios» mantiene la metáfora del habla externa; el valor despreciativo queda marcado por «solo». Evito una paráfrasis más interpretativa como «palabrería» para no borrar la imagen original.
- source_word: עֵצָה
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - plan
  - estrategia
  lexicon: HALOT
  rationale: «Consejo» es el equivalente directo y amplio en español. En contexto militar puede implicar estrategia, pero el término general conserva mejor el alcance léxico del hebreo.
- source_word: גְבוּרָה
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - valor
  - mampuesta
  lexicon: HALOT
  rationale: En este marco de guerra, גְבוּרָה alude a capacidad o vigor eficaz. «Fuerza» es claro y natural en español, y empareja bien con «consejo» sin perder el matiz de potencia para la acción.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for war
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para la batalla
  - para el combate
  - para la guerra y el combate
  lexicon: HALOT
  rationale: «Para la guerra» refleja de manera directa la frase preposicional y mantiene la amplitud del sustantivo hebreo, que no se restringe a un solo encuentro bélico.
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pues ahora
  - Y ahora
  lexicon: HALOT
  rationale: Marca el giro retórico hacia la acusación directa. «Ahora» es la señal discursiva más natural en español.
- source_word: עַל מִי בָטַחְתָּ
  english_pob_choice: in whom have you trusted
  chosen_spanish: ¿en quién has confiado?
  alternatives_spanish:
  - ¿en quién te has apoyado?
  - ¿sobre quién has confiado?
  lexicon: HALOT
  rationale: בטח con עַל expresa confianza o dependencia. «Confiado» es idiomático en español y conserva el sentido relacional de respaldo o apoyo.
- source_word: מָרַדְתָּ בִּי
  english_pob_choice: you have rebelled against me
  chosen_spanish: para que te hayas rebelado contra mí
  alternatives_spanish:
  - que te has rebelado contra mí
  - por haberte rebelado contra mí
  lexicon: HALOT
  rationale: '«Rebelado contra mí» reproduce el valor de מרד. La construcción final en forma de finalidad o resultado sigue el hebreo interrogativo con כִּי y sugiere la acusación causal: ¿cómo es posible que hayas actuado así?'
theological_decisions:
- issue: Tratamiento de la ambigüedad inicial de אָמַרְתִּי
  english_pob_reading: The English audit trail preserves the tension between 'I said/I say' and the contextual reading 'You say' in a footnote.
  chosen_spanish_reading: 'Mantener la primera persona: «Yo digo», con nota que reconoce la lectura alternativa contextual.'
  alternative_spanish_readings:
  - «Yo dije»
  - «Tú dices»
  rationale: La tarea pide no borrar tensiones léxicas o textuales documentadas. Dado que el hebreo presenta primera persona, la traducción base debe conservar esa forma; al mismo tiempo, la nota puede explicar la lectura contextual alternativa sin imponerla en el cuerpo principal.
  doctrine_reference: Translation philosophy §1 (primacía del original) y §3 (preservar tensiones genuinas)
translation_notes:
  revision_awareness: El expediente inglés fue revisado desde una lectura contextual inicial ('You say') a una lectura que preserva la forma hebrea ('I say'). La versión española sigue la revisión más reciente y conserva la ambigüedad histórica mediante nota, sin traducir mecánicamente desde la primera solución inglesa.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma habitual del Tetragrámaton cuando corresponda, pero en este versículo no aparece.
  - Se eligió «confiado» para בטח por ser el verbo español más natural en este contexto de dependencia política/militar.
  - Se mantiene un tono bíblico claro y moderno, evitando arcaísmos innecesarios.
  - La puntuación conserva la cita directa y el encadenamiento retórico del hebreo.
