id: MAT.14.33
reference: Matthew 14:33
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οἱ δὲ ἐν τῷ ⸀πλοίῳ προσεκύνησαν αὐτῷ λέγοντες· Ἀληθῶς θεοῦ υἱὸς εἶ.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/014/033.yaml
  text: 'Then those in the boat worshiped him[a], saying[b], “Truly you are the Son of God.”'
  footnotes:
  - marker: a
    text: Or “bowed down to him” / “paid homage to him.” The Greek verb can denote reverence expressed by kneeling or prostration; here the context supports “worshiped.”
    reason: lexical_alternative
  - marker: b
    text: Or “God’s Son.” The Greek phrase lacks the article before “God,” but in context it functions as a title rather than meaning merely “a son of God.”
    reason: alternative_reading
translation:
  language: ko
  text: '배 안에 있던 사람들이 예수님께 엎드려 경배하며 말했습니다. 「참으로 당신은 하나님의 아들이십니다.」'
  philosophy: optimal-equivalence
theological_decisions:
- issue: 14:33 제자들의 「하나님의 아들」 고백 — προσκύνησις의 신학적 무게
  chosen_reading: 「엎드려 경배하며 ... 참으로 당신은 하나님의 아들이십니다」
  alternative_readings:
  - 「엎드려 절하며」로 신체적 부복만 강조
  rationale: 본문은 14:22-32의 물 위 걷기 + 「나다」(ἐγώ εἰμι) 직후에 위치한다. 이 문맥에서 προσεκύνησαν는 8:2에서처럼 단순 부복으로 보기 어렵고, 「하나님의 아들」 고백과 함께 경배로 기능한다. 한국어 「엎드려 경배하며」로 두 의미층을 모두 보존한다.
  doctrine_reference: 'DOCTRINE.md: §5'
