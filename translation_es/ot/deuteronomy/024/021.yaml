review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura legal del hebreo: «Cuando» para כִּי, la recolección de uvas en una viña, la prohibición de una segunda pasada, y la tríada social final. Sin embargo, hay dos fallas importantes de precisión y una de nota: «no la rebusques después de ti» suena poco natural y algo opaco en español; conviene expresar con más claridad la idea de no hacer una segunda pasada. Además, la nota c contiene un anglicismo evidente («fatherless») y no cumple bien su función explicativa.'
  spanish_quality_summary: El texto es generalmente legible y digno, pero «no la rebusques después de ti» resulta torpe en español moderno. Una formulación como «no vuelvas a rebuscar detrás de ti» o similar comunica mejor la imagen agrícola de una segunda pasada. También hay un problema de colocación del marcador [a], que no debe quedar separado artificialmente del verbo. Las notas b y especialmente c necesitan mejora de estilo y naturalidad.
  glossary_alignment: No hay conflicto con las directrices principales del glosario. «Extranjero residente» es una opción válida para גֵּר, aunque algo más técnica que «forastero». «Huérfano» es aceptable si la nota conserva el matiz literal de «sin padre».
  issues:
  - severity: medium
    issue: La expresión «no la rebusques después de ti» es poco natural en español.
    rationale: Aunque intenta conservar אַחֲרֶיךָ, la frase no suena idiomática. El hebreo expresa no hacer una segunda pasada detrás de uno mismo; en español conviene formularlo de manera más clara.
  - severity: low
    issue: El marcador [a] está mal insertado en el texto.
    rationale: Debe anclarse directamente a la palabra o frase relevante, no interrumpir la sintaxis como «no [a] la rebusques».
  - severity: high
    issue: 'La nota c contiene un anglicismo inaceptable: «el padreless».'
    rationale: Esto no es español legible ni fiel. La nota debe explicar que el término hebreo es literalmente «sin padre» o «padre ausente/fatherless» sin mezclar inglés en la nota española.
  - severity: low
    issue: La nota b incluye «residente alien», expresión innecesariamente calcada del inglés.
    rationale: En español suena ajena y no mejora la comprensión. Basta con «extranjero residente» o «residente extranjero» como alternativas descriptivas.
