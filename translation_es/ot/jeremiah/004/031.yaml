translation:
  language: es
  text: 'Porque he oído un sonido[a] como de una mujer en trabajo de parto, angustia como de la que da a luz a su primer hijo[b]: el sonido de la Hija de Sion, jadeando, extendiendo sus manos: «¡Ay de mí, porque mi alma se desfallece ante homicidas[c]!».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «voz» o «clamor» para el repetido hebreo קול, que puede significar sonido, voz o ruido.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «como la que da a luz por primera vez»; la imagen intensifica el dolor del parto.'
    reason: cultural_note
  - marker: c
    text: O «mi vida se desfallece ante homicidas». נפש puede significar «alma», «ser» o «vida»; aquí se conserva «alma» según la revisión del POB inglés.
    reason: lexical_alternative
lexical_decisions:
- source_word: קול
  english_pob_choice: sound
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  - clamor
  lexicon: HALOT
  rationale: קול puede significar sonido, voz o clamor. En el paralelismo hebreo, la primera mención introduce una percepción auditiva; en español, «voz» permite conservar mejor la personificación y la repetición posterior sin sonar rígido. La nota conserva la alternativa de sentido.
- source_word: כְחוֹלָה
  english_pob_choice: like a woman in labor
  chosen_spanish: como de mujer en parto
  alternatives_spanish:
  - como una mujer de parto
  - como una mujer que está dando a luz
  lexicon: HALOT
  rationale: El contexto profético favorece el campo de dolor de parto, no una enfermedad genérica. «Mujer en parto» es natural en español y preserva la imagen de dolor intenso.
- source_word: צָרָה
  english_pob_choice: distress
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - tribulación
  lexicon: HALOT
  rationale: El sustantivo acompaña la imagen de parto y expresa la aflicción aguda del momento. «Angustia» comunica bien la intensidad emocional y corporal en español.
- source_word: כְמַבְכִּירָה
  english_pob_choice: like one giving birth to her first child
  chosen_spanish: como de la que da a luz a su primer hijo
  alternatives_spanish:
  - como de una primeriza en parto
  - como de la que pare por primera vez
  lexicon: HALOT
  rationale: La forma apunta al primer alumbramiento y al dolor intensificado que lo acompaña. La frase española conserva esa primera vez sin sobrecargar el registro.
- source_word: בַּת צִיּוֹן
  english_pob_choice: Daughter Zion
  chosen_spanish: la Hija de Sion
  alternatives_spanish:
  - la hija de Sion
  - Daughter Zion
  lexicon: HALOT
  rationale: La personificación profética se mantiene con una construcción transparente en español. «Hija de Sion» conserva el valor título-poético de la expresión.
- source_word: תִּתְיַפֵּחַ
  english_pob_choice: gasping for breath
  chosen_spanish: jadea
  alternatives_spanish:
  - respira con dificultad
  - agoniza
  lexicon: HALOT
  rationale: El verbo describe respiración entrecortada o jadeo. «Jadea» es breve, idiomático y suficientemente vívido para el lector español.
- source_word: תְּפָרֵשׂ כַּפֶּיהָ
  english_pob_choice: spreading out her hands
  chosen_spanish: extiende sus manos
  alternatives_spanish:
  - abre sus manos
  - tiende sus manos
  lexicon: HALOT
  rationale: El gesto es de suplicación o desesperación. «Extiende sus manos» conserva el hebraísmo visible sin perder naturalidad en español.
- source_word: אוֹי נָא לִי
  english_pob_choice: Woe is me
  chosen_spanish: ¡Ay de mí!
  alternatives_spanish:
  - ¡Ay de mí, por favor!
  - ¡Ay de mí! ¡Oh!
  lexicon: HALOT
  rationale: Es una exclamación de lamento; en español bíblico y moderno a la vez, «¡Ay de mí!» transmite bien la fuerza emotiva. No se fuerza un añadido a «nָא» porque el contexto ya conserva el tono urgente del lamento.
- source_word: עָיְפָה נַפְשִׁי
  english_pob_choice: my soul faints
  chosen_spanish: mi alma se desfallece
  alternatives_spanish:
  - mi alma se cansa
  - mi vida desfallece
  lexicon: HALOT
  rationale: Aquí נפש se mantiene como «alma» para respetar la decisión léxica del POB inglés y la tensión semántica del término. «Se desfallece» sigue de cerca el verbo de agotamiento y lamentación.
- source_word: לְהֹרְגִים
  english_pob_choice: before murderers
  chosen_spanish: ante homicidas
  alternatives_spanish:
  - ante asesinos
  - frente a homicidas
  lexicon: HALOT
  rationale: El participio nombra a quienes matan; «homicidas» preserva la fuerza lexical más directa que «asesinos» y suena sobrio en español bíblico. La preposición conserva la idea de estar en presencia de quienes matan.
theological_decisions:
- issue: Personificación de Sion
  english_pob_reading: Daughter Zion as a poetic personification of Jerusalem/Zion speaking in lament
  chosen_spanish_reading: La Hija de Sion como personificación poética de Jerusalén/Sion que lamenta en voz alta
  alternative_spanish_readings:
  - la hija de Sion
  - Sion personificada
  rationale: La traducción conserva la figura retórica sin allegorizarla. «Hija de Sion» permite que el lector perciba la voz poética de la ciudad/persona sufriente.
  doctrine_reference: Poética profética; cf. filosofía de traducción §1, §3
- issue: Sentido de נֶפֶשׁ en contexto mortal
  english_pob_reading: my soul faints
  chosen_spanish_reading: mi alma se desfallece
  alternative_spanish_readings:
  - mi vida desfallece
  - mi ser se desfallece
  rationale: El hebreo permite varias matizaciones; el POB inglés optó por «soul» tras su revisión. En español, «alma» conserva esa decisión auditada y mantiene la tensión sin imponer una antropología ajena al versículo.
  doctrine_reference: Antropología bíblica; traducción lexical auditada
- issue: Término para quienes matan
  english_pob_reading: murderers
  chosen_spanish_reading: homicidas
  alternative_spanish_readings:
  - asesinos
  - matadores
  rationale: El hebreo participial designa a quienes están matando o matarán; «homicidas» expresa la violencia con registro sobrio. Evita suavizar el peligro y mantiene la concreción del contexto.
  doctrine_reference: Lexema participial de הרג
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa que cambió «life is faint before killers» por «soul faints before murderers» para reflejar con más precisión nephesh, el valor del verbo y el participio hebreo. La versión española sigue esa decisión auditada con «mi alma se desfallece ante homicidas».
  spanish_consistency_notes:
  - Se usa «Sion» sin acento en forma bíblica estándar en español.
  - Se mantiene «Hija de Sion» como título poético, no como simple genitivo.
  - El orden y la puntuación conservan el paralelismo y la pausa del original.
  - No se añade verbo copulativo en la segunda cola para evitar inflar el hebreo.
