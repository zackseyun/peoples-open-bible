id: 2TI.4.8
reference: 2 Timothy 4:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: λοιπὸν ἀπόκειταί μοι ὁ τῆς δικαιοσύνης στέφανος, ὃν ἀποδώσει μοι ὁ κύριος ἐν ἐκείνῃ τῇ ἡμέρᾳ, ὁ δίκαιος κριτής, οὐ μόνον δὲ ἐμοὶ ἀλλὰ καὶ πᾶσιν τοῖς ἠγαπηκόσι τὴν ἐπιφάνειαν αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/004/008.yaml
  text: From now on the crown of righteousness is laid up for me, which the Lord, the righteous judge, will award to me on that day—and not only to me, but also to all who have loved his appearing.
translation:
  language: ko
  text: 이제는 의의 면류관이 나를 위하여 예비되어 있습니다. 그것은 의로우신 재판관이신 주께서 그 날[a]에 나에게 주실 것이며, 나에게만이 아니라 그분의 나타나심을 사모해 온 모든 이에게도 주실 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「그 날」은 신약에서 하나님의 최종 심판과 신원의 날을 가리키는 정형 표현이다. 1:12, 1:18과 호응한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ τῆς δικαιοσύνης στέφανος
  english_pob_choice: the crown of righteousness
  chosen_korean: 의의 면류관
  alternatives_korean:
  - 의로움의 면류관
  - 정의의 면류관
  lexicon: BDAG
  rationale: 한국 성서 전통의 「의의 면류관」을 보존한다. 2:5의 「면류관을 받지 못한다」(στεφανοῦται)와 어휘 통일. δικαιοσύνη는 「의」(글로사리 정형).
- source_word: ἀπόκειταί
  english_pob_choice: is laid up
  chosen_korean: 예비되어 있습니다
  alternatives_korean:
  - 간직되어 있습니다
  - 마련되어 있습니다
  lexicon: BDAG
  rationale: ἀπόκειμαι는 「따로 보관되어 있음」. 「예비되어 있다」가 한국 성서 전통의 자연스러운 표현이다.
- source_word: ὁ δίκαιος κριτής
  english_pob_choice: the righteous judge
  chosen_korean: 의로우신 재판관
  alternatives_korean:
  - 의로운 심판자
  - 공의로우신 심판자
  lexicon: BDAG
  rationale: κριτής는 「재판관·심판자」. 「재판관」이 본 절의 법정적 무게(의의 면류관을 수여하는 자)를 자연스럽게 담는다.
- source_word: τοῖς ἠγαπηκόσι τὴν ἐπιφάνειαν αὐτοῦ
  english_pob_choice: all who have loved his appearing
  chosen_korean: 그분의 나타나심을 사모해 온 모든 이
  alternatives_korean:
  - 그분의 나타나심을 사랑해 온 모든 자
  - 그분의 나타나심을 갈망해 온 모든 사람
  lexicon: BDAG
  rationale: 완료 분사 ἠγαπηκόσι의 「지속된 사랑」을 「사모해 온」으로 옮긴다. 한국어 「사모하다」는 단순한 「좋아함」을 넘어 그리스도의 다시 오심을 향한 갈망의 무게(1:4 ἐπιποθέω와 호응)를 담는다.
theological_decisions:
- issue: 4:8 임종 직전 권면의 절정 — 의의 면류관과 그리스도의 나타나심을 사모하는 자 모두
  chosen_reading: 나에게만이 아니라 그분의 나타나심을 사모해 온 모든 이에게도 주실 것입니다
  alternative_readings:
  - 나뿐 아니라 그분의 나타나심을 사랑한 모든 사람에게도 주실 것입니다
  rationale: 4:1-8 임종 직전 권면의 마지막 절. 4:1의 「그분의 나타나심과 그분의 나라를 두고」와 4:8의 「그분의 나타나심을 사모해 온」이 수미상관을 이룬다. ἐπιφάνεια를 「나타나심」으로 통일하여 두 절의 호응을 분명히 보존한다. 「나에게만이 아니라 ~ 모든 이에게도」의 확장 구조는 본 권면이 바울 개인의 결산을 넘어, 그리스도를 사모하며 살아가는 모든 신자에게 동일한 면류관의 약속이 있음을 천명한다. 한국어로도 「사모해 온」이라는 지속적 갈망의 어휘로 그 신학적 무게를 살린다.
  doctrine_reference: 'DOCTRINE.md: preserve theological force; north-star — true and powerful meaning'
