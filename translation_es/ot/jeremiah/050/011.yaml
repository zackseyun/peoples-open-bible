  text: כִּ֤י תשמחי כִּ֣י תעלזי שֹׁסֵ֖י נַחֲלָתִ֑/י כִּ֤י תפושי כְּ/עֶגְלָ֣ה דָשָׁ֔ה ו/תצהלי כָּ/אֲבִּרִֽים׃
