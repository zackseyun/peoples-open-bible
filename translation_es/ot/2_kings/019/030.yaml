    issue: Expresión «remanente sobreviviente» poco natural y redundante
    rationale: Aunque intenta reflejar tanto פְּלֵיטַת como הַנִּשְׁאָרָה, en español suena recargado. «El remanente que quedó» o «el remanente sobreviviente que quedó» no son equivalentes; la primera opción preserva mejor el motivo teológico con fluidez.
  - severity: low
    issue: La nota alternativa queda demasiado cercana a la redacción principal
    rationale: Si el texto principal adopta «que quedó», la nota puede conservar «que permanece» como alternativa léxica útil y distinta, en línea con el inglés auditado.
