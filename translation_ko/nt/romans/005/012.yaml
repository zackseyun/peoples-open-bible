id: ROM.5.12
reference: Romans 5:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Διὰ τοῦτο ὥσπερ δι’ ἑνὸς ἀνθρώπου ἡ ἁμαρτία εἰς τὸν κόσμον εἰσῆλθεν καὶ διὰ τῆς ἁμαρτίας ὁ θάνατος, καὶ οὕτως εἰς πάντας ἀνθρώπους ὁ θάνατος διῆλθεν ἐφ’ ᾧ πάντες ἥμαρτον—
base_translation:
  language: en
  yaml_path: translation/nt/romans/005/012.yaml
  text: Therefore[a], just as sin entered into the world through one man, and death through sin, so also death spread to all people, because all sinned—
  footnotes:
  - marker: a
    text: Or, more traditionally, 'in whom all sinned.'
    reason: alternative_reading
translation:
  language: ko
  text: 그러므로 한 사람을 통해 죄가 세상에 들어오고 또 죄를 통해 죽음이 들어온 것 같이[a], 그렇게 죽음이 모든 사람에게 퍼졌습니다. 모두가 죄를 지었기 때문입니다—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 더 전통적으로 「모두가 그 안에서 죄를 지었기 때문에」(ἐφ’ ᾧ를 「~안에서」로 읽는 해석)로 옮길 수 있다. 본문은 인과적 해석을 채택한다.
    reason: alternative_reading
lexical_decisions:
- source_word: δι’ ἑνὸς ἀνθρώπου
  english_pob_choice: through one man
  chosen_korean: 한 사람을 통해
  lexicon: BDAG
  rationale: 아담을 가리키는 대표성. 「한 사람」으로 보존하여 5:12-21 전체의 일대일 병행 구조 유지.
- source_word: ἁμαρτία
  english_pob_choice: sin
  chosen_korean: 죄
  lexicon: BDAG
  rationale: 바울이 의인화하는 「죄」를 보존.
- source_word: εἰς πάντας ἀνθρώπους
  english_pob_choice: to all people
  chosen_korean: 모든 사람에게
  lexicon: BDAG
  rationale: 포괄적 의미.
- source_word: ἐφ’ ᾧ
  english_pob_choice: because
  chosen_korean: ~기 때문입니다
  alternatives_korean:
  - 그 안에서
  - 그 결과로
  lexicon: BDAG
  rationale: 가장 자연스러운 인과적 의미를 채택하고, 전통적 대표/포함적 해석은 각주에 보존.
theological_decisions:
- issue: ἐφ’ ᾧ πάντες ἥμαρτον의 의미
  chosen_reading: '인과적: 「모두가 죄를 지었기 때문에」'
  alternative_readings:
  - '대표적/포함적: 「그(아담) 안에서 모두가 죄를 지었다」'
  - '결과적: 「모두가 죄를 짓게 되었다」'
  rationale: 헬라어 자체는 인과 해석을 가장 자연스럽게 지지하며, 본문이 명시적으로 말하는 바를 넘는 교리적 추론을 본문에 끌어들이지 않는다. 전통적 대표 해석은 각주에 보존한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension; do not import doctrinal claims'
- issue: 5:12-21 아담-메시아 유형론의 구조 보존
  chosen_reading: 「한 사람을 통해」 정형을 모든 절에서 보존
  alternative_readings:
  - 보다 자연스러운 한국어로 풀어쓰기
  rationale: 5:12-21은 ὥσπερ ... οὕτως의 평행 구조가 신학적 논증의 핵심이므로, 한국어에서도 「한 사람을 통해」, 「의/불의의 한 행위」 같은 정형구를 일관되게 유지한다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; consistency of key terms'
