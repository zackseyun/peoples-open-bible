base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/010/020.yaml
  text: Even in your thoughts[a], do not curse a king, and in your bedroom do not curse a rich man, for a bird of the heavens may carry the sound[c][b], and a winged creature may report the matter.
  footnotes:
