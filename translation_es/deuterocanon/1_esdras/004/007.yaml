review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: «el segundo», el honor de sentarse junto a Darío por causa de su sabiduría, y la designación como «pariente»/«kinsman» de Darío. Sin embargo, la colocación de las notas no sigue bien la lógica del audit trail inglés: la nota sobre el verbo καθιεῖται debe anclarse en la expresión de sentarse junto a Darío, y la nota sobre «kinsman» debe anclarse en «pariente de Darío», no al nombre Darío en la primera cláusula.'
  spanish_quality_summary: El español es claro, natural y de tono digno. «Se sentará junto a Darío» y «por causa de su sabiduría» son plenamente comprensibles. Hay un pequeño problema de legibilidad editorial por el anclaje incorrecto de notas; además, conviene ajustar la nota a para que no repita la lectura principal como alternativa.
  glossary_alignment: No hay términos del glosario doctrinal principal en juego. Las decisiones léxicas «el segundo», «se sentará junto a», «sabiduría», «pariente» y «será llamado» concuerdan razonablemente con el griego y con el POB inglés. «Pariente» es una buena solución española para συγγενής, con nota que preserve la posibilidad honorífica.
  issues:
  - severity: medium
    issue: Anclaje de notas intercambiado respecto del contenido
    rationale: La nota [a] explica καθιεῖται, pero en el borrador está anclada a «Darío»; la nota [b] explica «pariente», y debe anclarse donde aparece esa palabra/expresión. Esto afecta la fidelidad editorial al audit trail y la claridad para el lector.
  - severity: low
    issue: La nota [a] repite la lectura principal como alternativa
    rationale: 'Dice «O: “será sentado junto a” o “se sentará junto a”», pero «se sentará junto a» ya es la traducción principal. Es mejor conservar alternativas reales: «será sentado» o «tomará asiento», manteniendo la explicación del matiz cortesano.'
  revised_spanish_text: Y el segundo se sentará junto a Darío[a], por causa de su sabiduría, y será llamado pariente de Darío[b].
  revised_footnotes:
  - marker: a
    text: 'O: «será sentado junto a» o «tomará asiento» con Darío; el verbo griego se refiere principalmente a ser sentado o a tomar asiento, y el matiz exacto de rango o cercanía se infiere del contexto real.'
    reason: lexical_alternative
  - marker: b
    text: «Pariente» puede designar un familiar, o bien un apelativo honorífico de cercanía y asociación con Darío.
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción principal porque es fiel y natural, pero se corrige el uso editorial de las notas para que correspondan a las palabras que explican, y se pule la nota verbal para reflejar mejor las alternativas del griego sin duplicar la lectura principal.
