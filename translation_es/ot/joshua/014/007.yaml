translation:
  language: es
  text: Yo tenía cuarenta años cuando Moisés, el siervo de Yahvé, me envió desde Cades-barnea para reconocer la tierra; y le llevé respuesta según mi corazón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y le llevé respuesta según lo que estaba en mi corazón»; también: «y le traje palabra conforme a mi corazón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אַרְבָּעִ֨ים שָׁנָ֜ה
  english_pob_choice: forty years old
  chosen_spanish: tenía cuarenta años
  alternatives_spanish:
  - era de cuarenta años
  - a los cuarenta años
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático de edad; en español natural se expresa como edad cumplida. 'Tenía cuarenta años' es claro y fiel sin calcar la estructura literal.
- source_word: בִּשְׁלֹחַ
  english_pob_choice: when Moses sent me
  chosen_spanish: cuando Moisés me envió
  alternatives_spanish:
  - al enviarme Moisés
  - cuando Moisés estaba enviándome
  lexicon: HALOT
  rationale: El infinitivo constructo con ב marca circunstancia temporal. 'Cuando Moisés me envió' refleja bien el valor temporal y suena natural en español.
- source_word: עֶבֶד יְהוָה
  english_pob_choice: the servant of Yahweh
  chosen_spanish: el esclavo de Yahvé
  alternatives_spanish:
  - el siervo de Yahvé
  - el servidor de Yahvé
  lexicon: HALOT
  rationale: Se preserva la fuerza léxica de עֶבֶד con 'esclavo', coherente con la elección documental de la POB cuando el término tiene carga lexical fuerte. Se evita suavizarlo a 'siervo' sin una razón contextual específica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino. 'Yahvé' mantiene la transparencia del Tetragrámaton sin la convención de ocultarlo bajo 'SEÑOR'.
- source_word: מִקָּדֵשׁ בַּרְנֵעַ
  english_pob_choice: from Kadesh-barnea
  chosen_spanish: desde Cades-barnea
  alternatives_spanish:
  - desde Kades-barnea
  - de Cades-barnea
  lexicon: HALOT
  rationale: Topónimo transliterado al uso español bíblico común. 'Desde' expresa mejor el punto de partida que el simple 'de' en este contexto.
- source_word: לְרַגֵּל
  english_pob_choice: to spy out
  chosen_spanish: para reconocer
  alternatives_spanish:
  - para espiar
  - para explorar
  lexicon: HALOT
  rationale: El verbo implica una misión de reconocimiento con intención investigativa. 'Reconocer' preserva la función narrativa sin introducir en español una connotación de espionaje secreto más fuerte que el contexto.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: En español bíblico 'la tierra' comunica de forma natural el territorio objeto de reconocimiento. 'La tierra prometida' sería explicativa y más interpretativa que el hebreo aquí.
- source_word: וָאָשֵׁב אֹתוֹ דָּבָר
  english_pob_choice: I brought him back word
  chosen_spanish: le devolví palabra
  alternatives_spanish:
  - le traje respuesta
  - le llevé informe
  lexicon: HALOT
  rationale: Se conserva el singular de דָּבָר con 'palabra', como en la revisión inglesa más reciente que prefirió 'word' frente a 'report'. 'Le devolví palabra' mantiene la relación verbal y la brevedad idiomática.
- source_word: כַּאֲשֶׁר עִם לְבָבִי
  english_pob_choice: according to my heart
  chosen_spanish: según mi corazón
  alternatives_spanish:
  - conforme a mi corazón
  - según lo que tenía en mi corazón
  - conforme a lo que pensaba
  lexicon: HALOT
  rationale: La imagen hebrea del corazón como centro de intención y evaluación se mantiene en español con 'mi corazón'. 'Según' reproduce adecuadamente la correspondencia señalada por el hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה en discurso directo de Caleb sobre Moisés
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La referencia directa al nombre pactal de Dios debe mantenerse visible en español. No se adopta la sustitución litúrgica 'SEÑOR' porque el proyecto exige transparencia con el Tetragrámaton y el contexto no aporta una razón para ocultarlo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: עֶבֶד aplicado a Moisés
  english_pob_reading: the servant of Yahweh
  chosen_spanish_reading: el esclavo de Yahvé
  alternative_spanish_readings:
  - el siervo de Yahvé
  - el servidor de Yahvé
  rationale: Aunque 'siervo' es tradicional en español religioso, aquí el término hebreo conserva valor lexical concreto y honorífico a la vez. La POB documenta 'slave' cuando la fuerza léxica importa; por eso se mantiene 'esclavo' para no borrar esa tensión.
  doctrine_reference: DOCTRINE.md Lexical force of עבד in covenant/title contexts
- issue: דָּבָר como 'word' singular frente a 'report'
  english_pob_reading: word
  chosen_spanish_reading: palabra
  alternative_spanish_readings:
  - respuesta
  - informe
  - reporte
  rationale: La revisión inglesa corrigió 'report' a 'word' para reflejar mejor el singular hebreo. En español, 'palabra' conserva esa singularidad y evita introducir un tecnicismo no exigido por el texto.
  doctrine_reference: POB revision_awareness for Joshua 14:7
translation_notes:
  revision_awareness: La redacción española toma en cuenta la revisión inglesa más reciente que prefirió 'word' frente a 'report' para דָּבָר. Por eso se eligió 'palabra' en lugar de un término más interpretativo como 'informe' o 'reporte', manteniendo la brevedad y la singularidad del hebreo. También se respetó la decisión estable del audit trail para el nombre divino y para el valor idiomático de la edad y del envío temporal.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de forma consistente con el estándar del proyecto para יְהוָה.
  - '''Esclavo'' se usó deliberadamente para עֶבֶד a fin de preservar la fuerza léxica, evitando suavizarlo a ''siervo''.'
  - '''Reconocer'' se prefirió a ''espiar'' para conservar el sentido narrativo sin sobredeterminación negativa.'
  - La nota al pie ofrece la alternativa semántica de la última cláusula sin duplicar el matiz principal del texto.
