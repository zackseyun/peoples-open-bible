translation:
  language: es
  text: Ahora Jeroboam hijo de Nabat, un efraimita[a] de Zeredá—su madre se llamaba Zerúa, una viuda[b]—era siervo de Salomón, y levantó su mano contra el rey[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un efrateo», aunque aquí el sentido más probable es «un efraimita».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «una mujer, viuda»; el español normaliza la apposición en «una viuda».'
    reason: lexical_alternative
  - marker: c
    text: 'O «se rebeló contra el rey». Hebreo: «levantó su mano contra el rey».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפְרָתִי
  english_pob_choice: an Ephraimite
  chosen_spanish: un efraimita
  alternatives_spanish:
  - un efrateo
  lexicon: HALOT
  rationale: En este contexto de Reyes, la referencia más probable es a afiliación con Efraín, no a Efrata/Belén. Por eso se prefiere «efraimita», manteniendo una alternativa posible en nota para la lectura menos probable pero lexicalmente disponible.
- source_word: הַצְּרֵדָה
  english_pob_choice: Zeredah
  chosen_spanish: Zeredá
  alternatives_spanish:
  - Zereda
  lexicon: HALOT
  rationale: Es un topónimo propio, por lo que se translitera. Se usa la forma española habitual con tilde final para ajustarse a la pronunciación en español sin alterar la identificación del lugar.
- source_word: צְרוּעָה
  english_pob_choice: Zeruah
  chosen_spanish: Zerúa
  alternatives_spanish:
  - Zeruá
  lexicon: HALOT
  rationale: Nombre personal transliterado. Se conserva la forma breve y reconocible en español, con acento para lectura natural.
- source_word: אִשָּׁה אַלְמָנָה
  english_pob_choice: a widow
  chosen_spanish: una viuda
  alternatives_spanish:
  - una mujer viuda
  - una viuda mujer
  lexicon: HALOT
  rationale: El hebreo presenta la apposición «mujer, viuda». El inglés POB resolvió la naturalidad sintáctica conservando el sentido; en español, «viuda» comunica plenamente el valor semántico y evita una redundancia poco idiomática, mientras la decisión se documenta para no borrar la estructura hebrea.
- source_word: עֶבֶד
  english_pob_choice: a servant
  chosen_spanish: siervo
  alternatives_spanish:
  - esclavo
  - servidor
  lexicon: HALOT
  rationale: Aquí el contexto es de servicio cortesano bajo Salomón. «Siervo» mantiene el vínculo de subordinación sin imponer la fuerza de «esclavo», que podría sugerir una condición social más específica de la que la frase inmediata exige.
- source_word: וַיָּרֶם יָד בַּמֶּלֶךְ
  english_pob_choice: he raised his hand against the king
  chosen_spanish: levantó su mano contra el rey
  alternatives_spanish:
  - se rebeló contra el rey
  - alzò su mano contra el rey
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de manera transparente. «Levantó su mano contra el rey» refleja el gesto hostil sin decidir de antemano entre agresión puntual y rebelión abierta, que el hebreo puede abarcar.
- source_word: וְ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: HALOT
  rationale: Al inicio de una nueva unidad narrativa, el waw consecutivo puede expresar transición. «Ahora» funciona en español como marcador narrativo natural sin perder el valor de enlace.
theological_decisions:
- issue: Sentido de עֶבֶד en relación con Salomón
  english_pob_reading: a servant of Solomon
  chosen_spanish_reading: siervo de Salomón
  alternative_spanish_readings:
  - esclavo de Salomón
  - oficial de Salomón
  rationale: El texto presenta la relación de subordinación de Jeroboam bajo Salomón, sin especificar aquí una condición servil extrema ni un cargo administrativo formal. «Siervo» conserva la dependencia y deja abierta la tensión histórica que el pasaje desarrollará después.
  doctrine_reference: Narrative context of royal service in 1 Kings 11; lexical force of עֶבֶד
- issue: Alcance de וַיָּרֶם יָד בַּמֶּלֶךְ
  english_pob_reading: he raised his hand against the king
  chosen_spanish_reading: levantó su mano contra el rey
  alternative_spanish_readings:
  - se rebeló contra el rey
  - alzò su mano contra el rey
  rationale: La frase hebrea es idiomática y puede implicar rebelión, pero también preserva la imagen concreta de una acción hostil. La traducción elegida mantiene la metáfora y evita cerrar prematuramente la interpretación histórica.
  doctrine_reference: Hebrew idiom in historical narrative; lexical idiom HALOT
- issue: 'אֶפְרָתִי: afiliación tribal o gentilicio local'
  english_pob_reading: an Ephraimite
  chosen_spanish_reading: un efraimita
  alternative_spanish_readings:
  - un efrateo
  rationale: En Reyes, el sentido más probable es tribal. Mantener «efraimita» sigue el juicio del audit trail inglés y evita confundir al lector con una referencia a Efrata/Belén, menos probable en este contexto.
  doctrine_reference: Historical-geographical identification in 1 Kings 11:26
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente que simplificó «a widow woman» a «a widow» por naturalidad sin cambiar el contenido; la presente versión española sigue esa misma decisión de naturalidad semántica, conservando la apposición hebrea en la documentación pero usando una forma idiomática en el texto principal. También se mantiene la elección estable de «raised his hand against the king» como traducción metafórica, no interpretativa, conforme al análisis lexical del POB.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - 'Se usa transliteración coherente para nombres propios: Jeroboam, Nabat, Zeredá, Zerúa.'
  - Se prefiere «siervo» aquí por contexto cortesano; no se usa «esclavo» porque el verso no enfatiza esa carga social.
  - La metáfora de la mano se conserva en el texto principal para no perder el idiomático hebreo.
  - La puntuación con raya larga separa las incisas de manera natural en español y refleja bien la estructura del hebreo.
