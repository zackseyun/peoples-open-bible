base_translation:
  language: en
  yaml_path: translation/ot/song_of_songs/008/002.yaml
  text: I would lead you and bring you into my mother’s house[a], where she taught me; I would give you spiced wine to drink[b], from the juice of my pomegranate.
  footnotes:
  - marker: a
    text: Or, 'you would teach me.' The Hebrew verb 'teach me' is third feminine singular, which most naturally refers to 'my mother,' but the terse poetic syntax has led some to connect it differently.
    reason: alternative_reading
  - marker: b
    text: Or, 'from the sweet wine of my pomegranate.' The Hebrew term can refer to fresh juice or sweet wine/must.
    reason: lexical_alternative
