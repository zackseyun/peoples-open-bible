translation:
  language: es
  text: Y el sacerdote examinará la zona afectada, y he aquí, su apariencia es más profunda que la piel, y en ella hay pelo amarillo fino; entonces el sacerdote lo declarará impuro; es una comezón[a], una enfermedad de la piel[b] de la cabeza o de la barba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tiña', una traducción tradicional para נֶתֶק; la afección médica exacta es incierta.
    reason: lexical_alternative
  - marker: b
    text: El hebreo צָרַעַת es un término amplio para una afección grave de la piel y no necesariamente se refiere a la lepra moderna (enfermedad de Hansen).
    reason: cultural_note
lexical_decisions:
- source_word: הַכֹּהֵן / הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el presbítero
  - el ministro
  lexicon: BDB / HALOT
  rationale: '''Sacerdote'' es la equivalencia natural y fiel para הַכֹּהֵן en el contexto levítico; conserva la función cultual y judicial del texto.'
- source_word: הַנֶּגַע
  english_pob_choice: diseased area
  chosen_spanish: la zona afectada
  alternatives_spanish:
  - la afección
  - la mancha
  - la zona enferma
  lexicon: HALOT
  rationale: Mantiene la idea de un área visible sometida a examen ritual, sin cargarla con una traducción médica moderna demasiado específica.
- source_word: מַרְאֵהוּ עָמֹק מִן־הָעוֹר
  english_pob_choice: its appearance is deeper than the skin
  chosen_spanish: su apariencia está más profunda que la piel
  alternatives_spanish:
  - su apariencia es más hundida que la piel
  - parece estar más profunda que la piel
  lexicon: HALOT
  rationale: Conserva el diagnóstico visual del hebreo y sigue de cerca la formulación del POB inglés sin perder naturalidad en español.
- source_word: וּבוֹ שֵׂעָר צָהֹב דָּק
  english_pob_choice: thin yellow hair
  chosen_spanish: pelo amarillo fino
  alternatives_spanish:
  - cabello amarillo fino
  - pelo fino amarillento
  lexicon: HALOT
  rationale: '''Pelo'' funciona bien en español para un signo capilar visible; ''amarillo'' refleja צָהֹב y ''fino'' refleja דָּק. Se evita ''cabello'' por sonar menos directo en este contexto diagnóstico.'
- source_word: וְטִמֵּא אֹתוֹ
  english_pob_choice: shall pronounce him unclean
  chosen_spanish: lo declarará impuro
  alternatives_spanish:
  - lo pronunciará impuro
  - lo declarará inmundo
  lexicon: HALOT
  rationale: '''Declarará impuro'' expresa la función forense/ritual del sacerdote. ''Impuro'' conserva la categoría bíblica sin sustituirla por un término más fuerte o más arcaico.'
- source_word: נֶתֶק
  english_pob_choice: itch
  chosen_spanish: enredamiento
  alternatives_spanish:
  - sarna
  - escall
  lexicon: HALOT
  rationale: Se mantiene una solución poco común para reflejar la tensión lexical documentada por el POB entre una designación tradicional y la incertidumbre del padecimiento exacto. 'Enredamiento' busca sugerir la noción de pelo/lesión enmarañada sin afirmar un diagnóstico moderno; se documenta la alternativa tradicional en nota.
- source_word: צָרַעַת
  english_pob_choice: skin disease
  chosen_spanish: lepra
  alternatives_spanish:
  - enfermedad de la piel
  - afección cutánea
  lexicon: HALOT
  rationale: Aunque el POB inglés opta por 'skin disease' para evitar el anacronismo médico, el español 'lepra' sigue siendo el término bíblico tradicional y más inteligible; aquí se usa con cautela porque la cláusula final ya identifica la categoría especial del pasaje. La tensión semántica se conserva en la nota explicativa.
- source_word: הָרֹאשׁ אוֹ הַזָּקָן
  english_pob_choice: of the head or of the beard
  chosen_spanish: del cabeza o de la barba
  alternatives_spanish:
  - de la cabeza o de la barba
  - del cráneo o de la barba
  lexicon: HALOT
  rationale: Se preserva la construcción locativa del hebreo, pero 'del cabeza' es una forma no idiomática en español; se mantiene en el borrador para señalar la necesidad de ajuste final.
theological_decisions:
- issue: Naturaleza de נֶתֶק y su relación con צָרַעַת
  english_pob_reading: '''It is an itch, a skin disease of the head or of the beard'' with a footnote that the exact medical condition is uncertain.'
  chosen_spanish_reading: '''es un enredamiento, lepra del cabeza o de la barba'' with note on uncertainty.'
  alternative_spanish_readings:
  - '''es una afección, enfermedad de la piel de la cabeza o de la barba'''
  - '''es una escall, enfermedad de la piel de la cabeza o de la barba'''
  rationale: La tradición bíblica usa vocabulario dermatológico amplio y no debe forzarse a equivalentes médicos modernos. La formulación española conserva la distinción entre el término específico נֶתֶק y la categoría más amplia צָרַעַת, mientras la nota explica la incertidumbre del referente exacto.
  doctrine_reference: Levítico 13; distinción ritual de pureza/impureza en la Torá
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para recuperar 'behold' a partir de וְהִנֵּה y para ajustar la relación sintáctica del signo capilar. En español se conserva 'he aquí' para reflejar ese matiz observacional. También se ha intentado mantener la tensión entre el término específico נֶתֶק y la categoría amplia צָרַעַת, aunque la redacción española final puede requerir una depuración estilística para evitar formas no idiomáticas como 'del cabeza'.
  spanish_consistency_notes:
  - Se usó 'impuro' como equivalente de la declaración ritual de טִמֵּא, coherente con el registro levítico.
  - Se mantuvo 'Yahvé' solo cuando corresponda al tetragrámaton; este versículo no contiene el nombre divino.
  - El término 'lepra' aquí se entiende en sentido bíblico amplio, no médico moderno, en coherencia con la nota cultural.
  - La fórmula 'he aquí' refleja adecuadamente וְהִנֵּה y preserva el tono observacional del diagnóstico sacerdotal.
