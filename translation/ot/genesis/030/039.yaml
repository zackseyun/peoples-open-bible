id: GEN.30.39
reference: Genesis 30:39
source:
  edition: WLC
  text: וַ/יֶּחֱמ֥וּ הַ/צֹּ֖אן אֶל הַ/מַּקְל֑וֹת וַ/תֵּלַ֣דְןָ הַ/צֹּ֔אן עֲקֻדִּ֥ים נְקֻדִּ֖ים וּ/טְלֻאִֽים־׃
translation:
  text: So the flock mated by the rods[a], and the flock bore striped, speckled[b], and spotted young.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'banded' for 'striped' (עֲקֻדִּים); traditional translations often have 'ring-streaked.'
    reason: lexical_alternative
  - marker: b
    text: The distinction between 'speckled' (נְקֻדִּים) and 'spotted' (טְלֻאִים) is approximate; the latter may also be rendered 'patchy,' 'blotched,' or 'mottled.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּחֱמוּ
  chosen: mated
  alternatives:
  - grew hot
  - conceived
  lexicon: HALOT
  rationale: The verb from יחם literally relates to becoming heated, but in animal-breeding contexts it idiomatically refers to coming into heat and mating/conceiving. 'Mated' communicates the reproductive action clearly in modern English without over-literal awkwardness.
- source_word: הַצֹּאן
  chosen: the flock
  alternatives:
  - the sheep/goats
  - the small livestock
  lexicon: HALOT
  rationale: צאן is a collective noun for small livestock, especially sheep and goats. 'The flock' preserves the collective sense and reads naturally in English; repeating it in both clauses reflects the Hebrew repetition.
- source_word: אֶל הַמַּקְלוֹת
  chosen: in front of the rods
  alternatives:
  - toward the rods
  - at the rods
  lexicon: HALOT
  rationale: אֶל can mean 'to/toward,' but here in the visual-breeding setup of the surrounding context, 'in front of the rods' best captures the situational sense without overinterpreting.
- source_word: וַתֵּלַדְןָ
  chosen: bore ... young
  alternatives:
  - gave birth to
  - produced
  lexicon: HALOT
  rationale: ילד means 'to bear/give birth.' Because the Hebrew immediately follows with adjectival descriptions rather than an explicit noun for offspring, English benefits from supplying 'young' for clarity. 'Bore ... young' is concise and natural.
- source_word: עֲקֻדִּים
  chosen: striped
  alternatives:
  - banded
  - ring-streaked
  lexicon: HALOT
  rationale: The adjective denotes animals marked with bands or stripes. 'Striped' is the clearest modern English equivalent; 'ring-streaked' is more traditional but less natural.
- source_word: נְקֻדִּים
  chosen: speckled
  alternatives:
  - spotted
  - dotted
  lexicon: HALOT
  rationale: This term refers to small spots or speckles. 'Speckled' distinguishes it from the following term and preserves the nuance of finer markings.
- source_word: וּטְלֻאִים
  chosen: spotted
  alternatives:
  - patchy
  - blotched
  - mottled
  lexicon: HALOT
  rationale: This adjective refers to patchy or blotched markings. 'Spotted' is a natural English rendering and works well in contrast with 'speckled,' though the distinction is not exact; the lexical alternative is preserved in a footnote.
