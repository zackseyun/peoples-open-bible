  text: לָ/כֵ֣ן יִתְּנֵ֔/ם עַד עֵ֥ת יוֹלֵדָ֖ה יָלָ֑דָה וְ/יֶ֣תֶר אֶחָ֔י/ו יְשׁוּב֖וּ/ן עַל בְּנֵ֥י יִשְׂרָאֵֽל־־׃
base_translation:
  language: en
  yaml_path: translation/ot/micah/005/002.yaml
  text: Therefore he will give them up until the time when she who is in labor has given birth[c][b][a]; then the rest of his brothers will return to the sons of Israel.
  footnotes:
  - marker: a
    text: Or 'he will hand them over' or 'he will abandon them.'
    reason: lexical_alternative
  - marker: b
    text: '''She who is in labor'' is not explicitly identified in the Hebrew; interpreters variously understand her as Zion/Judah personified, the mother of the promised ruler, or another figure.'
    reason: alternative_reading
  - marker: c
    text: Or 'the children of Israel.' The Hebrew is literally 'the sons of Israel.'
    reason: lexical_alternative
