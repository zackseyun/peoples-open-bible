translation:
  language: es
  text: Si él pasa y encierra a alguien[a], y convoca una asamblea[b], ¿quién podrá hacerlo volver atrás?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿quién podrá revertirlo?». El hebreo puede entenderse tanto como volver atrás al sujeto actuante («él») como revertir de manera más general la acción.'
    reason: alternative_reading
  - marker: b
    text: «Convoca una asamblea» también puede traducirse «reúne» o «congrega», quizá con un matiz judicial.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La partícula introduce una condición o hipótesis retórica. «Si» conserva mejor ese valor en español y evita fijar el matiz temporal de «cuando».
- source_word: יַחֲלֹף
  english_pob_choice: he passes by
  chosen_spanish: él pasa
  alternatives_spanish:
  - él pasa por
  - él pasa de largo
  - él atraviesa
  lexicon: HALOT
  rationale: El verbo expresa la idea de pasar o ir de largo. «Pasa» es natural en español y mantiene la imagen del movimiento sin sobreinterpretar un matiz de destrucción.
- source_word: וְיַסְגִּיר
  english_pob_choice: and shuts someone in
  chosen_spanish: y encierra a alguien
  alternatives_spanish:
  - y mete en prisión a alguien
  - y entrega a alguien
  - y cierra a alguien dentro
  lexicon: HALOT
  rationale: El hifil de סגר puede significar encerrar, entregar o poner bajo custodia. «Encierra» conserva la imagen concreta y permite que el complemento indefinido quede tan implícito como en hebreo.
- source_word: וְיַקְהִיל
  english_pob_choice: and calls an assembly
  chosen_spanish: y convoca una asamblea
  alternatives_spanish:
  - y reúne
  - y junta
  - y congrega
  lexicon: HALOT
  rationale: 'El hifil de קהל es causativo: reunir/convocar. «Convoca una asamblea» refleja bien ese matiz y puede incluir la posible resonancia judicial señalada en el audit trail.'
- source_word: וּמִי
  english_pob_choice: then who
  chosen_spanish: ¿quién podrá...?
  alternatives_spanish:
  - ¿y quién...?
  - entonces ¿quién...?
  lexicon: HALOT
  rationale: La combinación funciona como pregunta retórica de consecuencia. En español, «¿quién podrá...?» comunica de forma natural la fuerza lógica del hebreo sin perder la interrogación retórica.
- source_word: יְשִׁיבֶנּוּ
  english_pob_choice: can turn him back
  chosen_spanish: hacerlo volver
  alternatives_spanish:
  - devolverlo
  - volverlo atrás
  - revertirlo
  lexicon: HALOT
  rationale: El hifil de שוב significa hacer volver o hacer regresar. «Hacerlo volver» preserva la ambigüedad relevante entre volver a la persona o revertir su acción, y evita resolver en exceso el referente del sufijo.
theological_decisions:
- issue: Referente del sufijo masculino singular final
  english_pob_reading: The final suffix is rendered personally as 'him,' though 'it' (his action) is possible and preserved in a footnote.
  chosen_spanish_reading: 'El verbo final se traduce de modo personal: «hacerlo volver», aunque también puede entenderse más ampliamente como revertir lo que él hace.'
  alternative_spanish_readings:
  - ¿quién podrá revertirlo?
  - ¿quién podrá revertir lo que hace?
  rationale: 'El contexto inmediato habla de la acción soberana de Dios; por eso una lectura personal es fiel y fluida en español. A la vez, la ambigüedad del hebreo no se elimina: la alternativa más abstracta queda sugerida en la nota.'
  doctrine_reference: Preservar la tensión teológica sin resolverla; soberanía divina en el discurso de Job 11
- issue: Matiz judicial de «convoca una asamblea»
  english_pob_reading: '''Calls an assembly'' may also be rendered ''gathers'' or ''convenes,'' possibly with a judicial nuance.'
  chosen_spanish_reading: «Convoca una asamblea» mantiene abierta la posibilidad de una escena pública o judicial sin introducirla dogmáticamente.
  alternative_spanish_readings:
  - reúne
  - congrega
  - convoca
  rationale: El hebreo permite una acción de reunir/convocar con posible trasfondo jurídico. La formulación elegida conserva esa amplitud y no fuerza un contexto legal cerrado.
  doctrine_reference: No fijar un matiz secundario que el texto no obliga a decidir
translation_notes:
  revision_awareness: La revisión más reciente del expediente indica alta concordancia y sin cambios necesarios; por ello se mantiene la lectura óptima ya auditada, sin introducir innovaciones no atestiguadas por el source packet ni por el trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Dios» y no se introduce ningún título sustitutivo, porque el versículo no contiene el tetragrámaton ni un término que exija máscara reverencial.
  - Se evita «Cristo» y cualquier terminología cristológica ajena al versículo.
  - «Encierra» conserva el objeto implícito del hebreo; «a alguien» hace natural en español lo que el texto subentiende.
  - La pregunta retórica se expresa con futuro perifrástico/poder («podrá») para reproducir la fuerza de imposibilidad del hebreo.
  - La nota [a] preserva la ambigüedad entre una referencia personal y una más abstracta, tal como lo permite el texto fuente.
