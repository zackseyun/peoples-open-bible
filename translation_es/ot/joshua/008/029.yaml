translation:
  language: es
  text: Y colgó[a] al rey de Hai en un árbol hasta la tarde. Y al ponerse el sol, Josué mandó que bajaran su cadáver del árbol, lo echaran a la entrada de la puerta de la ciudad, y levantaran sobre él un gran montón de piedras, que permanece hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ahorcó’; el verbo hebreo significa ‘colgar/suspender’.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּלָה
  english_pob_choice: hanged
  chosen_spanish: hizo colgar
  alternatives_spanish:
  - colgó
  - ahorcó
  lexicon: HALOT
  rationale: El verbo hebreo significa ‘colgar/suspender’. En español, ‘hizo colgar’ conserva la acción sin forzar un verbo penal específico como ‘ahorcó’, que sería más interpretativo. ‘Colgó’ también es posible, pero la construcción causativa refleja mejor el sujeto implícito del contexto narrativo.
- source_word: הָעֵץ
  english_pob_choice: the tree
  chosen_spanish: un árbol
  alternatives_spanish:
  - el árbol
  - un madero
  - una estaca
  lexicon: HALOT
  rationale: עֵץ puede significar ‘árbol’ o ‘madera’. En este contexto de ejecución, el español más natural y fiel al texto base es ‘un árbol’. ‘Madero’ o ‘estaca’ introducen una especificación que el hebreo no exige.
- source_word: עַד עֵת הָעָרֶב
  english_pob_choice: until evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta la noche
  - hasta el anochecer
  - hasta la hora de la tarde
  lexicon: HALOT
  rationale: La construcción hebrea es temporal y mantiene el sentido de permanencia hasta una hora del día. ‘Hasta la tarde’ conserva bien la referencia sin volverla pesada. ‘Hasta el anochecer’ también sería viable, pero desplaza un poco el matiz de ‘tarde’.
- source_word: וּכְבֹא הַשֶּׁמֶשׁ
  english_pob_choice: at sunset
  chosen_spanish: al ponerse el sol
  alternatives_spanish:
  - al atardecer
  - cuando se puso el sol
  - al caer el sol
  lexicon: HALOT
  rationale: El idioma hebreo alude al momento en que el sol se pone. ‘Al ponerse el sol’ es una equivalencia natural en español y conserva la imagen verbal del original. ‘Al atardecer’ es más general; ‘cuando se puso el sol’ es más explícito pero menos fluido.
- source_word: נִבְלָתוֹ
  english_pob_choice: his corpse
  chosen_spanish: su cadáver
  alternatives_spanish:
  - su cuerpo
  - su cuerpo muerto
  - su carcasa
  lexicon: HALOT
  rationale: נְבֵלָה designa un cuerpo muerto/cadáver. ‘Cadáver’ preserva la crudeza del hebreo mejor que ‘cuerpo’. ‘Carcasa’ resultaría inadecuado para una persona.
- source_word: וַיַּשְׁלִיכוּ אֹתָהּ
  english_pob_choice: threw it
  chosen_spanish: lo echaran
  alternatives_spanish:
  - lo arrojaran
  - lo lanzaran
  lexicon: HALOT
  rationale: El objeto pronominal remite al sustantivo hebreo femenino ‘cadáver’; en español, la referencia natural es masculina por concordancia con ‘cadáver’ (‘lo’). ‘Echar’ es idiomático y suficientemente fuerte; ‘arrojar’ sería más marcado.
- source_word: פֶּתַח שַׁעַר הָעִיר
  english_pob_choice: the entrance of the city gate
  chosen_spanish: a la entrada de la puerta de la ciudad
  alternatives_spanish:
  - a la entrada del portal de la ciudad
  - a la entrada de la puerta de la ciudadela
  - en la entrada de la puerta de la ciudad
  lexicon: HALOT
  rationale: La expresión combina ‘entrada’ y ‘puerta’ para describir el acceso o umbral del recinto urbano. ‘A la entrada de la puerta de la ciudad’ conserva ambos elementos del hebreo, aunque suene algo reiterativo; esa reiteración refleja la doble estructura del original.
- source_word: גַּל אֲבָנִים גָּדֹל
  english_pob_choice: a large heap of stones
  chosen_spanish: un gran montón de piedras
  alternatives_spanish:
  - un gran montón de piedras apiladas
  - un gran túmulo de piedras
  - un gran cairn de piedras
  lexicon: HALOT
  rationale: גַּל es un montón/heap, especialmente de piedras. ‘Montón de piedras’ es claro y fiel para lectores generales. ‘Túmulo’ o ‘cairn’ serían más técnicos o más restringidos.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: HALOT
  rationale: Esta fórmula narrativa se vierte naturalmente como ‘hasta el día de hoy’. Mantiene la función memorial y la continuidad temporal del hebreo sin sonar arcaica.
theological_decisions:
- issue: Sujeto implícito de la primera cláusula
  english_pob_reading: Rendered as 'he hanged the king of Ai' with Joshua as the implied subject
  chosen_spanish_reading: ‘E hizo colgar al rey de Hai’ con Josué como sujeto implícito en el contexto inmediato
  alternative_spanish_readings:
  - ‘Y colgaron al rey de Hai’
  - ‘Y Josué colgó al rey de Hai’
  rationale: El hebreo presenta una forma verbal en tercera persona singular sin sujeto explícito en la primera cláusula; la cláusula siguiente nombra a Josué como el que da la orden. En español, conservar un sujeto implícito evita añadir más de lo que el texto dice, mientras mantiene la lectura narrativa natural. La forma ‘e hizo colgar’ también refleja de modo fluido la relación causal del contexto.
  doctrine_reference: Decisión sintáctico-narrativa, no doctrinal.
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje hebreo con apoyo del auditorio inglés: conserva el sujeto implícito en la primera cláusula, simplifica la marca temporal a una forma natural en español (‘hasta la tarde’, ‘al ponerse el sol’), y mantiene la secuencia narrativa de descenso del cadáver, depósito en la entrada y acumulación de piedras como memorial permanente.'
  spanish_consistency_notes:
  - Se usa ‘Hai’ como transliteración estable del topónimo Ai.
  - Se mantiene ‘Josué’ para יְהוֹשֻׁעַ.
  - Se usa ‘cadáver’ para נִבְלָה por la fuerza lexical del término.
  - 'Se conserva el paralelismo temporal con dos expresiones distintas: ‘hasta la tarde’ y ‘al ponerse el sol’.'
  - La nota al pie marca solo la alternativa léxica de תָּלָה y no introduce otras variantes no documentadas.
