translation:
  language: es
  text: Y el que presentó su ofrenda en el primer día fue Nahsón hijo de Amminadab[a], de la tribu de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: "el que ofreció su ofrenda ... de la tribu de Judá". El participio hebreo y la frase "de la tribu de Judá" pueden traducirse de maneras ligeramente distintas en español sin cambiar el sentido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... was
  chosen_spanish: Y ... fue
  alternatives_spanish:
  - Entonces ... fue
  - Y aconteció
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce el dato de manera פשוטा/neutral; en español, 'Y ... fue' conserva la secuencia narrativa sin recurrir al arcaísmo 'aconteció'.
- source_word: הַמַּקְרִיב
  english_pob_choice: the one presenting
  chosen_spanish: el que presentaba
  alternatives_spanish:
  - el que ofrecía
  - el oferente
  - el que traía
  lexicon: HALOT
  rationale: El participio hifil de קרב señala al que hace que la ofrenda sea presentada. 'Presentaba' mantiene el matiz cultual y suena natural en español.
- source_word: בַּיּוֹם הָרִאשׁוֹן
  english_pob_choice: on the first day
  chosen_spanish: el primer día
  alternatives_spanish:
  - en el primer día
  lexicon: HALOT
  rationale: La expresión temporal idiomática en español es 'el primer día'; evita una calca poco natural.
- source_word: אֶת קָרְבָּנוֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su sacrificio
  - su oblación
  lexicon: HALOT
  rationale: קָרְבָּן es el término sacrificial estándar. 'Ofrenda' preserva el campo semántico cultual sin volverse demasiado técnico o arcaico.
- source_word: נַחְשׁוֹן
  english_pob_choice: Nahshon
  chosen_spanish: Nahsón
  alternatives_spanish:
  - Nashón
  lexicon: transliteration
  rationale: Se translitera el nombre propio al uso castellano bíblico común, con acento gráfico para la pronunciación natural en español.
- source_word: בֶּן עַמִּינָדָב
  english_pob_choice: son of Amminadab
  chosen_spanish: hijo de Aminadab
  alternatives_spanish:
  - hijo de Amminadab
  lexicon: patronymic
  rationale: El patronímico se traduce directamente. Se simplifica la grafía del nombre propio para una lectura bíblica fluida en español.
- source_word: לְמַטֵּה יְהוּדָה
  english_pob_choice: of the tribe of Judah
  chosen_spanish: de la tribu de Judá
  alternatives_spanish:
  - para la tribu de Judá
  - perteneciente a la tribu de Judá
  lexicon: HALOT
  rationale: El contexto de afiliación tribal favorece 'de la tribu de Judá', que refleja bien la relación expresada por ל con מַטֵּה. Se evita 'para' porque en español puede sonar funcional y no de pertenencia.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que cambió 'for the tribe of Judah' a 'of the tribe of Judah'; en español se refleja de forma natural con 'de la tribu de Judá'. No se añade nota porque no hay tensión textual adicional en este versículo.
  spanish_consistency_notes:
  - Se mantiene 'ofrenda' para קָרְבָּן en coherencia con el registro cultual del pasaje.
  - Los nombres propios se castellanizan de forma legible ('Nahsón', 'Aminadab', 'Judá') sin introducir formas litúrgicas distintas.
  - Se conserva la estructura narrativa simple sin añadir marcas interpretativas no presentes en el hebreo.
