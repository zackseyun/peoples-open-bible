    text: O 'todo el mandamiento'. El hebreo usa una expresión singular colectiva.
    reason: lexical_alternative
  - marker: b
    text: O 'hereden'. El verbo hebreo puede llevar el sentido de heredar o de tomar posesión, según el contexto.
    reason: lexical_alternative
  - marker: c
    text: Hebreo 'sus padres', refiriéndose a los antepasados patriarcales de Israel.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto para reflejar mejor el hebreo y la política estilística del proyecto: (1) ''se multipliquen'' corrige la pasiva impropia ''seáis multiplicados''; (2) se cambia a tratamiento latinoamericano neutral (''les'', ''sus''); (3) ''todo mandamiento'' evita la ambigüedad menos natural de ''todo el mandamiento'' mientras una nota conserva la alternativa singular colectiva; (4) se añade la nota léxica para ''posean'' / ''hereden'' conforme al rastro inglés; (5) ''Cumplirán cuidadosamente'' expresa bien שׁמר + לַעֲשׂוֹת en español natural y digno.'
