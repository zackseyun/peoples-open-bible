revisions:
- from: Y salió para ti un nombre entre las naciones[a] por tu belleza, porque era perfecta debido a mi esplendor que yo había puesto sobre ti, declara el Señor Yahvé.
  to: Y tu fama se difundió entre las naciones[a] por tu belleza, porque era perfecta por medio de mi esplendor que yo había puesto sobre ti, declara el Señor Yahvé.
  rationale: Se revisa para alinear mejor el español con el sentido contextual del hebreo y con la decisión principal del POB para שֵׁם. «Tu fama se difundió» comunica de forma natural el idiomatismo «tu nombre salió», que queda preservado en nota. Además, «por medio de mi esplendor» refleja mejor el valor de בַּהֲדָרִי que una causalidad simple. Se conserva «Yahvé» conforme a la política del proyecto.
  reviewer_model: gpt-5.4
