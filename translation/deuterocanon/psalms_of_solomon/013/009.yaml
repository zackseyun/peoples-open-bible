theological_decisions:
- issue: Relation between mercy and discipline
  chosen_reading: The verse teaches that the Lord's sparing of his holy ones includes the corrective removal of their trespasses by discipline.
  alternative_readings:
  - The Lord spares them, and separately blots out their trespasses in the sphere of discipline.
  - The discipline could be understood primarily as punitive chastisement rather than corrective training.
  rationale: The syntax closely joins divine sparing with the erasure of trespasses 'in/by discipline,' suggesting mercy expressed through correction rather than exemption from all chastening. This preserves the theological tension of compassion and moral formation without softening either.
