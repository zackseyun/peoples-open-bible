review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la secuencia y el sentido general del griego: gusanos que salen del cuerpo, descomposición en vida, dolor intenso y el efecto del hedor sobre todo el campamento. Sin embargo, omite en el texto principal la caracterización de δυσσεβοῦς (''del impío''), pese a que esa dimensión sí está documentada en las decisiones léxicas y teológicas. Además, ''angustias'' puede sonar más psíquico que físico para ἀλγηδόσιν, donde el contexto favorece un segundo término de dolor corporal fuerte.'
  spanish_quality_summary: El español es claro y natural, con buen tono bíblico moderno. 'Brotaban gusanos' y 'por su hedor' funcionan bien. 'Se iba desprendiendo' comunica el proceso, aunque el pasaje puede sonar más directo con 'se le iba cayendo'. La mayor reparación necesaria es reintegrar 'del impío' al texto principal para mantener fidelidad plena; y conviene ajustar 'angustias' a 'agonías' para alinearse mejor con el sufrimiento físico del contexto.
  glossary_alignment: 'En general hay buena alineación con las decisiones auditadas: σάρξ -> ''carne'', ὀσμή contextualizada como ''hedor'', στρατόπεδον -> ''campamento'', σαπρία -> ''podredumbre''. El problema principal es la falta de traducción visible de δυσσεβοῦς en el texto, a pesar de que el glosario y la rationale piden ''impío/ungodly''.'
  issues:
  - severity: high
    issue: Falta en el texto principal la traducción de δυσσεβοῦς.
    rationale: El griego dice explícitamente 'del cuerpo del impío'; el borrador español dice solo 'de su cuerpo'. Esto elimina una caracterización moral-religiosa que el original y la auditoría inglesa consideran significativa.
  - severity: medium
    issue: '''Angustias'' no refleja tan bien el matiz físico de ἀλγηδόσιν en este contexto.'
    rationale: Aunque puede aceptarse como sufrimiento intenso, en español 'angustia' suele oírse más emocional o interior. 'Agonías' conserva mejor la intensidad corporal emparejada con 'dolores'.
  - severity: low
    issue: La nota b ('su carne estaba cayendo') podría afinarse para reflejar mejor el sentido de desprenderse/caerse.
    rationale: No es un error grave, pero una formulación como 'su carne se iba cayendo' o 'se le iba cayendo la carne' representa mejor el valor imperfectivo y la imaginería del pasaje.
  revised_spanish_text: de modo que incluso del cuerpo del impío brotaban gusanos[a], y mientras aún vivía, en dolores y agonías, su carne se iba desprendiendo[b], y por su hedor todo el campamento quedaba agobiado por la podredumbre.
