id: ISA.9.11
reference: Isaiah 9:11
source:
  edition: WLC
  text: אֲרָ֣ם מִ/קֶּ֗דֶם וּ/פְלִשְׁתִּים֙ מֵֽ/אָח֔וֹר וַ/יֹּאכְל֥וּ אֶת יִשְׂרָאֵ֖ל בְּ/כָל פֶּ֑ה בְּ/כָל זֹאת֙ לֹא שָׁ֣ב אַפּ֔/וֹ וְ/ע֖וֹד יָד֥/וֹ נְטוּיָֽה־־־־׃
translation:
  text: Aram from the east and the Philistines from the west devoured Israel with full mouth[a]. For all this, his anger has not turned away[b], and his hand is still stretched out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with full mouth,' that is, voraciously or completely.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from behind'; in this context, paired with 'from the east,' it likely means 'from the west.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - Syria
  lexicon: HALOT
  rationale: Rendered as the transliterated proper name rather than 'Syria' to reflect the Hebrew ethnogeographic name directly and to follow the philosophy of transliterating names.
- source_word: מִקֶּדֶם
  chosen: from the east
  alternatives:
  - from the front
  - from the eastward side
  lexicon: HALOT
  rationale: קֶדֶם can denote east or front; in this geographic pairing with 'from the west/back' it is best rendered directionally as 'from the east'.
- source_word: פְלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard rendering of the people group name.
- source_word: מֵאָחוֹר
  chosen: from the west
  alternatives:
  - from behind
  - from the rear
  lexicon: HALOT
  rationale: אָחוֹר literally means 'behind/back,' but in antithetical geographic parallel with 'from the east' it idiomatically indicates the west.
- source_word: וַיֹּאכְלוּ
  chosen: devoured
  alternatives:
  - ate up
  - consumed
  lexicon: HALOT
  rationale: Though literally 'ate,' the verb is metaphorical for hostile consumption by enemies; 'devoured' preserves the vividness without sounding wooden.
- source_word: בְּכָל פֶּה
  chosen: with every mouth
  alternatives:
  - with full mouth
  - with open mouth
  - on every side
  lexicon: HALOT
  rationale: Literally 'with all mouth.' The phrase conveys total, voracious consumption. 'With every mouth' keeps the metaphor visible. A more idiomatic interpretive rendering such as 'on every side' is possible but less textually transparent.
- source_word: בְּכָל זֹאת
  chosen: For all this
  alternatives:
  - In all this
  - Despite all this
  lexicon: HALOT
  rationale: This recurring refrain introduces the persistence of divine judgment despite prior blows. 'For all this' is a natural English equivalent that preserves the discourse function.
- source_word: לֹא שָׁב אַפּוֹ
  chosen: his anger has not turned away
  alternatives:
  - his nose has not turned back
  - his wrath has not turned away
  lexicon: HALOT
  rationale: אַף literally means 'nose' and by extension 'anger.' English requires the idiomatic sense here. 'Anger' is slightly more accessible than 'wrath' while retaining the force of judgment.
- source_word: וְעוֹד יָדוֹ נְטוּיָה
  chosen: his hand is still stretched out
  alternatives:
  - his hand is still extended
  - his hand remains outstretched
  lexicon: HALOT
  rationale: A conventional prophetic image of ongoing judgment. 'Stretched out' is clear, vivid, and close to the Hebrew participial expression.
