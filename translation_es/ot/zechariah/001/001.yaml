lexical_decisions:
- source_word: בַּ/חֹדֶשׁ הַ/שְּׁמִינִי
  english_pob_choice: In the eighth month
  chosen_spanish: En el mes octavo
  alternatives_spanish:
  - En el octavo mes
  - En el mes ocho
  lexicon: HALOT
  rationale: El hebreo usa una datación formal con sustantivo + ordinal. En español, 'en el mes octavo' conserva la estructura y suena natural en un encabezado cronológico profético.
- source_word: בִּ/שְׁנַת שְׁתַּיִם לְ/דָרְיָוֶשׁ
  english_pob_choice: in the second year of Darius
  chosen_spanish: en el segundo año de Darío
  alternatives_spanish:
  - en el año dos de Darío
  - durante el segundo año de Darío
  lexicon: HALOT
  rationale: Es una fórmula regnal estándar. 'En el segundo año de Darío' comunica con claridad la cronología sin perder la forma del original.
- source_word: הָיָה דְבַר יְהוָה
  english_pob_choice: the word of Yahweh came
  chosen_spanish: la palabra de Yahvé llegó
  alternatives_spanish:
  - la palabra de Yahvé vino
  - la palabra de Yahvé aconteció
  lexicon: HALOT
  rationale: La construcción hebrea de aparición de revelación profética se rinde mejor con un verbo de llegada. 'Llegó' evita el calco 'fue' y mantiene el inicio de la comunicación divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como forma principal del texto español, conforme a la política del proyecto y al valor del Tetragrámaton en el hebreo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición introduce al destinatario de la palabra divina. En español, 'a' es la equivalencia natural y directa.
- source_word: זְכַרְיָה
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zecharías
  lexicon: HALOT
  rationale: Se usa la forma española establecida del nombre propio, inteligible para lectores de iglesia en español.
- source_word: בֶּן בֶּרֶכְיָה בֶּן עִדּוֹ
  english_pob_choice: son of Berechiah, son of Iddo
  chosen_spanish: hijo de Berequías, hijo de Iddo
  alternatives_spanish:
  - hijo de Berequías y de Iddo
  - hijo de Berequías, descendiente de Iddo
  lexicon: HALOT
  rationale: La cadena genealógica se conserva con 'hijo de' para reflejar la doble filiación expresada en hebreo sin suavizarla ni reordenarla.
- source_word: הַ/נָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - profeta
  - el profético
  lexicon: HALOT
  rationale: El sustantivo definido se traduce de manera directa. En español, la aposición final identifica a Iddo como profeta sin añadir interpretación.
- source_word: לֵ/אמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - y dijo,
  - así diciendo,
  lexicon: HALOT
  rationale: El infinitivo introduce la continuación del discurso. 'Diciendo,' mantiene la transición formal sin sobretraducir el conector.
theological_decisions:
- issue: Representación de יְהוָה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el nombre divino. Se preserva como 'Yahvé' en español para no ocultar el Tetragrámaton detrás de un título y para mantener coherencia con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente y con la verificación cruzada: no se requirieron cambios sustantivos respecto del sentido base del hebreo ni de la lectura auditada en inglés.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, coherente con la política del proyecto.
  - Se conserva la fórmula cronológica y genealógica con sintaxis natural en español.
  - '''Diciendo,'' queda abierto para enlazar con el discurso que continúa en el versículo 2.'
