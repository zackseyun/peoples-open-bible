translation:
  language: es
  text: En aquel día[a], declara Yahvé de los Ejércitos[b][c][d], cada uno invitará a su prójimo debajo de la vid y debajo de la higuera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llamará, cada uno a su prójimo». El verbo hebreo puede traducirse más literalmente como «llamar», pero aquí probablemente tiene sentido de invitación.'
    reason: lexical_alternative
  - marker: b
    text: Muchas versiones tradicionales leen «el SEÑOR de los Ejércitos». El hebreo צְבָאוֹת alude a ejércitos o huestes; aquí se traduce de forma transparente como «de los Ejércitos».
    reason: lexical_alternative
  - marker: c
    text: Compárese 1 Reyes 4:25 y Miqueas 4:4, donde estar debajo de la vid y de la higuera simboliza paz, seguridad y prosperidad.
    reason: cross_reference
  - marker: d
    text: Algunas traducciones añaden «su» antes de «vid» y «higuera» por un modismo bíblico similar, pero el posesivo no está explícito aquí en el hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - En aquel tiempo
  lexicon: HALOT
  rationale: La fórmula profética temporal se expresa naturalmente en español como "En aquel día"; conserva el valor escatológico/futuro sin añadir explicación.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  english_pob_choice: declares Yahweh of Armies
  chosen_spanish: dice Yahvé de los Ejércitos
  alternatives_spanish:
  - declara Yahvé de los Ejércitos
  - oráculo de Yahvé de los Ejércitos
  lexicon: HALOT
  rationale: נְאֻם funciona como fórmula profética de declaración. "Dice" mantiene la sencillez y la voz directa del oráculo; "Yahvé" sigue el estándar POB para יְהוָה, y "de los Ejércitos" traduce צְבָאוֹת con transparencia semántica.
- source_word: תִּקְרְא֖וּ
  english_pob_choice: will invite
  chosen_spanish: invitará
  alternatives_spanish:
  - llamará
  - convocará
  lexicon: HALOT
  rationale: Aunque el verbo básico puede significar "llamar", el contexto distributivo con "cada uno" y el complemento relacional favorecen el sentido de invitación, como en el audit trail inglés. En español, "invitará" transmite mejor la escena de paz sin sobreparafrasear.
- source_word: אִישׁ לְרֵעֵהוּ
  english_pob_choice: each of you ... his neighbor
  chosen_spanish: cada uno ... a su prójimo
  alternatives_spanish:
  - cada hombre ... a su prójimo
  - cada uno ... a su vecino
  lexicon: HALOT
  rationale: אִישׁ se vierte distributivamente con "cada uno" para reflejar el plural verbal. רֵעַ admite "prójimo" o "vecino"; "prójimo" funciona bien en español bíblico amplio sin perder el matiz de cercanía comunitaria.
- source_word: אֶל תַּחַת גֶּפֶן וְאֶל תַּחַת תְּאֵנָה
  english_pob_choice: under the vine and under the fig tree
  chosen_spanish: debajo de la vid y debajo de la higuera
  alternatives_spanish:
  - bajo la vid y bajo la higuera
  - debajo de la vid y bajo la higuera
  lexicon: HALOT
  rationale: El hebreo usa la imagen idiomática de reposo y seguridad sin posesivos explícitos. "Debajo de" conserva la relación espacial de תַּחַת y suena natural en español; "vid" e "higuera" mantienen la imaginería vegetal tradicional.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La norma del proyecto para el Tetragrámaton es traducirlo como "Yahvé" en el texto principal. Esto preserva el nombre del pacto sin la convención de máscara con mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Rendering of צְבָאוֹת
  english_pob_reading: Armies
  chosen_spanish_reading: de los Ejércitos
  alternative_spanish_readings:
  - de los ejércitos
  - de los Hosts
  rationale: '"Ejércitos" comunica con claridad la imagen del título divino y evita el arcaismo opaco de "Hosts". En español bíblico, la preposición fija permite un título reverente y reconocible.'
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
translation_notes:
  revision_awareness: 'Se siguió la revisión final del audit trail inglés: se mantuvo el sentido invitacional de תִּקְרְאוּ y se evitó introducir acciones no explícitas como «venir a» o «acudir a». También se preservó la ausencia de posesivos en la imagen de la vid y la higuera.'
  spanish_consistency_notes:
  - Se uniformó el tratamiento del nombre divino como «Yahvé» en la voz del oráculo.
  - «Ejércitos» se usa con mayúscula por tratarse del título divino.
  - No se importó el posesivo «su» antes de «vid» ni «higuera», siguiendo el texto hebreo.
  - La lectura distributiva de אִישׁ se expresa con «cada uno» para un español natural y fiel.
