translation:
  language: es
  text: Pero ¿dónde puede hallarse la sabiduría[a], y dónde está el lugar del entendimiento?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «¿de dónde será encontrada la sabiduría?»
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַחָכְמָה
  english_pob_choice: But wisdom
  chosen_spanish: Pero la sabiduría
  alternatives_spanish:
  - Y la sabiduría
  - Ahora bien, la sabiduría
  lexicon: HALOT
  rationale: El prefijo וְ introduce un giro discursivo respecto de la sección anterior; en español, «Pero» comunica mejor ese contraste retórico que «Y». Se omite el artículo en la formulación final por naturalidad idiomática, aunque el sustantivo es definido en el hebreo.
- source_word: מֵאַיִן
  english_pob_choice: where
  chosen_spanish: ¿dónde?
  alternatives_spanish:
  - ¿de dónde?
  - ¿desde dónde?
  lexicon: HALOT
  rationale: La expresión hebrea pregunta por el origen o la fuente («de dónde»), pero en este paralelismo poético español «¿dónde?» fluye con naturalidad junto con el verbo pasivo y conserva la fuerza interrogativa.
- source_word: תִּמָּצֵא
  english_pob_choice: can be found
  chosen_spanish: se hallará
  alternatives_spanish:
  - puede hallarse
  - es hallada
  lexicon: HALOT
  rationale: El nifal de מצא expresa pasividad/reflexividad. «Se hallará» conserva la voz pasiva y el tono interrogativo poético sin añadir de forma explícita una modalidad de capacidad que no está en el hebreo.
- source_word: וְאֵי
  english_pob_choice: and where
  chosen_spanish: y dónde
  alternatives_spanish:
  - y en qué lugar
  - y dónde entonces
  lexicon: HALOT
  rationale: אֵי es un adverbio interrogativo de lugar. «Y dónde» reproduce el paralelismo con el primer hemistiquio y mantiene la cadencia de la pregunta doble.
- source_word: זֶה
  english_pob_choice: is
  chosen_spanish: está
  alternatives_spanish:
  - es
  - se encuentra
  lexicon: HALOT
  rationale: En esta construcción idiomática, el hebreo funciona como pregunta de ubicación. «Está» resulta más natural en español que un literal «es», sin alterar el sentido locativo.
- source_word: מְקוֹם
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  - la sede
  lexicon: HALOT
  rationale: מְקוֹם significa «lugar». «Lugar» es la opción más clara y fiel en español actual; «sitio» es posible pero menos solemne.
- source_word: בִּינָה
  english_pob_choice: understanding
  chosen_spanish: inteligencia
  alternatives_spanish:
  - entendimiento
  - discernimiento
  lexicon: HALOT
  rationale: בִּינָה denota comprensión/entendimiento/discernimiento dentro del vocabulario sapiencial. «Inteligencia» transmite bien la capacidad de comprender en español moderno; se mantiene abierta la alternativa «entendimiento» por el matiz sapiencial tradicional.
translation_notes:
  revision_awareness: 'Se siguió el audit trail en inglés: contraste discursivo con וְ, sentido locativo de מֵאַיִן/אֵי, pasivo de תִּמָּצֵא y vocabulario sapiencial de בִּינָה. La redacción española busca mantener la doble pregunta poética sin calco áspero.'
  spanish_consistency_notes:
  - Se conservó «sabiduría» y «inteligencia» como términos sapienciales distinguibles.
  - Se evitó «SEÑOR» u otras sustituciones teológicas no pertinentes; el versículo no contiene el nombre divino.
  - La puntuación con dos preguntas reproduce el paralelismo hebreo.
