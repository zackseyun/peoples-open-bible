review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo: secuencia narrativa, «a su marido», la petición cortés, el título «hombre de Dios» y la distinción femenina de אָתוֹן. Sin embargo, «hasta el hombre de Dios» suena menos natural en español para un destino personal y el inglés auditado entendió עַד idiomáticamente como destino, mejor expresado con «al». También «para que yo pueda correr» añade un matiz de capacidad que no está en el cohortativo; «para que corra» preserva mejor propósito/intención.'
  spanish_quality_summary: 'El texto es claro y digno, pero puede pulirse para un español más natural y fiel: «uno de los muchachos» puede quedarse, aunque «uno de los jóvenes» sonaría algo más neutro; el problema principal es «hasta el hombre de Dios», que en español parece más espacial que direccional. La nota b contiene una pequeña incoherencia: dice que algunas versiones ponen simplemente «asna» o «burra», pero esas formas siguen siendo femeninas; la comparación correcta es con un término genérico como «asno»/«burro» o «un asno».'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Dios», «hombre de Dios» y el mantenimiento del femenino en «burras». No hay conflictos teológicos. Se conserva apropiadamente el título fuente en vez de parafrasearlo como «profeta».'
  issues:
  - severity: medium
    issue: «hasta el hombre de Dios» para עַד אִישׁ הָאֱלֹהִים
    rationale: Aunque literalmente posible, en español suena menos natural para indicar destino hacia una persona. El análisis auditado entiende עַד idiomáticamente como destino de movimiento; «al hombre de Dios» comunica mejor esa función sin perder sentido.
  - severity: medium
    issue: «para que yo pueda correr» añade idea de capacidad
    rationale: El cohortativo expresa propósito/intención, no capacidad. «Para que corra» o «para correr» es más fiel y natural.
  - severity: low
    issue: Nota b mal formulada sobre alternativas
    rationale: Decir que otras versiones ponen «asna» o «burra» no contrasta con la especificidad femenina, porque ambas también son femeninas. La nota debe comparar con traducciones genéricas como «asno», «burro» o simplemente «un animal de carga/donkey».
  revised_spanish_text: 'Entonces ella llamó a su marido y dijo: «Por favor, envíame uno de los muchachos y una de las burras[a], para que corra al hombre de Dios y vuelva».[b]'
  revised_footnotes:
