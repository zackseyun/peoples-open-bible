translation:
  language: es
  text: Y la batalla se intensificó[a] aquel día, y el rey permaneció[b] de pie en el carro, frente a Aram; y murió por la tarde, y la sangre de la herida fluyó[c] hasta el fondo del carro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la batalla creció»; más literalmente, «la batalla subió» aquel día.
    reason: lexical_alternative
  - marker: b
    text: O «el rey estuvo de pie en el carro»; la forma hebrea puede sugerir que permaneció erguido o que fue mantenido en esa posición.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «al seno/regazo del carro», un modismo para la parte interior o inferior del carro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעֲלֶה / הַמִּלְחָמָה
  english_pob_choice: the battle intensified
  chosen_spanish: la batalla se intensificó
  alternatives_spanish:
  - la batalla subió
  - la batalla creció
  - la batalla aumentó
  lexicon: HALOT
  rationale: עלה con ‘la batalla’ expresa aumento o escalada. En español, ‘se intensificó’ comunica con naturalidad la idea de agravamiento sin perder el valor idiomático del hebreo.
- source_word: מָעֳמָד
  english_pob_choice: remained standing
  chosen_spanish: permanecía de pie
  alternatives_spanish:
  - quedó de pie
  - estuvo de pie
  - fue mantenido de pie
  lexicon: HALOT
  rationale: La forma pasiva/causativa sugiere una permanencia en posición vertical más que un simple ‘estaba’. ‘Permanecía de pie’ conserva esa estabilidad y evita sobreespecificar el mecanismo.
- source_word: בַּמֶּרְכָּבָה
  english_pob_choice: in the chariot
  chosen_spanish: en el carro
  alternatives_spanish:
  - en el carro de guerra
  - en el carruaje
  lexicon: HALOT
  rationale: ‘Carro’ es la forma más natural en español bíblico para el vehículo de guerra, y evita una perífrasis innecesaria.
- source_word: נֹכַח אֲרָם
  english_pob_choice: facing Aram
  chosen_spanish: frente a Aram
  alternatives_spanish:
  - de cara a Aram
  - opuesto a Aram
  - frente a los arameos
  lexicon: HALOT
  rationale: נֹכַח marca oposición o enfrentamiento. ‘Frente a Aram’ mantiene la orientación espacial y el nombre propio tal como aparece en la fuente.
- source_word: וַיָּמָת בָּעֶרֶב
  english_pob_choice: he died in the evening
  chosen_spanish: murió por la tarde
  alternatives_spanish:
  - murió en la tarde
  - murió al anochecer
  - murió en la noche
  lexicon: HALOT
  rationale: El hebreo indica una referencia temporal amplia de fin de día. ‘Por la tarde’ es natural en español y no fuerza una hora más precisa de la que el texto ofrece.
- source_word: וַיִּצֶק
  english_pob_choice: flowed
  chosen_spanish: fluyó
  alternatives_spanish:
  - corrió
  - se derramó
  - fluía
  lexicon: HALOT
  rationale: יצק puede expresar derramamiento o flujo de líquido. ‘Fluyó’ conserva la imagen sin caer en un calco duro ni perder formalidad.
- source_word: דַּם הַמַּכָּה
  english_pob_choice: the blood from the wound
  chosen_spanish: la sangre de la herida
  alternatives_spanish:
  - la sangre de la contusión
  - la sangre del golpe
  - la sangre de la herida recibida
  lexicon: HALOT
  rationale: El sustantivo aquí remite a la lesión sufrida. ‘Herida’ comunica el origen de la sangre de forma directa y comprensible en español.
- source_word: חֵיק הָרָכֶב
  english_pob_choice: the bottom of the chariot
  chosen_spanish: el fondo del carro
  alternatives_spanish:
  - el interior del carro
  - el hueco del carro
  - el regazo del carro
  lexicon: HALOT
  rationale: חֵיק literalmente tiene la imagen de ‘seno/regazo’, pero aquí designa la parte hundida o inferior del vehículo donde la sangre se acumula. ‘Fondo del carro’ expresa esa función con claridad.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Siria
  - los arameos
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico-étnico transliterado para no sustituirlo por una identificación posterior ni por una interpretación plural no explícita en el hebreo.
theological_decisions:
- issue: Lectura de la posición del rey en el carro
  english_pob_reading: the king remained standing in the chariot
  chosen_spanish_reading: el rey permanecía de pie en el carro
  alternative_spanish_readings:
  - el rey quedó de pie en el carro
  - el rey fue mantenido de pie en el carro
  rationale: El hebreo admite una idea de permanencia o de ser sostenido en pie. La opción elegida conserva esa tensión sin decidir más de lo que la forma verbal obliga.
  doctrine_reference: none
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: se prefirió una expresión más natural para la permanencia del rey en pie y un verbo más formal para el movimiento de la sangre. También se mantuvo el valor idiomático de עלה con ‘se intensificó’ y el cierre con ‘fondo del carro’ como equivalente funcional de חֵיק הָרָכֶב.'
  spanish_consistency_notes:
  - Se mantuvo ‘Aram’ en lugar de ‘Siria’ por consistencia con el nombre transliterado del original.
  - ‘Carro’ se usó de forma uniforme para el vehículo de guerra.
  - ‘Sangre de la herida’ conserva la relación fuente-origen del hebreo sin introducir interpretaciones adicionales.
