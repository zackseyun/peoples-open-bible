translation:
  language: es
  text: 'Pero cuando vieron el campamento que venía a su encuentro[a], dijeron a Judas: «¿Cómo podremos, siendo tan pocos, combatir contra una multitud tan grande? Estamos agotados[c][b], después de pasar hoy sin comer».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que venía contra él». La frase griega puede traducirse de forma más neutral como «que venía a su encuentro», pero en este contexto militar implica un encuentro hostil.
    reason: lexical_alternative
  - marker: b
    text: O «desfallecidos». El griego puede indicar un estado de debilidad o desánimo; aquí se relaciona con haber pasado sin comer.
    reason: lexical_alternative
  - marker: c
    text: O «ayunando». La expresión griega, por sí sola, no exige un ayuno religioso formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεμβολήν
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campo
  - ejército
  - campamento militar
  lexicon: LSJ
  rationale: En contexto militar, παρεμβολή puede designar el campamento o la fuerza acampada. «Campamento» conserva la imagen concreta y funciona bien en español sin abstraerla indebidamente como «ejército».
- source_word: ἐρχομένην εἰς συνάντησιν αὐτῷ
  english_pob_choice: coming to meet him
  chosen_spanish: que venía a enfrentarlos
  alternatives_spanish:
  - que venía a encontrarlo
  - que venía a su encuentro
  - que venía contra él
  lexicon: LSJ
  rationale: El griego apunta a un encuentro o confrontación. En el contexto bélico, «a enfrentarlos» comunica naturalmente la inminencia hostil sin perder la base literal de encuentro.
- source_word: ὀλιγοστοὶ ὄντες
  english_pob_choice: being so few
  chosen_spanish: siendo tan pocos
  alternatives_spanish:
  - siendo pocos
  - siendo tan escasos
  - tan pocos siendo
  lexicon: LSJ
  rationale: Expresa la pequeñez numérica con naturalidad en español y conserva el énfasis comparativo frente a la multitud.
- source_word: πολεμῆσαι
  english_pob_choice: fight
  chosen_spanish: combatir
  alternatives_spanish:
  - pelear
  - luchar
  - hacer guerra
  lexicon: LSJ
  rationale: «Combatir» mantiene el tono militar y es más formal que «pelear», sin exceder el sentido de acción bélica inmediato.
- source_word: πρὸς πλῆθος τοσοῦτο
  english_pob_choice: so great a multitude
  chosen_spanish: contra una multitud tan grande
  alternatives_spanish:
  - contra tanta multitud
  - contra una multitud así de grande
  - contra tal multitud
  lexicon: LSJ
  rationale: «Multitud» refleja πλῆθος como masa numerosa de combatientes; «tan grande» preserva la fuerza retórica del contraste.
- source_word: ἐκλελύμεθα
  english_pob_choice: we are exhausted
  chosen_spanish: estamos agotados
  alternatives_spanish:
  - estamos extenuados
  - nos hemos debilitado
  - estamos desfallecidos
  lexicon: LSJ
  rationale: La forma expresa un estado presente de debilitamiento o desfallecimiento. «Agotados» comunica bien la condición física y enlaza con la falta de alimento.
- source_word: ἀσιτοῦντες
  english_pob_choice: having gone without food
  chosen_spanish: habiendo pasado hoy sin comer
  alternatives_spanish:
  - ayunando hoy
  - sin haber comido hoy
  - habiendo ayunado hoy
  lexicon: LSJ
  rationale: «Sin comer» es explícito y evita imponer la lectura de ayuno religioso formal; conserva la observación de la POB en inglés de que el texto no exige por sí mismo un ayuno litúrgico.
- source_word: σήμερον
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - en este día
  lexicon: LSJ
  rationale: Equivalente temporal directo y natural en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que mantuvo «so great a multitude» y no introdujo otros cambios. En español se conserva el contraste numérico y la referencia física a la falta de alimento, evitando transformar la frase en un ayuno litúrgico.
  spanish_consistency_notes:
  - Se usa «campamento» para παρεμβολή en armonía con la decisión inglesa «camp».
  - Se conserva «agotados» como estado actual, paralelo a «we are exhausted».
  - Se evita «Cristo», «Señor» u այլ terminología no pertinente; el versículo no contiene nombres divinos ni títulos cristológicos.
  - El verbo «combatir» mantiene el registro militar sin endurecer más allá del griego.
  - Las notas al pie preservan la tensión entre «sin comer» y «ayunando», que el audit trail inglés marcó explícitamente.
