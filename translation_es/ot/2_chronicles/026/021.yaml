    text: O «afectado de lepra»; el hebreo puede referirse a una afección cutánea más amplia que la lepra clínica moderna.
    reason: lexical_alternative
  - marker: b
    text: O «fue excluido de la casa de Yahvé»; el hebreo expresa separación o exclusión de ese ámbito.
    reason: alternative_reading
  revision_rationale: 'Se hicieron ajustes menores para mejorar la naturalidad y precisión del español sin apartarse del hebreo ni de las decisiones auditadas: ''quedó leproso'' para un estado narrativo más idiomático; ''casa apartada'' por fluidez; ''estaba a cargo de la casa del rey'' para expresar supervisión administrativa; y ''la gente del país'' para un español más natural que conserve el sentido de עַם הָאָרֶץ.'
