translation:
  language: es
  text: Yahvé te establecerá para sí como pueblo santo[a], tal como te lo juró, si guardas los mandamientos de Yahvé tu Dios y caminas en sus caminos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «porque guardas los mandamientos de Yahvé tu Dios». La conjunción hebrea también puede leerse causalmente, aunque el contexto aquí favorece «si».
    reason: alternative_reading
lexical_decisions:
- source_word: יְקִימְךָ
  english_pob_choice: will establish you
  chosen_spanish: te establecerá
  alternatives_spanish:
  - te afirmará
  - te levantará
  - te confirmará
  lexicon: HALOT
  rationale: El verbo hiphil de קום aquí expresa hacer permanecer firme o constituir en un estado pactal, no un levantamiento físico. «Establecer» transmite bien la idea de fijar/constituir en una condición de pacto y suena natural en español bíblico actual.
- source_word: לּוֹ
  english_pob_choice: for himself
  chosen_spanish: para sí
  alternatives_spanish:
  - para él
  - como suyo
  lexicon: HALOT
  rationale: 'El dativo pronominal indica pertenencia o relación. «Para sí» conserva el matiz reflexivo: Yahvé los establece como pueblo que le pertenece.'
- source_word: לְעַם קָדוֹשׁ
  english_pob_choice: as a holy people
  chosen_spanish: como pueblo santo
  alternatives_spanish:
  - para un pueblo santo
  - para ser un pueblo santo
  lexicon: HALOT
  rationale: La expresión marca el estatus resultante. «Como pueblo santo» reproduce de forma directa la identidad pactal y evita una paráfrasis más extensa.
- source_word: כַּאֲשֶׁר נִשְׁבַּע לָךְ
  english_pob_choice: just as he swore to you
  chosen_spanish: tal como te lo juró
  alternatives_spanish:
  - como te juró
  - según te lo juró
  lexicon: HALOT
  rationale: La cláusula compara la acción presente con el juramento previo. «Tal como te lo juró» expresa esa correspondencia con claridad y mantiene el tono solemne.
- source_word: כִּי
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - porque
  - cuando
  lexicon: HALOT
  rationale: En este contexto de bendición, la partícula introduce una condición real. «Si» preserva la lectura condicional preferida por el audit trail, sin eliminar la posible resonancia causal del hebreo.
- source_word: תִשְׁמֹר
  english_pob_choice: you keep
  chosen_spanish: guardas
  alternatives_spanish:
  - observas
  - cumples
  lexicon: HALOT
  rationale: שמר con mandamientos suele significar guardarlos/observarlos. «Guardas» es preciso y mantiene el sentido de atención obediente.
- source_word: מִצְוֺת
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los preceptos
  - las órdenes
  lexicon: HALOT
  rationale: «Mandamientos» conserva el registro legal y pactual de מִצְוֹת y es la correspondencia más directa y comprensible en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Según el criterio del proyecto, el Tetragrámaton se vierte «Yahvé» en el texto principal, preservando el nombre propio divino en vez de sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, el Dios tuyo
  lexicon: HALOT
  rationale: Con Yahvé como referente, la fórmula de pacto se expresa naturalmente como «tu Dios». Mantiene la relación personal y covenantal sin sobrecargar el español.
- source_word: וְהָלַכְתָּ בִּדְרָכָיו
  english_pob_choice: and walk in his ways
  chosen_spanish: y caminas en sus caminos
  alternatives_spanish:
  - y andas en sus caminos
  - y vives conforme a sus caminos
  lexicon: HALOT
  rationale: La metáfora hebrea del andar en los caminos de Dios se conserva literalmente porque es idiomática y clara en español. «Caminas» mantiene el paralelismo con el condicional previo y el tono exhortativo.
theological_decisions:
- issue: Fuerza condicional de la cláusula con כִּי
  english_pob_reading: 'The verse presents YHWH''s establishment of Israel as his holy people in covenantal connection with Israel''s obedience: ''if you keep... and walk...''.'
  chosen_spanish_reading: 'El versículo presenta el establecimiento de Israel como pueblo santo en conexión pactal con la obediencia de Israel: «si guardas... y caminas...»'
  alternative_spanish_readings:
  - «porque guardas... y caminas...»
  - «cuando guardes... y camines...»
  rationale: La sintaxis y el marco de bendición/obediencia favorecen una condición real. La traducción mantiene esa tensión sin resolverla hacia una causalidad más fuerte de la que el contexto principal requiere.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo y con el audit trail inglés en su lectura principal; no se registran revisiones aplicadas. Se preserva la tensión entre una posible lectura causal de כִּי y la lectura condicional preferida por el contexto.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al criterio del proyecto.
  - Se mantiene «pueblo santo» como fórmula de estatus pactal, sin reemplazarla por un giro interpretativo.
  - «Mandamientos» conserva el registro legal-covenantal de מִצְוֺת.
  - La metáfora de «caminar en sus caminos» se preserva por claridad y fidelidad idiomática.
  - La nota al pie marca explícitamente la lectura alternativa causal sin desplazar la traducción principal condicional.
