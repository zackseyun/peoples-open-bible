translation:
  language: es
  text: Vuelvan al tribunal, pues estos hombres han dado falso testimonio contra ella.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναστρέψατε
  english_pob_choice: Return
  chosen_spanish: Volved
  alternatives_spanish:
  - Regresad
  - Volved atrás
  lexicon: BDAG
  rationale: El imperativo plural pide regresar al lugar o curso previo del juicio. «Volved» es natural, breve y mantiene el valor direccional sin volver la frase artificial.
- source_word: κριτήριον
  english_pob_choice: court
  chosen_spanish: tribunal
  alternatives_spanish:
  - corte
  - juzgado
  - sitio de juicio
  lexicon: BDAG
  rationale: En este contexto el término designa el recinto o instancia judicial. «Tribunal» conserva mejor el registro jurídico que «corte» en español bíblico y sigue siendo claro para lectores modernos.
- source_word: ψευδῆ
  english_pob_choice: 'false'
  chosen_spanish: falso
  alternatives_spanish:
  - mentiroso
  - falsamente
  - falso testimonio
  lexicon: BDAG
  rationale: El adverbio califica la acción de testificar. En español, «dar falso testimonio» expresa de modo idiomático y legal la misma idea sin perder el peso moral del término.
- source_word: κατεμαρτύρησαν
  english_pob_choice: have borne false witness
  chosen_spanish: han dado falso testimonio
  alternatives_spanish:
  - han testificado falsamente
  - han declarado en falso
  lexicon: BDAG
  rationale: 'La forma griega es forense: testificar contra alguien con falsedad. «Han dado falso testimonio» reproduce el matiz judicial y suena natural en español bíblico contemporáneo.'
- source_word: αὐτῆς
  english_pob_choice: against her
  chosen_spanish: contra ella
  alternatives_spanish:
  - sobre ella
  - de ella
  lexicon: BDAG
  rationale: El genitivo con καταμαρτυρέω marca a la persona objeto de la acusación. «Contra ella» conserva el sentido adversativo y la fuerza legal del verbo.
theological_decisions:
- issue: Idioma judicial para la acusación falsa
  english_pob_reading: have borne false witness against her
  chosen_spanish_reading: han dado falso testimonio contra ella
  alternative_spanish_readings:
  - han testificado falsamente contra ella
  - han presentado falso testimonio contra ella
  rationale: La decisión conserva el marco de tribunal y la gravedad moral de una acusación perjura. «Dar falso testimonio» es la fórmula española más transparente y bíblicamente reconocible sin desplazar el sentido forense del griego.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa auditada coinciden en el sentido forense general; no se documentan variantes textuales ni cambios de revisión relevantes para esta unidad.
  spanish_consistency_notes:
  - Se mantiene el registro jurídico con «tribunal» y «falso testimonio» para reflejar el tono procesal del original.
  - No se introduce mayúscula reverencial ni vocabulario eclesiástico ajeno al contexto judicial.
  - «Contra ella» preserva la relación de acusación personal marcada por el griego.
