review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia legal del hebreo: sujeto dual implícito (''el padre... y su madre''), verbos con fuerza procedimental futura, y el modismo בְּתוּלֵי הַנַּעַר como evidencia de virginidad. También preserva adecuadamente la nota sobre el literal ''las virginidades''. Sin embargo, ''sacarán ... a los ancianos'' suena menos natural que una combinación que exprese presentación formal ante las autoridades, y ''en la puerta'' queda algo indeterminado en español sin ''de la ciudad''.'
  spanish_quality_summary: El texto es claro y mayormente fiel, pero puede mejorarse en naturalidad y precisión judicial. 'Tomarán y sacarán' es comprensible, aunque algo tosco en español contemporáneo; 'tomarán y presentarán' o 'llevarán y presentarán' sería más idiomático, pero conviene conservar algo de la concreción de 'bring out'. La mejor reparación mínima es cambiar 'sacarán ... a los ancianos' por 'presentarán ... ante los ancianos' y explicitar 'la puerta de la ciudad', que en español suena más natural y refleja mejor el referente cívico-jurídico.
  glossary_alignment: No hay términos del glosario mayor que entren en juego. 'Joven' concuerda bien con נַעֲרָה; 'pruebas de la virginidad' comunica bien el idiomatismo legal; 'ancianos' para זִקְנֵי es apropiado. La revisión propuesta no altera decisiones teológicas ni terminológicas del proyecto.
  issues:
  - severity: medium
    issue: 'Construcción poco natural: ''sacarán ... a los ancianos'''
    rationale: En español, 'sacar algo a alguien' aquí suena forzado; el hebreo implica presentación formal de evidencia ante autoridades. 'Presentarán ... ante los ancianos' comunica mejor la función judicial sin perder sentido.
  - severity: low
    issue: '''En la puerta'' es demasiado desnudo en español'
    rationale: Aunque el contexto menciona la ciudad, 'en la puerta' puede sonar ambiguo o doméstico. 'En la puerta de la ciudad' hace explícito el lugar judicial tradicional y sigue de cerca el sentido contextual del hebreo.
