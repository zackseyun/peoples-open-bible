revisions:
- from: 'Porque así dice Yahvé[a], el Dios de Israel[b], acerca de las casas de esta ciudad y de las casas de los reyes de Judá, que están derribadas[c] para las rampas de asedio[d] y para la espada[e]:'
  to: 'Porque así dice Yahvé, el Dios de Israel, acerca de las casas de esta ciudad y de las casas[a] de los reyes de Judá, que han sido derribadas para las rampas de asedio[b] y para la espada[c]:'
  rationale: Se corrigieron los marcadores de notas para que correspondan exactamente a las palabras pertinentes del texto y se redujo el aparato a las alternativas documentadas y útiles. Además, se ajustó ‘que están derribadas’ a ‘que han sido derribadas’ por mayor naturalidad en español, manteniendo fielmente el sentido del participio pasivo hebreo.
  reviewer_model: gpt-5.4
