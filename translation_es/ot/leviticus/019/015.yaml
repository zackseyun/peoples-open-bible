translation:
  language: es
  text: No cometerán injusticia en el juicio. No favorecerás al pobre, ni cederás ante el grande[b]; con rectitud[a] juzgarás a tu prójimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''con justicia juzgarás a tu prójimo''.'
    reason: lexical_alternative
  - marker: b
    text: Los hebraísmos literalmente dicen 'levantar el rostro del pobre' y 'honrar el rostro del grande', es decir, mostrar favoritismo o deferencia indebida en el juicio.
    reason: cultural_note
lexical_decisions:
- source_word: עָוֶל
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - mal
  - injusticia
  - perversión
  lexicon: HALOT
  rationale: En el contexto judicial de בַּמִּשְׁפָּט, el término señala una acción contraria a la justicia. 'Injusticia' comunica con claridad el sentido legal y moral sin ampliar indebidamente el alcance.
- source_word: בַּמִּשְׁפָּט
  english_pob_choice: in judgment
  chosen_spanish: en el juicio
  alternatives_spanish:
  - en el juicio
  - en la justicia
  - en las decisiones judiciales
  lexicon: HALOT
  rationale: El hebreo remite al ámbito de decisión judicial. 'En el juicio' conserva la esfera forense y resulta idiomático en español bíblico moderno.
- source_word: תִשָּׂא פְנֵי
  english_pob_choice: show partiality to
  chosen_spanish: favorecer
  alternatives_spanish:
  - mostrar parcialidad hacia
  - hacer acepción de
  - levantar el rostro de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y apunta a favoritismo judicial. 'Favorecer' resume el sentido sin perder la prohibición de trato desigual en la sentencia.
- source_word: דָל
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el necesitado
  - el débil
  - el humilde
  lexicon: HALOT
  rationale: En este contexto legal-social, דָל designa al de condición pobre o socialmente débil. 'El pobre' es la equivalencia más directa y natural.
- source_word: תֶהְדַּר פְּנֵי
  english_pob_choice: defer to
  chosen_spanish: ceder ante
  alternatives_spanish:
  - deferir ante
  - mostrar deferencia hacia
  - dar preferencia a
  lexicon: HALOT
  rationale: La revisión inglesa prefirió 'defer to' para expresar la idea de deferencia o parcialidad hacia el poderoso. En español, 'ceder ante' comunica esa concesión indebida en un contexto judicial.
- source_word: גָדוֹל
  english_pob_choice: the great
  chosen_spanish: el grande
  alternatives_spanish:
  - el poderoso
  - el notable
  - el prominente
  lexicon: HALOT
  rationale: Aquí se refiere a una persona de alto estatus. 'El grande' preserva la amplitud semántica del hebreo y mantiene el paralelo con 'el pobre'.
- source_word: בְּצֶדֶק
  english_pob_choice: with righteousness
  chosen_spanish: con justicia
  alternatives_spanish:
  - con rectitud
  - con justicia y rectitud
  - justamente
  lexicon: HALOT
  rationale: צֶדֶק tiene peso tanto ético como jurídico. En español, 'con justicia' es natural y fiel al campo semántico, y deja abierta la dimensión de rectitud moral.
- source_word: תִּשְׁפֹּט
  english_pob_choice: you shall judge
  chosen_spanish: juzgarás
  alternatives_spanish:
  - harás juicio
  - sentenciarás
  - darás juicio
  lexicon: HALOT
  rationale: El verbo שׁפט se traduce de manera directa con 'juzgar'. La forma futura exhortativa del hebreo queda bien representada por 'juzgarás'.
- source_word: עֲמִיתֶךָ
  english_pob_choice: your neighbor
  chosen_spanish: tu prójimo
  alternatives_spanish:
  - tu semejante
  - tu compatriota
  - tu compañero
  lexicon: HALOT
  rationale: עָמִית alude al miembro del mismo pueblo o comunidad. 'Tu prójimo' es idiomático en español bíblico y refleja adecuadamente la relación comunitaria implicada.
theological_decisions:
- issue: צֶדֶק en un contexto legal-ético
  english_pob_reading: with righteousness
  chosen_spanish_reading: con justicia
  alternative_spanish_readings:
  - con rectitud
  - con justicia y rectitud
  rationale: El hebreo conserva una tensión entre justicia forense y rectitud moral. Aunque 'con justicia' es la opción principal en español por claridad y naturalidad, se reconoce que la palabra también lleva una carga ética amplia; no se reduce a un mero formalismo legal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3; tratamiento de δικαιοσύνη/justicia como término con peso legal y moral'
- issue: Tratamiento de los idioms sobre 'rostro' en favoritismo judicial
  english_pob_reading: show partiality to the poor, nor defer to the great
  chosen_spanish_reading: No favorecerás al pobre, ni cederás ante el grande
  alternative_spanish_readings:
  - No harás acepción de personas favoreciendo al pobre, ni mostrarás deferencia al grande
  - No levantarás el rostro del pobre, ni honrarás el rostro del grande
  rationale: El hebreo literalmente habla de 'levantar el rostro' y 'honrar el rostro', pero el sentido contextual es favoritismo o deferencia injusta. La traducción española opta por una formulación natural que conserve la prohibición judicial sin ocultar el juicio moral.
  doctrine_reference: Principio POB de no enmascarar el sentido judicial y de preservar la tensión idiomática cuando la literalidad sería opaca
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una revisión que sustituyó 'honor the face of the great' por 'defer to the great'. La versión española sigue esa revisión al evitar una traducción demasiado literal del hebraísmo y usar un verbo que expresa mejor la parcialidad prohibida en el tribunal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparezca; en este versículo no corresponde.
  - Se mantiene 'justicia' para צֶדֶק, en coherencia con el tratamiento legal-moral del término en el proyecto.
  - Se evita 'acepción de personas' como fórmula eclesiástica rígida porque el hebreo aquí es específicamente judicial y pide una expresión más contextual.
