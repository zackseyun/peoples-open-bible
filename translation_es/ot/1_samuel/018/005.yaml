translation:
  language: es
  text: David salió adondequiera que Saúl lo enviaba, y actuaba sabiamente[a]. Así que Saúl lo puso al frente de los hombres de guerra, y esto fue bueno[b] ante los ojos de todo el pueblo y también ante los ojos de los siervos de Saúl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «prosperaba» / «tenía éxito». El hebreo שׂכל en hifil puede incluir tanto la prudencia como el éxito resultante.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «agradó a todo el pueblo y también a los siervos de Saúl». El hebreo puede referirse a David mismo, a su nombramiento, o a toda la situación recién descrita.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salía
  alternatives_spanish:
  - salió
  - iba y venía
  lexicon: HALOT
  rationale: El hebreo expresa movimiento de salida en un marco narrativo repetido; en español, 'salía' comunica mejor la acción iterativa o habitual que 'salió', sin perder el sentido básico de ir a cumplir encargos.
- source_word: בְּכֹל אֲשֶׁר יִשְׁלָחֶנּוּ שָׁאוּל
  english_pob_choice: wherever Saul sent him
  chosen_spanish: a dondequiera que Saúl lo enviaba
  alternatives_spanish:
  - dondequiera que Saúl lo enviara
  - en todo lo que Saúl lo enviaba a hacer
  lexicon: HALOT
  rationale: La frase hebrea tiene valor distributivo y de repetición. 'A dondequiera que' conserva bien ese matiz en español y evita una paráfrasis más interpretativa.
- source_word: יַשְׂכִּיל
  english_pob_choice: he acted wisely
  chosen_spanish: se portaba con prudencia
  alternatives_spanish:
  - obraba sabiamente
  - tenía éxito
  - prosperaba
  lexicon: HALOT
  rationale: El hifil de שׂכל puede expresar prudencia con resultado favorable. 'Se portaba con prudencia' recoge la conducta sabia sin cerrar indebidamente la posible implicación de éxito que el inglés deja en nota.
- source_word: וַיְשִׂמֵהוּ
  english_pob_choice: appointed him
  chosen_spanish: lo puso
  alternatives_spanish:
  - lo nombró
  - lo estableció
  - lo designó
  lexicon: HALOT
  rationale: El verbo שׂים en construcción administrativa con עַל puede significar 'poner' o 'designar'. Aquí se conserva la literalidad básica 'lo puso' para no perder el valor verbal del hebreo, mientras que el contexto de autoridad queda aclarado por la frase siguiente.
- source_word: עַל אַנְשֵׁי הַמִּלְחָמָה
  english_pob_choice: over the men of war
  chosen_spanish: al frente de los hombres de guerra
  alternatives_spanish:
  - sobre los hombres de guerra
  - sobre los guerreros
  - al mando de los hombres de guerra
  lexicon: HALOT
  rationale: '''Hombres de guerra'' preserva el colectivo militar del hebreo. ''Al frente de'' comunica con naturalidad la relación de autoridad implícita en עַל sin exigir una glosa más larga.'
- source_word: וַיִּיטַב
  english_pob_choice: this was good
  chosen_spanish: esto agradó
  alternatives_spanish:
  - fue bueno
  - esto fue bueno
  - esto fue agradable
  lexicon: HALOT
  rationale: Aunque el inglés dice 'this was good', en español 'agradó' transmite con naturalidad el juicio favorable expresado por el hebreo en el marco idiomático 'ante los ojos de'.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: a los ojos de
  alternatives_spanish:
  - ante
  - a la vista de
  lexicon: HALOT
  rationale: Se conserva el idiomatismo hebreo con una equivalencia idiomática directa y clara en español.
- source_word: עַבְדֵי שָׁאוּל
  english_pob_choice: Saul’s servants
  chosen_spanish: los siervos de Saúl
  alternatives_spanish:
  - los servidores de Saúl
  - los servidores de la corte de Saúl
  - los funcionarios de Saúl
  lexicon: HALOT
  rationale: '''Siervos'' reproduce de manera transparente el término hebreo עבדים y evita especificar ''funcionarios'', que estrecharía indebidamente el alcance del vocablo.'
theological_decisions:
- issue: 'Alcance de וַיִּיטַב: ¿describir a David, su nombramiento o la situación completa?'
  english_pob_reading: The Hebrew may refer either to David himself, to his appointment, or to the whole situation just described.
  chosen_spanish_reading: esto agradó
  alternative_spanish_readings:
  - él agradó
  - su nombramiento agradó
  - agradó todo aquello
  rationale: La redacción española mantiene la misma amplitud referencial que la nota inglesa. 'Esto agradó' permite abarcar la conducta de David, su ascenso y la situación entera, sin forzar un único antecedente.
  doctrine_reference: Ninguna; decisión de referencia textual y sintáctica.
translation_notes:
  revision_awareness: Se revisó el expediente inglés y no se reportaron cambios de última revisión; el acuerdo de revisión fue alto y sin observaciones, así que la redacción española sigue de cerca la lectura auditada sin introducir ajustes no motivados.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo exigiera; aquí no aparece.
  - Se usó «siervos» para עבדים en consonancia con el valor social del término, sin sustituirlo por «funcionarios».
  - 'La estructura narrativa conserva el paralelismo del hebreo: salida/encargo, acción sabia, colocación sobre los hombres de guerra y evaluación favorable pública.'
