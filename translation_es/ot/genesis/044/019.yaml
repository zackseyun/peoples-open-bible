review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: tratamiento deferente («Mi señor»), verbo de preguntar, autodesignación de los hermanos ante el gobernante, fórmula introductoria («diciendo») y la pregunta sobre la existencia de padre o hermano. Sin embargo, se aparta del rastro auditado del POB en עֲבָדָיו, donde el inglés eligió explícitamente «his servants» por tratarse de habla cortesana deferente, no una afirmación sobre estatus servil literal en este punto.'
  spanish_quality_summary: 'El español es claro y natural, pero «sus esclavos» suena más duro y menos idiomático para este registro de corte que «sus siervos» o «sus servidores». «Mi señor preguntó a sus siervos, diciendo: “¿Tienen un padre o un hermano?”» conserva dignidad, legibilidad e intención contextual.'
  glossary_alignment: 'No hay conflicto con los términos teológicos principales del proyecto. Sí hay una cuestión léxica contextual con עֶבֶד: aunque el valor por defecto del proyecto favorece «esclavo» cuando el inglés POB escogió «slave», aquí el inglés documentó una excepción contextual y eligió «servants». Por tanto, en español corresponde una excepción similar, preferiblemente «siervos».'
  issues:
  - severity: medium
    issue: «sus esclavos» no sigue la decisión contextual auditada para עֲבָדָיו
    rationale: El POB inglés documentó «his servants» específicamente porque los hermanos se refieren a sí mismos en lenguaje cortesano deferente. Traducir «sus esclavos» reintroduce una fuerza léxica que el audit trail decidió no enfatizar en este contexto.
  - severity: low
    issue: Registro cortesano mejor con «siervos» que con «esclavos»
    rationale: En español bíblico y eclesial, «siervos» encaja mejor como autodesignación respetuosa ante un superior y evita una aspereza innecesaria sin perder fidelidad contextual.
  revised_spanish_text: 'Mi señor preguntó a sus siervos, diciendo: «¿Tienen un padre o un hermano?»'
  revision_rationale: Se reemplaza «esclavos» por «siervos» para alinearse con la decisión contextual del POB inglés sobre עֲבָדָיו en habla cortesana deferente. El resto del versículo es fiel al hebreo y natural en español, por lo que no requiere cambios ni notas.
