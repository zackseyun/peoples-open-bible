translation:
  language: es
  text: Cuando el pueblo llegó al bosque, he aquí, había miel fluyendo[a], pero nadie llevó su mano a su boca[b][c], porque el pueblo temía el juramento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una corriente de miel». La expresión hebrea dice literalmente «un ir/flujo de miel».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «nadie llevó su mano a su boca». Es un modismo que significa que nadie comió de esa miel.'
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice «el juramento»; en contexto se refiere al juramento anterior de Saúl, que en la práctica imponía una sanción de maldición a quien comiera antes de la tarde (véase 1 Sam. 14:24).
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - entró
  lexicon: HALOT
  rationale: El wayyiqtol de בוא expresa llegada o entrada. «Llegó» comunica el movimiento con naturalidad en español; «entró» sería posible, pero «al bosque» ya marca el destino, por lo que «llegó» evita cargar de más la escena.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - los soldados
  lexicon: HALOT
  rationale: Aunque el contexto es militar, el hebreo usa עם, un sustantivo más amplio que «soldados». «El pueblo» conserva ese alcance y además refleja bien la repetición del sujeto en el versículo.
- source_word: הַיַּעַר
  english_pob_choice: the forest
  chosen_spanish: el bosque
  alternatives_spanish:
  - el monte arbolado
  - los árboles
  lexicon: HALOT
  rationale: יַעַר designa una zona boscosa. En español, «bosque» es claro y natural; «forestal» no sería idiomático aquí.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí que
  alternatives_spanish:
  - miren
  - y he aquí
  lexicon: HALOT
  rationale: La partícula הנה introduce un elemento llamativo. «He aquí que» conserva el tono de deíxis y atención sin convertirlo en una paráfrasis explicativa.
- source_word: הֵלֶךְ דְּבָשׁ
  english_pob_choice: a flow of honey
  chosen_spanish: un flujo de miel
  alternatives_spanish:
  - una corriente de miel
  - miel que fluía
  lexicon: HALOT
  rationale: הלך con דבש presenta una imagen de miel que va o fluye. «Flujo de miel» mantiene la construcción nominal y la ambigüedad del hebreo, evitando decidir de más entre «corriente» y una paráfrasis verbal.
- source_word: וְאֵין מַשִּׂיג יָדוֹ אֶל פִּיו
  english_pob_choice: but no one put his hand to his mouth
  chosen_spanish: pero nadie llevó su mano a su boca
  alternatives_spanish:
  - pero nadie acercó su mano a su boca
  - pero nadie alzó la mano para comer
  lexicon: HALOT
  rationale: El hebreo dice literalmente que no alcanzaba su mano a su boca; es un modismo para comer. En español, «llevó su mano a su boca» conserva la imagen concreta y sigue siendo comprensible como eufemismo de no comer.
- source_word: כִּי יָרֵא הָעָם
  english_pob_choice: because the people feared
  chosen_spanish: porque el pueblo temía
  alternatives_spanish:
  - porque el pueblo tenía miedo
  - porque la gente temía
  lexicon: HALOT
  rationale: ירא aquí expresa temor real ante la transgresión del juramento. «Temía» mantiene el verbo y el sujeto colectivos del hebreo sin añadir un objeto inexistente en la frase.
- source_word: הַשְּׁבֻעָה
  english_pob_choice: the oath
  chosen_spanish: el juramento
  alternatives_spanish:
  - el voto
  - el juramento solemne
  lexicon: HALOT
  rationale: שְׁבוּעָה puede traducirse «juramento» o «oath». En español, «juramento» comunica con claridad la fuerza vinculante del acto sin recurrir a «voto», que podría sonar menos preciso. No se eligió «maldición» porque la forma léxica del texto es «juramento», aunque el contexto implique consecuencias de maldición.
theological_decisions:
- issue: Alcance de הַשְּׁבֻעָה en contexto narrativo
  english_pob_reading: the oath; in context this refers to Saul's earlier oath that effectively placed a curse on anyone who ate before evening
  chosen_spanish_reading: el juramento; en contexto remite al juramento previo de Saúl, con consecuencias de maldición para quien comiera antes de la tarde
  alternative_spanish_readings:
  - la maldición
  - el voto
  rationale: Se conserva «juramento» en el texto principal para respetar la forma hebrea y la decisión auditada de la POB inglesa. La nota de contexto puede explicitar que ese juramento funciona como prohibición coercitiva con efecto de maldición, sin reemplazar el término base.
  doctrine_reference: Narrative context in 1 Samuel 14:24-26
translation_notes:
  revision_awareness: Se revisó la nota inglesa auditada y no se detectaron cambios de fondo respecto del pasaje; se mantuvo la equivalencia óptima con atención a las tres decisiones léxicas marcadas en el aparato inglés (flujo de miel, modismo de la mano a la boca, y juramento en contexto).
  spanish_consistency_notes:
  - Se prefirió «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «el pueblo» de manera constante para reflejar עם y evitar introducir «soldados» como restricción no presente en el hebreo.
  - «Flujo de miel» conserva la imagen nominal del original y evita una interpretación más libre que «miel estaba fluyendo».
  - Se mantuvo «juramento» en el cuerpo para no borrar la tensión contextual entre juramento y maldición, que queda explicada en la nota.
  - El registro busca ser bíblico y moderno, evitando arcaísmos innecesarios sin perder la solemnidad narrativa.
