translation:
  language: es
  text: Y consagraron a destrucción[a] todo lo que había en la ciudad, desde el hombre hasta la mujer, desde el joven hasta el anciano, y aun el buey, la oveja y el asno, al filo de la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los destruyeron por completo» o «los pusieron bajo el anatema». El verbo hebreo alude a consagrar algo irrevocablemente a la destrucción bajo el ḥerem.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחֲרִימוּ
  english_pob_choice: they devoted to destruction
  chosen_spanish: consagraron a destrucción
  alternatives_spanish:
  - los destruyeron por completo
  - los pusieron bajo el anatema
  - los dedicaron irrevocablemente a destrucción
  lexicon: HALOT
  rationale: El verbo חרם en hifil es técnico y expresa poner algo bajo ḥerem, con destino irrevocable de destrucción. «Consagraron a destrucción» conserva la idea de dedicación irrevocable y evita rebajar el término a una simple aniquilación. «Anatema» sería posible, pero en español puede sonar eclesiástico o poco transparente en este contexto.
- source_word: כָּל אֲשֶׁר בָּעִיר
  english_pob_choice: everything that was in the city
  chosen_spanish: todo lo que había en la ciudad
  alternatives_spanish:
  - todo lo que estaba en la ciudad
  - todo cuanto había en la ciudad
  lexicon: HALOT
  rationale: La expresión abarca de forma total a los habitantes y animales que luego se especifican. «Todo lo que había» suena natural en español y mantiene la amplitud del hebreo sin introducir precisión innecesaria.
- source_word: מֵאִישׁ וְעַד אִשָּׁה
  english_pob_choice: from man to woman
  chosen_spanish: desde el hombre hasta la mujer
  alternatives_spanish:
  - de hombre a mujer
  - desde varón hasta mujer
  lexicon: HALOT
  rationale: Se conserva la construcción distributiva y el merismo de sexo. «Hombre» y «mujer» reflejan bien el alcance inclusivo del original en un registro claro para español contemporáneo.
- source_word: מִנַּעַר וְעַד זָקֵן
  english_pob_choice: from young to old
  chosen_spanish: desde el joven hasta el anciano
  alternatives_spanish:
  - de joven a anciano
  - desde el muchacho hasta el viejo
  lexicon: HALOT
  rationale: Es un merismo de edad. «Joven» y «anciano» preservan el rango completo y mantienen un tono digno; «anciano» evita la aspereza de «viejo».
- source_word: וְעַד שׁוֹר וָשֶׂה וַחֲמוֹר
  english_pob_choice: and even ox and sheep and donkey
  chosen_spanish: y aun el buey, la oveja y el asno
  alternatives_spanish:
  - e incluso el buey, la oveja y el asno
  - y también el buey, la oveja y el asno
  lexicon: HALOT
  rationale: La secuencia incluye también el ganado. «Y aun» reproduce bien el valor inclusivo enfatizado en la revisión inglesa («and even») y mantiene el ritmo de la lista. «Buey» es el equivalente idiomático natural de שׁוֹר en este contexto.
- source_word: לְפִי חָרֶב
  english_pob_choice: by the edge of the sword
  chosen_spanish: al filo de la espada
  alternatives_spanish:
  - a filo de espada
  - por la espada
  lexicon: HALOT
  rationale: La imagen hebrea literal es «la boca de la espada», pero el español natural y fiel es «al filo de la espada». Conserva la violencia del modismo sin volverlo opaco.
theological_decisions:
- issue: Terminología de ḥerem en un contexto de juicio bélico
  english_pob_reading: devoted to destruction
  chosen_spanish_reading: consagraron a destrucción
  alternative_spanish_readings:
  - los destruyeron por completo
  - los pusieron bajo el anatema
  rationale: La POB inglesa preserva el valor técnico de חרם y no lo reduce a un mero «destruir». En español, «consagrar» mantiene la idea de apartar irrevocablemente para un fin bajo juicio, aunque la combinación con «destrucción» suena marcada; se conserva esa tensión porque corresponde al peso teológico del término.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La redacción inglesa fue revisada desde «and up to ox and sheep and donkey» a «and even ox and sheep and donkey» para mayor naturalidad. La versión española refleja ese matiz inclusivo con «y aun» sin perder la fuerza del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Consagraron a destrucción» preserva la tensión técnica de ḥerem y evita sustituirla por una neutralización interpretativa.
  - Se usan sustantivos singulares colectivos donde el hebreo es distributivo o merístico, para evitar forzar pluralizaciones innecesarias.
