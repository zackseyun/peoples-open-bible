revisions:
- from: Oholá[a] se prostituyó mientras estaba bajo mí[b], y codició[c] a sus amantes, los asirios que estaban cerca.
  to: Oholá se prostituyó mientras estaba bajo mi autoridad[a], y se apasionó por sus amantes[b], los asirios que estaban cerca[c].
  rationale: Se ajusta «mientras estaba bajo mí» a «mientras estaba bajo mi autoridad» para lograr español natural y mantener el sentido relacional de תַּחְתַּי, respaldado por la nota alternativa. Se reemplaza «codició» por «se apasionó por» para reflejar mejor el matiz de deseo intenso y lujurioso de עגב en español idiomático. Se añade nota para la construcción final con קְרוֹבִים porque el inglés auditado preservó esa alternativa significativa. Se elimina la nota innecesaria sobre la transliteración del nombre.
