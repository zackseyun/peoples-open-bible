revisions:
- from: 'Y cuando este pueblo[a], o un profeta, o un sacerdote te pregunte, diciendo: «¿Cuál es el peso de Yahvé?» entonces les dirás[b]: «¿Qué peso? Yo los desecharé», declara Yahvé.'
  to: 'Y cuando este pueblo[a], o un profeta, o un sacerdote te pregunte, diciendo: «¿Cuál es la carga de Yahvé?», entonces les dirás[b]: «¿Qué carga? Yo los abandonaré», declara Yahvé.'
  rationale: Se ajusta «peso» a «carga» para representar mejor מַשָּׂא en español bíblico y conservar el juego léxico con «oráculo/mensaje». Se cambia «desecharé» por «abandonaré» para reflejar con más fidelidad וְנָטַשְׁתִּי y sonar más natural al aplicarse a personas. También se pule la redacción de las notas para mayor claridad y para alinearlas con la revisión inglesa que prefiere la lectura elíptica «¿Qué carga?» sin cerrar indebidamente la ambigüedad.
