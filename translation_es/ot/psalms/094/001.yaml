translation:
  language: es
  text: ¡Oh Dios de venganza[a], Yahvé, Dios de venganza, resplandece[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «Dios de venganzas ... Dios de venganzas». El plural hebreo probablemente intensifica la idea de retribución divina.
    reason: lexical_alternative
  - marker: b
    text: O «aparece» / «muéstrate». El verbo puede denotar una manifestación visible de Dios; «resplandece» conserva ese sentido epifánico.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios poderoso
  - dios
  lexicon: HALOT
  rationale: En este contexto vocativo, אֵל funciona como título de invocación divina. En español, «Dios» es la forma natural y reverente; «dios» sería incorrecto por minúscula y ambigüo, y «Dios poderoso» añade matiz no exigido por el texto.
- source_word: נְקָמ֥וֹת
  english_pob_choice: vengeance
  chosen_spanish: venganza
  alternatives_spanish:
  - venganzas
  - actos de venganza
  - hechos vengadores
  lexicon: HALOT
  rationale: El plural hebreo intensifica la idea de retribución divina. En español, el singular abstracto «venganza» comunica mejor la construcción vocativa «Dios de venganza» que un plural literal, que sonaría forzado; así se conserva la fuerza sin perder la referencia a retribución judicial.
- source_word: יְהוָ֑ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre propio del pacto como «Yahvé», siguiendo la norma del proyecto para el Tetragrámaton, en vez de sustituirlo por un título.
- source_word: הוֹפִֽיַע
  english_pob_choice: shine forth
  chosen_spanish: resplandece
  alternatives_spanish:
  - aparece
  - manifiéstate
  - muéstrate
  lexicon: HALOT
  rationale: El verbo en esta forma imperativa apunta a una manifestación divina visible. «Resplandece» conserva el matiz epifánico de «shine forth» mejor que un simple «aparece», y evita hacer más explícita la idea reflexiva de lo que exige el hebreo.
theological_decisions:
- issue: Lenguaje de venganza divina
  english_pob_reading: Retain 'God of vengeance' without softening
  chosen_spanish_reading: Mantener «Dios de venganza» sin suavizarlo a «Dios de justicia»
  alternative_spanish_readings:
  - Dios de justicia
  - Dios vengador
  rationale: El hebreo invoca a Dios en relación con la venganza/retribución. «Justicia» sería una interpretación teológica legítima, pero menos directa; «Dios vengador» desplaza el sustantivo original hacia un adjetivo. Se preserva así la tensión teológica del texto.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La versión inglesa auditada se mantuvo sin cambios en la última revisión; no hubo ajustes posteriores que afecten la elección española.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se conserva el vocativo repetido «Dios ... Dios» para reflejar la estructura hebrea paralela.
  - «Venganza» se mantiene como sustantivo abstracto para no diluir la fuerza retributiva del original.
  - Las notas a pie de página conservan la alternativa literal plural y la opción verbal de manifestación visible.
