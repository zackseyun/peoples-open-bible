translation:
  language: es
  text: Pero, de entre todas las madres[a], la madre de los siete fue la más entregada a sus hijos, ella que, mediante siete embarazos, tenía profundamente plantado en ella el afecto por ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «la madre de los siete». El contexto identifica a esos siete como sus hijos.
    reason: lexical_alternative
lexical_decisions:
- source_word: πασῶν δὲ τῶν μητέρων
  english_pob_choice: But of all mothers
  chosen_spanish: Pero, de entre todas las madres
  alternatives_spanish:
  - Pero entre todas las madres
  - Y de todas las madres
  lexicon: LSJ
  rationale: La expresión introduce una comparación superlativa y un contraste suave; «de entre todas las madres» conserva el matiz partitivo de πασῶν δὲ τῶν μητέρων con español natural.
- source_word: ἡ τῶν ἑπτὰ μήτηρ
  english_pob_choice: the mother of the seven
  chosen_spanish: la madre de los siete
  alternatives_spanish:
  - la madre de los siete hijos
  - la madre de los siete hijos varones
  lexicon: LSJ
  rationale: El griego dice literalmente «la madre de los siete». Como el contexto inmediato identifica a los siete como sus hijos, se conserva la formulación breve sin añadir «hijos» en el texto principal.
- source_word: φιλοτεκνωτέρα
  english_pob_choice: the most devoted to her children
  chosen_spanish: la más afectuosa con sus hijos
  alternatives_spanish:
  - la más devota con sus hijos
  - la más amorosa con sus hijos
  - la que más amaba a sus hijos
  lexicon: LSJ
  rationale: El comparativo expresa una afección excepcional hacia los hijos. «Afectuosa» comunica bien el valor relacional y conserva la idea de mayor intensidad frente a otras madres, sin añadir una nota religiosa ajena al griego.
- source_word: ἑπτὰ κυοφορίαις
  english_pob_choice: through seven pregnancies
  chosen_spanish: mediante siete embarazos
  alternatives_spanish:
  - por medio de siete embarazos
  - a través de siete embarazos
  - en siete embarazos
  lexicon: LSJ
  rationale: κυοφορία refiere el estado de gestación/embarazo. «Mediante siete embarazos» mantiene el sentido concreto y causal del griego, evitando una paráfrasis más general como «al dar a luz».
- source_word: τὴν πρὸς αὐτοὺς ἐπιφυτευομένην φιλοστοργίαν
  english_pob_choice: had her affection for them deeply planted within her
  chosen_spanish: tenía profundamente injertado dentro de sí el cariño hacia ellos
  alternatives_spanish:
  - tenía plantado dentro de sí el afecto hacia ellos
  - tenía arraigado dentro de sí el afecto hacia ellos
  - tenía injertado dentro de sí el amor hacia ellos
  lexicon: LSJ
  rationale: ἐπιφυτευομένην sugiere algo plantado o injertado; «injertado» reproduce mejor la imagen que «arraigado», y «profundamente» refleja la intensificación. φιλοστοργία se vierte como «cariño» para expresar el afecto familiar natural sin sobrerreligiosizar el término.
- source_word: πρὸς αὐτούς
  english_pob_choice: for them
  chosen_spanish: hacia ellos
  alternatives_spanish:
  - para ellos
  - por ellos
  lexicon: LSJ
  rationale: La preposición marca orientación de la afección. «Hacia ellos» es idiomático en español y conserva la dirección relacional del griego.
theological_decisions:
- issue: El texto no nombra explícitamente hijos en la frase «la madre de los siete»; la identificación depende del contexto inmediato.
  english_pob_reading: The mother of the seven. The context identifies them as her seven sons.
  chosen_spanish_reading: la madre de los siete
  alternative_spanish_readings:
  - la madre de los siete hijos
  - la madre de los siete hijos varones
  rationale: Se mantiene la literalidad del griego y la misma cautela del POB en inglés, que conserva la expresión abreviada en el cuerpo principal y deja la identificación contextual para la nota.
  doctrine_reference: Principio de suficiencia contextual y transparencia textual
- issue: φιλοστοργία puede entenderse como afecto natural/familiar, no como amor general abstracto ni como un término técnico eclesiástico.
  english_pob_reading: affection
  chosen_spanish_reading: cariño
  alternative_spanish_readings:
  - afecto
  - tierno afecto
  - amor familiar
  rationale: «Cariño» comunica afecto familiar natural en español contemporáneo y evita cargar el término con resonancias doctrinales que el griego no exige aquí.
  doctrine_reference: Semántica contextual de φιλοστοργία
translation_notes:
  revision_awareness: Se siguió la última revisión del POB en inglés, que eliminó «motherly» antes de «affection» para ajustarse mejor al griego. En español, por la relación natural entre la madre y el afecto hacia los hijos, se optó por «cariño» sin añadir un modificador equivalente a «materno», manteniendo la precisión lexical y la fluidez.
  spanish_consistency_notes:
  - Se conserva Yahvé como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se mantiene una dicción formal y readable, evitando arcaísmos innecesarios.
  - 'Se tradujo el comparativo con valor superlativo implícito de manera natural en español: «la más afectuosa».'
  - La imagen de «injertado» reproduce mejor el participio ἐπιφυτευομένην que opciones más débiles como «plantado» o «arraigado».
