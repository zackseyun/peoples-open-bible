translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés: «Extiende tu mano y agarra[a] su cola». Él extendió su mano y lo agarró, y se convirtió en una vara[b] en su mano.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «agarra su cola» o «tómala por la cola».
    reason: lexical_alternative
  - marker: b
    text: O «bastón».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El hebreo usa el nombre propio del pacto, no un título. Se conserva como «Yahvé», siguiendo el principio POB de no ocultar el Tetragrámaton. «Jehová» queda descartado por no ser la forma base elegida por el proyecto; «Yahweh» es posible como transliteración, pero en español «Yahvé» es más natural y ya funciona como forma reconocible del nombre divino.
- source_word: שְׁלַח
  english_pob_choice: Reach out
  chosen_spanish: Extiende
  alternatives_spanish:
  - Alarga
  - Tiende
  lexicon: HALOT
  rationale: En este contexto físico con «tu mano», el imperativo pide un movimiento concreto. «Extiende» comunica bien la acción sin sonar forzado en español. «Alarga» o «tiende» son posibles, pero menos idiomáticos aquí.
- source_word: יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu brazo
  - la mano tuya
  lexicon: HALOT
  rationale: Correspondencia directa y natural del sustantivo corporal con sufijo de segunda masculina singular. No requiere ajuste semántico.
- source_word: וֶאֱחֹז
  english_pob_choice: take hold of
  chosen_spanish: agarra
  alternatives_spanish:
  - toma
  - sujeta
  - afirma
  lexicon: HALOT
  rationale: El hebreo pide acción manual de asir. «Agarra» conserva la fuerza concreta del verbo y mantiene el paralelo narrativo con la acción de Moisés. «Toma» es más débil; «sujeta» y «afirma» no expresan igual bien el acto de asir.
- source_word: בִּזְנָבוֹ
  english_pob_choice: its tail
  chosen_spanish: su cola
  alternatives_spanish:
  - por la cola
  - de la cola
  lexicon: HALOT
  rationale: El sustantivo significa literalmente «cola». En español, con animales, «cola» es natural y fiel. La preposición hebrea puede dar matiz instrumental o local, pero con el verbo de tomar se entiende bien como objeto directo en español. «Su cola» evita una perífrasis pesada.
- source_word: וַיִּשְׁלַח יָדוֹ
  english_pob_choice: he reached out his hand
  chosen_spanish: extendió su mano
  alternatives_spanish:
  - alargó su mano
  - tendió su mano
  lexicon: HALOT
  rationale: Se mantiene la correspondencia con el mandato anterior usando una fórmula española natural. «Extendió» refleja היטב el movimiento ordenado. «Alargó» es posible, pero menos elegante.
- source_word: וַיַּחֲזֶק בּוֹ
  english_pob_choice: took hold of it
  chosen_spanish: lo agarró
  alternatives_spanish:
  - lo sujetó
  - se aferró a él
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es חזק, en esta construcción narra la acción de agarrar con firmeza. «Lo agarró» reproduce el acto de modo directo y mantiene la continuidad con el mandato de tomar la cola. «Lo sujetó» es más técnico; «se aferró a él» introduce un matiz menos preciso.
- source_word: לְמַטֶּה
  english_pob_choice: a staff
  chosen_spanish: una vara
  alternatives_spanish:
  - un bastón
  - un cayado
  - un bastón de pastor
  lexicon: HALOT
  rationale: El término hebreo puede referirse a vara/vara de mando o bastón. En español, «vara» conserva mejor la amplitud semántica y la tradición bíblica del objeto de Moisés que «bastón». «Cayado» sería más específico para pastor; aquí el contexto favorece una vara transformada, no necesariamente un cayado pastoral.
- source_word: בְּכַפּוֹ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en su palma
  - en la palma de su mano
  lexicon: HALOT
  rationale: כַּף puede referirse a la palma/mano. En español, «en su mano» es idiomático y suficientemente preciso. «En su palma» sería demasiado específico para la expresión ordinaria del texto.
theological_decisions:
- issue: Nombre divino יְהוָה en el discurso directo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se mantiene el nombre propio del pacto en lugar de una sustitución reverencial. El uso de «Yahvé» en el texto principal sigue la terminología base del proyecto y preserva la transparencia del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La auditoría inglesa no reporta revisiones aplicadas y la comparación cruzada indica alto acuerdo; por eso se conserva la estructura semántica básica del verso sin cambios textuales relevantes. Se ajusta únicamente la naturalidad del español, manteniendo las decisiones clave: nombre divino explícito, mandato físico directo, y el resultado transformativo con «se convirtió».'
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» en consonancia con el estándar del proyecto.
  - Se usa «vara» como equivalente contextual de מַטֶּה, con nota alternativa para «rod/vara».
  - «Agarró» conserva la fuerza concreta de אָחַז/חזק sin introducir tecnicismos innecesarios.
  - 'La secuencia verbal española reproduce el paralelismo narrativo del hebreo: mandato, obediencia, transformación.'
