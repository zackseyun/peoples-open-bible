translation:
  language: es
  text: Pero en cuanto a mí[a], este misterio me ha sido revelado, no porque en mí haya más sabiduría que en todos los vivientes, sino para que se dé a conocer al rey la interpretación, y para que conozcas los pensamientos de tu corazón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘este secreto’. El arameo puede referirse a un asunto oculto, pero en Daniel suele tener el sentido de un misterio revelado por Dios.
    reason: lexical_alternative
  - marker: b
    text: O ‘los pensamientos de tu mente’. Literalmente, ‘los pensamientos de tu corazón’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנָה
  english_pob_choice: But as for me
  chosen_spanish: Pero en cuanto a mí
  alternatives_spanish:
  - Y en cuanto a mí
  - Pero yo
  lexicon: HALOT
  rationale: La partícula introductoria con el pronombre independiente marca un cambio de foco y contraste. ‘Pero en cuanto a mí’ preserva ese giro enfático sin sonar áspero en español.
- source_word: בְחָכְמָה דִּי אִיתַי בִּי
  english_pob_choice: not because of wisdom that is in me
  chosen_spanish: no por una sabiduría que haya en mí
  alternatives_spanish:
  - no a causa de una sabiduría que hay en mí
  - no por sabiduría alguna que tenga en mí
  lexicon: HALOT
  rationale: El valor de ב aquí expresa base o causa. ‘No por una sabiduría que haya en mí’ conserva la negación causal y la idea de una sabiduría interna como fuente de la revelación.
- source_word: מִן כָּל חַיַּיָּא
  english_pob_choice: more than in all the living
  chosen_spanish: más que en todos los vivientes
  alternatives_spanish:
  - más que en todos los que viven
  - más que en toda la gente viva
  lexicon: HALOT
  rationale: Se conserva el comparativo explícito. ‘Vivientes’ refleja de manera directa el sustantivo arameo y mantiene la amplitud humana del contexto.
- source_word: רָזָא דְנָה
  english_pob_choice: this mystery
  chosen_spanish: este misterio
  alternatives_spanish:
  - este secreto
  - este enigma
  lexicon: HALOT
  rationale: En Daniel, רָז suele designar un asunto oculto revelado por Dios. ‘Misterio’ preserva mejor ese matiz revelatorio que ‘secreto’ en español actual.
- source_word: גֱּלִי לִי
  english_pob_choice: has been revealed to me
  chosen_spanish: me ha sido revelado
  alternatives_spanish:
  - fue revelado a mí
  - se me ha revelado
  lexicon: HALOT
  rationale: La pasiva destaca que Daniel recibe la revelación, no la produce. ‘Me ha sido revelado’ es claro y formal en español bíblico contemporáneo.
- source_word: לָהֵן
  english_pob_choice: but in order that
  chosen_spanish: sino para que
  alternatives_spanish:
  - sino a fin de que
  - pero con el fin de que
  lexicon: HALOT
  rationale: Aquí introduce propósito en contraste con la negación previa. ‘Sino para que’ transmite de forma natural el valor adversativo-final de la partícula.
- source_word: עַל דִּבְרַת דִּי
  english_pob_choice: in order that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: El giro idiomático expresa finalidad. ‘Para que’ es la forma más natural en español y mantiene la función de la cláusula sin añadir matiz causal indebido.
- source_word: פִשְׁרָא
  english_pob_choice: the interpretation
  chosen_spanish: la interpretación
  alternatives_spanish:
  - la explicación
  - el sentido
  lexicon: HALOT
  rationale: En Daniel, פשר es el término técnico para la interpretación de sueños o misterios. ‘Interpretación’ conserva ese uso especializado.
- source_word: לְמַלְכָּא יְהוֹדְעוּן
  english_pob_choice: may be made known to the king
  chosen_spanish: se dé a conocer al rey
  alternatives_spanish:
  - sea dado a conocer al rey
  - se haga saber al rey
  lexicon: HALOT
  rationale: El verbo plural funciona aquí con valor impersonal/pasivo. ‘Se dé a conocer’ comunica bien el resultado buscado sin introducir sujeto no expresado.
- source_word: וְרַעְיוֹנֵי לִבְבָךְ
  english_pob_choice: the thoughts of your heart
  chosen_spanish: los pensamientos de tu corazón
  alternatives_spanish:
  - los pensamientos de tu mente
  - las reflexiones de tu corazón
  lexicon: HALOT
  rationale: Se mantiene ‘corazón’ para respetar la antropología bíblica, donde incluye el ámbito del pensamiento y la intención. ‘Pensamientos’ traduce רַעְיוֹנֵי de manera precisa y natural.
- source_word: תִּנְדַּע
  english_pob_choice: you may know
  chosen_spanish: conozcas
  alternatives_spanish:
  - sabes
  - llegues a saber
  lexicon: HALOT
  rationale: En español, el subjuntivo en la cláusula final expresa correctamente la finalidad del texto. ‘Conozcas’ encaja con ‘para que’ y conserva el sentido prospectivo.
theological_decisions:
- issue: Humildad de Daniel frente al origen de la revelación
  english_pob_reading: The mystery was revealed not because Daniel had superior wisdom to all the living, but because God intended the interpretation to be made known to the king.
  chosen_spanish_reading: El misterio no se atribuye a una superioridad humana de Daniel, sino a la iniciativa reveladora de Dios para dar a conocer la interpretación al rey.
  alternative_spanish_readings:
  - El misterio fue revelado a Daniel por su propia sabiduría superior.
  - La revelación se explica por la sabiduría excepcional de Daniel.
  rationale: 'La comparación ‘más que en todos los vivientes’ debe permanecer visible para no suavizar la negación de toda autosuficiencia humana. La traducción conserva la tensión teológica: revelación recibida, no lograda.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Antropología bíblica de ‘corazón’
  english_pob_reading: Retain 'heart' rather than replacing it with 'mind'.
  chosen_spanish_reading: Conservar ‘corazón’ como sede de pensamientos e intenciones.
  alternative_spanish_readings:
  - mente
  - intelecto
  rationale: ‘Corazón’ evita reducir la expresión a una categoría psicológica moderna. En español bíblico es comprensible y mantiene la amplitud semítica del término.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa: se privilegia una cláusula de finalidad formal (‘para que’) en lugar de una simple expresión resultativa. Se mantuvieron la comparación ‘más que en todos los vivientes’ y la antropología de ‘corazón’, sin resolverlas en términos más modernos que borrarían matices del arameo.'
  spanish_consistency_notes:
  - Se mantiene ‘misterio’ para רָז siguiendo el uso técnico de Daniel en POB.
  - Se conserva ‘corazón’ en vez de ‘mente’ por coherencia con otras traducciones bíblicas de la obra y con la antropología semítica.
  - ‘Para que’ y ‘conozcas’ reflejan bien la finalidad del hebreo/arameo sin introducir una causalidad distinta.
  - El registro es formal y publicable, con puntuación española y sin calcos innecesarios.
