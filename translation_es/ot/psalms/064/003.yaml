translation:
  language: es
  text: Escóndeme del consejo secreto[a] de los malhechores, del tumulto[b] de los que obran maldad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de la conspiración secreta de los malhechores». El hebreo סוֹד puede referirse a consejo confidencial, círculo íntimo o plan secreto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de la turba/conmoción de los que obran maldad». El hebreo רִגְשָׁה sugiere una agitación hostil o un alboroto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּסְתִּירֵנִי
  english_pob_choice: Hide me
  chosen_spanish: Líbrame de
  alternatives_spanish:
  - Escóndeme de
  - Cúbreme de
  - Ocúltame de
  lexicon: HALOT
  rationale: El hebreo es una petición directa a Dios para ser puesto a salvo de algo hostil. En español, 'Líbrame de' comunica mejor la idea de rescate/protección en una súplica natural y digna, sin perder el valor petitorio del verbo.
- source_word: מִסּוֹד
  english_pob_choice: from the secret counsel
  chosen_spanish: la secreta consulta
  alternatives_spanish:
  - el secreto consejo
  - la secreta conspiración
  - el secreto plan
  lexicon: HALOT
  rationale: סוֹד puede significar consejo confidencial, círculo íntimo o deliberación secreta. 'Consulta' conserva la idea de deliberación/council sin sonar institucional como 'consejo' en algunos contextos e integra bien el matiz de secreto.
- source_word: מְרֵעִים
  english_pob_choice: evildoers
  chosen_spanish: los malhechores
  alternatives_spanish:
  - los hacedores de mal
  - los perversos
  - los malvados
  lexicon: HALOT
  rationale: El participio describe a personas que hacen mal. 'Malhechores' mantiene el sentido activo y resulta claro en español bíblico contemporáneo.
- source_word: מֵרִגְשַׁת
  english_pob_choice: from the tumult
  chosen_spanish: del tumulto
  alternatives_spanish:
  - de la conmoción
  - del alboroto
  - de la agitación
  lexicon: HALOT
  rationale: רִגְשָׁה transmite una agitación ruidosa o un gentío tumultuoso. 'Tumulto' conserva bien el ruido hostil y la sensación de desorden colectivo.
- source_word: פֹּעֲלֵי אָוֶן
  english_pob_choice: workers of wickedness
  chosen_spanish: de los que hacen iniquidad
  alternatives_spanish:
  - de los obradores de maldad
  - de los que practican el mal
  - de los hacedores de iniquidad
  lexicon: HALOT
  rationale: La construcción expresa a quienes practican אָוֶן, término que en este contexto apunta a maldad/iniquidad. 'Los que hacen iniquidad' conserva la estructura activa y evita repetir 'malhechores' con una sinonimia demasiado fuerte, manteniendo la variedad del hebreo.
translation_notes:
  revision_awareness: La versión sigue de cerca el hebreo y el auditorio inglés POB, manteniendo la doble idea de deliberación secreta y agitación hostil. Se adoptó una solución española más natural que 'escóndeme' para expresar la súplica de protección, sin perder el valor de ocultamiento.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no porque aparezca en este versículo, sino como norma general del proyecto cuando corresponda.
  - '''Iniquidad'' se usa para אָוֶן en la segunda cola, preservando el tono bíblico y la distinción frente a ''malhechores''.'
  - '''Consulta'' intenta reflejar el matiz de consejo deliberativo de סוֹד sin imponer una lectura institucional rígida.'
