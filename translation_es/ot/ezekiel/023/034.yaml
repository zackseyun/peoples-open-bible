    rationale: El hebreo se refiere a trozos rotos de un recipiente de barro. «Pedazos» es demasiado amplio; «fragmentos» en texto y «tiestos» en nota conservan mejor la imagen documentada.
  revised_spanish_text: Beberás de ella y la agotarás, y roerás sus fragmentos[a], y te arrancarás los pechos; porque yo he hablado, declara el Señor Yahvé.
