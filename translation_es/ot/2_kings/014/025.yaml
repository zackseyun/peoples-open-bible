translation:
  language: es
  text: Él restauró el límite de Israel desde Lebo-hamat[a] hasta el mar de la Arabá[b], conforme a la palabra de Yahvé, el Dios de Israel, que había hablado por medio de su siervo Jonás hijo de Amitai, el profeta, que era originario de Gat-hefer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «desde la entrada de Hamat».
    reason: lexical_alternative
  - marker: b
    text: Es decir, probablemente el mar Muerto.
    reason: alternative_reading
lexical_decisions:
- source_word: הֵשִׁיב
  english_pob_choice: restored
  chosen_spanish: restauró
  alternatives_spanish:
  - hizo volver
  - recobró
  lexicon: HALOT
  rationale: El verbo hifil de שוב aquí expresa la acción de restablecer un límite territorial; «restauró» comunica bien esa idea en español sin perder el matiz de reconstitución geográfica.
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - borde
  - territorio
  lexicon: HALOT
  rationale: En este contexto no se trata de una frontera política moderna sino de un límite territorial; «límite» conserva la idea de demarcación de manera natural en español.
- source_word: מִלְּבוֹא חֲמָת
  english_pob_choice: from Lebo-hamath
  chosen_spanish: desde Lebo-hamat
  alternatives_spanish:
  - desde la entrada de Hamat
  - desde Lebo-Hamat
  lexicon: HALOT
  rationale: El sintagma funciona como designación geográfica fija; se mantiene el topónimo transliterado para no sobreinterpretar. La forma «Lebo-hamat» sigue la transliteración del inglés auditado, adaptada a ortografía española.
- source_word: יָם הָעֲרָבָה
  english_pob_choice: the Sea of the Arabah
  chosen_spanish: el mar de la Arabá
  alternatives_spanish:
  - el mar de la Arabá
  - el mar Muerto
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea en forma transparente. «Arabá» mantiene el nombre geográfico bíblico; aunque la referencia probable sea el mar Muerto, el texto principal no la impone.
- source_word: כִּדְבַר
  english_pob_choice: according to the word of
  chosen_spanish: conforme a la palabra de
  alternatives_spanish:
  - según la palabra de
  - de acuerdo con la palabra de
  lexicon: HALOT
  rationale: «Conforme a la palabra de» reproduce bien el hebraísmo y expresa adecuación a una declaración previa de Dios.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: «Yahvé», no una sustitución por título. La forma con acento agudo es la adaptación habitual en español.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  lexicon: HALOT
  rationale: Correspondencia directa y natural; mantiene el genitivo de pertenencia/covenio sin añadir explicaciones innecesarias.
- source_word: בְּיַד
  english_pob_choice: by the hand of
  chosen_spanish: por medio de
  alternatives_spanish:
  - por la mano de
  - mediante
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «por mano de», en español «por medio de» transmite la instrumentalidad de modo idiomático y claro, sin perder la mediación profética.
- source_word: עַבְדּוֹ
  english_pob_choice: his servant
  chosen_spanish: su siervo
  alternatives_spanish:
  - su esclavo
  - su servidor
  lexicon: HALOT
  rationale: En un contexto profético, «siervo» es la opción idiomática y teológicamente adecuada en español; «esclavo» sería demasiado fuerte para este uso, y «servidor» debilita la relación de pertenencia.
- source_word: יוֹנָה
  english_pob_choice: Jonah
  chosen_spanish: Jonás
  alternatives_spanish:
  - Jonah
  lexicon: HALOT
  rationale: Nombre propio bíblico normalizado en español.
- source_word: בֶן אֲמִתַּי
  english_pob_choice: son of Amittai
  chosen_spanish: hijo de Amitai
  alternatives_spanish:
  - hijo de Amittay
  - hijo de Amittai
  lexicon: HALOT
  rationale: Se traduce el parentesco de forma directa y se adapta el nombre propio a una transliteración española sencilla.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  lexicon: HALOT
  rationale: Título apposicional directo y transparente.
- source_word: מִגַּת הַחֵפֶר
  english_pob_choice: from Gath-hepher
  chosen_spanish: de Gat-hefer
  alternatives_spanish:
  - desde Gat-hefer
  lexicon: HALOT
  rationale: La preposición de origen se expresa naturalmente con «de» en español cuando identifica procedencia. Se mantiene el topónimo transliterado.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se conserva el nombre propio divino según la norma del proyecto, evitando la sustitución por un título. «Yahvé» es la forma española estable para esa transliteración.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Identificación de יָם הָעֲרָבָה
  english_pob_reading: the Sea of the Arabah
  chosen_spanish_reading: el mar de la Arabá
  alternative_spanish_readings:
  - el mar Muerto
  rationale: La traducción principal mantiene la expresión hebrea sin fijar en el cuerpo del texto la identificación geográfica probable. Así se preserva la tensión entre literalidad y referencia histórica.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto base en inglés y el expediente auditado muestran alta concordancia y no requieren revisiones sustantivas; se conservaron las decisiones ya establecidas para el nombre divino, el topónimo Lebo-hamath y la expresión geográfica Sea of the Arabah, adaptándolas a un español publicable sin alterar el sentido documentado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה según el estándar del proyecto.
  - Se evitó «SEÑOR» como sustitución del nombre divino.
  - «Lebo-hamat» y «Gat-hefer» conservan la forma toponímica del original, con adaptación ortográfica española mínima.
  - «Siervo» se mantuvo por el contexto profético; no se usó «esclavo».
  - «Mar de la Arabá» preserva la forma hebrea, mientras la nota aclara la identificación probable.
