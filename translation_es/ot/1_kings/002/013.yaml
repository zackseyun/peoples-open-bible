translation:
  language: es
  text: 'Entonces Adonías, hijo de Haguit, vino a Betsabé[a], la madre de Salomón, y ella dijo: «¿Vienes en paz?» Y él dijo: «En paz».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Es tu venida en paz?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - fue
  lexicon: HALOT
  rationale: El hebreo בוא puede equivaler a 'venir' o 'ir' según el punto de vista. Aquí, igual que en el inglés POB, el movimiento se presenta desde la perspectiva del encuentro con Betsabé; 'vino' es natural en español y conserva esa dirección narrativa.
- source_word: אֲדֹנִיָּהוּ
  english_pob_choice: Adonijah
  chosen_spanish: Adonías
  alternatives_spanish:
  - Adonijah
  lexicon: transliteración tradicional española
  rationale: En español bíblico, el nombre se recibe comúnmente como 'Adonías'. Mantiene la identificación personal sin afectar el contenido.
- source_word: בֶן חַגֵּית
  english_pob_choice: son of Haggith
  chosen_spanish: hijo de Haguit
  alternatives_spanish:
  - hijo de Haggit
  lexicon: patrón filial nominal
  rationale: La construcción genitiva se vierte de forma directa con 'hijo de'. 'Haguit' sigue una transliteración española más estable y legible.
- source_word: בַּת שֶׁבַע
  english_pob_choice: Bathsheba
  chosen_spanish: Betsabé
  alternatives_spanish:
  - Bat-seba
  lexicon: transliteración tradicional española
  rationale: El nombre propio se adapta a la forma española más reconocible y usada en contextos eclesiales, sin perder el referente histórico.
- source_word: אֵם שְׁלֹמֹה
  english_pob_choice: the mother of Solomon
  chosen_spanish: la madre de Salomón
  alternatives_spanish:
  - madre de Salomón
  lexicon: HALOT
  rationale: 'La expresión appositiva del hebreo se mantiene literalmente para conservar el énfasis relacional y narrativo: Betsabé es identificada por su vínculo maternal con Salomón.'
- source_word: הֲשָׁלוֹם בֹּאֶךָ
  english_pob_choice: Do you come in peace?
  chosen_spanish: ¿Vienes en paz?
  alternatives_spanish:
  - ¿Tu llegada es en paz?
  - ¿Vienes pacíficamente?
  lexicon: HALOT
  rationale: El hebreo formula una pregunta breve sobre la calidad/intentión de la llegada; en español, '¿Vienes en paz?' conserva la interrogación directa y la carga de sospecha implícita, sin expandirla innecesariamente.
- source_word: שָׁלוֹם
  english_pob_choice: In peace
  chosen_spanish: En paz
  alternatives_spanish:
  - Paz
  - Pacíficamente
  lexicon: HALOT
  rationale: La respuesta es elíptica y breve. 'En paz' preserva la concisión del hebreo y responde de modo natural a la pregunta anterior.
translation_notes:
  revision_awareness: 'Coincide con el sentido del hebreo y con el audit trail inglés: el verbo de movimiento se mantiene perspectival (''vino''), la pregunta reproduce el matiz idiomático de שָׁלוֹם en una llegada potencialmente sospechosa, y la respuesta conserva la brevedad elíptica del original. No se observan revisiones textuales relevantes en el expediente inglés.'
  spanish_consistency_notes:
  - Se usó 'Betsabé' como forma española habitual; el marcador de nota se colocó solo en el nombre por corresponder al punto donde el POB inglés añadió la alternativa literal.
  - Se mantuvo el paralelismo diálogo-pregunta-respuesta con puntuación española estándar.
  - No se introdujo terminología eclesiástica ajena al texto; el registro es sobrio y narrativo.
