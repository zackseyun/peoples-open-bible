review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: futuro profético, comparación marcial, imagen de pisotear el cieno en la batalla, causalidad por la presencia de Yahvé y humillación de la caballería enemiga. Sin embargo, dos decisiones debilitan la fidelidad fina al expediente POB: «como [a] poderosos» suena incompleto en español y no preserva bien la imagen masculina/marcial de גִּבֹּרִים; y «jinetes de caballos» es demasiado literal y poco idiomático para רֹכְבֵי סוּסִים, donde «jinetes» basta y preserva el sentido militar.'
  spanish_quality_summary: La frase es mayormente clara y digna, pero «como poderosos» resulta forzada y poco natural tras «serán como». También hay un espacio incorrecto antes de la nota [a]. «Pondrán en vergüenza» es comprensible, aunque «avergonzarán» sería más natural; no obstante, puede mantenerse para reflejar el causativo. «Jinetes de caballos» suena torpe en español e innecesariamente pesado.
  glossary_alignment: Se alinea correctamente con la política del proyecto al usar «Yahvé» para יְהוָה. La nota sobre גִּבֹּרִים preserva la alternativa y explica el rasgo masculino, pero el texto principal debería reflejar mejor la decisión POB con «hombres poderosos[a]» o una opción equivalente; dado el expediente inglés, «hombres poderosos[a]» es la mejor correspondencia. No hay otros conflictos terminológicos mayores.
  issues:
  - severity: medium
    issue: «como [a] poderosos» es gramatical y estilísticamente deficiente
    rationale: En español, la secuencia queda elíptica y poco natural. Además, no conserva con suficiente claridad la imagen masculina explícita de גִּבֹּרִים documentada en el expediente inglés.
  - severity: medium
    issue: La nota [a] está mal colocada con espacio previo
    rationale: El proyecto exige anclar la nota exactamente en el término o frase relevante. Debe ir pegada a la expresión correspondiente, por ejemplo «hombres poderosos[a]».
  - severity: low
    issue: «jinetes de caballos» es demasiado literal y poco idiomático
    rationale: Aunque formalmente cercano al hebreo, en español estándar «jinetes» ya comunica tropas montadas. La expresión actual suena redundante y resta legibilidad sin añadir precisión relevante.
  revised_spanish_text: Serán como hombres poderosos[a], pisoteando el cieno de las calles en batalla; pelearán, porque Yahvé está con ellos, y pondrán en vergüenza a los jinetes.
  revised_footnotes:
  - marker: a
    text: O «como guerreros». El hebreo usa literalmente un término masculino, «hombres poderosos», para combatientes valientes.
    reason: lexical_alternative
  revision_rationale: Se ajusta גִּבֹּרִים a «hombres poderosos[a]» para preservar mejor la imagen masculina y marcial documentada por el POB y mejorar la naturalidad del español. Se corrige la colocación de la nota y se simplifica רֹכְבֵי סוּסִים a «jinetes», más idiomático en español sin pérdida de sentido. El resto del versículo puede mantenerse por ser fiel y claro.
