translation:
  language: es
  text: En la boca de los necios está su corazón[a], pero el corazón de los sabios es su boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa: «la boca de los sabios está en su corazón»; es decir, los sabios someten su habla al control interior. El griego es breve y antitético, y esta alternativa explicita el sentido implícito.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - dentro de
  - sobre
  lexicon: BDAG
  rationale: 'Se conserva la preposición literal para mantener la imagen proverbial: el corazón del necio está ''en'' su boca, es decir, sale de inmediato en palabras.'
- source_word: στόματι
  english_pob_choice: mouth
  chosen_spanish: boca
  alternatives_spanish:
  - palabras
  - habla
  lexicon: BDAG
  rationale: '''Boca'' preserva la metáfora concreta del texto griego y evita volver abstracta la antítesis sapiencial.'
- source_word: μωρῶν
  english_pob_choice: fools
  chosen_spanish: necios
  alternatives_spanish:
  - insensatos
  - fatuos
  lexicon: BDAG
  rationale: '''Necios'' es natural en español bíblico y comunica la falta de sensatez sapiencial sin sonar demasiado técnico.'
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  lexicon: BDAG
  rationale: '''Corazón'' conserva la antropología bíblica del centro interior de la persona, incluyendo pensamiento y disposición.'
- source_word: σοφῶν
  english_pob_choice: the wise
  chosen_spanish: los sabios
  alternatives_spanish:
  - los prudentes
  - los entendidos
  lexicon: BDAG
  rationale: '''Los sabios'' reproduce el plural sustantivado y mantiene el paralelismo proverbial.'
- source_word: καρδία δὲ σοφῶν στόμα αὐτῶν
  english_pob_choice: but the heart of the wise is their mouth
  chosen_spanish: pero el corazón de los sabios es su boca
  alternatives_spanish:
  - pero la boca de los sabios es su corazón
  - pero los sabios tienen su boca en su corazón
  lexicon: BDAG
  rationale: Se mantiene la estructura antitética y la tersura del griego transmitido. La redacción conserva la inversión proverbial sin interpretarla en exceso; la alternativa más idiomática explicita el sentido, pero la principal deja visible la forma del original.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo y no muestran revisiones aplicadas; la traducción española sigue la misma decisión principal de conservar la estructura proverbial tersa, dejando la lectura interpretativa en nota.
  spanish_consistency_notes:
  - Se usa 'corazón' de forma antropológica, no meramente emocional.
  - Se mantiene 'boca' para conservar la imagen concreta y el paralelismo antitético.
  - '''Necios'' y ''sabios'' siguen el registro sapiencial breve y reconocible en español.'
  - La nota a recoge la alternativa interpretativa equivalente a la del audit trail inglés.
