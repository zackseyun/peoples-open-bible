  text: וּ/בְ/פָרִשְׂ/כֶ֣ם כַּפֵּי/כֶ֗ם אַעְלִ֤ים עֵינַ/י֙ מִ/כֶּ֔ם גַּ֛ם כִּֽי תַרְבּ֥וּ תְפִלָּ֖ה אֵינֶ֣/נִּי שֹׁמֵ֑עַ יְדֵי/כֶ֖ם דָּמִ֥ים מָלֵֽאוּ־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/001/015.yaml
  text: And when you spread out your palms[a], I hide my eyes from you; even though you multiply prayers, I am not listening[c][b]. Your hands are full of blood.
  footnotes:
  - marker: a
    text: Or 'your hands.' The Hebrew specifically says 'your palms,' evoking the gesture of uplifted hands in prayer.
    reason: lexical_alternative
  - marker: b
    text: Or 'I do not hear' / 'I will not listen.' The Hebrew expression can be rendered more formally, but here it conveys God's ongoing refusal to receive their prayers.
    reason: lexical_alternative
  - marker: c
    text: '''Blood'' may also be understood as ''bloodshed'' or ''bloodguilt.'''
    reason: lexical_alternative
