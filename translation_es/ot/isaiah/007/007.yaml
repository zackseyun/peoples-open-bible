  glossary_alignment: Buen uso de 'Yahvé' para יְהוִה dentro de אֲדֹנָי יְהוִה, en línea con la política del proyecto. 'Señor Yahvé' preserva ambos elementos del título compuesto. No hay conflictos con la terminología base; el ajuste propuesto se centra en naturalidad y en la colocación correcta de la nota.
