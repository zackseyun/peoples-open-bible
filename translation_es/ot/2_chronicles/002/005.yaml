    text: 'Hebreo: «los cielos y los cielos de los cielos», una expresión idiomática que señala los cielos más altos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para ofrecer incienso delante de él».'
    reason: lexical_alternative
  revision_rationale: Se ajusta el texto para seguir más de cerca la decisión POB sobre la expresión idiomática hebrea («los cielos, aun los cielos más altos») y para mejorar la naturalidad española en la segunda pregunta («¿quién soy yo para edificarle...?»). También se conserva la nota literal del hebreo y la alternativa sobre «ofrecer incienso».
