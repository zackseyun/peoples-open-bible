translation:
  language: es
  text: 'Y Yahvé dijo a Moisés: «Vuelve a poner la vara de Aarón delante del Testimonio, para que sea guardada como señal para los hijos rebeldes[a], a fin de poner término a sus murmuraciones contra mí[b], para que no mueran».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para los rebeldes» o «para los hijos de rebeldía».
    reason: lexical_alternative
  - marker: b
    text: «El Testimonio» probablemente se refiere al testimonio del pacto asociado con el arca; aquí se conserva la expresión hebrea concisa.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: Hebreo bíblico / convención POB
  rationale: 'Se sigue el criterio del proyecto para el Nombre divino: transliterarlo como «Yahvé» en el texto principal, en lugar de ocultarlo con una sustitución reverencial.'
- source_word: הָשֵׁב
  english_pob_choice: Put ... back
  chosen_spanish: Vuelve a poner
  alternatives_spanish:
  - Devuelve
  - Restituye
  lexicon: HALOT
  rationale: El imperativo hifil expresa restaurar el objeto a su lugar anterior; «vuelve a poner» es natural en español y conserva la idea de devolverlo a su sitio.
- source_word: מַטֵּה
  english_pob_choice: staff
  chosen_spanish: bastón
  alternatives_spanish:
  - vara
  - cetro
  lexicon: HALOT
  rationale: En este contexto el objeto funciona como vara/señal tribal o sacerdotal. «Bastón» comunica bien el soporte de madera sin volverlo demasiado técnico; se preserva la posibilidad de una vara ritual.
- source_word: לִפְנֵי הָעֵדוּת
  english_pob_choice: before the testimony
  chosen_spanish: delante del Testimonio
  alternatives_spanish:
  - ante el Testimonio
  - delante del arca del Testimonio
  lexicon: HALOT
  rationale: Se mantiene la concisión del hebreo. «Testimonio» se capitaliza para reflejar el referente tabernacular/covenantal sin expandirlo más allá de lo que dice el texto.
- source_word: לְמִשְׁמֶרֶת
  english_pob_choice: to be kept
  chosen_spanish: para que sea guardado
  alternatives_spanish:
  - para guardarlo
  - para su custodia
  lexicon: HALOT
  rationale: La forma expresa finalidad de conservación. «Sea guardado» reproduce la noción de preservación/custodia de manera idiomática.
- source_word: לְאוֹת
  english_pob_choice: as a sign
  chosen_spanish: como señal
  alternatives_spanish:
  - como signo
  - como testimonio
  lexicon: HALOT
  rationale: אוֹת suele equivaler a señal/signo. «Señal» es la opción más clara y natural en español.
- source_word: לִבְנֵי מֶרִי
  english_pob_choice: for the rebellious sons
  chosen_spanish: para los hijos rebeldes
  alternatives_spanish:
  - para los rebeldes
  - para los hijos de rebeldía
  lexicon: HALOT
  rationale: Se conserva la estructura filial marcada del hebreo («hijos de...») pero con una construcción española inteligible. «Hijos rebeldes» refleja el valor adjetival sin perder el matiz original.
- source_word: וּתְכַל
  english_pob_choice: so that you may put an end to
  chosen_spanish: a fin de poner término a
  alternatives_spanish:
  - para acabar con
  - para poner fin a
  lexicon: HALOT
  rationale: El verbo expresa hacer cesar algo. «Poner término a» mantiene el matiz de finalización y el valor final/resultativo del hebreo.
- source_word: תְּלוּנֹּתָם
  english_pob_choice: their grumblings
  chosen_spanish: sus murmuraciones
  alternatives_spanish:
  - sus quejas
  - sus protestas
  lexicon: HALOT
  rationale: «Murmuraciones» conserva mejor el tono recurrente del desierto que «quejas», y se alinea con el lenguaje bíblico del reclamo contra Yahvé.
- source_word: מֵעָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - de sobre mí
  - alejadas de mí
  lexicon: HALOT
  rationale: En este contexto idiomático, la preposición apunta a oposición dirigida contra Yahvé; «contra mí» es la equivalencia directa y natural.
- source_word: וְלֹא יָמֻתוּ
  english_pob_choice: and they may not die
  chosen_spanish: para que no mueran
  alternatives_spanish:
  - y no morirán
  - de modo que no mueran
  lexicon: HALOT
  rationale: 'Se vierte como resultado deseado: evitar la muerte. «Para que no mueran» expresa con claridad la finalidad del signo.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. La política del proyecto en español favorece «Yahvé» para mantener visible el Nombre del pacto sin sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión marcada לִבְנֵי מֶרִי
  english_pob_reading: the rebellious sons
  chosen_spanish_reading: los hijos rebeldes
  alternative_spanish_readings:
  - los rebeldes
  - el pueblo rebelde
  rationale: Se conserva la imagen hebrea filial marcada en vez de neutralizarla en «el pueblo». La forma elegida sigue siendo comprensible en español y respeta el énfasis lexical del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Referencia de הָעֵדוּת
  english_pob_reading: the testimony
  chosen_spanish_reading: el Testimonio
  alternative_spanish_readings:
  - el arca del Testimonio
  - el documento del pacto
  rationale: Se mantiene la concisión del hebreo. El contexto tabernacular permite entender que se trata del referente sagrado asociado al arca, pero el español no debe expandirlo sin base explícita en el verso.
  doctrine_reference: 'DOCTRINE.md: source-constrained rendering and tabernacle terminology'
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «sons of rebellion» por «rebellious sons» por naturalidad; en español se siguió esa misma naturalidad sin perder la estructura marcada del hebreo. También se respetó la concisión de «before the testimony» y la finalidad/resultativo de «so that you may put an end to... and they may not die».
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, de acuerdo con el estándar del proyecto.
  - «Testimonio» se conserva capitalizado para el referente sagrado tabernacular.
  - «Murmuraciones» mantiene el matiz bíblico de queja recurrente contra Dios.
  - La puntuación con comillas angulares y dos puntos sigue la norma española y delimita claramente el discurso directo.
