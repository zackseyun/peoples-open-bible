id: 2KI.3.11
reference: 2 Kings 3:11
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוֹשָׁפָ֗ט הַ/אֵ֨ין פֹּ֤ה נָבִיא֙ לַֽ/יהוָ֔ה וְ/נִדְרְשָׁ֥ה אֶת יְהוָ֖ה מֵ/אוֹת֑/וֹ וַ֠/יַּעַן אֶחָ֞ד מֵ/עַבְדֵ֤י מֶֽלֶךְ יִשְׂרָאֵל֙ וַ/יֹּ֔אמֶר פֹּ֚ה אֱלִישָׁ֣ע בֶּן שָׁפָ֔ט אֲשֶׁר יָ֥צַק מַ֖יִם עַל יְדֵ֥י אֵלִיָּֽהוּ־־־־־׃
translation:
  text: And Jehoshaphat said[a], “Is there no prophet of Yahweh here, that we may inquire of Yahweh by him?” Then one of the servants of the king of Israel answered and said, “Elisha son of Shaphat is here[b], who used to pour water on the hands of Elijah.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “that we may seek the LORD from him.” The sense is to inquire of the LORD by means of the prophet.
    reason: lexical_alternative
  - marker: b
    text: This expression likely refers to Elisha’s personal service to Elijah, preserving the Hebrew image of pouring water for handwashing.
    reason: cultural_note
lexical_decisions:
- source_word: הַאֵין
  chosen: Is there no
  alternatives:
  - Is there not
  lexicon: HALOT
  rationale: Idiomatic English rendering of the interrogative plus negation, preserving the force of Jehoshaphat's question without archaic stiffness.
- source_word: נָבִיא לַיהוָה
  chosen: prophet of the LORD
  alternatives:
  - prophet for the LORD
  - the LORD’s prophet
  lexicon: HALOT
  rationale: The lamed marks relation/belonging; 'of the LORD' is the most natural English expression for a prophet belonging to or speaking for YHWH. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's mandated default for the divine name, preserving reverential convention and consistency with the LXX/English tradition noted in DOCTRINE.md.
- source_word: וְנִדְרְשָׁה אֶת־יְהוָה מֵאֹתוֹ
  chosen: so that we may inquire of the LORD through him
  alternatives:
  - and let us seek the LORD from him
  - that we may consult the LORD by him
  lexicon: HALOT
  rationale: דרשׁ with אֶת־יְהוָה means to seek/inquire of the LORD, often by prophetic mediation. מֵאֹתוֹ refers to the prophet as the means of inquiry; 'through him' makes that mediation explicit in natural English without overinterpreting.
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Standard narrative rendering for ענה in dialogue sequence.
- source_word: אֶחָד מֵעַבְדֵי מֶלֶךְ יִשְׂרָאֵל
  chosen: one of the servants of the king of Israel
  alternatives:
  - one of the attendants of the king of Israel
  - one of the officials of the king of Israel
  lexicon: HALOT
  rationale: עֶבֶד here denotes a royal servant/attendant rather than chattel slavery; 'servants' fits court context and remains readable.
- source_word: פֹּה
  chosen: here
  alternatives:
  - present
  - in this place
  lexicon: HALOT
  rationale: Natural deictic rendering in English in both occurrences.
- source_word: בֶּן־שָׁפָט
  chosen: son of Shaphat
  lexicon: HALOT
  rationale: Standard patronymic rendering; names are transliterated per project philosophy.
- source_word: אֲשֶׁר יָצַק מַיִם עַל־יְדֵי אֵלִיָּהוּ
  chosen: who used to pour water on the hands of Elijah
  alternatives:
  - who poured water on the hands of Elijah
  - who was Elijah’s attendant
  lexicon: HALOT
  rationale: The idiom refers to personal attendance/service, likely in handwashing. The Hebrew image is preserved rather than replaced with an interpretive paraphrase like 'attendant.' 'Used to pour' conveys the likely customary past sense of the qatal in this descriptive relative clause.
