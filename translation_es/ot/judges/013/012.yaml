    rationale: El English POB conserva explícitamente la alternativa «or what he is to do» para «and his work». El español debe preservarla también, especialmente porque «su obra» puede resultar menos transparente.
  - severity: medium
    issue: La nota [b] actual introduce una explicación literal nueva en lugar de la alternativa léxica auditada para מִשְׁפַּט.
    rationale: Aunque no es errónea en sí, desplaza una nota más importante documentada en el expediente inglés y hace menos fiel el aparato crítico al audit trail.
