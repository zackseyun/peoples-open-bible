translation:
  language: es
  text: Así repartirán esta tierra entre ustedes, conforme a las tribus de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y repartirán esta tierra para ustedes, para las tribus de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחִלַּקְתֶּם
  english_pob_choice: So you shall divide
  chosen_spanish: Así repartirán
  alternatives_spanish:
  - Y repartirán
  - Así dividirán
  - Entonces repartirán
  lexicon: HALOT
  rationale: El verbo en piel de חלק expresa repartir/dividir una porción entre partes. «Repartirán» suena natural en español para la asignación de territorio, y «Así» refleja la continuidad/inferencia que el inglés POB expresó con «So».
- source_word: אֶת
  english_pob_choice: '[direct object marker, untranslated]'
  chosen_spanish: '[objeto directo tácito]'
  alternatives_spanish:
  - —
  lexicon: gramatical
  rationale: El marcador de objeto directo hebreo no tiene equivalente independiente en español y no se traduce.
- source_word: הָאָרֶץ הַזֹּאת
  english_pob_choice: this land
  chosen_spanish: esta tierra
  alternatives_spanish:
  - esta tierra
  - este país
  - este territorio
  lexicon: HALOT
  rationale: «Tierra» conserva el sentido territorial amplio de אֶרֶץ y es natural en un contexto de reparto de heredad; «territorio» sería posible, pero menos directo.
- source_word: לָכֶם
  english_pob_choice: among yourselves
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - para ustedes
  - a ustedes
  - entre vosotros
  lexicon: HALOT
  rationale: Aunque literalmente puede ser «para ustedes» o «para sí», en el contexto de distribución entre las tribus, «entre ustedes» comunica mejor la repartición interna sin introducir una paráfrasis excesiva.
- source_word: לְשִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: according to the tribes of Israel
  chosen_spanish: conforme a las tribus de Israel
  alternatives_spanish:
  - según las tribus de Israel
  - para las tribus de Israel
  - de acuerdo con las tribus de Israel
  lexicon: HALOT
  rationale: La preposición ל aquí marca relación/distribución en función de las divisiones tribales. «Conforme a» conserva bien esa relación normativa o de correspondencia sin confundirla con simple destinatario.
translation_notes:
  revision_awareness: El texto hebreo y el inglés auditado concuerdan estrechamente; no se registran revisiones aplicadas en la pasada más reciente, y la propuesta mantiene la misma estructura de reparto territorial con equivalentes españoles naturales.
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otras sustituciones porque no aparece el tetragrámaton en este versículo.
  - «Tierra» se mantiene por consistencia con el campo semántico territorial de אֶרֶץ en repartos de heredad.
  - «Repartirán» es preferido sobre «dividirán» por claridad idiomática en español, sin perder el valor distributivo del verbo hebreo.
