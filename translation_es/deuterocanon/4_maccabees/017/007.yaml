  to: Pero si nos fuera posible, como lo haría un pintor, retratar la piedad[a] de tu relato, ¿no se estremecerían los que la vieran al contemplar a una madre de siete hijos sufriendo diversas torturas hasta la muerte por causa de la piedad?
  rationale: Se reemplaza «como para un pintor» por «como lo haría un pintor» para lograr un español natural que conserve la comparación artística implícita en el griego. Se mantiene «piedad» como traducción consistente de εὐσέβεια, respaldada por la alternativa documentada en el POB inglés, y se deja una sola nota que explica ambas ocurrencias del término para evitar una anclación redundante.
