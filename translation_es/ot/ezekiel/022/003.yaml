    rationale: 'El POB inglés preserva dos matices relevantes: la posible lectura «para que venga su tiempo» con implicación de juicio, y el carácter despectivo de גִלּוּלִים. El revisor español debe conservarlos en notas, especialmente porque el desarrollador pide preservar alternativas significativas.'
  - severity: low
