- from: Por tanto[a], he aquí que yo estoy contra los profetas, declara Yahvé, los que roban mis palabras, cada uno de su prójimo.
  to: Por tanto[a], he aquí, yo estoy contra los profetas, declara Yahvé, los que roban mis palabras, cada uno de las de su prójimo.
  rationale: 'Se hizo una corrección mínima para mejorar la legibilidad española y hacer explícita la elipsis exigida por el hebreo: ''cada uno de las de su prójimo'' aclara que se trata de palabras tomadas de otro profeta. También se ajustó la puntuación de ''he aquí'' para un español más natural, manteniendo el tono solemne y la fuerza del original. Se conservó la nota alternativa, adaptándola al valor más formal de אִישׁ como ''cada hombre''.'
