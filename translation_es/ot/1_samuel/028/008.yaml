translation:
  language: es
  text: 'Así que Saúl se disfrazó y se puso ropa[a] distinta, y fue él, junto con dos hombres. Llegaron a la mujer de noche, y él le dijo: «Por favor, adivina para mí por medio de una médium[b], y haz subir para mí al que yo te diga».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vestidos». El hebreo habla de prendas de vestir distintas como parte del disfraz.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por medio de un espíritu familiar». El término hebreo se refiere a una médium asociada con consulta necromántica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְחַפֵּשׂ
  english_pob_choice: disguised himself
  chosen_spanish: se disfrazó
  alternatives_spanish:
  - cambió su apariencia
  - se ocultó bajo otra apariencia
  lexicon: HALOT
  rationale: El hitpael expresa una acción reflexiva para ocultar la identidad de Saúl. «Se disfrazó» es natural en español y conserva con precisión la idea de ocultamiento deliberado.
- source_word: בְּגָדִים אֲחֵרִים
  english_pob_choice: other clothes
  chosen_spanish: ropa distinta
  alternatives_spanish:
  - otras prendas
  - vestiduras diferentes
  lexicon: HALOT
  rationale: La frase indica un cambio de vestimenta como parte del disfraz. «Ropa distinta» mantiene el sentido simple y comunicativo sin cargar el texto con un registro más arcaico de lo necesario.
- source_word: וַיֵּלֶךְ הוּא וּשְׁנֵי אֲנָשִׁים עִמּוֹ
  english_pob_choice: and he went, he and two men with him
  chosen_spanish: y fue él con dos hombres que iban con él
  alternatives_spanish:
  - y fue con dos hombres
  - y él fue, con dos hombres con él
  lexicon: HALOT
  rationale: Se preserva el énfasis hebreo en «él» y en la compañía de los dos hombres, sin forzar una sintaxis pesada en español.
- source_word: לָיְלָה
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - en la noche
  lexicon: HALOT
  rationale: «De noche» comunica bien el momento y mantiene la insinuación de sigilo presente en el contexto.
- source_word: קָסֳמִי נָא לִי
  english_pob_choice: Please divine for me
  chosen_spanish: Por favor, practica la adivinación para mí
  alternatives_spanish:
  - Por favor, adivina para mí
  - Por favor, hazme adivinación
  lexicon: HALOT
  rationale: El verbo קסם se refiere a práctica adivinatoria. Se conserva ese campo semántico con un español claro; «por favor» refleja la partícula de cortesía נָא. He elegido «adivinación» en lugar de una forma más libre para no diluir el sentido técnico del hebreo.
- source_word: בָּאוֹב
  english_pob_choice: by a medium
  chosen_spanish: por medio de una medium
  alternatives_spanish:
  - por medio de una médium
  - por medio de una espiritista
  - por medio de un médium
  lexicon: HALOT
  rationale: El término hebreo designa a una intermediaria asociada con consulta necromántica. «Medium» es transparente para el lector moderno y mantiene la referencia funcional; se conserva una alternativa tradicional en nota.
- source_word: וְהַעֲלִי לִי
  english_pob_choice: and bring up for me
  chosen_spanish: y haz subir para mí
  alternatives_spanish:
  - y tráeme arriba
  - y saca para mí
  lexicon: HALOT
  rationale: El hiphil de עלה conserva la imagen de hacer subir a alguien/algo. «Haz subir» sigue de cerca el hebreo y evita interpretar de más el mecanismo narrativo.
- source_word: אֵת אֲשֶׁר אֹמַר אֵלָיִךְ
  english_pob_choice: the one whom I name to you
  chosen_spanish: al que yo te diga
  alternatives_spanish:
  - al que yo nombre para ti
  - al que yo te mencione
  lexicon: HALOT
  rationale: La cláusula identifica a la persona que Saúl especificará. «Al que yo te diga» es una forma natural en español y conserva la referencia personal sin introducir una paráfrasis excesiva.
theological_decisions:
- issue: Lenguaje necromántico sin resolver su eficacia o licitud
  english_pob_reading: Translate the request in straightforward narrative terms without adding interpretive qualifiers that either validate or debunk the practice.
  chosen_spanish_reading: Traducir la petición en términos directos («adivinación», «medium», «haz subir») sin añadir aclaraciones que juzguen el mecanismo de la práctica.
  alternative_spanish_readings:
  - «Finge hacerlo»
  - «contacta al espíritu del muerto»
  - «haz salir al difunto»
  rationale: El relato presenta la solicitud de Saúl en su propio marco conceptual. La traducción debe conservar esa tensión teológica sin resolverla mediante una glosa interpretativa que el hebreo no exige aquí.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió «divine for me» frente a «practice divination for me» por ser más directa y natural. En español se mantuvo la misma decisión de campo semántico con «practica la adivinación», porque esa forma preserva con claridad el valor técnico de קסם; el resto del versículo sigue de cerca la línea revisada y conserva el tono narrativo formal.
  spanish_consistency_notes:
  - Se usa «Saúl» como nombre propio sin transliteración adicional.
  - Se conserva «medium» en español como préstamo funcional, con nota alternativa para «espíritu familiar».
  - «Haz subir» mantiene la imagen hebrea del verbo עלה sin convertirlo en una paráfrasis doctrinal.
  - La puntuación y comillas siguen el uso editorial español estándar.
  - No se usa «SEÑOR» ni terminología litúrgica ajena al hebreo de este versículo.
