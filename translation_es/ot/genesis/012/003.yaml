- from: Y yo te bendeciré a los que te bendigan[a], y al que te maldiga[b] yo maldeciré; y en ti serán benditas todas las familias de la tierra.
  to: Y bendeciré a los que te bendigan[a], y al que te maldiga[b] yo maldeciré; y en ti serán bendecidas[c] todas las familias de la tierra.
  rationale: Se corrige un error gramatical mayor al inicio, se mejora la naturalidad de la pasiva final en español y se restaura la nota interpretativa sobre וְנִבְרְכוּ בְךָ para reflejar fielmente el expediente inglés y la tensión del hebreo. También se afina la nota sobre קלל para preservar el contraste léxico con ארר.
