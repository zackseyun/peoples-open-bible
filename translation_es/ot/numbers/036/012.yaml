  source_alignment_summary: 'El borrador español transmite bien el sentido general del versículo: matrimonio dentro del grupo de Manasés y permanencia de la herencia en la línea tribal paterna. Sin embargo, no preserva del todo la decisión léxica auditada sobre מִשְׁפָּחָה como estructura tribal (''clan'') y la nota al pie no refleja con precisión la alternativa documentada del inglés para מִמִּשְׁפְּחֹת.'
  spanish_quality_summary: El español es claro y natural, pero 'familias' debilita el marco técnico-tribal del pasaje, y 'esposas de las familias' suena algo menos preciso que una formulación con 'clanes' en este contexto legal-genealógico. El resto de la sintaxis es legible y digna.
  glossary_alignment: Conviene alinear מִשְׁפָּחָה con 'clan/clanes' en este versículo, ya que el propio expediente inglés lo privilegia para la estructura social israelita. Los nombres propios están bien. No hay conflictos con terminología teológica mayor del proyecto.
  issues:
  - severity: medium
    issue: Uso de 'familias' en lugar de 'clanes' para מִשְׁפָּחָה
    rationale: Aunque 'familias' es posible, el expediente inglés y la lógica tribal de Números 36 favorecen 'clanes' para mantener visible la jerarquía tribal israelita y evitar una lectura demasiado doméstica o moderna.
  - severity: medium
    issue: Nota al pie imprecisa respecto a la alternativa documentada para מִמִּשְׁפְּחֹת
    rationale: La nota actual ('O «de los clanes de»') no representa bien la alternativa auditada, que contrasta principalmente 'clanes' con 'familias' y también contempla el matiz 'de entre'. En español conviene conservar la nota como alternativa léxica real, no como explicación vaga de pertenencia.
  - severity: low
    issue: '''esposas de las familias'' suena menos idiomático en un contexto de unidades tribales'
    rationale: Con 'clanes', la expresión mantiene mejor el referente corporativo del hebreo y del inglés auditado; con 'familias' puede sonar más doméstica y menos técnica.
  revised_spanish_text: Llegaron a ser esposas[a] de los clanes de los hijos de Manasés, hijo de José, y su herencia permaneció con la tribu del clan de su padre.
