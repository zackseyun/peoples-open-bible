base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/009/029.yaml
  text: You warned them in order to bring them back to your law[a], but they acted presumptuously and did not listen to your commandments; they sinned against your judgments, by which a man shall live if he does them. They gave a stubborn shoulder, stiffened their neck[b], and would not listen.
  footnotes:
  - marker: a
    text: Or 'which if a person does, he shall live by them.' Hebrew 'man' is generic here, referring to any human being.
    reason: lexical_alternative
  - marker: b
    text: 'An allusion to Leviticus 18:5: obedience to God''s statutes is described as the path of life.'
    reason: cross_reference
