  text: וְ/אַתָּה֙ כִּֽי הִזְהַ֣רְתָּ רָשָׁ֔ע וְ/לֹא שָׁב֙ מֵֽ/רִשְׁע֔/וֹ וּ/מִ/דַּרְכּ֖/וֹ הָ/רְשָׁעָ֑ה ה֚וּא בַּ/עֲוֺנ֣/וֹ יָמ֔וּת וְ/אַתָּ֖ה אֶֽת נַפְשְׁ/ךָ֥ הִצַּֽלְתָּ־־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/003/019.yaml
