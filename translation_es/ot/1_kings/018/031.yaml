translation:
  language: es
  text: 'Y Elías tomó doce piedras, según el número de las tribus de los hijos[a] de Jacob, a quien había llegado la palabra de Yahvé, diciendo[b]: «Israel será tu nombre.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los hijos de Jacob». El hebreo dice literalmente «los hijos de Jacob».
    reason: lexical_alternative
  - marker: b
    text: 'Esto recuerda el renombramiento de Jacob por Dios en Génesis 32:28; 35:10: «Israel será tu nombre».'
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - agarró
  - recogió
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de לקח se expresa naturalmente en español con «tomó», que conserva el valor simple y directo del acto sin añadir matices ajenos.
- source_word: אֵלִיָּהוּ
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elias
  lexicon: Nombre propio tradicional en español
  rationale: En español bíblico y eclesial, la forma estable y más inteligible es «Elías».
- source_word: שְׁתֵּים עֶשְׂרֵה אֲבָנִים
  english_pob_choice: twelve stones
  chosen_spanish: doce piedras
  alternatives_spanish:
  - doce rocas
  lexicon: HALOT
  rationale: La unidad léxica literal es «piedras»; «rocas» sería más interpretativo y menos directo para el contexto del altar.
- source_word: כְּמִסְפַּר
  english_pob_choice: according to the number of
  chosen_spanish: según el número de
  alternatives_spanish:
  - conforme al número de
  - de acuerdo con el número de
  lexicon: HALOT
  rationale: «Según el número de» transmite con claridad la relación comparativa sin sonar forzado en español.
- source_word: שִׁבְטֵי
  english_pob_choice: tribes
  chosen_spanish: tribus
  alternatives_spanish:
  - clanes
  - tribales
  lexicon: HALOT
  rationale: En este contexto histórico-genealógico, «tribus» es el equivalente natural y preciso de שבט.
- source_word: בְנֵי יַעֲקֹב
  english_pob_choice: the sons of Jacob
  chosen_spanish: los hijos de Jacob
  alternatives_spanish:
  - los hijos varones de Jacob
  - los descendientes de Jacob
  lexicon: HALOT
  rationale: La traducción conserva la construcción filial masculina del hebreo. «Descendientes» suavizaría la forma y perdería parte de la fuerza literal.
- source_word: אֲשֶׁר הָיָה דְבַר־יְהוָה אֵלָיו
  english_pob_choice: to whom the word of Yahweh had come
  chosen_spanish: a quien había venido la palabra de Yahvé
  alternatives_spanish:
  - a quien le había venido la palabra de Yahvé
  - al que había llegado la palabra de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética «la palabra de Yahvé» y el movimiento verbal de venir/llegar. «Había venido» reproduce el sentido de una palabra divina que llega al destinatario.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: Convención POB para el Tetragrámaton
  rationale: Se mantiene la decisión del proyecto de traducir directamente el nombre divino por «Yahvé», sin el sustituto litúrgico «SEÑOR».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: El gerundio español introduce de forma natural la cita directa y reproduce la función del marcador discursivo hebreo.
- source_word: יִשְׂרָאֵל יִהְיֶה שְׁמֶךָ
  english_pob_choice: Israel shall be your name
  chosen_spanish: Israel será tu nombre
  alternatives_spanish:
  - Tu nombre será Israel
  - Israel será tu nombre para siempre
  lexicon: HALOT
  rationale: «Será tu nombre» mantiene la estructura semítica y el énfasis en el nuevo nombre, con un español claro y solemne.
theological_decisions:
- issue: Renombramiento de Jacob a Israel al citar la declaración divina
  english_pob_reading: 'This recalls God’s renaming of Jacob in Genesis 32:28; 35:10: “Israel shall be your name.”'
  chosen_spanish_reading: Israel será tu nombre.
  alternative_spanish_readings:
  - Tu nombre será Israel.
  - Israel será tu nombre para siempre.
  rationale: La frase se vierte como declaración nominativa directa, preservando la resonancia intertextual con Génesis sin explicitarla en el texto principal. La cita funciona como eco de la promesa de renombramiento, no como comentario explicativo.
  doctrine_reference: Génesis 32:28; 35:10
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Se conserva el nombre propio del pacto, coherente con la línea del proyecto y con la distinción entre el Tetragrámaton y títulos reverenciales genéricos.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin revisiones aplicadas; se mantiene la solución estable del inglés POB, trasladando su decisión sobre el nombre divino y la cita de renombramiento con formulación natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva «hijos de Jacob» para reflejar la literalidad del hebreo, con nota alternativa «los hijos de Jacob»/«los hijos de Jacob» equivalente en sentido pero útil si se desea explicitar la forma literal.
  - La sintaxis evita sobreexplicar el eco de Génesis dentro del texto principal, dejándolo para la nota cruzada.
  - «Doce piedras» y «según el número de» siguen de cerca el hebreo sin calco excesivo.
  - El verbo «vino»/«había venido» para la palabra divina preserva la fórmula profética estable en español bíblico.
