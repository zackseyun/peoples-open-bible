translation:
  language: es
  text: Pero, ya que tenemos la oportunidad[a], nos aferramos a la herencia[b] que es nuestra y de nuestros padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «mientras tenemos la oportunidad» o «teniendo un momento favorable». El griego καιρὸν ἔχοντες indica un tiempo oportuno, no simplemente tiempo en general.'
    reason: lexical_alternative
  - marker: b
    text: «Herencia» también puede implicar posesión hereditaria o patrimonio en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμεῖς δὲ
  english_pob_choice: But, we
  chosen_spanish: Pero,
  alternatives_spanish:
  - Pero nosotros
  - Y nosotros
  lexicon: LSJ
  rationale: δέ expresa contraste con lo anterior; «Pero» conserva el valor adversativo de modo natural en español. El sujeto queda implícito porque el verbo ya lo incluye.
- source_word: καιρὸν ἔχοντες
  english_pob_choice: since we have the opportunity
  chosen_spanish: teniendo la oportunidad
  alternatives_spanish:
  - mientras tenemos la oportunidad
  - ya que tenemos la oportunidad
  - teniendo un momento favorable
  lexicon: LSJ
  rationale: 'καιρός aquí no es tiempo cronológico general sino ocasión o momento oportuno. El participio se vierte de forma natural como una subordinada implícita en español: «teniendo la oportunidad».'
- source_word: ἀντεχόμεθα
  english_pob_choice: we are holding fast to
  chosen_spanish: nos aferramos a
  alternatives_spanish:
  - nos mantenemos firmes en
  - nos adherimos a
  - sostenemos firmemente
  lexicon: LSJ
  rationale: El medio comunica adhesión firme o retención continuada. «Nos aferramos a» conserva la fuerza de apego/resistencia sin convertir el matiz en una formulación puramente jurídica.
- source_word: τῆς κληρονομίας
  english_pob_choice: the inheritance
  chosen_spanish: la herencia
  alternatives_spanish:
  - la heredad
  - el patrimonio
  - la posesión heredada
  lexicon: LSJ
  rationale: κληρονομία significa herencia o posesión hereditaria. «Herencia» es transparente en español y permite el sentido familiar y territorial del contexto.
- source_word: ἡμῶν καὶ τῶν πατέρων ἡμῶν
  english_pob_choice: the inheritance of us and of our fathers
  chosen_spanish: de nosotros y de nuestros padres
  alternatives_spanish:
  - nuestra y de nuestros padres
  - que es de nosotros y de nuestros padres
  - de nuestra parte y de la de nuestros padres
  lexicon: LSJ
  rationale: 'El griego atribuye una sola «herencia» a dos grupos de poseedores: nosotros y nuestros padres. La construcción «la herencia de nosotros y de nuestros padres» preserva esa unidad sin sugerir dos herencias separadas.'
translation_notes:
  revision_awareness: La versión en inglés fue revisada desde una redacción que podía insinuar dos posesiones distintas a una forma que refleja más de cerca que hay un solo sustantivo griego gobernado por ambos posesivos. La propuesta española mantiene esa unidad con «la herencia de nosotros y de nuestros padres».
  spanish_consistency_notes:
  - Se conserva el contraste de δέ con «Pero».
  - Se evita «SEÑOR» u otra convención de ocultamiento porque el versículo no contiene el nombre divino.
  - «Herencia» sigue la decisión léxica del inglés POB para κληρονομία, evitando «patrimonio» en el texto principal por ser más marcado.
  - La colocación de los complementos («de nosotros y de nuestros padres») refleja la unidad del sustantivo singular en el griego.
