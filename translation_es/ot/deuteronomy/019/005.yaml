translation:
  language: es
  text: Pero si un hombre va con su prójimo al bosque para cortar leña, y su mano blande el hacha para derribar el árbol, y el hierro se sale del mango[a] y golpea a su prójimo, de modo que muere, podrá huir a una de estas ciudades y vivir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'el hierro se sale de la madera'. Aquí 'el hierro' se refiere a la cabeza del hacha, y 'la madera' al mango de madera.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲשֶׁר
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Y cualquiera que
  lexicon: HALOT
  rationale: Introduce una cláusula casuística legal en español. 'Pero si' conserva el giro condicional y el contraste con el contexto anterior sin volverla demasiado literaria.
- source_word: רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su vecino
  - su compañero
  lexicon: HALOT
  rationale: En contexto legal, רֵעַ designa al otro miembro de la comunidad o al semejante, no necesariamente al vecino geográfico. 'Prójimo' mantiene ese valor relacional amplio y es claro en español.
- source_word: בַיַּעַר
  english_pob_choice: into the forest
  chosen_spanish: al bosque
  alternatives_spanish:
  - al monte
  - al bosque
  lexicon: HALOT
  rationale: יַעַר se refiere a terreno arbolado; 'bosque' es el equivalente natural y digno en español. Se evita 'selva' por exceso de especificidad regional.
- source_word: לַחְטֹב עֵצִים
  english_pob_choice: to cut wood
  chosen_spanish: para cortar leña
  alternatives_spanish:
  - para cortar madera
  - para cortar árboles
  lexicon: HALOT
  rationale: La acción es cortar madera para uso práctico. 'Leña' comunica bien el trabajo de cortar madera en este escenario; 'madera' puede sonar más material que funcional.
- source_word: וְנִדְּחָה יָדוֹ
  english_pob_choice: his hand swings
  chosen_spanish: su mano empuña
  alternatives_spanish:
  - su mano se abate
  - su mano se mueve
  lexicon: HALOT
  rationale: El hebreo expresa el movimiento de la mano en el acto de blandir el hacha. 'Empuña' es natural en español para el manejo del hacha y conserva la imagen de acción deliberada dentro del accidente.
- source_word: בַגַּרְזֶן
  english_pob_choice: the axe
  chosen_spanish: el hacha
  alternatives_spanish:
  - el hacha
  - la azuela
  lexicon: HALOT
  rationale: גַּרְזֶן es el instrumento de corte aquí, claramente un hacha. 'Hacha' es la forma estándar y transparente en español.
- source_word: לִכְרֹת הָעֵץ
  english_pob_choice: to cut down the tree
  chosen_spanish: para derribar el árbol
  alternatives_spanish:
  - para cortar el árbol
  - para talar el árbol
  lexicon: HALOT
  rationale: כרת aquí es talar/felIar un árbol. 'Derribar' transmite el acto de abatir el árbol con claridad y fluidez; 'talar' también sería posible, pero 'derribar' mantiene la imagen del golpe de hacha.
- source_word: וְנָשַׁל הַבַּרְזֶל
  english_pob_choice: the iron head slips from the handle
  chosen_spanish: el hierro se sale del mango[a]
  alternatives_spanish:
  - el hierro se desprende del mango
  - el hierro se sale del mango
  lexicon: HALOT
  rationale: El hebreo dice literalmente que 'el hierro' se suelta/se desliza de la madera. Se conserva la metonimia 'el hierro' para el cabezal del hacha, tal como el audit trail inglés, y se explicita 'mango' para el elemento de madera implícito en el contexto. La formulación mantiene la tensión lexical entre el material y la pieza del hacha.
- source_word: מִן הָעֵץ
  english_pob_choice: from the handle
  chosen_spanish: del mango
  alternatives_spanish:
  - de la madera
  - del cabo
  lexicon: HALOT
  rationale: Literalmente es 'de la madera', pero por contexto se trata del mango/asta de madera del hacha. 'Mango' es la forma natural en español y evita una literalidad confusa.
- source_word: וּמָצָא אֶת רֵעֵהוּ
  english_pob_choice: and strikes his neighbor
  chosen_spanish: y golpea a su prójimo
  alternatives_spanish:
  - y alcanza a su prójimo
  - y hiere a su prójimo
  lexicon: HALOT
  rationale: Aunque מָצָא literalmente es 'hallar/encontrar', aquí en contexto de impacto significa que el hacha alcanza o da contra la persona. 'Golpea' recoge el resultado accidental del contacto sin forzar una reinterpretación demasiado técnica.
- source_word: וָמֵת
  english_pob_choice: so that he dies
  chosen_spanish: de modo que muere
  alternatives_spanish:
  - y muere
  - hasta morir
  lexicon: HALOT
  rationale: Aclara que la muerte es el resultado del golpe. 'De modo que' preserva el sentido consecuencial del hebreo y mantiene la relación causal del escenario legal.
- source_word: הוּא יָנוּס
  english_pob_choice: he may flee
  chosen_spanish: él podrá huir
  alternatives_spanish:
  - podrá huir
  - huirá
  lexicon: HALOT
  rationale: En este contexto legal, el verbo expresa la posibilidad/provisión de refugio. 'Podrá huir' comunica la autorización o posibilidad sin volverlo un mandato absoluto.
- source_word: אֶל אַחַת הֶעָרִים הָאֵלֶּה
  english_pob_choice: to one of these cities
  chosen_spanish: a una de estas ciudades
  alternatives_spanish:
  - a una de estas ciudades
  - a una de aquellas ciudades
  lexicon: HALOT
  rationale: Se refiere a las ciudades de refugio mencionadas en el contexto inmediato. 'Estas ciudades' conserva la referencia deíctica del hebreo.
- source_word: וָחָי
  english_pob_choice: and live
  chosen_spanish: y vivir
  alternatives_spanish:
  - y vivirá
  - para vivir
  lexicon: HALOT
  rationale: 'Expresa el resultado final buscado por la huida a la ciudad de refugio: seguir con vida. ''Y vivir'' mantiene la brevedad legal del hebreo.'
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de 'slips off the handle' a 'slips from the handle' para una formulación más natural y formal; la redacción española conserva esa misma relación de desprendimiento accidental del cabezal respecto del mango, evitando perder la metonimia del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'prójimo' para רֵעַ con el mismo valor relacional amplio que en el registro legal.
  - Se conserva la metonimia de 'el hierro' para el cabezal del hacha, como en el audit trail inglés, y se aclara en nota.
  - '''Bosque'' y ''ciudades'' siguen el registro legal narrativo sin arcaísmos innecesarios.'
  - '''Podrá huir'' conserva el matiz permisivo/protectivo del caso jurídico.'
