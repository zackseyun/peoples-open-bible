- from: Y el territorio de los cananeos fue desde Sidón[a], en dirección a Gerar, hasta Gaza; y en dirección a Sodoma, Gomorra, Admá y Zeboím, hasta Lasa.
  to: Y el límite de los cananeos fue desde Sidón, en dirección a Gerar, hasta Gaza; y en dirección a Sodoma, Gomorra, Admá y Zeboím, hasta Lasa[a].
  rationale: Se cambia 'territorio' por 'límite' para reflejar mejor גְּבוּל en una fórmula de frontera. Se mueve la nota al topónimo final, donde realmente pertenece la variante de לָשַׁע, y se corrige su contenido para que exprese una alternativa real a 'Lasa'. No se requiere adjudicación adicional, porque la corrección es textual y de alineación editorial, no doctrinal ni especialmente incierta.
