translation:
  language: es
  text: 'Pero ahora[a], así dice Yahvé, el que te creó, Jacob, y el que te formó, Israel: No temas, porque yo te he redimido; te he llamado por nombre; tú eres mío.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y ahora»; el hebreo puede marcar contraste o transición discursiva.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton con la forma ya fijada en el proyecto para español, evitando la sustitución por un título y manteniendo la transparencia del texto base.
- source_word: בֹּרַאֲךָ
  english_pob_choice: created you
  chosen_spanish: te creó
  alternatives_spanish:
  - tu Creador
  - te hizo
  lexicon: HALOT
  rationale: El participio de ברא se expresa verbalmente en aposición a Yahvé. "Te creó" preserva el acto creador y su valor distintivo frente a otros verbos de fabricación o hechura.
- source_word: וְיֹצֶרְךָ
  english_pob_choice: formed you
  chosen_spanish: te formó
  alternatives_spanish:
  - te modeló
  - te moldeó
  lexicon: HALOT
  rationale: יצר sugiere dar forma, con imagen artesanal. "Te formó" conserva el paralelismo con "te creó" y distingue adecuadamente ambos verbos.
- source_word: יַעֲקֹב / יִשְׂרָאֵל
  english_pob_choice: Jacob ... Israel
  chosen_spanish: Jacob ... Israel
  alternatives_spanish:
  - Jacobo ... Israel
  lexicon: Transliteración de nombres propios
  rationale: Se mantienen los nombres propios bíblicos en forma transliterada según la práctica del proyecto y para conservar el doble apelativo del pueblo del pacto.
- source_word: אַל תִּירָא
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  lexicon: HALOT
  rationale: La prohibición con ירא se expresa de forma breve y natural en español. "No temas" preserva el tono solemne y directo del hebreo.
- source_word: גְאַלְתִּיךָ
  english_pob_choice: I have redeemed you
  chosen_spanish: te he redimido
  alternatives_spanish:
  - te he rescatado
  - te he reivindicado
  lexicon: HALOT
  rationale: '"Redimido" conserva la fuerza pactal y redentora de גאל, sin reducirla a rescate meramente jurídico o económico.'
- source_word: קָרָאתִי בְשִׁמְךָ
  english_pob_choice: I have called you by name
  chosen_spanish: te he llamado por tu nombre
  alternatives_spanish:
  - te he llamado por nombre
  - te he llamado nominalmente
  lexicon: HALOT
  rationale: Se mantiene el sentido personal y particular del llamado. "Por tu nombre" refleja con naturalidad el sufijo posesivo del hebreo y el matiz de elección individual.
- source_word: לִי אָתָּה
  english_pob_choice: you are mine
  chosen_spanish: mío eres tú
  alternatives_spanish:
  - tú eres mío
  - me perteneces
  lexicon: HALOT
  rationale: La cláusula sin verbo expresa posesión/covenantidad. "Mío eres tú" preserva la tersura y el énfasis del hebreo, con un orden enfático más cercano al original.
- source_word: וְעַתָּה כֹּה אָמַר
  english_pob_choice: But now, thus says ...
  chosen_spanish: Pero ahora, así dice ...
  alternatives_spanish:
  - Y ahora, así dice ...
  - Pero ahora, de este modo dice ...
  lexicon: HALOT
  rationale: '"Pero ahora" capta el giro discursivo; "así dice" reproduce de manera formal la fórmula profética כֹּה אָמַר sin forzar una estructura arcaizante.'
theological_decisions:
- issue: Nombre divino frente a sustitución titular
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio divino para no ocultar el Tetragrámaton con un título. Esto preserva la transparencia del texto y la continuidad con la decisión auditada del inglés POB.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
- issue: Valor pactal de גאל
  english_pob_reading: redeemed
  chosen_spanish_reading: te he redimido
  alternative_spanish_readings:
  - te he rescatado
  - te he comprado de nuevo
  rationale: '"Redimido" conserva la carga covenantal de liberación y pertenencia, que en el contexto del versículo sostiene la confianza que sigue a "No temas".'
  doctrine_reference: Translation philosophy §§3, 6
- issue: Pertenencia divina en לִי אָתָּה
  english_pob_reading: you are mine
  chosen_spanish_reading: mío eres tú
  alternative_spanish_readings:
  - eres mío
  - tú me perteneces
  rationale: La frase breve y posesiva expresa elección, protección y derecho de pertenencia sin añadir explicación. El orden enfático ayuda a reflejar la concisión hebrea.
  doctrine_reference: Translation philosophy §§3, 6
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión auditada que prefirió "thus says" como fórmula profética más formal y ajustó la expresión del llamado a una forma más natural. En español se siguió esa línea con "así dice" y "te he llamado por tu nombre", manteniendo la naturalidad sin perder el paralelismo hebreo.
  spanish_consistency_notes:
  - Se usa Yahvé para יְהוָה conforme al estándar del proyecto.
  - 'Se conservan nombres propios bíblicos transliterados: Jacob e Israel.'
  - '"Redimido" se mantiene por su peso teológico; no se reduce a mero rescate.'
  - 'La posesión divina se expresa con una cláusula breve y enfática: "mío eres tú".'
  - El registro es formal y publicable, evitando arcaísmos innecesarios.
