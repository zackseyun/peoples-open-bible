translation:
  language: es
  text: le cortarás la mano[a]; tu ojo no tendrá compasión[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la palma». El hebreo כַּף puede referirse específicamente a la palma de la mano, aunque «mano» es más natural en este contexto legal.
    reason: lexical_alternative
  - marker: b
    text: O «tu ojo no la perdonará». El hebreo dice literalmente «tu ojo», una imagen idiomática para expresar la ausencia de compasión o piedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקַצֹּתָה
  english_pob_choice: you shall cut off
  chosen_spanish: le cortarás
  alternatives_spanish:
  - le amputarás
  - le cortarás de un tajo
  - le cortarás la mano
  lexicon: HALOT
  rationale: El verbo expresa una acción de seccionar/cortar con fuerza. En español, el giro legal y natural es «cortarás»; el objeto ya aparece en el contexto inmediato y puede explicitarse en la frase para evitar ambigüedad. «Amputarás» suena más técnico y menos fiel al tono legal directo.
- source_word: כַּפָּהּ
  english_pob_choice: her hand
  chosen_spanish: la mano
  alternatives_spanish:
  - la palma
  - su mano
  lexicon: HALOT
  rationale: כַּף puede significar «palma» o «mano». En este contexto penal, «mano» es la opción más natural y clara en español; «palma» resulta demasiado anatómica y menos idiomática. Se mantiene la referencia femenina por el sufijo pronominal.
- source_word: לֹא תָחוֹס עֵינֶךָ
  english_pob_choice: your eye shall not pity
  chosen_spanish: tu ojo no tendrá compasión
  alternatives_spanish:
  - tu ojo no la perdonará
  - no le tendrás compasión
  - tu ojo no la perdonará
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «tu ojo» para no borrar el modismo legal. En español, «no tendrá compasión» comunica de forma natural la idea de no mostrar piedad, manteniendo la tensión del hebreo sin convertirlo en una simple negación abstracta.
theological_decisions:
- issue: Mantener el modismo legal con «ojo»
  english_pob_reading: Retain the idiom 'your eye shall not pity.'
  chosen_spanish_reading: «tu ojo no tendrá compasión» conserva la imagen del hebreo y la dureza de la fórmula legal.
  alternative_spanish_readings:
  - «no le tendrás compasión»
  - «no la perdonarás»
  rationale: El texto usa una expresión semítica concreta. Traducirla solo como una orden impersonal de no mostrar misericordia debilitaría la forma del original. La opción elegida conserva tanto el sentido como la figura retórica.
  doctrine_reference: Principio de equivalencia óptima; prioridad de la forma léxica significativa del original en textos legales.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el criterio auditado de la POB en inglés. Se conserva la fuerza penal del mandato y el modismo «tu ojo» sin suavizarlo; no se detectan revisiones aplicadas en el registro fuente.
  spanish_consistency_notes:
  - Se usó «mano» en lugar de «palma» por naturalidad y claridad jurídica.
  - Se mantuvo el sujeto idiomático «tu ojo» para reflejar la estructura semítica del original.
  - El tono es jurídico y directo, sin añadir explicación interpretativa al texto principal.
