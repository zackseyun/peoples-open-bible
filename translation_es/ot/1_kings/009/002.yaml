translation:
  language: es
  text: Entonces Yahvé se apareció[a] a Salomón por segunda vez, como se le apareció en Gabaón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «otra vez»; el hebreo dice literalmente «por segunda vez».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El hebreo trae el nombre propio divino, no un título. En español POB se preserva como «Yahvé», manteniendo la misma decisión teológica que el inglés «Yahweh» y evitando la sustitución litúrgica «el SEÑOR».
- source_word: וַיֵּרָא
  english_pob_choice: appeared
  chosen_spanish: se apareció
  alternatives_spanish:
  - apareció
  - se reveló
  lexicon: HALOT
  rationale: El nifal de ראה aquí describe una manifestación divina visible o perceptible. «Se apareció» conserva el matiz de aparición teofánica y suena natural en español.
- source_word: שֵׁנִית
  english_pob_choice: a second time
  chosen_spanish: por segunda vez
  alternatives_spanish:
  - otra vez
  - de nuevo
  - una segunda vez
  lexicon: HALOT
  rationale: La forma adverbial marca secuencia numérica precisa. «Por segunda vez» reproduce con claridad la idea de «a second time» mejor que un simple «otra vez».
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: Introduce la comparación con la aparición anterior. «Como» preserva la relación comparativa sin cargarla con una paráfrasis innecesaria.
- source_word: נִרְאָה
  english_pob_choice: had appeared
  chosen_spanish: se había aparecido
  alternatives_spanish:
  - había aparecido
  - se había manifestado
  lexicon: HALOT
  rationale: El perfecto relativo remite a un evento anterior respecto de la cláusula principal. «Se había aparecido» conserva la referencia retrospectiva y el carácter de aparición divina.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: se le
  alternatives_spanish:
  - a él
  - le
  lexicon: HALOT
  rationale: El hebreo expresa dirección/relación hacia Salomón. En español, «se le apareció» integra de forma idiomática el complemento indirecto sin perder el sentido relacional de «to him».
- source_word: בְּגִבְעוֹן
  english_pob_choice: at Gibeon
  chosen_spanish: en Gabaón
  alternatives_spanish:
  - en Gibeón
  - en Gabaon
  lexicon: HALOT
  rationale: Para el topónimo bíblico, «Gabaón» es la forma española más reconocible y tradicional, sin alterar el valor locativo de בְּ.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene la decisión doctrinal del POB de no ocultar el Tetragrámaton tras un sustituto. «Yahvé» comunica el nombre propio de pacto de manera auditable y coherente con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Tiempo y aspecto de la comparación histórica
  english_pob_reading: as he had appeared to him at Gibeon
  chosen_spanish_reading: como se le había aparecido en Gabaón
  alternative_spanish_readings:
  - como se había aparecido a él en Gabaón
  - como había aparecido en Gabaón
  rationale: El español debe conservar la relación temporal anterior al acto principal. El pluscuamperfecto en la subordinada refleja bien el valor de antecedencia de נִרְאָה.
  doctrine_reference: Gramática aspectual del hebreo narrativo y correspondencia temporal en español
- issue: Modo de referencia a la manifestación divina
  english_pob_reading: appeared
  chosen_spanish_reading: se apareció
  alternative_spanish_readings:
  - apareció
  - se reveló
  rationale: La lectura teológica es de teofanía concreta, no solo de revelación abstracta. «Se apareció» preserva la tensión entre presencia visible y manifestación divina sin forzar una explicación doctrinal adicional.
  doctrine_reference: Teofanías en narración histórica del AT
translation_notes:
  revision_awareness: El contexto inglés ya había fijado una lectura estable y de alta concordancia, sin revisiones aplicadas. La versión española sigue esa lectura, ajustando únicamente la naturalidad idiomática y la toponimia española («Gabaón») sin cambiar el contenido semántico ni la decisión sobre el nombre divino.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como equivalente del nombre divino, coherente con la política del proyecto para יְהוָה.
  - Se conservó la secuencia temporal explícita de שֵׁנִית mediante «por segunda vez».
  - La subordinada comparativa usa pluscuamperfecto para reflejar la anterior aparición en Gabaón respecto del evento principal.
  - No se añadió material explicativo no sustentado por el texto fuente.
  - 'Se empleó una forma española bíblica estable para el topónimo: «Gabaón».'
