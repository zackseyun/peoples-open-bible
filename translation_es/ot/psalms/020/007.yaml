translation:
  language: es
  text: Ahora sé que Yahvé salva a su ungido[a]; le responde desde su santo cielo[b] con los poderosos actos de salvación de su diestra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su Mesías». El hebreo dice «su ungido», que en este contexto se refiere al rey ungido de Yahvé y también lleva resonancia mesiánica.
    reason: alternative_reading
  - marker: b
    text: «Cielo» traduce una forma plural hebrea, literalmente «cielos».
    reason: lexical_alternative
  - marker: c
    text: O «con poderosos actos de salvación» o, en un contexto real-militar, «con poderosas victorias de su diestra».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Ahora mismo
  - En este momento
  lexicon: HALOT
  rationale: Marca una toma de conciencia presente; «Ahora» es natural, breve y fiel al valor temporal del adverbio.
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - he llegado a saber
  - he conocido
  lexicon: HALOT
  rationale: El perfecto puede expresar certeza presente; «sé» comunica bien la convicción actual del hablante en español sin forzar una perífrasis.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - pues
  - porque
  lexicon: HALOT
  rationale: Introduce el contenido conocido; «que» mantiene la subordinación declarativa.
- source_word: הוֹשִׁיעַ
  english_pob_choice: saves
  chosen_spanish: salva
  alternatives_spanish:
  - ha salvado
  - da victoria a
  lexicon: HALOT
  rationale: Conserva el campo semántico de salvar/liberar. En este contexto confesional, el presente español expresa bien la certeza del acto divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre divino en vez de sustituirlo por un título.
- source_word: מְשִׁיחוֹ
  english_pob_choice: his anointed
  chosen_spanish: su ungido
  alternatives_spanish:
  - su Mesías
  - su ungido rey
  lexicon: HALOT
  rationale: «Ungido» reproduce el sentido literal y deja abierta la resonancia mesiánica sin imponerla como título explícito en el texto principal.
- source_word: יַעֲנֵהוּ
  english_pob_choice: he answers him
  chosen_spanish: le responde
  alternatives_spanish:
  - le responderá
  - le contesta
  lexicon: HALOT
  rationale: El imperfecto puede expresar seguridad presente o futura; «le responde» conserva la vivacidad de la afirmación y el paralelismo con «salva».
- source_word: מִשְּׁמֵי קָדְשׁוֹ
  english_pob_choice: from his holy heaven
  chosen_spanish: desde su santo cielo
  alternatives_spanish:
  - desde los cielos de su santidad
  - desde sus santos cielos
  lexicon: HALOT
  rationale: «Cielo» comunica de forma natural el hebreo plural en español, manteniendo la idea del ámbito celestial de su morada; «santo» conserva el valor de consagración del sintagma.
- source_word: בִּגְבֻרוֹת
  english_pob_choice: with the mighty acts/deeds
  chosen_spanish: con los poderosos actos
  alternatives_spanish:
  - con los hechos poderosos
  - con las poderosas obras
  lexicon: HALOT
  rationale: La frase apunta a manifestaciones de fuerza. «Poderosos actos» conserva la energía del plural y funciona bien con el complemento siguiente de salvación.
- source_word: יֵשַׁע
  english_pob_choice: salvation
  chosen_spanish: de salvación
  alternatives_spanish:
  - salvíficos
  - de victoria
  lexicon: HALOT
  rationale: Se mantiene el sustantivo de salvación para no reducir el sentido a victoria militar, aunque el contexto real puede incluir ese matiz.
- source_word: יְמִינוֹ
  english_pob_choice: his right hand
  chosen_spanish: su diestra
  alternatives_spanish:
  - su mano derecha
  lexicon: HALOT
  rationale: «Diestra» es un equivalente bíblico claro y digno en español; conserva el valor idiomático de poder eficaz asociado a la mano derecha.
theological_decisions:
- issue: 'מְשִׁיחוֹ: rey ungido con resonancia mesiánica'
  english_pob_reading: his anointed
  chosen_spanish_reading: su ungido
  alternative_spanish_readings:
  - su Mesías
  rationale: La forma hebrea designa ante todo al rey consagrado por Yahvé, pero también abre la resonancia mesiánica. «Su ungido» preserva esa tensión sin cerrar el sentido en un título cristológico explícito.
  doctrine_reference: Traducir títulos; preservar la tensión lexical y teológica cuando el contexto la sostiene.
- issue: Valor aspectual de הוֹשִׁיעַ y יַעֲנֵהוּ
  english_pob_reading: present-tense assurance ('saves ... answers')
  chosen_spanish_reading: presente de seguridad ('salva ... responde')
  alternative_spanish_readings:
  - futuro de certeza ('salvará ... responderá')
  - pretérito perfecto ('ha salvado ... ha respondido')
  rationale: El hebreo aquí funciona como declaración confiada, no como cronología estricta. El presente español mantiene la fuerza confesional del verso y su paralelismo.
  doctrine_reference: Equivalencia óptima; preservar la fuerza del testimonio poético sin rigidizar el tiempo verbal.
translation_notes:
  revision_awareness: La redacción sigue de cerca el último pase de revisión del inglés POB, que sustituyó una formulación menos natural por «mighty acts of salvation». En español se refleja con «poderosos actos de salvación», manteniendo el paralelismo del hebreo y evitando reducir el sintagma a una simple idea de victoria.
  spanish_consistency_notes:
  - Se emplea «Yahvé» para el Tetragrámaton, conforme al criterio del proyecto.
  - Se usa «ungido» en el texto principal para no resolver anticipadamente la tensión mesiánica del hebreo.
  - «Diestra» conserva el idiomatismo bíblico y el valor de poder eficaz de la mano derecha.
  - El orden de los complementos intenta reproducir el paralelismo poético del original sin sonar forzado en español.
