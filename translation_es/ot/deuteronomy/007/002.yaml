translation:
  language: es
  text: Y cuando Yahvé tu Dios los entregue delante de ti, y tú los derribes, los consagrarás totalmente a la destrucción[a]. No harás pacto con ellos ni les mostrarás favor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los pondrás bajo el anatema» o «los destruirás por completo». El hebreo usa el verbo חרם con una construcción intensiva que denota dedicación total a la destrucción.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no les mostrarás misericordia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתָנָם / gives them over to you
  english_pob_choice: gives them over to you
  chosen_spanish: los entregue delante de ti
  alternatives_spanish:
  - los ponga en tus manos
  - los entregue a ti
  lexicon: HALOT
  rationale: נתן en este contexto militar expresa entregar o poner a disposición del vencedor. «Los entregue delante de ti» conserva la agencia divina y la idea espacial de לְפָנֶיךָ sin añadir un modismo ajeno al hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino como «Yahvé», conforme al criterio del proyecto para evitar la sustitución por un título y preservar el Tetragrámaton.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - frente a ti
  lexicon: HALOT
  rationale: El hebreo idiomático comunica presencia y colocación en la ruta del combate. «Delante de ti» es natural en español y respeta la imagen sin calco rígido.
- source_word: וְהִכִּיתָם
  english_pob_choice: you strike them down
  chosen_spanish: tú los derrotes
  alternatives_spanish:
  - los derribes
  - los hieras
  lexicon: HALOT
  rationale: נכה en contexto bélico puede referirse a golpear y derrotar. «Derrotes» comunica el resultado bélico en español actual; se evita «herir» por ser demasiado débil y «azotar» por sonar extraño.
- source_word: הַחֲרֵם תַּחֲרִים אֹתָם
  english_pob_choice: you shall utterly devote them to destruction
  chosen_spanish: los consagrarás totalmente a la destrucción
  alternatives_spanish:
  - los destruirás por completo
  - los pondrás bajo el anatema
  lexicon: HALOT
  rationale: Se conserva la fuerza intensiva del infinitivo absoluto + verbo. «Consagrarás totalmente a la destrucción» intenta reflejar tanto el sentido de ḥerem como su carga teológica/cultual, sin reducirlo a mera aniquilación militar. «Anatema» sería comprensible para algunos lectores, pero menos transparente.
- source_word: לֹא תִכְרֹת לָהֶם בְּרִית
  english_pob_choice: You shall make no covenant with them
  chosen_spanish: No harás con ellos pacto
  alternatives_spanish:
  - No harás con ellos un pacto
  - No cortarás con ellos pacto
  lexicon: HALOT
  rationale: כרת ברית es la expresión idiomática «hacer/cortar pacto». «No harás con ellos pacto» es conciso, bíblico y fiel, sin forzar «cortar» en español.
- source_word: וְלֹא תְחָנֵּם
  english_pob_choice: show them no favor
  chosen_spanish: ni les mostrarás favor
  alternatives_spanish:
  - ni les tendrás compasión
  - ni les mostrarás misericordia
  lexicon: HALOT
  rationale: חנן se relaciona con gracia/favor. «Mostrar favor» sigue de cerca el valor léxico y evita decidir prematuramente por «misericordia», aunque esa sea una alternativa contextual válida.
theological_decisions:
- issue: Ḥerem en contexto de guerra santa
  english_pob_reading: you shall utterly devote them to destruction
  chosen_spanish_reading: los consagrarás totalmente a la destrucción
  alternative_spanish_readings:
  - los destruirás por completo
  - los pondrás bajo el anatema
  rationale: La formulación preserva el peso teológico y ritual de חרם sin diluirlo en un simple mandato de eliminación. Se mantiene la tensión entre consagración y destrucción que el hebreo expresa.
  doctrine_reference: Translation philosophy §§1, 5
- issue: חנן como favor/gracia versus misericordia
  english_pob_reading: show them no favor
  chosen_spanish_reading: ni les mostrarás favor
  alternative_spanish_readings:
  - ni les mostrarás misericordia
  - ni les tendrás compasión
  rationale: Se conserva el campo semántico de «favor/gracia» en lugar de fijarlo como «misericordia», aunque esa lectura sea posible en contexto. Esto respeta la decisión auditada del POB en inglés.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: Se revisó el bloque con base en el texto hebreo, la morfología y el audit trail inglés. No se detectaron cambios necesarios respecto a la última pasada; se mantuvo la tensión léxica de חרם y de חנן, evitando suavizar el mandato o sustituir el nombre divino.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יהוה, en coherencia con el criterio del proyecto.
  - Se prefirió un español bíblico moderno, pero no arcaizante, con sintaxis clara.
  - Se conservó la distinción entre el mandato de destrucción total y la prohibición de pacto/favor.
  - Los corchetes de notas aparecen solo donde el texto principal requiere alternativa léxica auditada.
