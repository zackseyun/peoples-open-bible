base_translation:
  language: en
  yaml_path: translation/ot/genesis/022/017.yaml
  text: that I will surely bless you[a], and I will surely multiply your offspring like the stars of the heavens and like the sand that is on the seashore[c][b]; and your offspring will possess the gate of his enemies.
