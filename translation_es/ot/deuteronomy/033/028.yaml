base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/033/028.yaml
  text: So Israel dwelt in safety[a], alone; the fountain of Jacob in a land of grain and new wine[b]; even his heavens drip down dew.
  footnotes:
  - marker: a
    text: Or 'the eye of Jacob.' The Hebrew word can mean either 'eye' or 'spring/fountain'; the main text follows the sense that best fits the imagery of agricultural abundance.
    reason: lexical_alternative
  - marker: b
    text: Or 'dwelt securely, by itself.'
    reason: alternative_reading
