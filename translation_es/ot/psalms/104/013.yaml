    rationale: עֲלִיּוֹתָיו apunta a cuartos superiores; 'superiores' es una colocación más idiomática en español para este tipo de imagen arquitectónica, aunque la forma actual no distorsiona el sentido.
  revised_spanish_text: Él riega las montañas desde sus aposentos superiores; la tierra queda saciada con el fruto de tus obras[a].
