translation:
  language: es
  text: Yashobeam hijo de Zabdiel[a] estaba a cargo de la primera división para el primer mes, y en su división había veinticuatro mil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «y sobre su división, veinticuatro mil»; el hebreo es elíptico, y en español se suplió «había» para expresar el tamaño de la unidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  english_pob_choice: Over
  chosen_spanish: Sobre
  alternatives_spanish:
  - Encima de
  - A cargo de
  - Sobre la autoridad de
  lexicon: HALOT
  rationale: En esta lista administrativa, עַל introduce a la persona puesta al frente de una unidad. «Sobre» conserva la idea de supervisión o mando sin forzar una paráfrasis más explicativa de lo que el hebreo dice.
- source_word: הַמַּחֲלֹקֶת
  english_pob_choice: division
  chosen_spanish: división
  alternatives_spanish:
  - curso
  - turno
  - compañía
  - división de servicio
  lexicon: HALOT
  rationale: En Crónicas, מַחֲלֹקֶת designa una unidad organizada para servicio o turno. «División» es claro en español moderno y mantiene el valor administrativo del término.
- source_word: הָרִאשׁוֹנָה
  english_pob_choice: first
  chosen_spanish: primera
  alternatives_spanish:
  - primero
  - principal
  - anterior
  lexicon: HALOT
  rationale: El adjetivo marca orden dentro de una serie mensual. «Primera» expresa el ordinal de manera natural en español.
- source_word: לַחֹדֶשׁ הָרִאשׁוֹן
  english_pob_choice: for the first month
  chosen_spanish: para el primer mes
  alternatives_spanish:
  - del primer mes
  - en el primer mes
  - correspondiente al primer mes
  lexicon: HALOT
  rationale: La frase señala la asignación de la división al primer mes del año. «Para el primer mes» comunica mejor esa función asignada que una mera relación posesiva.
- source_word: יָשָׁבְעָם
  english_pob_choice: Jashobeam
  chosen_spanish: Yashobeam
  alternatives_spanish:
  - Jashobeam
  - Yasobeam
  lexicon: convención onomástica basada en la forma hebrea
  rationale: Se conserva la transliteración cercana al hebreo. En español, «Yashobeam» refleja mejor la pronunciación aproximada del nombre que la forma inglesa tradicional.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En una identificación genealógica, «hijo de» es la forma natural y precisa en español.
- source_word: וְעַל מַחֲלֻקְתּוֹ
  english_pob_choice: and in his division were
  chosen_spanish: y en su división había
  alternatives_spanish:
  - y sobre su división había
  - y su división era de
  lexicon: HALOT
  rationale: 'El hebreo es elíptico: literalmente dice «y sobre su división». El español requiere suplir la idea de existencia o pertenencia de la unidad; «había» mantiene la concisión sin sobreexplicar.'
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  english_pob_choice: twenty-four thousand
  chosen_spanish: veinticuatro mil
  alternatives_spanish:
  - '24.000'
  - veinte y cuatro mil
  lexicon: HALOT
  rationale: La cifra se expresa normalmente en español bíblico con palabras. «Veinticuatro mil» es idiomático y fiel al número del texto.
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo del TM/WLC y la solución auditada del POB inglés. Se mantiene la elipsis del segundo hemistiquio con una suplencia mínima en español, equivalente a la del inglés, sin introducir contenido interpretativo adicional.
  spanish_consistency_notes:
  - Se mantiene «división» para מַחֲלֹקֶת en coherencia con el valor administrativo del término en Crónicas.
  - Se translitera el nombre propio de manera cercana al hebreo («Yashobeam») para evitar depender de la forma inglesa.
  - Se usa «Yahvé» como norma general del proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - La cantidad se verbaliza con estilo bíblico natural en español, sin alterar el valor numérico.
