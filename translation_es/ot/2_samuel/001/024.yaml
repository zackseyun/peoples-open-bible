    issue: Ambigüedad pronominal en ‘sobre su ropa’
    rationale: El hebreo lleva sufijo de segunda persona femenina plural (‘sobre vuestra/su ropa’ dirigido a las hijas de Israel). En español, ‘su’ puede entenderse como tercera persona singular/plural. ‘Sus vestidos’ mantiene la referencia al grupo interpelado y suena más natural.
  - severity: low
    issue: Cadencia poco natural en ‘de escarlata, con lujos’
    rationale: La coma interrumpe una unidad descriptiva. Sin coma, la frase fluye mejor y sigue reflejando que la ropa escarlata iba acompañada de lujo/finura.
