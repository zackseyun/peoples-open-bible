  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparece Yahvé en este versículo. «Pacto» para בְּרִית es defendible aquí, aunque «alianza» también sería posible; la decisión está razonada. «Ordenanza» para מִשְׁפָּט sigue el expediente inglés. No se detectan problemas teológicos que exijan adjudicación superior.
