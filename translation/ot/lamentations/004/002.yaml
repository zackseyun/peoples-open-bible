id: LAM.4.2
reference: Lamentations 4:2
source:
  edition: WLC
  text: בְּנֵ֤י צִיּוֹן֙ הַ/יְקָרִ֔ים הַ/מְסֻלָּאִ֖ים בַּ/פָּ֑ז אֵיכָ֤ה נֶחְשְׁבוּ֙ לְ/נִבְלֵי חֶ֔רֶשׂ מַעֲשֵׂ֖ה יְדֵ֥י יוֹצֵֽר־׃ס
translation:
  text: The precious sons of Zion[a], weighed out against fine gold—how they are regarded as clay jars[b], the work of a potter’s hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worth fine gold,' 'comparable to fine gold,' or 'esteemed as fine gold.' The Hebrew expression may emphasize valuation rather than the more concrete image of weighing.
    reason: lexical_alternative
  - marker: b
    text: Or 'earthen jars' or 'clay pots.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי צִיּוֹן
  chosen: the sons of Zion
  alternatives:
  - the children of Zion
  - the people of Zion
  lexicon: HALOT
  rationale: בְּנֵי is literally 'sons of.' Following the gender-accurate principle, 'sons' is retained rather than neutralizing to 'children' or 'people.' In context it likely represents Zion's inhabitants more broadly, but the Hebrew expression is masculine and poetic.
- source_word: הַיְקָרִים
  chosen: precious
  alternatives:
  - valuable
  - honored
  lexicon: HALOT
  rationale: The adjective conveys preciousness/high value. 'Precious' fits both the semantic range and the lament's emotional tone.
- source_word: הַמְסֻלָּאִים בַּפָּז
  chosen: weighed out against fine gold
  alternatives:
  - worth fine gold
  - comparable to fine gold
  - esteemed as fine gold
  lexicon: HALOT
  rationale: The passive participle from סלל here likely carries the sense of being weighed or valued in relation to refined gold. 'Weighed out against fine gold' preserves the imagery more concretely than a flattened 'worth fine gold,' while remaining intelligible.
- source_word: פָּז
  chosen: fine gold
  alternatives:
  - pure gold
  - refined gold
  lexicon: HALOT
  rationale: פָּז denotes high-quality refined gold. 'Fine gold' is idiomatic English and preserves the elevated poetic register.
- source_word: אֵיכָה
  chosen: how
  alternatives:
  - alas, how
  - how is it that
  lexicon: HALOT
  rationale: The lament particle introduces astonishment and grief. 'How' is the conventional and sufficiently weighty rendering in English lament style.
- source_word: נֶחְשְׁבוּ
  chosen: are regarded
  alternatives:
  - are counted
  - are considered
  - have become accounted
  lexicon: HALOT
  rationale: The Niphal of חשׁב expresses being reckoned or regarded as something. Present tense in English suits the poetic exclamation and avoids awkwardness.
- source_word: לְנִבְלֵי חֶרֶשׂ
  chosen: as clay jars
  alternatives:
  - as earthen jars
  - as pottery vessels
  - as clay pots
  lexicon: HALOT
  rationale: נִבְלֵי are containers/vessels, and חֶרֶשׂ specifies earthenware. 'Clay jars' is natural modern English while preserving the contrast with gold. 'Earthen jars' is also possible, but 'clay jars' is slightly more immediate.
- source_word: מַעֲשֵׂה יְדֵי יוֹצֵר
  chosen: the work of a potter’s hands
  alternatives:
  - the work of a potter
  - something made by a potter's hands
  lexicon: HALOT
  rationale: 'The phrase emphasizes crafted pottery made by a potter. Retaining ''hands'' preserves the Hebrew concreteness and sharpens the contrast: those once like gold are now treated like common pottery.'
