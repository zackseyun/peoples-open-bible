theological_decisions:
- issue: Nature of Jeremiah's authority over nations and kingdoms
  chosen_reading: The verse is rendered as a divine appointment giving Jeremiah prophetic authority with respect to nations and kingdoms, not as direct political rule.
  alternative_readings:
  - Rendered more adversatively as 'against nations and kingdoms' to stress judgment
  rationale: The Hebrew preposition עַל with פקד in this commissioning context most naturally indicates appointment over a sphere or charge. The following infinitives show that this authority is exercised through prophetic proclamation of judgment and restoration, not civil governance. The translation preserves that scope without importing a theory of political dominion.
  doctrine_reference: Translation philosophy §1, §3
