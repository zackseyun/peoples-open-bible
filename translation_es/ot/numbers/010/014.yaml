translation:
  language: es
  text: El estandarte del campamento de los hijos de Judá partió primero[a], por sus divisiones[b]; y al frente de su división estaba Nahsón hijo de Aminadab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'bandera' para 'estandarte'. El término hebreo designa la insignia tribal bajo la cual marchaba la unidad del campamento.
    reason: lexical_alternative
  - marker: b
    text: O 'según sus compañías/huestes'. El hebreo usa un término de organización militar para las unidades tribales ordenadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסַּע
  english_pob_choice: set out
  chosen_spanish: partió
  alternatives_spanish:
  - se puso en marcha
  - salió
  - marchó
  lexicon: HALOT
  rationale: En el contexto del desierto, נסע expresa romper el campamento y avanzar. 'Partió' comunica bien el inicio del desplazamiento sin sonar rígido en español, y mantiene el valor narrativo de orden de marcha.
- source_word: דֶּגֶל
  english_pob_choice: standard
  chosen_spanish: estandarte
  alternatives_spanish:
  - bandera
  - banderín
  - insignia
  lexicon: HALOT
  rationale: '''Estandarte'' conserva la idea de insignia tribal/militar asociada al grupo que marcha. ''Bandera'' es posible, pero ''estandarte'' refleja mejor el valor organizador del término en este pasaje.'
- source_word: מַחֲנֵה
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - campamento
  lexicon: HALOT
  rationale: En español, 'campamento' transmite naturalmente la entidad organizada que marcha. Se evita una expresión demasiado técnica o pesada, sin perder el sentido de unidad tribal acampada.
- source_word: בְנֵי יְהוּדָה
  english_pob_choice: the sons of Judah
  chosen_spanish: los hijos de Judá
  alternatives_spanish:
  - los descendientes de Judá
  - el pueblo de Judá
  lexicon: HALOT
  rationale: Se preserva la expresión genealógica literal del hebreo, que en contexto tribal tiene valor formal y no debe suavizarse a 'pueblo' sin necesidad.
- source_word: בָּרִאשֹׁנָה
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - en primer lugar
  - al frente
  lexicon: HALOT
  rationale: '''Primero'' reproduce con claridad el adverbio de orden de marcha y suena natural en español.'
- source_word: לְצִבְאֹתָם
  english_pob_choice: by their divisions
  chosen_spanish: por sus divisiones
  alternatives_spanish:
  - según sus compañías
  - por sus huestes
  - por sus tropas
  lexicon: HALOT
  rationale: '''Divisiones'' mantiene el matiz organizativo-militar del término sin imponer ''ejércitos'' o ''tropas'', que en español pueden sonar más bélicos de lo que el contexto exige.'
- source_word: וְעַל צְבָאוֹ
  english_pob_choice: and over its division was
  chosen_spanish: y sobre su división estaba
  alternatives_spanish:
  - y al frente de su división estaba
  - y sobre su compañía estaba
  - y sobre su hueste estaba
  lexicon: HALOT
  rationale: La preposición על con צבאו indica la persona encargada o al mando de esa unidad. 'Sobre su división estaba' conserva la estructura hebrea y la relación de autoridad.
- source_word: נַחְשׁוֹן בֶּן עַמִּינָדָב
  english_pob_choice: Nahshon son of Amminadab
  chosen_spanish: Nahsón hijo de Aminadab
  alternatives_spanish:
  - Najsón hijo de Aminadab
  - Nahshón hijo de Aminadab
  lexicon: Proyecto de transliteración onomástica
  rationale: Se transliteran los nombres propios conforme a una forma española legible y estable. 'Nahsón' evita una grafía excesivamente anglicada; 'Aminadab' sigue la forma habitual en español bíblico.
theological_decisions:
- issue: Orden tribal y liderazgo del campamento de Judá
  english_pob_reading: Judah's camp set out first, and Nahshon son of Amminadab was over its division.
  chosen_spanish_reading: El campamento de Judá partió primero, y Nahsón hijo de Aminadab estaba sobre su división.
  alternative_spanish_readings:
  - Judá salió primero y Nahsón hijo de Aminadab estaba al frente de su compañía.
  - El estandarte de Judá marchó primero y Nahsón hijo de Aminadab lo comandaba.
  rationale: El versículo presenta una prioridad de marcha y una estructura de mando tribal, no una afirmación doctrinal compleja. La traducción conserva la secuencia y la autoridad designada sin añadir explicaciones interpretativas.
  doctrine_reference: Números 2; Números 10:14-28
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo masorético (WLC) y el audit trail inglés sin cambios textuales relevantes; la versión inglesa también está en alta concordancia y no presenta revisiones aplicadas. La redacción española conserva el orden de marcha, la imagen del estandarte y la relación de mando sobre la división.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparezca el tetragrámaton; aquí no ocurre.
  - Se usa 'hijos de Judá' para respetar el hebreo genealógico.
  - '''Divisiones'' se mantiene de forma coherente con otros pasajes del arreglo del campamento.'
  - Los nombres propios se transliteran en forma española estable y no se traducen.
