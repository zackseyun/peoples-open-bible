review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura temporal paralela del hebreo («cuando no había… cuando no había…») y refleja adecuadamente תְּהֹמוֹת como «abismos». También preserva la imaginería de nacimiento de חוֹלָלְתִּי. Sin embargo, «fuentes abundantes en agua» no reproduce con suficiente naturalidad ni precisión idiomática la idea de מַעְיָנוֹת נִכְבַּדֵּי מָיִם; en español suena forzado y puede sugerir que las fuentes son abundantes en general, no que rebosan/abundan de agua.
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay dos problemas de naturalidad: «fuentes abundantes en agua» es poco idiomático, y la nota «fui nacida» no es una alternativa española natural. Conviene ajustar el texto principal a una expresión más natural y la nota a alternativas españolas genuinas.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Abismos» y «agua» son adecuados. La elección «fui dada a luz» encaja con la decisión auditada sobre la metáfora de nacimiento, aunque «fui traída a la existencia» no sería tan fiel a la imaginería. Se debe mantener la nota léxica, pero con alternativas idiomáticas en español como «nací» o «fui formada».
  issues:
  - severity: medium
    issue: «fuentes abundantes en agua» es poco natural en español
    rationale: Aunque intenta seguir «abounding with water», la construcción idiomática española más clara sería «manantiales abundantes en agua», «manantiales llenos de agua» o mejor «manantiales rebosantes de agua». El hebreo describe las fuentes como cargadas/ricas en agua, y la formulación actual suena rígida.
  - severity: low
    issue: La nota al pie incluye «fui nacida», que no es español natural
    rationale: La alternativa pretende reflejar «I was born», pero en español estándar se diría «nací». Las notas también deben ser legibles y naturales, no solo literales.
  - severity: low
    issue: «fuentes» es posible, pero «manantiales» corresponde mejor al referente natural
    rationale: Según el paquete léxico, מַעְיָנוֹת son surgencias naturales. «Fuentes» puede entenderse, pero también puede sonar más artificial; «manantiales» evita esa ambigüedad y fluye mejor con el modificador.
  revised_spanish_text: Cuando no había abismos[a], fui dada a luz, cuando no había manantiales rebosantes de agua.
  revised_footnotes:
  - marker: a
    text: O «nací» o «fui formada». El verbo hebreo puede evocar imágenes de nacimiento; «fui dada a luz» preserva la metáfora sin especificarla demasiado.
    reason: lexical_alternative
