translation:
  language: es
  text: Todas las luces de luz[a] en los cielos las oscureceré sobre ti, y pondré tinieblas sobre tu tierra, declara el Señor, Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los luminares en los cielos». La frase hebrea dice literalmente «las luces de luz en los cielos», refiriéndose a los cuerpos celestes como fuentes de luz.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todas
  alternatives_spanish:
  - Todo
  - Todas las
  lexicon: HALOT
  rationale: El cuantificador abarca la totalidad de los cuerpos luminosos; en español, «todas» concuerda con el sustantivo femenino plural implícito en «luces» y mantiene el alcance total del hebreo.
- source_word: מְאֹרֵי אוֹר
  english_pob_choice: the lights of light
  chosen_spanish: las luces de luz
  alternatives_spanish:
  - los luminares
  - las luces luminosas
  - las lumbreras
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente una construcción intensiva, «luces de luz». Se conserva esa rareza controlada en español para no perder la textura lexical ni suavizar demasiado el giro poético.
- source_word: בַּשָּׁמַיִם
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en los cielos del cielo
  lexicon: HALOT
  rationale: El plural hebreo apunta al ámbito celeste; «cielos» respeta el número y el registro profético, mejor que el singular «cielo».
- source_word: אַקְדִּירֵם
  english_pob_choice: I will darken
  chosen_spanish: las oscureceré
  alternatives_spanish:
  - las haré oscuras
  - las ennegreceré
  - las oscureceré
  lexicon: HALOT
  rationale: El verbo causativo expresa que Yahvé hace que esas luces pierdan su resplandor. «Oscureceré» es natural en español y conserva la fuerza verbal directa del hebreo.
- source_word: עָלֶיךָ
  english_pob_choice: over you
  chosen_spanish: sobre ti
  alternatives_spanish:
  - contra ti
  - encima de ti
  lexicon: HALOT
  rationale: En este contexto de juicio, עַל comunica algo que cae o se extiende por encima del destinatario. «Sobre ti» sigue la imagen sin imponer una lectura más interpretativa.
- source_word: וְנָתַתִּי חֹשֶׁךְ
  english_pob_choice: and I will put darkness
  chosen_spanish: y pondré tinieblas
  alternatives_spanish:
  - y estableceré tinieblas
  - y traeré tinieblas
  - y pondré oscuridad
  lexicon: HALOT
  rationale: נָתַן conserva su valor concreto de «poner/colocar». «Tinieblas» reproduce el plural poético frecuente en español bíblico y mantiene la solemnidad del juicio.
- source_word: עַל אַרְצְךָ
  english_pob_choice: over your land
  chosen_spanish: sobre tu tierra
  alternatives_spanish:
  - sobre tu país
  - sobre tu territorio
  - sobre tu tierra
  lexicon: HALOT
  rationale: אֶרֶץ aquí designa la tierra/territorio del destinatario. «Tierra» es más bíblico y más amplio que «país», sin llevar la frase al sentido cósmico de «mundo».
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - pronuncia
  - declara
  lexicon: HALOT
  rationale: La fórmula profética se vierte con un verbo solemne y breve. «Declara» funciona bien en español moderno para un anuncio oracular.
- source_word: יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  - Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue la convención del proyecto de traducir el nombre divino como «Yahvé». En el título compuesto, esto preserva el nombre propio del pacto sin ocultarlo tras una máscara litúrgica.
theological_decisions:
- issue: Título divino compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - el Señor Dios
  - el Señor Yahvé
  rationale: El hebreo combina el título soberano אֲדֹנָי con el nombre pactal יְהוִה. En español, «Señor Yahvé» conserva ambos elementos sin crear una redundancia artificial como «Señor Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Imagen cósmica de oscurecimiento
  english_pob_reading: I will darken ... and I will put darkness
  chosen_spanish_reading: las oscureceré ... y pondré tinieblas
  alternative_spanish_readings:
  - las haré oscuras ... y pondré oscuridad
  - las apagaré ... y pondré tinieblas
  rationale: La declaración no es meramente meteorológica; es un acto de juicio con alcance cósmico. «Oscureceré» y «tinieblas» conservan la intensidad profética sin convertir la imagen en una paráfrasis explicativa.
  doctrine_reference: Criterio POB de preservar la fuerza imagística del texto fuente
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente del inglés POB que ajustó «shining lights» a «lights of light» para reflejar más de cerca מְאֹרֵי אוֹר. La versión española conserva esa cercanía lexical con «luces de luz», evitando una normalización que borraría la construcción intensiva del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוִה conforme a la norma del proyecto.
  - Se evitó «SEÑOR» como máscara tipográfica, porque el audit trail documental favorece el nombre divino explícito.
  - «Tinieblas» se prefirió a «oscuridad» por su registro bíblico y su correspondencia con el tono oracular.
  - La nota al pie señala la alternativa lexical sin desplazar el texto principal.
  - La puntuación separa claramente la fórmula de declaración profética al final de la oración.
