revisions:
- from: Finees[a], hijo de Eleazar, hijo de Aarón el sacerdote, ha apartado mi ira de sobre los hijos de Israel, al ponerse celoso con mi celo entre ellos, de modo que no consumí a los hijos de Israel en mi celo.
  to: Finees, hijo de Eleazar, hijo de Aarón el sacerdote, ha apartado mi ira de los hijos de Israel, al mostrar celo[a] por mi celo entre ellos, de modo que no consumí a los hijos de Israel en mi celo.
  rationale: Se eliminó la nota innecesaria sobre el nombre propio. Se cambió «de sobre» por «de» para lograr un español natural sin pérdida sustancial del sentido. Se reformuló «al ponerse celoso con mi celo» como «al mostrar celo por mi celo» para conservar mejor la relación cognada del hebreo en un español claro y digno; la alternativa más literal se preserva en nota.
