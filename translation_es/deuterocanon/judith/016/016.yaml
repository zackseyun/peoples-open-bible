translation:
  language: es
  text: Porque todo sacrificio para aroma agradable es cosa pequeña, y toda grasa para tu holocausto es muy poca; pero el que teme al Señor es grande para siempre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siempre»; la expresión griega puede denotar duración continua o permanencia duradera.
    reason: lexical_alternative
lexical_decisions:
- source_word: μικρὸν
  english_pob_choice: a small thing
  chosen_spanish: cosa pequeña
  alternatives_spanish:
  - algo pequeño
  - una cosa pequeña
  - pequeño
  lexicon: LSJ
  rationale: La frase funciona como predicado valorativo sobre el sacrificio. «Cosa pequeña» conserva la idea de algo de poco peso o escasa importancia sin volverla más fuerte que el griego.
- source_word: θυσία
  english_pob_choice: sacrifice
  chosen_spanish: víctima
  alternatives_spanish:
  - sacrificio
  - ofrenda
  lexicon: LSJ
  rationale: En este contexto cultual, «víctima» puede abarcar la ofrenda sacrificada y encaja bien con el resto de la imagen ritual. Mantiene el valor sacrificial más concreto que un genérico «ofrenda».
- source_word: εἰς ὀσμὴν εὐωδίας
  english_pob_choice: for a pleasing aroma
  chosen_spanish: para aroma agradable
  alternatives_spanish:
  - para un olor agradable
  - como fragancia agradable
  - para un aroma de buen olor
  lexicon: LSJ
  rationale: La expresión cultual indica aceptación grata de la ofrenda. «Aroma agradable» es natural en español y conserva la imagen sacrificial sin forzar una interpretación alegórica.
- source_word: ἐλάχιστον
  english_pob_choice: very little
  chosen_spanish: muy poca
  alternatives_spanish:
  - poquísima
  - mínima
  - muy pequeña
  lexicon: LSJ
  rationale: El griego intensifica la primera evaluación. «Muy poca» comunica con claridad la superlación y mantiene el paralelismo con la primera cláusula.
- source_word: στέαρ
  english_pob_choice: fat
  chosen_spanish: grasa
  alternatives_spanish:
  - sebo
  - la grasa sacrificial
  lexicon: LSJ
  rationale: En español bíblico y litúrgico, «grasa» expresa de manera directa el material sacrificial aludido. «Sebo» sería más técnico y menos inmediato.
- source_word: ὁλοκαύτωμά
  english_pob_choice: whole burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda totalmente quemada
  - sacrificio consumido totalmente por el fuego
  lexicon: LSJ
  rationale: Para esta clase de ofrenda, «holocausto» es el equivalente tradicional y claro en español. Aquí no se evita por tradición eclesial porque el término designa precisamente la ofrenda totalmente consumida.
- source_word: σοι
  english_pob_choice: your
  chosen_spanish: tu
  alternatives_spanish:
  - para ti
  - a ti
  lexicon: LSJ
  rationale: La dativo griega dirige la frase a Dios. En español, el posesivo con «holocausto» resulta más natural y fiel al vínculo ritual.
- source_word: ὁ δὲ φοβούμενος τὸν κύριον
  english_pob_choice: the one who fears the Lord
  chosen_spanish: el que teme al Señor
  alternatives_spanish:
  - quien teme al Señor
  - la persona que teme al Señor
  lexicon: LSJ
  rationale: La construcción participial sustantivada expresa una verdad general. «El que teme al Señor» es idiomático en español y conserva la fuerza sapiencial del enunciado.
- source_word: μέγας
  english_pob_choice: is great
  chosen_spanish: es grande
  alternatives_spanish:
  - es importante
  - es exaltado
  lexicon: LSJ
  rationale: «Grande» mantiene el contraste directo con la pequeñez de las ofrendas y refleja la valoración del texto sin añadir explicaciones.
- source_word: διὰ παντός
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - siempre
  - continuamente
  - por siempre
  lexicon: LSJ
  rationale: La frase puede indicar duración permanente o continuidad. «Para siempre» recoge bien la idea de permanencia duradera que usa la POB inglesa.
theological_decisions:
- issue: Valor relativo de las ofrendas frente al temor del Señor
  english_pob_reading: The verse states that sacrificial offerings are comparatively small, while the person who fears the Lord is great.
  chosen_spanish_reading: El versículo afirma que las ofrendas sacrificiales son pequeñas en comparación, mientras que el que teme al Señor es grande.
  alternative_spanish_readings:
  - Las ofrendas son insuficientes sin reverencia.
  - El texto rebaja el sacrificio para exaltar la piedad interior.
  rationale: El griego contrapone directamente la pequeñez de los sacrificios con la grandeza del temeroso de Dios. La traducción preserva esa tensión sin convertirla en una crítica doctrinal más amplia al sacrificio.
  doctrine_reference: Preservar la tensión teológica sin resolverla
- issue: Renderización de κύριος
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Soberano
  rationale: En este contexto deuterocanónico griego, «Señor» es la forma reverente y estándar para κύριος, y mantiene la referencia divina de manera clara en español.
  doctrine_reference: 'Contested terms: κύριος → Señor'
translation_notes:
  revision_awareness: He tomado en cuenta la revisión inglesa que ajustó el orden para reflejar mejor que la frase modificadora pertenece a «every sacrifice». En español, he colocado «para aroma agradable» junto a «víctima» para conservar esa relación sintáctica y el sentido cultual del griego.
  spanish_consistency_notes:
  - He mantenido un registro bíblico claro y publicable, con vocabulario cultual comprensible para lectores amplios.
  - Conservo «Señor» para κύριος según la decisión auditada del texto inglés.
  - He usado «holocausto» como término técnico tradicional para ὁλοκαύτωμα, porque aquí coincide con el sentido literal de ofrenda totalmente consumida.
  - La nota a pie de página solo se aplica a διὰ παντός, como en el auditorio inglés, pero expresada de forma natural en español.
