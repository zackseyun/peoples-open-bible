  language: en
  yaml_path: translation/ot/isaiah/033/015.yaml
  text: He who walks in righteousness and speaks what is upright[a], who despises gain from extortions, who shakes his hands free from taking a bribe, who stops his ears from hearing of bloodshed[c][b], and shuts his eyes from looking on evil—
