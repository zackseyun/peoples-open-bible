translation:
  language: es
  text: Porque Yahvé tu Dios te ha bendecido en toda la obra de tus manos. Él ha conocido[a] tu andar por este gran desierto. Estos cuarenta años Yahvé tu Dios ha estado contigo; no te ha faltado nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Él ha vigilado tu andar por este gran desierto». El verbo hebreo dice literalmente «ha conocido»; en este contexto puede implicar atención cuidadosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El nombre divino aparece explícitamente en el hebreo con el Tetragrámaton. En español se conserva como 'Yahvé' para mantener el nombre personal del pacto, en línea con la decisión editorial del POB en inglés de no sustituirlo por un título.
- source_word: בֵּרַכְךָ
  english_pob_choice: has blessed you
  chosen_spanish: te ha bendecido
  alternatives_spanish:
  - te bendijo
  - te ha prosperado
  lexicon: HALOT
  rationale: El perfecto hebreo presenta una acción completada con relevancia presente; el pretérito perfecto compuesto funciona bien en español. 'Bendecido' conserva mejor el sentido de bendición covenantal que 'prosperado'.
- source_word: בְּכֹל מַעֲשֵׂה יָדֶךָ
  english_pob_choice: in all the work of your hands
  chosen_spanish: en toda la obra de tus manos
  alternatives_spanish:
  - en todo el trabajo de tus manos
  - en toda tu labor
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de la mano en plural, como en la revisión inglesa final. 'Obra' comunica bien el resultado del trabajo y mantiene un registro bíblico natural en español.
- source_word: יָדַע
  english_pob_choice: has known
  chosen_spanish: ha conocido
  alternatives_spanish:
  - ha observado
  - ha cuidado de
  lexicon: HALOT
  rationale: El verbo básico es 'conocer'. En contexto implica atención cuidadosa, pero el texto base no exige explicitar 'cuidar' en el cuerpo principal; se preserva la tensión semántica en la nota.
- source_word: לֶכְתְּךָ
  english_pob_choice: your walking / your journey
  chosen_spanish: tu caminar
  alternatives_spanish:
  - tu viaje
  - tu andar
  lexicon: HALOT
  rationale: '''Caminar'' refleja con más cercanía la forma nominal verbal del hebreo y evita suavizar demasiado la imagen. Es natural en español y mantiene la concreción del recorrido.'
- source_word: אֶת הַמִּדְבָּר הַגָּדֹל הַזֶּה
  english_pob_choice: through this great wilderness
  chosen_spanish: por este gran desierto
  alternatives_spanish:
  - por este inmenso desierto
  - a través de este gran desierto
  lexicon: HALOT
  rationale: La preposición española 'por' expresa adecuadamente el trayecto recorrido, como el inglés POB con 'through'. 'Desierto' es la equivalencia habitual de מִדְבָּר y conserva el valor geográfico y teológico del lugar de prueba.
- source_word: זֶה אַרְבָּעִים שָׁנָה
  english_pob_choice: These forty years
  chosen_spanish: Estos cuarenta años
  alternatives_spanish:
  - Durante estos cuarenta años
  - Por estos cuarenta años
  lexicon: HALOT
  rationale: La frase temporal se vierte de manera idiomática en español con el mismo valor retrospectivo. No se añade 'durante' en el texto base para no sobrecargar la sintaxis.
- source_word: עִמָּךְ
  english_pob_choice: has been with you
  chosen_spanish: ha estado contigo
  alternatives_spanish:
  - ha permanecido contigo
  - estuvo contigo
  lexicon: HALOT
  rationale: El hebreo carece de verbo explícito, pero el español lo requiere. 'Ha estado contigo' expresa presencia sostenida en tiempo retrospectivo y sigue de cerca la lectura inglesa.
- source_word: לֹא חָסַרְתָּ דָּבָר
  english_pob_choice: you have lacked nothing
  chosen_spanish: no te ha faltado nada
  alternatives_spanish:
  - no te faltó nada
  - no careciste de nada
  lexicon: HALOT
  rationale: La idiomática hebrea de carencia total se expresa con naturalidad en español. 'No te ha faltado nada' suena claro y mantiene la suficiencia completa sin volverla más interpretativa.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre divino como transliteración reverente y no como sustitución por un título. Esto mantiene la transparencia del texto fuente y la coherencia con la política del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de יָדַע en el contexto del desierto
  english_pob_reading: He has known your walking through this great wilderness
  chosen_spanish_reading: Él ha conocido tu caminar por este gran desierto
  alternative_spanish_readings:
  - Él ha observado tu caminar por este gran desierto
  - Él ha cuidado tu caminar por este gran desierto
  rationale: 'Se mantiene el verbo ''conocer'' para no borrar la tensión lexical documentada: ידע puede implicar conocimiento atento y cuidado providente, pero el texto no obliga a fijar esa ampliación en la línea principal.'
  doctrine_reference: Principio POB de preservar la tensión lexical cuando el contexto permite más de una matización legítima
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente en dos puntos sensibles: refleja el plural hebreo de ''manos'' y mantiene una expresión cercana a la forma verbal de ''caminar'' en lugar de suavizarla a ''viaje''. También conserva la decisión editorial de traducir el Nombre divino como ''Yahvé''.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de forma consistente con la política del POB para יְהוָה.
  - Se prefirió 'caminar' sobre 'viaje' para corresponder al sustantivo verbal hebreo לֶכְתְּךָ sin perder naturalidad en español.
  - '''No te ha faltado nada'' conserva la fórmula bíblica de suficiencia total sin añadir énfasis innecesario.'
  - La nota al pie preserva la alternativa de lectura atenta/providente para יָדַע sin sustituir el sentido principal.
