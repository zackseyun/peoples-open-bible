review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo y de la POB inglesa: ''media tribu de Manasés'', los nombres Aner y Bileam, y la idea de ciudades con sus tierras anexas para los coatitas restantes. Sin embargo, falla en un punto importante de alineación onomástica: ''Quet'' no corresponde a קְהָת, que en español bíblico estándar es ''Cohat''. Además, la nota al pie está anclada en el lugar equivocado: la variante textual trata de ''Bileam/Ibleam'', no de ''pastizales''.'
  spanish_quality_summary: El español es generalmente claro y legible. 'Media tribu' y 'pastizales' son naturales en este contexto, aunque 'tierras de pasto' también sería posible. La frase final requiere corrección por el nombre propio 'Cohat'. También conviene mover la marca de nota al nombre 'Bileam' para mayor precisión editorial.
  glossary_alignment: Sin conflictos con la terminología doctrinal del proyecto. Los nombres propios están bien conservados salvo 'Quet', que debe ajustarse a 'Cohat' según el uso bíblico español ampliamente reconocible. 'Clan' para מִשְׁפָּחָה es adecuado.
  issues:
