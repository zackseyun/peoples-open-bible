review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general el sentido del hebreo y la auditoría inglesa: imperativos de pedir consejo, dictar una resolución, dar sombra protectora, esconder a los desterrados y no revelar al fugitivo. Sin embargo, hay desajustes importantes de persona/número y una colocación poco natural en español. El hebreo pasa de imperativos plurales a femeninos singulares dirigidos a una entidad personificada; el español del borrador lo aplana todo en plural. Además, «hagan una decisión» es un calco poco idiomático.'
  spanish_quality_summary: La redacción es comprensible, pero necesita reparación para sonar natural y fiel. «Traigan consejo» y «oculten a los expulsados» son aceptables, pero «hagan una decisión» no lo es en español bíblico-natural; «tomen una decisión» o «dicten una resolución» funcionan mejor. También conviene mantener la coherencia de los mandatos singulares femeninos en la segunda mitad con «haz / esconde / no delates».
  glossary_alignment: 'No hay conflictos con terminología doctrinal de proyecto. Las decisiones léxicas principales son adecuadas, pero la nota [c] no refleja la nota inglesa correspondiente: allí la alternativa es «shade» para «shadow», no una expansión interpretativa a «refugio». También conviene usar «desterrados» o «expulsados» según matiz; «desterrados» encaja mejor con נִדָּחִים en este contexto de exilio/asilo.'
  issues:
  - severity: high
    issue: «hagan una decisión» es antinatural en español
    rationale: Aunque replica el inglés «make a decision», en español la colocación normal es «tomen una decisión» o, con mayor matiz jurídico, «dicten una resolución». El hebreo פְלִילָה tiene matiz judicial; la versión actual suena a calco.
  - severity: medium
    issue: Se pierde el cambio de número/persona del hebreo en la segunda mitad
    rationale: El texto hebreo usa imperativos plurales al inicio y luego femeninos singulares («haz... tu sombra... esconde... no reveles»), probablemente dirigidos a una entidad personificada. No siempre se puede reproducir plenamente, pero el español puede reflejarlo mejor que el borrador actual.
  - severity: medium
    issue: La nota [c] no corresponde a la evidencia auditada
    rationale: La auditoría inglesa preserva la alternativa léxica «your shade» para «your shadow». La nota española introduce «refugio» y una explicación más interpretativa que la evidencia no exige.
  - severity: low
    issue: «expulsados» es posible, pero «desterrados» comunica mejor el contexto de exilio/asilo
    rationale: נִדָּחִים denota los expulsados/ahuyentados, pero en este pasaje profético el campo semántico de exilio y refugio hace «desterrados» especialmente natural y digno en español.
