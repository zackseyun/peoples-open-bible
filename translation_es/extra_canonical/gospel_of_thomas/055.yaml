base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/055.yaml
  text: Jesus said, "Whoever does not hate his father and his mother cannot be my disciple; and whoever does not hate his brothers and his sisters, and does not carry his cross as I do, will not be worthy of me."[a][b][c]
  footnotes:
  - marker: a
    text: Printed MS reads “his brothers … and his sisters” (ⲥⲛⲏⲩ … ⲥⲱⲛⲉ). Dilley’s normalized lemmatization lists “his son … his daughter.” This draft follows the manuscript reading.
    reason: textual_variant
  - marker: b
    text: Coptic ⲛⲡⲁϩⲉ = “in my way/road, in my manner.” It is not the explicit verb “follow,” which the saying does not use.
    reason: dialect_note
  - marker: c
    text: Cf. Luke 14:26–27; Matthew 10:37–38 for related motifs, though Thomas’s diction is distinct.
    reason: cross_reference
  - marker: a
    text: Or 'will not be my disciple'.
    reason: previous_rendering
  - marker: b
    text: Or 'in my way'.
    reason: previous_rendering
