revisions:
- from: Y los dispersaré[a] entre las naciones, y desenvainaré la espada detrás de ustedes; y su tierra será una desolación, y sus ciudades serán ruinas.
  to: Y los dispersaré entre las naciones, y desenvainaré[a] la espada tras ustedes; y su tierra será una desolación, y sus ciudades serán ruinas.
  rationale: Se reubica la nota para que corresponda a la frase correcta y se simplifica su redacción para reflejar con precisión la alternativa léxica documentada por el POB inglés. También se cambia «detrás de ustedes» por «tras ustedes» para un español más natural y una mejor correspondencia con el hebreo en contexto de persecución.
