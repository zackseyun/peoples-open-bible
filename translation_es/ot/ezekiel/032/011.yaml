translation:
  language: es
  text: 'Porque así dice el Señor Dios Yahvé: La espada del rey de Babilonia vendrá sobre ti[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la espada del rey de Babilonia vendrá a/contra ti»; «sobre ti» mantiene el sentido de amenaza e irrupción del juicio sin sobretraducir el giro verbal.'
