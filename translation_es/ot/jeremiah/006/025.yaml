translation:
  language: es
  text: No salgas al campo[a], ni camines por el camino[b], porque la espada del enemigo y el terror están por todas partes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la espada del enemigo; terror por todas partes». El texto principal vierte la construcción posesiva de manera natural con «la espada del enemigo».'
    reason: lexical_alternative
  - marker: b
    text: La advertencia está en femenino singular, probablemente personificando a Jerusalén o a la hija de Sion.
    reason: cultural_note
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagas
  - No salgas
  lexicon: HALOT
  rationale: La partícula negativa expresa prohibición; en español, «No» con verbo en subjuntivo reproducír la fuerza prohibitiva sin sobreexplicar.
- source_word: תצאי
  english_pob_choice: go out
  chosen_spanish: salgas
  alternatives_spanish:
  - vayas fuera
  - salgas hacia afuera
  lexicon: HALOT
  rationale: Qal 2fs de יצא; «salgas» mantiene el movimiento de salida y permite conservar el tono directo de la advertencia.
- source_word: הַשָּׂדֶה
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - el campo abierto
  - la campiña
  lexicon: HALOT
  rationale: En español, «campo» comunica con naturalidad el sentido de campo/campo abierto mejor que un calco literal que sonaría menos idiomático.
- source_word: וּבַדֶּרֶךְ
  english_pob_choice: and ... on the road
  chosen_spanish: ni ... por el camino
  alternatives_spanish:
  - y ... en el camino
  - ni ... en la ruta
  lexicon: HALOT
  rationale: «Caminar por el camino» refleja el uso de דרך como vía o ruta; el «ni» coordina la segunda prohibición con naturalidad en español.
- source_word: תלכי
  english_pob_choice: walk
  chosen_spanish: camines
  alternatives_spanish:
  - andes
  - vayas
  lexicon: HALOT
  rationale: הלך aquí contrasta con «salir»; «camines» preserva esa variación verbal y suena natural en una prohibición dirigida a una mujer singular.
- source_word: חֶרֶב
  english_pob_choice: a sword / the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - una espada
  - la espada del
  lexicon: HALOT
  rationale: El sustantivo concreto de violencia se traduce de forma directa. El artículo definido funciona bien porque la imagen es proverbial y determinada por el contexto.
- source_word: לְאֹיֵב
  english_pob_choice: the enemy has / of the enemy
  chosen_spanish: del enemigo
  alternatives_spanish:
  - del adversario
  - del que odia
  lexicon: HALOT
  rationale: El ל posesivo/referencial se expresa naturalmente con «de». Se preserva la relación nominal sin introducir una paráfrasis ajena al hebreo.
- source_word: מָגוֹר
  english_pob_choice: terror
  chosen_spanish: el terror
  alternatives_spanish:
  - el espanto
  - el pavor
  lexicon: HALOT
  rationale: «Terror» conserva el peso profético del término y su enlace con el motivo recurrente de Jeremías; se mantiene el artículo por la coordinación con «la espada».
- source_word: מִסָּבִיב
  english_pob_choice: on every side
  chosen_spanish: por todos lados
  alternatives_spanish:
  - en derredor
  - a tu alrededor
  lexicon: HALOT
  rationale: La expresión idiomática indica cerco total; «por todos lados» es un equivalente natural en español moderno y comunica la misma idea de amenaza envolvente.
theological_decisions:
- issue: Advertencia dirigida a una entidad femenina singular (Jerusalén/Sion personificada)
  english_pob_reading: The warning is addressed with feminine singular verbs, likely personifying Jerusalem/daughter Zion.
  chosen_spanish_reading: La advertencia mantiene el singular femenino implícito en «salgas» y «camines», sugiriendo a Jerusalén/Sion personificada.
  alternative_spanish_readings:
  - La advertencia podría leerse como genérica para una mujer singular.
  - Podría entenderse como habla figurada a la ciudad personificada.
  rationale: El hebreo usa formas femeninas singulares; el español puede reflejar esa concordancia verbal sin nombrarla explícitamente. Así se conserva la personificación sin añadir interpretaciones no atestiguadas.
  doctrine_reference: Jeremías 6:25; personificación profética de Jerusalén/Sion
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail inglés, que corrigió una paráfrasis posesiva hacia una construcción más cercana al hebreo: no se expresa como «el enemigo tiene una espada», sino como «la espada del enemigo». También conserva la doble amenaza final: espada y terror rodeando por todos lados.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se usa «campo» y «camino» en registro bíblico claro y contemporáneo.
  - La coordinación negativa «ni» reproduce la segunda prohibición sin recargar la sintaxis.
  - «Espada» y «terror» conservan la imaginería de amenaza concreta y envolvente del hebreo.
