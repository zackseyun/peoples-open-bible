review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido básico del hebreo: los justos heredarán la tierra y habitarán en ella para siempre. Las decisiones principales para צַדִּיקִים, יִירְשׁוּ, וְיִשְׁכְּנוּ, לָעַד y עָלֶיהָ son fieles y naturales en español. El problema principal está en la nota: no preserva correctamente la alternativa documentada del inglés, porque repite «la tierra» frente a «la tierra» en sentido amplio, en vez de distinguir entre «la tierra» y «la tierra entera / el mundo / la tierra como totalidad».'
  spanish_quality_summary: El texto principal es claro, natural y de registro bíblico digno. «Los justos heredarán la tierra y habitarán en ella para siempre» funciona muy bien. La calidad baja solo en la nota al pie, que resulta confusa y redundante al oponer el mismo término a sí mismo.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Los justos», «heredarán», «la tierra» y «habitarán» son adecuados. Aquí no intervienen términos sensibles como Yahvé, Mesías, esclavo, etc. La elección de «la tierra» como texto principal está alineada con la decisión del POB inglés, pero la nota debe reflejar mejor la alternativa «the earth».
  issues:
  - severity: medium
    issue: La nota al pie no distingue claramente la alternativa semántica de אֶרֶץ.
    rationale: El inglés conserva la tensión entre «the land» y «the earth». La nota española dice «tanto ‘tierra’ como ‘tierra’ en sentido más amplio», lo que no informa con claridad al lector y no preserva bien la razón léxica documentada.
  - severity: low
    issue: La formulación de la nota es estilísticamente torpe y repetitiva.
    rationale: La repetición de «la tierra» frente a «la tierra» suena descuidada. Conviene reformularla con una alternativa comprensible en español, por ejemplo «la tierra entera» o «el mundo», dejando claro que es una equivalencia aproximada para el sentido más amplio de אֶרֶץ.
  revised_spanish_text: Los justos heredarán la tierra y habitarán en ella para siempre[a].
  revised_footnotes:
  - marker: a
    text: O «la tierra entera». El hebreo אֶרֶץ puede significar «tierra» o «tierra» en sentido más amplio; aquí «la tierra» encaja con el lenguaje repetido del Salmo 37 sobre heredar la tierra.
    reason: alternative_reading
  revision_rationale: Se conserva intacto el texto principal porque es fiel, natural y bien alineado con el hebreo y con el POB inglés. Solo se corrige la nota para que preserve de forma inteligible la alternativa semántica documentada para אֶרֶץ, evitando la redundancia confusa del borrador.
