translation:
  language: es
  text: Desde el lugar de su morada, observa[a] a todos los habitantes de la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mira atentamente», «contempla» o «vigila». El verbo hebreo expresa una observación atenta desde lo alto.
    reason: lexical_alternative
  - marker: b
    text: O «el país» o «la región» si se entiende en sentido local; aquí se prefiere «la tierra» por el alcance universal del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמְּכוֹן
  english_pob_choice: From the place
  chosen_spanish: Desde el lugar
  alternatives_spanish:
  - Desde el lugar fijo
  - Desde la morada establecida
  lexicon: HALOT
  rationale: מָכוֹן expresa un lugar establecido o fijo. En español, «lugar» comunica con naturalidad la idea locativa sin perder el matiz de estabilidad presente en el hebreo; «desde» conserva el punto de observación remoto del sujeto.
- source_word: שִׁבְתּוֹ
  english_pob_choice: of his dwelling
  chosen_spanish: de su morada
  alternatives_spanish:
  - de su habitación
  - de su asiento
  lexicon: HALOT
  rationale: La forma con sufijo funciona como un sustantivo de residencia o asiento. «Morada» es más natural y reverente en español que una traducción demasiado literal de «sentarse», y conserva la relación posesiva con el lugar desde donde observa.
- source_word: הִשְׁגִּיחַ
  english_pob_choice: he looks out on
  chosen_spanish: observa
  alternatives_spanish:
  - mira atentamente
  - vigila
  - contempla
  lexicon: HALOT
  rationale: El hiphil de שׁגח implica mirar con atención, observar o vigilar desde arriba. «Observa» recoge esa atención sostenida sin cargar el verso con un giro poco natural en español; la nota preserva alternativas cercanas.
- source_word: אֶל
  english_pob_choice: 'on'
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - sobre
  lexicon: HALOT
  rationale: Con verbos de mirar en español, la preposición más directa y natural es «a»; mantiene el objeto de la observación sin sobretraducir el valor direccional del hebreo.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  lexicon: HALOT
  rationale: כָּל tiene fuerza inclusiva total. «Todos» comunica con claridad la universalidad del alcance.
- source_word: יֹשְׁבֵי
  english_pob_choice: the inhabitants
  chosen_spanish: los habitantes
  alternatives_spanish:
  - los que habitan
  - los moradores
  lexicon: HALOT
  rationale: 'El participio funciona sustantivamente: «los que habitan». «Los habitantes» es la forma española más idiomática y mantiene el sentido colectivo.'
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: HALOT
  rationale: En este contexto universal, la referencia abarca a toda la humanidad y no a una región particular. «La tierra» conserva el alcance global que la POB inglesa prefirió con «the earth».
theological_decisions:
- issue: Alcance de la observación divina
  english_pob_reading: 'universal scope: God observes all the inhabitants of the earth'
  chosen_spanish_reading: 'alcance universal: Dios observa a todos los habitantes de la tierra'
  alternative_spanish_readings:
  - 'alcance regional: los habitantes de una tierra concreta'
  rationale: El sintagma completo apunta al dominio y conocimiento universales de Dios. Traducir «la tierra» evita estrechar indebidamente el horizonte a una sola región, en línea con la lectura contextual del inglés POB.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión española sigue el pasaje sin cambios de revisión respecto del texto auditado en inglés; se conservó la lectura universal y las alternativas léxicas documentadas para el verbo de observación y para הָאָרֶץ.
  spanish_consistency_notes:
  - Se usó «Yahvé» en otros contextos del proyecto, pero este verso no contiene el nombre divino.
  - Se mantuvo un registro sobrio y bíblico, evitando calcos como «mira sobre» que sonarían menos naturales en español.
  - «Tierra» se eligió como equivalente universal de הָאָרֶץ, coherente con la decisión inglesa de no restringirlo a «land» en este contexto.
