translation:
  language: es
  text: Entonces Yahvé habló a Moisés y a Aarón, y les dio instrucciones acerca de[a] los hijos de Israel y acerca de Faraón, rey de Egipto, para sacar a los hijos de Israel de la tierra de Egipto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a los hijos de Israel y a Faraón, rey de Egipto». El hebreo puede entenderse como si fueran los destinatarios del mandato; en este contexto, probablemente indica que el mandato dado a Moisés y Aarón trataba acerca de Israel y de Faraón.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «los hijos de Israel»; también puede traducirse «los israelitas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - Luego ... habló
  lexicon: HALOT
  rationale: El wayyiqtol marca avance narrativo secuencial; «Entonces» conserva ese progreso con naturalidad en español sin perder el valor consecutivo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el valor del nombre divino y el estándar del proyecto para יהוה, evitando la sustitución por un título y preservando el nombre propio en español.
- source_word: אֶל מֹשֶׁה וְאֶל אַהֲרֹן
  english_pob_choice: to Moses and to Aaron
  chosen_spanish: a Moisés y a Aarón
  alternatives_spanish:
  - con Moisés y con Aarón
  lexicon: HALOT
  rationale: Con דבר, אֶל marca al destinatario directo; «a» es la correspondencia más natural en español.
- source_word: וַיְצַוֵּם
  english_pob_choice: and he commanded them
  chosen_spanish: y les mandó
  alternatives_spanish:
  - y les ordenó
  - y les dio mandamiento
  lexicon: HALOT
  rationale: צוה expresa una orden con autoridad; «mandó» mantiene ese peso y suena idiomático en español bíblico contemporáneo.
- source_word: אֶל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: concerning the sons of Israel
  chosen_spanish: concerniente a los hijos de Israel
  alternatives_spanish:
  - a los hijos de Israel
  - respecto de los hijos de Israel
  lexicon: HALOT
  rationale: Aquí אֶל tras צוה puede señalar el ámbito de la orden. «Concerniente a» conserva la relación indirecta que el inglés POB decidió destacar.
- source_word: וְאֶל פַּרְעֹה מֶלֶךְ מִצְרָיִם
  english_pob_choice: and concerning Pharaoh king of Egypt
  chosen_spanish: y concerniente a Faraón, rey de Egipto
  alternatives_spanish:
  - y a Faraón, rey de Egipto
  - y respecto de Faraón, rey de Egipto
  lexicon: HALOT
  rationale: Se mantiene el paralelo sintáctico con la frase anterior y se evita hacer de Faraón el destinatario directo del mandato, como permite el hebreo.
- source_word: לְהוֹצִיא
  english_pob_choice: to bring ... out
  chosen_spanish: para sacar
  alternatives_spanish:
  - para hacer salir
  - para llevar ... fuera
  lexicon: HALOT
  rationale: El infinitivo causativo expresa la acción de hacer salir; «sacar» es la forma española más directa y natural en el contexto del éxodo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se preserva la expresión hebrea de filiación nacional. «Hijos de Israel» reproduce el paralelismo del original con claridad.
- source_word: מֵאֶרֶץ מִצְרָיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - fuera de Egipto
  lexicon: HALOT
  rationale: אֶרֶץ significa explícitamente «tierra»; mantenerlo evita perder la concreción geográfica del hebreo.
theological_decisions:
- issue: Destino de los mandatos expresados con אֶל tras צוה
  english_pob_reading: The command was given to Moses and Aaron concerning Israel and Pharaoh, not necessarily directly to Israel and Pharaoh.
  chosen_spanish_reading: El mandato fue dado a Moisés y a Aarón con referencia a Israel y a Faraón, no necesariamente dirigido de manera inmediata a ellos.
  alternative_spanish_readings:
  - El mandato fue dado a Israel y a Faraón
  - El mandato fue dado a Moisés y Aarón hacia Israel y Faraón
  rationale: La sintaxis hebrea admite que אֶל indique el ámbito o referente de la orden. La redacción española conserva esa tensión sin forzar una recepción directa por Israel o Faraón.
  doctrine_reference: POB lexical note on אֶל with צוה; source-based syntactic ambiguity
translation_notes:
  revision_awareness: 'El pasaje coincide con la última revisión auditada: no hubo cambios en el texto fuente hebreo ni en el juicio de alta concordancia. La decisión clave sigue siendo la misma: conservar la ambigüedad controlada de אֶל tras צוה y mantener la expresión transparente «hijos de Israel».'
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה, conforme al estándar del proyecto.
  - Se conserva «hijos de Israel» en lugar de neutralizar a «israelitas», para reflejar la forma hebrea masculina plural.
  - «Faraón» se usa como nombre/título histórico en español bíblico estándar, sin añadir el artículo donde el hebreo no lo exige.
  - «Tierra de Egipto» conserva el sustantivo אֶרֶץ explícito en el original.
