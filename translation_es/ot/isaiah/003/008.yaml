base_translation:
  language: en
  yaml_path: translation/ot/isaiah/003/008.yaml
  text: For Jerusalem has stumbled[a], and Judah has fallen, because their tongue and their deeds are against Yahweh, to rebel against the eyes of his glory.
  footnotes:
