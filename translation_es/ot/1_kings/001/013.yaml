  text: לְכִ֞י וּ/בֹ֣אִי אֶל הַ/מֶּ֣לֶךְ דָּוִ֗ד וְ/אָמַ֤רְתְּ אֵלָי/ו֙ הֲ/לֹֽא אַתָּ֞ה אֲדֹנִ֣/י הַ/מֶּ֗לֶךְ נִשְׁבַּ֤עְתָּ לַ/אֲמָֽתְ/ךָ֙ לֵ/אמֹ֔ר כִּֽי שְׁלֹמֹ֤ה בְנֵ/ךְ֙ יִמְלֹ֣ךְ אַחֲרַ֔/י וְ/ה֖וּא יֵשֵׁ֣ב עַל כִּסְאִ֑/י וּ/מַדּ֖וּעַ מָלַ֥ךְ אֲדֹנִיָֽהוּ׀־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_kings/001/013.yaml
  text: Please go in to King David and say to him[a], ‘My lord the king, did you not swear to your servant, saying, “Solomon your son shall reign after me, and he shall sit on my throne”? Why then has Adonijah become king?’
  footnotes:
  - marker: a
    text: Or “to your maidservant.” The Hebrew term is specifically feminine and is Bathsheba’s deferential self-reference before the king.
    reason: lexical_alternative
