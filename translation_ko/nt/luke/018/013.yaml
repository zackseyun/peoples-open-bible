  yaml_path: translation/nt/luke/018/013.yaml
  text: But the tax collector[a], standing far off, was not willing even to lift up his eyes to heaven, but kept beating his chest, saying, ‘God, be merciful to me, the sinner.’
  footnotes:
  - marker: a
    text: Or "be propitious to me"; the verb is related to language of atonement and propitiation.
