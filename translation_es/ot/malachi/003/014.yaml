revisions:
- from: 'Han dicho[a]: “Es vano servir a Dios. ¿Y qué provecho[b] hay en que hayamos guardado su encargo[c] y en que hayamos andado en duelo[d] delante de Yahvé de los ejércitos?”'
  to: 'Han dicho: «Es vano[a] servir a Dios. ¿Y qué provecho[b] hay en que hayamos guardado lo que él requería[c] y en que hayamos andado en duelo[d] delante de Yahvé de los ejércitos?»'
  rationale: Se corrigen los anclajes de notas para que correspondan a las palabras explicadas por el aparato léxico y se mejora ligeramente la naturalidad de מִשְׁמַרְתּוֹ con «lo que él requería», que expresa mejor el matiz obligacional en contexto sin perder las alternativas documentadas.
