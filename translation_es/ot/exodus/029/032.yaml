translation:
  language: es
  text: Aarón y sus hijos varones comerán la carne del carnero[a] y el pan que está en la canasta, a la entrada de la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la porción comestible del carnero'. El hebreo dice literalmente 'la carne del carnero', pero en contextos sacrificiales puede referirse a la carne destinada para comer.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אָכַל
  english_pob_choice: shall eat
  chosen_spanish: comerán
  alternatives_spanish:
  - deberán comer
  - comerá
  - han de comer
  lexicon: HALOT
  rationale: En este contexto ritual e instructivo, el hebreo tiene fuerza prescriptiva. En español, el futuro simple comunica bien esa obligación/mandato sin volver la frase artificial. Se evita un calco demasiado rígido de la estructura inglesa.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: HALOT
  rationale: Nombre propio bíblico en forma española estándar con tilde, más natural y reconocible para lectura eclesial en español.
- source_word: וּ/בָנָי/ו
  english_pob_choice: and his sons
  chosen_spanish: y sus hijos
  alternatives_spanish:
  - y sus hijos varones
  - y sus hijos
  lexicon: HALOT
  rationale: Aunque el inglés POB conservó 'sons' por precisión genealógica y sacerdotal, en español 'hijos' puede abarcar en este pasaje a los descendientes varones ya identificados por el contexto sacerdotal. 'Hijos' evita una redundancia forzada con la construcción posesiva y sigue siendo comprensible sin perder el referente familiar-priestal.
- source_word: בְּשַׂר
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - la carne sacrificada
  - la carne del animal
  lexicon: HALOT
  rationale: '''בשר'' literalmente es ''carne/flesh''. En español bíblico, ''la carne'' conserva esa literalidad y suena natural; ''carne'' también mantiene el matiz sacrificial. No se opta por ''carne'' en el sentido moderno genérico de comida para no debilitar el vínculo con el animal sacrificado.'
- source_word: הָ/אַיִל
  english_pob_choice: the ram
  chosen_spanish: del carnero
  alternatives_spanish:
  - del macho carnero
  - del ram
  lexicon: HALOT
  rationale: '''אַיִל'' designa un carnero sacrificial. En español, ''carnero'' es el equivalente natural y estable en registros bíblicos; se integra además bien con el genitivo posesivo.'
- source_word: הַ/לֶּחֶם
  english_pob_choice: the bread
  chosen_spanish: el pan
  alternatives_spanish:
  - el alimento
  - los panes
  lexicon: HALOT
  rationale: Aunque el inglés usa 'bread' en singular colectivo, en español 'pan' es la forma más natural y fiel para ese sustantivo colectivo. No se pluraliza porque el hebreo sigue funcionando como término colectivo en este contexto de ofrenda.
- source_word: אֲשֶׁר בַּ/סָּל
  english_pob_choice: that is in the basket
  chosen_spanish: que está en la canasta
  alternatives_spanish:
  - que está en el cesto
  - que está en la cesta
  lexicon: HALOT
  rationale: '''סל'' es un recipiente tipo canasta/cesto. ''Canasta'' es claro, moderno y ampliamente inteligible. Se mantiene la relativa de ubicación sin sobreespecificar el tipo de recipiente.'
- source_word: פֶּתַח
  english_pob_choice: at the entrance of
  chosen_spanish: a la entrada de
  alternatives_spanish:
  - en la entrada de
  - junto a la entrada de
  lexicon: HALOT
  rationale: '''פתח'' indica la zona de acceso/entrada. ''A la entrada de'' reproduce bien el valor locativo y es idiomático en español.'
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - el tabernáculo de reunión
  - la tienda del encuentro
  lexicon: HALOT
  rationale: Se prefiere 'tienda de reunión' para reflejar de manera más directa la función de 'אוהל מועד'. 'Tienda del encuentro' sería más interpretativo; 'tabernáculo de reunión' es tradicional pero introduce terminología menos transparente para una lectura directa.
theological_decisions:
- issue: Referencia masculina sacerdotal
  english_pob_reading: and his sons
  chosen_spanish_reading: y sus hijos
  alternative_spanish_readings:
  - y sus hijos varones
  - y sus hijos
  rationale: El contexto inmediato es la consagración sacerdotal de la descendencia masculina de Aarón. En español, 'hijos' puede funcionar de forma genérica en un marco familiar/priestal ya determinado, sin perder la referencia masculina que el contexto suministra. Se evita una formulación más explícita si no aporta claridad adicional.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Fuerza prescriptiva del verbo en instrucción ritual
  english_pob_reading: shall eat
  chosen_spanish_reading: comerán
  alternative_spanish_readings:
  - deberán comer
  - han de comer
  rationale: La forma verbal expresa una instrucción normativa, no un simple relato. El futuro simple en español puede comunicar ese valor normativo de manera natural en instrucciones legales o rituales, manteniendo la fuerza del texto hebreo sin forzar una perífrasis más pesada.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Sustantivo sacrificial בשר
  english_pob_reading: the flesh
  chosen_spanish_reading: la carne
  alternative_spanish_readings:
  - la carne sacrificada
  - la carne del animal
  rationale: No se suaviza 'בשר' a 'alimento' ni se lo reemplaza por una lectura culinaria genérica. 'La carne' preserva el referente corpóreo y sacrificial, y mantiene abierta la tensión léxica que el propio hebreo presenta entre carne y porción comestible.
  doctrine_reference: HALOT; DOCTRINE.md §Lexical transparency
translation_notes:
  revision_awareness: 'Concordante con el paquete fuente y el audit trail inglés: se conservó la fuerza prescriptiva del verbo, el referente sacerdotal masculino del contexto, y la tensión léxica de בשר sin reducirla a una glosa interpretativa. La versión española sigue el texto hebreo de manera transparente, con una sola nota léxica donde el español necesita explicitar la alternativa semántica.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' en el proyecto, pero este versículo no contiene el nombre divino.
  - '''Tienda de reunión'' se usa de forma consistente para אוהל מועד, en lugar de ''tabernáculo'' por defecto.'
  - '''Carnero'' se eligió para אַיִל como equivalente natural y bíblicamente claro en español.'
  - La nota sobre 'carne' conserva la alternativa 'meat/flesh' del audit trail inglés sin imponerla en el texto principal.
