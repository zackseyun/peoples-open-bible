translation:
  text: One thing complements another's good things[b][a], and who can have enough of seeing his glory?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'One strengthens the good things of another.' The Greek verb can mean 'make firm' or 'strengthen,' and the line expresses the mutual fittingness of created things.
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'his' most likely refers to God; alternatively, it could be understood more impersonally as the splendor displayed in creation.
    reason: alternative_reading
lexical_decisions:
- source_word: ἓν τοῦ ἑνὸς
  chosen: One thing ... another's
  alternatives:
  - One of another
  - Each with the other
  - One opposite another
  lexicon: LSJ
  rationale: The idiom is elliptical. In context of paired and ordered creation, it expresses reciprocal relation between one thing and another rather than numerical singularity alone. English supplies 'thing' for readability.
- source_word: ἐστερέωσεν
  chosen: complements
  alternatives:
  - strengthened
  - established
  - confirmed
  - made firm
  lexicon: LSJ
  rationale: The verb literally means 'made firm/strengthened.' In this context, with 'one ... of the one' and 'the good things,' the sense is that each created thing supports or completes the good of another. 'Complements' captures the relational force in idiomatic English while staying close to the likely sense. A more formal alternative is preserved in the rationale.
- source_word: τὰ ἀγαθά
  chosen: good things
  alternatives:
  - benefits
  - goods
  - what is good
  lexicon: LSJ
  rationale: The plural article with adjective functions substantivally. 'Good things' is the most transparent rendering and preserves the broad scope of beneficial qualities or gifts.
- source_word: τίς πλησθήσεται
  chosen: who can have enough
  alternatives:
  - who will be filled
  - who will be satisfied
  lexicon: LSJ
  rationale: Future passive of πίμπλημι can mean 'be filled' or idiomatically 'be satisfied/have enough.' In English, with an infinitive-like participial complement 'seeing,' 'who can have enough of seeing' is natural and conveys the rhetorical impossibility intended.
- source_word: ὁρῶν
  chosen: of seeing
  alternatives:
  - while seeing
  - by seeing
  - seeing
  lexicon: LSJ
  rationale: The participle is rendered idiomatically after 'have enough of' in English. This preserves the ongoing aspect of beholding.
- source_word: δόξαν αὐτοῦ
  chosen: his glory
  alternatives:
  - his splendor
  - its glory
  lexicon: LSJ
  rationale: δόξα here denotes manifested splendor/glory. The pronoun most naturally refers to God in the surrounding hymn to creation, so 'his glory' is preferred over impersonal 'its glory.'
