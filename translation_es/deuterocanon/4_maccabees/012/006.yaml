translation:
  language: es
  text: Y mientras les instaba[a] a estas cosas, mandó llamar a la madre del niño, para que, apiadándose de ella después de haber sido privada de tantos hijos, la persuadiera a hacer que el que quedaba se volviera dócil para su[b] liberación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «exhortaba» o «apremiaba». El griego expresa una insistencia verbal fuerte.
    reason: alternative_reading
  - marker: b
    text: O «salvación». El griego puede usar σωτηρία en sentido amplio, pero aquí se refiere más naturalmente al rescate físico de la ejecución.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακαλῶν
  english_pob_choice: urging
  chosen_spanish: instaba
  alternatives_spanish:
  - rogaba
  - exhortaba
  - apremiaba
  lexicon: BDAG
  rationale: παρακαλῶν expresa una súplica o exhortación insistente; «instaba» comunica bien la presión verbal sin sonar demasiado suave ni excesivamente eclesiástico.
- source_word: μετεπέμψατο
  english_pob_choice: he sent for
  chosen_spanish: mandó llamar
  alternatives_spanish:
  - hizo venir
  - convocó
  - llamó
  lexicon: LSJ
  rationale: El verbo medio indica hacer venir o llamar a alguien; «mandó llamar» es natural en español y conserva la iniciativa del sujeto.
- source_word: ἐλεήσας
  english_pob_choice: having pity on
  chosen_spanish: apiadándose de
  alternatives_spanish:
  - teniendo compasión de
  - teniendo piedad de
  - misericordiándose de
  lexicon: BDAG
  rationale: La forma participial expresa la actitud compasiva atribuida al rey; «apiadándose de» reproduce ese matiz sin cargarlo innecesariamente de lenguaje devocional.
- source_word: στερηθεῖσαν
  english_pob_choice: after she had been deprived of
  chosen_spanish: después de haber sido privada de
  alternatives_spanish:
  - tras haber quedado sin
  - después de haber perdido
  - después de haber quedado despojada de
  lexicon: BDAG
  rationale: «Privada de» conserva la pasiva del griego y la idea de despojo o pérdida sufrida, en línea con la elección inglesa.
- source_word: παρορμήσειεν
  english_pob_choice: he might persuade
  chosen_spanish: la persuadiera
  alternatives_spanish:
  - la moviera
  - la indujera
  - la incitara
  lexicon: LSJ
  rationale: En este contexto el objetivo es mover a la madre a influir en su hijo; «persuadiera» sigue de cerca la lectura inglesa y evita una dureza innecesaria.
- source_word: σωτηρίαν
  english_pob_choice: deliverance
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - rescate
  - salvamento
  lexicon: BDAG
  rationale: Aquí el POB inglés conserva la ambigüedad amplia de σωτηρία con una nota; en español «salvación» mantiene esa tensión semántica y permite la alternativa de rescate físico sin cerrarla prematuramente.
- source_word: εὐπειθῆ ποιῆσαι
  english_pob_choice: to make ... compliant
  chosen_spanish: hacer obediente
  alternatives_spanish:
  - hacer dócil
  - volver sumiso
  - hacer cumplidor
  lexicon: LSJ
  rationale: La expresión describe volver a alguien dócil o fácilmente persuadible; «hacer obediente» es claro en español y conserva la dirección moral/práctica del acto sin suavizarla demasiado.
- source_word: τὸν περιλειπόμενον
  english_pob_choice: the one remaining
  chosen_spanish: al que quedaba
  alternatives_spanish:
  - al restante
  - al que sobrevivía
  - al único que quedaba
  lexicon: LSJ
  rationale: El participio señala al hijo que todavía quedaba; «al que quedaba» es breve, natural y suficientemente fiel al referente único del contexto.
theological_decisions:
- issue: Sentido de σωτηρία en un contexto de martirio y amenaza de muerte
  english_pob_reading: deliverance in the sense of physical rescue from execution
  chosen_spanish_reading: salvación con posibilidad inmediata de rescate físico
  alternative_spanish_readings:
  - liberación
  - rescate
  - salvación espiritual
  rationale: El contexto apunta a la liberación temporal del hijo si la madre coopera. Mantener «salvación» en el texto deja abierta la amplitud del término griego, mientras que el contexto y la nota pueden aclarar que se trata de rescate físico, no de una afirmación doctrinal sobre salvación eterna.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; avoid importing doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó «the one left alive» a «the one remaining» por mayor naturalidad y formalidad; por eso la redacción española usa «al que quedaba», evitando especificar «vivo» donde el contexto ya identifica al único hijo restante.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; aquí no aparece el tetragrámaton.
  - Se conserva un registro sobrio y bíblico, pero con español actual y sintaxis natural.
  - No se fuerza una interpretación espiritualizada de σωτηρία; se deja la tensión semántica que el audit trail documenta.
