review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB inglés: exhortación a considerar un caso hipotético, contraste concesivo con la maternidad, lamento hipotético y transición al discurso imaginado. Sin embargo, dos elecciones en español no son las más fieles ni las más naturales: «sobre ellos» suena calcado e impropio con «lamentar» en español; y «habría dicho estas cosas así» es más pesado que el griego y menos natural que una formulación equivalente.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero presenta leves calcos del inglés/griego. «Pues consideren también esto» es aceptable; «de ánimo pusilánime» funciona, aunque la nota no es necesaria para comprensión. Los puntos a reparar son principalmente de naturalidad idiomática: «habría lamentado por ellos» expresa mejor ἐπʼ αὐτοῖς en español, y «habría hablado así» o «habría dicho esto así» evita una rigidez innecesaria.'
  glossary_alignment: No hay términos del glosario principal en disputa aquí. La decisión «la mujer» para γυνή respeta la distinción con «madre». «De ánimo pusilánime» concuerda con la justificación del POB para δειλόψυχος, aunque puede mantenerse sin nota. No hay conflictos teológicos o terminológicos mayores.
  issues:
  - severity: medium
    issue: «sobre ellos» con «habría lamentado» suena antinatural en español
    rationale: Aunque ἐπʼ αὐτοῖς se vierte literalmente como «sobre ellos» en inglés («over them»), en español el verbo «lamentar» normalmente rige «por ellos» o una construcción distinta. Mantener «sobre ellos» produce un calco poco idiomático.
  - severity: low
    issue: «habría dicho estas cosas así» es demasiado rígido
    rationale: ταῦτα οὕτως εἶπεν introduce el discurso siguiente; en español bíblico legible, «habría hablado así» o «habría dicho esto así» comunica el sentido con más naturalidad sin pérdida semántica.
  - severity: low
    issue: La nota [a] no es necesaria
    rationale: «De ánimo pusilánime» es comprensible por sí mismo y no crea ambigüedad nueva que exija nota. Puede omitirse para no recargar el texto.
  revised_spanish_text: 'Pues consideren también esto: si la mujer hubiera sido de ánimo pusilánime, aunque era madre, habría lamentado por ellos; y quizá habría hablado así:'
  revision_rationale: 'Se ajusta la redacción para evitar calcos poco naturales en español: «por ellos» en vez de «sobre ellos» con «lamentado», y «habría hablado así» en lugar de «habría dicho estas cosas así». Se elimina la nota por no ser necesaria para fidelidad ni claridad.'
