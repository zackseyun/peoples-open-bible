    rationale: «Pisa las alturas del mar» suena natural, pero absorbe la preposición «sobre» y debilita la correspondencia formal con el hebreo y con la decisión léxica documentada para עַל. Dado que el inglés POB mantiene «treads on», conviene conservar también esa relación espacial en español.
  - severity: low
