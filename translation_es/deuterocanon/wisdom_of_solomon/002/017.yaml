translation:
  language: es
  text: Veamos si sus palabras son verdaderas, y probemos lo que será de él al final.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuál será su desenlace». El griego puede referirse al resultado o fin que le sobrevenga.'
