translation:
  language: es
  text: para desviar de la justicia[a] a los pobres, y para despojar del derecho a los afligidos de mi pueblo, para que las viudas sean su botín, y despojen a los huérfanos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los pobres de mi pueblo». El término hebreo puede denotar pobreza, aflicción u opresión.
    reason: lexical_alternative
  - marker: b
    text: O «los que no tienen padre». Literalmente, «los sin padre».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַטּוֹת
  english_pob_choice: to turn aside
  chosen_spanish: desviar
  alternatives_spanish:
  - torcer
  - apartar
  lexicon: HALOT
  rationale: El hiphil de נטה aquí expresa hacer que algo se aparte de su curso debido; «desviar» comunica bien la idea de apartar el juicio de su rumbo sin forzar el verbo con una lectura más dura que la del contexto.
- source_word: מִדִּין
  english_pob_choice: from justice
  chosen_spanish: de la justicia
  alternatives_spanish:
  - del juicio
  - del derecho
  lexicon: HALOT
  rationale: דִּין puede abarcar justicia, juicio o causa legal. En este contexto de opresión judicial, «justicia» conserva la fuerza jurídica y suena natural en español.
- source_word: דַּלִּים
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los débiles
  - los necesitados
  lexicon: HALOT
  rationale: El término designa a personas socialmente debilitadas o pobres; «los pobres» es la equivalencia más directa y entendible en español.
- source_word: וְלִגְזֹל
  english_pob_choice: and to rob
  chosen_spanish: y para robar
  alternatives_spanish:
  - y para despojar
  - y para arrebatar
  lexicon: HALOT
  rationale: גזל implica tomar por fuerza o injustamente. «Robar» mantiene el tono legal y violento del contexto.
- source_word: מִשְׁפַּט
  english_pob_choice: their right
  chosen_spanish: el derecho
  alternatives_spanish:
  - la justicia
  - el debido legal
  lexicon: HALOT
  rationale: Aquí מִשְׁפָּט no funciona solo como «justicia» abstracta, sino como lo que les corresponde legalmente. «El derecho» preserva esa fuerza sin repetir «justicia» de forma pesada.
- source_word: עֲנִיֵּי עַמִּי
  english_pob_choice: the afflicted of my people
  chosen_spanish: de los afligidos de mi pueblo
  alternatives_spanish:
  - de los pobres de mi pueblo
  - de los oprimidos de mi pueblo
  lexicon: HALOT
  rationale: עָנִי puede significar pobre, afligido u oprimido. «Afligidos» conserva la amplitud del término y refleja bien la situación de vulnerabilidad que destaca el pasaje.
- source_word: לִהְיוֹת
  english_pob_choice: so that ... may become
  chosen_spanish: para que ... sean
  alternatives_spanish:
  - de modo que ... lleguen a ser
  - para llegar a ser
  lexicon: HALOT
  rationale: La forma infinitiva expresa resultado o finalidad; en español, «para que ... sean» es fluido y comunica la relación causal prevista.
- source_word: אַלְמָנוֹת
  english_pob_choice: widows
  chosen_spanish: las viudas
  alternatives_spanish:
  - viudas
  lexicon: HALOT
  rationale: Renderizado estándar y preciso para la categoría social protegida por el texto.
- source_word: שְׁלָלָם
  english_pob_choice: their spoil
  chosen_spanish: su botín
  alternatives_spanish:
  - su presa
  - su despojo
  lexicon: HALOT
  rationale: שָׁלָל denota botín o despojo de guerra. «Botín» conserva la imagen predatoria y funciona bien en español.
- source_word: יְתוֹמִים
  english_pob_choice: the fatherless
  chosen_spanish: los huérfanos
  alternatives_spanish:
  - los desamparados
  - los sin padre
  lexicon: HALOT
  rationale: Aunque literalmente es «los sin padre», en español «huérfanos» comunica de manera natural la categoría social y mantiene el sentido general del hebreo.
- source_word: יָבֹזּוּ
  english_pob_choice: they may plunder
  chosen_spanish: despojen
  alternatives_spanish:
  - saqueen
  - saqueen y despojen
  lexicon: HALOT
  rationale: בזז significa saquear o despojar. «Despojen» mantiene el paralelismo con «botín» y el tono de explotación violenta.
theological_decisions:
- issue: Retención de las categorías vulnerables del texto
  english_pob_reading: The verse names widows and the fatherless as specific protected groups.
  chosen_spanish_reading: Se mantienen «las viudas» y «los huérfanos» como categorías concretas, no una generalización como «los vulnerables».
  alternative_spanish_readings:
  - las viudas y los huérfanos
  - las personas vulnerables
  rationale: El hebreo nombra grupos sociales específicos y la denuncia profética depende de esa concreción. En español, conservarlos preserva la fuerza ética del pasaje.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Primera persona en עַמִּי
  english_pob_reading: my people
  chosen_spanish_reading: mi pueblo
  alternative_spanish_readings:
  - su pueblo
  rationale: El sufijo hebreo es de primera persona singular y debe conservarse para reflejar la voz divina del contexto.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: Se revisó el paquete fuente hebreo, la morfología y la traducción auditada en inglés; no hubo revisiones aplicadas en el registro inglés más reciente, y la versión española sigue esa lectura con decisiones léxicas transparentes.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma predeterminada solo cuando corresponde; en este versículo el hablante se identifica por «mi pueblo», sin aparición del tetragrámaton en el texto base.
  - Se evitó «SEÑOR» como sustituto por convención.
  - «Justicia» y «derecho» se distribuyen para evitar monotonía y reflejar la distinción contextual entre דין y משפט.
  - Se mantuvo el registro profético y judicial sin volverlo excesivamente arcaico.
