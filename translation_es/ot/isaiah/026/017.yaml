translation:
  language: es
  text: Como la mujer encinta que está por dar a luz se retuerce y grita en sus dolores de parto[a], así estábamos nosotros delante de ti, oh Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "en tu presencia"; la frase hebrea se refiere literalmente a estar delante del rostro o presencia de Yahvé. Algunos la entienden como "por causa de ti".'
    reason: alternative_reading
lexical_decisions:
- source_word: כְּמוֹ
  english_pob_choice: Like
  chosen_spanish: Como
  alternatives_spanish:
  - Así como
  - Tal como
  lexicon: HALOT
  rationale: Introduce una comparación directa; en español, 'Como' conserva la fuerza comparativa de manera natural y sobria.
- source_word: הָרָה
  english_pob_choice: a pregnant woman
  chosen_spanish: la mujer encinta
  alternatives_spanish:
  - la mujer embarazada
  - la mujer preñada
  lexicon: HALOT
  rationale: '''Encinta'' es claro, reverente y tradicional en registros bíblicos en español; mantiene el referente femenino explícito que exige el hebreo.'
- source_word: תַּקְרִיב לָלֶדֶת
  english_pob_choice: who is about to give birth
  chosen_spanish: que está por dar a luz
  alternatives_spanish:
  - que se acerca al parto
  - que está a punto de parir
  lexicon: HALOT
  rationale: La construcción expresa proximidad al momento del alumbramiento. 'Está por dar a luz' es idiomática y fiel al sentido de cercanía temporal.
- source_word: תָּחִיל
  english_pob_choice: writhes
  chosen_spanish: se retuerce
  alternatives_spanish:
  - tiembla
  - está en dolores de parto
  - se convulsiona
  lexicon: HALOT
  rationale: El verbo en el contexto de parto transmite agitación corporal intensa. 'Se retuerce' conserva la imagen física vívida que el inglés POB también quiso preservar.
- source_word: תִּזְעַק
  english_pob_choice: cries out
  chosen_spanish: grita
  alternatives_spanish:
  - clama
  - da un grito
  lexicon: HALOT
  rationale: La idea es un alzar la voz en dolor; 'grita' es directo y natural en español, sin suavizar demasiado el verbo.
- source_word: בַּחֲבָלֶיהָ
  english_pob_choice: in her labor pains
  chosen_spanish: en sus dolores de parto
  alternatives_spanish:
  - en sus congojas
  - en sus contracciones
  lexicon: HALOT
  rationale: '''Dolores de parto'' reproduce el campo semántico de חבל en este contexto y es transparente para el lector español.'
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de igual modo
  - de la misma manera
  lexicon: HALOT
  rationale: Marca la conclusión comparativa; 'así' es breve y mantiene la correlación entre imagen y aplicación.
- source_word: הָיִינוּ
  english_pob_choice: were we
  chosen_spanish: fuimos nosotros
  alternatives_spanish:
  - éramos nosotros
  - estuvimos nosotros
  lexicon: HALOT
  rationale: El perfecto hebreo describe el estado del pueblo en la comparación. En español, 'fuimos' con el pronombre explícito mantiene el énfasis y el orden enfático del original.
- source_word: מִפָּנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - ante ti
  lexicon: HALOT
  rationale: La frase puede referirse a estar delante/presencia de Dios, con posible matiz causal. 'Delante de ti' preserva la imagen relacional sin resolver la ambigüedad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se usa el nombre divino transliterado según la convención del proyecto, en lugar de sustituirlo por un título. 'Yahvé' es la forma española correspondiente a 'Yahweh'.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: oh Yahvé
  alternative_spanish_readings:
  - oh el SEÑOR
  - oh Jehová
  rationale: El hebreo usa el Tetragrámaton; la decisión del POB en inglés preserva el nombre propio divino. En español, 'Yahvé' mantiene esa elección y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de מִפָּנֶיךָ
  english_pob_reading: before you
  chosen_spanish_reading: delante de ti
  alternative_spanish_readings:
  - en tu presencia
  - por causa de ti
  rationale: La frase puede sugerir presencia o, para algunos, causalidad. Se conserva la ambigüedad con 'delante de ti', sin decidir de forma excesiva entre las opciones posibles.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se ha mantenido la lectura del último pase como estable, sin cambios frente al inglés auditado; la única tensión interpretativa relevante sigue siendo מִפָּנֶיךָ, preservada en la nota.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como forma española del nombre divino, coherente con la política del proyecto.
  - Se mantiene el lenguaje corporal y concreto del parto ('se retuerce', 'grita', 'dolores de parto') sin abstracciones innecesarias.
  - La sintaxis reproduce el paralelismo comparativo del hebreo con un ritmo natural en español.
  - No se ha sustituido la ambigüedad relacional de מִפָּנֶיךָ por una explicación causal cerrada en el texto principal.
