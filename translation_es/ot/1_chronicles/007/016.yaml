translation:
  language: es
  text: Maaca, la esposa de Maquir, dio a luz un hijo, y llamó su nombre[a] Peresh; y el nombre de su hermano fue Sheresh, y sus hijos[b] fueron Ulam y Rakem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «le puso por nombre Peresh» o «lo llamó Peresh».'
    reason: lexical_alternative
  - marker: b
    text: En las genealogías hebreas, «hijos» suele referirse específicamente a descendientes varones; aquí se conserva ese sentido en lugar de generalizar a «hijos e hijas» o «descendencia».
    reason: cultural_note
lexical_decisions:
- source_word: וַתֵּלֶד
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: HALOT
  rationale: En un registro genealógico, el hebreo narra el nacimiento de forma directa. En español, «dio a luz» comunica ese hecho con naturalidad y dignidad; «parió» suena más corporal y menos neutro, y «engendró» desplaza la acción a un uso menos natural para la madre.
- source_word: אֵשֶׁת מָכִיר
  english_pob_choice: the wife of Machir
  chosen_spanish: la esposa de Maquir
  alternatives_spanish:
  - la mujer de Maquir
  - la esposa de Machir
  lexicon: HALOT
  rationale: «Esposa de» conserva el vínculo relacional formal del hebreo en una genealogía. Se usa la forma española de nombre «Maquir» conforme a la transliteración hispana habitual, sin alterar el referente.
- source_word: בֵּן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un varón
  - un hijo varón
  lexicon: HALOT
  rationale: El contexto narrativo ya establece que se trata de un nacimiento; «un hijo» es claro y natural en español. «Hijo varón» sería más explícito, pero aquí no es necesario, y «un varón» resulta demasiado técnico.
- source_word: וַתִּקְרָא שְׁמוֹ
  english_pob_choice: she called his name
  chosen_spanish: llamó su nombre
  alternatives_spanish:
  - lo llamó
  - le puso por nombre
  lexicon: HALOT
  rationale: Se conserva el giro semítico del texto, que en español bíblico puede expresarse con claridad como «llamó su nombre». Es más cercano a la forma del hebreo que «le puso por nombre», aunque esta última sería también posible.
- source_word: פֶּרֶשׁ
  english_pob_choice: Peresh
  chosen_spanish: Peres
  alternatives_spanish:
  - Peresh
  lexicon: transliteration
  rationale: Se adopta «Peres» para la forma hispana del nombre, una transliteración más natural en español que evita la terminación consonántica final difícil de articular. La base hebrea conserva la identidad del nombre, y la adaptación busca legibilidad pública.
- source_word: וְשֵׁם אָחִיו
  english_pob_choice: and the name of his brother was
  chosen_spanish: y el nombre de su hermano fue
  alternatives_spanish:
  - y el nombre de su hermano era
  - y su hermano se llamaba
  lexicon: HALOT
  rationale: La construcción nominal se mantiene casi literalmente para respetar el registro genealógico. El pretérito «fue» reproduce el enlace narrativo del hebreo sin introducir una paráfrasis explicativa.
- source_word: שָׁרֶשׁ
  english_pob_choice: Sheresh
  chosen_spanish: Seres
  alternatives_spanish:
  - Sheres
  - Sheresh
  lexicon: transliteration
  rationale: Se usa «Seres» como forma hispanizada y fluida del nombre propio. La aspiración/choque consonántico del hebreo se atenúa en español para facilitar la lectura sin perder la identidad del nombre.
- source_word: וּבָנָיו
  english_pob_choice: and his sons were
  chosen_spanish: y sus hijos fueron
  alternatives_spanish:
  - y sus hijos eran
  - y sus hijos fueron varones
  lexicon: HALOT
  rationale: Aunque el inglés POB retiene «sons» por precisión genealógica, en español «hijos» funciona de modo más natural para una lista de descendencia. Dado que la genealogía ya aclara el marco masculino por los nombres, esta opción evita una rigidez innecesaria.
- source_word: אוּלָם
  english_pob_choice: Ulam
  chosen_spanish: Ulam
  alternatives_spanish:
  - Ulam
  lexicon: transliteration
  rationale: Nombre propio transliterado de manera directa y estable.
- source_word: וָרָקֶם
  english_pob_choice: Rakem
  chosen_spanish: Rakem
  alternatives_spanish:
  - Ráquem
  - Rakem
  lexicon: transliteration
  rationale: Nombre propio transliterado de forma directa. Se conserva la grafía simple y reconocible para una edición pública en español.
translation_notes:
  revision_awareness: El contexto inglés muestra alta concordancia y sin revisiones aplicadas; por eso el español sigue de cerca la estructura genealógica del hebreo y del POB inglés, con adaptación únicamente en la fluidez natural de nombres y en la expresión verbal de nacimiento.
  spanish_consistency_notes:
  - Se mantuvo el registro genealógico conciso, sin añadir explicaciones no presentes en el texto.
  - Se optó por «Maquir» y «Peres/Seres» como formas más hispanas y publicables, preservando la identidad de los nombres.
  - Se evitó introducir términos eclesiásticos o interpretativos ajenos al pasaje.
  - 'La puntuación sigue el ritmo coordinado del hebreo: nacimiento, nominación y descendencia.'
