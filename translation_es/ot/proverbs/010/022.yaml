base_translation:
  language: en
  yaml_path: translation/ot/proverbs/010/022.yaml
  text: The blessing of Yahweh makes rich[b][a], and it adds no sorrow with it.
  footnotes:
  - marker: a
    text: Or, 'and it adds no sorrow with it'; the Hebrew verb is masculine singular, while 'blessing' is feminine, so the clause may be taken either with an implied subject ('he') or as a smoother sense rendering with 'blessing' as subject.
    reason: alternative_reading
  - marker: b
    text: '''Sorrow'' may also be rendered ''pain,'' ''grief,'' or ''toil.'''
    reason: lexical_alternative
