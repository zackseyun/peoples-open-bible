translation:
  language: es
  text: ¿No son Abaná y Farfar[a], los ríos de Damasco, mejores que todas las aguas de Israel? ¿No podría lavarme en ellos y quedar limpio[b]?" Y se volvió y se fue con furia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Abaná sigue la forma del hebreo masorético; 'Amaná' es una tradicional alternativa de identificación y transliteración.
    reason: alternative_reading
  - marker: b
    text: O 'y quedar purificado'; el hebreo puede expresar tanto limpieza física como una noción más amplia de limpieza o purificación.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Are not / Could I not
  chosen_spanish: ¿No ...? / ¿No podría ...?
  alternatives_spanish:
  - ¿Acaso no ...? / ¿Acaso no podría ...?
  - ¿No es cierto que ...? / ¿No podría ...?
  lexicon: HALOT
  rationale: 'La partícula interrogativa espera respuesta afirmativa. En español, dos preguntas retóricas conservan bien esa fuerza: una al inicio y otra antes de la acción de lavarse.'
- source_word: טוֹב
  english_pob_choice: better
  chosen_spanish: mejores
  alternatives_spanish:
  - buenos
  - superiores
  lexicon: HALOT
  rationale: En la construcción comparativa con מִכֹּל, el español pide un comparativo explícito. 'Mejores' preserva la comparación natural sin perder el matiz valorativo.
- source_word: אבנה
  english_pob_choice: Abanah
  chosen_spanish: Abaná
  alternatives_spanish:
  - Amaná
  lexicon: HALOT
  rationale: Se translitera el nombre hebreo en forma cercana a la vocalización del texto masorético. Se mantiene abierta la alternativa tradicional 'Amaná' en nota.
- source_word: וּפַרְפַּר
  english_pob_choice: Pharpar
  chosen_spanish: Farfar
  alternatives_spanish:
  - Parpar
  lexicon: HALOT
  rationale: Se conserva el nombre propio con transliteración española clara. 'Farfar' refleja la forma tradicional inglesa y es legible en español; 'Parpar' queda como alternativa posible.
- source_word: נַהֲרֹות דַּמֶּשֶׂק
  english_pob_choice: the rivers of Damascus
  chosen_spanish: los ríos de Damasco
  alternatives_spanish:
  - los ríos damascenos
  - los ríos que hay en Damasco
  lexicon: HALOT
  rationale: La cadena constructa se vierte de manera directa y natural, manteniendo la relación genitiva sin añadir especificaciones no presentes en el hebreo.
- source_word: מִכֹּל מֵימֵי יִשְׂרָאֵל
  english_pob_choice: than all the waters of Israel
  chosen_spanish: que todas las aguas de Israel
  alternatives_spanish:
  - que cualquiera de las aguas de Israel
  - que todas las aguas de Israel
  lexicon: HALOT
  rationale: '''Aguas'' conserva el sustantivo amplio del hebreo y no restringe indebidamente a ''ríos''. ''Que'' expresa la comparación requerida por el contexto.'
- source_word: אֶרְחַץ
  english_pob_choice: wash
  chosen_spanish: lavarme
  alternatives_spanish:
  - bañarme
  - lavarme allí
  lexicon: HALOT
  rationale: El verbo רחץ admite 'lavar' o 'bañar'. 'Lavarme' es una solución idiomática que enlaza con la instrucción previa y mantiene la referencia concreta al acto de limpieza.
- source_word: וְטָהָרְתִּי
  english_pob_choice: and be clean
  chosen_spanish: y quedar limpio
  alternatives_spanish:
  - y ser limpio
  - y quedar purificado
  - y ser purificado
  lexicon: HALOT
  rationale: '''Quedar limpio'' comunica el resultado esperado en español sin forzar un matiz ritual que el verso todavía no explicita por completo. Preserva la tensión entre limpieza física y posible limpieza ritual.'
- source_word: וַיִּפֶן
  english_pob_choice: he turned
  chosen_spanish: se volvió
  alternatives_spanish:
  - giró
  - se dio vuelta
  lexicon: HALOT
  rationale: Verbo de movimiento natural en español, suficiente para el encadenamiento narrativo con el siguiente verbo.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se marchó
  lexicon: HALOT
  rationale: La combinación con el verbo anterior hace innecesaria una expansión; 'se fue' reproduce con naturalidad la partida.
- source_word: בְּחֵמָה
  english_pob_choice: in a rage
  chosen_spanish: con furia
  alternatives_spanish:
  - en ira
  - airado
  lexicon: HALOT
  rationale: '''Furia'' transmite la intensidad de חֵמָה con un registro natural y fuerte en español; evita suavizarlo a ''ira'' o ''enojo''.'
theological_decisions:
- issue: Lenguaje de limpieza y posible carga ritual
  english_pob_reading: be clean
  chosen_spanish_reading: quedar limpio
  alternative_spanish_readings:
  - ser limpio
  - quedar purificado
  - ser purificado
  rationale: El contexto inmediato es la sanidad por lavado, pero el hebreo permite una superposición entre limpieza física y resonancias rituales. 'Quedar limpio' mantiene esa ambigüedad sin resolverla prematuramente.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión léxica y teológica donde el texto la deja abierta.'
translation_notes:
  revision_awareness: 'Coincide con el auditor de referencia: no hubo cambios posteriores en el pasaje; la versión final sigue el estado de alta concordancia y conserva la alternativa tradicional para el nombre del río y la ambigüedad de ''limpio''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene la transliteración de nombres propios en forma legible para lector hispanohablante, sin sustituirlos por equivalentes tradicionales no presentes en el hebreo.
  - '''Aguas'' se conserva en plural para no restringir el alcance del hebreo מֵימֵי.'
  - La secuencia verbal final se vierte de manera natural en español para reflejar el encadenamiento narrativo hebreo sin sobretraducirlo.
