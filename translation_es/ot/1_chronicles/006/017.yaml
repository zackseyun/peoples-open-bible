translation:
  language: es
  text: Y estaban ministrando delante del tabernáculo[a], la tienda de reunión, con canto hasta que Salomón edificó la casa de Yahvé[b] en Jerusalén, y estuvieron conforme a su ordenanza[c] en su servicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en canto» o «por medio del canto».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la casa de Yahvé»; es decir, el templo.'
    reason: lexical_alternative
  - marker: c
    text: O «según su orden» o «según su costumbre».
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשָׁרְתִים
  english_pob_choice: ministering
  chosen_spanish: ministrando
  alternatives_spanish:
  - sirviendo
  lexicon: HALOT
  rationale: El participio describe una labor cultual continua. «Ministrando» conserva el valor de servicio religioso sin reducirlo al sentido general de «sirviendo».
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  lexicon: HALOT
  rationale: «Delante de» reproduce bien la relación espacial y ritual ante el santuario, con español natural.
- source_word: מִשְׁכַּן אֹהֶל מוֹעֵד
  english_pob_choice: the tabernacle, the tent of meeting
  chosen_spanish: el tabernáculo, la tienda de reunión
  alternatives_spanish:
  - la morada, la tienda de reunión
  lexicon: HALOT
  rationale: Se conservan ambos sustantivos en aposición. «Tabernáculo» es el equivalente tradicional y exacto de מִשְׁכָּן en este contexto, y «tienda de reunión» mantiene אֹהֶל מוֹעֵד sin fusionarlo o explicarlo de más.
- source_word: בַּשִּׁיר
  english_pob_choice: with song
  chosen_spanish: con canto
  alternatives_spanish:
  - en canto
  - por medio del canto
  lexicon: HALOT
  rationale: La frase señala el modo de su ministerio. «Con canto» es breve, idiomática y preserva el matiz musical.
- source_word: עַד בְּנוֹת שְׁלֹמֹה
  english_pob_choice: until Solomon built
  chosen_spanish: hasta que Salomón edificó
  alternatives_spanish:
  - hasta el edificar de Salomón
  - hasta que Salomón construyó
  lexicon: HALOT
  rationale: El infinitivo con עַד marca el límite temporal del arreglo. «Edificó» mantiene el valor bíblico de construir un edificio sagrado sin perder naturalidad.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahveh
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva «casa» en lugar de interpretar directamente como «templo», porque el hebreo dice literalmente בית. Se sigue el criterio del proyecto para יהוה con «Yahvé».
- source_word: וַיַּעַמְדוּ
  english_pob_choice: they stood
  chosen_spanish: se mantuvieron
  alternatives_spanish:
  - se pusieron de pie
  - estuvieron
  lexicon: HALOT
  rationale: En este contexto institucional, el verbo expresa mantenerse en la posición o asignación debida. «Se mantuvieron» comunica la permanencia funcional sin volverlo torpemente literal.
- source_word: כְמִשְׁפָּטָם
  english_pob_choice: according to their ordinance
  chosen_spanish: conforme a su ordenanza
  alternatives_spanish:
  - según su orden
  - de acuerdo con su costumbre
  lexicon: HALOT
  rationale: «משפט» aquí refiere a una disposición establecida, normativa. «Ordenanza» conserva el sentido regulativo y solemne del pasaje.
- source_word: עַל עֲבוֹדָתָם
  english_pob_choice: over their service
  chosen_spanish: sobre su servicio
  alternatives_spanish:
  - para su servicio
  - respecto de su servicio
  lexicon: HALOT
  rationale: Se mantiene la preposición «sobre» porque refleja con cercanía el hebreo y sugiere la responsabilidad o incumbencia ligada a su servicio.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton, y el proyecto pide transliterarlo como «Yahvé» en el texto principal. Se evita la sustitución litúrgica «SEÑOR» para no ocultar el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre el santuario portátil y la casa posterior
  english_pob_reading: the tabernacle ... until Solomon built the house of Yahweh in Jerusalem
  chosen_spanish_reading: el tabernáculo ... hasta que Salomón edificó la casa de Yahvé en Jerusalén
  alternative_spanish_readings:
  - el tabernáculo ... hasta que Salomón construyó la casa de Yahvé en Jerusalén
  - el tabernáculo ... hasta que Salomón edificó el templo de Yahvé en Jerusalén
  rationale: Se conserva la tensión del hebreo entre el santuario previo y la casa posterior. Aunque el referente histórico es el templo, el texto dice literalmente «casa», y la traducción principal mantiene esa forma.
  doctrine_reference: 1 Crónicas 6:17; compare 2 Crónicas 5:5 para el desarrollo del mismo complejo cultual
translation_notes:
  revision_awareness: La redacción toma como base el texto hebreo y el expediente inglés revisado. Se retuvo la decisión revisada para כמשפטם como «conforme a su ordenanza», pero en español se prefirió «se mantuvieron» para וַיַּעַמְדוּ por ser más natural que un calco de «estuvieron de pie». También se preservó la aposición «el tabernáculo, la tienda de reunión» y la referencia literal a «la casa de Yahvé» con una nota aclaratoria.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «casa» en vez de «templo» en el cuerpo principal, con aclaración en nota.
  - «Tabernáculo» y «tienda de reunión» quedan diferenciados para reflejar ambos términos hebreos.
  - «Con canto» preserva el matiz musical sin convertirlo en paráfrasis.
