  glossary_alignment: Está bien alineado con la terminología del proyecto en «Yahvé» y en la preservación de la fórmula sacrificial como «aroma agradable». «Ofrenda vegetal» sigue la decisión documentada para מִנְחָה. No hay conflicto teológico relevante; el problema principal es técnico-editorial en las notas.
