revisions:
- from: Ellos guardarán su encargo[a] y el encargo de toda la congregación[b] delante de la tienda de reunión, para hacer el servicio del tabernáculo.
  to: Ellos cumplirán su responsabilidad[a] y la responsabilidad de toda la congregación[b] delante de la tienda de reunión, para hacer el servicio del tabernáculo.
  rationale: Se reemplaza «encargo» por «responsabilidad» para expresar mejor el valor cultual de מִשְׁמֶרֶת en español natural y ampliamente legible. También se cambia «guardarán» a «cumplirán» para evitar una combinación poco idiomática; la nota preserva la alternativa más literal de custodia/guardia que el hebreo también permite. Se mantiene el resto del verso porque refleja bien la sintaxis y el contenido fuente.
