translation:
  language: es
  text: Habiendo vuelto atrás[a], regresaron a la misma postura de súplica.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'habiéndose apartado, volvieron al mismo estado de súplica'. La redacción griega puede entenderse de manera más física ('postura'/'posición') o más general ('estado'/'condición').
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποτραπέντες
  english_pob_choice: having turned back
  chosen_spanish: después de haberse vuelto atrás
  alternatives_spanish:
  - habiéndose dado vuelta
  - después de haberse apartado
  - habiendo retrocedido
  lexicon: LSJ
  rationale: El participio expresa un giro o retorno previo a la acción principal. En español, 'haberse vuelto atrás' comunica bien la idea de volver sobre los pasos sin forzar una voz pasiva o una dirección más específica de la que da el griego.
- source_word: παρῆσαν
  english_pob_choice: they returned
  chosen_spanish: regresaron
  alternatives_spanish:
  - vinieron
  - volvieron
  - se presentaron
  lexicon: LSJ
  rationale: En este contexto, πάρειμι no sugiere mera presencia estática, sino reanudación o llegada a una condición anterior. 'Regresaron' recoge esa fuerza resumptiva en español natural.
- source_word: στάσιν
  english_pob_choice: posture
  chosen_spanish: postura
  alternatives_spanish:
  - postura
  - posición
  - estado
  lexicon: LSJ
  rationale: στάσις puede aludir a postura, posición o estado. Dado que el término está modificado por 'de súplica', 'postura' conserva el matiz corporal y situacional que el inglés POB también quiso preservar.
- source_word: δεήσεως
  english_pob_choice: supplication
  chosen_spanish: súplica
  alternatives_spanish:
  - ruego
  - petición
  - imploración
  lexicon: LSJ
  rationale: δέησις denota una petición urgente o apremiante. 'Súplica' mantiene ese tono de ruego intenso mejor que la palabra más general 'oración'.
- source_word: ἐπὶ τὴν αὐτὴν ... στάσιν
  english_pob_choice: to the same posture
  chosen_spanish: a la misma postura
  alternatives_spanish:
  - a la misma posición
  - al mismo estado
  - en la misma postura
  lexicon: LSJ
  rationale: La construcción indica retorno a una condición ya asumida. 'A la misma postura' conserva la idea de reanudar exactamente la misma disposición anterior, sin diluirla en una abstracción como 'estado'.
translation_notes:
  revision_awareness: The English POB draft already reflects a high-agreement, minor-issues review with no substantial revision changes; the Spanish draft follows the same source-grounded reading and preserves the participial sequence and resumptive force of the Greek without adding interpretive content.
  spanish_consistency_notes:
  - Se mantuvo un registro formal y bíblico, pero con sintaxis española natural.
  - No se introdujeron notas al pie porque el griego aquí admite matices, pero la opción española elegida no requiere desdoblamiento textual para ser fiel y clara.
  - '''Súplica'' se prefirió por su intensidad y por corresponder al valor de δεήσις en el contexto.'
