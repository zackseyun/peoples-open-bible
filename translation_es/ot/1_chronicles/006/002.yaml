  english_pob_choice: and Shimei
  chosen_spanish: y Simei
  alternatives_spanish:
  - y Shimei
  lexicon: HALOT
  rationale: El nombre propio se vierte con la forma española acostumbrada «Simei», y la conjunción hebrea se expresa con «y» para coordinar la lista de manera natural.
