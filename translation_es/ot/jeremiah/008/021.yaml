translation:
  language: es
  text: Por la quebradura de la hija de mi pueblo, quedé quebrado[a]; estoy de duelo[c][b]; el horror se ha apoderado de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por el quebrantamiento de la hija de mi pueblo, estoy quebrado». El hebreo usa la misma raíz para el sustantivo y el verbo, creando un juego de palabras deliberado.'
    reason: lexical_alternative
  - marker: b
    text: «La hija de mi pueblo» es una personificación profética de Judá/Israel, preservada aquí en lugar de parafrasearla.
    reason: cultural_note
  - marker: c
    text: 'O: «me ennegrecí» / «ando de luto». El verbo hebreo evoca la oscuridad asociada con el duelo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  english_pob_choice: For
  chosen_spanish: Por
  alternatives_spanish:
  - A causa de
  - Debido a
  lexicon: HALOT
  rationale: El hebreo introduce la causa o motivo del lamento. «Por» conserva esa relación causal de manera natural en español y no añade matiz explicativo excesivo.
- source_word: שֶׁבֶר
  english_pob_choice: brokenness
  chosen_spanish: quebradura
  alternatives_spanish:
  - quebrantamiento
  - fractura
  - ruina
  lexicon: HALOT
  rationale: El sustantivo expresa una ruptura o quiebre. «Quebradura» mantiene el campo semántico de rotura y permite conservar mejor el juego léxico con el verbo siguiente que «ruina» o «dolor».
- source_word: בַּת עַמִּי
  english_pob_choice: the daughter of my people
  chosen_spanish: la hija de mi pueblo
  alternatives_spanish:
  - la hija de mi gente
  - mi pueblo amado
  lexicon: HALOT
  rationale: Se conserva la personificación profética de la comunidad como una hija. «La hija de mi pueblo» es transparente en español y evita deshacer la metáfora.
- source_word: הָשְׁבָּרְתִּי
  english_pob_choice: I am broken
  chosen_spanish: yo me quebré
  alternatives_spanish:
  - yo estoy quebrado
  - yo fui quebrado
  - yo me he quebrado
  lexicon: HALOT
  rationale: El hebreo repite la misma raíz de שֶׁבֶר, produciendo un juego de palabras entre la «quebradura» del pueblo y la condición del hablante. «Yo me quebré» reproduce ese eco verbal con naturalidad española y conserva la tensión entre pasivo/resultativo y experiencia de lamento.
- source_word: קָדַרְתִּי
  english_pob_choice: I mourn
  chosen_spanish: me entristecí
  alternatives_spanish:
  - estoy ennegrecido
  - ando en luto
  - me lamento
  lexicon: HALOT
  rationale: El verbo hebreo literalmente alude a oscuridad/ennegrecerse, pero en contextos de lamentación expresa aflicción o duelo. «Me entristecí» comunica el efecto emocional en español sin perder la tonalidad fúnebre del contexto; se preserva la alternativa más literal en nota.
- source_word: שַׁמָּה
  english_pob_choice: horror
  chosen_spanish: horror
  alternatives_spanish:
  - consternación
  - espanto
  - desolación
  lexicon: HALOT
  rationale: El sustantivo designa estupor, horror o consternación. «Horror» coincide bien con el valor emotivo fuerte del pasaje y con la elección inglesa auditada.
- source_word: הֶחֱזִקַתְנִי
  english_pob_choice: has seized me
  chosen_spanish: se ha apoderado de mí
  alternatives_spanish:
  - me ha tomado
  - me ha sujetado
  - me ha agarrado
  lexicon: HALOT
  rationale: El causativo de חזק expresa que algo toma/agarra con fuerza al hablante. «Se ha apoderado de mí» es idiomático en español y transmite la irrupción poderosa e involuntaria del horror.
translation_notes:
  revision_awareness: La traducción sigue de cerca el texto hebreo y la solución inglesa auditada, manteniendo el paralelismo raíz–raíz entre «quebradura» y «yo me quebré», así como la imagen de oscuridad/duelo detrás de קָדַרְתִּי. No se detectaron revisiones posteriores que obligaran a modificar el pasaje.
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» solo cuando el texto lo exige; este versículo no contiene el nombre divino.
  - Se conserva la personificación «la hija de mi pueblo» para mantener el registro profético y la metáfora comunitaria.
  - Se evita «siervo» o lenguaje eclesiástico tradicional no motivado por el hebreo.
  - Se opta por un español contemporáneo pero solemne, apto para lectura litúrgica y auditabilidad léxica.
