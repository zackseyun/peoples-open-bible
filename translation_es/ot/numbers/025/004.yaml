source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל מֹשֶׁ֗ה קַ֚ח אֶת כָּל רָאשֵׁ֣י הָ/עָ֔ם וְ/הוֹקַ֥ע אוֹתָ֛/ם לַ/יהוָ֖ה נֶ֣גֶד הַ/שָּׁ֑מֶשׁ וְ/יָשֹׁ֛ב חֲר֥וֹן אַף יְהוָ֖ה מִ/יִּשְׂרָאֵֽל־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/025/004.yaml
  text: And Yahweh said to Moses[a], “Take all the leaders of the people and impale them for Yahweh in broad daylight[b], so that the burning anger of Yahweh may turn away from Israel.”
  footnotes:
  - marker: a
    text: Or, 'Take all the leaders of the people, and have them execute the guilty before the LORD in broad daylight.' The Hebrew pronoun 'them' most directly points to the leaders, but some understand the leaders as the ones commanded to carry out the punishment.
    reason: alternative_reading
  - marker: b
    text: Literally, 'before the sun.'
    reason: lexical_alternative
