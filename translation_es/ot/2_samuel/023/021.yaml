revisions:
- from: Él también derribó a un egipcio[a], un hombre de apariencia notable. El egipcio tenía una lanza en la mano, y él descendió hacia él con un bastón[b], le arrebató la lanza de la mano al egipcio y lo mató con su propia lanza.
  to: Él también hirió a un egipcio[a], un hombre de apariencia notable. El egipcio tenía una lanza en la mano, y bajó hacia él con una vara[b], le arrebató la lanza de la mano del egipcio y lo mató con su propia lanza.
  rationale: Se ajusta הִכָּה de «derribó» a «hirió» para no sobreespecificar el efecto del primer golpe antes de la muerte explícita. Se cambia «descendió hacia él» por «bajó hacia él» para conservar el movimiento literal con mejor español. Se prefiere «vara» en el texto principal para שֵׁבֶט por naturalidad y se rehacen las notas para reflejar mejor las alternativas y la explicación del POB inglés.
