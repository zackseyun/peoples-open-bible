base_translation:
  language: en
  yaml_path: translation/ot/genesis/018/027.yaml
  text: Then Abraham answered and said[a], “Behold, please, I have undertaken to speak to my Lord, though I am dust and ashes.”
  footnotes:
  - marker: a
    text: Or “to my lord.” The Hebrew form can be a respectful address; here it is capitalized because the surrounding context identifies the speaker’s addressee with the LORD.
    reason: alternative_reading
