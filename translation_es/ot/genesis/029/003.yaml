translation:
  language: es
  text: Y allí se reunían todos los rebaños, y hacían rodar la piedra de sobre la boca del pozo[a], y daban de beber al rebaño[b], y luego volvían a poner la piedra en su lugar sobre la boca del pozo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «boca del pozo», un modismo para la abertura del pozo.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo usa un singular colectivo: «rebaño».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנֶאֶסְפוּ
  english_pob_choice: would gather
  chosen_spanish: se reunirían
  alternatives_spanish:
  - se juntaban
  - se congregaban
  lexicon: HALOT
  rationale: El niphal imperfectivo describe acción habitual o repetida en el relato. En español, el condicional con valor habitual transmite bien esa repetición narrativa sin convertirlo en un hecho puntual.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: Adverbio de lugar simple y natural; 'allí' mantiene la localización sin añadir matiz innecesario.
- source_word: כָל הָעֲדָרִים
  english_pob_choice: all the flocks
  chosen_spanish: todos los rebaños
  alternatives_spanish:
  - todas las manadas
  - todos los hatos
  lexicon: HALOT
  rationale: עֲדָרִים en contexto pastoril se refiere a grupos de ganado menor; 'rebaños' es la equivalencia natural y conserva el sentido colectivo. Se evita 'manadas' por su asociación más amplia con animales no ovinos/caprinos.
- source_word: וְגָלֲלוּ
  english_pob_choice: they would roll ... away
  chosen_spanish: rodarían
  alternatives_spanish:
  - deslizarían
  - quitarían
  lexicon: HALOT
  rationale: El verbo conserva la imagen concreta de desplazar una piedra rodándola. 'Rodarían la piedra' refleja mejor la acción física que un simple 'quitarían'.
- source_word: מֵעַל פִּי הַבְּאֵר
  english_pob_choice: from the mouth of the well
  chosen_spanish: de la boca del pozo
  alternatives_spanish:
  - de sobre la boca del pozo
  - de la abertura del pozo
  lexicon: HALOT
  rationale: פִּי es literalmente 'boca' y funciona como idiomático de abertura. 'Boca del pozo' mantiene la metáfora hebrea de modo claro en español.
- source_word: וְהִשְׁקוּ
  english_pob_choice: water
  chosen_spanish: darían de beber
  alternatives_spanish:
  - abrevaban
  - daban agua
  lexicon: HALOT
  rationale: La forma hiphil de שׁקה implica hacer beber o suministrar agua. 'Darían de beber' es natural en español y conserva la idea de causación sin perder la referencia al ganado.
- source_word: אֶת הַצֹּאן
  english_pob_choice: the flock
  chosen_spanish: al rebaño
  alternatives_spanish:
  - a las ovejas
  - al ganado
  lexicon: HALOT
  rationale: צֹאן es colectivo; en español conviene mantener el singular colectivo 'rebaño' para reproducir esa fuerza unitaria que el texto hebreo resalta.
- source_word: וְהֵשִׁיבוּ
  english_pob_choice: put ... back
  chosen_spanish: volverían a poner
  alternatives_spanish:
  - pondrían de nuevo
  - restaurarían
  lexicon: HALOT
  rationale: El hiphil de שוב indica hacer volver. Para un objeto inanimado, 'volver a poner' es la expresión más natural y precisa en español.
- source_word: עַל פִּי הַבְּאֵר
  english_pob_choice: over the mouth of the well
  chosen_spanish: sobre la boca del pozo
  alternatives_spanish:
  - encima de la boca del pozo
  - sobre la abertura del pozo
  lexicon: HALOT
  rationale: '''Sobre'' expresa bien el valor de עַל en este contexto de colocación física y conserva la imagen de cubrir la abertura.'
- source_word: לִמְקֹמָהּ
  english_pob_choice: in its place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - a su lugar
  - en el mismo lugar
  lexicon: HALOT
  rationale: La preposición con מקום y sufijo femenino indica restitución al lugar propio. 'En su lugar' es la fórmula más idiomática y fiel en español.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente ajustó el segundo miembro a un singular colectivo (''flock'') y mantuvo la imagen idiomática de ''mouth of the well'' con ''over''. La versión española sigue esa decisión semántica: conserva el colectivo singular ''rebaño'' y traduce el modismo con ''boca del pozo'', mientras ''sobre'' reproduce adecuadamente עַל en el cierre.'
  spanish_consistency_notes:
  - Se mantiene 'rebaño' en singular colectivo para reflejar צֹאן y evitar una pluralización innecesaria.
  - '''Boca del pozo'' conserva la imagen idiomática hebrea de פִּי הַבְּאֵר sin explicitarla en el texto principal.'
  - 'El paralelismo verbal del hebreo se conserva con tres acciones coordinadas: reunirse, rodar la piedra y dar de beber, seguida de la restitución de la piedra.'
