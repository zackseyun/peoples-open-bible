theological_decisions:
- issue: Gendered language in describing the crowd
  chosen_reading: Retain 'men of the city' and 'men of Sodom' in the main text, while rendering כָּל הָעָם as 'all the people.'
  alternative_readings:
  - Render all references generically as 'people of the city'
  rationale: The Hebrew intentionally uses masculine language at the start (אַנְשֵׁי) and then a broader collective term (עָם). Preserving both reflects the source text's wording and avoids flattening the distinction.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
