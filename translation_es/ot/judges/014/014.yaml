translation:
  language: es
  text: 'Y les dijo: «Del que come salió comida, y del fuerte[a] salió dulzura». Pero no pudieron decir[b] la adivinanza por tres días.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y del feroz». El adjetivo hebreo עַז puede significar «fuerte», «poderoso» o «fiero»; aquí se ha mantenido «fuerte» para conservar la ambigüedad de la adivinanza.
    reason: lexical_alternative
  - marker: b
    text: O «explicar». El verbo hebreo también puede expresar el sentido de «explicar» la adivinanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y les dijo
  alternatives_spanish:
  - Entonces les dijo
  - Y dijo
  lexicon: HALOT
  rationale: El wayyiqtol narra avance secuencial; en español, «Y les dijo» conserva la fluidez narrativa sin añadir una relación temporal más fuerte de la que exige el hebreo.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a ellos les
  lexicon: HALOT
  rationale: El dativo clítico español comunica naturalmente el destinatario del habla. Se mantiene el plural explícito en el contexto mediante «les».
- source_word: מֵהָאֹכֵל
  english_pob_choice: Out of the eater
  chosen_spanish: Del que come
  alternatives_spanish:
  - Del comelón
  - Del comedor
  - Del que está comiendo
  lexicon: HALOT
  rationale: El participio sustantivado funciona como «el que come». En español, «del que come» preserva la fuerza lexical sin adoptar un sustantivo poco natural o demasiado coloquial. Se evita «el devorador» porque interpretaría de más el juego del enigma.
- source_word: יָצָא
  english_pob_choice: came
  chosen_spanish: salió
  alternatives_spanish:
  - salió de
  - vino
  lexicon: HALOT
  rationale: «Salió» expresa bien la idea de proceder desde dentro hacia afuera y suena natural en español, manteniendo la imagen del enigma.
- source_word: מַאֲכָל
  english_pob_choice: food
  chosen_spanish: comida
  alternatives_spanish:
  - alimento
  - algo de comer
  lexicon: HALOT
  rationale: «Comida» es claro y compacto, y conserva el paralelismo con «dulzura». «Alimento» sería más formal pero menos natural en este dicho.
- source_word: וּמֵעַז
  english_pob_choice: and out of the strong
  chosen_spanish: y del fuerte
  alternatives_spanish:
  - y del poderoso
  - y del feroz
  lexicon: HALOT
  rationale: El adjetivo עַז admite «fuerte», «poderoso» o «fiero/feroz». «Fuerte» preserva la ambigüedad del enigma como en la traducción inglesa auditada; «feroz» interpretaría demasiado en favor del león.
- source_word: מָתוֹק
  english_pob_choice: sweetness
  chosen_spanish: dulzura
  alternatives_spanish:
  - algo dulce
  - dulce
  lexicon: HALOT
  rationale: El adjetivo se usa sustantivamente; «dulzura» refleja esa cualidad abstracta y sostiene el paralelismo poético con «comida».
- source_word: לֹא יָכְלוּ
  english_pob_choice: they could not
  chosen_spanish: no pudieron
  alternatives_spanish:
  - no fueron capaces
  - no lograron
  lexicon: HALOT
  rationale: Es la equivalencia natural de la incapacidad expresada por יכל, breve y idiomática en español.
- source_word: לְהַגִּיד
  english_pob_choice: tell
  chosen_spanish: decir
  alternatives_spanish:
  - explicar
  - dar la respuesta
  lexicon: HALOT
  rationale: En el contexto de un enigma, «decir» mantiene la literalidad del verbo sin introducir una glosa explicativa. «Explicar» sería más interpretativo.
- source_word: הַחִידָה
  english_pob_choice: the riddle
  chosen_spanish: el enigma
  alternatives_spanish:
  - la adivinanza
  - el acertijo
  lexicon: HALOT
  rationale: חִידָה puede renderizarse como «adivinanza», «acertijo» o «enigma». «Enigma» preserva el tono serio y literario del episodio; «acertijo» sería más coloquial.
- source_word: שְׁלֹשֶׁת יָמִים
  english_pob_choice: for three days
  chosen_spanish: por tres días
  alternatives_spanish:
  - durante tres días
  - en tres días
  lexicon: HALOT
  rationale: «Por tres días» expresa duración de manera natural en español y conserva la amplitud temporal del hebreo sin precisar un límite más allá del texto.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo de Jueces 14:14 y el audit trail inglés. La revisión inglesa reciente no alteró el sentido ni exigió cambios; se conservó la ambigüedad léxica principal de עַז y la posible variación de לְהַגִּיד en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar cuando corresponda; en este versículo no aparece el nombre divino.
  - Se prefirió «enigma» para חִידָה, coherente con el tono narrativo y con el uso POB de mantener términos técnicos cuando no conviene una paraphrase.
  - Se evitó «fiero»/«feroz» en el cuerpo para no resolver el enigma más de lo que hace el hebreo.
