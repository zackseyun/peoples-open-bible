  text: וַ/יִּקָּרֵא֙ אַבְשָׁל֔וֹם לִ/פְנֵ֖י עַבְדֵ֣י דָוִ֑ד וְ/אַבְשָׁל֞וֹם רֹכֵ֣ב עַל הַ/פֶּ֗רֶד וַ/יָּבֹ֣א הַ/פֶּ֡רֶד תַּ֣חַת שׂוֹבֶךְ֩ הָ/אֵלָ֨ה הַ/גְּדוֹלָ֜ה וַ/יֶּחֱזַ֧ק רֹאשׁ֣/וֹ בָ/אֵלָ֗ה וַ/יֻּתַּן֙ בֵּ֤ין הַ/שָּׁמַ֨יִם֙ וּ/בֵ֣ין הָ/אָ֔רֶץ וְ/הַ/פֶּ֥רֶד אֲשֶׁר תַּחְתָּ֖י/ו עָבָֽר־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/018/009.yaml
  text: Absalom happened to come before David’s servants while Absalom was riding on the mule. The mule went under the thick branches of a large terebinth[a], and his head got caught in the terebinth, so that he was left hanging between heaven and earth while the mule that was under him passed on.
  footnotes:
  - marker: a
    text: Or 'under the dense boughs of a great oak.' The Hebrew אֵלָה can be rendered more generally as a large tree, but 'terebinth' is the more precise lexical choice here.
    reason: lexical_alternative
