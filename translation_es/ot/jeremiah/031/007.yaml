translation:
  language: es
  text: 'Porque así dice Yahvé: Canten con júbilo por Jacob, y griten en la cumbre de las naciones[a]; proclamen, alaben y digan: «Salva, Yahvé, a tu pueblo, al remanente de Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al frente de las naciones», «a la cabeza de las naciones» o «sobre las naciones». La expresión hebrea es difícil y puede subrayar la prominencia de Israel entre las naciones o el lugar público de la proclamación.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se conserva como nombre propio divino. ‘Yahvé’ sigue la decisión editorial del POB en inglés y evita sustituir el nombre por un título.
- source_word: רָנּוּ
  english_pob_choice: Sing aloud
  chosen_spanish: Canten con júbilo
  alternatives_spanish:
  - Griten de gozo
  - Canten en voz alta
  lexicon: HALOT
  rationale: El imperativo expresa exultación audible; ‘canten con júbilo’ mantiene el tono celebratorio y es natural en español.
- source_word: לְיַעֲקֹב
  english_pob_choice: for Jacob
  chosen_spanish: por Jacob
  alternatives_spanish:
  - para Jacob
  - a Jacob
  lexicon: HALOT
  rationale: En este contexto de restauración y regocijo, ‘por Jacob’ comunica bien el motivo de la celebración sin forzar una relación direccional.
- source_word: שִׂמְחָה
  english_pob_choice: with gladness
  chosen_spanish: con júbilo
  alternatives_spanish:
  - con alegría
  - con gozo
  lexicon: HALOT
  rationale: La construcción adverbial intensifica el imperativo; ‘con júbilo’ conserva la energía festiva y el registro poético.
- source_word: וְצַהֲלוּ
  english_pob_choice: and shout
  chosen_spanish: y griten
  alternatives_spanish:
  - y exulten
  - y aclamen
  lexicon: HALOT
  rationale: El segundo imperativo refuerza el primero. ‘Griten’ preserva la vocalidad pública y la fuerza retórica del hebreo.
- source_word: בְּרֹאשׁ הַגּוֹיִם
  english_pob_choice: at the head of the nations
  chosen_spanish: en la cumbre de las naciones
  alternatives_spanish:
  - al frente de las naciones
  - en la cabeza de las naciones
  - sobre las naciones
  lexicon: HALOT
  rationale: La frase es compacta y difícil. ‘En la cumbre de las naciones’ conserva la idea de prominencia o altura respecto de las naciones, sin decidir de forma excesiva entre las posibles lecturas.
- source_word: הַשְׁמִיעוּ
  english_pob_choice: proclaim
  chosen_spanish: proclamen
  alternatives_spanish:
  - hagan oír
  - anuncien
  lexicon: HALOT
  rationale: El verbo causativo implica hacer pública la noticia. ‘Proclamen’ es la equivalencia española más directa y solemne.
- source_word: הַלְלוּ
  english_pob_choice: praise
  chosen_spanish: alaben
  alternatives_spanish:
  - alabad
  - alaben a
  lexicon: HALOT
  rationale: Es un imperativo cultual de alabanza; ‘alaben’ mantiene el sentido religioso sin introducir una paráfrasis.
- source_word: הוֹשַׁע
  english_pob_choice: Save
  chosen_spanish: ¡Sálvanos!
  alternatives_spanish:
  - ¡Danos salvación!
  - ¡Libra!
  lexicon: HALOT
  rationale: El imperativo dirigido a Yahvé pide salvación concreta para el pueblo. En español, la forma vocativa natural y fiel es ‘¡Sálvanos!’.
- source_word: עַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - tu nación
  lexicon: HALOT
  rationale: La fórmula covenantal se conserva de modo directo y relacional.
- source_word: שְׁאֵרִית יִשְׂרָאֵל
  english_pob_choice: the remnant of Israel
  chosen_spanish: el remanente de Israel
  alternatives_spanish:
  - el resto de Israel
  - la remanencia de Israel
  lexicon: HALOT
  rationale: ‘Remanente’ es el término profético establecido y preserva la carga teológica de un pueblo preservado por Dios.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio divino en lugar de sustituirlo por un título. Esto sigue la línea doctrinal del POB y mantiene visible la identidad pactual de Dios en el texto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpretación de בְּרֹאשׁ הַגּוֹיִם
  english_pob_reading: at the head of the nations
  chosen_spanish_reading: en la cumbre de las naciones
  alternative_spanish_readings:
  - al frente de las naciones
  - sobre las naciones
  - en la cabeza de las naciones
  rationale: La frase hebrea es sintética y admite una relación de prominencia o de ubicación pública. La opción elegida conserva la ambigüedad controlada sin afirmar más de lo que el hebreo exige.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del POB en inglés sobre la frase קשה בְּרֹאשׁ הַגּוֹיִם, que pasó de una formulación más general a ‘at the head of the nations’ por mayor precisión léxica. En español se mantuvo esa precisión con una solución equivalente y se conservó la advertencia interpretativa mediante nota.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - ‘Remanente’ se usa para שְׁאֵרִית y no se suaviza a ‘resto’ para conservar el peso profético.
  - 'La secuencia verbal imperativa reproduce el paralelismo hebreo: cantar/gritar/proclamar/alabar/decir.'
  - La nota [a] se ancla solo en la frase problemática para preservar la transparencia textual.
