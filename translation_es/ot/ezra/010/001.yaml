translation:
  language: es
  text: 'Ahora, mientras Esdras oraba y hacía confesión, lloraba y caía delante de la casa de Dios, acudió a él una asamblea muy grande de Israel: hombres, mujeres y niños; porque el pueblo lloraba mucho[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «porque el pueblo lloraba con mucho llanto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְהִתְפַּלֵּל
  english_pob_choice: while ... was praying
  chosen_spanish: mientras ... oraba
  alternatives_spanish:
  - mientras ... estaba orando
  - cuando ... oraba
  lexicon: HALOT
  rationale: El prefijo וּכְ indica simultaneidad; en español, «mientras» expresa de manera natural la acción en curso. «Oraba» conserva el registro reverente y bíblico para תפלה sin volver la frase pesada.
- source_word: וּכְהִתְוַדֹּתוֹ
  english_pob_choice: and making confession
  chosen_spanish: y hacía confesión
  alternatives_spanish:
  - y confesaba
  - y mientras confesaba
  lexicon: HALOT
  rationale: El hitpael de ידה aquí conserva el sentido formal de confesión penitencial. «Hacía confesión» mantiene esa formulación solemne y evita reducirla a un simple «admitía».
- source_word: בֹּכֶה
  english_pob_choice: weeping
  chosen_spanish: lloraba
  alternatives_spanish:
  - estaba llorando
  - sollozaba
  lexicon: HALOT
  rationale: El participio describe una acción continua. «Lloraba» es claro y natural en español; en contexto solemne, comunica el llanto sin añadir matices no explicitados por el hebreo.
- source_word: וּמִתְנַפֵּל
  english_pob_choice: and falling down
  chosen_spanish: y se postraba
  alternatives_spanish:
  - y caía de rodillas
  - y se echaba al suelo
  lexicon: HALOT
  rationale: El hitpael de נפל indica arrojarse o abatirse en postura de súplica. «Se postraba» transmite bien el gesto de humillación; aunque es más específico que «caía», sigue siendo una equivalencia aceptable en español bíblico.
- source_word: לִפְנֵי בֵּית הָאֱלֹהִים
  english_pob_choice: before the house of God
  chosen_spanish: delante de la casa de Dios
  alternatives_spanish:
  - ante la casa de Dios
  - frente a la casa de Dios
  lexicon: HALOT
  rationale: «Casa de Dios» conserva la expresión hebrea y su tono reverente. «Delante de» reproduce bien לִפְנֵי sin forzar un término más técnico como «templo».
- source_word: נִקְבְּצוּ אֵלָיו
  english_pob_choice: gathered to him
  chosen_spanish: se reunió junto a él
  alternatives_spanish:
  - se congregó junto a él
  - se juntó con él
  lexicon: HALOT
  rationale: El nifal de קבץ expresa reunión/aglomeración. «Se reunió junto a él» mantiene la proximidad de אֵלָיו y funciona de forma fluida en español; «congregó» puede sonar eclesiástico en exceso.
- source_word: מִיִּשְׂרָאֵל
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - entre Israel
  - del pueblo de Israel
  lexicon: HALOT
  rationale: La preposición marca procedencia o pertenencia al grupo. «De Israel» es breve y natural; la aclaración siguiente ya desarrolla la composición de la asamblea.
- source_word: קָהָל רַב מְאֹד
  english_pob_choice: a very great assembly
  chosen_spanish: una asamblea muy grande
  alternatives_spanish:
  - una gran asamblea
  - una congregación muy grande
  lexicon: HALOT
  rationale: קהל es un grupo reunido; «asamblea» es la equivalencia más neutra y evita cargar la frase con connotaciones eclesiales de «congregación». רַב מְאֹד se vierte con intensidad simple y directa.
- source_word: אֲנָשִׁים וְנָשִׁים וִילָדִים
  english_pob_choice: men, women, and children
  chosen_spanish: hombres, mujeres y niños
  alternatives_spanish:
  - varones, mujeres y niños
  - hombres y mujeres y niños
  lexicon: HALOT
  rationale: La tríada se conserva completa y de forma inclusiva y transparente. «Hombres, mujeres y niños» comunica bien la amplitud de la reunión sin alterar el paralelismo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la causa de la reunión. «Porque» expresa con claridad la relación causal en español actual.
- source_word: בָכוּ הָעָם
  english_pob_choice: the people wept
  chosen_spanish: el pueblo lloraba
  alternatives_spanish:
  - la gente lloraba
  - el pueblo lloró
  lexicon: HALOT
  rationale: El qatal se entiende aquí como el hecho explicativo que motiva la reunión; en español, el imperfecto «lloraba» preserva el trasfondo continuo y se ajusta mejor al cuadro narrativo inmediato.
- source_word: הַרְבֵּה בֶכֶה
  english_pob_choice: wept greatly
  chosen_spanish: mucho
  alternatives_spanish:
  - grandemente
  - con mucho llanto
  lexicon: HALOT
  rationale: La combinación intensifica el llanto. «Lloraba mucho» mantiene la fuerza del hebreo sin añadir el matiz interpretativo de «amargamente».
theological_decisions:
- issue: El gesto de Esdras como confesión penitencial pública delante de Dios
  english_pob_reading: making confession
  chosen_spanish_reading: hacía confesión
  alternative_spanish_readings:
  - confesaba
  - hacía una confesión
  rationale: No se suaviza el carácter penitencial del acto. «Hacía confesión» preserva la fuerza formal del original y evita que el texto se reduzca a una mera admisión privada.
  doctrine_reference: Confesión penitencial y humillación delante de Dios (cf. 1 Juan 1:9; Salmo 51).
- issue: Intensidad del llanto colectivo
  english_pob_reading: for the people wept greatly
  chosen_spanish_reading: porque el pueblo lloraba mucho
  alternative_spanish_readings:
  - porque el pueblo lloraba grandemente
  - porque el pueblo lloraba con mucho llanto
  rationale: Se conserva la intensidad del llanto sin introducir el matiz de «amargamente», que el texto hebreo no obliga a adoptar. La formulación mantiene la tensión observada en el audit trail inglés entre literalidad y naturalidad.
  doctrine_reference: Lamento público y arrepentimiento comunitario (cf. Joel 2:12-13).
translation_notes:
  revision_awareness: 'El texto inglés auditado fue revisado desde «very large assembly» a «very great assembly» para acercarse más a רַב מְאֹד, y de «wept bitterly» a «wept greatly» para evitar un matiz no exigido por הַרְבֵּה בֶכֶה. La versión española sigue esa revisión: usa «asamblea muy grande» y «lloraba mucho», sin añadir «amargamente».'
  spanish_consistency_notes:
  - Se mantiene «casa de Dios» para בית האלהים, en coherencia con el registro reverente del texto.
  - Se emplea «asamblea» para קהל, evitando «congregación» por su posible sesgo eclesial.
  - «Yahvé» no aparece en este versículo, por lo que no se requiere decisión sobre el Tetragrámaton.
  - La puntuación con dos puntos tras «Israel» ayuda a reflejar la enumeración explicativa sin alterar el contenido del hebreo.
