lexical_decisions:
- source_word: καί
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y luego
  lexicon: BDAG
  rationale: Conecta de forma simple la acción con el contexto narrativo anterior, conservando la parataxis característica de Marcos sin añadir matiz temporal innecesario.
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  - unos cuantos
  lexicon: BDAG
  rationale: Indica un grupo indefinido de personas; «algunos» es natural en español y mantiene la indefinición del griego.
- source_word: ἀναστάντες
  english_pob_choice: stood up
  chosen_spanish: se pusieron de pie
  alternatives_spanish:
  - se levantaron
  - se alzaron
  lexicon: BDAG
  rationale: El participio aoristo describe la acción concomitante; «se pusieron de pie» expresa bien el gesto en un marco judicial y suena idiomático en español.
- source_word: ἐψευδομαρτύρουν
  english_pob_choice: were giving false testimony
  chosen_spanish: daban falso testimonio
  alternatives_spanish:
  - testificaban falsamente
  - daban testimonio falso
  - eran dando falso testimonio
  lexicon: BDAG
  rationale: El imperfecto sugiere acción en curso o reiterada. «Daban falso testimonio» conserva ese valor aspectual y el sentido forense sin recurrir a una construcción poco natural en español.
- source_word: κατ’ αὐτοῦ
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - en su contra
  - contra él mismo
  lexicon: BDAG
  rationale: La preposición con genitivo tiene fuerza adversativa en un contexto legal; «contra él» reproduce con claridad esa hostilidad testimonial.
- source_word: λέγοντες
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y diciendo:'
  - 'al decir:'
  lexicon: BDAG
  rationale: Introduce el contenido de la acusación que continúa en el versículo siguiente; el dos puntos preparan la cita de manera natural en español.
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene una equivalencia óptima y una nota léxica tradicional para ἐψευδομαρτύρουν; la redacción española conserva el sentido forense con una forma natural, sin perder el matiz aspectual del imperfecto.
  spanish_consistency_notes:
  - Se mantiene «falso testimonio» como equivalente forense principal, evitando «falsa acusación» porque el griego remite a testificar mentirosamente.
  - Se usa «él» para αὐτοῦ por referencia clara a Jesús en el contexto inmediato.
  - El participio final se ha vertido con dos puntos para marcar que la frase continúa en la cita del siguiente versículo.
