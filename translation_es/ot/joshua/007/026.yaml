translation:
  language: es
  text: Y levantaron sobre él un gran montón de piedras hasta el día de hoy, y Yahvé se volvió del ardor de su ira. Por eso aquel lugar se llama Valle de Acor[a] hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Acor suena como la palabra hebrea para «aflicción» o «perturbación»; compárese Josué 7:25.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקִימוּ
  english_pob_choice: they raised
  chosen_spanish: levantaron
  alternatives_spanish:
  - alzaron
  - pusieron en alto
  lexicon: HALOT
  rationale: El hiphil de קום expresa hacer que algo quede en pie o levantarlo. «Levantaron» transmite esa acción de manera natural en español y conserva la imagen de un monumento o montón conmemorativo/judicial.
- source_word: עָלָיו
  english_pob_choice: over him
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - sobre sus restos
  lexicon: HALOT
  rationale: La preposición עַל con el pronombre indica que el montón quedó colocado encima del cuerpo de Acán. «Sobre él» es directo y mantiene la relación espacial sin ampliar más de lo que el texto dice.
- source_word: גַּל אֲבָנִים גָּדוֹל
  english_pob_choice: a large heap of stones
  chosen_spanish: un gran montón de piedras
  alternatives_spanish:
  - un gran montículo de piedras
  - un gran túmulo de piedras
  lexicon: HALOT
  rationale: גַּל designa un montón o cúmulo, con frecuencia de piedras. «Montón de piedras» resulta claro y fiel; «gran» refleja גָּדוֹל. Se evita un término más técnico que pudiera sonar menos transparente.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: HALOT
  rationale: Se conserva el modismo temporal hebreo con una fórmula natural en español. «Hasta el día de hoy» mantiene el valor de testimonio vigente sin volverlo arcaico.
- source_word: וַיָּשָׁב יְהוָה
  english_pob_choice: Yahweh turned
  chosen_spanish: Yahvé se apartó
  alternatives_spanish:
  - Yahvé volvió atrás
  - Yahvé se volvió
  lexicon: HALOT
  rationale: שׁוּב significa volver/retroceder; en este contexto describe el cese de la ira divina. «Se apartó» comunica el alejamiento del furor sin convertirlo en una explicación más doctrinal que el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino revelado en el texto hebreo. La forma «Yahvé» sigue la decisión terminológica del proyecto y evita la sustitución por un título.
- source_word: מֵחֲרוֹן אַפּוֹ
  english_pob_choice: from the burning of his anger
  chosen_spanish: del ardor de su ira
  alternatives_spanish:
  - de su ira ardiente
  - del fuego de su ira
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y antropomórfica. «Ardor de su ira» conserva la metáfora del calor/encendimiento y suena natural en español, sin suavizar el énfasis emocional.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: El conector introduce la explicación del nombre del lugar. «Por eso» reproduce bien la relación causal en español contemporáneo y fluye con naturalidad.
- source_word: קָרָא שֵׁם
  english_pob_choice: the name of that place is called
  chosen_spanish: el nombre de aquel lugar se llama
  alternatives_spanish:
  - aquel lugar fue llamado
  - llamaron a aquel lugar
  lexicon: HALOT
  rationale: El hebreo usa una fórmula nominal de nombramiento. La pasiva refleja «se llama» expresa el resultado permanente mejor que una traducción demasiado literal con sujeto explícito indeterminado.
- source_word: עֵמֶק עָכוֹר
  english_pob_choice: the Valley of Achor
  chosen_spanish: Valle de Acor
  alternatives_spanish:
  - Valle de Achor
  - Valle de Trouble
  lexicon: HALOT
  rationale: Como nombre propio, se translitera «Acor» para preservar el topónimo en español. Se mantiene la forma abreviada y reconocible, mientras el juego de palabras con el sentido de «trouble/disturbance» queda para la nota.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se mantiene el nombre propio del pacto y no se lo sustituye por un título. Esto sigue la política del proyecto para el tetragrámaton y preserva la referencia directa al texto hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Lenguaje de la ira divina en מֵחֲרוֹן אַפּוֹ
  english_pob_reading: from the burning of his anger
  chosen_spanish_reading: del ardor de su ira
  alternative_spanish_readings:
  - de su ira ardiente
  - del furor de su ira
  rationale: Se conserva la metáfora del calor/ardor sin rebajarla ni convertirla en una abstracción. Así se mantiene la tensión teológica del pasaje respecto del juicio y su cese.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del inglés POB: conserva la construcción directa con «to this day», evita una cláusula relativa interpretativa añadida y refleja el nombre del lugar como resultado estable del evento. En español, se optó por una formulación igualmente directa y pública: «se llama» en vez de «ha sido llamado», y «se apartó» para el movimiento de Yahvé, manteniendo el valor idiomático del hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se translitera «Acor» como topónimo y se reserva el sentido de la raíz para la nota.
  - «Ira» y «ardor» conservan el campo metafórico del hebreo sin intensificarlo innecesariamente.
  - La nota al pie marca la ambigüedad lexical del nombre del lugar sin alterar el texto principal.
