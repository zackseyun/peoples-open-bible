revisions:
- from: Porque tu corazón era tierno[a], y te humillaste delante de Dios cuando oíste sus palabras contra este lugar y contra sus habitantes, y te humillaste delante de mí, y rasgaste tus vestidos y lloraste delante de mí, yo también te he escuchado, declara Yahvé.
