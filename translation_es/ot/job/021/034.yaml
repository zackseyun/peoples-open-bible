translation:
  language: es
  text: ¿Cómo, entonces, pueden consolarme con vacío[a], cuando sus respuestas no son más que traición?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Cómo pueden consolarme en vano, cuando sus respuestas quedan como traición?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵיךְ
  english_pob_choice: How then
  chosen_spanish: ¿Cómo, entonces…?
  alternatives_spanish:
  - ¿Y cómo…?
  - ¿Cómo, pues…?
  lexicon: HALOT
  rationale: El hebreo introduce una pregunta retórica con waw + interrogativo; «entonces» ayuda a recoger la fuerza conectiva de «then» del POB sin volverla rígida.
- source_word: תְּנַחֲמ֣וּ/נִי
  english_pob_choice: can you comfort me
  chosen_spanish: pueden consolarme
  alternatives_spanish:
  - me consuelan
  - podrían consolarme
  lexicon: HALOT
  rationale: נחם en piel con sufijo de 1cs expresa «consolar/consuelo». En español, «pueden» mantiene el matiz retórico de capacidad/challenge del POB, mientras que «consolar» preserva el campo léxico de consuelo.
- source_word: הָ֑בֶל
  english_pob_choice: with emptiness
  chosen_spanish: con vaciedad
  alternatives_spanish:
  - en vano
  - con vanidad
  - con vacío
  lexicon: HALOT
  rationale: הבל no se reduce aquí a fracaso del intento, sino a la cualidad del contenido. «Vaciedad» conserva el sustantivo abstracto y la acusación de contenido hueco mejor que «en vano».
- source_word: וּ֝/תְשֽׁוּבֹתֵי/כֶ֗ם
  english_pob_choice: your answers
  chosen_spanish: sus respuestas
  alternatives_spanish:
  - sus réplicas
  - sus contestaciones
  lexicon: HALOT
  rationale: תשובה puede ser «respuesta/réplica». «Respuestas» es natural en español y corresponde a las intervenciones de los amigos en el diálogo.
- source_word: נִשְׁאַר
  english_pob_choice: remain
  chosen_spanish: quedan
  alternatives_spanish:
  - permanecen
  - se quedan
  lexicon: HALOT
  rationale: El nifal de שאר expresa permanecer/ser dejado. «Quedan» suena idiomático y conserva el sentido de lo que persiste en sus palabras.
- source_word: מָֽעַל
  english_pob_choice: nothing but treachery
  chosen_spanish: en pura traición
  alternatives_spanish:
  - traición
  - deslealtad
  - falta de lealtad
  lexicon: HALOT
  rationale: מעל denota infidelidad o traición al pacto/confianza. «Pura traición» reproduce la severidad del juicio de Job y mantiene un predicado fuerte sin añadir elementos no presentes.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés; no se aplicaron revisiones adicionales y el estado de concordancia previo fue alto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando corresponda en el proyecto, pero este versículo no contiene el Nombre divino.
  - 'Se conserva la acusación de Job con intensidad lexical: הבל no se diluye en una mera noción de fracaso, y מעל se traduce como traición/deslealtad fuerte.'
  - La sintaxis española busca sonar natural sin suavizar la ironía retórica del original.
