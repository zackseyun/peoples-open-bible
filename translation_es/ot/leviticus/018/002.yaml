translation:
  language: es
  text: 'Habla a los hijos[a] de Israel y diles: «Yo soy Yahvé[b], el Dios de ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hijos de Israel» puede entenderse también como «los hijos del pueblo de Israel» o «los israelitas». El hebreo es literalmente «los hijos de Israel», una expresión familiar del pacto para el pueblo de Israel.
    reason: lexical_alternative
  - marker: b
    text: Hebreo YHWH, tradicionalmente traducido «el SEÑOR».
    reason: alternative_reading
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Hablad
  lexicon: HALOT
  rationale: El imperativo masculino singular del hebreo se vierte naturalmente con «Habla»; conserva el mandato directo de Dios a Moisés sin endurecer el español con un calco innecesario.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  - los niños de Israel
  lexicon: HALOT
  rationale: Se preserva la expresión familiar y de pacto del hebreo. «Hijos» comunica el valor literal de בְּנֵי mejor que «israelitas», que neutraliza la forma y pierde la imagen filial.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  english_pob_choice: and say to them
  chosen_spanish: y diles
  alternatives_spanish:
  - y di a ellos
  - y háblales
  lexicon: HALOT
  rationale: En español, «diles» fluye mejor que una estructura más pesada, pero mantiene el contenido de decir a un destinatario plural. La omisión de «a ellos» evita redundancia no requerida por el sentido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se adopta la forma española tradicional de transliteración «Yahvé», coherente con la directriz del proyecto para יְהוָה y más natural para lectura pública en español. No se sustituye por «SEÑOR», porque el texto hebreo nombra directamente al Dios de Israel.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - su Dios
  - vuestro Dios
  - Dios de ustedes
  lexicon: HALOT
  rationale: El hebreo tiene sufijo plural de 2.ª persona, pero en español la segunda persona plural puede resultar regionalmente marcada. Para un registro bíblico amplio, «tu Dios» funciona dentro de la fórmula de identificación divina y evita sobrecargar el texto; la pluralidad del destinatario queda ya clara en «los hijos de Israel».
theological_decisions:
- issue: Sustitución del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - el SEÑOR
  rationale: El verso usa el Tetragrámaton de manera explícita. Mantener «Yahvé» preserva el nombre personal del pacto y evita la convención de ocultarlo bajo un título. La forma española sigue la política del POB para el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Forma corporativa de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos/niños de Israel
  rationale: La expresión hebrea es literalmente masculina y filial; conservarla evita neutralizar un rasgo semántico y retórico del texto. En el contexto legal del Levítico, la fórmula designa al pueblo del pacto como destinatario colectivo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El texto coincide con el control textual principal y no presenta revisiones sustantivas en el paquete auditado; se refleja la lectura estable de la última pasada sin cambios.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y publicable, con imperativo directo y cita entre comillas.
  - Se evita «SEÑOR» para el tetragrámaton, en coherencia con la política del proyecto.
  - La segunda persona plural del hebreo no se reproduce gramaticalmente en todo el enunciado porque el español bíblico amplio favorece una fórmula natural y clara; la pluralidad del destinatario queda explícita en «los hijos de Israel».
