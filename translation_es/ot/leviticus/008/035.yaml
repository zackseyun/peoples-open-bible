translation:
  language: es
  text: Y permanecerán[a] a la entrada de la tienda del encuentro día y noche por siete días, y guardarán el encargo de Yahvé, para que no mueran; porque así me fue mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se quedarán»; también, «permanecerán».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/פֶתַח אֹהֶל מוֹעֵד
  english_pob_choice: at the entrance of the tent of meeting
  chosen_spanish: a la entrada de la tienda del encuentro
  alternatives_spanish:
  - en la entrada de la tienda del encuentro
  - a la puerta de la tienda del encuentro
  - a la abertura de la tienda del encuentro
  lexicon: HALOT
  rationale: פֶתַח nombra una entrada o abertura. En español, «entrada» conserva bien la idea locativa y suena natural. «Tienda del encuentro» mantiene el nombre cultual fijo del אוהל מועד sin volverlo explicativo.
- source_word: תֵּשְׁבוּ
  english_pob_choice: you shall stay
  chosen_spanish: permanecerán
  alternatives_spanish:
  - se sentarán
  - quedarán
  - morarán
  lexicon: HALOT
  rationale: En este contexto ritual, ישב expresa permanecer/estar situado de manera continua. «Permanecerán» comunica la obligación de quedarse allí sin reducirlo a sentarse físicamente.
- source_word: יוֹמָם וָלַיְלָה
  english_pob_choice: day and night
  chosen_spanish: día y noche
  alternatives_spanish:
  - de día y de noche
  - por el día y por la noche
  lexicon: HALOT
  rationale: Es un merismo de duración continua. «Día y noche» es la forma más natural y conserva la totalidad temporal.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - siete días
  lexicon: HALOT
  rationale: El hebreo marca duración; en español «por siete días» mantiene ese valor temporal de manera clara y fluida.
- source_word: וּ/שְׁמַרְתֶּם אֶת מִשְׁמֶרֶת יְהוָה
  english_pob_choice: and keep the charge of Yahweh
  chosen_spanish: y guardarán la obligación de Yahvé
  alternatives_spanish:
  - y guardarán el encargo de Yahvé
  - y observarán la responsabilidad de Yahvé
  - y guardarán el mandato de Yahvé
  lexicon: HALOT
  rationale: שׁמר + מִשְׁמֶרֶת en este marco sacerdotal expresa una obligación confiada a su custodia. «Obligación» reproduce bien el peso normativo y evita un giro más interpretativo como «mandato». «Yahvé» sigue la norma del proyecto para יהוה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: DOCTRINE.md contested terms
  rationale: El nombre divino se vierte como «Yahvé» según el estándar español del proyecto, preservando el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: וְלֹא תָמֻתוּ
  english_pob_choice: so that you may not die
  chosen_spanish: para que no mueran
  alternatives_spanish:
  - y no morirán
  - para que no mueran, o morirán
  lexicon: HALOT
  rationale: El hebreo puede leerse como advertencia de consecuencia o finalidad negativa. «Para que no mueran» preserva el valor de resultado evitado sin fijar innecesariamente una sola paráfrasis.
- source_word: כִּי כֵן צֻוֵּיתִי
  english_pob_choice: for so I have been commanded
  chosen_spanish: porque así me fue mandado
  alternatives_spanish:
  - porque así he sido mandado
  - pues así se me mandó
  - porque eso me fue mandado
  lexicon: HALOT
  rationale: El pasivo comunica que Moisés remite a una orden recibida. «Me fue mandado» conserva esa pasividad y resulta idiomático en español bíblico contemporáneo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. La decisión del proyecto es transliterarlo como nombre propio; en español, «Yahvé» es la forma establecida para esa política de traducción.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh/Yahvé'
- issue: Fuerza de la cláusula de muerte
  english_pob_reading: so that you may not die
  chosen_spanish_reading: para que no mueran
  alternative_spanish_readings:
  - y no morirán
  - no sea que mueran
  - lest die
  rationale: El hebreo admite una lectura de propósito/resultante ligada a la obediencia. «Para que no mueran» mantiene esa relación sin borrar la advertencia implícita en el contexto sacerdotal.
  doctrine_reference: Nota de lectura del versículo en el audit trail inglés
- issue: Sentido de משמרת en contexto cultual
  english_pob_reading: the charge of Yahweh
  chosen_spanish_reading: la obligación de Yahvé
  alternative_spanish_readings:
  - el encargo de Yahvé
  - la custodia de Yahvé
  - el mandato de Yahvé
  rationale: En este pasaje, מִשְׁמֶרֶת no es solo ‘cargo’ abstracto sino una tarea confiada que debe ser guardada fielmente. «Obligación» comunica mejor el deber ritual sin diluir la noción de custodia.
  doctrine_reference: Uso léxico de שמר/משמרת en contexto sacerdotal
translation_notes:
  revision_awareness: El audit trail inglés muestra acuerdo alto y ningún cambio de revisión en la última pasada; la presente versión sigue esa lectura sin introducir ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «tienda del encuentro» como equivalente consistente de אֹהֶל מוֹעֵד.
  - Se usa «Yahvé» de forma uniforme para יהוה, conforme a la política del proyecto.
  - Se conserva el registro ritual con verbos de permanencia y custodia, evitando simplificar משמרת a un mero «mandato» sin matiz.
  - La nota textual anclada a «permanecerán» refleja la alternativa verbal principal ya documentada en el audit trail inglés.
