translation:
  language: es
  text: y la tierra abrió su boca y los tragó[a], a sus familias, a toda la gente que pertenecía a Coré[b], y todos sus bienes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus casas». El hebreo puede referirse tanto a las casas físicas como, por extensión, a sus familias o unidades domésticas.
    reason: lexical_alternative
  - marker: b
    text: Lit. «todo hombre que pertenecía a Coré». El hebreo usa אָדָם en sentido colectivo.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּפְתַּח
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - se abrió
  - abrió de par en par
  lexicon: HALOT
  rationale: פתח expresa la acción de abrir; en español, «abrió» comunica de forma natural la acción simple sin añadir intensidad no explicitada por el verbo.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el suelo
  - el país
  lexicon: HALOT
  rationale: אֶרֶץ puede ser ‘tierra’, ‘suelo’ o ‘país’; aquí la imagen es la tierra misma personificada, y «la tierra» conserva ese efecto mejor que «el suelo».
- source_word: אֶת פִּיהָ
  english_pob_choice: its mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - su boca
  - su abertura
  lexicon: HALOT
  rationale: La metáfora hebrea literalmente dice «su boca». «Su boca» mantiene la imaginería corporal del texto y evita aplanar la expresión a una mera abertura.
- source_word: וַתִּבְלַע
  english_pob_choice: swallowed
  chosen_spanish: los tragó
  alternatives_spanish:
  - los engulló
  - los devoró
  lexicon: HALOT
  rationale: בלע significa ‘tragar/swallow’; en español, «los tragó» es directo, claro y suficientemente vívido sin exagerar el matiz.
- source_word: בָּתֵּיהֶם
  english_pob_choice: their households
  chosen_spanish: a sus casas
  alternatives_spanish:
  - a sus casas
  - a sus hogares
  - a sus familias
  lexicon: HALOT
  rationale: El hebreo puede referirse a casas físicas o, por extensión, al grupo doméstico. Dado que el texto ya enumera personas y bienes, «a sus casas» mantiene la ambigüedad lexical sin forzar una interpretación social que el hebreo no explicita por sí mismo.
- source_word: כָּל הָאָדָם אֲשֶׁר לְקֹרַח
  english_pob_choice: all the people who belonged to Korah
  chosen_spanish: a toda la gente que pertenecía a Coré
  alternatives_spanish:
  - a toda la gente que pertenecía a Coré
  - a toda persona que pertenecía a Coré
  - a todos los que eran de Coré
  lexicon: HALOT
  rationale: אָדָם en esta construcción funciona colectivamente, como señala el expediente inglés. En español, «toda la gente» transmite el sentido colectivo sin imponer una lectura masculina singular; «pertenecía a Coré» refleja la relación indicada por לְ־ como pertenencia/asociación.
- source_word: כָּל הָרֲכוּשׁ
  english_pob_choice: all their possessions
  chosen_spanish: todos sus bienes
  alternatives_spanish:
  - todos sus bienes
  - todas sus posesiones
  - toda su riqueza
  lexicon: HALOT
  rationale: רכוש designa propiedad móvil, bienes o posesiones. «Bienes» es natural en español bíblico contemporáneo y abarca el campo semántico sin estrecharlo demasiado.
theological_decisions:
- issue: Referente colectivo de אָדָם en la frase sobre Coré
  english_pob_reading: all the people who belonged to Korah
  chosen_spanish_reading: toda la gente que pertenecía a Coré
  alternative_spanish_readings:
  - toda persona que pertenecía a Coré
  - todos los que eran de Coré
  rationale: El expediente inglés revisado favorece una lectura colectiva de הָאָדָם. En español, «toda la gente» preserva ese valor colectivo y evita convertirlo en singular masculino o en una expresión demasiado individualizada.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table for אָדָם
- issue: Conservación de la metáfora de la boca de la tierra
  english_pob_reading: the earth opened its mouth
  chosen_spanish_reading: la tierra abrió su boca
  alternative_spanish_readings:
  - la tierra abrió su boca
  - la tierra abrió su abertura
  rationale: La imagen es deliberadamente antropomórfica y dramática. Mantener «boca» conserva la fuerza narrativa y la personificación del texto, en vez de neutralizarla con un término más abstracto.
  doctrine_reference: Principio POB de fidelidad a las imágenes del original; HALOT פֶּה / פִּי
- issue: Tratamiento de בָּתֵּיהֶם
  english_pob_reading: their households
  chosen_spanish_reading: a sus casas
  alternative_spanish_readings:
  - a sus casas
  - a sus hogares
  - a sus familias
  rationale: En este contexto, el hebreo admite tanto la referencia a edificios como a unidades domésticas. El español «casas» conserva la ambigüedad básica del término y no decide de antemano una expansión interpretativa.
  doctrine_reference: HALOT בַּיִת; principio de no borrar tensiones léxicas documentadas
translation_notes:
  revision_awareness: El expediente inglés muestra una revisión reciente que prefirió una lectura colectiva de אָדָם («all the people who belonged to Korah») en lugar de una formulación más singular. La traducción española sigue esa lectura colectiva y conserva, además, la ambigüedad de בָּתֵּיהֶם mediante «casas», con nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; aquí no aparece.
  - Se mantiene «Coré» como forma castellana del nombre propio.
  - Se conserva la metáfora corporal «su boca» para פִּי/הָ.
  - Se traduce בָּתֵּיהֶם de manera ambigua y se documenta la alternativa «hogares» en nota.
  - Se evita neutralizar el colectivo hebreo de אָדָם en una forma individualizante.
