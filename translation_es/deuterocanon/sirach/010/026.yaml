translation:
  language: es
  text: No te las des de sabio[a] para servir a tu propio deseo, y no te honres a ti mismo en el tiempo de tu necesidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testigo griego lee de manera muy distinta: «Mejor el que trabaja en todo que el que anda jactándose y carece de pan». El hebreo conservado en la Geniza de El Cairo advierte contra una astucia que se sirve a sí misma y contra la autoexaltación en tiempo de necesidad.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תּתְחַכַּם
  english_pob_choice: Do not act too wisely
  chosen_spanish: No te hagas demasiado sabio
  alternatives_spanish:
  - No seas demasiado sabio
  - No te muestres demasiado sabio
  - No hagas alarde de sabiduría
  lexicon: HALOT
  rationale: 'El hitpael de חכם aquí tiene fuerza reflexiva: una advertencia contra la sabiduría autopromocionada o interesada. «No te hagas demasiado sabio» conserva el matiz de conducta asumida, no solo de estado mental.'
- source_word: לַעֲבוֹד
  english_pob_choice: to serve
  chosen_spanish: para servir
  alternatives_spanish:
  - para trabajar para
  - para laborar en favor de
  - para atender
  lexicon: HALOT
  rationale: 'עבד puede significar «servir» o «trabajar para». «Servir» mantiene la relación ética del texto: la crítica no es al esfuerzo en sí, sino a poner la sabiduría al servicio del propio interés.'
- source_word: חֶפְצֶךָ
  english_pob_choice: your own desire
  chosen_spanish: tu propio deseo
  alternatives_spanish:
  - tu placer
  - tu voluntad
  - lo que deseas
  lexicon: HALOT
  rationale: חפץ expresa deseo, deleite o interés. «Tu propio deseo» comunica claramente la referencia autocentrada y evita suavizar el contraste moral.
- source_word: וְאַל תִּתְכַּבֵּד
  english_pob_choice: and do not honor yourself
  chosen_spanish: y no te honres a ti mismo
  alternatives_spanish:
  - y no te glorifiques
  - y no te hagas importante
  - y no te engrandezcas
  lexicon: HALOT
  rationale: 'El hitpael de כבד es reflexivo: hacerse honorable, pesado o importante. «No te honres a ti mismo» preserva la forma reflexiva y suena natural en español.'
- source_word: בְּמוֹעֵד
  english_pob_choice: in the time of
  chosen_spanish: en el tiempo de
  alternatives_spanish:
  - en la hora de
  - en la ocasión de
  - en el momento de
  lexicon: HALOT
  rationale: מוֹעֵד puede ser tiempo señalado o circunstancia concreta. «En el tiempo de» sigue de cerca la estructura hebrea y es suficientemente claro para el español bíblico moderno.
- source_word: צָרְכֶּךָ
  english_pob_choice: your need
  chosen_spanish: tu necesidad
  alternatives_spanish:
  - tu necesidad urgente
  - tu escasez
  - tu penuria
  lexicon: HALOT
  rationale: El hebreo apunta a necesidad o carencia; la nota inglesa vincula el sentido con la pobreza sugerida por el paralelo griego. «Tu necesidad» es la forma más sobria y amplia en español.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego
  english_pob_reading: Translate primarily from the surviving Hebrew, while allowing the Greek to inform the sense of the final phrase as material need.
  chosen_spanish_reading: 'Traducir principalmente el hebreo conservado, dejando una nota que preserve el contraste del griego: el que trabaja frente al que anda jactándose y carece de pan.'
  alternative_spanish_readings:
  - Unir silenciosamente ambos testigos en una sola frase
  - 'Traducir solo desde el griego: «Mejor quien trabaja en todo que quien anda jactándose y carece de pan»'
  rationale: La tradición de la POB para Sirácida da prioridad al hebreo cuando es transmisible, pero aquí hay una desalineación mayor. El texto principal sigue el hebreo de manera fiel y la nota registra honestamente la lectura griega sin armonizarla de forma oculta.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva en Sirácida; preservar honestamente la incertidumbre textual'
translation_notes:
  revision_awareness: El pasaje fue revisado con estatus de 'major_mismatch' y acuerdo de revisión 0.65; no hubo cambios recientes en la última pasada. La redacción española conserva la primacía del hebreo, pero la nota registra la variante griega para no ocultar la tensión textual.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» según norma general del proyecto, pero este versículo no los menciona.
  - Se usa un registro bíblico moderno y digno, evitando calcos excesivamente literales.
  - La nota al pie preserva la lectura alternativa sin mezclarla con el texto principal.
  - «Tu propio deseo» y «tu necesidad» mantienen la oposición ética entre interés propio y carencia real.
