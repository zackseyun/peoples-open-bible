- from: 'Jeremías dijo a ellos: «Así dirás a Sedequías:»'
  to: 'Jeremías les dijo: «Así dirán a Sedecías:»'
  rationale: Se corrige el número verbal para reflejar fielmente el 2mp hebreo en תֹאמְרֻן, se mejora la naturalidad del español con 'les dijo', y se adopta la forma onomástica más estándar 'Sedecías' para una lectura bíblica amplia. No se requieren notas, porque la revisión resuelve la tensión sin crear ambigüedad nueva.
