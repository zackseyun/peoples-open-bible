translation:
  language: es
  text: Jerusalén[a], las ciudades de Judá, sus reyes y sus oficiales, para hacerlos una ruina, un horror, un silbido y una maldición[b], como en este día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un asombro' para 'un horror'. El término hebreo puede subrayar la reacción de estupor y horror provocada por la devastación.
    reason: lexical_alternative
  - marker: b
    text: O 'un silbido de burla'. El hebreo alude al sonido despectivo que hacen los que contemplan un lugar arruinado.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalén
  lexicon: HALOT
  rationale: Nombre propio transliterado y asentado en español bíblico; no se traduce.
- source_word: עָרֵי יְהוּדָה
  english_pob_choice: the cities of Judah
  chosen_spanish: las ciudades de Judá
  alternatives_spanish:
  - las ciudades de Judá
  - las ciudades de Judea
  lexicon: HALOT
  rationale: La cadena constructa se expresa de modo natural con 'las ciudades de Judá', preservando la relación genitiva.
- source_word: מְלָכֶיהָ
  english_pob_choice: her kings
  chosen_spanish: sus reyes
  alternatives_spanish:
  - sus reyes
  - sus monarcas
  lexicon: HALOT
  rationale: El sufijo femenino colectivo puede reflejarse en español con 'sus' sin forzar la personificación; 'reyes' conserva el referente político concreto.
- source_word: שָׂרֶיהָ
  english_pob_choice: her officials
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus oficiales
  - sus príncipes
  - sus gobernantes
  lexicon: HALOT
  rationale: שָׂרִים abarca príncipes, jefes u oficiales; 'oficiales' comunica bien la lista cívico-política junto a 'reyes' y evita una lectura demasiado dinástica.
- source_word: לָתֵת אֹתָם
  english_pob_choice: to make them
  chosen_spanish: para hacerlos
  alternatives_spanish:
  - para hacerlos
  - para entregarlos
  - para ponerlos
  lexicon: HALOT
  rationale: El infinitivo de נתן con esta cadena final expresa el resultado/causa de quedar en cierto estado; 'para hacerlos' reproduce esa fuerza mejor que una traducción literal de 'dar'.
- source_word: לְחָרְבָּה
  english_pob_choice: a ruin
  chosen_spanish: una ruina
  alternatives_spanish:
  - una ruina
  - desolación
  lexicon: HALOT
  rationale: '''Ruina'' es claro y concreto en español, y encaja con la serie de sustantivos de devastación.'
- source_word: לְשַׁמָּה
  english_pob_choice: a horror
  chosen_spanish: un horror
  alternatives_spanish:
  - un horror
  - un asombro
  - un espanto
  lexicon: HALOT
  rationale: El término hebreo puede señalar la reacción atónita y horrorizada provocada por la devastación; 'un horror' conserva ese efecto sin ocultarlo con un vocablo más opaco.
- source_word: לִשְׁרֵקָה
  english_pob_choice: a hissing
  chosen_spanish: un silbido
  alternatives_spanish:
  - un silbido
  - un silbar
  - un silbido de burla
  lexicon: HALOT
  rationale: El hebreo alude al sonido despectivo de los observadores ante un lugar devastado. En español, 'un silbido' comunica el gesto audible con naturalidad; la nota preserva el matiz de burla.
- source_word: וְלִקְלָלָה
  english_pob_choice: a curse
  chosen_spanish: una maldición
  alternatives_spanish:
  - una maldición
  - un objeto de maldición
  lexicon: HALOT
  rationale: Mantiene la expresión compacta y el valor proverbial de quedar como lugar maldito.
- source_word: כַּיּוֹם הַזֶּה
  english_pob_choice: as it is this day
  chosen_spanish: como hasta hoy
  alternatives_spanish:
  - como hasta hoy
  - como en este día
  - como sucede hasta hoy
  lexicon: HALOT
  rationale: El idiomatismo mira al estado presente como testimonio del cumplimiento; 'como hasta hoy' es natural en español y conserva la referencia temporal evidente.
theological_decisions:
- issue: Lectura del conjunto de términos de devastación (ruina / horror / silbido / maldición)
  english_pob_reading: The place is made an object of devastation and derisive reaction, not merely destroyed in a generic sense.
  chosen_spanish_reading: El lugar queda caracterizado como ruina, horror, silbido y maldición, conservando el peso acumulativo del juicio.
  alternative_spanish_readings:
  - destrucción, espanto, burla y maldición
  - ruina, asombro, silbido y maldición
  rationale: La serie hebrea enumera efectos complementarios del juicio; no conviene suavizarla a una sola idea general. 'Horror' mantiene la reacción humana provocada por la devastación, y 'silbido' deja visible el componente de escarnio público.
  doctrine_reference: Jeremías 25:18; cf. Jer 19:8; 24:9
translation_notes:
  revision_awareness: El texto sigue de cerca el estado estable del POB en inglés para Jeremías 25:18, sin revisiones aplicadas en la fuente auditada; se conservan las alternativas léxicas más relevantes y la tensión entre reacción de horror y gesto de escarnio.
  spanish_consistency_notes:
  - Se mantiene 'Judá' para עָרֵי יְהוּדָה y no 'Judea', por tratarse del nombre territorial bíblico en este contexto.
  - '''Oficiales'' se usa de manera funcional para שָׂרִים junto a ''reyes'', evitando sobrecargar el verso con un título más específico de rango nobiliario.'
  - '''Como hasta hoy'' conserva el valor testimonial del hebraísmo temporal sin sonar arcaizante.'
