base_translation:
  language: en
  yaml_path: translation/ot/genesis/025/030.yaml
  text: Esau said to Jacob[a], “Please let me gulp down some of that red stuff, that red stuff there[c][b], because I am exhausted.” Therefore his name was called Edom.
  footnotes:
  - marker: a
    text: Hebrew repeats 'the red, the red,' without naming the food explicitly; the wording likely reflects Esau's impulsive speech. Many translations supply 'stew.'
    reason: lexical_alternative
  - marker: b
    text: Edom sounds like the Hebrew word for 'red,' preserving the wordplay in the verse.
    reason: cross_reference
  - marker: c
    text: Or 'Please let me gulp down'.
    reason: previous_rendering
