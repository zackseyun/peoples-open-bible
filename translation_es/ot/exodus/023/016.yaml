translation:
  language: es
  text: y la Fiesta de la Cosecha[a], las primicias de tus labores, de lo que siembras en el campo; y la Fiesta de la Recolección[c][b], al final del año, cuando recoges el fruto de tus labores del campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «festival» para las dos ocurrencias de חַג.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «al salir el año».'
    reason: lexical_alternative
  - marker: c
    text: «Recolección» alude a la fiesta que marca la recolección de la producción del campo.
    reason: cultural_note
lexical_decisions:
- source_word: חַג
  english_pob_choice: Feast
  chosen_spanish: Fiesta
  alternatives_spanish:
  - festival
  lexicon: HALOT
  rationale: חַג designa una celebración ritual señalada. En español, «Fiesta» comunica bien ese carácter cultual y es idiomático en un nombre festivo. Se evita «festival» por sonar más moderno y menos cultual.
- source_word: הַקָּצִיר
  english_pob_choice: Harvest
  chosen_spanish: Cosecha
  alternatives_spanish:
  - siega
  - recolección
  lexicon: HALOT
  rationale: El sustantivo se refiere a la cosecha/recolección agrícola y forma el nombre de la fiesta. «Cosecha» es natural en español y preserva el sentido festivo agrícola.
- source_word: בִּכּוּרֵי
  english_pob_choice: firstfruits
  chosen_spanish: primicias
  alternatives_spanish:
  - primeros frutos
  - primeras producciones
  lexicon: HALOT
  rationale: «Primicias» es el equivalente bíblico y eclesial más claro para el término cultual de los primeros productos ofrecidos a Dios. Mantiene el matiz religioso mejor que una paráfrasis agrícola genérica.
- source_word: מַעֲשֶׂיךָ
  english_pob_choice: your labors
  chosen_spanish: tus labores
  alternatives_spanish:
  - tu trabajo
  - tu obra
  - tu producción
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tus trabajos/labores». En este contexto agrícola, «tus labores» conserva el plural y la relación con el esfuerzo humano, sin reducirlo solo al producto ya cosechado.
- source_word: אֲשֶׁר תִּזְרַע בַּשָּׂדֶה
  english_pob_choice: of what you sow in the field
  chosen_spanish: de lo que siembras en el campo
  alternatives_spanish:
  - que siembras en el campo
  - de lo que siembres en el campo
  lexicon: HALOT
  rationale: La cláusula relativa especifica el origen agrícola de las primicias. «De lo que siembras en el campo» es natural en español y conserva el vínculo directo entre siembra y primicias.
- source_word: הָאָסִף
  english_pob_choice: Ingathering
  chosen_spanish: Recolección
  alternatives_spanish:
  - Juntura
  - Agrupamiento
  - Cosecha final
  lexicon: HALOT
  rationale: El término nombra la fiesta del recogimiento de la producción. «Recolección» expresa bien la acción de recoger la cosecha y evita forzar un tecnicismo poco transparente.
- source_word: בְּצֵאת הַשָּׁנָה
  english_pob_choice: at the end of the year
  chosen_spanish: al fin del año
  alternatives_spanish:
  - al salir el año
  - al terminar el año
  - a la salida del año
  lexicon: HALOT
  rationale: El hebreo es literalmente «al salir el año». «Al fin del año» comunica el sentido temporal de forma clara y digna en español, sin perder la referencia al cierre del ciclo anual.
- source_word: בְּאָסְפְּךָ
  english_pob_choice: when you gather in
  chosen_spanish: cuando recoges
  alternatives_spanish:
  - cuando juntas
  - cuando reúnes
  - cuando recoges para ti
  lexicon: HALOT
  rationale: El infinitivo con preposición funciona aquí temporalmente. «Cuando recoges» expresa de manera natural el acto de reunir la cosecha, manteniendo el segundo pronombre implícito del hebreo.
- source_word: מִן הַשָּׂדֶה
  english_pob_choice: from the field
  chosen_spanish: del campo
  alternatives_spanish:
  - desde el campo
  lexicon: HALOT
  rationale: La idea es de procedencia espacial. «Del campo» es la forma más natural en español y conserva el origen de lo recogido.
theological_decisions:
- issue: Nombre de la segunda fiesta agrícola
  english_pob_reading: Feast of Ingathering
  chosen_spanish_reading: Fiesta de la Recolección
  alternative_spanish_readings:
  - Fiesta del Recogimiento
  - Fiesta de la Cosecha
  rationale: 'El inglés POB mantiene un nombre festivo tradicional pero explicativo. En español, «Recolección» comunica la función de la fiesta: reunir la producción del campo. Se evita «Cosecha» en ambos lugares para no hacer que las dos fiestas suenen idénticas.'
  doctrine_reference: Fiestas señaladas de Israel; cf. Éxodo 23:14-17, Levítico 23, Deuteronomio 16
- issue: Tensión entre título festivo y descripción agrícola
  english_pob_reading: the firstfruits of your labors, of what you sow in the field; ... when you gather in your labors from the field
  chosen_spanish_reading: las primicias de tus labores, de lo que siembras en el campo; ... cuando recoges tus labores del campo
  alternative_spanish_readings:
  - las primicias de tu trabajo
  - las primicias de tus cosechas
  rationale: Se conserva la relación entre el título de la fiesta y la explicación agrícola. «Labores» mantiene el sentido de trabajo humano del hebreo מַעֲשֶׂיךָ y evita borrar la tensión entre el esfuerzo y su fruto.
  doctrine_reference: Éxodo 23:16; relación entre trabajo humano y provisión divina
- issue: Número y fuerza del sustantivo hebreo מַעֲשֶׂיךָ
  english_pob_reading: your labors
  chosen_spanish_reading: tus labores
  alternative_spanish_readings:
  - tu labor
  - tu trabajo
  rationale: El audit trail inglés revisó a plural para reflejar mejor el hebreo. En español se conserva el plural «labores», que suena natural y refleja tanto la pluralidad formal como la variedad de tareas del campo.
  doctrine_reference: Análisis morfológico de מַעֲשֶׂיךָ en el versículo
translation_notes:
  revision_awareness: Tomé en cuenta la revisión del inglés POB que corrigió «labor» a «labors» en ambas ocurrencias para reflejar mejor el plural hebreo. Por eso usé «labores» de forma consistente en los dos miembros de la frase. También preservé la distinción entre los dos nombres festivos, como en el texto inglés auditado.
  spanish_consistency_notes:
  - Mantengo «Fiesta» para חַג en ambas ocurrencias, en concordancia con el tono cultual del pasaje.
  - Conservo «labores» en ambas apariciones de מַעֲשֶׂיךָ para reflejar la pluralidad del hebreo y la revisión inglesa.
  - Uso «del campo» y «en el campo» de modo consistente para las referencias espaciales agrícolas.
  - 'La puntuación sigue la estructura del paralelismo hebreo: primer miembro, punto y coma, segundo miembro.'
