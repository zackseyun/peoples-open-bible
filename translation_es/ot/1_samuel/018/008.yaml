translation:
  language: es
  text: 'Entonces Saúl se enfureció mucho[a], y este asunto le desagradó. Y dijo: «A David le han dado diez millares, y a mí me han dado los millares[b]; ¿qué más le queda sino el reino?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «ardió de ira».
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo es comprimido: «y todavía para él sólo el reino», es decir, que, a juicio de Saúl, lo único que aún le falta a David es recibir el reino.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר
  english_pob_choice: became very angry
  chosen_spanish: se encendió
  alternatives_spanish:
  - se encolerizó
  - ardió de ira
  - se llenó de ira
  lexicon: HALOT
  rationale: El hebreo expresa literalmente la imagen de ‘arder’ con ira. En español, «se encendió» conserva bien esa metáfora sin volverse forzado; el intensificador מְאֹד queda reflejado en «muchísimo».
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: muchísimo
  alternatives_spanish:
  - mucho
  - en gran manera
  - sumamente
  lexicon: HALOT
  rationale: Es un intensificador adverbial simple. «Muchísimo» comunica con naturalidad la fuerza del hebreo y mantiene el énfasis del versículo.
- source_word: וַיֵּרַע בְּעֵינָיו
  english_pob_choice: displeased him
  chosen_spanish: le desagradó
  alternatives_spanish:
  - le pareció mal
  - fue malo a sus ojos
  - le molestó
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente significa ‘fue malo en sus ojos’. «Le desagradó» transmite esa reacción negativa en español natural, sin perder la fuerza del juicio personal de Saúl.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this matter
  chosen_spanish: este asunto
  alternatives_spanish:
  - esta cosa
  - esta palabra
  - este hecho
  lexicon: HALOT
  rationale: דָּבָר puede ser ‘palabra’, ‘cosa’ o ‘asunto’. Aquí se refiere al dicho/canto reportado, y «este asunto» resulta amplio y natural en español.
- source_word: נָתְנוּ
  english_pob_choice: they have given
  chosen_spanish: le han dado / me han dado
  alternatives_spanish:
  - le dieron / me dieron
  - le han asignado / me han asignado
  - le han atribuido / me han atribuido
  lexicon: HALOT
  rationale: El verbo básico es ‘dar’. El contexto del canto implica una asignación pública de honores; sin embargo, el texto hebreo usa ‘dar’, así que se mantiene «han dado». Se conserva el paralelismo y la inmediatez de la queja de Saúl.
- source_word: רְבָבֹת
  english_pob_choice: ten thousands
  chosen_spanish: diez mil
  alternatives_spanish:
  - diez millares
  - miríadas
  - diezmillares
  lexicon: HALOT
  rationale: El plural hebreo denota unidades de diez mil. En español, «diez mil» comunica de forma clara y idiomática la magnitud, aunque se pierde parte del paralelismo formal con la forma plural hebrea.
- source_word: הָאֲלָפִים
  english_pob_choice: the thousands
  chosen_spanish: los millares
  alternatives_spanish:
  - los miles
  - los miles de hombres
  - los millares
  lexicon: HALOT
  rationale: El artículo hebreo refuerza el contraste retórico con ‘diez mil’. «Los millares» preserva mejor ese paralelismo numérico y suena elevado pero natural en español bíblico.
- source_word: וְעוֹד לוֹ אַךְ
  english_pob_choice: what more can he have but
  chosen_spanish: ¿qué más le queda sino
  alternatives_spanish:
  - y todavía sólo le queda
  - y aún para él sólo queda
  - ¿qué más tiene sino
  lexicon: HALOT
  rationale: La cláusula hebrea es comprimida y concluye que a David sólo le falta una cosa. «¿Qué más le queda sino» hace explícita esa conclusión retórica en español, manteniendo el sentido de restricción del original.
- source_word: הַמְּלוּכָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el reinado
  - la monarquía
  lexicon: HALOT
  rationale: El término puede referirse a ‘reino’, ‘realeza’ o ‘reinado’. En este contexto narrativo, Saúl teme la transferencia del poder real; «el reino» es la forma más natural y comprensible en español.
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo WLC y el aparato de auditoría en inglés. No hubo revisiones aplicadas en el texto inglés final; la traducción española conserva la misma lectura y las mismas tensiones léxicas principales, ajustadas a un español natural y publicable.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se preservó el contraste numérico del hebreo mediante «diez mil / los millares», evitando una paráfrasis doctrinal o explicativa excesiva.
  - «Se encendió» conserva la metáfora semítica de la ira sin convertirla en una explicación interpretativa.
