    changes_summary: Removed the repeated 'you will be' before 'bounced' for smoother English while preserving the Hebrew sense. Kept 'nurse' to reflect the passive/ingressive sense in context and retained the formal register.
translation:
  language: es
  text: 'Porque así dice Yahvé: Miren[a], yo extiendo hacia ella la paz como un río, y la gloria de las naciones como un torrente que se desborda; y ustedes mamarán, serán llevados en brazos, sobre la cadera, y mecidos sobre las rodillas[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'He aquí'. El hebreo usa una partícula deíctica que introduce el anuncio con énfasis.
    reason: lexical_alternative
  - marker: b
    text: O 'serán jugueteados sobre las rodillas'. El hebreo presenta una imagen de cuidado tierno y juego infantil.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: Nombre divino / Tetragramatón
  rationale: Se sigue el valor del nombre divino en el texto fuente. 'Yahvé' conserva la referencia directa al Tetragramatón sin enmascararlo, conforme al estándar del proyecto en español.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: He aquí, yo
  alternatives_spanish:
  - Miren, yo
  - Vean, yo
  lexicon: HALOT
  rationale: La partícula deíctica enfatiza la inmediatez y solemnidad del anuncio. 'He aquí, yo' reproduce esa fuerza con registro natural en español bíblico contemporáneo.
- source_word: נֹטֶה אֵלֶיהָ
  english_pob_choice: I am extending peace to her
  chosen_spanish: yo extiendo hacia ella la paz
  alternatives_spanish:
  - yo tiendo hacia ella la paz
  - yo extiendo la paz a ella
  lexicon: HALOT
  rationale: El verbo con la preposición expresa dirección o extensión hacia el destinatario. En español, 'extiendo hacia ella' conserva la imagen del movimiento hacia la ciudad femenina implícita en el sufijo pronominal.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: la paz
  alternatives_spanish:
  - el bienestar
  - la plenitud
  - la prosperidad
  lexicon: HALOT
  rationale: '''Paz'' es la equivalencia más directa y reconocible, sin perder la amplitud semántica de שָׁלוֹם en el contexto de restauración y abundancia.'
- source_word: כְּנָהָר
  english_pob_choice: like a river
  chosen_spanish: como un río
  alternatives_spanish:
  - como río
  lexicon: HALOT
  rationale: Se conserva la comparación explícita y la imagen de flujo abundante con una fórmula natural en español.
- source_word: וּכְנַחַל שׁוֹטֵף
  english_pob_choice: like an overflowing stream
  chosen_spanish: como un torrente que se desborda
  alternatives_spanish:
  - como un arroyo desbordado
  - como un torrente crecido
  lexicon: HALOT
  rationale: נחל puede referirse a cauce o torrente; שׁוֹטֵף añade la idea de correr con fuerza y desbordarse. 'Torrente que se desborda' comunica mejor esa imagen que un simple 'arroyo'.
- source_word: כְּבוֹד גּוֹיִם
  english_pob_choice: the glory of the nations
  chosen_spanish: la gloria de las naciones
  alternatives_spanish:
  - la riqueza de las naciones
  - la abundancia de las naciones
  - el honor de las naciones
  lexicon: HALOT
  rationale: '''Gloria'' sigue de forma directa el sustantivo hebreo y mantiene abierta la posible amplitud de sentido, que puede incluir esplendor y riqueza.'
- source_word: וִינַקְתֶּם
  english_pob_choice: you will nurse
  chosen_spanish: ustedes mamarán
  alternatives_spanish:
  - ustedes chuparán
  - ustedes serán amamantados
  lexicon: HALOT
  rationale: El verbo es activo y describe la acción de mamar/nutrirse en una escena de cuidado infantil. 'Mamarán' preserva mejor la concreción corporal del hebreo que una paráfrasis más suave.
- source_word: עַל צַד תִּנָּשֵׂאוּ
  english_pob_choice: you will be carried on the hip
  chosen_spanish: serán llevados en la cadera
  alternatives_spanish:
  - serán llevados al costado
  - serán cargados a la cadera
  - serán llevados sobre la cadera
  lexicon: HALOT
  rationale: צַד en este contexto maternal apunta al costado/cadera donde se carga a un niño. 'En la cadera' es natural en español y conserva la imagen de cercanía corporal del hebreo.
- source_word: וְעַל בִּרְכַּיִם תְּשָׁעֳשָׁעוּ
  english_pob_choice: bounced on the knees
  chosen_spanish: mecidos sobre las rodillas
  alternatives_spanish:
  - dandoleados sobre las rodillas
  - bailoteados sobre las rodillas
  - acariciados sobre las rodillas
  lexicon: HALOT
  rationale: El verbo expresa trato afectuoso, deleite y movimiento juguetón con el niño. 'Mecidos sobre las rodillas' comunica ese cuidado tierno en un español claro y digno; se evita una forma demasiado coloquial o arcaica.
theological_decisions:
- issue: Referente femenino singular de 'ella'
  english_pob_reading: Retained as 'her,' referring to Zion/Jerusalem in the immediate context.
  chosen_spanish_reading: Se conserva 'ella' como referencia a Sion/Jerusalén en el contexto inmediato.
  alternative_spanish_readings:
  - hacer explícito 'a Jerusalén'
  - hacer explícito 'a Sion'
  rationale: El hebreo presenta un sufijo femenino singular; conservar 'ella' preserva la cohesión literaria y la imagen de la ciudad como destinataria materna. Hacerlo explícito sería válido, pero iría más allá de la forma del verso.
  doctrine_reference: Isaías 66 en su marco de restauración de Sion/Jerusalén
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del POB en inglés: conserva el tono formal, mantiene la imagen maternal de nutrición y porte, y refleja la corrección estilística que eliminó la repetición innecesaria antes de ''bounced''. En español se optó por una cadencia igualmente fluida sin duplicar ''serán''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto.
  - Se usa 'naciones' para גּוֹיִם de manera consistente con el POB inglés.
  - '''Mamarán'' conserva la acción concreta de וִינַקְתֶּם sin suavizarla indebidamente.'
  - '''Mecidos sobre las rodillas'' reproduce la imagen afectuosa sin introducir una voz pasiva inexistente.'
  - La referencia pronominal 'ella' queda implícita en 'hacia ella', respetando el texto hebreo.
