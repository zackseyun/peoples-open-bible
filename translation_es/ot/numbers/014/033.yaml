source:
  edition: WLC
  text: וּ֠/בְנֵי/כֶם יִהְי֨וּ רֹעִ֤ים בַּ/מִּדְבָּר֙ אַרְבָּעִ֣ים שָׁנָ֔ה וְ/נָשְׂא֖וּ אֶת זְנוּתֵי/כֶ֑ם עַד תֹּ֥ם פִּגְרֵי/כֶ֖ם בַּ/מִּדְבָּֽר־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/014/033.yaml
  text: And your sons will be shepherds in the wilderness for forty years[c][b][a], and they will bear your unfaithfulness until your dead bodies are consumed in the wilderness.
  footnotes:
  - marker: a
    text: Or 'wanderers' for 'shepherds'; the Hebrew word is literally related to shepherding/pasturing, but some take it as emphasizing their nomadic wandering.
    reason: lexical_alternative
  - marker: b
    text: '''Acts of sexual unfaithfulness'' translates a term that can also be rendered ''whoredom'' or more generally ''unfaithfulness,'' using sexual imagery for covenant disloyalty.'
    reason: lexical_alternative
  - marker: c
    text: Or 'until your corpses come to an end in the wilderness.'
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
