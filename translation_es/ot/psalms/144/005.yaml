translation:
  language: es
  text: Oh Yahvé, inclina tus cielos y desciende[a]; toca los montes, para que echen humo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “ven abajo”.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “y humearán”; el hebreo también puede leerse como el resultado del toque de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Oh Yahvé
  alternatives_spanish:
  - Oh Jehová
  lexicon: HALOT
  rationale: 'El hebreo contiene el nombre divino YHWH, no un título. Se mantiene como nombre propio reverencial en español: Yahvé, siguiendo la decisión POB de preservar el nombre del pacto y no sustituirlo por una convención de “Señor”.'
- source_word: הַט
  english_pob_choice: bend
  chosen_spanish: inclina
  alternatives_spanish:
  - extiende
  - dobla
  lexicon: HALOT
  rationale: El imperativo de נטה con 'cielos' expresa la imagen de inclinarlos hacia abajo. 'Inclina' conserva el movimiento poético con naturalidad en español.
- source_word: שָׁמֶיךָ
  english_pob_choice: your heavens
  chosen_spanish: tus cielos
  alternatives_spanish:
  - tu cielo
  - los cielos tuyos
  lexicon: HALOT
  rationale: El plural hebreo con sufijo de segunda persona se refleja mejor con 'tus cielos'. 'Cielos' preserva el registro elevado y la pluralidad del original.
- source_word: וְתֵרֵד
  english_pob_choice: and come down
  chosen_spanish: y desciende
  alternatives_spanish:
  - y baja
  - y ven abajo
  lexicon: HALOT
  rationale: El sentido formal es 'descender'. Aquí 'desciende' conserva la direccionalidad y el tono solemne de la súplica poética.
- source_word: גַּע
  english_pob_choice: touch
  chosen_spanish: toca
  alternatives_spanish:
  - golpea
  - roza
  lexicon: HALOT
  rationale: נגע significa 'tocar'. Se evita intensificar a 'golpea' porque el hebreo dice solo el contacto, aunque el contexto teofánico implique efecto poderoso.
- source_word: בֶּהָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  - los cerros
  lexicon: HALOT
  rationale: '''Montes'' es una opción bíblica natural en español y conserva el tono poético. Mantiene la grandeza de la imagen sin sonar técnico.'
- source_word: וְיֶעֱשָׁנוּ
  english_pob_choice: so that they smoke
  chosen_spanish: y harán humo
  alternatives_spanish:
  - y echarán humo
  - y humearán
  lexicon: HALOT
  rationale: 'El hebreo permite entender el resultado del toque: las montañas humean. ''Harán humo'' comunica el efecto resultante sin forzar una causalidad explícita que no esté en el texto.'
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se conserva el nombre personal del pacto como transliteración reverente y auditable. No se usa una sustitución litúrgica porque la política POB privilegia el nombre revelado en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El pasaje coincide en alto grado con el control inglés y no muestra revisiones aplicadas en el paquete auditado; se mantiene la misma lectura semántica: imperativo a Yahvé, descenso, toque de los montes y humo como resultado.'
  spanish_consistency_notes:
  - Se mantiene Yahvé para YHWH, conforme al criterio del proyecto.
  - Se conserva el registro poético con verbos breves e imperativos.
  - '''Montes'' se usa como equivalente bíblico natural de ''mountains'' sin alterar el sentido.'
  - No se añade interpretación causal más allá del resultado implícito en el hebreo.
