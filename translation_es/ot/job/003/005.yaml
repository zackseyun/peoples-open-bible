translation:
  language: es
  text: Que las tinieblas y la sombra profunda lo reclamen[a]; que una nube more sobre él; que las negruras del día[b] lo aterroricen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sombra de muerte' o 'oscuridad profunda' para צַלְמָוֶת.
    reason: lexical_alternative
  - marker: b
    text: La expresión 'las negruras del día' es difícil; también puede entenderse como 'la negrura del día', 'los eclipses del día' o, menos probablemente, 'las amarguras del día'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִגְאָלֻהוּ
  english_pob_choice: reclaim it
  chosen_spanish: lo reclamen
  alternatives_spanish:
  - lo rescaten
  - lo rediman
  - lo reclamen de nuevo
  lexicon: HALOT
  rationale: גאל expresa la idea de reclamar o recobrar algo con derecho de parentesco; en este contexto de maldición, 'redimir' en español introduciría un matiz positivo ajeno al tono. 'Lo reclamen' conserva la idea de apropiación o recuperación por parte de las tinieblas.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad
  lexicon: HALOT
  rationale: '''Tinieblas'' comunica bien la oscuridad literal y poética del verso y mantiene el paralelismo con el término siguiente.'
- source_word: צַלְמָוֶת
  english_pob_choice: deep shadow
  chosen_spanish: sombra profunda
  alternatives_spanish:
  - sombra de muerte
  - oscuridad profunda
  - muerte-sombra
  lexicon: HALOT
  rationale: El hebreo admite 'sombra de muerte' y también 'profunda oscuridad'. En español, 'sombra profunda' preserva la imagen grave sin forzar explícitamente la referencia a muerte cuando el contexto inmediato ya está dominado por imágenes de oscuridad.
- source_word: תִּשְׁכָּן עָלָיו
  english_pob_choice: dwell over it
  chosen_spanish: more sobre él
  alternatives_spanish:
  - habite sobre él
  - permanezca sobre él
  - se tienda sobre él
  lexicon: HALOT
  rationale: שׁכן con עַל expresa morar o asentarse sobre algo. 'More sobre él' es una forma natural en español que conserva el valor de habitar/posarse sin sonar forzada.
- source_word: עֲנָנָה
  english_pob_choice: a cloud
  chosen_spanish: una nube
  alternatives_spanish:
  - un nubarrón
  - una nube espesa
  lexicon: HALOT
  rationale: El sustantivo es concreto y singular; 'una nube' reproduce fielmente la imagen meteorológica del texto.
- source_word: יְבַעֲתֻהוּ
  english_pob_choice: terrify it
  chosen_spanish: lo aterroricen
  alternatives_spanish:
  - lo espanten
  - le den terror
  lexicon: HALOT
  rationale: בעת en piel intensifica la idea de causar pavor. 'Aterroricen' comunica mejor la fuerza del verbo que un simple 'espanten'.
- source_word: כִּמְרִירֵי יוֹם
  english_pob_choice: the blacknesses of the day
  chosen_spanish: las negruras del día
  alternatives_spanish:
  - la negrura del día
  - las oscuridades del día
  - las negruras del mediodía
  lexicon: HALOT
  rationale: La frase es difícil y el plural hebreo se conserva con 'negruras'. 'Del día' mantiene la construcción original y la rareza poética del hebreo, sin decidir prematuramente entre lecturas alternativas.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés de la POB y toma en cuenta su revisión más reciente: se optó por ''more sobre él'' para reflejar mejor el valor de ''dwell/tabernacle'', manteniendo el resto de la línea poética sin expandir el sentido.'
  spanish_consistency_notes:
  - Se mantiene el tono poético y de imprecación del hebreo, sin suavizarlo a lenguaje devocional.
  - Se conserva el singular de los referentes ('él') conforme al hebreo, aunque en español la referencia última es el día/persona implícita del verso en su contexto poético.
  - No se sustituye el campo semántico de oscuridad por formulaciones interpretativas más amplias, para preservar la tensión lexical del texto.
