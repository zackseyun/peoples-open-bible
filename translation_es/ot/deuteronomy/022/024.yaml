  text: 'then you shall bring both of them out to the gate of that city[a], and you shall stone them with stones, and they shall die: the young woman because she did not cry out in the city, and the man because he violated his neighbor’s wife[c][b]. So you shall purge the evil from your midst.'
  footnotes:
  - marker: a
    text: Or, 'the girl.' The Hebrew form here is written without the final he of the more explicit feminine spelling, but the following verb 'she did not cry out' shows that a female is meant.
    reason: lexical_alternative
  - marker: b
    text: Or, 'humiliated' or 'afflicted.' The Hebrew verb can denote sexual violation with accompanying humiliation; 'violated' is chosen here as the clearest modern rendering.
    reason: lexical_alternative
  - marker: c
    text: The city gate was the customary public place of legal proceedings and judgment.
    reason: cultural_note
