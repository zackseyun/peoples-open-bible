translation:
  language: es
  text: 'Pero David respondió a Recab y a Baaná su hermano, los hijos de Rimón el beerotita, y les dijo: «Vive Yahvé[a], que ha redimido mi vida de toda angustia»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; en español del proyecto se rinde como «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: ענה en este contexto introduce la réplica de David dentro del diálogo. En español, «respondió» conserva el valor narrativo normal sin perder la relación con la pregunta o situación previa.
- source_word: רֵכָב
  english_pob_choice: Rekab
  chosen_spanish: Rekab
  alternatives_spanish:
  - Recab
  lexicon: HALOT
  rationale: Es un nombre propio; se translitera. Se conserva «Rekab» para seguir la convención del texto de trabajo y mantener consistencia con el audit trail en inglés.
- source_word: בַּעֲנָה
  english_pob_choice: Baanah
  chosen_spanish: Baaná
  alternatives_spanish:
  - Baana
  - Baaná
  lexicon: HALOT
  rationale: Nombre propio transliterado. «Baaná» sigue la pronunciación natural en español y mantiene la forma bíblica reconocible.
- source_word: אָחִיו
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - hermano de él
  - su hermano
  lexicon: HALOT
  rationale: El sufijo singular de 3ms se refiere naturalmente a Baaná como hermano de Rekab. En español, «su hermano» conserva la relación explícita y natural.
- source_word: בְּנֵי רִמּוֹן הַבְּאֵרֹתִי
  english_pob_choice: the sons of Rimmon the Beerothite
  chosen_spanish: los hijos de Rimón el beerotita
  alternatives_spanish:
  - los hijos de Rimón de Beerot
  - los hijos de Rimón el de Beerot
  lexicon: HALOT
  rationale: La construcción en hebreo identifica filiación y origen mediante un gentilicio. «Beerotita» reproduce el valor gentilicio de הַבְּאֵרֹתִי de manera concisa y estándar en español bíblico.
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: Vive Yahvé
  alternatives_spanish:
  - Yahvé vive
  - Vive Yahvé
  lexicon: HALOT
  rationale: Es una fórmula de juramento fija. La traducción «Vive Yahvé» preserva la estructura sobria del hebreo y mantiene el nombre divino según la norma del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se rinde como «Yahvé» siguiendo la decisión doctrinal del proyecto y evitando la sustitución por un título.
- source_word: פָּדָה
  english_pob_choice: has redeemed
  chosen_spanish: ha redimido
  alternatives_spanish:
  - ha rescatado
  - ha librado
  - ha redimido
  lexicon: HALOT
  rationale: פָּדָה tiene el peso de rescate/redención. «Ha redimido» conserva esa carga lexical y teológica mejor que «ha librado».
- source_word: נַפְשִׁי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  - mi vida
  - mi ser
  lexicon: HALOT
  rationale: En este contexto נֶפֶשׁ no apunta primariamente al alma inmortal, sino a la vida/personalidad en peligro. «Mi vida» es la equivalencia más clara en español.
- source_word: מִכָּל צָרָה
  english_pob_choice: out of every distress
  chosen_spanish: de toda angustia
  alternatives_spanish:
  - de toda aflicción
  - de todo peligro
  - de toda angustia
  lexicon: HALOT
  rationale: צָרָה expresa angustia, aflicción o aprieto. «Angustia» comunica bien el alcance total de כָּל sin sonar demasiado técnico.
theological_decisions:
- issue: Forma del juramento con el nombre divino
  english_pob_reading: As Yahweh lives
  chosen_spanish_reading: Vive Yahvé
  alternative_spanish_readings:
  - Vive Yahvé
  - Por la vida de Yahvé
  rationale: El hebreo usa una fórmula juratoria solemne con חַי + YHWH. La versión española conserva la función performativa del juramento y mantiene el nombre divino sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de פָּדָה aplicado a la salvación personal de David
  english_pob_reading: has redeemed my life
  chosen_spanish_reading: ha redimido mi vida
  alternative_spanish_readings:
  - ha rescatado mi vida
  - ha librado mi vida
  rationale: Se preserva el matiz de redención/ransom del verbo, evitando reducirlo a una simple liberación. Esto mantiene la resonancia teológica del verbo en la confesión de David.
  doctrine_reference: 'Lexical theology: פָּדָה as redemption/deliverance'
- issue: Valor de נַפְשִׁי en un contexto de peligro
  english_pob_reading: my life
  chosen_spanish_reading: mi vida
  alternative_spanish_readings:
  - mi alma
  - mi ser
  rationale: Aquí נֶפֶשׁ designa la vida concreta de David, no una noción abstracta del alma. Traducirlo como «mi vida» evita una lectura doctrinal importada que el contexto no exige.
  doctrine_reference: 'Anthropology in Hebrew Bible: נֶפֶשׁ as life/self'
translation_notes:
  revision_awareness: Se revisó el pasaje con el contexto auditado en inglés y la concordancia alta del revisor. No se requieren cambios adicionales respecto al sentido fuente; solo se adaptó la formulación al español bíblico natural conservando los puntos lexicales sensibles (nombre divino, juramento, redención y valor de נֶפֶשׁ).
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la norma del proyecto para יְהוָה.
  - Se transliteran los nombres propios, con adaptación española mínima en Baaná para legibilidad.
  - «Redimido» se conserva para reflejar el peso teológico de פָּדָה.
  - El cierre de cita se coloca con coma final porque el versículo continúa en el contexto inmediato en muchas ediciones; si se prefiere puntuar como versículo autónomo, puede ajustarse editorialmente sin cambiar el contenido.
