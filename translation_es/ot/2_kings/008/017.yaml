lexical_decisions:
- source_word: בֶּן שְׁלֹשִׁים וּשְׁתַּיִם שָׁנָה
  english_pob_choice: was thirty-two years old
  chosen_spanish: tenía treinta y dos años
  alternatives_spanish:
  - era de treinta y dos años
  - era treinta y dos años de edad
  lexicon: HALOT
  rationale: La fórmula hebrea de edad funciona idiomáticamente como ‘tener X años’; en español esa es la opción más natural y fiel, sin forzar una expresión de filiación literal.
- source_word: הָיָה בְמָלְכוֹ
  english_pob_choice: when he became king
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando llegó a ser rey
  - cuando fue hecho rey
  lexicon: HALOT
  rationale: La construcción marca el momento de acceso al trono. ‘Comenzó a reinar’ transmite el valor temporal y verbal con claridad en español.
- source_word: וּשְׁמֹנֶה שנה
  english_pob_choice: eight years
  chosen_spanish: ocho años
  alternatives_spanish:
  - durante ocho años
  lexicon: HALOT
  rationale: La duración del reinado se expresa de forma directa y natural con el sintagma nominal ‘ocho años’.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  lexicon: HALOT
  rationale: El verbo hebreo indica ejercer la realeza, no solo portar el título. ‘Reinó’ conserva ese valor específico.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: La preposición locativa se traduce de manera directa; se conserva el lugar desde el que ejerció el reinado.
