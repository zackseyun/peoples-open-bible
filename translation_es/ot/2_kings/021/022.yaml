translation:
  language: es
  text: Abandonó a Yahvé[a], el Dios de sus padres[b], y no anduvo en el camino de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘abandonó al SEÑOR’.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘el Dios de sus padres’; alternativamente, ‘el Dios de sus antepasados’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲזֹב
  english_pob_choice: abandoned
  chosen_spanish: abandonó
  alternatives_spanish:
  - dejó
  - desamparó
  - forsook
  lexicon: HALOT
  rationale: עזב admite ‘dejar’, ‘abandonar’ y ‘abandonar/for­sake’ en contexto de infidelidad de pacto. ‘Abandonó’ es natural en español moderno y conserva la fuerza de deslealtad covenantal sin sonar arcaico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como ‘Yahvé’ según la convención del proyecto en español, preservando el nombre propio divino en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵי אֲבֹתָיו
  english_pob_choice: the God of his fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  - su Dios ancestral
  lexicon: HALOT
  rationale: La construcción hebrea literalmente dice ‘Dios de sus padres’. ‘Padres’ mantiene la forma del hebreo y la relación de pacto; ‘antepasados’ es posible, pero diluye la correspondencia formal.
- source_word: וְלֹא הָלַךְ
  english_pob_choice: and did not walk
  chosen_spanish: y no anduvo
  alternatives_spanish:
  - y no caminó
  - y no siguió
  lexicon: HALOT
  rationale: הלך en el idioma bíblico de conducta se expresa bien con ‘andar’. ‘Anduvo’ preserva la metáfora de manera comprensible en español.
- source_word: בְּדֶרֶךְ יְהוָה
  english_pob_choice: in the way of Yahweh
  chosen_spanish: en el camino de Yahvé
  alternatives_spanish:
  - en el camino del Yahvé
  - en la senda de Yahvé
  lexicon: HALOT
  rationale: דרך es ‘camino’ en sentido figurado de conducta o vida. ‘En el camino de Yahvé’ conserva el modismo bíblico y evita una paráfrasis excesiva.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El versículo repite el nombre divino explícito; la traducción española mantiene el nombre propio ‘Yahvé’ para no ocultar el texto hebreo con una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Expresión genealógica/covenantal 'his fathers'
  english_pob_reading: the God of his fathers
  chosen_spanish_reading: el Dios de sus padres
  alternative_spanish_readings:
  - el Dios de sus antepasados
  rationale: Se conserva la referencia paternal masculina del hebreo, sin neutralizarla a ‘antepasados’, porque el texto es explícitamente masculino plural y la pauta del proyecto favorece precisión de género donde el original la marca.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4 — Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con la última revisión: no se requieren cambios respecto del audit trail inglés; se mantiene la equivalencia óptima con terminología española consistente.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה, conforme al estándar del proyecto.
  - ‘Anduvo’ conserva el modismo bíblico de conducta sin volverlo explicativo.
  - ‘Padres’ reproduce la forma del hebreo y preserva la precisión de género del original.
