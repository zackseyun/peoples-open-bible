    text: 'Hebrew: ''from yesterday and the day before,'' an idiom meaning the ox had previously shown this behavior.'
    reason: cultural_note
  - marker: b
    text: Or 'accustomed to gore.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the carcass will be his.'
    reason: lexical_alternative
