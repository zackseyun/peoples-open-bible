translation:
  language: es
  text: Enfrentaré a egipcios contra egipcios[a]; y cada uno peleará contra su hermano, y cada uno contra su prójimo; ciudad contra ciudad, reino contra reino.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «Egipto contra Egipto»; la traducción hace explícito que el sentido es de egipcios en conflicto interno.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Enfrentaré a Egipto contra Egipto».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְסִכְסַכְתִּי
  english_pob_choice: I will stir up
  chosen_spanish: yo agitaré
  alternatives_spanish:
  - yo incitaré
  - yo pondré en conflicto
  - yo provocaré
  lexicon: HALOT
  rationale: El verbo expresa causar conflicto interno o enfrentar a unos con otros. «Agitaré» comunica bien esa acción causativa en español moderno sin cargar el texto con un matiz demasiado psicológico o estrecho.
- source_word: מִצְרַיִם / בְּמִצְרַיִם
  english_pob_choice: Egyptians against Egyptians
  chosen_spanish: a los egipcios contra los egipcios
  alternatives_spanish:
  - a Egipto contra Egipto
  - a los egipcios contra Egipto
  lexicon: HALOT
  rationale: En el hebreo, el nombre nacional se repite literalmente, pero el contexto describe discordia interna entre los habitantes. La repetición en español mantiene el paralelismo y hace explícito el sentido colectivo, como en la decisión inglesa auditada.
- source_word: וְנִלְחֲמוּ
  english_pob_choice: and each will fight
  chosen_spanish: y cada uno peleará
  alternatives_spanish:
  - y pelearán
  - y cada uno luchará
  lexicon: HALOT
  rationale: El verbo es plural, pero la frase distributiva siguiente desglosa la acción en individuos. «Cada uno peleará» preserva ese valor distributivo con naturalidad en español.
- source_word: אִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - un hombre
  - uno
  lexicon: HALOT
  rationale: Aquí אִישׁ funciona distributivamente, no como énfasis en el sexo masculino. «Cada uno» reproduce bien esa fuerza sin perder claridad ni volver torpe la frase.
- source_word: בְּאָחִיו
  english_pob_choice: against his brother
  chosen_spanish: contra su hermano
  alternatives_spanish:
  - contra su hermano de sangre
  - contra su pariente
  lexicon: HALOT
  rationale: «Hermano» es el sentido léxico directo y conserva la imagen de ruptura familiar empleada por el hebreo.
- source_word: בְּרֵעֵהוּ
  english_pob_choice: against his neighbor
  chosen_spanish: contra su prójimo
  alternatives_spanish:
  - contra su vecino
  - contra su amigo
  lexicon: HALOT
  rationale: רֵעַ puede significar amigo, compañero o prójimo según el contexto. Aquí, como progresión social amplia después de la familia, «prójimo» transmite mejor la extensión del conflicto que «amigo».
- source_word: עִיר בְּעִיר
  english_pob_choice: city against city
  chosen_spanish: ciudad contra ciudad
  alternatives_spanish:
  - una ciudad contra otra
  - ciudad en contra de ciudad
  lexicon: HALOT
  rationale: La traducción literal conserva el ritmo escalonado del hebreo y el contraste político-social del verso.
- source_word: מַמְלָכָה בְּמַמְלָכָה
  english_pob_choice: kingdom against kingdom
  chosen_spanish: reino contra reino
  alternatives_spanish:
  - reino contra reino alguno
  - un reino contra otro reino
  lexicon: HALOT
  rationale: «Reino» es la equivalencia natural de מַמְלָכָה y mantiene la progresión de individuos a unidades políticas mayores.
theological_decisions:
- issue: Lectura colectiva de מִצְרַיִם en un contexto de conflicto interno
  english_pob_reading: Egyptians against Egyptians
  chosen_spanish_reading: a los egipcios contra los egipcios
  alternative_spanish_readings:
  - a Egipto contra Egipto
  rationale: El hebreo repite el nombre nacional, pero el verso aclara inmediatamente que se trata de lucha interna. La formulación española conserva la literalidad subyacente y, al mismo tiempo, hace patente la referencia a las personas dentro de Egipto. Es una decisión translacional, no doctrinal.
  doctrine_reference: Translation philosophy §1, §6
- issue: Fuerza distributiva de אִישׁ
  english_pob_reading: each ... each
  chosen_spanish_reading: cada uno ... cada uno
  alternative_spanish_readings:
  - un hombre ... un hombre
  rationale: La construcción presenta conflicto extendido a nivel individual. «Cada uno» comunica el sentido distributivo sin introducir una lectura doctrinal o ideológica ajena al texto.
  doctrine_reference: Translation philosophy §4, §6
translation_notes:
  revision_awareness: El pasaje coincide con el sentido del texto hebreo y con la decisión inglesa auditada; no se registran revisiones aplicadas en el paquete fuente, y la presente propuesta mantiene la misma lectura de conflicto interno escalonado.
  spanish_consistency_notes:
  - Conservo «Yahvé» como término divino por defecto solo cuando aparece el tetragrámaton; este versículo no lo contiene.
  - Uso «prójimo» para רֵעַ porque en este contexto resulta más natural que «amigo» y mantiene la progresión social de la línea.
  - 'Mantengo el paralelismo repetitivo del hebreo: egipcios/egipcios, cada uno/cada uno, ciudad/ciudad, reino/reino.'
