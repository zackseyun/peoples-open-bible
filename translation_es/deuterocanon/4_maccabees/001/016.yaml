translation:
  language: es
  text: La sabiduría[a], pues, es conocimiento de los asuntos divinos y humanos, y de sus causas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «de las causas de estos asuntos». El demostrativo τούτων se refiere a los asuntos divinos y humanos recién mencionados.
    reason: lexical_alternative
lexical_decisions:
- source_word: σοφία
  english_pob_choice: Wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - Sabiduría
  lexicon: LSJ
  rationale: Se conserva el sustantivo abstracto como definición del sujeto de la frase. En español común, 'sabiduría' comunica mejor la idea que una personificación o una perífrasis.
- source_word: δὴ τοίνυν
  english_pob_choice: then
  chosen_spanish: pues
  alternatives_spanish:
  - entonces
  - así pues
  - por tanto
  lexicon: LSJ
  rationale: La combinación de partículas marca un enlace inferencial. 'Pues' mantiene brevedad y naturalidad en español, sin cargar de formalidad excesiva el paso lógico.
- source_word: γνῶσις
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - comprensión
  lexicon: LSJ
  rationale: '''Conocimiento'' es el equivalente más directo y estándar para una definición filosófica. ''Comprensión'' añade un matiz interpretativo que el sustantivo griego no exige.'
- source_word: θείων
  english_pob_choice: divine
  chosen_spanish: de las cosas divinas
  alternatives_spanish:
  - divino
  - de asuntos divinos
  - de realidades divinas
  lexicon: LSJ
  rationale: Se explicita el sustantivo implícito en español porque el adjetivo solo, 'divinas', sonaría incompleto sin un referente nominal. Esto conserva el alcance de πραγμάτων sin perder naturalidad.
- source_word: ἀνθρωπίνων
  english_pob_choice: human
  chosen_spanish: humanas
  alternatives_spanish:
  - de las cosas humanas
  - de asuntos humanos
  lexicon: LSJ
  rationale: Se mantiene el paralelismo con 'divinas' y el contraste semántico del griego. El adjetivo plural funciona bien en español en esta construcción elíptica.
- source_word: πραγμάτων
  english_pob_choice: matters
  chosen_spanish: cosas
  alternatives_spanish:
  - asuntos
  - materias
  lexicon: LSJ
  rationale: '''Cosas'' refleja el sentido amplio de πραγμάτων en una definición general. Aunque ''asuntos'' también es posible, ''cosas'' permite la coordinación ''divinas y humanas'' con una sintaxis más natural en español.'
- source_word: τῶν τούτων αἰτίων
  english_pob_choice: their causes
  chosen_spanish: de sus causas
  alternatives_spanish:
  - de las causas de estas cosas
  - de sus razones
  lexicon: LSJ
  rationale: Se conserva la relación anafórica de τούτων con lo dicho antes. 'Causas' mantiene el sentido filosófico de αἰτίων, sin reducirlo a simples 'razones'.
translation_notes:
  revision_awareness: El contexto de auditoría en inglés está en alta concordancia con el griego. No hubo revisiones aplicadas; se siguió la lectura definicional y la nota alternativa sobre la relación anafórica de τούτων.
  spanish_consistency_notes:
  - Se prefirió 'sabiduría' en minúscula por tratarse de un sustantivo abstracto, no de un nombre propio.
  - Se mantuvo el paralelismo 'divinas y humanas' para reflejar θείων καὶ ἀνθρωπίνων.
  - La nota a conserva la alternativa más literal requerida por el audit trail inglés, ajustada al español.
