translation:
  language: es
  text: Y el resto de los hechos[a] de Ocozías, lo que hizo, ¿no están escritos en el Libro de los Anales de los reyes de Israel[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Otras posibilidades serían «actos» o «acciones»; aquí «hechos» conserva bien el valor resumido de la fórmula regia hebrea.
    reason: lexical_alternative
  - marker: b
    text: Se trata de una fuente real de anales citada en Reyes, no necesariamente del libro canónico de Crónicas.
    reason: cultural_note
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Y el resto de
  alternatives_spanish:
  - Ahora el resto de
  - Y lo restante de
  lexicon: HALOT
  rationale: יֶתֶר introduce la fórmula conclusiva de los resúmenes reales. En español, «el resto de» conserva el valor de cierre sin añadir interpretación. Se mantiene la conjunción inicial como enlace narrativo natural.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: los hechos
  alternatives_spanish:
  - los actos
  - las cosas
  - los asuntos
  lexicon: HALOT
  rationale: En la fórmula regnal de Reyes, דִּבְרֵי abarca las acciones y acontecimientos del rey. «Hechos» es una opción natural en español que conserva el sentido historiográfico mejor que «palabras» o «asuntos».
- source_word: אֲחַזְיָהוּ
  english_pob_choice: Ahaziah
  chosen_spanish: Ocozías
  alternatives_spanish:
  - Ahazías
  - Ococías
  lexicon: convencional bíblico español
  rationale: Se usa la forma bíblica española asentada para el nombre propio, sin transliteración inglesa, porque el texto es público y eclesialmente legible en español.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: what he did
  chosen_spanish: lo que hizo
  alternatives_spanish:
  - lo que realizó
  - lo que había hecho
  - lo que ejecutó
  lexicon: HALOT
  rationale: La cláusula relativa especifica el contenido de los «hechos». «Lo que hizo» reproduce la naturalidad del hebreo sin forzar una perífrasis más pesada.
- source_word: הֲלוֹא
  english_pob_choice: are they not
  chosen_spanish: ¿no están
  alternatives_spanish:
  - ¿acaso no están
  - ¿no es cierto que están
  lexicon: HALOT
  rationale: La partícula retórica espera respuesta afirmativa. En español, «¿no están...?» mantiene el valor de pregunta retórica y la forma breve del original.
- source_word: הֵמָּה כְתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: están escritos
  alternatives_spanish:
  - están registrados
  - están anotados
  lexicon: HALOT
  rationale: כְתוּבִים significa literalmente «escritos». Se conserva «escritos» en la formulación principal para reflejar la fórmula archivística del hebreo; «registrados» queda implícitamente posible, pero no reemplaza el término base.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el Libro
  alternatives_spanish:
  - en el rollo
  - sobre el libro
  lexicon: HALOT
  rationale: Aunque עַל es literalmente «sobre», en la fórmula documental significa pertenencia al registro. «En el Libro» expresa el idiomatismo en español y mantiene la referencia a un documento.
- source_word: דִּבְרֵי הַיָּמִים
  english_pob_choice: the Chronicles
  chosen_spanish: los Anales
  alternatives_spanish:
  - las Crónicas
  - los anales
  lexicon: HALOT
  rationale: En este contexto, la expresión designa una fuente real de anales. «Anales» evita confusión con el libro canónico de Crónicas y comunica con precisión la clase de documento citado.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  english_pob_choice: of the Kings of Israel
  chosen_spanish: de los reyes de Israel
  alternatives_spanish:
  - para los reyes de Israel
  - de los reyes israelitas
  lexicon: HALOT
  rationale: La lamed del título documental se expresa naturalmente con «de» en español. Se conserva la referencia histórica a la monarquía de Israel tal como funciona en la cita archivística.
theological_decisions:
- issue: Referencia al documento citado
  english_pob_reading: '''The Book of the Chronicles of the Kings of Israel'' refers to a royal annalistic source cited in Kings, not necessarily the biblical book of Chronicles.'
  chosen_spanish_reading: «el Libro de los Anales de los reyes de Israel» se entiende como una fuente real citada en Reyes, no necesariamente el libro bíblico de Crónicas.
  alternative_spanish_readings:
  - «el libro de las crónicas de los reyes de Israel»
  - «el libro de los anales de los reyes de Israel»
  rationale: La nota mantiene la distinción documental del POB inglés y evita identificar automáticamente la cita con el libro canónico de Crónicas. Esto preserva la tensión histórica del texto fuente.
  doctrine_reference: Historiografía bíblica / fuentes regias en Reyes
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés coinciden sustancialmente: fórmula regia conclusiva, verbos de registro escrito y cita de una fuente documental. No se registran revisiones posteriores que alteren la lectura base; se conserva la equivalencia óptima sin cambios textuales relevantes.'
  spanish_consistency_notes:
  - Se mantiene «Ocozías» como forma bíblica española estándar para el nombre propio.
  - Se traduce la fórmula documental con «Anales» para evitar ambigüedad con el libro canónico de Crónicas.
  - Se conserva el valor literal de כתובים con «escritos» en el cuerpo principal.
  - La puntuación reproduce el cierre interrogativo retórico del hebreo con una sola pregunta final.
