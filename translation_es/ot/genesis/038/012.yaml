    text: 'O: «Después de mucho tiempo». Literalmente: «los días se hicieron muchos».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la hija de Súa»; algunos toman esto como el nombre personal «Batsúa».'
    reason: alternative_reading
  - marker: c
    text: 'O: «Después de que Judá fue consolado» / «Y Judá fue consolado». El verbo hebreo indica que fue consolado después del duelo.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el topónimo a 'Timná' por legibilidad y consistencia, se simplifica la frase sobre los esquiladores para reflejar mejor el hebreo y el audit trail inglés, y se mejora la naturalidad de 'esposa de Judá' sin alterar el sentido fuente. Las notas pueden mantenerse con mínima normalización tipográfica.
