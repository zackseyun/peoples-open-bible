translation:
  language: es
  text: Y a todos nuestros hermanos que están en la región de Tob[a] los han matado, y han llevado cautivas a sus mujeres y a sus hijos, junto con sus posesiones[b], y allí han destruido como a mil hombres[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «en los de Toubiou»; la forma exacta del topónimo es difícil. «Región de Tob» expresa el sentido geográfico probable.
    reason: lexical_alternative
  - marker: b
    text: Ὑποσκευήν puede significar «bagaje», «equipo», «bienes» o «posesiones». Se eligió «posesiones» por su amplitud y claridad en este contexto.
    reason: lexical_alternative
  - marker: c
    text: 'También puede entenderse: «y han matado allí como a mil hombres». El griego usa literalmente «han destruido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἀδελφοὶ ἡμῶν
  english_pob_choice: our brothers
  chosen_spanish: nuestros hermanos
  alternatives_spanish:
  - nuestros parientes
  - nuestros compatriotas
  - nuestro pueblo
  lexicon: LSJ
  rationale: El griego usa ἀδελφοί, término de parentesco directo. «Nuestros hermanos» conserva esa fuerza fraterna y sigue la decisión inglesa de no neutralizarla.
- source_word: οἱ ὄντες ἐν τοῖς Τουβίου
  english_pob_choice: who are in the region of Tob
  chosen_spanish: que están en la región de Tob
  alternatives_spanish:
  - que están en Tob
  - que están entre los tobianos
  - que habitan en Tob
  lexicon: LSJ
  rationale: La construcción apunta a una ubicación asociada con Tob/Tobías. «Región de Tob» transmite mejor el valor locativo sin convertirlo en etnónimo.
- source_word: τεθανάτωνται
  english_pob_choice: have been killed
  chosen_spanish: han sido muertos
  alternatives_spanish:
  - han sido asesinados
  - han muerto
  - han perecido
  lexicon: LSJ
  rationale: El perfecto expresa un estado resultante de muerte violenta. En español, «han sido muertos» conserva la pasividad y la violencia del contexto bélico.
- source_word: αἰχμαλωτίκασι
  english_pob_choice: have taken ... captive
  chosen_spanish: han llevado cautivas
  alternatives_spanish:
  - han tomado cautivas
  - han hecho cautivas
  - han llevado en cautiverio
  lexicon: LSJ
  rationale: El verbo expresa captura en guerra. «Han llevado cautivas» es natural en español y mantiene el sentido de traslado al cautiverio.
- source_word: τὰς γυναῖκας αὐτῶν καὶ τὰ τέκνα αὐτῶν
  english_pob_choice: their wives and children
  chosen_spanish: a sus mujeres y a sus hijos
  alternatives_spanish:
  - a sus esposas y a sus hijos
  - a sus mujeres y niños
  - a sus esposas y sus hijos
  lexicon: LSJ
  rationale: Se conserva el paralelo directo del griego. «Mujeres» evita introducir un término más interpretativo que «esposas» y mantiene la formulación del texto fuente.
- source_word: τὴν ὑποσκευήν
  english_pob_choice: their possessions
  chosen_spanish: sus posesiones
  alternatives_spanish:
  - su bagaje
  - sus bienes
  - su equipaje
  lexicon: LSJ
  rationale: ὑποσκευήν puede significar bagaje, equipo o bienes muebles. «Posesiones» recoge el sentido general adoptado en la revisión inglesa sin limitarlo a equipaje.
- source_word: ἀπώλεσαν
  english_pob_choice: have destroyed
  chosen_spanish: han destruido
  alternatives_spanish:
  - han matado
  - han aniquilado
  - han arruinado
  lexicon: LSJ
  rationale: El verbo puede significar destruir o arruinar. Se mantiene «han destruido» para seguir de cerca el griego y la solución inglesa revisada.
- source_word: ὡς μίαν χιλιάδα ἀνδρῶν
  english_pob_choice: about one thousand men
  chosen_spanish: como a mil hombres
  alternatives_spanish:
  - unos mil hombres
  - aproximadamente mil hombres
  - cerca de mil hombres
  lexicon: LSJ
  rationale: ὡς con numeral indica aproximación. «Como a mil hombres» reproduce esa idea de modo idiomático en español.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó ὑποσκευήν de 'goods' a 'possessions', eliminó una repetición de 'their' y armonizó el tiempo verbal de ἀπώλεσαν con los perfectos previos. La traducción española refleja esa dirección con «posesiones» y con el perfecto «han destruido».
  spanish_consistency_notes:
  - Se mantuvo «Y» al inicio para corresponder al encadenamiento narrativo del griego.
  - Se evitó «SEÑOR» o fórmulas tradicionales ajenas al texto, porque no hay un término divino en este versículo.
  - Se conservó el plural masculino inclusivo «hermanos» siguiendo la decisión POB sobre ἀδελφοί.
  - Se prefirió «han sido muertos» por encima de «han muerto» para no diluir la violencia del pasaje.
