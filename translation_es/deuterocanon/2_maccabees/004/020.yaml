    rationale: Dado el objetivo de español eclesial amplio y moderno, «preparación» suena más natural y sigue cubriendo el valor de κατασκευάς documentado en la auditoría.
  - severity: low
    issue: La coma tras «presentes» no es necesaria.
    rationale: La frase fluye mejor sin pausa en español en esta construcción breve.
