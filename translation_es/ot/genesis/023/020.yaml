translation:
  language: es
  text: Así, el campo y la cueva que estaba en él quedaron legalmente en posesión de Abraham como posesión para sepultura[a], de los hijos de Het[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «como propiedad de sepultura» o «como heredad de sepultura»; el hebreo implica una tenencia legal, no solo un lugar para enterrar.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «los heteos» o «los hititas»; el hebreo dice literalmente «los hijos de Het».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: were deeded
  chosen_spanish: fueron adjudicados
  alternatives_spanish:
  - fueron transferidos
  - fueron establecidos
  - pasaron a ser
  lexicon: HALOT
  rationale: En este contexto jurídico-comercial, קום no se traduce de manera mecánica como ‘se levantó’, sino con un verbo español que exprese el traspaso formal de propiedad. ‘Fueron adjudicados’ conserva el matiz legal sin perder naturalidad en español.
- source_word: הַשָּׂדֶה
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - el campo agrícola
  - la parcela
  - el terreno
  lexicon: HALOT
  rationale: ‘Campo’ reproduce el sustantivo hebreo de forma directa y clara en español, sin añadir precisión no sustentada por el texto.
- source_word: וְהַמְּעָרָה אֲשֶׁר בּוֹ
  english_pob_choice: and the cave that was in it
  chosen_spanish: y la cueva que estaba en él
  alternatives_spanish:
  - y la cueva que había en él
  - y la cueva dentro de él
  lexicon: HALOT
  rationale: Se conserva la cláusula relativa y el pronombre que remite al campo. ‘En él’ sigue el referente masculino del hebreo; ‘cueva’ traduce מְעָרָה con el sustantivo español más natural.
- source_word: לְאַבְרָהָם
  english_pob_choice: to Abraham
  chosen_spanish: a Abraham
  alternatives_spanish:
  - para Abraham
  lexicon: HALOT
  rationale: La preposición española ‘a’ expresa con naturalidad el destinatario de la adjudicación legal.
- source_word: לַאֲחֻזַּת קָבֶר
  english_pob_choice: as a burial property
  chosen_spanish: como propiedad de sepultura
  alternatives_spanish:
  - como posesión para sepultura
  - como heredad de sepultura
  - como propiedad funeraria
  lexicon: HALOT
  rationale: אֲחֻזָּה señala una posesión o tenencia con peso legal. ‘Propiedad de sepultura’ conserva ese valor patrimonial y funerario, evitando reducirlo a un simple ‘sitio de entierro’.
- source_word: מֵאֵת
  english_pob_choice: from
  chosen_spanish: por parte de
  alternatives_spanish:
  - de
  - desde
  lexicon: HALOT
  rationale: En una transacción, el marcador de origen se expresa mejor en español como ‘por parte de’ para señalar claramente a los vendedores u otorgantes sin oscurecer la fuerza legal del texto.
- source_word: בְּנֵי חֵת
  english_pob_choice: the sons of Heth
  chosen_spanish: los hijos de Het
  alternatives_spanish:
  - los heteos
  - los hititas
  lexicon: HALOT
  rationale: Se preserva la forma hebrea transparente ‘hijos de Het’, que sigue de cerca el texto fuente. Las equivalencias etnónimas más interpretativas se reservan como alternativas, no como texto principal.
theological_decisions:
- issue: Naturaleza legal de la adquisición
  english_pob_reading: were deeded ... as a burial property
  chosen_spanish_reading: fueron adjudicados ... como propiedad de sepultura
  alternative_spanish_readings:
  - fueron transferidos ... como propiedad de sepultura
  - fue establecido ... como posesión de sepultura
  rationale: La acción no describe un hecho meramente físico sino una transferencia legal de posesión. ‘Adjudicados’ mantiene el sentido jurídico sin borrar la solemnidad narrativa del hebreo.
  doctrine_reference: Derecho de propiedad en narrativa patrimonial; lenguaje jurídico del Pentateuco
- issue: Traducción del etnónimo
  english_pob_reading: the sons of Heth
  chosen_spanish_reading: los hijos de Het
  alternative_spanish_readings:
  - los heteos
  - los hititas
  rationale: Se conserva la denominación genealógica del hebreo para no sustituirla por una etiqueta etnográfica posterior sin necesidad textual. La alternativa etnónima queda como opción de equivalencia contextual.
  doctrine_reference: Transparencia textual y onomástica del Pentateuco
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB en inglés al reflejar el tono legal de ‘were deeded’ con una opción española igualmente jurídica. Se evitó una traducción mecánica de ‘rose’/‘stood’ porque el contexto de compra-venta exige transferencia de propiedad. También se preservó la cláusula relativa del hebreo con referencia masculina coherente a ‘el campo’.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y digno, evitando arcaísmos innecesarios.
  - Se preservó la transparencia del etnónimo hebreo ‘hijos de Het’ en el texto principal.
  - Se usó ‘cueva’ y no ‘gruta’ por ser más neutral y bíblicamente natural en español.
  - La lectura jurídica se expresó con vocabulario comprensible para lectores eclesiales sin perder precisión legal.
