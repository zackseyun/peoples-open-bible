    rationale: 'La nota d dice ''O: como en el día de Masá'', pero esa es precisamente la redacción ya usada en el texto. La nota debe reflejar la alternativa documentada, equivalente a ''O: como en el día en Masá'' o bien reformularse como variante previa, no repetir el texto principal.'
  revised_spanish_text: No endurezcan sus corazones[a][b][c][d], como en Meribá, como en el día en Masá en el desierto.
