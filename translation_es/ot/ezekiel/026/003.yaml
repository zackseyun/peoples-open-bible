translation:
  language: es
  text: 'Por tanto, así dice el Señor, Yahvé[a]: «He aquí, yo estoy contra ti, Tiro, y haré subir contra ti muchas naciones, como el mar hace subir sus olas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mi Señor, YHWH» (אֲדֹנָי יְהוִה). En español se conserva el título «Señor» para אֲדֹנָי y el nombre divino «Yahvé» para יְהוִה.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: La partícula inferencial introduce una conclusión de juicio; «Por tanto» mantiene el enlace lógico formal y es natural en español bíblico contemporáneo.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así ha dicho
  - esto dice
  lexicon: HALOT
  rationale: Fórmula profética de mensajero. «Así dice» conserva el tono solemne y la equivalencia funcional sin sonar artificial.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: HALOT
  rationale: Se preservan ambos títulos divinos con «Señor» para אֲדֹנָי y «Yahvé» para יְהוִה, conforme al criterio español del proyecto que nombra el Tetragrama en vez de enmascararlo.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Aquí estoy
  lexicon: HALOT
  rationale: La partícula deíctica intensifica el anuncio divino; «He aquí» reproduce bien el tono solemne y reconocible del hebreo profético.
- source_word: עָלַיִךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  lexicon: HALOT
  rationale: En contexto judicial y hostil, la preposición expresa oposición, no solo ubicación. «Contra ti» explicita ese valor adversativo.
- source_word: צֹר
  english_pob_choice: Tyre
  chosen_spanish: Tiro
  alternatives_spanish:
  - Tiro
  - Tir
  lexicon: HALOT
  rationale: Nombre propio de la ciudad; «Tiro» es la forma establecida y plenamente comprensible en español.
- source_word: וְהַעֲלֵיתִי
  english_pob_choice: I will bring up
  chosen_spanish: haré subir
  alternatives_spanish:
  - traeré
  - haré venir
  lexicon: HALOT
  rationale: El hiphil de עלה conserva la imagen de hacer ascender/mover hacia arriba. «Haré subir» mantiene la metáfora y enlaza con la comparación de las olas.
- source_word: גּוֹיִם רַבִּים
  english_pob_choice: many nations
  chosen_spanish: muchas naciones
  alternatives_spanish:
  - muchos pueblos
  lexicon: HALOT
  rationale: «Naciones» refleja con precisión el uso de גּוֹיִם en un marco internacional y militar.
- source_word: כְּהַעֲלוֹת הַיָּם לְגַלָּיו
  english_pob_choice: as the sea brings up its waves
  chosen_spanish: como el mar hace subir sus olas
  alternatives_spanish:
  - como el mar levanta sus olas
  - como el mar alza sus olas
  lexicon: HALOT
  rationale: La comparación preserva el movimiento repetido y la imagen marítima; «hace subir» mantiene el paralelismo verbal con וְהַעֲלֵיתִי y sugiere el avance sucesivo de las naciones.
theological_decisions:
- issue: Traducción del Tetragrama dentro del título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: La fuente hebrea contiene el nombre divino explícito y no solo un título genérico. En el español del proyecto se prefiere «Yahvé» para YHWH, preservando la distinción entre el título אדני y el nombre propio divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia entre la fuente hebrea, la traducción inglesa de referencia y la revisión más reciente, sin cambios requeridos en el pase final. La única decisión destacable para el español es el tratamiento del compuesto divino אֲדֹנָי יְהוִה con el nombre propio «Yahvé».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para YHWH.
  - «Señor» se usa para אֲדֹנָי como título, sin fusionarlo con el nombre divino.
  - Se eligió «Tiro» como forma española estable del topónimo.
  - La imagen de las olas se conservó con un verbo paralelo a «haré subir» para reflejar la repetición del hebreo.
