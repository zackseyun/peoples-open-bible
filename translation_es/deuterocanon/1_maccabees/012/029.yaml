translation:
  language: es
  text: Pero Jonatán y los que estaban con él no lo supieron hasta la mañana[a], porque veían los fuegos ardiendo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «las luces ardiendo». En contexto, probablemente se refiere a fuegos dejados encendidos en el campamento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἔγνωσαν
  english_pob_choice: did not know
  chosen_spanish: no lo supieron
  alternatives_spanish:
  - no lo sabían
  - no se dieron cuenta
  lexicon: BDAG
  rationale: El griego expresa una negación simple de conocer/saber. «No lo supieron» conserva esa fuerza sin añadir matices explicativos que no están en el texto.
- source_word: ἕως πρωί
  english_pob_choice: until morning
  chosen_spanish: hasta la mañana
  alternatives_spanish:
  - hasta el amanecer
  - hasta por la mañana
  lexicon: LSJ
  rationale: La expresión marca el límite temporal de su desconocimiento. «Hasta la mañana» es natural en español y mantiene el valor directo de la frase.
- source_word: ἔβλεπον
  english_pob_choice: they saw
  chosen_spanish: veían
  alternatives_spanish:
  - vieron
  - estaban viendo
  lexicon: BDAG
  rationale: El imperfecto da trasfondo a la explicación; «veían» conserva mejor esa duración que un pretérito puntual, sin sonar forzado en español.
- source_word: τὰ φῶτα
  english_pob_choice: the fires
  chosen_spanish: los fuegos
  alternatives_spanish:
  - las luces
  - las hogueras
  lexicon: LSJ
  rationale: Aunque literalmente es «las luces», en este contexto nocturno y militar el referente visible son fuegos encendidos. «Los fuegos» mantiene la ambigüedad controlada del griego mejor que una especificación más interpretativa.
- source_word: καιόμενα
  english_pob_choice: burning
  chosen_spanish: ardiendo
  alternatives_spanish:
  - encendidos
  - quemándose
  lexicon: BDAG
  rationale: El participio describe el estado visible de los fuegos. «Ardiendo» reproduce bien esa imagen y suena natural en español.
- source_word: οἱ παρʼ αὐτοῦ
  english_pob_choice: those with him
  chosen_spanish: los que estaban con él
  alternatives_spanish:
  - sus compañeros
  - los que iban con él
  lexicon: LSJ
  rationale: La frase designa al grupo acompañante de Jonatán. «Los que estaban con él» es fiel y evita introducir una categoría más específica que el griego no exige.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden plenamente en el sentido básico. La principal decisión en español fue conservar el valor aspectual del imperfecto con «veían» y mantener la referencia contextual de τὰ φῶτα como «los fuegos», siguiendo la nota inglesa sobre el posible sentido literal de «las luces ardiendo» en un entorno de campamento.
  spanish_consistency_notes:
  - Se mantiene «Jonatán» para Ἰωναθάν y «hasta la mañana» para ἕως πρωί, en línea con una dicción bíblica moderna y clara.
  - «Los que estaban con él» evita el matiz más militar de «sus hombres», alineándose con la cautela del POB inglés.
  - Se evita «SEÑOR» y cualquier terminología teológica no presente en el versículo.
