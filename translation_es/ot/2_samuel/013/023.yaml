translation:
  language: es
  text: Y aconteció que, después de dos años completos, Absalón tenía esquiladores de ovejas en Baal-hazor[a], que estaba cerca de Efraín, y Absalón invitó a todos los hijos del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «después de dos años de días», un modismo que indica un período completo de dos años.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce un nuevo episodio. «Y aconteció» conserva el giro de transición sin sonar tan rígido como un calco literal de «Now it happened».
- source_word: לִשְׁנָתַיִם יָמִים
  english_pob_choice: after two full years
  chosen_spanish: después de dos años completos
  alternatives_spanish:
  - al cabo de dos años
  - después de dos años
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y señala un período plenamente transcurrido. «Dos años completos» comunica esa idea sin perder la fuerza temporal del original.
- source_word: גֹזְזִים
  english_pob_choice: sheep shearers
  chosen_spanish: esquiladores de ovejas
  alternatives_spanish:
  - trasquiladores de ovejas
  - esquiladores
  lexicon: HALOT
  rationale: En este contexto participial, el sentido es el de personas que esquilan ovejas. «Esquiladores de ovejas» mantiene la referencia explícita que el contexto requiere.
- source_word: בְּבַעַל חָצוֹר
  english_pob_choice: at Baal-hazor
  chosen_spanish: en Baal-hazor
  alternatives_spanish:
  - en el lugar llamado Baal-hazor
  - a Baal-hazor
  lexicon: HALOT
  rationale: Se trata de un topónimo transliterado. «En» expresa mejor ubicación de evento en español que «a»; se preserva el nombre propio sin normalizarlo.
- source_word: אֲשֶׁר עִם אֶפְרָיִם
  english_pob_choice: which is near Ephraim
  chosen_spanish: que está cerca de Efraín
  alternatives_spanish:
  - que está junto a Efraín
  - que está con Efraín
  lexicon: HALOT
  rationale: La preposición עִם aquí funciona de cercanía geográfica. «Cerca de Efraín» refleja la relación espacial sin forzar el hebreo con un literalismo poco natural.
- source_word: וַיִּקְרָא
  english_pob_choice: invited
  chosen_spanish: invitó
  alternatives_spanish:
  - llamó
  - convocó
  lexicon: HALOT
  rationale: Aunque el verbo base es «llamar», el contexto de un banquete/esquila indica una invitación. «Invitó» reproduce la fuerza pragmática que la POB inglesa ya identificó.
- source_word: לְכָל בְּנֵי הַמֶּלֶךְ
  english_pob_choice: all the king’s sons
  chosen_spanish: a todos los hijos del rey
  alternatives_spanish:
  - a todos los hijos del monarca
  - a todos los hijos del rey
  lexicon: HALOT
  rationale: La construcción posesiva se expresa con naturalidad en español como «los hijos del rey». Se conserva el alcance inclusivo de «todos».
theological_decisions:
- issue: Valor idiomático del marcador temporal inicial
  english_pob_reading: Now it happened after two full years
  chosen_spanish_reading: Y aconteció que, después de dos años completos
  alternative_spanish_readings:
  - Y sucedió que, al cabo de dos años
  - Y aconteció después de dos años
  rationale: 'No hay una tensión doctrinal, pero sí una decisión de estilo narrativo con valor interpretativo: el hebreo marca un cambio de escena y un período plenamente cumplido. Mantener la secuencia ayuda a leer la narración como episodio encadenado, no como frase suelta.'
  doctrine_reference: Narrative sequencing; no doctrinal issue
- issue: Cercanía geográfica de Efraín
  english_pob_reading: which is near Ephraim
  chosen_spanish_reading: que está cerca de Efraín
  alternative_spanish_readings:
  - que está junto a Efraín
  - que está con Efraín
  rationale: La frase evita una traducción mecánica de עִם como «con», que en español podría sonar relacional en vez de geográfica. «Cerca de» expresa la relación espacial asumida por la tradición de traducción de la POB y por el contexto narrativo.
  doctrine_reference: Geographical reference; no doctrinal issue
translation_notes:
  revision_awareness: 'El texto base inglés fue revisado y quedó sin cambios (latest_revision_pass: unchanged). No se detectaron variaciones textuales ni revisiones posteriores que requirieran adaptar la lectura española; la versión sigue de cerca el acuerdo alto del auditor con la elección inglesa existente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se conserva la transliteración de topónimos («Baal-hazor», «Efraín») y no se los traduce.
  - «Invitó» sigue la fuerza contextual reconocida por la POB inglesa; no se reemplaza por «llamó» para evitar ambigüedad.
  - «Esquiladores de ovejas» explicita el objeto implícito del participio hebreo y su contexto festivo.
  - La nota al pie a documenta el modismo temporal sin recargar el cuerpo del texto.
