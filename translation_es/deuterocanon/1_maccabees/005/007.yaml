translation:
  language: es
  text: Y sostuvo muchos combates contra ellos, y fueron aplastados delante de él, y los abatió.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συνῆψεν
  english_pob_choice: engaged
  chosen_spanish: sostuvo
  alternatives_spanish:
  - entabló
  - empeñó
  lexicon: LSJ
  rationale: El verbo griego en contexto militar expresa entrar en combate o trabar acción bélica. «Sostuvo» conserva la idea de mantener combates sin sonar tan calco como «engañó» o tan técnico como «entabló»; «entabló» también sería posible.
- source_word: πρὸς αὐτοὺς
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - frente a ellos
  - en oposición a ellos
  lexicon: LSJ
  rationale: La preposición con acusativo tiene aquí valor hostil. «Contra ellos» expresa con naturalidad la oposición militar que el contexto exige.
- source_word: πολέμους πολλούς
  english_pob_choice: many battles
  chosen_spanish: muchos combates
  alternatives_spanish:
  - muchas batallas
  - muchas guerras
  lexicon: LSJ
  rationale: Aunque el plural puede referirse a guerras o batallas, en esta secuencia narrativa de enfrentamientos concretos «combates» funciona bien en español. «Batallas» también es válido; «guerras» sobredimensiona el alcance.
- source_word: συνετρίβησαν
  english_pob_choice: were crushed
  chosen_spanish: fueron aplastados
  alternatives_spanish:
  - fueron quebrantados
  - fueron destrozados
  lexicon: LSJ
  rationale: El pasivo de συντρίβω comunica derrota total y ruptura. «Fueron aplastados» mantiene la fuerza del golpe militar y es natural en español actual.
- source_word: πρὸ προσώπου αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en su presencia
  lexicon: LSJ
  rationale: La expresión idiomática indica derrota en su presencia o ante su avance. «Delante de él» preserva el sentido sin volverlo rígidamente literal.
- source_word: ἐπάταξεν
  english_pob_choice: struck them down
  chosen_spanish: los derrotó
  alternatives_spanish:
  - los hirió
  - los golpeó
  lexicon: LSJ
  rationale: Aunque el verbo significa literalmente golpear o herir, en este contexto militar el resultado es derrota decisiva. «Los derrotó» comunica ese desenlace con claridad en español, sin perder la violencia implícita del verbo.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió una formulación más natural para συνῆψεν πρὸς αὐτοὺς πολέμους πολλούς. Se evitó calcar «unió/juntó muchas guerras»; en español se optó por una expresión bélica idiomática y publicación-readable.
  spanish_consistency_notes:
  - Se mantiene el tratamiento narrativo en pasado simple, coherente con el estilo histórico del libro.
  - Se evitó «SEÑOR» o terminología teológica no presente en el versículo.
  - «Aplastados» conserva la metáfora de derrota total sin introducir un sentido doctrinal ajeno al texto.
