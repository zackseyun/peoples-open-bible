  text: וְ/דִבַּרְתָּ֨ אֵלָ֜י/ו לֵ/אמֹ֗ר כֹּ֚ה אָמַ֣ר יְהוָ֔ה הֲ/רָצַ֖חְתָּ וְ/גַם יָרָ֑שְׁתָּ וְ/דִבַּרְתָּ֨ אֵלָ֜י/ו לֵ/אמֹ֗ר כֹּ֚ה אָמַ֣ר יְהוָ֔ה בִּ/מְק֗וֹם אֲשֶׁ֨ר לָקְק֤וּ הַ/כְּלָבִים֙ אֶת דַּ֣ם נָב֔וֹת יָלֹ֧קּוּ הַ/כְּלָבִ֛ים אֶת דָּמְ/ךָ֖ גַּם אָֽתָּה־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_kings/021/019.yaml
  text: 'And you shall speak to him[a], saying, ‘Thus says Yahweh: Have you murdered and also taken possession?’ And you shall speak to him, saying, ‘Thus says Yahweh: In the place where the dogs licked the blood of Naboth[b], the dogs shall lick your blood—you also.’'
  footnotes:
  - marker: a
    text: Or, 'Have you killed and also taken possession?' The Hebrew verb can be rendered more broadly as 'kill,' but here likely carries the stronger sense 'murder.'
    reason: lexical_alternative
  - marker: b
    text: The final words 'you also' are emphatic in Hebrew, underscoring that the same disgrace that befell Naboth will come upon Ahab himself.
    reason: lexical_alternative
