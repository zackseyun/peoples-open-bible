translation:
  language: es
  text: En el segundo año del reinado de Artajerjes, el gran rey, el primer día de Nisán[a], Mardoqueo, hijo de Jaír, hijo de Simeí, hijo de Cis, de la tribu de Benjamín, tuvo un sueño[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre del mes aparece en griego como Nisa; aquí se vierte como Nisán, la forma estándar en español del nombre del mes judío.
    reason: cultural_note
  - marker: b
    text: El griego dice literalmente “vio un sueño”; en español se vierte de manera idiomática como “tuvo un sueño”.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτους δευτέρου βασιλεύοντος
  english_pob_choice: In the second year of the reign
  chosen_spanish: En el segundo año del reinado
  alternatives_spanish:
  - En el segundo año, mientras reinaba
  - En el segundo año de la realeza
  lexicon: LSJ
  rationale: La fórmula de datación se vierte naturalmente en español como una expresión temporal con ‘el segundo año del reinado’, que conserva el valor cronológico del griego sin sonar forzado.
- source_word: Ἀρταξέρξου
  english_pob_choice: Artaxerxes
  chosen_spanish: Artajerjes
  alternatives_spanish:
  - Artaxerxes
  lexicon: Transliteración histórica corriente
  rationale: En español bíblico y académico, ‘Artajerjes’ es la forma asentada y clara para el nombre real persa.
- source_word: τοῦ μεγάλου βασιλέως
  english_pob_choice: the great king
  chosen_spanish: el gran rey
  alternatives_spanish:
  - el gran Rey
  - el poderoso rey
  lexicon: LSJ
  rationale: ‘Gran rey’ reproduce el epíteto real sin añadir matices no presentes en el griego. Mantengo el orden natural del español.
- source_word: τῇ μιᾷ τοῦ Νεισὰ
  english_pob_choice: on the first day of Nisan
  chosen_spanish: el primer día de Nisán
  alternatives_spanish:
  - el día primero de Nisán
  - el primero de Nisán
  lexicon: LSJ
  rationale: La expresión griega indica el primer día del mes; ‘Nisán’ es la forma española estándar del nombre del mes.
- source_word: ἐνύπνιον εἶδεν
  english_pob_choice: saw a dream
  chosen_spanish: tuvo un sueño
  alternatives_spanish:
  - vio un sueño
  - soñó
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente ‘vio un sueño’, en español la forma más natural y fiel es ‘tuvo un sueño’. Preserva el hecho de la experiencia sin calcar una construcción poco idiomática.
- source_word: Μαρδοχαῖος ὁ τοῦ Ἰαείρου, τοῦ Σεμεείου τοῦ Κεισαίου
  english_pob_choice: Mordecai son of Jair, son of Shimei, son of Kish
  chosen_spanish: Mardoqueo, hijo de Jaír, hijo de Simeí, hijo de Cis
  alternatives_spanish:
  - Mardoqueo hijo de Jaír, hijo de Simeí, hijo de Cis
  - Mardoqueo, el hijo de Jaír, hijo de Simeí, hijo de Cis
  lexicon: Genealogical formula
  rationale: La cadena genealógica se expresa con ‘hijo de’ para hacer explícita la relación de ascendencia, como hace la tradición textual griega.
- source_word: ἐκ φυλῆς Βενιαμείν
  english_pob_choice: of the tribe of Benjamin
  chosen_spanish: de la tribu de Benjamín
  alternatives_spanish:
  - de entre la tribu de Benjamín
  - perteneciente a la tribu de Benjamín
  lexicon: LSJ
  rationale: ‘De la tribu de’ es la fórmula genealógica natural en español y conserva la pertenencia tribal del original.
theological_decisions:
- issue: Tratamiento del título real 'el gran rey' en contexto persa
  english_pob_reading: the great king
  chosen_spanish_reading: el gran rey
  alternative_spanish_readings:
  - el gran Rey
  - el poderoso rey
  rationale: No se espiritualiza ni se convierte en título divino; se mantiene como epíteto político-histórico del monarca persa, tal como lo presenta el texto griego.
  doctrine_reference: Soberanía histórica y precisión referencial del texto bíblico; no aplica una doctrina específica, sino fidelidad al contexto imperial.
translation_notes:
  revision_awareness: 'El griego de Swete coincide con el audit trail inglés en los elementos clave: datación regnal, nombre del mes, genealogía de Mardoqueo y la expresión del sueño. No se registran revisiones aplicadas en el contexto inglés; por ello la propuesta sigue de cerca la misma estructura y mantiene las decisiones lexicales auditadas, ajustando solo la idiomaticidad natural del español.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como forma preferente del nombre divino en el proyecto, pero este versículo no contiene el tetragrámaton ni una referencia explícita a Dios.
  - ‘Artajerjes’ se adopta como transliteración española estable y coherente con uso bíblico en español.
  - ‘Nisán’ sigue la forma española estándar del mes hebreo, paralela a la decisión inglesa de usar ‘Nisan’.
  - La genealogía mantiene ‘hijo de’ repetido para transparencia sintáctica y auditabilidad.
