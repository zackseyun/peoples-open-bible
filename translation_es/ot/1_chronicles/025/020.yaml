translation:
  language: es
  text: El decimotercero[a], Shubael; sus hijos y sus hermanos, doce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: "Para el decimotercero, Shubael". La palabra "suerte" está implícita por el contexto de los versículos circundantes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁלֹשָׁה עָשָׂר
  english_pob_choice: The thirteenth
  chosen_spanish: Para el decimotercero
  alternatives_spanish:
  - El decimotercero
  - Para el decimotercer turno
  - El decimotercero, Shubael
  lexicon: HALOT
  rationale: El prefijo ל expresa asignación o destino en la serie de suertes/turnos del contexto. En español, "para" comunica mejor esa idea que una simple frase nominal, sin añadir "suerte" en el texto principal porque no aparece explícitamente en este verso y queda implícita por el contexto inmediato.
- source_word: שׁוּבָאֵל
  english_pob_choice: Shubael
  chosen_spanish: Shubael
  alternatives_spanish:
  - Shuba'el
  lexicon: Transliteración estándar
  rationale: Es un nombre propio y se translitera de forma conservadora, manteniendo la forma reconocible y no traduciéndolo.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus descendientes
  lexicon: HALOT
  rationale: El hebreo dice literalmente "sus hijos"; en español, "hijos" comunica tanto el valor filial como el masculino colectivo del contexto. Se evita "descendientes" porque suaviza la precisión lexical del término.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus hermanos de clan
  lexicon: HALOT
  rationale: La forma base significa "hermanos". Aunque el contexto organizativo puede ampliar la referencia, el texto hebreo no exige una paráfrasis más amplia, por lo que se conserva la relación fraterna de manera directa.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - eran doce
  - doce en total
  lexicon: HALOT
  rationale: Como en el inglés auditado, el número funciona en aposición y puede cerrarse tersamente con "doce". Añadir un verbo no está exigido por el hebreo y rompería el estilo enumerativo del pasaje.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa están en alto acuerdo y no muestran cambios revisionales relevantes; se mantiene la solución sobria del original, conservando la estructura enumerativa y la implicatura contextual de la suerte/turno sin sobreexplicarla en el cuerpo del verso.
  spanish_consistency_notes:
  - Se conserva la transliteración "Shubael" de modo uniforme.
  - '"Hijos" traduce בָּנָיו sin ampliar a "descendientes".'
  - La nota [a] marca la alternativa de lectura implícita por contexto, en línea con la auditoría inglesa.
  - Se evita introducir "Cristo", "Señor" u այլ terminología no presente en el verso.
