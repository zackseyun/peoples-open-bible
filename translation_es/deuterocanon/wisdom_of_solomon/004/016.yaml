translation:
  language: es
  text: Pero el justo[a], aunque haya muerto, condenará a los impíos que viven; y la juventud[b] llevada a término rápidamente condenará la larga vejez del injusto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de haber muerto» o «habiendo muerto». El participio griego puede traducirse de manera más literal, pero el texto principal expresa la idea en español natural.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la juventud hecha perfecta rápidamente». El griego también puede verterse con lenguaje de «perfección», pero el texto principal usa «llevada a término» para no sobrecargar la frase.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατακρινεῖ
  english_pob_choice: will condemn
  chosen_spanish: condenará
  alternatives_spanish:
  - juzgará en contra
  - pronunciará condena sobre
  lexicon: BDAG
  rationale: El futuro de κατακρίνω expresa condena o sentencia adversa; en español, «condenará» es directo, natural y conserva la fuerza forense del verbo.
- source_word: δίκαιος
  english_pob_choice: the righteous one
  chosen_spanish: el justo
  alternatives_spanish:
  - el hombre justo
  - el recto
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivamente y señala a una persona justa. «El justo» preserva la singularidad sin añadir género innecesario y es idiomático en español bíblico actual.
- source_word: καμὼν
  english_pob_choice: though dead
  chosen_spanish: aunque haya muerto
  alternatives_spanish:
  - después de morir
  - habiendo muerto
  lexicon: BDAG
  rationale: El participio aquí tiene sentido concesivo en el contexto. «Aunque haya muerto» expresa bien la concesión en español y evita una traducción demasiado mecánica.
- source_word: τοὺς ζῶντας ἀσεβεῖς
  english_pob_choice: the living ungodly
  chosen_spanish: a los impíos que viven
  alternatives_spanish:
  - a los impíos vivos
  - a los impíos que están vivos
  lexicon: BDAG
  rationale: «Impíos» rinde ἀσεβεῖς con la carga religiosa adecuada. La construcción «que viven» conserva el contraste con el justo muerto y suena más natural que un calco más áspero.
- source_word: νεότης
  english_pob_choice: youth
  chosen_spanish: la juventud
  alternatives_spanish:
  - la edad joven
  - la joven edad
  lexicon: LSJ
  rationale: νεότης denota juventud o edad joven. «La juventud» es la equivalencia normal en español y mantiene el paralelismo con «vejez».
- source_word: τελεσθεῖσα
  english_pob_choice: brought to completion
  chosen_spanish: llevada a término
  alternatives_spanish:
  - llevada a cumplimiento
  - hecha perfecta
  lexicon: BDAG
  rationale: La idea central es llegar a su término o plenitud. «Llevada a término» preserva el matiz teleológico sin imponer «perfección» en sentido moral.
- source_word: ταχέως
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - pronto
  - velozmente
  lexicon: BDAG
  rationale: Adverbio de rapidez; «rápidamente» es claro y mantiene el contraste temporal del verso.
- source_word: πολυετές
  english_pob_choice: many-year old
  chosen_spanish: larga
  alternatives_spanish:
  - de muchos años
  - muy prolongada
  lexicon: LSJ
  rationale: El adjetivo literalmente indica «de muchos años». En español, aplicado a «vejez», «larga» comunica la extensión temporal de manera natural sin perder el contraste.
- source_word: γῆρας
  english_pob_choice: old age
  chosen_spanish: vejez
  alternatives_spanish:
  - ancianidad
  - edad avanzada
  lexicon: LSJ
  rationale: γῆρας significa vejez/edad avanzada. «Vejez» es la equivalencia más directa y transparente.
- source_word: ἀδίκου
  english_pob_choice: of the unrighteous
  chosen_spanish: del injusto
  alternatives_spanish:
  - del impío
  - del inicuo
  lexicon: BDAG
  rationale: El genitivo califica la vejez como perteneciente a una persona injusta. «Injusto» mantiene la continuidad léxica con «justo» en la primera cláusula.
theological_decisions:
- issue: Cómo reflejar el valor concesivo de καμών
  english_pob_reading: though dead
  chosen_spanish_reading: aunque haya muerto
  alternative_spanish_readings:
  - después de morir
  - habiendo muerto
  rationale: El contexto de Sabiduría 4 contrasta la muerte temprana del justo con la suerte de los impíos vivos. La concesión en español hace explícito ese contraste sin alterar el sentido del participio.
  doctrine_reference: Preservar la tensión literaria y teológica del texto sapiencial; primacía del original sobre la tradición de traducción.
- issue: Si τελεσθεῖσα debe sonar a «perfección»
  english_pob_reading: brought to completion
  chosen_spanish_reading: llevada a término
  alternative_spanish_readings:
  - hecha perfecta
  - llevada a cumplimiento
  rationale: «Hecha perfecta» puede sugerir una idea moral o doctrinal más fuerte de la que el griego exige aquí. «Llevada a término» conserva la idea de plenitud/completud y encaja con la imagen de una vida breve pero acabada.
  doctrine_reference: No resolver la ambigüedad con lenguaje tradicional si la fuente permite un matiz más amplio.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del contexto inglés, que añadió el matiz concesivo de καμών y repitió el verbo «will condemn» en la segunda cláusula para reflejar mejor el paralelismo. La versión española refleja ese paralelismo con un solo verbo explícito en ambas cláusulas por naturalidad sintáctica.
  spanish_consistency_notes:
  - Se mantiene el par léxico justo/injusto para reflejar la oposición δίκαιος/ἀδίκου.
  - Se usa impíos para ἀσεβεῖς, coherente con el registro bíblico y con la falta de piedad implícita en Sabiduría.
  - Se evita «Cristo» y terminología eclesial no presente en el versículo.
  - La estructura conserva el paralelismo entre la primera y la segunda mitad del verso.
  - Los corchetes de notas se colocan solo donde hay alternativas relevantes en el texto principal.
