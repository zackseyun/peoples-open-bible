translation:
  language: es
  text: Y el nombre de la mujer midianita que fue abatida era Cozbi, hija de Zur[a], quien era cabeza de los clanes[b] de una casa paterna[c] en Madián.
  philosophy: formal
  footnotes:
  - marker: a
    text: 'O: «hija de Tzur».'
    reason: alternative_transliteration
  - marker: b
    text: 'O: «los pueblos». El hebreo puede referirse a pueblos o, en este contexto de parentesco, a grupos de clan.'
    reason: lexical_alternative
  - marker: c
    text: Hebreo «casa paterna», un término de parentesco para una familia extensa o casa ancestral.
    reason: cultural_note
lexical_decisions:
- source_word: וְשֵׁם
  english_pob_choice: And the name
  chosen_spanish: Y el nombre
  alternatives_spanish:
  - Ahora el nombre
  lexicon: HALOT
  rationale: Conservo la conjunción narrativa y el sustantivo en forma directa; 'Y' mantiene la continuidad hebrea sin forzar un giro más explicativo.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: HALOT
  rationale: El hebreo designa simplemente a la mujer mencionada; 'mujer' es la opción precisa y natural en español.
- source_word: הַמֻּכָּה
  english_pob_choice: who was struck down
  chosen_spanish: que fue herida de muerte
  alternatives_spanish:
  - que fue golpeada
  - que fue muerta
  lexicon: HALOT
  rationale: El participio pasivo de נכה conserva la idea de una acción letal sin añadir más de lo que el participio por sí mismo exige. 'Herida de muerte' comunica el resultado mortal en español con naturalidad.
- source_word: הַמִּדְיָנִית
  english_pob_choice: the Midianite
  chosen_spanish: midianita
  alternatives_spanish:
  - la midianita
  - de Madián
  lexicon: HALOT
  rationale: Como adjetivo étnico, 'midianita' funciona con claridad en español y evita una perífrasis innecesaria.
- source_word: כָּזְבִּי
  english_pob_choice: Cozbi
  chosen_spanish: Cozbi
  alternatives_spanish:
  - Kozbi
  lexicon: HALOT
  rationale: Se translitera el nombre propio con la forma usual en español bíblico, manteniendo la identificación sin adaptar fonéticamente más de lo necesario.
- source_word: בַת צ֑וּר
  english_pob_choice: daughter of Zur
  chosen_spanish: hija de Zur
  alternatives_spanish:
  - hija de Tzur
  - descendiente de Zur
  lexicon: HALOT
  rationale: La cadena constructa expresa filiación directa; 'hija de' es la traducción más transparente y fiel.
- source_word: רֹאשׁ אֻמּוֹת
  english_pob_choice: the head of the clans
  chosen_spanish: cabeza de las tribus[b]
  alternatives_spanish:
  - jefe de los pueblos
  - jefe de los clanes
  lexicon: HALOT
  rationale: רֹאשׁ conserva su fuerza literal como 'cabeza', y אֻמּוֹת puede señalar grupos de parentesco o pueblos. En español, 'tribus' mantiene la tensión entre grupo étnico y subdivisión kinship, aunque el contexto también admite 'clanes'.
- source_word: בֵּית אָב
  english_pob_choice: of a father's house
  chosen_spanish: de una casa paterna
  alternatives_spanish:
  - de la casa del padre
  - de un linaje paterno
  lexicon: HALOT
  rationale: '''Casa paterna'' reproduce el valor técnico del hebreo como unidad doméstica/linaje. La ausencia de artículo en hebreo permite ''una'' en español para reflejar la estructura indefinida del constructo.'
- source_word: בְּמִדְיָן
  english_pob_choice: in Midian
  chosen_spanish: en Madián
  alternatives_spanish:
  - en Midian
  lexicon: HALOT
  rationale: Uso 'Madián' para una forma más plenamente española y reconocible en contexto bíblico; mantiene el valor locativo del preposición ב.
- source_word: הוּא
  english_pob_choice: was
  chosen_spanish: era
  alternatives_spanish:
  - fue
  - era él
  lexicon: HALOT
  rationale: El pronombre copulativo se integra en español como 'era', que conserva mejor el valor identificativo del hebreo en una cláusula nominal.
theological_decisions:
- issue: Título relacional y etnográfico en la expresión de parentesco y liderazgo
  english_pob_reading: head of the clans of a father's house in Midian
  chosen_spanish_reading: cabeza de las tribus de una casa paterna en Madián
  alternative_spanish_readings:
  - jefe de los clanes de una casa paterna en Madián
  - cabeza de los pueblos de una casa paterna en Madián
  rationale: El hebreo combina un título de liderazgo con una unidad de parentesco. 'Cabeza' preserva la metáfora corporal; 'casa paterna' conserva el término kinship técnico. 'Tribus' es una posible ampliación interpretativa para hacer inteligible la función social en español, aunque 'clanes' también es viable.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La redacción sigue el sentido del texto hebreo y el cierre revisado del POB inglés, especialmente la cláusula appositiva ('quien era cabeza...'). Se evitó traducir mecánicamente desde el inglés cuando el español requería una solución más natural, pero sin perder la tensión léxica de רֹאשׁ y אֻמּוֹת.
  spanish_consistency_notes:
  - Se mantuvo el nombre propio Cozbi sin adaptar a una forma distinta no atestiguada en el paquete fuente.
  - Se prefirió 'casa paterna' para בֵּית אָב por coherencia con el uso técnico del hebreo.
  - '''Madián'' se usa como forma española convencional del topónimo en este contexto bíblico.'
  - La puntuación conserva la apposición con coma para reflejar la estructura del hebreo y del audit trail inglés revisado.
