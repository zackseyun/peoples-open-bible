revisions:
- from: Así Josué tomó toda la tierra[a], conforme a todo lo que Yahvé había dicho a Moisés; y Josué la dio a Israel como herencia, según sus divisiones, por sus tribus. Y la tierra tuvo descanso de la guerra[b].
  to: Así Josué tomó toda la tierra[a], conforme a todo lo que Yahvé había dicho a Moisés; y Josué la dio a Israel como herencia, según sus divisiones, según sus tribus. Y la tierra tuvo descanso de la guerra[b].
  rationale: Se ajusta ‘por sus tribus’ a ‘según sus tribus’ para reflejar mejor el criterio tribal del reparto en un español más natural. También se corrige la nota alternativa final, ya que ‘estuvo quieta de la guerra’ es poco idiomático; ‘quedó en calma tras la guerra’ conserva la alternativa léxica de שקט de manera clara y natural.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:51:35Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: Josué toma toda la tierra, en conformidad con lo dicho por Yahvé a Moisés, la da a Israel como herencia, organizada por divisiones tribales, y la tierra entra en reposo de la guerra. Se preserva correctamente ‘Yahvé’, ‘toda la tierra’ y ‘como herencia’.'
  spanish_quality_summary: 'El español es mayormente claro y fiel, pero hay dos puntos mejorables para una lectura más natural y precisa: ‘por sus tribus’ suena menos idiomático que ‘según sus tribus’, y ‘tuvo descanso de la guerra’ es comprensible pero menos natural en español bíblico actual que ‘tuvo descanso de la guerra’/‘descansó de la guerra’; además, la nota alternativa ‘estuvo quieta de la guerra’ resulta poco natural. Conviene ajustar la frase final a una formulación más idiomática sin perder el matiz de cese de conflicto.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> ‘Yahvé’; לְנַחֲלָה -> ‘como herencia’; no hay conflictos con términos doctrinales clave. La revisión propuesta mantiene estas decisiones y mejora la naturalidad de לְשִׁבְטֵיהֶם y שָׁקְטָה מִמִּלְחָמָה.'
  issues:
  - severity: medium
    issue: ‘por sus tribus’ suena poco natural para לְשִׁבְטֵיהֶם en esta construcción.
    rationale: El hebreo expresa el criterio tribal de las divisiones. En español, ‘según sus tribus’ o ‘conforme a sus tribus’ comunica con mayor claridad la relación organizadora que ‘por sus tribus’.
  - severity: medium
    issue: La nota b ofrece ‘estuvo quieta de la guerra’, formulación poco idiomática en español.
    rationale: Aunque intenta reflejar la alternativa inglesa ‘was quiet from war’, en español ‘quieta de la guerra’ no suena natural. Una alternativa como ‘quedó en calma tras la guerra’ o ‘estuvo en reposo de la guerra’ transmite mejor el sentido de שקט.
  revised_spanish_text: Así Josué tomó toda la tierra[a], conforme a todo lo que Yahvé había dicho a Moisés; y Josué la dio a Israel como herencia, según sus divisiones, según sus tribus. Y la tierra tuvo descanso de la guerra[b].
  revised_footnotes:
  - marker: a
    text: O ‘la tierra entera’. La expresión resume la conquista de la tierra que está en discusión.
    reason: lexical_alternative
  - marker: b
    text: O ‘quedó en calma tras la guerra’. La expresión hebrea denota reposo o tranquilidad después del conflicto.
    reason: lexical_alternative
  revision_rationale: Se ajusta ‘por sus tribus’ a ‘según sus tribus’ para reflejar mejor el criterio tribal del reparto en un español más natural. También se corrige la nota alternativa final, ya que ‘estuvo quieta de la guerra’ es poco idiomático; ‘quedó en calma tras la guerra’ conserva la alternativa léxica de שקט de manera clara y natural.
