  text: ἢ οὐκ οἴδατε ὅτι τὸ σῶμα ὑμῶν ναὸς τοῦ ἐν ὑμῖν ἁγίου πνεύματός ἐστιν, οὗ ἔχετε ἀπὸ θεοῦ; καὶ οὐκ ἐστὲ ἑαυτῶν,
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/006/019.yaml
  text: Or do you not know that your body is a temple of the Holy Spirit within you[a], whom you have from God? And you are not your own[b],
