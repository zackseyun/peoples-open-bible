    text: 'O: «del camino». La expresión hebrea significa «de un viaje» o «de haber estado viajando».'
    reason: lexical_alternative
  revision_rationale: 'Se corrige el clítico erróneo «Les» por «Le», se ajusta el nombre a «Urías» para la forma española más normal, y se mejoran los tiempos verbales para reflejar con más naturalidad la secuencia narrativa hebrea: reporte simple («no bajó»), llegada reciente («has venido»), y acción no realizada tras esa llegada («no bajaste»). Se mantienen «bajar» y «casa» para preservar el idiomatismo y la repetición del original.'
