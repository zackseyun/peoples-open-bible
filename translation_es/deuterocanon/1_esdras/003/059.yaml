translation:
  language: es
  text: ¿No es grande el que hace estas cosas? Y la verdad es grande y más fuerte que todo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «el que hace estas cosas». El griego deja implícito el referente; el contexto más amplio puede sugerir a Dios, pero la cláusula no lo nombra.'
    reason: alternative_reading
  - marker: b
    text: 'O: «más fuerte que todas las cosas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχὶ
  english_pob_choice: Is not
  chosen_spanish: ¿No es
  alternatives_spanish:
  - ¿Acaso no es
  - ¿No será
  lexicon: BDAG
  rationale: La pregunta retórica en griego espera una respuesta afirmativa. «¿No es» conserva ese tono elevado sin volverlo coloquial, y funciona bien en español bíblico actual.
- source_word: μέγας
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - mago
  - poderoso
  - importante
  lexicon: BDAG
  rationale: El adjetivo expresa grandeza en sentido de magnitud o excelencia. «Grande» es la equivalencia más directa y natural en español para este elogio general.
- source_word: ὃς
  english_pob_choice: he who
  chosen_spanish: el que
  alternatives_spanish:
  - quien
  - aquel que
  lexicon: BDAG
  rationale: El relativo funciona sustantivamente. «El que» mantiene la referencia personal sin imponerse un sujeto explícito que el griego deja implícito.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - tales cosas
  lexicon: BDAG
  rationale: El demostrativo es plural y remite a las acciones ya mencionadas. «Estas cosas» preserva ese plural y su referencia retrospectiva.
- source_word: ποιεῖ
  english_pob_choice: does
  chosen_spanish: hace
  alternatives_spanish:
  - obra
  - realiza
  - cumple
  lexicon: BDAG
  rationale: El verbo griego es amplio y puede significar hacer, obrar o ejecutar. «Hace» es la opción más natural y fiel en este contexto.
- source_word: ἀλήθεια
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - verdad
  - la fidelidad
  lexicon: BDAG
  rationale: Aquí ἀλήθεια expresa verdad como realidad veraz o veracidad, no tanto fidelidad pactal. En español, «la verdad» suena natural y conserva el artículo cuando el sustantivo tiene valor sentencioso.
- source_word: ἰσχυροτέρα
  english_pob_choice: stronger
  chosen_spanish: más fuerte
  alternatives_spanish:
  - más poderosa
  - más vigorosa
  - más poderosa aún
  lexicon: BDAG
  rationale: El comparativo indica superioridad en fuerza. «Más fuerte» reproduce bien la comparación sin cargarla con matices ajenos como dominio o poder político.
- source_word: παρὰ πάντα
  english_pob_choice: than all things
  chosen_spanish: que todas las cosas
  alternatives_spanish:
  - que todo
  - que todas las demás cosas
  lexicon: BDAG
  rationale: La frase expresa comparación con la totalidad de las cosas. «Que todas las cosas» mantiene el alcance universal y evita suavizar el contraste.
theological_decisions:
- issue: Referente implícito del que hace estas cosas
  english_pob_reading: Kept generic rather than specifying God in the main text
  chosen_spanish_reading: Mantenido implícito en «el que hace estas cosas»
  alternative_spanish_readings:
  - «Dios, que hace estas cosas»
  - «el que hace estas cosas, es decir, Dios»
  rationale: El griego no nombra explícitamente a Dios en esta cláusula. La traducción conserva esa ambigüedad textual y deja que el contexto más amplio sugiera el referente sin resolverlo en la línea principal.
  doctrine_reference: Preservar la tensión textual; primacía del texto original sobre la explicitación interpretativa.
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió un relativo más formal y ajustó la comparación a «all things». El español refleja esa forma sobria con «el que» y conserva la universalidad de παρὰ πάντα mediante «todas las cosas».
  spanish_consistency_notes:
  - Se mantiene «verdad» para ἀλήθεια, sin desplazarlo por «fidelidad», porque el contexto es sapiencial/declamatorio más que de lealtad pactual explícita.
  - Se usa «más fuerte» para el comparativo ἰσχυροτέρα, en paralelo con la solución inglesa y sin introducir «poderosa» como lectura más interpretativa.
  - No se explicita «Dios» en el texto principal, en coherencia con la cautela del POB inglés respecto del referente implícito.
