translation:
  language: es
  text: Porque confieso[a] mi iniquidad; estoy angustiado[b] a causa de mi pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «declaro mi iniquidad». El verbo hebreo literalmente significa «hago saber» o «declaro»; «confieso» refleja el contexto penitencial.
    reason: lexical_alternative
  - marker: b
    text: O «estoy turbado a causa de mi pecado».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: El hebreo introduce la explicación de la afirmación anterior; «Porque» conserva esa relación causal de manera natural en español.
- source_word: עֲוֺנִי
  english_pob_choice: my iniquity
  chosen_spanish: mi iniquidad
  alternatives_spanish:
  - mi culpa
  - mi maldad
  lexicon: HALOT
  rationale: עָוֹן puede abarcar culpa e iniquidad. «Iniquidad» mantiene el peso moral y la correspondencia con la opción inglesa sin reducirla a un sentido más genérico.
- source_word: אַגִּיד
  english_pob_choice: I confess
  chosen_spanish: confieso
  alternatives_spanish:
  - declaro
  - hago saber
  - doy a conocer
  lexicon: HALOT
  rationale: El verbo בסיסico significa «declarar / dar a conocer». En este contexto penitencial, «confieso» comunica mejor la fuerza de la acción sin abandonar el sentido de declaración pública o explícita.
- source_word: אֶדְאַג
  english_pob_choice: I am anxious
  chosen_spanish: estoy angustiado
  alternatives_spanish:
  - estoy ansioso
  - estoy preocupado
  - estoy turbado
  lexicon: HALOT
  rationale: דאג expresa inquietud o aflicción interior. «Estoy angustiado» suena natural en español bíblico contemporáneo y evita que «ansioso» se lea solo como emoción moderna leve o clínica.
- source_word: מֵחַטָּאתִי
  english_pob_choice: because of my sin
  chosen_spanish: a causa de mi pecado
  alternatives_spanish:
  - por mi pecado
  - debido a mi pecado
  - por causa de mi pecado
  lexicon: HALOT
  rationale: La preposición מִן aquí señala causa u origen de la inquietud. «A causa de» explicita esa relación de manera clara y fiel.
- source_word: חַטָּאתִי
  english_pob_choice: my sin
  chosen_spanish: mi pecado
  alternatives_spanish:
  - mi falta
  - mi ofensa
  lexicon: HALOT
  rationale: חַטָּאת es el término común para pecado. «Pecado» es la opción más directa y transparente en español.
theological_decisions:
- issue: Relación entre confesión y angustia interior en un salmo penitencial
  english_pob_reading: The verse is rendered as a personal confession of guilt and anxiety without importing a fuller doctrinal explanation of repentance.
  chosen_spanish_reading: El versículo se presenta como una confesión personal de culpa y una angustia interior causada por el pecado, sin añadir explicaciones doctrinales ajenas al texto.
  alternative_spanish_readings:
  - Puede entenderse solo como reconocimiento verbal de culpa, con menos énfasis penitencial.
  - Podría leerse como simple declaración, sin la fuerza confesional.
  rationale: El hebreo dice que el salmista da a conocer su iniquidad y está afligido por su pecado. Traducir אַגִּיד como «confieso» refleja el marco penitencial, pero el texto español no agrega más de lo que el original sostiene.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto inglés de referencia mantiene alta concordancia con el hebreo y no registra revisiones sustantivas; se sigue esa lectura estable sin introducir variantes textuales adicionales.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como término predeterminado para el nombre divino cuando aparezca; este versículo no lo contiene.
  - Se mantiene «iniquidad» para עָוֹן y «pecado» para חַטָּאת, respetando la distinción léxica.
  - La puntuación divide el verso en dos miembros como en el hebreo y la versión inglesa auditada.
  - Las notas a y b se anclan en los términos correspondientes para preservar las alternativas léxicas documentadas.
