  text: וַ/יֹּ֤אמְרוּ ל/וֹ֙ אֶחָ֔י/ו הֲ/מָלֹ֤ךְ תִּמְלֹךְ֙ עָלֵ֔י/נוּ אִם מָשׁ֥וֹל תִּמְשֹׁ֖ל בָּ֑/נוּ וַ/יּוֹסִ֤פוּ עוֹד֙ שְׂנֹ֣א אֹת֔/וֹ עַל חֲלֹמֹתָ֖י/ו וְ/עַל דְּבָרָֽי/ו־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/037/008.yaml
  text: His brothers said to him[a], “Will you indeed reign over us? Will you indeed rule over us?” So they hated him even more because of his dreams and because of his words.
  footnotes:
