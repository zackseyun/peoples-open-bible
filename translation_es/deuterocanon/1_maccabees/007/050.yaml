translation:
  language: es
  text: Y la tierra de Judá estuvo en calma por pocos días.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἡσύχασεν
  english_pob_choice: was quiet
  chosen_spanish: quedó en silencio
  alternatives_spanish:
  - estuvo quieta
  - quedó quieta
  - estuvo en reposo
  lexicon: LSJ
  rationale: El aoristo de ἡσυχάζω indica llegar a estar quieto, en calma o sin disturbio. En español, «quedó en silencio» transmite bien ese resultado temporal después del conflicto sin forzar una idea de paz duradera.
- source_word: ἡ γῆ Ἰούδα
  english_pob_choice: the land of Judah
  chosen_spanish: la tierra de Judá
  alternatives_spanish:
  - el país de Judá
  - Judá
  lexicon: LSJ
  rationale: γῆ significa normalmente «tierra» o «país». «La tierra de Judá» conserva la referencia territorial y sigue de cerca la construcción griega.
- source_word: ἡμέρας ὀλίγας
  english_pob_choice: for a few days
  chosen_spanish: por pocos días
  alternatives_spanish:
  - por unos días
  - durante pocos días
  - por algunos días
  lexicon: LSJ
  rationale: La frase acusativa expresa duración temporal. «Por pocos días» hace explícita esa duración de manera natural en español y mantiene la brevedad de ὀλίγας.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden estrechamente; no se observaron revisiones aplicadas ni tensiones lexicográficas adicionales que requirieran nota.
  spanish_consistency_notes:
  - Se mantuvo «Judá» como nombre propio territorial para reflejar Ἰούδα.
  - Se evitó «paz» para no ampliar el sentido más allá de «quietud/calma» que sugiere el griego y la versión inglesa auditada.
  - La construcción temporal se expresó con «por» para conservar valor durativo breve.
