revisions:
- from: Y algunos de tus hijos, que saldrán de ti, que tú engendrarás, serán tomados, y serán eunucos[a] en el palacio del rey de Babilonia.
  to: Y algunos de tus hijos que nacerán de ti, que tú engendrarás, se los llevarán, y llegarán a ser eunucos[a] en el palacio del rey de Babilonia.
  rationale: 'Se aplican ajustes menores de estilo para que el español suene natural sin perder ninguna distinción del hebreo ni del POB inglés: «nacerán de ti» por el idiomático genealógico, «se los llevarán» por el sentido de deportación con agente indefinido, y «llegarán a ser» para reflejar mejor la transición implícita en וְהָיוּ. La nota sobre «eunucos / oficiales de la corte» se conserva sin cambios sustanciales.'
