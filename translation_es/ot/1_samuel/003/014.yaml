source:
  edition: WLC
  text: וְ/לָ/כֵ֥ן נִשְׁבַּ֖עְתִּי לְ/בֵ֣ית עֵלִ֑י אִֽם יִתְכַּפֵּ֞ר עֲוֺ֧ן בֵּית עֵלִ֛י בְּ/זֶ֥בַח וּ/בְ/מִנְחָ֖ה עַד עוֹלָֽם־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/003/014.yaml
  text: 'Therefore I have sworn to the house of Eli: the iniquity of Eli’s house shall never be atoned for by sacrifice or offering[a][b].'
  footnotes:
  - marker: a
    text: Or 'the iniquity of Eli’s house shall surely not be atoned for.' The Hebrew uses an oath formula with 'if' after 'I have sworn' to express strong negation.
    reason: lexical_alternative
  - marker: b
    text: '''Offering'' translates Hebrew minchah, often specifically a ''grain offering.'''
    reason: lexical_alternative
