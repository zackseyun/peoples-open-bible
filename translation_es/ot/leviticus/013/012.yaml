translation:
  language: es
  text: Y si la enfermedad cutánea[a] brota por toda la piel, y la enfermedad cutánea cubre toda la piel de la persona afectada, desde la cabeza hasta los pies, hasta donde pueda ver el sacerdote[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo צָרַעַת (tzaraat) se refiere en Levítico a un rango de aflicciones rituales de la piel y no debe equipararse de manera estrecha con la lepra moderna (enfermedad de Hansen).
    reason: cultural_note
  - marker: b
    text: 'O, más literalmente: «toda la piel de la lesión». La expresión hebrea se refiere a la piel de la persona tal como está afectada por la afección.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּר֨וֹחַ תִּפְרַ֤ח
  english_pob_choice: breaks out all over
  chosen_spanish: brota por toda
  alternatives_spanish:
  - se extiende por toda
  - brota extensamente
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la idea de propagación. En español, «brota por toda» conserva esa fuerza de expansión visible sin volverse rígido o demasiado médico.
- source_word: הַצָּרַעַת
  english_pob_choice: the skin disease
  chosen_spanish: la enfermedad cutánea
  alternatives_spanish:
  - la afección cutánea
  - la enfermedad de la piel
  - la tzaraat
  lexicon: HALOT
  rationale: צָרַעַת designa en Levítico una afección ritual de la piel y no equivale sin más a la lepra moderna. «Enfermedad cutánea» es claro en español y evita una identificación médica indebida.
- source_word: בָּעוֹר
  english_pob_choice: over the skin
  chosen_spanish: por toda la piel
  alternatives_spanish:
  - en la piel
  - sobre la piel
  lexicon: HALOT
  rationale: La preposición con עור aquí expresa la superficie corporal afectada y el movimiento de difusión. «Por toda la piel» comunica mejor la imagen de propagación que una simple ubicación estática.
- source_word: וְכִסְּתָה
  english_pob_choice: covers
  chosen_spanish: cubre
  alternatives_spanish:
  - ha cubierto
  - oculta
  lexicon: HALOT
  rationale: El verbo expresa el alcance total de la afección. En español, «cubre» reproduce la progresión descriptiva del pasaje de manera natural.
- source_word: אֵת כָּל עוֹר הַנֶּגַע
  english_pob_choice: all the skin of the affected person
  chosen_spanish: toda la piel de la persona afectada
  alternatives_spanish:
  - toda la piel de la lesión
  - toda la piel del afligido
  lexicon: HALOT
  rationale: Literalmente, la expresión es «toda la piel de la lesión/aflicción», pero en contexto se refiere a la piel de la persona afectada por la condición. La formulación escogida evita ambigüedad sin perder el sentido referencial.
- source_word: מֵרֹאשׁוֹ וְעַד רַגְלָיו
  english_pob_choice: from his head to his feet
  chosen_spanish: desde la cabeza hasta los pies
  alternatives_spanish:
  - desde la coronilla hasta las plantas de los pies
  - de la cabeza a los pies
  lexicon: HALOT
  rationale: Es una merisma de totalidad corporal. «Desde la cabeza hasta los pies» es idiomático y mantiene la amplitud total del alcance descrito.
- source_word: לְכָל מַרְאֵה עֵינֵי הַכֹּהֵן
  english_pob_choice: as far as the priest can see
  chosen_spanish: hasta donde pueda ver el sacerdote
  alternatives_spanish:
  - según lo que vean los ojos del sacerdote
  - a la vista del sacerdote
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y señala el alcance de la inspección visual. «Hasta donde pueda ver el sacerdote» conserva ese límite perceptivo con español natural.
theological_decisions:
- issue: Sentido ritual de צָרַעַת sin equipararla automáticamente con lepra moderna
  english_pob_reading: The skin disease
  chosen_spanish_reading: la enfermedad cutánea
  alternative_spanish_readings:
  - la lepra
  - la enfermedad de la lepra
  - la tzaraat
  rationale: Siguiendo la advertencia auditada del texto inglés, se evita identificar sin matiz esta afección levítica con la lepra de la medicina moderna. «Enfermedad cutánea» preserva la categoría ritual y la cautela terminológica.
  doctrine_reference: Levítico 13; nota cultural auditada del POB inglés
translation_notes:
  revision_awareness: Se revisó el pasaje conforme al audit trail inglés; no hay revisiones aplicadas y el control final indica alta concordancia, por lo que la redacción española sigue de cerca la estructura y las decisiones léxicas documentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología por defecto, aunque este versículo no contiene el nombre divino.
  - Se usa un registro moderno y digno, evitando calcos innecesarios pero preservando la estructura condicional del hebreo.
  - Se conserva la distinción entre la afección ritual y una enfermedad médica moderna.
  - Los marcadores de nota se insertan únicamente donde hay una alternativa o nota cultural documentada.
