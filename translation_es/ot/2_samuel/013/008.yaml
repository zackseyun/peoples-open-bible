    text: Or 'made heart-shaped cakes'; the Hebrew verb and noun are rare and may reflect a shape associated with the word for 'heart.'
    reason: lexical_alternative
  - marker: b
    text: Or 'boiled the cakes'; the Hebrew verb can specifically denote boiling, though here it may function more generally for cooking.
    reason: lexical_alternative
