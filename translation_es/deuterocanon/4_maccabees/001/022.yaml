  source_alignment_summary: 'El borrador refleja correctamente la secuencia temporal del griego: antes del placer hay deseo, y después del placer, gozo. Conserva bien la distinción entre ἡδονή («placer») y χαρά («gozo»). Sin embargo, «está el deseo» suena menos natural y menos fiel al valor existencial de ἐστιν que una formulación como «hay deseo».'
