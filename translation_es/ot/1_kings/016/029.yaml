translation:
  language: es
  text: Y Acab hijo de Omrí comenzó a reinar sobre Israel en el año treinta y ocho del reinado de Asa, rey de Judá, y Acab hijo de Omrí reinó sobre Israel en Samaria veintidós años.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: HALOT
  rationale: La conjunción une este notice regnal con el anterior; en español, «Y» conserva la continuidad narrativa sin añadir matiz temporal que el hebreo no exige.
- source_word: מָלַךְ
  english_pob_choice: became king
  chosen_spanish: llegó a ser rey
  alternatives_spanish:
  - se hizo rey
  - comenzó a reinar
  lexicon: HALOT
  rationale: El qatal en fórmulas regias suele señalar la entronización o acceso al trono. «Llegó a ser rey» preserva esa transición mejor que un simple «reinó».
- source_word: בִּשְׁנַת שְׁלֹשִׁים וּשְׁמֹנֶה שָׁנָה
  english_pob_choice: in the thirty-eighth year
  chosen_spanish: en el año treinta y ocho
  alternatives_spanish:
  - en el año trigésimo octavo
  - en el año treinta y ocho
  lexicon: HALOT
  rationale: La fórmula cronológica se expresa naturalmente en español como «en el año treinta y ocho», manteniendo el sincronismo con Asa.
- source_word: לְאָסָא מֶלֶךְ יְהוּדָה
  english_pob_choice: of Asa king of Judah
  chosen_spanish: de Asa, rey de Judá
  alternatives_spanish:
  - de Asa, el rey de Judá
  - del rey Asa de Judá
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de modo transparente con apposición en español, sin perder el referente regnal.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - gobernó
  - fue rey
  lexicon: HALOT
  rationale: Aquí la forma narrativa introduce la duración del reinado; «reinó» comunica el ejercicio continuado del gobierno de manera natural en español.
- source_word: בְּשֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  - desde Samaria
  lexicon: HALOT
  rationale: La preposición marca localización. «En Samaria» mantiene la naturalidad y el valor locativo del hebreo.
- source_word: עֶשְׂרִים וּשְׁתַּיִם שָׁנָה
  english_pob_choice: twenty-two years
  chosen_spanish: veintidós años
  alternatives_spanish:
  - por veintidós años
  - durante veintidós años
  lexicon: HALOT
  rationale: La duración regnal se expresa de forma directa en español; no es necesario añadir preposición si el contexto ya la aporta.
translation_notes:
  revision_awareness: El texto inglés POB y el dossier hebreo concuerdan estrechamente; no se registran revisiones ni variantes textuales relevantes para esta línea regnal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se usa «rey» para מֶלֶךְ y «reinó» para וַיִּמְלֹךְ, conservando la distinción funcional entre acceso al trono y duración del reinado.
  - Se conserva «Samaria» como topónimo conocido y natural en español bíblico contemporáneo.
