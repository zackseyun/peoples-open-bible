translation:
  language: es
  text: Y en el cuarto año del rey Darío, la palabra de Yahvé vino a Zacarías el cuarto día del noveno mes, en Kislev[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Kislev» es el nombre del noveno mes del calendario hebreo.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ...
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y fue
  lexicon: HALOT
  rationale: La forma narrativa introduce el marco temporal de una nueva sección. En español, «Y aconteció» mantiene el valor discursivo de apertura sin sonar excesivamente arcaico, y conserva el matiz eventivo que la POB inglesa resolvió con un simple enlace narrativo.
- source_word: בִּשְׁנַת אַרְבַּע לְדָרְיָוֶשׁ הַמֶּלֶךְ
  english_pob_choice: in the fourth year of King Darius
  chosen_spanish: en el cuarto año del rey Darío
  alternatives_spanish:
  - en año cuatro de Darío el rey
  - en el cuarto año de Darío, el rey
  lexicon: HALOT
  rationale: Se conserva la fórmula regnal estándar con orden natural en español. «del rey Darío» reproduce bien el hebreo sin forzar la sintaxis, y mantiene el registro histórico-formal del original.
- source_word: הָיָה דְבַר יְהוָה אֶל זְכַרְיָה
  english_pob_choice: the word of Yahweh came to Zechariah
  chosen_spanish: la palabra de Yahvé vino a Zacarías
  alternatives_spanish:
  - la palabra de Yahvé llegó a Zacarías
  - la palabra de Yahvé fue para Zacarías
  lexicon: HALOT
  rationale: La POB inglesa interpreta la fórmula profética como evento de revelación, no solo estado. «Vino a» comunica esa irrupción profética en español con naturalidad. Se conserva «Yahvé» por la decisión terminológica del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre divino transliterado exigido por la pauta del proyecto. «Yahvé» preserva la distinción entre el nombre propio divino y un título reverencial.
- source_word: בְּאַרְבָּעָה לַחֹדֶשׁ הַתְּשִׁיעִי
  english_pob_choice: on the fourth day of the ninth month
  chosen_spanish: en el día cuatro del mes noveno
  alternatives_spanish:
  - el cuatro del mes noveno
  - el cuarto día del mes noveno
  lexicon: HALOT
  rationale: El hebreo usa una fórmula calendárica abreviada; el inglés suministra «day» para claridad. En español, «el día cuatro del mes noveno» suena claro y fiel, sin añadir más contenido que el exigido por la expresión implícita.
- source_word: בְּכִסְלֵו
  english_pob_choice: in Kislev
  chosen_spanish: en Kislev
  alternatives_spanish:
  - en Quisleu
  - en Chisleu
  lexicon: HALOT
  rationale: El nombre del mes se translitera como topónimo calendárico, siguiendo la POB inglesa y la práctica del proyecto. Se evita sustituirlo por una equivalencia explicativa en el texto principal.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La pauta del proyecto exige traducir יְהוָה como «Yahvé» en el texto principal. Esto preserva el nombre propio del Dios de Israel y evita la sustitución por un título litúrgico que borra el dato léxico del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula profética «the word of Yahweh came to Zechariah»
  english_pob_reading: the word of Yahweh came to Zechariah
  chosen_spanish_reading: la palabra de Yahvé vino a Zacarías
  alternative_spanish_readings:
  - la palabra de Yahvé fue para Zacarías
  - la palabra de Yahvé llegó a Zacarías
  rationale: Se conserva el carácter eventivo y revelatorio de la fórmula profética. Traducirla solo como una relación estática («era para») debilitaría el movimiento del original y del audit trail inglés.
  doctrine_reference: Uso profético formular de los libros proféticos; sin tensión doctrinal adicional
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés y el hebreo base. Se mantiene la fórmula narrativa inicial, la datación regnal y la locución profética eventiva. No se detectaron revisiones pendientes en el contexto inglés, por lo que no se introducen variantes adicionales ni notas textuales.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה.
  - Se mantiene «Zacarías» como forma castellana del nombre profético.
  - 'Se preserva el orden claro de la fecha: año de reinado, día del mes y nombre del mes.'
  - La nota al pie se ancla en «Kislev» porque ahí aparece la posible ambigüedad cultural del mes hebreo.
