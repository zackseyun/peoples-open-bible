translation:
  language: es
  text: Pues aun si llegan a ser longevos, serán tenidos por nada[a], y al final[b] su vejez será deshonrada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serán considerados de ningún valor».
    reason: lexical_alternative
  - marker: b
