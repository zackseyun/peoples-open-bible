translation:
  language: es
  text: 'Y a Sara le dijo: «Mira, le he dado mil piezas de plata a tu hermano. Mira, esto es para ti un velo para los ojos[a], para todos los que están contigo[b], y ante todos quedarás vindicada».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una cobertura para los ojos»; probablemente significa una compensación pública que cubre la ofensa y restaura el honor de Sara.
    reason: lexical_alternative
  - marker: b
    text: O «ante todos los que están contigo»; el sentido exacto de la frase es difícil y puede entenderse de varias maneras.
    reason: alternative_reading
lexical_decisions:
- source_word: אֶלֶף כֶּסֶף
  english_pob_choice: a thousand pieces of silver
  chosen_spanish: mil piezas de plata
  alternatives_spanish:
  - mil siclos de plata
  - mil monedas de plata
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mil plata», sin especificar una unidad. «Piezas de plata» conserva la indefinición del monto y refleja la solución del POB en inglés sin introducir «siclos», que no aparece explícitamente en el texto.
- source_word: לְאָחִיךְ
  english_pob_choice: to your brother
  chosen_spanish: a tu hermano
  alternatives_spanish:
  - a tu pariente
  lexicon: HALOT
  rationale: 'Se conserva «hermano» porque el hebreo lo dice así y mantiene la ironía narrativa: Abimelec llama «hermano» a Abraham como Sara lo había presentado.'
- source_word: כְּסוּת עֵינַיִם
  english_pob_choice: a covering of the eyes
  chosen_spanish: un velo para los ojos
  alternatives_spanish:
  - una cobertura de los ojos
  - una compensación que cubre la ofensa
  lexicon: HALOT
  rationale: La expresión es idiomática y difícil. «Velo para los ojos» preserva la metáfora visual y la ambigüedad del hebreo, evitando cerrar prematuramente el sentido solo a «compensación» o «vindicación».
- source_word: לְכֹל אֲשֶׁר אִתָּךְ
  english_pob_choice: to all who are with you
  chosen_spanish: de todos los que están contigo
  alternatives_spanish:
  - para todos los que están contigo
  - a la vista de todos los que están contigo
  lexicon: HALOT
  rationale: «De todos los que están contigo» reproduce de forma natural la referencia al grupo presente y su alcance público, en línea con la revisión inglesa más cercana al preposición hebrea.
- source_word: וְאֵת כֹּל
  english_pob_choice: and before everyone
  chosen_spanish: ante todos
  alternatives_spanish:
  - y ante todos
  - delante de todos
  lexicon: HALOT
  rationale: El hebreo es comprimido y apunta a una ampliación del ámbito público. «Ante todos» comunica esa apertura sin sobrecargar la frase.
- source_word: וְנֹכָחַת
  english_pob_choice: you are vindicated
  chosen_spanish: quedarás vindicada
  alternatives_spanish:
  - serás declarada inocente
  - quedarás justificada
  - serás reivindicada
  lexicon: HALOT
  rationale: El nifal de יכח aquí expresa quedar en lo correcto, ser públicamente reconocida como inocente o reivindicada. «Quedarás vindicada» conserva la dimensión pública y relacional que el POB subraya con «vindicated».
theological_decisions:
- issue: Sentido final de la cláusula קשה de נֹכָחַת
  english_pob_reading: and before everyone you are vindicated
  chosen_spanish_reading: y ante todos quedarás vindicada
  alternative_spanish_readings:
  - y ante todos serás declarada inocente
  - y ante todos quedarás justificada
  - y ante todos quedarás reprobada
  rationale: La lectura del POB entiende la compensación como acto público que restaura el honor de Sara y la deja limpia frente a la comunidad. «Vindicada» mantiene esa lectura sin borrar la dificultad del hebreo ni convertirla en una simple absolución jurídica.
  doctrine_reference: Lectura lexical-discursiva de יכח en nifal; restauración pública del honor dentro del relato.
translation_notes:
  revision_awareness: La redacción sigue de cerca la versión inglesa revisada más reciente, especialmente en la relación entre לְכֹל אֲשֶׁר אִתָּךְ y la referencia pública de la cláusula final. Se evitó imponer una equivalencia más específica como «siclos» o una paráfrasis interpretativa que cerrara la metáfora de כְּסוּת עֵינַיִם.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque el texto no contiene el nombre divino.
  - Se eligió «vindicada» por consistencia con el POB inglés «vindicated», reservando «justificada» para contextos más estrechamente forenses cuando el español lo requiera.
  - Se conservó la ambigüedad de la expresión idiomática central mediante nota, en lugar de sustituirla por una explicación en el cuerpo del texto.
