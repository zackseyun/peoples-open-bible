    reason: lexical_alternative
  revision_rationale: 'Se corrige el problema principal: la nota se mueve a la expresión idiomática que realmente explica. También se mejora la naturalidad del español con «habían sido llevados», «dijeron», y «sacos», sin alterar el significado ni la decisión léxica clave de «esclavos».'
