translation:
  language: es
  text: 'Entonces Amazías envió mensajeros a Jehoás[a], hijo de Joacaz, hijo de Jehú, rey de Israel, diciendo: «Ven, veámonos cara a cara[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jehoás también suele escribirse «Joás» en versiones españolas.
    reason: alternative_reading
  - marker: b
    text: Literalmente, «Ven, veamos rostros» o «veámonos los rostros». El modismo hebreo significa encontrarse directamente; aquí tiene tono de desafío y apunta al contexto de confrontación militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En ese momento
  - Luego
  lexicon: HALOT
  rationale: Marca la secuencia narrativa de manera natural en español, conservando el valor temporal y consecutivo del hebreo.
- source_word: שָׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: Verbo narrativo normal para שָׁלַח; en español mantiene bien el acto de remitir emisarios.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - emisarios
  - enviados
  lexicon: HALOT
  rationale: Aquí son agentes humanos que llevan un mensaje, no ángeles; «mensajeros» conserva ese valor de forma directa y legible.
- source_word: יְהוֹאָשׁ
  english_pob_choice: Jehoash
  chosen_spanish: Joás
  alternatives_spanish:
  - Jehoás
  - Jehoash
  lexicon: transliteración histórica de nombres propios
  rationale: En español bíblico, «Joás» es la forma más reconocible y natural; el inglés audit trail nota la variante convencional «Joash», pero el hebreo יְהוֹאָשׁ admite esta forma abreviada en tradición hispana.
- source_word: בֶּן ... בֶּן ...
  english_pob_choice: son of Jehoahaz, son of Jehu
  chosen_spanish: hijo de Joacaz, hijo de Jehú
  alternatives_spanish:
  - hijo de Jehoacaz, hijo de Jehú
  lexicon: HALOT
  rationale: Se conserva la cadena genealógica literal para identificar con precisión al rey del norte, como en el hebreo y en el inglés auditado.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - monarca de Israel
  lexicon: HALOT
  rationale: Título real directo y sin expansión; mantiene la sobriedad del texto fuente.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - con estas palabras
  - y le dijo
  lexicon: HALOT
  rationale: Introducción estándar del discurso directo; «diciendo» conserva la estructura hebrea con naturalidad.
- source_word: לְכָה
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Vamos
  - Ven ahora
  lexicon: HALOT
  rationale: Imperativo idiomático de desafío o convocatoria; «Ven» es la forma más natural en español para iniciar el reto.
- source_word: נִתְרָאֶה פָנִים
  english_pob_choice: let us look one another in the face
  chosen_spanish: enfrentémonos cara a cara
  alternatives_spanish:
  - veámonos cara a cara
  - miremos uno al otro el rostro
  lexicon: HALOT
  rationale: El hebreo es literalmente un modismo de «ver rostros»; en este contexto expresa un encuentro directo y desafiante. En español, «enfrentémonos cara a cara» comunica ese valor sin introducir explícitamente una expansión interpretativa que el texto revisado del inglés evitó.
theological_decisions:
- issue: Naturaleza del encuentro sugerido por el modismo final
  english_pob_reading: The Hebrew idiom means to meet each other directly, here in the sense of military confrontation.
  chosen_spanish_reading: El modismo apunta a un encuentro directo y desafiante; el español lo expresa como reto cara a cara sin añadir «batalla» en el texto principal.
  alternative_spanish_readings:
  - enfrentémonos en batalla
  - veámonos cara a cara
  rationale: 'El audit trail inglés revisó una expansión interpretativa hacia «in battle» y prefirió una traducción más literal del modismo. El español conserva esa tensión: el contexto narrativo sugiere hostilidad, pero el texto no la explicita con una glosa añadida en la línea principal.'
  doctrine_reference: Principio de fidelidad semántica al modismo hebreo sin sobrerinterpretación contextual
translation_notes:
  revision_awareness: 'El inglés POB revisó la última cláusula desde una expansión interpretativa («in battle») hacia una traducción más literal del modismo hebreo («look one another in the face»). La versión española sigue esa revisión: conserva el carácter desafiante del intercambio sin añadir explícitamente «batalla» en el texto principal.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma editorial general del proyecto, pero este versículo no contiene el nombre divino.
  - «Joás» se eligió por naturalidad en español bíblico; se documenta la variante convencional en nota.
  - La fórmula «cara a cara» preserva el modismo sin calcar de manera dura el hebreo.
