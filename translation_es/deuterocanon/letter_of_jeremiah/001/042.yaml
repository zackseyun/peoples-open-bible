    issue: 'Expresión poco natural: «con cuerdas ceñidas alrededor de sí»'
    rationale: Aunque transmite la idea general, «ceñidas alrededor de sí» suena mecánico y menos idiomático en español moderno. El participio griego pide más bien la idea de haberse puesto algo alrededor, no necesariamente de algo ‘ceñido’.
  - severity: low
    issue: La nota [b] puede expresar mejor la función de «salvado»
    rationale: El inglés explica que el salvado se usa como material que produce humo, y que no se emplea la palabra usual para incienso. «Ofrenda de humo o similar» introduce una categoría algo más interpretativa de lo necesario.
