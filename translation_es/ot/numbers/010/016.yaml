    issue: 'La cláusula principal suena poco natural: «Y sobre la compañía ... estaba Eliab»'
    rationale: Aunque calca razonablemente el inglés y el hebreo, en español es más claro y digno decir «estaba Eliab» con una estructura posesiva de mando más natural, por ejemplo «Al frente de la compañía...».
  - severity: low
    issue: La nota al pie incluye «host» como alternativa española
    rationale: «Host» no es español; parece arrastre del inglés. Debe suprimirse para mantener calidad idiomática.
