translation:
  language: es
  text: A aquellos a quienes las picaduras de langostas y moscas mataron, no se halló remedio para su vida[a], pues eran dignos de ser castigados por tales cosas[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no se halló remedio para su alma». Aquí se prefiere «vida» porque el contexto habla de muerte corporal causada por las picaduras.
    reason: lexical_alternative
  - marker: b
    text: O «por tales criaturas»; el griego dice más ampliamente «por tales cosas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκρίδων
  english_pob_choice: locusts
  chosen_spanish: langostas
  alternatives_spanish:
  - saltamontes
  lexicon: LSJ
  rationale: ἀκρίς suele referirse a la langosta; en este contexto de plaga, «langostas» es el equivalente español más natural y reconoce mejor el trasfondo bíblico.
- source_word: μυιῶν
  english_pob_choice: flies
  chosen_spanish: moscas
  lexicon: LSJ
  rationale: El sentido ordinario de μυῖα es «mosca»; no hay base para restringirlo más.
- source_word: δήγματα
  english_pob_choice: bites
  chosen_spanish: mordeduras
  alternatives_spanish:
  - picaduras
  lexicon: LSJ
  rationale: δήγματα puede abarcar mordidas o picaduras causadas por criaturas. «Mordeduras» conserva la fuerza concreta sin forzar una imagen técnica de picadura.
- source_word: ἀπέκτεινεν
  english_pob_choice: killed
  chosen_spanish: mataron
  alternatives_spanish:
  - mataron de muerte
  - dieron muerte
  lexicon: LSJ
  rationale: El verbo expresa causar la muerte de forma directa. En español, «mataron» es la correspondencia idiomática más clara.
- source_word: οὐχ εὑρέθη ἴαμα
  english_pob_choice: no remedy was found
  chosen_spanish: no se halló remedio
  alternatives_spanish:
  - no se halló curación
  - no se encontró sanidad
  lexicon: LSJ
  rationale: ἴαμα significa remedio o curación. «No se halló remedio» sigue de cerca la construcción pasiva y conserva el sentido médico sin sonar arcaico.
- source_word: τῇ ψυχῇ αὐτῶν
  english_pob_choice: for their life
  chosen_spanish: para su vida
  alternatives_spanish:
  - para su alma
  - para ellos
  lexicon: LSJ
  rationale: Aquí ψυχή se entiende como vida, no como alma en sentido metafísico, porque el contexto trata de muerte corporal por las mordeduras.
- source_word: ἄξιοι ἦσαν
  english_pob_choice: they were worthy
  chosen_spanish: eran dignos
  alternatives_spanish:
  - merecían
  lexicon: LSJ
  rationale: La frase expresa idoneidad o merecimiento. «Eran dignos» conserva la correspondencia formal, aunque en contexto implica merecer castigo.
- source_word: ὑπὸ τοιούτων
  english_pob_choice: by such things
  chosen_spanish: por tales cosas
  alternatives_spanish:
  - por tales criaturas
  - mediante tales cosas
  lexicon: LSJ
  rationale: El griego es deliberadamente amplio. «Por tales cosas» mantiene esa amplitud sin estrechar innecesariamente el referente.
- source_word: κολασθῆναι
  english_pob_choice: to be punished
  chosen_spanish: ser castigados
  alternatives_spanish:
  - ser punidos
  - ser corregidos
  lexicon: LSJ
  rationale: κολάζω aquí tiene sentido punitivo. «Ser castigados» es claro en español y preserva el matiz judicial.
theological_decisions:
- issue: Sentido de ψυχή en un contexto de muerte física
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  rationale: La frase se refiere a la ausencia de remedio ante una muerte producida por insectos; traducir ψυχή como «vida» evita imponer una antropología ajena al contexto inmediato.
  doctrine_reference: Primacía del original y conservación de la tensión teológica sin resolverla artificialmente.
- issue: Relación entre merecimiento y castigo
  english_pob_reading: because they were worthy to be punished by such things
  chosen_spanish_reading: pues eran dignos de ser castigados por tales cosas
  alternative_spanish_readings:
  - pues merecían ser castigados por tales criaturas
  rationale: La cláusula presenta el castigo como merecido. La traducción conserva esa afirmación judicial sin suavizarla ni ampliarla.
  doctrine_reference: Primacía del original y fidelidad al juicio retributivo del texto.
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente del audit trail inglés, que prefirió «remedy» sobre «healing» para ἴαμα. En español se reflejó con «remedio» y se mantuvo la lectura de ψυχή como «vida» por el contexto de muerte física.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se evitó «alma» en el texto principal porque el contexto inmediato es corporal; se preserva la alternativa en nota.
  - Se mantuvo un registro judicial con «castigados», coherente con κολασθῆναι y con la auditoría inglesa.
  - «Por tales cosas» conserva la amplitud del griego y no convierte el referente en una especie específica más allá de lo evidenciado.
