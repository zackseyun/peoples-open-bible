translation:
  language: es
  text: para guardar[a] los mandamientos de Yahvé y sus estatutos que yo te estoy mandando hoy para tu bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «observar» los mandamientos de Yahvé.
