translation:
  language: es
  text: Sea Dan una serpiente junto al camino, una víbora[a] junto al sendero, que muerde los talones del caballo de modo que su jinete cae hacia atrás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «áspid» para el raro término hebreo שְׁפִיפֹן; la especie exacta es incierta, pero el sentido es el de una serpiente peligrosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  english_pob_choice: Let ... be
  chosen_spanish: Permita ... ser
  alternatives_spanish:
  - Sea ...
  - Que ... sea
  lexicon: HALOT
  rationale: El jussivo expresa deseo/declaración poética; en español, «Permita ... ser» conserva ese matiz volitivo sin sonar rígido como un futuro simple.
- source_word: דָן
  english_pob_choice: Dan
  chosen_spanish: Dan
  alternatives_spanish:
  - Dan
  lexicon: Nombre propio
  rationale: Nombre propio transliterado de forma estándar y directa.
- source_word: נָחָשׁ
  english_pob_choice: serpent
  chosen_spanish: serpiente
  alternatives_spanish:
  - culebra
  - serpiente
  lexicon: HALOT
  rationale: «Serpiente» es natural y solemne en español; mantiene el registro poético sin forzar una especificación zoológica innecesaria.
- source_word: עֲלֵי דֶרֶךְ
  english_pob_choice: by the road
  chosen_spanish: junto al camino
  alternatives_spanish:
  - al borde del camino
  - por el camino
  lexicon: HALOT
  rationale: La preposición con «camino» sitúa a la serpiente en posición de acecho. «Junto al camino» expresa bien esa relación locativa e imagística.
- source_word: שְׁפִיפֹן
  english_pob_choice: viper
  chosen_spanish: víbora
  alternatives_spanish:
  - áspid
  - culebra venenosa
  - víbora
  lexicon: HALOT
  rationale: El término hebreo es raro y la especie precisa es incierta. «Víbora» comunica el peligro y la venenosidad sin fingir precisión taxonómica; por eso se conserva la nota de alternativa implícita en el sentido.
- source_word: עֲלֵי אֹרַח
  english_pob_choice: by the path
  chosen_spanish: junto al sendero
  alternatives_spanish:
  - al borde del sendero
  - por el sendero
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «camino» usando un sinónimo español natural para preservar la duplicación poética hebrea.
- source_word: הַנֹּשֵׁךְ
  english_pob_choice: that bites
  chosen_spanish: que muerde
  alternatives_spanish:
  - mordiente
  - la que muerde
  lexicon: HALOT
  rationale: El participio funciona de modo descriptivo; «que muerde» suena natural y conserva la acción característica de la serpiente.
- source_word: עִקְּבֵי סוּס
  english_pob_choice: the horse’s heels
  chosen_spanish: los talones del caballo
  alternatives_spanish:
  - los cascos del caballo
  - los talones de un caballo
  lexicon: HALOT
  rationale: «Talones» reproduce el valor de la imagen de la parte trasera baja de la pata. «Caballo» en singular genérico conserva la fuerza proverbial del hebreo.
- source_word: וַיִּפֹּל
  english_pob_choice: so that ... falls
  chosen_spanish: cae de modo que
  alternatives_spanish:
  - y cae
  - para que caiga
  - y así cae
  lexicon: HALOT
  rationale: La relación resultativa del waw consecutivo se expresa en español con una construcción causal/resultativa clara y natural.
- source_word: רֹכְבוֹ
  english_pob_choice: its rider
  chosen_spanish: su jinete
  alternatives_spanish:
  - su montador
  - el que lo monta
  lexicon: HALOT
  rationale: «Jinete» es la opción española más idiomática para quien va montado en el caballo, y mantiene la referencia al poseedor implícito del sufijo.
- source_word: אָחוֹר
  english_pob_choice: backward
  chosen_spanish: hacia atrás
  alternatives_spanish:
  - atrás
  - al revés
  lexicon: HALOT
  rationale: Adverbio direccional natural en español; conserva el movimiento de caída en dirección opuesta.
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto hebreo y el auditorio inglés POB: se mantuvo el paralelismo «camino/sendero», la imagen de acecho y la relación resultativa del mordisco con la caída del jinete. No se detectaron revisiones aplicadas en el expediente inglés, por lo que la redacción española refleja directamente el estado más reciente acordado.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - Se prefirieron equivalentes españoles transparentes y dignos, evitando calcos innecesarios.
  - «Víbora» se eligió por claridad, no por pretensión taxonómica; la nota conserva la alternativa de lectura del hebreo raro.
  - «Jinete» y no «cabalgador» o «jinete de él» por naturalidad idiomática en español.
  - Se mantuvo la diferencia poética entre «camino» y «sendero» para reflejar el paralelismo hebreo.
