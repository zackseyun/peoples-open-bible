review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro de auditoría inglés en la secuencia retórica, la confesión teológica («Dios»), y la inclusión final («tanto nosotros como aquel en cuya mano fue hallada la copa»). Sin embargo, no preserva bien la distinción documentada entre la primera autodenominación deferencial עֲבָדֶיךָ y la segunda declaración de estatus עֲבָדִים: el inglés POB auditado distingue «your slaves / my lord’s slaves» por política lexical, pero además añadió nota c para explicar que la primera instancia funciona como trato deferente ante un superior. En español, «tus esclavos» en la primera instancia suena menos natural y pierde ese matiz pragmático; conviene reflejarlo como «tus siervos» con nota explicativa, manteniendo «esclavos» en la segunda instancia, donde el sometimiento propuesto es el punto central.'
  spanish_quality_summary: El español es claro y digno, pero «¿Qué hablaremos?» resulta algo forzado en español bíblico-natural; «¿qué diremos?» / «¿qué hablaremos?» preserva la distinción formal del hebreo, aunque la segunda formulación sigue siendo algo rígida. Aun así, es aceptable. El principal problema de naturalidad y fidelidad pragmática está en «Dios ha hallado la culpa de tus esclavos», donde «tus siervos» encaja mucho mejor con el registro reverencial del discurso a José. También conviene completar las notas para reflejar la nota c del inglés POB y mantener la trazabilidad del razonamiento lexical.
  glossary_alignment: 'Alineación general buena: «Dios» para הָאֱלֹהִים, «esclavos» para la segunda instancia de עֲבָדִים, «copa» para הַגָּבִיעַ. La excepción necesaria es usar «siervos» en la primera instancia de עֲבָדֶיךָ por razón contextual documentada, no como abandono de la preferencia project-level sobre «slave».'
  issues:
  - severity: medium
    issue: La primera instancia de עֲבָדֶיךָ está traducida como «tus esclavos».
    rationale: Aunque la política general favorece «esclavo», aquí el propio rastro POB documenta que la primera ocurrencia es una autodenominación deferencial ante un superior. En español, «tus siervos» preserva mejor esa función pragmática sin negar la fuerza de «esclavos» en la segunda ocurrencia.
  - severity: medium
    issue: Falta una nota equivalente a la nota c del inglés POB sobre la distinción entre la primera y la segunda ocurrencia de עבד.
    rationale: La auditoría inglesa justificó explícitamente el contraste servants/slaves. Si el español adopta «siervos / esclavos», debe documentar esa decisión para conservar la trazabilidad lexical y teológica del proyecto.
  - severity: low
    issue: «¿Qué hablaremos?» suena algo tieso en español.
    rationale: Es una representación cercana de נְּדַבֵּר y mantiene la escalada retórica. No es un error grave, pero otras opciones como «¿qué más diremos?» o «¿qué hablaremos en defensa?» podrían sonar más idiomáticas. Dado el mandato de no parafrasear, puede mantenerse.
