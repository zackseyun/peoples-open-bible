translation:
  language: es
  text: Tanteamos la pared como los ciegos; como los que no tienen ojos tanteamos[a]. Tropezamos al mediodía como al anochecer; entre los vigorosos somos como los muertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «en lugares fértiles» o «entre los robustos»; el término hebreo es raro e incierto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְגַֽשְׁשָׁ֤ה / נְגַשֵּׁ֑שָׁה
  english_pob_choice: we grope
  chosen_spanish: tanteamos
  alternatives_spanish:
  - palpamos
  - andamos a tientas
  lexicon: HALOT
  rationale: El verbo hebreo expresa buscar o sentir con las manos en una situación de desorientación, como una persona ciega. «Tanteamos» comunica ese movimiento táctil de modo natural en español y conserva la repetición del paralelismo.
- source_word: כַֽ/עִוְרִים֙
  english_pob_choice: like the blind
  chosen_spanish: como los ciegos
  alternatives_spanish:
  - como los que están ciegos
  - como personas ciegas
  lexicon: HALOT
  rationale: El plural adjetival hebreo funciona como sustantivo colectivo. «Como los ciegos» es idiomático en español y mantiene el valor colectivo sin añadir información no explícita.
- source_word: קִיר
  english_pob_choice: the wall
  chosen_spanish: la pared
  alternatives_spanish:
  - el muro
  lexicon: HALOT
  rationale: En este contexto la imagen es la de ciegos palpando una superficie para orientarse. «Pared» es natural en español moderno y conserva la escena concreta.
- source_word: וּ/כְ/אֵ֥ין עֵינַ֖יִם
  english_pob_choice: like those without eyes
  chosen_spanish: como los que no tienen ojos
  alternatives_spanish:
  - como si no tuviéramos ojos
  - como personas sin ojos
  lexicon: HALOT
  rationale: La expresión intensifica la imagen de ceguera. «Los que no tienen ojos» conserva el giro comparativo sin suavizarlo ni convertirlo en una mera figura introspectiva.
- source_word: כָּשַׁ֤לְנוּ
  english_pob_choice: we stumble
  chosen_spanish: tropezamos
  alternatives_spanish:
  - vacilamos
  - tambaleamos
  lexicon: HALOT
  rationale: כשל denota tropezar, fallar o vacilar al andar. «Tropezamos» ajusta bien a la imagen de movimiento impedido y al paralelo con la ceguera.
- source_word: בַֽ/צָּהֳרַ֨יִם֙
  english_pob_choice: at noon
  chosen_spanish: al mediodía
  alternatives_spanish:
  - a pleno día
  lexicon: HALOT
  rationale: El término señala la parte más luminosa del día. «Al mediodía» es la equivalencia natural y directa en español.
- source_word: כַּ/נֶּ֔שֶׁף
  english_pob_choice: as in the twilight
  chosen_spanish: como al anochecer
  alternatives_spanish:
  - como al caer la tarde
  - como al crepúsculo
  lexicon: HALOT
  rationale: El término puede referirse a la penumbra del atardecer. Aquí contrasta con «mediodía», por lo que «al anochecer» transmite bien la oposición entre luz plena y oscuridad creciente sin sobreespecificar.
- source_word: בָּ/אַשְׁמַנִּ֖ים
  english_pob_choice: among the vigorous
  chosen_spanish: entre los vigorosos
  alternatives_spanish:
  - entre los robustos
  - en lugares fértiles
  lexicon: HALOT
  rationale: La palabra hebrea es rara y de sentido incierto; el POB inglés opta por «vigorous». «Vigorosos» conserva ese valor de gente sana/fuerte y mantiene la tensión del contraste. Se preserva la posibilidad alternativa en nota.
- source_word: כַּ/מֵּתִֽים
  english_pob_choice: like the dead
  chosen_spanish: como los muertos
  alternatives_spanish:
  - como muertos
  - como los difuntos
  lexicon: HALOT
  rationale: La comparación final es tajante. «Como los muertos» mantiene la fuerza colectiva y la brevedad del hebreo.
translation_notes:
  revision_awareness: La revisión reciente del POB inglés cambió «the strong» por «the vigorous» para reflejar mejor el matiz del hebreo; por eso se evitó «fuertes» y se eligió «vigorosos», manteniendo la incertidumbre léxica documentada en la nota.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo repetido de «tanteamos» para reflejar la repetición hebrea y el audit trail inglés.
  - Se eligió «mediodía» frente a «medio día» por claridad y uso bíblico moderno en español.
  - Se evitó «SEÑOR» u otra normalización teológica porque este versículo no contiene el Tetragrámaton.
  - «Pared» y no «muro» porque el contexto visual es doméstico/descriptivo y la frase fluye mejor en español.
  - La nota conserva la ambigüedad de בָּאַשְׁמַנִּים sin eliminar la opción locativa documentada.
