review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido global del hebreo: propósito de huida, homicidio no intencional, y función protectora de las ciudades. Sin embargo, en מִגֹּאֵל הַדָּם el hebreo y el inglés auditado expresan protección ''del/de parte del vengador de sangre'', no ''contra'' en sentido adversativo. Además, la nota b del inglés preserva la alternativa principal inversa (''from the blood avenger''), pero en español la nota actual repite una preposición que no corresponde al texto principal.'
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. 'Homicida' funciona bien para רוֹצֵחַ en este contexto jurídico, y 'sin saberlo' comunica fluidamente בִּבְלִי דָעַת. La frase 'que hiere de muerte a una persona' es comprensible, aunque algo más pesada que 'que mata a una persona'; no requiere corrección. El ajuste principal es preposicional y de consistencia nota-texto.
  glossary_alignment: No hay términos del glosario principal en conflicto. Las decisiones 'homicida', 'persona', 'refugio' y 'vengador de sangre' concuerdan con la racionalidad documentada. Debe alinearse mejor מִגֹּאֵל הַדָּם como 'del vengador de sangre' en el texto principal, con nota alternativa 'O «del vengador de la sangre»' o similar si se desea.
  issues:
  - severity: medium
    issue: Preposición inexacta en 'contra el vengador de sangre'
    rationale: מִן + גֹּאֵל הַדָּם indica refugio 'del' vengador de sangre, es decir, protección frente a él, no una oposición formulada como 'contra'. 'Del' o 'frente al' preserva mejor la relación fuente/separación del hebreo y del English POB.
  - severity: low
    issue: Desajuste entre texto principal y nota b
    rationale: La nota b dice 'O «del vengador de sangre»', pero el texto principal usa 'contra'. La alternativa de la nota debería corresponder a una variante real y no corregir implícitamente el texto principal.
  revised_spanish_text: para que pueda huir allí el homicida que hiere de muerte a una persona por accidente[a], sin saberlo, y les servirán de refugio[b] del vengador de sangre.
  revised_footnotes:
  - marker: a
    text: O «sin intención», o «inadvertidamente». El hebreo usa dos expresiones que subrayan que no se trata de un homicidio deliberado.
    reason: lexical_alternative
  - marker: b
    text: O «del vengador de la sangre». La frase alude al pariente responsable de reclamar justicia por la muerte dentro del sistema legal israelita.
    reason: cultural_note
  revision_rationale: 'El borrador solo necesita una reparación menor para ajustar la preposición al hebreo מִן y al English POB: las ciudades son refugio ''del'' vengador de sangre, no ''contra'' él. Se mantiene el resto del texto, que representa bien el sentido legal de homicidio involuntario y la función de las ciudades de refugio.'
