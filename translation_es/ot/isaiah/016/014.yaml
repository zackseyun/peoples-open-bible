    text: O “el remanente será escaso, muy pequeño, no grande/fuerte”.
    reason: lexical_alternative
  revision_rationale: Se corrige una formulación española poco idiomática ('será poco' -> 'será escaso'), se reubica la nota temporal en su frase correspondiente y se añaden las dos alternativas léxicas significativas que el rastro inglés documenta para mantener fidelidad al audit trail y mejor legibilidad en español.
