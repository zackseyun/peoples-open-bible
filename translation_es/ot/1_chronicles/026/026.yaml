translation:
  language: es
  text: Shelomot y sus hermanos estaban a cargo de todas las tesorerías de las cosas santas[a] que habían dedicado el rey David, los jefes de las casas paternas[b], los comandantes de miles y de cientos, y los comandantes del ejército.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las cosas sagradas' o 'los dones dedicados'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''los jefes de las casas paternas'', un término administrativo basado en clanes.'
    reason: cultural_note
lexical_decisions:
- source_word: שְׁלֹמ֣וֹת
  english_pob_choice: Shelomoth
  chosen_spanish: Shelomot
  alternatives_spanish:
  - Shelomoth
  - Selomot
  lexicon: HALOT
  rationale: Se translitera el nombre propio sin traducirlo. Se adapta la terminación a una forma española natural y fácil de leer, sin alterar la identidad del personaje.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus hermanos varones
  lexicon: HALOT
  rationale: אֲחִים/אֶחָיו se rinde de forma directa como 'hermanos'. En este contexto administrativo-levítico, la relación puede ser amplia, pero la forma hebrea sigue siendo la de parentesco masculino cercana.
- source_word: עַל
  english_pob_choice: were over
  chosen_spanish: estaban sobre
  alternatives_spanish:
  - estaban a cargo de
  - eran responsables de
  lexicon: HALOT
  rationale: En contexto de administración, עַל expresa supervisión u autoridad. 'Estaban sobre' conserva la imagen relacional del hebreo; 'a cargo de' sería una alternativa más explicativa.
- source_word: כָּל אֹצְרוֹת
  english_pob_choice: all the treasuries
  chosen_spanish: todos los tesoros
  alternatives_spanish:
  - todos los tesoros guardados
  - todos los almacenes
  lexicon: HALOT
  rationale: אֹצָרוֹת puede referirse a tesoros o depósitos/almacenes. En español, 'tesoros' comunica bien el contenido valioso y consagrado; la frase siguiente precisa su carácter sacro.
- source_word: הַקֳּדָשִׁים
  english_pob_choice: of the holy things
  chosen_spanish: de las cosas santas
  alternatives_spanish:
  - de las cosas sagradas
  - de los objetos santos
  lexicon: HALOT
  rationale: Se preserva el valor cultual de קֹדֶשׁ sin sustituirlo por una paráfrasis. 'Cosas santas' suena un poco más bíblico y directo; 'sagradas' sería una alternativa igualmente válida.
- source_word: אֲשֶׁר הִקְדִּישׁ
  english_pob_choice: that ... had dedicated
  chosen_spanish: que ... había dedicado
  alternatives_spanish:
  - que ... había consagrado
  - que ... había apartado para Dios
  lexicon: HALOT
  rationale: הִקְדִּישׁ en hiphil puede significar dedicar o consagrar. 'Había dedicado' sigue de cerca la decisión inglesa y encaja con el inventario de bienes sagrados.
- source_word: דָּוִיד הַמֶּלֶךְ
  english_pob_choice: King David
  chosen_spanish: el rey David
  alternatives_spanish:
  - David el rey
  - el rey, David
  lexicon: HALOT
  rationale: Se mantiene el orden natural del español con título + nombre. No se introduce un giro más interpretativo.
- source_word: רָאשֵׁי הָאָבוֹת
  english_pob_choice: the heads of the fathers’ houses
  chosen_spanish: los jefes de las casas paternas
  alternatives_spanish:
  - los jefes de las casas de los padres
  - los jefes de los clanes paternos
  lexicon: HALOT
  rationale: Es un término técnico de organización por linajes. 'Casas paternas' conserva la estructura hebrea y comunica la unidad familiar-clánica sin reducirla indebidamente a 'familias'.
- source_word: שָׂרֵי הָאֲלָפִים וְהַמֵּאוֹת
  english_pob_choice: the commanders of thousands and hundreds
  chosen_spanish: los comandantes de los millares y de las centenas
  alternatives_spanish:
  - los comandantes de los mil y de los cien
  - los jefes de miles y centenas
  lexicon: HALOT
  rationale: Se preserva la organización militar-administrativa en unidades numéricas. 'Millares' y 'centenas' traduce con naturalidad el plural hebreo sin perder el valor técnico.
- source_word: שָׂרֵי הַצָּבָא
  english_pob_choice: the commanders of the army
  chosen_spanish: los comandantes del ejército
  alternatives_spanish:
  - los jefes del ejército
  - los oficiales del ejército
  lexicon: HALOT
  rationale: צָבָא aquí es fuerza militar, no 'hueste' celestial. 'Ejército' es claro y fiel al contexto histórico-administrativo.
theological_decisions:
- issue: Alcance de los que dedicaron las cosas santas
  english_pob_reading: All listed groups—King David, the heads of the fathers’ houses, the commanders of thousands and hundreds, and the commanders of the army—are understood as joint dedicators.
  chosen_spanish_reading: Todos los grupos enumerados —el rey David, los jefes de las casas paternas, los comandantes de los millares y de las centenas, y los comandantes del ejército— se entienden como dedicantes conjuntos.
  alternative_spanish_readings:
  - Solo el rey David habría dedicado las cosas santas, y los demás grupos serían solo referencias asociadas.
  - Los grupos posteriores podrían ser aposiciones explicativas más que sujetos coordinados.
  rationale: El hebreo coordina los grupos con וְ y el contexto favorece una lectura colectiva. La traducción española mantiene esa coordinación y evita restringir indebidamente el acto de dedicar a una sola persona.
  doctrine_reference: Organización cultual e histórica de 1 Crónicas; lectura gramatical del sujeto colectivo en coordinación hebrea.
translation_notes:
  revision_awareness: La redacción española sigue de cerca el último estado del audit trail inglés, incluyendo la coordinación explícita 'de los millares y de las centenas' y la lectura colectiva de los dedicantes. Se conservó la distinción cultual de 'cosas santas' como alternativa anotada.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; este verso no lo contiene.
  - '''Mesías/Cristo'' no aplica aquí.'
  - Se mantuvo 'comandantes' para שָׂרִים, coherente con el inglés auditado.
  - La sintaxis española preserva la enumeración y evita convertirla en una paráfrasis interpretativa.
