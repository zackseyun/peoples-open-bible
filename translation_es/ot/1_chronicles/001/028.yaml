translation:
  language: es
  text: 'Los hijos de Abraham: Isaac e Ismael[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendientes de» en sentido genealógico más amplio; el hebreo dice literalmente «hijos de».
