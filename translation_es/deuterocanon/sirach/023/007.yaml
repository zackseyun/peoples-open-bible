review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: un imperativo plural dirigido a «children», una referencia a la instrucción relacionada con la boca/habla, y la consecuencia de que quien la guarda no será atrapado. Sin embargo, hay dos desajustes importantes con la evidencia y el rastro POB: (1) la nota [b] está anclada a «hijos» pero en realidad explica la negación enfática de la cláusula final; (2) «no será ciertamente atrapado» suena poco natural en español y no expresa el énfasis de la mejor manera.'
  spanish_quality_summary: 'El español es generalmente claro, pero mezcla registro peninsular en «Oíd» con el objetivo de español neutral latinoamericano. Además, «de la boca» es comprensible pero algo rígido; con la nota ya presente puede mantenerse, aunque «sobre el habla» sería más idiomático. La reparación principal es de naturalidad y de ubicación de nota: «escuchen» y «de ningún modo será atrapado» leen mejor y conservan dignidad.'
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé, Mesías, Espíritu, etc. Las decisiones léxicas principales son aceptables: Παιδείαν = «instrucción», ὁ φυλάσσων = «el que la guarda». Para τέκνα, «hijos» es defendible en contexto sapiencial, pero «hijos» con «escuchen» mantiene un tono bíblico legible. La negación οὐ μὴ debe reflejarse con una formulación enfática más natural en español que «ciertamente».'
  issues:
  - severity: high
    issue: La nota [b] está colocada en «hijos» pero su contenido trata la negación enfática final.
    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente. Aquí [b] debe ir en la cláusula «de ningún modo será atrapado» o equivalente, no en el vocativo «hijos».
  - severity: medium
    issue: «Oíd» no encaja bien con la meta de español neutral latinoamericano.
    rationale: Aunque es correcto, suena marcadamente peninsular. «Escuchen» conserva el imperativo plural y el tono digno con mayor neutralidad panhispánica eclesial.
  - severity: medium
    issue: «No será ciertamente atrapado» suena poco idiomático en español.
    rationale: La colocación de «ciertamente» después de la negación resulta forzada. Para οὐ μὴ es más natural «de ningún modo será atrapado» o «jamás será atrapado».
  revised_spanish_text: Escuchen la instrucción de la boca[a], hijos, y el que la guarda de ningún modo será atrapado[b].
  revised_footnotes:
  - marker: a
    text: También puede entenderse «instrucción acerca de la boca» o «disciplina de la boca». El griego es compacto y permite varias formulaciones cercanas.
    reason: lexical_alternative
  - marker: b
    text: 'La negación enfática del griego puede traducirse también: «no será tomado en absoluto» o «jamás será atrapado».'
    reason: lexical_alternative
  revision_rationale: Se corrigió la ubicación de la nota [b] para que corresponda a la negación enfática final, se ajustó el imperativo a «Escuchen» para adecuarlo al español neutral latinoamericano, y se reemplazó «no será ciertamente atrapado» por «de ningún modo será atrapado» para expresar con naturalidad el énfasis de οὐ μὴ.
