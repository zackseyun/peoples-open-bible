review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego: ἀνέστη = «se levantó», ὁ καλούμενος = «llamado», υἱὸς αὐτοῦ = «su hijo», ἀντʼ αὐτοῦ = «en su lugar». Sin embargo, la nota al pie está mal planteada como alternativa léxica, porque «Macabeo» ya es la forma elegida en el texto y no una alternativa al griego; la nota inglesa explica la forma griega frente a una anglicización tradicional. En español no hace falta conservar esa nota tal como está, y además puede inducir confusión.'
  spanish_quality_summary: El español es natural y claro. «Y se levantó Judas, llamado Macabeo, su hijo, en su lugar» suena digno y fiel. No obstante, la coma tras «Judas» puede hacer ligeramente más pesada la apposición; «Judas, a quien llamaban Macabeo, su hijo, se levantó en su lugar» sería menos directo. La redacción actual es aceptable, pero conviene una leve mejora estilística manteniendo cercanía al griego.
  glossary_alignment: No hay términos del glosario principal en juego salvo el nombre propio. «Macabeo» es una forma española asentada y adecuada para Μακκαβαῖος. No hay conflicto con terminología teológica del proyecto.
  issues:
  - severity: medium
    issue: La nota al pie [a] no preserva correctamente la lógica de la nota inglesa ni añade valor en español.
    rationale: La nota inglesa contrasta «Maccabeus» con la forma anglicizada «Maccabee». En español, el texto ya usa «Macabeo», que es la forma normal española; decir en nota «tradicionalmente españolizado como “Macabeo”» repite el texto en vez de aportar una alternativa o aclaración real.
  - severity: low
    issue: Puntuación algo rígida en la secuencia aposicional.
    rationale: La estructura «Judas[a], llamado Macabeo, su hijo, en su lugar» es fiel pero un poco cargada. Reordenar mínimamente mejora la fluidez sin apartarse del griego.
  revised_spanish_text: Y se levantó Judas, llamado Macabeo, su hijo, en su lugar.
  revision_rationale: Se elimina la nota innecesaria y confusa sobre «Macabeo», ya que no conserva una alternativa significativa en español ni refleja adecuadamente la razón de la nota inglesa. Se mantiene la traducción principal por ser fiel al griego y natural en español.
