translation:
  language: es
  text: Entonces Job se levantó[a], rasgó su manto, se afeitó la cabeza, cayó a tierra y se inclinó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se puso en pie».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: El wayyiqtol de קום marca una acción siguiente en la narración. En español, «se levantó» comunica con naturalidad ese avance secuencial sin perder el matiz de ponerse en acción.
- source_word: מְעִילוֹ
  english_pob_choice: his robe
  chosen_spanish: su manto
  alternatives_spanish:
  - su ropa exterior
  - su túnica
  lexicon: HALOT
  rationale: מְעִיל designa una prenda exterior importante. «Manto» conserva mejor el valor de vestidura exterior que un término más general y resulta claro en español bíblico contemporáneo.
- source_word: וַיִּקְרַע אֶת מְעִילוֹ
  english_pob_choice: tore his robe
  chosen_spanish: rasgó su manto
  alternatives_spanish:
  - desgarró su manto
  - rompió su manto
  lexicon: HALOT
  rationale: קרע en contexto de duelo expresa rasgar vestiduras. «Rasgó» preserva la acción concreta y el tono de luto sin recurrir a un arcaísmo innecesario.
- source_word: וַיָּגָז אֶת רֹאשׁוֹ
  english_pob_choice: shaved his head
  chosen_spanish: se afeitó la cabeza
  alternatives_spanish:
  - se rapó la cabeza
  - se cortó el cabello
  lexicon: HALOT
  rationale: גזז alude a cortar o esquilar, aquí aplicado al cabello. «Se afeitó la cabeza» es la forma más natural para expresar ese gesto de duelo en español y mantiene la concreción del acto.
- source_word: וַיִּפֹּל אַרְצָה
  english_pob_choice: fell to the ground
  chosen_spanish: se postró en tierra
  alternatives_spanish:
  - cayó al suelo
  - cayó a tierra
  lexicon: HALOT
  rationale: La forma direccional indica caída hacia el suelo. «Se postró en tierra» integra la caída con la postura resultante y es una equivalencia natural para el movimiento corporal descrito.
- source_word: וַיִּשְׁתָּחוּ
  english_pob_choice: bowed down
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se postró
  - se reverenció
  lexicon: HALOT
  rationale: El verbo se refiere a doblarse o inclinarse profundamente. Dado que el audit trail inglés retiró «in worship» por no estar explícito en este versículo, «se inclinó» conserva el gesto físico sin añadir una especificación cultual no dicha aquí.
theological_decisions:
- issue: Si el último gesto debe explicitar adoración o mantenerse como inclinación/prosternación corporal
  english_pob_reading: bowed down
  chosen_spanish_reading: se inclinó
  alternative_spanish_readings:
  - se postró
  - adoró
  rationale: El texto hebreo termina con el verbo de inclinarse/prosternarse, y la revisión inglesa eliminó la explicitación «in worship». Por eso en español se evita «adoró» y se mantiene una expresión corporal abierta, dejando que el contexto inmediato provea el sentido reverente sin sobretraducirlo.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB en inglés, que eliminó «in worship» para reflejar que el hebreo dice simplemente «se inclinó / se prosternó». Por eso la traducción española evita añadir adoración explícita y conserva el gesto físico.
  spanish_consistency_notes:
  - Se mantuvo una secuencia verbal simple y narrativa, acorde con el hebreo wayyiqtol.
  - «Manto» se usa como equivalente natural de מְעִיל en un contexto de duelo.
  - Se evitó «adoró» para respetar la decisión revisada del texto base inglés y no añadir un matiz no explicitado en este versículo.
  - La puntuación coordina los cinco movimientos con comas y la conjunción final «y», siguiendo el flujo narrativo del original.
