translation:
  language: es
  text: 'Porque así dice Yahvé: He aquí[a], los que no fueron sentenciados[b] a beber la copa beberán ciertamente; ¿y tú eres el que quedará sin castigo? No quedarás sin castigo[c], porque ciertamente beberás.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Miren» o «Vean». El hebreo usa una partícula deíctica que introduce solemnemente la declaración profética.'
    reason: alternative_reading
  - marker: b
    text: 'O: «a quienes no les correspondía beber la copa». El hebreo מִשְׁפָּט puede significar «sentencia», «justicia» o «debido legal».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «¿serás absuelto? No serás absuelto». La raíz נקה también puede expresar la idea de quedar libre de culpa o de ser declarado inocente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el default del proyecto para el nombre divino, manteniendo la referencia al nombre propio del pacto y evitando la máscara litúrgica de «SEÑOR».
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  lexicon: HALOT
  rationale: Conserva el valor deíctico y solemne del llamado profético, con una forma natural y reconocible en español bíblico contemporáneo.
- source_word: אֲשֶׁר אֵין מִשְׁפָּטָם לִשְׁתּוֹת הַכּוֹס
  english_pob_choice: those who were not sentenced to drink the cup
  chosen_spanish: los que no estaban destinados a beber la copa
  alternatives_spanish:
  - los que no fueron sentenciados a beber la copa
  - los que no tenían por derecho beber la copa
  - los que no les correspondía beber la copa
  lexicon: HALOT
  rationale: מִשְׁפָּט puede comunicar sentencia, derecho legal o debida obligación. En español, «destinados» mantiene la fuerza judicial-teleológica sin sonar excesivamente técnico; la alternativa con «sentenciados» queda cercana al matiz forense documentado por el audit trail.
- source_word: הַכּוֹס
  english_pob_choice: the cup
  chosen_spanish: la copa
  alternatives_spanish:
  - el cáliz
  - la taza
  lexicon: HALOT
  rationale: Se conserva la metáfora profética literal. En español, «copa» es la forma más transparente y estable para este símbolo de juicio divino.
- source_word: שָׁתוֹ יִשְׁתּוּ
  english_pob_choice: will surely drink
  chosen_spanish: beberán ciertamente
  alternatives_spanish:
  - ciertamente beberán
  - habrán de beber
  - beberán sin falta
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito expresa certeza e intensidad; «beberán ciertamente» reproduce esa fuerza sin añadir explicaciones.
- source_word: וְאַתָּה הוּא
  english_pob_choice: and are you the one
  chosen_spanish: ¿y tú eres el que
  alternatives_spanish:
  - ¿y tú mismo eres el que
  - ¿y tú eres aquel que
  lexicon: HALOT
  rationale: La construcción enfática se vierte de modo natural en interrogación retórica, manteniendo el tono confrontativo del hebreo.
- source_word: נָקֹה תִּנָּקֶה ... לֹא תִנָּקֶה
  english_pob_choice: who will go unpunished? You will not go unpunished
  chosen_spanish: quedará sin castigo? No quedarás sin castigo
  alternatives_spanish:
  - será absuelto? No serás absuelto
  - quedará libre de culpa? No quedarás libre de culpa
  - saldrá impune? No saldrás impune
  lexicon: HALOT
  rationale: נקה en este contexto judicial y de juicio se traduce de forma idiomática con «quedar sin castigo», preservando la fuerza de impunidad/absuelto sin forzar un tecnicismo legal.
- source_word: כִּי שָׁתֹה תִּשְׁתֶּה
  english_pob_choice: for you will surely drink
  chosen_spanish: porque ciertamente beberás
  alternatives_spanish:
  - porque habrás de beber
  - pues sin falta beberás
  - porque beberás de seguro
  lexicon: HALOT
  rationale: La duplicación verbal intensifica la certeza del juicio; «ciertamente beberás» expresa esa inevitabilidad en español natural y sobrio.
theological_decisions:
- issue: Metáfora de la copa
  english_pob_reading: Retain 'the cup' as a metaphor for divinely imposed judgment rather than explicating it as 'the cup of wrath' in the main text.
  chosen_spanish_reading: Mantener «la copa» como metáfora de juicio divinamente impuesto, sin explicitarla como «copa de ira» en el texto principal.
  alternative_spanish_readings:
  - la copa de ira
  - la copa del juicio
  rationale: El hebreo dice solo «la copa»; el contexto profético permite la lectura de juicio, pero no obliga a añadir un calificativo interpretativo en el cuerpo del versículo.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se incorporó la revisión más reciente que eliminó el pronombre innecesario tras «beber», manteniendo una redacción más literal y natural. También se conservó el acuerdo de alto nivel del audit trail sobre la metáfora de la copa y la fuerza forense de נקה.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se mantiene la metáfora literal «la copa» sin expansión a «ira» o «juicio» en el texto principal.
  - «Destinados a beber» busca equilibrar el matiz forense de מִשְׁפָּט con español natural; la nota explica la alternativa más literal.
  - «Quedar sin castigo» preserva el valor judicial de נקה sin introducir una formulación eclesiástica tradicional que no está en el source packet.
  - La puntuación refleja una sola unidad profética con dos preguntas retóricas y una conclusión causal final.
