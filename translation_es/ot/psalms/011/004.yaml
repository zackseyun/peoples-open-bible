translation:
  language: es
  text: Yahvé está en su santo templo[a]; Yahvé—su trono está en los cielos. Sus ojos ven[b]; sus párpados examinan[c] a los hijos del hombre[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'santuario' o 'palacio' para הֵיכָל; aquí se prefiere 'templo' por el contexto poético y cultual.
    reason: lexical_alternative
  - marker: b
    text: O 'Sus ojos contemplan'.
    reason: lexical_alternative
  - marker: c
    text: O 'sus párpados prueban'.
    reason: lexical_alternative
  - marker: d
    text: O 'los hijos de Adán'; más ampliamente, 'la humanidad' o 'los seres humanos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como transliteración reverente y auditable. 'Yahvé' sigue el criterio del proyecto; 'el SEÑOR' ocultaría el nombre propio y 'Jehová' es una forma tradicional menos consistente con la evidencia lingüística.
- source_word: בְּהֵיכַל קָדְשׁוֹ
  english_pob_choice: in his holy temple
  chosen_spanish: en su santo templo
  alternatives_spanish:
  - en su templo santo
  - en su santuario santo
  lexicon: HALOT
  rationale: '''Templo'' comunica היטב el lugar sagrado de morada/entronización sin forzar ''palacio''. ''Santo'' traduce קָדְשׁוֹ de forma directa y natural en español bíblico moderno.'
- source_word: בַּשָּׁמַיִם כִּסְאוֹ
  english_pob_choice: his throne is in heaven
  chosen_spanish: su trono está en los cielos
  alternatives_spanish:
  - su trono está en el cielo
  - su trono está en los cielos
  lexicon: HALOT
  rationale: Se mantiene el plural hebreo 'cielos' para no borrar el matiz poético del original, aunque en español 'cielo' sería posible en un registro más idiomático. Aquí se prefiere la forma más fuente-cercana.
- source_word: עֵינָיו יֶחֱזוּ
  english_pob_choice: His eyes see
  chosen_spanish: Sus ojos ven
  alternatives_spanish:
  - Sus ojos miran
  - Sus ojos contemplan
  lexicon: HALOT
  rationale: חזה puede ser 'ver' o 'contemplar'. 'Ven' es la opción más directa y clara en español, y conserva la relación paralela con 'sus párpados' sin elevar innecesariamente el tono.
- source_word: עַפְעַפָּיו יִבְחֲנוּ
  english_pob_choice: his eyelids examine
  chosen_spanish: sus párpados examinan
  alternatives_spanish:
  - sus párpados prueban
  - su mirada examina
  lexicon: HALOT
  rationale: Se mantiene la imagen antropomórfica literal. 'Examinan' refleja bien el matiz de בחן ('examinar, probar') y evita perder la idea de evaluación activa que contrasta con solo 'ver'.
- source_word: בְּנֵי אָדָם
  english_pob_choice: the children of man
  chosen_spanish: a los hijos del hombre
  alternatives_spanish:
  - a los hijos de Adán
  - a la humanidad
  - a los seres humanos
  lexicon: HALOT
  rationale: Se preserva el giro idiomático y la fuerza colectiva/representativa del hebreo sin neutralizarlo demasiado. 'Hijos del hombre' conserva la forma genética del original; se añade la preposición por el ajuste sintáctico natural en español tras 'examinan'.
theological_decisions:
- issue: Tensión entre templo santo y trono en los cielos
  english_pob_reading: The verse presents Yahweh as in his holy temple and his throne in heaven, preserving the poetic tension rather than collapsing the locations.
  chosen_spanish_reading: Yahvé está en su santo templo; Yahvé—su trono está en los cielos.
  alternative_spanish_readings:
  - 'Yahvé está en su santo templo: Yahvé, su trono está en los cielos'
  - Yahvé está en su santo templo, y su trono está en los cielos
  rationale: La redacción conserva ambas afirmaciones yuxtapuestas sin armonizarlas ni identificar el templo con el cielo. El guion largo y el segundo enunciado mantienen la estructura de casus pendens y la tensión poética del hebreo.
  doctrine_reference: Translation philosophy §3
- issue: Tratamiento de בְּנֵי אָדָם como colectivo humano
  english_pob_reading: the children of man
  chosen_spanish_reading: los hijos del hombre
  alternative_spanish_readings:
  - los hijos de Adán
  - la humanidad
  - los seres humanos
  rationale: Se conserva la expresión masculina colectiva del hebreo sin convertirla en un abstracto moderno. Así se mantiene la forma idiomática y el carácter representativo del término.
  doctrine_reference: 'Translation philosophy §4; Contested terms: אָדָם'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión del inglés POB: el ajuste de puntuación entre las dos proposiciones sobre Yahvé se refleja en español con punto y coma y raya, preservando la yuxtaposición explicativa sin fundir las cláusulas. También se preservó la elección auditada de mantener la tensión entre ''templo'' y ''cielos'' en lugar de resolverla interpretativamente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene el plural 'los cielos' para שָׁמַיִם por fidelidad al hebreo poético.
  - Se conserva la antropomorfía 'ojos/párpados' sin suavizarla.
  - Se usa 'hijos del hombre' para retener el valor colectivo de בְּנֵי אָדָם y evitar una neutralización excesiva.
