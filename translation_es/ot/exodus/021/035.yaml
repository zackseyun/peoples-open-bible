translation:
  language: es
  text: Y si el buey de un hombre embiste al buey de su prójimo, y este muere, venderán el buey vivo y dividirán su precio[a][b], y también dividirán el animal muerto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acornea»; el verbo hebreo puede denotar el golpe fuerte de un buey con los cuernos.
    reason: lexical_alternative
  - marker: b
    text: «Su precio» traduce aquí el valor de venta del buey vivo; literalmente, el hebreo dice «su plata/dinero».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «el muerto»; en contexto, se refiere al buey muerto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  - Y cuando
  lexicon: HALOT
  rationale: La cláusula es casuística, propia de un caso legal. «Y si» conserva la conexión con el contexto inmediato y la fuerza condicional sin sonar rígido en español.
- source_word: יִגֹּף
  english_pob_choice: strikes
  chosen_spanish: hiere
  alternatives_spanish:
  - golpea
  - embiste
  - acornea
  lexicon: HALOT
  rationale: El hebreo permite una acción de golpe o cornada; «hiere» comunica una acción dañina sin restringir demasiado el modo, manteniendo la amplitud del verbo.
- source_word: שׁוֹר אִישׁ
  english_pob_choice: one man's ox
  chosen_spanish: el buey de un hombre
  alternatives_spanish:
  - el buey de un varón
  - el buey de alguien
  lexicon: HALOT
  rationale: «El buey de un hombre» refleja la formulación legal singular del hebreo. «Buey» es un término natural y tradicional en español bíblico para este contexto.
- source_word: שׁוֹר רֵעֵהוּ
  english_pob_choice: his neighbor's ox
  chosen_spanish: el buey de su prójimo
  alternatives_spanish:
  - el buey de su vecino
  - el buey de su compañero
  lexicon: HALOT
  rationale: «Prójimo» conserva el valor relacional de רֵעַ, no solo geográfico sino interpersonal. «Vecino» sería posible, pero «prójimo» cubre mejor el campo semántico del hebreo.
- source_word: וָמֵת
  english_pob_choice: and it dies
  chosen_spanish: y este muere
  alternatives_spanish:
  - y muere
  - y llega a morir
  lexicon: HALOT
  rationale: Se refiere al buey herido del prójimo. «Este muere» evita ambigüedad en español y reproduce la consecuencia inmediata del hebreo.
- source_word: וּמָכְרוּ
  english_pob_choice: then they shall sell
  chosen_spanish: venderán
  alternatives_spanish:
  - y venderán
  - entonces venderán
  lexicon: HALOT
  rationale: En una disposición legal, el futuro español funciona bien como mandato procedimental. Se omite «entonces» por fluidez, ya que la secuencia ya queda clara por la estructura.
- source_word: הַשּׁוֹר הַחַי
  english_pob_choice: the live ox
  chosen_spanish: el buey vivo
  alternatives_spanish:
  - el buey que vive
  - el buey viviente
  lexicon: HALOT
  rationale: «Buey vivo» es la forma más natural y directa en español para el animal superviviente, equivalente al inglés POB y al hebreo.
- source_word: וְחָצוּ אֶת כַּסְפּוֹ
  english_pob_choice: divide its price
  chosen_spanish: dividirán su precio
  alternatives_spanish:
  - dividirán su dinero
  - partirán el dinero
  lexicon: HALOT
  rationale: כֶּסֶף aquí se refiere al valor de venta. «Su precio» expresa con claridad esa suma sin caer en una traducción demasiado literal de «plata/dinero».
- source_word: וְגַם אֶת הַמֵּת יֶחֱצוּן
  english_pob_choice: and they shall also divide the dead one
  chosen_spanish: y también dividirán el muerto
  alternatives_spanish:
  - y también dividirán el animal muerto
  - y también partirán el cadáver
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el muerto». Se conserva esa dureza formal para no borrar la tensión lexical del original; en contexto, se entiende que se trata del buey muerto.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje mantiene alto acuerdo con la auditoría inglesa y no requiere ajuste textual adicional en esta etapa.
  spanish_consistency_notes:
  - Se mantiene «buey» para שׁוֹר en este contexto legal, coherente con el registro bíblico castellano y con la imagen concreta del caso.
  - 'Se preserva el paralelismo jurídico de dos mitades: el buey vivo y el muerto, sin añadir explicaciones al cuerpo principal.'
  - «Prójimo» se usa de manera consistente para רֵעַ cuando el contexto es interpersonal y legal.
