revisions:
- from: Ese hombre subía de su ciudad año tras año para adorar y sacrificar a Yahvé de los Ejércitos en Silo. Y allí estaban los dos hijos de Elí, Ofni y Finees, como sacerdotes de Yahvé.
  to: Aquel hombre solía subir de su ciudad año tras año para adorar y sacrificar a Yahvé de los Ejércitos[a] en Silo. Y allí estaban los dos hijos de Elí, Ofni y Finees, como sacerdotes de Yahvé.
  rationale: Se ajusta «subía» a «solía subir» para reflejar con más claridad la acción habitual pasada de וְעָלָה en este contexto narrativo. Se cambia «Ese hombre» por «Aquel hombre» para corresponder un poco mejor al valor anafórico/distal de הָאִישׁ הַהוּא, aunque esto es un ajuste menor de estilo. Se añade la nota léxica documentada para la alternativa tradicional del título «Yahvé de los Ejércitos».
