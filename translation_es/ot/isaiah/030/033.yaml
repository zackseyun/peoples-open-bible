review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el rastro auditado en inglés: conserva Topet/Topheth como topónimo, mantiene «para el rey» sin fijar identidad, usa «Yahvé» para יְהוָה y refleja bien la imaginería de juicio. Sin embargo, hay dos puntos a reparar: (1) el sujeto de הֶעְמִיק הִרְחִב es 3ms singular, no impersonal plural; «La han hecho» debilita la forma verbal y la posible agencia implícita. (2) La nota c actual introduce una explicación poco natural y anglicada («brimstone») que no corresponde bien al objetivo español ni al motivo inglés, que solo preserva la alternativa tradicional.'
  spanish_quality_summary: El español es claro, natural y digno. «Pira», «aliento de Yahvé» y «la enciende» funcionan bien. La secuencia inicial puede mantenerse, aunque conviene ajustar «La han hecho» a una formulación singular más fiel al hebreo. También conviene pulir la nota c para que la alternativa tradicional sea idiomática en español.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Yahvé» para יהוה; no se enmascara el nombre divino; no se sobreinterpreta «el rey»; «azufre» es apropiado para גפרית; «aliento» preserva נשמה. No hay conflictos relevantes con el glosario general.'
  issues:
  - severity: medium
    issue: «La han hecho profunda y ancha» no refleja bien los verbos hebreos en singular masculino.
    rationale: הֶעְמִיק הִרְחִב son formas 3ms singular. El plural impersonal español introduce una agencia distinta y se aparta innecesariamente del perfil verbal del texto. Una solución como «Él la ha hecho profunda y ancha» o «La ha hecho profunda y ancha» conserva mejor la forma y sigue siendo natural.
  - severity: low
    issue: La nota c usa una explicación poco idiomática para español e introduce el anglicismo «brimstone».
    rationale: 'El motivo del rastro inglés es registrar la alternativa tradicional. En español basta con notar «brimstone» = «azufre» o, mejor, que traducciones tradicionales usan «azufre ardiente»/lenguaje afín. La redacción actual suena confusa: «se traduce “azufre” con la imagen bíblica de “azufre ardiente” o “brimstone”».'
  revised_spanish_text: Porque Topet[a] ya está preparada desde hace tiempo[b]; sí, está dispuesta para el rey. La ha hecho profunda y ancha, con una pira de fuego y abundante leña. El aliento de Yahvé, como un torrente de azufre[c], la enciende.
  revised_footnotes:
