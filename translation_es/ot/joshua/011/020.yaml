translation:
  language: es
  text: Porque venía de Yahvé el endurecerles el corazón para salir al encuentro de Israel en batalla,[a] para consagrarlos a la destrucción,[b] para que no hubiera para ellos misericordia,[c] sino para destruirlos, como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "fortalecerles el corazón". Aquí el sentido es hacerlos resueltos en su oposición, es decir, endurecerlos.
    reason: lexical_alternative
  - marker: b
    text: Hebreo "consagrarlos a la destrucción", un término técnico para poner algo bajo el juicio del exterminio; alternativamente, "destruirlos por completo" o "ponerlos bajo el anatema".
    reason: lexical_alternative
  - marker: c
    text: O "para que no tuvieran misericordia" o "para que no hubiera súplica por ellos". La expresión hebrea es compacta y puede referirse a la ausencia de cualquier petición o concesión de misericordia.
    reason: alternative_reading
lexical_decisions:
- source_word: מֵאֵת יְהוָה
  english_pob_choice: from the LORD
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - de parte de Yahvé
  - de Yahvé, como origen
  lexicon: HALOT
  rationale: La frase marca origen o procedencia. En el español de POB se conserva el nombre divino explícito como 'Yahvé', sin sustituirlo por una máscara litúrgica, manteniendo la transparencia con el hebreo.
- source_word: לְחַזֵּק אֶת לִבָּם
  english_pob_choice: to harden their hearts
  chosen_spanish: endurecerles el corazón
  alternatives_spanish:
  - fortalecerles el corazón
  - hacerles fuerte el corazón
  lexicon: HALOT
  rationale: Aunque el verbo básico es 'fortalecer', en este contexto de oposición judicial el sentido resultante es endurecimiento. 'Endurecerles el corazón' preserva esa tensión sin explicar de más.
- source_word: לִקְרַאת הַמִּלְחָמָה אֶת יִשְׂרָאֵל
  english_pob_choice: to meet Israel in battle
  chosen_spanish: salir al encuentro de Israel en batalla
  alternatives_spanish:
  - enfrentar a Israel en batalla
  - ir contra Israel en batalla
  lexicon: HALOT
  rationale: La construcción expresa un encuentro hostil, no un simple encuentro neutral. 'Salir al encuentro' mantiene la idea de movimiento hacia la confrontación y suena natural en español.
- source_word: לְמַעַן הַחֲרִימָם
  english_pob_choice: so that he might devote them to destruction
  chosen_spanish: para que los dedicara al anatema
  alternatives_spanish:
  - para que los dedicara a destrucción
  - para que los exterminara
  lexicon: HALOT
  rationale: חרם tiene fuerza técnica de 'anatema' o 'devoción a destrucción bajo juicio'. 'Anatema' preserva el término conceptual y la carga cultual/judicial más que una simple destrucción genérica.
- source_word: לְבִלְתִּי הֱיוֹת לָהֶם תְּחִנָּה
  english_pob_choice: so that there would be no mercy for them
  chosen_spanish: para que no hubiera para ellos misericordia
  alternatives_spanish:
  - para que no recibieran misericordia
  - para que no hubiera favor para ellos
  lexicon: HALOT
  rationale: תְּחִנָּה puede implicar súplica o favor, pero el ajuste del audit trail inglés prioriza la idea de misericordia/favor. En español 'no hubiera para ellos misericordia' conserva esa referencia sin añadir explícitamente una petición.
- source_word: לְמַעַן הַשְׁמִידָם
  english_pob_choice: but so that he might destroy them
  chosen_spanish: sino para destruirlos
  alternatives_spanish:
  - sino para aniquilarlos
  - sino para exterminarlos
  lexicon: HALOT
  rationale: שמד denota destrucción/aniquilación. 'Destruirlos' es suficientemente fuerte y natural, y mantiene la progresión lógica con la cláusula anterior.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  english_pob_choice: just as the LORD had commanded Moses
  chosen_spanish: como Yahvé había mandado a Moisés
  alternatives_spanish:
  - tal como Yahvé había mandado a Moisés
  - así como Yahvé había mandado a Moisés
  lexicon: HALOT
  rationale: La correspondencia con el mandato previo se expresa de forma directa y narrativa. 'Mandado' reproduce bien el carácter de orden divina y mantiene la referencia a Moisés.
theological_decisions:
- issue: Agencia divina en el endurecimiento del corazón
  english_pob_reading: 'Explicitly retain God''s agency: ''it was from the LORD to harden their hearts'''
  chosen_spanish_reading: de Yahvé fue endurecerles el corazón
  alternative_spanish_readings:
  - Yahvé permitió que se endureciera su corazón
  - Yahvé quiso que fueran obstinados
  rationale: El hebreo atribuye directamente la acción a Yahvé. Se conserva esa agencia sin suavizarla a mera अनुमति o permiso, manteniendo la tensión teológica del texto.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
- issue: Traducción de חרם como categoría de juicio
  english_pob_reading: Use 'devote them to destruction' in the main text
  chosen_spanish_reading: los dedicara al anatema
  alternative_spanish_readings:
  - los dedicara a destrucción
  - los exterminara
  rationale: '''Anatema'' conserva la categoría técnica de חרם como algo consagrado bajo juicio. Esto evita reducir el término a violencia genérica y deja visible la dimensión cultual/judicial.'
  doctrine_reference: 'Translation philosophy §1 y §5: primacía del original y consistencia terminológica.'
translation_notes:
  revision_awareness: Se siguió el ajuste revisado del inglés POB que prefirió 'no mercy for them' frente a una paráfrasis de 'no plea for mercy'. La versión española adopta una formulación directa y publicable que conserva el sentido revisado y mantiene la agencia divina explícita.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para el nombre divino.
  - Se evita 'Señor' como sustituto de máscara litúrgica.
  - '''Anatema'' se emplea como término técnico, coherente con la decisión POB sobre חרם.'
  - '''Misericordia'' traduce aquí la ausencia de favor/compasión indicada por el contexto y el ajuste revisado del inglés.'
