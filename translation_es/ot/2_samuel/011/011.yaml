review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva buena parte del sentido: el arca, Israel y Judá en alojamientos temporales; Joab y sus hombres acampados; la pregunta retórica de Urías; y la negación final enfática. Sin embargo, altera de manera importante la fórmula de juramento. El hebreo dice ''por tu vida y por la vida de tu alma'' / ''tan ciertamente como vives y como vive tu alma'', refiriéndose a David en segunda persona, no ''¡Vive Yahvé!''. Esa introducción de Yahvé no está en el texto fuente y cambia el referente del juramento.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero ''¿Y yo he de ir...?'' suena algo rígido; ''¿Y voy a ir yo...?'' o ''¿He de ir yo...?'' sería más natural. ''En campo abierto'' pide artículo en español idiomático: ''en el campo abierto''. La puntuación puede fluir mejor con comas en vez de punto y coma en una sola cadena argumentativa. ''Mi esposa'' es aceptable, aunque ''mi mujer'' sería un poco más cercano al hebreo; no es necesario cambiarlo.'
  glossary_alignment: 'No hay conflicto con los términos principales del proyecto salvo uno grave: se invoca ''Yahvé'' donde el texto hebreo de este versículo no contiene יהוה sino la fórmula חַיֶּךָ וְחֵי נַפְשֶׁךָ dirigida a David. Debe evitarse introducir el nombre divino por armonización teológica. El uso de ''siervos'' para עבדי aquí es defendible por contexto militar y social.'
  issues:
  - severity: high
    issue: La fórmula de juramento fue cambiada a '¡Vive Yahvé, y vive tu alma!'.
    rationale: 'El hebreo no menciona Yahvé aquí. Dice ''חַיֶּךָ וְחֵי נַפְשֶׁךָ'', una fórmula dirigida a David: ''tan ciertamente como vives, y como vive tu alma''. Introducir ''Yahvé'' añade contenido no presente y altera el sentido del juramento.'
  - severity: medium
    issue: Falta reflejar en nota la alternativa literal/rhetórica de la pregunta y de la cláusula con 'si'.
    rationale: 'El English POB conserva dos notas relevantes: una sobre la pregunta retórica (''¿He de ir...?'') y otra sobre la fórmula de juramento con el ''si'' elíptico que expresa negación fuerte. El borrador solo da una nota parcial sobre ''vive tu alma'' y omite la explicación completa.'
  - severity: low
    issue: '''en campo abierto'' suena menos natural que ''en el campo abierto''.'
    rationale: El español normalmente usa artículo aquí. La expresión idiomática mejora la legibilidad sin perder el valor de עַל פְּנֵי הַשָּׂדֶה.
  - severity: low
    issue: '''¿Y yo he de ir...?'' es algo tieso.'
    rationale: Aunque fiel, puede sonar forzado. '¿He de ir yo...?' conserva la protesta retórica con mejor naturalidad en español bíblico moderno.
