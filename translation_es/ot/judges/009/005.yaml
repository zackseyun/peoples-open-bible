translation:
  language: es
  text: Entonces fue a la casa de su padre en Ofra y mató a sus hermanos[a], los hijos de Jerubaal —setenta hombres— sobre una sola piedra[b]. Pero Jotam, el hijo menor de Jerubaal, quedó[c], porque se había escondido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y vino a la casa de su padre, a Ofra».'
    reason: lexical_alternative
  - marker: b
    text: «Sobre una sola piedra» puede referirse a una única piedra o sitio de ejecución, subrayando que los setenta fueron muertos juntos en un solo lugar.
    reason: cultural_note
  - marker: c
    text: 'O: «quedó con vida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: Then he went
  chosen_spanish: Entonces fue
  alternatives_spanish:
  - Entonces vino
  - Y fue
  lexicon: HALOT
  rationale: El hebreo introduce una acción narrativa en secuencia. En español, 'fue' comunica naturalmente el movimiento hacia un destino sin forzar un calco de 'vino', que sería menos idiomático aquí.
- source_word: בֵית אָבִיו
  english_pob_choice: his father’s house
  chosen_spanish: la casa de su padre
  alternatives_spanish:
  - la casa paterna
  - la casa de su padre
  lexicon: HALOT
  rationale: La expresión denota un lugar concreto vinculado al padre; 'la casa de su padre' conserva la referencia directa y clara sin convertirla en una paráfrasis más amplia como 'hogar' o 'familia'.
- source_word: עָפְרָתָה
  english_pob_choice: at Ophrah
  chosen_spanish: en Ofra
  alternatives_spanish:
  - a Ofra
  - en Ofra
  lexicon: HALOT
  rationale: El ending direccional indica movimiento hacia el lugar. En español, con la casa como destino, 'en Ofra' resulta natural y conserva la referencia geográfica sin sobreexplicar la dirección.
- source_word: וַיַּהֲרֹג
  english_pob_choice: killed
  chosen_spanish: mató
  alternatives_spanish:
  - asesinó
  - dio muerte a
  lexicon: HALOT
  rationale: El verbo básico es 'matar'. 'Asesinó' añade una valoración jurídica que el hebreo no expresa de forma explícita en el verbo; la brutalidad del acto ya queda clara por el contexto.
- source_word: אֶת אֶחָיו בְּנֵי יְרֻבַּעַל
  english_pob_choice: his brothers, the sons of Jerubbaal
  chosen_spanish: a sus hermanos, los hijos de Jerubaal
  alternatives_spanish:
  - a sus hermanos, los hijos de Jerubaal
  - a sus hermanos, Jerubaal’s sons
  lexicon: HALOT
  rationale: La aposición identifica a los hermanos. Mantener 'los hijos de Jerubaal' conserva el paralelismo semítico y la precisión genealógica del texto.
- source_word: שִׁבְעִים אִישׁ
  english_pob_choice: seventy men
  chosen_spanish: setenta hombres
  alternatives_spanish:
  - setenta personas
  lexicon: HALOT
  rationale: En este contexto, el referente son los hijos varones de Jerubaal; 'hombres' refleja con fidelidad el hebreo y la escena de ejecución.
- source_word: עַל אֶבֶן אֶחָת
  english_pob_choice: on one stone
  chosen_spanish: sobre una sola piedra
  alternatives_spanish:
  - sobre una piedra sola
  - en una sola piedra
  lexicon: HALOT
  rationale: '''Sobre una sola piedra'' mantiene la imagen concreta y el posible matiz de un lugar único de ejecución, sin interpretar más allá del texto.'
- source_word: וַיִּוָּתֵר
  english_pob_choice: was left
  chosen_spanish: quedó
  alternatives_spanish:
  - fue dejado
  - permaneció
  lexicon: HALOT
  rationale: El niphal expresa que quedó como sobreviviente o remanente. 'Quedó' es breve y natural en español, y permite que el contexto de supervivencia sea inferido.
- source_word: הַקָּטֹן
  english_pob_choice: the youngest
  chosen_spanish: el hijo menor
  alternatives_spanish:
  - el menor
  - el más joven
  lexicon: HALOT
  rationale: En el marco familiar, 'el hijo menor' transmite el sentido de estatus de nacimiento con claridad en español; además, la relación filial ya está explícita en el contexto inmediato.
- source_word: כִּי נֶחְבָּא
  english_pob_choice: because he hid himself
  chosen_spanish: porque se había escondido
  alternatives_spanish:
  - porque se escondió
  - porque estaba escondido
  lexicon: HALOT
  rationale: El hebreo presenta la causa de su supervivencia. El pluscuamperfecto español expresa bien la acción previa que explica que no estuviera entre los muertos.
theological_decisions:
- issue: La muerte de los setenta hijos de Jerubaal en un acto de violencia colectiva
  english_pob_reading: killed his brothers, the sons of Jerubbaal—seventy men—on one stone
  chosen_spanish_reading: mató a sus hermanos, los hijos de Jerubaal, setenta hombres, sobre una sola piedra
  alternative_spanish_readings:
  - asesinó a sus hermanos
  - dio muerte a sus hermanos
  rationale: No se suaviza la violencia del relato, pero tampoco se añade una calificación jurídica no explícita en el verbo hebreo. La brutalidad queda preservada por el contexto y por la imagen de 'una sola piedra'.
  doctrine_reference: Narrativa histórica del AT; fidelidad al sentido léxico y al contexto narrativo
- issue: La supervivencia de Jotam como remanente oculto
  english_pob_reading: Jotham, the youngest son of Jerubbaal, was left, because he hid himself
  chosen_spanish_reading: Jotam, el hijo menor de Jerubaal, quedó, porque se había escondido
  alternative_spanish_readings:
  - fue dejado
  - permaneció
  rationale: Se conserva la tensión semántica de 'quedó' como remanente/sobreviviente sin imponer explícitamente 'vivo' en el texto principal; la razón de su preservación es su ocultamiento previo.
  doctrine_reference: Lectura narrativa del texto; coherencia con el hebreo niphal
translation_notes:
  revision_awareness: La versión inglesa auditada se mantiene sin cambios en la revisión más reciente; el acuerdo de revisión fue alto y no se registraron correcciones sustantivas. La redacción española sigue de cerca esa solución, preservando las mismas decisiones léxicas clave y la misma estructura narrativa.
  spanish_consistency_notes:
  - Se mantiene 'Jerubaal' de forma consistente con el material fuente proporcionado.
  - Se usa 'Ofra' como forma española del topónimo.
  - Se conserva 'hijo menor' para הַקָּטֹן en clave familiar, coherente con el contexto de parentesco.
  - Se evita sustituir 'mató' por un término más interpretativo como 'asesinó' en el texto principal.
  - La puntuación respeta la unidad explicativa 'porque se había escondido' como cláusula causal final.
