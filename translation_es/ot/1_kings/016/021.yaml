translation:
  language: es
  text: 'Entonces el pueblo de Israel se dividió en dos partes: la mitad del pueblo siguió a Tibni hijo de Guinat[a], para hacerlo rey, y la otra mitad siguió a Omri.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la mitad del pueblo estaba por Tibni hijo de Guinat, para hacerlo rey, y la mitad estaba por Omri»'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵחָלֵק
  english_pob_choice: were divided
  chosen_spanish: fue dividido
  alternatives_spanish:
  - se dividió
  - estuvo dividido
  lexicon: HALOT
  rationale: El nifal imperfectivo expresa la acción de ser dividido. En español, con sujeto colectivo singular ('el pueblo de Israel'), 'fue dividido' conserva bien la voz pasiva y la idea de fractura política.
- source_word: הָעָם יִשְׂרָאֵל
  english_pob_choice: the people of Israel
  chosen_spanish: el pueblo de Israel
  alternatives_spanish:
  - el pueblo, Israel
  - el pueblo Israel
  lexicon: HALOT
  rationale: La apposición se entiende naturalmente en español como identificación nacional. 'El pueblo de Israel' es claro y fiel sin forzar la sintaxis hebrea.
- source_word: לַחֵצִי
  english_pob_choice: into two parts
  chosen_spanish: en dos partes
  alternatives_spanish:
  - en mitades
  - a mitades
  lexicon: HALOT
  rationale: La expresión indica división en dos mitades. 'En dos partes' comunica el resultado de la división de manera idiomática y fiel.
- source_word: חֲצִי הָעָם
  english_pob_choice: half of the people
  chosen_spanish: la mitad del pueblo
  alternatives_spanish:
  - media gente
  - la mitad de la gente
  lexicon: HALOT
  rationale: La repetición hebrea mantiene el paralelismo y el énfasis distributivo. 'La mitad del pueblo' preserva esa simetría con estilo natural en español.
- source_word: הָיָה אַחֲרֵי
  english_pob_choice: followed
  chosen_spanish: siguió a
  alternatives_spanish:
  - estuvo de parte de
  - apoyó a
  lexicon: HALOT
  rationale: En este contexto político, el hebreo 'estar después de' equivale a adherirse o seguir a un pretendiente. 'Siguió a' conserva el sentido de lealtad sin añadir interpretaciones excesivas.
- source_word: תִבְנִי בֶן גִּינַת
  english_pob_choice: Tibni son of Ginath
  chosen_spanish: Tibní hijo de Guinat
  alternatives_spanish:
  - Tibni hijo de Ginat
  - Tibní, hijo de Guinat
  lexicon: Transliteración estándar de nombres propios hebreos
  rationale: Se mantiene la transliteración de los nombres propios. 'Guinat' refleja la adaptación fonética usual en español bíblico, y 'Tibní' conserva la acentuación natural del nombre.
- source_word: לְהַמְלִיכוֹ
  english_pob_choice: to make him king
  chosen_spanish: para hacerlo rey
  alternatives_spanish:
  - para coronarlo rey
  - para proclamarlo rey
  lexicon: HALOT
  rationale: El hifil del verbo מלך indica causarlo a reinar. 'Hacerlo rey' es preciso y evita añadir la ceremonia implícita en 'coronar'.
- source_word: וְהַחֲצִי אַחֲרֵי עָמְרִי
  english_pob_choice: and half followed Omri
  chosen_spanish: y la otra mitad siguió a Omrí
  alternatives_spanish:
  - y la mitad siguió a Omrí
  - y la otra mitad estuvo de parte de Omrí
  lexicon: HALOT
  rationale: El hebreo repite la estructura para mantener el paralelismo. 'La otra mitad' hace explícita la correspondencia con la primera cláusula sin perder el sentido de adhesión política.
theological_decisions:
- issue: Lectura política de 'ir detrás de' como lealtad a un pretendiente al trono
  english_pob_reading: followed Tibni... followed Omri
  chosen_spanish_reading: siguió a Tibní... siguió a Omrí
  alternative_spanish_readings:
  - estuvo de parte de Tibní... estuvo de parte de Omrí
  - apoyó a Tibní... apoyó a Omrí
  rationale: No se trata de un seguimiento físico, sino de alineación política. 'Siguió a' mantiene la ambigüedad mínima del hebreo y el sentido de adhesión real sin explicitar más de lo que el texto dice.
  doctrine_reference: Narrativa histórica; lealtad política en 1 Reyes 16
- issue: División del pueblo como fractura nacional
  english_pob_reading: the people of Israel were divided into two parts
  chosen_spanish_reading: el pueblo de Israel fue dividido en dos partes
  alternative_spanish_readings:
  - el pueblo de Israel se dividió en dos partes
  - Israel quedó dividido en dos partes
  rationale: La traducción conserva el hecho histórico de la escisión interna del reino/pueblo. 'Fue dividido' reproduce con sobriedad la pasiva del hebreo sin introducir una formulación teológica adicional.
  doctrine_reference: Historia de Israel en 1 Reyes 16
translation_notes:
  revision_awareness: El texto base y el auditor inglés están en alto acuerdo y sin revisiones aplicadas; la versión española sigue esa lectura estable, preservando el paralelismo hebreo y la equivalencia semántica principal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene 'Omrí' y 'Tibní' como transliteraciones consistentes con el español bíblico del proyecto.
  - Se evita 'Cristo', 'SEÑOR' y otras sustituciones no presentes en el texto fuente.
