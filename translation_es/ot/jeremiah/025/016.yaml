translation:
  language: es
  text: Beberán, tambalearán y actuarán como locos[a] a causa de la espada que yo envío entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enloquecerán». El verbo hebreo puede denotar conducta irracional o volverse enajenado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁתוּ
  english_pob_choice: They will drink
  chosen_spanish: Beberán
  alternatives_spanish:
  - Y beberán
  - Beberán de
  lexicon: HALOT
  rationale: El verbo hebreo mantiene la imagen concreta de beber como parte del juicio; en español, «beberán» comunica con naturalidad el futuro profético sin añadir contenido. Se evita calcar la coordinación inicial porque el flujo español permite una frase directa.
- source_word: וְהִתְגֹּעֲשׁוּ
  english_pob_choice: stagger
  chosen_spanish: tambalearán
  alternatives_spanish:
  - se tambalearán
  - vacilarán
  - se agitarán
  lexicon: HALOT
  rationale: El valor contextual es de movimiento inestable o vacilante, no simplemente de agitación interna. «Tambalearán» reproduce bien la imagen corporal que sigue al beber del juicio.
- source_word: וְהִתְהֹלָלוּ
  english_pob_choice: act like madmen
  chosen_spanish: actuarán como locos
  alternatives_spanish:
  - enloquecerán
  - se comportarán como locos
  - harán locuras
  lexicon: HALOT
  rationale: La forma verbal transmite conducta irracional o enajenada. «Actuarán como locos» conserva el matiz de comportamiento visible que documenta el audit trail inglés, sin suavizarlo a un sentido meramente interior.
- source_word: מִפְּנֵי הַחֶרֶב
  english_pob_choice: because of the sword
  chosen_spanish: a causa de la espada
  alternatives_spanish:
  - por la espada
  - ante la espada
  - debido a la espada
  lexicon: HALOT
  rationale: La preposición aquí es causal, no espacial. «A causa de» expresa con claridad que el estado descrito proviene de la espada como agente de juicio.
- source_word: הַחֶרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - el arma
  - la guerra
  - la matanza
  lexicon: HALOT
  rationale: «Espada» conserva el sentido léxico directo y el símbolo profético de guerra y juicio, tal como lo preserva la traducción inglesa.
- source_word: אֲשֶׁר אָנֹכִי שֹׁלֵחַ
  english_pob_choice: that I am sending
  chosen_spanish: que yo envío
  alternatives_spanish:
  - que estoy enviando
  - que yo estoy enviando
  - que enviaré
  lexicon: HALOT
  rationale: El participio con אָנֹכִי expresa acción divina en curso o inminente; en español, el presente «envío» funciona naturalmente para ese valor y suena más digno que una perífrasis innecesaria. Se mantiene la fuerza de iniciativa divina.
- source_word: בֵּינֹתָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su medio
  - entre medio de ellos
  lexicon: HALOT
  rationale: El hebreo indica movimiento o presencia dentro del grupo colectivo. «Entre ellos» es idiomático en español y conserva la idea de inserción en medio de las naciones.
theological_decisions:
- issue: Imaginería concreta del juicio
  english_pob_reading: Retain the concrete imagery of drinking, staggering, and madness as effects of divine judgment through war.
  chosen_spanish_reading: Conservar la imaginería concreta de beber, tambalear y actuar como locos como efectos del juicio divino por medio de la espada.
  alternative_spanish_readings:
  - Abstractarlo como terror general o colapso político
  - Suavizarlo a una descripción meramente figurada
  rationale: El versículo pertenece al oráculo de la copa de la ira y liga explícitamente el estado de las naciones con la espada enviada por Dios. La redacción española mantiene esa fuerza imagística sin desdibujarla en abstracción.
  doctrine_reference: 'Principio de traducción: preservar el sentido llano del texto fuente; no paraphrase beyond what the source warrants.'
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con la revisión más reciente y no requiere cambios sustanciales respecto del análisis auditado: se conserva la secuencia de verbos, la causalidad de מִפְּנֵי y el valor del participio hebreo en un presente profético español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene «espada» como metáfora de juicio, no como mero instrumento físico.
  - «Actuarán como locos» preserva la tensión entre conducta observable e irracionalidad interior documentada en el audit trail inglés.
