    rationale: צֶדֶק modifica el acto de juzgar; ‘justamente’ suena más directo como adverbio en español, y la nota debe ir anclada a ‘justamente’, no a ‘casos’.
  - severity: low
    issue: La puntuación final puede normalizarse en español.
    rationale: 'Es preferible colocar el punto fuera de la comilla de cierre en este contexto editorial: … con él[d]».'
