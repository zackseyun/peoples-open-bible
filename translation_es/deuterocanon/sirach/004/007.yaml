translation:
  language: es
  text: Inclina tu oído al pobre[a], y respóndele pacíficamente, con humildad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Hazte agradable a la asamblea, y humilla tu cabeza ante un hombre grande». Esto refleja una forma textual sustancialmente distinta del hebreo conservado.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַט
  english_pob_choice: Incline
  chosen_spanish: Inclina
  alternatives_spanish:
  - Dobla
  - Vuelve
  - Inclina el oído
  lexicon: HALOT
  rationale: El imperativo de נטה conserva en español la imagen idiomática de prestar atención. 'Inclina' reproduce bien la forma breve y natural del mandato, y se enlaza con 'tu oído' sin forzar el español.
- source_word: לֶעָנִי
  english_pob_choice: to the poor
  chosen_spanish: al pobre
  alternatives_spanish:
  - al afligido
  - al necesitado
  lexicon: HALOT
  rationale: ‘עני’ puede abarcar pobreza y aflicción social; 'el pobre' es la opción más directa y transparente en español, coherente con el contexto ético de atender al vulnerable.
- source_word: אָזְנֶךָ
  english_pob_choice: your ear
  chosen_spanish: tu oído
  alternatives_spanish:
  - tu oreja
  - tu escuchar
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal del hebreo. En español, 'oído' funciona de modo idiomático y digno, igual que 'ear' en la versión inglesa auditada.
- source_word: וַהֲשִׁיבֵהוּ
  english_pob_choice: and answer him
  chosen_spanish: y respóndele
  alternatives_spanish:
  - y contéstale
  - y réplicale
  lexicon: HALOT
  rationale: En este contexto, שוב en Hifil expresa responder o contestar. 'Respóndele' es natural y conserva la relación con escuchar primero.
- source_word: שָׁלוֹם
  english_pob_choice: peacefully
  chosen_spanish: con paz
  alternatives_spanish:
  - pacíficamente
  - en paz
  - con tranquilidad
  lexicon: HALOT
  rationale: Aquí שלום funciona adverbialmente. 'Con paz' conserva el sustantivo hebreo y su matiz de respuesta benéfica; es una formulación breve y fiel. 'Pacíficamente' sería más explicativo, pero menos sobrio en este verso.
- source_word: בַּעֲנָוָה
  english_pob_choice: with humility
  chosen_spanish: y humildad
  alternatives_spanish:
  - con humildad
  - con mansedumbre
  - humildemente
  lexicon: HALOT
  rationale: ענוה designa humildad/meekness. Dado que el hebreo coordina dos rasgos de la respuesta, 'y humildad' funciona con naturalidad en español y preserva el paralelo con 'con paz'.
theological_decisions:
- issue: Prioridad del hebreo frente al paralelo griego divergente
  english_pob_reading: Translate the extant Hebrew directly while noting the Greek's substantially different wording in a footnote.
  chosen_spanish_reading: Traducir directamente el hebreo conservado y señalar en nota que el griego ofrece una formulación sustancialmente distinta.
  alternative_spanish_readings:
  - 'Seguir el griego: ''Hazte agradable a la asamblea, y humilla tu cabeza ante un hombre grande.'''
  - Combinar ambos testigos en el texto principal.
  rationale: En Sirácida, cuando el hebreo está conservado y es claro, debe primar como testigo base. El griego aquí no parece una simple variante léxica sino otra forma textual, por lo que se preserva como lectura alternativa en nota sin desplazar el hebreo.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde el hebreo de Sirácida sobreviva; preservar honestamente la incertidumbre textual'
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'peaceably' a 'peacefully' para mayor naturalidad. En español, 'con paz' mantiene el valor adverbial de שלום sin introducir una adverbialidad más marcada de la necesaria, y conserva el tono sobrio del verso.
  spanish_consistency_notes:
  - Se mantiene 'pobre' para עני, en línea con la opción inglesa principal y con el registro ético del pasaje.
  - Se evita 'siervo' o 'humildemente' como sustituciones interpretativas; el verso manda una respuesta caracterizada por paz y humildad, no una reformulación libre.
  - La nota textual queda anclada en el segmento 'pobre[a]' para señalar que el texto principal sigue el hebreo mientras se registra la divergencia griega.
