    issue: «flecha de matanza» es poco idiomático en español
    rationale: Aunque intenta reflejar «slaughtering arrow», la frase suena rígida y antinatural. «Flecha mortífera» preserva mejor la intención letal destacada en la auditoría inglesa.
  - severity: medium
    issue: «habla paz a su prójimo» es un calco innecesario
    rationale: El hebreo permite ese giro, pero en español moderno y eclesial legible resulta mejor «habla de paz con su prójimo», manteniendo la nota cultural sobre el sentido amistoso/apacible.
