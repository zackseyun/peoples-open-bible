translation:
  language: es
  text: Hasta el tiempo oportuno ocultará sus palabras, y los labios de muchos relatarán su entendimiento.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conservado de la Geniza de El Cairo aquí difiere marcadamente del griego y dice aproximadamente: «Él pondrá sobre él una corona eterna, y mérito eterno entre los santos». Como este testimonio hebreo está señalado como una gran discrepancia textual, el texto principal sigue el griego en este versículo.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἕως καιροῦ
  english_pob_choice: Until the right time
  chosen_spanish: Hasta el tiempo oportuno
  alternatives_spanish:
  - Hasta un tiempo
  - Hasta el tiempo señalado
  lexicon: LSJ
  rationale: καιρός suele expresar el momento oportuno o apropiado, no solo tiempo cronológico. «Hasta el tiempo oportuno» conserva esa fuerza sin volverla demasiado interpretativa.
- source_word: κρύψει
  english_pob_choice: he will conceal
  chosen_spanish: ocultará
  alternatives_spanish:
  - esconderá
  - mantendrá ocultas
  lexicon: BDAG
  rationale: El futuro de κρύπτω pide un verbo de ocultación. «Ocultará» suena natural en español y mantiene el valor formal de esconder sin exceso de coloquialidad.
- source_word: τοὺς λόγους αὐτοῦ
  english_pob_choice: his words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - sus dichos
  - lo que dice
  lexicon: BDAG
  rationale: λόγοι aquí se rinde de forma directa como «palabras», que es transparente y no amplía innecesariamente el sentido.
- source_word: χείλη πολλῶν
  english_pob_choice: the lips of many
  chosen_spanish: los labios de muchos
  alternatives_spanish:
  - muchas bocas
  - muchas personas
  lexicon: LSJ
  rationale: La imagen literal de «labios» se conserva por su valor poético y por el paralelismo sapiencial del griego.
- source_word: ἐκδιηγήσεται
  english_pob_choice: will recount
  chosen_spanish: declararán
  alternatives_spanish:
  - contarán
  - relatarán
  lexicon: BDAG
  rationale: El verbo puede expresar narrar o exponer en detalle. «Declararán» comunica el acto público de dar a conocer su entendimiento, sin sonar forzado en español.
- source_word: σύνεσιν αὐτοῦ
  english_pob_choice: his understanding
  chosen_spanish: su entendimiento
  alternatives_spanish:
  - su comprensión
  - su discernimiento
  lexicon: BDAG
  rationale: σύνεσις en literatura sapiencial suele ser «entendimiento» o «insight». «Entendimiento» es la equivalencia más amplia y estable en español.
theological_decisions:
- issue: Selección del testimonio base en una lectura con desajuste textual
  english_pob_reading: Translate from the Greek parallel for this verse, while acknowledging the Hebrew line in Zone 1 appears to belong to a different textual form.
  chosen_spanish_reading: Traducir a partir del paralelo griego de este versículo, reconociendo que la línea hebrea disponible parece pertenecer a otra forma textual.
  alternative_spanish_readings:
  - «Le pondrás una corona eterna sobre él, y mérito eterno entre los santos».
  - «Pondrás sobre él una corona perpetua, y mérito perpetuo entre los santos»."
  rationale: El packet marca el hebreo como major_mismatch, de modo que no corresponde armonizarlo silenciosamente con el griego. La redacción española sigue el griego como base de traducción para este verso y preserva la tensión textual de manera honesta.
  doctrine_reference: 'PHILOSOPHY.md: translate from the most-original witness available; use parallel source as actual translation input when present; preserve source uncertainty honestly.'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota a pie de página no anclada; ahora no hay marcadores de nota porque el texto español se presenta sin notas. La traducción se alinea con el paralelo griego proporcionado, coherente con la advertencia de major_mismatch del hebreo en el paquete de fuentes.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en los lineamientos generales, pero este versículo no contiene el nombre divino.
  - Se mantuvo el registro sapiencial, literal en la imagen de «los labios de muchos» y natural en la sintaxis española.
  - Se evitó «Cristo/Mesías» porque no aplica al contenido del versículo.
  - No se usó ningún marcador de nota, para asegurar concordancia exacta entre texto y aparato de notas.
