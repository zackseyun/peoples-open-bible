    issue: «Aquel hombre» añade un matiz no presente en הָאִישׁ.
    rationale: El hebreo dice simplemente «el hombre» y el POB inglés documenta explícitamente que no debe imponerse un título ni una deixis adicional. «Aquel» introduce distancia discursiva interpretativa.
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota explica la expresión «ver el rostro del hombre», pero el marcador aparece tras «dijimos», lo que rompe la correspondencia requerida entre texto y nota.
  - severity: medium
    issue: Las notas [a] y [b] duplican la misma información idiomática.
    rationale: Ambas explican que «ver el rostro» conserva la imagen hebrea y significa comparecer ante alguien. Debe consolidarse en una sola nota clara.
  - severity: low
    issue: La tercera nota defiende una elección léxica incorrecta en vez de preservar la lectura fuente.
    rationale: Si se corrige a «el hombre», ya no hace falta una nota justificando «aquel hombre».
