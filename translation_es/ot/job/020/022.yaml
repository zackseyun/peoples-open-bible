review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: plenitud/abundancia, llegada de angustia/estrechez, y la hostilidad de «toda mano» contra el impío. Sin embargo, hay un problema de naturalidad y precisión en la segunda mitad: «toda mano del miserable» suena singular-individual y poco idiomático para un colectivo distributivo; además, la nota b contiene errores de español e intrusiones de inglés.'
  spanish_quality_summary: El texto principal es mayormente claro y digno, pero requiere una reparación menor para sonar natural en español bíblico moderno. «Toda mano de los miserables» o «de los desdichados» expresa mejor el colectivo implícito. La nota b actual es gramaticalmente defectuosa («todo mano», «toiler», «un sufriendo») y debe rehacerse por completo.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. Las decisiones léxicas principales son adecuadas: «abundancia», «angustia», «mano». La excepción es contextual: para עָמֵל, mantener el campo semántico de miseria/aflicción, pero en español conviene pluralizar el referente colectivo para evitar una lectura extraña.'
  issues:
  - severity: medium
    issue: «toda mano del miserable» es poco natural y potencialmente engañoso en español
    rationale: El hebreo כָּל יַד עָמֵל usa una expresión distributiva-colectiva. En español, el singular «del miserable» suena como si se hablara de un solo miserable, no de la totalidad de los desdichados/afligidos.
  - severity: medium
    issue: La nota b contiene errores de idioma y mezcla innecesaria de inglés
    rationale: «todo mano», «toiler» y «un sufriendo» no son aceptables en una nota editorial de la POB en español. Debe ofrecer alternativas limpias y comprensibles en español.
  - severity: low
    issue: «se volverá contra él» es aceptable, pero «vendrá contra él» preserva mejor el verbo básico hebreo
    rationale: תְּבוֹאֶנּוּ mantiene la idea de «venir/llegar sobre». «Se volverá contra él» explicita bien la hostilidad, pero se aleja un poco más del verbo fuente que «vendrá contra él».
  revised_spanish_text: En la plenitud de su abundancia, la angustia[a] le sobrevendrá; toda mano de los miserables[b] vendrá contra él.
  revised_footnotes:
