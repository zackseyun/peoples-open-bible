review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: prohibición de comer de su carne, prohibición de tocar sus cuerpos muertos, y declaración de impureza ritual en relación con Israel. Sin embargo, ''cadáveres'' y la nota ''cuerpos muertos'' pierden la precisión zoológica de נְבֵלָה, que en este contexto se refiere al cuerpo muerto de un animal, no a un cadáver humano. También ''impuros para ustedes'' es comprensible, pero ''inmundos para ustedes'' o ''impuros para ustedes'' debe coordinarse con la terminología del capítulo; aquí conviene una formulación más bíblica y estable.'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse en precisión bíblica y consistencia terminológica. 'Nada de su carne' suena bien para el partitivo. 'Ni tocarán' funciona, aunque 'ni tocarán sus cadáveres' introduce una asociación antropológica menos apropiada. 'Son impuros para ustedes' es idiomático, pero en legislación levítica 'inmundos' o 'impuros' debe escogerse por consistencia; 'inmundos' es más establecido en este registro y evita sonar clínico.
  glossary_alignment: 'No hay términos del glosario maestro directamente en juego salvo la categoría טְמֵאִים. El proyecto permite decisiones contextuales; aquí la mejor alineación teológica y literaria es mantener la categoría ritual de modo tradicional y claro. La corrección principal es léxica: נְבֵלָה debe representarse como ''carroña'' o mejor ''cuerpo muerto'' de animal; en texto principal, ''carroñas'' suena algo peyorativo y menos digno, por lo que ''sus cuerpos muertos'' preserva mejor la referencia animal sin humanizarla. Para טְמֵאִים, ''inmundos'' encaja bien en Levítico.'
  issues:
  - severity: medium
    issue: '''Cadáveres'' para נְבֵלָה'
    rationale: En español 'cadáver' suele asociarse primariamente con seres humanos. El hebreo aquí nombra el cuerpo muerto de un animal en ley de pureza. Conviene evitar una palabra que desplace el referente.
  - severity: medium
    issue: Nota al pie con 'cuerpos muertos' como alternativa a 'cadáveres'
    rationale: La nota no corrige suficientemente la imprecisión del texto principal y además queda redundante. La alternativa debe conservar el matiz animal de 'carcasses'/'dead bodies'.
  - severity: low
    issue: '''Impuros'' frente a terminología levítica más estable'
    rationale: '''Impuros'' es defendible, pero ''inmundos'' suele sonar más propio de la categoría ritual de Levítico y armoniza mejor con el registro bíblico tradicional sin ser arcaísmo ininteligible.'
  revised_spanish_text: No comerán nada de su carne[a], ni tocarán sus cuerpos muertos; son inmundos para ustedes.
  revised_footnotes:
  - marker: a
    text: O 'sus carroñas'. El término hebreo se refiere al cuerpo muerto de un animal.
    reason: lexical_alternative
  revision_rationale: Se revisa 'cadáveres' a 'cuerpos muertos' para evitar una referencia que en español suele sonar humana y para reflejar mejor נְבֵלָה en contexto animal. Se ajusta la nota para preservar la alternativa léxica con precisión. Se cambia 'impuros' a 'inmundos' por mejor adecuación al registro ritual de Levítico y mayor estabilidad terminológica en este contexto.
