translation:
  language: es
  text: 'Entonces los pastores de Gerar riñeron con los pastores de Isaac, diciendo: «El agua es nuestra». Por eso llamó al pozo Esek[a], porque habían reñido con él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Esek suena al término hebreo para «contienda» o «disputa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרִיבוּ
  english_pob_choice: quarreled
  chosen_spanish: riñeron
  alternatives_spanish:
  - discutieron
  - contendieron
  - pelearon
  lexicon: HALOT
  rationale: ריב expresa disputa o altercado. «Reñeron» comunica bien la fricción verbal y mantiene un registro natural en español, sin suavizar demasiado la tensión del verbo hebreo.
- source_word: רֹעֵי גְרָר
  english_pob_choice: the shepherds of Gerar
  chosen_spanish: los pastores de Gerar
  alternatives_spanish:
  - los ganaderos de Gerar
  - los pastores de Guerar
  lexicon: HALOT
  rationale: רֹעִים puede abarcar cuidadores de rebaños; «pastores» sigue de cerca el sentido básico y el uso narrativo del contexto patriarcal. Se conserva «Gerar» como topónimo transliterado habitual.
- source_word: עִם רֹעֵי יִצְחָק
  english_pob_choice: with Isaac’s shepherds
  chosen_spanish: con los pastores de Isaac
  alternatives_spanish:
  - con los ganaderos de Isaac
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la primera cláusula y la posesión mediante «de Isaac», que es natural en español y fiel al hebreo.
- source_word: לֵאמֹר לָנוּ הַמָּיִם
  english_pob_choice: saying, “The water is ours.”
  chosen_spanish: 'diciendo: «El agua es nuestra»'
  alternatives_spanish:
  - 'diciendo: «El agua nos pertenece»'
  - 'diciendo: «El agua es para nosotros»'
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y posesiva. «El agua es nuestra» reproduce con claridad la reclamación sin sobreexplicar la elipsis.
- source_word: וַיִּקְרָא שֵׁם הַבְּאֵר
  english_pob_choice: So he named the well
  chosen_spanish: Por eso llamó al pozo
  alternatives_spanish:
  - Entonces llamó al pozo
  - Y llamó al pozo
  lexicon: HALOT
  rationale: El hebreo usa el giro «llamar el nombre de». En español, «llamó al pozo» evita un calco duro y conserva el valor narrativo de la denominación.
- source_word: עֵשֶׂק
  english_pob_choice: Esek
  chosen_spanish: Esek
  alternatives_spanish:
  - Contienda
  - Disputa
  lexicon: HALOT
  rationale: Como nombre propio del pozo, se translitera. El matiz semántico se conserva mediante la nota al pie, siguiendo el audit trail inglés.
- source_word: כִּי הִתְעַשְּׂקוּ עִמּוֹ
  english_pob_choice: because they had quarreled with him
  chosen_spanish: porque habían reñido con él
  alternatives_spanish:
  - porque habían discutido con él
  - porque habían contendido con él
  lexicon: HALOT
  rationale: Se usa el mismo campo semántico que en la primera cláusula para mantener la cohesión del verso. El verbo también preserva la relación de juego de palabras con el nombre Esek sin perder naturalidad en español.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente prefirió repetir el sentido de «quarreled» en ambas cláusulas por consistencia léxica y naturalidad. La versión española sigue ese mismo criterio: usa un verbo uniforme («riñeron») y conserva el nombre transliterado Esek con nota explicativa del juego de palabras.'
  spanish_consistency_notes:
  - Se mantiene la transliteración de Esek para el nombre del pozo, en línea con la práctica POB para nombres propios con valor etimológico.
  - Se conservó el paralelismo entre «los pastores de Gerar» y «los pastores de Isaac» para reflejar la estructura hebrea.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, ya que este versículo no contiene el Tetragrámaton.
  - El tono es bíblico pero moderno, procurando claridad sin caer en calco rígido.
