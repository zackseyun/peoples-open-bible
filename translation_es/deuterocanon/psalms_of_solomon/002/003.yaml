revisions:
- from: porque los hijos de Jerusalén contaminaron las cosas santas del Señor[a]; profanaron las ofrendas[b] de Dios con sus hechos impíos.
  to: porque los hijos de Jerusalén contaminaron las cosas santas de Yahvé; profanaron las ofrendas[a] de Dios con sus obras de iniquidad.
  rationale: Se corrige «del Señor» a «de Yahvé» para ajustarse a la terminología obligatoria del proyecto. Se reemplaza «hechos impíos» por «obras de iniquidad» para reflejar mejor ἀνομίαις. Se elimina la nota [a] defectuosa sobre «hijos» y se conserva solo una nota útil para δῶρα, donde el español principal favorece la claridad cultual mientras preserva la alternativa más literal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:22:19Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura causal del griego y el paralelismo entre contaminar/profanar. También acierta al entender τὰ ἅγια como realidades sagradas en plural y δῶρα en sentido cultual. Sin embargo, hay dos desalineaciones relevantes con el proyecto y con ἀνομίαις: Κυρίου se ha vertido como «del Señor» pese a la pauta del proyecto que pide «Yahvé» para el nombre divino; además, «hechos impíos» debilita el matiz de ilegalidad/iniquidad presente en ἀνομίαις.'
  spanish_quality_summary: El español es claro y publicable, pero «las cosas santas» suena algo tosco; «las cosas sagradas» o «las cosas santas» son ambas posibles, y la segunda mantiene mejor la cercanía al inglés auditado. La frase general fluye bien. La nota [a] es defectuosa porque ofrece como alternativa exactamente la misma lectura que el texto principal. La nota sobre «ofrendas» es útil, aunque conviene simplificarla.
  glossary_alignment: 'Hay un incumplimiento de la terminología por defecto del proyecto: Κυρίου debe representarse como «Yahvé» cuando funciona como nombre divino, no como convención de enmascaramiento «Señor». La elección «ofrendas» para δῶρα es defendible en español por claridad cultual, con nota que preserve la alternativa más literal «dones». «Hijos» respeta bien υἱοὶ.'
  issues:
  - severity: high
    issue: Uso de «del Señor» en lugar de «de Yahvé»
    rationale: La pauta del proyecto exige «Yahvé» en el texto principal para el nombre divino, y la justificación dada en el borrador depende de una excepción no demostrada por la evidencia suministrada.
  - severity: medium
    issue: «hechos impíos» no refleja suficientemente ἀνομίαις
    rationale: El griego apunta a actos de iniquidad o de transgresión de la ley; «impíos» desplaza el sentido hacia irreverencia religiosa más que hacia iniquidad/lawlessness.
  - severity: medium
    issue: La nota [a] repite el texto principal en vez de dar una alternativa real
    rationale: El texto principal ya dice «los hijos de Jerusalén»; una nota que ofrece exactamente eso no aporta información. La alternativa documentada en el rastro inglés es «los hijos»/«los hijos de Jerusalén» frente a «los hijos» y sobre todo «los hijos» frente a «los hijos/niños» no; lo mejor es ofrecer «los hijos de Jerusalén» en el texto y «O «los hijos/descendientes de Jerusalén»» o, más fiel al audit trail, «O «los hijos de Jerusalén»» si el texto principal cambiara, pero aquí debe corregirse.
  revised_spanish_text: porque los hijos de Jerusalén contaminaron las cosas santas de Yahvé; profanaron las ofrendas[a] de Dios con sus obras de iniquidad.
  revised_footnotes:
  - marker: a
    text: Aquí «ofrendas» refleja el sentido cultual de δῶρα; más literalmente, «dones».
    reason: lexical_alternative
  revision_rationale: Se corrige «del Señor» a «de Yahvé» para ajustarse a la terminología obligatoria del proyecto. Se reemplaza «hechos impíos» por «obras de iniquidad» para reflejar mejor ἀνομίαις. Se elimina la nota [a] defectuosa sobre «hijos» y se conserva solo una nota útil para δῶρα, donde el español principal favorece la claridad cultual mientras preserva la alternativa más literal.
