    text: Or, 'that they may accompany you' or 'be attached to you'; the Hebrew verb also echoes the name Levi.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''the tent of the testimony''; many English versions read ''tent of meeting'' here by familiarity with related tabernacle expressions.'
    reason: alternative_reading
