translation:
  language: es
  text: Y el rey les respondió con dureza[a], y el rey Roboam abandonó el consejo de los ancianos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «severamente».
    reason: lexical_alternative
  - marker: b
    text: O «rechazó el consejo de los ancianos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲנֵם
  english_pob_choice: answered them
  chosen_spanish: les respondió
  alternatives_spanish:
  - les contestó
  - les respondió a ellos
  lexicon: HALOT
  rationale: ענה aquí tiene sentido de responder; el sufijo de 3ª plural requiere explicitar el objeto. En español, «les respondió» comunica naturalmente la relación verbal sin sobrecargar la frase.
- source_word: קָשָׁה
  english_pob_choice: harshly
  chosen_spanish: con dureza
  alternatives_spanish:
  - duramente
  - severamente
  - ásperamente
  lexicon: HALOT
  rationale: Aunque el hebreo es adjetival, funciona adverbialmente con el verbo de respuesta. «Con dureza» conserva la fuerza de una respuesta áspera o severa sin sonar mecánico.
- source_word: וַיַּעֲזֹב
  english_pob_choice: forsook
  chosen_spanish: abandonó
  alternatives_spanish:
  - dejó
  - rechazó
  - forsook
  lexicon: HALOT
  rationale: עזב expresa dejar, abandonar o apartarse de algo. «Abandonó» comunica con claridad la decisión de descartar el consejo; «rechazó» sería más interpretativo y menos literal.
- source_word: עֲצַת
  english_pob_choice: the counsel
  chosen_spanish: el consejo
  alternatives_spanish:
  - la aconseja
  - el consejo/la recomendación
  - la instrucción
  lexicon: HALOT
  rationale: עצה designa consejo, recomendación o plan. «El consejo» mantiene el registro formal y el valor deliberativo del pasaje.
- source_word: הַזְּקֵנִים
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los mayores
  - los viejos
  - los ancianos líderes
  lexicon: HALOT
  rationale: זקנים en este contexto se refiere a los consejeros/dirigentes de mayor edad. «Ancianos» es la equivalencia más estable y bíblicamente reconocible en español.
- source_word: הַמֶּלֶךְ רְחַבְעָם
  english_pob_choice: King Rehoboam
  chosen_spanish: el rey Roboam
  alternatives_spanish:
  - Roboam, el rey
  - el rey Rehoboam
  lexicon: HALOT
  rationale: La apposición hebrea identifica al rey por nombre. «El rey Roboam» es natural en español y preserva la identificación sin invertir el orden.
theological_decisions:
- issue: Valor de la respuesta «con dureza» frente a posibles matices de severidad
  english_pob_reading: harshly / severely
  chosen_spanish_reading: con dureza
  alternative_spanish_readings:
  - duramente
  - severamente
  rationale: 'No hay un problema doctrinal, pero sí un matiz semántico: el texto enfatiza la aspereza de la respuesta real. «Con dureza» retiene ese efecto sin añadir una interpretación moral extra.'
  doctrine_reference: none
translation_notes:
  revision_awareness: 'El inglés auditado cambió de «abandoned» a «forsook» para un registro algo más formal; en español se eligió «abandonó» porque es el equivalente natural y conserva el acto deliberado de dejar de lado el consejo. También se conservó el paralelismo narrativo de dos acciones consecutivas: respuesta áspera y abandono del consejo.'
  spanish_consistency_notes:
  - Se mantiene «el rey Roboam» para la apposición del hebreo y para coherencia con el nombre propio en el corpus.
  - Se usa «ancianos» para זקנים en sentido de consejeros/dirigentes, no como simple referencia a edad.
  - Se evita «SEÑOR» u otras sustituciones porque el versículo no contiene el nombre divino.
