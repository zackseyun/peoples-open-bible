base_translation:
  language: en
  yaml_path: translation/ot/joshua/004/008.yaml
  text: And the sons of Israel did so[a], just as Joshua had commanded, and they carried twelve stones from the midst of the Jordan, just as Yahweh had spoken to Joshua, according to the number of the tribes of the sons of Israel[c][b]; and they brought them over with them to the lodging place and set them down there.
  footnotes:
