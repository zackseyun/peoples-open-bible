translation:
  language: es
  text: El heno desaparece[a], y aparece la vegetación nueva[b], y se recogen las hierbas de los montes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa: «el heno queda al descubierto», «la hierba desaparece» o «el heno es quitado». El verbo hebreo puede expresar quedar al descubierto o ser quitado; el contexto sugiere que el forraje ha sido cortado o ha desaparecido.'
    reason: lexical_alternative
  - marker: b
    text: 'Alternativa: «la hierba tierna» o «la hierba fresca». El hebreo puede referirse a vegetación nueva o a rebrote tierno.'
    reason: lexical_alternative
  - marker: c
    text: 'Alternativa: «las plantas de los montes» o «la vegetación de los montes». El hebreo también admite una referencia más amplia a la vegetación herbácea de los montes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּלָה
  english_pob_choice: is removed
  chosen_spanish: se quita
  alternatives_spanish:
  - se descubre
  - se aparta
  - desaparece
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar quedar al descubierto o ser quitado. En este contexto agrícola, el sentido práctico es que el forraje ya no está; "se quita" comunica la acción/resultante sin imponer una paráfrasis excesiva.
- source_word: חָצִיר
  english_pob_choice: hay
  chosen_spanish: heno
  alternatives_spanish:
  - pasto
  - hierba
  lexicon: HALOT
  rationale: Aunque el término puede abarcar hierba, en este contexto de cosecha y rebrotes "heno" refleja mejor el forraje cortado o retirado y mantiene la secuencia agrícola del verso.
- source_word: נִרְאָה
  english_pob_choice: appears
  chosen_spanish: aparece
  alternatives_spanish:
  - se ve
  - se hace visible
  lexicon: HALOT
  rationale: La forma niphal denota aparición o ser visto. "Aparece" es natural en español y conserva la idea de surgimiento visible del vegetal tierno.
- source_word: דֶשֶׁא
  english_pob_choice: new growth
  chosen_spanish: el brote nuevo
  alternatives_spanish:
  - la hierba tierna
  - el pasto fresco
  - la vegetación nueva
  lexicon: HALOT
  rationale: El término designa vegetación fresca o tierno rebrote. "Brote nuevo" transmite la idea de crecimiento reciente y evita repetir "hierba" de modo redundante en una línea poética corta.
- source_word: נֶאֶסְפוּ
  english_pob_choice: are gathered
  chosen_spanish: se recogen
  alternatives_spanish:
  - se juntan
  - se cosechan
  lexicon: HALOT
  rationale: La pasiva hebrea permite una traducción impersonal. "Se recogen" es fiel y suficientemente amplia para el contexto pastoral; "se cosechan" sería posible, pero más específica.
- source_word: עִשְּׂבוֹת
  english_pob_choice: the grasses
  chosen_spanish: las hierbas
  alternatives_spanish:
  - los pastos
  - las gramíneas
  - la vegetación
  lexicon: HALOT
  rationale: El sustantivo abarca herbage o vegetación herbácea. "Hierbas" funciona bien en español bíblico contemporáneo, sin sonar culinario como a veces puede pasar con "hierbas" en otros contextos, y conserva amplitud semántica.
- source_word: הָרִים
  english_pob_choice: of the mountains
  chosen_spanish: de los montes
  alternatives_spanish:
  - de las montañas
  - de las colinas
  - del monte
  lexicon: HALOT
  rationale: La poesía hebrea usa הָרִים para "montes" / "montañas". En español, "montes" preserva el tono poético y es una opción natural para la imaginería campestre, sin rebajar indebidamente el término a "colinas".
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés, pero se evitó calcar "mountains" como "montañas" cuando "montes" preserva mejor el tono poético y la naturalidad bíblica en español. También se mantuvo la triple progresión agrícola del verso: forraje retirado, rebrote visible, y recolección de vegetación de los montes.'
  spanish_consistency_notes:
  - Se mantuvo la terminología agrícola de forma consistente en todo el verso.
  - Se evitó sustituir el hebreo por un equivalente demasiado moderno o técnico.
  - Las alternativas en nota preservan las tensiones léxicas documentadas en el inglés POB.
