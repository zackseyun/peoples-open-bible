translation:
  language: es
  text: 'Y dijo: «Escuchen, todo Judá y los habitantes de Jerusalén, y el rey Josafat: Así dice Yahvé para ustedes: “No teman ni se desanimen por causa de esta gran multitud, porque la batalla no es de ustedes, sino de Dios[a]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «porque la batalla no es de ustedes, sino que pertenece a Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְשִׁיבוּ
  english_pob_choice: Listen
  chosen_spanish: Escuchen
  alternatives_spanish:
  - Presten atención
  - Oigan
  lexicon: HALOT
  rationale: El imperativo plural pide atención activa. «Escuchen» es natural en español, mantiene el tono directo y conserva mejor la fuerza exhortativa que un calco como «den oído».
- source_word: כָל יְהוּדָה
  english_pob_choice: all Judah
  chosen_spanish: todo Judá
  alternatives_spanish:
  - todo el pueblo de Judá
  - toda Judá
  lexicon: HALOT
  rationale: La designación colectiva geográfica/tribal se expresa con concisión en español. «Todo Judá» preserva la amplitud del destinatario sin añadir palabras ajenas al hebreo.
- source_word: וְיֹשְׁבֵי יְרוּשָׁלִַם
  english_pob_choice: inhabitants of Jerusalem
  chosen_spanish: los habitantes de Jerusalén
  alternatives_spanish:
  - los que habitan en Jerusalén
  - los residentes de Jerusalén
  lexicon: HALOT
  rationale: El participio indica quienes viven allí. «Habitantes» es idiomático y formal, y conserva el matiz descriptivo del hebreo.
- source_word: וְהַמֶּלֶךְ יְהוֹשָׁפָט
  english_pob_choice: and King Jehoshaphat
  chosen_spanish: y el rey Josafat
  alternatives_spanish:
  - y el rey, Josafat
  - y el rey Jehosafat
  lexicon: HALOT
  rationale: Se mantiene la aposición título-nombre de forma fluida en español. «Josafat» es la forma usual del nombre en español bíblico y no altera el referente.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética solemne con el nombre divino del proyecto. «Así dice» reproduce bien el presente profético del hebreo y evita una paráfrasis excesiva.
- source_word: אַל תִּירְאוּ
  english_pob_choice: Do not fear
  chosen_spanish: No teman
  alternatives_spanish:
  - No tengan miedo
  - No se asusten
  lexicon: HALOT
  rationale: La prohibición directa de ירא se vierte con la forma natural y digna «No teman», que conserva el tono elevado y la fuerza del mandato.
- source_word: וְאַל תֵּחַתּוּ
  english_pob_choice: and do not be dismayed
  chosen_spanish: ni se desanimen
  alternatives_spanish:
  - ni se acobarden
  - ni se derrumben
  lexicon: HALOT
  rationale: חתת expresa quedar quebrantado, atemorizado o abatido. «Desanimen» comunica bien el efecto práctico en español sin borrar la intensidad de la advertencia; el «ni» une ambos imperativos de forma natural.
- source_word: מִפְּנֵי הֶהָמוֹן הָרָב הַזֶּה
  english_pob_choice: because of this great multitude
  chosen_spanish: por causa de esta gran multitud
  alternatives_spanish:
  - ante esta gran multitud
  - a causa de esta gran multitud
  lexicon: HALOT
  rationale: מִפְּנֵי aquí tiene valor causal en contexto. «Por causa de» mantiene explícita esa relación y conserva el referente colectivo sin cargarlo de interpretación adicional.
- source_word: הֶהָמוֹן הָרָב הַזֶּה
  english_pob_choice: this great multitude
  chosen_spanish: esta gran multitud
  alternatives_spanish:
  - esta gran muchedumbre
  - esta gran masa
  lexicon: HALOT
  rationale: הָמוֹן denota una muchedumbre o multitud numerosa; con רָב y el demostrativo, «gran multitud» sigue de cerca el hebreo y suena natural en español.
- source_word: כִּי לֹא לָכֶם הַמִּלְחָמָה
  english_pob_choice: for the battle is not yours
  chosen_spanish: porque la batalla no es de ustedes
  alternatives_spanish:
  - porque la batalla no les pertenece
  - porque la batalla no es suya
  lexicon: HALOT
  rationale: La construcción posesiva se vuelve idiomática en español con «no es de ustedes». Se conserva el contraste de pertenencia/autoridad sin sobrecargar la frase.
- source_word: כִּי לֵאלֹהִים
  english_pob_choice: but God’s
  chosen_spanish: sino de Dios
  alternatives_spanish:
  - pero de Dios
  - sino que pertenece a Dios
  lexicon: HALOT
  rationale: El segundo כִּי funciona aquí con valor contrastivo-explicativo. «Sino de Dios» reproduce bien la oposición del hebreo y hace explícita la pertenencia de la batalla a Dios, sin perder la sobriedad del original.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - El SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme al criterio del proyecto, se preserva el nombre propio divino como «Yahvé» en vez de ocultarlo con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Relación posesiva en «la batalla no es de ustedes, sino de Dios»
  english_pob_reading: for the battle is not yours, but God’s
  chosen_spanish_reading: porque la batalla no es de ustedes, sino de Dios
  alternative_spanish_readings:
  - porque la batalla no es suya, sino de Dios
  - porque la batalla pertenece a Dios y no a ustedes
  rationale: El hebreo no desarrolla una tesis general, sino que afirma la pertenencia/control de esta batalla en particular. «De ustedes» / «de Dios» conserva el contraste de posesión y evita añadir explicaciones doctrinales ajenas al contexto inmediato.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Matiz de וְאַל תֵּחַתּוּ
  english_pob_reading: and do not be dismayed
  chosen_spanish_reading: ni se desanimen
  alternative_spanish_readings:
  - ni se aterren
  - ni se quebranten
  rationale: El verbo hebreo puede abarcar quedar abatido, aterrarse o quebrarse interiormente. «Desanimen» es la opción española más natural en este exhorto militar, aunque se reconoce que el hebreo es más fuerte que un simple consejo emocional.
  doctrine_reference: HALOT; contexto de exhortación militar en 2 Crónicas 20
translation_notes:
  revision_awareness: La pauta inglesa revisada afinó la coordinación de la doble prohibición a «do not fear or be dismayed» y mantuvo la cláusula final como posesiva concisa. La versión española sigue esa misma decisión de fluidez, usando una coordinación natural («No teman ni se desanimen») y conservando el cierre posesivo sin convertirlo en una explicación más larga.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino según la política del proyecto.
  - «Judá» y «Jerusalén» se dejan como nombres propios territoriales y urbanos, sin expandirlos innecesariamente.
  - La cláusula final conserva el contraste de pertenencia entre los destinatarios y Dios, tal como en el hebreo y en la lectura inglesa auditada.
  - La puntuación y el estilo buscan ser publicables en español bíblico contemporáneo, sin caer en calcos rígidos.
