    issue: «sanas de carne» es poco idiomático en español
    rationale: Aunque intenta preservar la imagen hebrea, la frase suena forzada en español neutral. Una opción como «saludables de cuerpo» o «robustas de cuerpo» conserva la idea corporal sin caer en un calco extraño.
  - severity: low
    issue: «hermosas de aspecto» debilita el matiz de תֹּאַר
    rationale: El hebreo apunta más a forma/figura que a simple apariencia general. «Hermosas de figura» o «hermosas en su forma» se acerca mejor al original y al POB inglés.
  - severity: low
