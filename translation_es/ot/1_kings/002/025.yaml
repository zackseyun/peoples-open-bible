translation:
  language: es
  text: Así que el rey Salomón envió a Benaía hijo de Joyadá[a], y él lo derribó, y murió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «envió por la mano de Benaía hijo de Joyadá», un modismo que significa que lo envió como su agente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El hebreo narra con el verbo común שׁלח en forma consecutiva; «envió» conserva ese valor básico y funciona naturalmente en español sin perder la idea de comisión del acto.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: King Solomon
  chosen_spanish: el rey Salomón
  alternatives_spanish:
  - el rey, Salomón
  - rey Salomón
  lexicon: HALOT
  rationale: En español, la apposición se expresa de forma natural como «el rey Salomón», manteniendo el título real y el nombre propio con claridad y dignidad.
- source_word: בְּיַד
  english_pob_choice: sent Benaiah son of Jehoiada
  chosen_spanish: envió a Benaía hijo de Joyadá
  alternatives_spanish:
  - envió por medio de Benaía hijo de Joyadá
  - envió mediante la mano de Benaía hijo de Joyadá
  lexicon: HALOT
  rationale: El hebreo literalmente dice «por la mano de», con sentido de agencia o instrumento. En español, la equivalencia óptima es incluir a Benaía como objeto directo de «envió»; la nota preserva la lectura más literal.
- source_word: בְּנָיָהוּ בֶן יְהוֹיָדָע
  english_pob_choice: Benaiah son of Jehoiada
  chosen_spanish: Benaía hijo de Joyadá
  alternatives_spanish:
  - Benaía, hijo de Joyadá
  lexicon: HALOT
  rationale: Se conserva la relación patronímica de forma natural en español bíblico. «Hijo de» es más fluido que una construcción con comas y mantiene el vínculo familiar explícito.
- source_word: וַיִּפְגַּע בּוֹ
  english_pob_choice: he struck him down
  chosen_spanish: lo hirió de muerte
  alternatives_spanish:
  - lo atacó
  - se abatió sobre él
  - lo hirió
  lexicon: HALOT
  rationale: פגע con ב puede abarcar encuentro hostil, ataque o golpe. Dado que el resultado inmediato es la muerte, «lo hirió de muerte» comunica el golpe letal sin convertir anticipadamente el siguiente miembro narrativo en una simple repetición.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - así murió
  - y falleció
  lexicon: HALOT
  rationale: La forma narrativa hebrea se vierte de manera directa con «y murió», conservando la secuencia explícita entre el golpe y el fallecimiento.
translation_notes:
  revision_awareness: 'Se ha seguido el texto hebreo masorético y el audit trail inglés sin cambios relevantes: la nota conserva la alternativa literal de בְּיַד, mientras el cuerpo principal usa una equivalencia española natural y auditable.'
  spanish_consistency_notes:
  - Se usa «Salomón» y «Benaía/Joyadá» con transliteración estándar bíblica en español.
  - Se eligió «hirió de muerte» para mantener la fuerza letal de פגע sin absorber por completo el sentido en «mató».
  - La puntuación reproduce el flujo narrativo breve del verso y conserva el tono sobrio del original.
