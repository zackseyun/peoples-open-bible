translation:
  language: es
  text: 'Jesús dijo[a]: «Les daré lo que ojo no ha visto, y lo que oído no ha oído[e][d][c][b], y lo que mano no ha tocado, y no ha surgido sobre el corazón del ser humano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ustedes» es plural en el copto (ⲛⲁⲛⲧⲱⲧⲛ).
    reason: dialect_note
  - marker: b
    text: La frase preposicional es literalmente «sobre el corazón» (ϩⲓ ⲡϩⲏⲧ), no la más idiomática «en el corazón» o «dentro del corazón».
    reason: lexical_alternative
  - marker: c
    text: Cf. Isaías 64:4 y 1 Corintios 2:9 para una tríada relacionada («ojo no ha visto …»), aunque aquí Tomás se traduce directamente desde el copto.
    reason: cross_reference
  - marker: d
    text: 'En el manuscrito, el marcado del objeto tras los verbos de percepción aparece como ⲉⲣⲟϥ en la primera cláusula; Dilley normaliza con ⲛⲧⲟϥ a través de toda la tríada. El sentido es: «verlo / oírlo / tocarlo».'
    reason: textual_variant
  - marker: e
    text: 'O también: «Yo mismo les daré».'
    reason: previous_rendering
lexical_decisions:
- source_word: ϯⲛⲁϯ
  english_pob_choice: I will give
  chosen_spanish: yo les daré
  alternatives_spanish:
  - yo daré
  - les daré
  lexicon: Layton, s.v. ϯ
  rationale: El verbo en futuro prospectivo se expresa naturalmente con «daré»; el sujeto ya está explícito en la forma verbal, por lo que no se añade un énfasis inexistente en el copto. «Les» refleja el objeto plural del original.
- source_word: ⲛⲁⲛⲧⲱⲧⲛ
  english_pob_choice: to you (plural)
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: Layton, s.v. ⲧⲱⲧ
  rationale: El destinatario es plural. En español, «les» conserva la pluralidad sin forzar una variedad regional; el plural se puede explicar en nota si hace falta.
- source_word: ⲙⲡⲉⲃⲁⲗ … ⲛⲁⲩ
  english_pob_choice: eye … has not seen
  chosen_spanish: ojo no ha visto
  alternatives_spanish:
  - un ojo no ha visto
  - el ojo no ha visto
  lexicon: Crum, s.v. ⲃⲁⲗ; Layton, s.v. ⲛⲁⲩ
  rationale: El singular genérico copto se vierte con un español también proverbial y sin artículo. «Ojo» conserva la imagen gnómica del texto y su paralelismo con las otras cláusulas.
- source_word: ⲙⲁⲁϫⲉ … ⲥⲱⲧⲙ
  english_pob_choice: ear … has not heard
  chosen_spanish: oído no ha escuchado
  alternatives_spanish:
  - oreja no ha escuchado
  - un oído no ha escuchado
  lexicon: Crum, s.v. ⲙⲁⲁϫⲉ; Crum, s.v. ⲥⲱⲧⲙ
  rationale: «Oído» es idiomático y mantiene mejor el paralelismo bíblico y proverbial que «oreja». «Escuchado» transmite bien el acto perceptivo sin endurecer el ritmo del tríptico.
- source_word: ϭⲓϫ … ϭⲙϭⲱⲙ
  english_pob_choice: hand … has not touched
  chosen_spanish: mano no ha tocado
  alternatives_spanish:
  - mano no ha palpado
  - mano no ha manejado
  lexicon: Crum, s.v. ϭⲓϫ; Crum, s.v. ϭⲙϭⲱⲙ
  rationale: «Tocado» reproduce el campo táctil básico de ϭⲙϭⲱⲙ y encaja con el paralelismo de la serie sensorial.
- source_word: ⲉϩⲣⲁⲓ
  english_pob_choice: it has not arisen
  chosen_spanish: no ha surgido
  alternatives_spanish:
  - no ha subido
  - no ha ascendido
  lexicon: Crum, s.v. ⲉϩⲣⲁⲓ
  rationale: Se conserva la imagen de ‘levantarse / surgir’ sin volverla a una metáfora más interpretativa como «entrar». «Surgido» suena natural en español y mantiene la tensión del dicho.
- source_word: ϩⲓ ⲡϩⲏⲧ
  english_pob_choice: upon the heart
  chosen_spanish: sobre el corazón
  alternatives_spanish:
  - en el corazón
  - en el interior del corazón
  lexicon: Layton, s.v. ϩⲓ (prepositions); Crum, s.v. ⲡϩⲏⲧ
  rationale: La preposición indica contacto/superficie; «sobre» conserva la literalidad. «Corazón» es el equivalente natural de ⲡϩⲏⲧ en español bíblico y contemporáneo.
- source_word: ⲡⲣⲱⲙⲉ
  english_pob_choice: the human
  chosen_spanish: el ser humano
  alternatives_spanish:
  - el hombre
  - la persona humana
  lexicon: Crum, s.v. ⲣⲱⲙⲉ
  rationale: El sustantivo copto es genérico; «ser humano» evita una lectura sexista y conserva el valor universal del dicho.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la lectura previa «yo mismo daré» a la forma simple del futuro copto («yo daré / daré»), evitando añadir un énfasis no presente en el texto fuente. También se respetó la nota sobre la pluralidad del destinatario y la literalidad de la preposición «sobre».
  spanish_consistency_notes:
  - 'Se mantiene la serie sensorial con sustantivos singulares genéricos: ojo / oído / mano.'
  - Se preserva el paralelismo y la cadencia breve del dicho sin expandirlo interpretativamente.
  - El término «ser humano» evita una lectura masculina exclusiva de ⲣⲱⲙⲉ.
  - Las notas conservan la tensión entre literalidad («sobre el corazón») e idiomaticidad («en el corazón»).
