id: EZK.16.36
reference: Ezekiel 16:36
source:
  edition: WLC
  text: כֹּֽה אָמַ֞ר אֲדֹנָ֣/י יְהֹוִ֗ה יַ֣עַן הִשָּׁפֵ֤ךְ נְחֻשְׁתֵּ/ךְ֙ וַ/תִּגָּלֶ֣ה עֶרְוָתֵ֔/ךְ בְּ/תַזְנוּתַ֖יִ/ךְ עַל מְאַהֲבָ֑יִ/ךְ וְ/עַל֙ כָּל גִּלּוּלֵ֣י תוֹעֲבוֹתַ֔יִ/ךְ וְ/כִ/דְמֵ֣י בָנַ֔יִ/ךְ אֲשֶׁ֥ר נָתַ֖תְּ לָ/הֶֽם־־־׃
translation:
  text: 'Thus says the Lord GOD: Because your bronze was poured out[a], and your nakedness was uncovered in your prostitutions with your lovers, and because of all the idols of your abominations, and because of the blood of your children whom you gave to them[c][b],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'your wealth was poured out'; the Hebrew 'your bronze' may function metaphorically for wealth lavished on illicit lovers, and some take it more broadly as a figure for lewd exposure.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the idols of your abominations'; that is, your detestable idols.
    reason: lexical_alternative
  - marker: c
    text: That you gave to them, i.e., in child sacrifice to idols.
    reason: cultural_note
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  lexicon: HALOT
  rationale: Rendered the title pair in the conventional English form 'the Lord GOD.' Per doctrine, YHWH is rendered 'the LORD'; however, in the fixed Ezekielian combination אֲדֹנָי יְהוִה, English translations commonly avoid 'Lord LORD' by using 'Lord GOD,' which preserves the distinction and readability.
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Because
  - Since
  - Forasmuch as
  lexicon: HALOT
  rationale: Introduces the causal ground for the coming judgment. 'Because' is the clearest modern English equivalent.
- source_word: הִשָּׁפֵךְ
  chosen: was poured out
  alternatives:
  - was poured out
  - was spilled
  lexicon: HALOT
  rationale: Passive verbal form from שפך, 'to pour out.' 'Was poured out' preserves the metaphorical/passive force better than the more colloquial 'was spilled.'
- source_word: נְחֻשְׁתֵּךְ
  chosen: your bronze
  alternatives:
  - your bronze
  - your wealth
  - your lewdness
  lexicon: HALOT
  rationale: The noun normally means 'bronze/copper.' In context many understand it metaphorically for wealth or, by interpretive extension, sexual shame. The plain lexical sense is retained in the main text as 'your bronze,' allowing the metaphor to stand rather than be over-resolved. A footnote preserves the interpretive alternative.
- source_word: וַתִּגָּלֶה עֶרְוָתֵךְ
  chosen: your nakedness was uncovered
  alternatives:
  - your nakedness was uncovered
  - your shame was exposed
  lexicon: HALOT
  rationale: A common idiom for sexual exposure/shame. 'Nakedness was uncovered' keeps the Hebrew imagery; 'shame was exposed' is interpretive and therefore left as an alternative.
- source_word: בְּתַזְנוּתַיִךְ
  chosen: in your prostitutions
  alternatives:
  - in your prostitutions
  - in your whorings
  - through your acts of prostitution
  lexicon: HALOT
  rationale: Plural abstract/concrete form from זנה. 'Prostitutions' preserves the repeated acts and the sexualized metaphor for covenant unfaithfulness without using overly archaic diction.
- source_word: עַל מְאַהֲבָיִךְ
  chosen: with your lovers
  alternatives:
  - with your lovers
  - before your lovers
  - over your lovers
  lexicon: HALOT
  rationale: Although עַל often means 'upon/over,' in this context with sexual exposure and prostitution it is best represented idiomatically as involvement with the lovers. 'With' communicates the relational sense in natural English.
- source_word: גִּלּוּלֵי תוֹעֲבוֹתַיִךְ
  chosen: the idols of your abominations
  alternatives:
  - the idols of your abominations
  - all your detestable idols
  - the dung-idols of your abominations
  lexicon: HALOT
  rationale: גִּלּוּלִים is Ezekiel's contemptuous term for idols; תּוֹעֵבָה denotes abomination/detestable thing. 'The idols of your abominations' stays close to the Hebrew structure, while a smoother alternative is preserved in a footnote.
- source_word: וְכִדְמֵי בָנַיִךְ
  chosen: and because of the blood of your children
  alternatives:
  - and because of the blood of your children
  - and like the blood of your children
  lexicon: HALOT
  rationale: The prefixed כ here is best taken in an idiomatic/causal sense within the accumulation of charges, not as a simple comparison. The phrase refers to bloodguilt from child sacrifice.
- source_word: אֲשֶׁר נָתַתְּ לָהֶם
  chosen: that you gave to them
  alternatives:
  - that you gave to them
  - whom you gave to them
  - which you offered to them
  lexicon: HALOT
  rationale: Retains the directness of נתן 'give.' The object is the children, and 'gave to them' preserves the horrifying sacrificial sense without importing 'offered' into the main text.
