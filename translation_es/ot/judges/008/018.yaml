translation:
  language: es
  text: 'Entonces dijo a Zebaj y a Zalmuna: «¿Dónde están los hombres que ustedes mataron en Tabor[a]?». Y dijeron: «Como tú, así eran ellos; cada uno tenía la apariencia de los hijos de un rey».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tabor» se refiere al monte Tabor.
    reason: cultural_note
lexical_decisions:
- source_word: אֵיפֹה
  english_pob_choice: Where are
  chosen_spanish: ¿Dónde están
  alternatives_spanish:
  - ¿Dónde
  lexicon: HALOT
  rationale: En español, la pregunta de ubicación suena natural con el verbo explícito «están». Conserva el valor interrogativo de ubicación del hebreo sin añadir contenido ajeno.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - las personas
  lexicon: HALOT
  rationale: El referente son los varones muertos por ellos; «hombres» mantiene mejor el valor léxico que una forma genérica como «personas».
- source_word: הֲרַגְתֶּם
  english_pob_choice: you killed
  chosen_spanish: mataron
  alternatives_spanish:
  - dieron muerte a
  - asesinaron
  - mataron ustedes
  lexicon: HALOT
  rationale: El verbo básico es matar/mataron. En español el sujeto ya queda claro por el contexto y el diálogo directo, así que no es necesario repetir «ustedes».
- source_word: בְּתָבוֹר
  english_pob_choice: at Tabor
  chosen_spanish: en Tabor
  alternatives_spanish:
  - en el Tabor
  - en el monte Tabor
  lexicon: HALOT
  rationale: «En Tabor» reproduce de forma concisa la referencia locativa al topónimo. No se expande a «monte Tabor» en el texto principal, aunque la identificación geográfica sea posible.
- source_word: כָּמוֹךָ כְמוֹהֶם
  english_pob_choice: As you are, so were they
  chosen_spanish: Como tú, así eran ellos
  alternatives_spanish:
  - Ellos eran como tú
  - Como tú eran ellos
  lexicon: HALOT
  rationale: La construcción comparativa hebrea es elíptica. Esta formulación conserva la comparación directa y la fluidez natural del español, sin perder la equivalencia entre Gideón y los caídos.
- source_word: אֶחָד
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - uno a uno
  - cada cual
  lexicon: HALOT
  rationale: El valor distributivo se expresa naturalmente con «cada uno», que conserva la idea de individualidad dentro del conjunto.
- source_word: כְּתֹאַר
  english_pob_choice: had the appearance of
  chosen_spanish: tenía la apariencia de
  alternatives_spanish:
  - tenía el aspecto de
  - parecía
  lexicon: HALOT
  rationale: «תֹאַר» se refiere a forma/apariencia exterior. «Tenía la apariencia de» mantiene la referencia visual y no reduce el matiz a una mera impresión subjetiva.
- source_word: בְּנֵי הַמֶּלֶךְ
  english_pob_choice: the sons of a king
  chosen_spanish: los hijos de un rey
  alternatives_spanish:
  - los hijos del rey
  - los príncipes
  - los descendientes de un rey
  lexicon: HALOT
  rationale: La frase hebrea comunica una apariencia real o principesca, pero de modo literal habla de «hijos de un rey». Mantener esa literalidad preserva el efecto descriptivo sin imponer el término interpretativo «príncipes».
- source_word: וַיֹּאמֶר ... וַיֹּאמְרוּ
  english_pob_choice: Then he said ... And they said
  chosen_spanish: Entonces dijo ... Y ellos respondieron
  alternatives_spanish:
  - Entonces dijo ... Y dijeron
  - Entonces habló ... Y dijeron
  lexicon: HALOT
  rationale: La secuencia narrativa wayyiqtol se reproduce con una transición natural en español. «Respondieron» es aceptable aquí porque la segunda intervención funciona claramente como réplica al interrogante de Gedeón.
theological_decisions:
- issue: Tratamiento del nombre divino no presente en el versículo
  english_pob_reading: No theological issue was flagged in the English audit; the verse contains no divine-name rendering decision.
  chosen_spanish_reading: No se introduce ninguna marca de nombre divino, porque el versículo no la contiene.
