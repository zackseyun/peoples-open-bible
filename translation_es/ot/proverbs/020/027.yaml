translation:
  language: es
  text: El espíritu del hombre es la lámpara de Yahvé[a], que escudriña todos los aposentos más íntimos del vientre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el aliento del hombre es la lámpara de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los aposentos del vientre», un modismo para las partes más profundas del interior o del ser de una persona.'
    reason: cultural_note
lexical_decisions:
- source_word: נֵר
  english_pob_choice: lamp
  chosen_spanish: lámpara
  alternatives_spanish:
  - luz
  lexicon: HALOT
  rationale: נֵר designa concretamente una lámpara, no una luz abstracta. «Lámpara» conserva la imagen de algo que ilumina y revela lo oculto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» para preservar el nombre divino propio, en lugar de sustituirlo por un título. Es la forma de uso estable del proyecto en español.
- source_word: נִשְׁמַת
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - aliento
  - soplo
  - alma
  lexicon: HALOT
  rationale: נשמה puede significar aliento, soplo o espíritu. Aquí se refiere al principio interior del ser humano que participa en la metáfora de examen; «espíritu» transmite mejor ese sentido antropológico sin imponer «conciencia».
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - ser humano
  - humanidad
  lexicon: HALOT
  rationale: אָדָם es singular genérico y representativo. «Hombre» mantiene esa forma singular y la fuerza proverbial mejor que un plural abstracto.
- source_word: חֹפֵשׂ
  english_pob_choice: searching
  chosen_spanish: escudriña
  alternatives_spanish:
  - busca
  - examina
  - sondea
  lexicon: HALOT
  rationale: El participio expresa una acción continua de exploración o penetración. «Escudriña» comunica bien la idea de investigar a fondo lo oculto y encaja con el efecto de la lámpara.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada
  - todo
  lexicon: HALOT
  rationale: El hebreo abarca la totalidad de lo oculto; en español, «todos» mantiene esa amplitud de manera natural con el sustantivo pluralizado por el contexto.
- source_word: חַדְרֵי
  english_pob_choice: innermost chambers
  chosen_spanish: los rincones más íntimos
  alternatives_spanish:
  - las cámaras más recónditas
  - los aposentos internos
  - los recessos más profundos
  lexicon: HALOT
  rationale: Literalmente son «cámaras/aposentos», pero en español «rincones más íntimos» comunica la función idiomática de los lugares escondidos del interior sin sonar forzado.
- source_word: בָטֶן
  english_pob_choice: belly
  chosen_spanish: vientre
  alternatives_spanish:
  - vientre interior
  - abdomen
  - interior
  lexicon: HALOT
  rationale: בטן puede ser «vientre» y también referirse idiomáticamente al interior profundo de la persona. «Vientre» conserva la imagen corporal hebrea mejor que una abstracción como «interior».
theological_decisions:
- issue: Sentido antropológico de נִשְׁמַת אָדָם
  english_pob_reading: The verse speaks of the human spirit/life-breath as the LORD's lamp for probing a person's inner life.
  chosen_spanish_reading: El versículo presenta el espíritu humano como la lámpara de Yahvé para sondear la vida interior de la persona.
  alternative_spanish_readings:
  - El versículo podría entenderse más concretamente como el aliento vital del hombre bajo la escrutación divina.
  - También podría leerse con la idea de la conciencia como instrumento de examen dentro de la persona.
  rationale: El hebreo no menciona explícitamente la conciencia; por eso no debe importarse al texto principal. «Espíritu» preserva la amplitud antropológica y la tensión metafórica del proverbio, dejando abiertas las lecturas alternativas sin resolverlas artificialmente.
  doctrine_reference: Primacía del idioma original; mantener la tensión teológica donde el texto la deja abierta.
translation_notes:
  revision_awareness: 'Coincide con la última revisión registrada: no se documentan cambios necesarios y el estado de concordancia general es alto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al criterio del proyecto en español.
  - Se conserva la diferencia entre «espíritu» y «aliento» como alternativa, sin fundirla en una sola lectura.
  - «Escudriña» y «rincones más íntimos» intentan reflejar la fuerza penetrante de חֹפֵשׂ + חַדְרֵי sin sobreexplicar la imagen.
  - «Vientre» conserva la imaginería corporal hebrea, mientras la nota explica el modismo para el lector hispano.
  - Se evita introducir «conciencia» en el texto principal, porque esa interpretación no está explícita en el hebreo ni en el audit trail inglés.
