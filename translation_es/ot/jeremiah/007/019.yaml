translation:
  language: es
  text: ¿Acaso soy yo a quien ellos están provocando?, declara Yahvé. ¿No es más bien a sí mismos[a], para vergüenza de sus propios rostros?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «¿No están provocándose a sí mismos para su propia vergüenza?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֹתִי
  english_pob_choice: Is it I whom
  chosen_spanish: ¿Acaso soy yo a quien…?
  alternatives_spanish:
  - ¿Soy yo a quien…?
  - ¿Acaso a mí…?
  lexicon: HALOT
  rationale: La construcción hebrea pone en relieve el objeto directo con la pregunta retórica. En español, «¿Acaso soy yo a quien…?» conserva ese énfasis frontal sin volverlo forzado ni perder la función interrogativa.
- source_word: מַכְעִסִים
  english_pob_choice: are provoking
  chosen_spanish: están provocando
  alternatives_spanish:
  - están irritando
  - están airando
  lexicon: HALOT
  rationale: El hifil expresa provocar a ira o irritar. «Están provocando» mantiene el valor verbal progresivo y es natural en español moderno, sin diluir el sentido de provocación culpable.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», conforme al criterio doctrinal del proyecto. «Declara» reproduce adecuadamente la fórmula profética נְאֻם con un tono sobrio y bíblico en español.
- source_word: הֲלוֹא
  english_pob_choice: Is it not
  chosen_spanish: ¿No son más bien…?
  alternatives_spanish:
  - ¿No es más bien…?
  - ¿Acaso no son…?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera afirmación. «¿No son más bien…?» expresa bien el giro correctivo e intensificativo del hebreo, aunque exige ajustar la concordancia por el complemento implícito en español.
- source_word: אֹתָם
  english_pob_choice: themselves
  chosen_spanish: ellos mismos
  alternatives_spanish:
  - a ellos mismos
  - a ellos
  lexicon: HALOT
  rationale: 'Aunque el pronombre hebreo es formalmente «a ellos», el sentido retórico es reflexivo: el daño recae sobre los mismos que provocan. «Ellos mismos» preserva ese matiz, como en el audit trail inglés.'
- source_word: לְמַעַן
  english_pob_choice: to
  chosen_spanish: para
  alternatives_spanish:
  - con miras a
  - a fin de
  lexicon: HALOT
  rationale: Aquí la relación es de resultado o propósito. «Para» es la opción española más breve y fiel para introducir la consecuencia expresada por la cláusula siguiente.
- source_word: בֹּשֶׁת
  english_pob_choice: the shame
  chosen_spanish: la vergüenza
  alternatives_spanish:
  - la vergüenza
  - la deshonra
  lexicon: HALOT
  rationale: En español, «vergüenza» comunica de forma natural el valor de bōšet, que abarca vergüenza pública y deshonra. Se evita un término demasiado técnico o arcaizante.
- source_word: פְּנֵיהֶם
  english_pob_choice: their own faces
  chosen_spanish: de su propio rostro
  alternatives_spanish:
  - de sus rostros
  - sobre su propio rostro
  lexicon: HALOT
  rationale: El hebreo conserva la imagen concreta del «rostro» como sede visible del oprobio. En español, el singular colectivo «rostro» suena más natural y mantiene la fuerza idiomática de la expresión.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. Conforme al criterio del proyecto, se translitera como «Yahvé» en el texto principal, preservando el nombre personal del pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado no requirió cambios de revisión en el pass más reciente; la versión española sigue de cerca su solución óptima de equivalencia, manteniendo la pregunta retórica, el contraste reflexivo y la imagen de la vergüenza facial.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, en coherencia con la terminología doctrinal del proyecto.
  - Se conserva el tono profético con «declara», equivalente sobrio de נְאֻם.
  - Se traduce el valor reflexivo de אֹתָם como «ellos mismos», evitando el simple «a ellos» que perdería la fuerza retórica.
  - Se opta por «rostro» en singular colectivo para reflejar la imagen hebrea sin sonar artificial en español.
