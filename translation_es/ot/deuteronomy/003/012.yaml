translation:
  language: es
  text: Y tomamos posesión de esta tierra en aquel tiempo, desde Aroer, que está sobre el valle del Arnón[a], y la mitad de la región montañosa de Galaad, con sus ciudades[b]; la di a los rubenitas y a los gaditas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde Aroer, que está junto al Wadi Arnón». El hebreo נחל puede referirse a un wadi, barranco o valle.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la mitad del monte Galaad». Aquí se prefiere «región montañosa de Galaad» porque el hebreo הַר suele referirse a una zona montañosa en descripciones territoriales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָרַשְׁנוּ
  english_pob_choice: we took possession of
  chosen_spanish: tomamos posesión de
  alternatives_spanish:
  - la poseímos
  - la heredamos
  lexicon: HALOT
  rationale: En contextos de conquista y reparto territorial, ירשׁ expresa adquisición/ocupación efectiva. En español, "tomamos posesión de" conserva ese valor activo mejor que "heredamos", que suena más pasivo o legalista.
- source_word: הָאָרֶץ הַזֹּאת
  english_pob_choice: this land
  chosen_spanish: esta tierra
  alternatives_spanish:
  - este territorio
  - este país
  lexicon: HALOT
  rationale: '"Tierra" es el equivalente natural en español para un territorio conquistado y asignado. "Territorio" es posible, pero menos idiomático en este contexto narrativo.'
- source_word: בָּעֵת הַהִוא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - entonces
  - en ese tiempo
  lexicon: HALOT
  rationale: La expresión temporal fija se traduce de manera directa y natural en español con "en aquel tiempo".
- source_word: מֵעֲרֹעֵר אֲשֶׁר עַל נַחַל אַרְנֹן
  english_pob_choice: from Aroer, which is on the Valley of the Arnon
  chosen_spanish: desde Aroer, que está junto al Valle del Arnón
  alternatives_spanish:
  - desde Aroer, que está sobre el Valle del Arnón
  - desde Aroer, que está en el valle del Arnón
  lexicon: HALOT
  rationale: Conserva el topónimo Aroer y la relación geográfica del hebreo con נחל, evitando fijar innecesariamente una sola imagen técnica como "wadi". "Junto al Valle del Arnón" mantiene la forma clara y la amplitud semántica del término.
- source_word: נַחַל
  english_pob_choice: Valley
  chosen_spanish: Valle
  alternatives_spanish:
  - wadi
  - torrente
  - río seco
  lexicon: HALOT
  rationale: Siguiendo el criterio auditado en inglés, se conserva el sentido geográfico amplio. En español, "Valle" es más natural y comprensible que "wadi", sin perder la referencia topográfica.
- source_word: וַחֲצִי הַר הַגִּלְעָד
  english_pob_choice: and half the hill country of Gilead
  chosen_spanish: y la mitad de la región montañosa de Galaad
  alternatives_spanish:
  - y la mitad del monte Galaad
  - y la mitad de la serranía de Galaad
  - y la mitad de la montaña de Galaad
  lexicon: HALOT
  rationale: הַר puede referirse a una región montañosa, no solo a un monte individual. "Región montañosa" transmite mejor el valor territorial en español que "monte" singular. "Galaad" sigue la forma española usual del topónimo.
- source_word: וְעָרָיו
  english_pob_choice: with its cities
  chosen_spanish: con sus ciudades
  alternatives_spanish:
  - y sus ciudades
  lexicon: HALOT
  rationale: El sufijo posesivo retoma la región de Galaad. "Con sus ciudades" reproduce el vínculo territorial del hebreo y suena natural en español.
- source_word: נָתַתִּי
  english_pob_choice: I gave it
  chosen_spanish: la di
  alternatives_spanish:
  - la asigné
  - la concedí
  lexicon: HALOT
  rationale: '"Dar" conserva la fuerza simple del verbo נתן en el acto de asignación. El objeto femenino singular concuerda con "esta tierra".'
- source_word: לָרֻאוּבֵנִי וְלַגָּדִי
  english_pob_choice: to the Reubenites and the Gadites
  chosen_spanish: a los rubenitas y a los gaditas
  alternatives_spanish:
  - a la tribu de Rubén y a la tribu de Gad
  - a los rubenitas y a los gaditas
  lexicon: HALOT
  rationale: Los gentilicios funcionan colectivamente para las tribus. "Rubenitas" y "gaditas" es la forma natural y fiel en español; se evita imponer una formulación más eclesiástica o explicativa que el texto no requiere.
translation_notes:
  revision_awareness: 'Se siguió el ajuste revisado en el antecedente inglés: la relación geográfica se expresa como "Valle del Arnón"/"junto al Valle del Arnón" en lugar de una forma más literal o técnica como "wadi", para mantener naturalidad y precisión formal en español.'
  spanish_consistency_notes:
  - Se usó «Yahvé» según la norma del proyecto solo cuando corresponda; en este versículo no aparece el Tetragrámaton.
  - Se prefirió «tierra» y no «país» para el territorio conquistado y repartido.
  - 'Se mantuvo la alternancia verbal del hebreo: plural en «tomamos posesión» y singular en «la di», reflejando la transición del narrador.'
  - Se optó por «rubenitas» y «gaditas» como gentilicios colectivos, coherentes con el uso bíblico y con la lectura inglesa auditada.
