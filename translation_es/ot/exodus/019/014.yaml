translation:
  language: es
  text: Así que Moisés bajó del monte al pueblo, y consagró[a] al pueblo, y ellos lavaron sus vestidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «santificó al pueblo» o «apartó al pueblo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  english_pob_choice: went down
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - bajó
  lexicon: HALOT
  rationale: El verbo indica movimiento hacia abajo. «Bajó» es natural en español moderno y conserva el desplazamiento desde el monte hacia el pueblo sin sobrecargar el estilo.
- source_word: מִן הָהָר
  english_pob_choice: from the mountain
  chosen_spanish: del monte
  alternatives_spanish:
  - de la montaña
  - del monte
  lexicon: HALOT
  rationale: En este contexto se trata del Sinaí. «Monte» suena bíblico y natural en español, y mantiene la referencia geográfica sin necesidad de explicar más.
- source_word: אֶל הָעָם
  english_pob_choice: to the people
  chosen_spanish: hacia el pueblo
  alternatives_spanish:
  - al pueblo
  - hacia el pueblo
  lexicon: HALOT
  rationale: «Pueblo» reproduce עָם en un registro claro y bíblico. «Hacia» refleja el movimiento narrativo de Moisés acercándose; «al» sería también posible, pero aquí se conserva el matiz direccional.
- source_word: וַיְקַדֵּשׁ
  english_pob_choice: consecrated
  chosen_spanish: consagró
  alternatives_spanish:
  - santificó
  - apartó para lo santo
  lexicon: HALOT
  rationale: קדשׁ en este pasaje expresa preparación ritual para el encuentro con Dios. «Consagró» comunica mejor en español la idea cultual de poner aparte para uso sagrado, sin reducirlo a una mera moralización.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo
  - a la gente
  lexicon: HALOT
  rationale: Se conserva la repetición del objeto hebreo. «Pueblo» mantiene la cohesión del pasaje y el tono comunitario-cultual.
- source_word: וַיְכַבְּסוּ
  english_pob_choice: they washed
  chosen_spanish: lavaron
  alternatives_spanish:
  - lavaron
  - limpiaron
  lexicon: HALOT
  rationale: El verbo se refiere específicamente al lavado de prendas. «Lavaron» es la equivalencia española más natural y suficiente en contexto.
- source_word: שִׂמְלֹתָם
  english_pob_choice: their garments
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus vestidos
  - sus ropas
  - sus prendas
  lexicon: HALOT
  rationale: «Vestidos» es un término bíblico claro en español y encaja bien con el gesto ritual de purificación de la vestimenta. «Ropas» o «prendas» serían posibles, pero menos idiomáticos en este registro.
theological_decisions:
- issue: Lenguaje de santidad ritual antes de la teofanía del Sinaí
  english_pob_reading: consecrated the people
  chosen_spanish_reading: consagró al pueblo
  alternative_spanish_readings:
  - santificó al pueblo
  - lo apartó para lo santo
  rationale: El contexto es preparación ritual, no una transformación ética abstracta. «Consagró» conserva la fuerza cultual y evita que el lector entienda el verbo solo como piedad interior.
  doctrine_reference: Éxodo 19:10-15; filosofía de traducción §5-6
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el pasaje mostró alta concordancia con el control cruzado; por eso se mantiene la solución cultual «consagró» y la secuencia narrativa del texto base.
  spanish_consistency_notes:
  - Se mantiene «Moisés», «pueblo» y la repetición del objeto para reflejar la estructura hebrea.
  - Se usa un registro bíblico claro, moderno y digno, sin recurrir a fórmulas arcaizantes innecesarias.
  - El pie de nota preserva la alternativa lexical registrada en el audit trail en lugar de ocultarla.
