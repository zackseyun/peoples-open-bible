translation:
  language: es
  text: Y en el año ciento cincuenta y tres, en el mes segundo, Alcimo mandó derribar el muro del atrio interior del santuario[a], y derribó las obras de los profetas[b], y comenzó a derribarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «del patio interior del santuario».'
    reason: lexical_alternative
  - marker: b
    text: La expresión «las obras de los profetas» es literal; el griego no precisa si se trata de estructuras, reparaciones u otras obras asociadas con los profetas.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ἔτει τρίτῳ καὶ πεντηκοστῷ καὶ ἑκατοστῷ
  english_pob_choice: in the one hundred and fifty-third year
  chosen_spanish: en el año ciento cincuenta y tres
  alternatives_spanish:
  - en el año 153
  - en el año centésimo quincuagésimo tercero
  lexicon: LSJ
  rationale: La numeración griega es aditiva y se refiere a un año calendárico concreto; en español, 'año ciento cincuenta y tres' es natural, claro y mantiene el valor ordinal sin forzar una forma litúrgica.
- source_word: τῷ μηνὶ τῷ δευτέρῳ
  english_pob_choice: in the second month
  chosen_spanish: en el mes segundo
  alternatives_spanish:
  - en el segundo mes
  lexicon: LSJ
  rationale: El dativo temporal indica un mes específico. 'Mes segundo' conserva la construcción sobria del griego y su referencia calendárica sin añadir explicación innecesaria.
- source_word: ἐπέταξεν
  english_pob_choice: ordered
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio la orden de
  lexicon: LSJ
  rationale: El verbo expresa una orden con autoridad. 'Mandó' es un equivalente natural en español y retiene la fuerza del mandato sin sonar mecánico.
- source_word: καθελεῖν
  english_pob_choice: to be torn down
  chosen_spanish: derribar
  alternatives_spanish:
  - demoler
  - tumbar
  lexicon: LSJ
  rationale: El infinitivo expresa destrucción física. En español, 'derribar' funciona bien con muro o estructuras y conserva la imagen de desmantelamiento.
- source_word: τὸ τεῖχος
  english_pob_choice: the wall
  chosen_spanish: el muro
  alternatives_spanish:
  - la muralla
  - el muro de defensa
  lexicon: LSJ
  rationale: τεῖχος puede ser 'muro' o 'muralla'. Aquí el contexto del recinto del templo hace natural 'muro', que evita un matiz militar innecesario.
- source_word: τῆς αὐλῆς τῶν ἁγίων τῆς ἐσωτέρας
  english_pob_choice: the wall of the inner court of the sanctuary
  chosen_spanish: del atrio interior del santuario
  alternatives_spanish:
  - del patio interior del santuario
  - del atrio interior del lugar santo
  lexicon: LSJ
  rationale: La cadena genitiva apunta al espacio sagrado del templo. 'Atrio' refleja bien αὐλή en registro bíblico, y 'santuario' traduce de forma natural τῶν ἁγίων en este contexto, como en la revisión inglesa.
- source_word: καθεῖλεν
  english_pob_choice: he tore down
  chosen_spanish: derribó
  alternatives_spanish:
  - demolió
  - tiró abajo
  lexicon: LSJ
  rationale: El aoristo repite la acción de demolición. 'Derribó' mantiene la repetición verbal con el infinitivo anterior y suena fluido en español.
- source_word: τὰ ἔργα τῶν προφητῶν
  english_pob_choice: the works of the prophets
  chosen_spanish: las obras de los profetas
  alternatives_spanish:
  - los trabajos de los profetas
  - las estructuras de los profetas
  lexicon: LSJ
  rationale: La frase es literal y algo opaca en griego. Se conserva como 'las obras de los profetas' para no resolver de manera especulativa qué construcciones o restauraciones designa.
- source_word: ἐνήρξατο τοῦ καθαιρεῖν
  english_pob_choice: began to tear it down
  chosen_spanish: comenzó a derribarlo
  alternatives_spanish:
  - comenzó a demolerlo
  - empezó a derribarlo
  lexicon: LSJ
  rationale: La perífrasis expresa el inicio de la acción de demolición. 'Comenzó a derribarlo' es natural y mantiene la referencia al mismo objeto destruido en la cláusula previa.
theological_decisions:
- issue: 'Topografía del templo: τῆς αὐλῆς τῶν ἁγίων τῆς ἐσωτέρας'
  english_pob_reading: the wall of the inner court of the sanctuary
  chosen_spanish_reading: el muro del atrio interior del santuario
  alternative_spanish_readings:
  - el muro del patio interior del santuario
  - el muro del atrio interior del lugar santo
  rationale: No hay un debate doctrinal central, pero sí una decisión de topografía sagrada. 'Santuario' preserva el espacio santo sin imponer terminología técnica posterior, y 'atrio' comunica bien αὐλή en español bíblico.
  doctrine_reference: 'Principio POB: primacía del texto original y preservación de la imaginería del templo'
- issue: Fórmula opaca τὰ ἔργα τῶν προφητῶν
  english_pob_reading: the works of the prophets
  chosen_spanish_reading: las obras de los profetas
  alternative_spanish_readings:
  - las estructuras de los profetas
  - las obras construidas por los profetas
  rationale: El griego no especifica si son edificios, reparaciones u otra clase de obras. La traducción conserva la ambigüedad textual en vez de explicarla con una reconstrucción histórica no explicitada.
  doctrine_reference: 'Principio POB: preservar la tensión léxica y no sobreparafrasear el texto fuente'
translation_notes:
  revision_awareness: La auditoría inglesa revisó τῆς αὐλῆς τῶν ἁγίων τῆς ἐσωτέρας desde 'holy place' a 'sanctuary' por mayor naturalidad y precisión, y ajustó la última cláusula a 'began to tear it down'. La versión española sigue esa revisión con 'santuario' y con una clausula final fluida ('comenzó a derribarlo'), manteniendo la misma secuencia de demolición.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no porque aparezca aquí, sino como norma general del proyecto; este versículo no contiene el Tetragrámaton.
  - Se prefirió 'Mesías/Cristo' no aplica aquí; no hay títulos cristológicos.
  - Se mantuvo un registro bíblico sobrio con 'atrio' y 'santuario', evitando 'patio' como opción más coloquial salvo en nota alternativa.
  - La repetición de 'derribó' / 'comenzó a derribarlo' reproduce la repetición de la acción en el griego sin introducir variación innecesaria.
