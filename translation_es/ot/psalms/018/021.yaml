  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: mantiene Yahvé por יְהוָה, conserva la estructura paralela y traduce adecuadamente la idea de correspondencia/retribución. Sin embargo, la colocación de las notas no sigue fielmente el rastro auditado en inglés: la nota cultural sobre el modismo debe anclarse en la expresión «la limpieza de mis manos», no en «mi justicia».'
  spanish_quality_summary: El español es claro y natural en general. No obstante, «me ha tratado» suena algo incompleto sin complemento modal, y «me ha tratado conforme a» es menos idiomático que «ha actuado conmigo conforme a» o «me ha tratado según». Además, conviene ajustar la ubicación de las notas para evitar confusión y mejorar la legibilidad.
  glossary_alignment: Se alinea con la terminología del proyecto en «Yahvé» y en la preservación de la imagen literal «la limpieza de mis manos». «Mi justicia» es aceptable para צדק en este contexto, aunque «mi rectitud» sería una alternativa posible; no es necesario cambiarla. La elección «me ha recompensado» para יָשִׁיב לִי es adecuada.
  issues:
  - severity: medium
    issue: Anclaje incorrecto de las notas al pie
    rationale: La nota [b] en el audit trail inglés explica el modismo hebreo «la limpieza de mis manos», pero en el borrador español el marcador [b] está puesto sobre «limpieza» en una frase separada del conjunto idiomático, mientras que [a] queda en «tratado». Es mejor anclar [b] a la frase idiomática completa y dejar [a] sobre el verbo principal que admite la alternativa léxica.
  - severity: low
    issue: Ligera aspereza idiomática en «me ha tratado conforme a»
    rationale: Aunque comprensible y fiel, en español bíblico moderno suena más natural «ha actuado conmigo conforme a» o «me ha tratado según». Conviene un pequeño ajuste estilístico sin perder la amplitud semántica de גמל.
  - severity: low
    issue: La nota cultural debe reflejar mejor su alcance
    rationale: La explicación del modismo se refiere a toda la expresión «la limpieza de mis manos», no solo al sustantivo aislado «limpieza».
  revised_spanish_text: Yahvé ha actuado conmigo[a] conforme a mi justicia; conforme a la limpieza de mis manos[b] me ha recompensado.
