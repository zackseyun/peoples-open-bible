translation:
  language: es
  text: Y ya no permitirá que la injusticia[a] permanezca entre ellos, y nadie que conozca la maldad habitará con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego transmitido es áspero en este punto («entre ellos»), pero el sentido general es claro: la injusticia ya no permanecerá dentro de la comunidad.'
    reason: textual_variant
lexical_decisions:
- source_word: ἀφήσει
  english_pob_choice: will not allow
  chosen_spanish: no permitirá
  alternatives_spanish:
  - no dejará
  - no consentirá
  lexicon: BDAG
  rationale: El futuro de ἀφίημι con infinitivo expresa aquí una negativa permisiva; en español, «no permitirá» reproduce mejor esa fuerza que un simple calco literal.
- source_word: ἀδικίαν
  english_pob_choice: unrighteousness
  chosen_spanish: la injusticia
  alternatives_spanish:
  - la injusticia moral
  - la maldad
  lexicon: BDAG
  rationale: ἀδικία abarca injusticia o falta de rectitud. «Injusticia» mantiene la amplitud moral y suena natural en español, sin perder el contraste ético del contexto.
- source_word: ἔτι
  english_pob_choice: any longer
  chosen_spanish: por más tiempo
  alternatives_spanish:
  - ya no
  - nunca más
  lexicon: BDAG
  rationale: La partícula con negación marca cese de una स्थिति previa. «Por más tiempo» conserva ese valor aspectual sin sobrerrepresentarlo.
- source_word: μεῖναι
  english_pob_choice: to remain
  chosen_spanish: permanezca
  alternatives_spanish:
  - se quede
  - continúe
  lexicon: BDAG
  rationale: El infinitivo de μένω pide una forma verbal de permanencia. «Permanezca» es fiel y elegante en este registro.
- source_word: ἐν αὐτῶν
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en ellos
  - en medio de ellos
  lexicon: BDAG
  rationale: Aunque el griego transmitido es textualmente áspero, el sentido colectivo es claro. «Entre ellos» refleja mejor el marco comunitario que una lectura interiorista.
- source_word: κατοικήσει
  english_pob_choice: will dwell
  chosen_spanish: habitará
  alternatives_spanish:
  - vivirá
  - residirá
  lexicon: BDAG
  rationale: «Habitar» conserva el tono elevado de κατοικέω y funciona bien para residencia estable dentro de la comunidad.
- source_word: ἄνθρωπος
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguna persona
  - ningún hombre
  lexicon: BDAG
  rationale: El singular es genérico. «Nadie» expresa esa fuerza de manera natural y evita una restricción masculina injustificada.
- source_word: εἰδὼς κακίαν
  english_pob_choice: who knows wickedness
  chosen_spanish: que conozca la maldad
  alternatives_spanish:
  - que sabe de maldad
  - acostumbrado a la maldad
  lexicon: BDAG
  rationale: El participio indica conocimiento/familiaridad con el mal. En español, la relativa «que conozca la maldad» conserva ese matiz sin volverlo meramente intelectual.
- source_word: κακίαν
  english_pob_choice: wickedness
  chosen_spanish: la maldad
  alternatives_spanish:
  - el mal
  - la perversidad
  lexicon: BDAG
  rationale: En este contexto de purificación moral, κακία apunta a una condición de maldad. «Maldad» es claro y de amplio alcance en español.
theological_decisions:
- issue: Exclusión moral de la comunidad restaurada
  english_pob_reading: The verse is rendered as excluding unrighteousness and those characterized by wickedness from dwelling among the people.
  chosen_spanish_reading: Se expresa que la injusticia ya no permanecerá entre ellos y que nadie caracterizado por conocer la maldad habitará con ellos.
  alternative_spanish_readings:
  - La injusticia no será tolerada entre ellos y no vivirá con ellos persona alguna que conozca el mal.
  - No se permitirá la injusticia en medio de ellos, y no morará con ellos quien sea experto en el mal.
  rationale: 'La traducción mantiene el doble movimiento del texto: eliminación de la condición moral y exclusión de la persona asociada con esa condición. No se intensifica ni se suaviza la tensión moral del pasaje.'
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla artificialmente; coherencia terminológica, salvo excepción documentada.
translation_notes:
  revision_awareness: El texto inglés y el registro auditado muestran alta concordancia y ninguna revisión pendiente. La versión española sigue esa línea, resolviendo solo la aspereza sintáctica del griego transmitido en forma idiomática y conservadora.
  spanish_consistency_notes:
  - Se preserva el registro moral-religioso con «injusticia» y «maldad», en paralelo con la decisión inglesa de «unrighteousness» y «wickedness».
  - Se usa lenguaje comunitario («entre ellos», «con ellos») para reflejar el sentido colectivo indicado por el audit trail.
  - Se evita un giro eclesiástico tradicionalizante que no está motivado por el griego ni por el contexto auditado.
