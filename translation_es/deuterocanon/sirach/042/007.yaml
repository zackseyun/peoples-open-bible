translation:
  language: es
  text: De todo depósito[a], que tu mano lleve la cuenta; y todo dar y recibir debe constar por escrito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es algo comprimido aquí. El paralelo griego dice: "Lo que sea que entregues, hazlo por número y peso, y que todo dar y recibir esté por escrito", lo cual confirma el sentido de una contabilidad cuidadosa y documentada.'
    reason: alternative_reading
lexical_decisions:
- source_word: על מקום / תפקד
  english_pob_choice: For every deposit, let your hand keep count
  chosen_spanish: Por cada depósito, que tu mano lleve la cuenta
  alternatives_spanish:
  - Por cada cosa confiada, que tu mano lleve la cuenta
  - Para todo depósito, que tu mano lleve la cuenta
  - Por cada encargo, que tu mano lleve la cuenta
  lexicon: HALOT; contexto del paralelo griego ὃ ἐὰν παραδιδῷς
  rationale: El hebreo es conciso y el contexto apunta a algo entregado o confiado que exige control exacto. 'Depósito' conserva la idea de algo puesto en custodia y encaja con el matiz contable del verso; 'que tu mano lleve la cuenta' refleja la imagen concreta de contabilizar personalmente.
- source_word: יד תספור
  english_pob_choice: let your hand keep count
  chosen_spanish: que tu mano lleve la cuenta
  alternatives_spanish:
  - que cuentes con tu mano
  - que tu mano cuente
  - cuenta cuidadosamente
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'tu mano contará'. En español, 'llevar la cuenta' comunica de manera natural la acción de contar con exactitud sin perder la imagen de responsabilidad personal.
- source_word: ומתת ולקח
  english_pob_choice: giving and receiving
  chosen_spanish: dar y recibir
  alternatives_spanish:
  - entrega y recepción
  - donar y recibir
  - lo dado y lo recibido
  lexicon: HALOT; δόσις καὶ λῆψις
  rationale: La pareja léxica describe transacciones recíprocas. 'Dar y recibir' es la formulación más natural en español y conserva el paralelo con el griego, sin tecnicismos innecesarios.
- source_word: הכל בכתב
  english_pob_choice: every giving and receiving should be in writing
  chosen_spanish: todo ... debe estar por escrito
  alternatives_spanish:
  - todo ... debe constar por escrito
  - todo ... debe quedar escrito
  - todo ... debe ponerse por escrito
  lexicon: HALOT; כתב
  rationale: כתב señala documentación escrita. En español, 'estar por escrito' expresa de modo claro la exigencia de registrar formalmente las operaciones.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que privilegia la idea de un ‘depósito’ y el registro cuidadoso, evitando una traducción demasiado abstracta de מקום. También se tuvo en cuenta el paralelo griego, que explicita el carácter de control numérico, ponderación y registro escrito.
  spanish_consistency_notes:
  - Se mantuvo 'depósito' para reflejar la función contable del verso y la revisión del inglés POB.
  - Se evitó 'SEÑOR' u otras sustituciones no pertinentes; el verso no contiene el Tetragrámaton.
  - '''Dar y recibir'' conserva la pareja transaccional del hebreo y del griego.'
  - '''Por escrito'' corresponde al énfasis documental del cierre del verso.'
