  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλὰ λέγω, μὴ ⸂Ἰσραὴλ οὐκ ἔγνω⸃; πρῶτος Μωϋσῆς λέγει· Ἐγὼ παραζηλώσω ὑμᾶς ἐπ’ οὐκ ἔθνει, ἐπ’ ἔθνει ἀσυνέτῳ παροργιῶ ὑμᾶς.
base_translation:
  language: en
  yaml_path: translation/nt/romans/010/019.yaml
  text: But I ask[a], did Israel not know? First Moses says, “I will make you jealous by what is not a nation[b]; by a nation without understanding I will provoke you to anger.”
  footnotes:
  - marker: a
    text: Or “did Israel not know?” The Greek verb can mean either know or understand; here it likely carries the sense of grasping the significance of what was heard.
    reason: lexical_alternative
  - marker: b
    text: Quotation from Deuteronomy 32:21. “What is not a nation” may refer to a people regarded as no true nation, that is, the Gentiles.
    reason: cross_reference
translation:
  language: ko
  text: '그러나 내가 또 말하겠습니다. 이스라엘이 알지 못한 것입니까? 먼저 모세가 말합니다: 「내가 백성이 아닌 자들로 너희를 시기하게 하고, 깨닫지 못하는 민족으로 너희를 분노하게 하겠다.」'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παραζηλώσω
  english_pob_choice: make jealous
  chosen_korean: 시기하게 하고
  alternatives_korean:
  - 질투하게 하고
  lexicon: BDAG
  rationale: 구약 신학의 「하나님이 시기하게 하심」 모티프를 보존하는 표준 한국어.
