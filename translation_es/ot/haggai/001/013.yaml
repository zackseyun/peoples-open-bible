base_translation:
  language: en
  yaml_path: translation/ot/haggai/001/013.yaml
  text: Then Haggai[a], the messenger of Yahweh, spoke to the people with Yahweh’s message, saying[b], “I am with you,” declares Yahweh.
  footnotes:
  - marker: a
    text: Or “by the commission of the LORD” or “as the LORD’s messenger.” The Hebrew phrase can denote the capacity or commission in which Haggai spoke.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “messenger of the LORD.” Here it refers to Haggai as the LORD’s envoy, not to an angelic being.
    reason: alternative_reading
