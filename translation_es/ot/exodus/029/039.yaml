translation:
  language: es
  text: Ofrecerás el primer cordero por la mañana, y el segundo cordero lo ofrecerás entre las tardes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «entre las tardes», expresión tradicional que a menudo se entiende como «al crepúsculo» o como el período entre la tarde avanzada y la puesta del sol.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֶּבֶשׂ
  english_pob_choice: lamb
  chosen_spanish: cordero
  alternatives_spanish:
  - cordero joven
  - oveja
  lexicon: HALOT
  rationale: En contexto sacrificial, el hebreo כֶּבֶשׂ designa un animal apto para la ofrenda; en español, "cordero" es el equivalente natural y culto que conserva la fuerza sacrificial. "Oveja" sería demasiado genérico y "cordero joven" añade más de lo que el hebreo dice.
- source_word: הָאֶחָד
  english_pob_choice: the one
  chosen_spanish: uno
  alternatives_spanish:
  - el primero
  - el uno
  lexicon: HALOT
  rationale: El hebreo dice literalmente "el uno". En español, después de "el cordero", la forma más natural y fiel es "uno", manteniendo la secuencia sin forzar una expresión torpe.
- source_word: תַּעֲשֶׂה
  english_pob_choice: you shall offer
  chosen_spanish: ofrecerás
  alternatives_spanish:
  - harás
  - prepararás
  lexicon: HALOT
  rationale: Aunque el verbo básico es "hacer", en instrucciones de sacrificio el sentido es realizar la ofrenda. "Ofrecerás" comunica mejor la acción cultual en español y evita un calco literal.
- source_word: בַבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - al amanecer
  lexicon: HALOT
  rationale: La expresión temporal hebrea se vierte de manera idiomática y clara con "por la mañana".
- source_word: הַשֵּׁנִי
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el otro
  - el segundo uno
  lexicon: HALOT
  rationale: Se conserva el valor ordinal directo del hebreo para marcar la segunda ofrenda del día.
- source_word: בֵּין הָעַרְבָּיִם
  english_pob_choice: between the evenings
  chosen_spanish: entre las tardes
  alternatives_spanish:
  - al atardecer
  - entre el anochecer y la puesta del sol
  - al crepúsculo
  lexicon: HALOT
  rationale: La expresión hebrea es literal y tradicionalmente debatida. Se mantiene una traducción formal, "entre las tardes", para no resolver interpretativamente en el texto principal lo que el hebreo deja abierto; las alternativas idiomáticas quedan como trasfondo de sentido.
translation_notes:
  revision_awareness: El texto inglés auditado conserva la literalidad de בֵּין הָעַרְבָּיִם y nota su carácter tradicional y debatido; la versión española mantiene esa tensión con una solución formal equivalente, sin explicitar una interpretación más precisa en el cuerpo del versículo.
  spanish_consistency_notes:
  - Se mantiene "ofrecerás" para el verbo sacrificial עשה en vez de "harás", siguiendo el valor cultual documentado en el audit trail.
  - Se conserva la ambigüedad interpretativa de בֵּין הָעַרְבָּיִם en el texto principal, con nota explicativa breve.
  - '"Cordero" refleja el contexto sacrificial con naturalidad en español y corresponde al valor de lamb elegido en inglés.'
