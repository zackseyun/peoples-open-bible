id: GEN.19.32
reference: Genesis 19:32
source:
  edition: WLC
  text: לְכָ֨/ה נַשְׁקֶ֧ה אֶת אָבִ֛י/נוּ יַ֖יִן וְ/נִשְׁכְּבָ֣ה עִמּ֑/וֹ וּ/נְחַיֶּ֥ה מֵ/אָבִ֖י/נוּ זָֽרַע־׃
translation:
  text: Come[a], let us make our father drink wine, and let us lie with him[b], so that we may preserve offspring through our father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seed' from our father.
    reason: lexical_alternative
  - marker: b
    text: Or 'let us make our father drink wine, and let us lie with him'.
    reason: previous_rendering
lexical_decisions:
- source_word: לְכָה
  chosen: Come
  alternatives:
  - Come on
  - Go
  lexicon: HALOT
  rationale: Idiomatic interjection from הלך used to urge action. 'Come' is natural modern English and preserves the exhortative force better than the more literal but less idiomatic 'Go.'
- source_word: נַשְׁקֶה
  chosen: let us make ... drink
  alternatives:
  - let us give ... wine to drink
  - let us cause ... to drink
  lexicon: HALOT
  rationale: Hiphil of שקה is causative, so not merely 'let us drink' but 'let us make/give [someone] drink.' 'Make our father drink wine' is concise and idiomatic while preserving the causative sense.
- source_word: אָבִינוּ
  chosen: our father
  lexicon: HALOT
  rationale: Straightforward possessive noun; repeated in the verse and retained both times for clarity and emphasis present in the Hebrew.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering of יין.
- source_word: וְנִשְׁכְּבָה עִמּוֹ
  chosen: and let us lie with him
  alternatives:
  - and let us sleep with him
  lexicon: HALOT
  rationale: שכב with עִם is a standard sexual euphemism. 'Lie with' preserves the Hebrew idiom and gravity without unnecessary explicitness; 'sleep with' is more colloquial and potentially too modern in tone.
- source_word: וּנְחַיֶּה
  chosen: so that we may preserve
  alternatives:
  - and let us keep alive
  - that we may keep alive
  lexicon: HALOT
  rationale: Piel/cohortative of חיה means to keep alive or preserve. In context the object is 'offspring/seed,' so 'preserve' communicates continuation of lineage in natural English better than the more wooden 'keep alive.'
- source_word: מֵאָבִינוּ
  chosen: from our father
  alternatives:
  - by our father
  lexicon: HALOT
  rationale: The preposition מן here marks source/origin of the offspring. 'From our father' is the most direct rendering; 'by our father' is possible in English but less transparent to the Hebrew source.
- source_word: זָרַע
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: HALOT
  rationale: זרע can mean literal seed or figuratively offspring. Here the sense is progeny/lineage. 'Offspring' is clear modern English; 'seed' is more formal and can be preserved as an alternative in a footnote.
