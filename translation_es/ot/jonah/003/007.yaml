translation:
  language: es
  text: 'Y proclamó y dijo en Nínive, por decreto del rey y de sus nobles[a]: «Que ni el hombre[b] ni el animal, ni el ganado mayor ni el rebaño, prueben nada. Que no pasten, ni beban agua».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el rey y sus grandes» o «el rey y sus oficiales». El hebreo dice literalmente «el rey y sus grandes».
    reason: lexical_alternative
  - marker: b
    text: «El hombre» traduce aquí el hebreo ʼadam como término colectivo para los seres humanos, en contraste con los animales; alternativamente, «la humanidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּזְעֵק
  english_pob_choice: he proclaimed
  chosen_spanish: proclamó
  alternatives_spanish:
  - clamó
  - hizo una proclamación
  lexicon: HALOT
  rationale: En este contexto real y público, el verbo comunica una declaración solemne y oficial; «proclamó» conserva la fuerza anunciadora mejor que un simple «dijo».
- source_word: וַיֹּאמֶר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - diciendo
  lexicon: HALOT
  rationale: Se mantiene la secuencia narrativa del hebreo sin fundir ambos verbos en una sola expresión.
- source_word: בְּנִינְוֵה
  english_pob_choice: in Nineveh
  chosen_spanish: en Nínive
  alternatives_spanish:
  - dentro de Nínive
  lexicon: HALOT
  rationale: La preposición locativa es directa; el anuncio se emite en la ciudad.
- source_word: מִטַּעַם
  english_pob_choice: by decree of
  chosen_spanish: por decreto de
  alternatives_spanish:
  - por decisión de
  - por mandato de
  - por autoridad de
  lexicon: HALOT
  rationale: En un contexto administrativo, טַעַם expresa una determinación o decreto oficial; «por decreto de» comunica bien ese matiz jurídico y público.
- source_word: הַמֶּלֶךְ וּגְדֹלָיו
  english_pob_choice: the king and his nobles
  chosen_spanish: el rey y de sus nobles
  alternatives_spanish:
  - el rey y de sus grandes
  - el rey y de sus oficiales
  lexicon: HALOT
  rationale: «Nobles» capta a los principales del reino en un español natural. Se evita traducir literalmente «sus grandes» en el texto principal porque sería menos claro, aunque la tensión léxica del hebreo queda registrada en la nota.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - las personas
  lexicon: HALOT
  rationale: Aquí אָדָם funciona como colectivo humano en contraste con los animales. «El hombre» preserva el paralelismo humano-animal del hebreo y la forma singular colectiva.
- source_word: וְהַבְּהֵמָה
  english_pob_choice: beast
  chosen_spanish: el animal
  alternatives_spanish:
  - la bestia
  - el ganado
  lexicon: HALOT
  rationale: En español, «animal» comunica el término amplio de manera más natural que «bestia», aunque se conserva en la nota la posibilidad más literal del campo semántico hebreo.
- source_word: הַבָּקָר וְהַצֹּאן
  english_pob_choice: herd nor flock
  chosen_spanish: el ganado mayor y el rebaño
  alternatives_spanish:
  - el ganado y el rebaño
  - los vacunos y el rebaño
  lexicon: HALOT
  rationale: Son categorías colectivas de animales domésticos; «ganado mayor» y «rebaño» preservan la distinción de clases sin sobreespecificar especies.
- source_word: אַֽל יִטְעֲמוּ מְא֔וּמָה
  english_pob_choice: taste anything
  chosen_spanish: prueben nada
  alternatives_spanish:
  - coman nada
  - gusten de nada
  lexicon: HALOT
  rationale: «Probar» reproduce el hebreo טעם y, unido a «nada», expresa la prohibición total del ayuno con naturalidad en español.
- source_word: אַ֨ל יִרְע֔וּ
  english_pob_choice: let them not graze
  chosen_spanish: Que no pasten
  alternatives_spanish:
  - Que no se alimenten
  - Que no ramoneen
  lexicon: HALOT
  rationale: Con sujetos animales, רעה significa pastar/pacer; «pasten» es la equivalencia más precisa y natural en este registro.
- source_word: וּמַיִם אַל יִשְׁתּוּ
  english_pob_choice: and let them not drink water
  chosen_spanish: ni beban agua
  alternatives_spanish:
  - y no beban agua
  - ni tomen agua
  lexicon: HALOT
  rationale: Se conserva el objeto explícito «agua» y la coordinación prohibitiva del hebreo, con un español fluido.
theological_decisions:
- issue: Renderizado de אָדָם como colectivo humano en contraste con animales
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - las personas
  rationale: El hebreo usa הָאָדָם como singular colectivo frente a categorías animales. «El hombre» preserva esa oposición estilística y evita diluir el contraste del decreto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table for אָדָם
- issue: Tratamiento de גְדֹלָיו como autoridad política
  english_pob_reading: his nobles
  chosen_spanish_reading: sus nobles
  alternative_spanish_readings:
  - sus grandes
  - sus oficiales
  rationale: El contexto administrativo y la revisión inglesa favorecen «nobles» como referencia a los principales del rey; el texto principal adopta ese sentido natural, sin perder la base literal del hebreo, que se conserva en la nota.
  doctrine_reference: Lexical transparency policy; source context of administrative decree
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «his great ones» por «his nobles» para un inglés más natural. El español adopta «sus nobles» en el texto principal por naturalidad y precisión, pero preserva la alternativa literal hebrea en nota para transparencia auditável. También se mantuvo la estructura pública del decreto y la serie de prohibiciones con un registro solemne.
  spanish_consistency_notes:
  - Se mantuvo Yahvé como forma predeterminada del nombre divino en esta unidad no aparece.
  - Se usó «proclamó» para el acto público de anuncio y «dijo» para la continuación narrativa, evitando condensar indebidamente el hebreo.
  - Se preservó el contraste humano/animal con «el hombre» y «el animal», siguiendo el valor colectivo de אָדָם y בְּהֵמָה.
  - «Pasten» se eligió por el sentido pastoril preciso de רעה con sujetos animales.
  - La puntuación de la cita directa sigue el español moderno y mantiene el carácter de edicto.
