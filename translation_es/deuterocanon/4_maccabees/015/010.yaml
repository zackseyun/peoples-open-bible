translation:
  language: es
  text: Pues eran justos y dueños de sí mismos[a], valientes y de alma noble, y amaban a sus hermanos; y tan entregados a su madre, que, aun guardando los preceptos de la ley[b] hasta la muerte, le obedecían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘moderados’, ‘sobrios’ o ‘prudentes’. El griego σώφρονες expresa dominio de sí y sensatez.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como ‘las ordenanzas legales’ o ‘las costumbres prescritas por la ley’.
    reason: lexical_alternative
lexical_decisions:
- source_word: δίκαιοί
  english_pob_choice: righteous
  chosen_spanish: justos
  alternatives_spanish:
  - rectos
  - righteous
  lexicon: LSJ
  rationale: En este catálogo de virtudes, δίκαιοι expresa rectitud moral. En español, 'justos' conserva bien ese valor ético-religioso y es natural en una enumeración de virtudes.
- source_word: σώφρονες
  english_pob_choice: self-controlled
  chosen_spanish: autodominados
  alternatives_spanish:
  - sobrios
  - templados
  - prudentes
  lexicon: LSJ
  rationale: El término apunta al dominio de sí y a la moderación de los deseos. 'Autodominados' comunica ese sentido de manera directa en español moderno sin perder el matiz de disciplina interior.
- source_word: ἀνδρεῖοι
  english_pob_choice: brave
  chosen_spanish: valientes
  alternatives_spanish:
  - bravos
  - courageosos
  lexicon: LSJ
  rationale: El griego denota valentía/coraje. 'Valientes' es idiomático y claro en español, y evita sobretonos de género que podrían surgir con otras opciones.
- source_word: μεγαλόψυχοι
  english_pob_choice: noble-minded
  chosen_spanish: de alma noble
  alternatives_spanish:
  - magnánimos
  - de gran ánimo
  lexicon: LSJ
  rationale: La expresión griega sugiere grandeza de ánimo o de alma. 'De alma noble' conserva el valor de nobleza interior con un giro natural en español.
- source_word: φιλάδελφοι
  english_pob_choice: loving their brothers
  chosen_spanish: amantes de sus hermanos
  alternatives_spanish:
  - que aman a sus hermanos
  - fraternales
  lexicon: LSJ
  rationale: El compuesto expresa afecto por los hermanos, y el contexto inmediato se refiere a los siete hermanos. 'Amantes de sus hermanos' mantiene la referencia fraterna concreta.
- source_word: φιλόμητρος
  english_pob_choice: devoted to their mother
  chosen_spanish: tan entregados a su madre
  alternatives_spanish:
  - amantes de su madre
  - devotos de su madre
  lexicon: LSJ
  rationale: El adjetivo implica afecto y lealtad hacia la madre. 'Tan entregados a su madre' transmite esa devoción afectiva y de lealtad dentro del contexto narrativo.
- source_word: μέχρι θανάτου
  english_pob_choice: to the point of death
  chosen_spanish: hasta la muerte
  alternatives_spanish:
  - hasta el punto de morir
  - incluso hasta la muerte
  lexicon: LSJ
  rationale: La expresión marca el límite extremo de su fidelidad bajo persecución. 'Hasta la muerte' es la forma más natural y fiel en español.
- source_word: τὰ νόμιμα
  english_pob_choice: the law's requirements
  chosen_spanish: los preceptos de la ley
  alternatives_spanish:
  - las exigencias de la ley
  - las ordenanzas legales
  lexicon: LSJ
  rationale: En el contexto macabeo, la frase alude a las prescripciones de la ley ancestral. 'Los preceptos de la ley' conserva ese sentido normativo sin precisar más de lo que el griego permite.
- source_word: φυλάσσοντας
  english_pob_choice: keeping
  chosen_spanish: guardando
  alternatives_spanish:
  - observando
  - cumpliendo
  lexicon: LSJ
  rationale: Con τὰ νόμιμα, el participio significa observar o mantener las prescripciones. 'Guardando' refleja bien la idea de custodia fiel y es compatible con el uso bíblico.
- source_word: πείθεσθαι αὐτῇ
  english_pob_choice: they obeyed her
  chosen_spanish: le obedecían
  alternatives_spanish:
  - la obedecían
  - se sometían a ella
  - le hacían caso
  lexicon: LSJ
  rationale: El verbo medio puede significar obedecer o dejarse persuadir. En este contexto de lealtad filial, 'le obedecían' expresa adecuadamente la respuesta obediente hacia su madre.
theological_decisions:
- issue: Tensión entre νόμιμα y obediencia filial en un contexto de fidelidad a la ley
  english_pob_reading: keeping the law's requirements ... they obeyed her
  chosen_spanish_reading: guardando los preceptos de la ley ... le obedecían
  alternative_spanish_readings:
  - observando las ordenanzas de la ley ... le obedecían
  - cumpliendo las exigencias de la ley ... le obedecían
  rationale: 'La secuencia griega mantiene dos lealtades en tensión: obedecer a la madre y no abandonar la observancia de la ley. La redacción española preserva ambas sin diluir el contraste: primero la fidelidad a la ley, luego la obediencia filial.'
  doctrine_reference: DOCTRINE.md §5 Consistency of key terms, and source-sensitive tension preservation
- issue: Valor moral-religioso de δίκαιοι
  english_pob_reading: righteous
  chosen_spanish_reading: justos
  alternative_spanish_readings:
  - rectos
  - piadosos
  rationale: '''Justos'' conserva el peso moral y religioso del adjetivo en una lista de virtudes, sin reducirlo a un sentido meramente jurídico.'
  doctrine_reference: DOCTRINE.md §5 Consistency of key terms
translation_notes:
  revision_awareness: Se revisó el paralelismo del griego para conservar la lista de virtudes y la relación final entre la observancia de la ley y la obediencia a la madre. No se consideró necesario introducir cambios textuales respecto del sentido auditado por la versión inglesa, salvo adaptar la dicción al español con claridad natural.
  spanish_consistency_notes:
  - Se mantuvo 'justos' para δίκαιοι en coherencia con el tono ético-religioso del catálogo de virtudes.
  - Se conservó la referencia concreta a 'sus hermanos' siguiendo el contexto narrativo y la decisión inglesa de no generalizar a 'siblings'.
  - '''Hasta la muerte'' reproduce de forma natural μέχρι θανάτου y mantiene la intensidad del martirio.'
  - '''Preceptos de la ley'' evita sobreespecificar ritualidad o civilidad, en línea con el margen semántico documentado.'
