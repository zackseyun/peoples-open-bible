translation:
  language: es
  text: Y he aquí[a], un día de tinieblas y oscuridad, de aflicción y angustia, de miseria y gran tumulto sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sobre la tierra’. La palabra griega γῆ puede referirse tanto a la tierra en general como a una región o país concreto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - ved
  lexicon: BDAG
  rationale: ‘He aquí’ conserva el tono abrupto e interjectivo de la fórmula griega y funciona de manera digna en español bíblico sin volverse arcaizante en exceso.
- source_word: σκότους
  english_pob_choice: darkness
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad
  lexicon: BDAG
  rationale: ‘Tinieblas’ mantiene el registro bíblico y la fuerza imagética de σκότος; se evita ‘oscuridad’ para no repetir innecesariamente con γνόφου.
- source_word: γνόφου
  english_pob_choice: gloom
  chosen_spanish: oscuridad
  alternatives_spanish:
  - negrura
  - espesura
  lexicon: BDAG
  rationale: Para distinguirlo de σκότους en español sin forzar un tecnicismo, ‘oscuridad’ permite conservar el paralelismo con un matiz distinto, aunque cercano. ‘Tinieblas y oscuridad’ refleja la acumulación poética del griego mejor que una paráfrasis explicativa.
- source_word: θλίψις
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - tribulación
  - opresión
  lexicon: BDAG
  rationale: ‘Aflicción’ expresa sufrimiento opresivo de modo natural en español y corresponde bien al campo semántico de θλίψις.
- source_word: στενοχωρία
  english_pob_choice: distress
  chosen_spanish: angustia
  alternatives_spanish:
  - apremio
  - estrechez
  lexicon: BDAG
  rationale: ‘Angustia’ comunica la presión o constricción severa que sugiere στενοχωρία y suena más fluido en la enumeración española que ‘distress’ traducido mecánicamente.
- source_word: κάκωσις
  english_pob_choice: misery
  chosen_spanish: miseria
  alternatives_spanish:
  - maltrato
  - opresión
  - calamidad
  lexicon: BDAG
  rationale: ‘Miseria’ conserva el efecto resultante de la desgracia sin introducir de manera injustificada un agente opresor; sigue de cerca la decisión inglesa.
- source_word: τάραχος μέγας
  english_pob_choice: great turmoil
  chosen_spanish: gran tumulto
  alternatives_spanish:
  - gran confusión
  - gran trastorno
  - gran conmoción
  lexicon: BDAG
  rationale: ‘Tumulto’ transmite desorden y agitación colectiva; con ‘gran’ preserva μέγας. Se prefiere a ‘disturbio’ o ‘confusión’ por su mayor energía poética.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra habitable
  - sobre el país
  - sobre el mundo
  lexicon: BDAG
  rationale: ‘Tierra’ mantiene la amplitud de γῆ y la imagen de alcance general; ‘sobre la tierra’ suena natural y permite la misma ambigüedad entre ‘earth’ y ‘land’ que documenta el texto inglés.
theological_decisions:
- issue: Alcance de γῆ en la fórmula de calamidad
  english_pob_reading: upon the earth
  chosen_spanish_reading: sobre la tierra
  alternative_spanish_readings:
  - sobre el país
  - sobre la tierra habitada
  rationale: El griego usa γῆ en una enumeración de catástrofes de tono amplio; ‘sobre la tierra’ preserva el alcance global posible sin limitarlo indebidamente a una región específica.
  doctrine_reference: 'Translation philosophy: preserve source range and document lexical ambiguity rather than resolve it prematurely.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el pasaje se mantiene con acuerdo alto y sin cambios recientes. La presente redacción conserva la estructura enumerativa y la ambigüedad de γῆ documentada en el aparato inglés.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - ‘Mesías’, ‘Cristo’, ‘siervo/esclavo’ y otras decisiones terminológicas del proyecto no aplican aquí.
  - La secuencia de pares sustantivos reproduce la acumulación del griego sin añadir interpretación causal o escatológica no explicitada en el texto.
