translation:
  language: es
  text: De acuerdo con todo lo que Yahvé había mandado a Moisés, así hicieron los hijos de Israel[a] toda la obra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice literalmente «los hijos de Israel», una designación pactual estándar del pueblo de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: According to all that
  chosen_spanish: De acuerdo con todo lo que
  alternatives_spanish:
  - Según todo lo que
  - Conforme a todo lo que
  lexicon: HALOT
  rationale: La construcción inicial expresa conformidad o correspondencia con el mandamiento previo. «De acuerdo con todo lo que» conserva esa relación sin sonar forzado en español.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - había comandado
  lexicon: HALOT
  rationale: El verbo comunica la emisión de una orden. «Había mandado» es natural, transmite anterioridad respecto de la acción de Israel y evita un tono técnico innecesario.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en forma transliterada conforme a la política del proyecto para יהוה. «Yahvé» preserva el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: אֶת מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: 'Con צוה, el marcador de objeto directo indica a la persona que recibió el mandato. En español se expresa con la preposición «a»: «mandado a Moisés».'
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de esa manera
  - de ese modo
  lexicon: HALOT
  rationale: '«Así» reproduce la correlación con la cláusula anterior de manera breve y clara: como Yahvé mandó, así actuaron.'
- source_word: עָשׂוּ
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - realizaron
  - llevaron a cabo
  lexicon: HALOT
  rationale: El verbo es amplio y aquí significa cumplimiento efectivo. «Hicieron» mantiene la simpleza del hebreo y evita restringir indebidamente el sentido.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Jacob
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva la forma literal y covenantal del hebreo. «Hijos de Israel» refleja el masculino plural constructo sin neutralizarlo.
- source_word: אֵת כָּל הָעֲבֹדָה
  english_pob_choice: all the work
  chosen_spanish: toda la obra
  alternatives_spanish:
  - todo el trabajo
  - toda la labor
  lexicon: HALOT
  rationale: En el contexto de la construcción del tabernáculo, עֲבֹדָה abarca la tarea completa encomendada. «Toda la obra» suena natural y conserva la idea de trabajo ejecutado como un conjunto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue la decisión del proyecto de traducir el Tetragrama con el nombre propio transliterado. Esto preserva la referencia al Dios del pacto sin ocultarla tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Frase covenantal בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los hijos de Israel
  - los israelitas
  rationale: Se conserva la forma masculina plural explícita del hebreo, siguiendo el principio de fidelidad de género cuando el texto fuente lo marca de esa manera, aunque el referente sea corporativo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El texto inglés auditado ya fue revisado y no presenta cambios aplicados en la última pasada; esta propuesta española sigue ese mismo acuerdo alto con el original, preservando el nombre divino, la construcción de correspondencia y la fórmula covenantal sin suavizarlas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, de acuerdo con la terminología estándar del proyecto.
  - Se conserva la forma literal «los hijos de Israel» para reflejar el plural masculino del hebreo.
  - «Toda la obra» traduce עֲבֹדָה en el contexto de la tarea completa del tabernáculo, no solo un oficio genérico.
  - La sintaxis respeta la correlación «de acuerdo con... así...» del hebreo sin añadir contenido interpretativo.
