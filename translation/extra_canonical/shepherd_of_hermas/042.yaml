theological_decisions:
- issue: Rendering δοῦλοι τοῦ Θεοῦ
  chosen_reading: “slaves of God” in the main text
  alternative_readings:
  - servants of God
  - bondservants of God
  rationale: Hermas stresses belonging and mastery (desires enslave; God owns). Using
    “slaves” preserves the sharpness of allegiance language per project policy.
  doctrine_reference: 'DOCTRINE.md — Contested terms: doulos → slave where bonded
    nature is salient.'
- issue: Fear of the Lord/God
  chosen_reading: Translate φόβος literally as “fear”
  alternative_readings:
  - reverence
  - awe
  rationale: The mandate uses martial imagery and threat of death; softening to “reverence”
    would undercut the exhortational force and the stated indwelling of fear within
    good desire.
- issue: “Live to God” (ζήσητε τῷ Θεῷ)
  chosen_reading: Keep the dative as “to God”
  alternative_readings:
  - live for God
  - live unto God
  rationale: Maintains the ancient idiom of orientation without adopting ecclesiastical
    archaism; “to God” avoids interpretive narrowing.
- issue: “Desire for righteousness” vs “desire of righteousness”
  chosen_reading: Render as “desire for righteousness”
  alternative_readings:
  - desire of righteousness
  rationale: The genitive is best taken as objective (desire directed toward righteousness).
    The personification is maintained elsewhere as “the good desire.”
- issue: “Die utterly” (ἀποθανοῦνται εἰς τέλος)
  chosen_reading: 'Translate εἰς τέλος as an intensifier of completeness: “utterly.”'
  alternative_readings:
  - die in the end
  - die completely
  rationale: Preserves the warning’s severity without specifying a doctrinal schema
    of final death; leaves interpretive space for Hermas’s own soteriology.
- issue: Personifying evil desire as “the devil’s daughter”
  chosen_reading: Retain the familial metaphor literally
  alternative_readings:
  - offspring of the devil
  - spawn of the devil
  rationale: Hermas’s personification is integral to his moral psychology; “daughter”
    preserves gendered metaphor and vividness.
- issue: Combat imagery—“weapons” and being “crowned”
  chosen_reading: Keep explicit martial/athletic metaphors
  alternative_readings:
  - armor/crowned with victory (paraphrased)
  rationale: The section weaves arming, resisting, fleeing, and wreathing into a coherent
    exhortation; preserving the metaphors keeps the rhetorical backbone.
