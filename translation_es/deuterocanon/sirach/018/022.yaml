translation:
  language: es
  text: No dejes que nada te impida cumplir un voto a su debido tiempo, y no esperes hasta la muerte para ser justificado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ser vindicado» o «ser mostrado justo». El griego puede referirse de manera más amplia a ser hallado en lo correcto, no necesariamente a usos técnicos posteriores de «justificación».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμποδισθῇς
  english_pob_choice: be hindered
  chosen_spanish: dejes impedir
  alternatives_spanish:
  - seas impedido
  - te veas obstaculizado
  - te retrasen
  lexicon: LSJ
  rationale: El pasivo exhortativo pide evitar que algo bloquee la acción. «Dejes impedir» conserva la idea de impedimento sin volver la frase más pesada que el español admite en una advertencia directa.
- source_word: ἀποδοῦναι
  english_pob_choice: paying
  chosen_spanish: cumplir
  alternatives_spanish:
  - pagar
  - hacer
  - rendir
  lexicon: LSJ
  rationale: Con εὐχήν, el sentido es cumplir o pagar un voto. «Cumplir» suena natural en español bíblico actual y mantiene la obligación de realizar lo prometido a Dios.
- source_word: εὐχήν
  english_pob_choice: a vow
  chosen_spanish: un voto
  alternatives_spanish:
  - una promesa
  - una oración
  - un compromiso
  lexicon: LSJ
  rationale: En este contexto, la palabra griega se refiere a un voto hecho a Dios, no a una oración. «Voto» es el equivalente más preciso y transparente en español.
- source_word: εὐκαίρως
  english_pob_choice: in due time
  chosen_spanish: a su debido tiempo
  alternatives_spanish:
  - oportunamente
  - en el momento oportuno
  - a tiempo
  lexicon: LSJ
  rationale: La expresión griega combina oportunidad temporal y conveniencia. «A su debido tiempo» comunica bien esa idea sin perder la urgencia del mandato.
- source_word: μὴ μείνῃς
  english_pob_choice: do not wait
  chosen_spanish: no esperes
  alternatives_spanish:
  - no te demores
  - no te quedes
  - no te retrases
  lexicon: LSJ
  rationale: Aquí no se trata de permanecer en un lugar, sino de posponer la acción. «No esperes» expresa el retraso voluntario con claridad natural en español.
- source_word: ἕως θανάτου
  english_pob_choice: until death
  chosen_spanish: hasta la muerte
  alternatives_spanish:
  - hasta que mueras
  - hasta morir
  lexicon: LSJ
  rationale: La frase marca un límite extremo de demora. «Hasta la muerte» sigue de cerca el griego y conserva su fuerza proverbial.
- source_word: δικαιωθῆναι
  english_pob_choice: to be justified
  chosen_spanish: ser justificado
  alternatives_spanish:
  - ser vindicado
  - ser mostrado justo
  - ser declarado justo
  lexicon: LSJ
  rationale: La POB inglesa conserva «justified» para mantener visible el término griego, sin imponer una lectura paulina técnica. «Ser justificado» reproduce esa transparencia léxica en español, aunque en este dicho sapiencial también puede entenderse como ser vindicado o reconocido justo.
theological_decisions:
- issue: Sentido de δικαιωθῆναι en un dicho sapiencial
  english_pob_reading: to be justified
  chosen_spanish_reading: ser justificado
  alternative_spanish_readings:
  - ser vindicado
  - ser declarado justo
  - ser mostrado justo
  rationale: La advertencia llama a no postergar la respuesta debida a Dios. Mantener «justificado» preserva la conexión léxica con δικαιόω, pero las alternativas se ofrecen porque en Sirácides el matiz puede ser el de ser hallado en lo correcto o vindicado, no necesariamente una formulación doctrinal posterior.
  doctrine_reference: Translation philosophy §§1, 3, 5; tabla de términos contestados sobre lenguaje de δικαιοσύνη
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto se mantiene en alta concordancia con el packet griego y la nota léxica de δικαιωθῆναι.
  spanish_consistency_notes:
  - Se mantiene «voto» para εὐχήν, en línea con el valor votivo del sintagma con ἀποδοῦναι.
  - Se conserva «justificado» para δικαιωθῆναι por transparencia léxica, con nota para la alternativa semántica.
  - El español evita calcar «no permanezcas» porque en este contexto μὴ μείνῃς expresa demora, no permanencia espacial.
