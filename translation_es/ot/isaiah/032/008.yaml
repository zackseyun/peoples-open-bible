  - severity: medium
    issue: “Sobre cosas nobles” con “se mantiene firme” suena poco natural en español.
    rationale: La combinación es comprensible, pero estilísticamente torpe. Una formulación como “permanece en pie sobre cosas nobles” o una alternativa anotada mejora la fidelidad a la imagen hebrea y la legibilidad.
