translation:
  language: es
  text: Así actuabais con las hijas de Israel[a], y ellas, por miedo, se relacionaban con vosotros; pero una hija de Judá no soportó vuestra iniquidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "se juntaban con vosotros" o "os frecuentaban". El verbo griego admite un sentido de trato o asociación; el contexto coercitivo sugiere una relación forzada, pero la forma verbal por sí sola es menos explícita que un verbo sexual directo.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως ἐποιεῖτε
  english_pob_choice: This is how you acted
  chosen_spanish: Así procedíais
  alternatives_spanish:
  - Así actuabais
  - Esto es lo que hacíais
  lexicon: BDAG
  rationale: El imperfecto griego expresa una acción habitual o repetida; en español, "procedíais" conserva ese valor iterativo y suena natural en un reproche directo. "Así" reproduce el valor de οὕτως sin forzar el texto.
- source_word: θυγατράσιν Ἰσραήλ
  english_pob_choice: the daughters of Israel
  chosen_spanish: las hijas de Israel
  alternatives_spanish:
  - las mujeres de Israel
  - las hijas de Israelitas
  lexicon: LEH
  rationale: Se mantiene la imagen familiar/covenantal del original, que prepara el contraste con "una hija de Judá". "Mujeres de Israel" suaviza demasiado el eco bíblico.
- source_word: φοβούμεναι
  english_pob_choice: out of fear
  chosen_spanish: por miedo
  alternatives_spanish:
  - temiendo
  - por temor
  lexicon: BDAG
  rationale: La frase participial explica la causa de la conducta siguiente. "Por miedo" expresa con claridad la motivación coercitiva en español actual.
- source_word: ὡμίλουν ὑμῖν
  english_pob_choice: associated with you
  chosen_spanish: se relacionaban con vosotros
  alternatives_spanish:
  - se trataban con vosotros
  - convivían con vosotros
  - os acompañaban
  lexicon: BDAG
  rationale: El verbo griego puede indicar asociación o trato frecuente, sin especificar por sí solo un acto sexual. "Se relacionaban con vosotros" preserva la vaguedad relativa del griego y permite que el contexto coercitivo aporte la implicación sin añadirla explícitamente.
- source_word: ἀλλ᾽ οὐ θυγάτηρ Ἰούδα
  english_pob_choice: but a daughter of Judah
  chosen_spanish: pero una hija de Judá
  alternatives_spanish:
  - pero no una hija de Judá
  - pero la hija de Judá
  lexicon: LEH
  rationale: Se conserva el singular representativo del griego. "Una hija de Judá" mantiene el contraste retórico con "las hijas de Israel" y evita expandir el sentido más allá de la formulación original.
- source_word: ὑπέμεινεν
  english_pob_choice: did not endure
  chosen_spanish: no soportó
  alternatives_spanish:
  - no endureció
  - no toleró
  - no aguantó
  lexicon: BDAG
  rationale: Aunque "endurecer" es más literal, en español "soportó" comunica mejor la idea de resistir o aceptar bajo presión. El contexto de abuso y violencia hace natural la noción de no tolerar/soportar.
- source_word: τὴν ἀνομίαν ὑμῶν
  english_pob_choice: your lawlessness
  chosen_spanish: vuestra maldad
  alternatives_spanish:
  - vuestra iniquidad
  - vuestra injusticia
  - vuestra ilegalidad
  lexicon: BDAG
  rationale: ἀνομία conserva fuerza moral y judicial. En español, "maldad" comunica con claridad el juicio ético en un registro bíblico más natural, aunque se mantiene la tensión entre ilegalidad y perversidad en la nota teológica.
theological_decisions:
- issue: Fuerza moral y legal de ἀνομία
  english_pob_reading: lawlessness
  chosen_spanish_reading: maldad
  alternative_spanish_readings:
  - iniquidad
  - injusticia
  - ilegalidad
  rationale: El griego carga tanto una dimensión moral como una dimensión de ruptura del orden. "Maldad" es una equivalencia idiomática comprensible, pero las alternativas se conservan porque cada una enfatiza un matiz distinto del término.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Valor representativo del singular "una hija de Judá"
  english_pob_reading: a daughter of Judah
  chosen_spanish_reading: una hija de Judá
  alternative_spanish_readings:
  - la hija de Judá
  - ninguna hija de Judá
  rationale: Se conserva el singular para respetar el contraste retórico con "las hijas de Israel" y permitir que Susana funcione como mujer representante de Judá sin reinterpretar el número gramatical.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; preserve source wording unless context demands variance.'
translation_notes:
  revision_awareness: 'Se ha seguido el audit trail inglés y el griego de Swete con una equivalencia óptima: se conservan el imperfecto habitual, el contraste ''hijas de Israel / hija de Judá'' y la tensión semántica de ἀνομία. La única adaptación principal es ''maldad'' para ἀνομία por claridad idiomática española, manteniendo la nota teológica sobre el matiz legal-moral.'
  spanish_consistency_notes:
  - Se usa "Judá" para el gentilicio bíblico y "Israel" en forma posesiva natural.
  - Se mantiene un registro bíblico contemporáneo, no arcaizante.
  - La nota al pie marca la ambigüedad de ὡμίλουν ὑμῖν sin sobreespecificar el acto.
