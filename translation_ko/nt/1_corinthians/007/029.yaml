  text: τοῦτο δέ φημι, ἀδελφοί, ὁ καιρὸς συνεσταλμένος ⸂ἐστίν· τὸ λοιπὸν⸃ ἵνα καὶ οἱ ἔχοντες γυναῖκας ὡς μὴ ἔχοντες ὦσιν,
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/007/029.yaml
  text: 'This is what I mean[a], brothers: the time has been shortened, so that from now on even those who have wives should be as though they had none[b],'
