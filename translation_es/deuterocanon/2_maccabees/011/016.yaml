translation:
  language: es
  text: 'Porque se habían escrito cartas a los judíos de Lisias[a], que contenían esta forma: «Lisias a la multitud[b] de los judíos, saludos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por parte de Lisias». La preposición griega indica origen o procedencia.
    reason: lexical_alternative
  - marker: b
    text: O «al conjunto de los judíos» o «a la asamblea de los judíos». El griego πλῆθος puede referirse a una gran colectividad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦσαν γὰρ γεγραμμέναι
  english_pob_choice: For letters had been written
  chosen_spanish: Porque ya habían sido escritas cartas
  alternatives_spanish:
  - Porque se habían escrito cartas
  - Porque ya estaban escritas cartas
  lexicon: LSJ
  rationale: El griego expresa un pluscuamperfecto pasivo perifrástico; en español, 'ya habían sido escritas' conserva bien el valor de anterioridad. Se mantiene 'Porque' para reproducir la conexión explicativa de γάρ.
- source_word: τοῖς Ἰουδαίοις
  english_pob_choice: to the Jews
  chosen_spanish: a los judíos
  alternatives_spanish:
  - a los judeanos
  lexicon: LSJ
  rationale: Aquí el referente es el pueblo judío como colectivo étnico-religioso; 'judíos' es la forma natural y fiel en español contemporáneo.
- source_word: ἐπιστολαὶ
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - misivas
  - cartas escritas
  lexicon: LSJ
  rationale: Se trata de correspondencia administrativa; 'cartas' es el equivalente español más claro e idiomático.
- source_word: παρὰ μὲν Λυσίου
  english_pob_choice: from Lysias
  chosen_spanish: por parte de Lisias
  alternatives_spanish:
  - de Lisias
  - enviadas por Lisias
  lexicon: LSJ
  rationale: La preposición παρά con genitivo indica procedencia/origen. 'Por parte de' conserva ese origen sin imponer de manera demasiado fuerte la mano de obra material del envío.
- source_word: περιέχουσαι
  english_pob_choice: containing
  chosen_spanish: que contenían
  alternatives_spanish:
  - que llevaban
  - que incluían
  lexicon: LSJ
  rationale: El participio introduce el contenido literal de la carta citada; la subordinada relativa resulta natural en español y mantiene la relación sintáctica.
- source_word: τὸν τρόπον τοῦτον
  english_pob_choice: this form
  chosen_spanish: esta formulación
  alternatives_spanish:
  - esta forma
  - este tenor
  - esta redacción
  lexicon: LSJ
  rationale: En el contexto epistolar, la expresión apunta al modo en que la carta está redactada. 'Formulación' da cuenta tanto de la forma como del tenor del texto citado, sin reducirlo a solo una de las posibilidades.
- source_word: τῷ πλήθει τῶν Ἰουδαίων
  english_pob_choice: to the multitude of the Jews
  chosen_spanish: a la multitud[b] de los judíos
  alternatives_spanish:
  - al conjunto de los judíos
  - a la asamblea de los judíos
  - al cuerpo de los judíos
  lexicon: LSJ
  rationale: πλῆθος designa una gran masa o colectivo; 'multitud' conserva la fuerza colectiva que el POB inglés quiso preservar. Se añade nota porque en español también podría entenderse como 'conjunto' o 'asamblea' según el matiz del contexto.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: saludos
  alternatives_spanish:
  - os saluda
  - que os vaya bien
  lexicon: LSJ
  rationale: En saludos epistolares, χαίρειν funciona como fórmula estable. 'Saludos' reproduce el valor convencional en español sin sobrecargarlo con una paráfrasis.
theological_decisions:
- issue: El alcance de πλῆθος aplicado a los judíos
  english_pob_reading: to the multitude of the Jews
  chosen_spanish_reading: a la multitud de los judíos
  alternative_spanish_readings:
  - a la asamblea de los judíos
  - al cuerpo de los judíos
  rationale: No hay razón para convertir πλῆθος en una institución formal ni en una simple muchedumbre desordenada. 'Multitud' mantiene la idea de un colectivo amplio sin cerrar indebidamente el matiz.
  doctrine_reference: Lexical semantics; no doctrinal assertion
- issue: La función de τὸν τρόπον τοῦτον en la introducción epistolar
  english_pob_reading: this form
  chosen_spanish_reading: esta formulación
  alternative_spanish_readings:
  - esta forma
  - esta redacción
  - este tenor
  rationale: El texto introduce una cita de carta. 'Formulación' preserva la idea de que se presenta el modo exacto o casi exacto del escrito, evitando una reducción excesiva a un solo matiz.
  doctrine_reference: Textual/discursive structure; no doctrinal assertion
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el contexto auditado en inglés y no requiere cambios de sentido mayores. Se conservan las dos tensiones léxicas documentadas: la expresión epistolar τὸν τρόπον τοῦτον y el valor colectivo de πλῆθος.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el tetragrámaton ni un equivalente directo.
  - '''Judíos'' se usa en sentido étnico-religioso conforme al contexto de 2 Macabeos.'
  - Se evita 'epístolas' porque el griego se refiere a cartas concretas de carácter administrativo.
  - La fórmula de saludo se traduce con un equivalente español natural, 'saludos', para respetar el uso epistolar convencional.
