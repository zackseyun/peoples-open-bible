translation:
  language: es
  text: Así que Sadoc y Abiatar devolvieron el arca de Dios a Jerusalén, y se quedaron allí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּשֶׁב
  english_pob_choice: returned
  chosen_spanish: devolvieron
  alternatives_spanish:
  - trajeron de vuelta
  - llevaron de regreso
  lexicon: HALOT
  rationale: El hebreo en causativo expresa que hicieron volver el arca; en español, 'devolver' conserva la idea de regreso al lugar de origen o destino previsto, con un verbo natural y directo.
- source_word: צָדוֹק
  english_pob_choice: Zadok
  chosen_spanish: Sadoc
  alternatives_spanish:
  - Zadoc
  - Sadok
  lexicon: transliteración estándar al español
  rationale: Se adapta el nombre propio a la forma más común en español bíblico, manteniendo la referencia al mismo personaje.
- source_word: וְאֶבְיָתָר
  english_pob_choice: and Abiathar
  chosen_spanish: y Abiatar
  alternatives_spanish:
  - y Abiatar
  - y Ebíatar
  lexicon: transliteración estándar al español
  rationale: Se conserva el nombre propio con la grafía tradicional y legible en español, sin introducir explicación adicional.
- source_word: אֶת אֲרוֹן הָאֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca de Dios
  - el arca del Dios
  lexicon: HALOT
  rationale: El texto hebreo dice literalmente 'el arca de Dios' y no desarrolla aquí la expresión más larga 'del pacto'. Se mantiene esa formulación exacta para no importar terminología ausente del versículo.
- source_word: יְרוּשָׁלָם
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - hasta Jerusalén
  lexicon: toponimia bíblica
  rationale: El movimiento implícito del verbo se expresa con 'a' en español, preservando la dirección sin sobrecargar la frase.
- source_word: וַיֵּשְׁבוּ שָׁם
  english_pob_choice: and they stayed there
  chosen_spanish: y se quedaron allí
  alternatives_spanish:
  - y permanecieron allí
  - y habitaron allí
  lexicon: HALOT
  rationale: ישב en este contexto narrativo comunica permanencia; 'se quedaron allí' es natural en español y reproduce la idea de seguir presentes en ese lugar.
translation_notes:
  revision_awareness: El contexto auditado en inglés no introduce notas ni revisiones textuales; la versión española sigue el hebreo de manera cercana y mantiene la misma estructura narrativa sin añadir aclaraciones doctrinales.
  spanish_consistency_notes:
  - Se usa 'Dios' para אֱלֹהִים, coherente con la norma del proyecto.
  - Se mantiene el nombre divino fuera de este versículo porque no aparece en el texto fuente.
  - La frase verbal 'se quedaron allí' preserva el sentido durativo de וַיֵּשְׁבוּ sin sonar arcaica.
