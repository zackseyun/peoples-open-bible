translation:
  language: es
  text: 'Por tanto, así dice el Señor Dios, Yahvé: Porque me has olvidado y me has echado a tus espaldas[a], tú también llevarás tu lascivia y tus prostituciones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me arrojaste a tus espaldas». El hebreo expresa un modismo de rechazo o desprecio deliberado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvéh
  lexicon: HALOT
  rationale: Mantiene el doble título con un equivalente natural en español y preserva el nombre divino como Yahvé, conforme al criterio del proyecto para יְהוָה. 'Señor Dios' podría sonar más genérico y perder la huella nominal del Tetragrama en este contexto profético.
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Introduce la causa del juicio de modo claro y sobrio en español, sin añadir matices no requeridos por el hebreo.
- source_word: שָׁכַחַתְּ אֹתִי
  english_pob_choice: you have forgotten me
  chosen_spanish: me has olvidado
  alternatives_spanish:
  - me olvidaste
  lexicon: HALOT
  rationale: El perfecto hebreo se expresa de forma natural con el pretérito perfecto compuesto en español, conservando el carácter de acción consumada con relevancia presente.
- source_word: וַתַּשְׁלִיכִי אֹתִי אַחֲרֵי גַוֵּךְ
  english_pob_choice: and cast me behind your back
  chosen_spanish: y me has echado detrás de tu espalda
  alternatives_spanish:
  - y me has arrojado detrás de tu espalda
  - y me has echado detrás de tu cuerpo
  lexicon: HALOT
  rationale: Conservo la imagen idiomática de rechazo deliberado. 'Echado detrás de tu espalda' reproduce el giro semita con claridad en español; 'espalda' resulta más idiomático que 'cuerpo' en esta metáfora.
- source_word: גַוֵּךְ
  english_pob_choice: your back
  chosen_spanish: tu espalda
  alternatives_spanish:
  - tu cuerpo
  - tu persona
  lexicon: HALOT
  rationale: Aunque el sustantivo puede abarcar más que la espalda, el contexto idiomático favorece esta equivalencia concreta en español.
- source_word: וְגַם אַתְּ
  english_pob_choice: you also
  chosen_spanish: tú también
  alternatives_spanish:
  - y tú también
  - así que tú también
  lexicon: HALOT
  rationale: Preserva el énfasis de inclusión de la destinataria en la consecuencia judicial.
- source_word: שְׂאִי
  english_pob_choice: must bear
  chosen_spanish: llevarás
  alternatives_spanish:
  - debes llevar
  - cargarás
  - sufrirás
  lexicon: HALOT
  rationale: En este contexto forense, el imperativo funciona como sentencia de consecuencia. 'Llevarás' mantiene la idea de cargar con la culpa/pena en español natural, sin sobreactuar el modal 'debes'.
- source_word: זִמָּתֵךְ
  english_pob_choice: your lewdness
  chosen_spanish: tu infamia
  alternatives_spanish:
  - tu maldad
  - tu perversidad
  - tu lascivia
  lexicon: HALOT
  rationale: זִמָּה en contextos de juicio sexualizado puede abarcar conducta vergonzosa y perversa. 'Infamia' comunica vergüenza moral y reproche público en español, evitando una restricción excesiva a un único matiz sexual.
- source_word: וְאֶת תַּזְנוּתָיִךְ
  english_pob_choice: and your prostitutions
  chosen_spanish: y tus prostituciones
  alternatives_spanish:
  - y tus fornicaciones
  - y tus actos de prostitución
  - y tus prostituciones repetidas
  lexicon: HALOT
  rationale: El plural hebreo se refleja de forma directa con 'prostituciones', como en la revisión inglesa, para conservar la fuerza repetitiva y la personificación profética del término.
theological_decisions:
- issue: Representación del nombre divino en el título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahweh
  rationale: Se sigue la convención del proyecto de renderizar יְהוָה como 'Yahvé', incluso dentro del título compuesto. En español, 'el Señor Yahvé' conserva ambos elementos del hebreo sin ocultar el nombre propio divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor judicial del imperativo שְׂאִי en un anuncio de sentencia
  english_pob_reading: must bear
  chosen_spanish_reading: llevarás
  alternative_spanish_readings:
  - debes llevar
  - cargarás
  - sufrirás
  rationale: El mandato no exhorta sino que decreta una consecuencia. 'Llevarás' permite oír la obligación judicial sin introducir un auxiliar demasiado explicativo.
  doctrine_reference: Ezekiel judgment oracle syntax; lexical decision grounded in HALOT
- issue: Intensidad moral de זִמָּה y תַּזְנוּת
  english_pob_reading: lewdness / prostitutions
  chosen_spanish_reading: infamia / prostituciones
  alternative_spanish_readings:
  - lascivia / prostituciones
  - perversidad / prostituciones
  - deshonra / prostituciones
  rationale: La pareja española intenta conservar la tensión entre vergüenza moral general y pluralidad de actos sexuales de infidelidad. 'Infamia' evita reducir זִמָּה a un tecnicismo sexual único y mantiene el tono acusatorio profético.
  doctrine_reference: Ezekiel 23 sexualized covenant judgment imagery
translation_notes:
  revision_awareness: La redacción inglesa más reciente ajustó el segundo sustantivo final a un plural más directo ('your prostitutions'). La versión española conserva ese plural con 'tus prostituciones' y evita suavizar el idioma sexualizante del pasaje. También se reevalúa el título divino a partir del criterio del proyecto para יְהוָה, usando 'Yahvé' en vez de la convención inglesa 'LORD/GOD'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma regular del nombre divino, coherente con el estándar del proyecto.
  - '''Espalda'' se usa para el valor idiomático de גַוֵּךְ; la nota aclara que el hebreo puede leerse también de manera más literal.'
  - Se conserva el plural 'prostituciones' para תַּזְנוּתָיִךְ, en continuidad con la revisión inglesa auditada.
  - '''Infamia'' busca preservar el peso acusatorio de זִמָּה sin borrar su trasfondo sexual y moral.'
