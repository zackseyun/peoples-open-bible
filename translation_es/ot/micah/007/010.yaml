- from: 'Entonces mi enemiga lo verá[a], y la vergüenza la cubrirá —la que me decía: «¿Dónde está Yahvé tu Dios?» Mis ojos la verán[b]; ahora será pisoteada como el barro de las calles.'
  to: 'Entonces mi enemiga verá, y la vergüenza la cubrirá —la que me dijo: «¿Dónde está Yahvé tu Dios?»—. Mis ojos la verán[a]; ahora será pisoteada como barro en las calles.[b]'
  rationale: Se corrigió un error de fidelidad eliminando el objeto añadido «lo» en la primera cláusula. Se movió la nota [a] al segmento correcto («Mis ojos la verán») y se reemplazó su contenido por una alternativa española real de esa cláusula, ya que la nota inglesa documenta una variante léxica interna entre «look on» y «see her», no una lectura de la primera mitad del versículo. Se ajustó «la que me decía» a «la que me dijo» por naturalidad contextual y se suavizó el cierre a «como barro en las calles», más fiel al hebreo y más idiomático. Se añadió la nota [b] al final para conservar la alternativa auditada sobre לְמִרְמָס.
  reviewer_model: gpt-5.4
