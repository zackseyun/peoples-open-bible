translation:
  language: es
  text: 'Y se dirá en aquel día[a]: «He aquí, este es nuestro Dios; hemos esperado en él para que nos salvara. Este es Yahvé; hemos esperado en él. Alegrémonos y regocijémonos en su salvación».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé». Se conserva el nombre divino como «Yahvé» en el texto principal, en lugar de sustituirlo por una forma de título.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאָמַר
  english_pob_choice: And it will be said
  chosen_spanish: Y se dirá
  alternatives_spanish:
  - Y dirán
  - Y se dirá esto
  - Y se dirá entonces
  lexicon: HALOT
  rationale: El hebreo usa una forma verbal narrativa en contexto profético con valor impersonal/futuro. En español, «se dirá» mantiene bien ese carácter impersonal sin introducir un sujeto inexistente en el texto.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: La fórmula profética se conserva de manera natural con «en aquel día», que transmite la referencia escatológica del hebreo.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - He aquí
  - Vean
  - Miren bien
  lexicon: HALOT
  rationale: «He aquí» sería más tradicional, pero en español contemporáneo «Miren» conserva mejor la fuerza deíctica y exhortativa del hebreo sin sonar arcaico.
- source_word: אֱלֹהֵינוּ זֶה
  english_pob_choice: this is our God
  chosen_spanish: este es nuestro Dios
  alternatives_spanish:
  - este, nuestro Dios
  - he aquí nuestro Dios
  - este es el Dios nuestro
  lexicon: HALOT
  rationale: La construcción demostrativa + sustantivo expresa identificación; «este es nuestro Dios» preserva el reconocimiento enfático de la frase hebrea.
- source_word: קִוִּינוּ לוֹ
  english_pob_choice: we have waited for him
  chosen_spanish: a él hemos esperado
  alternatives_spanish:
  - hemos esperado en él
  - lo hemos esperado
  - hemos aguardado por él
  lexicon: HALOT
  rationale: קוה combina espera con esperanza. «Hemos esperado» conserva la idea de espera confiada; el complemento enfático «a él» reproduce el objeto personal del hebreo y evita una lectura meramente abstracta.
- source_word: וְיוֹשִׁיעֵנוּ
  english_pob_choice: that he might save us
  chosen_spanish: y él nos salvará
  alternatives_spanish:
  - para que nos salve
  - y nos salvará
  - y nos rescatará
  lexicon: HALOT
  rationale: El hebreo expresa la relación de expectativa con la salvación de forma compacta. En español, «y él nos salvará» comunica la misma finalidad/resultadismo en un registro fluido; «salvará» conserva el campo semántico de ישׁע.
- source_word: יְהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto, el Tetragrámaton se traduce como «Yahvé» en el texto principal, evitando la sustitución litúrgica por «SEÑOR» y manteniendo visible el nombre divino.
- source_word: נָגִילָה וְנִשְׂמְחָה
  english_pob_choice: Let us rejoice and be glad
  chosen_spanish: Alegrémonos y regocijémonos
  alternatives_spanish:
  - Gocémonos y alegrémonos
  - Rebosémonos de alegría y alegrémonos
  - Celebremos con gozo
  lexicon: HALOT
  rationale: Las cohortativas expresan exhortación/volición. «Alegrémonos y regocijémonos» conserva el paralelismo y el tono comunitario con un español digno y claro.
- source_word: בִּישׁוּעָתוֹ
  english_pob_choice: in his salvation
  chosen_spanish: en su salvación
  alternatives_spanish:
  - por su salvación
  - a causa de su salvación
  - en la salvación que da
  lexicon: HALOT
  rationale: ישׁוּעָה significa salvación/deliverance. «En su salvación» preserva la preposición hebrea y el vínculo teológico con el acto salvador de Dios.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En consonancia con la terminología del proyecto en español, se conserva como «Yahvé» en lugar de ocultarlo con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: El valor de קִוִּינוּ לוֹ en relación con la salvación
  english_pob_reading: we have waited for him, that he might save us
  chosen_spanish_reading: a él hemos esperado, y él nos salvará
  alternative_spanish_readings:
  - hemos esperado en él, para que nos salve
  - lo hemos esperado, para que nos salve
  - hemos aguardado por él, y nos salvará
  rationale: El hebreo une la espera confiada con la expectativa de salvación. La redacción española mantiene ambas ideas sin convertir la cláusula en una paráfrasis excesiva ni perder el vínculo entre espera y rescate.
  doctrine_reference: 'DOCTRINE.md: Salvación divina como acción esperada y reconocida'
- issue: Función de las formas cohortativas finales
  english_pob_reading: Let us rejoice and be glad
  chosen_spanish_reading: Alegrémonos y regocijémonos
  alternative_spanish_readings:
  - Rejozjémonos y alegrémonos
  - Gocémonos y alegrémonos
  - Regocijémonos
  rationale: Las formas hebreas expresan exhortación comunitaria. En español, el subjuntivo exhortativo mantiene la fuerza volitiva del original y el tono de respuesta litúrgica.
  doctrine_reference: 'DOCTRINE.md: Imperativos/cohortativos en discurso poético'
translation_notes:
  revision_awareness: 'El texto español sigue la última revisión del audit trail al mantener el foco en la espera confiada y la salvación esperada, pero lo expresa con una construcción española más natural: «a él hemos esperado, y él nos salvará». Se preserva además la decisión revisada de no suavizar la relación entre expectativa y salvación, y se aplica la política del proyecto para el nombre divino como «Yahvé».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con la política española del proyecto para יְהוָה.
  - Se mantiene «salvación» para ישׁוּעָה, sin desplazarlo por «victoria».
  - «Esperado» reproduce la idea de קוה con una construcción natural en español, evitando una paráfrasis abstracta.
  - 'El paralelismo final conserva dos verbos exhortativos coordinados en subjuntivo: «Alegrémonos y regocijémonos».'
