translation:
  language: es
  text: Y se sintió muy angustiado en su alma[a]; y decidió ir a Persia, para cobrar los tributos de las regiones y reunir mucha plata[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estaba en gran perplejidad» o «estaba en gran angustia». El verbo griego puede expresar tanto estar perplejo como sufrir gran dificultad.'
    reason: lexical_alternative
  - marker: b
    text: Aquí «plata» probablemente designa riqueza monetaria en plata acuñada o pesada, no solo metal en bruto.
    reason: cultural_note
lexical_decisions:
- source_word: ἠπορεῖτο
  english_pob_choice: was greatly troubled
  chosen_spanish: se sintió muy angustiado
  alternatives_spanish:
  - estaba muy perplejo
  - se hallaba en gran angustia
  - estaba muy abatido
  lexicon: LSJ
  rationale: El verbo puede expresar perplejidad, estar en apuro o grave dificultad. En español, "se sintió muy angustiado" comunica bien la aflicción interior sin reducir indebidamente el matiz de desconcierto que la POB inglesa deja abierto.
- source_word: τῇ ψυχῇ αὐτοῦ
  english_pob_choice: in his soul
  chosen_spanish: en su alma
  alternatives_spanish:
  - en sí mismo
  - en su corazón
  - en su espíritu
  lexicon: LSJ
  rationale: '"ψυχή" conserva un lenguaje antropológico interior. "En su alma" es natural en español y mantiene la referencia al interior de la persona, sin forzarla a simple emoción o pensamiento.'
- source_word: σφόδρα
  english_pob_choice: greatly
  chosen_spanish: muy
  alternatives_spanish:
  - grandemente
  - en gran manera
  - sumamente
  lexicon: LSJ
  rationale: El adverbio intensifica el verbo anterior. "Muy" integra la intensidad de modo fluido en español, aunque la fuerza también queda reforzada por "angustiado".
- source_word: ἐβουλεύσατο
  english_pob_choice: he decided
  chosen_spanish: decidió
  alternatives_spanish:
  - resolvió
  - tomó la determinación de
  - se propuso
  lexicon: LSJ
  rationale: El medio sugiere deliberación que culmina en una decisión. "Decidió" reproduce de forma clara y sobria el resultado de esa deliberación.
- source_word: τοῦ πορευθῆναι εἰς τὴν Περσίδα
  english_pob_choice: to go into Persia
  chosen_spanish: ir a Persia
  alternatives_spanish:
  - viajar a Persia
  - dirigirse a Persia
  - irse a Persia
  lexicon: LSJ
  rationale: La meta del movimiento es simplemente entrar/ir a Persia. En español, "ir a Persia" es natural y fiel; no hace falta sobrecargar con una expresión más técnica.
- source_word: λαβεῖν τοὺς φόρους
  english_pob_choice: to collect the taxes
  chosen_spanish: cobrar los tributos
  alternatives_spanish:
  - recaudar los impuestos
  - percibir los tributos
  - cobrar los impuestos
  lexicon: LSJ
  rationale: φόροι puede abarcar tributo o impuestos. Dado el contexto imperial y administrativo, "tributos" conserva mejor el matiz de pago debido a una autoridad; "cobrar" expresa la acción fiscal.
- source_word: τῶν χωρῶν
  english_pob_choice: of the regions
  chosen_spanish: de las regiones
  alternatives_spanish:
  - de las tierras
  - de las provincias
  - de los distritos
  lexicon: LSJ
  rationale: χῶραι designa unidades territoriales. "Regiones" mantiene amplitud y evita precisar indebidamente una estructura administrativa más específica que la del griego.
- source_word: συναγαγεῖν ἀργύριον πολύ
  english_pob_choice: to gather much silver
  chosen_spanish: reunir mucho plata
  alternatives_spanish:
  - amontonar mucha plata
  - reunir mucho dinero
  - acumular mucha plata
  lexicon: LSJ
  rationale: ἀργύριον es literalmente "plata" y también dinero/riqueza en plata. Se conserva la concreción del metal-valor; sin embargo, la forma idiomática requiere un ajuste gramatical en español que se refleja en el texto y se explica en nota.
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete (1909) y el auditor inglés sin cambios de contenido. Se mantuvo la ambigüedad lexical de ἠπορεῖτο mediante una nota alternativa, y se preservó ἀργύριον como lenguaje concreto de riqueza en plata, con aclaración cultural. Se adaptó la sintaxis al español natural sin añadir información no contenida en el original.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando el texto lo requiere; este versículo no contiene el nombre divino.
  - Se prefirió «tributos» para φόροι por el contexto político-fiscal del pasaje.
  - Se conservó la concreción de «plata» para ἀργύριον, evitando la generalización a «dinero» en el texto principal.
