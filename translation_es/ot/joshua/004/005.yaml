review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido básico del hebreo: Josué habla a ellos, manda cruzar delante del arca de Yahvé su Dios hasta el interior del Jordán, y que cada hombre tome una piedra sobre su hombro según el número de las tribus de los hijos de Israel. Conserva correctamente «Yahvé» y «los hijos de Israel». Sin embargo, hay dos desajustes de fidelidad/forma: «Pasen» debilita el matiz de cruce de עִבְרוּ en contexto de río, y «y levante cada hombre» rompe la concordancia imperativa plural del mandato distributivo; en español debe expresarse «y que cada hombre levante» o una forma equivalente.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «hasta en medio del Jordán» suena algo forzado y «y levante cada hombre» resulta gramaticalmente áspero tras un imperativo plural. Una leve revisión mejora naturalidad sin perder formalidad: «Crucen delante del arca… hasta el medio del Jordán, y que cada hombre levante una piedra sobre su hombro…».'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יהוה → «Yahvé» está correcto; בני ישראל → «los hijos de Israel» está bien preservado y respaldado por nota. No hay conflicto doctrinal adicional. La única mejora léxica relevante es preferir «Crucen» para עִבְרוּ en este contexto de cruce del Jordán.'
  issues:
  - severity: medium
    issue: «Pasen» para עִבְרוּ
    rationale: Aunque posible, «pasen» es más débil y menos específico que el hebreo en un contexto explícito de cruce de río. «Crucen» preserva mejor la idea de atravesar el Jordán.
  - severity: medium
    issue: «y levante cada hombre»
    rationale: Tras un imperativo plural, esta forma singular sin nexo subordinante suena incorrecta en español. El hebreo tiene mandato plural con fuerza distributiva; «y que cada hombre levante» lo expresa fiel y naturalmente.
  - severity: low
    issue: «hasta en medio del Jordán»
    rationale: No es infiel, pero suena poco natural. «Hasta el medio del Jordán» o «al medio del Jordán» comunica mejor el valor direccional hacia el interior/centro del río.
  revised_spanish_text: 'Y Josué les dijo[a]: «Crucen delante del arca de Yahvé su Dios hasta el medio del Jordán, y que cada hombre levante una piedra sobre su hombro, conforme al número de las tribus de los hijos de Israel».'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Israel». Esta es la expresión formal del pacto; muchas versiones la simplifican como «los israelitas» o «el pueblo de Israel».'
    reason: lexical_alternative
  revision_rationale: 'Se hicieron reparaciones menores para mejorar fidelidad al hebreo y naturalidad del español: «Crucen» refleja mejor el cruce del río; «y que cada hombre levante» corrige la sintaxis del mandato distributivo; «hasta el medio del Jordán» suena más natural sin perder el sentido de תּוֹךְ.'
