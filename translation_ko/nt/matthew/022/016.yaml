  text: καὶ ἀποστέλλουσιν αὐτῷ τοὺς μαθητὰς αὐτῶν μετὰ τῶν Ἡρῳδιανῶν ⸀λέγοντες· Διδάσκαλε, οἴδαμεν ὅτι ἀληθὴς εἶ καὶ τὴν ὁδὸν τοῦ θεοῦ ἐν ἀληθείᾳ διδάσκεις, καὶ οὐ μέλει σοι περὶ οὐδενός, οὐ γὰρ βλέπεις εἰς πρόσωπον ἀνθρώπων·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/022/016.yaml
  text: And they send to him their disciples along with the Herodians[a], saying, “Teacher, we know that you are true and teach the way of God in truth, and you do not care about anyone[b], for you do not look at the face of men.”
  footnotes:
  - marker: a
    text: Or, “you do not show partiality to people” or “you do not judge by appearances.”
    reason: lexical_alternative
  - marker: b
    text: Greek “men”; here used generically for human beings.
    reason: lexical_alternative
translation:
  language: ko
  text: 그리고 그들이 자기 제자들을 헤롯 당원들과 함께 예수께 보내어 말하게 하였습니다, 「선생님, 우리는 당신이 참되시고 하나님의 길을 진리 안에서 가르치시며, 사람의 외모를 보지 않으시기에 누구에게도 매이지 않으심을 압니다.」
  philosophy: optimal-equivalence
