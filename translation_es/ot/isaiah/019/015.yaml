translation:
  language: es
  text: Y no habrá para Egipto obra alguna que pueda hacer cabeza o cola[a], rama de palma o caña[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'cabeza o cola, rama de palma o caña'. Es una expresión figurada para todos los niveles de la sociedad, desde los más altos hasta los más bajos; compárese la imagen semejante en Isaías 9:14.
    reason: cross_reference
  - marker: b
    text: 'O: ''cabeza y cola, rama de palma y caña''. Los pares hebreos pueden leerse coordinadamente, pero el sentido es que ninguna parte de Egipto, alta o baja, podrá actuar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲשֶׂה
  english_pob_choice: work
  chosen_spanish: trabajo
  alternatives_spanish:
  - obra
  - quehacer
  - labor
  lexicon: HALOT
  rationale: El sustantivo denota una actividad, empresa u obra realizada. 'Trabajo' comunica con naturalidad en español la idea de algo que Egipto pudiera hacer o emprender, y encaja con la cláusula relativa siguiente.
- source_word: אֲשֶׁר יַעֲשֶׂה
  english_pob_choice: that ... can do
  chosen_spanish: que pueda hacer
  alternatives_spanish:
  - que hará
  - que pudiera hacer
  - que pueda realizar
  lexicon: HALOT
  rationale: La forma verbal en este contexto expresa capacidad o posibilidad frustrada, no simple futuro. 'Que pueda hacer' reproduce bien la fuerza modal de incapacidad del texto.
- source_word: רֹאשׁ וְזָנָב
  english_pob_choice: head or tail
  chosen_spanish: cabeza o cola
  alternatives_spanish:
  - cabeza y cola
  lexicon: HALOT
  rationale: 'La pareja es figurada y apunta a extremos sociales, como en Isaías 9:14. ''O'' conserva mejor el sentido distributivo: ni lo alto ni lo bajo podrán actuar.'
- source_word: כִּפָּה
  english_pob_choice: palm branch
  chosen_spanish: palma
  alternatives_spanish:
  - rama de palma
  - palm branch
  lexicon: HALOT
  rationale: El término probablemente designa una palma o rama de palma en la imagen paralela. 'Palma' mantiene la referencia botánica sin sobrecargar la frase en español; el matiz metafórico sigue intacto.
- source_word: אַגְמוֹן
  english_pob_choice: reed
  chosen_spanish: caña
  alternatives_spanish:
  - junca
  - junco
  - caña
  lexicon: HALOT
  rationale: El término se refiere a una planta de pantano, como junco o caña. 'Caña' preserva el contraste con 'palma' y es claro para el lector hispanohablante.
- source_word: לְמִצְרַיִם
  english_pob_choice: for Egypt
  chosen_spanish: para Egipto
  alternatives_spanish:
  - a Egipto
  - en Egipto
  lexicon: HALOT
  rationale: 'El ל aquí indica relación o disponibilidad: no habrá trabajo que Egipto pueda hacer. ''Para Egipto'' expresa esa relación de modo natural en español.'
- source_word: וְלֹא יִהְיֶה
  english_pob_choice: And there will be no
  chosen_spanish: Y no habrá
  alternatives_spanish:
  - Y no existirá
  - Y no habrá ninguno
  lexicon: HALOT
  rationale: Es una cláusula existencial futura. 'No habrá' es una formulación natural y fiel en español.
theological_decisions:
- issue: Sentido figurado de 'cabeza o cola, palma o caña' como extremos sociales
  english_pob_reading: Hebrew 'head or tail, palm branch or reed' is a figurative expression for every level of society, from highest to lowest; no part of Egypt will be able to act.
  chosen_spanish_reading: '''cabeza o cola, palma o caña'' se conserva como imagen figurada de todos los niveles sociales, de lo más alto a lo más bajo.'
  alternative_spanish_readings:
  - suprimir la figura y explicar el sentido
  - traducir interpretativamente como 'los altos y los bajos'
  rationale: La metáfora es importante y está documentada por el paralelo con Isaías 9:14. Conviene mantenerla en el texto y dejar la explicación para la nota, en vez de reemplazarla por una paráfrasis que borre la tensión figurada.
  doctrine_reference: Isaías 9:14; lectura figurada social del texto
- issue: Posible coordinado o disyuntivo en 'cabeza o cola, palma o caña'
  english_pob_reading: The Hebrew pairs may be read coordinately, but the sense is that no part of Egypt, high or low, will be able to act.
  chosen_spanish_reading: Se mantiene el valor distributivo con 'o', sin cerrar la posibilidad de una lectura coordinada en la nota.
  alternative_spanish_readings:
  - cabeza y cola, palma y caña
  rationale: 'El inglés POB preserva la alternativa coordinada en nota. En el texto español, ''o'' comunica mejor la distribución negativa: ni uno ni otro extremo podrá hacer nada.'
  doctrine_reference: Hebreo poético; nota lexical, no doctrina
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando ambas notas al texto español mediante los marcadores [a] y [b]. La redacción mantiene la metáfora y la alternativa coordinada sin depender de una paráfrasis explicativa en el cuerpo del verso.
  spanish_consistency_notes:
  - Se usó 'Egipto' de forma consistente para לְמִצְרַיִם.
  - Se optó por 'palma' y 'caña' para conservar la imagen botánica breve y el paralelismo.
  - Se mantuvo el futuro existencial 'habrá' para וְלֹא יִהְיֶה.
  - Se conservó el valor modal de 'pueda hacer' para la incapacidad del verbo hebreo en este contexto.
