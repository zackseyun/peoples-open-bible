  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura comparativa del hebreo y la conclusión proverbial: nieve en verano / lluvia en cosecha, así el honor no corresponde al necio. Sin embargo, «en la cosecha» suena menos idiomático para el valor temporal de בַּקָּצִיר que «en tiempo de cosecha», y la nota alternativa inglesa usa «does not befit», que en español se recoge mejor con «no conviene» que con repetir «apropiado».'
  spanish_quality_summary: El español es claro y fiel, pero puede pulirse para mayor naturalidad proverbial. «Como nieve en verano y como lluvia en tiempo de cosecha» fluye mejor en español bíblico moderno. «El honor no conviene a un necio» suena más idiomático y sentencioso que «no es apropiado para un necio», preservando mejor el matiz de נָאוֶה.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Necio» para כְסִיל y «honor» para כָּבוֹד están bien elegidos. La revisión propuesta solo ajusta naturalidad y precisión semántica en español.
  issues:
  - severity: medium
    issue: «en la cosecha» es menos natural que una expresión temporal más explícita
    rationale: בַּקָּצִיר se refiere al tiempo de la cosecha/segado. «En la cosecha» puede entenderse, pero «en tiempo de cosecha» o «durante la cosecha» expresa mejor el marco temporal y suena más natural en español general.
  - severity: medium
    issue: «no es apropiado para un necio» es correcto pero menos proverbial que «no conviene a un necio»
    rationale: נָאוֶה denota lo que conviene, es propio o decoroso. En español sapiencial, «no conviene» comunica de forma más compacta y elegante la impropiedad del honor dado a un necio, además de coincidir con la alternativa documentada en la auditoría inglesa.
  revised_spanish_text: Como nieve en verano y como lluvia en tiempo de cosecha[a], así el honor no conviene a un necio.
