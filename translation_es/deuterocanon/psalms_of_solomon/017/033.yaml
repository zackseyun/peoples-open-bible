translation:
  language: es
  text: Y purificará a Jerusalén en santidad[a], como era desde el principio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «limpiará a Jerusalén».
    reason: lexical_alternative
  - marker: b
    text: La frase griega «como también lo de desde el principio» es elíptica; en español se expresa como «como era desde el principio» para aclarar la comparación sin añadir contenido nuevo.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθαριεῖ
  english_pob_choice: will purify
  chosen_spanish: purificará
  alternatives_spanish:
  - limpiará
  - hará limpio
  lexicon: BDAG
  rationale: El verbo expresa la idea de hacer puro o limpio. En español, «purificará» conserva mejor el matiz religioso y cultual que el más general «limpiará».
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: nombre propio convencional
  rationale: Se mantiene el nombre propio en la forma usual del español bíblico.
- source_word: ἐν ἁγιασμῷ
  english_pob_choice: in holiness
  chosen_spanish: en santidad
  alternatives_spanish:
  - en consagración
  - en santificación
  - por santificación
  lexicon: BDAG
  rationale: «ἁγιασμῷ» puede expresar santidad, consagración o santificación. «En santidad» preserva la construcción preposicional y deja abierta la relación exacta de esfera o modo, como hace el inglés auditado.
- source_word: ὡς καὶ τὸ ἀπ’ ἀρχῆς
  english_pob_choice: as it was from the beginning
  chosen_spanish: como también [fue] desde el principio
  alternatives_spanish:
  - como también desde el principio
  - como al principio
  - así como desde el principio
  lexicon: LSJ
  rationale: El griego es elíptico; «[fue]» se añade solo para dar claridad en español sin introducir contenido nuevo. «Desde el principio» reproduce la referencia temporal del original.
theological_decisions:
- issue: Sentido de ἁγιασμός en relación con Jerusalén
  english_pob_reading: in holiness
  chosen_spanish_reading: en santidad
  alternative_spanish_readings:
  - en consagración
  - en santificación
  rationale: No se fija una sola lectura doctrinal entre estado, acto o medio. «En santidad» permite conservar la ambigüedad productiva del griego y la cautela del inglés.
  doctrine_reference: Santificación / santidad cultual
- issue: Elipsis en la cláusula comparativa final
  english_pob_reading: as it was from the beginning
  chosen_spanish_reading: como también [fue] desde el principio
  alternative_spanish_readings:
  - como también desde el principio
  - como al principio
  rationale: La omisión del verbo en griego no debe borrarse ni sobretraducirse. La inserción entre corchetes marca que es suministrada por claridad y no forma parte explícita del texto.
  doctrine_reference: Claridad sintáctica sin expansión doctrinal
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin revisiones aplicadas; la redacción española sigue de cerca el griego y el cierre elíptico se resuelve solo con una suplencia mínima para legibilidad.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - «Jerusalén» conserva la forma estándar española del topónimo.
  - Se evita «SEÑOR» porque no corresponde a este verso.
  - La puntuación sigue el estilo español moderno con coma antes de la cláusula comparativa.
