translation:
  language: es
  text: Ahora, el resto de los hechos de Asa, y todo su poder, y todo lo que hizo, y las ciudades que edificó, ¿no están escritos[a] en el libro de las crónicas de los reyes de Judá? Sin embargo, en el tiempo de su vejez enfermó de los pies[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «registrados en el libro de los anales de los reyes de Judá».
    reason: lexical_alternative
  - marker: b
    text: O «enfermó en los pies». El hebreo especifica la parte del cuerpo afectada, sin nombrar la enfermedad exacta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, el resto de
  alternatives_spanish:
  - Y el resto de
  - En cuanto al resto de
  lexicon: HALOT
  rationale: La fórmula regia introduce un remate de resumen; «Ahora, el resto de» conserva el valor transicional del waw y suena natural en español sin perder la estructura del hebreo.
- source_word: דִּבְרֵי אָסָא
  english_pob_choice: the acts of Asa
  chosen_spanish: los hechos de Asa
  alternatives_spanish:
  - las acciones de Asa
  - los actos de Asa
  - los asuntos de Asa
  lexicon: HALOT
  rationale: En este contexto historiográfico, דִּבְרֵי no se limita a «palabras», sino a los hechos/acciones registrados. «Hechos» comunica bien la amplitud del resumen real en español.
- source_word: גְּבוּרָתוֹ
  english_pob_choice: his might
  chosen_spanish: su poder
  alternatives_spanish:
  - su fuerza
  - su valentía
  - sus hazañas
  lexicon: HALOT
  rationale: El sustantivo expresa fuerza, capacidad o poder. «Poder» preserva el sentido abstracto y permite distinguirlo de «todo lo que hizo».
- source_word: וְכָל אֲשֶׁר עָשָׂה
  english_pob_choice: all that he did
  chosen_spanish: todo lo que hizo
  alternatives_spanish:
  - todo cuanto hizo
  - todo lo que realizó
  lexicon: HALOT
  rationale: Es una correspondencia directa del relativo hebreo y conserva el alcance amplio de la cláusula.
- source_word: וְהֶעָרִים אֲשֶׁר בָּנָה
  english_pob_choice: and the cities that he built
  chosen_spanish: y las ciudades que edificó
  alternatives_spanish:
  - y las ciudades que construyó
  - y las ciudades que levantó
  lexicon: HALOT
  rationale: «Edificó» es una opción idiomática y fiel para בָּנָה. Se evita añadir la idea de fortificar, porque el hebreo dice literalmente «construyó/edificó».
- source_word: הֲלֹא הֵמָּה כְתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: ¿no están escritos
  alternatives_spanish:
  - ¿acaso no están escritos
  - ¿no se hallan escritos
  lexicon: HALOT
  rationale: La pregunta retórica se conserva. En español, «están escritos» expresa naturalmente el pasivo participial sin forzar un calco.
- source_word: עַל סֵפֶר דִּבְרֵי הַיָּמִים
  english_pob_choice: in the Book of the Chronicles
  chosen_spanish: en el libro de las crónicas
  alternatives_spanish:
  - en el libro de los anales
  - en el libro de los hechos de los días
  lexicon: HALOT
  rationale: La fórmula se refiere al registro oficial de crónicas/anales. «Libro de las crónicas» mantiene la identificación reconocible del título sin ocultar su carácter documental.
- source_word: לְמַלְכֵי יְהוּדָה
  english_pob_choice: of the Kings of Judah
  chosen_spanish: de los reyes de Judá
  alternatives_spanish:
  - para los reyes de Judá
  - de los monarcas de Judá
  lexicon: HALOT
  rationale: 'El lamed aquí marca relación posesiva o de pertenencia: el libro perteneciente a la sucesión de reyes de Judá.'
- source_word: רַק
  english_pob_choice: Yet
  chosen_spanish: Solo que
  alternatives_spanish:
  - pero
  - sin embargo
  - con todo
  lexicon: HALOT
  rationale: «Solo que» expresa bien el matiz limitativo/excepcional del hebreo, introduciendo la observación final sin excesiva dureza.
- source_word: לְעֵת זִקְנָתוֹ
  english_pob_choice: in the time of his old age
  chosen_spanish: en el tiempo de su vejez
  alternatives_spanish:
  - en su vejez
  - cuando ya era anciano
  - al tiempo de su ancianidad
  lexicon: HALOT
  rationale: Se conserva el valor temporal de la frase. «Vejez» es claro, sobrio y fiel al registro narrativo.
- source_word: חָלָה
  english_pob_choice: he became diseased
  chosen_spanish: enfermó
  alternatives_spanish:
  - se puso enfermo
  - cayó enfermo
  - se volvió enfermo
  lexicon: HALOT
  rationale: El verbo indica enfermar/volverse enfermo. En español, «enfermó» transmite el inicio del estado sin añadir más de lo que el texto dice.
- source_word: אֶת רַגְלָיו
  english_pob_choice: in his feet
  chosen_spanish: de los pies
  alternatives_spanish:
  - en los pies
  - respecto de sus pies
  - con afección en los pies
  lexicon: HALOT
  rationale: El hebreo especifica la parte del cuerpo afectada. «De los pies» comunica que la enfermedad afectó esa zona, manteniendo la sobriedad del texto.
theological_decisions:
- issue: Alcance de דִּבְרֵי אָסָא en un resumen regio
  english_pob_reading: the acts of Asa
  chosen_spanish_reading: los hechos de Asa
  alternative_spanish_readings:
  - las palabras de Asa
  - los asuntos de Asa
  rationale: No se traduce como «palabras», porque en estas fórmulas históricas דִּבְרֵי abarca lo registrado sobre su reinado. «Hechos» conserva ese sentido historiográfico sin estrecharlo indebidamente.
  doctrine_reference: Historiografía bíblica; uso formular en libros de Reyes/Crónicas
- issue: La nota final sobre la dolencia de Asa
  english_pob_reading: he became diseased in his feet
  chosen_spanish_reading: enfermó de los pies
  alternative_spanish_readings:
  - se enfermó de los pies
  - cayó enfermo en los pies
  - tuvo una enfermedad en los pies
  rationale: El hebreo menciona la parte del cuerpo, no el diagnóstico. Por eso se mantiene una redacción sobria que no identifica la enfermedad con más precisión de la que el texto ofrece.
  doctrine_reference: Fidelidad al nivel de especificidad del texto; no especulación médica
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con el audit trail inglés: se conserva la fórmula de resumen regia, la mención del libro de crónicas/anales, y la nota final sobre la dolencia de Asa sin ampliar el diagnóstico. No se documentan revisiones previas relevantes en el inglés, por lo que la propuesta española sigue directamente el sentido acordado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica en este versículo.
  - Se mantiene «reyes de Judá» como fórmula histórica estable.
  - «Hechos» y «poder» preservan la diferencia entre דִּבְרֵי y גְּבוּרָה.
  - La redacción evita términos eclesiásticos anacrónicos y conserva tono narrativo sobrio.
