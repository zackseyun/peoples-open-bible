translation:
  language: es
  text: Líbrame, oh Yahvé, del hombre malo; guárdame del hombre violento.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: חַלְּצֵנִי
  english_pob_choice: Rescue me
  chosen_spanish: Líbrame
  alternatives_spanish:
  - Rescátame
  - Delívrame
  lexicon: HALOT
  rationale: El verbo hifil de חלץ expresa sacar, librar o rescatar. En español bíblico, 'librar' comunica bien la acción urgente de ser sacado de un peligro, y evita una literalidad áspera; 'rescatarme' también es posible, pero 'líbrame' suena más natural en esta súplica poética.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino personal del Tetragrámaton con la forma establecida en el proyecto, 'Yahvé', en lugar de una sustitución por título como 'el SEÑOR'.
- source_word: מֵאָדָם רָע
  english_pob_choice: from the evil man
  chosen_spanish: del hombre malo
  alternatives_spanish:
  - del hombre perverso
  - de un hombre malo
  - de un hombre malvado
  lexicon: HALOT
  rationale: אָדָם aquí funciona como singular representativo en paralelo con el segundo miembro; 'hombre' conserva el valor masculino singular del hebreo. 'Malo' reproduce la evaluación moral directa de רָע sin añadir intensidad interpretativa excesiva.
- source_word: מֵאִישׁ חֲמָסִים
  english_pob_choice: from the violent man
  chosen_spanish: del hombre violento
  alternatives_spanish:
  - del hombre de violencia
  - del hombre violento
  - del varón violento
  lexicon: HALOT
  rationale: אִישׁ es 'hombre' y חֲמָסִים denota violencia/opresión; en español, 'hombre violento' es natural y fiel. Aunque la construcción hebrea puede sugerir 'hombre de violencia', el adjetivo español evita una formulación pesada sin perder la fuerza semántica.
- source_word: תִּנְצְרֵנִי
  english_pob_choice: guard me
  chosen_spanish: guárdame
  alternatives_spanish:
  - cuídame
  - presérvame
  - protégeme
  lexicon: HALOT
  rationale: נצר significa guardar, vigilar, preservar. 'Guárdame' mantiene la segunda petición distinta de 'líbrame' y conserva el matiz de protección continua.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El versículo usa directamente el Tetragrámaton; por coherencia doctrinal y auditabilidad, se traslada al español con la transliteración tradicional del proyecto 'Yahvé', no con una sustitución reverencial por título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de los sustantivos singulares masculinos אָדָם e אִישׁ
  english_pob_reading: the evil man / the violent man
  chosen_spanish_reading: el hombre malo / el hombre violento
  alternative_spanish_readings:
  - la persona malvada / la persona violenta
  - el ser humano malo / el ser humano violento
  rationale: La poesía hebrea presenta dos miembros paralelos con sustantivos masculinos singulares que describen a un agresor concreto o representativo. Mantener 'hombre' preserva el paralelismo y la precisión de género/numero del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo con apoyo del audit trail en inglés: se conserva el paralelismo de dos peticiones breves (''líbrame'' / ''guárdame''), el nombre divino se translitera como ''Yahvé'', y la segunda cláusula se vierte de forma natural en español como ''hombre violento'' sin perder la intensidad del hebreo.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se usa 'hombre' para los singulares masculinos del hebreo, en concordancia con la política de exactitud de género.
  - Se eligieron verbos imperativos breves y paralelos para reflejar la urgencia poética del verso.
  - La nota alternativa conserva la posibilidad de 'delíbreme' para registrar la variación léxica sin reemplazar la opción principal.
