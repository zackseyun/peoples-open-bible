translation:
  language: es
  text: 'Y los hijos de Shecanías: Semaías. Y los hijos de Semaías: Hatús[a], Igal, Baríah, Nearías y Shafat: seis.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto hebreo dice «seis», aunque aquí solo aparecen cinco nombres en el Texto Masorético. Esto puede reflejar un problema textual o un nombre omitido en la transmisión.
    reason: textual_variant
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los descendientes de
  - Ahora bien, los hijos de
  lexicon: HALOT
  rationale: En fórmulas genealógicas, בְּנֵי suele marcar filiación directa y lista de nombres. "Hijos de" conserva la estructura del hebreo con naturalidad en español y mantiene el valor genealógico más concreto que "descendientes".
- source_word: שְׁכַנְיָה
  english_pob_choice: Shecaniah
  chosen_spanish: Shecanías
  alternatives_spanish:
  - Shecaniah
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se adapta a la ortografía española con acentuación natural en la sílaba tónica final llana esdrújula aparente? Aquí se prefiere "Shecanías" para mayor legibilidad en español, sin alterar el referente.
- source_word: שְׁמַעְיָה
  english_pob_choice: Shemaiah
  chosen_spanish: Shemaías
  alternatives_spanish:
  - Shemaiah
  lexicon: HALOT
  rationale: Nombre propio transliterado. La forma con acento gráfico respeta la pronunciación española y evita una lectura errónea.
- source_word: חַטּוּשׁ
  english_pob_choice: Hattush
  chosen_spanish: Hatús
  alternatives_spanish:
  - Hattush
  lexicon: HALOT
  rationale: Nombre propio transliterado; se ajusta a la ortografía española para facilitar lectura, manteniendo el nombre bíblico identificable.
- source_word: יִגְאָל
  english_pob_choice: Igal
  chosen_spanish: Igal
  alternatives_spanish:
  - Yigal
  - Jigal
  lexicon: HALOT
  rationale: Nombre propio. La forma breve y conocida "Igal" se conserva por ser reconocible y porque el hebreo permite esa transliteración convencional.
- source_word: בָרִיחַ
  english_pob_choice: Bariah
  chosen_spanish: Barías
  alternatives_spanish:
  - Baria
  - Bariah
  lexicon: HALOT
  rationale: El texto consonántico de este versículo se corresponde mejor con una transliteración del tipo "Bariah"; en español se vierte como "Barías" para lecturabilidad. Se evita importar la forma más familiar "Beria" porque no coincide con el texto masorético aquí.
- source_word: נְעַרְיָה
  english_pob_choice: Neariah
  chosen_spanish: Nearías
  alternatives_spanish:
  - Neariah
  lexicon: HALOT
  rationale: Nombre propio transliterado, adaptado al español con acento gráfico para lectura clara.
- source_word: שָׁפָט
  english_pob_choice: Shaphat
  chosen_spanish: Safat
  alternatives_spanish:
  - Shafat
  - Shaphat
  lexicon: HALOT
  rationale: Nombre propio. Se emplea la forma española más fluida "Safat", conservando la identificación del nombre y evitando un exceso de aspereza gráfica.
- source_word: שִׁשָּׁה
  english_pob_choice: six
  chosen_spanish: seis
  alternatives_spanish:
  - seis
  lexicon: HALOT
  rationale: Numeral cardinal directo. Debe conservarse en español, incluso aunque el texto masorético liste solo cinco nombres; la traducción no armoniza en silencio.
theological_decisions:
- issue: Discrepancia entre el número declarado y la lista de nombres
  english_pob_reading: The Hebrew text says 'six,' though only five names are listed here in the Masoretic Text. This may reflect a textual issue or an omitted name in transmission.
  chosen_spanish_reading: Se conserva "seis" en el texto y se señala en nota que hay solo cinco nombres listados en el Texto Masorético.
  alternative_spanish_readings:
  - armonizar implícitamente a "cinco"
  - omitir la nota textual
  rationale: La fidelidad al testimonio recibido exige mantener el numeral del hebreo, aunque produzca una tensión textual visible. La nota preserva la transparencia editorial y evita una armonización no atestiguada.
  doctrine_reference: Crítica textual y transparencia del texto bíblico
translation_notes:
  revision_awareness: Se sigue el sentido del WLC y la auditoría inglesa POB sin armonizar la discrepancia numérica. Se adoptó una transliteración española más legible para nombres propios, manteniendo identificabilidad bíblica y transparencia textual.
  spanish_consistency_notes:
  - Se usa "hijos de" para la fórmula genealógica de בְּנֵי.
  - Se mantiene el numeral "seis" y se marca con nota la tensión textual.
  - Los nombres propios se transliteran de forma consistente al español, con acentuación gráfica cuando ayuda a la lectura.
  - Se evita traducir nombres como si fueran vocablos comunes y no se importan formas de otros pasajes que no corresponden al texto masorético presente.
