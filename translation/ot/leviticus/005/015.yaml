id: LEV.5.15
reference: Leviticus 5:15
source:
  edition: WLC
  text: נֶ֚פֶשׁ כִּֽי תִמְעֹ֣ל מַ֔עַל וְ/חָֽטְאָה֙ בִּ/שְׁגָגָ֔ה מִ/קָּדְשֵׁ֖י יְהוָ֑ה וְ/הֵבִיא֩ אֶת אֲשָׁמ֨/וֹ לַֽ/יהוָ֜ה אַ֧יִל תָּמִ֣ים מִן הַ/צֹּ֗אן בְּ/עֶרְכְּ/ךָ֛ כֶּֽסֶף שְׁקָלִ֥ים בְּ/שֶֽׁקֶל הַ/קֹּ֖דֶשׁ לְ/אָשָֽׁם־־־־־׃
translation:
  text: 'If a person acts unfaithfully and sins unintentionally in regard to the holy things of Yahweh[a], he shall bring his compensation offering to Yahweh: an unblemished ram from the flock, according to your valuation in silver shekels, by the sanctuary shekel[b], for a guilt offering.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'guilt offering' or 'reparation offering' for both occurrences of 'compensation offering.' The Hebrew term אָשָׁם can denote both the offense's liability and the sacrifice that makes restitution.
    reason: lexical_alternative
  - marker: b
    text: The 'sanctuary shekel' refers to the standard weight used for sacred valuations.
    reason: cultural_note
lexical_decisions:
- source_word: נֶפֶשׁ
  chosen: a person
  alternatives:
  - anyone
  - a soul
  lexicon: HALOT
  rationale: Though literally 'soul,' in legal material נֶפֶשׁ commonly refers to an individual person. 'A person' is natural modern English and preserves the singular legal force.
- source_word: תִמְעֹל מַעַל
  chosen: acts unfaithfully
  alternatives:
  - commits a breach of faith
  - deals treacherously
  lexicon: HALOT
  rationale: The verb-noun combination intensifies the idea of faithless violation, especially of sacred obligation. 'Acts unfaithfully' is clear modern English; 'breach of faith' is a strong alternative but slightly less idiomatic in the flow of the sentence.
- source_word: וְחָטְאָה בִשְׁגָגָה
  chosen: and sins unintentionally
  alternatives:
  - and sins by mistake
  - and sins inadvertently
  lexicon: HALOT
  rationale: בִשְׁגָגָה denotes inadvertence or unintentional error, not high-handed rebellion. 'Unintentionally' is precise and readable.
- source_word: מִקָּדְשֵׁי יְהוָה
  lemma: מִן
  chosen: in regard to the holy things of the LORD
  alternatives:
  - against the holy things of the LORD
  - from the holy things of the LORD
  lexicon: HALOT
  rationale: The preposition מִן here marks the sphere/object affected by the offense involving sacred property or dues. 'In regard to' communicates the relation without overcommitting to a narrower English preposition. 'Holy things' preserves the cultic sense of consecrated items or offerings.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשָׁמוֹ
  chosen: his compensation offering
  alternatives:
  - his guilt offering
  - his reparation offering
  lexicon: HALOT
  rationale: אָשָׁם can denote both guilt and the offering/remedy associated with it. In sacrificial legislation, 'compensation offering' foregrounds the reparative dimension present in this context of sacred loss, while remaining understandable. Traditional 'guilt offering' is preserved as an alternative.
- source_word: אַיִל תָּמִים
  chosen: an unblemished ram
  alternatives:
  - a ram without defect
  - a perfect ram
  lexicon: HALOT
  rationale: תָּמִים in sacrificial contexts means free from defect. 'Unblemished' is standard, clear cultic English.
- source_word: מִן הַצֹּאן
  chosen: from the flock
  alternatives:
  - from the sheep or goats
  - out of the flock
  lexicon: HALOT
  rationale: צֹאן is the collective term for small livestock, especially sheep/goats. Since אַיִל already specifies a ram, 'from the flock' is sufficient and idiomatic.
- source_word: בְּעֶרְכְּךָ
  chosen: according to your valuation
  alternatives:
  - by your valuation
  - at your assessed value
  lexicon: HALOT
  rationale: The phrase refers to priestly assessment of the animal's value. 'According to your valuation' preserves the second-person singular address to Moses/Aaronic authority in the legal formula while reading naturally.
- source_word: כֶּסֶף שְׁקָלִים
  chosen: in silver shekels
  alternatives:
  - worth silver shekels
  - at the value of silver shekels
  lexicon: HALOT
  rationale: This expresses the monetary valuation in silver shekels. 'In silver shekels' is concise and clear.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: by the sanctuary shekel
  alternatives:
  - according to the holy shekel
  - by the shekel of the sanctuary
  lexicon: HALOT
  rationale: This specifies the standard cultic weight. 'Sanctuary shekel' is the most natural English equivalent.
- source_word: לְאָשָׁם
  chosen: for a compensation offering
  alternatives:
  - for a guilt offering
  - as a reparation offering
  lexicon: HALOT
  rationale: The closing phrase names the sacrifice category. For consistency within the verse, the same rendering as אֲשָׁמוֹ is used. The reparative nuance is especially prominent in this law.
