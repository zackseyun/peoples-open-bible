  rationale: Se conserva el texto principal casi intacto porque es fiel y legible. La reparación necesaria consiste en reubicar la nota al segmento correcto (‘todas las cosas’) y reformularla para reflejar con precisión la alternativa y la explicación contextual documentadas en la auditoría inglesa, sin crear una ambigüedad nueva en español.
