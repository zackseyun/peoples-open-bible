revisions:
- from: Y las ciudades que los filisteos habían tomado de Israel fueron restauradas a Israel, desde Ecrón hasta Gat; e Israel libró su territorio de mano de los filisteos. Y hubo paz entre Israel y los amorreos[a].
  to: Y las ciudades que los filisteos habían tomado de Israel fueron devueltas a Israel, desde Ecrón hasta Gat; e Israel libró su territorio de la mano de los filisteos. Y hubo paz entre Israel y los amorreos[a].
  rationale: Se reemplaza 'fueron restauradas' por 'fueron devueltas' para un español más natural y preciso en contexto de restitución territorial, y se corrige 'de mano de' a 'de la mano de' para preservar el modismo de manera idiomática. La nota sobre 'amorreos/cananeos' se mantiene sin cambios sustanciales.
