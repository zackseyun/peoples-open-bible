translation:
  language: es
  text: Y mira que los hagas conforme a su modelo[a], el cual te fue mostrado en el monte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mira, y hazlos según su modelo, el cual te fue mostrado en el monte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּרְאֵה
  english_pob_choice: And see
  chosen_spanish: Y mira
  alternatives_spanish:
  - Mira
  - Y ve
  lexicon: HALOT
  rationale: El imperativo de ראה aquí funciona como una llamada enfática a prestar atención. «Mira» comunica de forma natural esa advertencia; se conserva la coordinación inicial con «Y» para reflejar la partícula hebrea.
- source_word: וַעֲשֵׂה
  english_pob_choice: that you make
  chosen_spanish: hazlo
  alternatives_spanish:
  - haz
  - y haz
  - haz eso
  lexicon: HALOT
  rationale: En el contexto de fabricar objetos cultuales, עשה significa «hacer» en el sentido de producir o construir. En español, «hazlo» une la exhortación con el objeto implícito y evita una subordinación pesada, manteniendo la fuerza imperativa.
- source_word: בְּתַבְנִיתָם
  english_pob_choice: according to their pattern
  chosen_spanish: conforme a su modelo
  alternatives_spanish:
  - según su patrón
  - de acuerdo con su forma
  - tras su modelo
  lexicon: HALOT
  rationale: תבנית denota un patrón, modelo o forma. «Modelo» es claro en español y conserva la idea de conformidad con una referencia mostrada; «conforme a» expresa bien la norma de correspondencia sin introducir interpretación extra.
- source_word: מָרְאֶה
  english_pob_choice: was shown to you
  chosen_spanish: te fue mostrado
  alternatives_spanish:
  - te fue enseñado
  - te fue exhibido
  - te fue revelado
  lexicon: HALOT
  rationale: La forma se entiende mejor como un participio pasivo de ראה, con sentido de «ser mostrado». «Te fue mostrado» refleja esa pasividad y el carácter ya dado de la visión en el contexto de Moisés en el monte.
- source_word: בָּהָר
  english_pob_choice: on the mountain
  chosen_spanish: en el monte
  alternatives_spanish:
  - sobre el monte
  - en la montaña
  lexicon: HALOT
  rationale: La referencia es al monte Sinaí/Horeb. «En el monte» es una formulación bíblica natural en español y comunica la localización sin sobrecargar el texto.
theological_decisions:
- issue: Naturaleza del modelo revelado para los objetos del tabernáculo
  english_pob_reading: pattern
  chosen_spanish_reading: modelo
  alternative_spanish_readings:
  - patrón
  - forma
  - copia
  rationale: El hebreo תבנית puede referirse a un modelo o patrón mostrado por Dios. «Modelo» preserva la apertura teológica sin obligar a resolver si se trata de un arquetipo celestial, una maqueta o una forma normativa.
  doctrine_reference: Conservar la tensión teológica del texto sin explicarla de más.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió la idea de una presentación en curso a una formulación pasada («was shown»). La redacción española sigue esa orientación con «te fue mostrado», manteniendo el valor pasivo del hebreo y la naturalidad formal en español.
  spanish_consistency_notes:
  - Se mantiene «monte» en lugar de «montaña» para conservar el registro bíblico y la coherencia con usos tradicionales cuando son idiomáticos en español.
  - Se evitó «SEÑOR» o sustituciones teológicas no requeridas, porque aquí no aparece el Tetragrámaton ni un caso de κύριος que exija comentario.
  - «Modelo» se usa de manera consistente con la decisión inglesa de «pattern», sin cerrar indebidamente la ambigüedad del término hebreo.
