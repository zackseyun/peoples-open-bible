revisions:
- from: Porque mejor es que tus hijos te pidan[a] que tú mirar a las manos de tus hijos[b].
  to: Porque es mejor que tus hijos te supliquen[a] que tú mires a las manos de tus hijos varones[b].
  rationale: Se corrige la sintaxis española, se fortalece δεηθῆναί con «te supliquen» manteniendo la alternativa menos intensa en nota, y se restituye la distinción entre τέκνα y υἱῶν mediante «hijos» frente a «hijos varones». Se conserva la imagen concreta de «las manos», tal como pide el rastro léxico del POB.
