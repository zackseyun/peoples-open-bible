translation:
  language: es
  text: Un hombre no se afirma por la maldad[a], pero la raíz de los justos[b] no será conmovida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Una persona no se afirma por la maldad». אָדָם puede significar «hombre» o, según el contexto, «ser humano» en general.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no será movida», «no será sacudida» o «no vacilará». La imagen es la de una firme estabilidad perdurable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִכּוֹן
  english_pob_choice: is established
  chosen_spanish: se afirma
  alternatives_spanish:
  - es establecido
  - se establece
  - permanece firme
  lexicon: HALOT
  rationale: El nifal de כון expresa ser asentado, hecho firme o establecido. En español, «se afirma» comunica estabilidad resultante y funciona bien en un proverbio sin sonar forzado; mantiene la idea de firmeza sin volverla meramente futura.
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - el ser humano
  - uno
  lexicon: HALOT
  rationale: אָדָם aquí funciona como singular genérico proverbial. «Un hombre» conserva la forma singular concreta del hebreo y sigue la pauta de precisión de género del texto fuente, sin impedir el sentido general.
- source_word: בְּרֶשַׁע
  english_pob_choice: by wickedness
  chosen_spanish: por la maldad
  alternatives_spanish:
  - por medio de la maldad
  - en la maldad
  - mediante la maldad
  lexicon: HALOT
  rationale: 'La preposición ב aquí es instrumental: la maldad no es el medio por el cual alguien queda firmemente establecido. «Por la maldad» expresa esa relación causal/instrumental de forma natural en español.'
- source_word: שֹׁרֶשׁ
  english_pob_choice: the root
  chosen_spanish: la raíz
  alternatives_spanish:
  - el raíz
  - el sistema de raíces
  - el enraizamiento
  lexicon: HALOT
  rationale: La imagen concreta de «raíz» debe conservarse para mantener el contraste poético entre estabilidad y derribo. En español, «la raíz» es la forma natural y transparente.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - las personas justas
  - los rectos de corazón
  lexicon: HALOT
  rationale: El plural adjetival substantivado se expresa de manera idiomática con «los justos», que preserva la categoría colectiva y la resonancia ética/jurídica del término.
- source_word: יִמּוֹט
  english_pob_choice: will not be moved
  chosen_spanish: no será removida
  alternatives_spanish:
  - no será movida
  - no vacilará
  - no será sacudida
  lexicon: HALOT
  rationale: מוט puede significar ser movido, sacudido o tambalear. «No será removida» mantiene la imagen de estabilidad firme y permite que la metáfora funcione con naturalidad en español.
theological_decisions:
- issue: Singular genérico antropológico en un proverbio
  english_pob_reading: A man is not established by wickedness.
  chosen_spanish_reading: Un hombre no se afirma por la maldad.
  alternative_spanish_readings:
  - Una persona no se afirma por la maldad.
  - El ser humano no se afirma por la maldad.
  rationale: El hebreo אָדָם aquí tiene valor genérico, pero en forma singular concreta. «Un hombre» refleja mejor esa construcción que una abstracción más neutral, sin perder la aplicación universal del proverbio.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested terms table for אָדָם'
- issue: Imagen de estabilidad frente a inestabilidad
  english_pob_reading: the root of the righteous will not be moved.
  chosen_spanish_reading: la raíz de los justos no será removida.
  alternative_spanish_readings:
  - la raíz de los justos no será movida.
  - la raíz de los justos no vacilará.
  - la raíz de los justos no será sacudida.
  rationale: El verso contrapone la supuesta estabilidad lograda por la maldad con la estabilidad real de los justos. «No será removida» conserva la fuerza pasiva del hebreo y la imagen de una raíz que permanece firme.
  doctrine_reference: HALOT; poética sapiencial hebrea
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo y no muestran revisiones aplicadas; esta propuesta sigue esa lectura estable, conservando la antítesis proverbial entre la falsa firmeza obtenida por la maldad y la permanencia de la raíz de los justos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente contextual.
  - Se conserva el plural substantivado «los justos» para צַדִּיקִים, coherente con la terminología del proyecto.
  - Se evita una paráfrasis abstracta como «humanidad» para no diluir el singular genérico de אָדָם.
  - «Removida» sigue una opción de estabilidad pasiva; si en contexto editorial se prefiriera mayor cercanía al metalenguaje de מוט, podría revisarse a «sacudida» sin cambiar el sentido básico.
