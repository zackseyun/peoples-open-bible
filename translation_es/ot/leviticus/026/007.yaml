- from: Perseguirán a sus enemigos[a], y caerán delante de ustedes a espada.
  to: Ustedes perseguirán a sus enemigos[a], y caerán delante de ustedes a espada.
  rationale: Se corrige la persona verbal para reflejar fielmente el hebreo de segunda persona plural y se ajusta la nota para ofrecer una alternativa española más natural, manteniendo la misma decisión léxica básica del POB inglés.
