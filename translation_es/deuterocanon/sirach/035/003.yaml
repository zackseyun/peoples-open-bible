translation:
  language: es
  text: Como fuiste santificado ante nuestra vista por ellos,[a] así sé glorificado en nosotros delante de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio hebreo principal suministrado para este registro parece desajustado respecto de este versículo; la auditoría inglesa reconoce esa incertidumbre textual. La redacción española sigue la lectura revisada documentada en la POB inglesa para este registro, no el antiguo borrador griego paralelo.
    reason: textual_variant
lexical_decisions:
- source_word: Λάλησον
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Habla tú
  lexicon: BDAG
  rationale: Imperativo directo de hablar. "Habla" es natural en español y conserva la forma exhortativa sin volverla demasiado rígida.
- source_word: πρεσβύτερε
  english_pob_choice: elder
  chosen_spanish: anciano
  alternatives_spanish:
  - viejo
  - mayor
  - presbítero
  lexicon: BDAG
  rationale: El vocativo apunta a un hombre de edad o rango social superior. "Anciano" preserva dignidad y edad sin introducir un cargo eclesiástico que el griego aquí no exige.
- source_word: πρέπει
  english_pob_choice: it is fitting
  chosen_spanish: te conviene
  alternatives_spanish:
  - es apropiado para ti
  - es fitting
  lexicon: BDAG
  rationale: La noción es de conveniencia/procedencia. En español, "te conviene" expresa bien esa adecuación personal y mantiene el tono exhortativo.
- source_word: ἐν ἀκριβεῖ ἐπιστήμῃ
  english_pob_choice: with accurate knowledge
  chosen_spanish: con conocimiento exacto
  alternatives_spanish:
  - con conocimiento preciso
  - con exacto saber
  - con comprensión exacta
  lexicon: BDAG
  rationale: La frase une precisión y conocimiento competente. "Con conocimiento exacto" conserva la fuerza de precisión del griego sin sonar forzado.
- source_word: μὴ ἐμποδίσῃς
  english_pob_choice: do not hinder
  chosen_spanish: no estorbes
  alternatives_spanish:
  - no impidas
  - no obstaculices
  - no interrumpas
  lexicon: BDAG
  rationale: El verbo puede ser impedir u obstruir. Aquí, por el contexto musical, "no estorbes" comunica bien la idea de no poner trabas al desarrollo de la música o la ejecución.
- source_word: μουσικά
  english_pob_choice: the music / the musical performance
  chosen_spanish: la música
  alternatives_spanish:
  - la ejecución musical
  - el acto musical
  - la presentación musical
  lexicon: LSJ
  rationale: El neutro plural griego puede abarcar asuntos o ejecución musicales. "La música" es la opción más breve y natural; la nota conserva la alternativa de "la ejecución musical" para evitar reducir el alcance del término.
theological_decisions:
- issue: 'Base textual: Greek parallel versus Hebrew witness mismatch'
  english_pob_reading: The English POB acknowledged that the supplied Hebrew witness appears mismatched and used the Greek parallel as the main translation input.
  chosen_spanish_reading: Se sigue el sentido del griego paralelo, reconociendo en nota la discrepancia del testimonio hebreo suministrado.
  alternative_spanish_readings:
  - Traducir el hebreo tal como está transmitido sin nota
  - Intentar armonizar forzadamente ambos testigos
  rationale: El paquete de fuente y la revisión indican un desajuste menor en el hebreo. Para un draft auditable, conviene mantener la traducción alineada con el griego paralelo y señalar la incertidumbre textual.
  doctrine_reference: Textual criticism / source integrity
- issue: Scope of μουσικά
  english_pob_reading: Or 'do not interrupt the musical performance.' The Greek term can refer more broadly to musical proceedings, not only to music in the abstract.
  chosen_spanish_reading: '"La música" en el texto principal, con nota sobre la posible lectura de "la ejecución musical" o "la presentación musical".'
  alternative_spanish_readings:
  - la ejecución musical
  - la presentación musical
  - los asuntos musicales
  rationale: El español "música" puede sonar abstracto; la nota preserva el matiz práctico de actuación o desarrollo musical que el griego permite. Así no se pierde la alternativa documentada por la POB inglesa.
  doctrine_reference: Lexical semantics / translation transparency
translation_notes:
  revision_awareness: La revisión aplicada reemplazó un borrador ajeno que seguía el griego de la consigna previa por una traducción alineada con el hebreo/griego del expediente. Dado que el paquete final conserva una discrepancia menor entre testigos, esta versión española sigue el griego paralelo y explicita la incertidumbre textual en nota.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como default del proyecto solo cuando aparezca el nombre divino; este versículo no lo requiere.
  - '"Anciano" evita introducir el cargo eclesiástico "presbítero" sin base contextual suficiente.'
  - '"No estorbes" conserva un registro natural y el sentido de impedir/obstruir sin endurecer innecesariamente el mandato.'
  - Las notas usan marcadores únicos y anclados en el texto principal conforme a la disciplina del proyecto.
