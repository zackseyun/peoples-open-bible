revisions:
- from: Así Yahvé[a] los vendió en manos de Jabín, rey de Canaán, que reinaba en Hazor; y Sísara[b], comandante de su ejército, vivía en Haróset-hagoyim.
  to: Así Yahvé[a] los vendió en mano de Jabín, rey de Canaán, que reinaba en Hazor; y el comandante de su ejército era Sísara, que vivía en Haróset-hagoyim[b].
  rationale: Se corrige el anclaje de la nota cultural para que recaiga sobre el topónimo pertinente, se ajusta el modismo a «en mano de» para mejor fidelidad e idiomaticidad bíblica, y se reordena levemente la cláusula sobre Sísara para alinearla más de cerca con la sintaxis y énfasis del hebreo sin cambiar el sentido.
