translation:
  language: es
  text: Una tercera parte la quemarás en el fuego, en medio de la ciudad[a], cuando se cumplan los días del sitio; tomarás otra tercera parte y la golpearás con la espada alrededor de la ciudad, y la otra tercera parte la dispersarás al viento[b]; y sacaré una espada tras ellos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando se hayan cumplido los días del sitio».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a los vientos»; el hebreo tiene el singular «viento».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «desenvainaré una espada tras ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלִשִׁית / הַשְּׁלִשִׁית
  english_pob_choice: a third
  chosen_spanish: una tercera parte
  alternatives_spanish:
  - un tercio
  - una tercera porción
  lexicon: HALOT
  rationale: El término hebreo nombra una porción de un conjunto dividido en tres. En español, 'una tercera parte' comunica con claridad la partición sin sonar técnico o aritmético en exceso. Mantiene el paralelismo repetido del versículo.
- source_word: בָּא֤וּר
  english_pob_choice: in the fire
  chosen_spanish: en el fuego
  alternatives_spanish:
  - con fuego
  - en fuego
  lexicon: HALOT
  rationale: La preposición con el sustantivo expresa ubicación/instrumento. 'En el fuego' es el giro natural y fiel para la acción de quemar, sin introducir una paráfrasis.
- source_word: תַּבְעִיר
  english_pob_choice: you shall burn
  chosen_spanish: la quemarás
  alternatives_spanish:
  - la harás arder
  - la consumirás por fuego
  lexicon: HALOT
  rationale: El hiphil de בער implica causar que algo arda. 'Quemarás' es la equivalencia más directa y natural en español, conservando el mandato profético.
- source_word: בְּתוֹךְ הָעִיר
  english_pob_choice: in the midst of the city
  chosen_spanish: en medio de la ciudad
  alternatives_spanish:
  - dentro de la ciudad
  - en el centro de la ciudad
  lexicon: HALOT
  rationale: '''En medio de la ciudad'' conserva la imagen vívida del acto simbólico. Es más cercano al hebreo que ''dentro de la ciudad'' y suena natural en español bíblico contemporáneo.'
- source_word: כִּמְלֹאת יְמֵי הַמָּצוֹר
  english_pob_choice: when the days of the siege are completed
  chosen_spanish: cuando se cumplan los días del sitio
  alternatives_spanish:
  - cuando se hayan cumplido los días del sitio
  - al completarse los días del sitio
  lexicon: HALOT
  rationale: La construcción temporal expresa la culminación del período establecido. 'Cuando se cumplan' reproduce bien el valor circunstancial y es idiomático en español.
- source_word: הַמָּצוֹר
  english_pob_choice: the siege
  chosen_spanish: el sitio
  alternatives_spanish:
  - el asedio
  - la situación de sitio
  lexicon: HALOT
  rationale: En español actual, 'sitio' comunica bien el contexto militar del pasaje y es perfectamente comprensible. 'Asedio' también sería posible, pero 'sitio' armoniza con el registro bíblico y la brevedad del hebreo.
- source_word: תַּכֶּה
  english_pob_choice: strike
  chosen_spanish: la golpearás
  alternatives_spanish:
  - la herirás
  - la atacarás
  lexicon: HALOT
  rationale: El verbo indica un golpe violento con arma. 'Golpearás' preserva la fuerza física del acto y evita suavizar indebidamente la escena.
- source_word: בַחֶרֶב
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  - mediante la espada
  lexicon: HALOT
  rationale: El hebreo usa instrumento de ataque. 'Con la espada' es la manera natural de expresar el medio en español y mantiene la imagen concreta del juicio.
- source_word: סְבִיבוֹתֶיהָ
  english_pob_choice: all around the city
  chosen_spanish: alrededor de la ciudad
  alternatives_spanish:
  - en torno a la ciudad
  - por todos lados de la ciudad
  lexicon: HALOT
  rationale: La terminación femenina remite a la ciudad. 'Alrededor de la ciudad' refleja claramente la cobertura total del golpe y sigue la revisión del POB inglés que precisó este referente.
- source_word: תִּזְרֶה לָרוּחַ
  english_pob_choice: you shall scatter to the wind
  chosen_spanish: la dispersarás al viento
  alternatives_spanish:
  - la esparcirás al viento
  - la dispersarás a los vientos
  lexicon: HALOT
  rationale: זרה puede significar dispersar o aventar. 'Dispersarás al viento' preserva la imagen del esparcimiento y mantiene el singular hebreo 'viento', evitando uniformar indebidamente a plural.
- source_word: וְחֶרֶב אָרִיק אַחֲרֵיהֶם
  english_pob_choice: and I will draw out a sword after them
  chosen_spanish: y sacaré la espada tras ellos
  alternatives_spanish:
  - y desenvainaré una espada tras ellos
  - y sacaré una espada tras ellos
  lexicon: HALOT
  rationale: El hebreo pasa a primera persona singular, señalando acción directa divina. 'Sacaré la espada' conserva la idea idiomática de desenvainar/preparar para juicio, sin perder el sujeto explícito ni suavizar la amenaza.
theological_decisions:
- issue: El cambio a primera persona en la cláusula final
  english_pob_reading: 'Retain the first-person divine speech: ''I will draw out a sword after them.'''
  chosen_spanish_reading: y sacaré la espada tras ellos
  alternative_spanish_readings:
  - y desenvainaré una espada tras ellos
  - y una espada los perseguirá
  rationale: Mantener la primera persona es importante porque el hebreo marca que el juicio sigue siendo acción de Yahvé, no solo resultado impersonal de guerra. La traducción conserva ese giro teológico y la continuidad del discurso divino.
  doctrine_reference: Soberanía judicial de Yahvé en el signo profético
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que precisó 'all around the city' para el referente femenino de 'the city'. Por eso la versión española explicita 'alrededor de la ciudad'. También se mantuvo el cierre en primera persona divina para reflejar la decisión teológica destacada en el auditoría inglesa.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' implícito en la teología del pasaje sin añadirlo donde el hebreo usa solo la primera persona divina.
  - '''Sitio'' se eligió como equivalente natural de הַמָּצוֹר, coherente con el registro bíblico en español.'
  - Se mantiene la triple estructura repetida ('una tercera parte... otra tercera parte... la otra tercera parte') para respetar el diseño del signo profético.
  - '''Espada'' se usa en todo el versículo para uniformidad terminológica y claridad pública.'
