translation:
  language: es
  text: Pero, ¿acaso en verdad habitará Dios con el hombre sobre la tierra? He aquí[a], los cielos y el cielo más alto no te pueden contener, mucho menos esta casa que he construido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con la humanidad» o «con los seres humanos»; el hebreo usa אָדָם en un sentido representativo para los seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֻמְנָם
  english_pob_choice: indeed
  chosen_spanish: en verdad
  alternatives_spanish:
  - de veras
  - realmente
  lexicon: HALOT
  rationale: La pregunta retórica expresa asombro e incredulidad; «en verdad» conserva el tono solemne mejor que opciones más coloquiales.
- source_word: יֵשֵׁב
  english_pob_choice: dwell
  chosen_spanish: habitará
  alternatives_spanish:
  - residirá
  - morará
  lexicon: HALOT
  rationale: En este contexto de la presencia divina entre los seres humanos, «habitará» comunica mejor la idea de presencia permanente que el sentido literal de «sentarse».
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: HALOT
  rationale: Aquí el referente es singular y se trata del Dios de Israel; «Dios» es la equivalencia natural y fiel en español.
- source_word: אֶת הָאָדָם
  english_pob_choice: with man
  chosen_spanish: con el hombre
  alternatives_spanish:
  - con la humanidad
  - con los seres humanos
  lexicon: HALOT
  rationale: Se conserva el singular representativo de אָדָם, como en el audit trail inglés. «Hombre» mantiene la fuerza léxica de la forma masculina genérica, con el sentido inclusivo implícito en el contexto.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la superficie de la tierra
  lexicon: HALOT
  rationale: «Sobre la tierra» reproduce de forma natural la localización del hebreo sin sobrecargar la frase.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Observa
  lexicon: HALOT
  rationale: «He aquí» conserva la fuerza deíctica y el registro elevado del original, en paralelo con «Behold» en el texto inglés.
- source_word: שָׁמַיִם וּשְׁמֵי הַשָּׁמַיִם
  english_pob_choice: heaven and the highest heaven
  chosen_spanish: los cielos y los cielos de los cielos
  alternatives_spanish:
  - el cielo y el cielo de los cielos
  - los cielos y el cielo de los cielos
  lexicon: HALOT
  rationale: Se preserva la expresión superlativa hebrea de manera transparente. Aunque «el más alto cielo» sería más interpretativo, la forma «los cielos de los cielos» mantiene el eco idiomático de la fuente.
- source_word: לֹא יְכַלְכְּלוּךָ
  english_pob_choice: cannot contain you
  chosen_spanish: no te pueden contener
  alternatives_spanish:
  - no te pueden abarcar
  - no pueden contenerte
  lexicon: HALOT
  rationale: «Contener» reproduce la capacidad espacial del verbo. Se usa la enclisis analítica «te pueden contener» por fluidez contemporánea, sin perder el sentido de incapacidad para abarcar a Dios.
- source_word: אַף כִּי
  english_pob_choice: much less
  chosen_spanish: cuánto menos
  alternatives_spanish:
  - mucho menos
  - menos aún
  lexicon: HALOT
  rationale: 'Marca con claridad el argumento a fortiori del hebreo: si los cielos no pueden contenerte, con mayor razón esta casa no puede hacerlo.'
- source_word: הַבַּיִת הַזֶּה
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este templo
  - este edificio
  lexicon: HALOT
  rationale: Se conserva «casa» para respetar el motivo templo-casa del hebreo y evitar una actualización explicativa que el texto no impone.
- source_word: אֲשֶׁר בָּנִיתִי
  english_pob_choice: that I have built
  chosen_spanish: que he construido
  alternatives_spanish:
  - que he edificado
  - que construí
  lexicon: HALOT
  rationale: «He construido» refleja bien el perfecto con relevancia presente en español moderno y suena natural sin perder la idea de una obra terminada.
theological_decisions:
- issue: Ádam como singular representativo de la humanidad
  english_pob_reading: with man
  chosen_spanish_reading: con el hombre
  alternative_spanish_readings:
  - con la humanidad
  - con los seres humanos
  rationale: Se mantiene el singular masculino genérico del hebreo, tal como el audit trail inglés. En español, «el hombre» conserva el contraste teológico entre Dios y la humanidad sin borrar la forma original; la nota preserva la lectura inclusiva implícita.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table for אָדָם
- issue: Léxico de trascendencia divina frente al templo
  english_pob_reading: heaven and the highest heaven cannot contain you, much less this house
  chosen_spanish_reading: los cielos y los cielos de los cielos no te pueden contener; cuánto menos esta casa
  alternative_spanish_readings:
  - los cielos y el cielo de los cielos no te pueden contener
  - los cielos no pueden abarcarte, mucho menos esta casa
  rationale: 'La formulación conserva la tensión teológica: ni el ámbito cósmico supremo puede contener a Dios, ni mucho menos el templo. Se evita suavizar «contener» por un verbo más abstracto que diluya la imagen espacial del texto.'
  doctrine_reference: DOCTRINE.md Translation philosophy §2; teología del templo y trascendencia divina
translation_notes:
  revision_awareness: 'La versión española sigue el sentido auditado del texto hebreo y del inglés POB: mantiene la pregunta retórica, el paralelismo superlativo de «los cielos de los cielos», el argumento a fortiori, y el valor representativo de אָדָם. No se detectaron revisiones posteriores que exigieran ajustes adicionales.'
  spanish_consistency_notes:
  - Se conserva «Dios» para אֱלֹהִים en sentido singular.
  - Se usa «casa» en vez de «templo» para respetar la metáfora del original.
  - Se mantiene el registro reverente con «He aquí» y la pregunta retórica inicial.
  - El marcador de nota [a] aparece en el texto en el punto correspondiente a la lectura inclusiva de אָדָם.
