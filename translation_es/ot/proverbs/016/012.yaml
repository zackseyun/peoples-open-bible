translation:
  language: es
  text: Es una abominación para los reyes hacer maldad, porque por la rectitud[a] se establece un trono.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por la justicia se establece un trono».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹעֲבַת
  english_pob_choice: an abomination
  chosen_spanish: abominación
  alternatives_spanish:
  - detestable
  - cosa detestable
  lexicon: HALOT
  rationale: El sustantivo expresa algo moralmente aborrecible. «Abominación» conserva mejor el peso proverbial y jurídico del término que opciones más débiles como «detestable».
- source_word: מְלָכִים
  english_pob_choice: kings
  chosen_spanish: los reyes
  alternatives_spanish:
  - reyes
  - monarcas
  - gobernantes reales
  lexicon: HALOT
  rationale: 'El hebreo usa el plural simple «kings». En español, el artículo plural ayuda a la naturalidad de la construcción proverbial: «es para los reyes...».'
- source_word: עֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: hacer
  alternatives_spanish:
  - cometer
  - practicar
  lexicon: HALOT
  rationale: El infinitivo constructo de עשה se vierte con el verbo básico «hacer». Aunque «cometer» suena natural con maldad, «hacer» permanece más cerca del hebreo y evita sobrerreformulación.
- source_word: רֶשַׁע
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - impiedad
  - maldad criminal
  - maldad injusta
  lexicon: HALOT
  rationale: El término señala maldad moral o conducta perversa. «Maldad» es claro y natural en español; «impiedad» introduciría un matiz más específicamente religioso que el hebreo no exige aquí.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque en efecto
  lexicon: HALOT
  rationale: Aquí introduce la razón de la primera cláusula. «Porque» comunica bien la relación explicativa en español sin perder la fuerza causal.
- source_word: בְּצְדָקָה
  english_pob_choice: by righteousness
  chosen_spanish: por la justicia
  alternatives_spanish:
  - por la rectitud
  - mediante la justicia
  - sobre la base de la justicia
  lexicon: HALOT
  rationale: En este contexto real y sapiencial, צדקה puede abarcar la idea de gobierno justo. Se eligió «justicia» porque en español suena más natural con «se establece» y preserva el valor de orden recto y equitativo; además, la preposición «por» refleja el medio o base del establecimiento.
- source_word: יִכּוֹן
  english_pob_choice: is established
  chosen_spanish: se establece
  alternatives_spanish:
  - se afirma
  - queda firme
  - se consolida
  lexicon: HALOT
  rationale: El nifal de כון expresa quedar firme o establecido. «Se establece» es idiomático en español y conserva la imagen de estabilidad institucional del trono.
- source_word: כִּסֵּא
  english_pob_choice: a throne
  chosen_spanish: un trono
  alternatives_spanish:
  - el trono
  - trono real
  lexicon: HALOT
  rationale: El sustantivo es singular genérico en el proverbio. «Un trono» reproduce mejor ese valor general que «el trono», que podría sonar demasiado específico.
theological_decisions:
- issue: צדקה como justicia o rectitud en un proverbio sobre el trono
  english_pob_reading: righteousness, with justice preserved as an alternative
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia recta
  rationale: El inglés POB conserva «justice» como alternativa lexicográfica. En español, «justicia» es la forma más natural y mantiene el matiz de gobierno legítimo y recto. «Rectitud» sería posible, pero suena más abstracta y menos directamente vinculada al acto de establecer un trono.
  doctrine_reference: 'DOCTRINE.md: contested terms / righteousness-justice overlap; preserve contextual alternatives when a royal-wisdom context foregrounds just rule.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo y el audit trail en inglés: conserva el paralelismo proverbial, la causalidad de כִּי y la doble posibilidad de צדקה con una nota alternativa. No se detectaron revisiones aplicadas en el historial reciente, así que no introduje cambios textuales más allá de la adaptación española natural.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo»/«Mesías» porque no aplica al texto.
  - «Maldad» fue preferida a «iniquidad» para reflejar el paralelo directo con רֶשַׁע sin elevar artificialmente el registro.
  - La nota al pie preserva la alternativa «justicia»/«rectitud» sin desplazar el término principal del texto.
