review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido principal del griego y del audit trail inglés: pregunta retórica dirigida a Dios, ἰσχύει como fuerza/capacidad, y ἐξομολογήσασθαί con el sentido de acción de gracias en un contexto devocional. Sin embargo, la construcción española «sino para darte gracias» suena menos fiel a la sintaxis retórica de εἰ μὴ + infinitivo, y «oh Dios» es menos natural en español bíblico contemporáneo que «Dios».'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero necesita un ajuste menor para mayor naturalidad y fluidez: «Porque, ¿quién tiene fuerza, Dios[a], sino para darte gracias en verdad?» evita un vocativo algo forzado y mejora el anclaje de la nota. También conviene eliminar la nota sobre «quién», que no aporta significativamente a la comprensión.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: θεός se traduce correctamente como «Dios», y no aparecen términos sensibles adicionales. La decisión de ver ἐξομολογήσασθαί como «darte gracias» concuerda con la adjudicación auditada.'
  issues:
  - severity: medium
    issue: Construcción «sino para darte gracias»
    rationale: Aunque comprensible, «sino para + infinitivo» suena algo menos directa que el griego εἰ μὴ + infinitivo en esta pregunta retórica. «Sino darte gracias» suena más natural y más ceñido.
  - severity: low
    issue: Vocativo «oh Dios» poco idiomático en español moderno
    rationale: «Oh Dios» no es incorrecto, pero en español eclesial contemporáneo suele leerse mejor «Dios» como vocativo directo, especialmente con nota breve si se desea preservar la observación gramatical.
  - severity: low
    issue: Nota a sobre «quién» innecesaria
    rationale: La alternativa «tiene poder» afecta a ἰσχύει, no a τίς. El anclaje actual en «quién[a]» es inexacto respecto del contenido de la nota.
  revised_spanish_text: Porque, ¿quién tiene fuerza, Dios[a], sino darte gracias en verdad?
  revised_footnotes:
  - marker: a
    text: Vocativo directo; también podría leerse simplemente «Dios» sin cambiar sustancialmente el sentido.
    reason: grammatical_note
