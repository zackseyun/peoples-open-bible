translation:
  language: es
  text: 'Entonces llegaron a Jacob, su padre, en la tierra de Canaán y le contaron todo lo que les había sucedido[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «a Jacob, su padre, a la tierra de Canaán». La traducción lo expresa de manera idiomática como una sola localización geográfica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: Then they came
  chosen_spanish: Entonces llegaron
  alternatives_spanish:
  - Y llegaron
  - Así llegaron
  lexicon: HALOT
  rationale: El wayyiqtol marca avance narrativo secuencial; «Entonces» conserva esa progresión de manera natural en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - hasta
  lexicon: HALOT
  rationale: La preposición de dirección se expresa naturalmente con «a» en español al indicar llegada.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Yaʿacob
  lexicon: Nombre propio
  rationale: Se mantiene la transliteración convencional del nombre propio.
- source_word: אֲבִיהֶם
  english_pob_choice: their father
  chosen_spanish: su padre
  alternatives_spanish:
  - su progenitor
  lexicon: HALOT
  rationale: El posesivo plural está implícito en el contexto; «su padre» es natural y fiel al parentesco expresado por el constructo.
- source_word: אַרְצָה כְּנָעַן
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - a la tierra de Canaán
  - hacia la tierra de Canaán
  lexicon: HALOT
  rationale: 'El sufijo direccional de אֶרֶץ puede sugerir movimiento hacia/into la tierra, pero aquí el español fluye mejor con una localización geográfica: llegaron a Jacob ... en la tierra de Canaán.'
- source_word: וַיַּגִּידוּ
  english_pob_choice: and told him
  chosen_spanish: y le contaron
  alternatives_spanish:
  - y le informaron
  - y le relataron
  lexicon: HALOT
  rationale: נגד en hifil significa comunicar/contar; «contaron» conserva el sentido narrativo sin endurecerlo innecesariamente.
- source_word: לֹו
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: Pronombre enclítico
  rationale: El dativo indirecto se expresa de forma natural con el pronombre átono «le».
- source_word: אֵת כָּל
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - toda la
  - el conjunto de
  lexicon: HALOT
  rationale: La combinación intensifica la totalidad de lo que sigue; «todo» es la forma más natural en español.
- source_word: הַקֹּרֹת אֹתָם
  english_pob_choice: that had happened to them
  chosen_spanish: lo que les había sucedido
  alternatives_spanish:
  - las cosas que les habían sucedido
  - todo lo que les había acontecido
  lexicon: HALOT
  rationale: La forma verbal de קרה refiere a acontecimientos que les sobrevinieron; «lo que les había sucedido» preserva el valor eventivo sin sobrecargar el español.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijeron:'
  - 'al decir:'
  lexicon: HALOT
  rationale: Marca introductoria de discurso directo; «diciendo» funciona como señal narrativa estándar en español.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: el marcador [a] ahora aparece explícitamente en el texto español exactamente donde corresponde.'
  spanish_consistency_notes:
  - Se usa «tierra de Canaán» de forma coherente con el lenguaje bíblico español sin introducir matices doctrinales ajenos al hebreo.
  - Se prefirió un español narrativo natural («Entonces llegaron», «le contaron») sin perder la secuencia del wayyiqtol.
  - «Lo que les había sucedido» conserva el carácter de acontecimientos que les sobrevinieron, en línea con la nota lexical del texto fuente.
