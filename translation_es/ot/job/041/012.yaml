    reason: lexical_clarity
  - marker: b
    text: O «olla». El hebreo דּוּד puede denotar una olla de cocción o un recipiente mayor, como un caldero.
    reason: lexical_alternative
  - marker: c
    text: O «cañas encendidas». אַגְמוֹן puede referirse a juncos o cañas; aquí probablemente alude a vegetación usada como combustible, lo que intensifica la imagen del humo.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto para mejorar fidelidad léxica y naturalidad poética en español: «fosas nasales» por registro y precisión, «caldero» para reflejar mejor דּוּד con nota alternativa, «avivado» para acercarse a נָפוּחַ, y «juncos» para el valor más probable de אַגְמוֹן. También se suaviza la sintaxis de la comparación.'
