translation:
  language: es
  text: Acércate a mi alma[a]; redímela. A causa de mis enemigos[b], rescátame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mi alma». El término puede significar también «mi vida» o «a mí mismo», según el contexto.'
    reason: lexical_alternative
  - marker: b
    text: O «Por causa de mis enemigos, redímeme». La frase hebrea puede entenderse más literalmente así, pero en contexto probablemente significa «a causa de» o «por motivo de» mis enemigos.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְבָה
  english_pob_choice: Come near
  chosen_spanish: Acércate
  alternatives_spanish:
  - Ven cerca
  - Acércate a mí
  lexicon: HALOT
  rationale: El imperativo qal expresa una súplica directa de cercanía a Dios. «Acércate» es natural en español y conserva la fuerza imperativa sin perder solemnidad.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - a mí
  lexicon: HALOT
  rationale: נפש puede significar alma, vida o yo mismo. Aquí «mi alma» conserva el paralelismo poético y el registro emotivo del salmo; en español «alma» comunica mejor que «soul» literal, sin reducirlo a simple vida.
- source_word: גְאָלָהּ
  english_pob_choice: redeem it
  chosen_spanish: redímela
  alternatives_spanish:
  - redime mi alma
  - rescátala
  lexicon: HALOT
  rationale: גאל expresa redención en sentido de rescate por derecho de pariente-redentor. «Redímela» mantiene el verbo de redención y el sufijo femenino que retoma «alma».
- source_word: לְמַעַן
  english_pob_choice: Because of
  chosen_spanish: A causa de
  alternatives_spanish:
  - Por causa de
  - A raíz de
  lexicon: HALOT
  rationale: En este contexto introduce la circunstancia que motiva la petición, no un propósito a favor de los enemigos. «A causa de» refleja bien ese valor circunstancial en español.
- source_word: אֹיְבַי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - los que me son enemigos
  - mis adversarios
  lexicon: HALOT
  rationale: La forma constructa con sufijo es directa; «mis enemigos» es la equivalencia más clara y natural en español.
- source_word: פְּדֵנִי
  english_pob_choice: ransom me
  chosen_spanish: rescátame
  alternatives_spanish:
  - redímeme
  - sálvame
  lexicon: HALOT
  rationale: פדה es un verbo de rescate/liberación. Se distingue de גאל en el primer colon. «Rescátame» comunica la liberación implorada sin cargarla con un tecnicismo que en español sonaría redundante junto a «redímela».
theological_decisions:
- issue: Distinguir los dos verbos de redención, גאל y פדה
  english_pob_reading: Render גאל as 'redeem' and פדה as 'ransom'
  chosen_spanish_reading: Render גאל como «redimir» y פדה como «rescatar»
  alternative_spanish_readings:
  - Render ambos como «redimir»
  - Render פדה como «librar»
  rationale: 'El hebreo usa dos verbos emparentados pero no idénticos. En español conviene mantener la diferencia: «redímela» conserva el matiz de redención; «rescátame» expresa la liberación pedida sin borrar la tensión léxica del verso.'
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'Coincide con la evaluación más reciente: no se requieren cambios respecto del análisis auditado; se conserva la distinción entre גאל y פדה y el valor circunstancial de לְמַעַן.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y moderno, evitando calcos innecesarios.
  - «Alma» se usó para preservar la imagen poética, con nota de amplitud semántica.
  - Se distinguió «redimir» de «rescatar» para reflejar la textura léxica del hebreo.
  - Las notas al pie conservan la ambigüedad relevante sin sobreexplicar.
