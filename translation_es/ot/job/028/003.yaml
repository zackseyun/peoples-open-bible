review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en la estructura general del versículo y en la idea de que el ser humano/minero pone fin a la oscuridad y explora exhaustivamente. Sin embargo, no sigue fielmente la decisión auditada del POB para צַלְמָוֶת: el texto principal inglés eligió ''deep darkness'' y reservó ''shadow of death'' para nota. El español invierte esa decisión y además deja la nota anclada en ''oscuridad'', donde no corresponde la alternativa léxica.'
  spanish_quality_summary: El español es legible, pero 'rastrea hasta el último límite' suena algo interpretativo frente al más directo 'explora/escudriña todo límite'. También conviene mantener la nota en el sintagma final, no en 'oscuridad'. La frase revisada suena natural y digna en español eclesial amplio.
  glossary_alignment: 'No hay términos de glosario mayor implicados. La cuestión principal es la coherencia con la decisión léxica documentada para צַלְמָוֶת: texto principal ''profunda oscuridad'' / nota ''sombra de muerte''. También conviene reflejar que אֶבֶן funciona colectivamente; ''las piedras de'' es aceptable en español.'
  issues:
  - severity: high
    issue: צַלְמָוֶת fue puesto en el texto principal como 'sombra de muerte'
    rationale: La evidencia fuente y la auditoría inglesa eligieron contextual y explícitamente 'deep darkness' en el texto principal, con 'shadow of death' solo como alternativa tradicional en nota.
  - severity: high
    issue: La nota está anclada en 'oscuridad[a]' en lugar del sintagma final relevante
    rationale: La alternativa documentada afecta a 'las piedras de penumbra/profunda oscuridad' frente a 'la piedra de oscuridad y la sombra de muerte'; el marcador debe aparecer donde la variante corresponde.
  - severity: medium
    issue: '''rastrea hasta el último límite'' añade matiz interpretativo'
    rationale: Aunque comunica exhaustividad, el hebreo/POB auditado permite una formulación más ceñida como 'explora todo límite' o 'escudriña todo límite', sin introducir 'último'.
  - severity: low
    issue: Repetición de 'oscuridad' en dos sintagmas cercanos
    rationale: Puede mejorarse la diferenciación entre חֹשֶׁךְ y אֹפֶל usando 'tinieblas' para el primero y 'penumbra' para el segundo, manteniendo la distinción léxica con mejor estilo.
  revised_spanish_text: Pone fin a las tinieblas, y explora todo límite, las piedras de la penumbra y de la profunda oscuridad[a].
