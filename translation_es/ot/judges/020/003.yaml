translation:
  language: es
  text: 'Y los hijos de Benjamín[a] oyeron que los hijos de Israel habían subido a Mizpa. Entonces los hijos de Israel dijeron: «Díganme, ¿cómo ocurrió este mal[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los benjaminitas» y «los israelitas». El hebreo repite literalmente «los hijos de Benjamín» y «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: «Este mal» también puede traducirse «esta maldad» o «este agravio». El término hebreo tiene una fuerte carga moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי בִנְיָמִן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: los hijos de Benjamín
  alternatives_spanish:
  - los benjaminitas
  - el pueblo de Benjamín
  lexicon: HALOT
  rationale: Conservo la construcción hebrea literal para mantener el paralelismo formal con «los hijos de Israel» y la identidad tribal repetida en el versículo. «Hijos» es fiel al hebreo בני, mientras que «benjaminitas» sería posible pero menos transparente al patrón del texto.
- source_word: וַיִּשְׁמְעוּ
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - supieron
  - recibieron la noticia
  lexicon: HALOT
  rationale: El verbo שׁמע en este contexto narrativo expresa recepción de noticia; «oyeron» es el equivalente español directo y natural, sin añadir interpretación.
- source_word: עָל֥וּ
  english_pob_choice: had gone up
  chosen_spanish: habían subido
  alternatives_spanish:
  - habían ido
  - habían llegado
  lexicon: HALOT
  rationale: «Subir» conserva el sentido básico de עלה y funciona bien para el movimiento hacia un lugar de reunión. El pluscuamperfecto español refleja la anterioridad respecto de «oyeron».
- source_word: הַמִּצְפָּה
  english_pob_choice: to Mizpah
  chosen_spanish: a Mizpa
  alternatives_spanish:
  - a Mizpah
  - a la Mizpa
  - a Mizpe
  lexicon: HALOT
  rationale: Uso la transliteración habitual «Mizpa» como nombre propio del lugar. En español, el artículo hebreo no se reproduce normalmente en topónimos.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Mantengo la frase literal para conservar la simetría con «los hijos de Benjamín» y el tono formal del hebreo repetido.
- source_word: דַּבְּרוּ
  english_pob_choice: Tell us
  chosen_spanish: Hablad
  alternatives_spanish:
  - Decid
  - Contad
  lexicon: HALOT
  rationale: El imperativo plur. דַּבְּרוּ significa literalmente «hablad». Aunque el contexto implica una petición de información, mantengo el imperativo básico para no suavizar la fuerza de la demanda ni convertirla en una paráfrasis excesiva.
- source_word: אֵיכָה
  english_pob_choice: how
  chosen_spanish: ¿cómo?
  alternatives_spanish:
  - ¿de qué manera?
  - ¿cómo exactamente?
  lexicon: HALOT
  rationale: «Cómo» es la interrogativa española más directa para אֵיכָה y transmite la pregunta por el modo en que sucedió el hecho.
- source_word: נִהְיְתָה
  english_pob_choice: did ... happen
  chosen_spanish: ha ocurrido
  alternatives_spanish:
  - sucedió
  - ha pasado
  lexicon: HALOT
  rationale: Con היה en esta construcción, el español natural pide una formulación eventiva. «Ha ocurrido» preserva el sentido de acontecimiento sin recargar el texto con una perífrasis demasiado interpretativa.
- source_word: הָרָעָה הַזֹּאת
  english_pob_choice: this evil
  chosen_spanish: este mal
  alternatives_spanish:
  - esta maldad
  - esta malicia
  - esta maldad tan grande
  lexicon: HALOT
  rationale: El hebreo רָעָה puede expresar mal moral o calamidad, pero aquí el contexto de la atrocidad de Guibeá favorece un término moralmente fuerte. «Mal» mantiene la fuerza ética y suena más natural que «maldad» en este tipo de pregunta narrativa.
theological_decisions:
- issue: Valor moral de הָרָעָה הַזֹּאת
  english_pob_reading: “This evil” could also be rendered “this wickedness” or “this wrong.” The Hebrew term carries strong moral force.
  chosen_spanish_reading: «este mal» conserva la carga moral fuerte sin restringirla a una sola matización.
  alternative_spanish_readings:
  - «esta maldad»
  - «este agravio»
  - «esta perversidad»
  rationale: No suavizo רָעָה hacia un mero «problema» o «desastre», porque el contexto exige una evaluación moral. Sin embargo, «mal» deja abierta la amplitud semántica del hebreo mejor que opciones más cerradas como «maldad» o «perversidad».
  doctrine_reference: Lexical/theological force of רָעָה in moral outrage context; cf. general Hebrew semantic range rather than a doctrinal locus
translation_notes:
  revision_awareness: La revisión más reciente del texto fuente en inglés no introdujo cambios; el acuerdo de revisión es alto y no hay variantes textuales o decisiones nuevas que exijan ajuste respecto del audit trail existente.
  spanish_consistency_notes:
  - Se mantiene la simetría formal «los hijos de Benjamín / los hijos de Israel» para reflejar el hebreo repetido.
  - Se conserva el topónimo «Mizpa» sin artículo castellano añadido.
  - La voz imperativa «Hablad» preserva el tono directo del original, aunque en español suena más formal que «Decid» o «Contad».
  - «Este mal» sigue la fuerza moral del hebreo sin convertirlo en un tecnicismo doctrinal.
