translation:
  language: es
  text: Y fortificó Quedrón[a] y puso allí caballería[b] y fuerzas, para que, saliendo[c], patrullaran los caminos de Judea[d], tal como el rey le había ordenado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘edificó Quedrón’. El verbo griego puede significar más literalmente ‘construyó’; aquí se traduce ‘fortificó’ por el contexto militar inmediato.
    reason: lexical_alternative
  - marker: b
    text: O ‘jinetes’ por ‘caballería’.
    reason: lexical_alternative
  - marker: c
    text: O ‘al salir’. El participio griego puede expresar la idea de salir como medio o circunstancia.
    reason: lexical_alternative
  - marker: d
    text: El verbo traducido ‘patrullaran’ también puede sugerir desplazarse por los caminos para controlarlos, hostigarlos o hacer incursiones en ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾠκοδόμησεν
  english_pob_choice: fortified
  chosen_spanish: fortificó
  alternatives_spanish:
  - construyó
  - edificó
  - reconstruyó
  lexicon: LSJ
  rationale: 'Aunque el verbo básico puede significar ‘construir’ o ‘edificar’, el contexto es militar: se menciona enseguida la colocación de tropas. ‘Fortificó’ comunica mejor la función defensiva/estratégica sin abandonar el sentido de obra material.'
- source_word: τὴν Κεδρὼν
  english_pob_choice: Kedron
  chosen_spanish: Quedrón
  alternatives_spanish:
  - Cedrón
  - Kedrón
  lexicon: Transliteración del griego Κεδρών
  rationale: Es un topónimo; se translitera. ‘Quedrón’ mantiene la forma más cercana al griego y resulta legible en español.
- source_word: ἔταξεν
  english_pob_choice: stationed
  chosen_spanish: puso allí
  alternatives_spanish:
  - estacionó allí
  - destacó allí
  - apostó allí
  lexicon: BDAG
  rationale: En un contexto militar, el verbo expresa ubicar tropas en un lugar. ‘Puso allí’ es natural en español y evita una rigidez excesiva; el complemento militar aclara la idea de despliegue.
- source_word: ἵππεις
  english_pob_choice: cavalry
  chosen_spanish: caballería
  alternatives_spanish:
  - jinetes
  - caballeros
  lexicon: LSJ
  rationale: El término designa tropas montadas. ‘Caballería’ es el equivalente militar natural en español y conserva el valor colectivo del plural griego.
- source_word: δυνάμεις
  english_pob_choice: forces
  chosen_spanish: fuerzas
  alternatives_spanish:
  - tropas
  - milicia
  lexicon: LSJ
  rationale: Es un término amplio para contingentes militares. ‘Fuerzas’ preserva esa amplitud sin precisar más de lo que dice el griego.
- source_word: ἐκπορευόμενοι
  english_pob_choice: by going out
  chosen_spanish: saliendo
  alternatives_spanish:
  - al salir
  - cuando salían
  - salieran
  lexicon: BDAG
  rationale: El participio expresa circunstancia o modo. ‘Saliendo’ mantiene la relación participial de manera natural en español.
- source_word: ἐξοδεύωσιν
  english_pob_choice: patrol
  chosen_spanish: patrullaran
  alternatives_spanish:
  - recorrieran
  - vigilaran
  - salieran a hostigar
  lexicon: LSJ
  rationale: En este contexto de control militar de caminos, ‘patrullar’ capta la función estratégica indicada por el contexto. Conserva también el posible matiz de control hostil sin explicitarlo de más.
- source_word: τὰς ὁδοὺς τῆς Ἰουδαίας
  english_pob_choice: the roads of Judea
  chosen_spanish: las rutas de Judea
  alternatives_spanish:
  - los caminos de Judea
  - las vías de Judea
  lexicon: LSJ
  rationale: ‘Ὁδοὺς’ puede ser ‘caminos/rutas’. ‘Rutas’ suena natural y mantiene la referencia geográfica sin restringir innecesariamente el tipo de vía.
- source_word: καθὰ συνετέταξεν αὐτῷ ὁ βασιλεύς
  english_pob_choice: just as the king had ordered him
  chosen_spanish: tal como el rey le había ordenado
  alternatives_spanish:
  - como el rey le había mandado
  - según el rey le había instruido
  lexicon: BDAG
  rationale: El verbo implica una orden autoritativa. ‘Había ordenado’ reproduce bien el sentido de mandato real en un registro claro y sobrio.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés muestran alta concordancia y no registran revisiones sustantivas posteriores; se conserva el mismo núcleo interpretativo: obra/fortificación militar, despliegue de caballería y fuerzas, y objetivo de control de los caminos de Judea por orden del rey.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ fuera del versículo porque no aparece el nombre divino en el texto fuente.
  - Se prefirió ‘caballería’ como término militar colectivo para ἵππεις, siguiendo el valor de tropa montada.
  - Se evitó traducir mecánicamente ‘built’/‘edificó’ sin atender al contexto bélico, por lo que ‘fortificó’ queda explicitado en nota como decisión contextual.
  - ‘Patrullaran’ conserva el matiz funcional de ἐξοδεύωσιν en un entorno de control militar de rutas.
