translation:
  language: es
  text: cómo te salió al encuentro en el camino y abatió a todos los rezagados detrás de ti, cuando tú estabas cansado y agotado; y no temió a Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: קָרְךָ
  english_pob_choice: met you
  chosen_spanish: te salió al encuentro
  alternatives_spanish:
  - te encontró
  - te aconteció en el camino
  lexicon: HALOT
  rationale: El hebreo sugiere venir al encuentro en el camino, no solo un encuentro casual. «Te salió al encuentro» conserva la iniciativa del atacante y suena natural en español.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - sobre el camino
  - a lo largo del camino
  lexicon: HALOT
  rationale: «En el camino» es una equivalencia directa y idiomática para el escenario de viaje.
- source_word: וַיְזַנֵּב בְּךָ
  english_pob_choice: struck down
  chosen_spanish: abatió
  alternatives_spanish:
  - derribó
  - cortó por detrás a
  lexicon: HALOT
  rationale: El verbo tiene la imagen de golpear la retaguardia o cortar el extremo trasero. «Abatió» comunica el golpe devastador sin perder la fuerza del acto; se mantiene el matiz de ataque a los rezagados en la frase siguiente.
- source_word: כָּל הַנֶּחֱשָׁלִים
  english_pob_choice: all the stragglers
  chosen_spanish: a todos los rezagados
  alternatives_spanish:
  - a todos los que iban quedando atrás
  - a todos los débiles
  lexicon: HALOT
  rationale: «Rezagados» expresa tanto el quedarse atrás como la vulnerabilidad del grupo. Evita reducir el sentido solo a debilidad física.
- source_word: אַחֲרֶיךָ
  english_pob_choice: behind you
  chosen_spanish: detrás de ti
  alternatives_spanish:
  - a tu espalda
  - tras de ti
  lexicon: HALOT
  rationale: La expresión española marca con claridad la posición posterior del grupo atacado.
- source_word: וְאַתָּה עָיֵף וְיָגֵעַ
  english_pob_choice: when you were weary and worn out
  chosen_spanish: cuando tú estabas cansado y agotado
  alternatives_spanish:
  - cuando estabas fatigado y exhausto
  - cuando tú estabas rendido y fatigado
  lexicon: HALOT
  rationale: Los dos adjetivos hebreos forman una intensificación. «Cansado y agotado» reproduce esa duplicación con una pareja natural en español.
- source_word: וְלֹא יָרֵא אֱלֹהִים
  english_pob_choice: and he did not fear God
  chosen_spanish: y no temió a Dios
  alternatives_spanish:
  - y no tuvo temor de Dios
  - y no reverenció a Dios
  lexicon: HALOT
  rationale: Se conserva la referencia singular del verbo hebreo y la expresión bíblica «temer a Dios». En español, «temió a Dios» mantiene la fuerza moral/religiosa del original.
theological_decisions:
- issue: Referente singular en «no temió a Dios»
  english_pob_reading: and he did not fear God
  chosen_spanish_reading: y no temió a Dios
  alternative_spanish_readings:
  - y no temieron a Dios
  rationale: El hebreo usa verbo singular. Se mantiene la forma singular en español para respetar la gramática del texto fuente y permitir el uso colectivo de Amalec sin suavizarlo interpretativamente.
  doctrine_reference: Translation philosophy §1, §5
- issue: Traducción de אֱלֹהִים
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - dioses
  rationale: En esta construcción, la referencia natural es al Dios verdadero. «Dios» conserva el sentido idiomático de «fear God» y evita introducir un plural ajeno al contexto.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que prefirió «struck down» para reflejar mejor la fuerza de וַיְזַנֵּב. La redacción española sigue esa intensificación con «abatió», sin perder la referencia explícita a los rezagados.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en sentido singular contextual.
  - Se conserva una sintaxis natural en español sin borrar el matiz de ataque a la retaguardia.
  - No se usa «SEÑOR» ni «Cristo»; no aplican a este versículo.
  - La doble descripción de cansancio se reproduce con un par intensivo («cansado y agotado»).
