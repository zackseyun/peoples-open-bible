translation:
  language: es
  text: Y oren por la vida de Nabucodonosor[a], rey de Babilonia, y por la vida de Baltasar, su hijo, para que sus días sean como los días del cielo sobre la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Los nombres griegos se reflejan aquí por transliteración directa adaptada al español: ''Nabucodonosor'' y ''Baltasar''; formas más familiares en otras tradiciones bíblicas serían ''Nebucodonosor'' y ''Belsasar'' o ''Belshazzar''.'
    reason: alternative_reading
  - marker: b
    text: 'O, más idiomáticamente: ''para que sus días sean largos, como el cielo sobre la tierra''. El griego conserva una metáfora vívida de vida prolongada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσεύξασθε
  english_pob_choice: pray
  chosen_spanish: oren
  alternatives_spanish:
  - recen
  - oren fervientemente
  lexicon: BDAG
  rationale: El imperativo aoristo plural expresa una exhortación directa. En español, 'oren' conserva la fuerza imperativa natural y es más fluido que una expresión más analítica como 'ofrezcan oraciones'.
- source_word: περὶ τῆς ζωῆς
  english_pob_choice: for the life of
  chosen_spanish: por la vida de
  alternatives_spanish:
  - en favor de la vida de
  - por el bienestar de
  lexicon: BDAG
  rationale: La preposición περί con genitivo indica intercesión a favor de alguien. 'Por la vida de' sigue de cerca el griego y mantiene el sustantivo explícito ζωή, sin convertirlo prematuramente en una paráfrasis de 'bienestar'.
- source_word: Ναβουχοδονοσὸρ
  english_pob_choice: Nebuchodonosor
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucodonosor
  - Nabucodonosór
  lexicon: BDAG
  rationale: Se conserva la transliteración directa del nombre griego, adaptada a la ortografía española. 'Nabucodonosor' comunica el mismo referente sin normalizarlo a la forma hebrea o inglesa más familiar.
- source_word: Βαλτασὰρ
  english_pob_choice: Baltasar
  chosen_spanish: Baltasar
  alternatives_spanish:
  - Balthasar
  - Beltsasar
  lexicon: BDAG
  rationale: La forma griega Βαλτασάρ se refleja bien con 'Baltasar', que es transparente en español y respeta el testimonio griego sin sustituirlo por una forma tradicional distinta.
- source_word: ἵνα ὦσιν αἱ ἡμέραι αὐτῶν
  english_pob_choice: so that their days may be
  chosen_spanish: para que sus días sean
  alternatives_spanish:
  - a fin de que sus días sean
  - para que sus días puedan ser
  lexicon: BDAG
  rationale: ἵνα introduce finalidad. 'Para que' expresa claramente ese valor en español y mantiene la relación sintáctica del griego sin sobreexplicar.
- source_word: ὡς αἱ ἡμέραι τοῦ οὐρανοῦ ἐπὶ τῆς γῆς
  english_pob_choice: like the days of heaven upon the earth
  chosen_spanish: como los días del cielo sobre la tierra
  alternatives_spanish:
  - como los días de los cielos sobre la tierra
  - como el cielo sobre la tierra, por mucho tiempo
  lexicon: BDAG
  rationale: Se preserva la metáfora en vez de resolverla en una paráfrasis como 'por mucho tiempo'. 'Del cielo' reproduce de modo natural el genitivo τοῦ οὐρανοῦ y conserva la imagen de duración celestial sobre la tierra.
theological_decisions:
- issue: Si el último miembro debe explicitarse como una duración larga o conservar la imagen metafórica
  english_pob_reading: 'Preserve the metaphor: ''their days may be like the days of heaven upon the earth'''
  chosen_spanish_reading: 'Conservar la metáfora: ''sus días sean como los días del cielo sobre la tierra'''
  alternative_spanish_readings:
  - sus días sean muy largos sobre la tierra
  - sus días duren como el cielo sobre la tierra
  rationale: El griego presenta una imagen poética y alusiva. Mantenerla preserva la textura retórica y evita resolver demasiado pronto el sentido en una explicación interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
- issue: Cómo tratar los nombres reales transmitidos por el griego
  english_pob_reading: 'Use direct transliterations from the Greek witness: ''Nebuchodonosor'' and ''Baltasar'''
  chosen_spanish_reading: 'Usar transliteración española directa del testimonio griego: ''Nabucodonosor'' y ''Baltasar'''
  alternative_spanish_readings:
  - Nabucodonosor y Belshazar
  - Nabucodonosor y Belsasar
  rationale: El enfoque del proyecto privilegia el testimonio original. En español, la adaptación ortográfica de los nombres griegos mantiene legibilidad sin sustituir la forma atestiguada por una armonización con otras tradiciones bíblicas.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 2
translation_notes:
  revision_awareness: El pasaje fue tomado del nivel de override de traducción adjudicado para Baruc 1:11; el control cruzado reportó alta concordancia y no se registraron revisiones aplicadas en la última pasada. La versión española conserva la metáfora final y la referencia nominal directa al testimonio griego, con adaptación ortográfica al español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un κύριος que deba evaluarse aquí.
  - Se preserva 'vida' de forma explícita para reflejar ζωή, sin reducirlo a 'bienestar'.
  - Los nombres propios se adaptan a la ortografía española, pero sin normalizarlos a formas de otras tradiciones textuales.
