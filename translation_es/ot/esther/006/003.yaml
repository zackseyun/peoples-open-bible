translation:
  language: es
  text: 'Entonces el rey dijo[a]: «¿Qué honor y grandeza se le han otorgado a Mardoqueo por esto?». Los jóvenes del rey que lo atendían dijeron: «No se ha hecho nada por él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué honor y grandeza se hicieron a Mardoqueo por esto?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה נַּעֲשָׂה
  english_pob_choice: What ... has been bestowed / What has been done
  chosen_spanish: ¿Qué ... se han hecho
  alternatives_spanish:
  - ¿Qué se ha hecho
  - ¿Qué honor y grandeza le han sido concedidos
  lexicon: HALOT
  rationale: El hebreo usa el pasivo de עשה para preguntar qué acción se realizó. En español, «se han hecho» conserva ese pasivo sin añadir una idea demasiado interpretativa; el contexto cortesano permite entender que se trata de honores otorgados.
- source_word: יְקָר
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - estimación
  - precio
  lexicon: HALOT
  rationale: En este contexto de corte, la palabra designa el honor dado a una persona, no el valor material. «Honor» es claro y fiel.
- source_word: וּגְדוּלָּה
  english_pob_choice: greatness
  chosen_spanish: grandeza
  alternatives_spanish:
  - grandeza pública
  - promoción
  - distinción
  lexicon: HALOT
  rationale: La raíz expresa elevación o grandeza conferida. «Grandeza» mantiene la cercanía léxica con el hebreo y funciona bien junto a «honor».
- source_word: לְמָרְדֳּכַי
  english_pob_choice: on Mordecai / for Mordecai
  chosen_spanish: para Mardoqueo
  alternatives_spanish:
  - a Mardoqueo
  - por Mardoqueo
  lexicon: HALOT
  rationale: La lamed marca al beneficiario/indirecto. En español, «para Mardoqueo» comunica bien la idea de algo hecho en su favor y encaja con el pasivo.
- source_word: עַל זֶה
  english_pob_choice: for this / because of this
  chosen_spanish: por esto
  alternatives_spanish:
  - a causa de esto
  - por causa de esto
  lexicon: HALOT
  rationale: La referencia vuelve al acto de Mardoqueo en el contexto anterior. «Por esto» conserva el valor causal de manera natural y breve.
- source_word: נַעֲרֵי הַמֶּלֶךְ
  english_pob_choice: The king’s young men
  chosen_spanish: Los jóvenes del rey
  alternatives_spanish:
  - los muchachos del rey
  - los servidores jóvenes del rey
  lexicon: HALOT
  rationale: נַעֲרִים es literalmente «jóvenes». Se conserva esa distinción léxica, como en el inglés POB, en vez de sustituirla directamente por «siervos».
- source_word: מְשָׁרְתָיו
  english_pob_choice: who attended him
  chosen_spanish: sus servidores
  alternatives_spanish:
  - que lo atendían
  - sus asistentes
  lexicon: HALOT
  rationale: El participio de שרת expresa servicio de presencia/atención. Aquí se integra como aposición explicativa («sus servidores») para evitar una repetición pesada en español y mantener el matiz cortesano.
- source_word: לֹא נַעֲשָׂה עִמּוֹ דָּבָר
  english_pob_choice: Nothing has been done for him
  chosen_spanish: No se ha hecho nada con él
  alternatives_spanish:
  - No se ha hecho nada por él
  - No se ha hecho nada respecto de él
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: literalmente, «no se hizo con él דבר». «No se ha hecho nada con él» conserva la estructura del original sin perder inteligibilidad; la alternativa «por él» aclara el sentido beneficiario, pero suaviza más la forma hebrea.'
translation_notes:
  revision_awareness: El contexto auditado en inglés pasó de «distinction» a «greatness» para וּגְדוּלָּה, reforzando la cercanía a «greatness» junto con «honor». La versión española sigue esa revisión y evita una suavización excesiva como «distinción».
  spanish_consistency_notes:
  - Se mantiene «Mardoqueo» para el nombre propio, conforme al uso bíblico español estándar.
  - Se evita «SEÑOR» o sustituciones teológicas porque el versículo no contiene el Nombre divino.
  - «Los jóvenes del rey» conserva la distinción entre נַעֲרֵי y מְשָׁרְתָיו, reflejando la estructura del hebreo y el audit trail en inglés.
  - El cierre «No se ha hecho nada con él» mantiene la pasiva negativa del hebreo; aunque suene menos idiomático que «por él», protege mejor la forma fuente.
