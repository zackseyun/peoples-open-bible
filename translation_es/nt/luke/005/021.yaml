translation:
  language: es
  text: 'Y los escribas y los fariseos comenzaron a razonar entre sí, diciendo: «¿Quién es este que habla blasfemias? ¿Quién puede perdonar pecados sino solo Dios?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤρξαντο διαλογίζεσθαι
  english_pob_choice: began to reason among themselves
  chosen_spanish: comenzaron a razonar entre sí
  alternatives_spanish:
  - comenzaron a discutir entre sí
  - comenzaron a cuestionar entre sí
  - comenzaron a deliberar entre sí
  lexicon: BDAG
  rationale: La construcción con ἄρχομαι + infinitivo pide el valor de «comenzaron a». διαλογίζομαι aquí expresa razonamiento evaluativo o deliberación interior/compartida; «razonar entre sí» conserva ese matiz sin decidir de más entre pensamiento interno y debate explícito.
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - maestros de la ley
  lexicon: BDAG
  rationale: «Escribas» es el equivalente estándar y transparente para γραμματεῖς en los Evangelios, y mantiene la referencia a expertos reconocidos en la ley sin volver la frase más interpretativa.
- source_word: Φαρισαῖοι
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  lexicon: BDAG
  rationale: 'Nombre de grupo transliterado de forma normal al español bíblico: «fariseos».'
- source_word: λαλεῖ βλασφημίας
  english_pob_choice: speaks blasphemies
  chosen_spanish: habla blasfemias
  alternatives_spanish:
  - dice blasfemias
  - profiere blasfemias
  - habla blasfemia
  lexicon: BDAG
  rationale: Se conserva el plural de βλασφημίας con «blasfemias», como en el inglés POB. «Habla blasfemias» suena algo más marcado que «habla blasfemia» y mantiene la fuerza de la acusación sin suavizarla.
- source_word: ἁμαρτίας ἀφεῖναι
  english_pob_choice: forgive sins
  chosen_spanish: perdonar pecados
  alternatives_spanish:
  - soltar pecados
  - liberar pecados
  lexicon: BDAG
  rationale: Con ἀφίημι + ἁμαρτίας, el giro idiomático normal es «perdonar pecados». Otras opciones más literales serían opacas en español y perderían claridad.
- source_word: εἰ μὴ μόνος ὁ θεός
  english_pob_choice: except God alone
  chosen_spanish: sino solo Dios
  alternatives_spanish:
  - excepto solo Dios
  - a no ser solo Dios
  - salvo solo Dios
  lexicon: BDAG
  rationale: 'La idea es de exclusión: nadie puede perdonar pecados, excepto Dios. «Sino solo Dios» comunica bien esa exclusividad en español natural y conserva el énfasis de μόνος.'
- source_word: Τίς ἐστιν οὗτος
  english_pob_choice: Who is this
  chosen_spanish: ¿Quién es este?
  alternatives_spanish:
  - ¿Quién es este hombre?
  lexicon: BDAG
  rationale: 'El griego no añade «hombre». Se mantiene la forma abrupta y despectiva de la pregunta: «¿Quién es este?».'
theological_decisions:
- issue: Exclusividad del perdón de pecados
  english_pob_reading: Who can forgive sins except God alone?
  chosen_spanish_reading: ¿Quién puede perdonar pecados sino solo Dios?
  alternative_spanish_readings:
  - ¿Quién puede perdonar pecados excepto solo Dios?
  - ¿Quién puede perdonar pecados salvo Dios solo?
  rationale: La traducción conserva la afirmación exclusiva de los escribas y fariseos sin resolverla ni suavizarla. Mantener «solo Dios» preserva la tensión teológica del pasaje tal como aparece en Lucas.
  doctrine_reference: Preservar la tensión teológica sin explicitar una conclusión cristológica que el versículo no formula.
translation_notes:
  revision_awareness: La redacción sigue el texto griego SBLGNT y el audit trail inglés con alta concordancia; no se requieren cambios textuales ni notas de variante, y se conserva la fuerza teológica de la objeción sin introducir interpretaciones ajenas al versículo.
  spanish_consistency_notes:
  - Se usó «Dios» para θεός, sin sustituirlo por una forma en mayúsculas tipo «SEÑOR», porque el texto no contiene el tetragrámaton.
  - Se mantuvo el plural «blasfemias» para reflejar βλασφημίας y seguir el valor retenido en el inglés POB.
  - Se eligió «perdonar pecados» como equivalente idiomático de ἀφεῖναι ἁμαρτίας, que en español comunica mejor la frase que un calco literal.
  - Se prefirió «escribas» a una glosa explicativa, para conservar la terminología bíblica estándar y la forma concisa del griego.
