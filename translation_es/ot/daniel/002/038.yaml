    rationale: El punto y coma después de la enumeración no es necesario y hace menos natural la sintaxis española. Una coma o raya fluye mejor con la cláusula verbal subsiguiente.
  - severity: low
    issue: Inconsistencia menor entre «todo eso» y «todos ellos»
    rationale: Pasar de un neutro demostrativo a un plural personal en la misma oración suena menos cohesivo; conviene mantener el mismo referente explícito.
