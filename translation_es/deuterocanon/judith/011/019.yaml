revisions:
- from: Y te conduciré por en medio de Judea hasta que llegues frente a Jerusalén[a], y pondré tu carro en medio de ella, y los llevarás como ovejas sin pastor, y ni siquiera un perro gruñirá con su lengua contra ti[b]; porque estas cosas me fueron dichas según mi conocimiento previo[c], y me las comunicaron, y fui enviado para anunciártelas.
  to: Y te conduciré por en medio de Judea hasta que llegues frente a Jerusalén[a], y pondré tu carro en medio de ella, y los arrearás como ovejas sin pastor, y ni siquiera un perro gruñirá con su lengua contra ti[b]; porque estas cosas me fueron dichas según mi conocimiento previo[c], y me las comunicaron, y fui enviada para anunciártelas.
  rationale: Se corrige la concordancia de género de la hablante a «fui enviada», cambio necesario para fidelidad y buen español. También se ajusta «los llevarás» a «los arrearás» para reflejar mejor el valor contextual de ἄξεις dentro de la imagen de ovejas sin pastor y alinearse más estrechamente con la decisión lexical auditada.
