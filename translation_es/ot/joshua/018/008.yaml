translation:
  language: es
  text: 'Así que los hombres se levantaron y fueron, y Josué mandó a los que iban a escribir[a] la tierra, diciendo: «Vayan y recorran la tierra, y escríbanla[a], y vuelvan a mí; y aquí echaré suertes por ustedes delante de Yahvé en Silo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «registrar» o «describir la tierra»; el hebreo dice literalmente «escribir la tierra», refiriéndose a levantar un informe escrito para el reparto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  english_pob_choice: arose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se pusieron en pie
  - se alzaron
  lexicon: HALOT
  rationale: El hebreo marca el comienzo de la acción en secuencia narrativa. «Se levantaron» conserva ese arranque idiomático en español sin añadir matiz interpretativo.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los enviados
  lexicon: HALOT
  rationale: El sustantivo es masculino plural y el contexto se refiere a representantes varones concretos. «Los hombres» mantiene la precisión gramatical y referencial.
- source_word: וַיֵּלֵכוּ
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - se fueron
  - partieron
  lexicon: HALOT
  rationale: En español, «fueron» expresa el movimiento narrativo de manera natural y breve, equivalente a la acción simple del hebreo.
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - encargó
  lexicon: HALOT
  rationale: El verbo transmite una instrucción con autoridad. «Mandó» conserva esa fuerza sin sonar excesivamente militar o jurídico en español.
- source_word: הַהֹלְכִים
  english_pob_choice: those who were going
  chosen_spanish: los que iban
  alternatives_spanish:
  - los que se dirigían
  - los caminantes
  lexicon: HALOT
  rationale: El participio hebreo identifica a los hombres por la acción asignada. «Los que iban» mantiene el valor participial y resulta idiomático.
- source_word: לִכְתֹּב אֶת הָאָרֶץ
  english_pob_choice: to write down the land
  chosen_spanish: a escribir la tierra
  alternatives_spanish:
  - a registrar la tierra
  - a describir la tierra por escrito
  - a levantar un registro de la tierra
  lexicon: HALOT
  rationale: Sigo de cerca el núcleo literal del hebreo «escribir la tierra», como en la nota auditada en inglés. En español, «escribir la tierra» suena poco natural, por lo que «a escribir la tierra» se entiende como encargo de registro/survey sin abandonar el paralelo con el original. La tensión entre literalidad y función censal/survey queda asumida, no borrada.
- source_word: לְכוּ
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan adelante
  - Procedan
  lexicon: HALOT
  rationale: Imperativo plural de הלך; «Vayan» es la forma natural y directa en español contemporáneo.
- source_word: וְהִתְהַלְּכוּ בָאָרֶץ
  english_pob_choice: walk through the land
  chosen_spanish: recorran la tierra
  alternatives_spanish:
  - caminen por la tierra
  - anden por la tierra
  - vayan por la tierra
  lexicon: HALOT
  rationale: El hitpael de הלך implica moverse por el territorio, recorriéndolo. «Recorran» expresa bien la acción de inspección o tránsito del terreno en español sin sonar mecánico.
- source_word: וְכִתְבוּ אוֹתָהּ
  english_pob_choice: write it down
  chosen_spanish: escríbanla
  alternatives_spanish:
  - regístrenla
  - descríbanla por escrito
  lexicon: HALOT
  rationale: El pronombre retoma la tierra. «Escríbanla» conserva el referente directo y el carácter de redacción/survey del mandato.
- source_word: וְשׁוּבוּ אֵלַי
  english_pob_choice: return to me
  chosen_spanish: vuelvan a mí
  alternatives_spanish:
  - regresen a mí
  - vengan de vuelta a mí
  lexicon: HALOT
  rationale: שוב indica volver al punto de origen. «Vuelvan a mí» mantiene la sencillez y la relación personal de la instrucción.
- source_word: וּפֹה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - entonces aquí
  lexicon: HALOT
  rationale: Adverbio de lugar que apunta al sitio donde habla Josué. «Aquí» es el equivalente más directo.
- source_word: אַשְׁלִיךְ לָכֶם גּוֹרָל
  english_pob_choice: I will cast lots for you
  chosen_spanish: echaré para ustedes las suertes
  alternatives_spanish:
  - echaré suertes para ustedes
  - haré echar la suerte para ustedes
  lexicon: HALOT
  rationale: גורל se usa aquí para el reparto por sorteo. En español, «echaré para ustedes las suertes» conserva la imagen verbal y el plural que se refleja mejor en el uso natural que «la suerte» singular.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La fórmula cultual indica presencia y evaluación divina. «Delante de Yahvé» preserva la relación espacial/ritual sin sustituir el nombre divino por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración editorial del nombre divino establecida para el proyecto, en continuidad con el testimonio directo del Tetragrámaton.
- source_word: בְּשִׁלֹה
  english_pob_choice: in Shiloh
  chosen_spanish: en Silo
  alternatives_spanish:
  - en Siló
  - en Shiloh
  lexicon: HALOT
  rationale: El topónimo se adapta a la forma española común «Silo», sin cambiar el referente geográfico.
theological_decisions:
- issue: Rendición del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo la política del proyecto, se preserva el nombre propio divino en español como «Yahvé», no como una sustitución titulante.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: El gesto de asignación por sorteo ante Dios
  english_pob_reading: I will cast lots for you before Yahweh in Shiloh
  chosen_spanish_reading: echaré para ustedes las suertes delante de Yahvé en Silo
  alternative_spanish_readings:
  - echaré suertes para ustedes delante de Yahvé en Silo
  - haré el sorteo para ustedes delante de Yahvé en Silo
  rationale: La escena no es un acto meramente administrativo; el sorteo ocurre en la presencia divina y en el lugar designado para ello. La redacción conserva ese marco sagrado sin interpretarlo de más.
  doctrine_reference: Principio POB sobre preservar la fuerza cultual y narrativa del texto base
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «cast the lot» a «cast lots» para reflejar mejor el plural del sustantivo hebreo y el uso idiomático. La redacción española adopta «echaré para ustedes las suertes» para mantener ese plural y la imagen ritual sin perder naturalidad.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el topónimo como «Silo» en español, coherente con el uso bíblico tradicional y la práctica del proyecto.
  - El mandato de «escribir la tierra» se mantiene en nota como tensión literal/funcional, sin eliminar el sentido de levantamiento de un informe territorial.
