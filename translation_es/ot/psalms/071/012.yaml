lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Oh, Dios
  lexicon: HALOT
  rationale: En este contexto es un vocativo dirigido al Dios de Israel. En español, «Dios» funciona de manera natural y reverente sin añadir una partícula vocativa que el hebreo no exige.
- source_word: אַל
  english_pob_choice: do not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no vayas a
  - que no
  lexicon: HALOT
  rationale: La partícula negativa en una súplica se expresa con claridad y naturalidad en español con «no», manteniendo el tono de petición urgente.
- source_word: תִּרְחַק
  english_pob_choice: be far
  chosen_spanish: alejes
  alternatives_spanish:
  - estés lejos
  - te apartes
  lexicon: HALOT
  rationale: El verbo raíz רחק comunica distancia relacional o espacial. En español, «no te alejes de mí» conserva esa metáfora de separación sin sonar forzado.
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - lejos de mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona expresa separación desde el hablante; «de mí» reproduce directamente esa relación.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: Dios mío
  alternatives_spanish:
  - Oh, Dios mío
  lexicon: HALOT
  rationale: La forma con sufijo posesivo expresa relación personal y dependencia. «Dios mío» es la equivalencia natural y reverente en español.
- source_word: לְעֶזְרָתִי
  english_pob_choice: to help me
  chosen_spanish: a ayudarme
  alternatives_spanish:
  - para ayudarme
  - en mi ayuda
  lexicon: HALOT
  rationale: Después del verbo de prisa, el infinitivo en español («a ayudarme») comunica la meta de la acción con fluidez. «En mi ayuda» sería más literal, pero menos idiomático.
- source_word: חִישָׁה
  english_pob_choice: hurry
  chosen_spanish: apresúrate
  alternatives_spanish:
  - date prisa
  - ven rápido
  lexicon: HALOT
  rationale: La forma exhortativa transmite urgencia. «Apresúrate» mantiene la fuerza imperativa y un tono digno, cercano al valor hebreo de prisa.
theological_decisions:
- issue: Tratamiento de los dos vocativos divinos en la oración
  english_pob_reading: God ... my God
  chosen_spanish_reading: Dios ... Dios mío
  alternative_spanish_readings:
  - Oh, Dios ... Oh, Dios mío
  rationale: El hebreo presenta dos invocaciones directas. En español se conserva esa duplicación, que intensifica la dependencia del orante, sin introducir un estilo arcaizante no exigido por el texto.
  doctrine_reference: La oración poética mantiene el paralelismo y la dirección personal a Dios sin alterar el sentido devocional del pasaje.
translation_notes:
  revision_awareness: El texto inglés auditado no muestra revisiones sustantivas; el draft español sigue de cerca la lectura estable del hebreo y la solución inglesa acordada, preservando el paralelismo de los dos llamados a Dios y la urgencia del ruego.
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהִים y «Dios mío» para אֱלֹהַי, manteniendo la relación personal implícita en el sufijo.
  - Se optó por «apresúrate» en lugar de «hazte rápido» o «ven rápido» por fluidez y dignidad.
  - «No te alejes de mí» conserva la metáfora espacial de רחק sin volverla explicativa.
  - La nota al pie ofrece la alternativa vocativa explícita, reflejando la pequeña tensión entre español natural y un vocativo más marcado.
