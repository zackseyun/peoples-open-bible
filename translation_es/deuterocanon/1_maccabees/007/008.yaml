translation:
  language: es
  text: Y el rey escogió a Báquides, uno de los Amigos del rey[a], gobernador de la región más allá del Río[b], grande en el reino y fiel al rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Amigos del rey» probablemente refleja un rango cortesano oficial o una clase reconocida de consejeros o compañeros reales en la administración helenística, no solo amistad personal.
    reason: cultural_note
  - marker: b
    text: «Más allá del Río» es una designación territorial; probablemente la región al oeste del Éufrates bajo administración imperial. Como alternativa, puede entenderse simplemente como «más allá del Río».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέλεξεν
  english_pob_choice: chose
  chosen_spanish: escogió
  alternatives_spanish:
  - eligió
  - seleccionó
  lexicon: LSJ
  rationale: El verbo griego expresa una elección concreta. «Escogió» mantiene el sentido directo y resulta natural en español; «eligió» y «seleccionó» son posibles, pero «escogió» conserva mejor la acción personal del rey sin añadir matices administrativos.
- source_word: τὸν Βακχίδην
  english_pob_choice: Bacchides
  chosen_spanish: Bacquides
  alternatives_spanish:
  - Bacides
  - Báquides
  lexicon: Transliteración histórica de nombre propio
  rationale: Se conserva el nombre propio en forma españolizada y reconocible. «Bacquides» evita una transliteración demasiado cruda y se ajusta al uso editorial hispano cuando hay nombre histórico asentado.
- source_word: τῶν φίλων τοῦ βασιλέως
  english_pob_choice: one of the king’s Friends
  chosen_spanish: uno de los Amigos del rey
  alternatives_spanish:
  - uno de los amigos del rey
  - uno de los compañeros del rey
  lexicon: LSJ
  rationale: Se mantiene la mayúscula en «Amigos» para reflejar la posible categoría técnica de corte que documenta el POB inglés. En español, «Amigos del rey» conserva esa posible designación oficial mejor que una minúscula meramente relacional.
- source_word: κυριεύοντα
  english_pob_choice: governor
  chosen_spanish: gobernador
  alternatives_spanish:
  - gobernante
  - administrador
  - que gobernaba
  lexicon: LSJ
  rationale: Siguiendo la revisión inglesa, el participio se entiende como función/cargo en contexto. «Gobernador» comunica la autoridad territorial de modo natural en español sin diluir el matiz oficial.
- source_word: ἐν τῷ πέραν τοῦ ποταμοῦ
  english_pob_choice: in the region beyond the River
  chosen_spanish: de la región de más allá del Río
  alternatives_spanish:
  - más allá del Río
  - en la región más allá del Río
  - de Trans-Éufrates
  lexicon: LSJ
  rationale: La expresión funciona como designación territorial. «De la región de más allá del Río» sigue el valor geográfico-político del griego y preserva la mayúscula en «Río» como término técnico, tal como hace el POB inglés.
- source_word: μέγαν ἐν τῇ βασιλείᾳ
  english_pob_choice: great in the kingdom
  chosen_spanish: grande en el reino
  alternatives_spanish:
  - importante en el reino
  - prominente en el reino
  lexicon: LSJ
  rationale: «Grande» reproduce la valoración de rango o peso social sin interpretar de más. Aunque «prominente» o «importante» explicitan mejor el matiz, «grande en el reino» se mantiene más cerca de la formulación del griego y del POB inglés.
- source_word: πιστὸν τῷ βασιλεῖ
  english_pob_choice: faithful to the king
  chosen_spanish: fiel al rey
  alternatives_spanish:
  - leal al rey
  - fidedigno al rey
  lexicon: LSJ
  rationale: «Fiel» es el equivalente más natural y directo de πιστός en este contexto político. «Leal» también funciona, pero «fiel» conserva la amplitud semántica de confiable y leal sin estrecharla.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que entendió κυριεύοντα no como un mero «gobernar» genérico sino como una función de cargo, por eso se traduce «gobernador de la región de más allá del Río». También conserva la nota de contexto sobre «los Amigos del rey» y la posible ambigüedad territorial de «más allá del Río».
  spanish_consistency_notes:
  - Se usa «Yahvé» no porque aparezca aquí un tetragrámaton, sino por coherencia con la terminología general del proyecto cuando corresponda; en este versículo no aplica.
  - Se mantiene la capitalización de «Amigos» por coherencia con la posible terminología cortesana técnica documentada en el audit trail inglés.
  - Se evita «SEÑOR» para κύριος/κύριος no pertinente aquí; el versículo no contiene un uso divino del título.
  - «Río» se deja con mayúscula siguiendo el carácter de designación territorial heredado del contexto inglés y para distinguirlo de un río genérico.
