translation:
  language: es
  text: Desde tu templo[a][c] por encima de Jerusalén, los reyes te traerán tributo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por causa de tu templo en Jerusalén».'
    reason: alternative_reading
  - marker: b
    text: 'O: «regalo» o «presente».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «en Jerusalén».'
    reason: previous_rendering
lexical_decisions:
- source_word: מֵהֵיכָלֶךָ
  english_pob_choice: From your temple
  chosen_spanish: Desde tu templo
  alternatives_spanish:
  - Desde tu santuario
  - De tu templo
  lexicon: HALOT
  rationale: El hebreo expresa origen o procedencia con מִן; en español, «desde» conserva bien ese movimiento desde un lugar. «Templo» es la equivalencia natural de הֵיכָל en este contexto.
- source_word: עַל יְרוּשָׁלִָם
  english_pob_choice: above Jerusalem
  chosen_spanish: sobre Jerusalén
  alternatives_spanish:
  - en Jerusalén
  - en Jerusalén, sobre ella
  - por encima de Jerusalén
  lexicon: HALOT
  rationale: La preposición עַל mantiene su fuerza espacial mejor con «sobre» que con una simple localización «en». En español, «sobre Jerusalén» preserva la tensión del texto sin volverlo torpe.
- source_word: לְךָ
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: HALOT
  rationale: Con «traer» y un objeto directo animado, el dativo español natural es «te». Mantiene el destinatario sin añadir énfasis innecesario.
- source_word: יוֹבִילוּ
  english_pob_choice: will bring
  chosen_spanish: traerán
  alternatives_spanish:
  - llevarán
  - conducirán
  lexicon: HALOT
  rationale: Aunque el verbo puede significar «llevar/traer/conducir», con reyes y tributo la acción idiomática en español es «traer». Refleja el acto de presentar ofrendas o tributo.
- source_word: מְלָכִים
  english_pob_choice: kings
  chosen_spanish: los reyes
  alternatives_spanish:
  - reyes
  - monarcas
  lexicon: HALOT
  rationale: «Reyes» es la correspondencia directa y conserva la imagen de gobernantes de las naciones rindiendo honor a Dios.
- source_word: שָׁי
  english_pob_choice: tribute
  chosen_spanish: tributo
  alternatives_spanish:
  - regalo
  - presente
  - ofrenda
  lexicon: HALOT
  rationale: שָׁי puede ser un regalo, pero en este contexto de reyes que presentan dones a un superior, «tributo» capta mejor el matiz honorífico y político. La nota conserva la alternativa léxica.
theological_decisions:
- issue: Relación sintáctica entre el templo y Jerusalén
  english_pob_reading: The line is rendered as describing God's temple as above Jerusalem, from which/with reference to which kings bring tribute.
  chosen_spanish_reading: 'Se mantiene la imagen espacial: el templo de Dios está «sobre Jerusalén», y desde allí los reyes le traen tributo.'
  alternative_spanish_readings:
  - Desde tu templo en Jerusalén, los reyes te traerán tributo
  - Por tu templo en Jerusalén, los reyes te traerán tributo
  rationale: El hebreo permite distintas relaciones entre מִן y עַל. La versión española conserva la fuerza espacial sin convertirla en una paráfrasis causal que suavice el texto original.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión inglesa más reciente volvió a «above Jerusalem» para reflejar mejor עַל; la presente versión española sigue esa decisión con «sobre Jerusalén», evitando el suavizado a una mera ubicación en Jerusalén. También conserva el valor de procedencia de מִן con «desde».
  spanish_consistency_notes:
  - Se mantiene «templo» para הֵיכָל, en línea con el uso bíblico estándar y la auditoría inglesa.
  - Se usa «tributo» como término principal para שָׁי, pero se aclara la alternativa «regalo/presente» en nota.
  - La preposición espacial «sobre» conserva la tensión semántica de עַל sin forzar un calco poco natural.
  - No se usa «SEÑOR» para יהוה en este versículo, ya que el texto hebreo no contiene el nombre divino explícito.
