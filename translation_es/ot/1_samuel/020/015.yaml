  text: וְ/לֹֽא תַכְרִ֧ת אֶֽת חַסְדְּ/ךָ֛ מֵ/עִ֥ם בֵּיתִ֖/י עַד עוֹלָ֑ם וְ/לֹ֗א בְּ/הַכְרִ֤ת יְהוָה֙ אֶת אֹיְבֵ֣י דָוִ֔ד אִ֕ישׁ מֵ/עַ֖ל פְּנֵ֥י הָ/אֲדָמָֽה־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/020/015.yaml
  text: And you shall not cut off your steadfast love from my house forever[a], not even when Yahweh cuts off David’s enemies, every one of them, from the face of the earth.
  footnotes:
