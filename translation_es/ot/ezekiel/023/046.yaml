revisions:
- from: 'Porque así dice el Señor Yahvé: Haz subir contra ellos una asamblea, y entrégalos[a] al terror y al saqueo.'
  to: 'Porque así dice el Señor Yahvé: Haz subir contra ellas una asamblea, y entrégalas[a] al terror y al saqueo.'
  rationale: Se corrige el referente pronominal al femenino para reflejar mejor אֶתְהֶן y el contexto de las dos mujeres simbólicas en el capítulo. Se mantiene 'el Señor Yahvé', 'asamblea', 'terror' y 'saqueo' por fidelidad al audit trail y al glosario del proyecto. La reparación es pequeña y no requiere adjudicación adicional.
