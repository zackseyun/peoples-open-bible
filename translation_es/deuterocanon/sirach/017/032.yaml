  spanish_quality_summary: La frase es legible, pero 'la hostia del alto cielo' resulta seriamente inadecuada y potencialmente escandalosa o confusa en español eclesial. 'Hueste' es la opción natural y digna aquí. También mejora la naturalidad mover la nota léxica al término que realmente necesita aclaración. El resto del verso suena bien en un registro bíblico moderno.
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto. La principal cuestión léxica es δύναμιν: el audit trail inglés adoptó ''host'' con nota alternativa ''power''. En español debe renderizarse como ''hueste'', no ''hostia''. ''Todos los hombres'' con nota inclusiva es defendible porque sigue la decisión auditada; ''tierra y ceniza'' está correctamente alineado.'
