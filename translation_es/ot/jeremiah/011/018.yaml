translation:
  language: es
  text: Yahvé me dio a conocer eso[a], y yo lo supe; entonces me mostraste sus hechos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo pasa de nombrar a Yahvé en tercera persona a dirigirse a él en segunda persona ('me mostraste'). Algunas traducciones suavizan el cambio a 'me mostró'.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיהוָה
  english_pob_choice: And Yahweh / the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: HALOT
  rationale: El texto hebreo nombra explícitamente a יהוה; por la terminología base del proyecto, se conserva el nombre divino como 'Yahvé' en vez de reemplazarlo por una convención de máscara. Se omite 'Y' inicial enlazante porque en español la frase fluye de forma natural sin repetir la conjunción inicial del hebreo en esta posición.
- source_word: הוֹדִיעַנִי
  english_pob_choice: made it known to me
  chosen_spanish: me dio a conocer
  alternatives_spanish:
  - me hizo saber
  - me informó
  lexicon: HALOT
  rationale: 'El hifil de ידע tiene fuerza causativa: ''hacer saber'', ''dar a conocer''. ''Me dio a conocer'' conserva esa causalidad de modo natural en español y evita un ''me informó'' que suena más administrativo.'
- source_word: וָאֵדָעָה
  english_pob_choice: and I knew
  chosen_spanish: y yo lo supe
  alternatives_spanish:
  - y conocí
  - y supe
  lexicon: HALOT
  rationale: La conjunción simple se refleja con 'y'. 'Yo lo supe' transmite el resultado de la revelación con un objeto implícito en español, equivalente al valor general del verbo hebreo sin añadir matices causales no explicitados.
- source_word: אָז
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - luego
  - en ese momento
  lexicon: HALOT
  rationale: אָז introduce secuencia temporal; 'entonces' es la opción más natural y fiel en español, manteniendo el avance narrativo.
- source_word: הִרְאִיתַנִי
  english_pob_choice: you showed me
  chosen_spanish: me mostraste
  alternatives_spanish:
  - me hiciste ver
  - me dejaste ver
  lexicon: HALOT
  rationale: El hifil de ראה es causativo. 'Me mostraste' preserva esa idea de hacer ver y además respeta el cambio de persona del hebreo, que pasa del nombre divino en tercera persona a la segunda persona de trato directo.
- source_word: מַעַלְלֵיהֶם
  english_pob_choice: their deeds
  chosen_spanish: sus hechos
  alternatives_spanish:
  - sus obras
  - sus acciones
  lexicon: HALOT
  rationale: מַעֲלָלִים denota acciones o hechos, a menudo con carga moral en los profetas. 'Hechos' es breve, claro y no sobreinterpreta con 'malos' o 'malvados' donde el hebreo no añade un adjetivo explícito.
theological_decisions:
- issue: Representación de יהוה (YHWH)
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue el criterio doctrinal del proyecto para preservar el nombre del pacto en su forma transparente. 'Yahvé' evita ocultar el Tetragrámaton y mantiene coherencia con el texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Cambio de referencia de tercera a segunda persona en el mismo verso
  english_pob_reading: 'Retain the shift: ''the LORD ... then you showed me'''
  chosen_spanish_reading: 'Mantener el cambio: ''Yahvé ... entonces me mostraste'''
  alternative_spanish_readings:
  - 'Suavizar a tercera persona: ''Yahvé ... entonces me mostró'''
  rationale: 'El hebreo presenta un quiebre retórico real: primero se nombra a Yahvé y luego se lo interpela directamente. Conservar ese giro en español evita nivelar la textura del discurso profético.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'so I knew' a 'and I knew' para reflejar más directamente la conjunción hebrea. En español se optó por 'y yo lo supe', que mantiene la coordinación simple sin introducir una causalidad adicional.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה conforme al estándar español del proyecto.
  - '''Hechos'' se usa para מַעַלְלֵיהֶם por su neutralidad y porque el contexto profético ya aporta la valoración.'
  - El cambio de persona en el final del verso queda visible en la traducción y en la nota, sin normalizarlo.
