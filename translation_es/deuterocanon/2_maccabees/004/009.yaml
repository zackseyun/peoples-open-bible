  source_alignment_summary: 'El borrador sigue bien el sentido del griego y del POB inglés: mantiene la suma adicional, la condición de una concesión de autoridad, el gimnasio, la ἐφηβία como institución juvenil, y la inscripción de los de Jerusalén como ''antioquenos'' sin sobredefinir su estatus jurídico. Sin embargo, dos giros españoles debilitan la precisión y la naturalidad: ''por medio de su autoridad'' suena torpe en contexto político, y ''una inscripción de jóvenes'' no comunica con claridad el sentido institucional de ἐφηβία.'
