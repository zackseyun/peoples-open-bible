translation:
  language: es
  text: Y vi en mi sueño, y he aquí, siete espigas[a] subían en un solo tallo, llenas y buenas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siete cabezas de grano». El término hebreo puede referirse a la espiga o cabeza del cereal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵרֶא
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Entonces vi
  - Y yo vi
  lexicon: HALOT
  rationale: El wayyiqtol de ראה conserva la secuencia narrativa en primera persona. «Y vi» reproduce ese avance sin añadir énfasis innecesario.
- source_word: בַּחֲלֹמִי
  english_pob_choice: in my dream
  chosen_spanish: en mi sueño
  alternatives_spanish:
  - en mi sueño-visión
  - en mi sueño
  lexicon: HALOT
  rationale: El hebreo con sufijo posesivo remite naturalmente a una experiencia onírica. «Sueño» es claro y fluido en español; en este contexto puede cubrir el valor de sueño profético sin sobrecargar la frase.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y allí
  lexicon: HALOT
  rationale: La fórmula introduce una presentación vívida e inmediata. «He aquí» conserva mejor esa fuerza discursiva que una simple relación expositiva.
- source_word: שֶׁבַע שִׁבֳּלִים
  english_pob_choice: seven ears of grain
  chosen_spanish: siete espigas de grano
  alternatives_spanish:
  - siete cabezas de grano
  - siete espigas
  lexicon: HALOT
  rationale: שִׁבֹּלֶת puede referirse a la espiga/cabeza de cereal. «Espigas de grano» mantiene la imagen agrícola y evita la ambigüedad de un término más técnico o más general.
- source_word: עֹלֹת
  english_pob_choice: were coming up
  chosen_spanish: subían
  alternatives_spanish:
  - iban creciendo
  - brotaban
  - subían
  lexicon: HALOT
  rationale: El participio presenta la acción en desarrollo dentro del relato del sueño. «Subían» es breve y natural en español, y conserva el movimiento ascendente.
- source_word: בְּקָנֶה אֶחָד
  english_pob_choice: on one stalk
  chosen_spanish: en una sola caña
  alternatives_spanish:
  - en un solo tallo
  - sobre una sola caña
  - en una sola caña
  lexicon: HALOT
  rationale: קָנֶה designa un tallo/caña/reed-like stem. «Caña» es fiel al campo semántico y funciona bien con la imagen de varias espigas en un solo eje.
- source_word: מְלֵאֹת
  english_pob_choice: full
  chosen_spanish: llenas
  alternatives_spanish:
  - llenas
  - colmadas
  - rebosantes
  lexicon: HALOT
  rationale: El adjetivo expresa plenitud física de las espigas. «Llenas» es la correspondencia más directa y mantiene el paralelismo con el adjetivo siguiente.
- source_word: וְטֹבֹות
  english_pob_choice: and good
  chosen_spanish: y buenas
  alternatives_spanish:
  - y buenas
  - y sanas
  - y hermosas
  lexicon: HALOT
  rationale: טוֹב aquí califica favorablemente el aspecto de las espigas. «Buenas» preserva la amplitud semántica del hebreo sin restringirlo a una sola cualidad agrícola.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el acuerdo alto del control cruzado; se mantuvieron las decisiones léxicas clave del POB inglés (especialmente la imagen agrícola, la fuerza de וְהִנֵּה y la continuación narrativa de וָאֵרֶא) con equivalentes naturales en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene una sintaxis sencilla y bíblica, evitando calcos duros como «y he aquí» solo cuando el valor discursivo lo justificaba; aquí sí se preserva por su función en el hebreo.
  - «Espigas de grano» conserva la alternativa lexical documentada por el POB inglés mediante nota al pie.
