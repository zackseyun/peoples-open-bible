revisions:
- from: Y reunió Salomón carros y jinetes[a]; y tuvo 1.400 carros y 12.000 jinetes[b], y los colocó en las ciudades de los carros y junto al rey en Jerusalén.
  to: Y reunió Salomón carros y jinetes[a]; y tuvo 1.400 carros y 12.000 jinetes, y los apostó en las ciudades de carros[b] y con el rey en Jerusalén.
  rationale: Se ajusta el verbo a un término más apropiado para el contexto militar («apostó»), se mejora la naturalidad de la frase técnica («ciudades de carros») y se acerca la última preposición al hebreo y al audit trail inglés («con el rey»). Se conservan el sentido, las cifras y las dos notas del registro inglés, reanclando correctamente la nota cultural al sintagma pertinente.
