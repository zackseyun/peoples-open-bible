translation:
  language: es
  text: Y expulsó de ella toda impureza[a], y estableció en ella a hombres que practican la ley, y la fortificó[b], y se construyó en ella una residencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda inmundicia» o «toda contaminación». El griego puede referirse ampliamente a impureza ritual o moral.
    reason: lexical_alternative
  - marker: b
    text: O simplemente «la fortificó»; el verbo compuesto puede sugerir fortalecimiento adicional.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξέβαλεν
  english_pob_choice: drove out
  chosen_spanish: expulsó
  alternatives_spanish:
  - echó fuera
  - arrojó fuera
  - expulsó de allí
  lexicon: LSJ
  rationale: El verbo expresa una acción enérgica de remoción. En español, «expulsó» comunica con naturalidad esa eliminación forzosa sin perder la fuerza del aoristo narrativo.
- source_word: ἀκαθαρσίαν
  english_pob_choice: impurity
  chosen_spanish: impureza
  alternatives_spanish:
  - inmundicia
  - contaminación
  - inmundicia ritual
  lexicon: LSJ
  rationale: El término griego puede abarcar impureza ritual o moral. «Impureza» conserva ese alcance amplio y evita restringir indebidamente el sentido.
- source_word: κατῴκισεν
  english_pob_choice: settled
  chosen_spanish: estableció en ella
  alternatives_spanish:
  - instaló en ella
  - hizo habitar en ella
  - pobló
  lexicon: LSJ
  rationale: La idea es que colocó habitantes allí. «Estableció en ella» comunica el acto de asentar residentes de manera idiomática y suficientemente precisa.
- source_word: ἄνδρας
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - varones
  lexicon: LSJ
  rationale: El griego usa un plural masculino explícito. «Hombres» preserva esa precisión de género sin neutralizar el término.
- source_word: οἵτινες τὸν νόμον ποιοῦσιν
  english_pob_choice: who practice the law
  chosen_spanish: que practican la ley
  alternatives_spanish:
  - que guardan la ley
  - que cumplen la ley
  - que hacen la ley
  lexicon: LSJ
  rationale: ποιέω con νόμος aquí expresa observar/poner en práctica la ley. «Practican la ley» mantiene el matiz de conducta continuada y evita una traducción demasiado legalista o mecánica.
- source_word: προσοχύρωσεν
  english_pob_choice: fortified it
  chosen_spanish: la fortificó
  alternatives_spanish:
  - la reforzó
  - la aseguró
  - la fortificó aún más
  lexicon: LSJ
  rationale: El prefijo añade la idea de reforzamiento, pero el último repaso del inglés eliminó «further» por no estar explícito. En español, «la fortificó» conserva el sentido sin introducir un incremento no marcado.
- source_word: ᾠκοδόμησεν ... οἴκησιν
  english_pob_choice: built for himself a residence
  chosen_spanish: se construyó allí una residencia
  alternatives_spanish:
  - se edificó allí una casa
  - se construyó allí una vivienda
  - se hizo allí una morada
  lexicon: LSJ
  rationale: La construcción enfatiza una morada propia. «Residencia» es natural en español moderno y preserva la idea de un lugar de habitación personal, mientras «se construyó» refleja el dativo de interés («para sí»).
theological_decisions:
- issue: Alcance de ἀκαθαρσία en contexto de purificación y reinstalación
  english_pob_reading: every impurity
  chosen_spanish_reading: toda impureza
  alternative_spanish_readings:
  - toda inmundicia
  - todo defilement
  rationale: El texto no especifica si la impureza es ritual, moral o cultual/política. «Impureza» mantiene abierta esa tensión histórica y religiosa, en línea con el criterio de no resolverla indebidamente.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: Valor de ἄνδρας en el asentamiento de habitantes
  english_pob_reading: men
  chosen_spanish_reading: hombres
  alternative_spanish_readings:
  - personas
  - varones
  rationale: El sustantivo griego es masculino y el contexto histórico no exige neutralización. Se conserva la precisión del género gramatical y referencial.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: 'La redacción española sigue el repaso final del inglés POB: se evita añadir una idea de refuerzo adicional explícito en el verbo de «fortificar», porque el ajuste revisado eliminó ese matiz no atestiguado de forma directa. También se conserva el valor amplio de ἀκαθαρσία y la precisión masculina de ἄνδρας, siguiendo el expediente auditado.'
  spanish_consistency_notes:
  - Se mantiene «impureza» como término amplio y sobrio para ἀκαθαρσία.
  - Se usa «hombres» para ἄνδρας, en concordancia con la política de precisión de género.
  - «La fortificó» evita sobretraducir el prefijo griego con un adverbio de grado no explicitado.
  - «Se construyó allí una residencia» conserva el sentido de habitación propia sin calco excesivo.
