translation:
  language: es
  text: Estos eran los que servían al rey[a], además de los que el rey había puesto en las ciudades fortificadas por todo Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «además de los que el rey había colocado en las ciudades fortificadas por todo Judá».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְשָׁרְתִים
  english_pob_choice: serving
  chosen_spanish: servían
  alternatives_spanish:
  - ministraban
  - atendían
  - eran los que servían
  lexicon: HALOT
  rationale: El participio hebreo expresa acción continua o habitual en función oficial. En español, el imperfecto 'servían' conserva esa fuerza verbal y suena natural en este contexto administrativo-militar, evitando 'ministraban', que sería demasiado eclesiástico.
- source_word: אֶת הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al rey
  - del rey
  lexicon: HALOT
  rationale: El marcador de objeto directo más el sustantivo identifican claramente a la persona a quien prestaban servicio. 'Al rey' reproduce la relación verbal sin añadir matices ajenos.
- source_word: מִלְּבַד
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - además de
  - fuera de
  lexicon: HALOT
  rationale: La expresión marca exclusión o adición respecto del grupo ya mencionado. 'Además de' comunica bien esa distinción en español y evita la ambigüedad de 'aparte de' en un registro más coloquial.
- source_word: אֲשֶׁר נָתַן
  english_pob_choice: whom ... had stationed
  chosen_spanish: que el rey había puesto
  alternatives_spanish:
  - que el rey había estacionado
  - que el rey había colocado
  - que el rey había nombrado
  lexicon: HALOT
  rationale: נתן literalmente significa 'dar/poner', y aquí se usa en un marco administrativo para indicar asignación a un lugar. 'Había puesto' respeta el valor básico del verbo sin forzar un tecnicismo militar poco natural en español.
- source_word: בְּעָרֵי הַמִּבְצָר
  english_pob_choice: in the fortified cities
  chosen_spanish: en las ciudades fortificadas
  alternatives_spanish:
  - en las ciudades fortificadas
  - en las ciudades de fortaleza
  - en las ciudades-fortaleza
  lexicon: HALOT
  rationale: El constructo designa ciudades reforzadas para defensa. 'Ciudades fortificadas' es la equivalencia clara y estándar en español, manteniendo el rasgo defensivo del término.
- source_word: בְּכָל יְהוּדָה
  english_pob_choice: throughout all Judah
  chosen_spanish: de todo Judá
  alternatives_spanish:
  - en todo Judá
  - por todo Judá
  - a lo largo de todo Judá
  lexicon: HALOT
  rationale: La preposición con כל expresa distribución por toda la región. 'De todo Judá' comunica esa cobertura total de manera natural y compacta en español.
- source_word: אֵלֶּה
  english_pob_choice: These were the ones
  chosen_spanish: Estos eran los que
  alternatives_spanish:
  - Estos eran
  - Estos eran los que servían
  lexicon: HALOT
  rationale: El demostrativo retoma el grupo previamente identificado. 'Estos eran los que' conserva la función resumptiva y mantiene un español fluido, equivalente al valor anafórico del hebreo.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido estable del hebreo masorético y con el audit trail inglés: servidumbre/atención oficial, distinción aditiva con מִלְּבַד, y asignación de personal en ciudades fortificadas. No se reportan revisiones aplicadas ni tensiones textuales relevantes en esta unidad.'
  spanish_consistency_notes:
  - Se mantiene 'rey' en minúscula por tratarse de un rey humano, no un título divino.
  - '''Judá'' se conserva como nombre propio territorial en español bíblico estándar.'
  - El verbo 'ser/servir' se usa para reproducir la estructura resumptiva sin volver la frase pesada.
