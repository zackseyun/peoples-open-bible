translation:
  language: es
  text: Así el mensajero fue y llegó, y le comunicó a David todo lo que Joab lo había enviado a decir[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «todo lo que Joab lo había enviado». El sentido es que el mensajero informó todo lo que Joab lo había enviado a comunicar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּלְאָךְ
  english_pob_choice: the messenger
  chosen_spanish: el mensajero
  alternatives_spanish:
  - el enviado
  - el ángel
  lexicon: HALOT
  rationale: En este contexto narrativo militar y humano, מַלְאָךְ designa a un mensajero, no a un ser celestial. «Mensajero» conserva el sentido normal y evita una carga angélica ajena al pasaje.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - salió
  - se fue
  lexicon: HALOT
  rationale: El wayyiqtol avanza la acción de forma simple. «Fue» es natural en español y mantiene el movimiento narrativo sin añadir matices innecesarios.
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: HALOT
  rationale: Aquí el verbo expresa la llegada al destino de la misión. «Llegó» comunica bien el resultado del movimiento en español moderno, aunque el hebreo conserva la secuencia «fue y vino/llegó».
- source_word: וַיַּגֵּד
  english_pob_choice: told
  chosen_spanish: le comunicó
  alternatives_spanish:
  - le contó
  - le informó
  lexicon: HALOT
  rationale: נגד en hiphil significa contar, informar, dar noticia. «Le comunicó» preserva el acto formal de transmitir un mensaje y funciona bien con el complemento indirecto.
- source_word: אֵת כָּל אֲשֶׁר
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo cuanto
  - cuanto
  lexicon: HALOT
  rationale: La expresión marca totalidad del contenido transmitido. «Todo lo que» es la forma más clara y natural en español para reflejar esa amplitud.
- source_word: שְׁלָח֖/וֹ יוֹאָֽב
  english_pob_choice: Joab had sent him to say
  chosen_spanish: Joab le había mandado decir
  alternatives_spanish:
  - Joab le había enviado
  - Joab le había ordenado comunicar
  lexicon: HALOT
  rationale: El hebreo literalmente dice «lo que Joab le había enviado/mandado». La ampliación española explicita la fuerza comunicativa que el POB inglés también resolvió idiomáticamente, sin dejar el verbo aislado ni perder el referente del mensaje.
- source_word: לְדָוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Nombre propio conservado en la forma española estándar.
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés y el hebreo masorético. Se preserva la secuencia narrativa de tres verbos de movimiento/entrega y se mantiene la ampliación interpretativa sobre el contenido del envío, que en hebreo aparece de forma elíptica.
  spanish_consistency_notes:
  - Se usa «mensajero» para מַלְאָךְ en sentido humano, reservando «ángel» para contextos celestiales.
  - Se eligió «le comunicó» para mantener un registro claro y formal sin volver rígido el español.
  - La nota[a] conserva la tensión entre la literalidad hebrea y la equivalencia idiomática aceptada por el POB inglés.
