  text: וַ/תֻּתַּ֤שׁ בְּ/חֵמָה֙ לָ/אָ֣רֶץ הֻשְׁלָ֔כָה וְ/ר֥וּחַ הַ/קָּדִ֖ים הוֹבִ֣ישׁ פִּרְיָ֑/הּ הִתְפָּרְק֧וּ וְ/יָבֵ֛שׁוּ מַטֵּ֥ה עֻזָּ֖/הּ אֵ֥שׁ אֲכָלָֽתְ/הוּ׃
