translation:
  language: es
  text: 'Entonces Josué ordenó a los oficiales del pueblo, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: Then ... commanded
  chosen_spanish: Entonces ... ordenó
  alternatives_spanish:
  - Y ... mandó
  - Luego ... comandó
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; «Entonces» conserva esa secuencia de manera natural en español. «Ordenó» mantiene la fuerza directiva de צוה sin sonar tan militar como «mandó» ni tan técnico o menos idiomático como «comandó».
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Joshua
  lexicon: Nombre propio bíblico estándar
  rationale: En español bíblico, el nombre se vierte como «Josué», la forma estable y reconocible en la tradición castellana, manteniendo equivalencia directa con el nombre hebreo.
- source_word: שֹׁטְרֵי
  english_pob_choice: officers
  chosen_spanish: oficiales
  alternatives_spanish:
  - oficiales administrativos
  - inspectores
  - jefes
  lexicon: HALOT
  rationale: שֹׁטֵר designa un funcionario u ოფicial administrativo; «oficiales» conserva esa función sin cargar innecesariamente con un matiz militar que el término no exige.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - del pueblo
  - de la gente
  - de la nación
  lexicon: HALOT
  rationale: Aquí עָם se refiere a la comunidad reunida/covenantal; «del pueblo» es idiomático en español y mantiene la referencia colectiva sin hacerla más abstracta como «la nación».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - diciendo
  - 'así:'
  - y les dijo
  lexicon: HALOT
  rationale: La fórmula introduce el discurso siguiente; «diciendo» reproduce de forma transparente la función discursiva de לֵאמֹר sin añadir contenido interpretativo.
