translation:
  language: es
  text: 'Y esto dijo para Judá: «Oye, Yahvé, la voz de Judá, y tráelo a su pueblo. Que sus manos luchen por él[a], y sé una ayuda contra sus adversarios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Que sus manos le basten». La cláusula hebrea es difícil y se ha entendido de más de una manera.
    reason: alternative_reading
lexical_decisions:
- source_word: וְזֹאת
  english_pob_choice: And this
  chosen_spanish: Y esto
  alternatives_spanish:
  - Y esto es
  - Ahora esto
  lexicon: HALOT
  rationale: La forma introduce una nueva bendición tribal; en español, 'Y esto' comunica la transición discursiva de manera natural y breve.
- source_word: לִיהוּדָה
  english_pob_choice: for Judah
  chosen_spanish: acerca de Judá
  alternatives_spanish:
  - para Judá
  - con respecto a Judá
  lexicon: HALOT
  rationale: El ל aquí marca referencia temática dentro de la bendición. 'Acerca de Judá' preserva ese valor referencial sin sugerir destinatario directo de forma demasiado rígida.
- source_word: וַיֹּאמַר
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  - habló
  lexicon: HALOT
  rationale: El wayyiqtol introduce la fórmula de habla. En español, el verbo simple 'dijo' funciona con naturalidad después de la apertura discursiva.
- source_word: שְׁמַע יְהוָה
  english_pob_choice: Hear, Yahweh
  chosen_spanish: Oye, Yahvé
  alternatives_spanish:
  - Escucha, Yahvé
  - Oye, Yahvé, te ruego
  lexicon: HALOT
  rationale: Es una súplica directa al nombre divino; 'Oye' conserva el imperativo breve y la dirección orante sin suavizar el tono.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton. En español, 'Yahvé' preserva el nombre del pacto en lugar de enmascararlo.
- source_word: קוֹל יְהוּדָה
  english_pob_choice: the voice of Judah
  chosen_spanish: la voz de Judá
  alternatives_spanish:
  - el clamor de Judá
  - la voz de Judá
  lexicon: HALOT
  rationale: '''Voz'' mantiene el sustantivo hebreo קוֹל sin cargar de antemano con una interpretación más específica como ''clamor''.'
- source_word: וְאֶל עַמּוֹ תְּבִיאֶנּוּ
  english_pob_choice: and bring him to his people
  chosen_spanish: y tráelo a su pueblo
  alternatives_spanish:
  - y llévalo a su pueblo
  - y condúcelo a su pueblo
  lexicon: HALOT
  rationale: El hifil de בוא permite 'traer' o 'llevar'. 'Tráelo' conserva la acción de conducir a reunión o retorno sin especificar más de lo que el hebreo exige.
- source_word: יָדָיו רָב לוֹ
  english_pob_choice: Let his hands strive for him
  chosen_spanish: Que sus manos se empeñen por él
  alternatives_spanish:
  - Que sus manos contiendan por él
  - Que sus manos le basten
  lexicon: HALOT
  rationale: La cláusula es difícil y admite más de una lectura. 'Se empeñen' expresa la idea de esforzarse/actuar con vigor y deja visible la tensión semántica sin forzar una resolución interpretativa.
- source_word: וְעֵזֶר מִצָּרָיו תִּהְיֶה
  english_pob_choice: and be a help against his adversaries
  chosen_spanish: y sé su ayuda contra sus adversarios
  alternatives_spanish:
  - y sé ayuda de sus adversarios
  - y sé una ayuda contra sus enemigos
  lexicon: HALOT
  rationale: '''Ayuda contra'' refleja el valor adversativo de מִן en contexto militar y orante. ''Adversarios'' conserva la relación con צָרִים sin diluir el matiz hostil.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. La política del proyecto en español pide 'Yahvé' como equivalente principal para preservar el nombre pactal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Cláusula difícil יָדָיו רָב לוֹ
  english_pob_reading: Let his hands strive for him
  chosen_spanish_reading: Que sus manos se empeñen por él
  alternative_spanish_readings:
  - Que sus manos contiendan por él
  - Que sus manos le basten
  rationale: La sintaxis hebrea es comprimida y la evidencia permite varias posibilidades. La redacción elegida mantiene el conflicto interpretativo sin resolverlo de manera excesiva.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se incorporó la revisión más reciente del POB en inglés que prefirió 'strive' para la cláusula de las manos; en español se optó por 'se empeñen' para conservar esa fuerza dinámica sin perder la ambigüedad reconocida en el audit trail. También se mantuvo el tratamiento del nombre divino como 'Yahvé' conforme a la política del proyecto.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה en todo el versículo.
  - Se tradujo קוֹל como 'voz' y no como 'clamor' para no introducir una intensificación no obligada.
  - '''Adversarios'' conserva el valor hostil de צָרִים y mantiene la coherencia con el campo semántico del texto.'
  - La nota [a] está anclada en 'por él[a]' y ofrece la alternativa tradicional sin borrar la tensión del hebreo.
