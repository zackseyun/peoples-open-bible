translation:
  language: es
  text: 'y para el sacrificio de las ofrendas de paz[a]: dos cabezas de ganado[b], cinco carneros, cinco machos cabríos y cinco corderos de un año. Esta fue la ofrenda de Ahiezer hijo de Ammishaddai.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: ''ofrendas de comunión'' o ''ofrendas de bienestar'' para ''ofrendas de paz''.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: un sustantivo colectivo para ganado bovino; por eso puede entenderse como ''dos cabezas de ganado'' o, más específicamente, ''dos reses''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  english_pob_choice: and for the sacrifice of
  chosen_spanish: y para el sacrificio de
  alternatives_spanish:
  - y como sacrificio de
  - y para una ofrenda de
  lexicon: HALOT
  rationale: La construcción hebrea introduce el elemento final de la lista de ofrendas. En español, 'para el sacrificio de' conserva la relación funcional sin volverla mecánica ni añadir sentido ajeno.
- source_word: הַ/שְּׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: las ofrendas de paz
  alternatives_spanish:
  - las ofrendas de comunión
  - las ofrendas de bienestar
  lexicon: HALOT
  rationale: '''שְׁלָמִים'' es el término sacrificial técnico. ''Ofrendas de paz'' sigue la equivalencia tradicional y comunica el valor cultual sin sustituirlo por una paráfrasis más interpretativa.'
- source_word: בָּקָר שְׁנַיִם
  english_pob_choice: two cattle
  chosen_spanish: dos cabezas de ganado
  alternatives_spanish:
  - dos reses
  - dos bovinos
  lexicon: HALOT
  rationale: '''בָּקָר'' nombra ganado bovino en sentido colectivo. En español, ''cabezas de ganado'' preserva ese valor colectivo mejor que ''toros'' u ''oxen'', que serían más específicos de lo que permite el hebreo.'
- source_word: אֵילִם חֲמִשָּׁה
  english_pob_choice: five rams
  chosen_spanish: cinco carneros
  alternatives_spanish:
  - cinco ovejas macho
  - cinco machos de oveja
  lexicon: HALOT
  rationale: '''אֵילִם'' designa carneros en listas sacrificiales. ''Carneros'' es claro, natural y fiel al referente animal.'
- source_word: עַתֻּדִים חֲמִשָּׁה
  english_pob_choice: five male goats
  chosen_spanish: cinco machos cabríos
  alternatives_spanish:
  - cinco cabritos machos
  - cinco he-goats
  lexicon: HALOT
  rationale: '''עַתֻּדִים'' refiere a machos cabríos. ''Machos cabríos'' mantiene la especificidad sexual y es un término comprensible en registro bíblico español.'
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  english_pob_choice: five one-year-old lambs
  chosen_spanish: cinco corderos de un año
  alternatives_spanish:
  - cinco corderos de un año de edad
  - cinco corderos añales
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice 'corderos, hijos de un año'. 'De un año' comunica la edad requerida para el sacrificio con naturalidad en español.
- source_word: זֶה קָרְבַּן
  english_pob_choice: This was the offering of
  chosen_spanish: Esta fue la ofrenda de
  alternatives_spanish:
  - Ésta fue la ofrenda de
  - Éste fue el ofrecimiento de
  lexicon: HALOT
  rationale: La fórmula narrativa retrospectiva en español fluye mejor en pasado. 'Ofrenda' traduce bien קָרְבָּן en este contexto de presentación ritual.
- source_word: אֲחִיעֶזֶר בֶּן עַמִּישַׁדָּי
  english_pob_choice: Ahiezer son of Ammishaddai
  chosen_spanish: Ahiezer hijo de Ammisadai
  alternatives_spanish:
  - Ahiezer, hijo de Ammisadai
  - Ahiezer, hijo de Ammishaddai
  lexicon: Onomástica bíblica / transliteración editorial
  rationale: Se respeta la transliteración personal conforme al criterio del proyecto. 'בן' se expresa naturalmente por 'hijo de'.
theological_decisions:
- issue: Término sacrificial שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: No se diluye el término técnico en una explicación. 'Ofrendas de paz' conserva la forma establecida y permite anotar que el hebreo admite matices relacionales o de bienestar.
  doctrine_reference: Terminología sacrificial del Pentateuco; cf. Levítico 3 y usos afines
- issue: Cantidades y tipología de animales en la ofrenda
  english_pob_reading: two cattle, five rams, five male goats, and five one-year-old lambs
  chosen_spanish_reading: dos cabezas de ganado, cinco carneros, cinco machos cabríos y cinco corderos de un año
  alternative_spanish_readings:
  - dos reses
  - dos bovinos
  rationale: Se conserva la secuencia y el carácter enumerativo del hebreo, sin especificar más de lo que el sustantivo colectivo permite. Esto evita reducir 'בָּקָר' a una especie más estrecha.
  doctrine_reference: Precisión léxica del registro ritual en el Pentateuco
translation_notes:
  revision_awareness: El contexto inglés auditado mantiene alta concordancia textual y no introduce revisiones; se sigue la lectura estándar del versículo con equivalencia óptima y sin cambios de sentido.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención general del proyecto, aunque este versículo no lo contiene.
  - Se usa 'ofrenda' para קָרְבָּן y se conserva el matiz técnico de la lista sacrificial.
  - 'Los nombres propios se transliteran de forma estable: Ahiezer, Ammisadai.'
