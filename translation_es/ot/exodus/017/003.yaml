revisions:
- from: 'Y allí el pueblo tuvo sed de agua[a], y el pueblo murmuró contra Moisés y dijo: «¿Por qué nos sacaste de Egipto, para matar[a]me a mí y a mis hijos y a mi ganado con sed?»'
  to: 'Y allí el pueblo tuvo sed de agua, y el pueblo murmuró contra Moisés y dijo: «¿Por qué nos sacaste de Egipto, para matarme a mí[a] y a mis hijos y a mi ganado con sed?»'
  rationale: 'Se corrige un problema formal importante de notas: se elimina el uso duplicado del marcador [a], se coloca el anclaje donde realmente corresponde la explicación del singular hebreo y se evita partir la palabra «matarme». El contenido traductológico principal del borrador se mantiene porque es fiel al hebreo y al expediente inglés.'
