base_translation:
  language: en
  yaml_path: translation/ot/jonah/001/003.yaml
  text: But Jonah rose to flee to Tarshish from the presence of Yahweh[a]. He went down to Joppa and found a ship going to Tarshish. He paid its fare and went down into it to go with them to Tarshish[c][b], away from the presence of Yahweh.
  footnotes:
  - marker: a
    text: Or 'away from the LORD'; literally 'from the presence of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew repeats 'went down' here; the repetition contributes to the narrative movement downward in this chapter.
    reason: cross_reference
  - marker: c
    text: Or 'bound for Tarshish.' The Hebrew expression is literally 'a ship coming/going to Tarshish.'
    reason: lexical_alternative
