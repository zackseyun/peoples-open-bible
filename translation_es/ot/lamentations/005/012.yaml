translation:
  language: es
  text: Los príncipes fueron colgados de sus manos[a]; los rostros de los ancianos no fueron honrados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los príncipes fueron colgados por sus manos». La expresión hebrea también puede entenderse así; el contexto describe una humillación pública violenta.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «los rostros de los ancianos no fueron honrados», una expresión hebrea que indica que a los ancianos no se les dio el respeto que les correspondía.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרִים
  english_pob_choice: Princes
  chosen_spanish: príncipes
  alternatives_spanish:
  - oficiales
  - líderes
  - nobles
  lexicon: HALOT
  rationale: שָׂרִים designa a gobernantes, oficiales o príncipes. «Príncipes» conserva el rango social y el tono tradicional del lamento, manteniendo la idea de personas de alto estatus públicamente humilladas.
- source_word: בְּיָדָם
  english_pob_choice: by their hands
  chosen_spanish: de sus manos
  alternatives_spanish:
  - por sus manos
  - con sus manos
  lexicon: HALOT
  rationale: La construcción con ב + «mano» y sufijo plural se entiende mejor en este contexto como el punto corporal por el cual fueron suspendidos. En español, «de sus manos» comunica esa relación de modo natural sin forzar una lectura de agencia.
- source_word: נִתְלוּ
  english_pob_choice: were hung up
  chosen_spanish: fueron colgados
  alternatives_spanish:
  - fueron ahorcados
  - fueron suspendidos
  lexicon: HALOT
  rationale: El nifal de תלה expresa ser colgado o suspendido. «Fueron colgados» es fiel y claro en español; evita restringir indebidamente el sentido a ejecución legal, aunque mantiene la violencia pública del contexto.
- source_word: פְּנֵי זְקֵנִים
  english_pob_choice: the faces of elders
  chosen_spanish: el rostro de los ancianos
  alternatives_spanish:
  - los rostros de los ancianos
  - los ancianos
  lexicon: HALOT
  rationale: Conservar «rostro» refleja literalmente la expresión hebrea y su valor metonímico para la persona y su dignidad. En español, el singular colectivo «el rostro» suena más natural que una pluralización forzada, sin perder la imagen.
- source_word: לֹא נֶהְדָּרוּ
  english_pob_choice: were not honored
  chosen_spanish: no fue honrado
  alternatives_spanish:
  - no fueron honrados
  - no se les mostró honor
  - no recibieron honra
  lexicon: HALOT
  rationale: El nifal de הדר expresa falta de honra o dignidad otorgada. El singular concuerda con «el rostro» como sujeto gramatical y mantiene la idea de deshonra pública sin alejarse del hebreo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el audit trail inglés. Se resolvió la ambigüedad de בְּיָדָם con una frase española natural («de sus manos») y se mantuvo la imagen concreta de «rostro» para preservar la metáfora hebrea.
  spanish_consistency_notes:
  - Se mantiene «príncipes» para שָׂרִים conforme al valor de rango social en el lamento.
  - «Ancianos» traduce זְקֵנִים en sentido de personas mayores o notables, no necesariamente un oficio eclesiástico.
  - Se prefirió «honrado» frente a «respetado» por cercanía formal al pasivo hebreo y por correspondencia con el audit trail inglés.
