translation:
  language: es
  text: Yahvé suscitó el espíritu de Ciro, rey de los persas[a], e hizo una proclamación por todo su reino, y también por escrito, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «rey de los persas»; el paralelo hebreo en Esdras 1:1 tiene «rey de Persia».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἤγειρεν
  english_pob_choice: stirred up
  chosen_spanish: despertó
  alternatives_spanish:
  - suscitó
  - movió
  - despertó en
  lexicon: BDAG
  rationale: «Despertó» conserva la idea de una acción divina que impulsa interiormente, sin sonar tan coloquial como «sacudió» ni tan explicativo como «movió». Mantiene bien el valor de ἐγείρω aplicado al espíritu en este contexto de decreto.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: BDAG
  rationale: La política del proyecto pide usar «Yahvé» para Κύριος cuando el trasfondo corresponde al nombre divino. Aquí el paralelo hebreo tiene יהוה, así que no se enmascara con «el Señor».
- source_word: τὸ πνεῦμα
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - su espíritu
  - su ánimo
  - la mente
  lexicon: BDAG
  rationale: Se mantiene el sustantivo «espíritu» para respetar la forma griega y la fuerza antropológica/impulsiva del término. No se reduce a «mente», porque eso debilitaría el matiz interior y dinámico.
- source_word: Κύρου
  english_pob_choice: Cyrus
  chosen_spanish: Ciro
  lexicon: BDAG
  rationale: Nombre propio estándar en español, confirmado por el paralelo hebreo. No requiere nota especial aparte del contexto del versículo.
- source_word: βασιλέως Περσῶν
  english_pob_choice: king of the Persians
  chosen_spanish: rey de los persas
  alternatives_spanish:
  - rey de Persia
  lexicon: BDAG
  rationale: Se conserva el plural «de los persas» porque el griego dice explícitamente Περσῶν. Se evita armonizar con el hebreo paralelo, que usa una formulación singular.
- source_word: ἐκήρυξεν
  english_pob_choice: made a proclamation
  chosen_spanish: proclamó
  alternatives_spanish:
  - hizo una proclamación
  - anunció públicamente
  lexicon: BDAG
  rationale: «Proclamó» expresa con naturalidad el acto público de anunciar oficialmente. En español no hace falta añadir un verbo auxiliar como «hizo una proclamación».
- source_word: ὅλῃ τῇ βασιλείᾳ αὐτοῦ
  english_pob_choice: throughout all his kingdom
  chosen_spanish: en todo su reino
  alternatives_spanish:
  - por todo su reino
  - en todo el alcance de su reino
  lexicon: BDAG
  rationale: «En todo su reino» transmite el alcance distributivo del dativo con ὅλῃ de manera fluida y fiel, sin forzar una perífrasis pesada.
- source_word: ἅμα
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - a la vez
  - al mismo tiempo
  lexicon: BDAG
  rationale: «También» comunica el valor aditivo de ἅμα en este contexto, enlazando la proclamación oral con la forma escrita. «Al mismo tiempo» es posible pero más pesado para el español.
- source_word: διὰ γραπτῶν
  english_pob_choice: in writing
  chosen_spanish: por escrito
  alternatives_spanish:
  - en escrito
  - mediante escrito
  lexicon: BDAG
  rationale: «Por escrito» es la forma natural y transparente en español para indicar la vía escrita. Conserva el contraste con la proclamación pública sin sobreespecificar el medio.
- source_word: λέγων
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - que decía,
  lexicon: BDAG
  rationale: Se mantiene la fórmula introductoria abierta para enlazar con el contenido que sigue. «Diciendo» es lo más directo y fiel al participio griego.
theological_decisions:
- issue: Agencia divina en el decreto de Ciro
  english_pob_reading: the text states that the Lord actively stirred Cyrus's spirit
  chosen_spanish_reading: el texto afirma que Yahvé despertó activamente el espíritu de Ciro
  alternative_spanish_readings:
  - Yahvé permitió que Ciro actuara
  - Ciro actuó solo por motivaciones políticas
  rationale: Se preserva la agencia divina directa del texto griego y del paralelo hebreo, sin atenuarla a mera अनुमति o explicación política. La traducción mantiene la tensión teológica original.
  doctrine_reference: 'Principio editorial POB: conservar la tensión teológica y priorizar la fuente original sobre una suavización interpretativa.'
translation_notes:
  revision_awareness: El control de revisión del inglés POB indica que no se requirieron cambios en el texto base; esta versión española sigue esa misma lectura estable, manteniendo el único matiz textual relevante en la nota sobre «persas» frente a «Persia».
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al criterio del proyecto para Κύριος cuando el paralelo hebreo apunta al nombre divino.
  - Se conserva «persas» en plural para respetar el griego, con nota al pie sobre la variante del paralelo hebreo.
  - 'El orden y la sintaxis siguen de cerca el griego, pero con ajuste natural a la gramática española: verbo principal + complemento de agente/impulso + proclamación pública + medio escrito.'
  - No se introduce «Cristo», «Señor» u այլ terminología eclesiástica no atestiguada por la fuente.
