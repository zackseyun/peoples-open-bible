    rationale: El hebreo usa perfecto 3mp, y el POB inglés 'they slept their sleep' presenta un hecho completo. 'Dormían su sueño' introduce un matiz imperfectivo/progresivo que no está en el original y debilita el paralelismo poético.
  - severity: low
