translation:
  text: The sun rises and shines on everything revealed[b][a], and the glory of the Lord is over all his works.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''on all revealed/visible things.'' The Greek parallel reads more like, ''giving light, it looks upon everything.'''
    reason: alternative_reading
  - marker: b
    text: Masada's older Hebrew witness appears to preserve a different wording in this line than the Cairo Geniza text underlying the main translation.
    reason: textual_variant
lexical_decisions:
- source_word: שמש
  chosen: The sun
  alternatives:
  - sun
  lexicon: HALOT
  rationale: Straightforward rendering of the noun for the celestial body; English idiom naturally takes the article here.
- source_word: זורחת
  chosen: rises and shines
  alternatives:
  - shines
  - dawns
  - is radiant
  lexicon: HALOT
  rationale: The Hebrew participle from זרח can denote both rising and shining/radiance. The Greek parallel φωτίζων/ἐπέβλεψεν confirms an illuminating action, while the Hebrew image naturally evokes sunrise. Rendering both senses preserves the poetic force without over-paraphrase.
- source_word: על כל
  chosen: on everything
  alternatives:
  - over all
  - upon all
  lexicon: HALOT
  rationale: The phrase indicates comprehensive scope. 'On everything' fits the sun's action idiomatically in English; the second colon uses 'over all' for stylistic variation matching the different predicate.
- source_word: נגלתה
  chosen: revealed
  alternatives:
  - what is visible
  - what is uncovered
  - all that appears
  lexicon: HALOT
  rationale: The Hebrew likely points to what is uncovered or manifest. 'Revealed' preserves the passive/resultative sense and fits the poetic contrast with divine glory. The Greek parallel's universal wording supports a broad reference to all that is seen.
- source_word: כבוד
  chosen: glory
  alternatives:
  - honor
  - majesty
  lexicon: HALOT
  rationale: '''Glory'' is the standard and theologically weighty rendering for כבוד, especially in relation to the Lord.'
- source_word: ה'
  chosen: the Lord
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: The source has the abbreviated divine title/name marker in Hebrew manuscript tradition. Following project doctrine for YHWH-related renderings and the deuterocanonical convention influenced by the Greek κύριος, 'the Lord' is the best default here.
- source_word: מעשיו
  chosen: his works
  alternatives:
  - his deeds
  - what he has made
  lexicon: HALOT
  rationale: A broad term covering God's acts/works. 'His works' preserves the concise poetic parallelism and aligns with the Greek ἔργον/ἔργα semantic field.
