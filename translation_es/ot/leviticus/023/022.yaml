  language: en
  yaml_path: translation/ot/leviticus/023/022.yaml
  text: And when you reap the harvest of your land[a], you shall not completely reap the edge of your field, and you shall not gather the gleanings of your harvest; you shall leave them for the poor and for the sojourner[b]. I am Yahweh your God.
  footnotes:
  - marker: a
    text: Or 'corner of your field.' The Hebrew term can denote an edge, side, or corner.
    reason: lexical_alternative
  - marker: b
    text: Or 'resident foreigner.' The Hebrew word refers to a non-Israelite living among Israel under its social protections.
    reason: lexical_alternative
