translation:
  language: es
  text: para que te acuerdes y te avergüences, y ya no tengas oportunidad[a] de abrir la boca[b] a causa de tu vergüenza, cuando haga expiación por ti[c] por todo lo que has hecho, declara el Señor Dios, Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ya no tengas ninguna apertura de boca’; el hebreo conserva una imagen idiomática que puede entenderse como libertad o fundamento para hablar.
    reason: lexical_alternative
  - marker: b
    text: O ‘cualquier ocasión para abrir la boca’; el hebreo dice literalmente ‘apertura de boca’.
    reason: lexical_alternative
  - marker: c
    text: O ‘cuando expíe por ti’. El verbo hebreo lleva el peso de expiación/reconciliación, no sólo de perdón general.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - para que
  lexicon: HALOT
  rationale: Introduce una cláusula de propósito en español de manera natural y fiel al valor final de לְמַעַן.
- source_word: תִּזְכְּרִי
  english_pob_choice: you may remember
  chosen_spanish: te acuerdes
  alternatives_spanish:
  - recuerdes
  - te acuerdes
  lexicon: HALOT
  rationale: La forma reflexiva es idiomática en español y conserva el valor de recordar de una destinataria singular femenina personificada.
- source_word: וָבֹשְׁתְּ
  english_pob_choice: and be ashamed
  chosen_spanish: y te avergüences
  alternatives_spanish:
  - y te avergüences
  - y quedes avergonzada
  lexicon: HALOT
  rationale: ‘Avergonzarse’ expresa bien בוש en español actual y mantiene el matiz de vergüenza personal sin volverlo excesivamente pasivo.
- source_word: וְלֹא יִהְיֶה לָּךְ עוֹד
  english_pob_choice: and no longer have
  chosen_spanish: y no tengas ya más
  alternatives_spanish:
  - y no tengas ya más
  - y no haya para ti ya
  lexicon: HALOT
  rationale: La construcción hebrea existencial se vierte de modo natural en español como carencia de ‘tener’ ya más algo, sin perder el sentido de privación continua.
- source_word: פִּתְחוֹן פֶּה
  english_pob_choice: any opening of the mouth
  chosen_spanish: oportunidad de abrir la boca
  alternatives_spanish:
  - ocasión de abrir la boca
  - motivo para hablar
  lexicon: HALOT
  rationale: Se conserva el trasfondo idiomático hebreo de ‘abrir la boca’ como tener ocasión o defensa para hablar, evitando una paráfrasis demasiado libre.
- source_word: מִפְּנֵי כְּלִמָּתֵךְ
  english_pob_choice: because of your disgrace
  chosen_spanish: a causa de tu vergüenza
  alternatives_spanish:
  - a causa de tu vergüenza
  - por tu deshonra
  lexicon: HALOT
  rationale: כְּלִמָּה puede ser ‘vergüenza’ o ‘deshonra’; aquí ‘vergüenza’ enlaza bien con בוש y comunica la humillación moral y pública.
- source_word: בְּכַפְּרִי לָךְ
  english_pob_choice: when I make atonement for you
  chosen_spanish: cuando haga expiación por ti
  alternatives_spanish:
  - cuando haga expiación por ti
  - cuando haga expiación en tu favor
  - cuando te reconcilie
  lexicon: HALOT
  rationale: Se mantiene la fuerza de כפר como expiación/atonement. ‘Expiación’ preserva el peso teológico mejor que un simple ‘perdonar’.
- source_word: לְכָל אֲשֶׁר עָשִׂית
  english_pob_choice: for all that you have done
  chosen_spanish: por todo lo que has hecho
  alternatives_spanish:
  - por todo lo que has hecho
  - por cuanto has hecho
  lexicon: HALOT
  rationale: La preposición y el complemento abarcan la totalidad de la culpa; el presente perfecto español refleja bien la perspectiva retrospectiva del texto.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor Yahvé
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: Se traduce el nombre divino directamente como ‘Yahvé’ según la norma del proyecto, y נְאֻם se vierte con la fórmula profética ‘declara’.
theological_decisions:
- issue: Rendering of כפר in a context of divine forgiveness/restoration
  english_pob_reading: make atonement for you
  chosen_spanish_reading: haga expiación por ti
  alternative_spanish_readings:
  - te perdone
  - te cubra
  - te reconcilie
  rationale: ‘Expiación’ conserva la densidad sacrificial y reconciliatoria de כפר sin reducirlo a perdón general. En este versículo de restauración, la acción divina incluye el lenguaje de expiación, aunque el mecanismo no se explicite.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Rendering of the divine name in אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor YHWH
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Conforme a la norma del proyecto, se preserva el nombre del pacto como ‘Yahvé’ y se evita el ocultamiento mediante ‘SEÑOR’.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés y la fuente hebrea; se preservaron las dos tensiones principales del versículo: el modismo ‘apertura de boca’ y el valor teológico de כפר. Se actualizó la fórmula divina a la convención del proyecto con ‘Yahvé’.'
  spanish_consistency_notes:
  - Se mantuvo el tratamiento de la destinataria en segunda persona singular femenina, conforme al hebreo.
  - ‘Expiación’ se emplea de manera consistente para כפר cuando el contexto es cultual/teológico.
  - ‘Yahvé’ se usa para el nombre divino del pacto, no como sustituto genérico de ‘Dios’.
  - La imagen idiomática de ‘abrir la boca’ se conserva para no borrar el hebraísmo documentado.
