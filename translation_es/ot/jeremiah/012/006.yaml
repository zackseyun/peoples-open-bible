    text: Or 'have called after you at full voice,' possibly implying a hostile public outcry or pursuit.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your brothers' is grammatically masculine; in context it refers to Jeremiah’s close male kin, alongside 'your father’s house' for the wider household.
    reason: cultural_note
