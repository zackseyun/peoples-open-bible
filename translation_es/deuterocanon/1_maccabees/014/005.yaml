translation:
  language: es
  text: Y con toda su gloria tomó a Jope como puerto, y la convirtió en punto de acceso[a] a las islas del mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la hizo una entrada hacia las islas del mar». La expresión griega puede traducirse más literalmente, pero aquí probablemente indica que Jope servía como punto de acceso para las conexiones marítimas.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ πάσης τῆς δόξης αὐτοῦ
  english_pob_choice: with all his glory
  chosen_spanish: con toda su gloria
  alternatives_spanish:
  - con todo su esplendor
  - con todo su honor
  - en medio de toda su gloria
  lexicon: LSJ
  rationale: δόξα puede significar gloria, esplendor u honor. En este contexto histórico y encomiástico, «gloria» conserva el tono elevado y sigue siendo natural en español.
- source_word: ἔλαβεν
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - capturó
  - se apoderó de
  - recibió
  lexicon: LSJ
  rationale: λαμβάνω significa comúnmente «tomar». «Tomó» es suficientemente amplio para incluir adquisición u ocupación sin imponer una fuerza militar más específica que la del griego en esta cláusula.
- source_word: τὴν Ἰόππην
  english_pob_choice: Joppa
  chosen_spanish: Joppe
  alternatives_spanish:
  - Joppa
  lexicon: transliteration
  rationale: Para el nombre de lugar, «Joppe» es una transliteración tradicional en español y mantiene el referente geográfico con claridad.
- source_word: εἰς λιμένα
  english_pob_choice: as a harbor
  chosen_spanish: como puerto
  alternatives_spanish:
  - como un puerto
  - para puerto
  - en puerto
  lexicon: LSJ
  rationale: 'La preposición εἰς expresa aquí resultado o finalidad: Joppe fue tomada para funcionar como puerto. «Como puerto» conserva esa función de manera idiomática en español; «puerto» evita una sobreexplicación.'
- source_word: ἐποίησεν εἴσοδον
  english_pob_choice: made it an access point
  chosen_spanish: la convirtió en punto de acceso
  alternatives_spanish:
  - hizo una entrada
  - le dio acceso
  - la hizo una puerta de entrada
  lexicon: LSJ
  rationale: ποιέω + εἴσοδος significa hacer o proporcionar una entrada/acceso. «La convirtió en punto de acceso» comunica con naturalidad la función práctica del lugar sin perder el sentido de acceso.
- source_word: ταῖς νήσοις τῆς θαλάσσης
  english_pob_choice: to the islands of the sea
  chosen_spanish: a las islas del mar
  alternatives_spanish:
  - para las islas del mar
  - a las islas en el mar
  - para las islas marítimas
  lexicon: LSJ
  rationale: 'El dativo se entiende mejor como relación/dirección: Joppe quedó como acceso hacia las islas. «A las islas del mar» sigue de cerca el griego y su tono elevado, y suena natural en español.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete (1909) y refleja la revisión inglesa más reciente que prefiere 'to the islands of the sea' para εἴσοδον con dativo; en español se ha resuelto con «a las islas del mar» y con una nota que conserva la alternativa más literal.
  spanish_consistency_notes:
  - Se conserva el nombre geográfico como «Joppe», forma tradicional en español, en lugar de normalizarlo a «Joppa».
  - Se mantiene «gloria» para δόξα porque el contexto es honorífico y no exige una concreción adicional como «esplendor».
  - «Como puerto» y «punto de acceso» juntos preservan tanto la función portuaria como la idea de acceso marítimo sin forzar una paráfrasis mayor.
