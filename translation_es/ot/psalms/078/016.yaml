translation:
  language: es
  text: Él sacó corrientes de la peña[a] y hizo bajar las aguas como ríos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Él hizo brotar aguas que fluyen de la peña»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִא
  english_pob_choice: He brought ... out
  chosen_spanish: Él sacó ...
  alternatives_spanish:
  - Él hizo salir ...
  - Él trajo ...
  lexicon: HALOT
  rationale: 'El hifil de יצא es causativo: Dios provoca que algo salga. «Sacó» conserva ese sentido causativo de modo natural en español y funciona bien en el paralelismo poético.'
- source_word: נוֹזְלִים
  english_pob_choice: streams
  chosen_spanish: corrientes
  alternatives_spanish:
  - aguas que fluyen
  - corrientes de agua
  lexicon: HALOT
  rationale: El participio de נזל describe algo que fluye. «Corrientes» comunica bien la idea de agua en movimiento sin volver la línea pesada.
- source_word: מִ/סָּלַע
  english_pob_choice: out of the rock
  chosen_spanish: de la peña
  alternatives_spanish:
  - de la roca
  - de la peña rocosa
  lexicon: HALOT
  rationale: סלע puede significar roca o peña. «Peña» preserva el registro poético y la imagen del milagro del desierto con un matiz algo más literario que «roca».
- source_word: וַיּ֖וֹרֶד
  english_pob_choice: made ... flow down
  chosen_spanish: hizo bajar
  alternatives_spanish:
  - hizo descender
  - las hizo correr hacia abajo
  lexicon: HALOT
  rationale: El hifil de ירד es causativo. «Hizo bajar» conserva la causalidad y permite expresar el movimiento descendente del agua de manera fluida en español.
- source_word: כַּ/נְּהָר֣וֹת
  english_pob_choice: like rivers
  chosen_spanish: como ríos
  alternatives_spanish:
  - como ríos caudalosos
  - cual ríos
  lexicon: HALOT
  rationale: El prefijo כ marca comparación. «Como ríos» reproduce directamente la simetría del hebreo y la imagen comparativa.
- source_word: מָֽיִם
  english_pob_choice: water
  chosen_spanish: las aguas
  alternatives_spanish:
  - agua
  - aguas
  lexicon: HALOT
  rationale: Aunque מים puede funcionar como sustantivo colectivo, el plural español «las aguas» suena más natural en poesía bíblica y mantiene la fuerza imagística del hebreo.
translation_notes:
  revision_awareness: 'La versión inglesa reciente fue revisada y se mantuvo sin cambios; el sentido clave permanece estable: causación divina, agua que fluye y similitud con ríos. La nota española refleja la alternativa léxica preservada en el audit trail inglés.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el Tetragrámaton ni una cita directa de κύριος.
  - Se prefirió «peña» por el tono poético del Salmo y por la equivalencia aceptable de סלע en este contexto.
  - Se mantuvo la comparación explícita con «como ríos» para respetar el כ hebreo.
  - «Las aguas» conserva el plural colectivo hebreo donde el español bíblico lo permite sin perder naturalidad.
