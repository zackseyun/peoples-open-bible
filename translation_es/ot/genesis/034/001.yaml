translation:
  language: es
  text: Dina[a], la hija de Lea, que ella le había dado a luz a Jacob, salió para ver a las hijas de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a visitar a las mujeres de la tierra». El hebreo dice literalmente «ver a las hijas de la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue afuera
  - salió de allí
  lexicon: HALOT
  rationale: El verbo de salida narrativa en qal wayyiqtol se traduce de forma natural por «salió», que conserva el movimiento sin añadir un lugar no expresado en el hebreo.
- source_word: דִינָה
  english_pob_choice: Dinah
  chosen_spanish: Dina
  alternatives_spanish:
  - Dina
  lexicon: transliteración de nombre propio
  rationale: El nombre propio se adapta al uso español como «Dina», manteniendo la identificación personal sin traducirlo.
- source_word: בַּת לֵאָה
  english_pob_choice: the daughter of Leah
  chosen_spanish: la hija de Lea
  alternatives_spanish:
  - hija de Lea
  - la hija de Leah
  lexicon: HALOT
  rationale: La construcción de parentesco se vierte con una formulación natural en español que conserva la apposición genealógica del hebreo.
- source_word: אֲשֶׁר יָלְדָה לְיַעֲקֹב
  english_pob_choice: whom she had borne to Jacob
  chosen_spanish: a quien ella había dado a luz a Jacob
  alternatives_spanish:
  - a quien había dado a luz a Jacob
  - a quien Lea había dado a luz para Jacob
  - a quien Lea le había dado a luz a Jacob
  lexicon: HALOT
  rationale: La cláusula relativa modifica a Lea y especifica el nacimiento de Dina. «Había dado a luz» preserva el valor de nacimiento; el dativo «a Jacob» refleja la preposición ל con el sentido de filiación paterna. Se mantiene el pasado pluscuamperfecto, como en el inglés auditado, para el trasfondo narrativo.
- source_word: לִרְאוֹת
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - a ver
  - para visitar
  lexicon: HALOT
  rationale: El infinitivo de ראה significa literalmente «ver». En español, «para ver» comunica la acción sin suavizarla de entrada a «visitar», que solo es una inferencia contextual.
- source_word: בִּבְנוֹת הָאָרֶץ
  english_pob_choice: the daughters of the land
  chosen_spanish: a las hijas de la tierra
  alternatives_spanish:
  - a las mujeres de la tierra
  - a las muchachas de la tierra
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea de manera más directa que con una paráfrasis social, reflejando el audit trail inglés y la ambigüedad idiomática del hebreo. En español, «hijas de la tierra» reproduce la imagen sin imponer una equivalencia interpretativa.
translation_notes:
  revision_awareness: 'La versión española sigue el estado revisado sin cambios del testimonio inglés auditado (high_agreement; latest_revision_pass: unchanged=true). No se adoptaron revisiones adicionales.'
  spanish_consistency_notes:
  - Se usa «Lea» y no «Leah» para armonizar con el español bíblico y la transliteración usual del nombre.
  - Se mantiene el nombre propio «Dina» en lugar de una forma anglicada.
  - Se preserva la imagen hebrea «hijas de la tierra» en el texto principal y se ofrece la alternativa idiomática en nota.
  - El pluscuamperfecto «había dado a luz» mantiene la relación temporal del relativo respecto del relato principal.
