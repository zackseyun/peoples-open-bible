  glossary_alignment: No hay términos del glosario maestro especialmente disputados en este versículo. «Hermano mío» preserva el posesivo de אָחִי, aunque «mi hermano» suena más natural en español neutral. La nota cultural está alineada con el rastro inglés y puede mantenerse con redacción levemente más natural.
