    rationale: '«Éstos» no sigue la ortografía recomendada actual salvo casos de ambigüedad, y aquí el pronombre puede omitirse sin pérdida: «y estaban matando...» ya se entiende referido a los leones.'
  revised_spanish_text: Y aconteció[a], al comienzo de su asentamiento allí, que no temían a Yahvé; por eso Yahvé envió leones entre ellos, y estaban matando a algunos de ellos.
