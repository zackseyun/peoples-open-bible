revisions:
- from: ¡Mira[a]! Hoy me has echado lejos de la faz de la tierra, y quedaré oculto de tu rostro. Seré errante y fugitivo sobre la tierra[b], y sucederá que cualquiera que me encuentre me matará.
  to: ¡Mira[a]! Hoy me has echado lejos de la faz del suelo, y quedaré oculto de delante de tu rostro. Seré errante y fugitivo sobre la tierra[b], y sucederá que cualquiera que me encuentre me matará.
  rationale: Se revisa 'tierra' a 'suelo' en la primera frase para respetar la distinción fuente entre אֲדָמָה y אֶרֶץ y el razonamiento contextual del POB. Se ajusta la frase sobre el rostro/presencia para que suene más natural en español sin perder el modismo hebreo. También se amplía la nota [a] para reflejar fielmente las alternativas preservadas en el audit trail inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:02:13Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el audit trail inglés en casi todos los puntos principales: mantiene la partícula enfática inicial, la expulsión, la imagen de la ''faz/rostro'', la dupla ''errante y fugitivo'', y el indefinido universal ''cualquiera que me encuentre''. También conserva bien la nota sobre אֶרֶץ. Sin embargo, hay dos desajustes: (1) ''de la faz de la tierra'' para מֵעַל פְּנֵי הָאֲדָמָה desplaza אֲדָמָה de ''suelo/ground'' a ''tierra/earth'', perdiendo el vínculo contextual con el suelo cultivable de Génesis 4; (2) la nota [a] omite una de las alternativas preservadas en el inglés (''seré/quedaré oculto de tu presencia''), reduciendo innecesariamente el abanico documentado.'
  spanish_quality_summary: El español es claro, digno y muy legible. No obstante, 'de tu rostro' tras 'quedaré oculto' suena menos natural que 'de delante de tu rostro' o, si se conserva la cercanía al hebreo, conviene una nota más completa. Además, 'de la faz del suelo' suena algo más preciso que 'de la faz de la tierra' en este contexto. El resto fluye bien y evita calcos excesivamente rígidos.
  glossary_alignment: No hay conflicto con los términos de proyecto mayores. El pasaje no contiene Yahvé/Mesías/etc. La principal cuestión léxica es mantener אֲדָמָה como 'suelo' y no confundirlo con אֶרֶץ, que sí puede ser 'tierra' o 'país' en la segunda mitad del versículo.
  issues:
  - severity: medium
    issue: אֲדָמָה fue traducido como 'tierra' en lugar de 'suelo'/'ground'.
    rationale: El audit trail inglés justifica específicamente 'ground' por el motivo narrativo de Génesis 4 y la relación de Caín con el suelo. En español, 'suelo' conserva mejor esa distinción frente a אֶרֶץ más adelante.
  - severity: low
    issue: La nota [a] no preserva completamente las alternativas documentadas en el POB inglés.
    rationale: El inglés conserva tanto 'I will hide from your presence' como 'I will be hidden from your presence'. La nota española solo ofrece 'de tu presencia', sin reflejar la alternativa pasiva que el audit trail quiso mantener.
  - severity: low
    issue: '''quedaré oculto de tu rostro'' es comprensible pero algo áspero en español.'
    rationale: La fidelidad al modismo hebreo es buena, pero 'de delante de tu rostro' suena más idiomático sin perder la referencia concreta a 'rostro'.
  revised_spanish_text: ¡Mira[a]! Hoy me has echado lejos de la faz del suelo, y quedaré oculto de delante de tu rostro. Seré errante y fugitivo sobre la tierra[b], y sucederá que cualquiera que me encuentre me matará.
  revised_footnotes:
  - marker: a
    text: O «me ocultaré de tu presencia» / «quedaré oculto de tu presencia». El hebreo dice literalmente «de tu rostro».
    reason: lexical_alternative
  - marker: b
    text: O «en la tierra» / «en el país». El hebreo אֶרֶץ puede significar «tierra» o «país», según el contexto.
    reason: lexical_alternative
  revision_rationale: Se revisa 'tierra' a 'suelo' en la primera frase para respetar la distinción fuente entre אֲדָמָה y אֶרֶץ y el razonamiento contextual del POB. Se ajusta la frase sobre el rostro/presencia para que suene más natural en español sin perder el modismo hebreo. También se amplía la nota [a] para reflejar fielmente las alternativas preservadas en el audit trail inglés.
