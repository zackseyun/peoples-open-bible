review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: servicio de bebidas, recipientes de oro, variedad entre recipiente y recipiente, vino real abundante. Sin embargo, la decisión principal para כְּיַד הַמֶּלֶךְ no sigue la opción principal documentada por el POB inglés, que entiende el modismo como medida/generosidad del rey, no como una literalidad en el texto principal.'
  spanish_quality_summary: El español es claro y digno en general. No obstante, «conforme a la mano del rey» suena semitizante y poco natural en español contemporáneo, especialmente al ir en el cuerpo principal. Además, si se mantiene nota [a], debe anclarse al sintagma correspondiente, no a «oro».
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. El ajuste requerido es idiomático-lexical: para כְּיַד הַמֶּלֶךְ conviene usar en el texto principal «según la generosidad del rey» o equivalente, dejando «la mano del rey» en nota como opción más literal, en línea con el audit trail inglés.'
  issues:
  - severity: high
    issue: La frase principal «conforme a la mano del rey» para כְּיַד הַמֶּלֶךְ es demasiado literal y poco idiomática.
    rationale: El hebreo usa un modismo de medida/provisión. El POB inglés eligió como lectura principal «according to the king’s bounty» y dejó la literalidad en nota. En español, la literalidad en el texto principal dificulta la lectura y no comunica bien el sentido.
  - severity: medium
    issue: La nota [a] está anclada a «oro» en lugar de al sintagma final al que realmente explica.
    rationale: La nota trata de כְּיַד הַמֶּלֶךְ, no de «vasos de oro». Debe colocarse junto a la frase final correspondiente para cumplir la disciplina de notas.
  - severity: low
    issue: «Vasos» es aceptable, pero «recipientes» o «vasijas» sería más amplio.
    rationale: כְלִי es amplio. Aun así, dado el contexto de banquete, «vasos» sigue siendo una opción defendible y natural, por lo que no exige cambio.
  revised_spanish_text: Se servían bebidas en vasos de oro, y los vasos eran distintos unos de otros, y el vino real era abundante, según la generosidad del rey[a].
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «conforme a la mano del rey».
    reason: lexical_alternative
  revision_rationale: Se cambia el modismo final a una formulación española natural que comunica el sentido de provisión generosa documentado por el audit trail inglés. Se conserva la literalidad hebrea en nota. También se corrige la ubicación del anclaje de la nota para que corresponda al sintagma explicado.
