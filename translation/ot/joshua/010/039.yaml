id: JOS.10.39
reference: Joshua 10:39
source:
  edition: WLC
  text: וַֽ/יִּלְכְּדָ֞/הּ וְ/אֶת מַלְכָּ֤/הּ וְ/אֶת כָּל עָרֶ֨י/הָ֙ וַ/יַּכּ֣וּ/ם לְ/פִי חֶ֔רֶב וַֽ/יַּחֲרִ֨ימוּ֙ אֶת כָּל נֶ֣פֶשׁ אֲשֶׁר בָּ֔/הּ לֹ֥א הִשְׁאִ֖יר שָׂרִ֑יד כַּ/אֲשֶׁ֨ר עָשָׂ֜ה לְ/חֶבְר֗וֹן כֵּן עָשָׂ֤ה לִ/דְבִ֨רָ/ה֙ וּ/לְ/מַלְכָּ֔/הּ וְ/כַ/אֲשֶׁ֥ר עָשָׂ֛ה לְ/לִבְנָ֖ה וּ/לְ/מַלְכָּֽ/הּ־־־־־־־־׃
translation:
  text: And they captured it[a], along with its king and all its towns, and struck them with the edge of the sword, and they devoted to destruction every person who was in it; they left no survivor. Just as he had done to Hebron, so he did to Debir and its king, and just as he had done to Libnah and its king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they utterly destroyed'; Hebrew 'they devoted to destruction,' using ḥerem language for something placed under total destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְכְּדָהּ
  chosen: they captured it
  alternatives:
  - he captured it
  - they took it
  lexicon: HALOT
  rationale: לכד commonly means 'capture, seize, take' in military contexts. The suffix refers to Debir (feminine city). Although the verb form is 3ms in the morphology, the surrounding narrative repeatedly uses collective/representative singular for Joshua acting with Israel; English plural 'they' best reflects the immediate sequence with following plurals and avoids awkward switching.
- source_word: מַלְכָּהּ
  chosen: its king
  alternatives:
  - her king
  lexicon: HALOT
  rationale: English uses 'its' for a city's ruler; the Hebrew feminine suffix agrees with the city name.
- source_word: כָּל עָרֶיהָ
  chosen: all its towns
  alternatives:
  - all its cities
  - all its settlements
  lexicon: HALOT
  rationale: עיר can mean city/town. Since Debir is the principal city and these are dependent population centers, 'towns' reads naturally in modern English while preserving the administrative sense.
- source_word: וַיַּכּוּם לְפִי חֶרֶב
  chosen: struck them with the edge of the sword
  alternatives:
  - put them to the sword
  - struck them by the mouth of the sword
  lexicon: HALOT
  rationale: The idiom לְפִי חֶרֶב is literally 'to the mouth/edge of the sword.' 'With the edge of the sword' preserves the Hebrew image more transparently than the more idiomatic but less literal 'put them to the sword.'
- source_word: וַיַּחֲרִימוּ
  chosen: they devoted to destruction
  alternatives:
  - they utterly destroyed
  - they put under the ban
  lexicon: HALOT
  rationale: חרם in the Hiphil here denotes placing under ḥerem, a consecrated destruction. 'Devoted to destruction' preserves the technical force better than simply 'destroyed.'
- source_word: כָּל נֶפֶשׁ אֲשֶׁר בָּהּ
  chosen: every person who was in it
  alternatives:
  - every soul that was in it
  - every living being in it
  lexicon: HALOT
  rationale: נפש here refers to persons/inhabitants, not the immaterial soul. 'Every person' is clear modern English and fits the military-population context.
- source_word: לֹא הִשְׁאִיר שָׂרִיד
  chosen: he left no survivor
  alternatives:
  - he left no remnant
  - they left no survivor
  lexicon: HALOT
  rationale: שָׂרִיד means survivor/remnant. The Hebrew shifts to singular הִשְׁאִיר, likely with Joshua as representative leader; this is preserved as 'he left no survivor' rather than smoothing to plural.
- source_word: כַּאֲשֶׁר עָשָׂה לְחֶבְרוֹן כֵּן עָשָׂה
  chosen: Just as he had done to Hebron, so he did
  alternatives:
  - As he did to Hebron, so he did
  - Just as they had done to Hebron, so they did
  lexicon: HALOT
  rationale: The comparative formula marks patterned conquest. English pluperfect 'had done' clarifies the prior reference to Hebron.
- source_word: לִדְבִרָהּ
  chosen: to Debir
  alternatives:
  - against Debir
  lexicon: HALOT
  rationale: The prefixed ל marks the object in this idiom with עשה, best rendered simply 'to Debir.' The directional/paragogic ending does not require special representation in English.
- source_word: וּלְמַלְכָּהּ
  chosen: and its king
  alternatives:
  - and to its king
  lexicon: HALOT
  rationale: English omits the repeated preposition naturally while retaining the coordinated object.
- source_word: וְכַאֲשֶׁר עָשָׂה לְלִבְנָה וּלְמַלְכָּהּ
  chosen: and just as he had done to Libnah and its king
  alternatives:
  - and as he did to Libnah and its king
  lexicon: HALOT
  rationale: This final comparison explicitly links Debir's fate to both Hebron and Libnah; the pluperfect keeps the sequence clear in English.
