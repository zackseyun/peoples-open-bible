translation:
  language: es
  text: Y envió a otros a Gazara[a] para tomar a Juan, y a los comandantes de mil les envió cartas para que vinieran a él[b], para que él les diera plata y oro y regalos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llevarse a Juan»; ἄραι puede expresar tomar, retirar o llevar consigo. El contexto indica intención hostil, pero el verbo no exige especificar captura violenta.'
    reason: lexical_alternative
  - marker: b
    text: Gazara es la forma griega del lugar en el texto fuente; corresponde al más conocido Gezer.
    reason: cultural_note
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: Verbo narrativo básico y natural en español; conserva el envío intencional sin añadir matices no expresados.
- source_word: ἑτέρους
  english_pob_choice: others
  chosen_spanish: a otros
  alternatives_spanish:
  - a otros hombres
  - a otros más
  lexicon: BDAG
  rationale: El griego deja implícitos los destinatarios; 'a otros' mantiene esa elipsis sin introducir sustantivos no presentes.
- source_word: Γάζαρα
  english_pob_choice: Gazara
  chosen_spanish: Gazara
  alternatives_spanish:
  - Gezer
  lexicon: LSJ
  rationale: Se conserva la forma griega del testimonio base; 'Gezer' es el nombre más conocido, pero no es la forma del texto fuente.
- source_word: ἄραι
  english_pob_choice: to take John
  chosen_spanish: tomar a Juan
  alternatives_spanish:
  - llevarse a Juan
  - quitar a Juan
  - apoderarse de Juan
  lexicon: BDAG
  rationale: ἄραι puede expresar tomar, levantar, llevarse o retirar. 'Tomar a Juan' preserva la amplitud semántica sin forzar una violencia explícita que el verbo no exige por sí mismo.
- source_word: τοῖς χιλιάρχοις
  english_pob_choice: to the commanders of thousands
  chosen_spanish: a los comandantes de mil
  alternatives_spanish:
  - a los chiliarcas
  - a los comandantes
  lexicon: BDAG
  rationale: Se traduce el cargo militar de forma descriptiva. 'De mil' refleja el valor literal de χιλίαρχος y evita transliteración innecesaria.
- source_word: ἐπιστολάς
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - escritos
  - misivas
  lexicon: BDAG
  rationale: '''Cartas'' es el equivalente natural y directo para ἐπιστολάς en este contexto narrativo.'
- source_word: παραγενέσθαι πρὸς αὐτόν
  english_pob_choice: to come to him
  chosen_spanish: para que vinieran a él
  alternatives_spanish:
  - para presentarse ante él
  - para acercarse a él
  lexicon: BDAG
  rationale: La construcción final expresa llegada o comparecencia ante alguien; en español, una finalidad con subjuntivo reproduce bien el propósito de la acción.
- source_word: ὅπως δῷ αὐτοῖς
  english_pob_choice: so that he might give them
  chosen_spanish: a fin de darles
  alternatives_spanish:
  - para que les diera
  - con el fin de darles
  lexicon: BDAG
  rationale: Se conserva el valor final de ὅπως con una formulación natural en español. El subjuntivo implícito queda claro por el infinitivo de finalidad después de 'a fin de'.
- source_word: ἀργύριον καὶ χρυσίον
  english_pob_choice: silver and gold
  chosen_spanish: plata, oro
  alternatives_spanish:
  - plata y oro
  - dinero y oro
  lexicon: BDAG
  rationale: Se mantiene la pareja literal de metales preciosos, que en español suena natural y conserva el valor convencional de riqueza.
- source_word: δόματα
  english_pob_choice: gifts
  chosen_spanish: dones
  alternatives_spanish:
  - regalos
  - presentes
  lexicon: BDAG
  rationale: '''Dones'' es aceptable en español bíblico y conserva un registro digno; ''regalos'' sería más cotidiano, pero menos solemne.'
theological_decisions:
- issue: Forma del nombre del lugar Γάζαρα frente a la forma más conocida Gezer
  english_pob_reading: Gazara is the Greek place-name form in the source text; it corresponds to the better-known Gezer.
  chosen_spanish_reading: Gazara se conserva como transliteración del griego; la identificación con Gezer puede notarse aparte.
  alternative_spanish_readings:
  - Gezer
  - Gazara (Gezer)
  rationale: El texto griego presenta Γάζαρα, y la política del proyecto favorece seguir la forma atestiguada cuando es auditable. Mantener 'Gazara' evita sustituir la forma fuente por la forma hebrea más conocida sin una base textual directa.
  doctrine_reference: N/A
- issue: Valor de ἄραι en un contexto hostil
  english_pob_reading: The Greek infinitive can denote taking away or carrying off, and the context suggests hostile intent without requiring a more specific verb such as 'seize.'
  chosen_spanish_reading: '''Tomar a Juan'' conserva la ambigüedad entre tomar, llevarse o retirar, sin afirmar más de lo que el griego dice.'
  alternative_spanish_readings:
  - llevarse a Juan
  - apoderarse de Juan
  rationale: La escena es claramente hostil, pero el verbo por sí solo no obliga a especificar captura violenta. La redacción española mantiene la tensión léxica documentada por el inglés POB.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del inglés POB: se evita añadir ''away'' o cualquier equivalente que no esté expresado en el griego. También se conserva el resto de la estructura narrativa y el paralelismo de envío / cartas / finalidad / regalos. El tratamiento de Γάζαρα respeta la forma griega documentada en el aparato inglés, con nota identificadora para el lector hispanohablante.'
  spanish_consistency_notes:
  - Se mantiene 'Gazara' de forma consistente con la forma griega atestiguada, no 'Gezer' en el texto principal.
  - '''Comandantes de mil'' traduce χιλιάρχοι de manera descriptiva y uniforme con el valor militar literal.'
  - '''Dones'' conserva registro bíblico sin sustituir innecesariamente por ''regalos''.'
  - La finalidad se expresa con 'a fin de', manteniendo claridad sintáctica en español sin expandir el sentido.
