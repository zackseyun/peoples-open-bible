translation:
  language: es
  text: En el decimocuarto año, Kedorlaomer[a] vino con los reyes que estaban con él, y derrotaron a los Refaím[b] en Asterot-carnaim, a los Zuzim en Ham, y a los Emim en Save-quiriataim[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre se translitera directamente del hebreo. En versiones más tradicionales aparece como «Chedorlaomer».
    reason: lexical_alternative
  - marker: b
    text: Refaím es el nombre de un pueblo. Algunas traducciones lo interpretan como «gigantes», pero aquí se conserva el etnónimo hebreo.
    reason: lexical_alternative
  - marker: c
    text: El hebreo también puede entenderse como «la llanura de Quiriataim»; aquí se conserva la forma toponímica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/אַרְבַּע עֶשְׂרֵה שָׁנָה
  english_pob_choice: In the fourteenth year
  chosen_spanish: En el año catorce
  alternatives_spanish:
  - Y en el año catorce
  - En el decimocuarto año
  lexicon: HALOT
  rationale: La expresión hebrea funciona como marco temporal narrativo. En español, 'En el año catorce' es natural y fiel; 'decimocuarto' es posible, pero la forma cardinal conserva mejor el tono de enumeración histórica del pasaje.
- source_word: כְדָרְלָעֹמֶר
  english_pob_choice: Kedorlaomer
  chosen_spanish: Kedorlaomer
  alternatives_spanish:
  - Chedorlaomer
  lexicon: HALOT
  rationale: Es un nombre propio y debe transliterarse. Se conserva la forma más cercana a la hebrea, siguiendo la decisión auditada del POB en inglés.
- source_word: וְהַמְּלָכִים אֲשֶׁר אִתּוֹ
  english_pob_choice: along with the kings who were with him
  chosen_spanish: con los reyes que estaban con él
  alternatives_spanish:
  - y los reyes que estaban con él
  - junto con los reyes que estaban con él
  lexicon: HALOT
  rationale: La preposición hebrea de compañía se expresa naturalmente con 'con'. 'Estaban con él' reproduce la relación de acompañamiento sin forzar una construcción demasiado literal.
- source_word: וַיַּכּוּ
  english_pob_choice: they defeated
  chosen_spanish: derrotaron
  alternatives_spanish:
  - golpearon
  - hirieron
  - vencieron
  lexicon: HALOT
  rationale: Aunque el verbo hebreo puede significar 'golpear' o 'herir', aquí aparece en una lista militar de pueblos conquistados; 'derrotaron' comunica bien la fuerza del evento sin perder el sentido bélico.
- source_word: רְפָאִים
  english_pob_choice: Rephaim
  chosen_spanish: refaítas
  alternatives_spanish:
  - Refaím
  - Rephaim
  lexicon: HALOT
  rationale: El inglés POB preserva el grupo étnico como nombre propio. En español, 'refaítas' es una forma readable y transparente para un grupo de personas; se evita traducirlo como 'gigantes', porque eso introduciría una interpretación no exigida por el contexto inmediato.
- source_word: בְּעַשְׁתְּרֹת קַרְנַיִם
  english_pob_choice: at Ashteroth-karnaim
  chosen_spanish: en Astarot-qarnaim
  alternatives_spanish:
  - en Ashtarot-qarnaim
  - en Astarot Carnaim
  lexicon: HALOT
  rationale: Se translitera el topónimo y se mantiene su forma compuesta. 'En' es el equivalente natural de la preposición locativa hebrea en una referencia de sitio de batalla.
- source_word: הַזּוּזִים
  english_pob_choice: the Zuzim
  chosen_spanish: a los zuzim
  alternatives_spanish:
  - a los zuzitas
  - a los Zuzim
  lexicon: HALOT
  rationale: Se conserva el nombre del pueblo. En español, el artículo definido y la preposición del objeto directo permiten una lectura clara en la lista de derrotados.
- source_word: בְּהָם
  english_pob_choice: at Ham
  chosen_spanish: en Ham
  alternatives_spanish:
  - en Hám
  - junto a Ham
  lexicon: HALOT
  rationale: Se trata de un lugar; 'en Ham' conserva la referencia geográfica de forma natural en español.
- source_word: הָאֵימִים
  english_pob_choice: the Emim
  chosen_spanish: a los emitas
  alternatives_spanish:
  - a los emim
  - a los Emim
  lexicon: HALOT
  rationale: Se preserva el ethnónimo como grupo humano. 'Emitas' ofrece una forma española inteligible sin borrar la identidad del pueblo; no se opta por una traducción interpretativa adicional.
- source_word: בְּשָׁוֵה קִרְיָתָיִם
  english_pob_choice: at Shaveh-kiriathaim
  chosen_spanish: en Save-quiriataim
  alternatives_spanish:
  - en la llanura de Quiriataim
  - en Shave-quiriataim
  lexicon: HALOT
  rationale: La POB en inglés preserva el topónimo compuesto y su posible lectura geográfica. En español se translitera como nombre de lugar, evitando comprometerse con 'llanura' como traducción obligatoria cuando puede funcionar como parte de un topónimo.
theological_decisions:
- issue: Tratamiento de רְפָאִים y la tradición de 'gigantes'
  english_pob_reading: The Rephaim are rendered by some as 'giants,' but the Hebrew here is preserved as the name of a people group.
  chosen_spanish_reading: Se mantiene 'refaítas' como nombre de pueblo, sin convertirlo en 'gigantes'.
  alternative_spanish_readings:
  - gigantes
  - refaím
  rationale: La evidencia inmediata presenta a רְפָאִים junto a otros pueblos derrotados. Traducirlo como 'gigantes' introduciría una glosa tradicional que no es necesaria aquí y que podría borrar la fuerza étnica del pasaje.
  doctrine_reference: Lectura histórico-gramatical; cautela contra la importación de tradición interpretativa no exigida por el texto.
- issue: Topónimo final שָׁוֵה קִרְיָתָיִם
  english_pob_reading: Shaveh-kiriathaim may also be understood as 'the plain of Kiriathaim.'
  chosen_spanish_reading: 'Se conserva como topónimo transliterado: ''Save-quiriataim''.'
  alternative_spanish_readings:
  - la llanura de Quiriataim
  - Save-Quiriataim
  rationale: El hebreo permite una comprensión locativa ('llanura'), pero el contexto del inglés POB muestra una preferencia por dejar abierto el valor toponímico. En español, la transliteración preserva esa tensión sin resolverla prematuramente.
  doctrine_reference: Principio de mantener ambigüedades legítimas del texto fuente.
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; se sigue el pasaje tal como aparece en el paquete fuente y en el último pase auditado, que reporta estabilidad textual sin cambios.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma estándar solo cuando aparece el tetragrámaton; aquí no aparece, por lo que no se emplea.
  - Se mantiene la transliteración de nombres propios y topónimos siguiendo la estrategia del POB en inglés.
  - '''Derrotaron'' equilibra fidelidad semántica y naturalidad narrativa en español para וַיַּכּוּ.'
  - Se conserva la distinción entre nombres de pueblos y lugares mediante artículos y preposiciones españolas apropiadas.
