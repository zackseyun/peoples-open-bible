    text: O «la marca», «la infección» o tradicionalmente «la plaga». Hebreo נֶגַע se refiere al punto o condición afectada bajo inspección sacerdotal.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo טָמֵא: impureza ritual, no necesariamente culpa moral.'
    reason: theological_note
  revision_rationale: La revisión corrige la ubicación de la nota sobre «inspeccionar», hace más concreto הַנֶּגַע con «zona afectada» conforme al expediente inglés y al contexto levítico, y mejora la naturalidad de la cláusula de impureza sin alterar el sentido fuente.
