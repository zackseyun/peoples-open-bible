translation:
  language: es
  text: Y Abraham habitó en la tierra de los filisteos por muchos días[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vivió como extranjero en la tierra de los filisteos por muchos días». El verbo hebreo puede resaltar la residencia como extranjero.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּגָר
  english_pob_choice: stayed
  chosen_spanish: habitó
  alternatives_spanish:
  - se quedó
  - residió
  - sojournó
  - vivió como extranjero
  lexicon: HALOT
  rationale: El verbo גור puede expresar residir como forastero o extranjero. En español, "habitó" comunica con naturalidad la permanencia en un lugar y mantiene mejor la idea de residencia que "se quedó", sin perder la sobriedad narrativa del hebreo.
- source_word: בְּאֶרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en el territorio
  lexicon: HALOT
  rationale: 'אֶרֶץ es amplio: tierra, país, territorio. En este contexto narrativo, "tierra" conserva la expresión bíblica usual y es fiel al valor regional del término.'
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: de los filisteos
  alternatives_spanish:
  - de los filisteos
  lexicon: HALOT
  rationale: Se mantiene el nombre del pueblo en forma estándar española, sin añadir interpretaciones. La construcción posesiva "la tierra de los filisteos" reproduce la relación genitiva del hebreo.
- source_word: יָמִים רַבִּים
  english_pob_choice: for many days
  chosen_spanish: por muchos días
  alternatives_spanish:
  - durante muchos días
  - por largo tiempo
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente "muchos días". "Por muchos días" mantiene la forma idiomática y suena natural en español, sin intensificar ni suavizar el tiempo de permanencia.
- source_word: וַ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Luego
  lexicon: Hebrew grammar
  rationale: La waw narrativa simplemente enlaza la acción anterior con la siguiente. "Y" preserva esa continuidad sin imponer un matiz temporal adicional.
translation_notes:
  revision_awareness: 'El pasaje mantiene el sentido estable del texto hebreo sin cambios sustantivos según el control de revisión más reciente; la única tensión relevante es léxica: וַיָּגָר puede traducirse de forma más coloquial como «habitó» o más explícita como «residió/sojournó», y se conserva esa alternativa en nota.'
  spanish_consistency_notes:
  - Se usa «tierra» como equivalente bíblico de אֶרֶץ en lugar de «país» o «territorio» para mantener consistencia con el registro POB.
  - Se evita «SEÑOR» porque no aparece el nombre divino en este versículo.
  - «Filisteos» sigue la grafía española estándar del etnónimo.
  - La puntuación con punto y coma final no es necesaria; se mantiene una sola cláusula narrativa simple.
