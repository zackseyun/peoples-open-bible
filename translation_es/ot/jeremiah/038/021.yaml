    issue: La nota al pie repite la lectura principal en vez de dar la alternativa léxica documentada.
    rationale: 'El inglés conserva una alternativa para זֶה הַדָּבָר: «this is the matter». En español, la nota debería ofrecer «este es el asunto» o similar. La nota actual («esta es la palabra que Yahvé me ha mostrado») no añade información y no corresponde al audit trail.'
