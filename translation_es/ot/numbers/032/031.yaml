translation:
  language: es
  text: 'Entonces respondieron los hijos de Gad y los hijos de Rubén, diciendo: «Tal como[a] Yahvé ha hablado a tus siervos, así haremos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Lo que Yahvé ha hablado a tus siervos, eso haremos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲנוּ
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - respondieron
  lexicon: HALOT
  rationale: El verbo hebreo introduce una réplica verbal en narrativa. En español, «respondieron» comunica con naturalidad esa respuesta, sin añadir matices ajenos.
- source_word: בְנֵי גָד וּבְנֵי רְאוּבֵן
  english_pob_choice: the sons of Gad and the sons of Reuben
  chosen_spanish: los hijos de Gad y los hijos de Rubén
  alternatives_spanish:
  - los gaditas y los rubenitas
  - los descendientes de Gad y los descendientes de Rubén
  lexicon: HALOT
  rationale: Se conserva la construcción filial explícita del hebreo. Aunque existen equivalentes étnicos, el texto fuente repite «hijos de», y esa transparencia es importante aquí.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  lexicon: HALOT
  rationale: Funciona como introductorio de discurso después de «respondieron». «Diciendo» mantiene la estructura hebrea de forma idiomática en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé». Mantiene el nombre propio divino en lugar de sustituirlo por un título.'
- source_word: אֶל עֲבָדֶיךָ
  english_pob_choice: to your servants
  chosen_spanish: a tus siervos
  alternatives_spanish:
  - a tus esclavos
  lexicon: HALOT
  rationale: Aquí el habla deferente a Moisés hace que «siervos» sea la opción contextual más natural en español, como equivalente de respeto, sin cargar innecesariamente la noción de esclavitud.
- source_word: כֵּן נַעֲשֶׂה
  english_pob_choice: so we will do
  chosen_spanish: así haremos
  alternatives_spanish:
  - lo haremos así
  - por tanto, haremos así
  lexicon: HALOT
  rationale: La correlación de כֵּן con lo anterior queda bien expresada con «así». En español, la futura voluntativa se vierte de modo conciso como «haremos».
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El hebreo usa directamente el Nombre divino. En la serie española del proyecto, la forma estable es «Yahvé», para preservar la identidad del Nombre y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Corregí el problema de validación anterior eliminando la nota al pie no anclada. La redacción española mantiene el sentido del texto fuente sin introducir marcas de nota innecesarias.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al criterio del proyecto para יְהוָה.
  - Se conserva la estructura paralela «los hijos de ... y los hijos de ...» por fidelidad al hebreo.
  - «Siervos» se usa por el matiz deferente contextual, no como neutralización de עֲבָדֶיךָ.
