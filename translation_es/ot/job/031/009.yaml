translation:
  language: es
  text: Si mi corazón ha sido atraído por una mujer[a], y he acechado a la puerta de mi prójimo[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha sido engañado», «ha sido persuadido» o «ha sido seducido». El verbo hebreo puede expresar atracción, persuasión o seducción; aquí se trata de una tentación de carácter sexual.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de mi amigo» o «de mi compañero». רֵעַ puede significar prójimo, amigo o compañero; en este contexto ético, «prójimo» conserva mejor el sentido social amplio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִפְתָּה
  english_pob_choice: has been enticed
  chosen_spanish: ha sido seducido
  alternatives_spanish:
  - ha sido engañado
  - ha sido persuadido
  - ha sido atraído
  lexicon: HALOT
  rationale: El nifal de פתה puede expresar ser seducido, persuadido o engañado. En este contexto de tentación sexual, «ha sido seducido» conserva la fuerza moral del impulso interior sin volver explícita una acción de la mujer que el hebreo no desarrolla.
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi mente
  lexicon: HALOT
  rationale: «Corazón» mantiene la antropología hebrea del centro interior de deseos, decisiones e intenciones. «Mente» aclararía en español, pero perdería la imagen bíblica y el alcance moral del término.
- source_word: עַל אִשָּׁה
  english_pob_choice: by a woman
  chosen_spanish: por una mujer
  alternatives_spanish:
  - hacia una mujer
  - acerca de una mujer
  lexicon: HALOT
  rationale: En español, «por una mujer» comunica de manera natural la ocasión o causa de la seducción interior. Se evita una formulación más literal que sonaría rígida o ambigua en esta construcción condicional.
- source_word: פֶּתַח
  english_pob_choice: door
  chosen_spanish: puerta
  alternatives_spanish:
  - entrada
  - umbral
  - portón
  lexicon: HALOT
  rationale: «Puerta» es la equivalencia natural y breve en español, y conserva la imagen doméstica del versículo. «Entrada» o «umbral» son posibles, pero menos directos para el modismo de acechar fuera de la casa.
- source_word: רֵעִי
  english_pob_choice: my neighbor's
  chosen_spanish: de mi prójimo
  alternatives_spanish:
  - de mi vecino
  - de mi amigo
  - de mi compañero
  lexicon: HALOT
  rationale: «Prójimo» conserva el alcance social y ético de רֵעַ mejor que «vecino» en español, que puede sonar demasiado local o físico. También evita reducir la relación a amistad emocional.
- source_word: אָרָבְתִּי
  english_pob_choice: I have lain in wait
  chosen_spanish: he estado al acecho
  alternatives_spanish:
  - he acechado
  - he estado escondido
  - he aguardado a escondidas
  lexicon: HALOT
  rationale: El verbo ארב implica esperar ocultamente con intención hostil o ilícita. «He estado al acecho» mantiene la idea de vigilancia clandestina y su tono de premeditación mejor que un simple «esperé».
theological_decisions:
- issue: Progresión moral desde deseo interior hasta acción encubierta
  english_pob_reading: Render the verse as an inward enticement followed by deliberate lurking at a neighbor's door, preserving the progression from desire to action.
  chosen_spanish_reading: 'Conservar la secuencia: primero la seducción interior del corazón, luego la vigilancia clandestina a la puerta del prójimo.'
  alternative_spanish_readings:
  - describirlo como simple atracción romántica
  - volverlo una acusación explícita de adulterio cometido
  rationale: El hebreo presenta una autoimprecación condicional que une intención interna y conducta externa. La traducción debe sostener esa escalada moral sin suavizarla ni añadir elementos no expresados en el texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El pasaje coincide con la revisión más reciente sin cambios sustanciales; se mantiene la decisión óptima ya validada por el control cruzado de alta concordancia.
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé» fuera de este versículo porque no aparece en el texto fuente.
  - Se usó «prójimo» para רֵעַ de modo consistente con el registro ético del libro, evitando un localismo demasiado estrecho.
  - El adverbio/locución verbal «he estado al acecho» conserva el matiz de acción sostenida y oculta que el hebreo sugiere.
