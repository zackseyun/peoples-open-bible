  glossary_alignment: No hay conflictos con la terminología base del proyecto. «corazón» y «debajo del sol» están bien orientados. La repetición de עמל puede expresarse en español con «trabajo» / «trabajado» para conservar el paralelismo cognado de manera más transparente que «trabajo» / «afanado».
