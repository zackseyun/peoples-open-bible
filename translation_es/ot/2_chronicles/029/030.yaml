revisions:
- from: Entonces el rey Ezequías y los oficiales dijeron a los levitas que alabaran a Yahvé con las palabras de David y de Asaf el vidente[a]. Y alabaron con júbilo[b], e inclinaron la rodilla y adoraron.
  to: Entonces el rey Ezequías y los oficiales dijeron a los levitas que alabaran a Yahvé con las palabras de David y de Asaf el vidente[a]. Y alabaron con júbilo[b], se inclinaron y adoraron.
  rationale: 'Se reemplaza «e inclinaron la rodilla» por «se inclinaron» para reflejar con mayor fidelidad וַיִּקְּדוּ y evitar añadir un detalle corporal no explícito en el hebreo. También se ajusta la coordinación final a una secuencia española más natural: «se inclinaron y adoraron».'
