    issue: Marcador de nota al pie mal anclado
    rationale: La nota [a] explica «los hijos de Israel», pero en el borrador aparece después de «Jerusalén». Esto rompe la correspondencia exigida entre texto y nota.
  - severity: medium
    issue: «para hacer más mal que las naciones» suena poco natural en español
    rationale: Aunque intenta reflejar la comparación de מִן, la expresión no es idiomática en español. Una formulación como «para hacer lo malo más que las naciones» preserva mejor el sentido comparativo y mejora la legibilidad sin apartarse del hebreo.
  revised_spanish_text: Así Manasés desvió a Judá y a los habitantes de Jerusalén, para hacer lo malo más que las naciones que Yahvé había destruido de delante de los hijos de Israel[a].
