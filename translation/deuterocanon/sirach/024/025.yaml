  from: He who pours out wisdom like Pishon, and like the Tigris in the days of firstfruits.
  to: It fills with wisdom like the Pishon, and like the Tigris in the days of firstfruits.
  rationale: The primary issue with the Cartha draft is the pronoun 'He who'. The antecedent is the Law (νόμος) from verse 23, so the pronoun must be 'It' to avoid confusing the reader. Secondarily, the verb πιπλῶν means 'fills', and while 'pours out' is a defensible dynamic choice for river imagery, 'fills' is more accurate to the Greek and works perfectly well in English ('fills with wisdom'). Finally, standardizing the river names with definite articles ('the Pishon', 'the Tigris') improves the English flow. The draft's choice of 'firstfruits' for 'νέων' is excellent and should be retained.
