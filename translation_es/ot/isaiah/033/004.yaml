translation:
  language: es
  text: Y será recogido tu despojo como la recolección de las langostas[a]; como la acometida de enjambres[b], ellos se abalanzan sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como la recolección de la langosta devoradora»; el hebreo חָסִיל puede denotar una clase o etapa particular de langosta.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo de la segunda comparación es difícil. También puede entenderse: «como un ataque de langostas» o «como langostas que se apresuran».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֻסַּף
  english_pob_choice: And ... will be gathered
  chosen_spanish: Y será reunido
  alternatives_spanish:
  - Y será juntado
  - Y se recogerá
  lexicon: HALOT
  rationale: El pasivo de אסף expresa aquí una acción futura sobre el despojo; en español, «será reunido» conserva bien el sentido pasivo y el matiz de recolección de botín. Se mantiene la simple conjunción inicial con «Y».
- source_word: שְׁלַלְכֶם
  english_pob_choice: your spoil
  chosen_spanish: tu despojo
  alternatives_spanish:
  - tu botín
  - tu saqueo
  lexicon: HALOT
  rationale: שׁלל es el botín tomado en guerra. «Despojo» conserva el registro bíblico y la referencia militar sin suavizar el término. Se opta por el singular colectivo coherente con el hebreo.
- source_word: אֹסֶף
  english_pob_choice: the gathering
  chosen_spanish: se reúne
  alternatives_spanish:
  - la reunión
  - el juntar
  lexicon: HALOT
  rationale: El sustantivo cognado intensifica el verbo precedente. En español, repetir explícitamente «se reúne» reproduce mejor la densidad hebrea que forzar un sustantivo poco natural como «la reunión».
- source_word: הֶחָסִיל
  english_pob_choice: locusts
  chosen_spanish: la langosta
  alternatives_spanish:
  - la langosta devoradora
  - las langostas
  lexicon: HALOT
  rationale: חָסִיל puede señalar una clase o etapa de langosta. En castellano, el singular genérico «la langosta» conserva la imagen colectiva y deja abierta la posibilidad de la nota alternativa sobre el matiz devorador.
- source_word: כְּמַשַּׁק
  english_pob_choice: like the rushing
  chosen_spanish: como el ir y venir
  alternatives_spanish:
  - como el avance
  - como el arremeter
  lexicon: HALOT
  rationale: Es un sustantivo raro y difícil, probablemente de movimiento súbito o embate. «Ir y venir» comunica en español el movimiento rápido y repetido sin resolver de modo excesivo una rareza léxica que sigue siendo ambigua.
- source_word: גֵּבִים
  english_pob_choice: swarms
  chosen_spanish: enjambres
  alternatives_spanish:
  - swarms
  - multitudes
  lexicon: HALOT
  rationale: Dado el campo imagístico de langostas y la idea de movimiento masivo, «enjambres» es el equivalente español más natural y visual. Mantiene el sentido de masa móvil sin precisar indebidamente qué criaturas o grupos se describen.
- source_word: שׁוֹקֵק
  english_pob_choice: rush
  chosen_spanish: se abalanzan
  alternatives_spanish:
  - corren
  - se precipitan
  - rondan
  lexicon: HALOT
  rationale: El participio expresa un movimiento activo, insistente y rápido. «Se abalanzan» transmite la violencia y el ímpetu del verbo mejor que un simple «corren», y permite un sujeto indefinido como en la revisión inglesa.
- source_word: בּוֹ
  english_pob_choice: upon it
  chosen_spanish: sobre él
  alternatives_spanish:
  - sobre ello
  - contra él
  lexicon: HALOT
  rationale: El sufijo pronominal remite al despojo. En español, el masculino singular «él» concuerda con «despojo» y mantiene la imagen de irrupción sobre el botín.
translation_notes:
  revision_awareness: 'La redacción sigue el sentido revisado del inglés POB, especialmente la corrección del sujeto indefinido en la segunda cola: el hebreo no especifica «hombres», por lo que la versión española conserva un sujeto impersonal («ellos») sin añadir elementos ajenos al texto. También mantiene la intensidad cognada de אסף mediante una repetición verbal suave en español, aunque no idéntica al hebreo.'
  spanish_consistency_notes:
  - Se usa «despojo» para שׁלל en coherencia con el registro bélico del pasaje.
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - «Langosta» se deja en singular genérico para reflejar el sustantivo hebreo y la imagen colectiva.
  - La ambigüedad de la segunda mitad se conserva con una formulación suficientemente abierta, sin resolverla de manera interpretativa excesiva.
