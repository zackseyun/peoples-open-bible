translation:
  language: es
  text: 'Y les dijo[a]: «Así dice Yahvé, el Dios de Israel: Díganle al hombre que los envió a mí»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: el nombre divino יְהוָה aparece aquí; se traduce «Yahvé» según la práctica del proyecto, en lugar de ocultarlo tras un título como «SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: And she said
  chosen_spanish: Y ella les dijo
  alternatives_spanish:
  - Entonces ella les dijo
  lexicon: HALOT
  rationale: La forma wayyiqtol introduce la secuencia narrativa; en español, «Y» mantiene el avance del relato y «les dijo» expresa de modo natural el verbo אמר en un contexto de discurso directo.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El sufijo de tercera persona plural se expresa con el dativo pronominal español «les», claro y conciso.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética se conserva con un presente en español, idiomático y fiel al valor de proclamación inmediata.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino según la norma del proyecto para יְהוָה, evitando la sustitución por un título.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios, el Dios de Israel
  - el Dios que es de Israel
  lexicon: HALOT
  rationale: La construcción en cadena se vierte de manera directa y natural en español, conservando el vínculo pactual e identificador.
- source_word: אִמְרוּ
  english_pob_choice: Say
  chosen_spanish: Decid
  alternatives_spanish:
  - Hablad
  - Dad este mensaje
  lexicon: HALOT
  rationale: El imperativo plural exige una forma plural en español; «Decid» reproduce con cercanía el valor del verbo אמר sin ampliar el contenido.
- source_word: לָאִישׁ
  english_pob_choice: to the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - al varón
  - a ese hombre
  lexicon: HALOT
  rationale: «איש» es singular masculino y aquí identifica al destinatario concreto del mensaje; «hombre» mantiene la referencia lexical sin neutralizar el género.
- source_word: אֲשֶׁר שָׁלַח אֶתְכֶם אֵלָי
  english_pob_choice: who sent you to me
  chosen_spanish: que os envió a mí
  alternatives_spanish:
  - que os mandó a mí
  - que os envió hacia mí
  lexicon: HALOT
  rationale: La relativa con שלח se expresa de modo directo. «A mí» conserva la dirección del hebreo אֵלַי sin añadir matices no presentes en el texto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama de forma explícita; por coherencia con la política del proyecto, se traslada como «Yahvé» para preservar el nombre revelado y no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: la secuencia narrativa, la fórmula profética, el nombre divino y la dirección del mensaje se mantienen sin cambios relevantes respecto del criterio ya validado.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» para יְהוָה en todo el versículo.
  - Se conserva el tono profético formal con «Así dice».
  - El imperativo plural queda explícito con «Decid».
  - «al hombre» mantiene la referencia singular masculina del hebreo.
