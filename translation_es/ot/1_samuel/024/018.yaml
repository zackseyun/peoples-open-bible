    rationale: El hebreo no exige pronombre explícito en español. «Y dijo a David» conserva el sujeto implícito y suena más natural.
  - severity: low
    issue: 'Conector contrastivo algo cargado: «mientras que yo».'
    rationale: «Mientras yo» expresa bien el contraste de וַאֲנִי en español fluido, sin sobrecargar la cláusula.
