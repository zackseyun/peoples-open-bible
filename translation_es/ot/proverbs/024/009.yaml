base_translation:
  language: en
  yaml_path: translation/ot/proverbs/024/009.yaml
  text: The scheme of folly is sin[b][a], and a scoffer is an abomination to mankind.
  footnotes:
  - marker: a
    text: Or 'to humankind' / 'to people'; Hebrew 'to man' uses אדם generically for humanity.
    reason: lexical_alternative
  - marker: b
    text: Or 'a mocker' for 'a scoffer.'
    reason: lexical_alternative
