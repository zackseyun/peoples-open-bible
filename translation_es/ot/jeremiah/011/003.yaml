translation:
  language: es
  text: 'Y les dirás: «Así dice Yahvé, el Dios de Israel: Maldito sea el hombre que no obedezca[a] las palabras de este convenio».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que no escuche las palabras de este convenio». El verbo hebreo puede incluir el sentido de oír con respuesta obediente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  english_pob_choice: And you shall say
  chosen_spanish: Y tú les dirás
  alternatives_spanish:
  - Y dirás
  - Entonces les dirás
  lexicon: HALOT
  rationale: El valor directivo de la forma waw + perfecto en una instrucción profética se expresa bien con futuro exhortativo en español. Se conserva la dirección a un destinatario plural ('les') y la comisión directa sin volver la frase más pesada de lo necesario.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a ellos mismos
  lexicon: HALOT
  rationale: El dativo plural se integra naturalmente en español como pronombre átono, manteniendo claridad y fluidez en la orden profética.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así ha dicho
  alternatives_spanish:
  - Así dice
  - Esto dice
  lexicon: HALOT
  rationale: Se conserva la fórmula profética solemne. 'Así ha dicho' reproduce el registro clásico y sigue siendo claro en español contemporáneo; evita un giro demasiado coloquial como 'esto dice'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ''Yahvé'' en el texto principal. Es una transliteración del nombre divino y evita la sustitución por un título.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa se expresa de manera natural en español con 'el Dios de Israel', conservando la identificación pactual de Yahvé con Israel.
- source_word: אָרוּר
  english_pob_choice: Cursed
  chosen_spanish: Maldito sea
  alternatives_spanish:
  - Cursed / Maldito
  lexicon: HALOT
  rationale: El predicado introduce lenguaje de maldición pactual. En español, 'Maldito sea' comunica mejor la fuerza declarativa/judicial del hebreo que un simple adjetivo aislado.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el que
  lexicon: HALOT
  rationale: Se mantiene el singular masculino marcado del hebreo, con valor representativo/generérico. 'El hombre' es la correspondencia más directa y sobria en español.
- source_word: אֲשֶׁר לֹא יִשְׁמַע
  english_pob_choice: who does not obey
  chosen_spanish: que no obedezca
  alternatives_spanish:
  - que no oiga
  - que no escuche
  lexicon: HALOT
  rationale: Siguiendo el ajuste revisado del audit trail inglés, שׁמע aquí lleva el sentido de respuesta obediente al pacto, no mera audición. En español, 'obedezca' expresa mejor esa fuerza covenantal que 'oiga' o 'escuche'.
- source_word: אֶת דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - las palabras de
  lexicon: HALOT
  rationale: Se conserva 'palabras' para דִּבְרֵי, manteniendo cercanía al hebreo y el ritmo de la fórmula de pacto.
- source_word: הַבְּרִית הַזֹּאת
  english_pob_choice: this covenant
  chosen_spanish: este pacto
  alternatives_spanish:
  - este pacto
  - esta alianza
  lexicon: HALOT
  rationale: Aunque 'covenant' suele verterse como 'pacto' o 'alianza', aquí se elige 'pacto' para una lectura bíblica amplia y clara en español, manteniendo la referencia jurídica de la fórmula sin cargarla con un tecnicismo eclesiástico.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El hebreo contiene explícitamente el Tetragrámaton, y el proyecto pide preservarlo como nombre propio en español. 'Yahvé' sigue esa decisión y evita la sustitución litúrgica por 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido covenantal de שׁמע
  english_pob_reading: who does not obey
  chosen_spanish_reading: que no obedezca
  alternative_spanish_readings:
  - que no escuche
  - que no oiga
  rationale: La revisión inglesa ya reconoce que el verbo aquí puede implicar respuesta obediente. En español, 'obedecer' comunica esa carga relacional y pactual mejor que una traducción meramente auditiva.
  doctrine_reference: 'DOCTRINE.md: Lexical-theological tension — שׁמע hearing with obedient response'
- issue: Lenguaje de maldición pactual
  english_pob_reading: Cursed is the man
  chosen_spanish_reading: Maldito sea el hombre
  alternative_spanish_readings:
  - Maldito el hombre
  - Sea maldito el hombre
  rationale: La frase funciona como sanción judicial/pactual, no solo como insulto. 'Maldito sea' conserva el tono declarativo y solemne de la sentencia.
  doctrine_reference: 'DOCTRINE.md: Covenant sanctions and judicial language'
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión explícita de 'listen to' a 'obey' para captar mejor el valor covenantal de שׁמע. Esta versión española sigue esa revisión y la hace explícita en la nota, mientras mantiene el resto del verso sin expansión innecesaria. También se preservó la fórmula profética tradicional y la decisión doctrinal de usar 'Yahvé'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar para el Tetragrámaton en todo el proyecto.
  - '''Pacto'' se usa para בְּרִית por coherencia terminológica, aunque en algunos contextos pueda alternar con ''alianza''.'
  - La nota al pie acompaña la elección de 'obedezca' para reflejar la tensión semántica de שׁמע sin perder la lectura alternativa de oír/escuchar.
