base_translation:
  language: en
  yaml_path: translation/ot/genesis/004/014.yaml
  text: Look[a], today you have driven me away from the face of the ground, and I will be hidden from your face. I will be a wanderer and a fugitive on the earth[b], and whoever finds me will kill me.
  footnotes:
