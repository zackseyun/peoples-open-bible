translation:
  language: es
  text: Préstame atención y respóndeme; estoy inquieto[a] en mi queja[b], y gimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ando inquieto en mi queja» o «deambulo inquieto en mi queja». El verbo hebreo puede sugerir agitación inquieta o un deambular sin sosiego bajo la angustia.'
    reason: lexical_alternative
  - marker: b
    text: «Queja» también puede traducirse «meditación» o «reflexión»; aquí el contexto de lamentación favorece «queja».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְשִׁיבָה
  english_pob_choice: Pay attention
  chosen_spanish: Presta atención
  alternatives_spanish:
  - Escúchame
  - Pon atención a mí
  lexicon: HALOT
  rationale: El imperativo pide una escucha atenta y urgente. «Presta atención» es natural en español moderno y conserva mejor la fuerza de súplica que una forma más arcaica.
- source_word: לִּי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - me
  lexicon: HALOT
  rationale: El pronombre de primera persona funciona como objeto del imperativo; en español se expresa con claridad como complemento enfático «a mí».
- source_word: וַעֲנֵנִי
  english_pob_choice: and answer me
  chosen_spanish: y respóndeme
  alternatives_spanish:
  - y contéstame
  - y responde a mí
  lexicon: HALOT
  rationale: ענה en este contexto es responder en una súplica. «Respóndeme» es directo, idiomático y mantiene el tono de oración.
- source_word: אָרִיד
  english_pob_choice: I am restless
  chosen_spanish: estoy inquieto
  alternatives_spanish:
  - ando inquieto
  - me encuentro agitado
  - estoy vagando inquieto
  lexicon: HALOT
  rationale: El verbo puede sugerir agitación o vagar sin sosiego. En español, «estoy inquieto» comunica bien ese estado interior sin forzar una imagen más específica que el contexto no exige.
- source_word: בְּשִׂיחִי
  english_pob_choice: in my complaint
  chosen_spanish: en mi lamento
  alternatives_spanish:
  - en mi queja
  - en mi meditación
  - en mi meditar
  lexicon: HALOT
  rationale: שׂיח puede significar meditación, musing o queja/lamento. Aquí el contexto de aflicción favorece un término de lamentación; «lamento» preserva la carga emocional sin cerrar del todo la gama semántica.
- source_word: וְאָהִימָה
  english_pob_choice: and I moan
  chosen_spanish: y gimo
  alternatives_spanish:
  - y me gimo
  - y me lamento
  - y hago gemir
  lexicon: HALOT
  rationale: El verbo denota emitir un sonido de dolor o gemido. «Gimo» reproduce con naturalidad la vocalización del sufrimiento en español.
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés están en alta concordancia; no hubo revisiones aplicadas. La versión española mantiene esa lectura estable y conserva las dos zonas de ambigüedad léxica principales: שׂיח como lamento/queja/meditación y אָרִיד como inquietud o agitación.'
  spanish_consistency_notes:
  - Se usa un español neutral y litúrgicamente legible, evitando arcaísmos innecesarios.
  - Se conserva el tono de súplica directa en imperativo y respuesta.
  - No se introduce terminología doctrinal, porque el versículo es un lamento poético sin carga doctrinal específica.
