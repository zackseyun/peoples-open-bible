translation:
  language: es
  text: En cuanto a los consagrados[a] que están en la tierra[b], ellos son los nobles[c] en quienes está todo mi deleite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los santos».
    reason: lexical_alternative
  - marker: b
    text: O «que están en el país».
    reason: lexical_alternative
  - marker: c
    text: O «los excelentes» o «los majestuosos».
    reason: lexical_alternative
lexical_decisions:
- source_word: לִקְדוֹשִׁים
  english_pob_choice: As for the holy ones
  chosen_spanish: En cuanto a los santos
  alternatives_spanish:
  - En cuanto a los santos consagrados
  - A los santos
  - En cuanto a los santos fieles
  lexicon: HALOT
  rationale: El ל prefijado funciona aquí mejor como marcador discursivo/topical, por lo que «En cuanto a» comunica la relación del verso sin forzar un dativo simple. Para קְדוֹשִׁים, «santos» es el equivalente natural y tradicional en español eclesial, aunque en notas se conserva la alternativa más literal «santos consagrados» implícita en el sustantivo hebreo.
- source_word: אֲשֶׁר בָּאָרֶץ
  english_pob_choice: who are in the land
  chosen_spanish: que están en la tierra
  alternatives_spanish:
  - que están en el país
  - que están en la tierra prometida
  - que están sobre la tierra
  lexicon: HALOT
  rationale: אָרֶץ puede ser «tierra» o «país/land». Aquí, como en el inglés POB, «tierra» mantiene la amplitud semántica y evita cerrar prematuramente el sentido a un territorio específico. «Están» reproduce con naturalidad la cláusula relativa de identificación.
- source_word: וְאַדִּירֵי
  english_pob_choice: the noble ones
  chosen_spanish: los nobles
  alternatives_spanish:
  - los majestuosos
  - los excelentes
  - los poderosos
  lexicon: HALOT
  rationale: אַדִּיר puede expresar nobleza, majestad o excelencia. «Los nobles» preserva la dignidad y el valor honorífico del término sin cargarlo con la idea de fuerza militar o grandiosidad excesiva.
- source_word: כָּל חֶפְצִי
  english_pob_choice: all my delight
  chosen_spanish: todo mi deleite
  alternatives_spanish:
  - todo mi placer
  - todo mi deseo
  - toda mi satisfacción
  lexicon: HALOT
  rationale: חֵפֶץ abarca deleite, placer o deseo. «Mi deleite» es idiomático en español y conserva el matiz afectivo de valoración gozosa que el inglés POB también buscó.
- source_word: בָם
  english_pob_choice: in whom
  chosen_spanish: en quienes
  alternatives_spanish:
  - en ellos
  - en quien
  lexicon: HALOT
  rationale: Aunque el hebreo usa un pronombre plural de tercera persona, el referente es personal; «en quienes» suena más natural y literario en español que «en ellos» y mantiene el valor relacional de la preposición ב.
theological_decisions:
- issue: Identidad de «los santos»
  english_pob_reading: human faithful people in the land
  chosen_spanish_reading: personas fieles de Dios en la tierra
  alternative_spanish_readings:
  - seres celestiales santos
  - los consagrados en sentido general
  - los fieles de la comunidad
  rationale: La frase «que están en la tierra» favorece fuertemente una lectura humana y terrenal, no seres celestiales. «Santos» conserva la tensión posible entre lenguaje bíblico de consagración y uso eclesial posterior, sin resolverla artificialmente. La nota de sentido en español puede entender «santos» como los fieles de Dios presentes en la esfera terrenal.
  doctrine_reference: Primacía del texto original y preservación de la tensión exegética; no importar automáticamente la terminología eclesial técnica.
translation_notes:
  revision_awareness: 'Coincide con la evaluación de alta concordancia: no se identificaron revisiones pendientes en el audit trail más reciente, y la redacción española sigue la misma decisión interpretativa principal del inglés POB.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología estándar del proyecto, aunque este verso no contiene el nombre divino.
  - Se prefirió «santos» por fidelidad semántica y fluidez eclesial en español, sin borrar la alternativa lexical más amplia.
  - «Tierra» conserva la ambigüedad de אָרֶץ entre territorio y esfera terrestre, acorde con el contexto.
  - La estructura «En cuanto a...» reproduce el valor discursivo del prefijo ל según el audit trail inglés.
