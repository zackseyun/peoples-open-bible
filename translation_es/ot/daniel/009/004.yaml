    reason: lexical_alternative
  - marker: b
    text: O «misericordia» / «fidelidad pactal». El hebreo חֶסֶד lleva la idea de amor fiel, lealtad de pacto y misericordia.
    reason: lexical_alternative
  revision_rationale: Se ajusta הַנּוֹרָא a «imponente» para un español más natural y reverencial, evitando el matiz demasiado negativo de «temible», mientras la nota conserva la alternativa «asombroso». Se cambia חֶסֶד de «lealtad» a «amor leal» para reflejar mejor la combinación de afecto y fidelidad pactal documentada en el expediente. También se mejora la fluidez sintáctica de la invocación.
