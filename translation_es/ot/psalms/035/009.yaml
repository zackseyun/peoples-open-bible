translation:
  language: es
  text: Entonces mi alma se regocijará en Yahvé[a]; exultará en su salvación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y mi alma se regocijará en Yahvé.»'
    reason: alternative_reading
  - marker: b
    text: 'O: «exultará en su liberación.»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנַפְשִׁי
  english_pob_choice: Then my soul
  chosen_spanish: Entonces mi alma
  alternatives_spanish:
  - Y mi alma
  - Y mi vida
  - Yo mismo
  lexicon: HALOT
  rationale: נֶפֶשׁ puede expresar ‘alma’, ‘vida’ o ‘yo mismo’. En poesía de alabanza, ‘mi alma’ mantiene el sentido interior y personal. El prefijo וְ se vierte como ‘Entonces’ para reflejar la continuidad lógica con la liberación esperada, siguiendo el valor discursivo documentado en la decisión inglesa.
- source_word: תָּגִיל
  english_pob_choice: will rejoice
  chosen_spanish: se regocijará
  alternatives_spanish:
  - se alegrará
  - exultará
  lexicon: HALOT
  rationale: גיל en qal expresa gozo o júbilo. ‘Se regocijará’ es natural en español y conserva el matiz de alegría celebratoria sin sonar plano.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahveh
  - en Yahweh
  lexicon: HALOT
  rationale: El hebreo usa el nombre divino YHWH directamente. Conforme al estándar español del proyecto, se traduce como ‘Yahvé’, preservando el nombre de pacto y evitando el ocultamiento mediante una sustitución genérica.
- source_word: תָּשִׂישׂ
  english_pob_choice: will exult
  chosen_spanish: se exaltará
  alternatives_spanish:
  - exultará
  - se regocijará
  lexicon: HALOT
  rationale: שׂוּשׂ/שׂישׂ denota gozo exuberante. ‘Se exaltará’ comunica ese júbilo intenso y mantiene la intensificación paralela frente a ‘se regocijará’.
- source_word: בִּישׁוּעָתוֹ
  english_pob_choice: in his salvation
  chosen_spanish: en su salvación
  alternatives_spanish:
  - en su liberación
  - por su salvación
  lexicon: HALOT
  rationale: יְשׁוּעָה puede significar ‘salvación’ o ‘liberación’. En este contexto poético, ‘salvación’ preserva el alcance teológico sin perder la idea concreta de rescate. Se conserva la preposición ‘en’ para mantener el paralelismo con ‘en Yahvé’.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton. En la línea editorial española del proyecto, se usa ‘Yahvé’ para preservar el nombre del pacto en lugar de ocultarlo con un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La traducción inglesa fue revisada y quedó sin cambios; el consenso de revisión fue alto. La presente propuesta sigue esa lectura estable, conservando las dos opciones alternativas documentadas: la coordinación discursiva de וְ como ‘Entonces’ y el matiz de יְשׁוּעָה como ‘salvación’ o ‘liberación’.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma española para YHWH, conforme al estándar del proyecto.
  - ‘alma’ conserva el paralelo poético con la alabanza interior y evita reducir נֶפֶשׁ a mero ‘vida’.
  - ‘se exaltará’ refuerza el paralelismo semántico con ‘se regocijará’ sin duplicarlo de manera excesivamente plana.
  - Las notas a y b se anclan en las palabras correspondientes del texto para preservar las alternativas documentadas.
