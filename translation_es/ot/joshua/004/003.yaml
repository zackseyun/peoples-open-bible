    issue: La nota [a] está anclada en 'mándales' pero el rastro de auditoría inglés usa esa nota para una alternativa formal de 'from the place where the priests’ feet stood firm'.
    rationale: Esto altera la documentación léxica del versículo y hace que la nota no preserve la misma alternativa significativa del original auditado.
  - severity: medium
