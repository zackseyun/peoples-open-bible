translation:
  language: es
  text: Aprendan prudencia, ingenuos; y aprendan entendimiento[a], necios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «corazón». Aquí «corazón» se refiere a la facultad interior de comprender y juzgar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבִינוּ
  english_pob_choice: Learn
  chosen_spanish: Aprendan
  alternatives_spanish:
  - Entiendan
  - Adquieran entendimiento
  lexicon: HALOT
  rationale: El imperativo plural de בין expresa la llamada a captar/discernir. «Aprendan» conserva el tono exhortativo y el paralelismo sapiencial de la línea, sin sonar rígido en español.
- source_word: פְתָאיִם
  english_pob_choice: simple ones
  chosen_spanish: los ingenuos
  alternatives_spanish:
  - los simples
  - los inexpertos
  - los ingenuos y crédulos
  lexicon: HALOT
  rationale: En Proverbios, פתי nombra a los inexpertos o fácilmente engañables, no a personas con discapacidad intelectual. «Ingenuos» comunica bien esa falta de discernimiento sin cargarlo con un matiz peyorativo excesivo.
- source_word: עָרְמָה
  english_pob_choice: prudence
  chosen_spanish: prudencia
  alternatives_spanish:
  - astucia prudente
  - sensatez
  - discreción
  lexicon: HALOT
  rationale: Aquí ערמה tiene valor positivo en el contexto sapiencial. «Prudencia» expresa mejor en español esa capacidad de discernimiento práctico y prudente que «astucia», que fácilmente suena negativa.
- source_word: וּכְסִילִים
  english_pob_choice: and ... you fools
  chosen_spanish: ustedes los necios
  alternatives_spanish:
  - y ustedes los necios
  - y los necios
  - ustedes los necios y obstinados
  lexicon: HALOT
  rationale: כְסִילִים es el término sapiencial para los necios moralmente tercos. «Necios» conserva el registro bíblico y el contraste directo con «ingenuos».
- source_word: הָבִינוּ
  english_pob_choice: learn
  chosen_spanish: aprendan
  alternatives_spanish:
  - entiendan
  - adquieran entendimiento
  lexicon: HALOT
  rationale: Se repite el mismo verbo imperativo; mantener «aprendan» en ambas mitades preserva la repetición enfática del hebreo y la simetría del verso.
- source_word: לֵב
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - corazón
  - discernimiento
  - mente
  lexicon: HALOT
  rationale: Aunque לֵב literalmente es «corazón», aquí designa la facultad interior de pensar y juzgar. «Entendimiento» comunica su función en contexto; la alternativa literal se conserva en nota.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje mantiene alto acuerdo con la evaluación cruzada y no requiere ajuste adicional.
  spanish_consistency_notes:
  - Se mantiene un tono sapiencial directo y plural, con vocativos explícitos para reflejar el hebreo.
  - Se evita traducir עָרְמָה como «astucia» sin calificativo negativo, porque el contexto la presenta como virtud.
  - «Entendimiento» se usa para לֵב por claridad, mientras la nota preserva el valor literal de «corazón».
