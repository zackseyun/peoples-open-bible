translation:
  language: es
  text: 'Y de la media tribu de Manasés: Taanac con sus pastos[a], y Gat-rimón con sus pastos; dos ciudades.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos hebreos y el paralelo de 1 Crónicas 6:70 difieren en los nombres de las ciudades asignadas a Manasés.
    reason: textual_variant
lexical_decisions:
- source_word: וּ/מִֽ/מַּחֲצִית מַטֵּה מְנַשֶּׁה
  english_pob_choice: And from the half-tribe of Manasseh
  chosen_spanish: Y de la media tribu de Manasés
  alternatives_spanish:
  - Y de la mitad de la tribu de Manasés
  - Y de la media tribu de Manasés
  lexicon: HALOT
  rationale: En el contexto de repartos territoriales, מַחֲצִית מַטֵּה expresa una subdivisión tribal, no una mitad abstracta. «Media tribu» reproduce bien la fórmula bíblica y es natural en español eclesial.
- source_word: תַּעְנַךְ
  english_pob_choice: Taanach
  chosen_spanish: Taanac
  alternatives_spanish:
  - Ta'anac
  - Taanaj
  lexicon: Nombre propio geográfico en tradición bíblica
  rationale: Se conserva el topónimo con una transliteración española sobria. «Taanac» evita una grafía demasiado anglófona y mantiene la identificación del lugar.
- source_word: מִגְרָשֶׁהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - su tierra de pastos
  - sus alrededores
  - sus ejidos
  lexicon: HALOT
  rationale: מִגְרָשׁ señala el terreno abierto asociado a la ciudad. «Pastizales» comunica la función espacial y agrícola; «ejidos» sería posible, pero puede sonar demasiado técnico o regional según el lector.
- source_word: גַּת רִמּוֹן
  english_pob_choice: Gath-rimmon
  chosen_spanish: Gat-rimón
  alternatives_spanish:
  - Gat Rimón
  - Gat-rimón
  lexicon: Nombre propio geográfico en tradición bíblica
  rationale: Se conserva el compuesto como topónimo. El guion ayuda a ver la unidad del nombre, y el acento en «rimón» respeta la pronunciación española.
- source_word: עָרִים שְׁתָּיִם
  english_pob_choice: two cities
  chosen_spanish: dos ciudades
  alternatives_spanish:
  - dos pueblos
  - dos poblados
  lexicon: HALOT
  rationale: «Ciudades» sigue la fórmula bíblica de listas territoriales. En español puede abarcar asentamientos sin exigir gran tamaño urbano.
theological_decisions:
- issue: Terminología tribal y reparto heredado
  english_pob_reading: The verse is a territorial allocation list with no added theological gloss.
  chosen_spanish_reading: Se mantiene como lista de asignación territorial sin ampliar el sentido.
  alternative_spanish_readings:
  - Interpretarlo más libremente como una descripción administrativa
  - Añadir una glosa sobre la herencia tribal
  rationale: El hebreo es enumerativo y el POB inglés también evita comentario interpretativo. La traducción debe conservar ese carácter seco y administrativo.
  doctrine_reference: Josué 21; reparto de la herencia tribal en la tierra
translation_notes:
  revision_awareness: Se siguió el estado de alta concordancia del audit trail en inglés; no hubo revisiones aplicadas y la lectura textual se mantiene estable respecto del texto base.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto cuando aparezca el Tetragrámaton; aquí no aparece.
  - Se prefirió mantener los topónimos con transliteración española consistente, sin normalizarlos a formas eclesiásticas latinizadas.
  - «Media tribu» conserva la fórmula de reparto tribal y evita una traducción analítica excesiva.
  - «Pastizales» traduce el valor espacial de מִגְרָשׁ sin imponer una equivalencia jurídica moderna.
