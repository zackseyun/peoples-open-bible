translation:
  language: es
  text: 'El rey envió una respuesta a Rehum el comandante[a], a Shimshai el escriba y al resto de sus asociados que viven en Samaria, y al resto más allá del Río[b]: Paz[c]. Y ahora—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Arameo administrativo: el título puede entenderse como «comandante» o, en traducciones más tradicionales, «canciller».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «más allá del Río»; se trata de la región persa al oeste del Éufrates.
    reason: cultural_note
  - marker: c
    text: O «Saludos» para «Paz».
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּתְגָמָא
  english_pob_choice: a reply
  chosen_spanish: una respuesta
  alternatives_spanish:
  - una réplica
  - un mensaje
  - una contestación
  lexicon: HALOT
  rationale: En arameo imperial, el término designa una comunicación oficial o una contestación escrita. Como aquí el rey responde al escrito anterior, 'respuesta' conserva el valor responsivo sin convertirlo en 'decreto' ni volverlo demasiado técnico.
- source_word: שְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: Es el verbo simple de envío; 'envió' suena natural en español y mantiene el movimiento epistolar del texto.
- source_word: מַלְכָּא
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: La forma definida se refiere al rey persa ya presente en el contexto. 'El rey' es la forma más directa y fiel.
- source_word: בְּעֵל טְעֵם
  english_pob_choice: the commander
  chosen_spanish: el comandante
  alternatives_spanish:
  - el canciller
  - el oficial principal
  - el gobernador
  lexicon: HALOT
  rationale: La expresión literalmente puede sugerir 'amo de consejo/discreción', pero en este contexto administrativo nombra un cargo de autoridad. 'Comandante' conserva la idea de liderazgo oficial sin imponer una identificación institucional demasiado específica.
- source_word: סָפְרָא
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  lexicon: HALOT
  rationale: Es un título administrativo bien establecido. 'Escriba' conserva la función literaria y oficial del cargo.
- source_word: שְׁאָר כְּנָוָתְהוֹן
  english_pob_choice: the rest of their associates
  chosen_spanish: el resto de sus asociados
  alternatives_spanish:
  - el resto de sus compañeros
  - el resto de sus colegas
  lexicon: HALOT
  rationale: La frase señala a los demás que pertenecen o están alineados con los nombrados. 'Asociados' es amplio y adecuado para el marco administrativo.
- source_word: דִּי יָתְבִין בְּשָׁמְרָיִן
  english_pob_choice: who live in Samaria
  chosen_spanish: que viven en Samaria
  alternatives_spanish:
  - que habitan en Samaria
  - que residen en Samaria
  lexicon: HALOT
  rationale: El participio expresa residencia. 'Viven' es idiomático y claro en español moderno.
- source_word: וּשְׁאָר עֲבַר נַהֲרָה
  english_pob_choice: and the rest beyond the River
  chosen_spanish: y al resto más allá del Río
  alternatives_spanish:
  - y al resto del territorio más allá del Río
  - y al resto de TransÉufrates
  lexicon: HALOT
  rationale: Se conserva la referencia geográfica administrativa sin añadir 'provincia', ya que no está en la forma hebrea/aramea aquí. 'Más allá del Río' sigue la huella del original y evita sobreinterpretar el término.
- source_word: שְׁלָם
  english_pob_choice: Peace
  chosen_spanish: Paz
  alternatives_spanish:
  - Paz para ustedes
  - Saludos
  lexicon: HALOT
  rationale: Es la salutación epistolar literal. 'Paz' preserva el contenido léxico; 'Saludos' sería más idiomático pero menos cercano al original.
- source_word: וּכְעֶת
  english_pob_choice: And now—
  chosen_spanish: Y ahora—
  alternatives_spanish:
  - Y ahora
  - Y en este momento—
  lexicon: HALOT
  rationale: La fórmula introduce lo que sigue en el versículo siguiente. El guion final refleja la continuación inmediata del discurso.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto arameo de WLC y toma en cuenta el auditorial inglés de la POB, especialmente la decisión de no añadir «provincia» a עֲבַר נַהֲרָה, la preferencia por una salutación literal en שְׁלָם, y el valor epistolar de וּכְעֶת con cierre en raya.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo/Mesías» por no aparecer en el texto.
  - Se conservó el tono administrativo-epistolar del original sin introducir fórmulas eclesiásticas.
