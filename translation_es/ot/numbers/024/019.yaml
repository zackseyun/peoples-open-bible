- from: Y uno reinará[a] desde Jacob, y destruirá[b] al sobreviviente de la ciudad.
  to: Y uno reinará[a] procedente de Jacob, y destruirá al sobreviviente[b] de la ciudad.
  rationale: Se ajusta «desde Jacob» a «procedente de Jacob» para reflejar mejor la idea de origen en un español más natural y preciso. Se mueve la nota [b] al sustantivo «sobreviviente», que es donde realmente recae la alternativa léxica, y se simplifica su redacción para evitar confusión sintáctica. No se requiere una revisión doctrinal mayor.
