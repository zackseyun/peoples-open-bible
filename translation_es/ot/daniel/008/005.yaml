translation:
  language: es
  text: Mientras yo consideraba[a], y he aquí, un macho cabrío[b] venía desde el oeste sobre toda la tierra, sin tocar el suelo; y el macho cabrío tenía un cuerno notable[c] entre sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «yo estaba entendiendo». El hebreo expresa una acción en curso; en contexto describe consideración atenta de la visión.
    reason: lexical_alternative
  - marker: b
    text: O «un macho de cabra». El hebreo especifica un macho de la especie.
    reason: lexical_alternative
  - marker: c
    text: O «prominente» o «conspicuo». El hebreo destaca un cuerno de especial visibilidad o relieve.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָיִיתִי מֵבִין
  english_pob_choice: I was considering
  chosen_spanish: Yo estaba contemplando
  alternatives_spanish:
  - yo estaba entendiendo
  - yo estaba prestando atención
  lexicon: HALOT
  rationale: La construcción con היה + participio expresa una acción en curso. En español, «estaba contemplando» comunica mejor la observación activa y sostenida de la visión que «estaba entendiendo», que suena demasiado cognitivo y menos natural en este contexto visionario.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y de pronto
  lexicon: HALOT
  rationale: «Y he aquí» conserva el valor discursivo y profético de introducción repentina de una escena en visión, de manera más transparente y solemne que una opción más coloquial.
- source_word: צְפִיר הָעִזִּים
  english_pob_choice: a male goat
  chosen_spanish: un macho cabrío
  alternatives_spanish:
  - un macho de las cabras
  - un cabrío
  lexicon: HALOT
  rationale: La expresión hebrea señala específicamente un macho de la especie. «Macho cabrío» mantiene esa fuerza léxica y es una forma estable y comprensible en español bíblico; evita borrar el rasgo sexual que el hebreo destaca.
- source_word: מִן הַמַּעֲרָב
  english_pob_choice: from the west
  chosen_spanish: desde el oeste
  alternatives_spanish:
  - desde el poniente
  - desde occidente
  lexicon: HALOT
  rationale: «Desde el oeste» es claro y natural en español moderno. Conserva el valor direccional del hebreo sin cargarlo innecesariamente con un registro poético más marcado.
- source_word: עַל פְּנֵי כָל הָאָרֶץ
  english_pob_choice: over the face of the whole earth
  chosen_spanish: sobre la superficie de toda la tierra
  alternatives_spanish:
  - por encima de toda la tierra
  - sobre toda la tierra
  lexicon: HALOT
  rationale: La imagen hebrea de «sobre la faz/superficie de» se conserva con «sobre la superficie de». «Tierra» traduce aquí bien el alcance total del cuadro visionario y evita reducirlo indebidamente a una región local.
- source_word: וְאֵין נוֹגֵעַ בָּאָרֶץ
  english_pob_choice: without touching the ground
  chosen_spanish: sin tocar el suelo
  alternatives_spanish:
  - sin tocar la tierra
  - y no tocando el suelo
  lexicon: HALOT
  rationale: La frase expresa movimiento extraordinariamente veloz. «Sin tocar el suelo» reproduce la imagen con naturalidad en español y evita la repetición de «tierra» justo después de «toda la tierra».
- source_word: קֶרֶן חָזוּת
  english_pob_choice: a conspicuous horn
  chosen_spanish: un cuerno notable
  alternatives_spanish:
  - un cuerno conspicuo
  - un cuerno prominente
  - un cuerno visible
  lexicon: HALOT
  rationale: «Notable» comunica la prominencia visual y simbólica del cuerno sin sonar forzado en español. Mantiene la apertura interpretativa del hebreo y del audit trail inglés, que dejan espacio para la idea de prominencia sin resolverla del todo.
- source_word: בֵּין עֵינָיו
  english_pob_choice: between its eyes
  chosen_spanish: entre sus ojos
  alternatives_spanish:
  - entre los ojos del macho cabrío
  - en medio de sus ojos
  lexicon: HALOT
  rationale: Es una ubicación espacial directa. «Entre sus ojos» conserva la literalidad de la imagen y es idiomático en español para describir la posición del cuerno.
theological_decisions:
- issue: Mantener la imaginería simbólica apocalíptica sin explicarla dentro de la traducción
  english_pob_reading: Retain the literal animal imagery ('male goat,' 'horn') without importing the later interpretation into the translation.
  chosen_spanish_reading: Conservar la imagen literal del macho cabrío y del cuerno, sin identificar todavía sus referentes históricos o simbólicos en el texto principal.
  alternative_spanish_readings:
  - Traducir de manera interpretativa insinuando un reino o gobernante
  - explicitar el sentido simbólico dentro del versículo
  rationale: El versículo presenta una visión; la identificación interpretativa llega después. Mantener la imagen animal respeta el orden del pasaje y evita cerrar prematuramente una tensión exegética que el texto aún no resuelve.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La versión inglesa auditada permanece estable en la revisión más reciente («unchanged: true»), con acuerdo alto y sin cambios aplicados; por tanto, el español sigue de cerca las mismas decisiones léxicas y la misma preservación de la imaginería apocalíptica.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el tetragrámaton en general, aunque este versículo no lo contiene.
  - Se mantiene un registro bíblico moderno y sobrio, evitando arcaismos innecesarios.
  - «Macho cabrío» conserva la especificación sexual del hebreo, en paralelo con el inglés auditado «male goat».
  - «Tierra» y «suelo» se distinguen para evitar ambigüedad semántica en la cláusula de velocidad extraordinaria.
