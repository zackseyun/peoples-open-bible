    unchanged: false
    changes_summary: Revised 'the crippled made well' to 'the crippled healthy' to more directly reflect the Greek adjective ὑγιεῖς and avoid an unnecessary passive expansion.
translation:
  language: es
  text: de modo que la multitud se maravilló al ver a los mudos hablando[a], a los lisiados sanos[b], a los cojos caminando y a los ciegos viendo; y glorificaron al Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a los sordos hablando'. El griego κωφός puede referirse a quienes son sordos o mudos; aquí se prefiere 'mudos' porque el énfasis inmediato está en que hablan.
    reason: lexical_alternative
  - marker: b
    text: O 'a los mutilados restaurados' / 'a los mutilados sanos'. El griego describe a personas con miembros lisiados o mutilados que han sido sanadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - así que
  - de manera que
  lexicon: BDAG
  rationale: Expresa con naturalidad la relación consecutiva del texto griego y mantiene el valor de resultado que el inglés POB conserva con 'so that'.
- source_word: τὸν ὄχλον
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - el gentío
  lexicon: BDAG
  rationale: ὄχλος puede ser 'multitud' o 'muchedumbre'; 'multitud' es claro en español bíblico y evita el tono demasiado coloquial de 'gente'.
- source_word: θαυμάσαι
  english_pob_choice: marveled
  chosen_spanish: se maravilló
  alternatives_spanish:
  - se asombró
  - quedó asombrada
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa el efecto resultante; 'se maravilló' conserva bien la idea de asombro admirativo del verbo.
- source_word: βλέποντας
  english_pob_choice: as they saw
  chosen_spanish: al ver
  alternatives_spanish:
  - viendo
  - cuando vieron
  lexicon: BDAG
  rationale: El participio marca la circunstancia que acompaña el asombro; 'al ver' es un equivalente español natural y fiel al valor observacional.
- source_word: κωφοὺς λαλοῦντας
  english_pob_choice: the mute speaking
  chosen_spanish: a los mudos hablando
  alternatives_spanish:
  - a los sordos hablando
  - a los que no podían hablar hablando
  lexicon: BDAG
  rationale: La POB inglesa prioriza 'mute' por el contraste inmediato con 'speaking'. En español, 'mudos hablando' conserva esa tensión; se mantiene la nota alternativa porque κωφός también puede significar 'sordo'.
- source_word: κυλλοὺς ὑγιεῖς
  english_pob_choice: the crippled healthy
  chosen_spanish: a los lisiados sanos
  alternatives_spanish:
  - a los mancos sanos
  - a los maimed restituidos
  - a los lisiados restaurados
  lexicon: BDAG
  rationale: ὑγιεῖς es un adjetivo predicativo que describe el estado resultante, no una perífrasis pasiva. 'Sanos' refleja directamente el adjetivo, mientras 'lisiados' recoge el sentido de κυλλούς en contexto de curación. Se conserva la tensión entre estado previo y estado actual sin explicitar más de lo que el griego dice.
- source_word: χωλοὺς περιπατοῦντας
  english_pob_choice: the lame walking
  chosen_spanish: a los cojos caminando
  alternatives_spanish:
  - a los cojos andando
  - a los tullidos caminando
  lexicon: BDAG
  rationale: '''Cojos'' es una equivalencia directa y comprensible de χωλούς; ''caminando'' refleja el participio literal del milagro sin añadir explicación.'
- source_word: τυφλοὺς βλέποντας
  english_pob_choice: the blind seeing
  chosen_spanish: a los ciegos viendo
  alternatives_spanish:
  - a los ciegos que ven
  - a los ciegos recobrando la vista
  lexicon: BDAG
  rationale: '''Viendo'' reproduce la concisión del participio y mantiene el paralelismo con los otros miembros de la lista. Aunque ''recobrando la vista'' explicita más el sentido, el griego simplemente dice ''viendo''.'
- source_word: ἐδόξασαν
  english_pob_choice: they glorified
  chosen_spanish: glorificaron
  alternatives_spanish:
  - alabaron
  - dieron gloria a
  lexicon: BDAG
  rationale: '''Glorificaron'' preserva el peso teológico de δοξάζω mejor que ''alabaron'', y coincide con la decisión auditada en inglés.'
- source_word: τὸν θεὸν Ἰσραήλ
  english_pob_choice: the God of Israel
  chosen_spanish: al Dios de Israel
  alternatives_spanish:
  - al Dios de Israel
  - al Dios de Israel
  lexicon: BDAG
  rationale: La construcción genitiva se traduce de forma natural como 'Dios de Israel', manteniendo la resonancia bíblica y la referencia pactual sin domesticación.
theological_decisions:
- issue: Valor contextual de κωφοὺς λαλοῦντας
  english_pob_reading: the mute speaking
  chosen_spanish_reading: los mudos hablando
  alternative_spanish_readings:
  - los sordos hablando
  - los que no podían hablar hablando
  rationale: El contexto inmediato del milagro subraya el habla restaurada; por eso 'mudos' refleja mejor la escena. No se elimina la ambigüedad semántica de κωφός, y se preserva en las notas la alternativa 'sordos'.
  doctrine_reference: Mateo 11:5; Isaías 35:5-6
- issue: ὑγιεῖς como estado resultante de sanidad
  english_pob_reading: the crippled healthy
  chosen_spanish_reading: los lisiados sanos
  alternative_spanish_readings:
  - los lisiados restaurados
  - los lisiados sanados
  rationale: El texto griego usa un adjetivo simple para describir a los tullidos como ahora 'sanos'. 'Sanos' evita introducir una pasiva interpretativa y conserva la fuerza del estado resultante.
  doctrine_reference: Mateo 14:14; Lucas 7:22
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del auditorio en inglés, que prefirió conservar el adjetivo de resultado en ὑγιεῖς (''healthy'') en lugar de expandirlo a una pasiva como ''made well''. En español se refleja con ''sanos'', manteniendo el mismo ajuste: adjetivo simple, no perífrasis interpretativa.'
  spanish_consistency_notes:
  - Se conserva el nombre divino 'Dios de Israel' sin sustitución por una forma litúrgica más general.
  - 'Se mantiene el paralelismo de la lista de milagros con participios españoles breves: hablando, sanos, caminando, viendo.'
  - '''Mudos'' y la nota alternativa ''sordos'' preservan la tensión lexical de κωφός sin resolverla de forma excesiva.'
  - '''Sanos'' refleja el adjetivo ὑγιεῖς y evita añadir ''restaurados'' en el texto principal.'
  - La puntuación con punto y coma sigue el encadenamiento de la lista griega y separa adecuadamente la doxología final.
