translation:
  language: es
  text: Allí, juntos, los prisioneros están tranquilos; no oyen la voz del opresor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «capataz» o «exactor» para «opresor».
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחַד
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en conjunto
  - todos a la vez
  lexicon: HALOT
  rationale: El adverbio indica que los presos comparten esa condición. «Juntos» conserva la idea colectiva de forma natural en español.
- source_word: אֲסִירִים
  english_pob_choice: the prisoners
  chosen_spanish: los presos
  alternatives_spanish:
  - los prisioneros
  - los cautivos
  lexicon: HALOT
  rationale: El término denota personas bajo encierro o sujeción. «Presos» es claro y sobrio en español; «prisioneros» también sería posible, pero «presos» fluye mejor en el registro poético.
- source_word: שַׁאֲנָנוּ
  english_pob_choice: are at ease
  chosen_spanish: están tranquilos
  alternatives_spanish:
  - están en reposo
  - están seguros
  - están sin disturbio
  lexicon: HALOT
  rationale: El hebreo expresa quietud, calma y ausencia de perturbación. «Están tranquilos» comunica bien ese estado sin forzar una idea más fuerte como «reposo».
- source_word: לֹא שָׁמְעוּ
  english_pob_choice: they do not hear
  chosen_spanish: no oyen
  alternatives_spanish:
  - no escuchan
  - no han oído
  - ya no oyen
  lexicon: HALOT
  rationale: 'La forma verbal poética describe la condición resultante de los muertos: no están en el ámbito de oír. En español, el presente «no oyen» preserva ese estado continuo.'
- source_word: קוֹל
  english_pob_choice: the voice
  chosen_spanish: la voz
  alternatives_spanish:
  - el sonido
  - el clamor
  lexicon: HALOT
  rationale: «Voz» reproduce la referencia a una orden o exigencia audible y mantiene la relación con el participio siguiente.
- source_word: נֹגֵשׂ
  english_pob_choice: the taskmaster
  chosen_spanish: el capataz
  alternatives_spanish:
  - el opresor
  - el exactor
  - el amo
  lexicon: HALOT
  rationale: El término designa a quien presiona, apremia o fuerza a trabajar o entregar algo. «Capataz» conserva la concreción de un supervisor que impone cargas, sin estrechar demasiado el matiz como haría «amo».
theological_decisions:
- issue: Estado de los muertos en el poema de Job
  english_pob_reading: The verse describes the dead as a place where prisoners are at ease and no longer hear the taskmaster.
  chosen_spanish_reading: El versículo describe a los muertos como libres de la opresión terrenal, sin oír la voz del capataz.
  alternative_spanish_readings:
  - Los muertos descansan plenamente y ya no oyen al opresor.
  - El Seol es un lugar de reposo absoluto para los presos.
  rationale: La línea poética presenta la cesación de la opresión y del clamor del que exige. La traducción conserva esa imagen sin convertirla en una afirmación doctrinal más amplia sobre el estado final de los muertos.
  doctrine_reference: Job 3:18; cf. poesía sapiencial sobre Sheol y la muerte
- issue: Matiz de נֹגֵשׂ
  english_pob_reading: taskmaster / oppressor / exactor
  chosen_spanish_reading: capataz
  alternative_spanish_readings:
  - opresor
  - exactor
  - esclavista
  rationale: «Capataz» mantiene el carácter concreto y coercitivo de la figura, y en español conserva la resonancia de alguien que impone trabajo o presión. «Opresor» es más general; «exactor» es más técnico y menos transparente.
  doctrine_reference: HALOT; Job 3:18
translation_notes:
  revision_awareness: El texto español sigue de cerca la lectura aprobada en inglés y conserva su decisión léxica principal para נֹגֵשׂ, pero ajusta el equivalente a un español más natural y bíblicamente sobrio. No se detectan revisiones posteriores que exijan otro cambio.
  spanish_consistency_notes:
  - Se mantiene el registro poético y sobrio del libro de Job.
  - «Presos» y «capataz» forman una imagen coherente con la opresión laboral/subyugación del hebreo.
  - Se evita introducir términos doctrinales ajenos como «Seol» en el texto principal, porque el versículo no lo menciona explícitamente.
