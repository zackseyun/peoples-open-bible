id: ROM.14.5
reference: Romans 14:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ὃς ⸀μὲν κρίνει ἡμέραν παρ’ ἡμέραν, ὃς δὲ κρίνει πᾶσαν ἡμέραν· ἕκαστος ἐν τῷ ἰδίῳ νοῒ πληροφορείσθω·
base_translation:
  language: en
  yaml_path: translation/nt/romans/014/005.yaml
  text: One person judges one day above another day, while another judges every day alike. Let each one be fully convinced in his own mind.
translation:
  language: ko
  text: 어떤 사람은 어느 날을 다른 날보다 더 중하게 여기고[a], 어떤 사람은 모든 날을 똑같이 여깁니다. 각자가 자기 마음에 확신을 가지도록[b] 하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「한 날을 한 날에 견주어 판단한다」. 본문은 어떤 날인지(안식일·절기·금식일) 특정하지 않는다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「충분히 확신하라」 「충분히 납득하라」.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίνει
  english_pob_choice: judges
  chosen_korean: 중하게 여기다 / 똑같이 여기다
  alternatives_korean:
  - 평가하다
  - 분별하다
  lexicon: BDAG
  rationale: 여기서 κρίνω는 정죄가 아니라 평가적 분별. 한국어로는 「중하게 여기다 / 똑같이 여기다」가 자연스럽다.
- source_word: ἡμέραν παρ’ ἡμέραν
  english_pob_choice: one day above another day
  chosen_korean: 어느 날을 다른 날보다 더 중하게
  alternatives_korean:
  - 한 날을 다른 날에 견주어
  lexicon: BDAG
  rationale: παρά + 대격의 비교 구문. 어떤 날인지는 본문이 명시하지 않으므로 「거룩한 날」 등의 보충을 피한다.
- source_word: πᾶσαν ἡμέραν
  english_pob_choice: every day alike
  chosen_korean: 모든 날을 똑같이
  alternatives_korean:
  - 모든 날을
  lexicon: BDAG
  rationale: 대조의 함의로 「똑같이」를 보충. 직역으로는 「모든 날을」.
- source_word: ἐν τῷ ἰδίῳ νοῒ πληροφορείσθω
  english_pob_choice: Let each one be fully convinced in his own mind
  chosen_korean: 자기 마음에 확신을 가지도록 하십시오
  alternatives_korean:
  - 각자 자기 생각에 충분히 확신하라
  - 각자 자기 안에서 충분히 납득하라
  lexicon: BDAG
  rationale: νοῦς를 「마음」으로 옮긴 한국 성경 관행 따름. 합쇼체 권유로 자연스럽게.
theological_decisions:
- issue: 「날」의 성격을 특정하지 않음
  chosen_reading: 안식일·절기·금식일 등으로 좁히지 않고 「어느 날」로 보존
  alternative_readings:
  - 유대 절기·안식일
  - 금식일
  rationale: 본문이 명시하지 않은 해석을 더하지 않고, 본문의 일반성을 보존한다.
  doctrine_reference: 'DOCTRINE.md: 신학적 긴장을 해소하지 말고 보존하라'
