    reason: alternative_reading
  - marker: b
    text: O «La tierra ha dado su fruto». El hebreo אֶרֶץ puede significar «tierra» o «territorio/la tierra» según el contexto.
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal porque es fiel y natural, pero se corrigen los anclajes y el contenido de las notas para alinearlos con el source evidence y el audit trail inglés: [a] ahora documenta la ambigüedad de יְבָרְכֵנוּ en «nos bendice», y [b] documenta la alternativa léxica de אֶרֶץ en «La tierra». También se evita que la nota léxica quede indebidamente anclada a «fruto» y se reduce el uso aislado de «país», que aquí suena menos adecuado.'
