translation:
  language: es
  text: el rey de Simrón-Merón[a], uno; el rey de Acsaf, uno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente dos nombres de lugar separados, «Simrón» y «Merón»; el hebreo suele entenderse aquí como el nombre compuesto «Simrón-Merón», que encaja con el cómputo del versículo de dos reyes.
    reason: alternative_reading
lexical_decisions:
- source_word: מֶלֶךְ
  english_pob_choice: the king of
  chosen_spanish: el rey de
  alternatives_spanish:
  - rey de
  lexicon: HALOT
  rationale: 'En esta fórmula de lista de conquista, מֶלֶךְ introduce a cada gobernante de ciudad-estado. En español, el artículo definido suena natural y conserva el valor enumerativo: ''el rey de X, uno''.'
- source_word: שִׁמְרוֹן מְראוֹן
  english_pob_choice: Shimron-meron
  chosen_spanish: Simrón-Merón
  alternatives_spanish:
  - Simrón, Merón
  - Simrón-Merón
  lexicon: HALOT
  rationale: La acentuación masorética y la estructura del versículo suelen entenderse como un topónimo compuesto. Dado que aquí el cómputo total es de dos reyes, la lectura compuesta encaja mejor con la forma de la lista. Se translitera como nombre propio de lugar, no se traduce.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un rey
  - uno solo
  lexicon: HALOT
  rationale: En esta secuencia repetida de conteo, אֶחָד funciona de manera elíptica como la cifra para cada rey enumerado. 'Uno' preserva la concisión y el ritmo del original.
- source_word: אַכְשָׁף
  english_pob_choice: Achshaph
  chosen_spanish: Acsaf
  alternatives_spanish:
  - Acsáf
  lexicon: HALOT
  rationale: Nombre propio de lugar. En español bíblico es preferible una transliteración consistente y legible; 'Acsaf' conserva la forma de la consonantización hebrea sin imponer una grafía tradicional ajena.
translation_notes:
  revision_awareness: 'El texto inglés POB se mantuvo sin cambios sustantivos: conserva la fórmula de conteo, la transliteración del topónimo compuesto y la nota alternativa sobre la posible separación en dos nombres de lugar.'
  spanish_consistency_notes:
  - Se mantiene 'rey de' con artículo definido para reflejar la fórmula enumerativa del capítulo.
  - Los topónimos se transliteran de manera uniforme en español, evitando traducir nombres propios.
  - '''Uno'' se deja en forma breve para reproducir la cadencia contable del hebreo.'
  - La nota al pie se vincula solo al topónimo compuesto, porque allí está la única ambigüedad textual/documentada.
