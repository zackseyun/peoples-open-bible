translation:
  language: es
  text: Entonces Jeremías vino de Tófet[a], donde Yahvé lo había enviado para profetizar, y se paró en el atrio de la casa de Yahvé y dijo a todo el pueblo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tófet fue el lugar asociado con la señal profética y el oráculo anteriores de Jeremías en este capítulo.
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - vino de
  - llegó de
  - regresó de
  lexicon: HALOT
  rationale: En este contexto narrativo, בוא expresa desplazamiento de regreso desde Tófet hacia Jerusalén; «vino» mantiene la naturalidad en español sin perder el movimiento indicado por el hebreo y el inglés POB.
- source_word: מֵהַתֹּפֶת
  english_pob_choice: from Topheth
  chosen_spanish: de Tófet
  alternatives_spanish:
  - de Topet
  - desde Tófet
  lexicon: HALOT
  rationale: Se conserva el nombre propio del lugar como transliteración bíblica. «De» refleja el origen del movimiento y evita una paráfrasis excesiva.
- source_word: אֲשֶׁר שְׁלָחוֹ יְהוָה שָׁם
  english_pob_choice: where Yahweh had sent him
  chosen_spanish: adonde Yahvé lo había enviado
  alternatives_spanish:
  - donde Yahvé lo había enviado
  - a donde Yahvé lo había enviado
  lexicon: HALOT
  rationale: La cláusula relativa identifica Tófet como el lugar al que fue enviado. «Adonde» conserva el valor direccional del hebreo y suena natural en español; el pluscuamperfecto «había enviado» refleja la prioridad temporal respecto de su regreso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar «Yahvé» como nombre divino propio, no la sustitución tradicional «SEÑOR».'
- source_word: לְהִנָּבֵא
  english_pob_choice: to prophesy
  chosen_spanish: para profetizar
  alternatives_spanish:
  - para hablar como profeta
  - para anunciar proféticamente
  lexicon: HALOT
  rationale: El infinitivo niphal de נבא se rinde con el verbo establecido «profetizar», que es fiel y comprensible en español bíblico.
- source_word: וַיַּעֲמֹד
  english_pob_choice: he stood
  chosen_spanish: se puso
  alternatives_spanish:
  - estuvo de pie
  - tomó su puesto
  lexicon: HALOT
  rationale: En español, «se puso en el atrio» expresa de modo natural la postura/ubicación resultante sin cargar el texto con una formulación rígida. Mantiene la idea de colocarse allí para dirigirse al pueblo.
- source_word: בַּחֲצַר בֵּית יְהוָה
  english_pob_choice: in the court of the house of Yahweh
  chosen_spanish: en el atrio de la casa de Yahvé
  alternatives_spanish:
  - en el patio de la casa de Yahvé
  - en la corte de la casa de Yahvé
  lexicon: HALOT
  rationale: «Atrio» reproduce bien חצר en contexto del templo y es más idiomático que «patio»; conserva la imagen arquitectónica del recinto sagrado.
- source_word: וַיֹּאמֶר אֶל כָּל הָעָם
  english_pob_choice: and said to all the people
  chosen_spanish: y habló a todo el pueblo
  alternatives_spanish:
  - y dijo a todo el pueblo
  - y les habló a todos
  lexicon: HALOT
  rationale: Aunque אמר suele ser «decir», en español «habló a» suena natural cuando introduce un discurso público. «Todo el pueblo» preserva כָּל הָעָם sin restringir ni suavizar el alcance colectivo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre propio del pacto. Se mantiene la decisión del POB de no ocultarlo tras un título, y se adapta al uso español del proyecto con «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión inglesa POB para este versículo no requiere cambios según el historial más reciente (agreement high_agreement, pass_count 2, unchanged true). La presente redacción española sigue esa misma solución de sentido, manteniendo el nombre divino, la localización de Tófet y la progresión narrativa sin añadir elementos no sustentados por el hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene la transliteración «Tófet» como nombre propio de lugar.
  - «Atrio» se usa para חצר en contexto del templo, en lugar de «patio», por precisión arquitectónica y registro bíblico.
  - La frase final conserva la apertura del discurso («y habló a todo el pueblo»), acorde con el hebreo que introduce la alocución sin cerrarla.
