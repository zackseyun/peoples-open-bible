translation:
  language: es
  text: Así como ante ellos fuiste santificado[a] en medio de nosotros, así también seas engrandecido[b] ante nosotros en medio de ellos;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fuiste mostrado santo entre nosotros a la vista de ellos». El pasivo griego de ἁγιάζω es un modismo bíblico para decir que Dios fue reconocido como santo.'
    reason: lexical_alternative
  - marker: b
    text: 'El verbo final está en optativo de deseo; también puede traducirse: «que seas engrandecido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥσπερ
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - de la misma manera que
  lexicon: LSJ
  rationale: Introduce una comparación correlativa con οὕτως y mantiene el paralelismo con un español natural y solemne.
- source_word: ἐνώπιον αὐτῶν
  english_pob_choice: before them
  chosen_spanish: ante ellos
  alternatives_spanish:
  - en su presencia
  - a la vista de ellos
  lexicon: BDAG
  rationale: Recoge la idea de presencia o visibilidad sin sonar rígido; además deja listo el paralelo con ἐναντίον ἡμῶν.
- source_word: ἡγιάσθης
  english_pob_choice: you were sanctified
  chosen_spanish: fuiste santificado
  alternatives_spanish:
  - fuiste mostrado santo
  - fuiste tenido por santo
  - fuiste santificado en el sentido de reconocido como santo
  lexicon: BDAG
  rationale: Conserva la forma pasiva del griego y el lenguaje bíblico de 'santificar', mientras la nota explica que aquí no implica que Dios haya llegado a ser santo, sino que fue reconocido como santo.
- source_word: ἐν ἡμῖν
  english_pob_choice: among us
  chosen_spanish: en medio de nosotros
  alternatives_spanish:
  - entre nosotros
  - en nosotros
  lexicon: BDAG
  rationale: En español, 'en medio de nosotros' comunica mejor la esfera comunitaria y la presencia pública que 'en nosotros'.
- source_word: οὕτως
  english_pob_choice: so also
  chosen_spanish: así también
  alternatives_spanish:
  - así
  - de igual manera
  lexicon: LSJ
  rationale: Marca la correspondencia de la segunda cola del paralelismo con una fórmula sobria y clara.
- source_word: ἐναντίον ἡμῶν
  english_pob_choice: before us
  chosen_spanish: ante nosotros
  alternatives_spanish:
  - en nuestra presencia
  - a la vista nuestra
  lexicon: BDAG
  rationale: Mantiene la simetría con 'ante ellos' y expresa presencia/visibilidad sin añadir matices ajenos.
- source_word: μεγαλυνθείης
  english_pob_choice: be magnified
  chosen_spanish: sé engrandecido
  alternatives_spanish:
  - mayas engrandecido
  - sea engrandecido
  - sé exaltado
  lexicon: BDAG
  rationale: El optativo expresa un deseo; en español, un imperativo/oración reverente como 'sé engrandecido' transmite bien la súplica sin forzar un 'may you' poco natural. 'Engrandecido' conserva la idea de magnificar/exaltar.
- source_word: ἐν αὐτοῖς
  english_pob_choice: among them
  chosen_spanish: en medio de ellos
  alternatives_spanish:
  - entre ellos
  - entre las naciones
  lexicon: BDAG
  rationale: Sigue el valor locativo/comunitario de ἐν y sugiere manifestación pública en un grupo, no interioridad psicológica.
theological_decisions:
- issue: ἡγιάσθης aplicado a Dios
  english_pob_reading: Retain the literal passive 'you were sanctified' in the main text, understood as 'you were shown/acknowledged as holy.'
  chosen_spanish_reading: Mantener 'fuiste santificado' en el texto principal, entendido como 'fuiste reconocido como santo'.
  alternative_spanish_readings:
  - fuiste mostrado santo
  - fuiste tenido por santo
  - fuiste declarado santo
  rationale: El destinatario es Dios; por eso el pasivo no puede significar que Dios llegó a ser santo. Se conserva la tensión del original y se aclara su fuerza idiomática en la documentación.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
- issue: Fuerza optativa de μεγαλυνθείης
  english_pob_reading: 'Render as a prayer-wish: ''be magnified.'''
  chosen_spanish_reading: 'Traducirlo como petición: ''sé engrandecido''.'
  alternative_spanish_readings:
  - sea engrandecido
  - que seas engrandecido
  - mayormente sea engrandecido
  rationale: El optativo griego expresa deseo o súplica. En español, una forma imperativa reverente funciona bien en oración y conserva el tono doxológico del pasaje.
  doctrine_reference: 'DOCTRINE.md: Readable modern English, not archaic or academic.'
translation_notes:
  revision_awareness: 'Coincide con la última pasada del expediente: no se registran revisiones posteriores ni cambios requeridos tras la verificación de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' implícito en el vocativo del versículo, sin sustituirlo por una fórmula de ocultamiento del nombre divino.
  - Se conserva el paralelismo sintáctico entre 'ante ellos / ante nosotros' y 'en medio de nosotros / en medio de ellos' para reflejar la simetría del griego.
  - Se usa 'santificado' y 'engrandecido' para preservar la tensión lexical y doxológica documentada en el audit trail.
