translation:
  language: es
  text: Y si no creen siquiera estas dos señales ni escuchan tu voz[a], tomarás un poco de agua del Nilo y la derramarás sobre la tierra seca, y el agua que tomes del Nilo se convertirá en sangre[b] sobre la tierra seca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «no hacen caso a tu voz». El hebreo dice literalmente: «no escuchan tu voz».'
    reason: lexical_alternative
  - marker: b
    text: O «se volverá sangre».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה אִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Y sucederá que si
  - Ahora bien, si
  lexicon: HALOT
  rationale: La construcción introductoria funciona idiomáticamente como condición. «Y si» conserva el flujo hebreo sin la rigidez de «y sucederá que si».
- source_word: יַאֲמִינוּ
  english_pob_choice: do not believe
  chosen_spanish: no creen
  alternatives_spanish:
  - no confían
  - no tienen fe
  lexicon: HALOT
  rationale: En este contexto narrativo, el verbo expresa aceptar o creer el valor probatorio de las señales. «Creen» es natural en español y mantiene la fuerza del original.
- source_word: לִשְׁנֵי הָאֹתוֹת הָאֵלֶּה
  english_pob_choice: even these two signs
  chosen_spanish: aun estas dos señales
  alternatives_spanish:
  - estas dos señales
  - incluso estas dos señales
  lexicon: HALOT
  rationale: '«Aun» refleja גַּם como intensificación: ni siquiera estas dos señales bastan. «Señales» corresponde a אֹתוֹת en este contexto milagroso.'
- source_word: יִשְׁמְעוּן לְקֹלֶךָ
  english_pob_choice: do not listen to your voice
  chosen_spanish: escuchan tu voz
  alternatives_spanish:
  - atienden a tu voz
  - hacen caso a tu voz
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «escuchar la voz» en una forma natural para el español. La frase mantiene la posibilidad de oír con atención o atender.
- source_word: מִמֵּימֵי הַיְאֹר
  english_pob_choice: some of the water of the Nile
  chosen_spanish: de las aguas del Nilo
  alternatives_spanish:
  - del agua del Nilo
  - de las aguas del río
  lexicon: HALOT
  rationale: El hebreo usa una expresión partitiva con «las aguas». En español, «de las aguas del Nilo» conserva ese matiz y el nombre propio tradicionalmente transparente.
- source_word: הַיַּבָּשָׁה / בַּיַּבָּשֶׁת
  english_pob_choice: the dry ground
  chosen_spanish: la tierra seca
  alternatives_spanish:
  - el suelo seco
  - la tierra firme
  lexicon: HALOT
  rationale: «Tierra seca» comunica bien la superficie seca opuesta al agua, sin sonar forzado. Se repite en ambos lugares para mantener la correspondencia del texto hebreo.
- source_word: וְשָׁפַכְתָּ
  english_pob_choice: pour it
  chosen_spanish: las derramarás
  alternatives_spanish:
  - las vaciarás
  - las echarás
  lexicon: HALOT
  rationale: El objeto está implícito en el contexto inmediato («las aguas»). «Derramar» es un equivalente natural para שפך y conserva la idea de verter el líquido.
- source_word: וְהָיוּ ... לְדָם
  english_pob_choice: will become blood
  chosen_spanish: se convertirá en sangre
  alternatives_spanish:
  - se volverá sangre
  - pasará a ser sangre
  lexicon: HALOT
  rationale: La construcción expresa transformación/resultad0. «Se convertirá en sangre» mantiene con claridad la afirmación de un cambio real y milagroso.
- source_word: דָם
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre derramada
  lexicon: HALOT
  rationale: El sustantivo significa literalmente «sangre»; no hay motivo para suavizarlo ni introducir una explicación naturalista.
theological_decisions:
- issue: Carácter milagroso de las aguas del Nilo convertidas en sangre
  english_pob_reading: 'Render as a direct miraculous transformation: ''will become blood.'''
  chosen_spanish_reading: 'Se traduce como una transformación directa: «se convertirá en sangre».'
  alternative_spanish_readings:
  - se volverá sangre
  - será sangre
  rationale: El hebreo usa una estructura de cambio real (היה + לדם) sin atenuantes. La versión española preserva esa lectura milagrosa, sin sugerir mera apariencia o coloración.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de לְקוֹלֶךָ
  english_pob_reading: do not listen to your voice / do not heed your voice
  chosen_spanish_reading: «no escuchan tu voz» con nota de alternativa interpretativa.
  alternative_spanish_readings:
  - no oyen tu voz
  - no hacen caso a tu voz
  rationale: La imagen hebrea es literal y se puede oír en español como «escuchar tu voz». La nota preserva la posibilidad de «hacer caso» o «prestar atención» sin perder el hilo idiomático.
  doctrine_reference: Principios de fidelidad semántica y transparencia textual
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés, especialmente las decisiones sobre la construcción condicional, la expresión idiomática de oír/escuchar la voz, el partitivo de «las aguas del Nilo» y la transformación milagrosa de «agua» a «sangre». No se detectaron revisiones posteriores que alteraran el sentido base.
  spanish_consistency_notes:
  - Se usó «Yahvé» en otros registros del proyecto, pero este verso no contiene el nombre divino.
  - Se mantuvo «Nilo» para יְאֹר, conforme al uso establecido en Éxodo.
  - Se eligió «señales» para אֹתוֹת en vez de «milagros» para respetar el término del texto.
  - Se repitió «la tierra seca» para reflejar la recurrencia del hebreo en ambas cláusulas.
