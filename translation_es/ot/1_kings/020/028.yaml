translation:
  language: es
  text: 'Entonces el hombre de Dios se acercó y dijo al rey de Israel: «Así dice Yahvé: “Porque Aram ha dicho: ‘Yahvé es un dios de los montes, pero no es un dios de los valles’, yo entregaré toda esta gran multitud[a] en tu mano[b], y ustedes sabrán que yo soy Yahvé”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «multitud»; en contexto bélico también puede entenderse como «ejército».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en tu mano»; es un hebraísmo que expresa entrega o dominio.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - un hombre de Dios
  lexicon: HALOT
  rationale: La frase es un título profético definido por el contexto; en español, «el hombre de Dios» conserva la especificidad narrativa sin volverla genérica.
- source_word: וַיִּגַּשׁ
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - vino cerca
  lexicon: HALOT
  rationale: El verbo expresa movimiento hacia alguien; «se acercó» es natural en español y conserva la proximidad concreta del hebreo.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: 'Se mantiene la fórmula profética y se vierte el nombre divino según el criterio del proyecto: «Yahvé».'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se translitera como «Yahvé» en el texto principal, conforme al estándar del proyecto y para preservar el nombre personal divino.
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: Introduce la causa de la acción divina; «porque» es el equivalente español más directo y claro.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Siria
  - los arameos
  lexicon: HALOT
  rationale: Se conserva el nombre histórico/geopolítico del hebreo en lugar de sustituirlo por un rótulo posterior como «Siria».
- source_word: אֱלֹהֵי הָרִים ... וְלֹא אֱלֹהֵי עֲמָקִים
  english_pob_choice: a god of the mountains, but he is not a god of the valleys
  chosen_spanish: un dios de los montes, pero no un dios de los valles
  alternatives_spanish:
  - un dios de las montañas, pero no un dios de los valles
  - Dios de los montes, pero no Dios de los valles
  lexicon: HALOT
  rationale: El hebreo presenta la afirmación aramea como una deidad localizada; el artículo indefinido en español preserva esa tensión teológica. «Montes» sigue de cerca הָרִים y suena más bíblico que «montañas» en este contexto.
- source_word: הוּא
  english_pob_choice: he is
  chosen_spanish: no es
  alternatives_spanish:
  - él no es
  lexicon: HALOT
  rationale: 'En español, la cópula debe expresarse de modo natural: «no es un dios de los valles». La referencia sigue siendo al sujeto previo, Yahvé.'
- source_word: כָּל הֶהָמוֹן הַגָּדוֹל הַזֶּה
  english_pob_choice: all this great multitude
  chosen_spanish: toda esta gran multitud
  alternatives_spanish:
  - todo este gran ejército
  - toda esta gran muchedumbre
  lexicon: HALOT
  rationale: «הָמוֹן» designa multitud o masa numerosa; «multitud» conserva mejor su amplitud semántica que «ejército», aunque el contexto sea militar.
- source_word: בְּיָדֶךָ
  english_pob_choice: into your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en tu poder
  - en tu control
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de entrega «en la mano», que en español es comprensible y mantiene el valor idiomático de dominio/victoria.
- source_word: וִידַעְתֶּם
  english_pob_choice: you shall know
  chosen_spanish: sabrás
  alternatives_spanish:
  - sabréis
  - conoceréis
  lexicon: HALOT
  rationale: Aunque el hebreo es plural, la dirección inmediata es al rey. En el texto principal se mantiene una forma natural dirigida al destinatario explícito; la pluralidad se documenta en nota para no perder la tensión del hebreo.
- source_word: כִּי אֲנִי יְהוָה
  english_pob_choice: that I am Yahweh / the LORD
  chosen_spanish: que yo soy Yahvé
  alternatives_spanish:
  - que yo soy el Señor
  lexicon: HALOT
  rationale: La fórmula de autoidentificación divina se conserva de manera transparente con «Yahvé», manteniendo el peso teológico de la revelación del nombre.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El proyecto pide transliterar el Nombre divino, no ocultarlo tras un título. «Yahvé» mantiene esa decisión y es coherente con el texto auditado en inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: La afirmación aramea sobre una deidad localizada
  english_pob_reading: a god of the mountains, but he is not a god of the valleys
  chosen_spanish_reading: un dios de los montes, pero no un dios de los valles
  alternative_spanish_readings:
  - Dios de los montes, pero no Dios de los valles
  - un dios de las montañas, pero no un dios de los valles
  rationale: La traducción conserva la teología errónea de Aram sin corregirla en la formulación, porque el versículo mismo la refuta al final. El artículo indefinido en español hace visible que se trata de una concepción limitada de Yahvé.
  doctrine_reference: Consistencia con la tensión lexical/documentada del pasaje
- issue: Número de וִידַעְתֶּם
  english_pob_reading: 'plural: you shall know addressed to Israel collectively'
  chosen_spanish_reading: singular en el texto principal, con plural documentado en nota
  alternative_spanish_readings:
  - sabréis
  - conoceréis
  rationale: Para la lectura pública en español, «sabrás» fluye mejor por estar dirigido al rey; sin embargo, se preserva la observación del hebreo plural en una nota para no borrar la extensión colectiva del resultado.
  doctrine_reference: 'Translation philosophy §5: consistency/documented exception'
translation_notes:
  revision_awareness: 'Revisado contra el texto hebreo WLC y el audit trail inglés: se conservaron el nombre divino como Yahvé, la imagen idiomática de la mano y la nota sobre el plural de «sabréis». No se observaron revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «Aram» y no «Siria», conforme al nombre hebreo.
  - «Montes» conserva mejor el tono bíblico del contraste geográfico.
  - La nota sobre el plural de וִידַעְתֶּם evita perder la amplitud colectiva del hebreo.
  - La puntuación reproduce la estructura de cita dentro de cita de forma clara para lectura pública.
