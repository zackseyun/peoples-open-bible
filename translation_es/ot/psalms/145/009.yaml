translation:
  language: es
  text: Yahvé es bueno con todos[a], y sus misericordias se extienden sobre todas sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «su compasión» o «sus tiernas misericordias». El hebreo usa una forma plural, lo que subraya la abundancia de sus actos compasivos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - benéfico
  lexicon: HALOT
  rationale: En esta construcción predicativa, "bueno" es el equivalente más directo y natural en español, y conserva el sentido amplio de bondad moral y benéfica sin restringirlo indebidamente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se representa con el nombre propio divino en español según la norma del proyecto. "Yahvé" preserva el nombre personal del pacto, en vez de sustituirlo por un título.
- source_word: לַכֹּל
  english_pob_choice: to all
  chosen_spanish: para todos
  alternatives_spanish:
  - a todos
  - hacia todos
  lexicon: HALOT
  rationale: La preposición ל expresa aquí alcance o dirección de la bondad divina. En español, "para todos" comunica con naturalidad la extensión universal del sentido.
- source_word: רַחֲמָיו
  english_pob_choice: his mercies
  chosen_spanish: sus misericordias
  alternatives_spanish:
  - su compasión
  - sus tiernas misericordias
  lexicon: HALOT
  rationale: El plural hebreo conserva la idea de múltiples actos de compasión. "Misericordias" mantiene ese plural y la riqueza semántica mejor que una sola forma abstracta como "compasión".
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - por encima de
  lexicon: HALOT
  rationale: Aquí עַל expresa cobertura o alcance que se extiende sobre todas las obras de Dios. "Sobre" reproduce esa imagen de modo idiomático en español.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - cada una de
  lexicon: HALOT
  rationale: En paralelo con el primer "todos", "todas" conserva el valor distributivo-universal y la repetición poética del texto hebreo.
- source_word: מַעֲשָׂיו
  english_pob_choice: his works
  chosen_spanish: sus obras
  alternatives_spanish:
  - todo lo que ha hecho
  - sus hechos
  lexicon: HALOT
  rationale: '"Obras" es la equivalencia más directa y poética para מַעֲשִׂים en este contexto, y mantiene el paralelo con la amplitud universal del versículo.'
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo usa directamente el Tetragrámaton. Conforme a la doctrina del proyecto, se debe preservar el nombre divino con una transliteración reverente en lugar de sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés POB mantiene una lectura estable y de alta concordancia, sin revisiones aplicadas en la última pasada. La versión española sigue de cerca el texto hebreo y conserva la alternativa léxica documentada para רַחֲמָיו.
  spanish_consistency_notes:
  - Se conserva la repetición universal de כל con "todos/todas" para reflejar el paralelismo hebreo.
  - '"Yahvé" se usa consistentemente para יְהוָה conforme a la terminología del proyecto.'
  - '"Misericordias" mantiene el plural hebreo y evita reducir el matiz a una sola abstracción.'
  - La puntuación y el orden mantienen un estilo poético claro y apto para lectura pública.
