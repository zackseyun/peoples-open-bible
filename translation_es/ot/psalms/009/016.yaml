translation:
  language: es
  text: Las naciones se han hundido en la fosa que hicieron; en la red que tendieron, su propio pie[a] ha sido atrapado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «su pie» en singular; probablemente es un singular colectivo para las naciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: טָבְעוּ
  english_pob_choice: have sunk
  chosen_spanish: se han hundido
  alternatives_spanish:
  - se han sumergido
  - han naufragado
  lexicon: HALOT
  rationale: טבע expresa hundirse o ser engullido; «se han hundido» conserva la imagen poética del descenso y suena natural en español.
- source_word: גוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - las gentes
  - los pueblos
  lexicon: HALOT
  rationale: גוֹיִם suele significar «naciones» o «pueblos». En este contexto colectivo y hostil, «las naciones» refleja bien el referente.
- source_word: בְּשַׁחַת
  english_pob_choice: into the pit
  chosen_spanish: en la fosa
  alternatives_spanish:
  - en el pozo
  - en la zanja
  - en la trampa-fosa
  lexicon: HALOT
  rationale: שַׁחַת designa una fosa o hoyo, a menudo trampa. En español, «fosa» mantiene la imagen concreta; con «se han hundido» la preposición «en» comunica el movimiento resultante sin forzar la sintaxis.
- source_word: עָשׂוּ
  english_pob_choice: they made
  chosen_spanish: hicieron
  alternatives_spanish:
  - prepararon
  - fabricaron
  lexicon: HALOT
  rationale: 'עָשָׂה es el verbo común «hacer». «Hicieron» conserva la ironía causal: caen en lo que ellos mismos hicieron.'
- source_word: בְּרֶשֶׁת
  english_pob_choice: in the net
  chosen_spanish: en la red
  alternatives_spanish:
  - dentro de la red
  - con la red
  lexicon: HALOT
  rationale: רֶשֶׁת es «red». «En la red» reproduce la localización poética e integra bien el paralelismo con la fosa.
- source_word: זוּ
  english_pob_choice: they
  chosen_spanish: que escondieron
  alternatives_spanish:
  - que ocultaron
  - la cual escondieron
  lexicon: HALOT
  rationale: זוּ funciona como relativo («que / la cual»). En español, «que escondieron» es más natural que un relativo explícito más pesado, y preserva la relación con «la red».
- source_word: טָמָנוּ
  english_pob_choice: hid
  chosen_spanish: escondieron
  alternatives_spanish:
  - ocultaron
  - pusieron oculto
  lexicon: HALOT
  rationale: טמן significa esconder o ocultar, especialmente de manera secreta como en una trampa. «Escondieron» encaja con la red y mantiene la intención furtiva.
- source_word: נִלְכְּדָה
  english_pob_choice: has been caught
  chosen_spanish: quedó atrapado
  alternatives_spanish:
  - fue atrapado
  - ha sido atrapado
  lexicon: HALOT
  rationale: נִלְכְּדָה es nifal de לכד, «ser capturado/atrapado». «Quedó atrapado» comunica el resultado con naturalidad en español y conserva la voz pasiva de hecho ocurrido.
- source_word: רַגְלָם
  english_pob_choice: their own foot
  chosen_spanish: su propio pie
  alternatives_spanish:
  - su pie
  - sus pies
  lexicon: HALOT
  rationale: El hebreo usa singular («su pie») con sujeto plural, un singular colectivo. «Su propio pie» mantiene la singularidad y añade el matiz reflexivo-irónico que el inglés POB destacó; «pies» suavizaría demasiado la imagen.
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo masorético de Salmos 9:16 y el audit trail inglés, con acuerdo alto y sin revisiones sustantivas pendientes. La principal decisión fue conservar el singular colectivo de «su pie» y la ironía de que caen en lo que ellos mismos prepararon.
  spanish_consistency_notes:
  - Se mantiene «las naciones» para גוֹיִם según el uso colectivo del contexto.
  - Se prefirió «fosa» sobre «pozo» para שַׁחַת, por su tono poético y concreto.
  - «Red» traduce רֶשֶׁת sin introducir un vocabulario eclesiástico ajeno.
  - El pie de nota marca la tensión número singular/plural en רַגְלָם, como en el audit trail inglés.
