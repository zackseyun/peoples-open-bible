translation:
  language: es
  text: 'Entonces me dijo[a]: «Hijo de hombre, por favor alza tus ojos hacia el norte». Y alcé mis ojos hacia el norte; y he aquí, al norte de la puerta del altar estaba esta imagen de celos, a la entrada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este ídolo de celos», o «esta imagen que provoca celos». La expresión hebrea es compacta y puede referirse tanto al carácter de la imagen como al efecto de provocar celos divinos.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - ser humano
  - hijo de Adán
  lexicon: HALOT
  rationale: Conserva el giro idiomático y su resonancia literaria en Ezequiel. «Hijo de hombre» es la equivalencia española natural y tradicional para este apelativo, sin diluirlo en una paráfrasis interpretativa.
- source_word: שָׂא נָא עֵינֶיךָ
  english_pob_choice: please lift up your eyes
  chosen_spanish: por favor alza tus ojos
  alternatives_spanish:
  - por favor levanta tus ojos
  - mira hacia arriba
  lexicon: HALOT
  rationale: «Alza tus ojos» mantiene la imagen verbal de elevar la mirada; «por favor» refleja la partícula נָא como ruego o cortesía. «Levanta» sería igualmente posible, pero «alza» suena más sobrio en este contexto visionario.
- source_word: דֶּרֶךְ צָפוֹנָה
  english_pob_choice: toward the north
  chosen_spanish: hacia el norte
  alternatives_spanish:
  - en dirección al norte
  - al norte
  lexicon: HALOT
  rationale: La frase indica dirección. «Hacia el norte» es natural en español y conserva el sentido direccional sin sobretraducir la construcción hebrea.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y entonces
  lexicon: HALOT
  rationale: «He aquí» mantiene el valor deíctico y la vividez visionaria del hebreo en narrativa profética.
- source_word: מִצָּפוֹן
  english_pob_choice: north of
  chosen_spanish: al norte de
  alternatives_spanish:
  - desde el norte de
  - en el lado norte de
  lexicon: HALOT
  rationale: En este contexto marca ubicación relativa, no procedencia. «Al norte de» expresa con claridad la relación espacial.
- source_word: לְשַׁעַר הַמִּזְבֵּחַ
  english_pob_choice: the gate of the altar
  chosen_spanish: la puerta del altar
  alternatives_spanish:
  - la puerta del altar sacrificial
  - la puerta que da al altar
  lexicon: HALOT
  rationale: El constructo hebreo sugiere una entrada asociada al altar. En español, «puerta» es más natural que «שער» como «gate» y conserva la referencia arquitectónica sin forzar una explicación adicional.
- source_word: סֵמֶל
  english_pob_choice: image
  chosen_spanish: imagen
  alternatives_spanish:
  - ídolo
  - figura
  lexicon: HALOT
  rationale: «Imagen» reproduce el sentido básico sin decidir de antemano si el énfasis cae en la forma visual o en su función cultual. El contexto ya deja claro su carácter idolátrico.
- source_word: הַקִּנְאָה
  english_pob_choice: of jealousy
  chosen_spanish: de celos
  alternatives_spanish:
  - que provoca celos
  - de provocación de celos
  lexicon: HALOT
  rationale: Se conserva la forma nominal compacta del hebreo. «Celos» refleja la ambigüedad del término en español bíblico, manteniendo la tensión entre el rasgo del objeto y el efecto que produce.
- source_word: בַּבִּאָה
  english_pob_choice: at the entrance
  chosen_spanish: a la entrada
  alternatives_spanish:
  - en la entrada
  - junto a la entrada
  lexicon: HALOT
  rationale: «A la entrada» es la manera más idiomática de expresar la localización en un acceso o umbral en español contemporáneo.
theological_decisions:
- issue: Cómo traducir סֵמֶל הַקִּנְאָה sin resolver en exceso su sentido
  english_pob_reading: Render as 'this image of jealousy' in the main text, leaving the provoking function implicit in the phrase itself.
  chosen_spanish_reading: «esta imagen de celos» en el texto principal, dejando implícito que el contexto la presenta como objeto de idolatría que provoca la reacción divina.
  alternative_spanish_readings:
  - «este ídolo de celos»
  - «esta imagen que provoca celos»
  rationale: 'El hebreo es compacto y nominal. Traducirlo como una cláusula explicativa añadiría más interpretación de la que el texto dice explícitamente. «Imagen de celos» conserva la tensión: puede describir el carácter del objeto o su efecto provocador, y el contexto narrativo ya apunta a su función idolátrica.'
  doctrine_reference: Translation philosophy §3; §5
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; el texto español mantiene la misma lectura de alta concordancia con el original y con la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo exige; en este versículo no aparece el nombre divino.
  - Se usa «Hijo de hombre» por coherencia con la fórmula estable de Ezequiel y con el valor idiomático del hebreo.
  - Se preserva la distinción entre dirección («hacia el norte») y ubicación relativa («al norte de»).
  - «Imagen de celos» reproduce la concisión del hebreo sin convertirla en explicación doctrinal dentro del cuerpo principal.
