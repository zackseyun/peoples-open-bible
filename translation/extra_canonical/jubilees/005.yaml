  rows:
  - verse: 1
    geez: ወኮነ፡ አመ፡ ወጠኑ፡ ደቂቀ፡ እጓለ፡ እመሕያው፡ ይብዝኁ፡ ዲበ፡ *ገጸ፡ ለ*ምድር፡ ወ*አዋልድ፡ ተወልዳ፡ ሎሙ፡ ወርእይዎን፡ መላእክተ፡ እግዚአብሔር፡ በአሐቲ፡ ዓመት፡ ዘ*ኢዮቤልው፡ ዝንቱ፡ እስመ፡ ሠናያት፡ ለርእይ፡ እማንቱ፡ ወነሥእዎን፡ ሎሙ፡ አንስቲያ፡ እምኵሎን፡ እለ፡ ኀረዩ፡ ወወለዳ፡ ሎሙ፡ ውሉደ፡ *ወእሙንቱ፡ ረዐይት።
  - verse: 2
    geez: ወ*ልህቀት፡ ዐመፃ፡ ዲበ፡ ምድር፡ ወኵሉ፡ ዘሥጋ፡ *አማሰነ፡ ፍኖተ፡ እምሰብእ፡ እስከ፡ እንስሳ፡ ወእስከ፡ አራዊት፡ ወእስከ፡ አዕዋፍ፡ ወእስከ፡ ኵሉ፡ ዘያንሶሱ፡ ውስተ፡ ምድር፤ ኵሎሙ፡ አማሰኑ፡ ፍኖቶሙ፡ ወሥርዐቶሙ፡ ወአኀዙ፡ ይትበልዑ፡ በበይናቲሆሙ፡ ወዐመፃ፡ ለሀቀ፡ ዲበ፡ ምድር፡ ወኵሉ፡ ሕሊና፡ አእምሮ፡ ለኵሎሙ፡ እጓለ፡ እመሕያው፡ ከመዝ፡ እኩይ፡ *ኵሉ፡ መዋዕለ፡
  - verse: 3
    geez: ወርእየ፡ እግዚአብሔር፡ ለምድር፡ ወናሁ፡ ማሰነት፡ ወ*አማሰነት፡ *ኵሉ፡ ዘሤጋ፡ ሥርዓታ፡ ወ*አእከየ፡ ኵሉ፡ ቅድመ፡ አዕይንቲሁ፡ ኵሉ፡ ዘሀሎ፡ ውስተ፡ ምድር።
  - verse: 4
    geez: ወይቤ፡ አይመሰለ፡ ለሰብእ፡ ወለኵሉ፡ ዘሥጋ፡ በመልዕልተ፡ ገጸ፡ ምድር፡ ዘፈጠርኩ።
  - verse: 5
    geez: ወኖኅ፡ ባሕቲቱ፡ ረከበ፡ ሞገሰ፡ በቅድመ፡ *አዕይንቲሁ፡ ለእግዚአብሔር፡
  - verse: 6
    geez: ወዲበ፡ መላእክቲሁ፡ እለ፡ ፈነወ፡ ውስተ፡ ምድር፡ ተምዐ፡ ፈድፋደ፡ ይሠርዎሙ፡ እምኵሉ፡ ሥልጣኖሙ፡ ወይቤለነ፡ ከመ፡ ንእስሮሙ፡ ውስተ፡ *መዓምቅቲሃ፡ ለምድር፡ ወናሁ፡ እሙንቱ፡ እሱራን፡ ማእከሎሙ፡ ወ*ብሕትዋን።
  - verse: 7
    geez: ወዲበ፡ ውሉዶሙ፡ ወፅአ፡ ቃል፡ እምቅድመ፡ ገጹ፡ ከመ፡ ይምሐጾሙ፡ በሰይፍ፡ ወያሰስሎሙ፡ እምታሕተ፡ ሰማይ።
  - verse: 8
    geez: ወይቤ፡ ኢ*ይነብር፡ መንፈስየ፡ *ዲበ፡ ሰብእ፡ ለዓለም፡ እስመ፡ እሙንቱ*ኒ፡ ሥጋ፡ ወይኩን፡ መዋዕሊሆሙ፡ *ምእት፡ ወዕሥራ፡ ዓመት።
  - verse: 9
    geez: ወፈነወ፡ ሰይፈ፡ ማእከሎሙ፡ ከመ፡ *ይቅትል፡ ፩፪ቢጹ፡ ወወጠኑ፡ ይቅትሉ፡ *ዝንቱ፡ ዘንተ፡ እስከ፡ ወድቁ፡ ኵሎሙ፡ ውስተ፡ ሰይፍ፡ ወተደምሰሱ፡ *እምነ፡ ምድር።
  - verse: 10
    geez: ወአበዊሆሙሰ፡ ይኔጽሩ፡ ወ*እምድኅረዝ፡ ተአስሩ፡ ውስተ፡ መዓምቅቲሃ፡ ለምድር፡ *እስከ፡ ለዓለም፡ እስከ፡ ዕለተ፡ ኵነኔ፡ ዐባይ፡ ለኵነኔ፡ ኵነኔ፡ ዲበ፡ ኵሎሙ፡ እለ፡ አማሰኑ፡ ፍኖቶሆሙ፡ ወ*ምግባሪሆሙ፡ ቅድመ፡ እግዚአብሔር።
  - verse: 11
    geez: ወደምሰሰ፡ ኵሉ፡ እመካኖሙ፡ ወኢ*ተርፈ፡ አሐዱ፡ እምኔሆሙ፡ ዘአኰነነ፡ በኵሉ፡ እኪዮሙ።
  - verse: 12
    geez: ወገብረ፡ *ለኵሉ፡ ግብረ፡ ፍጥረተ፡ ሐዳሰ፡ ወጻድቅተ፡ ከመ፡ እይረብቡ፡ በኵሉ፡ ፍጥረቶሙ፡ እስከ፡ ለዓለም፡ ወ*ይጸድቁ፡ ኵሉ፡ *በበ፡ ትዝምዳ፡ ኵሉ፡ መዋዕለ።
  - verse: 13
    geez: ወዘንተ፡ ኵሎሙ፡ ሠርዐ፡ ወተጽሕፈ፡ ውስተ፡ ጽላተ፡ ሰማይ፡ ወ*አልቦ፡ ዐመፃ፡ ወኵሎሙ፡ እለ፡ ተዐደዉ፡ እምፍኖተ፡ በእንተ፡ ሠርዐተ፡ ሎሙ፡ ከመ፡ ይሖሩ፡ ባቲ፡
  - verse: 14
    geez: ወ*ለ*እመ፡ ኢሖሩ፡ ባቲ፡ ተጽሕፈ፡ ዘንተ፡ ለኵሉ፡ ፍጥረት፡ ወለኵሉ፡ ትዝምድ። ወአልቦ፡ ምኵናነ፡ ዘበሰማይ፡ ወዘበምድር፡ ወ*ዘ*ውስተ፡ ብርሃን፡ ወ*ዘ*ውስተ፡ ጽልመት፡ ወ*በ*ሲኦል፡ ወውስተ፡ ቀላይ፡ ወውስተ፡ መጽልም፡ ወኵሉ፡ ዘነኒሆሙ፡ *ሥሩዕ፡ ወጽሑፍ፡ ወቅሩጽ።
  - verse: 15
    geez: በእንተ፡ ኵሉ፡ ለዐቢይ፡ በከመ፡ ዐበየ፡ ወለንኡስ*ሂ፡ በከመ፡ ንእሰ፡ ወለለ፡ አሐዱ፡ በከመ፡ ፍኖቱ፡ ይኴንኖ።
  - verse: 16
    geez: ወአኮኑ፡ ውእቱ፡ ዘይነሥእ፡ *ገጸ፡ ወአኮኑ፡ ውእቱ፡ ዘይነሥእ፡ ሕሊና፡ እመ፡ ይቤ፡ ይገበር፡ ዘንተ፡ ለለ፻፻፡ እመ፡ ወሀበ፡ ኵሎ፡ ዘውስተ፡ ምድር፡ ኢይነሥእ፡ *ሕሊና፡ ወኢገጸ፡ ወኢይትሜጠው፡ እምእዴሁ፡ እስመ፡ መኰንን፡ ጽድቅ።
  - verse: 17
    geez: ወዲበ፡ ደቂቀ፡ እስራኤል፡ ተጽሕፈ፡ ወተሠርዐ፡ እመ፡ ተመይጡ፡ ኀቤሁ፡ በጽድቅ፡ የኀድግ፡ ኵሎ፡ አበሳሆሙ፡ ወ*ይስሬ፡ ኵሎ፡ ኀጢአቶሙ።
  - verse: 18
    geez: ተጽሕፈ፡ ወተሠርዐ፡ ይትመሐር፡ ለኵሉ፡ እለ፡ ተመይጡ፡ እም*ኵሉ፡ ጌጋዮሙ፡ ምዕረ፡ ለ*ለ፡ ዓመት።
  - verse: 19
    geez: ወ*ዲበ፡ ኵሎሙ፡ እለ፡ አማሰኑ፡ ፍኖዊሆሙ፡ ወምክርሙ፡ *እምቅድመ፡ አይኅ፡ ኢ*ተነሥአ፡ ገጾሙ፡ ዘእንበለ፡ ኖኅ፡ ባሕቲቱ፡ እስመ፡ ተነሥአ፡ *ሎቱ፡ ገጸ፡ በእንተ፡ ውሉዱ፡ እለ፡ አድኀኖሙ፡ እማየ፡ አይኅ፡ በእንቲአሁ፡ እስመ፡ ጻድቅ፡ ይእቲ፡ *ልቡ፡ በኵሉ፡ ፍኖዊሁ፡ በከመ፡ አዘዞ፡ በእንቲአሁ፡ ወኢ*ተዐደወ፡ እምኵሉ፡ ዘሥሩዕ፡ ሎቱ።
  - verse: 20
    geez: ወይቤ፡ እግዚአብሔር፡ *ይደመስስ፡ ኵሎ፡ ዘ*ዲበ፡ የብስ፡ እሰብእ፡ *እስከ፡ እንስሳ፡ እስከ፡ አራዊት፡ ወእስከ፡ *አዕዋፈ፡ ሰማይ፡ ወእስከ፡ ዘይትሐወስ፡ ውስተ፡ ምድር።
  - verse: 21
    geez: ወአዘዞ፡ ለኖኅ፡ ይግበር፡ ሎቱ፡ ታቦተ፡ ከመ፡ *ይድኀኖ፡ እምነ፡ ማየ፡ አይኅ።
  - verse: 22
    geez: ወገብረ፡ ኖኅ፡ ታቦተ፡ በኵሉ፡ በከመ፡ አዘዞ፡ በ*ዕሥራ፡ ወስድስቱ፡ *ኢዮቤልው፡ ዓመታት፡ በኃምስ፡ ሱባዔ፡ በኃምስ፡ ዓመት።
  - verse: 23
    geez: ወቦአ፡ በሳድስ፡ ሎቱ፡ በካልእ፡ ወርኅ፡ *በሠርቅ፡ ለካልእ፡ ወርኀ፡ እስከ፡ አመ፡ ዐሡሩ፡ ወስዱሱ፡ ወቦአ፡ ውእቱ፡ ወኵሉ፡ ዘአባእነ፡ ሎቱ፡ ውስተ፡ ታቦት፡ ወዐጸዎ፡ እግዚአብሔር፡ እንተ፡ አፍአሁ፡ በዐሡሩ፡ ወሰብዑ፡ ምሴተ።
  - verse: 24
    geez: ወአርኀወ፡ እግዚአብሔር፡ ሰብዐተ፡ መገብሕብሕተ፡ ሰማይ፡ ወአፈወ፡ አንቅዐተ፡ ቀላይ፡ ዐቢይ፡ *በሰብዑ፡ አፈወ፡ በ*ኍልቍ፡ ወእነተ፡ መገብሕብሕተ፡ ይውርዱ፡ ማየ፡ እምሰማይ፡ ፵መዋዕለ፡ ወ፵ሌልየ፡
  - verse: 25
    geez: ወአንቅዐተ፡ ቀላይሂ፡ ያዐርጉ፡ ማያተ፡ እስከ፡ ሶበ፡ መልአ፡ *ኵሉ፡ ዓለም፡ ማየ።
  - verse: 26
    geez: ወልህቀ፡ ማያት፡ ዲበ፡ ምድር፡ *ዐሠርት፡ ወኃምስተ፡ በእመት፡ *ተለዐለ፡ ማያት፡ ዲበ፡ ኵሉ፡ ደብር፡ ነዋኅ፡ ወተለዐለት፡ ታቦት፡ እምዲበ፡ ምድር፡ ወተንሰፈ፡ ዲበ፡ ገጸ፡ ማያት።
  - verse: 27
    geez: ወሀሎ፡ ማያት፡ ይቀውም፡ ዲበ፡ ገጸ፡ ምድር፡ ኃምስተ፡ አውራኀ፡ *ምእተ፡ ወኃምሳ፡ ዕለተ።
  - verse: 28
