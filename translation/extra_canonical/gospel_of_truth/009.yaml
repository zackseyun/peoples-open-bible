technical_vocabulary_note: 'Key technical terms are retained with theological weight:
  ‘Light’ and ‘One Light’ denote revelatory and ontological realities; ‘Word’ is kept
  as a title for the uttered revelation rather than flattened to ‘speech’; ‘Error’
  is capitalized as a reified, hostile power (Greek πλάνη) in Valentinian cosmology;
  ‘Spirit of power’ preserves the genitival relationship and pneumatological nuance.
  The Father is ‘the uncontainable one,’ ‘immeasurable,’ and ‘Beginning,’ titles that
  maintain transcendence. The gifts (‘Thought, understanding, mercy, salvation, and
  the Spirit of power’) echo a traditional catalogue of salvific endowments and are
  left concrete rather than generalized. The closing fivefold predicates (‘Way, Knowledge,
  Discovery, Strength, Purity’) are kept as abstract-yet-concrete soteriological functions
  for distinct conditions (wandering, ignorance, searching, wavering, defilement).'
textual_note: 'The English is drafted directly from Codex I, p. 31 (header ⲗⲁ = page
  31). No XII.2 overlap materials exist for this section to check or repair readings.
  Several phrases are syntactically compact and idiomatic: (1) The clause ‘because
  incorruptibility is ungraspable’ reflects the sequence ⲛⲉⲙⲡⲟⲩⲥⲟⲩⲱ…ⲧⲙⲛⲧⲁⲧⲧⲉⲕⲟ ⲙⲛ
  ⲧⲁⲧⲉⲙⲁϩⲧⲉ, which is interpreted against the immediate context of unhindered coming-by-flesh.
  (2) ‘He uttered it outside, in the place of the One Light’ renders ⲁϥϣⲉϫⲉ ⲁⲃⲁⲗ ϩⲙ
  ⲡⲙⲁ ⲛϭⲓ ⲡⲟⲩⲁⲉⲓⲛ, taking ⲁⲃⲁⲗ (‘outside’) and ⲡⲙⲁ (‘place’) concretely; the phrase
  likely carries a technical topography within the work. (3) ‘An ignorance remained
  beside him’ (ⲟⲩⲁⲧⲙⲉⲉⲩⲉ ⲉⲙⲏⲛ ⲧⲟⲟⲧϥ) is kept literal; the exact reference (the ignorant
  hearers vs. a hypostatized Ignorance) may be clarified in future collation. (4)
  The gift-list (‘Thought, understanding, mercy, salvation, and the Spirit of power’)
  reflects compressed lines beginning with ⲧⲛⲉⲩⲙⲉⲩⲉ … ⲉⲡⲡⲛⲁ; the sequence and attribution
  ‘from the infinity and sweetness of the Father’ reproduces the genitives (ⲁⲣⲏⲭⲉⲛ,
  ⲟⲩⲁϩⲙⲛⲧϩⲗⲁϭ, ⲥⲁⲙⲁⲣⲁⲁⲛ). (5) The list of five soteriological functions closely follows
  the Coptic nouns (ⲙⲁⲉⲓⲧ, ⲥⲁⲩⲛⲉ, ⲟⲩϭⲓⲛⲉ, ⲧⲁϫⲣⲟ, ⲙⲛⲧⲁⲧϫⲱϩⲙ) with recipients marked
  by relative clauses.

  Ambiguities: The opening sequence ‘ⲁⲣⲁϥ ϫⲉ ⲛⲉⲩⲟⲉⲓⲛ ϣⲙⲙⲟ ⲡⲉ …’ and the brief ‘ⲛⲉⲙⲡⲟⲩⲥⲟⲩⲱⲛϥ
  ⲛϭⲓ ⲑⲩⲗⲏ …’ contain dense syntax; translation follows the broader discourse logic
  and parallel passages nearby. The final two lines (ⲛⲉⲩϫⲁϩⲙ … ⲉⲛⲧⲁϥⲕⲱϣ ⲛⲥⲱϥ ⲙⲡⲓⲧⲉⲕⲧⲉ)
  are obscured and likely recapitulate the purity motif; rendering reflects the list
  as a whole rather than a hyper-literal segment-by-segment mapping.'
