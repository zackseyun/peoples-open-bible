review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la secuencia de amenaza: despojo, exposición, desolación y muerte por sed. Sin embargo, en dos puntos se aparta del perfil léxico más fiel al hebreo y al rastro auditado: (1) עֲרֻמָּה queda diluido en «al descubierto» en vez de expresar explícitamente «desnuda»; y (2) וְהִצַּגְתִּיהָ se fusiona con esa misma idea, cuando el hebreo distingue entre dejarla desnuda y luego ponerla/presentarla. También conviene mejorar la nota a para reflejar correctamente la alternativa de פֶּן sin introducir un infinitivo extraño en español.'
  spanish_quality_summary: El español es legible y digno, pero «o, si no,» suena algo trabado; «de lo contrario,» o «si no,» fluye mejor. «La despojaré de sus vestidos» es aceptable, pero combinado con «la pondré al descubierto» produce redundancia semántica y debilita la correspondencia término por término. «La presentaré» o «la exhibiré» después de «desnuda» mejora claridad y ritmo. La nota a actual necesita reparación idiomática.
  glossary_alignment: No hay conflictos con terminología de proyecto como Yahvé/Mesías. Las decisiones clave que sí importan aquí son mantener la imaginería concreta de juicio y preservar el causativo final. «La haré morir de sed» es aceptable en español para וַהֲמִתִּיהָ בַּצָּמָא, aunque «la mataré de sed» sería más fuerte; no es necesario forzar cambio. Sí debe preservarse la distinción entre «desnuda» y «presentarla/exhibirla».
  issues:
  - severity: medium
    issue: עֲרֻמָּה se traduce como «al descubierto» en lugar de «desnuda».
    rationale: El hebreo expresa explícitamente el estado de desnudez. «Al descubierto» suaviza y difumina la imagen corporal concreta que el audit trail pide conservar.
  - severity: medium
    issue: וְהִצַּגְתִּיהָ queda absorbido en «la pondré al descubierto».
    rationale: 'El verso tiene dos acciones distintas: desnudarla y luego ponerla/presentarla. La traducción actual colapsa ambas en una sola idea de exposición.'
  - severity: low
    issue: 'La nota a está formulada de manera poco natural: «para no despojarla de sus vestidos».'
    rationale: La alternativa documentada es el valor conjuntivo/amenazante de פֶּן («no sea que» / «para que no» en ciertos contextos), no un infinitivo forzado. Debe reflejar la opción sin deformar la sintaxis española.
  - severity: low
    issue: «o, si no,» suena algo forzado como apertura.
    rationale: Aunque comprensible, «de lo contrario» o «si no» suena más natural en español bíblico moderno.
