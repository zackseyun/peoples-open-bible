translation:
  language: es
  text: Y fue a buscar[a] un hombre, y encontró a Rafael, que era un ángel, pero no lo sabía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mensajero». La palabra griega puede significar ambas cosas, pero aquí el narrador quiere decir que Rafael era un ser angélico.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύθη
  english_pob_choice: he went
  chosen_spanish: fue
  alternatives_spanish:
  - fue
  - se fue
  - partió
  lexicon: BDAG
  rationale: El aoristo narrativo de πορεύομαι se expresa de manera natural en español con «fue». Conserva la sencillez de la secuencia narrativa sin introducir matices no requeridos.
- source_word: ζητῆσαι
  english_pob_choice: to look for
  chosen_spanish: a buscar
  alternatives_spanish:
  - a buscar
  - a buscarse
  - a procurar
  lexicon: BDAG
  rationale: La infinitiva de propósito pide una construcción final en español. «A buscar» comunica bien la idea de salir en busca de una persona, sin cargar el verbo con una solemnidad innecesaria.
- source_word: ἄνθρωπον
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un hombre
  - una persona
  - alguien
  lexicon: BDAG
  rationale: El griego usa el singular masculino ἄνθρωπον; en este contexto se trata de un acompañante varón. «Un hombre» preserva esa referencia de género y número.
- source_word: εὗρεν
  english_pob_choice: he found
  chosen_spanish: encontró
  alternatives_spanish:
  - encontró
  - dio con
  - halló
  lexicon: BDAG
  rationale: «Encontró» es la equivalencia narrativa más directa y natural para εὗρεν. Mantiene el ritmo del relato sin añadir color interpretativo.
- source_word: Ῥαφαήλ
  english_pob_choice: Raphael
  chosen_spanish: Rafael
  alternatives_spanish:
  - Raphael
  - Rafael
  lexicon: transliteration
  rationale: En español, la forma habitual y más inteligible del nombre es «Rafael». Conserva la identidad del personaje sin necesidad de mantener la grafía inglesa.
- source_word: ἄγγελος
  english_pob_choice: angel
  chosen_spanish: un ángel
  alternatives_spanish:
  - un ángel
  - un mensajero
  lexicon: BDAG
  rationale: Aunque ἄγγελος puede significar «mensajero», aquí el relato identifica a Rafael como ser celestial. «Ángel» evita ocultar la revelación narrativa y sigue el sentido contextual principal.
- source_word: οὐκ ᾔδει
  english_pob_choice: he did not know it
  chosen_spanish: no lo sabía
  alternatives_spanish:
  - no lo sabía
  - no sabía quién era
  - no se daba cuenta
  lexicon: BDAG
  rationale: El griego deja implícito el objeto de saber; en español, «no lo sabía» reproduce esa referencia implícita de forma natural. El «lo» remite a la identidad angélica de Rafael, sin explicitar más de lo que el texto dice.
theological_decisions:
- issue: ὄγγελος como identidad de Rafael
  english_pob_reading: Render ἄγγελος as 'angel' in the main text; 'messenger' only as lexical alternative
  chosen_spanish_reading: Traducir ἄγγελος como «ángel» en el texto principal
  alternative_spanish_readings:
  - mensajero
  rationale: En el mundo narrativo de Tobit, Rafael es presentado como un ser angélico. Traducir «mensajero» en el cuerpo del texto rebajaría esa revelación y oscurecería la intención del narrador.
  doctrine_reference: 'DOCTRINE.md: traducir según el sentido llano del texto fuente y preservar las tensiones teológicas en lugar de aplanarlas'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; el presente borrador sigue el testimonio griego de Swete y mantiene la misma decisión clave de sentido para ἄγγελος.
  spanish_consistency_notes:
  - Se usa «Rafael» como forma española estándar del nombre.
  - Se mantiene «ángel» en el texto principal por coherencia con la lectura narrativa del pasaje.
  - Se conserva una puntuación breve y sobria, adecuada para un versículo narrativo.
  - La nota al pie explica la alternativa léxica sin debilitar la identificación angélica en el texto principal.
