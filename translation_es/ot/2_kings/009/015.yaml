base_translation:
  language: en
  yaml_path: translation/ot/2_kings/009/015.yaml
  text: Now King Jehoram had returned to Jezreel to recover from the wounds that the Arameans had inflicted on him when he fought against Hazael king of Aram[a]. And Jehu said, “If this is your mind[b], let no fugitive leave the city to go and tell it in Jezreel.”
  footnotes:
