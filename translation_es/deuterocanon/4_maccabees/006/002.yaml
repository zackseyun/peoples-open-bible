  revision_rationale: Se conserva el texto principal porque es fiel y natural, pero se corrige el anclaje de la nota para que recaiga sobre «piedad», donde realmente está la alternativa léxica/fraseológica documentada por el POB inglés. También se simplifica la nota para evitar una falsa alternativa sobre «anciano» y reflejar mejor el sentido de la frase griega completa.
