translation:
  language: es
  text: 'Esta es la contribución[a] que ustedes ofrecerán: una sexta parte de un efa[b] por cada homer de trigo, y una sexta parte de un efa por cada homer de cebada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Una contribución es una porción apartada y presentada; aquí no se trata de una traducción cultual más específica como «ofrenda elevada», sino de una cuota fijada en grano.
    reason: lexical_alternative
  - marker: b
    text: El efa y el homer son antiguas unidades de medida de secos; el verso establece una contribución fija de una sexta parte de un efa por cada homer.
    reason: cultural_note
lexical_decisions:
- source_word: תְּרוּמָה
  english_pob_choice: contribution
  chosen_spanish: contribución
  alternatives_spanish:
  - ofrenda
  - tributo
  - ofrenda elevada
  lexicon: HALOT
  rationale: En este contexto administrativo y cultual, el término designa una porción apartada y presentada. «Contribución» comunica bien en español una cuota fijada, sin cargar el verso con una formulación litúrgica más técnica que el hebreo aquí no exige.
- source_word: תָּרִימוּ
  english_pob_choice: you shall offer
  chosen_spanish: ofrecerán
  alternatives_spanish:
  - presentarán
  - elevarán
  - alzarán
  lexicon: HALOT
  rationale: El verbo hifil de רום, unido a תְּרוּמָה, funciona idiomáticamente como ‘presentar/ofrecer’ una contribución. «Ofrecerán» mantiene esa fuerza sin forzar una imagen física de alzar.
- source_word: שִׁשִּׁית
  english_pob_choice: one-sixth
  chosen_spanish: una sexta parte
  alternatives_spanish:
  - un sexto
  - la sexta parte
  lexicon: HALOT
  rationale: La referencia es claramente fraccionaria y cuantitativa. «Una sexta parte» suena natural en español y preserva la precisión matemática del texto.
- source_word: אֵיפָה
  english_pob_choice: ephah
  chosen_spanish: efa
  alternatives_spanish:
  - efá
  lexicon: HALOT
  rationale: Se conserva la unidad técnica de medida por transliteración, como en el texto inglés auditado. «Efa» es la forma usual y legible en español para esta medida antigua.
- source_word: חֹמֶר
  english_pob_choice: homer
  chosen_spanish: homer
  alternatives_spanish:
  - cor
  - medida
  lexicon: HALOT
  rationale: También se conserva la unidad de capacidad por transliteración para no perder precisión técnica. «Homer» mantiene la equivalencia auditada del inglés POB.
- source_word: מֵחֹמֶר
  english_pob_choice: from each homer
  chosen_spanish: por cada homer
  alternatives_spanish:
  - de cada homer
  - a partir de cada homer
  lexicon: HALOT
  rationale: El hebreo expresa una medida tasada a razón de cada unidad de homer. «Por cada homer» comunica el valor distributivo de manera natural en español.
- source_word: הַחִטִּים
  english_pob_choice: wheat
  chosen_spanish: trigo
  alternatives_spanish:
  - el trigo
  lexicon: HALOT
  rationale: En español, como en el inglés auditado, el nombre del cereal funciona naturalmente sin artículo en esta fórmula de medida. «Trigo» es el equivalente directo y claro.
- source_word: וְשִׁשִּׁיתֶם
  english_pob_choice: and one-sixth
  chosen_spanish: y una sexta parte
  alternatives_spanish:
  - y un sexto
  - y la sexta parte
  lexicon: HALOT
  rationale: La forma aparece aquí en paralelo con la primera fracción y se entiende como una segunda cuota equivalente. «Y una sexta parte» conserva el paralelismo y la lectura cuantitativa adoptada por el POB inglés.
- source_word: הַשְּׂעֹרִים
  english_pob_choice: barley
  chosen_spanish: cebada
  alternatives_spanish:
  - la cebada
  lexicon: HALOT
  rationale: Equivalente directo del cereal mencionado; se mantiene el registro sobrio y técnico de una fórmula de medida.
translation_notes:
  revision_awareness: El texto base en inglés y la evaluación de revisión posterior coinciden plenamente; no se documentaron cambios pendientes. La versión española sigue la lectura estable del POB inglés y conserva las unidades técnicas y la relación fraccionaria sin expansión interpretativa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se preservó el paralelismo de las dos fracciones con la misma fórmula «una sexta parte».
  - Se conservaron las unidades antiguas por transliteración para mantener la precisión técnica del pasaje.
