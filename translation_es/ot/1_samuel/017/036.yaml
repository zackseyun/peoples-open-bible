base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/017/036.yaml
  text: Your servant struck down both the lion and the bear[a], and this uncircumcised Philistine will be like one of them, because he has defied the battle lines of the living God.
  footnotes:
