translation:
  language: es
  text: Si rechacé la causa[a] de mi esclavo o de mi esclava, cuando contendían conmigo[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el derecho» o «el caso». El hebreo מִשְׁפָּט puede denotar justicia, derecho legal o una causa/pleito.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «contra mí» o «ante mí»; literalmente, «conmigo». El hebreo expresa contienda o disputa, a menudo con matiz legal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si acaso
  - Si en verdad
  lexicon: HALOT
  rationale: Introduce la cláusula condicional de juramento con una partícula natural en español, manteniendo la estructura del hebreo sin añadir énfasis no requerido.
- source_word: אֶמְאַס
  english_pob_choice: I have rejected
  chosen_spanish: hubiera rechazado
  alternatives_spanish:
  - hubiera despreciado
  - hubiera rehusado
  - hubiera desechado
  lexicon: HALOT
  rationale: 'El verbo hebreo expresa rechazar o desestimar. En este contexto jurídico, el pluscuamperfecto de subjuntivo en español reproduce bien la condición implícita de una afirmación juramentada: si yo hubiera actuado así.'
- source_word: מִשְׁפַּט
  english_pob_choice: the case
  chosen_spanish: el derecho
  alternatives_spanish:
  - el caso
  - la causa
  - la justicia
  - el reclamo legal
  lexicon: HALOT
  rationale: מִשְׁפָּט puede significar juicio, derecho o caso legal. Aquí, por la disputa entre amo y siervo, la idea central es el derecho o la pretensión legítima del subordinado. 'El derecho' conserva la fuerza jurídica y evita una expresión demasiado moderna o ambigua.
- source_word: עַבְדִּי
  english_pob_choice: my male slave
  chosen_spanish: mi esclavo varón
  alternatives_spanish:
  - mi siervo
  - mi esclavo
  - mi siervo varón
  lexicon: HALOT
  rationale: Se preserva 'esclavo' por la fuerza léxica de עֶבֶד, según la pauta del proyecto. Se añade 'varón' para reflejar el contraste explícito con la forma femenina siguiente.
- source_word: וַאֲמָתִי
  english_pob_choice: my female slave
  chosen_spanish: mi esclava
  alternatives_spanish:
  - mi criada
  - mi sierva
  - mi esclava mujer
  lexicon: HALOT
  rationale: אָמָה designa una mujer esclavizada o sierva doméstica. 'Esclava' conserva la correspondencia léxica principal; el contraste de género ya queda claro por la mención anterior de 'esclavo varón'.
- source_word: בְּרִיבָם
  english_pob_choice: when they contended with me
  chosen_spanish: cuando contendían conmigo
  alternatives_spanish:
  - cuando litigaban conmigo
  - cuando disputaban conmigo
  - cuando presentaban su pleito contra mí
  lexicon: HALOT
  rationale: רִיב tiene un sentido de contienda o disputa legal. 'Contendían conmigo' sigue de cerca la lectura auditada de la POB inglesa y conserva el matiz forense sin añadir un desarrollo interpretativo más fuerte que el hebreo.
- source_word: עִמָּדִי
  english_pob_choice: against me
  chosen_spanish: conmigo
  alternatives_spanish:
  - contra mí
  - ante mí
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'conmigo'. Dado que el inglés auditado optó por una formulación de contienda más directa, en español se mantiene la relación preposicional básica del hebreo; el sentido adversarial queda ya dado por el verbo 'contendían' y el contexto del juramento.
theological_decisions:
- issue: Naturaleza jurídico-forense de מִשְׁפַט
  english_pob_reading: the case / the legal right of my servant and my maidservant
  chosen_spanish_reading: el derecho de mi esclavo varón o de mi esclava
  alternative_spanish_readings:
  - el caso de mi esclavo varón o de mi esclava
  - la justicia de mi esclavo varón o de mi esclava
  - la causa de mi esclavo varón o de mi esclava
  rationale: Job afirma que no negó la pretensión legítima de sus siervos en una disputa. 'Derecho' comunica la dimensión jurídica y moral del término sin reducirlo a un simple pleito procesal ni a una abstracción de 'justicia' que sonaría menos concreta en español.
  doctrine_reference: Job 31:13; justicia/rectitud en el discurso sapiencial
- issue: Retención de 'esclavo' frente a 'siervo'
  english_pob_reading: my male slave / my female slave
  chosen_spanish_reading: mi esclavo varón / mi esclava
  alternative_spanish_readings:
  - mi siervo varón / mi sierva
  - mi servidor / mi servidora
  rationale: La POB inglesa mantiene 'slave' por la fuerza del léxico hebreo y la claridad del vínculo de dependencia. En español, 'esclavo' preserva esa fuerza y evita suavizar la relación social que el texto presupone.
  doctrine_reference: Léxico social del AT; עבד/אמה
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de 'brought a complaint against me' a 'contended with me' para reflejar más directamente רִיב. La redacción española sigue esa revisión con 'contendían conmigo' y conserva la tensión jurídica de מִשְׁפַט mediante 'derecho', en lugar de suavizarla a un término meramente narrativo.
  spanish_consistency_notes:
  - Se mantiene 'esclavo' para עֶבֶד conforme a la terminología POB y al valor léxico más fuerte del término.
  - Se usa 'Yahvé' solo cuando aparezca el Tetragrámaton; en este versículo no interviene.
  - Se evita 'siervo' por defecto para no neutralizar la relación servil explícita del pasaje.
  - La construcción condicional con 'Si yo hubiera...' refleja el tono de juramento/autoexamen característico del contexto poético de Job.
