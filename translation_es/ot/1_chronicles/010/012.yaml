base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/010/012.yaml
  text: Then all the valiant men arose and carried away the body of Saul and the bodies of his sons[a], and brought them to Jabesh[b]. They buried their bones under the oak in Jabesh and fasted seven days.
  footnotes:
