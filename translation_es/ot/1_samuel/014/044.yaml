translation:
  language: es
  text: 'Y Saúl dijo[a]: «Así haga Dios, y más aún, porque ciertamente morirás, Jonatán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Fórmula de juramento hebrea: literalmente, «Así haga Dios, y así añada». El objeto de la acción amenazada queda sin expresar en hebreo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And Saul said
  chosen_spanish: Y Saúl dijo
  alternatives_spanish:
  - Entonces Saúl dijo
  - Y dijo Saúl
  lexicon: HALOT
  rationale: El waw narrativo se conserva con 'Y' para reflejar el flujo hebreo sin sobreinterpretar la secuencia. 'Dijo' mantiene el valor preterital narrativo en un español natural.
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Saúl
  lexicon: Nombre propio
  rationale: Nombre propio transliterado según la convención española estándar.
- source_word: כֹּה יַעֲשֶׂה אֱלֹהִים וְכֹה יוֹסִף
  english_pob_choice: May God do so and more also
  chosen_spanish: Así haga Dios, y aun así añada
  alternatives_spanish:
  - Así haga Dios, y así añada más
  - Así haga Dios, y aun más añada
  lexicon: HALOT
  rationale: La fórmula hebrea es un juramento/auto-maldición convencional que deja implícito el objeto de la acción. Se traduce con un imperativo optativo en español que preserve la fuerza imprecatoria y la elipsis del hebreo, evitando añadir 'a mí' o explicar el objeto no expresado.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural morfológico, aquí el referente es el Dios invocado en el juramento de Saúl; en español corresponde 'Dios' en singular.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - porque
  lexicon: HALOT
  rationale: Introduce la razón o base de la declaración juramentada; 'porque' comunica con claridad la relación causal/explicativa en español.
- source_word: מוֹת תָּמוּת
  english_pob_choice: you shall surely die
  chosen_spanish: de cierto morirás
  alternatives_spanish:
  - ciertamente morirás
  - seguramente morirás
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica certeza y solemnidad. 'De cierto morirás' preserva ese énfasis sin sonar artificial, manteniendo el peso legal del anuncio.
- source_word: יוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonatán
  lexicon: Nombre propio
  rationale: Nombre propio transliterado según la convención española estándar.
theological_decisions:
- issue: Fórmula de juramento con objeto implícito
  english_pob_reading: May God do so and more also
  chosen_spanish_reading: Así haga Dios, y aun así añada
  alternative_spanish_readings:
  - Así haga Dios y más añada
  - Así haga Dios, y aun más
  rationale: El hebreo conserva implícito el objeto de la maldición. La redacción española mantiene esa misma tersura y no introduce 'a mí' ni otro objeto explícito, para no resolver una ambigüedad que el texto no resuelve.
  doctrine_reference: Principio de primacía del original; preservar la fórmula convencional sin expandirla más allá de lo dicho.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto al sentido ni a la puntuación principal. Se mantiene la elipsis del juramento y la fuerza intensificadora del hebreo.'
  spanish_consistency_notes:
  - Se usa 'Dios' para אֱלֹהִים en un juramento dirigido al Dios de Israel.
  - Se mantiene 'Jonatán' y 'Saúl' con transliteración española estándar.
  - La cláusula intensiva se vierte con una forma natural en español sin borrar la estructura de juramento convencional.
