  - severity: medium
    issue: '`recorrió` no refleja bien el imperfecto διεπορεύετο'
    rationale: El verbo griego describe movimiento continuado a través de las regiones. 'Recorrió' suena más a acción cerrada/completada; 'viajaba por' o 'iba por' comunica mejor el aspecto narrativo.
  - severity: low
