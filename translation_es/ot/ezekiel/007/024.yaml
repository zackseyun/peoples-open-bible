review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: Yahvé trae a los peores de las naciones, ellos ocupan las casas, él hace cesar el orgullo de los fuertes, y los santuarios son profanados. Sin embargo, la documentación y las notas no preservan del todo el rastro auditado del POB en dos puntos significativos: falta la alternativa sobre וְיָרְשׁוּ (''heredarán / tomarán posesión'') y la nota de profanación cambió el matiz de ''holy places'' a ''contaminados'', que no corresponde tan bien al contraste documentado. También conviene completar ''Pondré fin'' con ''a'' para español natural.'
  spanish_quality_summary: El español es claro, natural y digno. 'Y traeré a los peores de las naciones' y 'sus santuarios serán profanados' suenan bien en registro bíblico contemporáneo. El único ajuste de legibilidad necesario es 'Pondré fin al' → 'Pondré fin al' ya está integrado, pero la base verbal debe presentarse como 'Pondré fin al orgullo...' y la nota asociada debe corresponder al verbo completo. Más importante que la fluidez es alinear las notas con el expediente inglés.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías, Cristo, Espíritu, etc. 'Santuarios' para מְקַדְשֵׁיהֶם y 'profanados' para נִחֲלוּ concuerdan con la decisión léxica auditada. 'Los peores' es aceptable para רָעֵי גוֹיִם.
  issues:
  - severity: medium
    issue: Falta una nota para וְיָרְשׁוּ אֶת בָּתֵּיהֶם
    rationale: El English POB preserva explícitamente la alternativa 'inherit/possess/dispossess'. El borrador español no refleja esa alternativa en nota, aunque sí la documenta en decisiones léxicas. Debe conservarse en las notas públicas.
  - severity: medium
    issue: La nota [c] no sigue la alternativa auditada
    rationale: 'El expediente inglés ofrece ''their holy places will be defiled'', no simplemente ''serán contaminados''. En español conviene conservar la alternativa más cercana: ''sus lugares santos serán profanados/contaminados'' o mejor ''sus lugares santos serán profanados'' según el contraste deseado.'
  - severity: low
    issue: La nota [b] se ancla a una frase algo incompleta
    rationale: El texto principal 'Pondré fin al orgullo...' está bien, pero la nota dice 'O «haré cesar»' sin repetir el complemento. Es mejor anclarla al segmento verbal completo en un texto revisado con notas más pertinentes al expediente.
  revised_spanish_text: Y traeré a los peores[a] de las naciones, y tomarán posesión[b] de sus casas. Pondré fin al orgullo de los fuertes, y sus santuarios serán profanados[c].
