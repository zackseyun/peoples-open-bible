translation:
  language: es
  text: El que susurra contamina su propia alma[a], y en el lugar donde vive será odiado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre aquellos con quienes vive» o «en su vecindad». La frase griega se refiere al ámbito de residencia o comunidad habitada.
    reason: lexical_alternative
lexical_decisions:
- source_word: μολύνει
  english_pob_choice: defiles
  chosen_spanish: mancha
  alternatives_spanish:
  - contamina
  - ensucia
  lexicon: BDAG
  rationale: El verbo griego expresa contaminación o mancha moral. En español, «mancha» comunica bien la idea de deterioro moral sin sonar excesivamente técnico; «contamina» puede sugerir un matiz más físico, y «ensucia» pierde parte de la fuerza ética.
- source_word: τὴν ἑαυτοῦ ψυχὴν
  english_pob_choice: his own soul
  chosen_spanish: su propia alma
  alternatives_spanish:
  - a sí mismo
  - su propia vida
  lexicon: BDAG
  rationale: ψυχή puede significar alma, vida o yo. Aquí el contexto apunta al daño interior y moral que el murmurador se causa; «su propia alma» conserva ese sentido antropológico y ético que la POB inglesa destacó.
- source_word: ὁ ψιθυρίζων
  english_pob_choice: the whisperer
  chosen_spanish: el que anda murmurando
  alternatives_spanish:
  - el murmurador
  - el que susurra
  - el chismoso
  lexicon: BDAG
  rationale: El participio describe a quien habla en secreto, con connotación de murmuración o maledicencia. «El que anda murmurando» mantiene el carácter de acción habitual y la insinuación de habla encubierta sin restringirlo demasiado a «chismoso» o a una sola forma de pecado verbal.
- source_word: ἐν παροικήσει
  english_pob_choice: in the place where he lives
  chosen_spanish: en el lugar donde vive
  alternatives_spanish:
  - en su vecindad
  - entre quienes habitan con él
  - en la comunidad donde vive
  lexicon: LSJ
  rationale: παροίκησις puede referirse al ámbito de residencia o al entorno habitado. «En el lugar donde vive» sigue de cerca la revisión inglesa más reciente y evita añadir una precisión social que el griego no exige.
- source_word: μισηθήσεται
  english_pob_choice: he will be hated
  chosen_spanish: será odiado
  alternatives_spanish:
  - será aborrecido
  - será despreciado
  lexicon: BDAG
  rationale: El futuro pasivo indica que otros lo odiarán. «Será odiado» es la manera más directa y natural de expresar esa idea en español.
translation_notes:
  revision_awareness: El texto español sigue la revisión inglesa más reciente, que prefirió «in the place where he lives» frente a «community where he lives», para no añadir especificidad interpretativa a ἐν παροικήσει y mantener una correspondencia más estrecha con el griego.
  spanish_consistency_notes:
  - Se conservó «alma» para ψυχή, en coherencia con el valor ético-interior que la POB inglesa documenta.
  - «Murmurando» mantiene el campo semántico de ψιθυρίζων sin convertirlo en una acusación más estrecha como «calumniando».
  - «Lugar donde vive» respeta el valor espacial/residencial de παροίκησις y deja abierta la alternativa de vecindad/comunidad en la nota.
  - La construcción verbal «será odiado» reproduce el pasivo futuro griego sin añadir sujeto explícito.
