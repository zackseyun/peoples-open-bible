review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido hebreo general: negativa del hombre, comparecencia de la viuda ante los ancianos en la puerta, denuncia formal, preservación del nombre del hermano en Israel, y negativa a cumplir el deber de cuñado. Sin embargo, hay desajustes en las notas y una mejora menor de estilo/fidelidad: la nota [a] no corresponde a una alternativa real del texto principal, y conviene evitar la coma antes de «y dirá».'
  spanish_quality_summary: El español es claro y digno, pero requiere una reparación pequeña. «Tomar a la viuda de su hermano», «subirá a la puerta» y «rehúsa» son fieles y legibles. «Levantar nombre» es aceptable por conservar el modismo hebreo, aunque la nota debe anclarse ahí, no en «viuda». «Cumplir conmigo el deber de cuñado» comunica bien el tecnicismo legal. Hay una leve mejora estilística en puntuación.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La decisión de evitar «levirato» en el texto principal y usar lenguaje relacional explícito concuerda con el rastro de auditoría inglés. «Cuñado» aquí refleja el hebreo técnico יבם de forma comprensible en español; la nota cultural debe anclarse al deber técnico, no a «Mi cuñado».
  issues:
  - severity: medium
    issue: La nota [a] está mal anclada y no refleja una alternativa significativa al texto principal.
    rationale: 'El texto principal ya dice «la viuda de su hermano»; por tanto, una nota que ofrece «más literalmente: la viuda de su hermano» es redundante y no corresponde al patrón del inglés, donde la nota alternativa pertenece al modismo «raise up a name».'
  - severity: medium
    issue: La nota [b] está anclada a «Mi cuñado», pero la explicación técnica corresponde mejor al verbo final «cumplir conmigo el deber de cuñado».
    rationale: El hebreo técnico señalado en el inglés como «to brother-in-law me» corresponde a יַבְּמִי, no a יְבָמִי («mi cuñado»). La nota cultural debe explicar la obligación levirática en el lugar correcto.
  - severity: low
    issue: Puntuación algo calcada en «a los ancianos, y dirá».
    rationale: En español fluye mejor «a los ancianos y dirá» sin coma antes de la conjunción.
