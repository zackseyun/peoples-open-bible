lexical_decisions:
- source_word: מַלּ֥וּךְ
  english_pob_choice: Malluk
  chosen_spanish: Malluc
  alternatives_spanish:
  - Malluk
  - Maluc
  lexicon: HNp
  rationale: Nombre propio en una lista de firmantes. Se translitera, no se traduce. Se prefiere «Malluc» porque adapta de forma natural la terminación hebrea al español y mantiene una correspondencia cercana con la opción inglesa auditada; «Malluk» conserva más de cerca la vocal final, y «Maluc» simplifica la grafía pero pierde transparencia con el hebreo.
- source_word: חָרִ֖ם
  english_pob_choice: Harim
  chosen_spanish: Harim
  alternatives_spanish:
  - Jarim
  lexicon: HNp
  rationale: Nombre propio. Se conserva la transliteración directa tal como en el control inglés, sin verterlo como palabra común ni castellanizarlo innecesariamente.
- source_word: בַּעֲנָֽה
  english_pob_choice: Baanah
  chosen_spanish: Baaná
  alternatives_spanish:
  - Baana
  - Baaná
  lexicon: HNp
  rationale: Nombre propio. Se translitera manteniendo la secuencia vocálica amplia del hebreo. Se usa tilde final para acomodar la pronunciación española y distinguirlo de una forma llana como «Baana», menos clara en español.
theological_decisions:
- issue: Lista de nombres sin contenido teológico explícito
  english_pob_reading: Malluk, Harim, Baanah.
  chosen_spanish_reading: Malluc, Harim, Baaná.
  alternative_spanish_readings:
  - Malluk, Harim, Baanah.
  - Malluc, Jarim, Baaná.
  rationale: El versículo es un simple listado de nombres propios. No hay tensión doctrinal que resolver ni términos teológicos que modificar. La decisión principal es ortográfica y transliterativa, procurando máxima cercanía al hebreo con una forma publicable en español.
  doctrine_reference: No aplica; texto nominal sin afirmación doctrinal.
translation_notes:
  revision_awareness: 'El control inglés conserva el nombre con una nota de variante ortográfica («Malluk» / «Malluch») y no introduce cambios textuales. En español se mantiene el mismo nivel de cautela: solo se ajusta la transliteración para una lectura natural en español, sin añadir contenido interpretativo.'
  spanish_consistency_notes:
  - Se preserva el carácter nominal y enumerativo del verso.
  - No se emplea «SEÑOR», «Cristo» ni otros equivalentes teológicos porque el hebreo aquí no los contiene.
  - Se mantiene «Harim» sin adaptación a «Jarim» para respetar la transliteración auditada.
  - «Baaná» se eligió por fluidez gráfica en español, aunque la forma sin tilde también sería defendible.
