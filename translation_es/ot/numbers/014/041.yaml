translation:
  language: es
  text: 'Pero Moisés dijo: «¿Por qué están ustedes transgrediendo[a] el mandato de Yahvé[b]? No tendrá éxito[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la boca de Yahvé», un modismo que significa lo que Yahvé ha dicho o mandado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la palabra de Yahvé».'
    reason: alternative_reading
  - marker: c
    text: 'O: «No prosperará».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But Moses said
  chosen_spanish: Pero Moisés dijo
  alternatives_spanish:
  - Y Moisés dijo
  - Entonces Moisés dijo
  lexicon: HALOT
  rationale: El waw narrativo introduce la siguiente acción; 'Pero' conserva el valor adversativo que tiene en el contexto de la reprensión de Moisés.
- source_word: לָמָּה זֶּה
  english_pob_choice: Why are you
  chosen_spanish: ¿Por qué están ustedes...
  alternatives_spanish:
  - ¿Por qué...
  - ¿Por qué entonces están ustedes...
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y enfática; en español se expresa con un '¿por qué?' directo y natural sin forzar un calco de 'esto'.
- source_word: אַתֶּם עֹבְרִים
  english_pob_choice: you are transgressing
  chosen_spanish: están ustedes transgrediendo
  alternatives_spanish:
  - están ustedes violando
  - están ustedes pasando por encima de
  lexicon: HALOT
  rationale: עָבַר con el objeto 'la boca/mandato de Yahvé' es un giro moral-jurídico, no espacial. 'Transgrediendo' mantiene esa fuerza de quebrantar un mandato.
- source_word: אֶת פִּי יְהוָה
  english_pob_choice: the command of Yahweh
  chosen_spanish: el mandato de Yahvé
  alternatives_spanish:
  - la palabra de Yahvé
  - la boca de Yahvé
  lexicon: HALOT
  rationale: Aunque literalmente dice 'la boca de Yahvé', el modismo significa lo que Yahvé ha dicho o mandado. 'Mandato' comunica mejor el sentido en español sin perder la referencia al hablar divino.
- source_word: לֹא תִצְלָח
  english_pob_choice: It will not succeed
  chosen_spanish: No prosperará
  alternatives_spanish:
  - No tendrá éxito
  - No saldrá bien
  lexicon: HALOT
  rationale: צָלַח puede expresar prosperar, resultar bien o tener éxito en una empresa. Aquí, dado el contexto de una acción militar desobediente, 'No prosperará' preserva el matiz de desenlace favorable o desfavorable.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto español usa 'Yahvé' para el Tetragrámaton, siguiendo la práctica transparente de no ocultar el nombre divino bajo un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se corrigió la falta de anclaje de las notas: ahora cada nota aparece exactamente en el texto español mediante [a] y [b]. También se evitó un calco excesivo y se mantuvo el sentido idiomático de עֹבְרִים y פִּי יְהוָה.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de acuerdo con la terminología del proyecto.
  - Se prefirió 'mandato' como equivalente idiomático de 'la boca de Yahvé' en este contexto.
  - '''No prosperará'' conserva la alternativa de lectura de תִצְלָח como éxito/prosperidad en una empresa.'
