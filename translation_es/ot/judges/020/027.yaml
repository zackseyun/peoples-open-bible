translation:
  language: es
  text: Y los hijos de Israel consultaron a Yahvé[a] —pues allí estaba el arca del pacto de Dios en aquellos días[b]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «inquirieron de Yahvé». El hebreo dice literalmente «los hijos de Israel» y usa un verbo que aquí expresa consultar a Dios en busca de dirección.'
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula explica el contexto de la consulta: el arca del pacto de Dios estaba allí en aquellos días.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁאֲלוּ
  english_pob_choice: inquired
  chosen_spanish: consultaron
  alternatives_spanish:
  - inquirieron
  - preguntaron
  lexicon: HALOT
  rationale: El verbo hebreo con ב + el nombre divino suele expresar consultar a Yahvé en sentido oracular o religioso, no una simple pregunta casual. En español, «consultaron» comunica ese sentido formal de búsqueda de dirección divina con naturalidad.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijos de Israel». Mantenerlo preserva la forma del texto fuente y el tono narrativo, sin neutralizar innecesariamente la expresión.
- source_word: בַּיהוָה
  english_pob_choice: of Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: 'En español, con «consultar», la preposición natural es «a»: «consultaron a Yahvé». Esto refleja el valor idiomático de ב con שׁאל sin perder la referencia directa al nombre divino.'
- source_word: וְשָׁם
  english_pob_choice: for ... was there
  chosen_spanish: pues allí estaba
  alternatives_spanish:
  - y allí estaba
  - porque allí estaba
  lexicon: HALOT
  rationale: La partícula introduce una explicación parentética. «Pues» reproduce bien esa fuerza explicativa en español y justifica el inciso entre rayas.
- source_word: אֲרוֹן בְּרִית הָאֱלֹהִים
  english_pob_choice: the ark of the covenant of God
  chosen_spanish: el arca del pacto de Dios
  alternatives_spanish:
  - el arca del pacto de Dios
  - el arca de la alianza de Dios
  lexicon: HALOT
  rationale: «Arca» mantiene el referente bíblico tradicional. «Pacto» conserva el lenguaje covenantal del hebreo בְּרִית; se evita «alianza» por ser posible pero menos consistente con el resto de la terminología de esta base de trabajo.
- source_word: בַּיָּמִים הָהֵם
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - entonces
  lexicon: HALOT
  rationale: La expresión temporal es un modismo estable y se traduce de forma directa y natural con «en aquellos días».
theological_decisions:
- issue: Renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el SEÑOR
  rationale: Siguiendo el criterio del proyecto, el Tetragrámaton se vierte como «Yahvé» para preservar el nombre personal del Dios del pacto, en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor del inciso explicativo sobre el arca
  english_pob_reading: the clause ... explains the setting of their inquiry
  chosen_spanish_reading: el inciso entre rayas explica el trasfondo de la consulta
  alternative_spanish_readings:
  - el inciso entre rayas explica la escena
  - la frase aclara el contexto
  rationale: La cláusula no añade una acción nueva, sino una aclaración de escenario. El español con rayas preserva la función parentética del hebreo y del audit trail inglés.
  doctrine_reference: Narrative syntax / contextual clarification
translation_notes:
  revision_awareness: Se sigue el último pase revisado sin cambios sustanciales; el punto principal de decisión es conservar el valor oracular de שׁאל con una formulación española natural y mantener la nota explicativa parentética del segundo inciso.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como nombre divino principal en lugar de «Señor».
  - Se mantiene «pacto» para בְּרִית en coherencia terminológica.
  - Se usa «hijos de Israel» para reflejar la forma hebrea literal, aunque «israelitas» sería una alternativa idiomática válida.
  - La puntuación con rayas reproduce el inciso explicativo del texto fuente.
