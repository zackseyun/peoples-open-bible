    issue: El marcador [a] está colocado en «dirás» pero la nota explica «regalo»/מִנְחָה.
    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente. Tal como está, el aparato induce a error y no cumple la disciplina de marcado requerida.
  - severity: medium
    issue: «Él también viene detrás de nosotros» hace principal una lectura más dinámica que la POB dejó como alternativa.
    rationale: El hebreo permite la lectura dinámica, pero la decisión auditada principal fue «is behind us». En español, «está detrás de nosotros» preserva mejor esa base, dejando «viene después de nosotros» como alternativa en nota.
  - severity: low
    issue: La nota [a] dice «entrega conciliadora», formulación algo menos natural que «obsequio» o «presente conciliador».
    rationale: No afecta gravemente el sentido, pero una redacción más idiomática mejora la calidad del español sin alterar la justificación léxica.
