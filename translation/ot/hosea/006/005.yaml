theological_decisions:
- issue: Referent and suffix in וּמִשְׁפָּטֶיךָ
  chosen_reading: and your judgments go forth like light
  alternative_readings:
  - and my judgment goes forth like light
  - and judgment goes forth like light
  rationale: 'The MT points to a 2ms suffix (''your''), which is difficult but likely intentional, addressing Israel/Ephraim directly: the people''s own judicial outcome or case is exposed in the light. Because the Hebrew permits discussion and some ancient/modern interpreters prefer a 1cs sense by context, the alternative is preserved in a footnote rather than resolved dogmatically.'
  doctrine_reference: Preserve theological tension rather than resolve it.
