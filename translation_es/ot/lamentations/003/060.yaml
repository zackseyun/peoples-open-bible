    rationale: La auditoría inglesa eligió «schemes» precisamente para reflejar intención maliciosa. En español, «planes» es correcto como opción básica, pero demasiado neutral en un versículo sobre venganza. «Intrigas» transmite mejor el contexto adversarial sin sobretraducir.
  - severity: low
