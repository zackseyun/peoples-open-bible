translation:
  language: es
  text: 'Porque ahora dirán: «No tenemos rey, porque no temimos a Yahvé[a]; y el rey, ¿qué puede hacer por nosotros?»[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque no tememos a Yahvé» o «porque no hemos temido a Yahvé». El perfecto hebreo puede describir tanto su condición estable como su fracaso culpable en el pasado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿qué hará por nosotros?» La forma hebrea es formalmente futura; el texto principal vierte el sentido retórico de incapacidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La conjunción introduce la explicación de la afirmación profética; en español, «Porque» conserva bien ese valor causal/expositivo al inicio de la oración.
- source_word: עַתָּה
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - entonces
  lexicon: HALOT
  rationale: El adverbio temporal señala la inmediatez de la escena profética; «ahora» es natural y preciso en español.
- source_word: יֹאמְרוּ
  english_pob_choice: they will say
  chosen_spanish: dirán
  alternatives_spanish:
  - dirán para sí
  - dirán ellos
  lexicon: HALOT
  rationale: El imperfecto funciona de manera predictiva; «dirán» transmite el valor futuro sin sobrecargar la frase.
- source_word: אֵין מֶלֶךְ לָנוּ
  english_pob_choice: We have no king
  chosen_spanish: No tenemos rey
  alternatives_spanish:
  - No hay rey para nosotros
  - No tenemos un rey
  lexicon: HALOT
  rationale: «No tenemos rey» conserva el sentido existencial y suena natural en español, manteniendo la fuerza de la negación.
- source_word: יָרֵאנוּ אֶת יְהֹוָה
  english_pob_choice: we did not fear Yahweh
  chosen_spanish: no temimos a Yahvé
  alternatives_spanish:
  - no tememos a Yahvé
  - no hemos temido a Yahvé
  - no reverenciamos a Yahvé
  lexicon: HALOT
  rationale: Se mantiene «temer» para conservar la fuerza covenantal del hebreo ירא; en español, «no temimos a Yahvé» refleja bien la culpa pasada señalada por el perfecto.
- source_word: יְהֹוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva la forma estándar del proyecto para el Tetragrámaton, evitando la sustitución por un título.
- source_word: וְהַמֶּלֶךְ
  english_pob_choice: and the king
  chosen_spanish: y el rey
  alternatives_spanish:
  - pero el rey
  - así que el rey
  lexicon: HALOT
  rationale: La frase introduce un segundo miembro retórico; «y el rey» mantiene la estructura simple y la transición abrupta del hebreo.
- source_word: מַה יַּעֲשֶׂה לָּנוּ
  english_pob_choice: what can he do for us?
  chosen_spanish: ¿qué puede hacer por nosotros?
  alternatives_spanish:
  - ¿qué hará por nosotros?
  - ¿qué podría hacer por nosotros?
  lexicon: HALOT
  rationale: Aunque la forma verbal es futura, el contexto retórico expresa incapacidad; «¿qué puede hacer por nosotros?» reproduce esa fuerza pragmática en español.
theological_decisions:
- issue: Temor a Yahvé como categoría de alianza
  english_pob_reading: Retain 'fear Yahweh' in the main text
  chosen_spanish_reading: Conservar «no temimos a Yahvé»
  alternative_spanish_readings:
  - no reverenciamos a Yahvé
  - no respetamos a Yahvé
  rationale: En este contexto no se debe suavizar el hebreo ירא; «temer» preserva la gravedad profética y la dimensión de obediencia reverente.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Ajustado para que cada marcador de nota aparezca explícitamente en el texto español y quede anclado en el lugar correspondiente; se conserva la fuerza profética y la equivalencia óptima del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el Tetragrámaton.
  - Se conserva «temer» en vez de suavizar a «reverenciar» para mantener la carga teológica del pasaje.
  - La pregunta final se vierte con valor de incapacidad, no como simple futuro cronológico.
