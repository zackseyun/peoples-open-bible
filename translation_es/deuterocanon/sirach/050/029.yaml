translation:
  language: es
  text: Porque si uno hace estas cosas, será fuerte ante todo[a], porque la luz de Yahvé es su senda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego más literalmente: «su huella», «su rastro» o «su pisada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - si acaso
  lexicon: LSJ
  rationale: La construcción condicional general del griego se expresa con naturalidad en español con 'si'. Mantiene el valor gnómico del proverbio sin añadir matices no presentes.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: LSJ
  rationale: En español, 'porque' introduce con claridad la relación explicativa/causal del versículo con lo anterior. 'Pues' también sería posible, pero 'porque' resulta más transparente y digno en lectura pública.
- source_word: αὐτὰ
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - eso
  - ellas
  lexicon: LSJ
  rationale: El pronombre remite a instrucciones ya dadas; 'estas cosas' hace explícita la referencia sin especificarla indebidamente.
- source_word: ποιήσῃ
  english_pob_choice: does
  chosen_spanish: hace
  alternatives_spanish:
  - practica
  - cumple
  lexicon: LSJ
  rationale: El verbo griego es amplio. 'Hace' conserva la sencillez del condicional general; 'practica' o 'cumple' estrecharían el sentido más de lo que permite el texto.
- source_word: πρὸς πάντα
  english_pob_choice: in everything
  chosen_spanish: frente a todo
  alternatives_spanish:
  - en todo
  - contra todo
  - para todo
  lexicon: LSJ
  rationale: La revisión inglesa resaltó la fuerza de πρὸς πάντα. En español, 'frente a todo' comunica mejor la idea de capacidad efectiva ante cualquier circunstancia, sin reducirlo a mera ubicación ('en todo').
- source_word: ἰσχύσει
  english_pob_choice: will be strong
  chosen_spanish: será fuerte
  alternatives_spanish:
  - prevalecerá
  - tendrá poder
  - vencerá
  lexicon: LSJ
  rationale: '''Será fuerte'' conserva el valor básico de ἰσχύω y sigue de cerca la revisión inglesa. Otras opciones sugerirían victoria explícita o éxito, lo cual va más allá del verbo griego.'
- source_word: φῶς
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - iluminación
  lexicon: LSJ
  rationale: '''Luz'' mantiene el símbolo bíblico de guía y revelación de manera directa y reconocible.'
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: LSJ
  rationale: En este proyecto, el nombre divino se vierte como 'Yahvé' cuando el griego Κυρίου corresponde al tetragrámaton en el trasfondo de la LXX. Se evita 'el Señor' como sustituto de ocultamiento, salvo razón contextual específica.
- source_word: τὸ ἴχνος αὐτοῦ
  english_pob_choice: his path
  chosen_spanish: su senda
  alternatives_spanish:
  - su huella
  - su rastro
  - su pisada
  lexicon: LSJ
  rationale: '''Senda'' comunica bien en español la imagen de un curso de vida guiado por la luz divina. Se preserva la tensión con el sentido más concreto de ἴχνος mediante nota, sin forzar un calco poco idiomático en el texto principal.'
theological_decisions:
- issue: Valor de πρὸς πάντα ἰσχύσει
  english_pob_reading: will be strong against all things
  chosen_spanish_reading: será fuerte frente a todo
  alternative_spanish_readings:
  - prevalecerá en todo
  - será fuerte en todo
  - vencerá a todo
  rationale: La frase griega puede expresar fortaleza o eficacia ante cualquier cosa. Se conserva la idea de capacidad resistente y no se interpreta como triunfo absoluto mecánico. 'Frente a todo' refleja la revisión inglesa y mantiene la amplitud sin exagerar el alcance.
  doctrine_reference: Preservar la ambigüedad semántica del texto sapiencial; no expandir a una promesa de dominio total no explicitada.
- issue: Metáfora de τὸ ἴχνος αὐτοῦ
  english_pob_reading: the light of the Lord is his path
  chosen_spanish_reading: la luz de Yahvé es su senda
  alternative_spanish_readings:
  - la luz de Yahvé es su huella
  - la luz de Yahvé guía su camino
  - la luz de Yahvé es su pisada
  rationale: 'El griego usa una imagen concreta: ''huella'', ''rastro'' o ''pisada''. En el cuerpo del verso, ''senda'' ofrece una metáfora inteligible y natural para el lector español. Se conserva la alternativa literal en nota para no perder la concreción del original.'
  doctrine_reference: 'Preservar la imagen sapiencial y su posible doble sentido: guía del camino y marca visible dejada por la luz divina.'
translation_notes:
  revision_awareness: La redacción sigue la revisión final del inglés auditado, que corrigió 'will prevail in everything' a 'will be strong against all things' para reflejar más de cerca πρὸς πάντα ἰσχύσει. En español se conservó esa dirección interpretativa con 'será fuerte frente a todo'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para Κυρίου según la política del proyecto.
  - Se evitó 'Cristo' y cualquier terminología no presente en el verso.
  - '''Luz'' y ''senda'' mantienen el registro sapiencial y bíblico sin arcaísmo excesivo.'
  - La nota al pie preserva la lectura literal de ἴχνος sin dejarla fuera del texto principal.
