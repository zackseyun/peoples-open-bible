translation:
  language: es
  text: ¡Giman[a], porque está cerca el día de Yahvé; vendrá como destrucción de parte del Todopoderoso[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Aullen»; el imperativo hebreo pide un clamor fuerte de dolor o terror.
    reason: lexical_alternative
  - marker: b
    text: Hay un juego de palabras hebreo entre «destrucción» (shod) y «el Todopoderoso» (Shaddai).
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵילִילוּ
  english_pob_choice: Wail
  chosen_spanish: ¡Aullad!
  alternatives_spanish:
  - ¡Gemid!
  - ¡Lamentad!
  lexicon: HALOT
  rationale: El imperativo plural de ילל expresa un clamor fuerte de dolor o terror. «Aullad» conserva la intensidad oral y la fuerza pública del llamado profético; «gemid» o «lamentad» suavizan más el tono.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del imperativo. «Porque» es natural y fiel en español bíblico contemporáneo.
- source_word: קָרוֹב
  english_pob_choice: is near
  chosen_spanish: cercano está
  alternatives_spanish:
  - está cerca
  - se acerca
  lexicon: HALOT
  rationale: Expresa inminencia como predicado. El orden «cercano está» mantiene el énfasis profético y suena digno en español.
- source_word: יוֹם יְהוָה
  english_pob_choice: the day of Yahweh
  chosen_spanish: el día de Yahvé
  alternatives_spanish:
  - el día de Yahvé
  - el día de Yahvé Dios
  lexicon: HALOT
  rationale: Se traduce la fórmula profética estable con el nombre divino «Yahvé», siguiendo el criterio del proyecto para יְהוָה. «Día» conserva el sentido escatológico/judicial del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino con la forma establecida en el proyecto en español. No se sustituye por un título como «Señor».
- source_word: כְּשֹׁד
  english_pob_choice: like destruction
  chosen_spanish: como destrucción
  alternatives_spanish:
  - como devastación
  - como ruina
  lexicon: HALOT
  rationale: שֹׁד en contexto profético denota destrucción violenta. «Destrucción» es claro y mantiene la imagen del símil sin introducir más explicación que la fuente.
- source_word: מִשַּׁדַּי
  english_pob_choice: from the Almighty
  chosen_spanish: desde el Todopoderoso
  alternatives_spanish:
  - desde Shaddai
  - del Todopoderoso
  lexicon: HALOT
  rationale: מִן indica procedencia; «desde» reproduce bien el origen del suceso. «Todopoderoso» traduce el título divino שַׁדַּי con una forma idiomática en español.
- source_word: יָבֹוא
  english_pob_choice: it will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - vendrá sobre ellos
  - llegará
  lexicon: HALOT
  rationale: El verbo perfecto profético/futuro expresa la llegada del acontecimiento anunciado. En español, el sujeto implícito del contexto permite una forma breve y natural.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  rationale: El hebreo usa directamente el Tetragrama. Se mantiene el nombre propio divino para preservar la identidad del pacto, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering of שַׁדַּי as a divine title
  english_pob_reading: the Almighty
  chosen_spanish_reading: el Todopoderoso
  alternative_spanish_readings:
  - Shaddai
  rationale: Se traduce el título divino en lugar de transliterarlo para hacer explícito su sentido en español. Así se conserva también la relación sonora con שֹׁד sin perder inteligibilidad.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §2: Translate titles; transliterate names'
- issue: Preserving the Hebrew wordplay between שֹׁד and שַׁדַּי
  english_pob_reading: wordplay between 'destruction' and 'the Almighty'
  chosen_spanish_reading: destrucción / Todopoderoso
  alternative_spanish_readings:
  - ruina / Shaddai
  - destrucción / Shaddai
  rationale: En español no puede reproducirse plenamente el juego fonético del hebreo, pero «destrucción» y «Todopoderoso» mantienen la tensión semántica y permiten anotar el recurso literario sin ocultarlo.
  doctrine_reference: Poetic wordplay preservation guideline
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con la auditoría inglesa y no requiere revisión adicional. Se preserva el tono profético imperativo, el nombre divino Yahvé y el título «Todopoderoso», anotando el juego de palabras hebreo donde el español no puede reflejarlo plenamente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה según la convención del proyecto.
  - Se traduce שַׁדַּי como «el Todopoderoso» en línea con el criterio de traducir títulos divinos.
  - Se evita «Señor» como sustituto del nombre divino.
  - El verso conserva una cadencia breve y solemne adecuada para un registro bíblico publicable.
