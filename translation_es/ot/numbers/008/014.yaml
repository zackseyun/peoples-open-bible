translation:
  language: es
  text: Así separarás a los levitas de entre los hijos de Israel[a][b], y los levitas serán míos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apartarás»; el verbo hebreo puede significar también «poner aparte».
    reason: lexical_alternative
  - marker: b
    text: O «los israelitas»; el hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: c
    text: O «pertenecerán a mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִבְדַּלְתָּ
  english_pob_choice: So you shall separate
  chosen_spanish: Así separarás
  alternatives_spanish:
  - Y separarás
  - Entonces separarás
  - Apartarás
  lexicon: HALOT
  rationale: El piel/hiphil de בדל expresa separar o apartar. «Así» refleja la secuencia procedimental del contexto, como el inglés POB usa «So». «Separarás» conserva el valor directo sin volver demasiado interpretativo el verbo.
- source_word: אֶת הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: a los levitas
  alternatives_spanish:
  - a los levitas
  - a los levitas,
  - a los levitas
  lexicon: HALOT
  rationale: El objeto directo marcado por אֶת se expresa naturalmente con «a». «Levitas» es el nombre estable y transparente para la tribu/clan de Leví.
- source_word: מִתּוֹךְ
  english_pob_choice: from among
  chosen_spanish: de entre
  alternatives_spanish:
  - de en medio de
  - de entre el grupo de
  - de entre
  lexicon: HALOT
  rationale: La idea es separación desde dentro de un conjunto mayor. «De entre» comunica de manera idiomática la extracción selectiva sin perder el matiz de procedencia interna.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la forma literal «hijos de Israel», como hace el inglés POB con «sons of Israel», para no aplanar la forma familiar del hebreo.
- source_word: וְהָיוּ לִי
  english_pob_choice: and the Levites shall be mine
  chosen_spanish: y los levitas serán míos
  alternatives_spanish:
  - y los levitas pertenecerán a mí
  - y los levitas serán para mí
  lexicon: HALOT
  rationale: היה con ל expresa pertenencia o posesión especial. «Serán míos» mantiene el sentido de pertenencia de manera natural en español y evita añadir explícitamente «consagrados» donde el verso no lo dice.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas
  lexicon: HALOT
  rationale: La repetición final se conserva con el mismo término para reflejar el énfasis formal del hebreo, en lugar de sustituirlo por un pronombre.
theological_decisions:
- issue: Pertenencia a Yahvé frente a consagración explícita
  english_pob_reading: the Levites shall be mine
  chosen_spanish_reading: los levitas serán míos
  alternative_spanish_readings:
  - los levitas me pertenecerán
  - los levitas serán dedicados a mí
  rationale: El hebreo expresa pertenencia/posesión mediante לִי con היה. Aunque el contexto más amplio es cultual, este versículo en sí no usa aquí un término explícito de consagración; por eso se preserva la formulación de pertenencia sin expandirla.
  doctrine_reference: 'Principio de precisión textual: no introducir una afirmación teológica más específica que la del versículo cuando el hebreo sólo expresa pertenencia.'
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés y no hubo revisiones aplicadas; se conservó la estructura breve y paralela del hebreo, con el mismo valor de separación y pertenencia.
  spanish_consistency_notes:
  - Se mantuvo «levitas» en ambas ocurrencias para reflejar la repetición enfática del hebreo.
  - Se evitó «SEÑOR» porque en este versículo no aparece el nombre divino ni una cita directa del tetragrámaton.
  - Se prefirió «hijos de Israel» por fidelidad formal y coherencia con la decisión auditada de conservar la expresión familiar hebrea.
