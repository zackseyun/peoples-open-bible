translation:
  language: es
  text: porque ha extendido su mano contra Dios[a], y se ha mostrado poderoso contra el Todopoderoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha extendido su mano hacia Dios, y se fortalece contra el Todopoderoso».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En este contexto causal, «porque» expresa con naturalidad la relación de motivo que introduce la frase, manteniendo la fuerza lógica del hebreo sin sonar forzado en español.
- source_word: נָטָה
  english_pob_choice: has stretched out
  chosen_spanish: ha extendido
  alternatives_spanish:
  - ha alargado
  - ha tendido
  lexicon: HALOT
  rationale: El verbo comunica la imagen concreta de extender la mano. «Ha extendido» conserva esa imagen y funciona bien con el objeto «su mano» en español.
- source_word: אֶל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: Aunque la preposición básica es direccional, el contexto es hostil. «Contra» transmite la oposición implícita que el inglés POB también decidió explicitar con «against».
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios Fuerte
  - el Poderoso
  lexicon: HALOT
  rationale: Aquí אֵל funciona como título divino común. «Dios» mantiene la referencia sin duplicar innecesariamente el título paralelo de la segunda cola.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - la mano de él
  lexicon: HALOT
  rationale: Se conserva el singular y el posesivo directo, siguiendo de cerca el hebreo y la imagen idiomática de una acción hostil realizada con la mano.
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - Shaddai
  - el Omnipotente
  lexicon: HALOT
  rationale: Se traduce el título divino, siguiendo la práctica del proyecto de traducir títulos. «Todopoderoso» es idiomático en español y mantiene la solemnidad del paralelo poético.
- source_word: יִתְגַּבָּר
  english_pob_choice: has shown himself mighty
  chosen_spanish: se ha mostrado poderoso
  alternatives_spanish:
  - se ha hecho fuerte
  - ha actuado con arrogancia
  - ha querido prevalecer
  lexicon: HALOT
  rationale: El hitpael de גבר sugiere hacerse fuerte o mostrarse poderoso. «Se ha mostrado poderoso» conserva la reflexividad y la ironía del acto de desafiar al Todopoderoso sin introducir una interpretación más lejana del verbo.
theological_decisions:
- issue: Paralelismo de los dos títulos divinos
  english_pob_reading: Translate אֵל as 'God' and שַׁדַּי as 'the Almighty'
  chosen_spanish_reading: Traducir אֵל como «Dios» y שַׁדַּי como «el Todopoderoso»
  alternative_spanish_readings:
  - «Dios» / «Shaddai»
  - «el Dios Fuerte» / «el Todopoderoso»
  rationale: El hebreo presenta dos designaciones divinas en paralelismo poético. Mantener ambas con traducción distinta evita la repetición artificial y conserva el contraste retórico del texto.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente del audit trail, que ajustó la segunda cola para mantener el paralelismo verbal en tiempo perfecto. Se preserva esa simetría en español con «ha extendido» / «se ha mostrado».
  spanish_consistency_notes:
  - Se usó «Dios» para אֵל y «el Todopoderoso» para שַׁדַּי, manteniendo la distinción titulativa del hebreo.
  - Se eligió «contra» para la dirección hostil de אֶל, siguiendo la decisión contextual del inglés POB.
  - Se conservó la imagen corporal de «su mano» para reflejar el idiomático hebreo sin explicitar de más.
  - La nota alternativa refleja la tensión lexical entre dirección neutral («hacia») y oposición hostil («contra»), presente en el auditable English POB.
