source:
  edition: SBLGNT
  text: 'Ταξάμενοι δὲ αὐτῷ ἡμέραν ⸀ἧκον πρὸς αὐτὸν εἰς τὴν ξενίαν πλείονες, οἷς ἐξετίθετο διαμαρτυρόμενος τὴν βασιλείαν τοῦ θεοῦ πείθων τε ⸀αὐτοὺς περὶ τοῦ Ἰησοῦ ἀπό τε τοῦ νόμου Μωϋσέως καὶ τῶν προφητῶν ἀπὸ πρωῒ ἕως ἑσπέρας.'
base_translation:
  language: en
  yaml_path: translation/nt/acts/028/023.yaml
  text: After they had arranged a day with him[a], more of them came to him at his lodging. To them he was explaining, solemnly testifying about the kingdom of God and persuading them concerning Jesus from both the Law of Moses and the Prophets[c][b], from morning until evening.
  footnotes:
  - marker: a
    text: "Or 'to his lodging' or 'to the place where he was staying.' The Greek term refers to lodging or accommodations."
    reason: lexical_alternative
  - marker: b
    text: "Or 'he was expounding' or 'setting forth.'"
    reason: lexical_alternative
  - marker: c
    text: "Or 'and persuading them'; the Greek participle can emphasize either the act of persuasion or the attempt to persuade."
    reason: lexical_alternative
translation:
  language: ko
  text: 그들이 그와 약속한 날에, 더 많은 사람이 그의 숙소로 그에게 왔습니다. 그가 그들에게 아침부터 저녁까지 모세의 율법과 예언서로부터 예수에 관해 설명하며, 하나님의 나라를 엄히 증언하고 그들을 설득했습니다.
  philosophy: optimal-equivalence
