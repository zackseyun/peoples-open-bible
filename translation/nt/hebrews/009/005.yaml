id: HEB.9.5
reference: Hebrews 9:5
source:
  edition: SBLGNT
  text: ὑπεράνω δὲ αὐτῆς Χερουβὶν δόξης κατασκιάζοντα τὸ ἱλαστήριον· περὶ ὧν οὐκ ἔστιν νῦν λέγειν κατὰ μέρος.
translation:
  text: And above it were the cherubim of glory overshadowing the atoning sacrifice[a]; about these things it is not now possible to speak in detail.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mercy seat,' that is, the cover of the ark; alternatively, 'propitiation.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπεράνω
  chosen: above
  alternatives:
  - over
  lexicon: BDAG
  rationale: Spatial term indicating position over the ark; 'above' is natural modern English and sufficiently formal.
- source_word: αὐτῆς
  chosen: it
  alternatives:
  - her
  - the ark
  lexicon: BDAG
  rationale: Feminine pronoun refers back to the ark/covenant chest in the preceding context. English uses neuter 'it' for the object; the referent is left implicit rather than repeated.
- source_word: Χερουβὶν
  chosen: cherubim
  alternatives:
  - cherubs
  lexicon: BDAG
  rationale: Standard transliteration for the heavenly beings; preserves biblical register better than the colloquial 'cherubs'.
- source_word: δόξης
  chosen: of glory
  alternatives:
  - glorious
  - glory-bearing
  lexicon: BDAG
  rationale: A genitive likely characterizing the cherubim in relation to divine glory. 'Cherubim of glory' preserves the compact Greek expression without over-interpreting.
- source_word: κατασκιάζοντα
  chosen: overshadowing
  alternatives:
  - covering over
  - casting a shadow over
  lexicon: BDAG
  rationale: Present participle describing the cherubim's position over the cover. 'Overshadowing' is the conventional and accurate rendering.
- source_word: ἱλαστήριον
  chosen: atoning sacrifice
  alternatives:
  - mercy seat
  - propitiation
  lexicon: BDAG
  rationale: Per doctrine table, the default rendering is 'atoning sacrifice,' with alternatives preserved in a footnote. In this tabernacle context the referent is specifically the ark's cover, traditionally 'mercy seat,' but the project default is maintained and the cultic alternative is footnoted for auditability.
- source_word: περὶ ὧν
  chosen: about these things
  alternatives:
  - concerning which things
  lexicon: BDAG
  rationale: Idiomatic English for the prepositional relative phrase, referring to the tabernacle furnishings just mentioned.
- source_word: οὐκ ἔστιν νῦν
  chosen: it is not now possible
  alternatives:
  - it is not now
  - this is not now the time
  lexicon: BDAG
  rationale: The idiom implies present impracticality or unsuitability for fuller discussion. 'Possible' makes the English complete and natural without adding substantial meaning.
- source_word: λέγειν κατὰ μέρος
  chosen: to speak in detail
  alternatives:
  - to speak piece by piece
  - to describe in detail
  lexicon: BDAG
  rationale: The phrase means to discuss item by item or in detail. 'Speak in detail' is clear modern English and fits the author's rhetorical aside.
