translation:
  language: es
  text: Tenía veinticinco años cuando comenzó a reinar, y reinó veintinueve años en Jerusalén. El nombre de su madre era Abi, hija de Zacarías.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְחָמֵשׁ שָׁנָה
  english_pob_choice: twenty-five years old
  chosen_spanish: veinticinco años
  alternatives_spanish:
  - hijo de veinticinco años
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de edad; en español, la forma natural y fiel es 'veinticinco años'. 'Hijo de veinticinco años' conservaría la literalidad, pero suena antinatural y oscurece el dato de edad.
- source_word: הָיָה בְמָלְכֹו
  english_pob_choice: when he began to reign
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando llegó a reinar
  - al reinar
  lexicon: HALOT
  rationale: La construcción marca el momento de la ascensión al trono. 'Cuando comenzó a reinar' reproduce ese valor temporal con naturalidad en español y evita una paráfrasis excesiva.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó
  lexicon: HALOT
  rationale: El verbo se refiere al ejercicio efectivo del reinado. 'Reinó' conserva el matiz regnal más precisamente que 'fue rey'.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Es un complemento locativo directo; 'en Jerusalén' es la forma clara y exacta en español.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: His mother’s name was
  chosen_spanish: El nombre de su madre era
  alternatives_spanish:
  - Y el nombre de su madre era
  - Su madre se llamaba
  lexicon: HALOT
  rationale: La fórmula hebrea de presentación nominal se puede verter de manera formal y transparente. 'El nombre de su madre era' conserva la estructura del dato genealógico sin perder fluidez.
- source_word: אֲבִי
  english_pob_choice: Abi
  chosen_spanish: Abi
  alternatives_spanish:
  - Abi
  lexicon: HALOT
  rationale: Es un nombre propio; se translitera como 'Abi' sin adaptar su forma.
- source_word: בַּת זְכַרְיָה
  english_pob_choice: daughter of Zechariah
  chosen_spanish: hija de Zacarías
  alternatives_spanish:
  - la hija de Zacarías
  lexicon: HALOT
  rationale: La frase indica filiación. 'Hija de Zacarías' es la traducción directa y natural. Se mantiene 'Zacarías' como forma española estable del nombre.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el valor del hebreo y concuerda con la solución inglesa auditada: edad idiomática, comienzo del reinado, duración del reinado y fórmula genealógica sin añadidos.'
  spanish_consistency_notes:
  - Se usa 'reinar' y 'reinó' de modo uniforme para reflejar מָלַךְ.
  - Se evita 'SEÑOR' y cualquier término teológico no presente en el versículo.
  - Los nombres propios se mantienen en forma española estándar cuando existe equivalente tradicional ('Jerusalén', 'Zacarías').
