translation:
  language: es
  text: Acercaos[a], naciones, para oír; y escuchad, pueblos. Que oiga la tierra, y todo lo que la llena[b], el mundo y todo lo que brota de él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Aproximaos, naciones, para oír; y pueblos, prestad atención».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su plenitud» o «todo lo que hay en ella».'
    reason: lexical_alternative
  - marker: c
    text: 'También puede entenderse: «todos sus descendientes» o «todo su producto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: קִרְבוּ
  english_pob_choice: Come near
  chosen_spanish: Acercaos
  alternatives_spanish:
  - Acercaos
  - Venid cerca
  - Aproximaos
  lexicon: HALOT
  rationale: Imperativo plural de קרב con sentido de invitación o convocatoria a acercarse. «Acercaos» es natural en español y conserva el llamado directo del texto.
- source_word: גוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - gentiles
  - pueblos
  - naciones
  lexicon: HALOT
  rationale: En este contexto profético se dirige a los pueblos del mundo en general. «Naciones» refleja mejor ese alcance amplio que «gentiles».
- source_word: לִשְׁמֹעַ
  english_pob_choice: to hear
  chosen_spanish: para oír
  alternatives_spanish:
  - para escuchar
  - para oír
  lexicon: HALOT
  rationale: El infinitivo marca propósito tras el imperativo. «Oír» preserva el vínculo verbal con el verbo repetido después en el versículo.
- source_word: לְאֻמִּים
  english_pob_choice: peoples
  chosen_spanish: pueblos
  alternatives_spanish:
  - pueblos
  - naciones
  lexicon: HALOT
  rationale: Es un paralelo cercano de גוים. «Pueblos» mantiene la distinción poética sin repetir exactamente el mismo término.
- source_word: הַקְשִׁיבוּ
  english_pob_choice: listen
  chosen_spanish: escuchad
  alternatives_spanish:
  - escuchad
  - prestad atención
  - dad oído
  lexicon: HALOT
  rationale: El hifil de קשב implica atender con cuidado. «Escuchad» es breve, idiomático y paralelo a «oír».
- source_word: תִּשְׁמַע
  english_pob_choice: Let ... hear
  chosen_spanish: Oiga
  alternatives_spanish:
  - Oiga
  - Que oiga
  - Oiga, en forma exhortativa
  lexicon: HALOT
  rationale: El imperfecto femenino singular funciona aquí con matiz jussivo. «Oiga» transmite bien la invitación o exhortación dirigida a la tierra.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: El contexto es universal, junto con «el mundo» y «todos sus descendientes». «La tierra» conserva ese sentido amplio y natural en español.
- source_word: מְלֹאָהּ
  english_pob_choice: all that fills it
  chosen_spanish: todo lo que la llena
  alternatives_spanish:
  - todo lo que la llena
  - su plenitud
  - todo lo que contiene
  lexicon: HALOT
  rationale: La expresión apunta a la totalidad contenida en la tierra. «Todo lo que la llena» refleja claramente la idea de plenitud sin volverla demasiado abstracta.
- source_word: תֵּבֵל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el mundo
  - la tierra habitada
  lexicon: HALOT
  rationale: תבל suele designar el mundo en su orden e inhabitación. «El mundo» es la equivalencia más natural y fiel en español.
- source_word: כָל צֶאֱצָאֶיהָ
  english_pob_choice: all its offspring
  chosen_spanish: todos sus descendientes
  alternatives_spanish:
  - todos sus descendientes
  - todo lo que de ella procede
  - toda su prole
  lexicon: HALOT
  rationale: צאצאים conserva la imagen de lo que sale o brota de algo. En español, «descendientes» mantiene la metáfora genealógica y sugiere tanto habitantes como lo que procede de la tierra.
theological_decisions:
- issue: Alcance universal de los destinatarios
  english_pob_reading: nations / peoples / the earth / the world
  chosen_spanish_reading: naciones / pueblos / la tierra / el mundo
  alternative_spanish_readings:
  - gentiles
  - país
  - mundo habitado
  rationale: El hebreo acumula términos de alcance amplio para intensificar la convocatoria. La traducción mantiene esa amplitud sin estrechar el sentido a un grupo religioso posterior.
  doctrine_reference: Isaías 34:1; universal summons in prophetic rhetoric
translation_notes:
  revision_awareness: El paquete de auditoría inglesa señala un consenso alto y no registra revisiones aplicadas; por eso la versión española sigue de cerca las decisiones léxicas consolidadas sin introducir cambios interpretativos nuevos.
  spanish_consistency_notes:
  - Se conservó la distinción entre «naciones» y «pueblos» para reflejar el paralelismo hebreo.
  - Se mantuvo el doblete «la tierra / el mundo» para reproducir la expansión poética del alcance.
  - «Descendientes» sigue la imagen generativa de צאצאיה, aunque en español admite una lectura más amplia de procedencia.
