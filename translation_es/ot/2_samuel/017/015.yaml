translation:
  language: es
  text: 'Entonces Husai dijo a los sacerdotes Sadoc y Abiatar[a]: «Así y así aconsejó Ahitofel a Absalón y a los ancianos de Israel, y así y así he aconsejado yo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebraísmo: «así y así» reproduce un modismo que resume lo dicho sin citarlo palabra por palabra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva introduce avance narrativo; «Entonces» conserva la secuencia de forma natural en español sin perder el valor sucesivo.
- source_word: חוּשַׁי
  english_pob_choice: Hushai
  chosen_spanish: Husai
  alternatives_spanish:
  - Hushai
  lexicon: Transliteración estándar
  rationale: Se conserva el nombre propio en forma española habitual, sin añadir adaptación interpretativa.
- source_word: אֶל צָדוֹק וְאֶל אֶבְיָתָר הַכֹּהֲנִים
  english_pob_choice: to Zadok and to Abiathar the priests
  chosen_spanish: a Sadoc y a Abiatar, los sacerdotes
  alternatives_spanish:
  - a Sadoc y a Abiatar los sacerdotes
  - a Sadoc y a Abiatar, los sacerdotes
  lexicon: HALOT
  rationale: El hebreo presenta ambos nombres con preposición y luego un aposición colectiva; en español «los sacerdotes» funciona con claridad como aposición, manteniendo la relación sintáctica sin forzar un calco.
- source_word: כָּזֹאת וְכָזֹאת
  english_pob_choice: Thus and thus
  chosen_spanish: Así y así
  alternatives_spanish:
  - Tal y tal
  - Así y de tal manera
  lexicon: HALOT
  rationale: El modismo hebreo indica un resumen indefinido del contenido sin repetirlo. «Así y así» conserva el valor idiomático y la indefinición de manera transparente en español.
- source_word: יָעַץ
  english_pob_choice: advised
  chosen_spanish: aconsejó / he aconsejado
  alternatives_spanish:
  - dio consejo
  - aconsejaba
  lexicon: HALOT
  rationale: En este contexto político-estratégico, «aconsejar» refleja el acto de dar consejo. Se mantiene el paralelo verbal entre lo que aconsejó Ahitofel y lo que Hushai afirma haber aconsejado.
- source_word: אֶת אַבְשָׁלֹם וְאֵת זִקְנֵי יִשְׂרָאֵל
  english_pob_choice: Absalom and the elders of Israel
  chosen_spanish: a Absalón y a los ancianos de Israel
  alternatives_spanish:
  - Absalón y los ancianos de Israel
  - a Absalón y los ancianos de Israel
  lexicon: HALOT
  rationale: Aunque el objeto directo hebreo no exige preposición repetida en español, aquí se conserva «a» para marcar con claridad los destinatarios del consejo, como hace la sintaxis natural española.
- source_word: וְכָזֹאת וְכָזֹאת
  english_pob_choice: and thus and thus
  chosen_spanish: y así y así
  alternatives_spanish:
  - y tal y tal
  - y de esta manera y de esta otra
  lexicon: HALOT
  rationale: La repetición del modismo mantiene el contraste retórico entre el consejo de Ahitofel y el de Husai; se preserva la forma repetitiva sin explicarla en el texto principal.
- source_word: יָעַצְתִּי אָנִי
  english_pob_choice: I have advised
  chosen_spanish: he aconsejado yo
  alternatives_spanish:
  - yo he aconsejado
  - aconsejé yo
  lexicon: HALOT
  rationale: El pronombre independiente subraya el énfasis. En español, «he aconsejado yo» conserva el énfasis final y el valor de perfectividad inmediata del reporte.
translation_notes:
  revision_awareness: El inglés auditado pasó de una paráfrasis más explicativa («This and that is what») a una forma más idiomática y formal («Thus and thus»). En español se siguió esa revisión evitando una expansión explicativa, y se preservó el modismo hebreo con una equivalencia natural y breve.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda en el proyecto; aquí no aparece ninguno.
  - Se mantiene «aconsejar» para יָעַץ por el contexto de estrategia política, evitando «siervo»/«counsejo» no pertinentes.
  - «Ancianos de Israel» conserva la referencia institucional sin añadir títulos eclesiales ajenos al texto.
