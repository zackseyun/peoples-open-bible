translation:
  language: es
  text: Entonces el pueblo se abalanzó sobre el botín, y tomaron ovejas, ganado y terneros[a]; y los degollaron en el suelo[b], y el pueblo comió con la sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el pueblo se arrojó sobre el despojo».'
    reason: alternative_reading
  - marker: b
    text: Es decir, comieron la carne sin desangrarla debidamente.
    reason: theological_note
lexical_decisions:
- source_word: וַיַּעַשׂ ... אֶל שָׁלָל
  english_pob_choice: rushed upon the spoil
  chosen_spanish: se abalanzó sobre el botín
  alternatives_spanish:
  - se lanzó sobre el botín
  - se precipitó sobre el botín
  - cayó sobre el botín
  lexicon: HALOT
  rationale: La construcción expresa un movimiento agresivo e inmediato hacia el botín, no solo una dirección neutra. «Se abalanzó» comunica bien la violencia y la premura del contexto.
- source_word: שָׁלָל
  english_pob_choice: spoil
  chosen_spanish: botín
  alternatives_spanish:
  - despojo
  - plunder
  lexicon: HALOT
  rationale: «Botín» es natural en español bíblico y mantiene el sentido militar del término sin sonar artificial.
- source_word: צֹאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado menor
  - rebaño
  lexicon: HALOT
  rationale: En esta lista concreta de animales, «ovejas» es el equivalente más directo y comprensible.
- source_word: בָּקָר
  english_pob_choice: cattle
  chosen_spanish: ganado
  alternatives_spanish:
  - reses
  - bovinos
  - vacuno
  lexicon: HALOT
  rationale: «Ganado» funciona como categoría amplia y fluida en español. Aquí evita una repetición pesada y conserva el valor genérico del hebreo.
- source_word: בְּנֵי בָקָר
  english_pob_choice: calves
  chosen_spanish: terneros
  alternatives_spanish:
  - becerros
  - novillos jóvenes
  - crías de ganado
  lexicon: HALOT
  rationale: La expresión hebrea designa bovinos jóvenes; «terneros» es idiomático y claro en español moderno. No se opta por «becerros» por su tono más regional o tradicional.
- source_word: וַיִּשְׁחֲטוּ אָרְצָה
  english_pob_choice: they slaughtered them on the ground
  chosen_spanish: los degollaron en tierra
  alternatives_spanish:
  - los sacrificaron en tierra
  - los mataron sobre la tierra
  - los degollaron sobre el suelo
  lexicon: HALOT
  rationale: «Degollar» transmite el acto de matar por corte de garganta, más preciso que «matar» o «sacrificar»; «en tierra» refleja el adverbio אָרְצָה sin añadir explicaciones innecesarias.
- source_word: עַל־הַדָּם
  english_pob_choice: with the blood
  chosen_spanish: con la sangre
  alternatives_spanish:
  - mientras la sangre estaba aún en ellos
  - sin escurrir la sangre
  - con sangre
  lexicon: HALOT
  rationale: La frase hebrea es breve y el español puede conservar la tersura literal. «Con la sangre» deja visible la infracción alimentaria/ritual que el contexto exige, sin resolverla demasiado en el texto principal.
theological_decisions:
- issue: La infracción de comer la carne con la sangre
  english_pob_reading: with the blood
  chosen_spanish_reading: comió con la sangre
  alternative_spanish_readings:
  - comió la carne con la sangre todavía en ella
  - comió sin drenar la sangre
  - comió la carne con sangre
  rationale: 'El texto principal mantiene la tensión del hebreo y del POB inglés: una formulación breve que sugiere la violación sin explicarla por completo. La nota aclara que se trata de carne no desangrada, preservando el peso legal del pasaje.'
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador sigue la lectura auditada con acuerdo alto y sin ajustes sustantivos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto, pero este versículo no lo contiene.
  - Se conservó un registro bíblico claro y moderno, evitando una paráfrasis que suavizara la acusación implícita de comer la sangre.
  - «Botín» y «ovejas/ganado/terneros» respetan el listado concreto de animales sin tecnicismos innecesarios.
