revisions:
- from: 'Proclamen en Jerusalén la voz del que trae buenas nuevas: porque Dios ha mostrado misericordia a Israel en su visita[a][b][c].'
  to: 'Proclamen en Jerusalén la voz del que trae buenas nuevas: porque Dios ha mostrado misericordia a Israel en su visitación[a][b][c].'
  rationale: 'Se cambia «visita» por «visitación» para conservar mejor el sustantivo griego ἐπισκοπή y su resonancia de intervención misericordiosa divina, en línea con la auditoría inglesa. Se simplifican y precisan las notas: la nota a mantiene la alternativa documentada para φωνή/εὐαγγελιζομένου; la nota b preserva las alternativas léxicas del inglés; la nota c aclara la fuerza contextual sin introducir una formulación equívoca sobre quién visita a quién.'
