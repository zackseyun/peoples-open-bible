translation:
  language: es
  text: Porque, cuando ustedes regresen a Yahvé, sus hermanos y sus hijos[b] hallarán compasión[a] delante de sus captores, y volverán a esta tierra. Porque Yahvé, Dios de ustedes, es clemente y compasivo, y no apartará su rostro de ustedes[c], si ustedes regresan a él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «serán tratados con compasión» o «hallarán misericordia».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sus hermanos y sus hijos»; la redacción del texto fuente está en masculino.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «no ocultará su rostro de ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשׁוּבְכֶם עַל יְהוָה
  english_pob_choice: when you return to Yahweh
  chosen_spanish: cuando ustedes regresen a Yahvé
  alternatives_spanish:
  - cuando vuelvan a Yahvé
  - cuando se vuelvan a Yahvé
  lexicon: HALOT
  rationale: שׁוּב con preposición de dirección expresa volver/retornar en sentido de restauración de lealtad pactal. «Regresen» conserva el movimiento de retorno y suena natural en español; «vuelvan» es posible, pero aquí «regresen» marca mejor la idea de volver al Señor.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue la convención POB de transliterar el nombre divino y no sustituirlo por un título. «Yahvé» es la forma española más extendida y readable dentro de esta política.
- source_word: אֲחֵיכֶם וּבְנֵיכֶם
  english_pob_choice: your brothers and your sons
  chosen_spanish: sus hermanos y sus hijos
  alternatives_spanish:
  - sus hermanos y sus hijos varones
  - sus hermanos y sus niños
  lexicon: HALOT
  rationale: El hebreo es masculino, pero en español «hijos» puede funcionar como término filial general en este contexto narrativo. Se evita neutralizar excesivamente con «hijos e hijas» o «niños», porque el texto conserva la forma masculina y el contexto de familias deportadas.
- source_word: לְרַחֲמִים לִפְנֵי שׁוֹבֵיהֶם
  english_pob_choice: will find compassion before their captors
  chosen_spanish: hallarán compasión delante de sus captores
  alternatives_spanish:
  - serán objeto de compasión ante sus captores
  - recibirán compasión en presencia de sus captores
  lexicon: HALOT
  rationale: La construcción expresa convertirse en objeto de compasión a la vista de quienes los tienen cautivos. «Delante de» conserva la relación espacial/relacional de לִפְנֵי, mientras que «hallarán compasión» sigue la línea idiomática de la POB inglesa.
- source_word: שׁוֹבֵיהֶם
  english_pob_choice: their captors
  chosen_spanish: sus captores
  alternatives_spanish:
  - los que los cautivaron
  - sus carceleros
  lexicon: HALOT
  rationale: El participio de שבה refiere a quienes los llevaron cautivos. «Captores» es preciso, breve y evita una expansión interpretativa.
- source_word: וְלָשׁוּב לָאָרֶץ הַזֹּאת
  english_pob_choice: and return to this land
  chosen_spanish: y volverán a esta tierra
  alternatives_spanish:
  - y regresarán a esta tierra
  - para volver a esta tierra
  lexicon: HALOT
  rationale: 'Se conserva el paralelo verbal con שׁוּב mediante «volverán», que en español reproduce bien la repetición del motivo de retorno. El contexto permite entender el resultado: volver a la tierra.'
- source_word: חַנּוּן וְרַחוּם
  english_pob_choice: gracious and compassionate
  chosen_spanish: benigno y compasivo
  alternatives_spanish:
  - gracioso y compasivo
  - clemente y compasivo
  lexicon: HALOT
  rationale: «Compasivo» traduce bien רַחוּם. Para חַנּוּן, «benigno» evita la posible ambigüedad de «gracioso» y comunica la idea de benevolencia favorable; mantiene un registro dignificado sin sobreexplicar.
- source_word: לֹא יָסִיר פָּנִים מִכֶּם
  english_pob_choice: he will not turn his face away from you
  chosen_spanish: no apartará de ustedes su rostro
  alternatives_spanish:
  - no ocultará de ustedes su rostro
  - no retirará de ustedes su rostro
  lexicon: HALOT
  rationale: El hebreo usa el modismo de retirar/apartar el rostro. «Apartará de ustedes su rostro» preserva la imagen relacional sin sonar forzado, y permite sostener la alternativa inglesa «turn his face away».
- source_word: אִם תָּשׁוּבוּ אֵלָיו
  english_pob_choice: if you return to him
  chosen_spanish: si ustedes regresan a él
  alternatives_spanish:
  - si vuelven a él
  - si se vuelven a él
  lexicon: HALOT
  rationale: Se mantiene la repetición de שׁוּב con «regresan», reforzando la coherencia léxica del verso y el llamado a restauración.
theological_decisions:
- issue: Lenguaje de retorno / arrepentimiento en שׁוּב
  english_pob_reading: return to Yahweh / return to him
  chosen_spanish_reading: regresen a Yahvé / regresan a él
  alternative_spanish_readings:
  - vuelvan a Yahvé / vuelven a él
  - se conviertan a Yahvé
  rationale: El verso insiste en el mismo lexema hebreo para expresar vuelta relacional y pactal. «Regresar» conserva mejor esa repetición y evita imponer una formulación doctrinal más técnica que el texto no exige.
  doctrine_reference: Translation philosophy §§3, 5
- issue: Terminos de parentesco masculinos
  english_pob_reading: your brothers and your sons
  chosen_spanish_reading: sus hermanos y sus hijos
  alternative_spanish_readings:
  - sus hermanos y sus hijos varones
  - sus hermanos y sus descendientes
  rationale: Se conserva el masculino del hebreo sin volverlo artificialmente exclusivo. En español «hijos» puede abarcar la descendencia masculina y, en el contexto, refiere naturalmente a los hijos llevados al cautiverio con sus familias.
  doctrine_reference: Translation philosophy §4
- issue: Atributos divinos חַנּוּן וְרַחוּם
  english_pob_reading: gracious and compassionate
  chosen_spanish_reading: benigno y compasivo
  alternative_spanish_readings:
  - gracioso y compasivo
  - clemente y compasivo
  rationale: Se preserva el par de atributos como cualidades divinas de benevolencia y misericordia. «Benigno» comunica favor activo sin vaciar el matiz de gracia; «compasivo» mantiene el componente de misericordia afectiva.
  doctrine_reference: Translation philosophy §§3, 6
- issue: Imagen del rostro de Dios
  english_pob_reading: he will not turn his face away from you
  chosen_spanish_reading: no apartará de ustedes su rostro
  alternative_spanish_readings:
  - no ocultará de ustedes su rostro
  - no les dará la espalda
  rationale: Se conserva la metáfora bíblica del rostro como signo de presencia y favor. «Apartar el rostro» mantiene el peso relacional y no reduce la frase a mera emoción.
  doctrine_reference: Translation philosophy §§3, 6
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el cierre de la auditoría inglesa. Se conserva la repetición de שׁוּב con dos ocurrencias de «regresar», se traduce יְהוָה como «Yahvé» según la política POB, y se mantiene la imagen de los captores y del rostro divino sin suavizarla. No hubo cambios aplicados en la última pasada revisada, y el acuerdo de revisión fue alto.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el Tetragrámaton.
  - Se conserva la repetición léxica de «regresar» para שׁוּב en ambas cláusulas.
  - «Compasión» y «compasivo» se mantienen para reflejar la pareja semántica de רחם.
  - El marcador de nota [a] se vincula al giro idiomático de לְרַחֲמִים; el marcador [c] se vincula a la imagen de ocultar/apartar el rostro.
