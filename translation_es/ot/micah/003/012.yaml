review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo y la línea de la POB inglesa: conserva el nexo de juicio (''Por tanto''), la imputación directa (''por causa de ustedes''), la imagen agrícola (''será arada como un campo''), la transformación de Jerusalén en ruinas y la literalidad de ''el monte de la casa''. También mantiene adecuadamente la interpretación contextual de לְבָמוֹת יָעַר como una imagen topográfica de desolación y sobrecrecimiento, no necesariamente cultual. Sin embargo, hay desajustes en las notas: la nota [a] está anclada en ''Por tanto'' pero su contenido corresponde a ''el monte de la casa''; y la nota [b] está anclada en ''ruinas'' pero su contenido corresponde a ''alturas boscosas''.'
  spanish_quality_summary: El español es claro y digno, pero 'será convertido en alturas boscosas' suena algo forzado. 'Se convertirá en alturas boscosas' fluye mejor y corresponde a la misma opción usada antes con Jerusalén. El resto del texto es natural y fiel. También conviene ajustar la nota alternativa 'el monte del santuario', ya que el inglés documenta 'the temple mount' o 'the mountain of the temple'; 'del templo' es más exacto que 'del santuario'.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Sion', 'Jerusalén' y 'la casa' están bien manejados. La decisión contextual de traducir לְבָמוֹת יָעַר como 'alturas boscosas' es defendible y coherente con la racionalidad auditada. La revisión necesaria es de anclaje de notas y una mejora menor de estilo/sintaxis.
  issues:
  - severity: high
    issue: Las notas al pie están ancladas en palabras equivocadas.
    rationale: La nota [a] explica 'el monte de la casa', pero está colocada en 'Por tanto'. La nota [b] explica la frase final sobre 'alturas... bosque', pero está colocada en 'ruinas'. Esto rompe la trazabilidad exigida entre texto y nota.
  - severity: medium
    issue: La frase 'será convertido en alturas boscosas' es poco natural en español.
    rationale: Aunque comprensible, esta construcción pasiva resulta tosca. 'Se convertirá en alturas boscosas' preserva mejor la idea de transformación de תִּהְיֶה y suena más idiomático.
  - severity: low
    issue: La alternativa de la nota 'el monte del santuario' se aparta de la documentación inglesa.
    rationale: La POB inglesa documenta como alternativas 'the temple mount' y 'the mountain of the temple'. En español, 'el monte del templo' o 'el monte del templo/la montaña del templo' reflejan mejor esa base que 'santuario'.
  revised_spanish_text: Por tanto, por causa de ustedes, Sion será arada como un campo, y Jerusalén se convertirá en ruinas, y el monte de la casa[a] se convertirá en alturas boscosas[b].
  revised_footnotes:
  - marker: a
    text: 'O ''el monte del templo'' o ''la montaña del templo''. Hebreo: ''el monte de la casa''.'
    reason: lexical_alternative
  - marker: b
    text: O 'alturas de bosque' / 'alturas del bosque'. El hebreo probablemente describe el monte del templo volviéndose agreste y cubierto de vegetación.
    reason: lexical_alternative
  revision_rationale: Se corrigen los anclajes de las notas para que correspondan exactamente a las expresiones que explican, se mejora la naturalidad de la última cláusula con 'se convertirá', y se ajusta la nota alternativa para alinearla mejor con la documentación léxica de la POB inglesa.
