translation:
  language: es
  text: 'Pero yo recordaré en favor de ellos el pacto con los antepasados[a], a quienes saqué de la tierra de Egipto, a la vista de las naciones, para ser su Dios: yo soy Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el pacto con las generaciones anteriores». El hebreo dice literalmente «el pacto [con] los primeros/anteriores», y se refiere a la generación anterior del pacto o a los antepasados.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָכַרְתִּי
  english_pob_choice: But I will remember
  chosen_spanish: Pero yo me acordaré
  alternatives_spanish:
  - Y me acordaré
  - Pero recordaré
  lexicon: HALOT
  rationale: El hebreo introduce un giro contrastivo; «Pero» comunica bien ese cambio de tono. «Me acordaré» conserva el verbo de memoria relacional sin endurecer el español.
- source_word: לָהֶם
  english_pob_choice: for them
  chosen_spanish: de ellos
  alternatives_spanish:
  - para ellos
  - en favor de ellos
  lexicon: HALOT
  rationale: En español, con «acordarse de» el complemento natural es «de ellos». Así se preserva el sentido de referencia benéfica sin forzar una construcción menos idiomática.
- source_word: בְּרִית
  english_pob_choice: the covenant
  chosen_spanish: del pacto
  alternatives_spanish:
  - de la alianza
  - del convenio
  lexicon: HALOT
  rationale: «Pacto» mantiene el peso bíblico-jurídico del término en un registro claro y ampliamente entendido. «Alianza» sería posible, pero aquí «pacto» suele comunicar mejor la fórmula de relación establecida por Dios.
- source_word: רִאשֹׁנִים
  english_pob_choice: the former generations
  chosen_spanish: las generaciones anteriores
  alternatives_spanish:
  - los antiguos
  - los antepasados
  - las generaciones previas
  lexicon: HALOT
  rationale: El hebreo usa un plural adjetival masculino que alude a la generación anterior o a los antepasados. En español, «las generaciones anteriores» sigue de cerca el sentido temporal sin introducir un masculino específico que el texto revisado evitó.
- source_word: הוֹצֵאתִי אֹתָם
  english_pob_choice: whom I brought out
  chosen_spanish: a quienes saqué
  alternatives_spanish:
  - que saqué
  - a quienes hice salir
  lexicon: HALOT
  rationale: «Saqué» refleja con naturalidad el verbo de éxodo; «a quienes» mantiene la referencia personal y el movimiento de salida sin calcar la sintaxis hebrea.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - desde la tierra de Egipto
  lexicon: HALOT
  rationale: «Tierra de Egipto» conserva la formulación tradicional y formal del pacto, equivalente al hebreo sin perder claridad.
- source_word: לְעֵינֵי הַגּוֹיִם
  english_pob_choice: in the sight of the nations
  chosen_spanish: a la vista de las naciones
  alternatives_spanish:
  - delante de las naciones
  - ante los ojos de las naciones
  lexicon: HALOT
  rationale: «A la vista de» reproduce la imagen pública y testimonial del éxodo. «Naciones» es preferible a «gentiles» en este contexto de Torá.
- source_word: לִהְיוֹת לָהֶם לֵאלֹהִים
  english_pob_choice: to be their God
  chosen_spanish: para ser su Dios
  alternatives_spanish:
  - para serles Dios
  - para ser Dios de ellos
  lexicon: HALOT
  rationale: La fórmula de pacto es mejor en español como «ser su Dios». Mantiene la relación convenida entre Yahvé e Israel sin añadir explicaciones.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración, siguiendo el criterio del proyecto para יהוה y evitando la sustitución por un título.
theological_decisions:
- issue: Relación de «el pacto con las generaciones anteriores»
  english_pob_reading: Refers to the covenant made with Israel's forefathers/ancestors, specifically the exodus generation or ancestral covenant line remembered on behalf of the present people.
  chosen_spanish_reading: «el pacto con las generaciones anteriores» entiende que el pasaje remite al vínculo pactual histórico con la generación previa de Israel, sin cerrar la referencia de manera más específica que el hebreo.
  alternative_spanish_readings:
  - el pacto con los antepasados
  - el pacto con los primeros
  rationale: El hebreo es comprimido y el relativo siguiente apunta a personas sacadas de Egipto. La redacción española conserva esa referencia histórica sin resolver indebidamente la tensión del texto.
  doctrine_reference: Preservar la ambigüedad documentada cuando el original no la resuelve plenamente.
- issue: Valor de rִאשֹׁנִים en español
  english_pob_reading: The phrase refers to earlier generations/ancestors; English revised away from a male-specific term.
  chosen_spanish_reading: «las generaciones anteriores»
  alternative_spanish_readings:
  - los antepasados
  - los primeros
  rationale: La forma española evita introducir un masculino específico que no es necesario para el sentido y refleja bien el matiz temporal de «anteriores».
  doctrine_reference: Gender-accurate over gender-neutral, but without unnecessarily gendering an expression where Spanish can remain closer to the source.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés al preferir una expresión no masculina para רִאשֹׁנִים («las generaciones anteriores») y mantener el resto de la cláusula en el marco histórico-pactual del éxodo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, conforme al criterio del proyecto.
  - Se usa «pacto» para בְּרִית por su fuerza bíblico-jurídica y su uso consistente en el corpus.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - «Naciones» conserva el sentido de הַגּוֹיִם sin introducir un término eclesiástico ajeno al contexto.
  - La estructura con dos puntos antes de «yo soy Yahvé» reproduce la clausura enfática del hebreo.
