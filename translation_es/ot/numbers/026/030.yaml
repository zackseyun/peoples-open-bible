    issue: Uso de 'Gilead' en lugar de 'Galaad'
    rationale: Aunque el hebreo subyacente es גִלְעָד y el inglés usa 'Gilead', en español bíblico la forma natural y ampliamente reconocida es 'Galaad'. Mantener 'Gilead' hace que el texto suene traducido del inglés y reduce la legibilidad eclesial sin aportar mayor fidelidad al hebreo.
  revised_spanish_text: 'Estos fueron los hijos de Galaad: de Iezer[a], el clan de los iezeritas; de Helek, el clan de los helekitas.'
