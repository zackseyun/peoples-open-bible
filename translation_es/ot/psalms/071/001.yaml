review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura del hebreo: «En ti» para בך, «Yahvé» para יְהוָה, el matiz de refugio de חָסִיתִי y «jamás» para לְעוֹלָם con negación. Sin embargo, «no me pongas en vergüenza» no representa de manera natural ni precisa el valor de אַל אֵבֹשָׁה, que en contexto de salmo de confianza pide no ser avergonzado/quedar en vergüenza, no que Dios activamente lo ponga en vergüenza.'
  spanish_quality_summary: El español es en general claro, pero «me he refugiado» suena menos idiomático que «he buscado refugio» o «me refugio» en registro bíblico. El problema principal es la frase «poner en vergüenza», poco natural en español general y eclesial. «No sea yo avergonzado jamás» sería fiel pero más tieso; «que nunca quede avergonzado» es más natural, aunque algo más libre. Una solución equilibrada y digna es «que jamás sea avergonzado».
  glossary_alignment: El uso de «Yahvé» está alineado con la política del proyecto. No hay conflicto relevante con otros términos del glosario. La nota al pie no debe presentar «Yahvé» como lectura alternativa cuando el texto principal también lo usa; conviene reformularla para explicar la política de traducción del nombre divino sin implicar variante.
  issues:
  - severity: medium
    issue: «no me pongas en vergüenza» atribuye causalidad directa a Dios y suena antinatural
    rationale: El hebreo אַל אֵבֹשָׁה expresa una petición negativa de no ser avergonzado/quedar en vergüenza. La construcción española propuesta no es idiomática y desplaza el foco semántico.
  - severity: low
    issue: «me he refugiado» es aceptable pero menos natural que otras opciones
    rationale: Aunque refleja el perfecto con relevancia presente, en español bíblico fluido «he buscado refugio» suele sonar más natural y conserva mejor la imagen.
  - severity: low
    issue: La nota al pie está formulada como si «Yahvé» fuera lectura alternativa
    rationale: Dado que el texto principal ya usa «Yahvé», la nota debe explicar la política del proyecto o, si se conserva por trazabilidad al inglés, evitar sugerir una alternativa inexistente.
  revised_spanish_text: En ti, Yahvé[a], he buscado refugio; que jamás sea avergonzado.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé». El texto principal sigue la norma del proyecto de traducir el nombre divino como «Yahvé».'
