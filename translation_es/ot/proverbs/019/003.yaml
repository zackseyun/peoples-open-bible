translation:
  language: es
  text: La necedad del hombre[a] tuerce su camino[b], y su corazón se enfurece contra Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: la forma singular funciona de manera genérica, refiriéndose a una persona en general.'
    reason: cultural_note
  - marker: b
    text: 'O: «pervierte su camino» o «hace tortuoso su sendero».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִוֶּלֶת
  english_pob_choice: folly
  chosen_spanish: necedad
  alternatives_spanish:
  - insensatez
  - tontería
  lexicon: HALOT
  rationale: El hebreo nombra la cualidad de ser necio. En español, "necedad" conserva el tono sapiencial y la fuerza moral del término sin sonar tan abstracto como "insensatez" ni tan coloquial como "tontería".
- source_word: אָדָם
  english_pob_choice: a man's
  chosen_spanish: del hombre
  alternatives_spanish:
  - de una persona
  - de la humanidad
  lexicon: HALOT
  rationale: El sustantivo singular funciona de modo genérico. "Del hombre" mantiene el singular proverbial y el matiz representativo del hebreo, en lugar de despersonalizarlo con una formulación demasiado abstracta.
- source_word: תְּסַלֵּף
  english_pob_choice: ruins
  chosen_spanish: tuerce
  alternatives_spanish:
  - pervierte
  - hace torcido
  - arruina
  lexicon: HALOT
  rationale: El piel de סלף comunica torcer, deformar o volver torcido el camino. "Tuerce" reproduce mejor la imagen verbal del hebreo; la consecuencia de ruina queda implícita en el proverbio, como también en la alternativa inglesa documentada.
- source_word: דַּרְכּוֹ
  english_pob_choice: his way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su andar
  lexicon: HALOT
  rationale: '"Camino" es la metáfora sapiencial normal para la conducta o curso de vida. Conserva la resonancia intertextual de Proverbios y es natural en español.'
- source_word: וְעַל
  english_pob_choice: and ... against
  chosen_spanish: y ... contra
  alternatives_spanish:
  - pero ... contra
  - y ... frente a
  lexicon: HALOT
  rationale: La preposición con על introduce el objeto de la indignación. "Contra" expresa con claridad la orientación hostil de la reacción del corazón, manteniendo la coordinación del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término estándar del proyecto para el nombre divino. "Yahvé" preserva el Tetragrámaton sin reemplazarlo por una convención eclesiástica de ocultamiento.
- source_word: יִזְעַף
  english_pob_choice: rages
  chosen_spanish: se enfurece
  alternatives_spanish:
  - se irrita
  - estalla en ira
  - se ensaña
  lexicon: HALOT
  rationale: El verbo expresa enojo fuerte o indignación. "Se enfurece" comunica la intensidad de la reacción y funciona bien con el sujeto "su corazón" en español.
- source_word: לִבּוֹ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  lexicon: HALOT
  rationale: '"Corazón" conserva el antropologismo hebreo como sede de pensamiento y emoción. Evita reducir el término a un simple pronombre o a una sola facultad mental.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El verso contiene el nombre propio del pacto. Traducirlo como "Yahvé" sigue la norma del proyecto y evita el sustituto litúrgico "SEÑOR", manteniendo visible el Tetragrámaton en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor genérico de אָדָם
  english_pob_reading: a man's
  chosen_spanish_reading: del hombre
  alternative_spanish_readings:
  - de una persona
  - de la humanidad
  rationale: Aunque la forma es masculina singular, su valor es proverbial y genérico. "Del hombre" conserva esa forma sin perder la referencia a un individuo representativo, en línea con la lectura auditada en inglés.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio; se mantiene la equivalencia óptima con el texto hebreo y la auditoría inglesa, ajustando solo la formulación natural en español.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para el nombre divino, conforme al estándar del proyecto.
  - '"Camino" conserva la metáfora sapiencial habitual de Proverbios.'
  - '"Corazón" se usa en sentido antropológico hebreo, no solo emocional.'
  - Las notas a y b corresponden a las alternativas ya documentadas en la auditoría inglesa y se anclan en el texto donde corresponde.
