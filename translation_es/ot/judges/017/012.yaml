translation:
  language: es
  text: Así que Miqueas ordenó al levita[a], y el joven llegó a ser su sacerdote y estuvo en la casa de Miqueas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «llenó la mano del levita», un modismo para instalar o ordenar a alguien al servicio sacerdotal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַלֵּא אֶת־יַד
  english_pob_choice: ordained
  chosen_spanish: ordenó
  alternatives_spanish:
  - lo instaló
  - lo consagró
  - le llenó la mano
  lexicon: HALOT, BDB
  rationale: La expresión hebrea literal, «llenar la mano», es un modismo técnico de instalación/nombramiento para servicio sacerdotal. En español, «ordenó» comunica bien esa función de instituir en el cargo sin volver opaca la frase. Se conserva el sentido funcional, y el modismo literal queda reflejado en una nota.
- source_word: הַלֵּוִי
  english_pob_choice: the Levite
  chosen_spanish: el levita
  alternatives_spanish:
  - el levita hombre
  - el de la tribu de Leví
  lexicon: HALOT, BDB
  rationale: El sustantivo identifica al hombre por su pertenencia levítica. «El levita» es natural en español y mantiene la referencia narrativa directa.
- source_word: הַנַּעַר
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el muchacho joven
  - el muchacho/siervo
  lexicon: HALOT, BDB
  rationale: נַעַר puede significar niño, muchacho, joven o sirviente. Aquí el contexto muestra a una persona que ejerce una función cultual, por lo que «el joven» es la opción más adecuada y menos infantilizante.
- source_word: לְכֹהֵן
  english_pob_choice: as priest
  chosen_spanish: como sacerdote
  alternatives_spanish:
  - para sacerdote
  - a sacerdote
  lexicon: HALOT, BDB
  rationale: La preposición לְ marca función o cargo. En español, «como sacerdote» expresa de manera clara y directa el rol asumido por el joven.
- source_word: וַיְהִי לוֹ
  english_pob_choice: became his
  chosen_spanish: llegó a ser su
  alternatives_spanish:
  - fue su
  - pasó a ser su
  lexicon: HALOT, BDB
  rationale: 'La construcción indica un cambio de estado o de función: el joven pasó a ocupar el puesto de sacerdote para Miqueas. «Llegó a ser su» conserva ese matiz de transición.'
- source_word: בְּבֵית מִיכָה
  english_pob_choice: in Micah’s house
  chosen_spanish: en la casa de Miqueas
  alternatives_spanish:
  - en el hogar de Miqueas
  - en la casa-hogar de Miqueas
  lexicon: HALOT, BDB
  rationale: La frase es locativa y doméstica. «En la casa de Miqueas» es la traducción más natural y suficientemente literal en español.
theological_decisions:
- issue: Instalación sacerdotal privada sin legitimar el arreglo
  english_pob_reading: So Micah ordained the Levite
  chosen_spanish_reading: Así que Miqueas ordenó al levita
  alternative_spanish_readings:
  - Así que Miqueas consagró al levita
  - Así que Miqueas le llenó la mano al levita
  rationale: El texto describe la instalación del levita en una función sacerdotal, pero no implica aprobación divina. «Ordenó» comunica la acción de investidura sin añadir legitimidad al arreglo narrado. La nota conserva el modismo hebreo para transparencia.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y mantiene la decisión auditable del POB en torno al modismo וַיְמַלֵּא אֶת־יַד como «ordenó», con nota que conserva la literalidad. No se reportan revisiones posteriores en el paquete fuente, y el pass más reciente indica sin cambios.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando aparece el nombre divino; en este versículo no aparece.
  - «Levita» y «sacerdote» se mantienen como términos técnicos consistentes con el resto del proyecto.
  - Se evita «siervo» para נַעַר porque el contexto aquí favorece edad/función juvenil más que esclavitud o servicio doméstico.
  - «En la casa de Miqueas» conserva la localización doméstica sin sobreinterpretar «casa» como linaje o familia.
