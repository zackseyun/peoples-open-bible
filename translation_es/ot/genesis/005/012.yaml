- from: Kenán vivió setenta años y engendró a Mahalalel.
  to: Kenan vivió setenta años y fue padre de Mahalalel.[a]
  rationale: Se ajusta el texto principal a una formulación más natural en español («fue padre de»), se conserva la alternativa formal «engendró» en nota para reflejar el rastro léxico del POB inglés, y se alinea el nombre «Kenan» con la transliteración hebrea directa documentada.
