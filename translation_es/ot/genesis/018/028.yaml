translation:
  language: es
  text: 'Supongamos que faltan cinco de los cincuenta justos[a]—¿destruirás toda la ciudad por cinco?[b] Y él dijo: «No la destruiré si encuentro allí cuarenta y cinco»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Y si faltan cinco de los cincuenta justos?»
    reason: lexical_alternative
  - marker: b
    text: O «¿arrasarás toda la ciudad a causa de cinco?»
    reason: lexical_alternative
lexical_decisions:
- source_word: א֠וּלַי
  english_pob_choice: Suppose
  chosen_spanish: Supongamos que
  alternatives_spanish:
  - Tal vez
  - Quizá
  - ¿Y si...?
  lexicon: HALOT
  rationale: Introduce la hipótesis de Abraham con naturalidad en español. «Supongamos que» conserva el valor proposicional y dialogal mejor que una mera partícula de duda.
- source_word: יַחְסְר֞וּ/ן
  english_pob_choice: are lacking
  chosen_spanish: faltan
  alternatives_spanish:
  - están faltando
  - carecen de
  - son menos
  lexicon: HALOT
  rationale: «Faltar» expresa bien la idea de carencia numérica sin añadir interpretación. En español suena más natural que un giro más literal como «son faltantes».
- source_word: חֲמִשִּׁ֤ים הַ/צַּדִּיקִם֙
  english_pob_choice: the fifty righteous
  chosen_spanish: los cincuenta justos
  alternatives_spanish:
  - los cincuenta rectos
  - los cincuenta justos y rectos
  lexicon: HALOT
  rationale: '«Justos» mantiene la fuerza moral y judicial de צַדִּיקִים. Se conserva el grupo definido y contado: no se trata de justos en general, sino de ese conjunto de cincuenta.'
- source_word: חֲמִשָּׁ֔ה
  english_pob_choice: five
  chosen_spanish: cinco
  alternatives_spanish:
  - cinco personas
  lexicon: HALOT
  rationale: Número cardinal simple, repetido para reproducir la insistencia retórica del hebreo.
- source_word: הֲ/תַשְׁחִ֥ית
  english_pob_choice: will you destroy
  chosen_spanish: destruirás
  alternatives_spanish:
  - arruinarás
  - aniquilarás
  lexicon: HALOT
  rationale: «Destruir» reproduce el verbo de modo directo y permite la repetición verbal con la respuesta divina. El sujeto interrogativo de cortesía implícita en español se expresa naturalmente con la forma verbal.
- source_word: בַּ/חֲמִשָּׁ֖ה
  english_pob_choice: for five
  chosen_spanish: por cinco
  alternatives_spanish:
  - a causa de cinco
  - por causa de cinco
  - debido a cinco
  lexicon: HALOT
  rationale: El valor causal del prefijo בַּ se comunica de manera concisa con «por», manteniendo el tono retórico de la pregunta.
- source_word: אֶת כָּל הָ/עִ֑יר
  english_pob_choice: the whole city
  chosen_spanish: toda la ciudad
  alternatives_spanish:
  - la ciudad entera
  - la ciudad completa
  lexicon: HALOT
  rationale: «Toda la ciudad» expresa el alcance total del objeto afectado y suena más natural que un calco más pesado.
- source_word: לֹ֣א אַשְׁחִ֔ית
  english_pob_choice: I will not destroy it
  chosen_spanish: No la destruiré
  alternatives_spanish:
  - No destruiré la ciudad
  - No la arruinaré
  lexicon: HALOT
  rationale: Se repite el mismo verbo en español para conservar la correspondencia con «destruirás / destruiré». El pronombre «la» retoma claramente «la ciudad».
- source_word: אִם אֶמְצָ֣א שָׁ֔ם
  english_pob_choice: if I find there
  chosen_spanish: si encuentro allí
  alternatives_spanish:
  - si hallo allí
  - si allí encuentro
  lexicon: HALOT
  rationale: «Encontrar allí» mantiene la condición y el deíctico espacial sin sonar forzado. «Allí» reproduce bien שָׁם.
- source_word: אַרְבָּעִ֖ים וַ/חֲמִשָּֽׁה
  english_pob_choice: forty-five
  chosen_spanish: cuarenta y cinco
  alternatives_spanish:
  - cuarenta y cinco en total
  lexicon: HALOT
  rationale: El número compuesto se expresa de forma idiomática en español, manteniendo la suma exacta del hebreo.
theological_decisions:
- issue: Rendering of צַדִּיקִים in an intercessory judgment context
  english_pob_reading: righteous
  chosen_spanish_reading: justos
  alternative_spanish_readings:
  - rectos
  - justos y rectos
  rationale: «Justos» conserva la carga ética y judicial del término sin reducirlo a una categoría meramente forense. En esta escena de intercesión, el matiz moral es central.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
- issue: Cause/ground implied by בַּחֲמִשָּׁה
  english_pob_reading: for five / because of five
  chosen_spanish_reading: por cinco
  alternative_spanish_readings:
  - a causa de cinco
  - debido a cinco
  rationale: El hebreo permite entender un motivo o causa de destrucción. «Por cinco» conserva esa relación sin sobreexplicarla.
  doctrine_reference: Translation philosophy §3 (retain documented lexical/theological tension)
- issue: Maintaining the repetition of the destruction verb
  english_pob_reading: destroy / destroy
  chosen_spanish_reading: destruir / destruir
  alternative_spanish_readings:
  - arruinar / arruinar
  rationale: La repetición del mismo verbo preserva el paralelismo entre la pregunta y la respuesta divina, importante para la respuesta formal al ruego de Abraham.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la relación sintáctica del inglés («five of the fifty righteous are lacking»), y por eso el español presenta a «los cincuenta justos» como el grupo del que faltan cinco, no como si cinco fueran el sujeto principal. También se conservó la repetición verbal y la relación causal implícita en «por cinco».
  spanish_consistency_notes:
  - Se usó «justos» para צַדִּיקִים, conforme al valor moral-jurídico del término.
  - Se usó «destruir» de manera consistente para תַשְׁחִית / אַשְׁחִית.
  - Se prefirió «por cinco» para reflejar el matiz causal de בַּ.
  - Se evitó «SEÑOR» y no aparece el Tetragrámaton en este versículo.
