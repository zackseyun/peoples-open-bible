    text: O «esposa»; el hebreo אִשָּׁה puede significar «mujer» o «esposa» según el contexto.
    reason: alternative_reading
  - marker: c
    text: O «se alabará a sí misma» si se toma de manera reflexiva, aunque el contexto favorece claramente «será alabada».
    reason: alternative_reading
  revision_rationale: Se corrigen los anclajes de notas para que correspondan al término fuente pertinente, se ajusta הַחֵן a «encanto» para seguir mejor la decisión auditada y evitar ambigüedad con «gracia», y se cambia «vana» por «pasajera» para reflejar la elección principal de הֶבֶל como transitoriedad, dejando la imagen más literal «vapor» en nota.
