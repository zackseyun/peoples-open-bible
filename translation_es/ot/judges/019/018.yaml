  glossary_alignment: Se alinea bien con la terminología del proyecto en «Yahvé». No hay conflicto con otros términos glosario. La principal desalineación es con la decisión teológica/léxica auditada para אִישׁ, donde el borrador usa «nadie» en vez de una forma que preserve «ningún hombre» / «no hay hombre».
