review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: cláusula nominal, «sabiduría», «con una herencia», y el modismo literal «los que ven el sol». También conserva correctamente la alternativa de lectura comparativa en nota. Sin embargo, la colocación de las notas no sigue fielmente el rastro POB inglés: la nota cultural debe anclarse a «el sol / los que ven el sol», no a «herencia», mientras que la nota de alternativa léxica/comparativa debe anclarse al segmento de «herencia» o la construcción completa, no invertirse.'
  spanish_quality_summary: El español es natural, claro y digno. «La sabiduría es buena con una herencia» suena aceptable, aunque algo rígido; no requiere cambio. Las notas están bien redactadas en español general e inteligible. La única reparación necesaria es la correspondencia exacta entre marcadores y su contenido.
  glossary_alignment: No hay términos del glosario mayor en juego. «Sabiduría», «herencia», «ventaja» y «el sol» concuerdan con las decisiones documentadas. Se preserva adecuadamente el modismo de Qohelet sin parafrasearlo en el texto principal.
  issues:
  - severity: medium
    issue: Los marcadores de notas están invertidos respecto al contenido y al anclaje lógico.
    rationale: En la POB inglesa, [a] explica la alternativa de «con una herencia / tan buena como una herencia», y [b] explica el modismo «los que ven el sol». En el borrador español, [a] quedó en «herencia» pero [a] contiene la alternativa, mientras [b] quedó en «el sol» y contiene el modismo; sin embargo el texto mostrado pone [a] tras «herencia» y [b] tras «sol», pero el orden de marcadores debe ser único y secuencial según aparición. Para mantener el anclaje correcto y la disciplina de marcadores, conviene renumerarlos de modo que el primer anclaje visible en el texto corresponda a la nota de alternativa y el segundo al modismo.
  revised_spanish_text: La sabiduría es buena con una herencia[a], y una ventaja para los que ven el sol[b].
  revised_footnotes:
  - marker: a
    text: 'O: «La sabiduría es tan buena como una herencia». La construcción hebrea puede comparar la sabiduría con la herencia, o bien afirmar la sabiduría junto con la herencia.'
    reason: alternative_reading
  - marker: b
    text: «Los que ven el sol» es un modismo para los vivos, los que están con vida en este mundo.
    reason: cultural_note
  revision_rationale: 'El texto principal puede mantenerse. La revisión asegura que los marcadores y sus notas queden alineados explícitamente con el segmento correspondiente y con la lógica del expediente POB: alternativa de construcción en «herencia» y nota cultural en «ven el sol».'
