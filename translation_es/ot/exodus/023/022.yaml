translation:
  language: es
  text: Pero si obedeces diligentemente[a] su voz y haces todo lo que yo digo[b], entonces yo seré enemigo de tus enemigos y adversario de tus adversarios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si de veras escuchas su voz». El hebreo usa un infinitivo absoluto con el verbo finito para intensificar la acción.'
    reason: lexical_alternative
  - marker: b
    text: El texto pasa de «su voz» a «yo digo», conservando la estrecha vinculación entre el mensajero y Yahvé en el contexto.
    reason: cross_reference
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Mas si
  - Y si
  lexicon: HALOT
  rationale: La combinación introduce una condición con contraste respecto al contexto previo; “Pero si” conserva ese giro adversativo-condicional de manera natural en español.
- source_word: שָׁמֹעַ תִּשְׁמַע
  english_pob_choice: you carefully obey
  chosen_spanish: escuchas atentamente
  alternatives_spanish:
  - obedeces cuidadosamente
  - ciertamente escuchas
  - escuchas y obedeces
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la acción. En español, “escuchas atentamente” comunica la atención reforzada sin sonar rígido; el contexto de “su voz” permite el matiz de obediencia implícita.
- source_word: בְּקֹלוֹ
  english_pob_choice: his voice
  chosen_spanish: su voz
  alternatives_spanish:
  - a su voz
  - la voz de él
  lexicon: HALOT
  rationale: Se conserva la expresión idiomática y la referencia personal del mensajero en el contexto. “Su voz” es la opción más directa y fiel al hebreo.
- source_word: וְעָשִׂיתָ כֹּל אֲשֶׁר אֲדַבֵּר
  english_pob_choice: and do all that I speak
  chosen_spanish: y haces todo lo que yo hablo
  alternatives_spanish:
  - y haces todo lo que digo
  - y haces todo lo que yo diga
  lexicon: HALOT
  rationale: El hebreo cambia de “su voz” a la primera persona divina. “Yo hablo” conserva ese cambio de persona y mantiene la relación estrecha entre la voz del mensajero y la palabra de Yahvé sin suavizarla.
- source_word: וְאָיַבְתִּי
  english_pob_choice: I will be an enemy to
  chosen_spanish: yo seré enemigo de
  alternatives_spanish:
  - yo me pondré contra
  - yo seré adversario de
  lexicon: HALOT
  rationale: La raíz expresa hostilidad relacional. “Seré enemigo de” preserva la relación léxica con “enemigos” y evita una interpretación más general que “oponerse”.
- source_word: אֹיְבֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - los que te odian
  - tus adversarios
  lexicon: HALOT
  rationale: Es la correspondencia normal y precisa de אויב en este contexto militar y pactal.
- source_word: וְצַרְתִּי
  english_pob_choice: and an adversary to
  chosen_spanish: y adversario de
  alternatives_spanish:
  - y te haré oposición
  - y te hostigaré
  lexicon: HALOT
  rationale: La raíz צרר mantiene un paralelismo cognado con el sustantivo siguiente. “Adversario de” conserva ese vínculo y la fuerza de hostilidad activa.
- source_word: צֹרְרֶיךָ
  english_pob_choice: your adversaries
  chosen_spanish: tus adversarios
  alternatives_spanish:
  - tus opositores
  - tus enemigos
  lexicon: HALOT
  rationale: Se mantiene la variación léxica frente a “enemigos” para reflejar el matiz cognado del hebreo y preservar la diferencia del segundo miembro.
theological_decisions:
- issue: Cambio de referente entre “su voz” y “yo hablo”
  english_pob_reading: Preserve the text's shift from the messenger's voice to the LORD's first-person speech without harmonizing it.
  chosen_spanish_reading: Conservar el paso de “su voz” a “yo hablo” sin armonizarlo.
  alternative_spanish_readings:
  - Entender ambos miembros como si hablaran solo del ángel/mensajero
  - Suavizar el cambio de sujeto para que ambas cláusulas suenen idénticas
  rationale: 'La traducción mantiene la tensión del texto: una voz vinculada al mensajero y, a la vez, la palabra en primera persona de Yahvé. No se resuelve artificialmente la relación entre ambos sujetos.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se revisó el punto problemático de validación anterior: ahora ambos marcadores de nota, [a] y [b], aparecen exactamente en el texto español en sus lugares correspondientes. No se añadieron notas sin anclaje.'
  spanish_consistency_notes:
  - Se usa “Yahvé” para el nombre divino cuando corresponde al trasfondo del discurso.
  - Se mantiene “adversario/adversarios” para reflejar la repetición y el paralelismo léxico del hebreo.
  - Se prefirió un español claro y reverente, evitando calcos innecesarios pero sin perder las tensiones del original.
  - Se conserva la distinción de persona entre “su voz” y “yo hablo”, tal como en el audit trail en inglés.
