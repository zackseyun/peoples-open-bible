translation:
  language: es
  text: Ahora, los hombres a quienes Moisés envió para reconocer[a] la tierra volvieron e hicieron que toda la congregación murmurara contra él al difundir un mal informe[b] acerca de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Reconocer» conserva el sentido de inspeccionar o examinar la tierra; también podría traducirse «explorar» o «espiar», pero estas opciones alteran el registro o la carga semántica en español.
    reason: lexical_alternative
  - marker: b
    text: O «al sacar un mal informe acerca de la tierra»; también, «al difundir/esparcir un mal informe acerca de la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאֲנָשִׁים
  english_pob_choice: Now the men
  chosen_spanish: Ahora, los hombres
  alternatives_spanish:
  - Y los hombres
  - Entonces los hombres
  lexicon: HALOT
  rationale: El hebreo con וְ aquí retoma y avanza la narración. «Ahora» comunica ese giro discursivo de manera natural en español sin perder el valor conectivo.
- source_word: אֲשֶׁר שָׁלַח מֹשֶׁה
  english_pob_choice: whom Moses sent
  chosen_spanish: a quienes Moisés envió
  alternatives_spanish:
  - que Moisés envió
  - los cuales Moisés envió
  lexicon: HALOT
  rationale: El relativo funciona como objeto directo; «a quienes» conserva con claridad la relación sintáctica y suena natural en español.
- source_word: לָתוּר אֶת הָאָרֶץ
  english_pob_choice: to scout out the land
  chosen_spanish: para reconocer la tierra
  alternatives_spanish:
  - para explorar la tierra
  - para espiar la tierra
  lexicon: HALOT
  rationale: תור tiene aquí el sentido de inspección/reconocimiento de Canaán. «Reconocer» preserva la idea de examinar la tierra sin cargar innecesariamente el verbo con la connotación negativa de «espiar».
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: returned
  chosen_spanish: volvieron
  alternatives_spanish:
  - regresaron
  - retornaron
  lexicon: HALOT
  rationale: El wayyiqtol de שוב admite «volver» de forma muy natural en español narrativo; evita una solemnidad excesiva.
- source_word: וילונו עָלָיו
  english_pob_choice: caused the whole congregation to grumble against him
  chosen_spanish: hicieron que toda la congregación murmurara contra él
  alternatives_spanish:
  - hicieron que toda la congregación se quejara contra él
  - provocaron que toda la congregación murmurara contra él
  lexicon: HALOT
  rationale: 'Se mantiene la fuerza causativa del hebreo: no solo murmuraron ellos, sino que indujeron la murmuración del pueblo. «Murmurara» preserva el motivo bíblico del descontento en el desierto.'
- source_word: אֶת כָּל הָעֵדָה
  english_pob_choice: the whole congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la asamblea
  - la congregación entera
  lexicon: HALOT
  rationale: «Congregación» refleja bien עֵדָה en el Pentateuco y conserva el sentido corporativo del pueblo reunido.
- source_word: לְהוֹצִיא דִבָּה
  english_pob_choice: by bringing out a bad report
  chosen_spanish: trayendo un mal informe
  alternatives_spanish:
  - sacando un mal informe
  - difundiendo un mal informe
  lexicon: HALOT
  rationale: El infinitivo expresa medio; «trayendo» conserva la imagen de הוציא. «Mal informe» reproduce bien la carga negativa de דִבָּה sin sobreinterpretarla.
- source_word: עַל הָאָרֶץ
  english_pob_choice: about the land
  chosen_spanish: acerca de la tierra
  alternatives_spanish:
  - sobre la tierra
  - contra la tierra
  lexicon: HALOT
  rationale: La preposición עַל introduce el tema del informe. «Acerca de» es la forma más neutra y clara en español.
translation_notes:
  revision_awareness: 'Este borrador sigue de cerca el texto hebreo masorético y la auditoría inglesa POB, conservando las decisiones clave: valor discursivo de וְ, relativo con objeto directo, sentido de תור como reconocimiento/reconocimiento exploratorio, causatividad de וילונו, y דִבָּה como informe negativo. No hay revisiones previas aplicadas en el paquete, y el texto inglés de referencia permanece estable.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - Se prefirió «congregación» por consistencia con el uso pentateucal de עֵדָה.
  - Se mantuvo un registro bíblico claro pero moderno, sin calcos demasiado rígidos.
  - La estructura mantiene el orden narrativo del hebreo sin forzar hipérbaton en español.
