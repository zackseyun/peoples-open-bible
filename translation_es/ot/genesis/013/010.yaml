translation:
  language: es
  text: Lot levantó sus ojos y vio toda la llanura del Jordán[a], que toda ella estaba bien regada antes de que Yahvé destruyera Sodoma y Gomorra, como el jardín de Yahvé[b], como la tierra de Egipto, en dirección a Zoar[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda la región del Jordán» o, más literalmente, «todo el círculo del Jordán».
    reason: lexical_alternative
  - marker: b
    text: «El jardín de Yahvé» probablemente evoca la exuberancia asociada con Edén.
    reason: cross_reference
  - marker: c
    text: O «al llegar a Zoar». La expresión hebrea marca dirección hacia Zoar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא ... עֵינָיו
  english_pob_choice: lifted up his eyes
  chosen_spanish: levantó sus ojos
  alternatives_spanish:
  - alzó sus ojos
  - levantó la vista
  lexicon: HALOT
  rationale: La locución hebrea es idiomática y describe el acto de dirigir la mirada. «Levantó sus ojos» conserva la textura narrativa sin sonar extraña en español.
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - observó
  lexicon: HALOT
  rationale: Es el verbo simple de percepción en la secuencia narrativa; «vio» es la equivalencia más directa y natural.
- source_word: כָּל כִּכַּר הַיַּרְדֵּן
  english_pob_choice: all the plain of the Jordan
  chosen_spanish: toda la llanura del Jordán
  alternatives_spanish:
  - toda la región del Jordán
  - todo el círculo del Jordán
  - el valle del Jordán
  lexicon: HALOT
  rationale: כִּכָּר puede referirse a una zona redonda o llana; en español «llanura» comunica bien el sentido geográfico y agrícola sin forzar el giro literal.
- source_word: כִּי כֻלָּהּ מַשְׁקֶה
  english_pob_choice: that all of it was well watered
  chosen_spanish: que toda ella estaba bien regada
  alternatives_spanish:
  - pues toda ella estaba bien regada
  - que estaba completamente regada
  - porque toda ella era fértil y regada
  lexicon: HALOT
  rationale: מַשְׁקֶה describe la abundancia de agua/irrigación. «Bien regada» mantiene la imagen agrícola con naturalidad en español; «toda ella» preserva el referente femenino de la llanura.
- source_word: לִפְנֵי שַׁחֵת יְהוָה
  english_pob_choice: before Yahweh destroyed
  chosen_spanish: antes de que Yahvé destruyera
  alternatives_spanish:
  - antes de que Yahvé arrasara
  - antes de que Yahvé echara a perder
  - antes de que Yahvé devastara
  lexicon: HALOT
  rationale: El valor temporal de לִפְנֵי se expresa con «antes de que». שׁחת, en este contexto, apunta a destrucción judicial de las ciudades; «destruyera» es claro y fiel.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino transliterado conforme a la convención del proyecto, en lugar de sustituirlo por un título.
- source_word: כְּגַן יְהוָה
  english_pob_choice: like the garden of Yahweh
  chosen_spanish: como el jardín de Yahvé
  alternatives_spanish:
  - como el jardín de Yahvé
  - como el huerto de Yahvé
  - como el jardín del SEÑOR
  lexicon: HALOT
  rationale: «Jardín» conserva el eco intertextual con el jardín/Edén y sigue el valor comparativo de כְּ. «Huerto» es posible, pero «jardín» es más cercano al auditorio amplio y a la resonancia bíblica.
- source_word: כְּאֶרֶץ מִצְרַיִם
  english_pob_choice: like the land of Egypt
  chosen_spanish: como la tierra de Egipto
  alternatives_spanish:
  - como la tierra de Egipto
  - como el país de Egipto
  - como Egipto
  lexicon: HALOT
  rationale: אֶרֶץ significa tierra/país/territorio; «tierra de Egipto» preserva la comparación geográfica y el paralelismo con la frase anterior.
- source_word: בֹּאֲכָה צֹעַר
  english_pob_choice: as you go toward Zoar
  chosen_spanish: en dirección a Zoar
  alternatives_spanish:
  - al ir hacia Zoar
  - cuando uno va hacia Zoar
  - a la entrada de Zoar
  lexicon: HALOT
  rationale: La expresión marca rumbo o acercamiento. «En dirección a Zoar» evita una segunda persona no marcada en español y transmite con claridad el valor direccional.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama de manera directa; se conserva como nombre propio transliterado. Se evita la sustitución por un título para mantener la transparencia auditiva del texto fuente.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa: la cláusula explicativa de כִּי se refleja con «que toda ella estaba bien regada», conservando la relación sintáctica y el matiz descriptivo. También se mantiene la decisión revisada de usar un nombre divino transliterado en lugar de una sustitución titulada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma uniforme para יְהוָה.
  - Se usa «jardín» de modo consistente con la resonancia edénica documentada en la auditoría inglesa.
  - «Bien regada» conserva la fuerza agrícola de מַשְׁקֶה sin volver el español pesado.
  - La llanura se traduce en femenino («toda ella») para concordar con «llanura».
