theological_decisions:
- issue: Referent of 'the sovereign power'
  chosen_reading: understood as divine power displayed in protection of the temple, without over-specifying beyond the text
  alternative_readings:
  - the power of God explicitly
  - the power of the temple's Lord
  rationale: The immediate context makes the power divine, but this verse itself uses the abstract noun δυναστεία without naming God directly. The translation preserves that wording while allowing the narrative context to identify the source.
  doctrine_reference: Preserve theological tension rather than resolve it.
