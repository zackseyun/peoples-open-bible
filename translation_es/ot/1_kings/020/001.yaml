translation:
  language: es
  text: Ahora Ben-adad, rey de Aram[b], reunió todo su ejército[a], y treinta y dos reyes con él, y caballos y carros; luego subió y puso sitio a Samaria, y combatió contra ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y Ben-adad, rey de Aram, reunió...». El inicio puede conservarse más literalmente con «y».'
    reason: lexical_alternative
  - marker: b
    text: «Aram» es el nombre de lugar en hebreo; tradicionalmente, «Siria».
    reason: alternative_reading
lexical_decisions:
- source_word: וּבֶן הֲדַד
  english_pob_choice: Now Ben-hadad
  chosen_spanish: Ahora Ben-adad
  alternatives_spanish:
  - Y Ben-adad
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado y el waw inicial se vierte con un marcador discursivo natural en español. «Ahora» funciona aquí como apertura narrativa, equivalente al valor conectivo de la propuesta inglesa.
- source_word: מֶלֶךְ אֲרָם
  english_pob_choice: king of Aram
  chosen_spanish: rey de Aram
  alternatives_spanish:
  - rey de Siria
  lexicon: HALOT
  rationale: Se mantiene «Aram» como nombre hebreo directo, en línea con la decisión inglesa de no sustituirlo por la convención tradicional «Siria».
- source_word: קָבַץ אֶת כָּל חֵילוֹ
  english_pob_choice: gathered all his army
  chosen_spanish: reunió todo su ejército
  alternatives_spanish:
  - juntó toda su hueste
  - reunió todas sus fuerzas
  lexicon: HALOT
  rationale: קבץ expresa reunir o congregar; חֵיל en contexto militar puede referir al cuerpo armado. «Ejército» es la opción más natural y fiel en español para este uso colectivo.
- source_word: וּשְׁלֹשִׁים וּשְׁנַיִם מֶלֶךְ אִתּוֹ
  english_pob_choice: and thirty-two kings with him
  chosen_spanish: y con él treinta y dos reyes
  alternatives_spanish:
  - y treinta y dos reyes con él
  - y junto con él treinta y dos reyes
  lexicon: HALOT
  rationale: La coordinación hebrea se refleja con «y con él» para preservar la idea de acompañamiento sin duplicar de modo pesado la preposición en español. Se evita suavizar la referencia a los reyes aliados.
- source_word: וְסוּס וָרָכֶב
  english_pob_choice: and horses and chariots
  chosen_spanish: y caballos y carros
  alternatives_spanish:
  - y caballos y carros de guerra
  - y caballería y carros
  lexicon: HALOT
  rationale: Los sustantivos hebreos aparecen como colectivos singulares; en español, «caballos y carros» comunica con claridad la imaginería militar sin forzar una paráfrasis.
- source_word: וַיַּעַל
  english_pob_choice: then he went up
  chosen_spanish: luego subió
  alternatives_spanish:
  - y subió
  - entonces subió
  lexicon: HALOT
  rationale: «Subió» conserva el valor literal de עלה y el contexto militar de avance hacia Samaria. «Luego» refleja la secuencia narrativa del waw consecutivo.
- source_word: וַיָּצַר עַל שֹׁמְרוֹן
  english_pob_choice: and besieged Samaria
  chosen_spanish: y puso sitio a Samaria
  alternatives_spanish:
  - y sitió a Samaria
  - y cercó a Samaria
  lexicon: HALOT
  rationale: צור על en contexto bélico significa sitiar. «Puso sitio» es un giro español idiomático, preciso y compatible con el registro bíblico.
- source_word: וַיִּלָּחֶם בָּהּ
  english_pob_choice: and fought against it
  chosen_spanish: y combatió contra ella
  alternatives_spanish:
  - y peleó contra ella
  - y luchó contra ella
  lexicon: HALOT
  rationale: לחם con ב indica combatir contra un objetivo. «Combatió contra ella» preserva el sentido militar sin ampliar indebidamente a una guerra total.
theological_decisions:
- issue: Uso de Aram en lugar de Siria
  english_pob_reading: Aram is the Hebrew place-name; traditionally, Syria.
  chosen_spanish_reading: Aram
  alternative_spanish_readings:
  - Siria
  rationale: Se sigue el nombre hebreo directo, como en la base inglesa, para no ocultar el trasfondo del texto fuente ni importar una convención posterior que el hebreo no usa aquí.
  doctrine_reference: Toponimia bíblica y fidelidad al texto fuente
- issue: Valor de la secuencia narrativa inicial
  english_pob_reading: Now ...
  chosen_spanish_reading: Ahora ...
  alternative_spanish_readings:
  - Y ...
  - Entonces ...
  rationale: 'No hay una carga doctrinal, pero sí una decisión discursiva: «Ahora» comunica bien la transición narrativa sin eliminar el enlace del hebreo ni sonar mecánico.'
  doctrine_reference: Coherencia narrativa y estilo bíblico
- issue: Imagen militar de 'horse and chariot' en singular hebreo
  english_pob_reading: horses and chariots
  chosen_spanish_reading: caballos y carros
  alternative_spanish_readings:
  - caballería y carros
  - caballo y carro
  rationale: El hebreo usa sustantivos colectivos; el español pluraliza naturalmente para expresar la fuerza militar sin alterar el referente. No se introduce una lectura simbólica.
  doctrine_reference: Precisión semántica y literalidad controlada
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que ajustó la coordinación de «with thirty-two kings with him» para reflejar más directamente el hebreo. Por ello, en español se prefirió «y con él treinta y dos reyes», una solución que mantiene la coordinación y el acompañamiento sin sobrecargar la sintaxis. También se conservó la decisión auditada de usar «Aram» y una formulación verbal sobria para el asedio y el combate.
  spanish_consistency_notes:
  - Se mantuvo «Aram» de forma consistente con el nombre hebreo directo adoptado por POB.
  - Se usó «subió» para עלה y «puso sitio» para צור על con registro bíblico natural en español.
  - Se preservó la referencia militar concreta sin sustituirla por términos más interpretativos como «hueste» o «caballería» salvo en alternativas.
  - La puntuación imita una sola oración narrativa con pausas claras, acorde con el hebreo y el audit trail inglés.
