translation:
  language: es
  text: donde tus padres me pusieron a prueba y me probaron[a][b], aunque habían visto mi obra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando tus padres me pusieron a prueba; me examinaron y también vieron mi obra». El hebreo puede traducirse más literalmente, pero el texto principal expresa el sentido concesivo más probable de la cláusula.'
