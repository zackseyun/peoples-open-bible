translation:
  language: es
  text: Porque Dios sabe que, el día que ustedes coman de él[a], sus ojos serán abiertos y ustedes serán como Dios, conociendo el bien y el mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como dioses» o «como seres divinos». El hebreo אֱלֹהִים puede admitir estos sentidos en algunos contextos.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación del motivo/aseveración de la serpiente; en español, «Porque» reproduce bien el valor causal o explicativo de כִּי sin sonar rígido.
- source_word: יֹדֵעַ אֱלֹהִים
  english_pob_choice: God knows
  chosen_spanish: Dios sabe
  alternatives_spanish:
  - Dios conoce
  - Dios está sabiendo
  lexicon: HALOT
  rationale: El participio hebreo expresa un estado continuo o característico; en español, «sabe» comunica naturalmente esa idea sin perder la afirmación de conocimiento divino.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cuando
  - como
  lexicon: HALOT
  rationale: Introduce el contenido de lo que Dios sabe; «que» es el complemento más natural y fiel en español.
- source_word: בְּיוֹם
  english_pob_choice: on the day
  chosen_spanish: el día que
  alternatives_spanish:
  - cuando
  - el día en que
  lexicon: HALOT
  rationale: Mantiene el idiomático temporal hebreo sin sobrecargar el español; aquí el sentido es temporal, no necesariamente un día de 24 horas.
- source_word: אֲכָלְכֶם מִמֶּנּוּ
  english_pob_choice: you eat from it
  chosen_spanish: coman de él
  alternatives_spanish:
  - coman de eso
  - coman de él mismo
  lexicon: HALOT
  rationale: «Comer de» conserva el valor del hebreo con naturalidad. El pronombre masculino singular refleja el fruto/objeto mencionado en el contexto inmediato.
- source_word: וְנִפְקְחוּ עֵינֵיכֶם
  english_pob_choice: your eyes will be opened
  chosen_spanish: se les abrirán los ojos
  alternatives_spanish:
  - sus ojos serán abiertos
  - se abrirán sus ojos
  lexicon: HALOT
  rationale: La pasiva hebrea se vierte de modo natural en español con la construcción impersonal/pasiva refleja. Conserva la metáfora de percepción y descubrimiento.
- source_word: וִהְיִיתֶם
  english_pob_choice: you will be
  chosen_spanish: serán
  alternatives_spanish:
  - llegarán a ser
  - se volverán
  lexicon: HALOT
  rationale: 'Aquí el resultado es un estado: «serán» expresa bien la consecuencia inmediata y mantiene la linealidad de la cláusula.'
- source_word: כֵּאלֹהִים
  english_pob_choice: like God
  chosen_spanish: como Dios
  alternatives_spanish:
  - como dioses
  - como seres divinos
  lexicon: HALOT
  rationale: El contexto inmediato favorece la referencia singular a Dios, sin borrar la ambigüedad documentada de אֱלֹהִים. Se preserva la tensión con una nota.
- source_word: יֹדְעֵי
  english_pob_choice: knowing
  chosen_spanish: conocedores
  alternatives_spanish:
  - que conocen
  - conociendo
  lexicon: HALOT
  rationale: El participio se convierte en un adjetivo participial natural en español, que describe el estado resultante de manera clara y compacta.
- source_word: טוֹב וָרָע
  english_pob_choice: good and evil
  chosen_spanish: del bien y del mal
  alternatives_spanish:
  - de lo bueno y lo malo
  - del bien y el mal
  lexicon: HALOT
  rationale: «Del bien y del mal» es la fórmula española estable y suficientemente solemne para el contraste moral y discernimiento del hebreo.
theological_decisions:
- issue: Sentido de אֱלֹהִים en כֵּאלֹהִים
  english_pob_reading: like God
  chosen_spanish_reading: como Dios
  alternative_spanish_readings:
  - como dioses
  - como seres divinos
  rationale: El entorno narrativo apunta al Dios único y al tema de conocimiento reservado. Se conserva la lectura singular, pero sin ocultar que el hebreo puede admitir otros sentidos en ciertos contextos.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Valor de la frase «conocedores del bien y del mal»
  english_pob_reading: knowing good and evil
  chosen_spanish_reading: conocedores del bien y del mal
  alternative_spanish_readings:
  - que conocen el bien y el mal
  - conociendo el bien y el mal
  rationale: La elección mantiene el carácter resultativo y atributivo del participio hebreo, sin forzar una explicación doctrinal más allá del texto.
  doctrine_reference: Translation philosophy §2 (Keep source-semantic compactness where Spanish can bear it)
translation_notes:
  revision_awareness: El texto coincide sustancialmente con el audit trail inglés y no requiere revisión adicional; se preserva la ambigüedad documentada de אֱלֹהִים mediante nota.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים en singular, conforme al contexto narrativo y a la decisión auditada en inglés.
  - Se mantiene «del bien y del mal» como fórmula idiomática estable y teológicamente solemne.
  - Se evita el calco mecánico de «abrirán los ojos» a favor de una pasiva refleja natural en español, sin perder la metáfora.
  - Se conserva el pronombre masculino singular «él» para el referente inmediato implícito del fruto/árbol en el contexto.
