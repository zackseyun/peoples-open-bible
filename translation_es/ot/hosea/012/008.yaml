translation:
  language: es
  text: Un mercader, con balanzas de engaño en su mano, ama oprimir[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «Canaán». La palabra también puede entenderse como «cananeo» o, por extensión, «mercader/comerciante»; el sentido comercial encaja con el contexto de balanzas deshonestas.
    reason: alternative_reading
lexical_decisions:
- source_word: כְּנַעַן
  english_pob_choice: A merchant
  chosen_spanish: ¡Un cananeo!
  alternatives_spanish:
  - Un mercader
  - Un comerciante
  - Canaán
  lexicon: HALOT
  rationale: El hebreo puede leerse como nombre propio («Canaán») o como apelativo comercial («mercader»). En español, «cananeo» conserva mejor la ambigüedad y la tensión retórica del original que una solución únicamente comercial; además permite mantener la posibilidad de una acusación personificada contra Israel/Efraín sin resolverla prematuramente.
- source_word: בְּיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en cuya mano hay
  alternatives_spanish:
  - en su mano
  - con su mano
  - en la mano
  lexicon: HALOT
  rationale: La frase concreta se conserva para mantener la imagen visual de las balanzas fraudulentas sostenidas en la mano.
- source_word: מֹאזְנֵי
  english_pob_choice: scales
  chosen_spanish: balanzas
  alternatives_spanish:
  - escalas
  - balanza
  lexicon: HALOT
  rationale: «Balanzas» reproduce el instrumento de pesar de forma natural en español y mantiene mejor el paralelismo con el engaño comercial que «escalas».
- source_word: מִרְמָה
  english_pob_choice: deceptive
  chosen_spanish: de engaño
  alternatives_spanish:
  - engañosas
  - falsas
  - fraudulentas
  lexicon: HALOT
  rationale: El sustantivo hebreo expresa fraude/decepción. En español, un complemento nominal («de engaño») preserva la fuerza del término sin forzar un adjetivo menos preciso o más estilizado.
- source_word: לַעֲשֹׁק
  english_pob_choice: to oppress
  chosen_spanish: oprimir
  alternatives_spanish:
  - defraudar
  - explotar
  - extorsionar
  lexicon: HALOT
  rationale: «Oprimir» conserva el alcance moral amplio del verbo hebreo, que puede incluir explotación económica; evita estrecharlo demasiado a una sola práctica comercial.
- source_word: אָהֵב
  english_pob_choice: loves
  chosen_spanish: ama
  alternatives_spanish:
  - le encanta
  - ama hacer
  - gusta de
  lexicon: HALOT
  rationale: El participio/forma verbal expresa una inclinación habitual. «Ama» comunica con claridad ese deleite constante en el mal.
theological_decisions:
- issue: 'Cómo reflejar כְּנַעַן: nombre propio, etnónimo o apelativo comercial'
  english_pob_reading: 'appellative: ''merchant'' with footnote preserving ''Canaan'''
  chosen_spanish_reading: «cananeo» en el texto, con nota sobre la lectura alternativa «Canaán / mercader»
  alternative_spanish_readings:
  - «mercader»
  - «comerciante»
  - «Canaán»
  rationale: La evidencia contextual favorece el sentido comercial, pero el hebreo también permite oír el nombre de Canaán. «Cananeo» mantiene ambas posibilidades mejor que una traducción ya interpretativa, y la nota explica la alternativa comercial para no borrar la tensión del texto.
  doctrine_reference: Translation philosophy §1 (primacía del idioma original), §3 (preservar tensiones teológicas y retóricas)
- issue: Relación entre la imagen comercial y la denuncia moral
  english_pob_reading: deceptive scales ... loves to oppress
  chosen_spanish_reading: «balanzas de engaño ... ama oprimir»
  alternative_spanish_readings:
  - «balanzas falsas ... ama defraudar»
  - «balanzas fraudulentas ... ama explotar»
  rationale: La combinación de balanzas y opresión comunica que no se trata solo de fraude mercantil, sino de una práctica injusta más amplia. Por eso se conserva «oprimir» en vez de estrechar el sentido a «defraudar».
  doctrine_reference: Hosea 12:7–8 contexto de acusación ética y económica
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de él: se preservó la ambigüedad de כְּנַעַן mediante «cananeo» en el texto principal, mientras la nota recoge la lectura comercial favorecida por el contexto. No se introdujeron cambios textuales respecto del paquete fuente; la decisión principal es de equivalencia óptima en español.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica aquí porque el versículo no contiene el tetragrama.
  - «Balanzas» se mantuvo para el instrumento de pesar; no se sustituyó por terminología litúrgica.
  - La nota a conserva la alternativa semántica principal sin sobrecargar el texto principal con una glosa interpretativa.
