translation:
  language: es
  text: Avergüénzate de rechazar una petición[a], y de volverle el rostro a tu prójimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conservado es incierto y difiere marcadamente del griego, que dice aproximadamente: «y de saludar en cuanto al silencio, y de mirar a una mujer que es compañera/cortesana». El texto principal sigue el testimonio hebreo superviviente, pero la divergencia es significativa.'
    reason: alternative_reading
lexical_decisions:
- source_word: ממנוע
  english_pob_choice: of refusing
  chosen_spanish: de rechazar
  alternatives_spanish:
  - de negarte a dar
  - de rehusar
  - de retener
  lexicon: HALOT
  rationale: El hebreo transmite la idea de impedir, retener o no conceder. En español, «rechazar» expresa con naturalidad la acción de no aceptar o no conceder una petición, manteniendo el tono admonitorio del verso.
- source_word: מתת שאלה
  english_pob_choice: a request
  chosen_spanish: una petición
  alternatives_spanish:
  - una solicitud
  - un ruego
  - una demanda
  lexicon: HALOT
  rationale: La combinación hebrea es difícil; la POB inglesa siguió el sentido de petición o solicitud. «Petición» conserva ese valor y suena natural en español, sin forzar el matiz de «don» que podría sugerir «regalo».
- source_word: שאלה
  english_pob_choice: request
  chosen_spanish: petición
  alternatives_spanish:
  - solicitud
  - ruego
  - súplica
  lexicon: HALOT
  rationale: שאלה suele significar una petición o demanda. «Petición» es el equivalente más amplio y neutral para el contexto ético del pasaje.
- source_word: אפי
  english_pob_choice: your anger / your face
  chosen_spanish: el rostro
  alternatives_spanish:
  - la ira
  - tu enojo
  - el semblante
  lexicon: HALOT
  rationale: Aunque la línea hebrea es textual y semánticamente incierta, el audit trail revisó אפי רעך como «the face of your neighbor». En español, «el rostro» reproduce ese valor más directamente que «ira» o «enojo», y encaja con la estructura de apartar el rostro.
- source_word: רעך
  english_pob_choice: your neighbor
  chosen_spanish: tu prójimo
  alternatives_spanish:
  - tu vecino
  - tu semejante
  - tu compañero
  lexicon: HALOT
  rationale: רעך designa al cercano o al fellow-member of the community. «Prójimo» preserva la relación ética y comunitaria en español bíblico moderno, sin volverse arcaico.
theological_decisions:
- issue: Desajuste textual entre el hebreo conservado y el paralelo griego
  english_pob_reading: The main text follows the surviving Hebrew witness, with the Greek parallel preserved in a footnote because it differs substantially.
  chosen_spanish_reading: El texto principal sigue el hebreo conservado, y la nota señala la divergencia notable del griego.
  alternative_spanish_readings:
  - 'Seguir el griego en el texto principal: «y de saludar en silencio, y de mirar a una mujer que es compañera/cortesana»'
  - 'Hacer una traducción más literal del hebreo: «de retener el don de una petición»'
  rationale: La política del proyecto da primacía al hebreo donde está conservado, pero exige transparencia sobre la discrepancia con el griego. Por eso el texto principal usa una formulación sobria y el pie de nota preserva la lectura alternativa importante.
  doctrine_reference: 'PHILOSOPHY.md: primacía del original y honestidad frente a la incertidumbre textual'
- issue: Imagen corporal versus abstracción emocional en אפי
  english_pob_reading: The revised English note understands the Hebrew as 'the face of your neighbor,' not 'your anger from your neighbor.'
  chosen_spanish_reading: «el rostro de tu prójimo»
  alternative_spanish_readings:
  - «tu enojo hacia tu prójimo»
  - «tu ira contra tu prójimo»
  rationale: El hebreo del verso revisado apunta a la metáfora de la cara/rostro, no a un sustantivo abstracto de ira. En español, mantener «rostro» evita perder esa señal léxica y respeta la revisión auditada.
  doctrine_reference: Sirach 41:20 audit trail revision pass
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail inglés, que corrigió la segunda cláusula hacia «the face of your neighbor». También conserva la cautela del aparato sobre la gran divergencia entre el hebreo y el griego, reflejándola en la nota a pie.
  spanish_consistency_notes:
  - Se usó «prójimo» para רעך por su valor ético-relacional y por ser comprensible en español moderno.
  - Se evitó «SEÑOR» u otras convenciones de ocultamiento del nombre divino porque este versículo no contiene el Tetragrámaton ni un título divino relevante.
  - Se eligió un registro sobrio y bíblico, pero no arcaizante, para que la línea sea publicable y a la vez fiel al hebreo transmitido.
