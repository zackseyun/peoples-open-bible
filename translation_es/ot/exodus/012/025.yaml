translation:
  language: es
  text: Y cuando entren en la tierra que Yahvé les dará, tal como él ha prometido[a], guardarán este servicio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tal como él dijo». El hebreo dice literalmente «como habló», pero en este contexto expresa una promesa previa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «esta observancia» o «este rito». El término hebreo se refiere al servicio ritual de la Pascua.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  english_pob_choice: And when
  chosen_spanish: Y acontecerá que, cuando
  alternatives_spanish:
  - Y cuando
  - Y sucederá que, cuando
  lexicon: HALOT
  rationale: La fórmula hebrea introduce una circunstancia futura; en español, «acontecerá que, cuando» conserva el arranque formulístico sin sonar tan rígido como un calco literal.
- source_word: תָבֹאוּ
  english_pob_choice: you come
  chosen_spanish: entréis
  alternatives_spanish:
  - vengáis
  - entren
  lexicon: HALOT
  rationale: El verbo בוא admite «venir/entrar»; aquí el movimiento hacia la tierra se expresa naturalmente con «entrar». Se mantiene la segunda persona plural.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: «Tierra» preserva el valor bíblico de la tierra prometida y evita sustituirlo por «país», que suena menos marcado en este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La directriz del proyecto para el nombre divino es «Yahweh»; en español se adapta a la forma de uso amplio y reverente «Yahvé», que conserva la referencia al nombre propio sin enmascararlo como «SEÑOR».
- source_word: אֲשֶׁר יִתֵּן יְהוָה לָכֶם
  english_pob_choice: that Yahweh will give you
  chosen_spanish: que Yahvé os dará
  alternatives_spanish:
  - que Yahvé dará a vosotros
  - que Yahvé os está dando
  lexicon: HALOT
  rationale: El yiqtol expresa futuro en contexto; «os dará» reproduce la promesa de donación divina. Se conserva el dativo con «os» por fidelidad y claridad.
- source_word: כַּאֲשֶׁר דִּבֵּר
  english_pob_choice: just as he promised
  chosen_spanish: conforme a lo que él ha prometido
  alternatives_spanish:
  - tal como él habló
  - tal como él dijo
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «como habló», el contexto de alianza hace que la fuerza sea promesiva; la formulación española mantiene esa tensión sin borrar la literalidad subyacente.
- source_word: וּשְׁמַרְתֶּם
  english_pob_choice: you shall keep
  chosen_spanish: guardaréis
  alternatives_spanish:
  - observaréis
  - mantendréis
  lexicon: HALOT
  rationale: שמר puede significar guardar/observar en contexto ritual. «Guardaréis» es natural en español bíblico y conserva la obligación de mantener el rito.
- source_word: הָעֲבֹדָה הַזֹּאת
  english_pob_choice: this service
  chosen_spanish: este servicio
  alternatives_spanish:
  - esta observancia
  - este rito
  - este servicio ritual
  lexicon: HALOT
  rationale: עֲבֹדָה aquí refiere a la práctica ritual pascual. «Servicio» mantiene el campo cultual del término y evita estrecharlo indebidamente solo a «rito».
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: Se sigue el principio del proyecto de no ocultar el nombre del pacto. «Yahvé» comunica el nombre propio divino en español de forma estable y reconocible.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Literal versus contextual force of כַּאֲשֶׁר דִּבֵּר
  english_pob_reading: just as he promised
  chosen_spanish_reading: conforme a lo que él ha prometido
  alternative_spanish_readings:
  - tal como él habló
  - tal como él dijo
  - según lo que él habló
  rationale: El hebreo es literalmente «como habló», pero el contexto inmediato es una promesa divina sobre la tierra. La traducción española conserva la fuerza promesiva sin perder el vínculo con la expresión original.
  doctrine_reference: Uso contextual de fórmula promesiva en lenguaje de pacto
translation_notes:
  revision_awareness: 'Coincide con el pasaje base y su revisión más reciente: no se requieren enmiendas textuales ni cambios de sentido respecto del audit trail inglés; la única adaptación importante es la normalización del nombre divino a la forma española «Yahvé».'
  spanish_consistency_notes:
  - Se mantuvo la segunda persona plural para corresponder con el hebreo.
  - Se preservó la tensión entre literalidad («como habló») y sentido contextual de promesa mediante una nota.
  - «Servicio» se eligió como término cultual amplio, coherente con la terminología POB para עֲבֹדָה.
  - Se evitó «SEÑOR» para el nombre divino, en consonancia con la política del proyecto.
