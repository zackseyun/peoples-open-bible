translation:
  language: es
  text: En el año treinta y ocho de Azarías, rey de Judá, Zacarías hijo de Jeroboam comenzó a reinar sobre Israel en Samaria por seis meses.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בִּשְׁנַת
  english_pob_choice: In the ... year of
  chosen_spanish: En el año de
  alternatives_spanish:
  - En el ... año de
  lexicon: HALOT
  rationale: La fórmula cronológica hebrea con בִּשְׁנַת introduce una datación regnal; en español, la construcción natural y fiel es 'En el año de', manteniendo la función temporal sin calco excesivo.
- source_word: שְׁלֹשִׁים וּשְׁמֹנֶה שָׁנָה
  english_pob_choice: thirty-eighth year
  chosen_spanish: año treinta y ocho
  alternatives_spanish:
  - trigésimo octavo año
  lexicon: HALOT
  rationale: El hebreo usa una cardinalidad con valor ordinal en la datación. 'Año treinta y ocho' es idiomático en español bíblico moderno; 'trigésimo octavo año' sería más formal pero menos natural.
- source_word: לַעֲזַרְיָהוּ
  english_pob_choice: of Azariah
  chosen_spanish: de Azarías
  alternatives_spanish:
  - de Azarías rey
  lexicon: HALOT
  rationale: La preposición ל en esta fórmula señala el marco cronológico del reinado de Azarías. En español corresponde 'de Azarías', preservando la referencia regnal.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: HALOT
  rationale: La cadena constructa es directa y no requiere ajuste teológico; 'rey de Judá' conserva la designación política estándar del texto.
- source_word: מָלַךְ
  english_pob_choice: became king
  chosen_spanish: llegó a ser rey
  alternatives_spanish:
  - comenzó a reinar
  - reinó
  lexicon: HALOT
  rationale: El qal de מלך aquí marca acceso al trono, no la duración entera del reinado. 'Llegó a ser rey' expresa bien el sentido ingesivo en español sin ocultar que se trata de entronización.
- source_word: זְכַרְיָהוּ
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zecharías
  lexicon: HALOT
  rationale: Se usa la forma castellana estable del nombre propio, inteligible y transparente para lectura eclesial en español.
- source_word: בֶן יָרָבְעָם
  english_pob_choice: son of Jeroboam
  chosen_spanish: hijo de Jeroboam
  alternatives_spanish:
  - hijo de Yarobam
  lexicon: HALOT
  rationale: La identificación filial se mantiene de manera directa; 'hijo de Jeroboam' es la forma estándar y fiel al hebreo.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - sobre el pueblo de Israel
  lexicon: HALOT
  rationale: Con מלך, עַל expresa gobierno 'sobre' un pueblo o reino. 'Sobre Israel' reproduce esa relación de autoridad sin agregar elementos no presentes.
- source_word: בְּשֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  lexicon: HALOT
  rationale: La locución locativa indica el lugar de su reinado. 'En Samaria' es preciso y natural; no es necesario explicitar 'la ciudad'.
- source_word: שִׁשָּׁה חֳדָשִׁים
  english_pob_choice: for six months
  chosen_spanish: por seis meses
  alternatives_spanish:
  - durante seis meses
  lexicon: HALOT
  rationale: El acusativo de duración se expresa de forma natural en español con 'por seis meses', manteniendo la duración exacta del reinado.
translation_notes:
  revision_awareness: El inglés POB ofrece una traducción estable y sin notas para este versículo; el español sigue la misma lectura cronológica y regnal, conservando el valor ingresivo de מָלַךְ y la duración explícita del reinado sin añadir matices interpretativos no documentados.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa 'rey de Judá' y 'sobre Israel' de manera consistente con la sintaxis regnal del hebreo.
  - Se prefiere 'Zacarías' como forma española estándar del nombre propio.
  - No se introducen notas textuales porque el paquete fuente no documenta variantes ni tensiones léxicas adicionales en este versículo.
