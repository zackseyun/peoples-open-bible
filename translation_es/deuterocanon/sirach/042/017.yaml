revisions:
- from: Los santos de Dios no fueron suficientes para relatar[a] las maravillas del Señor. Dios ha fortalecido sus ejércitos para estar firmes delante de su gloria.
  to: Los santos de Dios no fueron suficientes para relatar[a] las maravillas de Yahvé.[b] Dios ha fortalecido sus huestes para estar firmes delante de su gloria.
