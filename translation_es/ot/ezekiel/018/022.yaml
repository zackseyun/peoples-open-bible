translation:
  language: es
  text: Ninguna de las transgresiones que él ha cometido será recordada contra él[a]; por[b] la justicia que ha practicado, vivirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no se tomarán en cuenta contra él».
    reason: lexical_alternative
  - marker: b
    text: O «en» o «debido a»; el hebreo ב puede entenderse aquí con sentido instrumental o causal cercano.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל פְּשָׁעָיו
  english_pob_choice: None of the transgressions
  chosen_spanish: Ninguna de las transgresiones
  alternatives_spanish:
  - Todas las transgresiones
  - Ninguna de sus rebeliones
  lexicon: HALOT
  rationale: כָּל con una negación siguiente expresa la totalidad excluida; en español, «ninguna de» comunica mejor ese valor totalizador que un literal «todas ... no». פְּשָׁעִים denota transgresiones/rebeliones, y «transgresiones» mantiene el matiz moral-jurídico sin endurecerlo innecesariamente.
- source_word: עָשָׂה
  english_pob_choice: has committed
  chosen_spanish: ha cometido
  alternatives_spanish:
  - ha hecho
  - ha practicado
  lexicon: HALOT
  rationale: Cuando עשה se refiere a culpa o mal, el español natural es «cometer»; conserva la idea de acto culpable que el contexto exige.
- source_word: לֹא יִזָּכְרוּ ל֑/וֹ
  english_pob_choice: will be remembered against him
  chosen_spanish: será recordada contra él
  alternatives_spanish:
  - no será recordada para él
  - no le será recordada
  lexicon: HALOT
  rationale: 'El nifal de זכר es pasivo: «ser recordada». El complemento לּוֹ en este contexto forense se expresa bien con «contra él», siguiendo la lectura judicial de la POB inglesa sin volverla más interpretativa de lo necesario.'
- source_word: בְּצִדְקָת֥וֹ
  english_pob_choice: by the righteousness
  chosen_spanish: por la justicia
  alternatives_spanish:
  - por su justicia
  - en su justicia
  - debido a su justicia
  lexicon: HALOT
  rationale: צדקה puede traducirse como «justicia» o «rectitud»; aquí «justicia» conserva el peso ético y de pacto. La preposición ב admite valor instrumental/causal; «por» refleja mejor la construcción sin forzar una sola paráfrasis.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he has practiced
  chosen_spanish: que ha practicado
  alternatives_spanish:
  - que ha hecho
  - que practicó
  lexicon: HALOT
  rationale: Con צדקה, «practicar» expresa de forma idiomática una justicia vivida/realizada, y reproduce la decisión auditada de la POB inglesa sin perder la concreción del verbo hebreo.
- source_word: יִחְיֶה
  english_pob_choice: he will live
  chosen_spanish: vivirá
  alternatives_spanish:
  - vivirá seguro
  - tendrá vida
  lexicon: HALOT
  rationale: El verbo señala el resultado de vida prometido en el marco judicial del capítulo. «Vivirá» es la forma directa, clara y fiel al futuro hebreo.
theological_decisions:
- issue: Valor forense de «no será recordada contra él» y relación entre memoria divina y culpa
  english_pob_reading: The transgressions will not be remembered against him.
  chosen_spanish_reading: Sus transgresiones no serán recordadas contra él.
  alternative_spanish_readings:
  - Sus transgresiones no le serán recordadas
  - Sus transgresiones no se tomarán en cuenta contra él
  rationale: La cláusula mantiene el sentido forense sin suavizarlo. «Contra él» conserva la carga judicial documentada en la POB inglesa; no se introduce una formulación doctrinal posterior más explícita que el hebreo.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Relación entre justicia practicada y vida prometida
  english_pob_reading: by the righteousness that he has practiced, he will live
  chosen_spanish_reading: por la justicia que ha practicado, vivirá.
  alternative_spanish_readings:
  - en su justicia vivirá
  - a causa de la justicia que ha practicado, vivirá
  rationale: 'Se conserva la tensión bíblica del texto: no se reinterpreta como justificación meritoria ni se reduce a mera prosperidad temporal. «Por» refleja el ב causal/instrumental señalado en la revisión inglesa.'
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Seguí la revisión más reciente del audit trail inglés al preferir una traducción directa de ב con «por» y mantener la relación forense de לּוֹ con «contra él». La formulación española busca reflejar esa decisión revisada sin añadir explicaciones doctrinales ajenas al versículo.
  spanish_consistency_notes:
  - Usé «Yahvé» no porque aparezca explícito en este versículo, sino como norma del proyecto cuando el Tetragrámaton esté presente; aquí no aplica.
  - Mantuve «justicia» para צדקה por coherencia con el uso legal/covenantal del contexto, aunque «rectitud» sería posible en otros pasajes.
  - Conservé la estructura de una sola cláusula negativa seguida de la promesa de vida para respetar el paralelismo hebreo.
