translation:
  language: es
  text: Jeque Koraj[a], jeque Gatam, jeque Amalec—estos son los jeques de Elifaz en la tierra de Edom; estos son los hijos de Adá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Koraj» sigue una transliteración española directa del hebreo; en otras tradiciones aparece «Korah».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלּוּף
  english_pob_choice: chief
  chosen_spanish: jefe
  alternatives_spanish:
  - caudillo
  - jefe de clan
  - líder
  lexicon: HALOT
  rationale: En Génesis 36, אַלּוּף designa un jefe tribal o de clan edomita. En español, 'jefe' comunica bien esa función de autoridad sin el tono arcaico de 'duque' y sin ampliar demasiado a 'líder'. Mantengo la repetición del término para reflejar la estructura hebrea.
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Koraj
  alternatives_spanish:
  - Korah
  lexicon: convención onomástica
  rationale: Se translitera el nombre propio de forma directa al español. 'Koraj' refleja mejor el valor consonántico hebreo que la forma inglesa tradicional.
- source_word: גַּעְתָּם
  english_pob_choice: Gatam
  chosen_spanish: Gatam
  alternatives_spanish:
  - Gaatam
  lexicon: convención onomástica
  rationale: Se adopta la forma que el propio POB inglés revisó como más fiel al hebreo y más estable en el contexto. En español, 'Gatam' es la transliteración más natural y reconocible.
- source_word: עֲמָלֵק
  english_pob_choice: Amalek
  chosen_spanish: Amalec
  alternatives_spanish:
  - Amalek
  lexicon: convención onomástica
  rationale: Se translitera el nombre propio en forma española usual. Aquí nombra a un jefe descendiente de Elifaz; no se introduce una paráfrasis etnográfica.
- source_word: אֵלֶּה
  english_pob_choice: these are
  chosen_spanish: estos son
  alternatives_spanish:
  - estos
  lexicon: HALOT
  rationale: La demostrativa hebrea introduce una cláusula identificadora. 'Estos son' hace natural la construcción sin alejarse de la sintaxis original.
- source_word: אַלּוּפֵי אֱלִיפַז
  english_pob_choice: the chiefs of Eliphaz
  chosen_spanish: los jefes de Elifaz
  alternatives_spanish:
  - los jefes/clanes de Elifaz
  lexicon: HALOT
  rationale: La construcción de estado constructo señala a los jefes asociados con Elifaz. 'Los jefes de Elifaz' conserva la relación posesiva o de pertenencia sin sobreinterpretarla.
- source_word: בְּאֶרֶץ אֱדֹם
  english_pob_choice: in the land of Edom
  chosen_spanish: en la tierra de Edom
  alternatives_spanish:
  - en Edom
  lexicon: HALOT
  rationale: Se mantiene 'tierra' porque el hebreo la expresa explícitamente y aporta el matiz territorial, no solo geográfico. 'Tierra de Edom' es natural en español bíblico contemporáneo.
- source_word: בְּנֵי עָדָה
  english_pob_choice: the sons of Adah
  chosen_spanish: los hijos de Adá
  alternatives_spanish:
  - los descendientes de Adá
  - los hijos de Ada
  lexicon: HALOT
  rationale: En contextos genealógicos, בְּנֵי puede significar descendientes, pero 'los hijos de Adá' reproduce más de cerca la fórmula hebrea. Se usa 'Adá' con acento para adecuar la pronunciación española.
theological_decisions:
- issue: אַלוּף como título social/genealógico edomita
  english_pob_reading: chief
  chosen_spanish_reading: jefe
  alternative_spanish_readings:
  - caudillo
  - líder
  rationale: No se suaviza a un término eclesiástico ni se interpreta como cargo monárquico. 'Jefe' preserva el valor de autoridad clan/tribal que el texto describe, coherente con el uso repetido en la genealogía edomita.
  doctrine_reference: Génesis 36:15-19; uso genealógico/tribal del título en Edom
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió el nombre a 'Gatam' desde 'Gaatham'; la redacción española sigue esa corrección y adopta 'Gatam'. No se observan otros cambios relevantes en el audit trail que requieran ajuste adicional.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como terminología base del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva la repetición de 'jefe/jefes' para reflejar el paralelismo y la estructura enumerativa del hebreo.
  - Se usa 'tierra de Edom' para respetar el sustantivo explícito 'אֶרֶץ'.
