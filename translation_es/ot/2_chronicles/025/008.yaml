  text: כִּ֚י אִם בֹּ֣א אַתָּ֔ה עֲשֵׂ֖ה חֲזַ֣ק לַ/מִּלְחָמָ֑ה יַכְשִֽׁילְ/ךָ֤ הָֽ/אֱלֹהִים֙ לִ/פְנֵ֣י אוֹיֵ֔ב כִּ֥י יֶשׁ כֹּ֛חַ בֵּ/אלֹהִ֖ים לַ/עְז֥וֹר וּ/לְ/הַכְשִֽׁיל־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/025/008.yaml
  text: But if you do go[a], act resolutely in battle; God will make you stumble before the enemy[b], for there is power in God to help and to make stumble.
