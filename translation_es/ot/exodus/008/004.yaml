translation:
  language: es
  text: 'Entonces el faraón llamó[a] a Moisés y a Aarón, y les dijo: “Rueguen a Yahvé, para que quite las ranas de mí y de mi pueblo, y dejaré ir al pueblo[b], para que sacrifiquen a Yahvé.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “llamó” en el sentido de convocar o hacer venir; no solo de pronunciar el nombre.'
    reason: lexical_alternative
  - marker: b
    text: 'También puede leerse: “y sacrifiquen a Yahvé”, con simple coordinación; aquí se refleja el sentido de finalidad probable.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרָא / לְמֹשֶׁה וּלְאַהֲרֹן
  english_pob_choice: called for Moses and Aaron
  chosen_spanish: llamó a Moisés y a Aarón
  alternatives_spanish:
  - hizo llamar a Moisés y a Aarón
  - mandó llamar a Moisés y a Aarón
  lexicon: HALOT
  rationale: Con קרא seguido de לְ personas, la idea es convocar o hacer venir a alguien. En español, “llamó a” conserva de manera natural la acción de convocarlos a su presencia sin sobrerrelatar el trámite.
- source_word: הַעְתִּירוּ
  english_pob_choice: Pray
  chosen_spanish: Rueguen
  alternatives_spanish:
  - Oren
  - Intercedan
  - Suplicen
  lexicon: HALOT
  rationale: El verbo en contexto no es una oración genérica, sino una súplica intensa o intercesión urgente. “Rueguen” comunica mejor esa fuerza que un simple “oren”, y mantiene el tono reverente.
- source_word: אֶל יְהוָה / לַיהוָה
  english_pob_choice: to Yahweh / to the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al SEÑOR
  - a Yahveh
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto, el Tetragrámaton se vierte “Yahvé” en el texto principal. El español usa la preposición “a” con el movimiento verbal de ruego y sacrificio.
- source_word: וְיָסֵר
  english_pob_choice: that he may remove
  chosen_spanish: para que quite
  alternatives_spanish:
  - para que aleje
  - para que retire
  lexicon: HALOT
  rationale: La forma causativa expresa la acción de apartar o quitar. “Quite” es natural y fiel; evita una paráfrasis más explicativa que diluiría la solicitud concreta del faraón.
- source_word: הַצְפַרְדְּעִים
  english_pob_choice: the frogs
  chosen_spanish: las ranas
  alternatives_spanish:
  - los sapos
  - las ranas del Nilo
  lexicon: HALOT
  rationale: El término hebreo designa anfibios de manera general, y en español bíblico “ranas” es la equivalencia más clara y tradicionalmente inteligible. Se evita precisar más de lo que el hebreo dice.
- source_word: מִמֶּנִּי וּמֵעַמִּי
  english_pob_choice: from me and from my people
  chosen_spanish: de mí y de mi pueblo
  alternatives_spanish:
  - lejos de mí y de mi pueblo
  - de sobre mí y de mi pueblo
  lexicon: HALOT
  rationale: Se conserva la repetición de la idea de alejamiento mediante “de mí y de mi pueblo”, que en español suena natural y mantiene el énfasis personal y nacional del hebreo.
- source_word: וַאֲשַׁלְּחָה אֶת הָעָם
  english_pob_choice: and I will let the people go
  chosen_spanish: y dejaré ir al pueblo
  alternatives_spanish:
  - y soltaré al pueblo
  - y enviaré al pueblo
  - y los dejaré ir
  lexicon: HALOT
  rationale: שׁלח con el pueblo en Éxodo funciona como fórmula de liberación. “Dejaré ir” preserva ese uso recurrente y evita una traducción demasiado literal como “enviaré” que en español puede sonar extraña aquí.
- source_word: וְיִזְבְּחוּ
  english_pob_choice: so that they may sacrifice
  chosen_spanish: para que sacrifiquen
  alternatives_spanish:
  - y sacrifiquen
  - a fin de que sacrifiquen
  - para que ofrezcan sacrificios
  lexicon: HALOT
  rationale: En este contexto la forma prefijada expresa finalidad o resultado esperado. “Para que sacrifiquen” hace clara la relación sin introducir una interpretación más fuerte que la que el hebreo obliga.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El proyecto español usa “Yahvé” como forma principal del nombre del pacto, en continuidad con el criterio del proyecto y sin ocultar el Tetragrámaton tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Relación final entre la liberación solicitada y el sacrificio
  english_pob_reading: 'purpose/result: ''so that they may sacrifice to Yahweh'''
  chosen_spanish_reading: 'finalidad explícita: “para que sacrifiquen a Yahvé”'
  alternative_spanish_readings:
  - 'coordinación simple: “y sacrifiquen a Yahvé”'
  - 'resultado implícito: “de modo que sacrifiquen a Yahvé”'
  rationale: La forma verbal hebrea permite entender una finalidad. En español, “para que” comunica bien esa meta solicitada por el faraón y evita borrar la relación lógica que el contexto sugiere.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'El borrador español sigue el acuerdo alto del control cruzado y mantiene las decisiones clave del audit trail inglés: convocación de Moisés y Aarón, ruego urgente, nombre divino con Yahvé, y la cláusula final como finalidad. No se introdujeron cambios sustantivos respecto de la última pasada revisada.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” para יהוה en todo el verso, conforme al estándar del proyecto.
  - Se conserva el paralelismo “de mí y de mi pueblo” para reflejar la repetición hebrea de מִן.
  - “Dejaré ir al pueblo” preserva la fórmula técnica de Éxodo para liberar al pueblo.
  - El registro es bíblico pero claro en español moderno, sin calcos innecesarios.
