  yaml_path: translation/deuterocanon/2_maccabees/007/024.yaml
  text: But Antiochus[a], thinking that he was being despised and taking note of the reproachful tone, while the youngest was still alive, not only urged him with words, but also assured him with oaths that he would both make him rich and make him blessed, if he turned away from the traditions of his fathers[c][b], and that he would have him as a friend and entrust him with offices.
