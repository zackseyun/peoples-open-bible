translation:
  language: es
  text: Porque mi espada está empapada en los cielos[a]; he aquí, descenderá sobre Edom, sobre el pueblo consagrado a la destrucción[b], para juicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "está saciada en los cielos" / "ha bebido hasta saciarse en los cielos". La imagen hebrea presenta la espada de Yahvé saturada antes de descender en juicio.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "el pueblo de mi ḥérem"; es decir, el pueblo apartado o entregado a destrucción bajo el juicio divino.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Conserva la fuerza explicativa o causal del hebreo en un español natural y bíblicamente digno.
- source_word: רִוְּתָה
  english_pob_choice: is drenched
  chosen_spanish: está empapada
  alternatives_spanish:
  - está saturada
  - está saciada
  - ha bebido hasta saciarse
  lexicon: HALOT
  rationale: La imagen metáfora de la espada saturada por sangre o violencia se comunica con claridad en español con 'empapada', sin perder el matiz de plenitud del verbo hebreo.
- source_word: בַשָּׁמַיִם
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en el firmamento
  lexicon: HALOT
  rationale: '''Cielos'' conserva el plural hebreo y el registro elevado mejor que ''cielo'' en singular.'
- source_word: חַרְבִּי
  english_pob_choice: my sword
  chosen_spanish: mi espada
  alternatives_spanish:
  - mi arma
  - mi espada de juicio
  lexicon: HALOT
  rationale: La posesión divina es directa; 'espada' mantiene la imagen judicial y bélica del contexto.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - mira bien
  - véase
  lexicon: HALOT
  rationale: '''He aquí'' reproduce de forma solemne la deíxis del hebreo y corresponde al tono del registro POB.'
- source_word: עַל אֱדוֹם
  english_pob_choice: on Edom
  chosen_spanish: sobre Edom
  alternatives_spanish:
  - contra Edom
  - contra Idumea
  lexicon: HALOT
  rationale: '''Sobre'' preserva el movimiento descendente de la espada; ''contra'' explicita la hostilidad pero suaviza la imagen espacial del texto.'
- source_word: תֵּרֵד
  english_pob_choice: it will descend
  chosen_spanish: descenderá
  alternatives_spanish:
  - bajará
  - caerá
  lexicon: HALOT
  rationale: Mantiene el verbo de movimiento hacia abajo sin añadir la connotación de caída accidental que podría traer 'caerá'.
- source_word: עַם חֶרְמִי
  english_pob_choice: the people of my ban
  chosen_spanish: el pueblo de mi herem
  alternatives_spanish:
  - el pueblo de mi anatema
  - el pueblo consagrado a destrucción
  lexicon: HALOT
  rationale: Se conserva el término técnico 'herem' porque la versión inglesa revisada optó por la literalidad documentada y porque en español no hay un equivalente único que no interprete en exceso. Al mantener el hebraísmo, se preserva la tensión lexical del juicio devoto a destrucción.
- source_word: לְמִשְׁפָּט
  english_pob_choice: for judgment
  chosen_spanish: para juicio
  alternatives_spanish:
  - para sentencia
  - para hacer justicia
  lexicon: HALOT
  rationale: '''Juicio'' conserva la amplitud forense del sustantivo hebreo y sugiere tanto veredicto como acto judicial divino.'
theological_decisions:
- issue: Rendering of חֵרֶם / חֶרְמִי in a judgment oracle
  english_pob_reading: the people of my ban
  chosen_spanish_reading: el pueblo de mi herem
  alternative_spanish_readings:
  - el pueblo de mi anatema
  - el pueblo consagrado a destrucción
  - el pueblo bajo mi ban
  rationale: El POB inglés revisado prefirió una forma más literal ('ban') para reflejar la base hebrea sin expandirla interpretativamente. En español, 'ban' sería opaco; por eso se retiene el hebraísmo 'herem' para no perder la tensión terminológica ni imponer una paráfrasis doctrinal. La nota explica el sentido de destrucción judicial.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Metaphor of the sword being saturated in the heavens
  english_pob_reading: is drenched in the heavens
  chosen_spanish_reading: está empapada en los cielos
  alternative_spanish_readings:
  - está saturada en los cielos
  - está saciada en los cielos
  rationale: La imagen no describe un estado físico ordinario sino una espada colmada antes de actuar en juicio. 'Empapada' conserva la metáfora violenta y la idea de saturación sin diluir el carácter poético del hebreo.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El texto sigue la última revisión inglesa en su preferencia por una formulación más literal de חֶרֶם, pero adapta el hebraísmo al español mediante 'herem' para evitar opacidad. También mantiene el registro solemne de 'he aquí' y conserva la metáfora ascendente/descendente de la espada sin domesticarla.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma española estándar del nombre divino en notas y contexto cuando sea necesario, aunque este versículo no lo explicita en el cuerpo.
  - 'Se preserva el paralelismo espacial del hebreo: ''en los cielos'' / ''sobre Edom''.'
  - No se sustituye 'herem' por 'anatema' o 'maldición' en el texto principal para no borrar la distinción técnica del término hebreo.
