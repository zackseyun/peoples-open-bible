translation:
  language: es
  text: Aun si estás forzado[a], espera los manjares con paciencia[b], y te traerá descanso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego dice: «Uno que ora y uno que maldice, ¿cuál de las dos voces escuchará el Señor?». Esto refleja una tradición textual sustancialmente diferente del hebreo conservado aquí.'
    reason: alternative_reading
  - marker: b
    text: El hebreo de este versículo es incierto y difiere marcadamente del testimonio griego; «forzado» intenta rendir una forma difícil que puede significar «compelido» o «bajo presión».
    reason: textual_variant
lexical_decisions:
- source_word: וגם אם
  english_pob_choice: Even if
  chosen_spanish: Aun si
  alternatives_spanish:
  - Y aun si
  - Aunque
  lexicon: HALOT
  rationale: La combinación introduce una concesión; «Aun si» conserva el matiz de posibilidad adversa sin sonar tan interpretativo como «aunque».
- source_word: נאנסתה
  english_pob_choice: you are constrained
  chosen_spanish: estás oprimido
  alternatives_spanish:
  - estás forzado
  - estás compelido
  - estás bajo presión
  lexicon: HALOT
  rationale: La forma hebrea es textualmente difícil y el contexto no favorece una lectura sexual. «Oprimido» comunica coacción o presión externa de manera digna y natural en español, preservando la tensión del testimonio hebreo.
- source_word: במטעמים
  english_pob_choice: for delicacies
  chosen_spanish: las delicias
  alternatives_spanish:
  - manjares
  - buenos alimentos
  - platos selectos
  lexicon: HALOT
  rationale: מטעמים designa alimentos sabrosos o selectos. «Delicias» es breve, elevado y fiel al campo semántico sin forzar una paráfrasis.
- source_word: קוה קוה
  english_pob_choice: wait ... patiently
  chosen_spanish: espera ... con paciencia
  alternatives_spanish:
  - espera ... una y otra vez
  - aguarda ... con insistencia
  - espera ... esperando
  lexicon: HALOT
  rationale: La repetición intensiva se refleja mejor en español con una construcción adverbial que en una duplicación artificial. «Con paciencia» conserva la perseverancia requerida por el hebreo y coincide con el audit trail inglés.
- source_word: וינוח לך
  english_pob_choice: it will bring you rest
  chosen_spanish: te traerá descanso
  alternatives_spanish:
  - y tendrás descanso
  - y reposará para ti
  - y te dará reposo
  lexicon: HALOT
  rationale: El verbo נוח expresa reposo o alivio. «Te traerá descanso» mantiene el resultado práctico y suena natural en español sin añadir un sujeto explícito que el hebreo no requiere.
theological_decisions:
- issue: Desajuste mayor entre el hebreo conservado y el paralelo griego
  english_pob_reading: Translate the extant Hebrew as the main text while acknowledging that the Greek parallel reflects a substantially different verse.
  chosen_spanish_reading: Traducir el hebreo conservado como texto principal y señalar que el paralelo griego transmite una formulación sustancialmente distinta.
  alternative_spanish_readings:
  - '«Uno que ora y uno que maldice: ¿la voz de quién escuchará el Dueño?»'
  - «El paralelo griego ofrece un dicho alterno, no una simple variante menor.»
  rationale: El expediente marca major_mismatch, así que la tradición griega no puede tratarse como una glosa menor. La decisión española sigue el hebreo principal, pero preserva en nota la alternativa griega para no borrar la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva en Sirácida, preservando honestamente la incertidumbre de la fuente'
translation_notes:
  revision_awareness: El borrador inglés pasó por una revisión que prefirió «patiently» frente a una repetición más literal; la versión española sigue esa decisión con «con paciencia», manteniendo la intensidad del hebreo sin sonar forzado. También se reconoció que el verso presenta una discordancia importante entre hebreo y griego, por lo que la nota debe conservar esa divergencia sin armonizarla artificialmente.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se evita «Mesías»/«Cristo» porque no aparecen en el texto.
  - Se mantiene un registro digno y moderno, evitando calcos innecesarios como «una y otra vez» para la intensificación hebrea.
  - «Oprimido» se eligió por claridad contextual; no se introduce un sentido sexual ajeno al pasaje.
