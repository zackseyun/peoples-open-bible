  glossary_alignment: No hay conflicto con la terminología marco del proyecto. «plata» para כֶּסֶף y «precio de novia» para מֹהַר están bien justificados. La decisión de mantener el giro matrimonial idiomático concuerda con la auditoría inglesa, pero el anclaje de la nota alternativa debe moverse al lugar del modismo.
