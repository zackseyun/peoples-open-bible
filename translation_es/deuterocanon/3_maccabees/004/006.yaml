review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la escena y la mayoría de las decisiones léxicas del griego: la inmediatez de ἄρτι, el ámbito nupcial de γαμικὸν ... παστόν, el contraste entre gozo y lamento, el cabello perfumado cubierto de polvo, la condición de ir descubiertas, y la comparación final con mujeres desgarradas por ultrajes de extranjeros. Sin embargo, hay pequeñas pérdidas de fuerza y naturalidad: «comunión de la vida» suena poco idiomático para πρὸς βίου κοινωνίαν; «mezclado con polvo» debilita πεφυρμέναι; y la secuencia sintáctica puede ajustarse para reflejar mejor los participios coordinados y el énfasis en que eran llevadas descubiertas.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero presenta alguna rigidez calcada del inglés/griego. «Para la comunión de la vida en el matrimonio» resulta menos natural que «para compartir la vida en matrimonio»; «mezclado con polvo» es menos vívido que «embarrado/embadurnado de polvo»; y «con un mismo sentir» es comprensible pero algo formularia aquí, donde «unánimes» o «a una» suena más fluido. La revisión propuesta conserva el tono literario y mejora la legibilidad en español eclesial general.
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. Las decisiones principales son compatibles con la guía: «jóvenes», «cámara nupcial», «sin velo» y «cantos nupciales» son adecuadas. Se recomienda apartarse de «comunión» en este contexto no sacramental para evitar un matiz eclesiástico innecesario.'
  issues:
  - severity: medium
    issue: «para la comunión de la vida en el matrimonio» suena poco idiomático y demasiado eclesiástico
    rationale: πρὸς βίου κοινωνίαν expresa compartir o participar de la vida conyugal. En español bíblico moderno, «compartir la vida en matrimonio» preserva el sentido sin introducir una resonancia sacramental ajena al contexto.
  - severity: medium
    issue: «mezclado con polvo» atenúa la imagen de πεφυρμέναι
    rationale: El griego transmite una acción de ensuciar/embadurnar el cabello perfumado con polvo. «Embadurnado de polvo» o similar refleja mejor la profanación visual del arreglo nupcial.
  - severity: low
    issue: La colocación de «llevadas sin velo» puede mejorarse a «siendo llevadas descubiertas/sin velo»
    rationale: ἀκαλύπτως modifica la manera en que eran conducidas. Una formulación verbal más integrada reproduce mejor el valor adverbial y la continuidad de los participios.
  - severity: low
    issue: «con un mismo sentir» es algo rígido en este contexto
    rationale: ὁμοθυμαδόν aquí describe acción colectiva y unánime en el lamento. «Unánimes» mantiene el sentido y suena más natural en español actual.
