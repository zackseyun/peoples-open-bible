translation:
  language: es
  text: Vivirá contigo[a], en medio de ti, en el lugar que él escoja, dentro de una de tus puertas, donde le parezca mejor[b]; no lo oprimirás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habitará contigo ... donde le parezca mejor».'
    reason: lexical_alternative
  - marker: b
    text: «Dentro de una de tus puertas» es un hebraísmo que se refiere al asentamiento dentro de una de tus ciudades o comunidades.
    reason: cultural_note
lexical_decisions:
- source_word: יֵשֵׁב
  english_pob_choice: shall live
  chosen_spanish: vivirá
  alternatives_spanish:
  - habitará
  - morará
  lexicon: HALOT
  rationale: El hebreo expresa residencia continua; en español, "vivirá" comunica de forma natural esa permanencia. "Habitará" y "morará" son posibles, pero suenan más marcados o más tradicionales sin añadir precisión necesaria.
- source_word: עִמְּךָ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con ustedes
  - junto a ti
  lexicon: HALOT
  rationale: El sufijo masculino singular exige trato singular en español. "Contigo" mantiene la relación personal directa del hebreo y resulta más fluido que una formulación perifrástica.
- source_word: בְּקִרְבְּךָ
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - en tu medio
  - en tu interior
  lexicon: HALOT
  rationale: La imagen de estar dentro de la comunidad se conserva mejor con "en medio de ti". Es una equivalencia idiomática clara para el hebreo comunitario de קרב.
- source_word: בַּמָּקוֹם אֲשֶׁר יִבְחַר
  english_pob_choice: in the place that he chooses
  chosen_spanish: en el lugar que él escoja
  alternatives_spanish:
  - en el lugar que él elija
  - en el lugar que él escogerá
  lexicon: HALOT
  rationale: Se conserva el sujeto masculino singular del texto hebreo y la idea de elección personal. "Escoja" mantiene el valor de elección sin volver la frase rígidamente futura en español.
- source_word: בְּאַחַד שְׁעָרֶיךָ
  english_pob_choice: within one of your gates
  chosen_spanish: dentro de una de tus puertas
  alternatives_spanish:
  - en una de tus ciudades
  - dentro de una de tus ciudades
  lexicon: HALOT
  rationale: Se mantiene el símil hebreo de "puertas" como metonimia de ciudades o comunidades, siguiendo la decisión inglesa de preservar la imagen idiomática. En español, "dentro de" hace la relación más natural.
- source_word: בַּטּוֹב ל֑וֹ
  english_pob_choice: wherever it is good for him
  chosen_spanish: donde le sea bueno
  alternatives_spanish:
  - donde le parezca mejor
  - donde le convenga
  lexicon: HALOT
  rationale: La expresión hebrea comunica lo que es bueno para él. "Donde le sea bueno" conserva esa ambigüedad beneficiosa sin convertirla en una paráfrasis psicológica más fuerte.
- source_word: לֹא תּוֹנֶנּוּ
  english_pob_choice: you shall not oppress him
  chosen_spanish: no lo oprimirás
  alternatives_spanish:
  - no lo maltratarás
  - no lo agraviarás
  lexicon: HALOT
  rationale: El Hifil de ינה en contexto legal apunta a opresión o trato abusivo; "oprimir" conserva mejor esa fuerza que "maltratar". Se mantiene el singular masculino del objeto directo, como en el hebreo.
theological_decisions:
- issue: Referencia del sujeto masculino singular y del destinatario vulnerable
  english_pob_reading: The verse refers to the escaped slave/servant from the previous verse as an individual male in grammatical form, rendered with masculine singular English pronouns.
  chosen_spanish_reading: 'El verso mantiene al individuo masculino en formas singulares: "él", "le", "lo".'
  alternative_spanish_readings:
  - Usar formas inclusivas como "quienquiera" o "le" sin marcar género
  - Neutralizar el objeto con construcciones impersonales
  rationale: El hebreo usa formas masculinas singulares y la lectura de la POB preserva esa referencia gramatical. En español, mantener "él" y "lo" evita borrar una distinción presente en la fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La versión inglesa auditada no muestra revisiones aplicadas y fue confirmada como de alta concordancia; este borrador sigue de cerca sus decisiones léxicas, preservando el idiomatismo hebreo de «puertas» y la fuerza legal de la prohibición final.
  spanish_consistency_notes:
  - Se mantiene el paralelismo entre "contigo" y "en medio de ti" para reflejar עִמְּךָ / בְּקִרְבְּךָ.
  - Se conserva el sujeto singular masculino del contexto previo con "él" y la referencia pronominal con "le/lo".
  - '"Puertas" se usa como imagen idiomática, no como referencia literal a entradas físicas solamente.'
  - '"Oprimir" se eligió por su fuerza legal y social, acorde con el uso del hebreo en contexto normativo.'
