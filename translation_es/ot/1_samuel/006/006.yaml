base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/006/006.yaml
  text: Why then do you harden your hearts[a], as Egypt and Pharaoh hardened their hearts? Was it not when he dealt severely with them that they sent them away[b], and they departed?
  footnotes:
  - marker: a
    text: Or 'make your hearts heavy' / 'made their hearts heavy.' The Hebrew idiom uses 'heavy' for a hardened heart.
    reason: lexical_alternative
  - marker: b
    text: The 'them' in 'he dealt harshly with them' refers to Egypt and Pharaoh; the 'them' in 'they sent them away' refers to Israel.
    reason: cross_reference
