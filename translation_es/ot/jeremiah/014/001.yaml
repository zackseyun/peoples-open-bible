translation:
  language: es
  text: La palabra de Yahvé que vino a Jeremías acerca de las sequías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'acerca de los asuntos de las sequías' o 'acerca de la sequía'. El hebreo usa una forma plural, que puede referirse a sequías repetidas o a crisis relacionadas con la sequía.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: HALOT
  rationale: Introduce la oración relativa que retoma la fórmula profética. En español, 'que' es la opción más natural y fiel para una cabecera de este tipo.
- source_word: הָיָה
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - era
  - sucedió
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'fue/estuvo', la fórmula profética הָיָה דְבַר־יְהוָה אֶל expresa que la palabra divina llegó al profeta. 'Vino' conserva ese valor idiomático sin volverlo torpe en español.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: '''Palabra'' preserva el vínculo léxico con דָּבָר y mantiene la fórmula profética estándar. Se usa ''Yahvé'' conforme al criterio del proyecto para יהוה.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se representa con el nombre propio 'Yahvé', de acuerdo con la política del proyecto y para no sustituirlo por un título.
- source_word: אֶל יִרְמְיָהוּ
  english_pob_choice: to Jeremiah
  chosen_spanish: a Jeremías
  alternatives_spanish:
  - hacia Jeremías
  lexicon: HALOT
  rationale: La preposición de dirección/recipiencia se expresa de forma natural en español con 'a'. 'Jeremías' identifica al destinatario del mensaje.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - respecto de
  lexicon: HALOT
  rationale: En este encabezado introduce el tema del oráculo. 'Acerca de' mantiene el valor temático sin añadir matiz polémico o direccional.
- source_word: דִּבְרֵי
  english_pob_choice: concerning
  chosen_spanish: las
  alternatives_spanish:
  - los asuntos de
  - las cosas de
  lexicon: HALOT
  rationale: En la construcción עַל דִּבְרֵי, el sustantivo funciona de manera idiomática como referencia al asunto. En español se integra naturalmente en la locución 'acerca de las...' sin forzar una traducción literal de 'palabras' o 'asuntos'.
- source_word: הַבַּצָּרוֹת
  english_pob_choice: the droughts
  chosen_spanish: las sequías
  alternatives_spanish:
  - la sequía
  - las penurias por la sequía
  lexicon: HALOT
  rationale: El plural hebreo se preserva con 'sequías'. Esta opción deja visible la pluralidad del texto fuente y evita reducirla prematuramente a singular.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la política del proyecto de transliterar el Nombre divino en vez de sustituirlo por un título. 'Yahvé' es la forma establecida para el texto español de este proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El pasaje coincide con el audit trail inglés en su carácter de encabezado profético breve. No se requieren revisiones adicionales; se preserva la fórmula idiomática y el plural hebreo de 'sequías'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente con la política del proyecto para יהוה.
  - '''Palabra'' conserva el paralelismo con la fórmula profética estándar sin cambiarla por ''mensaje''.'
  - Se usa un registro sobrio y publicable, con puntuación española y sintaxis natural.
  - La nota textual conserva la ambigüedad del plural hebreo sin resolverla de modo excesivamente interpretativo.
