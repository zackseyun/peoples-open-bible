    rationale: El texto español pone [a] en «dioses», pero la evidencia inglesa muestra que la alternativa relevante pertenece a «los samaritanos habían hecho». «O, “de cada nación”» no corresponde a ninguna variante documentada ni al hebreo de este versículo.
