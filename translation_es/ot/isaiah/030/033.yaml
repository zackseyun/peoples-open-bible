    reason: lexical_alternative
  - marker: c
    text: Tradicionalmente, algunas traducciones usan una expresión como «azufre ardiente»; el sentido básico aquí es «azufre».
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto casi intacto, pero se corrige «La han hecho» a «La ha hecho» para reflejar mejor los verbos hebreos en singular. También se reescribe la nota c para ajustarla al motivo léxico documentado sin introducir formulaciones anglicadas o confusas en español.
