review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: transición (''Pero ahora''), nombre divino ''Yahvé'', plazo fijo (''Dentro de tres años, como los años de un jornalero''), humillación de la gloria de Moab y pequeñez del remanente. Sin embargo, omite dos alternativas léxicas preservadas en el rastro inglés para וְנִקְלָה y para la cláusula final del remanente, y contiene una formulación española poco natural en ''el remanente será poco''.'
  spanish_quality_summary: El español es claro y digno en general, pero 'el remanente será poco' suena gramaticalmente forzado; en español natural debe decirse 'será escaso' o 'serán pocos'. También conviene reordenar las notas para que no quede una sola nota anclada a una frase posterior mientras faltan otras alternativas significativas ya documentadas. 'No poderoso' es aceptable, pero en combinación con 'remanente' funciona mejor dentro de una secuencia más idiomática.
  glossary_alignment: 'Alineación correcta con la terminología del proyecto: יְהוָה -> ''Yahvé''; כְּבוֹד -> ''gloria''; שְׁאָר -> ''remanente''. No hay conflicto doctrinal. ''Jornalero'' para שָׂכִיר es defendible y legible. La revisión propuesta mantiene estas decisiones y solo mejora naturalidad y cobertura de notas léxicas del POB.'
  issues:
  - severity: medium
    issue: 'Expresión poco natural: ''el remanente será poco'''
    rationale: Aunque intenta reflejar מְעַט, en español estándar 'remanente' no suele predicarse con 'ser poco'. La idea es cantidad escasa; 'será escaso, muy pequeño' comunica mejor el hebreo sin perder fuerza.
  - severity: medium
    issue: Faltan notas léxicas relevantes del rastro inglés
    rationale: El audit trail inglés preserva alternativas para וְנִקְלָה ('será deshonrada') y para la cláusula final ('pocos, muy pequeños, no grandes/fuertes'). El borrador español solo conserva la nota temporal, reduciendo trazabilidad léxica.
  - severity: low
    issue: Colocación y secuencia de marcas de nota mejorables
    rationale: La marca [a] aparece antes de 'poco' pero la nota se refiere a 'Dentro de tres años...'. Debe anclarse a la frase temporal correspondiente, y las nuevas notas deben seguir el orden a, b, c.
