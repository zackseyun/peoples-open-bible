revisions:
- from: Porque, ¿quién ha estado en el consejo de Yahvé[a], para que vea y oiga su palabra? ¿Quién ha prestado atención a mi palabra y la ha oído?
  to: Porque, ¿quién ha permanecido en el consejo de Yahvé[a], para que vea y oiga su palabra? ¿Quién ha prestado atención a mi palabra y la oyó?
