revisions:
- from: 'Y los fariseos y sus escribas murmuraban[a] contra sus discípulos, diciendo: «¿Por qué comen y beben con los recaudadores de impuestos y los pecadores?»'
  to: 'Y los fariseos y sus escribas murmuraban[a] a sus discípulos, diciendo: «¿Por qué ustedes comen y beben con los recaudadores de impuestos y los pecadores?»'
  rationale: Se corrige «contra» por «a» para reflejar fielmente πρός en contexto de habla dirigida. Se restituye la segunda persona plural del discurso directo con «ustedes comen y beben», que suena natural en español neutro y preserva la acusación directa a los discípulos. También se ajusta la nota para que no repita inútilmente la misma palabra del texto, sino que explique el matiz léxico documentado.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:56:53Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en la mayor parte del contenido léxico: «fariseos», «sus escribas», «murmuraban», «recaudadores de impuestos» y «pecadores» reflejan bien el griego y el rastro de auditoría en inglés. Sin embargo, se desvía en dos puntos importantes: (1) πρὸς τοὺς μαθητὰς αὐτοῦ significa que hablaban «a» o «a los discípulos», no «contra» ellos; el matiz hostil ya está en ἐγόγγυζον y no debe trasladarse a πρός. (2) ἐσθίετε καὶ πίνετε está en segunda persona plural y en discurso directo debe conservarse como «comen y beben» solo si se reestructura indirectamente; aquí corresponde «comen y beben ustedes» o más natural «ustedes comen y beben».'
  spanish_quality_summary: El español es claro y eclesialmente legible, pero «contra sus discípulos» suena interpretativo y menos fiel. Además, la pregunta con tercera persona («comen y beben») después de dirigirse a los discípulos crea una incoherencia de persona. Conviene ajustar a un español natural que mantenga el discurso directo y la segunda persona plural sin caer en un voseo regional; «ustedes comen y beben» funciona bien en español neutro.
  glossary_alignment: 'La terminología principal se alinea bien con las pautas del proyecto: «escribas» para γραμματεῖς, «recaudadores de impuestos» para τελῶναι y «pecadores» para ἁμαρτωλοί. No hay términos doctrinales de alto riesgo aquí. La única decisión léxica que choca con la auditoría es usar «contra» para πρός, donde la documentación inglesa explicitó «to his disciples».'
  issues:
  - severity: high
    issue: «contra sus discípulos» traduce incorrectamente πρὸς τοὺς μαθητὰς αὐτοῦ
    rationale: πρός con acusativo en este contexto de habla indica dirección del discurso, no oposición. El matiz polémico ya lo da «murmuraban»; añadir «contra» sobreinterpreta el griego y contradice la decisión auditada en inglés.
  - severity: high
    issue: «¿Por qué comen y beben...?» pierde la segunda persona plural de ἐσθίετε καὶ πίνετε
    rationale: Los fariseos se dirigen a los discípulos; por eso el griego usa segunda persona plural. La tercera persona española desajusta la escena comunicativa. Debe conservarse con «ustedes» o equivalente claro y natural.
  - severity: low
    issue: La nota al pie marcada como alternativa repite la misma palabra del texto
    rationale: El texto principal ya usa «murmuraban» y la nota dice «O “murmuraban”». Para que la nota aporte valor, debe ofrecer la alternativa documentada, por ejemplo «gruñían» no sería ideal, pero «se quejaban en voz baja» o «murmuraban» si el texto cambia a «refunfuñaban». Aquí lo más sencillo es mantener el texto y formular la nota como explicación de matiz, no como alternativa idéntica.
  revised_spanish_text: 'Y los fariseos y sus escribas murmuraban[a] a sus discípulos, diciendo: «¿Por qué ustedes comen y beben con los recaudadores de impuestos y los pecadores?»'
  revised_footnotes:
