translation:
  language: es
  text: Y cualquiera que toque algo que estuvo debajo de él será impuro[a] hasta el atardecer, y quien cargue esos objetos lavará sus vestidos y se bañará en agua[b], y será impuro hasta el atardecer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «algo que está debajo de él». El hebreo puede traducirse más literalmente en presente, pero el sentido retrospectivo encaja mejor con el contexto procedimental de objetos que ya habían estado debajo de la persona afectada.
    reason: lexical_alternative
  - marker: b
    text: «Esos objetos» se refiere colectivamente a los objetos contaminados asociados con lo que estuvo debajo de él.
    reason: cross_reference
lexical_decisions:
- source_word: הַנֹּגֵעַ
  english_pob_choice: who touches
  chosen_spanish: que toque
  alternatives_spanish:
  - que entra en contacto con
  - que toca
  lexicon: HALOT
  rationale: El participio expresa aquí contacto físico en un contexto de pureza ritual. «Que toque» conserva la fuerza directa del verbo נגע y suena natural en español legal-bíblico.
- source_word: בְּכֹל אֲשֶׁר יִהְיֶה תַחְתָּיו
  english_pob_choice: anything that was under him
  chosen_spanish: algo que estuvo debajo de él
  alternatives_spanish:
  - algo que está debajo de él
  - cualquier cosa que estuviera debajo de él
  - algo debajo de él
  lexicon: HALOT
  rationale: 'Sigo la lectura procedimental del contexto: se trata de objetos que habían estado debajo de la persona afectada. «Estuvo debajo de él» preserva el valor espacial de תַּחַת sin perder la referencia retrospectiva documentada en el audit trail inglés.'
- source_word: יִטְמָא
  english_pob_choice: shall be unclean
  chosen_spanish: será impuro
  alternatives_spanish:
  - quedará impuro
  - será inmundo
  lexicon: HALOT
  rationale: En legislación de pureza, טמא se vierte de forma más transparente como «impuro». Mantengo el registro jurídico de la obligación con futuro simple, equivalente al «shall» inglés.
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta la noche
  alternatives_spanish:
  - hasta la tarde
  - hasta el anochecer
  lexicon: HALOT
  rationale: «La noche» en español bíblico-legal comunica bien el corte temporal al final del día. «Hasta la noche» es idiomático y conserva la referencia temporal del hebreo con dignidad editorial.
- source_word: הַנּוֹשֵׂא אֹתָם
  english_pob_choice: whoever carries them
  chosen_spanish: quien cargue esos objetos
  alternatives_spanish:
  - quien los cargue
  - el que cargue esos objetos
  - quien los transporte
  lexicon: HALOT
  rationale: נשא aquí es portar/cargar. Elegí «cargue» porque en español transmite el acto físico de llevar objetos contaminados y evita ambigüedad con «llevar». «Esos objetos» explicita el antecedente colectivo de אֹתָם.
- source_word: יְכַבֵּס בְּגָדָיו
  english_pob_choice: shall wash his clothes
  chosen_spanish: lavará sus vestidos
  alternatives_spanish:
  - lavará sus ropas
  - lavará sus prendas
  - lavará sus vestidos
  lexicon: HALOT
  rationale: בְּגָדִים puede traducirse como «vestidos» en un registro bíblico claro y sobrio. Mantiene el eco legal-litúrgico sin sonar excesivamente arcaico; «ropas» es posible, pero menos preciso para el tono del pasaje.
- source_word: וְרָחַץ בַּמַּיִם
  english_pob_choice: and bathe in water
  chosen_spanish: y se bañará en agua
  alternatives_spanish:
  - y se lavará con agua
  - y se bañará con agua
  - y se lavará en agua
  lexicon: HALOT
  rationale: רָחַץ en esta fórmula ritual implica lavar el cuerpo. «Se bañará en agua» mantiene la imagen literal del hebreo y reproduce la formulación de purificación sin introducir explicaciones ajenas al texto.
- source_word: וְטָמֵא עַד הָעָרֶב
  english_pob_choice: and be unclean until the evening
  chosen_spanish: y será impuro hasta la noche
  alternatives_spanish:
  - y quedará impuro hasta la noche
  - y será inmundo hasta la noche
  lexicon: HALOT
  rationale: La cláusula final repite el estado de impureza tras el baño. «Será impuro» conserva la simetría del verso y la terminología consistente para טמא.
translation_notes:
  revision_awareness: El borrador sigue de cerca el resultado inglés auditado y conserva su decisión contextual de leer el sintagma hebreo con sentido retrospectivo («estuvo debajo de él») en vez de un presente más mecánico. No hay revisiones previas aplicadas en el paquete fuente.
  spanish_consistency_notes:
  - Uso «impuro» de manera uniforme para טמא en todo el versículo.
  - Conservo «hasta la noche» para עַד הָעָרֶב en ambas apariciones, a fin de mantener la simetría legal del texto.
  - 'Distinguir «vestidos» de «agua» ayuda a mantener la secuencia ritual: lavar prendas, bañarse, permanecer impuro hasta la noche.'
  - «Quien cargue» refleja el valor genérico del participio hebreo sin convertirlo en una referencia singular definida.
