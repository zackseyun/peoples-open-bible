translation:
  language: es
  text: Los pensamientos de los justos son justicia[a]; los consejos de los impíos son engaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Justicia» conserva el sustantivo hebreo מִשְׁפָּט. La versión inglesa POB lo volvió adjetivo («just») para sonar natural en inglés, pero en español el sustantivo funciona con claridad y preserva mejor el paralelo con «engaño».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַחְשְׁבוֹת
  english_pob_choice: thoughts
  chosen_spanish: pensamientos
  alternatives_spanish:
  - planes
  - intenciones
  lexicon: HALOT
  rationale: El sustantivo puede abarcar pensamientos, planes o intenciones. «Pensamientos» conserva el contraste interior del proverbio y resulta natural en español, sin borrar la amplitud semántica documentada.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - personas justas
  lexicon: HALOT
  rationale: Es un adjetivo sustantivado para personas caracterizadas por justicia. «Los justos» es conciso, idiomático y mantiene el plural representativo.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - derecho
  - rectitud
  lexicon: HALOT
  rationale: El hebreo aquí funciona como un sustantivo en paralelo con «engaño». Por eso se conserva la forma nominal «justicia», que refleja con más precisión el contraste léxico que una traducción adjetival.
- source_word: תַּחְבֻּל֖וֹת
  english_pob_choice: counsels
  chosen_spanish: consejos
  alternatives_spanish:
  - planes
  - estrategias
  - maniobras
  lexicon: HALOT
  rationale: El término puede referirse a dirección, guía o planificación estratégica. «Consejos» comunica deliberación y encaja bien con el paralelismo sin cargar innecesariamente el matiz hacia maquinación.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  lexicon: HALOT
  rationale: Es un adjetivo sustantivado para personas caracterizadas por maldad. «Los impíos» es una forma bíblica clara y comprensible en español, y conserva el contraste moral con «los justos».
- source_word: מִרְמָה
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - decepción
  - fraude
  - traición
  lexicon: HALOT
  rationale: El sustantivo denota engaño, fraude o deslealtad. «Engaño» es directo y idiomático en español, y mantiene la cualidad moral negativa del paralelismo.
translation_notes:
  revision_awareness: La revisión inglesa documentada cambió de «just» a «justice» para reflejar mejor מִשְׁפָּט como sustantivo. La presente versión española sigue esa revisión y evita la tentación de volverlo adjetivo; también mantiene el contraste nominal con מִרְמָה («engaño»).
  spanish_consistency_notes:
  - Se mantuvo la terminología moral bíblica «justos/impíos» por ser transparente y coherente con el paralelismo sapiencial.
  - Se prefirió «justicia» sobre «juicio» porque el contexto exige una cualidad o contenido moral, no un acto judicial.
  - «Consejos» se eligió como equivalente natural de תַּחְבֻּל֖וֹת sin intensificar el tono hacia «maquinaciones».
