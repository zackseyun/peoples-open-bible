base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/010/007.yaml
  text: Who would not fear you[a], O King of the nations? For this is your due; for among all the wise men of the nations and in all their kingdoms[b], there is none like you.
  footnotes:
  - marker: a
    text: Or 'Who should not fear you ... ?' The Hebrew rhetorical question can express either what would happen or what is proper.
    reason: lexical_alternative
  - marker: b
    text: Or 'it is due to you' / 'it befits you.' The sense is that such fear rightly belongs to him.
    reason: lexical_alternative
