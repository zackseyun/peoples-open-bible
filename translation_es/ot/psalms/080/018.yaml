review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: súplica jussiva, metáfora de la mano, paralelismo entre ''el hombre de tu derecha'' y ''el hijo de hombre'', y el verbo ''fortalecer''. También preserva la ambigüedad no resuelta entre lectura humana, real y posiblemente mesiánica. Sin embargo, dos decisiones españolas no representan bien ni el hebreo ni la filosofía auditada: ''el hombre de tu mano derecha'' suena torpe y sobreexplicita ''mano'' donde el hebreo usa el idiomático ''tu derecha''; y ''el hijo de hombre'' es poco natural en español bíblico y no refleja adecuadamente la expresión fija בֶּן אָדָם, para la cual el propio expediente inglés preserva ''son of man''.'
  spanish_quality_summary: La frase es mayormente comprensible, pero 'el hombre de tu mano derecha' y especialmente 'el hijo de hombre' afectan la naturalidad y la legibilidad eclesial. Un español más fiel y más claro sería 'el hombre de tu derecha' con nota alternativa 'a tu derecha', y 'el hijo del hombre' con nota explicativa sobre su posible sentido de 'ser humano' y resonancia real/mesiánica.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La cuestión principal es idiomática y de fidelidad a una expresión hebrea fija: conviene mantener ''hijo del hombre'' en español, que además conserva mejor la resonancia literaria reconocida por el expediente inglés.'
  issues:
  - severity: medium
    issue: '''el hombre de tu mano derecha'''
    rationale: Aunque intenta seguir literalmente אִישׁ יְמִינֶךָ, en español resulta torpe. El hebreo usa 'tu derecha' idiomáticamente; 'mano derecha' añade una concreción poco natural. 'El hombre de tu derecha' preserva mejor el sentido y el registro.
  - severity: high
    issue: '''el hijo de hombre'''
    rationale: Esta formulación es antinatural en español bíblico y no es la manera establecida de reflejar בֶּן אָדָם. 'El hijo del hombre' conserva la expresión reconocible y la posible resonancia real/mesiánica sin imponer una lectura doctrinal.
  - severity: low
    issue: Nota a desalineada con el texto principal
    rationale: Si el texto principal se corrige a 'tu derecha', la nota debe ofrecer una alternativa distinta y significativa. La audit trail inglesa conserva la alternativa 'at your right hand'; en español, esto se expresa mejor como 'el hombre a tu derecha' frente al texto principal 'el hombre de tu derecha'.
  revised_spanish_text: Sea tu mano sobre el hombre de tu derecha[a], sobre el hijo del hombre[b] que has fortalecido para ti.
  revised_footnotes:
