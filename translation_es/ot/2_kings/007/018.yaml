translation:
  language: es
  text: 'Y aconteció que, así como el hombre de Dios había hablado al rey, diciendo: «Dos seás[a] de cebada por un siclo, y un seá de flor de harina por un siclo, será mañana como a esta hora en la puerta de Samaria[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La unidad de medida hebrea se conserva en el texto; equivale a una antigua medida seca, sin sustituirla por una equivalencia moderna en la línea principal.
    reason: cultural_note
  - marker: b
    text: También puede entenderse «a la puerta de Samaria»; la puerta de la ciudad era el lugar público de comercio y de decisiones.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y fue
  lexicon: WLC / HALOT
  rationale: La fórmula narrativa introduce el cumplimiento de lo dicho; «aconteció» conserva el tono bíblico sin sonar arcaico en exceso.
- source_word: כְּדַבֵּר
  english_pob_choice: just as ... had spoken
  chosen_spanish: así como ... había hablado
  alternatives_spanish:
  - cuando ... habló
  - conforme a lo que ... dijo
  lexicon: WLC / HALOT
  rationale: El כ con infinitivo expresa correspondencia con la palabra pronunciada; el pluscuamperfecto español refleja bien la anterioridad respecto del cumplimiento.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el profeta
  - el varón de Dios
  lexicon: WLC / HALOT
  rationale: Se conserva el título hebreo de forma directa; «hombre de Dios» es fiel y claro en español actual.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que
  lexicon: WLC / HALOT
  rationale: Introducción estándar del discurso directo; «diciendo» mantiene la estructura formal del hebreo.
- source_word: סָאתַיִם
  english_pob_choice: Two seahs
  chosen_spanish: Dos seás
  alternatives_spanish:
  - Dos medidas
  - Unos 14 litros
  lexicon: WLC / HALOT
  rationale: Se conserva la unidad de medida antigua porque el texto especifica un precio y una cantidad concretos; no se sustituye por una equivalencia moderna en el cuerpo del verso.
- source_word: שְׂעֹרִים
  english_pob_choice: barley
  chosen_spanish: cebada
  alternatives_spanish:
  - cebada en grano
  lexicon: WLC / HALOT
  rationale: Equivalente léxico directo y natural en español.
- source_word: בְּשֶׁקֶל
  english_pob_choice: for a shekel
  chosen_spanish: por un siclo
  alternatives_spanish:
  - a un siclo
  - a razón de un siclo
  lexicon: WLC / HALOT
  rationale: En fórmulas de precio, «por» expresa mejor el valor pagado; se usa «siclo» como transliteración usual del peso/moneda antigua.
- source_word: וּסְאָה
  english_pob_choice: and one seah
  chosen_spanish: y un seá
  alternatives_spanish:
  - y una medida
  - y un seah
  lexicon: WLC / HALOT
  rationale: Se mantiene la unidad singular contrastada con el plural anterior; se evita diluir la precisión numérica.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: WLC / HALOT
  rationale: «Flor de harina» es una equivalencia española tradicional y precisa para la harina refinada/fina mencionada por el hebreo.
- source_word: יִהְיֶה
  english_pob_choice: will be about this time tomorrow
  chosen_spanish: será para mañana a esta hora
  alternatives_spanish:
  - habrá para mañana a esta hora
  - estará para mañana a esta hora
  lexicon: WLC / HALOT
  rationale: El hebreo deja el verbo elíptico en una predicción de precios; en español, «será» conserva la afirmación futura sin añadir explicaciones no presentes en el texto.
- source_word: כָּעֵת מָחָר
  english_pob_choice: about this time tomorrow
  chosen_spanish: para mañana a esta hora
  alternatives_spanish:
  - a esta hora mañana
  - más o menos a esta hora mañana
  lexicon: WLC / HALOT
  rationale: La frase temporal indica el mismo momento del día siguiente; «para mañana a esta hora» suena natural y mantiene la cercanía del sentido de כָּעֵת.
- source_word: בְּשַׁעַר שֹׁמְרוֹן
  english_pob_choice: in the gate of Samaria
  chosen_spanish: en la puerta de Samaria
  alternatives_spanish:
  - en la puerta de Samaria,
  - a la puerta de Samaria
  lexicon: WLC / HALOT
  rationale: «Puerta» comunica el idiomático hebreo de la ciudad-umbral como lugar público de comercio y administración; se evita «puerta» solo como objeto arquitectónico mediante el contexto.
theological_decisions:
- issue: Valor de cumplimiento profético en la fórmula narrativa
  english_pob_reading: The verse reports that the event happened just as the man of God had spoken to the king.
  chosen_spanish_reading: El versículo presenta el cumplimiento exacto de lo dicho por el hombre de Dios al rey.
  alternative_spanish_readings:
  - El versículo solo registra una coincidencia temporal
  - El versículo simplemente relata una predicción
  rationale: No se atenúa el carácter de cumplimiento que el hebreo y la traducción inglesa subrayan; la frase inicial y la estructura de correspondencia preservan esa lectura.
  doctrine_reference: Fiabilidad de la palabra profética / cumplimiento de la palabra de Yahvé
- issue: Título אִישׁ הָאֱלֹהִים
  english_pob_reading: the man of God
  chosen_spanish_reading: el hombre de Dios
  alternative_spanish_readings:
  - el profeta
  rationale: Se conserva el título textual en lugar de interpretarlo como un cargo funcional distinto; así se respeta la designación del hebreo y la práctica de la POB en inglés.
  doctrine_reference: Respeto al léxico del texto fuente y a la identificación profética
translation_notes:
  revision_awareness: La base inglesa revisada eliminó «so» antes de «about this time tomorrow» para hacer la frase más natural; en español se reflejó esa fluidez con «será para mañana a esta hora», sin añadir marcadores innecesarios. Se mantuvo la medida antigua y la localización «en la puerta de Samaria» como en la línea principal de la POB inglesa, dejando la alternativa en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; en este versículo no aparece el Tetragrámaton.
  - Se preserva «hombre de Dios» como título fijo y no se sustituye por «profeta».
  - Las unidades antiguas («seá», «siclo») se conservan por fidelidad al contenido económico del versículo.
  - «Puerta de Samaria» se entiende en sentido idiomático de lugar público, no solo como elemento arquitectónico.
