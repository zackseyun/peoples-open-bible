  text: יֹאכְל֬וּ עֲנָוִ֨ים וְ/יִשְׂבָּ֗עוּ יְהַֽלְל֣וּ יְ֭הוָה דֹּ֣רְשָׁ֑י/ו יְחִ֖י לְבַבְ/כֶ֣ם לָ/עַֽד׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/022/027.yaml
  text: The afflicted will eat and be satisfied[a]; those who seek him will praise Yahweh[c][b]. May your hearts live forever.
  footnotes:
