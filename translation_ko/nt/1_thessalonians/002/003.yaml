  text: ἡ γὰρ παράκλησις ἡμῶν οὐκ ἐκ πλάνης οὐδὲ ἐξ ἀκαθαρσίας ⸀οὐδὲ ἐν δόλῳ,
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/002/003.yaml
  text: For our appeal does not come from error or impurity or deceit[b][a],
  footnotes:
  - marker: a
    text: Or 'exhortation.' The Greek παράκλησις can denote an appeal, exhortation, or encouragement depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'deception' for 'error'; the following phrase 'with deceit' more directly expresses deliberate trickery.
    reason: lexical_alternative
translation:
  language: ko
  text: 우리의 권면[a]은 그릇됨[b]이나 부정함에서 나온 것이 아니며 속임수로 행한 것도 아닙니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「호소」, 「격려」. 헬라어 παράκλησις는 문맥에 따라 호소·권면·격려를 모두 가리킬 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「미혹」, 「속임」. 이어지는 「속임수」가 의도적 기만을 직접적으로 표현하므로 본문 「그릇됨」은 진리에서 벗어난 가르침의 함의가 더 강하다.
    reason: lexical_alternative
lexical_decisions:
- source_word: παράκλησις
  english_pob_choice: appeal
  chosen_korean: 권면
  alternatives_korean:
  - 호소
  - 격려
  - 위로
  lexicon: BDAG
  rationale: 한국 교회 전통의 「권면」이 권유·호소·격려를 함께 담는 가장 정형화된 어휘이다. 본 문맥은 진리 사역의 진정성을 변호하는 정황이므로 「권면」이 가장 자연스럽다.
- source_word: ἐκ πλάνης
  english_pob_choice: from error
  chosen_korean: 그릇됨에서 나온
  alternatives_korean:
  - 미혹에서
  - 속임에서
  lexicon: BDAG
  rationale: πλάνη는 「길에서 벗어남·미혹」. 본 문맥에서는 가르침의 진실성 변호에 가까우므로 「그릇됨」을 택하되, 「미혹」 가능성은 각주로 살린다.
- source_word: ἐξ ἀκαθαρσίας
  english_pob_choice: from impurity
  chosen_korean: 부정함에서
  alternatives_korean:
  - 더러움에서
  - 불순한 동기에서
  lexicon: BDAG
  rationale: ἀκαθαρσία는 도덕적·동기적 부정. 「부정함」이 자연스럽다.
- source_word: ἐν δόλῳ
  english_pob_choice: in deceit
  chosen_korean: 속임수로
  alternatives_korean:
  - 기만으로
  - 간계로
  lexicon: BDAG
  rationale: δόλος는 의도적 기만. 「속임수」가 직접적이며 본문 흐름과 잘 어울린다.
