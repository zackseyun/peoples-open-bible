- from: Vio que no había hombre[a], y se asombró de que no hubiera quien intercediera; por eso su propio brazo le trajo salvación, y su justicia[b] lo sostuvo.
  to: Vio que no había hombre[a], y quedó consternado de que no hubiera quien intercediera; por eso su propio brazo le trajo salvación, y su rectitud[b] lo sostuvo.
  rationale: 'Se corrige «se asombró» a «quedó consternado» para reflejar mejor el valor de וַיִּשְׁתּוֹמֵם en contexto. También se alinea צדקה con la decisión documentada del POB: se usa «rectitud» en el texto principal para preservar mejor la fuerza de «righteousness» en español, y se deja «justicia» como alternativa léxica en nota. El resto del versículo se mantiene por ser fiel y natural.'
