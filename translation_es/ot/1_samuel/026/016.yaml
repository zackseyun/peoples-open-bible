translation:
  language: es
  text: 'Esto que has hecho no está bien. ¡Vive Yahvé! Ustedes son hijos de muerte[a], porque no vigilaron a su señor, al ungido de Yahvé. Y ahora, mira: ¿dónde están la lanza del rey y la vasija de agua que estaban junto a su cabeza?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «ustedes son hijos de muerte», un modismo que significa que son reos de muerte o que merecen morir.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא טוֹב
  english_pob_choice: is not good
  chosen_spanish: no está bien
  alternatives_spanish:
  - no es bueno
  - no es correcto
  - no es bueno esto
  lexicon: HALOT
  rationale: La expresión hebrea evalúa negativamente la acción sin requerir una intensificación como ‘malo’ o ‘malvado’. ‘No está bien’ comunica con naturalidad el juicio adversativo y conserva el tono de reprensión.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this thing
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - este asunto
  - este hecho
  lexicon: HALOT
  rationale: En español, ‘esto’ permite una referencia natural al acto señalado por el contexto inmediato, sin cargar el sustantivo con matices interpretativos que el hebreo no exige por sí mismo.
- source_word: אֲשֶׁר עָשִׂיתָ
  english_pob_choice: that you have done
  chosen_spanish: que has hecho
  alternatives_spanish:
  - que hiciste
  - que tú has hecho
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte de manera natural con pretérito perfecto compuesto en español para una acción reciente con relevancia presente.
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: ¡Vive Yahvé!
  alternatives_spanish:
  - ¡Por la vida de Yahvé!
  - ¡Tan cierto como que Yahvé vive!
  - ¡Yahvé vive!
  lexicon: HALOT
  rationale: Se conserva la fórmula de juramento con el nombre divino sin mascarlo como ‘SEÑOR’. ‘¡Vive Yahvé!’ mantiene la solemnidad breve y directa del hebreo, adecuada en un discurso de reprensión.
- source_word: בְנֵי מָוֶת אַתֶּם
  english_pob_choice: you are sons of death
  chosen_spanish: ustedes son hijos de muerte
  alternatives_spanish:
  - merecen morir
  - están destinados a morir
  - son dignos de muerte
  lexicon: HALOT
  rationale: Se preserva la metáfora semítica ‘hijos de muerte’ para no borrar la tensión lexical documentada por el texto fuente. ‘Hijos de muerte’ es comprensible en español bíblico y mantiene el valor idiomático/judicial.
- source_word: שְׁמַרְתֶּם עַל
  english_pob_choice: did not keep watch over
  chosen_spanish: no vigilaron
  alternatives_spanish:
  - no guardaron
  - no estuvieron vigilando sobre
  - no custodiaron
  lexicon: HALOT
  rationale: En este contexto militar, el verbo apunta a una omisión de vigilancia/protección. ‘Vigilaron’ refleja la función de guardia sin exagerar el aspecto técnico de centinela.
- source_word: אֲדֹנֵיכֶם
  english_pob_choice: your master
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su dueño
  - su señor/amo
  lexicon: HALOT
  rationale: ‘Señor’ en español comunica relación de superioridad humana y evita confusión con Yahvé en la misma línea; no se recurre a ‘Señor’ con mayúscula como título divino. El posesivo plural se adapta a la forma cortés/contextual de tercera persona en español.
- source_word: מְשִׁיחַ יְהוָה
  english_pob_choice: Yahweh’s anointed
  chosen_spanish: el ungido de Yahvé
  alternatives_spanish:
  - el Mesías de Yahvé
  - el consagrado de Yahvé
  - el ungido del Señor
  lexicon: HALOT
  rationale: ‘Ungido’ reproduce directamente el título real-sacral del hebreo sin importarlo automáticamente al uso escatológico de ‘Mesías’. Se mantiene el vínculo con Yahvé explícito, coherente con el nombre divino en el verso.
- source_word: וְעַתָּה רְאֵה
  english_pob_choice: And now, look
  chosen_spanish: 'Y ahora, mira:'
  alternatives_spanish:
  - Y ahora, mira
  - Ahora, mira
  - Y ahora, ve
  lexicon: HALOT
  rationale: La partícula discursiva introduce una nueva prueba o llamado a observar. ‘Mira’ es natural y mantiene la inmediatez del hebreo.
- source_word: אֵי
  english_pob_choice: where are
  chosen_spanish: ¿dónde están
  alternatives_spanish:
  - ¿dónde está
  - ¿en dónde están
  lexicon: HALOT
  rationale: El español exige plural por los dos objetos siguientes. La formulación interrogativa conserva la función de señalar la ausencia de la evidencia.
- source_word: חֲנִית הַמֶּלֶךְ
  english_pob_choice: the king’s spear
  chosen_spanish: la lanza del rey
  alternatives_spanish:
  - la lanza real
  - la lanza del monarca
  lexicon: HALOT
  rationale: ‘Lanza’ es el equivalente directo de חֲנִית, y la construcción en español expresa con naturalidad la relación de pertenencia.
- source_word: צַפַּחַת הַמַּיִם
  english_pob_choice: the water jar
  chosen_spanish: la vasija de agua
  alternatives_spanish:
  - la jarra de agua
  - el jarro de agua
  - la vasija para el agua
  lexicon: HALOT
  rationale: ‘Vasija de agua’ es neutral y suficientemente amplia para el recipiente pequeño indicado por el contexto, sin forzar un tamaño o forma precisa que el hebreo no especifica.
- source_word: אֲשֶׁר מראשתו
  english_pob_choice: that were by his head
  chosen_spanish: que estaba junto a su cabeza
  alternatives_spanish:
  - que estaban junto a su cabeza
  - que estaba a la cabecera de su cama
  - que se hallaba cerca de su cabeza
  lexicon: HALOT
  rationale: La expresión hebrea indica proximidad a la cabeza; en español, ‘junto a su cabeza’ transmite ese valor de forma clara. Se usa singular por concordancia inmediata con ‘vasija’, sin impedir que el conjunto remita a ambos objetos del contexto.
theological_decisions:
- issue: Nombre divino יהוה en juramento
  english_pob_reading: As Yahweh lives
  chosen_spanish_reading: ¡Vive Yahvé!
  alternative_spanish_readings:
  - ¡Por la vida de Yahvé!
  - ¡Yahvé vive!
  rationale: Se preserva el nombre divino como ‘Yahvé’, conforme al criterio del proyecto, y se traduce la fórmula juramental con máxima cercanía sintáctica y solemnidad. No se oculta el Tetragrámaton bajo una convención eclesiástica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Título מְשִׁיחַ יְהוָה aplicado a Saúl
  english_pob_reading: Yahweh’s anointed
  chosen_spanish_reading: el ungido de Yahvé
  alternative_spanish_readings:
  - el Mesías de Yahvé
  - el consagrado de Yahvé
  rationale: En este pasaje el título es real y contextual, no una afirmación mesiánica escatológica. ‘Ungido’ conserva la dignidad sacral sin introducir un matiz doctrinal no requerido por el contexto inmediato.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 2, 3
- issue: Idiomático judicial בְנֵי מָוֶת
  english_pob_reading: you are sons of death
  chosen_spanish_reading: ustedes son hijos de muerte
  alternative_spanish_readings:
  - merecen morir
  - son dignos de muerte
  - están destinados a morir
  rationale: Se mantiene la tensión idiomática documentada por el hebreo y preservada por el audit trail inglés. En lugar de normalizar la expresión a una paráfrasis jurídica, se conserva la metáfora semítica para que el lector perciba su fuerza textual.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 2, 4
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés al conservar la expresión literal ‘hijos de muerte’ en lugar de suavizarla a una paráfrasis como ‘merecen morir’. También mantiene el nombre divino como Yahvé y el título real-sacral como ‘ungido de Yahvé’, sin recurrir a ‘SEÑOR’ como máscara.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה, incluido el juramento inicial.
  - Se evita ‘Señor’ con mayúscula para no ocultar el nombre divino y para distinguirlo de ‘su señor’ humano.
  - ‘Ungido’ se reserva para מְשִׁיחַ en sentido contextual real-sacral; no se introduce ‘Cristo’ ni ‘Mesías’.
  - Se conserva la metáfora ‘hijos de muerte’ para reflejar la tensión lexical del hebreo.
  - La última cláusula adapta la concordancia al español sin perder el referente dual de lanza y vasija.
