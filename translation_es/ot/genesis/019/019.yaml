translation:
  language: es
  text: Mira[a], por favor, tu siervo ha hallado favor ante tus ojos, y has engrandecido tu amor leal[b], que me has mostrado al preservar mi vida. Pero yo no puedo huir al monte, no sea que me alcance el desastre[c] y muera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mira» refleja el hebreo הִנֵּה, una llamada de atención; «por favor» representa נָא, que añade ruego cortés.
    reason: lexical_alternative
  - marker: b
    text: O «tu bondad constante» o «tu misericordia». El hebreo חֶסֶד expresa benevolencia leal y constante; «amor leal» procura conservar mejor ese peso que una opción más reducida.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «el mal»; aquí el sentido es la calamidad o el desastre que podría alcanzar a Lot.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה נָא
  english_pob_choice: Look, please
  chosen_spanish: Mira, por favor
  alternatives_spanish:
  - Mira ahora, por favor
  - Mira, te ruego
  lexicon: HALOT
  rationale: הִנֵּה introduce atención y נָא añade una súplica cortés. «Mira, por favor» conserva ambos valores en un español natural y digno, sin caer en un calco arcaico.
- source_word: מָצָא ... חֵן בְּעֵינֶיךָ
  english_pob_choice: has found favor in your eyes
  chosen_spanish: ha hallado favor ante tus ojos
  alternatives_spanish:
  - ha hallado gracia ante tus ojos
  - ha hallado favor en tus ojos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para recibir aprobación benévola. «Favor» mantiene el sentido básico; «ante tus ojos» preserva la imagen bíblica sin sonar forzado en español.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: Aquí la auto-designación es deferencial ante un superior. En español, «siervo» conserva esa relación de subordinación respetuosa mejor que «esclavo», que sería demasiado fuerte en este contexto.
- source_word: וַתַּגְדֵּל
  english_pob_choice: you have made great
  chosen_spanish: has engrandecido
  alternatives_spanish:
  - has hecho grande
  - has magnificado
  lexicon: HALOT
  rationale: El hifil de גדל expresa hacer grande o engrandecer. «Has engrandecido» reproduce la intensificación del verbo con un registro formal y natural.
- source_word: חַסְדְּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu misericordia
  alternatives_spanish:
  - tu bondad
  - tu amor leal
  - tu gracia
  lexicon: HALOT
  rationale: חסד puede abarcar lealtad benévola, bondad pactal y misericordia. En este contexto, donde el favor preserva la vida de Lot, «misericordia» comunica con claridad la benevolencia mostrada; se mantiene la tensión semántica sin imponer un tecnicismo único.
- source_word: עָשִׂיתָ עִמָּדִי
  english_pob_choice: that you have shown me
  chosen_spanish: que has mostrado conmigo
  alternatives_spanish:
  - que has hecho conmigo
  - que has hecho por mí
  lexicon: HALOT
  rationale: Literalmente «hecho conmigo», pero en español «mostrar conmigo» preserva la relación del acto con la persona beneficiada y suena más idiomático. La preposición «con» mantiene la cercanía del hebreo.
- source_word: לְהַחֲיוֹת אֶת נַפְשִׁי
  english_pob_choice: by preserving my life
  chosen_spanish: al preservar mi vida
  alternatives_spanish:
  - para conservar mi vida
  - para mantenerme con vida
  lexicon: HALOT
  rationale: El infinitivo causal/final expresa la acción de mantener con vida. «Al preservar mi vida» es formal, claro y mantiene el foco en la continuidad de la vida sin añadir matices soteriológicos.
- source_word: לְהִמָּלֵט הָהָרָה
  english_pob_choice: escape to the mountain
  chosen_spanish: huir a la montaña
  alternatives_spanish:
  - escapar a la montaña
  - huir a la serranía
  lexicon: HALOT
  rationale: El morfema direccional indica movimiento hacia el monte. «Huir a la montaña» suena natural en español y conserva la dirección del hebreo; se evita «montes» para no apartarse de la forma singular del texto.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - a fin de que no
  lexicon: HALOT
  rationale: פֶּן introduce una consecuencia temida. «No sea que» expresa bien esa prevención en español contemporáneo con un tono sobrio.
- source_word: תִּדְבָּקַנִי
  english_pob_choice: overtake me
  chosen_spanish: me alcance
  alternatives_spanish:
  - me alcance y se pegue a mí
  - me persiga hasta alcanzarme
  lexicon: HALOT
  rationale: Aunque la raíz puede sugerir pegarse o adherirse, en este contexto la idea es que el mal/calamidad llegue hasta él. «Me alcance» comunica el peligro de forma idiomática y concisa.
- source_word: הָרָעָה
  english_pob_choice: the disaster
  chosen_spanish: el desastre
  alternatives_spanish:
  - el mal
  - la calamidad
  - la desgracia
  lexicon: HALOT
  rationale: Aquí רעה no describe mal moral abstracto sino una desgracia concreta que amenaza a Lot. «Desastre» transmite esa idea de calamidad inminente con claridad en español.
- source_word: וָמַתִּי
  english_pob_choice: and I die
  chosen_spanish: y muera
  alternatives_spanish:
  - y moriré
  - y moriría
  lexicon: HALOT
  rationale: Después de una cláusula de temor, el español preferentemente usa subjuntivo en la consecuencia temida. «Y muera» refleja bien el valor modal del hebreo con naturalidad.
theological_decisions:
- issue: Renderizar חֶסֶד en una súplica dirigida a un mensajero de Dios con autoridad divina implícita
  english_pob_reading: steadfast love
  chosen_spanish_reading: misericordia
  alternative_spanish_readings:
  - amor leal
  - bondad
  - gracia
  rationale: En este versículo la petición enfatiza la benevolencia que preserva la vida. «Misericordia» es la opción más transparente para el lector español y evita sobrecargar el término con un tecnicismo de pacto; aun así, se documentan alternativas que conservan parte de la gama semántica de חסד.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave o excepción documentada)
- issue: 'Valor de la amenaza final: moral evil vs. calamity'
  english_pob_reading: the disaster
  chosen_spanish_reading: el desastre
  alternative_spanish_readings:
  - el mal
  - la calamidad
  - la desgracia
  rationale: El hebreo usa הָרָעָה, pero el contexto narra un peligro concreto y devastador. «Desastre» evita que el lector entienda un mal moral abstracto y mantiene la tensión narrativa del juicio inminente.
  doctrine_reference: 'Principio de equivalencia óptima: conservar la fuerza contextual sin perder la referencia lexical'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del inglés POB, que sustituyó «magnified» por «made great». Por eso se eligió «engrandecido» como equivalente más natural en español formal, manteniendo el sentido intensivo del hebreo גדל. También se respetó la lectura del inglés auditada para חֶסֶד y la interpretación contextual de הָרָעָה como calamidad, no como mal moral abstracto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se usó «siervo» para עבד por tratarse de auto-humillación deferente en diálogo, no de esclavitud literal.
  - Se evitó «SEÑOR» como sustituto de nombres divinos porque no aparece aquí.
  - Se preservó el paralelismo causal/final con «al preservar mi vida» para לְהַחֲיוֹת אֶת נַפְשִׁי.
  - Se optó por subjuntivo en «y muera» para reflejar la consecuencia temida introducida por פֶּן.
