translation:
  language: es
  text: 'Porque es testigo entre nosotros y ustedes, y entre las generaciones que vendrán después de nosotros, para que realicemos[a] el servicio de Yahvé delante de él, con nuestros holocaustos, nuestros sacrificios y nuestros sacrificios de paz[b], para que sus hijos no digan a nuestros hijos en el futuro[c]: «No tienen parte[d] en Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sirvamos en el servicio de Yahvé»; el hebreo repite la raíz de «servir» para enfatizar el servicio cultual.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «sacrificios de comunión» u «ofrendas de paz».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «mañana», a menudo con sentido de «en el futuro» o «más adelante».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «No tienen porción en Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque es
  lexicon: HALOT
  rationale: En este contexto el enlace introduce una explicación correctiva del altar como testigo, por lo que en español 'Porque' conserva la relación explicativa del hebreo mejor que una simple causalidad mecánica.
- source_word: עֵד
  english_pob_choice: witness
  chosen_spanish: testigo
  alternatives_spanish:
  - testimonio
  - señal de testimonio
  lexicon: HALOT
  rationale: '''Testigo'' reproduce con naturalidad el valor personal/funcional del término, aplicado aquí a un altar que sirve como evidencia permanente entre las partes.'
- source_word: בֵּינֵינוּ וּבֵינֵיכֶם וּבֵין דֹּרוֹתֵינוּ אַחֲרֵינוּ
  english_pob_choice: between us and you, and between our generations after us
  chosen_spanish: entre nosotros y ustedes, y entre nuestras generaciones después de nosotros
  alternatives_spanish:
  - entre nosotros y vosotros, y entre nuestras generaciones tras nosotros
  - entre nosotros y ustedes, y entre nuestros descendientes después de nosotros
  lexicon: HALOT
  rationale: Se conserva la estructura relacional del hebreo y la posesión plural de 'nuestras generaciones', sin reducirla a una sola paráfrasis generacional.
- source_word: לַעֲבֹד אֶת עֲבֹדַת יְהוָה
  english_pob_choice: that we may perform the service of Yahweh
  chosen_spanish: para que sirvamos el servicio de Yahvé
  alternatives_spanish:
  - para que realicemos el servicio de Yahvé
  - para servir en el servicio de Yahvé
  lexicon: HALOT
  rationale: La repetición de la raíz עבד queda visible en español con 'sirvamos el servicio', aunque suene compacta; así se preserva la fuerza cultual del original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino de forma transparente según la norma del proyecto, evitando la sustitución por un título.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: '''Delante de él'' conserva la referencia inmediata al antecedente ''Yahvé'' y evita introducir un matiz más interpretativo que el hebreo no exige.'
- source_word: בְּעֹלוֹתֵינוּ
  english_pob_choice: with our burnt offerings
  chosen_spanish: con nuestros holocaustos
  alternatives_spanish:
  - con nuestras ofrendas quemadas
  - con nuestros sacrificios totalmente consumidos
  lexicon: HALOT
  rationale: '''Holocaustos'' es el término español más establecido para עֹלָה en registro bíblico y cultual; mantiene la categoría sacrificial específica.'
- source_word: וּבִזְבָחֵינוּ
  english_pob_choice: our sacrifices
  chosen_spanish: nuestros sacrificios
  alternatives_spanish:
  - nuestros holocaustos ofrecidos
  - nuestras ofrendas sacrificiales
  lexicon: HALOT
  rationale: El término general זֶבַח se vierte naturalmente como 'sacrificios', manteniendo la distinción frente a los holocaustos.
- source_word: וּבִשְׁלָמֵינוּ
  english_pob_choice: our peace offerings
  chosen_spanish: nuestros sacrificios de paz
  alternatives_spanish:
  - nuestros sacrificios comunionales
  - nuestras ofrendas de paz
  lexicon: HALOT
  rationale: '''Sacrificios de paz'' conserva la categoría tradicional del hebreo en un español comprensible y fiel; ''fellowship offerings'' no se impone como término principal.'
- source_word: וְלֹא יֹאמְרוּ ... מָחָר
  english_pob_choice: so that your children may not say to our children in time to come
  chosen_spanish: para que sus hijos no digan a nuestros hijos mañana
  alternatives_spanish:
  - para que sus hijos no digan a nuestros hijos en tiempo de venir
  - para que sus hijos no digan a nuestros hijos en el futuro
  lexicon: HALOT
  rationale: Se mantiene 'mañana' como adverbio hebreo literal, pero en español se entiende idiomáticamente como referencia futura en este contexto discursivo.
- source_word: אֵין לָכֶם חֵלֶק בַּיהוָה
  english_pob_choice: You have no share in Yahweh
  chosen_spanish: No tienen parte en Yahvé
  alternatives_spanish:
  - No tienen participación en Yahvé
  - No tienen porción en Yahvé
  lexicon: HALOT
  rationale: '''Parte'' comunica de forma clara y natural la noción de חֵלֶק como pertenencia o participación pactal; ''porción'' se reserva como alternativa más literal pero menos directa.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre personal de Dios en lugar de sustituirlo por un título, conforme a la política del proyecto y al valor distintivo del Tetragrámaton en este pasaje.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Función de apoyo cultual del altar
  english_pob_reading: a witness between us and you, and between our generations after us
  chosen_spanish_reading: testigo entre nosotros y ustedes, y entre nuestras generaciones después de nosotros
  alternative_spanish_readings:
  - testimonio entre nosotros y ustedes
  - señal entre nosotros y ustedes
  rationale: El altar no se presenta como lugar de sacrificio ilícito, sino como signo testimonial permanente que evita futuras disputas de pertenencia y culto.
  doctrine_reference: Contexto de Josué 22:26–28
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió 'Rather' por 'For' para ajustar כִּי al matiz explicativo inicial. La versión española sigue ese valor con 'Porque' y evita introducir una oposición innecesaria. También se resolvió la validación anterior anclando cada nota al texto mediante marcadores presentes en la traducción.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה.
  - Se distingue 'holocaustos' de 'sacrificios' y 'sacrificios de paz'.
  - '''Parte'' se usa para חֵלֶק con sentido de pertenencia/participación pactal.'
  - La secuencia cultual conserva el orden y la relación del hebreo sin añadir contenido interpretativo.
