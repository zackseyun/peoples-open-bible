revisions:
- from: ¡Oh razón[a], tirano de las pasiones de los hijos! Y la piedad[b] es más deseable para una madre que los hijos.
  to: ¡Oh razón[a], tirano sobre las pasiones de los hijos! Y la piedad[b] es más anhelada por una madre que sus hijos.
  rationale: 'Se hicieron ajustes menores para reflejar mejor la sintaxis y fuerza del griego en español natural: «tirano sobre» expresa mejor el dominio metafórico de τύραννε, y «más anhelada por una madre» reproduce mejor el matiz emotivo de ποθεινοτέρα. También se completó la nota a para conservar toda la explicación semántica presente en la auditoría inglesa.'
