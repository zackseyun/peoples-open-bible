theological_decisions:
- issue: Rendering of apocalyptic color terms in the breastplates
  chosen_reading: 'Interpret the three adjectives as color-descriptive in context: ''fiery red ... hyacinth-blue ... sulfur-yellow.'''
  alternative_readings:
  - Render more formally as 'fiery and hyacinthine and sulfurous' without making the color values explicit.
  rationale: The immediate context is visual description in a vision, and the three coordinated adjectives modify breastplates in a way that strongly suggests appearance. Making the color values explicit aids comprehension without adding theological interpretation beyond the imagery.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §1 (source-text plain sense over tradition)
