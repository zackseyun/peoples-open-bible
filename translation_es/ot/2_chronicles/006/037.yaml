    issue: '''vuelven'' para וְשָׁבוּ queda demasiado abierto en español'
    rationale: En este contexto de súplica 'a ti', 'se vuelven' comunica mejor el retorno direccional/espiritual sin colapsarlo en 'se arrepienten'.
  - severity: high
    issue: '''hemos obrado mal'' debilita וְרָשָׁעְנוּ'
    rationale: רשע expresa maldad/impiedad/culpabilidad, y el inglés auditado 'acted wickedly' preserva esa fuerza. 'Obrado mal' suena demasiado débil y cotidiano para la culminación de la confesión.
  - severity: low
