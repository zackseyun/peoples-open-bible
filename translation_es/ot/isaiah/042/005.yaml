translation:
  language: es
  text: Así dice Dios, Yahvé, el que creó los cielos y los extendió, el que tendió[a] la tierra y lo que brota de ella[b], el que da aliento al pueblo que está sobre ella y espíritu[c] a los que en ella caminan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘forjó la tierra’. El verbo hebreo puede evocar la idea de golpear o extender algo.
    reason: lexical_alternative
  - marker: b
    text: O ‘sus productos’ o ‘su descendencia’.
    reason: lexical_alternative
  - marker: c
    text: O ‘aliento’ para ‘espíritu’. El hebreo puede significar ‘espíritu’, ‘aliento’ o ‘viento’.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֵל יְהוָה
  english_pob_choice: God, the LORD
  chosen_spanish: Dios, Yahvé
  alternatives_spanish:
  - el Dios, Yahvé
  - Dios, el Señor
  lexicon: HALOT
  rationale: הָאֵל es un título común para ‘Dios’, y יְהוָה debe preservarse como el nombre divino. En el español de POB se sigue la convención de ‘Yahvé’ para el Tetragrámaton, manteniendo ambos títulos sin esconder el nombre propio.
- source_word: בּוֹרֵא
  english_pob_choice: who created
  chosen_spanish: el que creó
  alternatives_spanish:
  - creador de
  - el que crea
  lexicon: HALOT
  rationale: El participio funciona de modo atributivo. ‘El que creó’ comunica de forma natural en español la acción creadora ya afirmada, sin perder el valor descriptivo.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos y la tierra
  - el cielo
  lexicon: HALOT
  rationale: En un contexto de creación cósmica, ‘los cielos’ preserva el alcance amplio del hebreo mejor que ‘el cielo’.
- source_word: וְנֹטֵיהֶם
  english_pob_choice: stretched them out
  chosen_spanish: los extendió
  alternatives_spanish:
  - los desplegó
  - los estiró
  lexicon: HALOT
  rationale: נָטָה expresa extender/estirar. ‘Los extendió’ es idiomático en español y conserva la imagen de expansión de los cielos.
- source_word: רֹקַע
  english_pob_choice: spread out
  chosen_spanish: tendió
  alternatives_spanish:
  - extendió
  - martilló
  lexicon: HALOT
  rationale: רָקַע puede sugerir golpear o batir, pero en español ‘tendió’ transmite el resultado espacial sin sonar forzado. Se conserva la posibilidad más fuerte en nota.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra habitada
  - el país
  lexicon: HALOT
  rationale: El paralelismo con ‘los cielos’ favorece ‘la tierra’ para el sentido cósmico general.
- source_word: וְצֶאֱצָאֶיהָ
  english_pob_choice: its offspring
  chosen_spanish: sus descendientes
  alternatives_spanish:
  - su prole
  - lo que brota de ella
  - sus productos
  lexicon: HALOT
  rationale: צֶאֱצָאֶיהָ puede referirse a lo que procede de la tierra. ‘Sus descendientes’ conserva la relación de procedencia y es suficientemente amplio para no limitarlo solo a vegetación o producción.
- source_word: נֹתֵן נְשָׁמָה
  english_pob_choice: gives breath
  chosen_spanish: da aliento
  alternatives_spanish:
  - da respiración
  - da vida
  lexicon: HALOT
  rationale: נְשָׁמָה es ‘aliento/respiración de vida’. ‘Da aliento’ es una solución natural en español y evita confundirlo con ‘alma’.
- source_word: לָעָם עָלֶיהָ
  english_pob_choice: to the people on it
  chosen_spanish: al pueblo que está sobre ella
  alternatives_spanish:
  - al pueblo sobre ella
  - al pueblo que vive en ella
  lexicon: HALOT
  rationale: עָם es colectivo; ‘pueblo’ funciona bien en español. ‘Que está sobre ella’ mantiene la referencia a la tierra y refleja el hebreo sin introducir una paráfrasis excesiva.
- source_word: וְרוּחַ
  english_pob_choice: and spirit
  chosen_spanish: y espíritu
  alternatives_spanish:
  - y aliento
  - y viento
  lexicon: HALOT
  rationale: רוּחַ conserva aquí su campo semántico amplio. ‘Espíritu’ distingue este término de נְשָׁמָה, manteniendo la tensión léxica entre ambos.
- source_word: לַהֹלְכִים בָּהּ
  english_pob_choice: to those who walk in it
  chosen_spanish: a los que en ella caminan
  alternatives_spanish:
  - a los que caminan en ella
  - a los que viven en ella
  lexicon: HALOT
  rationale: El participio expresa literalmente ‘los que caminan’. ‘En ella caminan’ conserva la imagen concreta y suena natural en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Yahveh
  rationale: Se sigue la convención de POB en español para el nombre del pacto, evitando el reemplazo por un título en mayúsculas. Esto mantiene la transparencia respecto del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Distinguir נְשָׁמָה y רוּחַ
  english_pob_reading: breath ... spirit
  chosen_spanish_reading: aliento ... espíritu
  alternative_spanish_readings:
  - aliento ... aliento
  - respiración ... espíritu
  rationale: El texto usa dos términos emparentados pero distintos. ‘Aliento’ para נְשָׁמָה y ‘espíritu’ para רוּחַ preservan la diferencia semántica y la tensión antropológica del hebreo.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: וְצֶאֱצָאֶיהָ como procedencia de la tierra
  english_pob_reading: its offspring
  chosen_spanish_reading: sus descendientes
  alternative_spanish_readings:
  - lo que brota de ella
  - sus productos
  rationale: El hebreo permite una referencia amplia a lo que surge de la tierra. ‘Sus descendientes’ conserva la idea de procedencia sin reducirla solo a vegetación, y mantiene la amplitud interpretativa presente en la auditoría inglesa.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La redacción sigue el registro de la última revisión inglesa, que prefirió una correspondencia más cercana para צֶאֱצָאֶיהָ (‘its offspring’). En español se ha mantenido esa cercanía con ‘sus descendientes’, sin perder la amplitud semántica del término. También se conserva la distinción léxica entre נְשָׁמָה y רוּחַ, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יְהוָה, de acuerdo con la terminología proyectiva de POB en español.
  - Se evita ‘SEÑOR’ como máscara del nombre divino.
  - ‘Cielos’ y ‘tierra’ mantienen el paralelismo cósmico del hebreo.
  - ‘Aliento’ y ‘espíritu’ se distinguen para no colapsar נְשָׁמָה y רוּחַ.
  - ‘Sus descendientes’ intenta reflejar la amplitud de צֶאֱצָאֶיהָ sin restringirlo a un solo tipo de producto de la tierra.
