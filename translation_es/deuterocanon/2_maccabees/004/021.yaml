  yaml_path: translation/deuterocanon/2_maccabees/004/021.yaml
  text: When Apollonius son of Menestheus had been sent to Egypt for the accession festivities of King Philometor[a], Antiochus, perceiving that this was foreign to his own interests, took thought for his own security. Therefore, after arriving at Joppa, he went on to Jerusalem.
  footnotes:
