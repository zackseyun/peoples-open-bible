translation:
  language: es
  text: Y para tus palabras haz balanza y medida[a], y para tu boca haz puerta y cerrojo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ζυγὸν suele significar «yugo», pero aquí, junto con σταθμόν, se entiende en sentido de pesaje; la idea es pesar y regular el habla.
    reason: lexical_alternative
lexical_decisions:
- source_word: λόγοις
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - palabras dichas
  - dichos
  lexicon: LSJ
  rationale: λόγοις designa aquí lo que se dice; en español, «palabras» es natural y fiel en este contexto admonitorio. «Palabras» también permite mantener el paralelismo con la metáfora de pesar y regular el habla.
- source_word: ζυγὸν
  english_pob_choice: balance
  chosen_spanish: balanza
  alternatives_spanish:
  - balanza de pesar
  - yugo
  - balanza de pesas
  lexicon: LSJ
  rationale: Aunque ζυγός puede significar «yugo», el contexto con σταθμόν apunta a imaginería de pesaje. «Balanza» transmite mejor en español la idea de medir y controlar cuidadosamente las palabras.
- source_word: σταθμόν
  english_pob_choice: measure
  chosen_spanish: medida
  alternatives_spanish:
  - peso
  - patrón
  - norma
  lexicon: LSJ
  rationale: σταθμόν puede referirse a un peso o estándar de pesaje. «Medida» comunica la idea general de regulación y encaja de forma natural con «balanza».
- source_word: στόματί
  english_pob_choice: mouth
  chosen_spanish: boca
  alternatives_spanish:
  - boca
  - labios
  lexicon: LSJ
  rationale: En español, «boca» conserva la metáfora concreta de una abertura que puede cerrarse con puerta y cerrojo. Es más idiomático que mantener «boca» literalmente en un giro forzado; además, la imagen funciona con claridad.
- source_word: θύραν
  english_pob_choice: door
  chosen_spanish: puerta
  alternatives_spanish:
  - portal
  - entrada
  lexicon: LSJ
  rationale: θύραν es el equivalente directo de «puerta». Mantiene la imagen literal de poner un cierre a la boca.
- source_word: μοχλόν
  english_pob_choice: bolt
  chosen_spanish: cerrojo
  alternatives_spanish:
  - barra
  - tranca
  - pasador
  lexicon: LSJ
  rationale: μοχλός es una pieza de madera o metal para asegurar una puerta. «Cerrojo» expresa en español el efecto de cierre firme y es más claro que una transliteración o un término demasiado técnico.
- source_word: ποίησον
  english_pob_choice: make
  chosen_spanish: ponles / ponle
  alternatives_spanish:
  - haz
  - coloca
  - pon
  lexicon: LSJ
  rationale: El griego repite el imperativo con un sentido de acción concreta aplicada a la imagen. En español, «ponles» y «ponle» conservan el mandato y suenan naturales con los objetos metafóricos.
theological_decisions:
- issue: Metáfora de control del habla mediante imágenes de pesaje y cierre
  english_pob_reading: The verse urges weighing and regulating one's speech, then guarding the mouth with a door and bolt.
  chosen_spanish_reading: El versículo exhorta a pesar y regular las palabras, y luego a guardar la boca con una puerta y un cerrojo.
  alternative_spanish_readings:
  - poner freno a la boca
  - cerrar la boca
  rationale: 'No se suaviza la imagen: la metáfora de control verbal se mantiene concreta, como en el griego y en la lectura inglesa auditada. «Guardar la boca» ayuda a expresar la finalidad sin reemplazar la figura.'
  doctrine_reference: Sabiduría práctica / disciplina de la lengua (cf. temática sapiencial)
translation_notes:
  revision_awareness: La revisión auditada no introdujo cambios sustantivos; se mantiene la lectura de imagen de pesaje para ζυγόν junto con σταθμόν y la imagen literal de puerta/cerrojo para la boca.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» como norma del proyecto solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - Se mantuvo un registro sobrio y proverbial, adecuado al género sapiencial.
  - No se cambió la metáfora por una paráfrasis abstracta; se preservó la tensión entre imagen concreta y exhortación moral.
