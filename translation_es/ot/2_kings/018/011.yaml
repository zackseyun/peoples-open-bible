translation:
  language: es
  text: Y el rey de Asiria deportó a Israel a Asiria y los estableció en Halah[a], junto al río Habor, el río de Gozán,[b] y en las ciudades de los medos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «exilió a Israel a Asiria y los colocó en Halah, y junto al Habor, el río de Gozán, y en las ciudades de Media».'
    reason: lexical_alternative
  - marker: b
    text: «Israel» aquí se refiere al reino del norte y a su pueblo llevado al destierro.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֶּגֶל
  english_pob_choice: exiled
  chosen_spanish: exilió
  alternatives_spanish:
  - deportó
  - llevó al exilio
  lexicon: HALOT
  rationale: El verbo hiphil de גלה expresa una remoción forzada hacia el destierro. «Exilió» conserva la fuerza política y el sentido de desplazamiento coercitivo, con buena naturalidad en español.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - Asiria, su rey
  - el rey asirio
  lexicon: HALOT
  rationale: La construcción en estado constructo se vierte de forma directa y idiomática como «el rey de Asiria».
- source_word: אֶת יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - a los israelitas
  - al reino de Israel
  lexicon: HALOT
  rationale: Aquí «Israel» funciona como entidad corporativa, no solo como individuos. En español, el objeto directo con «a» respeta esa referencia nacional sin sobreespecificarla.
- source_word: אַשּׁוּרָה
  english_pob_choice: to Assyria
  chosen_spanish: a Asiria
  alternatives_spanish:
  - hacia Asiria
  - en Asiria
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia Asiria; «a Asiria» es la forma más natural y fiel en español.
- source_word: וַיַּנְחֵם
  english_pob_choice: settled them
  chosen_spanish: los estableció
  alternatives_spanish:
  - los colocó
  - los hizo habitar
  lexicon: HALOT
  rationale: En este contexto de deportación, el verbo comunica la asignación de lugares de residencia. «Los estableció» preserva ese matiz sin perder fluidez; «hizo habitar» sería más explicativo, pero menos natural.
- source_word: בַּחְלַח
  english_pob_choice: in Halah
  chosen_spanish: en Halah
  alternatives_spanish:
  - en Jalaj
  - en Halaj
  lexicon: HALOT
  rationale: Se conserva el topónimo en transliteración estándar; «Halah» es la forma más reconocible en español bíblico contemporáneo.
- source_word: וּבְחָבוֹר
  english_pob_choice: and on the Habor
  chosen_spanish: y en el Habor
  alternatives_spanish:
  - y junto al Habor
  - y sobre el Habor
  lexicon: HALOT
  rationale: Dado que el nombre propio sigue con la aposición «río», en español «en el Habor» evita una preposición menos natural y mantiene la relación geográfica sin añadir inferencias.
- source_word: נְהַר גּוֹזָן
  english_pob_choice: the river of Gozan
  chosen_spanish: el río de Gozán
  alternatives_spanish:
  - el río de Gozán
  - el río Gozán
  lexicon: HALOT
  rationale: La cadena constructa se rinde de manera transparente. «Gozán» sigue la transliteración habitual en español; se conserva la relación «río de» porque el hebreo la marca explícitamente.
- source_word: וְעָרֵי מָדָי
  english_pob_choice: and in the cities of the Medes
  chosen_spanish: y en las ciudades de los medos
  alternatives_spanish:
  - y en las ciudades de Media
  - y en las ciudades de los medos/medianos
  lexicon: HALOT
  rationale: מָדָי se refiere al pueblo de los medos; «los medos» reproduce con claridad la referencia étnico-geográfica. «Media» sería posible, pero menos directo para este sintagma.
theological_decisions:
- issue: Referencia de «Israel» como entidad nacional del norte
  english_pob_reading: '''Israel'' here refers to the northern kingdom and its people taken into exile.'
  chosen_spanish_reading: «Israel» se entiende como el reino del norte y su población llevada al destierro.
  alternative_spanish_readings:
  - solo la nación étnica de Israel
  - los israelitas
  rationale: El hebreo usa el nombre corporativo «Israel» para el reino del norte. La traducción conserva ese nombre y la nota aclara su alcance histórico-político, sin reducirlo solo a una etnia abstracta.
  doctrine_reference: Historia bíblica de los reinos divididos; 2 Reyes 17–18
- issue: Carácter de la acción imperial sobre los deportados
  english_pob_reading: deported Israel to Assyria and placed them in Halah...
  chosen_spanish_reading: el rey de Asiria exilió a Israel a Asiria y los estableció...
  alternative_spanish_readings:
  - los deportó y los puso
  - los llevó al exilio y los asentó
  rationale: El texto presenta una deportación real y organizada. «Exilió» y «los estableció» mantienen tanto la coerción como la distribución posterior de los deportados en lugares asignados.
  doctrine_reference: Historia del exilio asirio en 2 Reyes 17:6; 18:11
translation_notes:
  revision_awareness: 'El texto fuente y el contexto auditado en inglés muestran alta concordancia, sin revisiones aplicadas en la última pasada. La versión española sigue la lectura estable: deportación/exilio asirio, transliteración de topónimos y preservación de la referencia corporativa de Israel.'
  spanish_consistency_notes:
  - Se mantiene «Asiria» como topónimo del imperio y «los medos» para מָדָי, sin variar entre formas equivalentes dentro del mismo versículo.
  - Se conserva «río de Gozán» para reflejar la cadena constructa hebrea.
  - El objeto directo «a Israel» respeta el uso corporativo del nombre, y la nota aclara su alcance histórico.
  - Los topónimos se transliteran de modo consistente y publicable en español bíblico moderno.
