id: 1SA.19.17
reference: 1 Samuel 19:17
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר שָׁא֜וּל אֶל מִיכַ֗ל לָ֤/מָּה כָּ֨כָה֙ רִמִּיתִ֔/נִי וַ/תְּשַׁלְּחִ֥י אֶת אֹיְבִ֖/י וַ/יִּמָּלֵ֑ט וַ/תֹּ֤אמֶר מִיכַל֙ אֶל שָׁא֔וּל הוּא אָמַ֥ר אֵלַ֛/י שַׁלְּחִ֖/נִי לָ/מָ֥ה אֲמִיתֵֽ/ךְ־־־־׃
translation:
  text: Then Saul said to Michal[a], “Why have you deceived me like this and sent away my enemy, so that he escaped?” And Michal said to Saul, “He said to me, ‘Let me go. Why should I kill you?’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, “Let me go, or I will kill you.” The Hebrew reads literally, “Send me away. Why should I kill you?”
    reason: alternative_reading
lexical_decisions:
- source_word: רִמִּיתִנִי
  chosen: have you deceived me
  alternatives:
  - have you tricked me
  - have you betrayed me
  lexicon: HALOT
  rationale: The verb רמה here denotes deceptive action. 'Deceived' is the most natural modern English rendering and fits Saul's accusation without overinterpreting it as treachery ('betrayed'). The perfect with waw-consecutive context is rendered idiomatically in English as present perfect in direct speech.
- source_word: כָּכָה
  chosen: like this
  alternatives:
  - thus
  - in this way
  lexicon: HALOT
  rationale: ככה points to manner. 'Like this' is natural contemporary English and preserves Saul's emphasis on the manner of Michal's action.
- source_word: וַתְּשַׁלְּחִי
  chosen: sent away
  alternatives:
  - let go
  - released
  lexicon: HALOT
  rationale: שלח commonly means 'send' or 'send away.' In this context Michal facilitates David's departure, so 'sent away' captures both the verbal sense and the narrative action better than the weaker 'let go.'
- source_word: אֹיְבִי
  chosen: my enemy
  alternatives:
  - my foe
  lexicon: HALOT
  rationale: The noun אויב straightforwardly means 'enemy.' Retaining Saul's designation of David as 'my enemy' preserves the hostility and irony of the scene.
- source_word: וַיִּמָּלֵט
  chosen: so that he escaped
  alternatives:
  - and he escaped
  - and got away
  lexicon: HALOT
  rationale: The Niphal of מלט means 'escape.' English idiom often expresses the result relation explicitly after 'sent away,' hence 'so that he escaped.' This preserves the narrative consequence without paraphrasing beyond the syntax.
- source_word: שַׁלְּחִנִי
  chosen: Send me away
  alternatives:
  - Let me go
  - Release me
  lexicon: HALOT
  rationale: The imperative of שלח with 1cs suffix is direct speech from David as reported by Michal. 'Send me away' mirrors the same root used earlier in the verse and preserves lexical consistency.
- source_word: לָמָה אֲמִיתֵךְ
  chosen: Why should I kill you?
  alternatives:
  - Why would I kill you?
  - Why should I put you to death?
  lexicon: HALOT
  rationale: The Hebrew is literally 'Why should I kill you?' with first person singular Hiphil of מות plus 2fs suffix. This is the plain sense of Michal's reported quotation. It likely functions as a threat attributed to David, but the translation should preserve the direct wording rather than soften it.
- source_word: מִיכַל
  chosen: Michal
  rationale: Personal names are transliterated by standard convention per project philosophy.
- source_word: שָׁאוּל
  chosen: Saul
  rationale: Personal names are transliterated by standard convention per project philosophy.
