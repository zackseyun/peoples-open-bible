id: 1CO.7.25
reference: '1 Corinthians 7:25'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Περὶ δὲ τῶν παρθένων ἐπιταγὴν κυρίου οὐκ ἔχω, γνώμην δὲ δίδωμι ὡς ἠλεημένος ὑπὸ κυρίου πιστὸς εἶναι.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/007/025.yaml
  text: Now concerning virgins[a], I have no command from the Lord[c][b], but I give my judgment as one who by the Lord’s mercy is trustworthy.
  footnotes:
  - marker: a
    text: 'Or ''the unmarried women'' or, in some interpretations of the context, ''virgin daughters.'' The Greek says ''virgins.'''
    reason: lexical_alternative
  - marker: b
    text: 'Or ''my opinion'' or ''my counsel.'' Paul contrasts his considered judgment here with a direct ''command from the Lord.'''
    reason: alternative_reading
  - marker: c
    text: 'Or ''to be faithful.'' The Greek can mean either ''faithful'' or ''trustworthy/reliable''; here the sense is likely that Paul is a reliable guide by the Lord''s mercy.'
    reason: lexical_alternative
translation:
  language: ko
  text: 이제 처녀들에 관하여 말합니다. 나는 주의 명령을 가지고 있지 않으나, 주의 자비로 신실한 자로서 내 판단을 제시합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τῶν παρθένων
  english_pob_choice: virgins
  chosen_korean: 처녀들
  alternatives_korean:
  - 미혼 여성들
  lexicon: BDAG
  rationale: παρθένος의 글로사리 기본값. 본 절에서는 결혼하지 않은 여성을 가리키나, 36–38절은 약혼자/딸 문맥일 수도 있어 모호. 「처녀」를 유지하고 각주 가능.
- source_word: γνώμην
  english_pob_choice: my judgment
  chosen_korean: 내 판단
  alternatives_korean:
  - 내 의견
  lexicon: BDAG
  rationale: 권위적 명령(ἐπιταγή)과 구분되는 사적 「판단/의견」.
- source_word: ἠλεημένος ὑπὸ κυρίου πιστὸς εἶναι
  english_pob_choice: by the Lord’s mercy is trustworthy
  chosen_korean: 주의 자비로 신실한 자로서
  alternatives_korean:
  - 주의 긍휼하심으로 신실한 자가 된 자로서
  lexicon: BDAG
  rationale: 수동 완료 분사 — 자비를 받은 결과로서의 신실함.
