  - severity: low
    issue: La nota al pie conserva formas no hispanizadas ('Shallum', 'Jehoahaz')
    rationale: 'La nota debe ser coherente con el texto español y con la convención onomástica habitual: ''Salum'' y ''Joacaz''.'
