translation:
  language: es
  text: Miren[a], y he aquí, cuando las hijas de Silo salgan a bailar en las danzas, entonces salgan de las viñas y arrebaten[b] para ustedes, cada hombre su mujer, de entre las hijas de Silo, y vayan a la tierra de Benjamín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Observen» o «Vean». El hebreo tiene un valor de atención vigilante, no solo de percepción visual.
    reason: lexical_alternative
  - marker: b
    text: O «arrebaten por la fuerza», «rapten» o «se lleven». El hebreo denota una toma forzosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּרְאִיתֶם
  english_pob_choice: Watch
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Observen
  lexicon: HALOT
  rationale: En esta secuencia de instrucciones, el hebreo funciona de manera imperativa y de vigilancia. «Miren» comunica atención activa y suena natural en español, sin perder el matiz de observar cuidadosamente.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y vean
  alternatives_spanish:
  - y he aquí
  - y miren
  lexicon: HALOT
  rationale: Se conserva el marcador de énfasis como una invitación a fijar la atención. En español, «y vean» mantiene la fuerza discursiva sin sonar demasiado arcaico.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: cuando
  alternatives_spanish:
  - si
  lexicon: HALOT
  rationale: Aunque la forma hebrea es condicional, el contexto describe un escenario previsto. «Cuando» refleja mejor el sentido temporal práctico que ya estaba auditado en la revisión inglesa, sin borrar la forma condicional del original.
- source_word: יֵצְאוּ
  english_pob_choice: come out
  chosen_spanish: salgan
  alternatives_spanish:
  - salgan afuera
  - salgan a salir
  lexicon: HALOT
  rationale: «Salgan» es la equivalencia natural para el movimiento de salir a la vista desde un lugar determinado.
- source_word: בְנוֹת שִׁילוֹ
  english_pob_choice: the daughters of Shiloh
  chosen_spanish: las hijas de Silo
  alternatives_spanish:
  - las mujeres de Silo
  - las jóvenes de Silo
  lexicon: HALOT
  rationale: Se conserva la construcción relacional del hebreo. «Hijas de Silo» evita introducir edad o estado civil no explicitados en el texto.
- source_word: לָחוּל
  english_pob_choice: to dance
  chosen_spanish: bailar
  alternatives_spanish:
  - danzar
  - girar en danza
  lexicon: HALOT
  rationale: El verbo designa aquí una danza festiva. «Bailar» es comprensible y natural en español; «danzar» sería más formal, pero menos espontáneo.
- source_word: בַּמְּחֹלוֹת
  english_pob_choice: in the dances
  chosen_spanish: en las danzas
  alternatives_spanish:
  - en los bailes
  - en la danza
  lexicon: HALOT
  rationale: El plural se conserva con «las danzas», evitando singularizar un sustantivo que el hebreo presenta en plural y manteniendo la textura del original.
- source_word: וִיצָאתֶם מִן הַכְּרָמִים
  english_pob_choice: then come out from the vineyards
  chosen_spanish: entonces salgan de las viñas
  alternatives_spanish:
  - entonces salgan de los viñedos
  - luego salgan de las viñas
  lexicon: HALOT
  rationale: «Viñas» comunica bien el lugar agrícola y resulta más natural que «viñedos» en este contexto narrativo. Se mantiene la idea de salir desde un ocultamiento o espera entre las viñas.
- source_word: וַחֲטַפְתֶּם
  english_pob_choice: seize
  chosen_spanish: arrebátense
  alternatives_spanish:
  - apodérense
  - agarren por la fuerza
  - arrebaten
  lexicon: HALOT
  rationale: El verbo expresa una acción de toma violenta o forzosa. «Arrebátense» intenta reflejar esa fuerza verbal sin introducir un tecnicismo legal ajeno al hebreo. Dado que el español carece de un equivalente simple y directo exactamente paralelo, se conserva la violencia léxica con una forma impersonal/reflexiva de mandato contextualizada por el objeto del acto.
- source_word: לָכֶם
  english_pob_choice: for yourselves
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para sí
  - para ustedes mismos
  lexicon: HALOT
  rationale: La dativa de beneficio/acquisición se traduce de forma clara con «para ustedes»; el sentido posesivo queda suficientemente expresado por el verbo y el contexto.
- source_word: אִישׁ אִשְׁתּוֹ
  english_pob_choice: each man his wife
  chosen_spanish: cada hombre su mujer
  alternatives_spanish:
  - cada uno su mujer
  - cada hombre su esposa
  lexicon: HALOT
  rationale: Se preserva la distribución singular y el género masculino del hebreo. «Mujer» reproduce mejor el hebreo אִשָּׁה/אִשְׁתּוֹ que «esposa», que sería más interpretativo.
- source_word: מִבְּנוֹת שִׁילוֹ
  english_pob_choice: from the daughters of Shiloh
  chosen_spanish: de entre las hijas de Silo
  alternatives_spanish:
  - de las hijas de Silo
  - entre las hijas de Silo
  lexicon: HALOT
  rationale: «De entre» deja claro que se trata de una selección desde un grupo, no de procedencia espacial simple. Esa matización ayuda en español a reflejar el valor distributivo del hebreo.
- source_word: וַהֲלַכְתֶּם אֶרֶץ בִּנְיָמִן
  english_pob_choice: and go to the land of Benjamin
  chosen_spanish: y vayan a la tierra de Benjamín
  alternatives_spanish:
  - y vayan al territorio de Benjamín
  - y entren en la tierra de Benjamín
  lexicon: HALOT
  rationale: «Tierra de Benjamín» mantiene la expresión bíblica de territorio tribal, y «vayan» expresa con naturalidad el movimiento indicado por el hebreo.
theological_decisions:
- issue: Violencia del acto expresado por חטף
  english_pob_reading: seize for yourselves
  chosen_spanish_reading: arrebátense para ustedes
  alternative_spanish_readings:
  - apodérense para ustedes
  - tómenlas por la fuerza
  rationale: El hebreo describe una toma forzosa. No conviene suavizarlo, pero tampoco cargar el texto con una paráfrasis jurídica moderna que el original no usa. La opción elegida conserva la crudeza verbal y deja visible la tensión moral del relato.
  doctrine_reference: Principio POB de no borrar tensiones léxicas o teológicas del texto fuente
- issue: Marcador condicional frente a sentido temporal previsto
  english_pob_reading: when the daughters of Shiloh come out
  chosen_spanish_reading: cuando las hijas de Silo salgan
  alternative_spanish_readings:
  - si las hijas de Silo salen
  - en caso de que las hijas de Silo salgan
  rationale: Se mantiene la forma de escenario previsto que el hebreo permite. «Cuando» en español comunica mejor el valor narrativo de una situación esperada sin negar la estructura condicional del original.
  doctrine_reference: Principio POB de equivalencia óptima con atención a la función discursiva
translation_notes:
  revision_awareness: La redacción sigue el estado revisado del audit trail inglés, que prefirió «when» para el valor contextual del condicional. Se respetó además la decisión de mantener la fuerza de חטף con una traducción que no la suaviza. En español se ajustó la expresión para sonar natural sin perder la secuencia imperativa y la crudeza del acto descrito.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando el nombre divino aparece; este versículo no lo contiene.
  - Se mantuvo la referencia tribal «Benjamín» y la topografía ritual/cultural de Silo sin explicaciones añadidas.
  - Se preservó el plural de «danzas» y la distribución singular «cada hombre su mujer» para reflejar la forma del hebreo.
  - La nota textual en el cuerpo se ancla en «Miren[a]» para ofrecer una alternativa léxica auditable.
