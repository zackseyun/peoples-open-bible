translation:
  language: es
  text: 'Entonces Judá dijo a sus hermanos[a]: «¿Qué provecho hay si matamos a nuestro hermano y encubrimos su sangre?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué ganancia hay si matamos a nuestro hermano y ocultamos su sangre?» La expresión hebrea «cubrir la sangre» es un modismo para ocultar el derramamiento de sangre o la culpa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva avanza la escena; «Entonces» conserva el valor secuencial de manera natural en español.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: HALOT
  rationale: Nombre propio bíblico en forma castellana usual y clara.
- source_word: אֶל אֶחָיו
  english_pob_choice: to his brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus hermanos varones
  - a sus hermanos y hermanas
  lexicon: HALOT
  rationale: El plural masculino se refiere a los hermanos presentes en la narración; «hermanos» es fiel y natural en español.
- source_word: מַה בֶּצַע
  english_pob_choice: What profit is there
  chosen_spanish: ¿Qué provecho hay?
  alternatives_spanish:
  - ¿Qué ganancia hay?
  - ¿Qué beneficio hay?
  lexicon: HALOT
  rationale: בֶּצַע expresa ganancia o provecho, con matiz de interés pragmático; «provecho» comunica bien la pregunta retórica sin sobreparafrasear.
- source_word: כִּי
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - que
  - porque
  lexicon: HALOT
  rationale: 'Aquí introduce la condición de la pregunta retórica: «si matamos...».'
- source_word: נַהֲרֹג
  english_pob_choice: we kill
  chosen_spanish: matamos
  alternatives_spanish:
  - mataremos
  - mataríamos
  lexicon: HALOT
  rationale: El imperfecto en este contexto retórico se vierte naturalmente con presente en español para mantener la inmediatez de la pregunta.
- source_word: אָחִינוּ
  english_pob_choice: our brother
  chosen_spanish: nuestro hermano
  alternatives_spanish:
  - a nuestro hermano
  lexicon: HALOT
  rationale: La relación familiar es central para la fuerza moral del enunciado; se mantiene en forma directa.
- source_word: וְכִסִּינוּ אֶת דָּמוֹ
  english_pob_choice: and cover up his blood
  chosen_spanish: y cubrimos su sangre
  alternatives_spanish:
  - y escondemos su sangre
  - y encubrimos su sangre
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea literal de «cubrir la sangre». En español, «cubrir» permite mantener la metáfora; «su sangre» refleja el objeto directo pronominal del hebreo.
translation_notes:
  revision_awareness: La redacción sigue el acuerdo de alta concordancia del expediente inglés y conserva el ajuste revisado de la imagen idiomática con un «cubrir» más natural en español, sin perder la literalidad del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Judá» y «hermanos» siguen la forma bíblica estándar y clara en español.
  - Se preserva la metáfora de la sangre para reflejar el modismo hebreo, con nota alternativa para explicitar el sentido de ocultar el derramamiento o la culpa.
