review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: tomar el dinero de expiación de los hijos de Israel, asignarlo al servicio del santuario, y que sirva como memorial delante de Yahvé para hacer expiación por sus vidas. Sin embargo, se aparta innecesariamente de la decisión inglesa auditada y del hebreo en עַל עֲבֹדַת אֹהֶל מוֹעֵד al traducir אֹהֶל מוֹעֵד como ''tabernáculo de reunión'' en vez de ''tienda de reunión''. Además, la nota [a] introduce hebreo sin traducir (''כסף''), lo que no es apropiado para una nota final española pulida.'
  spanish_quality_summary: El español es claro, digno y mayormente natural. 'Dinero de la expiación', 'hijos de Israel', 'memorial' y 'delante de Yahvé' funcionan bien. No obstante, 'tabernáculo de reunión' suena más tradicional que fiel al léxico concreto 'tienda', y la nota [a] necesita pulido para legibilidad. El resto del verso lee bien en español eclesial contemporáneo.
  glossary_alignment: Alinea correctamente con Yahvé para יהוה, mantiene 'hijos de Israel' para בְּנֵי יִשְׂרָאֵל, y conserva la fuerza cultual de כפר con 'expiación'. La principal desalineación terminológica es אֹהֶל מוֹעֵד, donde el proyecto inglés documenta 'tent of meeting'; en español debe preferirse 'tienda de reunión' salvo una razón contextual fuerte, que aquí no aparece.
  issues:
  - severity: medium
    issue: '''tabernáculo de reunión'' para אֹהֶל מוֹעֵד'
    rationale: El hebreo dice literalmente 'tienda de reunión', y el POB inglés auditado eligió 'tent of meeting'. 'Tabernáculo' es comprensible y tradicional, pero desplaza la imagen léxica concreta de אֹהֶל y se aleja sin necesidad de la decisión fuente.
  - severity: low
    issue: Nota [a] contiene hebreo crudo ('כסף')
    rationale: La nota debe ser plenamente legible en español. Puede explicar el literal hebreo con palabras españolas ('plata/dinero de las expiaciones') sin insertar una palabra hebrea sin transliterar ni traducir.
