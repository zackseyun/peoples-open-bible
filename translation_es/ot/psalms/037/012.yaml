translation:
  language: es
  text: El malvado trama[a] contra el justo y rechina los dientes contra él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «maquina contra el justo» o «planea mal contra el justo».
    reason: lexical_alternative
  - marker: b
    text: La expresión «rechina los dientes» es un modismo de ira y hostilidad.
    reason: cultural_note
lexical_decisions:
- source_word: זֹמֵם
  english_pob_choice: plots
  chosen_spanish: trama
  alternatives_spanish:
  - maquina
  - planea
  - conspira
  lexicon: HALOT
  rationale: El participio expresa ideación hostil o planeación maliciosa. «Trama» comunica bien esa intención en español, mantiene concisión poética y evita sobreexplicar con «planear el mal».
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el malhechor
  - el malvado hombre
  lexicon: HALOT
  rationale: Aquí funciona como sustantivo para una persona caracterizada por su perversidad. «El malvado» es natural en español y conserva el valor de clase/individuo sin forzar una perífrasis.
- source_word: לַצַּדִּיק
  english_pob_choice: against the righteous
  chosen_spanish: contra el justo
  alternatives_spanish:
  - contra el righteous
  - contra el recto
  - contra el hombre justo
  lexicon: HALOT
  rationale: El objeto de hostilidad se expresa con la preposición נגד/לַ en sentido adversativo. «El justo» es la forma más idiomática y fiel en español bíblico para צַדִּיק en este contexto.
- source_word: חֹרֵק
  english_pob_choice: gnashes
  chosen_spanish: rechina
  alternatives_spanish:
  - cruje
  - aprieta
  - hace rechinar
  lexicon: HALOT
  rationale: El verbo describe el frotar de los dientes como señal de ira u hostilidad. «Rechina» preserva la imagen física del hebreo y es comprensible en español, aunque el gesto idiomático sea de enojo.
- source_word: עָלָיו
  english_pob_choice: at him
  chosen_spanish: contra él
  alternatives_spanish:
  - a él
  - sobre él
  lexicon: HALOT
  rationale: Con el gesto de rechinar los dientes, el sentido es de agresión dirigida. «Contra él» expresa la hostilidad con mayor naturalidad en español que un simple «a él».
- source_word: שִׁנָּיו
  english_pob_choice: his teeth
  chosen_spanish: los dientes
  alternatives_spanish:
  - sus dientes
  lexicon: HALOT
  rationale: El hebreo usa el posesivo explícito, pero en español la posesión ya queda suficientemente marcada por el sujeto implícito y el contexto del gesto. «Los dientes» suena más fluido en poesía; el valor posesivo permanece en la relación verbal.
translation_notes:
  revision_awareness: El inglés POB mantuvo el sentido de hostilidad del modismo ‘gnashes his teeth’ y dejó alternativas léxicas para ‘plots’; esta versión sigue ese marco, pero opta por una formulación española más poética y directa, sin añadir contenido no presente en el hebreo.
  spanish_consistency_notes:
  - Se mantiene ‘justo’ para צַדִּיק en coherencia con el léxico bíblico del salterio.
  - Se conserva el tono poético breve del hebreo, sin explicitar ‘mal’ adicionalmente en el texto principal.
  - No se usa ‘Cristo’, ‘Señor’ ni otros términos no pertinentes al versículo.
