translation:
  language: es
  text: Aplicará su corazón a la conclusión de su trabajo[a], y su vigilia es para concluirlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego literalmente, «dará su corazón a la conclusión de obras, y su vigilia para adornar hasta la conclusión». La redacción es idiomática y condensada; el texto principal expresa el sentido de esfuerzo concentrado por terminar bien su labor. Aunque ἔργων está en plural («obras»), en español «su trabajo» suena más natural aquí como singular colectivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: καρδίαν
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - ánimo
  - atención
  lexicon: LSJ
  rationale: En griego, καρδία puede designar la sede interior de intención y pensamiento. «Corazón» conserva esa antropología concreta y sigue el valor del inglés POB sin volverlo abstracto en exceso.
- source_word: δώσει εἰς
  english_pob_choice: will apply ... to
  chosen_spanish: aplicará ... a
  alternatives_spanish:
  - dará ... a
  - dedicará ... a
  - pondrá ... en
  lexicon: LSJ
  rationale: La expresión idiomática comunica orientación deliberada hacia una tarea. «Aplicará ... a» reproduce ese sentido en español de forma natural y fiel.
- source_word: συντέλειαν
  english_pob_choice: completion
  chosen_spanish: terminación
  alternatives_spanish:
  - completación
  - finalización
  - consumación
  lexicon: LSJ
  rationale: El contexto es el cierre de una labor artesanal o práctica. «Terminación» expresa el llegar al final de la obra sin introducir una noción doctrinal de «consumación».
- source_word: ἔργων
  english_pob_choice: his work
  chosen_spanish: sus obras
  alternatives_spanish:
  - su trabajo
  - sus labores
  - sus tareas
  lexicon: LSJ
  rationale: Aunque el griego está en plural, el español admite aquí el plural «obras» para conservar la forma y el matiz de producción artesanal o de trabajos realizados.
- source_word: ἀγρυπνία
  english_pob_choice: wakefulness
  chosen_spanish: vigilia
  alternatives_spanish:
  - desvelo
  - insomnio
  - vigilancia
  lexicon: LSJ
  rationale: ἀγρυπνία indica mantenerse despierto con atención. «Vigilia» preserva la idea de desvelo atento y suena sobrio en español bíblico.
- source_word: κοσμῆσαι
  english_pob_choice: to finish it
  chosen_spanish: concluirlas
  alternatives_spanish:
  - adornarlas
  - ordenarlas
  - darles forma
  lexicon: LSJ
  rationale: El verbo puede significar adornar, ordenar o disponer. En este contexto de trabajo terminado, «concluirlas» recoge el sentido funcional de llevarlas a su término sin forzar el componente ornamental.
- source_word: ἐπὶ συντελείας
  english_pob_choice: for finishing it
  chosen_spanish: para concluirlas
  alternatives_spanish:
  - para su terminación
  - hasta el final
  - para completarlas
  lexicon: LSJ
  rationale: La frase refuerza la idea de culminación. «Para concluirlas» evita una repetición demasiado rígida y mantiene el impulso hacia el acabado final.
translation_notes:
  revision_awareness: La versión inglesa revisada prefirió «wakefulness» y «finishing» frente a un giro más interpretativo como «perfection». La presente redacción sigue esa revisión, evitando una noción abstracta de perfección y manteniendo el foco en el término práctico de la labor.
  spanish_consistency_notes:
  - Se mantuvo un estilo formal y bíblico sin depender de fórmulas tradicionales que en español podrían oscurecer el griego.
  - «Vigilia» se usó en lugar de «vigilancia» para conservar la imagen de permanecer despierto; «concluir» se eligió para el cierre práctico de la obra.
  - No se introdujo terminología doctrinal ajena al contexto; la línea describe diligencia artesanal o laboral más que una enseñanza teológica explícita.
