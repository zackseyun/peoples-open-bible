translation:
  language: es
  text: Vi a él y a Apame[a], hija de Bartaco el admirable[b], la concubina del rey, sentada a la derecha del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “Apama”. El nombre griego Ἀπάμην admite más de una transliteración estándar.
    reason: lexical_alternative
  - marker: b
    text: El epíteto de Bartaco significa literalmente “admirable”, “notable” o “renombrado”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐθεώρουν
  english_pob_choice: I saw
  chosen_spanish: Yo lo veía a él
  alternatives_spanish:
  - Yo lo vi
  - Yo estaba mirando
  lexicon: LSJ
  rationale: El imperfecto griego expresa acción en curso; en español, “yo lo veía” conserva mejor esa duratividad que un pretérito simple. Se explicita “a él” para mantener el objeto directo del contexto inmediato y evitar ambigüedad en la referencia.
- source_word: Ἀπάμην
  english_pob_choice: Apame
  chosen_spanish: Apame
  alternatives_spanish:
  - Apama
  lexicon: LSJ
  rationale: Se conserva una transliteración cercana al acusativo griego. “Apama” es una variante posible, pero “Apame” refleja mejor la forma textual aquí.
- source_word: θυγατέρα
  english_pob_choice: daughter
  chosen_spanish: hija
  alternatives_spanish:
  - descendiente
  lexicon: LSJ
  rationale: “Hija” es la equivalencia directa y natural en español para el término de parentesco.
- source_word: Βαρτάκου
  english_pob_choice: Bartacus
  chosen_spanish: Bartaco
  alternatives_spanish:
  - Bartacos
  lexicon: LSJ
  rationale: Se translitera el nombre propio al español con adaptación ortográfica mínima para lectura natural, sin intentar traducirlo.
- source_word: τοῦ θαυμαστοῦ
  english_pob_choice: the admirable
  chosen_spanish: el admirable
  alternatives_spanish:
  - el ilustre
  - el renombrado
  - el admirable, el notable
  lexicon: LSJ
  rationale: Se mantiene el epíteto adjetival de θαυμαστός con “admirable”, que conserva el valor de alguien digno de admiración o notoriedad sin convertirlo en título.
- source_word: παλλακὴν
  english_pob_choice: concubine
  chosen_spanish: concubina
  alternatives_spanish:
  - amante
  - favorita
  lexicon: LSJ
  rationale: “Concubina” es el equivalente preciso y mantiene la fuerza social y sexual del término griego sin suavizarlo indebidamente.
- source_word: καθημένην
  english_pob_choice: sitting
  chosen_spanish: sentada
  alternatives_spanish:
  - estando sentada
  - sentándose
  lexicon: LSJ
  rationale: El participio se vierte con un participio/adjetivo de estado natural en español, “sentada”, que transmite la postura de manera clara y fluida.
- source_word: ἐν δεξιᾷ τοῦ βασιλέως
  english_pob_choice: at the king’s right hand
  chosen_spanish: a la derecha del rey
  alternatives_spanish:
  - a la diestra del rey
  - al lado derecho del rey
  lexicon: LSJ
  rationale: “A la derecha del rey” comunica el sentido idiomático de posición de honor en español moderno. “A la diestra” sería más tradicional, pero menos neutral y menos directo.
theological_decisions:
- issue: Valor honorífico de estar a la derecha del rey
  english_pob_reading: at the king’s right hand
  chosen_spanish_reading: a la derecha del rey
  alternative_spanish_readings:
  - a la diestra del rey
  - al lado derecho del rey
  rationale: No se introduce una lectura teológica adicional; se conserva simplemente el valor de posición privilegiada que el griego expresa. En español, “a la derecha del rey” mantiene tanto la literalidad espacial como la implicación honorífica sin exceder el texto.
  doctrine_reference: No aplica; decisión de pragmática narrativa y honor cortesano.
translation_notes:
  revision_awareness: 'Se siguió el texto griego de Swete LXX 1909 y el audit trail en inglés sin cambios de revisión posteriores; la traducción inglesa ya estaba marcada como sin cambios necesarios. La versión española conserva los elementos semánticos principales del griego: imperfecto de visión, nombre propio, parentesco, epíteto, concubinato y la posición a la derecha del rey.'
  spanish_consistency_notes:
  - Se usa “hija” en lugar de una paráfrasis genealógica para mantener la precisión del parentesco.
  - Se emplea “concubina” de modo consistente con la fuerza léxica del griego παλλακή.
  - Se prefirió “a la derecha del rey” sobre “a la diestra” por claridad moderna, sin perder el matiz honorífico.
  - Los nombres propios se transliteran al español con mínima adaptación para legibilidad.
