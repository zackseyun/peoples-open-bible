base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/051/039.yaml
  text: When they are heated[a], I will set out their drink and make them drunk, so that they may exult and sleep an everlasting sleep and not wake up[b], declares Yahweh.
  footnotes:
  - marker: a
    text: Or 'their feast' or 'their banquet' for 'their drink' (מִשְׁתֵּיהֶם); the Hebrew term can denote a drinking feast.
    reason: lexical_alternative
  - marker: b
    text: '''Everlasting sleep'' is a Hebrew metaphor for irreversible death under judgment; literally, ''sleep of perpetuity.'''
    reason: cultural_note
