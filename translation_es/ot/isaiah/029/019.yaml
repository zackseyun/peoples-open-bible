translation:
  language: es
  text: Los humildes volverán a regocijarse en Yahvé[a], y los pobres entre la humanidad[b] se gozarán en el Santo de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «volverán a tener gozo» o «volverán a alegrarse». El hebreo puede entenderse literalmente como «añadir/incrementar», y el sustantivo puede reflejarse como «gozo» o «alegría».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los pobres entre los seres humanos» o «los pobres de la humanidad». אָדָם aquí es genérico, referido a la humanidad en general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָסְפוּ
  english_pob_choice: will again rejoice
  chosen_spanish: volverán a regocijarse
  alternatives_spanish:
  - volverán a alegrarse
  - volverán a gozar
  - se alegrarán de nuevo
  lexicon: HALOT
  rationale: El hebreo יסף expresa añadir/incrementar y, en este contexto poético, la revisión inglesa lo entendió como 'again rejoice' para reflejar el aumento renovado de alegría. En español, 'volverán a regocijarse' comunica con naturalidad la idea iterativa sin perder la fuerza del verbo.
- source_word: עֲנָוִים
  english_pob_choice: the humble
  chosen_spanish: los humildes
  alternatives_spanish:
  - los mansos
  - los mansos de corazón
  - los afligidos
  lexicon: HALOT
  rationale: עֲנָוִים abarca humildes/mansos, con matiz de baja condición delante de Dios. 'Los humildes' preserva ese sentido amplio y es claro en español contemporáneo.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahweh
  - en el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יהוה: ''Yahvé'' en el texto principal. La preposición ב marca la esfera del regocijo: la alegría está ''en'' Yahvé.'
- source_word: שִׂמְחָה
  english_pob_choice: joy
  chosen_spanish: regocijarse
  alternatives_spanish:
  - gozo
  - alegría
  - gozarse
  lexicon: HALOT
  rationale: Aunque el sustantivo es 'alegría/gozo', el conjunto verbal de יָסְפוּ ... שִׂמְחָה se expresa mejor en español con un verbo de regocijo. Esto evita una construcción forzada como 'volverán a aumentar alegría'.
- source_word: וְאֶבְיוֹנֵי אָדָם
  english_pob_choice: the poor among mankind
  chosen_spanish: los pobres de entre los hombres
  alternatives_spanish:
  - los pobres entre la humanidad
  - los pobres entre los seres humanos
  - los pobres de la humanidad
  lexicon: HALOT
  rationale: אֶבְיוֹן es 'pobre/necesitado'. אָדָם aquí es genérico, no masculino exclusivo; por eso se conserva el valor humano general con 'de entre los hombres', manteniendo la resonancia idiomática bíblica sin borrar la universalidad del término.
- source_word: בִּקְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: in the Holy One of Israel
  chosen_spanish: en el Santo de Israel
  alternatives_spanish:
  - en el Santo de Israel
  - en el Santo de Israel, su Dios
  lexicon: HALOT
  rationale: '''El Santo de Israel'' es un título isaiano fijo y debe conservarse como tal. ''Santo'' traduce el sustantivo divino de manera directa y reverente en español.'
- source_word: יָגִילוּ
  english_pob_choice: will exult
  chosen_spanish: se gozarán
  alternatives_spanish:
  - exultarán
  - se alegrarán mucho
  - se regocijarán
  lexicon: HALOT
  rationale: גיל expresa gozo exultante. 'Se gozarán' mantiene el paralelismo poético y diferencia adecuadamente este verbo del primer hemistiquio, sin sonar excesivamente técnico en español.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrama directamente. Conforme al criterio del proyecto, se conserva el nombre propio divino en español como 'Yahvé', evitando la sustitución litúrgica por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Valor genérico de אָדָם
  english_pob_reading: mankind
  chosen_spanish_reading: de entre los hombres
  alternative_spanish_readings:
  - de la humanidad
  - entre los seres humanos
  - de la gente
  rationale: אָדָם funciona aquí de modo genérico para seres humanos en general. 'De entre los hombres' mantiene ese valor colectivo en español sin restringirlo a varones particulares ni sonar artificial.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió un equivalente verbal directo para יָסְפוּ ... שִׂמְחָה y distinguió claramente יָגִילוּ con un verbo de gozo más fuerte. Se conservó esa distinción en español mediante 'volverán a regocijarse' / 'se gozarán'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al criterio del proyecto para יהוה.
  - Se preservó el título fijo 'el Santo de Israel' sin paraphrase.
  - '''Los pobres de entre los hombres'' conserva el valor genérico de אָדָם sin introducir lenguaje ajeno al registro bíblico.'
  - La pareja verbal 'regocijarse' / 'gozarse' refleja la distinción poética del hebreo y la revisión inglesa.
