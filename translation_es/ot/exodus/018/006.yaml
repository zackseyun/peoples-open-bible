translation:
  language: es
  text: 'Él dijo a Moisés: «Yo, Jetro, tu suegro, vengo a ti, con tu esposa y sus dos hijos[a] con ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus dos hijos». Algunas traducciones suavizan esto como «tus dos hijos», pero el texto masorético lleva un sufijo femenino singular, referido a la esposa de Moisés.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: He said
  chosen_spanish: Él dijo
  alternatives_spanish:
  - Y dijo
  - Entonces dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español puede omitirse el matiz de enlace sin perder el flujo, pero se conserva el sujeto explícito como en el hebreo.
- source_word: אֶל מֹשֶׁה
  english_pob_choice: to Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - para Moisés
  lexicon: HALOT
  rationale: La preposición direccional se expresa de forma natural con «a» en español.
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  lexicon: HALOT
  rationale: El pronombre independiente se mantiene para reproducir el énfasis del hebreo en el discurso directo.
- source_word: חֹתֶנְךָ
  english_pob_choice: your father-in-law
  chosen_spanish: tu suegro
  alternatives_spanish:
  - tu pariente por afinidad
  lexicon: HALOT
  rationale: En este contexto la relación es claramente la de suegro; «suegro» es idiomático y preciso en español.
- source_word: יִתְרוֹ
  english_pob_choice: Jethro
  chosen_spanish: Jetró
  alternatives_spanish:
  - Jetro
  lexicon: Convención onomástica bíblica
  rationale: Se translitera el nombre propio con acento gráfico según uso bíblico en español, manteniendo la identificación del personaje.
- source_word: בָּא אֵלֶיךָ
  english_pob_choice: am coming to you
  chosen_spanish: vengo a ti
  alternatives_spanish:
  - estoy viniendo a ti
  - me estoy acercando a ti
  lexicon: HALOT
  rationale: El participio con frase direccional expresa una llegada/approach en curso o inminente; «vengo» suena natural y preserva la acción en desarrollo mejor que un pasado.
- source_word: וְאִשְׁתְּךָ
  english_pob_choice: with your wife
  chosen_spanish: con tu esposa
  alternatives_spanish:
  - y tu esposa
  lexicon: HALOT
  rationale: La conjunción introduce acompañantes; «con» aclara la relación de compañía sin forzar una coordinación simple que en español podría sonar menos precisa.
- source_word: וּשְׁנֵי בָנֶיהָ
  english_pob_choice: and her two sons
  chosen_spanish: sus dos hijos
  alternatives_spanish:
  - sus dos hijos de ella
  - los dos hijos de ella
  lexicon: HALOT
  rationale: El sufijo femenino singular del hebreo apunta a la esposa de Moisés; en español el posesivo «sus» permite reflejar el antecedente femenino sin sobrecargar el texto, y la nota conserva la tensión textual.
- source_word: עִמָּהּ
  english_pob_choice: with her
  chosen_spanish: con ella
  alternatives_spanish:
  - a su lado
  lexicon: HALOT
  rationale: Se conserva explícitamente la idea de compañía que el hebreo añade al grupo que viaja con Jetró.
theological_decisions:
- issue: Tensión textual en el posesivo de «sus dos hijos / her two sons»
  english_pob_reading: The English POB preserves the Masoretic Text reading 'her two sons' and notes that some translations smooth it to 'your two sons.'
  chosen_spanish_reading: «sus dos hijos» con nota explicativa de que el hebreo dice literalmente «sus/los de ella dos hijos», referidos a la esposa de Moisés.
  alternative_spanish_readings:
  - «tus dos hijos»
  - «los dos hijos de ella»
  rationale: La forma hebrea con sufijo femenino singular no debe armonizarse sin más. En español, «sus dos hijos» es la forma más fluida para el texto principal y permite mantener en nota la decisión textual y su referencia a la esposa.
  doctrine_reference: Crítica textual / fidelidad al texto masorético
translation_notes:
  revision_awareness: 'Se ha seguido la última revisión del audit trail inglés en cuanto al orden apposicional: «Yo, Jetró, tu suegro»; en español se adapta a una estructura natural manteniendo todos los elementos del original y la tensión textual de «sus dos hijos» frente a lecturas armonizadas.'
  spanish_consistency_notes:
  - Se prefirió «Jetró» con acento por convención bíblica española.
  - Se mantuvo «suegro» por ser la relación explícita y no una paráfrasis general.
  - El pronombre explícito «Yo» refleja el énfasis del hebreo independiente אֲנִי.
  - «Con ella» conserva la referencia de acompañamiento del final del versículo.
