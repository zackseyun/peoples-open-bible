translation:
  language: es
  text: 'Entonces estos altos oficiales y sátrapas se presentaron[a] ante el rey y le dijeron: «¡Rey Darío, vive para siempre![b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión aramea puede significar «se presentaron ante», «se reunieron ante» o incluso «se congregaron ante» el rey; el contexto sugiere una aproximación coordinada y posiblemente conspirativa.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «Rey Darío, vive por los siglos». Es una aclamación cortesana convencional, no una afirmación literal de inmortalidad.
    reason: cultural_note
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En seguida
  lexicon: HALOT
  rationale: Adverbio temporal/narrativo que introduce la siguiente acción. «Entonces» conserva la secuencia sin sonar artificial en español.
- source_word: סָרְכַיָּא
  english_pob_choice: high officials
  chosen_spanish: altos oficiales
  alternatives_spanish:
  - funcionarios principales
  - comisarios
  lexicon: HALOT
  rationale: El título arameo designa a funcionarios de alto rango imperial. «Altos oficiales» comunica rango y evita un término demasiado técnico o eclesiástico.
- source_word: אֲחַשְׁדַּרְפְּנַיָּא
  english_pob_choice: satraps
  chosen_spanish: sátrapas
  alternatives_spanish:
  - gobernadores provinciales
  lexicon: HALOT
  rationale: Se conserva el término histórico persa ya asentado en español para mantener el marco administrativo del relato.
- source_word: הַרְגִּשׁוּ עַל
  english_pob_choice: came before
  chosen_spanish: llegaron ante
  alternatives_spanish:
  - se presentaron ante
  - se acercaron a
  lexicon: HALOT
  rationale: La expresión aramea señala una llegada o comparecencia ante el rey. «Llegaron ante» mantiene la idea de acercamiento formal sin añadir interpretaciones más fuertes en el texto principal.
- source_word: מַלְכָּא
  english_pob_choice: the king
  chosen_spanish: el rey
  lexicon: HALOT
  rationale: Título real definido, con la forma normal en español.
- source_word: וְכֵן
  english_pob_choice: this
  chosen_spanish: así
  alternatives_spanish:
  - esto
  - de este modo
  lexicon: HALOT
  rationale: Introduce el contenido de su habla. En español, «y le dijeron así» resultaría poco natural; por eso se integra el sentido en la construcción siguiente.
- source_word: אָמְרִין
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - decían
  lexicon: HALOT
  rationale: Forma narrativa pasada natural en español, adecuada para la secuencia histórica.
- source_word: לֵהּ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: Pronombre dativo explícito en español; «le» conserva la economía del original.
- source_word: דָּרְיָוֶשׁ
  english_pob_choice: Darius
  chosen_spanish: Darío
  alternatives_spanish:
  - Darius
  lexicon: HALOT
  rationale: Nombre propio adaptado a la forma española habitual sin alterar la identidad histórica.
- source_word: מַלְכָּא
  english_pob_choice: King
  chosen_spanish: Rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: 'En vocativo, el título se capitaliza al inicio de la cita directa por convención editorial española: «Rey Darío». Mantiene la estructura reverencial del aclamativo cortesano.'
- source_word: לְעָלְמִין
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - por siempre
  lexicon: HALOT
  rationale: Expresa la fórmula cortesana de larga vida/reinado con naturalidad en español, sin convertirla en una afirmación literal de inmortalidad.
- source_word: חֱיִי
  english_pob_choice: live
  chosen_spanish: vive
  alternatives_spanish:
  - que vivas
  - viva
  lexicon: HALOT
  rationale: Imperativo/aclamación formulado de manera directa y natural en español. La fuerza optativa queda implícita en el contexto ceremonial.
theological_decisions:
- issue: La acclamación «vive para siempre» como fórmula cortesana, no como inmortalidad literal
  english_pob_reading: Literally, “King Darius, live for ages.” This is a conventional court acclamation, not a literal claim of immortality.
  chosen_spanish_reading: «¡Rey Darío, vive para siempre!» como fórmula de corte, no como afirmación literal de inmortalidad.
  alternative_spanish_readings:
  - «¡Rey Darío, que vivas para siempre!»
  - «¡Rey Darío, viva para siempre!»
  rationale: La frase aramea funciona como saludo protocolario de larga vida. En español, la forma más reconocible es «vive para siempre», pero se debe entender en sentido cortesano y no metafísico.
  doctrine_reference: Uso histórico-literario del lenguaje cortesano; no implica doctrina sobre inmortalidad humana.
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del POB en inglés, que prefirió «came before the king» por mayor precisión léxica frente a expansiones interpretativas. Se preserva esa concreción con «llegaron ante el rey», y se mantiene la nota de la fórmula cortesana como acclamación fija.
  spanish_consistency_notes:
  - Se preserva la secuencia narrativa sin añadir sujetos implícitos innecesarios.
  - «Sátrapas» se conserva como término histórico ya asentado en español.
  - No se usa «SEÑOR» ni una paráfrasis devocional; el tono es cortesano e histórico.
  - La cita directa mantiene la fórmula breve y reverencial del original.
