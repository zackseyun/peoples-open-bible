translation:
  language: es
  text: Habría sido como si no hubiera sido[a][b]; desde el vientre habría sido llevado al sepulcro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Habría sido como si no hubiera existido.”'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: “desde el vientre hasta el sepulcro habría sido llevado.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: as though
  chosen_spanish: como si
  alternatives_spanish:
  - así como
  - tal como
  lexicon: HALOT
  rationale: La partícula introduce aquí una comparación contrafactual, no un simple valor temporal de “cuando”. En español, “como si” expresa con naturalidad la irrealidad de la situación, manteniendo el sentido del audit trail inglés.
- source_word: לֹא הָיִיתִי אֶהְיֶה
  english_pob_choice: I would have been ... I had not been
  chosen_spanish: habría sido ... no hubiera existido
  alternatives_spanish:
  - habría sido ... no hubiera sido
  - habría existido ... no hubiera existido
  lexicon: HALOT
  rationale: La secuencia de formas de היה comunica una condición irreal o contrafactual. “Habría sido” reproduce el valor de potencial pasado, y “no hubiera existido” recoge bien la alternativa textual/semántica documentada en inglés sin volverla demasiado literal ni perder la tensión entre ser y existir.
- source_word: מִבֶּטֶן
  english_pob_choice: from the womb
  chosen_spanish: desde el vientre
  alternatives_spanish:
  - desde el útero
  - desde la matriz
  lexicon: HALOT
  rationale: “Vientre” conserva la imaginería concreta y es natural en español bíblico moderno. Mantiene el foco en el origen prenatal, tal como lo hace el hebreo y el inglés POB.
- source_word: לַקֶּבֶר
  english_pob_choice: to the grave
  chosen_spanish: al sepulcro
  alternatives_spanish:
  - a la tumba
  - a la sepultura
  lexicon: HALOT
  rationale: קבר designa el lugar de entierro, no necesariamente Sheol. “Sepulcro” es fiel y digno en español, y mantiene el movimiento nacimiento–muerte del verso.
- source_word: אוּבָל
  english_pob_choice: I would have been carried
  chosen_spanish: habría sido llevado
  alternatives_spanish:
  - habría sido cargado
  - habría sido conducido
  lexicon: HALOT
  rationale: La forma pasiva/causativa del verbo expresa ser llevado o transportado. “Llevado” suena natural en español y preserva la imagen de un tránsito directo del vientre al sepulcro.
theological_decisions:
- issue: Contrafactualidad de la frase completa
  english_pob_reading: I would have been as though I had not been; from the womb I would have been carried to the grave.
  chosen_spanish_reading: Habría sido como si no hubiera existido; desde el vientre habría sido llevado al sepulcro.
  alternative_spanish_readings:
  - Habría sido como si no hubiera sido
  - Habría sido como si no existiera
  rationale: El verso expresa una hipótesis imposible sobre la propia no-existencia. El español elegido conserva ese tono contrafactual sin convertirlo en una afirmación ontológica absoluta o en una simplificación temporal.
  doctrine_reference: Poética sapiencial sobre la fragilidad de la vida y la queja de Job; no formula una doctrina sistemática sobre el ser, sino una lamentación hiperbólica.
translation_notes:
  revision_awareness: Se verificó el audit trail inglés y no se registraron revisiones aplicadas; el borrador español sigue la lectura óptima ya validada por el control de calidad previo.
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió “sepulcro” para קבר por claridad y dignidad, sin introducir Sheol ni otros términos no sustentados por el hebreo.
  - Se preservó la fuerza contrafactual del verso con un condicional compuesto y subjuntivo imperfecto/presente perfectivo en la cláusula comparativa.
  - Se evitó un calco excesivo de la secuencia verbal hebrea para conservar la inteligibilidad en español sin perder el matiz de irrealidad.
