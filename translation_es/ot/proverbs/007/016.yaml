translation:
  language: es
  text: He tendido mi lecho con cobertores[a], con telas coloridas de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con obra tallada, con lino de Egipto». Los términos hebreos para los cobertores y el material egipcio son raros y pueden referirse más específicamente a textiles decorados o bordados.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַרְבַדִּים
  english_pob_choice: coverings
  chosen_spanish: colgaduras
  alternatives_spanish:
  - cobertores
  - coberturas
  - tapices
  lexicon: HALOT
  rationale: El sustantivo plural parece referirse a piezas textiles decorativas para el lecho. «Colgaduras» comunica bien la idea de telas dispuestas como adorno sin volverlo demasiado técnico ni reducirlo a simples coberturas genéricas.
- source_word: רָבַדְתִּי
  english_pob_choice: I have spread
  chosen_spanish: He tendido
  alternatives_spanish:
  - He extendido
  - He cubierto
  - He dispuesto
  lexicon: HALOT
  rationale: El verbo expresa extender o poner en capas. «He tendido» conserva la acción de preparar el lecho de manera natural en español y mantiene el valor de acción ya completada.
- source_word: עַרְשִׂי
  english_pob_choice: my couch
  chosen_spanish: mi lecho
  alternatives_spanish:
  - mi cama
  - mi diván
  lexicon: HALOT
  rationale: El término puede significar cama o lecho; «lecho» es suficientemente amplio y digno en español, y evita forzar una connotación demasiado doméstica o demasiado moderna.
- source_word: חֲטֻבוֹת
  english_pob_choice: colored linens
  chosen_spanish: telas coloridas
  alternatives_spanish:
  - telas bordadas
  - telas adornadas
  - tejidos decorados
  lexicon: HALOT
  rationale: La voz es rara y probablemente alude a textiles trabajados o decorados. «Telas coloridas» mantiene la idea de belleza y ornamentación sin afirmar más de lo que el hebreo permite con certeza.
- source_word: אֵטוּן
  english_pob_choice: linens
  chosen_spanish: telas
  alternatives_spanish:
  - lino
  - lienzos
  - hilo fino
  lexicon: HALOT
  rationale: El término designa material textil fino, con matiz incierto entre lino, hilo o tela. En español, «telas» evita especificar en exceso y funciona bien dentro de la expresión poética del verso.
- source_word: מִצְרָיִם
  english_pob_choice: of Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - egipcias
  - procedentes de Egipto
  lexicon: HALOT
  rationale: La cadena constructa apunta al origen del material como procedente de Egipto. «De Egipto» refleja ese vínculo de procedencia con naturalidad y sin reinterpretarlo como adjetivo estilístico.
translation_notes:
  revision_awareness: El texto hebreo es poético y presenta vocabulario textil raro. Sigo la lectura revisada del POB en inglés que eliminó la especulación «yarn» y la reemplazó por una formulación más directa de procedencia («of Egypt»), preservando la ambigüedad controlada sobre el tipo exacto de tejido. La traducción española mantiene esa cautela y evita añadir detalles no garantizados por el hebreo.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - «Lecho» y «colgaduras» conservan el tono de lujo sensual del contexto sin forzar una interpretación técnica.
  - La nota al pie conserva la alternativa lexical principal documentada por el audit trail del POB, adaptada al español.
