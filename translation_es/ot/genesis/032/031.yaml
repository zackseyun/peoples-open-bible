translation:
  language: es
  text: Y Jacob llamó al lugar Peniel[a], porque he visto a Dios[b] cara a cara, y mi vida[c] ha sido librada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Peniel suena a «rostro de Dios», en consonancia con la explicación de Jacob: «he visto a Dios cara a cara».'
    reason: cultural_note
  - marker: b
    text: «Dios» también podría entenderse de forma más amplia como «un ser divino», pero el contexto favorece «Dios».
    reason: alternative_reading
  - marker: c
    text: O «mi alma ha sido librada», donde «alma» significa aquí «vida» o «yo mismo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - llamó al
  - nombró
  lexicon: HALOT
  rationale: קרא con שֵׁם expresa el acto de poner nombre. En español, «llamó el nombre de» conserva el giro semítico del texto, mientras que «nombró» suavizaría demasiado la construcción.
- source_word: שֵׁם הַמָּקוֹם
  english_pob_choice: the name of the place
  chosen_spanish: el nombre del lugar
  alternatives_spanish:
  - el lugar
  - el nombre del sitio
  lexicon: HALOT
  rationale: Mantiene la estructura nominal del hebreo y deja visible que se trata de una fórmula de nombramiento, no solo de la mención del lugar.
- source_word: פְּנִיאֵל
  english_pob_choice: Peniel
  chosen_spanish: Peniel
  alternatives_spanish:
  - Penuel
  lexicon: HALOT
  rationale: Como nombre propio, se translitera. «Peniel» refleja la forma del versículo y conserva mejor el juego con פָּנִים («cara/rostro») y אֵל («Dios»).
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la explicación causal del nombre. «Porque» es natural en español y conserva la relación explicativa del hebreo.
- source_word: רָאִיתִי אֱלֹהִים
  english_pob_choice: I have seen God
  chosen_spanish: he visto a Dios
  alternatives_spanish:
  - he visto a un ser divino
  - he visto a Dios
  lexicon: HALOT
  rationale: El contexto narrativo favorece un referente directo a Dios. Se mantiene «Dios» por la fuerza teológica del pasaje y se usa la preposición personal «a» porque en español es natural con un objeto personal directo.
- source_word: פָּנִים אֶל פָּנִים
  english_pob_choice: face to face
  chosen_spanish: cara a cara
  alternatives_spanish:
  - rostro a rostro
  - cara a cara
  lexicon: HALOT
  rationale: Es el equivalente idiomático natural en español y preserva el paralelismo con el nombre Peniel y el motivo del rostro.
- source_word: וַתִּנָּצֵל
  english_pob_choice: has been delivered
  chosen_spanish: ha sido librada
  alternatives_spanish:
  - ha sido rescatada
  - ha sido preservada
  - ha sido salvada
  lexicon: HALOT
  rationale: נצל expresa ser librado/rescatado. «Librada» conserva el valor de liberación o preservación sin introducir un matiz técnico que no está en el hebreo.
- source_word: נַפְשִׁי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  - yo mismo
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ se refiere a la vida concreta de Jacob, no a «alma» en sentido filosófico. «Mi vida» es la mejor equivalencia española y evita una lectura más abstracta de la que pide el contexto.
theological_decisions:
- issue: Traducción de אֱלֹהִים en la confesión de Jacob
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - un ser divino
  - una divinidad
  rationale: La escena y la explicación del nombre apuntan a un encuentro real con Dios dentro del relato. Se conserva «Dios» para mantener la fuerza teológica del testimonio de Jacob, sin borrar la tensión narrativa del episodio.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo de WLC y toma como referencia el audit trail inglés: se conserva la fórmula de nombramiento, se mantiene la relación explicativa con כִּי, se traduce אֱלֹהִים como «Dios» por el contexto narrativo, y se refleja נַפְשִׁי como «mi vida» según la revisión que evita agregar «él dijo».'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el hebreo aquí dice אֱלֹהִים, no el tetragrámaton.
  - Se prefirió «librada» frente a «salvada» para conservar el matiz de ser preservado/rescatado sin cargarlo de un registro doctrinal posterior.
  - La puntuación mantiene dos miembros explicativos, paralelos al hebreo, sin introducir palabras añadidas como «dijo».
