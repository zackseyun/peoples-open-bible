translation:
  language: es
  text: 'Y dijo: «Estos son los dos hijos del aceite[a], los que están junto al Señor de toda la tierra[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los dos ungidos». Literalmente, «los dos hijos del aceite».
    reason: lexical_alternative
  - marker: b
    text: O «los que están ante el Señor de toda la tierra».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma wayyiqtol introduce una nueva explicación en secuencia narrativa. En español, «Y dijo» reproduce la continuidad del relato con naturalidad y sin añadir matiz temporal innecesario.
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estos
  lexicon: HALOT
  rationale: El demostrativo funciona predicativamente con una cópula implícita. El español requiere «son» para una frase completa y clara.
- source_word: שְׁנֵי
  english_pob_choice: the two
  chosen_spanish: los dos
  alternatives_spanish:
  - dos
  lexicon: HALOT
  rationale: El constructo numérico se expresa naturalmente en español con artículo cuando remite a los dos elementos ya conocidos por la visión.
- source_word: בְּנֵי הַיִּצְהָר
  english_pob_choice: sons of oil
  chosen_spanish: hijos del aceite
  alternatives_spanish:
  - hijos del aceite fresco
  - ungidos
  - hijos del óleo
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea con «hijos del aceite». «Aceite» es más natural que un calco como «óleo», y evita resolver prematuramente la imagen hacia «ungidos». La expresión sigue siendo suficientemente transparente para el lector español.
- source_word: הָעֹמְדִים
  english_pob_choice: who stand
  chosen_spanish: los que están
  alternatives_spanish:
  - los que permanecen
  - los que se mantienen
  lexicon: HALOT
  rationale: El participio describe una postura/función continua. En español, «los que están» transmite la idea de presencia sostenida sin sonar forzado.
- source_word: עַל
  english_pob_choice: by
  chosen_spanish: junto a
  alternatives_spanish:
  - ante
  - delante de
  lexicon: HALOT
  rationale: En este contexto de comparecencia ante una figura soberana, «junto a» comunica la relación de asistencia/presencia de manera clara y natural. Se evita un calco demasiado rígido sin perder la imagen de estar en la presencia del soberano.
- source_word: אֲדוֹן
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el maestro
  - el soberano
  lexicon: HALOT
  rationale: «Señor» es el equivalente digno y reconocido para el título soberano. Se mantiene la mayúscula por tratarse del título divino en la frase final.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: of all the earth
  chosen_spanish: de toda la tierra
  alternatives_spanish:
  - de toda la tierra habitada
  - de toda la tierra entera
  lexicon: HALOT
  rationale: La construcción expresa dominio universal. «Toda la tierra» es una formulación idiomática y fiel en español.
theological_decisions:
- issue: Interpretación de בְּנֵי הַיִּצְהָר
  english_pob_reading: Preservar la metáfora como 'sons of oil' en el texto principal, en vez de resolverla como 'anointed ones'.
  chosen_spanish_reading: Preservar la metáfora como «hijos del aceite» en el texto principal, en vez de resolverla como «ungidos».
  alternative_spanish_readings:
  - ungidos
  - los dos ungidos
  rationale: El hebreo usa una expresión metafórica no idéntica al término técnico habitual para «ungidos». Mantener la metáfora evita introducir una interpretación más específica que el texto no exige; la lectura interpretativa se documenta en nota.
  doctrine_reference: Zacarías 4:14; principio de transparencia léxica POB
- issue: Nuance de עַל con הָעֹמְדִים
  english_pob_reading: Render as 'by' rather than 'before.'
  chosen_spanish_reading: Renderizar con «junto a» en vez de «ante/delante de».
  alternative_spanish_readings:
  - ante el Señor
  - delante del Señor
  rationale: La preposición hebrea, unida a la postura de estar de pie, puede expresar asistencia en la presencia de un superior. «Junto a» resulta claro y moderno en español, sin perder la idea de servicio/presencia cortesana.
  doctrine_reference: Zacarías 4:14; principio de equivalencia óptima
translation_notes:
  revision_awareness: La redacción sigue el estado revisado más reciente del audit trail, que favorece la forma más literal «sons of oil» en lugar de la ampliación «sons of fresh oil», manteniendo la imagen hebrea y evitando una paráfrasis explicativa en el cuerpo del texto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo corresponde explícitamente al nombre divino; aquí el texto dice אֲדֹן, por lo que se traduce «el Señor».
  - Se preserva la metáfora de «aceite» por coherencia con el audit trail inglés y para evitar resolver interpretativamente la imagen.
  - La puntuación y las comillas siguen el uso estándar del español latinoamericano en texto bíblico publicado.
