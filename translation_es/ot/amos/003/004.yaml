revisions:
- from: ¿Ruge un león en el bosque cuando no tiene presa? ¿Da el cachorro de león su voz desde su guarida[a] si no ha atrapado[b]?
  to: ¿Ruge un león en el bosque cuando no tiene presa? ¿Alza un león joven su voz desde su guarida[a] a menos que haya atrapado algo?[b]
  rationale: 'Se ajusta la segunda pregunta para reflejar mejor el hebreo y la auditoría inglesa: «león joven» para כְּפִיר, «alza ... su voz» para יִתֵּן קוֹלוֹ, y «haya atrapado algo» para expresar en español el objeto implícito de לָכָד. También se corrige la nota [a] para que sea una alternativa real y la [b] para preservar la literalidad documentada.'
