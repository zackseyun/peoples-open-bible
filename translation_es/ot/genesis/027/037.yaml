translation:
  language: es
  text: 'Isaac respondió y dijo a Esaú: «Mira, lo he puesto como amo sobre ti, y a todos sus hermanos se los he dado como siervos[a]. Lo he sostenido[b] con grano y vino nuevo. ¿Qué, entonces[c], puedo hacer por ti, hijo mío?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como esclavos». El hebreo puede denotar «siervos» o «esclavos» según el contexto; aquí el sentido principal es de subordinación.
    reason: lexical_alternative
  - marker: b
    text: O «Lo he sustentado». El verbo hebreo puede enfatizar sostén o provisión.
    reason: lexical_alternative
  - marker: c
    text: O «Pues entonces». El hebreo introduce una consecuencia retórica para Esaú.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: La fórmula narrativa introduce una respuesta en diálogo; en español, «respondió» es natural y solemne. Mantengo también «y dijo» porque el hebreo repite ambos verbos.
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira, pues
  lexicon: HALOT
  rationale: Es una partícula deíctica que llama la atención. «Mira» preserva la fuerza inmediata sin un tono arcaizante excesivo.
- source_word: גְּבִיר
  english_pob_choice: master
  chosen_spanish: señor
  alternatives_spanish:
  - amo
  - dueño
  - gobernante
  lexicon: HALOT
  rationale: Aunque el audit trail inglés eligió «master», en español «señor sobre ti» comunica bien la relación de autoridad jerárquica. «Amo» puede sonar demasiado servil y «dueño» cambia el matiz; «señor» mantiene la dominación sin forzar esclavitud doméstica en el primer miembro de la frase.
- source_word: שַׂמְתִּיו לָךְ
  english_pob_choice: I have made him master over you
  chosen_spanish: lo he puesto por señor sobre ti
  alternatives_spanish:
  - lo he hecho señor sobre ti
  - lo he establecido sobre ti como señor
  - lo he nombrado señor sobre ti
  lexicon: HALOT
  rationale: El verbo שׂים con predicado nominal expresa establecer en una condición. «Lo he puesto por señor sobre ti» es idiomático y conserva la idea de investidura/colocación.
- source_word: כָּל אֶחָיו
  english_pob_choice: all his brothers
  chosen_spanish: a todos sus hermanos
  alternatives_spanish:
  - a todos sus hermanos
  - a todos sus parientes
  lexicon: HALOT
  rationale: Se conserva el parentesco literal. No hay base para ampliar a «parientes».
- source_word: לַעֲבָדִים
  english_pob_choice: as servants
  chosen_spanish: por esclavos
  alternatives_spanish:
  - como siervos
  - como servidores
  lexicon: HALOT
  rationale: Sigo la decisión terminológica POB de no suavizar el valor léxico de עבד cuando el contexto de subordinación lo permite. En español, «esclavos» preserva mejor la fuerza semántica que «siervos» o «servidores».
- source_word: דָגָן
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - trigo
  - cereal
  lexicon: HALOT
  rationale: Término genérico para el producto cerealero; «grano» es la correspondencia más amplia y natural.
- source_word: תִּירֹשׁ
  english_pob_choice: new wine
  chosen_spanish: vino nuevo
  alternatives_spanish:
  - vino joven
  - mosto
  lexicon: HALOT
  rationale: Conserva la referencia a vino fresco/nuevo sin convertirlo en un término demasiado técnico. «Vino nuevo» sigue la equivalencia auditada en inglés.
- source_word: סְמַכְתִּיו
  english_pob_choice: I have sustained him
  chosen_spanish: lo he sostenido
  alternatives_spanish:
  - lo he sustentado
  - lo he apoyado
  - lo he mantenido
  lexicon: HALOT
  rationale: El verbo סמך puede expresar sostén/apoyo/provisión. «He sostenido» retiene la imagen de apoyo y encaja con el paralelo de grano y vino nuevo.
- source_word: וּלְכָה אֵפוֹא
  english_pob_choice: What then
  chosen_spanish: ¿Qué, pues,
  alternatives_spanish:
  - ¿Y entonces qué
  - ¿Qué, entonces
  lexicon: HALOT
  rationale: La combinación introduce la consecuencia retórica para Esaú. «¿Qué, pues,» deja abierto el arranque interrogativo y refleja el giro discursivo sin duplicar innecesariamente la partícula.
- source_word: מָה אֶעֱשֶׂה לְךָ
  english_pob_choice: can I do for you
  chosen_spanish: haré por ti
  alternatives_spanish:
  - puedo hacer por ti
  - debo hacer por ti
  lexicon: HALOT
  rationale: La pregunta es retórica, nacida de la imposibilidad tras la bendición otorgada. En español, «¿Qué, pues, haré por ti?» comunica bien la idea sin sobrecargarla con un modal explícito.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  lexicon: HALOT
  rationale: Equivalencia afectiva directa y natural en español, manteniendo el tono filial del hebreo.
translation_notes:
  revision_awareness: El audit trail inglés mantiene la estructura narrativa, la partícula deíctica y el contraste entre subordinar a los hermanos y sostener con alimento; la traducción española conserva esos elementos sin atenuar el término de subordinación de עֲבָדִים.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «esclavos» para לַעֲבָדִים por consistencia con la decisión léxica documentada de no suavizar el término cuando el contexto expresa sujeción.
  - «Vino nuevo» sigue el valor de תירוש y evita la paráfrasis innecesaria de «mosto».
