  text: וַ/יָּ֨שֶׂם בֶּ/אֱד֜וֹם נְצִבִ֗ים בְּ/כָל אֱדוֹם֙ שָׂ֣ם נְצִבִ֔ים וַ/יְהִ֥י כָל אֱד֖וֹם עֲבָדִ֣ים לְ/דָוִ֑ד וַ/יּ֤וֹשַׁע יְהוָה֙ אֶת דָּוִ֔ד בְּ/כֹ֖ל אֲשֶׁ֥ר הָלָֽךְ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/008/014.yaml
  text: He placed garrisons in Edom[a]; throughout all Edom he placed garrisons, and all Edom became servants to David[b]. And Yahweh gave David victory wherever he went.
  footnotes:
  - marker: a
    text: Or 'all the Edomites became servants to David.' The Hebrew says 'all Edom became slaves/servants to David,' using the nation name collectively for its people.
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD saved/delivered David wherever he went.' In this military context, 'gave David victory' brings out the sense of deliverance in battle.
    reason: lexical_alternative
