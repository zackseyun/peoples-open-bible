translation:
  language: es
  text: En cuanto a las aldeas en sus campos, algunos de los hijos de Judá vivieron en Quiriat-arba[a] y sus aldeas[b], y en Dibón y sus aldeas, y en Jecabseel[c] y sus asentamientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Quiriat-arba es el nombre más antiguo de Hebrón; compárese Josué 14:15.
    reason: cross_reference
  - marker: b
    text: 'Hebreo: «sus hijas», un modismo para aldeas dependientes o circundantes de una ciudad principal.'
    reason: lexical_alternative
  - marker: c
    text: Jecabseel también aparece como «Kabseel» en algunas tradiciones y pasajes relacionados.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֶל
  english_pob_choice: As for
  chosen_spanish: En cuanto a
  alternatives_spanish:
  - Y a
  - Ahora bien, en cuanto a
  lexicon: HALOT
  rationale: La expresión introduce un cambio de tema o una nueva subdivisión de la lista. «En cuanto a» reproduce esa función discursiva con naturalidad en español sin volverla una mera indicación de movimiento.
- source_word: הַחֲצֵרִים
  english_pob_choice: the villages
  chosen_spanish: las aldeas
  alternatives_spanish:
  - las villas
  - los asentamientos rurales
  lexicon: HALOT
  rationale: En este contexto geográfico-administrativo, el término designa pequeñas poblaciones dependientes, no patios literales. «Aldeas» comunica bien esa realidad en español.
- source_word: בִּשְׂדֹתָם
  english_pob_choice: in their fields
  chosen_spanish: en sus campos
  alternatives_spanish:
  - en sus tierras
  - en sus campos agrícolas
  lexicon: HALOT
  rationale: La frase sitúa estas aldeas dentro de los terrenos agrícolas pertenecientes a ellos. «Campos» conserva el sentido agrario y la relación posesiva.
- source_word: מִבְּנֵי יְהוּדָה
  english_pob_choice: some of the sons of Judah
  chosen_spanish: algunos de los hijos de Judá
  alternatives_spanish:
  - algunos de los descendientes de Judá
  - algunos de la tribu de Judá
  lexicon: HALOT
  rationale: El prefijo partitivo מִן indica que se trata solo de una parte. «Hijos de Judá» mantiene la fórmula tribal del hebreo; «algunos de» hace explícito el valor partitivo.
- source_word: יָשְׁבוּ
  english_pob_choice: lived
  chosen_spanish: vivieron
  alternatives_spanish:
  - habitaron
  - se establecieron
  lexicon: HALOT
  rationale: «Vivieron» es una equivalencia natural y moderna para residencia. «Se establecieron» sugeriría más bien el acto inicial de asentarse.
- source_word: בְּקִרְיַת הָאַרְבַּע
  english_pob_choice: in Kiriath-arba
  chosen_spanish: en Quiriat-arba
  alternatives_spanish:
  - en Quiriat-arba (es decir, Hebrón)
  lexicon: HALOT
  rationale: Es un nombre propio y se translitera. No se inserta la identificación con Hebrón en el texto principal porque el versículo no la explicita; puede quedar en nota.
- source_word: וּבְנֹתֶיהָ
  english_pob_choice: its villages
  chosen_spanish: sus aldeas
  alternatives_spanish:
  - sus poblados dependientes
  - sus aldeas hijas
  lexicon: HALOT
  rationale: Aunque literalmente significa «sus hijas», en uso toponímico funciona como referencia a aldeas dependientes o satélites. «Sus aldeas» evita una metáfora pesada en español y conserva el sentido relacional.
- source_word: וּבְדִיבֹן
  english_pob_choice: and in Dibon
  chosen_spanish: y en Dibón
  alternatives_spanish:
  - y en Dibon
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con acento gráfico acorde a la pronunciación habitual en español bíblico.
- source_word: וּבְנֹתֶיהָ
  english_pob_choice: its villages
  chosen_spanish: sus aldeas
  alternatives_spanish:
  - sus poblados dependientes
  - sus aldeas hijas
  lexicon: HALOT
  rationale: Se mantiene la misma solución para preservar la repetición estructural del hebreo y la equivalencia con la primera aparición del término.
- source_word: וּבִיקַּבְצְאֵל
  english_pob_choice: and in Jekabzeel
  chosen_spanish: y en Jecabseel
  alternatives_spanish:
  - y en Kabzeel
  lexicon: HALOT
  rationale: El hebreo consonántico apoya la forma Jekabzeel/Jecabseel. Se conserva la transliteración principal y se deja la variante alternativa para nota.
- source_word: וַחֲצֵרֶיהָ
  english_pob_choice: its settlements
  chosen_spanish: sus asentamientos
  alternatives_spanish:
  - sus aldeas
  - sus poblados
  lexicon: HALOT
  rationale: Aquí חֲצֵרִים apunta a poblamientos rurales dependientes, pero el audit trail distingue este segundo término del anterior. «Asentamientos» conserva la amplitud del sentido sin repetir exactamente «aldeas».
theological_decisions:
- issue: Designación tribal masculina en מִבְּנֵי יְהוּדָה
  english_pob_reading: some of the sons of Judah
  chosen_spanish_reading: algunos de los hijos de Judá
  alternative_spanish_readings:
  - algunos de la gente de Judá
  - algunos de la tribu de Judá
  rationale: Se conserva la expresión tribal del hebreo sin neutralizarla, porque aquí funciona como designación histórica y genealógica estándar. «Algunos de» mantiene el matiz partitivo observado por el inglés POB.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Nombre divino
  english_pob_reading: —
  chosen_spanish_reading: —
  rationale: Este versículo no contiene el Tetragrámaton ni una referencia divina directa que requiera decisión terminológica.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail en inglés, que prefirió «villages» sobre «daughter villages» para בְּנֹתֶיהָ, mientras mantuvo «settlements» para חֲצֵרֶיהָ. La versión española refleja esa distinción con «aldeas» y «asentamientos», respectivamente, y conserva la nota sobre el valor idiomático de «sus hijas».
  spanish_consistency_notes:
  - 'Se transliteran los topónimos de forma estable: Quiriat-arba, Dibón, Jecabseel.'
  - Se conserva la estructura repetitiva del hebreo con paralelismo entre «sus aldeas» y «sus asentamientos».
  - Se evita introducir «Hebrón» en el texto principal para no sobreexplicar el versículo; queda en nota.
  - Se mantiene el registro bíblico moderno y claro, sin arcaísmos innecesarios.
