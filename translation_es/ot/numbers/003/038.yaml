translation:
  language: es
  text: Los que acampaban delante del tabernáculo, al oriente[a], delante de la tienda de reunión, hacia el naciente, eran Moisés, Aarón y sus hijos, encargados de la custodia del santuario en representación de los hijos de Israel. Pero el no autorizado[b] que se acerque será muerto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hacia el oriente ... al oriente». El hebreo usa dos expresiones direccionales relacionadas para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: «El no autorizado» significa una persona sin permiso para acercarse al servicio del santuario, no específicamente un extranjero por etnia.
    reason: cultural_note
lexical_decisions:
- source_word: וְהַחֹנִים
  english_pob_choice: Those who camped
  chosen_spanish: Los que acampaban
  alternatives_spanish:
  - Los que acamparon
  - Los acampados
  lexicon: HALOT
  rationale: El participio substantivado describe a los que estaban establecidos en ese lugar. «Los que acampaban» conserva el valor descriptivo y suena natural en español sin perder la referencia situacional del campamento.
- source_word: לִפְנֵי הַמִּשְׁכָּן
  english_pob_choice: in front of the tabernacle
  chosen_spanish: delante del tabernáculo
  alternatives_spanish:
  - en frente del tabernáculo
  - ante el tabernáculo
  lexicon: HALOT
  rationale: לִפְנֵי expresa posición frontal o de cara a algo. «Delante de» es la opción más clara y fiel en español bíblico moderno.
- source_word: קֵדְמָה ... מִזְרָחָה
  english_pob_choice: on the east ... toward the sunrise
  chosen_spanish: al oriente ... hacia el naciente
  alternatives_spanish:
  - hacia el este ... hacia el amanecer
  - al este ... hacia el amanecer
  lexicon: HALOT
  rationale: Se mantienen dos expresiones direccionales distintas como en el hebreo, para no nivelar la repetición enfática. «Al oriente» y «hacia el naciente» comunican el mismo eje sin sonar redundantes en exceso.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - el tabernáculo de reunión
  lexicon: HALOT
  rationale: La expresión establecida para אֹהֶל מוֹעֵד en español puede ser «tienda de reunión». Conserva el sentido de lugar de encuentro sin introducir una formulación más libre.
- source_word: מֹשֶׁה וְאַהֲרֹן וּבָנָיו
  english_pob_choice: Moses and Aaron and his sons
  chosen_spanish: Moisés, Aarón y sus hijos
  alternatives_spanish:
  - Moisés y Aarón y sus hijos
  - Moisés, Aarón y los hijos de Aarón
  lexicon: HALOT
  rationale: El sufijo en «sus hijos» se entiende naturalmente como referido a Aarón, como en la lectura auditada del inglés POB. En español, «sus hijos» preserva esa relación sin forzarla.
- source_word: שֹׁמְרִים מִשְׁמֶרֶת
  english_pob_choice: keeping charge
  chosen_spanish: guardando la custodia
  alternatives_spanish:
  - cumpliendo la guardia
  - guardando el cargo
  lexicon: HALOT
  rationale: La construcción cognada expresa desempeño de una responsabilidad asignada. «Guardando la custodia» comunica bien el sentido de vigilancia/encargo ritual sin sonar demasiado técnico.
- source_word: הַמִּקְדָּשׁ
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el recinto santo
  lexicon: HALOT
  rationale: Aquí el término abarca el ámbito santo del servicio, no solo un cuarto específico. «Santuario» es la equivalencia más directa y clara en español.
- source_word: לְמִשְׁמֶרֶת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: on behalf of the sons of Israel
  chosen_spanish: en representación de los hijos de Israel
  alternatives_spanish:
  - en nombre de los hijos de Israel
  - por la custodia de los hijos de Israel
  lexicon: HALOT
  rationale: 'La frase indica una función vicaria: Moisés, Aarón y sus hijos desempeñan una responsabilidad cultual que corresponde a Israel. «En representación de» expresa esa mediación funcional sin convertirla en una interpretación doctrinal adicional.'
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la formulación familiar del hebreo, que en este contexto nombra corporativamente al pueblo del pacto. «Los hijos de Israel» mantiene esa forma con claridad y continuidad terminológica.
- source_word: וְהַזָּר
  english_pob_choice: the outsider
  chosen_spanish: el extraño
  alternatives_spanish:
  - el no autorizado
  - el forastero
  - el profano
  lexicon: HALOT
  rationale: Aquí זָר no designa necesariamente a un extranjero étnico, sino a quien no tiene autorización para acercarse al servicio del santuario. «El extraño» transmite bien la exclusión de oficio, aunque la nota aclara el matiz.
- source_word: הַקָּרֵב
  english_pob_choice: who comes near
  chosen_spanish: que se acerque
  alternatives_spanish:
  - que se aproxime
  - que venga cerca
  lexicon: HALOT
  rationale: El participio indica aproximación indebida al ámbito sagrado. «Que se acerque» es natural en español y conserva la idea de acceso prohibido.
- source_word: יוּמָת
  english_pob_choice: shall be put to death
  chosen_spanish: será muerto
  alternatives_spanish:
  - será puesto a muerte
  - debe ser ejecutado
  lexicon: HALOT
  rationale: El verbo causativo-pasivo expresa imposición de pena de muerte. «Será muerto» es una forma bíblica breve y fiel; en español actual puede sonar más dura, pero refleja con precisión la fuerza del hebreo.
theological_decisions:
- issue: Sentido de «el extraño» en la ley del santuario
  english_pob_reading: ‘The outsider’ means an unauthorized person who is not permitted to approach the sanctuary service, not specifically a foreigner by ethnicity.
  chosen_spanish_reading: «El extraño» se entiende como una persona no autorizada para acercarse al servicio del santuario, no como una referencia étnica a un extranjero.
  alternative_spanish_readings:
  - «El extraño» como extranjero de otra nación
  - «El extraño» como cualquier persona ajena al campamento
  rationale: El contexto inmediato trata de acceso y función ritual, no de origen nacional. Por eso la traducción evita cargar el término con una idea étnica que el versículo no exige.
  doctrine_reference: Ley de santidad / acceso al santuario en el Pentateuco
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del inglés POB, que entendió לְמִשְׁמֶרֶת בְּנֵי יִשְׂרָאֵל como una función representativa («on behalf of the sons of Israel») y no como una simple obligación abstracta. También conserva la distinción entre las dos expresiones direccionales del hebreo y el valor cultual de זָר.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece el tetragrámaton.
  - Se usa «tabernáculo» y «tienda de reunión» de manera consistente para מִשְׁכָּן y אֹהֶל מוֹעֵד, respetando la diferencia del hebreo.
  - «Hijos de Israel» se conserva por fidelidad formal y coherencia con la terminología del proyecto.
  - «El extraño» se reserva para exclusión de acceso/función, no para etnicidad, salvo aclaración contextual.
