base_translation:
  language: en
  yaml_path: translation/ot/isaiah/036/004.yaml
  text: 'Then the Rabshakeh said to them[a], “Please say to Hezekiah, ‘Thus says the great king[b], the king of Assyria: What is this confidence that you have trusted in?’”'
  footnotes:
  - marker: a
    text: Rabshakeh is likely an Assyrian official title; possible renderings include 'chief cupbearer' or another high-ranking court or military officer.
    reason: cultural_note
  - marker: b
    text: Or 'What is this trust that you trust in?' The Hebrew uses a noun and verb from the same root for rhetorical emphasis.
    reason: lexical_alternative
