source:
  edition: SBLGNT
  text: οὐ μέγα οὖν εἰ καὶ οἱ διάκονοι αὐτοῦ μετασχηματίζονται ὡς διάκονοι δικαιοσύνης, ὧν τὸ τέλος ἔσται κατὰ τὰ ἔργα αὐτῶν.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/011/015.yaml
  text: So it is no great thing if his servants also disguise themselves as servants of righteousness[a], whose end will be according to their works.
translation:
  language: ko
  text: 그러므로 사탄의 일꾼들도 의의 일꾼인 양 가장하는 것이 큰일이 아닙니다. 그들의 마지막은 그들의 행위대로 될 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διάκονοι
  english_pob_choice: servants
  chosen_korean: 일꾼들
  lexicon: BDAG
  rationale: '여기서는 사탄의 부하라는 부정적 문맥. 「일꾼」이 적절하며 11:13의 ἐργάται와도 호응.'
  alternatives_korean:
  - 사역자들
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_korean: 의의
  lexicon: BDAG
  rationale: 바울 표준.
- source_word: τέλος
  english_pob_choice: end
  chosen_korean: 마지막
  lexicon: BDAG
  rationale: 「최후, 결말」. 「마지막」이 한국어에서 자연스러우며 종말론적 함의 보존.
  alternatives_korean:
  - 종말
  - 결말
