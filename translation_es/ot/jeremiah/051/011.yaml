translation:
  language: es
  text: ¡Afilen las flechas; llenen los escudos[a]! Yahvé ha incitado el espíritu de los reyes de Media, porque su propósito es contra Babilonia, para destruirla[b]; porque es la venganza de Yahvé, venganza por su templo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "llenen los carcajes". El término hebreo puede denotar escudos, pero "carcajes" encaja más naturalmente con el contexto inmediato de flechas.
    reason: lexical_alternative
  - marker: b
    text: Hebreo "la", refiriéndose a Babilonia como una ciudad personificada.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבֵרוּ
  english_pob_choice: Sharpen
  chosen_spanish: ¡Afilen!
  alternatives_spanish:
  - Pulan
  - Lustren
  lexicon: HALOT
  rationale: En contexto bélico, el imperativo plural pide preparar las flechas para el combate. 'Afilen' comunica esa preparación de forma natural en español y mantiene la fuerza militar del hebreo.
- source_word: הַחִצִּים
  english_pob_choice: the arrows
  chosen_spanish: las flechas
  alternatives_spanish:
  - las saetas
  lexicon: HALOT
  rationale: El sustantivo denota flechas/proyectiles de arco. 'Flechas' es claro y natural en español contemporáneo.
- source_word: מִלְאוּ
  english_pob_choice: fill
  chosen_spanish: llenen
  alternatives_spanish:
  - carguen
  - colmaten
  lexicon: HALOT
  rationale: Imperativo plural de 'llenar'. En español, 'llenar los escudos' refleja la frase breve del hebreo sin añadir una explicación que el texto no da.
- source_word: הַשְּׁלָטִים
  english_pob_choice: the shields
  chosen_spanish: los escudos
  alternatives_spanish:
  - los carcajes
  - los tahalíes
  lexicon: HALOT
  rationale: 'Sigo la decisión textual de la revisión inglesa más reciente: el término hebreo se traduce literalmente como ''escudos''. Aunque existe tensión contextual con las flechas, la formulación auditable del POB favorece conservar esa lectura en español.'
- source_word: הֵעִיר
  english_pob_choice: has stirred up
  chosen_spanish: ha despertado
  alternatives_spanish:
  - ha incitado
  - ha agitado
  lexicon: HALOT
  rationale: El hiphil de עור expresa causar a levantarse/despertar. 'Ha despertado' preserva la idea de activación divina sin debilitar la agencia de Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  lexicon: HALOT
  rationale: 'Se mantiene la directriz del proyecto para el Tetragrama: ''Yahvé'' en vez de la sustitución ''SEÑOR'', preservando el nombre propio divino.'
- source_word: ר֨וּחַ
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el ánimo
  - la disposición
  lexicon: HALOT
  rationale: '''Espíritu'' conserva el término hebreo y permite la acción divina sobre la disposición interior de los reyes de Media.'
- source_word: מַלְכֵי מָדַי
  english_pob_choice: the kings of Media
  chosen_spanish: los reyes de Media
  alternatives_spanish:
  - los reyes de los medos
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de manera directa y geográfica. 'Media' es natural en español bíblico y mantiene el referente histórico.
- source_word: מְזִמָּתוֹ
  english_pob_choice: his plan
  chosen_spanish: su propósito
  alternatives_spanish:
  - su plan
  - su designio
  lexicon: HALOT
  rationale: El término puede referir a un plan o intención. 'Propósito' comunica la intención deliberada sin importar una connotación negativa que el contexto no exige en español.
- source_word: לְהַשְׁחִיתָהּ
  english_pob_choice: to destroy her
  chosen_spanish: para destruirla
  alternatives_spanish:
  - para devastarla
  - para arruinarla
  lexicon: HALOT
  rationale: El sufijo femenino retoma a Babilonia personificada. 'Destruirla' conserva la referencia y la economía del hebreo.
- source_word: נִקְמַת יְהוָה
  english_pob_choice: the vengeance of Yahweh
  chosen_spanish: la venganza de Yahvé
  alternatives_spanish:
  - la vindicación de Yahvé
  - el castigo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el sustantivo 'venganza' porque el hebreo subraya la retribución activa de Yahvé. No se suaviza a un término menos intenso.
- source_word: נִקְמַת הֵיכָלוֹ
  english_pob_choice: vengeance for his temple
  chosen_spanish: venganza por su templo
  alternatives_spanish:
  - venganza de su templo
  - venganza en favor de su templo
  lexicon: HALOT
  rationale: La expresión final apunta a la reivindicación ligada al templo de Yahvé. 'Por su templo' mantiene la relación causal/relacional sin ampliar más allá del hebreo.
theological_decisions:
- issue: Traducción del Tetragrama יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: 'Se sigue la política doctrinal del POB para el nombre divino: transliteración del nombre propio en lugar de una sustitución titulada. ''Yahvé'' es la forma española estable del proyecto.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Agencia divina en la caída de Babilonia
  english_pob_reading: Yahweh has stirred up the spirit of the kings of Media
  chosen_spanish_reading: Yahvé ha despertado el espíritu de los reyes de Media
  alternative_spanish_readings:
  - Yahvé ha incitado el espíritu de los reyes de Media
  - Yahvé ha movido el espíritu de los reyes de Media
  rationale: La traducción conserva la atribución directa de la iniciativa a Yahvé, sin rebajarla a mera अनुमति/permisión. El verbo 'despertar' mantiene el tono de intervención soberana.
  doctrine_reference: Soberanía divina en los juicios históricos
- issue: Personificación de Babilonia
  english_pob_reading: destroy her
  chosen_spanish_reading: destruirla
  alternative_spanish_readings:
  - destruirla a ella
  - destruir a Babilonia
  rationale: El hebreo trata a Babilonia como femenina/personificada; el pronombre femenino en español conserva ese rasgo sin necesidad de repetir el nombre.
  doctrine_reference: Uso poético de ciudades personificadas en el AT
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió una propuesta anterior que entendía el segundo imperativo como 'quivers' y lo asentó como 'shields'. Este borrador español sigue esa última decisión auditable, pero conserva una nota para la alternativa literal y la tensión contextual con las flechas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה de acuerdo con la terminología del proyecto.
  - Se usa 'Media' en vez de 'los medos' para respetar la forma geográfica del POB inglés.
  - '''Venganza'' se conserva por la fuerza semántica del hebreo; no se suaviza a ''vindicación'' en el texto principal.'
  - La personificación femenina de Babilonia se preserva con el pronombre 'la'.
