id: PHP.3.13
reference: Philippians 3:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀδελφοί, ἐγὼ ἐμαυτὸν ⸀οὐ λογίζομαι κατειληφέναι· ἓν δέ, τὰ μὲν ὀπίσω ἐπιλανθανόμενος τοῖς δὲ ἔμπροσθεν ἐπεκτεινόμενος,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/003/013.yaml
  text: 'Brothers[a], I do not consider myself to have taken hold of it. But one thing: forgetting the things behind and reaching forward to the things ahead,'
  footnotes:
  - marker: a
    text: '''Brothers'' translates the masculine Greek vocative adelphoi; Paul often uses it for the whole believing community, including women.'
    reason: cultural_note
translation:
  language: ko
  text: '형제 여러분[a], 나는 내가 이미 그것을 붙잡았다고 여기지 않습니다. 다만 한 가지, 뒤에 있는 것은 잊어버리고 앞에 있는 것을 향하여 몸을 내뻗으며,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「형제 여러분」은 헬라어 남성 호격 ἀδελφοί를 옮긴 것이다. 바울은 흔히 자매를 포함한 신앙 공동체 전체를 이렇게 부른다.
    reason: cultural_note
lexical_decisions:
- source_word: ἀδελφοί
  english_pob_choice: Brothers
  chosen_korean: 형제 여러분
  alternatives_korean:
  - 형제자매 여러분
  - 형제들이여
  lexicon: BDAG
  rationale: 1절과 일관되게 「형제 여러분」으로 남성형을 보존하고, 포괄적 함의는 각주에 둔다.
- source_word: λογίζομαι
  english_pob_choice: consider
  chosen_korean: 여기지
  alternatives_korean:
  - 셈하지
  - 간주하지
  lexicon: BDAG
  rationale: 「여기다」가 자신에 대한 개인적 평가의 자연스러운 한국어 어휘이다.
- source_word: κατειληφέναι
  english_pob_choice: to have taken hold of it
  chosen_korean: 이미 그것을 붙잡았다
  alternatives_korean:
  - 잡았다
  - 얻었다
  lexicon: BDAG
  rationale: 12절의 「붙잡으려고」와의 어휘 유희를 유지한다. 함축된 목적어를 「그것을」로 보충해 영어처럼 명료성을 더한다.
- source_word: ἓν δέ
  english_pob_choice: but one thing
  chosen_korean: 다만 한 가지
  alternatives_korean:
  - 오직 한 가지
  - 그러나 한 가지
  lexicon: BDAG
  rationale: 헬라어의 생략 구문(「한 가지를 나는 한다」 정도)을 명시 동사 없이 한국어로 자연스럽게 옮긴다. 「다만」이 전환의 강도를 살린다.
- source_word: τὰ μὲν ὀπίσω
  english_pob_choice: the things behind
  chosen_korean: 뒤에 있는 것
  alternatives_korean:
  - 뒤의 것
  - 지나간 것
  lexicon: BDAG
  rationale: 「~에 있는 것」으로 정관사와 복수의 함의를 살리되, 자연스러운 한국어 표현을 유지한다.
- source_word: ἐπιλανθανόμενος
  english_pob_choice: forgetting
  chosen_korean: 잊어버리고
  alternatives_korean:
  - 잊고
  - 잊은 채로
  lexicon: BDAG
  rationale: 「잊어버리다」가 바울의 운동선수 비유와 잘 어울리는 능동적 망각을 표현한다.
- source_word: τοῖς δὲ ἔμπροσθεν
  english_pob_choice: the things ahead
  chosen_korean: 앞에 있는 것
  alternatives_korean:
  - 앞의 것
  - 앞을 향한 것
  lexicon: BDAG
  rationale: 앞 구절 「뒤에 있는 것」과 균형을 이루며 전진적 대조를 살린다.
- source_word: ἐπεκτεινόμενος
  english_pob_choice: reaching forward
  chosen_korean: 몸을 내뻗으며
  alternatives_korean:
  - 앞으로 나아가며
  - 힘써 뻗으며
  lexicon: BDAG
  rationale: ἐπεκτείνομαι의 본래 신체적 비유(달리는 자가 앞으로 몸을 뻗음)를 살린다. 「몸을 내뻗으며」가 그 운동적 함의를 가장 생생하게 보존하며, 다음 절의 「상」을 향한 달음질과 연결된다.
