source:
  edition: SBLGNT
  text: ἕκαστος καθὼς ἔλαβεν χάρισμα, εἰς ἑαυτοὺς αὐτὸ διακονοῦντες ὡς καλοὶ οἰκονόμοι ποικίλης χάριτος θεοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/004/010.yaml
  text: "As each has received a gift, use it in serving one another as good stewards of God's varied grace."
translation:
  language: ko
  text: '여러분 각자가 받은 은사대로, 하나님의 여러 가지 은혜의 선한 청지기로서 그 은사를 가지고 서로 섬기십시오.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: χάρισμα
  english_pob_choice: a gift
  chosen_korean: 은사
  alternatives_korean:
  - 은혜의 선물
  - 영적 은사
  lexicon: BDAG
  rationale: 한국 성서 전통의 「은사」 유지 (고전 12장과 동일 어휘).
- source_word: εἰς ἑαυτοὺς ... διακονοῦντες
  english_pob_choice: use it in serving one another
  chosen_korean: 서로 섬기십시오
  alternatives_korean:
  - 서로를 위해 봉사하십시오
  lexicon: BDAG
  rationale: διακονέω의 「섬김·봉사」를 「섬기다」로 옮긴다.
- source_word: καλοὶ οἰκονόμοι ποικίλης χάριτος θεοῦ
  english_pob_choice: good stewards of God's varied grace
  chosen_korean: 하나님의 여러 가지 은혜의 선한 청지기
  alternatives_korean:
  - 하나님의 다양한 은혜의 좋은 관리인
  lexicon: BDAG
  rationale: οἰκονόμος의 한국 성서 전통 어휘 「청지기」 유지. ποικίλος(다양한)를 「여러 가지」로 옮긴다 (1:6의 ποικίλοις πειρασμοῖς와 어휘 통일).
