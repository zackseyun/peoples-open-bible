    text: O «Confíaselo a mí»; literalmente, «Ponlo en mi mano».
    reason: lexical_alternative
  revision_rationale: 'Se corrigen tres puntos: (1) se reemplaza la inversión forzada «A mis dos hijos harás morir» por «Harás morir a mis dos hijos», que sigue preservando el causativo; (2) se restaura en el texto principal la imagen concreta del hebreo «Ponlo en mi mano», como hace el POB inglés, dejando la paráfrasis idiomática en nota; (3) se mejora el español con clíticos dativos naturales: «te lo traigo de vuelta» y «te lo devolveré». No se requiere adjudicación adicional.'
