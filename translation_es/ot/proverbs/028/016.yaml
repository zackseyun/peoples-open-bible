  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: נָגִיד como «gobernante», חֲסַר תְּבוּנוֹת como carencia de discernimiento, מַעֲשַׁקּוֹת como conductas opresivas, שׂנֵא בֶצַע como rechazo de la ganancia injusta, y יַאֲרִיךְ יָמִים como larga vida. Sin embargo, la formulación «es grande en actos de opresión» suena calcada y poco idiomática en español, aunque intenta preservar la literalidad del hebreo.'
  spanish_quality_summary: La calidad general es buena y comprensible, con tono digno y neutral. La principal debilidad es la naturalidad de «es grande en actos de opresión», que en español suena poco fluida y no comunica con claridad proverbial. Una formulación como «abunda en actos de opresión» preserva el valor de רַב mejor en español. Además, la nota [a] sigue siendo adecuada para conservar la alternativa más literal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Gobernante», «ganancia injusta» y «prolongará sus días» están bien alineados con las decisiones léxicas auditadas. La única corrección recomendada es estilístico-semántica para רַב מַעֲשַׁקּוֹת.
  issues:
  - severity: medium
    issue: «es grande en actos de opresión» es un calco poco natural en español
    rationale: Aunque intenta seguir el hebreo y el inglés auditado, en español no es una construcción idiomática. «Abunda en actos de opresión» o «comete muchos actos de opresión» expresa mejor la idea de רַב sin perder el sentido de repetición.
  revised_spanish_text: Un gobernante falto de entendimiento abunda en actos de opresión[a], pero el que odia la ganancia injusta prolongará sus días[b].
