base_translation:
  language: en
  yaml_path: translation/ot/numbers/028/014.yaml
  text: 'And their drink offerings shall be: half a hin for the bull[a], a third of a hin for the ram, and a fourth of a hin for the lamb, of wine. This is the burnt offering of each month in its month throughout the months of the year.'
  footnotes:
  - marker: a
    text: Or, 'This is the burnt offering of the new moon in its month, for the months of the year.' The Hebrew word חֹדֶשׁ can denote either 'month' or 'new moon'; here the main text renders the recurring monthly sense.
    reason: lexical_alternative
