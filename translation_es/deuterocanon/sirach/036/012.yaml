review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: un imperativo violento dirigido contra las cabezas de gobernantes enemigos, seguido por una cláusula que caracteriza su jactancia exclusiva. Sin embargo, «No hay nadie fuera de nosotros» suena menos natural en español bíblico corriente y desplaza ligeramente el foco desde exclusividad personal hacia exterioridad espacial. La alternativa documentada «No hay nadie sino nosotros» se ajusta mejor al griego Οὐκ ἔστιν πλὴν ἡμῶν y al razonamiento del POB inglés.'
  spanish_quality_summary: La redacción es clara y digna, pero necesita un pequeño ajuste de naturalidad y precisión idiomática en la última cláusula. «Destroza» y «gobernantes enemigos» son aceptables y legibles. Los signos de exclamación no son necesarios para fidelidad, pero no constituyen error. El problema principal es la frase «fuera de nosotros», menos idiomática aquí que «sino nosotros».
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. «Gobernantes» para ἀρχόντων es adecuado. La decisión teológica de no añadir «Dios» debe mantenerse; la revisión propuesta la preserva mejor.
  issues:
  - severity: medium
    issue: La cláusula final «No hay nadie fuera de nosotros» no es la mejor equivalencia de πλὴν ἡμῶν en este contexto.
    rationale: Aunque comprensible, en español suena menos natural y más espacial que exclusiva. «No hay nadie sino nosotros» o «No hay nadie además de nosotros» representan mejor la exclusividad arrogante sin añadir contenido teológico.
  - severity: low
    issue: El texto principal usa una formulación menos fuerte que la alternativa ya preservada en la nota.
    rationale: La nota ofrece «No hay nadie sino nosotros», que en realidad comunica mejor el sentido del original que la lectura principal actual; conviene invertir esa preferencia.
  revised_spanish_text: '¡Destroza las cabezas de los gobernantes enemigos[a], que dicen: «No hay nadie sino nosotros»!'
