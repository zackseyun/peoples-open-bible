    reason: alternative_reading
  - marker: b
    text: O «conforme a tu palabra» / «según tu palabra» / «a tu palabra».
    reason: lexical_alternative
  revision_rationale: Se cambia «tu esclavo» por «tu siervo» para seguir la decisión contextual auditada para עַבְדֶּךָ y mantener mejor el registro profético en español. Se corrige la nota [b] para que ancle únicamente a «por tu palabra» y preserve las alternativas documentadas para וּבִדְבָרֶךָ. El resto del versículo puede mantenerse.
