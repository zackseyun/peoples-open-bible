  source_alignment_summary: El borrador español sigue bien la estructura anafórica de בטרם, conserva la metáfora de parto en לֶדֶת, mantiene «decreto» para חֹק y usa correctamente «Yahvé» para יְהוָה. También refleja adecuadamente la doble advertencia sobre la ira/día de la ira. Sin embargo, «como paja» para כְּמֹץ es menos preciso que «como tamo» en este contexto profético, y «el día pase como paja» suena algo impreciso en español; conviene ajustar para preservar mejor la imagen de algo llevado fugazmente como tamo. Además, la nota b actualmente mezcla dos opciones en una sola glosa («tamo/paja»), lo que debilita la decisión léxica principal.
