id: ACT.28.27
reference: Acts 28:27
source:
  edition: SBLGNT
  text: ἐπαχύνθη γὰρ ἡ καρδία τοῦ λαοῦ τούτου, καὶ τοῖς ὠσὶν βαρέως ἤκουσαν, καὶ τοὺς ὀφθαλμοὺς αὐτῶν ἐκάμμυσαν· μήποτε ἴδωσιν τοῖς ὀφθαλμοῖς καὶ τοῖς ὠσὶν ἀκούσωσιν καὶ τῇ καρδίᾳ συνῶσιν καὶ ἐπιστρέψωσιν, καὶ ἰάσομαι αὐτούς.
translation:
  text: For the heart of this people has become dull[a], and with their ears they heard heavily, and they closed their eyes; otherwise they might see with their eyes and hear with their ears and understand with their heart and turn back[b], and I would heal them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lest they should see ... hear ... understand ... and turn, and I would heal them.' The Greek conjunction can carry a stronger 'lest/so that not' nuance in this quotation from Isaiah.
    reason: alternative_reading
  - marker: b
    text: '''Turn back'' may also be rendered ''turn,'' ''return,'' or in context ''repent.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαχύνθη
  chosen: has become dull
  alternatives:
  - has grown fat
  - has become calloused
  - has become insensitive
  lexicon: BDAG
  rationale: The verb literally conveys becoming thick/fat, used metaphorically of spiritual insensibility. 'Has become dull' communicates the metaphor's sense in natural English without flattening it into a purely interpretive paraphrase.
- source_word: καρδία
  chosen: heart
  alternatives:
  - mind
  - inner being
  lexicon: BDAG
  rationale: '''Heart'' preserves the biblical anthropological term and allows the later phrase ''understand with their heart'' to retain the source''s conceptual unity.'
- source_word: λαοῦ
  chosen: people
  alternatives:
  - nation
  lexicon: BDAG
  rationale: '''People'' is the standard rendering here and matches the Isaianic citation context.'
- source_word: βαρέως
  chosen: heavily
  alternatives:
  - with difficulty
  - dully
  lexicon: BDAG
  rationale: The adverb means in a heavy or dull manner. 'Heavily' is slightly formal but preserves the metaphor and the unusual phrasing of the Greek better than a smoother paraphrase.
- source_word: ἤκουσαν
  chosen: they heard
  alternatives:
  - they listened
  - they have heard
  lexicon: BDAG
  rationale: Aorist indicative is best rendered simply as past narrative here. 'Heard' preserves the lexical link with the following subjunctive 'hear with their ears.'
- source_word: ἐκάμμυσαν
  chosen: they closed
  alternatives:
  - they shut
  - they have closed tightly
  lexicon: BDAG
  rationale: The verb means to shut or close the eyes. 'Closed' is clear and idiomatic.
- source_word: μήποτε
  chosen: otherwise
  alternatives:
  - lest
  - so that they might not
  lexicon: BDAG
  rationale: In this citation context the conjunction introduces the negative-result/purpose clause. 'Otherwise' communicates the sense in readable modern English without archaic 'lest.' The stronger purposive nuance is preserved in a footnote.
- source_word: ἴδωσιν
  chosen: they might see
  alternatives:
  - they should see
  lexicon: BDAG
  rationale: Subjunctive after μήποτε is well represented by 'might see' in English.
- source_word: ἀκούσωσιν
  chosen: hear
  alternatives:
  - might hear
  lexicon: BDAG
  rationale: Within the coordinated clause, English can omit repeating 'might' after the first verb while preserving the subjunctive force from context.
- source_word: συνῶσιν
  chosen: understand
  alternatives:
  - comprehend
  - perceive
  lexicon: BDAG
  rationale: '''Understand'' is the most natural rendering and fits the heart-language of the clause.'
- source_word: ἐπιστρέψωσιν
  chosen: turn back
  alternatives:
  - turn
  - return
  - repent
  lexicon: BDAG
  rationale: The verb can mean turn/return, and in theological contexts may imply conversion. 'Turn back' preserves the directional metaphor without over-specifying it as 'repent,' which would import a narrower doctrinal nuance not explicit in the verb alone.
- source_word: ἰάσομαι
  chosen: I would heal
  alternatives:
  - I will heal
  lexicon: BDAG
  rationale: 'Following the μήποτε clause, the future indicative functions naturally in English as the apodosis of a contrary/contingent statement: ''otherwise ... and I would heal them.'' This best reflects the logic of the citation in context.'
