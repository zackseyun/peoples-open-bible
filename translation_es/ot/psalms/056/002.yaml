review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo y del POB inglés: súplica a Dios, motivo causal, imagen vívida de persecución hostil, duración continua y opresión resultante. Sin embargo, la formulación de חָנֵּנִי como «Sé benevolente conmigo» no suena natural en español bíblico-litúrgico moderno y no preserva tan bien la fuerza de súplica directa como «Sé propicio» o mejor «Tenme gracia / Sé clemente». Además, la nota española omite las alternativas léxicas importantes preservadas por el POB inglés para שְׁאָפַנִי.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «Sé benevolente conmigo» resulta poco idiomático y algo abstracto. «oh Dios» debe capitalizarse y puntuarse mejor como «oh Dios» o preferiblemente con coma vocativa; el resto del verso lee bien. «jadea tras de mí» es aceptable y preserva la imagen, aunque en español puede sonar algo extraño; aun así, con nota explicativa funciona.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Dios» es correcto para אֱלֹהִים. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La principal desviación es estilística/lexical en חָנֵּנִי, donde conviene una expresión más natural y fiel al registro de súplica.
  issues:
  - severity: medium
    issue: «Sé benevolente conmigo» para חָנֵּנִי suena poco natural en español.
    rationale: Aunque intenta evitar la carga penitencial de «ten misericordia», la expresión no es una súplica idiomática en español. «Sé clemente conmigo» preserva mejor el valor de favor/gracia divina en registro digno y natural.
  - severity: medium
    issue: La nota [a] no conserva las alternativas léxicas importantes del POB inglés para שְׁאָפַנִי.
    rationale: El audit trail inglés documenta explícitamente alternativas como «tramples me», «snaps at me» y «would swallow me up». Dado que «jadea tras de mí» puede sonar inusual en español, conviene mantener una nota en ese punto para preservar el rango semántico hostil del hebreo.
  - severity: low
    issue: La ancla de nota está colocada en la primera cláusula, pero la nota relevante principal pertenece al verbo שְׁאָפַנִי.
    rationale: La nota actual explica חָנֵּנִי, pero el inglés solo anota la imagen difícil de שְׁאָפַנִי. Es mejor mover la nota al lugar de mayor necesidad exegética.
