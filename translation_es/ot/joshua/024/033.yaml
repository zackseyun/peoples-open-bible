translation:
  language: es
  text: Y Eleazar, hijo de Aarón, murió[a], y lo sepultaron en Gibeat-finees, lugar que había sido dado a su hijo, en la región montañosa de Efraín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la colina de Finees, hijo de Eleazar», tomando la expresión como una descripción del lugar en vez de preservarla como nombre propio transliterado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶלְעָזָר
  english_pob_choice: And Eleazar
  chosen_spanish: Y Eleazar
  alternatives_spanish:
  - Entonces Eleazar
  - Y luego Eleazar
  lexicon: HALOT
  rationale: La waw narrativa se mantiene con «Y» para conservar la continuidad del relato sin añadir matiz temporal no explicitado.
- source_word: בֶּן אַהֲרֹן
  english_pob_choice: the son of Aaron
  chosen_spanish: hijo de Aarón
  alternatives_spanish:
  - el hijo de Aarón
  - hijo de Aarón
  lexicon: HALOT
  rationale: La relación filial se expresa de forma natural en español con «hijo de», sin necesidad de artículo explícito para evitar rigidez.
- source_word: מֵת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - muerte
  lexicon: HALOT
  rationale: El qatal reporta un hecho consumado de muerte; «murió» es directo y fiel al valor verbal del hebreo.
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  english_pob_choice: and they buried him
  chosen_spanish: y lo sepultaron
  alternatives_spanish:
  - y lo enterraron
  - y fue sepultado
  lexicon: HALOT
  rationale: Se conserva el sujeto plural indefinido del hebreo con una activa impersonal en español. «Sepultaron» mantiene un registro digno y bíblico sin forzar la pasiva.
- source_word: בְּגִבְעַת פִּינְחָס
  english_pob_choice: at Gibeath-phinehas
  chosen_spanish: en Gibeat-Finees
  alternatives_spanish:
  - en la colina de Finees
  - en Gibeat de Finees
  lexicon: HALOT
  rationale: Se preserva el topónimo como nombre propio transliterado para no decidir indebidamente entre lectura toponímica y descriptiva. La forma se adapta a la ortografía española con guion.
- source_word: בְּנוֹ
  english_pob_choice: his son’s
  chosen_spanish: su hijo
  alternatives_spanish:
  - de su hijo
  - a su hijo
  lexicon: HALOT
  rationale: El sufijo posesivo se refiere a Finees como hijo de Eleazar. En español, «su hijo» mantiene esa relación sin sobrecargar la frase.
- source_word: אֲשֶׁר נִתַּן ל֖וֹ
  english_pob_choice: which had been given to him
  chosen_spanish: que había sido dada a su hijo
  alternatives_spanish:
  - que fue dada a su hijo
  - que le había sido dada
  lexicon: HALOT
  rationale: El pasivo de נתן se conserva con «había sido dada», siguiendo la revisión inglesa que evitó la frase errónea sobre «su campo montañoso». Se explicita el referente en español para que la relativa modifique naturalmente el lugar.
- source_word: בְּהַר אֶפְרָיִם
  english_pob_choice: in the hill country of Ephraim
  chosen_spanish: en la región montañosa de Efraín
  alternatives_spanish:
  - en la serranía de Efraín
  - en la tierra montañosa de Efraín
  lexicon: HALOT
  rationale: La expresión denota el territorio alto de Efraín, no un monte único. «Región montañosa» comunica mejor el sentido geográfico en español contemporáneo.
translation_notes:
  revision_awareness: 'La traducción inglesa revisada corrigió una frase equívoca/incorrecta: no se trata de «su región montañosa», sino de un lugar llamado Gibeath-phinehas que había sido dado a su hijo. La versión española sigue esa corrección y conserva la misma alternativa textual/lexical en nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general en el proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantiene «sepultaron» en lugar de «enterraron» por registro bíblico digno y equivalencia narrativa.
  - Se translitera el topónimo como nombre propio para respetar la ambigüedad entre lugar nominal y descripción del lugar.
