  text: מִזְמ֗וֹר לְ/דָ֫וִ֥ד יְהוָ֤ה שְׁמַ֬ע תְּפִלָּתִ֗/י הַאֲזִ֥ינָ/ה אֶל תַּחֲנוּנַ֑/י בֶּ/אֱמֻנָתְ/ךָ֥ עֲ֝נֵ֗/נִי בְּ/צִדְקָתֶֽ/ךָ׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/143/000.yaml
  text: A psalm of David. O LORD, hear my prayer; give ear to my pleas for mercy! In your faithfulness answer me, in your righteousness!
  footnotes:
  - marker: a
    text: Or "my supplications."
    reason: lexical_alternative
  - marker: b
    text: Or "by your faithfulness"; Hebrew may also be understood as an appeal grounded in God's faithfulness.
    reason: lexical_alternative
  - marker: c
    text: Or "in your justice" or "by your righteousness."
    reason: lexical_alternative
  - marker: d
    text: Or 'A psalm of David[a][b][c].'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:36:49Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Salmo de David. Yahvé, escucha mi oración; atiende a mis súplicas[a]. Respóndeme[b] conforme a tu fidelidad, conforme a tu justicia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “mis ruegos” o “mis plegarias”. La expresión hebrea puede abarcar súplicas de misericordia, ruegos o peticiones insistentes.
    reason: lexical_alternative
  - marker: b
    text: O “en tu fidelidad” o “por tu fidelidad”; el hebreo también puede entenderse como una apelación fundada en la fidelidad de Dios.
    reason: lexical_alternative
  - marker: c
    text: O “en tu justicia”, “por tu justicia” o “conforme a tu rectitud”.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמֹור לְדָוִד
  english_pob_choice: A psalm of David.
  chosen_spanish: Salmo de David.
  alternatives_spanish:
  - Un salmo de David.
  - Salmo para David.
  lexicon: מִזְמֹור = salmo; לְדָוִד = de David
  rationale: El encabezado es breve y formular; 'Salmo de David' conserva la forma tradicional y el sentido de atribución sin añadir información no presente en el hebreo.
- source_word: יְהוָה
  english_pob_choice: O LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - el SEÑOR
  lexicon: YHWH = Yahvé
  rationale: Se sigue el estándar del proyecto para el nombre divino, preservando el nombre propio y evitando la sustitución por un título enmascarador.
- source_word: תְּפִלָּתִי
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi plegaria
  lexicon: תְּפִלָּה = oración/plegaria
  rationale: '''Oración'' es natural en español y fiel al sentido básico; no requiere especialización adicional.'
- source_word: תַּחֲנוּנַי
  english_pob_choice: my pleas for mercy
  chosen_spanish: mis súplicas
  alternatives_spanish:
  - mis ruegos
  - mis plegarias de misericordia
  lexicon: תַּחֲנוּנִים = súplicas, ruegos
  rationale: '''Súplicas'' mantiene el tono de petición humilde y conserva bien la amplitud del hebreo; la nota recoge la alternativa semántica que el inglés POB dejó abierta.'
- source_word: בֶּאֱמֻנָתְךָ
  english_pob_choice: In your faithfulness
  chosen_spanish: conforme a tu fidelidad
  alternatives_spanish:
  - en tu fidelidad
  - por tu fidelidad
  lexicon: אֱמֻנָה = fidelidad, firmeza, confiabilidad
  rationale: La preposición hebrea permite entender una base o norma para la acción divina. En español, 'conforme a' expresa bien esa relación sin forzar una lectura puramente locativa.
- source_word: בְּצִדְקָתֶךָ
  english_pob_choice: in your righteousness
  chosen_spanish: conforme a tu justicia
  alternatives_spanish:
  - en tu justicia
  - por tu justicia
  - conforme a tu rectitud
  lexicon: צְדָקָה = justicia, rectitud
  rationale: '''Justicia'' comunica el peso jurídico-covenantal del término. Se mantiene una equivalencia que respeta la tensión entre cualidad moral y acto justo de Dios.'
theological_decisions:
- issue: Relación entre 'fidelidad' y el modo de la respuesta divina en בֶּאֱמֻנָתְךָ
  english_pob_reading: In your faithfulness answer me
  chosen_spanish_reading: Responde conforme a tu fidelidad
  alternative_spanish_readings:
  - Respóndeme en tu fidelidad
  - Respóndeme por tu fidelidad
  rationale: El hebreo puede leerse como apelación basada en el atributo divino o como norma de la respuesta. 'Conforme a' preserva ambas posibilidades sin decidir de forma innecesaria entre 'en' y 'por'.
  doctrine_reference: Atributos divinos; fidelidad de Yahvé en el pacto
- issue: Relación entre 'justicia' y la respuesta divina en בְּצִדְקָתֶךָ
  english_pob_reading: in your righteousness
  chosen_spanish_reading: conforme a tu justicia
  alternative_spanish_readings:
  - en tu justicia
  - por tu justicia
  - en tu rectitud
  rationale: Se conserva la ambigüedad del hebreo entre esfera, medio o norma. 'Conforme a' evita reducir el sentido a una sola preposición y mantiene la apelación al carácter justo de Dios.
  doctrine_reference: Justicia divina; lenguaje judicial-covenantal
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: O LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el SEÑOR
  rationale: El proyecto pide restaurar el nombre divino cuando aparece en el original. Esto conserva transparencia textual y evita el encubrimiento litúrgico del nombre.
  doctrine_reference: Nombre divino YHWH
translation_notes:
  revision_awareness: 'El texto inglés auditado fue corregido por omitir por completo la parte central del versículo hebreo. Esta versión española incluye todos los elementos del original: encabezado, invocación a Yahvé, petición de escucha, súplicas, y la doble apelación final a la fidelidad y la justicia divinas.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se usa 'súplicas' como traducción principal de תַּחֲנוּנִים, con alternativas documentadas en notas.
  - Se evita 'SEÑOR' salvo cuando el original no es el nombre divino explícito.
  - '''Conforme a tu fidelidad / justicia'' conserva la ambigüedad preposicional del hebreo sin sobreinterpretar.'
  - La línea poética final se traduce con paralelismo simétrico para reflejar el hebreo.
