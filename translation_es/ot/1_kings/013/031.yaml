review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del rastro POB en casi todo el versículo: conserva la apertura narrativa, la anterioridad temporal de ''después de haberlo sepultado'', el mandato funerario, ''el hombre de Dios'', ''sepulcro'', y la concreción de ''huesos''. Sin embargo, no preserva con suficiente precisión בָּנָיו, que en este contexto debe traducirse ''sus hijos'' solo si el español claramente refiere a varones; dado que en español actual ''hijos'' puede funcionar genéricamente, aquí conviene ''sus hijos varones'' o mejor mantener ''sus hijos'' pero registrar la especificidad. Más importante, ''los huesos de él'' suena torpe y menos idiomático que ''sus huesos'', y no hay ambigüedad real en el contexto inmediato. La instrucción final debe sonar solemne y natural en español.'
  spanish_quality_summary: 'El español es claro y mayormente digno, pero presenta dos puntos mejorables: la justificación léxica de ''a sus hijos'' contradice la decisión inglesa documentada sobre especificidad masculina, y la frase ''junto a los huesos de él'' es poco natural para un registro bíblico legible. Una leve pulida produce un texto más idiomático sin perder literalidad.'
  glossary_alignment: No hay conflicto con la terminología de proyecto principal. 'El hombre de Dios', 'sepulcro', 'sepultado' y 'huesos' están bien alineados con la evidencia y con las decisiones POB. El único desajuste relevante es la racionalización de בָּנָיו, que no debe presentarse como ampliable sin pérdida.
  issues:
