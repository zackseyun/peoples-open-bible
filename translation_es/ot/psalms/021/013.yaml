translation:
  language: es
  text: Porque harás que den la espalda[a]; con tus cuerdas de arco[b] apuntarás a sus rostros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «los pondrás como un hombro». El hebreo usa una expresión idiomática que probablemente significa hacerlos dar la espalda en retirada o exponer la espalda como blanco.
    reason: lexical_alternative
  - marker: b
    text: O «con tus cuerdas/cordeles prepararás [tu arco/tus flechas] contra sus rostros». La imagen hebrea es muy condensada; algunas traducciones conservan más literalmente el sentido de «preparar» o «poner en posición».
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Así que
  - Ciertamente
  lexicon: HALOT
  rationale: כִּי introduce aquí la relación de fundamento o explicación respecto del versículo anterior; en español, «Porque» conserva bien ese valor causal/explicativo sin forzar un matiz más enfático que el hebreo no exige.
- source_word: תְּשִׁיתֵמוֹ שֶׁכֶם
  english_pob_choice: you will make them turn their back
  chosen_spanish: harás que vuelvan la espalda
  alternatives_spanish:
  - harás que se vuelvan de espaldas
  - los pondrás como espalda
  - harás que den la espalda
  lexicon: HALOT
  rationale: La combinación idiomática se refiere al efecto militar de obligar al enemigo a retirarse o mostrar la espalda; «harás que vuelvan la espalda» mantiene la imagen y comunica el sentido idiomático en español natural. Se evita «hombro» por ser demasiado literal y oscuro para el lector.
- source_word: בְּמֵיתָרֶיךָ
  english_pob_choice: with your bowstrings
  chosen_spanish: con tus cuerdas de arco
  alternatives_spanish:
  - con tus cordeles
  - con tus cuerdas
  - con las cuerdas de tu arco
  lexicon: HALOT
  rationale: מֵיתָר normalmente significa cuerda/cordel; en este contexto bélico, el referente más probable es el arco. «Cuerdas de arco» conserva el sustantivo básico y hace explícito el marco militar sin imponer una reconstrucción más específica que el hebreo no obliga a expresar.
- source_word: תְּכוֹנֵן
  english_pob_choice: you will aim
  chosen_spanish: apuntarás
  alternatives_spanish:
  - prepararás
  - dispondrás
  - pondrás en posición
  lexicon: HALOT
  rationale: El verbo tiene el valor de preparar/make ready, pero en esta escena con arco y rostro del enemigo el resultado funcional es apuntar. «Apuntarás» comunica la imagen en español con claridad y sigue la lectura contextual adoptada por el audit trail inglés.
- source_word: עַל פְּנֵיהֶם
  english_pob_choice: at their faces
  chosen_spanish: a sus rostros
  alternatives_spanish:
  - contra sus rostros
  - hacia sus rostros
  - ante sus rostros
  lexicon: HALOT
  rationale: פָּנִים significa rostro/cara; en español «rostros» mantiene la literalidad básica y la fuerza de confrontación visual. «A sus rostros» reproduce la dirección del objetivo sin hacer más explícita de lo necesario la hostilidad que ya aporta el contexto.
theological_decisions:
- issue: 'Relación entre las dos cláusulas: huida del enemigo y el apuntamiento del arco'
  english_pob_reading: For you will make them turn their back; with your bowstrings you will aim at their faces.
  chosen_spanish_reading: Porque harás que vuelvan la espalda; con tus cuerdas de arco apuntarás a sus rostros.
  alternative_spanish_readings:
  - Porque harás que vuelvan la espalda cuando apuntes con tus cuerdas de arco a sus rostros.
  - Porque harás que den la espalda; con tus cuerdas de arco apuntarás a sus rostros.
  rationale: El hebreo es poético y condensado. La traducción conserva la yuxtaposición de imágenes sin añadir una explicación causal más fuerte que la del texto, pero sí deja clara la correspondencia entre el enemigo que se vuelve y el arco dirigido a su rostro. No hay una tensión doctrinal; es una cuestión de estructura poética y de imagen bélica.
  doctrine_reference: Poética hebrea; no aplica una doctrina específica
translation_notes:
  revision_awareness: La redacción sigue la decisión revisada en el audit trail inglés de mantener más de cerca la correspondencia léxica entre la retirada del enemigo y la acción con el arco, sin introducir el «cuando» explicativo que se probó en una revisión anterior. También conserva la ambigüedad productiva de מֵיתָרִים como cuerdas/correas de arco y la idiomaticidad de שֶׁכֶם.
  spanish_consistency_notes:
  - Se usa «rostros» en plural para concordar con el sujeto plural implícito del hebreo.
  - Se evita «SEÑOR» porque este verso no contiene el Tetragrámaton; el verso se dirige a Dios en segunda persona.
  - «Arco» se mantiene en singular como complemento implícito de «cuerdas de arco», siguiendo la imagen bélica compacta del hebreo.
