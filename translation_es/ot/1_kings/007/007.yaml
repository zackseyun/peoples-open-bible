    issue: '''el Salón del Juicio'' suena poco idiomático en español'
    rationale: Aunque es comprensible y cercano al inglés auditado, en español la designación funcional del recinto se expresa con más naturalidad como 'salón de juicio' o 'sala de juicio'. Esto preserva mejor la legibilidad sin perder fidelidad.
  - severity: low
