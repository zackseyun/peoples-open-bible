  text: חֵ֤טְא חָֽטְאָה֙ יְר֣וּשָׁלִַ֔ם עַל כֵּ֖ן לְ/נִידָ֣ה הָיָ֑תָה כָּֽל מְכַבְּדֶ֤י/הָ הִזִּיל֨וּ/הָ֙ כִּי רָא֣וּ עֶרְוָתָ֔/הּ גַּם הִ֥יא נֶאֶנְחָ֖ה וַ/תָּ֥שָׁב אָחֽוֹר־־־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/lamentations/001/008.yaml
  text: Jerusalem has sinned grievously[a]; therefore she has become unclean. All who honored her despise her, because they have seen her nakedness[c][b]. She herself also groans and turns backward.
  footnotes:
  - marker: a
    text: Or 'has become like a menstruant' or 'has become an impurity'; the Hebrew term carries the sense of ritual uncleanness and separation.
    reason: lexical_alternative
  - marker: b
    text: Literally 'turns back' or 'turns backward.'
    reason: lexical_alternative
  - marker: c
    text: Or 'She herself also'.
    reason: previous_rendering
  ai_draft:
    model_id: gpt-5.4
