review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido básico del hebreo: mantiene el objeto pronominal en וַיֶּחָלְקֵם («los dividió»), el resultado organizativo de מַחְלְקוֹת («en divisiones»), la formulación genealógica לִבְנֵי לֵוִי («para los hijos de Leví») y la lista de clanes. También preserva correctamente la alternativa sintáctica del ל inicial en una nota.'
  spanish_quality_summary: El español es claro y digno, pero necesita una pequeña corrección de legibilidad y fidelidad onomástica dentro del proyecto. «Gersón» y «Coat» son formas tradicionales en español, pero el rastro auditado inglés usa «Gershon» y «Kohath», y el encargo pide revisar desde la evidencia fuente y la racionalidad documentada. Dado que la decisión lexical española justifica estas formas como «habituales», conviene ajustar la explicación y mejorar la naturalidad de la nota. Además, hay un error tipográfico visible («ორგანizaciones») en la rationale, aunque no afecta el texto bíblico.
  glossary_alignment: 'No hay términos teológicos sensibles aquí. La principal cuestión es onomástica: el borrador usa formas hispanizadas tradicionales («Gersón», «Coat»). Son comprensibles, pero para mayor cercanía al hebreo auditado y consistencia con el inglés POB conviene usar «Guersón» y «Cohat», formas españolas más directas respecto de גֵּרְשׁוֹן y קְהָת, sin perder legibilidad. «Leví» y «Merari» están bien.'
  issues:
  - severity: medium
    issue: Los nombres propios «Gersón» y «Coat» pueden mejorarse a «Guersón» y «Cohat».
    rationale: El texto fuente tiene גֵרְשׁוֹן y קְהָת. «Guersón» refleja mejor el inicio ge-/gue- en español, y «Cohat» se acerca más a Kohath/Qehat que «Coat», evitando una reducción excesiva del nombre. Es una mejora menor pero útil para fidelidad y claridad.
  - severity: low
    issue: La redacción de la nota puede sonar algo calcada.
    rationale: «Haciendo más explícito que la preposición gobierna la lista de clanes» es entendible, pero en español más natural es «haciendo más explícito que la preposición rige la lista de clanes».
