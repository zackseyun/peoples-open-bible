  - severity: medium
    issue: La nota b mezcla ambos verbos en vez de limitarse a תְּחַיֵּנוּ
    rationale: El rastro inglés distingue claramente la alternativa de 'return' y la de 'revive us'. La nota española b ('volverás a darnos vida') reintroduce שוב dentro de una nota que debería explicar solo חיה.
