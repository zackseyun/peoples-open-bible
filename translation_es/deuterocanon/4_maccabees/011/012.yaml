    rationale: La frase griega εἰς τὸν νόμον ἡμῶν expresa orientación/lealtad hacia la ley. El inglés auditado la resolvió como «for our law». En español, «para nuestra ley» suena forzado y puede sugerir finalidad más que compromiso. «Por nuestra ley» comunica mejor la lealtad por la cual soportan el sufrimiento.
  - severity: low
