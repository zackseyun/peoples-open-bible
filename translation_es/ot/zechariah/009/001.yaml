base_translation:
  language: en
  yaml_path: translation/ot/zechariah/009/001.yaml
  text: 'An oracle: the word of Yahweh is against the land of Hadrach[a], and Damascus is its resting place[d][c][b]; for the eye of man and of all the tribes of Israel is toward Yahweh.'
  footnotes:
  - marker: a
    text: Or 'concerning the land of Hadrach.' The Hebrew preposition is literally 'in,' but in prophetic headings it can function idiomatically for the target of an oracle.
    reason: alternative_reading
  - marker: b
    text: Or 'Damascus is his resting place.' The Hebrew suffix in 'its/his resting place' is ambiguous.
    reason: lexical_alternative
  - marker: c
    text: Or 'for the eye of humankind, and of all the tribes of Israel, is toward the LORD.' Hebrew 'man' here likely has a generic sense.
    reason: lexical_alternative
  - marker: d
    text: Some understand the clause as 'for the LORD has an eye on man and on all the tribes of Israel,' but the Hebrew wording is compressed and allows more than one construal.
    reason: alternative_reading
