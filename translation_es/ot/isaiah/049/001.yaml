revisions:
- from: 'Escúchenme, costas[a], y presten atención, pueblos lejanos: Yahvé[b] me llamó desde el vientre; desde el cuerpo de mi madre hizo recordar mi nombre[c].'
  to: 'Escúchenme, costas lejanas[a], y presten atención, pueblos desde lejos: Yahvé me llamó desde el vientre[b]; desde el cuerpo de mi madre mencionó mi nombre[c].'
  rationale: Se ajusta la cláusula final a un español natural y fiel al audit trail usando «mencionó mi nombre», con nota para conservar los matices de nombrar/designar. También se mejora levemente אִיִּים y מֵרָחוֹק con «costas lejanas» y «pueblos desde lejos», y se elimina la nota redundante sobre «Yahvé».
