    rationale: Después de «moretón», la secuencia nominal con «los que» queda áspera. «quienes han tramado» o una relativa explicativa mejora la lectura sin apartarse del griego.
  - severity: medium
    issue: Registro algo débil en «moretón»
    rationale: Aunque exacto en sentido básico, «moretón» puede sonar demasiado coloquial para el tono del pasaje. «golpe» o «contusión» elevan el registro. Puede mantenerse si el resto se pule, pero conviene ajustar.
  - severity: low
