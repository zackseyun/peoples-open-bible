id: REV.1.10
reference: 'Revelation 1:10'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐγενόμην ἐν πνεύματι ἐν τῇ κυριακῇ ἡμέρᾳ, καὶ ἤκουσα ⸂ὀπίσω μου φωνὴν⸃ μεγάλην ὡς σάλπιγγος
base_translation:
  language: en
  yaml_path: translation/nt/revelation/001/010.yaml
  text: 'I came to be in the Spirit on the Lord’s day[a], and I heard behind me a loud voice like a trumpet[b],'
  footnotes:
  - marker: a
    text: Or, less likely, 'on the day of the Lord.' The Greek here is κυριακῇ ἡμέρᾳ ('the Lord’s day'), not the more usual expression for the eschatological 'day of the Lord.'
    reason: alternative_reading
  - marker: b
    text: Or 'in spirit.' The phrase may denote being under the Holy Spirit’s prophetic influence; the text does not explicitly say 'in a trance.'
    reason: lexical_alternative
translation:
  language: ko
  text: '내가 주의 날[a]에 영 안에 있게 되었습니다. 그때 내 뒤에서 나팔 소리 같은 큰 음성을 들었습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '또는, 가능성은 낮지만, 「주의 날(여호와의 날)」. 헬라어 κυριακῇ ἡμέρᾳ는 종말론적 「주의 날」 정형 표현과는 다른 형태이다.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν πνεύματι
  english_pob_choice: in the Spirit
  chosen_korean: 영 안에
  alternatives_korean:
  - 성령 안에
  - 영적으로
  lexicon: BDAG
  rationale: '본문은 「ἐν πνεύματι」로 관사가 없으며, 환상적 무아경 상태와 성령의 인도가 함께 함의된다. 명시적 한정을 피하기 위해 「영 안에」를 택한다.'
- source_word: κυριακῇ ἡμέρᾳ
  english_pob_choice: the Lord's day
  chosen_korean: 주의 날
  alternatives_korean:
  - 주일
  lexicon: BDAG
  rationale: '초기 기독교에서 부활을 기리던 한 주의 첫째 날을 가리키되, 본 절은 종말론적 「주의 날」과 형태가 다르므로 「주의 날」(주께 속한 날)로 옮긴다.'
