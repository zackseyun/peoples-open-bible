translation:
  language: es
  text: Todos los servidores del templo[a] y los hijos de los siervos de Salomón fueron trescientos noventa y dos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los netinim», transliteración tradicional para una clase de servidores del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - La totalidad de
  - Todos los
  lexicon: HALOT
  rationale: En un registro de censo/lista, כָּל introduce el total del grupo. «Todos» conserva la fuerza distributiva y suena natural en español sin añadir un matiz explicativo ajeno al hebreo.
- source_word: הַנְּתִינִים
  english_pob_choice: the temple servants
  chosen_spanish: los netinim
  alternatives_spanish:
  - los servidores del templo
  - los Nethinim
  lexicon: HALOT
  rationale: El inglés POB opta por el trasfondo funcional y preserva la transliteración como alternativa. En español, «netinim» mantiene la categoría técnica reconocible y evita una paraphrasis que podría ocultar el término tradicional; la nota aclara su función como sirvientes del templo.
- source_word: וּבְנֵי
  english_pob_choice: and the sons of
  chosen_spanish: y los hijos de
  alternatives_spanish:
  - y los descendientes de
  lexicon: HALOT
  rationale: La construcción genealógica/administrativa hebrea se expresa de modo directo con «hijos de», que reproduce la forma del texto y es idiomática en listas bíblicas.
- source_word: עַבְדֵי
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - esclavos
  - servidores
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «servants» por claridad contextual, el hebreo עֶבֶד puede llevar un peso más fuerte de dependencia/servicio. «Siervos» conserva esa relación sin forzar «esclavos», que aquí podría sonar demasiado duro para un nombre grupal fijo.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon’s
  chosen_spanish: de Salomón
  alternatives_spanish:
  - de Solomon
  lexicon: HALOT
  rationale: Nombre propio bíblico renderizado con la forma española usual «Salomón» para lectura natural y eclesialmente inteligible.
- source_word: שְׁלֹשׁ מֵאוֹת תִּשְׁעִים וּשְׁנָיִם
  english_pob_choice: three hundred ninety-two
  chosen_spanish: trescientos noventa y dos
  alternatives_spanish:
  - '392'
  lexicon: HALOT
  rationale: El número cardinal se expresa con palabras, como en el texto inglés, para mantener el flujo de la narrativa y el estilo de lista bíblica.
translation_notes:
  revision_awareness: El texto base y la auditoría inglesa muestran alta concordancia; no hay revisiones sustantivas aplicadas. La versión española mantiene esa correspondencia y conserva el nombre técnico del grupo con una nota alternativa, siguiendo el equilibrio entre transparencia y legibilidad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se evita «Cristo»/«Mesías» porque no hay referencia cristológica.
  - «Siervos» aquí se reserva para el grupo nominal fijo de עַבְדֵי; no implica una normalización doctrinal más allá del listado censal.
  - La puntuación y el orden siguen el carácter enumerativo del hebreo y la lectura pública en español.
