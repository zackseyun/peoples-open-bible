  text: לְ/דָוִ֨ד יְהוָ֤ה אוֹרִ֣/י וְ֭/יִשְׁעִ/י מִ/מִּ֣י אִירָ֑א יְהוָ֥ה מָֽעוֹז חַ֝יַּ֗/י מִ/מִּ֥י אֶפְחָֽד׀׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/027/000.yaml
  text: Of David[a]. Yahweh is my light and my salvation; whom shall I fear? Yahweh is the stronghold of my life[b]; of whom shall I be afraid?
  footnotes:
  - marker: a
    text: Or 'By David' or 'For David' in the superscription; the Hebrew לְדָוִד can indicate authorship or association.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'Yahweh'; rendered 'the LORD' following the translation's standard practice for the divine name.
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:36:19Z'
    unchanged: false
    changes_summary: Completed the verse beyond the superscription, adding the full translation of the Hebrew. Rendered יְהוָה as 'Yahweh' per policy, מָעוֹז as 'stronghold,' and preserved the parallel rhetorical questions naturally in formal English.
translation:
  language: es
  text: De David[a]. Yahvé es mi luz y mi salvación; ¿a quién temeré? Yahvé es la fortaleza de mi vida; ¿de quién tendré miedo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «Por David» o «Para David» en la superscripción; el hebreo לְדָוִד puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David / By David / For David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  lexicon: לְ + nombre propio en superscripción
  rationale: La preposición לְ en los encabezados puede indicar autoría, dedicación o asociación. «De David» mantiene esa apertura sin forzar una sola relación, como hizo la nota inglesa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: יהוה
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: «Yahvé» en el texto principal. Mantiene la referencia directa al nombre propio y evita el ocultamiento por mayúsculas devocionales.'
- source_word: אוֹר
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - lumbre
  - resplandor
  lexicon: אוֹר
  rationale: «Luz» es la equivalencia natural y fiel en español para el sustantivo básico, sin añadir matices no presentes en el hebreo.
- source_word: יִשְׁעִי
  english_pob_choice: my salvation
  chosen_spanish: mi salvación
  alternatives_spanish:
  - mi rescate
  - mi liberación
  lexicon: ישע
  rationale: «Salvación» conserva el alcance soteriológico amplio del término y coincide con el uso bíblico común, sin reducirlo solo a rescate físico.
- source_word: מָעוֹז
  english_pob_choice: stronghold
  chosen_spanish: fortaleza
  alternatives_spanish:
  - baluarte
  - refugio
  - escarpada fortaleza
  lexicon: מעוז
  rationale: El inglés POB eligió «stronghold» como imagen de refugio y defensa. En español, «fortaleza» comunica bien esa función de lugar/realidad defensiva y suena natural en el paralelismo poético.
- source_word: חַיַּי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi existencia
  - mi ser
  lexicon: חיים
  rationale: La expresión posesiva se vierte de manera directa y idiomática en español, preservando el sentido de totalidad vital que aporta el hebreo.
theological_decisions:
- issue: Tratamiento del nombre divino en un salmo con paralelismo confesional
  english_pob_reading: Yahweh ... Yahweh ...
  chosen_spanish_reading: Yahvé ... Yahvé ...
  alternative_spanish_readings:
  - el SEÑOR ... el SEÑOR
  - Yahweh ... Yahweh ...
  rationale: Se mantiene el nombre personal de Dios en ambas cláusulas para conservar la fuerza confesional del hebreo y la política editorial del proyecto, en lugar de sustituirlo por un título enmascarado.
  doctrine_reference: Éxodo 3:15; Salmo 27:1
- issue: Superscripción atribuida a David
  english_pob_reading: Of David
  chosen_spanish_reading: De David
  alternative_spanish_readings:
  - Por David
  - Para David
  rationale: La superscripción no se resuelve dogmáticamente como autoría exclusiva o dedicación. «De David» preserva la ambigüedad documentada por la nota inglesa.
  doctrine_reference: Encabezamientos de los Salmos; 1 Samuel 16–17 (contexto davídico)
translation_notes:
  revision_awareness: El texto inglés de auditoría fue ampliado en la revisión más reciente desde una superscripción incompleta a la traducción completa del versículo. Esta versión española sigue ese estado revisado completo, no la forma abreviada previa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para יְהוָה, según la norma del proyecto.
  - 'Se conserva el paralelismo de dos preguntas retóricas con verbos en futuro de primera persona singular: «temeré» / «tendré miedo».'
  - «Fortaleza de mi vida» mantiene la imagen de מעוז sin introducir explicaciones interpretativas adicionales.
  - La superscripción se separa con punto para reflejar el cierre natural del encabezado en español publicado.
