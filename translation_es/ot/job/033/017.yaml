review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura finalista del hebreo y conserva la nota sobre la compresión sintáctica. Sin embargo, «su hecho» no representa bien מַעֲשֶׂה en español natural ni el matiz moral documentado; suena poco idiomático y debilita la idea de acción/deed. Además, «ocultar la soberbia al hombre» en español se entiende más naturalmente como ocultarle algo al hombre, no como ocultar/encubrir la soberbia de él, por lo que desalinearía el sentido contextual. Conviene ajustar ambos puntos.
  spanish_quality_summary: El texto es generalmente claro y digno, pero «su hecho» resulta forzado y poco legible en español bíblico contemporáneo. También la preposición en «ocultar la soberbia al hombre» crea ambigüedad innecesaria y suena menos natural que una formulación con «de».
  glossary_alignment: No hay conflicto con terminología mayor del proyecto. «Soberbia» para גֵוָה y «apartar» para לְהָסִיר son buenas opciones. El problema principal es idiomático-semántico con מַעֲשֶׂה y la relación de מִגֶּבֶר con el segundo hemistiquio.
  issues:
  - severity: medium
    issue: «su hecho» es una elección poco idiomática para מַעֲשֶׂה
    rationale: Aunque formalmente posible, en español moderno «hecho» aquí suena extraño y no comunica bien el sentido de acto/acción/deed. «Su acción» preserva mejor la ambigüedad básica y la legibilidad.
  - severity: medium
    issue: «ocultar la soberbia al hombre» sugiere dativo indirecto equivocado
    rationale: En español, esa construcción normalmente significa ocultarle la soberbia a alguien, no ocultar o apartar la soberbia de él. «Ocultar la soberbia del hombre» o «de un hombre» refleja mejor la relación semántica preservando la compresión del hebreo.
  - severity: low
    issue: La nota al pie con «quitar el hecho de un hombre» hereda una formulación española poco natural
    rationale: Ya que «hecho» es duro en el texto principal, también conviene mejorar la alternativa literal en la nota con «acción», que sigue siendo fiel al rango semántico de מַעֲשֶׂה.
  revised_spanish_text: para apartar al hombre de su acción,[a] y para ocultar la soberbia del hombre.
