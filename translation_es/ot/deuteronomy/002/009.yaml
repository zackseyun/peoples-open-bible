translation:
  language: es
  text: 'Y Yahvé me dijo[a]: «No acoses a Moab ni los provoques a la guerra, porque no te daré ninguna parte de su tierra como heredad[b], pues a los hijos de Lot les he dado Ar como heredad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No hostigues a Moab, ni entres en guerra con ellos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como posesión»; también «como herencia» en ambos casos de יְרֻשָּׁה.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: N/A
  rationale: Se conserva el nombre propio divino del Tetragrámaton, siguiendo la política del proyecto. «Yahvé» comunica el nombre revelado sin sustituirlo por un título.
- source_word: אֶל תָּצַר
  english_pob_choice: Do not harass
  chosen_spanish: No molestes
  alternatives_spanish:
  - No acoses
  - No aprietes
  - No causes angustia a
  lexicon: HALOT
  rationale: En este contexto prohibitivo, el verbo expresa hostilidad o presión previa al conflicto. «No molestes» funciona en español moderno como una orden natural y mantiene la idea de hostigar sin forzar una paráfrasis más fuerte de lo que permite el contexto.
- source_word: וְאַל תִּתְגָּר בָּם מִלְחָמָה
  english_pob_choice: or provoke them to war
  chosen_spanish: ni los provoques a la guerra
  alternatives_spanish:
  - ni entres en guerra con ellos
  - ni los incites a la guerra
  - ni te provoques con ellos para la guerra
  lexicon: HALOT
  rationale: El hitpael de גרה con מִלְחָמָה expresa incitar o entrar en hostilidad bélica. «Provoques a la guerra» conserva esa fuerza causal y el paralelismo con la primera prohibición.
- source_word: מֵאַרְצוֹ
  english_pob_choice: any of its land
  chosen_spanish: ninguna parte de su tierra
  alternatives_spanish:
  - nada de su tierra
  - ninguna de sus tierras
  - ni una porción de su tierra
  lexicon: HALOT
  rationale: 'El hebreo tiene fuerza partitiva: no se concederá ninguna porción. «Ninguna parte de su tierra» transmite el valor de «any of its land» en español natural.'
- source_word: יְרֻשָּׁה
  english_pob_choice: as a possession
  chosen_spanish: como heredad
  alternatives_spanish:
  - como posesión
  - como posesión heredada
  - como herencia
  lexicon: HALOT
  rationale: Para mantener el matiz de herencia patrimonial y asignación territorial, «heredad» conserva mejor la carga bíblica de יְרֻשָּׁה que «posesión», sin perder inteligibilidad.
- source_word: לִבְנֵי לֹט
  english_pob_choice: to the sons of Lot
  chosen_spanish: a los hijos de Lot
  alternatives_spanish:
  - a los descendientes de Lot
  - a los hijos de Lot
  lexicon: HALOT
  rationale: Se mantiene la formulación genealógica directa del hebreo. «Hijos» es transparente y fiel; «descendientes» sería más dinámico, pero menos cercano a la forma del texto.
- source_word: עָר
  english_pob_choice: Ar
  chosen_spanish: Ar
  lexicon: N/A
  rationale: Nombre propio transliterado sin adaptación.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La lectura de la POB es conservar el nombre propio de Dios, no sustituirlo por un título. En español, «Yahvé» es la forma coherente con esa decisión editorial y con la transparencia del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de יְרֻשָּׁה en contexto territorial
  english_pob_reading: as a possession
  chosen_spanish_reading: como heredad
  alternative_spanish_readings:
  - como posesión
  - como herencia
  rationale: El contexto habla de asignación territorial a Israel y a la línea de Lot. «Heredad» preserva la dimensión de lote asignado por derecho de distribución, sin debilitar el matiz legal/covenantal del término.
  doctrine_reference: Uso consistente de términos patrimoniales bíblicos; cf. énfasis de la POB en precisión léxica
- issue: Tensión entre hostilidad y guerra en las dos prohibiciones
  english_pob_reading: Do not harass Moab or provoke them to war
  chosen_spanish_reading: No molestes a Moab ni los provoques a la guerra
  alternative_spanish_readings:
  - No acoses a Moab ni los incites a la guerra
  - No causes angustia a Moab ni entres en guerra con ellos
  rationale: El hebreo distingue entre una presión hostil previa y la incitación a guerra. El español conserva esa diferencia con dos cláusulas coordinadas y no elimina la tensión léxica del original.
  doctrine_reference: HALOT; paralelismo verbal en el hebreo deuteronómico
translation_notes:
  revision_awareness: Se revisó el borrador a la luz del paquete de origen hebreo y del audit trail en inglés. No hubo cambios aplicados reportados en la revisión más reciente; la redacción española sigue de cerca las decisiones léxicas ya verificadas, ajustándolas a una formulación natural y publication-readable en español.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se distingue entre la presión hostil de תָּצַר y la incitación bélica de תִּתְגָּר.
  - «Heredad» se usa consistentemente para יְרֻשָּׁה en ambos lugares.
  - Los nombres propios Moab, Lot y Ar se mantienen transliterados.
