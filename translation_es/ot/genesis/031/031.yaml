translation:
  language: es
  text: 'Entonces Jacob respondió y dijo a Labán: «Porque tuve miedo, pues dije: “No sea que me quitaras[a] a tus hijas por la fuerza”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «arrebataras/robaras a tus hijas de mí». El verbo hebreo expresa una sustracción injusta y violenta, más fuerte que un simple «tomar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: En contexto de diálogo narrativo, ענה introduce una respuesta formal. 'Respondió' conserva el valor de contestación sin sonar forzado; se mantiene además 'dijo' para reflejar la fórmula hebrea completa.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: אָמַר se traduce de forma directa como 'dijo' en el discurso citado. Junto con 'respondió', reproduce la fórmula narrativa habitual del hebreo.
- source_word: כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: 'El primer כִּי expresa causa: Jacob explica por qué actuó como lo hizo. ''Porque'' comunica claramente esa relación causal en español.'
- source_word: יָרֵאתִי
  english_pob_choice: I was afraid
  chosen_spanish: tuve miedo
  alternatives_spanish:
  - temí
  - tenía miedo
  lexicon: HALOT
  rationale: El verbo ירא expresa temor real. 'Tuve miedo' es natural en español y conserva la reacción emocional de Jacob.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: pues
  alternatives_spanish:
  - porque
  - ya que
  lexicon: HALOT
  rationale: El segundo כִּי introduce la explicación interna de su miedo. 'Pues' mantiene el matiz explicativo y evita repetir 'porque' en exceso.
- source_word: אָמַרְתִּי
  english_pob_choice: I said
  chosen_spanish: dije
  alternatives_spanish:
  - pensé
  lexicon: HALOT
  rationale: Aunque el sentido es de razonamiento interno, el hebreo usa literalmente 'dije'. 'Dije' conserva esa literalidad y deja implícito el monólogo interior.
- source_word: פֶּן
  english_pob_choice: Lest
  chosen_spanish: No sea que
  alternatives_spanish:
  - para que no
  - quizá
  lexicon: HALOT
  rationale: פֶּן introduce un resultado temido o prevenido. 'No sea que' transmite bien la idea de precaución ante una acción temida.
- source_word: תִּגְזֹל
  english_pob_choice: take away
  chosen_spanish: tomaras ... por la fuerza
  alternatives_spanish:
  - robara
  - arrebataras
  - sustrajeras
  lexicon: HALOT
  rationale: גזל implica despojo violento o rapiña. 'Tomaras ... por la fuerza' comunica ese carácter coercitivo en español sin depender de un verbo demasiado técnico; la fuerza lexical se preserva en nota.
- source_word: בְּנוֹתֶיךָ
  english_pob_choice: your daughters
  chosen_spanish: tus hijas
  alternatives_spanish:
  - las hijas de ti
  lexicon: HALOT
  rationale: Traducción directa y natural del posesivo. Mantiene la referencia a Lea y Raquel como hijas de Labán.
- source_word: מֵעִמִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - de mi lado
  - junto a mí
  lexicon: HALOT
  rationale: La preposición expresa separación desde la esfera de Jacob. 'De mí' es breve, natural y fiel al movimiento de alejamiento.
translation_notes:
  revision_awareness: 'La versión inglesa reciente volvió de “thought” a “said” para reflejar más literalmente אָמַרְתִּי, y ajustó תִּגְזֹל para conservar el sentido de despojo/rapto violento. La propuesta española sigue esa decisión: usa «dije» para la literalidad del discurso interior y «por la fuerza» para preservar la intensidad de גזל, con nota alternativa anclada en el texto.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general, pero este versículo no contiene el Tetragrámaton.
  - Se conserva el par narrativo 'respondió y dijo' para reflejar la fórmula hebrea sin sobrecargar el español.
  - La nota [a] está anclada exactamente en la frase afectada por la alternativa léxica.
