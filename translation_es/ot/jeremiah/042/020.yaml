translation:
  language: es
  text: 'Porque se han engañado[a] ustedes mismos, pues me enviaron a Yahvé su Dios, diciendo: «Ruega por nosotros a Yahvé nuestro Dios, y todo lo que Yahvé nuestro Dios diga, háznoslo saber, y lo haremos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se han extraviado a costa de sus vidas», destacando la fuerza autodestructiva de la expresión hebrea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: התעיתם
  english_pob_choice: you have deceived yourselves
  chosen_spanish: se han engañado a ustedes mismos
  alternatives_spanish:
  - se han extraviado
  - han errado contra ustedes mismos
  - se han descarriado
  lexicon: HALOT
  rationale: El Hiphil de תעה con בְּנַפְשׁוֹתֵיכֶם es difícil. En español, «se han engañado a ustedes mismos» conserva la idea de autoengaño o autoengaño culpable que refleja el contexto de falsa disposición a obedecer. «Extraviarse» o «descarriarse» podrían sugerir solo desvío moral, y «errar contra ustedes mismos» suena menos natural.
- source_word: בְּנַפְשׁוֹתֵיכֶם
  english_pob_choice: yourselves
  chosen_spanish: a ustedes mismos
  alternatives_spanish:
  - a costa de sus vidas
  - contra sus propias vidas
  - en sus propias vidas
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar «vida», «persona» o «yo». La POB inglesa optó por una forma reflexiva para dar naturalidad, manteniendo la fuerza de la reprensión; el español necesita igualmente una forma reflexiva. En nota se preserva la alternativa más literal que subraya el matiz de peligro para la vida.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El Tetragrámaton se vierte como «Yahvé» en el texto principal, conforme al criterio del proyecto de preservar el nombre propio divino y no sustituirlo por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - el Dios de ustedes
  lexicon: HALOT
  rationale: La construcción posesiva del hebreo se refleja con «su Dios». En español de registro bíblico natural, el contexto discursivo hace claro que es plural de segunda persona.
- source_word: הִתְפַּלֵּל בַּעֲדֵנוּ
  english_pob_choice: Pray for us
  chosen_spanish: Ruega por nosotros
  alternatives_spanish:
  - Intercede por nosotros
  - Ora por nosotros
  lexicon: HALOT
  rationale: El hitpael de פלל aquí significa orar/interceder en favor de alguien. «Ruega por nosotros» es claro, idiomático y conserva el ruego directo del original.
- source_word: וּכְכֹל אֲשֶׁר יֹאמַר
  english_pob_choice: and whatever ... says
  chosen_spanish: y todo lo que ... diga
  alternatives_spanish:
  - y según todo lo que ... diga
  - y cuanto ... diga
  lexicon: HALOT
  rationale: La expresión hebrea abarca de manera total lo que Yahvé pronuncie. «Todo lo que ... diga» conserva amplitud sin forzar una construcción demasiado literal en español.
- source_word: הַגֶּד לָנוּ
  english_pob_choice: tell us
  chosen_spanish: háznoslo saber
  alternatives_spanish:
  - dínoslo
  - decláranoslo
  lexicon: HALOT
  rationale: El imperativo de נגד puede significar decir, declarar o comunicar. «Háznoslo saber» transmite bien la petición de comunicar el mensaje recibido y suena natural en español bíblico contemporáneo.
- source_word: וְעָשִׂינוּ
  english_pob_choice: and we will do it
  chosen_spanish: y lo haremos
  alternatives_spanish:
  - y lo obedeceremos
  - y lo pondremos por obra
  lexicon: HALOT
  rationale: El verbo tiene como objeto implícito el mensaje anterior; «lo haremos» es una forma breve y fiel que conserva la promesa de obediencia sin añadir explicaciones.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre propio divino. La traducción española mantiene ese nombre como «Yahvé» para evitar la sustitución por un título y conservar la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza de התעיתם בנפשותיכם
  english_pob_reading: For you have deceived yourselves
  chosen_spanish_reading: Porque se han engañado a ustedes mismos
  alternative_spanish_readings:
  - Porque se han extraviado a costa de sus vidas
  - Porque han errado contra ustedes mismos
  rationale: La frase admite tanto el matiz de autoengaño como el de extravío peligroso para la vida. El contexto inmediato enfatiza su simulación al pedir consejo divino sin intención de obedecer, por lo que el autoengaño es la mejor lectura principal; el posible matiz autodestructivo queda preservado en nota.
  doctrine_reference: HALOT; decisión auditada en English POB
- issue: Relación posesiva en אֱלֹהֵיכֶם / אֱלֹהֵינוּ
  english_pob_reading: your God / our God
  chosen_spanish_reading: su Dios / nuestro Dios
  alternative_spanish_readings:
  - el Dios de ustedes / nuestro Dios
  - su Dios de ustedes / nuestro Dios
  rationale: La alternancia posesiva del hebreo se conserva con «su Dios» y «nuestro Dios». Aunque en español podría explicitarse «de ustedes», el contexto narrativo ya identifica a los interlocutores y el texto gana fluidez sin perder precisión.
  doctrine_reference: Hebreo constructo y sufijos pronominales
translation_notes:
  revision_awareness: La POB inglesa fue revisada de «you deceived yourselves» a «you have deceived yourselves» para reflejar mejor la forma verbal y la naturalidad del inglés. En español se optó por un presente perfecto equivalente («se han engañado») que conserva la temporalidad y la acusación directa. También se mantuvo la decisión doctrinal de traducir יְהוָה como «Yahvé».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton en todo el versículo.
  - Se usa el perfecto compuesto «se han engañado» para reflejar la fuerza verbal del hebreo y la revisión inglesa.
  - Se conserva «su Dios / nuestro Dios» para reproducir el cambio de personas del hebreo.
  - «Háznoslo saber» se eligió para נגד por naturalidad en español sin perder el valor de comunicar un mensaje revelado.
