translation:
  language: es
  text: Pero Yahvé no había dicho que borraría el nombre de Israel de debajo del cielo[a], por eso los salvó por medio de Jeroboam hijo de Joás[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'borraría', 'eliminaría' o 'borraría por completo' el nombre de Israel.
    reason: lexical_alternative
  - marker: b
    text: La expresión 'por medio de' traduce el hebreo idiomático 'por la mano de', es decir, 'a través de' o 'mediante'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto, en línea con el criterio del POB de no ocultar el tetragrámaton tras un título genérico. 'Yahvé' es el equivalente español más transparente y auditably coherente con el inglés 'Yahweh'.
- source_word: דִבֶּר
  english_pob_choice: had not said
  chosen_spanish: no había dicho
  alternatives_spanish:
  - no había hablado
  - no había declarado
  lexicon: HALOT
  rationale: En esta construcción con לִמְחוֹת, el sentido es de declaración o intención previa, no simplemente de emisión de palabras. 'No había dicho' refleja bien esa relación temporal y modal en español.
- source_word: לִמְחוֹת
  english_pob_choice: that he would blot out
  chosen_spanish: que borraría
  alternatives_spanish:
  - que borraría de la memoria
  - que eliminaría
  - que borraría por completo
  lexicon: HALOT
  rationale: '''Borrar'' mantiene el valor de מחה como eliminación total sin introducir una imagen demasiado idiomática en español como ''destruir'' o ''aniquilar''. Se evita suavizar la fuerza del verbo.'
- source_word: שֵׁם יִשְׂרָאֵל
  english_pob_choice: the name of Israel
  chosen_spanish: el nombre de Israel
  alternatives_spanish:
  - el nombre de Israel
  - Israel como nombre
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea donde 'nombre' representa identidad y permanencia. Traducirla literalmente es importante para no perder la fuerza de la expresión.
- source_word: מִתַּחַת הַשָּׁמָיִם
  english_pob_choice: from under heaven
  chosen_spanish: de debajo de los cielos
  alternatives_spanish:
  - de debajo del cielo
  - de la tierra
  lexicon: HALOT
  rationale: '''De debajo de los cielos'' reproduce la idiomática hebrea sin interpretarla como ''de la tierra''. Aunque suena solemne, sigue siendo comprensible en español bíblico contemporáneo.'
- source_word: וַיּוֹשִׁיעֵם
  english_pob_choice: so he saved them
  chosen_spanish: sino que los salvó
  alternatives_spanish:
  - y los salvó
  - así los salvó
  - por eso los salvó
  lexicon: HALOT
  rationale: El hebreo vincula la no-declaración de Yahvé con el acto de salvar; en español, 'sino que' conserva el contraste y la progresión narrativa sin añadir causalidad explícita excesiva. 'Salvar' mantiene el valor básico del verbo הושיע.
- source_word: בְּיַד
  english_pob_choice: by the hand of
  chosen_spanish: por medio de
  alternatives_spanish:
  - por la mano de
  - a través de
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de agencia o instrumento. 'Por medio de' comunica la función instrumental en español natural, aunque se preserve en nota la imagen literal de 'por la mano de'.
- source_word: יָרָבְעָם בֶּן יוֹאָשׁ
  english_pob_choice: Jeroboam son of Joash
  chosen_spanish: Jeroboam hijo de Joás
  alternatives_spanish:
  - Jeroboam, hijo de Joás
  - Jeroboam el hijo de Joás
  lexicon: HALOT
  rationale: Se usa la forma habitual en español bíblico, manteniendo los nombres propios en transliteración española estándar y la filiación en construcción directa.
theological_decisions:
- issue: Relación entre la negativa divina y la acción salvadora
  english_pob_reading: The verse states that the LORD had not decreed Israel's eradication and therefore acted to save them through Jeroboam as his instrument.
  chosen_spanish_reading: El versículo afirma que Yahvé no había decretado borrar a Israel y, por tanto, los salvó por medio de Jeroboam como instrumento.
  alternative_spanish_readings:
  - Yahvé no había dicho que destruiría a Israel, así que los salvó por medio de Jeroboam.
  - Yahvé no había resuelto borrar el nombre de Israel, sino que lo salvó por medio de Jeroboam.
  rationale: La traducción preserva la secuencia lógica del hebreo sin resolver la tensión teológica acerca de un rey imperfecto usado como agente de salvación. 'Sino que' mantiene el contraste y evita una explicación doctrinal añadida.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; la lectura se alinea con la versión auditada de alta concordancia y conserva sus decisiones léxicas y teológicas principales.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, según el estándar del proyecto.
  - Se conserva la metáfora de 'el nombre de Israel' sin explicitarla en el cuerpo del texto.
  - '''Salvar'' traduce הושיע de forma consistente con el POB inglés.'
  - La estructura contrastiva 'no había dicho... sino que...' refleja el vínculo narrativo del hebreo sin añadir interpretación.
  - 'Los nombres propios se adaptan a la ortografía española habitual: Jeroboam, Joás.'
