translation:
  language: es
  text: 'Entonces le dijo a Guiezi, su siervo[a]: «Llama a esta sunamita». Y la llamó, y ella se presentó ante él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O simplemente, «esta sunamita». El hebreo la identifica por su procedencia; en español a veces se añade «mujer» por claridad, pero aquí no es necesario.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then he said
  chosen_spanish: Entonces le dijo
  alternatives_spanish:
  - Y le dijo
  - Luego le dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «entonces» conserva la secuencia y suena natural en español sin perder el valor narrativo.
- source_word: גֵּחֲזִי
  english_pob_choice: Gehazi
  chosen_spanish: Guiezi
  alternatives_spanish:
  - Gehazi
  lexicon: Convención de transliteración bíblica
  rationale: Se translitera el nombre propio al español con una forma clara y pronunciable; no se traduce.
- source_word: נַעֲרוֹ
  english_pob_choice: his servant
  chosen_spanish: su servidor
  alternatives_spanish:
  - su siervo
  - su criado
  - su joven
  lexicon: HALOT
  rationale: El término puede abarcar «joven», «sirviente» o «ayudante»; aquí expresa la relación de servicio de Guiezi. «Servidor» mantiene la función y evita una rusticidad innecesaria, aunque «siervo» también sería posible.
- source_word: קְרָא
  english_pob_choice: Call
  chosen_spanish: Llama
  alternatives_spanish:
  - Convoca
  - Haz venir
  lexicon: HALOT
  rationale: El imperativo comunica pedir la presencia de alguien; «llama» es la forma más directa y natural en español.
- source_word: לַשּׁוּנַמִּית הַזֹּאת
  english_pob_choice: this Shunammite woman
  chosen_spanish: a esta sunamita
  alternatives_spanish:
  - a esta sunamita mujer
  - a esta shunamita
  lexicon: HALOT
  rationale: El hebreo identifica a la mujer por su origen; en español basta «sunamita» para sustantivarla con naturalidad. Se conserva «esta» para reflejar el deíctico הַזֹּאת. Se omite «mujer» porque en español resulta redundante aquí.
- source_word: וַיִּקְרָא לָהּ
  english_pob_choice: So he called her
  chosen_spanish: Y él la llamó
  alternatives_spanish:
  - Entonces él la llamó
  - Y la llamó
  lexicon: HALOT
  rationale: Se mantiene la repetición del verbo para reflejar la obediencia inmediata de Guiezi; «la llamó» es la forma más simple y fiel.
- source_word: וַתַּעֲמֹד
  english_pob_choice: and she stood
  chosen_spanish: y ella se puso de pie
  alternatives_spanish:
  - y ella estuvo de pie
  - y ella se mantuvo de pie
  lexicon: HALOT
  rationale: En español, «se puso de pie» expresa con naturalidad el acto de levantarse/ponerse en posición de pie, sin añadir movimiento no explicitado de manera fuerte en el hebreo.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en su presencia
  lexicon: HALOT
  rationale: «Delante de él» reproduce bien la relación espacial inmediata y es plenamente idiomático en español; «ante él» también sería posible pero más formal.
translation_notes:
  revision_awareness: El texto base en inglés y la evaluación cruzada muestran alta concordancia y no requieren cambios sustanciales; se ha ajustado el registro al español bíblico moderno, manteniendo la secuencia narrativa y la designación étnica de la mujer sin sobreexplicación.
  spanish_consistency_notes:
  - Se conserva la progresión narrativa con «Entonces… Y…» para reflejar el encadenamiento verbal hebreo.
  - «Sunamita» se usa como sustantivo étnico, coherente con la identificación del hebreo.
  - Se evita «Señor»/«SEÑOR» porque el versículo no contiene el nombre divino ni un título teológico que requiera esa convención.
  - 'La frase final mantiene una colocación espacial simple y transparente: «delante de él».'
