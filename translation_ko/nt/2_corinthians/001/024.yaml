  lexicon: BDAG
  rationale: 바울의 정립 어휘. 「동역자」가 사역적 협력을 잘 담는다.
- source_word: πίστει ἑστήκατε
  english_pob_choice: stand firm by faith
  chosen_korean: 믿음으로 굳건히 서 있다
