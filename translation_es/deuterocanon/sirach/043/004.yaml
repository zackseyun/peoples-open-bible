translation:
  language: es
  text: Como un horno encendido por el calor,[a] el sol pone las montañas en llamas; con un resplandor estruendoso consume mientras sopla,[b] y su lámpara quema el ojo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo de esta parte del versículo es difícil y no coincide del todo con el griego en cada punto. La traducción sigue el hebreo conservado como base, con apoyo del paralelo griego para aclarar varias frases comprimidas o inciertas.
    reason: textual_variant
  - marker: b
    text: La cláusula central sigue una formulación tentativa basada en un hebreo oscuro. El paralelo griego habla de vapores ígneos y de rayos resplandecientes, pero el texto principal conserva la imagen más literal de una acción consumidora acompañada de soplo.
    reason: source_note
lexical_decisions:
- source_word: כור נפוח
  english_pob_choice: a blazing furnace
  chosen_spanish: un horno encendido
  alternatives_spanish:
  - un horno avivado
  - un horno soplado por fuelles
  lexicon: HALOT
  rationale: El hebreo presenta la imagen de un horno intensificado por el soplo. «Horno encendido» comunica bien la fuerza de la figura sin forzar un calco pesado en español.
- source_word: מחם מצוק / ἐν ἔργοις καύματος
  english_pob_choice: from scorching heat
  chosen_spanish: por el calor
  alternatives_spanish:
  - en el calor abrasador
  - por el ardor
  lexicon: HALOT; LSJ
  rationale: El hebreo y el griego son difíciles aquí; la idea segura es la del horno provocado o intensificado por el calor. «Por el calor» mantiene la relación causal sin sobreinterpretar la expresión.
- source_word: שולח שמש ידליק הרים / ἥλιος ἐκκαίων ὄρη
  english_pob_choice: the sun sets the mountains ablaze
  chosen_spanish: el sol pone las montañas en llamas
  alternatives_spanish:
  - el sol incendia las montañas
  - el sol abrasa los montes
  lexicon: HALOT; LSJ
  rationale: El hebreo y el griego coinciden en el sol como sujeto que prende/incendia los montes. «Pone ... en llamas» conserva el vigor imagético y suena natural en español.
- source_word: לשאון מאור / ἀτμίδας πυρώδεις ἐμφυσῶν / ἐκλάμπων ἀκτῖνας
  english_pob_choice: with a roaring light it consumes as it blows / flashing rays
  chosen_spanish: con un resplandor estruendoso sopla
  alternatives_spanish:
  - con una luz rugiente sopla
  - con un resplandor que truena sopla
  lexicon: HALOT; LSJ
  rationale: La frase hebrea es oscura y el griego aporta la imagen de vapores ígneos y rayos. Opté por una formulación que conserve el efecto sonoro-visivo sin añadir elementos ausentes del texto.
- source_word: ומנורה תכוה עין / ἀμαυροῖ ὀφθαλμούς
  english_pob_choice: it burns the eye / it dims the eyes
  chosen_spanish: su lámpara ciega los ojos
  alternatives_spanish:
  - su lámpara oscurece los ojos
  - su lámpara los deslumbra
  lexicon: HALOT; LSJ
  rationale: El hebreo habla de la acción de una lámpara sobre el ojo; el griego dice explícitamente que los ojos se oscurecen. «Ciega» refleja el efecto intensificado, aunque la base semántica admite también «oscurece».
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que los marcadores de nota [a] y [b] aparezcan exactamente en el texto español. Además, se ajustó el final para que la nota [b] corresponda a la frase oscura del segundo hemistiquio.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» fuera del versículo porque no aparece aquí.
  - Se prefirió un registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - «Lámpara» se conserva para respetar la imagen del hebreo y del griego, aunque en español pueda sonar personificada.
