translation:
  language: es
  text: los hijos de Ares[a], setecientos cincuenta y seis.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «Ares» y da el total como 756. El paralelo masorético aproximado en este punto difiere tanto en la designación del clan como en la suma.
    reason: textual_variant
lexical_decisions:
- source_word: υἱοὶ
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  lexicon: LSJ
  rationale: En una lista censal o genealógica, υἱοὶ funciona como fórmula de pertenencia grupal. «Los hijos de» mantiene la estructura formal sin sobreinterpretar el alcance como categoría genérica o abstracta.
- source_word: Ἀρές
  english_pob_choice: Ares
  chosen_spanish: Ares
  alternatives_spanish:
  - Hares
  - Harim (por alineación paralela)
  lexicon: LSJ
  rationale: El testimonio griego presenta un nombre propio que debe transliterarse. Se conserva «Ares» porque refleja directamente el texto base griego, sin armonizarlo con el paralelo masorético divergente.
- source_word: ἑπτακόσιοι πεντήκοντα ἕξ
  english_pob_choice: seven hundred fifty-six
  chosen_spanish: setecientos cincuenta y seis
  alternatives_spanish:
  - '756'
  - setecientos y cincuenta y seis
  lexicon: LSJ
  rationale: El número griego se vierte en palabras para una lectura natural y solemne en español, preservando exactamente el total indicado por el original.
theological_decisions:
- issue: Primacía del testimonio griego frente al paralelo masorético divergente en una lista censal
  english_pob_reading: 'Follow the Greek text''s clan name and number: ''Ares ... seven hundred fifty-six.'''
  chosen_spanish_reading: 'Seguir el nombre de clan y el número del griego: «Ares ... setecientos cincuenta y seis».'
  alternative_spanish_readings:
  - Una adaptación alineada con el paralelo hebreo daría otro nombre de familia y otro total.
  rationale: En 1 Esdras, el texto griego es el ancla principal. Como el paralelo masorético es aproximado y difiere de manera material, la traducción debe permanecer atada al griego y documentar la discrepancia, no resolverla por armonización.
  doctrine_reference: 'PHILOSOPHY.md: primacía del original para libros deuterocanónicos; los paralelos MT/WLC para 1 Esdras sirven como comprobación, no como control cuando divergen del griego.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español anclado al nombre propio correspondiente.
  spanish_consistency_notes:
  - Se conserva el orden breve y listístico del original griego.
  - Se mantiene la transliteración del nombre propio del testimonio primario.
  - El número se expresa en palabras por estilo publicable, sin alterar el total.
  - La nota textual queda anclada al nombre propio, evitando marcadores huérfanos.
