theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether בַטּוֹב should be made explicitly God-centered ('your goodness')
  chosen_reading: in goodness
  alternative_readings:
  - in your goodness
  rationale: The context is prayer to God, so 'your goodness' is interpretively attractive, but the Hebrew text does not explicitly include a possessive suffix. To preserve theological tension rather than resolve it, the main text keeps the broader 'goodness' and the more explicit reading is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
