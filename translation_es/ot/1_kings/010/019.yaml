translation:
  language: es
  text: El trono tenía seis escalones, y el trono tenía un remate redondeado[a] en su parte posterior, y apoyabrazos a uno y otro lado, junto al asiento[b], y dos leones de pie junto a los apoyabrazos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el trono tenía una parte superior redonda detrás de él». La frase hebrea es concisa y puede traducirse de manera más literal.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «el lugar de sentarse».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲלוֹת
  english_pob_choice: steps
  chosen_spanish: gradas
  alternatives_spanish:
  - escalones
  - peldaños
  - gradas
  lexicon: HALOT
  rationale: En el contexto de un trono, el término designa los peldaños o escalones de acceso. 'Gradas' conserva la imagen arquitectónica con un tono digno y natural en español bíblico moderno.
- source_word: לַכִּסֵּה
  english_pob_choice: the throne
  chosen_spanish: el trono
  alternatives_spanish:
  - para el trono
  - del trono
  lexicon: HALOT
  rationale: 'El prefijo ל aquí funciona dentro de la descripción del objeto; en español, la formulación natural y fiel es posesiva/descriptiva: ''el trono tenía''. Evita un giro forzado como ''para el trono''.'
- source_word: רֹאשׁ עָגֹל
  english_pob_choice: a rounded top
  chosen_spanish: un remate redondeado
  alternatives_spanish:
  - una parte superior redondeada
  - un tope redondo
  - un remate redondo
  lexicon: HALOT
  rationale: La combinación hebrea describe la parte superior de la estructura del trono. 'Remate redondeado' expresa bien la forma sin especificar indebidamente una pieza funcional como 'cabecera' o 'apoyacabezas'.
- source_word: מֵאַחֲרָיו
  english_pob_choice: at its back
  chosen_spanish: en su parte posterior
  alternatives_spanish:
  - detrás de él
  - en la parte de atrás
  lexicon: HALOT
  rationale: La frase localiza el remate redondeado en la zona trasera del trono. 'En su parte posterior' es claro, elegante y mantiene el valor locativo.
- source_word: יָדֹת
  english_pob_choice: armrests
  chosen_spanish: brazos
  alternatives_spanish:
  - apoyabrazos
  - reposabrazos
  - brazos laterales
  lexicon: HALOT
  rationale: En mobiliario/trono, la palabra apunta a los costados o brazos del asiento. 'Brazos' es fiel y más sobrio; 'apoyabrazos' explicita la función, pero resulta más técnico y menos bíblico.
- source_word: מִזֶּה וּמִזֶּה
  english_pob_choice: on this side and on that
  chosen_spanish: a uno y otro lado
  alternatives_spanish:
  - de este lado y de aquel
  - a ambos lados
  - por uno y otro lado
  lexicon: HALOT
  rationale: La expresión hebrea distribuye bilateralmente los elementos. 'A uno y otro lado' reproduce ese paralelismo de forma natural en español.
- source_word: אֶל מְקוֹם הַשָּׁבֶת
  english_pob_choice: beside the seat
  chosen_spanish: junto al lugar de sentarse
  alternatives_spanish:
  - junto al asiento
  - al lugar de sentarse
  - al sitio para sentarse
  lexicon: HALOT
  rationale: La frase hebrea es literalmente 'al lugar de sentarse'. Se conserva esa formulación porque la POB inglesa también mantuvo la idea del 'place of sitting'; en español suena un poco más explícita, pero sigue siendo fiel al valor lexical.
- source_word: אֲרָיוֹת
  english_pob_choice: lions
  chosen_spanish: leones
  alternatives_spanish:
  - leones
  - figuras de leones
  lexicon: HALOT
  rationale: El sustantivo designa leones; el contexto permite entender que son figuras o estatuas, pero el hebreo no lo dice de manera explícita, así que se mantiene el sustantivo simple.
- source_word: עֹמְדִים
  english_pob_choice: standing
  chosen_spanish: de pie
  alternatives_spanish:
  - estando de pie
  - parados
  lexicon: HALOT
  rationale: El participio describe una postura fija y visible. 'De pie' es natural en español y conserva la imagen estática.
- source_word: אֵצֶל הַיָּדוֹת
  english_pob_choice: beside the armrests
  chosen_spanish: junto a los brazos
  alternatives_spanish:
  - junto a los apoyabrazos
  - al lado de los brazos
  lexicon: HALOT
  rationale: Se mantiene la correspondencia con יָדֹת como 'brazos' en el mismo versículo. La repetición favorece la coherencia terminológica y la lectura fluida.
theological_decisions:
- issue: Terminología del trono como objeto regio concreto, no alegoría
  english_pob_reading: A literal description of Solomon’s throne with architectural details
  chosen_spanish_reading: Descripción literal del trono con detalles arquitectónicos y decorativos
  alternative_spanish_readings:
  - Lectura simbólica del trono
  - Paráfrasis ornamental
  rationale: No hay indicio en el texto de que el trono sea metáfora; la traducción conserva el carácter material y descriptivo del pasaje.
  doctrine_reference: Narrative literal sense; no special doctrinal issue
translation_notes:
  revision_awareness: 'Se siguió el acuerdo alto del audit trail inglés sin cambios sustanciales. Se mantuvo la equivalencia óptima: conservar la imagen hebrea, pero con español idiomático y digno. No se introdujeron revisiones adicionales respecto del texto base auditado.'
  spanish_consistency_notes:
  - Se mantiene 'trono' para לַכִּסֵּה en todo el versículo.
  - Se usa 'brazos' para יָדֹת de forma consistente en ambas ocurrencias.
  - Se preserva la locución distributiva 'a uno y otro lado' para מִזֶּה וּמִזֶּה.
  - Las notas a pie de página se limitan a las alternativas lexicales explícitas en el audit trail.
