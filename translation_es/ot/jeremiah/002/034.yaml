base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/002/034.yaml
  text: Even on your skirts is found the blood of the lives of innocent poor people[a]. I did not find them in a break-in[c][b], but on account of all these things.
  footnotes:
  - marker: a
    text: Or 'on the hems of your garment'; literally 'in/on your wings.'
    reason: lexical_alternative
  - marker: b
    text: '''In a break-in'' translates a term for a burglary accomplished by digging through a wall; compare the legal background in Exodus 22:2.'
    reason: cross_reference
  - marker: c
    text: The Hebrew of the final clause is elliptical and difficult; alternatively, 'not because I found them breaking in, but for all these things.'
    reason: alternative_reading
