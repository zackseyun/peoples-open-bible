base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/004/001.yaml
  text: And the word of Samuel came to all Israel[a]. Then Israel went out to meet the Philistines in battle, and they camped at Ebenezer[b], while the Philistines camped at Aphek.
  footnotes:
  - marker: a
    text: Or 'the report of Samuel came to all Israel.' The Hebrew can be understood as Samuel's word/message, and in context likely refers to his prophetic word.
    reason: alternative_reading
  - marker: b
    text: Ebenezer means 'stone of help.' Here it functions as a place name.
    reason: lexical_alternative
