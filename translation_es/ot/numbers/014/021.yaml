translation:
  language: es
  text: Pero, tan cierto como que yo vivo,[a] la gloria de Yahvé llenará toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo el país», si se toma אֶרֶץ en un sentido más local o territorial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אוּלָם
  english_pob_choice: But
  chosen_spanish: Pero, en verdad
  alternatives_spanish:
  - Pero
  - Sin embargo
  - No obstante
  lexicon: HALOT
  rationale: El hebreo introduce un contraste enfático. «Pero» conserva la oposición; añadir «en verdad» refleja la fuerza solemne y enfática del giro hebreo sin volverlo rígido en español.
- source_word: חַי אָ֑נִי
  english_pob_choice: as I live
  chosen_spanish: vivo yo
  alternatives_spanish:
  - como yo vivo
  - por mi vida
  - vivo
  lexicon: HALOT
  rationale: La fórmula es un juramento divino idiomático. En español, «vivo yo» mantiene la fuerza del juramento con un orden natural y solemne; el sentido equivalente a «as I live» queda preservado en el contexto de la afirmación divina.
- source_word: וְ/יִמָּלֵ֥א
  english_pob_choice: will fill
  chosen_spanish: llenará
  alternatives_spanish:
  - será llena
  - se llenará
  - llenará de
  lexicon: HALOT
  rationale: El verbo nifal admite lectura pasiva o resultativa. Dado que el sujeto gramatical es «la gloria de Yahvé», «llenará» expresa con claridad en español que esa gloria abarcará toda la tierra, sin forzar una pasiva poco natural.
- source_word: כְבוֹד
  english_pob_choice: glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el honor
  - la majestad
  lexicon: HALOT
  rationale: «Gloria» es el equivalente teológico normal y más fiel para כָּבוֹד cuando se refiere a Yahvé, conservando el peso de presencia y esplendor divinos.
- source_word: יְהוָ֖ה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el nombre divino: «Yahvé» en el texto principal, en lugar de una sustitución reverencial.'
- source_word: הָ/אָֽרֶץ
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra
  - toda la región
  - todo el país
  lexicon: HALOT
  rationale: La POB inglesa opta por la amplitud universal de «earth». En español, «toda la tierra» conserva esa extensión total; no se resuelve la tensión posible con «la tierra» como territorio local, sino que se mantiene la lectura amplia.
theological_decisions:
- issue: Alcance de הָאָרֶץ
  english_pob_reading: universal scope ('all the earth')
  chosen_spanish_reading: alcance universal («toda la tierra»)
  alternative_spanish_readings:
  - alcance local («toda la tierra/país» en sentido territorial)
  - «toda la tierra» con posible referencia regional
  rationale: El contexto y la fórmula solemne favorecen una declaración de alcance amplio. La traducción española conserva esa amplitud sin negar que el hebreo puede, en otros contextos, significar territorio o región.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El texto base inglés y la revisión más reciente coinciden: no hubo cambios aplicados. Se mantuvo la decisión sobre el alcance amplio de אֶרֶץ y la formulación solemne del juramento divino.'
  spanish_consistency_notes:
  - Se usó «Yahvé» según la terminología del proyecto, no «SEÑOR».
  - Se conservó el registro solemne sin arcaísmos innecesarios.
  - «Toda la tierra» deja abierta, en nota, la alternativa territorial que el hebreo permite en otros contextos.
