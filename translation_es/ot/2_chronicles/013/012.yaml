base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/013/012.yaml
  text: And behold[a], God is with us at our head, and his priests with the trumpets for sounding the battle cry against you. Sons of Israel, do not fight against Yahweh, the God of your fathers, for you will not succeed.
  footnotes:
