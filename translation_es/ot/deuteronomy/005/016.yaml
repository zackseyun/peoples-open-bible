review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo en la mayor parte: «Honra», «tu padre y tu madre», «Yahvé tu Dios», la doble finalidad con «para que», y la promesa de larga vida y bienestar en la tierra. Sin embargo, los dos pies de nota están anclados en lugares equivocados respecto de las alternativas documentadas en el POB en inglés: [a] corresponde a «y para que te vaya bien», no a «tu madre»; y [b] corresponde a «sobre la tierra», no a «te lo mandó».'
  spanish_quality_summary: El español es claro, natural y digno. «Honra a tu padre y a tu madre» y «para que te vaya bien» suenan bien en español bíblico contemporáneo. «Como Yahvé tu Dios te lo mandó» es aceptable, aunque «te mandó» también bastaría. «Sobre la tierra» es defendible por fidelidad a עַל, aunque en español suena un poco menos natural que «en la tierra»; dado el criterio del POB, puede conservarse.
  glossary_alignment: 'Alinea correctamente con la terminología del proyecto: יְהוָה → «Yahvé», אֱלֹהֶיךָ → «tu Dios». No hay conflicto con otros términos doctrinales. La decisión de mantener «sobre la tierra» sigue la racionalidad documentada del inglés para עַל הָאֲדָמָה.'
  issues:
  - severity: medium
    issue: Los pies de nota [a] y [b] están colocados en frases equivocadas.
    rationale: La nota [a] ofrece la alternativa de «y para que te vaya bien», por lo que debe anclarse en esa cláusula, no en «tu madre». La nota [b] ofrece la alternativa «en la tierra...», por lo que debe anclarse en «sobre la tierra», no en «te lo mandó». Esto afecta la fidelidad al rastro de auditoría del POB y la utilidad de las notas.
  - severity: low
    issue: La alternativa de la nota [a] repite exactamente el texto principal.
    rationale: En inglés, la nota alternativa era para «that it may be well with you» frente al texto principal «it may go well for you». En español, «te vaya bien» y «te sea bien» no son equivalentes igualmente naturales. Conviene ajustar la nota a una alternativa española real, como «para que te sea bien», aunque suene más formal, para preservar la distinción léxica documentada.
  revised_spanish_text: Honra a tu padre y a tu madre, como Yahvé tu Dios te lo mandó, para que tus días se prolonguen y para que te vaya bien[a] sobre la tierra[b] que Yahvé tu Dios te da.
  revised_footnotes:
  - marker: a
    text: 'O: «para que te sea bien».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en la tierra que Yahvé tu Dios te da».'
    reason: lexical_alternative
  revision_rationale: Se corrigen los anclajes de las notas para que correspondan a las alternativas reales del inglés auditado y se ajusta la nota [a] para que ofrezca una alternativa española distinta del texto principal. El resto del versículo puede mantenerse, pues preserva adecuadamente el sentido del hebreo, la terminología del proyecto y la legibilidad en español.
