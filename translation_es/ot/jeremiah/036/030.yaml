    rationale: Según la disciplina requerida, el marcador debe aparecer en la palabra o frase relevante. La nota lexical alternativa corresponde a «calor», no a «cadáver».
  - severity: low
    issue: La nota a es innecesariamente expansiva
    rationale: La alternativa dinámica sobre sucesión dinástica ya está implícita en la racionalidad léxica; basta una nota breve si se conserva. Puede mantenerse, pero conviene simplificar para legibilidad.
