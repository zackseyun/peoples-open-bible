revisions:
- from: Como nieve en verano y como lluvia en la cosecha[a], así el honor no es apropiado para un necio.
  to: Como nieve en verano y como lluvia en tiempo de cosecha[a], así el honor no conviene a un necio.
  rationale: Se ajusta «en la cosecha» a «en tiempo de cosecha» para reflejar mejor el valor temporal del hebreo y mejorar la naturalidad. También se cambia «no es apropiado para un necio» por «no conviene a un necio», que expresa con más fuerza proverbial el sentido de נָאוֶה y armoniza mejor con la alternativa auditada en inglés. Se conserva la estructura comparativa y la terminología clave «honor» y «necio».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:29:25Z'
