revisions:
- from: Y sucederá que el que quede en Sion y el que sea dejado en Jerusalén será llamado santo[a][b]—todo el que esté registrado para vida en Jerusalén.
  to: 'Y sucederá que el que quede en Sion y el que quede en Jerusalén será llamado santo: todo el que esté inscrito para vida[a][b] en Jerusalén.'
  rationale: Se corrigió la ubicación de las notas para anclarlas a la frase pertinente. Se reemplazó «sea dejado» por «quede» para un español más natural sin perder la idea de remanente. Se ajustó «registrado» a «inscrito» por mayor fluidez y mejor conexión con el participio «escrito» de la nota alternativa. También se sustituyó la raya por dos puntos, que aquí fluye mejor en español para introducir la aposición explicativa.
