lexical_decisions:
- source_word: וּ/בִ/בְתוּאֵל
  english_pob_choice: and in Bethuel
  chosen_spanish: y en Bethuel
  alternatives_spanish:
  - y en Betuel
  - y en Bethuel
  lexicon: HALOT
  rationale: La construcción repetida ו + ב se conserva naturalmente en español como «y en» para mantener la lista de localidades. El nombre propio se translitera como Bethuel/Betuel; se elige «Bethuel» para seguir la forma más cercana al patrón inglés auditado y mantener estabilidad toponímica.
- source_word: וּ/בְ/חָרְמָה
  english_pob_choice: and in Hormah
  chosen_spanish: y en Horma
  alternatives_spanish:
  - y en Hormah
  lexicon: HALOT
  rationale: Se mantiene el valor locativo de ב como «en». El topónimo se adapta a la forma española habitual de transliteración bíblica, «Horma», sin alterar la referencia geográfica.
- source_word: וּ/בְ/צִֽיקְלָֽג
  english_pob_choice: and in Ziklag
  chosen_spanish: y en Ziklag
  alternatives_spanish:
  - y en Siclag
  lexicon: HALOT
  rationale: Se conserva la estructura enumerativa con «y en». Para צִקְלָג se usa «Ziklag» siguiendo la convención del audit trail inglés y por reconocimiento bíblico amplio; «Siclag» sería una adaptación española posible, pero menos alineada con la forma auditada.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran una lista simple de localidades sin variantes textuales ni tensiones léxicas relevantes; por eso no se añaden notas textuales o teológicas. La revisión más reciente indica que no hubo cambios necesarios y el cotejo fue de alta concordancia.
  spanish_consistency_notes:
  - Se preserva la repetición de la preposición locativa para reflejar la cadencia del hebreo y del inglés auditado.
  - Se mantienen los topónimos como nombres propios transliterados, sin explicaciones añadidas en el cuerpo del texto.
  - No se introduce puntuación adicional que altere el carácter de enumeración breve del versículo.
