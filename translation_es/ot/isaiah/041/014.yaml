    issue: «gusanillo de Jacob» suaviza demasiado תּוֹלַעַת יַעֲקֹב
    rationale: El hebreo y el English POB conservan una metáfora dura de debilidad y bajeza. «Gusanillo» introduce diminutivo afectivo/atenuante no presente en la fuente y reduce la fuerza retórica.
  - severity: medium
    issue: Los marcadores de notas no corresponden al mismo contenido que en el texto
    rationale: En el borrador, [a] está anclado a «gusanillo» pero la nota a del English POB trata «men of Israel»; [b] y [c] también aparecen invertidos respecto de sus temas. Aunque no hace falta copiar el orden inglés, sí hace falta que cada marcador en español corresponda al lugar y contenido correctos.
  - severity: low
    issue: La construcción «gusano de Jacob» es más natural y fiel que «gusanillo de Jacob» para un registro bíblico digno
    rationale: Mantiene la metáfora sin paráfrasis ni tono coloquial excesivo, y evita una sensación de suavización estilística.
