translation:
  language: es
  text: Menelao nos informó que ustedes desean, después de descender, volver a sus asuntos.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Menelao nos informó que ustedes desean, después de descender, estar con los suyos». La frase griega «πρὸς τοῖς ἰδίοις» puede referirse a los propios asuntos, o también a la propia gente o pertenencias; por eso se conserva esta alternativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνεφάνισεν
  english_pob_choice: informed
  chosen_spanish: nos informó
  alternatives_spanish:
  - nos hizo saber
  - nos comunicó
  - nos reportó
  lexicon: LSJ
  rationale: El verbo expresa dar a conocer o informar; «nos informó» conserva el tono formal y administrativo del contexto sin sobretraducción.
- source_word: βουλόμενος
  english_pob_choice: wish
  chosen_spanish: desean
  alternatives_spanish:
  - quieren
  - intentan
  - desean
  lexicon: LSJ
  rationale: El participio expresa voluntad. En español, «desean» mantiene un registro respetuoso y formal, cercano al matiz de «wish» del POB inglés.
- source_word: κατελθόντας
  english_pob_choice: after coming down
  chosen_spanish: después de bajar
  alternatives_spanish:
  - cuando bajen
  - habiendo bajado
  - tras bajar
  lexicon: LSJ
  rationale: El participio aoristo tiene valor temporal. «Después de bajar» preserva la relación temporal sin añadir una localización explícita que el griego no especifica.
- source_word: γίνεσθαι πρὸς τοῖς ἰδίοις
  english_pob_choice: to return to your own affairs
  chosen_spanish: volver a sus propios asuntos
  alternatives_spanish:
  - volver a lo suyo
  - volver a sus ocupaciones
  - estar entre los suyos
  lexicon: LSJ
  rationale: La frase es idiomática y ambigua. Dado el historial inglés del POB y la revisión que favoreció «return to your own affairs», «volver a sus propios asuntos» reproduce bien la idea de regresar a las propias ocupaciones/intereses sin fijar indebidamente el referente.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - vos
  - los
  lexicon: LSJ
  rationale: El plural de segunda persona se expresa naturalmente en español con «ustedes» para un registro neutral y ampliamente comprensible.
- source_word: Μενέλαος
  english_pob_choice: Menelaus
  chosen_spanish: Menelao
  alternatives_spanish:
  - Menelaus
  lexicon: transliteration
  rationale: Nombre propio transliterado conforme al uso español y la política del proyecto.
translation_notes:
  revision_awareness: El inglés POB pasó de «to attend to your own affairs» a «to return to your own affairs» para reflejar mejor πρὸς τοῖς ἰδίοις. La versión española sigue esa revisión con «volver a sus propios asuntos», manteniendo la ambigüedad útil del sintagma griego y evitando precisar más de lo que el texto permite.
  spanish_consistency_notes:
  - Se usa «ustedes» para el plural de segunda persona como forma neutral.
  - «Menelao» se mantiene como nombre propio transliterado.
  - «sus propios asuntos» conserva la preferencia del POB por una lectura concreta, pero la nota preserva la alternativa de «su propia gente».
