translation:
  language: es
  text: Cuando los impíos brotan como la hierba y florecen todos los que hacen el mal[a], es para que sean destruidos para siempre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «florecen todos los hacedores de maldad»; hebreo literalmente, «todos los trabajadores/hacedores de maldad».
    reason: lexical_alternative
  - marker: b
    text: O «para su destrucción para siempre» o «solo para ser destruidos para siempre».
    reason: alternative_reading
lexical_decisions:
- source_word: בִּ/פְרֹחַ
  english_pob_choice: When ... sprout
  chosen_spanish: Cuando ... brotan
  alternatives_spanish:
  - Al brotar
  - En el brotar de
  lexicon: HALOT
  rationale: El infinitivo con ב expresa circunstancia temporal. «Cuando ... brotan» comunica de manera natural esa relación temporal en español y conserva la imagen vegetal de crecimiento súbito.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  lexicon: HALOT
  rationale: Es un plural sustantivado de valor colectivo para personas impías. «Impíos» es breve, idiomático y apto para registro bíblico contemporáneo sin perder la fuerza moral del término.
- source_word: כְּמ֥וֹ עֵשֶׂב
  english_pob_choice: like grass
  chosen_spanish: como hierba
  alternatives_spanish:
  - como pasto
  - como vegetación
  lexicon: HALOT
  rationale: עֵשֶׂב puede abarcar hierba/herbage. «Hierba» funciona de modo natural en español y preserva la imagen de crecimiento rápido y frágil; se evita una glosa más técnica que sonaría menos directa.
- source_word: וַ֭/יָּצִיצוּ
  english_pob_choice: flourish
  chosen_spanish: florecen
  alternatives_spanish:
  - brotan
  - prosperan
  - rebrotan
  lexicon: HALOT
  rationale: El verbo tiene sentido de brotar/florecer. «Florecen» mantiene la metáfora vegetal del paralelo y sugiere prosperidad visible, como en el audit trail inglés, sin forzar un sentido abstracto.
- source_word: כָּל פֹּ֣עֲלֵי אָ֑וֶן
  english_pob_choice: all workers of wickedness
  chosen_spanish: todos los que hacen el mal
  alternatives_spanish:
  - todos los obreros de la iniquidad
  - todos los hacedores de maldad
  - todos los malhechores
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «los que trabajan/hacen iniquidad». En español, «los que hacen el mal» conserva la transparencia semántica y suena más natural que un calco como «obreros de la iniquidad», que resultaría artificial para la lectura pública.
- source_word: לְ/הִשָּֽׁמְדָ֥/ם
  english_pob_choice: it is so that they may be destroyed
  chosen_spanish: es para que sean destruidos
  alternatives_spanish:
  - para su destrucción
  - a fin de que sean destruidos
  - solo para ser destruidos
  lexicon: HALOT
  rationale: El nifal con sufijo expresa finalidad o resultado con pasivo. «Es para que sean destruidos» preserva esa fuerza teleológica y la pasividad sin introducir un sujeto explícito que el hebreo no formula.
- source_word: עֲדֵי עַד
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  - para siempre jamás
  lexicon: HALOT
  rationale: La expresión idiomática comunica perpetuidad duradera. «Para siempre» es la forma más clara y sobria en español contemporáneo.
theological_decisions:
- issue: Relación entre el florecimiento de los impíos y su destrucción final
  english_pob_reading: 'The clause לְהִשָּׁמְדָם is rendered with explicit result/purpose force: ''it is so that they may be destroyed forever.'''
  chosen_spanish_reading: «es para que sean destruidos para siempre»
  alternative_spanish_readings:
  - «para su destrucción para siempre»
  - «solo para ser destruidos para siempre»
  rationale: La línea no solo observa prosperidad temporal; la vincula con un desenlace de juicio. La traducción mantiene esa tensión sin añadir una causalidad teológica más fuerte que la del hebreo, y sin convertirla en mera ironía.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se requieren cambios adicionales. Se mantuvo alta concordancia con el audit trail inglés y con la lectura hebrea del paralelismo vegetal y del propósito/resultante de destrucción.'
  spanish_consistency_notes:
  - Se mantuvo «impíos» para רְשָׁעִים y «hacen el mal» para פֹּעֲלֵי אָוֶן por coherencia con el registro bíblico y la transparencia semántica.
  - Se preservó la metáfora vegetal con «brotan» / «florecen» en paralelo, evitando sustituirla por un abstracto como «prosperan» que debilitaría la imagen.
  - «Para siempre» traduce el modismo עֲדֵי עַד con una forma natural en español, sin perder el valor de perpetuidad.
