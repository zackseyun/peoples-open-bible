  to: El Espíritu del Señor Dios Yahvé está sobre mí, porque Yahvé me ha ungido para anunciar buenas nuevas a los humildes[a]; me ha enviado a vendar a los quebrantados de corazón, a proclamar libertad a los cautivos y apertura de la prisión a los atados[b].
  rationale: Se corrigió el anclaje de la nota léxica para que recaiga sobre 'los humildes', se ajustó la locución divina a 'el Señor Dios Yahvé' para reflejar con más claridad אֲדֹנָי יְהוִה dentro de la política del proyecto, se mejoró la naturalidad de 'apertura de prisión' a 'apertura de la prisión' y se limpió la puntuación editorial de la nota [b].
