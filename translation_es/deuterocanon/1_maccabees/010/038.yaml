revisions:
- from: Y los tres distritos añadidos a Judá desde el territorio de Samaria[a], sean incorporados a Judá, para ser considerados como uno[b], para no obedecer a otra autoridad sino a la del sumo sacerdote.
  to: Y los tres distritos añadidos a Judá del territorio de Samaria[a], sean incorporados a Judá, para ser considerados como una sola unidad[b], para no obedecer a ninguna otra autoridad sino a la del sumo sacerdote.
  rationale: 'Se hicieron ajustes menores para mejorar fidelidad y naturalidad en español: ''del territorio de Samaria'' refleja mejor ἀπὸ τῆς χώρας Σαμαρίας; ''como una sola unidad'' expresa con más claridad e idiomaticidad el sentido administrativo de τοῦ γενέσθαι ὑφʼ ἕνα, ya preservado en la nota. También se pulió la redacción de la nota b.'
