translation:
  language: es
  text: Entonces tomarás un poco de la sangre que está sobre el altar y un poco del aceite de la unción[a], y lo rociarás sobre Aarón, sobre sus vestiduras, sobre sus hijos y sobre las vestiduras de sus hijos con él; y él y sus vestiduras serán santos, y sus hijos y las vestiduras de sus hijos con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'quedarán consagrados'. El hebreo dice literalmente 'serán santos', expresando el estado resultante de santificación después de la acción ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתָּ
  english_pob_choice: you shall take
  chosen_spanish: tomarás
  alternatives_spanish:
  - deberás tomar
  - tomarás parte de
  lexicon: HALOT
  rationale: En español, el futuro con valor exhortativo o instruccional expresa bien la secuencia ritual. En contexto, 'tomarás' mantiene la fuerza procedimental sin volver la frase pesada. La adición de 'parte de' sigue la decisión de מִן como porción, no simple procedencia.
- source_word: מִן הַדָּם אֲשֶׁר עַל הַמִּזְבֵּחַ
  english_pob_choice: some of the blood that is on the altar
  chosen_spanish: parte de la sangre que está sobre el altar
  alternatives_spanish:
  - de la sangre que está sobre el altar
  - algo de la sangre que está sobre el altar
  lexicon: HALOT
  rationale: '''Parte de'' comunica de forma natural el matiz partitivo de מִן. ''La sangre que está sobre el altar'' preserva la cláusula relativa sin forzar un calco. Se evita omitir la localización del altar, que pertenece al rito.'
- source_word: שֶׁמֶן הַמִּשְׁחָה
  english_pob_choice: the anointing oil
  chosen_spanish: aceite de la unción
  alternatives_spanish:
  - el aceite de la unción
  - el aceite para la unción
  lexicon: HALOT
  rationale: '''Aceite de la unción'' reproduce el constructo de manera clara y respetuosa con el lenguaje cultual. Se mantiene ''unción'' como sustantivo ritual, sin sustituirlo por un término más interpretativo.'
- source_word: וְהִזֵּיתָ
  english_pob_choice: sprinkle it
  chosen_spanish: lo rociarás
  alternatives_spanish:
  - lo asperjarás
  - lo salpicarás
  lexicon: HALOT
  rationale: En español, 'rociar' transmite bien el acto cultual de dispersar un líquido sobre personas y objetos, con registro digno y comprensible. 'Asperjar' sería más técnico y menos transparente para lectores generales; 'salpicar' suena demasiado coloquial.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - en
  lexicon: HALOT
  rationale: '''Sobre'' conserva el valor locativo repetido del hebreo y funciona bien con la repetición ritual del versículo. Evita ambigüedad y mantiene el paralelismo.'
- source_word: בְּגָדָיו / בִּגְדֵי בָנָיו
  english_pob_choice: his garments / the garments of his sons
  chosen_spanish: sus vestiduras / las vestiduras de sus hijos
  alternatives_spanish:
  - sus prendas / las prendas de sus hijos
  - sus ropas / las ropas de sus hijos
  lexicon: HALOT
  rationale: '''Vestiduras'' es apropiado en el contexto sacerdotal y conserva un tono digno. Se eligió ''hijos'' en lugar de ''hijos varones'' porque el texto hebreo ya es masculino plural y el contexto sacerdotal lo hace claro; en español, ''hijos'' es suficiente y natural.'
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus descendientes
  lexicon: HALOT
  rationale: El hebreo se refiere a los hijos varones de Aarón en el contexto sacerdotal. 'Sus hijos' es la forma más natural en español y mantiene la referencia familiar sin introducir una glosa innecesaria.
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - con Aarón
  lexicon: HALOT
  rationale: '''Con él'' reproduce la relación sintáctica simple del hebreo y mantiene la referencia a Aarón sin sobreexplicación. En español, la repetición final conserva el cierre rítmico del original.'
- source_word: וְקָדַשׁ
  english_pob_choice: shall be holy
  chosen_spanish: serán santos
  alternatives_spanish:
  - quedarán santificados
  - serán consagrados
  lexicon: HALOT
  rationale: Se conserva la categoría bíblica de קדשׁ con 'santos', que en español comunica el estado resultante del rito. 'Consagrados' es posible, pero desplaza el énfasis desde la condición de santidad hacia un término más técnico; 'santos' mantiene la literalidad funcional del texto.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - Aarón
  lexicon: HALOT
  rationale: Se mantiene el pronombre para respetar la estructura hebrea, donde la referencia ya es evidente. Esto evita redundancia innecesaria en español.
theological_decisions:
- issue: Cómo expresar el resultado de la aspersión ritual
  english_pob_reading: shall be holy
  chosen_spanish_reading: serán santos
  alternative_spanish_readings:
  - serán consagrados
  - quedarán santificados
  rationale: La lectura inglesa conserva el término 'holy' para no sustituirlo por una explicación técnica. En español, 'santos' preserva esa misma categoría bíblica y el efecto de estado resultante tras la acción ritual, sin añadir matiz doctrinal externo.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se siguió el estado más reciente del texto fuente sin aplicar revisiones adicionales; el acuerdo auditado indica alta concordancia y no se documentan cambios pendientes.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como convención del proyecto cuando corresponda; en este versículo no aparece el nombre divino.
  - Se evitó 'SEÑOR' y también terminología eclesiástica posterior como 'ornamentos' o 'sotanas'; 'vestiduras' preserva el registro sacerdotal del hebreo.
  - Se conservó la repetición de 'sobre' y 'con él' para reflejar el patrón enumerativo del hebreo.
  - '''Santos'' se usó como estado resultante, no como afirmación de mérito moral.'
