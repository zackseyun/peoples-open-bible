translation:
  language: es
  text: 'Porque ustedes han dicho[a]: «Yahvé ha levantado para nosotros profetas en Babilonia»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Porque ustedes dijeron»; o «Yahvé ha designado profetas para nosotros en Babilonia».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la razón del juicio o respuesta divina en el contexto inmediato. «Porque» expresa con naturalidad esa relación causal en español y conserva el valor explicativo del hebreo.
- source_word: אֲמַרְתֶּם
  english_pob_choice: you have said
  chosen_spanish: han dicho
  alternatives_spanish:
  - dijeron
  - ustedes dijeron
  lexicon: HALOT
  rationale: El qatal 2mp reporta una afirmación previa del interlocutor. En español, el presente perfecto mantiene mejor la conexión discursiva con la respuesta profética; «ustedes» puede inferirse del contexto y se evita la repetición pesada.
- source_word: הֵקִים
  english_pob_choice: has raised up
  chosen_spanish: ha levantado
  alternatives_spanish:
  - ha alzado
  - ha establecido
  - ha नियुक्तado
  lexicon: HALOT
  rationale: El hiphil de קום puede expresar el acto de suscitar o levantar a alguien para una función. «Ha levantado» preserva la imagen bíblica de Dios suscitando profetas y evita reducir de antemano el matiz a mera designación administrativa.
- source_word: לָנוּ
  english_pob_choice: for us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - a nosotros
  - en favor de nosotros
  lexicon: HALOT
  rationale: La preposición ל con pronombre aquí expresa beneficio o provisión. «Para nosotros» comunica bien esa idea en español con una sintaxis natural al hablar de profetas dados por Dios.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino como «Yahvé», conforme al criterio del proyecto para יְהוָה, en lugar de sustituirlo por un título como «el SEÑOR».
- source_word: נְבִאִים
  english_pob_choice: prophets
  chosen_spanish: profetas
  alternatives_spanish:
  - portavoces proféticos
  lexicon: HALOT
  rationale: Plural directo de נביא. «Profetas» es el equivalente transparente y estándar en español, sin perder el sentido de personas reconocidas como voceros de Dios.
- source_word: בָּבֶלָה
  english_pob_choice: in Babylon
  chosen_spanish: en Babilonia
  alternatives_spanish:
  - en la Babilonia
  lexicon: HALOT
  rationale: La forma locativa/direccional con Babilonia se expresa naturalmente en español como «en Babilonia», manteniendo el valor locativo del hebreo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se mantiene el nombre propio divino «Yahvé» para preservar la referencia personal del pacto, en línea con la política del proyecto y sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of הֵקִים with prophets
  english_pob_reading: has raised up
  chosen_spanish_reading: ha levantado
  alternative_spanish_readings:
  - ha suscitado
  - ha nombrado
  rationale: En este contexto, el verbo describe a Dios como quien hace surgir o suscita profetas. «Ha levantado» conserva esa fuerza bíblica sin volverlo meramente administrativo; «ha nombrado» sería más estrecho y menos imagético.
  doctrine_reference: HALOT, entry for קום (hiphil), with contextual use in prophetic commissioning
translation_notes:
  revision_awareness: El contexto de revisión indica alta concordancia y ningún cambio pendiente; por eso el borrador conserva la estructura y las decisiones clave del POB en inglés, adaptándolas fielmente al español con el mismo perfil lexical y teológico.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «profetas» para נְבִאִים, sin suavizar el término.
  - «Han dicho» conserva el valor de cita reportada del hebreo y evita una paráfrasis más libre.
  - La puntuación de la cita y el orden general siguen la sintaxis natural del español, sin perder la relación causal del verso.
