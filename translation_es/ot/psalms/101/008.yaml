  text: לַ/בְּקָרִ֗ים אַצְמִ֥ית כָּל רִשְׁעֵי אָ֑רֶץ לְ/הַכְרִ֥ית מֵֽ/עִיר יְ֝הוָ֗ה כָּל פֹּ֥עֲלֵי אָֽוֶן־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/101/008.yaml
  text: Morning by morning I will destroy all the wicked of the land[b][a], cutting off from the city of Yahweh all workers of iniquity.
  footnotes:
