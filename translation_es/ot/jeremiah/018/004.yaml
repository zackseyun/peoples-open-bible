translation:
  language: es
  text: Y la vasija que él estaba haciendo de barro se echó a perder en la mano del alfarero[a]; y volvió e hizo de ella otra vasija[b], como le pareció bien al alfarero hacerlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se arruinó» o «quedó malograda». El verbo hebreo indica que la pieza quedó defectuosa mientras era trabajada.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «como le pareció recto al alfarero hacer». Es un modismo que significa «como el alfarero vio conveniente hacerlo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִשְׁחַת
  english_pob_choice: was spoiled
  chosen_spanish: se echó a perder
  alternatives_spanish:
  - se arruinó
  - se echó a perder
  lexicon: HALOT
  rationale: El nifal expresa que el objeto quedó defectuoso o inutilizable durante el proceso. En español, 'se echó a perder' comunica bien el resultado pasivo sin volverlo demasiado técnico ni elevarlo a una interpretación moral.
- source_word: הַכְּלִי
  english_pob_choice: the vessel
  chosen_spanish: el vaso
  alternatives_spanish:
  - el recipiente
  - el utensilio
  lexicon: HALOT
  rationale: En el contexto de alfarería, 'vaso' en español puede referirse de manera amplia a una pieza hecha por el alfarero; mantiene una imagen concreta y natural. 'Recipiente' es posible, pero menos pictórico.
- source_word: עֹשֶׂה
  english_pob_choice: was making
  chosen_spanish: estaba haciendo
  alternatives_spanish:
  - hacía
  - estaba modelando
  lexicon: HALOT
  rationale: El participio con valor progresivo indica acción en curso. 'Estaba haciendo' refleja mejor ese proceso que un pretérito simple.
- source_word: בַּחֹמֶר
  english_pob_choice: from the clay
  chosen_spanish: de barro
  alternatives_spanish:
  - de arcilla
  - con barro
  lexicon: HALOT
  rationale: '''Barro'' es natural y claro para la imagen del alfarero en español. ''Arcilla'' es más técnico; ambas son viables, pero ''barro'' conserva mejor el registro bíblico y comprensible.'
- source_word: בְּיַד הַיּוֹצֵר
  english_pob_choice: in the potter’s hand
  chosen_spanish: en la mano del alfarero
  alternatives_spanish:
  - en la mano del que lo hace
  - en la mano del alfarero
  lexicon: HALOT
  rationale: La expresión literal conserva la imagen de control directo. 'Mano del alfarero' es transparente y corresponde bien al hebreo.
- source_word: הַיּוֹצֵר
  english_pob_choice: the potter
  chosen_spanish: el alfarero
  alternatives_spanish:
  - el modelador
  - el que forma
  lexicon: HALOT
  rationale: En este contexto concreto, יֹצֵר significa sin duda 'alfarero'. Es la opción más exacta y natural en español.
- source_word: וְשָׁב
  english_pob_choice: and he turned
  chosen_spanish: y volvió
  alternatives_spanish:
  - y se volvió
  - y regresó
  lexicon: HALOT
  rationale: Aquí שׁוּב expresa retomó la acción o se volvió de nuevo a trabajar la pieza. 'Y volvió' conserva la simpleza del hebreo sin cargarlo de matices ajenos.
- source_word: וַיַּעֲשֵׂהוּ
  english_pob_choice: made it into
  chosen_spanish: lo hizo en
  alternatives_spanish:
  - lo rehizo como
  - lo convirtió en
  lexicon: HALOT
  rationale: El sufijo retoma la pieza dañada como objeto del nuevo modelado. 'Lo hizo en' expresa la transformación de una forma a otra con concisión y fidelidad.
- source_word: כְּלִי אַחֵר
  english_pob_choice: another vessel
  chosen_spanish: otro vaso
  alternatives_spanish:
  - otro recipiente
  - otra vasija
  lexicon: HALOT
  rationale: El hebreo indica una nueva pieza. 'Otro vaso' mantiene la referencia al objeto modelado; 'vasija' también sería posible, pero 'vaso' enlaza mejor con la elección anterior.
- source_word: כַּאֲשֶׁר יָשַׁר
  english_pob_choice: as seemed right
  chosen_spanish: como le pareció bien
  alternatives_spanish:
  - como fue bueno
  - como le pareció correcto
  lexicon: HALOT
  rationale: יָשַׁר en esta construcción expresa lo que resultó recto o adecuado. 'Le pareció bien' comunica la idea de conveniencia o ajuste sin moralizarla en exceso.
- source_word: בְּעֵינֵי הַיּוֹצֵר
  english_pob_choice: in the potter’s eyes
  chosen_spanish: al alfarero
  alternatives_spanish:
  - a los ojos del alfarero
  - según el parecer del alfarero
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'en los ojos del alfarero', un modismo de evaluación. En español, 'le pareció bien al alfarero' preserva el sentido idiomático de manera natural; la imagen de los ojos queda implícita.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to make
  chosen_spanish: hacerlo
  alternatives_spanish:
  - para hacerlo
  - para modelarlo
  lexicon: HALOT
  rationale: El infinitivo completa el modismo con el sentido de la acción que el alfarero juzga adecuada. 'Hacerlo' conserva la referencia verbal directa al objeto transformado.
theological_decisions:
- issue: Imagen concreta del alfarero sin expansión interpretativa explícita
  english_pob_reading: Retain the concrete potter imagery without expanding it into an explicit theological explanation in the verse itself.
  chosen_spanish_reading: Conservar la escena concreta del alfarero sin añadir una paráfrasis doctrinal dentro del versículo.
  alternative_spanish_readings:
  - Parafrasear hacia la soberanía de Dios para rehacer personas o naciones
  rationale: El versículo presenta primero una imagen artesanal. La interpretación teológica viene del contexto mayor; por eso la traducción española mantiene la escena literal para no adelantar conclusiones que el texto inmediato todavía no formula.
  doctrine_reference: Jeremías 18:1–6; filosofía de traducción POB sobre mantener la imagen antes de la interpretación
translation_notes:
  revision_awareness: Se siguió la revisión auditada que prefirió la coordinación simple ('y') en lugar de introducir una relación causal explícita; por eso el español mantiene 'y' en la secuencia principal. También se preservó el matiz procesual de 'was making' con una forma progresiva en español.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino en el proyecto, pero este versículo no lo contiene.
  - '''Alfarero'' se mantiene de forma consistente para יֹצֵר en contextos de arcilla.'
  - '''Barro'' y ''vaso'' se eligieron por naturalidad en español, sin perder la imagen artesanal del hebreo.'
  - La coordinación con 'y' refleja el hebreo וְ sin añadir causalidad no explícita.
