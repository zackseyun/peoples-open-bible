    reason: lexical_alternative
  - marker: c
    text: 'Lit.: «y le hicieron beber agua».'
    reason: lexical_alternative
  revision_rationale: Se corrigió la nota [a] para que corresponda al segmento correcto y preserve una alternativa real documentada para וַיִּקְחוּ אֹתוֹ אֶל דָּוִד. También se suavizó «él comió» a «y comió» para mayor naturalidad narrativa en español, manteniendo la nota sobre la ausencia de objeto explícito. El resto del versículo es fiel y claro.
