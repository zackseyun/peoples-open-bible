review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: llamado a Israel, cruce inminente del Jordán, entrada para desposeer naciones mayores y más fuertes, y ciudades grandes y fortificadas con hipérbole de altura. Sin embargo, las notas están mal ancladas respecto al modelo auditado: la nota [a] fue desplazada a «Escucha» aunque la nota inglesa relevante en ese lugar no debía introducir la alternativa «Escucha este llamado», y la alternativa léxica sobre לָרֶשֶׁת debe anclarse en «desposeer», no en «naciones». También falta conservar la nota sobre «hasta los cielos»/«a los cielos» como hipérbole hebrea, presente en la auditoría inglesa.'
  spanish_quality_summary: El español es generalmente claro y digno. No obstante, «¡Escucha[a], Israel» suena un poco sobreactuado con signos de exclamación en un encabezado vocativo; «Escucha, Israel» o «Oye, Israel» es más natural y bíblico. El resto del verso es legible. La frase «más grandes y más poderosas que tú» funciona, aunque «más grandes y más fuertes que tú» también sería válido; no requiere cambio. Conviene reparar la puntuación inicial y la colocación de notas para mejorar fluidez y fidelidad editorial.
  glossary_alignment: No hay conflicto con la terminología de proyecto en este versículo. «Israel», «el Jordán», «naciones» y «desposeer» están alineados con las decisiones auditadas. La preservación de «los cielos» respeta bien el hebreo בַּשָּׁמָיִם. La principal desalineación es editorial/lexical en las notas, no terminológica.
  issues:
  - severity: medium
    issue: La nota [b] está anclada en «naciones» pero explica el verbo «desposeer».
    rationale: La nota debe aparecer en la palabra o frase pertinente según la instrucción del proyecto; de otro modo, el lector puede entender que la alternativa afecta a «naciones» en vez de לָרֶשֶׁת.
  - severity: medium
    issue: Falta la nota sobre «hasta los cielos» como reflejo de la hipérbole hebrea.
    rationale: La auditoría inglesa preserva explícitamente esta nota cultural/lexical; omitirla pierde una decisión documentada importante.
  - severity: low
    issue: La nota [a] en «Escucha» introduce una alternativa no respaldada por la auditoría inglesa («Escucha este llamado»).
    rationale: El inglés documenta alternativas como «Listen»/«Hear this», pero no exige una nota en español aquí, y la redacción propuesta añade contenido no presente en el texto.
  - severity: low
    issue: Los signos de exclamación en «¡Escucha, Israel» no son necesarios y suenan algo enfáticos de más.
    rationale: El imperativo solemne se transmite bien sin exclamación en español bíblico moderno; quitarla mejora la naturalidad sin pérdida semántica.
  revised_spanish_text: 'Escucha, Israel: hoy estás cruzando el Jordán para entrar y desposeer[a] naciones más grandes y más poderosas que tú, con ciudades grandes y fortificadas hasta los cielos[b].'
  revised_footnotes:
  - marker: a
    text: O «tomar posesión de»; el verbo hebreo puede significar heredar o poseer, pero aquí, en un contexto de conquista, lleva el sentido de desposeer a los habitantes previos.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «a los cielos», una expresión hiperbólica para fortificaciones muy altas.
    reason: cultural_note
  revision_rationale: 'Se corrigen la puntuación y, sobre todo, el aparato de notas para alinearlo con la evidencia fuente y la auditoría inglesa: la alternativa léxica se ancla en «desposeer», se restaura la nota sobre la hipérbole «hasta los cielos», y se elimina una nota innecesaria en «Escucha» que añadía formulación no documentada. El texto principal conserva el sentido fuente con español natural y fiel.'
