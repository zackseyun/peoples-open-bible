translation:
  language: es
  text: 'Y todos los hijos de Israel[a], al ver descender el fuego y la gloria de Yahvé sobre la casa[b], se postraron con el rostro en tierra sobre el pavimento, y adoraron y dieron gracias a Yahvé: «Porque él es bueno, porque su amor fiel[c] permanece para siempre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los israelitas». La expresión hebrea dice literalmente «todos los hijos de Israel», un colectivo habitual para referirse al pueblo entero.
    reason: lexical_alternative
  - marker: b
    text: «La casa» se refiere al templo.
    reason: cultural_note
  - marker: c
    text: O «su misericordia dura para siempre» o «su amor leal dura para siempre». חֶסֶד incluye la idea de amor de pacto y fidelidad constante.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כֹל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: and all the sons of Israel
  chosen_spanish: Y todo el pueblo de Israel
  alternatives_spanish:
  - y todos los israelitas
  - y todos los hijos de Israel
  lexicon: HALOT
  rationale: בְּנֵי יִשְׂרָאֵל es una expresión colectiva fija. En español, «todo el pueblo de Israel» comunica con naturalidad el referente total sin perder el valor corporativo del hebreo; «hijos de Israel» resulta más literal, pero menos natural para lectura pública.
- source_word: רֹאִים
  english_pob_choice: seeing
  chosen_spanish: al ver
  alternatives_spanish:
  - viendo
  - cuando vieron
  lexicon: HALOT
  rationale: El participio describe acción simultánea con lo que ocurre. «Al ver» conserva esa simultaneidad en español de manera clara y fluida.
- source_word: בְּ/רֶדֶת הָ/אֵשׁ
  english_pob_choice: the fire come down
  chosen_spanish: descender el fuego
  alternatives_spanish:
  - el fuego que descendía
  - la bajada del fuego
  lexicon: HALOT
  rationale: 'El sustantivo/infinitivo con ב expresa la circunstancia observada: el fuego bajando. «Descender el fuego» preserva el movimiento vertical y suena natural en español.'
- source_word: וּ/כְב֥וֹד יְהוָ֖ה
  english_pob_choice: and the glory of Yahweh
  chosen_spanish: y la gloria de Yahvé
  alternatives_spanish:
  - y la gloria de Yahvé
  - y la gloria del SEÑOR
  lexicon: HALOT
  rationale: כְבוֹד aquí es la gloria/presencia manifiesta de Dios. Se mantiene «gloria» y se traduce el nombre divino como «Yahvé» conforme al criterio del proyecto.
- source_word: עַל הַ/בָּ֑יִת
  english_pob_choice: upon the house
  chosen_spanish: sobre la casa
  alternatives_spanish:
  - sobre el templo
  - encima de la casa
  lexicon: HALOT
  rationale: בַּיִת significa literalmente «casa». Se conserva «casa» para respetar el término hebreo y su resonancia teológica; el contexto permite entender que se trata del templo.
- source_word: וַ/יִּכְרְעוּ אַפַּ֨יִם אַ֤רְצָ/ה
  english_pob_choice: bowed down with their faces to the ground
  chosen_spanish: se postró rostro en tierra
  alternatives_spanish:
  - se inclinaron hasta tocar el suelo con el rostro
  - se arrodillaron con el rostro en tierra
  lexicon: HALOT
  rationale: כרע y la expresión «rostro en tierra» indican postración completa. «Se postró rostro en tierra» condensa fielmente la imagen sin redundancia innecesaria.
- source_word: עַל הָ/רִֽצְפָה
  english_pob_choice: on the pavement
  chosen_spanish: sobre el pavimento
  alternatives_spanish:
  - sobre el piso pavimentado
  - sobre la losa
  lexicon: HALOT
  rationale: רִצְפָה designa una superficie pavimentada. «Pavimento» es el equivalente más claro y sobrio en español bíblico.
- source_word: וַ/יִּֽשְׁתַּֽחֲו֔וּ
  english_pob_choice: they worshiped
  chosen_spanish: adoraron
  alternatives_spanish:
  - se inclinaron en adoración
  - se postraron
  lexicon: HALOT
  rationale: El verbo incluye la idea de postrarse en acto de culto. Como la postura ya fue descrita, «adoraron» transmite el sentido devocional sin repetir el gesto físico.
- source_word: וְ/הוֹד֤וֹת לַ/יהוָה֙
  english_pob_choice: and gave thanks to Yahweh
  chosen_spanish: y dieron gracias a Yahvé
  alternatives_spanish:
  - y alabaron a Yahvé
  - y confesaron a Yahvé
  lexicon: HALOT
  rationale: הוֹדָה en este contexto litúrgico expresa agradecimiento y reconocimiento. «Dieron gracias» es la correspondencia natural en español.
- source_word: כִּ֣י ט֔וֹב
  english_pob_choice: For he is good
  chosen_spanish: Porque él es bueno
  alternatives_spanish:
  - Porque es bueno
  - Pues él es bueno
  lexicon: HALOT
  rationale: Se mantiene la fórmula de alabanza. En español, explicitar «él» ayuda a referir correctamente al sujeto elíptico del hebreo.
- source_word: כִּ֥י לְ/עוֹלָ֖ם חַסְדּֽ/וֹ
  english_pob_choice: for his steadfast love endures forever
  chosen_spanish: porque para siempre es su amor fiel[c]
  alternatives_spanish:
  - porque para siempre dura su misericordia
  - porque para siempre permanece su amor leal
  lexicon: HALOT
  rationale: חֶסֶד contiene amor leal, fidelidad y bondad pactal. «Amor fiel» comunica de forma compacta esa amplitud sin reducir el término a mera emoción; «para siempre» refleja לְעוֹלָם de modo natural en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se mantiene el nombre propio divino como «Yahvé» para no ocultar el dato textual ni depender de una convención de sustitución.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: חֶסֶד en la fórmula litúrgica
  english_pob_reading: his steadfast love
  chosen_spanish_reading: su amor fiel
  alternative_spanish_readings:
  - su misericordia
  - su amor leal
  - su bondad
  rationale: El contexto es una aclamación litúrgica y חֶסֶד abarca lealtad de pacto, bondad y amor constante. «Amor fiel» conserva el vínculo entre afecto y fidelidad sin estrechar el término a una sola noción.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, documented exception if needed)
translation_notes:
  revision_awareness: La revisión más reciente marcó el pasaje como sin cambios y con acuerdo alto; esta propuesta conserva la estructura y las decisiones auditadas, adaptándolas al español con equivalencias naturales y manteniendo intactas las tensiones léxicas relevantes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se evita «Cristo» porque el versículo no contiene lenguaje mesiánico.
  - «Casa» se conserva donde el hebreo dice בַּיִת, con nota explicativa para el referente templo.
  - «Amor fiel» se usa para חֶסֶד y se deja constancia de alternativas semánticas en la nota.
  - 'La postura física y el acto de adoración se distinguen: «se postró rostro en tierra» y «adoraron».'
