  language: en
  yaml_path: translation/ot/exodus/018/005.yaml
  text: Then Jethro[a], Moses' father-in-law, came to Moses in the wilderness, where he was camped at the mountain of God[b], with his sons and his wife.
  footnotes:
  - marker: a
    text: Or 'and his sons and his wife.' The Hebrew conjunction can be represented more literally, though English idiom often uses 'with' for accompanying persons.
    reason: lexical_alternative
  - marker: b
    text: That is, 'the mountain of God,' a designation associated with Sinai/Horeb.
    reason: cross_reference
