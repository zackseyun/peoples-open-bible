lexical_decisions:
- source_word: οὐδὲ
  english_pob_choice: Not even
  chosen_spanish: Ni siquiera
  alternatives_spanish:
  - Ni aun
  - Tampoco
  lexicon: LSJ
  rationale: οὐδὲ añade una negación acumulativa con énfasis; en español, «ni siquiera» reproduce bien ese valor enfático y natural.
- source_word: αὐτὸς
  english_pob_choice: itself
  chosen_spanish: misma
  alternatives_spanish:
  - ella misma
  - la propia
  lexicon: LSJ
  rationale: Con ὁ νόμος, αὐτὸς es intensivo. En español, «la ley misma» / «la misma ley» preserva ese énfasis de identidad propia sin recargar el estilo.
- source_word: ὁ νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  lexicon: LSJ
  rationale: El sintagma denota de forma directa «la ley». Se mantiene en minúscula porque el fragmento aislado no obliga aquí a una capitalización titular.
- source_word: ἑκουσίως
  english_pob_choice: willingly
  chosen_spanish: voluntariamente
  alternatives_spanish:
  - de buena gana
  - de propia voluntad
  lexicon: LSJ
  rationale: ἑκουσίως significa «voluntariamente, de manera voluntaria». «Voluntariamente» conserva mejor el valor adverbial y evita un matiz afectivo que «de buena gana» podría añadir.
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - nosotros
  lexicon: LSJ
  rationale: Pronombre objeto directo de primera persona plural; en español debe ir enclítico en la reconstrucción editorial «[nos]» para reflejar la sintaxis implícita del fragmento.
