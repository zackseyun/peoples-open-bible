base_translation:
  language: en
  yaml_path: translation/ot/proverbs/029/006.yaml
  text: In the transgression of an evil man there is a snare[b][a], but the righteous sings for joy and rejoices.
  footnotes:
  - marker: a
    text: Or 'By the transgression of an evil man, there is a snare'; the Hebrew can be taken to emphasize either that the snare lies within his transgression or that his transgression brings it about.
    reason: alternative_reading
  - marker: b
    text: Or 'shouts for joy and is glad.'
    reason: lexical_alternative
