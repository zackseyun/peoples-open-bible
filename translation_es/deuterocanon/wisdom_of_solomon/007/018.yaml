translation:
  language: es
  text: el comienzo y el fin y la mitad de los tiempos, los cambios de las estaciones[a] y las variaciones de los tiempos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los cambios de los giros del sol» o «los cambios de los solsticios»; el griego puede referirse más ampliamente a giros cíclicos, pero en un contexto astronómico probablemente alude a los solsticios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρχὴν
  english_pob_choice: beginning
  chosen_spanish: comienzo
  alternatives_spanish:
  - principio
  - inicio
  lexicon: BDAG
  rationale: En esta serie temporal, ἀρχή indica el punto de inicio. «Comienzo» conserva el sentido temporal y suena natural junto a «fin» y «mitad» en español.
- source_word: τέλος
  english_pob_choice: end
  chosen_spanish: fin
  alternatives_spanish:
  - final
  - término
  lexicon: BDAG
  rationale: Aquí τέλος está coordinado con «comienzo» y «mitad», por lo que el valor temporal de «fin» es el más claro y fiel.
- source_word: μεσότητα
  english_pob_choice: middle
  chosen_spanish: mitad
  alternatives_spanish:
  - medio
  - punto medio
  lexicon: BDAG
  rationale: La idea es la parte central entre comienzo y fin. «Mitad» comunica bien ese valor relacional en español actual.
- source_word: χρόνων
  english_pob_choice: times
  chosen_spanish: tiempos
  alternatives_spanish:
  - periodos de tiempo
  - épocas
  lexicon: BDAG
  rationale: El plural general χρόνοι se mantiene como «tiempos», que preserva la amplitud temporal sin precisar más de lo que el griego exige.
- source_word: τροπῶν
  english_pob_choice: seasons
  chosen_spanish: estaciones
  alternatives_spanish:
  - solsticios
  - cambios estacionales
  lexicon: LSJ
  rationale: La revisión inglesa amplió el término para evitar restringirlo a «solsticios». En español, «estaciones» conserva esa amplitud calendárica y cosmológica sin fijar una interpretación demasiado estrecha.
- source_word: ἀλλαγὰς
  english_pob_choice: changes
  chosen_spanish: cambios
  alternatives_spanish:
  - alteraciones
  - variaciones
  lexicon: BDAG
  rationale: ἀλλαγή significa cambio o alteración. «Cambios» es la equivalencia directa y transparente.
- source_word: μεταβολὰς
  english_pob_choice: shifts
  chosen_spanish: variaciones
  alternatives_spanish:
  - cambios
  - transiciones
  lexicon: BDAG
  rationale: Como ἀλλαγάς ya se traduce «cambios», μεταβολάς se vierte como «variaciones» para conservar una distinción estilística en español sin perder el sentido de transformación.
- source_word: καιρῶν
  english_pob_choice: times
  chosen_spanish: tiempos
  alternatives_spanish:
  - momentos oportunos
  - estaciones
  lexicon: BDAG
  rationale: Aquí καιροί mantiene el sentido general de períodos o tiempos. Traducirlo también como «tiempos» respeta la distinción con τροπῶν y evita duplicar «estaciones».
translation_notes:
  revision_awareness: Seguí el pasaje revisado del audit trail inglés, especialmente la decisión de no restringir τροπῶν a «solsticios» y de mantener la distinción entre τροπῶν y καιρῶν. El español refleja esa misma amplitud semántica con «estaciones» y «tiempos», conservando la estructura enumerativa del griego.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de una lista nominal compacta, sin añadir verbos ni glosas explicativas al texto principal.
  - «Tiempos» se usa dos veces con funciones distintas en el verso; la primera traduce χρόνων y la segunda καιρῶν, siguiendo la distinción auditada.
  - El orden de los miembros sigue el griego y el POB inglés, para preservar el ritmo retórico de la enumeración.
