base_translation:
  language: en
  yaml_path: translation/ot/genesis/031/013.yaml
  text: I am the God of Bethel[a], where you anointed a pillar and where you vowed a vow to me. Now arise, go out from this land[b], and return to the land of your birth.
  footnotes:
