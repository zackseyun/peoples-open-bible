    issue: «lo ha agarrado» para הֶחֱזִיקַתְהוּ
    rationale: Aunque transmite aprehensión, «agarrar» suena más coloquial y físico de lo que pide el registro. «lo ha atrapado» o mejor «se ha apoderado de él»/«lo ha sobrecogido» conservan fuerza y dignidad.
  - severity: medium
    issue: «dolor como de mujer en parto» para חִיל כַּיּוֹלֵדָה
    rationale: «Dolor» reduce el matiz de angustia convulsiva señalado en el audit trail, y la frase resulta algo abrupta. Una formulación como «angustia, como una mujer en parto» o «angustia como la de una mujer en parto» refleja mejor el paralelismo y lee con más naturalidad.
  - severity: low
