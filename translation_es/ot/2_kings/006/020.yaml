translation:
  language: es
  text: 'Cuando llegaron a Samaria, Elíseo dijo: «Yahvé, abre los ojos de estos hombres para que vean». Entonces Yahvé abrió sus ojos, y vieron; y he aquí, estaban en medio de Samaria.'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיְהִי כְּבֹאָם
  english_pob_choice: And when they came
  chosen_spanish: Y sucedió que, cuando llegaron
  alternatives_spanish:
  - Y cuando llegaron
  - Y aconteció que, al llegar
  lexicon: HALOT
  rationale: La secuencia narrativa hebrea introduce el episodio con un giro temporal. En español, «Y sucedió que, cuando llegaron» conserva el valor discursivo y la relación temporal sin sonar mecánico.
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  alternatives_spanish:
  - la ciudad de Samaria
  - Samaría
  lexicon: HALOT
  rationale: Es un nombre propio. Se mantiene la forma habitual y reconocible «Samaria»; el contexto ya indica que se trata de la ciudad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: La política del proyecto para el Tetragrámaton es «Yahvé». Se preserva el nombre divino en vez de sustituirlo por un título, y se adapta a la forma española establecida del proyecto.
- source_word: פְּקַח אֶת עֵינֵי
  english_pob_choice: open the eyes
  chosen_spanish: abre los ojos
  alternatives_spanish:
  - abre la vista
  - despierta los ojos
  - quita la ceguera a
  lexicon: HALOT
  rationale: El hebreo usa el modismo de «abrir los ojos». En español, «abre los ojos» reproduce bien la imagen y su fuerza teológica sin explicarla de más.
- source_word: אֵלֶּה
  english_pob_choice: these men
  chosen_spanish: de estos[a]
  alternatives_spanish:
  - de estos hombres
  - de estos
  lexicon: HALOT
  rationale: El demostrativo hebreo es breve y el inglés suplió «men» por claridad. En español, la traducción puede quedar igualmente breve; la nota aclara que el referente son los soldados arameos.
- source_word: וְיִרְאוּ
  english_pob_choice: so that they may see
  chosen_spanish: para que vean
  alternatives_spanish:
  - y vean
  - de modo que vean
  lexicon: HALOT
  rationale: Tras el imperativo, el verbo expresa propósito. «Para que vean» comunica con naturalidad esa finalidad en español.
- source_word: וַיִּפְקַח יְהוָה אֶת עֵינֵיהֶם
  english_pob_choice: So Yahweh opened their eyes
  chosen_spanish: Entonces Yahvé abrió sus ojos
  alternatives_spanish:
  - Y Yahvé abrió sus ojos
  - Así Yahvé les abrió los ojos
  lexicon: HALOT
  rationale: Se conserva el paralelo con la petición previa y el sujeto explícito divino. «Abrió sus ojos» mantiene la imagen bíblica; «les abrió los ojos» sería una alternativa idiomática, pero menos cercana al hebreo.
- source_word: וַיִּרְאוּ
  english_pob_choice: and they saw
  chosen_spanish: y vieron
  alternatives_spanish:
  - y comenzaron a ver
  - y vieron claramente
  lexicon: HALOT
  rationale: 'La forma verbal narra la consecuencia inmediata: ahora pueden ver. «Y vieron» es directo y fiel al verbo simple del hebreo.'
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí que
  alternatives_spanish:
  - y he aquí
  - y mira
  lexicon: HALOT
  rationale: «He aquí» conserva el marcador de sorpresa y atención repentina. En español, «y he aquí que» suena digno y suficientemente natural en un registro bíblico moderno.
- source_word: בְּתוֹךְ שֹׁמְרוֹן
  english_pob_choice: in the midst of Samaria
  chosen_spanish: en medio de Samaria
  alternatives_spanish:
  - en el centro de Samaria
  - dentro de Samaria
  - en la mitad de Samaria
  lexicon: HALOT
  rationale: «En medio de» reproduce bien la idea de estar rodeados o ubicados en el interior de la ciudad. Es más natural en español que calcos más rígidos.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el nombre propio de Dios conforme a la práctica doctrinal del proyecto. No se oculta tras un sustituto tradicional, porque el texto hebreo usa el Tetragrámaton directamente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: La imagen de «abrir los ojos»
  english_pob_reading: open the eyes
  chosen_spanish_reading: abrir los ojos
  alternative_spanish_readings:
  - dar vista
  - quitar la ceguera
  rationale: La escena conserva una tensión entre percepción física y revelación dada por Dios. «Abrir los ojos» mantiene esa imagen sin disolverla en una explicación interpretativa.
  doctrine_reference: Lexical note in English audit trail for פְּקַח אֶת עֵינֵי
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión más reciente: no se registraron cambios tras la última pasada y el veredicto de revisión fue de alto acuerdo, por lo que el presente borrador mantiene esa lectura sin introducir ajustes nuevos.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «Samaria» como nombre propio del lugar.
  - Se traduce el modismo de percepción con «abrir los ojos» para preservar la imagen bíblica.
  - El registro es bíblico y digno, pero con sintaxis española natural.
  - La nota a pie de página marca la brevedad del demostrativo hebreo sin expandir innecesariamente el texto principal.
