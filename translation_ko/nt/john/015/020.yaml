id: JHN.15.20
reference: 'John 15:20'
language:
  code: ko
  name: Korean
  variant: '표준어 / modern formal-polite (합쇼체)'
source:
  edition: SBLGNT
  text: μνημονεύετε τοῦ λόγου οὗ ἐγὼ εἶπον ὑμῖν· Οὐκ ἔστιν δοῦλος μείζων τοῦ κυρίου αὐτοῦ· εἰ ἐμὲ ἐδίωξαν, καὶ ὑμᾶς διώξουσιν· εἰ τὸν λόγον μου ἐτήρησαν, καὶ τὸν ὑμέτερον τηρήσουσιν.
base_translation:
  language: en
  yaml_path: translation/nt/john/015/020.yaml
  text: 'Remember the word that I said to you: ‘A slave is not greater than his master.’ If they persecuted me[a], they will also persecute you; if they kept my word[b], they will also keep yours.'
  footnotes:
  - marker: a
    text: 'Or ''servant'': Greek δοῦλος can mean either ''slave'' or ''servant'' depending on context; here ''slave'' is used because the contrast with ''master'' emphasizes subordinate status.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''obeyed'': ''kept my word'' in John can include both receiving Jesus'' message and living in obedience to it.'
    reason: lexical_alternative
translation:
  language: ko
  text: 내가 여러분에게 한 말을 기억하십시오. 「종이 자기 주인보다 크지 못하다.」 사람들이 나를 박해했으면, 여러분도 박해할 것입니다. 사람들이 내 말을 지켰으면, 여러분의 말도 지킬 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「하인」. 헬라어 doulos는 문맥에 따라 「종·노예」로 옮길 수 있다. 여기서는 「주인」과의 종속 대조이므로 「종」으로 옮긴다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「순종했다」. 요한복음의 「말을 지킨다」는 메시지 수용과 그에 따른 순종을 함께 포함한다.
    reason: lexical_alternative
