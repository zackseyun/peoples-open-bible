    issue: «vaso» para ἄγγιον resulta menos natural y puede subespecificar mal la imagen
    rationale: Aunque posible, «vaso» en español actual suele evocar un objeto para beber. El griego apunta más ampliamente a un recipiente; «vasija» preserva mejor la metáfora de un contenedor quebrado que no puede retener lo que recibe.
  - severity: low
    issue: La nota al pie queda menos necesaria si el texto principal usa «vasija»
    rationale: La función de la nota era justificar una opción general. Si se adopta «vasija», la necesidad de explicar alternativas se reduce, aunque puede mantenerse una nota breve con «jarro» o «cántaro» como alternativas.
  revised_spanish_text: Las entrañas de un necio son como una vasija[a] quebrada, y no retendrán ningún conocimiento.
