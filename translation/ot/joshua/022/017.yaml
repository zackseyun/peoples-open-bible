id: JOS.22.17
reference: Joshua 22:17
source:
  edition: WLC
  text: הַ/מְעַט לָ֨/נוּ֙ אֶת עֲוֺ֣ן פְּע֔וֹר אֲשֶׁ֤ר לֹֽא הִטַּהַ֨רְנוּ֙ מִמֶּ֔/נּוּ עַ֖ד הַ/יּ֣וֹם הַ/זֶּ֑ה וַ/יְהִ֥י הַ/נֶּ֖גֶף בַּ/עֲדַ֥ת יְהוָֽה־־־׃
translation:
  text: Was the iniquity of Peor too little for us[a], from which we have not cleansed ourselves to this day[b], and the plague came upon the congregation of Yahweh?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Was the guilt of Peor too little for us?' The Hebrew עָוֹן can mean 'iniquity,' 'guilt,' or by extension the consequence of guilt.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Peor'; compare the fuller expression 'Baal-peor' in related passages.
    reason: cross_reference
lexical_decisions:
- source_word: הַמְעַט לָנוּ
  chosen: Was ... too little for us
  alternatives:
  - Is ... too little for us
  - Was ... not enough for us
  lexicon: HALOT
  rationale: The interrogative use of מְעַט with prefixed article expresses 'is/was it too little?' in a rhetorical question. English idiom is best captured with 'Was ... too little for us,' preserving the rebuking force without over-paraphrase.
- source_word: עֲוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - punishment for iniquity
  - sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the consequence of guilt. Here it refers to the sinful offense associated with Peor and its enduring stain on Israel, so 'iniquity' best preserves both moral gravity and covenantal resonance.
- source_word: פְּעוֹר
  chosen: Peor
  alternatives:
  - Baal-peor
  lexicon: HALOT
  rationale: The Hebrew text has simply 'Peor,' not 'Baal-peor.' Since the verse refers back to the known incident, the transliterated place/name should remain as in the source rather than importing the fuller expression from related passages.
- source_word: אֲשֶׁר לֹא הִטַּהַרְנוּ מִמֶּנּוּ
  chosen: from which we have not cleansed ourselves
  alternatives:
  - from which we have not purified ourselves
  - from which we have not become clean
  lexicon: HALOT
  rationale: The hitpael of טהר is reflexive, indicating the community's failure to become purified from the defilement of that sin. 'Cleansed ourselves' is natural modern English and preserves the reflexive sense better than a passive rendering.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is a standard idiom meaning the effects remain into the present perspective of the speaker/narrator. 'To this day' is the most idiomatic English equivalent.
- source_word: וַיְהִי הַנֶּגֶף
  chosen: and yet the plague came
  alternatives:
  - and the plague came
  - and there was a plague
  lexicon: HALOT
  rationale: 'The clause recalls the historical consequence of the Peor sin. Rendering וַיְהִי dynamically as ''came'' with ''the plague'' gives clear English sense. ''Yet'' brings out the rhetorical force in context: despite the unresolved guilt, a plague had already struck them.'
- source_word: נֶּגֶף
  chosen: plague
  alternatives:
  - blow
  - affliction
  lexicon: HALOT
  rationale: In covenant-judgment contexts נֶגֶף commonly denotes a divinely sent plague or deadly outbreak. 'Plague' is the clearest and most contextually appropriate rendering.
- source_word: בַּעֲדַת יְהוָה
  chosen: upon the congregation of the LORD
  alternatives:
  - in the assembly of the LORD
  - against the congregation of the LORD
  lexicon: HALOT
  rationale: עֵדָה denotes the gathered covenant community. 'Congregation' preserves the corporate sense well in this context. The preposition is rendered 'upon' to match the idiom of a plague falling on a people. Per doctrine, יְהוָה is rendered 'the LORD'.
