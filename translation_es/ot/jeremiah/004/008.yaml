revisions:
- from: Por causa de esto[a], cíñanse de cilicio; hagan duelo y aúllen[b], porque el ardor de la ira de Yahvé no se ha apartado de nosotros.
  to: Por causa de esto[a], vístanse de cilicio; hagan duelo y giman[b], porque el ardor de la ira de Yahvé no se ha apartado de nosotros.
  rationale: Se ajusta «cíñanse de cilicio» a «vístanse de cilicio» para reflejar mejor la opción principal del POB inglés y mejorar la naturalidad en español. Se cambia «aúllen» por «giman» para evitar una connotación más extrema que la documentada en el inglés auditado, conservando a la vez el lamento audible. Se corrige la nota b para que coincida exactamente con el término anclado en el texto.
