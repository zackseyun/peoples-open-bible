translation:
  language: es
  text: 'Y esto era antiguamente[a] en Israel, respecto a la redención y al intercambio, para confirmar cualquier asunto[b]: un hombre se quitaba su sandalia y se la daba a su prójimo, y esto era la constancia[c] en Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en tiempos pasados».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para confirmar toda transacción».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «el testimonio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְפָנִים
  english_pob_choice: formerly
  chosen_spanish: antiguamente
  alternatives_spanish:
  - en tiempos pasados
  - antes
  - antiguamente, en otros tiempos
  lexicon: HALOT
  rationale: El hebreo introduce una nota sobre una práctica anterior. 'Antiguamente' comunica bien el valor temporal y suena natural en español sin añadir interpretaciones.
- source_word: הַגְּאוּלָּה
  english_pob_choice: redemption
  chosen_spanish: redención
  alternatives_spanish:
  - derecho de rescate
  - rescate
  - compra de redención
  lexicon: HALOT
  rationale: '''Redención'' conserva el campo legal-familiar de גְּאוּלָּה en Rut 4 y coincide con el uso bíblico amplio en español.'
- source_word: הַתְּמוּרָה
  english_pob_choice: exchange
  chosen_spanish: intercambio
  alternatives_spanish:
  - trueque
  - cambio
  - transferencia
  lexicon: HALOT
  rationale: '''Intercambio'' transmite la idea básica de תְּמוּרָה como sustitución o canje sin forzar un tecnicismo jurídico que el hebreo no explicita.'
- source_word: לְקַיֵּם כָּל דָּבָר
  english_pob_choice: to confirm any matter
  chosen_spanish: para confirmar cualquier asunto
  alternatives_spanish:
  - para ratificar cualquier asunto
  - para confirmar toda transacción
  - para establecer cualquier cosa
  lexicon: HALOT
  rationale: '''Confirmar cualquier asunto'' mantiene la amplitud de כָּל דָּבָר y refleja el valor de לְקַיֵּם como establecer/validar, en un español claro y legalmente sobrio.'
- source_word: שָׁלַף
  english_pob_choice: removed
  chosen_spanish: se quitaba
  alternatives_spanish:
  - se descalzaba
  - se sacaba
  - se desprendía
  lexicon: HALOT
  rationale: Con la sandalia como objeto, 'se quitaba' es natural en español y conserva la acción concreta de retirar el calzado.
- source_word: נַעֲלוֹ
  english_pob_choice: his sandal
  chosen_spanish: su sandalia
  alternatives_spanish:
  - su zapato
  - su calzado
  lexicon: HALOT
  rationale: '''Sandalia'' es la opción más precisa y culturalmente adecuada para נַעַל en este contexto narrativo.'
- source_word: לְרֵעֵהוּ
  english_pob_choice: to his neighbor
  chosen_spanish: a su prójimo
  alternatives_spanish:
  - al otro hombre
  - a su compañero
  - a su vecino
  lexicon: HALOT
  rationale: '''Prójimo'' conserva el valor de רֵעַ como el otro participante cercano en la transacción y funciona bien en español bíblico contemporáneo.'
- source_word: הַתְּעוּדָה
  english_pob_choice: the attestation
  chosen_spanish: la atestación
  alternatives_spanish:
  - el testimonio
  - la prueba
  - la confirmación
  lexicon: HALOT
  rationale: '''Atestación'' sigue de cerca el valor evidencial-formal de תְּעוּדָה y evita reducirlo solo a un ''testimonio'' verbal.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la edición inglesa POB y mantiene sin cambios su lectura general: nota temporal inicial, pares legales de redención/intercambio, gesto de la sandalia como señal de validación y cierre con la idea de atestación en Israel. No hay revisiones posteriores registradas que alteren el sentido base.'
  spanish_consistency_notes:
  - Se mantiene 'redención' para גְּאוּלָּה y 'intercambio' para תְּמוּרָה para preservar la distinción léxica.
  - '''Atestación'' se usa como equivalente formal de ''attestation'' y se distingue de ''testimonio'' en la nota.'
  - '''Prójimo'' se eligió como término natural y bíblicamente comprensible para רֵעַ sin especificar indebidamente la relación jurídica exacta.'
