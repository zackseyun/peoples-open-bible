lexical_decisions:
- source_word: בְּנְיָמִן
  english_pob_choice: Binyamin
  chosen_spanish: Binyamín
  alternatives_spanish:
  - Benjamín
  lexicon: HALOT
  rationale: Es un nombre propio en una lista genealógica; se conserva la forma transliterada del hebreo más que la forma hispanizada tradicional. Se adapta la acentuación al uso normal del español para la última sílaba tónica.
- source_word: מַלּוּךְ
  english_pob_choice: Malluk
  chosen_spanish: Maluc
  alternatives_spanish:
  - Malluc
  - Malluk
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se evita la grafía tradicional inglesa con -ch porque en español sugiere otro valor fonético; ‘Maluc’ refleja de modo más natural la consonante final y mantiene la economía gráfica.
- source_word: שְׁמַרְיָה
  english_pob_choice: Shemaryah
  chosen_spanish: Semaryah
  alternatives_spanish:
  - Semarías
  - Shemaria
  - Shemaryah
  lexicon: HALOT
  rationale: Nombre propio con elemento teofórico. Se conserva la transliteración directa, incluyendo ‘-yah’ para transparentar el componente del nombre divino, en lugar de sustituirlo por una forma más tradicional que lo opaque.
translation_notes:
  revision_awareness: El texto base y el control cruzado muestran total acuerdo y no registran revisiones sustantivas; por eso la propuesta mantiene la estrategia de transliteración directa de nombres propios con adaptación mínima al español.
  spanish_consistency_notes:
  - Se mantiene el orden del hebreo y el carácter de lista nominal sin añadir conectores inexistentes.
  - Se usa transliteración consistente para nombres propios, en línea con el auditoría inglesa, pero con ortografía española naturalizada donde no afecta la transparencia del nombre.
  - La nota al pie recoge la alternativa hispanizada/tradicional que el audit trail inglés señaló como posible.
