- from: 'Y presentarás un holocausto como aroma agradable[a] a Yahvé: dos novillos del ganado, un carnero y siete corderos machos de un año.'
  to: 'Y presentarán un holocausto como aroma grato[a] a Yahvé: dos novillos del ganado, un carnero y siete corderos machos de un año.'
