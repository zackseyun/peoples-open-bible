translation:
  language: es
  text: 'Y sucederá: como el pueblo[a], como el sacerdote. Y yo lo castigaré por sus caminos[b] y le retribuiré por sus obras.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como el pueblo, así el sacerdote». El hebreo es una comparación tersa que señala que pueblo y sacerdote recibirán el mismo juicio.
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa pronombres singulares («lo», «sus»), que pueden funcionar de manera distributiva para el grupo o restringir el foco al sacerdote.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will be
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y será
  - Y acontecerá
  lexicon: HALOT
  rationale: La fórmula hebrea introduce un estado o desenlace futuro; «sucederá» conserva el valor prospectivo sin sonar tan literal o rígido como un calco de «será».
- source_word: כָעָם כַּכֹּהֵן
  english_pob_choice: like people, like priest
  chosen_spanish: como el pueblo, así el sacerdote
  alternatives_spanish:
  - como el pueblo, como el sacerdote
  - tal como el pueblo, tal como el sacerdote
  lexicon: HALOT
  rationale: La construcción proverbial pide una comparación breve y paralela. En español, «como... así...» reproduce bien la equivalencia de juicio; «el pueblo» y «el sacerdote» explicitan la referencia colectiva y mantienen naturalidad.
- source_word: וּפָקַדְתִּי
  english_pob_choice: I will punish
  chosen_spanish: yo lo castigaré
  alternatives_spanish:
  - yo lo visitaré
  - yo lo tomaré en cuenta para juicio
  lexicon: HALOT
  rationale: En contextos judiciales, פקד con עַל comunica rendición de cuentas o castigo. «Castigaré» expresa de forma clara ese sentido forense en español actual.
- source_word: עָלָיו
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - los
  lexicon: HALOT
  rationale: Se conserva el singular del hebreo. En español, el objeto directo pronominal «lo» mantiene la tensión entre un referente individual y uno distributivo/colectivo sin resolverla prematuramente.
- source_word: דְרָכָיו
  english_pob_choice: his ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - su conducta
  - sus sendas
  lexicon: HALOT
  rationale: «Caminos» es una equivalencia bíblica natural para דֶּרֶךְ en sentido moral; conserva la metáfora y sigue siendo comprensible en español eclesial.
- source_word: וּמַעֲלָלָיו
  english_pob_choice: his deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  lexicon: HALOT
  rationale: מַעֲלָלִים denota acciones o hechos con carga evaluativa. «Obras» mantiene la idea de conducta visible y la parquedad poética del hebreo.
- source_word: אָשִׁיב לוֹ
  english_pob_choice: repay him
  chosen_spanish: le devolveré conforme a
  alternatives_spanish:
  - le retribuiré
  - le pagaré
  lexicon: HALOT
  rationale: שוב en forma causativa, con ל, expresa devolver o retribuir según corresponda. «Le devolveré conforme a» preserva el eco de retorno/retribución y evita añadir una interpretación demasiado técnica.
theological_decisions:
- issue: Pronombres singulares en la cláusula de juicio
  english_pob_reading: Retain the singular pronouns ('him,' 'his') as in the Hebrew, allowing a distributive/corporate sense that applies equally within the 'people/priest' comparison.
  chosen_spanish_reading: Conservar el singular («lo», «sus») para mantener la ambigüedad hebrea entre un referente corporativo y un posible foco individual.
  alternative_spanish_readings:
  - pluralizar a «los» / «sus» para suavizar el sentido colectivo
  - referirlo explícitamente solo al sacerdote
  rationale: El hebreo usa sufijos singulares después de una comparación colectiva. Mantener el singular evita cerrar la referencia y preserva la tensión interpretativa documentada en el audit trail.
  doctrine_reference: Preservar la tensión textual sin resolverla de antemano.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail al usar una coordinación simple con «Y» antes de la cláusula de juicio, sin añadir inferencia causal.
  spanish_consistency_notes:
  - Se mantiene «Y» inicial para reflejar la conjunción hebrea ו de manera directa.
  - Se usa «Y» antes de la cláusula de juicio para no introducir un «así que» interpretativo.
  - Se conserva la imagen moral de «caminos» y el paralelismo con «obras» para respetar el tono proverbial del verso.
  - La puntuación en dos miembros principales reproduce la tersura del hebreo y facilita la lectura pública.
