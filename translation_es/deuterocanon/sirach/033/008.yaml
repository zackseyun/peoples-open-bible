  to: Aviva la ira y derrama el furor[a].
  rationale: Se ajusta ἔγειρον a 'Aviva' para un imperativo más idiomático y fiel al sentido de suscitar o intensificar. Se cambia ὀργήν de 'indignación' a 'furor' para conservar un término de ira fuerte, distinto de 'ira', sin introducir una connotación moralizante ajena al griego. Se mantiene la nota textual tal como corresponde al alcance limitado del testimonio fuente.
