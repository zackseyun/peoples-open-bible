  yaml_path: translation/ot/genesis/042/038.yaml
  text: But he said[a], “My son will not go down with you, because his brother is dead, and he alone is left. If harm should happen to him on the journey on which you go[b], then you would bring my gray hair down to Sheol in sorrow.”
