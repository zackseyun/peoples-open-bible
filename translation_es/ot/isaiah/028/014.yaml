translation:
  language: es
  text: Por tanto, oigan la palabra de Yahvé[a], ustedes, hombres burlones, gobernantes de este pueblo en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «burladores» o «hombres de escarnio». La frase hebrea es literalmente «hombres de burla/escarnio».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por esta razón
  lexicon: HALOT
  rationale: La partícula inferencial introduce una conclusión a partir del contexto previo. «Por tanto» conserva el valor discursivo de consecuencia con registro bíblico-natural en español.
- source_word: שִׁמְעוּ
  english_pob_choice: hear
  chosen_spanish: oigan
  alternatives_spanish:
  - escuchen
  - atiendan
  lexicon: HALOT
  rationale: El imperativo plural de שׁמע pide una convocatoria profética. «Oigan» mantiene la fuerza auditiva y responsiva sin añadir explícitamente «obedezcan».
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del Yahvé
  lexicon: HALOT
  rationale: «Palabra» refleja la fórmula profética estable del hebreo. Se conserva «Yahvé» por la decisión doctrinal del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se translitera como «Yahvé», siguiendo el criterio del proyecto y evitando la sustitución por un título.
- source_word: אַנְשֵׁי לָצוֹן
  english_pob_choice: scoffing men
  chosen_spanish: hombres de burla
  alternatives_spanish:
  - hombres burlones
  - burladores
  - hombres de escarnio
  lexicon: HALOT
  rationale: La construcción nominal hebrea literalmente es «hombres de burla/socarronería». «Hombres de burla» conserva la estructura y la carga despectiva sin perder naturalidad en español. Se evita neutralizarlo en «burladores» para no borrar la forma constructa.
- source_word: מֹשְׁלֵי
  english_pob_choice: rulers of
  chosen_spanish: gobernantes de
  alternatives_spanish:
  - jefes de
  - los que gobiernan
  lexicon: HALOT
  rationale: El participio de משל expresa ejercicio de gobierno. «Gobernantes de» es claro y reproduce la relación constructa con el sustantivo siguiente.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - este pueblo
  - estas personas
  lexicon: HALOT
  rationale: La expresión hebrea funciona como un colectivo singular. «Este pueblo» reproduce bien el idioma bíblico en español.
- source_word: אֲשֶׁר בִּירוּשָׁלִָם
  english_pob_choice: who are in Jerusalem
  chosen_spanish: que está en Jerusalén
  alternatives_spanish:
  - que se encuentra en Jerusalén
  - que viven en Jerusalén
  lexicon: HALOT
  rationale: La cláusula relativa aclara la ubicación del pueblo/gobernantes. «Está» mantiene el singular colectivo de «pueblo» y fluye de manera natural en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue el principio del proyecto de transliterar el Nombre divino en lugar de sustituirlo por un título. «Yahvé» preserva la identidad personal del Dios de Israel en el texto público español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Tratamiento de אַנְשֵׁי como plural masculino
  english_pob_reading: scoffing men
  chosen_spanish_reading: hombres de burla
  alternative_spanish_readings:
  - personas burlonas
  - burladores
  rationale: El hebreo conserva una forma masculina plural concreta. «Hombres» retiene esa especificidad, coherente con la directriz del proyecto de no neutralizar sin base textual.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del texto inglés, que prefirió «scoffing men» frente a «men of mockery» por naturalidad y precisión. En español, «hombres de burla» conserva tanto la literalidad estructural como el tono despectivo, por lo que se optó por esa forma sin perder el matiz del auditorio denunciado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente con la norma del proyecto para יְהוָה.
  - Se usó «pueblo» como colectivo singular, reflejando la sintaxis hebrea y la fluidez del español.
  - La puntuación reproduce la secuencia exhortativa y la aposición despectiva del hebreo sin añadir explicación interpretativa.
