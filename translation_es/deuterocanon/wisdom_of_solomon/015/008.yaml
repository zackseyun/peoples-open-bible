translation:
  language: es
  text: Y con trabajo perverso moldea un dios inútil de la misma arcilla—él, que hace poco había venido de la tierra, y después de un breve tiempo vuelve a la tierra de la cual fue tomado, cuando se le reclama la deuda de su alma[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando se le reclama la deuda de su vida». El griego ψυχή puede significar «alma» o «vida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κακόμοχθος
  english_pob_choice: with wicked toil
  chosen_spanish: con trabajo perverso
  alternatives_spanish:
  - con labor malvada
  - con afán perverso
  - con penoso trabajo
  lexicon: LSJ
  rationale: El compuesto combina idea de trabajo penoso y maldad moral. «Trabajo perverso» conserva esa doble carga sin sonar demasiado artificial en español, y mantiene el matiz ético del acto idolátrico.
- source_word: θεὸν μάταιον
  english_pob_choice: a futile god
  chosen_spanish: un dios inútil
  alternatives_spanish:
  - un dios vano
  - un dios vacío
  - un dios fútil
  lexicon: LSJ
  rationale: μάταιος expresa vacío, inutilidad y vanidad. «Inútil» comunica la ironía del ídolo hecho por manos humanas y funciona con naturalidad en español; «vano» queda como alternativa más literal pero menos clara aquí.
- source_word: πλάσσει
  english_pob_choice: molds
  chosen_spanish: moldea
  alternatives_spanish:
  - forma
  - modela
  - fabrica
  lexicon: LSJ
  rationale: El verbo evoca el trabajo con barro/arcilla. «Moldea» mantiene la imagen plástica y la conexión inmediata con la arcilla mejor que un verbo más general.
- source_word: ἐκ τοῦ αὐτοῦ πηλοῦ
  english_pob_choice: from the same clay
  chosen_spanish: a partir de la misma arcilla
  alternatives_spanish:
  - de la misma arcilla
  - con la misma arcilla
  lexicon: LSJ
  rationale: «Misma» refleja αὐτοῦ; «arcilla» es más idiomática que «barro» en español bíblico moderno cuando se quiere conservar la imagen de modelado, sin perder la referencia material.
- source_word: ὃς
  english_pob_choice: he who
  chosen_spanish: él, que
  alternatives_spanish:
  - el cual
  - quien
  lexicon: Greek grammar
  rationale: El relativo retoma al artesano, no al ídolo. «Él, que» deja claro el antecedente en español y evita ambigüedad sintáctica.
- source_word: πρὸ μικροῦ
  english_pob_choice: a little before
  chosen_spanish: hace poco
  alternatives_spanish:
  - no hace mucho
  - poco antes
  - hace un momento
  lexicon: LSJ
  rationale: La expresión marca cercanía temporal respecto al origen humano del fabricante. «Hace poco» es natural y fiel al sentido de reciente aparición.
- source_word: ἐκ γῆς γενηθεὶς
  english_pob_choice: had come from the earth
  chosen_spanish: había venido de la tierra
  alternatives_spanish:
  - había sido hecho de la tierra
  - había surgido de la tierra
  - había nacido de la tierra
  lexicon: LSJ
  rationale: «Venido de la tierra» conserva la idea de procedencia sin decidir más de lo necesario entre nacimiento, creación u origen. Mantiene la fuerza antropológica del contraste con el dios fabricado.
- source_word: μετʼ ὀλίγον πορεύεται
  english_pob_choice: after a short time goes back
  chosen_spanish: después de un breve tiempo vuelve
  alternatives_spanish:
  - luego de poco tiempo va
  - tras un poco vuelve
  - al poco tiempo regresa
  lexicon: LSJ
  rationale: El contexto aclara que el movimiento es de retorno a la tierra. «Vuelve» expresa ese regreso implícito de manera natural en español.
- source_word: ἐξ ἧς ἐλήμφθη
  english_pob_choice: to the earth from which he was taken
  chosen_spanish: a la tierra de la cual fue tomado
  alternatives_spanish:
  - de la cual fue tomado
  - de donde fue tomado
  lexicon: LSJ
  rationale: Repetir «tierra» hace explícito el referente y mantiene el eco de creación/retorno. «Fue tomado» sigue de cerca el pasivo griego sin añadir interpretación.
- source_word: τὸ τῆς ψυχῆς ἀπαιτηθεὶς χρέος
  english_pob_choice: when the debt of his soul is demanded
  chosen_spanish: cuando se le reclama la deuda de su alma
  alternatives_spanish:
  - cuando se le exige la deuda de su vida
  - cuando se reclama la deuda de su alma
  - al ser exigida la deuda de su alma
  lexicon: LSJ
  rationale: «Deuda» conserva χρέος como lo debido; «se le reclama» refleja ἀπαιτέω como demandar/exigir. «Alma» mantiene la redacción antropológica del griego, dejando abierta la alternativa contextual de «vida».
theological_decisions:
- issue: ψυχή en un contexto de mortalidad
  english_pob_reading: soul
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - vida
  rationale: Se conserva «alma» para mantener la tensión antropológica del texto y no reducirlo a un mero modismo sobre la muerte física. La alternativa «vida» sigue siendo válida, pero se deja implícita solo como trasfondo semántico.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, anclado en «tierra[a]». No se añadieron notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo un registro uniforme de «alma» para ψυχή en el cuerpo principal, con alternativa «vida» documentada en nota.
  - «Tierra» se repite para reflejar el paralelismo de origen y retorno del ser humano.
  - El tono es bíblico-digno pero en español moderno, sin depender de formulaciones tradicionales que oculten el sentido del griego.
