translation:
  language: es
  text: Como el aspecto del arco iris[a] que aparece en la nube en un día de lluvia, así era el aspecto del resplandor que lo rodeaba. Este era el aspecto de la semejanza de la gloria de Yahvé[c]. Cuando lo vi, caí rostro en tierra, y oí la voz de uno que hablaba[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''el arco''; en este contexto, con nube y lluvia, se refiere a un arco iris.'
    reason: lexical_alternative
  - marker: c
    text: La expresión hebrea es literalmente 'el aspecto de la semejanza de la gloria de Yahvé', y conserva varios niveles de calificación en el relato de la visión de Ezequiel.
    reason: theological_note
  - marker: d
    text: O 'oí una voz hablando'. El hebreo no identifica explícitamente al hablante en esta cláusula.
    reason: alternative_reading
lexical_decisions:
- source_word: כְּמַרְאֵה
  english_pob_choice: Like the appearance of
  chosen_spanish: Como el aspecto de
  alternatives_spanish:
  - Como la apariencia de
  - Tal como el aspecto de
  lexicon: HALOT
  rationale: מַרְאֶה puede referirse al aspecto visible o a la apariencia. 'Aspecto' suena natural en español y conserva la comparación introducida por כְּ sin forzar una repetición pesada de 'apariencia'.
- source_word: הַקֶּשֶׁת
  english_pob_choice: the rainbow
  chosen_spanish: el arco iris
  alternatives_spanish:
  - el arco
  - el arco iris
  lexicon: HALOT
  rationale: Aunque literalmente es 'el arco', el contexto de nube y lluvia indica claramente el fenómeno meteorológico. En español, 'arco iris' comunica con precisión el sentido y evita ambigüedad.
- source_word: בֶעָנָן בְּיוֹם הַגֶּשֶׁם
  english_pob_choice: that is in the cloud on a day of rain
  chosen_spanish: que aparece en la nube en un día de lluvia
  alternatives_spanish:
  - que está en la nube en un día de lluvia
  - que se ve en la nube en un día de lluvia
  lexicon: HALOT
  rationale: La cláusula describe el marco habitual del arco iris. 'Aparece' mantiene la visibilidad implícita del hebreo y resulta natural en español.
- source_word: הַנֹּגַהּ
  english_pob_choice: brightness
  chosen_spanish: resplandor
  alternatives_spanish:
  - brillo
  - radiancia
  lexicon: HALOT
  rationale: נֹגַהּ denota brillo luminoso o resplandor. 'Resplandor' es claro y solemne en español, y preserva la idea de una luz intensa.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en torno
  - todo alrededor
  lexicon: HALOT
  rationale: La preposición/adverbio expresa la disposición envolvente de la luz. 'Alrededor' es directo y natural.
- source_word: מַרְאֵה דְּמוּת כְּבוֹד יְהוָה
  english_pob_choice: the appearance of the likeness of the glory of Yahweh
  chosen_spanish: el aspecto de la semejanza de la gloria de Yahvé
  alternatives_spanish:
  - la apariencia de la semejanza de la gloria de Yahvé
  - el aspecto de la imagen de la gloria de Yahvé
  lexicon: HALOT
  rationale: Conviene conservar la cadena de sustantivos del hebreo sin aplanarla. 'Aspecto' y 'semejanza' mantienen la distancia prudente de la visión respecto de la realidad divina, mientras que 'Yahvé' sigue el criterio del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el término base del proyecto para el nombre divino: transliteración ''Yahvé'' en lugar de la sustitución tradicional por un título.'
- source_word: וָאֶרְאֶה
  english_pob_choice: When I saw it
  chosen_spanish: Cuando lo vi
  alternatives_spanish:
  - Y al verlo
  - Cuando vi esto
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración. 'Cuando lo vi' fluye bien en español y remite al fenómeno ya descrito.
- source_word: וָאֶפֹּל עַל פָּנַי
  english_pob_choice: I fell on my face
  chosen_spanish: caí sobre mi rostro
  alternatives_spanish:
  - caí de bruces
  - me postré
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para postración. 'Caí sobre mi rostro' conserva la imagen corporal y la solemnidad del original.
- source_word: וָאֶשְׁמַע קוֹל מְדַבֵּר
  english_pob_choice: I heard the voice of one speaking
  chosen_spanish: oí la voz de uno que hablaba
  alternatives_spanish:
  - oí una voz que hablaba
  - oí la voz de alguien que hablaba
  lexicon: HALOT
  rationale: קוֹל puede ser 'voz' o 'sonido'; aquí 'voz' encaja mejor con el participio. 'Uno que hablaba' preserva la indefinición del sujeto, sin identificarlo más de lo que hace el hebreo.
theological_decisions:
- issue: Cómo preservar la expresión apilada sobre la manifestación divina sin simplificarla
  english_pob_reading: the appearance of the likeness of the glory of Yahweh
  chosen_spanish_reading: el aspecto de la semejanza de la gloria de Yahvé
  alternative_spanish_readings:
  - la apariencia de la semejanza de la gloria de Yahvé
  - el aspecto de la gloria de Yahvé
  rationale: El hebreo acumula calificativos para mantener distancia entre la visión y la esencia divina. La traducción conserva esa cautela teológica y la estructura visionaria, sin convertirla en una afirmación más directa de lo que el texto dice.
  doctrine_reference: Translation philosophy §3; texto visionario de Ezequiel
- issue: Si identificar o no al hablante final
  english_pob_reading: the voice of one speaking
  chosen_spanish_reading: la voz de uno que hablaba
  alternative_spanish_readings:
  - la voz de alguien que hablaba
  - una voz que hablaba
  rationale: El participio hebreo no nombra al hablante. Mantener la indefinición preserva la tensión narrativa y evita introducir una identificación no explícita en el versículo.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la última revisión disponible; no se requieren cambios textuales importantes respecto del audit trail inglés. Se han ajustado únicamente las elecciones al español para naturalidad, manteniendo la misma cautela léxica y teológica.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה, conforme al criterio del proyecto.
  - Se mantiene la cadena nominal 'aspecto / semejanza / gloria' para no aplanar la visión.
  - '''Arco iris'' se usa por el contexto meteorológico, aunque el hebreo diga literalmente ''arco''.'
  - Se conserva la indefinición del hablante final con 'uno que hablaba'.
