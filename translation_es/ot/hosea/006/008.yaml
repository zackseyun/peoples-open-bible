review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: גלעד como nombre propio, קרית como ''ciudad de'', פעלי און como agentes de maldad, y conserva la dificultad de עֲקֻבָּה מִדָּם con nota. Sin embargo, ''rastreada con sangre'' no suena natural en español y puede sugerir que alguien la rastrea usando sangre, en vez de describirla como marcada por sangre. El sentido fuente de marcas/huellas sangrientas se preserva mejor con una formulación más idiomática.'
  spanish_quality_summary: La redacción es mayormente clara, pero la última frase resulta poco idiomática. 'Marcada con sangre' mantiene la ambigüedad admitida por la nota y mejora mucho la legibilidad en español eclesial general. 'Malhechores' y 'Galaad' son elecciones naturales y fieles.
  glossary_alignment: No hay conflicto con los términos del proyecto. 'Galaad' es una forma tradicional válida en español; 'malhechores' representa bien פעלי און. No intervienen términos sensibles del glosario mayor como Yahvé, Mesías o esclavo.
  issues:
  - severity: medium
    issue: La expresión 'rastreada con sangre' es poco natural en español.
    rationale: Aunque intenta seguir de cerca 'tracked with blood', en español puede leerse como una acción pasiva de rastreo más que como una cualidad de estar señalada por sangre. 'Marcada con sangre' o 'manchada con sangre' transmiten mejor la imagen documentada.
  - severity: low
    issue: La alternativa de nota 'rastreada desde sangre' es demasiado literalista y poco idiomática.
    rationale: Preserva mecánicamente 'from blood', pero en español no aclara el sentido. Conviene mantenerla solo como opción más literal si se formula como 'más literalmente, "marcada/seguida por huellas de sangre"' o dejar la literalidad inglesa fuera del español principal.
  revised_spanish_text: Galaad es una ciudad de malhechores[a], marcada con sangre.
  revised_footnotes:
  - marker: a
    text: O 'manchada con sangre', 'señalada por sangre', o más literalmente 'con huellas de sangre'. La expresión hebrea es rara y difícil.
    reason: lexical_alternative
