translation:
  language: es
  text: Y esta es la ley que Moisés puso ante los hijos de Israel.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas», «el pueblo de Israel» o, tradicionalmente, «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֹאת
  english_pob_choice: And this is
  chosen_spanish: Y esta es
  alternatives_spanish:
  - Ahora bien, esta es
  - Y esto es
  lexicon: HALOT
  rationale: La conjunción con demostrativo introduce una nueva sección; en español, «Y esta es» conserva la continuidad y la fuerza presentacional sin sonar forzado.
- source_word: הַתּוֹרָה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la Torá
  lexicon: HALOT
  rationale: En este contexto de Deuteronomio, תּוֹרָה funciona como el conjunto normativo/covenantal dado por Moisés. «Ley» es la equivalencia natural y fiel en español bíblico; «Torá» sería más transliteración que traducción.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - la cual
  - el cual
  lexicon: HALOT
  rationale: La partícula relativa se rinde de forma directa con «que», que es la opción más natural en español para esta oración restrictiva.
- source_word: שָׂם
  english_pob_choice: set before
  chosen_spanish: puso delante de
  alternatives_spanish:
  - colocó delante de
  - puso ante
  lexicon: HALOT
  rationale: El verbo שׂוּם con לִפְנֵי expresa la acción de presentar la ley al pueblo. «Puso delante de» conserva la idea concreta de colocar/presentar sin perder fluidez.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: «Delante de» reproduce bien la relación espacial y formal del hebreo, y funciona de manera idiomática en español.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  - los hijos del pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión masculina plural del hebreo como fórmula de designación nacional/covenantal. «Los hijos de Israel» es transparente en español y mantiene la forma del original mejor que una neutralización.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Standard Spanish biblical name
  rationale: Nombre propio bíblico estándar en español.
theological_decisions:
- issue: Designación corporativa masculina בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  - los hijos del pueblo de Israel
  rationale: Se mantiene la forma masculina del hebreo por fidelidad lexical y por la política de precisión de género del proyecto. Aunque el referente es colectivo, la formulación no se neutraliza en el texto principal.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El texto base y el control cruzado previo muestran alto acuerdo y no requieren cambios sustanciales; la decisión principal es mantener la estructura presentacional del hebreo y una equivalencia natural para תּוֹרָה y לִפְנֵי en español.
  spanish_consistency_notes:
  - Se conserva el orden sintáctico simple del hebreo sin añadir matices interpretativos.
  - «Ley» se usa como equivalente bíblico de תּוֹרָה en este encabezado contextual, no como sustituto automático en todo contexto.
  - La nota al pie recoge alternativas léxicas reales sin introducir una lectura doctrinal distinta.
