translation:
  language: es
  text: Y para nosotros, que hemos asumido la dureza de hacer el compendio[a], la tarea no es fácil, sino cosa de sudor y desvelo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ἐπιτομή puede traducirse también «epítome», pero aquí se prefiere «compendio» porque en el español actual «epítome» normalmente no se entiende como una obra condensada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμῖν ... τοῖς
  english_pob_choice: for us, who
  chosen_spanish: para nosotros, que
  alternatives_spanish:
  - a nosotros, que
  - para nosotros, los que
  lexicon: LSJ
  rationale: La construcción dativo + artículo + participio marca a los mismos sujetos como quienes llevan adelante la labor. En español, "para nosotros, que" conserva la auto-referencia y suena natural sin perder la relación con la tarea.
- source_word: τὴν κακοπάθειαν
  english_pob_choice: the hardship
  chosen_spanish: la penosa tarea
  alternatives_spanish:
  - la dureza
  - el sufrimiento
  - el trabajo penoso
  lexicon: LSJ
  rationale: En este prólogo editorial, κακοπάθεια señala labor dura y costosa. "Penosa tarea" transmite dificultad real sin cargar innecesariamente el texto con una idea de persecución o aflicción religiosa.
- source_word: ἐπιδεδιγμένοις
  english_pob_choice: have undertaken
  chosen_spanish: hemos asumido
  alternatives_spanish:
  - hemos emprendido
  - nos hemos encargado de
  - hemos tomado sobre nosotros
  lexicon: LSJ
  rationale: El participio perfecto medio expresa una tarea ya tomada en manos con efecto vigente. "Hemos asumido" comunica compromiso activo y continuidad en un español digno y claro.
- source_word: τῆς ἐπιτομῆς
  english_pob_choice: of making the abridgment
  chosen_spanish: de la abreviación
  alternatives_spanish:
  - de la abreviatura
  - de la epítome
  - de hacer el compendio
  lexicon: LSJ
  rationale: ἐπιτομή es una obra abreviada. En español, "abreviación" conserva el sentido de condensación escrita sin depender de "epítome", que resulta menos transparente para el lector moderno.
- source_word: οὐ ῥᾴδιον
  english_pob_choice: is not easy
  chosen_spanish: no es fácil
  alternatives_spanish:
  - no es una cosa fácil
  - no es sencillo
  - no es tarea fácil
  lexicon: LSJ
  rationale: La frase es directa y predicativa. "No es fácil" reproduce su sencillez y evita añadir matices no presentes en el griego.
- source_word: ἱδρῶτος ... καὶ ἀγρυπνίας
  english_pob_choice: a matter of sweat and sleeplessness
  chosen_spanish: asunto de sudor y desvelo
  alternatives_spanish:
  - asunto de sudor y vigilia
  - de sudor y noches en vela
  - materia de sudor y desvelo
  lexicon: LSJ
  rationale: Los genitivos describen el costo corporal y concreto de la labor. "Sudor y desvelo" conserva la imagen vívida del esfuerzo y la falta de sueño en un español natural.
- source_word: τὸ πρᾶγμα
  english_pob_choice: the task
  chosen_spanish: el asunto
  alternatives_spanish:
  - la tarea
  - el trabajo
  - el encargo
  lexicon: LSJ
  rationale: πρᾶγμα puede referirse al asunto o empresa en cuestión. Aquí, junto con la frase anterior, "asunto" suena idiomático y mantiene el tono resumido del griego.
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego de Swete y el auditorio inglés del POB, manteniendo la economía y el tono prefacial del original. La única decisión destacada es ἐπιτομή, donde el inglés optó por 'abridgment' por claridad moderna; en español se refleja con 'abreviación' para conservar ese mismo valor semántico sin depender de un helenismo poco transparente.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otras fórmulas de sustitución porque el versículo no contiene un nombre divino.
  - Se mantuvo el registro sobrio y editorial del pasaje, sin expandir el paralelismo más allá de lo que permite el griego.
  - '''Desvelo'' se eligió como equivalente natural de ἀγρυπνία, conservando la idea de falta de sueño más que la simple ''vigilia''.'
