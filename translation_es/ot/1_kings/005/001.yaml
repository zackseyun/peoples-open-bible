translation:
  language: es
  text: Y Salomón gobernaba sobre todos los reinos, desde el Río[a] hasta la tierra de los filisteos y hasta la frontera de Egipto. Le traían tributo[b] y servían a Salomón todos los días de su vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, el Éufrates.
    reason: cross_reference
  - marker: b
    text: O «regalos». El hebreo minḥah puede significar regalo, ofrenda o tributo; aquí el contexto político favorece «tributo».
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹשֵׁל
  english_pob_choice: was ruling
  chosen_spanish: gobernaba
  alternatives_spanish:
  - regía
  - estaba gobernando
  - era soberano sobre
  lexicon: HALOT
  rationale: El participio hebreo con היה expresa una acción o estado continuo en tiempo pasado. «Gobernaba» conserva bien esa duratividad y suena natural en español.
- source_word: בְּכָל הַמַּמְלָכוֹת
  english_pob_choice: over all the kingdoms
  chosen_spanish: sobre todos los reinos
  alternatives_spanish:
  - entre todos los reinos
  - sobre cada reino
  lexicon: HALOT
  rationale: La construcción con משל indica dominio «sobre». «Reinos» refleja el plural hebreo y la idea de varias entidades políticas bajo la hegemonía de Salomón.
- source_word: מִן הַנָּהָר
  english_pob_choice: from the River
  chosen_spanish: desde el Río
  alternatives_spanish:
  - desde el río
  - desde el Éufrates
  lexicon: HALOT
  rationale: En este contexto geopolítico «el Río» funciona como designación convencional del Éufrates. Se mantiene la forma breve en el texto principal y se explica en nota.
- source_word: אֶרֶץ פְּלִשְׁתִּים
  english_pob_choice: the land of the Philistines
  chosen_spanish: la tierra de los filisteos
  alternatives_spanish:
  - Filistea
  - el territorio de los filisteos
  lexicon: HALOT
  rationale: Es una versión transparente del constructo hebreo. «La tierra de los filisteos» conserva la correspondencia formal sin forzar un nombre geográfico más interpretativo.
- source_word: וְעַד גְּבוּל מִצְרָיִם
  english_pob_choice: and as far as the border of Egypt
  chosen_spanish: y hasta la frontera de Egipto
  alternatives_spanish:
  - y hasta el límite de Egipto
  - y hasta el borde de Egipto
  lexicon: HALOT
  rationale: «Hasta» expresa correctamente el alcance territorial. «Frontera de Egipto» comunica con claridad el sentido del hebreo constructo.
- source_word: מַגִּשִׁים מִנְחָה
  english_pob_choice: bringing tribute
  chosen_spanish: le traían tributo
  alternatives_spanish:
  - le traían regalos
  - presentaban tributo
  - le ofrecían tributo
  lexicon: HALOT
  rationale: מִנְחָה puede significar regalo, ofrenda o tributo. El contexto político favorece «tributo», y el dativo implícito se hace explícito en español con «le».
- source_word: וְעֹבְדִים אֶת שְׁלֹמֹה
  english_pob_choice: serving Solomon
  chosen_spanish: servían a Salomón
  alternatives_spanish:
  - trabajaban para Salomón
  - estaban sujetos a Salomón
  lexicon: HALOT
  rationale: עבד con objeto personal expresa servicio a un superior. «Servían a Salomón» mantiene ese matiz de vasallaje sin especificar más de lo que el hebreo dice.
- source_word: כָּל יְמֵי חַיָּיו
  english_pob_choice: all the days of his life
  chosen_spanish: todos los días de su vida
  alternatives_spanish:
  - durante toda su vida
  - todo el tiempo de su vida
  lexicon: HALOT
  rationale: Es un modismo hebreo estándar. La forma elegida es literal y clara en español moderno.
theological_decisions:
- issue: Alcance geopolítico de la dominación de Salomón
  english_pob_reading: Solomon was ruling over all the kingdoms from the River to the land of the Philistines and as far as the border of Egypt.
  chosen_spanish_reading: Salomón gobernaba sobre todos los reinos, desde el Río hasta la tierra de los filisteos y hasta la frontera de Egipto.
  alternative_spanish_readings:
  - Salomón reinaba sobre todos los reinos...
  - Salomón tenía dominio sobre todos los reinos...
  rationale: 'No hay una tesis doctrinal en juego, pero sí una precisión histórica/política: el texto describe hegemonía territorial, no necesariamente un único estado unificado. «Gobernaba sobre» conserva la amplitud del hebreo y la lectura auditada en inglés.'
  doctrine_reference: N/A
- issue: Sentido de מִנְחָה en contexto político
  english_pob_reading: They were bringing tribute and serving Solomon
  chosen_spanish_reading: Le traían tributo y servían a Salomón
  alternative_spanish_readings:
  - Le traían regalos y servían a Salomón
  - Le presentaban tributo y servían a Salomón
  rationale: La tensión léxica entre «regalo/ofrenda/tributo» se resuelve por el contexto de dominación de reinos. «Tributo» preserva la fuerza política del término sin convertirlo en lenguaje cultual.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés que ajustó la relación espacial de «the River» a «from the River to the land of the Philistines», por lo que en español se usó «desde el Río hasta la tierra de los filisteos» para reflejar un alcance territorial continuo y natural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Río» con mayúscula en el texto principal sigue la convención auditada del inglés para aludir al Éufrates sin sobreexplicarlo.
  - Se prefiere «gobernaba» frente a «reinaba» para reproducir la duratividad del participio hebreo sin cargar el verso con una fórmula más litúrgica que el original.
