revisions:
- from: Ellos lo provocaron a ira con sus lugares altos[a][b], y con sus imágenes talladas[c] lo hicieron celoso.
  to: Ellos lo provocaron a ira con sus lugares altos[a], y con sus imágenes talladas[b] provocaron sus celos[c].
  rationale: La revisión mantiene el sentido hebreo y las decisiones léxicas de la POB, pero mejora la naturalidad en español y corrige el aparato de notas. «Provocaron sus celos» comunica mejor la idea de קנא aplicada a Dios en contexto de idolatría, sin suavizar el lenguaje teológico.
