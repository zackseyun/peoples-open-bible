base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/019/007.yaml
  text: to love those who hate you and to hate those who love you[a]. For you have made it clear today that commanders and servants mean nothing to you; for I know today that if Absalom were alive and all of us were dead today[b], then it would be right in your eyes.
  footnotes:
  - marker: a
    text: Or, more literally, 'you have declared today that there are for you no commanders and servants.' The Hebrew idiom means that they count for nothing in your estimation.
    reason: lexical_alternative
  - marker: b
    text: Or, 'if only Absalom were alive and all of us were dead today.' Joab's wording is a sharp counterfactual accusation, not a literal report of David's words.
    reason: alternative_reading
