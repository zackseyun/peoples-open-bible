translation:
  language: es
  text: de Ozni[a], el clan de los oznitas; de Eri[b], el clan de los eritas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el clan de los oznitas». El hebreo emplea un término de clan y una forma gentilicia.
    reason: lexical_alternative
  - marker: b
    text: O «el clan de los eritas». El hebreo emplea un término de clan y una forma gentilicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/אָזְנִי
  english_pob_choice: of Ozni
  chosen_spanish: de Ozni
  alternatives_spanish:
  - para Ozni
  - a Ozni
  lexicon: HALOT
  rationale: En esta fórmula censal-genealógica, לְ delante de un nombre de antepasado marca la línea de descendencia o pertenencia del clan. En español, la preposición idiomática y fiel al valor relacional es «de», no «para» ni «a».
- source_word: מִשְׁפַּחַת
  english_pob_choice: the clan of
  chosen_spanish: el clan de
  alternatives_spanish:
  - la familia de
  lexicon: HALOT
  rationale: En contextos tribales y censales, מִשְׁפָּחָה designa una subdivisión de parentesco dentro de Israel. «Clan» conserva mejor ese sentido administrativo-genealógico que «familia».
- source_word: הָ/אָזְנִי
  english_pob_choice: the Oznites
  chosen_spanish: los oznitas
  alternatives_spanish:
  - el clan oznita
  - la familia de Ozni
  lexicon: HALOT
  rationale: La forma gentilicia con artículo señala al grupo descendiente de Ozni. En español, el plural etnónimo «los oznitas» expresa de forma natural ese colectivo; no se fuerza un singular colectivo que suena menos idiomático.
- source_word: לְ/עֵרִי
  english_pob_choice: of Eri
  chosen_spanish: de Eri
  alternatives_spanish:
  - para Eri
  - a Eri
  lexicon: HALOT
  rationale: Igual que con לְאָזְנִי, la preposición tiene valor genealógico en esta lista; por eso se rinde como «de».
- source_word: הָ/עֵרִי
  english_pob_choice: the Erites
  chosen_spanish: los eritas
  alternatives_spanish:
  - el clan erita
  - la familia de Eri
  lexicon: HALOT
  rationale: La forma gentilicia con artículo designa el grupo descendiente de Eri. El plural etnónimo «los eritas» conserva la referencia colectiva y la relación con el nombre propio.
translation_notes:
  revision_awareness: 'El pasaje coincide con la lectura auditada del texto fuente y con la traducción inglesa POB revisada: se mantuvo la estructura genealógica breve, el valor de clan de מִשְׁפַּחַת y la equivalencia relacional de לְ como «de». No hubo cambios de revisión aplicados.'
  spanish_consistency_notes:
  - 'Se conservaron los nombres propios transliterados según uso español: Ozni y Eri.'
  - Se mantuvo «clan» para מִשְׁפַּחַת por su fuerza técnico-genealógica en un censo tribal.
  - Se evitó «SEÑOR» u otras sustituciones teológicas porque el versículo no contiene el Tetragrámaton ni un término divino.
  - Los etnónimos se pusieron en plural («oznitas», «eritas») para reflejar el grupo descendiente, en paralelo al inglés POB.
