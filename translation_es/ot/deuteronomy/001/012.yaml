    rationale: Aunque puede significar trabajo penoso, en español general suele asociarse a empeño, afición o diligencia. Aquí el hebreo apunta a la carga/molestia/dificultad que Moisés debe llevar.
  - severity: medium
    issue: La nota [a] está anclada en «yo solo» en vez de preservar la alternativa léxica de רִיב
    rationale: El audit trail inglés documenta la nota sobre «your disputes» con alternativas como ‘strife’ o ‘legal cases’. La nota española debería corresponder a «pleitos/disputas», no a una explicación redundante de לְבַדִּי.
