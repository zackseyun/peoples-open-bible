review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: imperativo de duelo, razón introducida por כִּי, inminencia del día de Yahvé, y el símil de destrucción procedente del Todopoderoso. También preserva correctamente Yahvé para יְהוָה y traduce שַׁדַּי como título. Sin embargo, hay dos ajustes de fidelidad/estilo: la nota [a] está mal formulada porque repite la misma opción del texto en vez de dar la alternativa documentada; y «desde el Todopoderoso» suena menos natural que «de parte del Todopoderoso» o «del Todopoderoso» para מִן en este contexto de procedencia agente.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «Aullad» suena algo marcado y animalizante en registro eclesial amplio; «Giman» o «Lloren a gritos» sería más natural, aunque no es indispensable si se quiere conservar la intensidad. Más importante, «cercano está» resulta algo invertido; «está cerca» lee mejor en español contemporáneo sin perder solemnidad. El cierre con «de parte del Todopoderoso» mejora fluidez y naturalidad frente a «desde».
  glossary_alignment: Alineación fuerte con la glosa del proyecto en «Yahvé» para יְהוָה y «Todopoderoso» para שַׁדַּי. No hay conflicto terminológico mayor. La decisión sobre הֵילִילוּ podría afinarse por legibilidad española, pero sigue dentro del campo semántico permitido. La nota sobre el juego de palabras debe mantenerse.
  issues:
  - severity: medium
    issue: La nota [a] repite «Aullad» como alternativa.
    rationale: La nota inglesa preserva la alternativa 'Howl' frente al texto principal 'Wail'. En español, si el texto principal permanece «Aullad», la nota no puede decir «O «Aullad»». Debe ofrecer una alternativa real, por ejemplo «O «Giman»» o ajustarse junto con el texto principal.
  - severity: medium
    issue: «Desde el Todopoderoso» es poco idiomático en español para expresar procedencia de juicio.
    rationale: מִן marca origen/fuente; en este contexto profético, «de parte del Todopoderoso» o «del Todopoderoso» suena más natural y claro que una procedencia espacial con «desde».
  - severity: low
    issue: «Cercano está» suena algo forzado.
    rationale: Aunque entendible, «está cerca» comunica mejor en español moderno y conserva la inminencia del hebreo sin inversión innecesaria.
  revised_spanish_text: ¡Giman[a], porque está cerca el día de Yahvé; vendrá como destrucción de parte del Todopoderoso[b].
