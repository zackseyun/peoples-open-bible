theological_decisions:
- issue: Rendering the divine title וּפַחַד יִצְחָק
  chosen_reading: the Fear of Isaac
  alternative_readings:
  - the One whom Isaac fears
  - the Dread of Isaac
  rationale: The Hebrew uses an unusual title for God. Preserving the idiom in the main text maintains the text's distinctive theological expression and avoids prematurely resolving it into an explanatory paraphrase. Because English readers may misconstrue the phrase, an explanatory alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Sense of וַיּוֹכַח in context
  chosen_reading: he rebuked you
  alternative_readings:
  - he judged
  - he decided between us
  - he reproved
  rationale: The verb can carry juridical or reproof nuance. In Genesis 31 the immediate referent is God's warning to Laban the previous night, so 'rebuked you' best reflects the narrative action while still implying divine judgment.
  doctrine_reference: Translation philosophy §1, §5
