  glossary_alignment: No hay términos del glosario maestro especialmente implicados aquí. La elección «Coré/coreítas» es aceptable como excepción onomástica tradicional en español eclesial. «Clanes» alinea bien con la decisión documentada para מִשְׁפְּחֹת. Se recomienda ajustar «Assir» a «Asir» para coherencia ortográfica española.
