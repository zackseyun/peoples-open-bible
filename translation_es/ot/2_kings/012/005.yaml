base_translation:
  language: en
  yaml_path: translation/ot/2_kings/012/005.yaml
  text: And Jehoash said to the priests[a], “All the money of the holy things that is brought into the house of Yahweh—the money of each man who passes over, the money of the valuation of persons[c][b], and all the money that comes up on a man’s heart to bring into the house of Yahweh—”
  footnotes:
  - marker: a
    text: Or, more literally, “the money of everyone who passes over”; likely the census payment required from those counted (compare Exod 30:13–16).
    reason: lexical_alternative
  - marker: b
    text: Or “the money for the valuation of persons,” likely referring to payments associated with vowed valuations (compare Lev 27:2–8).
    reason: cross_reference
  - marker: c
    text: 'Hebrew idiom: “that comes up upon a man’s heart,” meaning what someone freely purposes to give.'
    reason: cultural_note
