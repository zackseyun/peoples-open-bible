translation:
  language: es
  text: 'Así dice Yahvé: Maldito el hombre[b] que confía en el hombre y hace de la carne su brazo[a], cuyo corazón se aparta de Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «hace de la carne su brazo». «Brazo» conserva la imagen de fuerza o apoyo; no se está diciendo que la carne sea literalmente un brazo.
    reason: lexical_alternative
  - marker: b
    text: «El hombre» aquí traduce formas hebreas masculinas singulares usadas en sentido representativo.
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Esto es lo que dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se conserva de manera natural en español con «Así dice», que mantiene el tono solemne y oracular. Se usa «Yahvé» para יהוה conforme al criterio del proyecto, preservando el nombre divino personal.
- source_word: אָרוּר
  english_pob_choice: Cursed
  chosen_spanish: Maldito
  alternatives_spanish:
  - Maldicho
  - Bajo maldición
  lexicon: HALOT
  rationale: «Maldito» transmite bien la fuerza judicial y pactual del hebreo en español moderno. «Bajo maldición» sería más explicativo, pero menos directo.
- source_word: הַגֶּבֶר
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el varón
  lexicon: HALOT
  rationale: Se conserva el singular masculino representativo del hebreo. «El hombre» es la forma más natural y fiel en este contexto proverbial.
- source_word: יִבְטַח בָּאָדָם
  english_pob_choice: trusts in man
  chosen_spanish: confía en el hombre
  alternatives_spanish:
  - confía en la humanidad
  - confía en un ser humano
  lexicon: HALOT
  rationale: «Confiar en» expresa adecuadamente el verbo hebreo en este contexto. «El hombre» mantiene el paralelismo con el verso y el contraste entre la confianza humana y la dependencia de Yahvé.
- source_word: בָּשָׂר
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - mortalidad
  - naturaleza humana
  lexicon: HALOT
  rationale: «Carne» conserva la imagen bíblica y el contraste de fragilidad humana. No se suaviza a «naturaleza humana», porque el hebreo usa lenguaje concreto y no técnico.
- source_word: זְרֹעוֹ
  english_pob_choice: his arm
  chosen_spanish: su brazo
  alternatives_spanish:
  - su fuerza
  - su poder
  lexicon: HALOT
  rationale: 'Se conserva la metáfora corporal de «brazo», como hizo la revisión inglesa más reciente, para reflejar la imagen del original. En español suena natural y deja visible la ironía: poner la carne por apoyo o fuerza.'
- source_word: וּמִן יְהוָה יָסוּר לִבּוֹ
  english_pob_choice: whose heart turns away from Yahweh
  chosen_spanish: cuyo corazón se aparta de Yahvé
  alternatives_spanish:
  - y su corazón se desvía de Yahvé
  - cuyo corazón se aleja de Yahvé
  lexicon: HALOT
  rationale: «Apartarse de» comunica bien el hebreo יָסוּר con una orientación de desvío/retirada. «Corazón» mantiene el sentido bíblico del centro de la voluntad y lealtad interior.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el principio del proyecto de traducir el Tetragrámaton con el nombre divino transliterado, no con una sustitución litúrgica. Esto preserva la identidad personal del Dios del pacto.
  doctrine_reference: DOCTRINE.md §Nombre divino / Tetragrámaton
- issue: Metáfora de זְרֹעוֹ
  english_pob_reading: his arm
  chosen_spanish_reading: su brazo
  alternative_spanish_readings:
  - su fuerza
  - su poder
  rationale: La revisión inglesa más reciente recupera la imagen literal de «arm» para conservar el imaginería del hebreo. En español, «su brazo» mantiene esa concreción y evita una paráfrasis que borre la imagen corporal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: Lenguaje masculino representativo
  english_pob_reading: the man / man
  chosen_spanish_reading: el hombre / el hombre
  alternative_spanish_readings:
  - la persona
  - ser humano
  rationale: El hebreo usa formas masculinas singulares con sentido representativo. Se mantiene esa forma para no aplanar la marcación del texto fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente al conservar la imagen de «brazo» para זְרֹעוֹ, en lugar de una equivalencia más abstracta como «fuerza». Se mantiene también el giro profético formal y el paralelismo del hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה.
  - Se conservó «hombre» como singular representativo, acorde con el hebreo.
  - «Carne» se mantiene como término bíblico concreto, sin convertirlo en una explicación abstracta.
  - «Corazón» se preserva como centro interior de decisión y lealtad.
