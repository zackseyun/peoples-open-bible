translation:
  language: es
  text: Acuérdate de ellos[a], mi Dios, porque han profanado el sacerdocio y el pacto del sacerdocio y los levitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: “Acuérdate de ellos, mi Dios, con respecto a los profanadores del sacerdocio y el pacto del sacerdocio y los levitas.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכְרָה
  english_pob_choice: Remember
  chosen_spanish: Acuérdate
  alternatives_spanish:
  - Recuerda
  - Haz memoria
  lexicon: HALOT
  rationale: El hebreo expresa una súplica directa a Dios; en español, el imperativo pronominal "acuérdate" conserva ese tono de petición personal y natural. Mantiene el valor de "remember" sin volverlo mecánico.
- source_word: לָהֶם
  english_pob_choice: them
  chosen_spanish: de ellos
  alternatives_spanish:
  - contra ellos
  - por ellos
  lexicon: HALOT
  rationale: Como en el inglés POB, no se fuerza el sentido adversativo dentro del pronombre mismo. En español, "de ellos" funciona con el giro "Acuérdate de" y deja que la cláusula causal posterior explicite el juicio.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - Dios mío
  lexicon: HALOT
  rationale: El sufijo de primera persona se conserva de forma directa y reverente con "mi Dios", una forma clara y bíblica en español.
- source_word: עַל
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - por
  - con respecto a
  lexicon: HALOT
  rationale: El valor causal señalado por el POB en inglés se expresa naturalmente con "porque", evitando sobrecargar la sintaxis con una traducción demasiado literal de la preposición.
- source_word: גָּאֳלֵי
  english_pob_choice: they have defiled
  chosen_spanish: han profanado
  alternatives_spanish:
  - han contaminado
  - han mancillado
  lexicon: HALOT
  rationale: Se sigue la lectura verbal del POB para esta forma participial usada sustantivamente. "Profanado" comunica bien la idea de contaminar lo sagrado y mantiene el peso religioso del pasaje.
- source_word: הַכְּהֻנָּה
  english_pob_choice: the priesthood
  chosen_spanish: el sacerdocio
  alternatives_spanish:
  - el oficio sacerdotal
  - la clase sacerdotal
  lexicon: HALOT
  rationale: En español, "sacerdocio" reproduce mejor el sustantivo abstracto institucional que "sacerdotes". Conserva la referencia al orden/estado sacerdotal, no solo a personas individuales.
- source_word: וּבְרִית הַכְּהֻנָּה
  english_pob_choice: the covenant of the priesthood
  chosen_spanish: el pacto del sacerdocio
  alternatives_spanish:
  - el pacto sacerdotal
  - el pacto con el sacerdocio
  lexicon: HALOT
  rationale: Se mantiene la relación genitiva del hebreo sin resolverla de más. "Pacto del sacerdocio" sigue de cerca el POB y evita elegir prematuramente entre un pacto perteneciente al sacerdocio o con el sacerdocio.
- source_word: וְהַלְוִיִּם
  english_pob_choice: and the Levites
  chosen_spanish: y de los levitas
  alternatives_spanish:
  - y los levitas
  lexicon: HALOT
  rationale: La coordinación hebrea es compacta y puede extender el alcance del sintagma anterior. En español, "y de los levitas" conserva esa posible dependencia sintáctica sin forzar una reestructuración explicativa.
theological_decisions:
- issue: Si la petición "acuérdate" debe sonar favorable o judicial
  english_pob_reading: Unfavorable remembrance in view of their defilement
  chosen_spanish_reading: Recuerdo con sentido judicial, no favorable
  alternative_spanish_readings:
  - Recuerda simplemente
  - Tenlos presentes
  rationale: El contexto de profanación obliga a leer la súplica como una petición de juicio o de toma de cuenta. La frase causal "porque han profanado..." preserva esa tensión sin alterar el verbo principal.
  doctrine_reference: Translation philosophy §1, §3
- issue: Alcance de "el pacto del sacerdocio y de los levitas"
  english_pob_reading: A covenant pertaining to the priesthood and the Levites together
  chosen_spanish_reading: Un pacto relacionado con el sacerdocio y los levitas en conjunto
  alternative_spanish_readings:
  - Un pacto del sacerdocio y aparte de los levitas
  - Un pacto con los sacerdotes y los levitas
  rationale: 'La sintaxis española mantiene la ambigüedad controlada del hebreo: no se separan artificialmente dos pactos ni se especifica más de lo que permite el texto. Se conserva así la tensión exegética documentada por el POB.'
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El pasaje muestra alta convergencia entre el texto hebreo, la solución inglesa POB y la presente redacción. No hubo revisiones aplicadas en la pasada más reciente; se conserva la lectura causal/judicial y la ambigüedad controlada de la segunda mitad del verso.
  spanish_consistency_notes:
  - Se mantiene "Dios" para אֱלֹהַי conforme al estándar del proyecto.
  - Se usa "sacerdocio" para הַכְּהֻנָּה por ser un sustantivo institucional abstracto.
  - Se preserva "levitas" en minúscula común en español bíblico, salvo al inicio de frase, por tratarse de un etnónimo/categoría.
  - La nota al pie reproduce la alternativa lexical documentada por el POB sin introducir una glosa ajena al auditable.
