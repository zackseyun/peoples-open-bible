    rationale: בגד es ‘garment/clothing’. «Vestidura» mantiene el tono digno y el campo semántico de cobertura en una forma más literaria y bíblica, sin caer en arcaísmo duro.
  - severity: low
    issue: El cierre «en sus manos hay actos de violencia» es menos directo que el hebreo.
    rationale: La cláusula nominal hebrea se representa mejor con «hay violencia en sus manos» o «actos de violencia están en sus manos». Dado el audit trail inglés revisado, conviene mantener el plural de actos/deeds, pero con orden más natural y enfático en español.
