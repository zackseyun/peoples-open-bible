id: COL.2.8
reference: Colossians 2:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Βλέπετε μή τις ὑμᾶς ἔσται ὁ συλαγωγῶν διὰ τῆς φιλοσοφίας καὶ κενῆς ἀπάτης κατὰ τὴν παράδοσιν τῶν ἀνθρώπων, κατὰ τὰ στοιχεῖα τοῦ κόσμου καὶ οὐ κατὰ Χριστόν·
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/008.yaml
  text: See to it that no one takes you captive through philosophy and empty deceit, according to human tradition, according to the elemental principles of the world, and not according to Messiah.
translation:
  language: ko
  text: 아무도 철학과 헛된 속임수로, 곧 사람의 전통을 따르고 세상의 초보적 원리[a]를 따르며 메시아를 따르지 않는 것으로 여러분을 사로잡지 못하도록 조심하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「세상의 영적 권세들」. 헬라어 στοιχεῖα는 기본 원리들이나 우주적 영적 권세들 모두를 가리킬 수 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: Βλέπετε μή τις
  english_pob_choice: See to it that no one
  chosen_korean: 아무도 ... 못하도록 조심하십시오
  alternatives_korean:
  - 아무도 ~하지 못하게 주의하십시오
  - 누구도 ~하지 못하도록 살피십시오
  lexicon: BDAG
  rationale: 명령적 경고. 「조심하십시오」가 합쇼체에서 자연스럽다.
- source_word: ἔσται ὁ συλαγωγῶν
  english_pob_choice: takes you captive
  chosen_korean: 사로잡지
  alternatives_korean:
  - 포로로 끌어가지
  - 노략하지
  lexicon: BDAG
  rationale: συλαγωγέω의 「약탈물처럼 끌어감」을 「사로잡다」로 옮긴다.
- source_word: διὰ τῆς φιλοσοφίας καὶ κενῆς ἀπάτης
  english_pob_choice: through philosophy and empty deceit
  chosen_korean: 철학과 헛된 속임수로
  alternatives_korean:
  - 철학과 허망한 속임수를 통하여
  - 철학 곧 헛된 속임수로
  lexicon: BDAG
  rationale: διά + 속격을 「~으로」(수단)로 옮긴다. κενός는 「헛된」.
- source_word: κατὰ τὴν παράδοσιν τῶν ἀνθρώπων
  english_pob_choice: according to human tradition
  chosen_korean: 사람의 전통을 따르고
  alternatives_korean:
  - 인간의 전통대로
  lexicon: BDAG
  rationale: κατά + 대격을 「~을 따르고」로 옮긴다. 「사람의」는 성별-포괄성을 살린다.
- source_word: κατὰ τὰ στοιχεῖα τοῦ κόσμου
  english_pob_choice: according to the elemental principles of the world
  chosen_korean: 세상의 초보적 원리를 따르며
  alternatives_korean:
  - 세상의 영적 권세들을 따라
  - 세상 기초 원리를 따라
  lexicon: BDAG
  rationale: στοιχεῖα의 모호성을 「초보적 원리」로 보존하고, 영적 권세 해석은 각주로 둔다.
- source_word: οὐ κατὰ Χριστόν
  english_pob_choice: and not according to Messiah
  chosen_korean: 메시아를 따르지 않는 것으로
  alternatives_korean:
  - 그리스도를 따르지 아니하는 것으로
  lexicon: BDAG
  rationale: Χριστός는 칭호 「메시아」. 인간 전통·세상 원리와 대조되는 표준이다.
theological_decisions:
- issue: στοιχεῖα τοῦ κόσμου의 의미
  chosen_reading: 세상의 초보적 원리
  alternative_readings:
  - 세상의 영적 권세들
  - 세상의 기초 원리들
  rationale: 본 어구는 학계에서 논쟁적이다. 본 번역은 「초보적 원리」로 모호성을 보존하고, 인격적 영적 존재의 해석은 각주로 보존한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension'
