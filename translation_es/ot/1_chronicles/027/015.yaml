translation:
  language: es
  text: El duodécimo, para el duodécimo mes, era Heldai[a] el netofatita, de Otniel[b]; y sobre su división había veinticuatro mil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas tradiciones paralelas leen el nombre como 'Heled' en vez de 'Heldai'.
    reason: cross_reference
  - marker: b
    text: O sea, 'perteneciente a Otniel' o 'descendiente de Otniel'. La construcción hebrea probablemente indica afiliación familiar o clánica.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְּׁנֵים עָשָׂר
  english_pob_choice: The twelfth
  chosen_spanish: El duodécimo
  alternatives_spanish:
  - El duodécimo hombre
  - El duodécimo jefe
  lexicon: HALOT
  rationale: El hebreo funciona como ordinal en una fórmula administrativa/militar. En español, 'el duodécimo' conserva esa función elíptica sin añadir un sustantivo no expresado.
- source_word: לִשְׁנֵים עָשָׂר הַחֹדֶשׁ
  english_pob_choice: for the twelfth month
  chosen_spanish: para el duodécimo mes
  alternatives_spanish:
  - del duodécimo mes
  - para el mes duodécimo
  lexicon: HALOT
  rationale: La preposición ל marca asignación o designación en la serie mensual. 'Para el duodécimo mes' reproduce bien la relación funcional y suena natural en español.
- source_word: חֶלְדַּי
  english_pob_choice: Heldai
  chosen_spanish: Heldai
  alternatives_spanish:
  - Heled
  lexicon: HALOT
  rationale: Se translitera el nombre según la forma consonántica del versículo. Se mantiene 'Heldai' porque es la lectura del texto base, sin borrar la variante paralela documentada.
- source_word: הַנְּטוֹפָתִי
  english_pob_choice: the Netophathite
  chosen_spanish: el netofatita
  alternatives_spanish:
  - el hombre de Netofá
  - el netofatita
  lexicon: HALOT
  rationale: Es un gentilicio de procedencia. 'Netofatita' conserva la relación con Netofá de manera breve y reconocible en español bíblico moderno.
- source_word: לְעָתְנִיאֵל
  english_pob_choice: of Othniel
  chosen_spanish: de Otniel
  alternatives_spanish:
  - perteneciente a Otniel
  - descendiente de Otniel
  lexicon: HALOT
  rationale: La ל prefijada suele indicar pertenencia o afiliación familiar/clánica. 'De Otniel' preserva la ambigüedad entre pertenencia y descendencia, como en el inglés POB.
- source_word: וְעַל מַחֲלֻקְתּוֹ
  english_pob_choice: and over his division were
  chosen_spanish: y sobre su división había
  alternatives_spanish:
  - y sobre su división estaban
  - y en su división había
  lexicon: HALOT
  rationale: מַחֲלֻקָה en este capítulo denota una división militar. 'Sobre su división' mantiene עַל y 'había' permite un español fluido sin perder la relación de supervisión/encargo implícita.
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  english_pob_choice: twenty-four thousand
  chosen_spanish: veinticuatro mil
  alternatives_spanish:
  - '24.000'
  - veinticuatro millares
  lexicon: HALOT
  rationale: El cardinal se expresa con número escrito en prosa bíblica. 'Veinticuatro mil' conserva exactitud y naturalidad idiomática.
theological_decisions:
- issue: 'Ambigüedad de לְעָתְנִיאֵל: pertenencia, descendencia o afiliación clanica'
  english_pob_reading: 'of Othniel; footnote: ''belonging to Othniel'' or ''descended from Othniel.'' The Hebrew construction likely indicates family or clan affiliation.'
  chosen_spanish_reading: de Otniel, con nota sobre pertenencia o descendencia
  alternative_spanish_readings:
  - perteneciente a Otniel
  - descendiente de Otniel
  rationale: No se debe resolver artificialmente una relación que el hebreo deja abierta. 'De Otniel' reproduce la ambigüedad y la nota explica la posible afiliación familiar o clánica.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió la lectura del texto hebreo masorético tal como aparece en WLC, y se mantuvo la solución del POB inglés para el nombre propio y la relación de pertenencia. No se introdujeron cambios derivados de tradiciones paralelas, excepto registrarlas en nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como término por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - '''Netofatita'' se mantiene como gentilicio bíblico breve y consistente con otros nombres de procedencia en la serie.'
  - '''Otniel'' sigue la transliteración usual en español; se evita ''Othniel'' para mayor coherencia fonética en español, aunque se preserva la nota de relación familiar.'
