  rationale: Se ajustó una expresión para un español más natural y más cercano al sentido contextual del hebreo («harán fuego» en vez de «encenderán fuego»), y se sustituyó la nota a por la alternativa léxica principal atestiguada en la auditoría inglesa. Se mantuvo el resto porque es fiel al fuente y al criterio terminológico del proyecto.
