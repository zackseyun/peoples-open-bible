revisions:
- from: entonces, oye en el cielo[a], el lugar donde habitas, perdona, actúa y da a cada hombre según todos sus caminos, cuyo corazón conoces; porque tú solo conoces el corazón de todos los hijos del hombre[b].
  to: entonces, escucha en el cielo, el lugar donde habitas, perdona, actúa y da a cada hombre según todos sus caminos, cuyo corazón conoces, porque solo tú conoces el corazón de todos los hijos del hombre[a].
  rationale: Se elimina la nota innecesaria sobre 'en el cielo' y se conserva la aclaración importante sobre la expresión hebrea 'todos los hijos del hombre'. Además, se mejora levemente la naturalidad y el tono de la súplica con 'escucha' y 'solo tú', sin alterar las decisiones léxicas y teológicas del POB.
