  text: וְ/הָיָ֡ה אִם לָמֹ֣ד יִלְמְדוּ֩ אֶת דַּֽרְכֵ֨י עַמִּ֜/י לְ/הִשָּׁבֵ֤עַ בִּ/שְׁמִ/י֙ חַי יְהוָ֔ה כַּ/אֲשֶׁ֤ר לִמְּדוּ֙ אֶת עַמִּ֔/י לְ/הִשָּׁבֵ֖עַ בַּ/בָּ֑עַל וְ/נִבְנ֖וּ בְּ/ת֥וֹךְ עַמִּֽ/י־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/012/016.yaml
  text: And it will happen that if they indeed learn the ways of my people[a], to swear by my name, ‘As Yahweh lives,’ just as they taught my people to swear by Baal[c][b], then they will be built up in the midst of my people.
  footnotes:
  - marker: a
    text: Or, 'surely learn' or 'fully learn'; the Hebrew uses an infinitive absolute with the finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew oath formula: ''As the LORD lives.'' Also rendered, ''The LORD lives.'''
    reason: lexical_alternative
  - marker: c
    text: Or, 'they will be established among my people.' The Hebrew literally says 'they will be built up in the midst of my people.'
    reason: alternative_reading
