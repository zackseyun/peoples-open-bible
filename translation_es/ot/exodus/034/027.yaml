translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés: «Escribe estas palabras para ti, porque según estas palabras he hecho[a] un pacto contigo y con Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «cortar un pacto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: conservar el nombre divino en vez de sustituirlo por un título. En español, ''Yahvé'' es la forma transparente y de uso bíblico más neutral dentro de la tradición del POB.'
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: El imperfecto narrativo con waw consecutiva se vierte de manera natural como 'dijo' en la introducción del discurso directo.
- source_word: כְּתָב
  english_pob_choice: Write
  chosen_spanish: Escribe
  alternatives_spanish:
  - Anota
  - Escríbelo
  lexicon: HALOT
  rationale: El imperativo masculino singular de כתב exige un mandato directo; 'Escribe' preserva la fuerza verbal sin añadir matices no presentes en el hebreo.
- source_word: לְךָ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti mismo
  - por ti
  lexicon: HALOT
  rationale: Se conserva el dativo enfático/ético con una formulación natural en español. 'Para ti' mantiene la implicación personal sin sobrecargar el tono.
- source_word: הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - estos asuntos
  lexicon: HALOT
  rationale: '''דְּבָרִים'' en contexto legal/pactual se entiende mejor como ''palabras'', y además armoniza con el mandato de escribir.'
- source_word: כִּי עַל פִּי
  english_pob_choice: for according to
  chosen_spanish: porque conforme a
  alternatives_spanish:
  - pues conforme a
  - porque según
  lexicon: HALOT
  rationale: Se preserva la relación causal de כִּי y el sentido idiomático de עַל פִּי como conformidad o ajuste a una norma. 'Conforme a' mantiene el registro formal y la idea legal/pactual.
- source_word: כָּרַתִּי בְּרִית
  english_pob_choice: I have made a covenant
  chosen_spanish: he hecho un pacto
  alternatives_spanish:
  - he cortado un pacto
  - he establecido un pacto
  lexicon: HALOT
  rationale: '''Hecho un pacto'' comunica de forma natural en español el valor de la expresión hebrea, sin ocultar que el original dice literalmente ''cortar un pacto''. Se evita forzar un calco oscuro en el texto principal.'
- source_word: אִתְּךָ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con ustedes
  lexicon: HALOT
  rationale: El pronombre preposicional se integra de manera idiomática en español. 'Contigo' mantiene la referencia directa a Moisés como parte del pacto.
- source_word: וְאֶת יִשְׂרָאֵל
  english_pob_choice: and with Israel
  chosen_spanish: y con Israel
  alternatives_spanish:
  - e Israel
  lexicon: HALOT
  rationale: Se conserva la marca de inclusión pactual con una preposición explícita, mostrando que Israel también queda incluido en la alianza y no sólo como objeto adicional.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se mantiene la política del POB de no ocultar el nombre divino mediante 'SEÑOR'. 'Yahvé' es el equivalente español más claro y consistente con la decisión del texto base.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahweh/Yahvé'
- issue: Idiomático de pacto כָּרַתִּי בְּרִית
  english_pob_reading: I have made a covenant
  chosen_spanish_reading: he hecho un pacto
  alternative_spanish_readings:
  - he cortado un pacto
  - he establecido un pacto
  rationale: El español común usa 'hacer un pacto' para expresar correctamente la relación establecida. La literalidad 'cortar' se reserva para nota por ser menos natural en el flujo del verso.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incluyendo el marcador [a] exactamente en el texto principal junto al destinatario del discurso. El resto del versículo se ajusta al registro formal y a la decisión léxica del POB para YHWH y la fórmula de pacto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el estándar del proyecto para יהוה.
  - '''Pacto'' se emplea como equivalente natural de בְּרִית, mientras que la literalidad ''cortar un pacto'' queda documentada en nota.'
  - '''Contigo y con Israel'' conserva el valor inclusivo del hebreo con claridad para lectores modernos.'
  - La puntuación con comillas angulares es compatible con estilo editorial bíblico en español.
