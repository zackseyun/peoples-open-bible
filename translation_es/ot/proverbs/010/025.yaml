review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo y sigue de cerca la auditoría inglesa: cláusula temporal con כַּעֲבוֹר, imagen de סוּפָה como tormenta, contraste adversativo entre el malvado y el justo, y la idea de desaparición resultante en וְאֵין. También preserva correctamente el singular representativo proverbial. Sin embargo, «es un cimiento eterno» añade el verbo copulativo que no está en el hebreo y debilita la fuerza nominal y lapidaria del paralelo; además, «cimiento eterno» suena menos idiomático en español bíblico natural que «fundamento eterno/perdurable».'
  spanish_quality_summary: 'El español es claro y digno, pero «el impío ya no existe» suena algo abstracto y filosófico; «ya no está» o «desaparece» serían más idiomáticos, aunque la nota ya explica bien el literal. El ajuste principal necesario es la cola del versículo: una formulación nominal como «pero el justo[aquí sin nota] es fundamento eterno» o mejor aún «pero el justo, fundamento eterno» necesita balancear fidelidad y naturalidad. Para lectura continua, «pero el justo es fundamento eterno» es la mejor reparación mínima.'
  glossary_alignment: No hay conflictos con la terminología de proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. La elección de «impío» y «justo» concuerda con la decisión teológica documentada sobre el singular representativo, aunque «malvado» también sería posible. «Fundamento» alinea mejor con יְסוֹד que «cimiento» en este contexto proverbial.
  issues:
  - severity: medium
    issue: «cimiento» es menos natural que «fundamento» para יְסוֹד en este proverbio
    rationale: Aunque léxicamente posible, «cimiento eterno» suena rígido en español general eclesial. «Fundamento eterno» preserva mejor la fuerza metafórica y la legibilidad.
  - severity: low
    issue: La formulación «ya no existe» puede sonar demasiado abstracta
    rationale: Comunica bien la desaparición, pero en un proverbio de juicio «ya no está» o «desaparece» suenan más naturales. No obstante, no es una desviación grave del sentido y puede mantenerse con la nota literal.
  revised_spanish_text: Cuando pasa la tormenta[a], el impío[b] ya no existe, pero el justo es fundamento eterno.
  revised_footnotes:
  - marker: a
    text: 'También puede entenderse: «Cuando pasa el torbellino» o «Al pasar la tormenta».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «y no hay impío». El sentido es que el impío desaparece o perece.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «cimiento» por «fundamento» para una correspondencia más natural y ampliamente inteligible con יְסוֹד en español bíblico contemporáneo, sin cambiar el sentido documentado. Se conservan las notas existentes porque siguen siendo pertinentes y están bien ancladas.
