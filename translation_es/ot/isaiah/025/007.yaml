    text: Or 'the shroud that shrouds all peoples.' The Hebrew uses repeated cognate terms for a covering wrapped over humanity.
    reason: lexical_alternative
  - marker: b
    text: The 'veil' or 'covering' likely anticipates the swallowing up of death in the next verse, though the image may also suggest a broader removal of what lies over the nations.
    reason: cross_reference
