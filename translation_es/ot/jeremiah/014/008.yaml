translation:
  language: es
  text: Oh Esperanza de Israel, su Salvador en tiempo de angustia, ¿por qué habrías de ser como un extranjero en la tierra[a], como un viajero que se aparta para pasar la noche[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'como un forastero en la tierra'.
    reason: lexical_alternative
  - marker: b
    text: O 'como un viajero que se aparta solo para alojarse'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְוֵה
  english_pob_choice: Hope
  chosen_spanish: Esperanza
  alternatives_spanish:
  - esperanza
  - confianza
  - expectativa
  lexicon: HALOT
  rationale: En este vocativo dirigido a Dios, el sustantivo abstracto expresa a aquel en quien Israel espera. 'Esperanza' conserva el valor teológico y el tono de invocación mejor que una opción concreta como 'reunión' o 'depósito'.
- source_word: מוֹשִׁיעוֹ
  english_pob_choice: his Savior
  chosen_spanish: su Salvador
  alternatives_spanish:
  - su libertador
  - el que lo salva
  - su salvador
  lexicon: HALOT
  rationale: El sufijo de tercera persona masculina singular refiere a Israel como singular colectivo. 'Su Salvador' mantiene la relación gramatical y el sentido de rescate divino en un español natural.
- source_word: בְּעֵת צָרָה
  english_pob_choice: in time of distress
  chosen_spanish: en tiempo de angustia
  alternatives_spanish:
  - en tiempo de aflicción
  - en tiempo de tribulación
  - en tiempo de apuro
  lexicon: HALOT
  rationale: '''Angustia'' comunica bien la crisis intensa de צָרָה sin volver la frase pesada o demasiado arcaica; mantiene el matiz de situación apremiante.'
- source_word: לָמָּה תִהְיֶה
  english_pob_choice: why should you be
  chosen_spanish: ¿por qué habrías de ser
  alternatives_spanish:
  - ¿por qué serías
  - ¿por qué estarías
  - ¿por qué serás
  lexicon: HALOT
  rationale: La forma imperfecta tiene fuerza retórica modal. 'Habrías de ser' reproduce mejor la protesta lamentosa que un simple futuro o una pregunta neutra.
- source_word: כְּגֵר בָּאָרֶץ
  english_pob_choice: like a foreigner in the land
  chosen_spanish: como un extranjero en la tierra
  alternatives_spanish:
  - como un forastero en la tierra
  - como un residente foráneo en la tierra
  - como un peregrino en la tierra
  lexicon: HALOT
  rationale: גֵר denota a un no integrante del grupo de pertenencia. 'Extranjero' es claro y natural en español, aunque 'forastero' o 'peregrino' puedan sugerir matices cercanos.
- source_word: וּכְאֹרֵחַ
  english_pob_choice: like a traveler
  chosen_spanish: como un viajero
  alternatives_spanish:
  - como un caminante
  - como un transeúnte
  - como un forastero de paso
  lexicon: HALOT
  rationale: El término designa a alguien en ruta. 'Viajero' es transparente en español moderno y evita el arcaísmo de 'viandante' o 'wayfarer'.
- source_word: נָטָה לָלוּן
  english_pob_choice: who turns aside to spend the night
  chosen_spanish: que se aparta para pasar la noche
  alternatives_spanish:
  - que se desvía para alojarse
  - que se detiene solo para pernoctar
  - que hace un alto para dormir
  lexicon: HALOT
  rationale: La expresión combina la idea de apartarse con la de alojarse. 'Se aparta para pasar la noche' conserva ambos componentes sin sobreexplicar ni perder el movimiento implícito.
theological_decisions:
- issue: Dirección vocativa y títulos predicativos de Dios
  english_pob_reading: 'Render the opening as a direct vocative to God: ''O Hope of Israel, his Savior in time of distress'''
  chosen_spanish_reading: 'Traducir el inicio como una invocación directa a Dios: ''Oh Esperanza de Israel, su Salvador en tiempo de angustia'''
  alternative_spanish_readings:
  - Oh esperanza de Israel, su salvador en tiempo de angustia
  - Esperanza de Israel y su Salvador en tiempo de angustia
  - Oh Esperanza de Israel, el que lo salva en tiempo de angustia
  rationale: El verso es una súplica dirigida a Yahvé; por eso los sustantivos iniciales funcionan como títulos o predicados divinos. Mantener esa lectura conserva el tono devocional y evita diluir la apelación personal.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La versión española sigue de cerca el dictamen auditado del POB inglés y no introduce cambios doctrinales ni ampliaciones interpretativas; solo ajusta la dicción para que el español conserve la invocación poética, el valor modal de la pregunta y la imagen de tránsito y pernocta del cierre.
  spanish_consistency_notes:
  - Se mantuvo 'Esperanza' con mayúscula por funcionar como título divino en vocativo.
  - '''En tiempo de angustia'' conserva el matiz de crisis de צָרָה con español natural.'
  - '''Extranjero'' y ''viajero'' reflejan respectivamente los valores de גֵר y אֹרֵחַ sin recurrir a tecnicismos arcaicos.'
  - La pregunta retórica usa 'habrías de ser' para respetar la fuerza modal del hebreo.
  - No se usó 'SEÑOR'; el texto base invoca directamente a Yahvé por medio de títulos descriptivos.
