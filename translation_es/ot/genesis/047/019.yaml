base_translation:
  language: en
  yaml_path: translation/ot/genesis/047/019.yaml
  text: Why should we die before your eyes[a], both we and our land? Buy us and our land for bread, and we and our land will be slaves to Pharaoh. Give seed, so that we may live and not die[e][d][c][b], and the land may not become desolate.
