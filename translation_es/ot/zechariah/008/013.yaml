base_translation:
  language: en
  yaml_path: translation/ot/zechariah/008/013.yaml
  text: And it shall happen that just as you were a curse among the nations[a], O house of Judah and house of Israel, so I will save you, and you shall be a blessing. Do not fear[c][b]; let your hands be strong.
  footnotes:
  - marker: a
    text: Or 'an object of cursing'—that is, a people whose name was used in curse formulas among the nations.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will deliver you.' The Hebrew verb can denote rescue or salvation in a broad sense.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'let your hands be strong,' a Hebrew idiom for courage and resolute action.
    reason: cultural_note
