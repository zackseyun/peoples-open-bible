  to: 'El rey llamó a gritos para hacer entrar a los encantadores, a los caldeos[a] y a los adivinos. El rey respondió y dijo a los sabios de Babilonia: «Todo hombre[b] que lea esta escritura y me haga conocer su interpretación será vestido de púrpura, llevará una cadena de oro alrededor de su cuello y gobernará como tercero en el reino[c]».'
