base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/010/018.yaml
  text: Then King Rehoboam sent Hadoram[a], who was over the forced labor, but the sons of Israel stoned him, and he died[d][c][b]. And King Rehoboam made haste to get up into the chariot to flee to Jerusalem.
  footnotes:
  - marker: a
    text: 'Hebrew: ''Hadoram''; the parallel account in 1 Kings 12:18 has ''Adoram.'''
    reason: alternative_reading
  - marker: b
    text: Or 'the Israelites.' Hebrew 'the sons of Israel' is an idiomatic national designation.
    reason: lexical_alternative
  - marker: c
    text: Or 'who was over the labor levy.' The Hebrew term refers to imposed labor service.
    reason: lexical_alternative
  - marker: d
    text: Or 'made haste to mount the chariot.' The Hebrew more literally says 'strengthened himself to go up into the chariot.'
    reason: lexical_alternative
