revisions:
- from: En el corazón de uno que tiene entendimiento[a] reposa la sabiduría, pero en medio de los necios se da a conocer.
  to: En el corazón del entendido[a] reposa la sabiduría, pero en medio de los necios se da a conocer.
  rationale: Se reemplaza 'uno que tiene entendimiento' por 'del entendido' para lograr un español más idiomático, conciso y sapiencial, sin perder el sentido representativo del hebreo נָבוֹן. Se mantiene 'reposa', 'en medio de' y 'se da a conocer' porque reflejan bien תָּנוּחַ, וּבְקֶרֶב y תִּוָּדֵעַ. La nota al pie se ajusta para preservar mejor la alternativa documentada en el rastro inglés y para que sea realmente distinta del texto principal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:17:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: la sabiduría reposa en el interior del entendido y, en contraste, entre los necios se hace evidente. También conserva adecuadamente el contraste adversativo de וּ, la imagen de לֵב como ''corazón'' y el valor de תִּוָּדֵעַ como manifestación/evidencia.'
  spanish_quality_summary: El texto es claro y natural, pero 'uno que tiene entendimiento' suena más perifrástico y menos elegante que una formulación más directa y proverbial. Además, la nota al pie actual no aporta una alternativa sustancialmente distinta en español; conviene hacerla corresponder mejor a la alternativa documentada en inglés ('entre' en vez de 'en medio de', y una formulación más literal del orden).
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. ''Sabiduría'', ''corazón'' y ''necios'' están bien alineados. La principal mejora es estilística y de fidelidad al matiz de נָבוֹן: ''el entendido'' preserva mejor el carácter sapiencial y resulta más idiomático en español bíblico moderno que ''uno que tiene entendimiento''.'
  issues:
  - severity: medium
    issue: '''uno que tiene entendimiento'' es demasiado perifrástico para נָבוֹן'
    rationale: Aunque es semánticamente correcto, pierde concisión proverbial y suena menos natural que 'el entendido' o 'el hombre entendido'. El hebreo describe a una persona caracterizada por discernimiento; en español, 'el entendido' transmite eso de forma más directa y elegante.
  - severity: low
    issue: La nota al pie no refleja de forma óptima la alternativa auditada
    rationale: La nota repite casi exactamente el texto principal y no destaca con claridad la alternativa 'entre los necios' ni el orden de la cláusula como en la nota inglesa. Puede mejorarse para que sea una alternativa real y útil.
  revised_spanish_text: En el corazón del entendido[a] reposa la sabiduría, pero en medio de los necios se da a conocer.
  revised_footnotes:
  - marker: a
    text: 'O: «La sabiduría reposa en el corazón de uno que tiene entendimiento, pero entre los necios se da a conocer»'
    reason: alternative_reading
  revision_rationale: Se reemplaza 'uno que tiene entendimiento' por 'del entendido' para lograr un español más idiomático, conciso y sapiencial, sin perder el sentido representativo del hebreo נָבוֹן. Se mantiene 'reposa', 'en medio de' y 'se da a conocer' porque reflejan bien תָּנוּחַ, וּבְקֶרֶב y תִּוָּדֵעַ. La nota al pie se ajusta para preservar mejor la alternativa documentada en el rastro inglés y para que sea realmente distinta del texto principal.
