base_translation:
  language: en
  yaml_path: translation/ot/judges/005/015.yaml
  text: And the princes of Issachar were with Deborah[a]; and Issachar was likewise with Barak; into the valley they were sent at his feet[c][b]. Among the divisions of Reuben there were great searchings of heart.
  footnotes:
  - marker: a
    text: Or 'chiefs of Issachar' or 'leaders of Issachar.' The Hebrew expression is poetic and may function idiomatically rather than as a strict possessive.
    reason: lexical_alternative
  - marker: b
    text: Literally 'at his feet,' that is, following closely behind him.
    reason: lexical_alternative
  - marker: c
    text: Or 'great resolutions of heart' or 'great deliberations of heart.' The Hebrew phrase is difficult; in context it likely highlights Reuben's inward debate instead of action.
    reason: alternative_reading
