review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro auditado en los puntos principales: mantiene «Yahvé», refleja נטש con «abandonará», conserva «su pueblo» y expresa correctamente el motivo «por amor de / por causa de su gran nombre». También capta el matiz benevolente de הוֹאִיל con «se ha complacido». Sin embargo, la cláusula final «haceros para sí un pueblo» es menos fiel al sentido ya documentado («make you his people») y suena forzada en español; el hebreo לוֹ queda suficientemente incorporado en «su pueblo».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «haceros para sí un pueblo» resulta poco natural y algo calcado. Además, el voseo reverencial arcaizante de «haceros» puede tolerarse, pero en un registro latinoamericano amplio conviene preferir «hacerlos su pueblo» para mayor claridad y neutralidad. Las notas al pie también mezclan alternativas de dos segmentos distintos bajo una sola nota b, lo cual no corresponde bien al anclaje en el texto.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה -> «Yahvé» se cumple correctamente. No hay conflicto con otras entradas del glosario. La principal corrección es estilística y de precisión en לַעֲשׂוֹת אֶתְכֶם לוֹ לְעָם, donde debe preferirse «hacerlos su pueblo» o «hacerlos un pueblo para sí»; dado el POB auditado, «hacerlos su pueblo» es la mejor opción.'
  issues:
  - severity: medium
    issue: La frase final «en haceros para sí un pueblo» suena calca e innecesariamente rígida.
    rationale: Aunque refleja לוֹ, el inglés auditado concluyó que ese matiz queda adecuadamente contenido en «his people». En español, «haceros para sí un pueblo» es menos natural y puede sonar extraño o ambiguo.
  - severity: medium
    issue: Registro pronominal «haceros» no es el más neutral para el objetivo latinoamericano amplio.
    rationale: El proyecto pide español neutral latinoamericano / ampliamente eclesial. «Hacerlos» mejora la legibilidad general sin pérdida semántica.
  - severity: low
    issue: La nota b combina una alternativa para «por amor de su gran nombre» con otra para la cláusula final.
    rationale: Las notas deben corresponder claramente al marcador anclado. Si solo hay un marcador [b] en «gran nombre», no conviene incluir en esa misma nota una alternativa de otra frase posterior.
  - severity: low
    issue: La nota a repite la lectura principal como alternativa.
    rationale: Si el texto dice «no abandonará», la nota no debería ofrecer «no abandonará» como alternativa; conviene conservar solo las alternativas reales documentadas.
  revised_spanish_text: Porque Yahvé no abandonará a su pueblo[a], por amor de su gran nombre[b], porque Yahvé se ha complacido en hacerlos su pueblo.
  revised_footnotes:
  - marker: a
    text: O «no desechará» o «no dejará».
    reason: lexical_alternative
  - marker: b
    text: O «por causa de su gran nombre».
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la cláusula final a un español más natural y al sentido auditado del POB: «hacerlos su pueblo» expresa bien לַעֲשׂוֹת אֶתְכֶם לוֹ לְעָם sin el calco pesado «para sí un pueblo». También se normaliza el pronombre a una forma más neutral latinoamericana y se corrigen las notas para que cada marcador corresponda solo a su segmento textual.'
