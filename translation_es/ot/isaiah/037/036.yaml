translation:
  language: es
  text: Entonces el ángel[a] de Yahvé salió y mató en el campamento de Asiria a ciento ochenta y cinco mil. Cuando se levantaron temprano por la mañana, he aquí, todos ellos eran cuerpos sin vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el mensajero de Yahvé». La palabra hebrea puede significar «mensajero» o «ángel»; aquí el contexto favorece a un agente celestial de juicio divino.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of the LORD
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: מַלְאָךְ puede significar 'mensajero' o 'ángel'; en este contexto narrativo de juicio divino, la lectura de un agente celestial es la más natural. Como el texto hebreo nombra a יְהוָה directamente, se conserva 'Yahvé' según la terminología del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio del pacto en forma transliterada, conforme al estándar del proyecto en español, en lugar de sustituirlo por un título.
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue
  lexicon: HALOT
  rationale: Verbo narrativo simple y natural en español; conserva el movimiento secuencial del hebreo sin añadir matiz innecesario.
- source_word: וַיַּכֶּה
  english_pob_choice: struck down
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - derribó
  - mató
  lexicon: HALOT
  rationale: נכה puede expresar 'golpear', 'herir' o 'derrotar'. 'Hirió' mantiene la fuerza del golpe/juzgamiento sin forzar una paráfrasis más interpretativa; el resultado mortal queda claro por el contexto final de cadáveres.
- source_word: בְּמַחֲנֵה אַשּׁוּר
  english_pob_choice: in the camp of Assyria
  chosen_spanish: en el campamento de Asiria
  alternatives_spanish:
  - en el campamento asirio
  lexicon: HALOT
  rationale: Se conserva la construcción local del hebreo. 'Campamento de Asiria' refleja el genitivo del original con claridad y sin convertirlo en adjetivo nacional.
- source_word: מֵאָה וּשְׁמֹנִים וַחֲמִשָּׁה אָלֶף
  english_pob_choice: 185,000
  chosen_spanish: ciento ochenta y cinco mil
  alternatives_spanish:
  - '185.000'
  lexicon: HALOT
  rationale: Se expone el número en palabras para una lectura bíblica fluida en español, preservando el valor exacto del hebreo.
- source_word: וַיַּשְׁכִּימוּ בַבֹּקֶר
  english_pob_choice: When they arose early in the morning
  chosen_spanish: Cuando se levantaron por la mañana
  alternatives_spanish:
  - Cuando se levantaron temprano por la mañana
  - Cuando se alzaron por la mañana
  lexicon: HALOT
  rationale: El hebreo usa un sujeto plural no especificado. En español, 'se levantaron' conserva la referencia general sin añadir sujeto explícito; 'por la mañana' traduce el marco temporal. Se deja la idea de 'temprano' implícita por el contexto narrativo y la secuencia de la sorpresa.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - mirad
  lexicon: HALOT
  rationale: '''He aquí'' preserva la fuerza de deíctico/discurso que introduce un hallazgo sorprendente.'
- source_word: כֻלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  lexicon: HALOT
  rationale: Se mantiene la referencia explícita al sufijo pronominal del hebreo, reforzando que el hallazgo abarcó a la totalidad del grupo.
- source_word: פְּגָרִים מֵתִים
  english_pob_choice: dead bodies
  chosen_spanish: cadáveres
  alternatives_spanish:
  - cuerpos muertos
  - cuerpos sin vida
  lexicon: HALOT
  rationale: פְּגָרִים ya denota cuerpos/cadáveres y מֵתִים intensifica la condición de muerte. En español, 'cadáveres' transmite el resultado de forma natural y evita la redundancia de 'cuerpos muertos'.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El hebreo contiene el Tetragrammaton de manera directa. La forma 'Yahvé' conserva el nombre propio divino en español y sigue la convención terminológica del proyecto, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md — término controvertido: יְהוָה / YHWH'
- issue: Naturaleza del agente en מַלְאַךְ יְהוָה
  english_pob_reading: the angel of the LORD
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el mensajero de Yahvé
  rationale: Aunque מַלְאָךְ puede significar 'mensajero', el contexto de juicio sobrenatural favorece la lectura de un ser angelical. Se mantiene esa tensión léxica en las alternativas, pero el texto principal refleja la interpretación más probable en la escena.
  doctrine_reference: HALOT; nota léxica de la POB en inglés
translation_notes:
  revision_awareness: 'El borrador sigue la lectura vigente sin cambios sustanciales respecto al audit trail en inglés. Se preservan las decisiones clave: nombre divino transliterado, agente celestial en מַלְאַךְ יְהוָה, número exacto y el remate visual de cadáveres. La única adaptación relevante al español es usar «cadáveres» para פְּגָרִים מֵתִים, por naturalidad estilística, sin perder la intensidad del hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - «Ángel» se mantiene en el texto principal; «mensajero» queda como alternativa léxica documentada.
  - «Cadáveres» evita una calca redundante y conserva la fuerza final del verso.
  - La puntuación sigue el flujo narrativo hebreo con dos oraciones breves y cierre enfático.
