translation:
  language: es
  text: Porque contigo está la fuente[a] de vida; en tu luz[b] vemos luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manantial de vida» o «origen de vida».
    reason: lexical_alternative
  - marker: b
    text: O «por tu luz vemos luz».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la afirmación anterior. «Porque» conserva la fuerza causal/conclusiva del hebreo y suena natural en español bíblico contemporáneo.
- source_word: עִמְּךָ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con tú
  - junto a ti
  - en tu presencia
  lexicon: HALOT
  rationale: La forma española idiomática para עִם + sufijo de 2ª persona masculina singular es «contigo». Mantiene la relación cercana sin añadir matices no explicitados.
- source_word: מְקוֹר
  english_pob_choice: fountain
  chosen_spanish: fuente
  alternatives_spanish:
  - manantial
  - fuent e
  - origen
  lexicon: HALOT
  rationale: «Fuente» comunica bien la imagen poética de un manantial o naciente de vida. «Manantial» es posible, pero «fuente» resulta más fluido y conserva la metáfora sin volverla abstracta.
- source_word: חַיִּים
  english_pob_choice: life
  chosen_spanish: de la vida
  alternatives_spanish:
  - de vida
  - de las vidas
  lexicon: HALOT
  rationale: Aunque morfológicamente plural, el sustantivo funciona aquí de modo abstracto. En español, el singular «la vida» expresa mejor el sentido idiomático.
- source_word: בְּאוֹרְךָ
  english_pob_choice: in your light
  chosen_spanish: en tu luz
  alternatives_spanish:
  - por tu luz
  - con tu luz
  - mediante tu luz
  lexicon: HALOT
  rationale: «En tu luz» reproduce la imagen y el paralelismo poético del hebreo. No restringe indebidamente la preposición a un valor instrumental.
- source_word: נִרְאֶה
  english_pob_choice: we see
  chosen_spanish: vemos
  alternatives_spanish:
  - percibimos
  - contemplamos
  lexicon: HALOT
  rationale: El imperfecto qal expresa una verdad general en el contexto poético. «Vemos» es directo y natural en español.
- source_word: אוֹר
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - claridad
  - resplandor
  - iluminación
  lexicon: HALOT
  rationale: La repetición de «luz» preserva el juego poético del hebreo y la correspondencia semántica con el primer hemistiquio.
theological_decisions:
- issue: Imagen de Dios como fuente de vida y luz
  english_pob_reading: Retain the metaphors 'fountain of life' and 'in your light we see light' without interpretive expansion.
  chosen_spanish_reading: Conservar «fuente de la vida» y «en tu luz vemos luz» sin explicarlas ni sustituirlas por paráfrasis doctrinales.
  alternative_spanish_readings:
  - «tú eres la fuente de toda vida»
  - «por tu luz comprendemos la verdad»
  rationale: El versículo presenta una teología poética sobre Yahvé como origen de vida e iluminación. La traducción mantiene esa tensión metafórica en vez de resolverla en una explicación más estrecha.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura auditada del POB en inglés, con ajustes naturales para el español: «porque» por la partícula causal, «contigo» por עִמְּךָ, y una metáfora conservada en paralelo («fuente de la vida» / «en tu luz vemos luz»). No se detectaron revisiones posteriores que exigieran cambios adicionales.'
  spanish_consistency_notes:
  - Se mantiene Yahvé según la terminología general del proyecto, aunque este versículo no contiene el tetragrámaton explícito en la superficie hebrea.
  - Se conserva la repetición de «luz» para reflejar el paralelismo y el énfasis del hebreo.
  - La nota al pie en «fuente» preserva la alternativa semántica documentada sin sobrecargar el texto principal.
