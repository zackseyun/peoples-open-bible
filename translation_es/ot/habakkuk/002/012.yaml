- from: ¡Ay de quien edifica una ciudad con derramamiento de sangre y establece una población[a] con injusticia[b]!
  to: ¡Ay de quien edifica una ciudad con derramamiento de sangre[a] y establece una ciudad[b] con injusticia!
  rationale: Se reemplaza 'población' por 'ciudad' para mayor precisión semántica y mejor naturalidad en español bíblico contemporáneo. Se reubica la nota b para que corresponda a toda la expresión alternativa documentada en el audit trail inglés. El resto del versículo preserva adecuadamente el sentido fuente y el tono profético.
