lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: En español, 'habló' conserva bien el valor verbal de comunicación directa y encaja con la fórmula narrativa seguida por 'diciendo'. 'Dijo' sería posible, pero 'habló' reproduce mejor el matiz de discurso dirigido a un destinatario personal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino del Tetragrámaton se rinde en español como 'Yahvé', siguiendo el estándar del proyecto para preservar el nombre propio del pacto y evitar la sustitución por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición introduce el destinatario del habla; en español natural corresponde 'a'.
- source_word: גָּד
  english_pob_choice: Gad
  chosen_spanish: Gad
  lexicon: nombre propio
  rationale: Los nombres propios se transliteran de manera estándar.
- source_word: חֹזֵה
  english_pob_choice: seer
  chosen_spanish: vidente
  alternatives_spanish:
  - profeta
  - visionario
  lexicon: HALOT
  rationale: '''Vidente'' es el equivalente español más directo de חֹזֶה y conserva la distinción léxica frente a otros términos proféticos más generales como ''profeta''.'
- source_word: דָוִיד
  english_pob_choice: David’s
  chosen_spanish: de David
  alternatives_spanish:
  - perteneciente a David
  - de David,
  - de David
  lexicon: gramática constructa
  rationale: La relación constructa se expresa con naturalidad como 'vidente de David', evitando una formulación más pesada o artificial.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: La fórmula infinitiva introduce el discurso directo; 'diciendo' conserva esa estructura sin añadir elementos inexistentes en el hebreo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En la tradición POB, el nombre divino se traduce por transliteración reverente, no por la sustitución 'SEÑOR', para preservar el nombre personal revelado de Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión más reciente no requirió cambios; el texto coincide con el consenso de alta concordancia y mantiene las decisiones léxicas y teológicas documentadas para este versículo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al criterio del proyecto.
  - '''Vidente'' reproduce el término técnico חֹזֶה sin reemplazarlo por ''profeta''.'
  - La sintaxis española conserva el orden y la función del infinitivo לֵאמֹר con 'diciendo'.
