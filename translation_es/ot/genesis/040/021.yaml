translation:
  language: es
  text: Él restauró al copero principal[a] a su oficio, y puso la copa[b] en la mano de Faraón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «restauró al copero principal a su servicio de copero». El hebreo es más literal: «lo restauró a su copaje/servicio de bebida».'
    reason: lexical_alternative
  - marker: b
    text: O «dio».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׁב
  english_pob_choice: restored
  chosen_spanish: restauró
  alternatives_spanish:
  - devolvió
  - restituyó
  lexicon: HALOT
  rationale: El verbo causativo de שוב aquí expresa reinstalar a alguien en su condición o puesto anterior. «Restauró» comunica bien esa restitución en español sin perder la idea de volver a una स्थिति/función previa.
- source_word: שַׂר הַמַּשְׁקִים
  english_pob_choice: the chief cupbearer
  chosen_spanish: el jefe de los coperos
  alternatives_spanish:
  - el principal copero
  - el jefe de los copas
  lexicon: HALOT
  rationale: שַׂר denota un funcionario principal o jefe, y הַמַּשְׁקִים son los que sirven bebida. «Jefe de los coperos» preserva el cargo de corte de manera natural en español y evita una paráfrasis más abstracta.
- source_word: עַל מַשְׁקֵהוּ
  english_pob_choice: to his office
  chosen_spanish: a su cargo
  alternatives_spanish:
  - a su oficio
  - a su servicio de copa
  lexicon: HALOT
  rationale: La frase hebrea es literalmente concreta («a su copaje/servicio de bebida»), pero en español «a su cargo» transmite la reinstalación funcional con buena claridad. Se mantiene la idea de posición/encargo sin forzar un calco poco natural.
- source_word: וַיִּתֵּן
  english_pob_choice: he put
  chosen_spanish: puso
  alternatives_spanish:
  - dio
  - colocó
  lexicon: HALOT
  rationale: En contexto con el objeto directo «la copa» y la expresión idiomática «en la mano», «puso» refleja bien la acción de colocarla para el servicio.
- source_word: הַכּוֹס
  english_pob_choice: the cup
  chosen_spanish: la copa
  alternatives_spanish:
  - el vaso
  lexicon: HALOT
  rationale: El sustantivo concreto se traduce de forma directa. «Copa» es natural en español bíblico y encaja con el contexto cortesano.
- source_word: עַל כַּף פַּרְעֹה
  english_pob_choice: into Pharaoh’s hand
  chosen_spanish: en la mano de Faraón
  alternatives_spanish:
  - sobre la palma de Faraón
  - en la palma de Faraón
  lexicon: HALOT
  rationale: כַּף significa literalmente «palma», pero el uso idiomático en español suena mejor como «mano». Se conserva el sentido de entrega/colocación para el servicio de Faraón.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente que resolvió la ambigüedad del sujeto de וַיִּתֵּן y prefirió una formulación más natural para la restitución del funcionario. La versión española refleja esa lectura: el sujeto sigue siendo el jefe de los coperos restaurado a su cargo, y el segundo miembro conserva la acción de poner la copa en la mano de Faraón.'
  spanish_consistency_notes:
  - Se mantiene «Faraón» como nombre propio tradicional y claro en español.
  - Se usa «copa» para el objeto concreto y «mano» para el idiomatismo de כַּף, conforme al registro bíblico natural.
  - No se introduce «Cristo», «SEÑOR» ni otros términos ajenos al versículo.
  - La puntuación separa claramente las dos cláusulas coordinadas sin añadir información interpretativa.
