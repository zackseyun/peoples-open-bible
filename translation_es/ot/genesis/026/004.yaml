translation:
  language: es
  text: Y multiplicaré tu descendencia como las estrellas de los cielos[a], y daré a tu descendencia todas estas tierras, y en tu descendencia serán bendecidas todas las naciones de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todas las naciones de la tierra se bendecirán por tu descendencia». El verbo hebreo puede entenderse en sentido reflexivo, aunque el sentido pasivo armoniza mejor con la promesa del pacto.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִרְבֵּיתִי
  english_pob_choice: And I will multiply
  chosen_spanish: Y multiplicaré
  alternatives_spanish:
  - Y haré numerosa
  - Y aumentaré
  lexicon: HALOT
  rationale: El verbo causativo expresa aumento directo por acción divina; "multiplicaré" conserva esa fuerza de manera natural en español y funciona bien en una promesa de pacto.
- source_word: זַרְעֲךָ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu linaje
  - tu simiente
  lexicon: HALOT
  rationale: '"Descendencia" mantiene el sentido colectivo de זֶרַע sin el arcaísmo de "simiente" ni la ambigüedad moderna de "semilla"; además, suena natural en español bíblico actual.'
- source_word: כְּכוֹכְבֵי הַשָּׁמַיִם
  english_pob_choice: like the stars of the heavens
  chosen_spanish: como las estrellas de los cielos
  alternatives_spanish:
  - como las estrellas del cielo
  - como las estrellas del firmamento
  lexicon: HALOT
  rationale: Se conserva el plural hebreo "los cielos" para reflejar la forma del original y el tono elevado del pacto, en vez de reducirlo sin necesidad a "el cielo".
- source_word: וְנָתַתִּי
  english_pob_choice: and I will give
  chosen_spanish: y daré
  alternatives_spanish:
  - y concederé
  - y otorgaré
  lexicon: HALOT
  rationale: '"Daré" reproduce el verbo básico נתן con sencillez y exactitud; en este contexto jurídico-promisorio, la fuerza de la promesa queda clara sin añadir matices no presentes en el hebreo.'
- source_word: כָּל הָאֲרָצֹת הָאֵל
  english_pob_choice: all these lands
  chosen_spanish: todas estas tierras
  alternatives_spanish:
  - todos estos territorios
  - todas estas regiones
  lexicon: HALOT
  rationale: '"Tierras" es la opción más natural en español para el plural territorial del hebreo, y conserva el deíctico "estas" del original.'
- source_word: וְהִתְבָּרֲכוּ
  english_pob_choice: will be blessed
  chosen_spanish: serán bendecidas
  alternatives_spanish:
  - se bendecirán
  - bendecirán para sí mismas
  lexicon: HALOT
  rationale: La pasiva refleja española transmite bien el sentido pasivo esperado en el contexto del pacto abrahámico, sin eliminar la posibilidad reflexiva que existe en la forma hebrea.
- source_word: בְזַרְעֲךָ
  english_pob_choice: in your offspring
  chosen_spanish: en tu descendencia
  alternatives_spanish:
  - por tu descendencia
  - por medio de tu descendencia
  lexicon: HALOT
  rationale: '"En" preserva la preposición hebrea ב y deja abierta la relación instrumental o mediada que el contexto sugiere, en lugar de resolverla de antemano con "por".'
- source_word: כֹּל גּוֹיֵי הָאָרֶץ
  english_pob_choice: all the nations of the earth
  chosen_spanish: todas las naciones de la tierra
  alternatives_spanish:
  - todos los pueblos de la tierra
  lexicon: HALOT
  rationale: '"Naciones" es el equivalente más directo de גּוֹיִם en este contexto de alcance universal; "de la tierra" refleja היטב el hebreo הָאָרֶץ y su amplitud global.'
theological_decisions:
- issue: Sentido de וְהִתְבָּרֲכוּ בְזַרְעֲךָ
  english_pob_reading: all the nations of the earth will be blessed in your offspring
  chosen_spanish_reading: en tu descendencia serán bendecidas todas las naciones de la tierra
  alternative_spanish_readings:
  - todas las naciones de la tierra se bendecirán por tu descendencia
  - todas las naciones de la tierra bendecirán en sí mismas por tu descendencia
  rationale: Se conserva la lectura pasiva tradicional porque encaja de forma coherente con la promesa de pacto; al mismo tiempo, la forma hebrea permite una lectura reflexiva, que no debe ocultarse.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: sin cambios necesarios; alto nivel de acuerdo con la auditoría inglesa y sin cuestiones textuales nuevas.'
  spanish_consistency_notes:
  - Se mantiene "descendencia" de forma consistente para זֶרַע, evitando alternar con "simiente" o "posteridad" sin necesidad.
  - Se conserva "los cielos" para reflejar el plural hebreo y el estilo elevado del pasaje.
  - La preposición "en" deja abierta la tensión semántica de בְזַרְעֲךָ, como en la auditoría inglesa.
  - '"Tierras" se usa para אֲרָצֹת en sentido territorial, no como "países" ni "mundo".'
