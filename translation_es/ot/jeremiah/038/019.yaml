  yaml_path: translation/ot/jeremiah/038/019.yaml
  text: Then King Zedekiah said to Jeremiah[a], “I am afraid of the Judeans who have defected to the Chaldeans[e][d][c][b], lest they hand me over to them and they mistreat me.”
  footnotes:
