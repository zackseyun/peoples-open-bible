translation:
  language: es
  text: 'Entonces David dijo a Abiatar el sacerdote, hijo de Ahimelec: «Por favor, tráeme[a] el efod[b]». Y Abiatar llevó el efod a David.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «preséntame el efod». El verbo hebreo significa «acercar» o «presentar».'
    reason: lexical_alternative
  - marker: b
    text: El «efod» era un objeto o vestidura sagrada de uso sacerdotal en la adoración de Israel.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» mantiene la secuencia narrativa en español con naturalidad, sin perder el valor consecutivo del hebreo.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficial
  - el sacerdote del culto
  lexicon: HALOT
  rationale: «כֹּהֵן» designa al funcionario cultual; en español bíblico estándar, «sacerdote» comunica con claridad el oficio sin añadir matices no presentes en el texto.
- source_word: בֶּן אֲחִימֶלֶךְ
  english_pob_choice: the son of Ahimelech
  chosen_spanish: hijo de Ahimelec
  alternatives_spanish:
  - el hijo de Ahimelec
  lexicon: HALOT
  rationale: La relación de linaje se expresa de forma directa con «hijo de». Se omite el artículo por fluidez idiomática en aposición después del título.
- source_word: הַגִּישָׁה נָּא לִי
  english_pob_choice: Please bring me
  chosen_spanish: Por favor, tráeme
  alternatives_spanish:
  - Preséntame, por favor
  - Acércame, por favor
  lexicon: HALOT
  rationale: El verbo הִגִּישׁ en hiphil significa «hacer acercar, traer, presentar». En este contexto, «tráeme» es la forma más natural y conserva la petición cortés de נָא con «Por favor».
- source_word: הָאֵפֹד
  english_pob_choice: the ephod
  chosen_spanish: el efod
  alternatives_spanish:
  - el efod sacerdotal
  - la vestidura sacerdotal
  lexicon: HALOT
  rationale: Se conserva el término técnico transliterado, como en la POB inglesa, porque «efod» es un objeto cultual específico sin equivalente exacto en español. Evita sobreinterpretar su forma o función.
- source_word: וַיַּגֵּשׁ
  english_pob_choice: So ... brought
  chosen_spanish: Y ... acercó
  alternatives_spanish:
  - Y ... trajo
  - Entonces ... presentó
  lexicon: HALOT
  rationale: El mismo verbo raíz חוזר con sentido de mover algo hacia alguien. «Acercó» conserva mejor la repetición léxica del hebreo que «trajo», y mantiene la conexión con la petición anterior.
- source_word: אֶל דָּוִד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - hacia David
  - para David
  lexicon: HALOT
  rationale: La preposición marca dirección hacia David; «a» es la equivalencia más natural y fiel en español.
theological_decisions:
- issue: Tratamiento del objeto cultual אֵפוֹד en una escena de consulta sacerdotal
  english_pob_reading: Retain the transliteration 'ephod' in the main text
  chosen_spanish_reading: Retener «efod» en el texto principal
  alternative_spanish_readings:
  - vestidura sacerdotal
  - objeto sacerdotal
  rationale: La traducción mantiene la terminología técnica y no especifica más de lo que el hebreo dice. Dado el contexto inmediato de consulta divina, «efod» preserva la tensión entre objeto/vestidura sin resolverla artificialmente.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor de la petición con נָא y del verbo הִגִּישׁ
  english_pob_reading: Please bring me the ephod.
  chosen_spanish_reading: «Por favor, tráeme el efod»
  alternative_spanish_readings:
  - «Por favor, preséntame el efod»
  - «Acércame el efod, por favor»
  rationale: La frase española conserva la cortesía de נָא y el movimiento hacia David. Se evita una lectura excesivamente técnica como «presenta» si oscurece la naturalidad, pero se mantiene el posible matiz de acercar/presentar en la decisión lexical.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios respecto al pasaje fuente ni a la solución auditada en la POB inglesa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el nombre divino.
  - Se conserva «efod» como tecnicismo cultual, coherente con la terminología POB.
  - Se mantiene un español bíblico moderno y claro, sin depender de fórmulas arcaizantes.
