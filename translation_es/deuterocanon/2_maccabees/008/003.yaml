translation:
  language: es
  text: y tener misericordia también de la ciudad que estaba siendo destruida y que estaba por ser arrasada hasta quedar al nivel del suelo, y oír la sangre[a] clamando a él[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa un plural, «las sangres», que puede intensificar la idea de derramamiento de sangre o de culpa de sangre; en español se conserva la forma idiomática singular «la sangre».
    reason: lexical_alternative
  - marker: b
    text: La expresión «clamando a él» conserva el motivo bíblico de la sangre inocente que clama a Dios.
    reason: cross_reference
lexical_decisions:
- source_word: ἐλεῆσαι
  english_pob_choice: to have mercy
  chosen_spanish: tener misericordia
  alternatives_spanish:
  - mostrar misericordia
  - compadecerse
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa el contenido de la petición. «Tener misericordia» conserva el valor compasivo y la fuerza idiomática en español bíblico sin volverse arcaico.
- source_word: καταφθειρομένην
  english_pob_choice: that was being destroyed
  chosen_spanish: que estaba siendo destruida
  alternatives_spanish:
  - que estaba arruinándose
  - que estaba siendo devastada
  lexicon: LSJ
  rationale: El participio presente indica un proceso en curso; «estaba siendo destruida» reproduce la acción progresiva sin precisar el medio de la ruina.
- source_word: πόλιν
  english_pob_choice: city
  chosen_spanish: ciudad
  lexicon: LSJ
  rationale: Equivalente directo y natural. El griego usa el sustantivo común, no el nombre propio, por lo que se mantiene «ciudad».
- source_word: μέλλουσαν ἰσόπεδον γίνεσθαι
  english_pob_choice: was about to be leveled to the ground
  chosen_spanish: que estaba por ser nivelada hasta el suelo
  alternatives_spanish:
  - que estaba a punto de ser arrasada por completo
  - que estaba por quedar nivelada con el suelo
  lexicon: LSJ
  rationale: μέλλουσαν marca inminencia. «Nivelada hasta el suelo» conserva la imagen de quedar al ras del terreno y sigue de cerca el giro idiomático griego sin endurecer la sintaxis española.
- source_word: τῶν ... αἱμάτων
  english_pob_choice: the blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - la sangre derramada
  - las sangres
  lexicon: LSJ
  rationale: El plural griego puede intensificar el derramamiento o la culpabilidad de sangre. En español, «la sangre» conserva el valor idiomático y el eco bíblico, sin perder la tensión del plural subyacente.
- source_word: καταβοώντων πρὸς αὐτὸν
  english_pob_choice: crying out to him
  chosen_spanish: que clamaba a él
  alternatives_spanish:
  - que gritaba a él
  - que alzaba su clamor hacia él
  lexicon: LSJ
  rationale: El participio modifica a «la sangre» y evoca un clamor dirigido a Dios. «Clamaba» mantiene el tono bíblico y la imagen de petición urgente sin explicitar más de lo que dice el texto.
- source_word: εἰσακοῦσαι
  english_pob_choice: to hear
  chosen_spanish: escuchar
  alternatives_spanish:
  - oír
  - prestar oído a
  lexicon: BDAG
  rationale: En lenguaje de oración, el verbo puede implicar atender favorablemente. «Escuchar» funciona bien en español y permite conservar abierta la dimensión teológica de oír con atención.
theological_decisions:
- issue: La sangre que clama a Dios
  english_pob_reading: Retain the concrete image 'the blood ... crying out to him' without explicating vengeance or justice in the main text.
  chosen_spanish_reading: Conservar la imagen concreta «la sangre ... que clamaba a él» sin explicitar venganza ni justicia en el cuerpo principal.
  alternative_spanish_readings:
  - la sangre derramada que clama a él
  - la sangre de los muertos que clama venganza
  rationale: El griego presenta la imagen sin añadir la aclaración «por venganza» ni identificar a las víctimas. Mantener el clamor concreto preserva la resonancia bíblica y deja la tensión teológica abierta.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Se ajustó la redacción para que cada nota tuviera su marcador correspondiente en el texto español. También se mantuvo la diferencia entre el proceso continuo de destrucción de la ciudad y el clamor dirigido a Dios, siguiendo de cerca el griego y el rastro auditado en inglés.
  spanish_consistency_notes:
  - Se usó «tener misericordia» para ἐλεῆσαι, en línea con el sentido compasivo y covenantal del verbo.
  - Se mantuvo «ciudad» en vez de introducir Jerusalén, porque el griego emplea un sustantivo común.
  - Se conservó «la sangre» en singular idiomático, pero con nota sobre el plural griego y su posible intensificación.
  - Se eligió «escuchar» para εἰσακοῦσαι porque en contexto oracional puede implicar atención favorable sin necesidad de añadir interpretación.
