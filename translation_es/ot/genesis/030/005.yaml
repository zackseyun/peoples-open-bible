lexical_decisions:
- source_word: וַתַּהַר
  english_pob_choice: conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó embarazada
  - llegó a estar encinta
  lexicon: HALOT
  rationale: El verbo הרה expresa el inicio del embarazo/concepción. «Concibió» mantiene la secuencia narrativa y suena natural en español bíblico contemporáneo.
- source_word: בִּלְהָה
  english_pob_choice: Bilhah
  chosen_spanish: Bilhá
  alternatives_spanish:
  - Bilha
  lexicon: convención transliterativa
  rationale: Se conserva el nombre propio con adaptación ortográfica española del acento prosódico, sin alterar la identidad del nombre.
- source_word: וַתֵּלֶד
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: HALOT
  rationale: ילד aquí denota dar a luz. «Dio a luz» es natural y claro en español, y conserva el acto de nacimiento sin cargar el texto con un registro demasiado rudo.
- source_word: לְיַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: para Jacob
  alternatives_spanish:
  - a Jacob
  - de Jacob
  lexicon: HALOT
  rationale: La preposición ל marca la relación del hijo con Jacob; en español, «para Jacob» comunica de manera fiel esa relación posesiva/relacional sin forzar una construcción extraña.
- source_word: בֵּן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un varón
  - un hijo varón
  lexicon: HALOT
  rationale: בן significa «hijo». «Un hijo» es la forma natural en español; no se añade «varón» porque el término ya está determinado por el hebreo y el contexto no requiere reforzarlo.
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés están en alto acuerdo; no hay variantes textuales ni decisiones teológicas controvertidas. La única opción relevante es la equivalencia lexical entre «conceived/bore» y sus correspondencias naturales en español.
  spanish_consistency_notes:
  - 'Se mantiene el orden narrativo simple del hebreo: concepción seguida de nacimiento.'
  - Se evita el calco «dio a luz para Jacob»; en español fluye mejor «un hijo para Jacob».
  - El nombre propio se normaliza como Bilhá para lectura en español, sin alterar el referente.
