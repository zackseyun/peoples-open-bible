translation:
  language: es
  text: Pero ustedes se han levantado contra la casa de mi padre hoy, y han matado a sus hijos, setenta hombres, sobre una sola piedra, y han hecho a Abimelec, el hijo de su sierva[a], rey sobre los dirigentes de Siquem, porque él es su hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el hijo de su esclava», o más interpretativamente, «el hijo de su concubina». El hebreo dice «el hijo de su sierva».
    reason: lexical_alternative
lexical_decisions:
- source_word: קַמְתֶּם עַל
  english_pob_choice: have risen up against
  chosen_spanish: se han levantado contra
  alternatives_spanish:
  - han atacado contra
  - se han puesto contra
  lexicon: HALOT
  rationale: El hebreo expresa oposición hostil con la imagen de levantarse contra. «Se han levantado contra» conserva esa metáfora y la acusación, sin volverse torpe en español.
- source_word: בֵּית אָבִי
  english_pob_choice: my father's house
  chosen_spanish: la casa de mi padre
  alternatives_spanish:
  - el hogar de mi padre
  - la familia de mi padre
  lexicon: HALOT
  rationale: Aquí «casa» tiene sentido dinástico/familiar, no arquitectónico. «La casa de mi padre» mantiene ese valor y sigue siendo natural en español.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: «Hoy» reproduce la referencia temporal inmediata del discurso de forma idiomática en español moderno.
- source_word: וַתַּהַרְגוּ
  english_pob_choice: you killed
  chosen_spanish: han matado
  alternatives_spanish:
  - han asesinado
  - han dado muerte a
  lexicon: HALOT
  rationale: El verbo denota matar; «han matado» es fiel y no añade una calificación legal explícita que el verbo por sí solo no exige.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus hijos
  lexicon: HALOT
  rationale: En contexto, el sufijo remite a la casa de mi padre/Gedeón. «Sus hijos» comunica la referencia familiar de modo natural en español; el sentido es el mismo que el inglés auditado.
- source_word: שִׁבְעִים אִישׁ
  english_pob_choice: seventy men
  chosen_spanish: setenta hombres
  alternatives_spanish:
  - setenta personas
  lexicon: HALOT
  rationale: La construcción numérica con אִישׁ nombra varones adultos. «Setenta hombres» es literal y claro.
- source_word: עַל אֶבֶן אֶחָת
  english_pob_choice: on one stone
  chosen_spanish: sobre una sola piedra
  alternatives_spanish:
  - en una sola piedra
  - junto a una sola piedra
  lexicon: HALOT
  rationale: «Sobre una sola piedra» conserva la concreción brutal del hebreo y sugiere el lugar/instrumento de la ejecución colectiva sin suavizarlo.
- source_word: וַתַּמְלִיכוּ
  english_pob_choice: you made ... king
  chosen_spanish: han hecho rey
  alternatives_spanish:
  - han coronado
  - han hecho gobernante
  lexicon: HALOT
  rationale: El piel/causativo de מלך significa hacer rey a alguien. «Han hecho rey» conserva la fuerza causativa de forma directa en español.
- source_word: בֶּן אֲמָתוֹ
  english_pob_choice: the son of his female servant
  chosen_spanish: el hijo de su sierva
  alternatives_spanish:
  - el hijo de su esclava
  - el hijo de su criada
  - el hijo de su mujer servidora
  lexicon: HALOT
  rationale: אָמָה puede significar sierva/esclava mujer. «Sierva» mantiene la relación de servidumbre con dignidad bíblica en español y evita especificar más de lo que el hebreo dice.
- source_word: בַּעֲלֵי שְׁכֶם
  english_pob_choice: the leaders of Shechem
  chosen_spanish: los dirigentes de Siquem
  alternatives_spanish:
  - los señores de Siquem
  - los hombres de Siquem
  lexicon: HALOT
  rationale: En este contexto político, בַּעֲלֵי denota a los principales/dirigentes de la ciudad. «Dirigentes» expresa mejor ese valor que un calco como «señores».
- source_word: כִּי אֲחִיכֶם הוּא
  english_pob_choice: because he is your brother
  chosen_spanish: porque él es su hermano
  alternatives_spanish:
  - pues él es su hermano
  lexicon: HALOT
  rationale: כִּי introduce la razón. «Porque él es su hermano» conserva la causalidad y el contraste irónico del reproche.
theological_decisions:
- issue: Matiz social de אֲמָתוֹ aplicado a la madre de Abimelec
  english_pob_reading: the son of his female servant
  chosen_spanish_reading: el hijo de su sierva
  alternative_spanish_readings:
  - el hijo de su esclava
  - el hijo de su criada
  - el hijo de su concubina
  rationale: El hebreo nombra a la mujer como אמה, una servidora femenina. «Sierva» comunica la relación social sin imponer «concubina», que sería interpretativo y no léxico. Se preserva así la tensión social que el pasaje explota contra Abimelec.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Esta versión corrige la validación anterior asegurando que cada marca de nota al pie aparezca anclada en el texto principal. También mantiene la lectura fuente de «sierva» en el cuerpo y ofrece las alternativas relevantes solo en la nota correspondiente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Siquem» se usa como forma castellana estándar del topónimo.
  - Se conserva el paralelismo acusatorio del hebreo sin suavizar el tono retórico.
  - No se introduce «concubina» en el texto principal, porque el hebreo no usa ese término aquí.
