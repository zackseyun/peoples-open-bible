translation:
  language: es
  text: 'Y dijo[a]: «Bendito sea Yahvé, el Dios de Israel, que habló con su boca a David, mi padre, y con su mano lo ha cumplido, diciendo:»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Alabado sea». La fórmula hebrea de bendición suele verterse tradicionalmente «Bendito sea».
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּר֤וּךְ
  english_pob_choice: Blessed be
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Alabado sea
  - Sea bendito
  lexicon: HALOT
  rationale: En español, la fórmula benedictoria más natural y fiel es «Bendito sea». Mantiene el valor pasivo-predicativo del participio hebreo en una bendición solemne, sin convertirlo en una paráfrasis libre.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del texto hebreo. La convención del proyecto pide «Yahvé» y no la sustitución por un título. «Jehová» se evita por ser una forma tradicional menos adecuada al criterio textual del proyecto.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa se expresa de manera directa y estándar en español. «El Dios de Israel» transmite la relación de pacto e identidad sin añadir matices no presentes en el hebreo.
- source_word: אֲשֶׁר דִּבֶּר בְּפִיו
  english_pob_choice: who spoke with his mouth
  chosen_spanish: que habló con su boca
  alternatives_spanish:
  - que habló por su boca
  - que habló
  lexicon: HALOT
  rationale: Se conserva la imagen corporal explícita del hebreo. «Con su boca» refleja mejor בְּפִיו que una simple «dijo», y mantiene el paralelismo con «con su mano» en la cláusula siguiente.
- source_word: אֵת דָּוִד אָבִי
  english_pob_choice: to David my father
  chosen_spanish: a David, mi padre
  alternatives_spanish:
  - a David mi padre
  - con David, mi padre
  lexicon: HALOT
  rationale: Con דִּבֶּר, el marcador אֵת introduce naturalmente al destinatario del habla. En español, «a David, mi padre» es la construcción más clara y fiel al sentido relacional del hebreo.
- source_word: וּבְיָדוֹ מִלֵּא
  english_pob_choice: and has fulfilled it with his hand
  chosen_spanish: y con su mano lo cumplió
  alternatives_spanish:
  - y lo ha cumplido con su mano
  - y con su mano lo llevó a cabo
  lexicon: HALOT
  rationale: Se conserva la correspondencia entre la palabra dicha y la acción ejecutada, pero en español «lo cumplió» resulta más natural que una calca de «fulfilled it». El pronombre «lo» recupera el objeto implícito de lo prometido anteriormente.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - 'así:'
  - 'diciendo:'
  lexicon: HALOT
  rationale: Funciona como introductor de cita. «Diciendo» preserva la continuidad discursiva del hebreo y encaja bien con el colon que anuncia la cita inmediata.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura del POB en inglés usa «Yahweh» para preservar el nombre propio del pacto. En español, la forma equivalente y establecida por el proyecto es «Yahvé». Esto evita la sustitución por un título y mantiene la transparencia con el hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre hablar y cumplir con «su boca» / «su mano»
  english_pob_reading: who spoke with his mouth ... and has fulfilled it with his hand
  chosen_spanish_reading: que habló con su boca ... y con su mano lo cumplió
  alternative_spanish_readings:
  - que habló ... y lo cumplió
  - que dijo ... y ejecutó
  rationale: 'La versión inglesa preserva el contraste intencional entre el órgano de la palabra y el de la acción. El español mantiene esa tensión semítica sin suavizarla, porque forma parte del argumento del versículo: lo que Dios pronunció, él mismo lo llevó a término.'
  doctrine_reference: Teología bíblica del cumplimiento de la promesa divina
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: la decisión sobre בָּרוּךְ como fórmula benedictoria, la preservación del nombre divino como Yahvé/Yahweh, el mantenimiento del paralelismo boca/mano, y la cláusula final introductoria de cita. No hubo revisiones posteriores que alteraran el sentido base; el estado más reciente indica concordancia alta y sin cambios.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según el criterio terminológico del proyecto para יְהוָה.
  - Se conserva el contraste semítico «con su boca» / «con su mano» para no perder el paralelismo del hebreo.
  - «Bendito sea» se usa como fórmula litúrgica natural en español y no como simple adjetivo.
  - El pronombre objeto «lo» en «lo cumplió» recupera la promesa implícita del contexto sin añadir contenido nuevo.
