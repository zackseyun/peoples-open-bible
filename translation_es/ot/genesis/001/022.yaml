revisions:
- from: 'Yahvé los bendijo[a], diciendo: «Fructifiquen y multiplíquense, y llenen las aguas en los mares, y que las aves[b] se multipliquen en la tierra».'
  to: 'Y Dios los bendijo, diciendo: «Fructifiquen y multiplíquense, y llenen las aguas en los mares, y que las aves[a] se multipliquen en la tierra».'
  rationale: Se corrige «Yahvé» a «Dios» para reflejar fielmente אֱלֹהִים y ajustarse al expediente léxico del proyecto. Se elimina la nota sobre «bendijo» por no ser necesaria en este registro y se conserva la nota alternativa sobre עוֹף, anclada correctamente en «aves[a]».
