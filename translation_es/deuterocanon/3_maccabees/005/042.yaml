translation:
  language: es
  text: Por tanto, el rey[a], un Fálaris en todo, lleno de irracionalidad y teniendo por nada los cambios[b] del alma que se producían en él respecto a la supervisión de los judíos, haciendo firmemente un juramento completísimo, de que sin demora enviaría a estos hombres al Hades[c], mutilados en rodillas y pies por las bestias,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Fálaris era un tirano proverbial, famoso por su extrema crueldad; el texto compara al rey con él, no lo describe solo como cruel.
    reason: cultural_note
  - marker: b
    text: El griego dice literalmente «cambios del alma», un giro para cambios interiores o de ánimo.
    reason: lexical_alternative
  - marker: c
    text: O «el reino de los muertos» para «Hades».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅθεν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: LSJ
  rationale: Marca conclusión inferida del relato anterior; «Por tanto» conserva la conexión lógica con dignidad y naturalidad en español.
- source_word: ὁ κατὰ πάντα Φάλαρις βασιλεὺς
  english_pob_choice: the king, a Phalaris in every way
  chosen_spanish: el rey, un Fálaris en todo sentido
  alternatives_spanish:
  - el rey, completamente como Fálaris
  - el rey, un Fálaris por completo
  lexicon: LSJ
  rationale: Se conserva la alusión proverbial a Fálaris como tirano cruel, sin reducirla a un mero adjetivo como «cruel». La aposición en español comunica la comparación de manera fiel.
- source_word: ἐνπληθυνθεὶς ἀλογιστίας
  english_pob_choice: filled with irrationality
  chosen_spanish: llenado de irracionalidad
  alternatives_spanish:
  - colmado de insensatez
  - lleno de falta de razón
  lexicon: LSJ
  rationale: ἀλογιστία expresa falta de razón o irracionalidad. «Llenado de irracionalidad» mantiene el matiz resultativo y la fuerza moral/mental del griego.
- source_word: τὰς γινομένας πρὸς ἐπισκοπὴν τῶν Ἰουδαίων ἐν αὐτῷ μεταβολὰς τῆς ψυχῆς
  english_pob_choice: the changes of mind occurring within him regarding the oversight of the Jews
  chosen_spanish: los cambios del alma que se producían en él respecto a la supervisión de los judíos
  alternatives_spanish:
  - los cambios de ánimo que surgían en él sobre la supervisión de los judíos
  - las alteraciones interiores que había en él respecto a la inspección de los judíos
  lexicon: LSJ
  rationale: El griego dice literalmente «cambios del alma». Se preserva «alma» para no borrar la imaginería interior del original, y «respecto a» expresa la relación con ἐπισκοπή sin forzar una especificación administrativa excesiva.
- source_word: παρ' οὐδὲν ἡγούμενος
  english_pob_choice: counting as nothing
  chosen_spanish: teniendo por nada
  alternatives_spanish:
  - considerando sin valor
  - estimando como nada
  lexicon: LSJ
  rationale: Es un modismo de desestimación total. «Teniendo por nada» es conciso, idiomático y muy cercano al giro griego.
- source_word: ἀτελέστατον βεβαίως ὅρκον ὁρισάμενος
  english_pob_choice: firmly making a most complete oath
  chosen_spanish: al establecer con toda firmeza un juramento sumamente completo
  alternatives_spanish:
  - al fijar con firmeza un juramento plenamente cumplido
  - al determinar con firmeza un juramento muy completo
  lexicon: LSJ
  rationale: Se evita interpretar el juramento como «imposible» o «inútil», porque el texto griego destaca más bien su carácter plenamente formulado/total. «Establecer» y «con toda firmeza» preservan la resolución del verbo y del adverbio.
- source_word: ἀνυπερθέτως
  english_pob_choice: without delay
  chosen_spanish: sin demora
  alternatives_spanish:
  - sin tardanza
  - inmediatamente
  lexicon: LSJ
  rationale: El adverbio significa sin diferir ni posponer. «Sin demora» es natural y exacto.
- source_word: πέμψειν εἰς ἅιδην
  english_pob_choice: send ... to Hades
  chosen_spanish: enviaría ... al Hades
  alternatives_spanish:
  - mandaría ... al reino de los muertos
  - enviaría ... al sepulcro
  lexicon: LSJ
  rationale: Se retiene «Hades» para conservar el mundo conceptual griego del texto deuterocanónico y evitar trasladarlo prematuramente a «infierno» o «sepulcro».
- source_word: ἐν γόνασιν καὶ ποσὶν
  english_pob_choice: in the knees and feet
  chosen_spanish: en rodillas y pies
  alternatives_spanish:
  - en las rodillas y en los pies
  - a la altura de las rodillas y los pies
  lexicon: LSJ
  rationale: La frase señala las partes del cuerpo afectadas por las bestias. «En rodillas y pies» mantiene la literalidad y la dureza de la imagen.
- source_word: θηρίων ἠκισμένους
  english_pob_choice: mangled by beasts
  chosen_spanish: mutilados ... por las bestias
  alternatives_spanish:
  - mancillados por las bestias
  - destrozados por las bestias
  lexicon: LSJ
  rationale: θηρία son bestias/animales salvajes y αἰκίζω implica maltratar o desfigurar físicamente. «Mutilados» comunica la violencia corporal con suficiente fuerza en español.
theological_decisions:
- issue: ἅιδης en narración griega deuterocanónica
  english_pob_reading: Hades
  chosen_spanish_reading: Hades
  alternative_spanish_readings:
  - el reino de los muertos
  - la morada de los muertos
  rationale: No se trata de un término doctrinalmente dependiente de un equivalente confesional específico. Mantener «Hades» preserva el imaginario del griego y evita cargar el texto con asociaciones posteriores de «infierno».
  doctrine_reference: 'Translation philosophy: primacía del idioma fuente y preservación del campo semántico original sin importar presuposiciones doctrinales ajenas.'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del POB inglés al preferir una formulación más natural y literal en los puntos clave: «cambios del alma» para mantener el matiz interior del griego, «respecto a» para la relación con la supervisión de los judíos, y una cláusula de juramento que conserve el carácter resolutivo sin sobreinterpretar su posible eficacia. También se preserva la comparación con Fálaris y la imaginería violenta de Hades y las bestias.'
  spanish_consistency_notes:
  - Se mantiene «Hades» por coherencia con el criterio POB de conservar el término griego cuando no hay motivo doctrinal para sustituirlo.
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; en este versículo no aplica.
  - «Judíos» y «supervisión» siguen el sentido administrativo del contexto, sin convertir ἐπισκοπή en un tecnicismo eclesiástico.
  - La puntuación reproduce una sola oración extensa, acorde con la sintaxis acumulativa del original.
