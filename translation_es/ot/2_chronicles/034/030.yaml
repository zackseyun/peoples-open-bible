translation:
  language: es
  text: Entonces el rey subió a la casa de Yahvé[a], y todo hombre de Judá, y los habitantes de Jerusalén, y los sacerdotes y los levitas, y todo el pueblo, desde el mayor hasta el menor; y leyó a oídos de ellos[b] todas las palabras del libro del pacto que había sido hallado en la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Yahvé» traduce el nombre divino YHWH del hebreo; no es una sustitución por un título como «Señor».
    reason: lexical_alternative
  - marker: b
    text: Lit. «en sus oídos»; es un hebraísmo para decir que lo leyó de manera audible ante ellos.
    reason: spanish_style_note
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - fue
  lexicon: HALOT
  rationale: עלה conserva el movimiento ascendente; en español, «subió» expresa de forma natural ese valor direccional y encaja con el acceso al santuario.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahveh
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea «casa de» para בית y el nombre divino se vierte como «Yahvé» conforme a la política del proyecto, sin sustituirlo por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se translitera al español como «Yahvé», preservando el nombre propio del pacto en vez de ocultarlo tras una sustitución tradicional.
- source_word: כָל אִישׁ יְהוּדָה
  english_pob_choice: every man of Judah
  chosen_spanish: todo hombre de Judá
  alternatives_spanish:
  - todos los hombres de Judá
  - cada hombre de Judá
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ en singular distributivo con כָל; «todo hombre» conserva la fuerza masculina/distributiva mejor que una neutralización general.
- source_word: יֹשְׁבֵי יְרוּשָׁלִַם
  english_pob_choice: the inhabitants of Jerusalem
  chosen_spanish: los habitantes de Jerusalén
  alternatives_spanish:
  - los que moraban en Jerusalén
  - los residentes de Jerusalén
  lexicon: HALOT
  rationale: El participio plural designa a quienes viven allí; «habitantes» es natural en español y mantiene el sentido colectivo.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: HALOT
  rationale: En contexto cultual, «sacerdotes» es la equivalencia estándar y transparente para כֹהֲנִים.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los de Leví
  lexicon: HALOT
  rationale: La forma tribal/cultual se mantiene con la transliteración tradicional al español «levitas».
- source_word: כָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo entero
  - toda la gente
  lexicon: HALOT
  rationale: La expresión colectiva se vierte de manera directa y natural, preservando la amplitud de la asamblea.
- source_word: מִגָּדוֹל וְעַד קָטָן
  english_pob_choice: from great to small
  chosen_spanish: desde el mayor hasta el menor
  alternatives_spanish:
  - de grande a pequeño
  - del más grande al más pequeño
  lexicon: HALOT
  rationale: El idiomatismo marca todo el rango social; «desde el mayor hasta el menor» mantiene el contraste y suena natural en español.
- source_word: וַיִּקְרָא
  english_pob_choice: he read
  chosen_spanish: leyó
  alternatives_spanish:
  - proclamó
  - leyó en voz alta
  lexicon: HALOT
  rationale: Con el objeto «las palabras del libro», el verbo indica lectura oral; en español el contexto lo hace claro sin añadir redundancia.
- source_word: בְאָזְנֵיהֶם
  english_pob_choice: in their hearing
  chosen_spanish: en su oído
  alternatives_spanish:
  - a sus oídos
  - en su presencia, oyéndolo
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «en sus oídos»; aquí se conserva como «en su oído» para mantener la imagen idiomática y su fuerza auditiva.
- source_word: כָּל דִּבְרֵי
  english_pob_choice: all the words of
  chosen_spanish: todas las palabras de
  alternatives_spanish:
  - todas las cosas de
  - todos los dichos de
  lexicon: HALOT
  rationale: דִּבְרֵי se refiere al contenido verbal del documento; «palabras» reproduce con fidelidad el énfasis textual.
- source_word: סֵפֶר הַבְּרִית
  english_pob_choice: the book of the covenant
  chosen_spanish: el libro del pacto
  alternatives_spanish:
  - el libro de la alianza
  - el rollo del pacto
  lexicon: HALOT
  rationale: Se conserva la construcción del hebreo; «pacto» sigue el valor covenantal del término sin imponer una terminología eclesial distinta.
- source_word: הַנִּמְצָא
  english_pob_choice: that had been found
  chosen_spanish: que había sido hallado
  alternatives_spanish:
  - que fue hallado
  - que se había encontrado
  lexicon: HALOT
  rationale: El participio pasivo se traduce en sentido de anterioridad narrativa con «había sido hallado», claro y fiel al contexto.
theological_decisions:
- issue: Nombre divino יְהוָה en la frase בית יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Nombre divino, no un título. La traducción española conserva ese nombre propio como «Yahvé», evitando la sustitución tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sujeto distributivo כָל אִישׁ יְהוּדָה
  english_pob_reading: every man of Judah
  chosen_spanish_reading: todo hombre de Judá
  alternative_spanish_readings:
  - todos los hombres de Judá
  - cada hombre de Judá
  rationale: El hebreo usa lenguaje masculino singular de forma distributiva. Se conserva esa forma para no diluir la referencia lexical del original; el versículo además amplía inmediatamente la asamblea a «todo el pueblo».
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no requirió cambios; este borrador mantiene la lectura de «Yahvé», la estructura distributiva de «todo hombre de Judá» y la anterioridad narrativa de «había sido hallado».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para el Tetragrámaton.
  - Se conserva «pacto» para בְּרִית, en línea con el registro covenantal del pasaje.
  - Se usa «sacerdotes» y «levitas» como equivalentes cultuales estándar en español.
  - La frase idiomática de oído/hearing se conserva con nota para evitar aplanarla excesivamente.
