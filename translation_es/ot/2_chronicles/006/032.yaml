translation:
  language: es
  text: Y también acerca del extranjero, que no es de tu pueblo Israel, sino que viene de una tierra lejana por causa de tu gran nombre, de tu mano poderosa y de tu brazo extendido; cuando vengan[b] y oren hacia esta casa[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a esta casa'; la preposición hebrea puede traducirse más literalmente así, pero en este contexto de oración lleva el sentido de 'hacia esta casa'.
    reason: lexical_alternative
  - marker: b
    text: El hebreo pasa de singular ('el extranjero ... viene') a plural ('vengan y oren'), probablemente tomando al extranjero como caso representativo.
    reason: alternative_reading
lexical_decisions:
- source_word: הַנָּכְרִי
  english_pob_choice: the foreigner
  chosen_spanish: el extranjero
  alternatives_spanish:
  - el forastero
  - el foráneo
  - el extraño
  lexicon: HALOT
  rationale: נָכְרִי designa a una persona ajena al pueblo de Israel. 'Extranjero' es natural en español moderno y conserva mejor la distinción étnico-covenantal que 'extraño', que podría sugerir solo desconocido.
- source_word: אֲשֶׁר לֹא מֵעַמְּךָ יִשְׂרָאֵל הוּא
  english_pob_choice: who is not from your people Israel
  chosen_spanish: que no es de tu pueblo Israel
  alternatives_spanish:
  - que no pertenece a tu pueblo Israel
  - que no es de tu pueblo, Israel
  lexicon: HALOT
  rationale: La cláusula identifica al extranjero por su no pertenencia al pueblo de Israel. 'No es de tu pueblo Israel' mantiene la fuerza relacional y el vínculo pactual sin añadir explicación interpretativa.
- source_word: מֵאֶרֶץ רְחוֹקָה
  english_pob_choice: a distant land
  chosen_spanish: una tierra lejana
  alternatives_spanish:
  - un país lejano
  - una tierra distante
  lexicon: HALOT
  rationale: אֶרֶץ רְחוֹקָה se expresa de forma directa y natural como 'una tierra lejana'; conserva la imagen geográfica sin endurecerla con un calco.
- source_word: לְמַעַן שִׁמְךָ הַגָּדוֹל
  english_pob_choice: because of your great name
  chosen_spanish: por causa de tu gran nombre
  alternatives_spanish:
  - por amor de tu gran nombre
  - a causa de tu gran nombre
  lexicon: HALOT
  rationale: לְמַעַן aquí expresa motivo u ocasión. 'Por causa de' comunica bien la motivación del extranjero y conserva el valor bíblico de 'nombre' como reputación y revelación de Dios.
- source_word: וְיָדְךָ הַחֲזָקָה
  english_pob_choice: your mighty hand
  chosen_spanish: tu mano poderosa
  alternatives_spanish:
  - tu mano fuerte
  - tu mano valiente
  lexicon: HALOT
  rationale: Aunque 'mighty hand' suele verterse literalmente como 'mano poderosa' o 'mano fuerte', 'mano poderosa' suena natural en español y retiene la imagen concreta sin abstracción.
- source_word: וּזְרֹעֲךָ הַנְּטוּיָה
  english_pob_choice: your outstretched arm
  chosen_spanish: tu brazo extendido
  alternatives_spanish:
  - tu brazo alargado
  - tu brazo tendido
  lexicon: HALOT
  rationale: La imagen antropomórfica se conserva, pero 'brazo extendido' resulta claro y digno en español. Se evita sustituirla por una abstracción como 'poder' para no borrar la textura exódica del hebreo.
- source_word: וּבָאוּ
  english_pob_choice: when they come
  chosen_spanish: cuando vengan
  alternatives_spanish:
  - y vengan
  - cuando vengan ellos
  lexicon: HALOT
  rationale: El hebreo pasa de singular a plural; en español se mantiene el plural de forma natural. 'Cuando vengan' prepara de modo fluido la continuación de la oración.
- source_word: וְהִתְפַּלְלוּ
  english_pob_choice: and pray
  chosen_spanish: y oren
  alternatives_spanish:
  - y recen
  - y hagan oración
  lexicon: HALOT
  rationale: '''Orar'' es el equivalente más amplio y respetuoso para הִתְפַּלֵּל en un contexto de oración litúrgica. ''Oren'' conserva sobriedad y claridad.'
- source_word: אֶל הַבַּיִת הַזֶּה
  english_pob_choice: toward this house
  chosen_spanish: hacia esta casa
  alternatives_spanish:
  - a esta casa
  - en dirección a esta casa
  - hacia este templo
  lexicon: HALOT
  rationale: En este contexto de dedicación del templo, אֶל expresa dirección. 'Hacia esta casa' conserva la orientación espacial y la terminología 'casa', que refleja el hebreo y su resonancia teológica.
theological_decisions:
- issue: Shift from singular to plural in Hebrew
  english_pob_reading: 'Render with singular antecedent but plural English pronoun/verb sequence: ''when they come and pray'''
  chosen_spanish_reading: 'Mantener el antecedente singular ''el extranjero'' y continuar en plural: ''cuando vengan y oren'''
  alternative_spanish_readings:
  - cuando venga y ore
  - cuando estos extranjeros vengan y oren
  rationale: El hebreo presenta un cambio de singular a plural. En español, conservar el singular como antecedente representativo y pasar al plural evita una redacción forzada y respeta la misma tensión sintáctica sin eliminarla.
  doctrine_reference: Translation philosophy §§3, 4, 6
- issue: Anthropomorphic language for God's power
  english_pob_reading: Retain 'your mighty hand and your outstretched arm' literally
  chosen_spanish_reading: Retener 'tu mano poderosa y tu brazo extendido'
  alternative_spanish_readings:
  - tu gran poder
  - tu poder invencible
  rationale: La imagen concreta de mano y brazo forma parte del lenguaje pactual y de éxodo. Se conserva en español para no diluir la fuerza teológica del antropomorfismo bíblico.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje quedó estable y con alto grado de acuerdo entre revisores, por lo que esta propuesta sigue de cerca el texto hebreo y la lectura auditada en inglés.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo presenta explícitamente el nombre divino; aquí no aparece, por lo que no se introduce.
  - Se mantiene 'casa' y no 'templo' para conservar el término hebreo בַּיִת y su resonancia en la oración de dedicación.
  - Se preserva la tensión singular/plural del hebreo con un antecedente singular y verbos plurales en español.
