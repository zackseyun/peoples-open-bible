id: PSA.84.0
reference: Psalms 84:0
source:
  edition: WLC
  text: לַ/מְנַצֵּ֥חַ עַֽל הַ/גִּתִּ֑ית לִ/בְנֵי קֹ֥רַח מִזְמֽוֹר־־׃
translation:
  text: 'For the choir director: according to the Gittith[c][b][a]. A psalm of the sons of Korah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Gittith; the term likely refers to a musical setting, tune, or instrument, but its precise meaning is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'for the sons of Korah'; the Hebrew preposition can indicate authorship, association, or dedication in psalm headings.
    reason: alternative_reading
  - marker: c
    text: Or 'The Gittith'.
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choir director
  alternatives:
  - For the music director
  - To the choirmaster
  - For the leader
  lexicon: HALOT
  rationale: In Psalm superscriptions this participial form conventionally refers to the person overseeing musical performance. 'Choir director' is clear modern English and fits the cultic-musical setting better than the vaguer 'leader.'
- source_word: עַל
  chosen: according to
  alternatives:
  - 'on'
  - with
  - set to
  lexicon: HALOT
  rationale: In musical superscriptions עַל often introduces the tune, style, or instrument designation. 'According to' preserves the ambiguity better than over-specifying 'set to' or the overly literal 'on.'
- source_word: הַגִּתִּית
  chosen: The Gittith
  alternatives:
  - the Gittite instrument
  - the winepress tune
  - Gath-style
  lexicon: HALOT
  rationale: 'The exact referent is uncertain: possibly a musical term, instrument, or tune name. Transliteration best preserves the Hebrew without falsely resolving the uncertainty.'
- source_word: לִבְנֵי קֹרַח
  chosen: of the sons of Korah
  alternatives:
  - for the sons of Korah
  - belonging to the sons of Korah
  lexicon: HALOT
  rationale: In psalm headings ל can mark authorship, association, or dedication. 'Of the sons of Korah' is the standard concise rendering that preserves the ambiguity of relationship without overcommitting to authorship or destination.
- source_word: מִזְמוֹר
  chosen: A psalm
  alternatives:
  - melody
  - song
  lexicon: HALOT
  rationale: מִזְמוֹר is the established genre label for a psalm/song accompanied by music. 'Psalm' is the most natural and accurate English genre term in this context.
