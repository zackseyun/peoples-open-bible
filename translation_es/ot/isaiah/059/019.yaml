    rationale: Aunque comprensible, «salida del sol» es una expresión más idiomática y ampliamente legible en español e igualmente fiel al hebreo מִזְרַח שֶׁמֶשׁ.
  - severity: low
    issue: La nota [c] dice «distinta constricción del hebreo».
    rationale: «Constricción» es un falso amigo/inadecuación léxica en este contexto; debe decir «construcción» o «interpretación/sintaxis» del hebreo.
  revised_spanish_text: Entonces temerán el nombre de Yahvé desde el occidente, y su gloria desde la salida del sol[a]; porque vendrá como un río impetuoso[c][b], impulsado por el aliento de Yahvé.
