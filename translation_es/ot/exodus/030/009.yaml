translation:
  language: es
  text: No ofrecerán sobre él incienso no autorizado[a], ni holocausto, ni ofrenda de grano; y no derramarán sobre él libación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «incienso extraño» o «incienso extranjero». El adjetivo hebreo puede referirse a algo fuera de lo permitido o prescrito en este contexto cultual.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַעֲלוּ
  english_pob_choice: offer
  chosen_spanish: ofrecerás
  alternatives_spanish:
  - subirás
  - harás subir
  - presentarás
  lexicon: HALOT
  rationale: En contexto cultual, el Hifil de עלה funciona idiomáticamente como acto de presentar una ofrenda en el altar. «Ofrecer» comunica ese sentido ritual con naturalidad en español sin perder la referencia al acto sacrificial.
- source_word: עָלָיו
  english_pob_choice: on it
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - en él
  lexicon: HALOT
  rationale: El pronombre se refiere al altar de incienso. «Sobre él» conserva la relación espacial exigida por el hebreo y es claro en español litúrgico moderno.
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - incienso ofrenda
  - ofrenda de incienso
  lexicon: HALOT
  rationale: El sustantivo designa el incienso como sustancia ritual; el contexto ya aporta la idea de ofrenda, por lo que «incienso» basta y evita sobrecargar la frase.
- source_word: זָרָה
  english_pob_choice: unauthorized
  chosen_spanish: no autorizado
  alternatives_spanish:
  - extraño
  - ajeno
  - prohibido
  lexicon: HALOT
  rationale: En contexto sacerdotal, זָרָה expresa lo que no está prescrito ni permitido. «No autorizado» transmite la fuerza legal-cultual mejor que «extraño» o «ajeno», que pueden sonar vagas o sugerir etnicidad.
- source_word: וְעֹלָה
  english_pob_choice: or a burnt offering
  chosen_spanish: ni holocausto
  alternatives_spanish:
  - ni ofrenda quemada
  - ni ofrenda holocausto
  lexicon: HALOT
  rationale: Para una prohibición en español, «ni» reproduce mejor la serie negativa que «o». «Holocausto» es el término tradicional y exacto para עֹלָה en este contexto sacrificial.
- source_word: וּמִנְחָה
  english_pob_choice: or a grain offering
  chosen_spanish: ni ofrenda vegetal
  alternatives_spanish:
  - ni ofrenda de cereal
  - ni ofrenda de grano
  lexicon: HALOT
  rationale: Se evita «grano» por posible torpeza en español y se usa «ofrenda vegetal», una opción bíblica comprensible para la מִנְחָה cultual. Mantiene el valor de ofrenda cereal/vegetal sin resultar técnica en exceso.
- source_word: וְנֵסֶךְ
  english_pob_choice: a drink offering
  chosen_spanish: libación
  alternatives_spanish:
  - ofrenda de bebida
  - ofrenda derramada
  lexicon: HALOT
  rationale: נֵסֶךְ es una ofrenda líquida vertida; «libación» es el equivalente español asentado y preciso, aunque menos transparente que la explicación ampliada.
- source_word: תִסְּכוּ
  english_pob_choice: pour out
  chosen_spanish: derramarás
  alternatives_spanish:
  - verterás
  - libarás
  lexicon: HALOT
  rationale: El verbo en este contexto describe el acto de verter la libación. «Derramar» es natural en español y conserva el gesto ritual de echar líquido sobre el altar.
theological_decisions:
- issue: Naturaleza de זָרָה aplicado al incienso
  english_pob_reading: unauthorized incense
  chosen_spanish_reading: incienso no autorizado
  alternative_spanish_readings:
  - incienso extraño
  - incienso ajeno
  - incienso prohibido
  rationale: 'La POB inglesa opta por una lectura jurídico-cultual: no se trata primariamente de incienso «extranjero» en sentido étnico, sino de algo no prescrito para ese altar. «No autorizado» conserva la tensión normativa y evita desplazar el sentido hacia una mera rareza o extranjería.'
  doctrine_reference: Éxodo 30:9; principio de fidelidad al contexto ritual sacerdotal y primacía del sentido original sobre el lenguaje tradicional.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios en la última pasada; la formulación española sigue de cerca esa decisión estable y conserva la lectura cultual de «unauthorized incense» sin introducir una paráfrasis más amplia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando aparece el nombre divino; aquí no aparece explícitamente en el versículo.
  - Se usa una serie negativa con «ni» para reflejar de forma natural la prohibición acumulativa del hebreo.
  - «Holocausto», «ofrenda vegetal» y «libación» siguen la terminología cultual del proyecto en español.
  - El pronombre «él» se refiere al altar, entendido por el contexto inmediato.
