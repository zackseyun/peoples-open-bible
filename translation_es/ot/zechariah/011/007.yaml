translation:
  language: es
  text: Así apacenté[a] el rebaño destinado al degüello[b], es decir, a los afligidos[c] del rebaño. Luego tomé para mí dos cayados; a uno lo llamé Favor[d] y al otro lo llamé Unión[e], y apacenté el rebaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pastoreé'. El hebreo רעה puede expresar la acción de un pastor que cuida y guía al rebaño.
    reason: lexical_alternative
  - marker: b
    text: O 'condenado a la matanza'; el hebreo describe al rebaño señalado para morir.
    reason: lexical_alternative
  - marker: c
    text: O 'los pobres del rebaño'. El hebreo puede denotar a los pobres, afligidos o humillados; la expresión previa también puede entenderse de manera especificativa, como 'a saber'.
    reason: lexical_alternative
  - marker: d
    text: '''Favor'' traduce aquí el nombre simbólico נֹעַם; alternativas: ''Gracia'', ''Belleza'' o ''Agradabilidad''.'
    reason: lexical_alternative
  - marker: e
    text: '''Unión'' traduce aquí el nombre simbólico חֹבְלִים; alternativas: ''Lazos'', ''Vínculos'' o ''Ataduras''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶרְעֶה
  english_pob_choice: I shepherded / and I shepherded
  chosen_spanish: apacenté
  alternatives_spanish:
  - pastoreé
  - guié como pastor
  - cuidé como pastor
  lexicon: HALOT
  rationale: רעה en este contexto pastoril puede expresarse de manera natural en español como 'apacentar', que mantiene la imagen de pastoreo y la acción de conducir/cuidar al rebaño. 'Pastoreé' sería posible, pero 'apacenté' suena más idiomático y bíblico sin perder el sentido.
- source_word: צֹאן הַהֲרֵגָה
  english_pob_choice: the flock doomed to slaughter
  chosen_spanish: el rebaño destinado al degüello
  alternatives_spanish:
  - el rebaño condenado al degüello
  - el rebaño para el degüello
  - el rebaño destinado a la matanza
  lexicon: HALOT
  rationale: La frase hebrea presenta al rebaño como marcado para ser sacrificado o muerto. 'Degüello' preserva la fuerza cruda del evento mejor que 'matanza' y evita suavizar el tenor violento del hebreo. 'Destinado' refleja bien la idea de un rebaño señalado para ese fin.
- source_word: לָכֵן
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - por eso
  - así que
  - por lo cual
  lexicon: HALOT
  rationale: En el audit trail inglés, la frase se decidió como relación discursiva/consecutiva. 'Por tanto' comunica esa relación de manera natural y formal en español.
- source_word: עֲנִיֵּי הַצֹּאן
  english_pob_choice: the afflicted of the flock
  chosen_spanish: a los pobres del rebaño
  alternatives_spanish:
  - a los afligidos del rebaño
  - a los pobres, los del rebaño
  - a los humildes del rebaño
  lexicon: HALOT
  rationale: עֲנִיִּים puede abarcar pobreza, aflicción o humillación. En español, 'pobres' conserva la amplitud semántica y coincide con la alternativa reconocida en la auditoría inglesa, sin restringir innecesariamente el término a una sola causa.
- source_word: שְׁנֵי מַקְלוֹת
  english_pob_choice: two staffs
  chosen_spanish: dos cayados
  alternatives_spanish:
  - dos bastones
  - dos varas
  - dos palos
  lexicon: HALOT
  rationale: En un contexto de pastor, 'cayado' es el término español más transparente y tradicional para una herramienta de pastor. Comunica el objeto y su función sin perder la imagen simbólica.
- source_word: נֹעַם
  english_pob_choice: Favor
  chosen_spanish: Favor
  alternatives_spanish:
  - Gracia
  - Amabilidad
  - Agradable
  lexicon: HALOT
  rationale: La POB en inglés opta por 'Favor' para el nombre simbólico. Se conserva en español como nombre propio funcional, porque el sentido de benevolencia pactal y buena disposición es parte del simbolismo del acto profético.
- source_word: חֹבְלִים
  english_pob_choice: Union
  chosen_spanish: Unión
  alternatives_spanish:
  - Lazos
  - Vínculos
  - Ataduras
  lexicon: HALOT
  rationale: El nombre simbólico apunta a aquello que une o ata. 'Unión' comunica el valor figurado de forma clara en español y mantiene la decisión teológica/interpretativa reflejada en la auditoría inglesa.
- source_word: קָרָאתִי
  english_pob_choice: I named
  chosen_spanish: lo llamé
  alternatives_spanish:
  - lo nombré
  - le puse por nombre
  - lo denominé
  lexicon: HALOT
  rationale: En español, con un objeto ya designado, 'lo llamé' es natural y fiel al acto de asignar un nombre. 'Llamé' se usa dos veces para preservar la repetición del hebreo.
- source_word: וָאֶקַּח לִי
  english_pob_choice: Then I took for myself
  chosen_spanish: Luego tomé para mí
  alternatives_spanish:
  - Y tomé para mí
  - Entonces tomé para mí
  - Tomé para mí
  lexicon: HALOT
  rationale: Se conserva la progresión narrativa y el matiz del dativo ético לִי. 'Para mí' reproduce la idea de que los bastones fueron tomados por el hablante para su propio uso simbólico.
- source_word: וָאֶרְעֶה אֶת הַצֹּאן
  english_pob_choice: and I shepherded the flock
  chosen_spanish: y apacenté el rebaño
  alternatives_spanish:
  - y pastoreé el rebaño
  - y cuidé el rebaño
  - y guié el rebaño
  lexicon: HALOT
  rationale: La repetición final conserva el inclusio y el gesto profético. 'Apacenté' mantiene el paralelismo con la primera ocurrencia y la imagen pastoril del original.
theological_decisions:
- issue: Sentido de עֲנִיֵּי הַצֹּאן
  english_pob_reading: the afflicted of the flock
  chosen_spanish_reading: los pobres del rebaño
  alternative_spanish_readings:
  - los afligidos del rebaño
  - los humildes del rebaño
  rationale: La palabra hebrea admite pobreza, aflicción o humillación. 'Pobres' conserva esa amplitud y encaja con el énfasis de un rebaño vulnerable sin fijar una sola dimensión socioeconómica o emocional.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor simbólico de los nombres de los cayados
  english_pob_reading: Favor ... Union
  chosen_spanish_reading: Favor ... Unión
  alternative_spanish_readings:
  - Gracia ... Vínculos
  - Belleza ... Lazos
  - Amabilidad ... Ataduras
  rationale: Los nombres forman parte de la señal profética; no son meras etiquetas. Se conservan como nombres simbólicos transparentes en español, manteniendo el contraste entre benevolencia/favor y unión/vínculo comunitario.
  doctrine_reference: Translation philosophy §§3, 6
translation_notes:
  revision_awareness: El audit trail inglés mantuvo la solución final con 'therefore' para לָכֵן y conservó los nombres simbólicos 'Favor' y 'Union' con notas alternativas. La presente versión española sigue esa línea, pero adapta la sintaxis y el léxico al español natural, usando 'por tanto' para la relación discursiva y 'apacenté'/'cayados' por mayor idiomaticidad pastoral.
  spanish_consistency_notes:
  - Se conservó el tono profético-narrativo y la repetición del verbo pastoral al inicio y al final.
  - '''Favor'' y ''Unión'' se mantuvieron como nombres simbólicos capitalizados para reflejar el tratamiento del inglés POB.'
  - Se prefirió 'rebaño' para צֹאן por consistencia pastoral, y 'pobres' para la ambigüedad semántica de עֲנִיֵּי.
  - No se suavizó la violencia de 'degüello', para no perder la dureza del hebreo.
  - Las notas usan marcadores únicos y aparecen ancladas en el texto donde corresponde.
