translation:
  language: es
  text: Porque yo permanecí una virgen pura, y no traspasé la casa de mi padre[a]; más bien, guardé la costilla que había sido edificada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no traspasé los límites de la casa de mi padre». La expresión griega puede implicar tanto permanecer literalmente en el hogar paterno como un sentido moral de no sobrepasar sus límites.'
    reason: alternative_reading
  - marker: b
    text: 'O: «el lado que había sido edificado». La frase probablemente alude a la creación de la mujer a partir del lado/costilla de Adán, aquí usada como metáfora modesta de la castidad preservada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγενήθην
  english_pob_choice: remained
  chosen_spanish: permanecí
  alternatives_spanish:
  - me quedé
  - seguí siendo
  lexicon: BDAG
  rationale: Aunque el verbo es literalmente «llegué a ser», en este contexto la voz describe el estado mantenido de castidad hasta el matrimonio. «Permanecí» comunica bien esa continuidad sin sugerir que la virginidad comenzó allí.
- source_word: παρθένος ἁγνή
  english_pob_choice: a pure virgin
  chosen_spanish: una virgen pura
  alternatives_spanish:
  - una virgen casta
  - una virgen santa
  lexicon: BDAG
  rationale: παρθένος exige «virgen»; ἁγνή añade pureza moral/sexual. «Virgen pura» conserva ambos elementos en español natural y evita sobrecargar con un matiz cultual que el contexto no exige.
- source_word: οὐχ ὑπερέβην
  english_pob_choice: I did not go beyond
  chosen_spanish: no traspasé
  alternatives_spanish:
  - no me aparté de
  - no sobrepasé
  lexicon: BDAG
  rationale: El verbo expresa la idea de pasar más allá o exceder un límite. «No traspasé» preserva la imagen de límite/borde que la POB inglesa mantiene con «go beyond».
- source_word: πατρικὸν οἶκον
  english_pob_choice: my father's house
  chosen_spanish: la casa de mi padre
  alternatives_spanish:
  - el hogar paterno
  - la casa paterna
  lexicon: BDAG
  rationale: Es la forma idiomática y clara en español para el hogar del padre. Mantiene el valor doméstico y relacional del giro griego sin volverlo más abstracto de lo necesario.
- source_word: ἐφύλασσον
  english_pob_choice: I guarded
  chosen_spanish: guardé
  alternatives_spanish:
  - custodié
  - conservé
  lexicon: BDAG
  rationale: El imperfecto indica acción continua, pero en español una forma pretérita simple puede funcionar bien en un enunciado solemne y literario. «Guardé» mantiene la imagen de preservar/custodiar la pureza de lo que sigue.
- source_word: τὴν ᾠκοδομημένην πλευράν
  english_pob_choice: the rib that had been built
  chosen_spanish: la costilla que había sido edificada
  alternatives_spanish:
  - el lado que había sido edificado
  - la costilla construida
  lexicon: LSJ
  rationale: «Πλευρά» puede ser «costilla» o «lado». Dado el eco de Génesis sobre la mujer formada de la costilla/lado de Adán, «costilla» conserva mejor la alusión bíblica. «Había sido edificada» reproduce el valor del participio perfecto y el lenguaje figurado de «edificar».
theological_decisions:
- issue: Alusión de Génesis en «la costilla que había sido edificada»
  english_pob_reading: Retain the metaphor in the main text without explicating it as a euphemism for virginity.
  chosen_spanish_reading: Conservar la metáfora en el texto principal sin convertirla en una paráfrasis explícita de la castidad.
  alternative_spanish_readings:
  - preservé mi castidad
  - la costilla/side que había sido construida
  rationale: El griego emplea una expresión alusiva e inusual. Mantenerla en español respeta la textura literaria y deja visible el eco de la creación de la mujer, sin añadir más explicación de la que el texto da.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Fuerza de «no traspasé la casa de mi padre»
  english_pob_reading: Keep the phrase as a bounded-household expression rather than resolving it into a specific claim about seclusion or obedience.
  chosen_spanish_reading: Conservar la expresión como referencia a un límite doméstico y relacional, sin resolverla en una sola interpretación.
  alternative_spanish_readings:
  - no salí de la casa de mi padre
  - no traspasé los límites de la casa de mi padre
  rationale: La frase griega puede sugerir tanto permanecer dentro del hogar paterno como no cruzar sus límites morales. La traducción mantiene esa tensión en vez de cerrarla prematuramente.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Revisión reciente sin cambios sustanciales: el pasaje ya estaba estable en la última pasada y el control cruzado solo reportó observaciones menores. Esta versión conserva la metáfora, el límite doméstico y la alusión a Génesis de manera auditable.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «virgen pura» para preservar el doble componente de virginidad y pureza moral.
  - «Costilla» se eligió frente a «lado» por la resonancia más directa con Génesis; la nota conserva la alternativa.
  - El imperfecto griego ἐφύλασσον se vierte con perfecto simple en español por fluidez, sin perder el sentido de preservación continua en el contexto.
