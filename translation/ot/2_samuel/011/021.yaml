id: 2SA.11.21
reference: 2 Samuel 11:21
source:
  edition: WLC
  text: מִֽי הִכָּ֞ה אֶת אֲבִימֶ֣לֶךְ בֶּן יְרֻבֶּ֗שֶׁת הֲ/לֽוֹא אִשָּׁ֡ה הִשְׁלִ֣יכָה עָלָי/ו֩ פֶּ֨לַח רֶ֜כֶב מֵ/עַ֤ל הַֽ/חוֹמָה֙ וַ/יָּ֣מָת בְּ/תֵבֵ֔ץ לָ֥/מָּה נִגַּשְׁתֶּ֖ם אֶל הַֽ/חוֹמָ֑ה וְ/אָ֣מַרְתָּ֔ גַּ֗ם עַבְדְּ/ךָ֛ אוּרִיָּ֥ה הַ/חִתִּ֖י מֵֽת־־־־־׃
translation:
  text: Who struck down Abimelech son of Jerubbesheth? Was it not a woman who threw an upper millstone on him from the wall[a], so that he died at Thebez? Why did you go near the wall?’ Then you shall say[c][b], ‘Your servant Uriah the Hittite is dead also.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Jerubbesheth''; compare Judges 9:1, which has ''Jerubbaal.'''
    reason: alternative_reading
  - marker: b
    text: Or 'a piece of a millstone'; the Hebrew phrase likely refers to the upper millstone.
    reason: lexical_alternative
  - marker: c
    text: See Judges 9:53 for the account being referenced.
    reason: cross_reference
lexical_decisions:
- source_word: הִכָּה
  chosen: struck down
  alternatives:
  - killed
  - struck
  lexicon: HALOT
  rationale: The verb נכה commonly means 'strike' and in context refers to a fatal blow. 'Struck down' preserves the concrete verbal force while fitting the death context better than the flatter 'killed.'
- source_word: אֲבִימֶלֶךְ בֶּן יְרֻבֶּשֶׁת
  chosen: Abimelech son of Jerubbesheth
  alternatives:
  - Abimelech son of Jerubbaal
  rationale: The MT here reads Jerubbesheth, and the translation follows the received Hebrew text rather than harmonizing to the form Jerubbaal known from Judges 9. The alternative is worth preserving because it is the more familiar parallel name form.
- source_word: הֲלֹא
  chosen: Was it not
  alternatives:
  - Did not
  lexicon: HALOT
  rationale: This interrogative with negation expects an affirmative answer. 'Was it not' is idiomatic English and preserves the rhetorical force.
- source_word: אִשָּׁה
  chosen: a woman
  lexicon: HALOT
  rationale: Straightforward lexical rendering. The indefinite sense is preserved.
- source_word: הִשְׁלִיכָה
  chosen: threw
  alternatives:
  - cast
  lexicon: HALOT
  rationale: A simple past verb fits the narrative. 'Threw' is natural modern English without loss of force.
- source_word: פֶּלַח רֶכֶב
  chosen: an upper millstone
  alternatives:
  - a piece of a millstone
  - the upper stone of a handmill
  lexicon: HALOT
  rationale: The phrase denotes a millstone piece, likely the upper millstone. 'Upper millstone' is concise, idiomatic, and reflects the likely referent known from the parallel in Judges 9:53.
- source_word: מֵעַל הַחוֹמָה
  chosen: from the wall
  alternatives:
  - from atop the wall
  - from above the wall
  lexicon: HALOT
  rationale: The preposition indicates motion from above. 'From the wall' is smooth English here, while the elevated position is already implied by the act of throwing down.
- source_word: וַיָּמָת בְּתֵבֵץ
  chosen: so that he died at Thebez
  alternatives:
  - and he died in Thebez
  lexicon: HALOT
  rationale: The waw-consecutive continues the result of the action. 'So that he died' makes the causal flow explicit in natural English. The place name is transliterated.
- source_word: לָמָּה נִגַּשְׁתֶּם אֶל הַחוֹמָה
  chosen: Why did you go so near the wall?
  alternatives:
  - Why did you approach the wall?
  - Why did you go near the wall?
  lexicon: HALOT
  rationale: נגשׁ means 'approach/draw near.' 'Go so near' captures the rebuke implied by the military context better than a more neutral 'approach.'
- source_word: וְאָמַרְתָּ
  chosen: Then you shall say
  alternatives:
  - and you shall say
  - then say
  lexicon: HALOT
  rationale: The form addresses the messenger with an instruction following the hypothetical rebuke. 'Then you shall say' makes the sequence clear in English.
- source_word: גַּם
  chosen: also
  alternatives:
  - too
  - even
  lexicon: HALOT
  rationale: '''Also'' preserves the additive force: Uriah is an additional casualty to report.'
- source_word: עַבְדְּךָ
  chosen: Your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, in royal address it commonly functions as a courtly term of subordination. 'Your servant' best fits the social register here without importing the stronger bonded nuance.
- source_word: מֵת
  chosen: is dead
  alternatives:
  - has died
  lexicon: HALOT
  rationale: The stative sense works well in the report formula. 'Is dead' is direct and idiomatic.
