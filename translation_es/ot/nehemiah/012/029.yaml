translation:
  language: es
  text: y desde Bet-guilgal, y de los campos de Geba y Azmavet, porque los cantores habían construido aldeas[a] para sí alrededor de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «asentamientos»; el término hebreo puede denotar áreas habitadas cercadas y, en este contexto, se refiere a lugares donde vivían los cantores alrededor de Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִבֵּית הַגִּלְגָּל
  english_pob_choice: and from Beth-gilgal
  chosen_spanish: desde Bet-guilgal
  alternatives_spanish:
  - desde la casa de Gilgal
  - desde Bet Gilgal
  lexicon: HALOT
  rationale: En español, «Bet-» conserva el valor toponímico de בֵּית como parte del nombre propio, sin sugerir una casa literal. «Desde» refleja היטב el prefijo con מִן/מִ־ y el contexto de procedencia.
- source_word: וּמִשְּׂדוֹת גֶּבַע וְעַזְמָוֶת
  english_pob_choice: and from the fields of Geba and Azmaveth
  chosen_spanish: desde los campos de Geba y Azmavet
  alternatives_spanish:
  - desde la campiña de Geba y Azmavet
  - desde la tierra abierta de Geba y Azmavet
  lexicon: HALOT
  rationale: «Campos» transmite de manera directa שְׂדוֹת y funciona bien en español con los nombres propios. Mantiene la idea de territorio rural asociado a esas localidades sin añadir precisión no requerida por el hebreo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la procedencia mencionada. «Porque» expresa con naturalidad la relación causal/explanatoria en español, equivalente al valor de כִּי en este contexto.
- source_word: חֲצֵרִים
  english_pob_choice: villages
  chosen_spanish: aldeas
  alternatives_spanish:
  - aldeas
  - asentamientos
  - poblados pequeños
  lexicon: HALOT
  rationale: El hebreo puede abarcar espacios habitados y cerrados; en este contexto, por la explicación causal y la mención de residencia alrededor de Jerusalén, «aldeas» comunica bien pequeñas comunidades habitadas. Se conserva la alternativa de «asentamientos» como posible matiz más neutro.
- source_word: בָּנוּ לָהֶם
  english_pob_choice: had built for themselves
  chosen_spanish: habían edificado para sí
  alternatives_spanish:
  - habían construido para sí
  - habían levantado para sí
  lexicon: HALOT
  rationale: «Edificado» mantiene el tono elevado del pasaje y refleja bien בָּנוּ. «Para sí» conserva el dativo reflexivo de לָהֶם, señalando que las aldeas eran para su propio uso/residencia.
- source_word: הַמְשֹׁרֲרִים
  english_pob_choice: the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantores
  - los que cantaban
  - los músicos
  lexicon: HALOT
  rationale: En el contexto levítico, el término designa a los encargados del canto; «cantores» es un equivalente natural y tradicional en español bíblico, más preciso que «músicos».
- source_word: סְבִיבוֹת יְרוּשָׁלִָם
  english_pob_choice: around Jerusalem
  chosen_spanish: alrededor de Jerusalén
  alternatives_spanish:
  - en torno a Jerusalén
  - en los alrededores de Jerusalén
  lexicon: HALOT
  rationale: La expresión adverbial indica el espacio circundante a la ciudad. «Alrededor de Jerusalén» es claro, fiel y idiomático en español.
translation_notes:
  revision_awareness: El texto coincide con el estado revisado de alta concordancia del paquete de fuente; no se detectaron cambios aplicados en el historial reciente, y la redacción española sigue de cerca la estructura y la fuerza explicativa del hebreo sin introducir matices ausentes en el original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología general del proyecto cuando corresponda, pero este versículo no contiene el Tetragrámaton.
  - Se usa «Bet-» como forma toponímica para conservar la estructura del nombre hebreo sin literalizar «casa».
  - Se conserva el plural espacial «los campos» para שְׂדוֹת, en consonancia con el dato geográfico del verso.
  - No se añade nota textual porque el paquete fuente muestra alto acuerdo y no presenta variantes relevantes para este versículo.
