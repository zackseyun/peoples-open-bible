id: PHP.3.8
reference: Philippians 3:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλὰ ⸀μενοῦνγε καὶ ἡγοῦμαι πάντα ζημίαν εἶναι διὰ τὸ ὑπερέχον τῆς γνώσεως Χριστοῦ Ἰησοῦ τοῦ κυρίου μου δι’ ὃν τὰ πάντα ἐζημιώθην, καὶ ἡγοῦμαι ⸀σκύβαλα ἵνα Χριστὸν κερδήσω
base_translation:
  language: en
  yaml_path: translation/nt/philippians/003/008.yaml
  text: More than that[a], I consider all things to be loss because of the surpassing value of the knowledge of Messiah Jesus my Lord, for whose sake I have suffered the loss of all things and consider them rubbish[c][b], so that I may gain Messiah.
  footnotes:
  - marker: a
    text: Or 'the surpassing value of the knowledge of Christ Jesus my Lord.'
    reason: lexical_alternative
  - marker: b
    text: '''Messiah Jesus'' may also be rendered ''Christ Jesus.'''
    reason: alternative_reading
  - marker: c
    text: '''Rubbish'' renders a strong term that can also mean ''refuse'' or ''dung.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 그뿐 아니라, 내 주 메시아 예수를 아는 지식이 가장 뛰어남[a]을 알기에, 나는 모든 것을 손실로 여깁니다. 그분 때문에 나는 모든 것을 잃었고, 메시아를 얻고자[b] 그것들을 배설물[c]로 여깁니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「내 주 그리스도 예수를 아는 지식의 탁월함」. 헬라어 τὸ ὑπερέχον τῆς γνώσεως는 분사 명사 구문으로, 「뛰어남」을 그 자체로 가치 척도로 제시한다.
    reason: lexical_alternative
  - marker: b
    text: 「메시아 예수」는 「그리스도 예수」로도 옮길 수 있다. 본 번역은 Χριστός를 칭호로 살리기 위해 「메시아」를 택한다.
    reason: alternative_reading
  - marker: c
    text: 헬라어 σκύβαλα는 「쓰레기·오물·배설물」을 가리키는 거친 어휘로, 바울이 의도적으로 거칠게 사용한다. 한국어 「배설물」은 그 강한 폄하적 어조를 보존한다. 영어 POB는 「rubbish」를 택했으나 본 한국어 번역은 부드러운 「쓰레기·찌꺼기」 대신 더 직설적인 「배설물」로 옮긴다. 한국 전통(개역개정 「배설물」)과도 일치한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ μενοῦνγε καὶ
  english_pob_choice: More than that
  chosen_korean: 그뿐 아니라
  alternatives_korean:
  - 도리어 더욱이
  - 그렇기는커녕
  - 그보다 더하여
  lexicon: BDAG
  rationale: 강조와 강화의 불변사 묶음. 「그뿐 아니라」가 앞 절을 뛰어넘는 한 단계 더 강한 진술을 자연스럽게 도입한다.
- source_word: ἡγοῦμαι
  english_pob_choice: I consider
  chosen_korean: 여깁니다
  alternatives_korean:
  - 셈합니다
  - 간주합니다
  lexicon: BDAG
  rationale: 7절과 일관되게 「여깁니다」를 사용한다. 합쇼체 현재형이 정착된 판단을 자연스럽게 담는다.
- source_word: πάντα
  english_pob_choice: all things
  chosen_korean: 모든 것
  alternatives_korean:
  - 일체
  lexicon: BDAG
  rationale: 포괄적 범위를 그대로 보존한다.
- source_word: ζημίαν
  english_pob_choice: loss
  chosen_korean: 손실
  alternatives_korean:
  - 손해
  lexicon: BDAG
  rationale: 7절과 일관된 회계적 어휘 사용.
- source_word: διὰ τὸ ὑπερέχον τῆς γνώσεως
  english_pob_choice: because of the surpassing value of the knowledge
  chosen_korean: ~을 아는 지식이 가장 뛰어남을 알기에
  alternatives_korean:
  - ~을 아는 지식의 탁월함 때문에
  - ~을 아는 지식이 무엇보다 뛰어나기에
  lexicon: BDAG
  rationale: 관사 분사 ὑπερέχον이 명사적으로 기능한다. 한국어 명사구 「~의 탁월함」보다, 술어적 표현 「가장 뛰어남을 알기에」가 더 자연스럽게 흐른다. γνώσεως의 동사적 어감(「~을 아는」)도 함께 살린다.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_korean: 메시아 예수
  alternatives_korean:
  - 그리스도 예수
  lexicon: BDAG
  rationale: 본 번역의 일관 원칙에 따라 칭호 Χριστός를 「메시아」로 옮긴다.
- source_word: τοῦ κυρίου μου
  english_pob_choice: my Lord
  chosen_korean: 내 주
  alternatives_korean:
  - 나의 주님
  lexicon: BDAG
  rationale: κύριος의 기독론적 칭호 「주(主)」를 유지. 소유의 친밀함도 함께 살린다.
- source_word: δι’ ὃν
  english_pob_choice: for whose sake
  chosen_korean: 그분 때문에
  alternatives_korean:
  - 그분으로 인하여
  - 그분을 위하여
  lexicon: BDAG
  rationale: διά + 대격의 원인을 「그분 때문에」로 자연스럽게 옮긴다. 인격적 원인성을 「그분」으로 보존한다.
- source_word: ἐζημιώθην
  english_pob_choice: I have suffered the loss
  chosen_korean: 모든 것을 잃었고
  alternatives_korean:
  - 모든 것을 잃었으며
  - 모든 것을 손해 보았고
  lexicon: BDAG
  rationale: 수동 아오리스트의 「잃음을 당함」을 한국어 자연 어휘 「잃었다」로 옮긴다. 「손해 보다」는 어감이 다소 가볍다.
- source_word: σκύβαλα
  english_pob_choice: rubbish
  chosen_korean: 배설물
  alternatives_korean:
  - 쓰레기
  - 오물
  - 똥
  - 찌꺼기
  lexicon: BDAG
  rationale: 헬라어 σκύβαλα는 음식 찌꺼기·짐승의 똥·인간의 배설물 등 거친 폐기물을 가리키는 폄하적 어휘이다. DOCTRINE.md와 한국어 글로사리(σκύβαλα→배설물) 그리고 한국 전통 번역(개역개정·새번역 「배설물」)에 따라 「배설물」을 택한다. 영어 POB의 「rubbish」보다 더 직설적인 표현이며, 바울이 의도한 거친 폄하의 무게를 보존하기 위함이다.
- source_word: ἵνα Χριστὸν κερδήσω
  english_pob_choice: so that I may gain Messiah
  chosen_korean: 메시아를 얻고자
  alternatives_korean:
  - 메시아를 얻으려고
  - 메시아를 얻기 위하여
  lexicon: BDAG
  rationale: ἵνα 목적절을 한국어 「~고자」로 옮겨, 회계적 「얻음」(κερδήσω)의 비유를 7절(「유익」)과 연결한다.
theological_decisions:
- issue: σκύβαλα의 강도를 약화시키지 않음
  chosen_reading: 배설물
  alternative_readings:
  - 쓰레기
  - 찌꺼기
  rationale: 바울은 의도적으로 거친 어휘를 사용한다. DOCTRINE.md 북극성(원어 강도 보존)과 한국 성서 전통의 정착된 「배설물」을 함께 따른다. 영어 POB가 채택한 부드러운 「rubbish」를 그대로 따라 「쓰레기」로 옮기면 바울의 어조가 약화된다.
  doctrine_reference: 'DOCTRINE.md § Original-language primacy; north-star: render the source as the scribe intended.'
- issue: Χριστόν을 칭호로 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 본 절의 Χριστός는 바울의 관계적·언약적 틀에서 칭호로 살아 있다. 본 번역의 일관 원칙에 따른다.
  doctrine_reference: 'Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
