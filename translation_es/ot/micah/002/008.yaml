revisions:
- from: Pero recientemente mi pueblo se ha levantado como un enemigo; del manto despojan la túnica a los que pasan seguros[a], a los que vuelven de la guerra.
  to: Pero recientemente mi pueblo se ha levantado como enemigo; de sobre el manto despojan la prenda a los que pasan seguros[a], a los que vuelven de la guerra.
  rationale: Se revisa para preservar el matiz de מִמּוּל שַׂלְמָה ('de sobre el manto'), mantener un español más natural en 'como enemigo', evitar una especificación excesiva en אֶדֶר con 'prenda', y ajustar la nota al pie a las alternativas documentadas en el POB inglés.
