    text: 'Or ''to the Israelites.'' Hebrew: ''to the sons of Israel.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'as an inheritance.' The Hebrew term denotes a possession or landed holding.
    reason: lexical_alternative
