revisions:
- from: Para la asamblea[a], habrá una sola ordenanza para ustedes y para el forastero que reside con ustedes; será una ordenanza perpetua[b] por todas sus generaciones. Como ustedes, así será el forastero delante de Yahvé.
  to: Para la asamblea[a], habrá una sola ordenanza para ustedes y para el residente extranjero que reside con ustedes; una ordenanza perpetua[b] por todas sus generaciones. Como ustedes, así será el residente extranjero delante de Yahvé.
  rationale: Se ajusta γֵּר a «residente extranjero» para reflejar mejor el matiz de extranjero asentado entre Israel en un contexto legal-cúltico. Se corrige la nota b para que ofrezca alternativas reales y completas. El resto del versículo se conserva casi intacto porque ya transmite bien la paridad normativa delante de Yahvé.
