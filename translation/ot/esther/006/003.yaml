id: EST.6.3
reference: Esther 6:3
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר הַ/מֶּ֔לֶךְ מַֽה נַּעֲשָׂ֞ה יְקָ֧ר וּ/גְדוּלָּ֛ה לְ/מָרְדֳּכַ֖י עַל זֶ֑ה וַ/יֹּ֨אמְר֜וּ נַעֲרֵ֤י הַ/מֶּ֨לֶךְ֙ מְשָׁ֣רְתָ֔י/ו לֹא נַעֲשָׂ֥ה עִמּ֖/וֹ דָּבָֽר־־־׃
translation:
  text: Then the king said[a], “What honor and greatness has been bestowed on Mordecai for this?” The king’s young men who attended him said, “Nothing has been done for him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “What honor and greatness was done for Mordecai because of this?”
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה נַּעֲשָׂה
  chosen: What ... has been bestowed
  alternatives:
  - What was done
  - What has been done
  lexicon: HALOT
  rationale: The passive of עשה asks what action was carried out. 'Has been bestowed' fits the idiomatic English collocation with the following nouns 'honor and distinction' while preserving the passive sense.
- source_word: יְקָר
  chosen: honor
  alternatives:
  - preciousness
  - esteem
  lexicon: HALOT
  rationale: In this court setting the noun refers to honor shown to a person, not material preciousness. 'Honor' is the most natural English rendering.
- source_word: וּגְדוּלָּה
  chosen: distinction
  alternatives:
  - greatness
  - advancement
  - promotion
  lexicon: HALOT
  rationale: Alongside יקר, this denotes elevated public recognition or greatness conferred. 'Distinction' captures bestowed public status better than the more abstract 'greatness.'
- source_word: לְמָרְדֳּכַי
  chosen: on Mordecai
  alternatives:
  - for Mordecai
  - to Mordecai
  rationale: English idiom with 'bestowed' naturally takes 'on Mordecai.' The underlying lamed marks the indirect object/beneficiary.
- source_word: עַל זֶה
  chosen: for this
  alternatives:
  - because of this
  - on account of this
  lexicon: HALOT
  rationale: Refers back to Mordecai's reported act in the preceding context. 'For this' is concise and natural while preserving the causal sense.
- source_word: נַעֲרֵי הַמֶּלֶךְ
  chosen: The king’s young men
  alternatives:
  - the king's servants
  - the king's attendants
  lexicon: HALOT
  rationale: נערים literally means 'young men.' Because the following participle already expresses service, retaining 'young men' preserves the lexical distinction without losing sense.
- source_word: מְשָׁרְתָיו
  chosen: who attended him
  alternatives:
  - his ministers
  - his servants
  - who served him
  lexicon: HALOT
  rationale: The participle from שרת denotes personal attendance/service. 'Who attended him' reads smoothly in English and avoids redundancy with 'young men' while preserving the court-service nuance.
- source_word: לֹא נַעֲשָׂה עִמּוֹ דָּבָר
  chosen: Nothing has been done for him
  alternatives:
  - No thing was done with him
  - Nothing was done concerning him
  lexicon: HALOT
  rationale: This is an idiomatic negated passive meaning no action had been taken on his behalf. 'For him' best conveys the sense in natural English.
