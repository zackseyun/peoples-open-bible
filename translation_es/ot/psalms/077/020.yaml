revisions:
- from: En el mar estaba tu camino[a], y tus sendas por muchas aguas[b]; y tus huellas no fueron conocidas.
  to: Tu camino fue por el mar[a], y tus sendas por muchas aguas; tus huellas no se conocieron[b].
  rationale: 'La revisión ajusta el primer colon a la decisión principal documentada por el POB (''through the sea'') con un español natural y poético: ''fue por el mar''. Mantiene la alternativa más literal ''en el mar'' en nota. También reemplaza ''no fueron conocidas'' por ''no se conocieron'', que preserva mejor la ambigüedad pasiva del hebreo en español idiomático. La nota b se corrige para aportar alternativas reales al texto principal.'
