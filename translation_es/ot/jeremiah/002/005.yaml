translation:
  language: es
  text: 'Así dice Yahvé: ¿Qué mal encontraron tus padres en mí[a], que se alejaron de mí, y fueron tras la vanidad[b], y se volvieron vanos?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué injusticia encontraron en mí?». El hebreo עָוֶל puede significar «mal», «injusticia» o «iniquidad».'
    reason: alternative_reading
  - marker: b
    text: El hebreo repite la misma raíz en «vanidad» y «se volvieron vanos», subrayando que al seguir lo vacío ellos mismos se vaciaron.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Esto dice Yahvé
  - Así ha dicho Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se conserva de manera directa y natural en español. Se mantiene "Yahvé" para el Nombre divino, conforme al criterio del proyecto, en vez de mascararlo como "SEÑOR".
- source_word: מַה מָּצְאוּ
  english_pob_choice: What ... did ... find
  chosen_spanish: ¿Qué ... encontraron?
  alternatives_spanish:
  - ¿Qué descubrieron?
  - ¿Qué hallaron?
  lexicon: HALOT
  rationale: '"Encontraron" mantiene el idiomatismo hebreo de buscar/hallar una razón o base para apartarse, sin forzar una paráfrasis. "Hallaron" también sería posible, pero "encontraron" suena más natural y contemporáneo.'
- source_word: אֲבוֹתֵיכֶם
  english_pob_choice: your fathers
  chosen_spanish: tus padres
  alternatives_spanish:
  - tus antepasados
  - vuestros padres
  lexicon: HALOT
  rationale: En español bíblico actual, "padres" comunica bien la referencia covenantal a generaciones anteriores; "antepasados" aclara el sentido pero pierde la formulación más directa del hebreo.
- source_word: בִּי עָוֶל
  english_pob_choice: wrong ... in me
  chosen_spanish: mal ... en mí
  alternatives_spanish:
  - injusticia ... en mí
  - culpa ... en mí
  - iniquidad ... en mí
  lexicon: HALOT
  rationale: '"עָוֶל" puede ser "injusticia", pero aquí la acusación retórica pide una expresión clara y no técnica. "Mal" conserva el reproche moral sin perder naturalidad; la alternativa "injusticia" queda reflejada en la nota.'
- source_word: כִּי רָחֲקוּ מֵעָלַי
  english_pob_choice: that they went far from me
  chosen_spanish: que se alejaron de mí
  alternatives_spanish:
  - que se apartaron de mí
  - que se fueron lejos de mí
  lexicon: HALOT
  rationale: '"Se alejaron" reproduce el movimiento relacional y metafórico del hebreo. "Se apartaron" también es válido, pero puede sonar más interpretativo; "se fueron lejos" suena más físico que covenantal.'
- source_word: וַיֵּלְכוּ אַחֲרֵי
  english_pob_choice: and went after
  chosen_spanish: y fueron tras
  alternatives_spanish:
  - y siguieron a
  - y caminaron tras
  lexicon: HALOT
  rationale: La locución española "fueron tras" conserva bien el giro semítico de seguir persistentemente algo, especialmente en contexto de idolatría o lealtad desviada.
- source_word: הַהֶבֶל
  english_pob_choice: vanity
  chosen_spanish: la vanidad
  alternatives_spanish:
  - lo vano
  - la vaciedad
  - la nulidad
  lexicon: HALOT
  rationale: '"Vanidad" preserva la amplitud semántica de הֶבֶל (vacío, futilidad, lo efímero) y mantiene el enlace verbal con "se volvieron vanos". No se restringe a "ídolos" porque el hebreo conserva una expresión más amplia.'
- source_word: וַיֶּהְבָּלוּ
  english_pob_choice: and became vain
  chosen_spanish: y se volvieron vanos
  alternatives_spanish:
  - y se hicieron vacíos
  - y quedaron vacíos
  - y se volvieron inútiles
  lexicon: HALOT
  rationale: El verbo forma un juego de palabras con הֶבֶל. "Se volvieron vanos" preserva el eco léxico en español mejor que una traducción explicativa. "Vanos" aquí comunica vacío/inutilidad, no presunción.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: Se sigue el criterio del proyecto de transliterar el Tetragrámaton como "Yahvé" en el texto principal, manteniendo la distinción respecto de títulos sustitutos. Esto respeta la identidad del Nombre en el hebreo de Jeremías.
  doctrine_reference: 'DOCTRINE.md: contested terms / יְהוָה YHWH'
- issue: Valor de עָוֶל en el reproche retórico
  english_pob_reading: wrong / injustice
  chosen_spanish_reading: mal
  alternative_spanish_readings:
  - injusticia
  - iniquidad
  - culpa
  rationale: El contexto pregunta qué defecto hallaron en Dios para justificar el alejamiento. "Mal" expresa con claridad la ausencia de rectitud o daño moral sin endurecer el español con un tecnicismo innecesario. La tensión con "injusticia" queda reconocida en la nota.
  doctrine_reference: Uso semántico de עָוֶל en contexto acusatorio
- issue: Juego de palabras con הֶבֶל / וַיֶּהְבָּלוּ
  english_pob_reading: vanity / became vain
  chosen_spanish_reading: vanidad / se volvieron vanos
  alternative_spanish_readings:
  - vaciedad / se vaciaron
  - lo vano / se hicieron vanos
  rationale: El hebreo enlaza sustantivo y verbo de la misma raíz para mostrar que al perseguir lo vacío ellos mismos se vaciaron. La pareja "vanidad / vanos" conserva ese paralelismo y el efecto retórico en español.
  doctrine_reference: Recurso retórico-poético del texto hebreo
translation_notes:
  revision_awareness: Se tuvo en cuenta el pass más reciente, que no introdujo cambios, y el control cruzado indicó solo observaciones menores. El español mantiene el Nombre divino como Yahvé, conserva el reproche retórico de עָוֶל y reproduce el juego de palabras hebreo entre הֶבֶל y וַיֶּהְבָּלוּ.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - «Padres» reproduce el valor genealógico-covenantal de אֲבוֹתֵיכֶם sin añadir interpretación.
  - Se prefiere un español claro y bíblico contemporáneo, sin depender de la tradición de sustitución «SEÑOR».
  - La nota a diferencia claramente la alternativa «injusticia» sin borrar el matiz de «mal».
  - La nota b preserva el vínculo léxico entre sustantivo y verbo en la última cola del verso.
