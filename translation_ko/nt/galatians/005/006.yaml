  - marker: c
    text: 'Or ''faith being active through love,'' ''faith expressing itself through love,'' or ''faith made effective through love.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 메시아 예수 안에서는 할례나 무할례나 아무것도 효력이 없고, 다만 사랑을 통해 일하는 믿음[a]만이 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「사랑으로 표현되는 믿음」, 「사랑으로 효력을 발휘하는 믿음」. 헬라어 ἐνεργουμένη의 중간/수동 해석에 따른 차이.
    reason: alternative_reading
lexical_decisions:
- source_word: πίστις δι’ ἀγάπης ἐνεργουμένη
