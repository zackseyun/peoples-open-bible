review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y las categorías morales del hebreo: יְשָׁרִים = «los rectos», נָקִי = «el inocente», חָנֵף = «el impío» con nota alternativa adecuada, y עַל חָנֵף = «contra el impío». Sin embargo, «se levanta» para יִתְעֹרָר debilita el matiz reflexivo de ‘despertarse/avivarse/ponerse en acción’ documentado en el POB inglés («stirs himself up»).'
  spanish_quality_summary: El español es claro y digno, pero «se levanta contra el impío» puede sonar algo físico o insurreccional y no comunica tan bien el matiz de activación interior. Una pequeña revisión a «se despierta contra el impío» o mejor «se aviva contra el impío» sería posible, pero la opción más natural y fiel al audit trail es «se despierta contra el impío».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «El impío» alinea bien con la decisión auditada para חָנֵף. No aparecen términos sensibles del glosario general como Yahvé, Mesías, Espíritu, etc.
  issues:
  - severity: medium
    issue: «se levanta» para יִתְעֹרָר
    rationale: El verbo hebreo en forma reflexiva sugiere ‘despertarse’, ‘avivarse’ o ‘incitarse a actuar’. «Se levanta» introduce una imagen más concreta y externa que la justificación léxica inglesa no prioriza.
  revised_spanish_text: Los rectos se horrorizan ante esto, y el inocente se despierta contra el impío[a].
