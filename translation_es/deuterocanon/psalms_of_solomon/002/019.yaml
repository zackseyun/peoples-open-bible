translation:
  language: es
  text: Tú hiciste perecer su memorial de la tierra[a]. Dios es un juez justo, y no hará acepción de personas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo griego literalmente suele significar «hiciste conocido» o «hiciste manifiesto»; aquí la traducción sigue el sentido contextual probable de que su memorial fue removido o desapareció. «De la tierra» también puede entenderse como «del país».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «no admirará un rostro»; es un modismo griego para no mostrar favoritismo ni parcialidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδήλωσας
  english_pob_choice: made ... perish / made ... disappear
  chosen_spanish: hiciste que ... pereciera
  alternatives_spanish:
  - hiciste conocido
  - hiciste manifiesto
  - hiciste desaparecer
  lexicon: δηλόω
  rationale: El verbo griego ordinariamente significa 'hacer conocido' o 'manifestar', pero en el contexto la línea se entiende como la remoción de la memoria/memorial de sus enemigos. En español, 'hiciste que ... pereciera' comunica la pérdida o extinción del memorial sin convertir el texto en una mera calca opaca.
- source_word: τὸ μνημόσυνον αὐτῶν
  english_pob_choice: their memorial
  chosen_spanish: su memorial
  alternatives_spanish:
  - su memoria
  - su recuerdo
  - su remembranza
  lexicon: μνημόσυνον
  rationale: μνημόσυνον puede referirse a memoria, recuerdo o memorial. 'Memorial' conserva mejor en español la idea de un monumento o recuerdo público cuya desaparición es el punto de la línea.
- source_word: ἀπὸ τῆς γῆς
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra habitada
  - de la tierra / del país
  lexicon: γῆ
  rationale: '''Tierra'' reproduce de modo natural el alcance amplio del griego y evita restringir indebidamente a ''país'' o ''land''. En este contexto se trata de la desaparición del memorial del ámbito humano y terrenal.'
- source_word: κριτὴς δίκαιος
  english_pob_choice: a righteous judge
  chosen_spanish: un juez justo
  alternatives_spanish:
  - un juez recto
  - un juez recto y justo
  lexicon: κριτής / δίκαιος
  rationale: La construcción es directa y forense. 'Justo' expresa bien la rectitud judicial de Dios en español moderno; 'recto' es posible, pero algo menos natural aquí.
- source_word: οὐ θαυμάσει πρόσωπον
  english_pob_choice: will not show partiality
  chosen_spanish: no hará acepción de personas
  alternatives_spanish:
  - no favorecerá a nadie por su persona
  - no admirará el rostro
  lexicon: πρόσωπον
  rationale: El giro griego es un modismo para favoritismo o parcialidad. 'No hará acepción de personas' es la forma tradicional y plenamente inteligible en español bíblico; mantiene el sentido idiomático sin forzar una imagen literal extraña.
theological_decisions:
- issue: La cláusula inicial es lexicalmente tensa en griego y no debe suavizarse en exceso
  english_pob_reading: The English audit trail notes the Greek verb more literally means 'made known' / 'made manifest,' while the running English chose 'made their memorial perish' as the likely contextual sense.
  chosen_spanish_reading: 'Se mantiene una traducción contextual de remoción del memorial: ''hiciste que su memorial pereciera''.'
  alternative_spanish_readings:
  - hiciste conocido su memorial
  - hiciste manifiesto su memorial
  - hiciste desaparecer su memorial
  rationale: Aunque δηλόω normalmente significa 'hacer saber', el hilo de la línea y la lectura auditada en inglés apuntan a la pérdida del memorial en el juicio divino. La versión española conserva esa tensión contextual sin ignorar que el verbo griego es inusual, por lo que se refleja en nota.
  doctrine_reference: 'Translation philosophy: preserve lexical/theological tension rather than resolving it simplistically'
- issue: El final usa un modismo judicial que no debe traducirse de forma literal si oscurece el sentido
  english_pob_reading: He will not show partiality.
  chosen_spanish_reading: No hará acepción de personas.
  alternative_spanish_readings:
  - no admirará un rostro
  - no mirará la cara de nadie
  - no tendrá favoritismo
  rationale: El griego literalmente dice 'no admirará un rostro', pero en español eso suena oscuro. 'No hará acepción de personas' comunica fielmente el modismo judicial de imparcialidad y conserva el peso teológico del juicio justo de Dios.
  doctrine_reference: Biblical idiom and divine impartiality in judgment
translation_notes:
  revision_awareness: 'El expediente inglés muestra una historia de revisión conflictiva en la primera cláusula: primero se propuso una lectura de ''hacer desaparecer'', luego se corrigió por el valor léxico de δηλόω (''hacer conocido''). El texto inglés final volvió a una traducción contextual de pérdida del memorial. Esta versión española sigue esa lectura contextual, pero ancla la tensión léxica en nota para no borrar el problema del griego.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no porque el versículo lo contenga, sino como política general del proyecto; aquí el texto dice simplemente 'Dios'.
  - Se usa 'memorial' para μνημόσυνον por coherencia con el valor conmemorativo y con el cierre judicial del versículo.
  - '''Acepción de personas'' preserva el modismo bíblico de imparcialidad y evita una paráfrasis excesiva.'
  - La puntuación divide naturalmente las dos cláusulas del versículo en español y conserva la relación entre juicio y parcialidad.
