revisions:
- from: 'En las lunas nuevas[a] de ustedes presentarán un holocausto a Yahvé: dos novillos de la vacada, un carnero y siete corderos machos de un año, sin defecto.'
  to: 'Al comienzo de sus meses[a], presentarán un holocausto a Yahvé: dos novillos del ganado, un carnero y siete corderos machos de un año, sin defecto.'
  rationale: 'Se ajusta la frase temporal para seguir más fielmente la decisión documentada del POB: mantener en el texto principal una formulación cercana al hebreo y reservar la interpretación ritual ''luna nueva'' para la nota. También se mejora la naturalidad de ''de la vacada'' a ''del ganado'' sin cambiar el sentido. No se requiere adjudicación adicional porque la evidencia y la pauta del proyecto son claras.'
