translation:
  language: es
  text: Porque así como un joven se casa con una virgen[a], así tus hijos se casarán contigo; y como un novio se goza por su novia, así tu Dios se gozará por ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, siguiendo una lectura alternativa reflejada por algunas versiones antiguas y muchos intérpretes, «así tus constructores se casarán contigo». El texto masorético dice «tus hijos».
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For as ... so ...
  chosen_spanish: Porque así como ... así ...
  alternatives_spanish:
  - Pues así como ... así ...
  - Porque como ... así ...
  lexicon: HALOT
  rationale: En este contexto, כִּי introduce una comparación explicativa. «Porque así como ... así ...» mantiene la lógica poética del paralelismo y suena natural en español.
- source_word: יִבְעַל
  english_pob_choice: marries
  chosen_spanish: se casa con
  alternatives_spanish:
  - se desposa con
  - contrae matrimonio con
  lexicon: HALOT
  rationale: El verbo expresa relación matrimonial en este símil. «Se casa con» comunica el sentido de forma natural y evita connotaciones demasiado técnicas o crudas.
- source_word: בָּחוּר
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - joven varón
  - muchacho
  lexicon: HALOT
  rationale: Aquí el término designa a un hombre joven en edad de casarse. «Joven» conserva la referencia sin sobrecargar el texto.
- source_word: בְּתוּלָה
  english_pob_choice: virgin
  chosen_spanish: virgen
  alternatives_spanish:
  - doncella
  - joven virgen
  lexicon: HALOT
  rationale: En el paralelismo matrimonial, «virgen» preserva la precisión léxica del hebreo mejor que una opción más general.
- source_word: יִבְעָלוּךְ
  english_pob_choice: will marry you
  chosen_spanish: se casarán contigo
  alternatives_spanish:
  - te desposarán
  - serán tu esposo
  lexicon: HALOT
  rationale: La misma raíz se mantiene con lenguaje matrimonial natural en español. El sufijo de segunda femenina singular se refleja con «contigo», dirigido a Sion personificada.
- source_word: בָּנָיִךְ
  english_pob_choice: your sons
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos varones
  - tus constructores
  lexicon: HALOT
  rationale: El texto masorético apunta a «hijos». «Tus hijos» conserva el sentido recibido; «constructores» queda como alternativa interpretativa en nota por la dificultad del símil.
- source_word: מְשׂוֹשׂ
  english_pob_choice: rejoices
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - regocijo
  lexicon: HALOT
  rationale: 'En la construcción con «novio», el sustantivo funciona en sentido de regocijo jubiloso. En español se vierte de manera verbal en la cláusula comparativa: «el gozo del novio».'
- source_word: חָתָן
  english_pob_choice: bridegroom
  chosen_spanish: novio
  alternatives_spanish:
  - esposo
  - desposado
  lexicon: HALOT
  rationale: «Novio» es el equivalente más natural y claro en español para el contexto nupcial poético.
- source_word: כַּלָּה
  english_pob_choice: bride
  chosen_spanish: novia
  alternatives_spanish:
  - esposa joven
  - desposada
  lexicon: HALOT
  rationale: «Novia» corresponde de forma directa y natural al término de la pareja matrimonial en el paralelismo.
- source_word: יָשִׂישׂ
  english_pob_choice: will rejoice
  chosen_spanish: se gozará
  alternatives_spanish:
  - se alegrará
  - rebozará de gozo
  lexicon: HALOT
  rationale: El verbo expresa regocijo intenso. «Se gozará» mantiene la fuerza poética y el paralelismo con la frase anterior.
- source_word: אֱלֹהָיִךְ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  - tu Deidad
  lexicon: HALOT
  rationale: La referencia es singular y personal a Yahvé; en español se traduce como «tu Dios» para mantener la forma teológica estándar y la claridad del destinatario.
theological_decisions:
- issue: 'Lectura de בָּנָיִךְ: «tus hijos» frente a la propuesta interpretativa «tus constructores»'
  english_pob_reading: your sons
  chosen_spanish_reading: tus hijos
  alternative_spanish_readings:
  - tus constructores
  - tus edificadores
  rationale: Se conserva el texto masorético recibido, que lee «hijos». La imagen es inusual, pero la traducción debe reflejar el testimonio base y dejar la lectura alternativa en nota, como hace el POB en inglés.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Cómo expresar el sujeto divino final, אֱלֹהָיִךְ, en un contexto donde el nombre divino está implícito
  english_pob_reading: your God
  chosen_spanish_reading: tu Dios
  alternative_spanish_readings:
  - Yahvé tu Dios
  - tu Dios
  rationale: El hebreo dice «tu Dios» sin el Tetragrámaton explícito; por eso la cláusula se mantiene así en el cuerpo del texto. No se añade «Yahvé» sin base textual directa en este verso.
  doctrine_reference: Translation philosophy §1, §4
translation_notes:
  revision_awareness: Se revisó el verso contra el hebreo consonántico y la lectura masorética, junto con la decisión auditada del POB inglés. No se aplicaron revisiones posteriores; el texto permanece estable respecto del último pase de revisión.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo poético con «así como ... así ...».
  - Se conservó «tu Dios» para reflejar el hebreo אֱלֹהָיִךְ sin introducir una forma no presente en el verso.
  - La nota alternativa sobre «constructores» preserva la tensión textual sin desplazar la lectura masorética en el cuerpo del texto.
