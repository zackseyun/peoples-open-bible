  rationale: Se elimina el calco «es pesado sobre» y se sustituye por «pesa sobre», que preserva la imagen de carga del hebreo con español natural y digno. También se reubica el marcador de nota junto a «sol» para alinearlo mejor con el patrón del inglés auditado, ya que la nota trata de la cláusula final del verso como alternativa léxica asociada a «hombre», pero no introduce ambigüedad; mantener una única nota sigue siendo suficiente y válida para el registro. No se requiere adjudicación adicional.
