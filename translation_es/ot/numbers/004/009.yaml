translation:
  language: es
  text: Entonces tomarán una tela azul[a] y cubrirán el candelabro de la luz, junto con sus lámparas, sus tenazas, sus braseros y todos sus utensilios para el aceite, con los cuales ministrarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una tela de azul» o «una tela azul-púrpura». El hebreo תְּכֵלֶת se refiere a la tela teñida distintiva usada en los muebles del tabernáculo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּגֶד תְּכֵלֶת
  english_pob_choice: a blue cloth
  chosen_spanish: una tela azul
  alternatives_spanish:
  - una tela de azul
  - una tela azul-púrpura
  lexicon: HALOT
  rationale: בֶּגֶד puede ser una prenda, pieza o tela; en este contexto de cubrimiento de objetos sagrados, «tela» es más natural que «vestido» o «prenda». תְּכֵלֶת alude al tinte distintivo usado en el santuario; «azul» es la opción más clara en español, dejando la tonalidad técnico-litúrgica en nota.
- source_word: מְנֹרַת הַמָּאוֹר
  english_pob_choice: the lampstand of the light
  chosen_spanish: el candelabro de la luz
  alternatives_spanish:
  - el candelabro de la iluminación
  - el candelabro de la luz
  lexicon: HALOT
  rationale: מְנוֹרָה es un candelabro o lampadario; en español bíblico «candelabro» comunica bien la función. El complemento הַמָּאוֹר expresa la luz/iluminación; «de la luz» conserva la relación literal sin suavizarla en exceso.
- source_word: נֵרֹתֶיהָ
  english_pob_choice: its lamps
  chosen_spanish: sus lámparas
  alternatives_spanish:
  - sus lámparas
  - sus luces
  lexicon: HALOT
  rationale: נֵר puede referirse a lámpara o llama; aquí, por el objeto del santuario, «lámparas» es el equivalente más claro e idiomático.
- source_word: מַלְקָחֶיהָ
  english_pob_choice: its tongs
  chosen_spanish: sus tenazas
  alternatives_spanish:
  - sus tenazas
  - sus pinzas
  lexicon: HALOT
  rationale: El término designa un instrumento para manipular las mechas o brasas; «tenazas» es un equivalente amplio y comprensible en español.
- source_word: מַחְתֹּתֶיהָ
  english_pob_choice: its firepans
  chosen_spanish: sus braseros
  alternatives_spanish:
  - sus braseros
  - sus incensarios
  lexicon: HALOT
  rationale: En este contexto de servicio de las lámparas, el utensilio se relaciona con brasas o cenizas; «braseros» comunica mejor la función general en español, evitando «incensarios», que podría sugerir el uso del incienso.
- source_word: כָּל כְּלֵי שַׁמְנָהּ
  english_pob_choice: all its oil vessels
  chosen_spanish: todos sus utensilios para el aceite
  alternatives_spanish:
  - todos sus recipientes para el aceite
  - todos sus utensilios para el aceite
  lexicon: HALOT
  rationale: כְּלִים es amplio y puede abarcar recipientes o instrumentos; «utensilios para el aceite» mantiene la amplitud del hebreo y funciona bien en español, sin restringirlo solo a recipientes.
- source_word: אֲשֶׁר יְשָׁרְתוּ לָהּ בָּהֶם
  english_pob_choice: with which they minister with them
  chosen_spanish: con los que lo ministrarán
  alternatives_spanish:
  - con los que le servirán
  - con los que lo atenderán
  lexicon: HALOT
  rationale: שׁרת en contexto cultual implica servicio sagrado; «ministrarán» conserva ese matiz más que un simple «usarán». El plural instrumental בָּהֶם queda reflejado con «con los que».
theological_decisions:
- issue: Función sagrada del servicio a la menorá/candelabro
  english_pob_reading: minister with them
  chosen_spanish_reading: lo ministrarán
  alternative_spanish_readings:
  - le servirán
  - lo atenderán
  rationale: El hebreo usa servicio cultual, no mera manipulación de objetos. «Ministrarán» mantiene el registro sacro y la idea de servicio ritual; el pronombre neutro «lo» se usa para el candelabro como referente inanimado.
  doctrine_reference: Servicio levítico en el tabernáculo; cf. Nm 4:5-15.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y armoniza con el audit trail inglés: mantiene el valor funcional de בֶּגֶד תְּכֵלֶת, conserva el genitivo literal de מְנֹרַת הַמָּאוֹר y refleja el instrumental plural final con «con los que». Se evita una paráfrasis libre y se preserva el matiz cultual de שׁרת.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se eligió «candelabro» para מְנוֹרָה por claridad litúrgica en español, sin perder el referente del objeto sagrado.
  - «Ministrar» se reserva para servicio cultual, no para uso cotidiano.
  - El pronombre «lo» refiere al candelabro como objeto inanimado; no introduce personificación.
