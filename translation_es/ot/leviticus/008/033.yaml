revisions:
- from: Y no saldrán de la entrada de la tienda de reunión por siete días[a], hasta el día en que se cumplan los días de su consagración, porque por siete días él los consagrará.
  to: Y no saldrán de la entrada de la tienda de reunión durante siete días, hasta el día en que se cumplan los días de su ordenación; porque él los ordenará[a] durante siete días.
  rationale: 'Se revisa para reflejar mejor el tecnicismo sacerdotal del hebreo y la lógica léxica del POB auditado: ''ordenación'' corresponde mejor a מִלֻּאִים que ''consagración'', y ''los ordenará'' mantiene la relación semántica con la nota sobre el modismo ''llenar la mano''. Se reubica el marcador de nota a la cláusula final, donde aparece el idiomático hebreo, y se mejora la naturalidad con ''durante siete días''.'
  reviewer_model: gpt-5.4
