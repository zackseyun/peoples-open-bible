translation:
  language: es
  text: El corazón de un hombre sabio hace prudente su boca[a], y añade instrucción a sus labios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «da discernimiento a su boca». El verbo hebreo puede expresar el acto de causar prudencia o discernimiento.
    reason: lexical_alternative
  - marker: b
    text: O «añade persuasión a sus labios». לֶקַח puede denotar instrucción y, por extensión en este contexto, un hablar instructivo o persuasivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  lexicon: HALOT
  rationale: לֵב puede referirse al interior de la persona, incluyendo pensamiento y juicio. «Corazón» conserva la imagen antropológica hebrea y funciona naturalmente en español bíblico; «mente» sería más interpretativo aquí.
- source_word: חָכָם
  english_pob_choice: wise man
  chosen_spanish: hombre sabio
  alternatives_spanish:
  - persona sabia
  - sabio
  lexicon: HALOT
  rationale: La forma es masculina singular y funciona sustantivamente. «Hombre sabio» mantiene esa forma y el sentido representativo; «persona sabia» suavizaría la marca gramatical del hebreo.
- source_word: יַשְׂכִּיל
  english_pob_choice: gives insight
  chosen_spanish: da discernimiento
  alternatives_spanish:
  - hace prudente
  - instruye sabiamente
  - hace sabio
  lexicon: HALOT
  rationale: El hifil de שׂכל expresa causar prudencia, entendimiento o actuar con insight. En este contexto, aplicado a la boca, la idea es que la vida interior sabia produce habla prudente; «da discernimiento» comunica bien ese matiz causativo en español natural.
- source_word: פִּיהוּ
  english_pob_choice: his mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - su boca
  - su habla
  lexicon: HALOT
  rationale: La imagen concreta de «boca» corresponde al sustantivo con sufijo posesivo. Aunque «habla» podría explicitar el sentido funcional, «boca» preserva mejor el paralelismo poético con «labios».
- source_word: וְעַל
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y sobre
  - y contra
  lexicon: HALOT
  rationale: En este paralelismo, עַל introduce la segunda cola de manera coordinada. «Y» evita una literalidad torpe como «sobre», sin perder la relación sintáctica del pareado.
- source_word: שְׂפָתָיו
  english_pob_choice: his lips
  chosen_spanish: sus labios
  alternatives_spanish:
  - su habla
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de «labios» como paralelo de «boca». «Habla» aplanaría el paralelismo hebreo.
- source_word: יֹסִיף
  english_pob_choice: adds
  chosen_spanish: añade
  alternatives_spanish:
  - incrementa
  - suma
  lexicon: HALOT
  rationale: El verbo significa añadir o aumentar. «Añade» es la opción más natural y concisa en español.
- source_word: לֶקַח
  english_pob_choice: learning
  chosen_spanish: aprendizaje
  alternatives_spanish:
  - enseñanza
  - instrucción
  - persuasión
  lexicon: HALOT
  rationale: לֶקַח puede designar instrucción recibida o enseñanza, y en este contexto sapiencial también puede aludir a un hablar instructivo. «Aprendizaje» mantiene la idea de contenido aprendido e instructivo sin forzar el matiz a «persuasión».
theological_decisions:
- issue: ¿Mantener las imágenes corporales hebreas o sustituirlas por términos abstractos?
  english_pob_reading: The heart ... his mouth ... his lips
  chosen_spanish_reading: El corazón ... su boca ... sus labios
  alternative_spanish_readings:
  - La mente ... su habla ... sus palabras
  rationale: Se conservan las imágenes concretas para respetar el paralelismo poético y la antropología hebrea. Sustituirlas por abstracciones aclararía, pero perdería la textura del proverbio.
  doctrine_reference: Sabiduría proverbial; antropología bíblica
- issue: Valor del término לֶקַח en contexto sapiencial
  english_pob_reading: learning, with a possible extended sense of instructive/persuasive speech
  chosen_spanish_reading: aprendizaje, con posible sentido de habla instructiva
  alternative_spanish_readings:
  - enseñanza
  - persuasión
  rationale: «Aprendizaje» mantiene el núcleo léxico documentado por el POB inglés y deja abierta la extensión contextual hacia un hablar que instruye. «Persuasión» es posible, pero sería más interpretativo si se fijara en el texto principal.
  doctrine_reference: Literatura sapiencial; valor semántico de לֶקַח
translation_notes:
  revision_awareness: Se revisó la versión más reciente y no se detectaron cambios necesarios; el texto mantiene alta concordancia con el audit trail inglés y con el hebreo, preservando la imagen poética y las ambigüedades léxicas documentadas.
  spanish_consistency_notes:
  - Se usa «corazón» para לֵב y no «mente», en coherencia con el antropomorfismo sapiencial hebreo.
  - Se mantiene el paralelismo concreto «boca / labios» en lugar de abstraer a «habla / palabras».
  - «Aprendizaje» deja abierta la extensión semántica de לֶקַח sin cerrar indebidamente la alternativa de «persuasión».
  - Se evita «sobre» para עַל porque sonaría forzado en español y no aporta claridad al pareado.
