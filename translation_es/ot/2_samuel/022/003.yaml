translation:
  language: es
  text: Dios mío[a], mi roca, en quien me refugio, mi escudo y el cuerno[b] de mi salvación, mi fortaleza y mi refugio, mi salvador[c]—tú me salvas de la violencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa posible: «Dios de mi roca». El hebreo permite esa relación constructa; se prefiere la aposición «Dios mío, mi roca» por su mayor naturalidad poética en español.'
    reason: lexical_alternative
  - marker: b
    text: «Cuerno» conserva la imagen hebrea de fuerza y poder victorioso.
    reason: cultural_note
  - marker: c
    text: O «mi libertador».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהֵי
  english_pob_choice: my God
  chosen_spanish: Dios mío
  alternatives_spanish:
  - Dios de mí
  lexicon: HALOT
  rationale: 'La construcción en estado constructo con el posesivo permite en español una aposición natural: ''Dios mío, mi roca''. Mantiene el valor relacional y la cadencia poética sin volverla rígidamente literal.'
- source_word: צוּרִי
  english_pob_choice: my rock
  chosen_spanish: mi roca
  alternatives_spanish:
  - mi peñasco
  - mi peña
  lexicon: HALOT
  rationale: צוּר designa una roca firme y funciona aquí como metáfora estable de protección. 'Roca' es la equivalencia más clara y tradicional en español bíblico sin perder precisión.
- source_word: אֶחֱסֶה בּוֹ
  english_pob_choice: in whom I take refuge
  chosen_spanish: en quien me refugio
  alternatives_spanish:
  - en quien busco refugio
  - en quien busco amparo
  lexicon: HALOT
  rationale: El verbo חסה expresa buscar refugio. En español, la relativa 'en quien me refugio' reproduce con naturalidad el valor relacional de בוֹ y conserva la imagen de amparo.
- source_word: מָגִנִּי
  english_pob_choice: my shield
  chosen_spanish: mi escudo
  lexicon: HALOT
  rationale: Metáfora directa de protección. 'Escudo' es el equivalente preciso y plenamente inteligible en español.
- source_word: קֶרֶן יִשְׁעִי
  english_pob_choice: the horn of my salvation
  chosen_spanish: el cuerno de mi salvación
  alternatives_spanish:
  - el cuerno de mi rescate
  - el cuerno de mi liberación
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de קֶרֶן ('cuerno'), que en el contexto poético simboliza fuerza y poder victorioso. 'Salvación' mantiene el vínculo con el sustantivo hebreo y evita suavizar la metáfora.
- source_word: מִשְׂגַּבִּי
  english_pob_choice: my stronghold
  chosen_spanish: mi fortaleza
  alternatives_spanish:
  - mi baluarte
  - mi refugio elevado
  lexicon: HALOT
  rationale: El sustantivo remite a un lugar alto y seguro. 'Fortaleza' comunica bien seguridad defensiva en español y encaja con la serie de títulos divinos.
- source_word: וּמְנוּסִי
  english_pob_choice: my refuge
  chosen_spanish: mi refugio
  alternatives_spanish:
  - mi lugar de escape
  - mi amparo
  lexicon: HALOT
  rationale: Derivado de la idea de huir para ponerse a salvo. 'Refugio' conserva el sentido y la tonalidad poética de manera breve y natural.
- source_word: מֹשִׁעִי
  english_pob_choice: my savior
  chosen_spanish: mi salvador
  alternatives_spanish:
  - mi libertador
  lexicon: HALOT
  rationale: El participio de ישׁע nombra al que salva. 'Salvador' es el equivalente nominal directo y armoniza con la serie titulativa del verso.
- source_word: מֵחָמָס
  english_pob_choice: from violence
  chosen_spanish: de la violencia
  alternatives_spanish:
  - de la opresión
  - del agravio violento
  lexicon: HALOT
  rationale: חָמָס designa violencia o injusticia violenta. 'De la violencia' conserva el sustantivo abstracto sin especificar agentes que el hebreo no menciona.
- source_word: תֹּשִׁעֵנִי
  english_pob_choice: you save me
  chosen_spanish: tú me salvas
  alternatives_spanish:
  - tú me libras
  - tú me rescatas
  lexicon: HALOT
  rationale: La forma verbal de segunda persona masculina singular con objeto de primera persona expresa la acción de Yahvé hacia el hablante. El presente en español refleja bien la acción característica y continua en el canto.
theological_decisions:
- issue: Conservar la cadena de metáforas divinas sin explicarlas
  english_pob_reading: Retain the concrete metaphors ('rock,' 'shield,' 'horn,' 'stronghold,' 'refuge') rather than flattening them into abstract explanations.
  chosen_spanish_reading: Mantener 'roca', 'escudo', 'cuerno', 'fortaleza' y 'refugio' como imágenes concretas de protección y poder.
  alternative_spanish_readings:
  - protector
  - defensa
  - poder salvador
  - amparo
  rationale: El hebreo acumula títulos poéticos y militares para describir a Dios. Traducirlos como metáforas preserva la textura teológica y evita resolver la tensión poética en una explicación abstracta.
  doctrine_reference: Principio de primacía del texto original; preservar la imaginería bíblica sin sobreinterpretarla.
- issue: Rendering of מֹשִׁעִי as salvador rather than a more interpretive term
  english_pob_reading: my savior
  chosen_spanish_reading: mi salvador
  alternative_spanish_readings:
  - mi libertador
  - mi rescatador
  rationale: '''Salvador'' es una traducción lexical fiel y natural en español. No obliga a una lectura doctrinal posterior, pero sí mantiene la afirmación del texto de que Yahvé es quien salva.'
  doctrine_reference: Lectura directa del participio verbal; evitar cargar el verso con terminología extrabíblica.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el trazado auditado en inglés, especialmente en la cadena de títulos divinos. Se preserva la metáfora concreta de 'cuerno' y la alternancia entre aposición y relativa para reproducir la sintaxis poética sin calco duro. No se detectaron revisiones posteriores que alteren el sentido base del versículo.
  spanish_consistency_notes:
  - Se usa 'Dios' para אֱלֹהֵי y no 'Señor', porque el hebreo no contiene el tetragrámaton aquí.
  - Se mantiene el término 'salvación' para יִשְׁעִי y 'salvador' para מֹשִׁעִי, distinguiendo sustantivo y participio.
  - '''Violencia'' traduce חָמָס de forma abstracta, como en el texto hebreo, sin añadir ''hombres violentos''.'
  - La puntuación con raya introduce el cierre del versículo y la fuerza enfática del último colon poético.
