id: EZK.33.12
reference: Ezekiel 33:12
source:
  edition: WLC
  text: וְ/אַתָּ֣ה בֶן אָדָ֗ם אֱמֹ֤ר אֶל בְּנֵֽי עַמְּ/ךָ֙ צִדְקַ֣ת הַ/צַּדִּ֗יק לֹ֤א תַצִּילֶ֨/נּוּ֙ בְּ/י֣וֹם פִּשְׁע֔/וֹ וְ/רִשְׁעַ֤ת הָֽ/רָשָׁע֙ לֹֽא יִכָּ֣שֶׁל בָּ֔/הּ בְּ/י֖וֹם שׁוּב֣/וֹ מֵֽ/רִשְׁע֑/וֹ וְ/צַדִּ֗יק לֹ֥א יוּכַ֛ל לִֽ/חְי֥וֹת בָּ֖/הּ בְּ/י֥וֹם חֲטֹאתֽ/וֹ־־־־׃
translation:
  text: 'And you[a], son of man, say to the sons of your people: The righteousness of the righteous man will not deliver him in the day of his transgression, and the wickedness of the wicked man—he will not stumble by it in the day he turns from his wickedness[c][b]; and the righteous man will not be able to live by it in the day of his sin.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, 'your people.' The Hebrew says 'the sons of your people.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he will not fall because of it.' The Hebrew uses the image of stumbling.
    reason: lexical_alternative
  - marker: c
    text: That is, by his prior righteousness. The Hebrew pronoun is feminine singular, matching 'righteousness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: This is Ezekiel's standard divine address. A more dynamic rendering like 'mortal' is possible, but 'son of man' preserves the Hebrew idiom and its repeated literary force in the book.
- source_word: בְּנֵי עַמְּךָ
  chosen: the sons of your people
  alternatives:
  - your people
  - the children of your people
  lexicon: HALOT
  rationale: Rendered gender-accurately per project philosophy. The phrase addresses the members of Ezekiel's people; 'your people' is smoother but omits the explicit filial expression in the Hebrew.
- source_word: צִדְקַת הַצַּדִּיק
  chosen: the righteousness of the righteous man
  alternatives:
  - the righteousness of the righteous
  - the justice of the righteous
  lexicon: HALOT
  rationale: צדקה here denotes a person's righteous standing/conduct rather than forensic 'justice' in the abstract. 'Righteous man' reflects the singular masculine adjective used substantivally.
- source_word: תַצִּילֶנּוּ
  chosen: will not deliver him
  alternatives:
  - will not save him
  - will not rescue him
  lexicon: HALOT
  rationale: The Hiphil of נצל commonly means deliver/rescue. 'Deliver' fits the judicial-prophetic context and avoids importing fuller soteriological overtones that 'save' may suggest.
- source_word: בְּיוֹם פִּשְׁעוֹ
  chosen: in the day of his transgression
  alternatives:
  - on the day of his rebellion
  - when he transgresses
  lexicon: HALOT
  rationale: פשע often carries the sense of transgression/rebellion. 'Transgression' is chosen as a clear, weighty English equivalent that fits the singular noun construction.
- source_word: רִשְׁעַת הָרָשָׁע
  chosen: the wickedness of the wicked man
  alternatives:
  - the wickedness of the wicked
  - the guilt of the wicked man
  lexicon: HALOT
  rationale: The pairing preserves the Hebrew wordplay between wickedness and wicked person. 'Guilt' is possible in some contexts, but here the focus is on wicked conduct/state.
- source_word: יִכָּשֶׁל בָּהּ
  chosen: he will not stumble by it
  alternatives:
  - he will not fall because of it
  - he will not be made to stumble by it
  lexicon: HALOT
  rationale: The Niphal of כשל means stumble/fall. The feminine pronoun refers back to 'wickedness.' 'Stumble by it' preserves the metaphor and the pronominal linkage.
- source_word: בְּיוֹם שׁוּבוֹ מֵרִשְׁעוֹ
  chosen: in the day he turns from his wickedness
  alternatives:
  - when he turns from his wickedness
  - on the day of his turning from his wickedness
  lexicon: HALOT
  rationale: שוב with מן expresses turning back/away from prior conduct. 'Turns from' is idiomatic and preserves the repentance motif without over-paraphrase.
- source_word: וְצַדִּיק
  chosen: and the righteous man
  alternatives:
  - and a righteous man
  - and the righteous
  lexicon: HALOT
  rationale: The conjunction introduces the final balancing clause. 'The righteous man' maintains the generic singular pattern used throughout the verse.
- source_word: לֹא יוּכַל לִחְיוֹת בָּהּ
  chosen: will not be able to live by it
  alternatives:
  - will not be able to live because of it
  - will not live by it
  lexicon: HALOT
  rationale: The verb יכל adds inability, which should be represented. The feminine pronoun most naturally points back to the righteous person's righteousness, so 'by it' is retained rather than making the object explicit in translation.
- source_word: בְּיוֹם חֲטֹאתוֹ
  chosen: in the day of his sin
  alternatives:
  - in the day he sins
  - when he sins
  lexicon: HALOT
  rationale: The infinitive-like temporal phrasing is rendered closely. 'His sin' preserves the nominal form and parallels the earlier 'day of his transgression'.
