review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y la mayor parte del sentido del hebreo: la llegada para residir temporalmente, la falta de pasto para los rebaños, la referencia a Canaán y la petición cortés de residir en Gosén. Sin embargo, «el hambre es pesada» no transmite de forma natural ni fiel el valor idiomático de כָבֵד הָרָעָב, que aquí significa que la hambruna es grave/severa. Además, la nota [a] no preserva bien la alternativa inglesa, porque «habitar como residentes temporales» suena menos natural que una formulación con «vivir» o «residir temporalmente».'
  spanish_quality_summary: El español es en general claro y digno, con buen tono bíblico moderno. «Habitar como extranjeros» funciona aceptablemente para לָגוּר, aunque una nota alternativa más idiomática mejora la legibilidad. «El hambre es pesada» suena poco natural en español bíblico general; «la hambruna es grave» o «el hambre es grave» es claramente preferible. El resto del versículo lee bien y conserva la cortesía de la petición.
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. «Tus siervos» es adecuado por el contexto cortesano de עֲבָדֶיךָ. «La tierra de Gosén» y «en la tierra» son compatibles con las decisiones del proyecto. La excepción principal es que la decisión documentada en inglés para כָבֵד הָרָעָב exige una equivalencia idiomática como «grave/severa», no una calca metafórica española poco natural.
  issues:
  - severity: medium
    issue: «el hambre es pesada»
    rationale: Aunque כָבֵד literalmente significa «pesado», en esta construcción con hambre/hambruna el sentido idiomático es «grave, severa». La formulación actual suena antinatural en español y no preserva bien la intención semántica del original ni la decisión inglesa auditada.
  - severity: low
    issue: Nota [a] mejorable
    rationale: La alternativa inglesa documenta «to live as temporary residents in the land». En español, «habitar como residentes temporales» resulta rígido. «Vivir como residentes temporales» o «residir temporalmente en la tierra» preserva mejor la alternativa léxica.
  revised_spanish_text: 'Y dijeron a Faraón[a]: «Hemos venido para habitar como extranjeros en la tierra, porque no hay pasto para los rebaños[b] que pertenecen a tus siervos, pues la hambruna es grave en la tierra de Canaán. Y ahora, te rogamos, permite que tus siervos habiten en la tierra de Gosén».'
  revised_footnotes:
  - marker: a
    text: 'O: «para vivir como residentes temporales en la tierra».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para el ganado pequeño»; el hebreo צֹאן puede referirse colectivamente a ovejas y cabras.'
    reason: lexical_alternative
  revision_rationale: Se cambió «el hambre es pesada» por «la hambruna es grave» para expresar el valor idiomático de כָבֵד הָרָעָב en español natural y fiel. También se afinó la nota [a] para reflejar de manera más idiomática la alternativa léxica documentada en el POB inglés. Se conservaron las demás decisiones, que están bien alineadas con el hebreo y con el tono cortesano del pasaje.
