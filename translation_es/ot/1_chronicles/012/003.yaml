  glossary_alignment: No hay términos teológicos sensibles en este versículo. Los nombres propios y gentilicios están razonablemente alineados con la práctica del proyecto. Las variantes de transliteración pueden mantenerse en español, pero las notas deben corresponder exactamente al nombre afectado.
