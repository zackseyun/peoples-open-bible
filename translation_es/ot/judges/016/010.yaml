review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido del hebreo: «Entonces», «Mira», la acusación doble y la petición final. «Te has burlado de mí» representa adecuadamente הֵתַלְתָּ בִּי, y «con qué podrías ser atado» conserva bien el instrumental y la pasiva potencial de בַּמֶּה תֵּאָסֵר.'
  spanish_quality_summary: El texto es claro y natural en general, pero «me has hablado mentiras» suena poco idiomático en español y resulta forzado. Conviene ajustar esa frase a una formulación más natural sin perder el matiz del hebreo. También la nota al pie actual contiene una alternativa defectuosa en español («te has hecho el tonto conmigo»), que no expresa bien «hacerme quedar como tonta / burlarte de mí».
  glossary_alignment: No hay términos de glosario teológicamente sensibles en este versículo. Los nombres propios «Dalila» y «Sansón» son correctos. La decisión léxica principal sobre הֵתַלְתָּ puede mantenerse, con una nota alternativa mejor formulada.
  issues:
  - severity: medium
    issue: «me has hablado mentiras» es poco natural en español
    rationale: Aunque intenta reflejar de cerca «spoken lies to me», en español estándar suena torpe. «Me has dicho mentiras» o «me has hablado con mentiras» serían más naturales; la primera es la mejor combinación de fidelidad y legibilidad.
  - severity: medium
    issue: La nota alternativa «te has hecho el tonto conmigo» no refleja correctamente el sentido
    rationale: Esa expresión en español describe al sujeto como quien finge ignorancia, no a la víctima como alguien engañado. El sentido documentado es más bien «me has hecho quedar como tonta» o «has hecho de mí una tonta».
  revised_spanish_text: 'Entonces Dalila dijo a Sansón[a]: «Mira, te has burlado de mí y me has dicho mentiras. Ahora, por favor, dime con qué podrías ser atado».'
  revised_footnotes:
  - marker: a
    text: 'O: «me has hecho quedar como tonta»; el verbo hebreo puede expresar burla o trato engañoso mediante engaño.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «me has hablado mentiras» por «me has dicho mentiras» para lograr un español más natural sin perder el sentido de כזבים en plural. También se corrige la nota léxica para que la alternativa española exprese correctamente que Dalila fue hecha objeto de burla o engaño, en línea con la justificación del POB en inglés.
