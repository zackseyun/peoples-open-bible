translation:
  language: es
  text: No lo persigas[a], porque se ha alejado, y ha escapado como una gacela[b] de un lazo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No lo persigas de cerca» o «No lo sigas». El verbo griego puede denotar persecución o seguimiento más generalmente.'
    reason: lexical_alternative
  - marker: b
    text: La imagen es la de un animal veloz que se libra de una trampa de cazador; «gacela» también podría verterse «corza» o «antílope».
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ... διώξῃς
  english_pob_choice: Do not pursue
  chosen_spanish: No lo persigas
  alternatives_spanish:
  - No lo sigas
  - No lo vayas a perseguir
  - No lo caces
  lexicon: LSJ
  rationale: διώκω puede expresar perseguir o dar caza. En este contexto sapiencial, «persigas» conserva la fuerza del imperativo y permite la ambigüedad entre seguimiento literal y persecución más intensa, sin introducir una lectura hostil que el griego no exige.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - esa persona
  lexicon: LSJ
  rationale: El pronombre es masculino singular en griego. En español, el objeto directo átono «lo» comunica de forma natural y directa el referente masculino, manteniendo la precisión gramatical del original.
- source_word: μακρὰν ἀπέστη
  english_pob_choice: he has gone far away
  chosen_spanish: se ha alejado
  alternatives_spanish:
  - se ha ido lejos
  - se ha apartado lejos
  - ha partido muy lejos
  lexicon: LSJ
  rationale: ἀφίστημι aquí indica apartarse o retirarse. «Se ha alejado» es idiomático en español y conserva tanto el movimiento de separación como la distancia implícita en μακράν, sin sonar rígido.
- source_word: ἐξέφυγεν
  english_pob_choice: has escaped
  chosen_spanish: ha escapado
  alternatives_spanish:
  - se ha escapado
  - ha huido
  - se ha librado
  lexicon: LSJ
  rationale: El verbo expresa salir de peligro o zafarse. «Ha escapado» corresponde bien al paralelismo con la imagen del animal que logra salir de la trampa.
- source_word: ὡς δορκὰς
  english_pob_choice: like a gazelle
  chosen_spanish: como una gacela
  alternatives_spanish:
  - como una corza
  - como un antílope
  lexicon: LSJ
  rationale: δορκάς puede referir a una gacela o animal similar. «Gacela» es la equivalencia moderna más clara y preserva la idea de rapidez y agilidad en la huida.
- source_word: ἐκ παγίδος
  english_pob_choice: from a snare
  chosen_spanish: de una trampa
  alternatives_spanish:
  - de un lazo
  - de una red
  - de una snare
  lexicon: LSJ
  rationale: παγίς significa trampa o lazo. «Trampa» es natural en español contemporáneo y mantiene la imagen concreta del escape, aunque «lazo» también sería posible en un registro más figurado.
translation_notes:
  revision_awareness: 'El testimonio inglés reciente no introdujo cambios sustantivos: se mantuvo la lectura de διώκω como ‘pursue’, μακρὰν ἀπέστη como alejamiento completo, y ὡς δορκάς como imagen de un animal veloz que escapa de una trampa.'
  spanish_consistency_notes:
  - Se preservó el paralelismo breve del griego con dos miembros coordinados por «porque» y «y».
  - Se eligió «gacela» por claridad contemporánea, sin perder la posibilidad alternativa indicada en la nota.
  - Se evitó «perseguir» en sentido exclusivamente hostil; en español «persigas» permite la amplitud semántica del griego.
