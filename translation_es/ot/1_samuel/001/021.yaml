translation:
  language: es
  text: Entonces el hombre Elcaná subió con toda su familia para sacrificar a Yahvé el sacrificio anual y su voto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «y su voto», con el verbo «sacrificar» entendido elípticamente; el sentido es que subió también para cumplir lo que había votado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue
  - ascendió
  lexicon: HALOT
  rationale: עלה expresa movimiento ascendente; en contexto de peregrinación al santuario, español natural es 'subió', que conserva el sentido geográfico y cultual sin volverse rígido.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el esposo
  - el varón
  lexicon: HALOT
  rationale: אִישׁ se traduce de manera más directa como 'hombre'. Aunque el contexto familiar permitiría 'esposo', esa opción interpreta más de lo que el hebreo dice aquí.
- source_word: אֶלְקָנָה
  english_pob_choice: Elkanah
  chosen_spanish: Elcaná
  alternatives_spanish:
  - Elcana
  lexicon: convención onomástica
  rationale: Se translitera el nombre propio en forma usual del español bíblico, ajustando la acentuación para lectura natural.
- source_word: וְכָל בֵּיתוֹ
  english_pob_choice: with all his household
  chosen_spanish: con toda su casa
  alternatives_spanish:
  - con toda su familia
  - con toda su casa de familia
  lexicon: HALOT
  rationale: בַּיִת en este uso puede referirse al conjunto de miembros del hogar. 'Casa' conserva el matiz colectivo y el vínculo semítico más cercano, aunque en español moderno 'familia' también sería posible.
- source_word: לִזְבֹּחַ
  english_pob_choice: to sacrifice
  chosen_spanish: para sacrificar
  alternatives_spanish:
  - para ofrecer sacrificio
  lexicon: HALOT
  rationale: El infinitivo culto de זבח pide un verbo culto y directo. 'Sacrificar' es breve y fiel al acto cultual sin añadir contenido no presente.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue la norma del proyecto para el nombre divino: ''Yahvé''. En español bíblico resulta más estable y reconocible que mantener la forma hebraizante ''Yahweh'' en el texto principal.'
- source_word: זֶבַח הַיָּמִים
  english_pob_choice: the yearly sacrifice
  chosen_spanish: el sacrificio anual
  alternatives_spanish:
  - el sacrificio de los días
  - el sacrificio acostumbrado
  lexicon: HALOT
  rationale: La expresión es idiomática y se refiere a una ofrenda recurrente de carácter anual. 'Anual' comunica el sentido contextual con claridad y sin forzar una paráfrasis.
- source_word: וְאֶת נִדְרוֹ
  english_pob_choice: and his vow
  chosen_spanish: y su voto[a]
  alternatives_spanish:
  - y su promesa
  - y el voto que había hecho
  lexicon: HALOT
  rationale: Se preserva la coordinación hebrea sin introducir 'cumplir' en el texto principal, porque el hebreo coordinaba el sustantivo 'voto' con el sacrificio de manera elíptica. 'Voto' mantiene el lenguaje cultual formal.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. La pauta española del proyecto pide 'Yahvé' como forma principal, evitando la convención de máscara 'SEÑOR' y manteniendo el nombre del pacto en el texto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre 'sacrificar' y 'su voto'
  english_pob_reading: and his vow
  chosen_spanish_reading: y su voto
  alternative_spanish_readings:
  - y para cumplir su voto
  - y a cumplir su voto
  rationale: Siguiendo la revisión del POB, el hebreo no añade explícitamente un verbo como 'cumplir'; deja una coordinación elíptica. En español se conserva esa tensión con 'y su voto', manteniendo abierta la lectura de que el acto sacrificial está relacionado con la ejecución del voto.
  doctrine_reference: Revisión aplicada del texto fuente y nota lexical del POB
translation_notes:
  revision_awareness: La versión inglesa final del POB revisó una redacción más explicativa ('and to fulfill his vow') para volver al hebreo más estrecho ('and his vow'). La versión española sigue esa revisión y mantiene la elipsis en el texto principal, mientras la nota recoge la alternativa interpretativa explícita.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en vez de 'SEÑOR' conforme a la terminología del proyecto.
  - '''Sacrificar'' se conserva como verbo cultual directo; no se reemplaza por ''ofrecer'' salvo necesidad contextual.'
  - '''Voto'' mantiene la correspondencia con נדר, y la nota explica la elipsis sin alterar el texto principal.'
  - La puntuación y el orden de cláusulas buscan sonar naturales en español sin perder el paralelismo hebreo.
