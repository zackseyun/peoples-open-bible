lexical_decisions:
- source_word: καθὼς
  english_pob_choice: As
  chosen_spanish: Como
  alternatives_spanish:
  - Así como
  - Tal como
  lexicon: BDAG
  rationale: Introduce la cita escritural de manera natural en español y conserva la relación comparativa/formulaica que abre la cita.
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - ha sido escrito
  - se ha escrito
  lexicon: BDAG
  rationale: El perfecto pasivo se traduce con una fórmula estable en español que expresa el estado vigente de la Escritura citada.
- source_word: ὅτι
  english_pob_choice: ':'
  chosen_spanish: ':'
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: Después de la fórmula de cita, el español fluye mejor con dos puntos para introducir la cita textual, como en el audit trail inglés.
- source_word: Οὐκ ἔστιν
  english_pob_choice: There is no
  chosen_spanish: No hay
  alternatives_spanish:
  - No existe
  - No está
  lexicon: BDAG
  rationale: La negación existencial transmite con naturalidad el valor del griego y mantiene el alcance absoluto de la afirmación.
- source_word: δίκαιος
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justificado
  lexicon: BDAG
  rationale: «Justo» conserva el peso moral y relacional de δίκαιος en el uso paulino y es la equivalencia más directa en español bíblico contemporáneo.
- source_word: οὐδὲ εἷς
  english_pob_choice: not even one
  chosen_spanish: ni siquiera uno
  alternatives_spanish:
  - ni uno solo
  - ni uno
  lexicon: BDAG
  rationale: Reproduce la fuerza enfática del griego y el cierre absoluto de la cláusula sin suavizarlo.
theological_decisions:
- issue: Alcance universal de la negación
  english_pob_reading: There is no one righteous
  chosen_spanish_reading: No hay justo, ni siquiera uno
  alternative_spanish_readings:
  - No hay nadie justo
  - No existe un justo
  rationale: Se conserva la afirmación universal y tajante del texto, sin introducir una categoría adicional como «persona» que no aparece en el griego.
  doctrine_reference: Romanos 3:10; universalidad del pecado humano en el argumento paulino
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y coincide sustancialmente con la lectura inglesa auditada. No se añadieron elementos explicativos; la única decisión de estilo fue usar una negación existencial natural en español y mantener el cierre enfático con «ni siquiera uno».
  spanish_consistency_notes:
  - Se usa «justo» como equivalente de δίκαιος, en línea con el valor moral/covenantal del pasaje.
  - Se conserva la fórmula de cita bíblica con dos puntos, coherente con el uso de la POB inglesa.
  - La negación se presenta de manera absoluta y sobria, sin resolver la tensión teológica del texto.
