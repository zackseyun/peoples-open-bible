translation:
  language: es
  text: El sol sale sobre todo lo revelado[b][a], y la gloria del Señor está sobre todas sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sobre todo lo revelado/visible». El paralelo griego se acerca más a: «dando luz, mira todo».'
    reason: alternative_reading
  - marker: b
    text: El testigo hebreo más antiguo de Masada parece preservar en esta línea una redacción diferente de la del texto de la Guenizá de El Cairo en que se basa la traducción principal.
    reason: textual_variant
lexical_decisions:
- source_word: שמש
  english_pob_choice: The sun
  chosen_spanish: El sol
  alternatives_spanish:
  - El astro solar
  - El sol
  lexicon: HALOT
  rationale: שמש nombra el cuerpo celeste; en español, «el sol» es la forma natural y fiel, sin sobrecargar el verso con perífrasis innecesarias.
- source_word: זורחת
  english_pob_choice: rises over
  chosen_spanish: se eleva sobre
  alternatives_spanish:
  - sale sobre
  - resplandece sobre
  - amanece sobre
  lexicon: HALOT
  rationale: El participio de זרח puede incluir la idea de salir/radiar luz. Dado que el audit trail inglés retiró «and shines» por no estar explícito en el hebreo, «se eleva sobre» conserva la imagen de salida del sol sin añadir un matiz no asegurado.
- source_word: על כל
  english_pob_choice: over everything
  chosen_spanish: sobre todo
  alternatives_spanish:
  - sobre todo lo
  - sobre cada cosa
  - sobre todo lo que
  lexicon: HALOT
  rationale: La expresión marca alcance total. «Sobre todo» comunica la amplitud universal de manera natural en español y mantiene el paralelismo poético.
- source_word: נגלתה
  english_pob_choice: revealed
  chosen_spanish: lo revelado
  alternatives_spanish:
  - lo visible
  - lo descubierto
  - lo manifiesto
  lexicon: HALOT
  rationale: El hebreo sugiere lo que está descubierto o manifiesto; «lo revelado» preserva esa idea resultativa y funciona bien en el paralelismo con «las obras» de Dios.
- source_word: כבוד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - majestad
  lexicon: HALOT
  rationale: «Gloria» es la equivalencia más estable y teológicamente cargada para כבוד, especialmente en relación con Dios.
- source_word: ה'
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor
  lexicon: HALOT
  rationale: En este pasaje de Sirácida, la tradición textual y el uso convencional del título divino favorecen «el Señor» como forma española clara y reverente. Se evita un nombre propio en el cuerpo del verso porque el audit trail inglés también mantiene la lectura titulada, no una transcripción directa.
- source_word: מעשיו
  english_pob_choice: his works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  - lo que ha hecho
  lexicon: HALOT
  rationale: מַעֲשָׂיו abarca obras/hechos. «Sus obras» conserva la concisión poética y el campo semántico de ἔργον en el paralelo griego.
theological_decisions:
- issue: Rendering of the divine title in Sirach 42:16
  english_pob_reading: the glory of the Lord is over all his works
  chosen_spanish_reading: la gloria del Señor está sobre todas sus obras
  alternative_spanish_readings:
  - la gloria de Yahvé está sobre todas sus obras
  - la gloria del Señor está sobre toda su obra
  rationale: El hebreo conserva un título divino abreviado (ה'), y el contexto de Sirácida favorece una traducción reverente y convencional. «El Señor» mantiene la referencia divina sin introducir una forma más marcada que el audit trail no exige.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (YHWH-related renderings); Translation philosophy §2'
- issue: Managing the Hebrew-Greek slight mismatch in the first colon
  english_pob_reading: The sun rises over everything revealed
  chosen_spanish_reading: El sol se eleva sobre todo lo revelado
  alternative_spanish_readings:
  - El sol, dando luz, mira todo
  - El sol sale sobre todo lo visible
  rationale: La base hebrea es primaria, pero el griego confirma una acción de iluminación y visión universal. «Lo revelado» conserva el valor del hebreo sin borrar la tensión textkritische entre «revelado/visible» y el énfasis griego en iluminar y mirar.
  doctrine_reference: 'PHILOSOPHY.md: Original-language primacy and transparency principles'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: se omite cualquier equivalente de «and shines» porque no está explícito en el hebreo principal, pero se conserva la idea de amplitud universal y la lectura «lo revelado» para נגלתה. También se respeta la tensión entre la base hebrea y el paralelo griego sin armonizarla en exceso.'
  spanish_consistency_notes:
  - Se usa «el Señor» para el título divino, conforme al tratamiento habitual de Sirácida en este proyecto y sin sustituirlo por «SEÑOR» tipográfico.
  - «Gloria» se mantiene para כבוד por coherencia con el resto del corpus bíblico en español.
  - «Sus obras» conserva el plural y la concisión del paralelo, evitando singularizar la frase.
  - La nota al pie marca explícitamente la lectura alternativa del hebreo y el matiz del griego, como exige la trazabilidad del texto.
