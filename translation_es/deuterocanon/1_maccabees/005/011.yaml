review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: preparación en curso, llegada, toma del lugar fortificado y liderazgo de Timoteo sobre la fuerza enemiga. Sin embargo, «a la que hemos huido» suena antinatural en español y no expresa bien el sentido de καταφεύγω como huir buscando refugio; conviene «en la que nos hemos refugiado» o equivalente. Además, «tomar por asalto» introduce un matiz de asalto explícito que el griego no exige; προκαταλαβέσθαι apunta más a apoderarse preventivamente que necesariamente a un asalto. El resto es básicamente fiel.'
  spanish_quality_summary: 'El texto es claro, pero dos giros reducen su naturalidad y precisión: «a la que hemos huido» es poco idiomático, y «va al frente de su campamento» puede leerse de forma algo física más que militar. Una redacción más natural y precisa en español bíblico moderno mejora la legibilidad sin perder formalidad.'
  glossary_alignment: No hay términos del glosario principal especialmente implicados aquí. «Fortaleza» para ὀχύρωμα y «campamento» para παρεμβολή son aceptables. La revisión propuesta mantiene terminología natural y fiel al expediente léxico inglés, añadiendo una nota para conservar el matiz preventivo de προκαταλαβέσθαι que el inglés preservó en nota.
  issues:
  - severity: medium
    issue: «a la que hemos huido» es poco natural y semánticamente débil para καταφεύγω
    rationale: El verbo griego significa huir para buscar refugio. En español, «huir a» aquí suena forzado; «refugiarnos en» expresa mejor el sentido locativo y de refugio.
  - severity: medium
    issue: «tomar por asalto» añade un matiz no exigido por προκαταλαβέσθαι
    rationale: El compuesto enfatiza la toma anticipada/preventiva, no necesariamente el modo de asalto. «Apoderarse de» o «tomar» es más exacto; el matiz preventivo puede conservarse en nota.
  - severity: low
    issue: Falta una nota para el matiz preemptivo preservado en el audit trail inglés
    rationale: El expediente inglés documenta explícitamente la fuerza lexical de προκαταλαβέσθαι. En español conviene conservar esa alternativa en nota, ya que el texto principal idiomático no la explicita por completo.
  - severity: low
    issue: «va al frente de su campamento» puede sonar algo menos directo que una formulación militar más natural
    rationale: Aunque es admisible, «dirige su campamento» o «está al frente de su campamento» suena más estable en registro narrativo militar.
  revised_spanish_text: Y se preparan para venir y apoderarse[a] de la fortaleza en la que nos hemos refugiado; y Timoteo dirige su campamento.
  revised_footnotes:
