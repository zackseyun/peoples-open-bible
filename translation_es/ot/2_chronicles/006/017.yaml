review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la mayoría de los elementos fuente: «Ahora», «Yahvé», «Dios de Israel», «tu palabra», «a tu siervo David». Sin embargo, el núcleo verbal יֵאָמֵן es nifal/jusivo pasivo-resultativo («sea confirmada / quede confirmada / se establezca»), mientras que «confirma» lo convierte en imperativo activo de segunda persona. Eso altera la forma y ligeramente la perspectiva de la súplica. También «que has hablado» es entendible, pero «que hablaste» o «que dijiste» refleja más sencillamente el perfecto hebreo en este contexto.'
  spanish_quality_summary: El español es claro y legible, con buen tono bíblico moderno. No obstante, «confirma tu palabra que has hablado» suena algo menos natural que «sea confirmada tu palabra que hablaste» o «cumple tu palabra que hablaste». Dado que el inglés auditado preserva «word» y «be confirmed», conviene una formulación española más cercana al valor pasivo sin perder naturalidad.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: «Yahvé» para יהוה, «Dios» para אֱלֹהֵי, «siervo» apropiado para עבד en contexto real-covenantal, y «palabra» en vez de «promesa» conforme a la decisión auditada. La principal desalineación es verbal: יֵאָמֵן no debe representarse como imperativo activo «confirma» cuando el audit trail y el hebreo piden un pasivo/jusivo como «sea confirmada» o «quede confirmada».'
  issues:
  - severity: high
    issue: «confirma» traduce יֵאָמֵן como imperativo activo en lugar de una petición pasiva/jusiva
    rationale: El hebreo nifal יֵאָמֵן expresa que la palabra sea confirmada/establecida. «Confirma» pide directamente que Dios haga la acción, lo cual es cercano en sentido general pero no preserva fielmente la forma ni la perspectiva del original ni la decisión inglesa «be confirmed».
  - severity: medium
    issue: La nota al pie en [a] no conserva la alternativa principal documentada para דְּבָרְךָ/יֵאָמֵן
    rationale: La nota inglesa ofrece «let your promise be established» y «let your word prove true». La nota española actual solo comenta «Y ahora», una alternativa menor. Es mejor preservar en nota la alternativa léxica principal del audit trail.
  - severity: low
    issue: «que has hablado» es menos directo que «que hablaste» en este contexto narrativo-litúrgico
    rationale: El perfecto compuesto es posible en español, pero «que hablaste» suena más natural y más sobrio en un registro bíblico, además de corresponder bien al perfecto hebreo simple.
  revised_spanish_text: Ahora, Yahvé, Dios de Israel, sea confirmada tu palabra[a] que hablaste a tu siervo David.
  revised_footnotes:
  - marker: a
    text: 'O: «se establezca tu promesa» o «tu palabra resulte verdadera».'
    reason: lexical_alternative
  revision_rationale: Se corrige el verbo principal para reflejar el nifal/jusivo hebreo y la decisión auditada «be confirmed». Se mantiene «tu palabra» por fidelidad léxica, con una nota que conserva las alternativas principales del POB inglés. También se simplifica «que has hablado» a «que hablaste» para mayor naturalidad y sobriedad en español bíblico moderno.
