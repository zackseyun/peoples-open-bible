translation:
  language: es
  text: Por tanto, créanme[a], y recibirán puestos de autoridad[b] sobre mis asuntos, si renuncian a la ordenanza ancestral de su modo de vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «crean» o «confíen». El imperativo griego puede expresar creer o confiar; aquí funciona como una exigencia real de aceptar la propuesta del rey.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cargos gobernantes» o «magistraturas». El griego puede entenderse de forma más cívica, pero aquí alude a posiciones de autoridad dentro de los asuntos del rey.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστεύσατε
  english_pob_choice: believe me
  chosen_spanish: crean en mí
  alternatives_spanish:
  - créanme
  - confíen en mí
  - obedezcan
  lexicon: LSJ
  rationale: El griego πιστεύσατε puede significar creer, confiar o conceder credibilidad. En el contexto de un discurso real coercitivo, la POB inglesa opta por mantener el valor de 'believe me' y no reducirlo a mera obediencia. En español, 'crean en mí' conserva la carga de fe/confianza sin introducir una paráfrasis ajena al verbo.
- source_word: ἀρχὰς ἡγεμονικὰς
  english_pob_choice: ruling offices
  chosen_spanish: puestos de autoridad
  alternatives_spanish:
  - cargos de gobierno
  - oficios de mando
  - magistraturas
  lexicon: LSJ
  rationale: La combinación señala cargos o posiciones de autoridad política, no 'comienzos'. 'Puestos de autoridad' comunica bien la idea de posiciones investidas de mando y evita un tecnicismo demasiado rígido. Se preserva la fuerza gubernativa de ἡγεμονικὰς sin sobreinterpretar el tipo exacto de cargo.
- source_word: λήμψεσθε
  english_pob_choice: you will receive
  chosen_spanish: recibirán
  alternatives_spanish:
  - obtendrán
  - tendrán
  lexicon: LSJ
  rationale: El futuro de λαμβάνω expresa aquí recibir lo concedido por el rey. 'Recibirán' mantiene esa pasividad receptiva y el matiz de don/premio ofrecido.
- source_word: τῶν ἐμῶν πραγμάτων
  english_pob_choice: my affairs
  chosen_spanish: mis asuntos
  alternatives_spanish:
  - mis negocios
  - mis intereses
  - mis asuntos de gobierno
  lexicon: LSJ
  rationale: πράγματα cubre asuntos, ocupaciones o intereses. 'Mis asuntos' es natural en español y suficientemente amplio para incluir la esfera de gobierno del hablante sin añadir precisión no explícita en el griego.
- source_word: ἀρνησάμενοι
  english_pob_choice: if you renounce
  chosen_spanish: si renuncian
  alternatives_spanish:
  - después de renunciar
  - habiendo renunciado
  - al renunciar
  lexicon: LSJ
  rationale: El participio expresa la condición de acceso a la recompensa. En español, la cláusula condicional 'si renuncian' hace explícita esa relación sin cambiar el contenido.
- source_word: πάτριον
  english_pob_choice: ancestral
  chosen_spanish: ancestral
  alternatives_spanish:
  - patrio
  - tradicional
  - de sus padres
  lexicon: LSJ
  rationale: πάτριος se refiere a lo heredado de los antepasados. 'Ancestral' es breve, fiel y claro en español contemporáneo.
- source_word: πολιτείας
  english_pob_choice: way of life
  chosen_spanish: manera de vivir
  alternatives_spanish:
  - constitución
  - común orden
  - civismo
  - modo de vida
  lexicon: LSJ
  rationale: Aunque πολιτεία puede significar constitución o ciudadanía, en este contexto remite al orden de vida comunitario regulado por la ley ancestral. 'Manera de vivir' conserva esa dimensión práctica y evita imponer una lectura exclusivamente política o jurídica.
- source_word: θεσμόν
  english_pob_choice: ordinance
  chosen_spanish: ordenanza
  alternatives_spanish:
  - estatuto
  - institución
  - ley
  lexicon: LSJ
  rationale: θεσμός denota una disposición establecida, una norma o institución estable. 'Ordenanza' mantiene el tono formal y vinculante del término sin forzarlo hacia 'ley' en sentido técnico.
theological_decisions:
- issue: Relación entre πιστεύσατε y el contexto coercitivo del discurso
  english_pob_reading: '''believe me'' rather than ''comply'' or purely ''trust'''
  chosen_spanish_reading: '''crean en mí'''
  alternative_spanish_readings:
  - '''créanme'''
  - '''confíen en mí'''
  - '''obedezcan'''
  rationale: Se preserva la tensión entre creer y confiar, evitando traducir el imperativo como simple obediencia. El español elegido mantiene la posibilidad de una aceptación personal del discurso del rey sin borrar el matiz de persuasión/credibilidad que el griego permite.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido de πολιτεία en un contexto judío de ley ancestral
  english_pob_reading: '''way of life'''
  chosen_spanish_reading: '''manera de vivir'''
  alternative_spanish_readings:
  - '''constitución'''
  - '''commonwealth'''
  - '''ciudadanía'''
  rationale: La frase apunta al orden de vida heredado y normado por la tradición ancestral, no sólo a una constitución política abstracta. 'Manera de vivir' retiene la dimensión social-religiosa y la condición de abandono total que el pasaje exige.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La redacción española sigue el ajuste más reciente del POB inglés, que volvió de una traducción tipo 'comply' a 'believe me' para πιστεύσατε. También conserva la lectura condicional de ἀρνησάμενοι y la interpretación de πολιτεία como el orden de vida heredado, no como una simple noción abstracta de constitución.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el tetragrámaton ni un sustituto divino.
  - Se evitó 'Cristo' porque el texto no lo contiene.
  - Se tradujo δοῦλος no aplica aquí; no hubo necesidad de decidir entre 'esclavo' y 'siervo'.
  - Se preservó un español neutral y eclesialmente legible, sin recurrir a calco excesivo ni a arcaísmos de la tradición bíblica castellana.
