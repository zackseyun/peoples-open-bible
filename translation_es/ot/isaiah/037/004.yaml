  rationale: Se hizo una reparación menor para mejorar la naturalidad de la cláusula con וְהוֹכִיחַ y para alinear la nota léxica con la justificación documentada en el POB inglés. También se ajustó la nota del remanente para que aporte alternativas reales en vez de repetir el texto principal.
