  - marker: a
    text: O «todos sus soldados». El hebreo dice literalmente «todos sus hombres», lo cual en este contexto de batalla probablemente se refiere a su fuerza de combate o séquito, no a toda persona asociada con Saúl.
    reason: lexical_alternative
  - marker: b
    text: Algunos testigos griegos dicen «toda su armadura» en lugar de «todos sus hombres». El texto hebreo respalda «todos sus hombres».
    reason: textual_variant
