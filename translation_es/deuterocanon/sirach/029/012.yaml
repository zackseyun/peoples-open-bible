review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: el imperativo σύγκλεισον se transmite de forma idiomática, ἐλεημοσύνην se entiende correctamente como acto concreto de dar limosna, y la segunda cláusula preserva la eficacia protectora atribuida a la limosna. Sin embargo, «en tus tesoros» para ἐν τοῖς ταμείοις σου se aparta del campo semántico de receptáculos/depósitos y en español sugiere más bien riquezas mismas, no el lugar donde se guardan. Eso debilita la imagen de guardar algo en un sitio seguro.'
  spanish_quality_summary: El español es claro y digno, pero «Atesora la limosna en tus tesoros» suena algo redundante y conceptualmente confuso, porque «atesorar» ya contiene la idea de tesoro y «tesoros» no funciona bien como ubicación. Una formulación como «Guarda la limosna en tus depósitos» o «... en tus almacenes» suena más natural y conserva mejor la metáfora. El resto del verso y las notas son legibles y adecuadas.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. «Limosna», «rescatará» y «aflicción» están bien alineados con las decisiones auditadas. La única desalineación léxica importante es ταμεῖον: conviene un término locativo como «depósitos» en el texto principal, dejando «tesoros» como alternativa literal/figurada en nota si se desea.'
  issues:
  - severity: medium
    issue: «en tus tesoros» no representa bien ταμείοις como lugar de almacenamiento
    rationale: El griego habla de guardar la limosna en receptáculos, depósitos o tesorerías; «tesoros» en español suele denotar los bienes valiosos mismos, no el sitio donde se guardan. Esto enturbia la imagen del original.
  - severity: low
    issue: Redundancia estilística en «Atesora ... en tus tesoros»
    rationale: La repetición de la raíz conceptual tesoro/atesorar suena menos natural en español y puede distraer del sentido principal.
  revised_spanish_text: Guarda la limosna en tus depósitos[a], y ella te rescatará de toda aflicción[b].
  revised_footnotes:
  - marker: a
    text: 'O: «Atesora la limosna en tus tesoros»; el griego dice literalmente: «encierra la limosna en tus tesoros/depósitos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de todo mal».'
    reason: alternative_reading
  revision_rationale: Se reemplaza «Atesora ... en tus tesoros» por «Guarda ... en tus depósitos» para reflejar mejor ταμείοις como lugar de almacenamiento y evitar una construcción redundante en español. Se conserva la alternativa más figurada en nota, junto con la literalidad del griego.
