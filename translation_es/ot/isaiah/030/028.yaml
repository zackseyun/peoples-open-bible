  - severity: medium
    issue: ‘tamiz de vaciedad’ es poco natural en español.
    rationale: Aunque busca preservar ‘emptiness’, ‘vaciedad’ suena forzado. ‘Tamiz de vacío’ mantiene el sentido de nulidad/futilidad con mejor legibilidad.
  - severity: medium
    issue: ‘mejillas’ debilita la metáfora del freno sobre la boca/jaw.
    rationale: Con רֶסֶן ‘freno/bridle’, לְחָיֵי se entiende mejor como quijadas/mandíbulas que como mejillas.
  - severity: high
