theological_decisions:
- issue: Genitive relation in τὸ εὐαγγέλιον τῆς δόξης τοῦ μακαρίου θεοῦ
  chosen_reading: the gospel of the glory of the blessed God
  alternative_readings:
  - the glorious gospel of the blessed God
  rationale: The traditional English rendering 'glorious gospel' interprets the genitive construction adjectivally. The Greek more directly reads 'gospel of the glory,' and optimal equivalence favors preserving that form unless clarity demands otherwise. The alternative is preserved in a footnote because it is idiomatic and longstanding.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Sense of ἐπιστεύθην
  chosen_reading: I was entrusted
  alternative_readings:
  - I believed
  rationale: Although πιστεύω commonly means 'believe,' in the passive with a thing entrusted it means 'be entrusted with.' Context and standard lexicons support this administrative/commissioning sense, especially in Pauline self-reference to stewardship of the gospel.
  doctrine_reference: Translation philosophy §1, §5
