translation:
  language: es
  text: Y todo el que los toque[a] será impuro, y lavará sus vestidos y se bañará en agua, y será impuro hasta el anochecer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, los objetos asociados con la impureza de ella en el contexto anterior, como aquello sobre lo que se acuesta o se sienta.
    reason: cross_reference
lexical_decisions:
- source_word: וְכָל הַנּוֹגֵעַ
  english_pob_choice: And everyone who touches
  chosen_spanish: Y todo el que toque
  alternatives_spanish:
  - Y cualquiera que toque
  - Y quien toque
  lexicon: HALOT
  rationale: El participio hebreo funciona sustantivamente con valor indefinido universal. «Todo el que» conserva esa amplitud y suena natural en español bíblico contemporáneo.
- source_word: בָּם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - ellos
  - esas cosas
  lexicon: HALOT
  rationale: El sufijo pronominal masculino plural retoma los objetos mencionados en el contexto previo. En español, el pronombre átono «los» evita sobreexplicar y conserva la referencia anafórica.
- source_word: יִטְמָא
  english_pob_choice: shall be unclean
  chosen_spanish: será impuro
  alternatives_spanish:
  - quedará impuro
  - será inmundo
  lexicon: HALOT
  rationale: En contexto levítico, טמא designa impureza ritual, no culpa moral. «Impuro» preserva esa categoría cultual con claridad en español.
- source_word: וְכִבֶּס בְּגָדָיו
  english_pob_choice: and he shall wash his clothes
  chosen_spanish: y lavará sus vestidos
  alternatives_spanish:
  - y lavará sus ropas
  - y lavará sus prendas
  lexicon: HALOT
  rationale: כיבס se refiere a lavar o limpiar la ropa en un contexto ritual. «Vestidos» mantiene un registro bíblico digno sin perder inteligibilidad.
- source_word: וְרָחַץ בַּמַּיִם
  english_pob_choice: and bathe in water
  chosen_spanish: y se bañará en agua
  alternatives_spanish:
  - y se lavará en agua
  - y se bañará con agua
  lexicon: HALOT
  rationale: רחץ aquí apunta al lavado del cuerpo, no solo de manos o ropa. «Se bañará» comunica esa acción corporal de forma clara y natural.
- source_word: וְטָמֵא עַד הָעָרֶב
  english_pob_choice: and be unclean until the evening
  chosen_spanish: y será impuro hasta el anochecer
  alternatives_spanish:
  - y quedará impuro hasta la tarde
  - y será impuro hasta la noche
  lexicon: HALOT
  rationale: «Hasta el anochecer» refleja bien עַד הָעָרֶב y evita ambigüedad regional de «tarde». Mantiene la duración ritual de la impureza.
theological_decisions:
- issue: Naturaleza de la impureza ritual en Levítico
  english_pob_reading: Render טמא/unclean in ritual-purity terms, not as moral sinfulness.
  chosen_spanish_reading: Traducir טמא como «impuro» en sentido ritual, no como condena moral.
  alternative_spanish_readings:
  - inmundo
  - contaminado
  rationale: El contexto legislativo trata de pureza ceremonial. «Impuro» preserva el valor técnico del término sin cargarlo de connotaciones morales ajenas al pasaje.
  doctrine_reference: Principio de primacía del texto original; mantener la categoría cultual del lenguaje levítico.
translation_notes:
  revision_awareness: 'Coincide con el sentido del texto hebreo y con la lectura auditada en inglés: universalidad del sujeto, referencia anafórica a los objetos del contexto previo, y lenguaje de impureza ritual mantenido sin moralización. No se requieren revisiones mayores respecto del original.'
  spanish_consistency_notes:
  - Se mantiene «impuro» de manera consistente para טמא en sentido ceremonial.
  - Se conserva el plural anafórico «los» para בָּם, conforme al contexto previo.
  - «Vestidos» y «se bañará en agua» conservan el registro bíblico sin caer en arcaísmo excesivo.
  - La nota [a] aclara el referente sin incorporarlo al cuerpo principal de la traducción.
