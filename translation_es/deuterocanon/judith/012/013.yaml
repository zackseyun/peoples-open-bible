translation:
  language: es
  text: 'Y Bagoás salió de la presencia de Holofernes, entró donde ella estaba y le dijo: «No vacile esta hermosa joven[a] en venir a mi señor, para ser honrada delante de él, y para beber vino con nosotros en alegría, y llegar hoy a ser como una de las hijas de los asirios[b] que están en la casa de Nabucodonosor».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muchacha» o «sirvienta» para παιδίσκη; aquí funciona como un modo de hablar halagador, no como énfasis en su condición social.
    reason: lexical_alternative
  - marker: b
    text: O «que sirven en la casa de Nabucodonosor» para «que están en la casa de Nabucodonosor».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν ... ἀπὸ προσώπου
  english_pob_choice: went out from the presence of
  chosen_spanish: salió de la presencia de
  alternatives_spanish:
  - salió de delante de
  - se retiró de la presencia de
  lexicon: LSJ
  rationale: La expresión es una fórmula idiomática de corte. «De la presencia de» conserva el matiz cortesano y narrativo sin volverla rígidamente literal.
- source_word: εἰσῆλθεν πρὸς αὐτήν
  english_pob_choice: went in to her
  chosen_spanish: entró adonde ella estaba
  alternatives_spanish:
  - entró a verla
  - fue hacia ella
  lexicon: LSJ
  rationale: En español, «entró adonde ella estaba» mantiene el movimiento de entrada sin sugerir más de lo que el contexto aporta. Evita cargar el giro con una insinuación sexual que el griego no exige aquí.
- source_word: Μὴ ὀκνήσῃς
  english_pob_choice: Let ... not hesitate
  chosen_spanish: no vacile
  alternatives_spanish:
  - no tarde
  - no se resista
  lexicon: BDAG
  rationale: ὀκνέω comunica demora o reluctancia. «No vacile» es natural en español y preserva la invitación persuasiva.
- source_word: ἡ παιδίσκη
  english_pob_choice: young woman
  chosen_spanish: joven
  alternatives_spanish:
  - muchacha
  - muchacha joven
  - sirvienta
  lexicon: LSJ
  rationale: Sigo la revisión inglesa hacia un registro más natural y formal. En este contexto halagador, «joven» evita introducir un estatus servil que el hablante no está enfatizando.
- source_word: ἡ καλὴ
  english_pob_choice: beautiful
  chosen_spanish: hermosa
  alternatives_spanish:
  - bella
  - bonita
  lexicon: LSJ
  rationale: El adjetivo tiene valor elogioso y físico en este discurso. «Hermosa» transmite bien el tono de halago.
- source_word: δόξασθῆναι κατὰ πρόσωπον αὐτοῦ
  english_pob_choice: to be honored before him
  chosen_spanish: ser honrada delante de él
  alternatives_spanish:
  - ser glorificada en su presencia
  - recibir honor en su presencia
  lexicon: LSJ
  rationale: En este contexto δοξάζω no es glorificación teológica, sino recibir distinción ante Holofernes. «Delante de él» reproduce el valor relacional del giro.
- source_word: πίεσαι ... εἰς εὐφροσύνην οἴνου
  english_pob_choice: to drink wine with us in gladness
  chosen_spanish: beber vino con nosotros en alegría
  alternatives_spanish:
  - beber con nosotros con alegría de vino
  - beber vino con nosotros en regocijo
  lexicon: LSJ
  rationale: La frase enlaza vino y regocijo festivo. «En alegría» conserva la idea de celebración sin alargar innecesariamente el español.
- source_word: γενηθήναι ... ὡς θυγάτηρ μία
  english_pob_choice: to become ... like one of the daughters
  chosen_spanish: llegar ... a ser como una de las hijas
  alternatives_spanish:
  - ser como una de las hijas
  - volverse como una hija
  lexicon: LSJ
  rationale: 'El infinitivo γενηθήναι tiene valor ingresivo: entrar en un estado. «Llegar a ser» lo expresa con claridad en español.'
- source_word: τῶν υἱῶν Ἀσσούρ
  english_pob_choice: of the daughters of the Assyrians
  chosen_spanish: de los asirios
  alternatives_spanish:
  - de los hijos de Asur
  - de los asirios
  lexicon: LSJ
  rationale: Aunque el griego usa literalmente «hijos de Asur», el contexto ya fue naturalizado en la revisión inglesa como «de los Assyrians». En español, «de los asirios» resulta más claro y mantiene la identidad étnica.
- source_word: αἱ παρεστηκυῖαι ἐν οἴκῳ Ναβουχοδονόσορ
  english_pob_choice: who stand in the house of Nebuchadnezzar
  chosen_spanish: que están en la casa de Nabucodonosor
  alternatives_spanish:
  - que sirven en la casa de Nabucodonosor
  - que asisten en la casa de Nabucodonosor
  lexicon: LSJ
  rationale: El participio perfecto de παρίστημι puede denotar estar al servicio o asistir. «Que están» sigue la revisión inglesa y deja abierta la función de presencia/servicio sin sobredeterminarla.
theological_decisions:
- issue: κύριος como título humano de respeto
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - mi amo
  - Señor
  rationale: Aquí κύριος se dirige a Holofernes, no a Dios. «Mi señor» conserva el registro cortesano y evita confusión teológica.
  doctrine_reference: 'DOCTRINE.md: contested terms table; context-dependent human title usage'
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó παιδίσκη de «girl» a «young woman» y suavizó «one daughter of the sons of Assyria» a «one of the daughters of the Assyrians». La presente redacción española sigue esa revisión, conservando el tono halagador y una formulación étnica natural.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Mi señor» se usa aquí como tratamiento humano cortesano, no como título divino.
  - Se prefirió un español natural y digno, sin perder la secuencia narrativa del griego.
