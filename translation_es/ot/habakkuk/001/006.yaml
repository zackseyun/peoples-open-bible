translation:
  language: es
  text: Pues[a], he aquí, yo levanto a los caldeos[b], esa nación amarga y apresurada, que marcha por las anchas extensiones de la tierra para apoderarse de moradas que no son suyas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede leerse: «Porque». «Pues» conserva el valor explicativo del hebreo כִּי con un tono natural y formal.'
    reason: alternative_reading
  - marker: b
    text: 'O: «los babilonios». El hebreo dice literalmente «los caldeos», el pueblo histórico asociado con el poder neobabilónico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación de la respuesta divina previa. En español, «pues» conserva bien el valor explicativo y mantiene un tono profético-natural sin volver la frase pesada.
- source_word: הִנְנִי
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - mira, yo
  lexicon: HALOT
  rationale: La construcción es deíctica y enfática. «He aquí» preserva la llamada de atención con un registro digno y más cercano a la función de הִנְנִי que una simple marca discursiva moderna.
- source_word: מֵקִים
  english_pob_choice: raising up
  chosen_spanish: levanto
  alternatives_spanish:
  - suscito
  - hago surgir
  lexicon: HALOT
  rationale: El hiphil de קום expresa causar que algo se levante o aparezca con fuerza. «Levanto» comunica la agencia divina de forma directa en español; «suscito» y «hago surgir» son viables, pero menos inmediatos.
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: El hebreo nombra a los caldeos. Se mantiene el etnónimo de forma transliterada en sentido tradicional, con la alternativa contextual «los babilonios» reservada para nota si se necesita aclaración histórica.
- source_word: הַגּוֹי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  lexicon: HALOT
  rationale: Aquí גוי designa una entidad política/étnica. «Nación» reproduce mejor ese valor que «pueblo» en este contexto profético.
- source_word: הַמַּר
  english_pob_choice: bitter
  chosen_spanish: amarga
  alternatives_spanish:
  - fiera
  - cruel
  lexicon: HALOT
  rationale: El adjetivo significa literalmente «amargo». En español «amarga» conserva la forma léxica y deja ver el matiz de dureza/aspereza contextual.
- source_word: וְהַנִּמְהָר
  english_pob_choice: hasty
  chosen_spanish: apresurada
  alternatives_spanish:
  - impetuosa
  - precipitada
  lexicon: HALOT
  rationale: El término expresa prisa y carácter impetuoso. «Apresurada» mantiene el sentido de rapidez agresiva sin perder naturalidad en español.
- source_word: הַהוֹלֵךְ
  english_pob_choice: which marches
  chosen_spanish: que recorre
  alternatives_spanish:
  - que marcha
  - que avanza
  lexicon: HALOT
  rationale: El participio describe su modo constante de proceder. «Recorre» comunica desplazamiento extendido por el territorio; «marcha» conserva mejor el tono militar, pero «recorre» encaja con la frase siguiente sobre las extensiones de la tierra.
- source_word: לְמֶרְחֲבֵי אֶרֶץ
  english_pob_choice: through the broad places of the earth
  chosen_spanish: las anchas extensiones de la tierra
  alternatives_spanish:
  - las vastas regiones de la tierra
  - la anchura de la tierra
  lexicon: HALOT
  rationale: La expresión apunta a amplitud territorial. «Anchas extensiones» respeta la metáfora espacial hebrea y resulta claro en español. Se evita una paráfrasis excesiva como «regiones» para no debilitar el eco literal.
- source_word: לָרֶשֶׁת
  english_pob_choice: to seize
  chosen_spanish: apoderarse de
  alternatives_spanish:
  - tomar posesión de
  - poseer
  lexicon: HALOT
  rationale: ירשׁ aquí implica conquista y apropiación ilegítima. «Apoderarse de» expresa con claridad esa acción violenta; «tomar posesión de» es más formal, pero menos incisivo.
- source_word: מִשְׁכָּנוֹת
  english_pob_choice: dwelling places
  chosen_spanish: moradas
  alternatives_spanish:
  - moradas de habitación
  - lugares de morada
  lexicon: HALOT
  rationale: El sustantivo se refiere a lugares donde se habita. «Moradas» es breve y natural en español bíblico; evita redundancia y conserva el registro profético.
- source_word: לֹא לוֹ
  english_pob_choice: not its own
  chosen_spanish: que no son suyas
  alternatives_spanish:
  - no propias
  - que no le pertenecen
  lexicon: HALOT
  rationale: La frase marca posesión ilegítima. Se usa plural femenino en español para concordar con «moradas» y con el antecedente colectivo implícito; «que no le pertenecen» explicita el sentido, pero es menos directo.
theological_decisions:
- issue: Agencia divina en el surgimiento de Babilonia/Caldea
  english_pob_reading: I am raising up the Chaldeans
  chosen_spanish_reading: yo levanto a los caldeos
  alternative_spanish_readings:
  - yo suscito a los caldeos
  - yo hago surgir a los caldeos
  rationale: El hebreo atribuye explícitamente a Dios la acción de hacer surgir esta potencia. La redacción española conserva esa afirmación sin suavizarla ni desplazarla hacia una causalidad vaga.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió «behold» sobre «look» por registro más formal. La versión española adopta «he aquí» para reflejar ese ajuste y mantener una equivalencia reverente con הִנְנִי. También se respetó la decisión revisada de mantener la referencia étnica literal «los caldeos» en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «caldeos» en el texto principal, conforme al criterio POB de conservar etnónimos cuando el hebreo los usa de forma explícita.
  - Se eligió un registro bíblico moderno y digno, evitando calcos mecánicos de la sintaxis inglesa.
  - La concordancia femenina en «suyas» responde al antecedente plural «moradas», no a una reinterpretación del sujeto.
