lexical_decisions:
- source_word: וַנֵּשֶׁב
  english_pob_choice: So we stayed
  chosen_spanish: Así nos quedamos
  alternatives_spanish:
  - Y habitamos
  - Y permanecimos
  - Así habitamos
  lexicon: HALOT
  rationale: El imperfecto consecutivo 1cp narra una acción pasada en secuencia. «Quedarnos» expresa de manera natural en español la permanencia/estancia en un lugar, sin perder el valor narrativo de continuación; «Así» refleja la conexión discursiva que en inglés se dio con «So».
- source_word: בַּגָּיְא
  english_pob_choice: in the valley
  chosen_spanish: en el valle
  alternatives_spanish:
  - en el barranco
  - en la cañada
  - en el desfiladero
  lexicon: HALOT
  rationale: גַּיְא puede referirse a valle, barranco o garganta. «Valle» es la opción más amplia e idiomática en español, y mantiene la referencia topográfica sin especificar más de lo que el hebreo exige.
- source_word: מוּל
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - opuesto a
  - enfrente de
  - mirando hacia
  lexicon: HALOT
  rationale: El término indica correspondencia espacial o ubicación enfrente de algo. En español, «frente a» comunica bien la relación espacial con un topónimo y conserva un tono natural y preciso.
- source_word: בֵּית פְּעוֹר
  english_pob_choice: Beth-peor
  chosen_spanish: Bet-peor
  alternatives_spanish:
  - Beth-peor
  - Bet Peor
  - la casa de Peor
  lexicon: HALOT
  rationale: Se trata de un nombre de lugar; por eso se translitera. «Bet-peor» sigue una forma hispana sobria y legible, conservando el componente hebreo sin traducirlo como si fuera una expresión común.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés coinciden plenamente; no hay revisiones aplicadas ni variantes textuales relevantes en este versículo breve.
  spanish_consistency_notes:
  - Se mantiene la primera persona plural narrativa («nos quedamos») conforme al hebreo y al inglés auditado.
  - Se evita «SEÑOR» u otra sustitución teológica porque el versículo no contiene el nombre divino.
  - La transliteración del topónimo se normaliza como «Bet-peor» para lectura en español, sin introducir una paráfrasis interpretativa.
