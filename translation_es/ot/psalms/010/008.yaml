translation:
  language: es
  text: Está sentado al acecho en las aldeas[a]; en los escondites asesina al inocente; sus ojos vigilan al desvalido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Aldeas» traduce el hebreo de forma más directa y mantiene el dato geográfico del texto; también podría entenderse como «asentamientos» o, menos probablemente aquí, «patios/corrales».
    reason: lexical_alternative
  - marker: b
    text: 'El final es idiomático y difícil: el verbo hebreo se relaciona más literalmente con esconderse o acechar, pero con «sus ojos» el sentido es el de vigilar furtivamente a una víctima vulnerable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשֵׁב
  english_pob_choice: He sits
  chosen_spanish: Él se sienta
  alternatives_spanish:
  - Él mora
  - Él se posa
  - Él se sienta y espera
  lexicon: HALOT
  rationale: El verbo expresa literalmente sentarse o residir; en el contexto de emboscada, el español conserva la imagen concreta con «se sienta», sin perder el matiz de postura estable de acecho.
- source_word: בְּמַאְרַב
  english_pob_choice: in ambush
  chosen_spanish: en emboscada
  alternatives_spanish:
  - en una emboscada
  - en acecho
  - en un lugar de acecho
  lexicon: HALOT
  rationale: El sustantivo denota emboscada o lugar de acecho. «En emboscada» es natural en español y mantiene el carácter oculto y hostil del término.
- source_word: חֲצֵרִים
  english_pob_choice: in the villages
  chosen_spanish: en las aldeas
  alternatives_spanish:
  - en los pueblos
  - en los asentamientos
  - en los patios
  lexicon: HALOT
  rationale: En este contexto, el término apunta a poblaciones o asentamientos. «Aldeas» conserva la referencia a núcleos habitados y evita la lectura menos probable de «patios/corrales».
- source_word: בַּמִּסְתָּרִים
  english_pob_choice: in the hiding places
  chosen_spanish: en los escondites
  alternatives_spanish:
  - en los lugares ocultos
  - en los ocultamientos
  - en los escondrijos
  lexicon: HALOT
  rationale: El plural designa lugares ocultos. «Escondites» es claro en español y preserva la pluralidad y la imagen de ocultamiento.
- source_word: יַהֲרֹג
  english_pob_choice: he murders
  chosen_spanish: asesina
  alternatives_spanish:
  - mata
  - da muerte a
  - destruye
  lexicon: HALOT
  rationale: El verbo significa matar o dar muerte; con el objeto «al inocente» y el contexto de violencia predatoria, «asesina» comunica mejor el homicidio injusto sin añadir contenido ajeno.
- source_word: נָקִי
  english_pob_choice: the innocent
  chosen_spanish: al inocente
  alternatives_spanish:
  - al inocente de culpa
  - al inocente
  - al sin culpa
  lexicon: HALOT
  rationale: El adjetivo indica al que está libre de culpa. «Inocente» es la forma más natural y fiel en español en un contexto de violencia.
- source_word: עֵינָיו
  english_pob_choice: his eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - sus miradas
  - sus ojos
  lexicon: HALOT
  rationale: La traducción literal preserva la imagen antropomórfica. Se mantiene el posesivo singular en concordancia con el sujeto implícito.
- source_word: לְחֵלְכָה
  english_pob_choice: for the helpless
  chosen_spanish: por el desvalido
  alternatives_spanish:
  - por el indefenso
  - por el necesitado
  - por el pobre
  lexicon: HALOT
  rationale: El sustantivo es difícil y depende del contexto. «Desvalido» expresa la vulnerabilidad de la víctima y conserva el sentido de fragilidad humana que demanda el pasaje.
- source_word: יִצְפֹּנוּ
  english_pob_choice: watch for
  chosen_spanish: acechan
  alternatives_spanish:
  - vigilán
  - espían
  - se ocultan para
  lexicon: HALOT
  rationale: La raíz literalmente puede relacionarse con esconderse o ocultar, pero con «sus ojos» el sentido idiomático es de vigilancia furtiva o acecho. «Acechan» reproduce bien la imagen predatoria del hebreo.
theological_decisions:
- issue: Imagen del sujeto predatorio y de sus ojos
  english_pob_reading: his eyes watch for the helpless
  chosen_spanish_reading: sus ojos acechan por el desvalido
  alternative_spanish_readings:
  - sus ojos vigilan al desvalido
  - sus ojos buscan al desvalido
  rationale: 'El hebreo presenta una dificultad idiomática: el verbo ligado al ocultarse se entiende, con «sus ojos», como vigilancia furtiva de una víctima vulnerable. «Acechan» conserva la tensión entre mirar y cazar sin suavizarla.'
  doctrine_reference: Salmo 10:8; lectura poética e idiomática del hebreo
translation_notes:
  revision_awareness: La redacción sigue de cerca el estado revisado del inglés POB, manteniendo «in the villages» como ubicación directa y conservando la clausula final como observación predatoria de los ojos. La elección española evita suavizar el tono violento del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «YHWH» no aplicable en este versículo.
  - Se optó por léxico de violencia fuerte («asesina», «acechan») porque el contexto y el inglés POB ya lo documentan.
  - Se preservó la imagen concreta de «ojos» sin convertirla en una paráfrasis psicológica.
  - Los marcadores de nota [a] y [b] están anclados exactamente en el texto principal.
