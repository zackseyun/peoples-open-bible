id: RUT.1.16
reference: Ruth 1:16
source:
  edition: WLC
  text: וַ/תֹּ֤אמֶר רוּת֙ אַל תִּפְגְּעִי בִ֔/י לְ/עָזְבֵ֖/ךְ לָ/שׁ֣וּב מֵ/אַחֲרָ֑יִ/ךְ כִּ֠י אֶל אֲשֶׁ֨ר תֵּלְכִ֜י אֵלֵ֗ךְ וּ/בַ/אֲשֶׁ֤ר תָּלִ֨ינִי֙ אָלִ֔ין עַמֵּ֣/ךְ עַמִּ֔/י וֵ/אלֹהַ֖יִ/ךְ אֱלֹהָֽ/י־־־׃
translation:
  text: But Ruth said[a], “Do not press me to leave you, to turn back from following after you. For where you go, I will go; and where you lodge, I will lodge. Your people will be my people[d][c][b], and your God my God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'urge me,' 'entreat me,' or 'insist with me' for 'press me.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from after you,' an idiom meaning 'from following you.'
    reason: lexical_alternative
  - marker: c
    text: Or 'where you spend the night, I will spend the night.'
    reason: lexical_alternative
  - marker: d
    text: The Hebrew clauses 'Your people my people, and your God my God' are verbless; English may also render them 'Your people are my people, and your God is my God' or with future sense.
    reason: alternative_reading
lexical_decisions:
- source_word: תִּפְגְּעִי בִי
  chosen: press me
  alternatives:
  - urge me
  - entreat me
  - insist with me
  lexicon: HALOT
  rationale: פגע with ב can mean to press, urge, or importune someone. 'Press me' captures Ruth's plea that Naomi stop urging her, without implying physical contact or hostility.
- source_word: לְעָזְבֵךְ
  chosen: to leave you
  alternatives:
  - to forsake you
  - to abandon you
  lexicon: HALOT
  rationale: עזב commonly means leave or forsake. 'Leave you' is the most natural modern English here and avoids the heavier covenantal tone of 'forsake,' which the context does not require.
- source_word: לָשׁוּב מֵאַחֲרָיִךְ
  chosen: to turn back from following after you
  alternatives:
  - to turn back from behind you
  - to return from following you
  lexicon: HALOT
  rationale: שׁוב means turn back/return, and מאחרי + suffix literally means 'from after you.' 'From following after you' preserves the directional imagery and Ruth's commitment to remain with Naomi.
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for Ruth's plea. 'For' is concise and natural in direct speech.
- source_word: אֶל אֲשֶׁר תֵּלְכִי אֵלֵךְ
  chosen: where you go, I will go
  alternatives:
  - to wherever you go, I will go
  lexicon: HALOT
  rationale: This is a standard relative construction expressing destination. 'Where you go, I will go' is idiomatic English and preserves the parallelism.
- source_word: וּבַאֲשֶׁר תָּלִינִי אָלִין
  chosen: where you lodge, I will lodge
  alternatives:
  - where you spend the night, I will spend the night
  - where you stay, I will stay
  lexicon: HALOT
  rationale: לון often refers to lodging or spending the night. 'Lodge' preserves the lexical connection and the poetic parallel with 'go,' while remaining understandable.
- source_word: עַמֵּךְ עַמִּי
  chosen: Your people will be my people
  alternatives:
  - Your people are my people
  - Your kin will be my kin
  lexicon: HALOT
  rationale: The verbless clause can be rendered present or future in English. Future fits Ruth's vow-like commitment in context and sounds natural in English.
- source_word: וֵאלֹהַיִךְ אֱלֹהָי
  chosen: and your God my God
  alternatives:
  - and your God will be my God
  - and your gods my God
  lexicon: HALOT
  rationale: 'Although the clause is verbless, English can preserve the compact force without supplying ''will be.'' The singular sense is required by the form and context: Ruth aligns herself with Naomi''s God, not with multiple gods.'
