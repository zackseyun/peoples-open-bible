  text: '1 Et factum est tertio die, et ego sedebam sub quercu ;

    2 Et ecce uox exiuit contra me de rubo et dixit : Ezra, Ezra ! et dixi: ecce ego, domine. et surrexi super pedes meos, et dixit ad me:

    3 Reuelans reuelatus sum super rubum, et locutus sum Moysi, quando populus meus seruiebat in Aegypto,

    4 Et misi eum et eduxit populum meum de Aegypto, et adduxi eum super montem Sina et detinui eum apud me diebus multis,

    5 Et enarraui ei mirabilia multa, et ostendi ei temporum secreta et temporum finem, et praecepi ei dicens:

    6 Haec in palam facies uerba et haec abscondes.

    7 Et nunc tibi dico

    8 Signa quae demonstraui, et somnia quae uidisti, et interpretationes quas tu audisti, in corde tuo repone ea;

    9 Tu enim reciperis ab hominibus, et conuerteris residuum cum filio meo et cum similibus tuis usquequo finiantur tempora.

    10 Quoniam saeculum perdidit iuuentutem suam, et tempora adpropinquant senescere.

    11 XII enim partibus diuisum est saeculum, et transierunt eius X iam et dimidium xmae partis,

    12 Superant autem eius duae post medium decimae partis.

    13 Nunc ergo dispone domum tuam, et corripe populum tuum, et consolare humiles eorum, et renuntia iam corruptae uitae,

    14 Et dimitte abs te mortales cogitationes, et proice abs te pondera humana, et exue te iam infirmam naturam, et repone in unam partem molestissima tibi cogitamenta, et

    15 festina transmigrare a temporibus his ; Quae enim uidisti nunc

    16 contigisse mala, iterum horum deteriora facientur : Quantum enim inualidum fit saeculum a senectute, tantum multiplicabunt

    17 super inhabitantes in eo mala. Prolongabit enim magis ueritas, et adpropinquabit mendacium. iam enim festinat aquila uenire quam uidisti in uisionem.

    18 Et respondi et dixi coram te, domine, Ecce enim ego abibo,

    19 sicut praecepisti mihi, et corripiam praesentem populum : qui

    20 autem iterum nati fuerint, quis commonebit ? Positum est enim saeculum in tenebris, et qui inhabitant in eo sine lumine ;

    21 Quoniam lex tua incensa est, propter quod nemo scit quae a te

    22 facta sunt uel quae incipient operari. Si enim inueni gratiam coram te, inmitte in me spiritum sanctum, et scribam omne quod factum est in saeculo ab initio, quae erant in lege tua scripta, ut possint homines inuenire semitam, et qui uoluerint

    23 uiuere in nouissimis uiuant. Et respondit ad me et dixit : uadens congrega populum et dices ad eos, ut non te quaerant

    24 diebus XL. Tu autem praepara tibi buxos multos et accipe tecum Saream, Dabriam, Selemiam, Ethanum et Asihel, quinque

    25 hos quia parati sunt ad scribendum uelociter ; Et uenies hic, et ego accendam in corde tuo lucernam intellectus, quae non extinguetur quoadusque finiantur quae incipies scribere. Et

    26 cum perfeceris, quaedam palam facies, quaedam sapientibus absconse trades: in crastinum enim hac hora incipies scribere. Et profectus sum, sicut mihi praecepit, et congregaui omnem

    27 populum et dixi: Audi, Israel, uerba haec: Peregrinantes pere-

    28 grinati sunt patres nostri ab initio in Aegypto, et liberati sunt

    29 inde, Et acceperunt legem uitae quem non custodierunt, quem

    30 et uos post eos transgressi estis. Et data est uobis terra in

    31 sortem in terra Sion, et uos et patres uestri iniquitatem fecistis et non seruastis uias quas uobis praecepit altissimus; Iustus

    32 iudex cum sit, abstulit a uobis in tempore quod donauerat. Et

    33 nunc uos hic estis, et fratres uestri introrsum uestrum sunt. Si ergo imperaueritis sensui uestro et erudieritis cor uestrum,

    34 uiui conseruati eritis et post mortem misericordiam consequemini; Iudicium enim post mortem ueniet quando iterum

    35 reuiuiscemus; et tunc iustorum nomen apparebit, et impiorum facta ostendentur. Ad me autem nemo accedat nunc, neque

    36 requirent me usque diebus XL. Et accepi quinque uiros, sicut mandauit mihi, et profecti

    37 sumus in campo et mansimus ibi. Et factum est in crastinum

    38 et ecce uox uocauit me dicens: Ezra, aperi os tuum et bibe quod te potiono. Et aperui os meum, et ecce calix plenus

    39 porrigebatur mili ; hoc erat plenum sicut aqua, color autem

    40 eius ut ignis similis. Et accepi et bibi, et in eo cum bibissem cor meum eructuabat intellectum et in pectus meum increscebat sapientia, nam spiritus meus conseruabat memoriam : Et

    41 et apertum est os meum et non est clausum amplius.

    42 apertum est os meum et non est clausum amplius. Altissimus autem dedit intellectum quinque uiris, et scripserunt quae dicebantur ex successione notis quas non sciebant, et sederunt

    43 XL diebus : ipsi autem per diem scribebant Et nocte manducabant panem : ego autem per diem loquebar et nocte non

    44 tacebam. Scripti sunt autem in XL diebus libri DCCCClIIII.

    45 Et factum est cum conpleti essent XL dies, et locutus est ad me altissimus dicens : priora quae scripsisti in palam pone, et

    46 legant digni et indigni ; Nouissimos autem LXX conseruabis, ut

    47 tradas eos sapientibus de populo tuo; In his enim est uena intellectus et sapientiae fons et scientiae flumen.'
