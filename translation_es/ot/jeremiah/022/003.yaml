  verdict: revise
  source_alignment_summary: 'El borrador español acierta en la fórmula profética, el uso de «Yahvé», la pareja «justicia y rectitud», la tríada social vulnerable, y la secuencia de prohibiciones. Sin embargo, falla en un punto léxico importante: גָזוּל se refiere al despojado/robado, no al «oprimido». Traducirlo como «oprimido» borra la distinción con עָשׁוֹק («opresor») y debilita la imagen de rescatar a la víctima despojada de la mano del explotador.'
  spanish_quality_summary: El español es claro y digno, pero «residente extranjero» suena menos natural que «extranjero residente» o «forastero residente» en español eclesial general. Además, «no hagan violencia» es comprensible pero algo tosco; «no cometan violencia» suena más idiomático en español sin apartarse del hebreo ni de la decisión inglesa de mantener la segunda prohibición separada.
  glossary_alignment: 'Se alinea bien con los términos del proyecto en «Yahvé», «justicia», y el mantenimiento de dos términos para מִשְׁפָּט/צְדָקָה. No hay conflicto teológico mayor. La principal desalineación es léxica: גָזוּל debe reflejar despojo/robo sufrido, no opresión general.'
  issues:
  - severity: high
    issue: «al oprimido» para גָזוּל
    rationale: גָזוּל describe a la persona despojada/robada. «Oprimido» traslada el sentido hacia una victimización general y duplica innecesariamente el campo semántico de «opresor» para עָשׁוֹק.
  - severity: medium
    issue: «residente extranjero» suena poco natural en español
    rationale: Aunque comunica el sentido, el orden más idiomático en español es «extranjero residente». Esto preserva la nota cultural sin rigidez innecesaria.
  - severity: low
    issue: «no hagan violencia» es menos idiomático que «no cometan violencia»
    rationale: La forma actual es entendible, pero «cometer violencia» suena más natural en español moderno y mantiene la prohibición separada de «no opriman».
  revised_spanish_text: 'Así dice Yahvé: Hagan justicia y rectitud[a], y libren al despojado de la mano del opresor. No opriman al extranjero residente[b], al huérfano ni a la viuda, y no cometan violencia[c], ni derramen sangre inocente en este lugar.'
