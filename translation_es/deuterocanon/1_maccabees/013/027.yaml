translation:
  language: es
  text: Y Simón edificó sobre la tumba de su padre y de sus hermanos, y la levantó en alto para que se viera[a], con piedra labrada[b] por detrás y por delante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativamente: «de aspecto» o «en cuanto a la apariencia»; el griego puede describir el monumento como llamativo a la vista.'
    reason: lexical_alternative
  - marker: b
    text: 'Alternativamente: «con piedra pulida»; el término griego puede indicar piedra alisada o finamente trabajada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ᾠκοδόμησεν
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - edificó
  lexicon: LSJ
  rationale: οἰκοδομέω expresa edificar o construir. ‘Edificó’ conserva el acto de levantar una obra con un tono ligeramente más formal y literario, adecuado para el contexto funerario.
- source_word: ἐπὶ τὸν τάφον
  english_pob_choice: over the tomb
  chosen_spanish: sobre la tumba
  alternatives_spanish:
  - encima de la tumba
  - sobre el sepulcro
  - sobre la tumba
  lexicon: LSJ
  rationale: La preposición ἐπί con acusativo aquí indica ubicación encima o sobre. ‘Sobre la tumba’ reproduce bien la relación espacial sin añadir interpretación excesiva.
- source_word: ὕψωσεν αὐτόν
  english_pob_choice: he raised it high
  chosen_spanish: la levantó alta
  alternatives_spanish:
  - la elevó
  - la levantó en alto
  - la alzó
  lexicon: LSJ
  rationale: ὑψόω significa elevar o hacer alto. ‘La levantó alta’ preserva la idea de altura del monumento y permite conexión natural con la frase siguiente sobre visibilidad.
- source_word: τῇ ὁράσει
  english_pob_choice: to be seen
  chosen_spanish: para que se viera
  alternatives_spanish:
  - de modo que fuera visible
  - para ser vista
  - visiblemente
  lexicon: LSJ
  rationale: La frase dativa tiene un valor idiomático relacionado con la percepción visual. La traducción ‘para que se viera’ comunica la finalidad o resultado visible sin forzar una sola glosa técnica.
- source_word: λίθῳ ξυστῷ
  english_pob_choice: dressed stone
  chosen_spanish: piedra labrada
  alternatives_spanish:
  - piedra pulida
  - piedra alisada
  - piedra labrada
  lexicon: LSJ
  rationale: ξύστος refiere a algo raspado, alisado o trabajado. ‘Piedra labrada’ es una expresión natural en español para piedra trabajada arquitectónicamente y evita sobretraducir como ‘pulida’.
- source_word: ἐκ τῶν ὄπισθεν καὶ ἐκ τῶν ἔμπροσθεν
  english_pob_choice: at the back and at the front
  chosen_spanish: por detrás y por delante
  alternatives_spanish:
  - en la parte trasera y en la delantera
  - por detrás y por delante
  - atrás y adelante
  lexicon: LSJ
  rationale: La pareja expresa los dos lados del monumento. ‘Por detrás y por delante’ conserva la bilateralidad con español natural y mantiene el paralelismo del griego.
translation_notes:
  revision_awareness: 'El texto griego de Swete coincide bien con el testimonio auditado en inglés. Se conserva la estructura narrativa simple: construcción sobre la tumba, elevación visible y acabado con piedra trabajada en ambos lados. La opción española sigue la revisión más natural del inglés (‘raised it high to be seen’) sin perder la ambigüedad visual del dativo τῇ ὁράσει.'
  spanish_consistency_notes:
  - Se usa ‘Y’ al inicio como enlace narrativo, en paralelo con el coordinante griego καὶ.
  - Se mantiene ‘Simón’ para Σίμων y ‘tumba’ para τάφος por claridad contemporánea y fidelidad contextual.
  - ‘Piedra labrada’ se usa de modo consistente para λίθῳ ξυστῷ, preservando la posibilidad de un acabado trabajado sin afirmar más de lo que el griego exige.
  - 'Las notas a y b reflejan las dos ambigüedades principales del verso: la visibilidad del monumento y la naturaleza exacta del trabajo en la piedra.'
