translation:
  language: es
  text: y con ella no hay parcialidad ni favoritismo[a], sino que hace lo justo, más bien que todo lo injusto y perverso; y todos aprueban sus obras,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: “recibir rostros”, un modismo que significa “mostrar parcialidad”. O: “no hace distinciones”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λαμβάνειν πρόσωπα
  english_pob_choice: show partiality
  chosen_spanish: tomar partido
  alternatives_spanish:
  - mostrar parcialidad
  - hacer acepción de personas
  - favorecer a unos sobre otros
  lexicon: LSJ
  rationale: El modismo griego literalmente es “recibir rostros”, pero su fuerza idiomática es la de no mostrar parcialidad. En español, “tomar partido” comunica esa preferencia injusta sin sonar demasiado técnico, y se equilibra con “parcialidad” en la primera mitad del verso.
- source_word: διάφορα
  english_pob_choice: favoritism
  chosen_spanish: favoritismo
  alternatives_spanish:
  - distinciones
  - preferencias
  - diferencias
  lexicon: LSJ
  rationale: Tras el modismo de parcialidad, el segundo término refuerza la idea de trato preferencial. “Favoritismo” es natural en español y conserva bien el paralelo del griego.
- source_word: τὰ δίκαια
  english_pob_choice: what is just
  chosen_spanish: lo justo
  alternatives_spanish:
  - lo recto
  - lo que es justo
  - las cosas justas
  lexicon: LSJ
  rationale: El neutro plural con ποιεῖ pide una equivalencia idiomática en español. “Lo justo” mantiene la fuerza ética y judicial del contraste con lo injusto y perverso.
- source_word: ἀπὸ πάντων τῶν ἀδίκων καὶ πονηρῶν
  english_pob_choice: rather than all that is unjust and wicked
  chosen_spanish: no tomando partido por los injustos y perversos
  alternatives_spanish:
  - más bien que todo lo injusto y perverso
  - apartándose de todo lo injusto y perverso
  - en contraste con todo lo injusto y perverso
  lexicon: LSJ
  rationale: El valor de ἀπό aquí es separativo y contrastivo. En español, una construcción negativa con “no tomando partido por” expresa la separación/contraste de forma natural y mantiene la oposición moral del pasaje.
- source_word: εὐδοκοῦσι
  english_pob_choice: approve of
  chosen_spanish: aprueban
  alternatives_spanish:
  - se complacen en
  - les agradan
  - deliberan favorablemente sobre
  lexicon: LSJ
  rationale: El verbo puede significar estar complacido o aprobar. Dado que el objeto son “sus obras”, “aprueban” resulta claro y conserva el matiz evaluativo del contexto.
- source_word: αὐτὴν / αὐτῆς
  english_pob_choice: her
  chosen_spanish: ella / sus
  alternatives_spanish:
  - ello / sus
  lexicon: Greek grammar
  rationale: La referencia es a ἀλήθεια (“verdad”), personificada en femenino. El español puede mantener esa personificación con “ella” y “sus” sin forzar un tecnicismo.
theological_decisions:
- issue: Personificación de la verdad
  english_pob_reading: Retain feminine personal reference ('her') for truth
  chosen_spanish_reading: Mantener la personificación con “ella” y “sus”
  alternative_spanish_readings:
  - Usar “ello” para volverla impersonal
  - Reformular sin personificación
  rationale: El griego presenta la verdad como figura femenina en el discurso. Conservar esa personificación preserva el efecto literario y la continuidad semántica del pasaje sin añadir doctrina ajena.
  doctrine_reference: Preservar la tensión literaria del texto fuente; prioridad del lenguaje de origen.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que afinó el valor contrastivo de ἀπό. Se optó por una solución española que expresa contraste/separación sin endurecer el sentido ni volverlo demasiado literal.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” para el nombre divino cuando corresponda, pero en este versículo no aparece.
  - Se conserva la personificación femenina de la verdad mediante “ella”, coherente con el antecedente griego ἀλήθεια.
  - Se eligieron términos comunes y dignos (“parcialidad”, “favoritismo”, “lo justo”, “aprueban”) para una lectura eclesial moderna.
  - La nota sobre “no hace distinciones” se conserva como alternativa válida, porque el griego permite ese matiz junto con la parcialidad.
