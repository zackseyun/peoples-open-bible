translation:
  language: es
  text: No te prives de un buen día[a], y no dejes que una porción deseable te pase de largo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio hebreo también incluye una cláusula entre corchetes, «y no te prives del bien», pero su redacción es incierta en la fuente presentada y puede ser secundaria; el paralelo griego, en cambio, dice: «y no dejes que tu porción de un buen deseo te pase de largo».'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תִּמְנַע / μὴ ἀφυστερήσῃς
  english_pob_choice: Do not deprive yourself of
  chosen_spanish: No te prives de
  alternatives_spanish:
  - No te niegues
  - No te abstengas de
  - No te prives a ti mismo de
  lexicon: HALOT; BDAG
  rationale: La forma hebrea y la griega expresan la idea de no privarse, retener o sustraer algo beneficioso. 'No te prives de' conserva esa fuerza y suena natural en español.
- source_word: מִטּוֹבַת יוֹם / ἀπὸ ἀγαθῆς ἡμέρας
  english_pob_choice: a good day
  chosen_spanish: un buen día
  alternatives_spanish:
  - el bien de un día
  - los bienes de hoy
  - la bondad de un día
  lexicon: HALOT; LSJ
  rationale: La expresión es idiomática y remite a la oportunidad buena del día presente. 'Un buen día' mantiene la sencillez del hebreo y del griego sin sobreexplicar.
- source_word: μερὶς
  english_pob_choice: share
  chosen_spanish: una porción
  alternatives_spanish:
  - una parte
  - una cuota
  - una herencia
  lexicon: BDAG; LSJ
  rationale: El griego añade la idea de una porción asignada o correspondiente. 'Porción' refleja mejor ese matiz que 'parte' en un contexto sapiencial.
- source_word: ἐπιθυμίας ἀγαθῆς
  english_pob_choice: a desirable share / a good desire
  chosen_spanish: deseable
  alternatives_spanish:
  - buena
  - apetecible
  - valiosa
  lexicon: BDAG; LSJ
  rationale: La frase griega es algo compacta y puede leerse como una porción deseable o agradable. 'Deseable' conserva la cualidad positiva sin forzar el sintagma hacia una interpretación más amplia.
- source_word: μὴ σε παρελθάτω
  english_pob_choice: do not let ... pass you by
  chosen_spanish: no dejes pasar
  alternatives_spanish:
  - no permitas que te pase de largo
  - no dejes que pase junto a ti
  - no dejes que te sobrepase
  lexicon: BDAG; LSJ
  rationale: El giro griego indica que algo pase sin ser aprovechado. 'No dejes pasar' comunica bien ese sentido idiomático en español.
theological_decisions:
- issue: Tratamiento del testimonio hebreo bracketed frente al paralelo griego
  english_pob_reading: Main text reflects the stable Hebrew opening and the Greek second colon; the bracketed Hebrew clause is omitted from the main text because it is uncertain/possibly secondary.
  chosen_spanish_reading: El texto principal sigue la apertura hebrea segura y la segunda cola griega, sin incorporar la cláusula hebrea bracketed al cuerpo del verso.
  alternative_spanish_readings:
  - Incluir la cláusula hebrea entre corchetes en el texto principal
  - Traducir solo el griego para toda la línea
  rationale: La presentación fuente distingue una cláusula hebrea incierta. Para respetar la transparencia textual, el cuerpo del verso no la incorpora; la nota preserva su existencia y la incertidumbre documentada.
  doctrine_reference: 'PHILOSOPHY.md: traducir con honestidad textual, preservando incertidumbre y variantes sin sobreafirmarlas.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que ajustó la segunda cola para acercarse más a la secuencia griega, sustituyendo una lectura más interpretativa por una formulación más directa. En español, eso favorece una construcción breve y natural ('una porción deseable') con el verbo idiomático 'dejar pasar'.
  spanish_consistency_notes:
  - Se mantiene 'porción' para μερὶς, evitando 'parte' cuando la idea de reparto u asignación es más precisa.
  - Se evitó 'SEÑOR' o equivalentes de máscara porque no aparece el Nombre divino en este versículo.
  - Se conservó un registro sobrio y sapiencial, acorde con Sirácida, sin añadir explicaciones interpretativas al texto principal.
