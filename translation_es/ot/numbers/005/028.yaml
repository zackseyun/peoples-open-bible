revisions:
- from: Pero si la mujer no se ha contaminado[a] y está limpia, entonces será declarada inocente y concebirán en ella descendencia.
  to: Pero si la mujer no se ha contaminado y está limpia, entonces será declarada inocente y concebirá descendencia[a].
  rationale: 'Se corrige la cláusula final para reflejar el sujeto femenino singular del hebreo y producir un español natural y fiel: «concebirá descendencia». También se traslada la nota al modismo final, que es donde la evidencia fuente y el audit trail inglés señalan la principal dificultad léxica. No se requiere adjudicación adicional porque la reparación es directa y de bajo riesgo interpretativo.'
