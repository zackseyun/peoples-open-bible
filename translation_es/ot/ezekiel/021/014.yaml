translation:
  language: es
  text: '“Hijo de hombre[a], profetiza y di: ‘Así dice el Señor: Di: “Una espada, una espada, afilada y también pulida[b]”.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ser humano’ o ‘mortal’. Aquí se conserva la fórmula profética fija de Ezequiel, literalmente ‘hijo de hombre’.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse ‘bruñida’. El hebreo sugiere una espada alisada y resplandeciente para la matanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Conserva el apelativo profético fijo de Ezequiel de modo literal y reconocible. ‘Hijo de hombre’ reproduce la forma hebrea sin suavizarla hacia un equivalente interpretativo como ‘ser humano’ o ‘mortal’.
- source_word: הִנָּבֵא
  english_pob_choice: prophesy
  chosen_spanish: profetiza
  alternatives_spanish:
  - profetiza en voz alta
  - anuncia proféticamente
  lexicon: HALOT
  rationale: Es el imperativo profético estándar de נבא. ‘Profetiza’ es claro, directo y preserva el mandato formal del texto.
- source_word: וְאָמַרְתָּ
  english_pob_choice: and say
  chosen_spanish: y di
  alternatives_spanish:
  - y dirás
  - y hablarás
  lexicon: HALOT
  rationale: La coordinación imperativa se expresa naturalmente en español con ‘y di’, manteniendo la secuencia del mandato sin introducir un futuro innecesario.
- source_word: כֹּה אָמַר אֲדֹנָי
  english_pob_choice: Thus says the Lord GOD
  chosen_spanish: Así dice el Señor Yahvé
  alternatives_spanish:
  - Así dice el Señor Dios
  - Así dice el Señor
  lexicon: HALOT
  rationale: Se conserva la fórmula profética ‘Así dice’. Para אֲדֹנָי, el proyecto pide ‘Yahvé’ para el nombre divino, y ‘Señor’ refleja el título adonai. Esta combinación evita el reemplazo tradicional de ocultar el nombre con ‘SEÑOR’ y distingue el título del nombre divino según la política del proyecto.
- source_word: אֱמֹר
  english_pob_choice: Say
  chosen_spanish: Di
  alternatives_spanish:
  - Dice
  - Habla
  lexicon: HALOT
  rationale: El segundo imperativo vuelve a introducir la cita. ‘Di’ mantiene la repetición verbal visible y suena natural en español bíblico contemporáneo.
- source_word: חֶרֶב חֶרֶב
  english_pob_choice: A sword, a sword
  chosen_spanish: Una espada, una espada
  alternatives_spanish:
  - Espada, espada
  - Una espada, una espada
  lexicon: HALOT
  rationale: La duplicación enfática se conserva explícitamente. El artículo hace fluida la exclamación en español sin perder la repetición enfática del hebreo.
- source_word: הוּחַדָּה
  english_pob_choice: sharpened
  chosen_spanish: afilada
  alternatives_spanish:
  - aguzada
  - hecha filo
  lexicon: HALOT
  rationale: El pasivo de חדד indica que la espada ha sido afilada. ‘Afilada’ es la opción moderna más natural y fiel; ‘aguzada’ es más literal pero menos usual.
- source_word: וְגַם
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - e incluso
  - y además
  lexicon: HALOT
  rationale: Preserva el valor aditivo e intensivo sin sobrecargar el verso. ‘Y también’ refleja bien la acumulación que introduce la segunda cualidad.
- source_word: מְרוּטָה
  english_pob_choice: polished
  chosen_spanish: pulida
  alternatives_spanish:
  - bruñida
  - brillantada
  lexicon: HALOT
  rationale: ‘Pulida’ expresa el sentido de una superficie alisada o brillada para el uso bélico. Mantiene la claridad moderna y el paralelo con la nota inglesa sobre ‘polished/burnished’.
theological_decisions:
- issue: Título divino en la fórmula profética
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor
  rationale: El hebreo presenta una fórmula profética con אֲדֹנָי. En vez de seguir la convención de reemplazar el nombre divino por una máscara tipográfica, se expresa el nombre según la política del proyecto (‘Yahvé’) y el título reverencial como ‘Señor’. Esto conserva transparencia textual y evita perder la distinción entre nombre y título.
  doctrine_reference: 'DOCTRINE.md: YHWH -> Yahvé; traducir títulos, no ocultar el nombre divino'
translation_notes:
  revision_awareness: 'El texto inglés auditado quedó sin cambios en la última revisión (latest_revision_pass: unchanged true). La versión española sigue ese mismo contenido base, ajustando solo la elección terminológica para cumplir la política del proyecto en español.'
  spanish_consistency_notes:
  - 'Se mantuvo la fórmula imperativa encadenada: ‘profetiza y di’.'
  - Se preservó la repetición enfática ‘Una espada, una espada’.
  - Se usó ‘Yahvé’ para el nombre divino conforme a la política del proyecto, sin la convención de ocultamiento tipográfico.
  - Se eligieron formas verbales y léxicas naturales en español sin diluir la imagen bélica del texto.
