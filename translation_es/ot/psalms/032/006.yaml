  text: עַל זֹ֡את יִתְפַּלֵּ֬ל כָּל חָסִ֨יד אֵלֶי/ךָ֮ לְ/עֵ֪ת מְ֫צֹ֥א רַ֗ק לְ֭/שֵׁטֶף מַ֣יִם רַבִּ֑ים אֵ֝לָ֗י/ו לֹ֣א יַגִּֽיעוּ־־׀׃
base_translation:
