translation:
  language: es
  text: Él le da un hogar[a] a la mujer estéril, como madre gozosa de hijos. ¡Alaben a Yah[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Él hace habitar a la mujer estéril en la casa» o «Él hace que la mujer estéril habite en la casa».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «¡Alaben a Yah!». Tradicionalmente: «¡Aleluya!».'
    reason: alternative_reading
lexical_decisions:
- source_word: מֽוֹשִׁיבִ֨י
  english_pob_choice: He gives ... a home
  chosen_spanish: Él hace habitar
  alternatives_spanish:
  - Él hace morar
  - Él asienta
  - Él establece
  lexicon: HALOT
  rationale: El hifil de ישׁב expresa causativamente 'hacer habitar/establecer'. En español, 'hace habitar' conserva esa fuerza verbal sin perder naturalidad; evita la paráfrasis excesiva de 'dar un hogar' y mantiene la idea de colocar a alguien en una स्थिति doméstica estable.
- source_word: עֲקֶ֬רֶת
  english_pob_choice: the barren woman
  chosen_spanish: la mujer estéril
  alternatives_spanish:
  - la mujer sin hijos
  - la estéril
  - la mujer infecunda
  lexicon: HALOT
  rationale: El término denota una mujer sin capacidad de tener hijos; 'estéril' es claro, digno y fiel al registro poético. 'Mujer sin hijos' explicita el resultado, pero atenúa el valor léxico de la palabra hebrea; 'infecunda' es más raro en el español actual.
- source_word: הַ/בַּ֗יִת
  english_pob_choice: a home
  chosen_spanish: en la casa
  alternatives_spanish:
  - en un hogar
  - en la casa de la familia
  - en su casa
  lexicon: HALOT
  rationale: Aunque el inglés POB optó por 'a home' para comunicar establecimiento doméstico, el hebreo dice literalmente 'la casa'. En español, 'en la casa' preserva mejor el sustantivo concreto y deja que el contexto poético exprese la idea de hogar/hogar establecido sin añadir una abstracción innecesaria.
- source_word: אֵֽם הַ/בָּנִ֥ים
  english_pob_choice: mother of children
  chosen_spanish: madre de hijos
  alternatives_spanish:
  - madre de hijos
  - madre de los hijos
  - madre de niños
  lexicon: HALOT
  rationale: בנים puede ser 'hijos' o, en algunos contextos, 'niños/descendientes'. 'Madre de hijos' mantiene la pluralidad y la imagen de reversión de la esterilidad a la maternidad. 'Hijos' es más natural y suficientemente amplio en español bíblico.
- source_word: שְׂמֵחָ֗ה
  english_pob_choice: joyful
  chosen_spanish: alegre
  alternatives_spanish:
  - gozosa
  - gozando
  - llena de gozo
  lexicon: HALOT
  rationale: Como adjetivo predicativo referido a la madre, 'alegre' resulta directo y fluido en español. 'Gozosa' también sería posible, pero 'alegre' comunica mejor el estado resultante sin sonar demasiado solemne o abstracto.
- source_word: הַֽלְלוּ יָֽהּ
  english_pob_choice: Praise Yah!
  chosen_spanish: ¡Alaben a Yah!
  alternatives_spanish:
  - ¡Alaben a Yahvé!
  - ¡Aleluya!
  - ¡Alaben a Yah!
  lexicon: HALOT
  rationale: El hebreo tiene el imperativo plural 'alaben' más el nombre corto divino יָהּ. '¡Alaben a Yah!' preserva la forma breve del nombre; el añadido de 'a' en español hace explícita la relación verbal y resulta idiomático. 'Aleluya' es litúrgicamente familiar, pero translitera en vez de traducir.
theological_decisions:
- issue: Tratamiento del nombre divino corto יָהּ en la doxología final
  english_pob_reading: Praise Yah!
  chosen_spanish_reading: ¡Alaben a Yah!
  alternative_spanish_readings:
  - ¡Alaben a Yahvé!
  - ¡Aleluya!
  rationale: El texto hebreo no usa יהוה sino la forma breve יָהּ. Por eso se conserva 'Yah' en vez de sustituirlo por 'Yahvé'; así se mantiene la distinción entre el nombre corto y el tetragrama. 'Aleluya' es una opción de tradición litúrgica, pero no traduce el valor imperativo del hebreo.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested terms table for YHWH applies specifically to YHWH, not to the short form Yah.'
translation_notes:
  revision_awareness: El auditor inglés concluyó un pass de alta concordancia y no aplicó revisiones. Esta versión española sigue el mismo análisis semántico, adaptando la estructura a un español natural sin abandonar la literalidad controlada del hebreo.
  spanish_consistency_notes:
  - Se preservó el paralelismo poético entre la reversión de la esterilidad y la alabanza final.
  - Se mantuvo 'Yah' para la forma breve del nombre divino, en continuidad con el criterio POB de no ocultar el hebreo.
  - Se evitó 'SEÑOR' porque el versículo final usa יָהּ, no el tetragrama.
  - '''Casa'' se conservó por fidelidad al sustantivo hebreo, aunque el sentido contextual incluye la idea de hogar o establecimiento doméstico.'
