base_translation:
  language: en
  yaml_path: translation/ot/2_kings/019/022.yaml
  text: Whom have you mocked and blasphemed? Against whom have you raised your voice and lifted your eyes on high? Against the Holy One of Israel[a][b].
  footnotes:
  - marker: a
    text: Or 'reproached and reviled.' The Hebrew verbs are near-synonyms for scornful, abusive speech; the second can specifically carry the sense of blaspheming God.
    reason: lexical_alternative
  - marker: b
    text: Literally 'lifted your eyes to the height,' an idiom expressing haughtiness or arrogant self-exaltation.
    reason: cultural_note
