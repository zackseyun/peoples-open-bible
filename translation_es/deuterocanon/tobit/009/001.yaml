translation:
  language: es
  text: 'Y Tobías llamó a Rafael y le dijo: «Azarías[a], hermano»,[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tobías se dirige aquí a Rafael como «Azarías», el nombre bajo el cual venía viajando con él.
    reason: cross_reference
  - marker: b
    text: La tradición semítica más amplia continúa de inmediato con las instrucciones de Tobías a Azarías/Rafael; el testimonio griego usado aquí conserva solo el comienzo de la dirección en este versículo.
    reason: textual_variant
lexical_decisions:
- source_word: ἐκάλεσεν
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - llamó
  - llamó a
  lexicon: BDAG
  rationale: El aoristo de καλέω aquí introduce el discurso directo; en español, «llamó» reproduce de manera natural y fiel el acto de dirigirse a alguien, sin añadir la fuerza de «convocó» o «mandó llamar» que el griego no exige.
- source_word: Τωβίας
  english_pob_choice: Tobiah
  chosen_spanish: Tobías
  alternatives_spanish:
  - Tobías
  - Tobit
  lexicon: Convención onomástica del POB
  rationale: Se conserva la transliteración fuente-orientada del nombre, en forma española digna y reconocible. «Tobit» sería la forma tradicional latina, pero no refleja tan bien la forma semítica que el proyecto prefiere seguir.
- source_word: Ῥαφαήλ
  english_pob_choice: Raphael
  chosen_spanish: Rafael
  alternatives_spanish:
  - Rafael
  lexicon: Convención onomástica del POB
  rationale: Nombre propio transliterado a la forma española estándar.
- source_word: Ἀζαρία
  english_pob_choice: Azariah
  chosen_spanish: Azarías
  alternatives_spanish:
  - Azarías
  - Azarías, nombre bajo el cual viajaba
  lexicon: Convención onomástica del POB
  rationale: Se usa la forma española habitual del nombre, preservando la identificación narrativa de que Tobías se dirige a Rafael por su nombre asumido.
- source_word: ἀδελφέ
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - hermano
  - hermano mío
  lexicon: BDAG
  rationale: El vocativo se vierte literalmente como «hermano». En este contexto funciona como apelativo afectuoso; «hermano mío» sería posible, pero menos natural en español y más explicativo de lo que el griego dice.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incorporando los marcadores [a] y [b] directamente en el texto español, junto a los términos correspondientes, para que cada nota quede anclada en la traducción.
  spanish_consistency_notes:
  - Se mantiene «Tobías» como nombre propio fuente-orientado, coherente con la transliteración del inglés POB.
  - Se mantiene «Rafael» y «Azarías» en formas españolas estándar, evitando sustituciones litúrgicas o tradicionales que no aportan mayor fidelidad aquí.
  - El versículo se deja en una frase breve y abierta, porque el griego de este testimonio solo conserva la llamada y la dirección, no las instrucciones siguientes.
