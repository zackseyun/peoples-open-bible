translation:
  language: es
  text: Trajeron siete toros, siete carneros, siete corderos y siete machos cabríos como sacrificio por el pecado[a] por el reino, por el santuario y por Judá. Y les dijo a los hijos de Aarón, los sacerdotes, que los ofrecieran sobre el altar de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sacrificio por el pecado» conserva la categoría cultual de חַטָּאת; también puede traducirse «ofrenda por el pecado».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבִיאוּ
  english_pob_choice: They brought
  chosen_spanish: Trajeron
  alternatives_spanish:
  - Presentaron
  lexicon: HALOT
  rationale: El verbo narrativo de traer animales para el sacrificio se expresa de forma natural en español con «trajeron». «Presentaron» es posible en contexto cultual, pero añade un matiz más interpretativo.
- source_word: פָרִים
  english_pob_choice: bulls
  chosen_spanish: becerros
  alternatives_spanish:
  - toros
  - bueyes
  lexicon: HALOT
  rationale: En esta lista sacrificial, el hebreo designa bovinos aptos para ofrecer. «Becerros» evita sonar demasiado técnico o pesado en español y conserva la referencia a animales jóvenes de sacrificio; «toros» o «bueyes» desplazan el matiz.
- source_word: אֵילִים
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - mardos
  - borregos
  lexicon: HALOT
  rationale: «Carneros» es el equivalente español claro y estándar para machos ovinos en contexto sacrificial.
- source_word: כְבָשִׂים
  english_pob_choice: lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - corderos machos
  - ovejas
  lexicon: HALOT
  rationale: «Corderos» es natural en español y adecuado para la categoría sacrificial. El hebreo no marca explícitamente la edad, pero el término apunta a animales jóvenes.
- source_word: צְפִירֵי עִזִּים
  english_pob_choice: male goats
  chosen_spanish: machos cabríos
  alternatives_spanish:
  - cabritos machos
  - chivos
  lexicon: HALOT
  rationale: La construcción hebrea especifica machos de cabra; «machos cabríos» conserva esa fuerza léxica mejor que el genérico «chivos».
- source_word: לְחַטָּאת
  english_pob_choice: as a sin offering
  chosen_spanish: como sacrificio por el pecado
  alternatives_spanish:
  - como ofrenda por el pecado
  - como ofrenda expiatoria
  lexicon: HALOT
  rationale: En español, «sacrificio por el pecado» comunica la función cultual sin recurrir automáticamente a un tecnicismo eclesiástico. Dado que el POB inglés conserva la categoría cultual «sin offering», esta redacción mantiene la tensión entre el acto sacrificial y su relación con el pecado. Se evita «ofrenda expiatoria» porque introduce una interpretación más amplia de la expiación que el hebreo aquí no desarrolla.
- source_word: עַל הַמַּמְלָכָה
  english_pob_choice: for the kingdom
  chosen_spanish: por el reino
  alternatives_spanish:
  - en favor del reino
  - por causa del reino
  lexicon: HALOT
  rationale: El עַל sacrificial tiene fuerza representativa; en español, «por el reino» reproduce bien el sentido de intercesión/representación sin recargar la frase.
- source_word: הַמִּקְדָּשׁ
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el templo
  - el lugar santo
  lexicon: HALOT
  rationale: «Santuario» preserva mejor el sentido cultual de מִקְדָּשׁ que «templo», que puede ser más amplio o arquitectónico.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judea
  lexicon: HALOT
  rationale: Se mantiene el nombre territorial/bíblico estándar «Judá».
- source_word: לִבְנֵי אַהֲרֹן הַכֹּהֲנִים
  english_pob_choice: the sons of Aaron, the priests
  chosen_spanish: a los hijos de Aarón, los sacerdotes
  alternatives_spanish:
  - a los descendientes de Aarón, los sacerdotes
  - a los hijos de Aarón, sacerdotes
  lexicon: HALOT
  rationale: Se conserva la designación familiar y la apposición sacerdotal. «Hijos de Aarón» es la forma más literal y reconocible en español bíblico.
- source_word: לְהַעֲלוֹת
  english_pob_choice: to offer them on
  chosen_spanish: que los ofrecieran
  alternatives_spanish:
  - que los ofreciesen
  - para ofrecerlos
  lexicon: HALOT
  rationale: En español, el verbo cultual «ofrecer» transmite el valor sacrificial de עלה. Se evita añadir «en holocausto» o similar, porque el hebreo solo dice ofrecerlos sobre el altar.
- source_word: מִזְבַּח יְהוָה
  english_pob_choice: the altar of Yahweh
  chosen_spanish: sobre el altar de Yahvé
  alternatives_spanish:
  - sobre el altar de Yahweh
  - sobre el altar de Yahvé
  lexicon: HALOT
  rationale: Se sigue la directriz del proyecto para יְהוָה como «Yahvé». «Sobre» refleja la preposición hebrea עַל aplicada al altar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según la norma del proyecto, evitando la sustitución por «Señor».
theological_decisions:
- issue: Renderización del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El hebreo usa explícitamente יְהוָה. Siguiendo la pauta del proyecto, se conserva el nombre propio divino en español como «Yahvé», en lugar de enmascararlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza de לְחַטָּאת
  english_pob_reading: sin offering
  chosen_spanish_reading: sacrificio por el pecado
  alternative_spanish_readings:
  - ofrenda por el pecado
  - ofrenda expiatoria
  rationale: La expresión hebrea pertenece al ámbito cultual y designa una categoría sacrificial concreta. «Sacrificio por el pecado» conserva la referencia al rito y su relación con el pecado, sin convertirla en una paráfrasis doctrinal más desarrollada.
  doctrine_reference: 'HALOT: חַטָּאת como categoría sacrificial; cf. uso cultual en el Pentateuco'
translation_notes:
  revision_awareness: 'El texto español sigue el sentido consolidado del POB inglés, pero ajusta la dicción al español natural: «trajeron» para el acto narrativo, «ofrecieran» para el valor sacrificial de לְהַעֲלוֹת, y «sacrificio por el pecado» para mantener la categoría cultual sin importar terminología doctrinal ajena al hebreo. También se adapta la designación divina a la norma del proyecto: «Yahvé».'
  spanish_consistency_notes:
  - Se mantiene la serie numérica de siete en todos los animales, como en el hebreo.
  - Se conserva el orden de los grupos animales y la clausula cultual final.
  - «Hijos de Aarón, los sacerdotes» preserva la aposición del original.
  - «Santuario» se usa de forma consistente para מִקְדָּשׁ, evitando alternarlo con «templo» en este versículo.
  - La preposición «sobre» refleja el hebreo עַל antes de «altar».
