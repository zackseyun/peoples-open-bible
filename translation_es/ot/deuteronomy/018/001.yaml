translation:
  language: es
  text: Los sacerdotes levíticos —toda la tribu de Leví— no tendrán parte ni herencia con Israel; comerán las ofrendas de alimento[a] de Yahvé, es decir, su herencia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «las ofrendas por fuego de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: «Su herencia» puede referirse colectivamente a Leví o al levita; compárese la afirmación paralela en Deuteronomio 18:2, donde se dice que Yahvé es su herencia.
    reason: cross_reference
lexical_decisions:
- source_word: לַכֹּהֲנִים הַלְוִיִּם
  english_pob_choice: The Levitical priests
  chosen_spanish: Los sacerdotes levíticos
  alternatives_spanish:
  - los sacerdotes, los levitas
  - los sacerdotes que son levitas
  lexicon: HALOT
  rationale: La construcción hebrea identifica a los sacerdotes como pertenecientes a la línea levítica. «Sacerdotes levíticos» mantiene esa aposición de modo natural en español sin separar dos grupos distintos.
- source_word: כָּל שֵׁבֶט לֵוִי
  english_pob_choice: all the tribe of Levi
  chosen_spanish: toda la tribu de Leví
  alternatives_spanish:
  - toda la casa de Leví
  - hasta toda la tribu de Leví
  lexicon: HALOT
  rationale: El hebreo intensifica el alcance con כָּל. «Toda la tribu de Leví» conserva el énfasis total y la fuerza inclusiva de la cláusula.
- source_word: חֵלֶק וְנַחֲלָה
  english_pob_choice: portion or inheritance
  chosen_spanish: parte ni herencia
  alternatives_spanish:
  - porción ni herencia
  - participación ni posesión hereditaria
  lexicon: HALOT
  rationale: En español, la negación con dos sustantivos coordinados refleja mejor el par jurídico hebreo que un «o» literal. «Parte ni herencia» comunica la falta de derecho de asignación territorial o patrimonial.
- source_word: עִם יִשְׂרָאֵל
  english_pob_choice: with Israel
  chosen_spanish: con Israel
  alternatives_spanish:
  - entre Israel
  - junto con Israel
  lexicon: HALOT
  rationale: «Con Israel» conserva la idea de compartir la misma base de posesión o asignación entre las tribus, sin añadir matices innecesarios.
- source_word: אִשֵּׁי יְהוָה
  english_pob_choice: the food offerings of Yahweh
  chosen_spanish: las ofrendas encendidas de Yahvé
  alternatives_spanish:
  - las ofrendas ígneas de Yahvé
  - las ofrendas pasadas por fuego de Yahvé
  lexicon: HALOT
  rationale: אִשֵּׁי se relaciona etimológicamente con fuego y designa las ofrendas quemadas/presentadas por fuego. «Ofrendas encendidas» conserva ese valor léxico sin volverlo demasiado técnico ni sustituirlo por un término litúrgico no respaldado por la fuente.
- source_word: וְנַחֲלָתוֹ
  english_pob_choice: his inheritance
  chosen_spanish: su herencia
  alternatives_spanish:
  - su posesión heredada
  - su herencia asignada
  lexicon: HALOT
  rationale: El sufijo masculino singular se mantiene como «su». Aunque el referente colectivo puede abarcar a Leví, en español «su herencia» reproduce de forma natural la ambigüedad colectiva/singular del hebreo.
- source_word: יֹאכֵלוּן
  english_pob_choice: they shall eat
  chosen_spanish: comerán
  alternatives_spanish:
  - habrán de comer
  - podrán comer
  lexicon: HALOT
  rationale: El imperfecto legal se vierte con futuro simple en español. «Comerán» suena natural y conserva el carácter normativo de la disposición.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La política del proyecto pide «Yahvé» para יהוה en el texto principal. Se evita «SEÑOR» porque funcionaría como sustituto de ocultamiento y no como representación explícita del nombre de pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Relación entre «las ofrendas encendidas de Yahvé» y «su herencia»
  english_pob_reading: that is, his inheritance
  chosen_spanish_reading: es decir, su herencia
  alternative_spanish_readings:
  - o sea, su herencia
  - la cual es su herencia
  rationale: 'Se conserva la nota apposicional del audit trail inglés: la segunda expresión aclara la primera sin convertirla en dos realidades separadas. La puntuación con coma y «es decir» hace explícita esa relación.'
  doctrine_reference: Deuteronomio 18:2 en paralelo; lectura colectiva de Leví como herencia sacerdotal
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para aclarar la relación apposicional con «that is,» entre «the food offerings of Yahweh» y «his inheritance». La versión española sigue esa decisión con «es decir» para mantener la misma claridad exegética y la misma estructura semántica. También se conserva la decisión terminológica del proyecto para יהוה como «Yahvé».
  spanish_consistency_notes:
  - Se mantuvo «sacerdotes levíticos» para reflejar la aposición del hebreo sin introducir una separación inexistente entre sacerdotes y levitas.
  - Se usó «ofrendas encendidas» para אִשֵּׁי, evitando neutralizaciones como «ofrendas» a secas o equivalentes litúrgicos no motivados por el hebreo.
  - La negación «no tendrán parte ni herencia» reproduce el par jurídico hebreo con una fórmula natural en español.
  - «Su herencia» conserva el posible referente colectivo singular, en consonancia con la lectura auditada del inglés.
