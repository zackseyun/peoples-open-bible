revisions:
- from: Entonces tomará la madera de cedro[a], el hisopo, el hilo escarlata, y el ave viva, y los sumergirá en la sangre del ave degollada y en el agua fresca[b], y rociará la casa siete veces.
  to: Entonces tomará la madera de cedro, el hisopo, el hilo escarlata[a] y el ave viva, y los mojará en la sangre del ave degollada y en el agua fresca[b], y rociará la casa siete veces.
  rationale: Se corrigió la nota [a] para que preserve la alternativa léxica significativa documentada en el audit trail inglés para שְׁנִי הַתּוֹלַעַת. También se ajustó 'los sumergirá' a 'los mojará' para reflejar mejor el valor normal de טבל en este contexto ritual, y se suavizó la puntuación de la enumeración para un español más natural.
