    text: Or 'the arms of the south,' with 'arms' used metaphorically for military power or forces.
    reason: lexical_alternative
  - marker: b
    text: Or 'his chosen people'; the phrase likely refers in context to the king of the south's select troops or elite forces.
    reason: lexical_alternative
