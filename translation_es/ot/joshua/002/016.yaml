review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del hebreo: Rahab da tres instrucciones secuenciales a los espías: ir a la zona montañosa, esconderse allí tres días, y luego continuar su camino. También conserva correctamente la alternativa léxica de הָהָרָה con nota. Sin embargo, en יִפְגְּעוּ בָכֶם el borrador se aparta del rastro auditado al traducir ''los alcancen'', que intensifica el sentido hacia ''dar alcance'' en vez del valor léxico más básico ''encontrar/encarar''. Además, la nota [b] preserva la alternativa correcta, pero el texto principal no. Hay también un pequeño ajuste de naturalidad/fidelidad en ''por tres días'', donde ''tres días'' o ''durante tres días'' refleja mejor la duración sin sonar tan conversacional.'
  spanish_quality_summary: El español es claro, natural y digno. 'Región montañosa', 'escóndanse allí' y 'Después podrán seguir su camino' funcionan bien. No obstante, 'para que no los alcancen' suena más fuerte que el hebreo y menos alineado con la decisión léxica documentada. 'Tres días' mejora levemente la sobriedad y cercanía al original frente a 'por tres días'.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. El manejo de הָהָרָה como 'región montañosa' con nota alternativa 'al monte' está bien alineado con el POB. La principal desalineación léxica está en פגע + ב, donde debe preferirse 'encuentren' o equivalente cercano, no 'alcancen'.
  issues:
  - severity: medium
    issue: יִפְגְּעוּ בָכֶם se tradujo como 'los alcancen'
    rationale: El POB auditado eligió 'encounter you' y explicitó como alternativas 'meet you' o 'come upon you', no 'overtake you' como principal. 'Alcancen' en español sugiere más bien 'dar alcance', que es semánticamente más fuerte que el núcleo léxico de פגע en este contexto.
  - severity: low
    issue: '''por tres días'' puede ajustarse a ''tres días'''
    rationale: La duración acusativa hebrea se refleja de manera más directa y sobria con 'tres días'. 'Por tres días' no es incorrecto, pero es menos ceñido al estilo del POB y algo más coloquial.
  revised_spanish_text: 'Y ella les dijo: «Vayan a la región montañosa[a], para que no los encuentren los perseguidores; y escóndanse allí tres días, hasta que los perseguidores regresen[b]. Después podrán seguir su camino».'
  revised_footnotes:
