translation:
  language: es
  text: Y Barac persiguió los carros[a] y el ejército hasta Haroset de las naciones[b]; y todo el ejército de Sísara cayó al filo de la espada; no quedó ni uno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la fuerza de carros», tomando «carros» como término militar colectivo.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Haroshet de las naciones»; tradicionalmente, «Haroshet-hagoyim».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָרָק
  english_pob_choice: Barak
  chosen_spanish: Barac
  alternatives_spanish:
  - Barak
  lexicon: nombre propio
  rationale: Se adapta el nombre propio a la forma habitual en español bíblico, sin alterar la identidad del personaje.
- source_word: רָדַף אַחֲרֵי
  english_pob_choice: pursued
  chosen_spanish: persiguió
  alternatives_spanish:
  - fue tras
  - siguió de cerca
  lexicon: HALOT
  rationale: El conjunto verbal expresa persecución activa en contexto militar; «persiguió» comunica bien esa acción sin perder fuerza narrativa.
- source_word: הָרֶכֶב
  english_pob_choice: the chariots
  chosen_spanish: los carros
  alternatives_spanish:
  - la fuerza de carros
  - la caballería de carros
  lexicon: HALOT
  rationale: «Carros» mantiene el sustantivo hebreo de forma natural en español. Aunque puede tener sentido colectivo, no es necesario explicitarlo en el texto principal.
- source_word: הַמַּחֲנֶה
  english_pob_choice: the army
  chosen_spanish: el ejército
  alternatives_spanish:
  - el campamento
  - la hueste
  lexicon: HALOT
  rationale: En este relato de batalla, מַחֲנֶה designa la fuerza militar; «ejército» transmite mejor el referente que «campamento».
- source_word: עַד חֲרֹשֶׁת הַגּוֹיִם
  english_pob_choice: as far as Harosheth of the nations
  chosen_spanish: hasta Haroshet de las naciones
  alternatives_spanish:
  - hasta Haroshet-hagoyim
  - hasta Haroset de las naciones
  lexicon: HALOT
  rationale: Se conserva el nombre del lugar con transliteración sobria y se mantiene el elemento genitivo «de las naciones», en vez de colapsarlo a una forma tradicionalizada.
- source_word: וַיִּפֹּל כָּל מַחֲנֵה סִיסְרָא
  english_pob_choice: all Sisera’s army fell
  chosen_spanish: todo el ejército de Sísara cayó
  alternatives_spanish:
  - todo el campamento de Sísara cayó
  - toda la hueste de Sísara cayó
  lexicon: HALOT
  rationale: El hebreo usa lenguaje colectivo de derrota; «cayó» conserva el modismo bélico y «ejército» da claridad en español.
- source_word: לְפִי חֶרֶב
  english_pob_choice: by the edge of the sword
  chosen_spanish: a filo de espada
  alternatives_spanish:
  - por la espada
  - por el filo de la espada
  lexicon: HALOT
  rationale: «A filo de espada» es una equivalencia idiomática estable en español que preserva la imagen hebrea de muerte violenta en combate.
- source_word: לֹא נִשְׁאַר עַד אֶחָד
  english_pob_choice: not even one was left
  chosen_spanish: no quedó ni uno
  alternatives_spanish:
  - no quedó uno solo
  - no sobrevivió ni uno
  lexicon: HALOT
  rationale: La frase española reproduce la totalización enfática del hebreo con una formulación natural y concisa.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el expediente inglés de la POB y no requiere correcciones sustantivas: se preservan la persecución militar, el nombre del lugar con su elemento genitivo y la fórmula de aniquilación total. La principal adaptación es idiomática al español, especialmente en «a filo de espada» y en la elección de «ejército» para מַחֲנֶה.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; en este versículo no es necesario.
  - Se mantiene la traducción de nombres propios bíblicos en formas usuales del español («Barac», «Sísara»).
  - «Carros» se deja en el texto principal por fidelidad al sustantivo hebreo; la posible lectura colectiva queda en nota.
  - «No quedó ni uno» conserva la totalización de «no quedó hasta uno» sin sonar forzado en español.
