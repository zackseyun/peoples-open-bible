translation:
  language: es
  text: Mi rostro está enrojecido[a] por el llanto, y sobre mis párpados hay profunda oscuridad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sombra de muerte». El término hebreo puede denotar sombra mortuoria o una oscuridad muy profunda; aquí el contexto favorece una oscuridad intensa sobre los párpados más que una referencia directa a la muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּנַי
  english_pob_choice: my face
  chosen_spanish: mi rostro
  alternatives_spanish:
  - mi cara
  - mi semblante
  lexicon: HALOT
  rationale: El hebreo usa el plural con sufijo de 1.ª persona, pero funciona de manera idiomática como singular. En español, «rostro» conserva el tono poético y algo más elevado que «cara», sin perder naturalidad.
- source_word: חמרמרה
  english_pob_choice: is red
  chosen_spanish: está enrojecido
  alternatives_spanish:
  - está rojo
  - está inflamado
  - está oscurecido
  lexicon: HALOT
  rationale: La forma verbal rara describe un cambio visible del rostro bajo intensa emoción o aflicción. «Está enrojecido» comunica el efecto visible sin precisar más de lo que el hebreo permite.
- source_word: מִנִּי
  english_pob_choice: from
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  - de
  lexicon: HALOT
  rationale: Aquí la preposición expresa causa o fuente. En español, «por» resulta más natural que un calco como «desde» y mantiene el valor causal.
- source_word: בֶכִי
  english_pob_choice: weeping
  chosen_spanish: el llanto
  alternatives_spanish:
  - el llorar
  - el sollozo
  - las lágrimas
  lexicon: HALOT
  rationale: El sustantivo denota el acto de llorar. «El llanto» preserva el tono poético y evita restringir la imagen solo a las lágrimas.
- source_word: עַפְעַפַּי
  english_pob_choice: my eyelids
  chosen_spanish: mis párpados
  alternatives_spanish:
  - mis ojos
  - los bordes de mis ojos
  lexicon: HALOT
  rationale: El hebreo se refiere específicamente a los párpados; «párpados» es el equivalente preciso y claro en español.
- source_word: צַלְמָוֶת
  english_pob_choice: deep darkness
  chosen_spanish: profunda oscuridad
  alternatives_spanish:
  - oscuridad tenebrosa
  - oscuridad espesa
  - sombra de muerte
  lexicon: HALOT
  rationale: En poesía hebrea este término puede significar oscuridad muy intensa, no necesariamente una referencia directa a la muerte. «Profunda oscuridad» reproduce bien la fuerza de la imagen.
theological_decisions:
- issue: Sentido de צַלְמָוֶת
  english_pob_reading: The Hebrew term can denote either deathly shadow or very deep darkness; here the context favors intense gloom on the eyelids rather than a direct reference to death.
  chosen_spanish_reading: El término puede referirse a una oscuridad muy profunda; aquí el contexto favorece esa lectura sobre una alusión directa a la muerte.
  alternative_spanish_readings:
  - sombra de muerte
  - sombra mortal
  rationale: No se debe borrar la tensión semántica tradicional del término, pero el contexto inmediato habla del aspecto del rostro y los párpados. Por eso la traducción principal sigue la intensidad de la oscuridad, mientras se conserva la lectura tradicional en nota.
  doctrine_reference: Poética hebrea; semántica de צַלְמָוֶת en textos sapienciales
translation_notes:
  revision_awareness: El expediente inglés no muestra cambios revisados y la revisión más reciente quedó sin modificaciones; por eso esta propuesta sigue de cerca la decisión auditada de tomar צַלְמָוֶת como «deep darkness», manteniendo la alternativa tradicional en nota.
  spanish_consistency_notes:
  - Se mantiene un registro poético y sobrio, sin introducir interpretaciones adicionales sobre la causa del sufrimiento.
  - Se usó «rostro» y «párpados» para conservar precisión anatómica y naturalidad en español.
  - La nota conserva la alternativa tradicional «sombra de muerte» para resguardar la tensión léxica documentada en el original.
