lexical_decisions:
- source_word: לַיִּצְהָרִי
  english_pob_choice: For the Izharite
  chosen_spanish: Para el izharita
  alternatives_spanish:
  - Al izharita
  - Para el descendiente de Izhar
  lexicon: HALOT
  rationale: El prefijo ל en esta lista administrativa expresa asignación/distribución; en español, «para» comunica mejor esa función que una traducción relacional rígida. Se conserva el gentilicio como designación de clan.
- source_word: שְׁלֹמוֹת
  english_pob_choice: Shelomoth
  chosen_spanish: Shelomot
  alternatives_spanish:
  - Shelomoth
  - Shelomot
  lexicon: HALOT
  rationale: Es nombre propio, por lo que se translitera. En español se prefiere una forma coherente con la adaptación gráfica del proyecto y con lectura natural en español.
- source_word: לִבְנֵי
  english_pob_choice: for the sons of
  chosen_spanish: para los hijos de
  alternatives_spanish:
  - para los descendientes de
  - para los hijos
  lexicon: HALOT
  rationale: בנים en listas genealógicas u ორგანიზativas puede equivaler a «descendientes», pero la fórmula literal y clara en español es «hijos de». Mantiene el matiz de pertenencia/adscripción marcado por ל.
- source_word: יָחַת
  english_pob_choice: Jahath
  chosen_spanish: Jahat
  alternatives_spanish:
  - Jahat
  - Yahat
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se adopta una forma española breve y estable, sin introducir una equivalencia interpretativa.
translation_notes:
  revision_awareness: El audit trail inglés no presenta revisiones posteriores ni cambios sustantivos; la decisión principal es mantener el sentido administrativo de ל con una preposición española de asignación y conservar los nombres propios como transliteraciones.
  spanish_consistency_notes:
  - Se mantuvo «para» para reflejar la asignación en la lista, en paralelo a la solución auditada en inglés.
  - Se conservaron los nombres propios sin traducir; solo se ajustó la adaptación ortográfica al español.
  - No hay decisiones teológicas explícitas en este versículo.
  - La forma «hijos de» sigue el patrón genealógico común y deja abierta la lectura ampliada «descendientes de» en nota.
