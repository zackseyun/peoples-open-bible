translation:
  language: es
  text: 'Aín[a], Rimón, Éter y Asán: cuatro ciudades, con sus aldeas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: cuatro nombres de lugar: Aín, Rimón, Éter y Asán. Algunos intérpretes comparan 1 Crónicas 4:32, donde “Aín, Rimón” puede entenderse como un solo conjunto, lo que afectaría el conteo de las ciudades.'
    reason: cross_reference
lexical_decisions:
- source_word: עַיִן
  english_pob_choice: Ain
  chosen_spanish: Aín
  alternatives_spanish:
  - Ain
  - Ayin
  lexicon: HALOT
  rationale: Se trata de un nombre propio de lugar en una lista territorial, por lo que se translitera y no se traduce su sentido común de “manantial” o “ojo”. La tilde ayuda a la pronunciación en español sin alterar el valor toponímico.
- source_word: רִמּוֹן
  english_pob_choice: Rimmon
  chosen_spanish: Rimón
  alternatives_spanish:
  - Rimmon
  - Rimón
  lexicon: HALOT
  rationale: Aquí funciona como topónimo, no como el sustantivo común “granada”. Se translitera al español con acentuación gráfica natural.
- source_word: וָעֶתֶר
  english_pob_choice: Ether
  chosen_spanish: Éter
  alternatives_spanish:
  - Ether
  - Eter
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. Se conserva la transliteración, adaptándola a la ortografía española. La forma con tilde evita una lectura ambigua en español.
- source_word: וְעָשָׁן
  english_pob_choice: Ashan
  chosen_spanish: Asán
  alternatives_spanish:
  - Ashan
  - Asan
  lexicon: HALOT
  rationale: Nombre propio dentro de la misma serie territorial. Se translitera al español y se marca la acentuación para lectura natural.
- source_word: עָרִים
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - poblaciones
  - villas
  lexicon: HALOT
  rationale: El término designa asentamientos urbanos en fórmulas de reparto territorial. “Ciudades” reproduce bien la clasificación administrativa del texto.
- source_word: אַרְבַּע
  english_pob_choice: four
  chosen_spanish: cuatro
  alternatives_spanish:
  - '4'
  lexicon: HALOT
  rationale: Número cardinal que modifica “ciudades”; se expresa de forma directa y natural en español.
- source_word: וְחַצְרֵיהֶן
  english_pob_choice: with their villages
  chosen_spanish: con sus aldeas
  alternatives_spanish:
  - con sus poblados
  - con sus asentamientos
  lexicon: HALOT
  rationale: En fórmulas territoriales, חָצֵר puede referirse a asentamientos dependientes del centro principal. “Aldeas” es una equivalencia idiomática clara en español; mantiene la relación subordinada sin sobrecargar el registro.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto hebreo base y con el control inglés: lista cuatro topónimos, seguida por la suma “cuatro ciudades, con sus aldeas”. No se registran revisiones textuales relevantes en el expediente auditado.'
  spanish_consistency_notes:
  - Se prefirió transliterar los cuatro nombres de lugar en forma hispanizada para mantener la transparencia del dato toponímico.
  - “Con sus aldeas” conserva la fórmula administrativa del hebreo חַצְרֵיהֶן sin introducir una interpretación más amplia que el contexto no exige.
  - La nota al pie preserva la tensión contable señalada en el audit trail inglés sin resolverla artificialmente.
