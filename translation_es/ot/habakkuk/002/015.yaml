review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés: mantiene el ay profético, la coerción de hacer beber, el difícil «tu…» en segunda persona, la intensificación de וְאַף, y la finalidad voyeurista de contemplar la desnudez expuesta. También conserva apropiadamente las notas sobre la dificultad textual y la alternativa anatómica.'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos ajustes menores recomendables: (1) «su desnudez» suaviza o singulariza donde el hebreo y el POB inglés tienen plural («their nakedness»), por lo que «su desnudez expuesta» no corrige del todo; mejor «su desnudez» podría aceptarse genéricamente, pero dado que la nota dice «sus partes íntimas», conviene alinear el texto principal a plural con «su desnudez» no es ideal. (2) La nota a invierte la relación principal/alternativa frente al POB inglés: el texto principal inglés usa ‘wrath’, y la alternativa es ‘venom’; en español, «furor» está bien, pero la nota debería priorizar «veneno» como alternativa principal, no «ira». Además, «y aun» es entendible, pero «y hasta» o «y aun» ambos sirven; no requiere cambio.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/esclavo, etc. Las decisiones «prójimo», «furor», «embriagándolo» y «desnudez» son en general compatibles con la filosofía POB. La excepción menor es la nota léxica de חֲמָתְךָ, que debería reflejar mejor la alternativa documentada ‘venom/veneno’.
  issues:
  - severity: medium
    issue: La nota [a] no refleja con precisión la alternativa principal preservada por el POB inglés para חֲמָתְךָ.
    rationale: El POB inglés usa ‘your wrath’ en el texto principal y conserva ‘your venom’ como alternativa señalada. La nota española pone primero «tu ira», que no añade valor real frente a «tu furor» y desplaza la alternativa más importante documentada.
  - severity: low
    issue: La nota [c] usa «sus partes íntimas», que es algo más eufemístico que el POB inglés.
    rationale: El inglés preserva una alternativa más concreta (‘their private parts’). «Partes íntimas» es comprensible, pero «sus genitales» o similar reflejaría mejor la precisión anatómica sin volverse vulgar. Aun así, por registro eclesial, puede mantenerse una formulación pudorosa si sigue siendo clara.
  revised_spanish_text: ¡Ay de aquel que hace beber a su prójimo, derramando tu furor[a] y aun embriagándolo[b], para mirar su desnudez[c]!
  revised_footnotes:
  - marker: a
    text: O «tu veneno»; el término hebreo para «furor» también puede transmitir la idea de calor o, en este contexto, de veneno.
    reason: lexical_alternative
  - marker: b
    text: Hebreo difícil; algunos entienden esta cláusula de otra manera, como «añadiendo tu botella», o armonizan la persona para leer «su furor».
    reason: alternative_reading
  - marker: c
    text: O «sus genitales»; el hebreo se refiere a la desnudez expuesta en un sentido vergonzoso.
    reason: lexical_alternative
  revision_rationale: 'El texto principal puede conservarse, pero las notas deben alinearse mejor con el rastro de auditoría del POB inglés: en [a], la alternativa léxica importante es «veneno», no «ira»; en [c], conviene una alternativa más precisa que «partes íntimas» para reflejar mejor el matiz anatómico documentado. No se requiere adjudicación compleja, porque son correcciones menores y transparentes.'
