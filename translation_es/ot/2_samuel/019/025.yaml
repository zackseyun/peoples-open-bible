revisions:
- from: Y Mefiboset, hijo de Saúl, descendió para recibir al rey[a]. No había cuidado de sus pies, ni recortado su bigote[b], ni lavado sus vestidos[c], desde el día en que el rey partió hasta el día en que vino en paz.
  to: Y Mefibóset, hijo de Saúl, descendió al encuentro del rey. No había cuidado sus pies[a], ni recortado su bigote[b], ni lavado su ropa, desde el día en que el rey partió hasta el día en que vino en paz[c].
  rationale: Se corrige la traducción de לִקְרַאת a «al encuentro del rey» para mayor fidelidad. Se mejora la naturalidad de la expresión idiomática de los pies. Se reparan las notas para que reflejen las alternativas léxicas reales documentadas por el POB inglés y se elimina una nota innecesaria sobre «vestidos/ropa».
