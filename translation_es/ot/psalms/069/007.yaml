    reason: alternative_reading
  revision_rationale: Se conserva el texto principal casi intacto porque es fiel y natural. Se corrigen las notas para que [a] refleje adecuadamente la alternativa léxica de קוה y para que [b] se ancle al título divino compuesto אֲדֹנָי יְהוָה צְבָאוֹת, en línea con el audit trail inglés y la política del proyecto sobre «Yahvé».
