base_translation:
  language: en
  yaml_path: translation/ot/isaiah/037/004.yaml
  text: Perhaps Yahweh your God will hear the words of the Rabshakeh[a], whom his master the king of Assyria has sent to reproach the living God, and will rebuke the words that Yahweh your God has heard[c][b]. Therefore lift up a prayer for the remnant that remains.
  footnotes:
  - marker: a
    text: Or 'the chief cupbearer.' 'Rabshakeh' is an Assyrian official title used here as a name-like designation.
    reason: cultural_note
  - marker: b
    text: Or 'will reprove/call to account for the words.' The Hebrew may mean that God will answer or judge the blasphemous speech he has heard.
    reason: lexical_alternative
  - marker: c
    text: Or 'the remnant that remains' or 'the survivors who are left.'
    reason: lexical_alternative
