translation:
  language: es
  text: En cuanto a mí, en justicia contemplaré tu rostro; cuando despierte[a], quedaré saciado con tu semejanza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando despierte» puede entenderse como despertar ordinario del sueño, o como un despertar en vindicación/resurrección final.
    reason: alternative_reading
  - marker: b
    text: O «tu forma» o «tu imagen».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּצֶדֶק
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - con justicia
  - en rectitud
  - en vindicación
  lexicon: HALOT
  rationale: צֶדֶק puede expresar justicia o rectitud; con la preposición בְּ, el sentido natural es de esfera o condición. «En justicia» conserva la concisión del hebreo y mantiene abierta la tensión entre integridad del salmista, vindicación divina y marco forense, sin resolverla en exceso.
- source_word: אֶחֱזֶה
  english_pob_choice: I will behold
  chosen_spanish: contemplaré
  alternatives_spanish:
  - veré
  - miraré
  - contemplaré con reverencia
  lexicon: HALOT
  rationale: חזה implica ver con percepción, de modo contemplativo o profético, no mera visión casual. «Contemplaré» comunica mejor esa intensidad que un simple «veré» en español, sin añadir contenido ajeno.
- source_word: פָנֶיךָ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu faz
  - tu presencia
  lexicon: HALOT
  rationale: La imagen literal es «tu rostro»; se evita reemplazarla por «tu presencia» en el cuerpo principal para no suavizar la concreción del hebreo. «Rostro» es natural y fiel en español bíblico contemporáneo.
- source_word: אֶשְׂבְּעָה
  english_pob_choice: I will be satisfied
  chosen_spanish: quedaré saciado
  alternatives_spanish:
  - seré satisfecho
  - me saciaré
  - quedaré lleno
  lexicon: HALOT
  rationale: שׂבע comunica estar saciado o satisfecho. «Quedaré saciado» conserva el matiz de plenitud resultante y suena digno en español. Se evita «seré satisfecho» por menos idiomático.
- source_word: בְּהָקִיץ
  english_pob_choice: when I awake
  chosen_spanish: cuando despierte
  alternatives_spanish:
  - al despertar
  - cuando me despierte
  - cuando despierte de dormir
  lexicon: HALOT
  rationale: El hebreo marca tiempo con el infinitivo constructo; la frase española debe permanecer abierta. «Cuando despierte» mantiene la ambigüedad entre despertar ordinario y una posible lectura de despertar vindicativo/escatológico, tal como preserva la POB en inglés.
- source_word: תְּמוּנָתֶךָ
  english_pob_choice: your likeness
  chosen_spanish: tu semejanza
  alternatives_spanish:
  - tu forma
  - tu imagen
  - tu figura
  lexicon: HALOT
  rationale: תְּמוּנָה puede significar forma, imagen o semejanza. «Semejanza» refleja bien el sentido poético y evita fijar indebidamente una forma física concreta.
theological_decisions:
- issue: Alcance de «cuando despierte» (sueño ordinario o esperanza de vindicación/resurrección)
  english_pob_reading: Main text preserves the temporal phrase 'when I awake' without specifying the manner of awakening.
  chosen_spanish_reading: «cuando despierte» permanece abierto, sin especificar si se trata de despertar del sueño o de un despertar final en vindicación/resurrección.
  alternative_spanish_readings:
  - cuando despierte del sueño
  - cuando despierte en la resurrección
  - al despertar, tras la vindicación
  rationale: El hebreo no determina explícitamente la clase de despertar. La traducción principal conserva la tensión teológica y la nota aclara las posibles lecturas sin resolverlas artificialmente.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: Revisión más reciente sin cambios sustantivos; el texto fuente y el audit trail inglés muestran alto acuerdo y no requieren ajustes adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino explícito; en este versículo no aparece.
  - Se preservó la imagen concreta «rostro» en vez de espiritualizarla como «presencia», siguiendo el hebreo y la decisión inglesa.
  - 'Se evitó traducir mecánicamente desde el inglés: «contemplaré» y «quedaré saciado» buscan equivalentes naturales en español para las cargas aspectuales de חזה y שׂבע.'
  - Se conservó la ambigüedad de «cuando despierte» para no bloquear la lectura poética/escatológica documentada por la POB inglesa.
