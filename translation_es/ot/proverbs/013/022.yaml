translation:
  language: es
  text: El hombre bueno deja herencia a sus nietos[a], pero la riqueza del pecador queda reservada[b] para el justo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «hijos de hijos».
    reason: lexical_alternative
  - marker: b
    text: O «queda escondida» / «está reservada para el justo».
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: a good man
  chosen_spanish: el hombre bueno
  alternatives_spanish:
  - una persona buena
  - el bueno
  lexicon: HALOT
  rationale: El adjetivo funciona de manera sustantiva y proverbial. En español, "el hombre bueno" conserva el valor representativo del masculino singular sin volverlo mecánico, y refleja con claridad la fuerza proverbial del hebreo.
- source_word: יַנְחִיל
  english_pob_choice: leaves an inheritance
  chosen_spanish: deja herencia
  alternatives_spanish:
  - da en herencia
  - hace heredar
  - legará
  lexicon: HALOT
  rationale: El hifil de נחל expresa hacer recibir una herencia o darla como legado. "Deja herencia" comunica de forma natural esa idea causativa en español y mantiene el tono sapiencial.
- source_word: בְּנֵי בָנִים
  english_pob_choice: his grandchildren
  chosen_spanish: a sus nietos
  alternatives_spanish:
  - a los hijos de sus hijos
  - a sus descendientes
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente "hijos de hijos". "Nietos" es el equivalente español más natural y preciso para conservar el sentido generacional.
- source_word: וְצָפוּן
  english_pob_choice: but ... is stored up
  chosen_spanish: pero ... queda reservada
  alternatives_spanish:
  - y ... está escondida
  - pero ... está guardada
  lexicon: HALOT
  rationale: La forma pasiva/participial de צפן puede significar escondido, guardado o reservado. En este paralelismo, "queda reservada" expresa bien la idea de algo destinado o preservado para otro.
- source_word: לַצַּדִּיק
  english_pob_choice: for the righteous
  chosen_spanish: para el justo
  alternatives_spanish:
  - para el hombre justo
  - para los justos
  lexicon: HALOT
  rationale: El sustantivo adjetival se usa aquí de manera singular y representativa. "El justo" en español conserva esa fuerza y evita una expansión innecesaria.
- source_word: חֵיל
  english_pob_choice: wealth
  chosen_spanish: la riqueza
  alternatives_spanish:
  - los bienes
  - el patrimonio
  - la fortuna
  lexicon: HALOT
  rationale: En literatura sapiencial, חֵיל puede referirse a riqueza o recursos. "La riqueza" es la opción más clara y natural en español para este contexto de bienes acumulados.
- source_word: חוֹטֵא
  english_pob_choice: a sinner
  chosen_spanish: el pecador
  alternatives_spanish:
  - uno que peca
  - el que peca
  lexicon: HALOT
  rationale: El participio funciona sustantivamente para designar a una persona caracterizada por el pecado. "El pecador" reproduce bien ese valor y conserva el contraste proverbial.
theological_decisions:
- issue: Masc. singular representativo en proverbio
  english_pob_reading: a good man
  chosen_spanish_reading: el hombre bueno
  alternative_spanish_readings:
  - una persona buena
  - el bueno
  rationale: El hebreo usa una forma masculina singular con valor representativo proverbial. Se conserva el masculino en español por fidelidad al texto y por la decisión editorial de no neutralizar sin necesidad gramatical o contextual.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se registran cambios en el estado de revisión ni objeciones en la verificación cruzada; el borrador mantiene la solución aprobada por la auditoría inglesa.'
  spanish_consistency_notes:
  - Se mantiene «justo» para צַדִּיק y «pecador» para חוֹטֵא, siguiendo el contraste sapiencial.
  - Se usa «herencia» para יַנְחִיל en un registro natural de proverbio, evitando una calca más pesada.
  - Se conserva «nietos» como equivalente idiomático de בְּנֵי בָנִים, con nota literal en pie de página.
  - «Queda reservada» refleja la ambigüedad productiva de צָפוּן sin borrar la posible lectura de «escondida» o «guardada».
