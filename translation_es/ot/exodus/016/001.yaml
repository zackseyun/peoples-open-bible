translation:
  language: es
  text: Partieron de Elim, y toda la congregación de los hijos de Israel[a] llegó al desierto de Sin, que está entre Elim y Sinaí[b], el decimoquinto día del segundo mes, después de haber salido de la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos de Israel». Esta es la designación nacional habitual y puede referirse a todo el pueblo de Israel, no solo a varones.'
    reason: lexical_alternative
  - marker: b
    text: «Sin» aquí es un nombre de lugar, el desierto de Sin, no el término moral «pecado».
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Se pusieron en camino
  - Salieron
  lexicon: HALOT
  rationale: נסע en contexto de travesía por el desierto expresa salir de un campamento y continuar el viaje. «Partieron» conserva ese movimiento narrativo de forma natural en español sin perder la idea de salida.
- source_word: מֵאֵילִם
  english_pob_choice: from Elim
  chosen_spanish: de Elim
  alternatives_spanish:
  - desde Elim
  lexicon: HALOT
  rationale: Elim es un nombre de lugar y se translitera. La preposición española «de» reproduce bien el origen del desplazamiento.
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vinieron
  - arribó
  lexicon: HALOT
  rationale: בוא marca llegada o arribo. En español, «llegó» funciona de manera natural con el sujeto colectivo «toda la congregación», sin añadir matiz excesivo de destino cumplido.
- source_word: כָּל עֲדַת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the whole congregation of the sons of Israel
  chosen_spanish: toda la congregación de los hijos de Israel
  alternatives_spanish:
  - toda la congregación de los israelitas
  - toda la comunidad de los hijos de Israel
  lexicon: HALOT
  rationale: «Congregación» conserva עֲדָה con su sentido colectivo y formal. «Hijos de Israel» sigue de cerca בְּנֵי יִשְׂרָאֵל, manteniendo la formulación hebrea y la nota de transparencia frente a «israelitas».
- source_word: אֶל מִדְבַּר סִין
  english_pob_choice: to the wilderness of Sin
  chosen_spanish: al desierto de Sin
  alternatives_spanish:
  - al desierto de Sinaí
  - al yermo de Sin
  lexicon: HALOT
  rationale: מִדְבָּר puede rendirse como «desierto» o «desierto/estepa» según contexto; aquí «desierto» es claro y bíblicamente inteligible. «Sin» se conserva como topónimo, no como el término moral «pecado».
- source_word: אֲשֶׁר בֵּין אֵילִם וּבֵין סִינָי
  english_pob_choice: which is between Elim and Sinai
  chosen_spanish: que está entre Elim y Sinaí
  alternatives_spanish:
  - que queda entre Elim y Sinaí
  - que se encuentra entre Elim y Sinaí
  lexicon: HALOT
  rationale: La cláusula relativa es geográfica. «Está entre» expresa ubicación de manera directa y sobria; «Sinaí» se translitera conforme al nombre propio hebreo.
- source_word: בַּחֲמִשָּׁה עָשָׂר יוֹם
  english_pob_choice: on the fifteenth day
  chosen_spanish: el día quince
  alternatives_spanish:
  - a los quince días
  - en el día quince
  lexicon: HALOT
  rationale: El hebreo usa un giro calendárico. En español, «el día quince» comunica la fecha con naturalidad; el artículo y el numeral bastan sin forzar un calco innecesario.
- source_word: לַחֹדֶשׁ הַשֵּׁנִי
  english_pob_choice: of the second month
  chosen_spanish: del segundo mes
  alternatives_spanish:
  - en el segundo mes
  - del mes segundo
  lexicon: HALOT
  rationale: «Mes» reproduce correctamente לַחֹדֶשׁ en el marco cronológico, y «del segundo mes» mantiene el valor adnominal del hebreo.
- source_word: לְצֵאתָם מֵאֶרֶץ מִצְרָיִם
  english_pob_choice: after they had gone out from the land of Egypt
  chosen_spanish: después de haber salido de la tierra de Egipto
  alternatives_spanish:
  - desde que salieron de la tierra de Egipto
  - tras haber salido de la tierra de Egipto
  lexicon: HALOT
  rationale: El infinitivo con ל señala el punto de referencia temporal. «Después de haber salido» expresa con precisión la relación temporal establecida por el hebreo y conserva la referencia al éxodo.
theological_decisions:
- issue: Uso de «hijos de Israel» como designación del pueblo
  english_pob_reading: The whole congregation of the sons of Israel
  chosen_spanish_reading: toda la congregación de los hijos de Israel
  alternative_spanish_readings:
  - toda la congregación de los israelitas
  - toda la comunidad de los hijos de Israel
  rationale: Se mantiene la expresión filial/nacional del hebreo, que es más transparente al texto fuente que una normalización a «israelitas». No introduce exclusión masculina en español porque la fórmula funciona aquí como designación colectiva del pueblo.
  doctrine_reference: Éxodo 1:1; 19:1; uso bíblico de בְּנֵי יִשְׂרָאֵל
- issue: Topónimo «Sin» y posible confusión con pecado
  english_pob_reading: wilderness of Sin, not the moral term 'sin'
  chosen_spanish_reading: desierto de Sin
  alternative_spanish_readings:
  - desierto de Sinaí
  - yermo de Sin
  rationale: Se conserva el nombre propio para evitar borrar la distinción entre el lugar y la idea moral de pecado. En español se mantiene el riesgo de confusión, pero el contexto geográfico lo resuelve sin necesidad de glosa extensa.
  doctrine_reference: Éxodo 17:1; Números 33:11-12
translation_notes:
  revision_awareness: El texto inglés auditado presenta alta concordancia y no muestra revisiones aplicadas; por ello, la versión española sigue de cerca la lectura estable del paquete fuente sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - 'Se mantuvo la transliteración de topónimos propios: Elim, Sin y Sinaí.'
  - Se prefirió «desierto» por ser el equivalente bíblico más claro y estable para מִדְבָּר en este contexto.
  - La cronología se expresó con una fórmula idiomática española («el día quince del segundo mes») que conserva la estructura temporal del hebreo.
