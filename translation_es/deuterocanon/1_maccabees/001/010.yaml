translation:
  language: es
  text: Y de entre ellos salió una raíz de pecado[a], Antíoco Epífanes, hijo del rey Antíoco, que había sido rehén en Roma[b]. Y reinó en el año ciento cuarenta y siete del reino de los griegos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «una raíz malvada» o «un retoño pecador». El griego conserva la metáfora vegetal de forma literal: «raíz».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, según el sistema de datación de la era seléucida, «el reino de los griegos».
    reason: cultural_note
lexical_decisions:
- source_word: ἐξῆλθεν ἐξ αὐτῶν
  english_pob_choice: came forth from them
  chosen_spanish: salió de entre ellos
  alternatives_spanish:
  - surgió de entre ellos
  - procedió de ellos
  lexicon: LSJ
  rationale: La expresión griega indica procedencia o surgimiento desde el grupo mencionado. «Salió de entre ellos» conserva la imagen sin sonar forzado en español y mantiene la relación genealógica/política implícita.
- source_word: ῥίζα ἁμαρτωλός
  english_pob_choice: a sinful root
  chosen_spanish: una raíz pecadora
  alternatives_spanish:
  - una raíz sin pecado
  - una raíz malvada
  - un vástago pecador
  lexicon: LSJ
  rationale: Se preserva la metáfora vegetal de ῥίζα en vez de aplanarla a «hombre» u «offspring». «Pecadora» sigue de cerca ἁμαρτωλός y mantiene el juicio moral del texto con naturalidad en español.
- source_word: Ἀντίοχος Ἐπιφανής
  english_pob_choice: Antiochus Epiphanes
  chosen_spanish: Antíoco Epífanes
  alternatives_spanish:
  - Antíoco Epifanes
  lexicon: propio/transliteración
  rationale: Se translitera el nombre y el epíteto conforme al uso bíblico en español, sin traducir el sobrenombre.
- source_word: ὅμηρα
  english_pob_choice: a hostage
  chosen_spanish: rehén
  alternatives_spanish:
  - un rehén
  - cautivo
  lexicon: LSJ
  rationale: El valor político de ὅμηρα se expresa bien con «rehén». En español, el artículo y la concordancia se ajustan al referente singular.
- source_word: ἐβασίλευσεν
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - se hizo rey
  lexicon: LSJ
  rationale: La forma verbal aquí marca acceso y ejercicio del reinado. «Reinó» refleja directamente el verbo griego y coincide con la revisión auditada del inglés POB.
- source_word: ἔτει ἑκατοστῷ καὶ ἑβδόμῳ καὶ τεσσαρακοστῷ
  english_pob_choice: in the one hundred forty-seventh year
  chosen_spanish: en el año ciento cuarenta y siete
  alternatives_spanish:
  - en el año 147
  - en el año ciento cuarenta y siete
  lexicon: LSJ
  rationale: Se reproduce la fórmula cronológica en español natural y solemne, manteniendo el valor ordinal del año.
- source_word: βασιλείας Ἑλλήνων
  english_pob_choice: of the kingdom of the Greeks
  chosen_spanish: del reino de los griegos
  alternatives_spanish:
  - del reino griego
  - de la hegemonía griega
  lexicon: LSJ
  rationale: Se conserva la referencia al sistema de datación y al marco político-cultural de la expresión. «Reino de los griegos» es más literal que una paráfrasis como «era griega».
theological_decisions:
- issue: Metáfora moral de ῥίζα ἁμαρτωλός
  english_pob_reading: Retain the metaphor as 'a sinful root'
  chosen_spanish_reading: Conservar la metáfora como «una raíz pecadora»
  alternative_spanish_readings:
  - una persona pecadora
  - un origen pecaminoso
  - un retoño malvado
  rationale: El griego presenta una caracterización figurada fuerte. Mantener «raíz» preserva la tensión literaria y el juicio moral sin resolverlo interpretativamente.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica y literaria del original; primacía del idioma fuente sobre la paráfrasis.'
- issue: Valor de ἐβασίλευσεν en el contexto narrativo
  english_pob_reading: he reigned
  chosen_spanish_reading: «reinó»
  alternative_spanish_readings:
  - «llegó a ser rey»
  - «comenzó a reinar»
  rationale: El verbo griego puede señalar el ejercicio del reinado o la entronización, pero el pasaje ya presenta a Antíoco como hijo del rey. «Reinó» sigue la lectura auditada del inglés POB y evita añadir un matiz no exigido por el texto.
  doctrine_reference: 'DOCTRINE.md: No borrar tensiones ni sobreexplicar donde el griego es suficiente.'
translation_notes:
  revision_awareness: Seguí la revisión más reciente del inglés POB, que cambió «became king» por «reigned» para reflejar más directamente ἐβασίλευσεν. También preservé la nota cultural sobre la era seléucida y la alternativa léxica para la metáfora de ῥίζα, adaptándolas al español.
  spanish_consistency_notes:
  - Usé «Yahvé» solo donde hubiera el Tetragrámaton; aquí no aparece.
  - Mantuve «reino de los griegos» para respetar el marco cronológico seléucida del texto.
  - Conservé la metáfora vegetal de ῥίζα para no diluir la evaluación moral del versículo.
  - Elegí «rehén» por su valor político-histórico, no «cautivo», para no perder precisión.
  - Ajusté el orden y la puntuación al español bíblico moderno, sin introducir explicación narrativa adicional.
