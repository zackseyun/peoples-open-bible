translation:
  language: es
  text: Porque he aquí la piedra que he puesto delante de Josué; sobre una sola piedra hay siete ojos. He aquí, yo mismo grabaré su grabado[a], declara Yahvé de los Ejércitos[b], y quitaré la iniquidad de aquella tierra en un solo día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, con más fluidez: «grabaré su inscripción». El hebreo usa una expresión cognada, literalmente «grabaré su grabado».'
    reason: lexical_alternative
  - marker: b
    text: 'Tradicionalmente: «el SEÑOR de los Ejércitos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי הִנֵּה
  english_pob_choice: For behold
  chosen_spanish: Porque he aquí
  alternatives_spanish:
  - Pues he aquí
  - Porque mira
  lexicon: HALOT
  rationale: כִּי funciona aquí como enlace explicativo o enfático, y הִנֵּה introduce una llamada solemne de atención. «Porque he aquí» conserva ambos valores sin volver la frase artificial en español.
- source_word: הָאֶבֶן
  english_pob_choice: the stone
  chosen_spanish: la piedra
  alternatives_spanish:
  - la piedra
  - la roca
  lexicon: HALOT
  rationale: El sustantivo concreto designa una piedra; «piedra» es el equivalente natural y fiel en español. «Roca» sería demasiado interpretativo aquí.
- source_word: אֲשֶׁר נָתַתִּי לִפְנֵי יְהוֹשֻׁעַ
  english_pob_choice: that I have set before Joshua
  chosen_spanish: que he puesto delante de Josué
  alternatives_spanish:
  - que he colocado delante de Josué
  - que he puesto ante Josué
  lexicon: HALOT
  rationale: נָתַתִּי en este contexto tiene el sentido de poner o colocar. «He puesto delante de Josué» reproduce bien la escena y suena natural en español.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Jeshúa
  lexicon: HALOT
  rationale: La forma española establecida de este nombre en este pasaje es «Josué»; además es la opción más reconocible para el lector.
- source_word: עַל אֶבֶן אַחַת
  english_pob_choice: on one stone
  chosen_spanish: sobre una sola piedra
  alternatives_spanish:
  - sobre una piedra única
  - encima de una sola piedra
  lexicon: HALOT
  rationale: עַל se expresa naturalmente con «sobre»; «una sola piedra» mantiene el énfasis numérico y la construcción abrupta del hebreo.
- source_word: שִׁבְעָה עֵינָיִם
  english_pob_choice: seven eyes
  chosen_spanish: siete ojos
  alternatives_spanish:
  - siete ojos
  lexicon: HALOT
  rationale: Se conserva la imagen literal sin resolverla interpretativamente en la traducción principal. «Ojos» mantiene la imaginería simbólica del texto hebreo.
- source_word: הִנְנִי
  english_pob_choice: Behold, I myself
  chosen_spanish: He aquí, yo mismo
  alternatives_spanish:
  - He aquí yo
  - Miren, yo mismo
  lexicon: HALOT
  rationale: La construcción es enfática y autodeclarativa; «He aquí, yo mismo» refleja esa fuerza sin sobrecargar el español.
- source_word: מְפַתֵּחַ פִּתֻּחָהּ
  english_pob_choice: will engrave its engraving
  chosen_spanish: grabaré su grabado
  alternatives_spanish:
  - esculpiré su esculpido
  - grabará su inscripción
  lexicon: HALOT
  rationale: La expresión hebrea usa un juego cognado que conviene preservar. «Grabaré su grabado» mantiene la repetición de raíz en español y da transparencia al auditar la elección; la alternativa más fluida se reserva en la nota.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  english_pob_choice: declares Yahweh of Armies
  chosen_spanish: dice Yahvé de los Ejércitos
  alternatives_spanish:
  - declara Yahvé de los Ejércitos
  - oráculo de Yahvé de los Ejércitos
  lexicon: HALOT
  rationale: נְאֻם es fórmula profética de declaración, y «dice» la expresa de manera sobria y fiel. Se mantiene «Yahvé» conforme a la terminología del proyecto, y צְבָאוֹת se traduce como «de los Ejércitos» para no ocultar el sentido.
- source_word: וּמַשְׁתִּי
  english_pob_choice: and I will remove
  chosen_spanish: y quitaré
  alternatives_spanish:
  - y eliminaré
  - y apartaré
  lexicon: HALOT
  rationale: El verbo comunica la idea de remover o quitar. «Quitaré» es idiomático en español y conserva el sentido de hacer desaparecer la culpa.
- source_word: עֲוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - pecado
  lexicon: HALOT
  rationale: «Iniquidad» preserva el peso moral y jurídico del término mejor que «culpa» o «pecado» en este contexto.
- source_word: הָאָרֶץ הַהִיא
  english_pob_choice: that land
  chosen_spanish: aquella tierra
  alternatives_spanish:
  - esa tierra
  - la tierra aquella
  lexicon: HALOT
  rationale: El demostrativo es importante; «aquella tierra» reproduce la distancia señalada por el hebreo y suena natural en español bíblico contemporáneo.
- source_word: בְּיוֹם אֶחָד
  english_pob_choice: in a single day
  chosen_spanish: en un solo día
  alternatives_spanish:
  - en un día
  - en un día único
  lexicon: HALOT
  rationale: «En un solo día» conserva la fuerza de la expresión y sugiere la acción decisiva e inmediata del texto.
theological_decisions:
- issue: Imagen de la piedra y los siete ojos
  english_pob_reading: Retain the imagery literally without identifying the stone or eyes in the main text.
  chosen_spanish_reading: Conservar la imagen literalmente sin identificar la piedra ni los ojos en el texto principal.
  alternative_spanish_readings:
  - Interpretar la piedra como el Mesías en el texto principal
  - Interpretar los siete ojos como la omnisciencia de Yahvé en el texto principal
  rationale: El hebreo presenta una imagen simbólica sin explicación explícita en este versículo. La traducción mantiene esa tensión en lugar de resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica; no importar una interpretación no explicitada por el texto fuente.
- issue: Traducción del nombre divino יהוה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - SEÑOR de los Ejércitos
  - Yahvé de los Hosts
  rationale: Se conserva el nombre divino como «Yahvé» según la terminología del proyecto, y צְבָאוֹת se traduce literalmente para mantener transparencia semántica.
  doctrine_reference: 'DOCTRINE.md: יהוה / YHWH → Yahvé'
- issue: Fórmula profética נְאֻם
  english_pob_reading: declares
  chosen_spanish_reading: dice
  alternative_spanish_readings:
  - declara
  - oráculo de
  rationale: En español, «dice» comunica de modo claro y sobrio la fórmula de proclamación profética sin añadir color doctrinal no requerido por el hebreo.
  doctrine_reference: Uso de fórmulas proféticas transparentes en traducción pública
- issue: Sentido de וּמַשְׁתִּי אֶת עֲוֺן
  english_pob_reading: and I will remove the iniquity
  chosen_spanish_reading: y quitaré la iniquidad
  alternative_spanish_readings:
  - y removeré la iniquidad
  - y eliminaré la iniquidad
  rationale: «Quitaré» expresa con naturalidad la remoción total de la culpa/iniquidad sin perder la fuerza judicial y purificadora del contexto.
  doctrine_reference: No suavizar el lenguaje moral del texto
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el trazado auditado en inglés, conservando la imaginería literal de la piedra y los siete ojos, el juego cognado «grabé su grabado», y la traducción transparente de יהוה צְבָאוֹת como «Yahvé de los Ejércitos». No se aplicaron revisiones posteriores al borrador inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en lugar de «SEÑOR» para coherencia con la norma del proyecto.
  - Se prefirió «piedra» a «roca» por fidelidad léxica.
  - Se conservó el paralelismo verbal «grabaré su grabado» para reflejar la cognación hebrea.
  - «Aquella tierra» mantiene la deixis del hebreo y evita neutralizar el demostrativo.
  - La puntuación con dos puntos y punto y coma busca reflejar la cadencia profética sin recargarla.
