translation:
  language: es
  text: ¿Quién encontró su lugar[a], y quién entró en sus depósitos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus tesoros». El término griego puede significar tanto los tesoros mismos como la tesorería o depósito que los contiene; se prefiere «depósitos» porque el verbo dice que alguien entró en ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿quién es el que
  - ¿quién fue el que
  lexicon: LSJ
  rationale: La pregunta retórica directa se expresa de forma natural y formal en español con «¿Quién». Conserva el tono interrogativo del griego sin añadir explicaciones.
- source_word: εὗρεν
  english_pob_choice: found
  chosen_spanish: encontró
  alternatives_spanish:
  - halló
  - ha encontrado
  lexicon: LSJ
  rationale: El aoristo narrativo se vierte con pasado simple. «Encontró» es claro, natural y no introduce el matiz más interpretativo de «descubrió».
- source_word: τὸν τόπον
  english_pob_choice: place
  chosen_spanish: su lugar
  alternatives_spanish:
  - su sitio
  - su ubicación
  - su morada
  lexicon: LSJ
  rationale: «τόπος» significa «lugar». En el contexto de Sabiduría personificada, el posesivo femenino de la fuente se refleja con «su»; «lugar» preserva la metáfora sin convertirla en una localización más concreta de lo que el griego exige.
- source_word: αὐτῆς
  english_pob_choice: her
  chosen_spanish: su
  alternatives_spanish:
  - de ella
  lexicon: LSJ
  rationale: En español, el posesivo «su» mantiene la referencia a la Sabiduría personificada sin forzar una repetición innecesaria. El antecedente femenino sigue implícito por el contexto.
- source_word: εἰσῆλθεν εἰς
  english_pob_choice: entered into
  chosen_spanish: entró en
  alternatives_spanish:
  - ingresó en
  - entró dentro de
  lexicon: LSJ
  rationale: El griego marca movimiento hacia dentro con εἰς; «entró en» comunica esa dirección de manera natural en español. «Entró dentro de» suena redundante.
- source_word: τοὺς θησαυροὺς
  english_pob_choice: treasuries
  chosen_spanish: sus tesoros
  alternatives_spanish:
  - sus tesorerías
  - sus almacenes
  - sus depósitos
  lexicon: LSJ
  rationale: El griego θησαυρούς puede significar «tesoros» o «tesorerías/depósitos». Dado el paralelismo con la cláusula anterior y el uso más natural en español, se opta por «tesoros». La alternativa inglesa «treasuries» se entiende como una decisión sintáctica para reflejar el ingreso a un lugar, pero en español «sus tesoros» comunica con mayor claridad y evita una expresión poco idiomática.
- source_word: αὐτῆς
  english_pob_choice: her
  chosen_spanish: sus
  alternatives_spanish:
  - de ella
  lexicon: LSJ
  rationale: Se mantiene la personificación femenina de la Sabiduría mediante el posesivo plural «sus», adecuado en español para referirse a sus tesoros.
theological_decisions:
- issue: Personificación de la Sabiduría
  english_pob_reading: Use feminine personal pronoun ('her') for Wisdom
  chosen_spanish_reading: Conservar la referencia femenina implícita de la Sabiduría con posesivos concordantes («su», «sus») sin introducir una personificación más explícita que la del griego.
  alternative_spanish_readings:
  - usar «ella»
  - neutralizar con «su» impersonal
  rationale: El griego usa formas femeninas y el contexto personifica la Sabiduría. En español, el posesivo permite conservar esa referencia sin forzar pronombres sujetos innecesarios. Así se mantiene la tensión literaria del texto entre abstracción y personificación.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: La fuente inglesa y la revisión auditada mantienen el mismo sentido general; no se registran cambios posteriores que afecten esta línea. La decisión principal en español es resolver la ambigüedad de θησαυρούς con una forma idiomática («tesoros») sin perder la referencia a un espacio o depósito subyacente que el griego puede sugerir.
  spanish_consistency_notes:
  - Se mantiene un estilo sobrio y bíblico, pero con español contemporáneo claro.
  - Se preserva la personificación de la Sabiduría mediante posesivos, no mediante glosas explicativas.
  - No se usa «SEÑOR» ni terminología litúrgica ajena al texto, porque este versículo no lo requiere.
