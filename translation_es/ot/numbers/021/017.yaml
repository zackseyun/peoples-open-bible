translation:
  language: es
  text: 'Entonces Israel cantó esta canción: «¡Brota, oh fuente[a]! ¡Respóndanle!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más formalmente: «¡Levántate, oh fuente! ¡Respóndanle!». El hebreo probablemente refleja una fórmula de respuesta o de canto antifonal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca la secuencia narrativa inmediata; «Entonces» es natural en español y mantiene el valor temporal de transición.
- source_word: יָשִׁיר
  english_pob_choice: sang
  chosen_spanish: cantó
  alternatives_spanish:
  - cantará
  - comenzó a cantar
  lexicon: HALOT
  rationale: Aunque la forma hebrea es imperfecta, en esta narración funciona con valor pretérito. En español, «cantó» comunica mejor el acto poético colectivo que un simple «cantó» sin perder la fuerza narrativa.
- source_word: הַשִּׁירָה הַזֹּאת
  english_pob_choice: this song
  chosen_spanish: esta canción
  alternatives_spanish:
  - este canto
  - este poema
  lexicon: HALOT
  rationale: El demostrativo y el sustantivo se refieren al texto poético citado; «canción» es claro y natural en español. «Canto» también sería posible, pero «canción» suena más directo y legible en una cita breve.
- source_word: עֲלִי
  english_pob_choice: Spring up
  chosen_spanish: Brota
  alternatives_spanish:
  - Sube
  - Levántate
  - Mana
  lexicon: HALOT
  rationale: El imperativo femenino singular se dirige al pozo. «Brota» capta bien la imagen de agua que surge y conserva el matiz vivaz del hebreo sin sonar forzado.
- source_word: בְאֵר
  english_pob_choice: O well
  chosen_spanish: oh pozo
  alternatives_spanish:
  - pozo
  - pozo, oh
  lexicon: HALOT
  rationale: Se mantiene el vocativo con «oh» para señalar la dirección directa al pozo. «Pozo» sola sería más neutra, pero perdería la fuerza exhortativa del poema.
- source_word: עֱנוּ לָהּ
  english_pob_choice: Answer it!
  chosen_spanish: ¡Respóndanle!
  alternatives_spanish:
  - ¡Contéstenle!
  - ¡Respondan a él!
  - ¡Cántenle respuesta!
  lexicon: HALOT
  rationale: El verbo ענה en contexto poético puede significar responder de forma responsorial. «Respóndanle» preserva el sentido de respuesta/eco que el POB inglés quiso mantener con «Answer it!», sin convertirlo en «cantar», que sería interpretativo en español.
theological_decisions:
- issue: Forma responsorial del poema
  english_pob_reading: The Hebrew likely reflects a responsive or antiphonal singing formula.
  chosen_spanish_reading: El hebreo probablemente refleja una fórmula de respuesta o canto antifonal.
  alternative_spanish_readings:
  - El hebreo podría reflejar una simple invitación a cantar.
  - El hebreo probablemente describe un diálogo poético con el pozo.
  rationale: La línea final es difícil y admite un matiz responsorial. Se conserva esa tensión en español con una nota que no cierra indebidamente la ambigüedad entre responder, contestar y cantar en respuesta.
  doctrine_reference: Poética bíblica; hebreo bíblico responsorial
translation_notes:
  revision_awareness: La POB inglesa revisó «Sing to it!» por «Answer it!» para reflejar con más precisión עֱנוּ־לָהּ. La versión española sigue esa revisión y evita traducir el verbo como «canten», manteniendo el valor de respuesta/eco del hebreo.
  spanish_consistency_notes:
  - Se emplea «Yahvé» en el proyecto, pero este versículo no contiene el nombre divino.
  - «Israel» se mantiene como nombre propio colectivo sin artículo.
  - «pozo» se conserva en sentido literal, sin expandirlo a una imagen metafórica no presente en el texto.
