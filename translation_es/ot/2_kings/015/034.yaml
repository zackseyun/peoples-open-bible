translation:
  language: es
  text: Hizo lo recto a los ojos de Yahvé[a], conforme a todo lo que había hecho su padre Uzías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Uzías». En otros lugares, este rey también es llamado «Azarías».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  lexicon: HALOT
  rationale: El hebreo abre con waw consecutiva y verbo narrativo simple; en español, el pretérito perfecto simple transmite bien la acción histórica sin forzar una coordinación innecesaria.
- source_word: הַיָּשָׁר
  english_pob_choice: what was right
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo justo
  - lo correcto
  - lo que era recto
  lexicon: HALOT
  rationale: La expresión hebrea funciona como objeto idiomático de 'hacer'. 'Lo recto' conserva la idea evaluativa y suena natural en español bíblico actual.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: a los ojos de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - a la vista de Yahvé
  - en los ojos de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la metáfora hebrea de evaluación divina. 'A los ojos de' es idiomático en español y conserva el valor figurado sin sustituirlo por una paráfrasis más abstracta.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el tetragrámaton: ''Yahvé''. Se evita ''el SEÑOR'' porque ocultaría el nombre divino presente en el texto hebreo.'
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - de acuerdo con todo lo que
  - tal como
  lexicon: HALOT
  rationale: La fórmula compara la conducta del rey con el modelo previo. 'Conforme a todo lo que' reproduce la amplitud de כֹּל y la relación de conformidad con un referente anterior.
- source_word: עֻזִיָּהוּ
  english_pob_choice: Uzziah
  chosen_spanish: Uzías
  alternatives_spanish:
  - Uzzías
  - Azarías
  lexicon: HALOT
  rationale: El hebreo de este versículo lee עֻזִיָּהוּ, que en español se vierte normalmente 'Uzías'. Se conserva la forma del nombre que corresponde al texto, sin armonizar con la variante 'Azarías'.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su progenitor
  - su antepasado
  lexicon: HALOT
  rationale: El sentido inmediato es genealógico y directo; 'su padre' es la forma más clara y fiel en español.
- source_word: עָשָׂה ... עָשָׂה
  english_pob_choice: had done
  chosen_spanish: había hecho
  alternatives_spanish:
  - hizo
  - había obrado
  lexicon: HALOT
  rationale: El segundo verbo remite a acciones previas de Uzías respecto del reinado del hijo. El pluscuamperfecto en español aclara la anterioridad temporal sin añadir contenido.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre divino. La política del proyecto exige transliterarlo como 'Yahvé', preservando el nombre del pacto en lugar de reemplazarlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Nombre real alterno de Uzías/Azarías
  english_pob_reading: Uzziah
  chosen_spanish_reading: Uzías
  alternative_spanish_readings:
  - Azarías
  rationale: La evidencia hebrea de este versículo lee עֻזִיָּהוּ. Se conserva la forma correspondiente al texto base y se documenta la variante conocida sin armonizarla en el cuerpo principal.
  doctrine_reference: Fuente hebrea WLC y nota auditada del POB en inglés
translation_notes:
  revision_awareness: 'No se introducen cambios textuales respecto del sentido auditado: se conservan la valoración moral (''lo recto''), la metáfora de evaluación divina (''a los ojos de Yahvé''), la conformidad con el patrón previo y la variante nominal del rey. La única adaptación principal es la naturalización de la sintaxis al español con pluscuamperfecto para el verbo final.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma del nombre divino, conforme al estándar del proyecto.
  - Se evita 'Cristo' o terminología ajena; el versículo no contiene material mesiánico.
  - '''Lo recto'' conserva la idiomática hebrea sin moralizar más allá del texto.'
  - El nombre del rey se vierte 'Uzías' en el cuerpo y se anota la variante 'Azarías' en nota.
  - La construcción 'a los ojos de' preserva el hebraísmo de evaluación divina sin perder naturalidad en español.
