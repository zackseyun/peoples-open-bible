translation:
  language: es
  text: Así Edom se rebeló contra el dominio de Judá hasta hoy[a]. Entonces también Libna se rebeló en aquel tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se sublevó» / «se apartó». El verbo hebreo expresa rebelión política contra una autoridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְשַׁע
  english_pob_choice: rebelled
  chosen_spanish: se rebeló
  alternatives_spanish:
  - se sublevó
  - se alzó en rebelión
  - se apartó
  lexicon: HALOT
  rationale: En este contexto político, פשע expresa rebelión contra una autoridad establecida. «Se rebeló» conserva ese valor de insurrección y es natural en español bíblico actual.
- source_word: מִתַּחַת יַד יְהוּדָה
  english_pob_choice: from under the hand of Judah
  chosen_spanish: de debajo de la mano de Judá
  alternatives_spanish:
  - de la sujeción de Judá
  - del control de Judá
  - de la mano de Judá
  lexicon: HALOT
  rationale: La imagen hebrea de «bajo la mano» indica sometimiento o dominio. «De debajo de la mano» mantiene la metáfora y deja visible el matiz de sujeción sin sustituirlo por una abstracción.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta este día
  - hasta el día de hoy
  lexicon: HALOT
  rationale: La fórmula temporal hebrea señala continuidad hasta el presente del narrador. «Hasta hoy» es una equivalencia idiomática clara y fiel en español.
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Enseguida
  lexicon: HALOT
  rationale: Marca la secuencia narrativa. «Entonces» reproduce esa transición sin agregar interpretación.
- source_word: תִּפְשַׁע
  english_pob_choice: rebelled
  chosen_spanish: se rebeló
  alternatives_spanish:
  - se sublevó
  - se alzó en rebelión
  - se apartó
  lexicon: HALOT
  rationale: La misma raíz reaparece con el mismo valor político. Mantener «se rebeló» preserva la coherencia léxica dentro del versículo.
- source_word: לִבְנָה
  english_pob_choice: Libnah
  chosen_spanish: Libna
  alternatives_spanish:
  - Libnah
  lexicon: N/A
  rationale: Nombre propio de lugar; en español bíblico puede adaptarse fonéticamente como «Libna» para una lectura más fluida, sin perder la identificación geográfica.
- source_word: בָּעֵת הַהִיא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en esa ocasión
  - entonces
  lexicon: HALOT
  rationale: Expresa la localización temporal de la rebelión de Libna dentro del mismo marco histórico. «En aquel tiempo» es natural, formal y suficientemente preciso.
translation_notes:
  revision_awareness: Se siguió el sentido histórico-político del hebreo y el audit trail inglés, con ajuste estilístico al español natural. No se introdujeron cambios doctrinales ni se suavizó la metáfora de «la mano».
  spanish_consistency_notes:
  - Se mantuvo la repetición de «se rebeló» para ambos usos de פשע, como en el texto fuente y el audit trail inglés.
  - Se preservó la imagen corporal «mano» en vez de reemplazarla por «poder» o «control», para no borrar la metáfora hebrea.
  - «Hasta hoy» reproduce la fórmula temporal de continuidad histórica sin sobreexplicarla.
