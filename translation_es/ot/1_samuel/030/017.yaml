review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: David hiere/abata a los amalecitas desde נֶשֶׁף hasta la tarde del día siguiente; casi nadie escapa, salvo cuatrocientos jóvenes que montan camellos y huyen. También conserva correctamente la ambigüedad de נֶשֶׁף mediante nota. Sin embargo, «los derrotó» debilita el valor violento de וַיַּכֵּם («los hirió/abatió/derribó») y «no escapó de ellos ni un hombre» suena menos natural y algo ambiguo en español que una formulación como «no escapó ni un solo hombre de entre ellos».'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay dos puntos de mejora: 1) «los derrotó» suena más a resultado militar que al acto de dar muerte/golpear duramente; 2) «montaban sobre los camellos» en imperfecto no encaja tan bien con la secuencia narrativa puntual como «montaron en los camellos». Además, «ni un hombre de entre ellos» mejora la claridad idiomática.'
  glossary_alignment: No hay términos teológicos especiales en este versículo. La decisión «crepúsculo» está alineada con la nota léxica del POB inglés. «Jóvenes» para נַעַר es aceptable en contexto. La distinción entre נִמְלַט («escapó») y וַיָּנֻסוּ («huyeron») se preserva correctamente.
  issues:
  - severity: medium
    issue: «los derrotó» debilita וַיַּכֵּם
    rationale: נכה en este contexto de matanza militar tiene fuerza de golpear/abatir/herir mortalmente. «Derrotó» puede sugerir solo vencer en batalla, no necesariamente el acto violento expresado por el hebreo y preservado por el inglés «struck them down».
  - severity: medium
    issue: «montaban sobre los camellos» no refleja bien la acción puntual
    rationale: 'El hebreo usa perfecto relativo dentro de la excepción: «que montaron en/sobre los camellos y huyeron». En español narrativo, el pretérito («montaron») encaja mejor que el imperfecto («montaban»), que sugiere acción en desarrollo o habitual.'
  - severity: low
    issue: «no escapó de ellos ni un hombre» es menos idiomático
    rationale: Aunque comprensible, «de ellos» puede sonar ligeramente ambiguo. «De entre ellos» o «ni un solo hombre escapó» expresa mejor el distributivo hebreo y fluye mejor en español.
  revised_spanish_text: David los abatió desde el crepúsculo[a] hasta la tarde del día siguiente, y no escapó ni un solo hombre de entre ellos, excepto cuatrocientos jóvenes que montaron en los camellos y huyeron.
  revised_footnotes:
  - marker: a
    text: «Crepúsculo» conserva la ambigüedad del hebreo נֶשֶׁף, que puede referirse al comienzo del día o al de la noche; por eso el texto principal no fija «alba» ni «anochecer».
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo principal a «los abatió» para reflejar mejor la fuerza de וַיַּכֵּם; se mejora la naturalidad y claridad de la cláusula de escape con «ni un solo hombre de entre ellos»; y se cambia «montaban sobre los camellos» a «montaron en los camellos» para acomodar mejor la narración puntual en español sin perder el sentido del original.
