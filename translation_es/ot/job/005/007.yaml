translation:
  language: es
  text: Pues el hombre nace para la aflicción, y los hijos de la flama[a] vuelan hacia lo alto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las chispas vuelan hacia lo alto». El hebreo dice literalmente «los hijos de la flama» (o posiblemente «hijos de Reshef»), una expresión idiomática que comúnmente se entiende como chispas.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque es que
  lexicon: HALOT
  rationale: Introduce una explicación o razón conectada con el dicho anterior; en español, «Porque» conserva bien ese nexo causal/explanatorio sin endurecer el tono.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - un ser humano
  lexicon: HALOT
  rationale: El sustantivo es singular genérico y proverbial. «El hombre» conserva la forma representativa del hebreo mejor que una abstracción como «la humanidad».
- source_word: לְעָמָל
  english_pob_choice: for trouble
  chosen_spanish: para la aflicción
  alternatives_spanish:
  - para el trabajo
  - para el sufrimiento
  - para la fatiga
  lexicon: HALOT
  rationale: עָמָל puede abarcar trabajo penoso, aflicción o miseria. En el contexto sapiencial de Job, «aflicción» comunica bien la carga dolorosa de la existencia humana sin reducir el sentido a simple labor.
- source_word: יוּלָּד
  english_pob_choice: is born
  chosen_spanish: nace
  alternatives_spanish:
  - es engendrado
  - es traído al mundo
  lexicon: HALOT
  rationale: El pasivo hebreo expresa una verdad general. «Nace» suena natural en español y mantiene el valor gnómico.
- source_word: וּבְנֵי רֶשֶׁף
  english_pob_choice: the sons of flame
  chosen_spanish: los hijos de la llama
  alternatives_spanish:
  - los hijos del fuego
  - los hijos de Reshef
  - las chispas
  lexicon: HALOT
  rationale: Se conserva la imagen más literal del hebreo («hijos de la llama») para no cerrar prematuramente la ambigüedad idiomática. La lectura interpretativa «chispas» queda como alternativa posible, pero no como texto principal.
- source_word: יַגְבִּיהוּ
  english_pob_choice: fly upward
  chosen_spanish: vuelan hacia arriba
  alternatives_spanish:
  - se elevan
  - ascienden
  - vuelan al cielo
  lexicon: HALOT
  rationale: El verbo intensivo/causativo con el complemento de vuelo produce la imagen de elevación hacia arriba. «Vuelan hacia arriba» reproduce el movimiento de manera clara y natural en español.
- source_word: עוּף
  english_pob_choice: fly upward
  chosen_spanish: vuelan hacia arriba
  alternatives_spanish:
  - volar
  - elevarse
  lexicon: HALOT
  rationale: Se integra con יַגְבִּיהוּ para expresar la imagen completa de ascenso en vuelo, sin fragmentar artificialmente la metáfora.
translation_notes:
  revision_awareness: 'Texto revisado a la luz del auditorial inglés POB: se mantuvo la imagen literal en «hijos de la llama» para preservar la ambigüedad hebrea, y se evitó traducir mecánicamente «For» por una forma más enfática que no está requerida por el discurso.'
  spanish_consistency_notes:
  - Se eligió «aflicción» para עָמָל por claridad contextual, pero se conservó en nota la alternativa semántica de trabajo penoso.
  - Se mantuvo el paralelismo poético con una estructura breve y proverbial.
  - No se introdujo «Mesías», «SEÑOR» ni otra terminología no pertinente al versículo.
