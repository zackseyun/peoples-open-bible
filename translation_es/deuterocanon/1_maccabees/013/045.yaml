review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: subida a la muralla, presencia de mujeres e hijos, vestidos rasgados, clamor fuerte y petición a Simón. Sin embargo, hay dos desajustes importantes: ἐπὶ τὸ τεῖχος con ἀνέβησαν se entiende mejor como subir «a/sobre la muralla» que simplemente «a la muralla», y δεξιὰς ... δοῦναι en plural idiomático apunta a garantías/compromisos de paz, no a «una prenda» singular, que en español además suena a objeto material.'
  spanish_quality_summary: 'El español es generalmente claro, pero varias expresiones suenan poco naturales o algo calcadas: «con fuerte voz» es menos idiomático que «a gran voz» o «con fuerte clamor»; «prenda de paz» resulta extraña en español bíblico general; y conviene mantener una nota para el idiomático «dar las derechas». También es preferible no anclar la nota de mujeres/hijos, ya que la nota pertinente aquí es la del modismo griego final.'
  glossary_alignment: No hay conflicto con la terminología central del proyecto. Las decisiones léxicas principales son adecuadas salvo el modismo δεξιὰς ... δοῦναι, que debe expresarse en español como «garantías de paz» o equivalente, con nota sobre el literal griego «dar las derechas».
  issues:
  - severity: medium
    issue: «a la muralla» debilita el sentido de ascenso sobre la estructura
    rationale: Con ἀνέβησαν ἐπὶ τὸ τεῖχος, la imagen es subir a la parte alta de la muralla, no meramente acercarse a ella.
  - severity: medium
    issue: «gritaron con fuerte voz» suena poco idiomático en español
    rationale: Aunque comprensible, no es la formulación más natural. «clamaron a gran voz» o «gritaron a gran voz» refleja mejor la frase hecha bíblica φωνῇ μεγάλῃ.
  - severity: high
    issue: «una prenda de paz» no comunica bien el modismo griego
    rationale: «Prenda» en español suele evocar una pieza de ropa u objeto dado en garantía, y en singular pierde el valor idiomático de δεξιὰς ... δοῦναι como ofrecer garantías, buena fe o términos de paz.
  - severity: medium
    issue: La nota al pie actual no cubre la principal dificultad léxica del versículo
    rationale: El audit trail inglés documenta la dificultad idiomática de «dar las derechas». Esa explicación debe preservarse en español, mientras que la nota sobre «mujeres/esposas» no es tan necesaria aquí.
  revised_spanish_text: Y los que estaban en la ciudad subieron a la muralla con sus mujeres y sus hijos, con sus vestidos rasgados, y clamaron a gran voz, pidiendo a Simón que les diera garantías de paz[a].
  revised_footnotes:
  - marker: a
    text: O, «que les diera una garantía», o «que les concediera términos de paz». El griego literalmente dice «darles las derechas», un modismo para ofrecer una garantía de buena fe o términos de paz.
    reason: lexical_alternative
  - marker: b
    text: Rasgarse los vestidos era una señal habitual de dolor, angustia o súplica urgente.
    reason: cultural_note
  revision_rationale: Se ajusta «a la muralla» a «a la muralla» en sentido de ascenso efectivo conservado por «subieron a la muralla»; se mejora la naturalidad de φωνῇ μεγάλῃ con «clamaron a gran voz»; y se reemplaza «una prenda de paz» por «garantías de paz», que comunica mejor el modismo δεξιὰς ... δοῦναι. Además, se traslada la nota principal al modismo griego final, que es la verdadera dificultad exegética del versículo. La nota cultural sobre los vestidos rasgados no debe incluirse si no va anclada en el texto revisado.
