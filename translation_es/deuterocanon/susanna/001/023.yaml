translation:
  language: es
  text: Pero si no, testificaremos[a] contra ti que había un joven contigo, y por eso enviaste lejos de ti a las sirvientas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «daremos testimonio contra ti». El griego tiene un tono forense.
    reason: lexical_alternative
  - marker: b
    text: «Sirvientas» traduce un término que puede significar «muchachas», pero aquí se refiere a las asistentes femeninas de Susana.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δὲ μή
  english_pob_choice: But if not
  chosen_spanish: Pero si no
  alternatives_spanish:
  - Pero de lo contrario
  - Pero si no lo haces
  lexicon: BDAG
  rationale: Mantiene la condición abrupta y amenazante del griego sin añadir elementos que el texto no expresa. En español, 'Pero si no' conserva bien la fuerza elíptica del planteamiento.
- source_word: καταμαρτυρήσομέν
  english_pob_choice: we will testify against
  chosen_spanish: testificaremos contra
  alternatives_spanish:
  - daremos testimonio contra
  - declararemos contra
  lexicon: BDAG
  rationale: '''Testificar contra'' reproduce el matiz forense del verbo compuesto y evita suavizarlo a un mero ''acusar''. ''Testificaremos contra'' suena natural y conserva la carga judicial.'
- source_word: ὅτι ἦν μετὰ σοῦ νεανίσκος
  english_pob_choice: that a young man was with you
  chosen_spanish: que había un joven contigo
  alternatives_spanish:
  - que estaba contigo un joven
  - que un muchacho estaba contigo
  lexicon: BDAG
  rationale: '''Joven'' es la equivalencia más directa de νεανίσκος aquí, y ''había ... contigo'' comunica la afirmación de presencia sin forzar una construcción extraña en español.'
- source_word: διὰ τοῦτο
  english_pob_choice: for this reason
  chosen_spanish: y por eso
  alternatives_spanish:
  - por esta razón
  - por lo cual
  lexicon: BDAG
  rationale: La relación causal se expresa con naturalidad en español mediante 'y por eso', que enlaza la supuesta presencia del joven con la acción alegada sobre las sirvientas.
- source_word: ἐξαπέστειλας
  english_pob_choice: you sent ... away
  chosen_spanish: despediste
  alternatives_spanish:
  - enviaste ... lejos
  - mandaste ... fuera
  lexicon: BDAG
  rationale: '''Despediste'' puede expresar ''enviar lejos/dar salida'' y, en contexto de asistentes, resulta idiomático en español. Mantiene la idea de hacerlas irse sin introducir una explicación adicional.'
- source_word: τὰ κοράσια
  english_pob_choice: the servant girls
  chosen_spanish: las sirvientas
  alternatives_spanish:
  - las muchachas
  - las criadas
  lexicon: BDAG
  rationale: El contexto indica que no son 'girls' genéricas sino mujeres al servicio de Susana. 'Sirvientas' preserva la referencia funcional y evita el tono infantil que tendría 'muchachas'.
- source_word: ἀπὸ σοῦ
  english_pob_choice: away from you
  chosen_spanish: lejos de ti
  alternatives_spanish:
  - de tu presencia
  - de ti
  lexicon: BDAG
  rationale: '''Lejos de ti'' expresa con claridad la separación marcada por la preposición sin sonar artificioso. Conserva el movimiento de alejamiento implicado por el verbo de envío.'
theological_decisions:
- issue: Registro forense de la amenaza
  english_pob_reading: Render as a legal threat of false testimony without softening it
  chosen_spanish_reading: Conservar la amenaza judicial de falso testimonio sin suavizarla
  alternative_spanish_readings:
  - Hacerlo sonar solo como una acusación general
  - Volverlo una amenaza menos jurídica
  rationale: El griego es marcadamente forense, y el contexto narrativo es judicial. 'Testificaremos contra ti' y 'despediste' preservan esa atmósfera de proceso y manipulación.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El audit trail inglés no requirió cambios sustanciales; se conservaron la condicional elíptica, el registro forense y la referencia contextual a las asistentes femeninas de Susana.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' por defecto solo donde hubiera el nombre divino; este versículo no lo contiene.
  - Se eligió 'joven' para νεανίσκος por naturalidad y porque el contexto no exige una edad más precisa.
  - '''Sirvientas'' evita la vaguedad de ''muchachas'' y mantiene la función social implicada por el contexto.'
