    issue: «los guardias de la puerta» reduce el plural del original.
    rationale: El griego τοὺς τῶν πυλῶν ἀκροφύλακας contiene «de las puertas» en plural; el singular español no es imposible como generalización, pero pierde precisión innecesariamente.
  - severity: medium
    issue: «siguieron adelante» debilita el matiz de διεξῄεσαν.
    rationale: El verbo imperfecto compuesto describe pasar/ir a través, no solo avanzar en general. Conviene conservar tanto la continuidad como el movimiento por el campamento.
