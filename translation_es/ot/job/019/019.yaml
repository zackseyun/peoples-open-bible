translation:
  language: es
  text: Todos mis amigos íntimos me aborrecen[a], y aquellos a quienes amé se han vuelto contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hombres de mi consejo/secreto». La frase se refiere al círculo confidencial de Job, es decir, sus compañeros de confianza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּעֲבוּנִי
  english_pob_choice: abhor me
  chosen_spanish: me aborrecen
  alternatives_spanish:
  - me detestan
  - me odian con repulsión
  lexicon: HALOT
  rationale: El verbo transmite repugnancia o aversión fuerte; «aborrecer» conserva esa intensidad en español bíblico y moderno sin suavizarla a simple disgusto.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: Todos
  alternatives_spanish:
  - Todos y cada uno
  - Cada uno de
  lexicon: HALOT
  rationale: La cuantificación es total; «Todos» es natural en español y mantiene la fuerza inclusiva del hebreo.
- source_word: מְתֵי סוֹדִי
  english_pob_choice: my intimate friends
  chosen_spanish: mis íntimos amigos
  alternatives_spanish:
  - los hombres de mi consejo
  - mis confidentes
  - mis cercanos
  lexicon: HALOT
  rationale: La expresión alude al círculo de confianza y consejo privado de Job. «Íntimos amigos» comunica la relación cercana y confidencial con naturalidad, sin perder el matiz de confidencia.
- source_word: וְזֶה
  english_pob_choice: and those
  chosen_spanish: y los que
  alternatives_spanish:
  - y estos
  - y aquellos
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, el contexto exige sentido colectivo con el verbo plural siguiente. «Y los que» evita una traducción artificial y refleja el valor distributivo/colectivo.
- source_word: אָהַבְתִּי
  english_pob_choice: I loved
  chosen_spanish: yo amaba
  alternatives_spanish:
  - amé
  - he amado
  lexicon: HALOT
  rationale: El qatal expresa amor previo y situado en el pasado del lamento; el imperfecto en español («amaba») comunica bien ese afecto anterior sin forzar una lectura perfectiva demasiado puntual.
- source_word: נֶהְפְּכוּ
  english_pob_choice: have turned
  chosen_spanish: se han vuelto
  alternatives_spanish:
  - han cambiado
  - se han vuelto en contra
  lexicon: HALOT
  rationale: El nifal de הפך expresa un giro o reversión. «Se han vuelto» conserva la idea de cambio de dirección o postura; el contexto hostil hace explícita la oposición con el complemento siguiente.
- source_word: בִי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - hacia mí
  lexicon: HALOT
  rationale: En este contexto, la preposición marca adversidad. «Contra mí» es la equivalencia española más natural y clara.
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo masorético de Job 19:19 y concuerda con el audit trail inglés: mantiene la oposición afectiva/relacional del versículo y la colectividad implícita en וְזֶה. No se registran revisiones posteriores que alteren el sentido.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «aborrecen» para reflejar la intensidad léxica del hebreo תעב, en línea con la decisión inglesa «abhor me».
  - La nota al pie aclara la alternativa semántica de מתי סודי sin cargar el texto principal con una glosa excesiva.
