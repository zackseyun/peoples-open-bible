translation:
  language: es
  text: Como un terebinto[b][d] extendí mis ramas[a], y mis ramas son ramas de gloria y gracia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «extendí mis ramas».
    reason: lexical_alternative
  - marker: b
    text: El terebinto es un árbol grande usado con frecuencia en la imaginería bíblica; algunos traducen el término de manera más general como «encina», pero el griego nombra específicamente el terebinto.
    reason: cultural_note
  - marker: c
    text: O «de gloria y favor».
    reason: lexical_alternative
  - marker: d
    text: O «Extendí mis ramas como un terebinto, y mis ramas son ramas de gloria y gracia».
    reason: previous_rendering
lexical_decisions:
- source_word: τερέβινθος
  english_pob_choice: terebinth
  chosen_spanish: terebinto
  alternatives_spanish:
  - árbol terebinto
  - encina
  lexicon: LSJ
  rationale: El griego nombra un árbol concreto; «terebinto» preserva esa especificidad botánica y el valor imagístico, igual que la decisión inglesa de no generalizar a «oak». «Encina» sería demasiado interpretativa y perdería la precisión del término.
- source_word: ἐξέτεινα
  english_pob_choice: spread out
  chosen_spanish: extendí
  alternatives_spanish:
  - estiré
  - extendí hacia afuera
  lexicon: LSJ
  rationale: El verbo expresa extensión de las ramas. «Extendí» es natural en español y conserva la idea física de expansión; «estiré» puede sonar menos idiomático en este contexto vegetal.
- source_word: κλάδους
  english_pob_choice: branches
  chosen_spanish: ramas
  alternatives_spanish:
  - ramos
  - brazos
  lexicon: LSJ
  rationale: «Ramas» es la equivalencia directa y más clara para κλάδοι/κλάδους en este pasaje repetido. «Ramos» sugiere un arreglo floral o un objeto cortado, y «brazos» sería demasiado figurado.
- source_word: δόξης
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honra
  - esplendor
  lexicon: LSJ
  rationale: «Gloria» mantiene el registro bíblico elevado de δόξα y conserva la correspondencia con la traducción inglesa auditada. «Honra» desplaza el sentido hacia estima social; «esplendor» reduce el alcance semántico.
- source_word: χάριτος
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - hermosura
  lexicon: LSJ
  rationale: «Gracia» refleja la amplitud de χάρις y mantiene la resonancia teológica y poética. «Favor» es posible, pero en español aquí suena más estrecho; «hermosura» reduciría el término a lo estético.
theological_decisions:
- issue: Repetición enfática de «ramas» en la cláusula final
  english_pob_reading: 'Keep the repeated noun: ''my branches are branches of glory and grace.'''
  chosen_spanish_reading: 'Conservar la repetición: «mis ramas son ramas de gloria y gracia».'
  alternative_spanish_readings:
  - mis ramas son gloriosas y llenas de gracia
  - mis ramas son de gloria y gracia
  rationale: El griego repite κλάδοι para dar fuerza poética. Mantener «ramas… ramas» evita suavizar la figura y respeta la tensión retórica del original, en línea con la lectura inglesa revisada.
  doctrine_reference: Principio de preservación de énfasis y paralelismo poético del texto fuente.
- issue: Elección entre «gracia» y «favor» para χάρις
  english_pob_reading: '''grace'' with note ''or favor'''
  chosen_spanish_reading: Usar «gracia» en el texto principal, sin anular la posible lectura de «favor».
  alternative_spanish_readings:
  - favor
  - benevolencia
  rationale: En este contexto sapiencial-poético, «gracia» mantiene mejor la densidad del término y su resonancia bíblica. «Favor» sigue siendo una alternativa viable, pero no debe desplazar la opción principal porque empobrecería el paralelo con «gloria».
  doctrine_reference: Criterio de fidelidad semántica con preservación de la amplitud de χάρις.
translation_notes:
  revision_awareness: La redacción sigue el ajuste de revisión que antepone la comparación («Como un terebinto») para reflejar mejor el orden griego ἐγὼ ὡς τερέβινθος ἐξέτεινα. También conserva la repetición de «ramas» y la pareja «gloria y gracia», sin aplanar el paralelismo poético.
  spanish_consistency_notes:
  - Se usa «terebinto» en lugar de una generalización como «encina» para conservar la especificidad botánica del griego.
  - «Extendí» funciona como equivalente natural de ἐξέτεινα en español moderno y mantiene la imagen de expansión.
  - La repetición de «ramas» se conserva por razones retóricas y no se reduce a una sola mención.
  - «Gracia» se mantiene como traducción principal de χάρις, con nota para la alternativa «favor».
