translation:
  language: es
  text: En telas bordadas[a] es llevada al rey; vírgenes[b] detrás de ella, sus compañeras, son llevadas a ti[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En obra bordada». El hebreo permite entender la expresión como trabajo bordado o como telas/vestidos bordados.'
    reason: lexical_alternative
  - marker: b
    text: '«Vírgenes» puede traducirse también «doncellas» o «jóvenes mujeres», pero el término hebreo es más específico: designa a mujeres no casadas y vírgenes.'
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo mantiene un sufijo femenino singular de segunda persona: «a ti». Algunos traductores lo suavizan hacia el rey, pero aquí se conserva el cambio poético de destinatario hacia la novia.'
    reason: alternative_reading
lexical_decisions:
- source_word: לִרְקָמוֹת
  english_pob_choice: In embroidered garments
  chosen_spanish: En telas bordadas
  alternatives_spanish:
  - En obra bordada
  - En vestidos bordados
  lexicon: HALOT
  rationale: El sustantivo רְקָמוֹת se refiere a trabajo o tejido bordado. En español, «telas bordadas» conserva la imagen material del atuendo procesional sin añadir explícitamente «vestidos» si no está en el hebreo; «obra bordada» es más literal pero menos natural en este contexto.
- source_word: תּוּבַל
  english_pob_choice: she is led
  chosen_spanish: es llevada
  alternatives_spanish:
  - es guiada
  - es conducida
  lexicon: HALOT
  rationale: 'El hofal de יבל expresa pasividad: «ser llevada / ser conducida». «Es llevada» mantiene la voz pasiva y la escena ceremonial; «guiada» suena menos neutral y «conducida» es válida pero algo más formal en español.'
- source_word: לַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - ante el rey
  lexicon: HALOT
  rationale: La preposición ל indica dirección hacia. «Al rey» reproduce la relación más directa y evita introducir una idea espacial no marcada por el hebreo.
- source_word: בְּתוּלוֹת
  english_pob_choice: virgins
  chosen_spanish: vírgenes
  alternatives_spanish:
  - doncellas
  - jóvenes
  lexicon: HALOT
  rationale: בְּתוּלוֹת denota con precisión a mujeres vírgenes no casadas. «Vírgenes» conserva la fuerza léxica documentada por el audit trail; «doncellas» suaviza, pero pierde exactitud.
- source_word: אַחֲרֶיהָ
  english_pob_choice: behind her
  chosen_spanish: detrás de ella
  alternatives_spanish:
  - tras ella
  - siguiéndola
  lexicon: HALOT
  rationale: En una procesión, la relación espacial/secuencial se expresa naturalmente como «detrás de ella». «Tras ella» también sería posible, pero «detrás de ella» es más claro para lectura pública.
- source_word: רֵעוֹתֶיהָ
  english_pob_choice: her companions
  chosen_spanish: sus compañeras
  alternatives_spanish:
  - sus amigas
  - sus acompañantes
  lexicon: HALOT
  rationale: רֵעוֹת denota compañeras o amigas. En el marco nupcial, «sus compañeras» preserva el sentido relacional sin especificar de más su función; «acompañantes» suena más administrativo.
- source_word: מוּבָאוֹת
  english_pob_choice: are brought
  chosen_spanish: son llevadas
  alternatives_spanish:
  - son traídas
  - son conducidas
  lexicon: HALOT
  rationale: El participio hofal plural femenino de בוא indica que son traídas/llevadas. «Son llevadas» evita repetir exactamente el verbo de la primera mitad y conserva el sentido pasivo de movimiento ceremonial.
- source_word: לָךְ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - para ti
  - a usted
  lexicon: HALOT
  rationale: El sufijo femenino singular de segunda persona preserva un cambio de dirección discursiva hacia la novia. «A ti» mantiene la fuerza del dativo y el giro retórico del hebreo sin neutralizar el género del destinatario.
theological_decisions:
- issue: Cambio de destinatario en לָךְ
  english_pob_reading: Retain the second-person feminine as 'to you,' preserving the poetic shift of address to the bride.
  chosen_spanish_reading: Mantener la segunda persona femenina como «a ti», preservando el giro poético de la dirección a la novia.
  alternative_spanish_readings:
  - 'Interpretarlo como referencia al rey: «al rey» / «a él»'
  - 'Suavizarlo: «son llevadas con ella»'
  rationale: El texto masorético presenta un sufijo de 2ª persona femenina singular. La traducción debe conservar esa tensión poética en vez de resolverla por anticipado; así se respeta la prioridad del texto fuente y la lectura auditable.
  doctrine_reference: Poética bíblica y primacía del texto fuente; traducción sin nivelar tensiones textuales
- issue: Identificación de las vírgenes y sus compañeras en contexto nupcial
  english_pob_reading: '''Virgins'' may also be rendered ''maidens'' or ''young women,'' but the Hebrew term more specifically denotes unmarried virgins.'
  chosen_spanish_reading: Usar «vírgenes» en sentido literal, reconociendo el contexto de séquito nupcial.
  alternative_spanish_readings:
  - «doncellas»
  - «jóvenes mujeres»
  rationale: El hebreo es más específico que un mero término genérico para mujeres jóvenes. «Vírgenes» conserva esa precisión lexical; el contexto ceremonial evita una lectura impropia.
  doctrine_reference: Precisión léxica y honestidad textual
translation_notes:
  revision_awareness: Se revisó el paquete fuente hebreo, la decisión inglesa de leer לִרְקָמוֹת como descripción de vestiduras bordadas, y la nota sobre el cambio de destinatario en לָךְ. No se aplicaron cambios recientes al pasaje; la traducción española preserva esas tensiones sin nivelarlas.
  spanish_consistency_notes:
  - Se usa «rey» y no «Rey» porque aquí funciona como sustantivo común dentro del verso.
  - Se mantiene «vírgenes» por la precisión léxica documentada; no se sustituye por «doncellas» salvo en la nota.
  - Se conserva la voz pasiva con «es/son llevada(s)» para reflejar el hofal hebreo.
  - Se evita introducir «vestidos» en el texto principal porque el hebreo habla de bordados/telas bordadas, y la claridad se logra sin sobreespecificar.
