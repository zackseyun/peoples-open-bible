translation:
  language: es
  text: 'Entonces Yahvé dijo a Jacob[a]: «Regresa a la tierra de tus padres y a tu parentela, y yo estaré contigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu parentela»; el hebreo puede referirse al grupo de parientes o al lugar de origen, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר / then said
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y dijo
  - Y luego dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva pide una marca de secuencia. «Entonces» conserva el avance del relato de manera natural en español y mantiene el valor consecutivo sin sobrerretórica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino con la forma usual del proyecto en español, en vez de sustituirlo por un título. «Yahvé» transmite el Tetragrama como nombre personal y es legible en español eclesial.
- source_word: שׁוּב
  english_pob_choice: Return
  chosen_spanish: Regresa
  alternatives_spanish:
  - Vuelve
  - Retorna
  lexicon: HALOT
  rationale: El imperativo requiere una orden directa y natural. «Regresa» conserva el sentido de volver a un lugar de origen sin sonar arcaico ni excesivamente formal.
- source_word: אֶל אֶרֶץ אֲבוֹתֶיךָ
  english_pob_choice: to the land of your fathers
  chosen_spanish: a la tierra de tus padres
  alternatives_spanish:
  - a la tierra de tus antepasados
  - a la tierra de tus ancestros
  lexicon: HALOT
  rationale: «Padres» refleja el paralelismo y la forma concreta del hebreo. «Antepasados» suaviza el matiz genealógico masculino del original, pero no lo reproduce con la misma cercanía formal.
- source_word: וּלְמוֹלַדְתֶּךָ
  english_pob_choice: your kindred
  chosen_spanish: a tu parentela
  alternatives_spanish:
  - a tus parientes
  - a tu familia
  - a tu lugar de origen
  lexicon: HALOT
  rationale: La palabra hebrea puede referirse al grupo de parentesco y, según contexto, también al lugar de origen. Aquí, por estar junto a «la tierra de tus padres», el sentido relacional es el más probable; «parentela» mantiene esa amplitud sin reducirlo solo a «familia nuclear».
- source_word: וְאֶהְיֶה עִמָּךְ
  english_pob_choice: and I will be with you
  chosen_spanish: y yo estaré contigo
  alternatives_spanish:
  - y estaré contigo
  - y yo seré contigo
  lexicon: HALOT
  rationale: La promesa divina de presencia futura se expresa de manera directa con «estaré contigo». Se mantiene el sujeto explícito «yo» para reforzar la promesa personal y el paralelismo con el hebreo.
theological_decisions:
- issue: Nombre divino YHWH en discurso directo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La línea editorial del proyecto prefiere transliterar el nombre de pacto en lugar de ocultarlo tras un título. «Yahvé» conserva el valor teológico del nombre personal de Dios y es consistente con la política del texto base.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El pasaje revisado en el contexto inglés no requirió cambios: la lectura final mantiene el nombre divino como Yahweh, la secuencia narrativa y la alternativa léxica para מוֹלַדְתֶּךָ. La versión española sigue esa misma línea auditada sin introducir matices no respaldados por el original.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al estándar del proyecto en español.
  - Se prefirió «parentela» para מוֹלַדְתֶּךָ porque la frase paralela con «la tierra de tus padres» apunta a un ámbito de parentesco.
  - La puntuación reproduce un discurso directo claro y publicable en español moderno.
  - Se conservó el sujeto explícito «yo» en la promesa final para reflejar la fuerza personal del hebreo.
