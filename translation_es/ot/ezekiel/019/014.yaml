base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/019/014.yaml
  text: And fire went out from a branch of its limbs[a]; it consumed its fruit, and there was not in it a strong branch, a scepter to rule. This is a lamentation[b], and it has become a lamentation.
  footnotes:
  - marker: a
    text: Or 'from a rod among its branches'; Hebrew מַטֶּה can mean 'branch,' 'rod,' or 'staff.' The main text follows the vine imagery, while the verse's later 'scepter' preserves the royal sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'there was no strong rod in it, no scepter for ruling.' The Hebrew intentionally blends vine imagery with royal imagery.
    reason: alternative_reading
