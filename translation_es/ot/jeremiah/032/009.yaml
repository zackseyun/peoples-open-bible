  to: 'Así le compré el campo a Hanamel, hijo de mi tío, que estaba en Anatot[b], y le pesé la plata: diecisiete siclos de plata[a].'
  rationale: Se corrigió la sintaxis para expresar claramente que Hanamel es el vendedor («le compré el campo a Hanamel») y no solo el poseedor del campo. También se restauró la nota léxica principal sobre el número/moneda al lugar correspondiente y se conservó la nota alternativa sobre el parentesco/localización según la auditoría inglesa.
