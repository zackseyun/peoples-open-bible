translation:
  language: es
  text: 'Cuando alguien me avisó, diciendo: «Mira, Saúl ha muerto», y él pensaba que traía buenas noticias, yo lo agarré y lo maté en Ziclag; esa fue la recompensa[a] que le di por su noticia.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La cláusula final en hebreo es elíptica y probablemente irónica: David quiere decir que la única “recompensa” que recibió el mensajero por anunciar la muerte de Saúl fue la muerte misma.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Porque
  alternatives_spanish:
  - Cuando
  - Pues
  lexicon: HALOT
  rationale: Aquí כִּי introduce la explicación de por qué David actuó así; en español, «Porque» conserva bien el valor causal/explicativo del hebreo en un discurso directo y fluido.
- source_word: הַמַּגִּיד לִי לֵאמֹר
  english_pob_choice: someone told me, saying
  chosen_spanish: el que me lo informó, diciendo
  alternatives_spanish:
  - el que me dijo, diciendo
  - quien me informó, diciendo
  - el informante que me dijo
  lexicon: HALOT
  rationale: 'El participio con artículo es sustantivo: «el que me informó». «Lo» anticipa el contenido citado («Saúl ha muerto»). Se mantiene «diciendo» para reflejar la construcción directa del hebreo.'
- source_word: הִנֵּה מֵת שָׁאוּל
  english_pob_choice: ‘Look, Saul is dead,’
  chosen_spanish: «Mira, Saúl ha muerto»
  alternatives_spanish:
  - «He aquí, Saúl ha muerto»
  - «Saúl está muerto»
  - «Mira, Saúl murió»
  lexicon: HALOT
  rationale: הִנֵּה funciona como llamada de atención; «Mira» es natural en español moderno. «Ha muerto» preserva el valor resultativo del perfecto hebreo sin sonar tan abrupto como «está muerto».
- source_word: וְהוּא הָיָה כִמְבַשֵּׂר בְּעֵינָיו
  english_pob_choice: and he thought he was bringing good news in his own eyes
  chosen_spanish: en sus propios ojos era como uno que trae buenas nuevas[b]
  alternatives_spanish:
  - y él era como uno que trae buenas nuevas, según sus propios ojos
  - y pensaba que era un portador de buenas nuevas
  - y en su propia opinión era como uno que trae buenas nuevas
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática «en sus propios ojos» para no borrar la tensión irónica del hebreo. «Como uno que trae buenas nuevas» sigue de cerca כִמְבַשֵּׂר sin forzar el sentido a una paráfrasis excesiva.
- source_word: וָאֹחֲזָה בו
  english_pob_choice: I seized him
  chosen_spanish: yo lo agarré
  alternatives_spanish:
  - yo lo agarré fuertemente
  - yo lo sujeté
  - yo lo aprehendí
  lexicon: HALOT
  rationale: אָחַז es «agarrar/sujetar/seizar». «Agarré» comunica la acción de forma directa y violenta en español contemporáneo, sin introducir matices judiciales o formales.
- source_word: וָאֶהְרְגֵהוּ
  english_pob_choice: and killed him
  chosen_spanish: y lo maté
  alternatives_spanish:
  - y lo di muerte
  - y lo hice morir
  - y lo ejecuté
  lexicon: HALOT
  rationale: El verbo significa simplemente «matar». «Lo maté» es la equivalencia directa y evita añadir un matiz jurídico que el hebreo no expresa aquí.
- source_word: בְּצִקְלָג
  english_pob_choice: in Ziklag
  chosen_spanish: en Ziclag
  alternatives_spanish:
  - en Ziklag
  lexicon: HALOT
  rationale: Se usa la forma castellana establecida «Ziclag» para el topónimo, manteniendo la referencia geográfica sin anglicismo.
- source_word: אֲשֶׁר לְתִתִּי לוֹ בְּשֹׂרָה
  english_pob_choice: that was the reward I gave him for his news
  chosen_spanish: esa fue la recompensa que le di por su noticia
  alternatives_spanish:
  - eso fue lo que le di como pago por la noticia
  - esa fue la paga que le di por su buena nueva
  - esa fue la recompensa que le di por sus nuevas
  lexicon: HALOT
  rationale: El hebreo es elíptico e irónico. «Recompensa» recoge el valor esperado de pago; «por su noticia» mantiene la relación con בְּשֹׂרָה sin forzar «buena nueva», que en español podría sonar demasiado técnica o positivamente teológica en este contexto.
theological_decisions:
- issue: Si la referencia a «buenas nuevas» debe sonar positiva o irónica
  english_pob_reading: The messenger thought he was bringing good news, but David means the only 'reward' was execution.
  chosen_spanish_reading: '«Como uno que trae buenas nuevas» conserva la autoevaluación del mensajero, pero el cierre «esa fue la recompensa que le di por su noticia» deja clara la ironía: su “recompensa” fue la muerte.'
  alternative_spanish_readings:
  - «como portador de buenas nuevas»
  - «pensó que traía buenas noticias»
  rationale: La tensión del pasaje está en que el mensajero considera la noticia ventajosa, pero David la invierte irónicamente. La versión española mantiene esa ironía sin suavizarla ni convertirla en comentario explicativo.
  doctrine_reference: Narrativa histórica con ironía judicial; sin implicación doctrinal directa, pero relevante para fidelidad literaria.
translation_notes:
  revision_awareness: Se siguió el corte del hebreo y el audit trail inglés sin depender mecánicamente de la traducción inglesa. Se conservaron la ironía final y la imagen idiomática «en sus propios ojos», y se evitó introducir una lectura jurídica en el verbo de matar.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se prefirió «buenas nuevas/noticia» según el contexto irónico del versículo, no «evangelio».
  - Se mantuvo el topónimo como «Ziclag» por uso español establecido.
  - Se evitó «SEÑOR» y también «Cristo», que no corresponden al pasaje.
