revisions:
- from: No hables al oído de un necio[a], porque menospreciará la sabiduría[b] de tus palabras.
  to: No hables para que lo oiga un necio[a], porque menospreciará la sabiduría[b] de tus palabras.
  rationale: Se ajusta el primer segmento para reflejar mejor el modismo hebreo בְּאָזְנֵי y la decisión inglesa «in the hearing of» sin introducir la connotación española de susurro de «al oído de». Se conservan «necio» y «sabiduría» por su fidelidad al registro sapiencial y al audit trail.
  reviewer_model: gpt-5.4
