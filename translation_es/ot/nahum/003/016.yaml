review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en la primera mitad: הִרְבֵּית רֹכְלַיִךְ מִכּוֹכְבֵי הַשָּׁמַיִם está bien representado como aumento numérico de los comerciantes de Nínive más que las estrellas. Sin embargo, la segunda mitad no preserva adecuadamente la decisión auditada del POB ni el sentido contextual de פָּשַׁט. El hebreo יֶלֶק puede referirse a un tipo/etapa de langosta, pero en español «saltón» resulta menos claro que «langosta», y «se despliega» debilita el sentido devastador que el POB justificó como preferible en contexto. Además, וַיָּעֹף pide mejor la idea de alejarse/desaparecer volando.'
  spanish_quality_summary: El español es generalmente legible, pero «el saltón se despliega y vuela» suena poco natural y semánticamente opaco en contexto profético. «Más que las estrellas de los cielos» es aceptable y digno. «Mercaderes» funciona bien. La frase final necesita una formulación más idiomática y clara para lectores hispanohablantes amplios.
  glossary_alignment: 'No hay términos teológicos mayores en este versículo. La revisión propuesta mantiene fidelidad léxica y claridad: «mercaderes» para רֹכְלַיִךְ, «langosta» para יֶלֶק con nota que preserve la especificidad posible, y «deja todo pelado» para פָּשַׁט conforme a la racionalidad documentada del POB («strips bare»).'
  issues:
  - severity: high
    issue: «se despliega» para פָּשַׁט no sigue la decisión contextual principal del POB
    rationale: Aunque פָּשַׁט puede tener sentidos como extenderse, el expediente inglés documenta que aquí probablemente describe a la langosta dejando la tierra desnuda antes de irse. «Se despliega» pierde la imagen de devastación y cambia el efecto semántico principal.
  - severity: medium
    issue: «el saltón» para יֶלֶק es menos claro que «la langosta» en español general
    rationale: El POB eligió un término más general en texto principal y reservó la posible especificidad para nota. En español, «saltón» no es la opción más transparente ni ampliamente eclesial/neutral; «langosta» comunica mejor la imagen base.
  - severity: medium
    issue: «y vuela» no expresa suficientemente el matiz de retirada en וַיָּעֹף
    rationale: El verbo hebreo en esta secuencia describe que, tras devastar, la langosta se va. «Y vuela» puede sonar meramente descriptivo; «y se va volando» o «y vuela lejos» comunica mejor la desaparición súbita.
  - severity: low
    issue: Falta una nota para la alternativa léxica de פָּשַׁט preservada en el POB inglés
    rationale: El texto inglés conservó en nota la posibilidad de «spreads out»/«strips off». La revisión española debe reflejar esa alternativa o la tensión semántica documentada.
  revised_spanish_text: Has multiplicado[a] tus mercaderes más que las estrellas de los cielos; la langosta[b] deja todo pelado[c] y se va volando.
