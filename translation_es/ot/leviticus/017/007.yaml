review_pass:
  verdict: revise
  source_alignment_summary: El borrador español capta bien la estructura legal del hebreo, mantiene el referente personal de לַשְּׂעִירִם y conserva la metáfora sexual de זֹנִים. Sin embargo, requiere ajustes menores para reflejar mejor עוֹד como 'ya no' y para mejorar la naturalidad y precisión de varias expresiones sin perder el sentido fuente.
  spanish_quality_summary: El texto es mayormente claro, pero 'demonios-cabra' suena algo forzado en español, 'tras quienes' es comprensible pero poco idiomático, y 'por todas sus generaciones' resulta menos natural que la fórmula bíblica corriente 'por sus generaciones'. También conviene evitar la nota c tal como está, porque repite la forma principal como variante.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La decisión sobre שְּׂעִירִם como seres demoníacos se preserva adecuadamente; en español suena mejor 'demonios con forma de cabra' que 'demonios-cabra'. 'Ordenanza perpetua' es aceptable para חֻקַּת עוֹלָם, aunque 'estatuto permanente' también sería válido. Se mantiene correctamente la metáfora cultual de 'prostituirse'.
  issues:
  - severity: medium
    issue: עֹוד se vierte solo como 'más'
    rationale: En contexto legal prohibitivo, 'ya no' comunica más claramente el valor de 'no longer' que el simple 'no... más', aunque este no sea incorrecto.
  - severity: medium
    issue: '''demonios-cabra'' suena poco natural en español'
    rationale: Aunque refleja la decisión inglesa 'goat-demons', en español neutral resulta más legible 'demonios con forma de cabra' o 'demonios cabrunos'. La primera opción es más clara y ampliamente comprensible.
  - severity: low
    issue: '''tras quienes se prostituyen'' es algo rígido'
    rationale: La idea fuente de seguimiento idolátrico se conserva mejor en español natural con 'tras los cuales' si se prioriza la construcción estable, o mejor aún 'yendo tras ellos, se prostituyen', pero esto último reestructura más. 'tras los cuales' mantiene el vínculo con el antecedente y fluye mejor.
  - severity: low
    issue: La nota c repite el texto principal como alternativa
    rationale: Si el texto principal queda en 'ordenanza perpetua', la nota no debe ofrecer de nuevo 'ordenanza perpetua' como variante. Deben mantenerse alternativas reales, como 'estatuto permanente' o 'ordenanza eterna'.
