translation:
  language: es
  text: Y pusieron panes[a] sobre la mesa, y extendieron las cortinas[b]; y terminaron todas las obras que habían hecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hogazas» para ἄρτους. El griego usa el plural, no un singular colectivo.
    reason: lexical_alternative
  - marker: b
    text: O «velos» para «cortinas»; término frecuente para los paños del santuario.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέθηκαν
  english_pob_choice: placed
  chosen_spanish: pusieron
  alternatives_spanish:
  - colocaron
  - pusieron sobre
  lexicon: LSJ
  rationale: El aoristo de ἐπιτίθημι expresa poner o colocar sobre algo. En español, «pusieron» suena natural y mantiene la acción ritual sin endurecer el estilo.
- source_word: τὴν τράπεζαν
  english_pob_choice: the table
  chosen_spanish: la mesa
  alternatives_spanish:
  - la tabla
  - la mesa de la presentación
  lexicon: LSJ
  rationale: τράπεζα significa literalmente «mesa». En este contexto cultual se refiere al mueble del santuario, pero el griego no añade un modificador técnico; «la mesa» conserva la sobriedad del original.
- source_word: ἄρτους
  english_pob_choice: loaves
  chosen_spanish: panes
  alternatives_spanish:
  - hogazas
  - pan
  lexicon: LSJ
  rationale: El plural griego pide un plural en español. «Panes» comunica bien la referencia a piezas de pan/ofrenda y evita forzar un singular colectivo que borraría el plural.
- source_word: ἐξεπέτασαν
  english_pob_choice: spread out
  chosen_spanish: extendieron
  alternatives_spanish:
  - desplegaron
  - tendieron
  lexicon: LSJ
  rationale: El verbo expresa extender o desplegar. «Extendieron» es la equivalencia más natural en español y mantiene la imagen de poner en posición las cortinas o paños del santuario.
- source_word: τὰ καταπετάσματα
  english_pob_choice: the curtains
  chosen_spanish: las cortinas
  alternatives_spanish:
  - los velos
  - los lienzos colgantes
  lexicon: LSJ
  rationale: καταπέτασμα puede significar cortina o velo, especialmente en contexto de santuario. «Cortinas» es claro y no introduce terminología posterior; se conserva la alternativa «velos» por la carga cultual del término.
- source_word: ἐτέλεσαν
  english_pob_choice: completed
  chosen_spanish: terminaron
  alternatives_spanish:
  - completaron
  - acabaron
  lexicon: LSJ
  rationale: El verbo significa terminar o llevar a cumplimiento. «Terminaron» es natural en español y conserva la idea de concluir la obra de restauración.
- source_word: πάντα τὰ ἔργα
  english_pob_choice: all the works
  chosen_spanish: todas las obras
  alternatives_spanish:
  - todos los trabajos
  - todas las tareas
  lexicon: LSJ
  rationale: El plural griego se refleja con «obras». Aunque puede sonar algo más solemne, reproduce mejor el plural del original que un singular colectivo.
- source_word: ἃ ἐποίησαν
  english_pob_choice: that they had done
  chosen_spanish: que habían hecho
  alternatives_spanish:
  - que hicieron
  - que habían realizado
  lexicon: LSJ
  rationale: ἐποίησαν dice literalmente «hicieron». «Habían hecho» sigue de cerca el griego y mantiene la relación con las obras concluidas sin añadir interpretación temporal excesiva.
theological_decisions:
- issue: Terminología de los objetos del santuario
  english_pob_reading: Use ordinary English terms ('table,' 'bread,' 'curtains') in the main text without importing later traditional labels.
  chosen_spanish_reading: Usar términos ordinarios («mesa», «panes», «cortinas») sin introducir designaciones técnicas posteriores.
  alternative_spanish_readings:
  - «mesa de la presentación»
  - «velos» para καταπετάσματα
  rationale: El griego de este versículo no desarrolla los nombres técnicos del mobiliario. Por eso la traducción conserva la sencillez del texto y evita especificar más de lo que el original dice.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La base inglesa pasó de «bread» a «loaves» para ajustarse con más precisión a ἄρτους, y de «undertaken» a «done» para reflejar más directamente ἐποίησαν. En español se tomó en cuenta esa revisión y se optó por un plural explícito («panes») y por la forma directa «que habían hecho».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo» y otra terminología no presente en el texto.
  - «Obras» conserva el plural de ἔργα; no se redujo a un singular genérico.
  - La puntuación reproduce el encadenamiento coordinado del griego con dos puntos y coma equivalentes en español.
