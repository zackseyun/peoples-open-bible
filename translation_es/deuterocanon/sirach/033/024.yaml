translation:
  language: es
  text: El día en que lleguen a su fin los días de tu vida[a], y en el momento de la muerte, reparte tu herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «la terminación de los días de tu vida».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἡμέρᾳ
  english_pob_choice: On the day
  chosen_spanish: En el día
  alternatives_spanish:
  - El día
  - En el día de
  lexicon: LSJ
  rationale: La preposición ἐν con dativo marca tiempo puntual; en español, «en el día» reproduce bien esa referencia temporal sin sonar forzado.
- source_word: συντελείας
  english_pob_choice: comes to an end
  chosen_spanish: se cumplan
  alternatives_spanish:
  - lleguen a su fin
  - terminen
  - se consumen
  lexicon: LSJ
  rationale: El sustantivo indica culminación o conclusión. En español, una pasiva/reflexiva verbal comunica mejor la idea de que los días de la vida llegan a su término.
- source_word: ἡμερῶν ζωῆς σου
  english_pob_choice: your life's days
  chosen_spanish: los días de tu vida
  alternatives_spanish:
  - tu vida
  - los días de tu existencia
  lexicon: LSJ
  rationale: Se conserva de forma explícita el plural griego «días» para no perder la tensión léxica que el texto revisado quiso retener.
- source_word: καιρῷ
  english_pob_choice: time
  chosen_spanish: momento
  alternatives_spanish:
  - tiempo
  - ocasion
  - época
  lexicon: LSJ
  rationale: καιρός puede denotar un momento señalado u oportuno; «momento» suena natural en español y mantiene la idea de oportunidad puntual.
- source_word: τελευτῆς
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - el fin
  - el fallecimiento
  lexicon: LSJ
  rationale: En este contexto τελευτή no es solo un final abstracto, sino la muerte concreta. «La muerte» es claro y fiel al paralelismo con el cierre de la vida.
- source_word: διάδος
  english_pob_choice: distribute
  chosen_spanish: reparte
  alternatives_spanish:
  - distribuye
  - da
  - asigna
  lexicon: LSJ
  rationale: El imperativo de διαδίδωμι sugiere dar o repartir por partes. «Reparte» conserva la acción de asignar la herencia con naturalidad en español.
- source_word: κληρονομίαν
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - patrimonio
  - bienes heredados
  - legado
  lexicon: LSJ
  rationale: El término designa la porción heredada; «herencia» es la equivalencia más directa y transparente para el lector español.
translation_notes:
  revision_awareness: La redacción española sigue de cerca la revisión inglesa más reciente al conservar la referencia explícita a «los días de tu vida» y no reducirla a un simple «tu vida», para reflejar mejor el plural griego ἡμερῶν.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto cuando aparezca el nombre divino; aquí no aplica.
  - Se evita «Cristo» y no hay terminología cristológica en este versículo.
  - «Herencia» se conserva como término jurídico-familiar estándar, coherente con el contexto de reparto patrimonial.
