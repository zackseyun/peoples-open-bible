translation:
  language: es
  text: Porque ha devastado muchas casas[a] de muchas personas, en deshonor[b], y las ha dispersado por la lujuria[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «casas»; el sentido puede incluir hogares o familias enteras.
    reason: lexical_alternative
  - marker: b
    text: O «en vergüenza» o «en deshonra».
    reason: lexical_alternative
  - marker: c
    text: O «por el deseo» o «por la pasión».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠρήμωσεν
  english_pob_choice: has laid waste
  chosen_spanish: ha devastado
  alternatives_spanish:
  - ha arrasado
  - ha dejado desoladas
  lexicon: BDAG
  rationale: El verbo expresa ruina o devastación fuerte, no solo daño leve. «Ha devastado» conserva la intensidad del griego y suena natural en español contemporáneo.
- source_word: οἴκους
  english_pob_choice: houses
  chosen_spanish: casas
  alternatives_spanish:
  - hogares
  - casas-hogar
  lexicon: BDAG
  rationale: La correspondencia más directa con οἴκους es «casas». En español puede sugerir tanto edificios como la unidad doméstica, lo que permite mantener la amplitud del texto sin forzar una glosa interpretativa.
- source_word: ἀνθρώπων
  english_pob_choice: people's
  chosen_spanish: de gente
  alternatives_spanish:
  - de personas
  - de seres humanos
  lexicon: BDAG
  rationale: El genitivo es genérico y no exige un referente masculino. «De gente» comunica de manera natural la posesión/relación humana sin introducir una lectura más estrecha.
- source_word: ἐν ἀτιμίᾳ
  english_pob_choice: in disgrace
  chosen_spanish: en deshonra
  alternatives_spanish:
  - en vergüenza
  - en deshonor
  lexicon: BDAG
  rationale: La frase combina vergüenza social y pérdida de honor. «En deshonra» mantiene ese campo semántico de dishonor con un registro digno y claro.
- source_word: ἐσκόρπισεν
  english_pob_choice: scattered
  chosen_spanish: las ha dispersado
  alternatives_spanish:
  - las ha esparcido
  - las ha diseminado
  lexicon: BDAG
  rationale: El verbo básico es dispersar o esparcir. «Las ha dispersado» conserva la imagen de separación causada por la acción verbal.
- source_word: ἐπιθυμίᾳ
  english_pob_choice: lust
  chosen_spanish: por la pasión
  alternatives_spanish:
  - por el deseo
  - por la lujuria
  lexicon: BDAG
  rationale: Aunque el inglés POB optó por «lust», el griego puede tener un sentido moralmente negativo de deseo vehemente. «Pasión» mantiene la amplitud del término y permite reflejar la ambigüedad léxica que el propio audit trail preserva mediante la nota alternativa.
theological_decisions:
- issue: Sentido moral de ἐπιθυμίᾳ
  english_pob_reading: lust, with footnoted alternatives 'desire' or 'passion'
  chosen_spanish_reading: pasión, con posible matiz de deseo desordenado
  alternative_spanish_readings:
  - lujuria
  - deseo
  rationale: El contexto de deshonra favorece un sentido negativo, pero el griego admite una gama más amplia. «Pasión» conserva esa tensión semántica sin cerrar por completo la interpretación; la nota mantiene la alternativa más fuerte y la más neutral.
  doctrine_reference: lexical_semantics
- issue: οἴκους como unidades domésticas o edificios
  english_pob_reading: houses; the sense may include whole households or families
  chosen_spanish_reading: casas, con posible inclusión de hogares/familias
  alternative_spanish_readings:
  - hogares
  - familias
  rationale: «Casas» sigue de cerca el sustantivo griego y deja abierta la extensión social del término. La nota recoge que el sentido puede abarcar la casa como núcleo familiar, sin reemplazar el término base por una interpretación más amplia.
  doctrine_reference: lexical_semantics
translation_notes:
  revision_awareness: 'Se siguió de cerca el último estado del inglés POB, pero se ajustó la correspondencia para mantener en español la tensión léxica documentada: οἴκους se rindió como «casas» con nota sobre hogares/familias, y ἐπιθυμίᾳ se tradujo de forma menos cerrada que «lujuria» para preservar la alternativa explícita del audit trail.'
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y moderno, evitando calcos excesivamente literales.
  - «Deshonra» y «pasión» conservan el campo semántico moral sin introducir terminología eclesiástica ajena al texto.
  - Las notas usan alternativas breves y auditables, alineadas con la práctica de POB de preservar ambigüedades relevantes.
