review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del superscrito hebreo y conserva las decisiones clave del POB: la doble designación de género (מִזְמוֹר / שִׁיר), la ocasión de dedicación, la ambigüedad de «la casa», y la ambigüedad genitiva de לְדָוִד con «De David». Sin embargo, no preserva completamente el aparato de notas del inglés: la nota [a] del POB va anclada a «psalm» para señalar alternativas de «the house» y la nota [b] registra una traducción anterior de toda la línea. El español actual solo conserva una nota y la ancla en un lugar menos adecuado.'
  spanish_quality_summary: El texto es claro, natural y digno en español eclesial moderno. «Un salmo. Un cántico para la dedicación de la casa. De David.» suena bien y evita rigidez. Aun así, conviene mover la nota alternativa al sintagma «la casa» para que el lector entienda de inmediato qué elemento está en cuestión, y añadir la nota de traducción previa para mantener la trazabilidad del audit trail.
  glossary_alignment: No hay conflictos con el glosario del proyecto. «Salmo», «cántico», «la casa» y «De David» están bien elegidos y respetan la racionalidad lexical y teológica documentada. La excepción necesaria es solo de anclaje y completitud de notas, no de terminología principal.
  issues:
  - severity: medium
    issue: Falta una nota equivalente a la nota [b] del inglés sobre la traducción previa.
    rationale: El encargo exige preservar alternativas significativas cuando el inglés POB las preservó. La nota de rendering previo forma parte del audit trail documentado y debe mantenerse también en español.
  - severity: low
    issue: La nota sobre «el templo / el palacio» está anclada a «salmo» en vez de a «la casa».
    rationale: Aunque el contenido de la nota es correcto, el anclaje actual puede confundir, porque las alternativas explican el referente de «la casa», no el sentido de «salmo».
  revised_spanish_text: Un salmo. Un cántico para la dedicación de la casa[a]. De David.[b]
