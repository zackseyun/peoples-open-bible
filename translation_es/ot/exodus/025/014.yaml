translation:
  language: es
  text: Y pondrás los varales[a] en los anillos, en los costados del arca, para llevar el arca con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «varas». «Varales» se usa aquí para los elementos de transporte del arca; una opción más tradicional sería «varas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הֵֽבֵאתָ
  english_pob_choice: And you shall put
  chosen_spanish: meterás
  alternatives_spanish:
  - y pondrás
  - y introducirás
  - y traerás
  lexicon: HALOT
  rationale: El hebreo expresa la acción de hacer entrar o colocar los varales dentro de los anillos; en español, «meterás» comunica de forma natural esa inserción sin perder el valor direccional del verbo.
- source_word: הַ/בַּדִּים
  english_pob_choice: the poles
  chosen_spanish: los varales
  alternatives_spanish:
  - los postes
  - las varas
  - las pértigas
  lexicon: HALOT
  rationale: Para los elementos de transporte del arca, «varales» conserva un registro bíblico claro en español y corresponde al objeto alargado usado para cargar; evita la rigidez de un calco y mantiene la función cultual.
- source_word: בַּ/טַּבָּעֹת
  english_pob_choice: into the rings
  chosen_spanish: en los anillos
  alternatives_spanish:
  - dentro de los anillos
  - en los aros
  lexicon: HALOT
  rationale: El contexto de inserción puede expresarse en español con «en» sin perder claridad, ya que la frase completa ya indica el movimiento hacia los anillos. «Anillos» es el término más directo y comprensible.
- source_word: עַל צַלְעֹ֣ת הָ/אָרֹן
  english_pob_choice: on the sides of the ark
  chosen_spanish: sobre los lados del arca
  alternatives_spanish:
  - en los lados del arca
  - sobre las costillas del arca
  lexicon: HALOT
  rationale: צלעות significa aquí los lados o partes laterales; «sobre los lados del arca» preserva el sentido locativo y la imagen arquitectónica del objeto sin introducir una paráfrasis mayor.
- source_word: הָ/אָרֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca sagrada
  - el cofre
  lexicon: HALOT
  rationale: En el contexto tabernacular, «arca» es el término consagrado y preciso en español para el objeto sagrado, más exacto que «cofre» y sin necesidad de ampliar con explicaciones.
- source_word: לָ/שֵׂ֥את
  english_pob_choice: to carry
  chosen_spanish: para llevar
  alternatives_spanish:
  - para cargar
  - para portar
  - para sostener
  lexicon: HALOT
  rationale: Aquí נשא indica el transporte físico del arca; «llevar» es natural y fiel, y en español comunica la función de portar el objeto durante el traslado.
- source_word: בָּ/הֶֽם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - por medio de ellos
  - mediante ellos
  lexicon: HALOT
  rationale: El pronombre retoma los varales como medio de transporte; «con ellos» preserva la relación instrumental de manera idiomática en español.
translation_notes:
  revision_awareness: El borrador anterior fue corregido para anclar la nota al marcador [a] dentro del texto español, evitando una nota sin anclaje. La redacción principal mantiene la equivalencia óptima con el hebreo y conserva la claridad ritual del pasaje.
  spanish_consistency_notes:
  - Se mantiene «arca» para הָאָרֹן en coherencia con el contexto del tabernáculo.
  - Se evita «SEÑOR» u այլ sustitución innecesaria, pues no aparece el nombre divino en este versículo.
  - Se usa un español moderno y reverente, con vocabulario bíblico estable pero sin arcaísmos innecesarios.
