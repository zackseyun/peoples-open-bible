  source_alignment_summary: 'El borrador refleja bien la secuencia griega: entrada en Judea, acercamiento a Bet-sur, descripción del lugar como fortificado y a cierta distancia de Jerusalén, y la acción militar final de sitiarlo. Sin embargo, hay un desajuste de anclaje de notas: la nota [a] está puesta sobre Bet-sur, pero su contenido corresponde a la unidad de distancia, mientras que la nota [b] está puesta sobre Jerusalén aunque su contenido trata del esqueno. Además, el inglés POB colocó la nota cultural sobre la medida, no sobre el topónimo.'
  spanish_quality_summary: El español es claro, natural y digno. «Después de entrar», «acercarse», «un lugar fortificado» y «la sitiaba» funcionan bien. La única reparación necesaria es corregir la ubicación y numeración de las notas para que el texto y las notas coincidan exactamente y la lectura no induzca a error.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La transliteración «Bet-sur» es defendible en español y «la sitiaba» sigue adecuadamente la revisión del audit trail inglés para ἔθλιβε en contexto militar.
  issues:
  - severity: medium
    issue: Marcadores de notas desanclados respecto de su contenido
    rationale: En el texto, [a] aparece tras «Bet-sur», pero la nota correspondiente trata del topónimo; en cambio [b] aparece tras «Jerusalén», pero su contenido trata del «esqueno». Según las instrucciones, cada nota debe anclarse exactamente en la palabra o frase pertinente. Aquí la nota cultural debe anclarse en «esquenos», y la nota del topónimo, si se conserva, debe ir en «Bet-sur».
  - severity: low
    issue: Nota sobre el topónimo no exigida por el source/audit trail
    rationale: El inglés POB no preserva una nota lexical sobre Beth-zur; su única nota de este segmento es la unidad de distancia. La nota española sobre la transliteración no es errónea, pero tampoco es necesaria. Dado que el texto debe mantenerse limpio cuando no hace falta aclaración adicional, conviene omitirla.
  revised_spanish_text: Pero, después de entrar en Judea y acercarse a Bet-sur, un lugar fortificado a unos cinco esquenos[a] de Jerusalén, la sitiaba.
  revised_footnotes:
