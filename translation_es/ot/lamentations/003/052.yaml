    issue: La nota al pie no conserva la alternativa intensificada del hebreo
    rationale: El inglés auditado explica que el infinitivo absoluto intensifica el verbo y ofrece como alternativa «My enemies surely hunted me down like a bird, without cause». La nota española actual dice como alternativa casi lo mismo que el texto principal, por lo que pierde la función de la nota.
  - severity: low
    issue: La alternativa de la nota no añade valor distintivo
    rationale: 'Al decir «también podría traducirse: “Mis enemigos me cazaron como a un ave, sin causa”», la nota no presenta una verdadera alternativa de traducción ni refleja el matiz enfático documentado.'
