review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la negación futura y la imagen general de abundancia, pero reduce en exceso la acumulación triple hebrea/plausible alternativa inglesa ('streams / rivers / wadis') al omitir cualquier equivalente explícito para נַחֲלֵי en el texto principal. Además, 'que fluyen con' suena menos idiomático en español para líquidos/sustancias abundantes que 'que corren con' o una construcción con 'de'.
  spanish_quality_summary: 'El español es claro y digno, pero ''No mirará los arroyos, los ríos que fluyen con miel y cuajada'' deja una frase algo rígida y parcialmente truncada en la serie poética. También conviene ajustar la nota: ''verá'' no refleja la negación de אַל y ''wadis'' es demasiado crudo para texto eclesial amplio; puede conservarse en nota, pero mejor junto con una alternativa más natural.'
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. ''Miel'' y ''cuajada'' son adecuadas. La cuestión principal es léxica y estilística: preservar mejor la triple imaginería acuática mediante ''arroyos, ríos y torrentes'' en español, con nota para ''canales ... wadis''.'
  issues:
  - severity: medium
    issue: Se pierde demasiado la triple serie acuática del hebreo al omitir un equivalente explícito para נַחֲלֵי en el texto principal.
    rationale: El hebreo acumula פּלגות / נהרי / נחלי. Aunque el inglés revisado comprimió la frase, el español puede conservar naturalmente la serie con 'arroyos, ríos y torrentes', lo que refleja mejor la imaginería fuente sin sonar forzado.
  - severity: medium
    issue: La expresión 'ríos que fluyen con miel y cuajada' es poco idiomática en español bíblico actual.
    rationale: En español, para abundancia material, 'que corren con' o 'de miel y cuajada' suena más natural. 'Fluyen con' es comprensible, pero menos elegante y menos propio del registro buscado.
  - severity: low
    issue: La nota al pie alternativa elimina la negación y usa 'wadis' sin suficiente adaptación.
    rationale: La alternativa debe mantener la fuerza de 'No verá' y puede incluir 'wadis' como préstamo explicativo, pero conviene acompañarlo de términos más transparentes para lectores generales.
  revised_spanish_text: No mirará[a] arroyos, ríos y torrentes de miel y cuajada.
  revised_footnotes:
  - marker: a
    text: 'O: «No verá los canales, los ríos, los wadis de miel y cuajada»; también, «No verá corrientes, ríos y cauces de miel y cuajada».'
    reason: lexical_alternative
  revision_rationale: La revisión preserva mejor la acumulación poética del hebreo con tres términos acuáticos naturales en español, mejora la fluidez de la imagen de abundancia con 'de miel y cuajada', y corrige la nota para mantener la negación original y ofrecer alternativas léxicas útiles sin perder legibilidad.
