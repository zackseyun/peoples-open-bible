translation:
  language: es
  text: Pero yo mismo[a] recordaré mi pacto contigo[b] en los días de tu juventud, y estableceré para ti un pacto perpetuo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo añade un pronombre independiente para enfatizar el sujeto; aquí se refleja ese énfasis de manera explícita en español.
    reason: spanish_style_note
  - marker: b
    text: El hebreo dice «mi pacto contigo en los días de tu juventud», evocando la relación de pacto previa con Jerusalén sin precisar aquí qué administración del pacto está en vista.
    reason: cross_reference
lexical_decisions:
- source_word: וְזָכַרְתִּי
  english_pob_choice: But I myself will remember
  chosen_spanish: Pero yo misma recordaré
  alternatives_spanish:
  - Y recordaré
  - Pero yo recordaré
  lexicon: HALOT
  rationale: El verbo זכר en este contexto futuro de restauración se expresa naturalmente como «recordar», y el matiz adversativo de la conjunción se conserva con «Pero». El pronombre independiente intensifica la acción divina; en español se puede reflejar con «yo misma» si se toma el hablante como Yahvé, preservando el énfasis personal del hebreo.
- source_word: אֲנִי
  english_pob_choice: I myself
  chosen_spanish: yo misma
  alternatives_spanish:
  - yo
  - yo mismo
  lexicon: HALOT
  rationale: El hebreo añade énfasis por medio del pronombre independiente. En español, «yo misma» comunica ese énfasis de forma natural y mantiene la fuerza enfática del sujeto divino en primera persona.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi pacto conmigo
  lexicon: HALOT
  rationale: «Pacto» conserva el valor bíblico-jurídico de בְּרִית y evita suavizarlo con un término más interpretativo. En este pasaje se mantiene la referencia relacional sin añadir explicaciones que el hebreo no exige.
- source_word: אֶת ... אוֹתָךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - respecto de ti
  lexicon: HALOT
  rationale: La construcción hebrea es relacional e idiomática; en español, «contigo» expresa de manera natural la relación del pacto sin volver la frase pesada. Mantiene el sentido de alianza personal entre Yahvé y Jerusalén.
- source_word: בִּימֵי נְעוּרַיִךְ
  english_pob_choice: in the days of your youth
  chosen_spanish: en los días de tu juventud
  alternatives_spanish:
  - cuando eras joven
  - en tus días de juventud
  lexicon: HALOT
  rationale: Se conserva el modismo temporal casi de manera directa porque es claro en español y sostiene la alusión histórica del capítulo a la relación inicial de pacto.
- source_word: וַהֲקִמוֹתִי
  english_pob_choice: and I will establish
  chosen_spanish: y estableceré
  alternatives_spanish:
  - y confirmaré
  - y levantaré
  lexicon: HALOT
  rationale: El hifil de קום en lenguaje de pacto suele significar establecer o confirmar. «Estableceré» es la opción más natural y fiel aquí, sin perder la fuerza formal del acto divino.
- source_word: לָךְ
  english_pob_choice: for you
  chosen_spanish: para ti
  alternatives_spanish:
  - para vosotros
  - para usted
  lexicon: HALOT
  rationale: La preposición conserva la orientación de beneficio/destino. «Para ti» refleja con naturalidad el dativo hebreo en español.
- source_word: בְּרִית עוֹלָם
  english_pob_choice: an everlasting covenant
  chosen_spanish: un pacto perpetuo
  alternatives_spanish:
  - un pacto eterno
  - un pacto para siempre
  lexicon: HALOT
  rationale: «Perpetuo» comunica la duración continua del compromiso sin cargar innecesariamente el término con un matiz filosófico de eternidad. Se conserva el valor covenantal de la expresión sin resolverla doctrinalmente.
theological_decisions:
- issue: Identidad del pacto al que se alude
  english_pob_reading: retain 'my covenant' and 'everlasting covenant' without specifying a later theological system
  chosen_spanish_reading: conservar «mi pacto» y «un pacto perpetuo» sin identificarlo como mosaico o nuevo pacto
  alternative_spanish_readings:
  - mi alianza con usted/contigo
  - el nuevo pacto
  - el pacto mosaico
  rationale: El hebreo habla de recordar un pacto previo con Jerusalén y de establecer luego un pacto perpetuo, pero no nombra aquí una administración específica. La traducción debe mantener esa tensión y no resolverla con una identificación doctrinal no explicitada por el texto.
  doctrine_reference: Preservar la tensión teológica sin armonización prematura.
- issue: Énfasis del sujeto divino
  english_pob_reading: I myself
  chosen_spanish_reading: yo misma
  alternative_spanish_readings:
  - yo
  - yo mismo
  rationale: El pronombre enfático del hebreo merece ser visible en español. Dado que el hablante es Yahvé, «yo misma» se usa como recurso formal para reflejar el énfasis personal del original; si una tradición editorial prefiere evitar el marcado de género en español para Dios, podría optarse por «yo» o «yo mismo», pero se perdería parte del énfasis explícito.
  doctrine_reference: Énfasis pronominal del hebreo, sin implicar cambio doctrinal.
translation_notes:
  revision_awareness: 'Se siguió el acuerdo alto del auditor inglés sin cambios sustanciales: se preservó el giro adversativo, el énfasis del pronombre independiente y la ambigüedad teológica sobre la identificación concreta del pacto. La única adaptación destacable es la elección española de «pacto perpetuo» para mantener la fuerza covenantal de בְּרִית עוֹלָם con estilo natural.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino en el proyecto, pero este versículo no lo nombra explícitamente en la forma hebrea del texto base.
  - Se usa «pacto» en lugar de «alianza» por consistencia con el valor jurídico-covenantal de בְּרִית en este registro.
  - «Perpetuo» se emplea como equivalente sobrio de עוֹלָם en esta fórmula de pacto.
  - El pronombre enfático fue reflejado sin sobrecargar el ritmo del verso.
