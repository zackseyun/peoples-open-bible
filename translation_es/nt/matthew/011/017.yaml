    text: Or, more literally, 'we piped for you.' The Greek verb refers specifically to playing a flute or pipe.
    reason: lexical_alternative
  - marker: b
    text: Or, 'we lamented' or 'we sang a funeral song.'
    reason: lexical_alternative
  - marker: c
    text: More literally, 'you did not beat yourselves,' referring to customary gestures of mourning such as beating the breast.
    reason: cultural_note
