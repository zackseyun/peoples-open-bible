    text: 'Hebreo: «espada», un término profético para guerra o juicio devastador.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hombre y animal», fórmula fija que abarca la vida humana y la animal en la tierra.'
    reason: lexical_alternative
  revision_rationale: Se ajusta «sobre» a «contra» para reflejar mejor el valor adversativo del juicio; se mejora la sintaxis de «cortar de ella» para un español más natural y fiel; y se corrige el anclaje de la nota sobre «hombre y animal» al lugar correspondiente en el texto.
