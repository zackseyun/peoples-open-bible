    text: Or 'be put to shame because of all their might.' The Hebrew phrase may indicate shame in relation to, or because of, the power they possess.
    reason: lexical_alternative
  - marker: b
    text: The gesture 'put their hand over their mouth' is an idiom for silence, astonishment, or submission.
    reason: cultural_note
  - marker: c
    text: Or 'their ears will be stopped' / 'their ears will grow dull.'
    reason: lexical_alternative
