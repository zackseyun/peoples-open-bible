translation:
  language: es
  text: Yo soy un muro, y mis pechos son como torres; entonces fui a sus ojos como la que halla la paz[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como la que obtiene la paz»; el hebreo también puede implicar bienestar, plenitud o favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: חוֹמָה
  english_pob_choice: wall
  chosen_spanish: muro
  alternatives_spanish:
  - pared
  - muralla
  lexicon: HALOT
  rationale: El hebreo designa una estructura defensiva de contención; «muro» conserva la imagen firme y simple sin forzar el valor militar de «muralla». «Pared» resulta demasiado doméstico, y «muralla» puede sonar más específico de ciudad fortificada.
- source_word: שָׁדַי
  english_pob_choice: my breasts
  chosen_spanish: mis pechos
  alternatives_spanish:
  - mi seno
  - mis senos
  lexicon: HALOT
  rationale: El hebreo se refiere de manera directa al cuerpo femenino; «mis pechos» es claro, natural y fiel al paralelismo poético. «Mi seno» suaviza demasiado el término, y «mis senos» es posible pero un poco más técnico en algunas zonas.
- source_word: כַּמִּגְדָּלוֹת
  english_pob_choice: like towers
  chosen_spanish: como torres
  alternatives_spanish:
  - como atalayas
  - como torretas
  lexicon: HALOT
  rationale: La comparación es arquitectónica y plural. «Torres» reproduce bien la imagen y mantiene la correspondencia con el «muro» precedente. «Atalayas» introduce vigilancia explícita, y «torretas» suena menos natural en español bíblico.
- source_word: אָז
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - luego
  - en ese momento
  lexicon: HALOT
  rationale: La partícula marca consecuencia o transición temporal. «Entonces» es la opción más natural en español y conserva el valor lógico del hebreo.
- source_word: הָיִיתִי
  english_pob_choice: I was
  chosen_spanish: fui
  alternatives_spanish:
  - era
  - estuve
  lexicon: HALOT
  rationale: Aunque el inglés opta por «I was», en español la construcción «fui, a sus ojos» comunica con naturalidad el estado resultante sin sonar rígido. «Era» debilita el giro narrativo; «estuve» no expresa bien la predicación idiomática.
- source_word: בְּעֵינָיו
  english_pob_choice: in his eyes
  chosen_spanish: a sus ojos
  alternatives_spanish:
  - en sus ojos
  - según él
  lexicon: HALOT
  rationale: El hebreo usa un modismo de valoración o percepción. «A sus ojos» preserva la metáfora y funciona con naturalidad en español. «En sus ojos» suena menos idiomático; «según él» explicita demasiado la metáfora.
- source_word: כְּמוֹצְאֵת
  english_pob_choice: like one who finds
  chosen_spanish: como la que halla
  alternatives_spanish:
  - como la que obtiene
  - como la que encuentra
  lexicon: HALOT
  rationale: La forma participial femenina permite un referente femenino implícito. «La que halla» mantiene ese matiz y suena bíblico sin arcaizar en exceso. «Encuentra» también es posible, pero «halla» conserva mejor el registro poético; «obtiene» desplaza el sentido hacia posesión.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: la paz
  alternatives_spanish:
  - bienestar
  - plenitud
  - favor
  lexicon: HALOT
  rationale: «Shalom» puede abarcar paz, bienestar, integridad o favor. Aquí se conserva «la paz» por ser la opción más directa y reconocible, dejando constancia de su amplitud semántica en la nota.
translation_notes:
  revision_awareness: 'El pasaje mantiene la imagen corporal y arquitectónica del hebreo sin suavizarla. Se prefirió un español natural que conserve el paralelismo: muro/pechos/torres y el giro final de valoración «a sus ojos». No se detectaron revisiones textuales que exigieran apartarse del dictado del WLC ni del audit trail inglés.'
  spanish_consistency_notes:
  - Se conservó la metáfora corporal directa con «mis pechos», coherente con la elección léxica documentada para שָׁדַי.
  - «Shalom» se tradujo como «paz» en el texto principal y se preservó su amplitud en nota, siguiendo el precedente del inglés POB.
  - La fórmula «a sus ojos» reproduce el modismo hebreo בְּעֵינָיו sin convertirlo en una paráfrasis explicativa.
