translation:
  language: es
  text: Pero el hombre que los toca debe armarse con hierro y el asta de una lanza[a][b][c], y serán quemados por completo con fuego allí mismo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: "debe equiparse con hierro y un asta de lanza"; literalmente: "debe ser llenado con hierro y madera de lanza".'
    reason: lexical_alternative
  - marker: b
    text: 'O: "serán ciertamente quemados con fuego allí mismo". El hebreo usa un infinitivo absoluto con el verbo para dar énfasis.'
    reason: lexical_alternative
  - marker: c
    text: El "los" se refiere a los malvados comparados con espinas en el versículo anterior.
    reason: cross_reference
lexical_decisions:
- source_word: וְאִישׁ
  english_pob_choice: But the man
  chosen_spanish: Pero el hombre
  alternatives_spanish:
  - Y el hombre
  - Mas el hombre
  lexicon: HALOT
  rationale: El hebreo introduce un sujeto genérico singular con וְ. En español, 'Pero' refleja bien el valor conjuntivo adversativo adoptado en la revisión inglesa, y 'el hombre' conserva el caso genérico sin volverlo demasiado técnico.
- source_word: יִגַּע בָּהֶם
  english_pob_choice: who touches them
  chosen_spanish: que los toca
  alternatives_spanish:
  - que se acerca a ellos
  - que los maneja
  lexicon: HALOT
  rationale: נגע aquí expresa el contacto físico con seres peligrosos comparados con espinas. 'Los toca' es la forma más directa y fiel, sin añadir una interpretación más específica que el hebreo no exige.
- source_word: יִמָּלֵא
  english_pob_choice: must arm himself
  chosen_spanish: debe armarse
  alternatives_spanish:
  - debe equiparse
  - debe llenarse
  lexicon: HALOT
  rationale: El nifal de מלא puede significar 'ser lleno', pero en esta construcción con instrumentos implica estar provisto o armado. 'Debe armarse' conserva la fuerza práctica sin perder la base lexical.
- source_word: בַרְזֶל
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - un instrumento de hierro
  - una pieza de hierro
  lexicon: HALOT
  rationale: El sustantivo es simplemente 'hierro'. El hebreo no especifica un objeto, así que se mantiene la materia mencionada.
- source_word: וְעֵץ חֲנִית
  english_pob_choice: and the shaft of a spear
  chosen_spanish: y el asta de una lanza
  alternatives_spanish:
  - y el mango de una lanza
  - y el asta de una jabalina
  lexicon: HALOT
  rationale: Literalmente es 'madera de lanza', es decir, el palo o asta. 'Asta de una lanza' comunica con claridad la parte de madera del arma y conserva la imagen concreta.
- source_word: וּבָאֵשׁ
  english_pob_choice: with fire
  chosen_spanish: con fuego
  alternatives_spanish:
  - por fuego
  - en fuego
  lexicon: HALOT
  rationale: La preposición ב aquí es instrumental o locativa. 'Con fuego' expresa naturalmente el medio de destrucción en español.
- source_word: שָׂרוֹף יִשָּׂרְפוּ
  english_pob_choice: they must be completely burned
  chosen_spanish: serán quemados por completo
  alternatives_spanish:
  - serán quemados totalmente
  - serán seguramente quemados
  lexicon: HALOT
  rationale: La combinación de infinitivo absoluto + verbo finito intensifica la acción. 'Por completo' reproduce esa fuerza enfática sin volver la frase pesada.
- source_word: בַּשָּׁבֶת
  english_pob_choice: in their place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - allí mismo
  - en el sitio
  lexicon: HALOT
  rationale: La forma rara se entiende adverbialmente como 'en el lugar' o 'allí'. 'En su lugar' conserva el sentido local sin ampliar innecesariamente la referencia.
translation_notes:
  revision_awareness: La redacción sigue la revisión final inglesa que prefirió 'But' al inicio. Se mantuvo el sentido intensivo del hebreo en 'serán quemados por completo' y la imagen concreta de 'madera de lanza' expresada en español como 'asta de una lanza'.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no aplica en este versículo.
  - '''Armarse'' se emplea aquí por el valor idiomático de מלא en contexto de instrumentos, no como traducción mecánica de ''llenar''.'
  - '''Asta de una lanza'' preserva la metáfora material del hebreo sin introducir un arma distinta.'
