translation:
  language: es
  text: Y cuando oigas el sonido de la marcha en las copas de los árboles de bálsamo[a], entonces actúa con decisión, porque entonces Yahvé ha salido delante de ti para derrotar al campamento de los filisteos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en las copas de los árboles de baca»; la especie exacta designada por el hebreo es incierta. Versiones inglesas antiguas suelen leer «moreras».
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיהִי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucederá que, cuando
  - Y será que, cuando
  lexicon: HALOT
  rationale: 'La construcción verbal introduce una circunstancia temporal futura; en español, «Y cuando» comunica de manera natural la subordinación temporal sin forzar un calco de «será». '
- source_word: בְּשָׁמְעֲךָ
  english_pob_choice: you hear
  chosen_spanish: oigas
  alternatives_spanish:
  - escuches
  - oyes
  lexicon: HALOT
  rationale: 'El infinitivo constructo con sufijo expresa tiempo: «cuando oigas». «Oigas» conserva la relación temporal y el matiz auditivo inmediato del hebreo.'
- source_word: קוֹל צְעָדָה
  english_pob_choice: the sound of marching
  chosen_spanish: el sonido de la marcha
  alternatives_spanish:
  - el sonido de pasos
  - el sonido de pasos marciales
  lexicon: HALOT
  rationale: קוֹל es «sonido» y צְעָדָה apunta a pasos/marcha; en este contexto militar, «la marcha» mantiene la idea de avance ordenado y suena natural en español.
- source_word: בְּרָאשֵׁי הַבְּכָאִים
  english_pob_choice: in the tops of the balsam trees
  chosen_spanish: en las copas de los árboles de bálsamo
  alternatives_spanish:
  - en las copas de los árboles de baca
  - en las copas de las moreras
  lexicon: HALOT
  rationale: רָאשֵׁי significa «copas» o «partes altas». הַבְּכָאִים designa un árbol de identificación incierta; «árboles de bálsamo» sigue la decisión léxica del POB inglés y mantiene la referencia botánica sin afirmar más de lo seguro.
- source_word: אָז תֶּחֱרָץ
  english_pob_choice: then act decisively
  chosen_spanish: entonces actúa con decisión
  alternatives_spanish:
  - entonces muévete con rapidez
  - entonces sé resuelto
  lexicon: HALOT
  rationale: חרץ aquí expresa una respuesta pronta y decidida ante la señal. «Actúa con decisión» preserva la fuerza imperativa sin reducirla solo a velocidad.
- source_word: כִּי אָז
  english_pob_choice: for then
  chosen_spanish: porque entonces
  alternatives_spanish:
  - pues entonces
  - ya que entonces
  lexicon: HALOT
  rationale: כִּי introduce la razón del mandato; «porque entonces» conserva la relación causal de forma clara en español.
- source_word: יָצָא יְהוָה
  english_pob_choice: Yahweh has gone out
  chosen_spanish: Yahvé ha salido
  alternatives_spanish:
  - Yahvé salió
  - Yahvé ha marchado
  lexicon: HALOT
  rationale: 'Se sigue la convención del POB en español para יְהוָה: «Yahvé». El perfecto verbal comunica que la acción divina ya ha comenzado al darse la señal.'
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - antes que tú
  - en frente de ti
  lexicon: HALOT
  rationale: La expresión indica ir por delante en batalla. «Delante de ti» es idiomática en español y conserva la imagen direccional.
- source_word: לְהַכּוֹת
  english_pob_choice: to strike down
  chosen_spanish: para herir
  alternatives_spanish:
  - para golpear
  - para derribar
  lexicon: HALOT
  rationale: El hiphil de נכה en contexto bélico puede expresar causar golpe/derrota. «Herir» mantiene la violencia del verbo sin añadir una precisión interpretativa excesiva; el complemento de contexto militar sostiene la lectura.
- source_word: בְּמַחֲנֵה פְלִשְׁתִּים
  english_pob_choice: the camp of the Philistines
  chosen_spanish: al campamento de los filisteos
  alternatives_spanish:
  - al ejército de los filisteos
  - al campamento filisteo
  lexicon: HALOT
  rationale: מַחֲנֶה es literalmente «campamento» y puede implicar el ejército acampado. «Al campamento de los filisteos» mantiene la imagen concreta del texto hebreo y la relación posesiva.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Siguiendo la política del proyecto, se traduce con el nombre propio «Yahvé» en lugar de ocultarlo tras un título como «el SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin revisiones aplicadas; esta versión sigue la decisión inglesa principal, preservando la incertidumbre botánica de הַבְּכָאִים y la fuerza militar de חרץ / נכה sin suavizarlas indebidamente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, en coherencia con el estándar POB en español.
  - Se traduce la secuencia temporal de forma natural («Y cuando... entonces...»), sin convertirla en paráfrasis.
  - «Árboles de bálsamo» conserva la decisión léxica principal del auditorio inglés y evita una identificación botánica demasiado segura.
  - «Actúa con decisión» intenta reflejar la energía de חרץ sin desplazarla a una noción meramente mental.
  - «Herir» se usa con valor bélico contextual; no se suaviza a «golpear» ni se intensifica sin base textual.
