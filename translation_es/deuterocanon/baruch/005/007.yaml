translation:
  language: es
  text: Porque Dios ha ordenado que toda montaña alta y las colinas eternas sean rebajadas[a], y que los valles sean llenados para la nivelación de la tierra, a fin de que Israel camine con seguridad en la gloria de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abatidas». El verbo griego expresa aquí el descenso físico de montes y colinas; no se refiere principalmente a humillación moral.
    reason: lexical_alternative
  - marker: b
    text: O «por la gloria de Dios» o «mediante la gloria de Dios». El dativo griego permite una lectura instrumental o de esfera.
    reason: alternative_reading
lexical_decisions:
- source_word: συνέταξεν
  english_pob_choice: has ordered
  chosen_spanish: ha ordenado
  alternatives_spanish:
  - ha mandado
  - ha dispuesto
  - ha decretado
  lexicon: LSJ
  rationale: Conserva la idea de una disposición divina con autoridad y finalidad. 'Ha ordenado' suena natural en español y no reduce el matiz a un simple mandato aislado.
- source_word: ταπεινοῦσθαι
  english_pob_choice: be made low
  chosen_spanish: sean humilladas
  alternatives_spanish:
  - sean rebajadas
  - sean bajadas
  - sean abatidas
  lexicon: LSJ
  rationale: Aunque el referente son montañas, en español bíblico 'humillar' puede expresar bien el abajamiento topográfico con tono elevado. La opción mantiene la imagen de descenso sin mecanizarla demasiado. También deja abierta la resonancia profética de abatimiento.
- source_word: πᾶν ὄρος ὑψηλὸν
  english_pob_choice: every high mountain
  chosen_spanish: toda montaña alta
  alternatives_spanish:
  - cada montaña alta
  - toda montaña elevada
  - toda alta montaña
  lexicon: LSJ
  rationale: Se mantiene el distributivo de πᾶν y el adjetivo ὑψηλόν. 'Toda montaña alta' es la forma más natural en español sin perder la imagen de altura.
- source_word: θῖνας αἰωνίους
  english_pob_choice: the everlasting hills
  chosen_spanish: las colinas eternas
  alternatives_spanish:
  - los montes eternos
  - las alturas eternas
  - los cerros antiguos
  lexicon: LSJ
  rationale: θῖνες puede designar montículos, colinas o elevaciones. 'Colinas eternas' preserva el paralelo poético con 'montaña' y comunica la permanencia de αἰωνίους con dignidad estilística.
- source_word: φάραγγας
  english_pob_choice: the valleys
  chosen_spanish: los valles
  alternatives_spanish:
  - las quebradas
  - los barrancos
  - los desfiladeros
  lexicon: LSJ
  rationale: Aunque el término puede abarcar quebradas o gargantas, el contexto de nivelación del terreno favorece el término amplio 'valles', más claro y natural en español.
- source_word: πληροῦσθαι
  english_pob_choice: be filled
  chosen_spanish: sean llenados
  alternatives_spanish:
  - sean colmados
  - sean rellenados
  - sean puestos llenos
  lexicon: LSJ
  rationale: 'Se conserva el pasivo de la imagen topográfica: los valles reciben material hasta quedar llenos. ''Sean llenados'' es directo y fiel.'
- source_word: εἰς ὁμαλισμὸν τῆς γῆς
  english_pob_choice: for the leveling of the ground
  chosen_spanish: para el nivelamiento de la tierra
  alternatives_spanish:
  - para allanar la tierra
  - para aplanar el terreno
  - para nivelar el suelo
  lexicon: LSJ
  rationale: '''Nivelamiento'' refleja con más cercanía el sustantivo griego ὁμαλισμός y mantiene el carácter formal de la frase. ''Tierra'' conserva la amplitud del genitivo sin volverlo excesivamente técnico.'
- source_word: ἵνα βαδίσῃ Ἰσραὴλ
  english_pob_choice: so that Israel may walk
  chosen_spanish: a fin de que Israel camine
  alternatives_spanish:
  - para que Israel ande
  - para que Israel pueda caminar
  - a fin de que Israel marche
  lexicon: LSJ
  rationale: '''Camine'' reproduce bien el sentido de βαδίσῃ como avanzar o transitar, con tono bíblico natural en español. La finalidad de la cláusula se mantiene claramente.'
- source_word: ἀσφαλῶς
  english_pob_choice: safely
  chosen_spanish: con seguridad
  alternatives_spanish:
  - seguramente
  - sin peligro
  - de manera segura
  lexicon: LSJ
  rationale: '''Con seguridad'' expresa tanto la idea de seguridad como la de caminar sin amenaza, y suena fluido en español contemporáneo.'
- source_word: τῇ τοῦ θεοῦ δόξῃ
  english_pob_choice: in the glory of God
  chosen_spanish: en la gloria de Dios
  alternatives_spanish:
  - por la gloria de Dios
  - mediante la gloria de Dios
  - a causa de la gloria de Dios
  lexicon: LSJ
  rationale: Se conserva la amplitud semántica del dativo griego sin cerrarlo a un valor exclusivamente instrumental. 'En la gloria de Dios' mantiene la imagen teológica del ámbito o esfera en que Israel camina.
theological_decisions:
- issue: Valor del dativo τῇ τοῦ θεοῦ δόξῃ
  english_pob_reading: in the glory of God
  chosen_spanish_reading: en la gloria de Dios
  alternative_spanish_readings:
  - por la gloria de Dios
  - mediante la gloria de Dios
  rationale: El griego admite lectura instrumental o de esfera/asociación. La redacción principal evita restringir el sentido, permitiendo que la gloria de Dios sea tanto el ámbito como la realidad acompañante del caminar seguro de Israel.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión que unió «every high mountain and the everlasting hills» con el mismo verbo de pasivo, por lo que la versión española también hace depender conjuntamente de «sean humilladas» a la montaña alta y a las colinas eternas. Asimismo, se reflejó el giro más formal de εἰς ὁμαλισμὸν τῆς γῆς como «para el nivelamiento de la tierra», sin perder inteligibilidad.
  spanish_consistency_notes:
  - Se conservó Yahvé no porque aparezca en este versículo, sino por coherencia del proyecto cuando corresponda; aquí el texto griego usa θεός y por eso se traduce «Dios».
  - Se mantuvo un registro bíblico elevado pero contemporáneo, evitando calcos duros y también evitando la tradición Reina-Valera cuando no era la opción más fiel al griego.
  - «Colinas eternas» se eligió para θῖνας αἰωνίους en lugar de «cerros» o «montes» para respetar el paralelismo poético con «montaña».
