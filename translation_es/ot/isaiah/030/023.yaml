translation:
  language: es
  text: Y él dará lluvia para tu semilla, con la que sembrarás la tierra, y pan del fruto de la tierra[a]; y será fértil y abundante[b]. En ese día tu ganado pastará en un amplio pastizal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘pan, el producto de la tierra’. El hebreo puede leerse en aposición, aunque ‘pan del fruto de la tierra’ comunica mejor el sentido en español.
    reason: lexical_alternative
  - marker: b
    text: Literalmente ‘gordo y rico’, un modismo de abundancia y fertilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַן
  english_pob_choice: And he will give
  chosen_spanish: Y él dará
  alternatives_spanish:
  - Y dará
  - Entonces él dará
  lexicon: HALOT
  rationale: En contexto profético, el perfecto con waw expresa un futuro/resul­tativo; el sujeto implícito sigue siendo Yahvé por el contexto inmediato. Se mantiene el pronombre para conservar la continuidad discursiva del hebreo.
- source_word: מְטַר
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - precipitación
  - aguacero
  lexicon: HALOT
  rationale: ‘Lluvia’ es la equivalencia natural y concreta para una provisión agrícola enviada por Dios.
- source_word: זַרְעֲךָ
  english_pob_choice: your seed
  chosen_spanish: tu semilla
  alternatives_spanish:
  - tu semilla para sembrar
  - tu siembra
  lexicon: HALOT
  rationale: Se conserva la imagen agrícola de ‘seed’. ‘Semilla’ es claro en español y corresponde al material de siembra.
- source_word: אֲשֶׁר תִּזְרַע אֶת הָאֲדָמָה
  english_pob_choice: with which you sow the ground
  chosen_spanish: con la que sembrarás la tierra
  alternatives_spanish:
  - que sembrarás en la tierra
  - con la que siembras la tierra
  lexicon: HALOT
  rationale: El hebreo expresa un sentido instrumental; ‘con la que’ reproduce mejor esa relación que una paráfrasis más libre. ‘Tierra’ transmite aquí el campo cultivable en español bíblico moderno.
- source_word: לֶחֶם תְּבוּאַת הָאֲדָמָה
  english_pob_choice: bread from the produce of the ground
  chosen_spanish: pan del producto de la tierra
  alternatives_spanish:
  - pan, el producto de la tierra
  - alimento del producto de la tierra
  lexicon: HALOT
  rationale: Se conserva ‘pan’ como base concreta del sustento agrícola. ‘Del producto de la tierra’ refleja la relación constructa sin forzar el castellano con una construcción demasiado literal.
- source_word: דָשֵׁן וְשָׁמֵן
  english_pob_choice: rich and plentiful
  chosen_spanish: fértil y abundante
  alternatives_spanish:
  - gordo y rico
  - grueso y abundante
  - fértil y próspero
  lexicon: HALOT
  rationale: Los adjetivos hebreos son idiomáticos y expresan abundancia/fertilidad, no solo gordura física. ‘Fértil y abundante’ preserva el campo semántico agrícola sin caer en una literalidad extraña en español.
- source_word: יִרְעֶה
  english_pob_choice: will graze
  chosen_spanish: pastará
  alternatives_spanish:
  - pastoreará
  - se alimentará
  lexicon: HALOT
  rationale: Con ganado como sujeto, ‘pastará’ es la forma más natural y exacta en español.
- source_word: מִקְנֶיךָ
  english_pob_choice: your livestock
  chosen_spanish: tu ganado
  alternatives_spanish:
  - tu ganado doméstico
  - tus reses
  lexicon: HALOT
  rationale: ‘Ganado’ comunica el sentido colectivo de animales de cría sin restringirlo innecesariamente a una sola especie.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - Ese día
  - En ese día
  lexicon: HALOT
  rationale: Fórmula profética habitual; ‘aquel’ preserva mejor la distancia discursiva y el tono solemne.
- source_word: כַּר נִרְחָב
  english_pob_choice: a broad pasture
  chosen_spanish: un amplio pastizal
  alternatives_spanish:
  - un amplio pasto
  - una amplia pradera
  - un pastizal espacioso
  lexicon: HALOT
  rationale: כַּר designa una zona de pasto/pastura. ‘Pastizal’ da una imagen natural de terreno apto para el pastoreo; ‘amplio’ conserva נִרְחָב.
theological_decisions:
- issue: Sujeto implícito del verbo inicial
  english_pob_reading: The subject is rendered as 'he,' referring to the LORD from the immediate context.
  chosen_spanish_reading: Se mantiene el sujeto implícito como ‘él’, referido a Yahvé por el contexto inmediato.
  alternative_spanish_readings:
  - Repetir ‘Yahvé’ explícitamente
  - omitir el pronombre sujeto
  rationale: El hebreo no repite el nombre divino, pero el contexto previo lo identifica claramente. ‘Él’ conserva el flujo del original; no se enmascara el nombre divino, que se entiende del contexto, según la convención del proyecto.
  doctrine_reference: Contexto inmediato de Isaías 30; convención editorial sobre el Tetragrámaton en POB español
- issue: Idiomatismo de ‘fértil y abundante’
  english_pob_reading: Literally 'fat and rich,' an idiom for abundance and fertility.
  chosen_spanish_reading: ‘Fértil y abundante’ como equivalente idiomático de prosperidad agrícola.
  alternative_spanish_readings:
  - ‘Gordo y rico’
  - ‘Fecundo y abundante’
  - ‘Fértil y próspero’
  rationale: La expresión hebrea es idiomática; la traducción debe comunicar abundancia y fertilidad, no corporalidad literal. En español, ‘fértil y abundante’ preserva el efecto semántico sin perder naturalidad.
  doctrine_reference: Uso idiomático de adjetivos de abundancia en hebreo bíblico
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el registro y la decisión de equivalencia óptima del POB inglés para Isaías 30:23, sin cambios detectados en la revisión más reciente; se preservan las dos tensiones léxicas principales: la relación constructa ‘pan del producto de la tierra’ y el modismo ‘fértil y abundante’.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ en la línea principal como nombre divino del proyecto, sin necesidad de repetirlo aquí porque el sujeto es pronominal y el contexto lo identifica.
  - ‘Tierra’ traduce הָאֲדָמָה en sentido agrícola/territorial, coherente con el contexto de cultivo y pastoreo.
  - ‘Pastará’ y ‘pastizal’ mantienen la imagen pastoril y evitan una generalización excesiva como ‘alimento’ o ‘campo’.
