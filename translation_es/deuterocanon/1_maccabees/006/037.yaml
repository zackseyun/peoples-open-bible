translation:
  language: es
  text: Y sobre cada bestia[a] había torres de madera, fuertes y cubiertas, equipadas sobre ellas con máquinas; y sobre cada una iban treinta y dos combatientes, y su indio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «bestia»; el contexto más amplio muestra que se trata de elefantes de guerra.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «su indio». La frase probablemente se refiere al conductor o cuidador indio asignado a cada elefante.
    reason: lexical_alternative
lexical_decisions:
- source_word: πύργοι ξύλινοι
  english_pob_choice: wooden towers
  chosen_spanish: torres de madera
  alternatives_spanish:
  - torres de madera
  - torrecillas de madera
  lexicon: LSJ
  rationale: πύργοι significa torres; ξύλινοι, de madera. «Torres de madera» reproduce con naturalidad y sin añadir precisión arquitectónica no garantizada por el griego.
- source_word: ὀχυροὶ
  english_pob_choice: strong
  chosen_spanish: fuertes
  alternatives_spanish:
  - fuertes
  - fortificadas
  - sólidas
  lexicon: LSJ
  rationale: El adjetivo expresa robustez o capacidad defensiva. «Fuertes» conserva ese valor de manera natural en español sin sobrecargar con una tecnicidad militar que el contexto ya comunica.
- source_word: σκεπαζόμενοι
  english_pob_choice: covered over
  chosen_spanish: cubiertas
  alternatives_spanish:
  - cubiertas
  - techadas
  - tapadas
  lexicon: LSJ
  rationale: El participio pasivo indica que iban cubiertas o techadas. «Cubiertas» es breve y fiel; el español lo adapta al sustantivo «torres» sin perder la imagen.
- source_word: θηρίου
  english_pob_choice: beast
  chosen_spanish: bestia
  alternatives_spanish:
  - bestia
  - animal
  - elefante
  lexicon: LSJ
  rationale: El griego dice literalmente «bestia». Mantener «bestia» preserva el término fuente, mientras que el contexto de guerra deja claro que se trata de los elefantes.
- source_word: ἐζωσμένοι ... μηχαναῖς
  english_pob_choice: fitted ... with engines
  chosen_spanish: ceñidas sobre ellas con máquinas
  alternatives_spanish:
  - ceñidas con máquinas
  - equipadas con máquinas
  - ceñidas con ingenios
  lexicon: LSJ
  rationale: ἐζωσμένοι sugiere estar ceñidos o sujetos; μηχαναῖς son máquinas o ingenios de guerra. «Ceñidas ... con máquinas» mantiene la relación verbal y evita precisar más de lo que el griego dice.
- source_word: ἄνδρες δύο καὶ τριάκοντα
  english_pob_choice: thirty-two fighting men
  chosen_spanish: treinta y dos hombres de guerra
  alternatives_spanish:
  - treinta y dos hombres de guerra
  - treinta y dos combatientes
  - treinta y dos guerreros
  lexicon: LSJ
  rationale: La expresión numérica es literalmente «dos y treinta hombres». «Hombres de guerra» comunica su función combativa con un tono digno y transparente, cercano a «fighting men» sin volverla demasiado moderna.
- source_word: οἱ πολεμοῦντες
  english_pob_choice: fighting men
  chosen_spanish: hombres de guerra
  alternatives_spanish:
  - combatientes
  - los que peleaban
  - guerreros
  lexicon: LSJ
  rationale: El participio identifica a los hombres por su acción bélica. En español, «hombres de guerra» conserva el matiz funcional y evita una perífrasis menos elegante.
- source_word: ὁ Ἰνδὸς αὐτοῦ
  english_pob_choice: its Indian driver
  chosen_spanish: su indio
  alternatives_spanish:
  - su indio
  - su conductor indio
  - su indio, el conductor
  lexicon: LSJ
  rationale: El griego dice literalmente «su indio». Aunque el contexto apunta al guía o conductor del elefante, en la oración principal conviene conservar la literalidad y no cerrar prematuramente la ambigüedad; la nota aclara la probable función.
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca el texto griego y conserva las tensiones léxicas señaladas en el audit trail inglés: «bestia» frente al contexto de elefantes y «su indio» frente a la función implícita de conductor. Se evitó traducir mecánicamente desde el inglés en los puntos donde el griego ofrece una formulación más literal o ambigua.'
  spanish_consistency_notes:
  - Se mantuvo «bestia» para θηρίου, en coherencia con el criterio POB de no sustituir el término fuente por la interpretación contextual dentro del texto principal.
  - Se eligió «máquinas» para μηχαναῖς por correspondencia directa con el campo semántico de ingenios bélicos, sin introducir «máquinas de guerra» en exceso.
  - «Hombres de guerra» comunica οἱ πολεμοῦντες con un registro bíblico natural en español, evitando una calca torpe.
  - La puntuación separa claramente los miembros coordinados del verso sin añadir conectores interpretativos.
