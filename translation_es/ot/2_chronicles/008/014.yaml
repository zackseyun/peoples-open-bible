base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/008/014.yaml
  text: And according to the ordinance of David his father[a], he appointed the divisions of the priests for their service, and the Levites for their duties, to praise and to minister before the priests, as each day required, and the gatekeepers in their divisions for each gate; for so was the commandment of David[b], the man of God.
  footnotes:
