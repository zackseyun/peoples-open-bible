translation:
  language: es
  text: Entonces desollará la ofrenda quemada y la cortará en sus partes[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "la despellejará".'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "la cortará en sus partes", es decir, la dividirá en secciones para el sacrificio.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהִפְשִׁיט
  english_pob_choice: shall skin
  chosen_spanish: desollará
  alternatives_spanish:
  - quitará la piel
  - escaldará
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo hifil de פשט indica quitar la piel o el cuero del animal. 'Desollar' es la forma española más precisa y natural para ese acto ritual, y conserva la concreción del inglés 'skin' sin perder el matiz técnico.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: la ofrenda quemada
  alternatives_spanish:
  - el holocausto
  - la ofrenda ascendente
  lexicon: HALOT
  rationale: עֹלָה designa la ofrenda totalmente quemada. 'Ofrenda quemada' comunica el sentido cultual de manera clara y evita usar 'holocausto' como término más cargado históricamente en español; 'ofrenda ascendente' es etimológica pero menos idiomática.
- source_word: וְנִתַּח
  english_pob_choice: and cut
  chosen_spanish: la cortará
  alternatives_spanish:
  - la dividirá
  - la partirá
  lexicon: HALOT
  rationale: נתח se refiere a cortar el animal en partes para el sacrificio. 'Cortar' reproduce bien la acción básica y mantiene la sencillez del POB en inglés, sin añadir una explicación que no está en el verbo mismo.
- source_word: לִנְתָחֶיהָ
  english_pob_choice: into its pieces
  chosen_spanish: en sus piezas
  alternatives_spanish:
  - en sus partes
  - en sus secciones
  lexicon: HALOT
  rationale: 'La construcción expresa el resultado distributivo: el animal queda dividido en sus porciones rituales. ''En sus piezas'' sigue de cerca la imagen del original y es comprensible en español, aunque algo más literal que ''en sus partes''.'
- source_word: וְ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Luego
  lexicon: HALOT
  rationale: La conjunción enlaza esta instrucción con la anterior en secuencia procedimental. 'Entonces' transmite mejor ese avance narrativo y ritual que un simple 'Y'.
translation_notes:
  revision_awareness: El texto inglés POB y su auditoría reciente se mantienen sin cambios relevantes; la redacción española sigue de cerca las decisiones léxicas aprobadas y conserva las notas alternativas y culturales donde el español puede oscilar entre 'desollar'/'quitar la piel' y 'cortar en sus piezas'/'dividir en secciones'.
  spanish_consistency_notes:
  - Se usó 'ofrenda quemada' para mantener claridad cultual en español y evitar la carga histórica de 'holocausto'.
  - '''Desollar'' conserva la fuerza concreta del acto sacrificial y corresponde al valor léxico documentado del verbo hebreo.'
  - '''En sus piezas'' refleja la segmentación ritual sin añadir contenido interpretativo más allá del hebreo.'
  - Se mantuvo 'Entonces' para expresar la secuencia procedural del contexto inmediato.
