translation:
  language: es
  text: 'Y él les dijo por tercera vez[a]: «¿Por qué? ¿Qué mal ha hecho este hombre? No he hallado en él ninguna causa de muerte[b]; por tanto, después de disciplinarlo[c], lo dejaré en libertad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la tercera vez».
    reason: lexical_alternative
  - marker: b
    text: O «nada digno de muerte» o «ninguna base para una sentencia de muerte».
    reason: lexical_alternative
  - marker: c
    text: O «después de castigarlo»; posiblemente, más específicamente, «después de azotarlo». El griego παιδεύσας denota castigo disciplinario, pero esta palabra por sí sola no especifica la forma exacta.
    reason: lexical_alternative
lexical_decisions:
- source_word: τρίτον
  english_pob_choice: a third time
  chosen_spanish: por tercera vez
  alternatives_spanish:
  - tercera vez
  - por la tercera vez
  lexicon: BDAG
  rationale: El acusativo adverbial expresa repetición. «Por tercera vez» suena natural en español y conserva el énfasis narrativo sin sobretraducción.
- source_word: Τί γὰρ κακὸν ἐποίησεν οὗτος;
  english_pob_choice: Why? What evil has this man done?
  chosen_spanish: ¿Pues qué mal ha hecho este hombre?
  alternatives_spanish:
  - ¿Por qué? ¿Qué mal ha hecho este hombre?
  - ¿Qué mal ha hecho este hombre?
  lexicon: BDAG
  rationale: En este contexto, Τί funciona como protesta interrogativa elíptica; el español «¿Pues qué…?» reproduce bien ese arranque discursivo. «Mal» conserva la fuerza moral de κακόν sin sonar más rígido que «evil» en español bíblico contemporáneo.
- source_word: οὐδὲν αἴτιον θανάτου
  english_pob_choice: no grounds for death
  chosen_spanish: Ninguna causa de muerte
  alternatives_spanish:
  - No tengo causa de muerte
  - Ninguna base para una sentencia de muerte
  - Nada digno de muerte
  lexicon: BDAG
  rationale: αἴτιον en este marco judicial puede ser causa, cargo o fundamento. «Ninguna causa de muerte» mantiene la concisión y el sentido forense sin introducir «sentencia» que el griego no explicita.
- source_word: εὗρον ἐν αὐτῷ
  english_pob_choice: I have found in him
  chosen_spanish: he hallado en él
  alternatives_spanish:
  - he encontrado en él
  - he hallado contra él
  lexicon: BDAG
  rationale: «He hallado» conserva un registro solemne y jurídico adecuado para Pilato. «En él» sigue de cerca la preposición griega; «contra él» es posible pero más interpretativo.
- source_word: παιδεύσας
  english_pob_choice: after disciplining him
  chosen_spanish: después de disciplinarlo
  alternatives_spanish:
  - después de castigarlo
  - después de corregirlo
  - después de azotarlo
  lexicon: BDAG
  rationale: παιδεύω abarca disciplina, castigo o instrucción según contexto. Aquí indica un trato punitivo menor que la muerte, pero el verbo no especifica la forma; «disciplinarlo» conserva esa amplitud. «Azotarlo» queda como opción más específica, pero no se impone en el texto principal.
- source_word: ἀπολύσω
  english_pob_choice: I will release him
  chosen_spanish: lo soltaré
  alternatives_spanish:
  - lo liberaré
  - lo pondré en libertad
  lexicon: BDAG
  rationale: En contexto judicial ἀπολύω significa dejar en libertad o liberar. «Soltaré» es natural en español y transmite la decisión de liberarlo sin perder el carácter de veredicto.
theological_decisions:
- issue: 'Alcance de παιδεύσας: disciplina/punición sin fijar el método'
  english_pob_reading: Render generally as punitive discipline without specifying the exact penalty.
  chosen_spanish_reading: Mantener una disciplina punitiva genérica, sin precisar si fue castigo físico.
  alternative_spanish_readings:
  - después de castigarlo
  - después de azotarlo
  rationale: 'El griego permite un rango de sentidos. La redacción española debe preservar esa tensión: Pilato rechaza una condena a muerte, pero aún propone un castigo menor. No conviene resolver el pasaje hacia una reconstrucción histórica más precisa que la que da la palabra misma.'
  doctrine_reference: 'Principio POB: primacía del original y preservación de la tensión lexical'
- issue: Tono forense de la declaración de inocencia relativa
  english_pob_reading: no grounds for death
  chosen_spanish_reading: Ninguna causa de muerte
  alternative_spanish_readings:
  - nada digno de muerte
  - ninguna base para una sentencia de muerte
  rationale: La formulación española debe sonar judicial y breve, como la sentencia de Pilato, sin convertirla en una paráfrasis interpretativa. «Causa de muerte» conserva la relación entre falta encontrada y pena capital.
  doctrine_reference: 'Principio POB: exactitud semántica con claridad idiomática'
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con el contexto auditado en inglés; la única cuestión sensible es cómo verter παιδεύσας. La versión española sigue la decisión principal del POB inglés: mantener un sentido general de disciplina/castigo sin fijar un método específico. No se introdujeron cambios de contenido respecto al último pase de revisión.'
  spanish_consistency_notes:
  - Se mantuvo «Y él les dijo» para reflejar la continuidad narrativa sin sobrecargar el sujeto implícito.
  - Se evitó «SEÑOR» o títulos eclesiásticos, ya que no aparecen en el versículo.
  - «Soltaré» se eligió por naturalidad narrativa; en contexto jurídico sigue comunicando liberación.
  - Las notas conservan las alternativas significativas del audit trail inglés y añaden las equivalencias españolas pertinentes sin ampliar el sentido más allá del griego.
