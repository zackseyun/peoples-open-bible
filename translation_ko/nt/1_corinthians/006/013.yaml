source:
  edition: SBLGNT
  text: τὰ βρώματα τῇ κοιλίᾳ, καὶ ἡ κοιλία τοῖς βρώμασιν· ὁ δὲ θεὸς καὶ ταύτην καὶ ταῦτα καταργήσει. τὸ δὲ σῶμα οὐ τῇ πορνείᾳ ἀλλὰ τῷ κυρίῳ, καὶ ὁ κύριος τῷ σώματι·
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/006/013.yaml
  text: Food is for the stomach[a], and the stomach for food—but God will do away with both it and them. But the body is not for sexual immorality, but for the Lord[c][b], and the Lord for the body.
  footnotes:
  - marker: a
    text: 'Or ''Foods are for the stomach, and the stomach for foods.'' The Greek uses plurals, but the main text renders the saying idiomatically in English.'
    reason: lexical_alternative
  - marker: b
    text: 'Many interpreters take ''Food is for the stomach, and the stomach for food'' as a Corinthian slogan that Paul quotes before correcting it.'
    reason: alternative_reading
  - marker: c
    text: 'Or ''God will destroy both this and these.'' The verb can also be rendered ''abolish'' or ''render inoperative.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 「음식은 배를 위하고 배는 음식을 위한다」 하지만, 하나님께서는 이것도 저것도 다 폐하실 것입니다. 그러나 몸은 음행을 위한 것이 아니라 주를 위한 것이며, 주는 몸을 위하십니다.
  philosophy: optimal-equivalence
