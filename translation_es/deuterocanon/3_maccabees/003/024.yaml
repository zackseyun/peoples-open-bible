translation:
  language: es
  text: Por tanto, estando bien convencidos por pruebas de que estas personas nos son hostiles en todo, y previendo que no sea que, si después surgiera de pronto alguna perturbación, tengamos a estos impíos a nuestras espaldas como traidores y enemigos bárbaros[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enemigos salvajes». El griego βαρβάρους es un calificativo peyorativo en la retórica del hablante, no necesariamente una designación étnica precisa aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así pues
  - Por eso
  lexicon: LSJ
  rationale: Introduce la conclusión inferida del contexto previo; «Por tanto» es natural en español y conserva el valor lógico del griego.
- source_word: τεκμηρίοις
  english_pob_choice: by proofs
  chosen_spanish: por pruebas
  alternatives_spanish:
  - por evidencias
  - por indicios claros
  lexicon: LSJ
  rationale: El dativo expresa medio o base probatoria. «Pruebas» mantiene la idea de fundamento evidencial sin debilitarla a mera sospecha.
- source_word: καλῶς πεπεισμένοι
  english_pob_choice: being well convinced
  chosen_spanish: estando bien convencidos
  alternatives_spanish:
  - estando plenamente convencidos
  - estando firmemente persuadidos
  lexicon: LSJ
  rationale: Conserva el estado resultante de convicción firme; «bien convencidos» refleja el adverbio καλῶς sin volver la frase pesada.
- source_word: τούτους
  english_pob_choice: these people
  chosen_spanish: estas personas
  alternatives_spanish:
  - estos hombres
  - estos
  lexicon: LSJ
  rationale: El demostrativo se refiere al grupo acusado sin especificarlo más; «personas» es natural en español y evita sobredeterminar el sustantivo.
- source_word: κατὰ πάντα
  english_pob_choice: in every way
  chosen_spanish: en todo
  alternatives_spanish:
  - en todos los aspectos
  - completamente
  lexicon: LSJ
  rationale: Expresa alcance total de la acusación; «en todo» es conciso y fiel al sentido comprehensivo.
- source_word: δυσνοεῖν ἡμῖν
  english_pob_choice: are ... ill-disposed toward us
  chosen_spanish: nos son hostiles
  alternatives_spanish:
  - nos tienen mala voluntad
  - piensan hostilmente contra nosotros
  lexicon: LSJ
  rationale: La construcción griega señala actitud hostil hacia «nosotros»; «nos son hostiles» comunica la fuerza relacional de modo claro y formal.
- source_word: προνοούμενοι
  english_pob_choice: taking thought
  chosen_spanish: tomando precauciones
  alternatives_spanish:
  - tomando en cuenta
  - previendo
  lexicon: LSJ
  rationale: En este contexto, el participio implica una previsión práctica ante un posible peligro futuro. «Tomando precauciones» conserva la idea de considerar de antemano con miras a la seguridad.
- source_word: μή ποτε ἐφνιδίου μετέπειτα ταραχῆς ἐνστάσης
  english_pob_choice: lest, if some sudden disturbance should later arise
  chosen_spanish: para que, si después surgiera de pronto alguna perturbación
  alternatives_spanish:
  - no sea que, si luego surgiera un súbito tumulto
  - para que, si más tarde se levantara alguna conmoción repentina
  lexicon: LSJ
  rationale: La cláusula expresa prevención ante un eventual trastorno repentino; «perturbación» mantiene la amplitud de ταραχή y evita precisar indebidamente el tipo de alboroto.
- source_word: κατὰ νώτου
  english_pob_choice: at our back
  chosen_spanish: a nuestras espaldas
  alternatives_spanish:
  - por la retaguardia
  - detrás de nosotros
  lexicon: LSJ
  rationale: El modismo describe peligro desde atrás. «A nuestras espaldas» preserva la imagen idiomática en español.
- source_word: προδότας
  english_pob_choice: traitors
  chosen_spanish: traidores
  alternatives_spanish:
  - delatores
  - desleales
  lexicon: LSJ
  rationale: Término político-militar directo; «traidores» reproduce bien la carga acusatoria del griego.
- source_word: βαρβάρους
  english_pob_choice: barbarian enemies
  chosen_spanish: enemigos bárbaros
  alternatives_spanish:
  - enemigos salvajes
  - enemigos extranjeros
  lexicon: LSJ
  rationale: Sigue la revisión inglesa más cercana a βαρβάρους. En español, «bárbaros» conserva el valor peyorativo del discurso sin convertirlo en una mera designación étnica.
- source_word: πολεμίους
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - adversarios
  - f enemigos
  lexicon: LSJ
  rationale: Término bélico/político estándar; «enemigos» es la equivalencia natural y suficiente.
- source_word: δυσσεβεῖς
  english_pob_choice: ungodly
  chosen_spanish: impíos
  alternatives_spanish:
  - inicuos
  - irreverentes
  lexicon: LSJ
  rationale: Designa falta de piedad religiosa. «Impíos» es preciso, digno y conserva el carácter teológico de la acusación.
theological_decisions:
- issue: Conservar la invectiva del hablante sin suavizarla
  english_pob_reading: Retain the charged terms 'ungodly,' 'traitors,' and 'barbarian enemies' as part of the speaker's rhetoric rather than softening them.
  chosen_spanish_reading: Conservar los términos cargados «impíos», «traidores» y «enemigos bárbaros» como retórica del hablante, sin atenuarlos.
  alternative_spanish_readings:
  - usar lenguaje cívico más suave como «desleales» o «hostiles»
  - neutralizar «bárbaros» como simple «extranjeros»
  rationale: El pasaje presenta una valoración hostil pronunciada por el hablante; suavizarla borraría el tono ideológico y acusatorio del texto. La traducción debe reflejar la fuerza retórica del original, no aprobarla.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que prefirió una equivalencia más exacta para βαρβάρους y mantuvo estable el resto del enunciado. Se conserva el alcance lógico, la alerta preventiva y la carga acusatoria del griego.
  spanish_consistency_notes:
  - «Por tanto» mantiene la relación inferencial expresada por διὸ.
  - «Impíos» traduce δυσσεβεῖς de manera consistente con el registro religioso del término.
  - «A nuestras espaldas» reproduce el modismo κατὰ νώτου sin perder naturalidad en español.
  - «Enemigos bárbaros» sigue la decisión revisada para βαρβάρους y evita diluir la invectiva.
  - La puntuación intenta reflejar la acumulación participial del griego mediante una sola frase extensa, sin añadir contenido no presente en el texto fuente.
