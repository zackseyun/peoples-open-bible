translation:
  language: es
  text: Reconstruirán las ruinas antiguas[a]; levantarán las desolaciones de antes; renovarán las ciudades arruinadas[b], desoladas por generación tras generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las ruinas de antaño». El hebreo עוֹלָם puede referirse a antigüedad remota o larga duración.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las desolaciones de muchas generaciones». El hebreo dice literalmente «desolaciones de generación y generación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָנוּ
  english_pob_choice: they will rebuild
  chosen_spanish: reconstruirán
  alternatives_spanish:
  - edificarán de nuevo
  - volverán a edificar
  lexicon: HALOT
  rationale: El hebreo de בנה, en un contexto de ruinas, expresa construcción restauradora. «Reconstruirán» conserva la fuerza de restauración que el POB explicitó con «rebuild», sin perder el valor literal de edificar.
- source_word: חָרְב֣וֹת עוֹלָ֔ם
  english_pob_choice: the ancient ruins
  chosen_spanish: las ruinas antiguas
  alternatives_spanish:
  - las ruinas de antaño
  - las ruinas de antiguo
  lexicon: HALOT
  rationale: חָרְבוֹת son ruinas; עוֹלָם aquí denota antigüedad o larga duración, no eternidad en sentido metafísico. «Ruinas antiguas» mantiene esa ambigüedad temporal resuelta por el contexto restaurador.
- source_word: שֹׁמְמ֥וֹת רִֽאשֹׁנִ֖ים
  english_pob_choice: the former desolations
  chosen_spanish: las antiguas desolaciones
  alternatives_spanish:
  - las desolaciones de antes
  - las desolaciones primeras
  lexicon: HALOT
  rationale: שֹׁמְמוֹת designa lugares desolados; רִאשֹׁנִים es temporal («anteriores/primeras»). «Antiguas desolaciones» conserva la idea de anterioridad y evita sonar como un ordinal técnico.
- source_word: יְקוֹמֵ֑מוּ
  english_pob_choice: they will raise up
  chosen_spanish: levantarán
  alternatives_spanish:
  - harán levantar
  - restaurarán
  lexicon: HALOT
  rationale: El verbo de קום en este contexto sugiere poner de pie lo caído. «Levantarán» retiene la imagen concreta mejor que «restaurarán», que es más interpretativa.
- source_word: וְחִדְּשׁוּ
  english_pob_choice: they will renew
  chosen_spanish: renovarán
  alternatives_spanish:
  - harán nuevas
  - restablecerán
  lexicon: HALOT
  rationale: חדשׁ significa hacer nuevo o renovar. «Renovarán» preserva la distinción frente a «reconstruirán» y «levantarán».
- source_word: עָרֵי חֹרֶב
  english_pob_choice: the ruined cities
  chosen_spanish: las ciudades arruinadas
  alternatives_spanish:
  - las ciudades devastadas
  - las ciudades en ruinas
  lexicon: HALOT
  rationale: La construcción posesiva caracteriza ciudades marcadas por la ruina. «Arruinadas» es natural en español y mantiene el valor resultativo de חֹרֶב.
- source_word: שֹׁמְמ֖וֹת דּ֥וֹר וָדֽוֹר
  english_pob_choice: the desolations of generation after generation
  chosen_spanish: las desolaciones de generación tras generación
  alternatives_spanish:
  - las desolaciones de muchas generaciones
  - las desolaciones de generación y generación
  lexicon: HALOT
  rationale: La expresión distributiva דּוֹר וָדוֹר se conserva mejor con «generación tras generación», que es idiomática y mantiene la repetición enfática del hebreo.
translation_notes:
  revision_awareness: Se ha mantenido el sentido restaurador del hebreo con una equivalencia óptima cercana al texto, siguiendo el audit trail inglés sin depender mecánicamente de él. No hay revisiones aplicadas en el historial más reciente; el pasaje fue confirmado como de alta concordancia.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o formas de sustitución porque este versículo no contiene el nombre divino.
  - Se prefirió «reconstruirán»/«levantarán»/«renovarán» para conservar la progresión verbal del hebreo.
  - «Generación tras generación» mantiene la fuerza distributiva de דּוֹר וָדוֹר sin suavizarla demasiado.
