translation:
  language: es
  text: 'Por tanto[a], así ha dicho Yahvé: Yo he vuelto a Jerusalén con compasión[b]; mi casa será edificada en ella, declara Yahvé de los ejércitos, y la cuerda de medir será tendida sobre Jerusalén[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por esta razón». La partícula inicia una conclusión a partir del contexto previo.'
    reason: alternative_reading
  - marker: b
    text: 'O: «con misericordias» o «en misericordia». El plural hebreo expresa una compasión abundante.'
    reason: lexical_alternative
  - marker: c
    text: La «cuerda de medir» señala una restauración y reconstrucción planificadas de Jerusalén.
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por esta razón
  - Así que
  lexicon: HALOT
  rationale: Marca una conclusión inferencial respecto del contexto previo. «Por tanto» conserva el enlace discursivo con registro bíblico natural en español.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: thus says Yahweh
  chosen_spanish: así ha dicho Yahvé
  alternatives_spanish:
  - así dice Yahvé
  - así dice el SEÑOR
  lexicon: HALOT
  rationale: La fórmula profética se conserva en registro solemne. «Ha dicho» reproduce bien la fórmula oracular sin forzar un calco, y «Yahvé» sigue el criterio doctrinal del nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino, no una sustitución titulada. «Yahvé» es el equivalente español natural del criterio de la POB en inglés.
- source_word: שַׁבְתִּי
  english_pob_choice: I have returned
  chosen_spanish: Yo he vuelto
  alternatives_spanish:
  - he regresado
  - he tornado
  lexicon: HALOT
  rationale: El perfecto qal expresa una acción ya realizada; el pretérito perfecto compuesto en español comunica bien el retorno decisivo ya efectuado.
- source_word: לִירוּשָׁלִַם
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  lexicon: HALOT
  rationale: La preposición direccional se expresa naturalmente con «a». Mantiene claridad y fluidez en español.
- source_word: בְּרַחֲמִים
  english_pob_choice: with compassion
  chosen_spanish: con compasión
  alternatives_spanish:
  - con misericordia
  - en misericordia
  lexicon: HALOT
  rationale: El plural hebreo expresa una disposición abundante de misericordia/compasión. «Con compasión» es idiomático y conserva el matiz afectivo.
- source_word: בֵּיתִי
  english_pob_choice: my house
  chosen_spanish: mi casa
  alternatives_spanish:
  - mi templo
  lexicon: HALOT
  rationale: Se preserva la expresión literal «mi casa», dejando implícito el referente contextual al templo, como en el original.
- source_word: יִבָּנֶה
  english_pob_choice: will be built
  chosen_spanish: será edificada
  alternatives_spanish:
  - será construida
  - será reedificada
  lexicon: HALOT
  rationale: 'El nifal indica pasivo: una casa/templo que será levantada. «Edificada» conserva el registro bíblico y evita añadir el prefijo re- que no está explícito en el hebreo.'
- source_word: בָּהּ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - en ello
  - en él
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a Jerusalén, ciudad gramaticalmente femenina. «En ella» preserva mejor la personificación del hebreo que «en ello».
- source_word: נְאֻם יְהוָה צְבָאוֹת
  english_pob_choice: declares Yahweh of hosts
  chosen_spanish: declara Yahvé de los ejércitos
  alternatives_spanish:
  - declara Yahvé de los ejércitos celestiales
  - oráculo de Yahvé de los ejércitos
  lexicon: HALOT
  rationale: «Declara» reproduce la fórmula profética נְאֻם. «De los ejércitos» conserva צְבָאוֹת con su imaginería militar/cósmica más directamente que una paráfrasis como «Todopoderoso».
- source_word: קָו
  english_pob_choice: a measuring line
  chosen_spanish: la cuerda de medir
  alternatives_spanish:
  - la línea de medir
  - el cordel de medir
  lexicon: HALOT
  rationale: En contexto de construcción/restauración, קו es una línea o cordel usado para medir. «Cuerda de medir» transmite la imagen concreta de una herramienta de obra.
- source_word: יִנָּטֶה
  english_pob_choice: will be stretched out
  chosen_spanish: será tendida
  alternatives_spanish:
  - será extendida
  - será alargada
  lexicon: HALOT
  rationale: El nifal de נטה aquí describe la extensión de la línea. «Será tendida» suena natural en español y conserva la imagen de desplegar una cuerda.
- source_word: עַל יְרוּשָׁלִָם
  english_pob_choice: over Jerusalem
  chosen_spanish: sobre Jerusalén
  alternatives_spanish:
  - por encima de Jerusalén
  - encima de Jerusalén
  lexicon: HALOT
  rationale: «Sobre» refleja la imagen de la línea extendida por encima de la ciudad para su restauración y trazado.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue el criterio POB de transliterar el Tetragrámaton como nombre propio, no sustituirlo por un título. «Yahvé» es la forma estándar en español para ese mismo criterio.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to make בֵּיתִי explicit as 'temple'
  english_pob_reading: my house
  chosen_spanish_reading: mi casa
  alternative_spanish_readings:
  - mi templo
  rationale: Aunque el referente es el templo, el hebreo dice literalmente «mi casa». La traducción principal preserva esa formulación y deja la identificación contextual sin sobreinterpretarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Whether to preserve the feminine reference to Jerusalem in בָּהּ
  english_pob_reading: in it
  chosen_spanish_reading: en ella
  alternative_spanish_readings:
  - en it
  - en Jerusalén
  rationale: Jerusalén aparece como ciudad femenina en el hebreo. Mantener «en ella» conserva la personificación y la referencia gramatical sin alterar el sentido.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una revisión posterior que ajustó el pronombre de referencia de «in her» a «in it» por naturalidad en inglés; para el español, sin embargo, el femenino de Jerusalén permite conservar «en ella» con plena naturalidad y mayor cercanía al hebreo. También se mantuvo la estructura profética, el nombre divino transliterado y la imagen de la línea de medición sin añadir expansión interpretativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva el registro profético con «declara» y no con una paráfrasis más explicativa.
  - «Mi casa» se mantiene literal para respetar el enlace con el templo sin añadir glosa al cuerpo del versículo.
  - «Jerusalén» recibe pronombre femenino en concordancia con el hebreo.
  - La imagen constructiva de la cuerda/línea de medir se mantiene visible en español.
