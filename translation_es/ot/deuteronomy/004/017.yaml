translation:
  language: es
  text: la forma de cualquier animal que está sobre la tierra[a], la forma de cualquier ave alada que vuela en los cielos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘semejanza’ o ‘imagen’ para ‘forma’ (תַּבְנִית), en referencia a una representación hecha para adoración.
    reason: lexical_alternative
  - marker: b
    text: O ‘en el cielo’ para ‘en los cielos’. El hebreo usa la forma plural ‘cielos’, que puede designar el cielo visible.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּבְנִית
  english_pob_choice: form
  chosen_spanish: forma
  alternatives_spanish:
  - semejanza
  - imagen
  - modelo
  lexicon: HALOT
  rationale: ‘תַּבְנִית’ designa aquí una representación o figura visible prohibida en contexto de culto. ‘Forma’ conserva la idea de figura/representación sin cargar de inmediato una lectura doctrinal más estrecha que el hebreo no exige por sí solo.
- source_word: כָּל
  english_pob_choice: any
  chosen_spanish: cualquier
  alternatives_spanish:
  - todo
  - toda clase de
  lexicon: HALOT
  rationale: Con sustantivos singulares en una lista prohibitiva, ‘cualquier’ expresa mejor el valor indefinido y representativo que ‘todo’ en español.
- source_word: בְּהֵמָה
  english_pob_choice: animal
  chosen_spanish: animal
  alternatives_spanish:
  - bestia
  - ganado
  lexicon: HALOT
  rationale: En este contexto abarca animales terrestres en general, no solo ganado doméstico. ‘Animal’ es claro y fiel al alcance semántico.
- source_word: אֲשֶׁר בָּאָרֶץ
  english_pob_choice: that is on the earth
  chosen_spanish: que está sobre la tierra
  alternatives_spanish:
  - que está en la tierra
  - que está en el país
  lexicon: HALOT
  rationale: ‘Sobre la tierra’ preserva el contraste espacial con ‘en los cielos’ y evita restringir innecesariamente el sentido a ‘el país’.
- source_word: צִפּוֹר
  english_pob_choice: bird
  chosen_spanish: ave
  alternatives_spanish:
  - pájaro
  - ave alada
  lexicon: HALOT
  rationale: ‘צִפּוֹר’ es el término general para ave. ‘Ave’ suena más sobrio y amplio que ‘pájaro’ en español bíblico contemporáneo.
- source_word: כָּנָף
  english_pob_choice: winged
  chosen_spanish: alada
  alternatives_spanish:
  - con alas
  - de alas
  lexicon: HALOT
  rationale: La construcción hebrea funciona descriptivamente como ‘ave alada’. ‘Alada’ reproduce el rasgo de ‘winged’ con naturalidad en español.
- source_word: תָּעוּף
  english_pob_choice: flies
  chosen_spanish: vuela
  alternatives_spanish:
  - que vuela
  - que anda volando
  lexicon: HALOT
  rationale: El imperfecto en cláusula relativa describe una clase general. ‘Vuela’ comunica el sentido de manera natural y digna en español.
- source_word: בַּשָּׁמַיִם
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en los aires
  lexicon: HALOT
  rationale: Se conserva el plural hebreo mediante ‘los cielos’, manteniendo el registro elevado del texto y el contraste con la tierra.
theological_decisions:
- issue: Representación de imágenes de culto
  english_pob_reading: '''form'' refers to a representation made for worship, with alternatives ''likeness'' or ''image''.'
  chosen_spanish_reading: '''forma'' deja abierta la referencia a una representación visible sin fijarla excesivamente, aunque el contexto la orienta a imágenes de culto prohibidas.'
  alternative_spanish_readings:
  - '''semejanza'''
  - '''imagen'''
  rationale: El hebreo תַּבְנִית puede abarcar forma, figura, semejanza o imagen. En este versículo, el catálogo de criaturas funciona dentro de la prohibición de fabricar representaciones para adoración, pero la palabra misma no exige traducir de modo más interpretativo que el texto fuente.
  doctrine_reference: Éxodo 20:4; Deuteronomio 4:16-18
translation_notes:
  revision_awareness: El texto inglés auditado se mantiene sin cambios en esta pasada; se conserva su estructura enumerativa y sus dos notas léxicas, ajustadas al español con la misma distinción semántica entre תַּבְנִית y בַּשָּׁמַיִם.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ como norma del proyecto cuando corresponda; este versículo no contiene el Tetragrámaton.
  - Se prefirió ‘cielos’ para reflejar el plural hebreo y mantener coherencia con el registro bíblico del pasaje.
  - ‘Ave’ se eligió sobre ‘pájaro’ por consistencia estilística con un registro bíblico sobrio y amplio.
