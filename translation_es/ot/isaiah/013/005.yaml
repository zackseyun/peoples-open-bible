- from: 'Vienen de una tierra distante[a], desde el extremo de los cielos: Yahvé y las armas de su furor[b], para destruir toda la tierra[c].'
  to: Vienen de una tierra lejana, desde el extremo de los cielos[a]—Yahvé y las armas de su furor[b]—, para destruir toda la tierra[c].
  rationale: Se corrigen las notas para que coincidan con la evidencia fuente y la auditoría inglesa, se mejora la naturalidad de 'tierra lejana', y se ajusta la puntuación para reflejar mejor la estructura parentética del versículo sin cambiar su sentido.
