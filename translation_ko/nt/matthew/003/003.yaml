lexical_decisions:
- source_word: κυρίου
  english_pob_choice: of the Lord
  chosen_korean: 주의
  alternatives_korean:
  - 야훼의
  lexicon: BDAG
  rationale: 이사야 40:3의 70인역 인용에서 κύριος는 본래 야훼이지만, 본 인용은 마태가 70인역을 그대로 채택한 형태이며 한국 성서 정형은 「주」를 유지한다. 본 번역은 직접 OT 인용 중 야훼 본문을 「야훼」로 회복하는 정책을 두지만, 마태가 의도적으로 「주」 호칭으로 예수와 야훼를 겹쳐 읽도록 한 정형(「주의 길을 예비하라」)에서는 한국어 정형 「주의 길」을 그대로 보존해 마태의 의도를 살린다.
theological_decisions:
- issue: 이사야 40:3 인용의 κύριος를 「주」로 둘지 「야훼」로 회복할지
  chosen_reading: 주의 길
  alternative_readings:
  - 야훼의 길
  rationale: 본 번역 정책상 야훼 본문의 LXX κύριος는 「야훼」로 회복할 수 있으나, 마태 3:3의 인용은 예수와 야훼의 정체성을 겹쳐 읽도록 의도된 정형이며 한국어에서도 「주의 길」이 그 신학적 겹침을 가장 자연스럽게 보존한다.
  doctrine_reference: 'Glossary: κύριος (= YHWH) → 야훼 / 주; preserve Matthew''s deliberate identification'
