    issue: La nota [a] está colocada en «muchos días» pero explica «escorpiones».
    rationale: La disciplina de notas exige que el marcador aparezca exactamente en la palabra o frase pertinente. El anclaje actual induce a error y no corresponde al contenido de la nota.
  - severity: medium
    issue: «Frente al santuario» debilita la hostilidad de ἐπὶ τὸ ἁγίασμα.
    rationale: En contexto militar, la auditoría inglesa justificó «against the sanctuary». «Contra el santuario» preserva mejor la orientación adversativa sin sobretraducir a «asedió».
  - severity: low
    issue: La coma antes de «y escorpiones» es innecesaria.
    rationale: La coordinación simple de la lista fluye mejor en español sin esa pausa.
