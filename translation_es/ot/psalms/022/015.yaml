translation:
  language: es
  text: He sido derramado como agua, y todos mis huesos se han dislocado; mi corazón se ha vuelto como cera, derretido dentro de mí[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más literalmente, «derretido dentro de mis entrañas».
