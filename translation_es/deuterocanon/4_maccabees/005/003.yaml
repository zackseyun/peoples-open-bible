translation:
  language: es
  text: Pero si algunos no quisieran comer alimento contaminado[a], que sean quebrantados en la rueda[b] y se les dé muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «alimento profano» o «carne profanada». El verbo griego expresa comer lo que contamina ritualmente, sin nombrar aquí el objeto de manera separada.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ser torturados en la rueda» o «ser descoyuntados en la rueda». El participio griego remite al suplicio de la rueda; «quebrantados en la rueda» hace explícito el método probable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δέ τινες
  english_pob_choice: But if any
  chosen_spanish: Pero si algunos
  alternatives_spanish:
  - Mas si alguno de ellos
  - Pero si alguien
  lexicon: LSJ
  rationale: τινες es plural indefinido; en español, «algunos» conserva mejor ese valor que un singular genérico. «Pero» mantiene el matiz de transición adversativa del griego.
- source_word: μὴ θέλοιεν
  english_pob_choice: should be unwilling
  chosen_spanish: no quisieran
  alternatives_spanish:
  - no estuvieran dispuestos
  - se negaran a
  lexicon: LSJ
  rationale: θέλω expresa voluntad/deseo; «no quisieran» reproduce la idea volitiva sin endurecerla a una negativa meramente formal como «se negaran».
- source_word: μιεροφαγῆσαι
  english_pob_choice: to eat defiling food
  chosen_spanish: comer alimento profanador
  alternatives_spanish:
  - comer alimento profanado
  - comer comida contaminada ritualment​e
  - comer carne profanada
  lexicon: LSJ
  rationale: El verbo compuesto indica comer algo que contamina ritualmente. «Alimento profanador» conserva la fuerza cultual y evita añadir «carne», que el griego no menciona explícitamente en esta forma verbal.
- source_word: τροχισθέντας
  english_pob_choice: be broken on the wheel
  chosen_spanish: sean quebrantados en la rueda
  alternatives_spanish:
  - sean descoyuntados en la rueda
  - sean torturados en la rueda
  - sean quebrados en la rueda
  lexicon: LSJ
  rationale: El participio alude al suplicio de la rueda; «quebrantados en la rueda» conserva el carácter físico del castigo y sigue de cerca la imagen histórica que la POB inglesa explicitó con «broken on the wheel».
- source_word: ἀναιρεθῆναι
  english_pob_choice: put to death
  chosen_spanish: muertos
  alternatives_spanish:
  - ejecutados
  - dados muerte
  - matados
  lexicon: LSJ
  rationale: ἀναιρεῖν puede significar matar o ejecutar. En español, «muertos» mantiene la concisión del infinitivo pasivo en este contexto judicial, aunque «ejecutados» sería una opción más interpretativa.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa concuerdan estrechamente; no se registran revisiones sustantivas. Se conserva la ambigüedad léxica principal de μιεροφαγῆσαι y la referencia al castigo en la rueda de τροχισθέντας.
  spanish_consistency_notes:
  - Se usó «alimento» para mantener registro culto y no forzar «carne» donde el griego no la dice explícitamente.
  - Se evitó «SEÑOR» u այլ terminología teológica no pertinente; el pasaje no contiene vocabulario divino.
  - «Muertos» se eligió por concisión y fidelidad al infinitivo pasivo final, sin añadir un sujeto agente explícito.
