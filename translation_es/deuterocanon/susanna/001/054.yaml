lexical_decisions:
- source_word: νῦν οὖν
  english_pob_choice: Now then
  chosen_spanish: Ahora pues
  alternatives_spanish:
  - Ahora entonces
  - Pues ahora
  lexicon: LSJ
  rationale: La combinación introduce una transición inferencial e inmediata. «Ahora pues» suena natural en español y conserva el tono de amonestación o desafío judicial del griego.
- source_word: ταύτην
  english_pob_choice: this woman
  chosen_spanish: esta mujer
  alternatives_spanish:
  - esta
  - esta persona
  lexicon: LSJ
  rationale: El griego dice literalmente «esta [mujer]», pero el referente es Susana. «Esta mujer» explicita el referente sin añadir contenido ajeno al contexto.
- source_word: εἴπερ εἶδες
  english_pob_choice: if you saw
  chosen_spanish: si viste
  alternatives_spanish:
  - si en verdad viste
  - puesto que viste
  lexicon: LSJ
  rationale: Se conserva la condición de prueba sin sobrecargar el español con una glosa enfática. «Si viste» mantiene el contraste retórico del interrogatorio.
- source_word: εἰπὸν
  english_pob_choice: tell us
  chosen_spanish: dinos
  alternatives_spanish:
  - di
  - cuéntanos
  lexicon: LSJ
  rationale: En el contexto de un examen público, el imperativo plural implícito se expresa naturalmente como «dinos» en español, reflejando la demanda de respuesta directa.
- source_word: Ὑπὸ τί δένδρον
  english_pob_choice: under what tree
  chosen_spanish: ¿bajo qué árbol?
  alternatives_spanish:
  - ¿debajo de qué árbol?
  - ¿bajo cuál árbol?
  lexicon: LSJ
  rationale: «Bajo qué árbol» reproduce la pregunta locativa de forma natural en español. Se eligió «bajo» frente a «debajo de» por fluidez y registro narrativo.
- source_word: ἴδες
  english_pob_choice: did you see
  chosen_spanish: viste
  alternatives_spanish:
  - viste tú
  - habías visto
  lexicon: LSJ
  rationale: En la pregunta directa del español, el auxiliar «did» no se necesita; «viste» transmite correctamente la acción pasada interrogada.
- source_word: ὁμιλοῦντας ἀλλήλοις
  english_pob_choice: talking with each other
  chosen_spanish: hablando entre sí
  alternatives_spanish:
  - conversando entre sí
  - hablando el uno con el otro
  lexicon: LSJ
  rationale: La reciprocidad de ἀλλήλοις se expresa de modo idiomático con «entre sí». «Hablando» conserva el aspecto de conversación social del verbo griego.
- source_word: σχῖνον
  english_pob_choice: a mastic tree
  chosen_spanish: un lentisco
  alternatives_spanish:
  - un árbol de lentisco
  - un árbol mastic
  lexicon: LSJ
  rationale: σχῖνος designa el lentisco/mástic tree. En español, «lentisco» es la opción más directa y botánicamente reconocible; se evita «mastic» por ser menos natural.
