translation:
  language: es
  text: Y por la buena mano de nuestro Dios sobre nosotros[a], nos trajeron a un hombre de discernimiento, de los hijos de Mahli, hijo de Leví, hijo de Israel; a saber, Sherebías, y sus hijos y sus hermanos, dieciocho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como la buena mano de nuestro Dios estaba sobre nosotros». El hebreo expresa un modismo de la providencia favorable de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבִיאוּ
  english_pob_choice: they brought
  chosen_spanish: nos trajeron
  alternatives_spanish:
  - trajeron
  - nos llevaron
  - hicieron venir
  lexicon: HALOT
  rationale: El verbo hebreo en hifil expresa ‘hacer venir’ o ‘traer’. En español, ‘nos trajeron’ conserva el sentido narrativo natural en este contexto y refleja que el beneficio recae sobre ‘nosotros’.
- source_word: כְּיַד אֱלֹהֵינוּ הַטּוֹבָה עָלֵינוּ
  english_pob_choice: by the good hand of our God upon us
  chosen_spanish: por la buena mano de nuestro Dios sobre nosotros
  alternatives_spanish:
  - según la buena mano de nuestro Dios sobre nosotros
  - como la buena mano de nuestro Dios estaba sobre nosotros
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática de la ‘mano’ de Dios, que en Esdras-Nehemías comunica providencia favorable. ‘Por’ expresa bien el medio o la causa providencial sin borrar la metáfora.
- source_word: אִישׁ שֶׂכֶל
  english_pob_choice: a man of insight
  chosen_spanish: un hombre entendido
  alternatives_spanish:
  - un hombre de discernimiento
  - un hombre sabio
  - un hombre de entendimiento
  lexicon: HALOT
  rationale: שׂכל aquí apunta a prudencia e inteligencia práctica, no simplemente a habilidad técnica. ‘Entendido’ comunica bien esa cualidad en español bíblico moderno sin sonar arcaico.
- source_word: מִבְּנֵי מַחְלִי
  english_pob_choice: from the sons of Mahli
  chosen_spanish: de los hijos de Mahli
  alternatives_spanish:
  - de los descendientes de Mahli
  - de la familia de Mahli
  lexicon: HALOT
  rationale: En genealogías, בני puede significar ‘hijos’ o ‘descendientes’. ‘Hijos’ conserva la forma hebrea y funciona de manera clara en una lista genealógica.
- source_word: בֶּן לֵוִי בֶּן יִשְׂרָאֵל
  english_pob_choice: son of Levi, son of Israel
  chosen_spanish: hijo de Leví, hijo de Israel
  alternatives_spanish:
  - descendiente de Leví, descendiente de Israel
  lexicon: HALOT
  rationale: Se preserva la fórmula genealógica repetida del hebreo. ‘Hijo’ es la equivalencia más directa y mantiene la estructura del linaje.
- source_word: וְשֵׁרֵבְיָה
  english_pob_choice: namely Sherebiah
  chosen_spanish: Sherebías
  alternatives_spanish:
  - y Sherebías
  - es decir, Sherebías
  lexicon: HALOT
  rationale: El nombre propio se adapta a la forma española usual. En este contexto, la aposición se entiende como identificación del hombre descrito.
- source_word: וּבָנָיו וְאֶחָיו
  english_pob_choice: and his sons and his brothers
  chosen_spanish: y sus hijos y sus hermanos
  alternatives_spanish:
  - junto con sus hijos y sus hermanos
  - y sus hijos y sus parientes
  lexicon: HALOT
  rationale: La relación familiar se conserva de modo literal. ‘Hijos’ y ‘hermanos’ reflejan con precisión la lista del hebreo sin ampliarla.
- source_word: שְׁמֹנָה עָשָׂר
  english_pob_choice: eighteen
  chosen_spanish: dieciocho
  alternatives_spanish:
  - dieciocho hombres
  lexicon: HALOT
  rationale: El hebreo presenta solo el número. En español, ‘dieciocho’ basta y evita añadir un sustantivo no presente en el texto.
theological_decisions:
- issue: La idiomática ‘buena mano’ de Dios como providencia favorable
  english_pob_reading: by the good hand of our God upon us
  chosen_spanish_reading: por la buena mano de nuestro Dios sobre nosotros
  alternative_spanish_readings:
  - como la buena mano de nuestro Dios estaba sobre nosotros
  - según la buena mano de nuestro Dios sobre nosotros
  rationale: La frase conserva la metáfora hebrea de la ‘mano’ divina, que en este libro expresa favor y providencia, no una descripción corporal. ‘Por’ permite leer la expresión como causa o medio providencial sin despojarla de su imagen.
  doctrine_reference: Providencia divina; Esdras-Nehemías 8:18; filosofía de traducción §1 y §3
translation_notes:
  revision_awareness: El draft sigue de cerca la lectura inglesa aprobada y el hebreo masorético, sin cambios de sentido sustanciales. Se conserva la ambigüedad idiomática de ‘la buena mano de nuestro Dios’ mediante una nota alternativa en español, como hizo el POB inglés.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como forma estándar del proyecto solo cuando aparece el nombre divino explícito; aquí el texto dice ‘nuestro Dios’, por lo que corresponde ‘Dios’.
  - Se mantuvo ‘Sherebías’ como forma española del nombre propio, consistente con uso bíblico en español.
  - ‘Hombre entendido’ corresponde mejor a שׂכל que ‘sabio’ en este contexto genealógico/narrativo, evitando sobreinterpretar una habilidad específica.
