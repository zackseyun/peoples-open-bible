lexical_decisions:
- source_word: יָשׁוּבוּ
  english_pob_choice: Let them turn back
  chosen_spanish: Que retrocedan
  alternatives_spanish:
  - Que vuelvan atrás
  - Que sean echados atrás
  lexicon: HALOT
  rationale: En un contexto imprecatorio/jussivo, el verbo hebreo expresa deseo de que se retiren o sean puestos en retirada. «Que retrocedan» conserva bien la fuerza volitiva y suena natural en español bíblico moderno.
- source_word: עַל עֵקֶב
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - por motivo de
  lexicon: HALOT
  rationale: La locución expresa relación causal o de consecuencia. «Por causa de» mantiene el sentido idiomático sin forzar una traducción literal de «talón» o de una construcción extraña en español.
- source_word: בָּשְׁתָּם
  english_pob_choice: their shame
  chosen_spanish: su vergüenza
  alternatives_spanish:
  - su deshonra
  - su oprobio
  lexicon: HALOT
  rationale: El campo semántico incluye vergüenza, deshonra y humillación. «Vergüenza» es la opción más directa y concisa; el posesivo singular/plural en español puede abarcar al grupo referido por el hebreo.
- source_word: הָאֹמְרִים
  english_pob_choice: those who say
  chosen_spanish: los que dicen
  alternatives_spanish:
  - los que están diciendo
  - quienes dicen
  lexicon: HALOT
  rationale: El participio sustantivado designa al grupo caracterizado por esa acción. «Los que dicen» preserva la identificación descriptiva y resulta idiomático en español.
- source_word: הֶאָח הֶאָח
  english_pob_choice: Aha, aha!
  chosen_spanish: ¡Ja, ja!
  alternatives_spanish:
  - ¡Ajá, ajá!
  - ¡Ja, ajá!
  lexicon: HALOT
  rationale: La interjección comunica burla y regocijo malévolo. En español, «¡Ja, ja!» transmite mejor el tono de mofa que «ajá», que suele sonar más afirmativo o de descubrimiento que burlón.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran consenso alto y sin revisiones aplicadas; la única variación relevante es la equivalencia idiomática de עַל עֵקֶב, que en español puede expresarse con «por causa de» o «a causa de».
  spanish_consistency_notes:
  - Se mantiene un tono imprecatorio breve y directo, acorde con el género.
  - No se introduce «SEÑOR» ni otras sustituciones teológicas, porque el verso no contiene el Tetragrámaton.
  - Se usa «retrocedan» para conservar la fuerza de 'turn back' sin volverlo pasivo.
  - La exclamación se adapta a una burla natural en español, sin perder la repetición del original.
