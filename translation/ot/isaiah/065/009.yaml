id: ISA.65.9
reference: Isaiah 65:9
source:
  edition: WLC
  text: וְ/הוֹצֵאתִ֤י מִֽ/יַּעֲקֹב֙ זֶ֔רַע וּ/מִ/יהוּדָ֖ה יוֹרֵ֣שׁ הָרָ֑/י וִ/ירֵשׁ֣וּ/הָ בְחִירַ֔/י וַ/עֲבָדַ֖/י יִשְׁכְּנוּ שָֽׁמָּ/ה־׃
translation:
  text: And I will bring forth offspring from Jacob[a], and from Judah an heir of my mountains; my chosen ones will possess it[b], and my servants will dwell there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seed from Jacob.' The Hebrew זֶרַע is a collective singular that can mean 'seed,' 'offspring,' or 'descendants.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will inherit them.' The same Hebrew root is used for both 'an heir' and 'will possess them,' emphasizing inheritance and possession together.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹצֵאתִי
  chosen: And I will bring forth
  alternatives:
  - And I will bring out
  - And I will produce
  lexicon: HALOT
  rationale: The Hiphil of יצא here is causative ('cause to come out'). 'Bring forth' is natural English and fits the metaphor of descendants emerging from Jacob/Judah without over-paraphrasing.
- source_word: מִיַּעֲקֹב
  chosen: from Jacob
  alternatives:
  - out of Jacob
  lexicon: HALOT
  rationale: The preposition מן is straightforwardly 'from.' 'Jacob' here stands metonymically for the covenant people descended from Jacob/Israel, but the proper name should be retained in translation.
- source_word: זֶרַע
  chosen: offspring
  alternatives:
  - seed
  - descendants
  lexicon: HALOT
  rationale: זֶרַע can mean literal seed or figurative offspring/descendants. 'Offspring' preserves the collective singular sense in readable modern English better than the more traditional but potentially opaque 'seed.'
- source_word: וּמִיהוּדָה
  chosen: and from Judah
  alternatives:
  - and out of Judah
  lexicon: HALOT
  rationale: Parallel to 'from Jacob'; Judah is retained as the tribal/geographical name rather than interpreted.
- source_word: יוֹרֵשׁ
  chosen: an heir
  alternatives:
  - one who inherits
  - a possessor
  lexicon: HALOT
  rationale: The participle of ירש denotes one who inherits/possesses. 'An heir' is concise and idiomatic, while still allowing the following object 'my mountains' to define what is inherited.
- source_word: הָרָי
  chosen: my mountains
  alternatives:
  - my hill country
  - my mountainside
  lexicon: HALOT
  rationale: Plural 'mountains' is the plain sense of הָרִים with 1cs suffix. It likely refers to the mountainous land of Judah/Zion region, but the concrete image should be preserved rather than generalized to 'land.'
- source_word: וִירֵשׁוּהָ
  chosen: will possess them
  alternatives:
  - will inherit them
  lexicon: HALOT
  rationale: The verb repeats ירש. Because the object refers back to the plural 'my mountains,' English regularizes the suffix sense as plural 'them.' 'Possess' fits territorial occupation language naturally; 'inherit' is possible but can sound less concrete in English here.
- source_word: בְחִירַי
  chosen: my chosen ones
  alternatives:
  - my elect
  lexicon: HALOT
  rationale: The plural adjective/substantive means those chosen by God. 'My chosen ones' is transparent and avoids importing later theological freight that 'elect' may carry in English, while preserving the covenantal sense.
- source_word: וַעֲבָדַי
  chosen: my servants
  alternatives:
  - my slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in divine-human covenant contexts 'servants' is the most idiomatic and contextually appropriate rendering in English. The bonded-status emphasis is not foregrounded here as it is in some NT doulos contexts.
- source_word: יִשְׁכְּנוּ שָׁמָּה
  chosen: will dwell there
  alternatives:
  - will live there
  - will settle there
  lexicon: HALOT
  rationale: שכן commonly means dwell/settle. 'Dwell there' preserves the elevated but still readable register and the sense of enduring habitation.
