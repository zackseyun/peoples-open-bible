theological_decisions:
- issue: Interpretive force of the second colon
  chosen_reading: 'The verse warns against self-directed, wisdom-based striving for wealth: ''stop relying on your own understanding.'''
  alternative_readings:
  - '''cease from your own wisdom/understanding'' as a general call to abandon the pursuit'
  - '''desist because of your discernment'''
  rationale: The Hebrew is somewhat compressed. The most natural sense in context is not a rejection of wisdom itself—impossible in Proverbs—but a warning to stop depending on one's own cleverness in the pursuit of riches. This preserves the proverb's moral force without creating tension with the book's positive valuation of true wisdom.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
