  - severity: low
    issue: «quedará impuro» para וְטָמֵא
    rationale: Expresa resultado, pero añade un matiz ingresivo más fuerte que el necesario. «Será impuro» reproduce mejor la fórmula legal simple y mantiene naturalidad en español.
