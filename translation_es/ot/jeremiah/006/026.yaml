    reason: lexical_alternative
  - marker: c
    text: Lit. «duelo de un único [hijo]»; la expresión hebrea intensifica el dolor como el de perder al hijo único.
    reason: lexical_alternative
  revision_rationale: Se ajusta el español para mayor naturalidad ('cenizas'), se preserva en nota la alternativa léxica documentada para el acto físico de duelo en ceniza, y se reubica la nota de 'hijo único' al lugar semánticamente correcto. No se requieren cambios doctrinales ni estructurales.
