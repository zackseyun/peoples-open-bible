review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue correctamente el hebreo como texto principal, conserva «temor de Yahvé» y mantiene la divergencia griega en nota. Sin embargo, «su fruto» debilita el valor agrícola más amplio de תְּבוּאָתָהּ («produce/yield») y reduce innecesariamente la imagen del original.
  spanish_quality_summary: El español es claro y digno. La sintaxis es natural y la personificación femenina se conserva bien con «ella». Aun así, «fruto» suena algo más estrecho y menos fiel que «cosecha» o «producción/rendimiento»; conviene un ajuste pequeño para alinear mejor sentido y estilo.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Yahvé» está correctamente usado, «sabiduría» y «temor» son apropiados, y la nota textual refleja bien la política hebreo-primaria con variante griega. La única reserva léxica importante es תְּבוּאָתָהּ, mejor como «cosecha» que como «fruto».'
  issues:
  - severity: medium
    issue: «su fruto» para תְּבוּאָתָהּ
    rationale: El hebreo se refiere más ampliamente a producto, rendimiento o cosecha. «Fruto» en español tiende a estrechar la imagen hacia fruto individual o resultado abstracto, mientras que «cosecha» conserva mejor el campo agrícola y suena natural.
  - severity: low
    issue: La nota griega omite el posible sujeto neutro/ambiguo de ἐξώμβρισεν
    rationale: No es un error grave, porque la nota solo documenta la lectura alternativa, pero la formulación actual podría sugerir una interpretación más cerrada de la cuenta. Aun así, puede mantenerse por naturalidad española.
  revised_spanish_text: El temor de Yahvé[a] es el comienzo de la sabiduría, y ella sacia con la abundancia de su cosecha.
  revised_footnotes:
  - marker: a
    text: 'Griego: «Derramó conocimiento y entendimiento, y exaltó la gloria de los que la poseen». El griego difiere marcadamente del hebreo conservado aquí y probablemente refleja una forma textual distinta.'
    reason: alternative_reading
  revision_rationale: 'Se hace una reparación menor: «cosecha» representa mejor תְּבוּאָתָהּ que «fruto», preservando la imagen agrícola amplia del hebreo y la decisión léxica del POB («produce/yield»). Se mantiene el resto del verso porque refleja fielmente el sentido fuente y la personificación femenina. La nota se conserva con una redacción natural en español.'
