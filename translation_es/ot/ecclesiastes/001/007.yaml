translation:
  language: es
  text: Todas las corrientes fluyen hacia el mar[a], y el mar no está lleno; al lugar adonde las corrientes fluyen[b], allí vuelven para fluir de nuevo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ríos' para 'corrientes'. El hebreo נְחָלִים puede referirse a corrientes, wadis o cauces de río según el contexto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'al lugar adonde las corrientes van, allí vuelven para ir'. La redacción puede evocar el ciclo recurrente de las aguas sin describir explícitamente su mecanismo.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְחָלִים
  english_pob_choice: streams
  chosen_spanish: arroyos
  alternatives_spanish:
  - corrientes
  - ríos
  - cauces
  lexicon: HALOT
  rationale: נחל puede referirse a arroyo, torrente, cauce o wadi según el contexto. En este pasaje poético, 'arroyos' comunica bien el movimiento continuo del agua sin volverlo demasiado técnico ni sobredeterminar grandes ríos permanentes.
- source_word: הֹלְכִים
  english_pob_choice: flow
  chosen_spanish: fluyen
  alternatives_spanish:
  - van
  - marchan
  - se dirigen
  lexicon: HALOT
  rationale: Aunque הלך en sentido básico es 'ir' o 'caminar', con aguas el español natural es 'fluir'. Así se conserva la imagen sin un calco rígido.
- source_word: יָם
  english_pob_choice: sea
  chosen_spanish: mar
  alternatives_spanish:
  - océano
  lexicon: HALOT
  rationale: El sentido normal de יָם es 'mar'. 'Océano' sería más específico de lo que el hebreo requiere.
- source_word: אֵינֶנּוּ מָלֵא
  english_pob_choice: is not full
  chosen_spanish: no se llena
  alternatives_spanish:
  - no está lleno
  - nunca se llena
  lexicon: HALOT
  rationale: La frase describe el estado del mar; en español, 'no se llena' expresa con claridad el resultado continuo sin añadir explícitamente 'nunca' al texto principal.
- source_word: מְקוֹם
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - ubicación
  lexicon: HALOT
  rationale: מקום significa literalmente 'lugar'. 'Lugar' mantiene la neutralidad del hebreo y evita introducir la idea interpretativa de 'fuente' en el texto principal.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: HALOT
  rationale: '''Allí'' preserva el énfasis resumptivo del hebreo en un español natural y literario.'
- source_word: שָׁבִים
  english_pob_choice: return
  chosen_spanish: vuelven
  alternatives_spanish:
  - regresan
  - retornan
  lexicon: HALOT
  rationale: שוב suele significar 'volver' o 'regresar'. 'Vuelven' es idiomático en español y mantiene la idea de reiteración.
- source_word: לָלָכֶת
  english_pob_choice: to flow again
  chosen_spanish: para fluir de nuevo
  alternatives_spanish:
  - para volver a fluir
  - para ir de nuevo
  lexicon: HALOT
  rationale: El infinitivo es literalmente 'ir', pero con el sujeto acuático el español requiere 'fluir'. 'De nuevo' refleja la iteración que el inglés POB destacó con 'again' y la construcción de retorno del verso.
