translation:
  language: es
  text: Sin embargo, si sobrevive por un día o dos, no se tomará venganza[a], porque es su dinero[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no será castigado». El hebreo habla más específicamente de que no se ejecute venganza o retribución legal.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «porque es su dinero». La expresión conserva de forma explícita el valor económico del esclavo para su amo.'
    reason: cultural_note
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: However
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - No obstante
  - Solamente
  lexicon: HALOT
  rationale: Introduce una restricción o excepción respecto del caso anterior. 'Sin embargo' expresa bien el matiz adversativo en español actual sin perder la fuerza jurídica del hebreo.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - en caso de que
  lexicon: HALOT
  rationale: Es la partícula condicional normal en español y reproduce con claridad la estructura casuística del texto.
- source_word: יוֹם א֥וֹ יוֹמַיִם
  english_pob_choice: for a day or two
  chosen_spanish: por uno o dos días
  alternatives_spanish:
  - un día o dos
  - durante un día o dos
  lexicon: HALOT
  rationale: El hebreo expresa un lapso breve; 'por uno o dos días' suena natural en español y conserva el valor temporal limitado sin añadir implicaciones de recuperación.
- source_word: יַעֲמֹד
  english_pob_choice: survives
  chosen_spanish: sobrevive
  alternatives_spanish:
  - permanece con vida
  - se mantiene vivo
  - continúa vivo
  lexicon: HALOT
  rationale: En este contexto legal el verbo no significa simplemente 'estar de pie', sino seguir con vida tras la agresión. 'Sobrevive' refleja esa fuerza con naturalidad en español.
- source_word: לֹא יֻקַּם
  english_pob_choice: he shall not be avenged
  chosen_spanish: no será vengado
  alternatives_spanish:
  - no se le hará justicia vengativa
  - no será castigado
  - no se tomará venganza
  lexicon: HALOT
  rationale: El pasivo de נקם conserva la idea de retribución legal o vengativa. 'No será vengado' mantiene la dureza del hebreo y evita suavizarlo a un simple castigo general.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduces the legal rationale. 'Porque' is the most direct and readable causal connector in Spanish.
- source_word: כַסְפּוֹ
  english_pob_choice: his money
  chosen_spanish: su dinero
  alternatives_spanish:
  - su propiedad
  - su plata
  - su capital
  lexicon: HALOT
  rationale: '''Dinero'' traduce de manera directa la imagen económica del hebreo. En este contexto señala el valor económico del esclavo para su amo, sin convertirlo en una paráfrasis más amplia como ''propiedad''.'
- source_word: הוּא
  english_pob_choice: he is
  chosen_spanish: es
  alternatives_spanish:
  - él es
  lexicon: HALOT
  rationale: El hebreo usa pronombre enfático con el predicado nominal. En español basta el verbo copulativo; el sujeto ya queda claro por el contexto. La omisión explícita de 'él' evita una redundancia poco natural.
theological_decisions:
- issue: Rationale legal-económica en una ley sobre esclavitud
  english_pob_reading: Retain the blunt economic rationale 'for he is his money' without softening.
  chosen_spanish_reading: 'Conservar la razón económica desnuda: ''porque es su dinero''.'
  alternative_spanish_readings:
  - porque es su propiedad
  - porque la pérdida es suya
  - porque es su inversión
  rationale: El hebreo presenta la justificación en términos económicos de forma directa. La traducción conserva esa dureza sin moralizarla ni suavizarla, para respetar la transparencia del texto fuente.
  doctrine_reference: Translation philosophy 1, 6
- issue: Valor del verbo יַעֲמֹד en el caso legal
  english_pob_reading: '''Survives'' rather than a literal ''stands'' or a stronger ''recovers''.'
  chosen_spanish_reading: '''Sobrevive'' como equivalente funcional de que sigue con vida.'
  alternative_spanish_readings:
  - permanece vivo
  - se recupera
  rationale: El contexto no requiere indicar recuperación completa, solo que no murió de inmediato. 'Sobrevive' evita tanto el calco como una interpretación excesiva.
  doctrine_reference: Translation philosophy 1, 4
translation_notes:
  revision_awareness: La versión inglesa más reciente pasó de 'remains alive' a 'survives' para hacer más natural el verbo; la redacción española adopta esa equivalencia funcional. También se conservó la lectura fuerte de לֹא יֻקַּם y la justificación económica literal del cierre.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma base cuando el texto lo requiera; aquí no aparece.
  - Se usa 'sobrevive' para יַעֲמֹד, preservando el matiz de continuar con vida tras la agresión.
  - Se evita 'siervo' porque el contexto legal y el audit trail inglés sostienen la fuerza de esclavo/valor económico, aunque aquí la frase final se expresa con 'dinero' para reflejar כַסְפּוֹ de modo directo.
  - La voz pasiva 'no será vengado' reproduce la pasiva del hebreo sin introducir sujeto expreso.
