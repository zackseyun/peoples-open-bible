id: AMO.4.5
reference: Amos 4:5
source:
  edition: WLC
  text: וְ/קַטֵּ֤ר מֵֽ/חָמֵץ֙ תּוֹדָ֔ה וְ/קִרְא֥וּ נְדָב֖וֹת הַשְׁמִ֑יעוּ כִּ֣י כֵ֤ן אֲהַבְתֶּם֙ בְּנֵ֣י יִשְׂרָאֵ֔ל נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה׃
translation:
  text: And burn a thank offering from leavened bread[a], and proclaim freewill offerings—announce them! For this is what you have loved, O sons of Israel[b], declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with leaven' or 'of leavened bread'; the Hebrew phrase links leavened material with the thank offering.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקַטֵּר
  chosen: And burn
  alternatives:
  - and offer up in smoke
  - and make smoke
  lexicon: HALOT
  rationale: The piel imperative of קטר refers to causing an offering to go up in smoke on the altar. 'Burn' is concise and natural in English while preserving the cultic action. The imperative is retained, matching the sarcastic prophetic summons in context.
- source_word: מֵחָמֵץ
  chosen: from leavened bread
  alternatives:
  - with leaven
  - of leavened bread
  lexicon: HALOT
  rationale: חָמֵץ denotes leaven or what is leavened. Because the phrase modifies תודה, and English needs a more explicit expression, 'from leavened bread' makes clear that the thank offering is accompanied by or consists in leavened material, echoing sacrificial terminology without over-paraphrasing.
- source_word: תּוֹדָה
  chosen: a thank offering
  alternatives:
  - thanksgiving offering
  - offering of thanksgiving
  lexicon: HALOT
  rationale: In sacrificial context תודה is a technical term for a thanksgiving/thank offering. 'Thank offering' is readable modern English and preserves the cultic sense better than a bare 'thanksgiving.'
- source_word: וְקִרְאוּ
  chosen: and proclaim
  alternatives:
  - and call out
  - and call for
  lexicon: HALOT
  rationale: קרא in the imperative here introduces public declaration. 'Proclaim' fits the cultic-public setting and pairs well with the following causative imperative 'announce them.'
- source_word: נְדָבוֹת
  chosen: freewill offerings
  alternatives:
  - voluntary offerings
  lexicon: HALOT
  rationale: נדבות is the standard sacrificial term for offerings given voluntarily. 'Freewill offerings' is the established and precise English cultic equivalent.
- source_word: הַשְׁמִיעוּ
  chosen: announce them
  alternatives:
  - make them heard
  - publish them
  lexicon: HALOT
  rationale: The hiphil of שמע means to cause to be heard, hence 'announce' or 'publish.' 'Announce them' captures the publicizing sense and reflects the object implied by context, namely the freewill offerings.
- source_word: כִּי כֵן אֲהַבְתֶּם
  chosen: For this is what you have loved
  alternatives:
  - for so you love
  - for this is how you have loved it
  lexicon: HALOT
  rationale: The clause explains the irony of the preceding imperatives. The perfect אֲהַבְתֶּם is rendered 'have loved' to reflect settled disposition. 'This is what you have loved' is idiomatic and preserves the accusatory force.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: O sons of Israel
  alternatives:
  - people of Israel
  - children of Israel
  lexicon: HALOT
  rationale: Per gender-accurate policy, the masculine plural is preserved. In prophetic address, 'O sons of Israel' reflects the direct vocative force more closely than the more neutral 'people of Israel.'
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - declares the Lord GOD Yahweh
  - oracle of the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is the prophetic formula 'declares.' אֲדֹנָי יְהוִה is conventionally rendered 'Lord GOD'; this also aligns with the doctrine default that יְהוָה be rendered 'the LORD.' Here 'Lord GOD' preserves the distinction created by the combination of titles in standard English Bible style.
