review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura principal del hebreo: inferencia inicial, fórmula de juramento divino, retribución proporcional, motivación por odio y juicio final. Sin embargo, falla en dos puntos significativos: (1) «tu celos» es un error gramatical; debe ser «tus celos» o mejor una solución singular contextual. (2) La cláusula וְנוֹדַעְתִּי בָם, que en la auditoría inglesa revisada quedó como «through them», no queda fielmente reflejada por «entre ellos», que cambia el matiz hacia lo locativo. Además, «que hiciste» suena poco natural en español con «enojo» y «celos»; conviene explicitar que esos afectos se manifestaron o pusieron en acción.'
  spanish_quality_summary: El texto es mayormente legible y digno, pero presenta un tropiezo gramatical serio en «tu celos[b]» y una combinación algo áspera en «que hiciste por tu odio». También puede mejorarse la naturalidad judicial de «actuaré contigo» a «actuaré contra ti» o «procederé contigo», pero no es imprescindible. La frase revisada propuesta suena más natural y mantiene la fuerza profética.
  glossary_alignment: 'Alinea bien «Yahvé» para יְהוָה y «me daré a conocer» para וְנוֹדַעְתִּי. «Celos» es defendible para קִנְאָה en este contexto hostil. No obstante, la decisión española para בָם en la última cláusula debería seguir la revisión inglesa documentada hacia un valor instrumental: «por medio de ellos» o «mediante ellos», no «entre ellos».'
  issues:
  - severity: high
    issue: Error gramatical en «tu celos[b]»
    rationale: En español estándar debe ser «tus celos»; tal como está, el texto no es publicable.
  - severity: medium
    issue: «entre ellos» no refleja la revisión auditada hacia un sentido instrumental
    rationale: La auditoría inglesa cambió explícitamente de «among them» a «through them». Aunque el hebreo admite cierta tensión, la evidencia auditada ya documenta la preferencia instrumental; en español conviene «por medio de ellos».
  - severity: medium
    issue: «que hiciste por tu odio contra ellos» suena poco natural y puede oscurecer la relación entre emociones y acciones
    rationale: El hebreo usa «hacer» con ira/celos, pero en español una formulación como «que manifestaste» o «que pusiste en acción» comunica mejor el sentido sin alejarse del original.
  revised_spanish_text: Por tanto[a], vivo yo —declara el Señor Yahvé—, actuaré contigo conforme a tu enojo y conforme a tus celos[b], que manifestaste por tu odio contra ellos; y me daré a conocer por medio de ellos[c] cuando te juzgue.
  revised_footnotes:
