translation:
  language: es
  text: 'Estos fueron los hijos del padre[a] de Etam: Jezreel, Ishma e Idbash; y el nombre de la hermana de ellos fue Hazzelelponi[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «fundador de Etam» o «antepasado de Etam»; en contextos genealógicos, el hebreo «padre de» puede tener un sentido más amplio que la paternidad inmediata.
    reason: lexical_alternative
  - marker: b
    text: También puede transcribirse «Hazzelelponi» según distintas convenciones de transliteración.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Estos fueron
  alternatives_spanish:
  - Y estos fueron
  - Ahora bien, estos fueron
  lexicon: HALOT
  rationale: La expresión introductoria genealógica se reproduce de forma natural en español con fuerza presentativa. 'Estos fueron' conserva la apertura del listado sin añadir matices innecesarios.
- source_word: אֲבִי
  english_pob_choice: the father of
  chosen_spanish: el padre de
  alternatives_spanish:
  - el fundador de
  - el antepasado de
  lexicon: HALOT
  rationale: En el contexto genealógico, אָב puede ser 'padre', 'antepasado' o 'fundador'. Se mantiene 'el padre de' para conservar la ambigüedad del hebreo y seguir de cerca la construcción.
- source_word: עֵיטָם
  english_pob_choice: Etam
  chosen_spanish: Etam
  alternatives_spanish:
  - Etán
  lexicon: transliteración de nombre propio
  rationale: Se conserva la forma del nombre propio como transliteración estable, conforme al criterio del proyecto.
- source_word: יִזְרְעֶאל
  english_pob_choice: Jezreel
  chosen_spanish: Jezreel
  alternatives_spanish:
  - Yizreel
  lexicon: transliteración de nombre propio
  rationale: Nombre propio transliterado de manera estándar; se mantiene la forma reconocible en español bíblico sin traducir el componente léxico.
- source_word: וְיִשְׁמָא
  english_pob_choice: Ishma
  chosen_spanish: Isma
  alternatives_spanish:
  - Ishma
  - Jisma
  lexicon: transliteración de nombre propio
  rationale: Se adapta a ortografía española natural sin perder la cercanía al hebreo consonántico. 'Isma' es clara y fluida en español bíblico.
- source_word: וְיִדְבָּשׁ
  english_pob_choice: and Idbash
  chosen_spanish: Idbas
  alternatives_spanish:
  - Idbash
  - Idbás
  lexicon: transliteración de nombre propio
  rationale: Nombre propio transliterado con adaptación leve a la ortografía española para facilitar lectura; se mantiene el valor nominal sin interpretar su sentido.
- source_word: וְשֵׁם אֲחוֹתָם
  english_pob_choice: and the name of their sister was
  chosen_spanish: y el nombre de su hermana fue
  alternatives_spanish:
  - y el nombre de su hermana era
  - y su hermana se llamaba
  lexicon: HALOT
  rationale: La construcción nominal hebrea se refleja de manera idiomática en español, conservando el sujeto introducido por 'el nombre' y el posesivo plural implícito en 'su'.
- source_word: הַצְלֶלְפּוֹנִי
  english_pob_choice: Hazzelelponi
  chosen_spanish: Hazzelelponi
  alternatives_spanish:
  - Jazelelponi
  - Hazelponi
  lexicon: transliteración de nombre propio
  rationale: Se conserva el nombre femenino con la transliteración bíblica habitual en inglés POB, dado que no existe equivalente semántico en español.
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa más reciente, que ajustó la frase para reflejar el plural implícito en el hebreo ('sons of the father of Etam'). En español se resolvió de forma directa con 'los hijos del padre de Etam', manteniendo la ambigüedad genealógica de אָב y sin forzar una interpretación como 'fundador' o 'antepasado' en el texto principal.
  spanish_consistency_notes:
  - Se prefirió 'Etam' y no 'Etán' para mantener consistencia con la tradición transliterada del nombre propio en este registro.
  - Se mantuvo 'Jezreel' como transliteración reconocible y no se intentó españolizar el nombre.
  - '''Isma'' e ''Idbas'' siguen la adaptación ortográfica española, pero las notas preservan la posibilidad de las formas más cercanas al inglés POB.'
  - La puntuación con dos puntos y punto y coma sigue la estructura genealógica del verso hebreo y del audit trail inglés.
  - No se introdujo terminología doctrinal, ya que el versículo es genealógico y no contiene afirmaciones teológicas explícitas.
