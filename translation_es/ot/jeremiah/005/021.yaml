translation:
  language: es
  text: Oigan ahora[a] esto, pueblo necio y sin entendimiento; tienen ojos y no ven; tienen oídos y no oyen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «pueblo necio y sin corazón». Aquí «corazón» se refiere al entendimiento o al discernimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  lexicon: HALOT
  rationale: El imperativo plural de שׁמע pide una exhortación directa. «Oigan» conserva el tono profético y suena natural en español; «Escuchen» también es posible, pero aquí «oír» ayuda a mantener el eco con «oyen» al final.
- source_word: נָא
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - por favor
  - ya
  lexicon: HALOT
  rationale: En este contexto נָא añade urgencia, no cortesía. «Ahora» transmite esa urgencia de forma idiomática en español.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - este mensaje
  lexicon: HALOT
  rationale: El demostrativo apunta de manera inmediata a la reprensión profética que sigue. «Esto» es directo y no agrega contenido interpretativo.
- source_word: עַם
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - nación
  - gente
  lexicon: HALOT
  rationale: Aunque el hebreo es singular colectivo, el vocativo se dirige a Judá como cuerpo colectivo. «Pueblo» es natural en español bíblico y conserva ese valor colectivo sin forzar un matiz político de «nación».
- source_word: סָכָל
  english_pob_choice: foolish
  chosen_spanish: necio
  alternatives_spanish:
  - insensato
  - tonto
  lexicon: HALOT
  rationale: El término expresa necedad moral y espiritual, no simple falta de inteligencia. «Necio» comunica bien ese peso bíblico en español.
- source_word: וְאֵין לֵב
  english_pob_choice: without understanding
  chosen_spanish: sin entendimiento
  alternatives_spanish:
  - y sin corazón
  - y sin juicio
  lexicon: HALOT
  rationale: לֵב en este tipo de texto designa la facultad interior de discernimiento. «Sin entendimiento» preserva ese sentido idiomático sin caer en un literalismo engañoso como «sin corazón».
- source_word: עֵינַיִם לָהֶם וְלֹא יִרְאוּ
  english_pob_choice: who have eyes but do not see
  chosen_spanish: tienen ojos y no ven
  alternatives_spanish:
  - que tienen ojos, pero no ven
  lexicon: HALOT
  rationale: La construcción hebrea es proverbial e irónica. En español, la coordinación simple resulta más fluida y mantiene el contraste entre posesión física e incapacidad espiritual.
- source_word: אָזְנַיִם לָהֶם וְלֹא יִשְׁמָעוּ
  english_pob_choice: who have ears but do not hear
  chosen_spanish: tienen oídos y no oyen
  alternatives_spanish:
  - que tienen oídos, pero no oyen
  lexicon: HALOT
  rationale: Se conserva el paralelismo con la línea anterior y el eco verbal con el imperativo inicial. «Oír» es la mejor correspondencia aquí para mantener la ironía profética.
theological_decisions:
- issue: Uso idiomático de לֵב como centro de discernimiento
  english_pob_reading: without understanding
  chosen_spanish_reading: sin entendimiento
  alternative_spanish_readings:
  - sin corazón
  - sin juicio
  rationale: La frase acusa a la comunidad de ceguera espiritual y moral. «Sin entendimiento» traduce el valor antropológico de לֵב sin introducir una imagen corporal que en español podría sonar extraña o ambigua.
  doctrine_reference: Translation philosophy §1, §6
- issue: Vocativo colectivo dirigido a Judá
  english_pob_reading: foolish people
  chosen_spanish_reading: pueblo necio
  alternative_spanish_readings:
  - nación necia
  - gente necia
  rationale: El hebreo usa un singular colectivo. «Pueblo» expresa bien el sujeto comunitario del reproche y evita sobredeterminar el pasaje como si enfatizara solo una entidad política.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: El texto inglés de POB se mantiene sin cambios relevantes en la revisión más reciente; la presente propuesta sigue esa lectura, ajustando las decisiones al español con especial atención al valor idiomático de לֵב y al paralelismo proverbial de las dos cláusulas finales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece en el texto hebreo de esta unidad.
  - Se prefirió «oír/oyen» para conservar el paralelismo con «Oigan» y el contraste retórico del hebreo.
  - Se evitó «corazón» en el cuerpo principal para no oscurecer el sentido de entendimiento/discernimiento que el audit trail documenta.
