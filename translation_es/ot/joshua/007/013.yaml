revisions:
- from: 'Levántate[a], consagra al pueblo, y diles: «Consagraos para mañana, porque así dice Yahvé, el Dios de Israel: hay cosa dedicada a destrucción en medio de ti, Israel. No podrás hacer frente a tus enemigos hasta que quitéis de en medio de vosotros la cosa dedicada a destrucción».'
  to: 'Levántate, consagra al pueblo y diles: «Conságrense para mañana, porque así dice Yahvé, el Dios de Israel: hay algo dedicado a la destrucción[a] en medio de ti, Israel. No podrás hacer frente a tus enemigos hasta que quiten de en medio de ustedes lo dedicado a la destrucción».'
  rationale: Se corrige el anclaje de la nota para que corresponda a חֵרֶם, se adapta el imperativo reflexivo al español neutral latinoamericano («Conságrense»), se mejora la naturalidad de חֵרֶם con «algo/lo dedicado a la destrucción», y se conserva de forma más idiomática el cambio del singular corporativo al plural colectivo presente en el hebreo.
