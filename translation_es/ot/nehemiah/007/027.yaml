lexical_decisions:
- source_word: אַנְשֵׁי
  english_pob_choice: the men of
  chosen_spanish: los hombres de
  alternatives_spanish:
  - la gente de
  - los varones de
  lexicon: HALOT
  rationale: El constructo plural de אִישׁ funciona aquí como fórmula censal para los miembros varones asociados con el lugar nombrado. En español, 'los hombres de' conserva ese valor de recuento y la precisión de género del original, sin ampliar indebidamente a 'la gente'.
- source_word: עֲנָתוֹת
  english_pob_choice: Anathoth
  chosen_spanish: Anatot
  alternatives_spanish:
  - Anátot
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. Se translitera al español de manera natural como 'Anatot', coherente con la práctica de no traducir topónimos bíblicos.
- source_word: מֵאָה עֶשְׂרִים וּשְׁמֹנָה
  english_pob_choice: one hundred twenty-eight
  chosen_spanish: ciento veintiocho
  alternatives_spanish:
  - ciento veintiocho en número
  - ciento y veintiocho
  lexicon: HALOT
  rationale: La secuencia cardinal suma 128. En español moderno, 'ciento veintiocho' expresa el número con claridad y sin el 'y' arcaizante que no exige el hebreo.
translation_notes:
  revision_awareness: El texto inglés auditado no introduce notas ni variantes; la revisión más reciente indica alta concordancia y sin cambios necesarios, por lo que el español sigue de cerca el valor censal literal del hebreo sin añadir matices no atestiguados.
  spanish_consistency_notes:
  - Se mantiene la terminología censal 'los hombres de' para preservar el valor del constructo hebreo.
  - Se usa un topónimo transliterado ('Anatot') en vez de una forma interpretativa.
  - El numeral se expresa en forma cardinal llana, acorde con el estilo bíblico contemporáneo en español.
