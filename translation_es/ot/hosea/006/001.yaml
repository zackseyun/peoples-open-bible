base_translation:
  language: en
  yaml_path: translation/ot/hosea/006/001.yaml
  text: Come[a], let us return to Yahweh, for he has torn us, but he will heal us; he has struck us[b], but he will bind us up.
  footnotes:
  - marker: a
    text: Or 'and he will heal us ... and he will bind us up'; the Hebrew conjunction is simply 'and,' but English 'but' makes the contrast clearer.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'has torn' evokes the image of an animal tearing prey, underscoring the severity of the LORD's judgment.
    reason: cultural_note
