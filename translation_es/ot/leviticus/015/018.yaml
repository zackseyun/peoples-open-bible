translation:
  language: es
  text: Si un hombre se acuesta con una mujer y tiene una emisión de semen[a], ambos se lavarán en agua y serán impuros hasta la tarde[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "una emisión de semilla". La frase hebrea se refiere específicamente a la emisión seminal.
    reason: lexical_alternative
  - marker: b
    text: Es decir, ritualmente impuros hasta la tarde.
    reason: cultural_note
lexical_decisions:
- source_word: וְאִשָּׁה אֲשֶׁר
  english_pob_choice: If a ... woman
  chosen_spanish: Si un hombre se acuesta con una mujer
  alternatives_spanish:
  - Y una mujer que
  - Ahora bien, si una mujer
  lexicon: HALOT
  rationale: En el contexto legal casuístico, el hebreo introduce una situación hipotética. El español queda natural y fiel al sentido condicional al expresar la cláusula como ‘Si un hombre se acuesta con una mujer’, sin perder el arranque de caso legal.
- source_word: יִשְׁכַּב אִישׁ אֹתָהּ
  english_pob_choice: a man lies with a woman
  chosen_spanish: se acuesta con una mujer
  alternatives_spanish:
  - tiene relaciones sexuales con una mujer
  - duerme con una mujer
  lexicon: HALOT
  rationale: שׁכב con objeto sexual es un modismo para relaciones sexuales. ‘Se acuesta con’ conserva el registro sobrio y jurídico del hebreo, y en español es claro sin volverse eufemístico en exceso.
- source_word: שִׁכְבַת זָרַע
  english_pob_choice: in an emission of semen
  chosen_spanish: una emisión de semen
  alternatives_spanish:
  - una emisión de semilla
  - una eyaculación
  lexicon: HALOT
  rationale: La frase hebrea se refiere específicamente a la emisión seminal. ‘Emisión de semen’ es preciso y entendido en español moderno. ‘Semilla’ sería más literal pero menos claro; ‘eyaculación’ sería posible, pero añade un término más clínico que no está en el texto.
- source_word: וְרָחֲצוּ
  english_pob_choice: both of them shall wash
  chosen_spanish: ambos lavaránse en agua
  alternatives_spanish:
  - ambos se lavarán
  - ambos deberán lavarse
  lexicon: HALOT
  rationale: El verbo está en plural y abarca a los dos participantes. Se explicita ‘ambos’ para evitar ambigüedad, y se mantiene la fórmula legal de lavado. La colocación reflexiva en español puede expresarse de modo más natural como ‘se lavarán’; aquí se conserva además la referencia explícita al medio ritual ‘en agua’.
- source_word: בַמַּיִם
  english_pob_choice: in water
  chosen_spanish: en agua
  alternatives_spanish:
  - con agua
  lexicon: HALOT
  rationale: La preposición hebrea es literalmente ‘en’. ‘En agua’ reproduce con fidelidad el medio del lavado ritual y evita precisar más de lo que el hebreo dice.
- source_word: וְטָמְאוּ
  english_pob_choice: be unclean
  chosen_spanish: serán impuros
  alternatives_spanish:
  - quedarán impuros
  - serán ritualmente impuros
  lexicon: HALOT
  rationale: טמא en Levítico denota impureza ritual, no necesariamente culpa moral. ‘Serán impuros’ es breve y fiel; ‘ritualmente impuros’ explicita la categoría pero añade una glosa interpretativa que puede reservarse para notas.
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta el atardecer
  alternatives_spanish:
  - hasta la tarde
  - hasta la noche
  lexicon: HALOT
  rationale: ‘Atardecer’ comunica bien el límite temporal en español natural. Aunque ‘la tarde’ es posible, ‘atardecer’ refleja mejor el cierre del día señalado por el hebreo y por el uso legal levítico.
theological_decisions:
- issue: Naturaleza de la impureza en la ley ritual
  english_pob_reading: Render טמא simply as 'unclean' without importing moral guilt language.
  chosen_spanish_reading: Traducir טמא como ‘impuros’ sin añadir culpa moral ni una lectura de pecado.
  alternative_spanish_readings:
  - ritualmente impuros
  - ceremonialmente impuros
  rationale: El pasaje trata de estado ritual de impureza después del acto sexual, no de una condena moral explícita. La versión española conserva esa tensión al no moralizar el término.
  doctrine_reference: Preservar la distinción bíblica entre impureza ritual y culpa moral; no resolverla artificialmente en la traducción.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa que aclaró la relación entre el acto sexual y la emisión seminal (‘lies with a woman and has an emission of semen’), por lo que el español mantiene dos elementos coordinados: el coito y la emisión de semen, sin fusionarlos ni desplazar el sentido legal del hebreo.'
  spanish_consistency_notes:
  - Se preservó Yahvé/Jesús/Mesías según los lineamientos generales; este versículo no contiene esos términos.
  - Se eligió ‘impuros’ para טמא, evitando ‘inmundos’ por su mayor carga peyorativa en español.
  - Se mantuvo el registro jurídico sobrio del texto levítico, sin explicitar más de lo que el hebreo dice.
  - La nota sobre ‘semen’ conserva la alternativa literal ‘semilla’ como opción lexical documentada, pero no se adoptó en el texto principal por claridad en español.
