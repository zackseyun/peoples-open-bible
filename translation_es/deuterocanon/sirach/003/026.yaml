translation:
  language: es
  text: El corazón pesado multiplica sus dolores[a], y el que actúa con desenfreno añade pecado sobre pecado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «un corazón duro será afligido al final» y «un corazón duro será pesado al final».'
    reason: alternative_reading
  - marker: b
    text: El término hebreo detrás de «actúa con desenfreno» es difícil y también puede sugerir actuar con locura, autoengaño o arrogancia jactanciosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵב כָּבֵד
  english_pob_choice: a heavy heart
  chosen_spanish: el corazón pesado
  alternatives_spanish:
  - el corazón duro
  - el corazón cargado
  - el corazón obstinado
  lexicon: HALOT
  rationale: El hebreo conservado dice literalmente «corazón pesado». En español, «pesado» mantiene la imagen de peso/carga sin perder la posibilidad de dureza, torpeza interior o obstinación implícita en el hebreo. Se evita sustituir de entrada por «duro», porque esa opción sigue la tradición griega interpretativa y no el testimonio hebreo principal.
- source_word: יִרְבּוּ
  english_pob_choice: multiplies
  chosen_spanish: multiplica
  alternatives_spanish:
  - aumenta
  - hará crecer
  - se multiplican
  lexicon: HALOT
  rationale: El verbo expresa aumento o multiplicación. «Multiplica» reproduce bien la fuerza acumulativa del hebreo y suena natural con el sustantivo siguiente («sus dolores»).
- source_word: מַכְאֹבָיו
  english_pob_choice: its pains
  chosen_spanish: sus dolores
  alternatives_spanish:
  - sus penas
  - sus sufrimientos
  - sus dolores y penas
  lexicon: HALOT
  rationale: «Dolores» traduce de manera directa מַכְאוֹב como dolor/sufrimiento y funciona bien en español para un padecimiento interior o físico. Se conserva el posesivo para reflejar la relación con el «corazón».
- source_word: וּמִתְהוֹלֵל
  english_pob_choice: one who behaves recklessly
  chosen_spanish: el que actúa con desenfreno
  alternatives_spanish:
  - el que rava
  - el que se deja llevar
  - el que actúa con locura
  - el arrogante
  lexicon: HALOT
  rationale: El término es difícil y la evidencia de validación señala una discrepancia mayor. En contexto sapiencial, la idea apunta a conducta desordenada, imprudente o desbocada. «Actúa con desenfreno» preserva esa fuerza moral sin decidir de manera excesiva entre matices posibles como delirio, jactancia o autoengaño.
- source_word: מוֹסִיף
  english_pob_choice: adds
  chosen_spanish: añade
  alternatives_spanish:
  - suma
  - sigue añadiendo
  - agrega
  lexicon: HALOT
  rationale: Verbo directo y claro en español, equivalente a «adds». Mantiene la imagen de acumulación.
- source_word: עָוֹן עַל עָוֹן
  english_pob_choice: sin upon sin
  chosen_spanish: pecado sobre pecado
  alternatives_spanish:
  - culpa sobre culpa
  - iniquidad sobre iniquidad
  - pecado tras pecado
  lexicon: HALOT
  rationale: «Pecado sobre pecado» conserva la reiteración acumulativa del hebreo y es inteligible en español bíblico actual. «Culpa» o «iniquidad» son posibles, pero aquí «pecado» comunica con mayor claridad la progresión moral.
theological_decisions:
- issue: Divergencia entre el hebreo y el griego en el primer hemistiquio
  english_pob_reading: 'Follow the Hebrew primary witness in the main text: ''A heavy heart multiplies its pains,'' while preserving the Greek''s ''hard heart ... at the end'' in a footnote.'
  chosen_spanish_reading: 'Seguir el testimonio hebreo principal en el cuerpo: «El corazón pesado multiplica sus dolores», y dejar en nota la alternativa griega de «corazón duro ... al final / en los postreros».'
  alternative_spanish_readings:
  - El corazón duro será afligido al final
  - El corazón duro será pesado al final
  rationale: 'La política del proyecto da primacía al hebreo conservado cuando está disponible. Aquí el griego ofrece una formulación sustancialmente distinta, por lo que no debe borrarse: se documenta como alternativa textual real en una nota, sin desplazar el hebreo del texto principal.'
  doctrine_reference: 'PHILOSOPHY.md: prioridad al hebreo donde se conserva; el griego paralelo se usa como testimonio real y la divergencia se preserva honestamente.'
translation_notes:
  revision_awareness: 'La traducción sigue el estado revisado más reciente, sin cambios posteriores: el consenso de control es alto y no se registran nuevas modificaciones en el pasaje.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en todo el proyecto cuando el original lo requiera; este versículo no lo contiene.
  - Se usa «pecado» para עָוֹן conforme a la equivalencia funcional del contexto sapiencial y a la claridad en español.
  - Se conserva la tensión textual hebreo/griego mediante nota, en lugar de armonizar silenciosamente los testigos.
  - «Corazón pesado» se eligió para respetar el hebreo literal y evitar imponer de entrada la lectura interpretativa «corazón duro».
