translation:
  language: es
  text: No quebrará la caña[a] cascada, ni apagará la mecha humeante[b], hasta que lleve la justicia a la victoria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «junco cascado» o «caña quebrada». El griego se refiere a una caña o junco dañado, roto o aplastado.
    reason: lexical_alternative
  - marker: b
    text: O «mecha de lino humeante»; «no extinguirá». El griego alude literalmente al lino usado como mecha de lámpara.
    reason: lexical_alternative
lexical_decisions:
- source_word: κάλαμον
  english_pob_choice: reed
  chosen_spanish: caña
  alternatives_spanish:
  - junca
  - caña de junco
  lexicon: BDAG
  rationale: κάλαμος designa una planta de caña o junco; en español, «caña» comunica bien la imagen profética sin sonar técnico. «Junco» también sería posible, pero «caña» es más natural y mantiene el contraste con la fragilidad del objeto.
- source_word: συντετριμμένον
  english_pob_choice: bruised
  chosen_spanish: cascada
  alternatives_spanish:
  - rota
  - quebrada
  - aplastada
  lexicon: BDAG
  rationale: El participio de συντρίβω indica algo dañado, aplastado o hecho pedazos. «Cascada» conserva la idea de fragilidad y daño sin fijar excesivamente el grado, y evita una repetición pesada con el verbo «quebrará».
- source_word: κατεάξει
  english_pob_choice: will not break
  chosen_spanish: no quebrará
  alternatives_spanish:
  - no romperá
  - no partirá
  lexicon: BDAG
  rationale: κατάγνυμι significa romper o quebrar. «No quebrará» es claro, bíblico en buen español y mantiene la fuerza verbal del original.
- source_word: λίνον
  english_pob_choice: wick
  chosen_spanish: mecha
  alternatives_spanish:
  - lino
  - flax
  lexicon: BDAG
  rationale: Aunque λίνον literalmente remite al lino o al material de lino, en la imagen de una lámpara el referente es la mecha. «Mecha» expresa el objeto real para el lector moderno sin perder la base material del término.
- source_word: τυφόμενον
  english_pob_choice: smoldering
  chosen_spanish: humeante
  alternatives_spanish:
  - echando humo
  - que humea
  lexicon: BDAG
  rationale: El participio de τύφομαι describe algo que humea o arde débilmente. «Humeante» reproduce con naturalidad la imagen de una mecha que aún no se apaga del todo.
- source_word: σβέσει
  english_pob_choice: will not extinguish
  chosen_spanish: apagará
  alternatives_spanish:
  - extinguirá
  - sofocará
  lexicon: BDAG
  rationale: σβέννυμι significa apagar o extinguir. «Apagará» es el verbo español más transparente para una mecha; «extinguirá» quedaría más formal, pero menos idiomático en esta imagen.
- source_word: ἕως ἂν
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta tanto que
  lexicon: BDAG
  rationale: La construcción marca el límite temporal de las acciones negadas. «Hasta que» es la equivalencia natural y precisa en español.
- source_word: ἐκβάλῃ
  english_pob_choice: brings
  chosen_spanish: lleve
  alternatives_spanish:
  - saque
  - haga salir
  - traiga
  lexicon: BDAG
  rationale: ἐκβάλλω aquí funciona en sentido idiomático de hacer salir o llevar adelante hacia un fin. «Lleve» comunica bien el movimiento orientado al resultado, en continuidad con la imagen profética.
- source_word: εἰς νῖκος
  english_pob_choice: to victory
  chosen_spanish: a la victoria
  alternatives_spanish:
  - hasta la victoria
  - en victoria
  lexicon: BDAG
  rationale: La frase expresa un desenlace victorioso. «A la victoria» conserva el sentido telico de llegada a un resultado.
- source_word: τὴν κρίσιν
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - la sentencia
  lexicon: BDAG
  rationale: En este contexto isaiano del Siervo, κρίσις no se limita a un veredicto judicial, sino a la instauración de una justicia recta. «La justicia» reproduce mejor esa fuerza profética que «el juicio» en español.
theological_decisions:
- issue: Sentido de κρίσις en la cita del Siervo
  english_pob_reading: justice
  chosen_spanish_reading: la justicia
  alternative_spanish_readings:
  - el juicio
  rationale: La línea alude al texto isaiano sobre el Siervo, donde el énfasis recae en la implantación de un orden justo y fiel, no solo en dictar una sentencia. «La justicia» mantiene esa amplitud sin borrar la posible resonancia judicial.
  doctrine_reference: Translation philosophy §1, §5
- issue: Imagen de la mecha en el proverbio/imagen profética
  english_pob_reading: wick ... extinguish
  chosen_spanish_reading: mecha ... apagará
  alternative_spanish_readings:
  - lino ... extinguirá
  - flax ... apagará
  rationale: La imagen apunta a una mecha de lámpara hecha de lino. «Mecha» hace visible el referente para el lector español, mientras que «apagará» conserva el acto concreto de extinguir la llama en lenguaje corriente.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el consenso de control de calidad indica alta concordancia y sin cambios necesarios respecto al borrador auditado en inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención del proyecto solo cuando el texto fuente lo exige; este versículo no contiene el nombre divino explícito.
  - Se prefirió un español bíblico claro y moderno, evitando tanto calcos rígidos como paráfrasis que diluyan la imagen profética.
  - La decisión sobre «justicia» conserva la tensión entre juicio y rectitud, coherente con el audit trail inglés.
  - Los marcadores de nota siguen el orden solicitado y aparecen anclados en el texto en los puntos pertinentes.
