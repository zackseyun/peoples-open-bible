revisions:
- from: Rasgad[a] su corazón y no sus vestiduras, y vuelvan a Yahvé su Dios, porque él es bondadoso y compasivo, lento para la ira y abundante en amor leal[b], y se arrepiente respecto al desastre.
  to: Rasguen[a] sus corazones y no sus vestiduras, y vuelvan a Yahvé su Dios, porque él es bondadoso y compasivo, lento para la ira y abundante en amor fiel, y desiste[b] del desastre.
  rationale: Se corrige la mezcla de registros verbales para ajustarla al español neutral («Rasguen»), se hace más idiomático el posesivo plural («sus corazones»), se mejora la naturalidad de חסד con «amor fiel», y se reemplaza «se arrepiente respecto al desastre» por «desiste del desastre» para reflejar mejor נחם en contexto de juicio, en línea con la justificación teológica y léxica del POB inglés. También se reubica la nota explicativa al lugar documentado por la auditoría inglesa.
