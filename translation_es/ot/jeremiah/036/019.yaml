translation:
  language: es
  text: 'Entonces los oficiales dijeron a Baruc: «Ve, escóndete tú y Jeremías, y que nadie sepa dónde están».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los príncipes
  - los líderes
  lexicon: HALOT
  rationale: שָׂרִים designa aquí a funcionarios o autoridades del entorno real/administrativo. «Oficiales» comunica bien ese rango en español moderno y evita el tono demasiado arcaico o ambiguo de «príncipes».
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: HALOT
  rationale: El imperativo de הלך se expresa naturalmente en español con «Ve». Mantiene la orden breve y directa del hebreo.
- source_word: הִסָּתֵר
  english_pob_choice: hide yourself
  chosen_spanish: escóndete
  alternatives_spanish:
  - ponte a salvo escondiéndote
  - ocúltate
  lexicon: HALOT
  rationale: 'El nifal imperativo tiene sentido reflexivo: ocultarse uno mismo. «Escóndete» preserva la fuerza imperativa y suena natural en español.'
- source_word: אַתָּה וְיִרְמְיָהוּ
  english_pob_choice: you and Jeremiah
  chosen_spanish: tú y Jeremías
  alternatives_spanish:
  - usted y Jeremías
  - usted, junto con Jeremías
  lexicon: HALOT
  rationale: El pronombre explícito enfatiza al destinatario. «Tú y Jeremías» reproduce ese relieve sin sonar forzado.
- source_word: וְאִישׁ אַל יֵדַע
  english_pob_choice: and let no one know
  chosen_spanish: y que nadie sepa
  alternatives_spanish:
  - y no dejen que nadie sepa
  - y que nadie conozca
  lexicon: HALOT
  rationale: אִישׁ con la negación funciona idiomáticamente como indefinido. «Que nadie sepa» expresa de forma natural la prohibición/jusivo en español y conserva el sentido de ocultamiento.
- source_word: אֵיפֹה אַתֶּם
  english_pob_choice: where you are
  chosen_spanish: dónde están ustedes
  alternatives_spanish:
  - dónde se encuentran
  - su paradero
  lexicon: HALOT
  rationale: La pregunta apunta al lugar donde ambos estarían ocultos. «Dónde están ustedes» refleja el plural del hebreo y suena más idiomático en español que una calca literal.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijeron
  alternatives_spanish:
  - Y ... dijeron
  - Luego ... dijeron
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración. «Entonces» preserva bien la secuencia discursiva en español formal.
translation_notes:
  revision_awareness: This draft follows the high-agreement English audit trail and the final revision that preferred commas over an em dash, while adapting the clause flow to natural Spanish punctuation.
  spanish_consistency_notes:
  - Usa «oficiales» para שָׂרִים de manera consistente con el valor administrativo del contexto.
  - 'Mantiene el mandato breve con verbos en imperativo: «Ve, escóndete».'
  - Conserva el plural implícito de «אַתֶּם» con «ustedes» para evitar ambigüedad en español.
  - No introduce notas porque el hebreo y el audit trail no muestran variantes textuales o tensiones lexicas que requieran anclaje explícito en este versículo.
