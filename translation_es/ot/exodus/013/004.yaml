translation:
  language: es
  text: Hoy ustedes salen, en el mes de Abib[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Abib es el nombre del mes; el término se asocia con la etapa de maduración del grano en primavera.
    reason: cultural_note
lexical_decisions:
- source_word: הַיּוֹם
  english_pob_choice: Today
  chosen_spanish: Hoy
  alternatives_spanish:
  - Este día
  - En este día
  lexicon: HALOT
  rationale: El artículo con הַיּוֹם funciona aquí de modo adverbial para señalar el día presente del éxodo. «Hoy» mantiene la inmediatez del discurso de Moisés y suena natural en español, sin perder el valor temporal del hebreo.
- source_word: אַתֶּם
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes todos
  lexicon: HALOT
  rationale: Es un pronombre de segunda persona plural dirigido a Israel. «Ustedes» es la forma neutral y amplia en español latinoamericano, y conserva el plural sin añadir información extra.
- source_word: יֹצְאִים
  english_pob_choice: are going out
  chosen_spanish: van saliendo
  alternatives_spanish:
  - salen
  - están saliendo
  - van a salir
  lexicon: HALOT
  rationale: El participio qal plural expresa acción en curso o inminente en este contexto. «Van saliendo» conserva esa progresividad y el movimiento de salida sin endurecerlo en un simple pretérito o futuro.
- source_word: בְּחֹדֶשׁ
  english_pob_choice: in the month of
  chosen_spanish: en el mes de
  alternatives_spanish:
  - durante el mes de
  lexicon: HALOT
  rationale: La preposición ב con חֹדֶשׁ pide una relación temporal normal en español. «En el mes de» reproduce de forma clara y fiel la referencia calendárica.
- source_word: הָאָבִיב
  english_pob_choice: Abib
  chosen_spanish: Abib
  alternatives_spanish:
  - primavera
  - el mes de espigas tiernas
  lexicon: HALOT
  rationale: Se conserva el nombre propio del mes, como en la tradición de transliterar esta designación hebrea. Los equivalentes interpretativos se reservan para nota, no para el texto principal.
translation_notes:
  revision_awareness: El inglés POB mantiene la forma verbal progresiva «are going out» y una nota cultural para Abib; esta versión española conserva ambos rasgos con «van saliendo» y una nota explicativa equivalente. No hubo cambios editoriales recientes en el testimonio fuente auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - «Abib» se deja como nombre transliterado para respetar la decisión léxica documentada.
  - El tono es bíblico y claro, sin calco excesivo del inglés.
