review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura básica del hebreo y mantiene correctamente 'remanente de Israel', la imagen pastoril y la alternativa Bosra/redil. Sin embargo, falla en un punto importante de fidelidad y españolidad en 'a todo ti, Jacob', que no transmite de manera idiomática el sentido corporativo de יַעֲקֹב כֻּלָּךְ. También conviene ajustar 'harán ruido por causa de la gente' a una formulación más natural y más cercana al inglés auditado ('con gente' o una nota de alternativa causal).
  spanish_quality_summary: El texto es generalmente comprensible, pero 'a todo ti' es gramaticalmente incorrecto en español y requiere corrección. 'Harán ruido' funciona, aunque 'estarán llenos de bullicio' o 'harán bullicio' sería más elevado; no obstante, una reparación mínima basta. 'Pastizal' es entendible, pero 'pasto' o 'prado' sonaría algo más bíblico; no es obligatorio cambiarlo.
  glossary_alignment: No hay conflicto con terminología de proyecto como Yahvé/Mesías. 'Remanente' está bien alineado. 'Bosra' como topónimo principal con nota alternativa está bien documentado. La decisión sobre אָדָם debe conservar la referencia inclusiva a 'gente/personas' en español, idealmente con nota que preserve la dificultad del hebreo.
  issues:
  - severity: high
    issue: La frase 'a todo ti, Jacob' es incorrecta e ininteligible en español natural.
    rationale: 'El hebreo expresa una apelación corporativa: ''todo tú, Jacob'' / ''todos ustedes, Jacob''. El español del borrador no preserva esa fuerza de manera idiomática. Debe cambiarse a algo como ''a todo Jacob'' o ''a todos ustedes, Jacob''; dado el registro bíblico y la claridad, ''a todo Jacob'' es la mejor reparación mínima.'
  - severity: medium
    issue: '''Harán ruido por causa de la gente'' suena algo forzado en español y estrecha una construcción hebrea difícil.'
    rationale: El audit trail inglés opta en el texto principal por 'with people' y deja la lectura causal en nota. En español, 'bullirán de gente' o 'harán ruido con gente' serían posibles, pero para una reparación mínima y clara conviene 'harán bullicio con gente', manteniendo en nota la alternativa causal/documental.
  - severity: low
    issue: La nota a sobre la intensificación es válida, pero no corresponde a una alternativa textual sino a explicación traductológica.
    rationale: No impide el uso, pero la nota no preserva una alternativa del texto fuente, sino justifica el adverbio español. Se puede mantener si el proyecto admite notas de explicación; aquí es preferible simplificar el aparato y dejar solo las notas realmente necesarias.
  revised_spanish_text: Ciertamente reuniré a todo Jacob; ciertamente congregaré al remanente de Israel. Juntos los pondré como las ovejas de Bosra[a], como un rebaño en medio de su pastizal; harán bullicio con gente[b].
  revised_footnotes:
