translation:
  language: es
  text: Por tanto, haré temblar los cielos[a], y la tierra temblará desde su lugar, por la furia de Yahvé de los Ejércitos, en el día de su ardiente ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, 'Yahvé de las Huestes'.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por esta razón
  - Así que
  lexicon: HALOT
  rationale: Expresa con naturalidad el valor inferencial/consecutivo del hebreo y conserva el enlace lógico con el anuncio previo de juicio.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  lexicon: HALOT
  rationale: En español, ‘los cielos’ mantiene mejor el plural hebreo y el alcance cósmico del juicio que ‘el cielo’, más restringido o singular.
- source_word: אַרְגִּיז
  english_pob_choice: I will make ... tremble
  chosen_spanish: haré temblar
  alternatives_spanish:
  - haré estremecer
  - haré que tiemblen
  lexicon: HALOT
  rationale: El hebreo es causativo; ‘haré temblar’ reproduce esa fuerza sin volver la frase pesada. Se conserva el sujeto divino implícito del verbo.
- source_word: וְתִרְעַשׁ
  english_pob_choice: and ... will shake
  chosen_spanish: se moverá
  alternatives_spanish:
  - temblará
  - se sacudirá
  lexicon: HALOT
  rationale: ‘Rā‘aš’ denota sacudida/movimiento sísmico. ‘Se moverá’ es más natural en español junto con ‘haré temblar’ y evita una repetición rígida.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: En el contraste cósmico con ‘los cielos’, ‘la tierra’ es la correspondencia más directa y natural en español.
- source_word: מִמְּקוֹמָהּ
  english_pob_choice: from its place
  chosen_spanish: de su lugar
  alternatives_spanish:
  - de su sitio
  - desde su lugar
  lexicon: HALOT
  rationale: Traslada de forma clara la idea de desplazamiento respecto de su posición establecida.
- source_word: בְּעֶבְרַת
  english_pob_choice: at the fury of
  chosen_spanish: por la furia de
  alternatives_spanish:
  - a causa de la furia de
  - por el furor de
  lexicon: HALOT
  rationale: ‘עֶבְרָה’ comunica ira desbordada/furor. ‘Por la furia de’ mantiene el sentido causal y el tono intenso del hebreo.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los Ejércitos
  - Yahvé de las Huestes
  lexicon: HALOT
  rationale: Se mantiene ‘Yahvé’ para el nombre divino y se traduce צְבָאוֹת con el plural transparente ‘los Ejércitos’, en lugar del tradicional ‘huestes’, para conservar el sentido militar del título.
- source_word: וּבְיוֹם
  english_pob_choice: in the day of
  chosen_spanish: en el día de
  alternatives_spanish:
  - el día de
  - para el día de
  lexicon: HALOT
  rationale: Conserva el giro temporal profético y su formalidad bíblica en español.
- source_word: חֲרוֹן אַפּוֹ
  english_pob_choice: his burning anger
  chosen_spanish: su ardiente ira
  alternatives_spanish:
  - su ira ardiente
  - su furor ardiente
  - su ira encendida
  lexicon: HALOT
  rationale: La expresión hebrea alude a la combustión/calor de la ira. ‘Ardiente ira’ preserva la metáfora y suena natural en español bíblico actual.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: Se sigue el criterio del proyecto de traducir directamente el Tetragrama como ‘Yahvé’, en vez de ocultarlo tras una sustitución tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Renderización de יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - Yahvé de los Ejércitos
  - Yahvé de las Huestes
  rationale: ‘Ejércitos’ hace visible el valor militar del título צְבָאוֹת y evita la opacidad de ‘huestes’.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, 'Translate titles; transliterate names'; Contested terms for יְהוָה
- issue: Tensión entre ‘temblar’ y ‘moverse/sacudirse’ en el paralelismo
  english_pob_reading: the heavens tremble / the earth will shake
  chosen_spanish_reading: los cielos ... harán temblar / la tierra se moverá
  alternative_spanish_readings:
  - los cielos ... temblarán / la tierra se sacudirá
  - los cielos ... estremecerán / la tierra se agitará
  rationale: Se preserva el paralelismo con dos verbos distintos y el matiz causativo del primer miembro, sin uniformar artificialmente ambas acciones.
  doctrine_reference: Poetic parallelism and source-language force in Isaiah 13:13
translation_notes:
  revision_awareness: 'Texto revisado a la luz del audit trail inglés: se mantuvo el valor causativo del hebreo en la primera cláusula, el paralelismo poético con verbos distintos para cielos/tierra, y la traducción transparente del título divino. No se detectaron cambios posteriores que afecten este borrador.'
  spanish_consistency_notes:
  - Se emplea ‘Yahvé’ conforme al estándar del proyecto para יְהוָה.
  - Se traduce צְבָאוֹת por ‘los Ejércitos’ por consistencia con el criterio transparente del título.
  - Se mantiene un registro bíblico moderno y digno, evitando calcos innecesarios pero conservando la imagen de ira ardiente.
  - El orden de cláusulas sigue de cerca el hebreo para preservar la cadencia profética.
