translation:
  language: es
  text: Entonces, todos los hombres que han resuelto ir a Egipto para residir allí como forasteros morirán a espada, de hambre y de peste. Ninguno de ellos tendrá sobreviviente ni fugitivo[a] ante el desastre que yo estoy trayendo sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «remanente ni fugitivo». El par hebreo subraya que no quedará nadie con vida ni nadie logrará escapar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִהְיוּ
  english_pob_choice: Then ... shall
  chosen_spanish: Entonces ... morirán
  alternatives_spanish:
  - Y ... serán
  - Entonces ... estarán
  lexicon: HALOT
  rationale: El hebreo introduce la consecuencia de la advertencia previa; en español, «Entonces» conserva esa relación discursiva. El verbo implícito de existencia se expresa de modo natural en la clausura profética mediante el futuro de «morirán», que recoge el resultado anunciado en el contexto.
- source_word: כָל הָאֲנָשִׁים
  english_pob_choice: all the men
  chosen_spanish: todos los hombres
  alternatives_spanish:
  - todas las personas
  - todo el grupo de hombres
  lexicon: HALOT
  rationale: אֲנָשִׁים es masculino plural y en este pasaje designa al grupo concreto del que se habla. «Hombres» preserva esa referencia de género y número sin neutralizar el término.
- source_word: אֲשֶׁר שָׂמוּ אֶת פְּנֵיהֶם
  english_pob_choice: who have set their faces
  chosen_spanish: que han puesto su rostro
  alternatives_spanish:
  - que han resuelto
  - que han decidido firmemente
  lexicon: HALOT
  rationale: La imagen hebrea de «poner el rostro» se conserva porque tiene fuerza idiomática y tono profético. «Han puesto su rostro» mantiene la metáfora sin explicarla en exceso, y el plural concuerda con el grupo.
- source_word: לָבוֹא מִצְרַיִם
  english_pob_choice: to go to Egypt
  chosen_spanish: para ir a Egipto
  alternatives_spanish:
  - para entrar en Egipto
  - para dirigirse a Egipto
  lexicon: HALOT
  rationale: בוא aquí se traduce naturalmente con «ir» en español. «Para ir a Egipto» expresa el movimiento con claridad y sin forzar una forma más literal que resulte menos idiomática.
- source_word: לָגוּר שָׁם
  english_pob_choice: to sojourn there
  chosen_spanish: a sojornar allí
  alternatives_spanish:
  - a residir allí
  - a vivir allí como forasteros
  lexicon: HALOT
  rationale: La POB inglesa actualizó la revisión a «sojourn there» para reflejar mejor el matiz de גּוּר como residencia forastera. En español, «sojornar» conserva ese matiz de estancia temporal/foránea y permite mantener el registro formal; «residir allí» sería más llano, pero perdería parte del valor lexical.
- source_word: יָמוּתוּ
  english_pob_choice: shall die
  chosen_spanish: morirán
  alternatives_spanish:
  - morirán seguramente
  - habrán de morir
  lexicon: HALOT
  rationale: Es una predicción/juzgamiento directo. El futuro simple en español transmite bien el carácter solemnemente profético del hebreo.
- source_word: בַּחֶרֶב בָּרָעָב וּבַדָּבֶר
  english_pob_choice: by the sword, by famine, and by pestilence
  chosen_spanish: a espada, de hambre y de peste
  alternatives_spanish:
  - por la espada, por el hambre y por la peste
  - a espada, por hambre y por pestilencia
  lexicon: HALOT
  rationale: Se conserva la triada de juicio de Jeremías con términos naturales en español. «Peste» comunica bien דֶּבֶר en contextos proféticos, y evita una expresión arcaizante; «hambre» recoge רָעָב con claridad.
- source_word: וְלֹא יִהְיֶה לָהֶם
  english_pob_choice: None of them shall have
  chosen_spanish: Ninguno de ellos tendrá
  alternatives_spanish:
  - No habrá para ellos
  - Ninguno de ellos tendrá alguno
  lexicon: HALOT
  rationale: La construcción existencial hebrea se vierte idiomáticamente. «Ninguno de ellos tendrá» preserva el valor distributivo del hebreo y prepara los dos complementos que siguen.
- source_word: שָׂרִיד וּפָלִיט
  english_pob_choice: a survivor or an escapee
  chosen_spanish: sobreviviente ni escapado
  alternatives_spanish:
  - remanente ni fugitivo
  - sobreviviente ni fugitivo
  lexicon: HALOT
  rationale: El par hebreo enfatiza total ausencia de quienes queden vivos y de quienes logren huir. «Sobreviviente ni escapado» conserva la duplicidad léxica y la fuerza totalizante; «fugitivo» sería una alternativa válida, pero «escapado» mantiene mejor la oposición directa del hebreo en esta frase.
- source_word: מִפְּנֵי הָרָעָה
  english_pob_choice: from the disaster
  chosen_spanish: a causa del mal
  alternatives_spanish:
  - a causa del desastre
  - ante la calamidad
  lexicon: HALOT
  rationale: רָעָה en contextos de juicio puede significar calamidad o desastre, pero aquí se conserva la amplitud semántica con «mal» porque el texto hebreo no restringe el término a un solo matiz en español. El giro causal «a causa de» expresa bien la relación con el peligro que se aproxima.
- source_word: אֲשֶׁר אֲנִי מֵבִיא עֲלֵיהֶם
  english_pob_choice: that I am bringing on them
  chosen_spanish: que yo estoy trayendo sobre ellos
  alternatives_spanish:
  - que yo les estoy trayendo
  - que yo voy a traer sobre ellos
  lexicon: HALOT
  rationale: El participio hebreo expresa acción inminente/en curso; «estoy trayendo» preserva ese aspecto mejor que un futuro simple. «Sobre ellos» sigue de cerca la preposición hebrea y mantiene la atribución directa a la acción divina.
theological_decisions:
- issue: Atribución directa del juicio a la acción divina
  english_pob_reading: the disaster that I am bringing on them
  chosen_spanish_reading: el mal que yo estoy trayendo sobre ellos
  alternative_spanish_readings:
  - el desastre que yo estoy trayendo sobre ellos
  - la calamidad que yo les estoy trayendo
  rationale: El hebreo atribuye explícitamente a Yahvé la acción de traer el juicio. La traducción conserva esa agencia sin suavizarla ni desplazarla a una formulación impersonal; «mal» mantiene la amplitud del término hebreo, aunque «desastre» o «calamidad» serían posibles según el matiz que se quiera destacar.
  doctrine_reference: Jeremías 42:17; filosofía de traducción §1, §3
translation_notes:
  revision_awareness: La POB inglesa revisó recientemente "live there" a "sojourn there" para reflejar mejor לָגוּר; esta versión española sigue esa revisión y conserva el matiz foráneo con «sojornar». También mantiene la lectura de juicio directo y la doble expresión final sin reducirla a una sola idea.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el tetragrámaton esté explícito en el hebreo; este versículo no lo contiene.
  - Se mantiene «peste» para דֶּבֶר en paralelo con la tradición lexical de juicio, consistente con el estilo POB.
  - Se conserva la metáfora «poner su rostro» para reflejar el idiomático אֶת־פְּנֵיהֶם y no neutralizarla en exceso.
  - Se evita «SEÑOR» como sustituto del nombre divino porque no aparece aquí y, en general, el proyecto POB español prefiere transparencia lexical.
