translation:
  language: es
  text: Lamerán el polvo como una serpiente; como cosas que se arrastran sobre la tierra, saldrán temblando de sus fortalezas. A Yahvé nuestro Dios vendrán con pavor, y te temerán[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te tendrán temor» o «quedarán sobrecogidos ante ti». El hebreo puede expresar temor ante Dios, con posible matiz de sobrecogimiento o reverencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְלַחֲכוּ
  english_pob_choice: they will lick
  chosen_spanish: lamerán
  alternatives_spanish:
  - lamearán
  - ladrarán
  lexicon: HALOT
  rationale: El verbo expresa literalmente ‘lamer’; en español, ‘lamerán el polvo’ conserva la imagen corporal de humillación sin explicarla de más.
- source_word: עָפָר
  english_pob_choice: the dust
  chosen_spanish: el polvo
  alternatives_spanish:
  - el polvo de la tierra
  - el polvo
  lexicon: HALOT
  rationale: ‘Polvo’ es el equivalente natural en español y mantiene la humillación de comer/lamer el suelo.
- source_word: כַּנָּחָשׁ
  english_pob_choice: like a snake
  chosen_spanish: como una serpiente
  alternatives_spanish:
  - como una culebra
  - como un serpiente
  lexicon: HALOT
  rationale: ‘נָחָשׁ’ puede ser ‘serpiente’ o ‘culebra’; ‘serpiente’ funciona mejor en español bíblico amplio y conserva la imagen tradicional sin volverla demasiado coloquial.
- source_word: כְּזֹחֲלֵי אֶרֶץ
  english_pob_choice: like crawling things of the earth
  chosen_spanish: como cosas que se arrastran sobre la tierra
  alternatives_spanish:
  - como reptiles de la tierra
  - como criaturas que se arrastran por el suelo
  lexicon: HALOT
  rationale: La expresión subraya movimiento reptante y humillante. ‘Cosas que se arrastran’ preserva la generalidad del hebreo sin imponer una categoría zoológica estrecha.
- source_word: יִרְגְּז֖וּ מִ/מִּסְגְּרֹֽתֵי/הֶם
  english_pob_choice: they will come trembling out of their strongholds
  chosen_spanish: saldrán temblando de sus fortalezas
  alternatives_spanish:
  - saldrán temblando de sus enclosures
  - saldrán temblando de sus escondites
  lexicon: HALOT
  rationale: מִסְגֵּרֹת puede denotar lugares cerrados/protegidos. ‘Fortalezas’ es la opción más natural en español y mantiene el sentido de refugio defensivo, sin reducirlo a una sola imagen arquitectónica.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: ante
  alternatives_spanish:
  - a
  - hacia
  lexicon: HALOT
  rationale: En el contexto de acercamiento reverente/temeroso, ‘ante’ expresa mejor la orientación hacia Yahvé y la situación de comparecer delante de él que un simple ‘a’.
- source_word: יְהוָה אֱלֹהֵינוּ
  english_pob_choice: Yahweh our God
  chosen_spanish: Yahvé nuestro Dios
  alternatives_spanish:
  - Yahvé, nuestro Dios
  - el SEÑOR nuestro Dios
  lexicon: DOCTRINE.md Contested terms
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ‘Yahvé’. ‘Nuestro Dios’ conserva el vínculo pactual del posesivo hebreo.'
- source_word: יִפְחָדוּ
  english_pob_choice: they will come in dread
  chosen_spanish: vendrán con pavor
  alternatives_spanish:
  - vendrán con temor
  - vendrán aterrados
  lexicon: HALOT
  rationale: El verbo expresa miedo intenso. ‘Con pavor’ transmite el matiz de dread sin forzar una repetición de ‘temor’ en la cláusula siguiente.
- source_word: וְיִרְאוּ
  english_pob_choice: they will fear
  chosen_spanish: temerán
  alternatives_spanish:
  - tendrán temor
  - se atemorizarán
  lexicon: HALOT
  rationale: ‘ירא’ puede implicar temor o reverencia. Aquí, en paralelo con פחד, el sentido principal es temor real; ‘temerán’ es directo y formalmente fiel.
- source_word: מִמֶּךָּ
  english_pob_choice: because of you
  chosen_spanish: por causa de ti
  alternatives_spanish:
  - a causa de ti
  - por ti
  lexicon: HALOT
  rationale: La preposición con verbos de temor puede expresar causa. ‘Por causa de ti’ mantiene claridad en español y preserva que el temor es provocado por la presencia/acción de Dios.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se adopta el nombre divino explícito conforme al estándar del proyecto. No se lo sustituye por una mayúscula funcional, para conservar transparencia textual y auditable relación con el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Matiz de פחד / ירא en la clausula final
  english_pob_reading: dread / fear rather than reverential awe
  chosen_spanish_reading: pavor / temerán
  alternative_spanish_readings:
  - reverencia / temerán con reverencia
  - awe / estarán sobrecogidos
  rationale: La tensión se conserva distinguiendo el miedo intenso de la primera cláusula (‘pavor’) y el temor de la segunda (‘temerán’), sin resolver ambos en una sola noción de reverencia.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La redacción sigue el último pase de revisión del POB inglés: conserva la secuencia de tres imágenes humillantes, refleja el movimiento de salida desde lugares protegidos, y mantiene la distinción entre פחד e ירא. Se integró la decisión revisada de evitar una duplicación innecesaria de ‘venir’ en la cláusula intermedia; por eso se traduce con ‘saldrán temblando’ y ‘vendrán con pavor’, en vez de repetir un mismo verbo en ambas partes.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente con el estándar del proyecto.
  - ‘Fortalezas’ mantiene un registro bíblico claro y no domestica el plural hebreo de lugares protegidos.
  - La nota al pie se ancla en ‘temerán[a]’ para preservar la posible lectura de reverencia sin borrar el sentido principal de temor.
