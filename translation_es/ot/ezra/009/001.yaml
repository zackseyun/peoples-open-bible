translation:
  language: es
  text: 'Ahora bien, cuando estas cosas terminaron, los oficiales se acercaron a mí, diciendo: «El pueblo de Israel, y los sacerdotes y los levitas, no se han separado de los pueblos de las tierras, conforme a sus abominaciones[a]: los cananeos, los hititas, los ferezeos, los jebuseos, los amonitas, los moabitas, los egipcios y los amorreos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «conforme a sus prácticas detestables». El hebreo usa un término fuerte para prácticas religiosa o moralmente ofensivas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְכַלּוֹת אֵלֶּה
  english_pob_choice: Now when these things were finished
  chosen_spanish: Ahora bien, cuando estas cosas se hubieron terminado
  alternatives_spanish:
  - Y cuando estas cosas se terminaron
  - Después de que estas cosas se hubieron terminado
  lexicon: HALOT
  rationale: La forma temporal con infinitivo constructo de כלה expresa que la acción anterior quedó concluida antes del evento narrado. «Se hubieron terminado» conserva ese valor de anterioridad completa; «Ahora bien» mantiene el arranque narrativo natural del POB inglés sin depender de una traducción mecánica.
- source_word: נִגְּשׁוּ אֵלַי
  english_pob_choice: approached me
  chosen_spanish: se acercaron a mí
  alternatives_spanish:
  - se aproximaron a mí
  - vinieron a mí
  lexicon: HALOT
  rationale: נגשׁ en este contexto denota acercamiento personal a Esdras. «Se acercaron a mí» es claro, idiomático y conserva el movimiento directo hacia el hablante.
- source_word: הַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los príncipes
  - los líderes
  lexicon: HALOT
  rationale: En el marco persa del libro, שׂרים designa autoridades administrativas o gubernamentales. «Oficiales» evita la connotación monárquica de «príncipes» y sigue la decisión auditada del POB.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: y dijeron
  alternatives_spanish:
  - diciendo
  - al decir
  lexicon: HALOT
  rationale: En español, la secuencia «se acercaron a mí y dijeron» fluye con naturalidad como introducción de discurso directo. Mantiene la función quotativa de לֵאמֹר sin sobrecargar la frase.
- source_word: לֹא נִבְדְּלוּ
  english_pob_choice: have not separated themselves
  chosen_spanish: no se ha separado
  alternatives_spanish:
  - no se han separado
  - no se han mantenido aparte
  lexicon: HALOT
  rationale: El hebreo en nifal comunica separación relacional/covenantal. En español, el sujeto colectivo coordinado se expresa con singular colectivo («el pueblo... junto con...») para reflejar la unidad del reproche; «se ha separado» preserva el sentido reflexivo indicado por el POB.
- source_word: הָעָם יִשְׂרָאֵל וְהַכֹּהֲנִים וְהַלְוִיִּם
  english_pob_choice: the people of Israel, and the priests and the Levites
  chosen_spanish: El pueblo de Israel, junto con los sacerdotes y los levitas
  alternatives_spanish:
  - el pueblo de Israel, y los sacerdotes y los levitas
  - el pueblo de Israel, los sacerdotes y los levitas
  lexicon: HALOT
  rationale: La coordinación hebrea incluye a los tres grupos bajo la misma acusación. «Junto con» mantiene la inclusión de sacerdotes y levitas sin sugerir subordinación, y «sacerdotes» es el equivalente funcional español de כֹהֲנִים.
- source_word: מֵעַמֵּי הָאֲרָצוֹת
  english_pob_choice: from the peoples of the lands
  chosen_spanish: de los pueblos de las tierras
  alternatives_spanish:
  - de los pueblos de las regiones
  - de los pueblos de los territorios
  lexicon: HALOT
  rationale: La pluralidad de עמים y ארצות se conserva con «pueblos» y «tierras». «Tierras» sigue el valor regional-ético del hebreo y evita restringir indebidamente el término a divisiones políticas modernas.
- source_word: כְּתוֹעֲבֹתֵיהֶם
  english_pob_choice: according to their abominations
  chosen_spanish: conforme a sus abominaciones
  alternatives_spanish:
  - según sus abominaciones
  - de acuerdo con sus abominaciones
  - según sus prácticas detestables
  lexicon: HALOT
  rationale: El כ introduce conformidad o medida. «Conforme a» reproduce esa relación y mantiene la fuerza fuerte de תועבות, tal como lo hace el POB con «abominations».
- source_word: לַכְּנַעֲנִי ... וְהָאֱמֹרִי
  english_pob_choice: the Canaanites, the Hittites, the Perizzites, the Jebusites, the Ammonites, the Moabites, the Egyptians, and the Amorites
  chosen_spanish: los cananeos, los hititas, los ferezeos, los jebuseos, los amonitas, los moabitas, los egipcios y los amorreos
  alternatives_spanish:
  - los cananeos ... y los amorreos
  - el cananeo ... y el amorreo
  lexicon: HALOT
  rationale: Los gentilicinos singulares del hebreo se vierten en plural en español por idiomatismo y por la serie étnica del contexto. «Ferezeos» sigue la forma tradicional española para פְּרִזִּי, coherente con la lista de pueblos.
- source_word: הַמִּצְרִי
  english_pob_choice: the Egyptians
  chosen_spanish: los egipcios
  alternatives_spanish:
  - el egipcio
  - el pueblo egipcio
  lexicon: HALOT
  rationale: El gentilicio funciona como designación étnica dentro de una lista plural. El plural español conserva la paralelismo de la enumeración.
theological_decisions:
- issue: Fuerza moral-religiosa de תועבות
  english_pob_reading: according to their abominations
  chosen_spanish_reading: conforme a sus abominaciones
  alternative_spanish_readings:
  - según sus prácticas detestables
  - de acuerdo con sus prácticas detestables
  rationale: La expresión no es un simple comentario cultural; denuncia prácticas ritualmente y moralmente ofensivas. «Abominaciones» preserva la severidad del juicio y la carga de impureza covenantal sin suavizarla.
  doctrine_reference: Translation philosophy §1, §6
- issue: Alcance de la acusación sobre Israel
  english_pob_reading: The people of Israel, and the priests and the Levites, have not separated themselves
  chosen_spanish_reading: El pueblo de Israel, junto con los sacerdotes y los levitas, no se ha separado
  alternative_spanish_readings:
  - El pueblo de Israel, los sacerdotes y los levitas, no se han separado
  - El pueblo de Israel y los sacerdotes y los levitas no se han separado
  rationale: La sintaxis hebrea coordina a los tres grupos bajo un mismo verbo. La traducción conserva esa amplitud y no restringe la censura solo al laicado.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y mantiene el audit trail inglés sin cambios sustantivos respecto a la lectura aprobada; no se identificaron revisiones aplicadas en el registro fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto solo cuando aparezca el Tetragrámaton; aquí no aparece.
  - Se preserva la lista étnica en plural para concordar con el español natural y con el paralelismo del hebreo.
  - «Abominaciones» se conserva por su peso lexical y teológico, sin sustituirlo por un eufemismo más débil.
