id: PSA.132.7
reference: Psalms 132:7
source:
  edition: WLC
  text: נָב֥וֹאָה לְ/מִשְׁכְּנוֹתָ֑י/ו נִ֝שְׁתַּחֲוֶ֗ה לַ/הֲדֹ֥ם רַגְלָֽי/ו׃
translation:
  text: Let us go into his dwelling place[b][a]; let us bow down at his footstool.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let us enter his dwelling places.'
    reason: lexical_alternative
  - marker: b
    text: Or 'let us worship at his footstool.' The Hebrew more literally refers to bowing down.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָב֥וֹאָה
  chosen: Let us go
  alternatives:
  - Let us enter
  - We will go
  lexicon: HALOT
  rationale: Qal cohortative 1cp of בוא expresses a volitional exhortation, best rendered in English as 'Let us go.' 'Enter' is possible in context, but 'go' preserves the broader motion sense while remaining natural.
- source_word: לְמִשְׁכְּנוֹתָיו
  chosen: into his dwelling places
  alternatives:
  - to his tabernacles
  - to his dwelling place
  lexicon: HALOT
  rationale: מִשְׁכָּנוֹת is the plural of 'dwelling place/tabernacle' with 3ms suffix. The plural should be preserved rather than flattened to singular. 'Dwelling places' is more accessible modern English than 'tabernacles' while retaining the concrete sense.
- source_word: נִשְׁתַּחֲוֶה
  chosen: let us bow down
  alternatives:
  - let us worship
  - let us prostrate ourselves
  lexicon: HALOT
  rationale: Hishtaphel/Hithpael-like form of שׁחה denotes bowing oneself down in reverence. 'Bow down' preserves the physical posture explicit in the Hebrew; 'worship' is interpretive and broader.
- source_word: לַהֲדֹם
  chosen: at his footstool
  alternatives:
  - before his footstool
  - to the footstool
  lexicon: HALOT
  rationale: הֲדֹם means 'footstool.' With prefixed ל and article assimilated, the sense here is directional or locative in worship context. 'At his footstool' is idiomatic English and fits the parallelism with bowing down.
- source_word: רַגְלָיו
  chosen: his footstool
  alternatives:
  - the stool of his feet
  lexicon: HALOT
  rationale: The construct 'footstool of his feet' is a Hebrew idiom. English normally compresses this to 'his footstool' without loss of meaning.
