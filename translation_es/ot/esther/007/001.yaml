translation:
  language: es
  text: Entonces el rey y Amán vinieron a beber con la reina Ester[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y el rey y Amán vinieron a beber con Ester la reina».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - vino
  - llegaron
  - entraron
  lexicon: HALOT
  rationale: El wayyiqtol de בוא avanza la narración con pasado simple. En español, ‘vinieron’ conserva el movimiento hacia el banquete sin añadir la especificidad de ‘entraron’.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Es el sustantivo común con artículo; ‘el rey’ es natural y fiel al referente ya identificado en el relato.
- source_word: וְהָמָן
  english_pob_choice: and Haman
  chosen_spanish: y Amán
  alternatives_spanish:
  - e Haman
  lexicon: HALOT
  rationale: Nombre propio transliterado según uso español; la conjunción se rinde de manera directa.
- source_word: לִשְׁתּוֹת
  english_pob_choice: to drink
  chosen_spanish: a beber
  alternatives_spanish:
  - a beber vino
  - a festejar
  lexicon: HALOT
  rationale: El infinitivo de שׁתה significa ‘beber’. El hebreo no especifica vino ni usa un verbo más general para banquete, por lo que ‘a beber’ preserva el dato textual.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  lexicon: HALOT
  rationale: Preposición de compañía; ‘con’ es la equivalencia más directa en español.
- source_word: אֶסְתֵּר
  english_pob_choice: Esther
  chosen_spanish: Ester
  alternatives_spanish:
  - Esther
  lexicon: HALOT
  rationale: Nombre propio en forma española habitual sin hache, conforme a ortografía del español.
- source_word: הַמַּלְכָּה
  english_pob_choice: Queen Esther
  chosen_spanish: la reina
  alternatives_spanish:
  - la reina Ester
  - Ester la reina
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘Esther la reina’. En español, el título pospuesto ‘la reina’ mantiene el apposición sin forzar el orden inglés de ‘Queen Esther’; el nombre ya aparece antes en la frase.
- source_word: וַ
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: HALOT
  rationale: La waw narrativa introduce continuidad secuencial; ‘Así’ fluye bien en español y conserva la progresión narrativa sin añadir causalidad fuerte.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: el marcador [a] ahora aparece en el texto español, anclado en la frase final.'
  spanish_consistency_notes:
  - Se mantuvo la terminología ‘reina’ en minúscula por función común, no como nombre propio.
  - ‘Ester’ se escribe sin hache según el uso español bíblico estándar.
  - La elección de ‘a beber’ preserva el valor verbal del infinitivo hebreo sin ampliar indebidamente a ‘banquetear’.
