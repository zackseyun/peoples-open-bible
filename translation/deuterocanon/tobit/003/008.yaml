translation:
  text: because she had been given to seven husbands[a], and Asmodeus, the evil demon, killed them before they could be with her as with wives. And they said to her, “Do you not understand that you are choking your husbands? Already you have had seven, and you have not benefited from even one of them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'before they had relations with her.' The Greek expresses conjugal union euphemistically.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεδομένη
  chosen: had been given
  alternatives:
  - had been married
  - had been given in marriage
  lexicon: BDAG
  rationale: Perfect passive of δίδωμι; the passive highlights that she was given to husbands, likely in marriage arrangement. 'Had been given' stays close to the Greek while remaining intelligible.
- source_word: ἀνδράσιν ἑπτά
  chosen: to seven husbands
  alternatives:
  - to seven men
  lexicon: BDAG
  rationale: In this context ἀνήρ means 'husband,' not merely 'man,' since the verse concerns successive marriages.
- source_word: Ἀσμοδαῖος
  chosen: Asmodeus
  rationale: Standard transliteration of the proper name.
- source_word: τὸ πονηρὸν δαιμόνιον
  chosen: the evil demon
  alternatives:
  - the wicked demon
  - the evil spirit
  lexicon: BDAG
  rationale: Both adjective and noun are explicit in Greek. 'Demon' is the most direct rendering of δαιμόνιον here; 'evil' preserves πονηρόν without overinterpreting.
- source_word: ἀπέκτεινεν
  chosen: killed
  alternatives:
  - put to death
  - slew
  lexicon: BDAG
  rationale: Simple past narrative verb; 'killed' is direct, natural modern English.
- source_word: πρὶν ἢ γενέσθαι αὐτοὺς μετʼ αὐτῆς
  chosen: before they could be with her
  alternatives:
  - before they came to be with her
  - before they had relations with her
  lexicon: BDAG
  rationale: The idiom is elliptical and points to marital union. 'Could be with her' preserves some modesty of the Greek while fitting the following clarifying phrase.
- source_word: ὡς ἐν γυναιξίν
  chosen: as with wives
  alternatives:
  - in the manner customary with wives
  - as men are with women
  lexicon: BDAG
  rationale: This phrase clarifies that the reference is conjugal relations. 'As with wives' is concise and reflects the plural γυναιξίν in an idiomatic English way.
- source_word: Οὐ συνιεῖς
  chosen: Do you not understand
  alternatives:
  - Do you not realize
  - Can you not see
  lexicon: BDAG
  rationale: συνίημι commonly means understand or comprehend. The taunting speech is preserved with a straightforward interrogative.
- source_word: ἀποπνίγουσά
  chosen: you are choking
  alternatives:
  - you are suffocating
  - you are strangling
  lexicon: BDAG
  rationale: Present participle used predicatively in accusation. 'Choking' is vivid and close to the Greek, preserving the cruel hyperbole of the servants' insult.
- source_word: ἤδη ἑπτὰ ἔσχες
  chosen: Already you have had seven
  alternatives:
  - You have already had seven husbands
  lexicon: BDAG
  rationale: The object 'husbands' is implied from context. Keeping it implicit mirrors the Greek's terseness while remaining clear from the preceding clause.
- source_word: ἑνὸς αὐτῶν οὐκ ὠνάσθης
  chosen: you have not benefited from even one of them
  alternatives:
  - you have not been helped by one of them
  - you have not had one of them to your advantage
  lexicon: BDAG
  rationale: ὀνίναμαι/ὠνάσθης means to derive benefit or advantage. The insult is that none of the marriages yielded any benefit; 'benefited from even one of them' conveys that sense naturally.
