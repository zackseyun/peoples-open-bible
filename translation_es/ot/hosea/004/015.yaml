translation:
  language: es
  text: 'Aunque te prostituyes, Israel, que Judá no se haga culpable. Y no vaya a Gilgal, ni suba a Bet-aven[a], ni jure: «Vive Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Bet-aven» significa «casa de maldad» o «casa de iniquidad»; probablemente es un nombre polémico para Betel.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: Though
  chosen_spanish: Aunque
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: El valor concesivo del hebreo en este contexto se expresa naturalmente en español con «aunque», porque presupone la infidelidad de Israel y advierte a Judá que no la comparta.
- source_word: זֹנֶה
  english_pob_choice: prostitute yourself
  chosen_spanish: te prostituyes
  alternatives_spanish:
  - eres infiel
  - cometes prostitución
  lexicon: HALOT
  rationale: Conserva el metaforismo profético de la infidelidad del pacto con un verbo directo y comprensible en español, sin suavizarlo a una abstracción como «ser infiel».
- source_word: יֶאְשַׁם
  english_pob_choice: let not ... become guilty
  chosen_spanish: no se haga culpable
  alternatives_spanish:
  - no incurra en culpa
  - no sea hallado culpable
  lexicon: HALOT
  rationale: La idea es de llegar a ser culpable o incurrir en culpa; «se haga culpable» conserva la fuerza jussiva y suena natural en español.
- source_word: תָּבֹאוּ הַגִּלְגָּל
  english_pob_choice: go to Gilgal
  chosen_spanish: vayan a Gilgal
  alternatives_spanish:
  - vayan hasta Gilgal
  - entren en Gilgal
  lexicon: HALOT
  rationale: «Ir a» es la equivalencia más natural para el verbo de movimiento en una prohibición con nombre de lugar.
- source_word: תַּעֲלוּ
  english_pob_choice: go up
  chosen_spanish: suban
  alternatives_spanish:
  - asciendan
  - suban allí
  lexicon: HALOT
  rationale: «Subir» conserva el idiomático hebreo de ascender a un sitio cultual sin forzar una explicación adicional.
- source_word: בֵּית אָוֶן
  english_pob_choice: Beth-aven
  chosen_spanish: Bet-aven
  alternatives_spanish:
  - Casa de maldad
  - Casa de iniquidad
  - Betel
  lexicon: HALOT
  rationale: Se conserva el nombre polémico como topónimo transliterado, porque el texto usa una denominación despectiva que pierde fuerza si se paraphrasea en el cuerpo principal.
- source_word: תִּשָּׁבְעוּ
  english_pob_choice: swear
  chosen_spanish: juren
  alternatives_spanish:
  - hagan juramento
  - tomen juramento
  lexicon: HALOT
  rationale: En español, «jurar» comunica con precisión la acción del juramento y encaja bien en la prohibición.
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: ¡Vive Yahvé!
  alternatives_spanish:
  - ¡Por la vida de Yahvé!
  - ¡Yahvé vive!
  lexicon: HALOT
  rationale: La fórmula de juramento se traslada a una equivalencia idiomática breve y reconocible, preservando el nombre divino Yahvé según el estándar del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio terminológico del proyecto para el Tetragrama: «Yahvé» como forma principal en español, evitando la sustitución por «SEÑOR».'
theological_decisions:
- issue: Metáfora sexual de la infidelidad del pacto
  english_pob_reading: Retain the metaphor explicitly with 'prostitute yourself' rather than softening it to a generic 'be unfaithful.'
  chosen_spanish_reading: Mantener la metáfora con «te prostituyes» en vez de diluirla en «eres infiel».
  alternative_spanish_readings:
  - eres infiel
  - cometes adulterio espiritual
  rationale: Hoseas usa deliberadamente un lenguaje escandaloso para denunciar la idolatría; la traducción debe conservar esa tensión retórica y teológica.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
- issue: Nombre divino en la fórmula de juramento
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El hebreo trae explícitamente el Tetragrama; por coherencia doctrinal y auditabilidad, se conserva el nombre divino en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el dictamen auditado en inglés; no se registran revisiones posteriores que alteren la lectura base, y el consenso de revisión fue de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del Tetragrama.
  - Se conserva el tono profético directo sin suavizar la metáfora sexual.
  - Se usa transliteración de nombres de lugar cuando el hebreo aporta un juego polémico o despectivo.
  - La puntuación busca reflejar la serie de prohibiciones con claridad en español moderno.
