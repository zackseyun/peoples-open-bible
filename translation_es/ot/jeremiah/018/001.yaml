translation:
  language: es
  text: La palabra que vino a Yirmeyahu[a] de parte de Yahvé, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Yirmeyahu; tradicionalmente Jeremías.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el asunto
  lexicon: HALOT
  rationale: En la fórmula profética, דָּבָר introduce la revelación divina; «la palabra» conserva la estructura formal y la asociación bíblica con la palabra profética, como en el inglés POB.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: HALOT
  rationale: Es la partícula relativa natural en español para introducir la oración subordinada sin añadir énfasis innecesario.
- source_word: הָיָה אֶל
  english_pob_choice: came to
  chosen_spanish: vino a
  alternatives_spanish:
  - llegó a
  - se dirigió a
  lexicon: HALOT
  rationale: El hebreo expresa llegada/revelación hacia el profeta. «Vino a» reproduce de forma idiomática y breve la idea de movimiento revelador sin volverlo más interpretativo de lo necesario.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Yirmeyahu
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Yirmeyahu
  lexicon: uso estable en español bíblico
  rationale: Aunque el inglés POB translitera el nombre, en español «Jeremías» es la forma ampliamente reconocible y léxicamente estable para el lector bíblico; no altera el sentido del texto fuente.
- source_word: מֵאֵת
  english_pob_choice: from
  chosen_spanish: de parte de
  alternatives_spanish:
  - de
  - desde
  lexicon: HALOT
  rationale: En este contexto la preposición señala procedencia/origen de la palabra. «De parte de» hace explícita la fuente personal de la revelación y evita ambigüedad en español, manteniendo el valor relacional del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino con una forma española auditable y publicable. «Yahvé» sigue la decisión del proyecto de no ocultar el Tetragrámaton tras una sustitución titulativa.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  lexicon: HALOT
  rationale: En español, el gerundio introduce con naturalidad la cita directa o la continuación del discurso. «Diciendo» preserva la conexión sintáctica del hebreo con el oráculo que sigue.
theological_decisions:
- issue: Nombre divino YHWH en la fórmula profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: La línea del POB en inglés preserva el nombre propio de Dios. En español se adopta «Yahvé» como equivalente directo y reconocible, evitando la sustitución por un título y manteniendo la distinción teológica del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nombre del profeta en la fórmula introductoria
  english_pob_reading: Yirmeyahu
  chosen_spanish_reading: Jeremías
  alternative_spanish_readings:
  - Yirmeyahu
  rationale: Aunque la transliteración refleja con mayor transparencia el hebreo, el uso de «Jeremías» responde al registro bíblico habitual del español y facilita la lectura pública sin introducir una diferencia de sentido doctrinal.
  doctrine_reference: Convención onomástica bíblica en español
translation_notes:
  revision_awareness: 'Coincide con el estado de revisión más reciente: el audit trail inglés indica que no hubo cambios necesarios y que el consenso de revisión fue alto. La presente versión española sigue esa lectura estable sin introducir variantes textuales nuevas.'
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo de la fórmula profética: «La palabra ... que vino ... de parte de ... diciendo».'
  - Se evita la sustitución de Yahvé por «Señor» para conservar el nombre divino explícito.
  - Se usa el nombre bíblico español «Jeremías» por inteligibilidad en español, con nota de transparencia textual mediante la decisión léxica correspondiente.
