    issue: La nota [a] ofrece una alternativa léxica incorrecta para אַךְ.
    rationale: El inglés auditado registra para אַךְ valores como ‘Nevertheless/But/Only/However’, pero la nota existente «O, «solo»» no está bien justificada como la alternativa preservada en este versículo y además desplaza la nota relevante que el POB sí documentó para la pezuña.
  - severity: high
    issue: La nota [b] está anclada a la frase equivocada y cambia el contenido de la nota auditada.
    rationale: La nota inglesa [b] explica «unclean to you», es decir, «inmundo para ustedes», como clasificación dietaria para Israel. El borrador la pone sobre «no tiene la pezuña dividida» y añade una explicación distinta.
  - severity: medium
    issue: Falta preservar en nota la alternativa léxica documentada para ‘divide/split the hoof’.
    rationale: El POB inglés conserva una alternativa para la expresión de la pezuña. En español conviene mantener una alternativa equivalente, anclada en «pezuña dividida».
