translation:
  language: es
  text: pero solo[a] en el lugar que Yahvé escogerá, dentro de una de tus tribus[b]—allí ofrecerás tus holocaustos, y allí harás todo lo que yo te ordeno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «excepto en el lugar que Yahvé escogerá».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «dentro de una de tus tribus», es decir, dentro del territorio de una de las tribus de Israel.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: but only
  chosen_spanish: pero solo
  alternatives_spanish:
  - excepto
  - más bien solo
  lexicon: HALOT
  rationale: La expresión introduce una excepción exclusiva al contexto previo; «pero solo» conserva el valor restrictivo y suena natural en español.
- source_word: בַּמָּקוֹם
  english_pob_choice: at the place
  chosen_spanish: en el lugar
  alternatives_spanish:
  - en el sitio
  - en ese lugar
  lexicon: HALOT
  rationale: La referencia es a un lugar concreto de culto designado por Dios. «En el lugar» mantiene la definitud sin forzar una expresión poco idiomática.
- source_word: אֲשֶׁר יִבְחַר יְהוָה
  english_pob_choice: that Yahweh will choose
  chosen_spanish: que Yahvé escogerá
  alternatives_spanish:
  - que Yahvé elegirá
  - que Yahvé habrá escogido
  lexicon: HALOT
  rationale: Se preserva el nombre divino «Yahvé» según el criterio del proyecto y el futuro prospectivo del hebreo con «escogerá», natural en español.
- source_word: בְּאַחַד שְׁבָטֶיךָ
  english_pob_choice: in one of your tribes
  chosen_spanish: dentro de una de tus tribus
  alternatives_spanish:
  - en una de tus tribus
  - dentro del territorio de una de tus tribus
  lexicon: HALOT
  rationale: La frase alude al ámbito territorial de una tribu de Israel. «Dentro de una de tus tribus» conserva el término bíblico y permite la nota explicativa sin recargar el texto principal.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: HALOT
  rationale: «Allí» preserva la repetición enfática del hebreo con un registro claro y digno.
- source_word: תַּעֲלֶה עֹלֹתֶיךָ
  english_pob_choice: you shall offer up your burnt offerings
  chosen_spanish: ofrecerás tus holocaustos
  alternatives_spanish:
  - elevarás tus holocaustos
  - ofrecerás tus ofrendas quemadas
  lexicon: HALOT
  rationale: עֹלָה se vierte tradicionalmente como «holocausto» en español bíblico; el verbo implícito de ascenso sacrificial se expresa naturalmente con «ofrecerás».
- source_word: תַּעֲשֶׂה כֹּל אֲשֶׁר אָנֹכִי מְצַוֶּךָּ
  english_pob_choice: you shall do all that I am commanding you
  chosen_spanish: harás todo lo que yo te mando
  alternatives_spanish:
  - cumplirás todo lo que yo te estoy mandando
  - harás todo cuanto yo te mando
  lexicon: HALOT
  rationale: El verbo amplio עשה se traduce de forma directa con «harás», y el participio mandativo se expresa de modo natural con «te mando», sin perder la fuerza de la obligación continua.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: 'Se sigue el estándar del proyecto para YHWH: «Yahvé», manteniendo visible el nombre del pacto en lugar de sustituirlo por una máscara litúrgica.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Término sacrificial עֹלָה
  english_pob_reading: burnt offerings
  chosen_spanish_reading: holocaustos
  alternative_spanish_readings:
  - ofrendas quemadas
  - holocausto
  rationale: En español bíblico, «holocausto» conserva el término técnico del sacrificio totalmente consumido por el fuego. Se evita «ofrenda quemada» por ser más explicativa y menos tradicional como término técnico.
  doctrine_reference: Lexical tradition for sacrificial vocabulary in Spanish POB
- issue: Expresión territorial בְּאַחַד שְׁבָטֶיךָ
  english_pob_reading: in one of your tribes
  chosen_spanish_reading: dentro de una de tus tribus
  alternative_spanish_readings:
  - en una de tus tribus
  - dentro del territorio de una de tus tribus
  rationale: La formulación hebrea puede referirse al territorio asignado a una tribu. Se mantiene «tribus» en el texto y se deja la precisión territorial en la nota para no sobrecargar el versículo.
  doctrine_reference: Cultural-historical note on tribal allotments in Deuteronomy
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: el inglés POB adoptó una equivalencia óptima con «but only», «at the place», «Yahweh», «in one of your tribes», y «you shall offer up». No se aplicaron revisiones posteriores en el expediente, y la decisión española sigue esas opciones con ajuste idiomático y terminología bíblica habitual.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en armonía con el criterio del proyecto.
  - Se usa «holocaustos» para עֹלֹתֶיךָ como término técnico bíblico en español.
  - «Allí» se repite dos veces para reflejar la insistencia del hebreo.
  - La nota aclara el matiz territorial de «una de tus tribus» sin alterar el texto principal.
