translation:
  language: es
  text: Porque es mejor para nosotros ser botín para ellos[a]; pues seremos esclavos, y se nos perdonará la vida[b], y no veremos con nuestros propios ojos[c] la muerte de nuestros niños pequeños, ni a nuestras mujeres y a nuestros hijos mientras exhalan sus vidas[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «saqueo» o «presa» para «botín».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «nuestra alma vivirá»; la expresión significa que se nos conservará la vida.
    reason: lexical_alternative
  - marker: c
    text: O «ante nuestros ojos» para «con nuestros propios ojos».
    reason: lexical_alternative
  - marker: d
    text: El griego puede rendirse más literalmente como «nuestras mujeres y nuestros hijos con sus vidas apagándose», es decir, muriendo delante de nosotros.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρεῖσσον
  english_pob_choice: better
  chosen_spanish: mejor
  alternatives_spanish:
  - preferible
  lexicon: LSJ
  rationale: El comparativo expresa lo más ventajoso en la situación; «mejor» es el equivalente natural y digno en español.
- source_word: γενηθῆναι ... εἰς διαρπαγήν
  english_pob_choice: to become plunder
  chosen_spanish: ser botín
  alternatives_spanish:
  - convertirnos en botín
  - ser entregados al saqueo
  lexicon: LSJ
  rationale: La construcción indica quedar sujetos a la toma como presa. «Ser botín» conserva la fuerza breve y concreta del griego sin diluir el sentido.
- source_word: διαρπαγή
  english_pob_choice: plunder
  chosen_spanish: botín
  alternatives_spanish:
  - saqueo
  - presa
  lexicon: LSJ
  rationale: «Botín» recoge bien la idea de lo arrebatado por vencedores y funciona naturalmente en español bíblico contemporáneo.
- source_word: δούλους
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - siervos forzados
  - súbditos esclavizados
  lexicon: BDAG
  rationale: Se mantiene la fuerza coercitiva del término en un contexto de conquista; «esclavos» es la equivalencia más fiel y auditable.
- source_word: ζήσεται ἡ ψυχὴ ἡμῶν
  english_pob_choice: our lives will be spared
  chosen_spanish: nuestra vida será preservada
  alternatives_spanish:
  - nuestras vidas serán preservadas
  - seguiremos con vida
  - nuestra alma vivirá
  lexicon: LSJ
  rationale: Aunque literalmente dice que «nuestra alma/vida vivirá», el sentido idiomático es la conservación de la vida. «Será preservada» transmite ese valor sin perder el matiz vital.
- source_word: ὀψόμεθα
  english_pob_choice: we will see
  chosen_spanish: veremos
  alternatives_spanish:
  - contemplaremos
  - seremos testigos de
  lexicon: LSJ
  rationale: Es la traducción directa del futuro de ὁράω; el complemento refuerza el testimonio personal del horror.
- source_word: ἐν ὀφθαλμοῖς ἡμῶν
  english_pob_choice: with our own eyes
  chosen_spanish: con nuestros propios ojos
  alternatives_spanish:
  - ante nuestros ojos
  - a la vista nuestra
  lexicon: LSJ
  rationale: La expresión idiomática se conserva de forma natural en español y mantiene el énfasis en la experiencia directa.
- source_word: τὸν θάνατον τῶν νηπίων ἡμῶν
  english_pob_choice: the death of our little children
  chosen_spanish: la muerte de nuestros niños pequeños
  alternatives_spanish:
  - la muerte de nuestros infantes
  - la muerte de nuestros pequeñitos
  lexicon: LSJ
  rationale: «νήπιοι» refiere a niños muy pequeños; «niños pequeños» preserva la ternura y el alcance sin restringir indebidamente a «infantes».
- source_word: ἐκλειπούσας τὰς ψυχὰς αὐτῶν
  english_pob_choice: breathing out their lives
  chosen_spanish: que exhalan sus vidas
  alternatives_spanish:
  - que van perdiendo la vida
  - que entregan sus vidas
  - expirando
  lexicon: LSJ
  rationale: Se conserva la imaginería concreta del griego sobre la vida que se va; «exhalan sus vidas» comunica el proceso de muerte de manera vívida en español.
theological_decisions:
- issue: Renderización de δοῦλος en contexto de derrota y cautiverio
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - criados
  - bondados
  rationale: El contexto contrapone esclavitud forzada con muerte; la coerción es central y no debe suavizarse con «siervos».
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que añadió una coma para clarificar la coordinación final; en español se reflejó esa claridad con la puntuación y la unión de las dos cláusulas finales sin alterar el contenido.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero en este versículo no aparece el Tetragrámaton ni un equivalente divino explícito.
  - Se preservó la fuerza de «esclavos» conforme a la política del proyecto para δοῦλος en contextos de coerción.
  - La coordinación final se resolvió con una cláusula relativa en español para reflejar el participio griego sin sobreparafrasear.
