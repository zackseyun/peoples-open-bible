base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/005/006.yaml
  text: And the king and his men went to Jerusalem[a], to the Jebusites, the inhabitants of the land. And they said to David, “You will not come in here, for even the blind and the lame will turn you away,” saying[b], “David will not come in here.”
  footnotes:
  - marker: a
    text: Or, following the Hebrew singular, 'and he said to David'; the singular likely functions collectively for the Jebusite inhabitants.
    reason: textual_variant
  - marker: b
    text: 'The Hebrew of ''unless you remove the blind and the lame'' is difficult. The sense is a taunt: the Jebusites considered the city so secure that even ''the blind and the lame'' could keep David out.'
    reason: lexical_alternative
