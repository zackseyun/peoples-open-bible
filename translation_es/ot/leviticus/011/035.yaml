base_translation:
  language: en
  yaml_path: translation/ot/leviticus/011/035.yaml
  text: And anything on which any part of their carcass falls shall become unclean[a]. Whether oven or hearth, it must be broken down; they are unclean[b], and they shall be unclean for you.
  footnotes:
  - marker: a
    text: Or 'their dead body' or 'their carcasses.' The Hebrew refers to the carcass of the unclean creature in a purity-law context.
    reason: lexical_alternative
  - marker: b
    text: '''Hearth'' refers to a cooking installation; the Hebrew term may denote a stove, pot-range, or fireplace-like structure.'
    reason: cultural_note
