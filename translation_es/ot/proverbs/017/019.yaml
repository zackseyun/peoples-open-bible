translation:
  language: es
  text: Quien ama la transgresión ama la contienda; quien eleva su puerta[a] busca destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «levanta alta su puerta», «eleva su entrada» o «eleva su portón». La imagen puede sugerir autoexaltación arrogante, ostentación en la construcción, o una actitud que invita al desastre.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹהֵב
  english_pob_choice: loves
  chosen_spanish: ama
  alternatives_spanish:
  - le gusta
  - deléitase en
  lexicon: HALOT
  rationale: El participio qal expresa una disposición estable de amor o inclinación; «ama» conserva la fuerza moral y el paralelismo del proverbio.
- source_word: פֶּשַׁע
  english_pob_choice: transgression
  chosen_spanish: transgresión
  alternatives_spanish:
  - rebeldía
  - ofensa
  lexicon: HALOT
  rationale: פֶּשַׁע señala una violación deliberada o rebeldía. «Transgresión» mantiene ese peso ético sin suavizarlo.
- source_word: מַצָּה
  english_pob_choice: strife
  chosen_spanish: contienda
  alternatives_spanish:
  - pleito
  - discordia
  lexicon: HALOT
  rationale: En contexto sapiencial el sustantivo apunta a conflicto o disputa. «Contienda» comunica bien la relación con «transgresión» y evita restringirlo a una pelea puntual.
- source_word: מַגְבִּיהַּ
  english_pob_choice: makes ... high
  chosen_spanish: alza en alto
  alternatives_spanish:
  - levanta
  - exalta
  lexicon: HALOT
  rationale: El hifil indica hacer alto o elevar. «Alza en alto» conserva la imagen concreta y deja abierta la posible ironía de autoexaltación.
- source_word: פִּתְחוֹ
  english_pob_choice: his door
  chosen_spanish: su puerta
  alternatives_spanish:
  - su entrada
  - su portón
  lexicon: HALOT
  rationale: פֶּתַח designa una abertura o entrada. «Puerta» es la forma más natural en español y sigue la revisión inglesa que prefirió «door» por ser más directa.
- source_word: מְבַקֶּשׁ
  english_pob_choice: seeks
  chosen_spanish: busca
  alternatives_spanish:
  - anda tras
  - procura
  lexicon: HALOT
  rationale: El participio de בקש suele significar buscar. «Busca» mantiene el verbo y la ironía proverbial de perseguir un resultado destructivo.
- source_word: שָׁבֶר
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - quebrantamiento
  lexicon: HALOT
  rationale: שֶׁבֶר puede abarcar quiebre, ruina o calamidad. «Destrucción» transmite el desenlace grave de modo natural en español.
translation_notes:
  revision_awareness: La versión inglesa pasó de 'doorway' a 'door' para una referencia más directa al sustantivo singular; por eso el español usa «puerta» y no «entrada» ni «portón». También se optó por no anclar nota alguna, ya que la alternativa imaginativa del segundo hemistiquio puede quedar incorporada en la traducción sin nota textual obligatoria.
  spanish_consistency_notes:
  - 'Se mantuvo un paralelismo verbal claro entre los dos primeros hemistiquios: «ama ... ama».'
  - «Transgresión» y «contienda» conservan el tono ético general del proverbio.
  - El segundo hemistiquio conserva la imagen concreta de la puerta alzada, sin explicitar interpretaciones que el texto no exige.
