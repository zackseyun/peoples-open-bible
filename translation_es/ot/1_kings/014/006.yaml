translation:
  language: es
  text: 'Y sucedió que, cuando Ahiías oyó el sonido de sus pies al entrar por el umbral, dijo: «Entra, esposa de Jeroboam. ¿Por qué te disfrazas[a]? Porque he sido enviado a ti con un mensaje duro[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Por qué te haces pasar por otra?»
    reason: lexical_alternative
  - marker: b
    text: Lit. «he sido enviado a ti, duro»; el hebreo deja el sustantivo sin expresar, implicando un mensaje o noticia severa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֤וֹל רַגְלֶ֨י/הָ֙
  english_pob_choice: the sound of her feet
  chosen_spanish: el sonido de sus pies
  alternatives_spanish:
  - el sonido de sus pasos
  lexicon: HALOT
  rationale: Conservo la imagen concreta del hebreo. «Pies» refleja mejor el sustantivo מקור que «pasos», aunque esta última suena más idiomática en español.
- source_word: בָּאָ֣ה בַ/פֶּ֔תַח
  english_pob_choice: as she came in at the doorway
  chosen_spanish: al entrar por el umbral
  alternatives_spanish:
  - cuando entraba por la entrada
  - al llegar a la puerta
  lexicon: HALOT
  rationale: «Umbral» comunica פֶּתַח como abertura/entrada y mantiene la escena de movimiento hacia dentro sin volverla demasiado técnica.
- source_word: בֹּ֖אִי
  english_pob_choice: Come in
  chosen_spanish: Entra
  alternatives_spanish:
  - Pasa
  - Pasa adentro
  lexicon: HALOT
  rationale: Imperativo directo a una mujer; «Entra» es natural, breve y fiel. Evito una forma más explicativa.
- source_word: אֵ֣שֶׁת יָרָבְעָ֑ם
  english_pob_choice: wife of Jeroboam
  chosen_spanish: mujer de Jeroboam
  alternatives_spanish:
  - esposa de Jeroboam
  - la mujer de Jeroboam
  lexicon: HALOT
  rationale: Mantengo la relación constructa de forma transparente. «Mujer de Jeroboam» evita un giro posesivo forzado y suena sobrio en español bíblico.
- source_word: מִתְנַכֵּרָ֔ה
  english_pob_choice: disguising yourself
  chosen_spanish: te estás disfrazando
  alternatives_spanish:
  - te haces pasar por otra
  - te ocultas bajo otra apariencia
  lexicon: HALOT
  rationale: El hitpael expresa hacerse irreconocible o asumir otra apariencia. «Disfrazando» reproduce bien la intención narrativa de ir de incógnito.
- source_word: שָׁל֥וּחַ אֵלַ֖יִךְ
  english_pob_choice: I am sent to you
  chosen_spanish: yo estoy enviado a ti
  alternatives_spanish:
  - yo soy enviado a ti
  - he sido enviado a ti
  lexicon: HALOT
  rationale: Sigo de cerca el participio pasivo y su estado resultante. En español, «estoy enviado» conserva la forma sin añadir un sujeto agente explícito.
- source_word: קָשָֽׁה
  english_pob_choice: with a hard message
  chosen_spanish: con un mensaje duro
  alternatives_spanish:
  - con una palabra dura
  - con una noticia dura
  - con un mensaje severo
  lexicon: HALOT
  rationale: El hebreo deja el sustantivo implícito. «Mensaje» es una suplencia mínima y natural; «duro» conserva la tersura del adjetivo sin suavizar el contenido.
theological_decisions:
- issue: Noun left implicit after קָשָׁה
  english_pob_reading: 'Supply ''message'' in English: ''with a hard message'''
  chosen_spanish_reading: «con un mensaje duro»
  alternative_spanish_readings:
  - «con una palabra dura»
  - «con una noticia dura»
  - «con un mensaje severo»
  rationale: El contexto profético exige una palabra/oráculo severo, pero el hebreo no nombra el sustantivo. «Mensaje» es la adición más sobria y menos interpretativa para el español.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La redacción sigue el último pass del POB inglés, que prefirió «I am sent» para reflejar más de cerca el participio pasivo hebreo. En español se mantiene esa inmediatez con «estoy enviado», y se conserva la elipsis de קָשָׁה mediante una suplencia mínima («mensaje»).
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el tetragrámaton.
  - «Ahiías» mantiene la forma española usual del nombre profético.
  - «Mensaje duro» preserva la tensión entre literalidad y claridad sin convertirla en «oráculo» por adelantado.
  - Las comillas y la puntuación siguen el estilo editorial bíblico en español estándar.
