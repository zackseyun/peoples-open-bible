translation:
  language: es
  text: 'Y cuando se había vuelto inútil para los demás, ordenó que lo llevaran al fuego, mientras todavía respiraba[a], y que lo frieran en la sartén. Y cuando la sartén despedía abundante vapor[b], se animaban unos a otros, junto con su madre, a morir noblemente, diciendo esto:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras aún estaba con vida». El griego intensifica que el suplicio continuó antes de que ocurriera la muerte.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el humo» o «los humos» de la sartén. El griego puede denotar vapor o humos desprendidos en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄχρηστον
  english_pob_choice: useless
  chosen_spanish: inútil
  alternatives_spanish:
  - inservible
  - de ningún provecho
  lexicon: LSJ
  rationale: El adjetivo expresa que ya no servía para nada en el contexto de la tortura. 'Inútil' conserva la dureza deshumanizadora del griego sin sonar excesivamente técnico en español.
- source_word: τοῖς λοιποῖς
  english_pob_choice: to them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a los demás
  - para los otros
  lexicon: LSJ
  rationale: El dativo indica relación de utilidad o efecto respecto de los presentes/los demás implicados. 'Para ellos' reproduce bien ese valor relacional y sigue la naturalidad del español.
- source_word: γενόμενον
  english_pob_choice: had become
  chosen_spanish: se había vuelto
  alternatives_spanish:
  - había llegado a ser
  - se había hecho
  lexicon: LSJ
  rationale: El participio marca un estado resultante anterior a la acción siguiente. 'Se había vuelto' comunica con claridad ese cambio de estado previo.
- source_word: ἐκέλευσεν
  english_pob_choice: he ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio la orden de
  lexicon: LSJ
  rationale: Verbo narrativo de mandato coercitivo. 'Ordenó' es directo, idiomático y conserva la fuerza del griego.
- source_word: τῇ πυρᾷ προσάγειν
  english_pob_choice: to be brought to the fire
  chosen_spanish: que lo llevaran al fuego
  alternatives_spanish:
  - que lo acercaran al fuego
  - que lo condujeran al fuego
  lexicon: LSJ
  rationale: El contexto exige un objeto implícito sometido a acción. 'Llevaran al fuego' mantiene la violencia narrativa y evita una perífrasis demasiado inglesa.
- source_word: ἔτινουν
  english_pob_choice: while he was still breathing
  chosen_spanish: todavía respirando
  alternatives_spanish:
  - aún con vida
  - mientras aún respiraba
  lexicon: LSJ
  rationale: El adverbio intensifica que no había muerto todavía. 'Todavía respirando' conserva esa vividez y la secuencia narrativa sin forzar una subordinada pesada.
- source_word: τηγανίζειν
  english_pob_choice: to be fried in the pan
  chosen_spanish: que lo frieran en la sartén
  alternatives_spanish:
  - que lo asaran en la sartén
  - que lo cocieran en la sartén
  lexicon: LSJ
  rationale: El verbo remite a τηγανόν, 'sartén/plancha'. 'Freír' es la equivalencia más directa y mantiene el carácter cruelmente concreto del castigo.
- source_word: τῆς ... ἀτμίδος
  english_pob_choice: the vapor
  chosen_spanish: el vapor
  alternatives_spanish:
  - el humo
  - el humo y vapor
  lexicon: LSJ
  rationale: ἀτμίς designa vapor, aunque en este contexto puede sugerir también humos de la cocción. 'Vapor' es la opción más amplia y fiel al término griego.
- source_word: ἐφʼ ἱκανὸν διδούσης
  english_pob_choice: had spread considerably
  chosen_spanish: había alcanzado ya gran medida
  alternatives_spanish:
  - se había difundido considerablemente
  - había salido abundantemente
  lexicon: LSJ
  rationale: La frase señala una emisión abundante/suficiente. 'Había alcanzado ya gran medida' intenta reflejar ἐφʼ ἱκανόν sin añadir una interpretación demasiado específica sobre dispersión espacial.
- source_word: παρεκάλουν
  english_pob_choice: they encouraged one another
  chosen_spanish: se animaban unos a otros
  alternatives_spanish:
  - se exhortaban unos a otros
  - se alentaban mutuamente
  lexicon: LSJ
  rationale: El verbo puede significar animar, exhortar o urgir. 'Se animaban unos a otros' conserva el sentido de fortalecimiento mutuo en un contexto martirial.
- source_word: σὺν τῇ μητρὶ
  english_pob_choice: together with their mother
  chosen_spanish: junto con su madre
  alternatives_spanish:
  - con su madre
  - junto a su madre
  lexicon: LSJ
  rationale: La frase incluye a la madre dentro de la exhortación mutua. 'Junto con su madre' lo expresa de manera natural y explícita.
- source_word: γενναίως τελευτᾷν
  english_pob_choice: to die nobly
  chosen_spanish: morir noblemente
  alternatives_spanish:
  - morir valientemente
  - enfrentar la muerte con nobleza
  lexicon: LSJ
  rationale: γενναίως connota nobleza, valor y dignidad; τελευτᾶν es 'morir' o 'llegar al fin'. 'Morir noblemente' preserva el registro honorífico sin resolver la tensión moral en categorías posteriores.
- source_word: λέγοντες οὕτως
  english_pob_choice: saying this
  chosen_spanish: diciendo así
  alternatives_spanish:
  - diciendo esto
  - hablando así
  lexicon: LSJ
  rationale: Fórmula narrativa para introducir discurso directo. 'Diciendo así' es sobrio y natural en español bíblico contemporáneo.
theological_decisions:
- issue: Caracterización moral de la muerte de los hermanos
  english_pob_reading: to die nobly
  chosen_spanish_reading: morir noblemente
  alternative_spanish_readings:
  - morir valientemente
  - enfrentar la muerte con nobleza
  rationale: El griego describe la muerte en términos de dignidad y valor sin imponer categorías doctrinales externas. 'Morir noblemente' mantiene ese registro honorífico y deja abierta la tensión martirial del pasaje.
  doctrine_reference: Preservar la tensión del texto y su tono martirial sin sobreexplicar.
- issue: Valor intensivo de ἔτινουν respecto de la vida del condenado
  english_pob_reading: while he was still breathing
  chosen_spanish_reading: todavía respirando
  alternative_spanish_readings:
  - mientras aún respiraba
  - aún con vida
  rationale: La construcción subraya que el suplicio continuó antes de la muerte. 'Todavía respirando' conserva esa intensificación sin introducir una frase explicativa excesiva.
  doctrine_reference: Mantener la crudeza narrativa del martirio.
translation_notes:
  revision_awareness: El inglés auditado pasó de 'to the others' a 'to them' y de 'had spread widely' a 'had spread considerably'. La redacción española se alinea con esa revisión al expresar la relación como 'para ellos' y el alcance del vapor como 'había alcanzado ya gran medida', sin perder el sentido físico y brutal del pasaje.
  spanish_consistency_notes:
  - Se usa 'Yahvé' no aplica aquí; no hay tetragrámaton ni κύριος divino en este versículo.
  - Se mantiene el tono narrativo sobrio y martirial del libro de 2 Macabeos.
  - '''sartén'' traduce τηγανόν/τηγανίζειν con concreción; no se sustituye por un término más general que diluya la imagen.'
  - '''vapor'' se conserva como opción principal y se deja abierta la alternativa ''humo'' en nota por la amplitud semántica del griego.'
