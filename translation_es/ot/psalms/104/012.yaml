translation:
  language: es
  text: Encima de ellos habitan las aves de los cielos; de entre las ramas[a] hacen oír su voz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de entre el follaje» o «de entre las ramas frondosas». El sustantivo hebreo es raro y puede referirse de manera amplia a vegetación frondosa o ramas con hojas.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲלֵיהֶם
  english_pob_choice: Above them
  chosen_spanish: Encima de ellos
  alternatives_spanish:
  - Sobre ellos
  - Por encima de ellos
  lexicon: HALOT
  rationale: La idea es locativa y espacial, vinculada al verso anterior. «Encima de ellos» conserva el sentido de superposición/altura sin sonar tan rígido como un calco literal.
- source_word: עוֹף הַשָּׁמַיִם
  english_pob_choice: the birds of the heavens
  chosen_spanish: las aves de los cielos
  alternatives_spanish:
  - las aves del cielo
  - las aves del firmamento
  lexicon: HALOT
  rationale: «עוֹף» abarca aves o criaturas voladoras; en español «aves» comunica con naturalidad el colectivo. «De los cielos» conserva el plural poético hebreo y evita reducir la expresión a una simple referencia meteorológica al «cielo».
- source_word: יִשְׁכּוֹן
  english_pob_choice: dwell
  chosen_spanish: habitan
  alternatives_spanish:
  - moran
  - viven
  - se establecen
  lexicon: HALOT
  rationale: El verbo indica residir o habitar. «Habitan» mantiene el valor de permanencia sin añadir la imagen de anidar, que no está explícita en el hebreo.
- source_word: מִבֵּין
  english_pob_choice: from among
  chosen_spanish: de entre
  alternatives_spanish:
  - de entre medio de
  - desde entre
  lexicon: HALOT
  rationale: «De entre» es la correspondencia natural en español para un origen situado dentro de un espacio intermedio, y conserva la relación locativa del hebreo.
- source_word: עֳפָאיִם
  english_pob_choice: the branches
  chosen_spanish: las ramas
  alternatives_spanish:
  - el follaje
  - las ramas frondosas
  - las ramas y hojas
  lexicon: HALOT
  rationale: El sustantivo es raro y puede abarcar ramas o vegetación frondosa. «Ramas» es la opción más clara y sobria en español; la ambigüedad léxica se preserva con la nota.
- source_word: יִתְּנוּ קוֹל
  english_pob_choice: they give forth their voice
  chosen_spanish: dan su voz
  alternatives_spanish:
  - hacen oír su voz
  - producen su voz
  - entonan su canto
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es «dan voz/sonido». «Dan su voz» conserva la idiomática sin forzar «cantar», que interpretaría más de lo que el texto dice.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés, manteniendo la imagen poética y la ambigüedad léxica del término raro para עֳפָאיִם. No se introdujeron elementos interpretativos como «anidan» o «cantan», que irían más allá del hebreo y del POB inglés.
  spanish_consistency_notes:
  - Se usó «Dios»/«Yahvé» no aplicable en este verso.
  - Se prefirió «aves» para el colectivo de עוֹף, en coherencia con el registro bíblico natural en español.
  - Se conservó el plural poético «cielos» para reflejar la forma hebrea y el estilo elevado del verso.
