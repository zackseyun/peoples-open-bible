review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la estructura y el sentido básico del hebreo: Yahvé aborrece el camino del impío y ama a quien persigue צְדָקָה. Sin embargo, el texto principal invierte la decisión léxica principal documentada en el POB inglés para צְדָקָה: el inglés eligió ''righteousness'' y dejó ''justice'' como alternativa, mientras que el español principal puso ''justicia'' y relegó ''rectitud'' a nota. Eso no preserva bien la racionalidad léxica auditada.'
  spanish_quality_summary: El español es claro, digno y natural. 'Abominación a Yahvé es…' suena bíblico y comprensible, aunque algo más natural en español sería 'El camino del impío es una abominación para Yahvé'. La redacción actual es aceptable, pero la elección de 'justicia' en el texto principal introduce un matiz más estrecho que 'rectitud'.
  glossary_alignment: Alinea bien con el glosario en 'Yahvé' para יְהוָה. 'Impío' y 'camino' son adecuados. El problema principal es צְדָקָה, que por defecto y por el razonamiento auditado aquí debe ir como 'rectitud' o 'justicia' según contexto; en este proverbio el expediente inglés justificó 'righteousness' como mejor opción. Por ello en español conviene poner 'rectitud' en el texto principal y dejar 'justicia' como alternativa en nota.
  issues:
  - severity: medium
    issue: La traducción principal de צְדָקָה como 'justicia' no sigue la decisión auditada del POB inglés.
    rationale: El expediente inglés eligió 'righteousness' por su sentido ético y teológico más amplio en Proverbios, dejando 'justice' como alternativa más estrecha. En español, 'rectitud' preserva mejor ese valor que 'justicia'.
  - severity: low
    issue: La nota alternativa [b] está invertida respecto del texto principal recomendado.
    rationale: Si el texto principal usa 'rectitud', la nota puede preservar 'justicia' como alternativa, reflejando fielmente el audit trail inglés.
  revised_spanish_text: Abominación a Yahvé es el camino del impío[a], pero ama al que persigue la rectitud[b].
  revised_footnotes:
  - marker: a
    text: 'O: «Detestable para Yahvé es el camino de un hombre impío».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ama a quien persigue la justicia».'
    reason: lexical_alternative
  revision_rationale: Se conserva la sintaxis y el tono del borrador, pero se corrige la decisión léxica clave para צְדָקָה, poniendo 'rectitud' en el texto principal para reflejar mejor el sentido de 'righteousness' documentado en el POB inglés. La alternativa 'justicia' se mantiene en nota, en paralelo con el expediente auditado.
