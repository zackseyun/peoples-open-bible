  language: en
  yaml_path: translation/ot/exodus/019/016.yaml
  text: And it happened on the third day[a], when morning came, that there were thunders and lightnings, and a heavy cloud on the mountain, and the sound of a trumpet, very loud[c][b]; and all the people who were in the camp trembled.
  footnotes:
  - marker: a
    text: Or 'voices'; the Hebrew word can mean 'sounds' or 'voices,' but here, alongside 'lightnings,' it most likely refers to thunder.
    reason: lexical_alternative
  - marker: b
    text: Or 'the sound of a ram's horn.' The Hebrew shofar is a horn trumpet, traditionally made from an animal horn.
    reason: lexical_alternative
  - marker: c
    text: Literally 'very strong'; in context this describes the intensity of the trumpet sound.
    reason: lexical_alternative
