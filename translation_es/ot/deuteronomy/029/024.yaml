translation:
  language: es
  text: 'Entonces dirán[a]: «Porque abandonaron el pacto de Yahvé, el Dios de sus padres, que hizo con ellos cuando los sacó de la tierra de Egipto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el Dios de sus padres»; alternativamente, «el Dios de los padres de ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמְרוּ
  english_pob_choice: Then they will say
  chosen_spanish: Entonces dirán
  alternatives_spanish:
  - Y dirán
  - Y entonces dirán
  lexicon: WLC / English POB audit trail
  rationale: El hebreo continúa la secuencia narrativa con valor de consecuencia/discurso; «entonces» reproduce bien esa progresión en español sin forzar una perífrasis futura innecesaria.
- source_word: עַל אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - A causa de que
  - Debido a que
  lexicon: WLC / English POB audit trail
  rationale: La construcción introduce la causa de la desolación; «porque» es la forma más natural y fiel en español.
- source_word: עָזְבוּ
  english_pob_choice: forsook
  chosen_spanish: abandonaron
  alternatives_spanish:
  - desampararon
  - dejaron
  lexicon: HALOT
  rationale: En español, «abandonaron» comunica mejor la deserción deliberada del pacto. «Forsook» en inglés delata un registro más formal, pero en español «forsook» no tiene equivalente vivo; «abandonaron» mantiene la fuerza covenantal sin arcaísmo impropio.
- source_word: בְּרִית
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - convenio
  lexicon: HALOT
  rationale: En español bíblico, «pacto» conserva mejor el peso teológico y la familiaridad eclesial que «alianza» o «convenio».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: DOCTRINE.md contested terms
  rationale: 'Se sigue el estándar del proyecto para el Tetragrama: «Yahvé». Mantiene el nombre divino personal y evita la sustitución por un título.'
- source_word: אֱלֹהֵי אֲבֹתָם
  english_pob_choice: the God of their fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  - el Dios de sus padres varones
  lexicon: HALOT
  rationale: La frase hebrea es literalmente «el Dios de sus padres». En español, «padres» conserva la forma idiomática y el vínculo patriarcal del texto; «antepasados» suaviza demasiado la referencia y pierde la correspondencia más directa.
- source_word: אֲשֶׁר כָּרַת עִמָּם
  english_pob_choice: which he made with them
  chosen_spanish: que él hizo con ellos
  alternatives_spanish:
  - que él pactó con ellos
  - que él concertó con ellos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «cortó un pacto», el español natural para esta construcción es «hizo con ellos». Esto preserva el sentido de establecimiento del pacto sin una calca extraña.
- source_word: בְּהוֹצִיאוֹ אֹתָם
  english_pob_choice: when he brought them out
  chosen_spanish: cuando los sacó
  alternatives_spanish:
  - cuando los hizo salir
  - al sacarlos
  lexicon: HALOT
  rationale: La cláusula temporal expresa el éxodo; «cuando los sacó» es idiomático, breve y fiel al evento de liberación.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: out of the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - de Egipto
  lexicon: HALOT
  rationale: «Tierra» reproduce con precisión la extensión de «land» y mantiene la solemnidad del contexto, además de conservar el eco del éxodo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: Se conserva la transliteración del nombre divino, conforme a la política del proyecto, en lugar de sustituirlo por «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Expresión de parentesco en אֱלֹהֵי אֲבֹתָם
  english_pob_reading: the God of their fathers
  chosen_spanish_reading: el Dios de sus padres
  alternative_spanish_readings:
  - el Dios de sus antepasados
  rationale: Se preserva la referencia patriarcal del hebreo sin neutralizarla; «padres» es la correspondencia española más directa y reconocible.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El auditor inglés revisó «abandoned» por «forsook» para un registro más formal y cercano al contexto pactal. En español, se eligió «abandonaron» porque «forsook» no tiene equivalente natural y «abandonaron» comunica adecuadamente la infidelidad al pacto sin perder claridad ni solemnidad.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se usó «pacto» para בְּרִית, coherente con el lenguaje teológico español del proyecto.
  - La cita se cerró con comillas angulares españolas y la puntuación final dentro de la cita, según norma española.
  - El marcador de nota [a] aparece exactamente en el punto correspondiente al giro de parentesco, donde existe la alternativa lexical relevante.
