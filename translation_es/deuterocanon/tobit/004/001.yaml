  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. La principal cuestión léxica es mantener la preferencia POB por la forma más formalmente transparente del griego: ἀργύριον → «la plata» en el texto, con «el dinero» como alternativa. También conviene conservar la nota sobre «Rhages» como variante de transliteración del topónimo.'
