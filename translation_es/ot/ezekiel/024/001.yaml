translation:
  language: es
  text: Y vino la palabra de Yahvé a mí en el noveno año[a], en el décimo mes, el décimo día del mes, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en el noveno año»; el sistema de datación de Ezequiel suele referirse a los años del exilio del rey Joaquín.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce un hecho nuevo. En español, «vino» reproduce bien la llegada de la palabra divina y mantiene un tono natural sin perder el valor discursivo del waw consecutivo.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: «Palabra» conserva la fuerza profética y formal del hebreo; «Yahvé» sigue la convención del proyecto para יהוה y evita sustituir el nombre propio por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hasta mí
  lexicon: HALOT
  rationale: La preposición hebrea con sufijo de primera persona singular se vierte de manera directa y natural con «a mí».
- source_word: בַּשָּׁנָה הַתְּשִׁיעִית
  english_pob_choice: in the ninth year
  chosen_spanish: en el noveno año
  alternatives_spanish:
  - en el año noveno
  - en el noveno año del exilio
  lexicon: HALOT
  rationale: El hebreo dice solo «en el noveno año». La mención del exilio está en el sistema cronológico de Ezequiel, pero no debe añadirse al texto principal sin base explícita.
- source_word: בַּחֹדֶשׁ הָעֲשִׂירִי
  english_pob_choice: in the tenth month
  chosen_spanish: en el décimo mes
  alternatives_spanish:
  - en el mes décimo
  - en el décimo mes del año
  lexicon: HALOT
  rationale: «Mes» es el equivalente normal en español para la fórmula calendárica hebrea; «décimo» conserva el orden del original.
- source_word: בֶּעָשׂוֹר לַחֹדֶשׁ
  english_pob_choice: on the tenth day of the month
  chosen_spanish: al décimo día del mes
  alternatives_spanish:
  - el día diez del mes
  - el décimo del mes
  lexicon: HALOT
  rationale: La expresión idiomática especifica el día dentro del mes. «Al décimo día del mes» es preciso y idiomático en español bíblico contemporáneo.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - 'así:'
  - 'y dijo:'
  lexicon: HALOT
  rationale: En español, el gerundio mantiene la función introductoria de la cita siguiente y corresponde al uso formulístico del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'Se sigue la política del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» en lugar de sustituirlo por un título. Esto preserva la identidad del nombre propio en el texto español.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se revisó el antecedente inglés y el paquete hebreo directo; no hubo revisiones textuales aplicadas en el tramo auditado, y la concordancia de revisión quedó sin cambios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme a la terminología del proyecto.
  - Se conserva la formulación profética compacta sin añadir «del exilio» al texto principal.
  - La cadencia de la cláusula final deja abierta la continuación del discurso en el versículo siguiente.
