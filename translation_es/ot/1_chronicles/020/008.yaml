translation:
  language: es
  text: Estos nacieron de Rapha en Gat[a], y cayeron por mano de David y por mano de sus siervos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Rapha»; posiblemente se refiere a descendientes de los refaítas, es decir, un linaje de gigantes en Gat.
    reason: alternative_reading
lexical_decisions:
- source_word: אֵל
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Estas
  - Estos hombres
  lexicon: HALOT
  rationale: El demostrativo retoma a los guerreros mencionados antes. «Estos» preserva la referencia sin añadir un sustantivo que el hebreo no repite.
- source_word: נוּלְּדוּ
  english_pob_choice: were born
  chosen_spanish: nacieron
  alternatives_spanish:
  - fueron engendrados
  - fueron nacidos
  lexicon: HALOT
  rationale: El nifal de ילד se expresa naturalmente como «nacer». En este contexto genealógico transmite origen o descendencia sin forzar una paráfrasis mayor.
- source_word: לְהָרָפָא
  english_pob_choice: to Rapha
  chosen_spanish: para Rapa
  alternatives_spanish:
  - a Rapa
  - de Rapa
  - para el Rapa
  lexicon: HALOT
  rationale: La traducción española sigue la decisión inglesa de mantener el nombre/linaje sin resolverlo como «gigante» o «refaítas». «Para» refleja la preposición ל de manera visible en español y conserva la ambigüedad del referente.
- source_word: בְּגַת
  english_pob_choice: in Gath
  chosen_spanish: en Gat
  alternatives_spanish:
  - en Gath
  lexicon: HALOT
  rationale: Se conserva el topónimo filológico en forma breve y clara en español. «Gat» es la forma usual en español bíblico para la ciudad filistea.
- source_word: וַיִּפְּלוּ
  english_pob_choice: and they fell
  chosen_spanish: y cayeron
  alternatives_spanish:
  - y fueron derribados
  - y murieron
  lexicon: HALOT
  rationale: «Caer» reproduce la imagen verbal hebrea y deja implícito el sentido bélico de derrota o muerte, como en el inglés POB.
- source_word: בְיַד
  english_pob_choice: by the hand of
  chosen_spanish: por mano de
  alternatives_spanish:
  - por la mano de
  - a manos de
  lexicon: HALOT
  rationale: La locución hebrea de agencia se traduce de modo idiomático en español con «por mano de», manteniendo el valor instrumental y militar.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus hombres
  lexicon: HALOT
  rationale: «Siervos» conserva la fuerza léxica de עבד y sigue el criterio de la POB de no suavizarlo a «hombres» sin necesidad contextual.
theological_decisions:
- issue: Identidad de הָרָפָא / Rapha
  english_pob_reading: A lineage/group designated 'the Rapha', left open rather than reduced to 'giant' language
  chosen_spanish_reading: Un linaje o grupo llamado Rapa, sin resolverlo como «gigante» o «refaítas» en el texto principal
  alternative_spanish_readings:
  - Rapa como antepasado personal
  - el gigante
  - los refaítas
  rationale: El hebreo puede leerse como nombre propio, designación de clan o alusión genealógica. Siguiendo la POB en inglés, la versión española preserva la ambigüedad y no introduce una interpretación más fuerte que el texto no exige.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa reciente quitó el artículo antes de Rapha para hacer más natural el nombre propio. La versión española evita también un artículo delante de Rapa y conserva la misma ambigüedad de linaje/nombre propio sin ampliar la explicación en el cuerpo del texto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no se usa.
  - Se conserva «siervos» para עבד, en línea con el valor léxico fuerte y la preferencia del proyecto por no suavizarlo a «hombres».
  - Se usa «Gat» como forma española del topónimo.
  - La nota al pie preserva la alternativa interpretativa documentada en el aparato inglés sin resolverla en la línea principal.
