  yaml_path: translation/ot/isaiah/009/019.yaml
  text: He cuts on the right[a], but is hungry; he eats on the left, but is not satisfied[b]. Each one eats the flesh of his own arm.
  footnotes:
  - marker: a
    text: Or 'He snatches on the right ... he devours on the left.' The Hebrew imagery may suggest violent grabbing for food rather than ordinary eating.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'Each one eats the flesh of his arm.' This likely depicts extreme internal strife or self-destruction in cannibalistic imagery.
    reason: cultural_note
