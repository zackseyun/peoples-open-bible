translation:
  language: es
  text: Bendigan al Señor[a], aguas y todo lo que está sobre los cielos; cántenle alabanzas y exáltenlo en gran manera para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «todo lo que está sobre el cielo». La frase griega puede entenderse de manera colectiva como las realidades cósmicas superiores al cielo o los cielos.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendigan
  alternatives_spanish:
  - Bendecid
  - Alaben
  lexicon: BDAG
  rationale: El imperativo plural llama a toda la creación a dirigir una bendición/loor al Señor; en español, «bendigan» conserva mejor el eco litúrgico que «alaben», sin volverse arcaico.
- source_word: ὕδατα
  english_pob_choice: waters
  chosen_spanish: aguas
  alternatives_spanish:
  - agua
  lexicon: LSJ
  rationale: El plural griego se conserva con «aguas», manteniendo el tono poético y la personificación cósmica del texto.
- source_word: πάντα τὰ ἐπάνω τοῦ οὐρανοῦ
  english_pob_choice: all that are above the heavens
  chosen_spanish: todo lo que está arriba de los cielos
  alternatives_spanish:
  - todas las cosas que están sobre los cielos
  - todo lo que está en las alturas de los cielos
  lexicon: LSJ
  rationale: La frase neutra colectiva admite una traducción inclusiva en español. «Arriba de los cielos» expresa el valor locativo de ἐπάνω y mantiene la amplitud cósmica del original sin forzar un calco pesado.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Dios
  - el Señor
  lexicon: BDAG
  rationale: Se conserva el título divino según la norma del proyecto para κύριος. En este contexto doxológico, «el Señor» es natural y fiel al griego.
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: cántenle alabanzas
  alternatives_spanish:
  - cántenle
  - alábenlo con cánticos
  lexicon: BDAG
  rationale: El verbo implica alabar cantando; «cántenle alabanzas» preserva el matiz musical mejor que un simple «alábenlo».
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: ensálcenlo muy por encima
  alternatives_spanish:
  - exáltelo sobremanera
  - levántenlo en extremo
  lexicon: LSJ
  rationale: El compuesto intensifica la exaltación. Se opta por una construcción española que comunica elevación extrema sin perder claridad.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: «Para siempre» expresa de manera natural la duración indefinida doxológica del griego, sin introducir una fórmula eclesiástica más cargada que el original.
theological_decisions:
- issue: Renderización de κύριος en una alabanza litúrgica cósmica
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Señor Dios
  - el SEÑOR
  rationale: Aunque el texto griego no escribe el nombre hebreo, el título κύριος funciona aquí como designación divina. «El Señor» sigue el audit trail del POB sin adoptar la convención tipográfica de mayúsculas reservadas.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «the heaven» por «the heavens» para ajustarse mejor a τοῦ οὐρανοῦ. La redacción española refleja esa misma preferencia con «los cielos».
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, conforme al criterio del proyecto.
  - Se conserva el plural poético «aguas» y la referencia cósmica amplia de la segunda cláusula.
  - El tono es doxológico y apto para lectura pública, evitando arcaísmos innecesarios.
