translation:
  language: es
  text: Aborrezco, rechazo sus fiestas, y no oleré[a] sus asambleas solemnes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «no oleré»; es decir, no las aceptaré ni me agradarán.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂנֵאתִי
  english_pob_choice: I hate
  chosen_spanish: Yo aborrezco
  alternatives_spanish:
  - Yo odio
  - Yo he odiado
  lexicon: HALOT
  rationale: El perfecto 1cs expresa aquí una declaración fuerte de rechazo divino. En español, «aborrezco» comunica repulsión intensa con un registro digno, sin suavizar el tono profético ni obligar a una lectura temporal que el hebreo no exige.
- source_word: מָאַסְתִּי
  english_pob_choice: I reject
  chosen_spanish: desprecio
  alternatives_spanish:
  - rechazo
  - desecho
  lexicon: HALOT
  rationale: מאס expresa repudiar algo como inaceptable. «Desprecio» conserva la fuerza de rechazo personal y evaluativo en una línea natural junto a «aborrezco», sin repetir exactamente el mismo matiz de «rechazo».
- source_word: חַגֵּיכֶם
  english_pob_choice: your festivals
  chosen_spanish: sus fiestas
  alternatives_spanish:
  - sus festivales
  - sus fiestas de peregrinación
  lexicon: HALOT
  rationale: חג designa las celebraciones festivas cultuales. «Fiestas» es un equivalente claro y natural en español bíblico contemporáneo, suficientemente amplio para abarcar el contexto de culto denunciado por el profeta.
- source_word: וְלֹא
  english_pob_choice: and ... not
  chosen_spanish: y no
  alternatives_spanish:
  - ni
  - y no habré de
  lexicon: HALOT
  rationale: La secuencia conjuntiva negativa enlaza la última cláusula con la anterior. «Y no» conserva la progresión y la coordinación del hebreo sin introducir una lógica distinta.
- source_word: אָרִיחַ
  english_pob_choice: I will not smell
  chosen_spanish: oleré
  alternatives_spanish:
  - oleré por encima de
  - aspiraré
  lexicon: HALOT
  rationale: El verbo hiphil de רוח tiene el sentido literal de oler, con posible trasfondo idiomático de aceptar o complacerse. Dado que el texto fuente aquí mantiene la imagen literal, «oleré» preserva la metáfora sin expandirla interpretativamente en el cuerpo principal.
- source_word: בְּעַצְּרֹתֵיכֶם
  english_pob_choice: your solemn assemblies
  chosen_spanish: sus asambleas solemnes
  alternatives_spanish:
  - sus congregaciones solemnes
  - sus reuniones sagradas
  lexicon: HALOT
  rationale: עֲצָרָה/עֲצֶרֶת denota una asamblea o reunión solemne, de tono cultual. «Asambleas solemnes» mantiene la formalidad y el carácter religioso del término con una construcción transparente para lectores de español.
theological_decisions:
- issue: Lenguaje antropomórfico de aceptación cultual
  english_pob_reading: I will not smell your solemn assemblies
  chosen_spanish_reading: no oleré sus asambleas solemnes
  alternative_spanish_readings:
  - no aceptaré sus asambleas solemnes
  - no tendré placer en sus asambleas solemnes
  - no oleré el aroma de sus asambleas solemnes
  rationale: El hebreo usa lenguaje sensorial para negar la aceptación divina del culto. La redacción principal conserva la imagen literal, como hizo la revisión final inglesa, y deja la posible implicación de rechazo/placer para el contexto interpretativo, sin borrarla con una paráfrasis demasiado explicativa.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La versión inglesa pasó de una paráfrasis interpretativa («I will not delight in») a una formulación más literal («I will not smell»). La presente propuesta sigue esa revisión final y conserva la imagen sensorial del hebreo, evitando introducir en el texto principal la explicación de aceptación/agrado, que se deja sugerida por el contexto y explícita en la nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto solo cuando el Tetragrámaton aparece explícitamente; en este versículo no está presente.
  - «Fiestas» y «asambleas solemnes» distinguen el componente festivo del componente litúrgico, conforme a la crítica profética del culto.
  - Se evitó «SEÑOR» por ser un convenio de máscara no solicitado aquí y porque el hebreo del versículo no contiene el nombre divino explícito.
