    reason: lexical_alternative
  revision_rationale: 'Se revisa para alinearse mejor con el hebreo y con las decisiones auditadas del POB inglés: ''te rechazo'' preserva la reciprocidad presente de וְאֶמְאָסְאֲךָ; ''de ser sacerdote para mí'' evita añadir una finalidad no explícita; ''has olvidado'' mantiene la acusación vigente; y ''tu descendencia'' refleja mejor el valor colectivo de בָּנֶיךָ, conservando en nota la alternativa más estrecha ''tus hijos''.'
