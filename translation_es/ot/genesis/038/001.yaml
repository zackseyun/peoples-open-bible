revisions:
- from: En ese tiempo, Judá bajó de entre sus hermanos y se apartó hasta un[a] adulamita, cuyo nombre era Hirá.
  to: En ese tiempo[a], Judá bajó de entre sus hermanos y se desvió hacia un adulamita, cuyo nombre era Hirá.
  rationale: Se corrige la expresión no idiomática «hasta un adulamita» por «hacia un adulamita», se ajusta «se apartó» a «se desvió» para reflejar mejor וַיֵּט, y se reubica la nota [a] al segmento temporal al que realmente corresponde. No se requiere adjudicación adicional porque el sentido del hebreo y la mejora en español son claros.
