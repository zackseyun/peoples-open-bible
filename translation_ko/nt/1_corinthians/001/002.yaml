id: 1CO.1.2
reference: '1 Corinthians 1:2'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τῇ ἐκκλησίᾳ τοῦ θεοῦ, ⸂ἡγιασμένοις ἐν Χριστῷ Ἰησοῦ, τῇ οὔσῃ ἐν Κορίνθῳ,⸃ κλητοῖς ἁγίοις, σὺν πᾶσιν τοῖς ἐπικαλουμένοις τὸ ὄνομα τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ ἐν παντὶ τόπῳ ⸀αὐτῶν καὶ ἡμῶν·
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/001/002.yaml
  text: 'To the church of God that is in Corinth[a], to those sanctified in Messiah Jesus, called to be saints, together with all those who call on the name of our Lord Jesus Messiah in every place[d][c][b], theirs and ours:'
  footnotes:
  - marker: a
    text: 'Or "in Christ Jesus."'
    reason: lexical_alternative
  - marker: b
    text: 'Or "called holy ones"; traditionally, "called to be saints."'
    reason: lexical_alternative
  - marker: c
    text: 'Or "Jesus Christ."'
    reason: lexical_alternative
  - marker: d
    text: 'The phrase "in every place—theirs and ours" may mean every place where believers call on the Lord, or every place belonging both to them and to us.'
    reason: alternative_reading
translation:
  language: ko
  text: 고린도에 있는 하나님의 교회, 곧 메시아 예수 안에서 거룩하게 된 자들, 부르심받은 성도들에게, 또한 어디에서든 우리 주 예수 메시아의 이름을 부르는 모든 자들과 함께, 그들과 우리의 주께 편지합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「모든 곳에서—그들과 우리의」는 (1) 신자들이 주의 이름을 부르는 모든 장소를 가리킬 수도, (2) 그들과 우리에게 속한 모든 장소를 가리킬 수도 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκκλησίᾳ τοῦ θεοῦ
  english_pob_choice: church of God
  chosen_korean: 하나님의 교회
  alternatives_korean:
  - 하나님의 회중
  lexicon: BDAG
  rationale: '고린도전서에서 ἐκκλησία는 고린도라는 도시 단위의 제도적·집합적 회중을 가리키며, EN POB이 ''church''로 결정한 흐름을 따라 「교회」로 옮긴다. 글로사리 카브아웃.'
- source_word: ἡγιασμένοις
  english_pob_choice: sanctified
  chosen_korean: 거룩하게 된 자들
  alternatives_korean:
  - 성화된 자들
  lexicon: BDAG
  rationale: 완료 수동 분사로, 이미 완료된 거룩화의 상태를 가리킨다.
- source_word: κλητοῖς ἁγίοις
  english_pob_choice: called to be saints
  chosen_korean: 부르심받은 성도들
  alternatives_korean:
  - 부르심을 받은 거룩한 자들
  lexicon: BDAG
  rationale: κλητοῖς는 형용사적 호칭, ἁγίοις는 「성도」. 「부르심받은 성도」가 가장 자연스럽다.
- source_word: ἐπικαλουμένοις τὸ ὄνομα
  english_pob_choice: who call on the name
  chosen_korean: 이름을 부르는 자들
  alternatives_korean:
  - 이름을 의지하는 자들
  lexicon: BDAG
  rationale: 중간태 ἐπικαλέομαι는 예배·간구의 부름을 가리킨다.
