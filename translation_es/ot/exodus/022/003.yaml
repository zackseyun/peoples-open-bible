    issue: ‘el objeto robado … vivo’ produce una combinación semánticamente extraña en español.
    rationale: Aunque הַגְּנֵבָה puede ser ‘la cosa robada’ en abstracto, aquí el contexto inmediato delimita el referente a animales vivos (‘desde buey hasta asno hasta oveja’, ‘vivos’). En español, ‘objeto’ choca con ‘vivo’ y debilita la naturalidad y precisión del texto.
  - severity: low
    issue: La nota al pie literaliza ‘siendo encontrado, será encontrado’, formulación poco idiomática en español.
    rationale: La nota comunica la idea general, pero puede expresarse con mayor precisión como construcción enfática ‘si de veras se encuentra…’. No es un error grave, pero conviene pulirla.
