translation:
  language: es
  text: 'Y les dirás[a]: «Esta es la ofrenda de alimento que presentarán a Yahvé: dos corderos machos de un año, sin defecto, cada día, como holocausto regular».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «la ofrenda por fuego» o «la ofrenda de fuego».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ לָהֶם
  english_pob_choice: And you shall say to them
  chosen_spanish: Y dirás a ellos
  alternatives_spanish:
  - Y les dirás
  - Y dirás a ellos
  lexicon: WLC + English POB audit trail
  rationale: Se conserva la forma imperativa futura dirigida a Moisés/mediador y el destinatario plural. En español, «les dirás» sería más natural, pero «a ellos» mantiene de forma transparente la estructura del hebreo y sigue siendo claro en registro bíblico.
- source_word: הָאִשֶּׁה
  english_pob_choice: the food offering
  chosen_spanish: la ofrenda encendida
  alternatives_spanish:
  - la ofrenda por fuego
  - la ofrenda de fuego
  lexicon: HALOT + English POB lexical note
  rationale: El hebreo designa una ofrenda hecha por fuego. En español, «ofrenda encendida» comunica la acción sacrificial sin sonar tan idiomáticamente forzado como un calco literal; preserva la tensión entre el valor cultual y la imagen del fuego. No se adopta «alimento» porque en español sería más interpretativo y podría oscurecer el matiz ritual.
- source_word: תַּקְרִיבוּ
  english_pob_choice: you shall present
  chosen_spanish: ofrecerán
  alternatives_spanish:
  - presentarán
  - ofrecerán
  - harán llegar
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo de acercar/presentar se expresa naturalmente en español con «ofrecerán». Mantiene el sentido cultual de presentar una ofrenda ante Yahvé.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  - al SEÑOR
  lexicon: DOCTRINE.md contested terms + project terminology
  rationale: 'Se sigue la terminología del proyecto para el Tetragrámaton: «Yahvé». Esto preserva el nombre divino en lugar de sustituirlo por una convención litúrgica de ocultamiento.'
- source_word: כְּבָשִׂים
  english_pob_choice: male lambs
  chosen_spanish: corderos machos
  alternatives_spanish:
  - corderos
  - corderos machos
  - corderos varones
  lexicon: HALOT
  rationale: El sustantivo se refiere a corderos; el femenino/masculino está marcado en hebreo y en español se expresa con «machos». Se evita «rams» porque la edad dada por «de un año» apunta a corderos, no a carneros.
- source_word: בְּנֵי שָׁנָה
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - de un año
  - año de edad
  - añales
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se traduce de forma directa y natural como «de un año», conservando la especificación de edad para el animal sacrificial.
- source_word: תְמִימִם
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin defecto
  - sin mancha
  - íntegros
  lexicon: HALOT
  rationale: En legislación sacrificial el término indica animales sin defecto físico. «Sin defecto» es claro, preciso y no introduce una connotación moral ajena al contexto.
- source_word: לַיּוֹם
  english_pob_choice: each day
  chosen_spanish: cada día
  alternatives_spanish:
  - cada día
  - diariamente
  - por día
  lexicon: HALOT
  rationale: La lectura distributiva se expresa mejor en español con «cada día», siguiendo la revisión inglesa que prefirió una formulación natural sin perder el carácter cotidiano del rito.
- source_word: עֹלָה
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - holocausto
  - ofrenda quemada
  - ofrenda ascendente
  lexicon: HALOT
  rationale: «Holocausto» es el término cultual tradicional en español para la ofrenda completamente consumida por fuego. Aunque «ofrenda quemada» sería más transparente, el término tradicional sigue siendo claro y preciso en este contexto ritual.
- source_word: תָמִיד
  english_pob_choice: regular
  chosen_spanish: perpetuo
  alternatives_spanish:
  - perpetuo
  - regular
  - continuo
  lexicon: HALOT
  rationale: En la fórmula sacrificial, תמיד denota algo establecido de manera permanente y recurrente. «Perpetuo» conserva el peso cultual de la frase fija mejor que «regular», que en español puede sonar demasiado administrativo.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene יהוה directamente; se mantiene el nombre divino en español conforme a la norma del proyecto y al criterio de trazabilidad textual, sin enmascararlo con una convención devocional.
  doctrine_reference: 'DOCTRINE.md contested terms: יְהוָה YHWH'
- issue: Naturaleza de la ofrenda הָאִשֶּׁה
  english_pob_reading: the food offering / offering by fire
  chosen_spanish_reading: la ofrenda encendida
  alternative_spanish_readings:
  - la ofrenda por fuego
  - la ofrenda de fuego
  - el alimento
  rationale: El hebreo permite el sentido de ofrenda hecha por fuego. En español se opta por una forma que preserve la imagen sacrificial sin imponer la lectura de «alimento», que puede sonar menos natural y más interpretativa en este versículo.
  doctrine_reference: HALOT; English POB lexical note on הָאִשֶּׁה
- issue: Tipo de sacrificio עֹלָה
  english_pob_reading: burnt offering
  chosen_spanish_reading: holocausto
  alternative_spanish_readings:
  - ofrenda quemada
  - ofrenda ascendente
  rationale: Se conserva el término cultual tradicional que en español identifica la ofrenda totalmente consumida por fuego. No se sustituye por una glosa más descriptiva porque el término litúrgico es comprensible y preciso.
  doctrine_reference: HALOT
translation_notes:
  revision_awareness: La redacción inglesa más reciente ajustó לַיּוֹם de «day by day» a «each day» por naturalidad; el español sigue ese mismo principio con «cada día». También se mantuvo la equivalencia óptima del nombre divino «Yahweh» → «Yahvé» según la política del proyecto, corrigiendo la convención previa de ocultamiento litúrgico. No se requieren más ajustes respecto del paquete auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme a la terminología del proyecto.
  - Se conserva una distinción entre la ofrenda general («ofrenda encendida») y el sacrificio técnico («holocausto»).
  - «Cada día» reproduce el valor distributivo de לַיּוֹם con español natural.
  - «Sin defecto» traduce el valor sacrificial de תְמִימִם sin moralizar el término.
  - El marcador [a] está anclado en «ofrenda encendida» para preservar la alternativa lexical documentada.
