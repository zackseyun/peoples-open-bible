  yaml_path: translation/ot/exodus/013/014.yaml
  text: And when your son asks you in time to come[a], saying, ‘What is this?’ then you shall say to him, ‘By strength of hand Yahweh brought us out from Egypt[c][b], from the house of slavery.’
  footnotes:
