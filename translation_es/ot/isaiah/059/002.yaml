- from: Pero sus iniquidades[a] los han separado de su Dios, y sus pecados[b] han ocultado su rostro de ustedes, de modo que no oye.
  to: Pero sus iniquidades[a] los han separado de su Dios, y sus pecados han ocultado de ustedes su rostro, de modo que no oye.
