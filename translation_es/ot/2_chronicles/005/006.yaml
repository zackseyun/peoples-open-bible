  rationale: Se corrigió la puntuación para una lectura española más natural, se mantuvo la alternativa contextual de עָלָיו, se reubicó la nota [b] para reflejar la decisión léxica documentada sobre צֹאן, y se ajustó la cláusula final a un español más idiomático sin perder la doble intensificación hebrea («contar ni numerar»).
