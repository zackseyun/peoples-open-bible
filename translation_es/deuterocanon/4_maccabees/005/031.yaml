translation:
  language: es
  text: No soy tan viejo ni tan varonil como para que, por causa de la piedad[a], mi razón no siga siendo joven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «devoción». El término griego denota devoción reverente a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: γέρων
  english_pob_choice: old
  chosen_spanish: viejo
  alternatives_spanish:
  - anciano
  - de edad avanzada
  lexicon: LSJ
  rationale: El griego expresa edad avanzada; en español, «viejo» funciona con naturalidad en la construcción predicativa («no soy tan viejo») y conserva la fuerza directa del original sin convertirlo en un sintagma nominal.
- source_word: ἀνδρῶδης
  english_pob_choice: manly
  chosen_spanish: varonil
  alternatives_spanish:
  - viril
  - masculino
  - fuerte
  lexicon: LSJ
  rationale: El término es marcadamente masculino y retórico. «Varonil» preserva ese matiz de hombría/adultez firme mejor que opciones más neutras como «maduro» o «fuerte».
- source_word: εὐσέβειαν
  english_pob_choice: godliness
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción a Dios
  - reverencia
  - devoción reverente
  lexicon: LSJ
  rationale: En 4 Macabeos, εὐσέβεια señala devoción reverente a Dios y a su ley. En español, «piedad» mantiene ese campo semántico con una resonancia tradicional comprensible; «devoción a Dios» sería más explícito pero menos conciso.
- source_word: νεάζειν
  english_pob_choice: be youthful
  chosen_spanish: ser juvenil
  alternatives_spanish:
  - ser joven
  - actuar como joven
  - rejuvenecer
  lexicon: LSJ
  rationale: El infinitivo comunica el estar o mantenerse en un estado juvenil. «Ser juvenil» conserva la imagen metafórica y la relación con la vejez, sin forzar una paráfrasis.
- source_word: λογισμόν
  english_pob_choice: reason
  chosen_spanish: razón
  alternatives_spanish:
  - mente
  - pensamiento
  - facultad racional
  lexicon: LSJ
  rationale: En 4 Macabeos, λογισμός es un término técnico para la razón que gobierna las pasiones. «Razón» reproduce mejor esa carga filosófica que «mente» o «pensamiento».
- source_word: ὥστε μοι ... μὴ νεάζειν τὸν λογισμόν
  english_pob_choice: that ... my reason should not be youthful
  chosen_spanish: como para que ... mi razón no sea juvenil
  alternatives_spanish:
  - de modo que ... mi razón no fuera juvenil
  - como para que ... mi razón no se mantenga joven
  lexicon: Greek grammar
  rationale: La construcción de resultado con ὥστε se refleja con «como para que». La negación se mantiene de forma directa y natural, preservando la tensión retórica del griego entre edad, hombría y razón.
theological_decisions:
- issue: Traducir εὐσέβεια en un contexto judío de martirio
  english_pob_reading: godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción a Dios
  - reverencia
  rationale: El contexto habla de fidelidad reverente a Dios bajo persecución. «Piedad» comunica esa orientación teológica de manera reconocible en español; las alternativas explicitan más el objeto de la devoción, pero suenan menos compactas.
  doctrine_reference: 'DOCTRINE.md: término clave consistente, lenguaje moderno y legible, sin borrar el contenido teológico.'
- issue: Conservar el matiz masculino de ἀνδρῶδης
  english_pob_reading: manly
  chosen_spanish_reading: varonil
  alternative_spanish_readings:
  - viril
  - masculino
  rationale: El original es deliberadamente masculino y retórico. «Varonil» preserva ese matiz sin neutralizarlo, conforme al principio de precisión de género cuando el texto lo enfatiza.
  doctrine_reference: 'DOCTRINE.md: precisión de género sobre neutralización innecesaria.'
translation_notes:
  revision_awareness: Se revisó el contexto auditado en inglés y la lectura griega directa. No se introdujeron cambios sustanciales respecto del sentido base; se optó por una formulación española natural que conserva las tensiones léxicas de edad, masculinidad, piedad y razón.
  spanish_consistency_notes:
  - Se mantuvo «razón» para λογισμός por coherencia con el uso filosófico de 4 Macabeos.
  - Se empleó «piedad» para εὐσέβεια, con nota alternativa para no perder la posibilidad de «devoción».
  - Se conservó la fuerza masculina de ἀνδρῶδης con «varonil», evitando neutralizar el rasgo retórico.
  - La nota al pie está anclada en «piedad» para reflejar la alternativa léxica documentada en el audit trail inglés.
