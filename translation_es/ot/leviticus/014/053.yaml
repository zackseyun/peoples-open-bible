revisions:
- from: Entonces enviará la ave viva fuera de la ciudad, hacia la llanura abierta. Así hará expiación por la casa[a], y quedará limpia.
  to: Entonces soltará el ave viva fuera de la ciudad, al campo abierto. Así hará expiación por la casa[a], y quedará limpia.
  rationale: Se corrigió la gramática española («el ave»), se ajustó la imagen espacial a «campo abierto» para reflejar mejor אֶל פְּנֵי הַשָּׂדֶה y la decisión inglesa «open field», y se afinó el verbo ritual a «soltará» para representar mejor la liberación del ave. También se reparó la nota al pie para que presente alternativas léxicas reales. No se requiere adjudicación adicional porque los cambios son claros, locales y bien sustentados por la evidencia fuente y la auditoría inglesa.
