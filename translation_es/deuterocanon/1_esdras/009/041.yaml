translation:
  language: es
  text: Y leía en el amplio espacio[a] frente a la puerta del templo, desde el alba hasta el mediodía, en presencia de los hombres y de las mujeres; y todos prestaban atención a la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en la plaza abierta frente a la puerta del templo'. El griego describe un área amplia o espaciosa; el paralelo hebreo en Nehemías 8 usa una expresión que suele traducirse 'plataforma de madera' en una escena distinta pero relacionada, así que aquí no debe forzarse demasiado el matiz espacial exacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεγίνωσκεν
  english_pob_choice: was reading
  chosen_spanish: leía
  alternatives_spanish:
  - estaba leyendo
  - iba leyendo
  lexicon: LSJ
  rationale: El imperfecto expresa acción շարունակada durante el lapso indicado. «Leía» preserva la duración sin recargar el estilo; en contexto público, la lectura se entiende como oral sin añadirlo explícitamente.
- source_word: ἐν τῷ ... εὐρυχώρῳ
  english_pob_choice: in the broad space
  chosen_spanish: en el amplio espacio
  alternatives_spanish:
  - en la plaza abierta
  - en el lugar espacioso
  - en el amplio patio
  lexicon: LSJ
  rationale: εὐρύχωρος señala un lugar amplio o espacioso. «Amplio espacio» mantiene la imagen general sin imponer una equivalencia más específica como «plaza» o «patio» que el griego no exige.
- source_word: πρὸ τοῦ ἱεροῦ πυλῶνος
  english_pob_choice: before the temple gate
  chosen_spanish: frente a la puerta del templo
  alternatives_spanish:
  - delante de la puerta del templo
  - ante la puerta sagrada
  lexicon: LSJ
  rationale: πρό con genitivo marca ubicación delante de. «Puerta del templo» comunica de modo natural el referente cultual; «frente a» reproduce bien la relación espacial sin forzar el español.
- source_word: ἀπὸ ὄρθρου ἕως μεσημβρινοῦ
  english_pob_choice: from dawn until midday
  chosen_spanish: desde el alba hasta el mediodía
  alternatives_spanish:
  - desde el amanecer hasta el mediodía
  - desde la aurora hasta el mediodía
  lexicon: LSJ
  rationale: Ὄρθρος corresponde a la temprana mañana/alba, y μεσημβρινός a mediodía. «Desde el alba hasta el mediodía» es natural en español y conserva el tramo temporal continuo.
- source_word: ἐνώπιον τῶν ἀνδρῶν καὶ γυναικῶν
  english_pob_choice: in the presence of the men and the women
  chosen_spanish: en presencia de los hombres y de las mujeres
  alternatives_spanish:
  - delante de los hombres y de las mujeres
  - ante los hombres y las mujeres
  lexicon: LSJ
  rationale: ἐνώπιον significa «delante de» o «en presencia de». Se conserva la mención explícita de ambos grupos, con artículos, para no diluir el dato social del texto.
- source_word: ἐπέδωκαν πάντα τὸν νοῦν
  english_pob_choice: gave their attention
  chosen_spanish: prestaban atención
  alternatives_spanish:
  - pusieron toda su atención
  - dedicaban toda su mente
  lexicon: LSJ
  rationale: El giro literalmente dice «dieron toda la mente». En español, «prestar atención» expresa de forma idiomática la concentración requerida sin perder el sentido de atención plena ya documentado en el audit trail.
- source_word: πάντα
  english_pob_choice: all of them
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - todos por completo
  lexicon: LSJ
  rationale: Aquí el adverbial/idiomático refuerza la totalidad de la respuesta colectiva. «Todos» conserva esa idea de manera natural en español y evita una construcción forzada.
- source_word: εἰς τὸν νόμον
  english_pob_choice: to the law
  chosen_spanish: a la ley
  alternatives_spanish:
  - a la Ley
  - a la ley de Moisés
  lexicon: LSJ
  rationale: «Ley» reproduce νόμος en este contexto de lectura pública. Se prefiere minúscula por transparencia lexical, dejando que el contexto identifique la ley concreta sin añadir una especificación no presente en el griego.
theological_decisions:
- issue: Capacitación y referencia de νόμος
  english_pob_reading: law
  chosen_spanish_reading: ley
  alternative_spanish_readings:
  - Ley
  - ley de Moisés
  rationale: El texto griego solo dice τὸν νόμον. Mantener «ley» sin capitalización preserva la transparencia y evita convertir el término en un título interpretativo; el contexto litúrgico ya orienta al lector.
  doctrine_reference: Translation philosophy §1, §6
- issue: Representación explícita de hombres y mujeres
  english_pob_reading: the men and the women
  chosen_spanish_reading: los hombres y las mujeres
  alternative_spanish_readings:
  - hombres y mujeres
  - la gente
  rationale: El griego nombra ambos grupos de manera explícita. Se conserva esa precisión social y auditiva para no neutralizar ni generalizar indebidamente la audiencia.
  doctrine_reference: Translation philosophy §4
- issue: Matiz de la lectura pública prolongada
  english_pob_reading: was reading
  chosen_spanish_reading: leía
  alternative_spanish_readings:
  - estaba leyendo
  - leyó
  rationale: El imperfecto griego sugiere una acción sostenida durante el intervalo indicado. «Leía» refleja ese aspecto durativo mejor que un aoristo español, que podría sonar puntual.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: Se revisó el paralelo hebreo como control de nombres y escena, pero el griego sigue siendo el ancla primaria. No se incorporó una nota sobre la espacialidad porque la formulación española ya mantiene la amplitud del lugar sin sobreespecificarlo.
  spanish_consistency_notes:
  - 'Se mantiene «ley» en minúscula por la misma razón que el inglés POB usó «law»: transparencia léxica sin título interpretativo añadido.'
  - Se conserva un registro sobrio y público, adecuado para lectura bíblica y coherente con la escena de enseñanza comunitaria.
  - No se introdujo vocabulario eclesiástico tradicional innecesario; «frente a la puerta del templo» y «prestaban atención» reflejan bien el griego y el audit trail inglés.
