review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: afirmación total de belleza, vocativo afectuoso, y negación de toda imperfección. Sin embargo, hay un problema de alineación en las notas: la nota [c] está anclada a «defecto» y ofrece «defecto» como alternativa, cuando la alternativa documentada en el rastro inglés para וּמוּם incluye sentidos como «mancha», «defecto» o «falla/flaw». Conviene ajustar la nota para evitar repetir la lectura principal como alternativa y para reflejar mejor el campo semántico.'
  spanish_quality_summary: El español es natural, claro y poético. «Eres toda hermosa, mi amada» suena bien en un registro bíblico moderno. Aun así, para máxima naturalidad y precisión, la nota [a] puede simplificarse porque la lectura principal ya coincide con una de las alternativas mencionadas. El texto principal no requiere cambio sustancial.
  glossary_alignment: No hay términos del glosario maestro especialmente controvertidos en este versículo. «Mi amada» representa bien רַעְיָתִי, y «defecto» es aceptable para מוּם en contexto poético. La revisión propuesta solo corrige la formulación de notas para alinearlas mejor con el expediente léxico inglés y evitar redundancia.
  issues:
  - severity: medium
    issue: La nota [c] repite «defecto» como alternativa aunque ya es la lectura principal.
    rationale: Una nota de alternativa no debe presentar la propia traducción principal como si fuera variante; además, el expediente inglés preserva otras posibilidades léxicas útiles para מוּם.
  - severity: low
    issue: La nota [a] formula como alternativa exacta la misma frase base del texto principal.
    rationale: Aunque no invalida la traducción, resulta redundante. Es mejor conservar solo alternativas reales de formulación, como «Eres completamente hermosa» o «Toda tú eres hermosa».
  revised_spanish_text: Eres toda hermosa[a], mi amada[b], y no hay defecto[c] en ti.
  revised_footnotes:
  - marker: a
    text: 'También puede entenderse: «Eres completamente hermosa» o «Toda tú eres hermosa».'
