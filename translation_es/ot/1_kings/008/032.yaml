  yaml_path: translation/ot/1_kings/008/032.yaml
  text: then hear in heaven and act[a], and judge your servants, condemning the wicked by bringing his way upon his own head[c][b], and justifying the righteous by giving to him according to his righteousness.
  footnotes:
