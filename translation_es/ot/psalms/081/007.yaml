    issue: «sus manos pasaron del canasto» es una construcción española opaca
    rationale: Aunque refleja de cerca «passed away from», en español no expresa con claridad que las manos dejaron de ocuparse del recipiente/cesta. La traducción debe preservar el sentido fuente con español legible.
  - severity: medium
