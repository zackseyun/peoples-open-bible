translation:
  language: es
  text: La angustia y la aflicción lo aterrorizan[a]; lo vencen como un rey preparado para la batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un rey preparado para el asalto/ataque». El término hebreo traducido aquí como «batalla» es raro y puede referirse de manera más específica a un ataque armado.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְבַעֲתֻהוּ
  english_pob_choice: terrify him
  chosen_spanish: lo aterrorizan
  alternatives_spanish:
  - lo amedrentan
  - le infunden terror
  - lo espantan
  lexicon: HALOT
  rationale: El piel de בעת expresa causar terror o pánico súbito. «Aterrorizar» conserva esa fuerza causativa con naturalidad en español y corresponde bien al valor intensivo del verbo.
- source_word: צַר
  english_pob_choice: distress
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - distress
  - estrechez
  lexicon: HALOT
  rationale: En paralelo con מְצוּקָה, este sustantivo expresa opresión, estrechez o aflicción. «Angustia» funciona bien en español bíblico contemporáneo y mantiene el peso emocional del contexto.
- source_word: מְצוּקָה
  english_pob_choice: anguish
  chosen_spanish: aflicción
  alternatives_spanish:
  - angustia
  - tribulación
  - opresión
  lexicon: HALOT
  rationale: El término denota presión severa, estrechez o angustia. Como צַר ya se vertió con «angustia», aquí «aflicción» preserva el paralelismo sin repetir exactamente el mismo sustantivo.
- source_word: תִּתְקְפֵהוּ
  english_pob_choice: they overpower him
  chosen_spanish: lo dominan
  alternatives_spanish:
  - lo vencen
  - prevalecen contra él
  - lo sobrepasan
  lexicon: HALOT
  rationale: Aunque la forma verbal es singular femenina, en poesía el par de sustantivos funciona como sujeto compuesto. «Lo dominan» comunica el sentido de prevalecer con fuerza sobre alguien, de manera más natural que una construcción mecánica.
- source_word: כְּמֶלֶךְ
  english_pob_choice: like a king
  chosen_spanish: como un rey
  alternatives_spanish:
  - como rey
  - cual rey
  lexicon: HALOT
  rationale: El comparativo es directo. «Como un rey» es la equivalencia más clara y idiomática en español.
- source_word: עָתִיד
  english_pob_choice: ready
  chosen_spanish: listo
  alternatives_spanish:
  - preparado
  - pronto
  - dispuesto
  lexicon: HALOT
  rationale: En este contexto significa estar preparado. «Listo» expresa esa disponibilidad de forma breve y natural en español contemporáneo.
- source_word: לַכִּידוֹר
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - para el ataque
  - para el asalto
  - para el combate
  lexicon: HALOT
  rationale: El sustantivo es raro y puede apuntar de manera más específica a un ataque armado. «Batalla» recoge el sentido militar probable de forma clara en español, sin cerrar indebidamente la ambigüedad.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y el audit trail inglés, conservando el paralelismo poético y la tensión léxica del término raro לַכִּידוֹר; no se registraron revisiones sustantivas en la pasada más reciente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se prefirió «angustia/aflicción» para reflejar el paralelismo hebreo sin forzar una repetición exacta.
  - La nota al pie conserva la alternativa militar más específica porque el valor exacto de כִּידוֹר es incierto en el contexto.
