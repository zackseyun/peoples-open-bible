translation:
  language: es
  text: 'Así dice Yahvé: Si los cielos de arriba pueden ser medidos, y los cimientos de la tierra de abajo pueden ser investigados, entonces yo también rechazaré a todo el linaje[a] de Israel por todo lo que han hecho, declara Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'descendencia de Israel'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: lemma 3068
  rationale: Se sigue el principio del proyecto para el nombre divino, conservando el nombre del pacto como forma transparente y no como sustitución reverencial.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: lemma 3541 + 559
  rationale: La fórmula profética se rinde de manera breve y natural en español, manteniendo el registro solemne del anuncio mensajero.
- source_word: יִמַּדּוּ
  english_pob_choice: can be measured
  chosen_spanish: pueden ser medidos
  alternatives_spanish:
  - pueden medirse
  - son medidos
  lexicon: lemma 4058
  rationale: El nifal pide una pasiva o media; en español, 'pueden ser medidos' conserva la idea de posibilidad hipotética del hebreo sin perder claridad.
- source_word: שָׁמַיִם מִלְמַעְלָה
  english_pob_choice: the heavens above
  chosen_spanish: los cielos de arriba
  alternatives_spanish:
  - los cielos arriba
  - el cielo de arriba
  lexicon: lemma 8064 + 4605
  rationale: '''Cielos'' mantiene el plural cosmológico del hebreo, y ''de arriba'' preserva el contraste vertical con ''de abajo''.'
- source_word: וְיֵחָקְרוּ
  english_pob_choice: can be searched out
  chosen_spanish: pueden ser investigados
  alternatives_spanish:
  - pueden ser sondeados
  - pueden ser escrutados
  lexicon: lemma 2713
  rationale: '''Investigar'' comunica el sentido de examinar a fondo o indagar exhaustivamente; en español resulta más natural que un calco como ''buscar fuera''.'
- source_word: מוֹסְדֵי אֶרֶץ
  english_pob_choice: the foundations of the earth
  chosen_spanish: los cimientos de la tierra
  alternatives_spanish:
  - los fundamentos de la tierra
  - los cimientos del mundo
  lexicon: lemma 4146 + 776
  rationale: '''Cimientos'' conserva la imagen estructural y cósmica del hebreo; ''tierra'' refleja el paralelo con ''cielos'' sin imponer una lectura localista.'
- source_word: לְמָטָּה
  english_pob_choice: below
  chosen_spanish: de abajo
  alternatives_spanish:
  - abajo
  - debajo
  lexicon: lemma 4295
  rationale: '''De abajo'' empareja de forma clara con ''de arriba'' y conserva el paralelismo vertical del verso.'
- source_word: גַּם אֲנִי
  english_pob_choice: then I also
  chosen_spanish: yo también
  alternatives_spanish:
  - también yo
  - incluso yo
  lexicon: lemma 1571 + 589
  rationale: '''Yo también'' mantiene el énfasis apodótico sin sobrecargar la frase; en español suena natural y refleja la correspondencia retórica del hebreo.'
- source_word: אֶמְאַס
  english_pob_choice: will reject
  chosen_spanish: rechazaré
  alternatives_spanish:
  - arrojaré
  - repudiaré
  - descartaré
  lexicon: lemma 3988
  rationale: '''Rechazar'' expresa el forcejeo de מאס en un contexto de relación pactal; evita tanto la suavización de ''despreciar'' como la carga más idiomática pero menos precisa de ''castigar''.'
- source_word: בְּכָל זֶרַע יִשְׂרָאֵל
  english_pob_choice: all the offspring of Israel
  chosen_spanish: todo el linaje[a] de Israel
  alternatives_spanish:
  - toda la descendencia de Israel
  - toda la semilla de Israel
  lexicon: lemma 2233 + 3478
  rationale: '''Zera‘'' es un colectivo que en español puede expresarse como ''linaje'' o ''descendencia''; se elige ''linaje'' por su concisión y fuerza colectiva, mientras la nota preserva la alternativa lexical. El singular colectivo se mantiene en ''todo''.'
- source_word: עַל כָּל אֲשֶׁר עָשׂוּ
  english_pob_choice: for all that they have done
  chosen_spanish: por todo lo que han hecho
  alternatives_spanish:
  - a causa de todo lo que han hecho
  - por cuanto han hecho
  lexicon: lemma 5921 + 834 + 6213
  rationale: '''עַל'' aquí expresa base o motivo; ''por todo lo que han hecho'' reproduce bien la relación causal en español y mantiene el alcance total del hebreo.'
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: lemma 5002 + 3068
  rationale: La fórmula conclusiva profética se traduce con el verbo declarativo para conservar su carácter solemne y formal sin convertirla en un calco técnico opaco.
theological_decisions:
- issue: Fuerza del condicional e imposibilidad retórica
  english_pob_reading: The verse states an impossible hypothetical condition to emphasize that the LORD will not reject all Israel's offspring despite their sins.
  chosen_spanish_reading: El verso presenta una condición hipotética imposible para subrayar que Yahvé no rechazará a todo el linaje de Israel pese a sus pecados.
  alternative_spanish_readings:
  - Una condición estrictamente literal sin fuerza retórica
  - Una hipótesis meramente estilística sin implicación teológica
  rationale: El contexto inmediato usa imágenes cósmicas para garantizar la permanencia de Israel ante Dios; por eso conviene mantener la forma condicional y dejar oír la hipérbole profética sin resolverla.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica sin suavizarla.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que pasó de 'because of' a 'for' en la cláusula causal. En español se mantuvo la relación causal con 'por', que es directa, formal y fiel al עַל hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente con el nombre divino del proyecto.
  - Se conserva el paralelismo vertical 'de arriba / de abajo' para reflejar la estructura del hebreo.
  - '''Rechazaré'' sostiene la fuerza de מאס sin introducir una connotación emocional no requerida.'
  - '''Linaje'' se usa como colectivo; la nota ofrece la alternativa ''descendencia'' para evitar perder la posible ambigüedad lexical.'
