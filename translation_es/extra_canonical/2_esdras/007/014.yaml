translation:
  language: es
  text: Por tanto, si los que viven no entran en estas cosas angostas y vanas, no podrán recibir lo que está reservado.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: si ergo
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: conector inferencial
  rationale: El latín abre con una conclusión lógica. «Por tanto» conserva el valor inferencial de la línea y suena natural en español bíblico contemporáneo.
- source_word: ingredientes ingressi fuerint
  english_pob_choice: if those who live do not enter
  chosen_spanish: si los que viven no entran
  alternatives_spanish:
  - si los vivientes no entran
  - si quienes viven no penetran
  lexicon: ingredi / entrar
  rationale: La construcción reforzada del latín se vierte con un condicional simple y natural en español, manteniendo el sentido de «entrar» sin sobrerrecrear la calca semítica/grecolatina.
- source_word: angusta et vana haec
  english_pob_choice: these narrow and vain things
  chosen_spanish: estas cosas angostas y vanas
  alternatives_spanish:
  - estas cosas estrechas y vanas
  - estas realidades angostas y vanas
  lexicon: angustus / vanus
  rationale: «Angostas» conserva la imagen espacial de estrechez; «vanas» reproduce la idea de vaciedad o futilidad. «Cosas» explicita el demostrativo neutro del latín en un español idiomático.
- source_word: non poterunt recipere
  english_pob_choice: they cannot receive
  chosen_spanish: no podrán recibir
  alternatives_spanish:
  - no pueden recibir
  - no lograrán recibir
  lexicon: posse + recipere
  rationale: El futuro modal español expresa la imposibilidad resultante del condicional. «Recibir» es la correspondencia directa de recipere.
- source_word: quae sunt reposita
  english_pob_choice: what has been stored up
  chosen_spanish: lo que ha sido reservado
  alternatives_spanish:
  - lo que ha sido almacenado
  - lo que está guardado
  lexicon: reponere / reposita
  rationale: «Reservado» comunica la idea de algo depositado o preparado para entrega futura, con mejor fluidez en español bíblico que una traducción más mecánica. Mantiene la pasiva y el sentido de tesoro guardado.
theological_decisions:
- issue: Condicional de exclusión respecto a la herencia futura
  english_pob_reading: if those who live do not enter these narrow and vain things, they cannot receive what has been stored up
  chosen_spanish_reading: si los que viven no entran en estas cosas angostas y vanas, no podrán recibir lo que ha sido reservado
  alternative_spanish_readings:
  - si los vivientes no entran en estas cosas angostas y vanas, no podrán recibir lo que está reservado
  - si quienes viven no pasan por estas cosas angostas y vanas, no podrán recibir lo reservado
  rationale: 'El versículo presenta una condición de acceso: sin entrar en el camino/ámbito descrito como estrecho y vano, no hay recepción de lo preparado. La redacción española conserva esa exclusión condicional sin añadir explicación doctrinal extra.'
  doctrine_reference: Eschatology / herencia futura
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente: se evitó traducir la construcción reforzada como «realmente» o «de hecho» para reflejar el ajuste del audit trail, manteniendo un condicional natural y fiel al latín.'
  spanish_consistency_notes:
  - Se mantuvo «reservado» para reposita, evitando sobreinterpretar a «almacenado» cuando el contexto es de preparación futura.
  - Se evitó «SEÑOR» o terminología eclesiástica no presente; el texto es una cláusula sapiencial/escatológica sin vocabulario divino explícito.
  - El marcador [a] aparece exactamente en el texto donde se ancla la alternativa de lectura.
