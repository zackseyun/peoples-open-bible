review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente la estructura epistolar del griego y la mayoría de los referentes: Jonatán, los sacerdotes, el resto del pueblo judío, los espartanos y el lenguaje diplomático de «hermanos». Sin embargo, omite en el texto principal el valor de τοῦ ἔθνους, que en la evidencia fuente califica a ἀρχιερεύς, y sustituye γερουσία por «consejo de ancianos» cuando el rastro auditado inglés terminó en «senate/senado» como equivalente formal preferido para esta línea.'
  spanish_quality_summary: 'El español es claro y legible, pero dos ajustes lo harían más fiel y más alineado con la auditoría: incorporar «de la nación» con nota alternativa si se desea, y preferir «senado» sobre «consejo de ancianos». Además, en fórmula epistolar suena más natural «saludos» que «salud» en español bíblico moderno, y conviene usar coma antes de la fórmula final en vez de dos puntos.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Sumo sacerdote», «judío» y «hermanos» están bien. La principal desalineación es institucional: γερουσία quedó como «consejo de ancianos» pese a que la revisión inglesa documentó una preferencia final por «senate», que en español corresponde naturalmente a «senado».'
  issues:
  - severity: high
    issue: Se omitió en el texto principal τοῦ ἔθνους
    rationale: El griego dice «Jonatán, sumo sacerdote de la nación». Aunque el inglés revisado lo suavizó por fluidez, la nota española actual ya presupone esa información y el borrador no la incorpora; esto debilita la fidelidad directa a la fuente.
  - severity: medium
    issue: γερουσία se tradujo «consejo de ancianos» en vez de «senado»
    rationale: «Consejo de ancianos» es posible, pero la auditoría inglesa cerró esta línea con «senate» como equivalente formal preferido. «Senado» preserva mejor el carácter institucional en este versículo.
  - severity: low
    issue: «salud» suena menos natural que «saludos» como fórmula de carta en español actual
    rationale: χαίρειν es la fórmula epistolar convencional. «Saludos» comunica mejor esa convención en español moderno y mantiene el registro digno sin arcaísmo forzado.
  - severity: low
    issue: La puntuación con dos puntos antes de «salud» es menos idiomática aquí
    rationale: 'En esta clase de encabezamiento epistolar, una coma antes de la fórmula final fluye mejor: «..., saludos.»'
  revised_spanish_text: Jonatán, el sumo sacerdote de la nación[a], y el senado, y los sacerdotes, y el resto del pueblo judío, a sus hermanos espartanos[b], saludos.
