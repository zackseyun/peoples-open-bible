- from: Y habrá un gran clamor[a] por toda la tierra de Egipto, como no lo ha habido antes ni lo habrá jamás.
  to: Y habrá un gran clamor[a] por toda la tierra de Egipto, cual no lo ha habido antes ni lo habrá de nuevo.
  rationale: Se mantiene la estructura y el sentido del borrador, pero se ajusta la cláusula comparativa final para mayor naturalidad y fidelidad al hebreo, y se corrige la nota léxica para ceñirse mejor a la evidencia y al contexto sin introducir el matiz impropio de «protesta».
