  text: א֣וֹ נוֹדַ֗ע כִּ֠י שׁ֣וֹר נַגָּ֥ח הוּא֙ מִ/תְּמ֣וֹל שִׁלְשֹׁ֔ם וְ/לֹ֥א יִשְׁמְרֶ֖/נּוּ בְּעָלָ֑י/ו שַׁלֵּ֨ם יְשַׁלֵּ֥ם שׁוֹר֙ תַּ֣חַת הַ/שּׁ֔וֹר וְ/הַ/מֵּ֖ת יִֽהְיֶה לּֽ/וֹ־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/exodus/021/036.yaml
  text: Or if it was known that the ox was accustomed to gore from yesterday and the day before[a], and its owner did not keep it in, he must surely pay ox for ox[c][b], and the dead animal will be his.
  footnotes:
