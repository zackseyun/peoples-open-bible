translation:
  language: es
  text: Cuando se le informó a David, reunió a todo Israel, cruzó el Jordán y llegó a Helam. Entonces Aram se dispuso en formación de batalla para salir al encuentro de David y combatieron con él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y combatieron contra él». El hebreo dice literalmente «combatieron con él», un modismo para indicar combate contra un adversario.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֻּגַּד לְדָוִד
  english_pob_choice: When it was reported to David
  chosen_spanish: Cuando se informó a David
  alternatives_spanish:
  - Y se le informó a David
  - Cuando le dijeron a David
  lexicon: HALOT
  rationale: 'La forma pasiva impersonal del hebreo se conserva mejor en español con una pasiva o impersonal: «se informó a David». Mantiene el mismo valor narrativo sin añadir un agente no expresado.'
- source_word: וַיֶּאֱסֹף אֶת כָּל יִשְׂרָאֵל
  english_pob_choice: he gathered all Israel
  chosen_spanish: reunió a todo Israel
  alternatives_spanish:
  - juntó a todo Israel
  - convocó a todo Israel
  lexicon: HALOT
  rationale: אָסַף en este contexto militar/nacional expresa reunir o convocar. «Reunió a todo Israel» es natural en español y conserva el alcance colectivo de «todo Israel» sin restringirlo indebidamente a solo el ejército.
- source_word: וַיַּעֲבֹר אֶת הַיַּרְדֵּן
  english_pob_choice: crossed the Jordan
  chosen_spanish: cruzó el Jordán
  alternatives_spanish:
  - pasó el Jordán
  - cruzó el río Jordán
  lexicon: HALOT
  rationale: עָבַר con el objeto «el Jordán» se traduce directamente como «cruzó el Jordán». Es la opción más natural y fiel al movimiento geográfico del hebreo.
- source_word: וַיָּבֹא חֵלָמָה
  english_pob_choice: and came to Helam
  chosen_spanish: y llegó a Helam
  alternatives_spanish:
  - y vino a Helam
  - y arribó a Helam
  lexicon: HALOT
  rationale: La he direccional indica llegada a un lugar. «Llegó a Helam» comunica bien la meta del movimiento en español contemporáneo.
- source_word: וַיַּעַרְכ֤וּ אֲרָם֙
  english_pob_choice: Then Aram drew up in battle formation
  chosen_spanish: Entonces Aram se dispuso en formación de batalla
  alternatives_spanish:
  - Entonces Aram se alineó para la batalla
  - Entonces Aram se ordenó en batalla
  lexicon: HALOT
  rationale: עָרַךְ en contexto militar es desplegar u ordenar tropas. «Se dispuso en formación de batalla» preserva la idea de alinearse tácticamente sin forzar una frase más técnica que el hebreo.
- source_word: לִקְרַאת דָּוִד
  english_pob_choice: to meet David
  chosen_spanish: para salir al encuentro de David
  alternatives_spanish:
  - para enfrentar a David
  - al encuentro de David
  lexicon: HALOT
  rationale: לִקְרַאת expresa ir al encuentro; en este contexto es un encuentro hostil. «Salir al encuentro de David» mantiene esa dirección sin imponer más de lo que el verbo dice por sí mismo.
- source_word: וַיִּלָּחֲמוּ עִמּוֹ
  english_pob_choice: and fought with him
  chosen_spanish: y peleó con él
  alternatives_spanish:
  - y luchó contra él
  - y combatió con él
  lexicon: HALOT
  rationale: El hebreo literalmente dice «lucharon con él», fórmula idiomática de combate contra un enemigo. En español, «peleó con él» conserva la cercanía formal pero puede sonar ambigua; aquí se deja la formulación por fidelidad al texto y se aclara la lectura hostil en nota.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo y el patrón de decisiones del POB en inglés: pasiva impersonal para el informe inicial, lenguaje geográfico directo, y una nota para conservar la tensión del modismo hebreo en וַיִּלָּחֲמוּ עִמּוֹ entre la literalidad («con él») y el sentido idiomático hostil («contra él»).'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no la contiene.
  - «Aram» se conserva como colectivo nacional, en consonancia con el inglés POB.
  - Se usa «llegó» para la he direccional, evitando sobreinterpretar el movimiento.
  - La nota al pie marca la única ambigüedad relevante del versículo y coincide con el tratamiento auditado en inglés.
