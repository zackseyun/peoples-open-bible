translation:
  language: es
  text: Ezequías hizo esto en todo Judá[a], e hizo lo bueno, lo recto y lo verdadero delante de Yahvé su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo verdadero» / «lo fiel». El hebreo אֱמֶת puede denotar verdad, confiabilidad o fidelidad; aquí describe la calidad moral de la conducta de Ezequías.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ כָּזֹאת
  english_pob_choice: did this
  chosen_spanish: hizo esto
  alternatives_spanish:
  - actuó de esta manera
  - hizo tales cosas
  lexicon: HALOT
  rationale: La fórmula verbal con el demostrativo resume las reformas previas; en español, «hizo esto» conserva bien el valor resumptivo sin añadir interpretación.
- source_word: בְּכָל יְהוּדָה
  english_pob_choice: throughout all Judah
  chosen_spanish: por todo Judá
  alternatives_spanish:
  - en todo Judá
  - a través de todo Judá
  lexicon: HALOT
  rationale: El hebreo expresa alcance territorial total; «por todo Judá» suena natural en español y comunica extensión geográfica completa.
- source_word: הַטּוֹב
  english_pob_choice: good / what was good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - lo que era bueno
  - el bien
  lexicon: HALOT
  rationale: El artículo sustantiva el adjetivo; «lo bueno» mantiene la fuerza moral y la forma concisa del trío.
- source_word: הַיָּשָׁר
  english_pob_choice: right
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo justo
  - lo derecho
  lexicon: HALOT
  rationale: En contexto ético, יָשָׁר describe lo recto/upright. «Lo recto» preserva el paralelismo con «lo bueno» y el matiz moral de conducta conforme.
- source_word: הָאֱמֶת
  english_pob_choice: true / faithful
  chosen_spanish: lo verdadero
  alternatives_spanish:
  - la verdad
  - lo fiel
  - lo confiable
  lexicon: HALOT
  rationale: Sigo la revisión inglesa que pasó de «faithful» a «true» para reflejar más directamente אֱמֶת. En español, «lo verdadero» conserva la triada «bueno, recto y verdadero» y evita desplazar el sentido hacia una fidelidad más interpretativa sin perder la amplitud semántica de verdad/veracidad/integridad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: La política del POB en español es transliterar el Nombre divino como «Yahvé», no sustituirlo por un título. Eso mantiene la referencia al Tetragrámaton y es fiel al criterio documental del proyecto.
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios personal
  - el Dios de él
  lexicon: HALOT
  rationale: El sufijo posesivo masculino singular se expresa de manera natural con «su Dios»; conserva la relación personal/covenantal sin sobreexplicarla.
theological_decisions:
- issue: 'Triada moral final: אֱמֶת'
  english_pob_reading: true / faithful
  chosen_spanish_reading: lo verdadero
  alternative_spanish_readings:
  - lo fiel
  - la verdad
  - lo confiable
  rationale: La revisión inglesa reciente privilegió «true» para no perder la relación directa con אֱמֶת. En español, «lo verdadero» mantiene la correspondencia semántica básica y deja abierta la posible connotación de fidelidad o confiabilidad sin forzarla en el texto principal.
  doctrine_reference: HALOT; revisión inglesa 2026-04-23
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino en lugar de una sustitución litúrgica, siguiendo la política doctrinal del POB y el valor del Tetragrámaton en el hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La redacción inglesa revisada cambió «faithful» por «true» para reflejar más directamente אֱמֶת y conservar el trío moral «good and right and true». La versión española sigue esa revisión con «lo verdadero», manteniendo la amplitud semántica sin perder el paralelismo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, de acuerdo con la terminología POB en español.
  - Se evita «Cristo» o vocabulario eclesiástico no presente en el versículo.
  - «lo bueno, lo recto y lo verdadero» reproduce el carácter sustantivado de la serie hebrea con paralelismo claro y natural.
  - El tono es bíblico y publicable sin depender de una paráfrasis amplia.
