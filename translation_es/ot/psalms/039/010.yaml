translation:
  language: es
  text: Enmudecí[a]; no abro mi boca, porque tú lo has hecho[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fui silenciado» o «estoy callado».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «porque tú has hecho [esto]», con el objeto sin expresar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶאֱלַמְתִּי
  english_pob_choice: I am mute
  chosen_spanish: Enmudecí
  alternatives_spanish:
  - Estoy mudo
  - Estoy callado
  - Fui silenciado
  lexicon: HALOT
  rationale: El niphal de אלם expresa quedar sin habla o enmudecer. «Enmudecí» conserva el resultado de estar sin voz y suena natural en español poético. «Fui silenciado» introduce con más fuerza una agencia pasiva que el hebreo no explicita; «estoy mudo» y «estoy callado» son posibles, pero «enmudecí» mantiene mejor el valor verbal del original.
- source_word: לֹא אֶפְתַּח פִּי
  english_pob_choice: I do not open my mouth
  chosen_spanish: no abro mi boca
  alternatives_spanish:
  - no abriré mi boca
  - no abro mis labios
  - no abriré mis labios
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo para hablar. Se conserva «boca» para corresponder de cerca al hebreo y porque en español también funciona con naturalidad. Se opta por el presente, como en la versión inglesa de POB, para reflejar la postura actual de silencio del hablante.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Introduce la causa de la mudez. «Porque» es el conector causal más claro y directo en español moderno.
- source_word: עָשִׂיתָ
  english_pob_choice: have done it
  chosen_spanish: lo has hecho
  alternatives_spanish:
  - has hecho esto
  - lo has realizado
  - has actuado
  lexicon: HALOT
  rationale: עשה es amplio (“hacer, actuar, obrar”). El hebreo deja el objeto implícito; por eso «lo» reproduce la referencia no expresada sin precisar más de lo que el texto permite. «Lo has hecho» mantiene la brevedad y la tensión del enunciado.
theological_decisions:
- issue: Objeto implícito de עָשִׂיתָ y agencia divina
  english_pob_reading: because you have done it
  chosen_spanish_reading: porque tú lo has hecho
  alternative_spanish_readings:
  - porque tú has actuado
  - porque tú has hecho esto
  - porque tú lo has realizado
  rationale: El verso atribuye la situación al obrar de Dios sin explicar qué se hizo. La traducción española conserva ese objeto implícito con «lo», evitando resolver la referencia o suavizar la agencia divina. Esto preserva la tensión teológica del salmo, en vez de clarificarla más allá del hebreo.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: La versión inglesa más reciente permanece sin cambios tras la revisión; no se aplicaron modificaciones posteriores, y la propuesta española sigue de cerca la lectura estable del hebreo con el mismo manejo del objeto implícito.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el nombre divino cuando corresponda; aquí no aparece un tetragrámaton explícito, pero sí una alusión a la acción divina.
  - Se mantiene «boca» en vez de suavizar a «labios» para respetar el modismo hebreo y la consistencia terminológica del proyecto.
  - Se elige un presente en la primera hemistiquio («Enmudecí») con valor resultativo/poético, mientras que el segundo hemistiquio mantiene el presente de postura («no abro»), siguiendo la fuerza aspectual del hebreo y la decisión inglesa de POB.
