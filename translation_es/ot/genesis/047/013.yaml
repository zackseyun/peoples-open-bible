translation:
  language: es
  text: Ahora no había alimento[a] en toda la tierra, porque la hambruna era muy severa; y la tierra de Egipto y la tierra de Canaán languidecían[b] a causa de la hambruna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «pan»; aquí probablemente se usa de manera más amplia para alimento en general.'
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «desfallecían» o «se agotaban». El verbo hebreo es figurado y describe el efecto debilitante de la hambruna sobre Egipto y Canaán.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחֶם
  english_pob_choice: food
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: En este contexto de escasez, לֶחֶם funciona de manera metonímica para la provisión básica de alimento. En español, «pan» conserva el valor literal del hebreo y su posible extensión natural a alimento básico sin sonar forzado; se aclara con nota la amplitud semántica.
- source_word: אֵין
  english_pob_choice: there was no
  chosen_spanish: no había
  alternatives_spanish:
  - no existe
  - no había ningún
  lexicon: HALOT
  rationale: El negativo existencial se vierte de forma natural en pasado narrativo con «no había», que reproduce el sentido de ausencia en el relato.
- source_word: בְּכָל הָאָרֶץ
  english_pob_choice: in all the land
  chosen_spanish: en toda la tierra
  alternatives_spanish:
  - en toda la región
  - en todo el país
  lexicon: HALOT
  rationale: «Tierra» conserva el sustantivo hebreo ארץ y es suficientemente amplio para el territorio afectado, sin sugerir un alcance global absoluto.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de la escasez de modo claro y natural en español contemporáneo.
- source_word: כָבֵד
  english_pob_choice: very severe
  chosen_spanish: muy severa
  alternatives_spanish:
  - muy grave
  - muy intensa
  - pesada
  lexicon: HALOT
  rationale: Aunque literalmente significa «pesado», aplicado al hambre expresa gravedad o dureza. «Muy severa» comunica esa fuerza idiomática de manera digna y precisa.
- source_word: הָרָעָב
  english_pob_choice: the famine
  chosen_spanish: el hambre
  alternatives_spanish:
  - la hambruna
  - el ayuno
  lexicon: HALOT
  rationale: El hebreo designa la escasez general de alimentos; «hambre» es natural en español y mantiene la conexión semántica con la experiencia de privación, sin imponer un término técnico más específico que el contexto no exige.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - sumamente
  - en gran manera
  lexicon: HALOT
  rationale: Intensificador simple y directo, coherente con el registro del versículo.
- source_word: וַתֵּלַהּ
  english_pob_choice: languished
  chosen_spanish: languidecían
  alternatives_spanish:
  - se agotaban
  - se consumían
  - desfallecían
  lexicon: HALOT
  rationale: El verbo es figurado y describe el efecto debilitante del hambre. «Languidecían» refleja bien esa imagen de desgaste y coincide con la revisión auditada del inglés POB.
- source_word: אֶרֶץ מִצְרַיִם וְאֶרֶץ כְּנַעַן
  english_pob_choice: the land of Egypt and the land of Canaan
  chosen_spanish: la tierra de Egipto y la tierra de Canaán
  alternatives_spanish:
  - Egipto y Canaán
  - el país de Egipto y el país de Canaán
  lexicon: HALOT
  rationale: Se preserva la estructura paralela del hebreo y el énfasis geográfico de «tierra de». «Tierra» es la correspondencia más directa y tradicionalmente bíblica para ארץ.
- source_word: מִפְּנֵי הָרָעָב
  english_pob_choice: because of the famine
  chosen_spanish: a causa del hambre
  alternatives_spanish:
  - por el hambre
  - debido al hambre
  lexicon: HALOT
  rationale: La frase causal se expresa con una preposición natural en español. Se mantiene la relación causal fuerte sin volver la oración pesada.
translation_notes:
  revision_awareness: La redacción sigue el estado revisado del inglés POB, especialmente la elección de «languished» para ותלהּ, y conserva su valor figurado en español mediante «languidecían». También respeta la decisión lexical de לֶחֶם como término amplio en contexto de hambruna, aunque en español se optó por «pan» para mantener la cercanía al hebreo con una nota aclaratoria.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se traduce ארץ con «tierra» en paralelo repetido para sostener el patrón hebreo y la cohesión bíblica del registro español.
  - «Hambre» se usa como equivalente contextual de רָעָב; la nota conserva la amplitud semántica de לֶחֶם sin imponer una paráfrasis.
  - No se introduce terminología eclesiástica ajena al texto; el versículo se mantiene en registro narrativo sobrio y publicable.
