base_translation:
  language: en
  yaml_path: translation/ot/esther/003/015.yaml
  text: The couriers went out[a], hurried by the king’s command, and the decree was issued in Susa the citadel. And the king and Haman sat down to drink[b], but the city of Susa was thrown into confusion.
  footnotes:
  - marker: a
    text: Or 'the law was given in Susa the citadel.' The Hebrew verb is literally 'was given,' and דָּת can be rendered 'law' or 'decree' in this Persian administrative setting.
    reason: lexical_alternative
  - marker: b
    text: Or 'the city of Susa was bewildered' or 'was in turmoil.'
    reason: lexical_alternative
