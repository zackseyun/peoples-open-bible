translation:
  language: es
  text: 'Entonces se acercaron a él y dijeron: «Construiremos aquí rediles[a] para nuestro ganado, y ciudades para nuestros pequeños[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «corrales para ovejas». El hebreo גִּדְרֹת צֹאן se refiere literalmente a un recinto o corral para el rebaño.
    reason: lexical_alternative
  - marker: b
    text: O «niños». El hebreo טַף se refiere a pequeños o dependientes, a menudo destacando a los miembros vulnerables del grupo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְּשׁוּ אֵלָיו
  english_pob_choice: came near to him
  chosen_spanish: se acercaron a él
  alternatives_spanish:
  - vinieron a él
  - se acercaron a su presencia
  lexicon: HALOT / WLC
  rationale: El hebreo expresa un movimiento de aproximación física hacia la persona de Moisés. «Se acercaron a él» conserva ese sentido de forma natural en español y evita una redundancia innecesaria con «a él».
- source_word: וַיֹּאמְרוּ
  english_pob_choice: and said
  chosen_spanish: y dijeron
  alternatives_spanish:
  - y dijeron así
  - y hablaron
  lexicon: HALOT / WLC
  rationale: La fórmula narrativa introduce discurso directo de manera simple y secuencial. «Y dijeron» sigue de cerca el valor del waw consecutivo sin forzar calcos.
- source_word: גִּדְרֹת צֹאן
  english_pob_choice: sheepfolds
  chosen_spanish: rediles
  alternatives_spanish:
  - corrales para ovejas
  - apriscos
  - rediles de ovejas
  lexicon: HALOT
  rationale: El sintagma denota un recinto para el rebaño. «Rediles» es un equivalente léxico directo y claro en español, mientras que «corrales para ovejas» explicita la función pero alarga el texto. Se evita «apriscos» por ser menos transparente para lectura pública.
- source_word: נִבְנֶה
  english_pob_choice: we will build
  chosen_spanish: construiremos
  alternatives_spanish:
  - edificaremos
  - edificaremos nosotros
  lexicon: HALOT
  rationale: La forma expresa intención/propuesta en primera plural. «Construiremos» comunica ese valor futuro-volitivo con naturalidad en español; «edificaremos» sería más formal pero menos común.
- source_word: לְמִקְנֵנוּ
  english_pob_choice: for our livestock
  chosen_spanish: para nuestro ganado
  alternatives_spanish:
  - para nuestros animales
  - para nuestro ganado y posesiones de ganado
  lexicon: HALOT
  rationale: מִקְנֶה designa ganado o hacienda animal. «Ganado» es el equivalente más natural y fiel en español bíblico. Se mantiene el sentido de bienes pecuarios sin restringir indebidamente a una especie.
- source_word: פֹּה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  - acá
  lexicon: HALOT
  rationale: El adverbio locativo se traduce con el equivalente normal y directo «aquí». Mantiene la deíxis espacial del original.
- source_word: וְעָרִים
  english_pob_choice: and cities
  chosen_spanish: y ciudades
  alternatives_spanish:
  - y pueblos
  - y villas
  lexicon: HALOT
  rationale: עָרִים es el plural de «ciudad». Aunque el contexto podría incluir asentamientos, «ciudades» conserva la equivalencia léxica directa que el audit trail inglés también retuvo.
- source_word: לְטַפֵּנוּ
  english_pob_choice: for our little ones
  chosen_spanish: para nuestros pequeños
  alternatives_spanish:
  - para nuestros niños
  - para nuestros dependientes
  - para nuestros hijos pequeños
  lexicon: HALOT
  rationale: טַף se refiere a los pequeños o dependientes, con énfasis en la vulnerabilidad doméstica. «Nuestros pequeños» conserva ese matiz mejor que «nuestros niños», y evita cerrar el alcance a hijos biológicos únicamente.
theological_decisions:
- issue: 'Alcance de טַף: niños, pequeños o dependientes'
  english_pob_reading: Or “children.” The Hebrew טַף refers to little ones or dependents, often emphasizing the vulnerable members of the community.
  chosen_spanish_reading: «nuestros pequeños» con nota explicativa sobre «niños»/dependientes
  alternative_spanish_readings:
  - nuestros niños
  - nuestros dependientes
  rationale: El término hebreo tiene un campo semántico amplio que incluye pequeños y dependientes del grupo doméstico. Se preserva la ambigüedad útil con «nuestros pequeños» y se explica en nota para no perder la tensión semántica.
  doctrine_reference: Lexical semantics of טַף; contextual reading in Numbers 32:16
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo sin cambios en la última revisión; el consenso del revisor fue de alta concordancia. La versión española sigue la misma lectura de base sin introducir variantes textuales ni ajustes doctrinales adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «ganado» para מִקְנֶה por ser el equivalente natural y fiel en español.
  - Se evitó «Cristo»/«Mesías» y «SEÑOR» porque no aparecen en el verso.
  - La puntuación y el discurso directo siguen una convención española clara y publicable.
