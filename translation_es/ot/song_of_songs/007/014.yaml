translation:
  language: es
  text: Las mandrágoras[a] despiden aroma, y a nuestras puertas hay toda clase de frutos escogidos[b], nuevos y también viejos, que he guardado para ti, mi amado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manzanas de amor», reflejando la asociación tradicional de esta planta con el amor y la fertilidad.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «toda clase de delicadezas» o «todos los productos selectos»; el hebreo מְגָדִים es amplio, aunque aquí el contexto favorece la imagen de frutos escogidos.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדּוּדָאִים
  english_pob_choice: the mandrakes
  chosen_spanish: los mandrágoras
  alternatives_spanish:
  - las mandrágoras
  - los mandrágora
  lexicon: HALOT
  rationale: דּוּדָאִים designa la planta conocida como mandrake; en español la forma más transparente y estándar es «mandrágoras». Aunque el sustantivo español suele usarse en femenino, el hebreo es plural masculino, y por eso se puede sostener el artículo masculino plural sin perder el referente.
- source_word: נָתְנוּ רֵיחַ
  english_pob_choice: give off fragrance
  chosen_spanish: despiden aroma
  alternatives_spanish:
  - dan fragancia
  - emanan fragancia
  - despiden fragancia
  lexicon: HALOT
  rationale: El hebreo expresa literalmente que «han dado olor/fragrancia». «Despedir aroma» conserva la imagen sensorial con buen español actual y sin volverla explicativa en exceso.
- source_word: וְעַל פְּתָחֵינוּ
  english_pob_choice: and at our doorways
  chosen_spanish: y a nuestras puertas
  alternatives_spanish:
  - y en nuestros umbrales
  - y junto a nuestras entradas
  lexicon: HALOT
  rationale: פֶּתַח puede referirse a apertura, entrada o umbral. Con עַל, el sentido poético queda bien en «a nuestras puertas», que suena natural y mantiene la ubicación exterior/liminar.
- source_word: כָּל מְגָדִים
  english_pob_choice: all choice fruits
  chosen_spanish: toda clase de manjares
  alternatives_spanish:
  - toda clase de delicadezas
  - todos los frutos escogidos
  - toda clase de productos selectos
  lexicon: HALOT
  rationale: מְגָדִים puede abarcar productos selectos, delicadezas o frutos escogidos. Dado el carácter poético y la amplitud del término, «manjares» comunica bien la idea de cosas apetecibles y valiosas, aunque no se restringe a fruta.
- source_word: חֲדָשִׁים גַּם יְשָׁנִים
  english_pob_choice: new as well as old
  chosen_spanish: nuevos y también viejos
  alternatives_spanish:
  - nuevos y viejos
  - nuevos, así como viejos
  lexicon: HALOT
  rationale: La construcción mantiene una antítesis simple entre lo reciente y lo antiguo. «Y también» conserva el valor aditivo de גַּם sin hacer la frase más rígida.
- source_word: דּוֹדִי
  english_pob_choice: my beloved
  chosen_spanish: mi amado
  alternatives_spanish:
  - mi amado mío
  - mi querido
  lexicon: HALOT
  rationale: דּוֹדִי es el vocativo íntimo característico de Cantar. «Mi amado» es la forma natural y digna en español, acorde con el registro poético y con la costumbre ya fijada en la tradición de traducción del libro.
- source_word: צָפַנְתִּי לָךְ
  english_pob_choice: which I have stored up for you
  chosen_spanish: que he guardado para ti
  alternatives_spanish:
  - que he almacenado para ti
  - que he reservado para ti
  - que he atesorado para ti
  lexicon: HALOT
  rationale: צפן incluye guardar, reservar, atesorar. «He guardado» es la opción más natural y suficientemente concreta en español; evita sobrecargar el verso con una connotación demasiado patrimonial o emocional que no exige el hebreo.
translation_notes:
  revision_awareness: 'Se revisó el texto inglés auditado y su nota léxica: se conservó la imagen sensorial de las mandrágoras, el valor amplio de מְגָדִים y la estructura poética de «new as well as old». La traducción española evita depender mecánicamente del inglés y se ajusta al hebreo con un registro natural.'
  spanish_consistency_notes:
  - Se mantuvo «mi amado» para דּוֹדִי, en línea con el uso estable del Cantar.
  - Se prefirió «Yahvé» solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - Se preservó la ambigüedad de מְגָדִים mediante una nota, ya que el español «manjares» es más amplio que «frutos escogidos» y encaja con el paralelo poético.
