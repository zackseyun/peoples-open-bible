revisions:
- from: Hizo cortinas de pelo de cabra para una tienda sobre el tabernáculo[a]; hizo once cortinas.
  to: Hizo cortinas de pelo de cabra para una tienda de campaña sobre el tabernáculo[a]; hizo once cortinas.
  rationale: Se revisa únicamente «para una tienda» a «para una tienda de campaña» para mejorar la naturalidad y precisión funcional en español, manteniendo la finalidad expresada por לְאֹהֶל. También se pule la nota léxica sin cambiar su contenido sustancial.
  reviewer_model: gpt-5.4
