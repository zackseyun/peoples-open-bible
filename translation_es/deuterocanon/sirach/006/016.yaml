translation:
  language: es
  text: Un amigo fiel es un haz[a] de vida[b], y quien teme al Señor[c] lo alcanzará[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «un haz/manojo de vida»; el griego paralelo tiene «un remedio de vida». Se conserva la imagen hebrea, mientras el paralelo griego aclara que el sentido es algo que preserva o da vida.
    reason: alternative_reading
  - marker: b
    text: «Haz» intenta reproducir la metáfora compacta del hebreo צְרוֹר; otras posibilidades en español son «manojo» o «atado».
    reason: lexical_alternative
  - marker: c
    text: El griego explicita aquí κύριον, por lo que se traduce «el Señor». La cláusula hebrea es más difícil y no expresa con claridad el objeto del temor.
    reason: textual_variant
  - marker: d
    text: El verbo hebreo puede entenderse como «alcanzar» o «overtake», mientras que el griego dice «hallarán». Se conserva «alcanzará» para respetar más de cerca la forma verbal del hebreo, con el paralelo griego como aclaración de sentido.
    reason: textual_variant
lexical_decisions:
- source_word: צְרוֹר חַיִּים / φάρμακον ζωῆς
  english_pob_choice: a bundle of life
  chosen_spanish: un bulto de vida
  alternatives_spanish:
  - un haz de vida
  - un manojo de vida
  - un remedio de vida
  lexicon: HALOT; paralelo griego φάρμακον ζωῆς
  rationale: La imagen hebrea literal es compacta y algo extraña; el griego aporta la idea de algo que sana o preserva la vida. En español, «bulto» conserva la metáfora de algo atado/recogido sin forzar una explicación interpretativa, y la nota aclara el paralelo griego y la alternativa de sentido.
- source_word: אוֹהֵב אֱמוּנָה / φίλος πιστός
  english_pob_choice: a faithful friend
  chosen_spanish: amigo fiel
  alternatives_spanish:
  - amigo leal
  - amante de la fidelidad
  - amigo de fidelidad
  lexicon: HALOT; BDAG
  rationale: El hebreo está condensado y el griego explicita la idea de un amigo fiel. «Amigo fiel» es natural en español y mantiene el sentido relacional y de confiabilidad sin añadir una paráfrasis más amplia.
- source_word: יְרֵא / φοβούμενοι Κύριον
  english_pob_choice: one who fears the Lord
  chosen_spanish: quien teme al Señor
  alternatives_spanish:
  - el que teme al Señor
  - quien teme a Yahvé
  - los que temen al Señor
  lexicon: HALOT; BDAG
  rationale: La cláusula hebrea es textualmente difícil y el griego aporta explícitamente el objeto del temor. Se conserva la lectura tradicional de reverencia temerosa, con «Señor» como equivalente del κύριος griego en este pasaje.
- source_word: יַשִּׂיגֵם / εὑρήσουσιν αὐτόν
  english_pob_choice: will attain him
  chosen_spanish: lo alcanzará
  alternatives_spanish:
  - lo hallará
  - lo logrará
  - lo alcanzará a él
  lexicon: HALOT; paralelo griego
  rationale: El verbo hebreo sugiere alcanzar/overtake, mientras que el griego dice «hallarán». En español, «lo alcanzará» mantiene la tensión formal y puede leerse en el sentido de lograr/alcanzar, sin borrar la dificultad textual ni la ayuda del paralelo griego.
- source_word: Κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - Yahvé
  - el Señor
  lexicon: BDAG; convención POB
  rationale: El griego usa κύριον, y el audit trail inglés lo traduce «the Lord». En español se usa «el Señor» para reflejar el título del paralelo griego y la fórmula reverente, sin ocultar la posibilidad de un trasfondo del Nombre divino.
theological_decisions:
- issue: Cómo reflejar la tensión textual entre el hebreo y el griego en la primera mitad del verso
  english_pob_reading: A faithful friend is a bundle of life
  chosen_spanish_reading: Un amigo fiel es un bulto de vida
  alternative_spanish_readings:
  - Un amigo fiel es un haz de vida
  - Un amigo fiel es un remedio de vida
  rationale: El hebreo preserva una imagen concreta («bundle of life») y el griego ofrece una interpretación funcional («remedy of life»). La traducción española mantiene la imagen principal y la nota explica que el griego confirma el sentido de vida preservada/sanada. No se borra la tensión textual.
  doctrine_reference: 'Principio POB: primacía de los testigos originales con uso explícito de paralelos para clarificar sin suprimir variantes'
- issue: Cómo traducir la cláusula final con objeto implícito y forma verbal difícil
  english_pob_reading: one who fears the Lord will attain him
  chosen_spanish_reading: quien teme al Señor lo alcanzará
  alternative_spanish_readings:
  - quien teme al Señor lo hallará
  - quien teme al Señor lo logrará
  rationale: El hebreo presenta dificultad gramatical; el griego dice que los que temen al Señor lo encontrarán. Se mantiene en español una forma que respeta el valor del verbo hebreo («alcanzará») pero sigue siendo compatible con el paralelo griego. La nota aclara la posibilidad de «hallará» como alternativa de sentido.
  doctrine_reference: 'Criterio POB para variantes textuales difíciles: conservar el dato lexical principal y señalar el apoyo del paralelo griego en nota'
translation_notes:
  revision_awareness: He tenido en cuenta la revisión auditada del inglés, que pasó de «will find him» a «will attain him» para acercarse más al hebreo y mantener registro formal. En español, esa decisión se refleja en «lo alcanzará», mientras el griego sigue funcionando como apoyo interpretativo para la cláusula final. También se respetó la estrategia previa de conservar la imagen hebrea principal en la primera cola del verso.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος, en línea con el audit trail inglés y la convención POB cuando el griego explícita el título divino.
  - Se mantiene una imagen concreta en la primera cola del verso para no neutralizar la metáfora hebrea.
  - Se evita traducir la cláusula final solo por el griego; la forma española deja visible la tensión entre «alcanzar» y «hallar».
  - «Amigo fiel» se eligió por naturalidad en español y por correspondencia directa con φίλος πιστός.
