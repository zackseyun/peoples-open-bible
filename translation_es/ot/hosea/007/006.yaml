base_translation:
  language: en
  yaml_path: translation/ot/hosea/007/006.yaml
  text: For they draw near with their hearts like an oven in their lying in wait[a]; all night their baker sleeps[b], but in the morning it burns like a flaming fire.
  footnotes:
  - marker: a
    text: Or 'in their ambush' or 'while they lie in wait.' The Hebrew phrase carries the sense of plotting or lurking for an attack.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their baker.' Within the extended oven metaphor, this likely refers figuratively to the one tending or stirring up their heated plot.
    reason: cultural_note
