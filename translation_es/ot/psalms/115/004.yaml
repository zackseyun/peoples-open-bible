lexical_decisions:
- source_word: עֲצַבֵּיהֶם
  english_pob_choice: their idols
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus imágenes
  - sus ídolos tallados
  lexicon: HALOT
  rationale: En este contexto polémico, el sustantivo se refiere a ídolos, no a “dolores”. “Sus ídolos” reproduce bien el referente y mantiene la fuerza crítica del hebreo. El posesivo plural conserva el sufijo de 3.ª persona plural.
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - plata fina
  - argentado
  lexicon: HALOT
  rationale: El término material es directo; “plata” es la equivalencia natural y fiel en español.
- source_word: וְזָהָב
  english_pob_choice: and gold
  chosen_spanish: y oro
  alternatives_spanish:
  - y de oro
  - y oro fino
  lexicon: HALOT
  rationale: Coordinación simple del segundo material mencionado. “Oro” conserva la referencia literal sin añadir matices no presentes en el hebreo.
- source_word: מַעֲשֵׂה
  english_pob_choice: the work of
  chosen_spanish: obra de
  alternatives_spanish:
  - trabajo de
  - hechura de
  lexicon: HALOT
  rationale: En construcción con “manos”, “obra de” mantiene el valor nominal de producto/hechura y suena natural en español sin perder la imagen concreta.
- source_word: יְדֵי
  english_pob_choice: hands
  chosen_spanish: manos
  alternatives_spanish:
  - manos de
  - las manos
  lexicon: HALOT
  rationale: 'Se conserva el sustantivo concreto “manos” para mantener el contraste antropológico del texto: lo hecho por manos humanas frente al Dios vivo.'
- source_word: אָדָם
  english_pob_choice: human
  chosen_spanish: humanas
  alternatives_spanish:
  - del hombre
  - de la humanidad
  lexicon: HALOT
  rationale: En esta expresión genérica, “humanas” comunica con naturalidad el sentido colectivo de אָדָם y evita restringirlo a un varón individual. La concordancia con “manos” produce una frase idiomática en español.
theological_decisions:
- issue: Renderizar אָדָם como genérico colectivo, no como masculino individual
  english_pob_reading: human hands
  chosen_spanish_reading: manos humanas
  alternative_spanish_readings:
  - manos del hombre
  - manos de hombre
  rationale: El hebreo usa אָדָם en sentido genérico para contrastar lo fabricado por seres humanos con el Dios vivo. “Manos humanas” preserva ese valor colectivo y evita una lectura demasiado masculina o individualizada.
  doctrine_reference: 'DOCTRINE.md: gender-accurate over gender-neutral; אָדָם default ''man / humankind (context)'''
translation_notes:
  revision_awareness: El texto inglés POB fue revisado y quedó sin cambios, con acuerdo alto entre revisores. La versión española sigue esa lectura estable y conserva la alternativa literal en nota donde el inglés también la documenta.
  spanish_consistency_notes:
  - Mantengo “ídolos” para עֲצַבֵּיהֶם, en línea con el juicio léxico del POB en inglés.
  - Uso “humanas” como solución idiomática para אָדָם, equivalente funcional de “human hands”.
  - Conservo la imagen concreta de “manos” y la secuencia material “plata y oro” sin amplificaciones.
