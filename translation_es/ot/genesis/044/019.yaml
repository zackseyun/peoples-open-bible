translation:
  language: es
  text: 'Mi señor preguntó a sus siervos, diciendo: «¿Tienen un padre o un hermano?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֲדֹנִי
  english_pob_choice: My lord
  chosen_spanish: Mi señor
  alternatives_spanish:
  - Mi amo
  - Señor
  lexicon: HALOT
  rationale: אָדוֹן con sufijo de primera persona singular funciona como tratamiento respetuoso hacia un superior. En español, «mi señor» conserva la deferencia cortesana mejor que «señor» sin posesivo, y evita la connotación de posesión esclavista de «mi amo».
- source_word: שָׁאַל
  english_pob_choice: asked
  chosen_spanish: preguntó
  alternatives_spanish:
  - inquirió
  - cuestionó
  lexicon: HALOT
  rationale: El verbo expresa hacer una pregunta o averiguar. «Preguntó» es el equivalente natural en español y mantiene el valor directo del contexto.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus esclavos
  alternatives_spanish:
  - sus siervos
  - sus servidores
  lexicon: HALOT
  rationale: El POB inglés decidió «servants» para reflejar el habla deferente en contexto cortesano, pero el hebreo עֶבֶד conserva su fuerza léxica básica de «esclavo». En español se mantiene esa fuerza con «esclavos», sin ocultar la tensión histórica del término.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - con estas palabras
  - así
  lexicon: HALOT
  rationale: La forma introduce el contenido del discurso. «Diciendo» reproduce de manera transparente esa función.
- source_word: הֲיֵשׁ לָכֶם
  english_pob_choice: Do you have
  chosen_spanish: ¿Tienen
  alternatives_spanish:
  - ¿Hay para ustedes
  - ¿Tienen ustedes
  lexicon: HALOT
  rationale: La construcción interrogativa expresa posesión/existencia. En español, la pregunta directa «¿Tienen...?» es idiomática y comunica el mismo sentido.
- source_word: אָב
  english_pob_choice: a father
  chosen_spanish: un padre
  alternatives_spanish:
  - padre
  lexicon: HALOT
  rationale: El sustantivo es indefinido en la pregunta. «Un padre» refleja naturalmente la indagación sobre si existe tal familiar.
- source_word: אָח
  english_pob_choice: a brother
  chosen_spanish: un hermano
  alternatives_spanish:
  - hermano
  lexicon: HALOT
  rationale: De modo paralelo a «un padre», el singular se conserva porque la pregunta hebrea busca la existencia de un hermano, no de hermanos en general.
translation_notes:
  revision_awareness: 'Concordamos con la revisión más reciente del POB inglés: no hubo cambios aplicados y el texto se mantiene en alto acuerdo con el auditor. La única decisión de peso para el español es conservar la fuerza léxica de עֲבָדָיו como «sus esclavos», en contraste con la opción suavizada del inglés, porque el hebreo y la transparencia del proyecto lo justifican.'
  spanish_consistency_notes:
  - Se usa «Mi señor» como tratamiento reverente al interlocutor humano en contexto de corte egipcia.
  - Se conserva «esclavos» para עֲבָדָיו por fidelidad léxica, aunque el inglés POB optó por «servants» por naturalidad contextual.
  - La pregunta se vierte en español directo y natural, sin añadir pluralizaciones ni explicaciones ausentes del hebreo.
