review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego: Ptolomeo entra en Antioquía y realiza el acto concreto de ponerse la insignia real de Asia y luego dos coronas, la de Asia y la de Egipto. Conserva la repetición de διάδημα como «corona» y no sobreinterpreta el simbolismo político. Sin embargo, la nota al pie anclada en «corona» no corresponde bien al punto léxico señalado en el inglés, porque la alternativa «dos diademas» afecta a la segunda expresión, no a la primera ocurrencia aislada.'
  spanish_quality_summary: El español es claro, natural y digno. La sintaxis general funciona bien. Aun así, «se puso dos coronas» suena menos natural que «se puso sobre la cabeza dos coronas» o «se puso dos coronas en la cabeza»; además, conviene mover la nota al segmento relevante para evitar una ancla confusa. También es más fluido en español repetir menos mecánicamente «se puso» con mejor colocación de complementos.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Ptolomeo», «Antioquía», «corona» y «Egipto» están bien. La decisión de usar «corona» en lugar de «diadema» sigue adecuadamente la justificación auditada, manteniendo «diadema» como alternativa en nota.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en la primera «corona», pero el contenido de la nota explica una alternativa relacionada con la repetición del término y con «dos coronas».
    rationale: El inglés documenta que el mismo término griego aparece primero en singular y luego en plural. En español, anclar la nota al primer «corona» hace parecer que la alternativa es solo para esa palabra, cuando la observación afecta sobre todo al patrón repetido y en particular a «dos coronas».
  - severity: low
    issue: «Se puso dos coronas sobre su cabeza» es entendible, pero algo rígido en español.
    rationale: La construcción es comprensible y fiel, pero una reordenación como «se puso sobre la cabeza dos coronas» suena más natural en registro bíblico moderno sin perder el carácter concreto del griego.
  revised_spanish_text: 'Y Ptolomeo entró en Antioquía y se puso la corona de Asia, y se puso sobre la cabeza dos coronas[a]: la de Asia y la de Egipto.'
  revised_footnotes:
  - marker: a
    text: 'O «dos diademas». El griego usa el mismo término real dos veces: primero para «la corona de Asia» y luego para «dos coronas», las de Asia y Egipto.'
    reason: lexical_alternative
  revision_rationale: Se conserva plenamente el sentido del original y la decisión léxica principal, pero se corrige la ubicación de la nota para que corresponda al fenómeno léxico documentado y se mejora ligeramente la naturalidad de la frase en español.
