lexical_decisions:
- source_word: Μᾶρκος
  english_pob_choice: Mark
  chosen_spanish: Marcos
  alternatives_spanish:
  - Mark
  lexicon: BDAG
  rationale: Nombre propio griego transliterado al español con la forma eclesiásticamente reconocible Marcos. Se conserva el referente personal sin traducir el nombre.
- source_word: Ἀρίσταρχος
  english_pob_choice: Aristarchus
  chosen_spanish: Aristarco
  alternatives_spanish:
  - Aristarchus
  lexicon: BDAG
  rationale: Nombre propio transliterado a la forma natural del español, Aristarco, que preserva el identificador histórico del colaborador de Pablo.
- source_word: Δημᾶς
  english_pob_choice: Demas
  chosen_spanish: Demas
  alternatives_spanish:
  - Demas
  lexicon: BDAG
  rationale: Nombre propio que en español se mantiene sin cambios relevantes; Demas comunica con claridad el mismo antropónimo griego.
- source_word: Λουκᾶς
  english_pob_choice: Luke
  chosen_spanish: Lucas
  alternatives_spanish:
  - Luke
  lexicon: BDAG
  rationale: Nombre propio transliterado a la forma española habitual, Lucas, conservando el referente del compañero de Pablo.
- source_word: οἱ συνεργοί
  english_pob_choice: my fellow workers
  chosen_spanish: mis colaboradores
  alternatives_spanish:
  - mis compañeros de trabajo
  - mis co-trabajadores
  - mis compañeros de labor
  lexicon: BDAG
  rationale: συνεργοί expresa personas que trabajan junto con otro. En español, 'colaboradores' transmite de forma natural la idea de cooperación en la obra sin introducir un matiz empresarial excesivo. Se omite la repetición explícita de 'los' porque el posesivo español ya integra bien la relación grupal.
- source_word: μου
  english_pob_choice: my
  chosen_spanish: mis
  alternatives_spanish:
  - míos
  lexicon: BDAG
  rationale: El genitivo de posesión/relación se expresa en español con el posesivo plural 'mis', que concuerda con el grupo plural de συνεργοί.
