translation:
  language: es
  text: Él hizo paz en el país[a], e Israel se alegró con gran alegría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en la tierra'; el griego dice literalmente 'sobre la tierra', pero aquí probablemente se refiere al territorio o país.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησεν
  english_pob_choice: He made
  chosen_spanish: hizo
  alternatives_spanish:
  - estableció
  - trajo
  lexicon: LSJ
  rationale: El aoristo de ποιέω con εἰρήνην como objeto se rinde de manera más directa con 'hizo'. En español conserva la acción simple del original sin añadir una interpretación más expansiva que la requerida por el griego.
- source_word: τὴν εἰρήνην
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - la paz
  lexicon: LSJ
  rationale: '''Paz'' expresa el estado de tranquilidad pública del contexto. El artículo griego no exige reproducirse de forma rígida en español, y la forma sin artículo resulta natural y fiel.'
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - sobre la tierra
  lexicon: LSJ
  rationale: γῆ puede significar 'tierra' o 'territorio'. En 1 Macabeos el sentido es local y no universal, por lo que 'en la tierra' comunica el espacio habitado sin forzar un calco de la preposición griega.
- source_word: ηὐφράνθη
  english_pob_choice: rejoiced
  chosen_spanish: se alegró
  alternatives_spanish:
  - se regocijó
  - fue alegrado
  lexicon: LSJ
  rationale: La forma pasiva/deponente expresa respuesta gozosa. 'Se alegró' es idiomático en español y evita una pasiva artificial, manteniendo el sentido de gozo activo del pueblo.
- source_word: Ἰσραήλ
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el Israel
  lexicon: LSJ
  rationale: Nombre propio estándar del pueblo. No requiere adaptación semántica.
- source_word: εὐφροσύνην μεγάλην
  english_pob_choice: with great joy
  chosen_spanish: con gran alegría
  alternatives_spanish:
  - con gran gozo
  - con mucha alegría
  lexicon: LSJ
  rationale: La acumulación de vocabulario de gozo en griego se refleja con una intensificación natural en español. 'Gran alegría' mantiene el énfasis sin sonar artificial.
translation_notes:
  revision_awareness: El texto griego coincide bien con la versión inglesa auditada. La única oscilación textual relevante en la auditoría inglesa fue 'upon the land' vs. 'in the land'; en español se opta por 'en la tierra', que preserva el valor local de γῆ y la naturalidad idiomática.
  spanish_consistency_notes:
  - Se mantiene 'paz' para εἰρήνη y 'alegría' para εὐφροσύνη, evitando mezclar términos que pudieran diluir la duplicación enfática del griego.
  - Se usa 'tierra' para γῆ en sentido territorial/local, no como 'mundo' ni como referencia cósmica.
  - La estructura de dos miembros del versículo se conserva para reflejar el paralelismo del original.
