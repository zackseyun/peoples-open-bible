revisions:
- from: 'Esto podrán comer de todo lo que hay en las aguas: todo lo que tiene aletas y escamas, podrán comer[a].'
  to: 'Esto pueden comer de todo lo que hay en las aguas: todo lo que tiene aletas y escamas pueden comer[a].'
  rationale: Se ajustó la fuerza verbal de 'podrán comer' a 'pueden comer' para expresar con mayor naturalidad y precisión la permisión legal del hebreo. Se corrigió la nota alternativa para evitar el falso sentido obligativo de 'deberán comer' y conservar una opción más formal cercana al registro legal del original.
