translation:
  language: es
  text: Aproximadamente cuarenta mil [a], armados para la guerra, cruzaron delante de Yahvé para combatir, hasta las llanuras de Jericó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Aproximadamente cuarenta mil armados para la guerra cruzaron delante de Yahvé para combatir, hasta las llanuras de Jericó».'
    reason: alternative_reading
lexical_decisions:
- source_word: כְּ/אַרְבָּעִים אֶלֶף
  english_pob_choice: About forty thousand
  chosen_spanish: Aproximadamente cuarenta mil
  alternatives_spanish:
  - Como cuarenta mil
  - Unos cuarenta mil
  - Cerca de cuarenta mil
  lexicon: HALOT
  rationale: El prefijo כ con el numeral introduce aproximación; en español, «aproximadamente» expresa con claridad esa lectura sin perder naturalidad. «Unos» o «cerca de» también serían posibles, pero «aproximadamente» mantiene mejor el matiz explícito de estimación.
- source_word: חֲלוּצֵי הַצָּבָא
  english_pob_choice: armed for war
  chosen_spanish: armados para la guerra
  alternatives_spanish:
  - equipados para la batalla
  - preparados para la guerra
  - hombres armados del ejército
  lexicon: HALOT
  rationale: La expresión hebrea señala disposición/equipamiento militar. «Armados para la guerra» conserva el valor léxico y es idiomático en español. «Equipados para la batalla» suaviza un poco la imagen, pero «armados» refleja mejor la fuerza del término.
- source_word: עָבְרוּ
  english_pob_choice: crossed over
  chosen_spanish: cruzaron
  alternatives_spanish:
  - pasaron
  - cruzaron al otro lado
  lexicon: HALOT
  rationale: En el contexto de Josué 3–4, el verbo se refiere al cruce del Jordán. En español, «cruzaron» es suficiente y natural; el complemento «al otro lado» no aparece en el hebreo de este versículo y no debe añadirse.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יְהוָה: «Yahvé». «Delante de» reproduce bien לִפְנֵי en una escena procesional o militar y suena natural en español bíblico contemporáneo. «Ante Yahvé» también sería válido, pero «delante de» encaja mejor con el movimiento del verso.'
- source_word: לַ/מִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para combatir
  alternatives_spanish:
  - para la guerra
  - para la batalla
  lexicon: HALOT
  rationale: El hebreo expresa finalidad ligada al combate. En español, «para combatir» conserva el sentido de propósito y evita que la frase suene más nominal o pesada. Se mantiene la tensión entre la condición militar y el acto de guerra sin ampliar el texto.
- source_word: אֶל עַרְבוֹת יְרִיחוֹ
  english_pob_choice: to the plains of Jericho
  chosen_spanish: hasta las llanuras de Jericó
  alternatives_spanish:
  - a las llanuras de Jericó
  - hasta las estepas de Jericó
  - a la llanura de Jericó
  lexicon: HALOT
  rationale: עַרְבוֹת designa una zona de llanuras o estepa. «Llanuras de Jericó» es claro y fiel; se añadió «hasta» porque el movimiento del verso marca destino/límite del desplazamiento. «Estepas» sería más técnico, pero menos transparente para lectores generales.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: 'Se aplica el estándar del proyecto en español: transliterar el nombre divino como «Yahvé», no ocultarlo con una sustitución genérica. Esto preserva la referencia al nombre del pacto y mantiene coherencia con el resto de la obra.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El audit trail inglés mantiene la lectura aproximativa de כְּאַרְבָּעִים אֶלֶף, el valor militar de חֲלוּצֵי הַצָּבָא, la secuencia narrativa de עברו, y la decisión doctrinal de renderizar יְהוָה como Yahweh/Yahvé. No se registran revisiones posteriores sustantivas; la versión se mantiene estable con acuerdo alto del revisor.
  spanish_consistency_notes:
  - Se preserva la distinción entre «Yahvé» (nombre divino) y expresiones preposicionales ordinarias como «delante de».
  - «Llanuras» refleja bien עַרְבוֹת sin introducir tecnicismos innecesarios.
  - La frase verbal «para combatir» mantiene la finalidad del hebreo sin convertirla en una simple nominalización.
