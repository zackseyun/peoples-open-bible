translation:
  language: es
  text: para comprar a los pobres por plata, y al necesitado por un par de sandalias, y vender las sobras[a] del grano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los desechos del grano» o «el grano caído»; el hebreo probablemente se refiere a restos de grano de calidad inferior vendidos como mercancía.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִקְנוֹת
  english_pob_choice: to buy
  chosen_spanish: comprar
  alternatives_spanish:
  - adquirir
  lexicon: HALOT
  rationale: El infinitivo de propósito expresa aquí la intención comercial abusiva; en español, «comprar» reproduce de forma natural el sentido económico y mantiene la fuerza de explotación implícita en el contexto.
- source_word: בַּכֶּסֶף
  english_pob_choice: for silver
  chosen_spanish: por plata
  alternatives_spanish:
  - con plata
  - por dinero
  lexicon: HALOT
  rationale: «Plata» conserva el término concreto del hebreo y su color profético; «por» refleja bien el precio de intercambio, mejor que una formulación más general.
- source_word: דַּלִּים
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los débiles
  - los humildes
  lexicon: HALOT
  rationale: En este contexto de injusticia económica, «pobres» es la equivalencia más natural y transparente para el uso social de דַּלִּים.
- source_word: וְאֶבְיוֹן
  english_pob_choice: and the needy
  chosen_spanish: y al necesitado
  alternatives_spanish:
  - y al pobre
  - y al desposeído
  lexicon: HALOT
  rationale: Se conserva el paralelismo sin borrar la matización de אֶבְיוֹן frente a דַּלִּים. En español, el singular colectivo «al necesitado» funciona de manera natural junto a «los pobres».
- source_word: בַּעֲבוּר נַעֲלָיִם
  english_pob_choice: for a pair of sandals
  chosen_spanish: por un par de sandalias
  alternatives_spanish:
  - por sandalias
  - a cambio de sandalias
  lexicon: HALOT
  rationale: La forma dual del hebreo sugiere «un par»; «sandalias» conserva el carácter trivial e irrisorio del precio pagado por personas vulnerables.
- source_word: וּמַפַּל בַּר
  english_pob_choice: and the sweepings of the grain
  chosen_spanish: y las barridas del grano
  alternatives_spanish:
  - y el rescoldo del grano
  - y el refugallo del grano
  lexicon: HALOT
  rationale: «Barridas» intenta reproducir la imagen de lo que se barre o cae como residuo; «del grano» mantiene la referencia agrícola. Se conserva así el valor de desecho, aunque la expresión sigue siendo algo marcada, como en el hebreo.
- source_word: נַשְׁבִּיר
  english_pob_choice: and sell
  chosen_spanish: vender
  alternatives_spanish:
  - ofrecer en venta
  - negociar
  lexicon: HALOT
  rationale: El hiphil de שׁבר tiene aquí sentido comercial de vender grano. En español, «vender» es directo y idiomático, y no requiere explicitar el objeto ya implicado en la frase previa.
translation_notes:
  revision_awareness: La versión española sigue el consenso alto del auditor y no introduce cambios de fondo frente al texto inglés de referencia. Se ha mantenido la tensión lexical del último hemistiquio con una expresión poco pulida pero fiel a la imagen hebrea, en paralelo con la nota alternativa sobre el sentido probable de מַפַּל בַּר.
  spanish_consistency_notes:
  - Se mantuvo «plata» para בַּכֶּסֶף por su concreción y por coherencia con la imaginería profética.
  - Se conservó la distinción entre «los pobres» y «al necesitado» para no nivelar דַּלִּים y אֶבְיוֹן.
  - La última cláusula se dejó con una formulación de resonancia literal para respetar la posible tensión semántica del hebreo y permitir la nota alternativa.
