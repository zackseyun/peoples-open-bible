translation:
  language: es
  text: ¡Ay de los que llaman al mal bien y al bien mal[a], que ponen la oscuridad por luz y la luz por oscuridad[b], que ponen lo amargo por dulce y lo dulce por amargo!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que dicen al mal: “bien”, y al bien: “mal”».'
    reason: lexical_alternative
  - marker: b
    text: La repetición de oscuridad/luz y amargo/dulce intensifica la acusación de invertir la realidad moral, no solo de cometer un error verbal.
    reason: cultural_note
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de!
  - ¡Ay, de los!
  lexicon: HALOT
  rationale: El interjección profética expresa lamento y denuncia. En español, «¡Ay de!» comunica con naturalidad el tono de juicio manteniendo la fuerza del hebreo.
- source_word: הָאֹמְרִים
  english_pob_choice: those who call
  chosen_spanish: los que llaman
  alternatives_spanish:
  - los que dicen
  - los que declaran
  lexicon: HALOT
  rationale: «Llaman» preserva la idea de asignar una etiqueta o valoración moral, no solo de emitir palabras, y sigue bien la elección inglesa auditada.
- source_word: לָרַע ... טוֹב
  english_pob_choice: evil good
  chosen_spanish: al mal bien
  alternatives_spanish:
  - al mal, bien
  - al mal como bien
  lexicon: HALOT
  rationale: «Mal» conserva el contraste moral fuerte de רַע; «bien» mantiene el paralelismo terso del hebreo.
- source_word: וְלַטּוֹב רָע
  english_pob_choice: good evil
  chosen_spanish: y al bien mal
  alternatives_spanish:
  - y al bien, mal
  - y al bien como mal
  lexicon: HALOT
  rationale: Se conserva la simetría antitética con la primera cola, sin añadir explicación interpretativa.
- source_word: שָׂמִים
  english_pob_choice: make
  chosen_spanish: hacen de
  alternatives_spanish:
  - hacen
  - ponen
  lexicon: HALOT
  rationale: En español, «hacer de X Y» expresa mejor el acto de convertir o reetiquetar algo como otra cosa, y corresponde al valor de inversión de la construcción.
- source_word: חֹשֶׁךְ ... לְאוֹר
  english_pob_choice: darkness light
  chosen_spanish: de la oscuridad luz
  alternatives_spanish:
  - de la oscuridad, luz
  - de la oscuridad en luz
  lexicon: HALOT
  rationale: «Oscuridad» es idiomático y claro en español; se mantiene la estructura breve del hebreo y la versión inglesa revisada, evitando añadir un «en» que suavizaría la concisión.
- source_word: וְאוֹר לְחֹשֶׁךְ
  english_pob_choice: light darkness
  chosen_spanish: y de la luz oscuridad
  alternatives_spanish:
  - y de la luz, oscuridad
  - y convierten la luz en oscuridad
  lexicon: HALOT
  rationale: La inversión se expresa por paralelismo directo, manteniendo la concisión y el balance retórico del verso.
- source_word: מַר
  english_pob_choice: bitter
  chosen_spanish: amargo
  alternatives_spanish:
  - amarga
  - lo amargo
  lexicon: HALOT
  rationale: La forma adjetival «amargo» es la más natural para emparejar con «dulce» y reproducir la oposición sensorial del hebreo.
- source_word: לְמָתוֹק
  english_pob_choice: sweet
  chosen_spanish: dulce
  alternatives_spanish:
  - lo dulce
  - dulzura
  lexicon: HALOT
  rationale: «Dulce» conserva el contraste adjetival directo con «amargo» y evita sustantivar innecesariamente.
- source_word: וּמָתוֹק לְמָר
  english_pob_choice: sweet bitter
  chosen_spanish: de lo dulce amargo
  alternatives_spanish:
  - dulce amargo
  - de lo dulce, amargo
  lexicon: HALOT
  rationale: Se conserva la clausula final con paralelismo y cierre enfático. El artículo «lo» ayuda a naturalizar el giro sin perder la fuerza poética.
theological_decisions:
- issue: Moral inversion and scope
  english_pob_reading: The verse condemns moral inversion—relabeling evil as good and good as evil—without expanding it into a narrower doctrinal or political application.
  chosen_spanish_reading: El versículo condena la inversión moral—llamar al mal bien y al bien mal—sin restringirlo a una aplicación doctrinal o política más estrecha.
  alternative_spanish_readings:
  - Una denuncia general de la confusión moral
  - Una crítica exclusivamente judicial o social
  rationale: La imagen hebrea de oscuridad/luz y amargo/dulce amplía el alcance del reproche más allá de un solo ámbito. La traducción española conserva esa amplitud y gravedad sin imponer una aplicación que el texto no explicita.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente, que eliminó «into» para reflejar con mayor precisión la construcción hebrea y mantener un registro más conciso. Por eso el español evita un giro explicativo como «en» y conserva un paralelismo breve: «de la oscuridad luz y de la luz oscuridad».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - Se mantiene «mal/bien» para la oposición moral central, reservando otros matices para contextos donde el hebreo lo exija.
  - Se prefirió «oscuridad» frente a «tinieblas» por claridad moderna, sin perder el contraste poético.
  - Se preservó la estructura escalonada del verso con tres pares antitéticos, siguiendo la auditable decisión inglesa de mantener la concisión.
