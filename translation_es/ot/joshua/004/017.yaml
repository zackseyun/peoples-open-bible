  text: 'Entonces Josué mandó a los sacerdotes, diciendo: «Suban y salgan del Jordán».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio la orden a
  lexicon: HALOT
  rationale: צוה expresa una orden con autoridad. En español, «mandó» conserva bien esa fuerza narrativa sin sonar más rígido de lo necesario. «Ordenó» también sería posible, pero «mandó» resulta más natural en este contexto.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico, equivalente directo del hebreo.
- source_word: אֶת הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: a los sacerdotes
  alternatives_spanish:
  - a los presbíteros
  lexicon: HALOT
  rationale: El hebreo marca objeto directo; en español se expresa naturalmente con «a». «Sacerdotes» mantiene el referente funcional del texto. No se sustituye por términos eclesiásticos menos precisos.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - con estas palabras
  lexicon: HALOT
  rationale: Fórmula narrativa para introducir discurso directo. «Diciendo» es la equivalencia más directa y clara en español.
- source_word: עֲלוּ
  english_pob_choice: Come up
  chosen_spanish: Suban
  alternatives_spanish:
  - Subid
  - Vengan
  lexicon: HALOT
  rationale: עלה significa subir/ascender; en este contexto los sacerdotes salen del lecho del río. «Suban» conserva el movimiento ascendente sin forzar un calco como «vengan».
- source_word: מִן הַיַּרְדֵּן
  english_pob_choice: out of the Jordan
  chosen_spanish: del Jordán
  alternatives_spanish:
  - de dentro del Jordán
  - fuera del Jordán
  lexicon: HALOT
  rationale: La preposición מִן indica salida o alejamiento desde el interior del lugar. En español, «del Jordán» comunica de forma natural la procedencia, y el contexto ya implica que salen del río.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo y coincide con la lectura inglesa auditada: mandato de Josué a los sacerdotes para que salgan del Jordán. No se detectan variantes textuales ni tensiones teológicas en este versículo.'
  spanish_consistency_notes:
  - Se usa «Josué» de forma consistente para יְהוֹשֻׁעַ.
  - Se prefiere «sacerdotes» para הַכֹּהֲנִים, evitando términos litúrgicos ajenos al contexto bíblico.
  - «Del Jordán» mantiene una expresión natural en español para el origen/movimiento desde el río, sin añadir explicaciones que el hebreo no explicita.
