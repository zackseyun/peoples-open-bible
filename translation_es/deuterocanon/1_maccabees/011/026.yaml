translation:
  language: es
  text: Y el rey hizo con él como habían hecho con él sus predecesores, y lo exaltó por encima de todos sus amigos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «delante de todos sus amigos» o «en presencia de todos sus amigos». La expresión griega puede señalar una elevación pública ante la corte del rey, aunque el contexto también permite la idea de rango por encima de ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησεν αὐτῷ
  english_pob_choice: did for him
  chosen_spanish: hizo por él
  alternatives_spanish:
  - trató con él
  - obró con él
  - hizo para él
  lexicon: LSJ
  rationale: El griego con dativo aquí expresa la acción del rey en relación con Jonatán; en español, 'hizo por él' conserva la forma breve y el valor relacional sin añadir una explicación interpretativa excesiva. 'Trató con él' suena más natural en algunos contextos, pero puede sonar demasiado general o moderno; 'hizo por él' sigue de cerca la revisión inglesa.
- source_word: καθὼς ἐποίησαν αὐτῷ οἱ πρὸ αὐτοῦ
  english_pob_choice: as those before him had done for him
  chosen_spanish: como habían hecho por él los que antes que él
  alternatives_spanish:
  - como lo habían hecho sus predecesores
  - como habían obrado con él los de antes
  - como lo habían tratado los que le precedieron
  lexicon: LSJ
  rationale: '''οἱ πρὸ αὐτοῦ'' se refiere a los que lo precedieron; ''los que antes que él'' preserva la estructura griega y mantiene claro el referente real. Se conserva ''por él'' para corresponder al dativo del primer miembro y a la forma de la revisión inglesa, evitando ampliar a ''sus predecesores'' si bien esa es la idea implícita.'
- source_word: ὕψωσεν
  english_pob_choice: he exalted
  chosen_spanish: lo exaltó
  alternatives_spanish:
  - lo levantó
  - lo honró
  - lo promovió
  lexicon: LSJ
  rationale: En el contexto cortesano, ὑψόω denota elevar en honor o rango. 'Lo exaltó' reproduce bien la elevación formal sin reducir el sentido a un mero ascenso administrativo. 'Lo promovió' sería demasiado específico; 'lo honró' perdería el matiz de elevación.
- source_word: ἐναντίον πάντων τῶν φίλων αὐτοῦ
  english_pob_choice: above all his friends
  chosen_spanish: sobre todos sus amigos
  alternatives_spanish:
  - delante de todos sus amigos
  - en presencia de todos sus amigos
  - por encima de todos sus amigos
  lexicon: LSJ
  rationale: 'La frase griega admite dos matices: elevación jerárquica y proclamación pública ante la corte. El español ''sobre todos sus amigos'' mantiene la ambigüedad útil del original y puede leerse tanto como superioridad de rango como exaltación en presencia de ellos. Se evita fijar solo ''delante de'' para no perder el sentido comparativo.'
translation_notes:
  revision_awareness: La base inglesa pasó de 'dealt with him' a 'did for him' para reflejar más literalmente ἐποίησεν αὐτῷ / ἐποίησαν αὐτῷ. La traducción española sigue esa revisión con 'hizo por él', sin introducir un matiz interpretativo adicional. También conserva la ambigüedad de ἐναντίον en una nota, como hacía el aparato inglés.
  spanish_consistency_notes:
  - Se mantiene 'amigos' para φίλοι, siguiendo el uso técnico cortesano del griego y la decisión inglesa, en lugar de sustituirlo por 'cortesanos' o 'favoritos'.
  - Se usa 'exaltó' en sentido de elevación de rango u honor, coherente con la decisión inglesa y con el contexto político.
  - La estructura del verso se conserva en dos miembros coordinados por 'y', para reflejar la parataxis del griego.
