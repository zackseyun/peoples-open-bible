translation:
  language: es
  text: Toma venganza de los hijos de Israel contra los madianitas[a]. Después serás reunido a tu pueblo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Venga por los hijos de Israel contra los madianitas». Hebreo lit.: «Toma la venganza de los hijos de Israel de/contra los madianitas».'
    reason: lexical_alternative
  - marker: b
    text: «Serás reunido a tu pueblo» es un modismo hebreo para la muerte.
    reason: cultural_note
lexical_decisions:
- source_word: נְקֹם
  english_pob_choice: Take vengeance
  chosen_spanish: Venga venganza
  alternatives_spanish:
  - Toma venganza
  - Ejerce venganza
  lexicon: HALOT
  rationale: El hebreo es un imperativo directo en 2ms. En español, «Venga venganza» mantiene la fuerza mandativa sin añadir un sujeto explícito que el hebreo no expresa. «Toma venganza» también sería posible, pero suena menos natural en este registro profético/mandato divino.
- source_word: נִקְמַת
  english_pob_choice: vengeance
  chosen_spanish: venganza
  alternatives_spanish:
  - la venganza
  - el acto de venganza
  lexicon: HALOT
  rationale: El sustantivo cognado refuerza la idea del mandato. En español, el sustantivo simple «venganza» conserva esa intensidad sin necesidad de una paráfrasis más larga.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la filiación literal del hebreo. «Hijos» refleja mejor בני que «israelitas», y mantiene la identidad pactual del grupo.
- source_word: מֵאֵת הַמִּדְיָנִים
  english_pob_choice: on the Midianites
  chosen_spanish: sobre los madianitas
  alternatives_spanish:
  - contra los madianitas
  - de parte de los madianitas
  lexicon: HALOT
  rationale: Con נקם, la relación preposicional expresa el destinatario del juicio/represalia. En español, «sobre» comunica bien la dirección del acto y evita el malentendido de un origen espacial literal.
- source_word: אַחַר
  english_pob_choice: Afterward
  chosen_spanish: Después
  alternatives_spanish:
  - Luego
  - Más tarde
  lexicon: HALOT
  rationale: Adverbio temporal breve y natural en español para marcar secuencia.
- source_word: תֵּאָסֵף
  english_pob_choice: you will be gathered
  chosen_spanish: serás reunido
  alternatives_spanish:
  - serás recogido
  - serás juntado
  lexicon: HALOT
  rationale: La pasiva conserva la imagen idiomática hebrea de ser «reunido» al morir. «Serás reunido» es transparente y no reemplaza la metáfora por «morirás».
- source_word: אֶל עַמֶּיךָ
  english_pob_choice: to your people
  chosen_spanish: a tu pueblo
  alternatives_spanish:
  - con tu pueblo
  - entre tu pueblo
  lexicon: HALOT
  rationale: «A tu pueblo» reproduce la dirección del hebreo y conserva el idiomatismo de muerte sin especificar más de lo que el texto dice.
theological_decisions:
- issue: Mandato de venganza divina y su formulación en español
  english_pob_reading: Take vengeance for the sons of Israel on the Midianites.
  chosen_spanish_reading: Venga venganza de los hijos de Israel sobre los madianitas.
  alternative_spanish_readings:
  - Toma venganza de los hijos de Israel sobre los madianitas.
  - Haz justicia por los hijos de Israel contra los madianitas.
  rationale: Se preserva el lenguaje fuerte de נקם sin sustituirlo por una lectura suavizada como «haz justicia», que desplazaría el campo semántico del hebreo. La formulación mantiene la tensión ética y narrativa del pasaje.
  doctrine_reference: Preservar el peso lexical del juicio/represalia sin resolverlo en una paráfrasis moralizante.
- issue: Idioma hebreo de la muerte
  english_pob_reading: you will be gathered to your people
  chosen_spanish_reading: serás reunido a tu pueblo
  alternative_spanish_readings:
  - morirás
  - serás reunido con tus antepasados
  rationale: La traducción conserva el giro idiomático como imagen de muerte, tal como hace la POB en inglés, evitando explicar de más la posible referencia funeraria o ancestral.
  doctrine_reference: Mantener la tensión del idiomático hebreo sin definir más allá del texto.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente las notas [a] y [b] en el texto español. La redacción principal conserva el mandato imperativo y el idiomatismo de muerte sin añadir elementos no atestiguados por el hebreo.
  spanish_consistency_notes:
  - Se usó «madianitas» en minúscula por tratarse de un etnónimo en español corriente.
  - Se evitó «SEÑOR» y otras sustituciones, porque el versículo no contiene el Nombre divino.
  - Se mantuvo «hijos de Israel» para reflejar con precisión בני ישראל.
  - Se preservó el paralelismo entre mandato y secuencia temporal con un español breve y publicable.
