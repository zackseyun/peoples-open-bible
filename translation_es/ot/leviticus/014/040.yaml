translation:
  language: es
  text: Entonces el sacerdote mandará que saquen las piedras en las que está la infección[a], y las arrojen fuera de la ciudad, a un lugar impuro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las piedras que tienen la infección en ellas». La frase hebrea dice literalmente: «las piedras en las que la infección está».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצִוָּה
  english_pob_choice: then ... shall command
  chosen_spanish: Entonces ... mandará
  alternatives_spanish:
  - Y ... mandará
  - Y ... ordenará
  lexicon: HALOT
  rationale: El waw consecutivo en esta instrucción ritual marca continuación secuencial; «Entonces» expresa bien ese avance en español. «Mandará» conserva la fuerza directiva sin endurecer el registro.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el presbítero
  lexicon: HALOT
  rationale: «כֹּהֵן» en Levítico corresponde al ministro ritual; en español bíblico natural y claro, «sacerdote» comunica el oficio sin introducir una terminología eclesial extraña al texto.
- source_word: וְחִלְּצוּ
  english_pob_choice: that they remove
  chosen_spanish: que saquen
  alternatives_spanish:
  - que quiten
  - que retiren
  - que extraigan
  lexicon: HALOT
  rationale: El verbo indica sacar o remover las piedras de su lugar. «Que saquen» es idiomático en español y conserva el movimiento físico del hebreo sin sobreexplicar el procedimiento.
- source_word: הָאֲבָנִים
  english_pob_choice: the stones
  chosen_spanish: las piedras
  alternatives_spanish:
  - las piedras de la casa
  - la mampostería
  lexicon: HALOT
  rationale: La referencia es directa a piedras de construcción; «las piedras» mantiene la cercanía léxica al hebreo y basta para el contexto.
- source_word: אֲשֶׁר בָּהֵן הַנָּגַע
  english_pob_choice: in which the infection is
  chosen_spanish: en las que está la infección
  alternatives_spanish:
  - que tienen la infección
  - en las cuales está el mal
  - donde está la infección
  lexicon: HALOT
  rationale: POB mantiene la construcción relativa cercana al hebreo. «En las que está» preserva el literalismo de בָּהֵן y la localización del נֶגַע sin convertirlo en diagnóstico médico moderno.
- source_word: וְהִשְׁלִיכוּ
  english_pob_choice: and throw
  chosen_spanish: y las arrojarán
  alternatives_spanish:
  - y las echarán
  - y las tirarán
  lexicon: HALOT
  rationale: «Arrojar» conserva el valor de השליך con buena dignidad literaria; suena más adecuado que «tirar» y menos arcaico que «echar» en este contexto.
- source_word: אֶתְהֶן
  english_pob_choice: them
  chosen_spanish: las
  alternatives_spanish:
  - a ellas
  - las mismas
  lexicon: HALOT
  rationale: El pronombre retoma a «las piedras»; en español, el clítico femenino plural es la solución más natural y cohesionada.
- source_word: אֶל מִחוּץ לָעִיר
  english_pob_choice: outside the city
  chosen_spanish: fuera de la ciudad
  alternatives_spanish:
  - al exterior de la ciudad
  - afuera de la ciudad
  lexicon: HALOT
  rationale: «Fuera de la ciudad» refleja con claridad מִחוּץ לָעִיר y mantiene un registro bíblico contemporáneo y fluido.
- source_word: אֶל מָקוֹם טָמֵא
  english_pob_choice: to an unclean place
  chosen_spanish: a un lugar impuro
  alternatives_spanish:
  - a un lugar inmundo
  - a un lugar contaminado
  - a un sitio impuro
  lexicon: HALOT
  rationale: Para טָמֵא en contexto ritual, «impuro» preserva la categoría cultual y evita la connotación moral de «inmundo». «Lugar» expresa bien מָקוֹם y suena natural en español.
theological_decisions:
- issue: Término de pureza ritual para טָמֵא
  english_pob_reading: Use 'unclean' for טָמֵא and 'infection' for נֶגַע in a house context
  chosen_spanish_reading: Usar «impuro» para טָמֵא y «infección» para נֶגַע
  alternative_spanish_readings:
  - «inmundo» para טָמֵא
  - «contaminado» para טָמֵא
  - «plaga» o «mancha» para נֶגַע
  rationale: El pasaje pertenece al sistema levítico de pureza ritual, no a un diagnóstico médico moderno. «Impuro» conserva esa categoría cultual en español; «infección» sigue la decisión auditada de POB para נֶגַע sin obligar a identificar la afección como moho, lepra u otra entidad específica.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Estructura relativa de נֶגַע en las piedras
  english_pob_reading: The stones in which the infection is
  chosen_spanish_reading: «las piedras en las que está la infección» como estructura subyacente, expresada de forma natural en español
  alternative_spanish_readings:
  - «las piedras que tienen la infección»
  - «las piedras donde está la infección»
  rationale: La formulación hebrea es literalmente locativa y relativa. El español puede sonar más natural con «en las que está», pero se preserva la tensión entre literalidad y fluidez sin borrar la construcción original.
  doctrine_reference: Translation philosophy §§2, 4
translation_notes:
  revision_awareness: El contexto auditado muestra acuerdo alto (0.95) y no registra revisiones aplicadas; por eso la redacción española sigue de cerca la solución inglesa aprobada, ajustándola solo para la naturalidad y precisión del español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por norma del proyecto, aunque este versículo no lo contiene.
  - Se evita «SEÑOR» como sustituto teológico no presente en el hebreo.
  - «Sacerdote» se usa en sentido levítico, no eclesiástico.
  - «Impuro» se conserva como término ritual técnico y no moral.
  - El pronombre objeto femenino plural («las») concuerda con «las piedras».
