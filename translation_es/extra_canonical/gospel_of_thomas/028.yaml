  spanish_quality_summary: Discurso continuo bien manejado. «Hijos de la humanidad» para ⲛϣⲏⲣⲉ ⲛⲛⲣⲱⲙⲉ es genérico-inclusivo apropiado. «Ciegos en su corazón» preserva la metáfora cardíaca del original. «Cuando hayan sacudido su vino» preserva la imagen literal en lugar de aplanarla.
