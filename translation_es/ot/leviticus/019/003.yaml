translation:
  language: es
  text: Cada hombre[a] temerá a su madre y a su padre[b], y ustedes guardarán mis sábados. Yo soy Yahvé, su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cada persona». El hebreo usa una forma masculina singular distributiva para la comunidad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «reverenciará». El verbo hebreo puede denotar temor en el sentido de reverencia o asombro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: Each man
  chosen_spanish: Todo hombre
  alternatives_spanish:
  - Cada hombre
  - Cada persona
  lexicon: HALOT
  rationale: Conservo el valor distributivo del singular masculino hebreo sin neutralizarlo. 'Todo hombre' comunica la fuerza general de la norma y mantiene visible la forma masculina representativa, como en la opción inglesa 'Each man'.
- source_word: אִמּוֹ וְאָבִיו
  english_pob_choice: his mother and his father
  chosen_spanish: a su madre y a su padre
  alternatives_spanish:
  - a su madre y su padre
  - a sus padres
  lexicon: HALOT
  rationale: Mantengo el orden hebreo madre-padre y conservo los dos vínculos familiares por separado, sin reducirlos a 'padres'. La preposición repetida 'a' hace natural el español y refleja el paralelo verbal con temor/reverencia.
- source_word: תִּירָאוּ
  english_pob_choice: shall fear
  chosen_spanish: temerá
  alternatives_spanish:
  - reverenciará
  - sentirá temor reverente
  lexicon: HALOT
  rationale: '''Temer'' es el equivalente más directo y conserva la fuerza del verbo ירא. En este contexto puede implicar reverencia, pero el texto no autoriza suavizarlo en la línea principal.'
- source_word: שַׁבְּתֹתַי
  english_pob_choice: my Sabbaths
  chosen_spanish: mis sábados
  alternatives_spanish:
  - mis sábados de reposo
  - mis días de reposo
  lexicon: HALOT
  rationale: El hebreo usa plural y posesivo divino. 'Sábados' conserva la pluralidad explícita; aunque en español bíblico tradicional suele decirse 'reposos' o 'sábados', aquí se mantiene una forma transparente y fiel al sustantivo plural.
- source_word: תִּשְׁמֹרוּ
  english_pob_choice: you shall keep
  chosen_spanish: guardarán
  alternatives_spanish:
  - observarán
  - mantendrán
  lexicon: HALOT
  rationale: '''Guardar'' reproduce bien שׁמר en su sentido de custodiar/observar preceptos. Dado que el sujeto distributivo inicial sigue funcionando en español, la forma plural verbal expresa la instrucción comunitaria sin perder el paralelismo con el hebreo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: La política española del proyecto prefiere 'Yahvé' para el Tetragrámaton. Mantiene el nombre propio divino y evita sustituirlo por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - vuestro Dios
  - tu Dios
  lexicon: HALOT
  rationale: En español bíblico de registro amplio, 'su Dios' puede referirse a un colectivo al que se habla. Evita el tuteo/voseo regional y conserva el sentido de pacto comunitario del posesivo plural hebreo.
theological_decisions:
- issue: Fuerza afectiva de ירא aplicado a los padres
  english_pob_reading: fear his mother and his father
  chosen_spanish_reading: temerá a su madre y a su padre
  alternative_spanish_readings:
  - reverenciará a su madre y a su padre
  - mostrará reverencia a su madre y a su padre
  rationale: Mantengo 'temerá' como equivalente principal porque el verbo hebreo puede expresar temor, reverencia o asombro, y el audit trail inglés preserva 'fear' en la línea principal. En una nota se puede aclarar la opción reverencial sin borrar la tensión lexical.
  doctrine_reference: Translation philosophy §§1, 4, 5
- issue: Representación del singular masculino distributivo
  english_pob_reading: Each man
  chosen_spanish_reading: Todo hombre
  alternative_spanish_readings:
  - Cada hombre
  - Cada persona
  rationale: Sigo la decisión inglesa de conservar la forma masculina singular distributiva del hebreo אִישׁ. No neutralizo a 'cada persona' en el texto principal para no ocultar la forma fuente.
  doctrine_reference: Translation philosophy §4
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo nombra directamente a Yahvé, y la política del proyecto exige transliteración del nombre divino en vez de sustitución por título. Esto preserva el valor de pacto del cierre formulístico.
  doctrine_reference: Translation philosophy §§1, 4, 5
translation_notes:
  revision_awareness: El paquete fuente no registra revisiones textuales en esta unidad; el audit trail inglés también indica que no hubo cambios en la última pasada. Por eso la propuesta sigue de cerca el hebreo y las decisiones léxicas ya establecidas, sin introducir variantes no documentadas.
  spanish_consistency_notes:
  - Conservo 'Yahvé' como forma española del nombre divino, coherente con el estándar del proyecto.
  - Uso 'temer' y no 'reverenciar' en la línea principal para no debilitar la tensión léxica del verbo ירא.
  - Mantengo el plural 'sábados' para reflejar שׁבתותַי.
  - Evito 'SEÑOR' como sustituto del nombre divino, conforme a la política del proyecto.
  - '''Su Dios'' funciona como posesivo comunitario y evita regionalismos en el español bíblico.'
