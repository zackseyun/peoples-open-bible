translation:
  language: es
  text: un plato[a] de oro, de diez siclos, lleno de incienso;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: ''un plato de oro, diez, lleno de incienso''; se entiende ''siclos'' por la fórmula repetida de la ofrenda en el contexto inmediato.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּף
  english_pob_choice: dish
  chosen_spanish: palangana
  alternatives_spanish:
  - plato
  - vasija
  - recipiente
  lexicon: HALOT
  rationale: En contextos cultuales, כַּף designa un recipiente pequeño para ofrenda. 'Palangana' comunica mejor la idea de una vasija ritual que 'plato' o 'recipiente' genérico, sin sugerir cubertería doméstica como podría hacerlo 'cuchara' en español.
- source_word: אַחַת
  english_pob_choice: one
  chosen_spanish: una
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: Concuerda en género con el sustantivo femenino implícito y expresa el numeral cardinal de forma natural en español.
- source_word: עֲשָׂרָה
  english_pob_choice: ten shekels
  chosen_spanish: de diez siclos
  alternatives_spanish:
  - diez
  - con peso de diez siclos
  lexicon: HALOT
  rationale: 'El texto hebreo omite el sustantivo ''siclos'', pero el contexto inmediato de la lista de ofrendas lo suministra. En español, la lectura natural y fiel es explicitar la medida como peso: ''de diez siclos''.'
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - de oro fino
  - dorada
  lexicon: HALOT
  rationale: En español bíblico y contemporáneo, el genitivo material se expresa mejor con 'de oro'. 'Dorada' podría sonar adjetival y menos precisa para un objeto de material precioso.
- source_word: מְלֵאָה
  english_pob_choice: full of
  chosen_spanish: llena de
  alternatives_spanish:
  - colmada de
  - rebosante de
  lexicon: HALOT
  rationale: '''Llena de'' reproduce de manera directa el predicado de plenitud aplicado al recipiente. Es claro y sobrio, sin añadir intensidad que el hebreo no exige.'
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - perfume
  - sahumerio
  lexicon: HALOT
  rationale: '''Incienso'' es el término estándar y más preciso para la sustancia aromática cultual indicada por קְטֹרֶת. ''Perfume'' sería demasiado general y ''sahumerio'' más regional o menos técnico.'
translation_notes:
  revision_awareness: La versión inglesa POB mantiene una equivalencia óptima y explicita 'ten shekels' por claridad; el español conserva esa decisión contextual y traduce el recipiente cultual con un término natural, evitando una transliteración o una palabra que sugiera utensilio doméstico.
  spanish_consistency_notes:
  - Se mantiene 'incienso' para קְטֹרֶת, conforme al uso cultual estándar.
  - Se explicita la medida como 'siclos' por el contexto, igual que en la POB inglesa.
  - No se usa 'SEÑOR' ni terminología cristianizada, porque este versículo es inventario ofrendal sin referencia divina explícita.
