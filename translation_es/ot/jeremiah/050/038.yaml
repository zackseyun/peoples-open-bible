base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/050/038.yaml
  text: A drought is against her waters[a], and they will dry up, for it is a land of carved idols[b], and they are mad over terrifying things.
  footnotes:
  - marker: a
    text: Or, 'A drought is against her waters, and they will dry up.' The Hebrew חֹרֶב can mean 'sword' or 'drought/dryness,' and the verse may intentionally echo both ideas.
    reason: alternative_reading
  - marker: b
    text: Or, 'they act mad over terrors' / 'they rave over dreadful idols.'
    reason: lexical_alternative
