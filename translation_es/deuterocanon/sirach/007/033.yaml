review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo principal: «También» refleja וְגַם; «al pobre» representa adecuadamente לְאֶבְיוֹן; «extiende tu mano» preserva la imagen de הוֹשִׁיט יָד; y «para que tu bendición se complete» transmite correctamente la finalidad y el matiz de plenitud de לְמַעַן תִּשְׁלַם בִּרְכָתֶךָ. También mantiene correctamente la nota sobre la divergencia griega. Sin embargo, la formulación principal puede sonar algo mecánica en español, y la nota griega necesita un ajuste menor para mayor naturalidad y precisión idiomática.'
  spanish_quality_summary: La redacción es comprensible y bastante fiel, pero «extiende tu mano» y sobre todo «tu bendición se complete» suenan algo calcados. Una mejora pequeña a «tiende tu mano» y «tu bendición llegue a plenitud» conserva el sentido hebreo con mejor español bíblico moderno. En la nota, «ni al muerto» conviene ajustarse a «ni siquiera al muerto» para reflejar mejor el énfasis del inglés/ griego y sonar más natural.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Bendición» preserva bien la ambigüedad documentada de בִּרְכָתֶךָ. La decisión de seguir el hebreo principal y relegar el griego a nota está bien aplicada.
  issues:
  - severity: medium
    issue: La frase «para que tu bendición se complete» suena poco idiomática en español.
    rationale: Aunque es fiel al léxico inglés auditado, en español la construcción resulta algo rígida. «Llegue a plenitud» o «sea completa» comunica mejor la idea de שלם sin introducir retribución.
  - severity: low
    issue: «Extiende tu mano» es correcto, pero ligeramente tieso en este contexto exhortativo.
    rationale: «Tiende tu mano» mantiene la imagen corporal hebrea y suele sonar más natural en español eclesial y literario.
  - severity: low
    issue: La nota al pie griega puede mejorarse en naturalidad.
    rationale: «Y no niegues bondad ni al muerto» es entendible, pero «y no niegues bondad ni siquiera al muerto» expresa mejor el alcance enfático del paralelo griego.
  revised_spanish_text: También tiende tu mano al pobre[a], para que tu bendición llegue a plenitud.
  revised_footnotes:
