translation:
  language: es
  text: Los pueblos los tomarán y los llevarán a su lugar; y la casa de Israel los poseerá[a] en la tierra de Yahvé[b] como esclavos y esclavas[c]. Tomarán cautivos a los que los cautivaron[d], y dominarán sobre sus opresores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los heredará’; el verbo hebreo puede llevar también el sentido de heredar o recibir como posesión.
    reason: lexical_alternative
  - marker: b
    text: ‘Yahvé’ traduce el nombre divino YHWH.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ‘como esclavos varones y esclavas’; el texto marca explícitamente ambos géneros.'
    reason: lexical_alternative
  - marker: d
    text: El hebreo emplea un juego de palabras con la misma raíz para ‘tomar cautivo/cautivar’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְקָחוּם
  english_pob_choice: Peoples will take them
  chosen_spanish: Los pueblos los tomarán
  alternatives_spanish:
  - Las naciones los tomarán
  - Los pueblos los recibirán
  lexicon: HALOT
  rationale: לקח en qal significa normalmente ‘tomar’. ‘Los pueblos’ conserva el plural colectivo del hebreo y ‘tomarán’ expresa bien el futuro profético sin añadir interpretación.
- source_word: עַמִּים
  english_pob_choice: Peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos
  lexicon: HALOT
  rationale: עַמִּים designa pueblos/naciones. ‘Pueblos’ mantiene el matiz étnico-colectivo y evita precisar indebidamente una entidad política moderna.
- source_word: וֶהֱבִיאוּם אֶל מְקוֹמָם
  english_pob_choice: and bring them to their place
  chosen_spanish: y los llevarán a su lugar
  alternatives_spanish:
  - y los conducirán a su lugar
  - y los llevarán a su propio lugar
  lexicon: HALOT
  rationale: הביא es ‘traer/llevar’. ‘Llevarán a su lugar’ suena natural en español y conserva la idea de restitución al lugar propio de Israel.
- source_word: וְהִתְנַחֲלוּם
  english_pob_choice: will possess them
  chosen_spanish: los poseerá
  alternatives_spanish:
  - los heredará
  - tomará posesión de ellos
  lexicon: HALOT
  rationale: El hitpael de נחל aquí expresa posesión/adquisición como herencia. ‘Poseerá’ es más directo que una perífrasis y mantiene la fuerza del verbo.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: La construcción nominal es una designación colectiva estable. ‘La casa de Israel’ conserva el lenguaje pactual del hebreo.
- source_word: עַל אַדְמַת יְהוָה
  english_pob_choice: on the land of Yahweh
  chosen_spanish: en la tierra de Yahvé
  alternatives_spanish:
  - sobre la tierra de Yahvé
  - en la tierra de Yahweh
  lexicon: HALOT
  rationale: אַדְמָה es ‘tierra/terreno’. En español, ‘en la tierra de Yahvé’ comunica naturalmente la ubicación y conserva la afirmación teológica de pertenencia a Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el nombre divino en el texto principal: ‘Yahvé’, como transliteración directa del Tetragrámaton, evitando la sustitución por un título.'
- source_word: לַעֲבָדִים וְלִשְׁפָחוֹת
  english_pob_choice: as male slaves and female slaves
  chosen_spanish: como esclavos varones y esclavas mujeres
  alternatives_spanish:
  - como siervos y siervas
  - como esclavos y esclavas
  lexicon: HALOT
  rationale: עבדים y שפחות nombran estatus de esclavitud/bondaje. ‘Esclavos varones y esclavas mujeres’ preserva la distinción de género y la fuerza social del término sin suavizarla a ‘siervos’.
- source_word: וְהָיוּ שֹׁבִים לְשֹׁבֵיהֶם
  english_pob_choice: They will take captive those who took them captive
  chosen_spanish: Tomarán cautivos a los que los cautivaron
  alternatives_spanish:
  - Capturarán a los que los capturaron
  - Tomarán cautivos a sus cautivadores
  lexicon: HALOT
  rationale: La frase hebrea juega con la misma raíz שבה. ‘Tomarán cautivos a los que los cautivaron’ refleja con claridad esa inversión y mantiene el paralelismo verbal sin forzar una perífrasis más abstracta.
- source_word: וְרָדוּ בְּנֹגְשֵׂיהֶם
  english_pob_choice: and they will rule over their oppressors
  chosen_spanish: y dominarán sobre sus opresores
  alternatives_spanish:
  - y gobernarán sobre sus opresores
  - y tendrán dominio sobre sus opresores
  lexicon: HALOT
  rationale: רדה expresa ‘dominar/gobernar’. נגשׂ puede referirse a opresores o capataces; ‘opresores’ es suficientemente amplio y fiel al contexto de reversión de la opresión.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El verso contiene el Tetragrámaton. Conforme a la convención del proyecto, se preserva el nombre propio divino en español como ‘Yahvé’, en vez de sustituirlo por un título reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה/YHWH → Yahvé'
- issue: Lenguaje de esclavitud en la reversión profética
  english_pob_reading: as male slaves and female slaves
  chosen_spanish_reading: como esclavos varones y esclavas mujeres
  alternative_spanish_readings:
  - como siervos y siervas
  - como esclavos y esclavas
  rationale: El hebreo nombra explícitamente la condición servil y la diferencia de género. Se conserva esa fuerza semántica sin eufemizarla, porque el texto describe una reversión social concreta y no una mera subordinación genérica.
  doctrine_reference: Translation philosophy §1, §5; Contested terms table on δοῦλος/slave-servant principle applied analogically to bonded-status language
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés: se adoptó ‘poseerá’ como forma más directa que ‘tomará posesión de’, y se reflejó el hebreo con la construcción activa ‘Tomarán cautivos a los que los cautivaron’ en lugar de una paráfrasis más interpretativa. Se mantuvo la decisión de traducir יְהוָה como ‘Yahvé’ y de conservar el lenguaje fuerte de esclavitud.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ para el Tetragrámaton, conforme a la terminología del proyecto.
  - Se conservó ‘los pueblos’ para עַמִּים por su valor colectivo plural.
  - ‘Esclavos varones y esclavas mujeres’ preserva la distinción de género del hebreo.
  - La nota [a] cubre la alternativa léxica principal de נחל; la nota [c] cubre el juego de palabras de שבה sin duplicar marcadores.
