  timestamp: '2026-05-07T23:11:30Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura general del hebreo con apoyo del griego: David confirió magnificencia a las fiestas año tras año, y la alabanza del nombre santo se asocia con un sonido cultual temprano. Sin embargo, no sigue fielmente el estado auditado más reciente del English POB en dos puntos relevantes: el anclaje de la nota está puesto sobre la tríada de magnificencia, cuando la nota trata de la cláusula final difícil; y el texto español mantiene «santuario» donde la revisión inglesa vigente optó por «court» para reflejar mejor el hebreo difícil משפט junto con לפני בקר como «before morning».'
  spanish_quality_summary: El español es claro, natural y de registro digno. No obstante, «antes de la mañana» suena poco idiomático en español bíblico moderno; «antes del amanecer» o «de madrugada» sería más natural si se siguiera la línea hebrea, y «resonaba el santuario» entra en tensión con la revisión inglesa auditada. Además, la nota al pie está mal ubicada en el texto.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «santo nombre» es adecuado; no aparece Yahvé ni otros términos sensibles del glosario. La decisión entre «santuario» y «atrio/corte» no es de glosario general sino de alineación textual con la evidencia y el audit trail.
  issues:
  - severity: high
    issue: La nota textual [a] está anclada a «gloria» en vez de a la cláusula final difícil.
    rationale: La nota explica la dificultad del final del verso en hebreo y el apoyo del griego para «el santuario resonaba». Debe aparecer en la frase final, no en la lista «esplendor, belleza y gloria».
  - severity: high
    issue: «resonaba el santuario» no refleja la revisión inglesa auditada más reciente, que cambió a «the court resounded».
    rationale: Aunque el griego apoya «santuario», el audit trail aplicado explícitamente revisó la línea para reflejar mejor לפני בקר y משפט. La revisión española debe preservar esa decisión documentada, idealmente con una nota que explique la alternativa griega.
  - severity: medium
    issue: «antes de la mañana» es poco natural en español.
    rationale: Es un calco cercano pero suena forzado. «antes del amanecer» comunica mejor la referencia temporal temprana y sigue siendo compatible con la decisión inglesa «before morning».
  - severity: low
    issue: Falta reflejar en nota la alternativa léxica de la tríada hebrea si se desea conservar la lógica del audit trail inglés.
    rationale: El English POB tiene una nota b sobre la alternativa más literal «majesty, beauty, and honor». No es estrictamente obligatoria, pero puede preservarse para mayor fidelidad auditiva del expediente.
  revised_spanish_text: Él dio esplendor, belleza y gloria a las fiestas, año tras año; cuando alababan su santo nombre, antes del amanecer resonaba el atrio[a].
  revised_footnotes:
