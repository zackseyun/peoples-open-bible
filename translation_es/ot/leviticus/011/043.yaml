translation:
  language: es
  text: No se hagan ustedes detestables[a] por ningún ser que pulula, y no se hagan impuros por ellos, para que no lleguen a ser impuros por ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por ninguna criatura pululante'. El hebreo se refiere a la clase de criaturas pequeñas que pululan o se mueven en gran número; la formulación tradicional 'cosa/animal que se arrastra' puede sonar demasiado estrecha.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּשַׁקְּצוּ
  english_pob_choice: make yourselves detestable
  chosen_spanish: se hagan ustedes detestables
  alternatives_spanish:
  - se vuelvan detestables
  - se hagan abominables
  - se hagan repugnantes
  lexicon: HALOT
  rationale: La raíz expresa tratarse o volverse detestable; el objeto reflexivo está implícito en el hebreo. 'Detestables' conserva el valor lexical sin confundirlo con טמא ('impuro') que aparece después.
- source_word: נַפְשֹׁתֵיכֶם
  english_pob_choice: yourselves
  chosen_spanish: ustedes
  alternatives_spanish:
  - sus vidas
  - sus almas
  - ustedes mismos
  lexicon: HALOT
  rationale: נפש aquí funciona como 'vida/persona/yo mismo' en una construcción reflexiva. En español, 'ustedes' o 'ustedes mismos' comunica mejor la referencia a la persona completa que 'almas', que sería demasiado estrecho.
- source_word: בְּכָל הַשֶּׁרֶץ הַשֹּׁרֵץ
  english_pob_choice: by any swarming thing that swarms
  chosen_spanish: por ningún animal que se arrastra y se multiplica
  alternatives_spanish:
  - por ningún ser que se agolpa
  - por ninguna cosa que se arrastra y pulula
  - por ninguna criatura que se arrastra y se multiplica
  lexicon: HALOT
  rationale: El hebreo usa un juego de palabras con el verbo y el sustantivo de la misma raíz para la clase de seres que pululan. Opto por una frase natural en español que preserve la idea de movimiento abundante y el matiz de criaturas pequeñas, sin forzar el calco 'se arrastra' donde el término tradicional 'creeping thing' puede sugerir solo reptación.
- source_word: תִטַּמְּאוּ
  english_pob_choice: make yourselves unclean
  chosen_spanish: se hagan impuros
  alternatives_spanish:
  - se contaminen
  - se vuelvan impuros
  - se hagan inmundos
  lexicon: HALOT
  rationale: En Levítico, טמא designa impureza ritual dentro del marco de santidad. 'Impuros' es el equivalente más claro y no moraliza el término; 'contaminen' suena más causal pero menos fiel al registro ritual del pasaje.
- source_word: בָּהֶם
  english_pob_choice: by them
  chosen_spanish: por ellos
  alternatives_spanish:
  - a causa de ellos
  - mediante ellos
  - por medio de ellos
  lexicon: HALOT
  rationale: La preposición marca medio o instrumento. 'Por ellos' es breve y natural en español, y mantiene la idea de que estas criaturas son el medio por el cual ocurre la impureza.
- source_word: וְנִטְמֵתֶם
  english_pob_choice: so that you do not become unclean
  chosen_spanish: para que no lleguen a ser impuros
  alternatives_spanish:
  - y no se hagan impuros
  - de modo que no queden impuros
  - para que no se contaminen
  lexicon: HALOT
  rationale: La revisión inglesa prefirió una relación de resultado/propósito más que una simple advertencia. 'Para que no lleguen a ser impuros' expresa bien esa relación en español y mantiene el enlace con el verbo repetido de impureza.
- source_word: בָּם
  english_pob_choice: by them
  chosen_spanish: por ellos
  alternatives_spanish:
  - a causa de ellos
  - mediante ellos
  - por medio de ellos
  lexicon: HALOT
  rationale: Se conserva el mismo valor instrumental y la repetición enfática del hebreo.
theological_decisions:
- issue: Diferencia entre 'detestable' y 'impuro' en la legislación de santidad
  english_pob_reading: Do not make yourselves detestable... and do not make yourselves unclean... so that you do not become unclean...
  chosen_spanish_reading: No se hagan ustedes detestables... y no se hagan impuros... para que no lleguen a ser impuros...
  alternative_spanish_readings:
  - No se hagan abominables...
  - No se contaminen...
  - No se vuelvan inmundos...
  rationale: 'Conviene mantener separadas las dos categorías: primero una acción que vuelve al sujeto ''detestable'' y luego la impureza ritual. Traducir ambas con el mismo verbo borraría una distinción semántica importante del hebreo y de la lectura POB.'
  doctrine_reference: Levítico 11; distinción léxica entre שׁקץ y טמא en legislación ritual.
- issue: Impureza ritual, no culpa moral generalizada
  english_pob_reading: unclean
  chosen_spanish_reading: impuros
  alternative_spanish_readings:
  - inmundos
  - defi­les
  - contaminados
  rationale: '''Impuro'' en contexto levítico comunica mejor la categoría ritual/covenantal sin convertirla automáticamente en culpa moral. ''Inmundo'' es posible, pero en español moderno puede sonar más duro o peyorativo.'
  doctrine_reference: Levítico 11; santidad ritual y pureza cultual.
translation_notes:
  revision_awareness: La redacción sigue el cierre revisado del inglés POB, que cambió una advertencia con 'lest' por una relación más directa de resultado/propósito ('so that you do not'). En español se refleja con 'para que no lleguen a ser impuros', manteniendo la secuencia de prohibición y resultado. También se preserva la distinción revisada entre 'detestable' y 'impuro'.
  spanish_consistency_notes:
  - Se usa 'impuro' para טמא en coherencia con el vocabulario levítico y con la preferencia POB por no moralizar el término.
  - Se evita 'SEÑOR' porque este versículo no contiene el nombre divino.
  - Se conserva 'por ellos' para el valor instrumental repetido de בם y בהם.
  - El marcador [a] aparece en el punto de anclaje correspondiente dentro del texto español.
