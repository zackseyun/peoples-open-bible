translation:
  language: es
  text: En vano es para ustedes madrugar, quedarse levantados hasta tarde, comer el pan de fatiga; porque él da sueño a su amado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque así da a su amado en el sueño», o «porque da a su amado mientras duerme». El hebreo es compacto y puede entenderse o bien que Dios da el sueño mismo, o bien que concede sus dones aun durante el sueño.'
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁוְא
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - en vanidad
  - por nada
  lexicon: HALOT
  rationale: ‘En vano’ reproduce bien la idea de futility e inutilidad que el hebreo expresa en este contexto de esfuerzo humano sin provecho.
- source_word: מַשְׁכִּימֵי קוּם
  english_pob_choice: to rise early
  chosen_spanish: madrugar
  alternatives_spanish:
  - levantarse temprano
  - alzarse temprano
  lexicon: HALOT
  rationale: En español, ‘madrugar’ es la forma más natural y concisa de expresar la acción de levantarse muy temprano, manteniendo el paralelo con la siguiente expresión.
- source_word: מְאַחֲרֵי שֶׁבֶת
  english_pob_choice: to sit up late
  chosen_spanish: tardarse en sentarse
  alternatives_spanish:
  - quedarse levantados hasta tarde
  - sentarse hasta tarde
  lexicon: HALOT
  rationale: La imagen hebrea contrasta con madrugar y conserva el verbo de ‘sentarse’. ‘Tardarse en sentarse’ intenta reflejar la construcción verbal sin borrar la metáfora, aunque suene menos idiomática que otras opciones.
- source_word: אֹכְלֵי לֶחֶם הָעֲצָבִים
  english_pob_choice: eating the bread of toil
  chosen_spanish: comer el pan del trabajo
  alternatives_spanish:
  - comer el pan de afanes
  - comer el pan de la fatiga
  - comer el pan de la pena
  lexicon: HALOT
  rationale: ‘Trabajo’ comunica el sentido de esfuerzo penoso o labor fatigosa sin cargar de más la expresión hebrea עֲצָבִים. ‘Pan del trabajo’ conserva la metáfora de sustento ganado con esfuerzo.
- source_word: כֵּן
  english_pob_choice: for
  chosen_spanish: pues así
  alternatives_spanish:
  - así
  - porque así
  - de este modo
  lexicon: HALOT
  rationale: ‘Pues así’ preserva la relación explicativa de la partícula y permite una conexión natural con la cláusula anterior en español.
- source_word: יִתֵּן
  english_pob_choice: he gives
  chosen_spanish: da
  alternatives_spanish:
  - otorga
  - concede
  lexicon: HALOT
  rationale: El presente gnómico en español queda bien con ‘da’. El sujeto implícito se entiende por el contexto del salmo.
- source_word: לִידִידוֹ
  english_pob_choice: to his beloved
  chosen_spanish: a su amado
  alternatives_spanish:
  - a su amado íntimo
  - al que ama
  lexicon: HALOT
  rationale: ‘Amado’ preserva el matiz afectivo y singular del hebreo, y es una forma natural y reverente en español.
- source_word: שֵׁנָא
  english_pob_choice: sleep
  chosen_spanish: el sueño
  alternatives_spanish:
  - sueño
  - descanso
  lexicon: HALOT
  rationale: ‘El sueño’ es la manera más directa de traducir el sustantivo. En español, el artículo ayuda a que la frase fluya con naturalidad.
theological_decisions:
- issue: Interpretación de כֵּן יִתֵּן לִידִידוֹ שֵׁנָא
  english_pob_reading: for he gives sleep to his beloved
  chosen_spanish_reading: pues así da a su amado el sueño
  alternative_spanish_readings:
  - pues así da a su amado en el sueño
  - pues así da a su amado mientras duerme
  rationale: 'El hebreo es comprimido y permite más de una lectura. La redacción principal adopta la comprensión más natural: Dios concede el sueño como don. Se conserva una nota para no borrar la ambigüedad del original, en línea con el criterio de mantener la tensión textual.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El cotejo más reciente indica alta concordancia con la fuente y no registra cambios de revisión; por eso se mantiene una solución principal clara, pero con nota de ambigüedad para la cláusula final comprimida.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ no aplicable aquí porque el versículo usa un sujeto implícito, no el Tetragrámaton explícito.
  - ‘Amado’ conserva el tono afectivo del singular hebreo sin convertirlo en una expresión litúrgica más cargada.
  - ‘Pan del trabajo’ retiene la metáfora alimentaria y el matiz de esfuerzo, evitando explicar de más el hebreo.
  - La nota final preserva la tensión interpretativa del original sin resolverla de forma dogmática.
