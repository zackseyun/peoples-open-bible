translation:
  language: es
  text: 'Los hombres le dijeron: «Nuestras vidas por la tuya, hasta la muerte, si no cuentas este asunto nuestro. Y cuando Yahvé nos dé la tierra, te trataremos con bondad y fidelidad[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te trataremos con lealtad y verdad». La expresión hebrea חֶסֶד וֶאֱמֶת suele denotar un compromiso leal y confiable.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - los hombres [los espías]
  lexicon: HALOT
  rationale: El hebreo dice simplemente “los hombres”; en español, “los hombres” comunica de forma natural sin añadir la identificación interpretativa de “los espías” al cuerpo principal.
- source_word: נַפְשֵׁנוּ תַחְתֵּיכֶם לָמוּת
  english_pob_choice: Our lives for yours, even to death
  chosen_spanish: Nuestras vidas por las de ustedes, hasta la muerte
  alternatives_spanish:
  - Nuestra vida en lugar de la de ustedes, hasta morir
  - Nuestras vidas en lugar de las suyas, hasta la muerte
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí expresa “vida” en contexto de riesgo mortal; תַּחַת marca sustitución. La formulación española conserva el valor de intercambio/substitución y el tono de juramento sin sonar forzada.
- source_word: אִם לֹא תַגִּידוּ אֶת דְּבָרֵנוּ זֶה
  english_pob_choice: if you do not tell this matter of ours
  chosen_spanish: si no dicen este asunto nuestro
  alternatives_spanish:
  - si no dicen esta cosa nuestra
  - si no revelan este asunto nuestro
  - si no cuentan este asunto nuestro
  lexicon: HALOT
  rationale: דָּבָר puede ser “palabra”, “asunto” o “materia”. Aquí se refiere a la cuestión/encargo de los espías, y “asunto” mantiene amplitud sin sobreespecificar. Se mantiene el plural del verbo como en el hebreo y como en la POB inglesa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el nombre divino: “Yahvé”, que preserva el Tetragrámaton sin ocultarlo con una convención tipográfica.'
- source_word: בְּתֵת יְהוָה לָנוּ אֶת הָאָרֶץ
  english_pob_choice: when Yahweh gives us the land
  chosen_spanish: Y cuando Yahvé nos dé la tierra
  alternatives_spanish:
  - Y cuando Yahvé haya dado la tierra a nosotros
  - Y cuando Yahvé nos entregue la tierra
  lexicon: HALOT
  rationale: 'El infinitivo constructo con ב expresa circunstancia temporal: “cuando”. “Nos dé la tierra” es la equivalencia española más clara y fiel.'
- source_word: וְעָשִׂינוּ עִמָּךְ
  english_pob_choice: we will deal kindly and faithfully with you
  chosen_spanish: actuaremos con ustedes con lealtad y verdad
  alternatives_spanish:
  - obraremos con ustedes con bondad y fidelidad
  - les mostraremos lealtad y verdad
  - actuaremos con ustedes con misericordia y verdad
  lexicon: HALOT
  rationale: עָשָׂה עִם puede significar “tratar/obrar con”. “Actuaremos con” es natural en español y conserva la idea de una conducta comprometida hacia ellas.
- source_word: חֶסֶד וֶאֱמֶת
  english_pob_choice: kindly and faithfully
  chosen_spanish: lealtad y verdad
  alternatives_spanish:
  - bondad y fidelidad
  - lealtad fiel y verdad
  - amor leal y verdad
  lexicon: HALOT
  rationale: La pareja חֶסֶד וֶאֱמֶת tiene peso de compromiso relacional fiable. “Lealtad y verdad” conserva la idea de fidelidad vinculante y evita reducir חֶסֶד a mera amabilidad. Se deja abierta la resonancia de pacto sin imponer una formulación demasiado técnica.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La decisión mantiene visible el nombre del pacto y sigue el estándar del proyecto para el Tetragrámaton, en lugar de ocultarlo con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza teológica de חֶסֶד וֶאֱמֶת
  english_pob_reading: deal kindly and faithfully with you
  chosen_spanish_reading: actuaremos con ustedes con lealtad y verdad
  alternative_spanish_readings:
  - obraremos con ustedes con bondad y fidelidad
  - les mostraremos misericordia y verdad
  - les mostraremos amor leal y verdad
  rationale: La expresión hebrea comunica compromiso fiable y relacional, no solo cortesía. “Lealtad y verdad” preserva ese peso sin perder fluidez en español. Se evita resolver de forma dogmática una sola glosa cuando el hebreo admite varias cercanas.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'La POB inglesa revisó una redacción más técnica (“covenant faithfulness and truth”) a una formulación más natural (“deal kindly and faithfully with you”) sin abandonar el sentido de חֶסֶד וֶאֱמֶת. Esta versión española sigue la misma línea: conserva el valor de lealtad/fidelidad del hebreo, pero lo expresa con un español fluido y publicable.'
  spanish_consistency_notes:
  - Se usa “Yahvé” para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene el paralelismo del juramento con “Nuestras vidas por las de ustedes”.
  - “Asunto” traduce דָּבָר con amplitud semántica, evitando especificar de más.
  - “Lealtad y verdad” conserva la dupla חֶסֶד וֶאֱמֶת sin volverla una fórmula eclesiástica fija.
  - El plural de tratamiento en “ustedes” refleja el verbo hebreo plural y funciona bien en español neutral.
