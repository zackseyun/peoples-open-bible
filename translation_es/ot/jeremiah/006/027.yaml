    rationale: El hebreo, en la lectura seguida por el POB, designa a Jeremías como quien prueba/examina. «Crisol» es el recipiente o instrumento, no la persona probadora. Esto altera el sentido y se aleja de la decisión auditada «a tester».
  - severity: medium
    issue: La nota [a] defiende una opción no alineada con la decisión inglesa documentada
    rationale: La auditoría inglesa preserva «assayer» como alternativa especializada, no un equivalente de «crisol». La nota española debería reflejar mejor «ensayador» o «examinador» como alternativas léxicas personales.
  - severity: low
    issue: Falta la alternativa documentada para «su camino»
    rationale: El inglés POB adjunta nota a «their way» con alternativas «conduct» o «manner of life». En español conviene conservar esa aclaración, especialmente porque «camino» puede sonar demasiado literal.
