  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura exhortativa y la imaginería del griego: πρόσεχε, ὀλισθήσῃς, πέσῃς, κατέναντι ἐνεδρεύοντος están sustancialmente bien representados. Sin embargo, ἐν αὐτῇ es femenino singular y el inglés auditado conserva explícitamente «in it» con nota sobre el antecedente femenino contextual. El español «en ello» cambia el género y suena menos natural en este contexto; conviene mantener «en ella» con nota aclaratoria.'
  spanish_quality_summary: El texto es claro y legible, pero «Presta atención» enfatiza más percepción que cautela; «Ten cuidado» suena más natural y más cercano al valor admonitorio de πρόσεχε. Además, la repetición de «para que no» en ambas cláusulas es posible, pero «no sea que» reproduce mejor el matiz de advertencia de μὴ πῶς y fluye con mayor naturalidad bíblica en español. «Uno que está al acecho» es entendible, aunque «alguien que está al acecho» evita el uso algo tosco de «uno».
  glossary_alignment: 'No hay términos del glosario maestro especialmente implicados aquí. La principal cuestión terminológica es la fidelidad pronominal: debe preservarse el referente femenino contextual de αὐτῇ en español mediante «ella» y una nota, en lugar de neutralizarlo con «ello».'
  issues:
  - severity: medium
    issue: «en ello» no preserva el femenino de ἐν αὐτῇ
    rationale: El griego usa pronombre femenino singular, y la nota inglesa auditada destaca precisamente que el antecedente femenino proviene del contexto. «Ello» neutraliza ese dato y suena menos idiomático.
  - severity: low
    issue: «Presta atención» es menos preciso que «Ten cuidado» para πρόσεχε
    rationale: Aunque aceptable, «Presta atención» enfatiza atención mental; aquí el imperativo advierte cautela ante peligro o tropiezo.
  - severity: low
    issue: «para que no» en ambas cláusulas suaviza el valor de advertencia de μὴ πῶς
    rationale: «No sea que» reproduce mejor la prevención cautelar del griego y evita una lectura demasiado final de propósito.
  - severity: low
    issue: «uno que está al acecho» suena algo rígido
    rationale: «Alguien que está al acecho» o «quien está al acecho» resulta más natural en español general sin perder el sentido participial.
  revised_spanish_text: Ten cuidado, no sea que resbales en ella[a], no sea que caigas delante de alguien que está al acecho.
