translation:
  language: es
  text: y la cigüeña, la garza[a] según su clase[c], y la abubilla[b], y el murciélago.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «ibis» u otra ave zancuda de patas largas; la identificación precisa del término hebreo es incierta.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, «avefría»; es más probable que el término hebreo se refiera a la abubilla.
    reason: alternative_reading
  - marker: c
    text: La frase «según su clase» indica variedades relacionadas dentro del mismo tipo general de ave.
    reason: cultural_note
lexical_decisions:
- source_word: חֲסִידָה
  english_pob_choice: stork
  chosen_spanish: cigüeña
  alternatives_spanish:
  - garza
  - estornino
  lexicon: HALOT, BDB
  rationale: El hebreo nombra un ave específica de la lista de animales impuros. En español, "cigüeña" es el equivalente más natural y reconocido para el término tradicionalmente identificado como stork, manteniendo una denominación concreta de ave sin sobreexplicar.
- source_word: אֲנָפָה
  english_pob_choice: heron
  chosen_spanish: garza
  alternatives_spanish:
  - ibis
  - ave zancuda
  lexicon: HALOT, BDB
  rationale: La identificación zoológica exacta es incierta, pero la POB en inglés opta por "heron" como equivalente convencional. En español, "garza" comunica bien ese mismo campo semántico de ave zancuda y evita un término demasiado técnico o dudoso.
- source_word: לְמִינָהּ
  english_pob_choice: according to its kind
  chosen_spanish: según su clase
  alternatives_spanish:
  - según su especie
  - según su género
  lexicon: HALOT, BDB
  rationale: La frase expresa clasificación dentro de un tipo general. "Según su clase" preserva la idea formal en español con fluidez natural; "especie" sería posible, pero puede sonar más técnico que el uso bíblico pretende aquí.
- source_word: דּוּכִיפַת
  english_pob_choice: hoopoe
  chosen_spanish: abubilla
  alternatives_spanish:
  - lapwing
  lexicon: HALOT, BDB
  rationale: Siguiendo la prioridad del hebreo sobre la tradición antigua, se usa el nombre zoológico moderno correspondiente. "Abubilla" es el equivalente español estándar de hoopoe y evita mantener la forma tradicional menos probable.
- source_word: עֲטַלֵּף
  english_pob_choice: bat
  chosen_spanish: murciélago
  alternatives_spanish:
  - murciélago común
  lexicon: HALOT, BDB
  rationale: La identificación es segura. "Murciélago" es la traducción directa y transparente en español, conservando la referencia de la lista sin introducir clasificaciones modernas ajenas al texto.
- source_word: וְאֵת / וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: Hebrew grammar
  rationale: El marcador de objeto directo con conjunción se integra naturalmente en español como una simple coordinación. "Y" reproduce la función listiva sin necesidad de marcar el objeto directo de forma visible.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios textuales: el estado permanece en alta concordancia y sin modificaciones necesarias.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva un registro sobrio y bíblico, evitando calcos innecesarios y manteniendo la lista zoológica clara para lectores contemporáneos.
  - Se eligió una coordinación simple en español para reflejar la estructura acumulativa del hebreo sin sobrecargar la sintaxis.
