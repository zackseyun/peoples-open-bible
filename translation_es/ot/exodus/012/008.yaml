translation:
  language: es
  text: Comerán la carne esa noche[a], asada al fuego[b]; con panes sin levadura y hierbas amargas la comerán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en esta noche». El hebreo dice literalmente «en esta noche», pero en español «esa noche» expresa de forma natural la noche específica de la comida pascual.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «asada de fuego» o «asada con fuego», enfatizando que debe cocinarse por asado y no por otro método.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָכְלוּ
  english_pob_choice: They shall eat
  chosen_spanish: Comerán
  alternatives_spanish:
  - Y comerán
  - Han de comer
  lexicon: HALOT
  rationale: El perfecto con waw en contexto instructivo tiene fuerza directiva/futura. En español, el futuro simple transmite bien la prescripción ritual sin introducir un auxiliar más pesado. Se omite la conjunción inicial para una cadencia más natural en español bíblico-publicable, manteniendo el valor imperativo-prescriptivo.
- source_word: הַבָּשָׂר
  english_pob_choice: the meat
  chosen_spanish: la carne
  alternatives_spanish:
  - la carne del animal
  - la carne
  lexicon: HALOT
  rationale: בָּשָׂר puede significar 'carne' o 'carne para comer'. En español, 'carne' preserva el registro natural y evita la posible reducción semántica de 'carne' frente a 'flesh' en inglés. Dado el contexto pascual, el referente al animal sacrificado queda claro por el contexto inmediato.
- source_word: בַּלַּיְלָה הַזֶּה
  english_pob_choice: that night
  chosen_spanish: aquella noche
  alternatives_spanish:
  - esa noche
  - en esa noche
  lexicon: HALOT
  rationale: La expresión señala una noche específica ya identificada por el contexto ritual. 'Aquella noche' comunica bien la referencia concreta y suena natural en español, manteniendo la distancia referencial que el inglés POB marcó con 'that night'.
- source_word: צְלִי אֵשׁ
  english_pob_choice: roasted over the fire
  chosen_spanish: asada al fuego
  alternatives_spanish:
  - asada sobre el fuego
  - rostizada al fuego
  lexicon: HALOT
  rationale: La construcción hebrea indica cocción por asado, con énfasis en el fuego como medio. 'Asada al fuego' es una fórmula breve, clara y fiel, y conserva la nota de método culinario distinta de la cocción en agua.
- source_word: וּמַצּוֹת
  english_pob_choice: and with unleavened bread
  chosen_spanish: con panes sin levadura
  alternatives_spanish:
  - y con panes sin levadura
  - y panes sin levadura
  lexicon: HALOT
  rationale: מַצּוֹת son panes sin levadura. 'Panes sin levadura' es la equivalencia clara y estándar. Se usa 'con' para reflejar la idea de acompañamiento en la construcción coordinada y evitar una traducción demasiado literal que sonaría torpe en español.
- source_word: עַל
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - sobre
  - junto con
  lexicon: HALOT
  rationale: Aunque el hebreo עַל suele ser 'sobre/en', aquí el sentido culinario es de acompañamiento o concomitancia. 'Con' reproduce bien la relación semántica sin introducir una imagen espacial ajena al contexto.
- source_word: מְרֹרִים
  english_pob_choice: bitter herbs
  chosen_spanish: hierbas amargas
  alternatives_spanish:
  - yerbas amargas
  - hierbas de amargura
  lexicon: HALOT
  rationale: En contexto pascual se trata de vegetales amargos comidos con la víctima. 'Hierbas amargas' es idiomático en español y conserva la categoría de alimento vegetal, evitando una explicación añadida que exceda el texto.
- source_word: יֹאכְלֻהוּ
  english_pob_choice: they shall eat it
  chosen_spanish: la comerán
  alternatives_spanish:
  - la han de comer
  - la comerán
  lexicon: HALOT
  rationale: El verbo retoma y refuerza la instrucción con el objeto pronominal. En español, repetir 'la comerán' preserva el énfasis y la referencia al sustantivo colectivo 'carne'. La concordancia femenina singular con 'la carne' es natural y clara.
theological_decisions:
- issue: Valor del mandamiento ritual futuro
  english_pob_reading: They shall eat
  chosen_spanish_reading: Comerán
  alternative_spanish_readings:
  - Han de comer
  - Comerán
  rationale: No se atenúa el carácter prescriptivo del hebreo. El futuro simple en español funciona bien para normas y mandatos rituales, manteniendo el tono legal/instructivo sin volverlo interpretativo.
  doctrine_reference: Torá ritual; mandato pascual en Éxodo 12
- issue: Referencia del alimento pascual
  english_pob_reading: the meat
  chosen_spanish_reading: la carne
  alternative_spanish_readings:
  - la carne del cordero
  - la carne
  rationale: Se conserva el término genérico del hebreo sin especificar 'cordero' en el texto base, porque el versículo habla de 'la carne' y el animal sacrificado se identifica por el contexto mayor del pasaje. Añadir 'cordero' sería una explicitación no exigida por este versículo.
  doctrine_reference: Contexto pascual de Éxodo 12
- issue: Relación de acompañamiento en 'עַל מְרֹרִים'
  english_pob_reading: with bitter herbs
  chosen_spanish_reading: con hierbas amargas
  alternative_spanish_readings:
  - sobre hierbas amargas
  - junto con hierbas amargas
  rationale: El hebreo no describe una localización física sino una relación de acompañamiento alimentario. 'Con' evita una lectura espacial errónea y preserva la función culinaria del miembro de la frase.
  doctrine_reference: Semejanza semántica de עַל en contexto alimentario
translation_notes:
  revision_awareness: 'Se siguió el estado revisado del inglés POB, incluyendo la puntuación que separa ''roasted over the fire'' del miembro final con punto y coma. El español refleja esa estructura con una pausa equivalente y conserva todos los elementos del hebreo: comer, carne, noche específica, asado por fuego, panes sin levadura y hierbas amargas.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque no aparece en el hebreo de este segmento.
  - Se evitó 'Cristo/Mesías' por no ser pertinente.
  - Se eligió 'carne' en vez de 'flesh'/'fleshly' por tratarse de contexto alimentario.
  - Se conservó un registro bíblico sobrio pero natural en español, sin calco excesivo del orden hebreo.
