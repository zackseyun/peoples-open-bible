review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: duración de un mes completo, imagen gráfica de salir por las narices, rechazo de Yahvé presente en medio del pueblo, llanto delante de él y la queja sobre haber salido de Egipto. Sin embargo, no preserva consistentemente el plural de segunda persona del hebreo (Sp2mp) y mezcla ''tus/ti'' con ''ustedes/han'', lo que desaline a parcialmente la referencia comunitaria del original.'
  spanish_quality_summary: El español es claro y comprensible, pero la mezcla de tratamiento singular y plural dentro del mismo versículo suena incoherente y poco cuidada. Además, 'algo repugnante para ustedes' o 'les resulte repugnante' fluye mejor que 'se vuelva algo repugnante para ti' en este contexto colectivo. El resto del registro es adecuado para una Biblia eclesial moderna y digna.
  glossary_alignment: 'Se alinea bien con el glosario del proyecto en el uso de ''Yahvé'' para יהוה. No hay otros términos doctrinales problemáticos. La principal desviación es gramatical: el proyecto pide español natural y aquí debe mantenerse el plural colectivo de la audiencia, por lo que conviene usar ''ustedes/les/sus'' de manera uniforme.'
  issues:
  - severity: high
    issue: Mezcla inconsistente de segunda persona singular y plural
    rationale: El hebreo dirige el discurso a un plural ('vuestro' / 'entre vosotros'), y el borrador mezcla 'tus narices', 'para ti' con 'ustedes', 'han rechazado', lo que rompe tanto la fidelidad morfológica como la naturalidad del español.
  - severity: medium
    issue: La nota [a] está anclada en 'por un mes entero' pero explica 'se vuelva algo repugnante'
    rationale: La nota léxica corresponde a לְזָרָא ('repugnante/repulsivo'), no a la duración 'por un mes entero'. El marcador debe colocarse junto a la expresión relevante para evitar confusión.
  - severity: low
    issue: '''algo repugnante para ustedes'' puede simplificarse a una formulación más idiomática'
    rationale: Aunque es comprensible, en español bíblico natural suena mejor 'les resulte repugnante' o 'se vuelva repugnante para ustedes', manteniendo la fuerza de זָרָא.
  revised_spanish_text: 'por un mes entero, hasta que salga por sus narices y les resulte repugnante[a], porque han rechazado a Yahvé, que está en medio de ustedes, y han llorado delante de él, diciendo: “¿Por qué salimos de Egipto?”'
  revised_footnotes:
