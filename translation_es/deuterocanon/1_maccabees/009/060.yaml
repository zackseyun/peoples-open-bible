  - severity: medium
    issue: «su plan les fue dado a conocer» para ἔγνωσθη αὐτοῖς ἡ βουλὴ αὐτῶν
    rationale: La formulación española añade un matiz de agencia externa ('les fue dado a conocer') que el pasivo griego no especifica. El sentido auditado es que la conspiración quedó expuesta a Jonatán y a los suyos. Conviene expresarlo con más claridad y menos sobreinterpretación.
