translation:
  language: es
  text: Nuestra alma ha tenido más que suficiente[a] de la burla de los que viven tranquilos, del menosprecio de los orgullosos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Nuestra alma se ha saciado de la burla de los despreocupados, del menosprecio de los arrogantes»; también: «Nuestra alma ha tenido su colmo de la burla de los que viven tranquilos, del menosprecio de los orgullosos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבַּת
  english_pob_choice: more than enough
  chosen_spanish: más que suficiente
  alternatives_spanish:
  - abundantemente
  - mucho
  - en gran manera
  lexicon: HALOT
  rationale: El hebreo intensifica la cláusula con exceso; en español, «más que suficiente» transmite con naturalidad la idea de saturación excesiva sin sonar mecánico.
- source_word: שָׂבְעָה
  english_pob_choice: has had
  chosen_spanish: ha tenido
  alternatives_spanish:
  - está llena
  - se ha saciado
  - ha tenido su colmo
  lexicon: HALOT
  rationale: El verbo expresa estar saciado o lleno; en este contexto poético, «ha tenido» con el modificador de exceso comunica la idea idiomática de haber soportado demasiado.
- source_word: נַפְשֵׁנוּ
  english_pob_choice: Our soul
  chosen_spanish: Nuestra alma
  alternatives_spanish:
  - nosotros
  - nuestra vida
  - nuestro ser interior
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de נפש como alma/ser interior, manteniendo el tono poético y colectivo del original.
- source_word: הַלַּעַג
  english_pob_choice: the mockery
  chosen_spanish: la burla
  alternatives_spanish:
  - el escarnio
  - la mofa
  - la deshonra
  lexicon: HALOT
  rationale: «Burla» comunica bien el sentido de ridiculización verbal y encaja con el paralelismo con «menosprecio».
- source_word: הַשַּׁאֲנַנִּים
  english_pob_choice: those at ease
  chosen_spanish: los que están en calma
  alternatives_spanish:
  - los complacientes
  - los que viven tranquilos
  - los seguros
  lexicon: HALOT
  rationale: La raíz describe a personas sin sobresalto, tranquilas o complacientes; «los que están en calma» conserva esa condición sin imponer de por sí una evaluación moral más fuerte.
- source_word: הַבּוּז
  english_pob_choice: the contempt
  chosen_spanish: el menosprecio
  alternatives_spanish:
  - el desprecio
  - la desestimación
  - la afrenta
  lexicon: HALOT
  rationale: «Menosprecio» refleja el trato despectivo y mantiene una pareja semántica con «burla» sin repetir el mismo término.
- source_word: לִגְאֵיוֹנִים
  english_pob_choice: the proud
  chosen_spanish: los orgullosos
  alternatives_spanish:
  - los arrogantes
  - los altivos
  - los soberbios
  lexicon: HALOT
  rationale: El plural adjetival apunta a personas altivas o arrogantes; «orgullosos» es claro, natural y suficientemente fuerte en español.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] aparece ahora explícitamente en el texto principal junto al término al que remite la alternativa. La redacción mantiene el paralelismo poético hebreo y la lectura POB de exceso/saturación.'
  spanish_consistency_notes:
  - Se conserva el sujeto singular colectivo «Nuestra alma» para reflejar נַפְשֵׁנוּ.
  - «Burla» y «menosprecio» preservan el paralelismo semántico entre לעג y בוז.
  - «Los que están en calma» evita sobreinterpretar שאננים como «complacientes» en el texto principal, pero la alternativa se documenta en la nota.
  - Se usa «orgullosos» como equivalente sobrio y entendible para el plural adjetival de גאיוֹנים.
