translation:
  language: es
  text: 'Y Yahvé le dijo: «¿Qué es eso en tu mano?» Y él dijo: «Una vara»[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Un bastón». El hebreo מַטֶּה puede referirse, según el contexto, a una vara, un bastón o un palo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se mantiene el nombre divino personal del Tetragrámaton, conforme al criterio del proyecto y al audit trail inglés; no se sustituye por un título. En español, 'Yahvé' es la forma estándar del POB para el nombre revelado.
- source_word: וַיֹּאמֶר ... וַיֹּאמֶר
  english_pob_choice: said ... said
  chosen_spanish: dijo ... dijo
  alternatives_spanish:
  - habló ... dijo
  - respondió ... respondió
  lexicon: HALOT
  rationale: אמר es el verbo normal 'decir'; repetir 'dijo' preserva la repetición hebrea y el diálogo directo. 'Respondió' en el segundo miembro explicita la función, pero introduce interpretación que el hebreo no exige.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: El dativo pronominal se expresa de forma natural en español con 'le'; conserva el sentido relacional sin sobrecargar la frase.
- source_word: מַה־זֶּה / מִזֶּה
  english_pob_choice: What is that
  chosen_spanish: ¿Qué tienes ahí?
  alternatives_spanish:
  - ¿Qué es eso?
  - ¿Qué tienes en la mano?
  lexicon: HALOT
  rationale: La pregunta apunta al objeto presente en la mano de Moisés. En español, '¿Qué tienes en la mano?' representa bien el deíctico contextual del hebreo; en el texto final se integra con 'en la mano' por claridad.
- source_word: בְּיָדֶךָ
  english_pob_choice: in your hand
  chosen_spanish: en la mano
  alternatives_spanish:
  - en tu mano
  - a la mano
  lexicon: HALOT
  rationale: La locución es literal e idiomática; 'en la mano' es natural y fiel al hebreo. Se omite la redundancia del pronombre en el texto principal porque el verbo 'tener' ya lo incorpora en español.
- source_word: מַטֶּה
  english_pob_choice: A staff
  chosen_spanish: un bastón
  alternatives_spanish:
  - una vara
  - un cayado
  - un palo
  lexicon: HALOT
  rationale: מַטֶּה puede ser 'vara', 'bastón' o 'cayado' según contexto. 'Bastón' es un equivalente amplio, claro y natural en español para el objeto que Moisés lleva; se evita 'vara' por su posible carga más disciplinaria o ceremonial en español.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto fuente nombra directamente a YHWH; el POB inglés preserva el nombre, y el español mantiene la misma decisión con la forma 'Yahvé'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de מַטֶּה
  english_pob_reading: staff / rod / stick
  chosen_spanish_reading: bastón
  alternative_spanish_readings:
  - vara
  - cayado
  - palo
  rationale: La ambigüedad léxica del hebreo se conserva a nivel de rango semántico. 'Bastón' comunica el objeto de forma inteligible sin cerrar indebidamente las posibilidades del término.
  doctrine_reference: Lexical ambiguity preserved per audit trail; no separate doctrine item
translation_notes:
  revision_awareness: El pasaje se mantiene conforme al último pase sin cambios del audit trail inglés. No se introdujeron revisiones textuales nuevas; solo se adaptó al español la misma decisión léxica y la misma ambigüedad de מַטֶּה.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente con el POB español para el nombre divino.
  - Se conserva la repetición de 'dijo' para reflejar la cadencia del hebreo.
  - La pregunta se formula de manera natural en español sin perder la referencia al objeto visible en la mano.
  - La ambigüedad de מַטֶּה se conserva en la nota, sin imponer una sola equivalencia como exclusiva.
