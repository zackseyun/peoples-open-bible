review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: el modismo temporal «יָמִים עַל שָׁנָה» está bien resuelto como «En poco más de un año», la causalidad de כִּי como «porque» es correcta, y la segunda cola transmite adecuadamente que el acopio/cosecha no llegará. Sin embargo, hay un desajuste importante en la persona verbal: תִּרְגַּזְנָה es segunda persona femenina plural («ustedes temblarán»), pero el borrador dice «temblarán» en tercera persona y luego añade «ustedes», creando una discordancia gramatical y debilitando la apelación directa del oráculo.'
  spanish_quality_summary: El español es claro y legible, pero «temblarán, ustedes» suena poco natural y gramaticalmente incorrecto en este contexto. También «mujeres confiadas» es comprensible, pero en este pasaje de reprensión profética «mujeres complacientes» se alinea mejor con la decisión documentada del POB y evita una lectura demasiado neutral o positiva de בֹּטְחוֹת. «Vendimia» es una buena elección; «cosecha de frutos» funciona, aunque el orden puede mejorarse ligeramente con una puntuación más natural.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La principal cuestión léxica es בֹּטְחוֹת: el POB inglés escogió «complacent women» por la carga negativa contextual. En español conviene reflejar esa misma matización con «mujeres complacientes» en el texto principal, dejando «confiadas/seguras» como alternativas en nota. El resto de las decisiones léxicas son defendibles y fieles.'
  issues:
  - severity: high
    issue: Discordancia de persona verbal en «temblarán, ustedes»
    rationale: 'El hebreo תִּרְגַּזְנָה es 2fp. La forma española correcta debe dirigirse a las mujeres: «temblarán ustedes» puede leerse, pero con el vocativo lo más natural y claro es «ustedes temblarán» o «temblarán, mujeres...». El borrador actual mezcla tercera persona con pronombre explícito y no preserva bien la segunda persona directa.'
  - severity: medium
    issue: «mujeres confiadas» atenúa la reprensión contextual de בֹּטְחוֹת
    rationale: Aunque semánticamente posible, «confiadas» en español puede sonar neutro o incluso positivo. Dado el contexto inmediato y la decisión documentada del POB, «mujeres complacientes» comunica mejor la falsa seguridad censurada por el profeta.
  - severity: low
    issue: Puntuación y fluidez mejorables
    rationale: La secuencia «temblarán, ustedes, mujeres...» resulta trabada. Reordenar a «ustedes temblarán, mujeres...» mejora la naturalidad sin perder fidelidad.
  revised_spanish_text: En poco más de un año[a] ustedes temblarán, mujeres complacientes[b], porque se acabará la vendimia; no vendrá la cosecha de frutos[c].
