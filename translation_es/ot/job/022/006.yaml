revisions:
- from: Porque tomaste prendas de tus hermanos sin motivo[a][b], y desnudaste la ropa de los desnudos.
  to: Porque tomaste prendas de tus hermanos[a] sin motivo[b], y despojaste de su ropa a los desnudos.
  rationale: 'Se revisa únicamente la segunda mitad para expresar de manera fiel y natural en español el sentido de תַּפְשִׁיט + בִּגְדֵי: no se «desnuda la ropa», sino que se despoja a personas de su ropa. También se reubican las notas a anclajes más naturales: la nota cultural en «hermanos» y la alternativa léxica en «sin motivo». No se requiere adjudicación adicional porque la corrección es clara desde el hebreo y la traducción inglesa auditada.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:40:02Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura causal y la acusación de explotación en ambas mitades del versículo. «Tomaste prendas de tus hermanos sin motivo» refleja adecuadamente כִּי תַחְבֹּל אַחֶיךָ חִנָּם, y las notas preservan tanto la alternativa léxica como el alcance comunitario de «hermanos». Sin embargo, la segunda mitad no preserva con fidelidad la relación entre objeto y complemento en וּבִגְדֵי עֲרוּמִּים תַּפְשִׁיט: el sentido es «despojaste de su ropa a los desnudos / a los mal vestidos», no «desnudaste la ropa», que en español resulta semánticamente incorrecto.'
  spanish_quality_summary: El español es mayormente claro, pero «desnudaste la ropa de los desnudos» es poco natural y conceptualmente defectuoso, porque se desnuda a personas, no a la ropa. Una formulación como «despojaste de su ropa a los desnudos» o «les quitaste la ropa a los desnudos» suena natural, mantiene la dureza de la denuncia y evita un calco fallido. También conviene corregir la alternativa léxica interna «tomaste un prenda» si se conserva en materiales auxiliares, aunque no afecta el texto principal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Hermanos» preserva bien אַחֶיךָ con la nota cultural correspondiente. «Prendas» funciona para חבל en contexto de garantía/collateral. Para תַּפְשִׁיט, «despojaste de su ropa» alinea mejor con el valor verbal y con la decisión inglesa «stripped».
  issues:
  - severity: high
    issue: La frase «desnudaste la ropa de los desnudos» no expresa correctamente el hebreo.
    rationale: El hebreo dice literalmente que quitaste/arrancaste las vestiduras de los desnudos o mal vestidos. En español, «desnudar la ropa» no tiene sentido idiomático y distorsiona la acción denunciada.
  - severity: low
    issue: La ubicación de las notas [a][b] es aceptable pero algo recargada.
    rationale: Ambas notas ancladas en «sin motivo» funcionan, aunque una anclada en «hermanos» sería más intuitiva para la nota cultural. No es un error que obligue a más cambios.
  - severity: low
    issue: 'Hay un error gramatical en una alternativa léxica auxiliar: «tomaste un prenda».'
    rationale: Debería ser «tomaste una prenda». Esto no afecta el texto bíblico publicado, pero sí la calidad del registro auxiliar.
  revised_spanish_text: Porque tomaste prendas de tus hermanos[a] sin motivo[b], y despojaste de su ropa a los desnudos.
  revised_footnotes:
  - marker: a
    text: «Tus hermanos» puede referirse más ampliamente a miembros de la comunidad, no solo a hermanos biológicos.
    reason: cultural_note
  - marker: b
    text: 'O: «tomaste garantías de tus hermanos sin causa».'
    reason: lexical_alternative
  revision_rationale: 'Se revisa únicamente la segunda mitad para expresar de manera fiel y natural en español el sentido de תַּפְשִׁיט + בִּגְדֵי: no se «desnuda la ropa», sino que se despoja a personas de su ropa. También se reubican las notas a anclajes más naturales: la nota cultural en «hermanos» y la alternativa léxica en «sin motivo». No se requiere adjudicación adicional porque la corrección es clara desde el hebreo y la traducción inglesa auditada.'
