revisions:
- from: Grande es su gloria[a] por[b] tu salvación; tú le das esplendor y majestad sobre él.
  to: Grande es su gloria por tu salvación[a][b]; tú le confieres esplendor y majestad.
  rationale: Se corrigieron los anclajes de las notas para que ambas expliquen 'tu salvación', como en el rastro de auditoría inglés. También se reemplazó 'tú le das ... sobre él' por 'tú le confieres ...', que expresa naturalmente en español el sentido de conferir/poner sobre alguien honor real, sin añadir torpeza sintáctica. Se mantuvo 'por tu salvación' como una opción aceptable para el valor instrumental amplio de ב, con alternativas preservadas en nota.
