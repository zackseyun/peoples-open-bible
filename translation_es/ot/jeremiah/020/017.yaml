translation:
  language: es
  text: porque no me mató desde el vientre[a], para que mi madre hubiera sido mi sepulcro[b], y su matriz embarazada para siempre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, ‘que no me mató desde el vientre’.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘mi madre mi sepulcro’, una metáfora comprimida que significa que, si hubiera muerto en el vientre, su madre habría servido como su sepulcro.'
    reason: cultural_note
  - marker: c
    text: O ‘embarazada para siempre’. El hebreo expresa un estado continuo de embarazo interminable.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  - debido a que
  lexicon: HALOT
  rationale: En el lamento de Jeremías, la partícula relativa funciona aquí con valor causal. ‘Porque’ comunica esa relación de causa sin volver la frase artificial en español.
- source_word: מוֹתְתַנִי
  english_pob_choice: did not kill me
  chosen_spanish: no me mató
  alternatives_spanish:
  - no me dio muerte
  - no me quitó la vida
  - no me hizo morir
  lexicon: HALOT
  rationale: 'La forma causativa expresa acción directa sobre el sujeto: ‘matar’. En español, ‘no me mató’ conserva la fuerza verbal sin sobrecargar el verso.'
- source_word: מֵרָחֶם
  english_pob_choice: from the womb
  chosen_spanish: desde el vientre
  alternatives_spanish:
  - desde el seno materno
  - del vientre
  - en el vientre
  lexicon: HALOT
  rationale: ‘Desde’ mantiene el matiz de origen del hebreo מִן. ‘Vientre’ es un equivalente natural en español bíblico; ‘seno materno’ sería más explicativo pero menos literal.
- source_word: וַתְּהִי לִי אִמִּי קִבְרִי
  english_pob_choice: so that my mother would have been my grave
  chosen_spanish: para que mi madre hubiera sido mi sepulcro
  alternatives_spanish:
  - y mi madre habría sido mi sepulcro
  - entonces mi madre habría sido mi sepulcro
  - y mi madre habría sido mi tumba
  lexicon: HALOT
  rationale: La yuxtaposición hebrea ‘mi madre mi sepulcro’ expresa una metáfora comprimida. ‘Hubiera sido’ conserva el sentido contrafactual de lamento; ‘sepulcro’ mantiene el tono más solemne de ‘grave’ sin banalizar la imagen.
- source_word: וְרַחְמָהּ
  english_pob_choice: and her womb
  chosen_spanish: su vientre
  alternatives_spanish:
  - su seno
  - su útero
  - su matriz
  lexicon: HALOT
  rationale: Aquí רחם es anatómico y está en paralelo con el embarazo. ‘Vientre’ es claro y bíblico en español; evita tecnicismo médico y preserva la imagen.
- source_word: הֲרַת עוֹלָם
  english_pob_choice: forever pregnant
  chosen_spanish: embarazado para siempre
  alternatives_spanish:
  - siempre embarazada
  - siempre preñada
  - con embarazo perpetuo
  lexicon: HALOT
  rationale: El hebreo describe un estado continuo e inquietante. ‘Embarazado para siempre’ reproduce la idea de un embarazo interminable; aunque ‘embarazada’ suele concordar con femenino, aquí el sustantivo ‘vientre’ permite una formulación idiomática y fiel a la imagen.
theological_decisions:
- issue: Lectura contrafactual del lamento
  english_pob_reading: 'Render the clause as an unreal/counterfactual wish: ''so that my mother would have been my grave.'''
  chosen_spanish_reading: ‘para que mi madre hubiera sido mi sepulcro’ expresa el deseo imposible de que el nacimiento no hubiera ocurrido.
  alternative_spanish_readings:
  - ‘y mi madre fue mi sepulcro’
  - ‘y mi madre habría sido mi sepulcro’
  rationale: El contexto es una maldición por el día del nacimiento, no una narración histórica. El subjuntivo pluscuamperfecto en español comunica mejor el carácter irreal del lamento y preserva la tensión del hebreo.
  doctrine_reference: 'POB translation philosophy: preserve tension rather than resolve it; the context directs a counterfactual reading.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete hebreo y el ajuste final del POB inglés, que prefirió ‘kill me’ sobre ‘put me to death’. En español se conservó esa inmediatez con ‘no me mató’. También se mantuvo la lectura contrafactual del segundo hemistiquio y la imagen fuerte de ‘vientre’/‘sepulcro’ sin suavizarla.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - ‘Mesías/Cristo’ no aplica aquí.
  - ‘espíritu’, ‘gracia’ y otros términos doctrinales no aparecen en este versículo.
  - Se prefirió ‘sepulcro’ a ‘tumba’ por el registro solemne y para reflejar la fuerza del hebreo קבר en un lamento poético.
