translation:
  language: es
  text: La efa y el bato tendrán una misma medida[a], de modo que el bato contenga una décima parte de un homer[c][b], y la efa una décima parte de un homer; su medida reglamentaria será conforme al homer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su proporción fija será conforme al homer».'
    reason: lexical_alternative
  - marker: b
    text: Un homer era una medida mayor de capacidad; la efa era una medida seca y el bato una medida líquida, ambas fijadas en una décima parte de él.
    reason: cultural_note
  - marker: c
    text: «Cor» es un nombre tradicional alternativo para el homer.
    reason: alternative_reading
lexical_decisions:
- source_word: אֵיפָה
  english_pob_choice: ephah
  chosen_spanish: efa
  alternatives_spanish:
  - epha
  lexicon: HALOT
  rationale: Se conserva el nombre técnico de la medida antigua mediante transliteración adaptada al español. ‘Efa’ es transparente para lectores bíblicos y evita sustituir la unidad por una equivalencia moderna inexistente.
- source_word: בַּת
  english_pob_choice: bath
  chosen_spanish: bato
  alternatives_spanish:
  - bat
  lexicon: HALOT
  rationale: También es una unidad metrológica específica; se translitera en forma hispanizada. ‘Bato’ mantiene la unidad sin confundirla con el sustantivo español común ‘bata’ o con otras formas no técnicas.
- source_word: תֹּכֶן אֶחָד
  english_pob_choice: one measure
  chosen_spanish: una misma medida
  alternatives_spanish:
  - una sola medida
  - la misma cantidad
  - una misma norma
  lexicon: HALOT
  rationale: La frase expresa una sola norma de medida compartida por ambos términos. ‘Una misma medida’ comunica la unidad y preserva el sentido metrológico sin perder naturalidad en español.
- source_word: לָשֵׂאת
  english_pob_choice: may hold
  chosen_spanish: contenga
  alternatives_spanish:
  - pueda contener
  - lleve
  - haya de contener
  lexicon: HALOT
  rationale: En este contexto la idea es de capacidad/contención. El subjuntivo ‘contenga’ refleja bien la relación de medida y evita una versión mecánica.
- source_word: מַעְשַׂר
  english_pob_choice: a tenth
  chosen_spanish: una décima parte
  alternatives_spanish:
  - un décimo
  - la décima parte
  lexicon: HALOT
  rationale: El sustantivo aquí funciona como fracción numérica, no como término cultual. ‘Una décima parte’ es claro y exacto en español.
- source_word: חֹמֶר
  english_pob_choice: homer
  chosen_spanish: homer
  alternatives_spanish:
  - cor
  lexicon: HALOT
  rationale: Se mantiene la transliteración del gran estándar de medida para conservar la referencia técnica del hebreo. ‘Cor’ se reserva como alternativa tradicional, pero es menos transparente al original.
- source_word: עֲשִׂירִת
  english_pob_choice: a tenth
  chosen_spanish: una décima parte
  alternatives_spanish:
  - un décimo
  - la décima parte
  lexicon: HALOT
  rationale: El paralelismo con מַעְשַׂר refuerza el valor fraccionario. Se repite ‘una décima parte’ para consistencia y claridad.
- source_word: אֶל הַחֹמֶר
  english_pob_choice: according to the homer
  chosen_spanish: conforme al homer
  alternatives_spanish:
  - según el homer
  - de acuerdo con el homer
  - tomando al homer como norma
  lexicon: HALOT
  rationale: La preposición establece el homer como estándar rector. ‘Conforme al homer’ preserva la relación normativa sin agregar explicaciones ajenas al texto.
- source_word: מַתְכֻּנְתּוֹ
  english_pob_choice: their standard
  chosen_spanish: su norma
  alternatives_spanish:
  - su estándar
  - su proporción fijada
  - su medida reglamentaria
  lexicon: HALOT
  rationale: El término denota la medida fijada o patrón regulador. ‘Norma’ comunica bien esa idea en español y evita tecnicismos innecesarios; el singular posesivo refleja el hebreo, aunque el sentido abarque a las dos unidades mencionadas.
translation_notes:
  revision_awareness: El texto sigue el pasaje hebreo masorético de Ezequiel 45:11 y coincide con el sentido metrológico ya auditado en la versión inglesa POB. Se preservan las relaciones de una décima parte, la unidad de referencia homer, y la idea de norma fija sin introducir equivalencias modernas.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ por defecto en esta serie, pero este versículo no contiene el Tetragrámaton.
  - 'Se usa transliteración hispanizada para unidades técnicas antiguas: ‘efa’, ‘bato’, ‘homer’.'
  - Se conservó el valor fraccionario repetido (‘una décima parte’) para reflejar el paralelismo hebreo.
  - ‘Norma’ traduce el valor de medida/patrón del hebreo sin desplazarlo a un sentido doctrinal ajeno.
