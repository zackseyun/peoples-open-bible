translation:
  language: es
  text: 'Entonces la mujer de Tecoa habló al rey[a]. Cayó con el rostro en tierra y se inclinó, y dijo: «¡Sálvame[b], oh rey!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse más literalmente: «la tecoíta», es decir, la mujer de Tecoa.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo dice literalmente «¡Salva, oh rey!». El español explicita el objeto implícito: «sálvame».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִשָּׁה הַתְּקֹעִית
  english_pob_choice: the woman from Tekoa
  chosen_spanish: la mujer de Tecoa
  alternatives_spanish:
  - la mujer de Técua
  - la tecoíta mujer
  lexicon: HALOT
  rationale: La forma hebrea es un gentilicio/adjetivo que identifica a la mujer por su procedencia. En español, «de Tecoa» conserva esa identificación geográfica con naturalidad y sin sobrecargar el texto; «tecoíta» suena más técnico y menos transparente para una lectura pública.
- source_word: וַתֹּאמֶר ... אֶל הַמֶּלֶךְ
  english_pob_choice: spoke to the king
  chosen_spanish: habló al rey
  alternatives_spanish:
  - dijo al rey
  - se dirigió al rey
  lexicon: HALOT
  rationale: אָמַר puede ser «decir»; aquí, como acto inicial de acercamiento, «habló al rey» reproduce bien el movimiento narrativo y evita una repetición excesiva con el posterior «dijo» dentro del discurso directo.
- source_word: וַתִּפֹּל עַל אַפֶּיהָ אַרְצָה
  english_pob_choice: She fell with her face to the ground
  chosen_spanish: Cayó rostro en tierra
  alternatives_spanish:
  - Cayó con el rostro en tierra
  - Se postró con el rostro en tierra
  lexicon: HALOT
  rationale: La expresión hebrea describe un gesto de abatimiento y súplica, literalmente hacia la tierra. «Cayó rostro en tierra» conserva la fuerza idiomática y resulta más natural en español bíblico que una paráfrasis más explicativa.
- source_word: וַתִּשְׁתָּחוּ
  english_pob_choice: bowed down
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se postró
  - hizo reverencia
  lexicon: HALOT
  rationale: El verbo puede indicar inclinación/prostración en contexto de súplica. «Se inclinó» mantiene el gesto sin cargarlo necesariamente con un sentido cultual más fuerte que el inmediato contexto narrativo requiere.
- source_word: הוֹשִׁיעָה
  english_pob_choice: Save me
  chosen_spanish: ¡Sálvame!
  alternatives_spanish:
  - ¡Socórreme!
  - ¡Líbrame!
  lexicon: HALOT
  rationale: El imperativo de יָשַׁע expresa petición de rescate o salvación. El objeto está implícito en hebreo; el español puede explicitarlo legítimamente como hizo la POB en inglés para conservar la fuerza apelativa.
- source_word: הַמֶּלֶךְ
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey mío
  - mi rey
  lexicon: HALOT
  rationale: En vocativo, «oh rey» reproduce la apelación directa y solemne. «Mi rey» añadiría una relación posesiva que el hebreo no exige.
translation_notes:
  revision_awareness: El control de revisión indica que el texto fuente y el audito inglés están en alta concordancia y no hubo cambios posteriores relevantes; por eso se conserva la estructura narrativa básica y sólo se ajusta la naturalidad del español sin alterar las tensiones léxicas documentadas.
  spanish_consistency_notes:
  - Se usa «Tecoa» de forma consistente para el topónimo.
  - Se mantiene «rey» en vocativo con «oh rey» para preservar la apelación directa.
  - Se explicita el objeto implícito en el imperativo final, siguiendo la decisión auditada del inglés.
  - 'El gesto corporal se rinde con un español sobrio: «cayó rostro en tierra» y «se inclinó».'
