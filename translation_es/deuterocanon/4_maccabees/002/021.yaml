translation:
  language: es
  text: Pues cuando Dios creó al hombre, implantó en él tanto sus pasiones como sus disposiciones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁπηνίκα
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al tiempo que
  - cuandoquiera que
  lexicon: LSJ
  rationale: La conjunción introduce una circunstancia temporal simple; «cuando» suena natural en español y conserva el valor temporal del griego sin volverlo iterativo.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: LSJ
  rationale: El griego usa el artículo con θεός en función referencial; en español bíblico estándar se expresa simplemente como «Dios».
- source_word: κατεσκεύασεν
  english_pob_choice: created
  chosen_spanish: creó
  alternatives_spanish:
  - hizo
  - formó
  - construyó
  lexicon: LSJ
  rationale: Aunque el verbo puede sugerir un hacer con intención o preparación, el audit trail inglés ya decidió «created» por registro y naturalidad. En español, «creó» transmite bien la acción divina sin perder la seriedad del acto.
- source_word: τὸν ἄνθρωπον
  english_pob_choice: man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a la humanidad
  - al ser humano
  lexicon: LSJ
  rationale: El singular genérico masculino del griego se conserva con «al hombre», que mantiene la fuerza representativa de ἄνθρωπον en este contexto antropológico.
- source_word: τὰ πάθη
  english_pob_choice: passions
  chosen_spanish: sus pasiones
  alternatives_spanish:
  - sus afectos
  - sus emociones
  - sus impulsos
  lexicon: LSJ
  rationale: «Pasiones» conserva el sentido psicológico-moral de πάθη en 4 Macabeos. Se mantiene el posesivo «sus» para reflejar el vínculo con el hombre creado, tal como lo hace el inglés auditado.
- source_word: τὰ ἤθη
  english_pob_choice: dispositions
  chosen_spanish: sus disposiciones
  alternatives_spanish:
  - sus inclinaciones
  - sus hábitos
  - su carácter
  lexicon: LSJ
  rationale: ἤθη alude a rasgos estables del carácter o disposición. «Disposiciones» es amplio y fiel, sin reducirlo solo a «hábitos» o a una noción meramente social de «modales».
- source_word: περιεφύτευσεν
  english_pob_choice: implanted
  chosen_spanish: implantó
  alternatives_spanish:
  - plantó en él
  - injertó
  lexicon: LSJ
  rationale: La metáfora vegetal del verbo compuesto se conserva con «implantó», que en español expresa bien la idea de introducir de manera interna y deliberada estas realidades en el hombre.
theological_decisions:
- issue: Afirmación antropológica de que Dios puso pasiones y disposiciones en el ser humano
  english_pob_reading: Render the verse straightforwardly as stating that God implanted passions and dispositions in man.
  chosen_spanish_reading: Traducir de manera directa que Dios implantó en el hombre tanto pasiones como disposiciones.
  alternative_spanish_readings:
  - Suavizar el texto para sugerir solo capacidades neutras
  - Cambiar «pasiones» por una expresión menos cargada
  rationale: El griego afirma explícitamente que Dios implantó ambas realidades. La traducción debe preservar esa tensión antropológica y moral, sin atenuarla ni resolverla doctrinalmente.
  doctrine_reference: Mantener la tensión teológica y antropológica del texto fuente.
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «constructed» a «created» por registro y naturalidad; la presente traducción sigue esa decisión con «creó». No se requieren notas textuales adicionales porque el griego base es claro y la decisión principal es de equivalencia semántica y estilo.
  spanish_consistency_notes:
  - Se usó «Dios» en lugar de un equivalente marcado por artículo, conforme al uso bíblico normal en español.
  - Se conservó el paralelismo de «sus pasiones» / «sus disposiciones» para reflejar la estructura del griego y del inglés auditado.
  - No se introdujo vocabulario doctrinal posterior; el versículo queda como una afirmación antropológica directa.
  - «Implantó» mantiene la metáfora del verbo griego sin volverla demasiado técnica o médica.
