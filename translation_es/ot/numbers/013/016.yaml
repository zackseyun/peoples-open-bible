translation:
  language: es
  text: Estos son los nombres de los hombres[a] que Moisés envió para reconocer[b] la tierra. Y Moisés llamó a Hoshea[c], hijo de Nun, Josué[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «varones».
    reason: lexical_alternative
  - marker: b
    text: O «explorar»; el hebreo puede denotar reconocimiento o exploración del territorio.
    reason: lexical_alternative
  - marker: c
    text: Hoshea también puede escribirse «Oseas» en español.
    reason: alternative_reading
  - marker: d
    text: Hoshea es la forma anterior del nombre de Josué; aquí Moisés le da el nombre de Josué.
    reason: cultural_note
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Éstos son
  - Estos eran
  lexicon: HALOT
  rationale: La fórmula deíctica introduce una lista ya presentada; en español, «Estos son» suena natural y conserva el valor presentativo del hebreo.
- source_word: שְׁמוֹת
  english_pob_choice: the names of
  chosen_spanish: los nombres de
  alternatives_spanish:
  - los nombres
  lexicon: HALOT
  rationale: El constructo hebreo pide relación posesiva o especificativa; en español se expresa de forma natural con «los nombres de».
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los varones
  lexicon: HALOT
  rationale: El referente son los varones enviados por Moisés; «hombres» preserva la referencia masculina explícita sin volverla abstracta.
- source_word: לָתוּר
  english_pob_choice: to scout out
  chosen_spanish: para reconocer
  alternatives_spanish:
  - para explorar
  - para espiar
  lexicon: HALOT
  rationale: El verbo denota inspección/reconocimiento del territorio. «Reconocer» comunica bien la idea de exploración con propósito y evita el matiz más cargado de «espiar»; también deja abierta la alternativa textual/lexical sin perder el sentido militar-reconocedor.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: En el contexto narrativo de Números 13, «la tierra» reproduce la referencia geográfica y teológica sin añadir especificación interpretativa que el hebreo aquí no explicita.
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - nombró
  - renombró
  lexicon: HALOT
  rationale: «Llamó» sigue de cerca el hebreo y permite inferir el cambio de nombre por el contexto, como en el audit trail inglés.
- source_word: לְהוֹשֵׁעַ
  english_pob_choice: Hoshea
  chosen_spanish: Hoshea
  alternatives_spanish:
  - Oseas
  - Josué (como forma previa del nombre)
  lexicon: HALOT
  rationale: Se conserva la forma propia del nombre previo al cambio para reflejar el dato histórico y la diferencia con el nombre posterior.
- source_word: בִּן נוּן
  english_pob_choice: son of Nun
  chosen_spanish: hijo de Nun
  alternatives_spanish:
  - el hijo de Nun
  lexicon: HALOT
  rationale: La construcción patronímica se expresa de manera estándar en español con «hijo de Nun».
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Jehosúa
  lexicon: HALOT
  rationale: «Josué» es la forma bíblica y reconocible en español para el nombre ya asignado a este personaje.
theological_decisions:
- issue: Nombre previo y cambio de nombre de Josué
  english_pob_reading: Hoshea is the earlier form of Joshua’s name; Moses gives him the name Joshua here.
  chosen_spanish_reading: Hoshea es la forma anterior del nombre de Josué; aquí Moisés le da el nombre de Josué.
  alternative_spanish_readings:
  - Hoshea también puede escribirse Oseas en español
  - Moisés lo rebautizó Josué
  rationale: El hebreo y el audit trail inglés señalan un cambio nominal real. La redacción española conserva ambos nombres sin borrar la transición ni sustituirla por una paráfrasis interpretativa.
  doctrine_reference: Números 13:16; cf. Josué 1:1
- issue: Valor de לָתוּר en el contexto
  english_pob_reading: to scout out
  chosen_spanish_reading: para reconocer
  alternative_spanish_readings:
  - para explorar
  - para espiar
  rationale: La acción es una misión de reconocimiento del territorio. «Reconocer» mantiene el valor investigativo sin cargar el texto con una equivalencia más polémica que podría oscurecer el tono narrativo.
  doctrine_reference: Números 13:17–20
translation_notes:
  revision_awareness: Se siguió el sentido del hebreo WLC y el audit trail inglés, manteniendo la lista introductoria, el verbo de misión de reconocimiento y el cambio de nombre de Hoshea a Josué. No se añadieron elementos interpretativos ajenos al texto.
  spanish_consistency_notes:
  - Se usa «Moisés» y «Josué» con ortografía bíblica estándar en español.
  - Se conserva «la tierra» sin expandir a «tierra prometida» para no añadir información no explícita en el versículo.
  - Se evitó «espiar» en el texto principal para no imponer una lectura más estrecha que la del hebreo y la del audit trail inglés.
