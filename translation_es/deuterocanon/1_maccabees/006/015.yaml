translation:
  language: es
  text: y le dio la corona, su manto y el anillo[a], para traer a Antíoco su hijo y
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto griego, tal como se presenta aquí, termina a mitad de frase: «y le dio la corona, su manto y el anillo, para traer a Antíoco su hijo y». La traducción conserva esa forma incompleta en lugar de suplir la continuación por contexto.'
    reason: textual_variant
lexical_decisions:
- source_word: διάδημα
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - diadema
  lexicon: LSJ
  rationale: En contexto real y regia, διάδημα designa el distintivo de realeza; en español, «corona» comunica de modo natural el objeto real sin perder el valor de insignia de soberanía. «Diadema» sería más cercano etimológicamente, pero menos transparente para el lector general.
- source_word: στολή
  english_pob_choice: robe
  chosen_spanish: manto
  alternatives_spanish:
  - ropa
  - vestidura
  - túnica
  lexicon: LSJ
  rationale: La palabra griega puede referirse a una prenda distinguida u oficial. En el contexto cortesano, «manto» funciona en español como prenda de honor/autoridad y evita una sobreespecificación que el griego no exige. Se evita «túnica» porque suele sugerir otra prenda más interior y menos regia.
- source_word: δακτύλιον
  english_pob_choice: ring
  chosen_spanish: anillo
  alternatives_spanish:
  - sortija
  - anillo de sello
  lexicon: LSJ
  rationale: El griego dice simplemente «anillo»; aunque pudiera implicar un sello, el texto no lo explicita. «Anillo» reproduce la sencillez del original y mantiene abierta la posible función de autoridad sin añadir precisión no garantizada.
- source_word: ἀγαγεῖν
  english_pob_choice: to bring
  chosen_spanish: traer
  alternatives_spanish:
  - conducir
  - llevar
  lexicon: LSJ
  rationale: 'El infinitivo expresa propósito: el acto de hacer venir a Antíoco. «Traer» es la opción más natural en español en este marco narrativo y corresponde bien al inglés auditado «to bring».'
- source_word: τὸ διάδημα καὶ τὴν στολὴν αὐτοῦ καὶ τὸν δακτύλιον
  english_pob_choice: the crown and his robe and the ring
  chosen_spanish: la corona, su manto y el anillo
  alternatives_spanish:
  - la corona y su manto y el anillo
  - la corona, su vestidura y el anillo
  lexicon: LSJ
  rationale: Se conserva la enumeración tripartita de insignias reales. El orden mantiene la secuencia del griego y la traducción inglesa auditada, sin añadir «sello» ni poseer el anillo de forma excesiva más allá del posesivo del original.
translation_notes:
  revision_awareness: La traducción sigue el pasaje griego proporcionado y reproduce su final abrupto, en consonancia con la nota auditada en inglés. No se han incorporado palabras de continuación tomadas de contexto externo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - «Corona» se adopta como equivalente natural de διάδημα en contexto real.
  - «Manto» se prefiere por claridad y tono regios frente a alternativas más literales pero menos idiomáticas.
  - Se mantiene el final abierto del versículo con nota textual, sin completar la frase.
