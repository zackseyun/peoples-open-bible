  glossary_alignment: Alinea bien con «Yahvé» y con «profanaron». Necesita mejor ajuste con la decisión léxica de αἱ ἀνομίαι como «lawless deeds»; «actos de maldad» o similar refleja mejor actos concretos que «iniquidades». No hay conflicto serio de glosario, pero sí un refinamiento necesario.
