translation:
  language: es
  text: 'Entonces el ángel que estaba hablando conmigo respondió y me dijo[a]: «¿No sabes qué son estos?» Y yo dije: «No[b], mi señor».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que hablaba conmigo». El hebreo usa un modismo para el ángel en conversación continua con Zacarías.
    reason: lexical_alternative
  - marker: b
    text: 'O «señor». Hebreo: «mi señor», una forma respetuosa de dirigirse al ángel, no una referencia a Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: ענה en esta fórmula narrativa introduce una respuesta en diálogo. «Respondió» es natural en español y conserva la secuencia conversacional sin añadir interpretación.
- source_word: הַמַּלְאָךְ
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: HALOT
  rationale: En Zacarías esta figura es el intérprete celestial de la visión; «ángel» refleja mejor ese contexto que «mensajero».
- source_word: הַדֹּבֵר בִּי
  english_pob_choice: who was speaking with me
  chosen_spanish: que estaba hablando conmigo
  alternatives_spanish:
  - que hablaba conmigo
  - que me hablaba
  lexicon: HALOT
  rationale: El participio con בְּ más pronombre indica una relación de habla en curso. «Estaba hablando conmigo» conserva ese aspecto progresivo mejor que un simple pretérito.
- source_word: וַיֹּאמֶר אֵלַי
  english_pob_choice: said to me
  chosen_spanish: me dijo
  alternatives_spanish:
  - me habló
  - dijo a mí
  lexicon: HALOT
  rationale: «Me dijo» es la forma natural y directa en español para אמר אלַי, manteniendo la introducción de discurso directo.
- source_word: הֲלוֹא
  english_pob_choice: Do you not
  chosen_spanish: ¿No
  alternatives_spanish:
  - ¿Acaso no
  - ¿No es verdad que
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica. «¿No» preserva la forma sin forzar el tono con un adverbio explicativo.
- source_word: יָדַעְתָּ
  english_pob_choice: know
  chosen_spanish: sabes
  alternatives_spanish:
  - conoces
  - entiendes
  lexicon: HALOT
  rationale: ידע puede ser «saber/conocer»; aquí la pregunta apunta al conocimiento de la identidad de los símbolos, por lo que «sabes» resulta natural y fiel.
- source_word: מָה הֵמָּה אֵלֶּה
  english_pob_choice: what these are
  chosen_spanish: qué son estos
  alternatives_spanish:
  - qué son estas cosas
  - qué significan estos
  lexicon: HALOT
  rationale: La frase pregunta por la identidad de los objetos visionarios. En español, «qué son estos» es idiomático y reproduce bien la brevedad hebrea.
- source_word: וָאֹמַר
  english_pob_choice: And I said
  chosen_spanish: Y yo dije
  alternatives_spanish:
  - Entonces dije
  - Y respondí
  lexicon: HALOT
  rationale: La waw-consecutiva continúa la escena. «Y yo dije» mantiene la conexión narrativa y el cambio a primera persona.
- source_word: לֹא
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - No lo sé
  lexicon: HALOT
  rationale: La respuesta hebrea es breve y negativa. «No» conserva la concisión, con el verbo implícito por la pregunta anterior.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - señor mío
  - mi amo
  - mi maestro
  lexicon: HALOT
  rationale: Aquí es una fórmula respetuosa dirigida al ángel, no al nombre divino. «Mi señor» mantiene el honorífico y la ambigüedad reverente sin identificarlo con Yahvé.
theological_decisions:
- issue: Tratamiento de אֲדֹנִי como título de respeto, no como designación divina
  english_pob_reading: 'a respectful address to the interpreting angel: ''my lord'''
  chosen_spanish_reading: 'un tratamiento respetuoso dirigido al ángel: «mi señor»'
  alternative_spanish_readings:
  - «señor»
  - «señor mío»
  - «mi maestro»
  rationale: El contexto inmediato muestra que el hablante se dirige al ángel que lo guía en la visión. Traducirlo como «mi señor» conserva la cortesía sin introducir una referencia a Yahvé ni suavizar demasiado el término.
  doctrine_reference: Primacía del texto original; títulos tratados según su referente contextual, no por costumbre eclesial
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el análisis auditado del inglés POB y del hebreo: mantiene la escena de diálogo, el aspecto progresivo de «hablando conmigo», la pregunta retórica y el tratamiento honorífico final dirigido al ángel. No se detectaron revisiones aplicadas en el expediente, por lo que no se incorporan cambios editoriales adicionales.'
  spanish_consistency_notes:
  - Se conserva «ángel» y no «mensajero», conforme al contexto visionario de Zacarías.
  - «Mi señor» se usa como honorífico para el ángel; no debe leerse como sustituto del nombre divino.
  - La pregunta se vierte de manera breve e idiomática para no sobreexplicar el hebreo.
  - El registro es bíblico formal pero en español contemporáneo claro.
