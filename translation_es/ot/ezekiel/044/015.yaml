translation:
  language: es
  text: Pero los sacerdotes levíticos[a], los hijos de Sadoc, que cumplieron el encargo de mi santuario cuando los hijos de Israel[b] se desviaron de mí, ellos se acercarán a mí para ministrarme, y estarán delante de mí para ofrecerme sebo y sangre, declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los sacerdotes, los levitas». El hebreo puede leerse en aposición, no solo como «sacerdotes levíticos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el pueblo de Israel» o «los israelitas», por «los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַכֹּהֲנִים הַלְוִיִּם
  english_pob_choice: But the Levitical priests
  chosen_spanish: Pero los sacerdotes levíticos
  alternatives_spanish:
  - Y los sacerdotes, los levitas
  - Pero los sacerdotes, los levitas
  lexicon: HALOT
  rationale: La construcción hebrea puede leerse como un grupo de sacerdotes identificados como levitas. En español, "sacerdotes levíticos" conserva esa relación de pertenencia sin perder fluidez. "Pero" mantiene el contraste con el contexto anterior, como en la lectura inglesa.
- source_word: בְּנֵי צָדוֹק
  english_pob_choice: the sons of Zadok
  chosen_spanish: los hijos de Sadoc
  alternatives_spanish:
  - los descendientes de Sadoc
  lexicon: HALOT
  rationale: Se conserva el parentesco/linaje del hebreo. "Hijos" es la correspondencia directa y evita neutralizar la expresión a "descendientes" sin necesidad.
- source_word: שָׁמְרוּ אֶת מִשְׁמֶרֶת מִקְדָּשִׁי
  english_pob_choice: kept the charge of my sanctuary
  chosen_spanish: guardaron la carga de mi santuario
  alternatives_spanish:
  - guardaron el cargo de mi santuario
  - cumplieron el encargo de mi santuario
  - guardaron el cuidado de mi santuario
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת en contexto sacerdotal expresa una responsabilidad asignada, no solo vigilancia física. "Carga" intenta reflejar esa idea de cargo/encargo oficial; aunque menos común, mantiene la tensión léxica con el hebreo y con la traducción inglesa "charge".
- source_word: בִּתְעוֹת
  english_pob_choice: when the sons of Israel went astray from me
  chosen_spanish: cuando los hijos de Israel se apartaban de mí
  alternatives_spanish:
  - cuando los hijos de Israel se desviaban de mí
  - en el apartarse de los hijos de Israel de mí
  lexicon: HALOT
  rationale: El infinitivo con ב indica circunstancia temporal. "Se apartaban de mí" conserva el sentido moral-relacional de desviarse/apostatar, y suena natural en español sin perder el matiz del hebreo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - el pueblo de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se mantiene la literalidad idiomática "hijos de Israel" porque el hebreo así lo formula y la traducción inglesa la conservó. Aunque funciona corporativamente, la expresión tradicional es comprensible en español bíblico.
- source_word: מֵעָלַי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - lejos de mí
  - apartados de mí
  lexicon: HALOT
  rationale: El hebreo expresa alejamiento o apartamiento de Yahvé. En español, "de mí" es breve y fiel; el sentido direccional ya queda reforzado por "se apartaban".
- source_word: הֵמָּה יִקְרְבוּ אֵלַי
  english_pob_choice: they shall come near to me
  chosen_spanish: ellos se acercarán a mí
  alternatives_spanish:
  - se acercarán a mí
  - ellos se presentarán ante mí
  lexicon: HALOT
  rationale: '"Acercarse" reproduce bien el valor cultual de קָרַב en contexto sacerdotal. Se mantiene el pronombre explícito para reflejar el énfasis del hebreo, aunque en español podría omitirse.'
- source_word: לְשָׁרְתֵנִי
  english_pob_choice: to minister to me
  chosen_spanish: para ministrarme
  alternatives_spanish:
  - para servirme
  - para ejercer su ministerio ante mí
  lexicon: HALOT
  rationale: '"Ministrar" conserva el matiz de servicio sagrado/litúrgico que tiene שׁרת en este contexto. Aunque es una forma más eclesial, aquí corresponde al ámbito sacerdotal del pasaje.'
- source_word: וְעָמְדוּ לְפָנַי
  english_pob_choice: and they shall stand before me
  chosen_spanish: y estarán delante de mí
  alternatives_spanish:
  - y se pondrán delante de mí
  - y permanecerán en mi presencia
  lexicon: HALOT
  rationale: La imagen de permanecer de pie ante Dios se expresa de modo natural con "estarán delante de mí". Se conserva la postura cultual sin sobrecargar el español.
- source_word: לְהַקְרִיב לִי
  english_pob_choice: to offer to me
  chosen_spanish: para ofrecerme
  alternatives_spanish:
  - para presentarme
  - para traerme
  lexicon: HALOT
  rationale: En contexto sacrificial, el causativo de קרב se entiende como "ofrecer". El español lo expresa de forma directa y cultualmente adecuada.
- source_word: חֵלֶב וָדָם
  english_pob_choice: fat and blood
  chosen_spanish: sebo y sangre
  alternatives_spanish:
  - grasa y sangre
  - el sebo y la sangre
  lexicon: HALOT
  rationale: En español bíblico, "sebo" es más preciso para la porción sacrificial grasa que simplemente "grasa". Mantiene el carácter técnico del ofrecimiento ritual.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: dice el Señor Yahvé
  alternatives_spanish:
  - declara el Señor Yahvé
  - oráculo del Señor Yahvé
  - dice el Señor Dios
  lexicon: HALOT
  rationale: Se sigue la convención doctrinal de traducir el nombre divino por "Yahvé". "Señor Yahvé" preserva el doble título de אֲדֹנָי + יְהוִה sin recurrir al enmascaramiento tradicional "SEÑOR".
theological_decisions:
- issue: Rendering of יְהוִה in the divine title אֲדֹנָי יְהוִה
  english_pob_reading: declares the Lord GOD
  chosen_spanish_reading: dice el Señor Yahvé
  alternative_spanish_readings:
  - declara el Señor Yahvé
  - oráculo del Señor Yahvé
  rationale: El texto hebreo contiene explícitamente el Nombre divino, y la política del proyecto pide traducirlo como "Yahvé". En español, "Señor Yahvé" reproduce el compuesto אֲדֹנָי + יְהוִה sin ocultar el Nombre y sin crear la repetición artificial "Señor Señor".
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se revisó el pasaje contra el hebreo consonántico/vocalizado y la nota inglesa. No se requirieron cambios respecto del sentido base; la única tensión relevante es la construcción apposicional de "los sacerdotes levíticos / los sacerdotes, los levitas" y la transliteración doctrinal del Nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se mantuvo "hijos de Israel" para conservar la idiomaticidad bíblica y la literalidad del hebreo.
  - '"Ministrarme" y "ofrecerme" conservan el registro sacerdotal/cultual del contexto.'
  - Se usó "sebo" para la porción sacrificial, por ser más específico que "grasa" en español bíblico.
  - Se evitó el masking de יְהוִה con "SEÑOR" para alinearse con la terminología del proyecto.
