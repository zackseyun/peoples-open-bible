translation:
  language: es
  text: Cuando otros prevalecían contra él por codicia[a], ella estuvo a su lado y lo hizo rico.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando los que actuaban por codicia prevalecían contra él». El participio griego también puede traducirse de manera más formal como «prevalecían contra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν πλεονεξίᾳ
  english_pob_choice: in greed
  chosen_spanish: por codicia
  alternatives_spanish:
  - en codicia
  - en avaricia
  - en medio de la codicia
  lexicon: BDAG
  rationale: πλεονεξία expresa codicia/avaricia. En español, 'por codicia' comunica con naturalidad la causa o el impulso moral de la acción, manteniendo el matiz ético sin sonar mecánico.
- source_word: κατισχυόντων
  english_pob_choice: overpowered
  chosen_spanish: lo oprimían
  alternatives_spanish:
  - lo dominaban
  - prevalecían contra él
  - lo vencían
  lexicon: BDAG
  rationale: El participio transmite la idea de imponerse con fuerza o prevalecer. 'Lo oprimían' conserva la noción de dominio hostil de manera fluida en español, sin perder la fuerza del verbo.
- source_word: παρέστη
  english_pob_choice: stood by him
  chosen_spanish: estuvo a su lado
  alternatives_spanish:
  - lo asistió
  - estuvo presente con él
  - lo socorrió
  lexicon: BDAG
  rationale: παρίστημι aquí indica estar al lado, asistir o acudir en ayuda. 'Estuvo a su lado' conserva la imagen de apoyo personal y evita una paráfrasis demasiado interpretativa.
- source_word: ἐπλούτισεν
  english_pob_choice: made him rich
  chosen_spanish: lo hizo rico
  alternatives_spanish:
  - lo enriqueció
  - le dio riquezas
  - lo prosperó
  lexicon: BDAG
  rationale: El verbo significa hacer rico o enriquecer. 'Lo hizo rico' es claro y concreto en español, y mantiene el sentido de prosperidad otorgada.
theological_decisions:
- issue: Sujeto implícito de los verbos y referencia a Sabiduría personificada
  english_pob_reading: Rendered as 'she' referring to Wisdom from the surrounding context.
  chosen_spanish_reading: Se deja implícita la referencia personal en la sintaxis, como en el griego, pero el contexto personificado de Sabiduría queda conservado.
  alternative_spanish_readings:
  - ella estuvo a su lado y lo hizo rico
  - Sabiduría estuvo a su lado y lo hizo rico
  rationale: El griego no repite el sujeto, y en español puede mantenerse la referencia implícita sin forzar la introducción de 'ella' o 'Sabiduría'. Así se conserva la tensión literaria del pasaje y su personificación contextual sin añadir más de lo que el verso dice.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish'
