translation:
  language: es
  text: Entonces volverá el rostro hacia las fortalezas de su tierra[a], pero tropezará y caerá[b], y no se le encontrará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fortificaciones'. El término hebreo se refiere en general a lugares de fuerza o defensa.
    reason: lexical_alternative
  - marker: b
    text: '''No se le encontrará'' es una manera idiomática de decir que desaparece de la escena, probablemente por muerte o derrocamiento, sin especificar el modo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשֵׁב
  english_pob_choice: Then he will turn
  chosen_spanish: Entonces volverá
  alternatives_spanish:
  - y volverá
  - entonces tornará
  lexicon: HALOT
  rationale: El hebreo שוב con 'su rostro' expresa un cambio de orientación o dirección. 'Volverá' conserva ese movimiento sin forzar una paráfrasis; 'Entonces' reproduce el valor narrativo del waw inicial de manera natural en español.
- source_word: פָּנָיו
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  - su semblante
  lexicon: HALOT
  rationale: '''Rostro'' mantiene la imagen corporal del hebreo y funciona bien en español bíblico contemporáneo. En este giro idiomático no se traduce como ''atención'' para no perder la metáfora original.'
- source_word: לְמָעוּזֵּי
  english_pob_choice: toward the fortresses
  chosen_spanish: hacia las fortalezas[a]
  alternatives_spanish:
  - hacia las fortificaciones
  - hacia los baluartes
  lexicon: HALOT
  rationale: מָעוֹז nombra un lugar de fuerza o defensa. 'Fortalezas' es una equivalencia amplia y natural; se conserva la alternativa 'fortalezas/strongholds' porque el término hebreo abarca tanto fortaleza como plaza fuerte o defensa.
- source_word: אַרְצוֹ
  english_pob_choice: of his own land
  chosen_spanish: de su tierra
  alternatives_spanish:
  - de su país
  - de su territorio
  lexicon: HALOT
  rationale: אֶרֶץ aquí se refiere al ámbito territorial o patrio. 'Tierra' es una forma fiel y sobria en español; se evita añadir 'propia' porque el poseedor ya está claro en el sufijo pronominal.
- source_word: וְנִכְשַׁל
  english_pob_choice: but he will stumble
  chosen_spanish: pero tropezará
  alternatives_spanish:
  - pero se tambaleará
  - pero será derribado
  lexicon: HALOT
  rationale: El nifal de כשל puede significar 'tropezar' o 'ser hecho tropezar'. 'Tropezará' conserva la metáfora de pérdida de firmeza; el 'pero' refleja bien el giro adversativo del contexto, como en la POB inglesa.
- source_word: וְנָפַל
  english_pob_choice: and fall
  chosen_spanish: y caerá
  alternatives_spanish:
  - y caerá al suelo
  - y sucumbirá
  lexicon: HALOT
  rationale: נפל se traduce de forma directa por 'caer'. Mantener el paralelismo con 'tropezará y caerá' conserva el ritmo y la progresión intensificadora del hebreo.
- source_word: וְלֹא יִמָּצֵא
  english_pob_choice: and he will not be found
  chosen_spanish: y no se le encontrará[b]
  alternatives_spanish:
  - y no será hallado
  - y desaparecerá
  lexicon: HALOT
  rationale: El nifal de מצא indica 'ser hallado/encontrado'. En español impersonal 'no se le encontrará' preserva la misma reserva del hebreo y evita explicitar si el resultado es muerte, derrota o desaparición.
theological_decisions:
- issue: La frase final es un eufemismo narrativo sobre la desaparición del personaje.
  english_pob_reading: '''He will not be found'' is an idiomatic way of saying that he disappears from the scene, likely through death or overthrow, without stating the manner explicitly.'
  chosen_spanish_reading: '''No se le encontrará'' mantiene la ambigüedad: indica que dejará de aparecer o ser hallado, sin precisar si fue por muerte, derrocamiento o retiro forzado.'
  alternative_spanish_readings:
  - y desaparecerá
  - y morirá
  - y será derrocado
  rationale: La POB inglesa preserva la cautela del hebreo; la versión española debe conservar esa misma reserva y no convertir la inferencia en afirmación directa.
  doctrine_reference: Principio de sobriedad exegética y respeto al eufemismo bíblico; no se añade información no explícita en el texto.
- issue: El sustantivo territorial אַרְצוֹ puede sonar genérico en español.
  english_pob_reading: '''Of his own land'' slightly clarifies possession and destination in idiomatic English without adding new content.'
  chosen_spanish_reading: '''De su tierra'' comunica el mismo sentido posesivo y territorial sin reforzar indebidamente la idea con adjetivos adicionales.'
  alternative_spanish_readings:
  - de su propia tierra
  - de su país
  rationale: Se conserva la suficiencia del sufijo posesivo hebreo y la amplitud semántica de אֶרֶץ.
  doctrine_reference: Fidelidad semántica sin expansión interpretativa.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la lectura revisada de la POB inglesa y conserva sus decisiones principales: orientación direccional de שוב con פָּנִים, equivalencia amplia para מָעוֹז, progresión verbal ''tropezará y caerá'', y el eufemismo final de מצא sin explicitar el desenlace.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo exige; este versículo no contiene el nombre divino.
  - Se mantiene 'fortalezas' para מָעוֹז en coherencia con el valor amplio de 'strongholds' documentado por la POB.
  - Se evita 'siervo' u otros tecnicismos ajenos al pasaje; el registro es narrativo-profético y sobrio.
  - La puntuación refleja el contraste adversativo con coma antes de 'pero', y el final impersonal en español preserva la indefinición del hebreo.
