  yaml_path: translation/ot/1_samuel/017/010.yaml
  text: Then the Philistine said[a], “I have defied the ranks of Israel this day. Give me a man[c][b], and let us fight together.”
  footnotes:
  - marker: a
    text: Or “the battle lines of Israel” or, by extension, “the armies of Israel.”
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb can also be rendered “taunted,” “reproached,” or “mocked”; “defied” best fits the military challenge in context.
    reason: lexical_alternative
  - marker: c
    text: Literally “this day”; many English versions render “today.”
    reason: lexical_alternative
