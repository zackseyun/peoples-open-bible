translation:
  language: es
  text: Pero estoy lleno de la ira de Yahvé[a]; estoy cansado de contenerla. Derrámala sobre el niño en la calle, y sobre la compañía de los jóvenes juntos; porque también serán tomados el hombre con la mujer, el anciano junto con el de muchos días[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la furia de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «lleno de días», un modismo que significa muy anciano o de edad muy avanzada.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲמַת יְהוָה
  english_pob_choice: the wrath of the LORD
  chosen_spanish: la ira de Yahvé
  alternatives_spanish:
  - el furor de Yahvé
  - la furia de Yahvé
  lexicon: HALOT
  rationale: חֵמָה/חֲמָה expresa ira ardiente, furor o cólera intensa. «Ira» comunica con naturalidad la fuerza judicial del contexto profético; se conserva Yahvé según la política terminológica del proyecto.
- source_word: מָלֵאתִי
  english_pob_choice: I am full of
  chosen_spanish: estoy lleno de
  alternatives_spanish:
  - estoy colmado de
  - he sido lleno de
  lexicon: HALOT
  rationale: 'El perfecto comunica un estado presente resultante: el hablante está lleno. «Estoy lleno de» es claro, natural y conserva el sentido resultativo.'
- source_word: נִלְאֵיתִי
  english_pob_choice: I am weary
  chosen_spanish: cansado estoy
  alternatives_spanish:
  - estoy exhausto
  - me he fatigado
  lexicon: HALOT
  rationale: El verbo indica cansancio, agotamiento o desfallecimiento. Se opta por una forma solemne y directa que mantiene el tono profético.
- source_word: הָכִיל
  english_pob_choice: of holding it in
  chosen_spanish: de contenerla
  alternatives_spanish:
  - de retenerla
  - de guardarla
  lexicon: HALOT
  rationale: El infinitivo comunica la idea de contener o reprimir la ira divina. En español, «contenerla» reproduce bien la imagen de una emoción/juicio reprimido.
- source_word: שְׁפֹךְ
  english_pob_choice: Pour it out
  chosen_spanish: Derrámala
  alternatives_spanish:
  - Vierte la
  - Descárgala
  lexicon: HALOT
  rationale: El imperativo pide liberar lo contenido. «Derrámala» conserva el verbo imagético de verter/derramar y suena natural en español bíblico contemporáneo.
- source_word: עוֹלָל
  english_pob_choice: the child
  chosen_spanish: el niño
  alternatives_spanish:
  - el pequeño
  - el infante
  lexicon: HALOT
  rationale: El sustantivo designa a un niño muy joven. «Niño» es la opción más amplia y clara en español; evita restringir demasiado la edad.
- source_word: בַּחוּץ
  english_pob_choice: in the street
  chosen_spanish: en la calle
  alternatives_spanish:
  - afuera
  - en la plaza
  lexicon: HALOT
  rationale: El término remite al espacio público exterior. «En la calle» es el equivalente más natural y contextual en español.
- source_word: סוֹד בַּחוּרִים
  english_pob_choice: the company of young men
  chosen_spanish: la compañía de los jóvenes
  alternatives_spanish:
  - el grupo de jóvenes
  - la reunión de los jóvenes
  lexicon: HALOT
  rationale: סוֹד puede significar círculo, compañía, consejo o intimidad reunida. Aquí se trata de un grupo congregado; «compañía» preserva el matiz de conjunto reunido sin forzar una acepción institucional.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: todos juntos
  alternatives_spanish:
  - juntos
  - en conjunto
  lexicon: HALOT
  rationale: El adverbio subraya que están reunidos. «Todos juntos» refuerza el sentido colectivo del grupo mencionado.
- source_word: יִלָּכֵדוּ
  english_pob_choice: will be taken
  chosen_spanish: serán apresados
  alternatives_spanish:
  - serán capturados
  - serán tomados
  lexicon: HALOT
  rationale: El nifal de לכד puede expresar ser capturado o apresado. «Apresados» mantiene el matiz de ser aprehendidos por juicio, sin limitarlo al ámbito militar.
- source_word: אִישׁ עִם אִשָּׁה
  english_pob_choice: both man and woman
  chosen_spanish: tanto el hombre como la mujer
  alternatives_spanish:
  - hombre y mujer
  - ambos, hombre y mujer
  lexicon: HALOT
  rationale: La construcción es genérica y abarca a ambos sexos. Esta formulación en español conserva la inclusividad y la coordinación del original.
- source_word: זָקֵן
  english_pob_choice: the old man
  chosen_spanish: el anciano
  alternatives_spanish:
  - el viejo
  - el hombre viejo
  lexicon: HALOT
  rationale: Aquí el sustantivo/adjetivo refiere a una persona de edad avanzada, no a una función de liderazgo. «Anciano» es digno y fiel al sentido etario.
- source_word: מְלֵא יָמִים
  english_pob_choice: the very aged
  chosen_spanish: el muy avanzado en días
  alternatives_spanish:
  - el de muchos días
  - el de edad muy avanzada
  lexicon: HALOT
  rationale: La expresión idiomática significa literalmente «lleno de días». «Muy avanzado en días» mantiene la imagen semítica sin perder inteligibilidad en español.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme a la terminología del proyecto, se traduce «Yahvé» para preservar el nombre del pacto y no ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Compressed syntax of the command to pour out wrath
  english_pob_reading: The verse is rendered as the prophet speaking of being filled with the LORD's wrath and then calling for that wrath to be poured out.
  chosen_spanish_reading: El versículo se entiende como el profeta saturado de la ira de Yahvé y pidiendo que esa ira sea derramada sobre los destinatarios del juicio.
  alternative_spanish_readings:
  - 'Como mandato directo de Yahvé: «Derrámala»'
  - 'Como decisión del profeta: «Yo la derramaré»'
  rationale: La sintaxis hebrea es comprimida y admite más de una segmentación. La redacción española mantiene la fuerza profética sin añadir un sujeto explícito que el texto no exige.
  doctrine_reference: Jeremiah 6:11 source syntax and English POB audit trail
translation_notes:
  revision_awareness: Se siguió el último estado revisado del POB en inglés, donde «gathering» fue ajustado a «company». La versión española reflejó ese matiz con «compañía de los jóvenes». También se conservó la tensión sintáctica del hebreo sin forzar una puntuación interpretativa adicional.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la terminología del proyecto para el nombre divino.
  - «Ira» se eligió frente a «furor/furia» por naturalidad en español, pero la nota conserva la alternativa.
  - «Compañía» reproduce el valor de grupo reunido del hebreo סוֹד y coincide con la revisión inglesa.
  - «Muy avanzado en días» preserva la imagen idiomática de מְלֵא יָמִים sin convertirla en mera paráfrasis.
