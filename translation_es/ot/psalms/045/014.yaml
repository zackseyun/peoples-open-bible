    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Toda
  alternatives_spanish:
  - Toda la
  - Enteramente
  lexicon: HALOT
  rationale: Aquí כָּל funciona de modo intensivo con כְּבוּדָּה; en español, «Toda gloria» conserva el valor totalizador/predicativo sin sonar forzado.
- source_word: כְּבוּדָּה
  english_pob_choice: glorious
  chosen_spanish: gloria
  alternatives_spanish:
  - gloriosa
  - esplendor
  - honor
  lexicon: HALOT
  rationale: El sustantivo כבוד apunta a gloria/esplendor. En español, «gloria» mantiene mejor el sustantivo hebreo que un adjetivo, y permite la lectura predicativa del verso.
- source_word: בַת מֶלֶךְ
  english_pob_choice: the king’s daughter
  chosen_spanish: la hija del rey
  alternatives_spanish:
  - la princesa
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea de parentesco y su transparencia literal. «Princesa» sería interpretativo y menos pegado al wording del texto.
- source_word: פְּנִימָה
  english_pob_choice: within
  chosen_spanish: adentro
  alternatives_spanish:
  - dentro
  - en lo interior
  - en el palacio
  lexicon: HALOT
  rationale: '«Adentro» conserva la ambigüedad del hebreo: puede aludir a estar en el interior físico o sugerir belleza interior. No se especifica más de lo que el texto exige.'
- source_word: מִמִּשְׁבְּצוֹת
  english_pob_choice: of woven
  chosen_spanish: de oro tejido
  alternatives_spanish:
  - bordada con oro
  - con adornos de oro
  - con engastes de oro
  lexicon: HALOT
  rationale: El término puede implicar trabajo entretejido, incrustado o adornado. En este contexto de vestidura y oro, «tejido» comunica bien la ornamentación textil sin imponer un sentido joyero.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - dorado
  lexicon: HALOT
  rationale: «Oro» es el equivalente directo y mantiene la imagen material del texto.
- source_word: לְבוּשָׁהּ
  english_pob_choice: her clothing
  chosen_spanish: su vestidura
  alternatives_spanish:
  - su vestido
  - su ropa
  lexicon: HALOT
  rationale: «Vestidura» es una opción digna y precisa para el lenguaje poético bíblico, sin restringir indebidamente el tipo de prenda.
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante/vocalizado como base y se tomó en cuenta el audit trail inglés, especialmente la ambigüedad de פְּנִימָה y la amplitud semántica de מִשְׁבְּצוֹת. No hubo revisiones aplicadas en el expediente inglés; la redacción española procura conservar esas tensiones sin resolverlas de forma excesiva.
  spanish_consistency_notes:
  - Se mantuvo «hija del rey» en lugar de «princesa» por transparencia al hebreo.
  - Se evitó «SEÑOR» porque el verso no contiene el Tetragrámaton ni un sustituto contextual.
  - «Oro tejido» conserva la idea de arte textil y ornamentación, compatible con la lectura de la POB en inglés.
  - La puntuación coloca el punto y coma para reflejar la transición entre la descripción general y la del vestido.
