translation:
  language: es
  text: Y viendo que también mi padre, siempre que hacía campaña[a] en las regiones altas, designaba al que habría de sucederle,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acampaba»; el verbo griego puede entenderse más literalmente como «acampar», pero en este contexto militar amplio también puede significar «hacer campaña».
    reason: lexical_alternative
lexical_decisions:
- source_word: θεωρῶν
  english_pob_choice: seeing
  chosen_spanish: viendo
  alternatives_spanish:
  - considerando
  - observando
  lexicon: LSJ
  rationale: El participio introduce la razón del hablante; «viendo» conserva el valor causal e idiomático del inglés y resulta natural en español.
- source_word: πατήρ
  english_pob_choice: father
  chosen_spanish: mi padre
  alternatives_spanish:
  - el padre
  - su padre
  lexicon: LSJ
  rationale: El contexto es de referencia directa del hablante a su propio padre; el posesivo explícito evita ambigüedad en español.
- source_word: καθʼ οὓς καιρούς
  english_pob_choice: whenever
  chosen_spanish: siempre que
  alternatives_spanish:
  - cada vez que
  - cuandoquiera que
  lexicon: LSJ
  rationale: La frase es iterativa/distributiva; «siempre que» conserva esa recurrencia con un registro natural.
- source_word: εἰς τοὺς ἄνω τόπους
  english_pob_choice: in the upper regions
  chosen_spanish: en las regiones de arriba
  alternatives_spanish:
  - a las regiones de arriba
  - en las regiones altas
  - en las regiones del interior
  lexicon: LSJ
  rationale: Se preserva la referencia espacial de ἄνω («arriba») sin sobreespecificar geografía; «regiones de arriba» mantiene el matiz literal y comprensible.
- source_word: ἐστρατοπέδευσεν
  english_pob_choice: campaigned
  chosen_spanish: acampaba
  alternatives_spanish:
  - hacía campaña
  - se apostaba
  lexicon: LSJ
  rationale: El audit trail inglés optó por el sentido militar amplio, pero el griego también puede significar «acampar»; en español «acampaba» mantiene la tensión lexical sin imponer un tecnicismo moderno.
- source_word: ἀνέδειξεν
  english_pob_choice: appointed
  chosen_spanish: designaba
  alternatives_spanish:
  - nombraba
  - appointó
  lexicon: LSJ
  rationale: En contexto se trata de una designación formal del sucesor; «designaba» expresa esa acción oficial sin añadir un matiz jurídico excesivo.
- source_word: τὸν διαδεξάμενον
  english_pob_choice: the one who would succeed him
  chosen_spanish: al que habría de sucederle
  alternatives_spanish:
  - a su sucesor
  - al que lo sucedería
  lexicon: LSJ
  rationale: La construcción verbal del participio se conserva con una relativa futura; evita reducirlo a un mero sustantivo y mantiene la idea de sucesión.
