translation:
  language: es
  text: Entonces Hatac salió a Mardoqueo[a], a la plaza de la ciudad que estaba frente a la puerta del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al espacio abierto de la ciudad»; el término hebreo se refiere a un área pública amplia y abierta, no necesariamente a una calle en el sentido moderno.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue
  - partió
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción pasada completa. En español, «salió» conserva bien la idea direccional de abandonar un lugar, con naturalidad narrativa.
- source_word: הֲתָךְ
  english_pob_choice: Hathach
  chosen_spanish: Hatac
  alternatives_spanish:
  - Hatach
  lexicon: convención de transliteración
  rationale: Se translitera el nombre propio. En español, «Hatac» mantiene una forma legible y cercana a la pronunciación esperable en el contexto bíblico.
- source_word: אֶל מָרְדֳּכָי
  english_pob_choice: to Mordecai
  chosen_spanish: hacia Mardoqueo
  alternatives_spanish:
  - a Mardoqueo
  - para Mardoqueo
  lexicon: HALOT
  rationale: אֶל puede indicar dirección o destino. Aquí «hacia Mardoqueo» conserva el matiz direccional del movimiento y suena natural en español narrativo.
- source_word: אֶל רְחוֹב הָעִיר
  english_pob_choice: to the open square of the city
  chosen_spanish: al ensanchamiento de la ciudad
  alternatives_spanish:
  - a la plaza de la ciudad
  - al espacio abierto de la ciudad
  - a la plaza abierta de la ciudad
  lexicon: HALOT
  rationale: רְחוֹב designa un espacio amplio y abierto, no necesariamente una calle moderna. «Ensanchamiento» intenta reflejar ese valor espacial sin reducirlo a una calle o plaza demasiado específica; mantiene la amplitud del término hebreo.
- source_word: אֲשֶׁר לִפְנֵי
  english_pob_choice: that was in front of
  chosen_spanish: que estaba frente a
  alternatives_spanish:
  - que estaba delante de
  - que quedaba ante
  lexicon: HALOT
  rationale: La cláusula relativa ubica el lugar respecto de la puerta. «Frente a» es el modo más natural en español para לִפְנֵי y conserva la relación espacial.
- source_word: שַׁעַר הַמֶּלֶךְ
  english_pob_choice: the king's gate
  chosen_spanish: la puerta del rey
  alternatives_spanish:
  - la puerta real
  - la puerta del rey
  lexicon: HALOT
  rationale: El constructo hebreo es posesivo. «La puerta del rey» reproduce de manera literal y clara la referencia recurrente en Ester.
translation_notes:
  revision_awareness: Coincide con el testimonio hebreo masorético disponible y con el audit trail en inglés; no se requieren ajustes textuales ni de sentido respecto de la pasada de revisión más reciente.
  spanish_consistency_notes:
  - Se mantiene la transliteración de nombres propios y la referencia constante a «la puerta del rey», coherente con el contexto de Ester.
  - Se evita traducir רְחוֹב como «calle» para no estrechar indebidamente su alcance espacial.
  - La nota al pie preserva la alternativa léxica documentada por el POB en inglés, adaptada al español.
