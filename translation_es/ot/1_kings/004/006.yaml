translation:
  language: es
  text: y Ahisar estaba a cargo de la casa real[a], y Adoniram hijo de Abda estaba a cargo del trabajo forzado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del palacio» / «de la casa». El hebreo dice literalmente «sobre la casa», un título cortesano para la supervisión de la casa real.
    reason: lexical_alternative
  - marker: b
    text: O «de la leva de trabajo». El término hebreo se refiere al servicio obligatorio del Estado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲחִישָׁר
  english_pob_choice: and Ahishar
  chosen_spanish: y Ahisar
  alternatives_spanish:
  - y Ahishar
  - y Ajisar
  lexicon: Nombre propio; transliteración del hebreo
  rationale: Se conserva el nombre propio sin traducir. La forma «Ahisar» sigue la transliteración más natural para el español y mantiene la referencia al funcionario.
- source_word: עַל הַבָּיִת
  english_pob_choice: was over the household
  chosen_spanish: estaba sobre la casa
  alternatives_spanish:
  - estaba sobre el palacio
  - estaba encargado de la casa
  - estaba sobre la casa real
  lexicon: HALOT; contexto administrativo cortesano
  rationale: El hebreo dice literalmente «sobre la casa». En una lista de cargos reales, la frase puede referirse a la administración del hogar real o palacio. Mantengo la metáfora administrativa con «la casa» y no la sustituyo por un equivalente más interpretativo como «el palacio».
- source_word: וַאֲדֹנִירָם
  english_pob_choice: and Adoniram
  chosen_spanish: y Adoniram
  alternatives_spanish:
  - y Adoram
  - y Adoniram
  lexicon: Nombre propio; transliteración del hebreo
  rationale: Se conserva el nombre propio. «Adoniram» sigue la forma dada por la tradición textual y por el auditable del inglés POB.
- source_word: בֶּן עַבְדָּא
  english_pob_choice: son of Abda
  chosen_spanish: hijo de Abda
  alternatives_spanish:
  - descendiente de Abda
  lexicon: Fórmula genealógica estándar
  rationale: La expresión hebrea es la fórmula normal de filiación. «Hijo de» es la opción más directa y fiel para el registro bíblico.
- source_word: עַל הַמַּס
  english_pob_choice: was over the forced labor
  chosen_spanish: sobre el trabajo forzado
  alternatives_spanish:
  - sobre la leva de trabajo
  - sobre la corvea laboral
  - sobre la labor forzada
  lexicon: HALOT; término administrativo de servicio compulsorio
  rationale: מַס en este contexto denota trabajo obligatorio del Estado, no solo impuesto. «Trabajo forzado» comunica claramente esa fuerza semántica en español y conserva la carga coercitiva del término. No se opta por «leva» o «corvea» por ser menos transparentes para la lectura pública.
theological_decisions:
- issue: 'Oficio de Ahisar: «sobre la casa» frente a una paráfrasis explícita'
  english_pob_reading: was over the household
  chosen_spanish_reading: estaba sobre la casa
  alternative_spanish_readings:
  - estaba sobre el palacio
  - estaba encargado de la casa
  rationale: La fuente hebrea usa literalmente «la casa»; la equivalencia funcional de la POB en inglés la interpreta como cargo cortesano. En español se conserva la literalidad para no borrar la tensión entre la metáfora y su sentido administrativo.
  doctrine_reference: Narrativa histórica; terminología de cargos cortesanos en el texto bíblico
- issue: מַס como servicio compulsorio del Estado
  english_pob_reading: forced labor
  chosen_spanish_reading: trabajo forzado
  alternative_spanish_readings:
  - labor forzada
  - leva de trabajo
  rationale: La lectura del POB inglés evita reducir מַס a un simple tributo. «Trabajo forzado» preserva la idea de obligación estatal y la posible dureza del sistema sin introducir un tecnicismo innecesario.
  doctrine_reference: Contexto sociohistórico de la monarquía israelita
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se registran cambios respecto al estado más reciente y el juicio de alta concordancia permanece sin objeciones.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología predeterminada del proyecto cuando corresponda; en este versículo no aparece.
  - Se conserva la coordinación simple con «y» para reflejar el hebreo וַ- y el inglés POB.
  - Se evita «siervo» porque no hay δοῦλος en el texto; el campo semántico relevante es administrativo y laboral.
  - «Casa» se mantiene en el texto principal y se explica en nota para preservar la literalidad hebrea junto con el sentido cortesano.
