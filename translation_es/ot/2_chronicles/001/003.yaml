  to: Así que Salomón y toda la asamblea con él fueron al lugar alto[a] que estaba en Gabaón, porque allí estaba la tienda de reunión[b] de Dios, que Moisés, siervo de Yahvé, había hecho en el desierto.
  rationale: 'Se revisa para alinear el español con el hebreo y con las decisiones documentadas del POB: אֹהֶל מוֹעֵד pasa a «tienda de reunión», y עֶבֶד יְהוָה a «siervo de Yahvé» por tratarse de un título honorífico de Moisés. Se mantiene «lugar alto», «asamblea», «Gabaón», «Dios», «Yahvé» y «en el desierto». También se corrige la nota [a] para que ofrezca una alternativa real.'
