translation:
  language: es
  text: Entonces Moisés se volvió y bajó del monte, con las dos tablas del testimonio en su mano, tablas escritas por ambos lados; por este lado y por aquel lado[a] estaban escritas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por un lado y por el otro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֶן
  english_pob_choice: turned
  chosen_spanish: se volvió
  alternatives_spanish:
  - giró
  - dio vuelta
  lexicon: HALOT
  rationale: El verbo expresa un cambio de dirección antes de descender. En español, «se volvió» comunica bien ese giro sin añadir la expansión de «dio vuelta» ni sonar tan técnico como «giró».
- source_word: וַיֵּרֶד
  english_pob_choice: went down
  chosen_spanish: bajó
  alternatives_spanish:
  - descendió
  - descendió del
  lexicon: HALOT
  rationale: ירד indica bajar/descender. «Bajó» es natural en español narrativo y mantiene la dirección del movimiento sin volverlo demasiado formal.
- source_word: הָהָר
  english_pob_choice: the mountain
  chosen_spanish: el monte
  alternatives_spanish:
  - la montaña
  lexicon: HALOT
  rationale: En el contexto del Sinaí, «el monte» es una equivalencia bíblica clara y natural en español. «La montaña» sería posible, pero menos idiomática en este registro.
- source_word: וּשְׁנֵי לֻחֹת
  english_pob_choice: the two tablets
  chosen_spanish: las dos tablas
  alternatives_spanish:
  - las dos tablas de piedra
  - las dos tabletas
  lexicon: HALOT
  rationale: לֻחֹת son «tablas»; en español bíblico «tablas» es el término más directo y tradicionalmente inteligible. No se añade «de piedra» en el texto principal porque aquí no aparece explícitamente en el hebreo.
- source_word: הָעֵדֻת
  english_pob_choice: the testimony
  chosen_spanish: del testimonio
  alternatives_spanish:
  - del pacto
  - del testimonio del pacto
  lexicon: HALOT
  rationale: עֵדוּת conserva su sentido de «testimonio» como designación de las tablas del pacto. Se mantiene el término sin sustituirlo por una explicación interpretativa más amplia.
- source_word: בְּיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en las manos
  - en la mano
  lexicon: HALOT
  rationale: El hebreo usa singular; en español también se conserva «en su mano», que es idiomático y fiel a la imagen de carga.
- source_word: לֻחֹת כְּתֻבִים
  english_pob_choice: tablets written
  chosen_spanish: tablas escritas
  alternatives_spanish:
  - tablas inscritas
  lexicon: HALOT
  rationale: כְּתֻבִים significa «escritas». Se conserva ese verbo en lugar de «inscritas», que aunque plausible para piedra, introduce una concreción no expresada por el hebreo.
- source_word: מִשְּׁנֵי עֶבְרֵיהֶם
  english_pob_choice: on both their sides
  chosen_spanish: por ambos lados
  alternatives_spanish:
  - en ambos lados
  - de ambos lados
  lexicon: HALOT
  rationale: La expresión indica que la escritura ocupaba las dos caras de las tablas. «Por ambos lados» es un español natural y recoge esa distribución sin sobreexplicar.
- source_word: מִזֶּה וּמִזֶּה
  english_pob_choice: on this side and on that
  chosen_spanish: por este lado y por aquel lado
  alternatives_spanish:
  - por un lado y por el otro
  - de un lado y del otro
  lexicon: HALOT
  rationale: La repetición distributiva se traduce con una pareja balanceada en español. «Por este lado y por aquel lado» preserva la cadencia y el énfasis contrastivo del hebreo.
- source_word: הֵם כְּתֻבִים
  english_pob_choice: they were written
  chosen_spanish: estaban escritas
  alternatives_spanish:
  - eran escritas
  - fueron escritas
  lexicon: HALOT
  rationale: El hebreo retoma y recalca la condición de estar escritas. En español, «estaban escritas» transmite ese estado resultante y conserva la repetición enfática sin forzar el aspecto verbal.
theological_decisions:
- issue: Renderización de עֵדוּת en la frase tradicional de las tablas
  english_pob_reading: the testimony
  chosen_spanish_reading: el testimonio
  alternative_spanish_readings:
  - el pacto
  - el testimonio del pacto
  - el documento del pacto
  rationale: Se conserva el valor lexical y teológico de עֵדוּת como designación de las tablas vinculadas al pacto. «El testimonio» mantiene el término bíblico sin reducirlo a una explicación doctrinal posterior ni sustituirlo por una paráfrasis.
  doctrine_reference: Éxodo 25:16, 21; 31:18; 32:15
translation_notes:
  revision_awareness: Coincide con el audit trail inglés en la decisión de mantener la imagen narrativa de ‘turn/descend’ y el léxico de ‘testimony’, sin añadir ‘de piedra’ al texto principal. También conserva la redundancia hebrea sobre las dos caras y el paralelismo distributivo final.
  spanish_consistency_notes:
  - Se prefirió «tablas» sobre «tablas de piedra» para no importar un detalle no explícito en este versículo.
  - «Se volvió» y «bajó» mantienen un registro bíblico natural en español sin calco rígido.
  - 'La repetición final se conserva en una forma fluida: «por ambos lados» / «por este lado y por aquel lado» / «estaban escritas».'
