translation:
  language: es
  text: Todo novio tomó[a] lamento; la que estaba sentada en el aposento nupcial llegó a estar de luto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más simplemente: «Todo novio lamentó; la que estaba sentada en el aposento nupcial estaba de luto». El griego usa una expresión poética comprimida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς
  english_pob_choice: Every
  chosen_spanish: Todo
  alternatives_spanish:
  - Cada
  - Todo y cada
  lexicon: LSJ
  rationale: Con νυμφίος en singular, el valor distributivo se conserva mejor en español con «Todo» que con un plural generalizador. «Cada» también sería posible, pero suena menos natural con un sustantivo de rol como «novio».
- source_word: νυμφίος
  english_pob_choice: bridegroom
  chosen_spanish: novio
  alternatives_spanish:
  - esposo
  - desposado
  lexicon: LSJ
  rationale: En español bíblico moderno, «novio» comunica el contexto nupcial con claridad y evita un giro demasiado eclesiástico o anticuado. «Esposo» podría sugerir estado marital ya consumado, y «desposado» suena más arcaico.
- source_word: ἀνέλαβε
  english_pob_choice: took up
  chosen_spanish: tomó
  alternatives_spanish:
  - tomó sobre sí
  - levantó
  - asumió
  lexicon: LSJ
  rationale: El griego con θρῆνον expresa la acción de emprender o tomar una lamentación. «Tomó» conserva ese valor verbal breve y poético en español; «levantó» sería menos natural aquí.
- source_word: θρῆνον
  english_pob_choice: lamentation
  chosen_spanish: lamento
  alternatives_spanish:
  - lamentación
  - dirge
  - duelo
  lexicon: LSJ
  rationale: «Lamento» mantiene el registro poético y evita cargar el término con una forma técnica o demasiado funeraria. «Lamentación» también es posible, pero resulta más larga y menos ágil en la línea poética.
- source_word: καθημένη
  english_pob_choice: she who sat
  chosen_spanish: la que estaba sentada
  alternatives_spanish:
  - la sentada
  - quien estaba sentada
  - la que se sentaba
  lexicon: LSJ
  rationale: La participio femenina queda implícita en español con una relativa natural. «La que estaba sentada» conserva la imagen sin forzar un calco rígido.
- source_word: ἐν παστῷ
  english_pob_choice: in the bridal chamber
  chosen_spanish: en el aposento nupcial
  alternatives_spanish:
  - en la cámara nupcial
  - en el cuarto nupcial
  - en la alcoba nupcial
  lexicon: LSJ
  rationale: «Aposento nupcial» comunica el espacio matrimonial con dignidad y evita una expresión demasiado moderna. «Bridal chamber» no tiene equivalente tan idiomático en una sola fórmula española, y «alcoba» puede sugerir intimidad sexual más que simplemente la estancia nupcial.
- source_word: ἐγένετο ἐν πένθει
  english_pob_choice: became one in mourning
  chosen_spanish: se volvió en duelo
  alternatives_spanish:
  - vino a estar en duelo
  - se halló en duelo
  - pasó a duelo
  lexicon: LSJ
  rationale: El griego marca cambio de estado; «se volvió en duelo» intenta conservar ese movimiento, aunque de manera más natural en español que un literalismo como «se hizo en duelo». «Duelo» expresa el estado de luto/mourning sin perder solemnidad.
translation_notes:
  revision_awareness: El texto griego presenta sintaxis poética comprimida; la versión española procura conservar el paralelismo y el cambio de estado sin endurecer la fraseología.
  spanish_consistency_notes:
  - Se usa «duelo» para πένθει como equivalente de mourning/lamenting state, manteniendo el registro solemne.
  - Se evita «Cristo», «SEÑOR» u أخرى terminología doctrinal no pertinente al pasaje.
  - La nota textual/lexical refleja la alternativa más lisa que el propio audit trail inglés preserva.
