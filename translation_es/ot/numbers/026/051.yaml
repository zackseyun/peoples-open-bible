translation:
  language: es
  text: 'Estos son los hombres registrados[a] de los hijos de Israel[b]: seiscientos un mil setecientos treinta.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los contados»; el hebreo se refiere a quienes fueron registrados en el censo.
    reason: lexical_alternative
  - marker: b
    text: O «los israelitas». Literalmente, «los hijos de Israel».
