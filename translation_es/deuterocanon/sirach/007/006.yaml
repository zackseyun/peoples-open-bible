revisions:
- from: No busques hacerte juez, no sea que no puedas apartar la injusticia; no sea que te acobardes ante el rostro de un poderoso, y pongas un tropiezo en tu rectitud[a].
  to: No te acobardes ante un noble, no sea que pongas un soborno contra tu integridad[a].
  rationale: Se elimina la primera mitad griega ajena al texto hebreo base de este registro y se restituye la prioridad del hebreo en el cuerpo principal. «Te acobardes» preserva la fuerza de תָגוּר; «noble» sigue la decisión auditada para נָדִיב; «soborno» refleja la concreción de בֶּצַע; «contra tu integridad» comunica de forma natural en español la idea de comprometer la propia rectitud. La lectura griega alternativa se conserva en nota, como en el English POB.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:33:48Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español no sigue fielmente el expediente fuente. El hebreo extante para Sir 7:6 corresponde solo a la segunda mitad del versículo: una advertencia contra acobardarse ante un noble/poderoso y así introducir corrupción en la propia rectitud. El English POB, conforme a la política del proyecto, traduce esa mitad hebrea y deja en nota la alternativa griega. El borrador español, en cambio, incorporó la primera mitad griega («No busques hacerte juez…») y además puso en el texto principal la lectura griega «pongas un tropiezo en tu rectitud», relegando el hebreo a nota. Eso invierte la prioridad de fuentes documentada.'
  spanish_quality_summary: 'El español es legible, pero el texto principal resulta demasiado largo para este registro y mezcla dos tradiciones textuales. Además, «ante el rostro de un poderoso» suena algo calcado; «ante un noble» o «ante un poderoso» es más natural. Para el sentido documentado, conviene un español directo: «No te acobardes ante un noble, no sea que pongas un soborno contra tu integridad[a].»'
  glossary_alignment: 'No hay términos del glosario maestro especialmente en juego, pero sí hay desalineación con las decisiones léxicas auditadas: תָגוּר debe reflejar intimidación/acobardamiento; נָדִיב debe conservar la noción de noble/prominente; בֶּצַע se decidió como «soborno» en el cuerpo principal, no solo en nota; y בִּתְמִימִיךָ debe comunicar integridad/rectitud propia comprometida. El borrador sustituyó indebidamente estas decisiones por la formulación griega.'
  issues:
  - severity: high
    issue: El texto principal usa la apertura griega «No busques hacerte juez…» que no pertenece al texto hebreo base de este registro.
    rationale: La política auditada indica traducir del hebreo donde sobrevive; aquí el hebreo disponible corresponde a la segunda mitad del versículo, y el English POB solo traduce esa mitad.
  - severity: high
    issue: El borrador da prioridad en el cuerpo a la lectura griega «pongas un tropiezo en tu rectitud» en lugar del hebreo «soborno».
    rationale: El expediente lexical y teológico decidió explícitamente traducir בֶּצַע como «a bribe» en el texto principal, preservando la alternativa griega en nota.
  - severity: medium
    issue: «Ante el rostro de un poderoso» es un calco poco natural en español.
    rationale: Aunque προσώπου/מִפְּנֵי pueden motivar una expresión concreta, el español bíblico actual suena más natural con «ante un noble» o «ante un poderoso» sin perder sentido.
  - severity: medium
    issue: La nota invierte la relación entre hebreo principal y griego alternativo.
    rationale: Debe indicarse que el griego dice «pongas un tropiezo en tu rectitud», mientras el hebreo principal se ha traducido con «soborno».
  revised_spanish_text: No te acobardes ante un noble, no sea que pongas un soborno contra tu integridad[a].
  revised_footnotes:
  - marker: a
    text: 'Griego: «no sea que pongas un tropiezo en tu rectitud». El hebreo es más concreto con un término de ganancia injusta, aquí traducido «soborno».'
    reason: alternative_reading
  revision_rationale: Se elimina la primera mitad griega ajena al texto hebreo base de este registro y se restituye la prioridad del hebreo en el cuerpo principal. «Te acobardes» preserva la fuerza de תָגוּר; «noble» sigue la decisión auditada para נָדִיב; «soborno» refleja la concreción de בֶּצַע; «contra tu integridad» comunica de forma natural en español la idea de comprometer la propia rectitud. La lectura griega alternativa se conserva en nota, como en el English POB.
