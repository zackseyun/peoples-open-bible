id: PHP.1.16
reference: Philippians 1:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οἱ μὲν ἐξ ⸂ἀγάπης, εἰδότες ὅτι εἰς ἀπολογίαν τοῦ εὐαγγελίου κεῖμαι⸃,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/016.yaml
  text: The former do so out of love, knowing that I am appointed for the defense of the good news,
translation:
  language: ko
  text: 앞의 사람들[a]은 사랑으로 그리하니, 내가 복음을 변호하기 위하여 세움받았음을[b] 알고 있기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어는 「한편으로는」 정도의 생략 구문이며, 다음 절(οἱ δέ)의 대조 안에서 전파 행위가 함축된다.
    reason: alternative_reading
  - marker: b
    text: 또는 「내가 복음의 변호를 위해 놓여 있음을」. 헬라어 κεῖμαι는 본래 「놓이다·자리하다」의 의미이며, 여기서는 바울이 자신의 옥중 상황을 하나님이 정하신 자리로 받아들이고 있음을 표현한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ μὲν
  english_pob_choice: The former do so
  chosen_korean: 앞의 사람들은 ~ 그리하니
  alternatives_korean:
  - 한쪽은
  - 이쪽은
  lexicon: BDAG
  rationale: 헬라어는 생략적 표현으로 다음 절의 οἱ δέ와 대조된다. 한국어로 「앞의 사람들 ~ 그리하니」로 구성하여 함축된 동사와 대조를 자연스럽게 살린다.
- source_word: ἐξ ἀγάπης
  english_pob_choice: out of love
  chosen_korean: 사랑으로
  alternatives_korean:
  - 사랑에서
  - 사랑 때문에
  lexicon: BDAG
  rationale: ἐκ + 추상명사는 동기·근거를 표현한다. 「사랑으로」가 한국어로 가장 자연스러우며, 헬라어 어법을 보존한다.
- source_word: εἰδότες
  english_pob_choice: knowing
  chosen_korean: 알고 있기 때문입니다
  alternatives_korean:
  - 알기에
  - 알고
  lexicon: BDAG
  rationale: 분사가 사랑의 행위의 근거를 표현하므로, 「알고 있기 때문입니다」로 인과적 종결문을 세워 한국어 어법을 자연스럽게 한다.
- source_word: εἰς ἀπολογίαν
  english_pob_choice: for the defense
  chosen_korean: ~을 변호하기 위하여
  alternatives_korean:
  - 변호를 위하여
  - 변론을 위하여
  lexicon: BDAG
  rationale: ἀπολογία는 법정적·이성적 변호를 가리킨다. 「변호하기 위하여」가 자연스럽고 εἰς의 목적적 함의를 살린다.
- source_word: τοῦ εὐαγγελίου
  english_pob_choice: of the good news
  chosen_korean: 복음을
  alternatives_korean:
  - 복음의
  - 좋은 소식의
  lexicon: BDAG
  rationale: 「복음」이 한국어 정형 등가어이다. 영어 POB가 「good news」로 옮겼지만, 한국어에서는 「좋은 소식」이 무게가 약하다.
- source_word: κεῖμαι
  english_pob_choice: am appointed
  chosen_korean: 세움받았음
  alternatives_korean:
  - 놓여 있음
  - 자리하고 있음
  - 정하여졌음
  lexicon: BDAG
  rationale: κεῖμαι는 본래 「놓이다」이나 여기서 바울이 자신의 처지를 하나님의 정하신 자리로 받아들이는 함의를 가진다. 「세움받았다」가 그 신적 정하심을 자연스럽게 담는다.
