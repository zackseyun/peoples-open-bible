  glossary_alignment: Alineación parcial. 'Juramento' para אָלָה concuerda con el expediente inglés y conserva la alternativa 'maldición' en nota. Pero para בְּרִית, el borrador usa 'pacto' aunque el contexto deuteronómico y la racionalidad teológica favorecen 'alianza' en español eclesial legible. No hay conflicto con las demás pautas de terminología del proyecto.
