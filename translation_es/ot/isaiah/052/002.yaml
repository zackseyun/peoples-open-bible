  to: Sacúdete del polvo; levántate, siéntate[a], Jerusalén. Suelta las ataduras de tu cuello[b], cautiva hija de Sion[c].
  rationale: La revisión corrige el principal desajuste con el hebreo al restituir la separación explícita de מֵעָפָר en «del polvo», elimina una nota mal priorizada, y añade la alternativa léxica documentada para «hija de Sion». Se mantiene el resto del borrador porque es fiel, claro y consistente con la revisión inglesa del POB.
