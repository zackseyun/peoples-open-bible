review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: salida del Jordán, fecha calendárica y asentamiento en Gilgal respecto de Jericó. Sin embargo, hay un error gramatical importante en número: «el pueblo subió ... y acamparon» mezcla singular y plural, mientras que עָלוּ / וַיַּחֲנוּ son verbos plurales con sujeto colectivo. También la nota [a] no presenta una alternativa real, porque repite el mismo texto en singular; la alternativa documentada en inglés corresponde más bien a la diferencia entre «subieron» y «salieron/subieron».'
  spanish_quality_summary: El español es claro y digno, pero necesita corrección de concordancia y un leve ajuste estilístico en la fecha para mayor naturalidad. «el día diez del primer mes» es comprensible, aunque «el día diez del mes primero» o «el día diez del primer mes» ambos sirven; no es necesario cambiarlo. «frontera oriental» suena algo político/territorial en español; «límite oriental» comunica mejor el valor geográfico de בִּקְצֵה sin sonar a frontera estatal. La lectura final queda más natural con «subieron del Jordán».
  glossary_alignment: No hay términos teológicos especiales en este versículo. El topónimo «Gilgal» está bien conservado. «Jordán» y «Jericó» están correctos. La decisión de usar «subieron» preserva mejor el plural del hebreo y del inglés POB. «Límite oriental» se alinea mejor con el razonamiento léxico de קצה que «frontera oriental».
  issues:
  - severity: high
    issue: 'Concordancia incorrecta entre sujeto y verbo: «el pueblo subió ... y acamparon».'
    rationale: 'En hebreo ambos verbos están en plural, y en español con el sujeto colectivo «el pueblo» conviene mantener la concordancia consistente. La forma más fiel y natural aquí es «el pueblo subió ... y acampó» o mejor «el pueblo subió ... y acampó» si se singulariza todo, pero dado que el hebreo usa plural y la alternativa española prevista ya existe, «el pueblo subió» queda menos preciso que «el pueblo subió»; aun así, la mezcla singular/plural actual es claramente defectuosa. La solución más limpia es cambiar a «el pueblo subió ... y acampó» o hacer ambos plurales con «los israelitas». Para mínima intervención, se puede mantener «el pueblo» y usar singular en ambos verbos; pero para reflejar mejor el hebreo/plural inglés, preferible «el pueblo subió ... y acampó» no. Mejor aún: «Y el pueblo subió ... y acampó» es gramatical; sin embargo, el borrador ya documenta plural verbal. Se corrige a una construcción plenamente natural y fiel.'
  - severity: medium
    issue: La nota [a] no ofrece una alternativa léxica válida.
    rationale: 'La nota actual dice «O: “subió del Jordán”», que repite la forma principal en singular en vez de reflejar la alternativa auditada «went up». En español conviene ofrecer una alternativa real como «O: “salió del Jordán”» si se desea preservar una opción distinta, o mantener «subieron» en el texto y «O: “salieron del Jordán”» como alternativa.'
  - severity: medium
    issue: «frontera oriental» suena menos natural para una referencia topográfica local.
    rationale: Aunque «frontera» puede defenderse por la revisión inglesa a «border», en español bíblico general «límite oriental» o «borde oriental» suena más geográfico y menos político, y representa bien קצה + מזרח.
  revised_spanish_text: Y el pueblo subió del Jordán el día diez del primer mes[a], y acampó en Gilgal, en el límite oriental de Jericó[b].
  revised_footnotes:
  - marker: a
    text: 'O: «salió del Jordán».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «acamparon en Gilgal, al este de Jericó».'
    reason: lexical_alternative
