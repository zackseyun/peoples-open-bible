translation:
  language: es
  text: Y en el quinto año de Joram hijo de Ahab, rey de Israel, mientras Jehosafat era rey de Judá[a], Jehoram[b] hijo de Jehosafat, rey de Judá, comenzó a reinar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más literalmente, «y Jehosafat rey de Judá». La cláusula hebrea está comprimida; algunos la entienden como reflejo de un período de corregencia.
    reason: alternative_reading
  - marker: b
    text: 'El hebreo distingue los nombres: «Joram» (rey de Israel) y «Jehoram» (hijo de Jehosafat, rey de Judá), aunque estas formas están estrechamente relacionadas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בִ/שְׁנַת חָמֵשׁ
  english_pob_choice: And in the fifth year of
  chosen_spanish: Y en el quinto año de
  alternatives_spanish:
  - En el quinto año de
  - Y durante el quinto año de
  lexicon: HALOT
  rationale: La fórmula cronológica regnal se expresa de manera natural en español con 'en el quinto año de'. Se conserva la conexión narrativa con 'Y' sin volver la frase pesada ni calcar innecesariamente la preposición hebrea.
- source_word: לְ/יוֹרָם
  english_pob_choice: of Joram
  chosen_spanish: de Joram
  alternatives_spanish:
  - de Joram
  - para Joram
  lexicon: HALOT
  rationale: La preposición marca el año contado respecto de Joram; 'de Joram' es la forma idiomática y fiel en español para una datación regnal.
- source_word: בֶּן אַחְאָב
  english_pob_choice: son of Ahab
  chosen_spanish: hijo de Ahab
  alternatives_spanish:
  - hijo de Ahab
  lexicon: HALOT
  rationale: Se mantiene el patronímico de identificación histórica sin añadir matiz interpretativo.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - rey de Israel
  lexicon: HALOT
  rationale: Título real estándar, conservado de forma directa y transparente.
- source_word: וִ/יהוֹשָׁפָט מֶלֶךְ יְהוּדָה
  english_pob_choice: while Jehoshaphat was king of Judah
  chosen_spanish: mientras Jehosafat era rey de Judá
  alternatives_spanish:
  - y Jehosafat rey de Judá
  - con Jehosafat rey de Judá
  lexicon: HALOT
  rationale: El hebreo es comprimido y carece de verbo; el español requiere explicitar la relación temporal. 'Mientras era rey' comunica la circunstancia sin resolver en el texto principal la tensión cronológica ni imponer una explicación de corregencia.
- source_word: מָלַךְ
  english_pob_choice: began to reign
  chosen_spanish: comenzó a reinar
  alternatives_spanish:
  - empezó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: En notices regios, el verbo señala la entronización/inicio del reinado. 'Comenzó a reinar' es natural en español y preserva el valor ingressivo.
- source_word: יְהוֹרָם
  english_pob_choice: Jehoram
  chosen_spanish: Jehoram
  alternatives_spanish:
  - Joram
  lexicon: HALOT
  rationale: Se conserva la distinción gráfica frente a יוֹרָם ('Joram') al comienzo del versículo, siguiendo la decisión auditable de la POB inglesa de diferenciar ambos nombres hebreos emparentados.
- source_word: בֶּן יְהוֹשָׁפָט
  english_pob_choice: son of Jehoshaphat
  chosen_spanish: hijo de Jehosafat
  alternatives_spanish:
  - hijo de Jehosafat
  lexicon: HALOT
  rationale: Patronímico histórico mantenido de forma formal y clara.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - rey de Judá
  lexicon: HALOT
  rationale: Se conserva el título final como identificación del rey de Judá; en español queda más natural si se deja en aposición fluida tras el nombre y el patronímico.
theological_decisions:
- issue: Cláusula cronológica comprimida sobre el reinado de Jehosafat y la subida al trono de Jehoram
  english_pob_reading: Render the verbless phrase temporally as 'while Jehoshaphat was king of Judah' without attempting to resolve the broader chronology beyond the verse itself.
  chosen_spanish_reading: '''mientras Jehosafat era rey de Judá'' sin añadir ''corregencia'' en el texto principal.'
  alternative_spanish_readings:
  - y Jehosafat rey de Judá
  - mientras Jehosafat reinaba en Judá
  - y Jehosafat, rey de Judá
  rationale: El hebreo presenta una tensión cronológica conocida, pero no la resuelve explícitamente. La traducción debe preservar esa tensión y ofrecer una lectura fluida, sin importar al texto principal una conclusión histórica no formulada allí.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción española sigue la última revisión inglesa en dos puntos relevantes: (1) mantiene la distinción entre Joram y Jehoram, reflejando las dos formas hebreas; (2) expresa el inicio del reinado con un verbo ingressivo (''comenzó a reinar''), equivalente al ''began to reign'' de la revisión más reciente, en vez de un simple perfecto que podría sugerir duración del reinado.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma de la POB para el nombre divino, pero este versículo no lo contiene.
  - Se mantiene 'rey de Judá' en aposición final para reflejar la estructura del hebreo sin sobreinterpretar el orden.
  - Se opta por 'Jehosafat' en la transliteración del nombre para uniformidad con la tradición POB en español y para evitar ambigüedad con la variante inglesa Jehoshaphat.
