  language: en
  yaml_path: translation/ot/2_chronicles/035/007.yaml
  text: Josiah contributed to the people from the flock[a], lambs and young goats, all of them for the Passover offerings, for all who were present, to the number of thirty thousand, and three thousand cattle[b]. These were from the king’s possessions.
  footnotes:
