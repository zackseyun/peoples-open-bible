  text: Ἡ ἀγάπη μακροθυμεῖ, χρηστεύεται ἡ ἀγάπη, οὐ ζηλοῖ ⸂ἡ ἀγάπη⸃, οὐ περπερεύεται, οὐ φυσιοῦται,
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/013/004.yaml
  text: Love is patient[a], love is kind. It does not envy, it does not boast[b], it is not puffed up.
  footnotes:
  - marker: a
    text: Or 'is jealous' for 'does not envy'; the Greek verb can denote either positive zeal or negative jealousy/envy, but the negative context here favors 'envy.'
    reason: lexical_alternative
  - marker: b
    text: Or 'is arrogant' for 'is puffed up'; Paul uses a metaphor of being inflated with pride.
    reason: lexical_alternative
translation:
  language: ko
  text: 사랑은 오래 참습니다. 사랑은 친절합니다. 사랑은 시기하지 않습니다. 사랑은 자랑하지 않으며 교만하지 않습니다.
  philosophy: optimal-equivalence
