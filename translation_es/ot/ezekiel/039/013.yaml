translation:
  language: es
  text: Todo el pueblo del país los enterrará, y esto les será para renombre[a] en el día en que yo me glorifique[b] —declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «esto será para ellos un nombre»; el hebreo usa un modismo que expresa honor o renombre.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en el día en que sea glorificado» o «en el día en que muestre mi gloria».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְקָבְרוּ
  english_pob_choice: will bury
  chosen_spanish: los enterrará
  alternatives_spanish:
  - enterrará
  - sepultará
  lexicon: HALOT
  rationale: El verbo qal con waw consecutiva en este contexto profético expresa acción futura. «Enterrará» es claro y natural en español; «sepultará» es una alternativa válida, pero «enterrar» mantiene la concreción del acto sin elevar demasiado el registro.
- source_word: כָּל עַם הָאָרֶץ
  english_pob_choice: all the people of the land
  chosen_spanish: Todo el pueblo de la tierra
  alternatives_spanish:
  - Toda la gente de la tierra
  - Todos los habitantes de la tierra
  lexicon: HALOT
  rationale: «עַם» conserva mejor la idea colectiva de un solo pueblo que «gente». «De la tierra» reproduce el genitivo sin ampliar indebidamente a «mundo». En español, el singular colectivo «todo el pueblo» es idiomático y fiel.
- source_word: וְהָיָה לָהֶם לְשֵׁם
  english_pob_choice: it will be to their renown
  chosen_spanish: esto les será para renombre
  alternatives_spanish:
  - esto les será para nombre
  - esto les traerá honra
  - esto les será un nombre
  lexicon: HALOT
  rationale: La expresión hebrea idiomática לְשֵׁם significa literalmente «para nombre», es decir, reputación o renombre. «Para renombre» preserva el sentido idiomático y la posible tensión entre nombre/ honra sin volverlo explicativo en exceso. «Les será» respeta el valor resultativo del hebreo.
- source_word: יוֹם הִכָּבְדִי
  english_pob_choice: on the day I glorify myself
  chosen_spanish: en el día en que yo me glorifique
  alternatives_spanish:
  - en el día en que soy glorificado
  - en el día en que manifieste mi gloria
  - en el día de mi glorificación
  lexicon: HALOT
  rationale: El participio/forma niphal con sufijo de primera persona se entiende mejor aquí en sentido de autoexaltación o auto-vindicación divina. «Me glorifique» conserva el matiz reflexivo mejor que una pasiva pura, y sigue siendo natural en español. Se mantiene la posibilidad de lectura pasiva en nota.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: —declara el Señor Yahvé
  alternatives_spanish:
  - —declara el Señor Dios
  - —oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: El texto hebreo contiene la fórmula profética de cierre. «Declara» traduce נְאֻם de forma sobria y directa. Se usa «Yahvé» conforme al estándar editorial del proyecto para יְהוָה; «Señor» refleja אֲדֹנָי. Se evita «SEÑOR» como máscara tipográfica.
theological_decisions:
- issue: Sentido de la expresión divina יוֹם הִכָּבְדִי
  english_pob_reading: on the day I glorify myself / on the day I am glorified / on the day I show my glory
  chosen_spanish_reading: en el día en que yo me glorifique
  alternative_spanish_readings:
  - en el día en que soy glorificado
  - en el día en que manifieste mi gloria
  rationale: La forma hebrea admite una tensión entre auto-glorificación divina y recepción de gloria por parte de Dios en el juicio y la restauración. La traducción principal mantiene la lectura reflexiva, pero la nota conserva la alternativa pasiva para no borrar la ambigüedad reconocida por el POB inglés.
  doctrine_reference: Lectura profética de la gloria divina en juicio y vindicación; cf. Ezequiel 39:7, 13
- issue: Tratamiento del nombre divino יְהוָה dentro de la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - Señor Yahweh
  rationale: El POB español sigue el principio editorial de traducir יְהוָה como «Yahvé», manteniendo la distinción entre אֲדֹנָי y el Nombre divino. La fórmula resultante «Señor Yahvé» conserva ambos elementos sin ocultar el Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El pasaje fue revisado en el ciclo más reciente sin cambios sustantivos; el consenso de auditoría es alto y no hubo correcciones en la lectura base. La redacción española sigue de cerca la lectura aprobada, preservando la ambigüedad idiomática de לְשֵׁם y la tensión interpretativa de יוֹם הִכָּבְדִי.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en coherencia con la política editorial del proyecto.
  - Se usa «Señor» para אֲדֹנָי, evitando la mayúscula tipográfica de reemplazo.
  - «Renombre» conserva el valor idiomático de לְשֵׁם sin sobreexplicar.
  - La nota de la forma verbal divina preserva la alternativa pasiva documentada por el POB inglés.
