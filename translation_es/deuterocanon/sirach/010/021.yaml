review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue en lo esencial el hebreo conservado y mantiene la nota sobre la fuerte divergencia con el griego. Sin embargo, «su cabeza» para רֹאשָׁם no refleja bien la decisión auditada «their chief» y suena poco natural en español en este contexto proverbial-social. El resto de los elementos clave —«entre», «hermanos», «es honrado», «el que teme a Dios», «entre su pueblo»— se alinea adecuadamente con la fuente hebrea y con la prioridad dada al testimonio hebreo frente al paralelo griego.
  spanish_quality_summary: El español es claro en general, pero «su cabeza es honrada» resulta torpe y semicalcado; «su jefe» o «su principal» serían más idiomáticos. Para mantener dignidad y naturalidad, «su jefe es honrado» mejora la legibilidad. La nota es comprensible, aunque «su gloria» en el paralelo griego podría afinarse mejor como «su motivo de orgullo» o «su jactancia»; no obstante, no es un error grave.
  glossary_alignment: 'No hay conflicto con la glosa principal del proyecto: «Dios» está bien para אֱלֹהִים, y la nota usa «el Señor» por corresponder al griego φόβος Κυρίου citado como lectura paralela. No aparece Yahvé en el texto base porque la fuente hebrea tiene אֱלֹהִים, no יהוה. No hay otros términos de glosario sensibles implicados.'
  issues:
  - severity: medium
    issue: «su cabeza» para רֹאשָׁם
    rationale: Aunque literalmente posible, en español suena poco natural y no transmite bien el sentido social de «jefe / principal / líder». La auditoría inglesa justificó «their chief», no una preservación rígida de la metáfora corporal.
  - severity: low
    issue: Formulación de la nota griega como «su gloria»
    rationale: «καύχημα» se expresa más naturalmente como «jactancia», «motivo de orgullo» o similar. «Gloria» no es imposible, pero puede ser menos precisa en español contemporáneo.
  - severity: low
    issue: 'Error tipográfico en decisiones léxicas: «sibilings»'
    rationale: Es un detalle metatextual menor en la documentación, no en el texto bíblico mismo.
  revised_spanish_text: Entre los hermanos, su jefe es honrado[a], y el que teme a Dios entre su pueblo.
  revised_footnotes:
  - marker: a
    text: 'Paralelo griego: «Rico y honrado y pobre: su jactancia es el temor del Señor». El hebreo y el griego difieren sustancialmente aquí; el texto principal sigue el hebreo conservado.'
    reason: alternative_reading
  revision_rationale: Se reemplaza «su cabeza» por «su jefe» para expresar de manera natural en español el valor social de רֹאשׁ en este contexto, en línea con la decisión auditada «their chief». También se ajusta la nota para que «καύχημα» se refleje con mayor precisión como «jactancia».
