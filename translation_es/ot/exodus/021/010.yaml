translation:
  language: es
  text: Si toma otra esposa para sí, no disminuirá su alimento, su vestido ni sus derechos conyugales[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus derechos maritales». El hebreo alude a la obligación del esposo de mantener la intimidad matrimonial.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La partícula introduce una casuística condicional; «Si» conserva mejor la estructura legal del hebreo que una forma temporal.
- source_word: אַחֶרֶת
  english_pob_choice: another wife
  chosen_spanish: otra mujer
  alternatives_spanish:
  - otra esposa
  - una segunda mujer
  lexicon: HALOT
  rationale: El hebreo dice literalmente «otra» en contexto matrimonial. En español, «otra mujer» mantiene la literalidad básica; el marco legal hace claro que se trata de una mujer tomada en matrimonio sin añadir una glosa excesiva en el texto principal.
- source_word: יִקַּח לוֹ
  english_pob_choice: he takes another wife for himself
  chosen_spanish: toma para sí
  alternatives_spanish:
  - toma otra mujer para sí
  - se casa con otra
  lexicon: HALOT
  rationale: לקח con referencia matrimonial puede significar «tomar» como esposa. «Toma para sí» conserva la acción y el pronombre dativo/reflexivo del hebreo; el complemento «otra mujer» ya especifica el referente.
- source_word: שְׁאֵרָהּ
  english_pob_choice: her food
  chosen_spanish: su alimento
  alternatives_spanish:
  - su comida
  - su sustento
  - su provisión
  lexicon: HALOT
  rationale: La POB inglesa escogió «food» por el sentido contextual de provisión material. En español, «alimento» mantiene ese valor y suena natural en un registro legal bíblico.
- source_word: כְּסוּתָהּ
  english_pob_choice: her clothing
  chosen_spanish: su vestido
  alternatives_spanish:
  - su ropa
  - su cobertura
  - su ropa de vestir
  lexicon: HALOT
  rationale: כְּסוּת denota cobertura/vestimenta. «Vestido» es una equivalencia digna y bíblica en español; «ropa» sería más coloquial, y «cobertura» resultaría menos claro aquí.
- source_word: וְעֹנָתָהּ
  english_pob_choice: her marital rights
  chosen_spanish: sus derechos maritales
  alternatives_spanish:
  - su deber conyugal
  - sus derechos conyugales
  - sus relaciones conyugales
  lexicon: HALOT
  rationale: La POB inglesa opta por «marital rights» para reflejar el deber de intimidad matrimonial sin volverlo clínico. En español, «derechos maritales» conserva esa amplitud y el valor jurídico; «conyugales» es una alternativa válida pero menos directa como correlato de «marital».
- source_word: לֹא יִגְרָע
  english_pob_choice: he shall not diminish
  chosen_spanish: no disminuirá
  alternatives_spanish:
  - no reducirá
  - no rebajará
  - no le quitará
  lexicon: HALOT
  rationale: El verbo significa disminuir, reducir o quitar. «No disminuirá» reproduce bien el registro legal y aplica naturalmente a los tres elementos enumerados.
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura estable del hebreo y la solución inglesa auditada; no se detectaron revisiones recientes que obliguen a ajustar el sentido, y el acuerdo de revisión fue alto.
  spanish_consistency_notes:
  - Se preservó la forma casuística con «Si».
  - Se evitó «SEÑOR» y otras sustituciones no pertinentes; no hay nombres divinos en este versículo.
  - Se mantuvo un registro jurídico claro y sobrio, acorde con la ley del pacto.
  - La nota al pie conserva la alternativa lexical documentada para עֹנָתָהּ sin sobrecargar el texto principal.
