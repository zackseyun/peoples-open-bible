    issue: «realícenlo» no es la mejor opción para ἐπιτέλει
    rationale: Aunque es semánticamente posible, suena más técnico/administrativo en español y menos bíblico-natural. «Llévenlo a cabo» preserva mejor la idea de ejecutar lo decidido y armoniza mejor con el tono del pasaje.
  revised_spanish_text: Y todo lo que tú y tus hermanos quieran hacer con la plata y el oro[a], llévenlo a cabo conforme a la voluntad de tu Dios.
  revised_footnotes:
  - marker: a
    text: El paralelo hebreo en Esdras 7:18 es más específico y habla de lo que parezca bueno hacer con la plata y el oro sobrantes; aquí 1 Esdras usa una formulación griega más amplia.
    reason: alternative_reading
