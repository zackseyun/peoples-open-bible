    issue: La nota [b] está anclada a «a la ciudad» en vez de «lugar alto».
    rationale: La nota cultural describe במה / «high place» / «lugar alto». Tal como está, induce a pensar erróneamente que la explicación se refiere a «ciudad». Debe moverse al término cultual pertinente.
