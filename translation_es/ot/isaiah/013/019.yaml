revisions:
- from: Y Babilonia[a], hermosura de reinos, gloria de la soberbia de los caldeos, será como el trastorno que hizo Dios[a] a Sodoma y a Gomorra.
  to: Y Babilonia, la hermosura de los reinos, la gloria de la soberbia[a] de los caldeos, será como la destrucción de Sodoma y Gomorra por parte de Dios.
  rationale: Se corrigió el anclaje de la nota para que recaiga en la frase discutida léxicamente y se eliminó la reutilización indebida del marcador. Se sustituyó «trastorno» por «destrucción» para reflejar mejor כְּמַהְפֵּכַת en un contexto de juicio total, y se ajustó la sintaxis a un español más natural y claro. También se suavizó la frase nominal inicial con artículos para mejorar la legibilidad sin alterar el sentido. La nota preserva la alternativa neutral documentada en el audit trail inglés para גְּאוֹן.
  reviewer_model: gpt-5.4
