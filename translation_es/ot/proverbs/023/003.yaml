lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No llegues a
  - No te dejes llevar a
  lexicon: HALOT
  rationale: La partícula negativa con forma prohibitiva se expresa naturalmente en español con 'No'.
- source_word: תִּתְאָו
  english_pob_choice: crave
  chosen_spanish: codicies
  alternatives_spanish:
  - desees intensamente
  - apeteces
  - anheles con avidez
  lexicon: HALOT
  rationale: '''Codiciar'' conserva la fuerza de deseo intenso y de apetito interior sin volver el verbo innecesariamente sexualizado. En este contexto encaja bien con una advertencia moral sobre el deseo.'
- source_word: לְמַטְעַמּוֹתָיו
  english_pob_choice: his delicacies
  chosen_spanish: sus manjares
  alternatives_spanish:
  - sus delicadezas
  - sus viandas exquisitas
  - sus manjares delicados
  lexicon: HALOT
  rationale: '''Manjares'' comunica alimentos ricos o exquisitos y es más natural en español bíblico que un calco como ''delicadezas''. Mantiene el valor de comida atractiva servida para seducir o tentar.'
- source_word: לֶחֶם
  english_pob_choice: food
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: Aquí se conserva 'pan' porque el hebreo literalmente dice 'bread', y la expresión fija 'pan engañoso' preserva la textura proverbial del hebreo. Aunque el término puede abarcar comida en general, 'pan' mantiene mejor la metáfora verbal.
- source_word: כְּזָבִים
  english_pob_choice: deceptive
  chosen_spanish: engañoso
  alternatives_spanish:
  - de mentira
  - mentiroso
  - falso
  lexicon: HALOT
  rationale: El hebreo 'mentiras/engaños' funciona adjetivalmente. 'Engañoso' transmite con claridad que ese alimento aparenta algo que no es, sin perder la tensión lexical del sustantivo hebreo.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el audit trail; el borrador sigue de cerca el consenso alto del texto hebreo y la opción inglesa de mantener la fuerza proverbial con una equivalencia óptima.
  spanish_consistency_notes:
  - Se mantiene un español neutral y bíblico, sin depender de fórmulas tradicionales de una sola versión.
  - '''Pan'' se conservó por fidelidad al hebreo literal, mientras ''engañoso'' comunica en español el valor atributivo de כְּזָבִים.'
  - Se evitó 'cristo' o terminología doctrinal ajena al versículo; el texto es sapiential y no contiene decisiones teológicas explícitas.
