revisions:
- from: Y el remanente sobreviviente[a] de la casa de Judá volverá a echar raíz hacia abajo y dará fruto hacia arriba.
  to: Y el remanente de la casa de Judá que quedó[a] volverá a echar raíz hacia abajo y dará fruto hacia arriba.
  rationale: Se ajusta la frase nominal para que el español suene natural sin perder la doble carga semántica de supervivencia y remanente. «Que quedó» representa bien הַנִּשְׁאָרָה y deja «remanente» como portador principal del motivo teológico; la nota preserva la alternativa más cercana a la formulación inglesa auditada.
