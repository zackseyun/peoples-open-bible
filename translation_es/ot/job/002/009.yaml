translation:
  language: es
  text: 'Entonces su esposa le dijo: «¿Todavía te mantienes firme en tu integridad? Bendice[a] a Dios y muere»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Bendice a Dios y muere»; muchos entienden «bendice» aquí como un eufemismo reverencial que significa «maldice».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... le dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: WLC / HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» comunica bien la secuencia en español sin perder el valor narrativo del verbo.
- source_word: אִשְׁתּוֹ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  lexicon: WLC / HALOT
  rationale: El posesivo de tercera persona se expresa naturalmente con «su esposa»; «mujer» es posible, pero aquí «esposa» es más claro y digno en español.
- source_word: עֹדְךָ
  english_pob_choice: Are you still
  chosen_spanish: ¿Todavía te mantienes
  alternatives_spanish:
  - ¿Sigues todavía
  - ¿Aún te mantienes
  lexicon: WLC / HALOT
  rationale: La partícula con sufijo de segunda persona expresa continuación; en español, la forma interrogativa natural es «¿Todavía ...?».
- source_word: מַחֲזִיק
  english_pob_choice: holding fast
  chosen_spanish: te mantienes firme
  alternatives_spanish:
  - te aferras
  - sigues aferrado
  lexicon: WLC / HALOT
  rationale: El participio de חזק expresa persistencia y firmeza. «Mantenerse firme» conserva la idea de sostenerse con tenacidad y suena natural en la reprensión.
- source_word: בְּתֻמָּתֶךָ
  english_pob_choice: to your integrity
  chosen_spanish: en tu integridad
  alternatives_spanish:
  - en tu rectitud
  - en tu blamelessness
  lexicon: WLC / HALOT
  rationale: תֻּמָּה denota integridad / blamelessness. Aquí el complemento preposicional ב se expresa con «en», que en español comunica bien la esfera o condición en la que Job permanece.
- source_word: בָּרֵךְ
  english_pob_choice: Bless
  chosen_spanish: Bendice
  alternatives_spanish:
  - Bendice a Dios
  - Alaba a Dios
  lexicon: WLC / HALOT
  rationale: Se mantiene la forma léxica literal del hebreo, tal como hace la POB en inglés, porque el texto presenta la tensión de un posible eufemismo reverencial.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - Dios
  lexicon: WLC / HALOT
  rationale: El título divino genérico se traduce con «Dios»; en español, por la construcción verbal, la preposición «a» resulta idiomática con «bendice».
- source_word: וָמֻת
  english_pob_choice: and die
  chosen_spanish: y muere
  alternatives_spanish:
  - y luego muere
  - entonces muere
  lexicon: WLC / HALOT
  rationale: La coordinación imperativa breve se conserva en español con «y muere», manteniendo la contundencia del hebreo.
theological_decisions:
- issue: Eufemismo de ברך en relación con Dios
  english_pob_reading: Retain the literal Hebrew 'Bless God and die' in the main text, with the likely idiomatic sense 'Curse God and die' preserved in a footnote.
  chosen_spanish_reading: Mantener «Bendice a Dios y muere» en el texto principal, con nota que indique que muchos entienden «bendice» aquí como un eufemismo reverencial que significa «maldice».
  alternative_spanish_readings:
  - «Maldice a Dios y muere»
  - «Despídete de Dios y muere»
  rationale: El hebreo dice literalmente «bendice». La traducción principal conserva la forma del original para no resolver de antemano una tensión documentada; la nota preserva la lectura idiomática ampliamente reconocida.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El texto sigue el paquete fuente hebreo y el audit trail inglés sin cambios revisionales adicionales; se conserva la tensión léxica de ברך mediante una nota y se ajusta la sintaxis al español natural.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים, no «Yahvé», porque el texto hebreo emplea el título genérico.
  - Se mantiene «Bendice» en el cuerpo principal para reflejar la forma literal del hebreo y la decisión auditada de la POB en inglés.
  - «Integridad» traduce תֻמָּה de manera natural y suficientemente precisa en este contexto.
  - El registro es sobrio y bíblico, pero evita el castellano arcaizante innecesario.
