revisions:
- from: Estos fueron los contados de las familias de los hijos de Gersón[a], todos los que servían en el tabernáculo de reunión, a quienes Moisés y Aarón contaron conforme al mandato de Yahvé.
  to: Estos fueron los inscritos en el censo de las familias de los hijos de Gersón[a], todos los que servían en el tabernáculo de reunión, a quienes Moisés y Aarón contaron conforme al mandato de Yahvé.
  rationale: Se sustituye «los contados» por «los inscritos en el censo» para expresar de manera más natural y precisa en español el valor censal de פְקוּדֵי, manteniendo la distinción respecto al verbo «contaron» más adelante en el versículo. Se conserva «tabernáculo de reunión» como formulación eclesial ampliamente reconocible y «Yahvé» para el Tetragrámaton. La nota se ajusta para reflejar la misma mejora léxica en la alternativa de tiempo verbal.
