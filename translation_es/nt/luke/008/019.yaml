translation:
  language: es
  text: Entonces llegaron a él su madre y sus hermanos[a], pero no podían acercarse a él[b] a causa de la multitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego «hermanos»; algunos lo interpretan más ampliamente como «parientes» o «familiares», pero el texto dice «hermanos».
    reason: alternative_reading
  - marker: b
    text: O «encontrarse con él» o «llegar hasta él».
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρεγένετο
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - se presentaron
  - se acercaron
  lexicon: BDAG
  rationale: El verbo indica llegada/presencia; en español, con sujeto plural explícito («su madre y sus hermanos»), «llegaron» comunica con naturalidad la entrada en escena sin añadir matices no presentes en el griego.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  - Luego
  lexicon: BDAG
  rationale: δέ marca avance narrativo; «Entonces» da transición natural en español sin sobrerrepresentar la conjunción.
- source_word: πρὸς αὐτὸν
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hacia él
  - para verlo
  - hasta él
  lexicon: BDAG
  rationale: La preposición con acusativo expresa movimiento o dirección hacia una persona. «A él» es sobrio y fiel; no se añade el propósito de verlo, que el texto no explicita.
- source_word: μήτηρ
  english_pob_choice: mother
  chosen_spanish: su madre
  alternatives_spanish:
  - la madre de él
  - la madre
  lexicon: BDAG
  rationale: El posesivo se entiende por el contexto y por el αὐτοῦ siguiente; «su madre» evita ambigüedad en español y refleja la relación implícita.
- source_word: ἀδελφοὶ
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - parientes
  lexicon: BDAG
  rationale: El griego usa el masculino plural ἀδελφοί. En esta frase, el sentido ordinario es «hermanos»; se conserva la precisión lexical sin resolver debates de parentesco que el texto no aclara.
- source_word: οὐκ ἠδύναντο
  english_pob_choice: they were not able
  chosen_spanish: no podían
  alternatives_spanish:
  - no eran capaces de
  - no pudieron
  lexicon: BDAG
  rationale: El imperfecto expresa incapacidad en curso; «no podían» suena natural en español y mantiene el valor aspectual mejor que un perfecto puntual.
- source_word: συντυχεῖν αὐτῷ
  english_pob_choice: to reach him
  chosen_spanish: acercarse a él
  alternatives_spanish:
  - encontrarse con él
  - llegar hasta él
  - tener acceso a él
  lexicon: BDAG
  rationale: En contexto de obstáculo por la multitud, el verbo comunica la imposibilidad práctica de entrar en contacto o llegar a Jesús. «Acercarse a él» preserva esa idea sin cargar la frase con una lectura demasiado formal de «encontrarse».
- source_word: διὰ τὸν ὄχλον
  english_pob_choice: because of the crowd
  chosen_spanish: a causa de la multitud
  alternatives_spanish:
  - por la multitud
  - debido a la multitud
  lexicon: BDAG
  rationale: διά con acusativo expresa causa. «Multitud» es el equivalente natural de ὄχλος en español bíblico y moderno; «a causa de» mantiene clara la relación causal.
theological_decisions:
- issue: Sentido de ἀδελφοί respecto de la familia de Jesús
  english_pob_reading: Render literally as 'his brothers' without resolving broader doctrinal debates about whether these were biological brothers, stepbrothers, or other relatives.
  chosen_spanish_reading: Traducir literalmente «sus hermanos» sin resolver si eran hermanos carnales, medio hermanos o parientes.
  alternative_spanish_readings:
  - sus parientes
  - sus familiares
  - sus hermanos y hermanas
  rationale: El texto griego dice ἀδελφοί; la traducción no debe suavizarlo a un término más amplio sin base textual. Se preserva así la tensión interpretativa y se evita importar una solución doctrinal que el pasaje no ofrece.
  doctrine_reference: Mantener la tensión textual; no forzar una conclusión sobre la relación familiar de Jesús.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo y no muestran revisiones aplicadas; la redacción española sigue esa misma lectura estable, conservando el orden narrativo y la fuerza causal de la frase.
  spanish_consistency_notes:
  - Se prefirió «Entonces» para δὲ por fluidez narrativa.
  - Se evitó «SEÑOR» u otros reemplazos teológicos no presentes.
  - Se mantuvo «hermanos» para ἀδελφοί, con nota explicativa sobre la alternativa interpretativa.
  - Se usó «multitud» para ὄχλος por equivalencia bíblica y claridad moderna.
