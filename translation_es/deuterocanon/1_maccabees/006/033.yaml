  rationale: Se corrigen los anclajes de las notas para que coincidan con las frases que explican, se mejora la naturalidad de la apertura eliminando una redundancia temporal, y se sustituye «sacó el campamento» por una formulación militar más idiomática en español sin alterar el sentido fuente.
