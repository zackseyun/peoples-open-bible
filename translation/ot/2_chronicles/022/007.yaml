id: 2CH.22.7
reference: 2 Chronicles 22:7
source:
  edition: WLC
  text: וּ/מֵֽ/אֱלֹהִ֗ים הָיְתָה֙ תְּבוּסַ֣ת אֲחַזְיָ֔הוּ לָ/ב֖וֹא אֶל יוֹרָ֑ם וּ/בְ/בֹא֗/וֹ יָצָ֤א עִם יְהוֹרָם֙ אֶל יֵה֣וּא בֶן נִמְשִׁ֔י אֲשֶׁ֣ר מְשָׁח֣/וֹ יְהוָ֔ה לְ/הַכְרִ֖ית אֶת בֵּ֥ית אַחְאָֽב־־־־־׃
translation:
  text: Now Ahaziah’s downfall[a], by his going to Joram, was from God; and when he came, he went out with Jehoram to Jehu son of Nimshi, whom Yahweh had anointed to cut off the house of Ahab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he went out with Jehoram against Jehu' or 'to meet Jehu'; the Hebrew says literally 'to Jehu,' though the context suggests a hostile encounter.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵאֱלֹהִים
  chosen: was from God
  alternatives:
  - came from God
  - was ordained by God
  lexicon: HALOT
  rationale: The preposition מן with אֱלֹהִים marks source/origin. 'Was from God' preserves the terse Hebrew and indicates divine causation without over-specifying the mode as decree or permission.
- source_word: תְּבוּסַת
  chosen: downfall
  alternatives:
  - ruin
  - destruction
  - overthrow
  lexicon: HALOT
  rationale: The noun denotes trampling/defeat/ruin. In context it refers to the disastrous outcome for Ahaziah resulting from his visit, so 'downfall' is natural English and broad enough to include both defeat and destruction.
- source_word: לָבוֹא אֶל יוֹרָם
  chosen: in going to Joram
  alternatives:
  - by going to Joram
  - through coming to Joram
  lexicon: HALOT
  rationale: The infinitive construct with ל marks the circumstance or occasion connected to his downfall. 'In going to Joram' keeps the Hebrew linkage without making the causation more mechanical than the text states.
- source_word: וּבְבֹאוֹ
  chosen: when he came
  alternatives:
  - and when he arrived
  - and upon his coming
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct plus suffix is temporal here. 'When he came' is idiomatic and preserves the sequence.
- source_word: יָצָא עִם יְהוֹרָם אֶל יֵהוּא
  chosen: he went out with Jehoram to Jehu
  alternatives:
  - he went out with Jehoram against Jehu
  - he marched out with Jehoram to meet Jehu
  lexicon: HALOT
  rationale: יָצָא often means 'go out,' especially for military movement. Because the preposition is אֶל ('to') rather than an explicit hostile marker, the main text keeps the more neutral 'to Jehu'; the likely adversarial nuance is preserved as an alternative.
- source_word: יְהוֹרָם / יוֹרָם
  chosen: Joram / Jehoram
  alternatives:
  - Jehoram in both places
  - Joram in both places
  lexicon: HALOT
  rationale: The verse uses both spellings/forms in Hebrew. The English draft reflects that variation rather than harmonizing it, preserving the source-text distinction while recognizing they refer to the same king.
- source_word: מְשָׁחוֹ
  chosen: had anointed
  alternatives:
  - anointed
  lexicon: HALOT
  rationale: The qatal verb in the relative clause refers to a prior action relative to the main narrative. English past perfect clarifies that Jehu's anointing preceded this encounter.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְהַכְרִית אֶת בֵּית אַחְאָב
  chosen: to cut off the house of Ahab
  alternatives:
  - to destroy the house of Ahab
  - to wipe out the house of Ahab
  lexicon: HALOT
  rationale: הכרית in the Hiphil commonly means to cut off, eliminate, or destroy. 'Cut off' preserves the covenant-judgment idiom and avoids flattening the phrase into merely generic destruction.
