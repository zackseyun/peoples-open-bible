    rationale: El inglés auditado eligió 'hornets' de forma intencional para mantener el eco bíblico de Ex 23:28; Dt 7:20; Jos 24:12. 'Avispas' es más genérico y debilita esa conexión. 'Avispones' corresponde mejor en español.
