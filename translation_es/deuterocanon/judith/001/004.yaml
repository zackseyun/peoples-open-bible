translation:
  language: es
  text: Echó sus cimientos a una profundidad de sesenta codos, e hizo sus puertas, puertas alzadas a una altura de setenta codos, con una anchura de cuarenta codos, para las incursiones[a] de sus fuerzas poderosas y las formaciones de sus soldados de a pie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para las salidas militares de sus fuerzas poderosas y las formaciones de sus soldados de a pie». El griego de la cláusula final es militar y algo comprimido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐθεμελίωσεν
  english_pob_choice: laid its foundation
  chosen_spanish: le puso el cimiento
  alternatives_spanish:
  - fundó
  - echó el cimiento
  lexicon: LSJ
  rationale: El verbo expresa establecer o poner cimientos. En español, 'le puso el cimiento' conserva la imagen constructiva de manera natural y fiel al griego.
- source_word: εἰς πήχεις ἑξήκοντα
  english_pob_choice: to a depth of sixty cubits
  chosen_spanish: a una profundidad de sesenta codos
  alternatives_spanish:
  - por sesenta codos
  - sesenta codos de profundidad
  lexicon: LSJ
  rationale: La frase de medida aplicada al cimiento pide en español una dimensión explícita. 'A una profundidad de sesenta codos' mantiene el sentido arquitectónico sin añadir interpretación innecesaria.
- source_word: πύλας διεγειρμένας
  english_pob_choice: gates raised
  chosen_spanish: puertas alzadas
  alternatives_spanish:
  - puertas elevadas
  - puertas altas
  lexicon: LSJ
  rationale: El participio comunica algo 'levantado' o 'alzando'. 'Puertas alzadas' conserva mejor la imagen verbal que un simple adjetivo.
- source_word: εἰς ὕψος πηχῶν ἑβδομήκοντα
  english_pob_choice: to a height of seventy cubits
  chosen_spanish: a una altura de setenta codos
  alternatives_spanish:
  - setenta codos de altura
  lexicon: LSJ
  rationale: Es una medida directa de altura. La formulación española sigue de cerca la estructura del griego y resulta clara.
- source_word: τὸ πλάτος αὐτῆς πήχεις τεσσεράκοντα
  english_pob_choice: its width forty cubits
  chosen_spanish: su anchura de cuarenta codos
  alternatives_spanish:
  - su ancho de cuarenta codos
  - cuarenta codos de ancho
  lexicon: LSJ
  rationale: El sustantivo πλάτος se rinde naturalmente como 'anchura'. La construcción nominal conserva el estilo condensado del original.
- source_word: εἰς ἐξόδους
  english_pob_choice: for the sorties
  chosen_spanish: para las salidas
  alternatives_spanish:
  - para las salidas militares
  - para las incursiones
  lexicon: LSJ
  rationale: Ἔξοδος puede significar salida, salida militar o incursión. 'Salidas' mantiene la base léxica; el matiz militar queda visible por el contexto y se puede precisar en nota.
- source_word: δυνάμεως δυνατῶν αὐτοῦ
  english_pob_choice: of his mighty forces
  chosen_spanish: de la fuerza de sus valientes
  alternatives_spanish:
  - de su fuerza de combate
  - de sus poderosos guerreros
  lexicon: LSJ
  rationale: La construcción griega concentra fuerza/poder y hombres valientes. 'Fuerza de sus valientes' conserva esa tensión sin decidir demasiado pronto entre 'ejército' y 'hombres valientes'.
- source_word: διατάξεις
  english_pob_choice: the formations
  chosen_spanish: las formaciones
  alternatives_spanish:
  - los escuadrones
  - los órdenes de batalla
  lexicon: LSJ
  rationale: En contexto militar, διατάξεις designa disposición u orden de tropas. 'Formaciones' es preciso y suficientemente transparente para el lector español.
- source_word: τῶν πεζῶν αὐτοῦ
  english_pob_choice: his foot soldiers
  chosen_spanish: de sus hombres de a pie
  alternatives_spanish:
  - de su infantería
  - de sus soldados a pie
  lexicon: LSJ
  rationale: πεζοί son combatientes que van a pie. 'Hombres de a pie' es comprensible en español y evita una tecnificación excesiva; 'infantería' es una alternativa válida pero más militarizada.
theological_decisions:
- issue: La cláusula final es militar y comprimida, con posibilidad de entender εἰς ἐξόδους como 'salidas', 'salidas militares' o 'incursiones'.
  english_pob_reading: for the sorties of his mighty forces and the formations of his foot soldiers
  chosen_spanish_reading: para las salidas de la fuerza de sus valientes y las formaciones de sus hombres de a pie
  alternative_spanish_readings:
  - para las salidas militares de sus valientes y las formaciones de su infantería
  - para las incursiones de sus fuerzas poderosas y las filas de sus soldados a pie
  rationale: La redacción española conserva el valor básico de 'salidas' y mantiene la ambigüedad militar del griego sin cerrarla en exceso. Así se respeta la tensión léxica observada en la nota inglesa y se evita una paráfrasis interpretativa.
  doctrine_reference: No aplica; se trata de imaginería militar y arquitectónica, no de una afirmación doctrinal.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de Swete y tiene en cuenta la revisión inglesa que prefirió 'sorties of his mighty forces' frente a una lectura más literal de 'departures'. En español se optó por 'salidas' para conservar la base léxica de ἐξόδους y dejar explícita en nota la posibilidad militar ('incursiones').
  spanish_consistency_notes:
  - Se mantiene 'codos' como medida tradicional equivalente a 'cubits' para una lectura bíblica natural en español.
  - Se traduce πύλας como 'puertas' por el uso arquitectónico del pasaje; no se fuerza 'portones' porque el griego no lo exige.
  - Se usa 'hombres de a pie' para πεζοί, evitando 'infantería' en el texto principal para no sobreespecificar más allá del griego.
  - Se preserva el paralelismo de medidas y de cláusulas del original sin convertirlo en una frase explicativa.
