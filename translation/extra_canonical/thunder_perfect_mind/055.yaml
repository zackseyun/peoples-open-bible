  as ‘in (a) shamelessness.’ The trailing ‘ⲧⲉ ⲡⲁⲓ ⲙⲙⲟⲉⲓ’ may belong to an adjacent
  segment. The consult mapping supports the ashamed/shameless pair, but precise morpheme-to-gloss
  mapping here should be revisited with a diplomatic transcription.
