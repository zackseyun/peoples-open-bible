  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ὡς πάντα ἡμῖν τῆς θείας δυνάμεως αὐτοῦ τὰ πρὸς ζωὴν καὶ εὐσέβειαν δεδωρημένης διὰ τῆς ἐπιγνώσεως τοῦ καλέσαντος ἡμᾶς ⸂ἰδίᾳ δόξῃ καὶ ἀρετῇ⸃,
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/001/003.yaml
  text: As his divine power has granted to us all things for life and godliness[a], through the knowledge of the one who called us by his own glory and excellence,
  footnotes:
  - marker: a
    text: 'Or: “to his own glory and excellence.” The Greek dative phrase can be understood differently.'
    reason: alternative_reading
translation:
  language: ko
  text: 그분의 신적 능력은 자기의 영광과 덕[a]으로 우리를 부르신 분을 참지식으로 앎으로써 생명과 경건에 필요한 모든 것을 우리에게 주셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἀρετή는 「덕」 또는 「탁월성」으로 옮길 수 있다. 본 번역은 1:3, 5의 일관성을 위해 「덕」을 채택한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: θείας δυνάμεως αὐτοῦ
  english_pob_choice: his divine power
  chosen_korean: 그분의 신적 능력
  alternatives_korean:
  - 그의 신성한 능력
  lexicon: BDAG
  rationale: 소유격을 자연스러운 한국어로 옮긴다. θεῖος는 「신적」이 표준.
- source_word: ἀρετή
  english_pob_choice: excellence
  chosen_korean: 덕
  alternatives_korean:
  - 탁월성
  - 뛰어남
  lexicon: BDAG
  rationale: 1:5의 덕 목록과 일관성을 유지하기 위해 1:3에서도 「덕」으로 옮긴다. 프로젝트 용어집에 따른다.
- source_word: εὐσέβεια
  english_pob_choice: godliness
  chosen_korean: 경건
  alternatives_korean:
  - 신앙심
  - 경외
  lexicon: BDAG
  rationale: 신약의 표준 등가어. 하나님 지향적 윤리적 삶을 가리킨다.
- source_word: ἐπίγνωσις
  english_pob_choice: knowledge
  chosen_korean: 참지식
  alternatives_korean:
  - 지식
  lexicon: BDAG
  rationale: 1:2의 결정과 일관되게 「참지식」을 유지한다.
