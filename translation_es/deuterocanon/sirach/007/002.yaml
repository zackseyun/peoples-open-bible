translation:
  language: es
  text: No siembres surcos de injusticia contra un hermano[b], no sea que la[c] siegues siete veces[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego dice más generalmente: «Apártate de la injusticia, y ella se apartará de ti», lo que refleja una forma distinta del dicho que el hebreo conservado.'
    reason: alternative_reading
  - marker: b
    text: El hebreo dice simplemente «un hermano», no «tu hermano».
    reason: lexical_alternative
  - marker: c
    text: El hebreo literalmente puede entenderse como «la/lo» o incluso «a él»; el sufijo es ambiguo en aislamiento. Aquí se entiende que se refiere a la injusticia sembrada, lo que encaja mejor con la imagen de sembrar y segar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόστηθι / אַל
  english_pob_choice: Do not
  chosen_spanish: Aléjate de
  alternatives_spanish:
  - No te apartes de
  - Apártate de
  lexicon: LSJ / HALOT
  rationale: El griego pide una separación activa y el hebreo transmite una prohibición sapiencial. «Aléjate de» mantiene el imperativo breve y natural en español, y conserva el movimiento espacial del dicho.
- source_word: ἀδίκου / עָוֶל
  english_pob_choice: injustice
  chosen_spanish: la injusticia
  alternatives_spanish:
  - la maldad
  - el agravio
  - la iniquidad
  lexicon: LSJ / HALOT
  rationale: «Injusticia» preserva el valor moral y relacional del término sin cargarlo con un registro eclesiástico innecesario. También encaja bien con el paralelo griego de apartarse de la injusticia.
- source_word: ἐκκλινεῖ / תִּקְצְרֵהוּ
  english_pob_choice: it will turn away from you / you reap it
  chosen_spanish: se apartará de ti
  alternatives_spanish:
  - se desviará de ti
  - se alejará de ti
  - la cosecharás siete veces
  lexicon: LSJ / HALOT
  rationale: 'La tradición griega del pasaje presenta una retribución recíproca: si uno se aparta de la injusticia, ella se aparta de uno. Dado que el testimonio griego y el hebreo divergen, el español sigue aquí el sentido explícito del griego, documentando la variante hebrea en las decisiones teológicas.'
- source_word: ἀπὸ σοῦ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de tu lado
  - alejándose de ti
  lexicon: LSJ
  rationale: «De ti» es la forma más natural y directa en español para expresar la relación recíproca del proverbio.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego
  english_pob_reading: The Greek parallel reads more generally, 'Turn away from injustice, and it will turn away from you,' reflecting a different form of the saying than the extant Hebrew.
  chosen_spanish_reading: «Aléjate de la injusticia y se apartará de ti».
  alternative_spanish_readings:
  - «No siembres surcos de injusticia contra un hermano, no sea que la siegues siete veces».
  - «Aléjate de la injusticia, y cosecharás su retribución siete veces».
  - «Aléjate de la injusticia, y ella se apartará de ti».
  rationale: El griego, proporcionado como paralelo de control, ofrece una forma más general del proverbio y está claramente atestiguado en el paquete de fuentes. Como el hebreo conservado tiene una imaginería agrícola distinta y un cierre textual diferente, conviene no mezclar ambos en una sola línea. El español principal sigue el griego para este registro, mientras las alternativas registran la forma hebrea del dicho.
  doctrine_reference: Translation philosophy §§1, 3, 4, 5
translation_notes:
  revision_awareness: El último control de revisión indicó que no hacía falta ningún cambio adicional; esta redacción corrige el problema anterior anclando cada nota al texto español.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, sin calco excesivo.
  - Se prioriza el paralelo griego para el texto principal porque el paquete fuente lo da explícitamente como forma alternativa del proverbio.
  - No se mezclan en la línea principal las dos formas textuales distintas; la variante hebrea queda documentada en notas.
  - Los marcadores [a] y [b] aparecen exactamente en el texto, uno por cada nota, para cumplir la trazabilidad editorial.
