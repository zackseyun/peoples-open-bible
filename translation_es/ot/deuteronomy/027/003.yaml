translation:
  language: es
  text: Y escribirás sobre ellas todas las palabras de esta ley[a] cuando cruces al otro lado, para que entres en la tierra que Yahvé tu Dios te da, una tierra que mana leche y miel, tal como Yahvé, el Dios de tus padres[b], te habló.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todas las palabras de esta instrucción». El hebreo torá puede significar «instrucción» además de «ley»; aquí «ley» encaja mejor en el contexto de pacto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el Dios de tus antepasados». El hebreo dice «el Dios de tus padres», conservando la fórmula de pacto usada a lo largo de Deuteronomio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָתַבְתָּ
  english_pob_choice: And you shall write
  chosen_spanish: Y escribirás
  alternatives_spanish:
  - y has de escribir
  - y debes escribir
  lexicon: HALOT
  rationale: El perfecto con ו consecutivo en contexto instruccional funciona como mandato. En español, el futuro simple comunica con naturalidad la fuerza imperativa sin perder el tono legal.
- source_word: עֲלֵיהֶן
  english_pob_choice: on them
  chosen_spanish: sobre ellas
  alternatives_spanish:
  - encima de ellas
  - en ellas
  lexicon: HALOT
  rationale: Se refiere a las piedras del versículo anterior. 'Sobre ellas' es natural en español y conserva la relación espacial directa.
- source_word: כָּל דִּבְרֵי הַתּוֹרָה הַזֹּאת
  english_pob_choice: all the words of this law
  chosen_spanish: todas las palabras de esta ley
  alternatives_spanish:
  - todas las palabras de esta instrucción
  - todo el contenido de esta ley
  lexicon: HALOT
  rationale: דִּבְרֵי pide 'palabras', no una paráfrasis más amplia. En este contexto de pacto, 'ley' mantiene la carga jurídica/covenantal que el POB documenta para תּוֹרָה.
- source_word: בְּעָבְרֶךָ
  english_pob_choice: when you cross over
  chosen_spanish: cuando cruces
  alternatives_spanish:
  - al cruzar
  - cuando pases al otro lado
  lexicon: HALOT
  rationale: La referencia es el cruce del Jordán. 'Cruces' preserva el sentido temporal y resulta idiomático en español sin añadir explicación innecesaria.
- source_word: לְמַעַן אֲשֶׁר תָּבֹא
  english_pob_choice: so that you may enter
  chosen_spanish: para que entres
  alternatives_spanish:
  - a fin de que entres
  - para que puedas entrar
  lexicon: HALOT
  rationale: La cláusula expresa propósito. 'Para que entres' es el equivalente más natural y mantiene el matiz final de la construcción hebrea.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: En el discurso de Deuteronomio, ארץ puede traducirse 'tierra'. Aquí, por el paralelismo con la promesa y la fórmula de pacto, 'la tierra' es más fiel al registro bíblico que 'el país'.
- source_word: יְהוָה אֱלֹהֶיךָ
  english_pob_choice: Yahweh your God
  chosen_spanish: Yahvé tu Dios
  alternatives_spanish:
  - Yahvé, tu Dios
  - el SEÑOR tu Dios
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé' según el criterio del proyecto, y 'tu Dios' reproduce la relación de pacto sin sustituir el nombre por un título genérico.
- source_word: נֹתֵן לְךָ
  english_pob_choice: is giving you
  chosen_spanish: te da
  alternatives_spanish:
  - te está dando
  - te está concediendo
  lexicon: HALOT
  rationale: Aunque el participio sugiere una acción en curso o inminente, en español 'te da' transmite de forma natural la certeza del don divino sin sonar forzado.
- source_word: אֶרֶץ זָבַת חָלָב וּדְבַשׁ
  english_pob_choice: a land flowing with milk and honey
  chosen_spanish: tierra que fluye leche y miel
  alternatives_spanish:
  - tierra que mana leche y miel
  - una tierra de leche y miel
  lexicon: HALOT
  rationale: Se mantiene la imagen tradicional de abundancia. 'Fluye leche y miel' es una adaptación literal e inteligible; la forma con 'que fluye' conserva el valor participial del hebreo.
- source_word: כַּאֲשֶׁר דִּבֶּר
  english_pob_choice: just as ... spoke
  chosen_spanish: tal como ... habló
  alternatives_spanish:
  - así como ... habló
  - como ... dijo
  lexicon: HALOT
  rationale: דִּבֶּר es 'habló'. 'Tal como' preserva la comparación exacta del hebreo y mantiene el tono solemne del cierre.
- source_word: אֱלֹהֵי אֲבֹתֶיךָ
  english_pob_choice: the God of your fathers
  chosen_spanish: el Dios de tus padres
  alternatives_spanish:
  - el Dios de tus antepasados
  - el Dios de tus padres y antepasados
  lexicon: HALOT
  rationale: Se conserva la fórmula patriarcal/covenantal del texto. 'Padres' refleja el masculino plural del hebreo y la tradición deuteronómica; en español, 'tus padres' resulta claro y reverente.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Según la terminología del proyecto, se translitera como 'Yahvé' para preservar el nombre propio del pacto, en lugar de ocultarlo con un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: תּוֹרָה en contexto deuteronómico
  english_pob_reading: law
  chosen_spanish_reading: ley
  alternative_spanish_readings:
  - instrucción
  - enseñanza
  rationale: El POB inglés documenta la tensión lexical entre 'law' e 'instruction'. En este pasaje, el contexto de pacto y mandamiento favorece 'ley' en español, sin negar que el término hebreo también puede abarcar 'instrucción'.
  doctrine_reference: DOCTRINE.md Translation philosophy; lexical note on תּוֹרָה
- issue: אֲבֹתֶיךָ / אֲבֹתֵי
  english_pob_reading: your fathers
  chosen_spanish_reading: tus padres
  alternative_spanish_readings:
  - tus antepasados
  rationale: Se conserva la fórmula covenantal masculina del hebreo, evitando neutralizarla. 'Tus padres' mantiene la alusión histórica y la continuidad del pacto con un español sobrio y comprensible.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el audit trail inglés, sin cambios sustantivos respecto de las decisiones léxicas documentadas. Se mantiene el nombre divino como Yahvé, se conserva la fórmula de pacto «el Dios de tus padres» y se traduce תּוֹרָה por «ley» conforme al contexto deuteronómico.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה, coherente con el estándar español del proyecto.
  - Se usó «ley» para תּוֹרָה en armonía con el contexto legal-covenantal del pasaje.
  - Se conservó la fórmula «tus padres» para אֲבֹתֶיךָ, evitando una neutralización que debilite la continuidad del pacto.
  - Se tradujo el participio נֹתֵן como presente («te da») para reflejar el don seguro e inminente en español natural.
