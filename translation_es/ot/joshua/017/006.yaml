translation:
  language: es
  text: Porque las hijas de Manasés recibieron una herencia[a][b] entre sus hijos varones, y la tierra de Galaad pertenecía al resto de los hijos de Manasés[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque las hijas de Manasés heredaron una herencia entre sus hijos varones».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «entre sus hijos»; el texto contrasta explícitamente hijas e hijos en el arreglo de herencia.'
    reason: cultural_note
  - marker: c
    text: 'O: «y la tierra de Galaad fue para el resto de los hijos de Manasés».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí introduce la explicación de la distribución hereditaria anterior. En español, «Porque» comunica con naturalidad ese valor explicativo/causal sin forzar un orden artificioso.
- source_word: בְּנוֹת מְנַשֶּׁה
  english_pob_choice: the daughters of Manasseh
  chosen_spanish: las hijas de Manasés
  alternatives_spanish:
  - las hijas de Manasés
  lexicon: HALOT
  rationale: Se mantiene explícito el contraste de género del pasaje, necesario para reflejar el contexto legal de herencia.
- source_word: נָחֲלוּ נַחֲלָה
  english_pob_choice: received an inheritance
  chosen_spanish: recibieron una herencia
  alternatives_spanish:
  - heredaron una herencia
  - obtuvieron una herencia
  lexicon: HALOT
  rationale: El hebreo usa una construcción verbo-sustantivo que enfatiza la recepción de la porción hereditaria. «Recibieron una herencia» conserva el sentido jurídico y suena natural en español, evitando una repetición pesada.
- source_word: בְּתוֹךְ בָּנָיו
  english_pob_choice: among his sons
  chosen_spanish: entre sus hijos
  alternatives_spanish:
  - entre sus hijos varones
  - en medio de sus hijos
  lexicon: HALOT
  rationale: «Entre» expresa bien la inserción en el grupo. Aunque el hebreo dice literalmente «sus hijos», en español «hijos» puede abarcar un grupo masculino; no obstante, se conserva la referencia relacional sin añadir más especificación que la del texto.
- source_word: וְאֶרֶץ הַגִּלְעָד
  english_pob_choice: and the land of Gilead
  chosen_spanish: y la tierra de Galaad
  alternatives_spanish:
  - y el país de Galaad
  - y el territorio de Galaad
  lexicon: HALOT
  rationale: «Tierra de Galaad» es una forma clara y bíblicamente reconocible para el territorio heredado. Se evita «país» por sonar menos natural en este contexto.
- source_word: הָיְתָה לִבְנֵי מְנַשֶּׁה הַנּוֹתָרִים
  english_pob_choice: belonged to the rest of the sons of Manasseh
  chosen_spanish: pertenecía al resto de los hijos de Manasés
  alternatives_spanish:
  - era para el resto de los hijos de Manasés
  - quedó para el resto de los hijos de Manasés
  lexicon: HALOT
  rationale: «Pertenecía» comunica la posesión/asignación resultante de la repartición. «Resto» refleja היטב הַנּוֹתָרִים como los que quedaron aparte de la porción ya mencionada.
theological_decisions:
- issue: Relación entre hijas e hijos en la herencia tribal
  english_pob_reading: The text explicitly contrasts daughters and sons in the inheritance arrangement.
  chosen_spanish_reading: El texto conserva explícitamente el contraste entre hijas e hijos en el reparto de la herencia.
  alternative_spanish_readings:
  - neutralizar el contraste con «entre la familia de Manasés»
  - usar solo «entre los descendientes»
  rationale: 'Se mantiene la tensión lexical y jurídica del hebreo: las hijas reciben herencia en medio de los hijos, y esa contraposición es parte del significado del versículo.'
  doctrine_reference: Derecho de herencia en Israel; lectura histórico-gramatical del texto
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: el paquete fuente muestra alto acuerdo y no requiere cambios textuales. La redacción española se ajusta al sentido del hebreo y al rastro auditado en inglés, sin introducir suavizaciones doctrinales.'
  spanish_consistency_notes:
  - Se usa «Manasés» de forma consistente para מְנַשֶּׁה.
  - Se mantiene «hijas»/«hijos» para preservar el contraste legal del versículo.
  - «Herencia» y «tierra» se emplean con valor territorial-jurídico, no meramente abstracto.
  - No se reemplaza el nombre divino ni aparecen términos teológicos adicionales en este versículo.
