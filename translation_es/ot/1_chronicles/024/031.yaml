  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Los nombres propios están bien en formas españolas usuales. ''Casas paternas'' preserva adecuadamente fathers’ houses. El problema principal no es glosarial sino de notas: debe conservarse la alternativa lexical del inglés para la cláusula final, no una nota irrelevante sobre Ahimelec.'
