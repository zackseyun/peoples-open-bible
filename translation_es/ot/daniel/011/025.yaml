  to: Él avivará su poder y su corazón contra el rey del Sur con un gran ejército, y el rey del Sur entrará en batalla con un ejército muy grande y poderoso, pero no prevalecerá[a], porque tramarán intrigas contra él[b].
  rationale: 'Se ajusta el español para mayor naturalidad y precisión militar («avivará», «entrará en batalla», «tramarán intrigas contra él») y, sobre todo, se corrige el sistema de notas para que las alternativas queden ancladas en las frases pertinentes del hebreo: una en «no prevalecerá» por לֹא יַעֲמֹד y otra en la cláusula final por la construcción cognada יַחְשְׁבוּ ... מַחֲשָׁבוֹת. No se requiere adjudicación adicional; es una reparación editorial menor.'
