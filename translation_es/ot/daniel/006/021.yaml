translation:
  language: es
  text: 'Y cuando se acercó al foso, gritó a Daniel con voz angustiada[a]. El rey habló y dijo a Daniel: «Daniel, siervo[b] del Dios viviente, ¿tu Dios, a quien tú sirves continuamente[c], ha podido librarte de los leones?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con voz afligida» o «con voz dolorida». El arameo puede expresar aflicción, pena o angustia.
    reason: lexical_alternative
  - marker: b
    text: O «esclavo del Dios viviente». El término arameo puede denotar siervo o esclavo; aquí el contexto favorece el sentido honorífico de servicio devoto.
    reason: lexical_alternative
  - marker: c
    text: O «a quien tú adoras continuamente». El verbo arameo puede denotar servicio religioso o adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְמִקְרְבֵהּ
  english_pob_choice: And when he came near
  chosen_spanish: Y cuando se acercó
  alternatives_spanish:
  - Y cuando llegó cerca
  - Y cuando se acercó al lugar
  lexicon: HALOT
  rationale: La forma marca secuencia temporal con movimiento hacia el foso. «Se acercó» es natural en español y conserva la proximidad física sin añadir matices no presentes en el arameo.
- source_word: גֻבָּא
  english_pob_choice: den
  chosen_spanish: foso
  alternatives_spanish:
  - cueva
  - den
  lexicon: HALOT
  rationale: En español, para Daniel 6, «foso» comunica mejor la imagen del recinto de los leones que «cueva» y evita un anglicismo innecesario. Conserva el componente físico de una abertura o excavación.
- source_word: בְּקָל עֲצִיב
  english_pob_choice: with a distressed voice
  chosen_spanish: con voz angustiada
  alternatives_spanish:
  - con voz afligida
  - con voz dolida
  - con voz de tristeza
  lexicon: HALOT
  rationale: La expresión combina «voz» con un adjetivo de aflicción. «Angustiada» transmite bien el estado emocional intenso del rey y mantiene el tono solemne del relato.
- source_word: זְעִק
  english_pob_choice: he cried out
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - llamó a voz en grito
  lexicon: HALOT
  rationale: El verbo indica un llamado fuerte y urgente. «Gritó» es la equivalencia más directa y clara en español.
- source_word: עָנֵה מַלְכָּא וְאָמַר
  english_pob_choice: The king spoke and said
  chosen_spanish: El rey habló y dijo
  alternatives_spanish:
  - El rey respondió y dijo
  - El rey habló
  lexicon: HALOT
  rationale: La fórmula aramea es idiomática y puede sonar pesada si se calca con demasiada literalidad. «Habló y dijo» conserva el valor discursivo sin forzar una idea de respuesta que el contexto inmediato no exige.
- source_word: עֲבֵד אֱלָהָא חַיָּא
  english_pob_choice: servant of the living God
  chosen_spanish: siervo del Dios viviente
  alternatives_spanish:
  - servidor del Dios viviente
  - esclavo del Dios viviente
  lexicon: HALOT
  rationale: Aunque «esclavo» es posible para עֲבֵד en ciertos contextos, aquí la frase funciona como tratamiento honorífico-religioso. «Siervo» mantiene la reverencia y es una forma muy estable en español bíblico para este tipo de designación.
- source_word: אֱלָהָךְ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - su Dios
  lexicon: HALOT
  rationale: El poseedor es directo y singular; «tu Dios» reproduce la referencia personal del discurso del rey a Daniel.
- source_word: דִּי אנתה פָּלַח לֵהּ
  english_pob_choice: whom you continually serve
  chosen_spanish: a quien tú sirves constantemente
  alternatives_spanish:
  - a quien tú sirves continuamente
  - a quien tú adoras constantemente
  - a quien tú prestas servicio constantemente
  lexicon: HALOT
  rationale: פָּלַח puede abarcar servicio religioso o adoración. «Sirves» conserva la amplitud semántica y el vínculo con «siervo», mientras «constantemente» traduce bien בִּתְדִירָא.
- source_word: בִּתְדִירָא
  english_pob_choice: continually
  chosen_spanish: constantemente
  alternatives_spanish:
  - continuamente
  - de manera constante
  - siempre
  lexicon: HALOT
  rationale: La forma expresa continuidad habitual. «Constantemente» suena natural en español y conserva la idea de práctica sostenida.
- source_word: הַיְכִל
  english_pob_choice: has ... been able
  chosen_spanish: ha podido
  alternatives_spanish:
  - ha sido capaz de
  - pudo
  - ha logrado
  lexicon: HALOT
  rationale: La pregunta mira al resultado alcanzado hasta ese momento. «Ha podido» reproduce bien la capacidad efectiva en el contexto narrativo.
- source_word: לְשֵׁיזָבוּתָךְ
  english_pob_choice: to deliver you
  chosen_spanish: librarte
  alternatives_spanish:
  - rescatarte
  - salvarte
  - sacarte libre
  lexicon: HALOT
  rationale: El verbo significa liberar o rescatar de un peligro. «Librarte» funciona de manera natural en español bíblico y conserva el sentido de liberación física.
- source_word: מִן אַרְיָוָתָא
  english_pob_choice: from the lions
  chosen_spanish: de los leones
  alternatives_spanish:
  - de entre los leones
  - de las fieras
  lexicon: HALOT
  rationale: La preposición señala separación respecto a los leones. «De los leones» es una traducción directa y transparente.
theological_decisions:
- issue: 'Título para Daniel en relación con Dios: עֲבֵד אֱלָהָא חַיָּא'
  english_pob_reading: servant of the living God
  chosen_spanish_reading: siervo del Dios viviente
  alternative_spanish_readings:
  - esclavo del Dios viviente
  rationale: Aunque el proyecto distingue con cuidado entre términos de servidumbre y esclavitud, aquí la función es honorífica y devocional. «Siervo» comunica fidelidad reverente sin imponer una dureza social que el pasaje no subraya.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; sensibilidad léxica para términos de servidumbre
- issue: Valor de פָּלַח
  english_pob_reading: whom you continually serve
  chosen_spanish_reading: a quien tú sirves constantemente
  alternative_spanish_readings:
  - a quien tú adoras constantemente
  - a quien tú rindes servicio constantemente
  rationale: El arameo puede referirse a servicio religioso o adoración. Se prefirió «sirves» porque conserva la amplitud semántica y evita restringir el verbo a un solo acto cultual.
  doctrine_reference: DOCTRINE.md Translation philosophy §5; consistencia terminológica y amplitud semántica
- issue: Elección de «foso» para גֻבָּא
  english_pob_reading: den
  chosen_spanish_reading: foso
  alternative_spanish_readings:
  - cueva
  - pozo
  rationale: En español, «foso» es la denominación más clara y tradicionalmente comprensible para el lugar de los leones en Daniel 6, sin perder la idea de excavación o encierro.
  doctrine_reference: Principio de claridad contextual y precisión narrativa
translation_notes:
  revision_awareness: La base inglesa del POB fue revisada de «answered and said» a «spoke and said» por mayor precisión lexical. La versión española evita la fórmula más rígida y conserva esa corrección con «habló y dijo», sin introducir una idea de respuesta explícita que el arameo no requiere. También se mantuvo la equivalencia semántica de la pregunta final sobre la capacidad de Dios para librar a Daniel.
  spanish_consistency_notes:
  - Se preservó la distinción entre «siervo» y «esclavo» como decisión contextual, no automática.
  - «Dios viviente» se mantuvo como título divino compacto y reverente.
  - «Sirves constantemente» conserva la continuidad habitual expresada por בִּתְדִירָא.
  - La puntuación con comillas españolas y el tratamiento directo a Daniel siguen un registro bíblico moderno y publicable.
