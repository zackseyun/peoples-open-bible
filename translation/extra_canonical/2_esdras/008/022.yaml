  from: whose service is in wind and fire,
  to: whose service turns to wind and fire,
  rationale: The draft completely omits the Latin verb 'conuertitur' ('is turned' / 'is changed'). The author is alluding to the cosmological motif (cf. Psalm 104:4) where angels or their service take the form of wind and fire. Restoring the verb is necessary for accuracy and also helps distinguish this clause (which refers back to the angels via the plural 'Quorum') from the subsequent clauses (which refer to God via the singular 'cuius').
