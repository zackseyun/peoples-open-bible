translation:
  language: es
  text: O si la carne tiene en su piel una quemadura por fuego[a], y la carne viva de la quemadura llega a ser una mancha brillante, blanco-rojiza o blanca[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Carne» traduce aquí בָשָׂר con el sentido de tejido corporal en una ley de diagnóstico de la piel; también puede entenderse como «cuerpo».
    reason: lexical_alternative
  - marker: b
    text: «Carne viva» refleja una expresión hebrea que describe tejido vivo o crudo visible en la zona de la quemadura.
    reason: cultural_note
lexical_decisions:
- source_word: א֣וֹ
  english_pob_choice: Or if
  chosen_spanish: O si
  alternatives_spanish:
  - O
  lexicon: HALOT
  rationale: En la ley casuística, la disyunción abre un nuevo caso; en español, «O si» conserva la función condicional y suena natural en contexto legal.
- source_word: בָשָׂ֔ר
  english_pob_choice: the body
  chosen_spanish: la carne
  alternatives_spanish:
  - el cuerpo
  - la carne corporal
  lexicon: HALOT
  rationale: El hebreo בָשָׂר puede referirse a carne o tejido corporal. Aquí, como en la nota inglesa, el contexto jurídico-diagnóstico favorece una referencia al tejido afectado; «la carne» preserva mejor la tensión léxica que «el cuerpo» y evita suavizar el término.
- source_word: בְעֹר֖וֹ
  english_pob_choice: on its skin
  chosen_spanish: en su piel
  alternatives_spanish:
  - sobre su piel
  - en su cutis
  lexicon: HALOT
  rationale: La frase apunta a la superficie cutánea del afectado. «En su piel» mantiene la localización y fluye con naturalidad en español.
- source_word: מִכְוַת אֵשׁ
  english_pob_choice: a burn from fire
  chosen_spanish: una quemadura de fuego
  alternatives_spanish:
  - una quemadura causada por fuego
  - una quemadura por fuego
  lexicon: HALOT
  rationale: La construcción hebrea designa una quemadura producida por fuego; «de fuego» es conciso y fiel, sin diluir la causa.
- source_word: מִחְיַת הַמִּכְוָה
  english_pob_choice: the raw flesh of the burn
  chosen_spanish: la carne viva de la quemadura
  alternatives_spanish:
  - el tejido vivo de la quemadura
  - la carne cruda de la quemadura
  lexicon: HALOT
  rationale: מִחְיָה en este contexto describe tejido vivo o crudo que aparece en la zona lesionada. «Carne viva» reproduce la fuerza idiomática y conserva la imagen corporal sin tecnicismo excesivo.
- source_word: בַּהֶרֶת
  english_pob_choice: a bright spot
  chosen_spanish: una mancha brillante
  alternatives_spanish:
  - una mancha resplandeciente
  - una marca brillante
  lexicon: HALOT
  rationale: En Levítico 13 el término nombra una marca/lesión visible en la piel. «Mancha brillante» comunica bien la señal diagnóstica; «mancha» evita introducir un matiz de volumen que no exige el hebreo.
- source_word: לְבָנָה אֲדַמְדֶּמֶת
  english_pob_choice: reddish-white
  chosen_spanish: rojiza-blanca
  alternatives_spanish:
  - blanquecina-rojiza
  - blanco-rojiza
  lexicon: HALOT
  rationale: Los adjetivos expresan un color mixto. «Rojiza-blanca» conserva el orden compuesto y la mezcla cromática, de modo cercano al hebreo y al inglés auditado.
- source_word: א֥וֹ לְבָנָֽה
  english_pob_choice: or white
  chosen_spanish: o blanca
  alternatives_spanish:
  - o blanca sola
  - o de color blanco
  lexicon: HALOT
  rationale: Se mantiene la alternativa simple final del hebreo con una forma natural en español.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y coincide con la lectura auditada en inglés, manteniendo las opciones léxicas relevantes sin añadir interpretaciones. No se detectaron revisiones aplicadas en el pasaje base; por ello, la redacción española conserva la estructura diagnóstica y la doble descripción cromática.
  spanish_consistency_notes:
  - Se mantiene «carne» para בָשָׂר en este contexto médico-legal, en contraste con usos donde podría preferirse «flesh»/«carne» de manera más general.
  - Se usa «piel» para עוֹר en una localización corporal concreta y «carne viva» para מִחְיָה, preservando la distinción entre superficie cutánea y tejido afectado.
  - 'Se conserva el paralelismo de las dos alternativas de color: «rojiza-blanca o blanca».'
