translation:
  language: es
  text: ¡Clama a gran voz; no te contengas! Alza tu voz como trompeta[a], y declara a mi pueblo su rebelión[b], y a la casa de Jacob sus pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "como cuerno de carnero"; el hebreo shofar designa un cuerno usado para señales o proclamación.
    reason: cultural_note
  - marker: b
    text: O "su transgresión"; el hebreo puede enfatizar una rebelión deliberada contra Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְרָא
  english_pob_choice: Cry out
  chosen_spanish: ¡Clama a gran voz!
  alternatives_spanish:
  - ¡Grita!
  - ¡Proclama!
  lexicon: HALOT
  rationale: El imperativo pide una proclamación pública, fuerte y urgente. "Clama" conserva ese valor exhortativo y solemne en español; "a gran voz" explicita la intensidad que en inglés POB se expresó con "Cry out".
- source_word: בְגָרוֹן
  english_pob_choice: with your throat
  chosen_spanish: a gran voz
  alternatives_spanish:
  - con tu garganta
  - con toda tu voz
  lexicon: HALOT
  rationale: El hebreo es literalmente "con la garganta", pero en español "con tu garganta" suena forzado. "A gran voz" preserva la idea de vocalización intensa y audible sin perder la fuerza corporal de la imagen.
- source_word: אַל תַּחְשֹׂךְ
  english_pob_choice: do not hold back
  chosen_spanish: no te detengas
  alternatives_spanish:
  - no te reprimas
  - no escatimes
  lexicon: HALOT
  rationale: La expresión idiomática comunica no contener ni frenar la proclamación. "No te detengas" transmite bien la exhortación a no callar ni aminorar el anuncio, con español natural.
- source_word: כַּשּׁוֹפָר
  english_pob_choice: like a trumpet
  chosen_spanish: como trompeta
  alternatives_spanish:
  - como cuerno de carnero
  - como shofar
  lexicon: HALOT
  rationale: POB usa "trumpet" para comunicar la función de señal/proclamación del שׁוֹפָר. En español, "trompeta" es la equivalencia funcional más clara; la especificidad cultural queda implícita en el término y puede explicarse en nota si se desea.
- source_word: הָרֵם קוֹלֶךָ
  english_pob_choice: Raise your voice
  chosen_spanish: Alza tu voz
  alternatives_spanish:
  - Levanta tu voz
  - Eleva tu voz
  lexicon: HALOT
  rationale: Es el equivalente idiomático más natural en español y conserva el tono imperativo del hebreo y del inglés POB.
- source_word: וְהַגֵּד
  english_pob_choice: declare
  chosen_spanish: y denuncia
  alternatives_spanish:
  - y declara
  - y anuncia
  - y da a conocer
  lexicon: HALOT
  rationale: El verbo pide una comunicación directa y profética. Dado que el objeto es la culpa del pueblo, "denuncia" expresa mejor el carácter acusatorio que "decir" o "anunciar"; mantiene la dimensión judicial del texto.
- source_word: לְעַמִּי
  english_pob_choice: to my people
  chosen_spanish: a mi pueblo
  alternatives_spanish:
  - a mi gente
  - a mi pueblo, a los míos
  lexicon: HALOT
  rationale: Se conserva la relación de pertenencia del pacto. "Mi pueblo" es natural en español bíblico y no requiere sustitución.
- source_word: פִּשְׁעָם
  english_pob_choice: their rebellion
  chosen_spanish: sus rebeliones
  alternatives_spanish:
  - su rebelión
  - sus transgresiones
  - sus rebeldías
  lexicon: HALOT
  rationale: El plural hebreo favorece un plural en español. "Rebeliones" conserva la fuerza de פֶּשַׁע como infracción deliberada contra Dios, tal como refleja la lectura alternativa documentada por POB.
- source_word: וּלְבֵית יַעֲקֹב
  english_pob_choice: and to the house of Jacob
  chosen_spanish: y a la casa de Jacob
  alternatives_spanish:
  - y a la familia de Jacob
  - y al linaje de Jacob
  lexicon: HALOT
  rationale: Se mantiene la designación histórica y pactal del texto hebreo. "Casa de Jacob" es una fórmula clara y fiel en español.
- source_word: חַטֹּאתָם
  english_pob_choice: their sins
  chosen_spanish: sus pecados
  alternatives_spanish:
  - sus faltas
  - su pecado
  lexicon: HALOT
  rationale: El plural hebreo se conserva con el plural español. "Pecados" es el término más directo y comprensible, y se coordina bien con "rebeliones" sin borrar la distinción semántica.
theological_decisions:
- issue: Cómo expresar פֶּשַׁע sin suavizar su carga de desobediencia deliberada
  english_pob_reading: their rebellion
  chosen_spanish_reading: sus rebeliones
  alternative_spanish_readings:
  - sus transgresiones
  - sus rebeldías
  rationale: POB opta por "rebellion" para mantener el matiz de ruptura voluntaria con Dios. "Sus rebeliones" conserva esa fuerza en español y evita reducir el término a una falta genérica o meramente moral.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
- issue: Relación entre "mi pueblo" y "la casa de Jacob"
  english_pob_reading: Both expressions are retained distinctly in the main text without collapsing them into a single phrase.
  chosen_spanish_reading: 'Se conservan como dos destinatarios/expresiones paralelas distintas: "a mi pueblo" y "a la casa de Jacob".'
  alternative_spanish_readings:
  - Tratar la segunda frase como simple apposición de la primera
  - fusionar ambas en una sola designación
  rationale: El hebreo presenta dos expresiones paralelas, y el POB en inglés las mantiene separadas. En español también conviene conservar esa duplicación retórica y covenantal, sin aplanarla.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés y el hebreo: conserva la imaginería corporal de "garganta/voz", la función proclamatoria del שׁוֹפָר, el matiz acusatorio de הַגֵּד y la distinción retórica entre "mi pueblo" y "la casa de Jacob". No se detectaron revisiones aplicadas en el paquete fuente, y el pasaje muestra alta concordancia con la traducción auditada.'
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el texto fuente lo requiera explícitamente; este versículo no lo contiene.
  - '"Pueblo" y "casa de Jacob" se mantienen separados para respetar el paralelismo hebreo.'
  - Se eligió "pecados" en plural para corresponder al plural hebreo חַטֹּאתָם.
  - La nota de "trompeta" se ancla en el término español para recoger la alternativa cultural del שׁוֹפָר sin sobrecargar el texto principal.
