revisions:
- from: Entonces Daniel dijo al mayordomo[a], que el jefe de los eunucos había puesto sobre Daniel, Ananías, Misael y Azarías,
  to: Entonces Daniel dijo al mayordomo que el jefe de los eunucos[a] había asignado a Daniel, Ananías, Misael y Azarías,
  rationale: Se corrige el anclaje de la nota para que recaiga sobre «eunucos», que es el término realmente explicado por la nota inglesa y por la evidencia léxica. Además, se reemplaza «había puesto sobre» por «había asignado a», una formulación más natural en español y adecuada para el valor de supervisión de עַל en este contexto. Se conserva «mayordomo» para הַמֶּלְצַר, ya que sigue bien la decisión documentada de traducir el cargo por función.
