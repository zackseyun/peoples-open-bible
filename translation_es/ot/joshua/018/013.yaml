translation:
  language: es
  text: Desde allí el límite pasó a Luz[a], a la ladera sur de Luz[b] (es decir, Betel), y el límite descendió a Atrot-adar[c], sobre el monte que está al sur de Bet-horón inferior.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Luz se identifica aquí con Betel.
    reason: cross_reference
  - marker: b
    text: O «al hombro sur de Luz»; el hebreo usa un término corporal para el costado o la ladera de una colina.
    reason: lexical_alternative
  - marker: c
    text: Atrot-adar también se escribe «Atarot-adar» en algunas tradiciones en español e inglés.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָבַר
  english_pob_choice: passed
  chosen_spanish: pasó
  alternatives_spanish:
  - cruzó
  - se extendió
  lexicon: HALOT
  rationale: En descripciones de límites territoriales, עבר expresa el avance del lindero; en español, «pasó» conserva ese movimiento sin sugerir una acción humana literal.
- source_word: הַגְּבוּל
  english_pob_choice: the border
  chosen_spanish: el límite
  alternatives_spanish:
  - la frontera
  - el borde
  lexicon: HALOT
  rationale: En un contexto de repartición territorial, «límite» es claro y natural en español moderno, y mantiene el valor técnico de la línea demarcatoria.
- source_word: לֻזָה
  english_pob_choice: Luz
  chosen_spanish: Luz
  alternatives_spanish:
  - Lusa
  lexicon: Nombre propio; transliteración
  rationale: Se conserva el topónimo en forma transliterada. No hay base para españolizarlo más allá de la forma estándar del nombre bíblico.
- source_word: אֶל כֶּתֶף לֻזָה נֶגְבָּה
  english_pob_choice: to the southern slope of Luz
  chosen_spanish: al lado sur de Luz
  alternatives_spanish:
  - a la ladera sur de Luz
  - al hombro sur de Luz
  lexicon: HALOT
  rationale: כֶּתֶף literalmente es «hombro», pero en topografía designa el flanco o costado de una colina. «Lado sur» comunica bien el sentido espacial; en nota se puede conservar la alternativa literal si se desea.
- source_word: הִיא בֵּית אֵל
  english_pob_choice: that is, Bethel
  chosen_spanish: (es decir, Betel)
  alternatives_spanish:
  - o sea, Betel
  - esto es, Betel
  lexicon: Identificación appositiva
  rationale: La construcción hebrea identifica Luz con Betel; «es decir» expresa de forma natural la aclaración sin añadir interpretación.
- source_word: וְיָרַד
  english_pob_choice: went down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - fue bajando
  lexicon: HALOT
  rationale: En una descripción geográfica, «descendió» conserva el relieve y el movimiento vertical del texto fuente.
- source_word: עַטְרוֹת אַדָּר
  english_pob_choice: Atroth-addar
  chosen_spanish: Atrot-adar
  alternatives_spanish:
  - Atarot-adar
  - Atroth-adar
  lexicon: Nombre propio; transliteración
  rationale: Se translitera el nombre propio de manera cercana al hebreo. «Atrot» refleja la vocalización consonántica del nombre, evitando una forma castellanizada sin respaldo textual.
- source_word: עַל הָהָר
  english_pob_choice: on the mountain
  chosen_spanish: sobre el monte
  alternatives_spanish:
  - en el monte
  - sobre la montaña
  lexicon: HALOT
  rationale: «Monte» es natural en español bíblico y conserva la referencia topográfica concreta.
- source_word: מִנֶּגֶב לְבֵית חֹרוֹן תַּחְתּוֹן
  english_pob_choice: south of Lower Beth-horon
  chosen_spanish: al sur de Baal-horón la de abajo
  alternatives_spanish:
  - al sur de Bet-horón la de abajo
  - al sur del Bajo Bet-horón
  lexicon: Nombre propio + topónimo compuesto
  rationale: Se sigue la forma del nombre geográfico tradicional en español, pero manteniendo el elemento «la de abajo» para rendir תַּחְתּוֹן sin borrarlo. «Baal-horón» conserva la huella del hebreo במקום de normalizarlo a una forma eclesiástica sin control textual.
- source_word: תַּחְתּוֹן
  english_pob_choice: Lower
  chosen_spanish: la de abajo
  alternatives_spanish:
  - la baja
  - inferior
  lexicon: HALOT
  rationale: Para evitar una calca demasiado rígida y conservar el valor descriptivo del topónimo, se traduce literalmente como «la de abajo», manteniendo la distinción con el asentamiento superior.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el sentido topográfico y la identificación appositiva del hebreo, tomando como control el audit trail inglés. Se ajustó la terminología a un español bíblico claro: «límite» para גבול, «descendió» para ירד, y se preservó la tensión léxica de כֶּתֶף mediante una opción idiomática con nota alternativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo explicita el nombre divino; este versículo no lo contiene.
  - Se mantiene la transliteración de nombres propios geográficos sin introducir formas interpretativas no atestiguadas.
  - «Monte» y «límite» se emplean como términos topográficos estables para coherencia con otros pasajes de reparto territorial.
