    changes_summary: Replaced interpretive 'wasting sickness' with more literal 'leanness' for רָזוֹן, and 'stout warriors' with 'fat ones' to reflect בְּמִשְׁמַנָּיו more directly without adding 'warriors.' Kept the final clause essentially unchanged, with 'Yahweh of Armies' for the divine name.
translation:
  language: es
  text: Por tanto, el Señor, Yahvé de los ejércitos, enviará delgadez entre sus gordos[a], y bajo su gloria[b][c] se encenderá un ardor, como el ardor del fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra sus gordos», o «entre sus bien alimentados»; el hebreo usa una imagen de gordura para fuerza, prosperidad o élites robustas.
    reason: lexical_alternative
  - marker: b
    text: 'O «en lugar de su gloria», tomando «bajo» en sentido de sustitución: lo que reemplaza su esplendor es fuego.'
    reason: alternative_reading
  - marker: c
    text: «Su gloria» también puede entenderse como «su esplendor» o «su pompa».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: La partícula inferencial introduce la consecuencia del juicio previo; «Por tanto» conserva el enlace lógico con registro digno y natural en español.
- source_word: יְשַׁלַּח
  english_pob_choice: will send
  chosen_spanish: enviará
  alternatives_spanish:
  - soltará
  - mandará
  lexicon: HALOT
  rationale: El pi‘el expresa el envío o desatamiento de un juicio. «Enviará» es directo y fiel sin volverlo demasiado interpretativo.
- source_word: הָאָדוֹן יְהוָה צְבָאֹות
  english_pob_choice: the Lord, Yahweh of Armies
  chosen_spanish: el Señor, Yahvé de los ejércitos
  alternatives_spanish:
  - el Señor Yahvé de los ejércitos
  - el Soberano, Yahvé de los ejércitos
  lexicon: HALOT
  rationale: Se conserva el título con artículo «el Señor» para אָדוֹן, y el nombre divino como «Yahvé» según el criterio del proyecto. «de los ejércitos» traduce צְבָאֹות de forma transparente.
- source_word: בְּמִשְׁמַנָּיו
  english_pob_choice: among his fat ones
  chosen_spanish: entre sus gordos
  alternatives_spanish:
  - entre sus robustos
  - entre sus bien alimentados
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente de «fatness»; «gordos» mantiene esa base corporal y permite que el lector perciba la metáfora de fuerza/prosperidad sin añadir «guerreros» u otra aclaración no presente en el hebreo.
- source_word: רָזוֹן
  english_pob_choice: leanness
  chosen_spanish: delgadez
  alternatives_spanish:
  - extenuación
  - desnutrición
  lexicon: HALOT
  rationale: El sustantivo describe la cualidad opuesta a la gordura. «Delgadez» es la equivalencia más literal y transparente en español, preservando la imagen corporal del juicio.
- source_word: וְתַחַת כְּבֹדוֹ
  english_pob_choice: and under his glory
  chosen_spanish: y bajo su gloria
  alternatives_spanish:
  - y en lugar de su gloria
  - y debajo de su esplendor
  lexicon: HALOT
  rationale: «Bajo» conserva la imagen espacial del hebreo y deja abierta la posible lectura sustitutiva que el texto puede sugerir. «Gloria» mantiene el peso semántico de כבוד.
- source_word: כְּבֹדוֹ
  english_pob_choice: his glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su esplendor
  - su pompa
  lexicon: HALOT
  rationale: «Gloria» traduce כבוד de manera amplia y solemne; en este contexto puede incluir esplendor o pompa, pero el término base español se mantiene para no reducir el alcance del hebreo.
- source_word: יֵקַד יְקֹד
  english_pob_choice: a burning will be kindled
  chosen_spanish: se encenderá un fuego
  alternatives_spanish:
  - arderá un ardor
  - se prenderá una llama
  lexicon: HALOT
  rationale: La duplicación intensifica la idea de arder. En español, «se encenderá un fuego» comunica el evento de manera natural y deja espacio para la repetición enfática del hebreo en la comparación final.
- source_word: כִּיקוֹד אֵשׁ
  english_pob_choice: like the burning of fire
  chosen_spanish: como el ardor del fuego
  alternatives_spanish:
  - como el incendio de fuego
  - como el arder de un fuego
  lexicon: HALOT
  rationale: La frase comparativa retoma la intensificación final. «Ardor del fuego» conserva el valor verbal/sustantivo del hebreo y suena natural en español literario.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el valor propio del Tetragrama como nombre de pacto, no una máscara litúrgica. «Yahvé» es la forma terminológica del proyecto en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de la imagen de «gordos» y «delgadez»
  english_pob_reading: The verse depicts judgment on Assyria's elite strength and splendor, using bodily and fire imagery metaphorically.
  chosen_spanish_reading: El versículo presenta juicio sobre la fuerza y el esplendor de Asiria mediante imágenes corporales y de fuego.
  alternative_spanish_readings:
  - Una referencia principalmente física al cuerpo
  - Una alusión a nobles o guerreros sin destacar la imagen corporal
  rationale: Se conserva la metáfora corporal del hebreo sin convertirla en explicación alegórica. Así se mantiene la tensión entre lectura literal y figurada que el texto permite.
  doctrine_reference: Isaías 10:16 en su contexto de juicio contra la soberbia asiria
translation_notes:
  revision_awareness: He seguido la revisión más reciente del audit trail al preferir una traducción más literal de רָזוֹן y de בְּמִשְׁמַנָּיו, manteniendo la imagen corporal. También he conservado la opción doctrinal del proyecto para יהוה como «Yahvé», en lugar del equivalente inglés «Yahweh» o de una sustitución por «SEÑOR».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al criterio del proyecto.
  - «ejércitos» traduce צְבָאֹות de forma transparente y uniforme.
  - Se conserva la metáfora corporal del hebreo («gordos» / «delgadez») sin añadir elementos no explícitos en el texto base.
  - La puntuación sigue el español moderno y el tono bíblico digno requerido.
