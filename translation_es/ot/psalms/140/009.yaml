translation:
  language: es
  text: Oh, Yahvé, no concedas los deseos del impío; no hagas prosperar[a] su plan, para que no sean exaltados[b]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no hagas llegar a cumplimiento su plan'. El verbo hebreo de este miembro es difícil, y el sentido puede ser 'no promuevas' o 'no hagas que se cumpla su designio'.
    reason: lexical_alternative
  - marker: b
    text: O 'para que no sea exaltado'. El hebreo usa una forma plural ('sean exaltados'), aunque algunas traducciones la suavizan al singular para el estilo español.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio en la forma de uso proyectada para español, siguiendo la política del proyecto de no sustituir el Tetragrámaton por un título. 'Yahvé' comunica el nombre personal de Dios con claridad y evita la máscara devocional de 'SEÑOR'.
- source_word: מַאֲוַיֵּי
  english_pob_choice: the desires of
  chosen_spanish: los deseos de
  alternatives_spanish:
  - las ansias de
  - las aspiraciones de
  lexicon: HALOT
  rationale: El sustantivo denota deseos o anhelos; 'los deseos de' reproduce la fuerza semántica de manera natural en español sin intensificar indebidamente el término.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el perverso
  lexicon: HALOT
  rationale: Aunque el hebreo puede funcionar como etiqueta de clase, en español 'el impío' conserva el valor moral y la referencia representativa con un tono bíblico claro y comprensible. Se evita 'malvado' por sonar más psicológico y menos jurídico-covenantal.
- source_word: זְמָמוֹ
  english_pob_choice: his scheme
  chosen_spanish: su plan
  alternatives_spanish:
  - su designio
  - su esquema
  lexicon: HALOT
  rationale: El término puede referirse a un plan, a menudo con intención hostil. 'Su plan' es más transparente en español y deja visible la posible ambigüedad entre un proyecto en general y un plan malicioso, sin sobrecargar el verso.
- source_word: תָּפֵק
  english_pob_choice: advance
  chosen_spanish: hagas prosperar
  alternatives_spanish:
  - hagas avanzar
  - lleves a cabo
  - lo promociones
  lexicon: HALOT
  rationale: El verbo es difícil; el contexto pide que Dios no cause que el designio del impío llegue a buen término. 'Hagas prosperar' expresa de forma idiomática la idea de que algo avance con éxito, sin resolver de manera excesiva la ambigüedad del hebreo.
- source_word: יָרֻמוּ
  english_pob_choice: they be exalted
  chosen_spanish: sean exaltados
  alternatives_spanish:
  - se levanten
  - se alcen
  lexicon: HALOT
  rationale: Se preserva el plural del verbo hebreo en español ('sean exaltados'), manteniendo la tensión textual entre el singular previo y el plural final. La voz pasiva refleja la elevación en éxito o arrogancia sin forzar un sujeto singular inexistente en la forma verbal.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se translitera porque su función exacta es incierta y traducirla sería más especulativo que auditable.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el nombre propio de Dios en lugar de una sustitución honorífica. 'Yahvé' es la forma proyectada para español dentro de la política terminológica del proyecto y preserva la referencia directa al Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Tensión numérica entre el singular de los primeros miembros y el plural final יָרֻמוּ
  english_pob_reading: Preserve the plural in the final clause
  chosen_spanish_reading: 'Preservar el plural: ''sean exaltados'''
  alternative_spanish_readings:
  - '''sea exaltado'' para suavizar al singular'
  - '''se exalte'' como lectura genérica'
  rationale: Se conserva la tensión del hebreo en vez de resolverla. El plural puede ampliar la referencia desde el impío individual hacia los impíos en general o hacia sus asociados, y la traducción no debe cerrar esa posibilidad.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del texto hebreo y del audit trail en inglés. No hubo revisiones aplicadas en el ciclo fuente; la decisión principal fue conservar la dificultad verbal de תָּפֵק con una solución española idiomática, y mantener el plural final del hebreo en vez de normalizarlo al singular.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme a la terminología del proyecto.
  - '''Impío'' se eligió como equivalente de clase moral para רָשָׁע, evitando alternar con ''malvado'' dentro del mismo verso.'
  - Se mantiene la transliteración 'Selah' por consistencia con el tratamiento del término en la serie.
  - 'La secuencia verbal conserva el paralelismo negativo del hebreo: dos peticiones prohibiendo conceder/prosperar, seguidas por la cláusula final de consecuencia.'
  - El plural 'sean exaltados' se deja visible en español para no borrar la tensión del texto fuente.
