translation:
  language: es
  text: Entonces Esdras se levantó del atrio del templo y fue a la cámara de Jona, hijo de Naseib.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναστὰς
  english_pob_choice: rose up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso en pie
  - se alzó
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción siguiente; en español, «se levantó» comunica bien el movimiento narrativo sin sonar forzado.
- source_word: αὐλῆς
  english_pob_choice: court
  chosen_spanish: corte
  alternatives_spanish:
  - patio
  - atrio
  - recinto
  lexicon: LSJ
  rationale: En contexto del templo, «corte» conserva la idea de un espacio abierto/recinto del complejo sagrado y sigue de cerca la opción inglesa sin perder naturalidad.
- source_word: τοῦ ἱεροῦ
  english_pob_choice: of the temple
  chosen_spanish: del templo
  alternatives_spanish:
  - del santuario
  - del recinto sagrado
  lexicon: LSJ
  rationale: ἱερόν aquí se refiere al complejo del templo, no al santuario interior; «templo» es la opción más clara y fiel en español.
- source_word: ἐπορεύθη
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - fue andando
  - se dirigió
  - partió
  lexicon: BDAG
  rationale: Verbo narrativo estándar de movimiento; «fue» es directo y sobrio. «Se dirigió» explicitaría más de lo que el griego exige.
- source_word: παστοφόριον
  english_pob_choice: chamber
  chosen_spanish: cámara
  alternatives_spanish:
  - cuarto
  - habitación
  - aposento
  lexicon: LSJ
  rationale: El término designa una habitación o cámara dentro del complejo del templo. «Cámara» preserva el tono formal y arquitectónico mejor que «cuarto».
- source_word: Ἰωνᾶ τοῦ Νασείβου
  english_pob_choice: Jona son of Naseib
  chosen_spanish: Jona, hijo de Naseib
  alternatives_spanish:
  - Jona, hijo de Naseibo
  - Joná, hijo de Naseib
  lexicon: LSJ
  rationale: La forma griega transmitida en Swete es Ἰωνᾶ τοῦ Νασείβου; la revisión inglesa reciente corrigió el nombre para ajustarlo al griego. En español se conserva esa lectura y se traslitera de manera consistente como nombres propios, sin sustituirlos por el paralelo hebreo.
translation_notes:
  revision_awareness: 'La versión inglesa del expediente pasó por una revisión que primero alineó los nombres con el paralelo hebreo, pero la revisión más reciente los devolvió al griego: Ἰωνᾶ τοῦ Νασείβου. Esta traducción sigue el griego como fuente primaria y por eso mantiene Jona, hijo de Naseib, en el texto principal.'
  spanish_consistency_notes:
  - 'Se preserva el orden narrativo del griego: movimiento inicial, lugar de salida y destino.'
  - Los nombres propios se transliteran según la forma griega del expediente, no según el paralelo hebreo.
  - «Corte» se usa en sentido espacial, no institucional.
  - El registro es sobrio y bíblico moderno, sin arcaísmos innecesarios.
