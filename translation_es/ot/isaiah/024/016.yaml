translation:
  language: es
  text: 'Desde el extremo[a] de la tierra oímos cantos: «¡Gloria al justo![b]» Pero yo digo: «Me consumo, me consumo.[c] ¡Ay de mí!» Los traidores traicionan; con traición los traidores traicionan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Desde el ala de la tierra» o «Desde los confines de la tierra».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Belleza» u «Honor» al justo; también puede entenderse colectivamente: «a los justos».'
    reason: alternative_reading
  - marker: c
    text: El hebreo רָזִי לִי es difícil. Tradicionalmente se entiende como un clamor de consunción o debilitamiento; alternativamente, algunos lo traducen «Mi secreto es mío» o «Es un misterio para mí».
    reason: alternative_reading
lexical_decisions:
- source_word: מִכְּנַף הָאָרֶץ
  english_pob_choice: From the edge of the earth
  chosen_spanish: Desde el extremo de la tierra
  alternatives_spanish:
  - Desde el ala de la tierra
  - Desde los confines de la tierra
  lexicon: HALOT
  rationale: כָּנָף literalmente es “ala”, pero en uso geográfico funciona como extremo o borde. “Extremo de la tierra” conserva la imagen idiomática y suena natural en español. “Confines” es posible, pero pluraliza e interpreta más de lo que exige el hebreo singular.
- source_word: זְמִרֹת
  english_pob_choice: songs
  chosen_spanish: cantos
  alternatives_spanish:
  - cantos de alabanza
  - melodías
  lexicon: HALOT
  rationale: El sustantivo denota cantos o música. “Cantos” comunica bien el sentido general sin añadir explícitamente “alabanza”, que no está expresada por la palabra sola.
- source_word: צְבִי לַצַּדִּיק
  english_pob_choice: Glory to the righteous one
  chosen_spanish: Gloria al justo
  alternatives_spanish:
  - Belleza al justo
  - Honor al justo
  - Majestad al justo
  lexicon: HALOT
  rationale: צְבִי puede significar belleza, gloria, esplendor u honor. En este contexto de aclamación, “Gloria” expresa mejor el tono laudatorio. “El justo” conserva el singular del hebreo; no se resuelve si es un individuo específico o un uso colectivo.
- source_word: וָאֹמַר
  english_pob_choice: But I say
  chosen_spanish: Pero yo digo
  alternatives_spanish:
  - Y dije
  - Entonces dije
  lexicon: HALOT
  rationale: La waw consecutiva avanza el discurso. “Pero yo digo” refleja el contraste brusco entre los cantos oídos y la lamentación del profeta; el matiz adversativo está sustentado por el cambio de escena.
- source_word: רָזִי לִי רָזִי לִי
  english_pob_choice: I waste away, I waste away
  chosen_spanish: Me consumo, me consumo
  alternatives_spanish:
  - Me marchito, me marchito
  - Estoy arruinado, estoy arruinado
  - Mi secreto es mío, mi secreto es mío
  lexicon: HALOT
  rationale: La raíz רזה comunica flaqueza, adelgazamiento o consumirse, y en lenguaje de lamento puede expresar abatimiento físico y ruina. “Me consumo” es idiomático en español y preserva el valor de desgaste. Se deja constancia de que la lectura alternativa “mi secreto” sigue posible en el hebreo consonántico.
- source_word: אוֹי לִי
  english_pob_choice: Woe is me!
  chosen_spanish: ¡Ay de mí!
  alternatives_spanish:
  - ¡Ay para mí!
  - ¡Desdicha para mí!
  lexicon: HALOT
  rationale: Es una interjección de lamento muy estable. “¡Ay de mí!” reproduce de forma natural la fuerza emotiva y es la forma idiomática más cercana en español.
- source_word: בֹּגְדִים בָּגָדוּ
  english_pob_choice: The treacherous deal treacherously
  chosen_spanish: Los traidores traicionan
  alternatives_spanish:
  - Los infieles actúan con infidelidad
  - Los traicioneros actúan traicioneramente
  lexicon: HALOT
  rationale: El verbo בגד expresa actuar con traición o perfidia. “Los traidores traicionan” conserva el paralelismo y el efecto de raíz/cognado mejor que una paráfrasis más explicativa.
- source_word: וּבֶגֶד בּוֹגְדִים בָּגָדוּ
  english_pob_choice: with treachery the treacherous deal treacherously
  chosen_spanish: con traición los traidores traicionan
  alternatives_spanish:
  - sí, con traición los traidores traicionan
  - y con perfidia los traidores traicionan
  lexicon: HALOT
  rationale: בֶּגֶד intensifica el juego de raíz con בגד. “Con traición” mantiene el sustantivo cognado y el peso enfático de la acumulación hebrea, aunque suene repetitivo; esa repetición es parte del efecto del verso.
theological_decisions:
- issue: Referente de לַצַּדִּיק
  english_pob_reading: the righteous one
  chosen_spanish_reading: el justo
  alternative_spanish_readings:
  - los justos
  - el justo o la justicia
  rationale: El hebreo tiene singular con artículo, y el texto no identifica de manera explícita al referente. Se conserva el singular en español para no resolver indebidamente la referencia. La posibilidad colectiva queda abierta en nota, sin imponer una identificación doctrinal.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla
- issue: Valor de רָזִי לִי
  english_pob_reading: I waste away, I waste away
  chosen_spanish_reading: Me consumo, me consumo
  alternative_spanish_readings:
  - Mi secreto es mío, mi secreto es mío
  - Estoy consumiéndome, consumiéndome
  rationale: La POB inglesa sigue la lectura tradicional de debilitamiento/consunción, pero reconoce la dificultad del hebreo y la posibilidad de una lectura distinta. En español se mantiene la opción tradicional en el cuerpo del texto y se conserva la alternativa semántica en nota.
  doctrine_reference: Mantener la dificultad textual sin suprimirla
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada en el último pase y quedó sin cambios; no hay enmiendas posteriores que deban reflejarse. La presente redacción española sigue de cerca las decisiones léxicas y las notas de ambigüedad documentadas, sin introducir nuevas resoluciones interpretativas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se mantiene «el justo» en singular para respetar la forma hebrea y la tensión interpretativa documentada.
  - Se conserva el paralelismo repetitivo de la última cola del verso, porque forma parte del efecto retórico del original.
  - Se elige una puntuación con dos segmentos principales para reflejar la alternancia entre el canto oído y la lamentación del hablante.
