translation:
  language: es
  text: Hijo de hombre[a], cuando la casa de Israel habitaba en su propia tierra, la contaminaron con su camino y con sus obras; su camino delante de mí era como la impureza de una mujer menstruante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como la impureza menstrual» o «como la impureza de la menstruación». El hebreo compara la conducta de Israel con la impureza ritual asociada a la menstruación.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Humano
  - Mortal
  lexicon: HALOT
  rationale: Se conserva el apelativo profético tradicional de Ezequiel sin perder la correspondencia literal con בן־אָדָם. En español, «Hijo de hombre» mantiene la forma idiomática y la continuidad literaria del libro.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: HALOT
  rationale: «Casa de Israel» preserva el colectivo pactal y su matiz corporativo. «Pueblo de Israel» sería más interpretativo y menos cercano a la forma hebrea.
- source_word: יֹשְׁבִים
  english_pob_choice: was dwelling
  chosen_spanish: habitaba
  alternatives_spanish:
  - moraba
  - estaba habitando
  lexicon: HALOT
  rationale: El participio expresa permanencia o residencia continuada; «habitaba» comunica bien ese valor durativo en español natural.
- source_word: עַל אַדְמָתָם
  english_pob_choice: on their own land
  chosen_spanish: en su propia tierra
  alternatives_spanish:
  - sobre su tierra
  - en su tierra
  lexicon: HALOT
  rationale: אַדְמָה puede ser tierra, suelo o territorio. «Su propia tierra» transmite el sentido territorial y posesivo del contexto sin sonar rígido.
- source_word: וַיְטַמְּאוּ אוֹתָהּ
  english_pob_choice: they defiled it
  chosen_spanish: la profanó
  alternatives_spanish:
  - la contaminó
  - la hizo impura
  lexicon: HALOT
  rationale: Aunque el verbo tiene un trasfondo de impureza ritual, en español «profanar» comunica la mezcla de contaminación cultual y quebrantamiento moral presente en este contexto. «La hizo impura» sería más literal, pero menos idiomática; se conserva la fuerza teológica del verbo.
- source_word: בְּדַרְכָּם
  english_pob_choice: by their way
  chosen_spanish: con su camino
  alternatives_spanish:
  - por su camino
  - en su manera de vivir
  lexicon: HALOT
  rationale: «Camino» conserva la metáfora hebrea de conducta. La preposición «con» suena natural en español con «profanó... con su camino y con sus obras», sin borrar la relación instrumental/causal.
- source_word: וּבַעֲלִילוֹתָם
  english_pob_choice: by their deeds
  chosen_spanish: con sus obras
  alternatives_spanish:
  - con sus hechos
  - con sus prácticas
  lexicon: HALOT
  rationale: עֲלִילוֹת son acciones o prácticas con peso moral; «obras» es breve y suficientemente amplio para abarcar conducta concreta.
- source_word: כְּטֻמְאַת הַנִּדָּה
  english_pob_choice: like the uncleanness of a menstruating woman
  chosen_spanish: como la impureza de la mujer en su menstruación
  alternatives_spanish:
  - como la impureza menstrual
  - como la impureza de la menstruación
  lexicon: HALOT
  rationale: Se preserva la imagen ritual explícita que el inglés POB también mantuvo. «Impureza» refleja טֻמְאָה; añadir «de la mujer en su menstruación» evita suavizar el referente y hace inteligible la comparación en español.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - en mi presencia
  lexicon: HALOT
  rationale: «Delante de mí» conserva el valor relacional y evaluativo de la expresión hebrea. «En mi presencia» es posible, pero diluye la fuerza de la formulación bíblica tradicional.
theological_decisions:
- issue: Lenguaje de impureza ritual aplicado a la conducta de Israel
  english_pob_reading: Render the comparison in cultic-moral terms without softening it to merely social offensiveness.
  chosen_spanish_reading: Mantener la comparación en términos de impureza cultual-moral, sin rebajarla a simple desagrado social.
  alternative_spanish_readings:
  - Reducirla a «suciedad» o «corrupción»
  - Suavizarla como «indignidad»
  rationale: El hebreo usa imagen de impureza ritual asociada con la menstruación para describir la conducta de Israel y la profanación de la tierra. La traducción debe conservar esa tensión teológica en español, aunque resulte directa.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Marco temporal de la cláusula inicial
  english_pob_reading: 'Supply ''when'' in English: ''when the house of Israel was dwelling...'''
  chosen_spanish_reading: Expresar el marco temporal con «cuando» sin convertir la cláusula en una paráfrasis excesiva.
  alternative_spanish_readings:
  - 'Dejar un participio absoluto más literal: «la casa de Israel habitando en su tierra...»'
  - 'Reordenar de forma más libre: «Mientras Israel vivía en su tierra...»'
  rationale: El hebreo sitúa la acción en un estado previo de residencia. En español, «cuando habitaba» ofrece una equivalencia clara y natural sin añadir interpretación no sustentada.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: 'La redacción sigue el estado más reciente del expediente inglés, que no muestra revisiones sustanciales y fue confirmado con alto grado de acuerdo; se conservaron sus decisiones principales: apelativo profético, «casa de Israel», residencia durativa, profanación de la tierra, metáfora de camino/obras e imagen explícita de impureza menstrual.'
  spanish_consistency_notes:
  - Se usó «Hijo de hombre» por coherencia con la tradición literaria de Ezequiel y con el valor técnico del apelativo.
  - «Casa de Israel» mantiene el colectivo pactal sin sustituirlo por una generalización moderna.
  - Se evitó «SEÑOR»; no aparece el tetragrámaton en este versículo.
  - «Camino» y «obras» conservan la distinción entre conducta general y acciones concretas.
  - «Impureza» traduce טֻמְאָה con el peso ritual requerido; se mantuvo la referencia menstrual explícita para no atenuar la imagen.
