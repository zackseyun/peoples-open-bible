translation:
  language: es
  text: El que anda en integridad será librado[a], pero el torcido en sus caminos caerá de inmediato[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘será salvado’ o ‘será preservado’.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘en uno’; probablemente significa ‘en un solo momento’ o ‘de repente’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹלֵךְ
  english_pob_choice: walks
  chosen_spanish: anda
  alternatives_spanish:
  - camina
  - vive
  lexicon: HALOT
  rationale: En proverbios, הלך expresa la manera de vivir. 'Anda' conserva la imagen de conducta habitual y suena natural en español bíblico contemporáneo.
- source_word: תָּמִים
  english_pob_choice: in integrity
  chosen_spanish: en integridad
  alternatives_spanish:
  - sin culpa
  - íntegro
  - irreprochable
  lexicon: HALOT
  rationale: '''Integridad'' comunica bien la idea de integridad moral o entereza, sin implicar impecabilidad absoluta. La construcción con ''andar'' resulta natural: ''andar en integridad''.'
- source_word: יִוָּשֵׁעַ
  english_pob_choice: will be delivered
  chosen_spanish: será librado
  alternatives_spanish:
  - será salvado
  - será rescatado
  - será preservado
  lexicon: HALOT
  rationale: El nifal de ישׁע aquí encaja con liberación o preservación en un contexto sapiencial. 'Será librado' mantiene el sentido pasivo sin cargarlo automáticamente con un matiz soteriológico más técnico.
- source_word: נֶעְקַשׁ
  english_pob_choice: crooked
  chosen_spanish: torcido
  alternatives_spanish:
  - perverso
  - retorcido
  - desviado
  lexicon: HALOT
  rationale: '''Torcido'' refleja la imagen moral de desvío y funciona bien con ''caminos''. Es menos abstracto que ''perverso'' y menos marcado que ''retorcido''.'
- source_word: דְּרָכַיִם
  english_pob_choice: his ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus sendas
  - su conducta
  - sus pasos
  lexicon: HALOT
  rationale: '''Caminos'' preserva la metáfora hebrea de conducta y dirección vital. El posesivo singular puede mantenerse de forma natural en español como referencia genérica.'
- source_word: יִפּוֹל
  english_pob_choice: will fall
  chosen_spanish: caerá
  alternatives_spanish:
  - tropezará
  - vendrá a ruina
  - perecerá
  lexicon: HALOT
  rationale: '''Caerá'' conserva la metáfora concreta del hebreo y permite que el proverbio mantenga su fuerza sentenciosa sin explicitar más de lo que el texto dice.'
- source_word: בְּאֶחָת
  english_pob_choice: at once
  chosen_spanish: en un solo momento
  alternatives_spanish:
  - de una vez
  - de repente
  - de pronto
  lexicon: HALOT
  rationale: La expresión probablemente es idiomática y comunica rapidez o repentina caída. 'En un solo momento' traduce el valor adverbial de manera clara y reverente en español; 'de repente' se deja como alternativa implícita pero menos literal.
theological_decisions:
- issue: Alcance de יִוָּשֵׁעַ en un proverbio sapiencial
  english_pob_reading: temporal/general deliverance rather than explicitly salvific 'saved'
  chosen_spanish_reading: liberación o preservación general, no una formulación doctrinal técnica de salvación
  alternative_spanish_readings:
  - será salvado
  - será preservado
  rationale: En el contexto de Proverbios, el verbo expresa con naturalidad rescate, protección o libramiento en la vida práctica. 'Será librado' conserva esa amplitud y evita imponer un sentido exclusivamente teológico que el proverbio no exige.
  doctrine_reference: Principio de primacía del hebreo y preservación de la tensión semántica sin importar una lectura doctrinal no determinada por el contexto.
- issue: Representación del sujeto genérico masculino
  english_pob_reading: retain singular masculine in 'his ways' while using inclusive 'whoever' for the subject
  chosen_spanish_reading: mantener el posesivo masculino singular implícito en 'sus caminos' con un sujeto genérico 'el que'
  alternative_spanish_readings:
  - la persona que... sus caminos
  - quien... sus caminos
  - el que... sus conductas
  rationale: El hebreo usa una forma masculina singular con valor representativo. 'El que ... sus caminos' refleja ese patrón de manera natural en español sin forzar un recast completamente neutro que diluya el paralelismo del original.
  doctrine_reference: Principio de fidelidad a la forma del original con fluidez idiomática en español.
translation_notes:
  revision_awareness: Se incorporó la revisión del POB inglés que ajustó 'all at once' a 'at once'; por eso la nota española evita intensificar con 'todo' y opta por 'en un solo momento', manteniendo la brevedad del hebreo בְאֶחָת. También se respetó el uso proverbial de 'caminar/andar' para הלך y el matiz de liberación general para ישׁע.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - '''Librado'' se eligió frente a ''salvado'' para no confundir el proverbio con una afirmación doctrinal técnica que el contexto no explicita.'
  - '''Caminos'' se usó para דְּרָכַיִם por coherencia con el lenguaje sapiencial y para conservar la metáfora de conducta.'
