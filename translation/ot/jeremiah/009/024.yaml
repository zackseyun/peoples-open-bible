id: JER.9.24
reference: Jeremiah 9:24
source:
  edition: WLC
  text: הִנֵּ֛ה יָמִ֥ים בָּאִ֖ים נְאֻם יְהוָ֑ה וּ/פָ֣קַדְתִּ֔י עַל כָּל מ֖וּל בְּ/עָרְלָֽה־־־׃
translation:
  text: Look[a], days are coming, declares Yahweh[b], when I will punish everyone circumcised only in foreskin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all the circumcised with the uncircumcised,' preserving the Hebrew paradox more formally.
    reason: alternative_reading
  - marker: b
    text: The phrase likely refers to those who bear physical circumcision outwardly but remain uncircumcised in a deeper covenantal sense; compare the following verses and Jer 4:4.
    reason: cross_reference
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces an emphatic announcement. 'Look' preserves the deictic force in readable modern English better than the archaic 'Behold.'
- source_word: יָמִים בָּאִים
  chosen: days are coming
  alternatives:
  - the days are coming
  - days are on the way
  lexicon: HALOT
  rationale: A standard prophetic formula announcing imminent future action. 'Days are coming' is idiomatic and preserves the Hebrew construction closely.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This formula marks a solemn divine utterance. 'Declares the LORD' is natural English and preserves the prophetic register. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וּפָקַדְתִּי
  chosen: I will punish
  alternatives:
  - I will attend to
  - I will visit
  - I will call to account
  lexicon: HALOT
  rationale: פקד has a broad semantic range, but with עַל and in a judgment context it commonly denotes punitive visitation. 'I will punish' makes the judicial force explicit in clear English.
- source_word: עַל כָּל
  chosen: everyone
  alternatives:
  - upon all
  - against everyone
  - all who are
  lexicon: HALOT
  rationale: The phrase introduces the object of judgment. 'Everyone' is concise and idiomatic, while the following participial phrase specifies the group.
- source_word: מוּל
  chosen: circumcised
  alternatives:
  - one circumcised
  lexicon: HALOT
  rationale: Used substantivally here for those who are circumcised. 'Circumcised' is the natural English equivalent.
- source_word: בְּעָרְלָה
  chosen: only in foreskin
  alternatives:
  - in uncircumcision
  - in the foreskin
  - yet uncircumcised
  lexicon: HALOT
  rationale: 'The expression מוּל בְּעָרְלָה is intentionally paradoxical: physically circumcised yet still characterized by foreskin, i.e., merely outwardly circumcised. ''Only in foreskin'' preserves the shock and the contrast without over-interpreting it as a direct reference to the heart, which is made explicit in the surrounding context rather than in this phrase itself.'
