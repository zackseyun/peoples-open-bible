review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego y del POB inglés: prosperidad/éxito en sus manos, remoción de las naciones, referencia a los ocupantes de la ciudad de David en Jerusalén, contaminación cultual del entorno del santuario y gran daño a la pureza. Sin embargo, ἄκραν se ha vertido como «acrópolis», que en español desplaza el sentido hacia un término arquitectónico/cívico más específico y menos natural que el léxico documentado «ciudadela», además de desalinearse con la decisión auditada del POB. También conviene suavizar «infligían» a una formulación más natural en español bíblico moderno.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «una acrópolis» suena poco idiomático y algo técnico en este contexto. «El área alrededor del santuario» es comprensible, aunque «los alrededores del santuario» suena más natural; con todo, no exige cambio obligatorio. La frase final funciona mejor como «causaban gran daño a su pureza» que «infligían gran daño a su pureza».
  glossary_alignment: 'No hay conflicto con la terminología de proyecto principal. La decisión relevante es ἄκραν: el inglés auditado escogió «a citadel» con nota «the Acra». En español, la mejor alineación es «una ciudadela[a]» con nota «O «la Acra»...». Se preserva correctamente el registro cultual con «contaminaban», «santuario» y «pureza».'
  issues:
  - severity: medium
    issue: «acrópolis» para ἄκραν
    rationale: Aunque etimológicamente relacionado, en español «acrópolis» no es la opción más natural ni la más fiel a la decisión léxica auditada «citadel». «Ciudadela» comunica mejor una fortificación y deja la identificación histórica «la Acra» para la nota.
  - severity: low
    issue: «infligían gran daño» suena algo forzado
    rationale: Es comprensible, pero en español contemporáneo y eclesial amplio «causaban gran daño» o «hacían gran daño» fluye mejor sin perder el sentido de πληγὴν μεγάλην.
  revised_spanish_text: Y en sus días prosperó en sus manos para quitar a las naciones de su tierra, y a los de la ciudad de David en Jerusalén, que se habían hecho para sí una ciudadela[a], desde la cual salían y contaminaban el área alrededor del santuario, y causaban gran daño a su pureza.
  revised_footnotes:
  - marker: a
    text: O «la Acra», la ciudadela fortificada de Jerusalén.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «acrópolis» por «ciudadela» para reflejar mejor ἄκραν y alinearse con la decisión léxica auditada del POB, dejando «la Acra» en nota como alternativa histórica. También se ajusta «infligían» a «causaban» por mayor naturalidad en español, sin alterar el sentido.
