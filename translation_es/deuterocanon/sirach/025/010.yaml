translation:
  language: es
  text: ¡Bienaventurado el que ha hallado sabiduría[a], y el que habla[b] a oídos de los que oyen!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «prudencia» o «entendimiento». φρόνησις puede abarcar juicio práctico y sensatez; aquí se ha preferido «sabiduría» por el contexto sapiencial y por la decisión del audit trail inglés.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el que explica» o «el que expone» a oídos de los que oyen. El participio griego διηγούμενος puede sugerir un hablar que desarrolla o relata, no solo conversación simple.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριος
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Dichoso
  - Feliz
  lexicon: BDAG
  rationale: En español, 'bienaventurado' conserva el tono sapiencial y solemne de la fórmula de bienaventuranza mejor que 'feliz', que suena demasiado psicológico, o 'dichoso', que es posible pero menos marcado en registro bíblico.
- source_word: εὗρε
  english_pob_choice: has found
  chosen_spanish: ha hallado
  alternatives_spanish:
  - halló
  - ha encontrado
  lexicon: BDAG
  rationale: El perfecto español expresa bien el estado resultante del hallazgo. 'Hallado' mantiene un matiz más literario y bíblico que 'encontrado' sin apartarse del sentido del aoristo.
- source_word: φρόνησιν
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - entendimiento
  - buen juicio
  lexicon: BDAG
  rationale: Aunque φρόνησις puede acercarse a 'entendimiento' o 'prudencia', el audit trail inglés terminó en 'wisdom'. En español, 'sabiduría' es la equivalencia natural y digna para esta literatura sapiencial; 'prudencia' estrecha demasiado el campo semántico, y 'entendimiento' suaviza la cualidad sapiencial del término.
- source_word: διηγούμενος
  english_pob_choice: speaks
  chosen_spanish: habla
  alternatives_spanish:
  - recuenta
  - explica
  - expone
  lexicon: BDAG
  rationale: El participio puede incluir narrar, explicar o exponer. 'Habla' es la forma más natural y breve en español, pero no borra la posibilidad de un hablar explicativo; esa amplitud se conserva en la nota de alternativa.
- source_word: εἰς ὦτα
  english_pob_choice: in the ears / into the ears
  chosen_spanish: al oído
  alternatives_spanish:
  - en los oídos
  - en los oídos de
  lexicon: BDAG
  rationale: La imagen griega es concreta e idiomática. En español, 'al oído' comunica con naturalidad la dirección del habla sin sonar forzado; 'en los oídos' sería más literal pero menos idiomático.
- source_word: ἀκουόντων
  english_pob_choice: those who hear
  chosen_spanish: de los que oyen
  alternatives_spanish:
  - de los oyentes
  - de los que escuchan
  lexicon: BDAG
  rationale: '''Los que oyen'' sigue de cerca la participial griega y evita introducir la idea de escucha atenta que ''escuchan'' podría sugerir. ''Oyentes'' es posible, pero más nominal y menos cercano al movimiento verbal del griego.'
translation_notes:
  revision_awareness: El borrador sigue la última revisión del audit trail inglés, que reafirma φρόνησις como 'wisdom' y mantiene la imagen concreta de hablar 'in the ears' de los oyentes. La traducción española refleja esa misma resolución sin perder la posible amplitud de διηγούμενος.
  spanish_consistency_notes:
  - Se mantuvo 'sabiduría' para φρόνησις de acuerdo con el ajuste final del inglés POB, aunque en español 'entendimiento' y 'prudencia' siguen siendo alternativas semánticamente viables.
  - Se evitó 'Cristo', 'SEÑOR' u otras fórmulas no presentes en el verso; el texto es sapiencial y no exige terminología cristológica o de nombre divino.
  - La imagen corporal del oído se conservó mediante 'al oído', que es natural en español y suficientemente literal para el griego idiomático.
