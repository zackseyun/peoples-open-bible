translation:
  language: es
  text: Y entró en la tienda donde Judith se alojaba[a], pero no la halló; y salió de un salto a donde estaba el pueblo, clamando[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se hospedaba». El participio griego καταλύουσα se refiere a quedarse o alojarse en un lugar.
    reason: lexical_alternative
  - marker: b
    text: O «se precipitó afuera» / «saltó hacia afuera». El verbo griego ἐξεπήδησεν es más vívido que un simple «salió».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσῆλθεν
  english_pob_choice: went into
  chosen_spanish: entró
  alternatives_spanish:
  - fue adentro
  - ingresó
  lexicon: BDAG
  rationale: En español narrativo, «entró» comunica de manera natural la acción direccional sin añadir matices innecesarios.
- source_word: σκηνὴν
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - carpa
  - tolda
  lexicon: LSJ
  rationale: En español bíblico de registro amplio, «tienda» reproduce bien la unidad de alojamiento portátil en un contexto de campamento militar; «carpa» sería más moderna pero menos tradicional.
- source_word: καταλύουσα
  english_pob_choice: was staying
  chosen_spanish: estaba alojada
  alternatives_spanish:
  - estaba hospedada
  - estaba hospedándose
  - estaba quedándose
  lexicon: LSJ
  rationale: La forma participial expresa permanencia temporal; «estaba alojada» mantiene el valor de estar hospedada o alojada sin sonar forzado. Conserva la alternativa de estancia que el audit trail inglés documenta.
- source_word: οὐχ εὗρεν
  english_pob_choice: did not find
  chosen_spanish: no la halló
  alternatives_spanish:
  - no la encontró
  lexicon: BDAG
  rationale: «Hallar» es un equivalente natural y bíblicamente transparente para el hallazgo de una persona presente o ausente. No introduce la sobreinterpretación de «descubrir».
- source_word: ἐξεπήδησεν
  english_pob_choice: rushed out
  chosen_spanish: salió de un salto
  alternatives_spanish:
  - saltó afuera
  - salió precipitadamente
  - se lanzó afuera
  lexicon: LSJ
  rationale: El verbo es vívido y repentino; «salió de un salto» conserva esa imagen más enérgica que un simple «salió», sin llegar a ser demasiado libre.
- source_word: λαὸν
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - las personas
  lexicon: BDAG
  rationale: «El pueblo» mantiene el sentido colectivo del sustantivo griego en un registro bíblico natural. «La gente» sería más general y menos formal.
- source_word: κράζων
  english_pob_choice: crying out
  chosen_spanish: clamando
  alternatives_spanish:
  - gritando
  - vociferando
  - dando voces
  lexicon: BDAG
  rationale: «Clamando» preserva la intensidad del participio de voz fuerte sin reducirlo a un mero «hablando». Es una opción digna y de registro bíblico.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de Swete (1909) y mantiene las decisiones del audit trail en inglés: entrada simple, alojamiento temporal, ausencia de la persona buscada, salida repentina y clamor hacia el pueblo. No se detectaron revisiones posteriores que alteren el sentido.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otras fórmulas no pertinentes porque el versículo no contiene vocabulario divino.
  - «Tienda» se usa para σκηνή en coherencia con el escenario militar del relato.
  - «Alojada» conserva la alternativa semántica de καταλύουσα documentada en el inglés POB.
  - «Clamando» y «de un salto» mantienen la vivacidad del cierre sin exagerar el contenido del griego.
