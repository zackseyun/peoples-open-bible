translation:
  language: es
  text: Celos y enojo acortan los días[a][b], y la ansiedad trae la vejez antes de tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo דין es difícil aquí. Puede significar «enojo» o, con menos probabilidad, «contienda/discordia» o «juicio». La traducción principal elige «enojo» porque el versículo enumera disposiciones destructivas que dañan la vida.
    reason: lexical_alternative
  - marker: b
    text: El paralelo griego provisto en la Zona 1 no corresponde a este versículo y parece reflejar un pasaje distinto, así que aquí la traducción se rige por el testimonio hebreo.
    reason: textual_variant
lexical_decisions:
- source_word: קנאה
  english_pob_choice: Jealousy
  chosen_spanish: celos
  alternatives_spanish:
  - envidia
  - celos/envidia
  lexicon: HALOT
  rationale: En este dicho sapiencial, el término apunta a una disposición corrosiva que daña la vida; en español, «celos» comunica bien esa fuerza afectiva destructiva. «Envidia» también es posible, por eso se conserva como alternativa.
- source_word: דין
  english_pob_choice: anger
  chosen_spanish: enojo
  alternatives_spanish:
  - ira
  - contienda
  - juicio
  lexicon: HALOT
  rationale: La tradición inglesa de POB toma דין aquí como una disposición hostil o contenciosa, no como «juicio» en sentido judicial. «Enojo» expresa con naturalidad en español ese temperamento dañino, sin perder la tensión lexical documentada.
- source_word: יקצרו ימים
  english_pob_choice: shorten days
  chosen_spanish: acortan los días
  alternatives_spanish:
  - cortan la vida
  - acortan la vida
  - reducen los días
  lexicon: HALOT
  rationale: La imagen hebrea se conserva de forma bastante literal. «Acortan los días» mantiene el idiomatismo y el sentido de vida truncada prematuramente.
- source_word: ובלא עת
  english_pob_choice: before its time
  chosen_spanish: antes de tiempo
  alternatives_spanish:
  - prematuramente
  - fuera de tiempo
  - antes de su tiempo
  lexicon: HALOT
  rationale: La expresión señala anticipación indebida. «Antes de tiempo» es claro, natural y fiel al valor temporal del hebreo.
- source_word: תזקין
  english_pob_choice: brings old age
  chosen_spanish: trae la vejez
  alternatives_spanish:
  - hace envejecer
  - vuelve viejo
  - causa envejecimiento
  lexicon: HALOT
  rationale: El verbo expresa volverse viejo o llegar a la vejez; en español, una formulación causal como «trae la vejez» reproduce bien el efecto del sintagma sin sobreexplicar.
- source_word: דאגה
  english_pob_choice: anxiety
  chosen_spanish: ansiedad
  alternatives_spanish:
  - preocupación
  - afán
  - inquietud
  lexicon: HALOT
  rationale: «Ansiedad» captura el sentido de preocupación interna y consumidora que el POB inglés entendió aquí. «Preocupación» e «inquietud» quedan como alternativas cercanas.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que todo marcador de nota aparezca exactamente en el texto principal; no se incluyen notas sin anclaje.
  spanish_consistency_notes:
  - Se mantiene un registro prudente de equivalencia óptima, evitando suavizar la fuerza sapiencial del paralelismo.
  - «Celos» y «enojo» preservan el tono moral negativo del dicho sin introducir vocabulario eclesiástico ajeno al hebreo.
  - La nota [a] está anclada en el término problemático de la primera cola, para reflejar la tensión léxica documentada en el aparato inglés.
