translation:
  language: es
  text: Que se manifieste[a] tu obra a tus siervos, y tu esplendor a sus descendientes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que tu obra sea vista» o «Que se vea tu obra».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sus hijos»; aquí probablemente se refiere a sus hijos o descendientes en general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵרָאֶה
  english_pob_choice: Let ... appear
  chosen_spanish: Que se manifieste
  alternatives_spanish:
  - Que aparezca
  - Que sea visto
  lexicon: HALOT
  rationale: El nifal imperfecto aquí funciona con fuerza desiderativa o jussiva en el contexto de oración. En español, «Que se manifieste» conserva la idea de que la obra de Dios llegue a ser visible sin sonar mecánico. «Aparezca» también sería posible, pero «manifieste» expresa mejor la petición en estilo bíblico actual.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus esclavos
  - tus servidores
  lexicon: HALOT
  rationale: Aunque el hebreo puede significar «esclavos», en esta oración dirigida a Dios el sentido natural es el de personas dedicadas a él. «Siervos» mantiene la relación de servicio reverente sin imponer una dureza semántica que el contexto no destaca. «Servidores» es posible, pero menos arraigado en el registro bíblico.
- source_word: פָעֳלֶךָ
  english_pob_choice: your work
  chosen_spanish: tu obra
  alternatives_spanish:
  - tu trabajo
  - tu acción
  lexicon: HALOT
  rationale: פָעַל apunta a trabajo, obra o hecho. «Obra» es una forma natural en español para la acción visible de Dios en el salmo y conserva el tono solemne. «Trabajo» suena más cotidiano y menos adecuado aquí.
- source_word: וַהֲדָרְךָ
  english_pob_choice: your splendor
  chosen_spanish: tu esplendor
  alternatives_spanish:
  - tu majestad
  - tu gloria
  - tu honor
  lexicon: HALOT
  rationale: הָדָר denota esplendor, majestad o belleza real. «Esplendor» reproduce bien la cualidad visible y resplandeciente del término, y evita confundirlo con כבוד («gloria»), que no es la palabra usada en el hebreo.
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - sobre
  - hacia
  lexicon: HALOT
  rationale: En la segunda cola, עַל marca el destinatario o ámbito de la manifestación. En español, «a» es más natural y directo que «sobre» en este paralelismo, y preserva la relación de destinación que la revisión inglesa ya afinó.
- source_word: בְּנֵיהֶם
  english_pob_choice: their children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - su descendencia
  lexicon: HALOT
  rationale: Aunque el hebreo dice formalmente «sus hijos/varones», el paralelo y el uso común permiten un sentido generacional amplio. «Hijos» conserva la literalidad suficiente y mantiene la correspondencia con el hebreo mejor que una paráfrasis como «descendencia». En este contexto puede entenderse de manera inclusiva como la siguiente generación.
theological_decisions:
- issue: Alcance generacional de la petición
  english_pob_reading: God's visible work is requested for the present servants, and his splendor for their next generation.
  chosen_spanish_reading: La petición distingue entre los siervos presentes y sus hijos como la siguiente generación que también verá el esplendor de Dios.
  alternative_spanish_readings:
  - tomarlo estrictamente como hijos varones
  - reducirlo a una referencia general sin matiz generacional
  rationale: El paralelismo sugiere una proyección hacia la generación siguiente, no solo a individuos inmediatos. Mantener «sus hijos» conserva la forma del hebreo y deja abierta la inclusión de descendencia en sentido amplio, sin perder el vínculo familiar y generacional del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la segunda cola de «upon» a «to» para hacer más natural el valor de עַל. La versión española sigue esa corrección con «a», manteniendo el paralelismo y la relación de destinación sin introducir un matiz espacial excesivo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en coherencia con el proyecto, aunque este versículo no lo contiene explícitamente.
  - «Siervos» se usa para עֲבָדֶיךָ por el contexto oracional dirigido a Dios, evitando una lectura demasiado dura de «esclavos».
  - «Esplendor» se conserva para הדר para no confundirlo con «gloria» como traducción automática.
  - «Hijos» se deja en una forma cercana al hebreo y se aclara en nota su posible valor generacional amplio.
