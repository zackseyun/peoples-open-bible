translation:
  language: es
  text: 'Y Yahvé dijo a Josué[b]: «Hoy he hecho rodar lejos[a] el oprobio de Egipto de sobre ustedes». Por eso aquel lugar fue llamado Gilgal, hasta el día de hoy.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el oprobio de Egipto», «la deshonra de Egipto» o «el reproche de Egipto». La expresión también puede referirse a la vergüenza pasada de Israel en Egipto, al reproche procedente de Egipto, o a una deshonra pactual ahora removida.
    reason: lexical_alternative
  - marker: b
    text: «Gilgal» suena como el verbo hebreo relacionado con «rodar lejos», creando un juego de palabras con «Hoy he hecho rodar lejos».
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino se vierte según el criterio del proyecto en español como «Yahvé», conservando la referencia al tetragrámaton sin ocultarlo tras un título.
- source_word: גַּלּוֹתִי
  english_pob_choice: I have rolled away
  chosen_spanish: he quitado
  alternatives_spanish:
  - he apartado
  - he removido
  - he hecho rodar fuera
  lexicon: HALOT
  rationale: En español, «he quitado» comunica con naturalidad la acción de retirar algo de encima de ellos. Se preserva la idea de eliminación efectiva que la versión inglesa expresa con «rolled away», aunque el juego verbal se expone en nota por la forma menos transparente del español.
- source_word: חֶרְפַּת מִצְרַיִם
  english_pob_choice: the reproach of Egypt
  chosen_spanish: el oprobio de Egipto
  alternatives_spanish:
  - la vergüenza de Egipto
  - el reproche de Egipto
  - la deshonra de Egipto
  lexicon: HALOT
  rationale: «Oprobio» mantiene el peso de חֶרְפָּה como vergüenza pública/reproche y su tono más fuerte que «vergüenza»; además deja abierta la relación genitiva, como en el hebreo.
- source_word: מֵעֲלֵיכֶם
  english_pob_choice: from upon you
  chosen_spanish: de sobre ustedes
  alternatives_spanish:
  - de encima de ustedes
  - de ustedes
  - de sobre vosotros
  lexicon: HALOT
  rationale: La expresión conserva la imagen espacial de algo que estaba encima de ellos y ahora es retirado. «Ustedes» mantiene el registro neutral latinoamericano del texto.
- source_word: וַיִּקְרָא שֵׁם הַמָּקוֹם הַהוּא גִּלְגָּל
  english_pob_choice: So the name of that place was called Gilgal
  chosen_spanish: se llamó Gilgal el nombre de aquel lugar
  alternatives_spanish:
  - por eso llamó Gilgal al lugar
  - así fue llamado Gilgal aquel lugar
  lexicon: HALOT
  rationale: La pasiva refleja española transmite bien el resultado nombrador sin forzar un sujeto implícito. Se conserva el orden natural y se mantiene la relación causal introducida por la escena anterior.
- source_word: גִּלְגָּל
  english_pob_choice: Gilgal
  chosen_spanish: Gilgal
  lexicon: HALOT
  rationale: Se translitera el topónimo conforme a la política del proyecto y para preservar el juego fónico con la raíz ligada a «quitar/rodar».
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: HALOT
  rationale: Equivale de manera idiomática y sobria a la fórmula temporal hebrea, conservando la perspectiva narrativa.
theological_decisions:
- issue: Alcance de «el oprobio de Egipto»
  english_pob_reading: Kept as an intentionally broad expression without specifying whether it refers to slavery, uncircumcision, or Egyptian taunts.
  chosen_spanish_reading: 'Se conserva como una expresión amplia: «el oprobio de Egipto».'
  alternative_spanish_readings:
  - la vergüenza de Israel en Egipto
  - el reproche que Egipto hacía sobre Israel
  - la deshonra asociada con la incircuncisión de Israel
  rationale: El hebreo no define de forma explícita cuál es ese oprobio. Mantener la amplitud evita cerrar prematuramente la interpretación y respeta la tensión documentada en la edición inglesa.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla artificialmente.
- issue: Juego de palabras entre גַּלּוֹתִי y גִּלְגָּל
  english_pob_reading: '"Gilgal" sounds like the Hebrew verb for "roll away," creating a wordplay with "Today I have rolled away."'
  chosen_spanish_reading: Se deja el juego de palabras implícito en la nota, porque el español no lo reproduce con la misma naturalidad que el hebreo.
  alternative_spanish_readings:
  - intentar reproducirlo con una forma como «he rodado»
  - añadir una explicación dentro del texto principal
  rationale: La raíz y el topónimo comparten sonido en hebreo, pero una traducción demasiado literal sonaría forzada o perdería claridad. La nota permite auditar la relación sin sacrificar la fluidez del versículo.
  doctrine_reference: Mantener la observación literaria del texto sin introducir paráfrasis excesiva.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios; el texto inglés quedó estable. El español sigue esa lectura estable y mantiene las dos tensiones registradas: la amplitud de «el oprobio de Egipto» y el juego verbal con Gilgal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - Se prefiere «ustedes» para un español neutro latinoamericano.
  - Se evita «Cristo/Señor» porque no corresponden al hebreo de este versículo.
  - La nota sobre Gilgal se coloca donde el juego de palabras resulta auditable en el topónimo.
