base_translation:
  language: en
  yaml_path: translation/ot/numbers/009/017.yaml
  text: Whenever the cloud was lifted from over the tent[a], after that the sons of Israel would set out; and in the place where the cloud settled[b], there the sons of Israel would camp.
  footnotes:
