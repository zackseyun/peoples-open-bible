  yaml_path: translation/ot/judges/007/003.yaml
  text: Now please proclaim in the hearing of the people[a], saying, ‘Whoever is fearful and trembling, let him return and depart from Mount Gilead.’ Then twenty-two thousand of the people returned[b], and ten thousand remained.
  footnotes:
