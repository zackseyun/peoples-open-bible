review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura del griego y conserva la fuerza forense de δικαιώσω con Dios como objeto. También traduce adecuadamente ἐν εὐθύτητι καρδίας como una expresión de disposición interior y κρίμασιν como «juicios». Sin embargo, cambia sin suficiente necesidad el valor preferido de δικαιοσύνη desde «righteousness» a «justicia», cuando el expediente inglés documenta «justice» solo como alternativa, no como elección principal.
  spanish_quality_summary: El español es claro y legible, pero «Yo te justificaré» puede sonar algo chocante con Dios como objeto; por eso conviene mantener la nota léxica. «Con rectitud de corazón» funciona bien. Para coherencia semántica y con el expediente POB, «rectitud» encaja mejor que «justicia» en la segunda cláusula, evitando además una repetición demasiado jurídica («justificaré / juicios / justicia») que puede estrechar el sentido.
  glossary_alignment: Cumple en general con los términos del proyecto. La principal desviación es δικαιοσύνη, donde el valor por defecto y la decisión inglesa favorecen «rectitud» aquí más que «justicia», aunque esta siga siendo una alternativa posible en nota.
  issues:
  - severity: medium
    issue: δικαιοσύνη se vierte como «justicia» en vez de reflejar la elección principal del expediente inglés.
    rationale: El POB inglés escogió «righteousness» y dejó «justice» como alternativa. En este contexto, la cualidad moral de Dios manifestada en sus juicios se expresa mejor en español como «rectitud», preservando la distinción frente a «juicios».
  - severity: low
    issue: La nota al pie para δικαιώσω no refleja del todo la jerarquía documentada de alternativas.
    rationale: El expediente inglés presenta «justify you» como texto, con alternativas «I will justify you» o «I will vindicate you»; además, la decisión léxica explica «declare you righteous». En español conviene conservar «vindicaré» y «te declararé justo» como alternativas, pero la redacción de la nota debe acompañar el texto revisado con precisión.
  revised_spanish_text: Yo te justificaré[a], oh Dios, con rectitud de corazón; porque en tus juicios está tu rectitud[b], oh Dios.
