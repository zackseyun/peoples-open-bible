    text: Lit. 'los contados de ustedes'; se refiere a los inscritos en el censo o recuento.
    reason: cultural_note
  - marker: b
    text: O 'han refunfuñado' o 'han protestado'. El hebreo también puede expresarse como 'han murmurado contra mí'.
    reason: lexical_alternative
  revision_rationale: 'Se quitó la nota defectuosa sobre ''desierto'', se ajustó el registro a español neutral (''sus'' en vez de ''vuestros''), y se mejoró la naturalidad de la frase censal con ''según su número total''. Se añadieron notas útiles donde la auditoría inglesa preservaba matices: la referencia censal de ''fueron contados'' y la alternativa léxica para ''murmurado''. No se requiere adjudicación superior porque las correcciones son claras, locales y no doctrinalmente controvertidas.'
