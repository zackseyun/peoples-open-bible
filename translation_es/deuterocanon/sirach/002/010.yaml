revisions:
- from: 'Miren a las generaciones antiguas y vean: ¿quién creyó en Yahvé y fue avergonzado? ¿O quién confió en él y fue abandonado? ¿O quién lo invocó y no fue atendido?[a][b]'
  to: 'Miren a las generaciones antiguas y vean: ¿quién creyó en Yahvé y fue avergonzado? ¿O quién confió en él y fue abandonado? ¿O quién lo invocó y no recibió respuesta?[a][b]'
  rationale: 'Se hacen dos reparaciones menores: (1) se cambia «no fue atendido» por «no recibió respuesta» para reflejar con más precisión el pasivo de ענה y la decisión léxica auditada del POB; (2) se mejora la nota b con una formulación más natural y clara del griego alternativo («y él lo ignoró»). El resto del texto está bien alineado con la fuente, el estilo del proyecto y la terminología establecida.'
