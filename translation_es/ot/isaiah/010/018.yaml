translation:
  language: es
  text: Y la gloria de su bosque y de su tierra fértil la consumirá[a], desde el alma hasta la carne, y será como el consumirse de un enfermo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘y será como uno que se va consumiendo’; la frase hebrea final es difícil, y algunos entienden de otro modo la última palabra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְבוֹד
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el esplendor
  - la riqueza
  lexicon: HALOT
  rationale: כָּבוֹד puede significar gloria, honor o esplendor. En este contexto, mantiene la idea de grandeza e imponente abundancia, y 'la gloria' conserva bien ese peso metafórico en español.
- source_word: יַעְרוֹ
  english_pob_choice: his forest
  chosen_spanish: su bosque
  alternatives_spanish:
  - su selva
  - su bosque de árboles
  lexicon: HALOT
  rationale: יַעַר significa 'bosque' o 'selva'. 'Bosque' es la forma más directa y natural en español para el paralelismo del versículo.
- source_word: וְכַרְמִלּוֹ
  english_pob_choice: and of his fruitful land
  chosen_spanish: y de su tierra fértil
  alternatives_spanish:
  - y de su tierra fructífera
  - y de su tierra de huertos
  - y de su Carmelo
  lexicon: HALOT
  rationale: כַּרְמֶל puede referirse a tierra fértil, de cultivo u ओरchard-land, no necesariamente al nombre propio. 'Tierra fértil' capta mejor el sentido común en paralelo con 'bosque'.
- source_word: מִנֶּפֶשׁ וְעַד בָּשָׂר
  english_pob_choice: from soul to flesh
  chosen_spanish: desde el alma hasta la carne
  alternatives_spanish:
  - de alma a carne
  - desde la vida hasta el cuerpo
  - por completo
  lexicon: HALOT
  rationale: La expresión es idiomática y abarca totalidad. 'Desde el alma hasta la carne' conserva el contraste concreto del hebreo y deja visible la tensión antropológica.
- source_word: יְכַלֶּה
  english_pob_choice: he will consume
  chosen_spanish: la consumirá
  alternatives_spanish:
  - la destruirá
  - la acabará
  - la consumirá por completo
  lexicon: HALOT
  rationale: כלה en piel puede significar terminar, consumir o destruir. 'Consumirá' mantiene la imagen de juicio y encaja con el sujeto implícito del versículo.
- source_word: וְהָיָה
  english_pob_choice: and it will be
  chosen_spanish: y será
  alternatives_spanish:
  - y acontecerá
  - y quedará
  lexicon: HALOT
  rationale: Introduce el resultado del devastamiento. 'Será' es natural en español y conserva el valor de estado resultante.
- source_word: כִּמְסֹס
  english_pob_choice: like the wasting away
  chosen_spanish: como el marchitarse
  alternatives_spanish:
  - como el deshacerse
  - como el consumirse
  - como el derretirse
  lexicon: HALOT
  rationale: La forma rara sugiere desvanecimiento, disolución o consumición gradual. 'Marchitarse' comunica bien la idea de declive progresivo sin forzar el español.
- source_word: נֹסֵס
  english_pob_choice: of a sick man
  chosen_spanish: de un enfermo
  alternatives_spanish:
  - de uno que se va consumiendo
  - de un abatido
  - de un abanderado
  lexicon: HALOT
  rationale: El término final es difícil. El POB inglés adopta el sentido contextual de alguien que se está consumiendo; 'de un enfermo' transmite esa lectura sin resolver de manera artificial la oscuridad del hebreo.
theological_decisions:
- issue: Alcance total de la destrucción expresado por 'de alma a carne'
  english_pob_reading: Retains the Hebrew idiom 'from soul to flesh' to preserve totality and anthropological tension.
  chosen_spanish_reading: Conserva 'desde el alma hasta la carne' para mantener la totalidad de la destrucción y la imagen concreta del hebreo.
  alternative_spanish_readings:
  - '''por completo'''
  - '''desde la vida hasta el cuerpo'''
  rationale: La frase hebrea no debe suavizarse en exceso. La versión española mantiene la fuerza idiomática y deja que el lector perciba la amplitud del juicio.
  doctrine_reference: Lexical/theological totality in Hebrew idiom; no doctrinal expansion beyond the text.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el juicio auditado de la POB en inglés, manteniendo las decisiones clave: כָּבוֹד como ''gloria'', כַּרְמֶל como tierra fértil, el idiomático ''de alma a carne'' y la cláusula final difícil con una nota de alternativa léxica.'
  spanish_consistency_notes:
  - Usé 'Yahvé' cuando el texto original lo requeriría, pero aquí no aparece el nombre divino.
  - Mantuve un español neutro, digno y publicable, evitando calcos innecesarios.
  - Conservé la tensión del hebreo en 'alma' y 'carne' en lugar de reducirla a una paráfrasis abstracta.
  - La nota al pie marca la ambigüedad del remate final sin resolverla demasiado.
