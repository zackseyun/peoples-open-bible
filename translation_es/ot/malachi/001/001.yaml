    text: O «carga». El término hebreo puede denotar una declaración profética de gran peso.
    reason: lexical_alternative
  - marker: b
    text: «Malaquías» también puede entenderse como «mi mensajero», ya que la forma hebrea está claramente relacionada con esa expresión.
    reason: alternative_reading
  revision_rationale: Se ajusta מַשָּׂא a «Oráculo» para seguir la decisión principal auditada en inglés y mejorar la naturalidad del encabezamiento profético en español. Se corrige «Malquías» a «Malaquías» por fidelidad onomástica y uso estándar en español. Se añaden las dos notas exigidas por el rastro POB, con marcadores correctamente anclados en el texto. Se mantiene «Yahvé», «a Israel» y «por medio de» como opciones fieles y legibles.
