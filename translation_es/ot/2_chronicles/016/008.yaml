translation:
  language: es
  text: ¿No eran los cusitas y los lubitas un ejército[a] muy grande, con carros de guerra y jinetes en gran abundancia? Sin embargo, cuando te apoyaste en Yahvé, él los entregó en tu mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «etíopes» y «libios». Se conservan los etnónimos hebreos para mantenerse cerca del texto fuente.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Were not
  chosen_spanish: ¿No fueron
  alternatives_spanish:
  - ¿No eran
  - ¿Acaso no fueron
  lexicon: HALOT
  rationale: La forma retórica pide una respuesta afirmativa; en español, «¿No fueron» conserva el valor interrogativo y se ajusta al sujeto plural sin forzar una literalidad extraña.
- source_word: הַכּוּשִׁים
  english_pob_choice: the Cushites
  chosen_spanish: los cusitas
  alternatives_spanish:
  - los etíopes
  lexicon: HALOT
  rationale: Se mantiene el etnónimo cercano al hebreo, siguiendo la decisión del POB inglés de preservar la forma fuente antes que una identificación geográfica posterior.
- source_word: וְהַלּוּבִים
  english_pob_choice: and the Lubites
  chosen_spanish: y los lubitas
  alternatives_spanish:
  - y los libios
  lexicon: HALOT
  rationale: Se translitera el etnónimo para conservar la proximidad al hebreo y evitar imponer sin necesidad una equivalencia nacional posterior.
- source_word: הָיוּ לְחַיִל
  english_pob_choice: were ... a ... army
  chosen_spanish: fueron un ejército
  alternatives_spanish:
  - fueron una fuerza militar
  - fueron un cuerpo de combate
  lexicon: HALOT
  rationale: En este contexto חַיִל se refiere a fuerza militar/ejército; «ejército» es la opción natural y fiel en español.
- source_word: לָרֹב
  english_pob_choice: very great
  chosen_spanish: muy grande
  alternatives_spanish:
  - muy numeroso
  - en gran número
  lexicon: HALOT
  rationale: La expresión intensifica el tamaño del ejército; «muy grande» transmite la magnitud de forma idiomática y clara.
- source_word: לְרֶכֶב
  english_pob_choice: with chariots
  chosen_spanish: con carros
  alternatives_spanish:
  - con carros de guerra
  lexicon: HALOT
  rationale: רֶכֶב aquí es el arma o vehículo militar; «carros» es breve y natural, y el contexto ya fija el sentido bélico.
- source_word: וּלְפָרָשִׁים
  english_pob_choice: and horsemen
  chosen_spanish: y jinetes
  alternatives_spanish:
  - y caballería
  lexicon: HALOT
  rationale: El hebreo es concreto, literalmente «montados»; «jinetes» preserva la imagen sin convertirlo en un término más abstracto como «caballería».
- source_word: לְהַרְבֵּה מְאֹד
  english_pob_choice: in great abundance
  chosen_spanish: en gran abundancia
  alternatives_spanish:
  - en extremo gran cantidad
  - muy abundantemente
  lexicon: HALOT
  rationale: La intensificación cuantitativa se vierte de manera natural en español, manteniendo el énfasis acumulativo del hebreo.
- source_word: וּבְהִשָּׁעֶנְךָ עַל
  english_pob_choice: Yet when you relied on
  chosen_spanish: Sin embargo, cuando te apoyaste en
  alternatives_spanish:
  - Y cuando confiaste en
  - Pero al apoyarte en
  lexicon: HALOT
  rationale: Se conserva la metáfora de apoyo/reclinarse que subyace al hebreo; «te apoyaste en» corresponde bien al valor figurado y mantiene el contraste argumentativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se adopta la forma de la política terminológica del proyecto para el Tetragrámaton, manteniendo el nombre propio divino en lugar de sustituirlo por un título.
- source_word: נְתָנָם בְּיָדֶךָ
  english_pob_choice: he gave them into your hand
  chosen_spanish: él los entregó en tu mano
  alternatives_spanish:
  - él los puso en tu mano
  - él los entregó en tus manos
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de victoria concedida por Dios; «entregó en tu mano» es una fórmula transparente en español y próxima al original.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo emplea el Tetragrámaton directamente. Conforme a la política del POB, se mantiene el nombre divino como nombre propio y no se oculta tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor del verbo figurado בְהִשָּׁעֶנְךָ עַל
  english_pob_reading: relied on
  chosen_spanish_reading: te apoyaste en
  alternative_spanish_readings:
  - confiaste en
  - te recostaste sobre
  rationale: La imagen base es corporal pero su sentido es de dependencia/confianza. «Te apoyaste en» conserva la metáfora sin perder la fuerza teológica del pasaje.
  doctrine_reference: HALOT, uso figurado de נשען / שׁען en contexto de confianza
- issue: Sentido de חַיִל en contexto militar
  english_pob_reading: army
  chosen_spanish_reading: ejército
  alternative_spanish_readings:
  - fuerza militar
  - tropa
  rationale: Aquí חַיִל describe capacidad bélica y tamaño de una fuerza armada; «ejército» refleja mejor el contexto narrativo que términos más generales.
  doctrine_reference: HALOT, חַיִל
translation_notes:
  revision_awareness: El audit trail inglés muestra acuerdo alto y sin revisiones aplicadas; la versión española sigue esa lectura estable, conservando el paralelismo retórico y el modismo de victoria sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma uniforme para יְהוָה.
  - Se preserva la distinción entre etnónimos transliterados y equivalentes tradicionales solo como alternativa en nota.
  - «Ejército» se usa para חַיִל en sentido militar, coherente con el contexto.
  - La cláusula final conserva el idiomatismo bíblico «entregó en tu mano» para mantener continuidad terminológica en el POB.
