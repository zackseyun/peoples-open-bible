translation:
  language: es
  text: Entonces el rey Darío se levantó y lo besó, y escribió cartas en su favor a todos los administradores[a], gobernadores regionales, generales y sátrapas, para que lo escoltaran[b] a él y a todos los que estaban con él y subían a edificar Jerusalén[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mayordomos»; el griego οἰκονόμους puede referirse a funcionarios encargados de bienes o de administración. En este contexto imperial, «administradores» comunica mejor el cargo en español actual.
    reason: lexical_alternative
  - marker: b
    text: O «los enviaran en su camino con apoyo». El griego προπέμπω puede incluir no solo escolta personal, sino también asistencia o provisión para el viaje.
    reason: lexical_alternative
  - marker: c
    text: O «reconstruir». El griego dice simplemente «edificar» o «construir»; aunque el contexto histórico puede sugerir restauración, la forma verbal no lo expresa explícitamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: LSJ
  rationale: Conecta la acción siguiente en secuencia narrativa; «entonces» es natural en español y conserva el valor temporal del adverbio.
- source_word: ἀναστὰς
  english_pob_choice: stood up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: LSJ
  rationale: El participio aoristo describe una acción física previa a la respuesta del rey; «se levantó» comunica esa acción de modo natural y fiel.
- source_word: κατεφίλησεν
  english_pob_choice: kissed
  chosen_spanish: lo besó
  alternatives_spanish:
  - lo besó afectuosamente
  - lo abrazó con un beso
  lexicon: LSJ
  rationale: El verbo puede implicar un beso enfático o afectuoso, pero el español básico «besó» preserva el acto sin añadir intensidad no explicitada por el griego.
- source_word: ἔγραψεν ... τὰς ἐπιστολάς
  english_pob_choice: wrote letters
  chosen_spanish: le escribió cartas
  alternatives_spanish:
  - escribió cartas
  - emitió cartas
  lexicon: LSJ
  rationale: El griego dice literalmente que escribió cartas; en español, «le escribió cartas» refleja el dativo de ventaja y mantiene la relación con el beneficiario del acto.
- source_word: αὐτῷ
  english_pob_choice: for him
  chosen_spanish: le
  alternatives_spanish:
  - para él
  - en su favor
  lexicon: LSJ
  rationale: El dativo indica beneficio o apoyo para la persona mencionada; el clítico «le» en este contexto naturaliza esa función sin perder el sentido de favor.
- source_word: οἰκονόμους
  english_pob_choice: stewards
  chosen_spanish: administradores
  alternatives_spanish:
  - mayordomos
  - encargados
  lexicon: LSJ
  rationale: En un contexto imperial y administrativo, el término apunta a funcionarios con gestión de recursos o asuntos; «administradores» es más claro que el literal «mayordomos» en español actual.
- source_word: τοπάρχας
  english_pob_choice: regional governors
  chosen_spanish: gobernadores regionales
  alternatives_spanish:
  - gobernantes de distrito
  - señores de región
  lexicon: LSJ
  rationale: El título designa autoridades sobre una zona o distrito; «gobernadores regionales» traduce la función sin transliterar el cargo.
- source_word: στρατηγοὺς
  english_pob_choice: generals
  chosen_spanish: generales
  alternatives_spanish:
  - comandantes militares
  lexicon: LSJ
  rationale: Es el equivalente español más directo para líderes militares en un listado oficial.
- source_word: σατράπας
  english_pob_choice: satraps
  chosen_spanish: sátrapas
  alternatives_spanish:
  - gobernadores provinciales
  lexicon: LSJ
  rationale: Se conserva el título persa específico en transliteración, como en el inglés POB, porque identifica con mayor precisión el cargo histórico.
- source_word: ἵνα προπέμψωσιν
  english_pob_choice: that they should escort
  chosen_spanish: para que lo escoltaran
  alternatives_spanish:
  - para que lo despidieran con apoyo
  - para que lo acompañaran en el camino
  lexicon: LSJ
  rationale: προπέμπω puede incluir acompañar, enviar con apoyo o escoltar; «escoltaran» expresa bien la asistencia oficial en el viaje, sin excluir la idea de provisión implícita.
- source_word: τοὺς μετʼ αὐτοῦ πάντας
  english_pob_choice: all those with him
  chosen_spanish: a todos los que iban con él
  alternatives_spanish:
  - a todos sus acompañantes
  - a todos los que estaban con él
  lexicon: LSJ
  rationale: La frase abarca a todo el grupo acompañante; el español fluye mejor con «los que iban con él» y conserva el sentido inclusivo.
- source_word: ἀναβαίνοντας
  english_pob_choice: who were going up
  chosen_spanish: que subían
  alternatives_spanish:
  - que iban subiendo
  - que ascendían
  lexicon: LSJ
  rationale: Mantiene la imagen bíblica convencional de subir a Jerusalén, sin volverla demasiado literal o arcaica.
- source_word: οἰκοδομῆσαι
  english_pob_choice: to build
  chosen_spanish: edificar
  alternatives_spanish:
  - construir
  - levantar
  lexicon: LSJ
  rationale: «Edificar» preserva el registro bíblico y el sentido de construir, sin introducir explícitamente «reconstruir», que el griego no exige por sí mismo.
- source_word: τὴν Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: LSJ
  rationale: Nombre propio estándar en español.
theological_decisions:
- issue: 'Sentido de προπέμπω: escolta vs. apoyo material en el viaje'
  english_pob_reading: The English POB notes that the verb may include escorting or providing assistance for the journey.
  chosen_spanish_reading: «Para que lo escoltaran» deja abierto que la ayuda fuera oficial y logística, no solo una simple despedida.
  alternative_spanish_readings:
  - para que lo despidieran con apoyo
  - para que lo acompañaran
  rationale: El griego permite una gama de apoyo para el trayecto; el español elegido conserva el matiz de protección/acompañamiento sin reducirlo a una sola modalidad.
  doctrine_reference: Lexical note; no doctrinal issue.
- issue: 'οἰκοδομῆσαι: construir, no necesariamente reconstruir'
  english_pob_reading: The English POB preserves 'to build' and notes that 'rebuild' is broader than the explicit Greek here.
  chosen_spanish_reading: «A edificar Jerusalén» sigue de cerca el griego y no añade «reconstruir».
  alternative_spanish_readings:
  - a reconstruir Jerusalén
  - a construir Jerusalén
  rationale: Aunque el contexto histórico sugiere restauración, el verbo griego por sí solo dice construir; la formulación española evita extender el alcance semántico más allá de la evidencia textual.
  doctrine_reference: Source-critical/lexical note; no doctrinal issue.
translation_notes:
  revision_awareness: La redacción sigue de cerca la lectura final inglesa revisada, manteniendo la lista administrativa y la decisión de no introducir «reconstruir» donde el griego solo dice «construir». También integra la observación auditada de que προπέμπω puede abarcar escolta o ayuda para el viaje.
  spanish_consistency_notes:
  - Se conserva «sátrapas» como transliteración consistente para el cargo persa específico.
  - Se usa «Jerusalén» sin artículo para un nombre propio de ciudad, conforme al uso normal en español.
  - Se evita «SEÑOR» u այլ sustituto reverencial, porque el texto no contiene el Tetragrámaton ni κύριος como referencia divina.
