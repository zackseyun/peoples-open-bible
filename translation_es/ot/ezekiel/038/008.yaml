translation:
  language: es
  text: Después de muchos días serás llamado[a]; en los últimos años entrarás en una tierra restaurada tras la espada, reunida de entre muchos pueblos, sobre los montes de Israel, que habían sido siempre una desolación; pero fue sacada de entre los pueblos, y todos ellos habitarán seguros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «serás visitado» o «serás convocado». El hebreo probablemente comunica la idea de ser llamado o movilizado para actuar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּפָּקֵד
  english_pob_choice: you will be summoned
  chosen_spanish: serás llamado
  alternatives_spanish:
  - serás convocado
  - serás citado
  lexicon: HALOT
  rationale: El verbo niphal de פקד en este contexto militar apunta a ser llamado para una acción o convocatoria, no solo a una visita. «Serás llamado» conserva esa posibilidad amplia y suena natural en español.
- source_word: בְּאַחֲרִית הַשָּׁנִים
  english_pob_choice: in the latter years
  chosen_spanish: en los últimos años
  alternatives_spanish:
  - en los postreros años
  - al fin de los años
  lexicon: HALOT
  rationale: «Últimos años» reproduce con naturalidad la idea de final de un período de años sin importar la frase a la fórmula escatológica «postreros días».
- source_word: אֶרֶץ מְשׁוֹבֶבֶת מֵחֶרֶב
  english_pob_choice: a land restored from the sword
  chosen_spanish: una tierra restaurada de la espada
  alternatives_spanish:
  - una tierra devuelta de la espada
  - una tierra restaurada del filo de la espada
  lexicon: HALOT
  rationale: מְשׁוֹבֶבֶת comunica restauración o retorno; con מֵחֶרֶב, la imagen es una tierra recuperada de la devastación guerrera. «De la espada» mantiene la imagen breve del hebreo y su fuerza poética.
- source_word: מְקֻבֶּצֶת מֵעַמִּים רַבִּים
  english_pob_choice: gathered from many peoples
  chosen_spanish: reunida de muchos pueblos
  alternatives_spanish:
  - juntada de muchos pueblos
  - recogida de muchos pueblos
  lexicon: HALOT
  rationale: El participio pasivo expresa que la tierra/población ha sido reunida desde entre muchos pueblos. «Pueblos» refleja más directamente עמים que «naciones».
- source_word: עַל הָרֵי יִשְׂרָאֵל
  english_pob_choice: upon the mountains of Israel
  chosen_spanish: sobre los montes de Israel
  alternatives_spanish:
  - en los montes de Israel
  - encima de los montes de Israel
  lexicon: HALOT
  rationale: Con el verbo de movimiento, עַל puede indicar llegar sobre/upon un lugar. «Sobre los montes de Israel» sigue de cerca la construcción y es idiomática en español bíblico moderno.
- source_word: אֲשֶׁר הָיוּ לְחָרְבָּה תָּמִיד
  english_pob_choice: which had been a continual waste
  chosen_spanish: que habían sido siempre una desolación
  alternatives_spanish:
  - que habían sido una desolación continua
  - que habían sido perpetua desolación
  lexicon: HALOT
  rationale: תָּמִיד aporta continuidad persistente. «Siempre una desolación» comunica esa duración sin sonar forzado; «desolación» transmite mejor que «desperdicio» o «ruina» el estado del terreno.
- source_word: וְהִיא מֵעַמִּים הוּצָאָה
  english_pob_choice: But it was brought out from the peoples
  chosen_spanish: pero ella fue sacada de entre los pueblos
  alternatives_spanish:
  - y ella fue sacada de entre los pueblos
  - pero fue sacada de entre los pueblos
  lexicon: HALOT
  rationale: El pronombre femenino remite a la tierra; en español, «ella» puede conservar ese referente. «De entre los pueblos» expresa con más precisión que salió desde el ámbito de los pueblos entre los cuales estaba dispersa.
- source_word: וְיָשְׁב֥וּ לָ/בֶ֖טַח כֻּלָּֽ/ם
  english_pob_choice: and all of them will dwell securely
  chosen_spanish: y todos ellos habitarán seguros
  alternatives_spanish:
  - y todos ellos vivirán seguros
  - y todos ellos morarán con seguridad
  lexicon: HALOT
  rationale: ישב + לבטח es una fórmula estable de habitar con seguridad. «Habitarán seguros» conserva el valor verbal y el resultado de seguridad; «todos ellos» mantiene כֻּלָּם de forma explícita.
theological_decisions:
- issue: Fórmula temporal escatológica
  english_pob_reading: in the latter years
  chosen_spanish_reading: en los últimos años
  alternative_spanish_readings:
  - en los postreros días
  - en el fin de los años
  rationale: Se preserva la referencia temporal concreta del hebreo sin trasladarla automáticamente a la fórmula más conocida «postreros días», para no uniformar indebidamente la expresión profética.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del POB inglés que prefirió «summoned» en lugar de «mustered» por naturalidad, y mantuvo la estructura del verso con el contraste entre la antigua desolación y la seguridad presente.
  spanish_consistency_notes:
  - Se mantuvo «pueblos» para עמים, en línea con la decisión inglesa y con el matiz colectivo del hebreo.
  - «Montes de Israel» conserva el plural y evita singularizar indebidamente el topónimo geográfico.
  - Se usó «Yahvé» únicamente cuando el texto fuente lo requiriera; en este versículo no aparece el nombre divino.
