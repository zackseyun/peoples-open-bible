translation:
  language: es
  text: Y por su grito toda nación quedó preparada para la guerra[a], para combatir contra la nación de los justos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «voz» o «sonido»: el griego puede referirse de manera más amplia al ruido o al clamor que emitieron.'
    reason: lexical_alternative
  - marker: b
    text: O «la nación de los justos». La frase griega puede entenderse como un genitivo («nación de los justos») o como una idea descriptiva compacta.
    reason: alternative_reading
lexical_decisions:
- source_word: φωνῇ
  english_pob_choice: cry
  chosen_spanish: grito
  alternatives_spanish:
  - voz
  - sonido
  - clamor
  lexicon: LSJ
  rationale: En este contexto militar, la dative con αὐτῶν alude al sonido o exclamación que emitieron. «Grito» comunica bien el impacto audible e incitador sin precisar de más si fue voz, sonido o llamado.
- source_word: ἡτοιμάσθη
  english_pob_choice: was made ready
  chosen_spanish: quedó preparada
  alternatives_spanish:
  - fue preparada
  - quedó lista
  lexicon: LSJ
  rationale: El aoristo pasivo expresa que la nación llegó a un estado de preparación por una causa externa. «Quedó preparada» conserva mejor la pasividad que una forma reflexiva y suena natural en español.
- source_word: πᾶν ἔθνος
  english_pob_choice: every nation
  chosen_spanish: toda nación
  alternatives_spanish:
  - todas las naciones
  - cada nación
  lexicon: LSJ
  rationale: La construcción singular distributiva se vierte de manera natural como «toda nación». Mantiene el valor distributivo sin introducir una pluralidad no expresada de forma directa.
- source_word: εἰς πόλεμον
  english_pob_choice: for war
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para batalla
  - para la guerra
  lexicon: LSJ
  rationale: La preposición εἰς con πόλεμον indica dirección o preparación hacia la guerra. «Para la guerra» es idiomático y conserva la idea de preparación.
- source_word: ὥστε πολεμῆσαι
  english_pob_choice: so as to fight
  chosen_spanish: para combatir
  alternatives_spanish:
  - de modo que combatieran
  - a fin de combatir
  lexicon: LSJ
  rationale: En español, la combinación final/resultado se expresa con naturalidad como «para combatir». Aunque ὥστε puede sugerir resultado, esta opción mantiene el matiz de finalidad o consecuencia sin forzarlo.
- source_word: δικαίων ἔθνος
  english_pob_choice: the nation of the righteous
  chosen_spanish: la nación de los justos
  alternatives_spanish:
  - la nación de los rectos
  - la nación justa
  lexicon: LSJ
  rationale: La frase genitiva anarthra puede leerse como una descripción del pueblo caracterizado por justos. «Los justos» preserva el genitivo colectivo y evita resolver en la traducción una identificación étnica o teológica que el griego no explicita.
theological_decisions:
- issue: Identificación de δικαίων ἔθνος
  english_pob_reading: Render descriptively as 'the nation of the righteous' without specifying Israel/Jews in the main text.
  chosen_spanish_reading: Traducir descriptivamente como «la nación de los justos» sin especificar Israel o los judíos en el texto principal.
  alternative_spanish_readings:
  - la nación justa
  - la nación de los judíos
  rationale: El griego ofrece una expresión descriptiva, no un nombre étnico explícito. Mantener esa forma evita resolver en la traducción una tensión textual que el original deja abierta.
  doctrine_reference: Primacía del texto original; preservar la tensión teológica y descriptiva sin sobreespecificar.
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura inglesa auditada y la decisión léxica subyacente, manteniendo la ambigüedad de φωνῇ y de δικαίων ἔθνος sin importar una identificación más específica que el griego no exige.
  spanish_consistency_notes:
  - Se usó «nación» para ἔθνος de manera consistente con la pauta del proyecto y con el contraste interno del verso.
  - Se evitó «Cristo», «SEÑOR» u otra terminología no pertinente al pasaje.
  - La puntuación y el registro son publicados y naturales en español latinoamericano.
