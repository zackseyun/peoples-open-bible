translation:
  language: es
  text: Y asignaron por sorteo, de la tribu de los hijos de Judá[a], y de la tribu de los hijos de Simeón, y de la tribu de los hijos de Benjamín, estas ciudades, que llamaron por nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más dinámicamente: «estas ciudades, que están listadas por nombre». El hebreo usa literalmente el verbo «llamar» con «por nombres», una fórmula que introduce el listado nominal que sigue.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  english_pob_choice: They assigned
  chosen_spanish: E hicieron
  alternatives_spanish:
  - asignaron
  - repartieron
  - dieron
  lexicon: HALOT
  rationale: En este contexto de reparto por sorteo de ciudades levíticas, el valor administrativo de נתן se expresa de modo natural en español con una formulación verbal que introduzca la acción resultante. «Hicieron» conserva el hecho de la designación sin forzar un tecnicismo; «asignaron» sería también posible, pero «hicieron por sorteo» mantiene la secuencia hebrea con claridad.
- source_word: בַּגּוֹרָל
  english_pob_choice: by lot
  chosen_spanish: por sorteo
  alternatives_spanish:
  - por la suerte
  - por lotes
  - mediante sorteo
  lexicon: HALOT
  rationale: גוֹרָל se refiere al mecanismo de sorteo/echado de suertes. «Por sorteo» es idiomático en español y conserva el procedimiento sin introducir una imagen extraña.
- source_word: מִמַּטֵּה
  english_pob_choice: from the tribe of
  chosen_spanish: de la tribu de
  alternatives_spanish:
  - de la vara de
  - de la estirpe de
  - de la tribu
  lexicon: HALOT
  rationale: En listas tribales, מַטֶּה significa «tribu». En español, «de la tribu de» reproduce bien la relación de origen y mantiene la transparencia genealógica del texto.
- source_word: בְנֵי יְהוּדָה
  english_pob_choice: the sons of Judah
  chosen_spanish: los hijos de Judá
  alternatives_spanish:
  - la gente de Judá
  - Judá
  lexicon: HALOT
  rationale: Se conserva la fórmula genealógico-tribal literal «hijos de Judá», que es parte del registro de Crónicas y evita nivelar el lenguaje a una paráfrasis sociológica.
- source_word: בְנֵי שִׁמְעוֹן
  english_pob_choice: the sons of Simeon
  chosen_spanish: los hijos de Simeón
  alternatives_spanish:
  - la gente de Simeón
  - Simeón
  lexicon: HALOT
  rationale: Se mantiene la misma construcción que con Judá por consistencia terminológica y fidelidad al patrón hebreo.
- source_word: בְּנֵי בִנְיָמִן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: los hijos de Benjamín
  alternatives_spanish:
  - la gente de Benjamín
  - Benjamín
  lexicon: HALOT
  rationale: Se conserva la misma construcción tribal-genealógica para uniformidad y transparencia.
- source_word: הֶעָרִים הָאֵלֶּה
  english_pob_choice: these cities
  chosen_spanish: estas ciudades
  alternatives_spanish:
  - estas poblaciones
  - estas aldeas
  - las ciudades estas
  lexicon: HALOT
  rationale: עָרִים se traduce normalmente «ciudades» en contextos de asignación territorial. «Estas ciudades» conserva el demostrativo y la identificación del conjunto listado.
- source_word: אֲשֶׁר יִקְרְאוּ אֶתְהֶם בְּשֵׁמוֹת
  english_pob_choice: which they called by name
  chosen_spanish: que fueron llamadas por nombre
  alternatives_spanish:
  - que ellos llamaron por nombre
  - que fueron designadas por nombre
  - que fueron nombradas por sus nombres
  lexicon: HALOT
  rationale: La fórmula hebrea usa קרא con el complemento «por nombres» para introducir la lista nominal siguiente. En español, «fueron llamadas por nombre» preserva la pasiva/formulaica del hebreo sin obligar a un sujeto explícito; además evita sugerir una acción distinta de la mera designación nominal.
theological_decisions:
- issue: Fórmula de nombrar/listar las ciudades
  english_pob_reading: 'which they called by name; dynamic note: ''these cities, which are listed by name.'''
  chosen_spanish_reading: que fueron llamadas por nombre
  alternative_spanish_readings:
  - que fueron listadas por nombre
  - que fueron designadas por nombre
  - que se mencionan por nombre
  rationale: 'El hebreo permite una lectura formulística: el acto de «llamar por nombres» introduce el listado detallado de ciudades. En español, se mantiene la tensión entre el sentido literal y el valor listado, sin reemplazarlo directamente por una paráfrasis que borre la forma verbal del original.'
  doctrine_reference: None
translation_notes:
  revision_awareness: Se verificó el antecedente inglés POB y su nota lexical sobre אֲשֶׁר יִקְרְאוּ אֶתְהֶם בְּשֵׁמוֹת; la redacción española conserva la misma tensión entre literalidad y valor de listado, sin necesidad de cambios respecto del pasaje fuente.
  spanish_consistency_notes:
  - Se mantuvo «hijos de» para reflejar la fórmula genealógica tribal del hebreo, coherente con Crónicas.
  - Se tradujo מַטֶּה como «tribu» en contextos tribales, según el uso estándar del proyecto.
  - Se conservó «por sorteo» para בַּגּוֹרָל, en paralelo con el inglés auditado «by lot».
  - Se evitó «SEÑOR» u otra sustitución teológica porque este versículo no contiene el nombre divino.
