revisions:
- from: Y un hombre será como un escondedero contra el viento[a], y como un refugio contra la tempestad, como corrientes de agua en tierra seca[c][b], como la sombra de una roca maciza en tierra cansada.
  to: Y un hombre será como un escondite del viento[a], y un refugio de la tempestad[b], como corrientes de agua en tierra seca[c], como la sombra de una roca maciza en tierra cansada.
