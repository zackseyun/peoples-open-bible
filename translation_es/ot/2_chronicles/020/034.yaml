translation:
  language: es
  text: Y el resto de los hechos de Josafat, los primeros y los últimos, están escritos en los registros[a] de Jehú hijo de Hananí, que están incluidos en el Libro de los Reyes de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el relato de Jehú hijo de Hananí»; el hebreo dice literalmente «en las palabras/registros de Jehú hijo de Hananí».
    reason: lexical_alternative
  - marker: b
    text: La cláusula hebrea literalmente dice «que él hizo subir sobre el Libro de los Reyes de Israel», probablemente en el sentido de que el registro de Jehú fue incorporado o incluido en esa fuente real más amplia.
    reason: alternative_reading
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, el resto de
  alternatives_spanish:
  - Y el resto de
  - El resto de
  lexicon: HALOT
  rationale: En esta fórmula historiográfica, יֶתֶר introduce lo que queda por mencionar de la vida o reinado. «Ahora, el resto de» conserva el valor transicional del hebreo y suena natural en español bíblico contemporáneo.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - actos
  - asuntos
  - palabras
  lexicon: HALOT
  rationale: En resúmenes reales, דִּבְרֵי abarca las acciones o acontecimientos del reinado, no solo «palabras». «Hechos» comunica bien ese sentido histórico en español sin perder amplitud semántica.
- source_word: הָרִאשֹׁנִים וְהָאַחֲרֹנִים
  english_pob_choice: the first and the last
  chosen_spanish: los primeros y los últimos
  alternatives_spanish:
  - de principio a fin
  - los de antes y los de después
  lexicon: HALOT
  rationale: La expresión funciona como merismo para abarcar toda la extensión de los hechos de Josafat. «Los primeros y los últimos» refleja de cerca la estructura hebrea y es idiomático en español.
- source_word: הִנָּם
  english_pob_choice: behold, they are
  chosen_spanish: he aquí, están
  alternatives_spanish:
  - ciertamente están
  - están
  lexicon: HALOT
  rationale: La partícula añade deixis y énfasis. «He aquí» preserva ese tono solemne; «están» mantiene la copulativa con naturalidad española.
- source_word: כְּתוּבִים
  english_pob_choice: written
  chosen_spanish: escritos
  alternatives_spanish:
  - anotados
  - registrados
  lexicon: HALOT
  rationale: El participio pasivo de כתב se refiere de manera directa a algo puesto por escrito. «Escritos» es la forma más transparente y fiel en español.
- source_word: בְּדִבְרֵי
  english_pob_choice: in the records of
  chosen_spanish: en los registros de
  alternatives_spanish:
  - en las palabras de
  - en el relato de
  - en los escritos de
  lexicon: HALOT
  rationale: Aquí דִּבְרֵי introduce una fuente documental asociada a Jehú. «Registros» mantiene el valor de archivo o documento, mejor que una traducción demasiado literal como «palabras».
- source_word: יֵהוּא בֶן חֲנָנִי
  english_pob_choice: Jehu son of Hanani
  chosen_spanish: Jehú hijo de Hananí
  alternatives_spanish:
  - Jehú, hijo de Hananí
  lexicon: HALOT
  rationale: Los nombres propios se transliteran. «Hijo de» reproduce בן en su función genealógica; la forma sin coma sigue el ritmo breve de la fórmula.
- source_word: אֲשֶׁר הֹעֲלָה עַל סֵפֶר מַלְכֵי יִשְׂרָאֵל
  english_pob_choice: which are included in the Book of the Kings of Israel
  chosen_spanish: los cuales están incluidos en el Libro de los Reyes de Israel
  alternatives_spanish:
  - que están incluidos en el Libro de los Reyes de Israel
  - los cuales fueron incorporados al Libro de los Reyes de Israel
  - que fueron incorporados al Libro de los Reyes de Israel
  lexicon: HALOT
  rationale: La cláusula hebrea es sintácticamente difícil y sugiere que el material de Jehú fue incluido en una obra mayor. «Están incluidos» sigue la revisión inglesa más natural y conserva la relación archivística sin forzar un giro literal opaco.
- source_word: סֵפֶר מַלְכֵי יִשְׂרָאֵל
  english_pob_choice: the Book of the Kings of Israel
  chosen_spanish: el Libro de los Reyes de Israel
  alternatives_spanish:
  - el libro de los reyes de Israel
  - los anales de los reyes de Israel
  lexicon: HALOT
  rationale: סֵפֶר designa un libro o documento; aquí funciona como título de una fuente escrita. «Libro» conserva esa fuerza documental y «Reyes de Israel» traduce el constructo de manera directa y clara.
translation_notes:
  revision_awareness: La redacción sigue el último pase de revisión del texto base inglés, que prefirió «are included» frente a una formulación más dura como «were incorporated». En español se reflejó con «están incluidos» para conservar naturalidad y la relación archivística sugerida por el hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando el texto lo requiriera; en este versículo no aparece el nombre divino explícito.
  - «Registros» se usó para דִּבְרֵי en función documental, evitando la ambigüedad de «palabras» en español.
  - Se prefirió «hechos» para דִּבְרֵי dentro del resumen regio, consistente con el uso historiográfico del AT.
  - La mayúscula en «Libro» sigue el uso de título documental heredado del audit trail inglés, sin alterar el sentido hebreo.
