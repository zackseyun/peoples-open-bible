translation:
  language: es
  text: 'Entonces Rut dijo[a]: «No me ruegues que te deje, que me vuelva de seguirte[b]. Pues adonde tú vayas, yo iré; y donde tú pases la noche, yo pasaré la noche[c]. Tu pueblo será mi pueblo[d], y tu Dios mi Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me pidas», «me insistas» o «me apremies»; el verbo hebreo puede expresar rogar, instar o importunar.
    reason: lexical_alternative
  - marker: b
    text: Hebreo, literalmente, «volver de detrás de ti», un modismo que significa «dejar de seguirte».
    reason: lexical_alternative
  - marker: c
    text: O «donde te alojes, me alojaré»; el verbo también puede referirse a hospedarse o pasar la noche.
    reason: lexical_alternative
  - marker: d
    text: Las cláusulas hebreas «Tu pueblo mi pueblo, y tu Dios mi Dios» no llevan verbo explícito; también puede entenderse «Tu pueblo es mi pueblo, y tu Dios es mi Dios», o bien con futuro en ambas.
    reason: alternative_reading
lexical_decisions:
- source_word: תִּפְגְּעִי בִי
  english_pob_choice: urge me
  chosen_spanish: me pidas
  alternatives_spanish:
  - me ruegues
  - me insistas
  - me apremies
  lexicon: HALOT
  rationale: El verbo פגע con ב puede expresar la idea de presionar, instar o importunar. En español, «pedir» en esta construcción con negación reproduce con naturalidad la súplica de Rut y evita una dureza que el contexto no requiere.
- source_word: לְעָזְבֵךְ
  english_pob_choice: to leave you
  chosen_spanish: que te deje
  alternatives_spanish:
  - que te abandone
  - que te desampare
  - que te abandone y te deje
  lexicon: HALOT
  rationale: עזב normalmente significa dejar; «dejarte» es el equivalente más natural y fiel en español. «Abandonar» o «desamparar» añadirían una carga más fuerte que el hebreo no exige aquí.
- source_word: לָשׁוּב מֵאַחֲרָיִךְ
  english_pob_choice: to turn back from following you
  chosen_spanish: que me aparte de ir detrás de ti
  alternatives_spanish:
  - que regrese de seguirte
  - que vuelva atrás de seguirte
  - que me vuelva atrás de ir tras de ti
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice «volver de detrás de ti», un modismo de seguimiento. «Ir detrás de ti» conserva la imagen direccional sin sonar artificioso, y «me aparte» refleja el giro de apartarse/retroceder.
- source_word: אֶל אֲשֶׁר תֵּלְכִי אֵלֵךְ
  english_pob_choice: where you go, I will go
  chosen_spanish: donde tú vayas, yo iré
  alternatives_spanish:
  - adonde tú vayas, yo iré
  - donde tú vayas, allí iré yo
  lexicon: HALOT
  rationale: La construcción relativa expresa destino. «Donde tú vayas, yo iré» es idiomático y conserva el paralelismo poético, con pronombre explícito para claridad.
- source_word: וּבַאֲשֶׁר תָּלִינִי אָלִין
  english_pob_choice: where you lodge, I will lodge
  chosen_spanish: donde tú te alojes, yo me alojaré
  alternatives_spanish:
  - donde tú pases la noche, pasaré la noche
  - donde tú habites, habitaré
  lexicon: HALOT
  rationale: לון suele referirse a hospedarse o pasar la noche. «Alojarse» mantiene el registro claro y el paralelismo con «iré», sin perder la referencia al hospedaje.
- source_word: עַמֵּךְ עַמִּי
  english_pob_choice: Your people will be my people
  chosen_spanish: Tu pueblo será mi pueblo
  alternatives_spanish:
  - Tu gente será mi gente
  - Tu pueblo es mi pueblo
  lexicon: HALOT
  rationale: עַם puede ser «pueblo» o «gente». «Pueblo» conserva mejor el valor colectivo y la resonancia de pertenencia comunitaria. El futuro expresa la decisión leal de Rut dentro del contexto de juramento implícito.
- source_word: וֵאלֹהַיִךְ אֱלֹהָי
  english_pob_choice: and your God my God
  chosen_spanish: y tu Dios mi Dios
  alternatives_spanish:
  - y tu Dios será mi Dios
  - y tu Dios es mi Dios
  lexicon: HALOT
  rationale: אלֹהים aquí es singular por contexto y por la confesión de Rut; «Dios» es la forma natural y precisa en español. Se conserva el estilo compacto del hebreo sin añadir un verbo que el original omite.
theological_decisions:
- issue: Las cláusulas sin verbo de pertenencia/identificación
  english_pob_reading: Use future in the first clause ('Your people will be my people') but retain compact verbless style in the second ('and your God my God')
  chosen_spanish_reading: 'Usar futuro en ambas cláusulas para expresar compromiso: «Tu pueblo será mi pueblo, y tu Dios mi Dios»'
  alternative_spanish_readings:
  - Tu pueblo es mi pueblo, y tu Dios es mi Dios
  - Tu pueblo será mi pueblo, y tu Dios será mi Dios
  - Tu pueblo mi pueblo, y tu Dios mi Dios
  rationale: El hebreo omite la cópula en ambos miembros. En español, el futuro comunica mejor la decisión vinculante de Rut sin perder el peso confesional. Mantener la segunda cláusula sin verbo sería posible, pero el futuro en ambas mantiene uniformidad y claridad para lectura pública.
  doctrine_reference: Fidelidad al texto hebreo; equivalencia óptima sin forzar una traducción litúrgica tradicional
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «press me» a «urge me» y simplificó «following after you» a «following you» para mayor naturalidad. La versión española sigue esa resolución semántica, pero vuelve al valor direccional hebreo («ir detrás de ti») y preserva la compactación poética de las cláusulas finales.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí aparece únicamente «Dios».
  - Se evitó «Cristo» y otras formas eclesiásticas no presentes en el pasaje.
  - Se mantuvo el tratamiento de tuteo singular femenino para Naomi, de acuerdo con el hebreo.
  - 'Se conservó el paralelismo poético con verbos simples en futuro de decisión: «iré / me alojaré / será».'
