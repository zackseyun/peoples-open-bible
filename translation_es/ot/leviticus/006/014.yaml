translation:
  language: es
  text: En una plancha[a] con aceite se hará, bien mezclada; la traerás en piezas horneadas[b], una ofrenda vegetal partida en trozos, y la presentarás como aroma agradable a Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «en aceite».
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa un término raro que puede aludir a porciones horneadas preparadas sobre la plancha.
    reason: lexical_alternative
  - marker: c
    text: Expresión sacrificial hebrea de aceptación ritual, no mera descripción de un olor agradable en sentido ordinario.
    reason: theological_note
lexical_decisions:
- source_word: מַחֲבַת
  english_pob_choice: griddle
  chosen_spanish: plancha
  alternatives_spanish:
  - sartén
  - comal
  - placa de cocción
  lexicon: HALOT
  rationale: El término designa una superficie plana de cocción para la ofrenda. En español, 'plancha' comunica mejor que 'sartén' la idea de una superficie plana y baja, sin añadir un utensilio más hondo que el hebreo no sugiere.
- source_word: בַּשֶּׁמֶן
  english_pob_choice: with oil
  chosen_spanish: con aceite
  alternatives_spanish:
  - en aceite
  - con el aceite
  lexicon: HALOT
  rationale: La preposición puede expresar medio o acompañamiento. 'Con aceite' suena natural en español y conserva el sentido instrumental de la preparación.
- source_word: תֵּעָשֶׂה
  english_pob_choice: it shall be made
  chosen_spanish: se hará
  alternatives_spanish:
  - será hecha
  - se preparará
  lexicon: HALOT
  rationale: El nifal expresa pasividad en la preparación de la ofrenda. 'Se hará' mantiene la forma pasiva sin recargar el español; 'se preparará' sería más interpretativo.
- source_word: מֻרְבֶּכֶת
  english_pob_choice: well mixed
  chosen_spanish: bien mezclada
  alternatives_spanish:
  - mezclada
  - bien amalgamada
  - bien batida
  lexicon: HALOT
  rationale: La raíz indica una mezcla o amasado con aceite. 'Bien mezclada' preserva la idea sin forzar un tecnicismo culinario ajeno al contexto.
- source_word: תְּבִיאֶנָּה
  english_pob_choice: you shall bring it in
  chosen_spanish: la traerás
  alternatives_spanish:
  - la presentarás
  - la llevarás
  lexicon: HALOT
  rationale: El verbo es 'traer'; el sufijo femenino se refiere a la ofrenda. 'La traerás' es directo y fiel, y en contexto cultual se entiende como llevarla a la presencia sacerdotal.
- source_word: תֻּפִינֵי
  english_pob_choice: baked pieces
  chosen_spanish: piezas horneadas
  alternatives_spanish:
  - porciones horneadas
  - piezas cocidas al horno
  lexicon: HALOT
  rationale: Es un término raro de preparación culinaria. 'Piezas horneadas' conserva la rareza relativa y la idea de una preparación ya cocida al calor seco; 'horneadas' evita imponer una técnica no explicitada.
- source_word: מִנְחַת
  english_pob_choice: grain offering
  chosen_spanish: ofrenda vegetal
  alternatives_spanish:
  - ofrenda de cereal
  - ofrenda de grano
  - oblación
  lexicon: HALOT
  rationale: Para la מִנְחָה, 'ofrenda vegetal' es una decisión POB coherente con el valor cultual de la ofrenda de productos de la tierra y evita reducirla solo a 'grano' cuando el contexto puede abarcar harina y preparaciones derivadas.
- source_word: פִּתִּים
  english_pob_choice: broken into pieces
  chosen_spanish: partida en trozos
  alternatives_spanish:
  - en trozos
  - rota en pedazos
  - troceada
  lexicon: HALOT
  rationale: La forma plural expresa piezas o fragmentos. 'Partida en trozos' mantiene la imagen de fragmentación que el texto resalta y conversa bien con 'piezas horneadas'.
- source_word: תַּקְרִיב
  english_pob_choice: present
  chosen_spanish: presentarás
  alternatives_spanish:
  - ofrecerás
  - acercarás
  lexicon: HALOT
  rationale: En contexto sacrificial, קרב en hifil significa presentar/ofrecer ante Dios. 'Presentarás' evita una repetición innecesaria de 'traer' y conserva el tono litúrgico.
- source_word: רֵיחַ נִיחֹחַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: aroma agradable
  alternatives_spanish:
  - aroma grato
  - aroma placentero
  - olor agradable
  lexicon: HALOT
  rationale: La expresión es una fórmula sacrificial estable que indica aceptación. 'Aroma agradable' comunica el sentido sin sugerir crudamente un gusto olfativo humano o divino.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino conforme al criterio POB. 'A Yahvé' reproduce la dirección del destinatario cultual y mantiene el nombre propio en español.
theological_decisions:
- issue: Tratamiento del Tetragrámaton יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre propio divino, no un título. En español se adopta 'Yahvé' para preservar la identidad del nombre revelado sin sustituirlo por un equivalente genérico ni por una convención de mayúsculas.
  doctrine_reference: 'POB doctrine: YHWH → Yahweh (aplicado en español como Yahvé)'
- issue: Fórmula sacrificial רֵיחַ נִיחֹחַ
  english_pob_reading: a pleasing aroma
  chosen_spanish_reading: aroma agradable
  alternative_spanish_readings:
  - aroma grato
  - aroma suave
  - aroma placentero
  rationale: La frase funciona como fórmula de aceptación ritual, no como descripción literal de olor placentero para Dios. 'Aroma agradable' preserva esa carga cultual en español sin perder claridad.
  doctrine_reference: POB translation philosophy §6; lenguaje sacrificial aceptable y comprensible
- issue: Naturaleza de מִנְחָה
  english_pob_reading: grain offering
  chosen_spanish_reading: ofrenda vegetal
  alternative_spanish_readings:
  - ofrenda de cereal
  - ofrenda de grano
  rationale: La ofrenda de מִנְחָה no se reduce solo al grano como materia prima; en este contexto incluye preparaciones derivadas. 'Ofrenda vegetal' mantiene la categoría cultual amplia y evita una restricción innecesaria.
  doctrine_reference: POB lexical consistency for מִנְחָה
translation_notes:
  revision_awareness: El contexto inglés mostró acuerdo alto con solo observaciones menores, sin revisiones aplicadas en la última pasada. La principal tensión para el español es cómo reflejar מִנְחָה sin empobrecerla a «grano» y cómo conservar la fórmula רֵיחַ נִיחֹחַ sin suavizar su valor técnico-ritual. Se optó por una redacción natural, auditada y consistente con el criterio POB de mantener el nombre divino.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה.
  - Se mantiene «ofrenda vegetal» para מִנְחָה siguiendo la terminología POB en español.
  - «Aroma agradable» conserva la fórmula sacrificial sin explicitarla en el cuerpo del texto más allá de lo necesario.
  - Los marcadores de nota se incluyen solo donde el texto los requiere; no se reutilizan.
