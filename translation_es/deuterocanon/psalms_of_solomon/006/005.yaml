revisions:
- from: Su alma no será aterrada al cruzar ríos y ante el tumulto de los mares[a][b][c].
  to: Su alma[a] no se aterrorizará[c] en el cruce de ríos y en la agitación de los mares[b].
  rationale: La revisión mantiene las decisiones léxicas principales del original y del POB inglés, pero mejora la fidelidad formal y la naturalidad del español. «No se aterrorizará» expresa mejor πτοηθήσεται que «no será aterrada»; «en el cruce de ríos» representa mejor διάβασις como sustantivo; y «agitación de los mares» refleja más claramente la imagen marítima de σάλος. También se ajusta la nota c para corresponder a la alternativa inglesa documentada.
