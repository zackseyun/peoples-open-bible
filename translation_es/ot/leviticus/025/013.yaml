translation:
  language: es
  text: En este año de Jubileo, cada uno de ustedes volverá a su propiedad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cada uno de ustedes volverá a su posesión».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁנַ֥ת
  english_pob_choice: In ... year
  chosen_spanish: En ... año
  alternatives_spanish:
  - En el año de
  - Durante el año de
  lexicon: HALOT
  rationale: La preposición hebrea ב con constructo de שָׁנָה expresa marco temporal; en español, «En este año» suena natural y conserva el valor circunstancial sin añadir información.
- source_word: הַ/יּוֹבֵ֖ל
  english_pob_choice: Year of Jubilee
  chosen_spanish: año de jubileo
  alternatives_spanish:
  - jubileo
  - año jubilar
  lexicon: HALOT
  rationale: יוֹבֵל designa la institución/año especial del Levítico 25. «Año de jubileo» mantiene explícito que se trata del año legal, no solo de una festividad general.
- source_word: הַ/זֹּ֑את
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - ese mismo
  lexicon: HALOT
  rationale: El demostrativo modifica el sustantivo compuesto; «este» reproduce la proximidad y la especificidad del hebreo de manera natural en español.
- source_word: תָּשֻׁ֕בוּ
  english_pob_choice: shall return
  chosen_spanish: volverán
  alternatives_spanish:
  - regresarán
  - volverán de nuevo
  lexicon: HALOT
  rationale: El imperfecto plural en instrucción legal se expresa bien con futuro de mandato en español. «Volverán» conserva el valor de retorno sin recargar el verbo con matices no presentes en el hebreo.
- source_word: אִ֖ישׁ
  english_pob_choice: each of you
  chosen_spanish: cada uno de ustedes
  alternatives_spanish:
  - cada uno
  - cada hombre
  lexicon: HALOT
  rationale: Aunque אִישׁ es masculino singular distributivo, el sentido es de distribución entre los destinatarios. «Cada uno de ustedes» preserva la distribución y evita neutralizar indebidamente el plural implícito; en español es más natural que un singular genérico.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - de vuelta a
  lexicon: HALOT
  rationale: La preposición direccional simple se vierte naturalmente con «a»; el sentido de retorno ya está contenido en «volverán».
- source_word: אֲחֻזָּתֽ/וֹ
  english_pob_choice: his property
  chosen_spanish: su propiedad
  alternatives_spanish:
  - su posesión
  - su heredad
  lexicon: HALOT
  rationale: אֲחֻזָּה en Levítico 25 se refiere a propiedad/tenencia familiar dentro de Israel. «Propiedad» es claro y fiel; en español evita una paráfrasis excesiva como «heredad», que podría introducir un matiz no exigido por el verso.
theological_decisions:
- issue: Valor distributivo de אִישׁ en una ley general
  english_pob_reading: each of you
  chosen_spanish_reading: cada uno de ustedes
  alternative_spanish_readings:
  - cada uno
  - cada hombre
  rationale: Se preserva el carácter distributivo del singular hebreo sin imponer una lectura individualista ni una masculinización innecesaria en español. La referencia sigue siendo a cada miembro del grupo destinatario.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La POB inglesa revisó la frase distributiva de «each man» a «each of you» para reflejar mejor אִישׁ. Esta versión española sigue esa revisión con «cada uno de ustedes», manteniendo el carácter distributivo y el referente plural implícito. También conserva la relación con la propiedad familiar sin introducir explicaciones ajenas al texto.
  spanish_consistency_notes:
  - Se usa «jubileo» con minúscula cuando funciona como nombre común del año legal.
  - Se mantiene «propiedad» como término base para אֲחֻזָּה, coherente con Levítico 25:13 y la nota de alternativa lexical.
  - El español evita el calco de la estructura hebrea y conserva una sintaxis idiomática sin perder el sentido jurídico del mandato.
