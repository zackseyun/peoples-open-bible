translation:
  language: es
  text: Moisés se apresuró[a], se inclinó hasta la tierra y adoró[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se dio prisa» o «actuó rápidamente».
    reason: lexical_alternative
  - marker: b
    text: O «se postró»; el hebreo puede indicar una postración corporal en acto de reverencia o adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַהֵר
  english_pob_choice: quickly
  chosen_spanish: se apresuró
  alternatives_spanish:
  - rápidamente
  - se dio prisa
  - se apresuró con rapidez
  lexicon: HALOT
  rationale: El verbo מהר expresa prisa o prontitud. En español, 'se apresuró' mantiene el matiz verbal de acción inmediata y suena natural en narrativa, más fiel que un simple adverbio si se quiere conservar la fuerza del verbo hebreo.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: transliteración estándar
  rationale: Nombre propio bíblico en su forma española habitual.
- source_word: וַיִּקֹּד
  english_pob_choice: bowed down
  chosen_spanish: se inclinó hasta el suelo
  alternatives_spanish:
  - se postró
  - se inclinó
  - se inclinó profundamente
  lexicon: HALOT
  rationale: קדד indica inclinarse o doblarse. 'Se inclinó hasta el suelo' conserva la imagen corporal concreta del gesto y evita confundir este verbo con el de adoración que sigue en la línea.
- source_word: אַרְצָה
  english_pob_choice: to the ground
  chosen_spanish: hasta el suelo
  alternatives_spanish:
  - al suelo
  - a tierra
  - hacia el suelo
  lexicon: HALOT
  rationale: La forma direccional indica movimiento hacia abajo/ hacia el suelo. 'Hasta el suelo' comunica bien la postura sin sonar forzado en español.
- source_word: וַיִּשְׁתָּחוּ
  english_pob_choice: worshiped
  chosen_spanish: adoró
  alternatives_spanish:
  - se postró
  - se postró en adoración
  - rindió adoración
  lexicon: HALOT
  rationale: El verbo puede referirse a postración corporal, pero en este contexto la respuesta es reverente y cultual. Como el gesto físico ya quedó expresado en el verbo anterior, 'adoró' preserva la carga devocional sin redundancia.
theological_decisions:
- issue: Distinguir entre el gesto corporal de reverencia y el acto de adoración
  english_pob_reading: The Hebrew can denote bodily prostration, but here the theological force is worshipful response; the preceding verb already states the physical bowing.
  chosen_spanish_reading: '''Se inclinó hasta el suelo'' expresa la postura física, y ''adoró'' expresa la respuesta de reverencia a la revelación de Yahvé.'
  alternative_spanish_readings:
  - se postró
  - se postró y adoró
  - se inclinó y adoró
  rationale: 'En español, ''adoró'' evita repetir la idea corporal del segundo verbo y preserva la distinción semántica del hebreo: primero el movimiento de inclinarse, luego el acto de reverencia religiosa.'
  doctrine_reference: Ex 34:8; comparación con usos de שחה en actos de postración reverente
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado en inglés: la traducción inglesa distinguió entre el gesto físico (bowed down) y el acto devocional (worshiped). La versión española mantiene esa distinción con un verbo dinámico para מהר, una expresión corporal concreta para קדד+ארצה, y ''adoró'' para שחה. No se introdujeron elementos ajenos al hebreo ni se suavizó la tensión léxica documentada.'
  spanish_consistency_notes:
  - Se usa 'Moisés' como forma estándar del nombre propio.
  - Se evita 'SEÑOR' porque este versículo no contiene el tetragrámaton explícito en el texto dado; la nota teológica no necesita añadidos.
  - '''adoró'' se conserva como verbo de culto y no se reemplaza por una simple redundancia de postura.'
  - La puntuación une los dos verbos principales con comas, reflejando la secuencia narrativa breve del hebreo.
