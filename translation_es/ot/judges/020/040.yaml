translation:
  language: es
  text: Pero la señal comenzó a subir desde la ciudad como una columna de humo[a], y Benjamín se volvió hacia atrás[b], y he aquí[c] que toda la ciudad subía a los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la baliza comenzó a subir desde la ciudad como una columna de humo’. El término hebreo puede denotar algo levantado en alto y aquí probablemente se refiere a la señal de combate acordada.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘Benjamín se volvió tras de él’. Esto puede significar que se volvió hacia atrás o que se volvió para mirar detrás de sí.'
    reason: lexical_alternative
  - marker: c
    text: O ‘he aquí que toda la ciudad subió a los cielos’, es decir, en llamas y humo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּשְׂאֵת
  english_pob_choice: the signal
  chosen_spanish: la señal
  alternatives_spanish:
  - el faro
  - la elevación
  - el alzamiento
  lexicon: HALOT
  rationale: En este contexto bélico, el sustantivo no se traduce como un simple ‘levantamiento’, sino como una señal acordada de combate. ‘Señal’ comunica bien la función comunicativa sin perder naturalidad en español.
- source_word: הֵחֵלָּה לַעֲלוֹת
  english_pob_choice: began to rise
  chosen_spanish: comenzó a subir
  alternatives_spanish:
  - empezó a subir
  - comenzó a ascender
  lexicon: HALOT
  rationale: La secuencia verbal expresa inicio de movimiento ascendente. ‘Comenzó a subir’ es natural en español y preserva la idea de inicio más el movimiento hacia arriba.
- source_word: עַמּוּד עָשָׁן
  english_pob_choice: a pillar of smoke
  chosen_spanish: una columna de humo
  alternatives_spanish:
  - un pilar de humo
  lexicon: HALOT
  rationale: ‘Columna de humo’ es una equivalencia idiomática clara en español para la imagen vertical del hebreo. Mantiene el sentido visual y evita una expresión menos natural como ‘pilar de humo’.
- source_word: וַיִּפֶן בִּנְיָמִן אַחֲרָיו
  english_pob_choice: Benjamin turned behind him
  chosen_spanish: Benjamín se volvió tras de sí
  alternatives_spanish:
  - Benjamín se volvió atrás
  - Benjamín miró hacia atrás
  lexicon: HALOT
  rationale: La POB inglesa preserva el verbo ‘turn’ sin reducirlo a ‘look’. ‘Se volvió tras de sí’ conserva esa imagen y deja abierta la posibilidad de que implicara mirar hacia atrás.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y entonces
  lexicon: HALOT
  rationale: ‘He aquí’ reproduce el matiz discursivo de sorpresa o descubrimiento repentino, con un registro bíblico claro en español.
- source_word: כְלִיל הָעִיר
  english_pob_choice: the whole city
  chosen_spanish: toda la ciudad
  alternatives_spanish:
  - la ciudad entera
  - el conjunto de la ciudad
  lexicon: HALOT
  rationale: ‘כְלִיל’ expresa totalidad. ‘Toda la ciudad’ es la forma más natural en español y mantiene la fuerza totalizante del hebreo.
- source_word: הַשָּׁמָיְמָה
  english_pob_choice: to the heavens
  chosen_spanish: hasta los cielos
  alternatives_spanish:
  - a los cielos
  - hacia los cielos
  lexicon: HALOT
  rationale: El sufijo direccional marca movimiento ascendente. ‘Hasta los cielos’ comunica esa elevación intensa de modo natural en español y conserva el plural ‘cielos’.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo WLC y el rastro editorial inglés. Se evitó añadir una cláusula temporal no presente en el original; se mantuvo la secuencia narrativa simple: surgimiento de la señal, giro de Benjamín y descubrimiento de la ciudad ascendiendo hacia los cielos.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ como forma estándar del proyecto cuando no aparece en este versículo.
  - Se mantuvo ‘Benjamín’ como nombre propio tribal singular, reflejando el hebreo con sujeto colectivo.
  - Se eligió ‘cielos’ en plural para conservar el valor direccional del hebreo.
