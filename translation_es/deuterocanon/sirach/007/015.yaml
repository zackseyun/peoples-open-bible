translation:
  language: es
  text: No te cuentes entre los muertos del pueblo; recuerda que el morir[a] no pasará de largo.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Tradición griega: «No odies el trabajo penoso y la agricultura creada por el Altísimo». El griego difiere sustancialmente del hebreo conservado aquí.'
    reason: alternative_reading
  - marker: b
    text: El hebreo de la segunda línea es difícil y puede implicar un juego de palabras con «pasar de largo / morir». El sentido es que la muerte o la mortalidad no pasa de largo ante nadie.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תַּחְשׁוֹבְךָ
  english_pob_choice: Do not count yourself
  chosen_spanish: No te creas entre
  alternatives_spanish:
  - No te cuentes entre
  - No te consideres entre
  lexicon: HALOT
  rationale: El hebreo usa חשב con sentido reflexivo de contarse o clasificarse dentro de un grupo. En español, “No te creas entre” expresa con naturalidad la advertencia de no colocarse uno mismo en cierta categoría, aunque conserva una ligera idiomaticidad interpretativa.
- source_word: בָּמֳתֵי עָם
  english_pob_choice: among the people’s dead
  chosen_spanish: los altos del pueblo
  alternatives_spanish:
  - los muertos del pueblo
  - entre los muertos del pueblo
  lexicon: HALOT
  rationale: El hebreo es difícil y el contexto de esta línea en la tradición hebrea sugiere un juego con ‘alturas/cumbres’ y mortalidad. Se opta por una formulación que mantiene la ambigüedad del término y evita imponer sin seguridad una lectura funeraria donde el texto hebreo no es del todo claro.
- source_word: זְכוֹר
  english_pob_choice: remember
  chosen_spanish: recuerda
  alternatives_spanish:
  - haz memoria
  - ten presente
  lexicon: HALOT
  rationale: Imperativo directo de זכר; “recuerda” es la forma natural y fiel en español.
- source_word: עִבָּרוֹן
  english_pob_choice: passing away
  chosen_spanish: el pasar
  alternatives_spanish:
  - el pasar de largo
  - el pasamiento
  lexicon: HALOT
  rationale: El sustantivo es oscuro y probablemente juega con עבר. “El pasar” conserva la raíz verbal y la abstracción del término sin cargarlo con una interpretación demasiado específica.
- source_word: לֹא יִתְעַבָּר
  english_pob_choice: will not pass over
  chosen_spanish: no pasará
  alternatives_spanish:
  - no pasará de largo
  - no se apartará
  lexicon: HALOT
  rationale: La forma verbal comunica que algo no pasará de largo o no podrá evitarse. “No pasará” mantiene la brevedad y el eco léxico con “pasar”, aunque deja abierta la fuerza exacta del verbo, como en el hebreo.
- source_word: μὴ μισήσῃς ἐπίπονον ἐργασίαν
  english_pob_choice: not adopted in main text
  chosen_spanish: No odies el trabajo penoso
  alternatives_spanish:
  - No aborrezcas el trabajo fatigoso
  - No detestes la labor ardua
  lexicon: BDAG
  rationale: La tradición griega conserva una línea distinta, y su sentido directo puede expresarse claramente en español. No se adopta en el texto principal porque el hebreo sobreviviente gobierna la traducción, pero se documenta como lectura alternativa significativa.
- source_word: γεωργίαν ὑπὸ Ὑψίστου ἐκτισμένην
  english_pob_choice: not adopted in main text
  chosen_spanish: y la agricultura creada por el Altísimo
  alternatives_spanish:
  - y la labranza creada por el Altísimo
  - y el cultivo creado por el Altísimo
  lexicon: BDAG
  rationale: La mención griega de la agricultura/labranza creada por el Altísimo no tiene correlato claro en el hebreo conservado. Se registra como alternativa de tradición textual, no como parte del texto principal.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego de Sirácides
  english_pob_reading: Main text follows the surviving Hebrew witness; Greek preserved as an alternative in a footnote
  chosen_spanish_reading: El texto principal sigue el hebreo conservado; la tradición griega se preserva en nota como lectura alternativa
  alternative_spanish_readings:
  - Integrar la línea griega en el cuerpo del texto
  - Suprimir la tradición griega
  rationale: Para Sirácides, cuando hay hebreo conservado y bien atestiguado, este gobierna el texto principal. La tradición griega es textualmente relevante y no debe borrarse; se señala en nota para mantener transparencia auditiva y respeto por ambas tradiciones.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el griego paralelo como dato real y preservar honestamente la incertidumbre.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente marcada como unchanged; sin embargo, el control cruzado reporta major-issues, así que se documentó explícitamente la tensión textual hebreo/griego y se eligió una solución transparente basada en el hebreo conservado.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» para Ὑψίστου en la nota griega, coherente con el registro bíblico español.
  - Se preserva la repetición de la raíz pasar/pasará para reflejar el posible juego léxico del hebreo.
  - La redacción principal evita mezclar silenciosamente la lectura griega con el hebreo, conforme al criterio del proyecto para Sirácides.
