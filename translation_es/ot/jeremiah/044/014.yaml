    reason: lexical_alternative
  revision_rationale: 'Se corrige la excepción final para expresar con español natural y fiel el sentido de כִּי אִם פְּלֵטִים: no regresarán, salvo unos pocos que escapen. Se reubica la nota en la frase idiomática que realmente explica. También se suaviza «Así que» a «Así» para evitar una inferencia discursiva no marcada en el hebreo, manteniendo el tono solemne. No se requiere adjudicación adicional porque el problema es claro y de aplicación directa.'
