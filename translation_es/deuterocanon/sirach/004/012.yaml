translation:
  language: es
  text: Los que la aman aman la vida[a], y los que la buscan obtendrán favor de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «los que madrugan hacia ella serán llenados de alegría».'
    reason: alternative_reading
lexical_decisions:
- source_word: אֹהֲבֶיהָ / ὁ ἀγαπῶν αὐτὴν
  english_pob_choice: those who love her
  chosen_spanish: los que la aman
  alternatives_spanish:
  - quienes la aman
  - los que aman a ella
  lexicon: HALOT; LXX ἀγαπάω
  rationale: El hebreo y el griego presentan un participio sustantivado con sufijo femenino singular que se refiere a la Sabiduría. En español, «los que la aman» conserva el valor sustantivo y la referencia directa sin sonar artificial.
- source_word: חַיִּים / ζωήν
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - vida
  - la existencia
  lexicon: HALOT; LSJ
  rationale: Ambos testigos apuntan a «vida» de manera directa. En español, el artículo hace natural la frase proverbial «aman la vida» y mantiene el sentido gnómico.
- source_word: וּמְבַקְשֶׁיהָ / οἱ ὀρθρίζοντες πρὸς αὐτήν
  english_pob_choice: those who seek her
  chosen_spanish: los que la buscan
  alternatives_spanish:
  - quienes la buscan
  - los que la buscan de mañana
  lexicon: HALOT; LXX ὀρθρίζω
  rationale: El hebreo dice simplemente «los que la buscan». Aunque el griego sugiere búsqueda temprana o diligente, la revisión del POB inglés ya retiró el adverbio añadido por no estar en el hebreo; en español se conserva la lectura primaria sin intensificarla.
- source_word: יָפִיקוּ
  english_pob_choice: will obtain
  chosen_spanish: obtendrán
  alternatives_spanish:
  - alcanzarán
  - conseguirán
  lexicon: HALOT
  rationale: El verbo hebreo expresa obtener o sacar para sí. «Obtendrán» es la equivalencia más clara y sobria en español para este uso proverbial.
- source_word: רָצוֹן מֵיהֹוָה
  english_pob_choice: favor from Yahweh
  chosen_spanish: favor de Yahvé
  alternatives_spanish:
  - benevolencia de Yahvé
  - agrado de Yahvé
  lexicon: HALOT; proyecto POB
  rationale: «רָצוֹן» aquí denota favor/benevolencia divina. Se usa «Yahvé» conforme al estándar del proyecto para el Tetragrama, en lugar de ocultarlo con «SEÑOR».
theological_decisions:
- issue: Divergencia entre el hebreo y el griego en el segundo colon
  english_pob_reading: 'will obtain favor from the LORD; Greek parallel: will be filled with gladness'
  chosen_spanish_reading: obtendrán favor de Yahvé
  alternative_spanish_readings:
  - serán llenados de alegría
  - se llenarán de gozo
  rationale: El hebreo conservado en Sirácida es el testigo primario para este proyecto cuando está disponible y de alta confianza. El griego se preserva como nota alternativa porque ofrece una formulación distinta, pero no desplaza el sentido hebreo en el texto principal.
  doctrine_reference: 'PHILOSOPHY.md: prioridad al hebreo de Sirácida cuando está disponible; conservar alternativas genuinas en nota'
translation_notes:
  revision_awareness: El POB inglés revisó este versículo para eliminar «diligently» porque el hebreo solo dice «los que la buscan». La versión española sigue esa revisión y no introduce un intensificador temporal o modal adicional. También conserva la tensión textual entre el hebreo («favor de Yahvé») y el griego («ser llenados de alegría») mediante nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrama, conforme al estándar del proyecto.
  - Se traduce el participio hebreo de manera sustantivada («los que la aman / los que la buscan») para conservar el tono proverbial.
  - No se añade adverbio equivalente a «diligently» porque no está en el hebreo base.
  - «Favor» refleja רָצוֹן como benevolencia/aceptación divina, no simple cortesía humana.
