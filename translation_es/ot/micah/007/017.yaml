  text: יְלַחֲכ֤וּ עָפָר֙ כַּ/נָּחָ֔שׁ כְּ/זֹחֲלֵ֣י אֶ֔רֶץ יִרְגְּז֖וּ מִ/מִּסְגְּרֹֽתֵי/הֶ֑ם אֶל יְהוָ֤ה אֱלֹהֵ֨י/נוּ֙ יִפְחָ֔דוּ וְ/יִֽרְא֖וּ מִמֶּֽ/ךָּ־׃
base_translation:
  language: en
  yaml_path: translation/ot/micah/007/017.yaml
  text: They will lick the dust like a snake[a]; like crawling things of the earth they will come trembling out of their strongholds. To Yahweh our God they will come in dread[d][c][b], and they will fear you.
  footnotes:
  - marker: a
    text: Or 'their fortresses,' 'their enclosures,' or 'their hiding places' for 'their strongholds.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they will fear you' / 'they will stand in awe of you.' The Hebrew can express fear before God, with possible overtones of awe.
    reason: lexical_alternative
  - marker: c
    text: '''the LORD'' renders the divine name YHWH.'
    reason: alternative_reading
  - marker: d
    text: Or 'they will come in fear'.
    reason: previous_rendering
