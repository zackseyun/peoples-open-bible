translation:
  language: es
  text: Si el sacerdote ungido peca[a], trayendo culpa sobre el pueblo[b], presentará por el pecado que ha cometido un toro del ganado, sin defecto, a Yahvé como ofrenda por el pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, ‘el sumo sacerdote ungido’. El hebreo dice literalmente ‘el sacerdote ungido’.
    reason: alternative_reading
  - marker: b
    text: O, ‘para la culpa del pueblo’. La frase hebrea es compacta y puede subrayar que el pecado del sacerdote repercute en la culpa que afecta al pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּהֵן הַמָּשִׁיחַ
  english_pob_choice: the anointed priest
  chosen_spanish: el sacerdote ungido
  alternatives_spanish:
  - el sacerdote consagrado
  - el sacerdote, el ungido
  - el sumo sacerdote ungido
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente ‘el sacerdote, el ungido’. En español, ‘sacerdote ungido’ comunica de forma natural el título sin añadir ‘sumo’, que sería interpretativo. Se conserva la referencia ritual y se evita suavizar la formulación.
- source_word: יֶחֱטָא
  english_pob_choice: sins
  chosen_spanish: peca
  alternatives_spanish:
  - si peca
  - si comete pecado
  - si hubiere pecado
  lexicon: HALOT
  rationale: 'El imperfecto condicional se vierte con una condición simple y natural en español: ‘si ... peca’. Mantiene el sentido legal sin agregar modalidad innecesaria.'
- source_word: לְאַשְׁמַת הָעָם
  english_pob_choice: bringing guilt on the people
  chosen_spanish: trayendo culpa sobre el pueblo
  alternatives_spanish:
  - para la culpa del pueblo
  - resultando en culpa para el pueblo
  - haciendo recaer culpa sobre el pueblo
  lexicon: HALOT
  rationale: La construcción hebrea es compacta y expresa consecuencia. ‘Trayendo culpa sobre el pueblo’ conserva el efecto comunitario sin definir de más el mecanismo, y ‘culpa’ mantiene el campo semántico de אשׁמה.
- source_word: וְהִקְרִיב
  english_pob_choice: he shall present
  chosen_spanish: presentará
  alternatives_spanish:
  - ofrecerá
  - hará presentar
  - traerá
  lexicon: HALOT
  rationale: En contexto sacrificial, הקריב implica presentar/ofrecer una ofrenda. ‘Presentará’ es fiel y sobrio en español; evita cargar la frase con explicaciones adicionales.
- source_word: עַל חַטָּאתוֹ אֲשֶׁר חָטָא
  english_pob_choice: for the sin that he has committed
  chosen_spanish: por el pecado que ha cometido
  alternatives_spanish:
  - a causa del pecado que cometió
  - por el pecado que cometió
  - por la falta que ha cometido
  lexicon: HALOT
  rationale: Se conserva la relación entre la ofensa y la ofrenda. ‘Por el pecado que ha cometido’ refleja bien la función expiatoria y mantiene el paralelismo hebreo sin sonar forzado.
- source_word: פַּר בֶּן בָּקָר
  english_pob_choice: a bull, a son of the herd
  chosen_spanish: un toro, un hijo del ganado
  alternatives_spanish:
  - un toro, hijo del ganado
  - un becerro
  - un toro del ganado
  lexicon: HALOT
  rationale: La revisión del inglés POB optó por reflejar con más plenitud la frase hebrea. En español, ‘un toro, un hijo del ganado’ conserva esa literalidad de manera publicable, aunque resulte menos idiomática que ‘toro del ganado’. Se prioriza la transparencia hacia el hebreo.
- source_word: תָּמִים
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin tacha
  - sin defecto alguno
  lexicon: HALOT
  rationale: ‘Sin defecto’ es una equivalencia cultual clara y natural en español. Mantiene la idea sacrificial de integridad física requerida para la ofrenda.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - al Señor
  - a Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יהוה: ‘Yahvé’. La preposición ‘a’ funciona naturalmente con el verbo ‘presentará’ y conserva la dirección de la ofrenda hacia Dios.'
- source_word: לְחַטָּאת
  english_pob_choice: as a sin offering
  chosen_spanish: como ofrenda por el pecado
  alternatives_spanish:
  - como ofrenda por el pecado
  - como sacrificio por el pecado
  - como ofrenda expiatoria
  lexicon: HALOT
  rationale: ‘חַטָּאת’ puede designar la ofrenda misma. ‘Ofrenda por el pecado’ mantiene el valor cultual y evita introducir ‘expiatoria’ como glosa interpretativa no necesaria en el texto principal.
theological_decisions:
- issue: Si הַכֹּהֵן הַמָּשִׁיחַ debe entenderse como ‘sacerdote ungido’ o como ‘sumo sacerdote’
  english_pob_reading: the anointed priest
  chosen_spanish_reading: el sacerdote ungido
  alternative_spanish_readings:
  - el sumo sacerdote ungido
  - el sacerdote consagrado
  rationale: La lectura inglesa POB preserva la forma literal del hebreo. En español, ‘sacerdote ungido’ mantiene esa transparencia y evita introducir ‘sumo’, que sería una interpretación funcional no expresada por el sintagma hebreo mismo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo reflejar לְאַשְׁמַת הָעָם sin borrar la tensión comunitaria
  english_pob_reading: bringing guilt on the people
  chosen_spanish_reading: trayendo culpa sobre el pueblo
  alternative_spanish_readings:
  - para la culpa del pueblo
  - resultando en culpa para el pueblo
  - haciendo recaer culpa sobre el pueblo
  rationale: La frase hebrea señala que el pecado del sacerdote afecta corporativamente al pueblo. La opción elegida conserva esa consecuencia sin explicar más de lo que el texto dice, y mantiene la tensión teológica documentada por el POB en inglés.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que afinó פַּר בֶּן בָּקָר como ‘a bull, a son of the herd’. La traducción española refleja esa decisión con ‘un toro, un hijo del ganado’, manteniendo la transparencia literal. También se respetó la preferencia POB por ‘to Yahweh’ rendida en español como ‘a Yahvé’ según la terminología del proyecto.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para יהוה, conforme a las normas del proyecto.
  - Se mantiene ‘ofrenda por el pecado’ para לְחַטָּאת, evitando reemplazarlo por terminología eclesiástica más tradicional sin base textual.
  - Se conserva ‘culpa’ para אשׁמה y no se suaviza a ‘castigo’ ni a ‘responsabilidad’, para respetar el campo semántico del pasaje.
  - La expresión ‘un hijo del ganado’ sigue la revisión del audit trail; aunque menos idiomática, fue elegida por transparencia fuente-texto.
  - 'Las notas al pie están ancladas exactamente en el texto: [a] y [b].'
