  to: 'Entonces Joab entró en la casa del rey[a] y dijo: «Hoy has avergonzado a todos tus siervos, que hoy salvaron tu vida[b], y las vidas de tus hijos y de tus hijas, y las vidas de tus esposas y de tus concubinas».'
