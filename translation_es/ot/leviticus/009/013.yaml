translation:
  language: es
  text: Y le trajeron el holocausto[a], pieza por pieza, y la cabeza; y los quemó[b] sobre el altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en sus partes». El hebreo se refiere a las secciones cortadas del animal llevadas a Aarón por partes.
    reason: lexical_alternative
  - marker: b
    text: El verbo puede significar más específicamente «ofreció en humo» en contexto sacrificial.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - la ofrenda de ascenso
  lexicon: HALOT
  rationale: En el contexto levítico, עֹלָה es el sacrificio que se quema totalmente. En español, «holocausto» comunica ese carácter sacrificial total y mantiene la terminología cultual tradicional sin perder el sentido técnico. «Ofrenda de ascenso» es más etimológica pero menos natural en español bíblico.
- source_word: הִמְצִיאוּ אֵלָיו
  english_pob_choice: they brought ... to him
  chosen_spanish: trajeron ... hacia él
  alternatives_spanish:
  - presentaron ... a él
  - lo llevaron ... a él
  lexicon: HALOT
  rationale: El hifil de מצא aquí expresa hacer llegar algo a alguien en un marco ritual. «Trajeron ... hacia él» refleja el movimiento de acercamiento y conserva el sentido de entrega ceremonial sin forzar un calco poco natural.
- source_word: לִנְתָחֶיהָ
  english_pob_choice: piece by piece
  chosen_spanish: en sus partes
  alternatives_spanish:
  - por sus partes
  - en pedazos
  lexicon: HALOT
  rationale: La expresión hebrea indica las porciones o secciones del animal ya cortado. «En sus partes» preserva la referencia a las secciones del sacrificio y evita introducir una imagen más cruda que la requerida por el contexto.
- source_word: הָרֹאשׁ
  english_pob_choice: the head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - la cabeza del animal
  lexicon: HALOT
  rationale: Es un término anatómico directo. Se mantiene literalmente porque el texto distingue la cabeza de las demás partes del sacrificio.
- source_word: וַיַּקְטֵר
  english_pob_choice: he burned them
  chosen_spanish: él los hizo arder
  alternatives_spanish:
  - él los quemó
  - él los ofreció en humo
  lexicon: HALOT
  rationale: En contexto sacrificial, קטר implica quemar sobre el altar de modo que ascienda humo como ofrenda. «Hizo arder» conserva la acción de combustión cultual sin reducirla simplemente a quemar en sentido común.
- source_word: עַל הַמִּזְבֵּחַ
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  lexicon: HALOT
  rationale: La preposición עַל en este contexto cultual se expresa bien con «sobre». Mantiene la imagen ritual de colocación encima del altar para ser consumido por el fuego.
theological_decisions:
- issue: Término sacrificial עֹלָה
  english_pob_reading: burnt offering
  chosen_spanish_reading: holocausto
  alternative_spanish_readings:
  - ofrenda quemada
  - ofrenda de ascenso
  rationale: No se neutraliza el carácter total del sacrificio. «Holocausto» es la forma española tradicional y exacta para un sacrificio totalmente consumido por el fuego en el sistema levítico, y preserva la fuerza cultual del término.
  doctrine_reference: Levítico 1; Levítico 9:12-14
- issue: Verbo sacrificial קטר
  english_pob_reading: he burned them
  chosen_spanish_reading: él los hizo arder
  alternative_spanish_readings:
  - él los ofreció en humo
  - él los quemó
  rationale: La lectura mantiene el matiz sacrificial de ofrecer mediante combustión, no solo el acto genérico de quemar. Esto evita borrar la dimensión litúrgica del verbo en el altar.
  doctrine_reference: Levítico 1:9; Levítico 9:13
translation_notes:
  revision_awareness: La edición inglesa POB presenta una traducción estable sin revisiones aplicadas en este versículo; la versión española sigue de cerca esa lectura y conserva las dos notas léxicas sobre las partes del sacrificio y el matiz sacrificial de קטר.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino en el texto inmediato; este versículo no lo contiene.
  - «Holocausto» se emplea aquí como término técnico cultual, coherente con la tradición bíblica española y con la lectura sacrificial de עֹלָה.
  - Se mantiene la distinción entre traer las partes del sacrificio y quemarlas sobre el altar, evitando fusionar acciones distintas del rito.
