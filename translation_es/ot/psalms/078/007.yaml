translation:
  language: es
  text: para que pusieran su esperanza en Dios y no olvidaran las obras de Dios[a][b], sino que guardaran sus mandamientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su confianza» o «su seguridad».
    reason: lexical_alternative
  - marker: b
    text: O «las obras de Dios» o «los hechos de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשִׂימוּ
  english_pob_choice: so that they might set
  chosen_spanish: para que pusieran
  alternatives_spanish:
  - y pusieran
  - para que colocaran
  lexicon: HALOT
  rationale: El verbo שׂים expresa aquí la acción de poner o fijar algo. En español, el giro final de propósito natural es «para que pusieran», que conserva el valor de finalidad del contexto sin sonar forzado.
- source_word: בֵאלֹהִים
  english_pob_choice: in God
  chosen_spanish: su esperanza en Dios
  alternatives_spanish:
  - confianza en Dios
  - su confianza en Dios
  lexicon: HALOT
  rationale: La preposición ב con אֱלֹהִים marca el objeto en el que se deposita la seguridad. En español, «poner su esperanza en Dios» reproduce de forma natural esa relación de apoyo/confianza; «esperanza» sigue la decisión del POB inglés y mantiene el matiz de confianza confiada.
- source_word: כִּסְלָם
  english_pob_choice: their hope
  chosen_spanish: su esperanza
  alternatives_spanish:
  - su confianza
  - su seguridad
  lexicon: HALOT
  rationale: כֶּסֶל puede referirse a esperanza, confianza o seguridad. Se eligió «esperanza» porque encaja con la exhortación del salmo y con la construcción idiomática española «poner la esperanza en Dios», sin perder el trasfondo de confianza.
- source_word: וְלֹא יִשְׁכְּחוּ
  english_pob_choice: and not forget
  chosen_spanish: y no olvidaran
  alternatives_spanish:
  - y no olvidaran
  - sin olvidar
  lexicon: HALOT
  rationale: El imperfecto negado de שׁכח expresa aquí la finalidad o resultado deseado. En español, «y no olvidaran» mantiene la fluidez del propósito anterior y conserva el valor volitivo del texto.
- source_word: מַעַלְלֵי אֵל
  english_pob_choice: the deeds of God
  chosen_spanish: las obras de Dios
  alternatives_spanish:
  - los hechos de Dios
  - las acciones de Dios
  lexicon: HALOT
  rationale: מַעֲלָלִים designa obras, actos o hechos. «Obras» es una opción bíblica y natural en español, además de preservar el paralelismo con el siguiente miembro. Se mantiene «de Dios» para reflejar אֵל sin introducir variación innecesaria.
- source_word: וּמִצְוֺתָיו
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus mandatos
  - sus órdenes
  lexicon: HALOT
  rationale: מִצְוֹת son mandamientos o preceptos. «Mandamientos» conserva el registro bíblico y el peso pactual del término en español.
- source_word: יִנְצֹרוּ
  english_pob_choice: keep
  chosen_spanish: guardaran
  alternatives_spanish:
  - observaran
  - cumplieran
  lexicon: HALOT
  rationale: נצר puede significar guardar, vigilar o custodiar. Con un objeto como «mandamientos», «guardar» es la opción española más fiel e idiomática, y conserva la idea de observancia cuidadosa.
theological_decisions:
- issue: Renderización de אֱלֹהִים y אֵל en paralelismo poético
  english_pob_reading: Both rendered as 'God' in English
  chosen_spanish_reading: Ambos como «Dios» en el texto principal
  alternative_spanish_readings:
  - variar entre «Dios» y «el Poderoso»
  - usar «Dios» y «Dios todopoderoso»
  rationale: El verso usa dos designaciones divinas comunes en paralelismo poético. Traducir ambas como «Dios» preserva la simetría y evita introducir una distinción doctrinal o estilística que el hebreo no enfatiza aquí.
  doctrine_reference: Principio POB de primacía del original y preservación del paralelismo sin resolver tensiones innecesariamente
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso del texto hebreo y del audit trail inglés: mantiene el valor de propósito del verbo inicial, conserva el paralelismo entre «Dios» y «Dios», y reproduce las alternativas léxicas relevantes del POB inglés en notas. No se requirieron revisiones adicionales.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים y אֵל por simetría poética y claridad.
  - «Esperanza» se eligió como equivalente principal de כִּסְלָם, con nota alternativa para confianza o seguridad.
  - «Mandamientos» conserva el registro bíblico y evita un tono demasiado técnico o jurídico.
  - El orden del verso en español prioriza la naturalidad sintáctica sin alterar la relación de finalidad del hebreo.
