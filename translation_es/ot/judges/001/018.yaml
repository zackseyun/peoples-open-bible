translation:
  language: es
  text: Judá capturó Gaza y su territorio[a], Ascalón y su territorio, y Ecrón y su territorio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su frontera» en cada ocurrencia de «su territorio»; el término hebreo puede denotar un límite o el territorio delimitado por él.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְכֹּד
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - tomó
  - se apoderó de
  lexicon: HALOT
  rationale: En contexto militar, לכד indica tomar una plaza por la fuerza. «Capturó» reproduce bien esa fuerza en español sin sonar arcaico ni diluir el hecho de conquista.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - la tribu de Judá
  lexicon: HALOT
  rationale: El nombre propio funciona aquí como entidad tribal/corporativa. «Judá» conserva la concisión del hebreo; ampliar a «la tribu de Judá» añadiría interpretación no explícita.
- source_word: עַזָּה
  english_pob_choice: Gaza
  chosen_spanish: Gaza
  alternatives_spanish:
  - Gaza
  lexicon: HALOT
  rationale: Topónimo estándar en español.
- source_word: גְּבוּלָהּ
  english_pob_choice: its territory
  chosen_spanish: su territorio
  alternatives_spanish:
  - su frontera
  - su límite
  - su región
  lexicon: HALOT
  rationale: גְּבוּל puede significar frontera, límite o territorio delimitado. En una lista de ciudades conquistadas, «su territorio» comunica naturalmente la ciudad junto con su entorno controlado; además preserva la ambigüedad léxica señalada por la nota inglesa.
- source_word: אַשְׁקְלוֹן
  english_pob_choice: Ashkelon
  chosen_spanish: Ascalón
  alternatives_spanish:
  - Ashkelón
  lexicon: HALOT
  rationale: Se elige la forma española asentada «Ascalón», más legible para lectores en español, manteniendo el topónimo identificable y fiel al referente.
- source_word: עֶקְרוֹן
  english_pob_choice: Ekron
  chosen_spanish: Ecrón
  alternatives_spanish:
  - Ecron
  lexicon: HALOT
  rationale: «Ecrón» es una transliteración hispana natural y reconocible del topónimo.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa están en alto acuerdo; no se registran revisiones aplicadas en el paso inglés más reciente, así que el borrador español sigue de cerca esa solución sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de la lista con tres ciudades y sus territorios.
  - Se usa el mismo anclaje de nota para la primera ocurrencia de גְּבוּל, como en la auditoría inglesa, porque la alternativa léxica afecta a todas las ocurrencias por igual.
  - Se prefieren formas geográficas españolas habituales (Ascalón, Ecrón) para legibilidad, sin alterar la referencia original.
