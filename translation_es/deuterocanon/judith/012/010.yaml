review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: marcador temporal, banquete, restricción a los δοῦλοι, y exclusión de otros asistentes. Sin embargo, varias elecciones no siguen de manera suficientemente fiel el sentido contextual ni el propio audit trail: «en el cuarto día» suena poco natural para ἐν τῇ ἡμέρᾳ τῇ τετάρτῃ; «hizo un banquete» es menos idiomático que «dio/ofreció un banquete» para ἐποίησεν ... πότον; y sobre todo «no llamó ... al servicio» desvía el sentido de la cláusula final, donde el inglés auditado entiende que no invitó a ninguno de los que estaban ocupados en funciones o en asistencia, no que los llamó al servicio.'
  spanish_quality_summary: 'El español es comprensible, pero presenta giros algo calcados o poco naturales: «en el cuarto día», «hizo un banquete», y «estaban al servicio». La frase final queda ambigua y puede sugerir que Holofernes no convocó a nadie para servir, cuando el contexto apunta a que no invitó a ninguno de los demás asistentes/encargados. Una revisión menor mejora claridad, naturalidad y fidelidad.'
  glossary_alignment: Se alinea bien con la política de δοῦλος → «esclavos», y la nota alternativa con «siervos» es adecuada. No hay cuestiones teológicas especiales. Conviene, sin embargo, ajustar «llamó» a «invitó» en contexto de banquete, conforme al razonamiento léxico documentado, y evitar usar «servicio» como traducción de εἰς τὴν χρῆσιν/τῶν πρὸς ταῖς χρείαις cuando en español crea una lectura distinta.
  issues:
  - severity: medium
    issue: «en el cuarto día» suena poco natural en español bíblico actual
    rationale: Para ἐγένετο ἐν τῇ ἡμέρᾳ τῇ τετάρτῃ, «al cuarto día» o «en el cuarto día» no tienen la misma naturalidad; «al cuarto día» preserva el marcador temporal narrativo con mejor español.
  - severity: low
    issue: «hizo un banquete» es menos idiomático que «dio un banquete»
    rationale: Para ἐποίησεν ... πότον, el contexto social de banquete en español se expresa con mayor naturalidad mediante «dio» u «ofreció».
  - severity: high
    issue: La cláusula final «no llamó a ninguno de los que estaban al servicio» distorsiona el sentido
    rationale: El audit trail y el contexto entienden una exclusión de los demás asistentes o encargados, no una convocatoria al servicio. «No invitó a ninguno de los que estaban de servicio / en atención» representa mejor la escena.
  revised_spanish_text: Y al cuarto día, Holofernes dio un banquete para sus esclavos[a] solamente, y no invitó a ninguno de los que estaban de servicio[b].
  revised_footnotes:
  - marker: a
    text: O «siervos». El griego usa δοῦλοι, término que puede significar «esclavos» o «siervos» según el contexto; aquí se eligió «esclavos» para preservar el sentido de dependencia vinculada que sugiere el término.
    reason: lexical_alternative
  - marker: b
    text: La última cláusula probablemente se refiere a los que estaban ocupados en servicios prácticos o deberes oficiales; la expresión griega es algo idiomática.
    reason: lexical_alternative
