id: 1PE.3.18
reference: 1 Peter 3:18
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτι καὶ Χριστὸς ἅπαξ περὶ ἁμαρτιῶν ἔπαθεν, δίκαιος ὑπὲρ ἀδίκων, ἵνα ὑμᾶς προσαγάγῃ τῷ θεῷ, θανατωθεὶς μὲν σαρκὶ ζῳοποιηθεὶς δὲ πνεύματι·
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/003/018.yaml
  text: 'For Messiah also suffered once for sins, the righteous for the unrighteous, so that he might bring you to God, having been put to death in the flesh but made alive in the spirit.'
translation:
  language: ko
  text: '메시아께서도 죄들을 위하여 단번에 고난당하셨으니[a], 곧 의로운 분이 의롭지 못한 자들을 위하여 그러하셨습니다. 이는 여러분을 하나님께로 인도하시려 함이었으며, 그분은 육체로는 죽임을 당하시고 영으로는 살리심을 받으셨습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 일부 사본은 「고난당하셨다」(ἔπαθεν) 대신 「죽으셨다」(ἀπέθανεν)로 읽으나, 의미는 거의 동일하다.
    reason: textual_variant
lexical_decisions:
- source_word: ἅπαξ
  english_pob_choice: once
  chosen_korean: 단번에
  alternatives_korean:
  - 한 번에
  - 한 번으로
  lexicon: BDAG
  rationale: 「단번에」는 메시아의 고난·죽음의 결정성·종결성을 가리키는 한국 성서 전통 어휘 (히 9:26-28과 동일 어휘).
- source_word: δίκαιος ὑπὲρ ἀδίκων
  english_pob_choice: the righteous for the unrighteous
  chosen_korean: 의로운 분이 의롭지 못한 자들을 위하여
  alternatives_korean:
  - 의인이 불의한 자들을 위하여
  - 의로운 자가 불의한 자들 대신
  lexicon: BDAG
  rationale: ὑπέρ + 속격의 「위하여·대신하여」를 「위하여」로 옮긴다 (대속 함의를 닫지 않음).
- source_word: ἵνα ὑμᾶς προσαγάγῃ τῷ θεῷ
  english_pob_choice: so that he might bring you to God
  chosen_korean: 여러분을 하나님께로 인도하시려 함
  alternatives_korean:
  - 너희를 하나님께 데려가시려
  lexicon: BDAG
  rationale: προσάγω의 「인도하여 데려감」을 「인도하다」로 옮긴다. 제사장적 「드림」의 함의도 있음.
- source_word: θανατωθεὶς μὲν σαρκὶ ζῳοποιηθεὶς δὲ πνεύματι
  english_pob_choice: having been put to death in the flesh but made alive in the spirit
  chosen_korean: 육체로는 죽임을 당하시고 영으로는 살리심을 받으셨습니다
  alternatives_korean:
  - 육신으로는 죽임 당하셨으나 성령으로는 살리심을 받으셨습니다
  - 살로는 죽으셨으나 영으로는 살아나셨습니다
  lexicon: BDAG
  rationale: 「영으로/성령으로」의 모호성을 보존하기 위해 평이한 「영으로」로 옮긴다 (3:19 해석과 직결).
theological_decisions:
- issue: ζῳοποιηθεὶς πνεύματι의 「영/성령」 해석
  chosen_reading: '「영으로」 — 본문의 모호성을 보존하고 단정하지 않음'
  alternative_readings:
  - 「성령으로」 (성령의 능력으로 부활)
  - 「영적 존재로」 (그리스도의 영적 본성)
  - 「영의 영역에서」
  rationale: 본문은 σαρκὶ / πνεύματι의 여격 대조를 명시할 뿐, 어느 해석으로도 단정하지 않는다. 한국어도 모호성을 보존.
  doctrine_reference: 'DOCTRINE.md: 신학적 긴장 보존'
- issue: 3:18-22 단락 전체의 그리스도론
  chosen_reading: '본 절은 고난(고통)-죽음(육체)-살리심(영)으로 진행되며, 3:19에서 「영으로」 옥에 있는 영들에게 선포하시는 행동으로 이어진다. 어느 해석(스올 강하/노아 때 선재 그리스도/부활 후 선포)을 본문에 박지 않고, 본문이 가진 모호성을 한국어에서도 그대로 둔다.'
  alternative_readings: []
  rationale: 3:19 옵션과 직결되므로 본 절의 어휘 선택이 한쪽으로 기울지 않도록 한다.
  doctrine_reference: 'DOCTRINE.md: 본문의 모호성 보존'
