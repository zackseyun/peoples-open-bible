translation:
  language: es
  text: Yo soy Yahvé, su Dios; caminen en mis estatutos, y guarden mis ordenanzas[a] y háganlas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “mis juicios”.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El nombre del pacto יְהוָה se conserva como nombre propio en español. El POB inglés usa 'Yahweh'; en español, 'Yahvé' es la forma natural equivalente para preservar el tetragrámaton sin sustituirlo por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - vuestro Dios
  - tus dioses
  lexicon: HALOT
  rationale: En este contexto de خطاب colectivo a Israel, el sufijo de segunda persona plural se expresa de manera natural con 'su' en español de trato reverente/plural, manteniendo el sentido posesivo comunitario y el referente singular divino.
- source_word: בְּחֻקּוֹתַי
  english_pob_choice: in my statutes
  chosen_spanish: en mis estatutos
  alternatives_spanish:
  - con mis estatutos
  - según mis estatutos
  lexicon: HALOT
  rationale: 'La combinación preposicional con הלך pide una equivalencia idiomática: ''caminar en'' expresa el deber de vivir conforme a estas disposiciones. ''Estatutos'' conserva el valor jurídico-normativo de חֻקִּים.'
- source_word: לֵכוּ
  english_pob_choice: walk
  chosen_spanish: caminen
  alternatives_spanish:
  - anden
  - vayan
  lexicon: HALOT
  rationale: Aunque el inglés POB retiene 'walk' por el modismo del pacto, en español la forma verbal natural es 'caminen' para expresar la conducta continuada sin sonar arcaica. La metáfora de andar/caminar sigue implícita.
- source_word: מִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis decretos
  alternatives_spanish:
  - mis juicios
  - mis ordenanzas
  lexicon: HALOT
  rationale: מִשְׁפָּטִים puede referirse a decisiones/ordenanzas legales. Aunque el inglés POB mantiene la tensión entre 'judgments' y la nota 'ordinances', en español 'decretos' comunica bien el carácter normativo y evita una ambigüedad de 'juicios' en lectura pública. Se conserva la posibilidad alternativa en nota.
- source_word: שִׁמְרוּ
  english_pob_choice: keep
  chosen_spanish: guarden
  alternatives_spanish:
  - observen
  - conserven
  lexicon: HALOT
  rationale: שׁמר en contexto legal-covenantal se expresa de forma idiomática con 'guardar', que en español bíblico y contemporáneo comunica cumplir con fidelidad una norma.
- source_word: וַעֲשׂוּ אוֹתָם
  english_pob_choice: and do them
  chosen_spanish: y pónganlos por obra
  alternatives_spanish:
  - y háganlos
  - y practíquenlos
  lexicon: HALOT
  rationale: עָשָׂה con objeto pronominal enfatiza la ejecución efectiva. 'Pónganlos por obra' transmite mejor en español la idea de llevarlos realmente a la práctica, sin perder el énfasis de acción concreta.
- source_word: אֲנִי
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo
  - Soy yo
  lexicon: HALOT
  rationale: El pronombre independiente es enfático; 'Yo soy' refleja adecuadamente la cláusula nominal de autoidentificación divina y suena natural en español.
theological_decisions:
- issue: Forma de renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre propio del pacto sin sustituirlo por un título. 'Yahvé' es la forma establecida en el proyecto para la transliteración del tetragrámaton y mantiene la misma decisión teológica que el POB inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de מִשְׁפָּטַי entre 'juicios' y 'ordenanzas'
  english_pob_reading: my judgments; Or 'my ordinances'
  chosen_spanish_reading: 'mis decretos; nota: ''mis ordenanzas'''
  alternative_spanish_readings:
  - mis juicios
  - mis ordenanzas
  rationale: El hebreo admite un campo jurídico amplio. Para lectura pública en español, 'decretos' comunica la fuerza normativa sin inducir a entender 'juicios' como sentencias abstractas. La nota conserva la alternativa lexical que el POB inglés marcó.
  doctrine_reference: HALOT; POB lexical note on מִשְׁפָּטִים
- issue: Relación entre el mandato y la metáfora de caminar
  english_pob_reading: walk in my statutes
  chosen_spanish_reading: caminen en mis estatutos
  alternative_spanish_readings:
  - anden en mis estatutos
  rationale: Se conserva la metáfora de vida ordenada conforme al pacto. 'Caminen' mantiene la imagen bíblica sin literalismo rígido, y en español transmite adecuadamente una conducta continua y normativa.
  doctrine_reference: HALOT; covenantal idiom הלך + ב
translation_notes:
  revision_awareness: El POB inglés no requirió revisiones en su pass más reciente; el presente borrador sigue esa lectura alta de acuerdo, adaptando las decisiones léxicas al español y conservando la nota alternativa para מִשְׁפָּטַי.
  spanish_consistency_notes:
  - Se usa 'Yahvé' consistentemente para יְהוָה, conforme al estándar del proyecto en español.
  - 'Se preserva el paralelismo imperativo con tres acciones: caminar, guardar y poner por obra.'
  - '''Estatutos'' y ''decretos'' mantienen el registro jurídico-covenantal sin desplazar el sentido al lenguaje eclesiástico tradicional.'
  - La nota de 'anden' ofrece una alternativa española real para el modismo hebreo sin alterar el texto principal.
