revisions:
- from: Pero durante todo esto yo no estaba en Jerusalén[a], porque en el año treinta y dos de Artajerjes, rey de Babilonia, fui al rey, y al cabo de algunos días pedí permiso al rey[b].
  to: Pero durante todo esto yo no estaba en Jerusalén, porque en el año treinta y dos de Artajerjes, rey de Babilonia[a], fui al rey, y después de algún tiempo[b] pedí permiso al rey.
  rationale: La revisión corrige el anclaje de la nota textual para que recaiga sobre «rey de Babilonia», que es el elemento realmente explicado. También ajusta la expresión temporal principal a «después de algún tiempo», que comunica mejor el valor idiomático e indefinido de וּלְקֵץ יָמִים, dejando «al cabo de algunos días» como alternativa en nota.
