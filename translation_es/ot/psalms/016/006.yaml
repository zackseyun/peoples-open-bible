translation:
  language: es
  text: Los linderos[a] me han caído en lugares agradables; ciertamente, mi herencia[b] es hermosa para mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las líneas de medición'. La imagen hebrea es la de cuerdas o líneas que marcan la porción de una herencia asignada.
    reason: lexical_alternative
  - marker: b
    text: O 'mi heredad es agradable' o 'mi heredad es hermosa para mí'.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲבָלִים
  english_pob_choice: boundary lines
  chosen_spanish: cuerdas
  alternatives_spanish:
  - líneas
  - líneas de medición
  - cordeles
  - líneas de lindero
  lexicon: HALOT
  rationale: El hebreo puede referirse a cuerdas de medir o a las líneas resultantes del reparto de una herencia. En español, 'cuerdas' preserva la imagen concreta sin forzar un tecnicismo, y deja abierta la metáfora del reparto territorial que el contexto exige.
- source_word: נָפְלוּ
  english_pob_choice: have fallen
  chosen_spanish: me han caído
  alternatives_spanish:
  - cayeron
  - han caído
  - me fueron asignadas
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente 'caer'. Mantener 'han caído' conserva la imagen; añadir 'me' refleja el valor dativo de beneficio y suena natural en español.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: me
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: En esta construcción, el dativo expresa la porción que corresponde al hablante. 'Me han caído' transmite esa relación de beneficio de manera idiomática en español.
- source_word: בַּנְּעִמִים
  english_pob_choice: in pleasant places
  chosen_spanish: en lugares agradables
  alternatives_spanish:
  - en sitios agradables
  - en lugares placenteros
  - entre cosas agradables
  lexicon: HALOT
  rationale: El plural con preposición funciona aquí como un marco locativo. 'Lugares agradables' comunica bien la idea de sitio deleitoso o placentero sin sonar arcaico.
- source_word: אַף
  english_pob_choice: indeed
  chosen_spanish: sí
  alternatives_spanish:
  - además
  - ciertamente
  - más aún
  lexicon: HALOT
  rationale: Aquí introduce énfasis y refuerza la afirmación anterior. 'Sí' reproduce esa confirmación enfática en un español claro y breve.
- source_word: נַחֲלָת
  english_pob_choice: my inheritance
  chosen_spanish: mi herencia
  alternatives_spanish:
  - mi heredad
  - mi posesión heredada
  - mi herencia asignada
  lexicon: HALOT
  rationale: En el contexto del salmo, el término alude a la porción recibida por asignación. 'Herencia' mantiene el campo semántico de reparto y promesa, y es natural para lectores bíblicos en español.
- source_word: שָׁפְרָה
  english_pob_choice: is beautiful
  chosen_spanish: es hermosa
  alternatives_spanish:
  - es agradable
  - es bella
  - se ha vuelto hermosa
  lexicon: HALOT
  rationale: El verbo expresa belleza, agrado o lozanía. 'Hermosa' reproduce bien el juicio valorativo del hebreo con una palabra digna y clara.
- source_word: עָלַי
  english_pob_choice: to me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - sobre mí
  - a mi parecer
  lexicon: HALOT
  rationale: Aunque literalmente puede ser 'sobre mí', en este uso expresa valoración personal. 'Para mí' o 'a mi parecer' son opciones posibles; 'para mí' fluye mejor en la frase española y mantiene el enfoque subjetivo.
theological_decisions:
- issue: Mantener la metáfora concreta del reparto heredado
  english_pob_reading: Preserve the concrete inheritance/boundary-line metaphor rather than flattening it into a generalized statement about blessings.
  chosen_spanish_reading: Conservar la imagen de cuerdas/herencia y no convertirla en una mera frase general sobre bendiciones.
  alternative_spanish_readings:
  - Las bendiciones asignadas a mí son agradables; sí, mi patrimonio es hermoso.
  - La porción que recibí es agradable; sí, mi heredad es hermosa.
  rationale: El versículo retiene el lenguaje de herencia y reparto territorial. Traducirlo de forma demasiado abstracta borraría la textura covenantal y la alusión a la porción asignada por Yahvé.
  doctrine_reference: Principio de primacía del texto original; conservar la imaginería teológica sin resolverla ni diluirla.
translation_notes:
  revision_awareness: El texto base muestra alto acuerdo en la auditoría inglesa y no registra revisiones aplicadas; por eso se conserva la imagen central del reparto de herencia, adaptando solo la formulación al español natural.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en la terminología del proyecto cuando el contexto lo requiera, aunque este versículo no lo menciona explícitamente.
  - '''Herencia'' se prefirió a ''heredad'' por claridad moderna, sin perder el matiz de porción asignada.'
  - '''Hermosa'' preserva el valor estético del hebreo sin añadir connotaciones devocionales no presentes en el verso.'
