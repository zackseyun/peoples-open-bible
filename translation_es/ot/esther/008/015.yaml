translation:
  language: es
  text: Y Mardoqueo salió[a] de la presencia del rey con vestidura real de azul[b] y blanco, con una gran corona de oro[c] y un manto[d] de lino fino y púrpura; y la ciudad de Susa gritó y se alegró[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «salió de delante del rey».
    reason: lexical_alternative
  - marker: b
    text: El término hebreo para «azul» puede referirse a un tinte azul púrpura propio de la realeza.
    reason: lexical_alternative
  - marker: c
    text: O «una gran corona dorada».
    reason: lexical_alternative
  - marker: d
    text: El término traducido «manto» también puede referirse a una vestidura envolvente o una capa.
    reason: lexical_alternative
  - marker: e
    text: O «clamó y se alegró».
    reason: lexical_alternative
lexical_decisions:
- source_word: יָצָא / מִלִּפְנֵי הַמֶּלֶךְ
  english_pob_choice: went out from the presence of the king
  chosen_spanish: salió de delante del rey
  alternatives_spanish:
  - salió de la presencia del rey
  - salió de ante el rey
  - salió de la presencia del rey
  lexicon: HALOT
  rationale: El hebreo expresa movimiento desde la corte/ante el rey; «de delante del rey» conserva el valor idiomático de salida desde su presencia sin introducir un giro más abstracto que el texto no exige. Mantiene también la naturalidad del español bíblico contemporáneo.
- source_word: לְבוּשׁ מַלְכוּת
  english_pob_choice: royal clothing
  chosen_spanish: vestido real
  alternatives_spanish:
  - ropa real
  - atuendo real
  - vestidura real
  lexicon: HALOT
  rationale: El sintagma describe una prenda/atuendo asociado a la realeza. «Vestido real» comunica bien el carácter cortesano y evita sonar demasiado técnico; «vestidura real» sería más solemne, pero menos natural en español moderno.
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul púrpura
  - violeta
  - azul violáceo
  lexicon: HALOT
  rationale: La POB inglesa eligió «blue» y añadió nota sobre posible tinte azul-púrpura. En español, «azul» es la base más transparente y publica, mientras que la posible tonalidad azul-púrpura se conserva en nota como alternativa de matiz sin sobrecargar el texto principal.
- source_word: וָחוּר
  english_pob_choice: white
  chosen_spanish: blanco
  alternatives_spanish:
  - blanco brillante
  - blanquísimo
  lexicon: HALOT
  rationale: El término contrasta con el color anterior y designa blancura. «Blanco» reproduce ese contraste con claridad y sin intensificar innecesariamente el adjetivo.
- source_word: עֲטֶרֶת זָהָב גְּדוֹלָה
  english_pob_choice: a large crown of gold
  chosen_spanish: una gran corona de oro
  alternatives_spanish:
  - una corona grande de oro
  - una gran corona dorada
  - una corona de oro muy grande
  lexicon: HALOT
  rationale: El orden español más natural es «gran corona de oro». Conserva el tamaño destacado y el material, sin forzar un adjetivo como «dorada» que podría diluir la referencia al metal.
- source_word: תַכְרִיךְ
  english_pob_choice: a robe
  chosen_spanish: un manto
  alternatives_spanish:
  - un robe
  - una capa
  - un envoltorio/vestidura
  lexicon: HALOT
  rationale: El término puede referir a una prenda de envolver o manto. Dado el contexto ceremonial y la POB inglesa, «manto» expresa mejor una prenda exterior digna y mantiene abierta la alternativa de un atuendo envolvente. La versión principal evita «robe», que no es español natural.
- source_word: בּוּץ
  english_pob_choice: fine linen
  chosen_spanish: de lino fino
  alternatives_spanish:
  - de lino
  - de byssus
  lexicon: HALOT
  rationale: La calidad de la tela es importante aquí. «Lino fino» reproduce la distinción de lujo y mantiene la asociación con un tejido refinado.
- source_word: אַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - púrpura real
  - tela púrpura
  lexicon: HALOT
  rationale: «Púrpura» preserva el valor de estatus y color de prestigio del hebreo. Aunque «morado» es posible en español común, «púrpura» mantiene mejor la resonancia regia del término.
- source_word: הָעִיר שׁוּשָׁן
  english_pob_choice: the city of Susa
  chosen_spanish: la ciudad de Susa
  alternatives_spanish:
  - Susa, la ciudad
  - la ciudad, Susa
  lexicon: HALOT
  rationale: Es una identificación geográfica directa. «La ciudad de Susa» es natural y clara, sin alterar la referencia histórica.
- source_word: צָהֲלָה
  english_pob_choice: shouted
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - exultó
  - alzò la voz
  lexicon: HALOT
  rationale: La POB distingue esta acción audible de «se alegró». «Gritó» conserva el componente vocal y público; en español, «clamó» sería más solemne pero menos directo.
- source_word: וְשָׂמֵחָה
  english_pob_choice: rejoiced
  chosen_spanish: se alegró
  alternatives_spanish:
  - se regocijó
  - se llenó de alegría
  - gozó
  lexicon: HALOT
  rationale: El hebreo añade una segunda respuesta afectiva distinta del grito. «Se alegró» mantiene esa distinción en español sin intensificarla más allá de lo que el texto ofrece; «se regocijó» sería más elevado, pero menos simple.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de WLC y la decisión exegética auditada de la POB inglesa. Se conservan las dos acciones finales como verbos distintos («gritó» y «se alegró») y se mantiene la nota sobre el posible matiz azul-púrpura del color hebreo, sin desplazar la lectura principal al español.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - Se mantiene «Mardoqueo» en español en la forma tradicional ya establecida para el personaje, coherente con el uso bíblico habitual en español.
  - «Púrpura» se conserva como término de color/regio, no como referencia moral o litúrgica.
  - La puntuación coordina las prendas como una sola descripción larga, siguiendo el hebreo y la cadencia de la POB inglesa.
