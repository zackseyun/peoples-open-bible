translation:
  language: es
  text: 'Y Simeí dijo mientras lo maldecía: «¡Sal, sal, hombre sanguinario[a] y hombre despreciable[b]! »'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hombre de sangre» / «hombre sangriento». El hebreo usa literalmente «sangres» como modismo para culpa de sangre o derramamiento de sangre.
    reason: lexical_alternative
  - marker: b
    text: O «hombre vil». El hebreo «hombre de belial» funciona aquí como un insulto para una persona despreciable o ruin, no necesariamente como el nombre propio «Belial».
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/כֹה
  english_pob_choice: And ... as follows
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Y así dijo
  - Y esto dijo
  lexicon: HALOT
  rationale: En español, la fuerza introductoria de וְכֹה queda bien servida por la conexión narrativa simple «Y ... dijo», porque la cita inmediata ya desarrolla el contenido del discurso sin necesidad de un adverbio enfático pesado.
- source_word: אָמַר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - declaró
  lexicon: HALOT
  rationale: Es el verbo narrativo natural para introducir habla directa y conserva con claridad el valor de reporte.
- source_word: שִׁמְעִי
  english_pob_choice: Shimei
  chosen_spanish: Simeí
  alternatives_spanish:
  - Simei
  - Simey
  lexicon: transliteration
  rationale: Se translitera el nombre propio con una forma castellana legible. «Simeí» mantiene la referencia al hebreo ושמעי y evita una grafía demasiado anglicada.
- source_word: בְּ/קַֽלְל֑/וֹ
  english_pob_choice: as he cursed him
  chosen_spanish: mientras lo maldecía
  alternatives_spanish:
  - mientras lo maldecía
  - al maldecirlo
  - mientras lo insultaba
  lexicon: HALOT
  rationale: La preposición + infinitivo expresa acción simultánea. «Mientras lo maldecía» reproduce esa simultaneidad de forma natural en español y preserva el objeto pronominal referido a David.
- source_word: צֵ֥א צֵ֛א
  english_pob_choice: Get out, get out
  chosen_spanish: ¡Sal, sal!
  alternatives_spanish:
  - ¡Fuera, fuera!
  - ¡Vete, vete!
  - ¡Sal de aquí, sal de aquí!
  lexicon: HALOT
  rationale: El imperativo repetido intensifica la expulsión. «¡Sal, sal!» conserva la repetición y la brusquedad del hebreo sin introducir matices extra.
- source_word: אִ֥ישׁ הַ/דָּמִ֖ים
  english_pob_choice: man of bloodshed
  chosen_spanish: hombre sanguinario
  alternatives_spanish:
  - hombre de sangre derramada
  - hombre de sangre
  - hombre culpable de sangre
  lexicon: HALOT
  rationale: El hebreo plural idiomático «sangres» apunta a culpa por derramamiento de sangre. «Sanguinario» comunica la carga acusatoria en una expresión española natural, aunque también admite la alternativa más literal en nota.
- source_word: וְ/אִ֥ישׁ הַ/בְּלִיָּֽעַל
  english_pob_choice: and worthless man
  chosen_spanish: y hombre indigno
  alternatives_spanish:
  - y hombre inútil
  - y hombre perverso
  - y hombre vil
  lexicon: HALOT
  rationale: בְּלִיַּעַל funciona aquí como insulto de bajeza moral y de desprecio, no como nombre propio. «Indigno» comunica esa descalificación moral de forma sobria y comprensible en español.
theological_decisions:
- issue: Sentido de בְּלִיַּעַל
  english_pob_reading: 'common-noun insult: ''worthless man'''
  chosen_spanish_reading: 'insulto común: ''hombre indigno'''
  alternative_spanish_readings:
  - '''hombre vil'''
  - '''hombre perverso'''
  - '''hombre de Belial'''
  rationale: La evidencia léxica del hebreo en este contexto favorece un insulto común de desprecio moral, no un nombre propio demonológico. Por eso se evita «Belial» en el cuerpo del texto y se conserva el valor denigratorio sin importar asociaciones posteriores.
  doctrine_reference: Principio de primacía de la fuente original y cautela ante desarrollos terminológicos posteriores; cf. uso idiomático veterotestamentario de בְּלִיַּעַל.
translation_notes:
  revision_awareness: El borrador en inglés fue ajustado para eliminar una coma antes de la última expresión y dejar un par de insultos coordinados. La versión española sigue esa misma coordinación sin añadir pausas que separen indebidamente los dos miembros.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y contemporáneo, evitando arcaísmos innecesarios.
  - «Yahvé» no aparece porque este versículo no contiene el tetragrámaton ni una cita directa de él.
  - Se conserva la repetición imperativa y la coordinación final sin sobreexplicar el insulto.
  - La transliteración «Simeí» busca consistencia española y lectura fluida, aunque otras grafías son posibles.
