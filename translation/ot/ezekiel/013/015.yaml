theological_decisions:
- issue: Metaphorical force of the wall and whitewash imagery
  chosen_reading: Retain the concrete image of a wall and whitewash without explicating the metaphor in the main text.
  alternative_readings:
  - Interpretively expand to expose false prophets and their deceptive assurances directly in the verse
  rationale: The broader context identifies the wall and whitewash with false prophetic deception, but this verse itself states the judgment in image form. Preserving the metaphor avoids importing explanatory material not explicit in the verse while allowing the context to interpret it.
  doctrine_reference: Translation philosophy §1, §3
