translation:
  language: es
  text: Cuando Moisés vio que el pueblo estaba sin freno, porque Aarón lo había dejado sin freno[a], para escarnio[b] entre los que se levantaban contra ellos[c]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desenfrenado» / «lo había desenfrenado». El hebreo repite la misma raíz para la condición del pueblo y la acción de Aarón.
    reason: lexical_alternative
  - marker: b
    text: O «para la burla» o «para el desprecio».
    reason: lexical_alternative
  - marker: c
    text: O «sus adversarios» o «ante sus enemigos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: When Moses saw
  chosen_spanish: Cuando Moisés vio
  alternatives_spanish:
  - Y Moisés vio
  - Moisés vio
  lexicon: HALOT
  rationale: El waw consecutivo introduce el avance narrativo; «Cuando» enlaza con naturalidad la acción siguiente en español y conserva el valor temporal.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: En este contexto israelita, «el pueblo» / «el pueblo de Israel» es la forma más natural y fiel para el colectivo reunido en el campamento.
- source_word: כִּי פָרֻעַ הוּא
  english_pob_choice: that the people were out of control
  chosen_spanish: que el pueblo estaba desenfrenado
  alternatives_spanish:
  - que el pueblo estaba sin freno
  - que el pueblo estaba descontrolado
  - que el pueblo estaba suelto
  lexicon: HALOT
  rationale: La raíz פרע transmite la idea de soltarse o quedar sin restricción. «Desenfrenado» comunica bien esa pérdida de control en español sin añadir un juicio más específico que el texto no exige.
- source_word: כִּי פְרָעֹה אַהֲרֹן
  english_pob_choice: for Aaron had let them get out of control
  chosen_spanish: porque Aarón lo había desenfrenado
  alternatives_spanish:
  - porque Aarón los había dejado sin freno
  - porque Aarón los había soltado
  - porque Aarón los había descontrolado
  lexicon: HALOT
  rationale: Se mantiene el juego de palabras de la misma raíz en la forma pasiva/adjetival y verbal. El singular «lo» refleja al pueblo como colectivo; la forma verbal en español conserva la acusación causal sin sobreexplicar la intención de Aarón.
- source_word: לְשִׁמְצָה
  english_pob_choice: for derision
  chosen_spanish: para la burla
  alternatives_spanish:
  - para la irrisión
  - para el escarnio
  - para la mofa
  lexicon: HALOT
  rationale: שִׁמְצָה designa objeto de desprecio o burla. «Burla» es claro y publicable en español; las alternativas mantienen el matiz de desprecio si se quisiera una formulación más fuerte.
- source_word: בְּקָמֵי/הֶם
  english_pob_choice: among those who rose against them
  chosen_spanish: de sus adversarios
  alternatives_spanish:
  - entre los que se levantaban contra ellos
  - ante sus opositores
  - en presencia de quienes se levantaban contra ellos
  lexicon: HALOT
  rationale: La frase apunta a quienes se levantan contra Israel. «Adversarios» resume el sentido participial con fluidez española; la alternativa más literal queda registrada para preservar la imagen verbal.
theological_decisions:
- issue: 'Valor de פרע: desorden / falta de freno sin precisión sexual o de desnudez'
  english_pob_reading: Rendered as 'out of control' rather than a more specific moral term such as 'naked' or 'debauched.'
  chosen_spanish_reading: «desenfrenado» como pérdida de control colectivo
  alternative_spanish_readings:
  - sin freno
  - descontrolado
  - desatado
  rationale: El contexto inmediato habla del estado del pueblo y de la acción de Aarón, no de desnudez literal ni de inmoralidad sexual explícita. «Desenfrenado» conserva la tensión semántica de la raíz y evita estrechar indebidamente el sentido.
  doctrine_reference: Principio de primacía del texto original y de no sobreespecificar lo que el hebreo no determina con claridad.
- issue: Relación causal y juego de palabras entre el estado del pueblo y la acción de Aarón
  english_pob_reading: The translation preserves the causal explanation and the wordplay by repeating 'out of control.'
  chosen_spanish_reading: Repetición de «desenfrenado» / «desenfrenado»
  alternative_spanish_readings:
  - sin freno / sin freno
  - descontrolado / descontrolado
  rationale: La repetición en español conserva el paralelismo y la carga retórica del hebreo. Se evita suavizar la culpa de Aarón, pero también se evita atribuirle una intención no expresada por el texto.
  doctrine_reference: Poética bíblica y fidelidad retórica al original.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que prefirió una expresión más directa para לְשִׁמְצָה («for derision») y mantuvo la repetición de la misma raíz para פָרֻעַ / פְרָעֹה. La formulación española conserva esa repetición con «desenfrenado» para ambos miembros y ajusta la segunda cola a una expresión natural y publicable.
  spanish_consistency_notes:
  - Se mantiene Yahvé en otros contextos, pero aquí no aparece el tetragrámaton.
  - «Desenfrenado» se usa de forma consistente para la raíz פרע en sus dos ocurrencias dentro del verso.
  - Se evita «SEÑOR» o «Cristo» porque no corresponden al hebreo de este versículo.
  - «Burla» traduce el valor de desprecio de שִׁמְצָה sin introducir un registro demasiado arcaico.
