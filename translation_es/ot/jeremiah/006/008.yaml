    issue: La elección principal «Recibe corrección» no coincide bien con la opción principal auditada «Be warned».
    rationale: Aunque el hebreo permite corrección/disciplina, el POB documentó como preferida una advertencia admonitoria; en español conviene reflejarla en el texto principal y dejar «Recibe corrección» como alternativa de nota.
  - severity: low
    issue: La nota [a] no incluye una alternativa equivalente a la elección principal inglesa.
    rationale: Si el texto principal pasa a «Sé amonestada», la nota debe conservar «Recibe corrección / Sé instruida / Acepta disciplina» para reflejar el abanico semántico documentado.
  - severity: low
    issue: «Te haga una desolación» es gramatical pero algo poco idiomático.
    rationale: «Te convierta en desolación» preserva mejor el sustantivo שְׁמָמָה y suena más natural en español general.
  revised_spanish_text: «Sé amonestada[a], oh Jerusalén, no sea que mi alma se aparte de ti, no sea que te convierta en desolación, una tierra sin habitantes.»
