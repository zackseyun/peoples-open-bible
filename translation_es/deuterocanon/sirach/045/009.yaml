translation:
  language: es
  text: y granadas en abundancia por todo alrededor[a], para producir melodía a sus pasos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego ofrece una lectura más amplia: ‘y lo rodeó con granadas, con muchas campanillas de oro alrededor, para hacer oír un sonido en sus pasos ...’. El testimonio hebreo aquí es más breve y menciona solo las granadas y el sonido en sus pasos.'
    reason: textual_variant
lexical_decisions:
- source_word: ורמונים
  english_pob_choice: and pomegranates
  chosen_spanish: y granadas
  alternatives_spanish:
  - y adornos de granada
  - y granadas ornamentales
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘granadas’. Como en el contexto se trata del adorno sacerdotal, mantengo el sustantivo concreto sin explicarlo en exceso dentro del texto principal.
- source_word: המון
  english_pob_choice: in abundance
  chosen_spanish: en abundancia
  alternatives_spanish:
  - en multitud
  - muchas
  lexicon: HALOT
  rationale: המון expresa multiplicidad o abundancia. ‘En abundancia’ suena natural en español y conserva la cantidad copiosa del hebreo.
- source_word: סביב
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - alrededor
  - en derredor
  lexicon: HALOT
  rationale: La idea es de disposición envolvente. ‘Todo alrededor’ es idiomático y refleja bien el valor espacial.
- source_word: לתת
  english_pob_choice: to make
  chosen_spanish: para producir
  alternatives_spanish:
  - para hacer
  - para dar
  lexicon: HALOT
  rationale: 'El infinitivo expresa propósito o resultado: el adorno está para producir un sonido. ‘Producir’ comunica ese efecto de manera clara en español.'
- source_word: נעינה
  english_pob_choice: melody
  chosen_spanish: melodía
  alternatives_spanish:
  - sonido
  - música
  - sonido agradable
  lexicon: HALOT
  rationale: נעינה sugiere un sonido musical. ‘Melodía’ conserva el matiz sonoro agradable sin importar al texto principal la expansión griega de campanillas.
- source_word: בצעדיו
  english_pob_choice: at his steps
  chosen_spanish: al andar de sus pasos
  alternatives_spanish:
  - en sus pasos
  - con sus pasos
  - a sus pasos
  lexicon: HALOT
  rationale: La preposición indica acompañamiento al movimiento. ‘Al andar de sus pasos’ expresa el vínculo entre caminar y el sonido producido.
theological_decisions:
- issue: Prioridad del testimonio hebreo con la expansión griega preservada como trasfondo textual
  english_pob_reading: The main text follows the surviving Hebrew wording while the Greek fuller reading is preserved in a footnote.
  chosen_spanish_reading: El texto principal sigue el hebreo conservado; la lectura griega más amplia queda reconocida en la nota.
  alternative_spanish_readings:
  - Integrar en el texto principal las campanillas de oro y el sonido audible del templo
  - Reducir la línea a solo granadas y sonido sin mencionar la variación textual
  rationale: En este versículo el hebreo conservado es más breve que el griego. Para mantener honestidad textual, el cuerpo principal sigue el hebreo y la nota registra la expansión griega y su referencia al templo.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el testimonio conservado y preservar honestamente las variantes textuales.'
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del inglés: mantener el orden natural ‘granadas en abundancia, todo alrededor’ y conservar el sentido de producir melodía al andar de sus pasos, sin importar la expansión griega al cuerpo principal.'
  spanish_consistency_notes:
  - Se prefirió ‘granadas’ en lugar de una paráfrasis ornamental, porque el hebreo conserva el sustantivo concreto.
  - Se evitó ‘campanas’ en el texto principal para no fusionar la expansión griega con el testimonio hebreo; esa información se reservó para la nota.
  - ‘Melodía’ mantiene un registro digno y litúrgicamente legible en español moderno.
