translation:
  language: es
  text: Y he aquí, un hombre de Dios vino de Judá a Betel por la palabra de Yahvé[a], mientras Jeroboam estaba de pie junto al altar[b] para quemar incienso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «según la palabra de Yahvé» o «a la palabra de Yahvé». La preposición hebrea puede expresar medio, autoridad o conformidad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y Jeroboam estaba de pie al altar». La conjunción hebrea también puede leerse simplemente como «y», y la expresión espacial puede traducirse «al altar» en lugar de «junto al altar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y entonces he aquí
  lexicon: HALOT
  rationale: Mantiene la fuerza discursiva de introducción y llamada de atención de הִנֵּה. «He aquí» conserva el tono vivo y algo elevado del hebreo sin sonar artificial en español.
- source_word: אִישׁ אֱלֹהִים
  english_pob_choice: a man of God
  chosen_spanish: un hombre de Dios
  alternatives_spanish:
  - un profeta
  - un mensajero de Dios
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente «hombre de Dios». «Profeta» sería una interpretación posible, pero el texto base no lo explicita; por eso se conserva la expresión más directa.
- source_word: בָּא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  lexicon: HALOT
  rationale: «Vino» reproduce con naturalidad el verbo de movimiento narrativo y funciona bien con el complemento de procedencia.
- source_word: מִיהוּדָה
  english_pob_choice: from Judah
  chosen_spanish: de Judá
  alternatives_spanish:
  - desde Judá
  lexicon: HALOT
  rationale: La preposición expresa origen geográfico; «de Judá» es la forma más natural en español y conserva el sentido de procedencia.
- source_word: בִּדְבַר יְהוָה
  english_pob_choice: by the word of Yahweh
  chosen_spanish: por la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - a la palabra de Yahvé
  lexicon: HALOT
  rationale: La preposición בְּ aquí puede expresar medio/causa o comisión. «Por la palabra de Yahvé» comunica bien que su venida ocurrió bajo la comisión y autoridad de la palabra divina. Se conserva «Yahvé» según el criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, evitando el ocultamiento del Tetragrámaton y manteniendo la forma auditada «Yahvé».
- source_word: אֶל בֵּית אֵל
  english_pob_choice: to Bethel
  chosen_spanish: a Betel
  alternatives_spanish:
  - hacia Betel
  lexicon: HALOT
  rationale: La preposición de dirección se refleja de manera natural con «a». «Betel» es la forma castellana estable del topónimo.
- source_word: עֹמֵד
  english_pob_choice: was standing
  chosen_spanish: estaba de pie
  alternatives_spanish:
  - estaba parado
  - permanecía en pie
  lexicon: HALOT
  rationale: El participio presenta una acción en curso. «Estaba de pie» expresa bien la postura física sin añadir matices interpretativos.
- source_word: עַל הַמִּזְבֵּחַ
  english_pob_choice: by the altar
  chosen_spanish: junto al altar
  alternatives_spanish:
  - al lado del altar
  - ante el altar
  lexicon: HALOT
  rationale: Aunque עַל puede significar «sobre», en este contexto ritual y con עמד la relación espacial natural es proximidad. «Junto al altar» evita una imagen innecesariamente literal de estar encima del altar.
- source_word: לְהַקְטִיר
  english_pob_choice: to burn incense
  chosen_spanish: para quemar incienso
  alternatives_spanish:
  - para ofrecer incienso
  - para hacer humo
  lexicon: HALOT
  rationale: En este contexto cultual el verbo alude a hacer subir humo de incienso. «Quemar incienso» es una equivalencia clara y precisa en español bíblico.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio del pacto tal como lo exige la política del proyecto y como refleja el original hebreo, en lugar de sustituirlo por una máscara tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza de אִישׁ אֱלֹהִים
  english_pob_reading: a man of God
  chosen_spanish_reading: un hombre de Dios
  alternative_spanish_readings:
  - un profeta
  rationale: La traducción mantiene la expresión del hebreo sin convertirla en una categoría interpretativa más específica de lo que el texto dice explícitamente.
  doctrine_reference: HALOT / uso bíblico del sintagma אִישׁ אֱלֹהִים
- issue: Sentido de בִּדְבַר יְהוָה
  english_pob_reading: by the word of Yahweh
  chosen_spanish_reading: por la palabra de Yahvé
  alternative_spanish_readings:
  - según la palabra de Yahvé
  - a la palabra de Yahvé
  rationale: La frase admite matiz de medio, comisión o conformidad. «Por la palabra de Yahvé» conserva esa tensión sin fijarla indebidamente en una sola glosa.
  doctrine_reference: HALOT — בְּ + דָּבָר en contexto de comisión profética
translation_notes:
  revision_awareness: El control cruzado del inglés POB reporta alta concordancia y no registra cambios posteriores relevantes; por ello la redacción española sigue de cerca las decisiones auditadas, conservando las tensiones semánticas principales sin añadir explicaciones al cuerpo del versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «hombre de Dios» en vez de «profeta» para no sobreinterpretar el sintagma hebreo.
  - «Junto al altar» refleja la relación espacial contextual de עַל con עמד en este pasaje.
  - «Quemar incienso» preserva el sentido cultual del verbo en este contexto.
