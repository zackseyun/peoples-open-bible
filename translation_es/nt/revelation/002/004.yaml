translation:
  language: es
  text: 'Pero tengo algo contra ti: has abandonado tu primer amor[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «has dejado tu primer amor». La frase puede referirse al amor que tenías al principio, ya fuera hacia el Señor, hacia los hermanos o a ambos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  lexicon: BDAG
  rationale: Marca un contraste fuerte con la alabanza anterior; en español, «pero» transmite de manera natural esa oposición adversativa sin sonar forzado.
- source_word: ἔχω κατὰ σοῦ
  english_pob_choice: I have this against you
  chosen_spanish: tengo algo contra ti
  alternatives_spanish:
  - tengo esto contra ti
  - tengo una acusación contra ti
  lexicon: BDAG
  rationale: La expresión griega es idiomática y de tono reprobatorio/judicial. «Tengo algo contra ti» conserva el sentido de reprensión con español natural; «tengo esto contra ti» sería más literal, pero menos idiomático.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor cristiano
  - afecto
  lexicon: BDAG
  rationale: ἀγάπη se traduce normalmente «amor». Aquí no hay razón fuente para especificar el objeto del amor en el texto principal.
- source_word: τὴν πρώτην
  english_pob_choice: first
  chosen_spanish: primer
  alternatives_spanish:
  - primero
  - anterior
  - antiguo
  lexicon: BDAG
  rationale: «Primer» sigue de cerca la forma griega y suena natural en español delante de «amor». Se evita «anterior» o «antiguo» porque ya interpretan más de lo que el griego explicita.
- source_word: ἀφῆκες
  english_pob_choice: have abandoned
  chosen_spanish: has abandonado
  alternatives_spanish:
  - has dejado
  - has desamparado
  - has dejado atrás
  lexicon: BDAG
  rationale: El aoristo de ἀφίημι aquí expresa dejar atrás/abandonar. «Has abandonado» comunica mejor la fuerza de la reprensión que «has dejado».
theological_decisions:
- issue: Sentido de «tu primer amor»
  english_pob_reading: Rendered literally as 'your first love' without specifying whether it refers primarily to love for Christ, love for fellow believers, or both.
  chosen_spanish_reading: Se mantiene «tu primer amor» sin precisar el referente.
  alternative_spanish_readings:
  - tu amor primero
  - el amor que tuviste al principio
  - tu amor por mí al principio
  rationale: El griego es breve y deja abierta la referencia. La traducción conserva esa tensión teológica sin resolverla prematuramente.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de auditoría es alto y coincide con la lectura propuesta.
  spanish_consistency_notes:
  - Se usa «amor» para ἀγάπη conforme al valor estándar del término y al criterio del proyecto.
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino ni una cita directa del Tetragrámaton.
  - La nota al pie conserva la ambigüedad deliberada del original sobre el referente de «tu primer amor».
