    issue: La nota b está mal formulada
    rationale: Dice «O “su templo” para “su templo”», lo cual no comunica la alternativa del inglés ni la razón gramatical del pronombre femenino griego. Debe explicarse como alternativa de referencia («el templo de ella/de la ciudad» frente a «su templo»).
  revised_spanish_text: y tomó sus despojos[a], y quemó el templo de Dagón y su templo[b] con fuego. Y los que habían caído a espada
  revised_footnotes:
  - marker: a
    text: El fragmento griego conservado para este versículo parece incompleto tanto al comienzo como al final. Por eso la traducción sigue solo el texto transmitido aquí, y la última cláusula queda cortada después de «los que habían caído a espada».
    reason: textual_variant
  - marker: b
    text: O «el templo de ella»; el griego usa un pronombre femenino, probablemente referido a un antecedente femenino como la ciudad.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, pero se corrige la nota b para que refleje fielmente la alternativa léxica documentada y explique el pronombre femenino del griego sin producir una nota vacía o redundante.
