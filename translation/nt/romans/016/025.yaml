critical_text_note: First verse of the closing doxology (Romans 16:25–27). The doxology
  appears in different positions across manuscripts — after 14:23 (L, Ψ, the Majority
  Text); after 15:33 (p46); at the end of 16 (א, B, C, D, the Latin tradition); both
  at 14:23 and at the end of 16 (A, P, 33, 104); or omitted entirely (F, G, 629).
  Most modern critical editions place it at 16:25–27. Authenticity contested in 19th-century
  scholarship; widely retained in modern translations as Pauline.
