  - marker: a
    text: O 'invocando a Dios y con oraciones'. El griego dice 'con invocación', sin expresar en esta cláusula el objeto de la invocación.
    reason: lexical_alternative
  - marker: b
    text: O 'votos', porque εὐχῶν también puede significar 'votos' según el contexto.
    reason: lexical_alternative
