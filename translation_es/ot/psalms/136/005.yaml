translation:
  language: es
  text: Al que hizo los cielos con entendimiento[a], porque su amor fiel[b] permanece para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Al que hace los cielos por entendimiento». El participio hebreo puede expresarse de manera más literal, y la preposición בְּ también puede entenderse como «por» en vez de «con».'
    reason: lexical_alternative
  - marker: b
    text: «Amor fiel» traduce aquí el hebreo חֶסֶד (chesed), término que también puede verterse «amor leal», «bondad constante» o «misericordia», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֹשֵׂה
  english_pob_choice: To him who made
  chosen_spanish: Al que hizo
  alternatives_spanish:
  - Al que hace
  - Al que está haciendo
  - Al que hizo
  lexicon: HALOT
  rationale: 'El participio con לְ en esta serie litúrgica funciona como fórmula de atribución: «al que...». En español, «al que hizo» comunica naturalmente la referencia a la acción creadora de Dios en un tono adecuado al salmo, sin perder el valor relativo del participio. «Al que hace» quedaría más literal, pero sonaría menos natural en este contexto retrospectivo.'
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: שָׁמַיִם en contextos de creación y alabanza suele conservar su plural amplio. «Los cielos» mantiene el registro poético y la amplitud cosmológica mejor que «el cielo».
- source_word: בִּתְבוּנָה
  english_pob_choice: with understanding
  chosen_spanish: con entendimiento
  alternatives_spanish:
  - por entendimiento
  - con sabiduría
  - con discernimiento
  lexicon: HALOT
  rationale: תְּבוּנָה expresa entendimiento, inteligencia o discernimiento. «Con entendimiento» reproduce bien el valor instrumental o modal de בְּ y evita confundir el término con חָכְמָה («sabiduría»).
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  - para siempre
  lexicon: HALOT
  rationale: Hebreo literalmente «para siempre». En español el refrán de este salmo queda más fiel y más fluido si se expresa con la fórmula habitual «para siempre», dejando que el verbo copulativo implícito sostenga la idea de permanencia.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su misericordia
  alternatives_spanish:
  - su amor fiel
  - su lealtad amorosa
  - su misericordia
  lexicon: HALOT
  rationale: חֶסֶד tiene un campo semántico amplio que incluye amor leal, misericordia y fidelidad pactal. En español, «misericordia» es la opción más reconocible y tradicional para un refrán litúrgico breve, aunque no agota toda la riqueza del término; por eso se conserva la tensión semántica en las notas.
theological_decisions:
- issue: Cómo expresar חֶסֶד en el refrán de Salmo 136
  english_pob_reading: his steadfast love endures forever
  chosen_spanish_reading: porque para siempre es su misericordia
  alternative_spanish_readings:
  - porque su amor fiel permanece para siempre
  - porque para siempre es su lealtad amorosa
  - porque para siempre es su misericordia
  rationale: El hebreo presenta el refrán como afirmación de permanencia de חֶסֶד. La formulación española elegida mantiene la concisión litúrgica y la idea de duración eterna. Se reconoce, sin embargo, que «misericordia» no agota el matiz de amor pactal y fidelidad, por lo que se documentan alternativas.
  doctrine_reference: Translation philosophy §6; consistency of key terms §5
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo WLC y con el audit trail inglés; no se registran revisiones textuales aplicadas en la fuente de referencia. Se conserva el paralelismo litúrgico del salmo y la tensión semántica de חֶסֶד mediante nota léxica, sin introducir expansiones no sustentadas.
  spanish_consistency_notes:
  - Se mantiene «cielos» en plural para el hebreo שָׁמַיִם.
  - Se traduce לְעוֹלָם con la fórmula breve «para siempre», coherente con el refrán del Salmo 136.
  - Se evita reemplazar חֶסֶד por un término doctrinalmente estrecho; la nota explica la amplitud semántica.
  - La frase inicial «Al que» preserva el carácter de ascripción litúrgica del participio hebreo con לְ.
