translation:
  language: es
  text: Esto es lo que Moisés repartió como herencia[a] en las llanuras de Moab, al otro lado del Jordán[b], al oriente de Jericó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "dio como herencia" o "asignó como herencia". El verbo hebreo enfatiza la distribución de la tierra como posesión heredada.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "más allá del Jordán". La expresión hebrea es una fórmula geográfica estándar cuya redacción exacta puede variar según la perspectiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estos
  lexicon: HALOT
  rationale: El demostrativo plural introduce un resumen de lista; en español, 'Estos son' conserva la fuerza deíctica y suena natural en una oración de identificación.
- source_word: אֲשֶׁר
  english_pob_choice: what
  chosen_spanish: que
  alternatives_spanish:
  - cuales
  - los que
  lexicon: HALOT
  rationale: Después de un demostrativo, 'que' introduce de forma natural la cláusula relativa sin añadir matiz ajeno al hebreo.
- source_word: נִחַל
  english_pob_choice: apportioned as an inheritance
  chosen_spanish: asignó como herencia
  alternatives_spanish:
  - dio como herencia
  - distribuyó como herencia
  - causó a heredar
  lexicon: HALOT
  rationale: El verbo causativo en contextos de reparto de tierra enfatiza la distribución de una posesión heredada. 'Asignó como herencia' conserva esa idea sin sonar forzado en español.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: Nombre propio estándar
  rationale: Forma habitual en español bíblico y readable para el público general.
- source_word: בְּעַרְבוֹת
  english_pob_choice: in the plains
  chosen_spanish: en las llanuras
  alternatives_spanish:
  - en las llanuras áridas
  - en la estepa
  lexicon: HALOT
  rationale: '''עֲרָבוֹת'' designa la región de llanuras/estepa; ''llanuras'' es la opción más clara y amplia en español sin perder la referencia geográfica.'
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  lexicon: Nombre propio estándar
  rationale: Transliteración usual del topónimo.
- source_word: מֵעֵבֶר לְיַרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - del otro lado del Jordán
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula geográfica fija. 'Al otro lado del Jordán' preserva la perspectiva relativa sin fijarla innecesariamente.
- source_word: יְרִיחוֹ
  english_pob_choice: Jericho
  chosen_spanish: Jericó
  lexicon: Nombre propio estándar
  rationale: Topónimo bíblico usual en español.
- source_word: מִזְרָחָה
  english_pob_choice: east of
  chosen_spanish: al oriente de
  alternatives_spanish:
  - al este de
  - hacia el oriente de
  lexicon: HALOT
  rationale: El adverbio direccional se expresa con naturalidad en español como localización relativa. 'Al oriente de' mantiene el registro bíblico y la orientación geográfica.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y la lectura ya auditada del POB inglés. Se mantiene la estructura resumitiva plural + cláusula relativa, el verbo causativo de reparto hereditario y la fórmula geográfica 'al otro lado del Jordán', con 'al oriente de Jericó' para explicitar la localización direccional sin sobrerreformular.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque el versículo no contiene el nombre divino.
  - Se prefirió 'Moisés' y topónimos usuales en español para legibilidad y consistencia bíblica.
  - '''Herencia'' conserva el campo semántico de posesión heredada, clave en el contexto de Josué 13.'
