review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura hebrea y mantiene el singular de segunda persona. «Casas», «cisternas», «viñedos» y «olivos» corresponden adecuadamente a los sustantivos fuente, y el sentido global de abundancia recibida sin trabajo propio está preservado. Sin embargo, «casa(s) llenas de todo bien» suena menos natural en español que «llenas de toda clase de bienes», y la pareja «cisternas labradas ... no labraste» no representa con suficiente naturalidad el matiz de cisternas excavadas/cortadas en roca; además, el pie b está anclado al adjetivo cuando en realidad documenta una alternativa para «cisternas».
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay varias asperezas estilísticas: «todo bien» resulta poco idiomático en este contexto material; «labradas/labraste» aplicado a cisternas suena forzado; y el uso de tres notas donde una de ellas solo explica el giro verbal es aceptable pero puede simplificarse. «Comerás y quedarás satisfecho» es comprensible, aunque «te saciarás» refleja mejor el paralelismo bíblico y el hebreo sin volverse arcaico.'
  glossary_alignment: No hay conflicto con los términos doctrinales por defecto del proyecto. La elección «cisternas» concuerda con la decisión léxica inglesa. No aparecen términos de glosario mayor como Yahvé/Mesías. La revisión propuesta mejora la precisión léxica de חֲצוּבִים/חָצַבְתָּ con «excavadas / excavaste» y hace más natural כָּל טוּב con «toda clase de bienes».
  issues:
  - severity: medium
    issue: «llenas de todo bien» es poco idiomático en español actual
    rationale: Aunque es comprensible, en un inventario de provisiones materiales suena más natural «llenas de toda clase de bienes» o similar, preservando el sentido amplio de כָּל טוּב.
  - severity: medium
    issue: «cisternas labradas ... no labraste» suena forzado y no refleja bien el contexto de cisternas excavadas en roca
    rationale: El hebreo apunta a cisternas cortadas/hechas en roca. «Labradas» puede servir en abstracto, pero con «cisternas» en español resulta menos claro y natural que «excavadas».
  - severity: low
    issue: La nota b está colocada sobre «labradas» pero explica una alternativa para «cisternas»
    rationale: El anclaje del marcador debería aparecer en el sustantivo o la expresión correspondiente para evitar ambigüedad editorial.
  - severity: low
    issue: «quedarás satisfecho» es correcto pero menos directo que «te saciarás»
    rationale: La forma reflexiva reproduce mejor la fuerza de שָׂבָעְתָּ y el tono bíblico natural en español contemporáneo eclesial.
