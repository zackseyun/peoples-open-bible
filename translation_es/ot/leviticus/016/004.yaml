translation:
  language: es
  text: Se pondrá la túnica santa de lino, y la ropa interior de lino estará sobre su cuerpo; se ceñirá con una faja de lino y se pondrá el turbante de lino. Estas son vestiduras santas[a]. Lavará su cuerpo con agua[b] y se las pondrá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «prendas sagradas».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «sobre su carne» y «lavará su carne con agua».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּתֹֽנֶת
  english_pob_choice: tunic
  chosen_spanish: túnica
  alternatives_spanish:
  - túnica larga
  - vestidura
  lexicon: HALOT
  rationale: כְּתֹנֶת designa la prenda interior sacerdotal. En español, 'túnica' comunica bien una vestidura larga y digna sin introducir un término más específico que el hebreo no exige.
- source_word: בַּד
  english_pob_choice: linen
  chosen_spanish: lino
  alternatives_spanish:
  - lino fino
  - lino
  lexicon: HALOT
  rationale: En el contexto sacerdotal, בַּד se refiere al material de lino. 'Lino' es natural en español y preserva la referencia material sin sobreespecificar calidad.
- source_word: קֹדֶשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - santo
  lexicon: HALOT
  rationale: Para prendas y objetos cultuales, 'santo' es un equivalente bíblico claro en español y mantiene la idea de separación para Dios. 'Sagrado' también sería posible, pero 'santo' conserva mejor el registro bíblico y cultual.
- source_word: יִלְבָּשׁ
  english_pob_choice: shall put on
  chosen_spanish: se pondrá
  alternatives_spanish:
  - vestirá
  - se pondrá
  lexicon: HALOT
  rationale: El verbo לבש expresa la acción de vestirse. 'Se pondrá' es idiomático en español y conserva la instrucción directa sin forzar una construcción más pesada.
- source_word: מִכְנְסֵי בַד
  english_pob_choice: linen undergarments
  chosen_spanish: calzoncillos de lino
  alternatives_spanish:
  - ropa interior de lino
  - calzones de lino
  lexicon: HALOT
  rationale: La prenda es una pieza inferior que va sobre la piel. 'Calzoncillos de lino' comunica la función de forma clara en español moderno; aunque no es el término litúrgico tradicional, evita una paráfrasis abstracta y conserva la concreción del hebreo.
- source_word: עַל בְּשָׂרוֹ
  english_pob_choice: on his body
  chosen_spanish: sobre su cuerpo
  alternatives_spanish:
  - sobre su carne
  - contra su carne
  lexicon: HALOT
  rationale: בָּשָׂר literalmente es 'carne', pero aquí la referencia práctica es la prenda puesta directamente sobre la persona. 'Sobre su cuerpo' mantiene la claridad española sin perder el sentido ritual de contacto directo.
- source_word: אַבְנֵט
  english_pob_choice: sash
  chosen_spanish: cinturón
  alternatives_spanish:
  - faja
  - cinturón
  - cinta
  lexicon: HALOT
  rationale: El אבנט sacerdotal es una banda ceñida a la cintura. 'Cinturón' es más transparente para lectores amplios; 'faja' podría sonar regional o ambiguo, mientras que 'sash' no es un término natural en español.
- source_word: יַחְגֹּר
  english_pob_choice: shall tie around himself
  chosen_spanish: se ceñirá
  alternatives_spanish:
  - se atará alrededor
  - se ceñirá
  lexicon: HALOT
  rationale: El verbo חגַר implica ceñirse o ajustarse una prenda alrededor del cuerpo. 'Se ceñirá' es una equivalencia bíblica precisa y digna en español, más cercana al valor ritual que un simple 'atar'.
- source_word: מִצְנֶפֶת
  english_pob_choice: turban
  chosen_spanish: turbante
  alternatives_spanish:
  - turbante
  - tocado
  lexicon: HALOT
  rationale: La מִצְנֶפֶת sacerdotal es un tocado envolvente. 'Turbante' es el equivalente más claro y reconocido en español; 'tocado' es más general y menos específico.
- source_word: יִצְנֹף
  english_pob_choice: wrap
  chosen_spanish: envolverá
  alternatives_spanish:
  - se envolverá
  - envolverá
  lexicon: HALOT
  rationale: El verbo צנף sugiere envolver o arrollar la prenda en la cabeza. 'Envolverá' preserva esa acción concreta mejor que un genérico 'pondrá'.
- source_word: בִּגְדֵי קֹדֶשׁ
  english_pob_choice: holy garments
  chosen_spanish: prendas santas
  alternatives_spanish:
  - vestiduras santas
  - prendas santas
  lexicon: HALOT
  rationale: La frase califica el conjunto de vestiduras como apartado para el servicio culto. 'Prendas santas' mantiene la relación directa entre ropa y santidad, y suena natural en español contemporáneo.
- source_word: וְרָחַץ בַּמַּיִם אֶת בְּשָׂרוֹ
  english_pob_choice: He shall wash his body with water
  chosen_spanish: Lavará su cuerpo con agua
  alternatives_spanish:
  - Lavará su carne con agua
  - Se lavará con agua
  lexicon: HALOT
  rationale: La forma hebrea dice literalmente 'lavará su carne con agua'. 'Cuerpo' comunica con naturalidad el sentido ritual en español sin añadir connotaciones extrañas a 'carne' en este contexto.
- source_word: וּלְבֵשָׁם
  english_pob_choice: and put them on
  chosen_spanish: y las pondrá
  alternatives_spanish:
  - y las vestirá
  - y las pondrá
  lexicon: HALOT
  rationale: El pronombre retoma las prendas ya mencionadas. 'Las pondrá' es breve y fiel; evita agregar un conector temporal no explícito y mantiene la secuencia del hebreo.
theological_decisions:
- issue: Santificación de las vestiduras sacerdotales
  english_pob_reading: These are holy garments.
  chosen_spanish_reading: Estas son prendas santas.
  alternative_spanish_readings:
  - Estas son vestiduras santas.
  - Estas son prendas sagradas.
  rationale: La frase declara una santidad cultual, no una carga doctrinal añadida. 'Prendas santas' conserva esa afirmación de apartamiento para el servicio sin expandirla simbólicamente.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Uso de בשר en el lavado ritual
  english_pob_reading: on his body / wash his body with water
  chosen_spanish_reading: sobre su cuerpo / Lavará su cuerpo con agua
  alternative_spanish_readings:
  - sobre su carne / Lavará su carne con agua
  - sobre su persona / Se lavará
  rationale: Mantener 'cuerpo' evita el choque semántico que 'carne' puede producir en español actual, pero no borra el carácter concreto y corporal del rito. La decisión es estilística y contextual, no doctrinal.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Seguí la versión revisada del inglés POB que eliminó 'then' y ajustó los verbos de vestirse para no añadir temporalidad ni movimientos no explicitados por el hebreo. Por eso el español evita conectores como 'luego' o 'entonces' y conserva una secuencia sobria de acciones rituales.
  spanish_consistency_notes:
  - He mantenido 'santo/santas' para קֹדֶשׁ en coherencia con el registro cultual del pasaje.
  - '''Lino'' se usa de forma uniforme para בַּד en todas las prendas.'
  - He preferido vocabulario bíblico claro ('ceñirá', 'envolverá') donde el español lo permite sin sonar arcaico.
  - El antecedente de 'las' en la última cláusula queda claro por el contexto inmediato de las vestiduras enumeradas.
