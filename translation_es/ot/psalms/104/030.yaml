review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría inglés en los puntos principales: «tu Espíritu» conserva la decisión teológica sobre רוּחַ con alternativas en nota; «son creados» refleja correctamente el nifal de ברא; «renuevas» representa bien וּתְחַדֵּשׁ. Sin embargo, «la tierra» para אֲדָמָה debilita la distinción léxica que el POB inglés documentó frente a un término más cósmico como «earth»/אֶרֶץ. En este contexto conviene una opción más cercana a «ground», como «el suelo».'
  spanish_quality_summary: El español es claro y digno. «Cuando envías tu Espíritu» fluye naturalmente. «La faz» mantiene el tono poético y es inteligible en registro bíblico. La mejora principal es sustituir «la tierra» por «el suelo» para mayor precisión semántica sin perder naturalidad. La nota b también debe ajustarse para reflejar exactamente la nota inglesa documentada («O ‘Envías tu Espíritu, y son creados’») en vez de invertir la sintaxis de manera menos directa.
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: «Espíritu» está bien capitalizado por contexto; no hay conflicto con Yahvé/Mesías/etc. La única desviación relevante es אֲדָמָה, donde «la tierra» se aleja de la preferencia documentada por «the ground»; en español «el suelo» preserva mejor esa decisión lexical.'
  issues:
  - severity: medium
    issue: «la tierra» para אֲדָמָה
    rationale: El expediente inglés justificó explícitamente «the ground» para evitar confusión con un término cósmico más amplio. En español, «la tierra» tiende a sonar igualmente amplia/cósmica; «el suelo» o «la tierra fértil» reflejarían mejor אֲדָמָה. «El suelo» es la reparación más sencilla y natural.
  - severity: low
    issue: Nota b no refleja con precisión la alternativa documentada
    rationale: 'La nota inglesa preserva una redacción previa: «You send out your Spirit, they are created». La nota española «son creados cuando envías tu Espíritu» comunica casi lo mismo, pero ya no conserva de manera transparente esa formulación alternativa. Conviene acercarla más: «Envías tu Espíritu, y son creados».'
  revised_spanish_text: Cuando envías tu Espíritu[a], son creados[b], y renuevas la faz del suelo.
