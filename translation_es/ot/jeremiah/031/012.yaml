    issue: La nota [a] está anclada en «Sion» pero su contenido explica «la bondad de Yahvé».
    rationale: Esto rompe la correspondencia obligatoria entre marcador y palabra/frase relevante, y puede confundir al lector sobre qué término tiene la alternativa léxica.
  - severity: medium
    issue: Falta una nota para el verbo «fluirán» (וְנָהֲרוּ), aunque la auditoría inglesa preservó una alternativa significativa.
    rationale: El inglés documentó el matiz alternativo «they will flow». En español conviene conservar una nota equivalente porque «fluirán» puede sonar metafórico o raro sin aclaración.
  - severity: medium
    issue: «Los hijos del rebaño y del ganado» es un calco poco natural para בְּנֵי צֹאן וּבָקָר.
    rationale: En español general y eclesial legible, «hijos» aplicado a animales aquí suena forzado. «Las crías del rebaño y del ganado» preserva la referencia a los animales jóvenes sin sobreespecificar especies.
  - severity: low
    issue: «Cantarán de alegría» suaviza el vigor de רנן.
    rationale: Aunque no es falsa, la expresión hebrea enfatiza júbilo vocal intenso. «Aclamarán de alegría» o «gritarán de alegría» transmite mejor ese matiz sin volverse áspero.
