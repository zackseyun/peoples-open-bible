revisions:
- from: Entonces el rey engrandeció a Daniel y le dio muchos dones[b][a] grandes, y lo hizo gobernador de toda la provincia de Babilonia y jefe de los prefectos sobre todos los sabios de Babilonia.
  to: Entonces el rey engrandeció a Daniel y le dio muchos grandes regalos[b][a], y lo hizo gobernador de toda la provincia de Babilonia y jefe de los prefectos sobre todos los sabios de Babilonia.
  rationale: Se ajusta únicamente la expresión de los regalos para lograr un español más natural y a la vez conservar la fuerza acumulativa del arameo y del expediente inglés ('many great gifts'). No se requieren cambios adicionales.
