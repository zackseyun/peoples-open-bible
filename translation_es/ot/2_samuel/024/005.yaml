base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/024/005.yaml
  text: They crossed the Jordan and camped at Aroer[a], on the right side of the city that is in the middle of the valley of Gad[c][b], and toward Jazer.
  footnotes:
  - marker: a
    text: Or 'and to Jazer.' The Hebrew preposition can indicate either direction toward a place or movement to it.
    reason: lexical_alternative
  - marker: b
    text: Or 'that is in the middle of the wadi/ravine of Gad.' The Hebrew word can refer to a valley, ravine, or seasonal streambed.
    reason: lexical_alternative
  - marker: c
    text: Literally 'to the right of the city.' Some interpreters understand this geographically as 'south of the city,' but the Hebrew expression itself is preserved here.
    reason: lexical_alternative
