id: JHN.21.7
reference: John 21:7
source:
  edition: SBLGNT
  text: λέγει οὖν ὁ μαθητὴς ἐκεῖνος ὃν ἠγάπα ὁ Ἰησοῦς τῷ Πέτρῳ· Ὁ κύριός ἐστιν. Σίμων οὖν Πέτρος, ἀκούσας ὅτι ὁ κύριός ἐστιν, τὸν ἐπενδύτην διεζώσατο, ἦν γὰρ γυμνός, καὶ ἔβαλεν ἑαυτὸν εἰς τὴν θάλασσαν·
translation:
  text: So that disciple whom Jesus loved said to Peter[a], “It is the Lord.” Therefore, when Simon Peter heard that it was the Lord, he tied his outer garment around himself (for he was lightly clothed) and threw himself into the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “for he was naked.” The Greek γυμνός can mean either literally naked or insufficiently/lightly clothed, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει οὖν
  chosen: So ... said
  alternatives:
  - Then ... said
  - Therefore ... said
  lexicon: BDAG
  rationale: οὖν marks narrative progression/inference. 'So' is natural modern English and preserves the connective force without sounding wooden.
- source_word: ὁ μαθητὴς ἐκεῖνος ὃν ἠγάπα ὁ Ἰησοῦς
  chosen: that disciple whom Jesus loved
  alternatives:
  - the disciple whom Jesus loved
  lexicon: BDAG
  rationale: Retains the demonstrative ἐκεῖνος ('that') rather than smoothing it away, while preserving John's characteristic designation. ἠγάπα is rendered 'loved' in keeping with normal usage of ἀγαπάω.
- source_word: Ὁ κύριός ἐστιν
  chosen: It is the Lord
  alternatives:
  - It is Lord
  - It is the Master
  lexicon: BDAG
  rationale: κύριος follows the doctrinal default 'Lord.' English idiom requires 'It is the Lord' rather than a bare predicate. 'Master' is possible in some contexts but weaker here given Johannine recognition of Jesus' identity.
- source_word: Σίμων οὖν Πέτρος
  chosen: Therefore, when Simon Peter
  alternatives:
  - So Simon Peter
  - Then Simon Peter
  lexicon: BDAG
  rationale: The proper name is transliterated. οὖν again marks sequence/result; in English it is best carried by 'Therefore, when...' to connect with the participial construction that follows.
- source_word: ἀκούσας
  chosen: when ... heard
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: The aorist participle is naturally rendered temporally in English. 'When ... heard' is smoother than the more formal 'having heard' while preserving the sequence.
- source_word: τὸν ἐπενδύτην
  chosen: his outer garment
  alternatives:
  - his coat
  - his fisher's smock
  - his tunic
  lexicon: BDAG
  rationale: ἐπενδύτης denotes an outer garment. 'Outer garment' is the most transparent and least interpretively loaded choice; more specific clothing terms would over-interpret the item.
- source_word: διεζώσατο
  chosen: tied ... around himself
  alternatives:
  - girded himself with
  - wrapped around himself
  - put on
  lexicon: BDAG
  rationale: The middle voice and the sense of fastening/girding a garment are preserved. 'Girded himself' is traditional but archaic; 'put on' is too vague and misses the action of tying up the garment.
- source_word: ἦν γὰρ γυμνός
  chosen: for he was lightly clothed
  alternatives:
  - for he was naked
  - for he was stripped
  lexicon: BDAG
  rationale: γυμνός can mean literally naked or inadequately/lightly clothed depending on context. Since Peter is said to have an ἐπενδύτης available and the scene is work on a boat, 'lightly clothed' best fits the likely sense without implying total nudity.
- source_word: ἔβαλεν ἑαυτὸν εἰς τὴν θάλασσαν
  chosen: threw himself into the sea
  alternatives:
  - jumped into the sea
  - cast himself into the sea
  lexicon: BDAG
  rationale: βάλλω with reflexive object is vivid; 'threw himself' preserves the force better than the flatter 'jumped.' θάλασσα is 'sea' in Johannine usage here, despite the body of water also being called a lake in English.
