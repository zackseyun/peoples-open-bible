id: JOS.10.7
reference: Joshua 10:7
source:
  edition: WLC
  text: וַ/יַּ֨עַל יְהוֹשֻׁ֜עַ מִן הַ/גִּלְגָּ֗ל ה֚וּא וְ/כָל עַ֤ם הַ/מִּלְחָמָה֙ עִמּ֔/וֹ וְ/כֹ֖ל גִּבּוֹרֵ֥י הֶ/חָֽיִל־־׃פ
translation:
  text: So Joshua went up from Gilgal[a], he and all the fighting men with him[b], and all the mighty men of valor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'all the people of war'; rendered 'all the fighting men' to express the military sense in natural English.
    reason: lexical_alternative
  - marker: b
    text: Or 'all the mighty men of valor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - marched up
  - came up
  lexicon: HALOT
  rationale: The verb עלה literally means 'go up/ascend.' 'Went up' preserves the common Hebrew directional idiom without over-specifying military nuance, though the context is martial.
- source_word: מִן הַגִּלְגָּל
  chosen: from Gilgal
  alternatives:
  - out of Gilgal
  lexicon: HALOT
  rationale: Straightforward source-oriented rendering of the preposition מן with the place name Gilgal transliterated as a proper noun.
- source_word: הוּא
  chosen: he
  alternatives:
  - Joshua himself
  lexicon: HALOT
  rationale: 'The independent pronoun is explicit in Hebrew and serves to appose/emphasize Joshua as personally going. English keeps this naturally with ''he'' in apposition: ''he and all...''.'
- source_word: כָל עַם הַמִּלְחָמָה
  chosen: all the fighting men
  alternatives:
  - all the people of war
  - all the army
  - all the men of war
  lexicon: HALOT
  rationale: Literally 'all the people of the war/battle.' In context this denotes the combat force accompanying Joshua. 'Fighting men' is idiomatic modern English and preserves the masculine military sense better than the broader 'army' or the more archaic 'men of war'.
- source_word: עִמּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: Standard rendering of the preposition עם with pronominal suffix.
- source_word: כֹל גִּבּוֹרֵי הֶחָיִל
  chosen: all the mighty warriors
  alternatives:
  - all the mighty men of valor
  - all the valiant warriors
  - all the mighty men
  lexicon: HALOT
  rationale: גִּבּוֹרֵי הֶחָיִל is a stock expression for proven, capable fighting men. 'Mighty warriors' communicates both strength and military competence in readable modern English. 'Men of valor' is traditional but less transparent for contemporary readers.
