translation:
  language: es
  text: 'Y sobre las tribus de Israel: para los rubenitas, Eliezer hijo de Zicri, líder[a]; para los simeonitas, Sefatías hijo de Macá.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jefe», «príncipe» o «gobernante» para el hebreo נָגִיד.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: And over
  chosen_spanish: Y sobre
  alternatives_spanish:
  - Ahora sobre
  - Con respecto a
  lexicon: HALOT
  rationale: La preposición introduce una nueva asignación administrativa dentro de la lista. «Sobre» conserva la idea de supervisión o jurisdicción, y la conjunción «Y» mantiene el enlace estructural con el contexto anterior sin volver la frase pesada en español.
- source_word: שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: the tribes of Israel
  chosen_spanish: las tribus de Israel
  alternatives_spanish:
  - las tribus israelitas
  - las tribus de Israel
  lexicon: HALOT
  rationale: Es una cadena constructa directa y transparente. «Las tribus de Israel» es la forma natural en español y conserva con claridad el referente colectivo.
- source_word: לָרְאוּבֵנִי
  english_pob_choice: for the Reubenites
  chosen_spanish: para los rubenitas
  alternatives_spanish:
  - para Rubén
  - para la tribu de Rubén
  - para los descendientes de Rubén
  lexicon: HALOT
  rationale: La forma gentilicia señala al grupo tribal, no solo al patriarca. «Rubenitas» mantiene el paralelo con el siguiente miembro de la lista y evita personalizar indebidamente la referencia.
- source_word: נָגִיד
  english_pob_choice: leader
  chosen_spanish: jefe
  alternatives_spanish:
  - líder
  - príncipe
  - gobernante
  lexicon: HALOT
  rationale: En este contexto administrativo, el término designa a alguien puesto en autoridad. «Jefe» comunica bien esa función en español sin introducir connotaciones reales o dinásticas que «príncipe» podría sugerir. Se conserva la tensión entre autoridad y cargo no monárquico.
- source_word: אֱלִיעֶזֶר בֶּן זִכְרִי
  english_pob_choice: Eliezer son of Zichri
  chosen_spanish: Eliezer hijo de Zicri
  alternatives_spanish:
  - Eliezer, hijo de Zicri
  lexicon: Convención onomástica estándar
  rationale: Los nombres propios se transliteran de manera convencional. «Hijo de» preserva la construcción patronímica hebrea de forma literal y comprensible.
- source_word: לַשִּׁמְעוֹנִי
  english_pob_choice: for the Simeonites
  chosen_spanish: para los simeonitas
  alternatives_spanish:
  - para Simeón
  - para la tribu de Simeón
  - para los descendientes de Simeón
  lexicon: HALOT
  rationale: Como en el caso de Rubén, la forma gentilicia apunta al cuerpo tribal. «Simeonitas» respeta la estructura paralela y la función administrativa del listado.
- source_word: שְׁפַטְיָהוּ בֶּן מַעֲכָה
  english_pob_choice: Shephatiah son of Maacah
  chosen_spanish: Sefatías hijo de Macá
  alternatives_spanish:
  - Sefatías, hijo de Macá
  lexicon: Convención onomástica estándar
  rationale: Se translitera el nombre propio según uso español corriente. «Hijo de Macá» reproduce literalmente el patronímico; el texto hebreo no aclara más sobre la identidad de Macá.
theological_decisions:
- issue: Título administrativo נָגִיד en una lista tribal
  english_pob_reading: leader
  chosen_spanish_reading: jefe
  alternative_spanish_readings:
  - líder
  - príncipe
  - gobernante
  rationale: La POB inglesa opta por un término funcional y no monárquico. En español, «jefe» conserva autoridad y coordinación administrativa sin cargar el término con resonancias cortesanas o eclesiásticas ajenas al contexto.
  doctrine_reference: 1 Crónicas 27:16
- issue: Referencia tribal mediante gentilicios
  english_pob_reading: for the Reubenites / for the Simeonites
  chosen_spanish_reading: para los rubenitas / para los simeonitas
  alternative_spanish_readings:
  - para la tribu de Rubén / para la tribu de Simeón
  rationale: La lista distribuye oficiales por tribus; el gentilicio es la forma más compacta y fiel al patrón hebreo. Mantenerlo evita borrar la organización tribal del pasaje.
  doctrine_reference: 1 Crónicas 27:16
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo entre el texto hebreo, la traducción inglesa auditada y el control de revisión más reciente; no se registran revisiones aplicadas. La redacción española sigue esa línea estable, con una única nota léxica para נָגִיד.
  spanish_consistency_notes:
  - 'Se mantiene la estructura listada del hebreo: tribu / oficial / nombre / patronímico.'
  - Se usa «rubenitas» y «simeonitas» en paralelo para conservar la simetría del original.
  - «Macá» se conserva como transliteración breve del nombre propio, sin expandirlo interpretativamente.
  - La nota al pie se ancla únicamente en «jefe», que concentra la decisión semántica relevante de נָגִיד.
