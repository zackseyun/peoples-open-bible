  yaml_path: translation/deuterocanon/1_esdras/002/012.yaml
  text: 'And this was their number: a thousand gold libation bowls[a], a thousand silver libation bowls, twenty-nine silver censers, thirty gold bowls, two hundred and ten silver bowls[b], and a thousand other vessels.'
  footnotes:
