translation:
  language: es
  text: Y yo también actuaré en ira; mi ojo no tendrá piedad[a], ni tendré compasión. Aunque clamen en mis oídos a gran voz, no los oiré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "mi ojo no perdonará".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם אֲנִי
  english_pob_choice: And I also
  chosen_spanish: Y yo también
  alternatives_spanish:
  - Y también yo
  - Pero yo también
  lexicon: HALOT
  rationale: La partícula aditiva con el pronombre enfático conserva la continuidad del discurso y el énfasis sobre el hablante. 'Y yo también' refleja de forma natural el valor de וְגַם אֲנִי sin introducir un contraste más fuerte de lo que exige el hebreo.
- source_word: אֶעֱשֶׂה
  english_pob_choice: will act
  chosen_spanish: actuaré
  alternatives_spanish:
  - haré
  - procederé
  lexicon: HALOT
  rationale: En este contexto judicial, 'actuaré' comunica una acción decisiva de juicio sin reducir עשה a un mero 'hacer'. Mantiene la amplitud del verbo y su fuerza discursiva en español.
- source_word: בְחֵמָה
  english_pob_choice: in wrath
  chosen_spanish: en ira
  alternatives_spanish:
  - en furor
  - con ira
  lexicon: HALOT
  rationale: חֵמָה expresa ira ardiente o furor. 'En ira' es una forma clara y digna en español que conserva el peso afectivo del término y el marco de juicio.
- source_word: לֹא תָחוֹס עֵינִי
  english_pob_choice: my eye will not spare
  chosen_spanish: mi ojo no perdonará
  alternatives_spanish:
  - mi ojo no tendrá piedad
  - mi ojo no se compadecerá
  lexicon: HALOT
  rationale: La imagen del ojo que no 'ahorra' o 'perdona' es una idiomática de juicio. 'No perdonará' preserva la fuerza negativa del hebreo y funciona de manera natural en español, manteniendo la personificación sin suavizarla excesivamente.
- source_word: וְלֹא אֶחְמֹל
  english_pob_choice: nor will I have compassion
  chosen_spanish: ni tendré compasión
  alternatives_spanish:
  - ni me compadeceré
  - ni tendré piedad
  lexicon: HALOT
  rationale: חמל añade la idea de compasión/piedad. 'Ni tendré compasión' conserva el paralelismo con 'no perdonará' y distingue bien esta línea de la anterior sin repetir exactamente la misma noción.
- source_word: וְקָרְאוּ בְאָזְנַי קוֹל גָּדוֹל
  english_pob_choice: Though they cry in my ears with a loud voice
  chosen_spanish: Aunque clamen en mis oídos con fuerte voz
  alternatives_spanish:
  - Y clamaron en mis oídos con gran voz
  - Aunque griten en mis oídos con voz potente
  lexicon: HALOT
  rationale: קרא en este contexto es 'clamar/gritar'. 'Clamen' conserva el matiz de súplica intensa y juicio. 'En mis oídos' mantiene la imagen concreta del hebreo, y 'con fuerte voz' traduce de forma sobria קוֹל גָּדוֹל.
- source_word: וְלֹא אֶשְׁמַע אוֹתָם
  english_pob_choice: I will not hear them
  chosen_spanish: no los oiré
  alternatives_spanish:
  - no los escucharé
  - no les prestaré oído
  lexicon: HALOT
  rationale: שמע aquí significa oír/escuchar en el sentido de atender la súplica. 'No los oiré' es directo y fiel al parenteísmo del versículo, sin añadir un matiz interpretativo como 'prestar oído'.
theological_decisions:
- issue: Preservar el lenguaje antropomórfico de juicio divino
  english_pob_reading: my eye will not spare, nor will I have compassion
  chosen_spanish_reading: mi ojo no perdonará, ni tendré compasión
  alternative_spanish_readings:
  - mi ojo no tendrá piedad, ni tendré compasión
  - no los trataré con misericordia
  rationale: El hebreo presenta el juicio de Dios con imágenes corporales y afectivas directas. La traducción conserva esa intensidad sin convertirla en una paráfrasis abstracta que atenúe la solemnidad del anuncio.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Expresar con claridad la relación concesiva final
  english_pob_reading: Though they cry in my ears with a loud voice, I will not hear them.
  chosen_spanish_reading: Aunque clamen en mis oídos con fuerte voz, no los oiré.
  alternative_spanish_readings:
  - Y aunque clamen en mis oídos con fuerte voz, no los oiré.
  - Aunque griten en mis oídos con voz fuerte, no los escucharé.
  rationale: La secuencia hebrea es formalmente simple, pero el sentido discursivo es concesivo/contrastivo. 'Aunque' hace explícita esa relación sin alejarse del contenido semántico del original.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que prefirió 'And I also' sobre una fórmula más contrastiva. En español se refleja con 'Y yo también', evitando introducir un 'pero' no requerido por el hebreo.
  spanish_consistency_notes:
  - Se mantiene Yahvé solo cuando aparezca el tetragrámaton; aquí no aparece, así que se conserva el lenguaje de primera persona divina.
  - '''Ira'' se usa para בְחֵמָה, reservando ''furor'' como alternativa lexical sin imponerla en el texto principal.'
  - '''Compasión'' traduce חמל de forma diferenciada respecto a ''perdonará'', preservando el paralelismo sin repetir exactamente la misma idea.'
  - Se conserva la imagen concreta de 'mis oídos' y 'mi ojo' para respetar el antropomorfismo del pasaje.
