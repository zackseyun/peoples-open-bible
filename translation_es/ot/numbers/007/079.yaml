  to: Su ofrenda fue un plato de plata[a], que pesaba ciento treinta siclos, y un cuenco de plata[b] de setenta siclos, según el siclo del santuario; ambos llenos de flor de harina mezclada con aceite, para una ofrenda de grano.
  rationale: Se corrige la colocación de las notas para reflejar fielmente el expediente del POB inglés, especialmente la alternativa léxica de מִזְרָק. También se mejora la naturalidad de la frase del peso y se ajusta מִנְחָה a «ofrenda de grano», que preserva mejor la categoría sacrificial específica del hebreo y de la auditoría inglesa. Se mantiene «plato de plata» como opción principal para קַעֲרָה, con la alternativa en nota.
