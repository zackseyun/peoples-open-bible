translation:
  language: es
  text: Y el sacerdote examinará la mancha en la piel del cuerpo; si el pelo de la mancha se ha vuelto blanco y el aspecto de la mancha es más profundo que la piel de su cuerpo, es mancha de lepra[a]; cuando el sacerdote lo haya examinado, lo declarará impuro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, «una mancha de lepra» / «una infección leprosa». El hebreo צָרַעַת se refiere a una categoría más amplia que la lepra moderna.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶגַע
  english_pob_choice: diseased spot
  chosen_spanish: mancha
  alternatives_spanish:
  - lesión
  - marca
  - llaga
  lexicon: HALOT
  rationale: En este contexto diagnóstico de Levítico 13, נֶגַע designa una lesión visible que el sacerdote inspecciona. En español, 'mancha' es natural y apto para lectura pública; 'lesión' es más técnico pero menos alineado con la concreción visual del pasaje.
- source_word: בְּעוֹר הַבָּשָׂר
  english_pob_choice: on the skin of the body
  chosen_spanish: en la piel de la carne
  alternatives_spanish:
  - sobre la piel del cuerpo
  - en la piel del cuerpo
  - en la piel de su carne
  lexicon: HALOT
  rationale: Se conserva la estructura hebrea 'piel + carne' sin volverla una paráfrasis médica. 'Carne' mantiene el término bíblico de בָּשָׂר; por eso se prefiere aquí frente a 'cuerpo', aunque la frase resulte menos idiomática que en un registro moderno más libre.
- source_word: שֵׂעָר
  english_pob_choice: hair
  chosen_spanish: pelo
  alternatives_spanish:
  - cabello
  - vello
  lexicon: HALOT
  rationale: En una descripción dermatológica, 'pelo' es el equivalente general más neutral; 'cabello' puede sonar restringido a la cabeza, y 'vello' sugiere solo fino pelo corporal. La frase necesita un término amplio para el rasgo observable.
- source_word: הָפַךְ לָבָן
  english_pob_choice: has turned white
  chosen_spanish: se ha vuelto blanco
  alternatives_spanish:
  - se ha tornado blanco
  - ha blanqueado
  - se volvió blanco
  lexicon: HALOT
  rationale: La expresión española conserva el cambio de estado visible, sin sonar arcaica. 'Se ha vuelto blanco' transmite bien la observación del sacerdote.
- source_word: מַרְאֵה
  english_pob_choice: appearance
  chosen_spanish: aspecto
  alternatives_spanish:
  - apariencia
  - vista
  - semblante
  lexicon: HALOT
  rationale: '''Aspecto'' funciona bien en un contexto de inspección y evita la repetición de ''mancha''. ''Apariencia'' también sería posible, pero ''aspecto'' suena más sobrio y preciso.'
- source_word: עָמֹק מֵעוֹר בְּשָׂרוֹ
  english_pob_choice: deeper than the skin of his body
  chosen_spanish: más profundo que la piel de su carne
  alternatives_spanish:
  - más profundo que su piel
  - más hundido que la piel de su carne
  - más profundo que la piel de su cuerpo
  lexicon: HALOT
  rationale: Se mantiene la comparación espacial del hebreo y la relación 'piel / carne'. 'Más profundo' expresa el relieve hundido de la lesión y conserva el valor descriptivo del original.
- source_word: צָרַעַת
  english_pob_choice: leprosy / skin disease
  chosen_spanish: lepra
  alternatives_spanish:
  - enfermedad de la piel
  - afección de la piel
  - lepra ritual
  lexicon: HALOT
  rationale: Aunque el audit trail inglés advierte que צָרַעַת es más amplio que la lepra moderna, aquí se conserva 'lepra' como término tradicional, siguiendo la revisión más reciente del POB y permitiendo que la nota explique la cautela semántica. Esto evita una perífrasis pesada en el texto principal.
- source_word: וְטִמֵּא אֹתוֹ
  english_pob_choice: he shall pronounce him unclean
  chosen_spanish: lo declarará impuro
  alternatives_spanish:
  - lo pronunciará impuro
  - lo declarará inmundo
  - lo hará impuro
  lexicon: HALOT
  rationale: '''Declarará impuro'' refleja el veredicto sacerdotal sin sugerir que el sacerdote cause la impureza. ''Impu ro'' es el equivalente sobrio y actual para טָמֵא en este marco ritual.'
theological_decisions:
- issue: Sentido de צָרַעַת en la legislación de pureza
  english_pob_reading: leprosy / skin disease
  chosen_spanish_reading: lepra
  alternative_spanish_readings:
  - enfermedad de la piel
  - afección de la piel
  - lepra ritual
  rationale: 'El texto español conserva el término tradicional ''lepra'' por legibilidad e historia de recepción, pero no lo trata como diagnóstico médico moderno. La nota mantiene la tensión documentada: el hebreo designa una categoría ritual más amplia que la lepra clínica.'
  doctrine_reference: Levítico 13; cf. observación lexicográfica del POB sobre צָרַעַת
- issue: Naturaleza de la acción sacerdotal en וְטִמֵּא אֹתוֹ
  english_pob_reading: he shall pronounce him unclean
  chosen_spanish_reading: lo declarará impuro
  alternative_spanish_readings:
  - lo pronunciará impuro
  - lo hará impuro
  rationale: En el marco legal sacerdotal, el sacerdote emite un dictamen sobre el estado ritual; no produce ontológicamente la impureza. 'Declarará' preserva esa función forense/ritual.
  doctrine_reference: Levítico 13; función judicial del sacerdote en la ley de pureza
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB que prefirió 'leprosy' frente a 'skin disease' para צָרַעַת, a la vez que conserva la advertencia lexicográfica de que no equivale a la lepra médica moderna. Se ha mantenido la secuencia observación diagnóstica → veredicto sacerdotal, y la declaración ritual de impureza se traduce como acto declarativo, no causativo.
  spanish_consistency_notes:
  - Se mantiene 'carne' para בָּשָׂר de manera consistente con el tono bíblico y la política terminológica del proyecto.
  - '''Impuro'' se usa para טָמֵא en un contexto ritual, no moral.'
  - La nota al pie está anclada solo en 'lepra', donde surge la tensión traductológica principal.
  - Se evita 'SEÑOR' u otras sustituciones devocionales, pues no hay Tetragrámaton en este versículo.
