translation:
  language: es
  text: Un monte de Dios[a] es el monte de Basán; un monte de cimas[b] es el monte de Basán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un monte poderoso» o «un monte majestuoso»; la expresión hebrea «monte de Dios» puede funcionar como un superlativo idiomático.'
    reason: alternative_reading
  - marker: b
    text: El término hebreo raro que aquí se vierte como «cimas» también puede sugerir un monte escarpado o jorobado.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַר
  english_pob_choice: mountain
  chosen_spanish: monte
  alternatives_spanish:
  - montaña
  lexicon: HALOT
  rationale: En español, 'monte' funciona bien en un registro bíblico y poético para reproducir la repetición enfática de הַר sin sonar forzado; 'montaña' también sería posible, pero 'monte' mantiene mejor la cadencia breve del hebreo.
- source_word: אֱלֹהִים
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - poderoso
  - divino
  - majestuoso
  lexicon: HALOT
  rationale: La construcción hebrea se conserva literalmente como 'de Dios' para mantener la forma poética y la posible tensión interpretativa entre lectura literal e intensiva.
- source_word: בָּשָׁן
  english_pob_choice: Bashan
  chosen_spanish: Basán
  alternatives_spanish:
  - Bashán
  lexicon: HALOT
  rationale: Topónimo propio; se translitera al uso habitual en español bíblico como 'Basán'.
- source_word: גַּבְנֻנִּים
  english_pob_choice: peaks
  chosen_spanish: cimas
  alternatives_spanish:
  - picos
  - crestas
  - montes escarpados
  lexicon: HALOT
  rationale: El término raro apunta a una configuración montañosa prominente. 'Cimas' comunica la idea topográfica con naturalidad en español y evita introducir 'muchos', que no está explícito en el hebreo.
theological_decisions:
- issue: Si הַר אֱלֹהִים debe entenderse literalmente o como superlativo idiomático
  english_pob_reading: Rendered literally as 'mountain of God' in the main text, with a footnote preserving the idiomatic alternative.
  chosen_spanish_reading: Se mantiene 'un monte de Dios' en el texto principal, con nota sobre la posible lectura idiomática intensiva.
  alternative_spanish_readings:
  - un monte poderoso
  - un monte majestuoso
  rationale: La traducción literal conserva la resonancia del constructo hebreo y no resuelve la ambigüedad. La nota permite la alternativa intensiva sin borrar la tensión interpretativa documentada.
  doctrine_reference: Translation philosophy §3; preservar la tensión teológica e interpretativa en lugar de resolverla
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail al evitar añadir 'muchos' en la segunda hemistiquio. También conserva la repetición poética de 'monte ... el monte de Basán'.
  spanish_consistency_notes:
  - Se usa 'monte' de manera consistente para הַר en ambas ocurrencias.
  - Se translitera el topónimo como 'Basán' conforme al uso bíblico en español.
  - La nota [a] se ancla en 'de Dios' para reflejar la alternativa intensiva sin desplazar la lectura literal.
  - La nota [b] se ancla en 'cimas' para reflejar la rareza léxica de גַּבְנֻנִּים sin sobreespecificar.
