translation:
  language: es
  text: Entonces David agarró su ropa y la rasgó[a], y lo mismo hicieron todos los hombres que estaban con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literal: «su prenda»; el español usa «su ropa» para reflejar de manera natural el modismo de rasgar la ropa en duelo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחֲזֵק
  english_pob_choice: took hold of
  chosen_spanish: tomó
  alternatives_spanish:
  - tomó de
  - agarró
  - asió
  lexicon: HALOT
  rationale: En este giro narrativo, el verbo introduce la acción de aferrar la ropa antes de rasgarla. En español, "tomó" comunica con naturalidad el inicio de la acción sin forzar una construcción pesada; el contexto de duelo completa la imagen.
- source_word: בבגדו
  english_pob_choice: his clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - su vestido
  - su ropa
  - sus ropas
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo/idiomático referido a la prenda. En español, "sus vestidos" conserva la referencia a las prendas de duelo y suena más bíblico y natural que un singular rígido; "ropa" sería más general.
- source_word: ויקרעם
  english_pob_choice: tore them
  chosen_spanish: los rasgó
  alternatives_spanish:
  - los desgarró
  - los rompió
  lexicon: HALOT
  rationale: El objeto es plural en la frase inglesa por la interpretación idiomática de la prenda como conjunto; en español, el pronombre plural "los" permite mantener esa misma lectura. "Rasgó" es el verbo usual y digno para el gesto de duelo.
- source_word: וגם
  english_pob_choice: and so did
  chosen_spanish: y también
  alternatives_spanish:
  - y asimismo
  - y del mismo modo
  lexicon: HALOT
  rationale: La partícula añade que la acción de David se extendió a sus compañeros. "Y también" conserva la adición de manera directa y natural en español; no es necesario reproducir el matiz idiomático inglés con una perífrasis.
- source_word: כל האנשים
  english_pob_choice: all the men
  chosen_spanish: todos los hombres
  alternatives_spanish:
  - todos los hombres de guerra
  - toda la gente
  lexicon: HALOT
  rationale: הָאֲנָשִׁים es masculino plural, por lo que "hombres" mantiene la precisión léxica. "Todos" expresa la totalidad del grupo que comparte la acción.
- source_word: אשר אתו
  english_pob_choice: who were with him
  chosen_spanish: que estaban con él
  alternatives_spanish:
  - que iban con él
  - que lo acompañaban
  lexicon: HALOT
  rationale: La cláusula relativa identifica a los compañeros de David. "Estaban con él" reproduce de forma clara y sobria la relación de compañía indicada por el hebreo.
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios sustanciales en su valoración; la traducción española sigue el mismo sentido básico y adapta el modismo del duelo a un español natural sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - Se evitó "Señor" o cualquier sustitución innecesaria, pues el versículo no contiene el nombre divino.
  - Se mantuvo el tono narrativo sobrio y compatible con una Biblia de acceso público.
  - La coordinación final "y también" conserva la extensión colectiva de la acción sin sobrecargar la sintaxis.
