translation:
  language: es
  text: 'Y le abrió todo su corazón[a] y le dijo: «Una navaja nunca ha pasado por mi cabeza, porque soy nazareo[b] de Dios desde el vientre de mi madre. Si me rapan, entonces mi fuerza se apartará de mí y me debilitaré, y seré como cualquier otro hombre[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «le reveló todo lo que había en su corazón».
    reason: lexical_alternative
  - marker: b
    text: Término técnico para una persona apartada o consagrada a Dios; en este contexto, alude a la dedicación nazarea de Sansón.
    reason: theological_note
  - marker: c
    text: O, «como cualquier hombre».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּגֶּד ... אֶת כָּל לִבּוֹ
  english_pob_choice: he told her all his heart
  chosen_spanish: le descubrió todo su corazón
  alternatives_spanish:
  - le contó todo su corazón
  - le dijo todo lo que llevaba en el corazón
  - le reveló todo su corazón
  lexicon: HALOT
  rationale: El hebreo expresa divulgación completa del interior personal. En español, «descubrirle todo su corazón» conserva la metáfora sin sonar rígido; mantiene la idea de abrir plenamente lo íntimo, como en la revisión inglesa que preserva el hebraísmo.
- source_word: מוֹרָה
  english_pob_choice: razor
  chosen_spanish: navaja
  alternatives_spanish:
  - rasuradora
  - cuchilla
  lexicon: HALOT
  rationale: En este contexto la palabra designa la herramienta de afeitar que no debía tocar la cabeza de Sansón. «Navaja» es un equivalente natural y bíblicamente inteligible en español; evita una perífrasis innecesaria.
- source_word: לֹא עָלָה עַל רֹאשִׁי
  english_pob_choice: has never come upon my head
  chosen_spanish: no ha subido sobre mi cabeza
  alternatives_spanish:
  - no ha tocado mi cabeza
  - nunca ha pasado sobre mi cabeza
  lexicon: HALOT
  rationale: Se conserva la imagen verbal hebrea «subir sobre mi cabeza», porque el POB inglés también preserva la idiomática original. En español, «subido sobre mi cabeza» mantiene la metáfora de forma comprensible y audit-able.
- source_word: נְזִיר אֱלֹהִים
  english_pob_choice: Nazirite of God
  chosen_spanish: nazareo de Dios
  alternatives_spanish:
  - consagrado de Dios como nazareo
  - nazareo dedicado a Dios
  lexicon: HALOT
  rationale: Se usa «nazareo», término técnico establecido para נְזִיר en el contexto de Números 6 y Sansón. Se evita «nazareo»? No; se afirma aquí como forma española del tecnicismo para conservar la categoría ritual específica que el hebreo señala.
- source_word: מִבֶּטֶן אִמִּי
  english_pob_choice: from my mother’s womb
  chosen_spanish: desde el vientre de mi madre
  alternatives_spanish:
  - desde el seno de mi madre
  - desde que estaba en el vientre de mi madre
  lexicon: HALOT
  rationale: Es un equivalente idiomático natural en español y mantiene la idea de consagración desde el nacimiento. «Vientre» corresponde mejor al registro bíblico y al paralelismo contextual.
- source_word: אִם גֻּלַּחְתִּי
  english_pob_choice: If I am shaved
  chosen_spanish: si me rapan
  alternatives_spanish:
  - si soy rapado
  - si me afeitan
  lexicon: HALOT
  rationale: El pasivo hebreo expresa la acción sufrida por Sansón; «me rapan» suena natural en español y comunica el acto de cortar el cabello de modo contundente. «Rapar» encaja bien con el contexto narrativo del cabello.
- source_word: וְסָר מִמֶּנִּי כֹחִי
  english_pob_choice: then my strength will leave me
  chosen_spanish: mi fuerza se apartará de mí
  alternatives_spanish:
  - mi fuerza me dejará
  - mi fuerza se irá de mí
  lexicon: HALOT
  rationale: «Apartarse» refleja con bastante fidelidad el verbo hebreo de retirarse/irse. La formulación española conserva el sentido dinámico de pérdida de poder que la tradición inglesa expresa con «leave me».
- source_word: וְחָלִיתִי
  english_pob_choice: I will become weak
  chosen_spanish: me debilitaré
  alternatives_spanish:
  - seré débil
  - caeré enfermo
  lexicon: HALOT
  rationale: Aquí el verbo apunta a desfallecimiento o pérdida de vigor, no a enfermedad clínica. «Me debilitaré» es la forma más natural y precisa en español, sin añadir una connotación médica indebida.
- source_word: כְכָל הָאָדָם
  english_pob_choice: like every other man
  chosen_spanish: como cualquier otro hombre
  alternatives_spanish:
  - como cualquier hombre
  - como todo hombre
  - como cualquier persona
  lexicon: HALOT
  rationale: Se conserva el contraste con Sansón mediante «cualquier otro hombre», siguiendo la decisión inglesa de mantener el valor de אָדָם como varón humano ordinario en este contexto narrativo.
theological_decisions:
- issue: Término técnico de consagración nazarea en Sansón
  english_pob_reading: Nazirite of God
  chosen_spanish_reading: nazareo de Dios
  alternative_spanish_readings:
  - consagrado a Dios
  - nazareo dedicado a Dios
  rationale: El texto no describe una consagración genérica sino la institución técnica asociada con Sansón. Mantener el tecnicismo en español preserva la conexión canónica con Números 6 y con la historia de Sansón, tal como hace el POB inglés.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency of key terms, or documented exception.'
- issue: Referencia a הָאָדָם en la cláusula final
  english_pob_reading: like every other man
  chosen_spanish_reading: como cualquier otro hombre
  alternative_spanish_readings:
  - como cualquier otra persona
  - como cualquier humano
  rationale: La frase contrasta a Sansón con hombres ordinarios, no con la humanidad en abstracto. Por eso se mantiene la referencia masculina específica, en línea con la lectura inglesa y con la precisión contextual del hebreo.
  doctrine_reference: 'Translation philosophy: gender-accurate over gender-neutral; Contested terms table for אָדָם.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió «his whole heart» por «all his heart» para una correspondencia más literal. La redacción española mantiene la metáfora completa del hebreo sin añadir explicaciones ajenas al texto, y conserva la imagen idiomática de la navaja subiendo sobre la cabeza, la consagración nazarea y la comparación final con un hombre común.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, conforme al estándar del proyecto.
  - Se usa «espíritu» solo donde el contexto lo requiera; este versículo no lo presenta.
  - «Nazareo» se reserva como tecnicismo bíblico y no se sustituye por una paráfrasis devocional.
  - La comparación final conserva el matiz masculino de הָאָדָם siguiendo la decisión auditada del POB inglés.
  - La puntuación y las comillas siguen el uso tipográfico español de cierre y apertura de diálogo.
