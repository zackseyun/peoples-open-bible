translation:
  language: es
  text: Así que el pueblo gritó, y tocaron las trompetas[b]. Y cuando el pueblo oyó el sonido de la trompeta, el pueblo gritó un gran grito, y la muralla cayó hacia abajo, sobre sí misma[a], y el pueblo subió a la ciudad, cada hombre recto delante de sí, y capturaron la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la muralla se derrumbó en su lugar». El hebreo dice literalmente que la muralla cayó «debajo de ella», una expresión inusual que puede describir un derrumbe vertical.'
    reason: lexical_alternative
  - marker: b
    text: «Trompeta» traduce aquí el hebreo shofar, un cuerno usado para señales; «cuerno de carnero» es una posibilidad más específica.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּרַע / וַיָּרִיעוּ / תְּרוּעָה
  english_pob_choice: shouted / shouted a great shout
  chosen_spanish: gritó / gritó un gran grito
  alternatives_spanish:
  - dio un grito de guerra
  - lanzó un grito de batalla
  - aclamó
  lexicon: HALOT
  rationale: La raíz רוע y el sustantivo תְּרוּעָה expresan un grito fuerte, a menudo en contexto militar o cultual. En español, «gritó» conserva bien el valor básico y «un gran grito» refleja la intensificación sin añadir un matiz bélico que el verso no explicita por sí mismo.
- source_word: שׁוֹפָרוֹת / שׁוֹפָר
  english_pob_choice: trumpets / trumpet
  chosen_spanish: trompetas / trompeta
  alternatives_spanish:
  - cuernos
  - cuernos de carnero
  lexicon: HALOT
  rationale: שׁוֹפָר designa un cuerno usado como instrumento de señal. «Trompeta» es la opción española más natural y clara en el relato. «Cuerno de carnero» es posible, pero más específica de lo que el versículo dice de manera explícita.
- source_word: קוֹל הַשּׁוֹפָר
  english_pob_choice: the sound of the trumpet
  chosen_spanish: el sonido de la trompeta
  alternatives_spanish:
  - la voz de la trompeta
  - el toque de la trompeta
  - el blast de la trompeta
  lexicon: HALOT
  rationale: קוֹל significa literalmente «sonido/voz». Con un instrumento, «el sonido de la trompeta» es la formulación más idiomática en español y mantiene el sentido sin forzar una metáfora innecesaria.
- source_word: וַתִּפֹּל הַחוֹמָה תַּחְתֶּיהָ
  english_pob_choice: the wall fell down beneath it
  chosen_spanish: la muralla cayó hacia abajo debajo de ella
  alternatives_spanish:
  - la muralla se derrumbó en su lugar
  - la muralla cayó en tierra
  - la muralla cayó por completo
  lexicon: HALOT
  rationale: La expresión hebrea es inusual y literalmente dice que la muralla cayó «debajo de ella». En español, «cayó hacia abajo debajo de ella» preserva esa rareza de manera auditable, aunque suena marcada; no se normaliza por completo para no borrar la tensión textual documentada en el POB inglés.
- source_word: וַיַּעַל ... הָעִירָה
  english_pob_choice: went up into the city
  chosen_spanish: subió a la ciudad
  alternatives_spanish:
  - subió hacia la ciudad
  - entró en la ciudad
  - subió a la ciudad y entró
  lexicon: HALOT
  rationale: עלה conserva el valor básico de «subir». Con el sufijo direccional, «subió a la ciudad» mantiene el movimiento ascendente hacia Jericó de manera natural en español.
- source_word: אִישׁ נֶגְדּוֹ
  english_pob_choice: each man straight before him
  chosen_spanish: cada hombre directamente delante de él
  alternatives_spanish:
  - cada uno directamente delante de sí
  - cada hombre recto delante de él
  - cada hombre hacia enfrente
  lexicon: HALOT
  rationale: אִישׁ es singular distributivo, y se mantiene «cada hombre» para conservar el valor masculino del hebreo. נֶגְדּוֹ expresa la idea de estar enfrente; «directamente delante de él» comunica ese avance recto sin perder claridad.
- source_word: וַיִּלְכְּדוּ
  english_pob_choice: captured
  chosen_spanish: tomaron
  alternatives_spanish:
  - capturaron
  - se apoderaron de
  - se hicieron con
  lexicon: HALOT
  rationale: לכד en narrativa militar puede significar capturar una ciudad. En español, «tomaron la ciudad» es una forma natural y sobria que comunica la conquista; «capturaron» sería también posible, pero suena menos fluido en esta secuencia narrativa.
theological_decisions:
- issue: Expresión distributiva masculina אִישׁ נֶגְדּוֹ
  english_pob_reading: each man straight before him
  chosen_spanish_reading: cada hombre directamente delante de él
  alternative_spanish_readings:
  - cada uno directamente delante de sí
  - todos hacia delante
  rationale: El hebreo usa el singular masculino אִישׁ de manera distributiva. Se preserva el valor masculino en la traducción principal, en consonancia con la política de precisión de género del proyecto, porque el pasaje describe a los hombres de Israel avanzando individualmente desde sus posiciones.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Imagen de la muralla que cae תַּחְתֶּיהָ
  english_pob_reading: the wall fell down beneath it
  chosen_spanish_reading: la muralla cayó hacia abajo debajo de ella
  alternative_spanish_readings:
  - la muralla se derrumbó en su lugar
  - la muralla cayó por completo
  rationale: Se conserva la rareza sintáctica del hebreo y la tensión semántica señalada por el POB en inglés. No se sustituye por una paráfrasis totalmente idiomática, porque eso ocultaría el rasgo textual documentado y reduciría la auditabilidad de la traducción.
  doctrine_reference: Principio POB de trazabilidad textual y equivalencia óptima
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés, especialmente en la elección de un verbo más cercano a la raíz para תְּרוּעָה y en la naturalización moderada de la frase sobre la muralla, sin borrar su carácter inusual. También mantiene la secuencia narrativa breve y acumulativa del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; aquí no aparece.
  - Se mantiene «trompeta/trompetas» como equivalente funcional de שׁוֹפָר, con nota cultural para la opción más específica.
  - Se conserva la repetición de «el pueblo» de forma deliberada, porque el hebreo repite הָעָם con fuerza narrativa.
  - «Tomaron» se eligió por naturalidad en español, aunque «capturaron» sería una alternativa válida más explícita militarmente.
