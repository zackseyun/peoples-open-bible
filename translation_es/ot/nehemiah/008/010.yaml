translation:
  language: es
  text: 'Entonces les dijo: «Vayan, coman alimentos ricos y beban bebidas dulces, y envíen porciones a cualquiera[a] para quien nada está preparado, porque este día es santo para nuestro Señor. No se entristezcan[b], porque el gozo de Yahvé[c] es su fortaleza».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a aquel para quien nada está preparado».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no se aflijan» o «no se apenen».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «el gozo en Yahvé es su fortaleza».'
    reason: alternative_reading
lexical_decisions:
- source_word: מַשְׁמַנִּים
  english_pob_choice: rich food
  chosen_spanish: alimentos ricos
  alternatives_spanish:
  - comida rica
  - manjares ricos
  lexicon: HALOT
  rationale: El término alude literalmente a cosas grasosas o ricas; en contexto festivo, la idea es de comida abundante y celebratoria. «Alimentos ricos» conserva ese matiz sin volverlo áspero en español.
- source_word: מַֽמְתַקִּים
  english_pob_choice: sweet drinks
  chosen_spanish: bebidas dulces
  alternatives_spanish:
  - cosas dulces
  - vino dulce
  lexicon: HALOT
  rationale: El paralelo con «coman» y «beban» favorece explicitar el sustantivo implícito. «Bebidas dulces» mantiene la amplitud del hebreo sin estrecharlo innecesariamente a «vino».
- source_word: מָנוֹת
  english_pob_choice: portions
  chosen_spanish: porciones
  alternatives_spanish:
  - raciones
  - partes
  lexicon: HALOT
  rationale: En un contexto de banquete, se trata de porciones distribuidas a otros, especialmente de comida. «Porciones» es natural y conserva la idea de reparto.
- source_word: לְאֵין נָכוֹן לוֹ
  english_pob_choice: to anyone for whom nothing is prepared
  chosen_spanish: a aquel para quien nada está preparado
  alternatives_spanish:
  - a quien nada se ha preparado
  - a quien no tiene nada listo
  lexicon: HALOT
  rationale: La frase hebrea expresa falta de preparación, no posesión. «Para quien nada está preparado» refleja con precisión esa relación y evita cambiar el sentido a mera carencia material.
- source_word: קָדוֹשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - consagrado
  - sagrado
  lexicon: HALOT
  rationale: «Santo» es el equivalente más natural y teológicamente cargado para un día apartado para Dios. Mantiene la fuerza cultual del hebreo.
- source_word: לַאֲדֹנֵינוּ
  english_pob_choice: to our Lord
  chosen_spanish: para nuestro Señor
  alternatives_spanish:
  - para nuestro Dueño
  - para nuestro Amo
  lexicon: HALOT
  rationale: Aquí אֲדֹנֵינוּ funciona como título reverencial aplicado a Dios. «Señor» comunica bien el registro culto en español.
- source_word: תֵּעָצֵבוּ
  english_pob_choice: do not be grieved
  chosen_spanish: no se entristezcan
  alternatives_spanish:
  - no se aflijan
  - no se afanen
  lexicon: HALOT
  rationale: El verbo expresa dolor o aflicción emocional. «Entristecerse» es idiomático en español y conserva el tono afectivo del mandato.
- source_word: חֶדְוַת
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - regocijo
  lexicon: HALOT
  rationale: «Gozo» preserva el registro bíblico y la conexión con la causa de fortaleza del versículo. También deja intacta la relación constructa con el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en su forma española establecida por el proyecto. Esto evita la sustitución por un título y mantiene visible el Tetragrámaton.
- source_word: מָעֻזְּכֶם
  english_pob_choice: your stronghold
  chosen_spanish: su fortaleza
  alternatives_spanish:
  - su refugio
  - su baluarte
  lexicon: HALOT
  rationale: El sustantivo apunta a un lugar o fuente de fuerza, una fortaleza. «Fortaleza» conserva la metáfora concreta y funciona con naturalidad en español.
theological_decisions:
- issue: Relación entre חֶדְוַת יְהוָה y la fortaleza del pueblo
  english_pob_reading: the joy of Yahweh is your stronghold
  chosen_spanish_reading: el gozo de Yahvé es su fortaleza
  alternative_spanish_readings:
  - el gozo en Yahvé es su fortaleza
  - el gozo de Yahvé es su refugio
  rationale: Se mantiene la lectura constructa directa del hebreo, sin resolver la tensión interpretativa hacia una paráfrasis devocional. Esto preserva tanto el vínculo con Yahvé como la imagen de fortaleza.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton. En español del proyecto, se reproduce como «Yahvé» para hacer visible el nombre personal de Dios sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Título reverencial לַאֲדֹנֵינוּ
  english_pob_reading: to our Lord
  chosen_spanish_reading: para nuestro Señor
  alternative_spanish_readings:
  - para nuestro Señor Dios
  - para nuestro Amo
  rationale: En este contexto litúrgico, el título se refiere a Dios y debe sonar reverencial en español. «Señor» mantiene el valor de título divino sin diluirlo en un vocablo meramente social.
  doctrine_reference: 'Project terminology defaults: אדון/κύριος as divine title when context warrants'
translation_notes:
  revision_awareness: La versión en inglés fue ajustada para acercarse más al hebreo en la frase de destinatario («for whom nothing is prepared»). En español se siguió esa corrección con una construcción equivalente («para quien nada está preparado»), y se mantuvo la tensión interpretativa de חֶדְוַת יְהוָה mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma española del nombre divino, conforme al estándar del proyecto.
  - Se conserva «Señor» para לַאֲדֹנֵינוּ por tratarse de un título reverencial dirigido a Dios.
  - «Gozo» y «fortaleza» mantienen la imagen hebrea de causa y efecto sin reinterpretarla como mera emoción interior.
