base_translation:
  language: en
  yaml_path: translation/ot/2_kings/003/021.yaml
  text: Now all Moab heard that the kings had come up to fight against them[a], and they gathered together, everyone who could put on a belt and upward[b], and they stood at the border.
  footnotes:
  - marker: a
    text: Hebrew literally, 'from every one girding a belt and upward,' an idiom for those of military age and older.
    reason: cultural_note
  - marker: b
    text: Or 'they were called together' / 'they were mustered.' The Hebrew verb here likely refers to mobilization rather than simply crying out.
    reason: lexical_alternative
