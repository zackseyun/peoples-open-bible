translation:
  language: es
  text: Así, dos o tres ciudades iban tambaleándose a una sola ciudad para beber agua[a], pero no quedaron satisfechas; sin embargo, no volvieron a mí[b], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se tambaleaban» o «vacilaban». El hebreo וְנָעוּ sugiere un movimiento inestable, de un lado a otro, en busca de agua.
    reason: lexical_alternative
  - marker: b
    text: O «no se volvieron a mí» o «no regresaron a mí». En Amós, «volver» conserva el matiz de retorno a Dios en sentido de alianza, no solo de regreso físico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָעוּ
  english_pob_choice: staggered
  chosen_spanish: se tambaleaban
  alternatives_spanish:
  - andaban tambaleándose
  - se trastabillaban
  - vacilaban
  lexicon: HALOT
  rationale: נוע expresa movimiento inestable o de un lado a otro. «Se tambaleaban» conserva la idea de andar sin firmeza, adecuada al contexto de sequía y a la revisión inglesa que prefirió una imagen más física que «wandered».
- source_word: שְׁתַּיִם שָׁלֹשׁ עָרִים
  english_pob_choice: two or three cities
  chosen_spanish: dos o tres ciudades
  alternatives_spanish:
  - dos, tres ciudades
  lexicon: HALOT
  rationale: La pareja numérica hebrea es idiomática e indefinida. En español, «dos o tres ciudades» comunica naturalmente la pequeñez imprecisa del número.
- source_word: אֶל עִיר אַחַת
  english_pob_choice: to one city
  chosen_spanish: hacia una sola ciudad
  alternatives_spanish:
  - a una sola ciudad
  - hacia una ciudad
  lexicon: HALOT
  rationale: El hebreo marca dirección. «Hacia una sola ciudad» preserva el movimiento convergente de varias ciudades hacia un único lugar, con fluidez natural en español.
- source_word: לִשְׁתּוֹת מַיִם
  english_pob_choice: to drink water
  chosen_spanish: para beber agua
  alternatives_spanish:
  - a beber agua
  - para tomar agua
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. «Para beber agua» suena natural en español y mantiene el sentido directo del objeto מים sin introducir una paráfrasis.
- source_word: וְלֹא יִשְׂבָּעוּ
  english_pob_choice: but they were not satisfied
  chosen_spanish: pero no quedaban satisfechas
  alternatives_spanish:
  - pero no se saciaban
  - pero no se veían satisfechas
  lexicon: HALOT
  rationale: שׂבע puede significar saciarse o quedar satisfecho. «No quedaban satisfechas» preserva la insuficiencia del agua sin reducirlo solo a la sed física, en línea con la elección inglesa de mantener amplitud semántica.
- source_word: וְלֹא שַׁבְתֶּם עָדַי
  english_pob_choice: yet you did not return to me
  chosen_spanish: y no volvíais a mí
  alternatives_spanish:
  - y no volvisteis a mí
  - y no regresabais a mí
  - y no volvíais a mí
  lexicon: HALOT
  rationale: שׁוב con עַדִי en contexto profético suele tener fuerza de retorno/cambio de rumbo covenantal. «Volvíais a mí» conserva esa tensión sin cerrar el sentido con una paráfrasis doctrinalmente más explícita como «arrepentíos».
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se traduce de forma solemne y contemporánea. Se mantiene el nombre divino «Yahvé» según la política terminológica del proyecto, en lugar de sustituirlo por un título.
theological_decisions:
- issue: Fuerza covenantal de שׁוב
  english_pob_reading: return to me
  chosen_spanish_reading: no volvíais a mí
  alternative_spanish_readings:
  - no regresabais a mí
  - no volvías a mí
  rationale: El hebreo puede referir tanto retorno físico como vuelta de alianza/obediencia. En Amós el sentido teológico de volver a Dios está presente, pero el español debe preservar la ambivalencia sin resolverla con «arrepentíos».
  doctrine_reference: Translation philosophy §3; mantener la tensión lexical y teológica en vez de explicitarla de más
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton. Conforme a la terminología del proyecto, se vierte como «Yahvé» para preservar el nombre personal de Dios en vez de una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה/YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente que prefirió una imagen física más fuerte para וְנָעוּ. También refleja la decisión auditada de traducir el nombre divino como Yahvé y de conservar el matiz covenantal de שׁוב sin reemplazarlo por una paráfrasis doctrinal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente con la política terminológica del proyecto.
  - «Volvíais a mí» conserva la segunda persona plural del hebreo y su fuerza profética.
  - «No quedaban satisfechas» evita estrechar שׂבע solo a saciedad física inmediata.
  - Las comillas y el guion largo en la fórmula final buscan claridad editorial sin alterar el contenido bíblico.
