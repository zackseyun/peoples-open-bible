theological_decisions:
- issue: Agency behind the Egyptians' compulsion and forgetfulness
  chosen_reading: The verse states that a morally deserved necessity drove them and brought forgetfulness upon them, without explicitly naming God as grammatical subject.
  alternative_readings:
  - God implicitly drove them by providence
  - their own fate or guilt drove them impersonally
  rationale: The Greek personifies necessity and forgetfulness rather than directly naming divine agency. The translation preserves that literary-theological tension instead of resolving it into an explicit statement about God.
  doctrine_reference: Preserve theological tension rather than resolve it.
