revisions:
- from: 'Y la batalla en Babilonia contra los galatas siguió así: cuando todos los que habían venido al auxilio eran ocho mil[a], junto con cuatro mil macedonios, y los macedonios estaban muy apurados, los seis mil destruyeron a los ciento veinte mil por la ayuda que les venía del cielo, y recibieron gran provecho.'
  to: 'Y la batalla en Babilonia contra los Gálatas[a] fue así: cuando todos los que habían venido al auxilio eran ocho mil, junto con cuatro mil macedonios, y los macedonios estaban en apuros, los seis mil destruyeron a los ciento veinte mil por la ayuda que les venía del cielo, y recibieron gran ventaja.'
  rationale: Se corrigió la ortografía y capitalización del etnónimo a «Gálatas» y se ajustó la nota para preservar la alternativa real «galos». Se cambió «siguió así» por «fue así» para reflejar mejor la función explicativa de γενομένην con ὡς. «Estaban muy apurados» se elevó a «estaban en apuros» para un registro más digno y menos coloquial. «Gran provecho» se sustituyó por «gran ventaja» para reflejar mejor ὠφέλειαν en contexto militar.
