revisions:
- from: Así que ahora llamamos bienaventurados a los arrogantes[a]; los que hacen maldad son incluso levantados[b]; incluso ponen a prueba a Dios[c] y escapan.
  to: Y ahora llamamos bienaventurados[a] a los arrogantes; hasta los que hacen maldad prosperan[b]; hasta ponen a prueba a Dios[c] y escapan.
  rationale: Se ajusta «Así que ahora» a «Y ahora» por mayor naturalidad en español. Se reemplaza «son incluso levantados» por «prosperan» porque comunica mejor el sentido contextual de נִבְנוּ; la nota conserva la imagen literal de ser edificados/establecidos, en línea con la decisión inglesa de mantener la tensión léxica mediante nota. Se conservan las demás decisiones principales del borrador, que sí reflejan fielmente el hebreo y el audit trail.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:44:20Z'
