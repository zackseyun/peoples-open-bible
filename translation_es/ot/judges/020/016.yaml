translation:
  language: es
  text: De todo este pueblo[a], quedaron setecientos hombres escogidos, que eran zurdos[b]; cada uno de ellos podía lanzar con honda una piedra a un cabello y no fallar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «de entre todo este pueblo». El hebreo expresa un sentido partitivo: «de todo este pueblo».'
    reason: lexical_alternative
  - marker: b
    text: Lit. «restringidos o impedidos en la mano derecha»; el hebreo probablemente implica combate con la izquierda, de ahí «zurdos».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכֹּל הָעָם הַזֶּה
  english_pob_choice: From all this people
  chosen_spanish: De todo este pueblo
  alternatives_spanish:
  - De entre todo este pueblo
  - De todo este pueblo reunido
  lexicon: HALOT
  rationale: La construcción es partitiva y conviene conservarla con «de todo». «Pueblo» refleja bien עָם sin convertirlo en «tropas», que sería más interpretativo.
- source_word: שְׁבַע מֵאוֹת אִישׁ
  english_pob_choice: seven hundred ... men
  chosen_spanish: setecientos hombres
  alternatives_spanish:
  - setecientos varones
  - setecientos guerreros
  lexicon: HALOT
  rationale: אִישׁ funciona aquí como conteo de adultos varones. «Hombres» es natural y fiel; «guerreros» añadiría un matiz no expresado explícitamente.
- source_word: בָּחוּר
  english_pob_choice: chosen
  chosen_spanish: escogidos
  alternatives_spanish:
  - elegidos
  - seleccionados
  lexicon: HALOT
  rationale: El participio/adjetivo indica hombres seleccionados. «Escogidos» mantiene la idea de selección sin sonar demasiado técnico.
- source_word: אִטֵּר יַד יְמִינוֹ
  english_pob_choice: were left-handed
  chosen_spanish: eran zurdos
  alternatives_spanish:
  - tenían impedida la mano derecha
  - eran zurdos de la mano derecha
  - estaban impedidos en su mano derecha
  lexicon: HALOT
  rationale: La POB en inglés opta por el sentido idiomático natural («left-handed») aunque anota la forma más literal del hebreo. En español, «zurdos» comunica el resultado funcional del giro sin ocultar la base textual; se conserva la alternativa más literal en nota.
- source_word: כָּל זֶה
  english_pob_choice: every one of these
  chosen_spanish: todos estos
  alternatives_spanish:
  - cada uno de ellos
  - todos ellos
  lexicon: HALOT
  rationale: El sentido distributivo puede expresarse de manera fluida con «todos estos». La construcción mantiene el referente cercano y la distribución individual del original.
- source_word: קֹלֵעַ בָּאֶבֶן
  english_pob_choice: could sling a stone
  chosen_spanish: lanzaban una piedra
  alternatives_spanish:
  - podían lanzar una piedra
  - tiraban una piedra con honda
  - eran hábiles para lanzar una piedra
  lexicon: HALOT
  rationale: El participio describe una habilidad característica. «Lanzaban una piedra» reproduce la acción de forma clara; en español «honda» podría añadirse, pero el hebreo no la menciona aquí explícitamente.
- source_word: אֶל הַשַּׂעֲרָה
  english_pob_choice: at a hair
  chosen_spanish: al cabello
  alternatives_spanish:
  - a un cabello
  - a un pelo
  - a un cabello de distancia
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo singular con artículo para expresar precisión extrema. «Al cabello» conserva la imagen concreta sin convertirla en la equivalencia idiomática española «a un pelo», que sería menos transparente.
- source_word: וְלֹא יַחֲטִא
  english_pob_choice: and not miss
  chosen_spanish: y no erraban
  alternatives_spanish:
  - y no fallaban
  - y no acertaban mal
  - y no se equivocaban
  lexicon: HALOT
  rationale: Aquí חטא tiene el sentido concreto de «fallar el blanco». «Erraban» mantiene la idea de no fallar y suena natural en español bíblico moderno; evita la lectura moral de «pecar».
theological_decisions:
- issue: 'אִטֵּר יַד יְמִינוֹ: literalidad del hebreo vs. sentido idiomático'
  english_pob_reading: were left-handed, with a note that the Hebrew more literally says they were restricted or impeded in the right hand
  chosen_spanish_reading: eran zurdos, con nota sobre la restricción o impedimento de la mano derecha
  alternative_spanish_readings:
  - eran impedidos en la mano derecha
  - tenían la mano derecha restringida
  - eran diestros impedidos
  rationale: 'No hay una cuestión doctrinal, pero sí una tensión lexical importante: el hebreo no usa la afirmación positiva directa «zurdos», aunque el contexto militar la implica. Siguiendo la revisión inglesa, se adopta el sentido natural en el texto y se preserva la forma más cercana en nota para no borrar la tensión.'
  doctrine_reference: Lexical/grammatical note, no doctrinal controversy
- issue: 'וְלֹא יַחֲטִא: valor concreto de חטא en contexto militar'
  english_pob_reading: and not miss
  chosen_spanish_reading: y no erraban
  alternative_spanish_readings:
  - y no fallaban
  - y no perdían el blanco
  - y no pecaban
  rationale: La palabra hebrea puede significar pecado en otros contextos, pero aquí el contexto de tiro con piedra exige el sentido concreto de «fallar el blanco». Se evita la lectura moral y se conserva la imagen de precisión.
  doctrine_reference: Lexical context, not a theological doctrine issue
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que optó por el sentido idiomático de אִטֵּר יַד יְמִינוֹ como «left-handed» en lugar de una literalidad más dura. También conserva el valor concreto de חטא como «miss» en contexto de puntería. La versión española intenta reflejar esa misma combinación de naturalidad y transparencia textual.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al Tetragrámaton; este versículo no lo contiene.
  - Se evita «Cristo» y otras terminologías no pertinentes.
  - «Escogidos» traduce בָּחוּר en armonía con el registro bíblico y sin añadir connotaciones eclesiales.
  - La imagen de «al cabello» se mantiene para preservar la precisión del hebreo; no se amplifica a una perífrasis idiomática más libre.
