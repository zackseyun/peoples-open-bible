  glossary_alignment: No hay conflicto relevante con el glosario del proyecto. θεός → «Dios» y κύριος → «Señor» están bien aquí; no se trata del nombre divino Yahvé en el texto fuente. La bendición con «Señor Todopoderoso» es adecuada para παντοκράτορι κυρίῳ.
