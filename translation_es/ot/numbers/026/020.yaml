review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva la estructura censal básica del hebreo y mantiene bien «Los hijos de Judá por sus clanes fueron». Sin embargo, se aparta innecesariamente del rastro auditado del POB y del hebreo en varios nombres propios: «Fares» sustituye a la forma más directamente alineada con פֶרֶץ/English POB «Perez»; además la nota [b] queda mal anclada, porque está puesta en «Zéraj» pero habla de «Fares». «Zéraj» y «zarjitas» también son transliteraciones poco naturales para español e introducen una forma no respaldada por el POB en inglés.'
  spanish_quality_summary: 'El español es mayormente legible, pero varios nombres suenan artificiosos o poco eclesialmente claros: «faretitas» y «zarjitas» son especialmente problemáticos. Para español bíblico claro y fiel, conviene usar «Pérez»/«perezitas» y «Zérah»/«zerahitas» (o una forma equivalente coherente), manteniendo el paralelismo del versículo. También debe corregirse la ubicación de la nota [b].'
  glossary_alignment: No hay términos teológicos mayores en juego, pero sí importa seguir la política de trabajar desde la evidencia fuente y el audit trail inglés. El POB inglés prefirió «Perez» sobre formas tradicionales como «Pharez»; por tanto, la adopción de «Fares» contradice la decisión documentada sin razón suficiente. La nota alternativa sobre la tradición más antigua debe conservarse, pero anclada en «Pérez», no en «Zérah».
  issues:
  - severity: high
    issue: Se usa «Fares» en lugar de una forma alineada con el hebreo/POB «Perez».
    rationale: La decisión documentada en inglés prefirió Perez frente a formas tradicionales derivadas de la tradición griega/latina. «Fares» se aparta de esa racionalidad sin necesidad y afecta también al gentilicio.
  - severity: high
    issue: La nota [b] está anclada al nombre equivocado.
    rationale: En el texto español [b] aparece tras «Zéraj», pero su contenido habla del nombre tradicional «Fares», que corresponde a Perez. Esto produce una incoherencia formal y semántica.
  - severity: medium
    issue: «Zéraj» y «zarjitas» son poco naturales en español bíblico general.
    rationale: Aunque buscan cercanía al hebreo, estas formas no son las más legibles para un público eclesial amplio. Conviene una transliteración más transparente y estable.
  - severity: medium
    issue: «faretitas» resulta poco claro y morfológicamente forzado.
    rationale: Es un gentilicio creado para sostener «Fares», pero suena artificial. «perezitas» preserva mejor la relación derivativa y es más natural en español.
  revised_spanish_text: 'Los hijos de Judá por sus clanes fueron: de Sela[a], el clan de los selanitas; de Pérez[b], el clan de los perezitas; de Zérah, el clan de los zerahitas.'
  revised_footnotes:
