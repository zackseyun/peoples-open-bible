translation:
  language: es
  text: para librar su alma[a] de la muerte y para mantenerlos con vida en hambruna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su vida» o «sus vidas» para «su alma»; el hebreo nephesh puede denotar el alma, la persona o la vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַצִּיל
  english_pob_choice: to deliver
  chosen_spanish: librar
  alternatives_spanish:
  - deliver
  - rescatar
  - salvar
  lexicon: HALOT
  rationale: El hifil infinitivo de נצל expresa causar escape o librar. En español, «librar» comunica bien esa acción sin cargar innecesariamente el verbo con matices soteriológicos ajenos al contexto poético.
- source_word: מִמָּוֶת
  english_pob_choice: from death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - de morir
  - de la muerte
  lexicon: HALOT
  rationale: La construcción preposicional indica separación clara respecto de la muerte. «De la muerte» conserva la concisión y el paralelismo del hebreo.
- source_word: נַפְשָׁם
  english_pob_choice: their soul
  chosen_spanish: su alma
  alternatives_spanish:
  - su vida
  - sus vidas
  - su ser
  lexicon: HALOT
  rationale: נֶפֶשׁ puede referirse al alma, la vida o la persona. Aquí se conserva «alma» por fidelidad formal al término hebreo; el plural posesivo se expresa naturalmente en español con «su» en referencia a un sujeto plural.
- source_word: וּלְחַיּוֹתָם
  english_pob_choice: and to keep them alive
  chosen_spanish: y para mantenerlos con vida
  alternatives_spanish:
  - y para conservarlos con vida
  - y para sostenerlos
  - y para preservarlos
  lexicon: HALOT
  rationale: El infinitivo piel de חיה significa mantener o conservar con vida. «Mantenerlos con vida» suena natural en español y reproduce la idea de preservación continua.
- source_word: בָּרָעָב
  english_pob_choice: in famine
  chosen_spanish: en tiempo de hambre
  alternatives_spanish:
  - en hambre
  - durante el hambre
  - en tiempo de escasez
  lexicon: HALOT
  rationale: רָעָב suele denotar hambruna o hambre severa. «En tiempo de hambre» transmite ese sentido de crisis sin sonar demasiado técnico, y evita reducirlo a hambre ordinaria.
theological_decisions:
- issue: Alcance de נֶפֶשׁ (alma/vida/persona)
  english_pob_reading: their soul, with footnote acknowledging 'their life' or 'their lives'
  chosen_spanish_reading: su alma, con nota que reconoce 'su vida' o 'sus vidas'
  alternative_spanish_readings:
  - su vida
  - sus vidas
  - su ser
  rationale: El hebreo nephesh mantiene una amplitud semántica real que no debe ocultarse. La lectura principal conserva «alma» por cercanía al término original, mientras la nota preserva la alternativa semántica válida en contexto.
  doctrine_reference: Antropología bíblica; semántica de נֶפֶשׁ
- issue: Preservación de la vida en contexto de juicio/escasez
  english_pob_reading: to keep them alive in famine
  chosen_spanish_reading: para mantenerlos con vida en tiempo de hambre
  alternative_spanish_readings:
  - para preservarlos con vida en hambruna
  - para conservarlos con vida en hambre
  rationale: La frase subraya preservación concreta frente a una amenaza real. «Tiempo de hambre» comunica el contexto de escasez severa sin alterar el sentido ni introducir interpretación adicional.
  doctrine_reference: Providencia divina y preservación de la vida
- issue: Tensión entre 'alma' y 'vida'
  english_pob_reading: Or 'their life' or 'their lives' for 'their soul'; Hebrew nephesh can denote the soul, self, or life.
  chosen_spanish_reading: Conservar 'alma' en el texto, con nota alternativa sobre 'vida'
  alternative_spanish_readings:
  - '''vida'''
  - '''vidas'''
  rationale: La POB inglesa preserva la tensión lexical de nephesh; la traducción española hace lo mismo para no resolver artificialmente una ambigüedad semítica que el hebreo mantiene abierta.
  doctrine_reference: Semántica léxica de נֶפֶשׁ
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa muestran alta concordancia; no se requieren revisiones sustantivas. Se mantuvo la tensión lexical de נֶפֶשׁ con una nota, siguiendo la práctica auditada de la POB inglesa.
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica en este versículo porque no aparece el nombre divino en el hebreo fuente.
  - Se eligió «alma» para נֶפֶשׁ por fidelidad formal, mientras la nota preserva la alternativa semántica de «vida»/«vidas».
  - «Mantenerlos con vida» refleja el valor factitivo de חיה en un registro natural para el español bíblico contemporáneo.
  - «En tiempo de hambre» conserva el sentido de רָעָב como hambruna o escasez severa.
