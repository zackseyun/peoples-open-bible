translation:
  language: es
  text: 'Hizo los utensilios de oro puro que estaban sobre la mesa: sus platos[a], sus copas, sus jarros y sus cuencos con los que se derramaban las ofrendas de libación.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus platos, sus cuencos pequeños, sus jarros y sus cuencos'. Varios nombres de recipientes en este versículo son raros o de función incierta, así que las equivalencias exactas son aproximadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֵּלִים
  english_pob_choice: the utensils
  chosen_spanish: los utensilios
  alternatives_spanish:
  - los vasos
  - los objetos
  - las piezas
  lexicon: HALOT
  rationale: כֵּלִים es un término amplio para implementos o recipientes. 'Utensilios' conserva amplitud y suena natural en español sin volverlo genérico en exceso.
- source_word: אֲשֶׁר עַל הַשֻּׁלְחָן
  english_pob_choice: that were on the table
  chosen_spanish: que estaban sobre la mesa
  alternatives_spanish:
  - que estaban en la mesa
  - para la mesa
  - pertenecientes a la mesa
  lexicon: HALOT
  rationale: La relación espacial del hebreo se expresa de forma natural con 'sobre la mesa', manteniendo la idea de ubicación sin interpretar más de la cuenta.
- source_word: קְעָרֹתָיו
  english_pob_choice: its plates
  chosen_spanish: sus platos
  alternatives_spanish:
  - sus platos hondos
  - sus platos de servir
  - sus vasijas
  lexicon: HALOT
  rationale: El término puede referirse a un recipiente o plato. 'Platos' es la opción más clara y cercana al valor de mesa/servicio que el contexto sugiere.
- source_word: כַּפֹּתָיו
  english_pob_choice: its cups
  chosen_spanish: sus copas
  alternatives_spanish:
  - sus tazas
  - sus cuencos pequeños
  - sus cucharillas
  lexicon: HALOT
  rationale: Aunque el término se relaciona etimológicamente con 'palma' o 'cuchara', en este contexto de ajuar cultual la función de recipiente pequeño es más probable. 'Copas' evita un calco extraño y conserva una pieza de vajilla ritual.
- source_word: מְנַקִּיֹּתָיו
  english_pob_choice: its jars
  chosen_spanish: sus jarros
  alternatives_spanish:
  - sus jarras
  - sus vasijas
  - sus frascos
  lexicon: HALOT
  rationale: El inglés revisado prefirió 'jars' frente a 'pitchers'. En español, 'jarros' transmite bien un recipiente de vertido y sigue siendo compatible con la rareza del término hebreo.
- source_word: הַקְּשָׂוֹת
  english_pob_choice: its bowls
  chosen_spanish: sus tazones
  alternatives_spanish:
  - sus bowls
  - sus cuencos
  - sus recipientes
  lexicon: HALOT
  rationale: En una lista de objetos de mesa, 'tazones' es un equivalente claro y digno para un recipiente abierto. Se evita 'bowls' por anglicismo.
- source_word: אֲשֶׁר יֻסַּךְ בָּהֵן
  english_pob_choice: with which drink offerings were poured out
  chosen_spanish: con los que se derramaban las ofrendas de libación
  alternatives_spanish:
  - con los que se vertían las libaciones
  - con los que se derramaban las ofrendas de bebida
  - con los que se hacía la libación
  lexicon: HALOT
  rationale: יַסַּךְ en pasivo remite a verter una libación. 'Ofrendas de libación' conserva el sentido cultual; 'se derramaban' refleja bien el pasivo hebreo sin forzar un sujeto explícito.
- source_word: זָהָב טָהוֹר
  english_pob_choice: of pure gold
  chosen_spanish: de oro puro
  alternatives_spanish:
  - de oro refinado
  - de oro limpio
  lexicon: HALOT
  rationale: La fórmula material final se vierte de modo directo y natural como 'oro puro', siguiendo la equivalencia estándar sin perder énfasis en la pureza del material.
translation_notes:
  revision_awareness: El inglés POB revisó קְשָׂוֹת de 'flagons/pitchers' a 'jars' y ajustó la cláusula final a un pasivo plural ('drink offerings were poured out'). La versión española adopta esa revisión con 'jarros' y 'se derramaban las ofrendas de libación', manteniendo la cautela sobre el valor exacto de varios términos de recipientes.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrámaton en el proyecto, pero este versículo no lo contiene.
  - Se usa 'ofrendas de libación' para conservar el sentido cultual de נסך sin volverlo una explicación larga.
  - '''Copas'', ''jarros'' y ''tazones'' reflejan la variedad de recipientes sin homogenizar los términos raros.'
