    issue: «Asno montés» es menos claro y menos natural que «asno salvaje» para un público amplio.
    rationale: Aunque no es incorrecto, «montés» puede sonar más literario o regional y no comunica tan inmediatamente la idea de animal silvestre como «salvaje». Dado que el inglés auditado usa «wild donkey» y la nota ya ofrece «asno salvaje» como alternativa, conviene llevar esa opción al texto principal.
  - severity: low
