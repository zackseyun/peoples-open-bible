translation:
  language: es
  text: 'Entonces el rey de Israel dijo a Josafat[a]: «Disfrázate y entra en la batalla; pero tú, ponte tus vestiduras». Así el rey de Israel se disfrazó y entró en la batalla.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo también puede entenderse como una primera persona: «Me disfrazaré y entraré en la batalla»; la cláusula siguiente —«Así el rey de Israel se disfrazó»— apoya fuertemente esa lectura.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִתְחַפֵּשׂ
  english_pob_choice: Disguise yourself / disguised himself
  chosen_spanish: Despójate / se disfrazó
  alternatives_spanish:
  - vístete de incógnito / fue en incógnito
  - cámbiate de apariencia / cambió de apariencia
  lexicon: HALOT
  rationale: El hebreo permite una ambigüedad de persona en el imperativo inicial, pero el flujo narrativo y la acción siguiente muestran que el rey de Israel habla de su propia estrategia; por eso en la segunda cláusula se refleja con claridad como acción reflexiva («se disfrazó»). Para la primera cláusula, el español mantiene la tensión textual con una forma imperativa natural que no obliga a resolver aún la ambigüedad de manera explícita en la superficie del texto.
- source_word: וָבֹא
  english_pob_choice: and go
  chosen_spanish: entra
  alternatives_spanish:
  - y entra
  - y ve
  lexicon: HALOT
  rationale: El valor verbal continúa la instrucción dentro del contexto bélico. En español, «entra en la batalla» expresa de manera natural el movimiento hacia el combate y conserva la direccionalidad del hebreo.
- source_word: בַמִּלְחָמָה
  english_pob_choice: into the battle
  chosen_spanish: en la batalla
  alternatives_spanish:
  - a la batalla
  - dentro de la batalla
  lexicon: HALOT
  rationale: El sustantivo מלחמה se traduce aquí como «batalla» por el contexto militar concreto. La preposición hebrea, combinada con el verbo de movimiento, puede expresarse en español con «entra en la batalla» sin perder el sentido de ingreso al combate.
- source_word: וְאַתָּה
  english_pob_choice: but you
  chosen_spanish: pero tú
  alternatives_spanish:
  - y tú
  - mientras tú
  lexicon: HALOT
  rationale: 'La partícula es contrastiva: lo que Ahab planea para sí contrasta con lo que Josafat debe hacer. «Pero tú» reproduce ese contraste de forma clara y idiomática en español.'
- source_word: לְבַשׁ בְּגָדֶיךָ
  english_pob_choice: put on your robes
  chosen_spanish: vístete tus ropas
  alternatives_spanish:
  - ponte tus vestidos
  - viste tus prendas
  lexicon: HALOT
  rationale: בְּגָדִים es un término general para «prendas/ropas». Se evita «roba[s]» o «vestiduras» como términos eclesiásticos o excesivamente arcaizantes, pero se conserva la referencia a la ropa visible que contrasta con el disfraz. La forma reflexiva «vístete» transmite bien la instrucción.
- source_word: וַיִּתְחַפֵּשׂ
  english_pob_choice: disguised himself
  chosen_spanish: se disfrazó
  alternatives_spanish:
  - se ocultó bajo otro aspecto
  - cambió su apariencia
  lexicon: HALOT
  rationale: La narración confirma la decisión del rey de Israel. «Se disfrazó» es la correspondencia más directa y natural en español para la acción reflexiva del verbo.
- source_word: וַיָּבֹא בַּמִּלְחָמָה
  english_pob_choice: went into the battle
  chosen_spanish: entró en la batalla
  alternatives_spanish:
  - fue a la batalla
  - se metió en la batalla
  lexicon: HALOT
  rationale: La combinación de verbo de movimiento con «batalla» se expresa con naturalidad como «entró en la batalla», preservando la dirección y la reiteración narrativa del hebreo.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante: la lectura inicial inclinada a primera persona («I will disguise myself») fue corregida en el texto inglés a un imperativo («Disguise yourself») por decisión del revisor, aunque la nota conserva la ambigüedad y la fuerte apoyo contextual de la narración siguiente. La versión española preserva esa tensión al reflejar el imperativo en la superficie del diálogo y al mantener la acción narrativa final en tercera persona reflexiva.'
  spanish_consistency_notes:
  - Se mantiene «rey de Israel» y «Josafat» de forma consistente con la designación del texto fuente.
  - Se usa «batalla» para מלחמה en todo el versículo, evitando alternar con «guerra» para conservar la repetición léxica.
  - Se evita «SEÑOR» o formas de sustitución para el nombre divino, que no aparece en este versículo.
  - El registro es sobrio y bíblico, pero con español moderno y legible para lectura eclesial amplia.
