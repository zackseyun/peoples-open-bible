revisions:
- from: Y el cerdo[a], porque tiene la pezuña dividida pero no rumia[b], es impuro para ustedes. No comerán nada de su carne, ni tocarán su cadáver.
  to: Y el cerdo[a], porque tiene la pezuña dividida pero no rumia[b], es inmundo para ustedes. No comerán nada de su carne, ni tocarán su cadáver.
  rationale: Se cambió 'impuro' por 'inmundo' para reflejar mejor la categoría ritual/legal de טָמֵא en este contexto de Torá y alinearse más estrechamente con la decisión POB 'unclean'. Se reparó la nota [b], que antes era circular e inútil, sustituyéndola por una alternativa léxica real para la expresión de rumiar. Se mantuvo el resto del texto, que es fiel y natural en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:06:34Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del hebreo: identifica al cerdo, da la razón causal (''porque''), conserva el criterio de la pezuña dividida, la falta de rumiar, el estado ritual, la prohibición de comer su carne y la prohibición de tocar su cuerpo muerto. Sin embargo, hay dos desajustes importantes con la evidencia y el rastro POB: (1) טָמֵא fue fijado en el POB inglés como ''unclean'', y en este contexto legal de Torá en español conviene ''impuro'' menos que ''inmundo'', pero el proyecto pide preservar la categoría ritual establecida; ''impuro'' es posible, aunque aquí ''inmundo'' refleja mejor el registro bíblico-jurídico. (2) La nota [b] está mal anclada y mal formulada: el texto español dice ''no rumia'', así que una nota ''Literalmente, “no rumia”'' no añade alternativa real y además en el inglés la nota lexical_alternative pertenece a ''chew the cud / does not chew cud'', no a una reiteración idéntica. Debe convertirse
    en una alternativa útil o eliminarse.'
  spanish_quality_summary: El español es claro y legible. 'El cerdo' y 'tiene la pezuña dividida' suenan naturales. 'No comerán nada de su carne' es comprensible, aunque 'no comerán de su carne' o 'no comerán nada de su carne' ambas funcionan; la forma actual expresa bien el partitivo prohibitivo. 'Su cadáver' es entendible, pero en este contexto legal animal 'su carroña' sería incorrecto y 'su cadáver' es menos idiomático que 'su carcasa' en algunos dialectos; sin embargo, 'carcasa' en español moderno suele referirse a caparazón/estructura, por lo que 'su cadáver' o mejor 'su cuerpo muerto' / 'su cadáver' son aceptables. La reparación principal necesaria es terminológica y de nota al pie.
  glossary_alignment: 'No aparecen términos del glosario mayor como Yahvé/Mesías. El punto clave es טָמֵא: para alinearse con la decisión teológica inglesa y el registro bíblico en español, se recomienda ''inmundo'' en vez de ''impuro''. ''Cerdo'' está bien para הַחֲזִיר. ''Rumia'' está bien para גֵרָה. ''Tocar'' está correctamente alineado con נגע. La nota alternativa para הַחֲזִיר puede mantenerse como ''puerco''.'
  issues:
  - severity: medium
    issue: '''impuro'' para טָמֵא debilita el registro bíblico-legal esperado en este contexto'
    rationale: Aunque 'impuro' no es falso, la decisión inglesa fijó 'unclean' como categoría ritual de ley alimentaria. En español bíblico, 'inmundo' comunica mejor esa categoría establecida sin moralizarla.
  - severity: medium
    issue: La nota [b] es defectuosa y no aporta una alternativa real
    rationale: El texto dice 'no rumia', y la nota repite 'Literalmente, “no rumia”'. Eso no preserva una alternativa léxica significativa ni sigue bien el audit trail inglés, donde la nota apunta a la expresión técnica de la rumia/cud.
  revised_spanish_text: Y el cerdo[a], porque tiene la pezuña dividida pero no rumia[b], es inmundo para ustedes. No comerán nada de su carne, ni tocarán su cadáver.
  revised_footnotes:
