review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro de auditoría inglés en la estructura condicional, la inspección sacerdotal, la no propagación de la afección, el enlucido de la casa, el pronunciamiento sacerdotal y la metáfora de sanidad. Sin embargo, hay un problema de anclaje y contenido de notas: la nota [a] está colocada sobre «ve», pero su contenido habla de alternativas para «examina/observa», mientras que la nota necesaria según la auditoría inglesa corresponde al acto de declarar limpia la casa; además, la nota [b] está anclada solo en «limpia», aunque su contenido trata toda la expresión verbal.'
  spanish_quality_summary: El español es claro y digno. «Pero si», «entra», «y he aquí», «no se ha extendido», «en la casa», «declarará limpia la casa» y «ha sanado» son naturales y fieles. Conviene reparar «después de haber sido enlucida», que deja el sujeto tácito algo colgante; «después de que la casa fue enlucida» o «después de haber sido enlucida la casa» suena mejor. También debe corregirse «una pronunciamiento» por «un pronunciamiento» en la nota.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La decisión clave de טִהַר como pronunciamiento ritual está bien preservada con «declarará limpia la casa». «La enfermedad» para הַנֶּגַע concuerda con la decisión auditada de evitar «plaga».
  issues:
  - severity: medium
    issue: La nota [a] no corresponde a la decisión significativa preservada en la auditoría inglesa.
    rationale: La nota inglesa marcada en el texto relevante trata la alternativa de «declarar limpia la casa» frente a «limpiar/purificar». En español, la nota [a] se puso en «ve» con una alternativa distinta, que no es necesaria y desplaza la nota relevante.
  - severity: medium
    issue: La nota [b] está mal enfocada y mal anclada.
    rationale: El contenido de la nota habla del valor ritual de todo «declarará limpia la casa», no solo del adjetivo «limpia». Debe anclarse a la frase verbal completa.
  - severity: low
    issue: La construcción «después de haber sido enlucida» suena incompleta.
    rationale: Aunque comprensible por contexto, en español resulta más natural explicitar «la casa» o usar una subordinada completa.
  - severity: low
    issue: 'Error gramatical en la nota: «una pronunciamiento».'
    rationale: Debe decir «un pronunciamiento».
  revised_spanish_text: Pero si el sacerdote entra y ve, y he aquí que la enfermedad no se ha extendido en la casa después de que la casa fue enlucida, entonces el sacerdote declarará limpia la casa[a], porque la enfermedad ha sanado.
  revised_footnotes:
  - marker: a
    text: O, «purificará la casa». El verbo hebreo puede denotar limpieza ritual o, en este contexto, un pronunciamiento sacerdotal de limpieza.
    reason: lexical_alternative
  revision_rationale: La revisión conserva el sentido del hebreo y la decisión teológica/lexical principal del POB, pero repara el sistema de notas para que refleje la alternativa significativa documentada y la ancla donde corresponde en el texto. También mejora la naturalidad de la cláusula sobre el enlucido de la casa.
