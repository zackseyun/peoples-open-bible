    issue: Coma innecesaria después de «estatutos»
    rationale: El hebreo fluye sin esa pausa, y la auditoría inglesa ya eliminó la coma antes de «for your good» para reflejar mejor el original. En español, la relativa especificativa «que yo te estoy mandando hoy» no debe ir separada por coma aquí.
  - severity: medium
    issue: Alternativa de nota «vigilar» es semánticamente inadecuada
    rationale: לִשְׁמֹר en este contexto de mandamientos expresa guardar/observar/cumplir, no vigilar. «Vigilar los mandamientos» suena antinatural y puede distorsionar el sentido.
  revised_spanish_text: para guardar[a] los mandamientos de Yahvé y sus estatutos que yo te estoy mandando hoy para tu bien.
  revised_footnotes:
  - marker: a
    text: O «observar» los mandamientos de Yahvé.
