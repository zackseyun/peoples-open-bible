review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el arameo y la POB inglesa en los puntos principales: «recibirán», «el reino», «del Altísimo», «poseerán» y la intensificación temporal final. Sin embargo, «los santos del Altísimo» en el texto principal estrecha levemente la opción preferida de la POB inglesa («the holy ones») y además la nota al pie repite la misma formulación del texto en vez de ofrecer la alternativa documentada.'
  spanish_quality_summary: El español es claro y digno, pero la puntuación y el anclaje de la nota pueden mejorarse. La secuencia «para siempre[a], por los siglos de los siglos» suena algo trabada; conviene reflejar mejor la intensificación con raya o coma sin separar artificialmente la nota del referente léxico principal. «Los santos» es comprensible, pero «los santos[a] del Altísimo» preserva mejor la ambigüedad del original y la rationale documentada.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. El punto clave es alinearse con la decisión léxica inglesa de קַדִּישֵׁי como «holy ones» más que cerrar hacia «saints» sin apoyo suficiente. En español, «santos» puede mantenerse si la nota preserve explícitamente «los santos» como alternativa y el texto principal use «los santos»? Mejor: usar «los santos[a] del Altísimo» no resuelve del todo el problema. Más fiel a la rationale sería «los santos[a] del Altísimo» con nota «O “los seres santos del Altísimo” / “los santos del Altísimo”». Pero para español natural y mínima intervención, conviene usar «los santos[a] del Altísimo» solo si la nota da una alternativa real. Aun mejor, «los santos[a] del Altísimo» sigue siendo menos transparente que «los santos del Altísimo». Dado el expediente inglés, la mejor reparación es «los santos[a] del Altísimo» con una nota que indique «O “los seres santos del Altísimo”».'
  issues:
  - severity: medium
    issue: La nota al pie no ofrece una alternativa real al texto principal.
    rationale: El texto principal ya dice «los santos del Altísimo», y la nota dice «O “los santos del Altísimo”», lo cual no cumple la función de preservar la alternativa léxica documentada.
  - severity: medium
    issue: El texto principal usa «santos» donde la POB inglesa prefirió «holy ones» para conservar transparencia y ambigüedad.
    rationale: Aunque «santos» es posible en español bíblico, la rationale auditada busca evitar asociaciones eclesiásticas posteriores y no cerrar el referente; conviene compensarlo con una nota bien formulada que preserve la opción más literal.
  - severity: low
    issue: La puntuación de la frase temporal puede pulirse.
    rationale: «para siempre[a], por los siglos de los siglos» es entendible, pero una raya refleja mejor la escalada enfática que ya está representada en el inglés con em dash.
  revised_spanish_text: Pero los santos[a] del Altísimo recibirán el reino y poseerán el reino para siempre, por los siglos de los siglos.
  revised_footnotes:
  - marker: a
    text: O «los seres santos del Altísimo». La expresión aramea puede referirse al pueblo santo de Dios; algunos intérpretes también entienden aquí una referencia celestial.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota para que preserve una alternativa léxica real y mantenga la ambigüedad teológica documentada sobre קַדִּישֵׁי עֶלְיוֹנִין. Se conserva el texto español mayormente intacto por ser natural y fiel en lo demás, ajustando solo el anclaje de la nota. No se requiere adjudicación adicional porque la reparación es menor y está bien sustentada por el expediente.
