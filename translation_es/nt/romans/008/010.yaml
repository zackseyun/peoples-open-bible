review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: conserva ‘Mesías’ para Χριστός, ‘cuerpo’ para σῶμα, ‘muerto’ para νεκρόν, la causalidad de διά en ambas frases y la ambigüedad de πνεῦμα con minúscula. Sin embargo, la nota [c] no preserva la alternativa inglesa documentada para δικαιοσύνη (‘justice’), porque repite la misma traducción del texto principal (‘justicia’) en vez de ofrecer una alternativa real.'
  spanish_quality_summary: El español es claro, natural y digno. ‘Pero si el Mesías está en ustedes…’ suena bien en registro eclesial contemporáneo. ‘Por causa del pecado’ y ‘por causa de la justicia’ son fieles, aunque algo repetitivos; no requieren cambio. El único problema material es la nota [c], que falla como nota útil.
  glossary_alignment: 'La terminología del proyecto está bien seguida: Χριστός -> ‘Mesías’; πνεῦμα -> ‘espíritu’ con ambigüedad preservada; δικαιοσύνη -> ‘justicia’ en el texto principal, conforme al expediente inglés, pero la nota debe reflejar la alternativa contextual ‘rectitud’ en español para corresponder a la distinción documentada ‘righteousness/justice’.'
  issues:
  - severity: medium
    issue: La nota [c] repite el texto principal en lugar de dar una alternativa léxica real.
    rationale: El inglés conserva una alternativa para δικαιοσύνη (‘justice’) frente a la elección principal ‘righteousness’. En español, como el texto principal ya usa ‘justicia’, la nota ‘O por causa de la justicia’ no añade información ni preserva la lógica del expediente. Debe ofrecer una alternativa española significativa, como ‘rectitud’.
  revised_spanish_text: Pero si el Mesías está en ustedes[a], el cuerpo está muerto[b] por causa del pecado, pero el espíritu es vida por causa de la justicia[c].
  revised_footnotes:
