translation:
  language: es
  text: porque Dios la ha privado de sabiduría y no le ha dado parte en el entendimiento[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque Dios la ha hecho olvidar la sabiduría» o «porque Dios ha hecho que le falte sabiduría».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «no le ha repartido entendimiento», es decir, no le ha dado parte en el entendimiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la falta de comportamiento prudente de la avestruz en el contexto inmediato. 'Porque' comunica con naturalidad la relación causal sin perder la fuerza explicativa del hebreo.
- source_word: הִשָּׁהּ
  english_pob_choice: has deprived her of
  chosen_spanish: la privó de
  alternatives_spanish:
  - la hizo olvidar
  - la hizo carecer de
  lexicon: HALOT
  rationale: El hifil con sufijo femenino indica una acción causativa de Dios sobre la sabiduría de ella. 'La privó de' conserva esa causatividad y suena más natural en español que una traducción demasiado técnica.
- source_word: אֱלוֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Todopoderoso
  lexicon: HALOT
  rationale: En Job, אֱלוֹהַּ se refiere al Dios verdadero; 'Dios' transmite el título sin ampliar innecesariamente el matiz como nombre propio alterno.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - saber
  - habilidad
  lexicon: HALOT
  rationale: El sustantivo expresa sabiduría en sentido general. 'Sabiduría' es la correspondencia directa y conserva el paralelismo con 'entendimiento'.
- source_word: חָלַק לָהּ
  english_pob_choice: has not given her a share in
  chosen_spanish: no le dio parte en
  alternatives_spanish:
  - no le asignó una porción en
  - no le repartió en
  lexicon: HALOT
  rationale: חלק conserva la idea distributiva de repartir o asignar una porción. 'No le dio parte en' refleja de manera idiomática la imagen de asignación sin borrar la metáfora de participación.
- source_word: בִּינָה
  english_pob_choice: understanding
  chosen_spanish: el entendimiento
  alternatives_spanish:
  - discernimiento
  - la comprensión
  lexicon: HALOT
  rationale: בינה denota entendimiento o discernimiento. 'Entendimiento' mantiene la relación semántica con 'sabiduría' y preserva la diferencia entre ambos términos.
theological_decisions:
- issue: Atribución directa a Dios de la falta de sabiduría
  english_pob_reading: The verse is rendered with God as the explicit subject who has deprived and not allotted wisdom/understanding.
  chosen_spanish_reading: 'El versículo mantiene a Dios como sujeto explícito: él la privó de sabiduría y no le dio parte en el entendimiento.'
  alternative_spanish_readings:
  - la avestruz carece de sabiduría
  - su sabiduría es limitada
  rationale: El hebreo nombra a אֱלוֹהַּ como sujeto de ambos verbos. La traducción conserva esa atribución directa sin suavizar la tensión teológica ni convertirla en una mera descripción impersonal.
  doctrine_reference: Preservar la tensión teológica del texto en lugar de resolverla por paráfrasis.
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo sin cambios en la última revisión; la versión española sigue la misma lectura y conserva las dos alternativas léxicas documentadas para los verbos principales.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para אֱלוֹהַּ conforme al uso POB documentado.
  - Se tradujo חָכְמָה como 'sabiduría' y בִּינָה como 'entendimiento' para conservar el paralelismo semántico.
  - Se preservó la agencia divina explícita del hebreo sin atenuación interpretativa.
  - Las notas a y b se anclan en los elementos léxicos relevantes y reflejan las alternativas del aparato en inglés.
