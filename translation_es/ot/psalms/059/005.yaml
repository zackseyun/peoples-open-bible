review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido general del hebreo: protesta de inocencia, movimiento apresurado de los enemigos, petición a Dios de intervenir y observar. Conserva acertadamente el antropomorfismo «despierta» y la alternativa léxica sobre el segundo verbo. Sin embargo, «para salir a mi encuentro» añade el matiz de «salir» que no está en לִקְרָאתִי, y «se ponen en posición» suena algo calcado y menos natural que una formulación española que mantenga la idea de establecerse/prepararse.'
  spanish_quality_summary: El texto es comprensible y digno, pero «se ponen en posición» resulta poco idiomático en registro bíblico natural. «Para salir a mi encuentro» es fluido, aunque algo expansivo frente al hebreo compacto. Una leve revisión mejora naturalidad y cercanía formal al original.
  glossary_alignment: No hay términos del glosario mayor en juego. «Culpa» para עָוֺן es adecuado en este contexto; «despierta» para עוּרָה y «mira» para וּרְאֵה están bien. La nota alternativa también está bien orientada.
  issues:
  - severity: medium
    issue: «para salir a mi encuentro» añade un matiz no explícito en el hebreo
    rationale: לִקְרָאתִי significa literalmente «a mi encuentro / para encontrarme». «Salir a mi encuentro» es idiomático, pero introduce la idea de salir, ausente del texto fuente y no necesaria para la claridad española.
  - severity: medium
    issue: «se ponen en posición» suena poco natural y algo militarizado
    rationale: Aunque intenta preservar la concreción de וְיִכּוֹנָנוּ, en español esta frase suena forzada. «Se ponen en su lugar» o «se afirman» serían más naturales; una nota puede conservar el matiz de preparación/establecimiento.
  revised_spanish_text: Sin culpa[a], ellos corren y se ponen en su lugar; despierta para encontrarme y mira.
  revised_footnotes:
  - marker: a
    text: O «corren y se preparan». El segundo verbo también puede expresar que se afirman o se disponen para actuar.
