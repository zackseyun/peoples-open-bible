    text: O «canales de agua». El término hebreo es relativamente raro, y su matiz exacto puede ser «arroyuelos» o «arroyos».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «quebradas» por «arroyos» para una referencia hídrica más clara y panhispánica; se suaviza «cauces de aguas» a «cauces de agua»; y se mueve la nota al segundo término hidráulico, en conformidad con el rastro auditado en inglés y con la incertidumbre léxica documentada para יִבְלֵי מָיִם.
