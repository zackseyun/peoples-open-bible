translation:
  language: es
  text: ¿No los aterrará su majestad[a], y su terror[b] caerá sobre ustedes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su exaltación» para «su majestad». El término hebreo puede denotar elevación, dignidad o estatus exaltado.
    reason: lexical_alternative
  - marker: b
    text: O «el temor de él caerá sobre ustedes». La expresión «su terror» puede entenderse como el terror que él inspira.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Will not
  chosen_spanish: ¿No…?
  alternatives_spanish:
  - ¿Acaso no…?
  - ¿No es verdad que…?
  lexicon: HALOT
  rationale: El hebreo introduce una pregunta retórica que espera afirmación. En español, «¿No…?» conserva esa fuerza interrogativa de forma natural y sobria.
- source_word: שְׂאֵתוֹ
  english_pob_choice: his majesty
  chosen_spanish: su majestad
  alternatives_spanish:
  - su exaltación
  - su dignidad
  - su elevación
  lexicon: HALOT
  rationale: El sustantivo puede expresar elevación, dignidad o estatus exaltado. «Majestad» comunica bien esa grandeza sobrecogedora en español y mantiene el paralelo con el segundo hemistiquio.
- source_word: תְּבַעֵת
  english_pob_choice: terrify
  chosen_spanish: aterrará
  alternatives_spanish:
  - asustará
  - amedrentará
  - espantará
  lexicon: HALOT
  rationale: El verbo en piel tiene fuerza causativa de terror súbito. «Aterrará» preserva esa intensidad y el tono solemne del pasaje.
- source_word: וּפַחְדּוֹ
  english_pob_choice: his dread
  chosen_spanish: su terror
  alternatives_spanish:
  - su pavor
  - el temor de él
  - su miedo
  lexicon: HALOT
  rationale: «Pavor» o «miedo» podrían sonar más subjetivos; «terror» mantiene la cualidad abrumadora y la simetría con «majestad». La alternativa «el temor de él» quedaría más explicativa que el hebreo.
- source_word: יִפֹּל עֲלֵיכֶם
  english_pob_choice: fall upon you
  chosen_spanish: caerá sobre ustedes
  alternatives_spanish:
  - caerá sobre vosotros
  - vendrá sobre ustedes
  - se abatirá sobre ustedes
  lexicon: HALOT
  rationale: La imagen hebrea de algo que cae sobre alguien se expresa de modo directo y natural con «caerá sobre ustedes». Mantiene el movimiento amenazante del original.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta cambiar el estado previo; este borrador sigue la lectura inglesa auditada y conserva las dos alternativas léxicas documentadas para el término de «majestad» y para el campo semántico de פחד.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando el hebreo nombra el tetragrámaton; aquí el versículo no lo contiene.
  - Se mantiene el tuteo plural de respeto/no marcado «ustedes» para corresponder al plural hebreo.
  - No se nivela la tensión entre el sustantivo de grandeza («majestad») y el de temor («terror»); ambos quedan diferenciados como en el paralelo hebreo.
