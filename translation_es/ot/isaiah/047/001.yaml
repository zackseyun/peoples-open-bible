    reason: lexical_alternative
  revision_rationale: La revisión conserva el sentido del hebreo y del POB inglés, pero mejora la naturalidad del español con 'en el suelo', restaura una alternativa importante para 'sin trono', mueve la nota cultural al punto donde comienza la personificación y añade la alternativa léxica para 'tierna y delicada' documentada en el rastro inglés.
