  text: נִבְעַ֤ר כָּל אָדָם֙ מִ/דַּ֔עַת הֹבִ֥ישׁ כָּל צוֹרֵ֖ף מִ/פָּ֑סֶל כִּ֛י שֶׁ֥קֶר נִסְכּ֖/וֹ וְ/לֹא ר֥וּחַ בָּֽ/ם־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/010/014.yaml
  text: Every man is stupid[a], without knowledge; every metalworker is put to shame by his idol, for his cast image is a lie[c][b], and there is no breath in them.
  footnotes:
  - marker: a
    text: Or 'Every person is brutish for lack of knowledge.' The Hebrew can be rendered more formally with 'brutish' and the preposition may be taken causally ('for lack of knowledge').
    reason: lexical_alternative
  - marker: b
    text: Or 'his molten image is falsehood.'
    reason: lexical_alternative
  - marker: c
    text: '''Breath'' may also be rendered ''spirit''; the point is that the idols have no life in them.'
    reason: lexical_alternative
