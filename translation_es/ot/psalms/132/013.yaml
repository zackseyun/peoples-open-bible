translation:
  language: es
  text: Porque Yahvé ha escogido a Sion[a]; la ha deseado para su morada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa un sufijo femenino que remite a Sion.
