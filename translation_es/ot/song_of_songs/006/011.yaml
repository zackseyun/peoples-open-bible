base_translation:
  language: en
  yaml_path: translation/ot/song_of_songs/006/011.yaml
  text: I went down to the walnut grove to look at the shoots in the valley[a], to see whether the vine had budded[c][b], whether the pomegranates had blossomed.
  footnotes:
  - marker: a
    text: Or 'the garden of nuts' or 'the nut orchard.' The Hebrew likely refers to a cultivated grove of walnut or nut trees.
    reason: lexical_alternative
  - marker: b
    text: '''Valley'' translates a Hebrew term that can also refer to a wadi or streambed.'
    reason: lexical_alternative
  - marker: c
    text: Or 'whether the vine had blossomed.' The Hebrew verb can cover budding or flowering.
    reason: lexical_alternative
