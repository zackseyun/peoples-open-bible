translation:
  language: es
  text: Y el sacerdote la examinará, y he aquí, el cabello en la mancha blanca se ha vuelto blanco y su apariencia es más profunda que la piel; es una enfermedad de la piel[a] que ha brotado en la cicatriz de la quemadura; y el sacerdote lo declarará impuro. Es una lesión de enfermedad de la piel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo tsaraʿat, un término amplio para una afección grave de la piel; tradicionalmente se ha traducido «lepra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  english_pob_choice: shall examine
  chosen_spanish: lo examinará
  alternatives_spanish:
  - lo verá
  - lo inspeccionará
  lexicon: HALOT
  rationale: En contexto sacerdotal y diagnóstico ritual, el verbo implica una inspección formal, no solo ver. «Lo examinará» comunica esa función evaluativa.
- source_word: בַּהֶרֶת
  english_pob_choice: bright spot
  chosen_spanish: mancha blanca
  alternatives_spanish:
  - mancha brillante
  - mancha resplandeciente
  lexicon: HALOT
  rationale: La expresión apunta a una lesión visible en la piel. En español, «mancha blanca» resulta natural y mantiene el rasgo observable que el texto usa como señal diagnóstica.
- source_word: נֶהְפַּךְ שֵׂעָר לָבָן
  english_pob_choice: the hair ... has turned white
  chosen_spanish: el cabello ... se ha vuelto blanco
  alternatives_spanish:
  - el cabello ... se volvió blanco
  - ha aparecido cabello blanco
  lexicon: HALOT
  rationale: «Se ha vuelto blanco» refleja bien el cambio de estado descrito por la forma verbal pasiva/reflexiva, sin perder la fuerza diagnóstica.
- source_word: מַרְאֶהָ עָמֹק מִן־הָעוֹר
  english_pob_choice: its appearance is deeper than the skin
  chosen_spanish: su apariencia es más profunda que la piel
  alternatives_spanish:
  - se ve más profunda que la piel
  - su aspecto está hundido más que la piel
  lexicon: HALOT
  rationale: «Apariencia» preserva מראה y «más profunda que la piel» reproduce la fórmula diagnóstica de profundidad visible sin añadir tecnicismos ajenos.
- source_word: צָרַעַת
  english_pob_choice: leprous disease
  chosen_spanish: enfermedad de la piel
  alternatives_spanish:
  - lepra
  - enfermedad leprosa
  - afección cutánea
  lexicon: HALOT
  rationale: La POB inglesa osciló entre «skin disease» y «leprous disease» en el proceso editorial; en español, «enfermedad de la piel» evita la identificación moderna con la lepra clínica y conserva el valor amplio del término ritual. Se mantiene la tensión lexical sin simplificarla a una equivalencia médica anacrónica.
- source_word: מִכְוָה
  english_pob_choice: burn scar
  chosen_spanish: quemadura
  alternatives_spanish:
  - cicatriz de la quemadura
  - marca de quemadura
  - quemadura cicatrizada
  lexicon: HALOT
  rationale: El sustantivo remite al lugar o resultado de una quemadura. «Quemadura» es breve y claro; en este contexto funciona como referencia a la lesión previa donde surge el brote.
- source_word: פָּרָחָה
  english_pob_choice: has broken out
  chosen_spanish: ha brotado
  alternatives_spanish:
  - ha brotado allí
  - ha estallado
  - ha aparecido
  lexicon: HALOT
  rationale: En contexto de afección cutánea, פרח describe una erupción o brote. «Ha brotado» conserva la imagen de aparición eruptiva.
- source_word: טִמֵּא אֹתוֹ
  english_pob_choice: shall pronounce him unclean
  chosen_spanish: lo declarará impuro
  alternatives_spanish:
  - lo pronunciará impuro
  - lo hará impuro
  - lo declarará inmundo
  lexicon: HALOT
  rationale: El sacerdote emite un veredicto ritual; «declarará impuro» expresa mejor esa función jurídica que «hacer impuro».
- source_word: נֶגַע צָרַעַת
  english_pob_choice: an infection of leprous disease
  chosen_spanish: una lesión de enfermedad de la piel
  alternatives_spanish:
  - un brote de enfermedad de la piel
  - una afección de enfermedad de la piel
  - una lesión leprosa
  lexicon: HALOT
  rationale: נגע puede significar lesión, marca o afección. «Lesión» mantiene el carácter concreto del signo; «de enfermedad de la piel» vincula la frase al término técnico adoptado para צָרַעַת sin imponer una lectura médica moderna.
theological_decisions:
- issue: Valor de צָרַעַת en Levítico 13
  english_pob_reading: skin disease / leprous disease
  chosen_spanish_reading: enfermedad de la piel
  alternative_spanish_readings:
  - lepra
  - enfermedad leprosa
  - afección cutánea
  rationale: La traducción no debe cerrar el sentido a la lepra médica moderna. «Enfermedad de la piel» deja abierta la categoría ritual amplia del hebreo y evita una identificación clínica anacrónica, en línea con la cautela auditada por la POB inglesa.
  doctrine_reference: Levítico 13; cf. la nota lexical sobre צָרַעַת en la tradición POB.
translation_notes:
  revision_awareness: La versión inglesa pasó de «if» a «behold» para reflejar וְהִנֵּה, y de «skin disease» a «leprous disease» por consistencia lexical; en español se conserva esa estructura observacional con «y he aquí» y se evita una medicalización excesiva manteniendo la amplitud de צָרַעַת mediante «enfermedad de la piel».
  spanish_consistency_notes:
  - Se mantiene «he aquí» para reflejar וְהִנֵּה con fuerza de observación inesperada.
  - «Declarará impuro» conserva el veredicto ritual del sacerdote.
  - Se usa «piel» de modo consistente para el campo léxico de צָרַעַת, sin convertirlo en diagnóstico moderno de lepra.
  - Las dos ocurrencias de צָרַעַת comparten la misma traducción para estabilidad terminológica.
