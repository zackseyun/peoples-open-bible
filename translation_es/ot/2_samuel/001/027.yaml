translation:
  language: es
  text: ¡Cómo han caído los héroes[b][a], y han perecido las armas de guerra!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los implementos de guerra» o «la armadura de guerra». La frase hebrea puede referirse de manera amplia al equipo militar, no solo a armas ofensivas.
    reason: lexical_alternative
  - marker: b
    text: La frase «las armas de guerra» puede entenderse metafóricamente como referencia a Saúl y Jonatán mismos, como la fuerza marcial de Israel, aunque también puede leerse literalmente.
    reason: alternative_reading
lexical_decisions:
- source_word: אֵיךְ
  english_pob_choice: How
  chosen_spanish: ¡Cómo!
  alternatives_spanish:
  - ¡Ay, cómo!
  - ¡Cómo ha sido posible!
  lexicon: HALOT
  rationale: En este lamento, la partícula no pide información; introduce exclamación doliente. «¡Cómo!» conserva la fuerza poética y la brevedad del hebreo, igual que el inglés POB.
- source_word: נָפְלוּ
  english_pob_choice: have fallen
  chosen_spanish: han caído
  alternatives_spanish:
  - cayeron
  - se han desplomado
  lexicon: HALOT
  rationale: 'El perfecto hebreo en un canto fúnebre se expresa bien con presente perfecto español para un efecto resultativo: la caída ya es un hecho lamentado.'
- source_word: גִבּוֹרִים
  english_pob_choice: the mighty
  chosen_spanish: los valientes
  alternatives_spanish:
  - los poderosos
  - los guerreros
  lexicon: HALOT
  rationale: «גִבּוֹרִים» aquí designa a hombres de fuerza y valor militar. «Los valientes» comunica bien el registro poético en español sin perder la referencia a fuerza guerrera.
- source_word: וַיֹּאבְדוּ
  english_pob_choice: have perished
  chosen_spanish: han perecido
  alternatives_spanish:
  - han desaparecido
  - han sido destruidos
  lexicon: HALOT
  rationale: «אבד» puede significar perecer o perderse. En este contexto de duelo, «han perecido» mantiene la solemnidad y la ambigüedad entre pérdida literal y derrumbe militar.
- source_word: כְּלֵי מִלְחָמָה
  english_pob_choice: the weapons of war
  chosen_spanish: las armas de guerra
  alternatives_spanish:
  - los utensilios de guerra
  - los implementos de guerra
  - las armas
  lexicon: HALOT
  rationale: El constructo hebreo puede abarcar equipo militar en general. «Armas de guerra» es natural en español y preserva la posibilidad de lectura literal o metafórica señalada por el POB inglés.
theological_decisions:
- issue: Lectura metafórica de «las armas de guerra»
  english_pob_reading: The phrase 'the weapons of war' may be understood metaphorically of Saul and Jonathan themselves as Israel's martial strength, though it can also be read literally.
  chosen_spanish_reading: La frase «las armas de guerra» puede entenderse metafóricamente de Saúl y Jonatán como la fuerza militar de Israel, aunque también puede leerse en sentido literal.
  alternative_spanish_readings:
  - Saúl y Jonatán han caído literalmente como guerreros
  - solo se refiere al equipo militar
  rationale: Conservo la tensión interpretativa documentada por el POB inglés. El español mantiene abierta la metáfora sin imponerla, a la vez que permite la lectura literal del hebreo.
  doctrine_reference: 2 Samuel 1:27; nota POB sobre lectura metafórica/literal
- issue: Registro de lamento poético
  english_pob_reading: How the mighty have fallen, and the weapons of war have perished!
  chosen_spanish_reading: ¡Cómo han caído los valientes, y han perecido las armas de guerra!
  alternative_spanish_readings:
  - ¡Ay, cómo han caído los valientes, y han perecido las armas de guerra!
  rationale: La exclamación breve y solemne refleja el tono elegíaco del original hebreo y del POB inglés, sin volverlo narrativo ni explicativo.
  doctrine_reference: 2 Samuel 1:27; poesía hebrea de duelo
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se registran cambios necesarios y el control cruzado informa alto acuerdo (1.0).'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparece; aquí no aplica.
  - Se usa «valientes» para גִבּוֹרִים por adecuación poética en español, sin borrar su sentido militar.
  - Se conserva la ambigüedad de כְּלֵי מִלְחָמָה entre equipo militar literal y metáfora de la fuerza guerrera de Israel.
