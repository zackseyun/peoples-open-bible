  - marker: b
    text: Sheol es el término hebreo para el reino de los muertos; tradicionalmente también se ha traducido «el sepulcro» y, con menos precisión en algunos contextos, «el infierno».
    reason: alternative_reading
  revision_rationale: Se revisa el primer hemistiquio para reforzar el sentido de quebrar/partir el suelo presente en los participios hebreos y para lograr un español más natural ('Como quien...' en lugar de 'Como uno que...'). También se cambia 'dispersados' por 'esparcidos' por mayor idiomaticidad visual. Se conservan 'boca' y 'Sheol' por fidelidad al hebreo y a la política terminológica del proyecto.
