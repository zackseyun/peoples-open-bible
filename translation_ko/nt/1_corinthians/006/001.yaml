  text: Τολμᾷ τις ὑμῶν πρᾶγμα ἔχων πρὸς τὸν ἕτερον κρίνεσθαι ἐπὶ τῶν ἀδίκων, καὶ οὐχὶ ἐπὶ τῶν ἁγίων;
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/006/001.yaml
  text: Does any one of you dare[a], when he has a case against another[b], to be judged before the unrighteous and not before the saints?
  footnotes:
  - marker: a
    text: 'Or ''before the unjust.'' Some translations render this interpretively as ''before unbelievers,'' but the Greek says ''the unrighteous.'''
    reason: lexical_alternative
  - marker: b
    text: '''Saints'' here refers to God''s holy people, that is, believers.'
    reason: lexical_alternative
translation:
  language: ko
  text: 여러분 가운데 누가 감히, 다른 사람을 상대로 소송 사건이 있을 때에, 성도들 앞에서가 아니라 의롭지 못한 자들 앞에서 재판을 받겠습니까?
  philosophy: optimal-equivalence
