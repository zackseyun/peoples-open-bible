revisions:
- from: Y emitir una orden de que, si alguien transgrede cualquier parte de lo que ha sido escrito y lo anula, se tome una viga de su propia propiedad y sea colgado[a] en ella, y sus posesiones se conviertan en propiedad real.
  to: Y ordénese que, si alguien transgrede cualquier parte de lo que ha sido escrito y lo anula, se tome una viga de su propia propiedad y sea colgado[a] en ella, y sus posesiones pasen a ser propiedad real.
  rationale: Se ajustó la apertura para que el español suene natural y formal sin perder el valor administrativo de προστάξαι. También se mejoró levemente la expresión del decomiso final con una formulación más idiomática en español jurídico-narrativo. Se conservó la nota léxica sobre κρεμασθῆναι sin cambios sustanciales.
