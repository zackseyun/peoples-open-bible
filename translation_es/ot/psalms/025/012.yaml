translation:
  language: es
  text: ¿Quién es el hombre que teme a Yahvé? Lo instruirá en el camino que ha de escoger[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Lo enseñará en el camino que él escoge» o «en el camino que él escogerá». El hebreo permite matices ligeramente distintos en el verbo final.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי זֶה
  english_pob_choice: Who is
  chosen_spanish: ¿Quién es
  alternatives_spanish:
  - ¿Quién entonces es
  - ¿Quién es este
  lexicon: HALOT
  rationale: La combinación interrogativa más demostrativa funciona en español como una pregunta retórica natural; «¿Quién es» conserva el tono sin añadir peso innecesario a la demostrativa.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el que
  lexicon: HALOT
  rationale: El hebreo está en singular masculino y aquí tiene fuerza representativa/genérica. «El hombre» preserva esa forma y encaja con el uso sapiencial y salmódico del texto.
- source_word: יְרֵא יְהוָה
  english_pob_choice: fears Yahweh
  chosen_spanish: teme a Yahvé
  alternatives_spanish:
  - reverencia a Yahvé
  - está en reverencia ante Yahvé
  lexicon: HALOT
  rationale: En contexto sapiencial y salmódico, ירא expresa temor reverente ante Dios. «Teme a Yahvé» mantiene la carga devocional y el paralelismo más directo con el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la decisión editorial del POB de transliterar el Nombre divino como «Yahvé», en lugar de sustituirlo por un título.
- source_word: יוֹרֶנּוּ
  english_pob_choice: He will instruct him
  chosen_spanish: Él le instruirá
  alternatives_spanish:
  - Él le enseñará
  - Él le guiará
  lexicon: HALOT
  rationale: El hiphil de ירה puede significar enseñar/instruir/dirigir. «Instruirá» conserva amplitud semántica y suena natural en español, sin reducir el matiz de orientación moral.
- source_word: בְּדֶרֶךְ
  english_pob_choice: in the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - en la senda
  - en la vía
  lexicon: HALOT
  rationale: דרך puede referirse a un camino literal o a una manera de vivir. «Camino» mantiene la metáfora de curso o senda de vida de forma clara en español.
- source_word: יִבְחָר
  english_pob_choice: he should choose
  chosen_spanish: que debe escoger
  alternatives_spanish:
  - que escogerá
  - que escogería
  lexicon: HALOT
  rationale: El imperfecto hebreo permite varios matices. Aquí «debe escoger» refleja la fuerza exhortativa/instructiva que el contexto sugiere, sin cerrar otras posibilidades de traducción.
theological_decisions:
- issue: Sujeto implícito de «Él le instruirá»
  english_pob_reading: The implied subject is the LORD instructing the man who fears him.
  chosen_spanish_reading: El sujeto implícito es Yahvé, quien instruye al hombre que le teme.
  alternative_spanish_readings:
  - Uno le instruirá
  - Él se instruirá a sí mismo
  rationale: Aunque el hebreo no explicita el sujeto, el contexto inmediato y la lógica del salmo apuntan a Yahvé como instructor. La traducción lo deja implícito mediante el pronombre «Él», sin introducir una lectura ajena al texto.
  doctrine_reference: Conservar la inferencia contextual sin borrar la tensión del original; aquí el contexto basta para identificar a Yahvé como sujeto.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto permanece en acuerdo alto con el paquete fuente y la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Nombre divino, conforme al criterio editorial del proyecto.
  - «Teme» conserva el valor reverente de ירא en contexto sapiencial, sin suavizarlo a mera admiración.
  - «Instruirá» conserva la amplitud de ירה sin forzar solo «enseñar» o solo «guiar».
  - La nota final preserva la ambigüedad del imperfecto hebreo en el verbo final, como lo hace la auditoría inglesa.
