translation:
  language: es
  text: 'Pero él dijo[a]: «Por favor, mi Señor, envía, te ruego, por mano de quien hayas de enviar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa: «Por favor, mi Señor, envía a otra persona».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But he said
  chosen_spanish: Pero él dijo
  alternatives_spanish:
  - Y él dijo
  lexicon: HALOT
  rationale: El waw narrativo puede seguir el avance del relato como «y», pero en este contexto la petición de Moisés responde con resistencia tras las respuestas divinas previas; «pero» comunica mejor ese matiz adversativo en español.
- source_word: בִּי
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - Te ruego
  - Pardon me
  lexicon: HALOT
  rationale: En esta fórmula de súplica respetuosa, la partícula expresa una petición cortés más que un sentido literal. «Por favor» es natural en español actual y conserva el tono deferente.
- source_word: אֲדֹנָי
  english_pob_choice: my Lord
  chosen_spanish: Señor mío
  alternatives_spanish:
  - Señor
  - mi Señor
  lexicon: HALOT
  rationale: Es un tratamiento reverente dirigido a Dios en discurso directo. «Señor mío» preserva el valor posesivo de la forma hebrea y evita confundirlo con el nombre divino Yahvé.
- source_word: שְׁלַח
  english_pob_choice: send
  chosen_spanish: envía
  alternatives_spanish:
  - manda
  - envíe
  lexicon: HALOT
  rationale: Es el imperativo de שלח. «Envía» es claro, natural y corresponde al acto de despachar o mandar a alguien.
- source_word: נָא
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - te ruego
  - ahora
  lexicon: HALOT
  rationale: La partícula suaviza la orden o ruego. «Por favor» transmite bien la entreaty en español contemporáneo.
- source_word: בְּיַד
  english_pob_choice: by the hand of
  chosen_spanish: por mano de
  alternatives_spanish:
  - por medio de
  - a través de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática e indica agencia o instrumento. «Por mano de» conserva la imagen verbal del original sin perder inteligibilidad.
- source_word: תִּשְׁלָח
  english_pob_choice: you will send
  chosen_spanish: tú quieras enviar
  alternatives_spanish:
  - envíes
  - tú enviarás
  lexicon: HALOT
  rationale: 'La forma imperfecta tras «por mano de» deja cierta ambigüedad y puede funcionar de modo relativo: «el que tú quieras enviar». «Tú quieras enviar» reproduce mejor esa flexibilidad que cerrar el sentido como una afirmación más rígida.'
theological_decisions:
- issue: Petición evasiva de Moisés
  english_pob_reading: 'Retain the Hebrew ambiguity: Moses asks God to send by whomever he will send.'
  chosen_spanish_reading: 'Mantener la ambigüedad hebrea: Moisés pide que Dios envíe por mano de quien él quiera enviar.'
  alternative_spanish_readings:
  - Envía a otra persona.
  - Envía por mano del que tú enviarías.
  rationale: El hebreo expresa la resistencia de Moisés sin decir explícitamente «a otra persona». La redacción española conserva la evasiva y deja abierta la misma tensión interpretativa que preserva la POB en inglés.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que indicó agreement alto y ningún cambio requerido; por ello no se introdujeron ajustes respecto al sentido base, solo se adaptó la formulación al español manteniendo la ambigüedad del hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda al nombre divino; aquí el hebreo dice אֲדֹנָי, por lo que se traduce como «Señor mío».
  - Se conservó el tono respetuoso y la ambigüedad del final del versículo, evitando resolverla en el texto principal.
  - La puntuación y el orden de la cita se ajustaron al español bíblico moderno sin introducir interpretaciones adicionales.
