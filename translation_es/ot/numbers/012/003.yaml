- from: Y el hombre Moisés era muy humilde[a], más que cualquier hombre que hubiera sobre la faz de la tierra.
  to: Y el hombre Moisés era muy humilde[a], más que cualquier hombre que había sobre la faz de la tierra.
  rationale: Se conserva la fidelidad al hebreo y al POB inglés, pero se sustituye «hubiera» por «había» para lograr un español más natural y una correspondencia más directa con la cláusula relativa hebrea. También se pule la nota para mayor naturalidad sin cambiar su contenido.
