translation:
  language: es
  text: ¿Has sabido esto desde antiguo, desde que el hombre[a] fue puesto sobre la tierra?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde que la humanidad fue puesta sobre la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/זֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - tal cosa
  lexicon: HALOT
  rationale: El demostrativo introduce el contenido de la pregunta retórica. «Esto» conserva la referencia breve y directa sin añadir matiz interpretativo.
- source_word: יָדַעְתָּ
  english_pob_choice: have you known
  chosen_spanish: has conocido
  alternatives_spanish:
  - conoces
  - has entendido
  lexicon: HALOT
  rationale: El perfecto hebreo en pregunta retórica puede expresar una constatación que abarca el presente. En español, «has conocido» mantiene ese valor de experiencia/conocimiento adquirido con naturalidad.
- source_word: מִנִּי עַד
  english_pob_choice: from of old
  chosen_spanish: desde antiguo
  alternatives_spanish:
  - desde tiempos antiguos
  - desde hace mucho
  lexicon: HALOT
  rationale: La expresión idiomática apunta a una antigüedad remota. «Desde antiguo» es breve, idiomática y fiel al sentido temporal.
- source_word: מִנִּי שִׂים
  english_pob_choice: since ... was placed
  chosen_spanish: desde que ... fue puesto
  alternatives_spanish:
  - desde que ... fue establecido
  - desde que ... fue colocado
  lexicon: HALOT
  rationale: El infinitivo constructo de שׂים con אָדָם indica el momento de ser puesto sobre la tierra. «Desde que ... fue puesto» preserva el valor temporal y la pasiva implícita.
- source_word: שִׂים
  english_pob_choice: was placed
  chosen_spanish: fue puesto
  alternatives_spanish:
  - fue establecido
  - fue colocado
  lexicon: HALOT
  rationale: «Fue puesto» sigue de cerca la imagen del hebreo y encaja con la construcción temporal.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - el ser humano
  lexicon: HALOT
  rationale: אָדָם es genérico y singular, representando a la humanidad. Se mantiene «el hombre» por fidelidad formal y por su fuerza antropológica tradicional, dejando alternativas inclusivas para lectura contextual.
- source_word: עֲלֵי אָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la tierra
  lexicon: HALOT
  rationale: La locución locativa admite «sobre la tierra» en español, que reproduce bien la imagen de colocación sobre la superficie terrestre y suena natural.
theological_decisions:
- issue: Valor genérico de אָדָם
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - el ser humano
  rationale: El hebreo usa un singular genérico. Se conserva «el hombre» para reflejar la forma y el peso antropológico del texto, sin negar su sentido colectivo; las opciones inclusivas se mantienen como alternativas semánticas posibles.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אָדָם
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés en lo esencial: pregunta retórica + antigüedad remota + inicio temporal al ser puesto אדם sobre la tierra. No hay revisiones aplicadas en el paquete base; se mantiene la decisión de conservar el valor genérico singular de אָדָם y se traslada a español con un pie de nota inclusivo.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otras sustituciones teológicas irrelevantes porque el versículo no contiene el Tetragrámaton.
  - «Tierra» se usa para אָרֶץ en sentido locativo, sin sobreinterpretar cosmológicamente.
  - La puntuación reproduce una única pregunta continua, en línea con el hebreo y la traducción inglesa auditada.
