translation:
  language: es
  text: 'Y ella dijo a los hombres: «Sé que Yahvé ha dado a ustedes la tierra, y que el terror de ustedes[a] ha caído sobre nosotros, y que todos los habitantes de la tierra se han derretido[b] delante de ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el miedo de ustedes ha caído sobre nosotros».
    reason: lexical_alternative
  - marker: b
    text: O «todos los habitantes de la tierra han perdido el ánimo por causa de ustedes». El verbo hebreo es literalmente «se han derretido».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר אֶל הָאֲנָשִׁים
  english_pob_choice: And she said to the men
  chosen_spanish: Y ella dijo a los hombres
  alternatives_spanish:
  - Entonces dijo a los hombres
  - Dijo a los hombres
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, «Y ella dijo» conserva ese flujo sin añadir una inferencia temporal más fuerte. «Los hombres» refleja el artículo definido y el referente inmediato de los espías.
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: Sé
  alternatives_spanish:
  - He sabido
  - Sabía
  lexicon: HALOT
  rationale: El perfecto expresa conocimiento firme y actual. «Sé» comunica mejor el valor estativo en español que un pasado narrativo.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí introduce cláusulas de contenido después de una expresión de conocimiento; «que» es la equivalencia natural en español.
- source_word: נָתַן יְהוָה לָכֶם אֶת הָאָרֶץ
  english_pob_choice: the LORD has given you the land
  chosen_spanish: Yahvé ha dado a ustedes la tierra
  alternatives_spanish:
  - Yahvé dio a ustedes la tierra
  - Yahvé está dando a ustedes la tierra
  lexicon: HALOT
  rationale: El perfecto presenta la acción como ya realizada desde la perspectiva de Rahab. «Ha dado» conserva ese sentido de hecho consumado con efecto presente. Se mantiene «Yahvé» por la convención del proyecto para יהוה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce como «Yahvé» según la norma del proyecto, para preservar el nombre divino y no sustituirlo por un título.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: En Josué, el término se refiere al territorio otorgado por pacto. «La tierra» conserva ese sentido geográfico-covenantal sin añadir una explicitación no presente en el hebreo.
- source_word: נָפְלָה אֵימַתְכֶם עָלֵינוּ
  english_pob_choice: the fear of you has fallen upon us
  chosen_spanish: el terror de ustedes ha caído sobre nosotros
  alternatives_spanish:
  - el miedo de ustedes ha caído sobre nosotros
  - el terror que ustedes inspiran ha caído sobre nosotros
  lexicon: HALOT
  rationale: אֵימָה denota terror/dread; en español «terror» conserva mejor la intensidad que «miedo». «Ha caído sobre nosotros» refleja con naturalidad נָפְלָה עָלֵינוּ.
- source_word: אֵימַתְכֶם
  english_pob_choice: the fear of you
  chosen_spanish: el terror de ustedes
  alternatives_spanish:
  - su terror
  - el pavor de ustedes
  lexicon: HALOT
  rationale: La construcción posesiva puede sonar ambigua en español con «su terror». «El terror de ustedes» evita esa ambigüedad y mantiene la relación del sustantivo con el segundo plural.
- source_word: נָמֹגוּ
  english_pob_choice: have melted away
  chosen_spanish: se han derretido
  alternatives_spanish:
  - se han derretido de miedo
  - han perdido el ánimo
  - se han deshecho
  lexicon: HALOT
  rationale: El verbo tiene sentido literal de derretirse y uso metafórico de perder valor. «Se han derretido» preserva la metáfora vividísima del hebreo; la adición de «de miedo» no está explícita y se evita.
- source_word: כָּל יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: all the inhabitants of the land
  chosen_spanish: todos los habitantes de la tierra
  alternatives_spanish:
  - todos los que habitan la tierra
  - todos los residentes de la tierra
  lexicon: HALOT
  rationale: יֹשְׁבֵי es un participio sustantivado, «los que habitan». «Habitantes» es conciso y natural; «tierra» mantiene la correspondencia con הָאָרֶץ en el mismo versículo.
- source_word: מִפְּנֵיכֶם
  english_pob_choice: before you
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - por causa de ustedes
  - de delante de ustedes
  - ante ustedes
  lexicon: HALOT
  rationale: La expresión puede implicar presencia y/o causa. «Delante de ustedes» conserva la imagen espacial del hebreo y funciona bien con el contexto de temor ante la llegada de Israel.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. El proyecto español usa «Yahvé» para preservar el nombre propio de Dios, en paralelo con la decisión inglesa de no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El cotejo final del texto base inglés indica alta coincidencia, sin revisiones aplicadas; por eso el español sigue de cerca las decisiones léxicas auditadas y solo ajusta la formulación a una prosa natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el tratamiento del Tetragrámaton en todo el proyecto.
  - Se usa «la tierra» para הָאָרֶץ y «delante de ustedes» para מִפְּנֵיכֶם, evitando sobreinterpretar la causalidad.
  - Se conserva la metáfora de נָמֹגוּ con «se han derretido»; la nota aclara la alternativa idiomática posible en español.
  - Se usa tratamiento de segunda persona plural «ustedes» para reflejar el plural hebreo sin castellanizar regionalmente con «vosotros».
