translation:
  language: es
  text: Y el resto de los hechos de Jotam[a], y todas sus guerras y sus caminos—he aquí[b], están escritos en el Libro de los Reyes de Israel y Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las palabras / los asuntos concernientes a Jotam»; el hebreo aquí usa una fórmula historiográfica que puede referirse al registro de sus hechos o asuntos.
    reason: lexical_alternative
  - marker: b
    text: «Sus caminos» también puede entenderse como «su conducta».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora bien, el resto de
  alternatives_spanish:
  - Y el resto de
  - Lo demás de
  lexicon: HALOT
  rationale: El hebreo introduce el material restante respecto de Jotam; en español, «Ahora bien» reproduce el enlace discursivo de ו con un tono narrativo natural, y «el resto de» conserva el sentido de remanente sin añadir interpretación.
- source_word: דִּבְרֵי
  english_pob_choice: the acts of
  chosen_spanish: los hechos de
  alternatives_spanish:
  - las palabras de
  - los asuntos de
  - las cosas de
  lexicon: HALOT
  rationale: Aunque literalmente significa «palabras», en fórmulas historiográficas regias se refiere a los hechos, asuntos o registros de una persona. «Hechos» es la equivalencia española más natural y fiel al uso documental del contexto.
- source_word: מִלְחֲמֹתָיו
  english_pob_choice: his wars
  chosen_spanish: sus guerras
  alternatives_spanish:
  - sus batallas
  - sus campañas militares
  lexicon: HALOT
  rationale: El plural nombra conflictos bélicos en general. «Guerras» conserva la fuerza directa del término y corresponde bien al registro histórico.
- source_word: וּדְרָכָיו
  english_pob_choice: his ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - su conducta
  - su manera de actuar
  lexicon: HALOT
  rationale: Se mantiene la metáfora hebrea de «camino». «Caminos» es aceptable en español bíblico y deja abierta la posible referencia a conducta sin borrar la imagen original.
- source_word: הִנָּם
  english_pob_choice: behold, they are
  chosen_spanish: miren, están
  alternatives_spanish:
  - he aquí, están
  - ciertamente están
  - están
  lexicon: HALOT
  rationale: La partícula tiene fuerza deíctica/enfática. «Miren» comunica esa llamada de atención en español moderno sin perder el énfasis del original; «están» continúa el predicado verbal implícito.
- source_word: כְּתוּבִים
  english_pob_choice: written
  chosen_spanish: escritos
  alternatives_spanish:
  - registrados
  - anotados
  lexicon: HALOT
  rationale: El participio pasivo expresa algo consignado por escrito. «Escritos» es directo y transparente en español.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el libro
  alternatives_spanish:
  - sobre el libro
  - en el rollo
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sobre un libro/rollo», el español idiomático para una referencia archivística es «en el libro». Se conserva la idea de registro escrito sin forzar un calco.
- source_word: מַלְכֵי יִשְׂרָאֵל וִיהוּדָה
  english_pob_choice: the Kings of Israel and Judah
  chosen_spanish: de los reyes de Israel y de Judá
  alternatives_spanish:
  - de los reyes de Israel y Judá
  - de los reyes de Israel y de Judá
  lexicon: HALOT
  rationale: 'Se traduce la cadena constructa como título o nombre de archivo: «los reyes de Israel y de Judá». Se conserva la referencia documental sin capitalización obligatoria en español.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y la solución óptima del POB en inglés: mantiene la fórmula historiográfica, el valor enfático de הִנָּם y la ambigüedad de דְּרָכָיו. No hay revisiones previas aplicadas en el expediente, y el cotejo de la revisión más reciente reporta alta concordancia sin cambios.'
  spanish_consistency_notes:
  - Se usa «Judá» con tilde por norma ortográfica española.
  - Se conserva «libro» como término de registro, evitando «rollo» por claridad contextual.
  - No se introduce «Cristo», «SEÑOR» ni otras sustituciones no presentes en el versículo.
  - La puntuación con raya refleja la pausa enfática del hebreo y del inglés auditado.
