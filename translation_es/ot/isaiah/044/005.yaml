revisions:
- from: 'Este[a] dirá: “Yo soy de Yahvé”; otro se llamará por el nombre de Jacob; y otro escribirá en su mano[b]: “Perteneciente a Yahvé”, y se pondrá el nombre de Israel.'
  to: 'Uno[a] dirá: “Yo soy de Yahvé”; otro se identificará con el nombre de Jacob; y otro escribirá en su mano[b]: “Perteneciente a Yahvé”, y se pondrá[c] el nombre de Israel.'
  rationale: La revisión conserva el sentido fuente y la teología del pasaje, mejora ligeramente la naturalidad del español, y restituye una alternativa léxica significativa presente en el audit trail inglés para la última cláusula. Se mantiene “Yahvé” conforme al proyecto y la imagen concreta de la inscripción en la mano.
