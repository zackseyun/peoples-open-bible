  source_alignment_summary: 'El borrador español sigue bien el sentido del griego: ἐντεῦθεν = «de esto», δεῖ γνῶναι = «debéis saber», γυναῖκες = «las mujeres», y conserva la doble pareja verbal «trabajáis… os afanáis» / «dais y traéis». Sin embargo, «dominan sobre vosotros» suena menos idiomático en español que una formulación directa equivalente a κυριεύουσιν ὑμῶν, y conviene reflejar mejor la nota inglesa sobre la alternativa «esposas».'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «dominan sobre vosotros» resulta algo forzada; «los dominan» o «ejercen dominio sobre ustedes/vosotros» sería más natural. También la nota actual en [a] desplaza innecesariamente la atención a πονεῖτε, cuando la huella auditada preserva la alternativa léxica para γυναῖκες = «mujeres/esposas».
  glossary_alignment: No hay términos teológicos sensibles aquí. «Mujeres» respeta la decisión del POB frente a «esposas». El registro general es adecuado para español bíblico contemporáneo. La revisión propuesta mantiene el valor léxico de κυριεύουσιν con una forma más idiomática y alinea la nota con la decisión léxica documentada en inglés.
