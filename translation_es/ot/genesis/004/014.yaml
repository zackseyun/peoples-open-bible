translation:
  language: es
  text: ¡Mira[a]! Hoy me has echado lejos de la faz del suelo, y quedaré oculto de delante de tu rostro. Seré errante y fugitivo sobre la tierra[b], y sucederá que cualquiera que me encuentre me matará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me ocultaré de tu presencia» / «quedaré oculto de tu presencia». El hebreo dice literalmente «de tu rostro».
    reason: lexical_alternative
  - marker: b
    text: O «en la tierra» / «en el país». El hebreo אֶרֶץ puede significar «tierra» o «país», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - Mira
  - Mira, pues
  - Observa
  lexicon: HALOT
  rationale: 'La partícula introduce una advertencia o llamado de atención. «Mira» comunica la inmediatez de forma natural en español y evita el tono más arcaico de «He aquí». '
- source_word: גֵּרַשְׁתָּ
  english_pob_choice: you have driven me away
  chosen_spanish: me has echado lejos
  alternatives_spanish:
  - me has expulsado
  - me has desterrado
  - me has alejado
  lexicon: HALOT
  rationale: גרשׁ expresa expulsión o alejamiento forzado. «Me has echado lejos» conserva la fuerza del desalojo y suena idiomático en español, sin suavizar el golpe semántico.
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  english_pob_choice: from the face of the ground
  chosen_spanish: de la faz de la tierra
  alternatives_spanish:
  - de la superficie del suelo
  - de la faz del suelo
  - de la tierra
  lexicon: HALOT
  rationale: La imagen hebrea de «la faz» se preserva con «faz» para mantener el paralelismo y la carga imagística. Se eligió «tierra» en vez de «suelo» porque en este contexto resuena mejor con el alcance narrativo de Génesis y con el motivo de la tierra vinculada a Caín.
- source_word: וּמִפָּנֶיךָ אֶסָּתֵר
  english_pob_choice: I will be hidden from your face
  chosen_spanish: quedaré oculto de tu rostro
  alternatives_spanish:
  - me ocultaré de tu presencia
  - quedaré oculto de tu presencia
  - seré escondido de tu rostro
  lexicon: HALOT
  rationale: 'El nifal sugiere pasividad: «ser/ quedar oculto». Se mantiene la imagen concreta de «rostro» para no borrar el modismo hebreo, siguiendo la decisión inglesa de no resolverla del todo en «presencia». «Quedaré oculto» refleja mejor el estado resultante que un mero «estaré oculto».'
- source_word: נָע וָנָד
  english_pob_choice: a wanderer and a fugitive
  chosen_spanish: errante y fugitivo
  alternatives_spanish:
  - vagabundo y fugitivo
  - errante y vagabundo
  - errante y nómada
  lexicon: HALOT
  rationale: 'La pareja expresa vida inestable y desplazada. «Errante y fugitivo» conserva el doble matiz: movimiento sin reposo y condición de perseguido o expulsado. «Fugitivo» mantiene la tensión jurídica y social del término.'
- source_word: בָּאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - en el país
  - en la tierra/país
  lexicon: HALOT
  rationale: אֶרֶץ admite «tierra» o «país». Aquí se prefiere «tierra» porque el contexto es amplio y primigenio; «sobre la tierra» refleja la imagen de desplazamiento itinerante sin reducirla a un territorio local.
- source_word: כָל מֹצְאִי
  english_pob_choice: whoever finds me
  chosen_spanish: cualquiera que me encuentre
  alternatives_spanish:
  - todo el que me encuentre
  - quien me encuentre
  - cualquiera hallándome
  lexicon: HALOT
  rationale: La construcción participial con כָל funciona como indefinido universal. «Cualquiera que me encuentre» es natural en español y preserva el alcance abierto de la amenaza.
- source_word: יַהַרְגֵנִי
  english_pob_choice: will kill me
  chosen_spanish: me matará
  alternatives_spanish:
  - me matará a espada
  - me dará muerte
  - me asesinará
  lexicon: HALOT
  rationale: הרג significa matar o dar muerte. «Me matará» es la equivalencia más clara y directa en español contemporáneo, sin añadir matices no presentes en el hebreo.
theological_decisions:
- issue: Modismo de presencia divina en וּמִפָּנֶיךָ אֶסָּתֵר
  english_pob_reading: I will be hidden from your face
  chosen_spanish_reading: quedaré oculto de tu rostro
  alternative_spanish_readings:
  - me ocultaré de tu presencia
  - quedaré oculto de tu presencia
  - seré escondido de tu rostro
  rationale: Se conserva el lenguaje concreto de «rostro» para respetar el hebreo y la relación quebrada entre Caín y Dios. «Presencia» es una interpretación válida, pero en el texto principal se mantiene la tensión del modismo, como en el audit trail inglés.
  doctrine_reference: 'Translation philosophy: preservar la tensión teológica del modismo sin explicitarla demasiado'
- issue: Alcance de אֶרֶץ
  english_pob_reading: on the earth
  chosen_spanish_reading: sobre la tierra
  alternative_spanish_readings:
  - en la tierra
  - en el país
  rationale: «Tierra» mantiene el alcance amplio y primigenio del relato. «País» podría regionalizar innecesariamente el juicio; por eso no se adopta en el texto principal.
  doctrine_reference: Lexical decision on אֶרֶץ / earth-land range
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente del inglés POB, que indica que no fueron necesarias modificaciones adicionales; la redacción española mantiene las mismas decisiones de fondo y solo las expresa en español con ajuste idiomático.
  spanish_consistency_notes:
  - Se mantuvo «tierra» para אֲדָמָה/אֶרֶץ según el contexto y el eco narrativo de Génesis 4.
  - Se preservó la imagen concreta de «rostro» en la relación con Dios, con alternativa explicativa en nota.
  - Se eligió un registro bíblico claro pero no arcaizante, evitando calcos innecesarios como «he aquí» en el texto principal.
  - «Errante y fugitivo» conserva el doble matiz de נָע וָנָד sin fusionarlo en un solo concepto.
