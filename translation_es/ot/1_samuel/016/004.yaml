translation:
  language: es
  text: 'Entonces Samuel hizo lo que Yahvé había hablado y vino a Belén. Los ancianos de la ciudad se estremecieron ante su llegada[a] y dijeron: «¿Vienes en paz?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se estremecieron al salir a su encuentro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - realizó
  - cumplió
  lexicon: HALOT
  rationale: עשה en narrativa expresa acción cumplida; «hizo» conserva la simplicidad y la obediencia implícita sin añadir matiz de mandato que no está explícito en el verbo.
- source_word: אֵת אֲשֶׁר דִּבֶּר יְהוָה
  english_pob_choice: what Yahweh had spoken
  chosen_spanish: lo que Yahvé había hablado
  alternatives_spanish:
  - lo que Yahvé había dicho
  - lo que Yahvé había ordenado
  lexicon: HALOT
  rationale: דִּבֶּר comunica literalmente «hablar»; «había hablado» sigue de cerca el hebreo y evita convertirlo en «ordenado», que sería una intensificación no garantizada por el texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal según la convención del proyecto, en lugar de sustituirlo por un título. «Yahvé» es la forma establecida en el español POB.
- source_word: וַיָּבֹא בֵּית לָחֶם
  english_pob_choice: came to Bethlehem
  chosen_spanish: vino a Belén
  alternatives_spanish:
  - llegó a Belén
  - fue a Belén
  lexicon: HALOT
  rationale: בוא admite «venir/ir/llegar»; en español narrativo «vino a» conserva bien el movimiento hacia Belén y mantiene cercanía con la estructura hebrea sin sonar forzado.
- source_word: וַיֶּחֶרְדוּ
  english_pob_choice: trembled
  chosen_spanish: se estremecieron
  alternatives_spanish:
  - temblaron
  - se llenaron de temor
  lexicon: HALOT
  rationale: חרד expresa agitación temerosa o sobresalto; «se estremecieron» comunica el impacto físico-emocional mejor que un simple «temieron», manteniendo la viveza del verbo.
- source_word: זִקְנֵי הָעִיר
  english_pob_choice: the elders of the city
  chosen_spanish: los ancianos de la ciudad
  alternatives_spanish:
  - los líderes de la ciudad
  - los ancianos de la ciudad
  lexicon: HALOT
  rationale: La construcción se refiere al grupo reconocido de ancianos/dirigentes locales; «ancianos» es fiel y comprensible en español bíblico contemporáneo.
- source_word: לִקְרָאתוֹ
  english_pob_choice: at his coming
  chosen_spanish: al verlo
  alternatives_spanish:
  - al salir a su encuentro
  - cuando salieron a recibirlo
  lexicon: HALOT
  rationale: La expresión puede significar «salir a su encuentro» o reaccionar ante su llegada. En este contexto, «al verlo» recoge la situación de encuentro con naturalidad en español, sin perder el matiz de recepción inquieta.
- source_word: שָׁלוֹם בּוֹאֶךָ
  english_pob_choice: Do you come in peace?
  chosen_spanish: ¿Vienes en paz?
  alternatives_spanish:
  - ¿Vienes pacíficamente?
  - ¿Tu venida es en paz?
  lexicon: HALOT
  rationale: La fórmula hebrea pregunta por la condición pacífica de la llegada. «¿Vienes en paz?» es la manera más natural y fiel de expresarlo en español; evita sonar demasiado explicativa.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino en forma transliterada según la norma del proyecto, para no ocultar el Tetragrámaton detrás de un título. Esto mantiene la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió una formulación natural para la reacción de los ancianos («trembled at his coming») en lugar de una calca más rígida. En español, «se estremecieron al verlo» conserva esa naturalidad y el matiz de sobresalto ante la llegada de Samuel.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, coherente con el estándar POB en español.
  - Se conserva «Belén» como topónimo habitual en español bíblico.
  - «Ancianos» traduce ziqnê ha‘ir con un registro bíblico claro y estable.
  - La pregunta final se formula de manera idiomática sin perder el valor de shalom como paz/ausencia de amenaza.
