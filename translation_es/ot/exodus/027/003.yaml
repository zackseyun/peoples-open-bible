translation:
  language: es
  text: Harás sus ollas[a] para quitar sus cenizas, y sus palas, y sus vasijas, y sus garfios, y sus cazos para brasas[b]; harás todos sus utensilios de bronce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «para quitar sus cenizas grasosas»; la expresión se refiere a retirar las cenizas producidas por las ofrendas del altar.'
    reason: lexical_alternative
  - marker: b
    text: O «cobre» por «bronce».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: You shall make
  chosen_spanish: Harás
  alternatives_spanish:
  - y harás
  - deberás hacer
  - harás tú
  lexicon: עשה
  rationale: La forma verbal hebrea en mandato/instrucción se vierte naturalmente en futuro exhortativo español. 'Harás' conserva el tono directivo sin añadir perífrasis innecesarias.
- source_word: סִּירֹתָיו
  english_pob_choice: its pots
  chosen_spanish: sus ollas
  alternatives_spanish:
  - sus pots
  - sus recipientes
  - sus cazuelas
  lexicon: סיר
  rationale: El término denota recipientes/vasijas para el altar. En español, 'ollas' comunica de manera natural la idea de recipientes metálicos; 'recipientes' es más genérico, pero menos concreto.
- source_word: לְדַשְּׁנוֹ
  english_pob_choice: for removing its ashes
  chosen_spanish: para quitar sus cenizas
  alternatives_spanish:
  - para retirar sus cenizas
  - para limpiar sus cenizas
  - para quitar sus cenizas grasosas
  lexicon: דשן
  rationale: La función es eliminar las cenizas del altar. 'Quitar sus cenizas' expresa con claridad la finalidad sin introducir un calificativo técnico que podría sonar oscuro en español.
- source_word: יָעָיו
  english_pob_choice: its shovels
  chosen_spanish: sus palas
  alternatives_spanish:
  - sus azadones
  - sus cucharones
  - sus herramientas para ceniza
  lexicon: יע
  rationale: El instrumento sirve para manipular ceniza o brasas; 'palas' es el equivalente más natural y reconocible en español para este contexto ritual.
- source_word: מִזְרְקֹתָיו
  english_pob_choice: its basins
  chosen_spanish: sus tazones
  alternatives_spanish:
  - sus cuencos
  - sus vasijas
  - sus palanganas
  lexicon: זרק
  rationale: El término se refiere a recipientes para líquidos/sangre. 'Tazones' es claro y digno en español; 'cuencos' también sería posible, pero 'tazones' resulta más inmediato para lectores generales.
- source_word: מִזְלְגֹתָיו
  english_pob_choice: its forks
  chosen_spanish: sus garfios
  alternatives_spanish:
  - sus tenedores
  - sus horquillas
  - sus ganchos
  lexicon: מזלג
  rationale: En el contexto del altar, no se trata de tenedores de mesa, sino de implementos de metal con puntas. 'Garfios' evita una connotación doméstica moderna y conserva el carácter de herramienta cultual.
- source_word: מַחְתֹּתָיו
  english_pob_choice: its firepans
  chosen_spanish: sus braseros
  alternatives_spanish:
  - sus incensarios
  - sus cazos para brasas
  - sus pebeteros
  lexicon: מחתה
  rationale: En español, 'braseros' transmite mejor el recipiente para brasas/fuego que el anglicismo funcional 'firepans'. 'Incensarios' sería demasiado específico para incienso y no refleja bien el objeto aquí.
- source_word: לְכָל־כֵּלָיו
  english_pob_choice: all its utensils
  chosen_spanish: todos sus utensilios
  alternatives_spanish:
  - todos sus implementos
  - todos sus objetos
  - todas sus vasijas
  lexicon: כלי
  rationale: '''Utensilios'' es el equivalente más amplio y adecuado para la colección de herramientas del altar. Mantiene el sentido funcional del hebreo sin restringirlo a vasijas.'
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: de bronce
  alternatives_spanish:
  - de cobre
  - de metal
  - de latón
  lexicon: נחשת
  rationale: En el contexto del tabernáculo, el POB inglés opta por 'bronze'; 'de bronce' conserva esa decisión y es la opción más estable en español bíblico contemporáneo.
theological_decisions:
- issue: Material de los utensilios del altar
  english_pob_reading: all its utensils of bronze
  chosen_spanish_reading: todos sus utensilios de bronce
  alternative_spanish_readings:
  - todos sus utensilios de cobre
  - todos sus utensilios de metal
  rationale: El texto fija el material como נחשת. Seguir 'bronce' preserva la decisión auditada del POB inglés y evita oscurecer el referente con 'metal', que es demasiado general.
  doctrine_reference: Éxodo 27:3; cf. uso consistente de objetos del tabernáculo en la legislación cultual
- issue: Función de los primeros implementos
  english_pob_reading: its pots for removing its ashes
  chosen_spanish_reading: sus ollas para quitar sus cenizas
  alternative_spanish_readings:
  - sus ollas para retirar sus cenizas
  - sus ollas para limpiar sus cenizas
  rationale: La frase hebrea marca función, no una cualidad espiritual. Traducir la finalidad como acción concreta respeta el texto y mantiene clara la práctica ritual.
  doctrine_reference: Éxodo 27:3; Levítico 1–6 sobre el manejo de las cenizas del altar
translation_notes:
