id: PRO.24.18
reference: Proverbs 24:18
source:
  edition: WLC
  text: פֶּן יִרְאֶ֣ה יְ֭הוָה וְ/רַ֣ע בְּ/עֵינָ֑י/ו וְ/הֵשִׁ֖יב מֵ/עָלָ֣י/ו אַפּֽ/וֹ־׃
translation:
  text: lest Yahweh see it[a], and it be evil in his eyes, and he turn his anger away from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'lest the LORD see it and it be displeasing in his sight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  chosen: or
  alternatives:
  - lest
  - otherwise
  lexicon: HALOT
  rationale: In this warning context, פֶּן introduces the negative consequence of the preceding prohibition. 'Or' is idiomatic modern English that preserves the admonitory force better than the more archaic 'lest,' while 'otherwise' is possible but slightly more interpretive.
- source_word: יִרְאֶה
  chosen: will see
  alternatives:
  - may see
  - should see
  lexicon: HALOT
  rationale: The imperfect here expresses a potential/future consequence in the warning construction with פֶּן. 'Will see' fits the English conditional-warning flow.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְרַע
  chosen: and it will be evil
  alternatives:
  - and be displeasing
  - and it will be bad
  lexicon: HALOT
  rationale: The verb-adjective sequence literally conveys 'and it is evil' in his eyes. 'It will be evil' preserves the Hebrew idiom with minimal smoothing. 'Be displeasing' is a good sense rendering but moves farther from the lexical form.
- source_word: בְּעֵינָיו
  chosen: in his eyes
  alternatives:
  - in his sight
  lexicon: HALOT
  rationale: This is a common Hebrew evaluative idiom. 'In his eyes' keeps the source imagery; 'in his sight' is a natural English alternative.
- source_word: וְהֵשִׁיב
  chosen: and he will turn away
  alternatives:
  - and he will withdraw
  - and he will turn back
  lexicon: HALOT
  rationale: Hiphil of שוב here means to cause to turn back/away. In context, God removes his anger from the enemy being judged. 'Turn away' is clear and close to the Hebrew.
- source_word: מֵעָלָיו
  chosen: from him
  alternatives:
  - off him
  - away from against him
  lexicon: HALOT
  rationale: The prepositional phrase indicates removal from upon the enemy. 'From him' is idiomatic; the underlying 'from upon him' nuance is implicit in English.
- source_word: אַפּוֹ
  chosen: his anger
  alternatives:
  - his wrath
  - his nose
  lexicon: HALOT
  rationale: Though literally 'his nose,' the idiom denotes anger. 'Anger' is the most natural modern rendering; 'wrath' is possible but somewhat weightier and less necessary in this wisdom context.
