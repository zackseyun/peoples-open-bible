translation:
  language: es
  text: como si hubieran llegado a ser un rescate por el pecado de la nación[a], y por la sangre de aquellos devotos y su muerte propiciatoria[b], la providencia divina preservó a Israel, aunque antes había sido maltratado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una vida de sustitución por el pecado de la nación» o «un intercambio por la vida por el pecado de la nación».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su muerte expiatoria». El término griego ἱλαστηρίου admite un matiz de expiación o propiciación.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀντίψυχον
  english_pob_choice: a ransom
  chosen_spanish: un rescate
  alternatives_spanish:
  - una vida de sustitución
  - un intercambio por la vida
  lexicon: LSJ
  rationale: El griego expresa algo dado en lugar de una vida, con sentido sustitutivo y compensatorio. «Rescate» conserva esa fuerza de intercambio en español y suena más natural que una perífrasis como «vida de sustitución».
- source_word: ἁμαρτίας
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - falta
  - ofensa
  lexicon: BDAG
  rationale: El genitivo se entiende mejor como el pecado de la nación, en sentido moral-religioso. «Pecado» mantiene ese peso mejor que «falta» u «ofensa».
- source_word: εὐσεβῶν
  english_pob_choice: devout
  chosen_spanish: devotos
  alternatives_spanish:
  - piadosos
  - temerosos de Dios
  lexicon: BDAG
  rationale: Describe reverencia hacia Dios. «Devotos» es natural en español moderno y conserva el matiz religioso sin sonar excesivamente eclesiástico.
- source_word: ἱλαστηρίου
  english_pob_choice: propitiatory
  chosen_spanish: propiciatoria
  alternatives_spanish:
  - expiatoria
  - de expiación
  - sacrificial
  lexicon: BDAG
  rationale: Aquí el término modifica «muerte» y expresa su valor cultual/redentor. «Propiciatoria» reproduce bien ese matiz y mantiene la tensión lexical que el inglés audita entre propiciatorio y atoning sacrifice.
- source_word: θανάτου
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - morir
  - deceso
  lexicon: BDAG
  rationale: El sustantivo nombra la muerte de esos justos como medio del rescate/preservación. «Muerte» es la traducción directa y más clara.
- source_word: θεία πρόνοια
  english_pob_choice: divine providence
  chosen_spanish: la providencia divina
  alternatives_spanish:
  - la providencia de Dios
  - el cuidado providencial divino
  lexicon: LSJ
  rationale: La expresión personifica o nombra el cuidado de Dios en la historia. «La providencia divina» es idiomática y fiel al concepto teológico sin añadir más de lo que dice el griego.
- source_word: προκακωθέντα
  english_pob_choice: though it had been mistreated before
  chosen_spanish: aunque antes había sido maltratado
  alternatives_spanish:
  - aunque había sido afligido anteriormente
  - aunque ya había sufrido daño
  lexicon: LSJ
  rationale: El participio señala un trato duro previo, con matiz concesivo. «Maltratado» comunica bien ese sentido en español actual y conserva la referencia histórica a Israel.
- source_word: διέσωσεν
  english_pob_choice: preserved
  chosen_spanish: preservó
  alternatives_spanish:
  - salvó
  - libró
  lexicon: BDAG
  rationale: El verbo compuesto sugiere salvar a través del peligro, con idea de preservación. «Preservó» evita cargarlo con resonancias soteriológicas más amplias que «salvó».
theological_decisions:
- issue: Sentido expiatorio/propiciatorio de ἱλαστηρίου en la muerte de los mártires
  english_pob_reading: their propitiatory death
  chosen_spanish_reading: su muerte propiciatoria
  alternative_spanish_readings:
  - su muerte expiatoria
  - su muerte como sacrificio de expiación
  - su muerte propiciatoria/expia­toria
  rationale: El texto griego vincula la muerte de los justos con un efecto cultual de apaciguamiento/expiación. «Propiciatoria» conserva la relación con el inglés auditado y mantiene la ambigüedad útil entre propiciar y expiar sin convertir el verso en una glosa doctrinal cerrada.
  doctrine_reference: 'DOCTRINE.md: ἱλαστήριον → atoning sacrifice / propitiatory'
- issue: Lenguaje sustitutivo de ἀντίψυχον γεγονότας
  english_pob_reading: as though they had become a ransom for the sin of the nation
  chosen_spanish_reading: como si hubieran llegado a ser un rescate por el pecado de la nación
  alternative_spanish_readings:
  - como si se hubieran convertido en una vida de sustitución por el pecado de la nación
  - como si hubieran dado su vida en intercambio por el pecado de la nación
  rationale: La formulación sugiere intercambio sustitutivo respecto del pecado nacional. «Rescate» transmite ese valor sin definir mecánicamente el mecanismo de la expiación, preservando la tensión del original.
  doctrine_reference: LSJ/BDAG contextual usage of ἀντίψυχον
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «atoning-sacrifice death» a «propitiatory death» para reflejar con más precisión τοῦ ἱλαστηρίου θανάτου. La redacción española sigue esa revisión mediante «muerte propiciatoria», y conserva el valor sustitutivo de ἀντίψυχον con «rescate».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; en este versículo no aparece el nombre divino.
  - «Israel» se conserva como nombre propio.
  - Se evita «SEÑOR» y también una paráfrasis doctrinal expansiva.
  - Los corchetes de nota se usan solo en los puntos donde la ambigüedad léxica o textual lo requiere.
