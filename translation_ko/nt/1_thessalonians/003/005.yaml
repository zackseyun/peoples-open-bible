id: 1TH.3.5
reference: 1 Thessalonians 3:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: διὰ τοῦτο κἀγὼ μηκέτι στέγων ἔπεμψα εἰς τὸ γνῶναι τὴν πίστιν ὑμῶν, μή πως ἐπείρασεν ὑμᾶς ὁ πειράζων καὶ εἰς κενὸν γένηται ὁ κόπος ἡμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/003/005.yaml
  text: For this reason[a], when I could bear it no longer, I sent to learn about your faith[b], lest somehow the tempter had tempted you and our labor might be in vain.
  footnotes:
  - marker: a
    text: Or 'your faithfulness' or 'your trust.' The Greek word can carry overlapping senses depending on context.
    reason: alternative_reading
  - marker: b
    text: Or 'in vain' or 'for nothing.'
    reason: lexical_alternative
translation:
  language: ko
  text: 이런 까닭에 나도 더 이상 참을 수 없어 여러분의 믿음[a]을 알아보려고 사람을 보냈습니다. 혹시 시험하는 자가 여러분을 시험하여 우리의 수고가 헛되게[b] 되지 않을까 염려하였기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「여러분의 신실함」, 「여러분의 신뢰」. 헬라어 πίστις는 문맥에 따라 여러 의미를 함께 담는다.
    reason: alternative_reading
  - marker: b
    text: 또는 「공허하게」, 「아무 결실 없이」.
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀγὼ μηκέτι στέγων ἔπεμψα
  english_pob_choice: when I could bear it no longer, I sent
  chosen_korean: 나도 더 이상 참을 수 없어 ... 사람을 보냈습니다
  alternatives_korean:
  - 나도 견딜 수 없어 보냈습니다
  - 나 또한 더는 참지 못하고 보냈습니다
  lexicon: BDAG
  rationale: 3:1의 「더 이상 참을 수 없어」를 1인칭 단수로 반복. 「사람을 보냈다」는 누구(디모데)를 보냈는지 본문에 명시하지 않으므로 한국어에서는 목적어를 자연스럽게 보충한다.
- source_word: μή πως ἐπείρασεν ὑμᾶς ὁ πειράζων
  english_pob_choice: lest somehow the tempter had tempted you
  chosen_korean: 혹시 시험하는 자가 여러분을 시험하여 ... 않을까 염려하였기 때문입니다
  alternatives_korean:
  - 어쩌면 시험하는 자가 여러분을 미혹하지 않았을까 하여
  - 시험자가 여러분을 시험했을지도 모르기에
  lexicon: BDAG
  rationale: πειράζω 어군의 「시험」 의미. 한국 교회 전통의 「시험하는 자」가 사탄을 가리키는 정형 어휘.
- source_word: εἰς κενὸν
  english_pob_choice: in vain
  chosen_korean: 헛되게
  alternatives_korean:
  - 공허하게
  - 아무 결실 없이
  lexicon: BDAG
  rationale: 「헛되다」가 한국어로 가장 자연스럽다.
