translation:
  language: es
  text: Tomó el becerro que habían hecho, lo quemó con fuego, lo molió hasta dejarlo fino, lo esparció sobre la superficie del agua e hizo que los hijos de Israel[a] lo bebieran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'los israelitas'. El hebreo dice literalmente 'los hijos de Israel', una designación pactual estándar del pueblo en conjunto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֵגֶל
  english_pob_choice: the calf
  chosen_spanish: el becerro
  alternatives_spanish:
  - el ternero
  - el novillo
  lexicon: HALOT
  rationale: עֵגֶל designa un bovino joven; en español bíblico y moderno, 'becerro' comunica con naturalidad la imagen del ídolo sin sonar demasiado técnico. Aunque el inglés POB usa 'calf', en español 'becerro' es la opción más idiomática y fiel para este contexto del becerro de oro.
- source_word: אֲשֶׁר עָשׂוּ
  english_pob_choice: that they had made
  chosen_spanish: que habían hecho
  alternatives_spanish:
  - que hicieron
  - el cual habían hecho
  lexicon: HALOT
  rationale: La cláusula relativa identifica al ídolo como obra del pueblo. 'Habían hecho' preserva el valor anterior de la acción dentro de la narración en español, como en el audit trail inglés.
- source_word: וַיִּשְׂרֹף בָּאֵשׁ
  english_pob_choice: burned it with fire
  chosen_spanish: lo quemó con fuego
  alternatives_spanish:
  - lo quemó en el fuego
  - lo consumió con fuego
  lexicon: HALOT
  rationale: La construcción hebrea es concreta y material. 'Con fuego' sigue de cerca la relación entre el verbo y el complemento, evitando una paráfrasis más libre como 'lo consumió'.
- source_word: וַיִּטְחַן עַד אֲשֶׁר דָּק
  english_pob_choice: ground it until it was fine
  chosen_spanish: lo molió hasta hacerlo fino
  alternatives_spanish:
  - lo molió hasta que quedó fino
  - lo trituró hasta hacerlo polvo
  lexicon: HALOT
  rationale: טחן es 'moler' o 'triturar', y דק expresa que quedó muy fino. 'Hasta hacerlo fino' conserva la meta del proceso sin añadir 'polvo', que sería más interpretativo de lo que exige el hebreo.
- source_word: וַיִּזֶר
  english_pob_choice: scattered it
  chosen_spanish: lo esparció
  alternatives_spanish:
  - lo dispersó
  - lo regó
  lexicon: HALOT
  rationale: El verbo describe la dispersión del material molido. 'Esparció' es la forma más natural en español y mantiene la imagen de distribuirlo sobre la superficie del agua.
- source_word: עַל פְּנֵי הַמַּיִם
  english_pob_choice: on the surface of the water
  chosen_spanish: sobre la superficie del agua
  alternatives_spanish:
  - sobre la cara del agua
  - encima del agua
  lexicon: HALOT
  rationale: פְּנֵי significa literalmente 'rostro/cara', pero en español 'superficie' transmite bien el sentido espacial sin sonar forzado. Se conserva el matiz visual del hebreo.
- source_word: וַיַּשְׁקְ אֶת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: made the sons of Israel drink it
  chosen_spanish: hizo beberlo a los hijos de Israel
  alternatives_spanish:
  - hizo beberlo a los israelitas
  - los obligó a beberlo
  lexicon: HALOT
  rationale: 'El Hiphil de שׁקה es causativo: ''hacer beber''. Se mantiene ''hizo beberlo'' para conservar la fuerza verbal del hebreo. ''Hijos de Israel'' reproduce fielmente בְּנֵי יִשְׂרָאֵל, siguiendo la preferencia de la POB por no neutralizar automáticamente la designación del pueblo.'
theological_decisions:
- issue: Mantenimiento de la designación covenantal בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  rationale: El hebreo dice explícitamente 'hijos de Israel'. En español, 'hijos de Israel' conserva la forma del texto y la resonancia pactual sin reemplazarla por una denominación más genérica. Se deja constancia de la alternativa 'israelitas' para lectores que prefieran un equivalente colectivo más natural.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión final del inglés POB en el punto de 'burned it with fire' y mantiene la secuencia verbal compacta del hebreo. El español ajusta el léxico donde la equivalencia literal directa sonaría menos natural ('becerro', 'superficie del agua', 'hizo beberlo'), pero sin debilitar la cadena de acciones del texto ni la designación pactual final.
  spanish_consistency_notes:
  - Se usa 'becerro' para הָעֵגֶל por ser el término más natural y reconocible en español bíblico para el ídolo del Éxodo.
  - Se mantiene 'hijos de Israel' como equivalente directo de בְּנֵי יִשְׂרָאֵל, con nota alternativa para 'israelitas'.
  - '''Lo molió hasta hacerlo fino'' preserva la idea de molienda intensiva sin introducir ''polvo'' como expansión innecesaria.'
  - La frase final conserva el causativo hebreo con 'hizo beberlo', evitando una simple pasiva o un giro menos preciso.
