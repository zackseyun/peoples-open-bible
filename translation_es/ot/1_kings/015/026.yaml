translation:
  language: es
  text: Hizo lo malo ante los ojos de Yahvé, y anduvo en el camino de su padre, y en su pecado[a] con el que hizo pecar a Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Su pecado» puede referirse al pecado característico de su casa o del modelo heredado de su padre, no solo a una falta aislada.
    reason: theological_note
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Hizo
  alternatives_spanish:
  - Hizo lo que era
  - Obró
  lexicon: HALOT
  rationale: En la fórmula de evaluación real, עשה se expresa naturalmente en español como «hacer»; «hizo» conserva la brevedad y el carácter formular del texto sin añadir explicación.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - lo que era malo
  - el mal
  lexicon: HALOT
  rationale: El sustantivo/adjetivo con artículo funciona como una expresión sustantiva de juicio moral. «Lo malo» conserva la concisión del hebreo y evita una paráfrasis excesiva.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the sight of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en la presencia de Yahvé
  lexicon: HALOT
  rationale: La imagen evaluativa se mantiene con una locución española idiomática. «Ante los ojos de Yahvé» conserva la metáfora y el valor de evaluación pública/divina del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino como nombre propio, conforme al criterio del POB, en vez de sustituirlo por un título.
- source_word: וַיֵּלֶךְ
  english_pob_choice: walked
  chosen_spanish: anduvo
  alternatives_spanish:
  - caminó
  - siguió
  lexicon: HALOT
  rationale: En el modismo moral «andar en el camino de», «anduvo» reproduce mejor la metáfora conductual que un simple «fue» o «caminó» físico.
- source_word: בְּדֶרֶךְ אָבִיו
  english_pob_choice: in the way of his father
  chosen_spanish: en el camino de su padre
  alternatives_spanish:
  - en la senda de su padre
  - siguiendo el ejemplo de su padre
  lexicon: HALOT
  rationale: «Camino» conserva la imagen bíblica del modo de vida y la imitación del patrón paterno sin volverla demasiado interpretativa.
- source_word: וּבְחַטָּאתוֹ
  english_pob_choice: and in his sin
  chosen_spanish: y en su pecado
  alternatives_spanish:
  - y en su culpa
  - y en el pecado suyo
  lexicon: HALOT
  rationale: חטאת con sufijo se refiere al pecado característico asociado con el padre/linaje. «Pecado» es la correspondencia directa y transparente en español.
- source_word: אֲשֶׁר הֶחֱטִיא
  english_pob_choice: with which he caused
  chosen_spanish: con el cual hizo pecar
  alternatives_spanish:
  - por el cual hizo pecar
  - mediante el cual hizo pecar
  lexicon: HALOT
  rationale: El hifil de חטא es causativo. «Hizo pecar» reproduce ese valor de causa directa, y «con el cual» refleja de manera natural el antecedente instrumental del relativo.
- source_word: אֶת יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - a todo Israel
  lexicon: HALOT
  rationale: El objeto directo se marca normalmente con «a» en español cuando se trata de personas o entidades personificadas; aquí mantiene claridad sintáctica sin añadir contenido.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio del pacto, no un sustituto reverencial. «Yahvé» es la forma base adoptada para el Tetragrámaton en el texto español del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La base inglesa revisó la frase final de «by which» a «with which» para reflejar con más literalidad la preposición hebrea. En español, «con el cual» sigue esa preferencia y mantiene la relación instrumental del relativo sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, conforme al estándar del proyecto.
  - Se usa «camino» para el modismo moral, en coherencia con otros pasajes de Reyes.
  - Se conserva la fuerza causativa de הֶחֱטִיא con «hizo pecar», evitando suavizarla a «llevó a pecar».
