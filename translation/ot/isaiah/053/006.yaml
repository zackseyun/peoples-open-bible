theological_decisions:
- issue: Rendering the servant's bearing of עָוֹן in relation to substitutionary meaning
  chosen_reading: The verse is translated to state that Yahweh placed the iniquity of all on 'him' without expanding the text into a fuller doctrinal paraphrase.
  alternative_readings:
  - The LORD caused the punishment due for all to fall on him
  - The LORD made the guilt of all meet on him
  rationale: Isaiah 53:6 strongly supports a vicarious-bearing sense, but the translation should not import a more systematized doctrinal formula than the Hebrew itself states. 'Has laid on him the iniquity of us all' preserves the text's theological force while leaving the precise mechanics expressed only as far as the Hebrew warrants.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Gendered distributive singular אִישׁ
  chosen_reading: each man
  alternative_readings:
  - each one
  - everyone
  rationale: The source uses a grammatically masculine singular with distributive force. Per doctrine, gender-accurate rendering is preferred where it matches the source's intent; the phrase remains universally inclusive in context because it is framed by 'all of us.'
  doctrine_reference: Gender-accurate over gender-neutral
