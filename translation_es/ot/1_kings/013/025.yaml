  - severity: low
    issue: «Echado» debilita el matiz de מֻשְׁלֶכֶת.
    rationale: El participio pasivo indica algo arrojado o lanzado. «Arrojado» preserva mejor la fuerza del hebreo que «echado».
  - severity: medium
