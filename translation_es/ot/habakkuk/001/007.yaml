translation:
  language: es
  text: Es terrible y temible[a]; su justicia y su majestad[b] proceden de sí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «espantoso y aterrador».'
    reason: alternative_reading
  - marker: b
    text: 'O: «su elevación» o «su dignidad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָיֹם
  english_pob_choice: dreadful
  chosen_spanish: terrible
  alternatives_spanish:
  - pavoroso
  - espantoso
  lexicon: HALOT
  rationale: אָמַם/אָיֹם describe algo que inspira temor o pavor. 'Terrible' en español conserva ese peso de amenaza y juicio sin sonar demasiado coloquial, y corresponde bien al campo semántico elegido en la base inglesa.
- source_word: וְנוֹרָא
  english_pob_choice: fearsome
  chosen_spanish: temible
  alternatives_spanish:
  - que inspira temor
  - aterrador
  lexicon: HALOT
  rationale: La pareja intensifica la idea de provocar miedo reverencial o pavor. 'Temible' mantiene el valor adjetival y la intensificación sin recargar el verso.
- source_word: הוּא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - él es
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino singular, el referente es colectivo/nacional. En español se expresa de forma natural con verbo impersonal/copulativo sin forzar un pronombre explícito.
- source_word: מִמֶּנּוּ
  english_pob_choice: from itself
  chosen_spanish: de sí mismo
  alternatives_spanish:
  - de sí
  - de él mismo
  lexicon: HALOT
  rationale: La preposición señala origen interno. 'De sí mismo' conserva la idea de auto-origen o procedencia interna que el audit trail inglés destaca para esta nación.
- source_word: מִשְׁפָּטוֹ
  english_pob_choice: its justice
  chosen_spanish: su justicia
  alternatives_spanish:
  - su juicio
  - su derecho a juzgar
  lexicon: HALOT
  rationale: מִשְׁפָּט puede ser 'juicio' o 'justicia'. Se eligió 'justicia' por brevedad e idiomaticidad, sin perder la carga de autoridad judicial/política señalada en la nota inglesa.
- source_word: וּשְׂאֵתוֹ
  english_pob_choice: its majesty
  chosen_spanish: su majestad
  alternatives_spanish:
  - su elevación
  - su eminencia
  - su dignidad
  lexicon: HALOT
  rationale: שְׂאֵת denota elevación, exaltación o estatus elevado. 'Majestad' refleja bien la idea de rango, elevación y pretensión de honor en este contexto, siguiendo la revisión inglesa.
- source_word: יֵצֵא
  english_pob_choice: proceed
  chosen_spanish: proceden
  alternatives_spanish:
  - salen
  - proceden de
  - emanan
  lexicon: HALOT
  rationale: El verbo expresa procedencia/emergencia desde una fuente. En español, 'proceden' transmite con naturalidad que ambas realidades derivan de su propio origen.
theological_decisions:
- issue: Auto-origen de la justicia y el honor de la potencia descrita
  english_pob_reading: its justice and its majesty proceed from itself
  chosen_spanish_reading: su justicia y su majestad proceden de sí mismo
  alternative_spanish_readings:
  - su justicia y su majestad salen de sí mismo
  - su juicio y su majestad proceden de sí mismo
  rationale: Se conserva la tensión teológica de que su criterio de justicia y su pretensión de honor no reciben autoridad superior, sino que brotan de sí mismos. El español mantiene esa denuncia sin suavizarla.
  doctrine_reference: Autoridad humana autoexaltada vs. autoridad bajo Dios; cf. tema bíblico de soberbia de las naciones.
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo directo y el audit trail inglés con alta concordancia. Se adoptó 'majestad' para שְׂאֵת conforme a la revisión inglesa más reciente, y se mantuvo la idea de procedencia interna para מִמֶּנּוּ, evitando diluir la crítica de origen/autonomía del poder descrito.
  spanish_consistency_notes:
  - Se preserva el paralelismo binario del hebreo con dos adjetivos y dos sustantivos coordinados.
  - Se evita 'SEÑOR' porque el texto no contiene el Tetragrámaton ni una cita de κύριος.
  - '''Majestad'' se usa en sentido de estatus o elevación, no como título divino.'
  - '''Proceden de sí mismo'' mantiene el matiz de origen interno señalado por el audit trail inglés.'
