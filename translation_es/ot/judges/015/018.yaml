revisions:
- from: 'Y sintió mucha sed[a], y clamó a Yahvé y dijo: «Tú has puesto en mano de tu siervo la gran liberación[c][b] esta, y ahora ¿moriré de sed y caeré en mano de los incircuncisos?»'
  to: 'Y tuvo mucha sed[a], y clamó a Yahvé y dijo: «Tú has dado esta gran liberación[b] por mano de tu siervo, y ahora ¿moriré de sed y caeré en manos de los incircuncisos?[c]»'
  rationale: Se corrige la desalineación de la nota [a], se mejora el modismo instrumental בְיַד con «por mano de tu siervo», se normaliza el orden natural de «esta gran liberación», y se pule «en manos de» para una lectura española más idiomática sin perder el sentido del hebreo ni las decisiones léxicas del POB.
