translation:
  language: es
  text: 'Entonces Abraham respondió y dijo: «He aquí, te ruego, me he atrevido a hablar a mi Señor[a], aunque soy polvo y ceniza».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi señor». La forma hebrea puede ser un trato respetuoso; aquí se escribe con mayúscula porque el contexto inmediato identifica al interlocutor con Yahvé.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: En español, «respondió» conserva la función narrativa de introducir la réplica sin sonar mecánico. La combinación con «y dijo» mantiene el paralelismo hebreo con וַיֹּאמַר.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: Se preserva el binomio verbal hebreo con una fórmula natural en español, manteniendo el estilo narrativo sin redundancia excesiva.
- source_word: הִנֵּה נָא
  english_pob_choice: Behold, please
  chosen_spanish: He aquí, te ruego
  alternatives_spanish:
  - Mira, por favor
  - He aquí, por favor
  - Mira, te ruego
  lexicon: HALOT
  rationale: «He aquí» refleja la llamada de atención de הִנֵּה y «te ruego» conserva el valor de súplica/politesse de נָא en un registro más formal y bíblico, sin depender de un calco coloquial.
- source_word: הוֹאַלְתִּי
  english_pob_choice: I have undertaken / I have dared
  chosen_spanish: me he atrevido
  alternatives_spanish:
  - he osado
  - me he permitido
  - he tomado la libertad
  lexicon: HALOT
  rationale: El verbo expresa una iniciativa humilde y audaz ante un superior. «Me he atrevido» comunica bien esa tensión entre reverencia y osadía, y resulta idiomático en español.
- source_word: לְדַבֵּר
  english_pob_choice: to speak
  chosen_spanish: hablar
  alternatives_spanish:
  - hablarte
  - decir
  lexicon: HALOT
  rationale: «Hablar» es la forma natural en español para este infinitivo en un contexto de conversación deferente; con la preposición y el complemento, evita dureza innecesaria.
- source_word: אֶל אֲדֹנָי
  english_pob_choice: to my Lord
  chosen_spanish: a mi Señor
  alternatives_spanish:
  - a mi señor
  lexicon: HALOT
  rationale: 'Se conserva la ambigüedad respetuosa del hebreo: puede leerse como trato reverente humano o, por el contexto, como referencia al Señor divino. La mayúscula refleja la identificación contextual con Yahvé sin sustituir el término por el nombre divino.'
- source_word: וְאָנֹכִי
  english_pob_choice: though I am
  chosen_spanish: aunque soy
  alternatives_spanish:
  - y soy
  - mientras soy
  lexicon: HALOT
  rationale: La conjunción hebrea adquiere sentido concesivo por el contexto; «aunque soy» expresa con claridad la humildad contrastiva de Abraham.
- source_word: עָפָר וָאֵפֶר
  english_pob_choice: dust and ashes
  chosen_spanish: polvo y ceniza
  alternatives_spanish:
  - polvo y ashes
  - polvo y cenizas
  lexicon: HALOT
  rationale: La expresión fija de insignificancia y mortalidad se vierte con un equivalente natural y reconocible en español. «Ceniza» conserva el paralelismo semántico con el hebreo; se evita «cenizas» porque el singular colectivo comunica mejor el par formular.
theological_decisions:
- issue: Tratamiento de אֲדֹנָי en la dirección de Abraham
  english_pob_reading: my Lord
  chosen_spanish_reading: mi Señor
  alternative_spanish_readings:
  - mi señor
  rationale: El hebreo puede funcionar como un trato respetuoso genérico, pero el contexto inmediato identifica al interlocutor con Yahvé. La mayúscula en «Señor» preserva esa identificación contextual sin borrar la forma léxica del original ni convertirla en una sustitución automática por un título litúrgico fijo.
  doctrine_reference: Contestación entre el uso reverencial de אדני y la referencia contextual al Señor divino; mantener la tensión textual sin aplanarla.
translation_notes:
  revision_awareness: Se siguió el ajuste más reciente del POB inglés, que prefirió una formulación más formal para הִנֵּה־נָא y una opción menos intensa que «dared» para הוֹאַלְתִּי. En español, esa revisión se refleja con «He aquí, te ruego» y «me he atrevido», procurando fidelidad semántica y registro bíblico natural.
  spanish_consistency_notes:
  - Se conserva la voz narrativa en pasado y la estructura reverente del discurso.
  - La mayúscula en «Señor» responde al contexto teológico, no a una normalización automática.
  - «Polvo y ceniza» mantiene la expresión fija de humildad y mortalidad con naturalidad en español.
  - Se usa «He aquí» como equivalente más solemne de הִנֵּה, acorde con un registro bíblico moderno.
