translation:
  language: es
  text: El horno prueba el temple en la inmersión[a]; así el vino prueba los corazones en la contienda[b] de los soberbios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La primera mitad del verso es difícil en griego. La frase traducida «el temple en la inmersión» también puede entenderse más específicamente como «el filo al apagarlo» o, más generalmente, «el trabajo del metal en la inmersión».
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «en la batalla de los soberbios». El griego puede denotar batalla o conflicto; aquí se traduce con un término más general como «contienda».
    reason: alternative_reading
lexical_decisions:
- source_word: κάμινος
  english_pob_choice: furnace
  chosen_spanish: horno
  alternatives_spanish:
  - furnace
  - horno de fundición
  - caldera
  lexicon: LSJ
  rationale: En español, «horno» comunica de manera natural la imagen de un recinto de calor intenso. Dado que el texto continúa con lenguaje de prueba y un término metalúrgico difícil, «horno» conserva la fuerza de la imagen sin introducir una tecnicidad innecesaria.
- source_word: δοκιμάζει
  english_pob_choice: tests
  chosen_spanish: prueba
  alternatives_spanish:
  - examina
  - pone a prueba
  - comprueba
  lexicon: LSJ
  rationale: «Prueba» preserva el valor evaluativo de δοκιμάζει y suena natural en español bíblico contemporáneo. Mantiene la idea de discernir calidad o autenticidad.
- source_word: στόμωμα
  english_pob_choice: tempering
  chosen_spanish: temple
  alternatives_spanish:
  - templado
  - endurecimiento
  - filo
  lexicon: LSJ
  rationale: La voz griega es difícil y el propio audit trail marca una ambigüedad importante. «Temple» permite reflejar un proceso metalúrgico de endurecimiento o tratamiento por calor, sin fijar demasiado si se trata de un borde, una pieza o el metal en general.
- source_word: ἐν βαφῇ
  english_pob_choice: in dipping
  chosen_spanish: en el remojo
  alternatives_spanish:
  - por inmersión
  - en la inmersión
  - en el temple
  lexicon: LSJ
  rationale: «Βαφή» puede aludir a inmersión, teñido o apagado por enfriamiento. «Remojo» conserva la idea básica de sumergir/empapar sin decidir en exceso entre dyeing, quenching o inmersion técnica; el contexto metalúrgico queda sugerido por «temple».
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de igual modo
  - de la misma manera
  - por tanto
  lexicon: LSJ
  rationale: «Así» introduce la comparación con claridad y sin añadir matiz lógico ajeno.
- source_word: οἶνος
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino fermentado
  - vino
  lexicon: LSJ
  rationale: Equivalente directo y natural.
- source_word: καρδίας
  english_pob_choice: hearts
  chosen_spanish: los corazones
  alternatives_spanish:
  - los ánimos
  - el corazón
  - el interior
  lexicon: LSJ
  rationale: El plural preserva el sentido antropológico de la expresión y evita reducirlo a una sola interioridad abstracta.
- source_word: ἐν μάχῃ
  english_pob_choice: in the strife
  chosen_spanish: en la contienda
  alternatives_spanish:
  - en la batalla
  - en el conflicto
  - en la pelea
  lexicon: LSJ
  rationale: «Contienda» comunica conflicto sin forzar un escenario militar. Refleja bien el sentido relacional/social de μάχη en el contexto.
- source_word: ὑπερηφάνων
  english_pob_choice: of the proud
  chosen_spanish: de los soberbios
  alternatives_spanish:
  - de los orgullosos
  - de los arrogantes
  - de los altivos
  lexicon: LSJ
  rationale: «Soberbios» conserva el tono moral del término griego y corresponde a un registro bíblico claro en español. Además, expresa bien la idea de orgullo insolente o altivez.
theological_decisions:
- issue: Sentido del primer hemistiquio con στόμωμα ἐν βαφῇ
  english_pob_reading: A furnace tests the tempering in dipping.
  chosen_spanish_reading: Un horno prueba el temple en el remojo.
  alternative_spanish_readings:
  - Un horno prueba el filo al apagarlo.
  - Un horno prueba el metal en la inmersión.
  rationale: La construcción griega es oscura y el audit trail la trata como un crux lexical, no doctrinal. La traducción española conserva la imagen de prueba por calor y sumersión, sin resolver artificialmente la ambigüedad técnica.
  doctrine_reference: Sabiduría sapiencial; no implica una doctrina específica
- issue: Valor de μάχη como conflicto general o combate literal
  english_pob_reading: in the strife of the proud
  chosen_spanish_reading: en la contienda de los soberbios
  alternative_spanish_readings:
  - en la batalla de los soberbios
  - en el conflicto de los soberbios
  rationale: La línea no exige una escena militar; el contexto sugiere la fricción que el vino revela entre personas soberbias. «Contienda» mantiene esa amplitud y sigue de cerca la decisión inglesa de «strife».
  doctrine_reference: Sabiduría sobre la conducta humana
translation_notes:
  revision_awareness: 'El texto griego fue evaluado en el audit trail como un caso de alta concordancia con una dificultad léxica importante en el primer hemistiquio. La versión española sigue esa cautela: conserva la imagen de prueba metalúrgica sin sobreinterpretarla y refleja la alternativa de μάχη con una nota, tal como lo hace el POB inglés.'
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé» fuera del versículo, ya que no aparece ningún término divino aquí.
  - Se prefirió un español bíblico moderno y sobrio, evitando calcos excesivamente duros pero sin suavizar la imaginería sapiencial.
  - «Soberbios» se eligió por su carga moral tradicional, coherente con el registro de literatura sapiencial.
  - La estructura comparativa «...; así ...» sigue el paralelismo del griego y preserva el contraste entre el primer y el segundo miembro.
