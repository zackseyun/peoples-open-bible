- from: Tomad dinero duplicado en vuestra mano[a], y llevad de vuelta en vuestra mano el dinero que fue devuelto en la boca de vuestros costales[b]; quizá fue un error.
  to: Lleven dinero doble en su mano, y lleven de regreso en su mano el dinero que fue devuelto en la boca de sus sacos[a]; quizá fue un error.[b]
  rationale: Se corrigió la ubicación de la nota literal para que acompañe 'boca de sus sacos', se normalizó el registro al español neutral latinoamericano ('lleven', 'su/sus'), se reemplazó 'dinero duplicado' por 'dinero doble' por mayor naturalidad y mejor alineación con 'double money', y se sustituyó 'costales' por 'sacos' para mayor neutralidad. También se ajustó la nota alternativa para reflejar con más fidelidad el historial auditado de תָּשִׁיבוּ בְיֶדְכֶם.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:43:24Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo en los elementos principales: ''dinero duplicado'' refleja כֶּסֶף מִשְׁנֶה, ''fue devuelto'' comunica bien el participio pasivo הַמּוּשָׁב, y ''quizá fue un error'' transmite adecuadamente אוּלַי מִשְׁגֶּה הוּא. Sin embargo, la representación de las notas y del paralelismo hebreo necesita corrección: la nota [a] está anclada en ''mano'' pero explica ''boca de vuestros costales'', y la nota [b] ofrece una alternativa impropia para תָּשִׁיבוּ בְיֶדְכֶם. También conviene ajustar ''llevad de vuelta'' a una forma más directa que preserve mejor el valor de ''take back'' sin perder naturalidad.'
  spanish_quality_summary: El español es mayormente claro, pero mezcla registro peninsular ('tomad', 'vuestra') con un objetivo declarado neutral latinoamericano; además, 'dinero duplicado' suena menos natural que 'dinero doble' o 'el doble de dinero', y la colocación de la nota [a] es confusa. 'Costales' es entendible en América Latina, pero 'sacos' es más ampliamente eclesial y neutral. Una redacción revisada puede conservar la imaginería hebrea y mejorar la legibilidad.
  glossary_alignment: 'No hay términos teológicos sensibles aquí. La principal cuestión léxica es estilística y de fidelidad idiomática: mantener ''boca'' para פִּי es correcto, pero la nota debe anclarse allí; para תָּשִׁיבוּ בְיֶדְכֶם, ''llevad de vuelta'' puede mejorarse a ''lleven de regreso'' o ''devuelvan consigo'', y ''dinero doble'' alinea mejor con la decisión inglesa ''double money'' que ''dinero duplicado''.'
  issues:
  - severity: high
    issue: La nota [a] está anclada en 'mano' pero explica 'la boca de vuestros costales'.
    rationale: Esto invierte los referentes de las notas respecto del texto y del expediente inglés, creando una ayuda incorrecta para el lector.
  - severity: medium
    issue: La nota [b] no corresponde bien al texto principal ni al expediente auditado.
    rationale: 'El expediente inglés conserva una nota de historial de redacción para ''return in your hand''; en español, ''O: «devolved en vuestra mano»'' suena antinatural y no aporta una alternativa útil al lector.'
  - severity: medium
    issue: Registro pronominal no alineado con el objetivo de español neutral latinoamericano.
    rationale: El uso de 'tomad', 'vuestra', 'vuestros' es comprensible, pero no encaja con la pauta de español neutral latinoamericano / ampliamente legible en iglesia.
  - severity: low
    issue: '''Dinero duplicado'' es menos natural en español que una formulación como ''dinero doble''.'
    rationale: Aunque es fiel semánticamente, la expresión puede sentirse calcada; 'dinero doble' preserva mejor la concisión del original y suena más idiomático.
  - severity: low
    issue: '''Costales'' es regionalmente marcado.'
    rationale: '''Sacos'' comunica el mismo referente de forma más ampliamente neutral en el ámbito hispano.'
  revised_spanish_text: Lleven dinero doble en su mano, y lleven de regreso en su mano el dinero que fue devuelto en la boca de sus sacos[a]; quizá fue un error.[b]
  revised_footnotes:
