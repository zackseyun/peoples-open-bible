review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español no sigue fielmente la primacía del hebreo ni la decisión auditada en inglés para קרית קדש. El original hebreo apoya «la ciudad santa», mientras que el borrador adopta «la ciudad escogida del santuario» a partir del paralelo griego, pese a que la auditoría inglesa explícitamente prefirió el hebreo aquí. El resto del versículo refleja bien el sentido fuente: incendio de la ciudad, desolación de sus calles, conservación del modismo «por mano de Jeremías», aflicción del profeta y alusión a su llamado desde el vientre.'
  spanish_quality_summary: 'El español es legible y digno, pero «la ciudad escogida del santuario» suena forzado y menos natural que «la ciudad santa». Además, la nota [a] está mal anclada: en el texto el marcador aparece sobre «Prendieron fuego», pero la nota explica la alternativa a «por mano de Jeremías». Conviene mover ese marcador al sintagma correspondiente. Lo demás está bien formulado en español e idiomáticamente claro.'
  glossary_alignment: No hay conflictos mayores con la terminología del proyecto. «Jeremías» es aceptable en español e inteligible. «Calles», «afligieron» y «formado en el vientre como profeta» concuerdan con la auditoría. La corrección principal es alinear קרית קדש con «la ciudad santa», no con una reconstrucción influida por el griego.
  issues:
  - severity: high
    issue: «la ciudad escogida del santuario» no refleja la decisión fuente primaria
    rationale: El hebreo dice קרית קדש, y la auditoría inglesa eligió «the holy city» precisamente frente al griego paralelo. El español debe seguir esa decisión y no introducir «escogida del santuario».
  - severity: medium
    issue: La nota [a] está anclada en el lugar incorrecto
    rationale: La nota [a] explica la alternativa a ביד ירמיהו («por mano de Jeremías» / «por medio de Jeremías»), pero el marcador aparece junto a «Prendieron fuego». Debe colocarse en «por mano de Jeremías[a]».
  - severity: low
    issue: La justificación léxica del borrador sobre קרית קדש contradice la auditoría inglesa
    rationale: La entrada léxica española afirma conservar una tensión entre hebreo y griego que la auditoría inglesa decidió no mantener en el texto principal. Debe ajustarse a la racionalidad documentada.
  revised_spanish_text: Prendieron fuego a la ciudad santa, y desolaron sus calles[b] por mano de Jeremías[a]; porque lo afligieron, aunque había sido formado en el vientre como profeta[c].
  revised_footnotes:
