  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Las decisiones cultuales principales son adecuadas: חטאת como ''sacrificio por el pecado'', עֹלָה como ''holocausto'', מִנְחָה como ''ofrenda de cereal'', נְסָכִים como ''libaciones''. La única corrección necesaria es la alineación de notas léxicas con el expediente inglés y la adición de la alternativa para ''libaciones''.'
