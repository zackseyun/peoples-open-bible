    issue: «No te hagas familiar con» suena antinatural en español
    rationale: Aunque intenta reflejar «become familiar with», en español amplio esa construcción es poco idiomática. «No te familiarices con» o «No te acostumbres a tratar con» transmiten mejor la advertencia sapiencial sobre establecer trato cercano o habitual.
