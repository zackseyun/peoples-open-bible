translation:
  text: Bethel. And Jacob remembered the prayer with which his father had blessed
    Levi and Judah, and he rejoiced and blessed the God of his fathers Abraham and
    Isaac. And he said, “Now I know that I have an everlasting hope, and my children
    also, before the God of all.” And thus it was ordained concerning the two of them,
    and it was recorded for them as an everlasting, righteous testimony on the heavenly
    tablets, just as Isaac blessed them.
