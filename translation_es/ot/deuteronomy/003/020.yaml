review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: Yahvé da descanso a los hermanos de Israel como ya lo ha dado a los destinatarios; ellos también tomarán posesión de la tierra al otro lado/más allá del Jordán; después podrán volver a la posesión que Moisés les dio. Sin embargo, hay un desajuste importante con el hebreo en «Yahvé su Dios», porque el texto dice explícitamente «Yahvé vuestro Dios» (אֱלֹהֵיכֶם), no «su Dios».'
  spanish_quality_summary: El español es claro y digno, pero mezcla voseo peninsular («vuestros», «vosotros», «os») con un registro que el proyecto define como neutral latinoamericano/bien legible en iglesia. Además, «su Dios» introduce ambigüedad referencial y rompe la cohesión con la segunda persona del contexto. Conviene ajustar a una segunda persona plural consistente y más neutral.
  glossary_alignment: 'Acierta en «Yahvé» para יהוה y en «tomen posesión de» para וירשו. La nota sobre «heredad» como alternativa a «posesión» es válida. Debe corregirse «Yahvé su Dios» a «Yahvé su Dios de ustedes» o mejor, en texto natural, reestructurar a «la tierra que Yahvé, su Dios, les da», manteniendo la referencia de 2mp. También conviene alinear el registro pronominal con español neutral latinoamericano: «sus hermanos», «ustedes», «les».'
  issues:
  - severity: high
    issue: «Yahvé su Dios» traduce incorrectamente אֱלֹהֵיכֶם
    rationale: 'El hebreo tiene segunda persona plural: «Yahvé vuestro Dios / Yahvé, su Dios de ustedes». «Su Dios» puede leerse como tercera persona y altera el referente.'
  - severity: medium
    issue: Registro pronominal no alineado con el español neutral latinoamericano
    rationale: El borrador usa «vuestros/vosotros/os», más propio del español peninsular. La guía pide español neutral latinoamericano o ampliamente legible en iglesia.
  - severity: low
    issue: La nota c podría ajustarse mejor a la alternativa del POB inglés
    rationale: El inglés auditado preserva específicamente la alternativa «to his inheritance». «A su heredad» ya la da, pero la explicación puede ser más directa y menos interpretativa.
