    rationale: Aunque el inglés auditado adoptó «folds», la evidencia hebrea y la nota léxica siguen enfatizando borde/extremo/esquina de la prenda. En español, «pliegues» desplaza el foco desde el extremo de la prenda hacia su dobladura.
  - severity: medium
    issue: «vestido» puede sonar demasiado específico o marcado
    rationale: En español general contemporáneo, «vestido» a menudo se entiende como una prenda femenina. «Manto» o «prenda» evita esa ambigüedad y encaja mejor con el registro bíblico.
  - severity: low
    issue: La nota usa «alas/filos», y «filos» resulta poco natural
    rationale: Para una prenda, «bordes» o «extremos» comunica mejor el sentido de כָּנָף sin introducir una imagen extraña.
