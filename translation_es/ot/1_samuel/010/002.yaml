revisions:
- from: 'Cuando te apartes de mí hoy[a], encontrarás a dos hombres junto a la tumba de Raquel, en el territorio de Benjamín, en Zelzaj; y ellos te dirán: «Las asnas que fuiste a buscar han sido halladas, y mira, tu padre ha dejado de preocuparse por las asnas y está inquieto por ustedes, diciendo: “¿Qué haré por mi hijo?”»'
  to: 'Cuando te vayas de mi lado hoy, encontrarás a dos hombres junto a la tumba de Raquel, en el territorio[a] de Benjamín, en Zelzah; y ellos te dirán: «Las asnas que fuiste a buscar han sido halladas, y mira, tu padre ha dejado de ocuparse del asunto de las asnas y está inquieto por ustedes[b], diciendo: “¿Qué haré con respecto a mi hijo?”»'
  rationale: Se reubicó la nota del plural al lugar correcto, se añadió la nota léxica faltante para גְּבוּל, se ajustó la cláusula final para expresar preocupación «con respecto a mi hijo» en vez de acción «por mi hijo», se mejoró el matiz de נָטַשׁ ... דִּבְרֵי con «ha dejado de ocuparse del asunto de las asnas», y se normalizó el topónimo como «Zelzah».
