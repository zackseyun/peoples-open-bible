  glossary_alignment: Alinea bien con la norma del proyecto en usar «Yahvé» para יְהוָה. No hay conflicto con otros términos doctrinales. La nota sobre YHWH es adecuada. La nota sobre לִי debe ajustarse al nuevo anclaje textual para reflejar una alternativa española natural («a mí» / «por mí») y no la forma defectuosa «hacia mí».
