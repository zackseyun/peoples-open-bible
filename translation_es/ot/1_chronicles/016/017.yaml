translation:
  language: es
  text: Y la confirmó a Jacob como estatuto[a], a Israel como pacto perpetuo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la estableció». El verbo hebreo puede significar hacer que algo quede firme o en pie.
    reason: lexical_alternative
  - marker: b
    text: O «pacto eterno».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמִידֶהָ
  english_pob_choice: He confirmed it
  chosen_spanish: la confirmó
  alternatives_spanish:
  - la estableció
  - la hizo firme
  lexicon: HALOT
  rationale: El verbo hebreo en causativo de עמד expresa hacer que algo quede firme o establecido. «La confirmó» conserva ese valor de validación/estabilización y sigue bien la referencia femenina implícita al pacto o promesa del contexto inmediato.
- source_word: לְיַעֲקֹב
  english_pob_choice: to Jacob
  chosen_spanish: a Jacob
  alternatives_spanish:
  - para Jacob
  lexicon: HALOT
  rationale: La preposición ל introduce aquí el destinatario o beneficiario. En español, «a Jacob» mantiene la relación directa del hebreo y la paridad con la siguiente frase.
- source_word: לְחֹק
  english_pob_choice: as a statute
  chosen_spanish: como estatuto
  alternatives_spanish:
  - como decreto
  - como ordenanza
  lexicon: HALOT
  rationale: חֹק designa una disposición fija, normativa o estatutaria. «Estatuto» preserva el matiz jurídico-formal mejor que un término más genérico como «decreto», y evita cargar el texto con lenguaje eclesiástico no presente en el hebreo.
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: to Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - para Israel
  lexicon: HALOT
  rationale: Se conserva el paralelismo con «a Jacob». Mantener ambos nombres propios evita suavizar la repetición intencional del hebreo y preserva la identidad pactual del patriarca y del pueblo.
- source_word: בְּרִית עוֹלָם
  english_pob_choice: an everlasting covenant
  chosen_spanish: pacto perpetuo
  alternatives_spanish:
  - pacto eterno
  - alianza perpetua
  lexicon: HALOT
  rationale: בְּרִית se traduce naturalmente como «pacto» en español bíblico y contemporáneo; עוֹלָם en este contexto expresa duración indefinida o permanente. «Perpetuo» comunica esa permanencia sin forzar una formulación más abstracta que «eterno».
theological_decisions:
- issue: Referencia del sufijo pronominal femenino en וַיַּעֲמִידֶהָ
  english_pob_reading: The feminine suffix refers to the covenantal promise/oath mentioned in the immediate preceding verses.
  chosen_spanish_reading: El sufijo femenino se entiende como referencia al pacto/promesa jurada del contexto inmediato, sin estrecharlo indebidamente a un solo antecedente.
  alternative_spanish_readings:
  - Podría referirse más específicamente al juramento.
  - Podría traducirse con un antecedente explícito, pero el hebreo lo deja implícito.
  rationale: La forma española «la confirmó» conserva la anáfora del hebreo y permite que el referente siga siendo el pacto prometido en vv. 16–17. Esto respeta la cercanía entre pacto, palabra jurada y juramento, sin resolver artificialmente la referencia.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica y textual cuando el contexto la mantiene'
- issue: Valor de עוֹלָם en contexto pactual
  english_pob_reading: everlasting covenant
  chosen_spanish_reading: pacto perpetuo
  alternative_spanish_readings:
  - pacto eterno
  - pacto de duración perpetua
  rationale: «Perpetuo» comunica mejor en español la idea de duración continua y estable que el hebreo עוֹלָם suele expresar en contextos de pacto. Evita una lectura filosófica excesiva de «eterno» y mantiene la fuerza covenantal del texto.
  doctrine_reference: Uso pactual de עוֹלָם en textos de alianza; cf. formulaciones bíblicas de durabilidad del pacto
translation_notes:
  revision_awareness: La revisión inglesa añadió «And» al inicio para reflejar la conjunción inicial וַ; la versión española refleja ese valor con «Y». También se mantuvo la decisión revisada de conservar la anáfora implícita del objeto («la») y el paralelismo Jacob/Israel.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo sintáctico del hebreo: Jacob / Israel, estatuto / pacto.'
  - Se evita sustituir «pacto» por «alianza» o «convenio» para mantener la terminología bíblica consistente.
  - El texto español respeta la referencia implícita del sufijo sin explicitarla, siguiendo la práctica del POB de no resolver ambigüedades innecesarias.
