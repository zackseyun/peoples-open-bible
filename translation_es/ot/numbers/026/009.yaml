review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y conserva los elementos clave: genealogía, identificación de Datán y Abiram, su relación con la congregación, su contienda contra Moisés y Aarón, y la mención explícita de Yahvé. Sin embargo, hay un problema importante de fidelidad y naturalidad en ''Estos son aquel Datan y Abiram'', porque mezcla plural y singular y no refleja adecuadamente el demostrativo identificador hebreo הוּא. También conviene ajustar el orden y la puntuación para un español más claro sin perder el énfasis formal.'
  spanish_quality_summary: El español es generalmente claro y digno, con buena terminología bíblica. 'los llamados de la congregación' funciona aceptablemente, aunque algo rígido. La principal dificultad es la frase 'Estos son aquel Datan y Abiram', que resulta gramaticalmente defectuosa e impropia en español. Además, 'Y de los hijos de Eliab' puede mantenerse, pero 'Y los hijos de Eliab' suena más natural en una enumeración. El resto del versículo es legible y fiel.
  glossary_alignment: 'Se alinea bien con los términos del proyecto: יְהוָה → ''Yahvé''; עֵדָה → ''congregación''; קרואי העדה → ''los llamados de la congregación'' con nota alternativa; nombres propios bien conservados en forma española habitual (''Datán'', ''Abiram'', ''Coré'', ''Moisés'', ''Aarón''). Debe corregirse la acentuación de ''Datán'' para consistencia ortográfica en español bíblico.'
  issues:
  - severity: high
    issue: 'Frase identificadora gramaticalmente defectuosa: ''Estos son aquel Datan y Abiram'''
    rationale: El hebreo הוּא tiene función resumptiva/identificadora, pero en español 'Estos son aquel...' es incorrecto por discordancia y suena antinatural. Debe reformularse como 'Estos son aquellos Datán y Abiram' o mejor 'Estos son ese Datán y Abiram' no funciona; la opción natural y fiel es 'Estos son aquellos Datán y Abiram' o simplemente 'Estos son Datán y Abiram'. Dado el énfasis documentado en inglés con 'that', conviene conservarlo con 'aquellos'.
  - severity: medium
    issue: Falta de acento en 'Datan'
    rationale: En español bíblico estándar debe escribirse 'Datán'. La forma sin tilde afecta la calidad editorial y la consistencia con el resto de nombres adaptados al español.
  - severity: low
    issue: 'Inicio algo forzado: ''Y de los hijos de Eliab'''
    rationale: No es infiel, pero en español de enumeración genealógica 'Y los hijos de Eliab' o 'Y los hijos de Eliab fueron' suena más natural. Puede ajustarse sin pérdida de contenido.
  revised_spanish_text: 'Y los hijos de Eliab: Nemuel[a], Datán y Abiram. Estos son aquellos Datán y Abiram, los llamados de la congregación, que se enfrentaron a Moisés y a Aarón en la compañía de Coré, cuando se enfrentaron a Yahvé.'
  revised_footnotes:
  - marker: a
    text: 'O: «los escogidos de la congregación».'
    reason: lexical_alternative
  revision_rationale: Se corrigió la frase identificadora para que refleje la función resumptiva de הוּא con español gramatical y natural, preservando el énfasis demostrativo documentado en el audit trail. También se normalizó 'Datán' con tilde y se suavizó el inicio a 'Y los hijos de Eliab' para mejor legibilidad. Se conservan 'los llamados de la congregación', 'en la compañía de Coré' y 'Yahvé' por fidelidad al hebreo y al glosario del proyecto.
