translation:
  language: es
  text: Y después de pasar inadvertidos para los guardias de las puertas[a], siguieron pasando, habiéndose abierto paso por todo el campamento del enemigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego está algo comprimido al final; el sentido es que siguieron avanzando por todo el campamento enemigo después de abrirse paso o encontrar un paso a través de él.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαθόντες
  english_pob_choice: after escaping the notice of
  chosen_spanish: después de pasar inadvertidos para
  alternatives_spanish:
  - después de escapar a la vista de
  - sin ser notados por
  - pasando inadvertidos para
  lexicon: LSJ
  rationale: El participio aoristo de λανθάνω con acusativo expresa que la acción ocurrió sin ser detectados por alguien. «Pasar inadvertidos para» conserva esa relación participial y sugiere ocultamiento sin volverla demasiado interpretativa.
- source_word: τοὺς τῶν πυλῶν ἀκροφύλακας
  english_pob_choice: the gate guards
  chosen_spanish: los guardias de la puerta
  alternatives_spanish:
  - los guardias de las puertas
  - los centinelas de la puerta
  - los vigilantes de la puerta
  lexicon: LSJ
  rationale: ἀκροφύλακες designa guardias o vigilantes en un puesto de acceso; el genitivo especifica que están en la puerta. «Guardias de la puerta» es claro, natural y conserva el matiz de custodia militar o de seguridad.
- source_word: διεξῄεσαν
  english_pob_choice: they kept going through
  chosen_spanish: siguieron adelante
  alternatives_spanish:
  - iban pasando
  - continuaron atravesando
  - siguieron pasando
  lexicon: LSJ
  rationale: El imperfecto sugiere movimiento en curso. En español, «siguieron adelante» mantiene la idea de avance continuo sin forzar una repetición poco natural del verbo «pasar».
- source_word: εὑράμενοι
  english_pob_choice: having made their way through
  chosen_spanish: habiéndose abierto paso
  alternatives_spanish:
  - habiendo encontrado un paso
  - después de abrirse paso
  - tras hallar un camino
  lexicon: LSJ
  rationale: El participio explica cómo pudieron avanzar. «Habiéndose abierto paso» comunica bien la acción resultativa implícita en el contexto y evita añadir una palabra como «camino» que no está explícita en el griego.
- source_word: κατὰ πᾶν τὸ τῶν πολεμίων στρατόπεδον
  english_pob_choice: through the whole camp of the enemy
  chosen_spanish: por todo el campamento del enemigo
  alternatives_spanish:
  - a través de todo el campamento del enemigo
  - por todo el campamento de los enemigos
  - por todo el campamento hostil
  lexicon: LSJ
  rationale: στρατόπεδον es «campamento»; el genitivo τῶν πολεμίων funciona como sustantivo colectivo, por lo que «del enemigo» es fiel y natural en español. «Por todo» expresa adecuadamente el recorrido por toda la extensión del campamento.
translation_notes:
  revision_awareness: Se siguió la lectura de la POB inglesa, pero se ajustó la última cláusula al español para conservar la progresividad del imperfecto y la relación participial de εὑράμενοι sin introducir un objeto explícito no presente en el griego. La nota final de la auditoría inglesa sobre la compresión griega se refleja en la nota al pie.
  spanish_consistency_notes:
  - Se mantuvo «enemigo» en singular colectivo para reflejar τῶν πολεμίων y evitar una pluralización innecesaria.
  - Se prefirió un español fluido pero sobrio, conservando el avance continuo del imperfecto con «siguieron adelante».
  - No se introdujeron términos eclesiásticos ni teológicos ajenos al contexto narrativo militar.
