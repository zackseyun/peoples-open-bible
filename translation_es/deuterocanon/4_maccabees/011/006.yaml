  revision_awareness: 'Se tuvo en cuenta el pasaje griego directo y el audit trail inglés. El punto sensible es ὑμῶν: el inglés POB opta por «from you» y anota que literalmente podría ser «of you». La versión española mantiene esa lectura contextual con «de ustedes» y conserva la alternativa literal en nota.'
  spanish_consistency_notes:
