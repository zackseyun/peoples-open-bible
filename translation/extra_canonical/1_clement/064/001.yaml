id: 1CLEM.64.1
reference: 1 Clement 64:1
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Λοιπὸν ὁ παντεπόπτης θεὸς καὶ δεσπότης τῶν πνευμάτων καὶ κύριος πάσης σαρκός, ὁ ἐκλεξάμενος τὸν κύριον Ἰησοῦν Χριστὸν καὶ ἡμᾶς διʼ αὐτοῦ εἰς λαὸν περιούσιον, δῴη πάσῃ ψυχῇ ἐπικεκλημένῃ τὸ μεγαλοπρεπὲς καὶ ἅγιον ὄνομα αὐτοῦ πίστιν, φόβον, εἰρήνην, ὑπομονὴν καὶ μακροθυμίαν, ἐγκράτειαν, ἁγνείαν καὶ σωφροσύνην, εἰς εὐαρέστησιν τῷ ὀνόματι αὐτοῦ διὰ τοῦ ἀρχιερέως καὶ προστάτου ἡμῶν Ἰησοῦ Χριστοῦ, διʼ οὗ αὐτῷ δόξα καὶ μεγαλωσύνη, κράτος καὶ τιμή, καὶ νῦν καὶ εἰς πάντας τοὺς αἰῶνας τῶν αἰώνων. ἀμήν.
  language: Greek
  pages:
  - 343
  note: This chapter comes from the normalized Funk 1901 OCR layer.
  verse: 1
translation:
  text: Finally, may the all-seeing God and Master of spirits and Lord of all flesh, who chose the Lord Jesus Messiah and us through him for a people of his own possession, grant to every soul that has called upon his magnificent and holy name faith, fear, peace, endurance and longsuffering, self-control, purity, and sound judgment, so as to be pleasing to his name through our high priest and protector Jesus Messiah, through whom be glory and majesty to him, might and honor, both now and through all the ages of ages. Amen.
  philosophy: optimal-equivalence
status: revised
lexical_decisions:
- source_word: παντεπόπτης
  chosen: all-seeing
  alternatives:
  - all-observing
  - overseer of all
  lexicon: LSJ
  rationale: The compound denotes one who sees all. 'All-seeing' preserves the elevated doxological tone and divine omniscience without paraphrase.
- source_word: δεσπότης
  chosen: Master
  alternatives:
  - Sovereign
  - Lord
  lexicon: LSJ
  rationale: Used alongside θεός and κύριος, this term carries authority and ownership. 'Master' preserves the distinction from κύριος, which is rendered 'Lord' later in the clause.
- source_word: τῶν πνευμάτων
  chosen: of spirits
  alternatives:
  - of the spirits
  lexicon: BDAG
  rationale: The anarthrous English plural best reflects the broad scope of the genitive and echoes biblical diction (cf. 'God of spirits').
- source_word: κύριος πάσης σαρκός
  chosen: Lord of all flesh
  alternatives:
  - Lord of every human being
  - Lord of all humanity
  lexicon: BDAG
  rationale: The phrase is scriptural and should be preserved. 'Flesh' retains the biblical idiom and universal scope rather than flattening it into an abstract paraphrase.
- source_word: ἐκλεξάμενος
  chosen: chose
  alternatives:
  - elected
  - selected
  lexicon: BDAG
  rationale: '''Chose'' is natural modern English and preserves the covenantal sense without importing later technical theological vocabulary.'
- source_word: λαὸν περιούσιον
  chosen: a people for his own possession
  alternatives:
  - a treasured people
  - a peculiar people
  lexicon: BDAG
  rationale: This phrase echoes covenant language from the Greek Scriptures. 'For his own possession' preserves the possessive, covenantal force more transparently than the traditional but archaic 'peculiar people.'
- source_word: ἐπικεκλημένῃ
  chosen: that has been called by
  alternatives:
  - invoking
  - that calls upon
  lexicon: BDAG
  rationale: In this passive perfect participial form with 'name,' the sense is being designated or called by the divine name, not primarily the act of invoking it. This best fits the grammar and biblical idiom.
- source_word: μεγαλοπρεπές
  chosen: magnificent
  alternatives:
  - majestic
  - splendid
  lexicon: LSJ
  rationale: The adjective describes the grandeur of the divine name. 'Magnificent' preserves the elevated register and pairs well with 'holy.'
- source_word: πίστιν
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: In this virtue list, 'faith' is the most natural and least interpretively loaded rendering. 'Faithfulness' is possible but less likely in this sequence.
- source_word: φόβον
  chosen: fear
  alternatives:
  - reverence
  - godly fear
  lexicon: BDAG
  rationale: The Greek term should be preserved directly. In this religious context it carries reverential force, but 'fear' keeps the biblical tension rather than resolving it.
- source_word: ὑπομονήν
  chosen: endurance
  alternatives:
  - steadfastness
  - patient endurance
  lexicon: BDAG
  rationale: '''Endurance'' is concise, contemporary, and suitable in a virtue list.'
- source_word: μακροθυμίαν
  chosen: longsuffering
  alternatives:
  - patience
  - forbearance
  lexicon: BDAG
  rationale: To distinguish it from ὑπομονή, 'longsuffering' better preserves the lexical difference and the traditional paraenetic texture.
- source_word: ἐγκράτειαν
  chosen: self-control
  alternatives:
  - temperance
  lexicon: BDAG
  rationale: '''Self-control'' is clear modern English and standard for this virtue.'
- source_word: ἁγνείαν
  chosen: purity
  alternatives:
  - chastity
  - holiness
  lexicon: BDAG
  rationale: The term denotes moral purity; 'purity' is broad enough for the context without narrowing it only to sexual chastity.
- source_word: σωφροσύνην
  chosen: sound judgment
  alternatives:
  - sobriety
  - self-restraint
  - prudence
  lexicon: BDAG
  rationale: The term includes soundness of mind and measured conduct. 'Sound judgment' communicates this well in contemporary English while distinguishing it from ἐγκράτεια.
- source_word: εἰς εὐαρέστησιν
  chosen: so as to be pleasing
  alternatives:
  - for pleasing
  - unto acceptability
  lexicon: LSJ
  rationale: 'This infinitival/result nuance is best conveyed idiomatically in English as purpose/result: the granted virtues lead to pleasing God''s name.'
- source_word: ἀρχιερέως
  chosen: high priest
  alternatives:
  - chief priest
  lexicon: BDAG
  rationale: The term has established biblical and theological force and should be rendered directly.
- source_word: προστάτου
  chosen: protector
  alternatives:
  - patron
  - advocate
  - guardian
  lexicon: LSJ
  rationale: The word can denote one who stands before or aids another. 'Protector' fits the prayerful context and avoids importing overly technical legal connotations from 'advocate' or socially specific patronage language from 'patron.'
- source_word: δόξα καὶ μεγαλωσύνη
  chosen: glory and majesty
  alternatives:
  - glory and greatness
  lexicon: BDAG
  rationale: This is standard doxological language; 'majesty' best matches the elevated register.
- source_word: κράτος
  chosen: might
  alternatives:
  - dominion
  - power
  lexicon: BDAG
  rationale: In doxological contexts, 'might' is concise and traditional without being archaic.
- source_word: εἰς πάντας τοὺς αἰῶνας τῶν αἰώνων
  chosen: through all the ages of ages
  alternatives:
  - forever and ever
  - unto all the ages of ages
  lexicon: BDAG
  rationale: This preserves the Semitic-Greek superlative structure more transparently than the smoother traditional idiom 'forever and ever.'
theological_decisions:
- issue: Rendering Χριστόν in this chapter
  chosen_reading: Messiah in both occurrences ('Jesus Messiah')
  alternative_readings:
  - Christ
  rationale: Per project philosophy, titles are translated where context supports title force. Here Ἰησοῦς Χριστός still bears clear titular significance within a liturgical prayer, so 'Messiah' preserves meaning rather than defaulting to the name-like 'Christ.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Referent of αὐτοῦ in the final doxology
  chosen_reading: The glory, majesty, might, and honor are directed to God through Jesus Messiah
  alternative_readings:
  - The doxology is directed to Jesus Messiah himself
  - The Greek intentionally leaves a degree of overlap between God and Christ
  rationale: 'The nearest antecedent pattern and the prayer''s structure favor God as the recipient: God is the one asked to grant virtues, and this is done through Jesus Messiah. Therefore ''to him'' is retained after ''through whom'' to preserve the likely referent while leaving the Greek syntax visible.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
