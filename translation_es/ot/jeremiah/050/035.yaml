translation:
  language: es
  text: Una espada está contra los caldeos[a], declara Yahvé, y contra los habitantes de Babilonia, y contra sus oficiales[b], y contra sus sabios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los babilonios» para «los caldeos».
    reason: lexical_alternative
  - marker: b
    text: O «sus príncipes» para «sus oficiales».
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶרֶב
  english_pob_choice: A sword
  chosen_spanish: Una espada
  alternatives_spanish:
  - La espada
  - Espada
  lexicon: HALOT
  rationale: El hebreo no lleva artículo y funciona como anuncio profético de juicio; en español, «Una espada» conserva esa indefinición y suena natural en este contexto oracular.
- source_word: עַל
  english_pob_choice: is against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - contra de
  lexicon: HALOT
  rationale: En oráculos de juicio con חֶרֶב, עַל expresa dirección hostil. «Contra» reproduce bien esa fuerza adversativa en español.
- source_word: כַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: El hebreo nombra a los caldeos, y esa designación étnico-histórica se conserva mejor con «caldeos». La nota mantiene la alternativa contextual «babilonios» sin borrar el matiz del original.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética נְאֻם se puede verter como «declara» con tono solemne y actual. Se mantiene el nombre divino como «Yahvé» según la norma del proyecto, sin sustituirlo por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce con el nombre propio «Yahvé», siguiendo la convención doctrinal del proyecto y preservando el nombre del pacto.
- source_word: יֹשְׁבֵי בָבֶל
  english_pob_choice: the inhabitants of Babylon
  chosen_spanish: los moradores de Babilonia
  alternatives_spanish:
  - los habitantes de Babilonia
  - los que habitan en Babilonia
  lexicon: HALOT
  rationale: El participio constructo significa literalmente quienes viven en Babilonia. «Moradores» conserva el sentido colectivo y suena digno en español bíblico moderno.
- source_word: שָׂרֶיהָ
  english_pob_choice: her officials
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus príncipes
  - sus gobernantes
  lexicon: HALOT
  rationale: שָׂרִים puede abarcar príncipes, jefes u কর্মকর্তাদের; aquí el contexto político-administrativo de Babilonia favorece «oficiales», que evita restringir indebidamente el término a nobleza real.
- source_word: חֲכָמֶיהָ
  english_pob_choice: her wise men
  chosen_spanish: sus sabios
  alternatives_spanish:
  - sus hombres sabios
  - sus consejeros
  lexicon: HALOT
  rationale: El término refiere a la clase sabia/erudita de Babilonia. «Sabios» es breve, directo y fiel al valor léxico sin ampliar el texto.
theological_decisions:
- issue: Traducción del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El verso contiene el Tetragrámaton directamente. La convención del proyecto es verterlo como «Yahvé», preservando el nombre personal de Dios y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Fuerza hostil de la preposición en el anuncio de juicio
  english_pob_reading: is against
  chosen_spanish_reading: contra
  alternative_spanish_readings:
  - sobre
  - hacia
  rationale: En este tipo de oráculo, la preposición no es neutral; expresa amenaza o adversidad. «Contra» mantiene la carga de juicio presente en el hebreo y en el análisis inglés.
  doctrine_reference: HALOT, uso profético de עַל / אֶל en oráculos de juicio
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se documentaron cambios necesarios y el cotejo posterior mostró alta concordancia. La redacción española mantiene esa línea, conservando el léxico clave del original y las alternativas anotadas donde el hebreo permite más de una precisión contextual.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יהוה.
  - Se usa «contra» para toda la cadena adversativa, preservando el paralelismo del hebreo.
  - «Caldeos» conserva el etnónimo original; la nota ofrece «babilonios» como alternativa contextual.
  - «Oficiales» y «sabios» reflejan la esfera política e intelectual de Babilonia sin sobreinterpretar el hebreo.
