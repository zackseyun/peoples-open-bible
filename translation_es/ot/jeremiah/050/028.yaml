translation:
  language: es
  text: El sonido de fugitivos y refugiados[b] de la tierra de Babilonia[a], para anunciar en Sion la venganza de Yahvé nuestro Dios, venganza por su templo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la voz de fugitivos y de los que han escapado».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y sobrevivientes».'
    reason: lexical_alternative
  - marker: c
    text: Lit. «la venganza de su templo»; probablemente significa venganza por el agravio hecho a su templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֥וֹל
  english_pob_choice: The sound of
  chosen_spanish: La voz de
  alternatives_spanish:
  - El sonido de
  - El clamor de
  lexicon: HALOT
  rationale: קוֹל puede significar voz, sonido o ruido. En este contexto introduce la llegada/irrupción audible de personas que huyen; 'La voz de' mantiene la imagen sonora y es más natural que un calco rígido como 'el sonido de'.
- source_word: נָסִ֛ים
  english_pob_choice: fugitives
  chosen_spanish: fugitivos
  alternatives_spanish:
  - los que huyen
  - huidos
  lexicon: HALOT
  rationale: El participio describe a personas que están huyendo. 'Fugitivos' conserva brevedad y fuerza lexical, y corresponde bien al sentido de quienes escaparon de Babilonia.
- source_word: וּפְלֵטִ֖ים
  english_pob_choice: and refugees
  chosen_spanish: y refugiados
  alternatives_spanish:
  - y sobrevivientes
  - y escapados
  - y los que escaparon
  lexicon: HALOT
  rationale: פלטים puede referirse a quienes escaparon o fueron librados. Dado el ajuste revisado del POB inglés a 'refugees', 'refugiados' da una equivalencia formal y comprensible en español sin reducirlo solo a supervivencia física.
- source_word: מֵאֶרֶץ בָּבֶל
  english_pob_choice: from the land of Babylon
  chosen_spanish: de la tierra de Babilonia
  alternatives_spanish:
  - de Babilonia
  lexicon: HALOT
  rationale: Se conserva explícitamente 'tierra' para reflejar אֶרֶץ y mantener la correspondencia formal con el hebreo, no solo el topónimo.
- source_word: לְהַגִּיד
  english_pob_choice: to declare
  chosen_spanish: para anunciar
  alternatives_spanish:
  - para declarar
  - para proclamar
  - para decir
  lexicon: HALOT
  rationale: 'El infinitivo expresa propósito: salir para dar noticia en Sion. ''Anunciar'' comunica bien una proclamación pública y suena natural en español; ''declarar'' sería más literal, pero algo más duro.'
- source_word: בְּצִיּוֹן
  english_pob_choice: in Zion
  chosen_spanish: en Sion
  alternatives_spanish:
  - en Zion
  lexicon: HALOT
  rationale: Se conserva la preposición 'en' porque el hebreo usa בְּ, indicando el lugar donde se proclama el mensaje.
- source_word: נִקְמַת
  english_pob_choice: the vengeance
  chosen_spanish: la venganza
  alternatives_spanish:
  - el castigo
  - la vindicación
  - el desquite
  lexicon: HALOT
  rationale: נִקְמָה tiene fuerza judicial de represalia/retribución. 'Venganza' es la equivalencia más directa y preserva la tensión teológica del juicio divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del POB en español para el nombre divino: ''Yahvé'', transliteración del Tetragrama, evitando el reemplazo por un título como ''el SEÑOR''.'
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - el Dios nuestro
  lexicon: HALOT
  rationale: 'El sufijo de primera persona plural se conserva de modo directo: no es un Dios genérico, sino el Dios de la comunidad del pacto.'
- source_word: נִקְמַת הֵיכָלוֹ
  english_pob_choice: vengeance for his temple
  chosen_spanish: la venganza por su templo
  alternatives_spanish:
  - la venganza de su templo
  - la venganza en favor de su templo
  lexicon: HALOT
  rationale: La construcción final puede sonar en español como 'de su templo', pero el audit trail inglés ya documenta que el sentido probable es la venganza ocasionada por el agravio hecho al templo. 'Por su templo' expresa mejor esa relación causal/forense sin perder la conexión con הֵיכָל.
- source_word: הֵיכָלוֹ
  english_pob_choice: his temple
  chosen_spanish: su templo
  alternatives_spanish:
  - su santuario
  - su casa
  lexicon: HALOT
  rationale: En este contexto הֵיכָל se refiere al templo de Jerusalén. 'Templo' es claro y adecuado; 'santuario' sería posible, pero menos preciso aquí.
theological_decisions:
- issue: Nombre divino del Tetragrama יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se mantiene el principio editorial del POB de no ocultar el nombre divino tras una sustitución titulativa. 'Yahvé' es la forma normalizada en español del proyecto y conserva la referencia personal del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre la venganza y el templo
  english_pob_reading: vengeance for his temple
  chosen_spanish_reading: la venganza por su templo
  alternative_spanish_readings:
  - la venganza de su templo
  - la venganza en favor de su templo
  rationale: El hebreo repite 'venganza' y luego la vincula con el templo. La formulación española conserva el carácter retributivo y la conexión con el agravio contra el templo, sin suavizarla ni convertirla en una simple 'vindicación'.
  doctrine_reference: 'DOCTRINE.md: Judgment language and covenant retribution'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y toma en cuenta el ajuste del POB inglés que cambió 'escapees' por 'refugees' y eliminó el segundo 'the' antes de 'vengeance'. Se conserva la duplicación de 'venganza' del hebreo y se expresa la relación final con el templo de modo idiomático en español.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יהוה, conforme al estándar del POB en español.
  - '''Sion'' se mantiene con grafía sin tilde, conforme al uso bíblico habitual en español.'
  - '''Venganza'' se conserva donde el hebreo usa נִקְמָה, sin sustituirlo por ''vindicación'', para no debilitar el matiz judicial.'
  - '''Templo'' se usa para הֵיכָל por claridad contextual; no se introduce ''palacio'' ni ''santuario'' sin necesidad.'
