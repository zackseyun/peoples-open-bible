translation:
  language: es
  text: ¡Cómo está sentada sola la ciudad que antes estaba llena de gente! Se ha vuelto como una viuda, la que era grande entre las naciones, una princesa entre las provincias; ha quedado sometida a trabajos forzados[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para tributo». El hebreo מַס puede referirse tanto al tributo impuesto por un conquistador como al trabajo forzoso; el texto principal adopta el sentido de trabajo porque encaja mejor con el contraste entre «princesa» y sujeción.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיכָה
  english_pob_choice: How
  chosen_spanish: ¡Cómo!
  alternatives_spanish:
  - ¡Ay!
  - ¿Cómo es que...?
  lexicon: HALOT
  rationale: La forma hebrea abre una exclamación de lamento, no una pregunta informativa. «¡Cómo!» conserva el tono de asombro doliente y la fórmula clásica del duelo.
- source_word: יָשְׁבָה
  english_pob_choice: sits
  chosen_spanish: se sienta
  alternatives_spanish:
  - habita
  - está sentada
  - ha estado sentada
  lexicon: HALOT
  rationale: El perfecto hebreo en poesía de lamento puede presentar un estado vívido y actual. «Se sienta» reproduce esa imagen presente de desolación sin forzar un pasado narrativo.
- source_word: בָדָד
  english_pob_choice: alone
  chosen_spanish: sola
  alternatives_spanish:
  - en soledad
  - aislada
  lexicon: HALOT
  rationale: «Sola» comunica con naturalidad la idea de abandono y aislamiento. Mantiene la sencillez del término hebreo.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la ciudad de Jerusalén
  lexicon: HALOT
  rationale: El hebreo dice simplemente «la ciudad». Se evita nombrar Jerusalén en el texto principal para no importar un elemento que el versículo no explicita.
- source_word: רַבָּתִי עָם
  english_pob_choice: once full of people
  chosen_spanish: que antes estaba llena de gente
  alternatives_spanish:
  - grande en pueblo
  - abundante en pueblo
  - poblada
  lexicon: HALOT
  rationale: La expresión literalmente indica grandeza o abundancia de gente. «Que antes estaba llena de gente» transmite el contraste entre el pasado poblado y la ruina presente.
- source_word: הָיְתָה
  english_pob_choice: has become
  chosen_spanish: se ha vuelto
  alternatives_spanish:
  - ha sido
  - se convirtió
  lexicon: HALOT
  rationale: Aquí introduce un cambio de estado. «Se ha vuelto» conserva la idea de reversión que es central en el lamento.
- source_word: כְּאַלְמָנָה
  english_pob_choice: like a widow
  chosen_spanish: como una viuda
  alternatives_spanish:
  - cual viuda
  lexicon: HALOT
  rationale: La preposición comparativa כ pide un símil, no identidad. «Como una viuda» preserva esa comparación sin exagerarla.
- source_word: רַבָּתִי בַגּוֹיִם
  english_pob_choice: great among the nations
  chosen_spanish: la que era grande entre las naciones
  alternatives_spanish:
  - grande entre las naciones
  - prominente entre las naciones
  lexicon: HALOT
  rationale: Se mantiene el lenguaje de prestigio y rango. Añadir «la que era» conecta con el estado previo y hace más fluido el paralelismo en español.
- source_word: שָׂרָתִי
  english_pob_choice: a princess
  chosen_spanish: una princesa
  alternatives_spanish:
  - una soberana
  - una dama principesca
  - una gobernante
  lexicon: HALOT
  rationale: El sustantivo femenino señala dignidad principesca. «Princesa» es el equivalente más directo y claro en español.
- source_word: בַּמְּדִינוֹת
  english_pob_choice: among the provinces
  chosen_spanish: entre las provincias
  alternatives_spanish:
  - en las provincias
  - entre los distritos
  lexicon: HALOT
  rationale: «Provincias» mantiene el sentido administrativo del hebreo y el paralelismo con «entre las naciones». «Entre» respeta la relación comparativa del verso.
- source_word: לָמַס
  english_pob_choice: subject to forced labor
  chosen_spanish: sometida a trabajos forzados
  alternatives_spanish:
  - para tributo
  - sujeta a tributo
  - a servidumbre obligatoria
  lexicon: HALOT
  rationale: El término hebreo puede referirse a tributo o a trabajo compulsorio. En este contexto de humillación política, «trabajos forzados» expresa bien la subyugación y el vuelco desde «princesa».
theological_decisions:
- issue: 'Sentido de מַס: tributo o trabajo compulsorio'
  english_pob_reading: subject to forced labor
  chosen_spanish_reading: sometida a trabajos forzados
  alternative_spanish_readings:
  - para tributo
  - sujeta a tributo
  - a servidumbre obligatoria
  rationale: La evidencia contextual apunta a la humillación concreta de la ciudad vencida y a la inversión de su rango; por eso se prioriza el sentido de labor compulsoria. La alternativa de tributo sigue siendo posible y queda registrada como nota.
  doctrine_reference: No doctrinal issue; lexical-historical choice based on context.
translation_notes:
  revision_awareness: El control de revisión más reciente indicó alta concordancia y no requirió cambios sustanciales. Se mantuvo la línea del auditable inglés POB y se ajustó la salida al español natural, preservando la tensión léxica de מַס en nota.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Naciones» y «provincias» se mantienen para reflejar el paralelismo geopolítico del hebreo.
  - «Sometida a trabajos forzados» traduce el final sin neutralizar la humillación política del verso.
