translation:
  language: es
  text: Los damanes[a] son un pueblo no poderoso, pero ponen su hogar en la peña.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Damanes» identifica al animal probable del hebreo שְׁפַנִּים; tradicionalmente se ha traducido «conejos» o «conejillos», pero eso no refleja bien el referente zoológico moderno.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁפַנִּים
  english_pob_choice: rock badgers
  chosen_spanish: damanes
  alternatives_spanish:
  - hyraxes
  - conejos de roca
  lexicon: HALOT
  rationale: El término hebreo designa al hyrax o damán; en español, «damanes» nombra con mayor precisión al referente zoológico que «conejos» y evita introducir una identificación incorrecta. Se conserva así el sentido del apodo tradicional del animal en su hábitat rocoso.
- source_word: עַם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - una gente
  - una nación
  lexicon: HALOT
  rationale: El hebreo usa עַם, literalmente «pueblo/gente», de forma figurada para un grupo animal. «Un pueblo» mantiene esa personificación proverbial sin sobreexplicar.
- source_word: לֹא עָצוּם
  english_pob_choice: not mighty
  chosen_spanish: no fuerte
  alternatives_spanish:
  - no poderoso
  - no vigoroso
  - no poderoso ni fuerte
  lexicon: HALOT
  rationale: La idea básica es carencia de fuerza o poder. En español, «no fuerte» reproduce bien el contraste proverbial con su conducta prudente; «mighty» no exige necesariamente el matiz épico de «poderoso».
- source_word: וַיָּשִׂימוּ
  english_pob_choice: they make their home
  chosen_spanish: hacen su casa
  alternatives_spanish:
  - ponen su casa
  - hacen su morada
  - se hacen un hogar
  lexicon: HALOT
  rationale: El verbo significa «poner/colocar», pero con «casa» el sentido idiomático es «hacer su morada». «Hacen su casa» conserva la imagen verbal hebrea y su naturalidad en español.
- source_word: בַסֶּלַע
  english_pob_choice: in the crag
  chosen_spanish: en la peña
  alternatives_spanish:
  - en el peñasco
  - en la roca
  - en el risco
  lexicon: HALOT
  rationale: סֶלַע puede referirse a roca, peñasco o peña. «Peña» suena natural en español bíblico y conserva el matiz de refugio rocoso del verso.
- source_word: בֵּיתָם
  english_pob_choice: their home
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su morada
  - su vivienda
  lexicon: HALOT
  rationale: Literalmente es «su casa». Para el paralelo con el verbo anterior, «su casa» reproduce con fidelidad la imagen de establecimiento/habitación del animal.
translation_notes:
  revision_awareness: El texto coincide sustancialmente con el sentido y la resolución léxica del POB en inglés; la principal adaptación es la elección del término zoológico español más preciso para שְׁפַנִּים y la formulación idiomática del segundo hemistiquio.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo proverbial de dos hemistiquios.
  - Se conservó el contraste entre la falta de fuerza y la conducta sabia de habitar en la peña.
  - No se introdujo vocabulario confesional ni expansión interpretativa.
  - La nota al pie marca la alternativa zoológica relevante sin desplazar el texto principal.
