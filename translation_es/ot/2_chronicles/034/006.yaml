  rationale: סָבִיב expresa lo que rodea o está alrededor. «Circundantes» suena natural en español escrito y mantiene la relación adjetival con «ruinas».
translation_notes:
  revision_awareness: La versión inglesa más reciente añadió «even» antes de «as far as Naphtali» para reflejar con más naturalidad el marcador de extensión עַד. La redacción española incorpora ese matiz con «hasta incluso». Se conservó además la resolución contextual del final oscuro del hebreo como referencia a ruinas o lugares devastados, sin suavizar la tensión textual.
  spanish_consistency_notes:
  - 'Se mantuvieron los nombres propios territoriales en forma española habitual: Manasés, Efraín, Simeón, Neftalí.'
  - Se preservó la ambigüedad del tramo final con una traducción contextual, no literalista, porque el hebreo es oscuro y el POB documenta esa tensión.
  - Se evitó «SEÑOR» o cualquier sustitución no presente en el versículo; no aparece el Tetragrámaton en este texto.
  - La coordinación en español usa artículos y preposiciones de modo fluido sin alterar el alcance geográfico del hebreo.
