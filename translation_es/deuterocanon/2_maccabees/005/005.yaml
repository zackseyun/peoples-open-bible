translation:
  language: es
  text: Pero cuando surgió un falso rumor de que Antíoco[a] había partido de esta vida, Jasón, tomando no menos de mil hombres, lanzó un ataque repentino contra la ciudad. Cuando los que estaban en la muralla habían sido rechazados, y por fin la ciudad ya estaba siendo capturada, Menelao huyó a la ciudadela.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: ''había cambiado de vida'', un giro idiomático para decir que Antíoco había muerto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λαλιάς ψευδοῦς
  english_pob_choice: a false rumor
  chosen_spanish: un falso rumor
  alternatives_spanish:
  - un falso reporte
  - falsas noticias
  lexicon: LSJ
  rationale: La combinación en contexto apunta a una noticia circulante e inexacta, no solo a ‘habla’ en sentido abstracto. ‘Falso rumor’ conserva el valor idiomático y el trasfondo político del pasaje.
- source_word: μετηλλαχότος ... τὸν βίον
  english_pob_choice: had passed from life
  chosen_spanish: había pasado de la vida
  alternatives_spanish:
  - había muerto
  - había partido de esta vida
  lexicon: LSJ
  rationale: El griego usa un eufemismo literal de ‘cambiar de vida’. ‘Había pasado de la vida’ mantiene esa suavidad idiomática mejor que el más directo ‘había muerto’.
- source_word: παραλαβὼν
  english_pob_choice: taking
  chosen_spanish: tomando
  alternatives_spanish:
  - habiendo tomado
  - llevando consigo
  lexicon: LSJ
  rationale: El participio expresa que Jasón reunió o tomó consigo una fuerza; ‘tomando’ es natural en español y conserva la relación participial sin añadir información.
- source_word: οὐκ ἐλάττους τῶν χιλίων
  english_pob_choice: no fewer than a thousand men
  chosen_spanish: no menos de mil hombres
  alternatives_spanish:
  - por lo menos mil hombres
  - no menos que mil hombres
  lexicon: LSJ
  rationale: La expresión marca un mínimo enfático. ‘No menos de mil hombres’ reproduce con precisión la cantidad mínima sin perder la fuerza del original.
- source_word: ἐφνιδίως
  english_pob_choice: sudden attack
  chosen_spanish: de repente
  alternatives_spanish:
  - sorpresivamente
  - inesperadamente
  lexicon: LSJ
  rationale: El adverbio modifica el modo del ataque. En español, ‘de repente’ comunica la brusquedad de manera clara y fluida en este contexto bélico.
- source_word: συνετελέσατο ἐπίθεσιν
  english_pob_choice: launched a sudden attack
  chosen_spanish: lanzó ... un ataque
  alternatives_spanish:
  - realizó un asalto
  - llevó a cabo un ataque
  lexicon: LSJ
  rationale: La locución expresa ejecutar o consumar un asalto. ‘Lanzó un ataque’ es idiomático en español y conserva la fuerza militar del verbo.
- source_word: τῶν δὲ ἐπὶ τῷ τείχει
  english_pob_choice: those on the wall
  chosen_spanish: los que estaban en la muralla
  alternatives_spanish:
  - los defensores de la muralla
  - los que estaban sobre la muralla
  lexicon: LSJ
  rationale: ‘Muralla’ es la forma más natural para la estructura defensiva en español. ‘Los que estaban en la muralla’ sigue de cerca la indicación espacial del griego sin añadir interpretación.
- source_word: συνελασθέντων
  english_pob_choice: had been driven back
  chosen_spanish: habían sido rechazados
  alternatives_spanish:
  - habían sido empujados hacia atrás
  - habían sido forzados a retroceder
  lexicon: LSJ
  rationale: En contexto de sitio, el pasivo comunica pérdida de posición defensiva. ‘Rechazados’ es un equivalente militar claro y breve.
- source_word: καταλαμβανομένης τῆς πόλεως
  english_pob_choice: the city was already being taken
  chosen_spanish: la ciudad estaba siendo capturada
  alternatives_spanish:
  - la ciudad ya estaba cayendo
  - la ciudad ya estaba siendo tomada
  lexicon: LSJ
  rationale: El genitivo absoluto indica que la captura estaba en curso. ‘Estaba siendo capturada’ preserva esa progresión sin implicar más de lo que el griego dice.
- source_word: ἐφυγάδευεν
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - se refugió huyendo
  lexicon: LSJ
  rationale: El verbo indica retirada por huida; el inglés POB revisó la idea de añadir ‘for refuge’ porque no está explícita. ‘Huyó’ es fiel y sobrio.
- source_word: ἀκρόπολιν
  english_pob_choice: citadel
  chosen_spanish: la ciudadela
  alternatives_spanish:
  - la acrópolis
  - la fortaleza
  lexicon: LSJ
  rationale: En español, ‘ciudadela’ comunica bien la parte fortificada superior de la ciudad y es más accesible que ‘acrópolis’, manteniendo el sentido histórico.
theological_decisions:
- issue: El eufemismo griego para la muerte de Antíoco
  english_pob_reading: had passed from life
  chosen_spanish_reading: había pasado de la vida
  alternative_spanish_readings:
  - había muerto
  - había partido de esta vida
  rationale: 'No hay una cuestión doctrinal compleja, pero sí una tensión léxica: el griego evita la expresión directa. Mantener un eufemismo en español respeta ese matiz sin borrar el significado de la muerte.'
  doctrine_reference: none
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail en cuanto a no añadir ‘para refugio’ a Menelao, porque el griego solo dice que huyó a la ciudadela. También se conservó la decisión revisada de traducir μετηλλαχότος τὸν βίον con un eufemismo español equivalente, no con una paráfrasis explicativa más amplia.
  spanish_consistency_notes:
  - Se mantuvo el nombre propio ‘Jasón’ y ‘Menelao’ como en el texto fuente y el audit trail.
  - Se eligió ‘ciudadela’ para ἀκρόπολις por ser el equivalente español más claro en este contexto histórico.
  - Se usó ‘muralla’ para τείχος por naturalidad en español, sin perder la referencia a la defensa de la ciudad.
  - Se evitó intensificar ‘huyó’ con añadidos no presentes en el griego.
