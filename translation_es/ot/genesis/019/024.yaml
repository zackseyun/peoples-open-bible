revisions:
- from: Entonces Yahvé hizo llover azufre[a] y fuego sobre Sodoma y Gomorra, de parte de Yahvé, desde los cielos[b].
  to: Entonces Yahvé hizo llover azufre[a] y fuego sobre Sodoma y Gomorra de Yahvé desde los cielos[b][c].
  rationale: Se reemplaza «de parte de Yahvé» por «de Yahvé» para reflejar mejor la procedencia directa de מֵאֵת יְהוָה y evitar un matiz de representación. Se añade una nota específica para la repetición del nombre divino, conforme a la decisión teológica documentada en el POB inglés. También se ajusta la nota léxica sobre «azufre» para que suene natural en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:39:33Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: Yahvé como sujeto, el verbo causativo «hizo llover», el objeto doble «azufre y fuego», los destinatarios «sobre Sodoma y Gomorra» y el plural «los cielos». Sin embargo, la frase «de parte de Yahvé» no refleja con suficiente literalidad מֵאֵת יְהוָה como expresión de procedencia/origen y además suena más a agencia delegada que a origen directo. También falta una nota que preserve explícitamente la repetición del nombre divino, ya documentada por el POB inglés.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «de parte de Yahvé» resulta algo menos natural en este contexto y puede introducir un matiz no deseado. «De Yahvé» o «de parte de» sin necesidad de mensajería/representación aquí es inferior a una formulación más directa. Además, la nota a usa «brimstone», anglicismo impropio en una nota española; conviene reemplazarlo por «brimstone (inglés tradicional)» o, mejor, por un contraste interno en español como «piedra de azufre» no sería ideal. Lo más limpio es explicar que «azufre» es más preciso que el equivalente tradicional inglés «brimstone» solo si es necesario; pero para lectores españoles basta decir que es más preciso que una traducción tradicional como «brimstone» no es natural. Mejor eliminar esa referencia y explicar simplemente la precisión léxica.
  glossary_alignment: 'Alinea bien con los términos del proyecto en «Yahvé», «azufre», «fuego» y el plural «los cielos». La principal desalineación es la decisión para מֵאֵת יְהוָה: debe sonar a procedencia directa, no a comisión indirecta. También debe reflejarse en nota la repetición «Yahvé ... de Yahvé» según la rationale teológica inglesa.'
  issues:
  - severity: medium
    issue: «de parte de Yahvé» para מֵאֵת יְהוָה
    rationale: La expresión hebrea indica procedencia/origen. «De parte de» en español suele sugerir representación, mensaje o comisión, y puede desviar el sentido más directo de «de Yahvé» / «de parte de» como origen.
  - severity: medium
    issue: Falta nota sobre la repetición del nombre divino
    rationale: El POB inglés documenta explícitamente que se retiene «Yahweh ... from Yahweh». La versión española debería conservar esa decisión también en nota, porque es una tensión textual significativa.
  - severity: low
    issue: Nota a con anglicismo poco natural
    rationale: Decir en español que «azufre» es más preciso que «brimstone» no es ideal para una edición española. La nota debe explicar la precisión léxica en español natural.
  revised_spanish_text: Entonces Yahvé hizo llover azufre[a] y fuego sobre Sodoma y Gomorra de Yahvé desde los cielos[b][c].
  revised_footnotes:
  - marker: a
    text: Hebreo גָּפְרִית. «Azufre» expresa con precisión el término original; traducciones tradicionales inglesas suelen decir «brimstone».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de Yahvé». Se conserva la repetición del nombre divino del texto fuente, en lugar de simplificarla.'
    reason: alternative_reading
  - marker: c
    text: 'Hebreo: «desde los cielos». Se conserva el plural del original, no el singular habitual «desde el cielo».'
    reason: alternative_reading
  revision_rationale: Se reemplaza «de parte de Yahvé» por «de Yahvé» para reflejar mejor la procedencia directa de מֵאֵת יְהוָה y evitar un matiz de representación. Se añade una nota específica para la repetición del nombre divino, conforme a la decisión teológica documentada en el POB inglés. También se ajusta la nota léxica sobre «azufre» para que suene natural en español.
