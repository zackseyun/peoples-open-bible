lexical_decisions:
- source_word: בְנֵי אֱלִיעֶזֶר
  english_pob_choice: The sons of Eliezer
  chosen_spanish: Los hijos de Eliezer
  alternatives_spanish:
  - Los hijos de Eliezer
  lexicon: HALOT
  rationale: En una genealogía, la cadena de constructo se conserva de forma natural como 'los hijos de Eliezer'. Mantiene la relación posesiva sin forzar una paráfrasis.
- source_word: רְחַבְיָה
  english_pob_choice: Rehabiah
  chosen_spanish: Rehabías
  alternatives_spanish:
  - Rehabia
  lexicon: Transliteración estándar de nombre propio
  rationale: Se translitera el nombre propio al español con terminación naturalizada en '-ías', siguiendo el uso bíblico en español y la inteligibilidad eclesial.
- source_word: הָרֹאשׁ
  english_pob_choice: was the chief
  chosen_spanish: fue el jefe
  alternatives_spanish:
  - fue el cabeza
  - fue el principal
  - fue la cabeza
  lexicon: HALOT
  rationale: En este contexto genealógico/organizativo, el sustantivo denota primacía o liderazgo. 'Jefe' expresa bien esa función en español moderno; 'cabeza' sería más literal pero menos natural y puede sonar demasiado metafórico.
- source_word: וְלֹא הָיָה לֶאֱלִיעֶזֶר בָּנִים אֲחֵרִים
  english_pob_choice: and Eliezer had no other sons
  chosen_spanish: y Eliezer no tuvo otros hijos
  alternatives_spanish:
  - y Eliezer no tenía otros hijos
  - y Eliezer no tuvo más hijos
  lexicon: HALOT
  rationale: '''No tuvo otros hijos'' reproduce el sentido relacional de ''no other sons'' de manera idiomática en español. ''Otros'' refleja אֲחֵרִים; ''hijos'' es el equivalente natural aquí.'
- source_word: רָבוּ לְמָעְלָה
  english_pob_choice: became very many
  chosen_spanish: fueron muy numerosos
  alternatives_spanish:
  - se multiplicaron grandemente
  - se hicieron muy numerosos
  - multiplicaron mucho
  lexicon: HALOT
  rationale: El hebreo expresa aumento abundante; en español 'fueron muy numerosos' preserva el resultado sin exagerar ni volver el verso pesado. 'Muy' mantiene la intensificación de לְמָעְלָה.
theological_decisions:
- issue: Valor de הָרֹאשׁ en una lista genealógica
  english_pob_reading: was the chief
  chosen_spanish_reading: fue el jefe
  alternative_spanish_readings:
  - fue el cabeza
  - fue el principal
  rationale: No hay una doctrina en juego, pero sí una decisión de función y rango. 'Jefe' conserva la idea de primacía dentro de la línea familiar/levítica sin introducir lenguaje eclesiástico ajeno al contexto.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto inglés POB actual está estable y sin revisiones aplicadas; el pasaje presenta un acuerdo alto y no requiere ajuste textual adicional.
  spanish_consistency_notes:
  - Se mantiene 'Eliezer' y 'Rehabías' de forma coherente con nombres propios bíblicos en español.
  - Se evita 'SEÑOR' u այլ sustituciones porque el pasaje no contiene el nombre divino.
  - La estructura con dos puntos tras 'Los hijos de Eliezer' refleja el encabezado genealógico del hebreo y del inglés POB.
  - '''Muy numerosos'' y la nota alternativa conservan la tensión léxica entre aumento y multiplicación abundante.'
