translation:
  language: es
  text: Y las ollas[a], las palas, las despabiladeras[b], los platos y todos los utensilios de bronce con los que ministraban—se llevaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ollas» sigue la lectura general de recipientes de metal o de servicio; «vasijas» también sería posible.
    reason: lexical_alternative
  - marker: b
    text: O «cuchillos» o «podaderas». El hebreo puede denotar un instrumento de corte, pero en este contexto de utensilios del templo suele entenderse como una herramienta para recortar o despabilar las lámparas.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסִּירֹת
  english_pob_choice: the pots
  chosen_spanish: las ollas
  alternatives_spanish:
  - las vasijas
  - los recipientes
  lexicon: HALOT
  rationale: סִירוֹת designa recipientes/cacharros de uso general; en español, «ollas» comunica con naturalidad un utensilio de metal o barro sin forzar una forma demasiado técnica. Mantiene la sencillez de la lista de enseres del templo.
- source_word: הַיָּעִים
  english_pob_choice: the shovels
  chosen_spanish: las palas
  alternatives_spanish:
  - las palas recogedoras
  - las paletas
  lexicon: HALOT
  rationale: El término apunta a implementos para retirar ceniza o manipular brasas. «Palas» es el equivalente más natural y amplio en español para ese tipo de herramienta.
- source_word: הַמְזַמְּרוֹת
  english_pob_choice: the snuffers
  chosen_spanish: los cortadores de mechas
  alternatives_spanish:
  - los apagadores
  - las tenazas
  lexicon: HALOT
  rationale: La POB inglesa conserva la tensión léxica entre un instrumento de corte y el uso en el templo para atender lámparas. En español, «cortadores de mechas» expresa mejor esa función probable sin ocultar que se trata de un implemento de corte; «apagadores» perdería precisión, y «tenazas» sería más genérico.
- source_word: הַכַּפּוֹת
  english_pob_choice: the dishes
  chosen_spanish: los platos
  alternatives_spanish:
  - los cuencos
  - las bandejas
  lexicon: HALOT
  rationale: כַּפּוֹת puede abarcar pequeños recipientes; «platos» es suficientemente amplio y legible para una lista de utensilios, sin imponer una forma más estrecha que el hebreo no exige.
- source_word: כָּל כְּלֵי הַנְּחֹשֶׁת
  english_pob_choice: all the bronze vessels
  chosen_spanish: todos los utensilios de bronce
  alternatives_spanish:
  - todos los vasos de bronce
  - todos los objetos de bronce
  lexicon: HALOT
  rationale: '«Utensilios» refleja el sentido general de כְּלִים como implementos/objetos de uso. «Bronce» sigue la decisión de la POB por el metal contextual, más preciso que «latón» o el más arcaico «metal de cobre». '
- source_word: אֲשֶׁר יְשָׁרְתוּ בָם
  english_pob_choice: with which they ministered
  chosen_spanish: con los que ministraban
  alternatives_spanish:
  - con los que servían
  - con los que realizaban el servicio
  lexicon: HALOT
  rationale: En contexto cultual, שׁרת implica servicio ministerial/ritual. «Ministraban» conserva ese matiz formal y litúrgico mejor que «servían», que en español puede sonar demasiado general.
- source_word: לָקָחוּ
  english_pob_choice: they took away
  chosen_spanish: los llevaron
  alternatives_spanish:
  - los tomaron
  - se los llevaron
  lexicon: HALOT
  rationale: El verbo simple «tomaron» puede quedar demasiado plano en español; «los llevaron» comunica de manera natural la remoción y traslado de los objetos del templo en contexto de saqueo, sin añadir explícitamente un elemento ausente en el hebreo.
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el criterio inglés POB sin depender mecánicamente del inglés. Se conserva la lista de objetos y el cierre de remoción, y se mantiene la tensión léxica de מְזַמְּרוֹת mediante una opción española que explicita la posible función de corte en el contexto del templo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no porque aparezca en este versículo, sino como norma general del proyecto cuando corresponda; aquí no se necesita.
  - Se prefirió «ministraban» para reflejar el servicio cultual y no simplemente una acción cotidiana.
  - Se evitó «SEÑOR» y «brass»; «bronce» es la opción coherente con la audit trail inglesa.
  - La lista de utensilios se tradujo con sustantivos comunes y sobrios para conservar el tono inventarial del hebreo.
