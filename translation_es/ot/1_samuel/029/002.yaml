translation:
  language: es
  text: Y los jefes[a] de los filisteos iban pasando por centenas y por millares, y David y sus hombres iban pasando en la retaguardia con Aquis.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «príncipes» o «gobernantes»; el hebreo סַרְנֵי se refiere a los altos dirigentes filisteos.
    reason: lexical_alternative
lexical_decisions:
- source_word: סַרְנֵי
  english_pob_choice: lords
  chosen_spanish: príncipes
  alternatives_spanish:
  - señores
  - jefes
  - gobernantes
  lexicon: HALOT
  rationale: סַרְנֵי designa a los altos jefes o dirigentes filisteos; en español, 'príncipes' conserva mejor ese rango político-militar elevado que 'líderes' o 'oficiales', y evita el sesgo eclesiástico de 'señores'.
- source_word: פְלִשְׁתִּים
  english_pob_choice: Philistines
  chosen_spanish: filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Es el etnónimo estándar y corresponde directamente al hebreo.
- source_word: עֹבְרִים
  english_pob_choice: were passing by
  chosen_spanish: iban pasando
  alternatives_spanish:
  - pasaban
  - iban marchando
  lexicon: HALOT
  rationale: El participio presenta una acción en curso dentro de la escena procesional; 'iban pasando' preserva bien ese aspecto progresivo sin sonar forzado.
- source_word: לְמֵאוֹת וְלַאֲלָפִים
  english_pob_choice: by hundreds and by thousands
  chosen_spanish: por centenas y por millares
  alternatives_spanish:
  - en centenas y en millares
  - por cientos y por miles
  - en grupos de centenas y millares
  lexicon: HALOT
  rationale: La frase likely describe agrupación militar en unidades numeradas. 'Por centenas y por millares' reproduce el distributivo y mantiene la estructura del hebreo, con un registro publicable en español.
- source_word: וַאֲנָשָׁיו
  english_pob_choice: his men
  chosen_spanish: sus hombres
  alternatives_spanish:
  - sus soldados
  - su gente
  lexicon: HALOT
  rationale: La expresión se refiere al contingente masculino que acompaña a David; 'sus hombres' es la opción más natural y precisa en español.
- source_word: בָּאַחֲרֹנָה
  english_pob_choice: at the rear
  chosen_spanish: en la retaguardia
  alternatives_spanish:
  - atrás
  - al final
  - en la parte de atrás
  lexicon: HALOT
  rationale: El término señala la posición posterior en la formación. 'En la retaguardia' es idiomático en español militar y conserva mejor el matiz espacial que un simple 'atrás'.
- source_word: עִם אָכִישׁ
  english_pob_choice: with Achish
  chosen_spanish: con Aquis
  alternatives_spanish:
  - junto con Aquis
  lexicon: HALOT
  rationale: La construcción indica acompañamiento simple. 'Aquis' es la forma castellana habitual del nombre propio y mantiene la identificación del personaje.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado desde 'in hundreds and in thousands' a 'by hundreds and by thousands' para reflejar mejor el distributivo. La versión española adopta un equivalente igualmente distributivo ('por centenas y por millares') y mantiene la imagen procesional y militar del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Aquis' como forma española del nombre propio, en coherencia con una traducción publicable en español.
  - Se evita 'SEÑOR' o equivalentes de mascaramiento porque el versículo no contiene el nombre divino.
  - '''Retaguardia'' conserva el sentido espacial/militar del hebreo y la escena procesional del contexto.'
  - '''Centenas y millares'' refleja la posible organización por unidades, sin explicitar más de lo que el texto requiere.'
