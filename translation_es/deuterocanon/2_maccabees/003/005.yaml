translation:
  language: es
  text: Y como no podía vencer a Onias, fue a Apolonio hijo de Thraseo[a], que en aquel tiempo era gobernador[b] de Celesiria y Fenicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Apolonio Thraseo»; el genitivo griego puede leerse como patronímico, y aquí se vierte como «hijo de Thraseo».
    reason: lexical_alternative
  - marker: b
    text: El título griego στρατηγός puede significar «general» o «gobernador»; aquí se traduce «gobernador» porque el contexto resalta la administración regional sobre Celesiria y Fenicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: νικήσαι
  english_pob_choice: to overcome
  chosen_spanish: vencer
  alternatives_spanish:
  - derrotar
  - prevalecer sobre
  lexicon: LSJ
  rationale: El infinitivo aoristo expresa el intento de obtener la superioridad sobre Onias en un conflicto u oposición. «Vencer» comunica bien esa idea en español sin restringirla demasiado a combate militar.
- source_word: μὴ δυνάμενος
  english_pob_choice: since he was unable
  chosen_spanish: como no podía
  alternatives_spanish:
  - puesto que no podía
  - ya que no podía
  lexicon: LSJ
  rationale: La construcción participial introduce la circunstancia causal de la acción principal. «Como no podía» reproduce esa relación causal de forma natural y sobria en español.
- source_word: ἦλθεν πρὸς
  english_pob_choice: he went to
  chosen_spanish: fue a
  alternatives_spanish:
  - acudió a
  - se dirigió a
  lexicon: LSJ
  rationale: En narrativa española, «fue a» expresa el movimiento hacia Apolonio con claridad y sin sobrecargar el tono.
- source_word: Ἀπολλώνιον Θρασαίου
  english_pob_choice: Apollonius son of Thrasaeas
  chosen_spanish: Apolonio hijo de Thraseo
  alternatives_spanish:
  - Apolonio Thraseo
  - Apolonio, hijo de Thraseo
  lexicon: LSJ
  rationale: El genitivo Θρασαίου se entiende mejor aquí como patronímico. «Hijo de Thraseo» hace explícita la relación y evita tratar el genitivo como un segundo nombre sin aclaración.
- source_word: τὸν ... στρατηγόν
  english_pob_choice: who ... was governor
  chosen_spanish: era gobernador
  alternatives_spanish:
  - era general
  - era comandante militar
  - era estratego
  lexicon: LSJ
  rationale: Aunque στρατηγός puede significar general, el contexto administrativo regional de Celesiria y Fenicia favorece «gobernador» como la función que el texto destaca.
- source_word: κατʼ ἐκεῖνον τὸν καιρόν
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - entonces
  - por aquel tiempo
  lexicon: LSJ
  rationale: La frase fija el marco temporal de su cargo. «En aquel tiempo» es natural, formal y fiel al valor de la expresión.
- source_word: Κοίλης Συρίας καὶ Φοινίκης
  english_pob_choice: Coele-Syria and Phoenicia
  chosen_spanish: Celesiria y Fenicia
  alternatives_spanish:
  - Coele-Siria y Fenicia
  - la Celesiria y la Fenicia
  lexicon: LSJ
  rationale: Se conservan los nombres históricos en su forma habitual en español. «Celesiria» comunica el topónimo con claridad y evita una traducción explicativa que oscurezca la referencia geográfica.
translation_notes:
  revision_awareness: La base inglesa fue revisada para corregir el patronímico a Thrasaeus; la forma española sigue esa lectura más precisa y mantiene la decisión ya auditada de entender στρατηγός como cargo administrativo regional.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y narrativo, acorde con un libro histórico deuterocanónico.
  - Se conservaron los topónimos históricos en formas españolas estables para no perder identificación geográfica.
  - Se evitó «SEÑOR» u otras sustituciones innecesarias porque el versículo no contiene el nombre divino ni léxico teológico equivalente.
