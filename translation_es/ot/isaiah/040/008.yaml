review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: la hierba/vegetación es transitoria, la flor también, y en contraste la palabra de nuestro Dios permanece. También conserva correctamente la fuerza adversativa de וּדְבַר como ''pero la palabra''. Sin embargo, ''se desvanece'' para נָבֵל introduce un matiz de desaparición o disolución menos vegetal y menos natural en español bíblico que el hebreo pide; conviene una opción más idiomática para flores.'
  spanish_quality_summary: El español es claro y digno, pero 'la flor se desvanece' suena menos natural y menos concreto que alternativas como 'la flor se marchita' o 'la flor se seca'. Para mantener la distinción verbal del hebreo sin sonar forzado, una mejor combinación es 'La hierba se seca, la flor se marchita'. Esto preserva dos verbos distintos y mejora la imaginería poética en español.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: ''Dios'' y ''palabra'' están bien. La única corrección relevante es léxica-estilística: evitar ''se desvanece'' para נָבֵל en este contexto botánico. ''Permanecerá para siempre'' es aceptable para יָקוּם לְעוֹלָם, aunque pierde un poco la metáfora de ''estar en pie''; no requiere cambio obligatorio.'
  issues:
  - severity: medium
    issue: '''Se desvanece'' para la flor no suena natural en imaginería botánica'
    rationale: נָבֵל describe marchitarse/wilting/fading de vegetación. En español, 'desvanecerse' suele aplicarse a imágenes, recuerdos, colores o apariciones, y aquí debilita la concreción del paralelismo poético.
  - severity: low
    issue: La nota al pie no aporta una alternativa real distinta del texto principal
    rationale: 'La nota dice ''O: «La hierba se marchita, la flor se desvanece»'', que reproduce exactamente el texto principal en vez de ofrecer una formulación alternativa significativa. Debe ajustarse para explicar la distinción verbal o dar una alternativa genuina.'
  revised_spanish_text: La hierba se seca[a], la flor se marchita, pero la palabra de nuestro Dios permanecerá para siempre.
  revised_footnotes:
  - marker: a
    text: 'O: «La hierba se marchita, la flor se marchita». El hebreo usa dos verbos relacionados pero distintos para el deterioro de la vegetación.'
    reason: lexical_alternative
  revision_rationale: 'Se reemplaza ''se marchita ... se desvanece'' por ''se seca ... se marchita'' para expresar de manera más natural en español los dos verbos hebreos distintos: uno de secarse y otro de marchitarse. También se corrige la nota para que ofrezca una alternativa real y explique la distinción léxica preservada por el hebreo.'
