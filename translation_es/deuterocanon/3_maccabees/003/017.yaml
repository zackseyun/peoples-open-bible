translation:
  language: es
  text: Pero aunque aceptaron de palabra[a] nuestra presencia, de hecho fueron insinceros, cuando estábamos deseosos de entrar en su templo y honrarlo con las ofrendas más espléndidas y excelentes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «verbalmente aceptaron nuestra presencia, pero en la práctica actuaron con insinceridad».'
    reason: alternative_reading
  - marker: b
    text: El término griego para «ofrendas» también puede significar dones dedicados u ofrendas votivas colocadas en un templo.
    reason: cultural_note
lexical_decisions:
- source_word: λόγῳ μὲν ... τῷ δὲ πράγματι
  english_pob_choice: in word ... in deed
  chosen_spanish: en palabra ... en realidad
  alternatives_spanish:
  - de palabra ... de hecho
  - verbalmente ... en la práctica
  lexicon: LSJ
  rationale: Conserva el contraste retórico entre lo dicho y lo efectivamente hecho. 'En palabra ... en realidad' suena natural en español y preserva la antítesis sin diluirla.
- source_word: ἀποδεξάμενοι
  english_pob_choice: accepted
  chosen_spanish: aceptaron
  alternatives_spanish:
  - recibieron
  - dieron acogida
  lexicon: LSJ
  rationale: El participio expresa recepción o aceptación de la presencia del rey. 'Aceptaron' mantiene ese sentido sin añadir una calidez que el griego no exige.
- source_word: παρουσίαν
  english_pob_choice: presence
  chosen_spanish: presencia
  alternatives_spanish:
  - venida
  - llegada
  - visita
  lexicon: LSJ
  rationale: '''Presencia'' reproduce de modo directo παρουσία como la presencia personal del soberano y funciona bien con el complemento ''nuestra''.'
- source_word: νόθως
  english_pob_choice: insincere
  chosen_spanish: insinceros
  alternatives_spanish:
  - falsamente
  - con engaño
  - de manera espuria
  lexicon: LSJ
  rationale: El adverbio griego señala falsedad o falta de autenticidad en la conducta. En español, 'insinceros' expresa con claridad que la aceptación verbal no correspondió a la realidad.
- source_word: προθυμηθέντων ἡμῶν
  english_pob_choice: we were eager
  chosen_spanish: estábamos dispuestos
  alternatives_spanish:
  - estábamos deseosos
  - queríamos con ahínco
  - teníamos el deseo
  lexicon: LSJ
  rationale: La construcción de genitivo absoluto presenta la disposición de los hablantes. 'Estábamos dispuestos' conserva la idea volitiva y resulta idiomática en español, sin intensificar más de lo que el contexto exige.
- source_word: εἰσελθεῖν εἰς τὸν ναὸν αὐτῶν
  english_pob_choice: to enter their temple
  chosen_spanish: entrar en su templo
  alternatives_spanish:
  - entrar en su santuario
  - pasar a su templo
  lexicon: LSJ
  rationale: ναός se traduce normalmente como 'templo' en este contexto histórico. 'Su templo' refleja αὐτῶν y conserva la perspectiva externa del narrador.
- source_word: τοῖς ἐκπρεπέσιν καὶ καλλίστοις ἀναθήμασιν
  english_pob_choice: with the most splendid and finest offerings
  chosen_spanish: con las ofrendas más espléndidas y excelentes
  alternatives_spanish:
  - con las ofrendas más magníficas y bellas
  - con los dones votivos más hermosos y selectos
  lexicon: LSJ
  rationale: ἀναθήματα son dones dedicados u ofrendas votivas; 'ofrendas' es claro en español y mantiene el marco cultual. Los superlativos se reproducen con 'más espléndidas y excelentes' para conservar la intensidad.
- source_word: τιμῆσαι
  english_pob_choice: honor it
  chosen_spanish: honrarlo
  alternatives_spanish:
  - rendirle honor
  - mostrarle honor
  lexicon: LSJ
  rationale: El infinitivo expresa el propósito de entrar en el templo. 'Honrarlo' es conciso y fiel; el pronombre 'lo' remite naturalmente al templo en el contexto.
theological_decisions:
- issue: Tono y alcance del acto de entrar al templo y ofrecer dones
  english_pob_reading: The speaker claims an intention to honor the Jews' temple with offerings, rendered straightforwardly without endorsing or softening the claim.
  chosen_spanish_reading: 'Se mantiene la afirmación histórica del hablante: la intención de entrar al templo y honrarlo con ofrendas, sin suavizar ni avalar el contenido.'
  alternative_spanish_readings:
  - entrar en su santuario y rendir homenaje con dones votivos
  - acudir a su templo para tributarle honor con ofrendas
  rationale: El versículo forma parte del relato de un discurso y debe conservar la tensión narrativa. La traducción evita introducir una interpretación devocional o apologética que el griego no impone.
  doctrine_reference: Principio de primacía del texto original; conservar la tensión histórica y retórica del pasaje.
translation_notes:
  revision_awareness: 'El texto español sigue la revisión más reciente del contexto inglés: se prioriza una formulación natural (''insinceros'') para νόθως, se conserva el contraste retórico con una equivalencia idiomática y se mantiene la referencia a ofrendas en sentido cultual, no meramente genérico.'
  spanish_consistency_notes:
  - Se usa 'templo' para ναός, coherente con el contexto histórico y con el audit trail inglés.
  - Se evita 'Cristo' y cualquier terminología eclesial no presente en el pasaje.
  - '''Presencia'' conserva παρουσία sin convertirla en ''visita'', para mantener la ambigüedad de llegada/presencia personal del soberano.'
  - Los superlativos se expresan de forma natural en español, sin perder el énfasis del griego.
  - Se mantiene el pronombre de objeto directo en 'honrarlo' para un referente claro y fluido.
