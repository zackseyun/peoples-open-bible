translation:
  language: es
  text: Cuando amaneció[a], los hombres fueron enviados, ellos y sus asnos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En cuanto se hizo de mañana» o «Cuando hubo luz en la mañana».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבֹּקֶר
  english_pob_choice: morning
  chosen_spanish: la mañana
  alternatives_spanish:
  - el amanecer
  - la madrugada
  lexicon: HALOT
  rationale: El sustantivo definido señala el tiempo del día. En español, "la mañana" es natural y suficientemente preciso en esta cláusula temporal; "el amanecer" sería más específico, pero desplaza el matiz general del hebreo.
- source_word: אוֹר
  english_pob_choice: became light
  chosen_spanish: despuntaba
  alternatives_spanish:
  - se hizo luz
  - amanecía
  lexicon: HALOT
  rationale: El verbo expresa la entrada de la luz del día. "Despuntaba" conserva la imagen temporal de iniciarse la claridad sin volver la frase pesada o demasiado explicativa. "Amanecía" es posible, pero pierde un poco la referencia explícita a la luz.
- source_word: וְהָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - y los hombres
  lexicon: HALOT
  rationale: El plural definido de אִישׁ se traduce de forma directa como "los hombres". El prefijo conjuntivo se integra de manera natural en español sin necesidad de repetir "y" al inicio de la segunda oración.
- source_word: שֻׁלְּחוּ
  english_pob_choice: were sent away
  chosen_spanish: fueron despedidos
  alternatives_spanish:
  - fueron enviados
  - fueron mandados fuera
  lexicon: HALOT
  rationale: El pasivo de שלח aquí sugiere que se les dejó partir / se les despachó. "Fueron despedidos" mantiene el sentido pasivo y el matiz narrativo de ser enviados de regreso, más cercano que un simple "fueron enviados".
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  lexicon: HALOT
  rationale: El pronombre independiente funciona de manera enfática/apositiva. "Ellos" reproduce esa referencia sin sobrecargar la línea; "ellos mismos" intensificaría más de lo que exige el hebreo.
- source_word: וַחֲמֹרֵיהֶם
  english_pob_choice: and their donkeys
  chosen_spanish: y sus asnos
  alternatives_spanish:
  - con sus asnos
  lexicon: HALOT
  rationale: La coordinación hebrea se conserva con "y". "Asnos" es el término preciso y digno en español bíblico para חֲמֹרִים; "con sus asnos" sería más fluido, pero agrega una preposición no presente en el texto.
translation_notes:
  revision_awareness: 'Se siguió de cerca la revisión inglesa que prefirió una apertura idiomática equivalente a la expresión hebrea de comienzo del día: "As soon as the morning was light". El español adopta una solución igualmente natural que conserva la imagen de la llegada de la luz.'
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como forma estándar para el nombre divino en el proyecto, aunque este versículo no lo contiene.
  - Se evitó "señor" o fórmulas eclesiásticas no presentes en el hebreo.
  - '"Asnos" conserva el registro bíblico común y el referente literal del original.'
  - La cláusula temporal inicial se resolvió con una construcción fluida en español para reflejar el valor idiomático del hebreo sin mecanicismo.
