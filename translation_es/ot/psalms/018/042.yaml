translation:
  language: es
  text: Clamaron pidiendo ayuda[a], pero no hubo quien salvara; a Yahvé, pero él no les respondió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «clamaron … a Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְשַׁוְּעוּ
  english_pob_choice: they cried for help
  chosen_spanish: clamaron pidiendo ayuda
  alternatives_spanish:
  - gritaron pidiendo ayuda
  - clamaron
  - pidieron auxilio
  lexicon: HALOT
  rationale: El piel de שׁוע expresa un clamor urgente de auxilio. En español, «clamaron pidiendo ayuda» conserva la intensidad y el sentido de socorro mejor que un simple «gritaron».
- source_word: אֵין
  english_pob_choice: there was no
  chosen_spanish: no hubo
  alternatives_spanish:
  - no había
  - no hubo nadie
  lexicon: HALOT
  rationale: En este contexto poético y narrativo pasado, «no hubo» suena natural en español y transmite la negación existencial del hebreo.
- source_word: מוֹשִׁיעַ
  english_pob_choice: no one to save
  chosen_spanish: quien salvara
  alternatives_spanish:
  - quien los librara
  - salvador
  - libertador
  lexicon: HALOT
  rationale: 'El participio hiphil de ישׁע funciona aquí de manera sustantiva: «uno que salva». Dado que la revisión inglesa prefirió «no one to save», en español «quien salvara» evita imponer un sustantivo más interpretativo y mantiene el valor funcional del participio.'
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - sobre
  - contra
  lexicon: HALOT
  rationale: Con verbos de clamor, עַל introduce al destinatario del ruego. En español, la preposición simple «a» comunica con claridad esa relación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma española de uso del proyecto, en vez de sustituirlo por un título como «el SEÑOR». Esto mantiene visible el Tetragrámaton del hebreo.
- source_word: עָנָם
  english_pob_choice: he did not answer them
  chosen_spanish: él no les respondió
  alternatives_spanish:
  - él no los atendió
  - no les contestó
  lexicon: HALOT
  rationale: ענה aquí significa responder/contestar. «Respondió» reproduce el verbo con naturalidad en español y conserva el objeto pronominal «les».
theological_decisions:
- issue: Render of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El versículo nombra directamente a יהוה; por coherencia con el proyecto, se traduce con el nombre divino y no con una sustitución titulada. «Yahvé» es la forma adoptada en español para mantener auditable la referencia al nombre propio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que reemplazó un sustantivo más rígido por una construcción natural («no one to save»). En español se refleja esa mejora con una cláusula relativa («quien salvara») en lugar de un sustantivo desnudo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estable para YHWH.
  - Se evita «SEÑOR» para no ocultar el nombre divino.
  - «Clamaron pidiendo ayuda» conserva el matiz de urgencia del piel hebreo.
  - «Respondió» mantiene el paralelo verbal con el hebreo ענה.
