translation:
  language: es
  text: No andarás como calumniador entre tu pueblo[a]. No te pondrás contra la sangre de tu prójimo. Yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No te quedarás de pie mientras se derrama la sangre de tu prójimo».'
    reason: alternative_reading
lexical_decisions:
- source_word: תֵלֵךְ
  english_pob_choice: go about
  chosen_spanish: andarás
  alternatives_spanish:
  - irás
  - andarás de un lado a otro
  lexicon: HALOT
  rationale: El hebreo הלך en esta construcción idiomática apunta a una conducta ambulante dentro de la comunidad. En español, «andar» comunica mejor el movimiento habitual o el modo de conducirse que un simple «ir», y evita sonar demasiado técnico.
- source_word: רָכִיל
  english_pob_choice: slanderer
  chosen_spanish: chismoso
  alternatives_spanish:
  - difamador
  - calumniador
  - chismoso que difunde rumores
  lexicon: HALOT
  rationale: El término designa a quien circula informes dañinos dentro del pueblo. «Chismoso» es el equivalente más natural y reconocible en español; sin embargo, conserva la nota moral negativa por el contexto legal. Se evita «calumniador» como única opción porque puede estrechar el sentido hacia acusación falsa formal, mientras que el hebreo abarca la difusión dañina de rumores.
- source_word: בְּעַמֶּיךָ
  english_pob_choice: among your people
  chosen_spanish: entre tu pueblo
  alternatives_spanish:
  - en medio de tu pueblo
  - dentro de tu pueblo
  lexicon: HALOT
  rationale: La preposición ב con «tu pueblo» se expresa con naturalidad en español como «entre tu pueblo», indicando conducta dentro de la comunidad del pacto.
- source_word: תַעֲמֹד
  english_pob_choice: stand
  chosen_spanish: te pondrás
  alternatives_spanish:
  - estarás de pie
  - permanecerás
  - te detendrás
  lexicon: HALOT
  rationale: Aunque el verbo básico es «estar de pie / permanecer», en esta construcción con עַל y «sangre» la idea es no adoptar una postura de complicidad o inacción culpable. «Ponerse contra» conserva la imagen de la postura y permite una lectura idiomática en español sin borrar la tensión del hebreo.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - junto a
  - sobre
  - por
  lexicon: HALOT
  rationale: Con «ponerse» y «sangre», עַל admite tanto una hostilidad activa como una complicidad pasiva. «Contra» mantiene la posibilidad de una acción adversa o de una postura que no protege al prójimo, sin resolver prematuramente la ambigüedad.
- source_word: דַּם
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - vida
  - sangre derramada
  - vida derramada
  lexicon: HALOT
  rationale: Se conserva el término concreto «sangre», que en el hebreo funciona como metonimia de vida amenazada o derramada. Esto preserva la fuerza legal y ética de la imagen.
- source_word: רֵעֶךָ
  english_pob_choice: your neighbor
  chosen_spanish: tu prójimo
  alternatives_spanish:
  - tu vecino
  - tu compañero
  - tu semejante
  lexicon: HALOT
  rationale: En este contexto legal-ético, רֵעַ refiere al miembro cercano de la comunidad. «Prójimo» es la opción más estable en español bíblico para ese sentido relacional, sin limitarlo a proximidad geográfica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino como transliteración de יְהוָה. «Yahvé» es la forma de referencia del proyecto en español y evita la sustitución por un título.
theological_decisions:
- issue: Interpretación de לֹא תַעֲמֹד עַל דַּם רֵעֶךָ
  english_pob_reading: A prohibition against acting against or endangering the life of one's neighbor, while preserving the literal 'blood' language; the English footnote also allows 'standing by while your neighbor's blood is shed.'
  chosen_spanish_reading: Una prohibición tanto contra la complicidad activa como contra la inacción culpable ante el peligro de muerte del prójimo, manteniendo el lenguaje literal de «sangre» en el texto principal.
  alternative_spanish_readings:
  - No te pondrás al lado mientras se derrama la sangre de tu prójimo.
  - No actuarás contra la vida de tu prójimo.
  rationale: El hebreo es breve y admite más de una matización contextual. El texto principal conserva la imagen concreta y usa una formulación que puede abarcar tanto la agresión como la omisión culpable. La nota preserva la lectura alternativa de ‘quedarse de pie mientras se derrama la sangre’, evitando resolver la tensión interpretativa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; la forma actual permanece en alto acuerdo con el audit trail inglés y con la evaluación de concordancia alta.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «prójimo» para רֵעַ en el registro ético-legal.
  - Se conserva «sangre» en lugar de una paráfrasis como «vida» para no perder la concreción hebrea.
  - La ambigüedad de עַל en la segunda hemistiquio queda reflejada en la nota, sin anular la lectura principal.
