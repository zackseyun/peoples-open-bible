translation:
  language: es
  text: Pero los pecadores serán llevados[a] a la destrucción, y no se hallará más memoria de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serán tomados» / «serán removidos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁμαρτωλοὶ
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - malvados
  - impíos
  lexicon: BDAG
  rationale: ἁμαρτωλοὶ nombra a quienes se caracterizan por el pecado. «Pecadores» conserva el valor léxico directo y evita interpretar el término como una categoría más fuerte de lo que el griego exige.
- source_word: ἀρθήσονται
  english_pob_choice: will be taken away
  chosen_spanish: serán llevados
  alternatives_spanish:
  - serán tomados
  - serán removidos
  lexicon: BDAG
  rationale: El futuro pasivo de αἴρω expresa que serán quitados o retirados. «Serán llevados» mantiene la pasividad y la idea de ser apartados, con un español natural en un contexto de juicio.
- source_word: εἰς ἀπώλειαν
  english_pob_choice: to destruction
  chosen_spanish: a la destrucción
  alternatives_spanish:
  - a la ruina
  - a la perdición
  lexicon: BDAG
  rationale: ἀπώλεια denota destrucción o ruina. «A la destrucción» sigue de cerca la construcción griega y conserva la gravedad del juicio sin cargar el término con matices doctrinales no requeridos aquí.
- source_word: μνημόσυνον
  english_pob_choice: remembrance
  chosen_spanish: memoria
  alternatives_spanish:
  - recuerdo
  - memorial
  lexicon: BDAG
  rationale: El término apunta a lo que preserva a alguien en la memoria. «Memoria» funciona bien en español y refleja el registro poético del pasaje.
- source_word: ἔτι
  english_pob_choice: any longer
  chosen_spanish: ya más
  alternatives_spanish:
  - todavía
  - nunca más
  lexicon: BDAG
  rationale: En una cláusula negada y futura, «ya más» comunica que desde ese momento no continuará existiendo tal memoria. Es una forma idiomática y fiel al sentido temporal de ἔτι.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «taken away» sobre «swept away» para un reflejo más directo de ἀρθήσονται. La versión española conserva esa dirección semántica con «serán llevados», evitando una imagen más libre que pudiera alejarse del pasivo griego.
  spanish_consistency_notes:
  - Se mantuvo el orden retórico con la adversativa inicial «Pero».
  - «Destrucción» traduce ἀπώλεια de modo consistente con el registro judicial del verso.
  - «Memoria» se eligió para μνημόσυνον por claridad y naturalidad en español.
  - La nota [a] está anclada en el verbo principal para reflejar la alternativa verbal documentada.
