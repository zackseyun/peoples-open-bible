translation:
  language: es
  text: Y se alzaron contra él en batalla, y huyó y se fue de allí con gran tristeza, para volver a Babilonia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνέστησαν ... εἰς πόλεμον
  english_pob_choice: rose up against him in battle
  chosen_spanish: se levantaron contra él en guerra
  alternatives_spanish:
  - se alzaron contra él en batalla
  - se levantaron contra él para pelear
  - tomaron las armas contra él
  lexicon: LSJ
  rationale: El griego con ἀνίστημι + εἰς πόλεμον expresa una acción hostil de levantarse para combatir. «Se levantaron contra él en guerra» conserva la imagen verbal y la oposición contra él, sin suavizar el carácter bélico.
- source_word: ἔφυγεν
  english_pob_choice: he fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - salió corriendo
  - se dio a la fuga
  lexicon: LSJ
  rationale: El verbo significa de manera directa «huir». «Huyó» es breve, fiel y mantiene la fuerza narrativa mejor que «escapó».
- source_word: ἀπῆλθεν ἐκεῖθεν
  english_pob_choice: went away from there
  chosen_spanish: se fue de allí
  alternatives_spanish:
  - partió de allí
  - se alejó de allí
  - salió de allí
  lexicon: LSJ
  rationale: La expresión marca salida física de ese lugar. «Se fue de allí» es natural en español y conserva el deíctico ἐκεῖθεν sin añadir matices no presentes en el texto.
- source_word: μετὰ λύπης μεγάλης
  english_pob_choice: with great sorrow
  chosen_spanish: con gran tristeza
  alternatives_spanish:
  - con gran dolor
  - con gran aflicción
  - con profundo pesar
  lexicon: LSJ
  rationale: λύπη puede significar tristeza, dolor o aflicción. «Gran tristeza» sigue de cerca la decisión inglesa y resulta clara en español moderno, sin exagerar ni reinterpretar.
- source_word: ἀποστρέψαι εἰς Βαβυλῶνα
  english_pob_choice: to return to Babylon
  chosen_spanish: para volver a Babilonia
  alternatives_spanish:
  - para regresar a Babilonia
  - para tornarse a Babilonia
  - para volver atrás a Babilonia
  lexicon: LSJ
  rationale: El infinitivo expresa finalidad o resultado ligado a su salida. «Para volver a Babilonia» transmite bien el sentido direccional y es idiomático en español, manteniendo el valor de retorno del verbo.
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa auditada muestran alto acuerdo; no se documentan revisiones ni notas textuales, por lo que no se introducen variantes ni notas adicionales.
  spanish_consistency_notes:
  - Se mantiene «Babilonia» como topónimo tradicional e inequívoco.
  - Se conserva una sintaxis lineal y narrativa, acorde con un relato histórico breve.
  - No se añade sujeto explícito en español en la primera cláusula, porque el verbo plural ya lo expresa naturalmente.
