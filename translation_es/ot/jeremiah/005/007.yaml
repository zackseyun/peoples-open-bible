translation:
  language: es
  text: ¿Cómo podría perdonarte por esto? Tus hijos me han abandonado y han jurado por los que no son dioses[a]. Cuando yo los sacié[b], cometieron adulterio y se agolparon en la casa de una prostituta[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede leerse: ''por no-dioses'' o ''por cosas que no son dioses''. El hebreo enfatiza el carácter falso de los poderes invocados.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''cuando los alimenté hasta quedar satisfechos''. El verbo puede expresar saciar o colmar; el contexto de provisión divina seguida de infidelidad favorece ''sacié''.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''se apiñaron en la casa de una prostituta'', ''se reunieron en grupos en la casa de una prostituta'' o ''se agolparon hacia la casa de una prostituta''. El hebreo sugiere juntarse en masa o en grupos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵי
  english_pob_choice: How can
  chosen_spanish: ¿Cómo podría
  alternatives_spanish:
  - ¿Por qué podría
  - ¿Cómo puedo
  lexicon: HALOT
  rationale: La partícula expresa asombro ante una imposibilidad retórica; en español, '¿Cómo podría...?' conserva mejor esa fuerza que un simple '¿por qué?'. Además, el condicional suaviza la forma interrogativa sin perder la imposibilidad implícita.
- source_word: לָזֹאת
  english_pob_choice: for this
  chosen_spanish: por esto
  alternatives_spanish:
  - por esta causa
  - a causa de esto
  lexicon: HALOT
  rationale: La preposición con el demostrativo señala el motivo inmediato del perdón. 'Por esto' es natural y breve en español.
- source_word: אסלוח לָךְ
  english_pob_choice: I forgive you
  chosen_spanish: podría perdonarte
  alternatives_spanish:
  - te perdonaría
  - te perdono
  lexicon: HALOT
  rationale: סלח significa perdonar. El español necesita reflejar la pregunta retórica con sentido de posibilidad/imposibilidad; por eso 'podría perdonarte' comunica mejor el valor de la pregunta que una simple afirmación.
- source_word: בָּנַיִךְ
  english_pob_choice: Your children
  chosen_spanish: Tus hijos
  alternatives_spanish:
  - Tus hijos e hijas
  - Tu pueblo
  lexicon: HALOT
  rationale: Aunque puede tener sentido colectivo, el hebreo dice literalmente 'hijos'. 'Tus hijos' mantiene la forma del original y en español puede abarcar a los habitantes/descendencia sin introducir una explicitación mayor que la del texto.
- source_word: עֲזָבוּנִי
  english_pob_choice: have forsaken me
  chosen_spanish: me han abandonado
  alternatives_spanish:
  - me han dejado
  - me han desamparado
  lexicon: HALOT
  rationale: עזב puede expresar abandono en clave de alianza. 'Abandonado' es claro en español y sostiene la gravedad sin perder naturalidad.
- source_word: וַיִּשָּׁבְעוּ בְּלֹא אֱלֹהִים
  english_pob_choice: have sworn by those that are not gods
  chosen_spanish: han jurado por los que no son dioses
  alternatives_spanish:
  - han jurado por no-dioses
  - han jurado por seres que no son dioses
  lexicon: HALOT
  rationale: La frase acusa juramentos idólatras. 'Los que no son dioses' mantiene el plural y la polémica del hebreo, evitando una paráfrasis interpretativa excesiva.
- source_word: וָאַשְׂבִּעַ אוֹתָם
  english_pob_choice: When I had fed them to the full
  chosen_spanish: Cuando yo los sacié
  alternatives_spanish:
  - Cuando los alimenté hasta quedar satisfechos
  - Cuando los llené
  lexicon: HALOT
  rationale: El verbo puede significar 'satisfacer / saciar' y, en este contexto, remite a provisión divina seguida de infidelidad. 'Los sacié' es breve y fiel, y el tiempo pasado en la subordinada refleja mejor la secuencia del hebreo y del audit trail inglés.
- source_word: וַיִּנְאָפוּ
  english_pob_choice: they committed adultery
  chosen_spanish: cometieron adulterio
  alternatives_spanish:
  - fueron adúlteros
  - adulteraron
  lexicon: HALOT
  rationale: נאף es el verbo estándar para adulterio. 'Cometieron adulterio' es la formulación española más natural y conserva la ambigüedad entre pecado sexual y traición de pacto.
- source_word: וּבֵית זוֹנָה
  english_pob_choice: a prostitute’s house
  chosen_spanish: una casa de prostituta
  alternatives_spanish:
  - la casa de una prostituta
  - un burdel
  lexicon: HALOT
  rationale: זוֹנָה designa a una prostituta. 'Casa de prostituta' sigue de cerca la imagen del original sin recurrir a un término más interpretativo como 'burdel'.
- source_word: יִתְגֹּדָדוּ
  english_pob_choice: crowded into
  chosen_spanish: se amontonaron
  alternatives_spanish:
  - se apiñaron
  - se agolparon
  lexicon: HALOT
  rationale: El hitpolel de גדד sugiere agruparse o juntarse en masa. 'Se amontonaron' transmite bien la idea de apiñarse, con un matiz visual acorde al contexto.
theological_decisions:
- issue: Tensión entre adulterio literal y metáfora de infidelidad de pacto
  english_pob_reading: Retain 'committed adultery' without specifying whether the reference is sexual sin, idolatry, or both.
  chosen_spanish_reading: Conservar 'cometieron adulterio' sin precisar si es pecado sexual, idolatría o ambos.
  alternative_spanish_readings:
  - '''se prostituyeron'' para enfatizar la idolatría'
  - '''cometieron adulterio'' entendido solo literalmente'
  rationale: Jeremías mezcla con frecuencia el lenguaje sexual y el de la infidelidad de alianza. La traducción no debe resolver esa tensión por adelantado; 'cometieron adulterio' la mantiene abierta para el lector.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Addressee singular corporativo
  english_pob_reading: Use singular 'you' for the addressed entity while pluralizing 'children' for its inhabitants.
  chosen_spanish_reading: Usar un singular implícito en 'perdonarte' y un plural en 'tus hijos'.
  alternative_spanish_readings:
  - '''te perdono'' con singular directo'
  - '''ustedes'' con plural colectivo'
  rationale: El hebreo trata a Jerusalén/Judá como una entidad femenina singular y luego habla de sus habitantes en plural. El español puede conservar esa relación con un objeto singular en el verbo y plural en los hijos, sin nombrar explícitamente la entidad.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'He seguido el último ajuste del audit trail inglés: ''When I had fed them to the full'' se refleja aquí con ''Cuando yo los sacié'', manteniendo el valor de provisión previa a la infidelidad. También preservo la tensión semántica en ''cometieron adulterio'' y la formulación polémica de los juramentos idólatras.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por norma del proyecto cuando aparezca el nombre divino; en este versículo no se nombra explícitamente, sino que habla la primera persona divina.
  - '''Hijos'' conserva la literalidad del hebreo y la referencia corporativa al pueblo.'
  - '''Casa de prostituta'' sigue el sintagma hebreo sin convertirlo en una paráfrasis más interpretativa.'
  - El plural 'los' en 'los sacié' respeta el antecedente colectivo y la secuencia verbal del original.
  - No se introduce 'Cristo' ni terminología eclesiástica ajena al texto profético.
