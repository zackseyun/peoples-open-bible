translation:
  language: es
  text: Y Yahvé también entregará a Israel contigo en manos de los filisteos, y mañana tú y tus hijos estarán conmigo[a]. Yahvé también entregará el campamento[b] de Israel en manos de los filisteos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘conmigo en la muerte’ o ‘conmigo en el Seol’. El hebreo simplemente dice ‘conmigo’.'
    reason: alternative_reading
  - marker: b
    text: 'O: ‘el ejército de Israel’. El término hebreo puede significar ‘campamento’ o, en contexto, ‘ejército’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el convenio del proyecto para el nombre divino. ‘Yahvé’ mantiene la referencia al Tetragrámaton sin ocultarla detrás de un título, y es más transparente que ‘SEÑOR’ en este contexto.
- source_word: וְיִתֵּן / יִתֵּן
  english_pob_choice: will give
  chosen_spanish: entregará
  alternatives_spanish:
  - dará
  - pondrá en manos de
  lexicon: HALOT
  rationale: En combinación con בְּיַד, el verbo expresa entrega a control enemigo. ‘Entregará’ conserva la idea de dar/poner en poder de otro, con un español natural y más explícito para el sentido hostil.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: HALOT
  rationale: ‘También’ reproduce la adición enfática de גַּם en ambas cláusulas sin sobrecargar el tono.
- source_word: עִמְּךָ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con ustedes
  - junto a ti
  lexicon: HALOT
  rationale: La forma pronominal española es la más natural para el sufijo de segunda masculina singular.
- source_word: בְּיַד פְּלִשְׁתִּים
  english_pob_choice: into the hand of the Philistines
  chosen_spanish: en mano de los filisteos
  alternatives_spanish:
  - en poder de los filisteos
  - en manos de los filisteos
  lexicon: HALOT
  rationale: Se preserva la imagen hebrea de ‘mano’ por su valor idiomático y teológico, evitando una paráfrasis que borre la metáfora. En español, ‘en mano de’ mantiene esa fuerza con estilo bíblico legible.
- source_word: וּמָחָר
  english_pob_choice: and tomorrow
  chosen_spanish: y mañana
  alternatives_spanish:
  - mañana
  lexicon: HALOT
  rationale: Se conserva la conjunción para reflejar la secuencia solemne del hebreo, como en el texto inglés auditado.
- source_word: וּבָנֶיךָ
  english_pob_choice: and your sons
  chosen_spanish: y tus hijos
  alternatives_spanish:
  - y tus hijos varones
  - y tus hijos / tus descendientes
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente ‘hijos/sons’, en español bíblico ‘hijos’ comunica adecuadamente el plural masculino en este contexto sin sonar forzado; ‘hijos varones’ sería demasiado explicativo.
- source_word: עִמִּי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto a mí
  - conmigo en la muerte
  lexicon: HALOT
  rationale: Se deja la expresión tersa y deliberadamente abierta, sin especificar más de lo que dice el hebreo. Así se preserva la ambigüedad referencial señalada en el auditorio inglés.
- source_word: מַחֲנֵה יִשְׂרָאֵל
  english_pob_choice: the camp of Israel
  chosen_spanish: el campamento de Israel
  alternatives_spanish:
  - el ejército de Israel
  - el campamento israelita
  lexicon: HALOT
  rationale: Se elige ‘campamento’ para corresponder más de cerca al valor léxico de מַחֲנֶה, siguiendo la revisión inglesa más reciente, aunque en contexto militar también puede aludir al ejército.
theological_decisions:
- issue: Alcance de ‘conmigo’ en la frase sobre Saúl y sus hijos
  english_pob_reading: Rendered as 'with me' without specifying the exact state or location beyond what the Hebrew states.
  chosen_spanish_reading: ‘conmigo’ sin precisar la condición exacta ni el lugar, más allá de lo que afirma el hebreo.
  alternative_spanish_readings:
  - conmigo en la muerte
  - conmigo en el Seol
  - conmigo en el sepulcro
  rationale: La declaración apunta a que Saúl y sus hijos se unirán a Samuel al día siguiente, pero el texto no define de forma explícita el estado metafísico. Mantener la brevedad evita resolver una tensión que el hebreo deja abierta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Valor de בְּיַד en un anuncio de derrota
  english_pob_reading: into the hand of the Philistines
  chosen_spanish_reading: en mano de los filisteos
  alternative_spanish_readings:
  - en poder de los filisteos
  - a manos de los filisteos
  rationale: Se conserva la metáfora corporal hebrea, que aquí expresa dominación y derrota, sin sustituirla por un abstracto que debilite el eco bíblico.
  doctrine_reference: Project terminology default for Hebrew idiom preservation.
translation_notes:
  revision_awareness: La versión española sigue la última revisión inglesa al preferir ‘campamento de Israel’ para מַחֲנֶה, y conserva la decisión de no explicitar ‘conmigo’ más allá del hebreo. También mantiene la duplicación enfática de ‘también’ y la secuencia solemne de las dos cláusulas.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יְהוָה conforme al estándar del proyecto.
  - Se conserva la metáfora ‘en mano de’ para בְּיַד en vez de ‘en poder de’, por fidelidad al idioma bíblico.
  - Se prefiere ‘conmigo’ para עִמִּי, manteniendo la ambigüedad teológica del pasaje.
  - ‘Campamento de Israel’ refleja la revisión auditada más reciente para מַחֲנֵה, sin excluir el matiz militar del contexto.
