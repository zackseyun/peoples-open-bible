  revision_awareness: El texto griego disponible presenta una marca de validación 'major_mismatch'; por eso la redacción española sigue de cerca el enunciado transmitido, preservando las ambigüedades léxicas relevantes sin intentar resolver la cuestión textual más allá de la evidencia dada. La revisión más reciente indicó que no se requieren cambios, aunque la nota textual debe conservarse.
