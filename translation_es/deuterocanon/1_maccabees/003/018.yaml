translation:
  language: es
  text: 'Y Judas dijo: «Es fácil que muchos caigan en manos de pocos[a], y ante el cielo no hay diferencia en salvar por muchos o por pocos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sean entregados en manos de pocos». El verbo griego significa literalmente ‘ser encerrados’ o ‘ser confinados’; aquí expresa quedar atrapados o sometidos al poder de otros.
    reason: lexical_alternative
  - marker: b
    text: «Cielo» probablemente funciona como una manera reverente de referirse a Dios; «ante Dios» sería una alternativa interpretativa.
    reason: alternative_reading
lexical_decisions:
- source_word: Εὔκοπόν
  english_pob_choice: it is easy
  chosen_spanish: es fácil
  alternatives_spanish:
  - es más fácil
  - no es cosa difícil
  lexicon: LSJ
  rationale: La expresión impersonal con ἐστιν pide en español una formulación natural y directa. «Es fácil» conserva la fuerza del enunciado sin añadir matices que el griego no exige.
- source_word: συγκλεισθῆναι
  english_pob_choice: to be hemmed in by the hands of a few
  chosen_spanish: sean cercados por las manos de pocos
  alternatives_spanish:
  - sean encerrados por las manos de pocos
  - sean puestos en poder de pocos
  - sean acorralados por las manos de pocos
  lexicon: LSJ
  rationale: El verbo pasivo expresa ser encerrados o puestos bajo control ajeno. «Sean cercados» preserva la imagen de contención y permite una construcción natural en español, sin perder el trasfondo militar de quedar bajo poder enemigo.
- source_word: πολλοὺς ... ἐν χερσὶν ὀλίγων
  english_pob_choice: many ... by the hands of a few
  chosen_spanish: muchos ... por las manos de pocos
  alternatives_spanish:
  - muchos ... en manos de pocos
  - una multitud ... en manos de pocos
  lexicon: LSJ
  rationale: La oposición cuantitativa entre muchos y pocos es central. «Por las manos de pocos» conserva la metáfora del texto y deja visible el valor instrumental/personal de χερσίν.
- source_word: διαφορὰ
  english_pob_choice: difference
  chosen_spanish: diferencia
  alternatives_spanish:
  - distinción
  - ventaja
  lexicon: LSJ
  rationale: «Diferencia» es el equivalente más claro y sobrio para οὐκ ἔστι διαφορά. Evita sobreinterpretar la frase como si hablase de ventaja o mérito.
- source_word: ἐναντίον τοῦ οὐρανοῦ
  english_pob_choice: in the sight of heaven
  chosen_spanish: ante el cielo
  alternatives_spanish:
  - a la vista del cielo
  - delante del cielo
  - ante Dios
  lexicon: LSJ
  rationale: Se conserva «cielo» como en el griego, manteniendo el circunloquio reverente. «Ante el cielo» es una manera natural en español de expresar la idea de estar bajo su mirada sin convertirla explícitamente en «Dios» en el texto principal.
- source_word: σῴζειν
  english_pob_choice: saving
  chosen_spanish: salvar
  alternatives_spanish:
  - dar salvación
  - librar
  - rescatar
  lexicon: LSJ
  rationale: En este contexto bélico, σῴζειν incluye libramiento o victoria, pero «salvar» preserva tanto la amplitud del verbo como su resonancia religiosa, sin restringirlo sólo a victoria militar.
- source_word: ἐν πολλοῖς ἢ ἐν ὀλίγοις
  english_pob_choice: by many or by few
  chosen_spanish: por muchos o por pocos
  alternatives_spanish:
  - con muchos o con pocos
  - mediante muchos o mediante pocos
  lexicon: LSJ
  rationale: La construcción instrumental se expresa bien con «por». Se mantiene la simetría retórica del contraste entre muchos y pocos.
theological_decisions:
- issue: Uso reverencial de «cielo» en ἐναντίον τοῦ οὐρανοῦ
  english_pob_reading: Retain 'heaven' rather than substituting 'God'
  chosen_spanish_reading: Retener «cielo» en el texto principal
  alternative_spanish_readings:
  - ante Dios
  - a la vista de Dios
  rationale: El griego dice literalmente «cielo», probablemente como circunloquio reverente. La traducción principal conserva esa forma para respetar la evidencia textual; la posible referencia a Dios queda implícita sin ser explicitada en el cuerpo del versículo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión reciente del texto inglés, que sustituyó una formulación más literal por «hemmed in by the hands of a few» para naturalidad. La versión española sigue esa misma dirección: conserva la imagen de contención mediante «cercados» y evita una calca demasiado rígida. También se preservó el mantenimiento deliberado de «cielo» en lugar de explicitar «Dios», conforme al criterio auditado del POB.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto en otros contextos, pero aquí el original dice «cielo» y no aparece el nombre divino.
  - Se mantiene «salvar» para σῴζειν, porque el contexto militar no elimina su valor teológico.
  - Se opta por «pocos» sin añadir «hombres», ya que el contraste retórico ya es claro en español y el griego tampoco lo repite explícitamente.
  - La puntuación y el tono buscan una lectura pública digna, con comillas españolas y sintaxis fluida.
