review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: los amalecitas y cananeos están delante de Israel, ellos caerán a espada, y la causa es haberse vuelto de seguir a Yahvé; por eso Yahvé no estará con ellos. También preserva correctamente «Yahvé» para יְהוָה. Sin embargo, «se han vuelto de seguir a Yahvé» es poco natural en español y no expresa con suficiente claridad la idea de retroceder/dejar de seguir. Además, conviene marcar mejor la consecuencia causal de כִּי עַל כֵּן.'
  spanish_quality_summary: 'El texto es claro y legible, pero una frase central suena forzada: «se han vuelto de seguir a Yahvé». En español eclesial natural, «se apartaron de seguir a Yahvé» o «retrocedieron de seguir a Yahvé» comunica mejor el hebreo מֵאַחֲרֵי sin calco torpe. El resto del versículo está bien construido; «a espada» es idiomático y digno.'
  glossary_alignment: Alineación correcta con el glosario del proyecto en el uso de «Yahvé» para יְהוָה. No hay conflicto terminológico mayor. La mejora propuesta mantiene la imagen de dejar de seguir a Yahvé sin aplanarla a una mera abstracción.
  issues:
  - severity: medium
    issue: La frase «se han vuelto de seguir a Yahvé» es poco idiomática en español.
    rationale: Aunque intenta preservar la imagen de dejar de seguir, la construcción «volverse de seguir» suena antinatural. «Se apartaron de seguir a Yahvé» conserva el valor de שַׁבְתֶּם מֵאַחֲרֵי יְהוָה con mejor español.
  - severity: low
    issue: El segundo «porque» puede sonar algo repetitivo y menos preciso que una formulación consecutivo-causal.
    rationale: כִּי עַל כֵּן introduce la base causal/consecutiva. «porque se apartaron...» sigue siendo válido, pero la revisión fluye mejor manteniendo la relación lógica dentro de una sintaxis más natural.
  revised_spanish_text: Porque los amalecitas y los cananeos están allí delante de ustedes, y caerán a espada, porque se apartaron de seguir a Yahvé, y Yahvé no estará con ustedes.
  revision_rationale: 'Se revisa únicamente la expresión verbal para lograr un español natural y fiel al hebreo: «se apartaron de seguir a Yahvé» conserva la idea de dejar de ir tras Yahvé, evitando el calco rígido «se han vuelto de seguir». No se requieren notas al pie.'
