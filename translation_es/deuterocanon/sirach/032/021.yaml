translation:
  language: es
  text: No confíes en un camino traicionero[a][b], y al final mantente alerta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo מחתף es difícil; puede aludir a algo que hace tropezar o caer. Posibles traducciones incluyen «un camino resbaladizo» o «una senda que hace caer».
    reason: lexical_alternative
  - marker: b
    text: El paralelo griego provisto con la fuente parece reflejar un versículo distinto y no se siguió donde entra en conflicto con el testimonio hebreo conservado.
    reason: textual_variant
lexical_decisions:
- source_word: אל תבטח
  english_pob_choice: Do not trust
  chosen_spanish: No confíes
  alternatives_spanish:
  - No te fíes
  - No pongas tu confianza
  lexicon: HALOT
  rationale: בטח expresa confiar, fiarse o depender de algo. «No confíes» reproduce directamente la advertencia y su tono exhortativo en español actual.
- source_word: בדרך
  english_pob_choice: in a way
  chosen_spanish: en un camino
  alternatives_spanish:
  - en una senda
  - en una manera
  - en tu conducta
  lexicon: HALOT
  rationale: דרך puede ser camino literal o curso figurado. Dado el paralelismo con una advertencia moral, «camino» conserva la imagen sin cerrar innecesariamente el sentido figurado.
- source_word: מחתף
  english_pob_choice: of stumbling / treacherous way
  chosen_spanish: traicionero
  alternatives_spanish:
  - resbaladizo
  - de tropiezo
  - que hace caer
  lexicon: HALOT
  rationale: El hebreo es difícil y el audit trail inglés opta por «treacherous way». En español, «traicionero» comunica bien la idea de un camino peligroso y engañoso, sin forzar una reconstrucción demasiado técnica.
- source_word: ובאחריתך
  english_pob_choice: and in the end
  chosen_spanish: y al final
  alternatives_spanish:
  - y en tu fin
  - y en tu desenlace
  - y en tu futuro
  lexicon: HALOT
  rationale: אחרית puede referirse al desenlace o resultado final. «Al final» es natural en español y mantiene el énfasis en el desenlace de la conducta.
- source_word: השמר
  english_pob_choice: be on guard
  chosen_spanish: mantente alerta
  alternatives_spanish:
  - cuídate
  - ponte en guardia
  - ten cuidado
  lexicon: HALOT
  rationale: השמר es un imperativo reflexivo de vigilancia. «Mantente alerta» transmite cautela activa en español contemporáneo sin perder la fuerza exhortativa.
translation_notes:
  revision_awareness: 'El texto español sigue el hebreo conservado por Kahana, no el paralelo griego de Sirácides 32:21, que en el expediente inglés fue descartado por no coincidir con este testimonio hebreo. La redacción procura reflejar la decisión revisada en inglés: no una simple «senda de tropiezo», sino un «camino traicionero» con cautela final.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras fórmulas de sustitución porque el versículo no contiene el Tetragrámaton.
  - «Camino» mantiene la metáfora hebrea de דרך y sigue siendo natural en español bíblico moderno.
  - «Mantente alerta» conserva el matiz exhortativo del imperativo hebreo mejor que una mera instrucción pasiva.
