  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: los levitas estaban intentando aquietar a todo el pueblo, introducen habla directa, ordenan silencio, dan la razón de que el día es santo y prohíben la tristeza/aflicción. Sin embargo, la nota [b] está mal anclada y mal justificada: en el rastro inglés la alternativa pertenece a וְאַל תֵּעָצֵבוּ, no a קָדֹשׁ. Además, en español «Callen» suena más natural con tratamiento de ustedes, pero entonces conviene mantener coherencia con el resto del registro; una mejora menor es usar «Guarden silencio», que expresa mejor הַסּוּ en contexto litúrgico y evita brusquedad.'
