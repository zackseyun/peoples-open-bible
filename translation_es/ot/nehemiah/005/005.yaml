    rationale: En este contexto, con לַעֲבָדִים inmediatamente antes y la decisión teológica del POB de mantener lenguaje fuerte de esclavitud, 'sometidas' resulta demasiado general; 'esclavizadas' preserva mejor el sentido contextual.
  - severity: medium
    issue: '"a esclavitud" suena poco natural en español'
    rationale: Aunque intenta reflejar literalmente el valor resultativo, en español bíblico legible suena más idiomático 'a la esclavitud', sin pérdida de significado.
  - severity: low
    issue: La decisión léxica sobre כִּבְנֵיהֶם בָּנֵינוּ justifica 'hijos' donde el rastro inglés favorece un sentido colectivo
    rationale: El texto principal puede dejarse con 'hijos' por uso inclusivo frecuente, pero la justificación debería reconocer más claramente el valor colectivo de בנים aquí; no exige adjudicación mayor en esta línea puntual.
