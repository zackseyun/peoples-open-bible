translation:
  language: es
  text: Dios oyó sus gemidos[a], y Dios se acordó de su pacto con Abraham, con Isaac[b], y con Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su gemido». El sustantivo hebreo puede denotar un clamor o gemido bajo opresión.
    reason: lexical_alternative
  - marker: b
    text: '«Se acordó» es lenguaje de pacto: no implica que Dios hubiera olvidado, sino que se volvió con fidelidad a las obligaciones de su pacto.'
    reason: theological_note
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - prestó oído a
  lexicon: HALOT
  rationale: El verbo שׁמע en este contexto narrativo expresa recepción auditiva del clamor; «oyó» comunica de forma natural y fiel la acción básica sin volverla explicativa.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aunque el hebreo usa אֱלֹהִים con verbo singular, el contexto del pacto patriarcal identifica al Dios de Israel. En el proyecto español, el nombre divino se traduce como «Yahvé» para evitar el ocultamiento del nombre y mantener coherencia con la política terminológica del POB.
- source_word: נַאֲקָתָם
  english_pob_choice: their groaning
  chosen_spanish: su gemido
  alternatives_spanish:
  - su gemido de dolor
  - su lamento
  lexicon: HALOT
  rationale: נַאֲקָה puede denotar gemido, queja o clamor bajo opresión. «Gemido» conserva la fuerza sufriente del sustantivo y funciona bien en español; el singular colectivo reproduce la realidad conjunta del sufrimiento sin perder naturalidad.
- source_word: וַיִּזְכֹּר
  english_pob_choice: remembered
  chosen_spanish: se acordó
  alternatives_spanish:
  - recordó
  - tuvo presente
  lexicon: HALOT
  rationale: En lenguaje de pacto, זכר no implica olvido previo, sino una disposición fiel hacia el compromiso pactal. «Se acordó» preserva el verbo de memoria en español sin convertirlo en paráfrasis interpretativa como «actuó en favor de».
- source_word: בְּרִיתוֹ
  english_pob_choice: his covenant
  chosen_spanish: su pacto
  alternatives_spanish:
  - su alianza
  - su convenio
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, «pacto» comunica bien בְּרִית como término técnico de relación vinculante. «Alianza» puede sonar más política o moderna; «pacto» mantiene mejor el valor formal y teológico.
- source_word: אֶת אַבְרָהָם אֶת יִצְחָק וְאֶת יַעֲקֹב
  english_pob_choice: with Abraham, with Isaac, and with Jacob
  chosen_spanish: con Abraham, con Isaac y con Jacob
  alternatives_spanish:
  - con Abraham, Isaac y Jacob
  - hecho con Abraham, con Isaac y con Jacob
  lexicon: HALOT
  rationale: El hebreo enumera a los patriarcas como los asociados al pacto. Repetir «con» conserva el énfasis y la cadencia del original, al tiempo que suena natural en español.
theological_decisions:
- issue: Lenguaje antropomórfico de «recordar/acordarse» aplicado a Dios
  english_pob_reading: Retain 'remembered' in the main text without explanatory expansion.
  chosen_spanish_reading: Conservar «se acordó» en el texto principal sin desarrollar la implicación en la línea principal.
  alternative_spanish_readings:
  - tuvo presente
  - actuó conforme a su pacto
  - se volvió hacia su pacto
  rationale: 'El hebreo usa lenguaje ordinario de memoria en un contexto de pacto. Traducirlo por una acción ya interpretada resolvería una tensión que el texto mismo deja abierta: Dios no estaba olvidando, sino manifestando fidelidad pactal. La nota explica el sentido sin borrar la forma verbal.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado final coincide con el consenso de alta concordancia y no requiere ajuste textual adicional.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar español del proyecto para יהוה.
  - Se usa «pacto» para בְּרִית y se preserva la repetición de «con» para reflejar la estructura hebrea.
  - Se conserva el verbo de memoria en la forma no explicativa del texto principal, dejando la aclaración pactal en nota.
  - El singular colectivo «su gemido»/«su gemido» sigue el sentido del sustantivo hebreo sin forzar pluralidad en español.
