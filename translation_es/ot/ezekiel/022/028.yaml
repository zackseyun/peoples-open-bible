    text: Or “with untempered mortar” or “with flimsy plaster.” The Hebrew image is of a deceptive coating that hides defects.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “the Lord GOD” (אֲדֹנָי יְהוִה); elsewhere the divine name יְהוָה is rendered “the LORD.”'
