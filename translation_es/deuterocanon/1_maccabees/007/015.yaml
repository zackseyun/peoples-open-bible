translation:
  language: es
  text: 'Y habló con ellos palabras de paz, y les juró, diciendo: «No buscaremos hacerles daño[a] a ustedes ni a sus amigos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mal». El griego κακόν puede significar «mal» o «daño»; aquí probablemente se refiere a hacerles daño.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλάλησεν
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - les habló
  - habló con ellos
  lexicon: BDAG
  rationale: λέγω/λαλέω en narración se expresa naturalmente en español con «habló». La estructura «habló con ellos» mantiene el sentido relacional del griego μετʼ αὐτῶν y evita un calco rígido.
- source_word: μετʼ αὐτῶν
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - a ellos
  - a su lado
  lexicon: BDAG
  rationale: La preposición μετά con genitivo significa «con». «Con ellos» preserva esa relación mejor que «a ellos», que sonaría como dirección del habla y no como compañía en el diálogo.
- source_word: εἰρηνικοὺς λόγους
  english_pob_choice: peaceable words
  chosen_spanish: palabras de paz
  alternatives_spanish:
  - palabras pacíficas
  - palabras conciliadoras
  lexicon: BDAG
  rationale: El sintagma adjetivo-sustantivo griego puede verterse de forma transparente como «palabras de paz». En español, esta opción comunica bien el tono conciliador sin forzar una implicación de paz real o duradera.
- source_word: ὤμοσεν
  english_pob_choice: swore
  chosen_spanish: les juró
  alternatives_spanish:
  - juró
  - les hizo juramento
  lexicon: BDAG
  rationale: El aoristo de ὄμνυμι se traduce de manera directa con «juró». Se añadió el dativo explícito «les» para reflejar el destinatario del juramento y conservar la fluidez del español.
- source_word: Οὐκ ἐκζητήσομεν
  english_pob_choice: We will not seek
  chosen_spanish: No buscaremos
  alternatives_spanish:
  - No procuraremos
  - No perseguiremos
  lexicon: BDAG
  rationale: ἐκζητέω puede expresar buscar con empeño o buscar para obtener/alcanzar algo. Aquí, con κακόν como objeto, «No buscaremos» conserva la formulación griega y permite el matiz idiomático de buscar causar daño.
- source_word: ὑμῖν κακὸν
  english_pob_choice: harm against you
  chosen_spanish: mal contra ustedes
  alternatives_spanish:
  - daño contra ustedes
  - mal para ustedes
  - daño para ustedes
  lexicon: BDAG
  rationale: κακόν puede denotar «mal» o «daño/harm». Siguiendo la nota auditada del inglés, se mantiene la tensión lexical con «mal», mientras «contra ustedes» hace explícita la orientación hostil sin resolverla a una sola interpretación demasiado estrecha.
- source_word: τοῖς φίλοις ὑμῶν
  english_pob_choice: your friends
  chosen_spanish: sus amigos
  alternatives_spanish:
  - sus aliados
  - los que les son cercanos
  lexicon: BDAG
  rationale: φίλοι aquí se conserva con su sentido básico de «amigos». En contexto político-militar también puede insinuar aliados, pero el griego no obliga a esa restricción, así que se mantiene la equivalencia más abierta.
translation_notes:
  revision_awareness: 'La traducción sigue de cerca el texto griego de Swete 1909 y toma en cuenta el audit trail inglés de la POB: se conserva la idea de palabras conciliadoras, el juramento explícito y la ambigüedad de κακόν entre «mal» y «daño». Se evita endurecer φίλοις ὑμῶν a «aliados» sin una presión contextual suficiente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se emplea un español neutral y reverente, con verbos simples y sintaxis clara.
  - Se mantiene la tensión lexical de κακόν con «mal», apoyada por la nota de pie de página.
  - «Sus amigos» conserva el término básico φίλοι sin expandirlo a un sentido militar más específico.
