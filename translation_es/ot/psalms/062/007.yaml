- from: Sólo él es mi roca y mi salvación[a], mi baluarte; no seré sacudido.
  to: Solo él es mi roca y mi salvación, mi baluarte; no seré conmovido[a].
  rationale: Se corrige la nota al pie para que preserve la alternativa documentada en el POB inglés para לֹא אֶמּוֹט, y se mejora la naturalidad de la cláusula final en español con «no seré conmovido», que sigue siendo fiel al hebreo y a la intención del texto.
