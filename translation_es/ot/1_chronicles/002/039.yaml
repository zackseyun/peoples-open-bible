translation:
  language: es
  text: Azarías engendró a Helez, y Helez engendró a Eleasah[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría ser «Elasá» para este nombre final; aquí la forma hebrea se refleja más directamente como «Eleasah».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲזַרְיָה
  english_pob_choice: Azariah
  chosen_spanish: Azarías
  alternatives_spanish:
  - y Azarías
  lexicon: HALOT
  rationale: Nombre propio; en español bíblico la forma estable y reconocible es «Azarías». El prefijo waw queda absorbido por la sintaxis narrativa normal del español, como en el inglés POB.
- source_word: הֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  lexicon: HALOT
  rationale: En genealogía, el hifil de ילד expresa la generación/paternidad. «Engendró» mantiene la fuerza genealógica directa y es idiomático en español bíblico sin reducir el matiz masculino de la relación.
- source_word: אֶת
  english_pob_choice: '[not separately translated]'
  chosen_spanish: '[no se traduce separadamente]'
  alternatives_spanish:
  - a
  lexicon: HALOT
  rationale: Marcador de objeto directo sin equivalente léxico independiente; en español se refleja naturalmente con la preposición «a» ante nombres personales.
- source_word: חָלֶץ
  english_pob_choice: Helez
  chosen_spanish: Helez
  alternatives_spanish:
  - Jélez
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva «Helez» para seguir de cerca la forma hebrea y coincidir con el audit trail en inglés.
- source_word: וְחֶלֶץ
  english_pob_choice: and Helez
  chosen_spanish: y Helez
  alternatives_spanish:
  - e Helez
  lexicon: HALOT
  rationale: La conjunción waw se traduce de forma simple con «y». Aunque «e» sería posible ante /i/ o hiato, aquí la forma básica es suficiente y mantiene claridad.
- source_word: אֶלְעָשָׂה
  english_pob_choice: Eleasah
  chosen_spanish: Eleasá
  alternatives_spanish:
  - Eleasah
  - Elasá
  lexicon: HALOT
  rationale: El inglés POB señala la alternativa textual/nombre «Elasah», pero prefiere una forma más directa del hebreo consonántico-vocalizado. En español, «Eleasá» reproduce mejor la forma base del hebreo y conserva la posible tensión con la variante simplificada.
translation_notes:
  revision_awareness: 'Se siguió el testimonio del hebreo masorético (WLC) y la decisión auditada del POB en inglés: el nombre final se mantiene en una forma más cercana al hebreo, conservando en nota la alternativa breve documentada («Elasah»/«Elasá»). No se requirieron revisiones textuales adicionales.'
  spanish_consistency_notes:
  - Se mantuvo un registro genealógico sobrio y directo, acorde con el género de la lista de descendencia.
  - Se usó «engendró» para preservar el valor genealógico del verbo hebreo hifil sin volver la frase arcaizante.
  - Los nombres propios se transliteran de forma consistente y sin castellanizaciones innecesarias, salvo la forma bíblica estable «Azarías».
