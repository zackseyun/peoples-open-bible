    issue: Topónimo principal «Ammaús»
    rationale: El expediente inglés fue revisado para usar la forma convencional del lugar en el texto principal. En español, la forma normal es «Emaús»; mantener «Ammaús» no preserva bien la decisión auditada ni la legibilidad habitual.
  - severity: medium
    issue: Frase geográfica «en la tierra de la llanura»
    rationale: Aunque intenta reflejar ἐν τῇ γῇ τῇ πεδινῇ, resulta calco poco natural. «En la región llana» o «en la llanura» preserva mejor el sentido geográfico con español natural.
  - severity: low
    issue: Anclaje de nota al pie
    rationale: El marcador [a] aparece sobre «de» en «cerca de[a] Ammaús», cuando debe anclarse al topónimo relevante.
  - severity: low
    issue: Puntuación algo entrecortada
    rationale: La secuencia «y llegaron, y acamparon» no es incorrecta, pero sin esa coma se lee con mayor naturalidad en español.
