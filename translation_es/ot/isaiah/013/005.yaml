base_translation:
  language: en
  yaml_path: translation/ot/isaiah/013/005.yaml
  text: They are coming from a distant land[c][b][a], from the end of the heavens— Yahweh and the weapons of his wrath— to destroy the whole earth.
  footnotes:
  - marker: a
    text: Or 'from the farthest reaches of the heavens.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and the instruments of his wrath.'
    reason: lexical_alternative
  - marker: c
    text: '''The whole earth'' may also be rendered ''the whole land,'' but the cosmic language in the verse favors the broader sense here.'
    reason: lexical_alternative
