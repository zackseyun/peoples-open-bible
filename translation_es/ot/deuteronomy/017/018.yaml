    rationale: Según el rastro inglés, la alternativa corresponde a מִלִּפְנֵי, no a מִשְׁנֵה. El anclaje actual puede inducir a pensar que la nota define «copia» en vez de aclarar la procedencia del ejemplar.
  - severity: low
    issue: «De delante de» es gramatical, pero poco natural en español bíblico moderno.
    rationale: «De ante» preserva mejor la literalidad relativa de מִלִּפְנֵי y suena más idiomático en un registro formal eclesial.
