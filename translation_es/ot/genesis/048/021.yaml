base_translation:
  language: en
  yaml_path: translation/ot/genesis/048/021.yaml
  text: Then Israel said to Joseph[a], “Behold, I am about to die[b], but God will be with you and will bring you back to the land of your fathers.”
  footnotes:
  - marker: a
    text: 'Or ''and God will be with you.'' The Hebrew conjunction is simply ''and,'' but here it likely carries a contrast: Jacob will die, yet God will remain with them.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew pronouns in 'with you' and 'bring you back' are plural, extending the promise beyond Joseph individually to his family or descendants.
    reason: lexical_alternative
