translation:
  language: es
  text: Y suplicó a Yahvé, recordando todas las obras de Yahvé,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐδεήθη
  english_pob_choice: implored
  chosen_spanish: suplicó
  alternatives_spanish:
  - imploró
  - rogó
  - pidió con insistencia
  lexicon: BDAG
  rationale: δέομαι expresa una petición intensa y urgente. En español, «suplicó» conserva esa fuerza sin sonar tan marcadamente técnico o arcaico como «imploró».
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Señor
  lexicon: BDAG / project terminology
  rationale: Aunque el texto griego usa κύριος, el contexto de la obra y la directriz del proyecto para el nombre divino favorecen «Yahvé» como representación transparente del referente divino en el texto principal.
- source_word: μνημονεύων
  english_pob_choice: remembering
  chosen_spanish: recordando
  alternatives_spanish:
  - recordando en su mente
  - teniendo presente
  - rememorando
  lexicon: BDAG
  rationale: El participio expresa acción concomitante con la súplica. «Recordando» es posible, pero «recordando» en español puede sonar más interno; «recordando» no obstante mantiene bien el sentido de traer a la memoria sin añadir una verbalización explícita.
- source_word: πάντα
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - todas las
  - cada una de las
  lexicon: BDAG
  rationale: El griego totaliza los actos/obras de Yahvé. En español, «todas» conserva esa amplitud de manera natural con el sustantivo femenino plural.
- source_word: τὰ ἔργα
  english_pob_choice: the works
  chosen_spanish: las obras
  alternatives_spanish:
  - los hechos
  - los actos
  - las acciones
  lexicon: BDAG
  rationale: ἔργα puede abarcar obras, hechos o actos. «Obras» es el equivalente más directo y sostiene bien la resonancia bíblica sin imponer un matiz demasiado específico.
- source_word: Κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Señor
  - de Señor
  lexicon: BDAG / project terminology
  rationale: La repetición del referente divino se mantiene en español con el mismo nombre. «De Yahvé» preserva la correspondencia con el primer miembro y evita la oscilación entre nombres en una misma frase.
theological_decisions:
- issue: Cómo representar κύριος en una plegaria deuterocanónica griega
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: El griego de la súplica dirige la petición al mismo referente divino en ambos casos. Dado el estándar del proyecto para el nombre divino, se usa «Yahvé» en vez de la convención de ocultamiento «SEÑOR» o la traducción funcional «Señor».
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord / project name-divine policy'
- issue: Valor del participio μνημονεύων junto con la súplica
  english_pob_reading: remembering
  chosen_spanish_reading: recordando
  alternative_spanish_readings:
  - recordando en su mente
  - rememorando
  - teniendo presente
  rationale: La frase no obliga a entender una recitación verbal; expresa acompañamiento de la plegaria mediante memoria activa. «Recordando» mantiene esa ambigüedad útil y no sobreinterpreta el gesto.
  doctrine_reference: Greek participial nuance; avoid over-specifying verbalized recitation
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego: conservó la estructura de súplica + participio circunstancial + objeto totalizado, y reflejó la repetición del nombre divino en ambos miembros de la frase sin introducir desarrollo explicativo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la política del proyecto para יהוה / YHWH, incluso cuando el griego usa κύριος.
  - Se prefirió «suplicó» para δέομαι por su intensidad natural en español.
  - Se eligió «las obras» para τὰ ἔργα por ser la opción más transparente y bíblicamente reconocible en español.
  - No se añadieron notas al pie porque el versículo no presenta una variante textual o ambigüedad que requiera anclaje en el texto español.
