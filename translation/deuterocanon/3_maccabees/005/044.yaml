id: 3MA.5.44
reference: 3 Maccabees 5:44
source:
  edition: lxx-swete-1909
  text: τότε περιχαρεῖς ἀναλύσαντες οἱ φίλοι καὶ συγγενεῖς μετὰ πίστεως, διέτασσον τὰς δυνάμεις ἐπὶ τοὺς εὐκαιροτάτους τόπους τῆς πόλεως πρὸς τὴν τήρησιν.
  language: Greek
  pages:
  - 745
  confidence: high
  validation: agree
translation:
  text: Then the friends and relatives[a], overjoyed, having regained confidence, stationed the forces in the most suitable places of the city for guard duty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithfully' or 'with confidence.' The Greek says 'with faith' (μετὰ πίστεως), which may describe either their trust/confidence or the faithful manner of their action.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιχαρεῖς
  chosen: overjoyed
  alternatives:
  - very joyful
  - rejoicing greatly
  lexicon: LSJ
  rationale: The adjective intensifies joy; 'overjoyed' gives natural modern English while preserving the strong emotional force.
- source_word: ἀναλύσαντες
  chosen: having dispersed
  alternatives:
  - having departed
  - having withdrawn
  - having broken up
  lexicon: LSJ
  rationale: In context of friends and relatives moving away to take up positions, the participle most naturally indicates dispersing from the gathered group rather than a simple departure from the scene.
- source_word: οἱ φίλοι καὶ συγγενεῖς
  chosen: the friends and relatives
  alternatives:
  - the friends and kinsmen
  - the companions and relatives
  lexicon: LSJ
  rationale: A straightforward rendering that preserves the two social groups named without archaic diction.
- source_word: μετὰ πίστεως
  chosen: with faith
  alternatives:
  - faithfully
  - with confidence
  - trustingly
  lexicon: LSJ
  rationale: The noun πίστις is rendered by the project's default as 'faith' unless context clearly demands otherwise. Here the phrase can denote acting in trust/confidence, but 'with faith' preserves the lexical form and the text's possible theological resonance.
- source_word: διέτασσον
  chosen: stationed
  alternatives:
  - arranged
  - posted
  - deployed
  lexicon: LSJ
  rationale: The verb denotes ordering or arranging; with military object τὰς δυνάμεις and destination phrase, 'stationed' best captures organized placement for defense.
- source_word: τὰς δυνάμεις
  chosen: the forces
  alternatives:
  - the troops
  - the guards
  lexicon: LSJ
  rationale: The term commonly refers to forces or troops. 'Forces' is broad enough to fit the military/security setting without over-specifying.
- source_word: ἐπὶ τοὺς εὐκαιροτάτους τόπους
  chosen: in the most suitable places
  alternatives:
  - at the most strategic places
  - at the most opportune places
  lexicon: LSJ
  rationale: εὐκαιρότατος suggests especially favorable or suitable locations. 'Most suitable places' is clear and avoids importing a more technical military nuance than the Greek requires, though strategy is implied by context.
- source_word: πρὸς τὴν τήρησιν
  chosen: for guard duty
  alternatives:
  - for guarding
  - for keeping watch
  - for protection
  lexicon: LSJ
  rationale: 'The phrase expresses purpose: placement for watch/guard. ''For guard duty'' is idiomatic and fits the security context.'
