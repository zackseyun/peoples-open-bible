review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido griego general: tiempo narrativo futuro relativo (''en el año siguiente''), reunión/movilización de tropas, sesenta mil hombres selectos, cinco mil tropas montadas, y propósito de hacer guerra contra ellos. Sin embargo, hay un problema en el tratamiento de la nota sobre πεντακισχιλίαν ἵππον: el texto principal ya dice «cinco mil de caballería», pero la nota lo presenta como alternativa, duplicando la lectura principal en vez de ofrecer una verdadera alternativa al colectivo militar griego.'
  spanish_quality_summary: El español es claro, natural y de registro digno. «Reunió», «hombres escogidos» y «para hacerles guerra» funcionan bien. La única reparación necesaria es la nota b, para que no repita la redacción principal y para explicar mejor la alternativa «jinetes».
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. Las decisiones léxicas están bien alineadas con el proyecto: formulación narrativa natural, conservación del matiz militar de ἵππον como colectivo, y propósito bélico claramente expresado.'
  issues:
  - severity: medium
    issue: La nota b repite la traducción principal en lugar de ofrecer una alternativa real.
    rationale: 'El texto principal ya usa «cinco mil de caballería[a][b]», pero la nota b dice «O: “cinco mil de caballería” o “cinco mil jinetes”». Una nota de alternativa no debe presentar como alternativa exacta la misma lectura escogida para el texto principal.'
  - severity: low
    issue: El anclaje de notas [a][b] sobre «caballería» no sigue el orden conceptual del inglés auditado.
    rationale: No es incorrecto en sí, pero conviene mantener notas claras y no redundantes. Conservar ambos marcadores es aceptable si cada uno aporta información distinta y bien enfocada.
  revised_spanish_text: Y en el año siguiente reunió sesenta mil hombres escogidos y cinco mil de caballería[a][b], para hacerles guerra.
  revised_footnotes:
  - marker: a
    text: 'O: «en el año venidero». La expresión griega dice literalmente «en el año que viene», y señala simplemente el año siguiente en la secuencia narrativa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cinco mil jinetes». El griego usa «caballo» con valor colectivo militar.'
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal, porque es fiel al griego y suena natural en español. Solo se corrige la nota b para eliminar la redundancia y preservar adecuadamente la alternativa léxica documentada en el audit trail inglés.
