translation:
  language: es
  text: 'Entonces Dios habló a Noé, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - Dijo
  lexicon: HALOT
  rationale: El verbo hebreo marca avance narrativo con waw consecutiva. «Entonces» conserva el valor secuencial de la narración, y «habló» refleja mejor דּבר que el simple «dijo», manteniendo un registro natural en español.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - deidad
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים designa al Dios verdadero; «Dios» es la equivalencia idiomática y fiel en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - con
  lexicon: HALOT
  rationale: La preposición introduce el destinatario del habla; en español «a» expresa de forma natural e inequívoca el complemento indirecto.
- source_word: נֹחַ
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noah
  lexicon: standard Spanish biblical usage
  rationale: El nombre propio se adapta a la forma bíblica usual en español, «Noé», que es transparente para el lector y corresponde a la convención tradicional de transliteración.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el contenido del discurso; «diciendo» conserva la función formal de enlace sin añadir una paráfrasis innecesaria.
translation_notes:
  revision_awareness: El inglés POB no presenta notas ni variantes textuales para este versículo, y el cotejo de revisión indica alta concordancia sin cambios. La versión española sigue esa estabilidad textual y mantiene la misma estructura breve de introducción al discurso.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en coherencia con los criterios del proyecto para este contexto.
  - Se usa «Noé» como forma española estándar del nombre bíblico.
  - La frase introductoria «Entonces ... habló ... diciendo» conserva el tono narrativo breve del hebreo y del POB inglés.
