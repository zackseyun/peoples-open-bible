  yaml_path: translation/ot/ezekiel/035/010.yaml
  text: Because you said[a], ‘These two nations and these two lands will be mine[b], and we will possess them’—though Yahweh was there—
  footnotes:
  - marker: a
    text: Or 'the two nations' and 'the two lands.' The Hebrew uses the article; 'these' is supplied in English to reflect the specific entities in view from the context.
    reason: lexical_alternative
  - marker: b
    text: Or 'and the LORD was there' or 'while the LORD was there.' The Hebrew conjunction can be read in more than one way; the main text takes it concessively to reflect the sense of Edom's presumptuous claim.
    reason: alternative_reading
