translation:
  language: es
  text: 'De entre los hijos de Jeshua hijo de Jozadak y sus hermanos: Maelas[a], Eleazar, Joribus y Joadanus.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego de 1 Esdras da los nombres Maelas, Joribus y Joadanus. En el paralelo hebreo aproximado de Esdras 10:18, 20–21, los nombres correspondientes difieren, lo que refleja la relación más libre entre 1 Esdras y el Texto Masorético en estas listas.
    reason: textual_variant
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν
  english_pob_choice: From the sons of
  chosen_spanish: De entre los hijos de
  alternatives_spanish:
  - De los hijos de
  - Entre los hijos de
  lexicon: LSJ
  rationale: La preposición ἐκ introduce un grupo tomado de un conjunto mayor. En español, «de entre» conserva ese matiz de extracción/listado sin sonar forzado.
- source_word: Ἰησοῦ
  english_pob_choice: Jeshua
  chosen_spanish: Jeshua
  alternatives_spanish:
  - Jesús
  - Josué
  lexicon: LSJ
  rationale: En este contexto de Esdras/Esdras griego, el nombre designa al sumo sacerdote postexílico Jeshua, no a Jesús del NT ni al nombre bíblico Josué como equivalente general.
- source_word: τοῦ Ἰωσεδὲκ
  english_pob_choice: son of Jozadak
  chosen_spanish: hijo de Jozadak
  alternatives_spanish:
  - de Josedec
  - de Jehozadak
  lexicon: LSJ
  rationale: El genitivo funciona como patronímico. «Hijo de Jozadak» es la forma más reconocible en español bíblico y mantiene la relación genealógica.
- source_word: τῶν ἀδελφῶν αὐτοῦ
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus hermanos varones
  - y sus parientes
  lexicon: LSJ
  rationale: El griego dice literalmente «sus hermanos»; en español basta «sus hermanos» para reflejar el listado masculino sin introducir precisión no sustentada por el texto.
- source_word: Μαεήλας
  english_pob_choice: Maelas
  chosen_spanish: Maelas
  alternatives_spanish:
  - Maelias
  - Maeelas
  lexicon: LSJ
  rationale: Se conserva la transliteración del testimonio griego de Swete. Dado que el paralelo hebreo/MT es divergente, no conviene armonizar el nombre en el texto principal.
- source_word: Ἐλεάζαρος
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  alternatives_spanish:
  - Eleázaro
  lexicon: LSJ
  rationale: Nombre bíblico bien asentado en español; la forma sin acento gráfico adicional es la transliteración usual.
- source_word: Ἰώριβος
  english_pob_choice: Joribus
  chosen_spanish: Joribus
  alternatives_spanish:
  - Joribos
  - Jarib
  lexicon: LSJ
  rationale: Se preserva la forma griega transmitida. Aunque el paralelo hebreo sugiere otra forma, la traducción debe seguir el texto primario griego.
- source_word: Ἰωάδανος
  english_pob_choice: Joadanus
  chosen_spanish: Joadanus
  alternatives_spanish:
  - Joadanos
  - Joadán
  lexicon: LSJ
  rationale: Transliteración directa del nombre tal como aparece en el griego. No se importa una forma armonizada del paralelo hebreo.
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió cambios recientes; se mantuvo la decisión de traducir el texto griego principal y señalar en nota la divergencia con el paralelo hebreo/MT en los nombres propios.
  spanish_consistency_notes:
  - Se mantiene «Jeshua» para el sacerdote postexílico y «Jozadak» como patronímico estándar.
  - Se conserva la transliteración de los nombres propios griegos para no armonizar indebidamente con el paralelo hebreo.
  - La nota marca explícitamente la variante textual sin alterar la lectura principal del verso.
