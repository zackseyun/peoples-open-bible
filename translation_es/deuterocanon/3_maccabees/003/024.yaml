revisions:
- from: Por tanto[a], estando bien convencidos por pruebas de que estas personas nos son hostiles en todo, y tomando precauciones para que, si después surgiera de pronto alguna perturbación, no tengamos a estos impíos a nuestras espaldas como traidores y enemigos bárbaros,
  to: Por tanto, estando bien convencidos por pruebas de que estas personas nos son hostiles en todo, y previendo que no sea que, si después surgiera de pronto alguna perturbación, tengamos a estos impíos a nuestras espaldas como traidores y enemigos bárbaros[a],
  rationale: Se ajustó προνοούμενοι a «previendo» para evitar una sobreinterpretación práctica; se reemplazó la construcción final «para que ... no tengamos» por una de temor más fiel a μή ποτε; y se corrigió la nota al pie para reflejar la alternativa léxica documentada en el expediente inglés.
