translation:
  language: es
  text: José vino a ellos por la mañana y los vio[a], y he aquí, estaban afligidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «decaídos», «abatidos» o «sombríos». El hebreo describe un estado visible de perturbación o desánimo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - fue
  - llegó
  lexicon: HALOT
  rationale: El verbo בוא expresa aquí movimiento hacia los otros presos. En español, «vino a ellos» conserva bien ese movimiento de acercamiento sin sobreespecificar la escena como «entró».
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - hacia ellos
  - para ellos
  lexicon: HALOT
  rationale: La preposición direccional con sufijo plural se refleja de manera natural con «a ellos», manteniendo la relación de aproximación entre José y los presos.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - a la mañana
  lexicon: HALOT
  rationale: «Por la mañana» es una expresión idiomática y clara en español, fiel al valor temporal del hebreo.
- source_word: וַיַּרְא אֹתָם
  english_pob_choice: he saw them
  chosen_spanish: los vio
  alternatives_spanish:
  - los observó
  - los miró
  lexicon: HALOT
  rationale: ראה con objeto directo aquí denota percepción visual sencilla. «Los vio» es la forma más directa y natural en español.
- source_word: וְהִנָּם
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y miren
  - y resulta que
  lexicon: HALOT
  rationale: La partícula presentativa conserva su fuerza discursiva con «y he aquí», que introduce con énfasis lo que José advierte.
- source_word: זֹעֲפִים
  english_pob_choice: troubled
  chosen_spanish: preocupados
  alternatives_spanish:
  - decaídos
  - abatidos
  - afligidos
  - sombríos
  lexicon: HALOT
  rationale: El participio describe un estado visible de perturbación o desánimo. «Preocupados» comunica bien el sentido amplio en español sin restringirlo solo a tristeza o enojo; las alternativas conservan la gama semántica documentada.
translation_notes:
  revision_awareness: La redacción sigue el movimiento narrativo directo del hebreo y del POB inglés revisado, sin añadir una cláusula temporal equivalente a «cuando». Se conserva la partícula presentativa con «y he aquí» y se mantiene la amplitud semántica de זֹעֲפִים en una nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca, conforme al estándar del proyecto; este versículo no lo contiene.
  - Se evita «Cristo» o «Señor» porque no corresponden al texto.
  - La puntuación reproduce la secuencia narrativa con una sola coma antes de la cláusula presentativa, siguiendo el ritmo del original.
