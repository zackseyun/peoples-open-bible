translation:
  language: es
  text: Así pues, vayan[a], coman alimentos ricos y envíen porciones a los que no tienen nada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «habiendo ido». La frase funciona aquí como exhortación de partida.
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo hebreo en Nehemías 8:10 dice más específicamente: «envíen porciones a quien no esté preparado nada para él».'
    reason: alternative_reading
lexical_decisions:
- source_word: βαδίσαντες
  english_pob_choice: Go your way
  chosen_spanish: vayan
  alternatives_spanish:
  - váyanse
  - pónganse en camino
  - vayan de camino
  lexicon: LSJ
  rationale: El participio funciona aquí como exhortación de movimiento o partida. En español, el imperativo plural «vayan» transmite con naturalidad esa fuerza directiva sin añadir contenido no presente en el griego.
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: Así pues
  alternatives_spanish:
  - entonces
  - por tanto
  - pues
  lexicon: LSJ
  rationale: Marca continuidad inferencial. «Así pues» conserva ese enlace con un tono digno y fluido en español bíblico moderno.
- source_word: φάγετε
  english_pob_choice: eat
  chosen_spanish: coman
  alternatives_spanish:
  - coman de
  - partan y coman
  lexicon: LSJ
  rationale: Imperativo plural directo. «Coman» es la forma natural y fiel en español contemporáneo.
- source_word: λιπάσματα
  english_pob_choice: rich foods
  chosen_spanish: alimentos ricos
  alternatives_spanish:
  - alimentos abundantes
  - manjares
  - comidas ricas
  lexicon: LSJ
  rationale: La palabra griega refiere comidas grasas, ricas o de celebración. «Alimentos ricos» comunica ese valor sin forzar la expresión literal «cosas gordas», que sería opaca en español.
- source_word: ἀποστείλατε
  english_pob_choice: send
  chosen_spanish: envíen
  alternatives_spanish:
  - manden
  - remitan
  - manden porciones
  lexicon: LSJ
  rationale: Imperativo plural simple. «Envíen» conserva el acto de hacer llegar algo a otros sin sobrecargar el sentido.
- source_word: ἀποστολὰς
  english_pob_choice: portions
  chosen_spanish: porciones
  alternatives_spanish:
  - partes
  - raciones
  - porciones de comida
  lexicon: LSJ
  rationale: El contexto, apoyado por el paralelo hebreo, señala porciones distribuidas para comer. «Porciones» es la equivalencia más directa y transparente.
- source_word: τοῖς μὴ ἔχουσιν
  english_pob_choice: to those who have nothing
  chosen_spanish: a los que no tienen nada
  alternatives_spanish:
  - a los que no tienen
  - a los que carecen de todo
  - a los que no tienen nada preparado
  lexicon: LSJ
  rationale: El griego dice literalmente «a los que no tienen». La formulación española mantiene esa concisión y a la vez expresa claramente la necesidad material del grupo destinatario.
theological_decisions:
- issue: Sentido social de «porciones» en un contexto festivo
  english_pob_reading: The command concerns sharing celebratory food portions with needy people.
  chosen_spanish_reading: La orden pide compartir porciones de comida festiva con quienes carecen de ellas.
  alternative_spanish_readings:
  - La orden puede leerse de modo más general como enviar regalos a los necesitados.
  - La orden podría entenderse solo como enviar algo a quienes no tienen.
  rationale: El griego por sí solo habla de enviar porciones a quienes no tienen; el paralelo hebreo aclara que se trata de porciones de comida en una celebración. La traducción conserva la base griega y refleja esa ayuda interpretativa sin convertirla en paráfrasis excesiva.
  doctrine_reference: 'PHILOSOPHY.md: usar el paralelo hebreo como apoyo interpretativo para 1 Esdras, manteniendo el griego como texto primario'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se mantiene alineado con el juicio de alta concordancia y solo requiere matizar en español la fuerza exhortativa y el alcance social de «porciones».
  spanish_consistency_notes:
  - Se mantiene «porciones» para ἀποστολάς, en coherencia con la terminología de la POB y con el paralelo hebreo.
  - Se conserva «alimentos ricos» como equivalente natural de λιπάσματα, evitando un calco poco idiomático pero sin perder la referencia a comida de celebración.
  - No se introduce «SEÑOR» ni otros reemplazos devocionales, porque este versículo no contiene el Tetragrámaton en el griego base.
