translation:
  language: es
  text: El mal[a] hará morir al malvado, y los que aborrecen al justo serán tenidos por culpables.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la calamidad». El hebreo רָעָה puede significar «mal», «daño» o «desastre/calamidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּמוֹתֵת
  english_pob_choice: will put ... to death
  chosen_spanish: hará morir
  alternatives_spanish:
  - matará
  - dará muerte a
  lexicon: HALOT
  rationale: El hebreo está en forma causativa (hiphil) y personifica a רָעָה como agente. «Hará morir» conserva mejor la fuerza causativa que un simple «morirá» y suena natural en español bíblico moderno.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el inicuo
  lexicon: HALOT
  rationale: El sustantivo/adjetivo sustantivado singular se rinde de manera representativa. «El malvado» comunica bien el tipo moral sin introducir una formulación más eclesiástica que el hebreo no exige.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la calamidad
  - el desastre
  - el daño
  lexicon: HALOT
  rationale: Se preserva la ambigüedad léxica del hebreo entre mal moral y calamidad destructiva. «El mal» permite esa tensión, como en el texto inglés auditable, sin cerrar prematuramente el sentido.
- source_word: שֹׂנְאֵי
  english_pob_choice: those who hate
  chosen_spanish: los que aborrecen
  alternatives_spanish:
  - los que odian
  - los aborrecedores de
  lexicon: HALOT
  rationale: El participio plural constructo expresa una acción característica. «Los que aborrecen» es una construcción natural en español y mantiene el valor relacional y continuo del participio.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: al justo
  alternatives_spanish:
  - al recto
  - al hombre justo
  lexicon: HALOT
  rationale: Aquí el singular sustantivado funciona de modo representativo. «Al justo» conserva el artículo y el matiz personal sin forzar una colectivización innecesaria.
- source_word: יֶאְשָׁמוּ
  english_pob_choice: will be held guilty
  chosen_spanish: serán tenidos por culpables
  alternatives_spanish:
  - serán declarados culpables
  - cargarán con culpa
  - serán hallados culpables
  lexicon: HALOT
  rationale: אשם puede implicar incurrir en culpa o responsabilidad judicial. «Serán tenidos por culpables» mantiene el matiz forense y evita resolver el verbo únicamente como condena o como sentimiento de culpa.
theological_decisions:
- issue: How to render רָעָה without erasing the tension between moral evil and calamity
  english_pob_reading: evil
  chosen_spanish_reading: el mal
  alternative_spanish_readings:
  - la calamidad
  - el desastre
  rationale: El verso personifica a רָעָה como agente de muerte. «El mal» conserva la formulación breve y la ambigüedad teológica del hebreo, permitiendo que el lector perciba tanto maldad moral como ruina/calamidad sin imponer una sola interpretación.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el trazado de la POB inglesa y mantiene la misma tensión interpretativa principal en רָעָה, sin introducir una solución dogmática nueva. No se detectan revisiones adicionales en el paquete fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto cuando el tetragrámaton aparece; aquí no hay ocurrencia explícita.
  - Se evita «Señor» como sustituto no requerido por el texto.
  - «El justo» y «el malvado» preservan el paralelismo moral del hebreo sin sobretraducir hacia lenguaje litúrgico fijo.
  - La puntuación y el orden reflejan el paralelismo poético del verso en español natural.
