translation:
  language: es
  text: 'con 1.200 carros y 60.000 jinetes, y el pueblo que vino con él de Egipto era innumerable[a]: libios, sukitas[b] y cusitas[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin número»; literalmente, «no había número para el pueblo».
    reason: lexical_alternative
  - marker: b
    text: «Sukitas» traduce un nombre de pueblo de identificación precisa incierta; algunas traducciones lo transliteran como «Sukkiim».
    reason: cultural_note
  - marker: c
    text: O «etíopes» para «cusitas», aunque «cusitas» refleja más directamente el término etnogeográfico hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/אֶלֶף וּ/מָאתַיִם
  english_pob_choice: with 1,200
  chosen_spanish: con 1.200
  alternatives_spanish:
  - a 1.200
  - en 1.200
  lexicon: HALOT
  rationale: El prefijo ב en esta enumeración militar expresa acompañamiento/posesión de fuerzas; en español, «con» reproduce bien ese valor y suena natural en el recuento bélico.
- source_word: רֶכֶב
  english_pob_choice: chariots
  chosen_spanish: carros
  alternatives_spanish:
  - carros de guerra
  - carros de combate
  lexicon: HALOT
  rationale: En contexto militar, רֶכֶב designa el arma o unidad de carros; «carros» es una equivalencia directa, clara y suficientemente precisa en español.
- source_word: וּ/בְ/שִׁשִּׁים אֶלֶף
  english_pob_choice: and 60,000
  chosen_spanish: y 60.000
  alternatives_spanish:
  - y sesenta mil
  lexicon: HALOT
  rationale: La frase numeral es directa; se conserva el número en formato usual del español.
- source_word: פָּרָשִׁים
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - caballeros
  - caballería
  lexicon: HALOT
  rationale: El término refiere a guerreros montados. «Jinetes» es una equivalencia natural y concreta; «caballería» sería más colectivo y menos personal.
- source_word: וְ/אֵין מִסְפָּר
  english_pob_choice: were without number
  chosen_spanish: estaba sin número
  alternatives_spanish:
  - era innumerable
  - no tenía número
  lexicon: HALOT
  rationale: La expresión hebrea indica que no podían contarse. «Estaba sin número» preserva el giro idiomático sin perder legibilidad; la referencia semántica a la multitud se mantiene por el contexto.
- source_word: לָ/עָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - las tropas
  lexicon: HALOT
  rationale: עָם conserva su sentido básico de «pueblo». En español, «el pueblo» refleja mejor el hebreo que una especificación militar más interpretativa.
- source_word: אֲשֶׁר בָּאוּ עִמּ/וֹ מִ/מִּצְרַ֔יִם
  english_pob_choice: who came with him from Egypt
  chosen_spanish: que vino con él de Egipto
  alternatives_spanish:
  - que habían venido con él de Egipto
  - que llegó con él desde Egipto
  lexicon: HALOT
  rationale: La cláusula relativa identifica el origen del grupo acompañante; «vino con él de Egipto» traduce con fidelidad y fluidez la construcción hebrea.
- source_word: לוּבִ֥ים
  english_pob_choice: Libyans
  chosen_spanish: libios
  alternatives_spanish:
  - libios
  - lubim
  lexicon: HALOT
  rationale: El etnónimo se identifica convencionalmente con los libios. «Libios» es el equivalente español más claro y reconocido.
- source_word: סֻכִּיִּ֖ים
  english_pob_choice: Sukkites
  chosen_spanish: sukitas
  alternatives_spanish:
  - sucquitas
  - sukkiim
  lexicon: HALOT
  rationale: Se conserva la transliteración del etnónimo incierto sin forzar una identificación más precisa de la que permite el hebreo.
- source_word: וְ/כוּשִֽׁים
  english_pob_choice: and Cushites
  chosen_spanish: y cusitas
  alternatives_spanish:
  - y etíopes
  - y cushitas
  lexicon: HALOT
  rationale: «Cusitas» preserva el término histórico-geográfico כוש sin importar una equivalencia más específica o potencialmente anacrónica como «etíopes».
translation_notes:
  revision_awareness: Se siguió el tramo revisado del inglés POB sin cambios sustantivos; la versión española conserva la misma estructura, el mismo inventario militar y las mismas opciones onomásticas/etnónimos, con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - 'Se prefirieron etnónimos transparentes y no interpretativos: «libios», «sukitas», «cusitas».'
  - Se conservó el valor idiomático de la negación de conteo en «sin número», con nota de alternativa semántica.
  - La puntuación con dos puntos reproduce la segmentación del original y facilita la lectura del inventario final.
