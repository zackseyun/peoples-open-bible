translation:
  language: es
  text: 'Ahora la serpiente era más astuta[a] que cualquier bestia del campo que Yahvé Dios había hecho. Y dijo a la mujer: “¿Conque Dios ha dicho[b]: ‘No comerán de ningún árbol del jardín[c]’?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “sagaz”, “prudente” o “sutil”. El hebreo puede tener matiz positivo en otros contextos, pero aquí el giro narrativo sugiere astucia engañosa.'
    reason: lexical_alternative
  - marker: b
    text: La serpiente dice solo “Dios”; el narrador había presentado a “Yahvé Dios”. Mantener esa diferencia es importante en el hebreo.
    reason: theological_note
  - marker: c
    text: 'O: “de cada árbol del jardín”. En una pregunta negativa, “de ningún árbol” expresa mejor la exageración insinuada por la serpiente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנָּחָשׁ
  english_pob_choice: Now the serpent
  chosen_spanish: Ahora la serpiente
  alternatives_spanish:
  - Y la serpiente
  - Entonces la serpiente
  lexicon: HALOT
  rationale: El hebreo inicia con una conjunción discursiva que marca el flujo narrativo. En español, “Ahora” comunica mejor la transición de escena sin perder el arranque continuo del relato.
- source_word: עָרוּם
  english_pob_choice: more crafty
  chosen_spanish: más astuta
  alternatives_spanish:
  - más crafty
  - más sagaz
  - más prudente
  lexicon: HALOT
  rationale: El término puede ser positivo o negativo, pero aquí el contexto de la pregunta engañosa le da un matiz adverso. “Astuta” conserva ese valor y funciona de modo natural en español; el comparativo refleja מִכֹּל.
- source_word: מִכֹּל חַיַּת הַשָּׂדֶה
  english_pob_choice: than any beast of the field
  chosen_spanish: que cualquier bestia del campo
  alternatives_spanish:
  - que cualquier animal del campo
  - que toda bestia del campo
  lexicon: HALOT
  rationale: La construcción es comparativa. “Bestia del campo” mantiene el registro bíblico y “cualquier” expresa bien el alcance comparativo de מִכֹּל en este contexto.
- source_word: אֲשֶׁר עָשָׂה יְהוָה אֱלֹהִים
  english_pob_choice: that Yahweh God had made
  chosen_spanish: que Yahvé Dios había hecho
  alternatives_spanish:
  - que Yahvé Dios hizo
  - que el Señor Dios había hecho
  lexicon: HALOT
  rationale: Se preserva el nombre divino יְהוָה como “Yahvé”, conforme al criterio del proyecto, y אֱלֹהִים como “Dios”. El pluscuamperfecto en español refleja bien el trasfondo narrativo de la oración relativa.
- source_word: וַיֹּאמֶר אֶל־הָאִשָּׁה
  english_pob_choice: And he said to the woman
  chosen_spanish: Y dijo a la mujer
  alternatives_spanish:
  - Y le dijo a la mujer
  - Entonces dijo a la mujer
  lexicon: HALOT
  rationale: El sujeto sigue siendo la serpiente; el español permite omitir el pronombre sin perder claridad. “La mujer” conserva la designación hebrea sin introducir “Eva” prematuramente.
- source_word: אַף כִּי
  english_pob_choice: Indeed, has God said
  chosen_spanish: Con que, ¿Dios ha dicho
  alternatives_spanish:
  - ¿De veras ha dicho Dios
  - ¿Acaso Dios ha dicho
  lexicon: HALOT
  rationale: La expresión introduce una pregunta insinuante y escéptica. “Con que” reproduce bien el tono de provocación/sorpresa y ayuda a evitar una traducción demasiado interpretativa.
- source_word: אָמַר אֱלֹהִים
  english_pob_choice: God said
  chosen_spanish: Dios ha dicho
  alternatives_spanish:
  - Dios dijo
  - ha dicho Dios
  lexicon: HALOT
  rationale: 'Se conserva el cambio de forma respecto del narrador: aquí la serpiente dice solo “Dios”, no “Yahvé Dios”. El pretérito perfecto compuesto da fluidez al discurso directo en español.'
- source_word: לֹא תֹאכְל֔וּ מִכֹּל עֵץ הַגָּן
  english_pob_choice: You shall not eat from any tree of the garden
  chosen_spanish: No comerán de ningún árbol del jardín
  alternatives_spanish:
  - No comeréis de ningún árbol del jardín
  - No comerán de cualquier árbol del jardín
  lexicon: HALOT
  rationale: En la pregunta negativa insinuada, “de ningún árbol” comunica la exageración del mandato de manera natural en español. Se mantiene “jardín” para הַגָּן y el plural de segunda persona refleja el valor verbal del hebreo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton. En este proyecto, la convención española establecida es “Yahvé”, no un sustituto reverencial genérico. La frase conserva además la combinación con אֱלֹהִים como “Dios”.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Shift from narrator’s divine-name form to the serpent’s shortened reference
  english_pob_reading: the narrator says 'the LORD God,' but the serpent says only 'God'
  chosen_spanish_reading: el narrador dice “Yahvé Dios”, pero la serpiente dice solo “Dios”
  alternative_spanish_readings:
  - el narrador dice “el Señor Dios”, pero la serpiente dice solo “Dios”
  - el narrador usa el nombre divino completo, pero la serpiente dice solo “Dios”
  rationale: 'Conviene preservar explícitamente el contraste discursivo: el narrador usa el nombre completo, mientras la serpiente reduce la referencia a solo “Dios”. Esa diferencia tiene peso literario y no debe harmonizarse.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Force of אַף כִּי in the serpent’s speech
  english_pob_reading: Indeed, has God said
  chosen_spanish_reading: Con que, ¿Dios ha dicho...?
  alternative_spanish_readings:
  - ¿De veras ha dicho Dios... ?
  - ¿Acaso Dios ha dicho... ?
  rationale: La locución hebrea introduce una pregunta insinuante, no una simple consulta informativa. “Con que” preserva el tono de desafío y sorpresa sin convertirlo en una paráfrasis excesiva.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: 'El audit trail inglés ajustó la pregunta de la serpiente desde una paráfrasis más interpretativa a una formulación más transparente de אַף כִּי. La presente versión española procura seguir ese mismo criterio: conserva el tono insinuante sin ampliar el sentido, mantiene la distinción entre “Yahvé Dios” y “Dios”, y traduce el comparativo con naturalidad. No se introdujeron armonizaciones doctrinales ni cambios de registro que atenúen la tensión léxica del hebreo.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” para יְהוָה y “Dios” para אֱלֹהִים, siguiendo la convención del proyecto.
  - Se usa “astuta” para עָרוּם porque el contexto es negativo; no se suaviza a “prudente”.
  - “Bestia del campo” conserva el registro bíblico y el paralelismo del comparativo.
  - El discurso directo conserva la diferencia entre la voz narrativa y la de la serpiente.
  - Las notas usan marcadores únicos y cada una está anclada en el texto donde corresponde.
