review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura narrativa hebrea y la súplica final, pero falla en dos puntos importantes: (1) «no había dado hijos a Jacob» suena poco natural en español para יָלְדָה y además no refleja tan bien el sentido de dar a luz/tener descendencia; (2) «Raquel envidió a su hermana» se aparta de la decisión auditada «became jealous» y del matiz de קנא en este contexto. También la repetición de «Raquel» puede simplificarse en español sin pérdida relevante.'
  spanish_quality_summary: 'El texto es comprensible, pero «dar hijos a Jacob» resulta forzado en español bíblico natural, y «envidió» inclina el sentido hacia envidia simple más que celos por la fertilidad de su hermana. Una leve revisión mejora fidelidad y legibilidad: «no le había dado hijos a Jacob» y «tuvo celos de su hermana».'
  glossary_alignment: No hay términos teológicos de proyecto en juego. La revisión propuesta respeta mejor la decisión léxica auditada para קנא («celos») y mantiene «hijos» para בנים, que en español sigue siendo natural aquí aunque el inglés explicitó ‘children’ por contexto.
  issues:
  - severity: medium
    issue: «no había dado hijos a Jacob» es poco idiomático
    rationale: Para יָלַד de una mujer, en español bíblico natural conviene expresar ‘dar hijos’ con pronombre dativo o una formulación de alumbramiento/descendencia. Sin «le», la frase suena áspera y menos natural.
  - severity: medium
    issue: «Raquel envidió a su hermana» debilita el matiz de קנא
    rationale: El expediente inglés prefirió ‘became jealous’. En este contexto de infertilidad frente a la fecundidad de Lea, «tuvo celos de su hermana» preserva mejor la relación emocional y el valor del verbo.
  - severity: low
    issue: Repetición de «Raquel» innecesaria en español
    rationale: Aunque el hebreo repite el nombre, en español contemporáneo la segunda mención puede sustituirse por pronombre para mayor fluidez, como ya observó la auditoría inglesa.
  revised_spanish_text: 'Cuando Raquel vio que no le había dado hijos a Jacob, tuvo celos de su hermana y dijo a Jacob: «Dame hijos, o moriré».'
  revision_rationale: Se ajusta el español para reflejar mejor el sentido de יָלַד en contexto femenino («no le había dado hijos a Jacob»), se corrige קנא a «tuvo celos de su hermana» en línea con la decisión auditada y con el matiz contextual, y se elimina la segunda repetición de «Raquel» por fluidez natural en español sin pérdida sustancial de sentido.
