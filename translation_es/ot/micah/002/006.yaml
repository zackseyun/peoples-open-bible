translation:
  language: es
  text: «No prediquen», predican[a]. «No deben predicar sobre estas cosas[c][b]; la vergüenza no nos alcanzará.»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No profeticen», profetizan. El verbo hebreo literalmente significa «gotear», usado metafóricamente para el habla profética.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a estas personas» en vez de «sobre estas cosas».'
    reason: alternative_reading
  - marker: c
    text: El cierre hebreo es difícil; más literalmente, «las deshonras no retrocederán» o «los reproches no se apartarán».
    reason: textual_variant
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagan
  - No profeticen
  - Nunca
  lexicon: HALOT
  rationale: אַל con imperfecto/jussivo expresa prohibición; en español, «No» mantiene la fuerza directa y natural del mandato negativo.
- source_word: תַּטִּפוּ
  english_pob_choice: preach
  chosen_spanish: profeticen
  alternatives_spanish:
  - prediquen
  - hablen como profetas
  - viertan oráculos
  lexicon: HALOT
  rationale: El verbo literalmente significa «gotear», pero en contexto profético designa habla oracular. «Profeticen» conserva mejor la imagen técnica y la tensión léxica documentada que un verbo más eclesiástico como «predicar».
- source_word: יַטִּיפוּן
  english_pob_choice: they preach
  chosen_spanish: profetizan
  alternatives_spanish:
  - profetizan ellos
  - predican
  - hablan como profetas
  lexicon: HALOT
  rationale: 'La repetición irónica se conserva mejor con el mismo verbo en presente: «profetizan». Así se refleja el eco retórico entre la prohibición y la acción misma.'
- source_word: לֹא יַטִּפוּ
  english_pob_choice: They should not preach
  chosen_spanish: No deben profetizar
  alternatives_spanish:
  - No deberían profetizar
  - No profeticen
  - No se debe profetizar
  lexicon: HALOT
  rationale: La cláusula es sintácticamente terse y puede sonar impersonal; en español, «No deben profetizar» conserva la fuerza normativa del hebreo y el plural verbal sin introducir un sujeto genérico innecesario.
- source_word: לָאֵלֶּה
  english_pob_choice: about these things
  chosen_spanish: de estas cosas
  alternatives_spanish:
  - a estas personas
  - de estos asuntos
  - para estas personas
  lexicon: HALOT
  rationale: La preposición ל con el demostrativo admite referencia temática o direccional. «De estas cosas» sigue la lectura contextual del contenido del mensaje, mientras deja abierta la posibilidad de la alternativa personal.
- source_word: לֹא יִסַּג כְּלִמּוֹת
  english_pob_choice: disgrace will not overtake us
  chosen_spanish: la vergüenza no nos alcanzará
  alternatives_spanish:
  - el oprobio no se apartará
  - las vergüenzas no retrocederán
  - no se retirará el reproche
  lexicon: HALOT
  rationale: יִסַּג es difícil; el audit trail permite «will not overtake» y alternativas más literales como «turn back» o «depart». «No nos alcanzará» expresa en español idiomático la llegada del oprobio, sin borrar la ambigüedad de fondo.
- source_word: כְּלִמּוֹת
  english_pob_choice: disgrace
  chosen_spanish: la vergüenza
  alternatives_spanish:
  - el oprobio
  - las humillaciones
  - los reproches
  lexicon: HALOT
  rationale: El plural hebreo puede abarcar vergüenza, oprobio y humillación. En español, «vergüenza» funciona como colectivo natural y mantiene el peso de deshonra pública que el contexto exige.
theological_decisions:
- issue: Identidad de los hablantes y el tono irónico de la repetición
  english_pob_reading: The verse is rendered as the opponents' rejection of prophetic proclamation, with the final clause expressing their denial that shame/judgment will come upon them.
  chosen_spanish_reading: El texto se vierte como el rechazo de la proclamación profética por parte de los opositores, manteniendo la ironía de que quienes dicen «No profeticen» son los mismos que profetizan.
  alternative_spanish_readings:
  - «No profeticen», dicen. «No deben profetizar de estas cosas»
  - «No profeticen», profetizan. «No deben profetizar a estas personas»
  rationale: Micah 2:6 es comprimido y difícil. La opción escogida conserva la repetición irónica y la línea discursiva que el contexto inmediato favorece, sin resolver en exceso las ambigüedades sintácticas.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Final clause as shame/judgment imagery
  english_pob_reading: disgrace will not overtake us
  chosen_spanish_reading: la vergüenza no nos alcanzará
  alternative_spanish_readings:
  - el reproche no se apartará de nosotros
  - la deshonra no nos invadirá
  - los oprobios no retrocederán
  rationale: La frase hebrea final es difícil; la versión escogida comunica una vergüenza que llega sobre el pueblo, como juicio o deshonra pública, mientras deja constancia de la alternativa más literal en la nota.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador anterior falló por no anclar las notas al texto español. Esta versión coloca [a], [b] y [c] exactamente junto a las frases correspondientes y conserva la ambigüedad del hebreo en el cierre.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece aquí el tetragrámaton.
  - Se usó «profeticen» para preservar el valor oracular del verbo נָטַף sin caer en una equivalencia eclesiástica demasiado interpretativa.
  - La clausula final mantiene el sentido de deshonra/vergüenza y no lo reduce a una sola opción doctrinal.
  - Las marcas de nota aparecen solo donde hay una decisión léxica o una variante textual real, y cada marcador está anclado en el texto.
