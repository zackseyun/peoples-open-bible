base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/022/009.yaml
  text: Behold[a], a son will be born to you. He will be a man of rest, and I will give him rest from all his enemies all around; for Solomon will be his name[b], and I will give peace and quiet to Israel in his days.
