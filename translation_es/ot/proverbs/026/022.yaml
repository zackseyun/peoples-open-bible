translation:
  language: es
  text: Las palabras del chismoso son como bocados deliciosos[a], y descienden hasta los aposentos interiores del vientre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como bocados delicados» / «como cosas tragadas con ansia». El término hebreo es raro y debatido; una tradición más antigua lo entendió como «como heridas».
    reason: lexical_alternative
  - marker: b
    text: La imagen de «los aposentos interiores del vientre» refleja una metáfora hebrea para las partes más profundas e íntimas de la persona.
    reason: cultural_note
lexical_decisions:
- source_word: דִּבְרֵי
  english_pob_choice: The words of
  chosen_spanish: Las palabras de
  alternatives_spanish:
  - Los dichos de
  - Las expresiones de
  lexicon: HALOT
  rationale: El constructo plural de דָּבָר se traduce de manera natural por "palabras de" en español, manteniendo el sentido genérico y proverbial del enunciado.
- source_word: נִרְגָּן
  english_pob_choice: a whisperer
  chosen_spanish: el chismoso
  alternatives_spanish:
  - el murmurador
  - el calumniador
  - el que cuchichea
  lexicon: HALOT
  rationale: El inglés POB eligió "whisperer" para conservar la idea de habla secreta y divisiva. En español, "chismoso" comunica mejor esa función proverbial en un registro natural, aunque pierde la imagen literal del susurro; por eso se mantiene la nota léxica implícita en la elección.
- source_word: כְּמִתְלַהֲמִים
  english_pob_choice: like delicious morsels
  chosen_spanish: como bocados deliciosos
  alternatives_spanish:
  - como bocados delicados
  - como cosas tragadas con ansia
  - como heridas
  lexicon: HALOT
  rationale: La forma es rara y debatida. Se adopta una equivalencia que preserve el valor apetecible o sabroso que sostuvo la POB en inglés, con "bocados deliciosos" como solución idiomática y fiel a la imagen de algo que se recibe con gusto.
- source_word: וְהֵם
  english_pob_choice: and they
  chosen_spanish: y
  alternatives_spanish:
  - y ellos
  - y estas palabras
  lexicon: HALOT
  rationale: El pronombre explícito puede sonar redundante en español; se integra en la fluidez de la frase como simple enlace, sin perder el sujeto implícito de la acción.
- source_word: יָרְדוּ
  english_pob_choice: go down
  chosen_spanish: descienden
  alternatives_spanish:
  - bajan
  - se hunden
  lexicon: HALOT
  rationale: Aunque el hebreo usa un pasado perfecto, la lectura proverbial demanda presente gnómico en español. "Descienden" conserva la imagen de movimiento hacia adentro con un tono elevado y claro.
- source_word: חַדְרֵי בָטֶן
  english_pob_choice: the inner chambers of the belly
  chosen_spanish: los aposentos interiores del vientre
  alternatives_spanish:
  - las cámaras interiores del vientre
  - las profundidades del ser
  - las entrañas
  lexicon: HALOT
  rationale: Se conserva la metáfora concreta de "cámaras/aposentos" y "vientre" para no diluir la imagen hebrea. "Aposentos interiores" transmite el carácter de interioridad profunda sin volverlo demasiado técnico; el matiz antropológico queda abierto como imagen del interior más íntimo.
translation_notes:
  revision_awareness: El texto inglés POB y su auditoría no muestran revisiones aplicadas; el pasaje fue retenido como de alta concordancia, así que la redacción española sigue de cerca la lectura óptima-equivalente sin introducir ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se conserva un registro proverbial, sobrio y publicable.
  - Se mantiene la metáfora corporal sin sustituirla por una paráfrasis desmaterializada.
  - '"Chismoso" se usa por claridad natural en español, con nota para no perder el trasfondo del término raro hebreo.'
  - '"Vientre" se conserva para reflejar el hebreo, aunque en español el sentido idiomático se explica en nota.'
