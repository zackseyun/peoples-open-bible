base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/018/004.yaml
  text: And the vessel that he was making from the clay was spoiled in the potter’s hand[a], and he turned and made it into another vessel[b], as seemed right in the potter’s eyes to make.
  footnotes:
  - marker: a
    text: Or “was marred” or “was ruined.” The Hebrew verb indicates that the vessel became defective while being worked.
    reason: lexical_alternative
  - marker: b
    text: Literally “as was right in the eyes of the potter to make,” an idiom meaning “as the potter saw fit to make.”
    reason: lexical_alternative
