review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: conserva la metáfora corporal de ἔγκατα con «entrañas», la caracterización sapiencial de μωροῦ con «necio», y la idea de incapacidad de retener conocimiento mediante la comparación con un recipiente roto. Sin embargo, «vaso» en español puede sonar demasiado estrecho o moderno para ἄγγιον, y «ningún conocimiento» mejora si se integra con una formulación más idiomática del conjunto.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero «un vaso quebrado» suena menos natural y menos preciso en registro bíblico/sapiencial que «una vasija quebrada». Además, la nota ya reconoce «vasija» como alternativa válida; usarla en el texto principal mejora legibilidad e imagen. El resto fluye bien.
  glossary_alignment: 'No hay términos del glosario mayor en juego. Las decisiones léxicas principales son adecuadas: «entrañas» para ἔγκατα, «necio» para μωροῦ, y «retendrán» para οὐ κρατήσει en concordancia con el sujeto plural. Se recomienda ajustar ἄγγιον de «vaso» a «vasija» por mayor fidelidad y naturalidad en español.'
  issues:
