base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/015/010.yaml
  text: Woe to me[a], my mother, because you bore me, a man of strife and a man of contention to all the land. I have not lent, nor have they lent to me[b], yet every one of them curses me.
  footnotes:
  - marker: a
    text: Or "to the whole earth."
    reason: alternative_reading
  - marker: b
    text: The Hebrew likely refers to lending and borrowing in the context of debt; Jeremiah says he has given no ordinary social cause for such hostility.
    reason: cultural_note
