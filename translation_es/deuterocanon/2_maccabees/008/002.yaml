translation:
  language: es
  text: Y ellos invocaban al Señor para que mirara al pueblo pisoteado por todos, y también para que tuviera misericordia del templo, que había sido profanado[a] por hombres impíos;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «había sido contaminado» o «había sido desacralizado». El griego resalta que el templo santo fue tratado como algo común por agentes humanos impíos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεκαλοῦντο
  english_pob_choice: were calling on
  chosen_spanish: invocaban
  alternatives_spanish:
  - clamaban a
  - apelaban a
  - llamaban a
  lexicon: BDAG
  rationale: El imperfecto medio expresa una acción continua o repetida en oración. «Invocaban» conserva el tono religioso y la idea de dirigirse a Dios con ruego, sin sonar forzado en español.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Amo
  lexicon: BDAG
  rationale: Se mantiene el título reverente para Dios en un contexto de oración. Aunque el proyecto prefiere «Yahvé» para el nombre divino cuando corresponde, aquí el griego usa κύριον y el español natural y fiel es «el Señor».
- source_word: ἐφιδεῖν
  english_pob_choice: to look upon
  chosen_spanish: mirara
  alternatives_spanish:
  - mirara con atención
  - tomara en cuenta
  - volviera sus ojos hacia
  lexicon: LSJ
  rationale: La petición no es solo ver, sino atender compasivamente. «Mirara» funciona bien en español dentro de una oración, y el contexto ya aporta la idea de atención misericordiosa.
- source_word: λαόν
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - nación
  lexicon: BDAG
  rationale: Aquí se trata del pueblo del pacto en conjunto. «Pueblo» es más preciso y más natural que «gente».
- source_word: καταπατούμενον
  english_pob_choice: trampled down
  chosen_spanish: pisoteado
  alternatives_spanish:
  - hollado
  - aplastado
  - pisoteado y humillado
  lexicon: LSJ
  rationale: La imagen es corporal y violenta. «Pisoteado» conserva la metáfora de ser tratado con desprecio y violencia, sin volverla abstracta.
- source_word: ὑπὸ πάντων
  english_pob_choice: by all
  chosen_spanish: por todos
  alternatives_spanish:
  - por toda la gente
  - por todos ellos
  lexicon: BDAG
  rationale: Se traduce de manera directa la amplitud de la acción. No se añade un objeto explícito que el griego no da.
- source_word: οἰκτεῖραι
  english_pob_choice: to have mercy on
  chosen_spanish: tuviera misericordia de
  alternatives_spanish:
  - tuviera compasión de
  - se apiadara de
  lexicon: BDAG
  rationale: En una súplica dirigida a Dios, «tener misericordia de» es una equivalencia natural y reverente que conserva bien el sentido.
- source_word: ναὸν
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  lexicon: BDAG
  rationale: El referente es el templo de Jerusalén. «Templo» es la forma más clara y estándar en español.
- source_word: βεβηλωθέντα
  english_pob_choice: had been defiled
  chosen_spanish: había sido profanado
  alternatives_spanish:
  - había sido contaminado
  - había sido desecrado
  - había sido hecho común
  lexicon: BDAG
  rationale: El verbo señala que algo santo fue tratado como común o impuro. «Profanado» comunica mejor esa pérdida de carácter sagrado y mantiene la tensión léxica del griego; en español también puede oírse como alternativa «desecrado», pero «profanado» es más bíblico y preciso.
- source_word: ἀσεβῶν ἀνθρώπων
  english_pob_choice: ungodly men
  chosen_spanish: hombres impíos
  alternatives_spanish:
  - hombres irreverentes
  - hombres sin piedad
  - personas impías
  lexicon: BDAG
  rationale: ἀσεβής apunta a irreverencia e impiedad frente a Dios. «Hombres impíos» conserva la carga religiosa y la referencia masculina del plural griego.
theological_decisions:
- issue: Tratamiento del nombre/título divino κύριος en una oración judía
  english_pob_reading: Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Dueño
  rationale: Aunque el proyecto usa «Yahvé» para יהוה cuando el texto lo exige, aquí el testimonio griego presenta κύριος en una súplica dirigida a Dios. «El Señor» mantiene el registro reverente y sigue la lectura auditada del POB inglés sin forzar una identificación explícita con el tetragrama en el texto español.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: 'Intensidad del daño al templo: profanación frente a otras formulaciones'
  english_pob_reading: had been defiled
  chosen_spanish_reading: había sido profanado
  alternative_spanish_readings:
  - había sido contaminado
  - había sido desecrado
  - había sido hecho común
  rationale: El griego subraya que lo santo fue tratado como común por agentes humanos impíos. «Profanado» preserva esa tensión teológica y evita suavizar el daño con un término demasiado general.
  doctrine_reference: DOCTRINE.md §6 Holy/common distinction
- issue: Valor de ἀνθρώπων con referencia a agentes masculinos
  english_pob_reading: ungodly men
  chosen_spanish_reading: hombres impíos
  alternative_spanish_readings:
  - personas impías
  - seres humanos impíos
  rationale: Se mantiene la referencia masculina explícita del griego y del POB inglés, sin neutralizarla, porque la frase describe a los agentes concretos que profanaron el templo.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: La versión concuerda con la lectura auditada del POB inglés y con el griego de Swete 1909. No se identificaron revisiones posteriores que exigieran ajustar el sentido; se conservan la progresión de la súplica, la imagen física de «pisoteado» y la tensión sagrado/común de βεβηλωθέντα.
  spanish_consistency_notes:
  - Se mantiene «el Señor» para κύριος en el contexto de oración.
  - «Pueblo» se usa para λαόν como colectivo del pacto.
  - «Hombres impíos» conserva la referencia masculina del original.
  - La nota al pie se ancla en «profanado» para preservar la alternativa léxica documentada.
  - El registro es bíblico moderno, claro y sobrio, sin calco excesivo.
