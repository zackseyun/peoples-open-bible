lexical_decisions:
- source_word: παρθένος
  english_pob_choice: virgin
  chosen_korean: 처녀
  alternatives_korean:
  - 젊은 여인
  - 미혼 여성
  lexicon: BDAG
  rationale: 헬라어 παρθένος의 일반적 의미는 「처녀」이며, 70인역이 이사야 7:14의 히브리어 עַלְמָה를 παρθένος로 옮긴 본문을 마태가 그대로 인용한다. 마태의 출생 서사 문맥은 처녀 잉태를 분명히 가리키므로 「처녀」가 본문에 가장 충실하다.
- source_word: Ἐμμανουήλ
  english_pob_choice: Immanuel
  chosen_korean: 임마누엘
  alternatives_korean:
  - 엠마누엘
  lexicon: BDAG
  rationale: 히브리어 עִמָּנוּ אֵל의 굳어진 한국어 음역.
- source_word: Μεθ' ἡμῶν ὁ θεός
  english_pob_choice: God with us
  chosen_korean: 하나님께서 우리와 함께 계시다
  alternatives_korean:
  - 우리와 함께 계시는 하나님
  - 하나님이 우리와 함께
  lexicon: BDAG
  rationale: 임마누엘 이름의 본의를 한국어로 풀되, 합쇼체 서사 안에서 자연스러운 평서형 「…계시다」로 옮긴다. 단순 「하나님 우리와 함께」보다 신적 임재의 진술임이 분명해진다.
theological_decisions:
- issue: παρθένος를 「처녀」로 옮길지 「젊은 여인」으로 옮길지
  chosen_reading: 처녀
  alternative_readings:
  - 젊은 여인
  rationale: 이사야 7:14의 히브리어 עַלְמָה는 「젊은 여인」이 일차 의미이나, 마태는 70인역의 παρθένος 번역본을 그대로 인용하며 출생 서사 전체를 처녀 잉태로 구성한다. 마태의 인용 의도와 본문 문맥에 충실하게 「처녀」로 옮긴다.
  doctrine_reference: Apostles' Creed; Nicene Creed; DOCTRINE.md §1 original-language primacy applied to Matthew's chosen LXX text
- issue: 임마누엘 이름의 신학적 무게 — 신적 임재
  chosen_reading: 하나님께서 우리와 함께 계시다
  alternative_readings:
  - 하나님 우리와 함께
  - 하나님이 우리와 함께 계심
  rationale: 본문이 직접 풀어 주는 이름 설명을 한국어에서도 신적 임재의 진술로 분명히 살리되, 성육신에 대한 추가 해설은 본문이 말한 만큼만 담는다.
  doctrine_reference: 'DOCTRINE.md: preserve theological weight without overreach'
