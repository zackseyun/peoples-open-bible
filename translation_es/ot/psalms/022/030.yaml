review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo y la línea del POB en cuanto al contraste entre los prósperos y los que descienden al polvo. Sin embargo, en dos puntos se aleja innecesariamente del audit trail: «prosperados» no expresa bien el sentido idiomático de דשני ארץ en español natural, y «se inclinarán» debilita la decisión inglesa documentada de distinguir כרע como ‘arrodillarse/ponerse de rodillas’ frente a ‘postrarse’. La cláusula final difícil está encaminada correctamente, pero la formulación actual suena poco natural y menos fiel al sentido adoptado por el POB (“él que no pudo conservarse con vida / conservar su vida”).'
  spanish_quality_summary: La legibilidad es mixta. El verso suena digno, pero «los prosperados» es poco idiomático en español bíblico natural, y «cuya vida no logró mantenerse» resulta forzado y abstracto. «Se postrarán» está bien para השתחוה, pero conviene reservar una expresión más específica para יכרעו. También hace falta ajustar la puntuación del inciso final para mayor fluidez.
  glossary_alignment: 'No hay conflictos con la terminología teológica global del proyecto. Los puntos a corregir son léxicos y estilísticos: preferir «los prósperos» sobre «los prosperados»; mantener la distinción entre «se postrarán» y «se arrodillarán»; y en la cláusula final usar una formulación española más natural que preserve la lectura documentada del POB.'
  issues:
  - severity: medium
    issue: «Todos los prosperados» es poco natural en español.
    rationale: Aunque intenta reflejar el matiz social, «prosperados» no es una designación idiomática para personas. «Los prósperos» comunica mejor el sentido de דשני ארץ y coincide con la nota léxica.
  - severity: medium
    issue: «Se inclinarán» para יכרעו pierde la especificidad de ‘arrodillarse’.
    rationale: El audit trail inglés distingue deliberadamente entre שחה (‘bow down/postrarse’) y כרע (‘kneel’). En español conviene preservar esa diferencia con «se arrodillarán».
  - severity: medium
    issue: «Incluso él, cuya vida no logró mantenerse» es forzado y menos fiel al sentido adoptado.
    rationale: La cláusula hebrea es difícil, pero el POB adoptó la lectura ‘incluso él que no pudo conservarse con vida’. La redacción actual suena impersonal y torpe en español.
  revised_spanish_text: Todos los prósperos[a] de la tierra comerán y se postrarán; delante de él se arrodillarán todos los que bajan al polvo[b], incluso él que no pudo conservarse con vida[c].
