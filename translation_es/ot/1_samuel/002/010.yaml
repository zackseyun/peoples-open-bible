translation:
  language: es
  text: Los adversarios de Yahvé serán quebrantados[a]; desde los cielos tronará sobre ellos[b]. Yahvé juzgará los confines de la tierra; dará fuerza a su rey y exaltará el cuerno de su ungido[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que contienden con él», para «los adversarios de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en los cielos»; se traduce «desde los cielos» para expresar el origen del trueno.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «su anointed» / «su ungido», según el matiz del hebreo מְשִׁיחוֹ, que puede referirse al rey ungido de Yahvé y también tener resonancia mesiánica.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el valor del nombre divino en el proyecto, preservándolo como nombre propio y no como sustituto reverencial. 'Yahvé' es la forma establecida en el español del POB.
- source_word: יֵחַתּוּ
  english_pob_choice: will be shattered
  chosen_spanish: serán quebrantados
  alternatives_spanish:
  - serán quebrados
  - serán deshechos
  - serán dismayed
  lexicon: HALOT
  rationale: El nifal de חתת comunica derrota y colapso; 'quebrantados' conserva la fuerza de juicio sin sonar artificial en español.
- source_word: מריב/ו על/ו
  english_pob_choice: the LORD’s adversaries
  chosen_spanish: los adversarios de Yahvé
  alternatives_spanish:
  - los que contienden con él
  - sus opositores
  lexicon: HALOT
  rationale: La relación posesiva y referencial se hace explícita en español con 'de Yahvé'. 'Adversarios' conserva la idea de oposición hostil, acorde con la lectura auditada.
- source_word: בַּשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde los cielos
  alternatives_spanish:
  - en los cielos
  - desde el cielo
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'en los cielos', pero el contexto del trueno pide expresar origen; 'desde los cielos' reproduce el efecto idiomático auditado por el POB en inglés.
- source_word: יַרְעֵם
  english_pob_choice: he will thunder against them
  chosen_spanish: tronará sobre ellos
  alternatives_spanish:
  - tronará contra ellos
  - hará tronar sobre ellos
  lexicon: HALOT
  rationale: רעם expresa trueno divino dirigido. 'Tronará sobre ellos' mantiene el juicio hostil sin recargar la frase; 'contra ellos' queda disponible como alternativa semántica cercana.
- source_word: יָדִין
  english_pob_choice: will judge
  chosen_spanish: juzgará
  alternatives_spanish:
  - hará justicia
  - gobernará
  - dictará juicio
  lexicon: HALOT
  rationale: דין aquí es judicial y universal. 'Juzgará' preserva la amplitud de juicio y evita restringirlo a una sola noción de gobierno.
- source_word: אַפְסֵי אָרֶץ
  english_pob_choice: the ends of the earth
  chosen_spanish: los confines de la tierra
  alternatives_spanish:
  - los extremos de la tierra
  - los rincones de la tierra
  lexicon: HALOT
  rationale: Es un modismo de extensión universal. 'Confines' es natural en español bíblico contemporáneo y conserva la amplitud territorial.
- source_word: וְיִתֶּן עֹז
  english_pob_choice: he will give strength
  chosen_spanish: dará fuerza
  alternatives_spanish:
  - dará poder
  - concederá fortaleza
  lexicon: HALOT
  rationale: עֹז designa fuerza/poder. 'Dará fuerza' es directo y mantiene el sentido concreto de capacitar divinamente.
- source_word: לְמַלְכּוֹ
  english_pob_choice: to his king
  chosen_spanish: a su rey
  alternatives_spanish:
  - a su monarca
  - a su gobernante
  lexicon: HALOT
  rationale: Se conserva el término real explícito del hebreo. 'Su rey' refleja la relación posesiva y la expectativa monárquica del canto.
- source_word: וְיָרֵם קֶרֶן
  english_pob_choice: lift up the horn
  chosen_spanish: exaltará el cuerno
  alternatives_spanish:
  - alzará el cuerno
  - elevará el cuerno
  - exaltará la fuerza
  lexicon: HALOT
  rationale: Se retiene la metáfora hebrea de 'cuerno' para no perder su valor simbólico de poder/victoria. 'Exaltará' comunica la elevación honorífica.
- source_word: מְשִׁיחוֹ
  english_pob_choice: his anointed
  chosen_spanish: su ungido
  alternatives_spanish:
  - su Mesías
  - su ungido rey
  lexicon: HALOT
  rationale: La revisión auditada del POB en inglés prefirió 'his anointed' por ser más natural y preciso en este contexto. En español, 'ungido' conserva el sentido lexical de מָשַׁח y evita introducir una afirmación interpretativa más fuerte que el contexto inmediato.
theological_decisions:
- issue: 'Alcance de מְשִׁיחוֹ: referencia real inmediata y resonancia mesiánica posterior'
  english_pob_reading: his anointed
  chosen_spanish_reading: su ungido
  alternative_spanish_readings:
  - su Mesías
  - su anointed
  rationale: El contexto inmediato de 1 Samuel 2:10 habla del rey de Yahvé; el término puede resonar canónicamente con expectativas mesiánicas, pero el texto base no obliga a traducirlo como título técnico. 'Su ungido' mantiene la apertura semántica y sigue la revisión auditada del POB.
  doctrine_reference: 'DOCTRINE.md: traduzca títulos con precisión contextual; preserve la tensión entre sentido inmediato y resonancia canónica sin sobreinterpretar.'
- issue: 'Direccionalidad del trueno: ''en los cielos'' versus ''desde los cielos'''
  english_pob_reading: from heaven
  chosen_spanish_reading: desde los cielos
  alternative_spanish_readings:
  - en los cielos
  rationale: La preposición hebrea es local ('en'), pero la secuencia verbal exige expresar la procedencia del trueno. La elección sigue el razonamiento auditado del POB en inglés sin borrar el dato hebreo subyacente.
  doctrine_reference: 'DOCTRINE.md: cuando el español requiere explicitar una relación implícita por idiomática, puede hacerse si no se pierde el dato fuente.'
translation_notes:
  revision_awareness: La versión inglesa más reciente del POB cambió «his Messiah» por «his anointed» para reflejar mejor מְשִׁיחוֹ en este contexto. La presente versión española sigue esa revisión con «su ungido», manteniendo a la vez la metáfora de 'cuerno' y la direccionalidad idiomática del trueno. Se conserva el paralelismo final entre el rey y el ungido sin introducir traducciones más interpretativas de lo que el hebreo exige.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como nombre divino principal, conforme al estándar del proyecto.
  - Se mantiene 'ungido' en vez de 'Mesías' porque el contexto inmediato es monárquico y la revisión auditada favorece la lectura más natural.
  - '''Cuerno'' se conserva como metáfora bíblica estable en español; no se sustituye por ''poder'' en el texto principal.'
  - '''Confines de la tierra'' y ''desde los cielos'' equilibran literalidad y idiomaticidad sin perder el marco universal/judicial del verso.'
