revisions:
- from: Porque el borracho y el glotón caerán en pobreza[a], y la somnolencia vestirá de harapos a uno.
  to: Porque el borracho y el glotón llegarán a la pobreza[a], y la somnolencia vestirá de harapos a uno.
  rationale: Se ajusta «caerán en pobreza» a «llegarán a la pobreza» para una expresión más idiomática y más cercana al valor consecutivo de יִוָּרֵשׁ en el contexto sapiencial. También se simplifica la nota para alinearla mejor con la alternativa léxica preservada en la auditoría inglesa, evitando expansión innecesaria mientras se mantiene el matiz de נוּמָה.
