translation:
  language: es
  text: Además de estas cosas, prometió inscribir otros cincuenta talentos además de los cien, si se le concedía establecer para sí, por autoridad suya, un gimnasio y un registro de jóvenes[a], y registrar a los de Jerusalén como antioquenos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un registro de efebos». ἐφηβία alude a una institución cívica y de formación física para jóvenes dentro del marco helenístico.'
    reason: alternative_reading
  - marker: b
    text: 'O: «como ciudadanos de Antioquía». El griego dice literalmente «antioquenos», lo que puede implicar una inscripción cívica o un estatus jurídico vinculado con Antioquía.'
    reason: alternative_reading
lexical_decisions:
- source_word: πρὸς δὲ τούτοις
  english_pob_choice: In addition to these things
  chosen_spanish: Además de estas cosas
  alternatives_spanish:
  - Además de ello
  - Asimismo
  lexicon: LSJ
  rationale: Conserva el valor aditivo del sintagma sin volverlo rígido; "estas cosas" mantiene la referencia al contexto inmediato.
- source_word: ὑποσχεῖτο
  english_pob_choice: he promised
  chosen_spanish: prometió
  alternatives_spanish:
  - se comprometió a
  - ofreció
  lexicon: LSJ
  rationale: En este contexto financiero y político, "prometió" expresa bien una oferta vinculante y natural en español.
- source_word: ἕτερα διαγράψειν πεντήκοντα πρὸς τοῖς ἑκατόν
  english_pob_choice: to register another fifty talents beyond the one hundred
  chosen_spanish: inscribir otros cincuenta talentos además de los cien
  alternatives_spanish:
  - anotar otros cincuenta talentos además de los cien
  - registrar otros cincuenta talentos sobre los cien
  lexicon: LSJ
  rationale: Se mantiene el matiz administrativo de διαγράφειν como "inscribir/registrar"; "talentos" se conserva porque el contexto monetario inmediato lo exige.
- source_word: ἐὰν ἐπιχορηγηθῇ
  english_pob_choice: if he were granted
  chosen_spanish: si se le concedía
  alternatives_spanish:
  - si le fuera concedido
  - si recibía
  lexicon: LSJ
  rationale: La pasiva sugiere una concesión por parte de una autoridad superior; "se le concedía" comunica esa dependencia sin sobrecargar el estilo.
- source_word: διὰ τῆς ἐξουσίας αὐτοῦ
  english_pob_choice: authority
  chosen_spanish: por medio de su autoridad
  alternatives_spanish:
  - por su autoridad
  - mediante su autoridad oficial
  - con su autoridad
  lexicon: LSJ
  rationale: '"Por medio de" conserva el valor instrumental de διὰ y "autoridad" respeta el sentido político-administrativo del término.'
- source_word: γυμνάσιον
  english_pob_choice: gymnasium
  chosen_spanish: un gimnasio
  alternatives_spanish:
  - un gimnasio griego
  - una palestra
  lexicon: LSJ
  rationale: Se translitera al español como "gimnasio", que sigue siendo el préstamo estándar y conserva la institución helenística específica.
- source_word: ἐφηβίαν
  english_pob_choice: an enrollment of young men
  chosen_spanish: una inscripción de jóvenes
  alternatives_spanish:
  - un enrolamiento de jóvenes
  - una ephebía
  - un cuerpo de efebos
  lexicon: LSJ
  rationale: La palabra designa una institución cívica de jóvenes; "inscripción de jóvenes" mantiene la fuerza administrativa y evita un tecnicismo poco transparente.
- source_word: αὐτῷ συστήσασθαι
  english_pob_choice: to establish for himself
  chosen_spanish: establecer para sí
  alternatives_spanish:
  - fundar para sí
  - organizar para sí
  lexicon: LSJ
  rationale: La expresión refleja la iniciativa propia y el matiz reflexivo del infinitivo aoristo medio.
- source_word: τοὺς ἐν Ἱεροσολύμοις Ἀντιοχεῖς ἀναγράψαι
  english_pob_choice: to enroll those in Jerusalem as Antiochenes
  chosen_spanish: registrar a los de Jerusalén como antioquenos
  alternatives_spanish:
  - inscribir a los de Jerusalén como antioquenos
  - registrar a los jerusalemitas como ciudadanos de Antioquía
  lexicon: LSJ
  rationale: '"Antioquenos" reproduce directamente Ἀντιοχεῖς sin añadir una precisión jurídica que el griego no explicita; "registrar" conserva el verbo administrativo ἀναγράφειν.'
theological_decisions:
- issue: Alcance cívico de Ἀντιοχεῖς
  english_pob_reading: Render as 'Antiochenes' in the main text without specifying full citizenship
  chosen_spanish_reading: Registrar a los de Jerusalén como antioquenos, sin explicitar en el texto principal una ciudadanía concreta
  alternative_spanish_readings:
  - registrar a los de Jerusalén como ciudadanos de Antioquía
  - inscribir a los jerusalemitas como miembros de la polis de Antioquía
  rationale: El griego dice literalmente "antioquenos"; la referencia histórica apunta a una reconfiguración cívica helenizante, pero el texto no precisa por sí mismo el estatus legal exacto. La redacción principal preserva esa tensión y evita sobreinterpretar.
  doctrine_reference: Primacía del dato lingüístico-histórico sobre una precisión jurídica no expresada explícitamente en el griego.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete y armoniza con la decisión inglesa POB de conservar el carácter administrativo y helenizante del versículo. No se han necesitado revisiones textuales adicionales; se mantiene la ambigüedad histórica de Ἀντιοχεῖς y el sentido institucional de ἐφηβία.
  spanish_consistency_notes:
  - Se mantiene "gimnasio" como préstamo institucional, coherente con el uso POB de "gymnasium".
  - Se conserva "talentos" como unidad monetaria explícita del contexto.
  - '"Registrar/inscribir" se usa con valor administrativo, no meramente narrativo.'
  - '"Antioquenos" evita reemplazar el término con una forma interpretativa más cerrada.'
  - El registro es formal y eclesiásticamente legible, sin caer en calcos excesivos.
