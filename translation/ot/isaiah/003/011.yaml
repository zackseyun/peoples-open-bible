id: ISA.3.11
reference: Isaiah 3:11
source:
  edition: WLC
  text: א֖וֹי לְ/רָשָׁ֣ע רָ֑ע כִּֽי גְמ֥וּל יָדָ֖י/ו יֵעָ֥שֶׂה לּֽ/וֹ־׃
translation:
  text: Woe to the wicked! It will go badly for him[a], for the work of his hands will be done to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Woe to the wicked! Evil is upon him, for the recompense of his hands shall be done to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: א֖וֹי
  chosen: Woe
  alternatives:
  - Alas
  lexicon: HALOT
  rationale: Interjection of lament and threat; 'Woe' best preserves the prophetic denunciation formula in English.
- source_word: לְ/רָשָׁ֣ע
  chosen: to the wicked
  alternatives:
  - to the wicked man
  - for the wicked
  lexicon: HALOT
  rationale: The preposition with רָשָׁע marks the object of the denunciation. 'The wicked' is natural English and preserves the representative singular without over-specifying 'man' in the main text.
- source_word: רָ֑ע
  chosen: It will go badly
  alternatives:
  - evil
  - disaster
  - bad
  lexicon: HALOT
  rationale: Here רַע functions predicatively after the woe formula, expressing adverse outcome rather than abstract moral evil. 'It will go badly' communicates the idiomatic sense in readable English.
- source_word: כִּֽי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the announced woe; 'for' fits the explanatory connection in English.
- source_word: גְמ֥וּל
  chosen: what his hands have done
  alternatives:
  - the recompense of his hands
  - the deed of his hands
  - the reward of his hands
  lexicon: HALOT
  rationale: גְּמוּל denotes recompense or dealing. In this context, paired with the passive/impersonal verb, it refers to the return corresponding to his deeds. Rendering the phrase idiomatically as 'what his hands have done' makes the sense clear while preserving the deed-consequence linkage.
- source_word: יָדָ֖י/ו
  chosen: his hands
  alternatives:
  - his hand
  lexicon: HALOT
  rationale: The dual/plural form is a common Hebrew idiom for one's actions or works. 'His hands' preserves the concrete imagery.
- source_word: יֵעָ֥שֶׂה לּֽ/וֹ
  chosen: will be done to him
  alternatives:
  - will be repaid to him
  - will be done for him
  lexicon: HALOT
  rationale: 'Nifal of עשה here is best taken as passive: what corresponds to his deeds will come back upon him. ''Will be done to him'' preserves the verbal repetition with עשה and the retributive force.'
