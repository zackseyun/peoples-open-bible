source:
  edition: SBLGNT
  text: ⸂καὶ ὅταν⸃ ⸀ἄγωσιν ὑμᾶς παραδιδόντες, μὴ προμεριμνᾶτε τί ⸀λαλήσητε, ἀλλ’ ὃ ἐὰν δοθῇ ὑμῖν ἐν ἐκείνῃ τῇ ὥρᾳ τοῦτο λαλεῖτε, οὐ γάρ ἐστε ὑμεῖς οἱ λαλοῦντες ἀλλὰ τὸ πνεῦμα τὸ ἅγιον.
base_translation:
  language: en
  yaml_path: translation/nt/mark/013/011.yaml
  text: And when they lead you away and hand you over[a], do not worry beforehand about what you should say; but whatever is given to you in that hour, speak that. For it is not you who are speaking[b], but the Holy Spirit.
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'what you should say' and 'say that.' The Greek uses forms of 'speak' (λαλέω) in both places, which this translation preserves for consistency.
    reason: lexical_alternative
  - marker: b
    text: Or 'lead you away, handing you over'.
    reason: previous_rendering
translation:
  language: ko
  text: 그들이 여러분을 끌고 가서 넘겨줄 때, 무엇을 말할까 미리 염려하지 말고, 그 시간에 여러분에게 주어지는 것, 그것을 말하십시오. 이는 말하는 자가 여러분이 아니라 성령이시기 때문입니다.
  philosophy: optimal-equivalence
