  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτι ταύτην ὁ θεὸς ἐκπεπλήρωκεν τοῖς τέκνοις ⸀ἡμῶν ἀναστήσας Ἰησοῦν, ὡς καὶ ἐν τῷ ⸂ψαλμῷ γέγραπται τῷ δευτέρῳ⸃· Υἱός μου εἶ σύ, ἐγὼ σήμερον γεγέννηκά σε.
base_translation:
  language: en
  yaml_path: translation/nt/acts/013/033.yaml
  text: 'that God has fulfilled this for our children by raising up Jesus[a], as it is also written in the second Psalm: ‘You are my Son[b]; today I have begotten you.’'
  footnotes:
  - marker: a
    text: Or, 'to us, their children.' Some manuscripts read 'to our children,' while others support 'to us, their children.'
    reason: textual_variant
  - marker: b
    text: Or 'by raising Jesus from the dead'; the Greek can also mean 'by raising up' in the sense of bringing forth or appointing.
    reason: alternative_reading
translation:
  language: ko
  text: 하나님께서 예수를 일으키심으로써 그들의 자손인 우리에게 이 약속을 이루셨으니, 시편 둘째 편에도 이렇게 기록된 바와 같습니다. 「너는 내 아들이다. 오늘 내가 너를 낳았다.」
  philosophy: optimal-equivalence
theological_decisions:
- issue: 시편 2:7 인용의 칭호적 무게
  chosen_reading: 너는 내 아들이다. 오늘 내가 너를 낳았다.
  alternative_readings:
  - 너는 내 아들이라 오늘 내가 너를 낳았도다
  rationale: 시편 2편 인용은 메시아의 즉위·신적 아들 됨을 선언한다. 합쇼체 평어형으로 직역해 신적 선포의 무게를 보존한다.
  doctrine_reference: 'DOCTRINE.md: OT citation cadence; messianic enthronement'
