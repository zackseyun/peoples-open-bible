    rationale: El POB inglés conservó explícitamente la alternativa 'brown'. El español usa 'de color oscuro' pero omite la nota, perdiendo parte de la justificación auditada del color.
  - severity: low
    issue: '''todo animal de color oscuro entre las ovejas'' suena menos ceñido y menos fluido que una formulación con referente ovino explícito.'
    rationale: El hebreo dice literalmente 'todo שֶׂה חוּם entre las ovejas'. En español bíblico natural, 'toda oveja de color oscuro' preserva mejor la serie con 'toda oveja...' y evita la vaguedad de 'animal'.
