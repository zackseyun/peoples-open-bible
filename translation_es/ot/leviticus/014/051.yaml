review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el audit trail inglés en la secuencia ritual, los materiales, el contraste entre el ave viva y la degollada, el agua fresca como equivalente contextual de מַיִם חַיִּים, y la aspersión siete veces sobre la casa. Sin embargo, hay dos desajustes: la nota [a] no preserva la alternativa significativa documentada en inglés para שְׁנִי הַתּוֹלַעַת, y ''sumergirá'' es más fuerte que el sentido normal de טבל ''mojar/empapar/sumergir parcialmente'', donde ''mojará'' o ''meterá'' sería más exacto y natural en este contexto de atar materiales y un ave viva al conjunto ritual.'
  spanish_quality_summary: El español es claro y digno, pero puede pulirse. 'Mojará' o 'los mojará' suena más natural y fiel para טבל que 'los sumergirá'. También conviene quitar la coma antes de 'y el ave viva' para una coordinación más fluida en español. El resto del verso lee bien y mantiene un registro bíblico accesible.
  glossary_alignment: No hay conflictos con los términos base del proyecto. 'Hisopo', 'ave viva', 'degollada', 'rociará' y 'agua fresca' son compatibles con la línea del POB. La principal cuestión terminológica es transparentar mejor en nota el hebreo literal de שְׁנִי הַתּוֹלַעַת ('escarlata del gusano') y su sentido tradicional como hilo/lana teñidos de escarlata.
  issues:
  - severity: medium
    issue: La nota [a] está asociada a 'madera de cedro' pero el audit trail inglés la usa para שְׁנִי הַתּוֹלַעַת.
    rationale: 'La nota inglesa preserva una alternativa léxica importante: literal ''scarlet of the worm'', entendido tradicionalmente como hilo o lana teñidos de escarlata. La nota española actual en cambio explica ''madera de cedro'', algo ya suficientemente claro en el texto principal y no el punto lexical documentado.'
  - severity: medium
    issue: '''Los sumergirá'' sobretraduce וְטָבַל אֹתָם.'
    rationale: טבל en este tipo de contexto ritual normalmente significa 'mojar', 'meter en', 'empapar' o 'sumergir' parcialmente. Dado que los objetos incluyen madera, hisopo, hilo y un ave viva, 'los mojará' refleja mejor la acción sin implicar inmersión total.
  - severity: low
    issue: Puntuación algo calcada en la serie coordinada.
    rationale: La coma antes de 'y el ave viva' no es necesaria en español y la enumeración fluye mejor sin ella.
