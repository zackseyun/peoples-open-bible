translation:
  language: es
  text: Partieron de Teraj[a] y acamparon en Mitcá[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Teraj: transliteración del nombre del lugar; la preposición hebrea indica origen, por eso el texto dice «de Teraj».'
