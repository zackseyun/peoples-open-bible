translation:
  language: es
  text: 'Hizo las tablas para el tabernáculo: veinte tablas para el lado sur[a], hacia el sur.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «veinte tablones para el lado sur». El hebreo usa una expresión meridional duplicada («sur, hacia el sur») para énfasis o especificación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Él hizo
  alternatives_spanish:
  - Y él hizo
  - Entonces hizo
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción pasada secuencial. En español, el pretérito simple expresa con naturalidad la acción narrativa; se mantiene el sujeto explícito por claridad en una lista de instrucciones constructivas.
- source_word: הַקְּרָשִׁים
  english_pob_choice: the frames
  chosen_spanish: los marcos
  alternatives_spanish:
  - las tablas
  - los tablones
  lexicon: HALOT
  rationale: En el contexto constructivo del tabernáculo, קְרָשִׁים designa los elementos estructurales. 'Marcos' comunica su función arquitectónica con mayor naturalidad en español moderno que 'tablas', sin perder concreción.
- source_word: לַמִּשְׁכָּן
  english_pob_choice: for the tabernacle
  chosen_spanish: para el tabernáculo
  alternatives_spanish:
  - para la morada
  - para la tienda de reunión
  lexicon: HALOT
  rationale: מִשְׁכָּן es el término cultual establecido para la estructura sagrada. 'Tabernáculo' es el equivalente español tradicional y preciso en este contexto.
- source_word: עֶשְׂרִים קְרָשִׁים
  english_pob_choice: twenty frames
  chosen_spanish: veinte marcos
  alternatives_spanish:
  - veinte tablas
  lexicon: HALOT
  rationale: Se conserva la repetición nominal del hebreo en estilo inventarial. El numeral más el sustantivo se trasladan de forma directa y sobria.
- source_word: לִפְאַת
  english_pob_choice: for the side
  chosen_spanish: para el lado
  alternatives_spanish:
  - para el costado
  - para el extremo
  lexicon: HALOT
  rationale: פֵּאָה aquí funciona como designación espacial de un lado de la estructura. 'Lado' es la opción más clara y natural en español.
- source_word: נֶגֶב
  english_pob_choice: south
  chosen_spanish: sur
  alternatives_spanish:
  - Negev
  - región sur
  lexicon: HALOT
  rationale: En este versículo, נֶגֶב es direccional, no un nombre propio. 'Sur' mantiene el valor geográfico inmediato.
- source_word: תֵּימָנָה
  english_pob_choice: southward
  chosen_spanish: hacia el sur
  alternatives_spanish:
  - al sur
  - del lado sur
  lexicon: HALOT
  rationale: El término refuerza la orientación meridional ya indicada por נֶגֶב. 'Hacia el sur' preserva ese doble énfasis sin sonar forzado en español.
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail al expresar la segunda indicación direccional como 'hacia el sur', evitando una repetición poco natural y conservando el énfasis hebreo en la orientación meridional.
  spanish_consistency_notes:
  - Se mantiene 'tabernáculo' como término cultual establecido, coherente con el audit trail inglés.
  - Se preserva la repetición inventarial con un sustantivo concreto y un complemento de dirección claro.
  - La nota al pie refleja la alternativa léxica documentada entre 'marcos' y 'tablas' sin imponer una sola lectura interpretativa.
