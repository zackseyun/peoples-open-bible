translation:
  language: es
  text: Ahitófel era consejero del rey, y Husai el arquita era amigo del rey[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'compañero' o 'asociado'; el término hebreo puede denotar un amigo en general y, en un contexto real, también puede implicar un compañero de confianza en la corte.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲחִיתֹפֶל
  english_pob_choice: Ahithophel
  chosen_spanish: Ahitofel
  alternatives_spanish:
  - Ahitófel
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio al uso español bíblico, conservando su forma reconocible sin introducir traducción interpretativa.
- source_word: יוֹעֵץ
  english_pob_choice: counselor
  chosen_spanish: consejero
  alternatives_spanish:
  - asesor
  - consultor
  lexicon: HALOT
  rationale: El sustantivo indica a quien da consejo. 'Consejero' reproduce bien la función cortesana y es el equivalente natural en español para este contexto.
- source_word: לַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: del rey
  alternatives_spanish:
  - para el rey
  - al rey
  lexicon: HALOT
  rationale: En español, la relación funcional del cargo se expresa con naturalidad como 'del rey' en una enumeración de oficiales de corte; mantiene el vínculo de servicio al rey sin forzar la preposición literal.
- source_word: חוּשַׁי
  english_pob_choice: Hushai
  chosen_spanish: Husai
  alternatives_spanish:
  - Jusai
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio al español de forma clara y directa, manteniendo la identificación del personaje.
- source_word: הָאַרְכִּי
  english_pob_choice: the Archite
  chosen_spanish: el arquita
  alternatives_spanish:
  - el arquita de Arqui
  - el arquita
  lexicon: HALOT
  rationale: El gentilicio se vierte como identificador de procedencia o pertenencia. 'El arquita' conserva la forma convencional y funciona de manera natural en español.
- source_word: רֵעַ
  english_pob_choice: friend
  chosen_spanish: amigo
  alternatives_spanish:
  - compañero
  - asociado
  - confidente
  lexicon: HALOT
  rationale: El término denota amigo, compañero o asociado; en este contexto cortesano, 'amigo' es el sentido básico y más transparente. Puede implicar una relación de confianza sin convertirla en un cargo técnico no explicitado por el hebreo.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king’s
  chosen_spanish: del rey
  alternatives_spanish:
  - del rey
  - real
  lexicon: HALOT
  rationale: Se expresa la relación posesiva en español con una construcción natural ('amigo del rey'), preservando el sentido de pertenencia o relación con la casa real.
- source_word: וַ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Entonces
  lexicon: HALOT
  rationale: La conjunción une esta nota de funcionarios con la lista precedente. 'Y' es la equivalencia directa y natural en español.
theological_decisions:
- issue: Sentido relacional de רֵעַ en entorno real
  english_pob_reading: '''friend'' with footnoted alternatives ''companion'' or ''associate''; may imply a trusted court companion.'
  chosen_spanish_reading: '''amigo'' con nota de alternativas ''compañero'' o ''asociado''; puede implicar una relación de confianza en la corte.'
  alternative_spanish_readings:
  - '''compañero'''
  - '''asociado'''
  - '''confidente'''
  rationale: No hay necesidad de convertir el término en un título técnico más allá de lo que el hebreo afirma. La nota preserva la tensión entre sentido básico y posible matiz cortesano, como en el POB inglés.
  doctrine_reference: Lexical semantics / court terminology
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y mantiene la misma solución léxica principal del POB inglés para רֵעַ, sin cambios relevantes respecto del criterio auditado. No se registran revisiones aplicadas en el pasaje fuente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma de proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Los nombres propios se transliteran de manera estable y reconocible en español.
  - Se evita introducir mayúsculas honoríficas innecesarias; 'rey' se mantiene en minúscula conforme al uso normal en español bíblico moderno.
  - La nota al pie se ancla únicamente en 'amigo', donde existe la alternativa léxica documentada en el audit trail inglés.
