translation:
  language: es
  text: Entonces Sem y Jafet tomaron la prenda[a] y la pusieron sobre los hombros de ambos, y caminaron hacia atrás y cubrieron la desnudez de su padre. Sus rostros estaban vueltos hacia atrás, de modo que no vieron la desnudez de su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el manto’. El término hebreo se refiere a una prenda exterior usada aquí para cubrir a Noé.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomaron
  alternatives_spanish:
  - llevaron
  - agarraron
  lexicon: HALOT
  rationale: El verbo básico לקח en narración se expresa de forma natural con 'tomaron', manteniendo el orden secuencial del hebreo y el tono narrativo sin sobrecargarlo.
- source_word: שֵׁם וָיֶפֶת
  english_pob_choice: Shem and Japheth
  chosen_spanish: Sem y Jafet
  alternatives_spanish:
  - Shem y Japhet
  lexicon: convención onomástica bíblica
  rationale: Se usan las formas españolas habituales de los nombres propios bíblicos, transliteradas de manera reconocible para el lector en español.
- source_word: הַשִּׂמְלָה
  english_pob_choice: the garment
  chosen_spanish: la prenda
  alternatives_spanish:
  - el manto
  - el vestido
  - la cubierta
  lexicon: HALOT
  rationale: שמלה designa una prenda exterior; 'prenda' es suficientemente general en español para no forzar 'manto' o 'capa', pero sigue siendo concreta. En este contexto también puede entenderse como una cobertura para tapar a Noé.
- source_word: וַיָּשִׂימוּ עַל שְׁכֶם שְׁנֵיהֶם
  english_pob_choice: laid it on both their shoulders
  chosen_spanish: la pusieron sobre ambos hombros
  alternatives_spanish:
  - la colocaron sobre los hombros de ambos
  - la pusieron sobre sus dos hombros
  lexicon: HALOT
  rationale: La frase hebrea es idiomática y expresa que ambos la cargaron entre los dos; 'sobre ambos hombros' conserva la imagen física y sugiere el transporte conjunto sin introducir una explicación ajena al texto.
- source_word: אֲחֹרַנִּית
  english_pob_choice: backward
  chosen_spanish: hacia atrás
  alternatives_spanish:
  - de espaldas
  - atrás
  lexicon: HALOT
  rationale: El adverbio indica movimiento u orientación hacia atrás. 'Hacia atrás' funciona bien en ambas apariciones y mantiene la repetición del hebreo.
- source_word: וַיְכַסּוּ
  english_pob_choice: covered
  chosen_spanish: cubrieron
  alternatives_spanish:
  - taparon
  - ocultaron
  lexicon: HALOT
  rationale: '''Cubrieron'' reproduce de manera directa כסה y conserva la dignidad del acto sin añadir matices innecesarios.'
- source_word: עֶרְוַת אֲבִיהֶם
  english_pob_choice: their father's nakedness
  chosen_spanish: la desnudez de su padre
  alternatives_spanish:
  - la desnudez de su padre
  - el cuerpo desnudo de su padre
  lexicon: HALOT
  rationale: Se conserva 'desnudez' para reflejar el sustantivo hebreo y su carga de vergüenza/exposición, sin resolver la posible tensión interpretativa hacia un sentido más específico que el texto inmediato no exige.
- source_word: וּפְנֵיהֶם אֲחֹרַנִּית
  english_pob_choice: Their faces were turned backward
  chosen_spanish: Sus rostros estaban hacia atrás
  alternatives_spanish:
  - Tenían el rostro hacia atrás
  - Sus caras estaban vueltas hacia atrás
  lexicon: HALOT
  rationale: El hebreo es una cláusula sin verbo expreso; en español se completa de manera natural con 'estaban' para mantener claridad. 'Rostros' preserva el paralelismo con la repetición de la orientación corporal.
- source_word: לֹא רָאוּ
  english_pob_choice: they did not see
  chosen_spanish: no vieron
  alternatives_spanish:
  - no llegaron a ver
  - no miraron
  lexicon: HALOT
  rationale: La negación con el perfecto del verbo ראה se vierte con el pasado simple natural en español. 'No vieron' es fiel y fluido, sin añadir una intención interpretativa.
theological_decisions:
- issue: Sentido de 'la desnudez de su padre'
  english_pob_reading: Literal exposure of Noah's body, which Shem and Japheth respectfully cover
  chosen_spanish_reading: Exposición corporal literal de Noé, cubierta con respeto por Sem y Jafet
  alternative_spanish_readings:
  - Sentido eufemístico sexual tomado de usos posteriores
  - Desnudez como metáfora de vergüenza sin referencia corporal directa
  rationale: 'La escena describe acciones concretas: tomar una prenda, caminar hacia atrás, cubrir y no ver. Por eso el español conserva ''desnudez'' sin ampliar el texto a una interpretación sexual que el pasaje inmediato no formula explícitamente.'
  doctrine_reference: Mantener la tensión interpretativa sin resolverla artificialmente; primacía del texto hebreo inmediato sobre usos posteriores.
translation_notes:
  revision_awareness: El borrador sigue de cerca la última revisión inglesa, que no requirió cambios, y conserva su decisión principal sobre שׂמלה como prenda/garment y sobre עֶרְוָה como desnudez literal en este contexto narrativo.
  spanish_consistency_notes:
  - Se mantiene 'Sem' y 'Jafet' como formas bíblicas españolas consistentes.
  - '''Desnudez'' se usa de forma uniforme en ambas ocurrencias para reflejar la repetición hebrea de עֶרְוָה.'
  - La orientación 'hacia atrás' se conserva en ambas apariciones de אֲחֹרַנִּית.
  - Se evita 'Señor' u otras sustituciones no pertinentes, y no hay términos doctrinales que requieran normalización adicional.
