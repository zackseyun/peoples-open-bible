review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura repetitiva del hebreo y acierta con «debajo de dos ramas» y la cláusula final distributiva. Sin embargo, no preserva bien el referente pronominal de מִמֶּנָּה en español: el hebreo es femenino singular («de ella») y el borrador usa «de él», lo que choca con la concordancia interna creada por «ramas que salen de él». Además, convertir «from it» en «que salen de él» en las tres repeticiones añade material verbal no presente en esas posiciones; el hebreo simplemente dice «de ella».'
  spanish_quality_summary: El español es legible, pero «capullo» para כפתר suena poco natural y potencialmente engañoso en un contexto de mobiliario sagrado, porque en español se asocia ante todo a un brote floral cerrado, no a un adorno redondeado del candelabro. «Botón» comunica mejor una protuberancia ornamental y mantiene claridad moderna. También conviene evitar repetir «que salen de…» dentro de cada miembro cuando el original solo repite el pronombre.
  glossary_alignment: 'No hay términos teológicos mayores en juego. La principal cuestión léxica es כפתר: el inglés POB documenta «bulb» con alternativa «knob». En español, «botón» encaja mejor que «capullo» con la rationale de un elemento redondeado ornamental; la nota alternativa puede conservar «nudo».'
  issues:
  - severity: medium
    issue: «capullo» para כפתר
    rationale: Aunque intenta reflejar la imaginería orgánica, en español suele evocar un brote floral, no un elemento redondeado decorativo del candelabro. «Botón» o «bulbo» son más fieles a la rationale documentada.
  - severity: medium
    issue: Uso de «que salen de él» en las tres primeras repeticiones
    rationale: El hebreo en esas tres instancias solo tiene el pronombre «de ella», no el participio «que salen». Añadir el verbo allí sobretraduce y reduce la precisión formal.
  - severity: medium
    issue: Pronombre «de él» en vez de femenino
    rationale: מִמֶּנָּה es femenino singular repetido cuatro veces. En español, si no se explicita «del candelabro», la forma más cercana al hebreo es «de ella», especialmente porque el texto ya venía siguiendo el pronombre simple en inglés POB.
  revised_spanish_text: y un botón[a] debajo de dos ramas de ella, y un botón debajo de dos ramas de ella, y un botón debajo de dos ramas de ella, para las seis ramas que salen de ella.
  revised_footnotes:
  - marker: a
    text: O «nudo» para el hebreo כפתר, refiriéndose a un adorno redondeado del candelabro.
    reason: lexical_alternative
  revision_rationale: Se corrige כפתר a «botón» para expresar mejor un adorno redondeado del candelabro en español natural. Se elimina «que salen de» de las tres primeras repeticiones para ajustarse al hebreo, que solo repite el pronombre. Se cambia «de él» a «de ella» para reflejar el femenino singular מִמֶּנָּה y mantener la coherencia con la cláusula final.
