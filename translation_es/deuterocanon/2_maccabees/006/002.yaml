revisions:
- from: y también profanar el templo de Jerusalén y darle el nombre de Zeus Olímpico[a], y el de Gerizim, según solían hacer[b] los que habitaban el lugar, de Zeus protector de los extranjeros.
  to: y también profanar el templo de Jerusalén y darle el nombre de Zeus Olímpico[a], y al templo de Gerizim, según lo hacían[b] los que habitaban aquel lugar, el de Zeus protector de los extranjeros.
  rationale: Se ajusta la sintaxis para que el español identifique claramente los dos templos y sus respectivas designaciones paganas. Se explicita «al templo de Gerizim» por claridad idiomática, y «según lo hacían» preserva mejor la nota circunstancial del griego que «según solían hacer», que era un poco más interpretativo. Se mantienen las notas léxicas útiles ya presentes.
  reviewer_model: gpt-5.4
