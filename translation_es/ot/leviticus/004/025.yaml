translation:
  language: es
  text: Entonces el sacerdote tomará parte de la sangre de la ofrenda por el pecado[a] con su dedo, y la pondrá sobre los cuernos del altar del holocausto, y derramará el resto de su sangre en la base del altar del holocausto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda por la purificación». El término hebreo puede designar tanto la ofrenda asociada con el pecado como la que trata la impureza ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  english_pob_choice: Then ... shall take
  chosen_spanish: Entonces ... tomará
  alternatives_spanish:
  - y tomará
  - y tomó
  lexicon: HALOT
  rationale: La secuencia waw + qatal continúa la instrucción ritual paso a paso. En español, «Entonces» comunica bien el avance procedural sin forzar una traducción demasiado literal de la conjunción.
- source_word: מִדַּם
  english_pob_choice: some of the blood
  chosen_spanish: parte de la sangre
  alternatives_spanish:
  - de la sangre
  - una porción de la sangre
  lexicon: HALOT
  rationale: La preposición min es partitiva aquí. «Parte de la sangre» conserva la idea de que no se toma toda la sangre, sino solo una porción para la aplicación ritual.
- source_word: הַחַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: la ofrenda por el pecado
  alternatives_spanish:
  - la ofrenda por la purificación
  - la ofrenda por el pecado
  lexicon: HALOT
  rationale: En este contexto levítico, חַטָּאת designa la ofrenda sacrificial, no solo el acto abstracto de pecar. «Ofrenda por el pecado» es claro y fiel; se mantiene la nota alternativa porque el término también puede referirse al rito de purificación.
- source_word: בְּאֶצְבָּעוֹ
  english_pob_choice: with his finger
  chosen_spanish: con su dedo
  alternatives_spanish:
  - por medio de su dedo
  - con el dedo
  lexicon: HALOT
  rationale: El ב es instrumental. «Con su dedo» expresa de manera natural el instrumento usado para aplicar la sangre.
- source_word: וְנָתַן עַל
  english_pob_choice: and put it on
  chosen_spanish: y la pondrá sobre
  alternatives_spanish:
  - y la colocará sobre
  - y la aplicará sobre
  lexicon: HALOT
  rationale: «Poner sobre» conserva la acción concreta del hebreo y suena natural en español ritual.
- source_word: קַרְנֹת
  english_pob_choice: the horns
  chosen_spanish: los cuernos
  alternatives_spanish:
  - las puntas
  - las protuberancias en forma de cuerno
  lexicon: HALOT
  rationale: En el lenguaje cultual del altar, «cuernos» es la equivalencia establecida y transparente.
- source_word: מִזְבַּח הָעֹלָה
  english_pob_choice: the altar of burnt offering
  chosen_spanish: del altar del holocausto
  alternatives_spanish:
  - del altar del holocausto
  - del altar del sacrificio quemado
  lexicon: HALOT
  rationale: «Holocausto» reproduce el término tradicional para עֹלָה en este nombre fijo del altar. Aunque «sacrificio quemado» es más descriptivo, no es la forma más idiomática en español bíblico para este sintagma técnico.
- source_word: וְאֶת־דָּמוֹ יִשְׁפֹּךְ
  english_pob_choice: and he shall pour out the rest of its blood
  chosen_spanish: y derramará el resto de su sangre
  alternatives_spanish:
  - y derramará su sangre
  - y vaciará su sangre
  lexicon: HALOT
  rationale: El hebreo dice literalmente «derramará su sangre»; en español se explicita «el resto» para reflejar la secuencia ya indicada por la toma previa de una parte de la sangre, tal como hace la audición inglesa.
- source_word: אֶל יְסוֹד
  english_pob_choice: at the base
  chosen_spanish: en la base
  alternatives_spanish:
  - al pie
  - sobre la base
  lexicon: HALOT
  rationale: יְסוֹד designa la base/fundamento del altar. «En la base» mantiene la localización simple y directa del derramamiento.
theological_decisions:
- issue: How to render חַטָּאת in sacrificial legislation
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda por la purificación
  rationale: El término hebreo puede señalar la ofrenda asociada con el pecado y también, según algunos enfoques, la purificación ritual que produce. En esta cláusula cultual, «ofrenda por el pecado» preserva la categoría sacrificial tradicional sin forzar una teoría expiatoria más estrecha. La alternativa se conserva porque existe una tensión lexical real en el término.
  doctrine_reference: Levítico 4; discusión léxica de חַטָּאת en contextos sacrificiales
translation_notes:
  revision_awareness: El texto base en inglés no recibió cambios recientes sustantivos; la traducción española sigue de cerca la audición POB y mantiene la misma decisión léxica para חַטָּאת, con la nota alternativa preservada en español. No se detectaron revisiones aplicadas en el registro fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo lo requiera; aquí no aparece el nombre divino.
  - Se usa «holocausto» como término técnico fijo para עֹלָה en el nombre del altar, coherente con el uso cultual tradicional en español.
  - «Ofensa/pecado» no se sustituyó por un término más abstracto porque el contexto ritual exige la categoría sacrificial concreta.
