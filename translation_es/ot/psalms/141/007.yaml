translation:
  language: es
  text: Como quien ara y quiebra la tierra[a], nuestros huesos han sido esparcidos a la boca de Sheol[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Como quien ara y parte la tierra». Los participios hebreos describen la acción con viveza y pueden verterse con verbos agrícolas ligeramente distintos.'
    reason: lexical_alternative
  - marker: b
    text: Sheol es el término hebreo para el reino de los muertos; tradicionalmente también se ha traducido «el sepulcro» y, con menos precisión en algunos contextos, «el infierno».
    reason: alternative_reading
lexical_decisions:
- source_word: כְּמוֹ
  english_pob_choice: As
  chosen_spanish: Como
  alternatives_spanish:
  - Como cuando
  - Al modo de
  lexicon: HALOT
  rationale: Introduce una comparación de manera natural en español y conserva el valor comparativo del hebreo sin añadir explicaciones.
- source_word: פֹלֵחַ
  english_pob_choice: plows
  chosen_spanish: ara
  alternatives_spanish:
  - labra
  - hace surcos
  - corta
  lexicon: HALOT
  rationale: El verbo apunta a trabajo agrícola sobre la tierra; 'ara' comunica bien la imagen y mantiene la sencillez idiomática del paralelo.
- source_word: וּבֹקֵעַ
  english_pob_choice: and breaks up
  chosen_spanish: y abre
  alternatives_spanish:
  - y rompe
  - y separa
  - y abre en pedazos
  lexicon: HALOT
  rationale: En paralelo con el primer verbo, la idea es partir o abrir la tierra. 'Abre' conserva el gesto físico sin endurecer el español innecesariamente.
- source_word: בָּאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - el terreno
  - la tierra
  lexicon: HALOT
  rationale: '''Tierra'' es una equivalencia natural para el campo que se trabaja y mantiene la imagen agrícola amplia del hebreo.'
- source_word: נִפְזְרוּ
  english_pob_choice: have been scattered
  chosen_spanish: han sido dispersados
  alternatives_spanish:
  - han sido esparcidos
  - fueron dispersados
  - están dispersados
  lexicon: HALOT
  rationale: El pasivo hebreo se refleja bien con una construcción pasiva en español; 'dispersados' conserva la fuerza de la desintegración corporal.
- source_word: עֲצָמֵינוּ
  english_pob_choice: our bones
  chosen_spanish: nuestros huesos
  alternatives_spanish:
  - los huesos de nosotros
  lexicon: HALOT
  rationale: Traducción literal y directa, necesaria para conservar la crudeza poética del verso.
- source_word: לְפִי
  english_pob_choice: at the mouth of
  chosen_spanish: a la boca de
  alternatives_spanish:
  - en la boca de
  - ante la boca de
  - junto a la boca de
  lexicon: HALOT
  rationale: '''Boca'' mantiene el hebraísmo concreto y la personificación de Sheol como una abertura devoradora; se evita suavizar la imagen.'
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Sheol
  alternatives_spanish:
  - el sepulcro
  - la tumba
  - el reino de los muertos
  lexicon: HALOT
  rationale: La transliteración preserva el término hebreo y evita cargar el texto con asociaciones posteriores no exigidas por el original.
theological_decisions:
- issue: Naturaleza de Sheol
  english_pob_reading: Sheol as the Hebrew term for the realm of the dead, not necessarily later doctrinal 'hell'
  chosen_spanish_reading: Sheol como término hebreo del reino de los muertos, sin identificarlo automáticamente con el infierno
  alternative_spanish_readings:
  - la tumba
  - el sepulcro
  - el infierno
  rationale: Mantener 'Sheol' en el texto principal preserva la tensión histórica y teológica del hebreo bíblico y evita resolver el término en una categoría doctrinal posterior.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente las notas [a] y [b] en el texto español y conservando el sentido poético-agricultural y la transliteración de Sheol del audit trail inglés.
  spanish_consistency_notes:
  - 'Se mantuvo un registro uniforme de imágenes concretas: ara/abre la tierra, huesos, boca de Sheol.'
  - Se preservó la transliteración 'Sheol' por consistencia con el criterio POB auditado.
  - Se evitó 'SEÑOR' u otra sustitución teológica no presente en este versículo.
  - La puntuación y el orden sintáctico buscan una lectura natural en español sin perder el paralelismo del hebreo.
