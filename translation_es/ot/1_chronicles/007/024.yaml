translation:
  language: es
  text: Y su hija fue Seerá[a], y edificó Bet-horón Baja y Bet-horón Alta[b], y Uzén-seerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y su hija, Seerá». El hebreo con la conjunción puede llevarse más literalmente, pero en español genealógico «Y su hija fue Seerá» suena natural.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «y la alta». El nombre «Bet-horón» se sobreentiende por el paralelismo con la frase anterior; se repite en español para claridad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִתּוֹ
  english_pob_choice: His daughter was
  chosen_spanish: Y su hija fue
  alternatives_spanish:
  - Y su hija
  - Y la hija de él fue
  lexicon: HALOT
  rationale: El hebreo coordinado con el sustantivo y sufijo posesivo introduce a la hija en una construcción genealógica. En español, «Y su hija fue» conserva la relación familiar y hace natural la identificación nominal con el nombre propio que sigue.
- source_word: שֶׁאֱרָה
  english_pob_choice: Sheerah
  chosen_spanish: Sera
  alternatives_spanish:
  - Seera
  - Sheerah
  lexicon: HALOT
  rationale: Es un nombre propio; se translitera al español de forma publicable. Se elige «Sera» como forma breve y natural en español, manteniendo el valor onomástico sin traducir el nombre.
- source_word: וַתִּבֶן
  english_pob_choice: she built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - edificó
  lexicon: HALOT
  rationale: El verbo בנה en este contexto de ciudades se rinde con «edificó» o «construyó». «Edificó» preserva el registro elevado y sigue de cerca el sentido de fundar/levantar estructuras sin añadir la idea de reconstrucción.
- source_word: בֵּית חוֹרוֹן הַתַּחְתּוֹן
  english_pob_choice: Lower Beth-horon
  chosen_spanish: Bet-horón la baja
  alternatives_spanish:
  - Bet-horón el inferior
  - Bet-horón la baja
  lexicon: HALOT
  rationale: El topónimo se conserva como nombre propio compuesto. El adjetivo hebreo se vierte de modo natural en español como «la baja», que corresponde mejor que una calca más rígida y mantiene el contraste con el lugar superior.
- source_word: הָעֶלְיוֹן
  english_pob_choice: Upper Beth-horon
  chosen_spanish: Bet-horón la alta
  alternatives_spanish:
  - Bet-horón la superior
  - Bet-horón la alta
  lexicon: HALOT
  rationale: Aunque el hebreo omite repetir «Beth-horon», el paralelo exige entenderlo. En español se repite el topónimo para claridad y se traduce el adjetivo como «la alta», de modo natural y fiel al contraste geográfico.
- source_word: אֻזֵּן שֶׁאֱרָה
  english_pob_choice: Uzzen-sheerah
  chosen_spanish: Uzen-Sera
  alternatives_spanish:
  - Uzzen-Sera
  - Uzen-shear
  lexicon: HALOT
  rationale: Se trata de otro topónimo compuesto. Se conserva como nombre propio unido por guion para señalar que es una sola unidad toponímica, siguiendo la función del inglés POB y adaptándolo a la ortografía española.
theological_decisions:
- issue: Mantenimiento de los nombres propios y de la genealogía sin armonizarla con fórmulas narrativas ajenas
  english_pob_reading: His daughter was Sheerah, and she built...
  chosen_spanish_reading: Y su hija fue Sera, y edificó...
  alternative_spanish_readings:
  - Y su hija, Sera, edificó...
  - Su hija era Sera, y edificó...
  rationale: El hebreo presenta una secuencia genealógica breve que introduce a la persona y luego su acción. La redacción española conserva esa estructura sin expandirla más de lo debido, manteniendo la relación entre identidad y obra tal como la transmite el texto.
  doctrine_reference: Principio de fidelidad textual y no ampliación interpretativa
translation_notes:
  revision_awareness: Se revisó el contexto auditado en inglés y no se detectaron cambios textuales posteriores; el pasaje mantiene el mismo sentido y la misma decisión de traducir el verbo como «build» y los topónimos como compuestos geográficos.
  spanish_consistency_notes:
  - Se usa «Bet-horón» para el topónimo, con guion, de manera consistente con el nombre compuesto.
  - Se mantiene el nombre propio como una transliteración española breve y uniforme.
  - Se preserva el contraste baja/alta sin introducir explicaciones adicionales en el texto principal.
