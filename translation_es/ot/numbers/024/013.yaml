translation:
  language: es
  text: Si Balac me diera su casa llena de plata y oro[a], no podría ir más allá de la palabra de Yahvé, para hacer bien o mal de mi propio corazón. Lo que Yahvé hable, eso hablaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'ir más allá de la boca de Yahvé'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם יִתֶּן
  english_pob_choice: If ... were to give
  chosen_spanish: Si ... me diera
  alternatives_spanish:
  - Si ... me da
  - Aunque ... me diera
  lexicon: HALOT
  rationale: La forma condicional con imperfecto expresa una hipótesis; en español, el subjuntivo imperfecto 'me diera' transmite bien ese valor potencial o irreal sin perder naturalidad.
- source_word: מְלֹא בֵיתוֹ כֶּסֶף וְזָהָב
  english_pob_choice: his house full of silver and gold
  chosen_spanish: su casa llena de plata y oro
  alternatives_spanish:
  - la plenitud de su casa de plata y oro
  - su casa colmada de plata y oro
  lexicon: HALOT
  rationale: La imagen de abundancia se mantiene con una construcción idiomática y clara en español, sin borrar el sentido literal de plenitud y riqueza.
- source_word: לֹא אוּכַל
  english_pob_choice: I could not
  chosen_spanish: no podría
  alternatives_spanish:
  - no puedo
  - no podría llegar a
  lexicon: HALOT
  rationale: El condicional español concuerda con la cláusula hipotética inicial y refleja la incapacidad declarada en ese marco condicional.
- source_word: לַעֲבֹר אֶת־פִּי יְהוָה
  english_pob_choice: go beyond the word of Yahweh
  chosen_spanish: pasar por encima de la palabra de Yahvé
  alternatives_spanish:
  - traspasar la palabra de Yahvé
  - ir más allá de la palabra de Yahvé
  lexicon: HALOT
  rationale: '''Pasar por encima de'' conserva la metáfora de exceder un límite verbal. Se eligió ''palabra'' porque en español comunica con claridad el sentido auditivo del hebreo ''boca'' en este contexto, sin introducir una paráfrasis doctrinalmente cargada.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva la convención de la POB española para el Tetragrámaton: ''Yahvé'', manteniendo el nombre propio divino en lugar de una sustitución titulada.'
- source_word: לַעֲשׂוֹת טוֹבָה אוֹ רָעָה
  english_pob_choice: to do good or evil
  chosen_spanish: para hacer bien o mal
  alternatives_spanish:
  - para hacer lo bueno o lo malo
  - para hacer justicia o maldad
  lexicon: HALOT
  rationale: '''Bien o mal'' reproduce la polaridad moral del hebreo de forma natural en español. Se evita ''lo bueno/lo malo'' por ser menos directo en este contexto.'
- source_word: מִלִּבִּי
  english_pob_choice: from my own heart
  chosen_spanish: por mi propia voluntad
  alternatives_spanish:
  - desde mi propio corazón
  - de mi corazón
  lexicon: HALOT
  rationale: '''Desde mi propio corazón'' sería más literal, pero ''por mi propia voluntad'' comunica en español la idea de iniciativa propia frente a la palabra divina. Se elige esta opción por claridad idiomática, manteniendo la tensión del texto entre origen interno y palabra recibida.'
- source_word: אֲשֶׁר יְדַבֵּר יְהוָה אֹת֥וֹ
  english_pob_choice: Whatever Yahweh speaks, that I will speak
  chosen_spanish: Lo que Yahvé hable, eso hablaré
  alternatives_spanish:
  - Lo que Yahvé diga, eso hablaré
  - Todo lo que Yahvé hable, eso hablaré
  lexicon: HALOT
  rationale: La estructura resumptiva se conserva con 'Lo que ... eso'. 'Hable' mantiene el tiempo y el valor prospectivo del hebreo, y 'hablaré' reproduce la respuesta directa de Balaam.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La lectura auditada de la POB en inglés usa el nombre divino como transliteración. En español, la forma estándar del proyecto es 'Yahvé', preservando el nombre propio y no sustituyéndolo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Balaam's stated limitation before God
  english_pob_reading: Balaam cannot act or speak independently of Yahweh's word
  chosen_spanish_reading: No puede ir más allá de la palabra de Yahvé ni hablar por voluntad propia
  alternative_spanish_readings:
  - No puede desobedecer la orden de Yahvé
  - No puede añadir ni quitar a lo que Yahvé diga
  rationale: 'La frase mantiene el doble límite del texto: no exceder la palabra divina y no actuar desde iniciativa propia. Así se conserva la tensión literal y teológica sin ampliar indebidamente el alcance del versículo.'
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se corrigió el anclaje de nota al incluir [a] en el texto principal, ajustando la puntuación para que la nota corresponda exactamente al segmento 'oro[a]'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para el Tetragrámaton.
  - Se mantiene 'palabra' en el cuerpo principal siguiendo la equivalencia funcional auditada de la POB en inglés.
  - Se conserva la polaridad moral 'bien o mal' sin suavizarla.
  - La nota de pie de página marca la alternativa literal del hebreo 'boca', sin introducir una segunda nota innecesaria.
