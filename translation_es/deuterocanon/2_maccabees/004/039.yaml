    issue: «la noticia se había difundido afuera»
    rationale: Aunque refleja literalmente ἔξω, en español bíblico natural aquí conviene explicitar «fuera de la ciudad», dado que el griego se refiere a la propagación externa del reporte, no a un adverbio coloquial aislado.
  - severity: medium
    issue: «habían sido arrebatados» para διηρπαγμένων
    rationale: «Arrebatados» puede funcionar, pero «saqueados» o «despojados» preserva mejor el matiz de pillaje/plunder que el inglés POB documenta y que el contexto de robo sacrílego exige.
