review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: la madre contempla sucesivamente a sus hijos mientras son torturados y quemados, y permanece firme por su εὐσέβεια. Sin embargo, «cómo uno por uno eran torturados» introduce una subordinación menos ceñida al distributivo καθʼ ἓν y cambia el foco desde «cada uno» a una descripción más libre. Además, «no cambió por su piedad» suena algo brusco y poco idiomático en español bíblico actual.'
  spanish_quality_summary: El español es claro, pero puede mejorarse en naturalidad y precisión. «Al ver a cada uno torturado[a] y quemado» es más directo, más cercano al original y evita la construcción algo pesada «cómo uno por uno eran…». También conviene «no cambió a causa de su piedad», que conserva la literalidad causal sin sonar tan abrupto como «por su piedad».
  glossary_alignment: La elección «piedad» para εὐσέβεια está bien alineada con la justificación documentada y con la terminología del proyecto. No hay conflictos con términos doctrinales principales. La nota sobre στρεβλούμενον como posible referencia al potro de tortura está bien preservada.
  issues:
  - severity: medium
    issue: «cómo uno por uno eran torturados» es menos fiel a καθʼ ἓν
    rationale: El griego distribuye sobre los individuos («cada uno» / «uno por uno») dentro de la percepción de la madre; la redacción española actual introduce una estructura explicativa con «cómo» que se aleja de la forma y puede sonar más interpretativa.
  - severity: low
    issue: «no cambió por su piedad» suena poco idiomático
    rationale: Aunque es comprensible, en español natural y digno resulta más claro «no cambió a causa de su piedad», que conserva la relación causal de διὰ τὴν εὐσέβειαν.
  revised_spanish_text: Al ver a cada uno torturado[a] y quemado, la madre no cambió a causa de su piedad.
  revised_footnotes:
