revisions:
- from: Cuando los ammonitas vieron que se habían hecho odiosos[a] a David, Hanún y los ammonitas enviaron mil talentos de plata para alquilar para sí carros y jinetes de Aram-naharaim, de Aram-Maacá y de Zobá.
  to: Cuando los amonitas vieron que se habían hecho odiosos[a] a David, Hanún y los amonitas enviaron mil talentos de plata para contratar para sí carros y jinetes de Aram-naharaim, de Aram-maacá y de Zobá.
  rationale: Se corrigió la forma española del etnónimo ('amonitas'), se reemplazó 'alquilar' por 'contratar' para reflejar mejor la contratación de fuerzas militares, se uniformó la transliteración del topónimo compuesto y se ajustó la nota para explicar con más precisión el modismo hebreo sin perder su fuerza. No se requiere adjudicación adicional porque los cambios son claros y de bajo riesgo interpretativo.
  reviewer_model: gpt-5.4
