translation:
  language: es
  text: 'Y yo restauraré sus fortunas[a]: las fortunas de Sodoma y sus hijas[b], y las fortunas de Samaria y sus hijas; y tus fortunas en medio de ellas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «restauraré su cautiverio» / «haré volver a sus cautivos». Este modismo hebreo a menudo significa revertir la condición de un pueblo, por lo que puede traducirse «restaurar fortunas».
    reason: lexical_alternative
  - marker: b
    text: «Hijas» aquí se refiere a ciudades dependientes o asentamientos circundantes asociados con Sodoma y Samaria.
    reason: cultural_note
lexical_decisions:
- source_word: וְשַׁבְתִּי
  english_pob_choice: And I will restore
  chosen_spanish: y yo restauraré
  alternatives_spanish:
  - y yo traeré de vuelta
  - y yo devolveré
  lexicon: HALOT
  rationale: El hebreo usa שוב en sentido causativo de reversión/restauración. «Restauraré» transmite bien la idea de revertir una condición, no solo un movimiento físico.
- source_word: שְׁבִיתְהֶן / שבית / שְׁבִיתַיִךְ
  english_pob_choice: fortunes
  chosen_spanish: fortunas
  alternatives_spanish:
  - cautiverio
  - cautivos
  lexicon: HALOT
  rationale: Sigo la lectura idiomática del hebreo como reversión de estado. «Fortunas» es la forma española más natural para conservar ese sentido amplio sin volverlo demasiado literal o forzado.
- source_word: סְדֹם
  english_pob_choice: Sodom
  chosen_spanish: Sodoma
  alternatives_spanish:
  - Sodom
  lexicon: standard proper-name rendering
  rationale: «Sodoma» es la forma española bíblica estándar y plenamente inteligible.
- source_word: וּבְנוֹתֶיהָ
  english_pob_choice: and her daughters
  chosen_spanish: y sus hijas
  alternatives_spanish:
  - y sus ciudades dependientes
  - y sus aldeas dependientes
  lexicon: HALOT
  rationale: Mantengo la metáfora literal de «hijas», como en el texto fuente, y dejo su aclaración para la nota, porque el hebreo conserva intencionalmente esa relación figurada.
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  alternatives_spanish:
  - Samaría
  lexicon: standard proper-name rendering
  rationale: «Samaria» es la forma española establecida y más común en registros bíblicos.
- source_word: בְּתוֹכָהְנָה
  english_pob_choice: among them
  chosen_spanish: en medio de ellas
  alternatives_spanish:
  - entre ellas
  - en su midst
  lexicon: HALOT
  rationale: «En medio de ellas» conserva bien el valor idiomático de estar situado entre las otras ciudades/entidades restauradas, con un tono natural en español bíblico.
theological_decisions:
- issue: Alcance del idiomático 'restaurar las fortunas'
  english_pob_reading: Render the idiom as restoration of fortunes rather than a narrowly literal return from captivity.
  chosen_spanish_reading: Traducirlo como reversión/restauración de la condición, no como simple retorno físico.
  alternative_spanish_readings:
  - restaurar su cautiverio
  - traer de vuelta a sus cautivos
  rationale: Con Sodoma incluida, la fórmula hebrea apunta a una restauración más amplia que una repatriación histórica. «Restauraré sus fortunas» preserva esa amplitud y la fuerza profética del pasaje.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Referente de 'hijas' para Sodoma y Samaria
  english_pob_reading: Keep the familial metaphor in the main text.
  chosen_spanish_reading: Conservar la metáfora de parentesco en el texto principal.
  alternative_spanish_readings:
  - sus ciudades
  - sus aldeas
  rationale: El hebreo usa 'hijas' para comunidades dependientes. Mantener la imagen evita perder la estructura metafórica del pasaje, mientras la nota aclara el sentido geográfico.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Coincido con el control de revisión en que no se requieren cambios respecto del sentido auditado: la formulación preserva el idiomatismo hebreo de restauración, mantiene la metáfora de ''hijas'' y refleja el valor locativo de ''en medio de ellas''.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece.
  - Se conserva el lenguaje metafórico de «hijas» para no aplanar la estructura poética/urbana del hebreo.
  - «Fortunas» se usa de manera consistente como equivalente idiomático de שְׁבִית/שְׁבוּת en esta cláusula.
