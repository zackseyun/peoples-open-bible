    reason: lexical_alternative
  revision_rationale: Se ajusta la preposición a «en toda la tierra de Egipto» para reflejar correctamente la extensión territorial expresada en hebreo y en la auditoría inglesa. Se elimina la exclamación para mantener un registro más natural y digno en español bíblico moderno. Se suprime la nota basada en una formulación española poco idiomática («vienen de gran abundancia») y se conserva una nota alternativa que sí representa una posibilidad real del orden hebreo.
