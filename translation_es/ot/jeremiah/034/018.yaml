translation:
  language: es
  text: Y entregaré a los hombres que quebrantaron mi pacto[a], que no cumplieron las palabras[b] del pacto que hicieron delante de mí[c], el becerro que partieron en dos y pasaron entre sus pedazos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘que violaron mi pacto’. El verbo hebreo literalmente significa ‘pasaron por encima de / transgredieron’, y hace eco de la frase posterior ‘pasaron entre sus pedazos’.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘las palabras del pacto’; es decir, sus estipulaciones o términos.'
    reason: lexical_alternative
  - marker: c
    text: El rito de cortar un animal y pasar entre sus pedazos era un acto de establecimiento del pacto que invocaba juicio sobre quien lo quebrantara; compárese Génesis 15:9–17.
    reason: cultural_note
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will hand over
  chosen_spanish: Y entregaré
  alternatives_spanish:
  - Y daré
  - Y pondré en manos de
  lexicon: HALOT
  rationale: En contextos de juicio, נתן suele expresar poner a alguien en poder de otro. 'Entregaré' comunica bien esa idea en español sin perder la fuerza judicial del verbo.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los varones
  lexicon: HALOT
  rationale: El hebreo se refiere a los varones concretos implicados en el pacto. 'Los hombres' conserva el referente masculino plural de manera natural en español.
- source_word: הָעֹבְרִים אֶת־בְּרִיתִי
  english_pob_choice: who transgressed my covenant
  chosen_spanish: que quebrantaron mi pacto
  alternatives_spanish:
  - que transgredieron mi pacto
  - que violaron mi pacto
  - que pasaron por encima de mi pacto
  lexicon: HALOT
  rationale: עבר con lenguaje de pacto es idiomático para infringirlo. 'Quebrantaron' expresa bien la infracción del pacto en español y mantiene el peso moral/jurídico.
- source_word: הֵקִימוּ אֶת דִּבְרֵי הַבְּרִית
  english_pob_choice: did not uphold the words of the covenant
  chosen_spanish: no cumplieron las palabras del pacto
  alternatives_spanish:
  - no sostuvieron las palabras del pacto
  - no guardaron los términos del pacto
  - no cumplieron las estipulaciones del pacto
  lexicon: HALOT
  rationale: הקים aquí significa confirmar, sostener o poner en vigor las cláusulas del pacto. 'Cumplieron' es una forma natural de expresar su incumplimiento, y 'palabras del pacto' preserva la imagen hebrea de las cláusulas pactales.
- source_word: כָּרְתוּ לְפָנַי
  english_pob_choice: that they made before me
  chosen_spanish: que hicieron delante de mí
  alternatives_spanish:
  - que hicieron en mi presencia
  - que cortaron delante de mí
  lexicon: HALOT
  rationale: En español, 'hacer un pacto' es idiomático y fiel. 'Delante de mí' conserva el carácter solemne y testimonial de la presencia divina.
- source_word: הָעֵגֶל
  english_pob_choice: the calf
  chosen_spanish: el becerro
  alternatives_spanish:
  - el ternero
  - el novillo
  lexicon: HALOT
  rationale: עגל puede referirse a un bovino joven; 'becerro' es natural y adecuado para el rito sacrificial descrito.
- source_word: כָּרְתוּ לִשְׁנַיִם
  english_pob_choice: that they cut in two
  chosen_spanish: que partieron en dos
  alternatives_spanish:
  - que cortaron en dos
  - que dividieron en dos
  lexicon: HALOT
  rationale: La expresión describe la división ritual del animal. 'Partieron en dos' es clara, viva y cercana al hebreo.
- source_word: וַיַּעַבְרוּ בֵּין בְּתָרָיו
  english_pob_choice: and passed between its pieces
  chosen_spanish: y pasaron entre sus pedazos
  alternatives_spanish:
  - y pasaron entre sus partes
  - y caminaron entre sus trozos
  lexicon: HALOT
  rationale: '''Pedazos'' comunica en español la carne seccionada del animal de forma concreta y comprensible, manteniendo el acto ritual descrito.'
theological_decisions:
- issue: Relación entre el becerro partido y los hombres bajo juicio
  english_pob_reading: Render the clause comparatively/appositionally without adding an explicit 'like' or a full explanatory consequence.
  chosen_spanish_reading: 'Mantener la yuxtaposición: ''el becerro que partieron en dos y pasaron entre sus pedazos''.'
  alternative_spanish_readings:
  - como el becerro que partieron en dos
  - y haré que sean como el becerro
  rationale: El hebreo presenta el objeto ritual de manera compacta; añadir una comparación explícita o una consecuencia completa iría más allá del verso. La redacción española conserva la tensión interpretativa y deja que el contexto inmediato la aclare.
  doctrine_reference: Principios de traducción POB §1, §3, §6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB al omitir cualquier ‘como’ comparativo antes de ‘el becerro’, porque el hebreo presenta la cláusula de forma yuxtapuesta/appositiva. También conserva la terminología de pacto y el eco verbal entre 'quebrantaron' y 'pasaron entre'.
  spanish_consistency_notes:
  - Se usa 'pacto' para בְּרִית, coherente con el registro bíblico y con la audit trail en inglés.
  - Se evita 'SEÑOR' porque el texto no contiene el Tetragrámaton, sino la expresión 'delante de mí'.
  - '''Becerro'' se eligió por naturalidad y por adecuación al rito de pacto descrito.'
  - La nota [a] se ancla en 'hombres' para señalar la alternativa lexical sobre la transgresión del pacto, equivalente a la nota inglesa sobre עבר.
