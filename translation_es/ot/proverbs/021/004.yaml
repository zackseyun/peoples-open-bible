translation:
  language: es
  text: Los ojos altivos y el corazón orgulloso—la lámpara[a] de los impíos—son pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «la labranza», «el cultivo» o «el barbecho de los impíos». La palabra hebrea traducida aquí como «lámpara» también puede entenderse en sentido agrícola.
    reason: alternative_reading
lexical_decisions:
- source_word: רוּם עֵינַיִם
  english_pob_choice: Haughty eyes
  chosen_spanish: ojos altivos
  alternatives_spanish:
  - ojos altaneros
  - ojos soberbios
  lexicon: HALOT
  rationale: La construcción hebrea expresa arrogancia mediante una imagen corporal. «Ojos altivos» conserva la metáfora y suena natural en español; «altaneros» o «soberbios» serían posibles, pero «altivos» mantiene mejor el valor idiomático y el tono sapiencial.
- source_word: וּרְחַב לֵב
  english_pob_choice: a proud heart
  chosen_spanish: el corazón orgulloso
  alternatives_spanish:
  - un corazón ancho
  - un corazón ensanchado
  lexicon: HALOT
  rationale: En contexto sapiencial, «ancho/ensanchado de corazón» puede sugerir magnanimidad en otros pasajes, pero aquí el paralelo con «ojos altivos» exige el sentido de autosuficiencia y arrogancia. «Orgulloso» comunica ese valor moral sin perder la imagen del corazón.
- source_word: נִר
  english_pob_choice: lamp
  chosen_spanish: la lámpara
  alternatives_spanish:
  - la labranza
  - el cultivo
  - el barbecho
  lexicon: HALOT
  rationale: 'Sigo la lectura de la tradición principal adoptada en el texto inglés: «lámpara». En español, «lámpara» conserva la imagen de guía o prosperidad del impío; la lectura agrícola queda preservada aparte en la nota, porque también es plausible a nivel léxico.'
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  lexicon: HALOT
  rationale: «Impíos» es un término bíblico claro y sobrio para la clase moral designada por el hebreo. «Malvados» es posible, pero «impíos» encaja mejor con el registro sapiencial y con la oposición ética del proverbio.
- source_word: חַטָּאת
  english_pob_choice: are sin
  chosen_spanish: son pecado
  alternatives_spanish:
  - es pecado
  - son pecaminosos
  lexicon: HALOT
  rationale: Mantengo el sustantivo «pecado» para reflejar la fuerza nominal del hebreo y la opción inglesa «are sin». Aunque en español suena algo más enfático que «son pecaminosos», preserva mejor la identificación directa entre el conjunto descrito y el pecado.
theological_decisions:
- issue: Lectura de נִר רְשָׁעִים
  english_pob_reading: the lamp of the wicked
  chosen_spanish_reading: la lámpara de los impíos
  alternative_spanish_readings:
  - la labranza de los impíos
  - el cultivo de los impíos
  - el barbecho de los impíos
  rationale: La POB inglesa eligió la lectura «lamp», pero reconoció la alternativa agrícola. En español, «lámpara» mantiene la lectura principal y la unidad sintáctica del proverbio; la alternativa agrícola se conserva como nota porque es textual y léxicamente viable, no una corrección doctrinal.
  doctrine_reference: Translation philosophy §3, §5
- issue: Valor de חַטָּאת al final del proverbio
  english_pob_reading: are sin
  chosen_spanish_reading: son pecado
  alternative_spanish_readings:
  - es pecado
  - son pecaminosos
  rationale: El hebreo usa un sustantivo, no un adjetivo. Traducir «son pecado» preserva la identificación nominal de lo descrito con la realidad del pecado. «Son pecaminosos» suavizaría la estructura y perdería parte de la fuerza del hebreo.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El contexto de revisión muestra alto acuerdo y ningún cambio textual necesario en el audit trail inglés; por eso la versión española sigue la lectura principal de «lámpara» y preserva la alternativa agrícola únicamente en nota.
  spanish_consistency_notes:
  - He usado «impíos» para רְשָׁעִים de forma consistente con el registro sapiencial.
  - He mantenido el sustantivo «pecado» al final para conservar la fuerza nominal del hebreo.
  - La nota marca la alternativa agrícola sin introducirla en el texto principal, de acuerdo con la decisión inglesa auditada.
