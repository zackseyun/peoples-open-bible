translation:
  language: es
  text: El duodécimo día, el jefe de los hijos de Neftalí fue Ahirá hijo de Enán.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּיוֹם / בְּ/יוֹם
  english_pob_choice: On the ... day
  chosen_spanish: El ... día
  alternatives_spanish:
  - En el ... día
  - Al ... día
  lexicon: HALOT
  rationale: 'La expresión temporal hebrea se naturaliza en español como una construcción ordinal con artículo: «el duodécimo día». Conserva el valor temporal sin forzar una calca preposicional innecesaria.'
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelfth
  chosen_spanish: duodécimo
  alternatives_spanish:
  - doceavo
  - doce
  lexicon: HALOT
  rationale: Con יוֹם la secuencia expresa un ordinal. «Duodécimo» es la forma más natural y precisa en español para el día doce.
- source_word: יוֹם
  english_pob_choice: day
  chosen_spanish: día
  alternatives_spanish:
  - jornada
  lexicon: HALOT
  rationale: Se conserva el sustantivo temporal básico «día», como en el hebreo y en la traducción inglesa auditada.
- source_word: נָשִׂיא
  english_pob_choice: leader
  chosen_spanish: líder
  alternatives_spanish:
  - jefe
  - príncipe
  - caudillo
  lexicon: HALOT
  rationale: En contexto tribal, נָשִׂיא designa al cabeza reconocido del grupo. «Líder» comunica bien el rango sin introducir connotaciones monárquicas que «príncipe» podría sugerir en español.
- source_word: לִבְנֵי נַפְתָּלִי
  english_pob_choice: of the sons of Naphtali
  chosen_spanish: de los hijos de Neftalí
  alternatives_spanish:
  - de los descendientes de Neftalí
  - para los hijos de Neftalí
  lexicon: HALOT
  rationale: Se mantiene la designación tribal masculina plural como en el hebreo y en la lectura auditada inglesa, con una relación posesiva/apposicional natural en español.
- source_word: אֲחִירַע
  english_pob_choice: Ahira
  chosen_spanish: Ahirá
  alternatives_spanish:
  - Ahira
  lexicon: Transliteración bíblica estándar
  rationale: Se translitera el nombre propio con acento final para reflejar la pronunciación española natural y mantener la identidad del nombre sin traducirlo.
- source_word: בֶּן עֵינָן
  english_pob_choice: son of Enan
  chosen_spanish: hijo de Enán
  alternatives_spanish:
  - hijo de Enan
  lexicon: HALOT
  rationale: La construcción patronímica se traduce directamente. El acento en «Enán» sigue la adaptación gráfica española usual para nombres bíblicos agudos.
theological_decisions:
- issue: Designación tribal masculina בְּנֵי
  english_pob_reading: sons of Naphtali
  chosen_spanish_reading: hijos de Neftalí
  alternative_spanish_readings:
  - hijos e hijas de Neftalí
  - descendientes de Neftalí
  rationale: Se preserva el plural masculino genérico/tribal del hebreo, como hace la lectura inglesa auditada con «sons», evitando neutralizar una fórmula técnica de filiación tribal sin necesidad contextual.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requieren cambios y que hay alto grado de acuerdo entre auditoría y fuente. La presente redacción sigue esa lectura sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «hijos de Neftalí» por consistencia con la terminología tribal masculina del hebreo.
  - Se usa «líder» para נָשִׂיא, coherente con la decisión inglesa de evitar «príncipe» por sus connotaciones ajenas al contexto.
  - Los nombres propios se transliteran y se adaptan ortográficamente al español cuando procede, sin traducirlos.
