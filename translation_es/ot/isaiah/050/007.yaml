  rationale: 'Se revisa principalmente la apertura para reflejar con mayor fidelidad y naturalidad la combinación hebrea אֲדֹנָי יְהוִה conforme a la política del proyecto sobre «Yahvé»: «el Señor Yahvé». También se ajusta «puse mi rostro» a «he puesto mi rostro» para un español más natural que conserva la imagen hebrea y encaja mejor con el desarrollo del versículo. Se elimina la nota sobre «y sé», porque no responde a una alternativa significativa preservada en el inglés ni es necesaria para evitar ambigüedad en español.'
