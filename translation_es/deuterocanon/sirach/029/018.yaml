translation:
  language: es
  text: La fianza[a] ha destruido a muchos que eran rectos, y los ha sacudido como una ola del mar; ha expulsado a hombres poderosos de sus hogares, y vagaron entre naciones extranjeras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘garantía’ o ‘salir fiador’. El término griego se refiere a convertirse en garantía por la deuda de otra persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγγύη
  english_pob_choice: Surety
  chosen_spanish: fianza
  alternatives_spanish:
  - garantía
  - salida de fiador
  - salir fiador
  lexicon: LSJ
  rationale: El término griego designa la asunción de seguridad por la deuda o responsabilidad de otro. En español, «fianza» conserva bien el campo jurídico-financiero y es natural; «salir fiador» explicita la acción, pero pierde concisión como sustantivo.
- source_word: ἀπώλεσεν
  english_pob_choice: has destroyed
  chosen_spanish: ha destruido
  alternatives_spanish:
  - ha arruinado
  - ha llevado a la ruina
  lexicon: LSJ
  rationale: «Ha destruido» mantiene la fuerza del verbo sin reducirlo a una simple pérdida económica. En este contexto, el daño recae sobre la estabilidad y la vida de las personas, no necesariamente sobre su existencia física.
- source_word: κατευθύνοντας
  english_pob_choice: who were upright
  chosen_spanish: que iban rectamente
  alternatives_spanish:
  - que eran rectos
  - que prosperaban
  - que iban por buen camino
  lexicon: LSJ
  rationale: La forma participial sugiere ir derecho o en línea recta. Dado que el propio audit trail corrigió una lectura de prosperidad hacia «upright», «iban rectamente» conserva la imagen de dirección recta sin convertirla en una afirmación moral más fuerte de lo que exige el griego.
- source_word: ἐσάλευσεν
  english_pob_choice: has shaken
  chosen_spanish: los ha sacudido
  alternatives_spanish:
  - los ha hecho tambalear
  - los ha agitado
  lexicon: LSJ
  rationale: El verbo expresa sacudir o hacer temblar; «los ha sacudido» reproduce bien esa acción y enlaza naturalmente con la comparación marítima que sigue.
- source_word: ὡς κῦμα θαλάσσης
  english_pob_choice: like a wave of the sea
  chosen_spanish: como una ola del mar
  alternatives_spanish:
  - como una ola marina
  - como la ola del mar
  lexicon: LSJ
  rationale: «Ola del mar» es la forma más natural en español y conserva la imagen singular y vívida del símil griego.
- source_word: ἄνδρας δυνατούς
  english_pob_choice: mighty men
  chosen_spanish: hombres poderosos
  alternatives_spanish:
  - hombres fuertes
  - varones poderosos
  lexicon: LSJ
  rationale: La expresión refiere a hombres con fuerza o peso social. «Hombres poderosos» comunica dignidad y capacidad sin perder el masculino explícito de ἄνδρας.
- source_word: ἀπῴκισεν
  english_pob_choice: has driven from their homes
  chosen_spanish: ha expulsado de sus hogares
  alternatives_spanish:
  - ha desterrado
  - ha enviado lejos de sus tierras
  - ha sacado de sus casas
  lexicon: LSJ
  rationale: El verbo indica remover o apartar de la propia morada o país. «Ha expulsado de sus hogares» hace explícito el desplazamiento y encaja con la cláusula siguiente sobre el andar entre naciones extranjeras.
- source_word: ἐπλανήθησαν
  english_pob_choice: they wandered
  chosen_spanish: anduvieron
  alternatives_spanish:
  - vagaron
  - anduvieron errantes
  lexicon: LSJ
  rationale: En este contexto la idea principal es el desplazamiento físico entre pueblos extraños. «Anduvieron» mantiene la sencillez del relato; «errantes» podría sonar más interpretativo.
- source_word: ἐν ἔθνεσιν ἀλλοτρίοις
  english_pob_choice: among foreign nations
  chosen_spanish: entre naciones extranjeras
  alternatives_spanish:
  - entre pueblos extraños
  - en naciones ajenas
  lexicon: LSJ
  rationale: La frase expresa pueblos que no pertenecen a los suyos. «Naciones extranjeras» es claro en español moderno y preserva la fuerza social y geográfica del original.
theological_decisions:
- issue: Alcance moral de κατευθύνοντας
  english_pob_reading: who were upright
  chosen_spanish_reading: que iban rectamente
  alternative_spanish_readings:
  - que eran rectos
  - que prosperaban
  rationale: El texto griego literalmente apunta a quienes iban en línea recta o bien encaminados. Se evita sobrecargar la frase con un juicio moral absoluto; «iban rectamente» conserva la dirección correcta sin perder la tensión entre rectitud y prosperidad que el contexto admite.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Referencia masculina de ἄνδρας δυνατούς
  english_pob_reading: mighty men
  chosen_spanish_reading: hombres poderosos
  alternative_spanish_readings:
  - personas poderosas
  - seres fuertes
  rationale: El griego usa ἄνδρας, término masculino específico. Se conserva la referencia masculina en español en lugar de neutralizarla, siguiendo la precisión de género del texto fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido de la metáfora marítima
  english_pob_reading: has shaken them like a wave of the sea
  chosen_spanish_reading: los ha sacudido como una ola del mar
  alternative_spanish_readings:
  - los ha agitado como el mar
  - los ha lanzado como una ola
  rationale: La comparación debe quedar visible y no diluirse en una paráfrasis. «Como una ola del mar» reproduce la imagen con naturalidad en español y preserva la fuerza poética del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: El audit trail inglés corrigió la primera cláusula desde una lectura de prosperidad hacia una de rectitud («who were upright»). La versión española sigue esa revisión, traduciendo κατευθύνοντας con una imagen de ir rectamente en vez de prosperar. El resto del verso se mantiene en línea con la traducción inglesa revisada y con el sentido griego directo.
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma del proyecto cuando aparezca el nombre divino; no aplica en este versículo.
  - Se mantiene «hombres» para ἄνδρας por precisión de género.
  - «Naciones extranjeras» se eligió por claridad moderna y equivalencia natural con ἔθνεσιν ἀλλοτρίοις.
  - La nota de pie marca la ambigüedad léxica principal de ἐγγύη sin introducir variantes innecesarias en el cuerpo del texto.
