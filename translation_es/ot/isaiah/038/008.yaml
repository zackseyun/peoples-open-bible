translation:
  language: es
  text: He aquí[a], haré que la sombra retroceda diez escalones, que había bajado por los escalones de Acaz[b] por el sol. Y el sol retrocedió diez escalones por los escalones por los cuales había bajado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mira». El hebreo es una fórmula solemne de introducción; «He aquí» conserva mejor ese tono, mientras que «Mira» puede comunicar la fuerza demostrativa en español más actual.
    reason: lexical_alternative
  - marker: b
    text: O «el dial de Acaz». El hebreo dice literalmente «los escalones de Acaz», que puede referirse a una estructura usada para marcar la sombra del sol.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: ¡Mira[a]!
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: La fórmula introduce una घोषणा solemne. En español, «¡Mira!» comunica la fuerza demostrativa con naturalidad; se mantiene el valor discursivo elevado sin sonar arcaico. Se marca la alternativa porque el inglés POB optó por «Behold» y aquí «He aquí» es posible pero menos natural en español actual.
- source_word: מֵשִׁיב
  english_pob_choice: I will make ... go back
  chosen_spanish: haré que ... retroceda
  alternatives_spanish:
  - haré volver
  - haré retornar
  lexicon: HALOT
  rationale: El hiphil expresa causalidad. «Haré que ... retroceda» conserva el sentido causativo de manera idiomática en español y evita una construcción forzada.
- source_word: צֵל
  english_pob_choice: the shadow
  chosen_spanish: la sombra
  alternatives_spanish:
  - la sombra proyectada
  lexicon: HALOT
  rationale: El referente literal es la sombra visible del signo. «La sombra» es la correspondencia directa y suficiente en español.
- source_word: מַעֲלוֹת
  english_pob_choice: steps
  chosen_spanish: escalones
  alternatives_spanish:
  - grados
  - peldaños
  - escalones/ grados
  lexicon: HALOT
  rationale: El término hebreo significa literalmente «escalones» o «subidas». «Escalones» preserva la imaginería concreta. Se evita «grados» como traducción principal, aunque sigue siendo una alternativa interpretativa posible en el trasfondo del signo.
- source_word: בְמַעֲלוֹת אָחָז
  english_pob_choice: on the steps of Ahaz
  chosen_spanish: por los escalones de Acaz
  alternatives_spanish:
  - en los escalones de Acaz
  - en el dial de Acaz
  - en la escalera de Acaz
  lexicon: HALOT
  rationale: La frase hebrea nombra una estructura asociada con Acaz. «Por los escalones de Acaz» sigue de cerca la superficie del hebreo y mantiene abierta la identificación exacta del mecanismo; no se sustituye por «dial» sin base textual explícita.
- source_word: בַּשֶּׁמֶשׁ
  english_pob_choice: by the sun
  chosen_spanish: al sol
  alternatives_spanish:
  - por el sol
  - con el sol
  lexicon: HALOT
  rationale: En este contexto el sol funciona como el marco del movimiento de la sombra. «Al sol» integra con naturalidad la relación espacial/observacional sin añadir explicación ajena al texto.
- source_word: אֲחֹרַנִּית
  english_pob_choice: go back
  chosen_spanish: retroceda / retrocedió
  alternatives_spanish:
  - vuelva atrás
  - regrese hacia atrás
  lexicon: HALOT
  rationale: El adverbio expresa movimiento hacia atrás. En español se integra mejor en el verbo «retroceder» que en una expresión adverbial aparte.
- source_word: עֶשֶׂר מַעֲלוֹת
  english_pob_choice: ten steps
  chosen_spanish: diez pasos
  alternatives_spanish:
  - diez escalones
  - diez grados
  lexicon: HALOT
  rationale: Se mantiene el conteo literal con un sustantivo concreto. «Pasos» refleja bien la opción inglesa y es natural en español; «grados» queda como lectura alternativa vinculada a la tradición del instrumento solar.
- source_word: וַתָּשָׁב הַשֶּׁמֶשׁ
  english_pob_choice: And the sun went back
  chosen_spanish: Y el sol retrocedió
  alternatives_spanish:
  - Y el sol volvió atrás
  - Y el sol retornó
  lexicon: HALOT
  rationale: El hebreo atribuye el movimiento al sol en forma narrativa. «Retrocedió» comunica el desplazamiento inverso sin suavizar el efecto del signo.
- source_word: אֲשֶׁר יָרָדָה
  english_pob_choice: on which it had gone down
  chosen_spanish: por los cuales había bajado
  alternatives_spanish:
  - en los que había descendido
  - donde había bajado
  lexicon: HALOT
  rationale: La cláusula relativa retoma el punto de descenso previo. «Por los cuales había bajado» conserva la relación con los escalones y el paralelismo del movimiento.
theological_decisions:
- issue: Naturaleza milagrosa del signo con el sol y la sombra
  english_pob_reading: Translate the event phenomenologically as described, without naturalizing or explaining away the miracle.
  chosen_spanish_reading: Traducir el evento tal como se describe, sin naturalizarlo ni explicarlo de más.
  alternative_spanish_readings:
  - Referirlo sólo como un fenómeno del reloj solar
  - Parafrasearlo para evitar una reversión solar
  rationale: 'El hebreo narra una señal milagrosa en lenguaje observacional: la sombra y el sol «retroceden». La traducción española debe preservar esa forma sin introducir una explicación científica ni suavizar el carácter extraordinario del relato.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de מַעֲלוֹת en la estructura de Acaz
  english_pob_reading: steps / possible stairway-like sundial
  chosen_spanish_reading: escalones, dejando abierta la posibilidad de una estructura escalonada o un dispositivo de medición solar
  alternative_spanish_readings:
  - grados
  - dial
  - escalera
  rationale: El texto hebreo habla de «escalones de Acaz»; la identificación exacta del aparato es discutida. La traducción conserva la expresión concreta y la nota ofrece la alternativa interpretativa sin reemplazar el término bíblico por uno técnico no explícito.
  doctrine_reference: HALOT; audit trail on lexical alternative
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó una repetición appositiva de «the shadow» para reflejar mejor la estructura hebrea. En español se sigue esa misma economía sintáctica, manteniendo una sola referencia a «la sombra» y luego la cláusula relativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología preferida del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se preserva «Acaz» para el nombre propio, conforme a la forma española estándar.
  - Se evita «SEÑOR» o glosas litúrgicas porque el hebreo de este versículo no las requiere.
  - Se eligió «retroceder» para conservar el movimiento inverso descrito por el hebreo sin añadir interpretación.
  - «Pasos/escalones» queda deliberadamente abierto, en consonancia con la nota inglesa sobre la posible estructura tipo escalera o instrumento de observación solar.
