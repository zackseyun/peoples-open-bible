    reason: lexical_alternative
lexical_decisions:
- source_word: βρόμους
  english_pob_choice: foul masses
  chosen_spanish: masas fétidas
  alternatives_spanish:
  - masas inmundas
  - masas pestilentes
  - hedores
  lexicon: LSJ
  rationale: En contexto con humo, βρόμους expresa algo repulsivo o nocivo; «masas fétidas» conserva la concreción y el matiz desagradable mejor que un sustantivo abstracto como «hedores».
- source_word: λικμωμένους
  english_pob_choice: being driven
  chosen_spanish: siendo arrastradas
  alternatives_spanish:
  - siendo aventadas
  - siendo dispersadas
  - siendo batidas
  lexicon: LSJ
  rationale: La imagen original procede de λικμάω, con metáfora agrícola de algo levantado y movido como paja. «Siendo arrastradas» mantiene la idea de movimiento forzado sin sonar tan técnico como «aventadas».
- source_word: καπνοῦ
  english_pob_choice: of smoke
  chosen_spanish: de humo
  alternatives_spanish:
  - humo
  - humeantes
  lexicon: LSJ
  rationale: El genitivo es directo; «de humo» reproduce la relación nominal de manera clara y sobria.
- source_word: δεινοὺς
  english_pob_choice: dreadful
  chosen_spanish: espantosas
  alternatives_spanish:
  - terribles
  - pavorosas
  - aterradoras
  lexicon: LSJ
  rationale: δεινός aquí describe carácter aterrador; «espantosas» conserva fuerza emotiva y registro literario.
- source_word: σπινθῆρας
  english_pob_choice: sparks
  chosen_spanish: chispas
  alternatives_spanish:
  - centellas
  - brasas
  - fuegos
  lexicon: LSJ
  rationale: El término designa chispas; «chispas» es el equivalente español más preciso.
- source_word: ἀστράπτοντας
  english_pob_choice: flashing
  chosen_spanish: que destellan
  alternatives_spanish:
  - que relampaguean
  - que brillan
  - que centellean
  lexicon: LSJ
  rationale: El participio sugiere un fulgor súbito, casi de rayo; «que destellan» es natural y mantiene el efecto visual.
- source_word: ὧν
  english_pob_choice: whose
  chosen_spanish: cuyo
  alternatives_spanish:
  - de las cuales
  - de los cuales
  lexicon: LSJ
  rationale: El relativo enlaza con el conjunto previo de humo y chispas; «cuyo» ofrece una conexión fluida y literaria.
- source_word: βλάβη
  english_pob_choice: harm
  chosen_spanish: daño
  alternatives_spanish:
  - perjuicio
  - lesión
  - mal
  lexicon: LSJ
  rationale: βλάβη es daño o perjuicio en sentido amplio; «daño» es el equivalente más transparente en español.
- source_word: συνεκτρῖψαι
  english_pob_choice: crush them
  chosen_spanish: aplastarlos
  alternatives_spanish:
  - triturarlos
  - destruirlos por completo
  - aniquilarlos
  lexicon: LSJ
  rationale: El verbo intensifica la idea de quebrantar o aplastar completamente; «aplastarlos» conserva esa violencia sin añadir una lectura excesivamente interpretativa.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - esas criaturas
  lexicon: LSJ
  rationale: El pronombre retoma a los seres hostiles del contexto; en español conviene integrarlo como objeto directo natural.
- source_word: ἡ ὄψις ἐκφοβήσασα
  english_pob_choice: their terrifying appearance
  chosen_spanish: su apariencia aterradora
  alternatives_spanish:
  - su aspecto aterrador
  - la visión de ellos que atemoriza
  - su aspecto que espanta
  lexicon: LSJ
  rationale: La frase combina «vista/apariencia» con el efecto de aterrorizar; «su apariencia aterradora» conserva ambos valores en forma idiomática.
- source_word: διολέσαι
  english_pob_choice: destroy
  chosen_spanish: destruirlos
  alternatives_spanish:
  - aniquilarlos
  - hacerlos perecer
  - borrarlos
  lexicon: LSJ
  rationale: διολέσαι expresa destrucción total; «destruirlos» es directo y suficientemente fuerte.
theological_decisions:
- issue: Preservación de la imaginería poética extraña
  english_pob_reading: Retain the unusual imagery ('being driven,' 'sparks flashing from their eyes') rather than smoothing into paraphrase.
  chosen_spanish_reading: Conservar la imagen poco común («masas fétidas de humo siendo arrastradas», «chispas que destellan desde sus ojos») sin domesticarlas demasiado.
  alternative_spanish_readings:
  - «masas de humo que se dispersan»
  - «chispas brillando en sus ojos»
  rationale: El texto es poesía sapiencial y la fuerza está en su imaginería vívida; la versión española debe respetar la rareza del original en lugar de convertirla en paráfrasis plana.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 6'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió 'driven' frente a 'winnowed' por naturalidad. En español se eligió «siendo arrastradas» para mantener tanto la imagen de movimiento forzado como la fluidez idiomática, sin perder el eco metafórico del verbo griego.
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé» fuera de este verso porque no aparece ningún término divino en el pasaje.
  - Se preservó el paralelismo disyuntivo con «o ..., o ...» para reflejar la estructura griega.
  - No se introdujo terminología eclesiástica ajena al género sapiencial; se conservaron imágenes sensoriales concretas.
