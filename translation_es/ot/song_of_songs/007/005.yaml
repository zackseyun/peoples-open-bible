    text: Hebrew 'nose.' The image likely praises the beloved's noble profile rather than isolating a feature in a modern awkward sense.
    reason: cultural_note
  - marker: c
    text: Or 'overlooking Damascus' or 'facing Damascus.'
    reason: lexical_alternative
