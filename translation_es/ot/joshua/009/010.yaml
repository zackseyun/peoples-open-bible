review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del hebreo: mantiene la enumeración continuada desde el v. 9, conserva el sujeto implícito en ''hizo'', refleja correctamente ''a los dos reyes de los amorreos'', y aplica bien la cláusula final a Og. Sin embargo, la nota al pie no preserva la alternativa del English POB para בְּעַשְׁתָּרוֹת, porque el texto principal ya dice ''en Ashtarot'' y la nota repite lo mismo en vez de ofrecer la variante correspondiente a ''en/at''. Además, conviene alinear mejor el texto principal con la elección auditada ''beyond'' mediante ''más allá del Jordán'', dejando ''al otro lado'' como alternativa posible no principal.'
  spanish_quality_summary: El español es claro y legible, con tono bíblico natural. Los nombres propios y la sintaxis son comprensibles. El único problema real de calidad es la nota redundante y mal formulada; también 'más allá del Jordán' se ajusta mejor al registro bíblico-digno y a la decisión inglesa auditada que 'al otro lado del Jordán', aunque esta última no es errónea.
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. Los topónimos y nombres están bien en general: ''Sehón'', ''Hesbón'', ''Og'', ''Basán''. La decisión sobre בְּעֵבֶר הַיַּרְדֵּן se puede afinar a ''más allá del Jordán'' para reflejar más de cerca la opción auditada sin perder naturalidad. La nota léxica debe corregirse para conservar la alternativa entre ''en'' y ''en/at'' en español de forma real.'
  issues:
  - severity: medium
    issue: La nota al pie [a] no preserva una alternativa real
    rationale: El English POB tiene texto principal 'at Ashtaroth' con alternativa 'in Ashtaroth'. El borrador español usa 'en Ashtarot' en el texto principal y la nota repite exactamente 'que estaba en Ashtarot', por lo que la nota es redundante y no aporta variante léxica.
  - severity: low
    issue: La elección 'al otro lado del Jordán' es menos alineada con la decisión auditada que 'más allá del Jordán'
    rationale: Aunque es fiel al sentido de בְּעֵבֶר, la auditoría inglesa privilegia 'beyond'. En español, 'más allá del Jordán' conserva mejor esa cercanía formal y mantiene un registro bíblico natural.
