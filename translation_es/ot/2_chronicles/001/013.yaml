translation:
  language: es
  text: Entonces Salomón vino[a] a Jerusalén desde el lugar alto que estaba en Gabaón[c], desde delante[b] de la tienda de reunión, y reinó sobre Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse 'fue'; el verbo hebreo admite la perspectiva de venir o ir según el punto de vista.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''desde delante de la tienda de reunión'', una expresión espacial para salir del área del santuario.'
    reason: cultural_note
  - marker: c
    text: Es decir, el lugar alto cultual en Gabaón donde estaba la tienda de reunión.
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: fue
  alternatives_spanish:
  - vino
  - llegó
  lexicon: HALOT
  rationale: El hebreo בוא admite la perspectiva de venir o ir según el punto de vista. En español, con el destino explícito 'a Jerusalén', 'fue' expresa con naturalidad el movimiento desde Gabaón sin forzar una construcción artificial.
- source_word: לַבָּמָה
  english_pob_choice: the high place
  chosen_spanish: el lugar alto
  alternatives_spanish:
  - el alto lugar
  - el santuario del lugar alto
  lexicon: HALOT
  rationale: '''Lugar alto'' conserva el sentido cultual de במה sin añadir una interpretación negativa que el contexto inmediato no impone. ''El lugar alto'' es claro y plenamente comprensible en español.'
- source_word: אֲשֶׁר בְּגִבְעוֹן
  english_pob_choice: that was at Gibeon
  chosen_spanish: que estaba en Gabaón
  alternatives_spanish:
  - que era en Gabaón
  - que se hallaba en Gabaón
  lexicon: HALOT
  rationale: La relativa expresa simplemente la ubicación del lugar alto. 'Estaba en Gabaón' mantiene la relación espacial directa del hebreo.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - para Jerusalén
  lexicon: HALOT
  rationale: El hebreo coloca el topónimo de modo comprimido; el sentido narrativo exige una meta de movimiento. 'A Jerusalén' es la forma más natural y fiel en español.
- source_word: מִלִּפְנֵי
  english_pob_choice: from before
  chosen_spanish: de delante
  alternatives_spanish:
  - de la presencia de
  - desde delante
  lexicon: HALOT
  rationale: '''De delante'' conserva el valor espacial literal de לפני. En este contexto también funciona como expresión cultual de alejamiento del área del santuario, sin recurrir a una paráfrasis excesiva.'
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - el tabernáculo
  lexicon: HALOT
  rationale: '''Tienda de reunión'' traduce de manera transparente אהל מועד y evita reemplazarlo por ''tabernáculo'', que sería más interpretativo. ''Tienda'' es el equivalente natural de אהל en español.'
- source_word: וַיִּמְלֹךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - se mantuvo reinando
  lexicon: HALOT
  rationale: מלך en qal aquí continúa la narración del reinado ya establecido de Salomón; 'reinó' preserva la acción verbal simple sin sobreespecificar inicio o duración.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - sobre el pueblo de Israel
  - en Israel
  lexicon: HALOT
  rationale: Con מלך, על se expresa normalmente como 'sobre'. 'Sobre Israel' conserva la fórmula regia directa del hebreo.
theological_decisions:
- issue: Relación sintáctica de 'Jerusalén' en un hebreo breve y algo comprimido
  english_pob_reading: Solomon came to Jerusalem from the high place that was at Gibeon, from before the tent of meeting, and he reigned over Israel.
  chosen_spanish_reading: Salomón fue a Jerusalén desde el lugar alto que estaba en Gabaón, de delante de la tienda de reunión, y reinó sobre Israel.
  alternative_spanish_readings:
  - Salomón vino a Jerusalén desde el lugar alto que estaba en Gabaón, de delante de la tienda de reunión, y reinó sobre Israel.
  - Salomón fue desde el lugar alto que estaba en Gabaón a Jerusalén, de delante de la tienda de reunión, y reinó sobre Israel.
  rationale: El contexto previo y la secuencia narrativa indican un desplazamiento desde Gabaón hacia Jerusalén. La redacción española debe hacer explícita esa dirección sin introducir contenido ajeno al texto, y 'fue a Jerusalén' logra ese equilibrio.
  doctrine_reference: Translation philosophy §1, §6
- issue: Carácter del lugar alto asociado con la tienda de reunión
  english_pob_reading: the high place
  chosen_spanish_reading: el lugar alto
  alternative_spanish_readings:
  - el santuario del lugar alto
  - el alto lugar
  rationale: El texto identifica un lugar alto concreto en Gabaón donde estaba la tienda de reunión. Traducirlo de forma neutra evita importar la valoración negativa de otros contextos bíblicos donde los lugares altos son censurados.
  doctrine_reference: Translation philosophy §1, §3
- issue: Expresión espacial 'from before the tent of meeting'
  english_pob_reading: from before the tent of meeting
  chosen_spanish_reading: de delante de la tienda de reunión
  alternative_spanish_readings:
  - desde la presencia de la tienda de reunión
  - desde delante del santuario
  rationale: La frase hebrea es espacial y cultual a la vez. En español conviene conservar su literalidad básica para no perder la imagen de alejamiento desde el área del santuario.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail inglés, que reordenó la cláusula para reflejar con mayor naturalidad el movimiento hacia Jerusalén. Se mantuvo la referencia espacial 'de delante de la tienda de reunión' y el cierre 'reinó sobre Israel'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiere; este versículo no contiene el nombre divino.
  - '''Mesías/Cristo'' no aparece en este versículo.'
  - Se conserva 'tienda de reunión' para אהל מועד, consistente con la terminología POB.
  - '''Lugar alto'' se mantiene neutral y no se carga con una valoración posterior ajena al contexto inmediato.'
