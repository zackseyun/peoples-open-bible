revisions:
- from: Pero yo actué por amor de mi nombre[a], para que no fuera profanado[b] a la vista de las naciones[c], en cuya vista las había sacado.
  to: Pero yo actué por amor de mi nombre, para que no fuera profanado[a] a la vista de las naciones, ante cuyos ojos los había sacado.
  rationale: Se corrige el pronombre a masculino plural para concordar con el referente implícito de Israel y con el sufijo hebreo. Se reemplaza «en cuya vista» por «ante cuyos ojos» para conservar la imagen visual del hebreo con mejor naturalidad en español. Se elimina la nota redundante [a] original y la nota sobre «a la vista» por no ser necesaria una vez que el texto ya expresa con claridad la dimensión visual.
