    rationale: El referente semántico son muchos hombres/combatientes, y los adjetivos traducen τραυματίαι γυμνοὶ en plural. El singular femenino produce una frase antinatural y menos fiel al griego.
  - severity: medium
    issue: Las decisiones léxicas registran «herida», «desnuda» y «escapó» para una referencia plural
    rationale: Aunque el texto principal es lo prioritario, estas decisiones muestran una justificación gramatical equivocada basada en «mayoría». La traducción española debe seguir la concordancia de sentido con las personas mencionadas.
  revised_spanish_text: Pero la mayoría de ellos escaparon heridos y desnudos[a]; y Lisias mismo también escapó huyendo vergonzosamente.
  revised_footnotes:
  - marker: a
    text: O «despojados», posiblemente indicando que huyeron tras perder su equipo o sus vestiduras exteriores en la batalla.
    reason: lexical_alternative
