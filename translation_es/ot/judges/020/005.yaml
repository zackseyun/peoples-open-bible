translation:
  language: es
  text: Entonces los hombres de Gabaa se levantaron contra mí y rodearon la casa de noche. Tenían la intención[a] de matarme, y violaron a mi concubina[b], y ella murió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Planeaban matarme».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «violaron a mi concubina». El verbo hebreo puede denotar humillación grave o violación; aquí el contexto indica agresión sexual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲלֵי הַגִּבְעָה
  english_pob_choice: the men of Gibeah
  chosen_spanish: los hombres de Gabaa
  alternatives_spanish:
  - los dueños de Gabaa
  - los habitantes de Gabaa
  - los señores de Gabaa
  lexicon: HALOT
  rationale: El giro hebreo plural constructo funciona idiomáticamente como referencia a los varones de la ciudad, no como título nobiliario. «Los hombres de Gabaa» conserva el sentido natural y evita una lectura de autoridad formal que el contexto no exige.
- source_word: וַיָּקֻמוּ עָלַי
  english_pob_choice: rose up against me
  chosen_spanish: se levantaron contra mí
  alternatives_spanish:
  - se alzaron contra mí
  - me atacaron
  - se rebelaron contra mí
  lexicon: HALOT
  rationale: La expresión hebrea comunica hostilidad e iniciativa agresiva. «Se levantaron contra mí» mantiene la imagen verbal y el valor adversativo sin volverla demasiado interpretativa.
- source_word: וַיָּסֹבּוּ עָלַי אֶת־הַבַּיִת
  english_pob_choice: surrounded the house
  chosen_spanish: rodearon la casa
  alternatives_spanish:
  - cercaron la casa
  - la casa quedó rodeada
  - me cercaron en la casa
  lexicon: HALOT
  rationale: Con objeto directo «la casa», el verbo expresa cercar o rodear. En español, «rodearon la casa» es natural y fiel; el matiz hostil ya queda claro por el contexto inmediato.
- source_word: לָיְלָה
  english_pob_choice: at night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - durante la noche
  lexicon: HALOT
  rationale: El acusativo temporal se vierte de manera idiomática en español como «de noche». Mantiene el valor temporal sin sobrecargar la frase.
- source_word: דִּמּוּ לַהֲרֹג
  english_pob_choice: intended to kill
  chosen_spanish: tenían la intención de matarme
  alternatives_spanish:
  - pensaban matarme
  - querían matarme
  - planeaban matarme
  lexicon: HALOT
  rationale: El verbo aquí expresa propósito o intención. «Tenían la intención de matarme» refleja el sentido con precisión y sin añadir una formulación más fuerte de la que el hebreo requiere.
- source_word: פִּילַגְשִׁי
  english_pob_choice: my concubine
  chosen_spanish: mi concubina
  alternatives_spanish:
  - mi esposa secundaria
  - mi compañera secundaria
  lexicon: HALOT
  rationale: «Concubina» es el equivalente léxico más exacto en este contexto histórico-social. Aunque culturalmente distante, evita diluir la relación descrita por el hebreo.
- source_word: עִנּוּ
  english_pob_choice: violated
  chosen_spanish: violaron
  alternatives_spanish:
  - abusaron de
  - humillaron a
  - violaron sexualmente a
  lexicon: HALOT
  rationale: El pi'el de ענה puede abarcar aflicción y humillación, pero el contexto sexual hace clara la agresión. En español, «violaron» comunica esa violencia de forma directa; el complemento «a mi concubina» completa la referencia sin necesidad de añadir más explicaciones en el texto principal.
- source_word: וַתָּמֹת
  english_pob_choice: and she died
  chosen_spanish: y ella murió
  alternatives_spanish:
  - y murió
  - y así murió
  - y falleció
  lexicon: HALOT
  rationale: La secuencia hebrea se conserva con una coordinación simple. «Y ella murió» refleja de manera directa la consecuencia narrada sin introducir una relación causal explícita que el texto revisado en inglés ya decidió no marcar.
theological_decisions:
- issue: Violencia sexual implícita en עִנּוּ
  english_pob_reading: The Hebrew verb can denote severe humiliation or violation; here the context indicates sexual assault.
  chosen_spanish_reading: El texto principal usa «violaron», y la nota explica que el hebreo puede abarcar humillación o violación, pero que aquí el contexto señala agresión sexual.
  alternative_spanish_readings:
  - humillaron
  - maltrataron
  - abusaron de sexualmente
  rationale: La decisión evita suavizar el acto y a la vez respeta la amplitud semántica del hebreo. En español, «violaron» comunica con claridad la gravedad contextual; la nota preserva la tensión lexical sin borrar la posibilidad semántica más amplia del verbo.
  doctrine_reference: Énfasis textual y semántico; no doctrinal.
translation_notes:
  revision_awareness: El inglés POB pasó de «so that she died» a «and she died» para reflejar más directamente la secuencia hebrea sin añadir causalidad explícita. La línea española sigue esa revisión con una coordinación simple («y ella murió») y evita formular una consecuencia causal adicional.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - «Gabaa» sigue la forma tradicional breve para גִבְעָה en contexto narrativo.
  - Se preservó la coordinación narrativa del hebreo con «y» en cadena, evitando una subordinación causal que no esté explícita en el texto fuente.
