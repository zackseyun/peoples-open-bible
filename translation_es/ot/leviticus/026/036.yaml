base_translation:
  language: en
  yaml_path: translation/ot/leviticus/026/036.yaml
  text: As for those of you who remain[a], I will bring faintness into their hearts in the lands of their enemies, and the sound of a driven leaf will pursue them; they will flee as from the sword, and they will fall when no one is pursuing.
