base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/044/013.yaml
  text: They shall not come near to me to serve as priests for me[a], nor to come near any of my holy things, the most holy things; but they shall bear their shame and the abominations that they have committed.
  footnotes:
