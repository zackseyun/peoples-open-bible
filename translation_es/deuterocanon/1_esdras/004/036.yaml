translation:
  language: es
  text: Toda la tierra llama bendita[a] a la verdad, y el cielo la bendice; y todas las obras se sacuden y tiemblan[b], y con ella[a] no hay nada injusto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego expresa aquí que la verdad es declarada bendita. Más adelante, el texto griego tiene una forma masculina/neutra ('con él/ello') después de referencias femeninas a 'la verdad'; aquí se traduce 'con ella' porque el sentido más natural sigue siendo la verdad personificada.
    reason: textual_variant
  - marker: b
    text: También puede entenderse como 'todas las cosas creadas' o 'todo lo creado', aunque 'todas las obras' mantiene más de cerca el plural del griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσα ἡ γῆ
  english_pob_choice: All the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - todo el mundo
  - toda la tierra habitada
  lexicon: LSJ
  rationale: γῆ puede significar 'tierra' o 'tierra habitada'. En este contexto cósmico, paralelo a 'el cielo', 'toda la tierra' conserva el alcance universal sin sonar demasiado explicativo.
- source_word: τὴν ἀλήθειαν
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - verdad
  - la Verdad
  lexicon: LSJ
  rationale: ἀλήθεια es aquí el sustantivo abstracto al que se atribuye honra. En español, el artículo es natural con este giro, y se mantiene la personificación sin convertirla en título doctrinal.
- source_word: καλεῖ
  english_pob_choice: calls truth blessed
  chosen_spanish: llama bendita a
  alternatives_spanish:
  - proclama bendita a
  - declara bendita a
  lexicon: LSJ
  rationale: El ajuste inglés final mostró que καλέω aquí no es simplemente 'llamar' en sentido de nombrar, sino reconocer o declarar. En español, 'llama bendita a la verdad' reproduce con naturalidad ese valor predicativo.
- source_word: ὁ οὐρανὸς
  english_pob_choice: heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - el cielo
  - el firmamento
  lexicon: LSJ
  rationale: Aunque el inglés POB optó por 'heaven', en español 'el cielo' es el equivalente más natural y digno en lenguaje bíblico para οὐρανός en un marco cósmico.
- source_word: αὐτὴν
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - la
  - a ella
  lexicon: LSJ
  rationale: El griego conserva el femenino de ἀλήθεια. En español, el clítico 'la' mantiene la referencia femenina y evita una repetición pesada del sustantivo.
- source_word: εὐλογεῖ
  english_pob_choice: blesses
  chosen_spanish: bendice
  alternatives_spanish:
  - alaba
  - habla bien de
  lexicon: LSJ
  rationale: εὐλογέω normalmente significa 'bendecir'. 'Bendice' conserva el registro elevado y la fuerza religiosa del verbo sin suavizarlo a 'alaba'.
- source_word: πάντα τὰ ἔργα
  english_pob_choice: all the works
  chosen_spanish: todas las obras
  alternatives_spanish:
  - todas las cosas hechas
  - todo lo creado
  lexicon: LSJ
  rationale: ἔργα puede abarcar 'obras' o 'hechos'. Dado el contexto universal, 'todas las obras' es una forma española sobria que conserva la amplitud del plural griego sin añadir interpretación excesiva.
- source_word: σείεται καὶ τρέμει
  english_pob_choice: shake and tremble
  chosen_spanish: tiemblan y se estremecen
  alternatives_spanish:
  - se sacuden y tiemblan
  - se agitan y tiemblan
  lexicon: LSJ
  rationale: Los dos verbos expresan una reacción intensa y redundante. 'Tiemplan y se estremecen' transmite bien la acumulación retórica en español; se invierte ligeramente el orden para mayor naturalidad.
- source_word: μετʼ αὐτοῦ
  english_pob_choice: with her
  chosen_spanish: con ella
  alternatives_spanish:
  - con ella
  - en su presencia
  lexicon: LSJ
  rationale: Aunque la forma transmitida es αὐτοῦ, el contexto inmediato se refiere a la verdad personificada en femenino. En español se sigue el sentido contextual y la personificación, conservando la tensión gramatical del testimonio griego.
- source_word: ἄδικον οὐθέν
  english_pob_choice: nothing unjust
  chosen_spanish: nada injusto
  alternatives_spanish:
  - nada inicuo
  - ninguna injusticia
  lexicon: LSJ
  rationale: La frase es literalmente 'nada injusto'. 'Nada injusto' preserva la fuerza adjetival y suena natural en español, sin introducir un sustantivo que cambie el matiz.
theological_decisions:
- issue: Personificación de la verdad
  english_pob_reading: Retain personification with feminine pronouns ('her')
  chosen_spanish_reading: Mantener la personificación de la verdad con femeninos contextuales ('la', 'ella')
  alternative_spanish_readings:
  - despersonalizar como 'ello'
  - usar solo el sustantivo sin pronombres
  rationale: El griego usa formas femeninas para referirse a ἀλήθεια. En español, conservar 'la' y 'ella' mantiene la figura retórica sin convertirla en una afirmación doctrinal sobre una entidad separada.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y retórica sin aplanar los rasgos del texto fuente.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa, que corrigió el valor de καλεῖ hacia una construcción predicativa ('calls truth blessed') y mantuvo la personificación femenina de la verdad. La versión española refleja ese ajuste sin depender mecánicamente del inglés, y conserva la tensión gramatical de μετʼ αὐτοῦ mediante el femenino contextual.
  spanish_consistency_notes:
  - Se usa 'verdad' en minúscula por tratarse de sustantivo común personificado, no de título.
  - '''Toda la tierra'' y ''el cielo'' mantienen el paralelismo cósmico del griego.'
  - Se conserva el registro bíblico sobrio con verbos como 'bendice', 'tiemblan' y 'se estremecen'.
  - La cláusula final se traduce de forma directa para no suavizar el contraste moral de ἄδικον οὐθέν.
