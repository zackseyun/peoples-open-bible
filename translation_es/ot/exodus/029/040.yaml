  language: en
  yaml_path: translation/ot/exodus/029/040.yaml
  text: and a tenth of fine flour mixed with a quarter of a hin of beaten oil[a], and a drink offering of a quarter of a hin of wine[c][b], for the one lamb.
  footnotes:
  - marker: a
    text: Or, more explicitly, 'one-tenth of an ephah of fine flour.' The Hebrew uses 'a tenth' as a standard offering measure.
    reason: lexical_alternative
  - marker: b
    text: '''Beaten oil'' refers to oil produced from crushed or beaten olives; some translations render it ''pressed oil.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'for one lamb'; in context this likely refers to the first of the two daily lambs mentioned in the surrounding verses.
    reason: alternative_reading
