  glossary_alignment: No hay términos del glosario mayor en juego salvo la cautela teológica con בְּלִיַּעַל, que el borrador maneja correctamente al no usar «Belial». La decisión española debería alinearse mejor con el inglés POB «worthless man» mediante «hombre despreciable» o «hombre vil» en vez de «hombre indigno».
  issues:
