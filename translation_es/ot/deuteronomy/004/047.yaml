translation:
  language: es
  text: y tomaron posesión de su tierra y de la tierra de Og, rey de Basán, los dos reyes de los amorreos que estaban del otro lado del Jordán[a], hacia la salida del sol[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más allá del Jordán» o «al otro lado del Jordán»; el hebreo es un modismo geográfico cuyo punto de referencia exacto depende del marco narrativo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hacia la salida del sol», es decir, hacia el este.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּירְשׁוּ
  english_pob_choice: they took possession of
  chosen_spanish: tomaron posesión de
  alternatives_spanish:
  - poseyeron
  - heredaron
  - despojaron
  lexicon: HALOT
  rationale: En contextos de conquista, ירשׁ expresa ocupar o tomar posesión de una tierra, con el matiz de desplazar a sus ocupantes previos. «Tomaron posesión de» conserva ese sentido territorial y suena natural en español.
- source_word: אַרְצוֹ
  english_pob_choice: his land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su territorio
  lexicon: HALOT
  rationale: El sufijo posesivo remite al rey mencionado en el contexto. «Su tierra» sigue de cerca el hebreo y es más idiomático que «su territorio» en esta construcción.
- source_word: אֶרֶץ עוֹג מֶלֶךְ הַבָּשָׁן
  english_pob_choice: the land of Og king of Bashan
  chosen_spanish: la tierra de Og, rey de Basán
  alternatives_spanish:
  - el territorio de Og, rey de Basán
  lexicon: HALOT
  rationale: La cadena constructa se mantiene de manera directa. «Tierra» conserva אֶרֶץ en un marco geográfico-político y enlaza con la frase anterior.
- source_word: שְׁנֵי מַלְכֵי הָאֱמֹרִי
  english_pob_choice: the two kings of the Amorites
  chosen_spanish: los dos reyes de los amorreos
  alternatives_spanish:
  - los dos reyes amorreos
  lexicon: HALOT
  rationale: Se conserva la referencia colectiva a Sihón y Og como reyes amorreos. La forma «de los amorreos» reproduce con claridad la estructura del hebreo.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: del otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - al otro lado del Jordán
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo geográfico cuyo punto de referencia depende del contexto narrativo. «Del otro lado del Jordán» preserva la referencia espacial sin forzar una equivalencia interpretativa.
- source_word: מִזְרַח שָׁמֶשׁ
  english_pob_choice: toward the sunrise
  chosen_spanish: hacia la salida del sol
  alternatives_spanish:
  - hacia el amanecer
  - hacia el oriente
  lexicon: HALOT
  rationale: La imagen concreta del hebreo se conserva con una frase natural en español. «Hacia la salida del sol» mantiene el valor direccional y la expresión figurativa de origen.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y concuerda con el audit trail inglés, sin cambios de revisión aplicados en la fuente inglesa más reciente.
