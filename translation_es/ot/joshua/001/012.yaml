translation:
  language: es
  text: Y a los rubenitas, y a los gaditas, y a la media tribu de Manasés, Josué dijo,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «diciendo». El término introduce el discurso de Josué, que continúa en el versículo siguiente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לָ/רֽאוּבֵנִי
  english_pob_choice: and to the Reubenites
  chosen_spanish: a los rubenitas
  alternatives_spanish:
  - a la tribu de Rubén
  - a los rubenitas
  lexicon: HALOT
  rationale: El gentilicio singular hebreo funciona colectivamente; en español, el plural sustantivado 'rubenitas' comunica con naturalidad al grupo al que se dirige Josué, manteniendo la preposición de dirección 'a'.
- source_word: וְ/לַ/גָּדִי
  english_pob_choice: and to the Gadites
  chosen_spanish: a los gaditas
  alternatives_spanish:
  - a la tribu de Gad
  - a los gaditas
  lexicon: HALOT
  rationale: Como en el término paralelo anterior, el gentilicio se entiende de manera colectiva. 'Gaditas' conserva la referencia tribal sin forzar una paráfrasis.
- source_word: וְ/לַ/חֲצִי שֵׁבֶט הַמְנַשֶּׁה
  english_pob_choice: and to the half-tribe of Manasseh
  chosen_spanish: a la media tribu de Manasés
  alternatives_spanish:
  - a la mitad de la tribu de Manasés
  - a la media tribu de Manasés
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente 'la mitad de la tribu de Manasés'. En español, 'media tribu de Manasés' reproduce con claridad el sentido idiomático aceptado y el valor cuantitativo del constructo.
- source_word: אָמַר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - dijo
  lexicon: HALOT
  rationale: אָמַר es el verbo ordinario de decir; 'dijo' es la forma más directa y natural en español para introducir el discurso.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Josué
  lexicon: onomastics
  rationale: Se usa la forma española establecida del nombre propio bíblico, plenamente reconocible y fiel al referente.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: —
  alternatives_spanish:
  - diciendo
  - —
  lexicon: HALOT
  rationale: El infinitivo introductorio לֵאמֹר suele señalar el comienzo del discurso siguiente. En español puede absorberse en la puntuación sin pérdida de sentido, como hizo la POB en inglés.
translation_notes:
  revision_awareness: 'Concordancia alta con la revisión inglesa más reciente: no hay cambios sustantivos en el contenido ni en la segmentación del sentido. Se mantiene la nota sobre לֵאמֹר como introducción del discurso.'
  spanish_consistency_notes:
  - Se preserva el paralelismo de los tres grupos destinatarios con preposición explícita.
  - Se evita 'SEÑOR' porque el versículo no contiene el nombre divino.
  - '''Josué'' sigue la forma española estándar del antropónimo.'
  - La nota [a] corresponde al valor introductorio de לֵאמֹר y se coloca en el texto donde se omite la traducción literal.
