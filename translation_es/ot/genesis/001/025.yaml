translation:
  language: es
  text: Y Dios hizo las bestias[a] de la tierra según sus clases[b], y el ganado según sus clases, y todo ser que se arrastra del suelo[c] según su clase[b]. Y Dios vio que era bueno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los animales salvajes de la tierra’.
    reason: lexical_alternative
  - marker: b
    text: El hebreo ‘según su clase / según sus clases’ se refiere a categorías de criaturas y no debe entenderse como una taxonomía científica moderna.
    reason: cultural_note
  - marker: c
    text: O ‘todo ser que se arrastra sobre la tierra’. El hebreo distingue ‘tierra’ antes en el versículo y ‘suelo’ aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo
  - hizo/creó
  lexicon: HALOT
  rationale: עָשָׂה normalmente significa ‘hacer’. En español, ‘hizo’ conserva la acción directa y natural del relato de creación sin añadir el matiz más interpretativo de ‘creó’.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: En Génesis 1, אֱלֹהִים lleva verbo singular y designa al único Creador; ‘Dios’ es la equivalencia directa y estándar en español.
- source_word: חַיַּת הָאָרֶץ
  english_pob_choice: the beasts of the earth
  chosen_spanish: las bestias de la tierra
  alternatives_spanish:
  - los animales salvajes de la tierra
  - las fieras de la tierra
  lexicon: HALOT
  rationale: La frase distingue a los animales terrestres silvestres de la בהמה. ‘Bestias de la tierra’ preserva bien la categoría y el tono elevado del pasaje; ‘animales salvajes’ aclara, pero es más explicativo.
- source_word: לְמִינָהּ / לְמִינֵהוּ
  english_pob_choice: according to their kinds / according to its kind
  chosen_spanish: según sus clases / según su clase / según su especie
  alternatives_spanish:
  - según sus especies
  - por clases
  lexicon: HALOT
  rationale: מין expresa una categoría o ‘clase’. ‘Según sus clases’ mantiene la idea de agrupación del texto sin importar la taxonomía biológica moderna. En la última cláusula, ‘según su especie’ es posible, pero puede sonar más técnico; por eso se mantiene ‘clase’ y se añade la nota de alternativa implícita en la formulación.
- source_word: הַבְּהֵמָה
  english_pob_choice: the livestock
  chosen_spanish: el ganado
  alternatives_spanish:
  - el ganado
  - los animales domésticos
  - las bestias domésticas
  lexicon: HALOT
  rationale: בהמה aquí contrasta con las bestias salvajes y alude a animales domésticos o de labor. ‘Ganado’ es claro y natural en español, aunque algo más amplio que ‘cattle’; conserva bien la categoría.
- source_word: כָּל רֶמֶשׂ הָאֲדָמָה
  english_pob_choice: every creeping thing of the ground
  chosen_spanish: todo ser que se arrastra sobre la tierra
  alternatives_spanish:
  - todo reptil de la tierra
  - todo animal que se arrastra del suelo
  lexicon: HALOT
  rationale: רֶמֶשׂ denota criaturas pequeñas que se mueven cerca del suelo. ‘Ser que se arrastra’ comunica la imagen sin restringirla solo a reptiles. ‘Sobre la tierra’ sigue el matiz espacial del hebreo, aunque la distinción léxica con ‘tierra’/‘suelo’ no se refleja aquí de forma totalmente literal.
- source_word: הָאָרֶץ / הָאֲדָמָה
  english_pob_choice: earth ... ground
  chosen_spanish: la tierra ... la tierra
  alternatives_spanish:
  - la tierra ... el suelo
  - la tierra ... el terreno
  lexicon: HALOT
  rationale: El hebreo distingue entre הָאָרֶץ y הָאֲדָמָה. En español, ‘tierra’ cubre ambos campos semánticos de manera natural; se mantiene la diferencia contextual en la formulación ‘de la tierra’ / ‘sobre la tierra’, aunque no con dos sustantivos distintos. La nota explica la distinción léxica preservada en el análisis.
- source_word: וַיַּרְא אֱלֹהִים כִּי־טוֹב
  english_pob_choice: And God saw that it was good
  chosen_spanish: Y Dios vio que era bueno
  alternatives_spanish:
  - Y Dios vio que esto era bueno
  - Y Dios vio que estaba bien
  lexicon: HALOT
  rationale: La fórmula evaluativa se traduce de manera directa y reverente. ‘Era bueno’ reproduce el juicio del texto sin suavizarlo a ‘estaba bien’.
theological_decisions:
- issue: Clasificación de las criaturas creadas sin imponer taxonomía moderna
  english_pob_reading: kinds
  chosen_spanish_reading: clases
  alternative_spanish_readings:
  - especies
  - tipos
  rationale: מין se refiere a categorías de criaturas. ‘Clases’ conserva la idea de agrupación del texto bíblico y evita identificar el término con la taxonomía biológica moderna. Cuando aparece ‘especie’ en español, se entiende aquí solo como aproximación funcional, no como definición científica.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Distinción léxica entre הָאָרֶץ y הָאֲדָמָה
  english_pob_reading: earth ... ground
  chosen_spanish_reading: la tierra ... la tierra
  alternative_spanish_readings:
  - la tierra ... el suelo
  - la tierra ... el terreno
  rationale: El hebreo diferencia dos términos emparentados. En español, una repetición de ‘tierra’ resulta idiomática y permite conservar el flujo del versículo; la distinción semántica se documenta en las notas para no borrarla del todo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor semántico de רֶמֶשׂ
  english_pob_reading: creeping thing
  chosen_spanish_reading: ser que se arrastra
  alternative_spanish_readings:
  - reptil
  - animal rastrero
  rationale: ‘Ser que se arrastra’ evita estrechar el campo de referencia solo a reptiles modernos. Así se mantiene la amplitud del hebreo y la lectura natural en español.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo con la revisión reciente del POB en inglés; no se registraron cambios aplicados en el pase más reciente. La versión española sigue esa misma lectura, manteniendo las distinciones léxicas principales del hebreo y la cadencia del refrán creador.
  spanish_consistency_notes:
  - Se usa ‘Dios’ para אֱלֹהִים en concordancia con Génesis 1.
  - Se usa ‘clases’ para מין como equivalente funcional de ‘kinds’, evitando taxonomía moderna.
  - Se mantiene la repetición de ‘tierra’ por fluidez del español, con nota sobre la distinción hebrea entre הָאָרֶץ y הָאֲדָמָה.
  - ‘Bestias’ conserva la categoría de animales salvajes frente a ‘ganado’.
