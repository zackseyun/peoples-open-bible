revisions:
- from: Y en el día de las primicias[a], cuando presenten una ofrenda nueva a Yahvé en sus semanas, habrá para ustedes una convocación santa[b]. No harán ningún trabajo ordinario.
  to: Y en el día de las primicias, cuando presenten a Yahvé una ofrenda nueva de grano en su Fiesta de las Semanas, tendrán una convocación santa[a]. No harán ningún trabajo ordinario[b].
  rationale: Se corrige «en sus semanas» a «en su Fiesta de las Semanas» para reflejar el sentido festivo contextual de בְּשָׁבֻעֹתֵיכֶם; se explicita «ofrenda nueva de grano» para preservar el valor cultual de מִנְחָה; se mejora la fluidez con «tendrán»; y se reubican las notas al pie para que coincidan con las alternativas documentadas en el rastro POB.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:34:44Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta la estructura general del versículo y usa correctamente «Yahvé», «primicias» y la prohibición de trabajo ordinario. Sin embargo, no preserva bien dos decisiones claves del hebreo y del rastro POB: מִנְחָה חֲדָשָׁה en este contexto sacerdotal debe explicitarse como ofrenda de grano/cereal, y בְּשָׁבֻעֹתֵיכֶם aquí se refiere a la festividad de las Semanas, no a «sus semanas» en sentido abierto. También las notas del inglés fueron desancladas y reasignadas de modo incorrecto.'
  spanish_quality_summary: El español es generalmente legible, pero «en sus semanas» suena poco natural y ambiguo para lector eclesial, y «habrá para ustedes» es menos idiomático que «tendrán». «Convocación santa» es aceptable, aunque «santa convocación» suena más establecido; no es necesario cambiarlo si se mantiene claridad. Hace falta reparar las notas para que correspondan a los lugares y sentidos correctos.
  glossary_alignment: Alinea bien el nombre divino como «Yahvé». No contradice otros términos del glosario principal. La principal desviación terminológica es rebajar מִנְחָה a «ofrenda nueva» sin su matiz sacrificial de cereal/grano en un contexto cultual técnico.
  issues:
  - severity: high
    issue: בְּשָׁבֻעֹתֵיכֶם fue traducido «en sus semanas».
    rationale: En Números 28:26 el sintagma refiere la fiesta de las Semanas/Shavuot, como reconoce el análisis inglés. La opción española actual introduce una ambigüedad poco plausible en contexto y perjudica la inteligibilidad litúrgica.
  - severity: high
    issue: מִנְחָה חֲדָשָׁה fue traducido solo como «una ofrenda nueva».
    rationale: En contexto sacerdotal מִנְחָה denota ofrenda de grano/cereal. Omitir ese componente reduce precisión semántica y se aparta de la decisión léxica auditada.
  - severity: medium
    issue: Las notas al pie no corresponden al mismo contenido que en el rastro inglés.
    rationale: La nota [a] inglesa pertenece a «holy convocation», no a «firstfruits»; la nota [b] inglesa pertenece a «ordinary work», no a «convocación». En español conviene reanclarlas correctamente para preservar el historial de alternativas.
  - severity: low
    issue: «Habrá para ustedes» es menos natural que una formulación directa.
    rationale: Aunque formalmente posible, «tendrán» comunica mejor יִהְיֶה לָכֶם en español actual sin pérdida de fuerza legal.
  revised_spanish_text: Y en el día de las primicias, cuando presenten a Yahvé una ofrenda nueva de grano en su Fiesta de las Semanas, tendrán una convocación santa[a]. No harán ningún trabajo ordinario[b].
  revised_footnotes:
