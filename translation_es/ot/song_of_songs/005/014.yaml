    rationale: El hebreo literalmente dice 'llenados con', pero en contexto de artesanía/joyería la POB inglesa lo resolvió idiomáticamente como 'set with'. En español, 'engastados con berilo' preserva mejor el sentido ornamental que 'llenos de berilo'.
