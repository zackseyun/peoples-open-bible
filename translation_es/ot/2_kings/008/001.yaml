translation:
  language: es
  text: 'Y Eliseo había hablado a la mujer a cuyo hijo había devuelto a la vida[a], diciendo: «Levántate, y vete, tú y tu familia, y reside[b] dondequiera que residas, porque Yahvé ha convocado una hambruna, y también ha venido sobre la tierra por siete años».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «revivido» / «hecho vivir» para «devuelto a la vida»; el hebreo הֶחֱיָה expresa causación de vida, y el español mantiene la idea sin convertirla necesariamente en un término técnico de resurrección.
    reason: lexical_alternative
  - marker: b
    text: O «vive temporalmente» / «habita como residente temporal»; el hebreo גור suele llevar el sentido de residir por un tiempo como forastero o residente temporal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וֶאֱלִישָׁע
  english_pob_choice: Now Elisha
  chosen_spanish: Y Elíseo
  alternatives_spanish:
  - Ahora Elíseo
  - Entonces Elíseo
  lexicon: HALOT
  rationale: El prefijo conjuntivo se expresa de manera natural con «Y» en español narrativo; «Ahora» podría sonar más interpretativo. Se conserva el nombre propio transliterado conforme al proyecto.
- source_word: דִּבֶּר
  english_pob_choice: had spoken
  chosen_spanish: había hablado
  alternatives_spanish:
  - habló
  - estaba hablando
  lexicon: HALOT
  rationale: El perfecto hebreo se refleja bien con pluscuamperfecto en español, porque el habla ocurrió antes de la secuencia narrativa principal.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  - la señora
  lexicon: HALOT
  rationale: El sustantivo significa simplemente «mujer»; el contexto identifica a la sunamita sin requerir «esposa».
- source_word: אֲשֶׁר הֶחֱיָה אֶת־בְּנָהּ
  english_pob_choice: whose son he had restored to life
  chosen_spanish: cuyo hijo había devuelto a la vida
  alternatives_spanish:
  - cuyo hijo había hecho vivir
  - cuyo hijo había resucitado
  lexicon: HALOT
  rationale: «Devolver a la vida» transmite de forma idiomática el causativo de החיה sin endurecer el español. «Resucitado» puede sugerir más de lo que el verbo exige en este contexto narrativo.
- source_word: קוּמִי
  english_pob_choice: Arise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Alzate
  - Ponte en pie
  lexicon: HALOT
  rationale: Imperativo femenino singular. «Levántate» es claro y natural en español bíblico moderno, manteniendo urgencia sin arcaísmo excesivo.
- source_word: וּלְכִי
  english_pob_choice: go
  chosen_spanish: vete
  alternatives_spanish:
  - ve
  - sal
  lexicon: HALOT
  rationale: La forma imperativa encaja con «vete» en español, que expresa salida con mayor naturalidad que un simple «ve» en esta construcción.
- source_word: אתי
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - contigo
  - con tu familia
  lexicon: HALOT
  rationale: La forma se integra con el siguiente sintagma posesivo; en español conviene explicitar el sujeto de la exhortación con «tú».
- source_word: וּבֵיתֵךְ
  english_pob_choice: and your household
  chosen_spanish: y tu casa
  alternatives_spanish:
  - y tu hogar
  - y tu familia
  lexicon: HALOT
  rationale: Literalmente es «tu casa»; aquí puede referirse al conjunto doméstico. «Casa» preserva la imagen semítica y permite la inclusión del grupo doméstico sin añadir interpretación excesiva.
- source_word: וְגוּרִי
  english_pob_choice: and sojourn
  chosen_spanish: y reside
  alternatives_spanish:
  - y mora como extranjera
  - y habita temporalmente
  lexicon: HALOT
  rationale: גור en este contexto expresa residencia temporal. «Reside» mantiene el valor de habitar sin forzar una solución demasiado coloquial; se conserva la tensión entre permanencia y temporalidad con la repetición verbal en la cláusula siguiente.
- source_word: בַּאֲשֶׁר תָּגוּרִי
  english_pob_choice: wherever you can sojourn
  chosen_spanish: dondequiera que residas
  alternatives_spanish:
  - en cualquier lugar donde puedas residir
  - dondequiera que puedas morar
  lexicon: HALOT
  rationale: La repetición de גור pide repetir el mismo campo semántico. «Residas» permite mantener la relación léxica y el matiz de residencia provisional sin sonar artificioso.
- source_word: כִּי קָרָא יְהוָה לָרָעָב
  english_pob_choice: for Yahweh has called for a famine
  chosen_spanish: porque Yahvé ha llamado al hambre
  alternatives_spanish:
  - porque Yahvé ha convocado el hambre
  - porque Yahvé ha llamado a un hambre
  lexicon: HALOT
  rationale: Se conserva Yahvé por el nombre divino explícito. «Ha llamado al hambre» refleja la agencia divina del hebreo con una formulación breve y fiel; «hambre» funciona aquí como calamidad/famine sin necesitar perífrasis.
- source_word: וְגַם בָּא אֶל־הָאָרֶץ
  english_pob_choice: and it has also come upon the land
  chosen_spanish: y también ha venido sobre la tierra
  alternatives_spanish:
  - y también ha llegado a la tierra
  - y también ha caído sobre la tierra
  lexicon: HALOT
  rationale: «Ha venido sobre la tierra» conserva el movimiento metafórico de una calamidad que recae sobre una región. «Tierra» puede referirse tanto al país como al territorio, sin perder el sentido.
- source_word: שֶׁבַע שָׁנִים
  english_pob_choice: for seven years
  chosen_spanish: por siete años
  alternatives_spanish:
  - durante siete años
  - siete años
  lexicon: HALOT
  rationale: La duración se expresa naturalmente con «por» en español de mandato o alcance temporal.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Según la terminología del proyecto, en el texto principal español debe aparecer «Yahvé» para preservar el nombre del pacto, no una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: contested terms / יְהוָה YHWH'
translation_notes:
  revision_awareness: El audit trail inglés pasó de «stay» a «sojourn» para reflejar mejor גור; por eso el español evita «quedarse» o «estancia» y mantiene un verbo de residencia temporal. También se tuvo en cuenta que la versión inglesa final conserva el pluscuamperfecto y la relación causal de la frase del hambre, sin introducir una paráfrasis más libre.
  spanish_consistency_notes:
  - Se preserva la secuencia narrativa con pluscuamperfecto en la cláusula inicial.
  - Se mantiene la repetición léxica de גור con «reside/residas» para no aplanar el matiz de residencia temporal.
  - «Yahvé» se usa consistentemente para יְהוָה conforme al estándar del proyecto.
  - «La tierra» se conserva como equivalente amplio de הָאָרֶץ sin precisar innecesariamente a «país».
