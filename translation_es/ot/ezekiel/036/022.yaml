revisions:
- from: 'Por tanto, di a la casa de Israel: «Así dice el Señor Yahvé: No lo hago por causa de ustedes, casa de Israel, sino por causa de mi santo nombre[a], que ustedes profanaron entre las naciones a las que llegaron[b]».'
  to: 'Por tanto, di a la casa de Israel: «Así dice el Señor Yahvé: No lo hago por causa de ustedes, oh casa de Israel, sino por causa de mi santo nombre, que ustedes profanaron entre las naciones adonde fueron[a]».'
  rationale: Se elimina la nota redundante sobre 'mi santo nombre', se reemplaza la expresión poco idiomática 'a las que llegaron' por 'adonde fueron', que refleja mejor la relativa de destino en español, y se explicita el vocativo con 'oh casa de Israel' para conservar el tono enfático del hebreo y del inglés auditado.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:44:47Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido principal del hebreo: transición inferencial, fórmula profética, motivo negado/afirmado, preservación de ''casa de Israel'', y ''profanaron entre las naciones''. Sin embargo, dos puntos requieren ajuste para mayor fidelidad y naturalidad: (1) ''a las que llegaron'' es menos natural y menos exacto para אֲשֶׁר בָּאתֶם שָׁם que una relativa locativa como ''adonde fueron'' o ''adonde llegaron''; (2) en español bíblico legible conviene marcar mejor el vocativo repetido ''casa de Israel'' con una coma/vocativo más claro. Además, el uso de nota [a] como ''Hebreo: por causa de mi santo nombre'' no preserva una alternativa real, porque repite sustancialmente el texto principal; debe convertirse en una alternativa significativa o eliminarse.'
  spanish_quality_summary: El español es claro y digno, pero 'a las que llegaron' suena forzado al referirse a 'las naciones'. 'No lo hago por causa de ustedes' es entendible, aunque 'No actúo por causa de ustedes' o 'No lo hago por ustedes' sería más directo; aun así, no es un error grave. 'El Señor Yahvé' es aceptable dentro de la política del proyecto, aunque algo tenso estilísticamente. La revisión propuesta mejora fluidez y precisión sin apartarse del hebreo ni del registro eclesial.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה como ''Yahvé'', בֵּית יִשְׂרָאֵל como ''casa de Israel'', גּוֹיִם como ''naciones'', חלל como ''profanar''. No hay conflicto teológico mayor. La principal desalineación documental está en las notas: la nota [a] no representa una alternativa léxica útil, mientras que la nota sobre בוא debe anclarse a una formulación española más natural.'
  issues:
  - severity: medium
    issue: La frase 'a las que llegaron' suena forzada y no es la mejor equivalencia de אֲשֶׁר בָּאתֶם שָׁם.
    rationale: El hebreo usa una relativa locativa con בוא; en español, con 'naciones' funciona mucho mejor 'adonde fueron' o 'adonde llegaron'. La construcción actual es gramaticalmente posible, pero poco idiomática y menos transparente.
  - severity: medium
    issue: La nota [a] no aporta una alternativa real; repite esencialmente el texto principal.
    rationale: 'Las notas deben preservar alternativas significativas. ''Hebreo: por causa de mi santo nombre'' no añade información útil cuando el texto principal ya dice eso.'
  - severity: low
    issue: El vocativo 'casa de Israel' puede marcarse de forma más natural en español.
    rationale: El hebreo repite בֵּית יִשְׂרָאֵל como vocativo enfático. Añadir 'oh' o una puntuación más clara ayuda a reflejar el tono profético formal.
  revised_spanish_text: 'Por tanto, di a la casa de Israel: «Así dice el Señor Yahvé: No lo hago por causa de ustedes, oh casa de Israel, sino por causa de mi santo nombre, que ustedes profanaron entre las naciones adonde fueron[a]».'
  revised_footnotes:
  - marker: a
    text: 'O: «adonde llegaron»; el hebreo literalmente usa un verbo de venir/entrar, pero en español de destino también puede expresarse como «fueron».'
    reason: alternative_reading
  revision_rationale: Se elimina la nota redundante sobre 'mi santo nombre', se reemplaza la expresión poco idiomática 'a las que llegaron' por 'adonde fueron', que refleja mejor la relativa de destino en español, y se explicita el vocativo con 'oh casa de Israel' para conservar el tono enfático del hebreo y del inglés auditado.
