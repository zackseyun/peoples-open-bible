translation:
  language: es
  text: 'Entonces Jacob se enojó con Raquel y dijo[a]: «¿Estoy yo en lugar de Dios, que te ha negado el fruto del vientre[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «ardió su ira contra Raquel».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el fruto del vientre», un giro idiomático para hijos o descendencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף
  english_pob_choice: became angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - ardió de ira
  - se encendió de ira
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente alude al “ardor” de la ira. En español, “se enojó” comunica con naturalidad la fuerza del giro sin volverlo forzado; las alternativas más literales conservan mejor la imagen, pero suenan más marcadas.
- source_word: בְּרָחֵל
  english_pob_choice: with Rachel
  chosen_spanish: con Raquel
  alternatives_spanish:
  - contra Raquel
  - hacia Raquel
  lexicon: HALOT
  rationale: El hebreo marca el objeto hacia quien va dirigida la ira. “Con Raquel” sigue la solución del POB en inglés y mantiene una formulación sobria; “contra Raquel” intensifica más la hostilidad.
- source_word: הֲתַחַת אֱלֹהִים אָנֹכִי
  english_pob_choice: Am I in the place of God
  chosen_spanish: ¿Acaso yo estoy en lugar de Dios?
  alternatives_spanish:
  - ¿Acaso yo estoy bajo Dios?
  - ¿Acaso yo soy Dios en su lugar?
  lexicon: HALOT
  rationale: 'תחת aquí expresa sustitución o ocupar el puesto de otro, no una relación espacial. “En lugar de Dios” reproduce bien la idea de prerrogativa o papel, y evita calcar “bajo”. '
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  lexicon: HALOT
  rationale: En este contexto se refiere al Dios único, y el verbo que sigue también exige lectura singular. La mayúscula conserva la referencia teológica específica.
- source_word: אֲשֶׁר מָנַע
  english_pob_choice: who has withheld
  chosen_spanish: que ha retenido
  alternatives_spanish:
  - que ha impedido
  - que ha negado
  lexicon: HALOT
  rationale: “Retener” expresa bien la idea de impedir o mantener algo apartado. En español, “ha retenido” suena natural y preserva el efecto de una acción con resultado presente.
- source_word: מִמֵּךְ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de ti, Raquel
  lexicon: HALOT
  rationale: El hebreo indica separación o privación. “De ti” es directo y suficiente; mencionar el nombre sería más explícito, pero no necesario.
- source_word: פְּרִי בָטֶן
  english_pob_choice: the fruit of the womb
  chosen_spanish: el fruto del vientre
  alternatives_spanish:
  - hijos
  - descendencia
  - el fruto del vientre materno
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea para mantener transparencia textual. “Hijos” o “descendencia” aclaran el sentido, pero pierden la imagen bíblica del original.
theological_decisions:
- issue: Atribución de la esterilidad a Dios
  english_pob_reading: Jacob attributes Rachel's lack of children to God's withholding of fertility.
  chosen_spanish_reading: Jacob atribuye la falta de hijos de Raquel a que Dios ha retenido la fertilidad.
  alternative_spanish_readings:
  - Jacob solo responde retóricamente sin afirmar agencia divina.
  - Jacob insinúa una causa humana o circunstancial, no divina.
  rationale: La cláusula relativa presenta a Dios como quien ha retenido el fruto del vientre. La traducción debe mantener esa atribución sin suavizarla ni trasladarla a una mera queja retórica.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto quedó en alto acuerdo y sin observaciones. Se mantiene la equivalencia óptima del POB: claridad natural en español, pero conservando la metáfora hebrea donde tiene peso textual.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto cuando el texto menciona el nombre divino, pero aquí aparece אֱלֹהִים, por lo que corresponde «Dios».
  - Se mantiene «fruto del vientre» para preservar la imagen idiomática del hebreo, en línea con el POB en inglés.
  - «En lugar de Dios» conserva la fuerza de תחת como sustitución/posición, no como ubicación física.
