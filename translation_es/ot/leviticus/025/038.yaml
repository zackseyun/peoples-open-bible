    text: 'Hebreo: «YHWH»; tradicionalmente se vierte «el SEÑOR».'
    reason: alternative_reading
  revision_rationale: 'La revisión no cambia el sentido, pero mejora la claridad referencial y la naturalidad del español neutral al explicitar la segunda persona plural en la fórmula pactual: «el Dios de ustedes ... para ser el Dios de ustedes». Esto preserva mejor el valor de אֱלֹהֵיכֶם / לָכֶם לֵאלֹהִים para lectores hispanohablantes sin introducir paráfrasis. La nota sobre el Tetragrama se mantiene sin cambios.'
