base_translation:
  language: en
  yaml_path: translation/ot/judges/014/018.yaml
  text: And the men of the city said to him on the seventh day[a], before the sun went down, “What is sweeter than honey, and what is stronger than a lion?” And he said to them, “If you had not plowed with my heifer[b], you would not have found out my riddle.”
  footnotes:
  - marker: a
    text: Literally, “before the sun came in,” an idiom meaning before sunset.
    reason: lexical_alternative
  - marker: b
    text: Literally, “If you had not plowed with my heifer.” Samson uses a metaphor for his wife, accusing them of using her to solve the riddle.
    reason: cultural_note
