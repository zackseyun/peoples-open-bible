revisions:
- from: Ahora bien, el hombre Micaía tenía una casa de Dios[a], e hizo un efod y terafines, e instaló a uno de sus hijos[b], y este llegó a ser su sacerdote.
  to: Ahora bien, el hombre Mica tenía una casa de dioses[a], e hizo un efod y ídolos domésticos, y consagró a uno de sus hijos[b], y llegó a ser su sacerdote.
  rationale: Se ajusta בֵּית אֱלֹהִים a 'casa de dioses' para reflejar mejor el plural y evitar una lectura de culto legítimo, preservando en nota la alternativa 'santuario'. Se cambia תְרָפִים a 'ídolos domésticos' para seguir la decisión léxica auditada y mejorar claridad. Se normaliza 'Mica' por naturalidad en español bíblico. También se prefiere 'consagró' sobre 'instaló' porque expresa mejor la instalación sacerdotal en contexto cultual, mientras la nota conserva el idiomático literal.
