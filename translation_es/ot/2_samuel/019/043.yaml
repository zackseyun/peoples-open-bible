translation:
  language: es
  text: 'Entonces todo hombre de Judá respondió al hombre de Israel: «Porque el rey es pariente cercano mío[a]. ¿Y por qué te ha enojado este asunto? ¿Acaso hemos comido algo a costa del rey? ¿O nos ha dado él algún don[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «el rey está cerca de mí»; aquí probablemente alude a cercanía de parentesco o de tribu.'
    reason: lexical_alternative
  - marker: b
    text: 'La última cláusula es difícil en hebreo. También podría entenderse: «¿O se nos ha dado algo?» o «¿O se nos ha entregado algo?»'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: Then ... answered
  chosen_spanish: Entonces ... respondió
  alternatives_spanish:
  - Y ... respondió
  - Luego ... respondió
  lexicon: HALOT
  rationale: El wayyiqtol introduce la siguiente acción narrativa; «Entonces» conserva la sucesión temporal natural en español sin perder el valor de respuesta.
- source_word: כָּל אִישׁ יְהוּדָה
  english_pob_choice: every man of Judah
  chosen_spanish: todo hombre de Judá
  alternatives_spanish:
  - todos los hombres de Judá
  - cada hombre de Judá
  lexicon: HALOT
  rationale: Mantiene el singular distributivo del hebreo y su fuerza colectiva, con un español claro y digno.
- source_word: עַל אִישׁ יִשְׂרָאֵל
  english_pob_choice: the man of Israel
  chosen_spanish: al hombre de Israel
  alternatives_spanish:
  - contra el hombre de Israel
  - a los hombres de Israel
  lexicon: HALOT
  rationale: Se conserva el singular retórico del hebreo. La preposición refleja el giro idiomático del discurso entre ambas partes sin sobretraducirlo como una hostilidad explícita.
- source_word: כִּי קָרוֹב הַמֶּלֶךְ אֵלַי
  english_pob_choice: Because the king is a close relative to me
  chosen_spanish: Porque el rey está cerca de mí
  alternatives_spanish:
  - Porque el rey es cercano a mí
  - Porque el rey es mi pariente cercano
  lexicon: HALOT
  rationale: El hebreo literalmente dice «está cerca de mí»; la POB inglesa señala la posible cercanía de parentesco/tribu. En el texto principal se conserva la cercanía verbal sin decidir de forma demasiado interpretativa, y se deja la relación de parentesco en nota.
- source_word: וְלָמָּה זֶּה חָרָה לְךָ עַל הַדָּבָר הַזֶּה
  english_pob_choice: So why has this matter made you angry?
  chosen_spanish: ¿Y por qué te ha enojado este asunto?
  alternatives_spanish:
  - ¿Y por qué se ha encendido esto para ti?
  - ¿Y por qué estás enojado por este asunto?
  lexicon: HALOT
  rationale: חָרָה expresa la idea de «arder» en sentido figurado, es decir, irritarse. «Te ha enojado» comunica el efecto sin perder el carácter idiomático del original. «Este asunto» traduce דָּבָר en sentido de controversia.
- source_word: הֶאָכוֹל אָכַלְנוּ מִן הַמֶּלֶךְ
  english_pob_choice: Have we eaten at all at the king’s expense?
  chosen_spanish: ¿Acaso hemos comido algo a costa del rey?
  alternatives_spanish:
  - ¿Hemos comido en absoluto del rey?
  - ¿Hemos comido algo del rey?
  lexicon: HALOT
  rationale: La construcción intensiva se expresa con «acaso ... algo» para reflejar la negación retórica. «A costa del rey» comunica el sentido de beneficio recibido de él, más que una comida literal.
- source_word: אִם נִשֵּׂאת נִשָּׂא לָנוּ
  english_pob_choice: Or has he given us any gift?
  chosen_spanish: ¿O nos ha dado él algún regalo?
  alternatives_spanish:
  - ¿O se nos ha llevado algo?
  - ¿O nos ha sido dado algo?
  lexicon: HALOT
  rationale: La clausula final es difícil; la revisión inglesa favorece una lectura natural de donación. «Regalo» mantiene el tono concreto y evita oscurecer el contraste con la pregunta anterior sobre recibir provecho.
theological_decisions:
- issue: Lectura de la cercanía del rey
  english_pob_reading: The king is a close relative to me; the sense here is likely kinship or tribal closeness.
  chosen_spanish_reading: El rey está cerca de mí; la cercanía puede implicar parentesco o vínculo tribal.
  alternative_spanish_readings:
  - El rey es mi pariente cercano
  - El rey está próximo a mí
  rationale: No se fuerza una interpretación exclusivamente genealógica en el texto principal. Se conserva el valor literal de la proximidad y se documenta la posible carga de parentesco/tribu, siguiendo la cautela del audit trail.
  doctrine_reference: N/A
- issue: Cláusula final difícil sobre recibir beneficio del rey
  english_pob_reading: Or, 'Have we eaten any of the king’s food? Or has anything been given to us?' The Hebrew of the final clause is difficult.
  chosen_spanish_reading: ¿O nos ha dado él algún regalo?
  alternative_spanish_readings:
  - ¿O se nos ha dado algo?
  - ¿O nos ha sido entregado algo?
  rationale: Se mantiene visible la dificultad textual sin crear una traducción excesivamente técnica en el cuerpo del versículo. La solución elegida sigue la revisión inglesa más reciente y conserva el paralelismo de no haber recibido beneficio.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, especialmente en la cláusula final, donde se prefirió una formulación activa y natural («nos ha dado él algún regalo») en lugar de una pasiva más literal. También se cuidó la primera cláusula para no borrar la ambigüedad documentada entre proximidad literal y parentesco/tribu.
  spanish_consistency_notes:
  - Se mantuvo «rey» sin sustituirlo por «el rey» en notas, y se preservó el singular retórico «hombre de Israel» en el texto principal.
  - Se usó «a costa del rey» para reflejar el sentido de provecho recibido y no una mera referencia alimentaria literal.
  - Se evitó «Cristo», «SEÑOR» u otra terminología no presente en el verso.
  - La puntuación española normaliza las preguntas retóricas sin alterar el contenido semántico del hebreo.
