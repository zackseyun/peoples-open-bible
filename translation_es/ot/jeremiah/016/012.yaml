    issue: Falta la nota distributiva correspondiente a אִישׁ
    rationale: El English POB conservó en nota que el hebreo dice literalmente «cada hombre»/«each man» con uso distributivo para todo el pueblo. El borrador traduce bien con «cada uno», pero no preserva esa alternativa significativa.
  - severity: low
    issue: «de su corazón malo» suena menos natural en español bíblico contemporáneo
    rationale: Aunque es fiel léxicamente, en español resulta algo rígido. «de su malvado corazón» preserva mejor la evaluación moral y la unidad sintáctica del hebreo.
  - severity: low
