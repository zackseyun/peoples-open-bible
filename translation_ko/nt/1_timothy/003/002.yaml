id: 1TI.3.2
reference: 1 Timothy 3:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: δεῖ οὖν τὸν ἐπίσκοπον ἀνεπίλημπτον εἶναι, μιᾶς γυναικὸς ἄνδρα, νηφάλιον, σώφρονα, κόσμιον, φιλόξενον, διδακτικόν,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/003/002.yaml
  text: Therefore an overseer must be above reproach[a], the husband of one wife, sober-minded, self-controlled, respectable, hospitable, able to teach,
  footnotes:
  - marker: a
    text: Or 'a one-woman man'; the phrase may emphasize marital faithfulness rather than only marital status.
    reason: alternative_reading
translation:
  language: ko
  text: 그러므로 감독은 책망할 것이 없는 사람, 한 아내의 남편[a], 절제하는 사람, 신중한 사람, 단정한 사람, 손님을 잘 대접하는 사람, 가르치기를 잘하는 사람이어야 합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「한 여자의 남자」. 본 어구는 단순한 결혼 상태가 아니라 부부간의 신실함을 강조하는 것일 수 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: τὸν ἐπίσκοπον
  english_pob_choice: an overseer
  chosen_korean: 감독
  alternatives_korean:
  - 감독자
  lexicon: BDAG
  rationale: 1:1·3:1과 일관.
- source_word: ἀνεπίλημπτον
  english_pob_choice: above reproach
  chosen_korean: 책망할 것이 없는 사람
  alternatives_korean:
  - 흠 잡을 것이 없는 사람
  - 비난할 것이 없는 사람
  lexicon: BDAG
  rationale: 「책망할 것이 없는」이 한국 교회 정립 어휘.
- source_word: μιᾶς γυναικὸς ἄνδρα
  english_pob_choice: the husband of one wife
  chosen_korean: 한 아내의 남편
  alternatives_korean:
  - 한 여자의 남자
  - 한 부인의 남편
  lexicon: BDAG
  rationale: 직역. 부부간 신실함 해석은 각주.
- source_word: νηφάλιον
  english_pob_choice: sober-minded
  chosen_korean: 절제하는 사람
  alternatives_korean:
  - 깨어 있는 사람
  - 술에 취하지 않는 사람
  lexicon: BDAG
  rationale: νηφάλιος는 「술에 취하지 않은·절제된」 어감. 「절제하는」이 자연스럽다.
- source_word: σώφρονα
  english_pob_choice: self-controlled
  chosen_korean: 신중한 사람
  alternatives_korean:
  - 분별 있는 사람
  - 자제하는 사람
  lexicon: BDAG
  rationale: σώφρων의 「분별·자제」를 「신중한」으로 옮긴다. 2:9·2:15 σωφροσύνη(자제함)와 구분을 위해 형용사적 「신중함」 사용.
- source_word: κόσμιον
  english_pob_choice: respectable
  chosen_korean: 단정한 사람
  alternatives_korean:
  - 품위 있는 사람
  - 예의 바른 사람
  lexicon: BDAG
  rationale: 2:9 κοσμίῳ와 일관.
- source_word: φιλόξενον
  english_pob_choice: hospitable
  chosen_korean: 손님을 잘 대접하는 사람
  alternatives_korean:
  - 후히 대접하는 사람
  - 환대하는 사람
  lexicon: BDAG
  rationale: φιλοξενία의 본의(낯선 손님을 사랑함)를 「손님을 잘 대접하는」으로 풀어 옮긴다.
- source_word: διδακτικόν
  english_pob_choice: able to teach
  chosen_korean: 가르치기를 잘하는 사람
  alternatives_korean:
  - 가르칠 능력이 있는 사람
  - 교사 자격이 있는 사람
  lexicon: BDAG
  rationale: 「잘하는」이 능력·자격을 자연스럽게 함의한다.
