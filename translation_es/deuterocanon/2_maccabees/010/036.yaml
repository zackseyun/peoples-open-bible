revisions:
- from: Pero si hay asuntos que deben ser presentados al rey[a], envíen a alguien de inmediato para examinar estas cosas, para que tengamos cómo obrar conforme a lo que conviene; porque nosotros vamos camino de Antioquía.
  to: Pero si hay asuntos que deben ser presentados al rey[a], envíen a alguien de inmediato para investigar estos asuntos, para que podamos actuar como corresponde; porque nosotros vamos camino de Antioquía.
  rationale: 'Se mantiene el sentido y la estructura del original y de la auditoría inglesa, pero se reemplazan dos giros rígidos por español más natural: «investigar estos asuntos» refleja mejor περὶ τούτων en contexto, y «para que podamos actuar como corresponde» comunica con claridad el valor práctico de ἵνʼ ἔχωμεν ὡς καθήκει ἡμῖν. La nota [a] se conserva sin cambios porque sigue documentando adecuadamente la compresión del griego.'
