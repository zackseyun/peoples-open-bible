translation:
  language: es
  text: 'Entonces Isaías dijo a Ezequías: «Oye la palabra de Yahvé[a] de los Ejércitos[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: YHWH; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
  - marker: b
    text: O «de las huestes». El título hebreo se refiere a Yahvé como soberano sobre las huestes celestiales y terrenales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: La forma consecutiva waw avanza la narración; «Entonces ... dijo» expresa secuencia narrativa natural en español sin perder el valor progresivo del verbo.
- source_word: יְשַׁעְיָהוּ
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  alternatives_spanish:
  - Isaia
  lexicon: HALOT
  rationale: Nombre propio profético en la forma bíblica usual y reconocible en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: Preposición direccional simple; «a» es la correspondencia natural en español.
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Ezequiel
  lexicon: HALOT
  rationale: Nombre propio del rey en su forma bíblica usual en español.
- source_word: שְׁמַע
  english_pob_choice: Hear
  chosen_spanish: Oye
  alternatives_spanish:
  - Escucha
  lexicon: HALOT
  rationale: Imperativo singular directo. «Oye» mantiene el tono profético breve y solemne; «Escucha» también sería posible, pero aquí «oye» reproduce mejor la concisión del hebreo.
- source_word: דְּבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el asunto
  lexicon: HALOT
  rationale: En fórmula profética, דְּבַר refiere al mensaje hablado de Dios; «la palabra» conserva el idiomatismo bíblico y su fuerza técnica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se preserva el nombre divino del Tetragrámaton según la política POB: transliteración «Yahvé» en lugar de una sustitución titular.'
- source_word: צְבָאוֹת
  english_pob_choice: of Hosts
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los Ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: «Hosts» se vierte de manera transparente como «Ejércitos» para conservar el alcance del título divino y su referencia a los ejércitos celestiales y terrenales. En español, esta formulación es clara y litúrgicamente legible sin imponer la sustitución tradicional por «Señor».
theological_decisions:
- issue: Tratamiento del nombre divino YHWH en el título יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Hosts
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - el SEÑOR de los Ejércitos
  - Yahvé de las huestes
  rationale: El texto hebreo usa explícitamente el Tetragrámaton, por lo que la traducción conserva el nombre propio divino «Yahvé» en vez de sustituirlo por un título. «De los Ejércitos» mantiene el sentido titular de צְבָאוֹת y evita estrecharlo indebidamente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió el anclaje de notas al incluir ambos marcadores en el texto español. Además, se mantuvo la puntuación de cita directa sin dos puntos, siguiendo el precedente de revisión del audit trail en inglés.
  spanish_consistency_notes:
  - 'Se conservaron los nombres propios bíblicos en formas españolas estándar: Isaías, Ezequías.'
  - Se prefirió «Yahvé» conforme a la política doctrinal indicada, no «SEÑOR».
  - «Oye» mantiene el imperativo profético conciso del hebreo.
  - «de los Ejércitos» traduce el título צְבָאוֹת de forma clara y reconocible para lectores de español bíblico.
