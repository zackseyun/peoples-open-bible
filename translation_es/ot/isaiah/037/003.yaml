translation:
  language: es
  text: 'Y le dijeron: «Así dice Ezequías: Este día es día de angustia, reprensión y afrenta[a]; porque los niños han llegado al momento de nacer[b], y no hay fuerza para dar a luz».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «día de angustia, reproche y desprecio».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los niños han llegado al lugar del parto / al punto de romper». La expresión hebrea es una metáfora de parto que describe una situación llegada al momento del nacimiento, pero sin fuerza para completarlo.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמְרוּ אֵלָיו
  english_pob_choice: And they said to him
  chosen_spanish: Y ellos le dijeron
  alternatives_spanish:
  - Y le dijeron
  lexicon: HALOT
  rationale: Conserva la secuencia narrativa y el destinatario indirecto con español natural y sobrio. El pronombre explícito «ellos» ayuda a reflejar el sujeto plural del verbo hebreo.
- source_word: כֹּה אָמַר חִזְקִיָּהוּ
  english_pob_choice: Thus says Hezekiah
  chosen_spanish: Así dice Ezequías
  alternatives_spanish:
  - Así ha dicho Ezequías
  - Esto dice Ezequías
  lexicon: HALOT
  rationale: Se mantiene la fórmula mensajera/profética en un registro natural para español. «Así dice» reproduce bien el valor formular de כֹה אָמַר sin volverlo arcaico.
- source_word: יוֹם צָרָה
  english_pob_choice: a day of distress
  chosen_spanish: día de angustia
  alternatives_spanish:
  - día de aflicción
  - día de angustia y aflicción
  lexicon: HALOT
  rationale: צָרָה abarca calamidad, angustia y opresión; «angustia» comunica el peso de la crisis con dignidad y fluidez en español.
- source_word: וְתוֹכֵחָה
  english_pob_choice: rebuke
  chosen_spanish: reprensión
  alternatives_spanish:
  - reprensión
  - reproche
  - corrección
  lexicon: HALOT
  rationale: «Reprensión» conserva el sentido de corrección acusadora o censura pública que encaja con la serie nominal del texto.
- source_word: וּנְאָצָה
  english_pob_choice: disgrace
  chosen_spanish: afrenta
  alternatives_spanish:
  - desgracia
  - desprecio
  - afrenta pública
  lexicon: HALOT
  rationale: El sustantivo puede expresar desprecio, insulto o deshonra. «Afrenta» preserva mejor la nota de humillación y oprobio sin diluirla.
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: This day
  chosen_spanish: Este día
  alternatives_spanish:
  - Hoy
  - Este mismo día
  lexicon: HALOT
  rationale: Se conserva el énfasis demostrativo y solemne del hebreo con una expresión clara y formal.
- source_word: כִּי בָאוּ בָנִים עַד מַשְׁבֵּר
  english_pob_choice: for children have come to the point of birth
  chosen_spanish: porque los hijos han llegado hasta el alumbramiento[b]
  alternatives_spanish:
  - porque los hijos han llegado al parto
  - porque los hijos han llegado al punto de alumbrar
  lexicon: HALOT
  rationale: «Hijos» refleja el hebreo literal בָנִים y puede referirse a descendencia/niños en general; «alumbramiento» intenta verter מַשְׁבֵּר como el punto de dar a luz, manteniendo la metáfora del parto. Se deja la ambigüedad de la imagen sin aplanarla.
- source_word: וְכֹחַ אַיִן לְלֵדָה
  english_pob_choice: and there is no strength to give birth
  chosen_spanish: y no hay fuerza para dar a luz
  alternatives_spanish:
  - y no hay fuerza para el parto
  - y no hay fuerza para alumbrar
  lexicon: HALOT
  rationale: 'Expresa con naturalidad la clausura de la metáfora de parto: la hora de alumbrar ha llegado, pero falta la fuerza necesaria para el nacimiento.'
theological_decisions:
- issue: Metáfora de parto para la crisis nacional
  english_pob_reading: Retain the metaphor explicitly rather than flattening it into a generalized statement of helplessness.
  chosen_spanish_reading: Conservar explícitamente la metáfora del alumbramiento y del parto.
  alternative_spanish_readings:
  - Aplanarlo como una simple declaración de impotencia
  - Reformularlo como una crisis al borde del colapso
  rationale: El hebreo usa una imagen vívida para describir la situación desesperada de Judá. Mantenerla preserva la fuerza retórica y evita interpretar más de lo que el texto dice.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Términos de reproche y deshonra en la triada nominal
  english_pob_reading: day of distress, rebuke, and disgrace
  chosen_spanish_reading: día de angustia, reprensión y afrenta
  alternative_spanish_readings:
  - día de angustia, reproche y deshonra
  - día de aflicción, corrección y desprecio
  rationale: La triada se traduce con términos que conservan tanto la severidad del juicio como la humillación pública implícita en el hebreo, sin convertirla en una formulación doctrinal ajena al contexto.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requerían cambios. Este borrador sigue el acuerdo alto del contexto auditado y ajusta la puntuación y el registro al español, manteniendo la metáfora del parto y la serie nominal de calamidad, reprensión y afrenta.
  spanish_consistency_notes:
  - Se usa «Ezequías» para el nombre propio según uso español estándar.
  - 'Se preserva el paralelismo nominal con tres sustantivos coordinados: angustia, reprensión y afrenta.'
  - La metáfora obstétrica se conserva sin suavizarla a una mera idea de crisis, en línea con el audit trail en inglés.
  - Se evita «SEÑOR» u otra sustitución devocional, ya que este versículo no contiene el tetragrámaton.
