translation:
  language: es
  text: 'Y la batalla en Babilonia contra los Gálatas[a] fue así: cuando todos los que habían venido al auxilio eran ocho mil, junto con cuatro mil macedonios, y los macedonios estaban en apuros, los seis mil destruyeron a los ciento veinte mil por la ayuda que les venía del cielo, y recibieron gran ventaja.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «galos». El término étnico griego puede verterse de ambas maneras según se enfatice a los gálatas de Anatolia o su identidad celta más amplia.
    reason: alternative_reading
lexical_decisions:
- source_word: παράταξιν
  english_pob_choice: battle
  chosen_spanish: batalla
  alternatives_spanish:
  - combate
  - engagement
  - orden de batalla
  lexicon: LSJ
  rationale: παράταξιν nombra un enfrentamiento militar dispuesto en formación; «batalla» comunica de forma natural el sentido bélico en español sin perder la referencia a un choque armado concreto.
- source_word: γενομένην
  english_pob_choice: went this way
  chosen_spanish: siguió así
  alternatives_spanish:
  - había sucedido así
  - se desarrolló así
  - ocurrió así
  lexicon: LSJ
  rationale: La construcción con ὡς presenta el modo en que resultó el combate. «Siguió así» mantiene el valor explicativo y suena natural en español.
- source_word: Γαλάτας
  english_pob_choice: Galatians
  chosen_spanish: galatas
  alternatives_spanish:
  - gálatas
  - galos
  lexicon: LSJ
  rationale: Se conserva la transliteración histórica del etnónimo griego. En español, «galatas» remite directamente al grupo étnico mencionado; la alternativa «galos» queda reservada para la nota textual.
- source_word: ἐπὶ τὴν χρείαν ἦλθον
  english_pob_choice: had come to the aid
  chosen_spanish: habían venido al auxilio
  alternatives_spanish:
  - habían acudido a la necesidad
  - habían llegado al momento de necesidad
  - habían venido al socorro
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «venir a la necesidad», en español la expresión más idiomática y fiel en contexto militar es «venir al auxilio», que conserva la idea de acudir en emergencia.
- source_word: ἀπορουμένων
  english_pob_choice: were hard pressed
  chosen_spanish: estaban muy apurados
  alternatives_spanish:
  - estaban muy presionados
  - estaban en gran dificultad
  - se hallaban sin salida
  lexicon: LSJ
  rationale: El participio expresa hallarse sin recursos o en aprieto. «Muy apurados» comunica la presión real de la situación en español moderno; se evita una formulación demasiado abstracta.
- source_word: ἀπώλεσαν
  english_pob_choice: destroyed
  chosen_spanish: destruyeron a
  alternatives_spanish:
  - hicieron perecer a
  - aniquilaron a
  - mataron a
  lexicon: LSJ
  rationale: El verbo griego es amplio y fuerte. «Destruyeron a» preserva esa fuerza sin especificar el modo exacto de la pérdida, como hace el griego.
- source_word: δώδεκα μυριάδας
  english_pob_choice: one hundred twenty thousand
  chosen_spanish: ciento veinte mil
  alternatives_spanish:
  - doce miríadas
  - 120 mil
  lexicon: LSJ
  rationale: Se expresa el número de forma idiomática en español, manteniendo la magnitud total del griego sin tecnicismos innecesarios.
- source_word: διὰ τὴν γινομένην αὐτοῖς ἀπʼ οὐρανοῦ βοήθειαν
  english_pob_choice: because of the help coming to them from heaven
  chosen_spanish: por la ayuda que les venía del cielo
  alternatives_spanish:
  - por la ayuda que les llegaba del cielo
  - a causa de la ayuda del cielo que se les daba
  - por la ayuda que les venía de los cielos
  lexicon: LSJ
  rationale: «Del cielo» preserva el circunloquio reverente del griego y del contexto judío, sin introducir explícitamente «Dios» donde el texto no lo nombra. «Les venía» reproduce el carácter dinámico de una ayuda en curso.
- source_word: ὠφέλειαν πολλὴν ἔλαβον
  english_pob_choice: they received great advantage
  chosen_spanish: recibieron gran provecho
  alternatives_spanish:
  - obtuvieron gran beneficio
  - recibieron gran ventaja
  - sacaron gran provecho
  lexicon: LSJ
  rationale: ὠφέλεια puede significar beneficio, ventaja o provecho. En español, «gran provecho» mantiene una amplitud semejante y funciona bien en contexto militar y de resultado práctico.
theological_decisions:
- issue: «desde el cielo» como circunloquio para ayuda divina
  english_pob_reading: A reverential way of describing divine aid without naming God directly.
  chosen_spanish_reading: Una manera reverente de describir la ayuda divina sin nombrar a Dios directamente.
  alternative_spanish_readings:
  - Una referencia general a ayuda providencial
  - Una descripción no específica de auxilio favorable
  rationale: Se conserva la expresión «del cielo» porque el griego la usa como forma reverente de aludir a la intervención divina. Traducirla explícitamente como «de Dios» iría más allá de lo que el texto dice.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del POB en inglés que prefirió una redacción más directa y natural («battle», «went this way», «had come to the aid», «were hard pressed»). La versión española sigue esa orientación, pero ajusta idiomáticamente cada giro al español sin perder el registro formal ni los matices militares y reverenciales del original griego.
  spanish_consistency_notes:
  - Se mantiene «del cielo» para la ayuda, en coherencia con el circunloquio reverente documentado.
  - Se conserva la magnitud numérica con cifras redondas idiomáticas en español.
  - Se evita «Cristo» o vocabulario cristológico, pues el pasaje no lo requiere.
  - Se usa «galatas» en el texto principal y se deja la alternativa «gálatas» en nota para reflejar la oscilación ortográfica posible.
