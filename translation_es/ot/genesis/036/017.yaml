revisions:
- from: 'Y estos son los hijos de Reuel, el hijo de Esaú: jefe Nahat[a], jefe Zérah, jefe Samaa, jefe Mizzá. Estos son los jefes de Reuel en la tierra de Edom. Estos son los hijos de Basemat, la esposa de Esaú.'
  to: 'Y estos son los hijos de Reuel, el hijo de Esaú: jefe Nahat[a], jefe Zera, jefe Samma, jefe Miza. Estos son los jefes de Reuel en la tierra de Edom. Estos son los hijos de Basemat, la esposa de Esaú.'
  rationale: 'Se conservó la traducción general porque es fiel al hebreo y al expediente POB, pero se corrigieron las transliteraciones de los nombres para que sean más naturales y consistentes en español bíblico legible: ''Zera'', ''Samma'' y ''Miza'' en lugar de formas con tildes o simplificaciones menos fieles. No se requirió cambio doctrinal ni estructural.'
  reviewer_model: gpt-5.4
