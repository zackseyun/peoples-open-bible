translation:
  language: es
  text: También sus mercenarios en medio de ella son como becerros engordados; porque también ellos se volvieron y huyeron juntos; no resistieron, pues vino sobre ellos el día de su desgracia, el tiempo de su castigo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el tiempo de su visitación' o 'el tiempo de su ajuste de cuentas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂכִרֶיהָ
  english_pob_choice: her hired soldiers
  chosen_spanish: sus soldados mercenarios
  alternatives_spanish:
  - sus mercenarios
  - sus hombres asalariados
  lexicon: HALOT
  rationale: El hebreo designa personas contratadas por paga; en este contexto militar, el sentido natural es el de tropas mercenarias. 'Soldados mercenarios' conserva la fuerza militar del término y resulta claro en español moderno.
- source_word: בְקִרְבָּהּ
  english_pob_choice: in her midst
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - en su interior
  - dentro de ella
  lexicon: HALOT
  rationale: La expresión señala ubicación interna respecto de Egipto. 'En medio de ella' mantiene la imagen espacial sin sonar forzado en español.
- source_word: כְּעֶגְלֵי מַרְבֵּק
  english_pob_choice: like fattened calves
  chosen_spanish: como becerros engordados
  alternatives_spanish:
  - como terneros engordados
  - como becerros de engorde
  lexicon: HALOT
  rationale: La imagen apunta a animales cebados en establo. 'Becerros engordados' comunica bien la idea de animales alimentados para engordar y mantiene el tono imagético del original.
- source_word: הִפְנוּ
  english_pob_choice: have turned
  chosen_spanish: se volvieron
  alternatives_spanish:
  - dieron media vuelta
  - se volvieron atrás
  lexicon: HALOT
  rationale: El verbo indica giro o vuelta. En la secuencia militar, 'se volvieron' conserva el movimiento de retirada sin añadir demasiado.
- source_word: נָסוּ
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - fueron puestos en fuga
  - corrieron
  lexicon: HALOT
  rationale: El sentido básico es huir en fuga militar. 'Huyeron' es natural en español y conserva la rapidez del colapso.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - todos juntos
  - a la vez
  lexicon: HALOT
  rationale: Equivale de modo directo a una acción conjunta. 'Juntos' es el adverbio más natural y fiel.
- source_word: לֹא עָמָדוּ
  english_pob_choice: they did not stand
  chosen_spanish: no se sostuvieron
  alternatives_spanish:
  - no se mantuvieron firmes
  - no resistieron
  lexicon: HALOT
  rationale: Aunque literalmente es 'no estuvieron de pie', en contexto bélico el español idiomático pide la idea de no mantenerse firmes. 'No se sostuvieron' conserva la imagen de incapacidad para permanecer en pie y deja visible la tensión semántica del hebreo.
- source_word: יוֹם אֵידָם
  english_pob_choice: the day of their disaster
  chosen_spanish: el día de su desgracia
  alternatives_spanish:
  - el día de su desastre
  - el día de su calamidad
  lexicon: HALOT
  rationale: אֵיד expresa desgracia, calamidad o ruina. 'Desgracia' es una opción clara y sobria en español; mantiene el juicio sin forzar un término demasiado técnico.
- source_word: עֵת פְּקֻדָּתָם
  english_pob_choice: the time of their punishment
  chosen_spanish: el tiempo de su castigo
  alternatives_spanish:
  - el tiempo de su visitación
  - el tiempo de su cuenta
  lexicon: HALOT
  rationale: En este contexto de juicio, פְּקֻדָּה lleva fuerza punitiva. 'Castigo' expresa ese sentido en español contemporáneo; se conserva la alternativa tradicional de 'visitación' en nota por su valor semántico posible.
theological_decisions:
- issue: Valor de פְּקֻדָּה en un oráculo de juicio
  english_pob_reading: the time of their punishment
  chosen_spanish_reading: el tiempo de su castigo
  alternative_spanish_readings:
  - el tiempo de su visitación
  - el tiempo de su visita judicial
  rationale: La estrofa paralela 'el día de su desgracia' inclina el sentido de פְּקֻדָּה hacia la retribución. 'Castigo' hace explícito el juicio divino sin borrar la posibilidad semántica tradicional de 'visitación'.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La versión inglesa POB está marcada como sin cambios tras la última revisión. Este borrador español sigue esa lectura estable y mantiene la única nota léxica relevante sobre פְּקֻדָּה, reflejando la alternativa tradicional 'visitación' sin desplazar el sentido de juicio del contexto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplicable aquí porque el versículo no contiene el nombre divino explícito.
  - Se usa 'castigo' para פְּקֻדָּה por coherencia con el paralelismo de juicio en la línea anterior.
  - Se evita 'siervos' o 'criados' porque שְׂכִרֶיהָ es militar y remunerado, no doméstico.
  - La puntuación reproduce la progresión causal del hebreo con dos cláusulas 'porque'.
