review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura general del hebreo: la cueva, el campo de Macpela, la referencia locativa a Mamre, la tierra de Canaán, la compra por Abraham a Efrón el hitita y el propósito legal sepulcral. Sin embargo, necesita ajuste en dos puntos. Primero, el anclaje de la nota [a] está mal colocado: la nota explica «frente a Mamre», no «Macpela». Segundo, «de manos de Efrón» suena más interpretativo que el más directo «de Efrón», y «posesión funeraria» es comprensible pero menos claro y menos cercano al matiz jurídico de אֲחֻזַּת קָבֶר que «propiedad para sepultura».'
  spanish_quality_summary: El texto es generalmente legible y digno, pero la cadena relativa se beneficiaría de una puntuación más limpia y de un vocabulario un poco más natural para lectura bíblica amplia. «La cual» puede simplificarse a «que» sin pérdida. «De manos de» añade color no requerido por el hebreo. «Propiedad para sepultura» comunica mejor el registro legal que «posesión funeraria».
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. Los nombres propios «Macpela», «Mamre», «Canaán», «Abraham» y «Efrón» están bien. «Hitita» es correcto. La decisión sobre אֲחֻזָּה debe conservar fuerza de propiedad/posesión legal; por eso conviene «propiedad para sepultura» o «posesión para sepultura» antes que una formulación más difusa.
  issues:
  - severity: medium
    issue: La nota [a] está anclada a «Macpela» en vez de a la frase «frente a Mamre».
    rationale: La nota explica alternativas de עַל־פְּנֵי מַמְרֵא («frente a / mirando a / ante Mamre»), no del nombre propio «Macpela». El anclaje actual induce a pensar que la nota comenta el topónimo.
  - severity: medium
    issue: «de manos de Efrón» sobretraduce מֵאֵת.
    rationale: El hebreo simplemente marca la procedencia del vendedor en una transacción. «De Efrón el hitita» es más fiel y más sobrio en español bíblico.
  - severity: low
    issue: «posesión funeraria» es menos claro que una formulación explícita de propiedad sepulcral.
    rationale: Aunque no es incorrecto, puede sonar moderno-administrativo o ambiguo. «Propiedad para sepultura» preserva mejor el matiz legal de אֲחֻזָּה y la finalidad de קָבֶר.
  revised_spanish_text: en la cueva que está en el campo de Macpela, que está frente a Mamre[a], en la tierra de Canaán, que Abraham compró junto con el campo de Efrón el hitita, como propiedad para sepultura[b].
  revised_footnotes:
