translation:
  language: es
  text: Pero el hombre que está limpio y no está de viaje, y sin embargo deja de celebrar la Pascua, esa persona[a] será cortada de entre su pueblo; porque no presentó la ofrenda de Yahvé en su tiempo señalado, ese hombre llevará su pecado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'esa alma será cortada'. El modismo hebreo puede denotar un juicio pactual severo sin especificar aquí exactamente cómo se lleva a cabo.
    reason: lexical_alternative
  - marker: b
    text: O, 'llevará su culpa'.
    reason: lexical_alternative
lexical_decisions:
- source_word: טָהוֹר
  english_pob_choice: clean
  chosen_spanish: limpio
  alternatives_spanish:
  - puro
  lexicon: HALOT
  rationale: En este contexto ritual, טָהוֹר designa pureza ceremonial, no perfección moral. 'Limpio' comunica bien esa condición en español actual sin perder el matiz cultual.
- source_word: וּבְדֶרֶךְ לֹא הָיָה
  english_pob_choice: is not on a journey
  chosen_spanish: no está de viaje
  alternatives_spanish:
  - no estaba en el camino
  - no está ausente por un viaje
  lexicon: HALOT
  rationale: La expresión contrasta con la excepción de quien está fuera por desplazamiento. 'No está de viaje' expresa de forma natural la idea de ausencia por viaje en español.
- source_word: וְחָדַל לַעֲשׂוֹת
  english_pob_choice: yet fails to keep
  chosen_spanish: y sin embargo deja de hacer
  alternatives_spanish:
  - y se abstiene de hacer
  - y descuida celebrar
  lexicon: HALOT
  rationale: חָדַל implica cesar, abstenerse o dejar de hacer. En combinación con לעשות את הפסח, 'deja de hacer la Pascua' conserva el sentido de omisión sin introducir más explicación de la que el texto da.
- source_word: הַפֶּסַח
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - la Pascua como celebración
  - la Pascua sacrificada
  lexicon: HALOT
  rationale: Aquí el término puede abarcar la observancia pascual completa. 'La Pascua' es el equivalente natural y suficiente en español, dejando que el contexto cultual precise el alcance.
- source_word: וְנִכְרְתָה הַנֶּפֶשׁ הַהִוא
  english_pob_choice: that person shall be cut off
  chosen_spanish: esa persona será cortada
  alternatives_spanish:
  - esa persona será cortada de su pueblo
  - esa persona será excluida
  lexicon: HALOT
  rationale: נפש señala al individuo, no solo a un 'alma' en sentido abstracto. 'Será cortada' preserva el idiomatismo bíblico y la ambigüedad judicial/covenantal que el inglés POB también mantiene.
- source_word: מֵעַמֶּיהָ
  english_pob_choice: from his people
  chosen_spanish: de entre su pueblo
  alternatives_spanish:
  - de su pueblo
  - de entre sus parientes
  lexicon: HALOT
  rationale: Aunque el sufijo hebreo concuerda con נפש, el referente del contexto es el hombre mencionado. 'De entre su pueblo' reproduce bien el valor relacional y comunitario del hebreo.
- source_word: קָרְבַּן יְהוָה
  english_pob_choice: the LORD’s offering
  chosen_spanish: la ofrenda de Yahvé
  alternatives_spanish:
  - la ofrenda de Yahvé
  - la ofrenda para Yahvé
  lexicon: HALOT
  rationale: קָרְבָּן es una ofrenda presentada a Dios. 'Ofrenda de Yahvé' mantiene el vínculo posesivo y conserva el nombre divino según la norma del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como 'Yahvé' conforme a la terminología del proyecto, preservando el nombre propio divino en lugar de sustituirlo por un título.
- source_word: בְּמֹעֲדוֹ
  english_pob_choice: at its appointed time
  chosen_spanish: en su tiempo señalado
  alternatives_spanish:
  - en su momento fijado
  - en el tiempo establecido para ello
  lexicon: HALOT
  rationale: מוֹעֵד aquí se refiere al momento prescrito y fijo para la observancia. 'En su tiempo señalado' es claro y fiel al valor temporal e institucional del término.
- source_word: חֶטְאוֹ יִשָּׂא
  english_pob_choice: shall bear his sin
  chosen_spanish: llevará su pecado
  alternatives_spanish:
  - llevará su culpa
  - cargará con su pecado
  lexicon: HALOT
  rationale: El hebreo expresa responsabilidad y carga por la ofensa. 'Llevará su pecado' conserva el idioma bíblico; 'culpa' queda como alternativa interpretativa, como en la auditoría inglesa.
- source_word: הָאִישׁ הַהוּא
  english_pob_choice: that man
  chosen_spanish: ese hombre
  alternatives_spanish:
  - aquel hombre
  - ese varón
  lexicon: HALOT
  rationale: El hebreo es masculinas singular explícito. 'Ese hombre' mantiene la referencia personal y evita suavizar el género marcado del original.
theological_decisions:
- issue: Sentido del castigo 'será cortado'
  english_pob_reading: Retain the idiom 'shall be cut off' without specifying whether it means death, excommunication, childlessness, or divine judgment.
  chosen_spanish_reading: Mantener 'será cortado' sin precisar si implica muerte, expulsión, esterilidad o juicio divino.
  alternative_spanish_readings:
  - será excluido de la comunidad
  - será muerto
  rationale: El hebreo presenta una fórmula legal y teológica deliberadamente no explicitada en el versículo. La versión española conserva esa tensión en lugar de resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica del idiomático hebreo sin cerrarlo interpretativamente.
translation_notes:
  revision_awareness: 'Revisión de alta concordancia: no se requirieron cambios respecto al pase más reciente; la formulación española sigue de cerca la auditoría inglesa y conserva las ambigüedades señaladas.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrámaton, conforme al estándar del proyecto.
  - '''Pascua'' se usa como término cultual natural en español; el contexto ya especifica la ofrenda.'
  - '''Ser cortado'' conserva el modismo bíblico y la incertidumbre jurídica del hebreo.'
  - El poseedor en 'su pueblo' sigue el referente contextual masculino del hombre, no el sufijo femenino de נפש.
