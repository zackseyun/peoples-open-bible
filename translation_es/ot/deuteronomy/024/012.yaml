revisions:
- from: Y si es un hombre pobre[a], no te acostarás con su prenda.
  to: Y si es un hombre pobre[a], no te dormirás con su prenda en tu poder.
  rationale: 'Se revisa únicamente la cláusula verbal para evitar la ambigüedad idiomática de «acostarse con» en español contemporáneo, manteniendo el sentido concreto del hebreo: no pasar la noche reteniendo la prenda del pobre. La nota conserva la alternativa más literal, pero explicada para impedir mala interpretación.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:32:46Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura condicional y el sentido legal del hebreo: וְאִם = «Y si», אִישׁ עָנִי הוּא = «es un hombre pobre», y בַּעֲבֹטוֹ se entiende correctamente como el objeto dado en garantía. Sin embargo, «no te acostarás con su prenda» en español introduce una ambigüedad fuerte e involuntaria por el uso de «acostarse con», que normalmente sugiere relación sexual, y por eso no preserva fielmente el sentido de לֹא תִשְׁכַּב ... בַּעֲבֹטוֹ en español contemporáneo.'
  spanish_quality_summary: El español es mayormente claro, pero la combinación «acostarse con» resulta poco natural y potencialmente engañosa en este contexto. Una formulación como «no te dormirás con su prenda en tu poder» mantiene la imagen de pasar la noche reteniendo la prenda y evita la ambigüedad. La nota también debe ajustarse para reflejar la alternativa literal sin sonar extraña.
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. «Hombre pobre» y «prenda» son adecuados aquí. La revisión propuesta conserva la decisión léxica de «prenda» frente a alternativas más técnicas como «garantía» o «colateral».
  issues:
  - severity: high
    issue: «no te acostarás con su prenda» es ambiguo en español
    rationale: En español actual, «acostarse con» se entiende comúnmente en sentido sexual. Eso distorsiona el mandato legal sobre no retener durante la noche la prenda tomada en empeño.
  - severity: medium
    issue: La nota al pie reproduce una alternativa poco natural
    rationale: «no te acostarás con su garantía» no resuelve la ambigüedad principal y «garantía» es menos preciso que «prenda» para el objeto concreto entregado como seguridad.
  revised_spanish_text: Y si es un hombre pobre[a], no te dormirás con su prenda en tu poder.
  revised_footnotes:
  - marker: a
    text: 'O: «no te acostarás con su prenda», es decir, no debes retener durante la noche el objeto que él entregó como seguridad de un préstamo.'
    reason: lexical_alternative
  revision_rationale: 'Se revisa únicamente la cláusula verbal para evitar la ambigüedad idiomática de «acostarse con» en español contemporáneo, manteniendo el sentido concreto del hebreo: no pasar la noche reteniendo la prenda del pobre. La nota conserva la alternativa más literal, pero explicada para impedir mala interpretación.'
