  text: καὶ πᾶν κτίσμα ὃ ἐν τῷ οὐρανῷ καὶ ἐπὶ τῆς γῆς καὶ ὑποκάτω τῆς γῆς καὶ ἐπὶ τῆς ⸀θαλάσσης, καὶ τὰ ἐν αὐτοῖς ⸀πάντα, ἤκουσα λέγοντας· Τῷ καθημένῳ ἐπὶ ⸂τῷ θρόνῳ⸃ καὶ τῷ ἀρνίῳ ἡ εὐλογία καὶ ἡ τιμὴ καὶ ἡ δόξα καὶ τὸ κράτος εἰς τοὺς αἰῶνας τῶν ⸀αἰώνων.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/005/013.yaml
  text: 'And I heard every creature in heaven and on the earth and under the earth and on the sea[a], and all that is in them, saying[b], “To the one seated on the throne and to the Lamb be blessing and honor and glory and dominion forever and ever.”'
  footnotes:
  - marker: a
    text: Or “every created thing.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “to the ages of ages.”
    reason: lexical_alternative
translation:
  language: ko
  text: '또 내가 들으니, 하늘과 땅 위와 땅 아래와 바다에 있는 모든 피조물과 그 안에 있는 모든 것이 말하기를, 「보좌에 앉으신 분과 어린 양께 찬송과 존귀와 영광과 권세가 영원무궁토록 있을지어다.」 하였습니다.'
  philosophy: optimal-equivalence
theological_decisions:
- issue: '5:13의 사중적 보편 송영(하늘·땅·땅 아래·바다 + 모든 피조물) 보존'
  chosen_reading: '「보좌에 앉으신 분과 어린 양께 찬송과 존귀와 영광과 권세가 영원무궁토록」'
  alternative_readings:
  - 짧게 압축
  rationale: 5장의 송영은 어린 양과 보좌에 앉으신 분께 동등하게 우주적 경배를 돌린다. 사중적 영역과 네 겹 송영 항목(찬송·존귀·영광·권세)을 일관되게 옮긴다.
  doctrine_reference: 'DOCTRINE.md: 송영 형식 보존'
