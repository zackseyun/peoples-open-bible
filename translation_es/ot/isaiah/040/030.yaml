translation:
  language: es
  text: Hasta los jóvenes se fatigan y se cansan, y los jóvenes[a] ciertamente tropiezan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jóvenes vigorosos» o simplemente «jóvenes». El hebreo בַּחוּרִים se refiere a jóvenes varones en la plenitud de sus fuerzas; aquí se mantiene «jóvenes» en el texto principal, pero el término puede sugerir vigor juvenil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִעֲפוּ
  english_pob_choice: grow faint
  chosen_spanish: se fatigan
  alternatives_spanish:
  - se desmayan
  - se debilitan
  - se cansan
  lexicon: HALOT
  rationale: El verbo expresa agotamiento o desfallecimiento; en español, 'se fatigan' comunica bien la idea de debilidad por cansancio sin volverla demasiado física ni demasiado técnica. 'Se cansan' también sería posible, pero 'se fatigan' conserva mejor el matiz de debilitamiento progresivo.
- source_word: נְעָרִים
  english_pob_choice: young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los jóvenes varones
  - los muchachos jóvenes
  lexicon: HALOT
  rationale: El término puede abarcar jóvenes o varones jóvenes; en paralelismo poético con בַחוּרִים, 'los jóvenes' es natural y suficientemente amplio en español, sin introducir una restricción innecesaria.
- source_word: וְיִגָעוּ
  english_pob_choice: become weary
  chosen_spanish: se cansan
  alternatives_spanish:
  - se fatigan
  - se agotan
  - se vuelven cansados
  lexicon: HALOT
  rationale: יגע denota cansancio o desgaste. 'Se cansan' es la correspondencia más clara y natural en español, y mantiene el paralelismo con 'se fatigan' sin duplicarlo de forma forzada.
- source_word: וּבַחוּרִים
  english_pob_choice: young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los jóvenes vigorosos
  - los muchachos fuertes
  - los varones en su plenitud
  lexicon: HALOT
  rationale: La revisión inglesa corrigió una lectura anterior que sugería 'chosen'; el hebreo señala jóvenes en la plenitud de fuerzas, no 'elegidos'. En español, 'los jóvenes' mantiene la distinción poética con נְעָרִים sin añadir una connotación no sustentada.
- source_word: כָּשׁוֹל יִכָּשֵׁלוּ
  english_pob_choice: surely stumble
  chosen_spanish: tropiezan ciertamente
  alternatives_spanish:
  - sin duda tropiezan
  - ciertamente tropiezan
  - tropiezan de seguro
  lexicon: HALOT
  rationale: La combinación de infinitivo absoluto + verbo finito intensifica la acción. 'Tropiezan ciertamente' conserva la fuerza enfática en español sin sobrerrepresentarla como caída total.
translation_notes:
  revision_awareness: La versión inglesa más reciente mantiene la primera pareja como 'young men' y corrige la lectura anterior de בַחוּרִים; la propuesta española sigue esa revisión, evitando cualquier sentido de 'escogidos' y preservando el paralelismo de dos grupos de jóvenes con matiz distinto.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o sustituciones litúrgicas porque el versículo no contiene el nombre divino.
  - '''Jóvenes'' se repite para reflejar el paralelismo de נְעָרִים y בַחוּרִים; el matiz distintivo queda en la poesía hebrea, no en una glosa interpretativa.'
  - '''Tropiezan ciertamente'' reproduce la intensificación hebrea sin añadir un segundo verbo que no esté explícito en el texto.'
