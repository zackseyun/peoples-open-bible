translation:
  language: es
  text: Pero Yahvé también es sabio y trae desastre[a]; no retira[b] sus palabras, sino que se levanta contra la casa de los malhechores y contra la ayuda[c] de los que obran iniquidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «trae calamidad». El hebreo usa aquí un término que puede significar «mal», pero en este contexto apunta a juicio o calamidad, no a maldad moral.
    reason: lexical_alternative
  - marker: b
    text: O «no retira lo que ha dicho» o «no se retracta de sus palabras». El hebreo expresa la idea de no retirar lo que ha dicho.
    reason: lexical_alternative
  - marker: c
    text: O «la asistencia». El hebreo usa un sustantivo abstracto, no el personal «ayudantes».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: Yet
  chosen_spanish: también
  alternatives_spanish:
  - además
  - sin embargo
  lexicon: HALOT
  rationale: El valor es aditivo y con énfasis; en español, «también» conserva la inclusión de Yahvé en contraste con la confianza puesta en Egipto, sin forzar una adversativa más fuerte de lo que exige el hebreo.
- source_word: הוּא
  english_pob_choice: he too
  chosen_spanish: Yahvé también
  alternatives_spanish:
  - él también
  - también él
  lexicon: HALOT
  rationale: El pronombre es enfático en el contexto. En español conviene explicitar el referente para evitar ambigüedad y mantener la fuerza contrastiva del pasaje.
- source_word: חָכָם
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - prudente
  - hábil
  lexicon: HALOT
  rationale: «Sabio» expresa el sentido normal del adjetivo y su fuerza judicial en el contexto profético, mejor que una paráfrasis más débil.
- source_word: וַיָּבֵא רָע
  english_pob_choice: brings disaster
  chosen_spanish: trae desastre
  alternatives_spanish:
  - trae calamidad
  - trae mal
  lexicon: HALOT
  rationale: רָע aquí tiene valor de calamidad o juicio, no de mal moral. «Trae desastre» preserva la acción activa y evita atribuir a Dios maldad ética.
- source_word: דְּבָרָיו
  english_pob_choice: his words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - su palabra
  - lo que ha dicho
  lexicon: HALOT
  rationale: El plural con sufijo se refleja naturalmente como «sus palabras», manteniendo la forma del hebreo y la precisión del audit trail inglés.
- source_word: לֹא הֵסִיר
  english_pob_choice: does not take back
  chosen_spanish: no revoca
  alternatives_spanish:
  - no retira
  - no retracta
  - no retoma
  lexicon: HALOT
  rationale: El hebreo expresa no retirar o deshacer lo dicho. «No revoca» comunica bien la idea de no anular palabras/decisiones, con fuerza jurídica adecuada al contexto.
- source_word: וְקָם עַל
  english_pob_choice: but rises against
  chosen_spanish: sino que se levanta contra
  alternatives_spanish:
  - y se levanta contra
  - pero se levanta contra
  lexicon: HALOT
  rationale: La secuencia introduce oposición real. «Sino que» recoge la progresión adversativa en español tras la negación previa, y «se levanta contra» reproduce la hostilidad del verbo con עַל.
- source_word: בֵּית מְרֵעִים
  english_pob_choice: the house of evildoers
  chosen_spanish: la casa de los malhechores
  alternatives_spanish:
  - la casa de los malvados
  - la casa de los que hacen mal
  lexicon: HALOT
  rationale: בֵּית conserva el valor colectivo de casa/linaje/grupo. «Malhechores» expresa bien el carácter activo del término y suena natural en español bíblico contemporáneo.
- source_word: עֶזְרַת
  english_pob_choice: the help
  chosen_spanish: la ayuda
  alternatives_spanish:
  - la asistencia
  - el apoyo
  lexicon: HALOT
  rationale: El sustantivo es abstracto, no personal. «La ayuda» mantiene la forma nominal y evita convertirla en «ayudantes».
- source_word: פֹּעֲלֵי אָוֶן
  english_pob_choice: workers of iniquity
  chosen_spanish: los que obran iniquidad
  alternatives_spanish:
  - obradores de iniquidad
  - los que hacen iniquidad
  - obreros de iniquidad
  lexicon: HALOT
  rationale: Se conserva la imagen verbal de quienes practican el mal. «Obran iniquidad» es una formulación bíblica clara y fiel al hebreo, sin perder la carga moral de אָוֶן.
- source_word: אָוֶן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - maldad
  - mal
  lexicon: HALOT
  rationale: «Iniquidad» distingue este término de רָע en la primera mitad del verso y preserva el tono moral/judicial del original.
theological_decisions:
- issue: Referencia de la sabiduría y la acción punitiva
  english_pob_reading: the LORD is wise and brings disaster
  chosen_spanish_reading: Yahvé es sabio y trae desastre
  alternative_spanish_readings:
  - Dios es sabio y trae desastre
  - el Señor es sabio y trae desastre
  rationale: Se nombra a Yahvé en lugar de ocultarlo tras un título, conforme a la terminología del proyecto. «Trae desastre» conserva el juicio activo sin sugerir mal moral.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de רָע aplicado a la acción divina
  english_pob_reading: disaster / calamity rather than moral evil
  chosen_spanish_reading: desastre / calamidad, no mal moral
  alternative_spanish_readings:
  - mal
  - daño
  rationale: La lectura contextual evita atribuir a Dios maldad ética. La traducción elegida mantiene la tensión bíblica de juicio divino real y activo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Relación de contraste en la segunda cola
  english_pob_reading: but rises against
  chosen_spanish_reading: sino que se levanta contra
  alternative_spanish_readings:
  - y se levanta contra
  - pero se levanta contra
  rationale: El hebreo continúa la línea de acción opositora. En español, «sino que» deja claro el contraste con la negación anterior de que revoque sus palabras.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'Coincide con el pasaje hebreo masorético y con el audit trail inglés: רָע se entiende como calamidad/disaster, לֹא הֵסִיר como no retractar/revocar, y עֶזְרַת como sustantivo abstracto («ayuda»). No se registran revisiones textuales en el expediente aportado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para el tetragrámaton.
  - Se conserva la distinción léxica entre «desastre» (רָע) e «iniquidad» (אָוֶן).
  - La estructura de la segunda mitad sigue el paralelismo del hebreo sin añadir elementos interpretativos.
  - «Casa de los malhechores» y «los que obran iniquidad» mantienen el registro bíblico sin recurrir a formulaciones eclesiásticas tradicionales innecesarias.
