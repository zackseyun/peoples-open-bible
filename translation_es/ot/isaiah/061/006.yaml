revisions:
- from: Pero ustedes serán llamados los sacerdotes de Yahvé; se les llamará los ministros de nuestro Dios. Comerán la riqueza de las naciones, y en su gloria se jactarán[a].
  to: Pero ustedes serán llamados los sacerdotes de Yahvé; los llamarán ministros de nuestro Dios. Comerán la riqueza de las naciones, y en su gloria se gloriarán[a].
  rationale: Se ajusta la segunda cláusula para un español más natural sin perder el valor impersonal del hebreo, y se cambia el verbo final a 'se gloriarán' para conservar mejor el registro bíblico, el vínculo léxico con 'gloria' y la ambigüedad documentada, dejando la alternativa más áspera en nota.
