translation:
  language: es
  text: Porque no hay hombre justo en la tierra que haga el bien y no peque[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'persona'; el hebreo 'hombre' (אָדָם) es singular y representativo aquí, expresando una afirmación universal sobre la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Introduce la base o explicación del dicho anterior; en español, 'Porque' preserva la conexión lógica de manera natural y sobria.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - ser humano
  lexicon: HALOT
  rationale: El hebreo es singular y representativo. 'Hombre' conserva ese valor proverbial y genérico, sin convertirlo en un plural abstracto.
- source_word: אֵין
  english_pob_choice: there is no
  chosen_spanish: no hay
  alternatives_spanish:
  - no existe
  - no se encuentra
  lexicon: HALOT
  rationale: La negación existencial se expresa con naturalidad en español como 'no hay', manteniendo el sentido de ausencia universal.
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - righteous
  lexicon: HALOT
  rationale: '''Justo'' comunica rectitud moral y teológica de forma estable en español bíblico; es la opción más transparente aquí.'
- source_word: בָּאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en el mundo
  lexicon: HALOT
  rationale: El hebreo alude al ámbito humano general; 'en la tierra' conserva esa amplitud sin volver el texto territorial o demasiado idiomático.
- source_word: יַעֲשֶׂה טּוֹב
  english_pob_choice: does good
  chosen_spanish: haga el bien
  alternatives_spanish:
  - hace el bien
  - obre bien
  lexicon: HALOT
  rationale: El hebreo es proverbial y verbalmente conciso. 'Haga el bien' expresa la acción moral de manera natural en español y conserva el valor general del infinitivo relativo.
- source_word: וְלֹא יֶחֱטָא
  english_pob_choice: and does not sin
  chosen_spanish: y no peque
  alternatives_spanish:
  - y no peque nunca
  - y no pegue en pecado
  lexicon: HALOT
  rationale: '''Peque'' reproduce el sentido de חטא como cometer pecado, y en español suena fluido dentro de la cláusula final negativa. Evita intensificar indebidamente con ''nunca''.'
theological_decisions:
- issue: Uso de masculino genérico representativo
  english_pob_reading: man
  chosen_spanish_reading: hombre
  alternative_spanish_readings:
  - persona
  - ser humano
  rationale: La forma hebrea אָדָם es singular y representativa; mantener 'hombre' preserva la estructura proverbial y la universalidad humana sin neutralizar la forma del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אָדָם
- issue: Alcance universal de la afirmación sapiencial
  english_pob_reading: there is no righteous man on the earth who does good and does not sin
  chosen_spanish_reading: no hay hombre justo en la tierra que haga el bien y no peque
  alternative_spanish_readings:
  - no existe hombre justo sobre la tierra que haga el bien y no peque
  - ningún hombre justo en la tierra hace el bien y no peca
  rationale: La estructura mantiene la sentencia general de sabiduría sin convertirla en una paráfrasis absolutizada más allá de lo que el hebreo declara. La negación final conserva la tensión antropológica del texto.
  doctrine_reference: Wisdom literature anthropological universality; lexical note on generic אָדָם
translation_notes:
  revision_awareness: El pasaje fue revisado en la fuente inglesa y se mantuvo sin cambios; la redacción española sigue ese estado estable y no introduce ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se usó 'Yahvé' por defecto cuando el texto no lo requiere aquí; no aparece en este versículo.
  - '''Justo'' se eligió como equivalente estable de צַדִּיק para mantener consistencia con la terminología POB en contextos sapienciales.'
  - Se conservó la negación coordinada 'y no peque' para reflejar el paralelismo del hebreo sin suavizar la sentencia.
  - La nota al pie se ancla en 'hombre' para preservar la alternativa lexical documentada por el POB inglés.
