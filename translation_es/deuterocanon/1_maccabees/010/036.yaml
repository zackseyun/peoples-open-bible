translation:
  language: es
  text: Y sean inscritos hasta treinta mil hombres de entre los judíos en las fuerzas del rey, y se les darán provisiones[a], como conviene a todas las fuerzas del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «raciones», «manutención» o, más literalmente, «hospitalidad»; el griego ξενία aquí designa el apoyo suministrado a tropas.
    reason: lexical_alternative
lexical_decisions:
- source_word: προγραφήθήτωσαν
  english_pob_choice: let ... be enrolled
  chosen_spanish: se inscribirán
  alternatives_spanish:
  - serán enrolados
  - se registrarán
  lexicon: LSJ
  rationale: El griego expresa una inscripción oficial para servicio militar. En español, «se inscribirán» conserva la idea administrativa sin sonar forzado; «enrolar» es posible, pero menos natural en muchos registros hispanos actuales.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: from the Jews
  chosen_spanish: de entre los judíos
  alternatives_spanish:
  - de los judíos
  - entre los judíos
  lexicon: LSJ
  rationale: El sentido partitivo indica que los hombres han de ser tomados del grupo judío. «De entre los judíos» explicita mejor esa selección que un simple «de los judíos».
- source_word: εἰς τὰς δυνάμεις τοῦ βασιλέως
  english_pob_choice: in the king’s forces
  chosen_spanish: en las fuerzas del rey
  alternatives_spanish:
  - para las fuerzas del rey
  - en el ejército del rey
  lexicon: LSJ
  rationale: δυνάμεις aquí tiene sentido militar. «Fuerzas» mantiene la amplitud del término griego y evita reducirlo innecesariamente a una sola estructura castrense.
- source_word: τριάκοντα χιλιάδας ἀνδρῶν
  english_pob_choice: thirty thousand men
  chosen_spanish: hasta treinta mil hombres
  alternatives_spanish:
  - treinta mil hombres
  - hasta treinta mil varones
  lexicon: LSJ
  rationale: La revisión inglesa añadió «up to», y εἰς con la cifra puede expresar límite aproximado. «Hombres» traduce ἀνδρῶν en contexto militar con naturalidad; «varones» sería más literal pero menos idiomático.
- source_word: δοθήσεται αὐτοῖς ξενιά
  english_pob_choice: provisions shall be given to them
  chosen_spanish: se les dará provisión[a]
  alternatives_spanish:
  - se les darán provisiones
  - se les dará manutención
  - se les dará ración
  lexicon: LSJ
  rationale: El contexto militar muestra que ξενιά es el apoyo suministrado a las tropas. «Provisión» permite conservar cierta amplitud semántica; el singular colectivo evita fijar de modo innecesario el tipo exacto de suministros.
- source_word: ὡς καθῆκει
  english_pob_choice: as is fitting
  chosen_spanish: como conviene
  alternatives_spanish:
  - como es debido
  - como es propio
  lexicon: LSJ
  rationale: La frase expresa lo que corresponde o es apropiado. «Conviene» reproduce bien el tono administrativo del decreto y su relación con la norma establecida.
- source_word: πάσαις ταῖς δυνάμεσιν τοῦ βασιλέως
  english_pob_choice: for all the king’s forces
  chosen_spanish: a todas las fuerzas del rey
  alternatives_spanish:
  - para todas las fuerzas del rey
  - a todas las tropas del rey
  lexicon: LSJ
  rationale: 'El dativo marca el estándar de referencia: lo que se da a estas tropas debe ser como lo que corresponde a las demás. «A todas las fuerzas del rey» conserva esa comparación sin sobreinterpretar.'
translation_notes:
  revision_awareness: La versión inglesa revisada añadió «up to» para reflejar con mayor precisión εἰς con la cifra. La redacción española incorpora ese matiz con «hasta treinta mil hombres» y conserva el resto del sentido administrativo y militar del texto griego.
  spanish_consistency_notes:
  - Se mantiene «fuerzas del rey» para δυνάμεις, coherente con el valor militar del término en el audit trail inglés.
  - Se evita traducir ξενιά por un equivalente demasiado estrecho; «provisión» deja espacio para el rango señalado por la nota inglesa.
  - Se usa un español formal y claro, apto para publicación, sin recurrir a un calco rígido de la sintaxis griega.
