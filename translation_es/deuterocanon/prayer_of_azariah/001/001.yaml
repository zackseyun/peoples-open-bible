translation:
  language: es
  text: Así pues, Hananías, Azarías y Misael[a] oraron, y cantaron alabanzas al Señor cuando el rey ordenó que fueran arrojados[b] al horno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego presenta aquí los nombres hebreos Hananías, Azarías y Misael, no sus nombres babilónicos Sadrac, Mesac y Abed-nego.
    reason: cross_reference
  - marker: b
    text: O, «fueran echados al horno».
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὕτως οὖν
  english_pob_choice: Thus
  chosen_spanish: Así pues
  alternatives_spanish:
  - De este modo
  - Entonces
  lexicon: LSJ
  rationale: Οὕτως aporta sentido de manera ('así/de este modo') y οὖν añade enlace discursivo ('pues/por tanto'). «Así pues» conserva ambas fuerzas de forma natural en español.
- source_word: προσηύξατο
  english_pob_choice: prayed
  chosen_spanish: oraron
  alternatives_spanish:
  - rezaron
  - hicieron oración
  lexicon: BDAG
  rationale: El verbo σημαίνει simplemente 'orar'. En español, «oraron» es directo, digno y no introduce matices ajenos como una formulación más litúrgica o explicativa.
- source_word: Ἀνανίας καὶ Ἀζαρίας καὶ Μισαήλ
  english_pob_choice: Hananiah and Azariah and Mishael
  chosen_spanish: Hananías, Azarías y Misael
  alternatives_spanish:
  - Ananías, Azarías y Misael
  - Hananías y Azarías y Misael
  lexicon: standard transliteration
  rationale: Se conservan los nombres hebreos en forma transliterada al español, siguiendo el valor del griego que aquí usa los nombres hebreos y no los nombres babilónicos.
- source_word: ὕμνησαν
  english_pob_choice: sang praise
  chosen_spanish: cantaron alabanzas
  alternatives_spanish:
  - entonaron un himno
  - himnaron
  - alabaron cantando
  lexicon: BDAG
  rationale: ὑμνέω implica cantar/entonar alabanza. «Cantaron alabanzas» mantiene el sentido musical y de alabanza sin forzar un calco poco natural como «himnaron».
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Dueño
  - al Maestro
  lexicon: BDAG
  rationale: En este contexto oracional y bíblico, κύριος se refiere a Dios. En español, «Señor» es la forma natural y fiel para ese uso culto y devocional.
- source_word: ὅτε
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al tiempo que
  - mientras
  lexicon: LSJ
  rationale: La cláusula es temporal; «cuando» expresa con claridad el momento en que ocurrió la orden real.
- source_word: προσέταξεν
  english_pob_choice: ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio la orden de
  lexicon: BDAG
  rationale: προστάσσω significa dar una orden o mandato. «Ordenó» reproduce bien la fuerza autoritativa del rey.
- source_word: ἐμβληθῆναι
  english_pob_choice: be thrown
  chosen_spanish: fueran arrojados
  alternatives_spanish:
  - fueran echados
  - fueran lanzados
  lexicon: BDAG
  rationale: El infinitivo pasivo expresa ser arrojados/castigados dentro del horno. «Fueran arrojados» conserva la violencia del movimiento y es natural en español.
- source_word: εἰς τὴν κάμινον
  english_pob_choice: into the furnace
  chosen_spanish: al horno
  alternatives_spanish:
  - al horno de fuego
  - a la hornaza
  lexicon: LSJ
  rationale: κάμινος denota un horno/furnace. En este contexto narrativo bíblico, «horno» es claro y suficiente sin añadir detalle no explicitado aquí.
theological_decisions:
- issue: Renderización de κύριος
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Maestro
  rationale: En una oración dirigida a Dios, κύριος funciona como título divino. «Señor» preserva el uso bíblico y evita una lectura meramente social.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Identidad de los tres jóvenes
  english_pob_reading: Hananiah and Azariah and Mishael
  chosen_spanish_reading: Hananías, Azarías y Misael
  alternative_spanish_readings:
  - Ananías, Azarías y Misael
  - Sadrac, Mesac y Abed-nego
  rationale: El griego conserva los nombres hebreos de los tres jóvenes; por eso se deben transliterar esos nombres, no sustituirlos por sus formas babilónicas.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del expediente inglés: toma Οὕτως οὖν como una abertura adverbial compacta («Así pues»), traduce προσηύξατο de manera directa como «oraron», y conserva la pasiva de ἐμβληθῆναι con una pasiva española natural («fueran arrojados»).'
  spanish_consistency_notes:
  - 'Se mantiene la transliteración española de los nombres hebreos: Hananías, Azarías y Misael.'
  - Se usa «Señor» para κύριος en un contexto de oración/praxis bíblica dirigida a Dios.
  - Se evita añadir calificativos como «ardiente» a «horno», porque el griego de este verso no los explicita.
