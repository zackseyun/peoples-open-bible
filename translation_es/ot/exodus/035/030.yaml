translation:
  language: es
  text: 'Entonces Moisés dijo a los hijos de Israel[a]: «Vean, Yahvé ha llamado por su nombre a Bezalel, hijo de Uri, hijo de Hur, de la tribu de Judá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: WLC/HALOT
  rationale: La waw consecutiva avanza la narración; «entonces» comunica bien la secuencia en español sin sonar arcaico, y mantiene el valor narrativo del hebreo mejor que una simple coordinación mecánica.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos/los niños de Israel
  lexicon: HALOT
  rationale: Se conserva el plural filial masculino del hebreo. «Hijos de Israel» es claro, formal y más cercano a la expresión fuente que «israelitas», que suaviza la imagen de parentesco.
- source_word: רְאוּ
  english_pob_choice: See
  chosen_spanish: Vean
  alternatives_spanish:
  - Miren
  - Ve
  lexicon: HALOT
  rationale: El imperativo plural requiere una forma natural en español. «Vean» transmite la llamada de atención del hebreo y encaja mejor en registro congregacional que un calco más áspero.
- source_word: קָרָא ... בְּשֵׁם
  english_pob_choice: has called ... by name
  chosen_spanish: ha llamado por nombre
  alternatives_spanish:
  - ha llamado a nombre de
  - ha nombrado
  lexicon: HALOT
  rationale: Se mantiene el idiomático קרא בשם sin reducirlo a «nombrar», para conservar la idea de designación explícita y personal que el POB inglés quiso retener.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: DOCTRINE.md contested terms
  rationale: La política del proyecto para el Tetragrámaton es transliterar el nombre divino. En español, «Yahvé» preserva el nombre propio de Dios revelado a Israel y evita la sustitución por un título.
- source_word: בְּצַלְאֵל
  english_pob_choice: Bezalel
  chosen_spanish: Bezalel
  alternatives_spanish:
  - Bezaleel
  lexicon: HALOT
  rationale: Se adopta la transliteración estándar del nombre propio, coherente con el POB inglés y legible en español bíblico moderno.
- source_word: בֶּן אוּרִי בֶן חוּר
  english_pob_choice: son of Uri, son of Hur
  chosen_spanish: hijo de Uri, hijo de Hur
  alternatives_spanish:
  - hijo de Urí, hijo de Jur
  - el hijo de Uri, el hijo de Hur
  lexicon: HALOT
  rationale: La cadena genealógica hebrea se reproduce de forma directa. Se conserva la repetición de «hijo de» para no perder la estructura de linaje del original.
- source_word: לְמַטֵּה יְהוּדָה
  english_pob_choice: of the tribe of Judah
  chosen_spanish: de la tribu de Judá
  alternatives_spanish:
  - perteneciente a la tribu de Judá
  - de la casa de Judá
  lexicon: HALOT
  rationale: «De la tribu de Judá» es la forma natural y fiel para expresar afiliación tribal. «De» refleja mejor el valor relacional del hebreo que «perteneciente a», que resulta más explicativo que textual.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La lectura del POB inglés es trasladar el nombre propio divino, no ocultarlo bajo un sustituto litúrgico. En español, «Yahvé» cumple esa misma función teológica y traductológica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Expresión corporativa masculina בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos/los niños de Israel
  rationale: Se preserva la forma masculina plural del hebreo, conforme a la política de precisión de género del proyecto. «Los israelitas» sería más idiomático, pero borraría la metáfora filial explícita.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'La redacción española sigue la última revisión del POB inglés: mantiene «called by name» como llamada/designación personal y refleja la relación tribal con «de la tribu de Judá», evitando una paráfrasis más libre como «procedente de» o «perteneciente a».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrámaton, en línea con la política del proyecto.
  - Se conserva «hijos de Israel» en el texto principal para respetar la forma filial del hebreo, con nota alternativa por la opción idiomática «israelitas».
  - La secuencia narrativa «Entonces ... dijo» reproduce el avance del waw consecutivo sin caer en un calco rígido.
