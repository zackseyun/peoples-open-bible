review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura del hebreo y conserva la secuencia de preguntas retóricas, «delante de sus hermanos», «ejército de Samaria», «sacrificarán», «terminarán en un día» y la imagen vívida de «hacer revivir las piedras». Sin embargo, en הֲיַעַזְבוּ לָהֶם el texto principal español escogió la opción más opaca («¿Lo dejarán para sí mismos?»), mientras que el POB inglés adoptó como texto principal la lectura contextual «Will they restore it for themselves?» y dejó la dificultad léxica en nota. Para fidelidad al rastro de auditoría, el español debe reflejar esa misma decisión principal y reservar la alternativa literal para la nota.
  spanish_quality_summary: El español es mayormente natural y legible. «Harán revivir las piedras» es aceptable, pero «revivirán las piedras» suena más directo y digno en español. La puntuación con dos puntos antes de la cita funciona bien. La nota actual necesita ajuste porque presenta como primera opción una formulación menos clara que el texto principal debería evitar.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo ni otros términos sensibles del glosario. Las elecciones «ejército», «sacrificarán», «piedras», «polvo» y «quemadas» son coherentes con el expediente inglés y con un español eclesial moderno.
  issues:
  - severity: medium
    issue: La cláusula הֲיַעַזְבוּ לָהֶם está traducida en el texto principal como «¿Lo dejarán para sí mismos?»
    rationale: 'El expediente inglés ya resolvió esta dificultad con una lectura contextual principal: «Will they restore it for themselves?»; dejar la opción más literal y oscura en el cuerpo del texto debilita la comprensibilidad y se aparta del rastro auditado.'
  - severity: low
    issue: «Harán revivir las piedras» es algo más pesado de lo necesario
    rationale: Aunque es fiel, «¿Revivirán las piedras...? » conserva igual de bien la personificación y suena más idiomático en español sin pérdida semántica.
  - severity: low
    issue: La nota al pie para [a] no refleja de forma óptima la jerarquía entre texto principal y alternativas
    rationale: Debe explicar que la frase hebrea es difícil, mantener como principal «¿Lo restaurarán para sí mismos?»/«¿Lo reconstruirán por sí mismos?» según el texto, y dejar «¿Lo dejarán para sí mismos?» como alternativa más literal o difícil.
  revised_spanish_text: 'Y dijo delante de sus hermanos y del ejército de Samaria[a]: «¿Qué están haciendo estos judíos débiles? ¿Lo restaurarán para sí mismos? ¿Sacrificarán? ¿Terminarán en un día? ¿Revivirán las piedras de entre los montones de polvo, aunque estén quemadas?»'
  revised_footnotes:
