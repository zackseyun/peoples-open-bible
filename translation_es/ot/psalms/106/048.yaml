revisions:
- from: 'Bendito sea Yahvé[a], el Dios de Israel, desde la eternidad y hasta la eternidad. Y que todo el pueblo diga[b]: «¡Amén! ¡Aleluya[c]!».'
  to: 'Bendito sea Yahvé, el Dios de Israel, desde la eternidad hasta la eternidad[a]. Y que todo el pueblo diga: «¡Amén! ¡Alaben a Yah[b]!».'
  rationale: Se corrige la frase final para reflejar fielmente הַלְלוּ יָהּ como traducción y no solo como transliteración, en línea con el POB inglés y la política del proyecto sobre el nombre divino corto יָהּ. También se reubican y corrigen las notas para que sus marcadores coincidan con los segmentos relevantes del texto. Se mantiene «Yahvé» para יְהוָה y se suaviza la fórmula temporal a una forma más natural en español sin perder sentido.
