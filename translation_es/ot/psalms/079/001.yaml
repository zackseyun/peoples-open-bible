translation:
  language: es
  text: Salmo de Asaf. Dios, las naciones han venido a tu heredad; han profanado tu santo templo; han convertido a Jerusalén en un montón de ruinas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «han convertido a Jerusalén en montones de ruinas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Poema
  lexicon: HALOT
  rationale: «Salmo» es el género bíblico natural en español y conserva la identificación del encabezado sin añadir interpretación.
- source_word: לְאָסָף
  english_pob_choice: of Asaph
  chosen_spanish: de Asaf
  alternatives_spanish:
  - para Asaf
  - perteneciente a Asaf
  lexicon: HALOT
  rationale: En los superscritos de los salmos, la relación de ל suele ser de asociación o atribución; «de Asaf» es la formulación más clara y sobria en español.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: Dios
  alternatives_spanish:
  - ¡Oh Dios!
  - Dios mío
  lexicon: HALOT
  rationale: El hebreo funciona como vocativo en el lamento. En español, el vocativo se entiende bien por el contexto sin necesitar «oh»; mantener «Dios» evita una elevación artificial del estilo.
- source_word: בָּאוּ
  english_pob_choice: have come
  chosen_spanish: han entrado
  alternatives_spanish:
  - han venido
  - han llegado
  lexicon: HALOT
  rationale: Aunque el verbo básico es «venir», el contexto de invasión y profanación requiere el matiz de acceso/ingreso al territorio; «han entrado» lo expresa de forma natural sin añadir más de lo que el texto exige.
- source_word: גוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: «Naciones» conserva el valor colectivo de pueblos extranjeros invasores, y es la correspondencia más estable para este contexto.
- source_word: בְּנַחֲלָתֶךָ
  english_pob_choice: into your inheritance
  chosen_spanish: en tu heredad
  alternatives_spanish:
  - en tu posesión
  - en tu herencia
  lexicon: HALOT
  rationale: «Heredad» comunica la noción covenantal de posesión recibida y pertenencia. En español bíblico mantiene la carga de la relación de Yahvé con su pueblo y su tierra mejor que «herencia» aquí.
- source_word: טִמְּאוּ
  english_pob_choice: have defiled
  chosen_spanish: han profanado
  alternatives_spanish:
  - han contaminado
  - han hecho impuro
  lexicon: HALOT
  rationale: El verbo tiene un campo cultual de contaminación de lo santo. «Profanado» expresa con fuerza la violación de un espacio sagrado, y es más natural que una repetición técnica de impureza.
- source_word: הֵיכַל קָדְשֶׁךָ
  english_pob_choice: your holy temple
  chosen_spanish: tu santo templo
  alternatives_spanish:
  - tu templo santo
  - tu santuario santo
  lexicon: HALOT
  rationale: «Templo» transmite היטב היכל en este contexto. «Santo» reproduce el valor adjetival de קָדְשֶׁךָ de manera idiomática en español; «santo templo» es más directo que «templo de tu santidad».
- source_word: שָׂמוּ
  english_pob_choice: they have made
  chosen_spanish: han convertido
  alternatives_spanish:
  - han hecho
  - han puesto
  lexicon: HALOT
  rationale: El verbo con el resultado en לְעִיִּים funciona idiomáticamente como «hacer/convertir en». «Han convertido» preserva el resultado transformativo del hebreo.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: HALOT
  rationale: Nombre propio estándar en español.
- source_word: לְעִיִּים
  english_pob_choice: a heap of ruins
  chosen_spanish: en un montón de ruinas
  alternatives_spanish:
  - en ruinas
  - en un montón de escombros
  lexicon: HALOT
  rationale: El plural hebreo sugiere ruinas acumuladas o amontonadas. «Un montón de ruinas» refleja mejor la imagen concreta que «en ruinas», sin perder naturalidad.
theological_decisions:
- issue: Alcance de «tu heredad»
  english_pob_reading: Retain 'your inheritance' rather than interpretively specifying land or people
  chosen_spanish_reading: Mantener «tu heredad» sin precisar «tierra» o «pueblo»
  alternative_spanish_readings:
  - tu tierra
  - tu posesión
  rationale: El hebreo deja el alcance abierto dentro del marco del pacto. «Heredad» conserva esa amplitud y la resonancia teológica de posesión pactal sin estrechar el sentido.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Vocativo divino en la lamentación
  english_pob_reading: O God
  chosen_spanish_reading: Dios, ...
  alternative_spanish_readings:
  - ¡Oh Dios, ...!
  - Dios mío, ...
  rationale: El llamado directo está garantizado por el contexto. En español, la exclamación vocativa añadida no es necesaria para el sentido y puede cargar el tono más allá de lo que pide el hebreo.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'El audit trail inglés ajustó «the nations» y reforzó la imagen resultativa de «a heap of ruins». La versión española sigue ese mismo refinamiento: mantiene el sujeto definido «las naciones», conserva la secuencia de acciones cultuales y refleja la imagen final con una frase concreta y natural, «un montón de ruinas».'
  spanish_consistency_notes:
  - Usé «heredad» para mantener el matiz pactal de נחלה, coherente con el estilo de la POB en pasajes de posesión divina.
  - «Santo templo» conserva el orden adjetival natural en español y refleja la profanación del espacio sagrado sin periprasis.
  - La nota textual alternativa se ancla en la frase final porque el hebreo permite una lectura de ruinas acumuladas, y el español también puede expresarlo con dos formulaciones cercanas.
