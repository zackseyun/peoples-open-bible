translation:
  language: es
  text: En un momento mueren; a medianoche un pueblo es sacudido[a] y desaparece; los poderosos son apartados, no por mano humana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo puede expresarse literalmente como «es sacudido» o «entra en agitación»; la idea es que el pueblo es trastornado súbitamente. La frase final dice literalmente «no por mano», probablemente indicando que esto ocurre sin agencia humana.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֶגַע
  english_pob_choice: in a moment
  chosen_spanish: en un momento
  alternatives_spanish:
  - de inmediato
  - repentinamente
  lexicon: HALOT
  rationale: Mantiene la idea de un lapso brevísimo sin exagerar la forma del evento. «En un momento» suena natural en español y conserva la fuerza temporal del hebreo.
- source_word: יָמֻתוּ
  english_pob_choice: they die
  chosen_spanish: mueren
  alternatives_spanish:
  - perecen
  lexicon: HALOT
  rationale: El verbo básico expresa muerte real; «mueren» es directo y fiel, y evita añadir un matiz más interpretativo como «perecen».
- source_word: וַחֲצ֪וֹת לָ֥יְלָה
  english_pob_choice: at midnight
  chosen_spanish: a medianoche
  alternatives_spanish:
  - en la mitad de la noche
  - a media noche
  lexicon: HALOT
  rationale: «A medianoche» es la equivalencia idiomática normal para la expresión hebrea de «la mitad de la noche», y conserva la precisión temporal sin calco pesado.
- source_word: יְגֹעֲשׁוּ
  english_pob_choice: are shaken
  chosen_spanish: es sacudido
  alternatives_spanish:
  - tiembla
  - es agitado
  lexicon: HALOT
  rationale: La raíz transmite sacudida/temblor/tumulto. En español, «es sacudido» comunica bien el impacto súbito y puede servir como pasiva impersonal/estativa del colectivo.
- source_word: עָם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - un pueblo entero
  - gente
  lexicon: HALOT
  rationale: El singular colectivo hebreo se refleja mejor con «un pueblo», que preserva la unidad colectiva sin reducirlo a un plural genérico.
- source_word: וְיַעֲבֹרוּ
  english_pob_choice: they pass away
  chosen_spanish: pasa
  alternatives_spanish:
  - desaparece
  - pasa y se va
  lexicon: HALOT
  rationale: El sentido contextual es de desaparecer/morir. En español, «pasa» mantiene el movimiento de עבר y, junto con el contexto de muerte y sacudida, sugiere el alejamiento o desaparición sin sobretraducir.
- source_word: וְיָסִירוּ
  english_pob_choice: are removed
  chosen_spanish: son apartados
  alternatives_spanish:
  - son quitados
  - son removidos
  lexicon: HALOT
  rationale: El verbo hifil de סור indica quitar/apartar. «Son apartados» conserva la pasiva y evita un tecnicismo poco natural como «removidos».
- source_word: אַבִּיר
  english_pob_choice: the mighty
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los fuertes
  - los valientes
  lexicon: HALOT
  rationale: El término designa a los fuertes/poderosos. «Los poderosos» es un equivalente amplio y claro en español, apto para un colectivo representativo.
- source_word: לֹא בְיָד
  english_pob_choice: not by hand
  chosen_spanish: no por mano
  alternatives_spanish:
  - sin mano humana
  - no por mano humana
  lexicon: HALOT
  rationale: Se conserva la literalidad idiomática del hebreo para no resolver prematuramente la agencia. «No por mano» mantiene la tensión textual y permite la lectura de acción sin mediación humana.
theological_decisions:
- issue: Agencia implícita en «no por mano»
  english_pob_reading: The removal of the mighty occurs apart from ordinary human agency, likely by divine action, while the main text stays literal.
  chosen_spanish_reading: La remoción de los poderosos ocurre aparte de la agencia humana ordinaria, con la misma literalidad en el texto principal.
  alternative_spanish_readings:
  - sin mano humana
  - no por mano humana
  rationale: 'Conviene conservar la expresión breve y extraña del hebreo porque el verso no identifica explícitamente al agente. Así se mantiene la tensión teológica: Dios queda implícito como el soberano que actúa, pero el texto no lo explicita con una paráfrasis.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje quedó con alto acuerdo y sin revisiones aplicadas, así que se mantiene la solución literal-idiomática ya aprobada.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita explícita de él.
  - Se preservó «no por mano» para mantener la fuerza idiomática del hebreo y la posible implicación de acción divina sin nombrarla directamente.
  - Se prefirió «un pueblo» para reflejar el singular colectivo hebreo.
  - Se evitó «Cristo» y «siervo» porque no corresponden al léxico de este verso.
