translation:
  language: es
  text: Y todo Israel, en los días de Zorobabel y en los días de Nehemías, daban las porciones[a] para los cantores y los porteros, según lo que cada día requería[b]; y apartaban para los levitas, y los levitas apartaban para los hijos de Aarón[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las porciones asignadas» para los cantores y los porteros.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la palabra/asunto de un día en su día»; es decir, lo que cada día requería.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «los sacerdotes aarónicos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל יִשְׂרָאֵל
  english_pob_choice: And all Israel
  chosen_spanish: Y todo Israel
  alternatives_spanish:
  - Y todos los israelitas
  lexicon: HALOT
  rationale: Conserva la expresión colectiva y pactal del hebreo; en español, "todo Israel" es natural y fiel, sin expandir innecesariamente a "israelitas".
- source_word: בִּימֵי זְרֻבָּבֶל וּבִימֵי נְחֶמְיָה
  english_pob_choice: in the days of Zerubbabel and in the days of Nehemiah
  chosen_spanish: en los días de Zorobabel y en los días de Nehemías
  alternatives_spanish:
  - durante el tiempo de Zorobabel y de Nehemías
  lexicon: HALOT
  rationale: Mantiene la repetición del hebreo y el marco histórico formal. "En los días de" funciona bien en español bíblico moderno y preserva el énfasis temporal.
- source_word: נֹתְנִים
  english_pob_choice: gave
  chosen_spanish: daba
  alternatives_spanish:
  - daban
  - proporcionaba
  lexicon: HALOT
  rationale: El participio hebreo expresa una acción habitual o continuada; el imperfecto español transmite ese valor mejor que un pretérito puntual.
- source_word: מְנָיוֹת
  english_pob_choice: the portions
  chosen_spanish: las porciones
  alternatives_spanish:
  - las asignaciones
  - las cuotas
  lexicon: HALOT
  rationale: '"Porciones" es una traducción clara y sobria para las raciones o asignaciones debidas a los servidores del templo. La alternativa inglesa "assigned portions" queda implícita en el contexto sin recargar el texto.'
- source_word: הַמְשֹׁרְרִים וְהַשֹּׁעֲרִים
  english_pob_choice: the singers and the gatekeepers
  chosen_spanish: los cantores y los porteros
  alternatives_spanish:
  - los cantores y los guardas de las puertas
  lexicon: HALOT
  rationale: '"Cantores" refleja היטב el servicio litúrgico; "porteros" es una equivalencia tradicional y comprensible para שֹׁעֲרִים en este contexto del templo.'
- source_word: דְּבַר יוֹם בְּיוֹמוֹ
  english_pob_choice: as each day required
  chosen_spanish: según lo que cada día requería
  alternatives_spanish:
  - día tras día
  - como correspondía a cada día
  - la necesidad de cada día, día por día
  lexicon: HALOT
  rationale: La frase hebrea es idiomática y denota provisión diaria conforme a la necesidad. La opción elegida comunica esa idea con naturalidad sin perder el sentido administrativo.
- source_word: וּמַקְדִּשִׁים
  english_pob_choice: and they set apart
  chosen_spanish: y apartaban
  alternatives_spanish:
  - y consagraban
  - y destinaban
  lexicon: HALOT
  rationale: El verbo en hifil conserva la idea de separar para uso santo o dedicado. En español, "apartar" mantiene esa fuerza sin añadir una explicación interpretativa que el texto no explicita.
- source_word: לַלוִיִּם
  english_pob_choice: for the Levites
  chosen_spanish: para los levitas
  alternatives_spanish:
  - a los levitas
  lexicon: HALOT
  rationale: La preposición introduce a los destinatarios de lo apartado; "para" es natural en español y conserva el valor distributivo.
- source_word: וְהַלְוִיִּם מַקְדִּשִׁים לִבְנֵי אַהֲרֹן
  english_pob_choice: and the Levites set apart for the sons of Aaron
  chosen_spanish: y los levitas apartaban para los hijos de Aarón
  alternatives_spanish:
  - y los levitas consagraban para los hijos de Aarón
  - y los levitas apartaban para los sacerdotes aarónicos
  lexicon: HALOT
  rationale: Mantiene el paralelismo del hebreo y la correspondencia entre los dos niveles de distribución. "Hijos de Aarón" se conserva como designación formal y cercana al texto.
- source_word: בְּנֵי אַהֲרֹן
  english_pob_choice: the sons of Aaron
  chosen_spanish: los hijos de Aarón
  alternatives_spanish:
  - los sacerdotes aarónicos
  lexicon: HALOT
  rationale: Se prefiere la fórmula más cercana al hebreo. La lectura interpretativa "sacerdotes aarónicos" queda como alternativa, no como texto principal.
theological_decisions:
- issue: Sentido de מקדישים en el contexto del sostenimiento del templo
  english_pob_reading: The verb is rendered as setting apart, referring to dedicated shares for Levites and then for the Aaronic priests.
  chosen_spanish_reading: Se entiende como apartar algo para uso sagrado o dedicado, sin añadir palabras que no estén en el hebreo.
  alternative_spanish_readings:
  - consagraban
  - destinaban
  rationale: En este contexto administrativo-cultual, el verbo conserva su valor de separación para un uso santo. "Apartaban" reproduce esa fuerza sin expandir el texto con una glosa interpretativa.
  doctrine_reference: Nehemías 12:47; cf. Levítico 27:14, 21; Números 18:24-32
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del POB inglés, que eliminó la expansión interpretativa «the consecrated portions» y dejó simplemente «set apart». Por eso el español usa «apartaban» sin añadir objeto implícito no explicitado por el hebreo. También mantuve la estructura paralela del verso y el valor durativo del participio hebreo mediante el imperfecto español.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se eligió «hijos de Aarón» para seguir la forma del hebreo y la decisión auditada del POB inglés.
  - «Porteros» se mantiene como término cultual comprensible y tradicional, equivalente a gatekeepers en este contexto.
