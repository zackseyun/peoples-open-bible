base_translation:
  language: en
  yaml_path: translation/ot/genesis/015/018.yaml
  text: On that day Yahweh made a covenant with Abram[a], saying, “To your offspring I have given this land, from the river of Egypt as far as the great river[b], the Euphrates.”
  footnotes:
  - marker: a
    text: Hebrew literally, “cut a covenant,” an idiom for making a covenant, likely reflecting the covenant-cutting ritual in the surrounding passage.
    reason: lexical_alternative
  - marker: b
    text: Or “from the brook/wadi of Egypt.” The Hebrew says “river of Egypt,” but the precise geographical reference is debated.
    reason: alternative_reading
