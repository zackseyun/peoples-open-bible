translation:
  language: es
  text: Si un hombre es hallado acostado con una mujer casada[a], entonces ambos morirán[b]—el hombre que se acostó con la mujer, y la mujer. Así purgarás el mal de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: "una mujer casada con un marido".'
    reason: lexical_alternative
  - marker: b
    text: Aquí "morirán" expresa la pena de muerte establecida por la ley; algunas traducciones lo hacen explícito con "serán ejecutados".
    reason: alternative_reading
lexical_decisions:
- source_word: יִמָּצֵא
  english_pob_choice: is found
  chosen_spanish: se encuentra
  alternatives_spanish:
  - es hallado
  - se descubre
  lexicon: HALOT
  rationale: El nifal expresa ser encontrado o hallado en una situación, no mera existencia. 'Se encuentra' conserva el valor pasivo y suena natural en registro legal español.
- source_word: שֹׁכֵב עִם
  english_pob_choice: lying with
  chosen_spanish: acostado con
  alternatives_spanish:
  - durmiendo con
  - teniendo relaciones sexuales con
  lexicon: HALOT
  rationale: La expresión hebrea es un eufemismo legal para relaciones sexuales. 'Acostado con' conserva esa fuerza idiomática sin volverlo coloquial ni excesivamente explicativo.
- source_word: בְעֻלַת בַּעַל
  english_pob_choice: married to a husband
  chosen_spanish: mujer casada
  alternatives_spanish:
  - casada con un esposo
  - mujer unida a un marido
  lexicon: HALOT
  rationale: En español, 'mujer casada' transmite con claridad el estado marital. La formulación inglesa mantiene visible el hebreo literal; en español la opción más natural y fiel es la habitual, sin introducir la idea de propiedad en el texto principal.
- source_word: וּמֵתוּ גַּם שְׁנֵיהֶם
  english_pob_choice: then both of them shall die
  chosen_spanish: entonces ambos morirán
  alternatives_spanish:
  - entonces ambos deben morir
  - entonces ambos serán ejecutados
  lexicon: HALOT
  rationale: El hebreo formula la pena en forma directa. 'Morirán' preserva esa literalidad; la idea judicial de pena capital queda clara por el contexto legal.
- source_word: הָאִישׁ הַשֹּׁכֵב עִם הָאִשָּׁה
  english_pob_choice: the man who lay with the woman
  chosen_spanish: el hombre que se acostó con la mujer
  alternatives_spanish:
  - el hombre acostado con la mujer
  lexicon: HALOT
  rationale: La cláusula identifica al varón implicado. En español, la relativa 'que se acostó con la mujer' es más fluida que un participio y conserva el matiz sexual del hebreo.
- source_word: וְהָאִשָּׁה
  english_pob_choice: and the woman
  chosen_spanish: y la mujer
  lexicon: HALOT
  rationale: Se conserva la repetición legal del hebreo, que subraya la imputación compartida.
- source_word: וּבִעַרְתָּ
  english_pob_choice: So you shall purge
  chosen_spanish: Así purgarás
  alternatives_spanish:
  - Así quitarás
  - Así eliminarás
  lexicon: HALOT
  rationale: בער en fórmulas deuteronómicas expresa quitar o extirpar el mal de la comunidad. 'Purgarás' mantiene el tono jurídico-moral y la fuerza idiomática de la fórmula.
- source_word: הָרָע
  english_pob_choice: the evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la maldad
  - lo malo
  lexicon: HALOT
  rationale: La expresión abstracta y definida se refleja mejor con 'el mal', que reproduce la fórmula deuteronómica y su alcance moral-covenantal.
- source_word: מִיִּשְׂרָאֵל
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de en medio de Israel
  - de entre Israel
  lexicon: HALOT
  rationale: La preposición indica remoción de la comunidad del pacto. 'De Israel' es conciso y fiel; en español mantiene la referencia colectiva sin sobreexpansión.
theological_decisions:
- issue: Reproducción del estado marital implícito en בְעֻלַת בַּעַל
  english_pob_reading: married to a husband
  chosen_spanish_reading: mujer casada
  alternative_spanish_readings:
  - mujer unida a un marido
  - casada con un esposo
  rationale: El hebreo recalca el vínculo matrimonial, pero no exige en español una perífrasis literal que suene extraña. 'Mujer casada' comunica el estado jurídico sin perder el sentido del texto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Si explicitar la pena como ejecución judicial
  english_pob_reading: shall die
  chosen_spanish_reading: morirán
  alternative_spanish_readings:
  - serán ejecutados
  - serán muertos
  rationale: El texto hebreo dice 'morirán'. En el contexto legal la pena capital está implícita, pero el español principal permanece cercano a la formulación del original sin añadir una pasiva no presente.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés y el hebreo base: mantiene la estructura legal, conserva el eufemismo sexual con un equivalente natural en español, y preserva la fórmula deuteronómica de purgar/eliminar el mal de la comunidad. No se observan revisiones previas que exijan ajustes adicionales.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo base es YHWH; este versículo no lo contiene.
  - Se mantiene 'el mal' para la fórmula deuteronómica recurrente, coherente con el registro legal del libro.
  - Se evita 'SEÑOR' y no hay términos cristológicos o pneumatológicos en este versículo.
  - '''Acostado con'' conserva el tono eufemístico sin volver la frase demasiado moderna o técnica.'
