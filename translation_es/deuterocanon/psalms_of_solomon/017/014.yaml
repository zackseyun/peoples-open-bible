translation:
  language: es
  text: En la ira de su esplendor[a] los envió hasta el occidente, y a los gobernantes de la tierra al escarnio[b]; y no tuvo clemencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'en la ira de su belleza'.
    reason: lexical_alternative
  - marker: b
    text: O 'como objeto de ridículo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀργῇ
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - ira ardiente
  - furor
  lexicon: BDAG
  rationale: ὀργή expresa una ira intensa y judicial. En español, 'ira' comunica bien esa fuerza sin sobrecargar el texto; 'furor' sería más marcado, pero menos natural aquí.
- source_word: κάλλους
  english_pob_choice: splendor
  chosen_spanish: esplendor
  alternatives_spanish:
  - belleza
  - majestad
  lexicon: BDAG
  rationale: Aunque el griego literalmente dice 'belleza', el uso en la frase pide una cualidad resplandeciente o magnífica. 'Esplendor' conserva esa fuerza visual y evita una lectura meramente estética.
- source_word: ἐξαπέστειλεν
  english_pob_choice: sent ... away
  chosen_spanish: los envió
  alternatives_spanish:
  - los expulsó
  - los desterró
  - los mandó lejos
  lexicon: BDAG
  rationale: El verbo intensifica 'enviar'. 'Los envió' mantiene el núcleo verbal y, junto con 'hasta el occidente', comunica el alejamiento sin añadir matices no garantizados.
- source_word: ἕως ἐπὶ δυσμῶν
  english_pob_choice: as far as the west
  chosen_spanish: hasta el occidente
  alternatives_spanish:
  - hasta el oeste
  - hasta la tierra del poniente
  - hasta donde se pone el sol
  lexicon: LSJ
  rationale: δυσμαί señala el oeste o la puesta del sol. 'Occidente' es una forma clara y digna en español bíblico, y conserva la idea de dirección extrema.
- source_word: ἄρχοντας
  english_pob_choice: rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - los jefes
  - los príncipes
  - los dirigentes
  lexicon: BDAG
  rationale: En este contexto político, 'gobernantes' es el equivalente más natural y preciso en español actual.
- source_word: ἐμπαιγμόν
  english_pob_choice: a mockery
  chosen_spanish: para burla
  alternatives_spanish:
  - para escarnio
  - como objeto de ridículo
  - en ridículo
  lexicon: BDAG
  rationale: El sustantivo denota escarnio o ridículo. 'Para burla' reproduce la idea de ser expuestos al desprecio de otros, sin forzar una formulación demasiado idiomática.
- source_word: οὐκ ἐφείσατο
  english_pob_choice: he did not spare
  chosen_spanish: no perdonó
  alternatives_spanish:
  - no tuvo piedad
  - no lo perdonó
  - no se apiadó
  lexicon: BDAG
  rationale: El verbo significa 'ahorrar', 'perdonar' o 'mostrar clemencia'. Como el objeto queda implícito en el griego, 'no perdonó' mantiene la brevedad del original y la fuerza negativa.
theological_decisions:
- issue: Identidad del sujeto implícito y preservación del tono del juicio
  english_pob_reading: The English audit trail retains the judgmental force of the line without making the divine subject explicit in the verse itself.
  chosen_spanish_reading: La línea se traduce en tercera persona sin explicitar un sujeto divino, manteniendo el tono de juicio implícito.
  alternative_spanish_readings:
  - En la ira de su esplendor Dios los envió...
  - En su ira esplendorosa los expulsó...
  rationale: El griego no nombra explícitamente a Dios aquí; por tanto, la traducción no debe añadirlo. Se conserva el carácter de juicio y expulsión sin resolver más de lo que el texto entrega.
  doctrine_reference: Principio de sobriedad textual; no explicitar sujetos no presentes en el pasaje.
translation_notes:
  revision_awareness: La revisión más reciente del audit trail corrigió 'beauty' por 'splendor' en inglés por razones de naturalidad contextual, pero la base griega sigue siendo κάλλους. En español se optó por 'esplendor' como equivalente publicado, conservando también la tensión entre el sentido literal ('belleza') y el uso contextual. Se evitó añadir elementos no presentes, como un objeto explícito tras 'no perdonó'.
  spanish_consistency_notes:
  - Se mantiene 'esplendor' para κάλλους en coherencia con la revisión del audit trail y con la tradición léxica del proyecto.
  - '''Occidente'' traduce el valor direccional de δυσμῶν con dignidad bíblica y claridad contemporánea.'
  - 'La frase final queda breve como en el griego: ''y no perdonó''.'
