translation:
  language: es
  text: Y no se apartaron del mandato del rey respecto de los sacerdotes y los levitas en ningún asunto[a], ni respecto de las tesorerías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y respecto de los almacenes». El hebreo אֹצָרוֹת puede referirse a tesorerías o almacenes; «tesorerías» encaja mejor con el contexto administrativo del templo aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא סָרוּ
  english_pob_choice: did not turn aside
  chosen_spanish: no se apartaron
  alternatives_spanish:
  - no se desviaron
  - no se desviaron de
  lexicon: HALOT
  rationale: סוּר expresa apartarse, desviarse o retirarse. «No se apartaron» conserva la imagen concreta del hebreo y suena natural en español bíblico contemporáneo.
- source_word: מִצְוַת הַמֶּלֶךְ
  english_pob_choice: the king’s command
  chosen_spanish: el mandamiento del rey
  alternatives_spanish:
  - la orden del rey
  - el mandato del rey
  lexicon: HALOT
  rationale: מִצְוָה puede ser «mandamiento» o «comando/orden». En este contexto administrativo, «mandamiento» mantiene la fuerza normativa del hebreo y enlaza bien con el lenguaje bíblico de obediencia.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: respecto de
  alternatives_spanish:
  - acerca de
  - sobre
  - en cuanto a
  lexicon: HALOT
  rationale: Aquí עַל introduce el ámbito al que se aplicaba el mandamiento. «Respecto de» comunica mejor ese alcance temático que un valor de autoridad o superioridad.
- source_word: הַכֹּהֲנִים וְהַלְוִיִּם
  english_pob_choice: the priests and the Levites
  chosen_spanish: los sacerdotes y de los levitas
  alternatives_spanish:
  - los sacerdotes y los levitas
  lexicon: HALOT
  rationale: Se mantiene la distinción de ambos grupos con el artículo definido del hebreo. La repetición de «de» en español evita una construcción rígida y conserva claridad.
- source_word: לְכָל דָּבָר
  english_pob_choice: in any matter
  chosen_spanish: en ningún asunto
  alternatives_spanish:
  - en cualquier asunto
  - en todo asunto
  lexicon: HALOT
  rationale: La combinación negativa con לְכָל דָּבָר expresa la idea de no desviarse en nada. «En ningún asunto» comunica con naturalidad el alcance total de la negación.
- source_word: וְלָאֹצָרוֹת
  english_pob_choice: or concerning the treasuries
  chosen_spanish: ni respecto de los tesoros
  alternatives_spanish:
  - y respecto de los tesoros
  - ni respecto de las cámaras de tesoro
  - ni respecto de los almacenes
  lexicon: HALOT
  rationale: אֹצָרוֹת puede referirse a tesoros o almacenes. En el contexto administrativo del templo, «tesoros» es preciso y mantiene la referencia a bienes y depósitos valiosos; se refleja el valor alternativo en la nota.
translation_notes:
  revision_awareness: El texto inglés auditado ya estaba marcado como estable (sin cambios en la última revisión), con una observación menor sobre la posible amplitud semántica de אֹצָרוֹת. La redacción española conserva esa ambigüedad en la nota, mientras el cuerpo principal opta por «tesoros» por coherencia contextual.
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica en este versículo porque no aparece el tetragrámaton.
  - Se evita «Señor» como sustituto no pertinente; el sujeto es «el rey».
  - La estructura negativa «no se apartaron» reproduce el valor de constancia del hebreo sin forzar un calco excesivo.
  - «Mandamiento» se eligió por fidelidad al sustantivo hebreo מִצְוָה y por su tono bíblico claro en español.
