  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las opciones 'veneno', 'serpiente', 'cobra' y 'sorda' concuerdan con el expediente inglés y con un español eclesial claro. La nota léxica sobre פֶתֶן está bien conservada.
