base_translation:
  language: en
  yaml_path: translation/ot/1_kings/002/039.yaml
  text: Now at the end of three years[a], two slaves of Shimei ran away to Achish son of Maacah, king of Gath. And they told Shimei, saying, “Look, your slaves are in Gath.”
  footnotes:
