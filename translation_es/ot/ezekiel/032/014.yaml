translation:
  language: es
  text: Entonces haré que sus aguas[a] se asienten, y haré que sus ríos fluyan como aceite[b], declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «haré que sus aguas se hundan / bajen / se aquieten». El verbo hebreo puede expresar el descenso o asentamiento del agua tras la agitación.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «conduciré sus ríos como aceite», es decir, haré que se muevan suavemente como el aceite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Adverbio temporal que introduce la consecuencia del oráculo. «Entonces» mantiene la relación lógica y suena natural en español bíblico contemporáneo.
- source_word: אַשְׁקִיעַ
  english_pob_choice: I will let ... settle
  chosen_spanish: haré que ... se asienten
  alternatives_spanish:
  - haré que ... se hundan
  - haré que ... se calmen
  - dejaré que ... se asienten
  lexicon: HALOT
  rationale: 'El hifil de שׁקע es causativo: causar que algo descienda o se asiente. Con «aguas» el sentido idiomático en español es que queden tranquilas o asentadas, sin perder la fuerza causativa.'
- source_word: מֵימֵיהֶם
  english_pob_choice: their waters
  chosen_spanish: sus aguas
  alternatives_spanish:
  - sus aguas
  - el agua de ellos
  lexicon: HALOT
  rationale: El plural hebreo conserva una imagen poética de masas de agua; «sus aguas» reproduce esa pluralidad y es natural en español.
- source_word: וְנַהֲרוֹתָם
  english_pob_choice: and ... their rivers
  chosen_spanish: y haré que sus ríos
  alternatives_spanish:
  - y sus ríos
  - y sus corrientes
  - y sus canales
  lexicon: HALOT
  rationale: נְהָרוֹת se refiere normalmente a ríos o corrientes grandes. «Ríos» es la opción más directa y coherente con la imaginería del contexto.
- source_word: כַּשֶּׁמֶן
  english_pob_choice: like oil
  chosen_spanish: como aceite
  alternatives_spanish:
  - como óleo
  - como aceite de oliva
  lexicon: HALOT
  rationale: שֶׁמֶן es «aceite». En español, «aceite» comunica la imagen de fluidez sin añadir precisión no expresada en el texto.
- source_word: אוֹלִיךְ
  english_pob_choice: I will make ... flow
  chosen_spanish: haré que ... fluyan
  alternatives_spanish:
  - los conduciré
  - los haré ir
  - los guiaré
  lexicon: HALOT
  rationale: El hifil de הלך es causativo; con ríos, el español natural es «hacer que fluyan». Mantiene el movimiento suave sugerido por la comparación con aceite.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - oráculo de
  lexicon: HALOT
  rationale: Fórmula profética estándar. «Declara» conserva el tono solemne y es idiomático en registro bíblico moderno.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé, el Señor
  alternatives_spanish:
  - Yahvé Dios
  - el Señor Yahvé
  lexicon: HALOT
  rationale: Se preserva el nombre divino como «Yahvé» según la norma del proyecto para יְהוָה. «Señor» traduce אֲדֹנָי; se usa coma para distinguir los dos elementos del título compuesto sin borrar la tensión lexical.
theological_decisions:
- issue: Traducción del nombre divino en el título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - Yahvé Dios
  rationale: 'El hebreo contiene el tetragrámaton directamente y no un sustituto. La lectura española mantiene ambos elementos del título compuesto: אֲדֹנָי como «el Señor» y יְהוִה como «Yahvé», evitando ocultar el nombre propio divino.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el último pase revisado y con el chequeo de alta concordancia; el principal ajuste para el español fue reflejar explícitamente el nombre divino YHWH como «Yahvé» y mantener el título compuesto con «el Señor» para אֲדֹנָי.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo de dos acciones causativas: las aguas se asientan y los ríos fluyen.'
  - «Yahvé» se usa como forma estable para יְהוִה, conforme al criterio del proyecto.
  - Se evitó «SEÑOR» como máscara tipográfica para no borrar el nombre propio divino.
  - «Aceite» se mantiene sin añadir «de oliva», porque el hebreo no lo especifica.
