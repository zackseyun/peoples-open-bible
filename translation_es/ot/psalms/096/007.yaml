translation:
  language: es
  text: Atribuyan a Yahvé[a], familias de los pueblos[c][b], atribuyan a Yahvé gloria y fuerza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Den a Yahvé»; el imperativo hebreo puede traducirse más literalmente como «den», pero aquí expresa reconocer lo que le corresponde.
    reason: lexical_alternative
  - marker: b
    text: «Yahvé» traduce el nombre divino YHWH; alternativamente, «el SEÑOR».
    reason: alternative_reading
  - marker: c
    text: O «clanes de las naciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבוּ
  english_pob_choice: Ascribe
  chosen_spanish: Atribuyan
  alternatives_spanish:
  - Den
  - Reconozcan
  - Atribuyan
  lexicon: HALOT
  rationale: El verbo hebreo en este llamado de adoración expresa reconocer o atribuir a Dios lo que le corresponde, más que entregar algo material. «Atribuyan» conserva esa fuerza de reconocimiento debido y suena natural en español culto y bíblico.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh / to the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  - al SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo nombra directamente a יהוה, y el proyecto pide «Yahvé» como forma principal en español. La preposición ל se refleja con «a» en un mandato de atribución.
- source_word: מִשְׁפְּחוֹת עַמִּים
  english_pob_choice: families of the peoples
  chosen_spanish: familias de los pueblos
  alternatives_spanish:
  - clanes de las naciones
  - familias de las naciones
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת comunica grupos familiares o de parentesco; עַמִּים son «pueblos». «Familias de los pueblos» preserva el paralelismo y evita imponer el matiz más político de «naciones».
- source_word: כָּבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  lexicon: HALOT
  rationale: En contexto litúrgico, כָּבוֹד se refiere a la gloria debida a Dios. «Gloria» es la equivalencia más directa y solemne en español.
- source_word: וָעֹז
  english_pob_choice: and strength
  chosen_spanish: y fuerza
  alternatives_spanish:
  - y poder
  - y fortaleza
  lexicon: HALOT
  rationale: עֹז denota fuerza, poder o vigor. «Fuerza» mantiene la pareja poética con «gloria» y conserva un sentido amplio sin exagerar el matiz militar de «poder».
theological_decisions:
- issue: Cómo verter el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La política del proyecto para el Tetragrámaton favorece «Yahvé» en el texto principal. Eso preserva el nombre de pacto del original hebreo y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor exhortativo del imperativo הָבוּ
  english_pob_reading: Ascribe
  chosen_spanish_reading: Atribuyan
  alternative_spanish_readings:
  - Den
  - Reconozcan
  rationale: No se trata de dar algo a Dios que le falte, sino de reconocer públicamente su derecho a gloria y fuerza. «Atribuyan» mantiene esa lectura de alabanza con fidelidad semántica.
  doctrine_reference: SALMO 96:7 — llamado litúrgico de adoración
translation_notes:
  revision_awareness: El borrador sigue el audit trail inglés en la estructura exhortativa repetida y en la decisión de usar un verbo de atribución, pero adapta el estilo al español para que la pareja paralela resulte fluida. También incorpora la revisión inglesa que eliminó el punto y coma, usando una pausa media con punto y coma en español para conservar la coordinación solemne sin romper el paralelismo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al criterio general del proyecto para יהוה.
  - «Atribuyan» conserva el sentido de reconocimiento debido frente a un simple «den».
  - «Familias de los pueblos» respeta la estructura hebrea sin forzar «naciones».
  - «Gloria y fuerza» reproduce el binomio de cualidades divinas con registro bíblico claro.
  - La puntuación refleja dos imperativos paralelos en una sola línea poética.
