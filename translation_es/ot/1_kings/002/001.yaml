review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: וַיִּקְרְבוּ יְמֵי דָוִד לָמוּת se refleja adecuadamente como la cercanía de los días de David a su muerte, y וַיְצַו אֶת שְׁלֹמֹה בְנוֹ לֵאמֹר como una orden dirigida a Salomón, su hijo, introduciendo discurso directo. Sin embargo, la nota alternativa española no refleja fielmente la alternativa documentada en inglés y suena menos precisa respecto del modismo hebreo.'
  spanish_quality_summary: 'El español principal es claro, natural y digno. «Cuando se acercaron los días de David para morir» funciona, aunque «Al acercarse» también sería posible. La puntuación con comas en «a Salomón, su hijo» es aceptable. El único problema real de calidad está en la nota: «David llegó a los días de morir» no reproduce bien la alternativa inglesa ni suena idiomática en español bíblico actual.'
  glossary_alignment: No hay términos del glosario principal implicados aquí. «Mandó» para צוה y «diciendo» para לֵאמֹר concuerdan bien con la filosofía del proyecto. La construcción temporal «los días de David» preserva correctamente el modismo fuente.
  issues:
  - severity: medium
    issue: La nota al pie alternativa está mal formulada frente al rastro de auditoría inglés.
    rationale: El inglés documenta «David’s days came near to die», no «David llegó a los días de morir». La nota española actual cambia la estructura y produce una frase torpe. Debe preservar mejor la alternativa formal y luego explicar el sentido idiomático.
  revised_spanish_text: 'Cuando se acercaron los días de David para morir[a], mandó a Salomón, su hijo, diciendo:'
  revised_footnotes:
  - marker: a
    text: 'O: «Los días de David se acercaron para morir»; el modismo hebreo significa que se acercaba el tiempo de la muerte de David.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural en español. Solo se corrige la nota para alinearla con la alternativa documentada en la auditoría inglesa y para expresar mejor el modismo hebreo en español claro.
