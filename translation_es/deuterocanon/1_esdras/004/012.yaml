translation:
  language: es
  text: 'El tercero escribió[a]: «Las mujeres son más fuertes, pero la verdad vence por encima de todo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Las mujeres prevalecen, pero la verdad prevalece sobre todo».
