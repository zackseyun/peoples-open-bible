revisions:
- from: los que se sientan entre las sepulturas y pasan la noche en lugares ocultos[a], los que comen carne de cerdo y el caldo de cosas impuras está en sus vasos[b];
  to: los que se sientan entre las sepulturas y pasan la noche en lugares ocultos[a], los que comen carne de cerdo y el caldo de cosas impuras está en sus vasijas[b];
  rationale: 'Se conserva la traducción general porque es fiel al hebreo y al audit trail inglés, pero se sustituye ''vasos'' por ''vasijas'' para reflejar mejor כְּלֵיהֶם en un contexto de recipientes que contienen caldo/alimentos impuros. No hace falta adjudicación adicional: es una mejora local de precisión y naturalidad en español.'
