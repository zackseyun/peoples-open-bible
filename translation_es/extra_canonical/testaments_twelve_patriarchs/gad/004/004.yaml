source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 4. Ἐὰν δὲ *δοῦλός τις ᾖ¹³, συμβαλεῖ¹⁴ αὐτὸν πρὸς τὸν κύριον αὐτοῦ, καὶ ἐν πάσῃ θλίψει¹⁵ *ἐπιχαίρει αὐτῷ¹⁶, εἴπως¹⁷ θανατωθῇ¹⁸.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/004/004.yaml
  text: And if someone is a slave, it slanders him to his master, and in every distress it rejoices over him, if perhaps he may be put to death.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: false
    changes_summary: Adjusted the opening from 'it is some slave' to 'someone is a slave' for natural English while preserving the source meaning; retained 'slave' and the rest of the wording.
translation:
  language: es
  text: Y si alguien es esclavo[a], lo difama ante su señor, y en toda aflicción se alegra de él, con tal de que quizá sea entregado a la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Esclavo» reproduce la fuerza de δοῦλος; se evita «siervo» porque suavizaría el término y no responde al testimonio textual.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλός τις
  english_pob_choice: someone is a slave
  chosen_spanish: alguien es esclavo
  alternatives_spanish:
  - si alguien es esclavo
  - si uno es esclavo
  lexicon: δοῦλος
  rationale: La fuente griega introduce una condición general con τις; en español, «alguien» preserva el valor indefinido y naturaliza la cláusula. Se mantiene «esclavo» para conservar la fuerza léxica de δοῦλος, coherente con la decisión inglesa documentada.
- source_word: συμβαλεῖ
  english_pob_choice: it slanders him
  chosen_spanish: lo difama
  alternatives_spanish:
  - lo calumnia
  - habla mal de él
  lexicon: συμβάλλω
  rationale: En este contexto, el verbo se entiende como una acción hostil de desacreditar ante otra persona. «Difama» expresa bien esa agresión relacional sin suavizarla, y corresponde al sentido adversativo del pasaje.
- source_word: πρὸς τὸν κύριον αὐτοῦ
  english_pob_choice: to his master
  chosen_spanish: ante su señor
  alternatives_spanish:
  - a su señor
  - frente a su señor
  lexicon: κύριος
  rationale: «Señor» traduce κύριος aquí por relación de dueño/amo. «Ante» refleja el movimiento relacional implícito en el contexto de acusación o desacreditación, sin añadir elementos no presentes en el griego.
- source_word: ἐν πάσῃ θλίψει
  english_pob_choice: in every distress
  chosen_spanish: en toda aflicción
  alternatives_spanish:
  - en toda angustia
  - en cada tribulación
  lexicon: θλῖψις
  rationale: «Aflicción» comunica el campo semántico de θλῖψις en español eclesial contemporáneo sin perder el carácter de presión/sufrimiento. Se conserva el distributivo con «toda».
- source_word: ἐπιχαίρει αὐτῷ
  english_pob_choice: it rejoices over him
  chosen_spanish: se alegra de él
  alternatives_spanish:
  - se regocija por él
  - se alegra sobre él
  lexicon: ἐπιχαίρω
  rationale: El griego personifica una actitud hostil que se alegra ante el daño del esclavo. «Se alegra de él» mantiene esa relación directa y evita una paráfrasis excesiva; en español suena natural como alegría maliciosa.
- source_word: εἴπως
  english_pob_choice: if perhaps
  chosen_spanish: con tal de que quizá
  alternatives_spanish:
  - si acaso
  - quizá
  lexicon: εἴπως
  rationale: La partícula expresa posibilidad o eventualidad. «Con tal de que quizá» resulta algo forzado en español, pero preserva la cautela condicional del griego; se evita convertirla en certeza.
- source_word: θανατωθῇ
  english_pob_choice: may be put to death
  chosen_spanish: sea entregado a la muerte
  alternatives_spanish:
  - sea muerto
  - muera
  lexicon: θανατόω
  rationale: «Sea entregado a la muerte» conserva el matiz pasivo y formal del verbo, sin trivializarlo. Reproduce mejor la construcción impersonal/pasiva que una simple forma activa española.
theological_decisions:
- issue: 'Tono ético del pasaje: denuncia de un comportamiento hostil hacia el esclavo'
  english_pob_reading: it slanders him to his master, and in every distress it rejoices over him
  chosen_spanish_reading: lo difama ante su señor, y en toda aflicción se alegra de él
  alternative_spanish_readings:
  - lo calumnia ante su señor, y en toda aflicción se regocija de él
  rationale: El texto presenta una conducta moralmente perversa hacia una persona vulnerable. La traducción conserva esa acusación sin atenuarla ni moralizarla más allá de la fuente.
  doctrine_reference: Ética bíblica y trato del prójimo vulnerable
- issue: Mantenimiento de la esclavitud como realidad léxica explícita
  english_pob_reading: someone is a slave
  chosen_spanish_reading: alguien es esclavo
  alternative_spanish_readings:
  - si alguien es esclavo
  rationale: Se preserva la realidad social nombrada por el texto en lugar de sustituirla por un término más suave como «siervo», porque la base griega usa δοῦλος y el audit trail inglés retuvo «slave».
  doctrine_reference: Fidelidad léxica al vocabulario social del texto
translation_notes:
  revision_awareness: El inglés auditado fue revisado desde «it is some slave» a «someone is a slave» para mejorar la naturalidad sin cambiar el sentido. La versión española sigue esa misma mejora natural usando una cláusula condicional nominalizada más idiomática, pero mantiene el núcleo léxico «esclavo» y el resto de la sintaxis y valores semánticos del original griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita divina.
  - Se conserva «esclavo» por coherencia con la decisión inglesa auditada de mantener 'slave' y con la fuerza de δοῦλος.
  - «Señor» se usa aquí en el sentido relacional de dueño/amo, no como título divino.
