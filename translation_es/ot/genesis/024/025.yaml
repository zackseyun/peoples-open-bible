    issue: 'Redacción posesiva redundante: «Tenemos ... con nosotros».'
    rationale: El hebreo עִמָּנוּ es literalmente «con nosotros», pero el propio rastro inglés justifica el ajuste idiomático «we have». En español, usar «tenemos» ya expresa la disponibilidad; añadir «con nosotros» produce una frase menos natural sin aportar significado nuevo suficiente.
  - severity: low
    issue: La nota [a] no aporta una alternativa textual significativa.
    rationale: Explica una adaptación gramatical normal del español («le» por «a él») en vez de preservar una alternativa traductiva relevante del original o del audit trail.
  - severity: low
