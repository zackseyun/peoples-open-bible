translation:
  language: es
  text: Sé como padre para los huérfanos[a], y sé en lugar de esposo para las viudas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La Septuaginta griega ofrece una lectura sustancialmente distinta: «Rescata al maltratado de la mano del malhechor, y no desmayes al juzgar». Esto probablemente refleja otra forma textual del versículo.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֱיֵה
  english_pob_choice: Be like
  chosen_spanish: Sé como
  alternatives_spanish:
  - Sé
  - Vuélvete
  lexicon: HALOT
  rationale: El imperativo de היה exige una orden directa; en español, «Sé como» conserva el valor exhortativo y la comparación implícita por el contexto, sin convertir la frase en una identidad literal.
- source_word: כְאָב
  english_pob_choice: like a father
  chosen_spanish: como padre
  alternatives_spanish:
  - como un padre
  - como si fueras padre
  lexicon: HALOT
  rationale: El כ comparativo se refleja mejor con «como». Se omite el artículo para sonar natural en español y mantener la fuerza proverbial de la comparación.
- source_word: לִיתוֹמִים
  english_pob_choice: to orphans
  chosen_spanish: para los huérfanos
  alternatives_spanish:
  - a los huérfanos
  - para los hijos sin padre
  lexicon: HALOT
  rationale: יתומים se vierte con «huérfanos», la opción más clara y reconocible. «Para» expresa función o beneficio social, que es el sentido práctico de la línea.
- source_word: וּתְמוּר
  english_pob_choice: in place of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - como sustituto de
  - en vez de
  lexicon: HALOT
  rationale: תמור indica sustitución o reemplazo. «En lugar de» es la forma más idiomática y precisa en español para ese valor relacional.
- source_word: בַּעַל
  english_pob_choice: a husband
  chosen_spanish: esposo
  alternatives_spanish:
  - marido
  - esposo y protector
  lexicon: HALOT
  rationale: En este contexto doméstico con viudas, בעל apunta al esposo, no a «señor» o «dueño». «Esposo» comunica mejor la relación de protección y cobertura social del dicho.
- source_word: לְאַלְמָנוֹת
  english_pob_choice: to widows
  chosen_spanish: para las viudas
  alternatives_spanish:
  - a las viudas
  - en favor de las viudas
  lexicon: HALOT
  rationale: אלמנות se traduce de forma directa por «viudas». El complemento con «para» mantiene el paralelismo funcional con «para los huérfanos».
theological_decisions:
- issue: Elección de la lectura hebrea frente a la variante griega sustancialmente distinta
  english_pob_reading: 'Follow the Hebrew exhortation: be like a father to orphans, and in place of a husband to widows.'
  chosen_spanish_reading: Seguir la exhortación hebrea a actuar como padre de los huérfanos y en lugar de esposo para las viudas.
  alternative_spanish_readings:
  - Rescata al maltratado de la mano del malhechor, y no desmayes al juzgar.
  - Saca al oprimido de la mano del opresor, y no pierdas ánimo al juzgar.
  rationale: Como el hebreo conservado es de alta confianza y validado, gobierna el texto principal. La lectura griega se preserva como alternativa significativa porque atestigua una forma textual materialmente distinta del versículo, pero no desplaza la base hebrea allí donde ésta subsiste.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives; use Greek alongside it'
- issue: Matiz social de la metáfora familiar
  english_pob_reading: The addressee should function as a father/husband-substitute for vulnerable persons.
  chosen_spanish_reading: El destinatario debe asumir una función de cuidado y amparo, no una identidad literal de padre o esposo.
  alternative_spanish_readings:
  - Debes ser literalmente padre de los huérfanos y esposo de las viudas.
  - Debes comportarte solo como protector general, sin matiz familiar.
  rationale: «Sé como» y «en lugar de» mantienen el carácter figurado y relacional del mandato, preservando la tensión entre sustitución social y lenguaje familiar sin convertirlo en literalidad biológica o legal.
  doctrine_reference: HALOT; contexto sapiencial de Sirach
translation_notes:
  revision_awareness: Se siguió la prioridad del hebreo conservado en Sirach, en línea con la nota de alta confianza y la evaluación de acuerdo alto; la variante griega se preserva en nota como lectura alternativa sustancial, sin trasladarla al texto principal.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Huérfanos» y «viudas» se mantuvieron como términos directos y transparentes, sin sustitución por eufemismos.
  - «Esposo» se eligió para בעל por el contexto doméstico; no se usó «señor» ni «amo» para evitar una lectura impropia.
  - La nota al pie marca únicamente la variante griega, ya que es la única alternativa textual significativa documentada en el audit trail.
