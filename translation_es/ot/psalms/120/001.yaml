review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido básico del hebreo: una rúbrica, una apelación a Yahvé en tiempo de angustia y la respuesta divina. También mantiene correctamente יְהוָה como «Yahvé». Sin embargo, «clamé» intensifica ligeramente קָרָאתִי, donde la auditoría inglesa prefirió el verbo más simple «I called». Además, el anclaje de la nota al inicio del versículo es torpe en español y conviene adjuntarlo directamente a la rúbrica.'
  spanish_quality_summary: El español es claro y digno, pero «Cántico de ascensos» suena menos natural como superscripción que «Cántico de subidas», especialmente dado que la nota ya preserva la alternativa. También es mejor evitar colocar la marca de nota antes de la primera palabra. El resto del versículo fluye bien en español bíblico moderno.
  glossary_alignment: Alinea bien con el glosario en «Yahvé». No hay otros términos doctrinales controvertidos. Se recomienda ajustar «clamé» a «llamé» para seguir más de cerca la decisión léxica documentada para קָרָאתִי y mantener equivalencia óptima sin añadir color emocional.
  issues:
  - severity: medium
    issue: «Clamé» añade intensidad no exigida por קָרָאתִי
    rationale: La auditoría inglesa documenta que el verbo básico es «I called» y rechazó «cried out» por añadir color emocional. En español, «clamé» se acerca más a «cried out» que a «called».
  - severity: medium
    issue: «Cántico de ascensos» resulta poco idiomático en español para la rúbrica
    rationale: Aunque es defendible literalmente, en español eclesial y general «subidas» suena más natural que el abstracto «ascensos» en esta expresión fija. La nota puede conservar «ascensos» o explicar la alternativa si se desea.
  - severity: low
    issue: La nota [a] está mal colocada al inicio del texto
    rationale: La instrucción requiere que el marcador aparezca en la frase relevante. En español es más natural anclarlo a la rúbrica misma, no antes de toda la oración.
  revised_spanish_text: Cántico de subidas[a]. En mi angustia llamé a Yahvé, y él me respondió.
  revised_footnotes:
