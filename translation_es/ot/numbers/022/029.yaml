base_translation:
  language: en
  yaml_path: translation/ot/numbers/022/029.yaml
  text: And Balaam said to the donkey[a], “Because you have made a mockery of me! If only there were a sword in my hand[c][b], I would kill you right now.”
  footnotes:
  - marker: a
    text: Hebrew 'she-donkey'; the feminine is explicit in the Hebrew forms, though English normally uses 'donkey' naturally here.
    reason: lexical_alternative
  - marker: b
    text: Or 'you have mocked me.' The Hebrew verb can convey treating someone abusively, mockingly, or making a fool of them.
    reason: lexical_alternative
  - marker: c
    text: Or 'I would have killed you right now.' The Hebrew expresses Balaam's contrary-to-fact wish and immediate intent.
    reason: lexical_alternative
