translation:
  language: es
  text: Y algunos de tus hijos que nacerán de ti, que tú engendrarás, se los llevarán, y llegarán a ser eunucos[a] en el palacio del rey de Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oficiales de la corte»; el término hebreo puede referirse ya sea a eunucos literales o, en algunos contextos, a oficiales reales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִבָּנֶיךָ
  english_pob_choice: And some of your sons
  chosen_spanish: Y algunos de tus hijos
  alternatives_spanish:
  - Y de tus hijos
  - Y algunos de tus descendientes
  lexicon: HALOT
  rationale: El partitivo con מן permite expresar una parte de los hijos; en español, «algunos de tus hijos» conserva la partición y el parentesco inmediato sin volver la frase rígida. «Descendientes» amplía demasiado el alcance frente al hebreo concreto.
- source_word: אֲשֶׁר יֵצְאוּ מִמְּךָ
  english_pob_choice: who will come from you
  chosen_spanish: que saldrán de ti
  alternatives_spanish:
  - que procederán de ti
  - que saldrán de ti mismo
  lexicon: HALOT
  rationale: «Salir de ti» reproduce de forma natural el valor idiomático de procedencia/generación sin perder el sentido genealógico. «Procederán de ti» es posible, pero algo más formal y menos directo.
- source_word: אֲשֶׁר תּוֹלִיד
  english_pob_choice: whom you will father
  chosen_spanish: que tú engendrarás
  alternatives_spanish:
  - a quienes tú darás a luz
  - a quienes tú habrás engendrado
  lexicon: HALOT
  rationale: El verbo en causativo con sujeto masculino expresa engendrar/paternar. «Engendrarás» es más preciso y más natural en español bíblico que una paráfrasis como «tendrás»; evita también una lectura materna impropia del sujeto masculino.
- source_word: יִקָּחוּ
  english_pob_choice: will be taken
  chosen_spanish: serán tomados
  alternatives_spanish:
  - serán llevados
  - los llevarán
  lexicon: HALOT
  rationale: La forma verbal es activa, pero el sujeto queda indefinido; en español, la pasiva «serán tomados» preserva esa indefinición y el sentido de captura/deportación. «Serán llevados» suaviza un poco más el acto, mientras que «los llevarán» introduce un agente no expresado.
- source_word: וְהָיוּ
  english_pob_choice: and they will become
  chosen_spanish: y serán
  alternatives_spanish:
  - y llegarán a ser
  - y se convertirán en
  lexicon: HALOT
  rationale: Con un predicado nominal, היה puede equivaler a «ser» o «llegar a ser». En español, «serán eunucos» comunica de forma directa el estado resultante sin añadir matices que no exige el hebreo.
- source_word: סָרִיסִים
  english_pob_choice: eunuchs
  chosen_spanish: eunucos
  alternatives_spanish:
  - oficiales de la corte
  - funcionarios de la corte
  lexicon: HALOT
  rationale: Se conserva el sentido principal y más inmediato de «eunucos», manteniendo la tensión lexicológica documentada en la nota inglesa. Las alternativas administrativas se reservan para la nota porque el término hebreo puede extenderse a funcionarios palaciegos en algunos contextos.
- source_word: בְּהֵיכַל
  english_pob_choice: in the palace
  chosen_spanish: en el palacio
  alternatives_spanish:
  - en el templo
  - en la corte
  lexicon: HALOT
  rationale: Con «el rey de Babilonia» el contexto apunta al complejo real, no a un templo. «Palacio» es el equivalente contextual correcto en español.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: del rey de Babilonia
  alternatives_spanish:
  - del rey babilónico
  - del rey de Babilón
  lexicon: HALOT
  rationale: La relación constructa se expresa naturalmente en español con «del rey de Babilonia». Es la forma más clara y fiel al hebreo.
theological_decisions:
- issue: Alcance de סָרִיסִים en un anuncio profético de corte imperial
  english_pob_reading: literal 'eunuchs' in the main text, with 'court officials' in a footnote
  chosen_spanish_reading: «eunucos» en el texto principal, con «oficiales de la corte» como alternativa en nota
  alternative_spanish_readings:
  - «oficiales de la corte» en el texto principal
  - «funcionarios de la corte» en el texto principal
  rationale: La evidencia léxica permite un sentido literal o uno ampliado. Como el contexto habla del destino de los hijos de Ezequías en Babilonia, el sentido literal mantiene la fuerza histórica y profética. A la vez, la nota conserva la tensión semántica sin resolverla de modo excesivo.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el control cruzado mostró alto acuerdo, por lo que se mantiene la lectura principal de la tradición auditada sin modificaciones sustantivas.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene «eunucos» en el texto principal para conservar la tensión léxica documentada.
  - «Palacio» se eligió por el contexto de Babilonia y el rey, evitando el falso amigo «templo».
  - La sintaxis española conserva la secuencia profética del hebreo sin añadir sujeto explícito innecesario.
