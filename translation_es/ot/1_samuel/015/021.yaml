translation:
  language: es
  text: Pero el pueblo tomó del botín ovejas y vacas[a], lo mejor de lo que había sido dedicado a destrucción[b], para sacrificar a Yahvé tu Dios en Gilgal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «del despojo».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «lo mejor/la primera parte de lo que había sido dedicado a destrucción»; la expresión se refiere a animales que estaban bajo el anatema y no debían haberse conservado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - se llevó
  - agarró
  lexicon: HALOT
  rationale: לקח en este contexto narrativo expresa una acción simple de tomar; «tomó» conserva la concisión y el valor directo del hebreo sin añadir matices de violencia o desplazamiento que no están en el texto.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - los hombres
  lexicon: HALOT
  rationale: Aunque puede referirse a los soldados de Saúl, «el pueblo» preserva el sustantivo colectivo del hebreo y mantiene el efecto retórico de atribuir la acción al grupo.
- source_word: מֵהַשָּׁלָל
  english_pob_choice: from the spoil
  chosen_spanish: del botín
  alternatives_spanish:
  - del despojo
  - del saqueo
  lexicon: HALOT
  rationale: שָׁלָל es botín de guerra. «Botín» es natural en español bíblico y comunica el sentido bélico con claridad.
- source_word: צֹאן וּבָקָר
  english_pob_choice: sheep and cattle
  chosen_spanish: ovejas y ganado
  alternatives_spanish:
  - rebaños y vacas
  - ovejas y reses
  lexicon: HALOT
  rationale: La pareja nombra ganado menor y mayor. «Ovejas y ganado» mantiene la concreción y evita una generalización excesiva; «ganado» abarca el segundo término sin forzar una equivalencia demasiado estrecha.
- source_word: רֵאשִׁית הַחֵרֶם
  english_pob_choice: the best of what had been devoted to destruction
  chosen_spanish: lo mejor de lo que había sido dedicado a destrucción
  alternatives_spanish:
  - la primicia de lo consagrado al anatema
  - la primera parte de lo dedicado al exterminio
  lexicon: HALOT
  rationale: רֵאשִׁית aquí se entiende como la parte/lo mejor escogido, no simplemente «primera» en orden temporal. Se evita «anatema» por ser eclesiástico y opaco; «dedicado a destrucción» conserva la tensión teológica de חֵרֶם sin suavizarla.
- source_word: לִזְבֹּחַ
  english_pob_choice: to sacrifice
  chosen_spanish: para sacrificar
  alternatives_spanish:
  - para ofrecer sacrificio
  - para inmolar
  lexicon: HALOT
  rationale: El infinitivo de propósito se vierte naturalmente con «para sacrificar», manteniendo el sentido cultual del hebreo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé Dios
  - al Señor
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יהוה: «Yahvé» en el texto principal. Aquí el contexto no exige ocultar el nombre divino bajo «Señor».'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - su Dios
  - tu Dios, para Samuel
  lexicon: HALOT
  rationale: 'El sufijo de 2ms se conserva exactamente: Saúl le habla a Samuel con «tu Dios», preservando la distancia marcada por el hebreo.'
- source_word: בַּגִּלְגָּל
  english_pob_choice: at Gilgal
  chosen_spanish: en Gilgal
  alternatives_spanish:
  - en el Gilgal
  - allí en Gilgal
  lexicon: HALOT
  rationale: Como nombre propio de lugar, «en Gilgal» es la preposición más natural en español; no se pierde el valor locativo del hebreo.
theological_decisions:
- issue: Cómo verter חֵרֶם sin borrar su peso teológico
  english_pob_reading: what had been devoted to destruction
  chosen_spanish_reading: lo que había sido dedicado a destrucción
  alternative_spanish_readings:
  - lo consagrado al anatema
  - lo que estaba bajo el interdicto
  rationale: 'La frase debe seguir siendo chocante: no eran animales comunes sino bienes puestos bajo el juicio divino. «Dedicado a destrucción» conserva la gravedad del término y evita sustituirlo por una etiqueta eclesiástica que oscurezca el sentido.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
- issue: Representación del nombre divino יהוה
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto español usa «Yahvé» como forma principal para יהוה. Aquí no hay motivo contextual para enmascarar el nombre; además, el discurso directo mantiene el destinatario divino explícito.
  doctrine_reference: 'Project default: יהוה / YHWH -> "Yahvé" in the main Spanish text.'
translation_notes:
  revision_awareness: El borrador sigue de cerca la revisión inglesa más reciente, que quedó sin cambios y con alta concordancia textual. Se conserva la distinción clave entre «botín», «lo mejor» y «lo que había sido dedicado a destrucción», y se aplica el criterio del proyecto para el nombre divino con «Yahvé».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se conserva «tu Dios» para reflejar el sufijo de segunda persona singular de אֱלֹהֶיךָ.
  - «Dedicado a destrucción» se usa de forma consistente para חֵרֶם, evitando suavizaciones interpretativas.
  - «Botín» traduce el término militar del contexto sin introducir una lectura distinta.
