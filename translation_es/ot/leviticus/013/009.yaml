review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura casuística del hebreo: נגע צרעת ... והובא אל הכהן = una afección/lesión de lepra en alguien y luego ser llevado al sacerdote. Conserva adecuadamente «lepra» con nota explicativa para צָרַעַת, y «será llevado al sacerdote» reproduce bien el pasivo procedimental. Sin embargo, «en un hombre» no es la mejor solución en español para בְּאָדָם aquí: aunque el hebreo singular genérico puede ser masculino, en español bíblico y eclesial actual «persona»/«alguien» comunica mejor el valor genérico sin sonar excluyente ni innecesariamente marcado. Además, «afección de lepra» es comprensible, pero «infección de lepra» sería demasiado médico; una formulación más natural y fiel en español es «una lesión de lepra» o «una afección leprosa».'
  spanish_quality_summary: 'El texto es claro y digno, pero «afección de lepra» suena algo pesado y «en un hombre» resulta menos natural en español contemporáneo de amplia lectura eclesial. Una reparación mínima mejora fluidez y neutralidad genérica sin perder precisión: «Cuando una lesión de lepra[a] esté en una persona, será llevada al sacerdote» sería demasiado literal en el pasivo; mejor mantener el referente humano explícito: «Cuando una persona tenga una lesión de lepra[a], será llevada al sacerdote» no funciona por el cambio de sujeto. La opción más natural y cercana es «Cuando haya una lesión de lepra[a] en una persona, esta será llevada al sacerdote».'
  glossary_alignment: No hay términos del glosario mayor en juego salvo la consistencia con el tratamiento de צָרַעַת. El uso de «lepra» en el texto principal, acompañado de nota que aclare el alcance más amplio del hebreo, sí está alineado con la auditoría inglesa revisada. «Sacerdote» para כֹּהֵן también está bien. El punto a corregir es más de legibilidad y adecuación del genérico español que de glosario.
  issues:
  - severity: medium
    issue: «en un hombre» para בְּאָדָם suena innecesariamente marcado en español
    rationale: Aunque el hebreo usa אָדָם en singular genérico, el inglés auditado final eligió «person», y en español eclesial general «persona» comunica mejor el sentido genérico legal sin introducir una restricción masculina que el contexto no exige.
  - severity: low
    issue: «afección de lepra» es menos idiomático que una alternativa como «lesión de lepra»
    rationale: נֶגַע en Levítico 13 se refiere a una manifestación visible o lesión. «Afección» no es incorrecto, pero «lesión» encaja mejor con el examen sacerdotal de señales cutáneas y suena más natural junto con «lepra».
  revised_spanish_text: Cuando haya una lesión de lepra[a] en una persona, esta será llevada al sacerdote.
  revised_footnotes:
