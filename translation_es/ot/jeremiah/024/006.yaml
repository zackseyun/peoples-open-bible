translation:
  language: es
  text: Pondré mis ojos sobre ellos para bien[a], y los haré volver a esta tierra[b]. Los edificaré y no los derribaré[c]; los plantaré y no los desarraigaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para su bien».
    reason: lexical_alternative
  - marker: b
    text: O «los restituiré a esta tierra».
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo usa pares metafóricos de restauración: «edificar... no derribar» y «plantar... no desarraigar».'
    reason: cross_reference
lexical_decisions:
- source_word: וְשַׂמְתִּי עֵינִי עֲלֵיהֶם
  english_pob_choice: I will set my eyes on them
  chosen_spanish: Pondré mis ojos sobre ellos
  alternatives_spanish:
  - Los miraré
  - Mantendré mis ojos sobre ellos
  lexicon: HALOT
  rationale: Conservo la imagen idiomática de «poner los ojos sobre» para reflejar el hebreo sin volverlo más abstracto. «Sobre ellos» mantiene la dirección del gesto y sugiere atención intencional, no mera observación.
- source_word: לְטוֹבָה
  english_pob_choice: for good
  chosen_spanish: para bien
  alternatives_spanish:
  - para su bien
  - para bienestar
  lexicon: HALOT
  rationale: La expresión funciona como finalidad/resultadobenéfico. «Para bien» es breve, natural y preserva la amplitud del hebreo sin especificar indebidamente «su» bien, aunque el sentido lo implica.
- source_word: וַהֲשִׁבֹתִים
  english_pob_choice: I will bring them back
  chosen_spanish: los haré volver
  alternatives_spanish:
  - los traeré de regreso
  - los restauraré
  lexicon: HALOT
  rationale: El causativo de שוב comunica hacer que regresen. «Los haré volver» conserva el movimiento de retorno al territorio y evita reducir el verbo a una restauración más general.
- source_word: עַל הָאָרֶץ הַזֹּאת
  english_pob_choice: to this land
  chosen_spanish: a esta tierra
  alternatives_spanish:
  - a esta tierra misma
  - sobre esta tierra
  lexicon: HALOT
  rationale: En este contexto de retorno del exilio, el destino es territorial. «Tierra» expresa mejor el referente de Judá que «mundo» o «suelo», y «a» refleja la dirección del regreso.
- source_word: וּבְנִיתִים
  english_pob_choice: I will build them up
  chosen_spanish: Los edificaré
  alternatives_spanish:
  - Los construiré
  - Los reconstruiré
  lexicon: HALOT
  rationale: El verbo se usa metafóricamente para restauración del pueblo. «Edificar» es español bíblico claro y más directo que «construiré»; omito «arriba» porque el paralelismo posterior ya establece la antítesis con derribar.
- source_word: וְלֹא אֶהֱרֹס
  english_pob_choice: and not tear them down
  chosen_spanish: y no los derribaré
  alternatives_spanish:
  - y no los destruiré
  - y no los derrumbaré
  lexicon: HALOT
  rationale: «Derribar» conserva el par metafórico con «edificar» y evita volver la frase demasiado general. Mantiene la tensión literaria de construcción/destrucción sin perder naturalidad en español.
- source_word: וּנְטַעְתִּים
  english_pob_choice: I will plant them
  chosen_spanish: los plantaré
  alternatives_spanish:
  - los sembraré
  - los estableceré
  lexicon: HALOT
  rationale: Retengo la metáfora agrícola del texto. «Plantar» es la correspondencia más fiel y prepara el contraste con el verbo siguiente.
- source_word: וְלֹא אֶתּוֹשׁ
  english_pob_choice: and not uproot them
  chosen_spanish: y no los arrancaré
  alternatives_spanish:
  - y no los desarraigaré
  - y no los sacaré de raíz
  lexicon: HALOT
  rationale: El hebreo describe quitar de raíz. «Arrancar» comunica la acción con claridad y conserva la imagen vegetal mejor que un término más técnico o más largo.
theological_decisions:
- issue: Promesa de favor divino y retorno del exilio
  english_pob_reading: Render the verse as a concrete promise of benevolent divine attention and return from exile, preserving the paired metaphors of building/planting rather than interpreting them spiritually or ecclesiologically.
  chosen_spanish_reading: La versión presenta una promesa concreta de favor divino y retorno a la tierra, manteniendo las metáforas de edificación y plantación como imágenes del restablecimiento histórico del pueblo.
  alternative_spanish_readings:
  - Una promesa general de prosperidad
  - Una restauración solo espiritual
  rationale: El contexto inmediato trata de los exiliados y de su regreso a la tierra. Por eso conviene conservar la concreción histórica y territorial, sin espiritualizar ni eclesializar el pasaje más allá de lo que el texto exige.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El texto sigue de cerca la última revisión inglesa, que no introdujo cambios. Se mantiene la misma segmentación de imagen y el mismo equilibrio entre literalidad y fluidez, con adaptación natural al español.
  spanish_consistency_notes:
  - Se conserva «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece el tetragrámaton de forma explícita.
  - Se mantiene el paralelismo metafórico hebreo sin convertirlo en lenguaje técnico doctrinal.
  - «Tierra» se usa en sentido territorial concreto, coherente con el contexto del exilio y retorno.
