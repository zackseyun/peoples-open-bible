id: PHP.1.27
reference: Philippians 1:27
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Μόνον ἀξίως τοῦ εὐαγγελίου τοῦ Χριστοῦ πολιτεύεσθε, ἵνα εἴτε ἐλθὼν καὶ ἰδὼν ὑμᾶς εἴτε ἀπὼν ⸀ἀκούω τὰ περὶ ὑμῶν, ὅτι στήκετε ἐν ἑνὶ πνεύματι, μιᾷ ψυχῇ συναθλοῦντες τῇ πίστει τοῦ εὐαγγελίου,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/027.yaml
  text: Only conduct yourselves in a manner worthy of the gospel of Messiah, so that whether I come and see you or am absent, I may hear about you that you are standing firm in one spirit, with one soul striving together for the faith of the gospel,
translation:
  language: ko
  text: 오직 메시아의 복음에 합당한 시민으로 살아가십시오[a]. 그리하여 내가 가서 여러분을 보든지 떠나 있든지, 여러분에 관한 일을 들을 때에, 여러분이 한 영[b] 안에서 굳게 서서, 한 마음[c]으로 복음의 믿음[d]을 위하여 함께 분투하고 있음을 듣게 되기를 바랍니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「행동하십시오」 또는 「살아가십시오」. 헬라어 πολιτεύεσθε는 「시민으로 살다」의 문자적 의미를 가지며, 로마 식민 도시 빌립보에서 특히 의미가 깊다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「한 성령」. 28절의 「한 마음」과의 대응을 고려해 본문은 소문자 「영」으로 옮기되, 성령에 대한 함의도 가능하다.
    reason: alternative_reading
  - marker: c
    text: 문자적으로 「한 혼으로」. 헬라어 μιᾷ ψυχῇ는 「한 영」과 짝을 이루는 표현이다.
    reason: lexical_alternative
  - marker: d
    text: 또는 「복음에 대한 믿음」 또는 「복음의 신앙」. 헬라어 속격은 다중 의미를 허용한다.
    reason: alternative_reading
lexical_decisions:
- source_word: Μόνον
  english_pob_choice: Only
  chosen_korean: 오직
  alternatives_korean:
  - 다만
  - 오직 한 가지
  lexicon: BDAG
  rationale: 강조 도입의 「오직」을 통해 바울의 단일 명령의 무게를 살린다.
- source_word: ἀξίως
  english_pob_choice: in a manner worthy of
  chosen_korean: ~에 합당한
  alternatives_korean:
  - ~에 합당하게
  - ~을 따라
  lexicon: BDAG
  rationale: 「~에 합당한 시민으로 살아가십시오」 구조가 한국어 어순으로 자연스럽고 윤리적 무게를 담는다.
- source_word: πολιτεύεσθε
  english_pob_choice: conduct yourselves
  chosen_korean: 시민으로 살아가십시오
  alternatives_korean:
  - 행동하십시오
  - 살아가십시오
  lexicon: BDAG
  rationale: πολιτεύομαι는 「시민으로 살다」의 문자적 의미를 가지며, 로마 식민 도시 빌립보 문맥에서 그 시민적 어감이 중요하다. 영어 POB는 「conduct yourselves」로 일반화했으나, 한국어 「시민으로 살아가십시오」는 그 시민적 함의를 살리면서 자연스럽다. 「행동하십시오」는 각주로 둔다.
- source_word: εὐαγγελίου
  english_pob_choice: gospel
  chosen_korean: 복음
  lexicon: BDAG
  rationale: 「복음」이 정착된 한국어 등가어이다.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 본 번역의 원칙에 따라 칭호 Χριστός를 「메시아」로 옮긴다.
- source_word: ἀκούω τὰ περὶ ὑμῶν
  english_pob_choice: I may hear about you
  chosen_korean: 여러분에 관한 일을 들을 때에
  alternatives_korean:
  - 여러분의 소식을 들을 때
  - 여러분의 형편을 들을 때
  lexicon: BDAG
  rationale: τὰ περὶ ὑμῶν의 내용 함의를 「여러분에 관한 일」로 자연스럽게 옮긴다.
- source_word: στήκετε
  english_pob_choice: are standing firm
  chosen_korean: 굳게 서서
  alternatives_korean:
  - 굳게 선다
  - 견고히 선다
  lexicon: BDAG
  rationale: στήκω의 견고한 자세를 「굳게 서다」로 자연스럽게 옮긴다.
- source_word: ἐν ἑνὶ πνεύματι
  english_pob_choice: in one spirit
  chosen_korean: 한 영 안에서
  alternatives_korean:
  - 한 성령 안에서
  - 한 마음으로
  lexicon: BDAG
  rationale: 「한 마음(μιᾷ ψυχῇ)」과의 대응 구조를 고려할 때, 「한 영」이 공동체적 일치의 함의를 살린다. 성령에 대한 함의는 각주로 보존한다.
- source_word: μιᾷ ψυχῇ
  english_pob_choice: with one soul
  chosen_korean: 한 마음
  alternatives_korean:
  - 한 혼으로
  - 한뜻으로
  lexicon: BDAG
  rationale: ψυχή의 문자적 「혼」은 한국어 어법에서 「마음」으로 자연스럽게 옮기되, 「혼」 가능성은 각주로 둔다.
- source_word: συναθλοῦντες
  english_pob_choice: striving together
  chosen_korean: 함께 분투하고
  alternatives_korean:
  - 함께 싸우고
  - 나란히 겨루고
  lexicon: BDAG
  rationale: συναθλέω의 공동 분투의 운동 경기 비유를 「함께 분투하다」가 자연스럽게 담는다.
- source_word: τῇ πίστει τοῦ εὐαγγελίου
  english_pob_choice: for the faith of the gospel
  chosen_korean: 복음의 믿음을 위하여
  alternatives_korean:
  - 복음에 대한 믿음을 위하여
  - 복음의 신앙을 위하여
  lexicon: BDAG
  rationale: 헬라어 속격의 모호성을 그대로 보존하기 위해 「복음의 믿음」으로 직역하고 가능성을 각주로 둔다.
theological_decisions:
- issue: πνεύματι가 성령을 가리키는지 공동의 인간 영을 가리키는지
  chosen_reading: 한 영 안에서 (소문자, 공동체적 일치)
  alternative_readings:
  - 한 성령 안에서
  rationale: 「한 마음(μιᾷ ψυχῇ)」과의 즉각적 병치가 신자들 간의 공동된 결의를 가리키는 해석을 우선시한다. 성령에 대한 울림은 각주로 보존한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
