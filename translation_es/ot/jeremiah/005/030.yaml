translation:
  language: es
  text: Algo espantoso y horrendo ha sucedido en la tierra.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Un horror y algo chocante ha sucedido en la tierra».'
