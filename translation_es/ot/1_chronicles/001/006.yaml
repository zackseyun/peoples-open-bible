lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Ahora bien, los hijos de
  - Y los descendientes de
  lexicon: HALOT
  rationale: En una genealogía, בְּנֵי se refiere de forma directa a los miembros varones del linaje; en español, "hijos de" conserva la fórmula genealógica y la estructura acumulativa del listado, sin ampliar indebidamente a "descendientes".
- source_word: גֹּמֶר
  english_pob_choice: Gomer
  chosen_spanish: Gomer
  alternatives_spanish:
  - Gómer
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se mantiene la forma ya reconocible en español bíblico, sin intentar traducirlo.
- source_word: אַשְׁכֲּנַז
  english_pob_choice: Ashkenaz
  chosen_spanish: Ashkenaz
  alternatives_spanish:
  - Askenaz
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la forma usada en la tradición de transliteración, ya que el texto fuente no aporta una equivalencia semántica para traducir.
- source_word: דִיפַת
  english_pob_choice: Diphath
  chosen_spanish: Diphath
  alternatives_spanish:
  - Riphath
  lexicon: HALOT
  rationale: Se sigue el texto hebreo de Crónicas, que lee דִיפַת. La alternativa "Riphath" pertenece al pasaje paralelo de Génesis 10:3, no a este versículo.
- source_word: תוֹגַרְמָה
  english_pob_choice: Togarmah
  chosen_spanish: Togarmah
  alternatives_spanish:
  - Togarmá
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se mantiene la forma estándar y no se añade acentuación española a un nombre bíblico transliterado.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo masorético de 1 Crónicas 1:6 y coincide con el audit trail inglés: la única decisión textual relevante es conservar «Diphath» en el cuerpo principal y señalar en nota el paralelo con Génesis 10:3 que presenta «Riphath».'
  spanish_consistency_notes:
  - Se evitó "señor" o equivalentes no pertinentes, porque el versículo es una lista genealógica sin léxico teológico.
  - Se mantuvieron los nombres propios en transliteración consistente con el proyecto.
  - La puntuación con dos puntos reproduce bien la apertura genealógica del hebreo y facilita la lectura en español.
