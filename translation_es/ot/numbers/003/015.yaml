translation:
  language: es
  text: Cuenta a los hijos de Leví[a], por su casa paterna, por sus clanes; contarás a todo varón de un mes de edad en adelante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los levitas» para «los hijos de Leví». El hebreo dice literalmente «hijos de Leví», destacando la descendencia y la estructura de clan.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּקֹד / תִּפְקְדֵם
  english_pob_choice: count / you shall count
  chosen_spanish: Cuenta / contarás
  alternatives_spanish:
  - haz un censo de / harás un censo de
  - numera / numerás
  - registra / registrarás
  lexicon: HALOT
  rationale: El contexto administrativo exige un verbo de enumeración; «contar» conserva la fuerza de mandato inicial y la repetición final sin introducir matiz militar. «Hacer un censo» sería comprensible, pero añade una formulación más interpretativa que el hebreo breve no requiere.
- source_word: בְּנֵי לֵוִי
  english_pob_choice: the sons of Levi
  chosen_spanish: los hijos de Leví
  alternatives_spanish:
  - los levitas
  - los descendientes de Leví
  lexicon: HALOT
  rationale: La forma literal mantiene el énfasis genealógico del hebreo y la estructura de parentesco que el versículo desarrolla enseguida. «Levitas» es posible, pero suaviza esa formulación explícita.
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers' houses
  chosen_spanish: por sus casas paternas
  alternatives_spanish:
  - según sus casas ancestrales
  - por sus casas de familia
  lexicon: HALOT
  rationale: «Casas paternas» conserva la imagen hebrea de unidad doméstica/patrilineal y su relación con la organización tribal. Es más transparente que reemplazarla por un término genérico de familia.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus linajes
  lexicon: HALOT
  rationale: «Clan» distingue mejor מִשְׁפָּחָה de «casas paternas» y refleja una subdivisión de parentesco. «Familias» podría duplicar la idea anterior y perder precisión.
- source_word: כָּל זָכָר
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - todo macho
  - todo hombre
  lexicon: HALOT
  rationale: «Varón» conserva la referencia sexual del hebreo sin desplazarla a edad adulta, lo cual sería inexacto porque el versículo incluye a los de un mes de edad. «Hombre» sería menos preciso.
- source_word: מִבֶּן חֹדֶשׁ וָמַעְלָה
  english_pob_choice: from a month old and upward
  chosen_spanish: desde un mes de edad en adelante
  alternatives_spanish:
  - desde un mes y más
  - a partir de un mes de edad
  lexicon: HALOT
  rationale: La expresión idiomática se vuelve natural en español con «desde un mes de edad en adelante», preservando el umbral mínimo de edad sin perder claridad.
theological_decisions:
- issue: Traducción de בְּנֵי לֵוִי como categoría genealógica y no solo étnica/funcional
  english_pob_reading: The sons of Levi; the Hebrew is literally 'sons of Levi,' emphasizing descent and clan structure.
  chosen_spanish_reading: los hijos de Leví, con énfasis en descendencia y estructura de clan
  alternative_spanish_readings:
  - los levitas
  - la tribu de Leví
  rationale: La formulación literal conserva la tensión documental entre designación genealógica y función tribal. «Levitas» podría ser válida, pero reduce la transparencia del hebreo al nivel de etiqueta institucional.
  doctrine_reference: Torá / organización tribal de Israel
translation_notes:
  revision_awareness: El texto sigue el consenso alto del audit trail inglés sin cambios sustantivos; se conservó la literalidad genealógica y administrativa, y se ajustó el español para una lectura natural y pública.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo donde el texto no lo requiere; aquí no aparece el Tetragrámaton.
  - Se prefirió «varón» sobre «hombre» para reflejar el hebreo זָכָר sin implicar adultez.
  - «Casas paternas» y «clanes» se mantuvieron distintos para no fusionar dos niveles de parentesco diferentes.
  - La nota al pie está anclada únicamente en «hijos de Leví» para reproducir la alternativa léxica documentada.
