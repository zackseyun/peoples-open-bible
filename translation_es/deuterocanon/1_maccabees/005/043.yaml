translation:
  language: es
  text: Y cruzó primero hacia ellos[a], y todo su pueblo iba delante de él; y todas las naciones fueron aplastadas delante de él, y arrojaron todas sus armas y huyeron al santuario[b] en Carnain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra ellos»; el griego πρὸς αὐτούς puede ser direccional («hacia ellos») o, por el contexto de combate, hostil («contra ellos»).
    reason: lexical_alternative
  - marker: b
    text: O «recinto sagrado» o «templo»; τέμενος designa un espacio consagrado, un santuario o recinto sagrado.
    reason: lexical_alternative
lexical_decisions:
- source_word: διεπέρασεν
  english_pob_choice: crossed over
  chosen_spanish: pasó
  alternatives_spanish:
  - cruzó
  - atravesó
  lexicon: LSJ
  rationale: El verbo griego indica un desplazamiento de un lado a otro. En español, «pasó» es natural y suficientemente amplio; «cruzó» sería posible, pero «pasó hacia ellos» mantiene el movimiento sin añadir una imagen más marcada de travesía.
- source_word: πρὸς αὐτοὺς
  english_pob_choice: to them
  chosen_spanish: hacia ellos
  alternatives_spanish:
  - contra ellos
  - a ellos
  lexicon: LSJ
  rationale: Como πρός con acusativo puede ser direccional o hostil, «hacia ellos» conserva el sentido de dirección sin resolver de antemano la fuerza bélica; el contexto militar ya aporta la hostilidad implícita.
- source_word: πρότερον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - antes
  - de antemano
  lexicon: LSJ
  rationale: «Primero» reproduce con naturalidad la idea de ir delante de los demás y evita una lectura temporal menos precisa.
- source_word: πᾶς ὁ λαὸς αὐτοῦ
  english_pob_choice: all his people
  chosen_spanish: todo su pueblo
  alternatives_spanish:
  - toda su gente
  - todo su ejército
  - todos sus hombres
  lexicon: LSJ
  rationale: λαός es literalmente «pueblo». En este contexto militar puede referirse a la fuerza que lo acompaña, pero «todo su pueblo» conserva el término base sin estrecharlo indebidamente a «ejército».
- source_word: ἔμπροσθεν αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en frente de él
  lexicon: LSJ
  rationale: «Delante de él» es la equivalencia más natural en español actual para la relación espacial expresada por ἔμπροσθεν.
- source_word: συνετρίβησαν
  english_pob_choice: were crushed
  chosen_spanish: fueron aplastadas
  alternatives_spanish:
  - fueron quebrantadas
  - fueron destrozadas
  - fueron quebradas
  lexicon: LSJ
  rationale: El pasivo griego comunica derrota decisiva. «Fueron aplastadas» conserva la fuerza imagética de ser quebradas/deshechas, con buena claridad en español; se usa femenino plural por concordancia con «las naciones».
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - todos los gentiles
  lexicon: LSJ
  rationale: ἔθνη suele designar pueblos no judíos en 1 Macabeos. «Naciones» mantiene el alcance amplio y evita introducir una carga religiosa no explicitada aquí.
- source_word: ἔρριψαν
  english_pob_choice: threw down
  chosen_spanish: arrojaron
  alternatives_spanish:
  - tiraron
  - desecharon
  - echaron
  lexicon: LSJ
  rationale: El verbo expresa abandono violento o apresurado. «Arrojaron» comunica con fuerza que soltaron sus armas en la huida.
- source_word: τὰ ὅπλα
  english_pob_choice: weapons
  chosen_spanish: las armas
  alternatives_spanish:
  - las armas de guerra
  - sus armas
  - los armamentos
  lexicon: LSJ
  rationale: En español bíblico y moderno, «armas» es la forma más directa de ὅπλα en un contexto bélico, y sigue de cerca la imagen del original.
- source_word: τέμενος
  english_pob_choice: sanctuary
  chosen_spanish: santuario
  alternatives_spanish:
  - recinto sagrado
  - templo
  - sacro recinto
  lexicon: LSJ
  rationale: τέμενος denota un recinto sagrado o santuario. «Santuario» es claro y reverente en español; aunque «recinto sagrado» también sería fiel, suena más técnico y menos fluido.
- source_word: ἐν Καρναΐν
  english_pob_choice: at Carnain
  chosen_spanish: de Carnain
  alternatives_spanish:
  - en Carnain
  - a Carnain
  - en Karnaim
  lexicon: LSJ
  rationale: El griego sitúa el santuario dentro del lugar llamado Carnain. En español, «de Carnain» funciona como complemento de pertenencia/localización ligado a «santuario» y evita una redundancia torpe con «en» tras «santuario».
theological_decisions:
- issue: Valor de ἔθνη en un contexto de guerra de 1 Macabeos
  english_pob_reading: all the nations
  chosen_spanish_reading: todas las naciones
  alternative_spanish_readings:
  - todos los pueblos
  - todos los gentiles
  rationale: No se impone aquí el sentido técnico-teológico de «gentiles» porque el versículo describe a los enemigos derrotados como colectivos políticos/étnicos. «Naciones» conserva la amplitud del griego y el tono narrativo.
  doctrine_reference: Uso contextual de ἔθνη en literatura deuterocanónica/histórica; evitar sobredeterminación confesional.
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete (1909) y el auditor de inglés POB sin cambios textuales relevantes; se mantuvo la ambigüedad de πρὸς αὐτούς y τέμενος mediante notas alternativas, y se tradujo ἔθνη por «naciones» para conservar el valor amplio del original.
  spanish_consistency_notes:
  - Se conservó «Carnain» como transliteración del topónimo, en coherencia con el paquete fuente.
  - Se prefirió «Santuario» para τέμενος por claridad y solemnidad, sin borrar la alternativa de «recinto sagrado».
  - Se mantuvo el tono narrativo directo y bélico del original, evitando una paráfrasis interpretativa.
