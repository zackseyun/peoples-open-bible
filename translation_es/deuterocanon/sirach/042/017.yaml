translation:
  language: es
  text: Los santos de Dios no fueron suficientes para relatar[a] las maravillas de Yahvé.[b] Dios ha fortalecido sus huestes para estar firmes delante de su gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo principal dice 'no fueron suficientes', mientras que otro testigo sugiere un sentido de 'no comprendieron'; el griego apoya la idea de que no pudieron relatar plenamente.
    reason: textual_variant
  - marker: b
    text: 'La segunda cláusula varía en los testigos hebreos: el texto de la Geniza de El Cairo dice ''Dios ha fortalecido sus huestes'', mientras que Masada parece leer ''el Señor ha fortalecido en sus lumbreras/luces''; el griego dice ''lo que el Señor Todopoderoso estableció, para que el todo quedara firme en su gloria''.'
    reason: textual_variant
lexical_decisions:
- source_word: לא הספיקו / ἐνεποίησεν ... ἐκδιηγήσασθαι
  english_pob_choice: have not been sufficient / to recount
  chosen_spanish: no fueron suficientes para relatar
  alternatives_spanish:
  - no pudieron relatar
  - no alcanzaron a narrar
  - no fueron capaces de contar
  lexicon: HALOT; Greek ἐκδιηγήσασθαι
  rationale: La idea principal en los testigos hebreos y en el griego es insuficiencia para expresar plenamente, no falta de comprensión. 'No fueron suficientes para relatar' conserva esa insuficiencia con tono elevado y natural en español.
- source_word: קדושי אל
  english_pob_choice: the holy ones of God
  chosen_spanish: los santos de Dios
  alternatives_spanish:
  - los santos de Dios
  - los seres santos de Dios
  - los santos de Dios
  lexicon: HALOT
  rationale: '''Santos'' comunica bien קדושים en español bíblico y evita la rigidez de un calco. Se mantiene ''de Dios'' para conservar la referencia del hebreo y del contexto celestial.'
- source_word: נפלאות ה'
  english_pob_choice: the wonders of the Lord
  chosen_spanish: las maravillas del Señor
  alternatives_spanish:
  - las maravillas del Señor
  - las obras maravillosas del Señor
  - los prodigios del Señor
  lexicon: HALOT
  rationale: '''Maravillas'' expresa adecuadamente נפלאות con registro bíblico y fluidez natural. ''Señor'' aquí traduce el título divino del hebreo y del griego, siguiendo el audit trail inglés.'
- source_word: אמץ אלהים / אמץ אדני
  english_pob_choice: God has strengthened
  chosen_spanish: Dios ha fortalecido
  alternatives_spanish:
  - Dios ha hecho fuertes
  - Dios ha robustecido
  - el Señor ha fortalecido
  lexicon: HALOT
  rationale: El verbo אמץ se rinde con 'fortalecer' para conservar la idea de hacer fuerte/firmar. Se elige 'Dios' en la segunda cláusula porque el testigo hebreo principal lee אלהים, aunque el griego use κύριος.
- source_word: צבאיו
  english_pob_choice: his hosts
  chosen_spanish: sus ejércitos
  alternatives_spanish:
  - sus huestes
  - sus ejércitos
  - sus hosts
  lexicon: HALOT
  rationale: '''Ejércitos'' es la opción más transparente para lectores modernos en español; ''huestes'' puede sonar más arcaico, y ''hosts'' no es idiomático. El contexto permite una referencia amplia a las fuerzas de Dios.'
- source_word: להתחזק לפני כבודו
  english_pob_choice: to be strong before his glory
  chosen_spanish: para estar firmes delante de su gloria
  alternatives_spanish:
  - para fortalecerse delante de su gloria
  - para mantenerse firmes ante su gloria
  - para ser fuertes delante de su gloria
  lexicon: HALOT
  rationale: El reflexivo de חזק y el griego στηριχθῆναι apuntan a firmeza/estabilidad. 'Estar firmes' preserva esa idea sin convertirla en una mera autoayuda, y 'delante de su gloria' refleja el hebreo y el griego con naturalidad.
theological_decisions:
- issue: Títulos divinos variables entre los testigos (ה׳ / אלהים / κύριος)
  english_pob_reading: The Lord ... God ... Lord Almighty in the witness notes, with the main line using 'the Lord' and 'God'
  chosen_spanish_reading: el Señor ... Dios
  alternative_spanish_readings:
  - el Señor ... el Señor
  - Dios ... Dios
  rationale: Se conserva la distinción del hebreo principal entre ה׳ y אלהים, tal como hace el inglés auditado, sin ocultar la variación textual. El título 'Señor' se usa en la primera cláusula y 'Dios' en la segunda para reflejar la fuente hebrea y mantener el paralelismo.
  doctrine_reference: 'DOCTRINE.md: translate titles; preserve textual variation; avoid masking YHWH unless required by source'
translation_notes:
  revision_awareness: 'Este borrador sigue la línea revisada del audit trail inglés, prefiriendo una formulación de insuficiencia (''no fueron suficientes'') y una expresión de firmeza (''estar firmes'') alineadas con el hebreo principal y el apoyo griego. Se evita traducir mecánicamente desde el inglés: ''relatar'' y ''estar firmes delante de su gloria'' se eligieron por correspondencia semántica directa con לספר y להתחזק / στηριχθῆναι.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico formal y legible para lectores hispanohablantes.
  - '''Señor'' y ''Dios'' se distinguen según la variación del hebreo principal, sin ocultar el dato textual.'
  - No se introduce 'Cristo', 'SEÑOR' en mayúsculas, ni terminología eclesiástica ajena al verso.
  - '''Santos de Dios'' conserva el tono del original y la amplitud semántica de קדושי אל.'
