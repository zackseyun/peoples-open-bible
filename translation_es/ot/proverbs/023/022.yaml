base_translation:
  language: en
  yaml_path: translation/ot/proverbs/023/022.yaml
  text: Listen to your father[a], who fathered you[b], and do not despise your mother when she is old.
  footnotes:
  - marker: a
    text: Or 'Hear your father, this one who begot you.' The Hebrew uses a demonstrative ('this one') after 'your father' for emphasis, which is rendered idiomatically in English as 'who.'
    reason: lexical_alternative
  - marker: b
    text: Or 'when she has grown old.' The Hebrew perfect verb can emphasize the resulting state of old age.
    reason: lexical_alternative
