source:
  edition: SBLGNT
  text: Καὶ λέγει μοι· Μὴ σφραγίσῃς τοὺς λόγους τῆς προφητείας τοῦ βιβλίου τούτου, ὁ καιρὸς γὰρ ἐγγύς ἐστιν.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/022/010.yaml
  text: And he says to me[a], “Do not seal up the words of the prophecy of this book[c][b], for the time is near.”
  footnotes:
  - marker: a
    text: Or “Do not seal” or “Do not keep secret”; the phrase echoes prophetic language about whether a revelation is closed up or left open.
    reason: lexical_alternative
  - marker: b
    text: Or “for the appointed time is near.” Greek καιρός can mean a decisive or appointed time.
    reason: lexical_alternative
  - marker: c
    text: 'Compare Daniel 12:4, where the prophecy is told to be sealed; here the command is the opposite.'
    reason: cross_reference
translation:
  language: ko
  text: '그리고 그가 나에게 말하였습니다. 「이 책의 예언의 말씀을 인봉하지 마시오. 그 때가 가깝기 때문이오.'
  philosophy: optimal-equivalence
