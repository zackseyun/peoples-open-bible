base_translation:
  language: en
  yaml_path: translation/ot/joshua/002/001.yaml
  text: Then Joshua son of Nun sent two men secretly from Shittim as spies[a], saying, “Go, see the land and Jericho.” So they went and came to the house of a prostitute whose name was Rahab[c][b], and they lay down there.
  footnotes:
  - marker: a
    text: Or “the land and Jericho.” The Hebrew can be read as naming both the land generally and Jericho specifically.
    reason: lexical_alternative
  - marker: b
    text: Or “the house of an innkeeper.” Some have argued this from context or later tradition, but the Hebrew word ordinarily means “prostitute.”
    reason: alternative_reading
  - marker: c
    text: Or “they lodged there.” The Hebrew literally says “they lay down there.”
    reason: lexical_alternative
