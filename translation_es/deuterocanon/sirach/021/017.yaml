translation:
  language: es
  text: La boca del hombre sabio será buscada en la asamblea[a], y meditarán sus palabras en el corazón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la congregación».'
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «en corazón»; el español puede expresarlo naturalmente como singular colectivo, refiriéndose a la reflexión interior de quienes escuchan.
    reason: lexical_alternative
lexical_decisions:
- source_word: στόμα
  english_pob_choice: mouth
  chosen_spanish: boca
  alternatives_spanish:
  - labios
  - palabra
  lexicon: LSJ
  rationale: Conserva la imagen concreta del órgano de la habla, como en el inglés POB, sin desplazarse a un término más abstracto como «palabra».
- source_word: φρονίμου
  english_pob_choice: of a wise man
  chosen_spanish: del hombre sabio
  alternatives_spanish:
  - de la persona sabia
  - del prudente
  lexicon: LSJ
  rationale: El adjetivo masculino singular se mantiene con valor sustantivo; «sabio» es la equivalencia más natural en español y «hombre» preserva el matiz gramatical del griego, como en el POB inglés.
- source_word: ζητηθήσεται
  english_pob_choice: will be sought
  chosen_spanish: será buscada
  alternatives_spanish:
  - será buscada con interés
  - será buscada de nuevo
  lexicon: LSJ
  rationale: La pasiva futura de ζητέω se rinde de forma directa. «Será buscada» mantiene la fuerza formal sin añadir interpretación.
- source_word: ἐν ἐκκλησίᾳ
  english_pob_choice: in the assembly
  chosen_spanish: en la asamblea
  alternatives_spanish:
  - en la congregación
  - en la reunión
  lexicon: LSJ
  rationale: En Sirácida, ἐκκλησία designa la reunión comunitaria; «asamblea» evita una lectura eclesiástica posterior y sigue la decisión auditada del POB inglés.
- source_word: λόγους
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - sentencias
  lexicon: LSJ
  rationale: «Palabras» es el equivalente amplio y natural para λόγοι en este contexto sapiencial.
- source_word: διανοηθήσεται
  english_pob_choice: will ponder
  chosen_spanish: serán meditadas
  alternatives_spanish:
  - serán ponderadas
  - serán consideradas
  lexicon: LSJ
  rationale: El medio futuro expresa consideración reflexiva. En español, «meditadas» comunica bien esa ponderación interior sin perder el carácter contemplativo.
- source_word: ἐν καρδίᾳ
  english_pob_choice: in their hearts
  chosen_spanish: en el corazón
  alternatives_spanish:
  - en sus corazones
  - en la mente
  lexicon: LSJ
  rationale: Aunque el griego carece de posesivo explícito, el singular colectivo «en el corazón» suena natural en español y conserva la antropología bíblica del interior humano; el plural se puede sobreentender por el contexto comunitario.
theological_decisions:
- issue: Rendering of ἐκκλησία in a sapiential/deuterocanonical context
  english_pob_reading: assembly
  chosen_spanish_reading: asamblea
  alternative_spanish_readings:
  - congregación
  - iglesia
  rationale: «Asamblea» mantiene el sentido comunitario inmediato sin introducir una carga eclesiológica posterior que el contexto no exige.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
- issue: Gendered rendering of φρονίμου
  english_pob_reading: wise man
  chosen_spanish_reading: hombre sabio
  alternative_spanish_readings:
  - persona sabia
  - sabio
  rationale: Se conserva el masculino singular del griego sustantivado, en línea con la política de exactitud gramatical reflejada en el POB inglés, sin oscurecer la inteligibilidad en español.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El testimonio inglés revisó la concordancia de «their heart(s)» para hacerla natural con el sujeto plural implícito. En español, la frase puede leerse naturalmente con singular colectivo («en el corazón»), sin perder el sentido comunitario de la meditación interior.
  spanish_consistency_notes:
  - Se mantuvo «asamblea» para ἐκκλησία, coherente con la decisión auditada del POB inglés de evitar «iglesia» como carga institucional posterior.
  - Se prefirió «boca» para στόμα, conservando la imagen concreta del texto griego.
  - Se usó «meditadas» para διανοηθήσεται, para reflejar reflexión interior sin volver la frase demasiado técnica.
  - Se evitó «SEÑOR» u otras convenciones no presentes en el pasaje, conforme al texto fuente.
