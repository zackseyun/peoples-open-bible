  glossary_alignment: No hay términos teológicos del glosario mayor en este versículo. La conservación de «trirremes» respeta la especificidad histórica documentada. «A causa de» y «circunstancias presentes» concuerdan con las decisiones léxicas auditadas. Se recomienda «preparación» como equivalente español más natural para κατασκευάς en este contexto, aunque «apresto» no es incorrecto.
