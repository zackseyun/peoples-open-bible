translation:
  language: es
  text: Y el rey escribió a todo su reino que todos llegaran a ser un solo pueblo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a todo su reino entero» o «por todo su reino». La expresión griega señala el alcance completo del dominio del rey como destinatario de la orden.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que todos fueran un solo pueblo». El griego puede traducirse más literalmente con «ser», pero «llegaran a ser» subraya mejor el impulso de asimilación del mandato.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - redactó
  - envió por escrito
  lexicon: LSJ
  rationale: El aoristo de γράφω se expresa de manera directa como «escribió». En español mantiene el verbo básico sin añadir más contenido del que ofrece el griego, aunque el contexto sea de orden real.
- source_word: πάσῃ τὴν βασιλεία αὐτοῦ
  english_pob_choice: to all his kingdom
  chosen_spanish: a todo su reino
  alternatives_spanish:
  - a todo su reino entero
  - a través de todo su reino
  lexicon: LSJ
  rationale: La frase indica el alcance total del ámbito real destinatario del escrito. «A todo su reino» conserva la amplitud de la orden y suena natural en español.
- source_word: εἶναι πάντας
  english_pob_choice: that all should become
  chosen_spanish: que todos llegaran a ser
  alternatives_spanish:
  - que todos fueran
  - que todos debieran ser
  lexicon: LSJ
  rationale: El infinitivo con valor de contenido comunica la orden del rey. «Llegaran a ser» reproduce mejor el matiz de cambio o asimilación que la POB ya destacó con «become».
- source_word: εἰς λαὸν ἕνα
  english_pob_choice: one people
  chosen_spanish: un solo pueblo
  alternatives_spanish:
  - un solo pueblo y nación
  - un pueblo único
  lexicon: LSJ
  rationale: λαός aquí nombra un cuerpo social o político; «pueblo» es el equivalente más natural y fiel. «Un solo» hace explícita la unidad impuesta por la política de asimilación, sin introducir «nación» como si fuera el matiz principal.
theological_decisions:
- issue: Lenguaje de unificación política en λαός
  english_pob_reading: one people
  chosen_spanish_reading: un solo pueblo
  alternative_spanish_readings:
  - una sola nación
  - un pueblo único
  rationale: El verso describe una política imperial de homogenización, no una afirmación doctrinal sobre el pueblo de Dios. «Pueblo» conserva el sentido social-político de λαός sin cargar el texto con resonancias posteriores innecesarias.
  doctrine_reference: Principio de sentido llano histórico-literario; evitar importaciones teológicas no presentes en el contexto.
translation_notes:
  revision_awareness: 'Sin cambios respecto al testimonio griego y al aparato inglés: la versión inglesa ya optó por un valor dinámico leve en εἶναι πάντας («become»), y la redacción española lo refleja con «llegaran a ser» sin alterar el alcance total de πάσῃ τὴν βασιλεία αὐτοῦ ni el sentido político de λαὸν ἕνα.'
  spanish_consistency_notes:
  - Se usa «rey» y no «monarca» para mantener correspondencia directa con ὁ βασιλεὺς.
  - Se evita «SEÑOR» u otra terminología teológica, porque el versículo no contiene el nombre divino ni una cita de κύριος.
  - «Pueblo» conserva el valor colectivo de λαός sin desplazarse a «nación», que podría sonar más moderno y menos ajustado al griego.
