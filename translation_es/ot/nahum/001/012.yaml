base_translation:
  language: en
  yaml_path: translation/ot/nahum/001/012.yaml
  text: 'Thus says Yahweh: Though they are at full strength and likewise many[a], even so they will be cut down and pass away. Though I have afflicted you[b], I will afflict you no more.'
  footnotes:
  - marker: a
    text: Or 'Though they are at peace and many, even so they will be cut off.' The Hebrew of this clause is compact and difficult, and several English renderings are possible.
    reason: alternative_reading
  - marker: b
    text: The 'you' is feminine singular in Hebrew, likely referring to Zion or Judah personified as a woman.
    reason: cultural_note
