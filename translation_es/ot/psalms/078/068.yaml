translation:
  language: es
  text: Pero escogió la tribu de Judá y el monte Sion, que amó[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «escogió la tribu de Judá, el monte Sion que amó». El hebreo usa un solo verbo con dos objetos directos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְחַר
  english_pob_choice: But he chose
  chosen_spanish: Pero escogió
  alternatives_spanish:
  - Y escogió
  - Entonces escogió
  lexicon: HALOT
  rationale: El verbo hebreo expresa la acción de escoger; en español, «escogió» conserva bien ese valor. «Pero» comunica la contraposición con el contexto inmediato, como hace el inglés POB con «But».
- source_word: שֵׁבֶט יְהוּדָה
  english_pob_choice: the tribe of Judah
  chosen_spanish: la tribu de Judá
  alternatives_spanish:
  - la vara de Judá
  - Judá
  lexicon: HALOT
  rationale: En contexto tribal israelita, שֵׁבֶט significa «tribu». «La tribu de Judá» es la forma natural y fiel en español.
- source_word: הַר צִיּוֹן
  english_pob_choice: Mount Zion
  chosen_spanish: el monte Sion
  alternatives_spanish:
  - el monte de Sion
  - Monte Sion
  lexicon: HALOT
  rationale: El hebreo nombra el lugar con el sustantivo común «monte» más el topónimo «Sion». «El monte Sion» conserva la estructura y suena natural en español.
- source_word: אֲשֶׁר אָהֵב
  english_pob_choice: which he loved
  chosen_spanish: que amó
  alternatives_spanish:
  - que amaba
  - a quien amó
  lexicon: HALOT
  rationale: El relativo se entiende más naturalmente como referido a «el monte Sion». «Que amó» sigue el valor simple del hebreo sin añadir matices no explícitos.
- source_word: אֶת ... אֶת
  english_pob_choice: marked by direct objects without repeating a verb in English
  chosen_spanish: un solo verbo con dos complementos directos, sin repetir «escogió»
  alternatives_spanish:
  - dos actos separados de elección
  - una coordinación más explícita
  lexicon: Hebrew grammar
  rationale: El hebreo presenta un solo verbo con dos objetos directos. El español puede reflejarlo con un solo verbo y dos complementos, evitando añadir una repetición que no está en el texto.
theological_decisions:
- issue: Relación entre Judá y Sion en la sintaxis de elección
  english_pob_reading: The Hebrew syntax straightforwardly lists two direct objects after ויבחר. The translation preserves the text's affirmation that God chose Judah and Zion, while avoiding doctrinal elaboration not stated in the verse itself.
  chosen_spanish_reading: Se preserva la afirmación de que Dios escogió a Judá y al monte Sion, sin convertir la frase en una explicación doctrinal más amplia.
  alternative_spanish_readings:
  - Hacer de Sion una simple aposición de Judá
  - Separar la frase en dos elecciones distintas
  rationale: El hebreo permite oír dos complementos vinculados al mismo verbo. En español, la puntuación puede dejar abierta la relación sin forzar una explicación que exceda el verso.
  doctrine_reference: Salmo 78:68; traducción con cautela sintáctica
- issue: Amor de Dios hacia Sion
  english_pob_reading: which he loved
  chosen_spanish_reading: «que amó» mantiene el amor como rasgo del monte Sion, sin expandirlo a una formulación teológica más específica.
  alternative_spanish_readings:
  - «que había amado»
  - «amado por él»
  rationale: El hebreo usa una cláusula relativa simple. La traducción evita añadir tiempo aspectual o pasivización no presentes en la forma hebrea.
  doctrine_reference: Salmo 78:68; cláusula relativa
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó una conjunción para reflejar una estructura más abierta entre «the tribe of Judah» y «Mount Zion». En español se mantiene esa cautela con una coma y notas que explican la posible lectura de dos objetos directos bajo un solo verbo.
  spanish_consistency_notes:
  - Se usa «escogió» para בחר, conforme al valor verbal básico y al tono de elección deliberada.
  - Se usa «Judá» y «Sion» sin artículos innecesarios en los topónimos; el artículo se conserva en «la tribu» y «el monte» por claridad idiomática.
  - Se evita «SEÑOR» o «Yahvé» porque el versículo no contiene el nombre divino explícito; el sujeto está recuperado del contexto inmediato en la narración.
  - La puntuación con coma intenta no fijar demasiado la relación entre «la tribu de Judá» y «el monte Sion», siguiendo la cautela del audit trail inglés.
