translation:
  language: es
  text: Entonces me mostró a Josué, el sumo sacerdote, de pie delante del ángel de Yahvé, y al Acusador[a] de pie a su derecha para acusarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, “Satanás … para oponerse a él”. El hebreo dice “el satan”, que puede funcionar como título: “el acusador” o “el adversario”.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּרְאֵנִי
  english_pob_choice: Then he showed me
  chosen_spanish: Entonces me mostró
  alternatives_spanish:
  - Y me mostró
  - Entonces me hizo ver
  lexicon: HALOT
  rationale: El Hifil de ראה con sufijo de 1.ª persona expresa ‘hacer ver’, que en español se vierte con naturalidad como ‘mostrar’. ‘Entonces’ conserva el valor narrativo del waw inicial sin volver la frase pesada.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Jeshúa
  lexicon: HALOT
  rationale: El hebreo vocalizado aquí corresponde directamente al nombre Josué. En español bíblico, ‘Josué’ es la forma clara y reconocible, y evita armonizar con una tradición que no refleja la forma consonántica/vocálica de este pasaje.
- source_word: הַכֹּהֵן הַגָּדוֹל
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  - el sacerdote principal
  lexicon: HALOT
  rationale: ‘Sumo sacerdote’ es la equivalencia idiomática normal en español para el título israelita de jefe del sacerdocio. Mantiene precisión y legibilidad sin perder el rango institucional.
- source_word: עֹמֵד
  english_pob_choice: standing
  chosen_spanish: que estaba
  alternatives_spanish:
  - de pie
  - estando
  lexicon: HALOT
  rationale: El participio describe su postura en la visión. En español, ‘que estaba’ con el contexto inmediato comunica el estado/postura de manera fluida; el complemento ‘delante del ángel de Yahvé’ hace explícita la imagen de estar de pie. Se evita recargar la frase con una forma menos natural.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: ‘Delante de’ conserva el sentido espacial y judicial de la escena. ‘Ante’ sería posible, pero ‘delante de’ resulta más directo y natural en español contemporáneo.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: Se mantiene ‘ángel’ porque es la opción más natural en esta visión profética y porque el propio audit trail inglés la documenta como la elección principal. ‘Yahvé’ se conserva según la política del proyecto para יהוה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: HALOT
  rationale: Se translitera el nombre divino como ‘Yahvé’, conforme a la terminología base del proyecto y al principio de no sustituir el nombre por un título.
- source_word: הַשָּׂטָן
  english_pob_choice: the Accuser
  chosen_spanish: el Acusador
  alternatives_spanish:
  - Satanás
  - el adversario
  lexicon: HALOT
  rationale: 'El artículo hebreo sugiere aquí un título o función: el que acusa. ‘Acusador’ preserva el valor forense de la escena. Se evita resolver el término como nombre propio en el texto principal, manteniendo la tensión lexical señalada por el audit trail.'
- source_word: עַל יְמִינוֹ
  english_pob_choice: at his right hand
  chosen_spanish: a su derecha
  alternatives_spanish:
  - a su mano derecha
  - a su diestra
  lexicon: HALOT
  rationale: ‘A su derecha’ transmite el mismo referente con español natural y claro. La imagen judicial de posición a la derecha queda intacta sin una expresión más arcaica.
- source_word: לְשִׂטְנוֹ
  english_pob_choice: to accuse him
  chosen_spanish: para acusarlo
  alternatives_spanish:
  - para oponerse a él
  - para ser su adversario
  lexicon: HALOT
  rationale: El infinitivo de la misma raíz funciona en este contexto legal como finalidad acusatoria. ‘Para acusarlo’ es la forma más clara en español y preserva el sentido de acción procesal.
theological_decisions:
- issue: Si הַשָּׂטָן debe leerse como nombre propio o como título funcional
  english_pob_reading: the Accuser
  chosen_spanish_reading: el Acusador
  alternative_spanish_readings:
  - Satanás
  - el adversario
  rationale: El artículo hebreo y el entorno judicial favorecen una lectura funcional/titular. ‘El Acusador’ mantiene la fuerza forense del pasaje y no borra la tensión canónica con lecturas posteriores que lo identifican más plenamente con Satanás. La opción tradicional se reserva como alternativa, no como resolución del texto.
  doctrine_reference: Preservar la tensión teológica y la primacía del hebreo sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el análisis revisado del texto hebreo y el audit trail inglés, sin cambios sustanciales respecto de la decisión léxica principal: mantener el sentido forense de הַשָּׂטָן como título funcional y no como nombre propio en el cuerpo principal.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יהוה en todo el texto, conforme a la política del proyecto.
  - ‘Josué’ se usa como forma española directa del nombre hebreo יְהוֹשֻׁעַ.
  - ‘Acusador’ conserva la función judicial del término hebreo sin cerrar la tensión entre título y nombre propio.
  - La puntuación y el orden sintáctico buscan ser naturales en español sin abandonar la estructura de la escena bíblica.
