translation:
  language: es
  text: ¿Qué es un[a] hombre, y cuál es su utilidad[b]? ¿Cuál es su bien, y cuál es su mal[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ser humano». El griego tiene ἄνθρωπος en singular, un término genérico que puede representar a la humanidad en una sola figura.
    reason: lexical_alternative
  - marker: b
    text: O «uso», «propósito» o «beneficio» para χρῆσις. El griego pregunta por el valor o la función práctica del ser humano.
    reason: lexical_alternative
  - marker: c
    text: «Mal» también puede abarcar lo dañino o adverso, además del mal moral; el griego κακόν admite ese campo semántico más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί
  english_pob_choice: what
  chosen_spanish: qué / cuál
  alternatives_spanish:
  - qué
  - cuál
  lexicon: LSJ
  rationale: El griego repite τί en preguntas retóricas. En español, alternar «qué» y «cuál» suena natural sin perder el paralelismo ni la fuerza inquisitiva del original.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un ser humano
  - una persona
  - humanidad
  lexicon: LSJ
  rationale: ἄνθρωπος está en singular genérico y el audit trail inglés optó por «a man» para mantener la forma proverbial. En español, «un hombre» conserva esa concisión y el sentido genérico sin volver abstracto el texto.
- source_word: χρῆσις
  english_pob_choice: use
  chosen_spanish: uso
  alternatives_spanish:
  - propósito
  - utilidad
  - beneficio
  - función
  lexicon: LSJ
  rationale: χρῆσις expresa uso, empleo o valor práctico. «Uso» es el equivalente más directo y mantiene la brevedad sapiencial; «propósito» introduciría un matiz teleológico más fuerte que el griego no exige.
- source_word: ἀγαθόν
  english_pob_choice: good
  chosen_spanish: bien
  alternatives_spanish:
  - bondad
  - lo bueno
  - beneficio
  lexicon: LSJ
  rationale: Aunque el inglés traduce «good», en español «su bien» suena más natural en este paralelismo y puede abarcar tanto lo moral como lo favorable o provechoso, como permite el neutro sustantivado griego.
- source_word: κακόν
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - lo malo
  - daño
  lexicon: LSJ
  rationale: κακόν puede significar mal moral, daño o lo adverso. «Mal» conserva esa amplitud en español y mantiene el contraste directo con «bien» mejor que una forma más estrecha como «maldad».
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  lexicon: LSJ
  rationale: El genitivo singular remite a ἄνθρωπος. «Su» es la forma natural en español y preserva la simetría compacta del versículo.
theological_decisions:
- issue: Referencia genérica masculina en antropología sapiencial
  english_pob_reading: a man ... his
  chosen_spanish_reading: un hombre ... su
  alternative_spanish_readings:
  - una persona ... su
  - ser humano ... su
  rationale: El griego usa ἄνθρωπος en singular genérico con pronombres singulares. Se mantiene la forma masculina genérica para conservar la economía proverbial y seguir la decisión auditable del texto base inglés, sin convertirlo en plural o abstracción.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Alcance moral o pragmático de κακόν
  english_pob_reading: evil
  chosen_spanish_reading: mal
  alternative_spanish_readings:
  - daño
  - lo malo
  - mal moral
  rationale: La pareja ἀγαθόν/κακόν en contexto sapiencial puede abarcar lo moral y lo adverso. «Mal» mantiene esa tensión semántica y evita reducir el término únicamente a un juicio moral abstracto o a daño práctico.
  doctrine_reference: LSJ; sabiduría bíblica helenística
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «man» a «a man» para reflejar mejor el valor genérico anartro. En español, «un hombre» ya expresa naturalmente ese sentido sin perder fluidez ni el tono proverbial, así que se adoptó directamente esa solución. También se decidió favorecer «bien/mal» frente a opciones más explicativas para conservar el paralelismo breve del griego.
  spanish_consistency_notes:
  - Se mantiene «un hombre» como genérico singular, coherente con la política POB sobre ἄνθρωπος.
  - Se usa «bien/mal» como par contrastivo para ἀγαθόν/κακόν, dejando abierta la amplitud moral y práctica del griego.
  - La puntuación respeta el paralelismo interrogativo del texto fuente.
  - No se introducen términos eclesiásticos o interpretativos no exigidos por el original.
