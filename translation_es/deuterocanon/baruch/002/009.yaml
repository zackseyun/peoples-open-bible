  glossary_alignment: Se usa correctamente «Yahvé». La elección «justo» para δίκαιος es aceptable en este contexto, aunque el inglés prefiera «righteous». «Calamidades» sigue bien la decisión teológica documentada para κακά. No hay conflicto relevante con la terminología del proyecto, salvo la nota [b], que no alinea bien la alternativa léxica en español.
