translation:
  language: es
  text: 'Por tanto, los que recitan proverbios dicen[a]: «Vengan a Hesbón; sea edificada y establecida la ciudad de Sihón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que hablan en proverbios», «los bardos»; tradicionalmente, «los gobernantes». El participio hebreo probablemente se refiere aquí a compositores o recitadores de un canto proverbial, no a gobernantes políticos.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Conserva la relación inferencial del hebreo con una fórmula natural en español y adecuada para un encabezado de cita poética.
- source_word: יֹאמְרוּ
  english_pob_choice: say
  chosen_spanish: dicen
  alternatives_spanish:
  - dirán
  - están diciendo
  lexicon: HALOT
  rationale: En este contexto introductorio de cita, el imperfecto hebreo funciona como presente habitual o gnómico; 'dicen' refleja bien esa función en español.
- source_word: הַמֹּשְׁלִים
  english_pob_choice: the proverb-sayers
  chosen_spanish: los que dicen proverbios
  alternatives_spanish:
  - los proverbistas
  - los recitadores de proverbios
  - los que hablan en proverbios
  lexicon: HALOT
  rationale: Evita 'gobernantes' o 'príncipes', que sería una lectura lexical posible pero no la preferida aquí; preserva la idea de quienes componen o recitan dichos proverbiales/taunt-songs sin imponer una etiqueta demasiado técnica.
- source_word: בֹּאוּ
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vengan acá
  - Entren
  lexicon: HALOT
  rationale: Imperativo plural de segunda persona; 'vengan' es la correspondencia natural y directa en español.
- source_word: חֶשְׁבּוֹן
  english_pob_choice: Heshbon
  chosen_spanish: Hesbón
  alternatives_spanish:
  - Heshbón
  lexicon: HALOT
  rationale: Transliteración habitual en español bíblico, manteniendo el nombre propio de lugar.
- source_word: תִּבָּנֶה
  english_pob_choice: let ... be built
  chosen_spanish: sea edificada
  alternatives_spanish:
  - que sea edificada
  - sea construida
  lexicon: HALOT
  rationale: 'La forma jussiva/volitiva en la cita poética se expresa de manera natural con un pasivo exhortativo: ''sea edificada''.'
- source_word: וְתִכּוֹנֵן
  english_pob_choice: and established
  chosen_spanish: y establecida
  alternatives_spanish:
  - y afirmada
  - y consolidada
  lexicon: HALOT
  rationale: '''Establecida'' conserva el paralelismo con ''edificada'' y refleja el sentido de כון como quedar firme, establecido o asegurado.'
- source_word: עִיר סִיחוֹן
  english_pob_choice: the city of Sihon
  chosen_spanish: la ciudad de Sihón
  alternatives_spanish:
  - la ciudad de Sihón
  - la ciudad perteneciente a Sihón
  lexicon: HALOT
  rationale: Se mantiene la relación posesiva del hebreo en una construcción castellana transparente y natural.
translation_notes:
  revision_awareness: Se siguió de cerca la lectura revisada del POB en inglés, que sustituyó 'poets' por 'proverb-sayers' para reflejar mejor הַמֹּשְׁלִים. También se respetó la cita en estilo poético con un mandato plural y dos pasivos volitivos.
  spanish_consistency_notes:
  - Se usó 'Hesbón' como transliteración española coherente con uso bíblico estándar.
  - Se evitó 'SEÑOR' o terminología teológica no presente en el versículo.
  - Se mantuvo 'edificada' / 'establecida' para conservar el paralelismo verbal del hebreo.
  - El marcador de nota [a] aparece en el sustantivo que concentra la decisión lexical principal.
