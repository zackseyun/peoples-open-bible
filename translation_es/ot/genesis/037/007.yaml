translation:
  language: es
  text: Y he aquí, nosotros estábamos atando gavillas en medio del campo; y he aquí, mi gavilla se levantó y además quedó en pie; y he aquí, sus gavillas se juntaron alrededor[a] y se inclinaron ante mi gavilla[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "rodearon". El verbo hebreo denota volverse o ir alrededor.
    reason: lexical_alternative
  - marker: b
    text: O "se postraron".
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold / and look
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y ved
  lexicon: HALOT
  rationale: La expresión introduce cada escena del sueño con inmediatez narrativa. 'He aquí' conserva el valor de señalamiento vívido y solemne sin forzar un calco coloquial como 'mira'.
- source_word: מְאַלְּמִים אֲלֻמִּים
  english_pob_choice: binding sheaves
  chosen_spanish: estábamos atando gavillas
  alternatives_spanish:
  - estábamos haciendo gavillas
  - estábamos atando manojos
  lexicon: HALOT
  rationale: El par verbal-nominal expresa la acción agrícola de formar haces de cereal. 'Atando gavillas' mantiene la fuerza léxica del hebreo y evita diluir el campo semántico con una paráfrasis demasiado general.
- source_word: בְּת֣וֹךְ הַשָּׂדֶה
  english_pob_choice: in the midst of the field
  chosen_spanish: en medio del campo
  alternatives_spanish:
  - en el centro del campo
  - dentro del campo
  lexicon: HALOT
  rationale: '''En medio de'' reproduce la idea espacial de בתוך de modo natural en español. ''Campo'' comunica bien el ámbito agrícola; ''del campo'' suena más fluido que una versión más rígida.'
- source_word: קָמָה
  english_pob_choice: rose
  chosen_spanish: se levantaba
  alternatives_spanish:
  - se alzaba
  - se levantó
  - brotaba
  lexicon: HALOT
  rationale: Para una escena de sueño, el imperfecto en español transmite mejor el desarrollo visual de la imagen. 'Se levantaba' conserva el movimiento ascendente sin convertirlo innecesariamente en un evento puntual cerrado.
- source_word: נִצָּבָה
  english_pob_choice: and also stood upright
  chosen_spanish: y además se mantenía en pie
  alternatives_spanish:
  - y además quedaba firme
  - y además estaba erguida
  lexicon: HALOT
  rationale: נצב añade firmeza/posición estable después del ascenso. 'Se mantenía en pie' expresa esa permanencia vertical de modo natural; 'en pie' evita una lectura demasiado abstracta.
- source_word: תְסֻבֶּינָה
  english_pob_choice: gathered around
  chosen_spanish: se rodeaban
  alternatives_spanish:
  - se juntaban alrededor
  - giraban en torno
  lexicon: HALOT
  rationale: El verbo hebreo puede implicar girar/volver alrededor. 'Se rodeaban' conserva la idea de movimiento envolvente y deja abierta la posibilidad de 'rodear' más que una simple reunión estática.
- source_word: וַתִּשְׁתַּחֲוֶיןָ
  english_pob_choice: bowed down
  chosen_spanish: se inclinaban ante
  alternatives_spanish:
  - se postraban ante
  - se arrodillaban ante
  lexicon: HALOT
  rationale: En español, 'inclinarse ante' comunica reverencia y sometimiento sin añadir por sí solo una connotación litúrgica más fuerte que la que exige el contexto del sueño. Mantiene la posibilidad de 'postrarse' como alternativa más intensa.
- source_word: אֲלֻמָּתִי / אֲלֻמֹּתֵיכֶם
  english_pob_choice: my sheaf / your sheaves
  chosen_spanish: mi gavilla / vuestras gavillas
  alternatives_spanish:
  - mi haz / vuestras haces
  - mi manojo / vuestros manojos
  lexicon: HALOT
  rationale: '''Gavilla'' es el término español agrícola más transparente para אֲלֻמָּה en este contexto. Conserva el paralelismo simbólico entre la gavilla de José y las de sus hermanos.'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que prefirió un registro más formal ('behold') y un equivalente más literal para בתוך ('in the midst'). En español, se optó por 'he aquí' y 'en medio de' porque mantienen ese tono formal sin caer en un calco rígido. También se preservó la secuencia paratáctica del hebreo con puntos y coma implícitos mediante comas y coordinación natural en español.
  spanish_consistency_notes:
  - Se mantuvo 'gavilla' de manera consistente para אֲלֻמָּה, siguiendo la opción léxica del POB inglés por 'sheaf'.
  - Se eligió un español reverente pero moderno, evitando 'postraban' como forma principal porque 'se inclinaban ante' comunica la reverencia del gesto sin intensificarlo más allá del contexto onírico.
  - Se conservó la repetición de 'y he aquí' para reflejar el repetido וְהִנֵּה del hebreo y la insistencia narrativa del pasaje.
