translation:
  language: es
  text: Así, estos tres hombres dejaron de responder a Job[a], porque él era justo ante sus propios ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, según otra tradición textual, «porque él era justo ante sus ojos».
    reason: textual_variant
lexical_decisions:
- source_word: וַיִּשְׁבְּתוּ
  english_pob_choice: stopped
  chosen_spanish: dejaron de
  alternatives_spanish:
  - cesaron de
  - se detuvieron de
  lexicon: HALOT
  rationale: El verbo hebreo expresa cese de una acción. En español, la construcción natural con el infinitivo es «dejar de», que conserva la idea de interrupción sin sonar forzada.
- source_word: שְׁלֹשֶׁת הָאֲנָשִׁים הָאֵלֶּה
  english_pob_choice: these three men
  chosen_spanish: estos tres hombres
  alternatives_spanish:
  - estas tres personas
  lexicon: HALOT
  rationale: El hebreo masculino plural se refleja con «hombres», que corresponde al referente narrativo de los tres interlocutores de Job. «Personas» diluye el matiz de género gramatical del original.
- source_word: מֵעֲנוֹת
  english_pob_choice: answering
  chosen_spanish: responder
  alternatives_spanish:
  - contestar
  - responder a
  lexicon: HALOT
  rationale: El infinitivo constructo de ענה aquí significa contestar en un diálogo. En español, «dejar de responder a Job» suena natural y mantiene la acción continuada que se interrumpe.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de que cesaran de responder. «Porque» comunica con claridad la relación causal sin añadir matices no presentes en el hebreo.
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - righteous
  lexicon: HALOT
  rationale: Aquí צַדִּיק puede expresarse como «justo» en español, término que conserva la fuerza moral y judicial del hebreo. Se evita «santo» o «piadoso», que irían más allá del alcance léxico.
- source_word: בְּעֵינָיו
  english_pob_choice: in his own eyes
  chosen_spanish: a sus propios ojos
  alternatives_spanish:
  - en sus propios ojos
  - a su propio parecer
  lexicon: HALOT
  rationale: La imagen idiomática hebrea de «en sus ojos» se vierte con una locución española equivalente y natural. La forma refleja el valor reflexivo que la POB inglesa preserva con «his own eyes».
theological_decisions:
- issue: Si Job es presentado como objetivamente justo o como justo solo en su propia estimación
  english_pob_reading: he was righteous in his own eyes
  chosen_spanish_reading: él era justo a sus propios ojos
  alternative_spanish_readings:
  - él era justo en sus propios ojos
  - él era justo a su propio parecer
  - él era justo a los ojos de ellos
  rationale: 'La redacción española preserva la tensión del texto: no declara que Job fuera justo en sentido absoluto, sino que así se veía a sí mismo. Se mantiene la lectura singular del sufijo hebreo, coherente con el testimonio del texto masorético, sin borrar la variante textual documentada en la nota.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La versión inglesa auditada se mantuvo sin cambios en la revisión más reciente. La redacción española sigue esa lectura estable, conservando la variante textual en nota sin resolverla en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Job» como nombre propio sin transliteración adicional.
  - Se usa «justo» para צַדִּיק en este contexto narrativo, evitando una paráfrasis teológica más fuerte.
  - La locución «a sus propios ojos» conserva el matiz idiomático y la posible tensión reflexiva del hebreo.
