    issue: Construcción 'para que no fuera tras'
    rationale: לְבִלְתִּי לֶכֶת se vierte mejor en español con infinitivo ('para no ir') o con complemento directo de mandato ('que no fuera'). La forma actual es comprensible pero menos natural y menos directa que el hebreo.
  - severity: low
    issue: 'Desajuste entre texto y nota al pie: ''dioses ajenos'' vs. ''otros dioses'''
    rationale: La nota explica explícitamente el modismo hebreo como 'ir tras otros dioses'. Mantener la misma expresión en el texto mejora coherencia y transparencia con respecto al original y al rastro de auditoría inglés.
  revised_spanish_text: y le había mandado respecto de este asunto[a], para no ir tras otros dioses, pero no guardó lo que Yahvé había mandado.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: “ir tras otros dioses”, un modismo de pacto para apartarse de Yahvé y rendir culto a otras deidades.'
    reason: cultural_note
  revision_rationale: Se ajusta 'para que no fuera tras' a 'para no ir tras' para reflejar de manera más natural y directa el infinitivo hebreo לְבִלְתִּי לֶכֶת. También se cambia 'dioses ajenos' a 'otros dioses' para alinear el texto con la nota al pie, el modismo hebreo señalado y la auditoría inglesa, sin alterar el sentido.
