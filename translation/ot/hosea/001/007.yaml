id: HOS.1.7
reference: Hosea 1:7
source:
  edition: WLC
  text: וְ/אֶת בֵּ֤ית יְהוּדָה֙ אֲרַחֵ֔ם וְ/הֽוֹשַׁעְתִּ֖י/ם בַּ/יהוָ֣ה אֱלֹֽהֵי/הֶ֑ם וְ/לֹ֣א אֽוֹשִׁיעֵ֗/ם בְּ/קֶ֤שֶׁת וּ/בְ/חֶ֨רֶב֙ וּ/בְ/מִלְחָמָ֔ה בְּ/סוּסִ֖ים וּ/בְ/פָרָשִֽׁים־׃
translation:
  text: But I will have compassion on the house of Judah[a], and I will save them by Yahweh their God; I will not save them by bow, or by sword, or by war, by horses, or by horsemen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the LORD their God'; the Hebrew preposition can express means or agency. The main text uses 'by' because the following clause contrasts the LORD with military means of deliverance.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אֶת
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: HALOT
  rationale: The conjunction with the object marker introduces a contrast with the preceding judgment on Israel in v. 6. English idiom is best served by making the adversative force explicit as 'But' rather than a bare 'And.'
- source_word: בֵּית יְהוּדָה
  chosen: the house of Judah
  alternatives:
  - Judah
  - the household of Judah
  lexicon: HALOT
  rationale: A standard covenantal/national expression referring to the kingdom/people of Judah. 'House of Judah' preserves the Hebrew idiom and prophetic register better than the flatter 'Judah.'
- source_word: אֲרַחֵם
  chosen: I will have compassion
  alternatives:
  - I will show mercy
  - I will love tenderly
  lexicon: HALOT
  rationale: From רחם, denoting compassion/mercy. 'Have compassion' is natural modern English and preserves the affective force without sounding overly ecclesiastical. 'Show mercy' is possible, but 'compassion' better reflects the emotional nuance here.
- source_word: וְהוֹשַׁעְתִּים
  chosen: and I will save them
  alternatives:
  - and I will deliver them
  - and I will give them victory
  lexicon: HALOT
  rationale: From ישׁע in the Hiphil, meaning to save/deliver. 'Save' is the broadest and most theologically resonant English equivalent, while still fitting the military-political context.
- source_word: בַּיהוָה אֱלֹהֵיהֶם
  chosen: by the LORD their God
  alternatives:
  - through the LORD their God
  - in the LORD their God
  lexicon: HALOT
  rationale: 'The preposition ב here is instrumental or means-related: Judah''s deliverance will come by means of the LORD himself. ''By the LORD their God'' is concise and preserves the striking formulation that YHWH saves by YHWH.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְלֹא אוֹשִׁיעֵם
  chosen: I will not save them
  alternatives:
  - I will not deliver them
  lexicon: HALOT
  rationale: Repeats the same verbal root as earlier in the verse for rhetorical contrast. Keeping 'save' maintains the Hebrew repetition and the contrast between divine and military means.
- source_word: בְּקֶשֶׁת
  chosen: by bow
  alternatives:
  - with a bow
  lexicon: HALOT
  rationale: 'Instrumental ב is naturally rendered ''by.'' The anarthrous singular is generic: deliverance will not come by archery/weaponry. ''By bow'' keeps the compact poetic style.'
- source_word: וּבְחֶרֶב
  chosen: or by sword
  alternatives:
  - or with a sword
  lexicon: HALOT
  rationale: Continues the list of military means. 'Sword' is the standard gloss and preserves the martial imagery.
- source_word: וּבְמִלְחָמָה
  chosen: or by war
  alternatives:
  - or by battle
  lexicon: HALOT
  rationale: A broad term for warfare. 'War' is the most direct rendering and fits the cumulative denial of military means.
- source_word: בְּסוּסִים
  chosen: by horses
  alternatives:
  - by cavalry horses
  lexicon: HALOT
  rationale: Literal rendering is preferable; the term refers to horses as military assets. 'Horses' is clear and preserves the concrete imagery.
- source_word: וּבְפָרָשִׁים
  chosen: or by horsemen
  alternatives:
  - or by riders
  - or by cavalry
  lexicon: HALOT
  rationale: Likely mounted warriors. 'Horsemen' is the most transparent and traditional rendering; 'cavalry' is possible but more interpretive and less literal.
