revisions:
- from: 'Y al cabo de dos meses volvió a su padre[a], y él le hizo según su voto que había hecho. Ahora bien, ella no había conocido varón[b]. Y esto llegó a ser estatuto en Israel:'
  to: 'Y al cabo de dos meses volvió a su padre[a], y él hizo con ella conforme al voto que había hecho. Ahora bien, ella no había conocido a ningún varón[b]. Y esto llegó a ser estatuto en Israel:'
  rationale: Apliqué ajustes menores para mejorar la naturalidad del español sin perder la ambigüedad ni la fuerza del hebreo. «Hizo con ella conforme al voto que había hecho» refleja mejor la construcción dura de עשה + נדר. «No había conocido a ningún varón» mantiene el idiomatismo con español más claro. También corregí la gramática de la nota teológica.
