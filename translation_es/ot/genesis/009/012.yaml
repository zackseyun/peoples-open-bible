  text: וַ/יֹּ֣אמֶר אֱלֹהִ֗ים זֹ֤את אֽוֹת הַ/בְּרִית֙ אֲשֶׁר אֲנִ֣י נֹתֵ֗ן בֵּינִ/י֙ וּ/בֵ֣ינֵי/כֶ֔ם וּ/בֵ֛ין כָּל נֶ֥פֶשׁ חַיָּ֖ה אֲשֶׁ֣ר אִתְּ/כֶ֑ם לְ/דֹרֹ֖ת עוֹלָֽם־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/009/012.yaml
  text: And God said[a], “This is the sign of the covenant that I am giving between me and you and every living creature that is with you[b], for perpetual generations:”
  footnotes:
  - marker: a
    text: Or, “that I am giving.” The Hebrew verb is literally “giving”; “making” is used in English because covenant language is more natural that way here.
    reason: lexical_alternative
  - marker: b
    text: Or, “for everlasting generations” or “throughout all generations.”
    reason: lexical_alternative
