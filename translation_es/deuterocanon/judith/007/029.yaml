translation:
  language: es
  text: Y hubo gran llanto en medio de toda la asamblea[a], todos juntos, y clamaron al Señor Dios a gran voz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Asamblea» también puede traducirse «congregación».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: there was
  chosen_spanish: y hubo
  alternatives_spanish:
  - y aconteció
  - y llegó a haber
  lexicon: BDAG
  rationale: La fórmula narrativa se vierte de manera natural con un perfecto existencial en español, sin perder el matiz de suceso ocurrido en la escena.
- source_word: κλαυθμὸς μέγας
  english_pob_choice: great weeping
  chosen_spanish: gran llanto
  alternatives_spanish:
  - gran llanto y sollozo
  - gran lamentación
  lexicon: BDAG
  rationale: κλαυθμός expresa llanto o sollozo; «llanto» mantiene el sentido principal con dignidad y naturalidad, y «gran» conserva μέγας.
- source_word: ἐν μέσῳ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en medio de
  - en el centro de
  lexicon: BDAG
  rationale: «En medio de» es la equivalencia natural en español y conserva tanto el sentido espacial como el social del giro.
- source_word: τῆς ἐκκλησίας
  english_pob_choice: the assembly
  chosen_spanish: toda la asamblea
  alternatives_spanish:
  - toda la congregación
  - todo el conjunto reunido
  lexicon: BDAG
  rationale: En este contexto narrativo, ἐκκλησία designa al grupo reunido; «asamblea» evita la carga eclesiástica de «iglesia» y sigue la decisión auditada en inglés.
- source_word: πάντων ὁμοθυμαδόν
  english_pob_choice: the whole assembly, all together
  chosen_spanish: todos unánimemente
  alternatives_spanish:
  - todos juntos
  - todos de común acuerdo
  lexicon: BDAG
  rationale: La combinación subraya la respuesta unida del grupo; «unánimemente» preserva la idea de una acción concorde, y el «todos» ya está explícito en el contexto inmediato.
- source_word: ἐβόησαν
  english_pob_choice: they cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - alzaron la voz
  lexicon: BDAG
  rationale: «Clamar» comunica el carácter urgente y dirigido a Dios del verbo mejor que un simple «gritar».
- source_word: πρὸς Κύριον τὸν θεὸν
  english_pob_choice: to the Lord God
  chosen_spanish: al Señor Dios
  alternatives_spanish:
  - al Señor, Dios
  - al Señor, su Dios
  lexicon: BDAG
  rationale: Se conserva la apposición reverente de κύριος + θεός con la forma natural «Señor Dios» en español, manteniendo la dirección de la súplica.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con gran voz
  alternatives_spanish:
  - en alta voz
  - con voz fuerte
  lexicon: BDAG
  rationale: «Con gran voz» reproduce de cerca la construcción instrumental y conserva el tono bíblico sin volverla excesivamente moderna.
theological_decisions:
- issue: Rendering of κύριος in a prayer addressed to God
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - Soberano
  rationale: Aunque el POB español por defecto usa «Yahvé» para el nombre divino, aquí la forma griega κύριος va unida a θεός en una invocación establecida; «Señor Dios» refleja esa combinación sin borrar la referencia a Dios.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; divine-name policy for quotations/allusions'
- issue: Rendering of ἐκκλησία in Judith
  english_pob_reading: assembly
  chosen_spanish_reading: asamblea
  alternative_spanish_readings:
  - congregación
  - iglesia
  rationale: «Asamblea» mantiene el sentido de comunidad reunida sin introducir una lectura anacrónica de iglesia institucional. «Congregación» es viable, pero «asamblea» sigue mejor el audit trail inglés.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition'
translation_notes:
  revision_awareness: El texto sigue el pasaje griego recibido sin cambios textuales relevantes; se conserva la equivalencia auditada del inglés, pero se ajusta la sintaxis al español natural y se mantiene la distinción de ἐκκλησία como comunidad reunida, no como institución eclesiástica posterior.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en esta invocación, en armonía con la decisión auditada en inglés y con la combinación fija «Señor Dios».
  - Se evita «iglesia» para ἐκκλησία para no importar un sentido posterior; «asamblea» queda como término principal en español.
  - «Gran voz» conserva el tono bíblico de φωνῇ μεγάλῃ sin perder inteligibilidad en español moderno.
