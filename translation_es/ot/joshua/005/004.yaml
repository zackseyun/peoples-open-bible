translation:
  language: es
  text: 'Y este es el motivo por el cual Josué los circuncidó: todo el pueblo que salió de Egipto[a], todos los varones, todos los hombres de guerra[b], habían muerto en el desierto, por el camino, después de salir de Egipto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y este es el asunto que Josué circuncidó: todo el pueblo...». La expresión hebrea es idiomática y presenta la explicación de la acción de Josué.'
    reason: lexical_alternative
  - marker: b
    text: «Hombres de guerra» también puede verterse «hombres de combate» o «guerreros».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֶה הַדָּבָר
  english_pob_choice: And this is the reason
  chosen_spanish: Y este es el motivo
  alternatives_spanish:
  - Y esta es la cosa
  - Y este es el asunto
  lexicon: HALOT
  rationale: El hebreo introduce una explicación causal o motivadora de la acción de Josué. «Motivo» comunica esa fuerza explicativa de manera natural en español, sin perder el carácter de «asunto/materia» del original.
- source_word: אֲשֶׁר מָל יְהוֹשֻׁעַ
  english_pob_choice: why Joshua circumcised them
  chosen_spanish: por el cual Josué los circuncidó
  alternatives_spanish:
  - que Josué circuncidó
  - el cual Josué circuncidó
  lexicon: HALOT
  rationale: Se conserva la relación explicativa del relativo hebreo. En español, «por el cual» expresa mejor la función causal/explicativa que un simple «que» en este contexto narrativo.
- source_word: מָל
  english_pob_choice: circumcised
  chosen_spanish: circuncidó
  alternatives_spanish:
  - practicó la circuncisión a
  - hizo circuncidar
  lexicon: HALOT
  rationale: Es el verbo directo y preciso para מול. Mantiene la acción concreta sin perífrasis innecesaria.
- source_word: כָּל הָעָם הַיֹּצֵא מִמִּצְרַיִם
  english_pob_choice: all the people who came out of Egypt
  chosen_spanish: todo el pueblo que salió de Egipto
  alternatives_spanish:
  - todo el pueblo que había salido de Egipto
  - todo el pueblo que estaba saliendo de Egipto
  lexicon: HALOT
  rationale: «Salió de Egipto» refleja naturalmente el participio hebreo en esta recapitulación histórica. «Todo el pueblo» mantiene el alcance colectivo del texto.
- source_word: הַזְּכָרִים
  english_pob_choice: the males
  chosen_spanish: los varones
  alternatives_spanish:
  - los machos
  - los hombres
  lexicon: HALOT
  rationale: El hebreo marca explícitamente sexo. En español, «varones» conserva ese rasgo con dignidad y evita la posible ambigüedad de «hombres» como término genérico.
- source_word: כֹּל אַנְשֵׁי הַמִּלְחָמָה
  english_pob_choice: all the men of war
  chosen_spanish: todos los hombres de guerra
  alternatives_spanish:
  - todos los guerreros
  - todos los hombres de combate
  lexicon: HALOT
  rationale: Se conserva la construcción casi nominal del hebreo. «Hombres de guerra» es formal y fiel; «guerreros» suaviza el giro pero pierde algo de la estructura del original.
- source_word: מֵתוּ
  english_pob_choice: had died
  chosen_spanish: habían muerto
  alternatives_spanish:
  - murieron
  - habían fallecido
  lexicon: HALOT
  rationale: El pluscuamperfecto en español expresa correctamente que esa generación ya había muerto antes del acto de Josué. «Habían muerto» refleja la secuencia temporal del relato.
- source_word: בַמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto del desvío
  - en la soledad
  lexicon: HALOT
  rationale: «Desierto» es una opción clara y bíblicamente reconocible en español. Aunque «wilderness» puede abarcar más que un desierto geográfico, aquí la referencia al peregrinaje de Israel lo hace adecuado.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - durante el viaje
  - por el camino
  lexicon: HALOT
  rationale: «En el camino» traduce de forma natural la idea de estar en tránsito. Mantiene la relación espacial y narrativa con el viaje desde Egipto.
- source_word: בְּצֵאתָם מִמִּצְרָיִם
  english_pob_choice: after they came out of Egypt
  chosen_spanish: después de salir de Egipto
  alternatives_spanish:
  - cuando salieron de Egipto
  - al salir de Egipto
  lexicon: HALOT
  rationale: La construcción temporal se expresa bien con una frase preposicional en español. «Después de salir de Egipto» preserva el sentido secuencial que el contexto requiere.
translation_notes:
  revision_awareness: La revisión en inglés ajustó «along the way» a «on the way» por naturalidad. En español se optó por «en el camino», que conserva el valor locativo de tránsito y encaja con el paralelismo narrativo del versículo. Se mantuvo el pluscuamperfecto («habían muerto») para respetar la secuencia explicativa ya fijada por la POB inglesa.
  spanish_consistency_notes:
  - Se usa «Josué» para el nombre propio y «Egipto» como topónimo bíblico estándar.
  - Se conserva «varones» para reflejar el sexo biológico explícito de הַזְּכָרִים, evitando neutralizar el rasgo semántico.
  - «Hombres de guerra» mantiene la terminología militar formal del POB inglés y la estructura hebrea.
  - No se introduce ninguna terminología eclesiástica añadida; el versículo permanece narrativo e histórico.
