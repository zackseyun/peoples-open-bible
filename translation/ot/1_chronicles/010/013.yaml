id: 1CH.10.13
reference: 1 Chronicles 10:13
source:
  edition: WLC
  text: וַ/יָּ֣מָת שָׁא֗וּל בְּ/מַֽעֲל/וֹ֙ אֲשֶׁ֣ר מָעַ֣ל בַּֽ/יהוָ֔ה עַל דְּבַ֥ר יְהוָ֖ה אֲשֶׁ֣ר לֹא שָׁמָ֑ר וְ/גַם לִ/שְׁא֥וֹל בָּ/א֖וֹב לִ/דְרֽוֹשׁ־־־׃
translation:
  text: So Saul died for his unfaithfulness by which he was unfaithful to Yahweh[a], because of the word of Yahweh, which he did not keep, and also because he asked counsel of a medium[b], to inquire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the breach of faith in which he broke faith against the LORD.'
    reason: lexical_alternative
  - marker: b
    text: '''A medium'' refers to a person who seeks information from the dead or from spirits; compare 1 Samuel 28:7.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּמָת
  chosen: So ... died
  alternatives:
  - and ... died
  - then ... died
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So Saul died' gives natural English while preserving the consequential force from the preceding context.
- source_word: בְּמַעֲלוֹ / מָעַל
  chosen: for his unfaithfulness by which he was unfaithful
  alternatives:
  - for his trespass that he committed
  - for the breach of faith in which he broke faith
  lexicon: HALOT
  rationale: The noun and cognate verb emphasize covenantal infidelity, not merely a generic sin. 'Unfaithfulness' / 'was unfaithful' preserves the wordplay and theological weight better than the more archaic 'trespass.'
- source_word: בַּיהוָה
  chosen: to the LORD
  alternatives:
  - against the LORD
  - with respect to the LORD
  lexicon: HALOT
  rationale: With מעל, the preposition marks the one against whom the unfaithfulness was committed. 'To the LORD' is idiomatic with 'unfaithful' in English and keeps the covenantal sense. Per doctrine, יהוה is rendered 'the LORD.'
- source_word: עַל דְּבַר יְהוָה
  chosen: because of the word of the LORD
  alternatives:
  - concerning the word of the LORD
  - against the word of the LORD
  lexicon: HALOT
  rationale: The phrase explains the sphere or basis of Saul's unfaithfulness. 'Because of the word of the LORD' fits the following clause 'which he did not keep' and communicates that his offense concerned the LORD's command/word.
- source_word: שָׁמָר
  chosen: keep
  alternatives:
  - observe
  - guard
  lexicon: HALOT
  rationale: '''Keep'' is the standard covenantal rendering in English for obeying or observing the LORD''s word/command, and is more natural than ''guard'' here.'
- source_word: וְגַם
  chosen: and also because
  alternatives:
  - and also
  - also
  lexicon: HALOT
  rationale: The conjunction adds a second ground for Saul's death. Supplying 'because' in English makes the parallel causal structure explicit and readable.
- source_word: לִשְׁאוֹל
  chosen: he sought guidance
  alternatives:
  - he inquired
  - he consulted
  lexicon: HALOT
  rationale: The infinitive with prefixed ל after וגם is best represented by an English finite clause in context. 'Sought guidance' captures the purposive sense of consulting for information.
- source_word: בָּאוֹב
  chosen: from a medium
  alternatives:
  - of a medium
  - through a medium
  - from a ghost-medium
  lexicon: HALOT
  rationale: אוֹב refers to a medium/necromancer associated with spirit consultation. 'From a medium' is clear modern English and avoids archaic phrasing while preserving the prohibited occult practice.
- source_word: לִדְרֹשׁ
  chosen: to inquire
  alternatives:
  - to seek
  - to consult
  lexicon: HALOT
  rationale: This infinitive expresses the purpose of consulting the medium. 'To inquire' preserves the formal sense of seeking information or guidance.
