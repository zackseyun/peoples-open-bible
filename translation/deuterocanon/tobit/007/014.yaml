translation:
  text: And he called Edna his wife, and taking a document, he wrote out a marriage contract[a], and they sealed it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a written agreement' or simply 'a contract'; the Greek term refers to a formal written legal document. 'Marriage contract' is chosen because the immediate context is the marriage arrangement.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάλεσεν
  chosen: called
  alternatives:
  - summoned
  lexicon: BDAG
  rationale: The verb straightforwardly means 'called' or 'summoned.' 'Called' is natural English and sufficiently covers the action without overstating formality.
- source_word: Ἔδναν
  chosen: Edna
  rationale: Personal names are transliterated by standard convention per project philosophy.
- source_word: γυναῖκα
  chosen: wife
  alternatives:
  - woman
  lexicon: BDAG
  rationale: In apposition to 'his' and in this domestic context, γυνή clearly means 'wife,' not merely 'woman'.
- source_word: λαβὼν βιβλίον
  chosen: taking a document
  alternatives:
  - taking a book
  - taking a scroll
  - taking a written record
  lexicon: BDAG
  rationale: βιβλίον can denote a scroll, book, or written document. In the context of drafting and sealing a legal agreement, 'document' best conveys the function in clear modern English.
- source_word: ἔγραψεν
  chosen: wrote out
  alternatives:
  - wrote
  lexicon: BDAG
  rationale: The verb means 'wrote'; 'wrote out' slightly clarifies that he composed the legal text on the document without adding content beyond the context.
- source_word: συγγραφήν
  chosen: a marriage contract
  alternatives:
  - a written agreement
  - a contract
  - a marriage agreement
  lexicon: LSJ
  rationale: συγγραφή denotes a written agreement or contract. In this narrative setting concerning the giving of Sarah in marriage, 'marriage contract' makes explicit the legal nature of the writing and fits the immediate context better than the more generic 'agreement'.
- source_word: ἐσφραγίσαντο
  chosen: they sealed it
  alternatives:
  - they affixed seals
  - they ratified it
  lexicon: BDAG
  rationale: The middle/passive form here refers to sealing the written contract. 'They sealed it' is both literal and idiomatic in English; 'ratified it' would interpret beyond the concrete action.
