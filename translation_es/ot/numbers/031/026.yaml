    text: Or 'the captives' / 'the captive spoil.' The Hebrew expression includes what was captured in war, here specified as both humans and animals.
    reason: lexical_alternative
  - marker: b
    text: '''Of man'' uses Hebrew אָדָם in contrast with animals; the sense is human beings.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the heads of the ancestral houses' or more dynamically 'the clan leaders.'
    reason: lexical_alternative
