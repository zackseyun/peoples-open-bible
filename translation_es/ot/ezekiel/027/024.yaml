translation:
  language: es
  text: Ellos eran tus mercaderes en bienes selectos, en envolturas de azul y tela bordada, y en tesoros de telas multicolores, atados con cuerdas y asegurados[a], entre tu mercancía.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en arcones de cedro» / «forrados de cedro»; el término hebreo es difícil y algunos lo relacionan con la palabra para «cedro» más que con otra descripción del embalaje.
    reason: alternative_reading
  - marker: b
    text: La expresión hebrea traducida «tesoros de telas multicolores» es incierta; puede referirse a bienes valiosos almacenados, arcones o bultos de textiles de vivos colores.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹכְלַיִךְ
  english_pob_choice: your merchants
  chosen_spanish: tus mercaderes
  alternatives_spanish:
  - tus comerciantes
  - tus traficantes
  lexicon: HALOT
  rationale: En el contexto comercial de Tiro, רכל se refiere a agentes de comercio. «Mercaderes» conserva bien el valor mercantil y suena natural en español bíblico sin caer en un tecnicismo moderno.
- source_word: מַכְלֻלִים
  english_pob_choice: choice wares
  chosen_spanish: bienes selectos
  alternatives_spanish:
  - mercancías escogidas
  - bienes de lujo
  - mercancías perfectas
  lexicon: HALOT
  rationale: El término sugiere artículos valiosos o finamente elaborados. «Bienes selectos» transmite la calidad elegida sin forzar un calco incómodo como «cosas perfectas».
- source_word: גְלוֹמֵי תְכֵלֶת
  english_pob_choice: wraps of blue
  chosen_spanish: mantos de azul
  alternatives_spanish:
  - rollos de azul
  - envolturas de azul
  - mantos azulados
  lexicon: HALOT
  rationale: La imagen apunta a textiles envueltos o enrollados. «Mantos de azul» mantiene el sentido textil y resulta más fluido en español que una reproducción literal de «wraps».
- source_word: רִקְמָה
  english_pob_choice: embroidered cloth
  chosen_spanish: bordado
  alternatives_spanish:
  - tela bordada
  - obra de bordado
  - bordadura
  lexicon: HALOT
  rationale: En una lista de mercancías textiles, el sustantivo puede funcionar abreviadamente como material bordado. «De bordado» conserva la cualidad del tejido, aunque la alternativa «tela bordada» también sería posible.
- source_word: גִנְזֵי בְּרֹמִים
  english_pob_choice: treasuries of multicolored fabrics
  chosen_spanish: tesoros de telas multicolores
  alternatives_spanish:
  - almacenes de telas multicolores
  - arcones de telas multicolores
  - tesoros de tejidos variados
  lexicon: HALOT
  rationale: La expresión es oscura y admite varias soluciones. «Tesoros de telas multicolores» sigue de cerca la lectura comercial de artículos valiosos guardados, sin decidir de forma excesiva entre ‘tesoros’, ‘almacenes’ o ‘arcones’.
- source_word: חֲבָלִים
  english_pob_choice: cords
  chosen_spanish: cuerdas
  alternatives_spanish:
  - cordeles
  - lazos
  - sogas
  lexicon: HALOT
  rationale: El término designa amarras usadas para sujetar bultos. «Cuerdas» es claro y suficientemente general para el contexto de embalaje.
- source_word: חֲבֻשִׁים
  english_pob_choice: bound
  chosen_spanish: atados
  alternatives_spanish:
  - amarrados
  - ligados
  - vendados
  lexicon: HALOT
  rationale: El participio indica que los bienes estaban sujetos o amarrados. «Atados» es la opción más natural y mantiene la imagen de bultos de mercancía.
- source_word: אֲרֻזִים
  english_pob_choice: secured
  chosen_spanish: asegurados
  alternatives_spanish:
  - empaquetados
  - encajados
  - cerrados
  lexicon: HALOT
  rationale: El hebreo es difícil; el inglés POB opta por una idea de fijación o embalaje firme. «Asegurados» preserva esa ambigüedad de manera sobria sin imponer la lectura de ‘cedar-lined’ en el cuerpo del texto.
- source_word: מַרְכֻלְתֵּךְ
  english_pob_choice: your merchandise
  chosen_spanish: tu mercancía
  alternatives_spanish:
  - tu comercio
  - tus mercaderías
  - tus bienes
  lexicon: HALOT
  rationale: En Ezequiel 27 el sustantivo se refiere al conjunto de bienes comerciados. «Tu mercancía» es directo y concordante con el inventario de la línea.
theological_decisions:
- issue: Tratamiento del término divino ausente y mantenimiento del marco comercial de Tiro
  english_pob_reading: The verse is a commercial inventory with no divine-name substitution issue in the line itself.
  chosen_spanish_reading: Se mantiene un registro puramente comercial, sin introducir lenguaje devocional ajeno al texto.
  alternative_spanish_readings:
  - No aplica una alternativa teológica significativa
  rationale: El versículo enumera mercancías y no presenta un problema teológico directo; por eso la traducción evita sobreinterpretar o espiritualizar el pasaje.
  doctrine_reference: Ninguna específica; fidelidad contextual al género profético-comercial.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente fue menor y solo ajustó la puntuación sin cambiar el léxico; por eso la versión española sigue la misma decisión semántica del auditor: inventario comercial, con dos términos hebreos oscuros preservados mediante notas alternativas.'
  spanish_consistency_notes:
  - Se mantuvo «mercaderes» para רֹכְלַיִךְ, coherente con el contexto de Ezequiel 27.
  - Se tradujo תְכֵלֶת como «azul», evitando perífrasis innecesarias.
  - Se conservó la ambigüedad de אֲרֻזִים en una nota, no en el texto principal.
  - «Tu mercancía» mantiene la referencia concreta a bienes comerciados en lugar de abstraerla como «comercio».
