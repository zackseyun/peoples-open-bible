translation:
  language: es
  text: Pero el territorio de los hijos de Dan salió más allá de ellos[a]. Entonces los hijos de Dan subieron, pelearon contra Lesem, la capturaron, la hirieron con el filo de la espada, tomaron posesión de ella y habitaron en ella; y llamaron a Lesem Dan[b], según el nombre de Dan, su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "el límite de los hijos de Dan se extendió más allá de ellos". La cláusula hebrea es literalmente espacial; algunas traducciones la interpretan como "su territorio era demasiado pequeño para ellos", pero aquí se conserva la imagen más directa.'
    reason: alternative_reading
  - marker: b
    text: Lesem se asocia con Laís en Jueces 18:7, 14, 27, 29.
    reason: cross_reference
lexical_decisions:
- source_word: גְבוּל בְּנֵי דָן
  english_pob_choice: the territory of the sons of Dan
  chosen_spanish: el territorio de los hijos de Dan
  alternatives_spanish:
  - el límite de los hijos de Dan
  - el territorio de los danitas
  lexicon: HALOT
  rationale: גְבוּל puede significar 'límite', 'frontera' o 'territorio'. En este contexto de reparto territorial, 'territorio' comunica mejor el sentido práctico que el POB ya documentó en inglés. Mantengo 'hijos de Dan' para reflejar el hebraísmo visible del texto.
- source_word: מֵהֶם
  english_pob_choice: beyond them
  chosen_spanish: más allá de ellos
  alternatives_spanish:
  - de ellos
  - extendiéndose más allá de ellos
  lexicon: HALOT
  rationale: La expresión hebrea es espacial y difícil; el POB en inglés preserva esa literalidad en vez de armonizarla con una lectura interpretativa. 'Más allá de ellos' mantiene la imagen de extensión sin introducir la idea no explícita de que 'era demasiado pequeño para ellos'.
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - fueron hacia arriba
  - ascendieron
  lexicon: HALOT
  rationale: עלה suele indicar movimiento ascendente o desplazamiento geográfico/militar. 'Subieron' es la forma natural y fiel en español.
- source_word: וַיִּלָּחֲמוּ עִם לֶשֶׁם
  english_pob_choice: fought against Leshem
  chosen_spanish: pelearon contra Lesem
  alternatives_spanish:
  - combatieron contra Lesem
  - hicieron guerra contra Lesem
  lexicon: HALOT
  rationale: Con un nombre de ciudad, el español pide 'contra' más que un calco de 'con'. 'Pelearon' conserva la acción bélica con claridad. Transcribo el topónimo como 'Lesem' para reflejar el hebreo לֶשֶׁם.
- source_word: לֶשֶׁם
  english_pob_choice: Leshem
  chosen_spanish: Lesem
  alternatives_spanish:
  - Leshem
  - Laís
  lexicon: HALOT
  rationale: El texto hebreo de este versículo lee לֶשֶׁם. En español, 'Lesem' reproduce mejor la vocalización y evita una transliteración híbrida; dejo constancia de la asociación tradicional con 'Laís' en la nota, no en el texto principal.
- source_word: וַיִּלְכְּדוּ אוֹתָהּ
  english_pob_choice: they captured it
  chosen_spanish: la capturaron
  alternatives_spanish:
  - la tomaron
  - la apresaron
  lexicon: HALOT
  rationale: לכד en contexto militar significa 'capturar'. 'La capturaron' es directo y preciso.
- source_word: וַיַּכּוּ אוֹתָהּ לְפִי חֶרֶב
  english_pob_choice: struck it with the edge of the sword
  chosen_spanish: la hirieron a filo de espada
  alternatives_spanish:
  - la golpearon con el filo de la espada
  - la pusieron a filo de espada
  lexicon: HALOT
  rationale: La expresión literal hebrea es 'por la boca/filo de espada'. 'A filo de espada' es un equivalente español establecido que conserva la imagen y la violencia del giro sin sonar forzado.
- source_word: וַיִּרְשׁוּ אוֹתָהּ
  english_pob_choice: they took possession of it
  chosen_spanish: tomaron posesión de ella
  alternatives_spanish:
  - la heredaron
  - la poseyeron
  lexicon: HALOT
  rationale: ירשׁ puede expresar posesión adquirida, a menudo con el matiz de desplazar a otros. 'Tomaron posesión de ella' es claro y mantiene ese valor jurídico/territorial.
- source_word: וַיֵּשְׁבוּ בָהּ
  english_pob_choice: lived in it
  chosen_spanish: habitaron en ella
  alternatives_spanish:
  - vivieron en ella
  - se establecieron en ella
  lexicon: HALOT
  rationale: ישׁב puede significar 'habitar, vivir, asentarse'. 'Habitaron en ella' conserva un registro bíblico sobrio sin alejarse del sentido básico.
- source_word: וַיִּקְרְאוּ לְלֶשֶׁם דָּן
  english_pob_choice: they called Leshem Dan
  chosen_spanish: llamaron a Lesem Dan
  alternatives_spanish:
  - nombraron a Lesem Dan
  - dieron a Lesem el nombre de Dan
  lexicon: HALOT
  rationale: La construcción hebrea indica que le pusieron el nombre Dan a la ciudad. 'Llamaron a Lesem Dan' sigue de cerca el hebreo y suena natural en español.
- source_word: כְּשֵׁם דָּן אֲבִיהֶם
  english_pob_choice: after the name of Dan their father
  chosen_spanish: conforme al nombre de Dan su padre
  alternatives_spanish:
  - según el nombre de Dan su padre
  - en honor del nombre de Dan su padre
  lexicon: HALOT
  rationale: 'כְּשֵׁם expresa comparación/ajuste: ''según, conforme al nombre''. ''Conforme al nombre'' preserva el giro sin forzar una paráfrasis devocional. ''Su padre'' refleja el hebraísmo tribal del original.'
theological_decisions:
- issue: Topónimo hebreo frente a forma tradicional asociada
  english_pob_reading: Leshem is associated with Laish in Judges 18:7, 14, 27, 29.
  chosen_spanish_reading: Mantener Lesem en el texto principal y remitir la asociación con Laís en nota.
  alternative_spanish_readings:
  - sustituir Lesem por Laís en el texto principal
  - dejar solo Lesem sin ninguna nota de asociación
  rationale: El hebreo de este versículo lee לֶשֶׁם. La forma principal debe seguir el testimonio textual inmediato; la relación con Laís pertenece a la tradición de comparación intertextual y se documenta mejor en nota.
  doctrine_reference: Principio de prioridad del texto base y de transparencia textual; no es una cuestión doctrinal sino de crítica textual y onomástica.
translation_notes:
  revision_awareness: 'No se requieren cambios adicionales: la versión española sigue de cerca la lectura hebrea y mantiene la decisión del POB en inglés de preservar el matiz espacial de מֵהֶם y el topónimo לֶשֶׁם, con la nota intertextual correspondiente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general, pero este versículo no lo contiene.
  - Se mantiene 'hijos de Dan' para reflejar el hebraísmo de בני דן.
  - Se evita 'danitas' en el texto principal para no ocultar la forma literal del original.
  - La frase 'a filo de espada' reproduce el idiomatismo bíblico sin perder naturalidad en español.
  - Los marcadores de nota [a] y [b] aparecen solo donde corresponde en el texto principal.
