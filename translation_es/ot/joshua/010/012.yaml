translation:
  language: es
  text: 'Entonces Josué habló a Yahvé el día en que Yahvé entregó a los amorreos[a] delante de los hijos de Israel[b], y dijo a la vista de Israel: «Sol, detente[c] en Gabaón, y luna[d], en el valle de Ajalón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el amorreo»; el singular puede funcionar aquí como colectivo, es decir, «los amorreos».'
    reason: lexical_alternative
  - marker: b
    text: O «delante de los israelitas». El hebreo dice literalmente «delante de los hijos de Israel».
    reason: lexical_alternative
  - marker: c
    text: O «quédate quieto» o «cesa». El verbo hebreo puede denotar quietud o detención.
    reason: lexical_alternative
  - marker: d
    text: 'El hebreo dice literalmente «y luna, en el valle de Ajalón»; se sobreentiende el verbo de la cláusula anterior: «detente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - se dirigió
  lexicon: HALOT
  rationale: El piel de דבר comunica aquí el acto de hablar; «habló» conserva la distinción respecto de וַיֹּאמֶר, que introduce el dicho citado inmediatamente después.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a YHWH
  - al SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo tiene el nombre divino directo; en este proyecto se usa «Yahvé» como forma española principal, en vez de enmascararlo como «SEÑOR».
- source_word: בְּיוֹם תֵּת יְהוָה
  english_pob_choice: on the day when Yahweh gave
  chosen_spanish: el día en que Yahvé entregó
  alternatives_spanish:
  - el día cuando Yahvé dio
  - cuando Yahvé entregó
  lexicon: HALOT
  rationale: La construcción temporal expresa el momento de la acción; «el día en que» preserva el marco temporal y «entregó» comunica bien la idea de dar/poner en manos.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: el amorreo
  alternatives_spanish:
  - los amorreos
  - el pueblo amorreo
  lexicon: HALOT
  rationale: Aunque el inglés POB pluraliza por claridad, el hebreo está en singular colectivo. En español el singular colectivo «el amorreo» conserva mejor la forma del original sin perder el sentido grupal.
- source_word: לִפְנֵי בְּנֵי יִשְׂרָאֵל
  english_pob_choice: before the sons of Israel
  chosen_spanish: delante de los hijos de Israel
  alternatives_spanish:
  - ante los hijos de Israel
  - delante de los israelitas
  lexicon: HALOT
  rationale: «Delante de» expresa la entrega en presencia o frente a ellos; «hijos de Israel» conserva la expresión genealógica del hebreo y evita neutralizarla sin necesidad.
- source_word: וַיֹּאמֶר לְעֵינֵי יִשְׂרָאֵל
  english_pob_choice: and he said in the sight of Israel
  chosen_spanish: y dijo, a la vista de Israel
  alternatives_spanish:
  - y dijo en presencia de Israel
  - y dijo ante Israel
  lexicon: HALOT
  rationale: לְעֵינֵי es idiomático de visibilidad pública; «a la vista de» es natural en español y mantiene el matiz de acto pronunciado públicamente.
- source_word: שֶׁמֶשׁ ... דּוֹם
  english_pob_choice: Sun, stand still
  chosen_spanish: Sol, detente
  alternatives_spanish:
  - Sol, quédate quieto
  - Sol, estate quieto
  lexicon: HALOT
  rationale: דום puede implicar quietud o cese. «Detente» transmite una orden breve y solemne, sin cargar la frase con una paráfrasis más amplia de la que el hebreo exige.
- source_word: בְּגִבְעוֹן
  english_pob_choice: at Gibeon
  chosen_spanish: en Gabaón
  alternatives_spanish:
  - en Gibeón
  - junto a Gabaón
  lexicon: HALOT
  rationale: «En Gabaón» es una forma española reconocible y se ajusta al valor locativo del hebreo en este contexto poético.
- source_word: וְיָרֵחַ בְּעֵמֶק אַיָּלוֹן
  english_pob_choice: and moon, in the Valley of Aijalon
  chosen_spanish: y tú, luna, en el valle de Ajalón
  alternatives_spanish:
  - y luna, en el valle de Ajalón
  - y la luna, en el valle de Ajalón
  lexicon: HALOT
  rationale: El hebreo deja el verbo de la segunda mitad entendido desde la primera orden; en español, la inserción vocativa «tú» ayuda a reproducir esa elipsis sin añadir un verbo no atestiguado.
- source_word: אַיָּלוֹן
  english_pob_choice: Aijalon
  chosen_spanish: Ajalón
  alternatives_spanish:
  - Aijalón
  - Ajalon
  lexicon: HALOT
  rationale: «Ajalón» es una transliteración española estable y legible para este topónimo.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrama; la política del proyecto pide «Yahvé» como forma principal en español. Esto preserva el nombre del pacto sin sustituirlo por una reverencia indirecta.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor del singular hebreo הָאֱמֹרִי
  english_pob_reading: the Amorites
  chosen_spanish_reading: el amorreo
  alternative_spanish_readings:
  - los amorreos
  - el pueblo amorreo
  rationale: Aunque el receptor puede esperar un plural, el hebreo utiliza una forma singular colectiva. Mantenerlo ayuda a no borrar una tensión morfológica que el texto presenta.
  doctrine_reference: Hebrew collective singular usage in narrative context
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético (WLC) y se integró el audit trail inglés. No se detectaron cambios editoriales nuevos en la revisión más reciente; la redacción española conserva las decisiones clave de nombre divino, singular colectivo y elipsis poética de la segunda cláusula.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se conserva «hijos de Israel» para reflejar la fórmula hebrea del texto base.
  - 'Se evita una traducción mecánica de la segunda cláusula: la elipsis poética se compensa con la vocación «tú» sin añadir un verbo no presente explícitamente.'
  - «Ajalón» se unifica como topónimo español en todo el versículo.
