translation:
  language: es
  text: ¿Qué derecho tiene mi amada en mi casa[c][b][a], cuando ha hecho sus muchas maquinaciones perversas? ¿Puede la carne santa apartar tu maldad de ti? ¡Entonces te alegras!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué asunto tiene mi amada en mi casa...?».'
    reason: lexical_alternative
  - marker: b
    text: «Carne santa» probablemente alude a carne de sacrificios; la idea es que un rito sagrado no quita la maldad.
    reason: cultural_note
  - marker: c
    text: 'El hebreo es difícil; literalmente: «y carne santa pasará de sobre ti, porque tu maldad—entonces te alegras».'
    reason: alternative_reading
lexical_decisions:
- source_word: מֶה
  english_pob_choice: What right
  chosen_spanish: ¿Qué derecho tiene...
  alternatives_spanish:
  - ¿Qué asunto tiene...
  - ¿Qué hace...
  - ¿Qué negocio tiene...
  lexicon: HALOT
  rationale: La expresión hebrea מֶה לְ... בְּ... es idiomática y pregunta por legitimidad o lugar de pertenencia, no solo por identidad. En español, «¿Qué derecho tiene...?» comunica bien la fuerza retórica sin sonar forzado.
- source_word: לִידִידִי
  english_pob_choice: my beloved
  chosen_spanish: mi amado
  alternatives_spanish:
  - mi querido
  - mi amado mío
  - mi bienamado
  lexicon: HALOT
  rationale: יְדִיד puede significar amado o querido. «Mi amado» conserva el tono relacional e irónico del texto, y evita una paráfrasis excesiva.
- source_word: בְּבֵיתִי
  english_pob_choice: in my house
  chosen_spanish: en mi casa
  alternatives_spanish:
  - en mi templo
  - en mi morada
  lexicon: HALOT
  rationale: El hebreo dice literalmente «casa». En contexto jeremiano se refiere al templo, pero en español la traducción literal «mi casa» es clara y deja visible el término del original.
- source_word: עֲשׂוֹתָהּ הַמְזִמָּתָה הָרַבִּים
  english_pob_choice: when she has done her many wicked schemes
  chosen_spanish: si ha hecho sus muchos planes perversos
  alternatives_spanish:
  - cuando ha hecho sus muchos planes perversos
  - tras haber hecho sus muchas maquinaciones
  - por haber hecho sus muchos planes perversos
  lexicon: HALOT
  rationale: 'La construcción es difícil. Opto por una formulación española natural que preserve la acusación: la posesión «sus» recoge el sufijo, y «planes perversos» transmite el valor negativo de מְזִמָּה sin endurecerlo más allá de lo que el hebreo exige.'
- source_word: וּבְשַׂר קֹדֶשׁ
  english_pob_choice: holy flesh
  chosen_spanish: la carne santa
  alternatives_spanish:
  - carne santa
  - carne consagrada
  - carne sagrada
  lexicon: HALOT
  rationale: «Carne santa» conserva la literalidad del hebreo y su posible referencia sacrificial. Añadir el artículo ayuda al español y mantiene el referente cultual sin imponer una glosa interpretativa.
- source_word: יַעַבְרוּ מֵעָלַיִךְ
  english_pob_choice: remove your evil from you
  chosen_spanish: apartar tu maldad de ti
  alternatives_spanish:
  - pasar de ti
  - quitar tu maldad de ti
  - remover tu maldad de ti
  lexicon: HALOT
  rationale: El verbo עבר aquí es difícil; el sentido probable es que algo «pase de sobre» la persona, es decir, que la contaminación o culpa se aparte. «Apartar tu maldad de ti» preserva esa lógica sin sobreexplicar el mecanismo ritual.
- source_word: רָעָתֵכִי
  english_pob_choice: your evil
  chosen_spanish: tu maldad
  alternatives_spanish:
  - tu mal
  - tu perversidad
  - tu maldad/tu desgracia
  lexicon: HALOT
  rationale: En este contexto moral-cultual, רָעָה apunta a culpa o maldad, no solo calamidad. «Maldad» mantiene esa fuerza ética de modo natural en español.
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese caso
  - Entonces mismo
  lexicon: HALOT
  rationale: 'אָז marca el resultado irónico: si el ritual pudiera limpiar, entonces vendría la celebración. «Entonces» reproduce bien el enlace lógico.'
- source_word: תַּעֲלֹזִי
  english_pob_choice: you rejoice
  chosen_spanish: te alegrarás
  alternatives_spanish:
  - exultarás
  - te regocijarás
  - te alegrarías
  lexicon: HALOT
  rationale: El verbo expresa júbilo/exultación. «Te alegrarás» es una solución castellana clara y digna; en este cierre irónico, el tono queda suficientemente marcado por el contexto y la puntuación.
theological_decisions:
- issue: Identidad del destinatario implícito en femenino
  english_pob_reading: Judah/Jerusalem is addressed ironically as the LORD's beloved covenant people.
  chosen_spanish_reading: Judá/Jerusalén es interpelada irónicamente como el amado del pacto de Yahvé.
  alternative_spanish_readings:
  - un grupo cualquiera de adoradores
  - la comunidad del templo sin ironía explícita
  rationale: Las formas verbales y pronominales femeninas del hebreo apuntan a una colectividad femenina, normalmente Judá o Jerusalén. En español conviene mantener esa lectura implícita sin añadir el nombre al texto, para no salirnos del hebreo, pero sí aclarar que el tono es irónico y de pacto.
  doctrine_reference: Jeremías 11:15; lenguaje profético sobre la infidelidad del pacto
- issue: Eficacia del rito sacrificial
  english_pob_reading: The verse denies that participation in holy sacrificial meat can remove Judah's moral guilt.
  chosen_spanish_reading: El versículo niega que la carne santa del sacrificio pueda apartar la culpa moral de Judá.
  alternative_spanish_readings:
  - el versículo habla solo de ritual en general
  - el texto es demasiado oscuro para afirmar con certeza el punto
  rationale: La asociación de «carne santa» con «tu maldad» sugiere fuertemente una crítica a confiar en el rito para cancelar la culpa persistente. La formulación española conserva esa tensión cultual y moral sin convertirla en una explicación excesiva.
  doctrine_reference: Jeremías 11:15; crítica profética al ritual sin obediencia
translation_notes:
  revision_awareness: El contexto inglés POB ya había decidido mantener la rareza del hebreo mediante una pregunta retórica, conservar «holy flesh» como imagen cultual y señalar la dificultad textual en una nota. La versión española sigue esa línea, pero ajusta la sintaxis para que suene natural en español y mantenga la tensión entre rito y culpa.
  spanish_consistency_notes:
  - Se usa «Yahvé» como nombre divino según el estándar del proyecto, aunque en este versículo no aparece explícitamente.
  - Se prefirió «mi amado» / «amado» antes que «Cristo» o cualquier término eclesiástico, porque el texto habla de una relación de pacto, no de un título cristológico.
  - «Carne santa» conserva el paralelismo con la nota sobre sacrificio; no se sustituyó por una glosa interpretativa en el cuerpo del texto.
  - «Maldad» mantiene la fuerza moral de רָעָה en este contexto, en vez de suavizarlo a «mal» o «desgracia».
