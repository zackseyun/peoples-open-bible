translation:
  language: es
  text: 'Y aconteció que, cuando Jeremías terminó de hablar a todo el pueblo todas las palabras de Yahvé, el Dios de ellos[a], con las cuales Yahvé, el Dios de ellos, lo había enviado a ellos: todas estas palabras[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé su Dios», es decir, «Yahvé, el Dios de ellos».'
    reason: claridad_posesivo
  - marker: b
    text: El hebreo repite «todas estas palabras» para dar énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened / And
  chosen_spanish: Y aconteció que
  alternatives_spanish:
  - Y sucedió que
  - Y fue que
  lexicon: HALOT
  rationale: La fórmula narrativa וַיְהִי introduce transición. En español bíblico moderno, «Y aconteció que» conserva el valor narrativo sin ser demasiado arcaico.
- source_word: כְּכַלּוֹת
  english_pob_choice: when ... had finished
  chosen_spanish: cuando ... terminó
  alternatives_spanish:
  - cuando hubo terminado
  - al terminar
  lexicon: HALOT
  rationale: El infinitivo con כ expresa secuencia temporal; «cuando Jeremías terminó» transmite la acción completada antes de la siguiente.
- source_word: לְדַבֵּר
  english_pob_choice: speaking
  chosen_spanish: de hablar
  alternatives_spanish:
  - de decir
  - hablando
  lexicon: HALOT
  rationale: Con כְּכַלּוֹת forma el modismo «terminar de hablar». En español suena natural y conserva el acto verbal concreto.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - todo el pueblo reunido
  lexicon: HALOT
  rationale: עָם aquí designa al grupo presente y escuchando a Jeremías; «pueblo» es preciso y idiomático.
- source_word: אֶת כָּל דִּבְרֵי יְהוָה
  english_pob_choice: all the words of Yahweh
  chosen_spanish: todas las palabras de Yahvé
  alternatives_spanish:
  - todo lo que Yahvé dijo
  - todo el mensaje de Yahvé
  lexicon: HALOT
  rationale: דִּבְרֵי se mantiene como «palabras» para preservar la formulación concreta del discurso profético. Se conserva «Yahvé» por la política del texto español POB.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» en el texto español, siguiendo la norma del proyecto y preservando el nombre propio del pacto.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ellos
  lexicon: HALOT
  rationale: Aunque la forma hebrea tiene sufijo plural, el sentido es singular por la referencia a YHWH; en español, «su Dios» es claro y fiel.
- source_word: אֲשֶׁר שְׁלָחוֹ יְהוָה אֱלֹהֵיהֶם אֲלֵיהֶם
  english_pob_choice: with which Yahweh their God had sent him to them
  chosen_spanish: con las que Yahvé su Dios lo había enviado a ellos
  alternatives_spanish:
  - que Yahvé su Dios le había enviado para ellos
  - mediante las cuales Yahvé su Dios lo había enviado a ellos
  lexicon: HALOT
  rationale: El relativo modifica «las palabras». «Con las que» sigue el vínculo hebreo entre el mensaje y la misión profética, evitando diluir el objeto del envío.
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
  - todas estas cosas
  - todos estos asuntos
  lexicon: HALOT
  rationale: La repetición final de דְּבָרִים se mantiene como «palabras» para conservar el énfasis retórico de la duplicación.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa el Tetragrámaton directamente. En español POB, la opción establecida es «Yahvé», que preserva el nombre divino sin sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Spanish project default: Yahvé'
translation_notes:
  revision_awareness: El contexto auditado en inglés está en alta concordancia con el hebreo; la única decisión de énfasis a conservar en español es la repetición final de «todas estas palabras», reflejada en una nota breve. No se requieren revisiones textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva la repetición final como énfasis retórico, no como duplicación accidental.
  - «Palabras» se usa en ambas ocurrencias de דִּבְרֵי / הַדְּבָרִים para sostener la correspondencia léxica.
