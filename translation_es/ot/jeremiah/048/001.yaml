revisions:
- from: 'Con respecto a Moab: Así dice Yahvé de los ejércitos[a], el Dios de Israel: ¡Ay de Nebo, porque ha sido devastada! Kiriatáin es puesta en vergüenza; es capturada. La fortaleza[b] es puesta en vergüenza y quebrantada.'
  to: 'Acerca de Moab: Así dice Yahvé de los ejércitos[a], el Dios de Israel: ¡Ay de Nebo, porque ha sido devastada! Kiriataim es avergonzada; ha sido capturada.[b] La fortaleza es avergonzada y destrozada.'
  rationale: Se ajusta el español para que suene más natural sin perder la fidelidad al hebreo ni a las decisiones auditadas. «Acerca de Moab» conserva el valor amplio del encabezado profético. «Kiriataim» evita una transliteración extraña. «Es avergonzada» y «ha sido capturada» comunican mejor la secuencia de juicio sobre la ciudad. La nota [b] se ancla en la cláusula de captura porque la alternativa «Misgab» corresponde al segmento siguiente del hebreo en la auditoría inglesa y debe seguir presente; no obstante, idealmente el anclaje estaría sobre «La fortaleza» si el sistema lo permite en una revisión posterior.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:44:52Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo y sigue la mayoría de las decisiones auditadas: «Yahvé», el encabezado no adversativo para לְמוֹאָב, «¡Ay de!», y la nota alternativa sobre הַמִּשְׂגָּב como posible topónimo. Sin embargo, hay varios puntos que conviene corregir para mayor fidelidad y mejor español: «Kiriatáin» se aparta innecesariamente de la forma auditada Kiriathaim; «es puesta en vergüenza» suena poco natural en español; y «quebrantada» para וָחָתָּה es menos preciso aquí que una forma como «destrozada» o «hecha pedazos».'
  spanish_quality_summary: El texto es generalmente claro y digno, pero tiene giros algo forzados. «Con respecto a Moab» es correcto aunque algo administrativo; «Acerca de Moab» suena más natural en registro bíblico moderno. «Es puesta en vergüenza» es comprensible pero poco idiomático; «queda avergonzada» o «es avergonzada» lee mejor. La transliteración «Kiriatáin» resulta extraña para lectores hispanos y no preserva bien la forma reconocible del topónimo.
  glossary_alignment: Alineación buena con la terminología del proyecto en «Yahvé», «Dios», y el tratamiento de הַמִּשְׂגָּב con nota alternativa. «De los ejércitos» es aceptable para צְבָאוֹת. No hay conflicto teológico serio; los ajustes son principalmente de fidelidad léxica fina y legibilidad en español.
  issues:
  - severity: medium
    issue: «Kiriatáin» como forma del topónimo
    rationale: La forma propuesta no sigue de cerca el audit trail inglés «Kiriathaim» ni una adaptación española ampliamente reconocible. Puede confundir al lector y parece una castellanización ad hoc. Conviene mantener «Kiriataim» o «Quiriataim»; aquí «Kiriataim» preserva mejor la forma de base.
  - severity: medium
    issue: «es puesta en vergüenza» es poco natural
    rationale: Aunque intenta reflejar el causativo pasivo de הֹבִישָׁה, en español suena rígido y poco idiomático. «queda avergonzada» mantiene bien el resultado pasivo de deshonra pública sin sonar a calco.
  - severity: low
    issue: «Con respecto a Moab» suena demasiado administrativo
    rationale: Es fiel al valor amplio de לְ, pero «Acerca de Moab» es más natural y bíblico en español general, conservando la misma amplitud semántica.
  - severity: low
    issue: «quebrantada» debilita la imagen de וָחָתָּה
    rationale: En esta secuencia de juicio contra una ciudad/fortaleza, una forma más concreta como «destrozada» o «hecha pedazos» comunica mejor el colapso material que el inglés auditado «shattered» quiso preservar.
  revised_spanish_text: 'Acerca de Moab: Así dice Yahvé de los ejércitos[a], el Dios de Israel: ¡Ay de Nebo, porque ha sido devastada! Kiriataim es avergonzada; ha sido capturada.[b] La fortaleza es avergonzada y destrozada.'
  revised_footnotes:
  - marker: a
    text: O «Contra Moab» en el encabezado.
    reason: alternative_reading
  - marker: b
    text: O «Misgab», si se toma como nombre de lugar en vez de «la fortaleza».
    reason: alternative_reading
  revision_rationale: Se ajusta el español para que suene más natural sin perder la fidelidad al hebreo ni a las decisiones auditadas. «Acerca de Moab» conserva el valor amplio del encabezado profético. «Kiriataim» evita una transliteración extraña. «Es avergonzada» y «ha sido capturada» comunican mejor la secuencia de juicio sobre la ciudad. La nota [b] se ancla en la cláusula de captura porque la alternativa «Misgab» corresponde al segmento siguiente del hebreo en la auditoría inglesa y debe seguir presente; no obstante, idealmente el anclaje estaría sobre «La fortaleza» si el sistema lo permite en una revisión posterior.
