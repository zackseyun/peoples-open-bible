translation:
  language: es
  text: Y el Señor les dará pan de angustia y agua de opresión[a]; pero ya no se ocultará tu maestro[b], y tus ojos verán a tu maestro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pan de adversidad» y «agua de aflicción».
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo también puede leerse: «tus maestros ya no estarán escondidos» o, tradicionalmente, «tu maestro ya no será retirado a un rincón».'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Maestro
  lexicon: HALOT
  rationale: El hebreo aquí designa al Señor divino; en este proyecto el nombre del pacto se vierte como «Yahvé» y no se enmascara como «SEÑOR». Mantiene la referencia teológica directa del original.
- source_word: לֶחֶם צָר
  english_pob_choice: bread of distress
  chosen_spanish: pan de angustia
  alternatives_spanish:
  - pan de distress
  - pan de adversidad
  - pan de aflicción
  lexicon: HALOT
  rationale: «צָר» funciona adjetivalmente con «pan» y expresa estrechez, dificultad o aflicción. «Angustia» comunica bien esa carga en español natural sin perder el matiz de alimento marcado por la miseria.
- source_word: מַיִם לָחַץ
  english_pob_choice: water of oppression
  chosen_spanish: agua de opresión
  alternatives_spanish:
  - agua de aflicción
  - agua de adversidad
  lexicon: HALOT
  rationale: «לָחַץ» conserva la idea de presión, opresión o aflicción. «Opresión» mantiene el paralelismo con «pan de angustia» y refleja con claridad la fuerza del término.
- source_word: יִכָּנֵף
  english_pob_choice: will ... hide himself
  chosen_spanish: se ocultará
  alternatives_spanish:
  - será ocultado
  - se retirará a un rincón
  lexicon: HALOT
  rationale: El nifal de כנף aquí apunta a quedar oculto o no estar visible. En español, «se ocultará» preserva el sentido personal sin forzar una expresión idiomática ajena.
- source_word: מוֹרֶיךָ
  english_pob_choice: your teacher
  chosen_spanish: tu maestro
  alternatives_spanish:
  - tus maestros
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural morfológica, el contexto permite un singular colectivo o de honorífico. «Tu maestro» conserva esa tensión y suena natural en español; se deja constancia de la alternativa plural.
- source_word: עֵינֶיךָ רֹאוֹת
  english_pob_choice: your eyes will see
  chosen_spanish: tus ojos verán
  alternatives_spanish:
  - verás con tus propios ojos
  lexicon: HALOT
  rationale: La formulación literal en español transmite la énfasis hebrea sobre percepción directa sin añadir expansión interpretativa.
theological_decisions:
- issue: Identidad de מוֹרֶיךָ («tu maestro»)
  english_pob_reading: A non-specified 'teacher' in the main text, without capitalizing or explicitly identifying the referent as God.
  chosen_spanish_reading: Un «maestro» no especificado, sin mayúscula teológica ni identificación explícita.
  alternative_spanish_readings:
  - tus maestros
  - tu Maestro (referencia divina explícita)
  rationale: El hebreo permite leer el término en singular o plural, y el contexto no obliga a resolver si se trata de un mediador humano o de una referencia divina. La redacción española conserva esa tensión en vez de cerrarla.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se siguió de cerca el paquete original hebreo y el rastro de auditoría en inglés. No se hicieron ajustes de revisión posteriores; el texto inglés vigente se mantuvo como referencia de decisiones léxicas y teológicas, preservando la ambigüedad documentada de מוֹרֶיךָ y la imagen de provisión afligida en la primera cola.
  spanish_consistency_notes:
  - Se usó «Yahvé» para אֲדֹנָי conforme al estándar del proyecto.
  - Se prefirió «maestro» en singular para reflejar la lectura principal de la auditoría, manteniendo la alternativa plural en nota.
  - Se mantuvo el paralelismo con «pan / agua» y con «angustia / opresión» sin suavizar el tono del versículo.
  - Se evitó mayúscula teológica en «maestro» para no forzar una identificación doctrinal no resuelta por el hebreo.
