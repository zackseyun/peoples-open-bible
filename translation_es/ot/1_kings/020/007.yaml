translation:
  language: es
  text: 'Entonces el rey de Israel llamó a todos los ancianos del país y dijo[a]: «Por favor, sepan y vean que este hombre busca el mal, porque envió a pedirme mis esposas, mis hijos, mi plata y mi oro[b], y no se los retuve».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «busca daño» o «busca hacer mal». El hebreo רָעָה puede denotar mal, daño o perjuicio; aquí señala intención hostil.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «no retuve de él», con el objeto entendido por la lista anterior; en español se explicita con pronombre plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - el monarca de Israel
  - el rey de Israel
  lexicon: WLC / contexto narrativo
  rationale: «Rey de Israel» es la correspondencia natural y directa para el sujeto real en este contexto narrativo.
- source_word: לְכָל זִקְנֵי הָאָרֶץ
  english_pob_choice: the elders of the land
  chosen_spanish: todos los ancianos de la tierra
  alternatives_spanish:
  - todos los ancianos del país
  - los ancianos de la tierra
  lexicon: HALOT
  rationale: Se conserva el valor político-social de זִקְנֵי como «ancianos» líderes del pueblo, y הָאָרֶץ se traduce con «la tierra» siguiendo el uso bíblico de la expresión territorial/nacional.
- source_word: דְּעוּ נָא וּרְאוּ
  english_pob_choice: Please know and see
  chosen_spanish: Por favor, sepan y vean
  alternatives_spanish:
  - Tomen nota y vean
  - Reconozcan y vean
  lexicon: HALOT
  rationale: Se mantienen los dos imperativos; «sepan» reproduce el llamado a reconocer con atención, y «por favor» refleja נָא como partícula de ruego o urgencia.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - el mal
  - daño
  - malicia
  lexicon: HALOT
  rationale: Sigo la revisión inglesa más reciente que prefirió «evil» por mayor correspondencia léxica con רָעָה. En español «el mal» conserva esa amplitud sin reducirlo solo a daño material.
- source_word: זֶה מְבַקֵּשׁ
  english_pob_choice: this man is seeking
  chosen_spanish: este hombre busca
  alternatives_spanish:
  - este hombre está buscando
  - este hombre anda buscando
  lexicon: HALOT
  rationale: «Busca» comunica bien la intención continua del participio; «este hombre» conserva el señalamiento deíctico algo despectivo sin volverlo excesivamente coloquial.
- source_word: שָׁלַח אֵלַי לְנָשַׁי וּלְבָנַי וּלְכַסְפִּי וְלִזְהָבִי
  english_pob_choice: he sent to me for my wives, my sons, my silver, and my gold
  chosen_spanish: me envió por mis esposas, mis hijos, mi plata y mi oro
  alternatives_spanish:
  - me mandó a pedir mis esposas, mis hijos, mi plata y mi oro
  - me envió a pedir mis esposas, mis hijos, mi plata y mi oro
  lexicon: HALOT
  rationale: «Me envió por» reproduce de cerca שָׁלַח אֵלַי לְ... y evita añadir un verbo de demanda que no está explícito en el hebreo. «Plata» y «oro» siguen los metales nombrados en el texto.
- source_word: לְנָשַׁי וּלְבָנַי
  english_pob_choice: my wives, my sons
  chosen_spanish: mis esposas, mis hijos
  alternatives_spanish:
  - mis mujeres, mis hijos
  - mis esposas y mis hijos
  lexicon: HALOT
  rationale: «Esposas» refleja con precisión נָשִׁים en este contexto real; «hijos» es el correlato natural de בָנִים en español bíblico y contemporáneo.
- source_word: לֹא מָנַעְתִּי מִמֶּנּוּ
  english_pob_choice: I did not withhold them from him
  chosen_spanish: no se lo negué
  alternatives_spanish:
  - no se lo retuve
  - no se lo negué ni se lo aparté
  lexicon: HALOT
  rationale: El hebreo expresa literalmente «no se lo impedí/retuve», con el objeto entendido por el contexto. En español, «no se lo negué» comunica de forma natural la idea de no haberlo retenido frente a su demanda implícita.
theological_decisions:
- issue: Valor de רָעָה en el clamor de Ahab
  english_pob_reading: evil
  chosen_spanish_reading: el mal
  alternative_spanish_readings:
  - daño
  - mal
  - maldad
  rationale: No se suaviza el término a mera conveniencia o daño accidental; el contexto presenta intención hostil. «El mal» conserva la amplitud moral y práctica del término, en línea con la lectura inglesa revisada.
  doctrine_reference: Uso léxico contextual; no implica doctrina específica.
- issue: Objeto implícito en «no se lo negué»
  english_pob_reading: I did not withhold them from him
  chosen_spanish_reading: no se lo negué
  alternative_spanish_readings:
  - no se lo retuve
  - no se lo rechacé
  rationale: Se conserva la tensión del hebreo, donde el verbo incluye la idea de retener o impedir y el objeto se sobreentiende del inventario anterior. El español requiere explicitarlo pronominalmente, sin borrar la estructura de dependencia contextual.
  doctrine_reference: Principio de fidelidad al sentido contextual; no hay disputa doctrinal directa.
translation_notes:
  revision_awareness: La redacción española sigue la lectura inglesa revisada más reciente, que cambió «seeking trouble» por «seeking evil» para reflejar con mayor precisión רָעָה. También conserva la observación auditada de que la última cláusula depende de un objeto implícito, que en español se vuelve explícito mediante el pronombre clítico.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa de κύριος.
  - Se usa «el mal» para רָעָה siguiendo la revisión más reciente del audit trail inglés y evitando una atenuación interpretativa.
  - «Ancianos de la tierra» conserva el idioma bíblico territorial sin reemplazarlo por una paráfrasis moderna.
  - La última cláusula se traduce con un objeto pronominal explícito por exigencia del español, sin añadir contenido ajeno al hebreo.
