translation:
  language: es
  text: La ofrenda de grano y la ofrenda de libación han sido suprimidas de la casa de Yahvé[a]; los sacerdotes están de duelo, los ministros[b] de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La ofrenda de grano y la ofrenda de libación son suprimidas de la casa de Yahvé» o «han cesado en la casa de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los que sirven a Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָכְרַת
  english_pob_choice: are cut off
  chosen_spanish: han sido cortadas
  alternatives_spanish:
  - han sido removidas
  - están cortadas
  lexicon: HALOT
  rationale: 'El Hophal expresa resultado pasivo: las ofrendas han quedado cesadas o apartadas. En español, el perfecto compuesto pasivo comunica bien ese estado resultante sin perder la fuerza de interrupción cultual.'
- source_word: מִנְחָה
  english_pob_choice: grain offering
  chosen_spanish: ofrenda de grano
  alternatives_spanish:
  - ofrenda
  - ofrenda de cereal
  lexicon: HALOT
  rationale: En contexto ritual con נֶסֶךְ, se trata de la ofrenda cereal/mינחה, no de un regalo genérico. 'Ofrenda de grano' es claro y natural en español bíblico moderno.
- source_word: נֶסֶךְ
  english_pob_choice: drink offering
  chosen_spanish: ofrenda de libación
  alternatives_spanish:
  - ofrenda de bebida
  - libación
  lexicon: HALOT
  rationale: '''Libación'' conserva el sentido técnico cultual de una ofrenda vertida. Aunque menos cotidiana que ''bebida'', refleja mejor el acto ritual que el texto presupone.'
- source_word: מִבֵּית יְהוָה
  english_pob_choice: from the house of Yahweh
  chosen_spanish: de la casa de Yahvé
  alternatives_spanish:
  - del templo de Yahvé
  - de la casa de Yahweh
  lexicon: HALOT
  rationale: '''Casa'' preserva la expresión hebrea y su resonancia de santuario. Se mantiene ''Yahvé'' por la decisión POB para el Tetragrámaton, en lugar de sustituirlo por un título.'
- source_word: אָבְלוּ
  english_pob_choice: mourn
  chosen_spanish: hacen duelo
  alternatives_spanish:
  - guardan luto
  - se lamentan
  lexicon: HALOT
  rationale: El verbo denota luto/mourning, con tono comunitario y ritual. 'Hacen duelo' es idiomático en español y conserva la solemnidad del lamento sacerdotal.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del templo
  lexicon: HALOT
  rationale: Es el equivalente directo y más transparente para el plural en este contexto de servicio del santuario.
- source_word: מְשָׁרְתֵי יְהוָה
  english_pob_choice: the ministers of Yahweh
  chosen_spanish: los ministros de Yahvé
  alternatives_spanish:
  - los que sirven a Yahvé
  - los servidores de Yahvé
  lexicon: HALOT
  rationale: El participio expresa función oficial de servicio litúrgico. 'Ministros' conserva esa formalidad y el paralelismo con 'los sacerdotes', sin diluirlo en un sentido demasiado genérico.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la política POB de transliterarlo, 'Yahvé' preserva el nombre propio del pacto y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Cultic offering terminology
  english_pob_reading: grain offering / drink offering
  chosen_spanish_reading: ofrenda de grano / ofrenda de libación
  alternative_spanish_readings:
  - ofrenda vegetal / ofrenda líquida
  - ofrenda de cereal / libación
  rationale: 'La pareja cultual debe mantenerse diferenciada: מִנְחָה no es una ofrenda cualquiera y נֶסֶךְ no es meramente ''bebida''. La traducción conserva la distinción ritual y evita neutralizar el vocabulario del templo.'
  doctrine_reference: 'DOCTRINE.md: lexical precision in sacrificial terminology'
translation_notes:
  revision_awareness: 'Coincide con el auditor inglés en la estructura y en las decisiones léxicas clave: preservación del nombre divino, distinción entre ofrenda de grano y ofrenda de libación, y el sentido de duelo de los sacerdotes. Se ajusta la sintaxis al español natural sin alterar la fuerza pasiva/resultativa del verbo inicial.'
  spanish_consistency_notes:
  - Se mantiene la transliteración 'Yahvé' de forma uniforme para יְהוָה.
  - '''Ofrenda de libación'' conserva el término cultual técnico y evita una paráfrasis más general.'
  - '''Hacen duelo'' comunica luto ritual sin añadir interpretación.'
