theological_decisions:
- issue: Bracketed christological material in vv. 7-9
  chosen_reading: Translated the bracketed clauses in the main chapter flow but marked them with square brackets and documented them as likely secondary expansions.
  alternative_readings:
  - Omit the bracketed clauses entirely as later Christian interpolation
  - Translate them without marking, treating them as fully integral to the chapter
  rationale: The Greek witness supplied includes these clauses, and the project requires honest translation of the witness text. Because the material is textually and historically suspect, especially the explicit incarnation-and-faith language, I preserved it transparently with brackets rather than silently omitting or normalizing it.
  doctrine_reference: 'PHILOSOPHY.md: preserve textual complexity transparently; DOCTRINE.md: preserve theological tension rather than resolve it'
- issue: Identity of 'his right hand' in v. 5
  chosen_reading: Left the pronoun as 'his' rather than specifying God or the heavenly king.
  alternative_readings:
  - at God's right hand
  - at the right hand of the Lord
  rationale: The antecedent is not explicitly restated in the Greek. Supplying 'God' would clarify but also interpret. The translation keeps the ambiguity visible.
- issue: Resurrection and judgment in vv. 5-10
  chosen_reading: Rendered the chapter as teaching a universal resurrection with differentiated outcomes and judgment beginning with Israel.
  alternative_readings:
  - Treat the resurrection language as purely metaphorical restoration
  - Restrict the scope to Israel alone
  rationale: The repeated ἀναστήσονται / ἀναστησόμεθα language, followed by glory/dishonor and judgment of Israel and the nations, is most naturally eschatological and universal in scope.
- issue: Meaning of ἐπὶ σκήπτρον ἡμῶν in v. 6
  chosen_reading: Kept the difficult phrase relatively literal as 'each over our scepter.'
  alternative_readings:
  - each according to his tribe
  - each upon his throne
  rationale: The text is uncertain and symbolic. A more interpretive rendering would overstate confidence where the Greek is obscure.
