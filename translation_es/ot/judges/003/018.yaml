revisions:
- from: Y cuando hubo terminado de presentar el tributo[a], despidió al pueblo que llevaba el tributo.
  to: Y cuando hubo terminado de presentar el tributo[a], despidió a la gente que llevaba el tributo.
  rationale: Se mantiene la fidelidad al hebreo y al expediente inglés, pero se ajusta 'pueblo' a 'gente' para una lectura más natural y contextual en español, sin introducir una especificación no presente en el original. También se pule la nota léxica para mayor naturalidad en español.
  reviewer_model: gpt-5.4
