translation:
  language: es
  text: Y mis enemigos están vivos y fuertes, y son muchos los que me odian falsamente[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin motivo» o «sin causa»; el hebreo שָׁקֶר literalmente significa «falsedad/mentira» y puede describir tanto la falsedad de su odio como que ese odio carece de causa.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹיְבַי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - mis adversarios
  - mis foes
  lexicon: HALOT
  rationale: El sustantivo denota enemigos personales o adversarios. «Mis enemigos» es la forma más directa y natural en español, y mantiene el valor relacional del posesivo.
- source_word: חַיִּים
  english_pob_choice: alive
  chosen_spanish: están vivos
  alternatives_spanish:
  - están vivos
  - viven
  - están con vida
  lexicon: HALOT
  rationale: El adjetivo describe a los enemigos como vivos; en español «están vivos» conserva bien la imagen y la contrasta con la aflicción del salmista sin forzar la estructura.
- source_word: עָצֵמוּ
  english_pob_choice: are strong
  chosen_spanish: fuertes
  alternatives_spanish:
  - son fuertes
  - se han fortalecido
  - son poderosos
  lexicon: HALOT
  rationale: El verbo expresa volverse fuerte o poderoso. En español, «fuertes» comunica de modo natural la fuerza presente, con el sentido de vigor o poder que el hebreo transmite.
- source_word: רַבּוּ
  english_pob_choice: are many
  chosen_spanish: son muchos
  alternatives_spanish:
  - se han multiplicado
  - han aumentado
  - son numerosos
  lexicon: HALOT
  rationale: El verbo significa llegar a ser muchos o aumentar. «Son muchos» es breve y idiomático, y refleja bien la queja del salmista sobre su número.
- source_word: שֹׂנְאַי
  english_pob_choice: those who hate me
  chosen_spanish: los que me odian
  alternatives_spanish:
  - mis enemigos
  - los que me aborrecen
  lexicon: HALOT
  rationale: 'El participio funciona como sustantivo: «los que me odian». Se conserva la fuerza verbal, en lugar de reducirlo a otro sustantivo como «enemigos».'
- source_word: שָׁקֶר
  english_pob_choice: falsely
  chosen_spanish: sin motivo
  alternatives_spanish:
  - falsamente
  - sin causa
  - de manera falsa
  lexicon: HALOT
  rationale: El sustantivo «falsehood/lie» funciona aquí adverbialmente. Se opta por «sin motivo» porque en español expresa con claridad la posible idea de odio injustificado; se mantiene la tensión con la alternativa más literal «falsamente».
theological_decisions:
- issue: 'Sentido de שָׁקֶר: falsedad del odio o ausencia de causa'
  english_pob_reading: those who hate me falsely are many; note says it may describe either the falseness of their hatred or its baselessness.
  chosen_spanish_reading: los que me odian sin motivo
  alternative_spanish_readings:
  - los que me odian falsamente
  - los que me odian sin causa
  rationale: 'El hebreo permite ambas lecturas: odio mentiroso o odio inmerecido/injustificado. En español, «sin motivo» conserva la ambigüedad práctica y suena natural; las alternativas se mantienen como opciones válidas.'
  doctrine_reference: Psalm 38:20; lexical note on שָׁקֶר
translation_notes:
  revision_awareness: Se siguió el ajuste del audit trail inglés que prefiere «And my enemies are alive and strong» frente a «my living enemies», por naturalidad. En español se reflejó como «mis enemigos están vivos y fuertes». También se preservó la ambigüedad de שָׁקֶר mediante una nota, tal como el POB inglés la documenta.
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé» fuera del versículo porque no aparecen en el texto.
  - Se prefirió «los que me odian» para preservar el participio hebreo sustantivado.
  - La nota al pie usa una alternativa literal para sostener la tensión léxica documentada.
