translation:
  language: es
  text: Si tienes entendimiento, oye esto; presta atención al sonido[a] de mis palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la voz de mis palabras». La frase hebrea es literalmente «al sonido/la voz de mis palabras».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: HALOT
  rationale: La partícula condicional introduce la apelación de Elihú; en español, «Si» reproduce con naturalidad la condición sin añadir matiz innecesario. La conjunción prefijada no requiere una representación separada en una línea fluida de español moderno.
- source_word: בִּינָה
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - comprensión
  - discernimiento
  - inteligencia
  lexicon: HALOT
  rationale: בִּינָה expresa capacidad de entender o discernir. «Entendimiento» es claro, digno y suficientemente amplio en español para esta apelación al oyente.
- source_word: שִׁמְעָה
  english_pob_choice: hear
  chosen_spanish: oye
  alternatives_spanish:
  - escucha
  - oye atentamente
  - oye y considera
  lexicon: HALOT
  rationale: El imperativo de שׁמע pide oír de forma directa. «Oye» conserva esa fuerza breve y corresponde al tono del paralelo con el segundo verbo, que intensifica la atención.
- source_word: זֹּאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - este asunto
  lexicon: HALOT
  rationale: El demostrativo señala lo que Elihú está diciendo. «Esto» es la forma más sobria y literal en español.
- source_word: הַאֲזִינָה
  english_pob_choice: listen
  chosen_spanish: presta atención
  alternatives_spanish:
  - escucha
  - atiende
  - inclina tu oído
  lexicon: HALOT
  rationale: El verbo intensifica la escucha y pide atención concentrada. «Presta atención» comunica esa intensificación con naturalidad; «inclina tu oído» sería más literal pero más marcado y menos idiomático.
- source_word: לְקוֹל
  english_pob_choice: to the sound of
  chosen_spanish: al sonido de
  alternatives_spanish:
  - a la voz de
  - al eco de
  lexicon: HALOT
  rationale: קוֹל puede significar sonido o voz. Como aquí rige «mis palabras», «al sonido de» conserva la imagen concreta sin reducirla a un simple complemento indirecto. Mantiene además la tensión lexical entre sonido y voz que el inglés POB anotó.
- source_word: מִלָּי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mi խոս?
  - lo que digo
  - mi discurso
  lexicon: HALOT
  rationale: El plural concreto de מִלָּי se refleja mejor con «mis palabras». Es la correspondencia más directa y no diluye la forma plural del hebreo.
theological_decisions:
- issue: Matiz de קוֹל como «sonido» o «voz» en la frase final
  english_pob_reading: The Hebrew phrase is literally 'to the sound/voice of my words.'
  chosen_spanish_reading: «al sonido de mis palabras», dejando visible que el hebreo puede leerse también como «voz»
  alternative_spanish_readings:
  - «a la voz de mis palabras»
  - «al sonido/voz de mis palabras»
  rationale: No hay una decisión doctrinal aquí, pero sí una tensión lexical que conviene no borrar. «Sonido» reproduce bien la imagen y evita personificar indebidamente las palabras; la alternativa «voz» sigue siendo posible y queda preservada en la nota.
  doctrine_reference: Ninguna
- issue: Tratamiento del paralelismo entre dos imperativos de escucha
  english_pob_reading: hear this; listen to the sound of my words
  chosen_spanish_reading: «oye esto; presta atención al sonido de mis palabras»
  alternative_spanish_readings:
  - «escucha esto; escucha el sonido de mis palabras»
  - «oye esto; escucha con atención el sonido de mis palabras»
  rationale: El hebreo usa dos verbos distintos para oír/escuchar, con intensidad creciente. La traducción debe conservar ese paralelismo sin uniformarlo.
  doctrine_reference: Ninguna
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo WLC y el audit trail inglés sin cambios sustantivos respecto de la lectura base: la línea mantiene la estructura condicional y el paralelismo de dos imperativos. La única decisión de forma es conservar la tensión de קוֹל con «sonido», dejando abierta la alternativa «voz» en nota, como en el inglés POB.'
  spanish_consistency_notes:
  - Se prefirió «entendimiento» para בִּינָה y «mis palabras» para מִלָּי, en coherencia con un registro bíblico moderno y claro.
  - Se evitó «dar oído» o «inclina tu oído» por ser más marcados o arcaizantes que la línea base requiere.
  - La nota al pie se vincula a «entendimiento» y conserva la alternativa lexical relevante para קוֹל sin duplicar marcadores.
