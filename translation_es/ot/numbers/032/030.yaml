review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y la pista inglesa: «Pero si» refleja el contraste condicional; «cruzan ... con ustedes» transmite correctamente יַעַבְרוּ אִתְּכֶם; «armados» es una buena opción para חֲלוּצִים; y «en la tierra de Canaán» conserva la expresión geográfica plena. El punto mejorable es וְנֹאחֲזוּ בְתֹכְכֶם, donde «recibirán una posesión entre ustedes» suena poco idiomático en español y no expresa con suficiente naturalidad la idea de ser establecidos/recibir heredad dentro de Israel en Canaán.'
  spanish_quality_summary: La redacción es generalmente clara, pero «recibirán una posesión entre ustedes» resulta algo forzada en español bíblico natural. Una formulación como «recibirán una heredad entre ustedes» mejora la legibilidad y encaja mejor con el contexto de repartición territorial. También conviene alinear la nota con la alternativa inglesa, que habla de quedar establecidos/asentados en posesión, no solo de estar equipados para guerra.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Canaán» está bien. No aparecen términos doctrinales sensibles del glosario principal. La elección «armados» para חֲלוּצִים es aceptable, pero la nota debe conservar mejor la alternativa semántica documentada para וְנֹאחֲזוּ, que es donde la POB inglesa ubicó la nota.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «armados», pero la nota inglesa documenta una alternativa léxica para וְנֹאחֲזוּ.
    rationale: El rastro de auditoría inglés preserva la ambigüedad de אחז en nifal («recibir propiedad» / «ser establecidos/asentados»). Mover la nota a «recibirán una heredad» mantiene la justificación léxica relevante al verbo fuente.
  - severity: medium
    issue: «recibirán una posesión entre ustedes» suena poco idiomático en español.
    rationale: Aunque es comprensible, «posesión» en este contexto territorial suena más rígido que «heredad», y la combinación con «entre ustedes» no fluye bien. «Recibirán una heredad entre ustedes» refleja mejor el registro bíblico-natural y el contexto de repartición de tierra.
  revised_spanish_text: Pero si no cruzan armados con ustedes, entonces recibirán una heredad[a] entre ustedes en la tierra de Canaán.
  revised_footnotes:
  - marker: a
    text: O «serán establecidos entre ustedes en la tierra de Canaán». El verbo hebreo puede denotar quedar establecidos en posesión, no solo el acto de recibirla.
    reason: lexical_alternative
  revision_rationale: Se mejora la naturalidad del español con «heredad» en vez de «posesión» y se reubica la nota al verbo/resultado territorial correcto, preservando la alternativa léxica documentada para וְנֹאחֲזוּ en la auditoría inglesa.
