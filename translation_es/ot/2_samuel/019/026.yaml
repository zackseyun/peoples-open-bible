translation:
  language: es
  text: 'Y cuando llegó a Jerusalén para encontrarse con el rey[a], el rey le dijo: «¿Por qué no fuiste conmigo, Mefibóset?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente en español, «¿Por qué no viniste conmigo, Mefibóset?». El verbo hebreo es literalmente «ir».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Ahora cuando
  - Y aconteció que cuando
  lexicon: HALOT
  rationale: La fórmula narrativa introduce una nueva escena. En español, «Y cuando» conserva la transición temporal con naturalidad, sin añadir una perífrasis más pesada que no exige el hebreo.
- source_word: בָא
  english_pob_choice: he came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: HALOT
  rationale: בוא puede expresar venir o llegar. Aquí el movimiento culmina en Jerusalén, por lo que «llegó» comunica bien la entrada en el lugar sin cambiar el sentido básico.
- source_word: יְרוּשָׁלַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: nombre propio
  rationale: Nombre propio bíblico en forma estándar del español.
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: para salir al encuentro de
  alternatives_spanish:
  - para encontrarse con
  - para ir a recibir
  lexicon: HALOT
  rationale: La expresión hebrea con לִקְרַאת puede implicar salir al encuentro de alguien. «Para salir al encuentro de» reproduce esa idea con mayor precisión que un simple «para encontrar», y evita perder el matiz de desplazamiento hacia el otro.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  lexicon: HALOT
  rationale: Título definido en contexto; en español corresponde de manera directa a «el rey».
- source_word: וַיֹּאמֶר לוֹ הַמֶּלֶךְ
  english_pob_choice: the king said to him
  chosen_spanish: el rey le dijo
  alternatives_spanish:
  - dijo el rey
  lexicon: HALOT
  rationale: Se mantiene el sujeto explícito para claridad narrativa. «Le dijo» conserva el dativo pronominal del hebreo.
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Cuál fue la razón de que
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español, equivalente estándar de לָמָּה.
- source_word: לֹא הָלַכְתָּ עִמִּי
  english_pob_choice: did you not go with me
  chosen_spanish: no fuiste conmigo
  alternatives_spanish:
  - no caminaste conmigo
  - no anduviste conmigo
  lexicon: HALOT
  rationale: Se preserva el verbo de movimiento הלך como «fuiste», en vez de sustituirlo por «viniste», para no desplazar innecesariamente la perspectiva del hebreo. La frase suena natural en español y mantiene la fuerza del reproche.
- source_word: מְפִיבֹשֶׁת
  english_pob_choice: Mephibosheth
  chosen_spanish: Mefi-boset
  alternatives_spanish:
  - Mefiboset
  - Mephiboset
  lexicon: nombre propio hebreo
  rationale: Se adopta una transliteración española habitual y legible del nombre propio, con separación silábica tradicional en español bíblico.
theological_decisions:
- issue: Dirección del movimiento en el reproche de David
  english_pob_reading: did you not go with me
  chosen_spanish_reading: ¿Por qué no fuiste conmigo?
  alternative_spanish_readings:
  - ¿Por qué no viniste conmigo?
  rationale: El hebreo usa הלך, «ir/caminar», y la auditoría inglesa optó por «go» para conservar esa literalidad. En español, «fuiste conmigo» mantiene ese valor verbal y evita una normalización a «viniste» que introduciría una perspectiva distinta.
  doctrine_reference: Precisión semántica del texto fuente; no implica una diferencia doctrinal, sino de fidelidad verbal.
translation_notes:
  revision_awareness: El audit trail inglés no registra revisiones sustantivas y el control cruzado indica alta coincidencia; por eso la propuesta española sigue de cerca la decisión léxica principal, con una nota para la alternativa idiomática posible en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «rey» de forma consistente para הַמֶּלֶךְ.
  - Se conserva la transliteración española estándar del nombre propio, sin ampliar ni explicar el personaje fuera del versículo.
  - La puntuación y el orden de palabras buscan lectura pública natural sin perder el paralelismo con el hebreo.
