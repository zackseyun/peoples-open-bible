review_pass:
  verdict: revise
  source_alignment_summary: El borrador transmite bien la estructura condicional, la santidad del sábado, la prohibición de llevar carga por las puertas de Jerusalén, y el juicio por fuego que consumirá los palacios. Sin embargo, hay un problema de fidelidad léxica y de naturalidad en «entrarla por las puertas», porque el hebreo coordina ‘cargar una carga’ con ‘hacerla entrar / traerla adentro’ y el español propuesto suena forzado. También conviene ajustar la nota [a], ya que el inglés POB conserva como alternativa principal la idea de ‘cargar/llevar una carga’, no ‘obedecerme’.
  spanish_quality_summary: El texto es generalmente claro y digno, pero «cargar una carga» y sobre todo «entrarla» suenan torpes en español e introducen una rigidez innecesaria. «Llevar una carga ni meterla por las puertas» preserva mejor el sentido y la legibilidad. La nota [b] necesita pulirse en estilo tipográfico y redacción.
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. «Día del sábado» es fiel al hebreo יוֹם הַשַּׁבָּת. «Escucharme» es aceptable para שׁמע אל. «Palacios» y «no se apagará» también concuerdan con las decisiones auditadas. El ajuste principal es estilístico-lexical en la expresión de llevar/introducir la carga y en la nota alternativa correspondiente.
  issues:
  - severity: medium
    issue: «entrarla por las puertas» es poco natural en español
    rationale: Aunque intenta reflejar el objeto implícito de וּבֹא, en español neutro bíblico suena forzado. «Meterla» o «introducirla» comunica mejor ‘bring it in’ sin perder el vínculo con la carga mencionada.
  - severity: medium
    issue: La nota [a] no corresponde a la alternativa preservada por el inglés POB
    rationale: La nota inglesa en [a] comenta la expresión hebrea de ‘carry a load / carry a burden’, no «listen to me / obey me». La nota española debe seguir esa decisión documentada.
  - severity: low
    issue: «cargar una carga» resulta redundante de manera poco idiomática
    rationale: El hebreo sí repite la idea de cargar/llevar un peso, pero en español puede preservarse el sentido con «llevar una carga» sin sonar tosco.
  - severity: low
    issue: La nota [b] requiere mejor redacción
    rationale: Debe expresarse con español natural y sin comillas innecesarias o apertura tipográfica incorrecta.
