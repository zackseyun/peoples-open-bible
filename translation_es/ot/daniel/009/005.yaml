translation:
  language: es
  text: Hemos pecado y obrado mal[a], hemos actuado impíamente y nos hemos rebelado, apartándonos de tus mandamientos y de tus juicios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Obrado mal» traduce el matiz de torcedura o iniquidad de la raíz hebrea; también podría expresarse como «cometido iniquidad».
    reason: lexical_alternative
  - marker: b
    text: «Juicios» puede entenderse también como «ordenanzas» o «decretos»; el hebreo admite ese campo semántico jurídico-normativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָטָ֥אנוּ
  english_pob_choice: We have sinned
  chosen_spanish: Hemos pecado
  alternatives_spanish:
  - Pecamos
  lexicon: HALOT
  rationale: El perfecto confesional hebreo expresa una culpa reconocida retrospectivamente; «hemos pecado» mantiene ese valor y suena natural en español bíblico moderno.
- source_word: וְעָוִ֖ינוּ
  english_pob_choice: and done wrong
  chosen_spanish: y obrado mal
  alternatives_spanish:
  - y cometido iniquidad
  - y actuado perversamente
  lexicon: HALOT
  rationale: La raíz עוה comunica torcedura, culpa o iniquidad. «Obrado mal» conserva el sentido moral sin endurecer el español con una formulación demasiado arcaica.
- source_word: ו/הרשענו
  english_pob_choice: and acted wickedly
  chosen_spanish: y actuado impíamente
  alternatives_spanish:
  - y actuado malvadamente
  - y obrado perversamente
  lexicon: HALOT
  rationale: El hiphil de רשע expresa conducta malvada o impía. «Impíamente» distingue este verbo del anterior y preserva el incremento de culpa del hebreo.
- source_word: וּ/מָרָדְנוּ
  english_pob_choice: and rebelled
  chosen_spanish: y nos hemos rebelado
  alternatives_spanish:
  - y nos rebelamos
  - y fuimos rebeldes
  lexicon: HALOT
  rationale: מרד denota rebelión contra una autoridad, aquí de carácter pactal. El reflexivo español conserva bien la acción contra Dios.
- source_word: וְ/ס֥וֹר
  english_pob_choice: turning aside
  chosen_spanish: apartándonos
  alternatives_spanish:
  - apartándonos de
  - desviándonos de
  - y apartándonos
  lexicon: HALOT
  rationale: El infinitivo con valor continuativo pide en español una forma de gerundio o participio que fluya como continuación de la confesión. «Apartándonos» comunica desviación sin perder naturalidad.
- source_word: מִ/מִּצְוֺתֶ֖/ךָ
  english_pob_choice: from your commandments
  chosen_spanish: de tus mandamientos
  alternatives_spanish:
  - de tus mandatos
  - de tus preceptos
  lexicon: HALOT
  rationale: מִצְוֹת se vierte de manera estándar como «mandamientos». «Mandamientos» mantiene el registro de obediencia pactal y es claro para lectores contemporáneos.
- source_word: וּ/מִ/מִּשְׁפָּטֶֽי/ךָ
  english_pob_choice: and your judgments
  chosen_spanish: y de tus juicios
  alternatives_spanish:
  - y de tus decretos
  - y de tus ordenanzas
  lexicon: HALOT
  rationale: משפט puede referirse a decisiones judiciales, juicios u ordenanzas prescritas. «Juicios» conserva el matiz jurídico y permite la ambigüedad productiva que el texto hebreo mantiene.
theological_decisions:
- issue: Conservar la acumulación de verbos confesionales en lugar de resumirla
  english_pob_reading: 'Preserve each verb with separate English expressions: sinned, done wrong, acted wickedly, rebelled, turning aside'
  chosen_spanish_reading: 'Conservar una cadena de cuatro confesiones: pecado, mal obrado, impiedad activa y rebelión, seguida de la desviación'
  alternative_spanish_readings:
  - Hemos pecado y hecho lo malo
  - Hemos pecado, cometido iniquidad y nos hemos rebelado
  rationale: El hebreo intensifica la confesión mediante verbos casi sinónimos pero distinguibles. La versión española conserva esa acumulación para no reducir la carga teológica de la oración de Daniel.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Renderizar מִשְׁפָּטִים como «juicios»
  english_pob_reading: your judgments
  chosen_spanish_reading: tus juicios
  alternative_spanish_readings:
  - tus ordenanzas
  - tus decretos
  rationale: En este contexto de oración confesional, el término conserva fuerza legal y relacional. «Juicios» comunica mejor la referencia a decisiones normativas de Dios sin convertir el texto en una paráfrasis más general.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Coincide con el estado revisado más reciente indicado como sin cambios; no se registran revisiones aplicadas en el paquete auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conserva el paralelismo acumulativo del hebreo con cuatro verbos confesionales y un cierre de desviación.
  - «Mandamientos» y «juicios» siguen la distinción léxico-jurídica del original sin forzar equivalentes eclesiásticos tradicionales.
