  - el cuidado real
  - la previsión real
  rationale: No se traduce como un término teológico de providencia divina, sino como el uso político de πρόνοια referido al apoyo activo del rey. 'Providencia real' conserva la amplitud semántica sin convertirla en un tecnicismo doctrinal.
