theological_decisions:
- issue: Whether to demythologize the sea's 'spirit' into an impersonal natural force
  chosen_reading: Retain 'the spirit of the sea' as a cosmic-personified reality
  alternative_readings:
  - the wind of the sea
  - the force of the sea
  rationale: The verse belongs to a sequence describing cosmic storehouses and angelic administration. Preserving personified cosmology better reflects the text's worldview and avoids modern reductionism.
  doctrine_reference: Preserve theological tension rather than resolve it; do not flatten apocalyptic imagery.
- issue: How to render the final clause identifying the storehouse with an angel
  chosen_reading: Keep the direct wording 'its storehouse is an angel' in the main text
  alternative_readings:
  - its storehouse is under an angel
  - an angel is over its storehouse
  rationale: Although conceptually unusual, the direct wording is what the Ge'ez most straightforwardly presents. A smoother interpretive paraphrase would hide the textual difficulty rather than document it.
  doctrine_reference: When the source is genuinely difficult, prefer transparent English plus footnote over false confidence.
