base_translation:
  language: en
  yaml_path: translation/ot/isaiah/021/011.yaml
  text: 'An oracle concerning Dumah: One calls to me from Seir[a], “Watchman, what of the night? Watchman[b], what of the night?”'
  footnotes:
  - marker: a
    text: Dumah may also echo the Hebrew word for “silence,” and some interpreters connect it with Edom because the next line mentions Seir.
    reason: lexical_alternative
  - marker: b
    text: Or “How far gone is the night?” The Hebrew idiom asks about the state or progress of the night.
    reason: alternative_reading
