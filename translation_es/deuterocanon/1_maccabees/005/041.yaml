translation:
  language: es
  text: Pero si cruzamos y acampamos al otro lado del río,[a] cruzaremos hacia él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a él». La frase griega puede leerse de manera más neutral, pero en este contexto militar probablemente indica un avance en dirección a él.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν δὲ διέλθωμεν
  english_pob_choice: But if we cross over
  chosen_spanish: Pero si cruzamos
  alternatives_spanish:
  - Pero si pasamos
  - Pero si atravesamos
  lexicon: LSJ
  rationale: El griego expresa una contingencia futura con subjuntivo aoristo; en español, «si cruzamos» comunica bien la acción condicional. «Cruzar» conserva la imagen militar de desplazamiento al otro lado, sin sonar forzado.
- source_word: παρεμβάλῃ
  english_pob_choice: camp
  chosen_spanish: acampamos
  alternatives_spanish:
  - levantamos campamento
  - nos instalamos en campamento
  lexicon: LSJ
  rationale: En contexto militar, el verbo indica hacer campamento o acampar. «Acampamos» es natural en español y mantiene el sentido táctico del paso.
- source_word: πέραν τοῦ ποταμοῦ
  english_pob_choice: beyond the river
  chosen_spanish: al otro lado del río
  alternatives_spanish:
  - más allá del río
  - en la otra orilla del río
  lexicon: LSJ
  rationale: La expresión griega señala el lado opuesto del río. «Al otro lado del río» es idiomático en español y conserva la perspectiva espacial sin añadir precisión innecesaria.
- source_word: διαπεράσομεν
  english_pob_choice: we will cross over
  chosen_spanish: cruzaremos
  alternatives_spanish:
  - pasaremos al otro lado
  - atravesaremos
  lexicon: LSJ
  rationale: Se mantiene la repetición del verbo de cruce con una forma natural en español. «Cruzaremos» preserva el movimiento repetido del original y su secuencia militar.
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: hacia él
  alternatives_spanish:
  - a él
  - contra él
  lexicon: LSJ
  rationale: El audit trail inglés corrigió una lectura más agresiva y dejó la frase en un valor direccional más neutral. En español, «hacia él» reproduce con claridad ese matiz de aproximación, sin convertirlo en hostilidad explícita.
translation_notes:
  revision_awareness: El inglés POB revisó πρὸς αὐτόν de «against him» a «to him» para reflejar mejor la dirección neutral de la frase; esta versión española sigue esa revisión y la expresa con «hacia él». También conserva la repetición del verbo de cruce en ambos miembros.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo «cruzamos / cruzaremos» para reflejar la repetición del griego.
  - Se evitó introducir hostilidad explícita en πρὸς αὐτόν, siguiendo la revisión más reciente del audit trail.
  - «Acampar» se usó con sentido militar, no como simple alojamiento.
