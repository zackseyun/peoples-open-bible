revisions:
- from: Y vieron al Dios de Israel[a], y debajo de sus pies había algo como un pavimento de piedra de zafiro[b], como el mismo cielo en pureza.
  to: Y vieron al Dios de Israel, y debajo de sus pies había algo como un pavimento de piedra de zafiro[a][b], como los mismos cielos en claridad.
  rationale: Se corrigió el anclaje de las notas para que ambas queden sobre «zafiro», el término al que realmente explican. Además, se cambió «en pureza» por «en claridad» para reflejar mejor el valor visual de לָטֹהַר, y «el mismo cielo» por «los mismos cielos» para alinearse mejor con הַשָּׁמַיִם y con la formulación del POB en inglés.
