  glossary_alignment: No hay términos de glosario principal en conflicto. «Darío», «el medo», «recibió» y «el reino» concuerdan con la evidencia fuente y con las decisiones del POB. La nota léxica sobre «recibió/tomó» está bien alineada con la racionalidad documentada.
