translation:
  language: es
  text: A sus enemigos los vestiré de vergüenza[a]; pero sobre él florecerá su corona.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su diadema florecerá»; el verbo hebreo sugiere brotar o florecer, y el sustantivo puede designar una corona real o una diadema.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹיְבָיו
  english_pob_choice: his enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - los que le son hostiles
  lexicon: HALOT
  rationale: El sustantivo plural con sufijo de tercera persona masculina singular se vierte de manera natural como «sus enemigos», conservando la referencia posesiva y el sentido básico de oposición hostil.
- source_word: אַלְבִּישׁ
  english_pob_choice: I will clothe
  chosen_spanish: los vestiré
  alternatives_spanish:
  - los cubriré
  - los pondré
  lexicon: HALOT
  rationale: El hiphil de לבשׁ expresa causar que alguien quede vestido. En español, «vestiré» conserva bien la imagen y la agencia del hablante sin volverse áspero.
- source_word: בֹּשֶׁת
  english_pob_choice: with shame
  chosen_spanish: de vergüenza
  alternatives_spanish:
  - de deshonra
  - con vergüenza
  lexicon: HALOT
  rationale: «Vergüenza» comunica el sustantivo con naturalidad en español. Se prefirió la construcción «vestir de vergüenza» para mantener la metáfora idiomática de cubrir con o vestir de una cualidad negativa.
- source_word: וְעָלָיו
  english_pob_choice: but on him
  chosen_spanish: pero sobre él
  alternatives_spanish:
  - y sobre él
  - mientras que sobre él
  lexicon: HALOT
  rationale: La conjunción marca contraste en el paralelismo; «pero» expresa mejor ese giro adversativo. «Sobre él» conserva la imagen espacial del hebreo.
- source_word: יָצִיץ
  english_pob_choice: will flourish
  chosen_spanish: florecerá
  alternatives_spanish:
  - brotará
  - resplandecerá
  lexicon: HALOT
  rationale: El verbo puede sugerir brotar o florecer. Con «corona» como sujeto, «florecerá» mantiene la idea de vitalidad y prosperidad sin perder la metáfora vegetal del hebreo.
- source_word: נִזְרוֹ
  english_pob_choice: his crown
  chosen_spanish: su corona
  alternatives_spanish:
  - su diadema
  - su consagración
  lexicon: HALOT
  rationale: En este contexto real davídico, «corona» es la opción más clara y fiel para el símbolo de realeza. «Diadema» es posible, pero menos natural; «consagración» introduciría una lectura más interpretativa que el verso no exige.
theological_decisions:
- issue: Imagen real de נזרו en un salmo davídico
  english_pob_reading: Rendered as 'his crown' in a royal sense without making an explicit messianic interpretation in the translation.
  chosen_spanish_reading: «su corona» en sentido real, sin explicitar una lectura mesiánica en la traducción.
  alternative_spanish_readings:
  - «su diadema»
  - «su consagración»
  rationale: El hebreo permite una imagen de realeza concreta. La traducción conserva esa tensión y evita imponer una identificación teológica más específica que el texto por sí solo no formula.
  doctrine_reference: Primacía del texto original; conservar la tensión teológica en vez de resolverla por tradición.
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se registran cambios posteriores en el texto fuente inglés; se mantiene la decisión lexical sobre נזרו como ‘crown/diadem’ con la alternativa anotada.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino y el léxico bíblico en español neutro, sin sustituir la imaginería real por términos eclesiásticos.
  - 'La sintaxis conserva el paralelismo y el contraste del hebreo: humillación para los enemigos, florecimiento para el rey.'
  - Se usa una metáfora natural en español («vestir de vergüenza») que preserva el valor figurado del original sin sobreexplicar.
