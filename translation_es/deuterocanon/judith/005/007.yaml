revisions:
- from: Y antiguamente vivieron como forasteros[a] en Mesopotamia, porque no quisieron seguir a los dioses de sus padres[b], que estaban en la tierra de los caldeos.
  to: Y antiguamente vivieron como extranjeros[a] en Mesopotamia, porque no quisieron seguir a los dioses de sus padres[b], que estaban en la tierra de los Caldeos.
  rationale: Se ajusta παρῴκησαν a «vivieron como extranjeros» para preservar mejor la idea de residencia en condición de forastería/extrañeza legal o social. Se mejora la naturalidad de la nota [a], se neutraliza la redacción de la nota [b], y se capitaliza «Caldeos» por convención ortográfica y registro.
