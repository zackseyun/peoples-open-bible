  yaml_path: translation/ot/1_samuel/021/012.yaml
  text: And the servants of Achish said to him[a], “Is this not David, the king of the land? Is this not the one of whom they sang in the dances, saying, ‘Saul has struck down his thousands[b], and David his ten thousands’?”
  footnotes:
