    issue: La nota [a] está mal alineada con el anclaje textual.
    rationale: Está puesta sobre «salió[a]», pero dice «O “salió”» y luego discute נַעַר. Eso no ofrece una alternativa real al lector y mezcla un asunto léxico distinto que pertenece a «siervo».
  - severity: medium
    issue: «Carros» puede sonar demasiado genérico en español contemporáneo.
    rationale: En 2 Reyes 6:15 רָכֶב en contexto militar se entiende mejor como carros de guerra/chariots. «Carros de guerra» evita una lectura moderna de automóviles o carretas comunes.
