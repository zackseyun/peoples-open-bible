translation:
  language: es
  text: Estacas colocadas en un lugar alto, frente al viento, nunca resistirán[a]; así, un corazón tímido, apoyado en un pensamiento necio, nunca resistirá[b] ante cualquier temor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego sugiere objetos expuestos directamente al viento; por eso «frente al viento» también puede entenderse como «contra el viento».
    reason: lexical_alternative
  - marker: b
    text: La negación enfática del griego expresa que ciertamente no resistirá.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρακες
  english_pob_choice: stakes
  chosen_spanish: estacas
  alternatives_spanish:
  - postes
  - picas
  - estacones
  lexicon: LSJ
  rationale: χάρακες designa objetos puntiagudos hincados o colocados como estacas. «Estacas» conserva la imagen concreta y natural del griego, y evita un término más técnico o militar.
- source_word: ἐπὶ μετεώρου κείμενοι
  english_pob_choice: set on a height
  chosen_spanish: colocadas en un lugar alto
  alternatives_spanish:
  - puestas en altura
  - puestas en lo alto
  - colocadas en alto
  lexicon: LSJ
  rationale: La frase describe una posición elevada y expuesta, no algo literalmente suspendido. «En un lugar alto» comunica la vulnerabilidad del sitio con español natural.
- source_word: κατέναντι ἀνέμου
  english_pob_choice: opposite the wind
  chosen_spanish: frente al viento
  alternatives_spanish:
  - opuestas al viento
  - de frente al viento
  - contra el viento
  lexicon: LSJ
  rationale: «Frente al viento» conserva la orientación espacial y es idiomático en español. Mantiene la imagen de exposición directa al viento sin forzar un calco.
- source_word: οὐ μὴ ὑπομείνωσιν / οὐ μὴ ὑπομείνῃ
  english_pob_choice: will never hold out
  chosen_spanish: nunca resistirán / nunca resistirá
  alternatives_spanish:
  - ciertamente no perseverarán / ciertamente no perseverará
  - no resistirán en absoluto
  - no se mantendrán
  lexicon: BDAG/LSJ
  rationale: El οὐ μή intensifica la negación futura. «Nunca resistirán» y «nunca resistirá» expresan con claridad la certeza enfática de que no podrán sostenerse.
- source_word: καρδία δειλή
  english_pob_choice: a timid heart
  chosen_spanish: un corazón tímido
  alternatives_spanish:
  - un corazón cobarde
  - un corazón pusilánime
  - un corazón temeroso
  lexicon: LSJ
  rationale: δειλός puede ser «cobarde» o «temeroso». «Tímido» evita una carga moral más fuerte que el proverbio no exige, pero sí transmite debilidad ante el temor.
- source_word: ἐπὶ διανοήματος μωροῦ
  english_pob_choice: set on a foolish thought
  chosen_spanish: apoyado en un pensamiento necio
  alternatives_spanish:
  - apoyado en un plan necio
  - afincado en una idea necia
  - fundado en un pensamiento necio
  lexicon: LSJ
  rationale: διανόημα puede ser pensamiento, intención o designio. «Pensamiento» mantiene esa amplitud; «necio» traduce μωροῦ con un término directo y bíblicamente reconocible.
- source_word: παντὸς φόβου
  english_pob_choice: any fear
  chosen_spanish: ningún temor
  alternatives_spanish:
  - cualquier temor
  - todo temor
  - cualquier miedo
  lexicon: LSJ
  rationale: La construcción con οὐ μή y παντός expresa una incapacidad absoluta frente a todo temor que aparezca. «Ningún temor» comunica bien la fuerza distributiva y la vulnerabilidad total del corazón.
translation_notes:
  revision_awareness: La versión sigue el texto griego de Swete 1909 y el trazado léxico del audit trail inglés. Se conserva la imagen proverbial de objetos expuestos al viento y del corazón vulnerable al temor, sin suavizar la negación enfática οὐ μή.
  spanish_consistency_notes:
  - Se mantuvo «estacas» para χάρακες, en continuidad con la imagen concreta del inglés POB.
  - «Corazón tímido» traduce δειλή sin cargar innecesariamente la frase con «cobarde».
  - «Pensamiento necio» conserva la amplitud de διανόημα, evitando restringirlo solo a un plan o una idea.
