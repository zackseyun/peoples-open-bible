translation:
  language: es
  text: Quizá la casa de Judá oiga de toda[a] la calamidad que yo pienso traer sobre ellos, para que cada hombre se vuelva de su mal camino[b], y yo perdonaré su iniquidad y su pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todo el desastre'; el hebreo dice literalmente 'todo el mal/desastre'. En este contexto se refiere al juicio que Dios amenaza con traer sobre Judá, no a mal moral en Dios.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''cada hombre''. La forma masculina singular se usa de modo representativo para los miembros de Judá.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוּלַי
  english_pob_choice: Perhaps
  chosen_spanish: Quizá
  alternatives_spanish:
  - Tal vez
  - Quizás
  lexicon: HALOT
  rationale: Expresa con naturalidad la posibilidad o esperanza implícita sin convertirla en certeza.
- source_word: יִשְׁמְעוּ
  english_pob_choice: will hear
  chosen_spanish: oiga
  alternatives_spanish:
  - escuche
  - oiga y atienda
  lexicon: HALOT
  rationale: Oír conserva el valor básico de שׁמע en este contexto de recibir el anuncio del juicio; no se añade obediencia explícita en el verbo principal.
- source_word: בֵּית יְהוּדָה
  english_pob_choice: the house of Judah
  chosen_spanish: la casa de Judá
  alternatives_spanish:
  - Judá
  - el pueblo de Judá
  lexicon: HALOT
  rationale: Mantiene la expresión corporativa y pactal del hebreo sin reducirla a un simple nombre geográfico.
- source_word: אֵת כָּל הָרָעָה
  english_pob_choice: all the disaster
  chosen_spanish: todo el desastre
  alternatives_spanish:
  - toda la calamidad
  - todo el mal
  lexicon: HALOT
  rationale: En este contexto profético de juicio, רָעָה se refiere a calamidad anunciada, no a mal moral en Dios. 'Desastre' comunica bien esa carga sin perder la amplitud de 'todo'.
- source_word: חֹשֵׁב לַעֲשׂוֹת לָהֶם
  english_pob_choice: I am planning to bring on them
  chosen_spanish: yo estoy pensando hacerles
  alternatives_spanish:
  - yo estoy planeando hacerles
  - yo intento hacerles
  lexicon: HALOT
  rationale: חֹשֵׁב expresa intención o plan. 'Estoy pensando' preserva la idea de deliberación; el complemento 'hacerles' sigue de cerca el hebreo y, en español, el objeto indirecto expresa naturalmente el daño previsto sin añadir una formulación más interpretativa.
- source_word: לְמַעַן יָשׁוּבוּ
  english_pob_choice: so that ... may turn
  chosen_spanish: para que ... se vuelva
  alternatives_spanish:
  - a fin de que ... vuelva
  - para que ... se arrepienta
  lexicon: HALOT
  rationale: Se conserva el propósito y el valor de volver/retornar de שוב. 'Volverse' permite que el siguiente sintagma defina el carácter moral de ese cambio.
- source_word: אִישׁ מִדַּרְכּוֹ הָרָעָה
  english_pob_choice: each man may turn from his evil way
  chosen_spanish: cada hombre se vuelva de su mal camino
  alternatives_spanish:
  - cada uno se vuelva de su mal camino
  - cada hombre se aparte de su camino malo
  lexicon: HALOT
  rationale: Se conserva el singular masculino representativo de אִישׁ y el modismo profético 'mal camino'. 'Cada hombre' mantiene la forma del hebreo sin neutralizarla.
- source_word: וְסָלַחְתִּי
  english_pob_choice: and I will forgive
  chosen_spanish: y yo perdonaré
  alternatives_spanish:
  - y perdonaré
  - entonces yo perdonaré
  lexicon: HALOT
  rationale: El perfecto con waw se vierte de manera directa como futuro en español; se explicita el sujeto 'yo' para claridad y paralelismo.
- source_word: לַעֲוֺנָם וּלְחַטָּאתָם
  english_pob_choice: their iniquity and their sin
  chosen_spanish: su iniquidad y su pecado
  alternatives_spanish:
  - su culpa y su pecado
  - su maldad y su pecado
  lexicon: HALOT
  rationale: Se mantiene la distinción entre עָוֹן y חַטָּאת. 'Iniquidad' conserva el peso moral y jurídico de עָוֹן; 'pecado' traduce bien חַטָּאת.
theological_decisions:
- issue: Sentido de רָעָה aplicado al castigo divino anunciado
  english_pob_reading: disaster
  chosen_spanish_reading: desastre
  alternative_spanish_readings:
  - calamidad
  - mal
  rationale: En este versículo, lo que Yahvé planea no es maldad moral, sino juicio/calamidad contra Judá. 'Desastre' evita atribuir a Dios mal moral y sigue la línea interpretativa del POB inglés.
  doctrine_reference: DOCTRINE.md §Traducción y claridad teológica en textos de juicio
- issue: Forma singular masculina אִישׁ con alcance colectivo
  english_pob_reading: each man
  chosen_spanish_reading: cada hombre
  alternative_spanish_readings:
  - cada uno
  - cada persona
  rationale: Se conserva la forma masculina singular del hebreo con valor representativo. En español, 'cada hombre' comunica bien esa estructura y evita borrar el rasgo gramatical del original.
  doctrine_reference: DOCTRINE.md §Fidelidad gramatical y alcance representativo
translation_notes:
  revision_awareness: La versión inglesa más reciente añadió 'of' después de 'hear' para naturalidad. En español, la construcción 'oiga todo el desastre' ya expresa de modo natural el objeto de percepción, por lo que no requiere un equivalente de esa adición. También se ha preservado la distinción entre 'iniquidad' y 'pecado' y el matiz de juicio en 'desastre'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' implícito por tratarse de primera persona divina en la cláusula siguiente; no se introduce aquí porque el sujeto está expresado como 'yo'.
  - Se evitó 'arrepentirse' para שוב, siguiendo el valor primario de volver/retornarse y dejando que el contexto moral lo concrete.
  - '''Iniquidad'' y ''pecado'' se distinguen para reflejar la pareja hebrea עוון / חטאת.'
  - '''Cada hombre'' conserva el singular representativo del hebreo y armoniza con el tono profético del pasaje.'
