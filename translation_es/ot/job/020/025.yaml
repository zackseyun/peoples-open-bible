review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia e imaginería del hebreo: sacar/dibujar un arma implícita, salir del cuerpo, una punta/fulgor que sale de la hiel, y terrores que vienen sobre el malvado. Sin embargo, «se abalanzan sobre él» intensifica más allá de יַהֲלֹךְ עָלָיו, que en el expediente inglés se entiende mejor como «vienen/sobrevienen sobre él». También conviene alinear mejor la nota [a] con la alternativa auditada en inglés, que habla de la hoja/punta reluciente emergiendo de la hiel.'
  spanish_quality_summary: El español es claro y de buen nivel literario. «Una punta relampagueante» es comprensible, pero «reluciente» suena más natural y digno que «relampagueante» en este contexto no meteorológico. «Terrores vienen sobre él» o «le sobrevienen terrores» suena más fiel y natural que «se abalanzan sobre él», que personifica y dramatiza de más.
  glossary_alignment: No hay términos del glosario mayor en juego. Las decisiones «cuerpo», «hiel» y «terrores» están bien encaminadas. La excepción necesaria es ajustar la expresión verbal de יַהֲלֹךְ עָלָיו para no sobretraducir el hebreo.
  issues:
  - severity: medium
    issue: «se abalanzan sobre él» sobretraduce יַהֲלֹךְ עָלָיו
    rationale: El hebreo, según el propio expediente inglés, expresa que los terrores «vienen sobre él» o «caen sobre él», no necesariamente un ataque violento personificado. «Se abalanzan» añade fuerza interpretativa.
  - severity: low
    issue: «relampagueante» es menos natural que «reluciente» o «fulgurante»
    rationale: Aunque transmite brillo, en español bíblico moderno «punta reluciente» suena más idiomático para una hoja/punta de arma y sigue la imagen de brillo metálico.
  - severity: medium
    issue: La nota [a] no preserva con precisión la alternativa inglesa documentada
    rationale: La auditoría inglesa ofrece como alternativa que «la hoja/punta reluciente sale de su hiel/vesícula». La nota actual habla de «desenvaina», que es posible para שָׁלַף, pero no recoge la alternativa principal conservada en el expediente.
  revised_spanish_text: Él lo saca[a], y sale de su cuerpo; una punta reluciente[b] sale de su hiel; terrores vienen sobre él.
  revised_footnotes:
  - marker: a
    text: 'O: «la hoja reluciente sale de su hiel»; el hebreo usa imaginería corporal vívida y puede referirse a la punta brillante del arma mientras emerge.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de su amargura»; el hebreo puede usar «hiel» con resonancia figurada, pero aquí parece primario el sentido corporal.'
    reason: alternative_reading
  revision_rationale: 'Se hicieron ajustes menores para mejorar la fidelidad al hebreo y al expediente POB: «vienen sobre él» refleja mejor יַהֲלֹךְ עָלָיו que «se abalanzan sobre él»; «reluciente» suena más natural en español que «relampagueante» en esta imagen de arma; y la nota [a] ahora preserva la alternativa léxica registrada en la auditoría inglesa.'
