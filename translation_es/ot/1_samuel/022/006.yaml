translation:
  language: es
  text: Saúl oyó que David había sido descubierto[a], y también los hombres que estaban con él. Saúl estaba sentado en Guibeá, debajo del tamarisco en la altura[b], con su lanza en la mano, y todos sus siervos estaban de pie a su alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «David había llegado a ser conocido» / «David había sido hallado». El verbo hebreo puede llevar el sentido de que el paradero de David llegó a ser conocido.
    reason: lexical_alternative
  - marker: b
    text: O posiblemente «en Ramá» si בָּרָמָה se toma como el nombre del lugar Ramá en vez del sustantivo común «la altura».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró
  lexicon: HALOT
  rationale: El verbo hebreo שׁמע conserva aquí su sentido básico de recepción de noticia. «Oyó» reproduce de modo natural la entrada narrativa sin sobreinterpretar el tipo de conocimiento recibido.
- source_word: כִּי נוֹדַע דָּוִד
  english_pob_choice: that David ... had become known
  chosen_spanish: que David ... habían llegado a ser conocidos
  alternatives_spanish:
  - que David había sido descubierto
  - que David había sido hallado
  lexicon: HALOT
  rationale: El nifal de ידע puede significar ‘ser conocido’ o ‘ser descubierto’. El español «habían llegado a ser conocidos» mantiene la ambigüedad textual y la idea de que David y su grupo dejaron de estar ocultos, sin fijar indebidamente solo una de las posibilidades.
- source_word: וַאֲנָשִׁים אֲשֶׁר אִתּוֹ
  english_pob_choice: and the men who were with him
  chosen_spanish: y los hombres que estaban con él
  alternatives_spanish:
  - y los hombres con él
  lexicon: HALOT
  rationale: «Hombres» corresponde al hebreo אֲנָשִׁים y conserva el matiz de la banda que acompaña a David. La relativa explícita es natural en español y sigue de cerca la construcción hebrea.
- source_word: יוֹשֵׁב
  english_pob_choice: was sitting
  chosen_spanish: estaba sentado
  alternatives_spanish:
  - se sentaba
  - se hallaba sentado
  lexicon: HALOT
  rationale: El participio describe un trasfondo escénico durativo. «Estaba sentado» mantiene esa cualidad descriptiva mejor que un pretérito simple.
- source_word: בַּגִּבְעָה
  english_pob_choice: at Gibeah
  chosen_spanish: en Guibeá
  alternatives_spanish:
  - en Gibeá
  - en la colina
  lexicon: HALOT
  rationale: Se conserva el topónimo tradicionalizado en español como Guibeá, dado que aquí designa el lugar de residencia/escena de Saúl. No se sustituye por un sustantivo común porque el contexto favorece el nombre propio.
- source_word: תַּחַת הָאֶשֶׁל
  english_pob_choice: under the tamarisk tree
  chosen_spanish: debajo del tamarisco
  alternatives_spanish:
  - debajo del árbol de tamarisco
  - bajo el tamarisco
  lexicon: HALOT
  rationale: אֶשֶׁל se entiende usualmente como «tamarisco». En español, «debajo del tamarisco» es más fluido y transmite el elemento arbóreo sin añadir innecesariamente «árbol».
- source_word: בָּרָמָה
  english_pob_choice: on the height
  chosen_spanish: en la altura
  alternatives_spanish:
  - en Ramá
  - en el alto
  lexicon: HALOT
  rationale: La forma con artículo favorece el sentido común de «la altura» frente al topónimo Ramá. Se opta por la lectura común, como hizo el POB inglés, para no forzar un nombre propio donde el hebreo permite un sustantivo.
- source_word: וַחֲנִיתוֹ בְיָדוֹ
  english_pob_choice: with his spear in his hand
  chosen_spanish: con su lanza en la mano
  alternatives_spanish:
  - y su lanza en la mano
  - con la lanza en su mano
  lexicon: HALOT
  rationale: La cláusula nominal describe la postura y autoridad militar de Saúl. «Con su lanza en la mano» es una equivalencia idiomática directa que conserva la imagen concreta del hebreo.
- source_word: וְכָל עֲבָדָיו
  english_pob_choice: and all his servants
  chosen_spanish: y todos sus siervos
  alternatives_spanish:
  - y todos sus servidores
  - y todos sus criados
  lexicon: HALOT
  rationale: עֲבָדִים puede referirse a servidores de corte; el POB inglés eligió «servants» por transparencia. En español, «siervos» preserva esa amplitud y el tono de dependencia cortesana sin restringirlo a un oficio doméstico.
- source_word: נִצָּבִים עָלָיו
  english_pob_choice: were standing around him
  chosen_spanish: estaban de pie junto a él
  alternatives_spanish:
  - estaban de pie alrededor de él
  - estaban apostados a su alrededor
  lexicon: HALOT
  rationale: El participio con עַל expresa posición de asistencia/presencia alrededor de Saúl. «De pie junto a él» comunica la escena cortesana de forma natural y no excede el alcance del hebreo.
theological_decisions:
- issue: 'Alcance de נוֹדַע דָּוִד: conocido vs. descubierto'
  english_pob_reading: '''had become known'' with a note that it can mean ''had been discovered'' / ''had been found out.'''
  chosen_spanish_reading: habían llegado a ser conocidos
  alternative_spanish_readings:
  - había sido descubierto
  - había sido hallado
  rationale: La frase española mantiene la tensión semántica del nifal de ידע sin decidir demasiado pronto entre ‘ser conocido’ y ‘ser descubierto’. Esto conserva la auditabilidad del texto y permite que el lector perciba que el hecho relevante es que David y su grupo ya no permanecían ocultos.
  doctrine_reference: Ninguno; decisión lexical-contextual.
- issue: 'בָּרָמָה: topónimo Ramá o sustantivo ''la altura'''
  english_pob_reading: '''on the height'' with footnote: ''Or possibly “at Ramah” if בָּרָמָה is taken as the place name Ramah rather than the common noun “the height.”'''
  chosen_spanish_reading: en la altura
  alternative_spanish_readings:
  - en Ramá
  - en el alto
  rationale: Se sigue la lectura común favorecida por la sintaxis y por el paralelismo de la escena elevada, dejando abierta la posibilidad topográfica mediante nota. No se impone el topónimo donde el hebreo permite una lectura nominal.
  doctrine_reference: Ninguno; decisión textual-toponímica.
translation_notes:
  revision_awareness: Se revisó el texto inglés POB y el paquete hebreo; no se detectaron cambios sustantivos en la revisión más reciente. La traducción española sigue la lectura de alta concordancia, preservando la ambigüedad documentada en נוֹדַע y בָּרָמָה.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se eligió «siervos» para עֲבָדָיו por coherencia con la decisión inglesa de 'servants' y para evitar una domesticación excesiva.
  - Se usó «Guibeá» como topónimo en español bíblico para una lectura natural y reconocible.
  - Se conservó la imagen concreta de la lanza y la postura de pie sin ampliar a una interpretación militar más fuerte de la que exige el hebreo.
