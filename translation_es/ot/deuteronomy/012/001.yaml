translation:
  language: es
  text: Estos son los estatutos y los juicios[a] que ustedes tendrán cuidado de cumplir en la tierra que Yahvé, el Dios de sus padres, les ha dado para que la posean[b], todos los días que ustedes vivan sobre la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y las ordenanzas» para «y los juicios».
    reason: lexical_alternative
  - marker: b
    text: O «para heredarla» para «para que la posean».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «sobre la tierra»; algunos lo entienden más estrechamente como «en la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estas
  lexicon: HALOT
  rationale: El deíctico introductorio requiere en español la cópula expresa para una formulación natural y precisa. «Estas son» conserva la función de presentación de la sección legal.
- source_word: הַחֻקִּים
  english_pob_choice: the statutes
  chosen_spanish: las leyes
  alternatives_spanish:
  - los estatutos
  - los decretos
  - las ordenanzas
  lexicon: HALOT
  rationale: «חֻקִּים» nombra disposiciones normativas fijadas. En español, «leyes» comunica bien el campo legal en una lectura general y eclesial, aunque «estatutos» sería más cercano al término técnico. Se evita «decretos» por sonar más administrativo y menos bíblico.
- source_word: וְהַמִּשְׁפָּטִים
  english_pob_choice: and the judgments
  chosen_spanish: y los decretos
  alternatives_spanish:
  - y los juicios
  - y las ordenanzas
  - y las reglas
  lexicon: HALOT
  rationale: Se conserva la distinción léxica con «חֻקִּים», pero en español «juicios» puede sonar ambiguo y «ordenanzas» se acerca demasiado a una tradición terminológica fija. «Decretos» mantiene el registro jurídico, aunque no reproduce de manera exacta el matiz de decisión judicial.
- source_word: אֲשֶׁר תִּשְׁמְרוּן לַעֲשׂוֹת
  english_pob_choice: that you shall be careful to do
  chosen_spanish: que ustedes cuidarán de poner por obra
  alternatives_spanish:
  - que ustedes observarán para hacer
  - que ustedes se cuidarán de hacer
  - que ustedes deberán hacer
  lexicon: HALOT
  rationale: «שׁמר» + infinitivo expresa observancia atenta, no simple conocimiento. «Cuidarán de poner por obra» transmite la idea de guardar cuidadosamente y realizar efectivamente, con un español natural y reverente.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra prometida
  - en la tierra
  lexicon: HALOT
  rationale: Aquí el contexto deuteronómico apunta a la tierra dada como heredad. «Tierra» es el término más fiel y estable para el territorio prometido; se evita explicitar «prometida» porque no aparece en el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto de verter el Tetragrámaton como «Yahvé», preservando el nombre divino en vez de sustituirlo por un título.
- source_word: אֱלֹהֵי אֲבֹתֶיךָ
  english_pob_choice: the God of your fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  - el Dios de vuestros padres
  lexicon: HALOT
  rationale: La fórmula de alianza se conserva con «el Dios de sus padres». Se mantiene la referencia al linaje pactal y el tratamiento de segunda persona plural de forma reverente.
- source_word: לְךָ
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  lexicon: HALOT
  rationale: El singular hebreo se entiende dentro del uso colectivo del pasaje. En español, la referencia natural es plural por el destinatario comunitario ya introducido en la sección; «les» integra el dativo de la acción de dar.
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to possess
  chosen_spanish: para que la posean
  alternatives_spanish:
  - para heredarla
  - para tomar posesión de ella
  - para poseerla
  lexicon: HALOT
  rationale: En contexto deuteronómico, יָרַשׁ combina posesión y toma hereditaria de la tierra. «Posean» suena natural y conserva la posibilidad semántica amplia; «heredarla» es viable pero enfatiza más el aspecto de herencia.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all the days
  chosen_spanish: todos los días
  alternatives_spanish:
  - todos los tiempos
  - durante todos los días
  lexicon: HALOT
  rationale: La expresión temporal se vierte de manera directa como duración completa.
- source_word: אֲשֶׁר אַתֶּם חַיִּים
  english_pob_choice: that you are living
  chosen_spanish: que ustedes vivan
  alternatives_spanish:
  - que ustedes están viviendo
  - mientras viven
  lexicon: HALOT
  rationale: El hebreo comunica una duración continua. «Que ustedes vivan» mantiene la idea de vigencia a lo largo de la vida, con un español más fluido que el participio progresivo.
- source_word: עַל הָאֲדָמָה
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre el suelo
  - sobre la tierra/la tierra
  lexicon: HALOT
  rationale: Se mantiene la distinción con «en la tierra» de la cláusula anterior. «Sobre la tierra» reproduce el hebreo y conserva la amplitud de la referencia a la vida humana en el mundo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La política del proyecto pide preservarlo como nombre propio en español, no sustituirlo por un título. «Yahvé» es la forma estable del proyecto y evita ocultar el nombre divino.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Distinguir חֻקִּים y מִשְׁפָּטִים sin borrar la tensión léxica
  english_pob_reading: the statutes and the judgments
  chosen_spanish_reading: las leyes y los decretos
  alternative_spanish_readings:
  - los estatutos y los juicios
  - las normas y las ordenanzas
  - las leyes y las ordenanzas
  rationale: El hebreo diferencia dos términos jurídicos. Aunque «estatutos» y «juicios» serían más cercanos, pueden sonar rígidos o ambivalentes en español. La pareja «leyes/decretos» conserva el paralelismo y el registro legal sin anular la distinción semántica, aunque la nota reconoce que no es una equivalencia exacta.
  doctrine_reference: Lexical distinction in Hebrew legal terminology
- issue: Interpretación de בָּאָרֶץ / הָאֲדָמָה
  english_pob_reading: in the land ... on the earth
  chosen_spanish_reading: en la tierra ... sobre la tierra
  alternative_spanish_readings:
  - en el país ... en la tierra
  - en la tierra ... en el suelo
  rationale: La primera frase alude a la tierra dada en posesión; la segunda amplía la duración de la vida humana sobre la superficie habitada. Mantener dos preposiciones distintas ayuda a no fusionar ambos ámbitos.
  doctrine_reference: Contextual land/earth distinction in Deuteronomy
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que ajustó el registro hacia una formulación más formal («shall be careful») sin cambiar el sentido. En español se reflejó con «cuidarán de poner por obra», que conserva la vigilancia obediente y evita volverlo meramente exhortativo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para יהוה.
  - Se conserva el tratamiento plural de segunda persona en todo el versículo.
  - Se distingue «en la tierra» de «sobre la tierra» para no colapsar בָּאָרֶץ y עַל הָאֲדָמָה.
  - Se evita «SEÑOR» para no enmascarar el nombre divino.
  - Se usa «posean» como verbo principal para יָרַשׁ, dejando abierta la alternativa hereditaria en nota.
