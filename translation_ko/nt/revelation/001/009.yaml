  text: Ἐγὼ Ἰωάννης, ὁ ἀδελφὸς ὑμῶν καὶ ⸀συγκοινωνὸς ἐν τῇ θλίψει καὶ βασιλείᾳ καὶ ὑπομονῇ ⸀ἐν Ἰησοῦ, ἐγενόμην ἐν τῇ νήσῳ τῇ καλουμένῃ Πάτμῳ διὰ τὸν λόγον τοῦ θεοῦ ⸀καὶ τὴν μαρτυρίαν ⸀Ἰησοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/001/009.yaml
  text: 'I[a], John, your brother and fellow participant in the tribulation and kingdom and endurance in Jesus, was on the island called Patmos because of the word of God and the testimony of Jesus.'
  footnotes:
  - marker: a
    text: Or, 'the testimony about Jesus.' The Greek genitive can mean either testimony given by Jesus or testimony concerning Jesus.
    reason: alternative_reading
translation:
  language: ko
  text: 나 요한은, 여러분의 형제이며, 예수 안에서 환난과 나라와 인내에 함께 참여한 자로서, 하나님의 말씀과 예수의 증언 때문에 밧모라는 섬에 있게 되었습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συγκοινωνὸς
  english_pob_choice: fellow participant
  chosen_korean: 함께 참여한 자
  alternatives_korean:
