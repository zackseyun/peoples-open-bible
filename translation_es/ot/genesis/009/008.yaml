revisions:
- from: Entonces Dios dijo a Noé y a sus hijos con él, diciendo,
  to: Entonces Dios dijo a Noé y a sus hijos, que estaban con él, diciendo,
  rationale: Se revisa el texto para mejorar la naturalidad del español y reflejar mejor que בָּנָיו se refiere a los hijos de Noé como grupo masculino concreto, sin recurrir a la expresión más pesada «hijos varones». La cláusula «que estaban con él» expresa con claridad אִתּוֹ en español idiomático.
