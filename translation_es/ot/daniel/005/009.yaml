    issue: 'Expresión poco natural: «cambió su color»'
    rationale: Aunque refleja de cerca el inglés auditado, en español suena forzado y poco idiomático. El arameo describe el cambio visible del aspecto/semblante por temor; «se le cambió el color del rostro» comunica ese sentido con mayor fidelidad funcional.
