translation:
  language: es
  text: Serán como hombres poderosos[a], pisoteando el cieno de las calles en batalla; pelearán, porque Yahvé está con ellos, y pondrán en vergüenza a los jinetes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como guerreros». El hebreo usa literalmente un término masculino, «hombres poderosos», para combatientes valientes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  english_pob_choice: They will be
  chosen_spanish: Serán
  alternatives_spanish:
  - Y serán
  - Y estarán
  lexicon: HALOT
  rationale: El perfecto con prefijo en discurso profético expresa futuro; en español, «serán» comunica con naturalidad ese valor sin añadir un enlace innecesario.
- source_word: כְגִבֹּרִים
  english_pob_choice: like mighty men
  chosen_spanish: como [a] poderosos
  alternatives_spanish:
  - como guerreros
  - como héroes
  - como hombres valientes
  lexicon: HALOT
  rationale: גִּבּוֹרִים es un término marcadamente masculino y marcial. «Poderosos» mantiene la fuerza semántica y el registro digno; la nota preserva la alternativa lexical «guerreros» sin neutralizar el rasgo masculino.
- source_word: בּוֹסִים
  english_pob_choice: trampling
  chosen_spanish: pisoteando
  alternatives_spanish:
  - hollando
  - trillando
  - pisando
  lexicon: HALOT
  rationale: El participio expresa acción de aplastar con los pies. «Pisoteando» es el equivalente más natural y vívido en español para la imagen bélica.
- source_word: בְּטִיט חוּצוֹת
  english_pob_choice: the mire of the streets
  chosen_spanish: el cieno de las calles
  alternatives_spanish:
  - el lodo de las calles
  - el fango de las calles
  - el cieno de las plazas
  lexicon: HALOT
  rationale: La expresión nombra un lodo espeso y sucio de las vías públicas. «Cieno» conserva el matiz formal y algo más intenso que «lodo», adecuado al tono poético del pasaje.
- source_word: בַּמִּלְחָמָה
  english_pob_choice: in battle
  chosen_spanish: en batalla
  alternatives_spanish:
  - en guerra
  - en combate
  lexicon: HALOT
  rationale: «En batalla» reproduce el marco bélico inmediato con un giro claro y literario; es suficientemente concreto y no amplía el alcance a «guerra».
- source_word: וְנִלְחֲמוּ
  english_pob_choice: they will fight
  chosen_spanish: pelearán
  alternatives_spanish:
  - combatirán
  - harán guerra
  lexicon: HALOT
  rationale: El verbo aquí indica entrar en combate. «Pelearán» es natural en español y mantiene la acción directa sin recargar el texto.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de su victoria. «Porque» expresa de modo simple y explícito la relación causal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene la convención del proyecto para el Tetragrámaton. «Yahvé» conserva el nombre divino propio y evita la sustitución por un título.
- source_word: עִמָּם
  english_pob_choice: is with them
  chosen_spanish: está con ellos
  alternatives_spanish:
  - permanece con ellos
  - va con ellos
  lexicon: HALOT
  rationale: En español es necesario explicitar el verbo de ser/estar. «Está con ellos» expresa la presencia protectora y pactal del texto.
- source_word: וְהֹבִישׁוּ
  english_pob_choice: they will put ... to shame
  chosen_spanish: pondrán en vergüenza
  alternatives_spanish:
  - avergonzarán
  - cubrirán de vergüenza
  - deshonrarán
  lexicon: HALOT
  rationale: El hifil causa vergüenza o humillación. «Pondrán en vergüenza» conserva el valor causativo con una expresión comprensible y fiel.
- source_word: רֹכְבֵי סוּסִים
  english_pob_choice: horsemen
  chosen_spanish: a los jinetes de caballos
  alternatives_spanish:
  - a los jinetes
  - a los que montan caballos
  - a la caballería
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «montadores de caballos». «Jinetes de caballos» mantiene la imagen concreta del original, aunque resulte algo marcada en español; por eso se añade la alternativa más idiomática «jinetes».
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa directamente el Tetragrámaton. La forma «Yahvé» sigue la política del proyecto de transliterar el nombre divino en lugar de ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Marcialidad masculina de גִּבֹּרִים
  english_pob_reading: like mighty men
  chosen_spanish_reading: como poderosos
  alternative_spanish_readings:
  - como guerreros
  - como héroes
  - como hombres valientes
  rationale: El hebreo conserva una imagen masculina de fuerza y valor en contexto militar. «Poderosos» permite mantener el peso descriptivo sin volver opaca la frase; la nota lexical preserva la alternativa «guerreros» y evita neutralizar el rasgo gramatical.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La revisión posterior cambió «mud» por «mire» en inglés para un registro más formal. En español se adoptó directamente un equivalente formal y concreto («cieno») que mantiene la imagen de barro sucio de las calles y evita una expresión demasiado coloquial.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la terminología del proyecto para יְהוָה.
  - 'Se conserva la fuerza marcial del pasaje con verbos concretos: «pisoteando», «pelearán», «pondrán en vergüenza».'
  - La frase final sigue de cerca la imagen hebrea de la caballería enemiga; «jinetes de caballos» prioriza la literalidad auditada, aunque sea menos idiomática que solo «jinetes».
