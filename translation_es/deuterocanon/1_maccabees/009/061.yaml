translation:
  language: es
  text: Y apresaron de entre los hombres de la región[a] a cincuenta hombres que eran líderes de la maldad[b], y él los mató.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «de los hombres de la región»; también puede entenderse «de los hombres de la tierra» o «de la gente del campo / de la región».'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «líderes del mal»; también puede entenderse «líderes de la maldad» o «cabecillas del mal».'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνέλαβον
  english_pob_choice: seized
  chosen_spanish: apresaron
  alternatives_spanish:
  - capturaron
  - arrestaron
  lexicon: BDAG
  rationale: El verbo expresa tomar o detener personas. «Apresaron» conserva la fuerza de una acción directa sin añadir necesariamente el matiz jurídico formal de «arrestaron».
- source_word: ἀπὸ τῶν ἀνδρῶν τῆς χώρας
  english_pob_choice: from the men of the country
  chosen_spanish: entre los hombres de la región
  alternatives_spanish:
  - de los hombres del país
  - de los hombres de la tierra
  lexicon: LSJ
  rationale: La construcción indica selección desde un grupo mayor. «Entre los hombres de la región» suena natural en español y mantiene la referencia geográfica sin estrecharla a una entidad política moderna.
- source_word: τῶν ἀρχηγῶν
  english_pob_choice: leaders
  chosen_spanish: líderes
  alternatives_spanish:
  - jefes
  - cabecillas
  lexicon: LSJ
  rationale: El término señala figuras dirigentes. «Líderes» es claro y neutral; «cabecillas» sería más peyorativo de lo que exige el griego.
- source_word: τῆς κακίας
  english_pob_choice: of wickedness
  chosen_spanish: de la maldad
  alternatives_spanish:
  - de la maldad
  - del mal
  - de la perversidad
  lexicon: LSJ
  rationale: κακία puede expresar maldad o malicia. «Maldad» comunica bien el sentido moral y evita una abstracción excesiva en español.
- source_word: εἰς πεντήκοντα ἄνδρας
  english_pob_choice: fifty men
  chosen_spanish: cincuenta hombres
  alternatives_spanish:
  - unos cincuenta hombres
  - hasta cincuenta hombres
  lexicon: LSJ
  rationale: La frase da el número total. «Cincuenta hombres» reproduce el dato de forma directa y fiel.
- source_word: ἀπέκτεινεν
  english_pob_choice: killed
  chosen_spanish: los mató
  alternatives_spanish:
  - los dio muerte
  - los ejecutó
  lexicon: BDAG
  rationale: El sentido básico es matar. «Los mató» es la opción más directa y evita introducir de manera innecesaria un matiz judicial.
theological_decisions:
- issue: 'Cambio de número del sujeto: plural en la primera cláusula y singular en la última'
  english_pob_reading: 'Retain the singular in English: ''and he killed them.'''
  chosen_spanish_reading: 'Mantener el singular: «y él los mató».'
  alternative_spanish_readings:
  - y ellos los mataron
  - y los mataron
  rationale: El griego presenta un cambio claro de plural a singular. La traducción española conserva esa tensión sin armonizarla, porque el texto fuente es consistente en esa oscilación y no se nos ha dado una variante textual que la resuelva.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó una formulación menos natural por «leaders of wickedness» y conservó el singular «he killed them». La versión española sigue esa decisión semántica y también preserva el cambio de número, sin suavizarlo.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otro reemplazo innecesario porque no aparece el tetragrámaton aquí.
  - Se prefirió «maldad» sobre «mal» para reflejar mejor el genitivo cualitativo de κακία.
  - Se mantuvo «él» explícito para reflejar el singular del verbo griego final y no diluir la tensión gramatical.
