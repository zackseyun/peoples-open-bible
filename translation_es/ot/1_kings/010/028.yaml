translation:
  language: es
  text: Y la importación de los caballos que pertenecían a Salomón era de Egipto y de Kue[a][b]; los comerciantes del rey los obtenían de Kue[b] por un precio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo otra lectura del hebreo difícil: “y de una manada; los comerciantes del rey obtenían una manada por un precio”.'
    reason: lexical_alternative
  - marker: b
    text: El término hebreo מִקְוֶה/מִקְוֵה en este versículo es incierto; puede ser un nombre de lugar (Kue, probablemente en Cilicia) o un sustantivo común con el sentido de algo como “manada” o “conjunto”.
    reason: cultural_note
lexical_decisions:
- source_word: מוֹצָא
  english_pob_choice: importation
  chosen_spanish: procedencia
  alternatives_spanish:
  - importación
  - origen
  - salida
  lexicon: HALOT
  rationale: El contexto comercial indica la procedencia de los caballos más que su mera “salida”. “Procedencia” mantiene la relación con el origen sin forzar un tecnicismo de comercio que en español puede sonar más pesado que el hebreo.
- source_word: הַסּוּסִים
  english_pob_choice: the horses
  chosen_spanish: los caballos
  alternatives_spanish:
  - los caballos
  lexicon: HALOT
  rationale: Término directo y estándar para סוסים.
- source_word: אֲשֶׁר לִשְׁלֹמֹה
  english_pob_choice: that belonged to Solomon
  chosen_spanish: que pertenecían a Salomón
  alternatives_spanish:
  - para Salomón
  - de Salomón
  lexicon: HALOT
  rationale: En este contexto de posesión y comercio, “pertenecían a Salomón” expresa con claridad la relación de propiedad o control sin introducir una lectura más específica que el hebreo no exige.
- source_word: מִמִּצְרַיִם
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  - procedentes de Egipto
  lexicon: HALOT
  rationale: Preposición simple y natural en español para el origen geográfico.
- source_word: וּמִקְוֵה
  english_pob_choice: and Kue
  chosen_spanish: y de Kue
  alternatives_spanish:
  - y de Keve
  - y de una manada
  lexicon: HALOT
  rationale: Se conserva el probable nombre de lugar para reflejar la decisión auditada del inglés POB, pero en español se usa “de” para marcar procedencia geográfica de forma natural.
- source_word: סֹחֲרֵי הַמֶּלֶךְ
  english_pob_choice: the king’s merchants
  chosen_spanish: los comerciantes del rey
  alternatives_spanish:
  - los mercaderes del rey
  - los negociantes del rey
  lexicon: HALOT
  rationale: “Comerciantes”/“mercaderes” expresan el sentido de agentes comerciales reales; “comerciantes” es claro y dignificado en español moderno.
- source_word: יִקְחוּ
  english_pob_choice: would obtain
  chosen_spanish: los obtenían
  alternatives_spanish:
  - los tomaban
  - los compraban
  lexicon: HALOT
  rationale: En un marco de compra y abastecimiento, “obtenían” conserva la idea de adquisición sin añadir explícitamente una acción no dicha por el hebreo. El imperfecto español refleja el valor habitual o repetido del verbo.
- source_word: מִקְוֵה
  english_pob_choice: from Kue
  chosen_spanish: de Kue
  alternatives_spanish:
  - de una manada
  - de Keve
  lexicon: HALOT
  rationale: Se mantiene la misma solución que la primera ocurrencia para coherencia textual, reflejando la lectura geográfica preferida en el POB inglés.
- source_word: בִּמְחִיר
  english_pob_choice: at a price
  chosen_spanish: a precio
  alternatives_spanish:
  - por un precio
  - a cambio de un precio
  lexicon: HALOT
  rationale: La expresión breve mantiene el matiz comercial del hebreo. En español, “a precio” funciona como fórmula concisa y natural en un contexto de compraventa.
translation_notes:
  revision_awareness: Se ha seguido la lectura auditada del inglés POB, manteniendo la doble procedencia “de Egipto y de Kue” y preservando en nota la alternativa difícil de מקוה como “una manada”. No se introdujeron cambios doctrinales; la revisión más reciente indicó que no eran necesarios cambios.
  spanish_consistency_notes:
  - Se conserva “Yahvé” como norma del proyecto cuando corresponda, pero este versículo no contiene el Tetragrámaton.
  - Se evitó “SEÑOR” o una paráfrasis devocional, ya que el versículo es descriptivo y comercial.
  - Se mantuvo la ambigüedad de מקוה en la nota, sin ocultar la lectura geográfica preferida en el texto principal.
  - “A precio” preserva el valor comercial sin especificar un precio fijo que el hebreo no detalla.
