translation:
  language: es
  text: Bendito es el Señor para siempre delante de sus siervos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογητὸς
  english_pob_choice: Blessed is
  chosen_spanish: ¡Bendito sea!
  alternatives_spanish:
  - Bendecido sea
  - Alabado sea
  lexicon: LSJ
  rationale: 'En una doxología breve, el adjetivo funciona como exclamación de alabanza. En español, la forma natural y fiel es optativa/exclamativa: «Bendito sea», que conserva el tono litúrgico sin volver el texto innecesariamente rígido.'
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: LSJ
  rationale: Se mantiene el título divino con artículo, como en la tradición bíblica castellana, pero sin sustituir el referente por una paráfrasis. Aquí «Señor» comunica adecuadamente el título reverencial en español.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - eternamente
  - para la era
  lexicon: LSJ
  rationale: La expresión griega es idiomática y señala duración continua. «Para siempre» es la equivalencia española más clara y natural en contexto doxológico.
- source_word: ἐνώπιον
  english_pob_choice: in the sight of
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: LSJ
  rationale: La preposición indica posición relacional y pública. «Delante de» mantiene la idea espacial/social de estar ante alguien y funciona con fluidez en español, sin añadir solemnidad extra.
- source_word: δούλων αὐτοῦ
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus esclavos
  - sus servidores
  lexicon: LSJ
  rationale: Aunque δοῦλος puede significar «esclavo», el audit trail inglés eligió «servants» por el matiz relacional y cultual del contexto. En español, «siervos» conserva esa relación de pertenencia y servicio devoto mejor que «esclavos», que introduciría una carga no requerida por este verso breve.
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la revisión más reciente; la versión española sigue esa lectura estable sin introducir variantes textuales ni notas de revisión.
  spanish_consistency_notes:
  - Se mantiene «Señor» como traducción del título divino Κύριος en este pasaje.
  - No se usa «esclavos» porque el contexto doxológico favorece la relación de servicio reverente; «siervos» preserva mejor la naturalidad del español y la decisión auditada en inglés.
  - «Para siempre» reproduce el valor durativo de εἰς τὸν αἰῶνα en estilo bíblico contemporáneo.
