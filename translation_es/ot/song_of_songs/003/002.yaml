- from: Me levantaré ahora y andaré por la ciudad[a], por las plazas del mercado y por las calles; buscaré al que ama mi alma. Lo busqué, pero no lo hallé.
  to: Me levantaré ahora y recorreré la ciudad[a], en los mercados y en las calles; buscaré al que mi alma ama. Lo busqué, pero no lo hallé.
  rationale: 'Se corrige la cláusula principal para conservar el sentido exacto del hebreo y del POB inglés: es mi alma la que ama, no el referente quien ama a mi alma. También se ajusta la nota para reflejar la alternativa formal correcta. Además, «recorreré la ciudad» y «en los mercados» mejoran la naturalidad del español sin apartarse del valor de סבב y שׁוּק.'
