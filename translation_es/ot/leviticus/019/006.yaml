translation:
  language: es
  text: Se comerá el día de su sacrificio y al día siguiente[a], pero lo que quede hasta el tercer día será quemado en el fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y lo que queda»; el participio hebreo se refiere a la porción que permanece después del tiempo permitido para comerla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיוֹם
  english_pob_choice: on the day
  chosen_spanish: el día de
  alternatives_spanish:
  - en el día de
  lexicon: HALOT
  rationale: La preposición temporal ב con יוֹם se expresa de forma natural en español como «el día de», evitando un calco poco idiomático y manteniendo el valor temporal del hebreo.
- source_word: זִבְחֲכֶם
  english_pob_choice: of your sacrifice
  chosen_spanish: de su sacrificio
  alternatives_spanish:
  - de vuestro sacrificio
  - de su ofrenda sacrificada
  lexicon: HALOT
  rationale: זֶבַח apunta a un sacrificio ofrecido; «sacrificio» comunica bien el sentido cultual sin sobrecargar el verso con una paráfrasis. Se usa «su» en tono de trato general y lectura pública fluida.
- source_word: יֵאָכֵל
  english_pob_choice: it shall be eaten
  chosen_spanish: Se comerá
  alternatives_spanish:
  - será comido
  - podrá comerse
  lexicon: HALOT
  rationale: El nifal pasivo se vierte con una pasiva refleja natural en español. «Se comerá» preserva el carácter regulativo y legal del mandamiento mejor que una simple posibilidad.
- source_word: וּמִמָּחֳרָת
  english_pob_choice: and on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - y al siguiente día
  - y en el día siguiente
  lexicon: HALOT
  rationale: מָחֳרָת significa «el día siguiente / mañana». «Al día siguiente» es la forma más clara y actual en español, conservando la secuencia temporal indicada en el hebreo.
- source_word: וְהַנּוֹתָר
  english_pob_choice: but what remains
  chosen_spanish: pero lo que quede
  alternatives_spanish:
  - y lo que quede
  - pero el resto
  lexicon: HALOT
  rationale: El participio de יתר/נותר señala lo que permanece. «Lo que quede» mantiene esa noción de residuo sin introducir una glosa innecesaria; «pero» refleja el giro contrastivo del texto.
- source_word: עַד יוֹם הַשְּׁלִישִׁי
  english_pob_choice: until the third day
  chosen_spanish: hasta el tercer día
  alternatives_spanish:
  - hasta el día tercero
  - hasta el día tercero inclusive
  lexicon: HALOT
  rationale: La expresión fija el límite temporal para lo sobrante. «Hasta el tercer día» es una equivalencia directa, natural y plenamente transparente en español.
- source_word: בָּאֵשׁ
  english_pob_choice: in the fire
  chosen_spanish: en el fuego
  alternatives_spanish:
  - con fuego
  - por medio del fuego
  lexicon: HALOT
  rationale: La preposición ב con אֵשׁ se rinde de manera literal y clara como «en el fuego», manteniendo la imagen concreta de destrucción por combustión.
- source_word: יִשָּׂרֵף
  english_pob_choice: shall be burned
  chosen_spanish: será quemado
  alternatives_spanish:
  - será consumido
  - deberá ser quemado
  lexicon: HALOT
  rationale: El nifal imperfecto se traduce con pasiva futura. «Será quemado» es natural en español y conserva la instrucción jurídica; «quemado» también mantiene la concreción del acto de fuego.
translation_notes:
  revision_awareness: 'Se mantiene la lectura y el sentido del texto hebreo masorético sin cambios de revisión: la instrucción regula el consumo del sacrificio y ordena quemar lo restante si persiste hasta el tercer día. La nota reproduce la alternativa léxica conservada por la POB en inglés sobre el participio de «lo que queda».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se mantiene «sacrificio» como término cultual principal, coherente con la decisión inglesa POB.
  - La pasiva refleja «se comerá» y la pasiva futura «será quemado» conservan el tono legal del hebreo.
  - El marcador de nota [a] aparece junto a «al día siguiente» para preservar la alternativa léxica documentada.
