id: LUK.17.36
reference: Luke 17:36
source:
  edition: robinson-pierpont-2005-byzantine
  text: Δύο ἔσονται ἐν τῷ ἀγρῷ· εἷς παραληφθήσεται, καὶ ὁ ἕτερος ἀφεθήσεται.
  language: Greek
translation:
  text: Two[a] men will be in the field; one will be taken, and the other will be
    left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This verse is absent from the earliest Greek manuscripts (including the
      4th-century Sinaiticus and Vaticanus) and early Coptic translations, but is
      present in the Western tradition (such as the 5th-century Codex Bezae), the
      Byzantine majority tradition, and the Latin Vulgate. It was likely added by
      later scribes to harmonize with Matthew 24:40.
    reason: textual_critical
lexical_decisions:
- source_word: παραλαμβάνω
  chosen: will be taken
  alternatives:
  - will be received
  - will be taken along
  lexicon: BDAG
  rationale: In this eschatological context, it denotes being taken into close association
    or gathered, contrasting with being left behind.
- source_word: ἀφίημι
  chosen: will be left
  alternatives:
  - will be forsaken
  - will be let go
  lexicon: BDAG
  rationale: Here it means to be left behind or abandoned, standing in direct contrast
    to being taken.
- source_word: ἕτερος
  chosen: the other
  alternatives:
  - another
  - a different one
  lexicon: BDAG
  rationale: Used here to denote the second of two previously mentioned subjects.
