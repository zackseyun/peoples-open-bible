translation:
  language: es
  text: Porque yo soy como un león[a] para Efraín, y como un león joven para la casa de Judá; yo, yo mismo, desgarraré y me iré; llevaré, y no hay quien rescate[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'león feroz' para la primera imagen; el término hebreo puede llevar un matiz de fuerza o ferocidad.
    reason: lexical_alternative
  - marker: b
    text: O 'nadie puede librar'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אָנֹכִי
  english_pob_choice: For I am
  chosen_spanish: Porque yo soy
  alternatives_spanish:
  - Pues yo soy
  - Porque yo, yo soy
  lexicon: WLC/HALOT
  rationale: La partícula causal introduce la declaración divina; en español, 'Porque yo soy' comunica bien la razón o fundamento de la amenaza. Se conserva el pronombre explícito para reflejar el énfasis del hebreo.
- source_word: שַּׁחַל
  english_pob_choice: lion
  chosen_spanish: león
  alternatives_spanish:
  - león feroz
  lexicon: HALOT
  rationale: El término designa un león; el matiz de fuerza o ferocidad ya queda reforzado por el contexto y los verbos predatorios. 'León' es la equivalencia natural y fiel.
- source_word: כְּפִיר
  english_pob_choice: young lion
  chosen_spanish: cachorro de león
  alternatives_spanish:
  - león joven
  lexicon: HALOT
  rationale: '''Cachorro de león'' conserva la imagen de un león en etapa temprana y suena natural en español. ''León joven'' también es posible, pero ''cachorro de león'' distingue mejor el paralelo poético.'
- source_word: לְאֶפְרַיִם
  english_pob_choice: to Ephraim
  chosen_spanish: para Efraín
  alternatives_spanish:
  - a Efraín
  lexicon: HALOT
  rationale: En este contexto de juicio, la preposición expresa relación o dirección contra el destinatario. 'Para' reproduce bien la idea de amenaza dirigida, como en el inglés auditado.
- source_word: לְבֵית יְהוּדָה
  english_pob_choice: to the house of Judah
  chosen_spanish: para la casa de Judá
  alternatives_spanish:
  - a la casa de Judá
  lexicon: HALOT
  rationale: '''Casa de Judá'' preserva el idioma del hebreo y el paralelismo con Efraín. ''Casa'' puede funcionar como entidad corporativa/covenantal sin necesidad de explicitar ''reino''.'
- source_word: אֲנִי אֲנִי
  english_pob_choice: I, I myself
  chosen_spanish: yo, yo mismo
  alternatives_spanish:
  - yo, yo
  - yo mismo
  lexicon: HALOT
  rationale: La repetición es enfática; 'yo, yo mismo' mantiene la fuerza sin caer en un calco rígido. En español, el pronombre duplicado seguido de 'mismo' preserva el tono solemne.
- source_word: אֶטְרֹף
  english_pob_choice: will tear
  chosen_spanish: desgarraré
  alternatives_spanish:
  - tearé
  - haré pedazos
  lexicon: HALOT
  rationale: '''Desgarraré'' transmite con viveza el acto depredador y la violencia del verbo hebreo en contexto metafórico. ''Tearé'' es más literal, pero algo menos expresivo en español.'
- source_word: וְאֵלֵךְ
  english_pob_choice: and go away
  chosen_spanish: e iré
  alternatives_spanish:
  - y me iré
  - y partiré
  lexicon: HALOT
  rationale: El hebreo presenta el movimiento posterior al ataque; 'e iré' preserva la sencillez del verbo y el flujo poético. Se usa 'e' por eufonía ante vocal inicial.
- source_word: אֶשָּׂא
  english_pob_choice: I will carry off
  chosen_spanish: me llevaré
  alternatives_spanish:
  - llevaré
  - arrastraré
  lexicon: HALOT
  rationale: En la imagen de depredación, el verbo comunica llevarse la presa. 'Me llevaré' hace natural la acción en español y conserva la idea de remoción/captura.
- source_word: וְאֵין מַצִּיל
  english_pob_choice: and there is no one to rescue
  chosen_spanish: y no hay quien libere
  alternatives_spanish:
  - y no hay quien rescate
  - y no hay libertador
  lexicon: HALOT
  rationale: '''מַצִּיל'' designa quien libra o rescata; ''libere'' conserva la fuerza de librar de peligro y evita un registro demasiado técnico. ''Rescate'' también sería posible, pero ''libere'' suena más amplio y sobrio en español.'
theological_decisions:
- issue: Autoidentificación de Yahvé como depredador en juicio
  english_pob_reading: Retain the lion imagery straightforwardly as a metaphor for the LORD's destructive judgment against Ephraim and Judah.
  chosen_spanish_reading: Mantener sin suavizar la imagen del león como metáfora directa del juicio destructivo de Yahvé contra Efraín y Judá.
  alternative_spanish_readings:
  - Suavizar la imagen hacia una amenaza general de castigo
  - Interpretar la figura de forma no literal y explicarla en el texto
  rationale: El hebreo presenta una comparación explícita con un león y un cachorro de león, seguida de verbos de presa. Suavizar la imagen reduciría la fuerza del oráculo y desplazaría el sentido del texto.
  doctrine_reference: Juicio divino; metáfora profética; santidad y soberanía de Yahvé
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo con la revisión auditada; no hubo cambios sustanciales en la lectura inglesa de referencia. La versión española conserva la imaginería depredadora, la repetición enfática y la ausencia de un libertador, sin atenuar el juicio.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en la tradición POB cuando el nombre divino aparece en el hebreo base; aquí el verso no lo incluye en forma explícita, pero el destinatario implícito del juicio es el mismo hablante divino del contexto inmediato.
  - '''Casa de Judá'' se conserva como giro corporativo bíblico, en paralelo con Efraín.'
  - Se evita 'Señor' como sustituto de nombre divino porque el texto aquí depende del habla directa del oráculo y la metáfora, no de una fórmula de respeto litúrgico.
  - La duplicación 'yo, yo mismo' preserva el énfasis hebreo sin introducir interpretación adicional.
