    issue: La nota [a] no corresponde al lugar ni al contenido documentado.
    rationale: El audit trail inglés pone la nota a sobre «your fathers», con alternativa «your ancestors». El borrador la coloca en «desierto» y además ofrece «en el desierto», que no aporta una alternativa real.
  - severity: high
    issue: La nota [b] está asignada a la palabra equivocada y altera la justificación lexical.
    rationale: La nota b en el inglés corresponde a בְאַחֲרִיתֶךָ con alternativas como «afterward» o «in your latter end». En el borrador español se usa para «probarte / ponerte a prueba», aunque esa alternativa no fue la preservada como nota en el POB audit trail.
  - severity: medium
    issue: Las razones de las notas usan una categoría genérica impropia.
    rationale: Dado el contexto, ambas notas son de alternativa léxica, no de ‘alternative_reading’ en sentido más amplio.
