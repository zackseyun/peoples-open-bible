translation:
  language: es
  text: Pero ahora[a], tráiganme un músico. Y mientras el músico tocaba, la mano de Yahvé[b] vino sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ahora». La partícula hebrea introduce una transición inmediata en el discurso.'
    reason: lexical_alternative
  - marker: b
    text: La expresión «la mano de Yahvé» es un hebraísmo que puede indicar poder divino o influencia profética; se conserva la imagen sin precisarla más.
    reason: theological_note
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Ahora
  - Y ahora
  lexicon: HALOT
  rationale: La partícula introduce un giro inmediato en el discurso. «Pero ahora» conserva ese cambio de tono y resulta natural en español.
- source_word: קְחוּ לִי
  english_pob_choice: bring me
  chosen_spanish: tráiganme
  alternatives_spanish:
  - busquen para mí
  - consíganme
  lexicon: HALOT
  rationale: El imperativo con pronombre dativo expresa aquí procurar o hacer traer a alguien para el hablante. «Tráiganme» comunica bien la acción requerida sin forzar el hebreo.
- source_word: מְנַגֵּן
  english_pob_choice: a musician
  chosen_spanish: un músico
  alternatives_spanish:
  - un tañedor
  - un instrumentista
  - un minstrel
  lexicon: HALOT
  rationale: El participio designa de forma general a quien toca música o un instrumento; no especifica instrumento. «Músico» es amplio y fiel. Se evita «minstrel» por ser arcaico y «tañedor» por sonar demasiado restringido o literario.
- source_word: וְהָיָה כְּנַגֵּן הַמְנַגֵּן
  english_pob_choice: And as the musician played
  chosen_spanish: Y mientras el músico tocaba
  alternatives_spanish:
  - Y aconteció que, cuando el músico tocaba
  - Y cuando el músico estaba tocando
  lexicon: HALOT
  rationale: La construcción marca la circunstancia en la que ocurre lo siguiente. «Mientras el músico tocaba» mantiene la relación temporal y suena fluido en español sin perder el valor narrativo.
- source_word: יַד יְהוָה
  english_pob_choice: the hand of Yahweh
  chosen_spanish: la mano de Yahvé
  alternatives_spanish:
  - el poder de Yahvé
  - la mano de Yahvé
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea «mano» para no resolverla de antemano en «poder». Así se preserva la imagen bíblica y la posible referencia a poder o influencia profética.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre divino «Yahvé», conforme al criterio del proyecto, en lugar de ocultarlo con una sustitución titular.
- source_word: וַתְּהִי עָלָיו
  english_pob_choice: came upon him
  chosen_spanish: vino sobre él
  alternatives_spanish:
  - estuvo sobre él
  - descendió sobre él
  lexicon: HALOT
  rationale: El hebreo describe la irrupción de la acción divina o profética. «Vino sobre él» reproduce el movimiento idiomático sin precisar indebidamente el modo exacto de esa acción.
theological_decisions:
- issue: Renderizar el Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se conserva el nombre propio divino para mantener la transparencia del original y la práctica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Conservar la idiomática «mano de Yahvé» sin explicitarla en el cuerpo del texto
  english_pob_reading: the hand of Yahweh came upon him
  chosen_spanish_reading: la mano de Yahvé vino sobre él
  alternative_spanish_readings:
  - el poder de Yahvé vino sobre él
  - la influencia profética de Yahvé vino sobre él
  rationale: La expresión puede aludir a poder divino o a impulso/inspiración profética. La traducción preserva la tensión del hebreo sin reducirla a una sola interpretación.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto español sigue de cerca el audit trail inglés y el hebreo base, sin depender mecánicamente de la redacción inglesa. No se introdujeron revisiones adicionales respecto del último pase, ya que el expediente indicaba alta concordancia y sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa «músico» como término amplio para מְנַגֵּן, evitando especificar instrumento.
  - Se conserva la metáfora «mano de Yahvé» para respetar la ambigüedad teológica del hebreo.
  - La puntuación refleja una división natural en dos cláusulas, como en el inglés auditado, pero con sintaxis española fluida.
