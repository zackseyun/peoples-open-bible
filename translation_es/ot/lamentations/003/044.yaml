translation:
  language: es
  text: Te has cubierto con una nube, para que la oración no pueda atravesar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «Te has cubierto con una nube, impidiendo el paso de la oración».'
    reason: lexical_alternative
lexical_decisions:
- source_word: סַכּוֹתָה
  english_pob_choice: you have covered yourself
  chosen_spanish: tú te has cubierto
  alternatives_spanish:
  - te cubriste
  - te has ocultado
  - te has resguardado
  lexicon: HALOT
  rationale: El verbo en perfecto con valor dirigido a Dios requiere en español una forma reflexiva clara. «Te has cubierto» conserva la acción de cubrir y mantiene la segunda persona directa del lamento, sin suavizar la imagen a una mera ocultación.
- source_word: בֶּעָנָן
  english_pob_choice: with a cloud
  chosen_spanish: con una nube
  alternatives_spanish:
  - en una nube
  - por medio de una nube
  - con nubes
  lexicon: HALOT
  rationale: La preposición ב expresa aquí el medio o envoltura. «Con una nube» suena natural en español y conserva el singular del hebreo sin perder la imagen de cobertura.
- source_word: לָךְ
  english_pob_choice: yourself
  chosen_spanish: tú te
  alternatives_spanish:
  - para ti
  - a ti
  - para ti mismo
  lexicon: HALOT
  rationale: Aunque formalmente es «para/a ti», en contexto completa el sentido reflexivo de סכך. En español no hace falta duplicar el sentido con «para ti mismo»; la reflexividad verbal ya lo expresa.
- source_word: מֵעֲבוֹר
  english_pob_choice: so that ... cannot pass through
  chosen_spanish: para que ... no pueda pasar
  alternatives_spanish:
  - impidiendo que ... pase
  - de modo que ... no pase
  - para impedir que ... pase
  lexicon: HALOT
  rationale: La construcción con מִן + infinitivo comunica exclusión o impedimento. En español, «para que ... no pueda pasar» reproduce el efecto de bloqueo de forma idiomática, sin perder la idea de que la oración queda impedida de atravesar la nube.
- source_word: תְּפִלָּה
  english_pob_choice: prayer
  chosen_spanish: la oración
  alternatives_spanish:
  - la plegaria
  - la súplica
  - la oración de oración
  lexicon: HALOT
  rationale: El sustantivo singular funciona de modo genérico. «La oración» es el equivalente natural y digno en español; «plegaria» o «súplica» estrechan o alteran el registro.
theological_decisions:
- issue: Imagen antropomórfica de Dios obstaculizando la oración
  english_pob_reading: Retain the direct second-person address and imagery of God covering himself with a cloud that blocks prayer.
  chosen_spanish_reading: Mantener el trato directo a Dios y la imagen de que se cubre con una nube que impide pasar la oración.
  alternative_spanish_readings:
  - «Te has ocultado en una nube»
  - «Has puesto una nube entre tú y la oración»
  - «La nube impide la oración»
  rationale: El hebreo habla directamente a Dios y conserva una imagen vívida de ocultamiento y juicio. La traducción mantiene esa tensión sin suavizarla ni convertirla en una explicación más abstracta.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: Coincide con el texto inglés auditado y con su nota léxica sobre la construcción «from the passing through of prayer»; no se registran revisiones posteriores que alteren el sentido.
  spanish_consistency_notes:
  - Se eligió «nube» en singular para reflejar el hebreo singular.
  - Se evitó «SEÑOR» porque aquí no hay sustitución del nombre divino; el verso se dirige directamente a Dios en segunda persona.
  - Se mantuvo «oración» como sustantivo genérico, coherente con el uso del singular hebreo.
