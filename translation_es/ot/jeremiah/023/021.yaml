    rationale: Aunque ו puede significar simplemente «y», aquí el paralelismo con «no envié/no hablé» frente a «corrieron/profetizaron» exige una lectura adversativa. El propio POB inglés lo traduce «yet they» y documenta «and» como alternativa, no como opción principal.
