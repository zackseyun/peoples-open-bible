base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/008/038.yaml
  text: 'the sons of Astad: Joanes son of Akatan[a], and with him one hundred ten men[b];'
  footnotes:
  - marker: a
    text: The Hebrew parallel at Ezra 8:10 differs notably here, reading a different family/name sequence and giving the number as one hundred sixty males. Because 1 Esdras is translated from the Greek witness, the Greek names and total are retained in the main text.
    reason: textual_variant
  - marker: b
    text: Or possibly, 'Joanes Akatan'; the Greek can be read as two adjacent names without an explicit 'son of,' though the genealogical-list context favors the patronymic sense.
    reason: alternative_reading
