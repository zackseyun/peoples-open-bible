translation:
  language: es
  text: Cuando fueron llevados al lugar llamado Schedia[a], y se completó la travesía, tal como había sido decretado por el rey, él ordenó que acamparan en el hipódromo[b] delante de la ciudad, un lugar abierto muy apto para hacer de ellos un ejemplo, visible a todos los que entraban en la ciudad y a los que desde allí eran enviados a la región de viaje, para que no tuvieran trato con sus fuerzas ni en absoluto fueran considerados dignos de un recinto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Schedia» es un topónimo; el griego λεγομένην significa «llamado/a». Se conserva el nombre propio sin traducir.
    reason: source_note
  - marker: b
    text: O «hipódromo de carreras». El griego se refiere específicamente a un recinto para carreras de caballos situado delante de la ciudad.
    reason: lexical_alternative
  - marker: c
    text: La cláusula final probablemente significa que debían quedar sin contacto con las fuerzas del rey y que se les negaba incluso un alojamiento cercado o un recinto protector.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πότιον
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Entonces
  - Al llegar
  lexicon: LSJ
  rationale: La partícula inicial funciona como transición temporal en la construcción participial; «Cuando» conserva el enlace narrativo sin sobreprecisar el matiz.
- source_word: Σχεδίαν
  english_pob_choice: the place called Schedia
  chosen_spanish: el lugar llamado Schedia
  alternatives_spanish:
  - Schedia
  - el sitio llamado Schedia
  lexicon: LSJ
  rationale: Es un topónimo, por lo que se translitera. Se conserva la aposición «llamado» para reflejar λεγομένην.
- source_word: ἀχθέντων
  english_pob_choice: had been brought down
  chosen_spanish: los hubieron llevado abajo
  alternatives_spanish:
  - habían sido llevados
  - los habían traído
  lexicon: BDAG
  rationale: La pasiva aorística indica traslado hacia abajo/a un lugar más bajo. En español se opta por una forma natural que conserve la direccionalidad del verbo.
- source_word: τὸ παράπλου περαθέντος
  english_pob_choice: the voyage had been completed
  chosen_spanish: se hubo completado el viaje por mar
  alternatives_spanish:
  - el viaje había sido completado
  - se había terminado la travesía
  lexicon: LSJ
  rationale: παράπλους refiere a una travesía marítima; «viaje por mar» mantiene claridad y fidelidad al sentido de la navegación.
- source_word: δεδογματισμένον
  english_pob_choice: had been decreed
  chosen_spanish: había sido decretado
  alternatives_spanish:
  - había sido decidido
  - había sido ordenado
  lexicon: LSJ
  rationale: El perfecto pasivo expresa una resolución oficial ya establecida; «decretado» conserva el registro formal y real.
- source_word: ἱπποδρόμῳ
  english_pob_choice: hippodrome
  chosen_spanish: hipódromo
  alternatives_spanish:
  - carrera de caballos
  - pista de carreras
  lexicon: LSJ
  rationale: El término griego designa específicamente un recinto para carreras de caballos; en español «hipódromo» es el equivalente directo y preciso.
- source_word: παρεμβαλεῖν
  english_pob_choice: to encamp
  chosen_spanish: acamparan
  alternatives_spanish:
  - instalaran
  - establecieran campamento
  lexicon: LSJ
  rationale: El verbo puede significar poner en campamento o acuartelar; «acamparan» reproduce de modo claro la acción de alojarlos forzosamente en ese espacio.
- source_word: ἁπλατῷ καθεστῶτι περιμέτρῳ
  english_pob_choice: an open area
  chosen_spanish: un lugar abierto
  alternatives_spanish:
  - un perímetro descubierto
  - un recinto expuesto
  lexicon: LSJ
  rationale: La frase es difícil, pero apunta a un área expuesta y no protegida. «Lugar abierto» comunica la noción espacial sin inventar detalles.
- source_word: πρὸς παραδειγματισμὸν
  english_pob_choice: for making an example of them
  chosen_spanish: para exhibirlos como ejemplo
  alternatives_spanish:
  - para hacer de ellos un escarmiento
  - para escarmiento público
  lexicon: LSJ
  rationale: El sustantivo expresa convertir a alguien en ejemplo público, con carga de vergüenza y advertencia. «Exhibirlos como ejemplo» conserva ambas dimensiones en español.
- source_word: ἄγαν εὐκαιροτάτῳ
  english_pob_choice: very well suited
  chosen_spanish: muy apto
  alternatives_spanish:
  - sumamente oportuno
  - excelentemente adecuado
  lexicon: LSJ
  rationale: La expresión intensifica la idoneidad del lugar. «Muy apto» es natural y mantiene la idea de conveniencia extrema.
- source_word: πᾶσι τοῖς καταπορευομένοις εἰς τὴν πόλιν
  english_pob_choice: all who were traveling into the city
  chosen_spanish: todos los que entraban en la ciudad
  alternatives_spanish:
  - todos los que iban hacia la ciudad
  - todos los que se dirigían a la ciudad
  lexicon: LSJ
  rationale: καταπορευομένοις tiene dirección de entrada. «Entraban en la ciudad» es fluido y conserva el sentido del desplazamiento hacia adentro.
- source_word: τοῖς ἐκ τούτων εἰς τὴν χώραν στελλομένοις πρὸς ἐκδημίαν
  english_pob_choice: those being sent out from there into the country on a journey
  chosen_spanish: los que desde allí eran enviados al campo para viajar
  alternatives_spanish:
  - los que eran despachados desde allí al campo de viaje
  - los que salían desde allí hacia la región para ausentarse
  lexicon: LSJ
  rationale: στελλομένοις puede implicar ser enviados o despachados, y ἐκδημία sugiere un viaje fuera del lugar de residencia. La formulación española conserva ambos elementos sin volverse arcaica.
- source_word: μηδὲ ταῖς δυνάμεσιν αὐτοῦ κοινωνεῖν
  english_pob_choice: might neither associate with his forces
  chosen_spanish: no tuvieran trato con sus fuerzas
  alternatives_spanish:
  - no se relacionaran con sus tropas
  - no compartieran compañía con su ejército
  lexicon: LSJ
  rationale: κοινωνεῖν indica participar o asociarse con. «Tener trato con» comunica la prohibición de contacto con las tropas del rey.
- source_word: μηδὲ τὸ σύνολον καταξιῶσαι περιβόλῳ
  english_pob_choice: nor at all be considered worthy of an enclosure
  chosen_spanish: ni, en absoluto, fueran considerados dignos de un recinto cercado
  alternatives_spanish:
  - ni en absoluto fueran juzgados dignos de un cercado
  - ni se les considerara merecedores de un recinto
  lexicon: LSJ
  rationale: τὸ σύνολον refuerza negación absoluta; καταξιόω expresa considerar digno; περίβολος es un recinto o cerco. «Recinto cercado» mantiene el contraste de indignidad y la imagen física del encierro.
translation_notes:
  revision_awareness: 'He seguido el cierre revisado del audit trail inglés: traduzco καταπορευομένοις de manera natural como «entraban en la ciudad» y τὸ σύνολον con una negación enfática («en absoluto»), evitando una glosa que sonara demasiado interpretativa. También conservé el contraste entre el lugar abierto de exposición y el «recinto cercado» negado al final.'
  spanish_consistency_notes:
  - Se usa «hipódromo» para ἱππόδρομος y no una paráfrasis genérica, manteniendo el trasfondo histórico.
  - «Dignos de un recinto cercado» preserva el matiz de exclusión y deshonra del περίβολος.
  - La voz narrativa usa un español bíblico moderno, no arcaizante, con cadencia formal adecuada para lectura eclesial.
