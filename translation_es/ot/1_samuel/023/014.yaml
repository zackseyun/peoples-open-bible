translation:
  language: es
  text: David se quedó en las fortalezas del desierto, y se quedó en la región montañosa, en el desierto de Zif. Saúl lo buscó todos los días, pero Dios no lo entregó en manos de Saúl[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no lo dio en su mano». El hebreo dice literalmente «no lo dio en su mano».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  english_pob_choice: stayed
  chosen_spanish: se quedó
  alternatives_spanish:
  - habitó
  - permaneció
  - estuvo
  lexicon: HALOT
  rationale: ישׁב puede expresar habitar, permanecer o quedarse. En español, «se quedó» comunica continuidad de residencia o permanencia sin sonar arcaico, y conserva el valor narrativo del hebreo.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el yermo
  - en la estepa
  lexicon: HALOT
  rationale: En este contexto geográfico, «desierto» comunica bien la zona inhóspita y despoblada. «Wilderness» puede abarcar más que arena; en español, «desierto» es la opción más natural y fiel para un lector bíblico amplio.
- source_word: בַּמְּצָדוֹת
  english_pob_choice: strongholds
  chosen_spanish: en las fortalezas
  alternatives_spanish:
  - en los refugios fortificados
  - en las fortalezas defensivas
  lexicon: HALOT
  rationale: מְצָדוֹת designa lugares defensivos o fortificados. «Fortalezas» mantiene el sentido militar y es un equivalente claro en español; se conserva la idea de defensa sin suavizarla a un mero refugio.
- source_word: בָּהָר
  english_pob_choice: in the hill country
  chosen_spanish: en la región montañosa
  alternatives_spanish:
  - en la montaña
  - en las montañas
  lexicon: HALOT
  rationale: הָר puede referirse a montaña o a terreno montañoso. «Región montañosa» evita la impresión de una sola montaña y refleja mejor el trasfondo geográfico del pasaje.
- source_word: בְּמִדְבַּר זִיף
  english_pob_choice: in the wilderness of Ziph
  chosen_spanish: en el desierto de Zif
  alternatives_spanish:
  - en el desierto de Zif
  lexicon: HALOT
  rationale: Se conserva la construcción geográfica como nombre de lugar. «Zif» sigue la forma usual española del topónimo, y «desierto de Zif» mantiene el valor constructo del hebreo.
- source_word: וַיְבַקְשֵׁהוּ
  english_pob_choice: sought him
  chosen_spanish: lo buscó
  alternatives_spanish:
  - lo persiguió
  - lo buscó con insistencia
  lexicon: HALOT
  rationale: בקשׁ aquí expresa buscar o procurar encontrar. «Lo buscó» es natural en español y conserva la idea de persecución activa sin añadir matices no explicitados por el hebreo.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all the days
  chosen_spanish: todos los días
  alternatives_spanish:
  - todo el tiempo
  - de continuo
  lexicon: HALOT
  rationale: La expresión hebrea literalmente significa «todos los días». En español, «todos los días» preserva bien la duración reiterada y es transparente para el lector.
- source_word: וְלֹא נְתָנוֹ
  english_pob_choice: did not give him
  chosen_spanish: no lo entregó
  alternatives_spanish:
  - no lo dio
  - no lo puso
  lexicon: HALOT
  rationale: נתן con «en su mano» funciona como un modismo de entrega o entrega a control ajeno. «No lo entregó» expresa ese valor idiomático con más claridad que una traducción literal de «dar» en español.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aunque el sustantivo es morfológicamente plural, aquí tiene sentido singular y refiere al Dios de Israel. «Dios» es la traducción adecuada y mantiene la referencia teológica del relato.
- source_word: בְּיָדוֹ
  english_pob_choice: into his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en su poder
  - bajo su dominio
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo «en su mano», que en español sigue siendo comprensible y retiene la imagen de control o poder ejercido por Saúl.
theological_decisions:
- issue: Providencia divina en la preservación de David
  english_pob_reading: God did not give David into Saul's hand
  chosen_spanish_reading: Dios no lo entregó en su mano
  alternative_spanish_readings:
  - Dios no lo entregó a Saúl
  - Dios no lo puso en poder de Saúl
  rationale: La redacción conserva la atribución directa a Dios y el modismo hebreo de «mano» como símbolo de poder o control. No se diluye la afirmación providencial del texto, pero tampoco se la amplía más allá de lo que el hebreo dice.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
translation_notes:
  revision_awareness: Coincide con la última pasada revisada (sin cambios) y con el consenso alto del control cruzado; no se detectaron revisiones textuales que exijan variantes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y no se introduce «SEÑOR», porque aquí el texto hebreo nombra explícitamente a Dios como sujeto de la acción providencial.
  - Se preserva el modismo «en su mano» en lugar de reemplazarlo por una paráfrasis total, para conservar la imagen hebrea de control/entrega.
  - «Zif» sigue la transliteración habitual en español bíblico y coincide con el topónimo del original.
