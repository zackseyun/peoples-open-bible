translation:
  language: es
  text: Nuestros padres pecaron[a], y ya no están; pero nosotros llevamos sus iniquidades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llevamos el castigo o las consecuencias de sus iniquidades». El hebreo puede referirse a la iniquidad misma, a la culpa o a la carga que resulta de ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבֹתֵינוּ
  english_pob_choice: Our fathers
  chosen_spanish: Nuestros padres
  alternatives_spanish:
  - Nuestros antepasados
  - Nuestros progenitores
  lexicon: HALOT
  rationale: «אבות» puede significar «padres» y también extenderse a «antepasados». En español, «nuestros padres» conserva la resonancia familiar y de pacto del hebreo, y sigue siendo natural y claro; «antepasados» es posible, pero atenúa el vínculo filial directo.
- source_word: חָטְאוּ
  english_pob_choice: sinned
  chosen_spanish: pecaron
  alternatives_spanish:
  - han pecado
  lexicon: HALOT
  rationale: El qal perfecto de חטא expresa la acción de pecar. En una lamentación retrospectiva, el pretérito simple («pecaron») suena más natural en español y conserva el valor puntual del hecho.
- source_word: אֵינָם
  english_pob_choice: they are no more
  chosen_spanish: ya no existen
  alternatives_spanish:
  - ya no están
  - no son
  lexicon: HALOT
  rationale: La forma hebrea literalmente significa «no son», pero en contexto idiomático indica ausencia definitiva, incluso muerte. «Ya no existen» comunica esa idea solemne de que ya no están presentes, sin depender de una máscara eufemística.
- source_word: אֲנַחְנוּ
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  - nosotros, por nuestra parte
  lexicon: HALOT
  rationale: El pronombre independiente marca contraste enfático. «Nosotros» conserva ese contraste en español junto con «pero».
- source_word: עֲוֺנֹתֵיהֶם
  english_pob_choice: their iniquities
  chosen_spanish: sus iniquidades
  alternatives_spanish:
  - su culpa
  - sus pecados
  - el castigo por sus iniquidades
  lexicon: HALOT
  rationale: עָוֹן puede abarcar iniquidad, culpa o la carga/consecuencia resultante. «Iniquidades» mantiene la transparencia formal y deja abierta la amplitud semántica que el contexto de «llevar» sugiere.
- source_word: סָבָלְנוּ
  english_pob_choice: we bear
  chosen_spanish: llevamos
  alternatives_spanish:
  - soportamos
  - hemos llevado
  lexicon: HALOT
  rationale: סבל denota cargar, llevar o soportar un peso. «Llevamos» conserva la metáfora de cargar una carga y funciona bien con «iniquidades» en español; «soportamos» suena más interpretativo.
theological_decisions:
- issue: Si el verso enseña culpa heredada directa o el peso de las consecuencias del pecado de generaciones anteriores
  english_pob_reading: The translation preserves the Hebrew's tension by rendering 'we bear their iniquities' without resolving whether this means inherited guilt, punishment, or the ongoing burden/consequences of ancestral sin.
  chosen_spanish_reading: La traducción mantiene la tensión del hebreo con «llevamos sus iniquidades», sin decidir si se trata de culpa heredada, castigo, o el peso continuo de las consecuencias del pecado ancestral.
  alternative_spanish_readings:
  - llevamos el castigo por sus iniquidades
  - sufrimos por sus pecados
  rationale: עָוֹן admite el sentido de iniquidad, culpa y sus consecuencias. El lamento no precisa más; por eso conviene no cerrar el alcance teológico del enunciado en español.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La comparación con el texto fuente hebreo y el contexto auditado en inglés muestra plena concordancia con la lectura estándar del verso. No se registran revisiones aplicadas; la versión española conserva el paralelo entre el pecado de los padres, su ausencia y la carga asumida por la generación presente.
  spanish_consistency_notes:
  - Se prefirió «padres» en vez de «antepasados» para retener la fuerza relacional del hebreo.
  - «Ya no existen» interpreta idiomáticamente אֵינָם sin introducir una formulación doctrinal ajena al lamento.
  - «Iniquidades» mantiene la ambigüedad semántica documentada en la nota inglesa y no la resuelve.
  - Se usó «llevamos» para respetar la metáfora de carga presente en סבל.
