revisions:
- from: Y sucederá que lo repartirán como herencia para ustedes y para los forasteros[a] que residen entre ustedes, que han engendrado hijos entre ustedes; y serán para ustedes como un nativo[c][b] entre los hijos de Israel. Con ustedes recibirán herencia entre las tribus de Israel.
  to: Y sucederá que la repartirán como herencia para ustedes y para los extranjeros residentes[a] que residen entre ustedes, que han tenido hijos[b] entre ustedes; y serán para ustedes como un nativo[c] entre los hijos de Israel. Con ustedes recibirán herencia entre las tribus de Israel.
  rationale: Se ajusta גֵּר a 'extranjeros residentes' para conservar mejor el matiz jurídico-social del hebreo en un contexto de reparto territorial. Se cambia 'han engendrado hijos' por 'han tenido hijos' para seguir la decisión auditada de entender בָנִים de modo genérico en este contexto, manteniendo la alternativa más literal en nota. El resto del texto se conserva por ser fiel, claro y natural.
