    text: O «airaron al Dios del cielo».
    reason: lexical_alternative
  - marker: b
    text: Arameo «esta casa», es decir, el templo.
    reason: cultural_note
  - marker: c
    text: O «exilió al pueblo a Babilonia».
    reason: lexical_alternative
  revision_rationale: 'Se revisa para mejorar la naturalidad del español sin perder la fuerza causal del original: «provocaron la ira» expresa mejor הַרְגִּזוּ que «provocaron a ira». Se ajusta el modismo a «en manos de» por claridad idiomática. Se corrigen y reducen las notas para alinearlas con el audit trail inglés: alternativa léxica para el verbo de ira, nota cultural sobre «esta casa», y alternativa para «llevó al pueblo a Babilonia».'
