translation:
  language: es
  text: Si hubieras andado en el camino de Dios, habrías habitado en paz para siempre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τῇ ὁδῷ
  english_pob_choice: in the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - en la vía
  - en la senda
  lexicon: LSJ
  rationale: ὁδός se entiende naturalmente como ‘camino’ en español bíblico y conserva la metáfora de una forma de vida o conducta, sin volverla una paráfrasis abstracta.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Yahvé
  - de parte de Dios
  lexicon: LSJ
  rationale: El genitivo es directo y nombra la pertenencia o referencia del camino a Dios. Aquí ‘Dios’ comunica con claridad la construcción del griego sin introducir una decisión adicional sobre el nombre divino.
- source_word: εἰ ἐπορεύθης
  english_pob_choice: if you had walked
  chosen_spanish: si hubieras andado
  alternatives_spanish:
  - si hubieras caminado
  - si hubieras ido
  lexicon: LSJ
  rationale: El aoristo con εἰ expresa una condición contraria a la realidad pasada; el pluscuamperfecto español conserva bien ese valor. ‘Andado’ mantiene la imagen de conducta/andar de manera más natural que una traducción más literal y dura.
- source_word: κατῴκεις ἂν
  english_pob_choice: you would have dwelt
  chosen_spanish: habrías habitado
  alternatives_spanish:
  - habrías morado
  - habrías vivido
  lexicon: LSJ
  rationale: κατοικέω significa habitar, residir. ‘Habrías habitado’ conserva mejor la idea de residencia estable que ‘habrías vivido’, y sigue siendo inteligible en español contemporáneo.
- source_word: ἐν εἰρήνῃ
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - en paz y tranquilidad
  - pacíficamente
  lexicon: LSJ
  rationale: εἰρήνη se traduce normalmente como ‘paz’. En español, ‘en paz’ preserva el sustantivo y su peso bíblico, evitando convertirlo en un adverbio.
- source_word: τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - por siempre
  lexicon: LSJ
  rationale: La expresión funciona adverbialmente para duración continua. ‘Para siempre’ es la equivalencia española más natural y fiel al alcance temporal del giro.
theological_decisions:
- issue: Condición irreal o contraria a la realidad
  english_pob_reading: 'Render as a contrary-to-fact past condition: ''If you had walked ... you would have lived ...'''
  chosen_spanish_reading: Si hubieras andado ... habrías habitado ...
  alternative_spanish_readings:
  - Si andabas ... habitarías ...
  - Si hubieras ido ... habitarías ...
  rationale: El griego apunta a una situación no realizada en el pasado. El español con pluscuamperfecto de subjuntivo y condicional perfecto conserva ese lamento retrospectivo en vez de convertirlo en una máxima general.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Metáfora del ‘camino de Dios’
  english_pob_reading: Keep the metaphor rather than paraphrasing it as 'God's commands' or 'God's law'
  chosen_spanish_reading: Conservar ‘el camino de Dios’
  alternative_spanish_readings:
  - ‘los mandamientos de Dios’
  - ‘la ley de Dios’
  rationale: El griego dice literalmente ‘el camino de Dios’. Mantener la metáfora evita estrechar el sentido y respeta la imagen moral y relacional del texto.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando cualquier nota al pie no anclada en el texto. La redacción final mantiene el valor condicional irreal del griego y la metáfora del camino sin añadir marcas de nota.
  spanish_consistency_notes:
  - Se mantuvo ‘Dios’ para θεός en línea con el estándar del proyecto.
  - Se prefirió ‘habitado’ para κατοικέω por su valor de residencia estable.
  - No se usó ‘SEÑOR’ ni ‘Cristo’; no aplican a este versículo.
  - La puntuación sigue el estilo español moderno y natural para una sola cláusula condicional con apódosis.
