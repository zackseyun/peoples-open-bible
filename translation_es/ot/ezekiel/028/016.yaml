translation:
  language: es
  text: Por la abundancia de tu comercio[a], se llenó tu interior de violencia, y pecaste; por eso te arrojé como profano[b] del monte de Dios, y te destruí, querubín protector[c], de en medio de las piedras de fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu tráfico» o «tu actividad comercial»; el término hebreo puede abarcar comercio, trato mercantil o tráfico.
    reason: lexical_alternative
  - marker: b
    text: O «te profané». El verbo hebreo significa «profanar» o «tratar como no santo», probablemente con el sentido de expulsión de un lugar sagrado.
    reason: lexical_alternative
  - marker: c
    text: O «querubín que cubre». El participio hebreo significa literalmente «que cubre» o «que hace sombra», aquí entendido en sentido protector.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרֹב / רְכֻלָּתְךָ
  english_pob_choice: By the abundance of your trade
  chosen_spanish: Por la abundancia de tu comercio
  alternatives_spanish:
  - Por la abundancia de tu tráfico
  - Por la abundancia de tu actividad comercial
  lexicon: HALOT
  rationale: La construcción con בְּרֹב expresa la circunstancia o causa, y רְכֻלָּה puede significar comercio, tráfico o transacción comercial. «Comercio» mantiene el campo semántico sin insinuar por sí solo una ilicitud que el hebreo no especifica léxicamente.
- source_word: מָל֧וּ תוֹכְךָ חָמָס
  english_pob_choice: your midst was filled with violence
  chosen_spanish: se llenó tu interior de violencia
  alternatives_spanish:
  - tu interior fue lleno de violencia
  - se llenó tu medio de violencia
  lexicon: HALOT
  rationale: El hebreo usa una forma verbal en plural con sentido resultativo; en español suena más natural una pasiva/reflexiva. «Interior» conserva la imagen de תּוֹךְ como centro interno o íntimo, mientras que «se llenó» refleja el resultado.
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - injusticia
  - opresión violenta
  lexicon: HALOT
  rationale: «Violencia» es la equivalencia directa y usual para חָמָס. Mantiene el peso moral y social del término sin atenuarlo.
- source_word: וַתֶּחֱטָא
  english_pob_choice: and you sinned
  chosen_spanish: y pecaste
  alternatives_spanish:
  - y te desviaste
  - y cometiste pecado
  lexicon: HALOT
  rationale: En este contexto, ḥṭʾ expresa pecado real contra Dios; «pecaste» es breve y fiel, y conserva la progresión del texto.
- source_word: וָאֶחַלֶּלְךָ
  english_pob_choice: so I cast you as profane
  chosen_spanish: por eso yo te profané
  alternatives_spanish:
  - por eso te traté como profano
  - por eso te declaré profano
  lexicon: HALOT
  rationale: El verbo חלל en piel significa profanar, tratar como impuro o no santo. El español «te profané» mantiene la fuerza cultual. Aunque la nota inglesa destaca el matiz de expulsión, el hebreo principal sigue siendo la profanación; por eso se conserva el término fuerte y se explica en nota.
- source_word: מֵהַר אֱלֹהִים
  english_pob_choice: from the mountain of God
  chosen_spanish: del monte de Dios
  alternatives_spanish:
  - del monte de Yahvé
  - del monte de Dios
  lexicon: HALOT
  rationale: «Monte de Dios» reproduce literalmente la expresión hebrea y conserva la imaginería sagrada elevada. No se sustituye por «Yahvé» porque el texto hebreo dice אֱלֹהִים.
- source_word: וָאַבֶּדְךָ
  english_pob_choice: and I destroyed you
  chosen_spanish: y te destruí
  alternatives_spanish:
  - y te arruiné
  - y te hice perecer
  lexicon: HALOT
  rationale: אבד en este contexto admite destruir, hacer perecer o arruinar. «Te destruí» es la correspondencia más directa y clara en español.
- source_word: כְּרוּב
  english_pob_choice: cherub
  chosen_spanish: querubín
  alternatives_spanish:
  - querub
  lexicon: HALOT
  rationale: En español bíblico, «querubín» es la forma más natural y reconocible del singular de כְּרוּב.
- source_word: הַסֹּכֵךְ
  english_pob_choice: guardian
  chosen_spanish: protector
  alternatives_spanish:
  - cubridor
  - que cubre
  lexicon: HALOT
  rationale: El participio de סכך alude a cubrir, proteger o hacer sombra. «Protector» comunica bien esa función en español sin perder del todo el sentido de cobertura; «que cubre» quedaría más literal pero menos idiomático.
- source_word: מִתּוֹךְ אַבְנֵי אֵשׁ
  english_pob_choice: from the midst of the stones of fire
  chosen_spanish: de en medio de las piedras de fuego
  alternatives_spanish:
  - de entre las piedras de fuego
  - del centro de las piedras de fuego
  lexicon: HALOT
  rationale: Se preserva la imagen enigmática con una estructura formal. «De en medio de» sigue de cerca מִתּוֹךְ y mantiene el tono solemne del hebreo.
theological_decisions:
- issue: Si resolver o no la identidad del destinatario (rey humano, figura querúbica, lectura tipológica o angelical)
  english_pob_reading: Preserve the text's direct address and cherubic imagery without resolving the broader interpretive debate.
  chosen_spanish_reading: Preservar el trato directo y la imaginería querúbica sin resolver el debate interpretativo amplio.
  alternative_spanish_readings:
  - Aplanar la imagen como simple metáfora real
  - Identificar explícitamente a Satanás o a un ángel caído primordial
  rationale: El verso mezcla lenguaje de juicio, santuario y figura querúbica. La traducción debe conservar esa tensión en lugar de imponer una lectura sistemática que el hebreo no formula de manera explícita.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió «cast you as profane» frente a «profaned you» para reflejar mejor el matiz causativo de חלל. En español se mantuvo el verbo fuerte «te profané» por fidelidad léxica, pero la nota explica el posible sentido de expulsión/tratamiento como profano. También se conservó la decisión de no resolver la identidad del personaje más allá del texto.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo base es יהוה; aquí el texto dice אֱלֹהִים, por eso se traduce «Dios».
  - Se evita «SEÑOR» como sustituto del nombre divino, siguiendo la política del proyecto.
  - «Querubín» se usa como forma natural en español para singular; no se pluraliza ni se interpreta alegóricamente.
  - «Comercio» se elige como término base, sin cargarlo automáticamente de ilicitud; la carga moral viene del contexto.
  - Se conserva «de en medio de» para mantener la fuerza formal de מִתּוֹךְ y el tono imagético del pasaje.
