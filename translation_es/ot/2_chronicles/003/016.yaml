translation:
  language: es
  text: Hizo cadenas[b] en el santuario interior[a] y las puso sobre la parte superior de las columnas; hizo también cien granadas y las puso en las cadenas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aposento interior»; tradicionalmente, «Lugar Santísimo». El término hebreo se refiere al santuario interior del templo, aunque algunos entienden la frase aquí de manera más amplia en relación con la decoración.
    reason: alternative_reading
  - marker: b
    text: O «trabajo de cadenas» o «guirnaldas», como decoración ornamental.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁרְשְׁרוֹת
  english_pob_choice: chains
  chosen_spanish: cadenas
  alternatives_spanish:
  - eslabones
  - cadena ornamentales
  - guirnaldas
  lexicon: HALOT
  rationale: El término hebreo designa un adorno en forma de cadena. «Cadenas» conserva el sentido concreto y funciona bien en español. Otras opciones, como «eslabones» o «guirnaldas», pueden sugerir demasiado el material o una forma floral y debilitan la imagen de ornamento encadenado.
- source_word: בַּדְּבִיר
  english_pob_choice: in the inner sanctuary
  chosen_spanish: en el santuario interior
  alternatives_spanish:
  - en el aposento interior
  - en el Lugar Santísimo
  - en la cámara interior
  lexicon: HALOT
  rationale: «Santuario interior» reproduce de manera clara el sentido arquitectónico del hebreo sin imponer de entrada la etiqueta litúrgica tradicional. Como el contexto admite cierta amplitud, se preserva la ambigüedad útil del POB con una nota.
- source_word: רֹאשׁ הָעַמֻּדִים
  english_pob_choice: the tops of the pillars
  chosen_spanish: las cabezas de las columnas
  alternatives_spanish:
  - los remates de las columnas
  - las copas de las columnas
  - la parte superior de las columnas
  lexicon: HALOT
  rationale: Hebreo usa «cabeza» para la parte superior; en español, «cabezas» mantiene la metáfora y el paralelismo con el original. «Topes/remates» sería más interpretativo y menos fiel al modo expresivo hebreo.
- source_word: רִמּוֹנִים
  english_pob_choice: pomegranates
  chosen_spanish: granadas
  alternatives_spanish:
  - granadas (fruto)
  - pomegranates
  - adornos de granada
  lexicon: HALOT
  rationale: En español, «granadas» es la denominación natural del fruto y puede funcionar para los ornamentos de granada del templo. Se evita el anglicismo y se conserva la imagen ornamental concreta del texto.
- source_word: מֵאָה
  english_pob_choice: one hundred
  chosen_spanish: cien
  alternatives_spanish:
  - ciento
  - cien unidades
  - cien en total
  lexicon: HALOT
  rationale: El numeral cardinal se traduce de forma directa y natural en español. «Cien» es suficiente aquí y encaja con el estilo inventarial del verso.
- source_word: וַיִּתֵּן בַּשַּׁרְשְׁרוֹת
  english_pob_choice: put them on the chains
  chosen_spanish: las puso en las cadenas
  alternatives_spanish:
  - las colocó sobre las cadenas
  - las puso sobre las cadenas
  - las sujetó a las cadenas
  lexicon: HALOT
  rationale: El verbo y la preposición favorecen una relación de colocación/adhesión sobre las cadenas. «Las puso en las cadenas» sigue el valor del POB y evita sobreinterpretar el modo exacto de fijación.
theological_decisions:
- issue: Alcance de בַּדְּבִיר
  english_pob_reading: inner sanctuary, with a note allowing 'inner room' or traditionally 'Most Holy Place'
  chosen_spanish_reading: santuario interior, con nota que permite 'aposento interior' y el uso tradicional 'Lugar Santísimo'
  alternative_spanish_readings:
  - aposento interior
  - Lugar Santísimo
  rationale: El hebreo permite una referencia arquitectónica al espacio interior del templo; la traducción principal debe ser clara sin cerrar la discusión. La nota conserva el rango de lecturas que el POB documenta.
  doctrine_reference: Descripción del templo; no implica una afirmación doctrinal en sí misma, sino un problema de terminología arquitectónica y cultual.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura del POB en inglés y conserva su decisión clave: traducir שַׁרְשְׁרוֹת como un adorno de cadena concreto, y בַּדְּבִיר como un espacio interior del templo con ambigüedad controlada mediante nota. No se registran revisiones posteriores en el expediente, y el estado de concordancia es alto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no lo contiene.
  - «Cadenas» se mantiene como término principal para שַׁרְשְׁרוֹת y no se sustituye por un término más ornamental sin respaldo textual.
  - Se usa «santuario interior» como equivalente principal de בַּדְּבִיר para evitar una paráfrasis litúrgica excesiva.
  - «Granadas» se eligió como equivalente natural y bíblicamente transparente para רִמּוֹנִים.
