translation:
  language: es
  text: al sol para gobernar de día[a], porque su amor constante[b] permanece para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "para dominio de día". El hebreo usa un sustantivo ("gobierno" o "dominio") donde en español resulta más natural usar un infinitivo: "para gobernar".'
    reason: lexical_alternative
  - marker: b
    text: '"Amor constante" traduce el hebreo חֶסֶד, un término rico que también puede expresarse como "amor leal", "misericordia" o "fidelidad de pacto", según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶת הַשֶּׁמֶשׁ
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - sol
  lexicon: HALOT
  rationale: El sustantivo definido שֶׁמֶשׁ se expresa naturalmente en español como 'el sol'. No se traduce el marcador de objeto אֶת de manera independiente, porque en español queda implícito en la sintaxis natural del verso.
- source_word: לְמֶמְשֶׁלֶת
  english_pob_choice: to rule
  chosen_spanish: para regir
  alternatives_spanish:
  - para dominio
  - para gobernar
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo ('dominio, gobierno') con valor funcional; en español, 'para regir' comunica bien la finalidad o назначación del sol en el paralelismo poético. 'Para dominio' sería más literal pero menos idiomático.
- source_word: בַּיּוֹם
  english_pob_choice: by day
  chosen_spanish: de día
  alternatives_spanish:
  - en el día
  - durante el día
  lexicon: HALOT
  rationale: '''De día'' es la forma natural en español para expresar la esfera temporal del dominio del sol y corresponde al contraste implícito con la noche en el contexto.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En este refrán, כִּי introduce la razón o fundamento del enunciado. 'Porque' conserva el valor causal sin perder claridad en español.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: El hebreo expresa duración perpetua. En español, con el verbo implícito del refrán, 'para siempre' transmite la permanencia sin añadir una idea verbal no presente de forma explícita.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su misericordia
  alternatives_spanish:
  - su amor constante
  - su bondad leal
  - su misericordia fiel
  lexicon: HALOT
  rationale: חֶסֶד es un término de amplio campo semántico que puede incluir amor leal, misericordia y fidelidad de pacto. Aquí 'misericordia' funciona en español bíblico como equivalente sobrio y reconocible, aunque no agota el matiz del hebreo.
theological_decisions:
- issue: Cómo renderizar el refrán de חֶסֶד en el Salmo 136
  english_pob_reading: his steadfast love endures forever
  chosen_spanish_reading: su misericordia para siempre
  alternative_spanish_readings:
  - su amor constante para siempre
  - su bondad leal para siempre
  - su misericordia fiel para siempre
  rationale: El hebreo del refrán es nominal y el español requiere una formulación más natural. Se preserva la idea central de duración perpetua y la cualidad benevolente del atributo divino. 'Misericordia' es una opción eclesialmente inteligible, aunque 'amor constante' o 'bondad leal' resaltan mejor la fuerza covenantal de חֶסֶד.
  doctrine_reference: Principios POB sobre terminología clave y equivalencia funcional; cf. consistencia del refrán de Salmo 136
translation_notes:
  revision_awareness: 'La redacción sigue el paralelismo del hebreo y refleja el audit trail inglés: מֶמְשֶׁלֶת se vuelve un verbo natural en español, y חֶסֶד se conserva con un término bíblico común en español, sin introducir glosas innecesarias en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene un español litúrgico pero moderno, apto para lectura pública.
  - Se evita 'SEÑOR' porque el versículo no contiene el Tetragrámaton.
  - No se usa 'Cristo' ni vocabulario cristológico, pues no corresponde al texto.
  - La frase final conserva la estructura refránica breve característica de Salmo 136.
