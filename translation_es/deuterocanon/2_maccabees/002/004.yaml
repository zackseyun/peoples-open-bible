    text: O «que parecía irresistible» para la expresión difícil que describe la fuerza que lo acompañaba.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la transliteración del nombre propio para alinearla con la decisión auditada «Nanaia», y se rehace la cláusula final para expresar en español natural el genitivo absoluto: los sacerdotes recurrieron al engaño. También se ajusta la secuencia verbal para reflejar mejor que habían llegado el líder y su fuerza antes de ser abatidos. Se conserva la nota léxica sobre «invencible/irresistible».'
