lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Se pusieron en marcha
  - Salieron
  lexicon: HALOT
  rationale: En la fórmula itinerante del desierto, נסע expresa el acto de levantar campamento y avanzar. «Partieron» comunica con naturalidad ese movimiento sin perder el valor de secuencia narrativa.
- source_word: מֵרִתְמָה
  english_pob_choice: from Rithmah
  chosen_spanish: de Ritmá
  alternatives_spanish:
  - desde Ritmá
  lexicon: HALOT
  rationale: La preposición מִן se vierte con «de» para marcar origen. Se translitera el topónimo como nombre propio, manteniendo la referencia geográfica del hebreo.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: y acamparon
  alternatives_spanish:
  - y levantaron el campamento
  - y se establecieron en campamento
  lexicon: HALOT
  rationale: חנה en estos itinerarios significa establecer campamento; «acamparon» es claro y fiel en español moderno.
- source_word: בְּרִמֹּן פָּרֶץ
  english_pob_choice: at Rimmon-perez
  chosen_spanish: en Rimón-Peres
  alternatives_spanish:
  - en Rimón-Peres
  - a Rimón-Peres
  lexicon: HALOT
  rationale: La preposición ב indica localización del campamento; «en» es la equivalencia española más natural. El nombre compuesto se conserva transliterado y con guion para reflejar su unidad toponímica.
translation_notes:
  revision_awareness: El borrador anterior omitió el anclaje de la nota; se corrigió insertando [a] junto a «Ritmá», que es el primer punto donde la alternativa de movimiento encaja con la nota textual.
  spanish_consistency_notes:
  - 'Se mantuvo el nombre propio transliterado de forma consistente: Ritmá, Rimón-Peres.'
  - Se prefirió un español narrativo sobrio, acorde con una lista de itinerarios.
  - La nota alternativa está anclada explícitamente en el texto para cumplir la validación.
