revisions:
- from: Reuniré a todas las naciones y las haré descender al valle de Josafat[a]; allí entraré en juicio con ellas acerca de mi pueblo y de mi heredad, Israel, al cual dispersaron entre las naciones y repartieron mi tierra.
  to: Reuniré a todas las naciones y las haré descender al valle de Josafat[a], y allí entraré en juicio con ellas acerca de mi pueblo y mi heredad, Israel[b], a quien dispersaron entre las naciones y repartieron mi tierra.
  rationale: 'Se corrige una coordinación poco natural (''mi pueblo y de mi heredad'' -> ''mi pueblo y mi heredad''), se mejora levemente la fluidez con ''a quien'', y se añaden/ajustan las notas para reflejar fielmente el rastro auditado en inglés: una nota cultural sobre el topónimo y una nota de alternativa semántica sobre la preposición עַל en contexto judicial.'
