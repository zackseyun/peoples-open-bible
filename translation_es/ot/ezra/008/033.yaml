base_translation:
  language: en
  yaml_path: translation/ot/ezra/008/033.yaml
  text: And on the fourth day[a], the silver and the gold and the vessels were weighed out in the house of our God into the hand of Meremoth son of Uriah the priest, and with him was Eleazar son of Phinehas, and with them were Jozabad son of Jeshua and Noadiah son of Binnui[b], the Levites.
  footnotes:
  - marker: a
    text: Or 'in the charge of Meremoth son of Uriah the priest.' The Hebrew idiom literally reads 'into the hand of.'
    reason: lexical_alternative
  - marker: b
    text: That is, temple vessels or articles.
    reason: cultural_note
