translation:
  language: es
  text: 'Yo les conjuro[a], hijas de Jerusalén[b][c], por las gacelas o por las ciervas del campo: no despierten ni aviven el amor hasta que quiera.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Yo les pongo bajo juramento».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «por las gacelas o por las ciervas del campo», una fórmula de juramento poética; algunos ven un juego de palabras que alude a títulos divinos, pero aquí el sentido llano es la imagen animal.'
    reason: cultural_note
  - marker: c
    text: 'O: «que no despierten ni aviven el amor hasta que ella/ello quiera».'
    reason: alternative_reading
lexical_decisions:
- source_word: הִשְׁבַּעְתִּי
  english_pob_choice: I adjure you
  chosen_spanish: Yo les conjuro
  alternatives_spanish:
  - Yo las pongo bajo juramento
  - Yo les hago jurar
  - Yo las amonesto solemnemente
  lexicon: HALOT
  rationale: El hiphil de שׁבע expresa poner bajo juramento o conminar con juramento. «Conjuro» conserva mejor en español el tono solemne y formular del ruego juramentado que una simple «amonestación».
- source_word: בְּנֹות יְרוּשָׁלִַם
  english_pob_choice: daughters of Jerusalem
  chosen_spanish: hijas de Jerusalén
  alternatives_spanish:
  - doncellas de Jerusalén
  - mujeres de Jerusalén
  lexicon: HALOT
  rationale: Se preserva el vocativo poético y corporativo. «Hijas de Jerusalén» es la correspondencia más directa; «doncellas» suaviza el parentesco y «mujeres» pierde la forma literaria del hebreo.
- source_word: בִּצְבָאוֹת
  english_pob_choice: by the gazelles
  chosen_spanish: por las gacelas
  alternatives_spanish:
  - por las gacelas salvajes
  - por las corzas
  lexicon: HALOT
  rationale: Aquí se sigue el sentido animal del hebreo en el paralelo con «las ciervas del campo». «Gacelas» mantiene el valor poético y evita el sentido ajeno de «ejércitos».
- source_word: אוֹ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - y
  lexicon: HALOT
  rationale: La conjunción conserva la parataxis del hebreo y la estructura del juramento poético.
- source_word: בְּאַיְלוֹת הַשָּׂדֶה
  english_pob_choice: by the does of the field
  chosen_spanish: por las ciervas del campo
  alternatives_spanish:
  - por las corzas del campo
  - por las hembras del venado del campo
  lexicon: HALOT
  rationale: «אַיְלוֹת» designa hembras de ciervo/gacela; «ciervas» es natural y respetuoso del paralelismo. Se conserva «del campo» como rasgo formal del hebreo.
- source_word: אִם תָּעִירוּ וְאִם תְּעֽוֹרְר֛וּ
  english_pob_choice: do not stir up or awaken
  chosen_spanish: no despierten ni exciten
  alternatives_spanish:
  - no despierten ni aviven
  - no agiten ni despierten
  - no provoquen ni despierten
  lexicon: HALOT
  rationale: 'Tras una fórmula de juramento, el hebreo usa אִם con valor prohibitivo. En español, el imperativo negativo expresa mejor esa fuerza. Se mantienen ambos verbos para reflejar la duplicación intensiva: «despierten» y «exciten».'
- source_word: הָאַהֲבָה
  english_pob_choice: love
  chosen_spanish: el amor
  alternatives_spanish:
  - amor
  - la amorosa pasión
  lexicon: HALOT
  rationale: 'Aunque el hebreo tiene artículo, en español conviene naturalizarlo como sustantivo abstracto con artículo: «el amor». Así se preserva el referente sin sonar forzado.'
- source_word: עַד שֶׁתֶּחְפָּץ
  english_pob_choice: until it pleases
  chosen_spanish: hasta que le plazca
  alternatives_spanish:
  - hasta que quiera
  - hasta que esté dispuesto
  lexicon: HALOT
  rationale: El verbo en 3ª femenina singular concuerda con «amor». En español, «le plazca» conserva mejor la fuerza de placer/deseo que un simple «quiera», y mantiene el matiz poético sin volverlo explicativo.
theological_decisions:
- issue: Referente de «amor» y valor del verbo final
  english_pob_reading: Treat 'love' as the feminine antecedent of the verb, rendered with English 'it' for natural style.
  chosen_spanish_reading: Tratar «el amor» como antecedente del verbo y expresarlo con «le» para conservar la concordancia semántica sin forzar personificación excesiva.
  alternative_spanish_readings:
  - «hasta que le plazca» entendiendo el amor como personificado más explícitamente
  - «hasta que esté listo» como paráfrasis del sentido
  rationale: El hebreo apunta gramaticalmente a «amor» como antecedente femenino. En español, el dativo «le» permite mantener esa relación y el tono poético, sin convertir el verso en una explicación prosaica ni borrar la tensión entre abstracción y personificación.
  doctrine_reference: Translation philosophy §3, §6
- issue: Fórmula de juramento con elementos animales
  english_pob_reading: Poetic oath formula with animal imagery as the plain sense.
  chosen_spanish_reading: Mantener la imagen de gacelas y ciervas como fórmula poética de juramento.
  alternative_spanish_readings:
  - Interpretar los animales como metáfora directa de pureza o agilidad
  - Suavizarla a una mera invocación poética
  rationale: La evidencia del hebreo y del audit trail favorece el sentido literal-poético de animales en la fórmula. No se debe reemplazar por una interpretación alegórica sin apoyo textual inmediato.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: Se revisó el pasaje contra el contexto auditado en inglés; no se registran revisiones posteriores con cambios de sentido. La traducción sigue la lectura estable del POB y conserva las notas de alternativa léxica y de sentido poético.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «amor» como abstracto con concordancia pronominal indirecta («le») para reflejar la gramática hebrea y la poética del verso.
  - Se conserva el tono solemne de adjuración con un verbo fuerte («conjuro») en lugar de un equivalente más débil.
  - Los animales se traducen en sentido llano-poético, sin sustituirlos por términos eclesiásticos ni alegóricos.
