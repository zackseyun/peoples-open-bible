translation:
  language: es
  text: La conversación de los necios es molesta[a], y su risa se da en la disipación pecaminosa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'El hablar de los necios es ofensivo', con προσόχθισμα entendido como algo que causa molestia, fastidio o irritación.
    reason: lexical_alternative
  - marker: b
    text: O 'su risa está en la indulgencia del pecado'; σπατάλη puede sugerir autoindulgencia excesiva, lujo o vida disoluta.
    reason: lexical_alternative
lexical_decisions:
- source_word: διήγησις
  english_pob_choice: talk
  chosen_spanish: palabras
  alternatives_spanish:
  - habla
  - discurso
  - charla
  - relato
  lexicon: LSJ
  rationale: En este dicho sapiencial, διήγησις apunta de manera amplia a lo que los necios dicen. 'Palabras' suena natural en español y conserva el valor general de su habla sin imponer el matiz más técnico de 'relato' o 'narración'.
- source_word: μωρῶν
  english_pob_choice: of fools
  chosen_spanish: de los necios
  alternatives_spanish:
  - de los tontos
  - de los insensatos
  - de los foolish
  lexicon: LSJ
  rationale: '''Necios'' es el equivalente sapiencial más adecuado en español para μωροί/μωρῶν, manteniendo la carga moral e intelectual del término sin suavizarlo.'
- source_word: προσόχθισμα
  english_pob_choice: offensive
  chosen_spanish: una ofensa
  alternatives_spanish:
  - algo ofensivo
  - una molestia
  - una irritación
  - una vexación
  lexicon: LSJ
  rationale: El sustantivo expresa algo que provoca disgusto o molestia. 'Una ofensa' comunica bien el carácter objetable de esas palabras en español, de forma idiomática y fuerte.
- source_word: γέλως
  english_pob_choice: laughter
  chosen_spanish: risa
  alternatives_spanish:
  - carcajada
  - burla
  - risa burlona
  lexicon: LSJ
  rationale: La palabra griega básica es 'laughter'; 'risa' preserva el sentido sin añadir de entrada la idea de burla, que no está explícita en el texto.
- source_word: σπατάλῃ
  english_pob_choice: indulgence
  chosen_spanish: disipación
  alternatives_spanish:
  - desenfreno
  - lujo
  - derroche
  - autoindulgencia
  lexicon: LSJ
  rationale: σπατάλη puede sugerir exceso, vida disipada o lujo indulgente. 'Disipación' recoge bien la idea de vida desordenada y excesiva, y funciona naturalmente con 'del pecado'.
- source_word: ἁμαρτίας
  english_pob_choice: of sin
  chosen_spanish: del pecado
  alternatives_spanish:
  - del pecado grave
  - de la culpa
  - de la maldad
  lexicon: LSJ
  rationale: El genitivo señala la esfera o cualidad de la disipación. 'Del pecado' preserva la categoría moral directa del griego y la decisión auditada del inglés.
theological_decisions:
- issue: Fuerza moral de la sabiduría proverbial
  english_pob_reading: Rendered μωρῶν as 'fools' and ἁμαρτίας directly as 'sin'
  chosen_spanish_reading: μωρῶν como 'necios' y ἁμαρτίας como 'pecado' sin suavizar la censura moral
  alternative_spanish_readings:
  - '''insensatos'''
  - '''errados'''
  - '''mal comportamiento'''
  rationale: Sirácida usa lenguaje sapiencial moralmente cargado. Mantener 'necios' y 'pecado' conserva la dureza evaluativa del texto y evita diluirla con formulaciones más neutras.
  doctrine_reference: 'DOCTRINE.md: conservar el peso moral del vocabulario sapiencial; consistencia terminológica en traducción bíblica pública'
translation_notes:
  revision_awareness: 'Coincide con el testimonio griego de Sirácida 27:13 (Swete LXX 1909) y con el audit trail inglés: se mantiene la oposición sapiencial entre la palabra de los necios y su risa ligada al exceso pecaminoso. No se detectan revisiones aplicadas en el contexto inglés reciente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparece el tetragrámaton; aquí no aplica.
  - Se conserva 'necios' como término sapiencial fuerte, coherente con el registro bíblico.
  - '''Disipación'' intenta mantener la amplitud de σπατάλη sin reducirla solo a lujo material.'
