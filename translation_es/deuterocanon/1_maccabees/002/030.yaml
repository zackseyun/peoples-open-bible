translation:
  language: es
  text: ellos, sus hijos varones, sus esposas y su ganado[a], porque los males se habían agravado para ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las desgracias» o «las calamidades». La expresión griega usa «los males» de manera idiomática para referirse a aflicciones o penalidades.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτοὶ
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  lexicon: LSJ
  rationale: El pronombre griego retoma el sujeto del contexto inmediato; en español, «ellos» comunica la referencia sin añadir énfasis que el contexto no exige.
- source_word: υἱοὶ
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - varones
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «hijos», en español «hijos» puede funcionar de manera genérica dentro de una lista familiar; «hijos varones» sería más explícito, pero menos natural en esta enumeración.
- source_word: γυναῖκες
  english_pob_choice: wives
  chosen_spanish: mujeres
  alternatives_spanish:
  - esposas
  - mujeres de ellos
  lexicon: LSJ
  rationale: El contexto de lista familiar doméstica favorece «mujeres» como término literal y amplio; «esposas» interpreta la relación con más especificidad, pero no está expresada de forma explícita en el griego.
- source_word: κτήνη
  english_pob_choice: livestock
  chosen_spanish: ganado
  alternatives_spanish:
  - animales domésticos
  - bestias
  lexicon: LSJ
  rationale: «Ganado» es la opción española natural para animales de propiedad doméstica; conserva la referencia a bienes vivos sin introducir el matiz más genérico de «animales» ni el más arcaico de «bestias».
- source_word: ἐσκληρύνθη
  english_pob_choice: had become severe
  chosen_spanish: se habían agravado
  alternatives_spanish:
  - se habían endurecido
  - se habían vuelto graves
  - habían llegado a ser severos
  lexicon: LSJ
  rationale: El verbo griego, unido a «los males» y a la preposición «sobre ellos», expresa la intensificación de la aflicción. En español, «se habían agravado» comunica bien la severidad creciente sin perder el valor de dureza/agravamiento del verbo.
- source_word: τὰ κακά
  english_pob_choice: the evils
  chosen_spanish: los males
  alternatives_spanish:
  - los males sufridos
  - las calamidades
  - los males que les sobrevinieron
  lexicon: LSJ
  rationale: Conserva la forma sustantivada del griego. «Los males» mantiene la tensión lexical del original mejor que suavizarlo a «las calamidades»; el contexto ya aclara que se trata de aflicciones.
translation_notes:
  revision_awareness: La base inglesa había oscilado entre «had pressed hard upon them» y «had become severe upon them». La redacción española adopta una solución que conserva la imagen de agravamiento sin forzar un giro idiomático ajeno al español bíblico natural.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no hay aquí un referente al nombre divino.
  - Se mantuvo «males» para preservar la frase nominal griega y la posibilidad de entenderla idiomáticamente como aflicciones.
  - Se eligió una enumeración simple y directa, acorde con el tono narrativo del pasaje.
