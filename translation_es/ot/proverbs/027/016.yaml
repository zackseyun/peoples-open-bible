translation:
  language: es
  text: Quien la contiene, contiene el viento[a], y su mano derecha sujeta aceite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y su mano derecha llama aceite». El hebreo aquí es difícil; el texto principal sigue el sentido del proverbio más que una traducción estrictamente literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: צֹפְנֶיהָ
  english_pob_choice: whoever restrains her
  chosen_spanish: Quien la restringe
  alternatives_spanish:
  - El que la restringe
  - Quien la contiene
  - Quien la oculta
  lexicon: HALOT
  rationale: La forma participial con sufijo femenino se entiende en contexto como referencia a la mujer contenciosa del versículo anterior. En español, «quien» expresa bien el valor genérico del participio, y «la restringe» conserva la idea de intentar ponerle freno, no solo ocultarla o esconderla.
- source_word: צָפַן
  english_pob_choice: restrains
  chosen_spanish: restringe
  alternatives_spanish:
  - contiene
  - oculta
  - guarda
  lexicon: HALOT
  rationale: El campo semántico de צפן suele incluir «ocultar/guardar», pero aquí el paralelismo con el viento favorece una idea de contener o poner freno. «Restringe» mantiene esa fuerza en español y repite el verbo en ambos miembros para reflejar el paralelismo del hebreo.
- source_word: רוּחַ
  english_pob_choice: the wind
  chosen_spanish: el viento
  alternatives_spanish:
  - viento
  - espíritu
  lexicon: HALOT
  rationale: Aquí el contexto es concreto y físico, no espiritual. «El viento» reproduce el sentido contextual que la POB inglesa también adoptó.
- source_word: יְמִינוֹ
  english_pob_choice: his right hand
  chosen_spanish: su mano derecha
  alternatives_spanish:
  - su diestra
  - su derecha
  lexicon: HALOT
  rationale: El hebreo nombra de manera explícita la mano derecha; «mano derecha» preserva la imagen corporal con claridad y evita una forma más idiomática que perdería precisión.
- source_word: יִקְרָא
  english_pob_choice: grasps
  chosen_spanish: sujeta
  alternatives_spanish:
  - agarra
  - toma
  - llama
  lexicon: HALOT
  rationale: El verbo קרא presenta una dificultad reconocida en este pasaje. La POB inglesa opta por un sentido interpretativo para hacer inteligible el proverbio; en español, «sujeta» comunica la imagen de intentar asir el aceite sin introducir una explicación excesiva. La alternativa más literal («llama») queda implícitamente reconocida por la dificultad del texto.
- source_word: וְשֶׁמֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  - óleo
  lexicon: HALOT
  rationale: «Aceite» es el equivalente directo y suficientemente neutral. Añadir «de oliva» introduciría precisión cultural no explícita en el hebreo.
translation_notes:
  revision_awareness: 'El texto hebreo presenta una dificultad reconocida en el segundo hemistiquio, especialmente en יִקְרָא. La traducción española sigue la misma decisión de la POB inglesa: privilegiar el sentido proverbial inteligible, mientras conserva en nota la alternativa más literal. No se registraron revisiones aplicadas en el paquete inglés.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo verbal con «restringe / restringe» para reflejar la repetición de צפן.
  - Se evita «Espíritu» porque רוּחַ aquí es claramente «viento» en el marco del proverbio.
  - «Aceite» se prefiere a «óleo» por ser más natural en español bíblico moderno sin perder el valor léxico.
  - La nota conserva la tensión textual de יִקְרָא sin resolverla de forma artificial.
