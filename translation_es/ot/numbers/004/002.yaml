translation:
  language: es
  text: Haz el censo de los hijos de Coat[a] de entre los hijos de Leví, por sus clanes y por las casas de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Levanta la cabeza de los hijos de Coat», un modismo que significa contar o hacer un censo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשֹׂא אֶת רֹאשׁ
  english_pob_choice: Take a census
  chosen_spanish: Haz un censo
  alternatives_spanish:
  - Cuenta
  - Levanta el cabeza
  lexicon: HALOT
  rationale: El hebreo es un modismo administrativo para numerar personas. En español, «hacer un censo» comunica con claridad ese sentido sin perder el valor funcional del verbo de acción que el POB inglés preserva con «Take».
- source_word: בְּנֵי קְהָת
  english_pob_choice: the sons of Kohath
  chosen_spanish: los hijos de Coat
  alternatives_spanish:
  - los coatitas
  - los descendientes de Coat
  lexicon: HALOT
  rationale: Se conserva la forma genealógica del hebreo, paralela a «hijos de Leví». «Coat» sigue la tradición castellana para קְהָת y evita una adaptación menos transparente al linaje explícito del texto.
- source_word: מִתּוֹךְ בְּנֵי לֵוִי
  english_pob_choice: from among the sons of Levi
  chosen_spanish: entre los hijos de Leví
  alternatives_spanish:
  - de entre los hijos de Leví
  - de en medio de los hijos de Leví
  lexicon: HALOT
  rationale: La preposición expresa selección dentro de un grupo mayor. «Entre» es natural en español y conserva la relación inclusiva de «from among» sin volverlo torpe.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: En contexto censal, מִשְׁפָּחָה apunta a divisiones de clan. «Clanes» reproduce bien la unidad social y administrativa que el POB inglés fijó con «clans».
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: por las casas de sus padres
  alternatives_spanish:
  - según las casas de sus padres
  - por sus casas paternas
  lexicon: HALOT
  rationale: Se mantiene la imagen institucional de «house» en vez de simplificarla a «familias». «Casas de sus padres» es comprensible en español y conserva la estructura patriarcal del hebreo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el paquete fuente hebreo y el audit trail inglés: conserva la construcción genealógica, el valor censal del modismo y la estructura administrativa de clan/casa paterna, sin añadir explicaciones al cuerpo del versículo.'
  spanish_consistency_notes:
  - Se usa «Leví» para לֵוִי y «Coat» para קְהָת en coherencia con el registro bíblico castellano y la transparencia genealógica.
  - «Haz un censo» evita el calco excesivo de «levantar la cabeza» en el texto principal, pero la nota preserva el modismo hebreo documentado.
  - «Casas de sus padres» mantiene la terminología patriarcal del original y no la reduce a un equivalente sociológico más general.
