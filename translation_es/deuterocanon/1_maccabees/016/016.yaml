translation:
  language: es
  text: Y cuando Simón y sus hijos se embriagaron, Ptolomeo y los que estaban con él se levantaron y tomaron sus armas, y entraron en el banquete[a] contra Simón, y lo mataron a él y a sus hijos, y a algunos de sus jóvenes servidores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «banquete de bebida»; el término griego puede referirse específicamente a un festín con bebida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμεθύσθη
  english_pob_choice: became drunk
  chosen_spanish: se embriagaron
  alternatives_spanish:
  - se emborracharon
  - se hicieron borrachos
  lexicon: LSJ
  rationale: El griego aoristo pasivo de μεθύσκω indica entrar en estado de embriaguez. En español, "se embriagaron" conserva el matiz ingresivo y suena natural; evita la rigidez de una forma más literal y mantiene la fuerza narrativa del contexto.
- source_word: ἐξανέστη
  english_pob_choice: rose up
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - se pusieron de pie
  lexicon: LSJ
  rationale: El verbo marca el inicio decidido de la acción hostil. "Se levantaron" transmite ese arranque narrativo de forma clara y sobria en español.
- source_word: οἱ μετʼ αὐτοῦ
  english_pob_choice: those with him
  chosen_spanish: los que estaban con él
  alternatives_spanish:
  - los suyos
  - sus compañeros
  lexicon: LSJ
  rationale: El griego es inespecífico. "Los que estaban con él" conserva esa indeterminación sin añadir una relación militar o de dependencia que el texto no explicita.
- source_word: ἔλαβον τὰ ὅπλα αὐτῶν
  english_pob_choice: took their weapons
  chosen_spanish: tomaron sus armas
  alternatives_spanish:
  - agarraron sus armas
  - tomaron sus armas de guerra
  lexicon: LSJ
  rationale: ὅπλα puede significar armas en general. "Tomaron sus armas" es fiel y natural, y no fuerza la idea de equiparse formalmente para una batalla más allá de lo que dice el griego.
- source_word: ἐπεισῆλθοσαν
  english_pob_choice: entered ... against
  chosen_spanish: entraron al banquete contra Simón
  alternatives_spanish:
  - entraron contra Simón en el banquete
  - se metieron en el banquete para atacar a Simón
  lexicon: LSJ
  rationale: El compuesto con dativo expresa entrada hostil sobre alguien. En español, "entraron al banquete contra Simón" preserva la dirección adversativa y evita una paráfrasis excesiva.
- source_word: συμπόσιον
  english_pob_choice: banquet
  chosen_spanish: banquete
  alternatives_spanish:
  - banquete de bebida
  - comida de celebración
  - festín
  lexicon: LSJ
  rationale: Aunque el término puede aludir específicamente a un banquete de bebida, la palabra "banquete" comunica bien el evento de mesa y encaja con el contexto inmediato de embriaguez sin sobrecargar el sentido técnico.
- source_word: ἀπέκτειναν
  english_pob_choice: killed
  chosen_spanish: lo mataron a él
  alternatives_spanish:
  - lo asesinaron
  - lo dieron muerte
  lexicon: LSJ
  rationale: El sentido básico es "matar". En español se mantiene ese valor sin introducir una evaluación adicional como "asesinar", aunque el contexto narrativo sí describe una traición.
- source_word: τοὺς υἱοὺς αὐτοῦ
  english_pob_choice: his sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus hijos
  lexicon: LSJ
  rationale: '"Hijos" reproduce directamente υἱοὺς y es suficiente en español; no es necesario especificar "varones" porque el término ya lo implica en el contexto genealógico.'
- source_word: παιδαρίων
  english_pob_choice: young servants
  chosen_spanish: jóvenes servidores
  alternatives_spanish:
  - sirvientes jóvenes
  - criados jóvenes
  - jóvenes sirvientes
  lexicon: LSJ
  rationale: παιδάριον puede denotar un muchacho o un servidor joven. "Jóvenes servidores" conserva la ambigüedad útil entre edad y función, y suena más idiomático en español bíblico que una repetición de "sirvientes jóvenes".
theological_decisions:
- issue: Representación de la embriaguez y la violencia traicionera sin suavizar el relato
  english_pob_reading: The text states that Simon and his sons became drunk, after which Ptolemy and his companions attacked and killed them.
  chosen_spanish_reading: El texto dice que Simón y sus hijos se embriagaron, y luego Ptolomeo y los que estaban con él los atacaron y los mataron.
  alternative_spanish_readings:
  - Simón y sus hijos estaban bebiendo
  - Simón y sus hijos celebraban un banquete
  rationale: Se conserva la secuencia causal y la crudeza del episodio. No se atenúa la embriaguez ni se convierte el pasaje en una descripción neutra de celebración, porque el griego presenta una agresión deliberada aprovechando ese estado.
  doctrine_reference: Narrativa histórica; fidelidad al testimonio textual sin eufemización.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió "entered the banquet against Simon" frente a una redacción menos natural. Por eso el español evita un calco como "entraron contra Simón en el banquete" y opta por una formulación fluida que conserva la entrada hostil y el contexto del banquete. También se siguió la consistencia auditada de "became drunk" y "young servants".
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma del proyecto solo cuando el texto lo requiera; aquí no aparece el Tetragrámaton.
  - '"Ptolomeo" se conserva como forma española tradicional del nombre propio.'
  - '"Banquete" se usa en el texto principal y la nota aclara la posibilidad de un festín de bebida, manteniendo la tensión lexical del griego.'
  - '"Jóvenes servidores" refleja la ambigüedad de παιδαρίων sin reducirla a "muchachos" ni volverla un término eclesiástico.'
