    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «como uno que bromeaba a los ojos de sus yernos».'
    reason: lexical_alternative
  revision_rationale: Se revisa solo la cláusula final para reflejar con mayor fidelidad el sentido de כִּמְצַחֵק como percepción de broma o falta de seriedad, no de burla activa. También se suaviza el giro idiomático a «a los ojos de» y se mantiene intacta la terminología principal del proyecto, incluida la forma «Yahvé».
