translation:
  language: es
  text: Un solo testigo no se mantendrá contra un hombre[a], por cualquier iniquidad o por cualquier pecado, en relación con cualquier pecado que cometa; por el testimonio de dos testigos o por el testimonio de tres testigos,[b] un asunto se mantendrá[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra cualquiera» / «contra una persona». El hebreo dice «contra un hombre», usando una forma masculina singular con sentido representativo legal.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «por boca de dos testigos o por boca de tres testigos».
    reason: lexical_alternative
  - marker: c
    text: O «un caso quedará establecido». El verbo hebreo es el mismo que antes en el versículo («se mantendrá»), creando un paralelismo legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָקוּם ... יָקוּם
  english_pob_choice: shall not stand ... shall stand
  chosen_spanish: no se sostendrá ... se sostendrá
  alternatives_spanish:
  - no se levantará ... se levantará
  - no será establecido ... será establecido
  lexicon: HALOT
  rationale: En contextos legales, קום puede expresar la idea de mantenerse en pie como válido o quedar establecido. «Sostenerse» conserva la imagen de permanencia/validez y permite repetir el mismo verbo en ambas mitades del versículo, reflejando el paralelismo del hebreo.
- source_word: עֵד אֶחָד
  english_pob_choice: a single witness
  chosen_spanish: un solo testigo
  alternatives_spanish:
  - un testigo
  - un testigo único
  lexicon: HALOT
  rationale: «Un solo testigo» comunica de manera natural la insuficiencia de un único testimonio para juicio legal, sin perder el sentido del numeral hebreo.
- source_word: בְּאִישׁ
  english_pob_choice: against a man
  chosen_spanish: contra un hombre
  alternatives_spanish:
  - contra cualquiera
  - contra una persona
  lexicon: HALOT
  rationale: Se mantiene el sustantivo masculino singular representativo del hebreo. «Hombre» conserva la forma original y el alcance legal general sin neutralizar la expresión del texto fuente.
- source_word: לְכָל עָוֺן
  english_pob_choice: for any iniquity
  chosen_spanish: por cualquier iniquidad
  alternatives_spanish:
  - por cualquier culpa
  - por cualquier maldad
  lexicon: HALOT
  rationale: «Iniquidad» conserva el peso moral-jurídico de עָוֺן y distingue este término del siguiente «pecado».
- source_word: וּלְכָל חַטָּאת
  english_pob_choice: or for any sin
  chosen_spanish: o por cualquier pecado
  alternatives_spanish:
  - o por cualquier delito
  - o por cualquier falta
  lexicon: HALOT
  rationale: «Pecado» es la equivalencia más directa y amplia para חַטָּאת aquí. Se mantiene la acumulación de categorías del hebreo sin fusionarlas en un solo término.
- source_word: בְּכָל חֵטְא אֲשֶׁר יֶחֱטָא
  english_pob_choice: in connection with any sin that he commits
  chosen_spanish: en relación con cualquier pecado que cometa
  alternatives_spanish:
  - respecto de cualquier pecado que cometa
  - por cualquier pecado que cometa
  lexicon: HALOT
  rationale: La frase intensifica el alcance legal del versículo. «En relación con» conserva la amplitud del hebreo sin recurrir a una traducción mecánica e idiomáticamente extraña.
- source_word: עַל פִּי
  english_pob_choice: on the testimony of
  chosen_spanish: por la declaración de
  alternatives_spanish:
  - sobre el testimonio de
  - por el testimonio de
  lexicon: HALOT
  rationale: El hebreo literalmente dice «por la boca de», un modismo forense. «Por la declaración de» expresa con claridad la base testimonial del juicio y mantiene el registro legal.
- source_word: שְׁנֵי עֵדִים ... שְׁלֹשָׁה עֵדִים
  english_pob_choice: two witnesses ... three witnesses
  chosen_spanish: dos testigos ... tres testigos
  alternatives_spanish:
  - dos testigos ... tres testigos
  lexicon: HALOT
  rationale: Se conserva la exigencia numérica y el paralelismo legal del hebreo con una formulación natural en español.
- source_word: דָּבָר
  english_pob_choice: a matter
  chosen_spanish: un asunto
  alternatives_spanish:
  - un caso
  - una causa
  - una materia
  lexicon: HALOT
  rationale: En lenguaje judicial, דָּבָר puede referirse a un asunto o caso sometido a consideración. «Asunto» es amplio y comprensible en español, sin restringir indebidamente el sentido.
theological_decisions:
- issue: Lenguaje masculino representativo en אִישׁ
  english_pob_reading: against a man
  chosen_spanish_reading: contra un hombre
  alternative_spanish_readings:
  - contra cualquiera
  - contra una persona
  rationale: Se conserva el masculino singular del hebreo, siguiendo la línea de la POB inglesa de no neutralizar automáticamente la forma cuando funciona como representante legal general. El sentido del precepto sigue siendo universal, pero la forma del original se respeta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene la repetición de קום con 'shall not stand ... shall stand' y distingue עָוֺן de חַטָּאת y חֵטְא. La redacción española conserva ese paralelismo verbal con 'se sostendrá' y mantiene la triple acumulación semántica con 'iniquidad', 'pecado' y 'pecado' en un marco forense claro. No se incorporaron revisiones posteriores al texto inglés porque el control de revisiones indica que no hubo cambios.
  spanish_consistency_notes:
  - Se preservó el registro jurídico del versículo con términos como «declaración», «testigo», «asunto» y «sostenerse» en lugar de equivalentes más eclesiásticos.
  - «Yahvé» no aparece en este versículo; no hay decisión sobre el nombre divino que aplicar aquí.
  - Se mantuvo la diferencia entre «iniquidad» y «pecado» para reflejar la acumulación hebrea de categorías.
  - La nota [c] ayuda a transparentar que el hebreo usa el mismo verbo en ambas mitades del versículo, rasgo que conviene conservar en español.
