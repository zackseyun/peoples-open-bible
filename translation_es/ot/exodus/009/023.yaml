review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia del hebreo: Moisés extiende su vara hacia arriba, Yahvé envía truenos y granizo, el fuego desciende a la tierra, y Yahvé hace llover granizo sobre la tierra de Egipto. También preserva correctamente el nombre divino como ''Yahvé'' y mantiene ''fuego'' en vez de interpretarlo en el texto principal.'
  spanish_quality_summary: 'El español es claro y digno, pero hay un problema de anclaje de nota: la nota [a] está colocada en ''cielo'', aunque la nota explica ''fuego/relámpago''. Además, el texto inicial ''Así que'' suena algo inferencial y menos directo que el simple narrativo hebreo; ''Entonces'' o ''Y'' sería más natural. Conviene mover la nota al segmento de ''fuego''.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → ''Yahvé'', בָּרָד → ''granizo'', קֹלֹת en contexto tormentoso → ''truenos'', and אֵשׁ preserved as ''fuego''. No hay conflicto doctrinal. La única corrección necesaria es de presentación/precisión de nota y una leve mejora estilística en el arranque.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada a 'cielo', pero su contenido trata sobre 'fuego' como posible referencia a relámpago.
    rationale: Las notas deben aparecer en la palabra o frase pertinente. Tal como está, el lector puede pensar que la alternativa afecta 'cielo' en vez de 'fuego descendió a la tierra'.
  - severity: low
    issue: '''Así que'' introduce una inferencia/consecuencia más marcada de la que exige el hebreo narrativo.'
    rationale: El waw consecutivo inicial se vierte mejor con 'Entonces' o simplemente sin conector inferencial fuerte. Esto mejora la naturalidad y la fidelidad al flujo narrativo.
  revised_spanish_text: Entonces Moisés extendió su vara hacia el cielo, y Yahvé envió truenos y granizo, y fuego[a] descendió a la tierra. Yahvé hizo llover granizo sobre la tierra de Egipto.
  revised_footnotes:
  - marker: a
    text: 'O: "el fuego fue hacia la tierra"; el hebreo dice literalmente "fuego", pero en contexto probablemente se refiere al relámpago.'
    reason: lexical_alternative
  revision_rationale: Se movió la nota al término correcto ('fuego') para que corresponda con la alternativa lexical preservada por el inglés POB. También se cambió 'Así que' por 'Entonces' para un español narrativo más natural y más cercano al valor del hebreo, sin alterar el sentido. No se requieren cambios doctrinales ni léxicos mayores.
