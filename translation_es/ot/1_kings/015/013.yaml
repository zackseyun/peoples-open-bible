translation:
  language: es
  text: También quitó a Maacá, su madre,[a] de ser reina madre, porque había hecho una imagen abominable para Asherah[c][b]. Asa cortó su imagen y la quemó en el valle de Cedrón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''su madre''. En uso real de la corte, esto a veces puede referirse a una abuela o a una antepasada femenina.'
    reason: lexical_alternative
  - marker: b
    text: O 'una imagen abominable' / 'una cosa horrenda'. La forma exacta del objeto de culto no es segura.
    reason: lexical_alternative
  - marker: c
    text: '''Asherah'' puede referirse a la diosa Asherah o a su símbolo cultual, a menudo traducido ''poste de Asherah''.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: He also
  chosen_spanish: También
  alternatives_spanish:
  - Y también
  - Además
  lexicon: HALOT
  rationale: Conserva el valor aditivo del hebreo sin recargar la frase; en español, 'También' funciona de manera natural al inicio de oración.
- source_word: מַעֲכָה אִמּוֹ
  english_pob_choice: Maacah his mother
  chosen_spanish: Maacá, su madre
  alternatives_spanish:
  - Maacá, su madre biológica
  - Maacá, su madre o antepasada femenina
  lexicon: HALOT
  rationale: Se mantiene el wording literal 'su madre' como en el hebreo, sin resolver en el texto principal la posible ampliación genealógica de uso real en el lenguaje real.
- source_word: וַיְסִרֶהָ
  english_pob_choice: removed
  chosen_spanish: apartó
  alternatives_spanish:
  - removió
  - depuesto
  lexicon: HALOT
  rationale: '''Apartó'' expresa bien la acción de quitarla de una función o cargo; evita una rigidez innecesaria y conserva el valor de hacerla salir de esa posición.'
- source_word: מִגְּבִירָה
  english_pob_choice: from being queen mother
  chosen_spanish: de ser reina madre
  alternatives_spanish:
  - del cargo de reina madre
  - de su función como reina madre
  lexicon: HALOT
  rationale: '''Reina madre'' reproduce el rol cortesano documentado por el hebreo y mantiene la claridad para lectores modernos.'
- source_word: אֲשֶׁר עָשְׂתָה
  english_pob_choice: because she had made
  chosen_spanish: porque había hecho
  alternatives_spanish:
  - ya que había hecho
  - pues había hecho
  lexicon: HALOT
  rationale: El relativo introduce causalidad; 'porque' hace explícita esa relación en español sin añadir interpretación extra.
- source_word: מִפְלֶצֶת
  english_pob_choice: an abominable image
  chosen_spanish: una imagen abominable
  alternatives_spanish:
  - una imagen detestable
  - una imagen horrenda
  lexicon: HALOT
  rationale: '''Abominable'' refleja la carga cultual y moral del término mejor que una descripción puramente estética; se conserva ''imagen'' porque el objeto es concreto y fabricado.'
- source_word: לָאֲשֵׁרָה
  english_pob_choice: for Asherah
  chosen_spanish: para Asherah
  alternatives_spanish:
  - para la diosa Asherah
  - para un símbolo de Asherah
  lexicon: HALOT
  rationale: Se conserva la ambigüedad del término, como en el inglés POB, sin resolver si refiere a la deidad o a su símbolo cultual.
- source_word: וַיִּכְרֹת ... אֶת מִפְלַצְתָּהּ
  english_pob_choice: cut down her image
  chosen_spanish: cortó su imagen
  alternatives_spanish:
  - derribó su imagen
  - cortó su objeto
  lexicon: HALOT
  rationale: '''Cortó'' reproduce la fuerza concreta de כרת; ''su imagen'' sigue el antecedente del objeto mencionado, manteniendo la secuencia verbal breve del hebreo.'
- source_word: וַיִּשְׂרֹף
  english_pob_choice: burned it
  chosen_spanish: la quemó
  alternatives_spanish:
  - la incendió
  - la prendió fuego
  lexicon: HALOT
  rationale: Verbo directo y natural en español, equivalente al hebreo sin amplificación.
- source_word: בְּנַחַל קִדְרוֹן
  english_pob_choice: in the Kidron Valley
  chosen_spanish: en el valle de Cedrón
  alternatives_spanish:
  - en el torrente Cedrón
  - en el wadi Cedrón
  lexicon: HALOT
  rationale: '''Valle de Cedrón'' es la forma geográfica natural en español bíblico contemporáneo y comunica bien נחל en este contexto.'
theological_decisions:
- issue: Referente de אֲשֵׁרָה
  english_pob_reading: Rendered 'Asherah' without deciding between the goddess and her cult symbol.
  chosen_spanish_reading: Se translitera 'Asherah' sin decidir entre la diosa y su símbolo cultual.
  alternative_spanish_readings:
  - la diosa Asherah
  - el poste de Asherah
  - símbolo cultual de Asherah
  rationale: El hebreo mantiene la ambigüedad, y el contexto ya habla de un objeto fabricado aparte. Traducirlo como deidad o como poste resolvería demasiado el texto; la transliteración preserva la tensión documental.
  doctrine_reference: Preservar la tensión textual y semántica sin sobreinterpretar.
translation_notes:
  revision_awareness: La redacción sigue la última revisión del POB en inglés, que prefirió 'abominable image' sobre 'dreadful image'. En español se reflejó con 'imagen abominable', manteniendo también la ambigüedad de 'Asherah' y la concreción verbal de 'cortar' y 'quemar'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como convención general del proyecto, pero este versículo no lo contiene.
  - '''Reina madre'' se mantuvo por ser el equivalente funcional de גְּבִירָה en contexto real.'
  - Se preservó 'Asherah' como transliteración para no cerrar la discusión entre deidad y símbolo.
  - '''Imagen'' se conservó para מִפְלֶצֶת por corresponder al objeto fabricado mencionado en el verso.'
