revisions:
- from: ¡Ay del que edifica su casa[a] sin justicia, y sus aposentos altos[b] sin derecho; hace trabajar a su prójimo gratis[c], y no le da su salario.
  to: ¡Ay del que edifica su casa[a] sin rectitud, y sus aposentos altos[b] sin justicia; hace trabajar a su prójimo de balde, y no le da su salario[c].
  rationale: 'La revisión conserva el buen sentido general del borrador, pero alinea mejor el español con el rastro léxico del POB: distingue צֶדֶק de מִשְׁפָּט con «rectitud ... justicia», reemplaza «gratis» por el más digno «de balde», y corrige la ubicación de la nota textual para que recaiga sobre «su salario», que corresponde a וּפֹעֲלוֹ.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:31:18Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: denuncia profética, construcción injusta, explotación del prójimo y negativa de pagarle. Sin embargo, en dos puntos no sigue de cerca la línea documentada del POB en inglés: (1) צֶדֶק se volcó como «justicia» en vez de mantener una distinción más cercana a «rectitud»/«justicia», y (2) la nota [c] fue desplazada a חִנָּם («gratis») cuando en el rastro de auditoría inglés la nota correspondiente a wages/pay pertenece a וּפֹעֲלוֹ. Además, «gratis» es algo coloquial para este contexto profético.'
  spanish_quality_summary: 'El español es legible y digno, pero puede mejorarse. «Aposentos altos» es entendible; «habitaciones altas» sería más llano, aunque no es imprescindible. El problema principal de estilo es «gratis», que suena más coloquial que «de balde» o «sin paga». También conviene hacer coincidir mejor el paralelismo ético: «sin rectitud ... sin justicia» suena natural y preserva mejor la distinción del hebreo que «sin justicia ... sin derecho».'
  glossary_alignment: 'No hay conflicto con la terminología global mayor. La principal cuestión léxica es la pareja צֶדֶק / מִשְׁפָּט: el proyecto inglés documentó «without righteousness ... without justice». En español conviene reflejar esa diferencia como «sin rectitud ... sin justicia» más que «sin justicia ... sin derecho». La decisión sobre וּפֹעֲלוֹ debe seguir el sentido contextual de «salario/sueldo/paga», y la nota literal debe anclarse allí, no en «gratis».'
  issues:
  - severity: medium
    issue: צֶדֶק se tradujo como «sin justicia»
    rationale: El expediente inglés preserva la distinción entre צֶדֶק y מִשְׁפָּט. En español, «sin rectitud» o «sin justicia» podrían valer, pero si la segunda cola lleva «sin justicia», la primera conviene diferenciarla para no colapsar la pareja.
  - severity: medium
    issue: מִשְׁפָּט se tradujo como «sin derecho»
    rationale: «Sin derecho» puede funcionar, pero aquí suena menos natural en una denuncia profética que «sin justicia», y se aleja de la decisión léxica principal del POB inglés.
  - severity: high
    issue: La nota [c] está anclada en «gratis» en vez de en «su salario»
    rationale: La auditoría inglesa marca la nota literal «his work» para וּפֹעֲלוֹ, no para חִנָּם. En español debe conservarse esa correspondencia documental.
  - severity: low
    issue: «Gratis» suena coloquial
    rationale: Aunque semánticamente correcto para חִנָּם, en registro bíblico-digno «de balde» o «sin paga» encaja mejor y preserva el tono.
