revisions:
- from: 'Entonces Moisés reunió a toda la congregación de los hijos de Israel[a] y les dijo: «Estas son las cosas[b] que Yahvé ha mandado hacer».'
  to: 'Entonces Moisés reunió a toda la congregación de los hijos de Israel[a] y les dijo: «Estas son las cosas[b] que Yahvé ha mandado que se hagan».'
  rationale: 'Se propone una reparación menor para hacer más natural y transparente la expresión de לַעֲשֹׂת אֹתָם en español: «ha mandado que se hagan» comunica mejor que se trata de cosas ordenadas para su ejecución. Se mantienen sin cambio las decisiones clave del proyecto: «Yahvé», «congregación» y «los hijos de Israel» con nota explicativa.'
