  yaml_path: translation/ot/daniel/007/016.yaml
  text: I approached one of those standing there and asked him the certainty about all this[b][a]. So he told me and made known to me the interpretation of the matter.
  footnotes:
  - marker: a
    text: Or 'the truth about all this'; the Aramaic term carries the sense of what is firm, certain, or true.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the interpretation of the words.' Here 'words' likely refers to the content or matter of the vision.
    reason: lexical_alternative
