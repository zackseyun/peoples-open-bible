translation:
  language: es
  text: Así, el registro[a] de estas personas se llevó a cabo con amarga urgencia y esfuerzo celoso, desde la salida del sol hasta su ocaso[b], sin llegar a completarse durante cuarenta días[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «empadronamiento» o «censo» para «registro»; el griego se refiere a una lista administrativa oficial.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «desde las salidas del sol hasta las puestas»; es una forma idiomática que indica trabajo continuo durante todo el día.
    reason: cultural_note
  - marker: c
    text: La expresión griega indica que el proceso no llegó a concluir ni siquiera después de cuarenta días.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπογραφὴ
  english_pob_choice: registration
  chosen_spanish: registro
  alternatives_spanish:
  - inscripción
  - empadronamiento
  - censo
  lexicon: LSJ
  rationale: El término griego designa una lista o registro administrativo oficial. «Registro» mantiene ese valor burocrático sin imponer de entrada el matiz técnico de «censo», que podría sonar más amplio o demográfico de lo que el contexto exige.
- source_word: πικρᾶς σπουδῆς
  english_pob_choice: bitter urgency
  chosen_spanish: amarga urgencia
  alternatives_spanish:
  - urgencia amarga
  - apresuramiento amargo
  - diligencia amarga
  lexicon: LSJ
  rationale: σπουδή puede significar prisa, empeño o diligencia; en este contexto de presión administrativa opresiva, «urgencia» comunica bien la intensidad y la presión del proceso. «Amarga» conserva el matiz hostil o penoso de πικρᾶς.
- source_word: φιλοτίμου προσθεσίας
  english_pob_choice: zealous exertion
  chosen_spanish: celo laborioso
  alternatives_spanish:
  - esfuerzo celoso
  - celo diligente
  - empeño laborioso
  lexicon: LSJ
  rationale: La combinación sugiere un esfuerzo añadido, insistente y autoimportante. «Celo laborioso» expresa la energía empeñada sin cargar el español con una noción negativa de «ambicioso» que no queda asegurada por el contexto inmediato.
- source_word: ἀπὸ ἀνατολῶν ἡλίου μέχρι δυσμῶν
  english_pob_choice: from the rising of the sun to its setting
  chosen_spanish: desde la salida del sol hasta su ocaso
  alternatives_spanish:
  - desde el amanecer hasta el atardecer
  - de la salida del sol a su puesta
  lexicon: LSJ
  rationale: Es una merismo temporal que indica actividad continua durante todo el día. «Desde la salida del sol hasta su ocaso» conserva la imagen completa y su valor idiomático mejor que una paráfrasis más plana.
- source_word: ἀνήνυτον λαμβάνουσα τὸ τέλος
  english_pob_choice: reaching no completion
  chosen_spanish: sin llegar a completarse
  alternatives_spanish:
  - sin alcanzar término
  - sin llegar a un fin
  - quedando inconcluso
  lexicon: LSJ
  rationale: La expresión comunica que el proceso no alcanzó su término. En español, «sin llegar a completarse» transmite con claridad la idea de una acción administrativa que no llegó a concluir.
- source_word: ἐπὶ ἡμέρας τεσσεράκοντα
  english_pob_choice: for forty days
  chosen_spanish: en cuarenta días
  alternatives_spanish:
  - durante cuarenta días
  - por cuarenta días
  lexicon: LSJ
  rationale: La frase marca duración. «En cuarenta días» es aceptable en español bíblico y conserva la idea de plazo dentro del cual la acción no se completó; el sentido se refuerza con «sin llegar a completarse».
translation_notes:
  revision_awareness: La redacción sigue el acuerdo alto del audit trail inglés, conservando la tensión entre la imagen idiomática de jornada completa y la afirmación de que el proceso no se completó. Se evita suavizar πικρᾶς y se traduce φιλοτίμου προσθεσίας con una frase positiva en español que preserve la idea de esfuerzo insistente sin imponer la carga negativa de «ambicioso».
  spanish_consistency_notes:
  - Se mantiene «registro» como término administrativo principal, con alternativa explicada en nota.
  - Se conserva la merismo temporal con una formulación natural en español («salida del sol ... ocaso»).
  - Se evita «SEÑOR» u otras sustituciones no pertinentes; no hay léxico teológico directo en este versículo.
  - «Completar»/«completarse» se usa para reflejar ἀνήνυτον λαμβάνουσα τὸ τέλος, manteniendo la idea de incompletitud.
