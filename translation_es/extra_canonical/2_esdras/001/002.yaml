translation:
  language: es
  text: hijo de Ahías[a], hijo de Finees, hijo de Elí, hijo de Amarías, hijo de Azías, hijo de Meraiot, hijo de Arna, hijo de Uzzías, hijo de Borit, hijo de Abisúa, hijo de Finees, hijo de Eleazar,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Una traducción previa decía «hijo de Abisai».
