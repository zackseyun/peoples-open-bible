    rationale: El hebreo solo requiere «David le dijo»; añadir «a él» en español no aporta claridad y suena acartonado.
  - severity: medium
    issue: «¿Me bajarás…? / yo te bajaré…» es torpe en español contextual
    rationale: Aunque refleja literalmente la raíz ירד, en este pasaje la idea es guiar/conducir hasta la partida merodeadora. «Guiar» mantiene mejor el sentido contextual y mejora la legibilidad.
