translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés[a]: «Pasa delante del pueblo y toma contigo a algunos de los ancianos de Israel. Toma en tu mano tu vara, con la cual heriste el Nilo[b], y ve».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de entre los ancianos de Israel»; la frase probablemente indica que Moisés debía llevar consigo a algunos ancianos escogidos.'
    reason: lexical_alternative
  - marker: b
    text: O «el río»; en Éxodo este término suele referirse específicamente al Nilo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el convenio del proyecto para el Tetragrámaton: conservar el nombre propio divino en transliteración y no sustituirlo por un título. «Yahvé» es la forma española más estable y legible dentro de ese convenio.'
- source_word: עֲבֹר לִפְנֵי הָעָם
  english_pob_choice: Pass on before the people
  chosen_spanish: Pasa delante del pueblo
  alternatives_spanish:
  - Ve delante del pueblo
  - Pasa al frente del pueblo
  lexicon: HALOT
  rationale: El hebreo expresa avanzar/ir delante de la asamblea. «Pasa delante del pueblo» conserva el movimiento y la posición relativa sin añadir explicaciones ajenas al texto.
- source_word: וְקַח אִתְּךָ מִזִּקְנֵי יִשְׂרָאֵל
  english_pob_choice: and take with you some of the elders of Israel
  chosen_spanish: y toma contigo a algunos de los ancianos de Israel
  alternatives_spanish:
  - y toma contigo de los ancianos de Israel
  - y toma contigo ancianos de Israel
  lexicon: HALOT
  rationale: La preposición מן indica selección desde un grupo, no necesariamente totalidad. «A algunos de los ancianos» hace explícito ese sentido partitivo en español natural.
- source_word: וּמַטְּךָ
  english_pob_choice: your staff
  chosen_spanish: tu vara
  alternatives_spanish:
  - tu bastón
  - tu cetro
  lexicon: HALOT
  rationale: מַטֶּה puede ser «vara» o «bastón/vara». Aquí se trata del instrumento de Moisés para señales y acción milagrosa; «vara» es claro y sobrio en español bíblico contemporáneo.
- source_word: אֲשֶׁר הִכִּיתָ בּוֹ אֶת הַיְאֹר
  english_pob_choice: with which you struck the Nile
  chosen_spanish: con la cual golpeaste el Nilo
  alternatives_spanish:
  - con la que heriste el Nilo
  - con la cual golpeaste el río
  lexicon: HALOT
  rationale: יְאֹר en Éxodo designa normalmente el Nilo. «Golpeaste» mantiene el sentido de acción efectiva del verbo sin introducir una connotación más fuerte que la del hebreo; «Nilo» precisa el referente egipcio. El relativo femenino concuerda con «vara».
- source_word: קַח בְּיָדְךָ
  english_pob_choice: Take in your hand
  chosen_spanish: Toma en tu mano
  alternatives_spanish:
  - Tómalo en la mano
  - Toma en la mano
  lexicon: HALOT
  rationale: El hebreo repite el imperativo para ordenar la acción. En español, «toma en tu mano» conserva la fuerza imperativa y la concreción corporal del original sin necesidad de pronombre explícito.
- source_word: וְהָלָכְתָּ
  english_pob_choice: and go
  chosen_spanish: y anda
  alternatives_spanish:
  - y ve
  - y sigue
  lexicon: HALOT
  rationale: הָלַךְ puede funcionar como continuación imperativa. «Anda» es breve, natural y mantiene el encadenamiento de órdenes del hebreo.
theological_decisions:
- issue: Nombre divino en la frase inicial
  english_pob_reading: Yahweh said to Moses
  chosen_spanish_reading: Yahvé dijo a Moisés
  alternative_spanish_readings:
  - el SEÑOR dijo a Moisés
  - Dios dijo a Moisés
  rationale: Se preserva el nombre propio del pacto conforme al criterio del proyecto para יְהוָה. No se sustituye por un título litúrgico, ya que el contexto no exige ocultar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de מִזִּקְנֵי יִשְׂרָאֵל
  english_pob_reading: some of the elders of Israel
  chosen_spanish_reading: a algunos de los ancianos de Israel
  alternative_spanish_readings:
  - de entre los ancianos de Israel
  - algunos ancianos de Israel
  rationale: Se conserva el valor partitivo de la construcción hebrea y la lectura auditada de la POB inglesa, evitando la impresión de que Moisés debía llevar a todos los ancianos.
  doctrine_reference: 'DOCTRINE.md: Translation principles — represent source-partitives when contextually meaningful'
- issue: Referencia de הַיְאֹר
  english_pob_reading: the Nile
  chosen_spanish_reading: el Nilo
  alternative_spanish_readings:
  - el río
  - el río Nilo
  rationale: En Éxodo, הַיְאֹר suele referirse específicamente al Nilo. Traducirlo como «el Nilo» conserva precisión histórica y evita la ambigüedad de «río».
  doctrine_reference: 'DOCTRINE.md: Contextual referents in Exodus — יְאֹר as Nile'
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no se requerían cambios; esta versión sigue de cerca el texto fuente hebreo y el archivo auditado en inglés, manteniendo las mismas decisiones clave: el Nombre divino como Yahvé, el valor partitivo de מִן en «ancianos de Israel» y la referencia específica de הַיְאֹר al Nilo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa «vara» para מַטֶּה en coherencia con el uso bíblico de la pieza de autoridad de Moisés.
  - «Ancianos de Israel» se conserva literal, con aclaración de selección parcial en nota.
  - «Nilo» se elige como referente contextual de הַיְאֹר en Éxodo.
  - El estilo es formal y bíblico, pero con sintaxis española natural.
