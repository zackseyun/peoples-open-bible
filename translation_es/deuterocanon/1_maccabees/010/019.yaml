lexical_decisions:
- source_word: Ἰωνάθαν
  english_pob_choice: Jonathan
  chosen_spanish: Juanatán
  alternatives_spanish:
  - Jonatán
  - Jonathan
  lexicon: nombre propio transliterado
  rationale: Se conserva el nombre propio en forma hispana reconocible. 'Juanatán' refleja la adaptación española más natural para este nombre bíblico, mientras que 'Jonatán' y 'Jonathan' son alternativas posibles; se prefiere una forma que suene natural en español sin perder identificación con el personaje.
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: saludos
  alternatives_spanish:
  - alégrate
  - salve
  lexicon: LSJ
  rationale: En fórmula epistolar, χαίρειν funciona como saludo convencional. 'Saludos' expresa esa función sin volverlo un mandato de alegrarse.
- source_word: ἀκηκόαμεν
  english_pob_choice: we have heard
  chosen_spanish: hemos oído
  alternatives_spanish:
  - oímos
  lexicon: LSJ
  rationale: El perfecto griego presenta un estado derivado de oír; 'hemos oído' conserva mejor ese matiz que un pretérito simple.
- source_word: περὶ σοῦ
  english_pob_choice: about you
  chosen_spanish: acerca de ti
  alternatives_spanish:
  - con respecto a ti
  - sobre ti
  lexicon: LSJ
  rationale: '''Acerca de ti'' es una forma natural en español y refleja con precisión la relación de περὶ con el genitivo.'
- source_word: ἀνὴρ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  lexicon: LSJ
  rationale: El sustantivo es masculino singular y se refiere a Jonatán; 'hombre' mantiene esa referencia sin diluirla.
- source_word: ἀγαθὸς
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - noble
  - valioso
  - digno
  lexicon: LSJ
  rationale: Aquí ἀγαθός expresa una valoración general positiva. 'Bueno' es la correspondencia más directa y no añade matices no atestiguados.
- source_word: ἰσχύϊ
  english_pob_choice: in strength
  chosen_spanish: en fortaleza
  alternatives_spanish:
  - en fuerza
  - fuerte
  lexicon: LSJ
  rationale: Se conserva el dativo con una construcción preposicional. 'Fortaleza' reproduce bien el campo semántico de ἰσχύς y evita cerrar indebidamente una frase que en el griego suministrado queda truncada.
translation_notes:
  revision_awareness: El texto griego proporcionado está incompleto y termina abruptamente con καί; por eso la redacción española se detiene también de forma abierta, sin completar la cláusula. Se siguió el audit trail inglés en la función saludar/epistolar de χαίρειν y en la preservación del perfecto de ἀκηκόαμεν.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque no aparece ningún nombre divino en este versículo.
  - '''Fortaleza'' mantiene la apertura sintáctica del griego; no se completa con adjetivos interpretativos.'
  - El marcador [a] está colocado en el nombre propio, siguiendo el patrón del audit trail inglés para la nota textual.
