base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/008/027.yaml
  text: For he did not test us by fire[a], as he did them, for the examination of their hearts; nor has he taken vengeance on us. Rather[b], the Lord scourges those who draw near to him for admonition.
  footnotes:
