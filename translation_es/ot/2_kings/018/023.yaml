  - severity: medium
    issue: '''ponerles jinetes'' para לָתֵת לְךָ רֹכְבִים עֲלֵיהֶם'
    rationale: La expresión es comprensible, pero en español suena algo poco natural. El sentido es proveer o conseguir jinetes para los caballos; una formulación como 'si puedes proveer jinetes para ellos' conserva mejor el matiz y fluye mejor.
