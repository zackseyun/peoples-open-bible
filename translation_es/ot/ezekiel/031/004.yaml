translation:
  language: es
  text: Las aguas lo hicieron crecer; el abismo lo hizo elevarse[a]. Sus ríos corrían alrededor de su lugar de plantación[b], y envió sus canales a todos los árboles del campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el abismo lo exaltó» o «lo hizo alto».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su plantación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַיִם
  english_pob_choice: Waters
  chosen_spanish: Las aguas
  alternatives_spanish:
  - El agua
  lexicon: HALOT
  rationale: El plural hebreo funciona como sustantivo colectivo; en español, «las aguas» conserva mejor el tono poético y la abundancia de la imagen que un singular genérico.
- source_word: גִּדְּלוּהוּ
  english_pob_choice: made it grow
  chosen_spanish: lo hicieron crecer
  alternatives_spanish:
  - lo levantaron
  - lo hicieron grande
  lexicon: HALOT
  rationale: La forma causativa con sufijo de 3ms encaja bien con el crecimiento del árbol; «hacer crecer» mantiene la metáfora arbórea mejor que una traducción más abstracta como «hacer grande».
- source_word: תְּהוֹם
  english_pob_choice: the deep
  chosen_spanish: el abismo
  alternatives_spanish:
  - lo profundo
  - las profundidades
  lexicon: HALOT
  rationale: «Abismo» comunica de manera concisa la profundidad primordial o subterránea evocada por תְּהוֹם. También se podría decir «las profundidades», pero «el abismo» conserva mejor la fuerza imagética del original.
- source_word: רֹמְמָתְהוּ
  english_pob_choice: made it rise high
  chosen_spanish: lo hizo subir en alto
  alternatives_spanish:
  - lo exaltó
  - lo hizo levantarse en alto
  - lo hizo alto
  lexicon: HALOT
  rationale: La raíz רום expresa elevación; «subir en alto» retiene la imagen de altura sin perder el paralelismo con el árbol. «Exaltó» es posible, pero en español desplaza el campo semántico hacia lo honorífico.
- source_word: נַהֲרֹתֶיהָ
  english_pob_choice: Its rivers
  chosen_spanish: sus ríos
  alternatives_spanish:
  - sus corrientes
  - sus arroyos
  lexicon: HALOT
  rationale: «Ríos» es el equivalente más directo y fuerte para נַהֲרֹת; aunque el sufijo femenino se refiere a תְּהוֹם, en español conviene conservar la referencia posesiva simple «sus».
- source_word: הֹלֵךְ
  english_pob_choice: flowed
  chosen_spanish: corrían
  alternatives_spanish:
  - fluían
  - iban
  lexicon: HALOT
  rationale: Con ríos como sujeto, el equivalente idiomático natural en español es «corrían»; preserva movimiento continuo sin volver mecánica la construcción.
- source_word: סְבִיבוֹת
  english_pob_choice: all around
  chosen_spanish: alrededor de
  alternatives_spanish:
  - en derredor de
  - todo alrededor de
  lexicon: HALOT
  rationale: La forma adverbial intensifica el rodear; «alrededor de» es una solución clara y fiel, aunque «todo alrededor de» también sería posible.
- source_word: מַטָּעָהּ
  english_pob_choice: its planting place
  chosen_spanish: su plantío
  alternatives_spanish:
  - su plantación
  - su terreno plantado
  - su lugar plantado
  lexicon: HALOT
  rationale: El sustantivo designa el área plantada; «plantío» es breve, bíblico y natural en español. Conserva la imagen agrícola sin sobrerreformularla.
- source_word: תְּעָלֹתֶיהָ
  english_pob_choice: its channels
  chosen_spanish: sus canales
  alternatives_spanish:
  - sus acequias
  - sus conductos
  - sus cauces
  lexicon: HALOT
  rationale: El término alude a canales o cursos de agua derivados; «canales» es el equivalente más amplio y adecuado en español. «Acequias» podría sonar demasiado local o irrigacional.
- source_word: שִׁלְחָה
  english_pob_choice: it sent out
  chosen_spanish: enviaba
  alternatives_spanish:
  - envió
  - mandaba
  lexicon: HALOT
  rationale: La idea es de extender o hacer salir las aguas/canales. El imperfecto «enviaba» refleja mejor la acción continua o habitual del hebreo que un pretérito puntual.
- source_word: אֶל כָּל עֲצֵי הַשָּׂדֶה
  english_pob_choice: to all the trees of the field
  chosen_spanish: a todos los árboles del campo
  alternatives_spanish:
  - a todos los árboles de la llanura
  - a todos los árboles del campo abierto
  lexicon: HALOT
  rationale: La imagen del conjunto de árboles del entorno se conserva con «árboles del campo». Mantiene el paisaje bíblico sin añadir matices no presentes en el hebreo.
theological_decisions:
- issue: Pronombres y referencia mixta en la metáfora extendida
  english_pob_reading: Use impersonal 'it/its' throughout for the tree and the deep's water system
  chosen_spanish_reading: Usar «lo/su» e imperfectos impersonales para mantener la metáfora del árbol y su sistema de aguas sin forzar una personificación distinta
  alternative_spanish_readings:
  - Usar «él/su» para el árbol como figura del rey o del imperio
  - Usar «ella/su» siguiendo el género gramatical femenino de algunas formas hebreas
  rationale: El pasaje se mantiene en el plano de la imagen arbórea. En español, el uso de «lo/su» evita trasladar prematuramente la figura a un referente personal masculino o femenino y conserva la tensión metafórica del texto.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto hebreo de Ezequiel 31:4 y el rastro auditado en inglés. No hubo revisiones aplicadas en el pass más reciente, y la versión española mantiene la misma arquitectura semántica: aguas → crecimiento, abismo → elevación, ríos/canales → distribución hacia los árboles del campo.'
  spanish_consistency_notes:
  - Se mantiene «abismo» para תְּהוֹם como equivalente breve y elevado, en lugar de suavizarlo a «profundidades».
  - Se prefirió «plantío» para מַטָּעָהּ por claridad y naturalidad bíblica en español.
  - Se conservó el paralelismo verbal con imperfectos donde el hebreo presenta una acción sostenida.
  - La referencia posesiva se mantiene con «su/sus» para evitar sobrecargar la metáfora con género personal.
