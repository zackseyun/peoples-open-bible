translation:
  language: es
  text: Y aconteció en el año seiscientos uno[a], en el primer mes, el primer día del mes, que las aguas se habían secado de sobre la tierra. Entonces Noé quitó la cubierta[b] del arca, miró y, he aquí, la superficie del suelo estaba seca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el año seiscientos primero». El hebreo dice literalmente: «en uno y seiscientos año».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el techo del arca». El término hebreo significa «cubierta» y no exige un sentido arquitectónico más específico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it came about
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y vino a ser
  lexicon: HALOT
  rationale: La fórmula narrativa וַיְהִי introduce un cambio temporal o de escena. «Aconteció» conserva el valor narrativo sin sonar excesivamente arcaico, y funciona bien en español bíblico contemporáneo.
- source_word: בְּאַחַת וְשֵׁשׁ מֵאוֹת שָׁנָה
  english_pob_choice: in the six hundred and first year
  chosen_spanish: en el año seiscientos uno
  alternatives_spanish:
  - en el año seiscientos primero
  - en el año de seiscientos uno
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en uno y seiscientos año». Se conserva la forma ordinal natural en español, pero sin perder la tensión entre el hebreo literal y la redacción idiomática.
- source_word: בָּרִאשׁוֹן
  english_pob_choice: in the first month
  chosen_spanish: en el mes primero
  alternatives_spanish:
  - en el primer mes
  lexicon: HALOT
  rationale: El artículo y el contexto cronológico muestran que se trata del mes primero; en español, «en el mes primero» mantiene cercanía al orden hebreo y es plenamente inteligible.
- source_word: בְּאֶחָד לַחֹדֶשׁ
  english_pob_choice: on the first day of the month
  chosen_spanish: el día primero del mes
  alternatives_spanish:
  - el primero del mes
  - al primer día del mes
  lexicon: HALOT
  rationale: Es un modismo calendárico fijo. «El día primero del mes» reproduce el sentido con claridad y sin añadir elementos ajenos al texto.
- source_word: חָרְבוּ הַמַּיִם מֵעַל הָאָרֶץ
  english_pob_choice: the waters had dried up from upon the earth
  chosen_spanish: las aguas se habían secado sobre la tierra
  alternatives_spanish:
  - las aguas se habían secado de sobre la tierra
  - las aguas se habían secado de la tierra
  lexicon: HALOT
  rationale: חָרַב puede expresar secarse; en español, «se habían secado» transmite el resultado completado en el pasado. «Sobre la tierra» conserva מֵעַל mejor que una simple omisión o que reducirlo a «de la tierra».
- source_word: וַיָּסַר
  english_pob_choice: removed
  chosen_spanish: quitó
  alternatives_spanish:
  - retiró
  - sacó
  lexicon: HALOT
  rationale: El hiphil de סור indica apartar o quitar. «Quitó» es natural en español y preserva la acción concreta sin sobreinterpretar la mecánica.
- source_word: מִכְסֵה
  english_pob_choice: the covering
  chosen_spanish: la cubierta
  alternatives_spanish:
  - el cubrimiento
  - el techo
  lexicon: HALOT
  rationale: El POB inglés evita especificar «roof». En español, «cubierta» comunica bien la idea de cobertura del arca sin fijar innecesariamente una terminología arquitectónica.
- source_word: הַתֵּבָה
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - la nave
  - la caja
  lexicon: HALOT
  rationale: Es el término establecido para תֵּבָה en el relato de Noé y corresponde al uso tradicional y entendible en español.
- source_word: וַיַּרְא
  english_pob_choice: looked
  chosen_spanish: miró
  alternatives_spanish:
  - vio
  - observó
  lexicon: HALOT
  rationale: Después de quitar la cubierta, la acción es la de mirar hacia afuera. «Miró» conserva la progresión narrativa del hebreo mejor que un simple «vio».
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y resulta que
  lexicon: HALOT
  rationale: «He aquí» es la equivalencia más natural y reverente para la partícula deíctica hebrea, manteniendo el tono de sorpresa o constatación.
- source_word: חָרְבוּ פְּנֵי הָאֲדָמָה
  english_pob_choice: the surface of the ground was dry
  chosen_spanish: la superficie de la tierra seca
  alternatives_spanish:
  - la superficie del suelo estaba seca
  - el rostro de la tierra estaba seco
  lexicon: HALOT
  rationale: פְּנֵי se rinde como «superficie». Para הָאֲדָמָה, «tierra» es preferible en español bíblico aquí y evita repetir «tierra» en sentido global de la primera cláusula con un matiz menos natural en el cierre.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el dictamen de revisión del inglés: la forma «six hundred and first» fue aceptada por naturalidad, pero aquí se conservó además la posibilidad de una alternativa literal en nota. No se detectaron cambios de contenido en la última pasada de revisión.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - «Arca» se usa de manera consistente para תֵּבָה en el relato de Noé.
  - 'Se preserva la progresión narrativa hebrea con verbos simples y directos: aconteció, quitó, miró.'
