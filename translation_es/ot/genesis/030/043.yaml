- from: Y el hombre se enriqueció[a] muchísimo, y llegó a tener muchos rebaños, esclavas y esclavos, camellos y asnos.
  to: Y el hombre prosperó muchísimo, y llegó a tener muchos rebaños, esclavas[a] y esclavos[a], camellos y asnos.
