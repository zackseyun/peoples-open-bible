lexical_decisions:
- source_word: וְ/שַׂלְמוֹן
  english_pob_choice: And Salmon
  chosen_spanish: Y Salmón
  alternatives_spanish:
  - Ahora Salmón
  - Salmón
  lexicon: HALOT
  rationale: Se conserva la conjunción coordinante para mantener el encadenamiento genealógico del hebreo. El nombre propio se translitera como «Salmón», forma reconocible y fiel al original.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  - procreó
  lexicon: HALOT
  rationale: En contextos genealógicos, el hifil de ילד expresa la generación paterna. En español, «engendró» conserva ese sentido genealógico con dignidad y brevedad; «fue padre de» sería más explicativo pero menos directo.
- source_word: אֶת
  english_pob_choice: '[not translated]'
  chosen_spanish: '[no se traduce]'
  alternatives_spanish:
  - a
  lexicon: HALOT
  rationale: La partícula de objeto directo hebrea no tiene equivalente obligatorio en español; se omite en la traducción principal, aunque el complemento personal se introduce naturalmente con «a».
- source_word: בֹּעַז
  english_pob_choice: Boaz
  chosen_spanish: Booz
  alternatives_spanish:
  - Boaz
  lexicon: HALOT
  rationale: Se usa la forma bíblica usual en español «Booz», ya asentada en la tradición hispanohablante, sin perder la identificación del nombre propio.
- source_word: וּ/בֹעַז
  english_pob_choice: and Boaz
  chosen_spanish: y Booz
  alternatives_spanish:
  - Booz
  lexicon: HALOT
  rationale: Se mantiene la coordinación explícita para reflejar la estructura paralela de la genealogía.
- source_word: עוֹבֵד
  english_pob_choice: Obed
  chosen_spanish: Obed
  lexicon: HALOT
  rationale: Nombre propio transliterado conforme al uso bíblico estándar en español.
translation_notes:
  revision_awareness: El texto fuente y el contexto de auditoría inglesa presentan alto acuerdo y no registran revisiones aplicadas; por eso la traducción española sigue directamente la estructura genealógica del hebreo con una equivalencia óptima y sin expansión interpretativa.
  spanish_consistency_notes:
  - Se conserva la coordinación inicial con «Y» para reflejar la sucesión genealógica hebrea.
  - Se emplea «engendró» como equivalente genealógico principal, en armonía con el valor léxico del hifil de ילד.
  - Se usa «Booz» en lugar de «Boaz» por consistencia con la tradición bíblica española, mientras «Obed» permanece sin cambio.
  - No hay decisiones teológicas específicas en este versículo, solo una elección léxica genealógica.
