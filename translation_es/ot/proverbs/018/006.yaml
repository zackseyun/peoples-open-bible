translation:
  language: es
  text: Los labios del necio entran en disputa[a], y su boca llama a los golpes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entran en pleito» o «vienen a una querella».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su boca invita a una paliza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂפְתֵי
  english_pob_choice: lips
  chosen_spanish: labios
  alternatives_spanish:
  - habla
  - palabras
  lexicon: HALOT
  rationale: Mantengo el sustantivo corporal para conservar la imagen vívida y el paralelismo con «boca» en el segundo hemistiquio, como en el hebreo y en la decisión inglesa de retener «lips».
- source_word: כְסִיל
  english_pob_choice: fool
  chosen_spanish: necio
  alternatives_spanish:
  - insensato
  - estúpido
  lexicon: HALOT
  rationale: «Necio» comunica el término sapiencial de Proverbios con sentido moral y práctico, sin reducirlo a falta de inteligencia בלבד. En español suena natural y reverente.
- source_word: יָבֹאוּ בְרִיב
  english_pob_choice: enter into strife
  chosen_spanish: entran en pleito
  alternatives_spanish:
  - entran en contienda
  - entran en disputa
  lexicon: HALOT
  rationale: El hebreo expresa involucrarse en conflicto; «entran en pleito» preserva la idea de entrar en litigio/querella de manera clara y idiomática en español, sin perder la fuerza de la advertencia.
- source_word: פִיו
  english_pob_choice: his mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - sus palabras
  - lo que dice
  lexicon: HALOT
  rationale: Conservo la imagen concreta de «boca» para mantener el paralelismo corporal con «labios» y no abstractizar el texto más de lo que el hebreo permite.
- source_word: לְמַהֲלֻמֹות
  english_pob_choice: for blows
  chosen_spanish: a los golpes
  alternatives_spanish:
  - para los golpes
  - para una paliza
  - a los azotes
  lexicon: HALOT
  rationale: «Golpes» reproduce el sentido de impactos físicos y evita suavizar el término. La preposición «a» refleja bien la noción de llamada o exposición a ese castigo.
- source_word: יִקְרָא
  english_pob_choice: calls for
  chosen_spanish: llama a
  alternatives_spanish:
  - invita a
  - pide
  lexicon: HALOT
  rationale: «Llama a» conserva la fuerza idiomática de traer o convocar sobre sí los golpes, sin explicitar demasiado la consecuencia.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente hebreo y el criterio auditado en inglés: mantiene el paralelismo corporal («labios» / «boca») y la imagen de conflicto físico («pleito» / «golpes»), sin introducir interpretaciones ajenas al proverbio.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología teológica no pertinente; el texto es sapiencial y no contiene nombres divinos.
  - «Necio» se usa como término sapiencial estándar, no como insulto coloquial fuerte.
  - La combinación «entran en pleito» / «llama a los golpes» conserva el contraste entre conflicto verbal y consecuencia física.
