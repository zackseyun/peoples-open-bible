    text: 'También puede entenderse: "de su presencia". El hebreo dice literalmente "de delante de su rostro", un modismo para ser quitado de delante de Yahvé.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: "por la mano de". La expresión hebrea señala mediación o instrumento: Yahvé habló por medio de sus siervos, los profetas.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'removió' por 'apartó' para lograr un español más natural y fiel al valor causativo de הֵסִיר; se elimina 'Así' para evitar un matiz consecutivo innecesario; y se pule la nota sobre el modismo hebreo de presencia/judicio. No se requieren cambios doctrinales ni estructurales mayores.
