  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוִה se conserva como «Yahvé» y רָעָה se traduce apropiadamente como «desastre». No hay conflicto doctrinal serio. El compuesto אֲדֹנָי יְהוִה como «el Señor Yahvé» es aceptable dentro de la política del proyecto.'
