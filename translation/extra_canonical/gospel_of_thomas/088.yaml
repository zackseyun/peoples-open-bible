    philosophy: optimal-equivalence
    footnotes:
    - marker: a
      text: ⲁⲅⲅⲉⲗⲟⲥ may be translated ‘messenger’ (Gk ἄγγελος); I render ‘angel’ here
        to keep the likely heavenly connotation alongside ‘prophets.’
      reason: lexical_alternative
    - marker: b
      text: ⲧⲁⲁⲩ ⲛⲁⲩ is literally ‘show them’; many smooth this with the preceding
        imperative as ‘give them what you have,’ but the Coptic uses both ‘give’ and
        ‘show’ in close succession.
      reason: lexical_alternative
    - marker: c
      text: ⲁϣ ⲛ̄ϩⲟⲟⲩ is literally ‘what day’; hence ‘On what day’ rather than a smoothed
        ‘when.’
      reason: cultural_note
    - marker: d
      text: The initial subject is singular in Dilley’s normalized text (‘the angel’)
        though some editors/readings take it as plural (‘angels’). I retain the singular
        here.
      reason: textual_variant
    - marker: e
      text: Or 'The angel will come to you with the prophets'.
      reason: previous_rendering
    - marker: f
      text: Or 'give to them; show them what you have in your hands, and say,'.
      reason: previous_rendering
