  text: Salieron de Rimón-perez y acamparon en Libna.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Salieron
  alternatives_spanish:
  - Partieron
  - Se pusieron en marcha
  lexicon: HALOT
  rationale: En el contexto de la lista de campamentos del desierto, נסע expresa el traslado de una estación a otra. «Salieron» comunica con naturalidad la acción de dejar un lugar para continuar el recorrido, sin perder el valor itinerario del verbo.
- source_word: מֵרִמֹּן פָּרֶץ
  english_pob_choice: from Rimmon-perez
  chosen_spanish: de Rimón-perez
  alternatives_spanish:
  - desde Rimón-perez
  - de Rimón Pérez
  lexicon: HALOT
  rationale: Es un topónimo compuesto introducido por la preposición de origen. Se translitera para conservar el nombre propio y se mantiene el guion para reflejar la unidad del compuesto, como en la solución inglesa.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y establecieron campamento
  lexicon: HALOT
  rationale: En las fórmulas de itinerario, חנה significa instalar el campamento. «Acamparon» es la equivalencia directa y clara en español contemporáneo; el sujeto implícito del verbo hebreo se expresa de forma natural sin añadir contenido extra.
- source_word: בְּלִבְנָה
  english_pob_choice: at Libnah
  chosen_spanish: en Libna
  alternatives_spanish:
  - en Libnah
  - a Libna
  lexicon: HALOT
  rationale: La preposición ב en este tipo de registro de viaje señala el lugar de parada. En español, «en» comunica mejor el punto de campamento que «a», y se translitera el nombre del lugar como Libna para mantener uniformidad toponímica.
