translation:
  language: es
  text: No sacrificarás a Yahvé tu Dios un buey o una oveja[a] que tenga algún defecto, cualquier cosa mala, porque eso es una abominación para Yahvé tu Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo שֶׂה es un término más amplio para un animal del rebaño y puede referirse a una oveja o a una cabra.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִזְבַּח
  english_pob_choice: sacrifice
  chosen_spanish: sacrificarás
  alternatives_spanish:
  - inmolarás
  - matarás
  lexicon: HALOT
  rationale: En contexto sacrificial, זבח no significa simplemente matar, sino ofrecer en sacrificio. «Sacrificarás» conserva esa fuerza cultual en español.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al SEÑOR
  - a Yahweh
  lexicon: 'DOCTRINE.md contested terms: יְהוָה YHWH'
  rationale: 'Se sigue la convención del proyecto para el Nombre divino: «Yahvé» en el texto principal, manteniendo la referencia directa al Tetragrámaton.'
- source_word: שׁוֹר
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - toro
  - res
  lexicon: HALOT
  rationale: «Buey» es un equivalente natural y claro en español para el animal de sacrificio masculino adulto; evita la sobreespecificación de «toro» y suena más idiomático que «res».
- source_word: שֶׂה
  english_pob_choice: sheep
  chosen_spanish: oveja
  alternatives_spanish:
  - cordero
  - cabra
  lexicon: HALOT
  rationale: El hebreo es un término más amplio para una cría o miembro del rebaño, pero «oveja» ofrece una lectura fluida y comprensible; la amplitud semántica se preserva en la nota.
- source_word: מוּם
  english_pob_choice: blemish
  chosen_spanish: defecto
  alternatives_spanish:
  - mancha
  - imperfección
  lexicon: HALOT
  rationale: «Defecto» comunica una falla física que descalifica la víctima; en español bíblico moderno resulta más natural que «mancha» y mantiene el sentido sacrificial.
- source_word: כֹּל דָּבָר רָע
  english_pob_choice: any bad thing
  chosen_spanish: ninguna cosa mala
  alternatives_spanish:
  - cualquier cosa mala
  - ningún defecto grave
  lexicon: HALOT
  rationale: La expresión hebrea amplía el «defecto» a cualquier cosa mala/disqualificante. «Ninguna cosa mala» reproduce esa amplitud sin cerrar prematuramente el sentido.
- source_word: תוֹעֲבַת
  english_pob_choice: an abomination
  chosen_spanish: una abominación
  alternatives_spanish:
  - algo detestable
  - una cosa abominable
  lexicon: HALOT
  rationale: «Abominación» conserva la carga cultual y moral del término hebreo, coherente con el registro bíblico y con el valor enfático del texto.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo usa explícitamente el Nombre del pacto. Se preserva esa referencia con «Yahvé», conforme al estándar del proyecto y sin enmascararlo con un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: 'Fuerza de la cláusula final: כִּי תוֹעֲבַת יְהוָה אֱלֹהֶיךָ הוּא'
  english_pob_reading: for that is an abomination to Yahweh your God
  chosen_spanish_reading: porque eso es una abominación para Yahvé tu Dios
  alternative_spanish_readings:
  - porque eso es abominable para Yahvé tu Dios
  - pues eso es una abominación ante Yahvé tu Dios
  rationale: Se mantiene la predicación nominal del hebreo («es una abominación») y la referencia personal a Dios; «para Yahvé» refleja adecuadamente la relación de detestación ante Dios sin suavizarla.
  doctrine_reference: HALOT; sintaxis hebrea de תוֹעֵבָה
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «any bad thing» por naturalidad. Por eso se eligió «ninguna cosa mala» como equivalente español más natural que «cualquier cosa mala» o una glosa interpretativa, manteniendo a la vez la amplitud del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme a la política del proyecto para el Tetragrámaton.
  - Se mantiene un registro bíblico claro y contemporáneo, evitando arcaísmos innecesarios.
  - La nota de שֶׂה preserva la amplitud semántica documentada por el texto fuente y el audit trail inglés.
