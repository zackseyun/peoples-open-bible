revisions:
- from: Pero de las ciudades de estos pueblos que Yahvé tu Dios te da como herencia[a], no dejarás con vida a ninguna cosa que respire.
  to: Pero de las ciudades de estos pueblos que Yahvé tu Dios te da como herencia[a], no dejarás con vida a ningún ser que respire.
  rationale: Se cambia «ninguna cosa que respire» por «ningún ser que respire» para lograr un español más natural y fiel al sentido de כָּל נְשָׁמָה en contexto, sin perder la imagen concreta de la respiración. Se conserva «Yahvé» y «como herencia» por fidelidad al proyecto y al hebreo. La nota al pie mantiene la alternativa más literal y documenta el hebreo subyacente.
  reviewer_model: gpt-5.4
