    rationale: El hebreo describe un aparato de restricción para los pies, y el inglés auditado usa 'stocks'. En español bíblico-natural, «poner los pies en los cepos» comunica mejor el instrumento de inmovilización de ambos pies y evita cierta ambigüedad del singular.
