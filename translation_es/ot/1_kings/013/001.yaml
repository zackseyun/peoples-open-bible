  - severity: medium
    issue: Falta una nota para la cláusula de Jeroboam y la expresión espacial del altar.
    rationale: 'La nota inglesa [b] preserva dos alternativas relevantes: waw como «y» en vez de «mientras», y עַל הַמִּזְבֵּחַ como «al altar» en vez de «junto al altar». El borrador omite esa información y por tanto no refleja completamente el audit trail.'
  - severity: low
    issue: «Y he aquí que» resulta algo acartonado en español contemporáneo.
    rationale: Aunque es fiel, la combinación completa suena más calcada que «Y he aquí» o una reestructuración más natural. Es una mejora de legibilidad, no un problema grave de sentido.
