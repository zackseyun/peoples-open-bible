id: 1CH.11.19
reference: 1 Chronicles 11:19
source:
  edition: WLC
  text: וַ/יֹּ֡אמֶר חָלִילָ/ה֩ לִּ֨/י מֵ/אֱלֹהַ֜/י מֵ/עֲשׂ֣וֹת זֹ֗את הֲ/דַ֣ם הָ/אֲנָשִׁים֩ הָ/אֵ֨לֶּה אֶשְׁתֶּ֤ה בְ/נַפְשׁוֹתָ/ם֙ כִּ֣י בְ/נַפְשׁוֹתָ֣/ם הֱבִיא֔וּ/ם וְ/לֹ֥א אָבָ֖ה לִ/שְׁתּוֹתָ֑/ם אֵ֣לֶּה עָשׂ֔וּ שְׁלֹ֖שֶׁת הַ/גִּבּוֹרִֽים׃
translation:
  text: And he said[a], “Far be it from me, by my God, to do this! Shall I drink the blood of these men at the cost of their lives? For they brought it at the cost of their lives.” So he was not willing to drink it[b]. These things the three mighty men did.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'at the risk of their lives.' The Hebrew repeats 'with/by their lives' for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''Blood'' is kept literally. David speaks of the water as if it were their blood because they obtained it through mortal danger.'
    reason: cultural_note
lexical_decisions:
- source_word: חָלִילָה לִּי מֵאֱלֹהַי
  chosen: Far be it from me, by my God
  alternatives:
  - Far be it from me before my God
  - My God forbid it
  lexicon: HALOT
  rationale: חָלִילָה is an idiomatic expression of strong repudiation ('far be it'). The attached divine phrase is rendered literally enough to preserve the appeal to God without importing the more traditional but less literal 'God forbid.' 'By my God' reflects the oath-like force of מֵאֱלֹהַי in context.
- source_word: מֵעֲשׂוֹת זֹאת
  chosen: to do this
  alternatives:
  - from doing this
  lexicon: HALOT
  rationale: Infinitive construct with prefixed מ expresses separation/prevention after חָלִילָה; idiomatic English is 'to do this,' though 'from doing this' is possible.
- source_word: הֲדַם הָאֲנָשִׁים הָאֵלֶּה אֶשְׁתֶּה
  chosen: Shall I drink the blood of these men
  alternatives:
  - Am I to drink the blood of these men
  lexicon: HALOT
  rationale: The interrogative הֲ introduces a rhetorical question. 'Blood' is retained literally because David interprets the water as tantamount to blood due to the mortal risk involved; this should not be paraphrased away.
- source_word: בְנַפְשׁוֹתָם
  chosen: at the cost of their lives
  alternatives:
  - with their lives
  - in jeopardy of their lives
  lexicon: HALOT
  rationale: 'נֶפֶשׁ here refers to life rather than soul. The preposition ב marks circumstance/price: the water was obtained with their lives at stake. ''At the cost of their lives'' communicates the idiom naturally in English while preserving the gravity.'
- source_word: כִּי בְנַפְשׁוֹתָם הֱבִיאוּם
  chosen: For they brought it at the cost of their lives
  alternatives:
  - for they brought it with their lives
  - for they brought it at the risk of their lives
  lexicon: HALOT
  rationale: The suffix on הֱבִיאוּם refers to the water. Repeating 'at the cost of their lives' preserves the Hebrew repetition of בְנַפְשׁוֹתָם and clarifies the logic of David's refusal.
- source_word: וְלֹא אָבָה לִשְׁתּוֹתָם
  chosen: So he was not willing to drink it
  alternatives:
  - and he would not drink it
  - and he refused to drink it
  lexicon: HALOT
  rationale: אָבָה denotes willingness/consent. 'Was not willing' is slightly more formal and closer to the Hebrew than the stronger interpretive 'refused,' though the sense overlaps. Singular 'it' is used in English for the collected water.
- source_word: אֵלֶּה עָשׂוּ שְׁלֹשֶׁת הַגִּבּוֹרִים
  chosen: These things the three mighty men did
  alternatives:
  - These were the things the three warriors did
  - The three mighty men did these things
  lexicon: HALOT
  rationale: The clause summarizes the exploit. גִּבּוֹרִים in Chronicles commonly denotes David's elite warriors; 'mighty men' preserves the established military-heroic sense without flattening it to merely 'men'.
