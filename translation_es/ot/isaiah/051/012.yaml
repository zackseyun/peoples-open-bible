revisions:
- from: Yo, yo soy el que los consuela.[a] ¿Quién eres tú para que temas al hombre que muere, y al hijo de hombre, que será como pasto?
  to: Yo, yo soy el que los consuela. ¿Quién eres tú para que temas al hombre que muere, y al hijo del hombre[a], que será hecho como la hierba?
  rationale: Se corrige la colocación de la nota para que explique la expresión pertinente; se reemplaza «hijo de hombre» por «hijo del hombre» para una literalidad idiomática y reconocible en español; y se ajusta la cláusula final a «será hecho como la hierba» para reflejar mejor el valor comparativo/resultativo documentado para יִנָּתֵן y la imaginería profética habitual.
