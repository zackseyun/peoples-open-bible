translation:
  language: es
  text: Después de que engendró a Set[a], Adán vivió ochocientos años y engendró hijos e hijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: “los días de Adán ... fueron ochocientos años” después de engendrar a Set.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּֽהְי֣וּ / יְמֵי אָדָ֗ם
  english_pob_choice: Adam lived
  chosen_spanish: Adán vivió
  alternatives_spanish:
  - los días de Adán fueron
  lexicon: HALOT
  rationale: El hebreo usa literalmente una expresión de duración de vida (“los días de Adán”). En español, “Adán vivió” comunica con naturalidad el valor idiomático sin perder el sentido temporal de la construcción.
- source_word: אָדָם
  english_pob_choice: Adam
  chosen_spanish: Adán
  alternatives_spanish:
  - hombre
  lexicon: HALOT
  rationale: Aquí el referente es el nombre propio del antepasado en la genealogía, no el sustantivo genérico “hombre”. Por eso se translitera el nombre propio como “Adán”.
- source_word: אַחֲרֵי
  english_pob_choice: After
  chosen_spanish: Después de que
  alternatives_spanish:
  - Tras
  - Después de
  lexicon: HALOT
  rationale: La relación temporal es posterioridad respecto al engendramiento de Set. En español, “Después de que” suena más natural que un calco más rígido y mantiene con claridad la subordinación temporal.
- source_word: הוֹלִידוֹ
  english_pob_choice: he fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - procreó
  - engendró a
  lexicon: HALOT
  rationale: El verbo hebreo en este contexto genealógico expresa engendrar/fathering. “Engendró” conserva el tono genealógico formal y el sentido específico de paternidad biológica.
- source_word: אֶת שֵׁת
  english_pob_choice: Seth
  chosen_spanish: Set
  alternatives_spanish:
  - Seth
  lexicon: HALOT
  rationale: El nombre propio se adapta a la forma española habitual “Set”, equivalente de “Seth” en la tradición bíblica en español, sin alterar la identificación del personaje.
- source_word: שְׁמֹנֶ֥ה מֵאֹ֖ת שָׁנָ֑ה
  english_pob_choice: eight hundred years
  chosen_spanish: ochocientos años
  alternatives_spanish:
  - 800 años
  lexicon: HALOT
  rationale: La expresión numérica es directa y no plantea ambigüedad. “Ochocientos años” reproduce con fidelidad el periodo de vida indicado.
- source_word: וַיּ֥וֹלֶד
  english_pob_choice: and fathered
  chosen_spanish: y engendró
  alternatives_spanish:
  - y fue padre de
  - y tuvo
  lexicon: HALOT
  rationale: Se mantiene la misma raíz verbal en español para conservar la cohesión genealógica del versículo y el paralelo con la primera mención del verbo.
- source_word: בָּנִ֖ים וּ/בָנֽוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - hijos y hijas
  - descendencia
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente varones y mujeres. En español, “hijos e hijas” preserva esa distinción y suena natural dentro de la fórmula genealógica.
theological_decisions:
- issue: Nombre propio אָדָם en contexto genealógico
  english_pob_reading: Adam as a personal name
  chosen_spanish_reading: Adán como nombre propio
  alternative_spanish_readings:
  - hombre
  rationale: La secuencia genealógica identifica al individuo Adán, no a la humanidad en general. Traducirlo como nombre propio evita una lectura genérica que el contexto no sostiene.
  doctrine_reference: 'DOCTRINE.md: transliterar nombres propios; distinguir nombre personal de sustantivo común según contexto.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: el texto inglés auditado no requirió cambios y la solución española sigue la misma decisión idiomática para la construcción hebrea de duración, manteniendo la coherencia genealógica y el paralelismo verbal.'
  spanish_consistency_notes:
  - Se conserva “engendró” en ambos casos para reflejar la repetición del mismo verbo hebreo ילד.
  - Se usa “Set” como forma española tradicional del nombre propio.
  - La nota al pie marca la alternativa literal hebrea sin forzarla en el cuerpo del texto.
  - El estilo es formal y publicable, con puntuación española estándar.
