translation:
  language: es
  text: Yahvé habló a Moisés y a Aarón, diciendo,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo de habla en fórmula narrativa divina se vierte naturalmente como «habló» en español. Mantiene el valor de evento discursivo y suena más idiomático que un calco como «habló... diciendo» o una repetición más rígida de «dijo»; ambas opciones son posibles, pero «habló» preserva mejor el matiz de inicio solemne del discurso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto en la forma española «Yahvé», conforme a la política terminológica del proyecto. Se evita la sustitución por un título («el SEÑOR») porque el hebreo usa explícitamente el Tetragrámaton, no un genérico.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición marca destinatario directo del habla. En español, «a» es la realización natural con verbos de comunicación y refleja el valor del hebreo sin añadir finalidad.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: וְאֶל
  english_pob_choice: and to
  chosen_spanish: y a
  alternatives_spanish:
  - y para
  lexicon: HALOT
  rationale: La coordinación hebrea conserva dos destinatarios explícitos. «Y a» mantiene ambos elementos y evita fundirlos en una sola frase menos precisa.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: La fórmula introductoria de habla se expresa de modo natural como «diciendo» en español, preservando su función sintáctica de introducción al discurso siguiente.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El versículo contiene el Tetragrámaton directamente. La lectura española debe preservar el nombre divino, no ocultarlo bajo un título. «Yahvé» es la forma elegida por la política del POB en español y corresponde a la misma decisión doctrinal que el inglés «Yahweh».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con la auditoría inglesa de alta concordancia: el hebreo presenta la fórmula narrativa estándar de inicio de discurso directo, sin variantes textuales ni tensiones lexicale-teológicas adicionales en este verso. No se requirieron notas de pie de página porque la decisión principal —el nombre divino— ya queda resuelta de forma directa en el texto español.'
  spanish_consistency_notes:
  - Se mantiene el orden natural del español sin perder la coordinación explícita «a Moisés y a Aarón».
  - Se evita «SEÑOR» por consistencia con la política del proyecto sobre יהוה.
  - «Diciendo» funciona como fórmula de enlace y no como contenido independiente; por eso no se amplía con una paráfrasis.
  - 'Los nombres propios se normalizan a las formas usuales en español bíblico: Moisés, Aarón.'
