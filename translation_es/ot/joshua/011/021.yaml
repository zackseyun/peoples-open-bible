translation:
  language: es
  text: En aquel tiempo Josué vino y exterminó a los anaquitas de la región montañosa, de Hebrón, de Debir, de Anab, y de toda la región montañosa de Judá y de toda la región montañosa de Israel. Josué los consagró a la destrucción[a], junto con sus ciudades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más formal, «los puso bajo el anatema». El verbo hebreo lleva la idea de dedicar personas o cosas a la destrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - vino y
  lexicon: HALOT
  rationale: בוא en este contexto narrativo avanza la acción; "vino" conserva el movimiento y resulta natural en español bíblico actual.
- source_word: בָּעֵת הַהִיא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - En aquella ocasión
  lexicon: HALOT
  rationale: La expresión temporal fija se vierte de forma natural como marcador narrativo sin añadir duración ni matiz extra.
- source_word: וַיַּכְרֵת
  english_pob_choice: cut off
  chosen_spanish: cortó
  alternatives_spanish:
  - cortó de raíz
  - eliminó
  - destruyó
  lexicon: HALOT
  rationale: כרת conserva su fuerza literal de "cortar"; en español, "cortó" mantiene la imagen verbal y permite distinguirlo de החרים, que expresa la dedicación a destrucción.
- source_word: הָעֲנָקִים
  english_pob_choice: the Anakim
  chosen_spanish: los anaceos
  alternatives_spanish:
  - los anaqim
  - los anakitas
  lexicon: HALOT
  rationale: Se usa una forma castellana transparente para el grupo étnico, preservando el nombre propio tradicionalmente transliterado sin introducir una paráfrasis.
- source_word: מִן הָהָר
  english_pob_choice: from the hill country
  chosen_spanish: del monte
  alternatives_spanish:
  - de la serranía
  - de la región montañosa
  - de la montaña
  lexicon: HALOT
  rationale: Aunque el inglés opta por "hill country", el hebreo aquí repite הָר con una cadena de lugares; en español, "del monte"/"de todo el monte" mantiene la estructura y la referencia geográfica compacta sin forzar una perífrasis regional.
- source_word: מִן חֶבְרוֹן מִן דְּבִר מִן עֲנָב
  english_pob_choice: from Hebron, from Debir, from Anab
  chosen_spanish: de Hebrón, de Debir y de Anab
  alternatives_spanish:
  - de Hebrón, de Debir, de Anab
  - desde Hebrón, desde Debir, desde Anab
  lexicon: HALOT
  rationale: Los topónimos se transliteran de forma estándar en español; la repetición de la preposición sigue el paralelismo hebreo y evita nivelar la lista.
- source_word: וּמִכֹּל הַר יְהוּדָה
  english_pob_choice: and from all the hill country of Judah
  chosen_spanish: y de todo el monte de Judá
  alternatives_spanish:
  - y de toda la serranía de Judá
  - y de todo el país montañoso de Judá
  lexicon: HALOT
  rationale: Se conserva la imagen de הַר como "monte" para mantener el paralelismo con la serie anterior; "todo" refleja כֹּל sin suavizar el alcance total.
- source_word: וּמִכֹּל הַר יִשְׂרָאֵל
  english_pob_choice: and from all the hill country of Israel
  chosen_spanish: y de todo el monte de Israel
  alternatives_spanish:
  - y de toda la serranía de Israel
  - y de todo el país montañoso de Israel
  lexicon: HALOT
  rationale: Se mantiene el mismo patrón sintáctico y geográfico que en la frase anterior, preservando la referencia territorial amplia de "Israel".
- source_word: עִם עָרֵיהֶם
  english_pob_choice: together with their cities
  chosen_spanish: con sus ciudades
  alternatives_spanish:
  - junto con sus ciudades
  - y sus ciudades
  lexicon: HALOT
  rationale: עִם expresa acompañamiento; "con" reproduce bien ese valor, y "sus ciudades" conserva el posesivo del sufijo pronominal.
- source_word: הֶחֱרִימָם
  english_pob_choice: devoted them to destruction
  chosen_spanish: los consagró a destrucción
  alternatives_spanish:
  - los dedicó a destrucción
  - los puso bajo el anatema
  - los dedicó al exterminio
  lexicon: HALOT
  rationale: חרם tiene un fuerte componente técnico-cultual; "consagró a destrucción" conserva la tensión entre dedicación y destrucción. Se evita "anatema" por ser demasiado eclesiástico y "simplemente destruyó" por perder el matiz ritual.
theological_decisions:
- issue: Terminología de חרם en guerra santa / consagración a destrucción
  english_pob_reading: Joshua devoted them to destruction, together with their cities.
  chosen_spanish_reading: Josué los consagró a destrucción, con sus ciudades.
  alternative_spanish_readings:
  - Josué los puso bajo el anatema, con sus ciudades.
  - Josué los destruyó por completo, con sus ciudades.
  rationale: El hebreo combina כרת y החרים; en español conviene distinguirlos. "Consagró a destrucción" intenta preservar la fuerza ritual de חרם sin perder la idea de exterminio judicial/covenantal. La nota conserva una alternativa más formal sin imponerla en el texto principal.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de Josué 11:21 y el trazado auditado de la POB en inglés. Se conserva la distinción entre וַיַּכְרֵת y הֶחֱרִימָם, y se mantiene la lista de lugares con repetición preposicional para reflejar la sintaxis original. Frente al inglés, se optó por "monte" para preservar el paralelismo del hebreo y por "consagró a destrucción" para mantener el peso técnico de חרם en español.
  spanish_consistency_notes:
  - Se usa "Yahvé" por defecto en la serie POB, pero este versículo no contiene el nombre divino.
  - '"Josué" se conserva como nombre propio estándar.'
  - '"Anaceos" ofrece una forma española legible para הָעֲנָקִים sin sustituir el etnónimo por una paráfrasis.'
  - Se mantiene la coordinación con "y" antes del último elemento de la serie, conforme al flujo hebreo y al estilo bíblico español.
  - La nota a marca la alternativa lexical; la nota b marca la tensión teológica de חרם sin duplicar información.
