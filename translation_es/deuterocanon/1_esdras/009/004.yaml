translation:
  language: es
  text: Y cualquiera que no comparezca dentro de dos o tres días, conforme al juicio de los ancianos que presiden, su ganado[a] será consagrado, y él mismo será excluido de la asamblea de la cautividad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más interpretativa, 'sus bienes serán confiscados'. El griego dice 'será consagrado', lo que en este contexto legal puede implicar confiscación.
    reason: lexical_alternative
  - marker: b
    text: O 'de la comunidad de los cautivos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπαντήσωσιν
  english_pob_choice: appear
  chosen_spanish: comparezca
  alternatives_spanish:
  - aparezca
  - se presente
  - responda
  lexicon: BDAG
  rationale: En este contexto de convocatoria legal, el verbo expresa acudir en respuesta a un llamado, no solo 'encontrarse' con alguien. 'Comparezca' conserva la fuerza formal y judicial del pasaje en español.
- source_word: ἐν δυσὶν ἢ τρισὶν ἡμέραις
  english_pob_choice: within two or three days
  chosen_spanish: dentro de dos o tres días
  alternatives_spanish:
  - en dos o tres días
  - en un plazo de dos o tres días
  lexicon: BDAG
  rationale: La expresión marca el plazo permitido para obedecer la orden. 'Dentro de' comunica bien el límite temporal sin añadir contenido ajeno al griego.
- source_word: κατὰ τὸ κρῖμα
  english_pob_choice: according to the judgment
  chosen_spanish: conforme al juicio
  alternatives_spanish:
  - según la decisión
  - de acuerdo con el veredicto
  lexicon: BDAG
  rationale: κρῖμα aquí tiene valor jurídico y autoritativo. 'Juicio' preserva ese tono formal en español y encaja con la estructura legal del mandato.
- source_word: τῶν προκαθημένων πρεσβυτέρων
  english_pob_choice: of the presiding elders
  chosen_spanish: de los ancianos que presiden
  alternatives_spanish:
  - de los ancianos presidentes
  - de los ancianos dirigentes
  lexicon: BDAG
  rationale: El participio indica ancianos con función de presidencia o liderazgo. 'Que presiden' es transparente en español y mantiene la relación sintáctica del griego.
- source_word: ἀνιερωθήσονται
  english_pob_choice: will be devoted
  chosen_spanish: serán consagrados
  alternatives_spanish:
  - serán dedicados
  - serán devueltos al culto
  - serán confiscados
  lexicon: LSJ
  rationale: El verbo literalmente sugiere ser dedicado o consagrado. En este contexto jurídico la consecuencia es punitiva, pero en español 'consagrados' preserva la conexión léxica con el griego; la fuerza confiscatoria queda implícita por el marco legal y se aclara en la nota.
- source_word: τὰ κτήνη αὐτῶν
  english_pob_choice: their livestock
  chosen_spanish: sus ganados
  alternatives_spanish:
  - sus animales
  - sus animales de carga
  - su ganado
  lexicon: BDAG
  rationale: κτήνη normalmente designa animales domésticos o de trabajo, y en contexto jurídico puede abarcar el ganado. 'Ganados' mantiene esa referencia concreta y es natural en español bíblico contemporáneo.
- source_word: ἀλλοτριωθήσεται
  english_pob_choice: will be excluded
  chosen_spanish: será excluido
  alternatives_spanish:
  - será apartado
  - será separado
  - será hecho extraño
  lexicon: BDAG
  rationale: El pasivo expresa quedar fuera de la comunidad. 'Será excluido' comunica con claridad el resultado social-jurídico que el griego describe.
- source_word: ἀπὸ τοῦ πλήθους τῆς αἰχμαλωσίας
  english_pob_choice: from the assembly of the captivity
  chosen_spanish: de la asamblea de la cautividad
  alternatives_spanish:
  - de la comunidad de los cautivos
  - del conjunto de los cautivos
  - del pueblo del cautiverio
  lexicon: BDAG
  rationale: πλῆθος puede ser 'multitud' o 'asamblea'; la construcción total designa al grupo de los exiliados/cautivos. 'Asamblea de la cautividad' conserva la cercanía al griego y el matiz colectivo del original.
theological_decisions:
- issue: Naturaleza de la sanción sobre los bienes
  english_pob_reading: 'A legal-religious sanction is expressed: the person''s livestock are ''devoted'' and the person is excluded from the exile community.'
  chosen_spanish_reading: 'Se expresa una sanción jurídico-religiosa: los ganados quedan ''consagrados'' y la persona es excluida de la asamblea de la cautividad.'
  alternative_spanish_readings:
  - sus bienes serán confiscados
  - sus animales serán forfeitados/embargados
  - sus posesiones serán dedicadas
  rationale: El griego ἀνιερωθήσονται sugiere dedicación/consagración, pero en este contexto la medida funciona como castigo y pérdida de bienes. Se conserva el verbo más cercano al original en el texto principal y se deja abierta la lectura confiscatoria en la nota, sin borrar la tensión léxica.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'El texto base inglés mantuvo ''devoted'' para ἀνιερωθήσονται y ''assembly of the captivity'' para τοῦ πλήθους τῆς αἰχμαλωσίας, tras una revisión que buscó mayor naturalidad sin perder cercanía al griego. La versión española conserva esa misma estrategia: mantiene la forma léxica principal del verbo de dedicación y reproduce el grupo comunitario con una expresión formal, dejando en nota la alternativa confiscatoria y la posibilidad de una formulación más idiomática de la comunidad.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma del proyecto solo cuando aparece el nombre divino; este verso no lo contiene.
  - Se mantiene 'Mesías/Cristo' fuera del pasaje porque no hay Χριστός ni equivalente.
  - '''Cautividad'' traduce αἰχμαλωσία de modo cercano al griego; en nota se ofrece ''cautivos'' como alternativa más idiomática.'
  - '''Ganados'' refleja τὰ κτήνη con referencia concreta a bienes animales, evitando ampliar injustificadamente a bienes inmuebles.'
