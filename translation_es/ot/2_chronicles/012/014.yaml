translation:
  language: es
  text: E hizo lo malo[a], porque no había dispuesto su corazón para buscar a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «no había preparado su corazón para buscar a Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: And he did
  chosen_spanish: E hizo
  alternatives_spanish:
  - Y hizo
  - Entonces hizo
  lexicon: HALOT
  rationale: El qal wayyiqtol de עשה introduce la acción narrativa; en español, 'hizo' transmite de forma natural el resultado de la acción. 'E' conserva la secuencia narrativa sin sonar repetitivo ante la vocal inicial.
- source_word: הָרָע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  lexicon: HALOT
  rationale: Con artículo, la expresión funciona como una evaluación moral. 'Lo malo' conserva la abstracción moral del hebreo y suena natural en español, sin reducirlo a una mera etiqueta nominal.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la causa de la acción descrita; 'porque' expresa de manera clara y directa la relación causal.
- source_word: הֵכִין
  english_pob_choice: had not set
  chosen_spanish: había dispuesto
  alternatives_spanish:
  - había preparado
  - había establecido
  - había afirmado
  lexicon: HALOT
  rationale: El hiphil de כון puede significar preparar, establecer o poner firme. Con 'corazón' y el infinitivo de propósito, 'dispuesto' comunica la idea de orientar o fijar interiormente la voluntad, sin perder el matiz de preparación/afirmación del hebreo.
- source_word: לִבּוֹ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  lexicon: HALOT
  rationale: לֵב/לֵבָב en hebreo designa la interioridad, incluyendo voluntad e intención. 'Corazón' preserva mejor esa antropología bíblica que 'mente'.
- source_word: לִדְרוֹשׁ
  english_pob_choice: to seek
  chosen_spanish: para buscar
  alternatives_spanish:
  - para consultar
  - para inquirir de
  lexicon: HALOT
  rationale: Con Dios como objeto, דרשׁ suele significar buscarle con devoción o consulta. 'Buscar' es el equivalente español más natural y fiel en este contexto.
- source_word: אֶת יְהוָה
  english_pob_choice: the LORD / Yahweh in audit
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: HALOT
  rationale: La consigna del proyecto pide 'Yahvé' para יְהוָה en el texto principal. En español, el objeto directo personal se expresa con 'a'; se conserva así el nombre divino auditable, en vez de ocultarlo tras una sustitución litúrgica.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: Se sigue la convención del proyecto de transparentar el nombre del pacto en lugar de enmascararlo con un título. 'Yahvé' es la forma establecida para el texto principal en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre disposición interior y búsqueda de Dios
  english_pob_reading: had not set his heart to seek Yahweh
  chosen_spanish_reading: no había dispuesto su corazón para buscar a Yahvé
  alternative_spanish_readings:
  - no había preparado su corazón para buscar a Yahvé
  - no había fijado su corazón para buscar a Yahvé
  rationale: '''Dispuesto'' conserva la idea de una orientación interior deliberada sin forzar un calco mecánico. Mantiene el contraste teológico del texto: la maldad se explica por una falta de resolución dirigida hacia Dios.'
  doctrine_reference: Anthropology / heart as seat of will and intention in Hebrew usage
translation_notes:
  revision_awareness: El audit trail inglés mantiene una nota alternativa para הֵכִין ('had not prepared his heart'). La versión española preserva esa tensión con 'había dispuesto su corazón', que equilibra naturalidad y fidelidad al matiz de preparación/establecimiento interior. No se introdujeron cambios textuales respecto al sentido revisado y de alta concordancia del original.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente con el estándar del proyecto para יְהוָה.
  - '''Corazón'' se mantiene para לֵב, evitando ''mente'' para no reducir la antropología bíblica.'
  - '''Buscar'' conserva el valor devocional de דרשׁ en contextos dirigidos a Dios.'
  - La nota al pie señala la alternativa más literal 'preparado', sin duplicar el marcador.
