    text: También puede entenderse de manera más idiomática como «antes» o «como antes» para la expresión «ayer y antes de ayer».
    reason: lexical_alternative
  revision_rationale: Se corrige un calco poco natural («la impondréis sobre ellos») por una forma española más idiomática y fiel al sentido administrativo («se la impondréis»), y se reubica la nota [a] junto a la expresión temporal que comenta. No se requieren cambios sustantivos de sentido.
