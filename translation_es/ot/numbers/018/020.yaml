translation:
  language: es
  text: 'Yahvé le dijo a Aarón: «En su tierra no tendrás heredad, y no habrá porción para ti entre ellos. Yo soy tu porción y tu herencia entre los hijos de Israel[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre el pueblo de Israel» / «entre los israelitas». El hebreo dice literalmente «entre los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrama con la forma usual del proyecto en español, 'Yahvé', en lugar de sustituirlo por un título. Esto mantiene la referencia auditada al nombre de pacto revelado a Israel.
- source_word: בְּאַרְצָם
  english_pob_choice: in their land
  chosen_spanish: en su tierra
  alternatives_spanish:
  - en su país
  - en su territorio
  lexicon: HALOT
  rationale: '''Tierra'' reproduce el valor de heredad territorial del hebreo אֶרֶץ sin perder la resonancia de posesión pactal. ''Su'' mantiene el referente colectivo de Israel.'
- source_word: תִנְחָל
  english_pob_choice: you shall not inherit
  chosen_spanish: no tendrás heredad
  alternatives_spanish:
  - no heredarás
  - no recibirás herencia
  lexicon: HALOT
  rationale: En este contexto la negativa no solo expresa acto de recibir, sino la ausencia de asignación hereditaria. 'No tendrás heredad' comunica bien la prohibición y enlaza con la cláusula paralela de 'porción'.
- source_word: חֵלֶק
  english_pob_choice: portion
  chosen_spanish: porción
  alternatives_spanish:
  - parte
  - participación
  - lote
  lexicon: HALOT
  rationale: '''Porción'' conserva el enlace léxico con la autoafirmación divina posterior y suena natural en español bíblico. ''Parte'' sería más general, pero menos apto para el motivo de herencia.'
- source_word: בְּתוֹכָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su interior
  lexicon: HALOT
  rationale: La idea es relacional y distributiva dentro del pueblo, no meramente espacial. 'Entre ellos' es idiomático en español y preserva el sentido de pertenencia dentro del grupo.
- source_word: אֲנִי חֶלְקְךָ
  english_pob_choice: I am your portion
  chosen_spanish: Yo soy tu porción
  alternatives_spanish:
  - Yo soy tu parte
  - Yo soy tu heredad
  lexicon: HALOT
  rationale: Se conserva la identidad retórica y el vínculo directo con חֵלֶק. 'Tu porción' mantiene la fuerza teológica de Dios mismo como asignación suficiente para Aarón.
- source_word: וְנַחֲלָתְךָ
  english_pob_choice: your inheritance
  chosen_spanish: tu herencia
  alternatives_spanish:
  - tu posesión
  - tu patrimonio
  lexicon: HALOT
  rationale: '''Herencia'' es el equivalente natural de נַחֲלָה en español bíblico contemporáneo y mantiene la continuidad con el campo semántico de la tierra asignada por Dios.'
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - el pueblo de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva la forma formal masculina plural del hebreo, auditada por el texto fuente. En español, 'hijos de Israel' es claro, reverente y mantiene el eco genealógico-covenantal del original.
theological_decisions:
- issue: Nombre divino del Tetragrama
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo usa יְהוָה directamente, y el proyecto prioriza la transliteración del nombre propio. 'Yahvé' preserva la identidad personal del Dios del pacto y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Forma masculina colectiva בְּנֵי יִשְׂרָאֵל
  english_pob_reading: among the sons of Israel
  chosen_spanish_reading: entre los hijos de Israel
  alternative_spanish_readings:
  - entre el pueblo de Israel
  - entre los israelitas
  rationale: Se mantiene la forma masculina plural del hebreo para no aplanar la textura del original. En este contexto funciona corporativamente y es idiomática en español bíblico.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'El pasaje revisado coincide con el último pase: no se requieren cambios respecto del texto base auditado; se mantiene la equivalencia óptima con léxico heredado y el nombre divino en forma transliterada.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera uniforme para יְהוָה, conforme al estándar del proyecto.
  - '''Porción'' y ''herencia'' se mantuvieron para conservar el paralelismo léxico del hebreo.'
  - '''Hijos de Israel'' preserva la forma fuente masculina plural sin neutralización semántica.'
