translation:
  language: es
  text: 'Y Jesús les dijo[a]: «Tampoco yo les diré con qué autoridad hago estas cosas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por qué autoridad».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ὁ Ἰησοῦς εἶπεν αὐτοῖς
  english_pob_choice: And Jesus said to them
  chosen_spanish: Y Jesús les dijo
  alternatives_spanish:
  - Entonces Jesús les dijo
  - Y Jesús les habló
  lexicon: No inventar entrada; καὶ + narración directa; αὐτοῖς dativo de complemento indirecto
  rationale: Se conserva la narración simple del griego con «Y». «Les dijo» refleja con naturalidad εἶπεν αὐτοῖς sin añadir matices no presentes.
- source_word: Οὐδὲ ἐγώ
  english_pob_choice: Neither will I
  chosen_spanish: Ni yo tampoco
  alternatives_spanish:
  - Ni yo
  - Tampoco yo
  lexicon: No inventar entrada; οὐδέ + ἐγώ
  rationale: En español, «Ni yo tampoco» transmite bien la negación correlativa y el tono de respuesta negativa en diálogo. Evita una futura perifrástica que no es necesaria en español.
- source_word: λέγω
  english_pob_choice: tell
  chosen_spanish: les diré
  alternatives_spanish:
  - les digo
  - les contaré
  lexicon: No inventar entrada; λέγω con objeto indirecto e información implícita
  rationale: Aunque λέγω suele ser «decir», aquí el sentido es negar la comunicación de una respuesta concreta. «Les diré» conserva el valor de comunicación sin forzar un calco mecánico de «decir» como mera cita.
- source_word: ἐν ποίᾳ ἐξουσίᾳ
  english_pob_choice: by what authority
  chosen_spanish: con qué autoridad
  alternatives_spanish:
  - por qué autoridad
  - en qué autoridad
  lexicon: No inventar entrada; ἐν + ποίᾳ + ἐξουσίᾳ
  rationale: La expresión idiomática española más natural es «con qué autoridad». «Con» puede expresar el respaldo o base de la acción, manteniendo la pregunta por el fundamento autorizado.
- source_word: ἐξουσίᾳ
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - derecho
  - poder
  lexicon: No inventar entrada; ἐξουσία
  rationale: «Autoridad» es el equivalente más preciso y estable para ἐξουσία aquí, donde se trata de legitimidad o derecho para actuar, no de mera fuerza.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas acciones
  lexicon: No inventar entrada; οὗτος plural neutro
  rationale: Se conserva el plural visible del griego con «estas cosas», como en la POB inglesa, sin precisar más de lo que el texto dice.
- source_word: ποιῶ
  english_pob_choice: I do
  chosen_spanish: hago
  alternatives_spanish:
  - estoy haciendo
  - practico
  lexicon: No inventar entrada; ποιέω
  rationale: «Hago» expresa el presente simple del verbo de manera natural en español y mantiene la referencia a las acciones discutidas.
theological_decisions:
- issue: Negativa de Jesús a revelar el fundamento de su autoridad
  english_pob_reading: Render as a direct refusal to disclose the source of his authority without adding interpretive explanation.
  chosen_spanish_reading: 'Presentar una negativa directa: Jesús no les dirá con qué autoridad actúa.'
  alternative_spanish_readings:
  - Jesús evade la pregunta
  - Jesús reprende explícitamente su incredulidad
  rationale: El verso solo afirma la negativa de Jesús a responder; no especifica evasión ni reprensión explícita. La redacción española preserva esa tensión narrativa sin resolverla.
  doctrine_reference: Preservar la tensión teológica y narrativa sin añadir inferencias no expresadas.
translation_notes:
  revision_awareness: Sin cambios aplicados respecto del último paso de revisión; el texto sigue el acuerdo alto del control cruzado y conserva la lectura auditada del inglés POB, ajustada a español natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el original lo exige; aquí no aparece.
  - Se mantiene «autoridad» para ἐξουσία por precisión contextual.
  - Se evita una traducción demasiado literal de οὐδέ que suene forzada en español, pero se conserva la negación correlativa.
  - La nota al pie se ancla en «con qué autoridad» porque esa es la alternativa lexical documentada en el POB inglés.
