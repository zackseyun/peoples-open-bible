review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el contenido básico de la salutación griega: destinatarios, saludo, deseo de salud/bienestar y remitente con títulos. Sin embargo, desplaza indebidamente la nota del orden epistolar al término «salud», cuando la nota corresponde a la colocación final de «Rey Antíoco y general».'
  spanish_quality_summary: 'El español es comprensible, pero «muchas salutaciones» suena algo forzado; «muchos saludos» o «muchos saludos y salud» también sería posible, aunque la repetición no es ideal. El cambio más necesario es técnico-editorial: reanclar las notas al lugar correcto. También conviene suavizar a «los buenos ciudadanos judíos», que fluye mejor que «los buenos judíos ciudadanos».'
  glossary_alignment: No hay términos teológicos sensibles en juego. «judíos», «ciudadanos», «salud» y «prosperidad» concuerdan con las decisiones del POB. «Rey Antíoco y general» preserva la construcción titular extraña del griego; la nota cultural debe anclarse allí, no en «salud».
  issues:
  - severity: medium
    issue: La nota [a] está anclada a «salud» pero explica el orden del remitente al final.
    rationale: Según el rastro de auditoría inglés, la nota cultural trata de la posición de «King Antiochus and general» después de la fórmula epistolar. Debe marcarse en el remitente, no en un sustantivo de la lista de buenos deseos.
  - severity: low
    issue: «los buenos judíos ciudadanos» suena torpe en español.
    rationale: Aunque es literalmente alineado, en español resulta más natural y claro «los buenos ciudadanos judíos», manteniendo el mismo sentido sin ampliar ni reducir el referente.
  - severity: low
    issue: La nota [b] añade «salir bien», que no es la mejor alternativa contextual.
    rationale: El inglés auditado preserva «well-being» como alternativa principal a «prosperity». En español conviene centrar la alternativa en «bienestar» o «que les vaya bien», evitando una opción menos idiomática en este saludo.
  revised_spanish_text: 'A los buenos ciudadanos judíos: muchas salutaciones, salud y prosperidad[b]. Rey Antíoco y general[a].'
  revised_footnotes:
  - marker: a
    text: El griego pone el nombre y los títulos del remitente después de la fórmula de saludo. Se ha mantenido ese orden marcado en español; por eso la identificación aparece al final.
    reason: cultural_note
  - marker: b
    text: «Prosperidad» traduce εὖ πράττειν en el sentido de «ir bien». También podría entenderse como «bienestar».
    reason: lexical_alternative
  revision_rationale: La revisión corrige el anclaje de la nota cultural para que corresponda al remitente final, mejora ligeramente la fluidez del sintagma destinatario en español y simplifica la nota léxica de «prosperidad» para ajustarla mejor al expediente inglés y al uso idiomático.
