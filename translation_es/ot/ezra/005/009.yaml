translation:
  language: es
  text: 'Entonces preguntamos a aquellos ancianos y les dijimos como sigue: «¿Quién les dio un decreto para construir esta casa y terminar esta estructura?»[a][b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta casa y esta estructura», conservando la redacción más literal; «casa» se refiere al templo.
    reason: lexical_alternative
  - marker: b
    text: El término arameo traducido como «estructura» puede referirse más específicamente a la fábrica del edificio, al armazón o a la obra asociada a la construcción.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - At that time
  lexicon: HALOT
  rationale: Marca la secuencia narrativa en español con una conjunción/adverbio natural y formal.
- source_word: שְׁאֵלְנָא
  english_pob_choice: we asked
  chosen_spanish: preguntamos
  alternatives_spanish:
  - inquirimos
  - cuestionamos
  lexicon: HALOT
  rationale: Expresa la acción de solicitar información de manera directa y idiomática en español actual.
- source_word: לְשָׂבַיָּא אִלֵּךְ
  english_pob_choice: those elders
  chosen_spanish: esos ancianos
  alternatives_spanish:
  - aquellos ancianos
  - esos líderes
  lexicon: HALOT
  rationale: La referencia apunta a los líderes de edad/estatus; 'ancianos' conserva el matiz de cargo y respeto. Se usa 'esos' para reproducir el valor deíctico del arameo en un reporte externo.
- source_word: כְּנֵמָא
  english_pob_choice: as follows
  chosen_spanish: así
  alternatives_spanish:
  - de la siguiente manera
  - como sigue
  lexicon: HALOT
  rationale: Introduce la cita directa de forma natural; 'así' mantiene brevedad sin añadir peso interpretativo.
- source_word: אֲמַרְנָא לְּהֹם
  english_pob_choice: said to them
  chosen_spanish: les dijimos
  alternatives_spanish:
  - les hablamos
  - les dijimos a ellos
  lexicon: HALOT
  rationale: En español, el dativo 'les' basta para el objeto indirecto; evita una literalidad pesada y mantiene el tono reportativo.
- source_word: מַן שָׂם לְכֹם טְעֵם
  english_pob_choice: Who gave you a decree
  chosen_spanish: ¿Quién les dio un decreto
  alternatives_spanish:
  - ¿Quién les dio una orden?
  - ¿Quién les autorizó?
  lexicon: HALOT
  rationale: '''Decreto'' conserva el sentido administrativo/oficial de טְעֵם en contexto imperial, sin reducirlo a una mera orden privada. Se mantiene la pregunta por la autorización.'
- source_word: בַּיְתָא דְנָה
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este templo
  - esta morada
  lexicon: HALOT
  rationale: La fuente dice literalmente 'casa'; se preserva esa forma en el texto principal. En contexto, alude al templo, pero no se sustituye en el cuerpo del texto.
- source_word: לְמִבְנְיָה
  english_pob_choice: to build
  chosen_spanish: para construir
  alternatives_spanish:
  - para edificar
  - para reedificar
  lexicon: HALOT
  rationale: '''Construir'' es un equivalente claro y contemporáneo para el infinitivo arameo; el contexto de reconstrucción está implícito, pero no se añade en la frase principal.'
- source_word: וְאֻשַּׁרְנָא דְנָה
  english_pob_choice: this structure
  chosen_spanish: esta estructura
  alternatives_spanish:
  - este edificio
  - este armazón
  - esta obra
  lexicon: HALOT
  rationale: '''Estructura'' conserva la amplitud semántica del término arameo y el registro técnico del pasaje, permitiendo abarcar la forma construida sin precisar más de lo que dice el texto.'
- source_word: לְשַׁכְלָלָה
  english_pob_choice: to finish
  chosen_spanish: terminar
  alternatives_spanish:
  - acabar
  - completar
  lexicon: HALOT
  rationale: El verbo apunta a llevar la obra a su conclusión; 'terminar' refleja bien el valor directo del texto y la revisión inglesa más reciente, manteniendo un registro formal.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió el verbo final de “complete” a “finish”; por eso el español adopta «terminar» para reflejar con mayor inmediatez el cierre de la obra, sin perder el tono formal. Se conservó la distinción entre «casa» y «estructura» y la nota aclaratoria sobre el posible sentido más literal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece en el texto base.
  - Se preservó «casa» en el cuerpo principal para respetar el hebreo/aramaico literal y se aclaró su referencia al templo en nota.
  - Se tradujo טְעֵם como «decreto» por el contexto administrativo persa, coherente con el inglés POB.
  - Se evitó «reconstruir» porque el arameo del versículo dice simplemente «construir»; la idea de reconstrucción está en el contexto, no en la forma verbal aquí.
