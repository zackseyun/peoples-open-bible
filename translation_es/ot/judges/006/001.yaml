translation:
  language: es
  text: Y los hijos de Israel hicieron lo malo[a] ante los ojos de Yahvé[b], y Yahvé los entregó en la mano de Madián[c] por siete años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «lo que era malo».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «a la vista de Yahvé».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «en la mano de Madián», un hebraísmo que indica estar bajo su poder o dominio.'
    reason: cultural_note
lexical_decisions:
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Conserva la forma masculina plural explícita del hebreo sin neutralizarla, y sigue el valor idiomático recurrente de la fórmula en Jueces. 'Los israelitas' sería más fluido, pero perdería la correspondencia formal que el audit trail preserva.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  lexicon: HALOT
  rationale: Con עשה, la expresión hebrea significa hacer lo malo / lo que es malo. En español, 'lo malo' transmite bien el valor moral sin volver la frase pesada ni excesivamente abstracta.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - a la vista de Yahvé
  lexicon: HALOT
  rationale: Mantiene el modismo evaluativo hebreo con una equivalencia natural en español. 'Ante los ojos de Yahvé' conserva la imagen de evaluación moral sin depender de una sustitución por título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton, conforme a la política del proyecto. 'Yahvé' es la forma establecida en español del audit trail.
- source_word: וַיִּתְּנֵם
  english_pob_choice: gave them
  chosen_spanish: los entregó
  alternatives_spanish:
  - los dio
  - los puso
  lexicon: HALOT
  rationale: El verbo נתן con 'en mano de' funciona como un hebraísmo de entrega a dominio ajeno. 'Los entregó' comunica mejor esa fuerza causal que un simple 'los dio'.
- source_word: בְּיַד מִדְיָן
  english_pob_choice: into the hand of Midian
  chosen_spanish: en mano de Madián
  alternatives_spanish:
  - en la mano de Madián
  - bajo el poder de Madián
  lexicon: HALOT
  rationale: Se preserva el hebraísmo 'mano' para mantener la imagen de poder/control documentada en el contexto inglés. 'Madián' sigue la transliteración española usual del nombre propio.
- source_word: שֶׁבַע שָׁנִים
  english_pob_choice: for seven years
  chosen_spanish: por siete años
  alternatives_spanish:
  - durante siete años
  - siete años
  lexicon: HALOT
  rationale: '''Por siete años'' expresa duración de manera natural en español y corresponde a la frase temporal hebrea sin añadir contenido interpretativo.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Nombre; por eso se traduce con el nombre propio y no con una sustitución litúrgica. Esto preserva la distinción entre el Nombre y un título reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahweh'
- issue: Fuerza idiomática de בְּיַד מִדְיָן
  english_pob_reading: into the hand of Midian
  chosen_spanish_reading: en mano de Madián
  alternative_spanish_readings:
  - bajo el poder de Madián
  - en la mano de Madián
  rationale: Se conserva el hebraísmo para no borrar la imagen de sometimiento/poder que el original comunica. La formulación española mantiene la tensión entre literalidad e idiomatismo sin explicitar en el texto una paráfrasis más interpretativa.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3 (source-shaped imagery preserved)'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el último pase revisado y no introduce cambios sustantivos respecto del audit trail inglés; solo adapta la sintaxis para una publicación natural en español y conserva las decisiones nucleares: Nombre divino como Yahvé, forma masculina plural de Israel y el hebraísmo de ''mano'' para Madián.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente para יְהוָה.
  - '''Hijos de Israel'' preserva la forma masculina plural del hebreo, en línea con la política del proyecto.'
  - '''En mano de Madián'' mantiene el hebraísmo y evita reemplazarlo por una explicación en el cuerpo del texto.'
  - La puntuación y mayúsculas siguen normas estándar del español bíblico moderno.
