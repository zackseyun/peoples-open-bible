translation:
  language: es
  text: 'Entonces les dirás: «Esta es la nación que no ha escuchado la voz de Yahvé, su Dios, y no ha aceptado corrección. La fidelidad[a] ha perecido; ha sido cortada de su boca».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «La verdad ha perecido». El hebreo אֱמוּנָה puede significar «fidelidad», «fiabilidad» o «verdad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  english_pob_choice: Then you shall say
  chosen_spanish: Entonces dirás
  alternatives_spanish:
  - Y dirás
  - Luego dirás
  lexicon: WLC/HALOT
  rationale: El waw consecutivo en el discurso profético marca continuidad narrativa. «Entonces» comunica bien esa secuencia en español sin perder el tono imperativo profético.
- source_word: זֶה הַגּוֹי
  english_pob_choice: This is the nation
  chosen_spanish: Esta es la nación
  alternatives_spanish:
  - Este es el pueblo
  - Esta nación
  lexicon: WLC/HALOT
  rationale: גוֹי aquí funciona como colectivo singular y en el contexto de denuncia profética se ajusta mejor «nación». Mantengo la construcción demostrativa para reflejar el hebreo.
- source_word: לֹא שָׁמְעוּ בְּקוֹל
  english_pob_choice: has not listened to the voice
  chosen_spanish: no ha escuchado la voz
  alternatives_spanish:
  - no ha obedecido la voz
  - no ha oído la voz
  lexicon: WLC/HALOT
  rationale: שׁמע con בְּקוֹל puede implicar escuchar con obediencia. «Escuchado la voz» preserva el matiz auditivo y deja que el contexto exprese la desobediencia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: WLC/HALOT
  rationale: Siguiendo la convención del proyecto para el Tetragrámaton, se usa «Yahvé» como nombre divino propio y transparente.
- source_word: אֱלֹהָיו
  english_pob_choice: its God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios (de ella)
  - su Dios (de ellos)
  lexicon: WLC/HALOT
  rationale: El sufijo es singular masculino, concordando con el sustantivo colectivo singular. En español, «su Dios» reproduce naturalmente esa referencia sin forzar un posesivo inusual.
- source_word: לֹא לָקְחוּ מוּסָר
  english_pob_choice: has not accepted correction
  chosen_spanish: no ha aceptado corrección
  alternatives_spanish:
  - no ha recibido disciplina
  - no ha tomado instrucción
  lexicon: WLC/HALOT
  rationale: מוּסָר abarca corrección, disciplina e instrucción. «Corrección» encaja bien en la reprensión profética y es claro en español contemporáneo.
- source_word: אָבְדָה הָאֱמוּנָה
  english_pob_choice: Faithfulness has perished
  chosen_spanish: La fidelidad ha perecido
  alternatives_spanish:
  - La verdad ha perecido
  - La lealtad ha perecido
  lexicon: HALOT
  rationale: אֱמוּנָה puede significar fidelidad, fiabilidad o verdad. En este contexto de denuncia del pacto, «fidelidad» conserva mejor el peso relacional y moral.
- source_word: וְנִכְרְתָה מִפִּי־הֶם
  english_pob_choice: it is cut off from their mouth
  chosen_spanish: ha sido cortada de su boca
  alternatives_spanish:
  - se ha cortado de su boca
  - ha sido arrancada de su boca
  lexicon: WLC/HALOT
  rationale: נכרתָה conserva la metáfora de ser cortada. «De su boca» sigue el hebreo de forma precisa; «ha sido cortada» mantiene el pasivo sin añadir interpretación.
theological_decisions:
- issue: Valor de אֱמוּנָה en un oráculo de reprensión del pacto
  english_pob_reading: Faithfulness has perished
  chosen_spanish_reading: La fidelidad ha perecido
  alternative_spanish_readings:
  - La verdad ha perecido
  - La fiabilidad ha perecido
  rationale: El contexto acusa la respuesta infiel del pueblo a Yahvé; por eso «fidelidad» conserva el sentido ético-relacional. Se mantiene abierta la alternativa «verdad», que también es léxicamente posible, pero no se toma como principal.
  doctrine_reference: Translation philosophy §3, §5
- issue: Forma de nombrar el Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política del proyecto exige una representación transparente del nombre divino. «Yahvé» evita la sustitución por un título y mantiene la identificación del nombre propio revelado.
  doctrine_reference: Project terminology defaults
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó el aspecto verbal a presente perfecto y mantuvo «is cut off» como imagen verbal más cercana al hebreo. La versión española refleja ese mismo ajuste con «no ha escuchado», «no ha aceptado» y «ha sido cortada».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - Se usa «fidelidad» como término principal para אֱמוּנָה, reservando la alternativa «verdad» en nota.
  - El posesivo singular «su» sigue la concordancia hebrea con גּוֹי como colectivo singular.
  - La metáfora de ser «cortada» se conserva para representar el verbo נכרת sin suavizarlo.
