translation:
  language: es
  text: Ahora la palabra de Yahvé vino a Jonás hijo de Amitai[a], diciendo[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Y aconteció: la palabra de Yahvé vino ...». La apertura es una fórmula narrativa estándar.'
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, muchas versiones sustituyen el nombre divino יְהוָה por «el SEÑOR»; aquí se traduce como «Yahvé» según la convención del proyecto.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now ... came
  chosen_spanish: Ahora ... vino
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea funciona como introducción de escena. En español, «Ahora» conserva esa función discursiva sin sonar forzado, y «vino» reproduce de manera natural el movimiento del mensaje hacia el profeta.
- source_word: דְּבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra
  lexicon: HALOT
  rationale: Se mantiene el sustantivo concreto y profético «palabra», que conserva la resonancia intertextual de la fórmula «la palabra de Yahvé» mejor que una paráfrasis como «mensaje».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el nombre divino YHWH, usando «Yahvé» y no una sustitución por título como «SEÑOR».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición indica dirección hacia el destinatario de la revelación; en español, «a» es la equivalencia más natural y precisa.
- source_word: יוֹנָה
  english_pob_choice: Jonah
  chosen_spanish: Jonás
  alternatives_spanish:
  - Jonah
  lexicon: HALOT
  rationale: Se usa la forma castellana habitual del nombre propio, conservando identificación clara para lectura eclesial.
- source_word: בֶן אֲמִתַּי
  english_pob_choice: son of Amittai
  chosen_spanish: hijo de Amitai
  alternatives_spanish:
  - hijo de Amittay
  lexicon: HALOT
  rationale: El patronímico se vierte de forma directa y transparente. Se mantiene «Amitai» como transliteración sobria y reconocible del nombre hebreo.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - 'y dijo:'
  - 'con estas palabras:'
  lexicon: HALOT
  rationale: El infinitivo introduce el discurso divino que sigue; «diciendo» preserva la relación sintáctica sin añadir contenido interpretativo.
theological_decisions:
- issue: Nombre divino YHWH en la fórmula profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: La lectura del texto base es el nombre propio divino, no un título. En español, «Yahvé» comunica esa decisión teológica y traductológica, conservando la referencia al nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de la fórmula narrativa וַיְהִי
  english_pob_reading: Now
  chosen_spanish_reading: Ahora
  alternative_spanish_readings:
  - Y aconteció
  - Y sucedió
  rationale: No se pierde el valor de apertura narrativa. «Ahora» funciona como marcador de entrada al relato, evitando una literalidad dura que empobrezca el español.
  doctrine_reference: HALOT / narrativa hebrea introductoria
translation_notes:
  revision_awareness: Se tomó como base el texto hebreo WLC y el audit trail inglés, que identifica la fórmula narrativa וַיְהִי como introducción estándar y el Tetragrama יְהוָה como nombre divino transliterado. No hubo revisiones posteriores que afectaran el sentido; la concordancia de auditoría es alta y el pasaje quedó estable.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió «palabra» sobre «mensaje» para conservar el eco profético bíblico.
  - Se usó «Jonás» como forma española del nombre propio y «Amitai» como transliteración simple del patronímico.
  - La coma antes de «diciendo» reproduce la función de introducción del discurso sin añadir una pausa interpretativa excesiva.
