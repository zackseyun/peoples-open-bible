    text: Or 'partnered with him' or 'joined him.' The Hebrew verb denotes entering into association or alliance.
    reason: lexical_alternative
  - marker: b
    text: Or 'to sail to Tarshish.' Some interpreters understand Tarshish-language in shipping contexts more idiomatically, but here the Hebrew most naturally expresses destination.
    reason: lexical_alternative
