translation:
  language: es
  text: Pero el jefe de los coperos no se acordó de José[a], sino que se olvidó de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «No se acordó de José, sino que se olvidó de él» también refleja con más literalidad la repetición hebrea de la negación y del verbo de olvido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לֹא
  english_pob_choice: But ... not
  chosen_spanish: Pero ... no
  alternatives_spanish:
  - Y ... no
  - Sin embargo ... no
  lexicon: HALOT
  rationale: La secuencia con negación enlaza este versículo con el anterior y a la vez marca contraste. «Pero» comunica mejor ese giro discursivo en español que un simple «y».
- source_word: זָכַר
  english_pob_choice: remember
  chosen_spanish: se acordó de
  alternatives_spanish:
  - recordó
  - lo tuvo presente
  lexicon: HALOT
  rationale: En este contexto, el verbo expresa no mantener a José presente ni actuar a favor de él. «Se acordó de» es natural en español y conserva el sentido básico de recordar sin añadir más interpretación de la necesaria.
- source_word: שַׂר הַמַּשְׁקִים
  english_pob_choice: the chief cupbearer
  chosen_spanish: el jefe de los coperos
  alternatives_spanish:
  - el jefe de los coperos
  - el copero principal
  lexicon: HALOT
  rationale: El título es un cargo cortesano. «Jefe de los coperos» mantiene la relación semántica de autoridad y servicio de bebida, con una formulación clara y natural en español.
- source_word: אֶת יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José,
  - a José
  lexicon: N/A
  rationale: El marcador de objeto directo no se refleja en español. Se conserva el nombre propio según la política del proyecto.
- source_word: וַ/יִּשְׁכָּחֵֽ/הוּ
  english_pob_choice: he forgot him
  chosen_spanish: se olvidó de él
  alternatives_spanish:
  - lo olvidó
  - y lo olvidó
  lexicon: HALOT
  rationale: El verbo significa «olvidar»; el pronombre enclítico apunta a José. «Se olvidó de él» es idiomático en español y preserva el acto de olvido como un segundo miembro paralelo al primero.
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del contexto inglés: el versículo mantiene la doble negación narrativa («no se acordó... sino que se olvidó...»), y se evita suavizar el énfasis del hebreo. Se optó por una fórmula española fluida que conserva la repetición semántica.'
  spanish_consistency_notes:
  - Se usa «José» conforme al nombre bíblico habitual en español.
  - Se mantiene «el jefe de los coperos» para reflejar el cargo cortesano sin convertirlo en una paráfrasis interpretativa.
  - La coordinación adversativa «pero... sino que...» conserva el contraste y la progresión del hebreo con waw consecutivo.
