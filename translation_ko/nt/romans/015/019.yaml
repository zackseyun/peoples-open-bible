id: ROM.15.19
reference: Romans 15:19
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐν δυνάμει σημείων καὶ τεράτων, ἐν δυνάμει ⸀πνεύματος· ὥστε με ἀπὸ Ἰερουσαλὴμ καὶ κύκλῳ μέχρι τοῦ Ἰλλυρικοῦ πεπληρωκέναι τὸ εὐαγγέλιον τοῦ Χριστοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/romans/015/019.yaml
  text: by the power of signs and wonders, by the power of the Spirit, so that from Jerusalem and all around as far as Illyricum I have fully proclaimed the gospel of the Messiah,
translation:
  language: ko
  text: 곧 표적과 기사의 능력으로, 영의 능력[a]으로 이루신 일들입니다. 그래서 나는 예루살렘에서부터 두루 일루리곤까지 메시아의 복음을 충분히 전하였습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 어떤 사본은 「하나님의 영」 또는 「성령」이라 읽는다. SBLGNT 본문은 단순히 「영」이다.
    reason: textual_variant
lexical_decisions:
- source_word: σημείων καὶ τεράτων
  english_pob_choice: signs and wonders
  chosen_korean: 표적과 기사
  lexicon: BDAG
  rationale: 한국 성경 정형 쌍.
- source_word: ἐν δυνάμει πνεύματος
  english_pob_choice: by the power of the Spirit
  chosen_korean: 영의 능력
  alternatives_korean:
  - 성령의 능력
  lexicon: BDAG
  rationale: '정책 글로사리: πνεῦμα가 신적 영임이 문맥상 분명한 경우에만 「성령」으로. SBLGNT가 단순히 πνεύματος로 두므로 「영」으로 보존하되 신적 함의는 문맥이 공급.'
- source_word: Ἰερουσαλὴμ
  english_pob_choice: Jerusalem
  chosen_korean: 예루살렘
  lexicon: BDAG
  rationale: 정형 음역.
- source_word: τοῦ Ἰλλυρικοῦ
  english_pob_choice: Illyricum
  chosen_korean: 일루리곤
  alternatives_korean:
  - 일리리쿰
  lexicon: BDAG
  rationale: 한국 성경 정형 「일루리곤」.
- source_word: πεπληρωκέναι τὸ εὐαγγέλιον
  english_pob_choice: have fully proclaimed the gospel
  chosen_korean: 복음을 충분히 전하다
  alternatives_korean:
  - 복음을 가득 채우다
  lexicon: BDAG
  rationale: 「복음을 채워 완수하다」의 함의를 「충분히 전하다」로.
