review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: causativo de שוב, singular de «el hombre» como objetivo específico, y cierre con «todo el pueblo ... en paz». Sin embargo, la cláusula difícil del medio queda algo forzada en español con «como cuando todos vuelvan», y el inicio «y yo haré volver» suena innecesariamente enfático y menos natural en contexto narrativo.'
  spanish_quality_summary: El español es comprensible, pero puede mejorarse en naturalidad y fluidez eclesial. «Haré volver ... a ti» es correcto, aunque «haré que ... vuelva contigo»/«te devolveré» serían posibilidades; para conservar cercanía formal, basta ajustar el orden y la cláusula media. También conviene evitar el anclaje de nota en «volver», porque la dificultad recae en la cláusula central, no en el verbo inicial.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Pueblo», «hombre» y «en paz» están alineados con las decisiones léxicas documentadas. No aparecen términos teológicos especiales del glosario maestro.
  issues:
  - severity: medium
    issue: La cláusula «como cuando todos vuelvan» suena poco natural y ambigua en español.
    rationale: Aunque refleja el intento del inglés de resolver un hebreo difícil, en español esa secuencia queda sintácticamente extraña y no comunica bien la idea implícita de que, al quitar al hombre buscado, los demás regresarán.
  - severity: low
    issue: La nota al pie está anclada en «volver» en vez de la cláusula difícil del medio.
    rationale: La dificultad textual explicada por la nota corresponde a «como el retorno de todo, el hombre que tú buscas», no específicamente al verbo inicial «haré volver».
  - severity: low
    issue: «y yo haré volver» suena algo pesado para narrativa española.
    rationale: El pronombre explícito «yo» no es necesario aquí; el hebreo puede marcar énfasis verbal sin exigirlo en español. Quitar «yo» mejora la fluidez sin perder sentido.
  revised_spanish_text: y haré volver a todo el pueblo a ti;[a] cuando todos vuelvan, el hombre que tú buscas habrá desaparecido, y todo el pueblo estará en paz.
  revised_footnotes:
