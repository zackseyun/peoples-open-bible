translation:
  language: es
  text: Pero si, a pesar de esto[a], no me escuchan, y andan de manera contraria a mí[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a pesar de esto» o «por todo esto».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «andar conmigo en contrariedad/oposición»; la frase es un modismo que expresa actuar con hostilidad hacia Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La secuencia introduce un nuevo peldaño en la advertencia del pacto; «pero» conserva el matiz adversativo del avance respecto del contexto anterior, y «si» mantiene la condición sin volver la frase pesada.
- source_word: בְּזֹאת
  english_pob_choice: in spite of this
  chosen_spanish: a pesar de esto
  alternatives_spanish:
  - en esto
  - con esto
  - por esto
  lexicon: HALOT
  rationale: En contexto, la expresión mira hacia las acciones disciplinarias previas y tiene fuerza concesiva. «A pesar de esto» comunica esa idea de manera natural en español sin perder el referente de la disciplina ya mencionada.
- source_word: לֹא תִשְׁמְעוּ לִי
  english_pob_choice: you will not listen to me
  chosen_spanish: no me escuchan
  alternatives_spanish:
  - no me obedecen
  - no me oyen
  - no escucharán mi voz
  lexicon: HALOT
  rationale: שמַע con ל expresa oír con respuesta obediente. «Escuchar» preserva la metáfora auditiva y, en el contexto del pacto, implica desatender la voz de Yahvé sin reemplazarla por un verbo más interpretativo.
- source_word: וַהֲלַכְתֶּם
  english_pob_choice: and you walk
  chosen_spanish: y andan
  alternatives_spanish:
  - y caminan
  - y siguen andando
  - y proceden
  lexicon: HALOT
  rationale: Aunque el hebreo usa el verbo «caminar/andar» en sentido idiomático de conducta, en español «andar» permite conservar la imagen de conducta continua con un registro bíblico claro y natural.
- source_word: עִמִּי
  english_pob_choice: to me
  chosen_spanish: conmigo
  alternatives_spanish:
  - a mi lado
  - contra mí
  lexicon: HALOT
  rationale: La preposición es literalmente «con», pero la idiomática del pasaje no es compañerismo sino relación marcada por oposición; por eso se une con el elemento siguiente en una traducción relacional más fiel al conjunto.
- source_word: בְּקֶרִי
  english_pob_choice: contrary
  chosen_spanish: en oposición
  alternatives_spanish:
  - con obstinación
  - de forma contraria
  - con hostilidad
  lexicon: HALOT
  rationale: «Contrario» es una opción establecida, pero en español puede sonar abstracta o ambigua. «En oposición» mantiene la fuerza relacional y hostil del término sin diluir el carácter del idioma del pacto.
theological_decisions:
- issue: 'Idiomático del pacto: caminar «conmigo» en קֶרִי'
  english_pob_reading: Retain the relational idiom 'walk contrary to me' rather than flattening it to simple disobedience.
  chosen_spanish_reading: Conservar el giro relacional «andan en oposición conmigo» en vez de reducirlo a una mera desobediencia.
  alternative_spanish_readings:
  - me desobedecen
  - actúan hostilmente contra mí
  - siguen desafiándome
  rationale: El versículo no describe solo incumplimiento, sino una postura de oposición dentro de la relación pactal. Mantener la imagen de «andar» y la idea de «oposición» preserva esa tensión teológica sin resolverla ni suavizarla.
  doctrine_reference: 'Filosofía de traducción: preservar la tensión teológica; mantener el idioma del pacto y la progresión de juicio.'
translation_notes:
  revision_awareness: Se siguió el pasaje fuente hebreo con apoyo del POB inglés; no hay revisiones aplicadas en el expediente más reciente, y la formulación española conserva la progresión condicional, la fuerza concesiva de בְּזֹאת y el modismo de oposición del pacto.
  spanish_consistency_notes:
  - Se usa «escuchar» para preservar el valor responsivo de שׁמע sin convertirlo en una paráfrasis doctrinal.
  - Se evita «Señor» como sustituto de Yahvé porque este versículo no contiene el nombre divino y el expediente base usa la referencia directa a Dios en primera persona.
  - «En oposición conmigo» mantiene el carácter relacional del hebreo y evita una lectura meramente moralizada de la cláusula.
  - La puntuación conserva el encadenamiento condicional del hebreo con una cadencia natural en español.
