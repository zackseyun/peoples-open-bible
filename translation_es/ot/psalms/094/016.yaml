revisions:
- from: ¿Quién se levantará por mí[a] contra los malhechores? ¿Quién se pondrá en pie por mí[b] contra los que practican iniquidad?[c]
  to: ¿Quién se levantará por mí contra los malhechores?[a] ¿Quién se pondrá en pie por mí contra los que obran iniquidad?[b]
  rationale: La revisión conserva el sentido del borrador pero alinea mejor las notas con el audit trail inglés, elimina una nota innecesaria sobre «por mí» y refuerza levemente la correspondencia idiomática de פֹּעֲלֵי אָוֶן con «los que obran iniquidad».
