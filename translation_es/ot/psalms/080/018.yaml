    text: 'O: «el hombre a tu derecha». El modismo hebreo puede denotar a alguien especialmente favorecido, sostenido o colocado junto a la diestra de Dios.'
    reason: lexical_alternative
  - marker: b
    text: «Hijo del hombre» puede significar simplemente «ser humano», aunque en contexto bíblico también puede llevar resonancia real o mesiánica.
    reason: alternative_reading
  revision_rationale: Se ajusta el español para reflejar mejor los idiomatismos hebreos y la decisión auditada en inglés sin perder ambigüedad teológica. 'Tu derecha' es más natural y fiel que 'tu mano derecha' en esta construcción, y 'hijo del hombre' es la forma bíblica e inteligible en español para בֶּן אָדָם.
