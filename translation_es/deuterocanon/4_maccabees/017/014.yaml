revisions:
- from: El tirano seguía combatiendo[a], pero el mundo y la vida de la humanidad observaban.
  to: El tirano seguía luchando[a], pero el mundo y la vida de la humanidad observaban.
  rationale: 'Se reemplaza «combatiendo» por «luchando» para reflejar mejor el verbo griego en uso absoluto y en imperfecto, sin sugerir un objeto ni una escena demasiado militar. Se corrige la nota para alinearla con la revisión inglesa final: el griego no expresa objeto, por lo que conviene describir el matiz léxico sin insinuar una expansión contextual como parte de la traducción.'
