translation:
  language: es
  text: Porque si las pasiones hubieran dominado a la razón[a], yo les habría dado testimonio contra mi autodominio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si las pasiones hubieran prevalecido sobre la razón».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «les habría rendido la prueba» o «el testimonio» contra mi autodominio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάθη
  english_pob_choice: the passions
  chosen_spanish: las pasiones
  alternatives_spanish:
  - los impulsos pasionales
  - los deseos
  - las emociones desordenadas
  lexicon: LSJ
  rationale: En este contexto moral-filosófico, πάθη no significa sufrimientos externos, sino pasiones o impulsos afectivos. «Las pasiones» conserva el sentido técnico y la contraposición con la razón.
- source_word: λογισμοῦ
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el juicio racional
  - la mente
  - el razonamiento
  lexicon: LSJ
  rationale: El contraste del griego es entre πάθη y λογισμός, entendido como facultad racional. «La razón» es natural en español y mantiene esa oposición central.
- source_word: κεκράτηκει
  english_pob_choice: had gained mastery over
  chosen_spanish: hubieran dominado
  alternatives_spanish:
  - hubieran prevalecido sobre
  - hubieran vencido a
  - hubieran tenido dominio sobre
  lexicon: LSJ
  rationale: El verbo κράτεω expresa dominio o prevalencia. «Hubieran dominado» comunica la idea de control efectivo y conserva el valor de la forma pluperfecta en la hipótesis.
- source_word: ἀπεδόμην
  english_pob_choice: I would have given
  chosen_spanish: yo les habría dado
  alternatives_spanish:
  - yo les habría rendido
  - yo les habría ofrecido
  - yo les habría asigando
  lexicon: LSJ
  rationale: Aquí el verbo significa dar, rendir o asignar. «Les habría dado» es idiomático en español y mantiene la noción de ofrecer o atribuir un testimonio.
- source_word: ἐπικρατίας
  english_pob_choice: my self-control
  chosen_spanish: mi autodominio
  alternatives_spanish:
  - mi dominio propio
  - mi autocontrol
  - mi dominio de mí mismo
  lexicon: LSJ
  rationale: ἐπικράτεια en discurso ético apunta a autodominio o autocontrol. «Autodominio» expresa bien la idea de dominio sobre uno mismo sin perder la fuerza moral del término.
- source_word: μαρτυρίαν
  english_pob_choice: the testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - evidencia
  - prueba
  - testimonio
  lexicon: LSJ
  rationale: 'μαρτυρία conserva un matiz forense de testimonio o evidencia. «Testimonio» reproduce ese valor y funciona bien con «dar». '
theological_decisions:
- issue: Relación razón-pasiones en un texto filosófico-moral deuterocanónico
  english_pob_reading: Retain the moral-philosophical contrast as stated, without importing later doctrinal categories such as 'sinful nature.'
  chosen_spanish_reading: Conservar el contraste moral-filosófico entre razón y pasiones, sin introducir categorías ajenas como «naturaleza pecaminosa».
  alternative_spanish_readings:
  - si mis deseos hubieran vencido a mi buen juicio
  - si mis impulsos hubieran prevalecido sobre mi mente
  rationale: El pasaje argumenta a favor del dominio de la razón sobre las pasiones. La traducción mantiene las categorías explícitas del griego y no resuelve la tensión con un lenguaje doctrinal posterior.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: El texto inglés revisado eliminó un «to» innecesario y afinó «given them testimony to my self-control». En español se optó por una formulación natural, manteniendo el valor de «dar testimonio» y el matiz de autodominio del griego.
  spanish_consistency_notes:
  - Se usa «razón» para λογισμός, en línea con la decisión auditada en inglés.
  - Se mantiene «pasiones» para πάθη por su sentido ético técnico.
  - «Autodominio» conserva el eje temático de ἐπικράτεια sin sustituirlo por terminología eclesiástica posterior.
  - La construcción condicional y condicional compuesta refleja la hipótesis contrafactual del griego.
