translation:
  language: es
  text: Y daré toda la riqueza de esta ciudad, todo su producto[a], todas sus cosas preciosas y todos los tesoros de los reyes de Judá en manos de sus enemigos. Ellos las saquearán, las tomarán y las llevarán a Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «todo su trabajo» o «todo lo que ha producido», porque el término hebreo admite tanto el esfuerzo como el fruto de ese esfuerzo.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֹסֶן
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - bienes
  - caudal
  - fortuna
  lexicon: HALOT
  rationale: En este contexto, la lista reúne bienes confiscables y saqueables; por eso conviene un término material y concreto. «Riqueza» comunica bien el sentido económico sin forzar una lectura abstracta de «fuerza».
- source_word: יְגִיעָהּ
  english_pob_choice: produce
  chosen_spanish: producto
  alternatives_spanish:
  - trabajo
  - labor
  - ganancias
  lexicon: HALOT
  rationale: El sustantivo puede referirse al esfuerzo o a lo que ese esfuerzo produce. Como el pasaje enumera lo que será entregado al saqueo, «producto» refleja mejor el resultado acumulado del trabajo de la ciudad.
- source_word: יְקָרָהּ
  english_pob_choice: its precious things
  chosen_spanish: sus cosas preciosas
  alternatives_spanish:
  - sus objetos valiosos
  - sus valiosas posesiones
  - sus preciosidades
  lexicon: HALOT
  rationale: El hebreo puede aludir a cosas costosas, preciosas u honorables. En una lista de bienes arrebatables, una expresión concreta como «cosas preciosas» conserva ese valor sin introducir una especificación excesiva.
- source_word: אוֹצְרוֹת מַלְכֵי יְהוּדָה
  english_pob_choice: the treasures of the kings of Judah
  chosen_spanish: los tesoros de los reyes de Judá
  alternatives_spanish:
  - los almacenes de los reyes de Judá
  - las arcas de los reyes de Judá
  lexicon: HALOT
  rationale: Aquí se enfatizan los bienes guardados, no el edificio o depósito en sí. «Tesoros» es la opción más natural en español y sigue el valor contextual que destacó la versión inglesa.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - bajo el poder de
  - entregadas al poder de
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática hebrea de entregar algo al control de otro. En español, «en manos de» mantiene la fuerza de la expresión y su sentido de dominio.
- source_word: אֹיְבֵיהֶם
  english_pob_choice: their enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - los enemigos de ellos
  - los enemigos de los reyes de Judá
  lexicon: HALOT
  rationale: El sufijo puede referirse a los reyes de Judá y, por extensión, al pueblo/ciudad. «Sus enemigos» preserva la referencia pronominal sin resolver más de lo que permite el hebreo.
- source_word: וּבְזָזוּם
  english_pob_choice: plunder them
  chosen_spanish: las saquearán
  alternatives_spanish:
  - las despojarán
  - las pillarán
  - las expoliarán
  lexicon: HALOT
  rationale: El verbo denota saqueo militar. «Saquear» es claro, directo y conserva la violencia del acto en un registro adecuado para este contexto profético.
- source_word: וּלְקָחוּם
  english_pob_choice: seize them
  chosen_spanish: las tomarán
  alternatives_spanish:
  - las aprehenderán
  - las se apoderarán de ellas
  lexicon: HALOT
  rationale: El hebreo continúa la secuencia de captura. «Tomar» es una traducción sobria y fiel; en esta coordinación verbal evita redundancia excesiva frente a «saquearán».
- source_word: וֶהֱבִיאוּם בָּבֶלָה
  english_pob_choice: bring them to Babylon
  chosen_spanish: las llevarán a Babilonia
  alternatives_spanish:
  - las traerán a Babilonia
  - las conducirán a Babilonia
  lexicon: HALOT
  rationale: El verbo expresa traslado hacia Babilonia. «Llevar» resulta natural en español y conserva la dirección del movimiento sin añadir matices ajenos.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «gains» a «produce» para יְגִיעָהּ y de «take» a «seize» para un registro algo más formal. En español se optó por «producto» para reflejar mejor el fruto del trabajo, y por «tomarán» dentro de la secuencia verbal porque «las saquearán, las tomarán y las llevarán» mantiene la progresión natural del hebreo sin forzar una repetición pesada; la fuerza de captura ya queda expresada por «saquearán» y por «en manos de sus enemigos».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se usa un registro bíblico moderno y digno, evitando calcos innecesarios pero conservando la imagen hebrea de «en manos de».
  - «Babilonia» se conserva como topónimo transliterado según el uso bíblico habitual en español.
  - No se introduce una nota doctrinal porque el versículo es principalmente de juicio y despojo material, sin una formulación teológica disputada en la auditoría inglesa.
