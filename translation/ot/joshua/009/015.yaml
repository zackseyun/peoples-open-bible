theological_decisions:
- issue: Rendering of covenant idiom
  chosen_reading: cut a covenant
  alternative_readings:
  - made a covenant
  rationale: No doctrinal dispute is at stake, but preserving covenant terminology supports the text's theological and legal texture. The more literal idiom is understandable and preferable here under optimal equivalence.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of הָעֵדָה
  chosen_reading: the congregation
  alternative_readings:
  - the assembly
  - the community
  rationale: The term can denote the gathered Israelite community. 'Congregation' preserves the corporate covenantal sense without importing later ecclesial structures.
  doctrine_reference: Translation philosophy §5
