translation:
  language: es
  text: tal como Moisés, el siervo de Yahvé, había mandado a los hijos de Israel, como está escrito en el libro de la ley de Moisés, un altar de piedras enteras[a], sobre las cuales no se había usado hierro; y ofrecieron sobre él holocaustos a Yahvé y ofrecieron sacrificios de paz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «piedras sin labrar». El hebreo dice «piedras enteras», subrayando que quedaron intactas y no fueron trabajadas con hierro.
    reason: lexical_alternative
  - marker: b
    text: O «sacrificios de comunión» u «ofrendas de bienestar» para «sacrificios de paz».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶבֶד יְהוָה
  english_pob_choice: the servant of Yahweh
  chosen_spanish: el esclavo de Yahvé
  alternatives_spanish:
  - el siervo de Yahvé
  lexicon: HALOT
  rationale: El inglés POB usa 'servant' por ser un título establecido de Moisés, pero en español 'siervo' podría suavizar demasiado la fuerza del hebreo עֶבֶד. Dado el mandato del proyecto de mantener la fuerza léxica cuando sea pertinente, 'esclavo' conserva mejor el valor de dependencia/propiedad del término, aunque suene más fuerte que el inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino. 'Yahvé' preserva el Tetragrámaton en lugar de ocultarlo con una convención litúrgica.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente masculina y corporativa. 'Los hijos de Israel' mantiene la forma del original y evita neutralizarla en la traducción principal.
- source_word: בְּסֵפֶר תּוֹרַת מֹשֶׁה
  english_pob_choice: in the Book of the Law of Moses
  chosen_spanish: en el libro de la ley de Moisés
  alternatives_spanish:
  - en el libro de la instrucción de Moisés
  - en el rollo de la ley de Moisés
  lexicon: HALOT
  rationale: '''Ley'' es la equivalencia española más estable para תּוֹרָה en este contexto legal-normativo. ''Libro de la ley de Moisés'' conserva la fórmula reconocible sin añadir explicaciones innecesarias.'
- source_word: מִזְבַּח אֲבָנִים שְׁלֵמֹת
  english_pob_choice: an altar of uncut stones
  chosen_spanish: un altar de piedras enteras
  alternatives_spanish:
  - un altar de piedras sin labrar
  - un altar de piedras no talladas
  lexicon: HALOT
  rationale: El inglés POB revisó su traducción a 'uncut stones' por precisión. En español, 'piedras enteras' conserva la idea de piedras intactas, y la nota explica la posible lectura 'sin labrar'. Se evita una paráfrasis interpretativa en el texto principal.
- source_word: לֹא הֵנִיף עֲלֵיהֶן בַּרְזֶל
  english_pob_choice: on which no iron had been wielded
  chosen_spanish: sobre las cuales no había sido alzado hierro
  alternatives_spanish:
  - sobre las cuales no se había usado hierro
  - sobre las cuales no había pasado hierro
  lexicon: HALOT
  rationale: El hebreo usa la imagen de 'levantar' o 'blandir' hierro contra las piedras. 'Había sido alzado hierro' refleja esa construcción sin introducir la palabra 'herramienta', que no está explícita en el texto.
- source_word: עֹלוֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas totalmente quemadas
  lexicon: HALOT
  rationale: '''Holocaustos'' es el equivalente bíblico tradicional de עֹלוֹת y comunica la ofrenda totalmente consumida por fuego. Aunque ''ofrendas quemadas'' sería más explicativo, ''holocaustos'' es más preciso y estable en español bíblico.'
- source_word: שְׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: sacrificios de paz
  alternatives_spanish:
  - sacrificios de comunión
  - ofrendas de bienestar
  lexicon: HALOT
  rationale: El POB preserva la tensión semántica con una nota en inglés. En español, 'sacrificios de paz' mantiene la forma más reconocible y no fuerza una lectura teológica única; la nota recoge la alternativa semántica de comunión/bienestar.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La traducción mantiene explícito el nombre del pacto divino, en línea con la política del proyecto. No se sustituye por una designación litúrgica que oculte el nombre hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Expresión corporativa masculina בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se conserva la forma masculina plural del hebreo en lugar de neutralizarla, porque el POB prioriza la transparencia de la forma original cuando no hay necesidad contextual de generalizar.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: sacrificios de paz
  alternative_spanish_readings:
  - sacrificios de comunión
  - ofrendas de bienestar
  rationale: El término tiene un campo semántico más amplio que 'paz' en sentido moderno. Aun así, 'sacrificios de paz' conserva la designación tradicional y deja abierta la nota sobre comunión/bienestar, evitando borrar la tensión léxica.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'La versión inglesa revisada sustituyó ''whole stones'' por ''uncut stones'' y simplificó la referencia al hierro. El español sigue esa revisión en el sentido, pero conserva una formulación natural: ''piedras enteras'' en el texto principal con nota alternativa ''sin labrar''; y ''sobre las cuales no había sido alzado hierro'' para reproducir la imagen verbal hebrea sin sobreexplicar.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para el Nombre divino.
  - Se mantiene 'los hijos de Israel' para la expresión corporativa masculina.
  - '''Holocaustos'' y ''sacrificios de paz'' conservan terminología bíblica reconocible en español.'
  - La puntuación reproduce la pausa del original con dos miembros unidos por punto y coma antes de la secuencia sacrificial.
