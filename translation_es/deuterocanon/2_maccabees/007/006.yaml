base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/007/006.yaml
  text: The Lord God is watching[a], and in truth he is being moved to compassion for us, just as Moses made clear in the song that testifies openly, saying[c][b], “And he will be moved to compassion for his slaves.”
  footnotes:
  - marker: a
    text: Or “he is comforted … he will be comforted.” The Greek verb can carry senses such as comfort, exhortation, or being moved with pity; here the context and the quotation from the Song of Moses favor the sense of compassion or relenting.
    reason: lexical_alternative
  - marker: b
    text: The quotation echoes Deuteronomy 32:36, where the Lord is said to be moved concerning his servants.
    reason: cross_reference
  - marker: c
    text: 'Or “his servants.” Greek: “his slaves.”'
    reason: alternative_reading
