    rationale: En el texto, [a] aparece en «me mostró[a]», pero el contenido de la nota trata sobre la grafía «Nabucodrezzar» frente a «Nabucodonosor». Esto rompe la correspondencia obligatoria entre anclaje y nota.
  - severity: medium
    issue: Falta una nota para «los herreros»/«metalworkers».
    rationale: El inglés POB conserva una nota léxica para הַמַּסְגֵּר («Or 'the metalworkers'»). El borrador español no la preserva, aunque sí conserva las otras alternativas principales.
  - severity: low
    issue: La secuencia verbal «después de que ... había llevado» es menos natural en español estándar.
    rationale: Aunque entendible, en español fluido suena más natural «después de que ... llevó» o una restructuración equivalente. La revisión puede mejorar la legibilidad sin alterar el sentido temporal.
