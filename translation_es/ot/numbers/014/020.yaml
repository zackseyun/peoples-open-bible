translation:
  language: es
  text: 'Yahvé dijo[a]: «He perdonado, conforme a tu palabra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «He perdonado, como has hablado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: dijo
  alternatives_spanish:
  - entonces dijo
  - y dijo
  lexicon: HALOT
  rationale: El waw consecutivo en este contexto solo avanza la narración; en español, «dijo» basta de manera natural. Añadir «y» es posible, pero aquí no aporta información y «entonces» sería más interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del Tetragrámaton como «Yahvé», conforme al criterio del proyecto, en vez de sustituirlo por un título como «el SEÑOR».
- source_word: סָלַחְתִּי
  english_pob_choice: I have forgiven
  chosen_spanish: Te he perdonado
  alternatives_spanish:
  - te he perdonado
  - he perdonado
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción completa; en español, el pretérito perfecto compuesto comunica bien el acto ya realizado con efecto vigente. Se explicita el objeto implícito de la segunda persona por claridad natural del español.
- source_word: כִּדְבָרֶךָ
  english_pob_choice: according to your word
  chosen_spanish: conforme a tu palabra
  alternatives_spanish:
  - según tu palabra
  - como has hablado
  - a tu palabra
  lexicon: HALOT
  rationale: «Conforme a tu palabra» conserva la relación de conformidad del כ + דבר sin endurecer la frase. «Como has hablado» es una alternativa válida, pero pierde la forma nominal de «palabra» que el hebreo mantiene.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa directamente el nombre pactal de Dios. La tradición POB documenta «Yahweh» en inglés; en español, la forma equivalente y más estable es «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Tono de la fórmula de perdón
  english_pob_reading: I have forgiven
  chosen_spanish_reading: Te he perdonado
  alternative_spanish_readings:
  - He perdonado
  - Te perdono
  rationale: El hebreo presenta un acto completo de perdón tras la intercesión de Moisés. El perfecto compuesto en español conserva mejor ese valor de acción consumada que una simple traducción en presente.
  doctrine_reference: HALOT, סלח
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y confirmó alta concordancia; por tanto, se mantiene el sentido central sin necesidad de ajustar la lectura española. Se preserva la estructura breve del versículo y la relación directa entre el perdón divino y la palabra de intercesión.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, coherente con la norma del proyecto.
  - Se mantiene un registro sobrio y bíblico, pero en español natural.
  - «Palabra» se conserva para reflejar דבר, evitando sustituirlo por un giro más libre.
