review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: un día singular, conocido por Yahvé/en relación con Yahvé, que no encaja en las categorías normales de día o noche, y con luz al atardecer. Sin embargo, varias elecciones españolas suenan poco naturales o menos fieles semánticamente: «Y sucederá que será» duplica innecesariamente וְהָיָה; «conocido para Yahvé» no es español idiomático y debilita la relación expresada por ל; «no día ni noche» es demasiado quebrado en español; y «al tiempo de la tarde» es comprensible pero torpe frente a una opción más natural y cercana.'
  spanish_quality_summary: La legibilidad necesita ajuste. El texto actual suena calcado del inglés/hebreo en puntos donde el español puede ser más claro sin perder formalidad. Una redacción como «Y será un día[a], conocido por Yahvé, ni día ni noche[b][c]; pero al atardecer habrá luz» mantiene la tensión profética y mejora mucho la fluidez e inteligibilidad eclesial.
  glossary_alignment: Se respeta correctamente «Yahvé» para יהוה. No hay conflicto con otros términos glosario. La principal corrección léxica es evitar «conocido para Yahvé»; en español bíblico neutral «conocido por Yahvé» es natural y transmite adecuadamente la idea. También conviene usar «ni día ni noche» como forma española digna y clara para לֹא יוֹם וְלֹא לָיְלָה.
  issues:
  - severity: medium
    issue: «Y sucederá que será» sobrerrepresenta וְהָיָה
    rationale: El hebreo profético puede traducirse con un solo verbo en español. La doble formulación suena forzada y reduce la dignidad estilística.
  - severity: high
    issue: «conocido para Yahvé» es poco idiomático en español
    rationale: Aunque intenta reflejar לַ, en español eclesial natural «conocido por Yahvé» comunica mejor la relación sin extrañeza innecesaria. La nota puede preservar la literalidad hebrea.
  - severity: medium
    issue: «no día ni noche» resulta poco natural
    rationale: La paradoja hebrea puede conservarse con «ni día ni noche», que es claro y formal en español. La forma actual parece español defectuoso más que extrañamiento intencional.
  - severity: low
    issue: «al tiempo de la tarde» es torpe
    rationale: «Al atardecer» o «al tiempo del atardecer» suena más natural. «Al atardecer» preserva bien לְעֵת עֶרֶב sin expansión innecesaria.
  - severity: low
    issue: La nota c debe reflejar con precisión que la forma hebrea es extraña respecto del español elegido
    rationale: 'Si el texto principal dice «conocido por Yahvé», la nota puede indicar «Hebreo: “conocido para Yahvé”» como observación formal; así se mantiene el rastro auditado sin imponer una frase antinatural al texto principal.'
