translation:
  language: es
  text: Sea sobre nosotros el favor[a] del Señor nuestro Dios, y confirma la obra de nuestras manos sobre nosotros[c]; sí[b], confirma la obra de nuestras manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermosura», «dulzura» o «deleite» del Señor nuestro Dios.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo repite la petición para dar énfasis: «y la obra de nuestras manos, confírmala».'
    reason: lexical_alternative
  - marker: c
    text: O «y confirma la obra de nuestras manos para nosotros».
    reason: previous_rendering
lexical_decisions:
- source_word: וִיהִי
  english_pob_choice: May ... be
  chosen_spanish: Sea
  alternatives_spanish:
  - Que sea
  - Sea, pues
  lexicon: HALOT
  rationale: El jussivo de היה expresa una petición o deseo. En español, «Sea» transmite bien la fuerza optativa sin añadir interpretación; conserva el tono de súplica del hebreo.
- source_word: נֹעַם
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - hermosura
  - dulzura
  - deleite
  lexicon: HALOT
  rationale: El término puede abarcar idea de agrado, belleza o favor. En este contexto de petición por la bendición divina sobre la labor humana, «favor» expresa mejor el sentido relacional y benévolo de Yahvé.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Soberano
  lexicon: HALOT
  rationale: Aunque אֲדֹנָי suele verterse «Señor», aquí la combinación אֲדֹנָי אֱלֹהֵינוּ funciona como dirección reverente al Dios del pacto. En la política del proyecto, el nombre divino se expresa como «Yahvé» en el texto principal, manteniendo la relación devocional sin ocultarlo tras una convención tipográfica.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  lexicon: HALOT
  rationale: Es un constructo posesivo directo con sufijo de primera persona plural. «Nuestro Dios» conserva con claridad la relación de pacto y la cadencia natural en español.
- source_word: עָלֵינוּ
  english_pob_choice: upon us
  chosen_spanish: sobre nosotros
  alternatives_spanish:
  - en nosotros
  - por encima de nosotros
  lexicon: HALOT
  rationale: La preposición על aquí expresa algo que descansa o reposa sobre el pueblo; «sobre nosotros» reproduce esa imagen de manera natural en español. En la segunda ocurrencia, se conserva el mismo valor preposicional para no borrar la repetición del hebreo.
- source_word: מַעֲשֵׂה יָדֵינוּ
  english_pob_choice: the work of our hands
  chosen_spanish: la obra de nuestras manos
  alternatives_spanish:
  - el trabajo de nuestras manos
  - lo que nuestras manos han hecho
  lexicon: HALOT
  rationale: Es un modismo para el trabajo o la empresa humana. «La obra de nuestras manos» preserva la imaginería concreta y es plenamente inteligible en español bíblico moderno.
- source_word: כּוֹנְנָה
  english_pob_choice: establish
  chosen_spanish: confirma
  alternatives_spanish:
  - establece
  - afirma
  - haz firme
  lexicon: HALOT
  rationale: El verbo כון tiene la idea de hacer firme, seguro o duradero. «Confirma» expresa bien esa firmeza en español y suena apropiado en una oración; «establece» también sería posible, pero aquí «confirma» conserva mejor el matiz de consolidar lo que se pide.
- source_word: כּוֹנְנֵהוּ
  english_pob_choice: establish
  chosen_spanish: confirma
  alternatives_spanish:
  - confírmala
  - hazla firme
  - establécela
  lexicon: HALOT
  rationale: El sufijo pronominal de tercera persona singular probablemente retoma «la obra» como sustantivo colectivo/singular. En español, repetir «confirma» mantiene el paralelismo hebreo y evita perder la insistencia retórica del verso.
theological_decisions:
- issue: Nombre divino y título en una oración litúrgica
  english_pob_reading: the Lord our God
  chosen_spanish_reading: Yahvé nuestro Dios
  alternative_spanish_readings:
  - el Señor nuestro Dios
  - nuestro Dios
  rationale: El hebreo dice אֲדֹנָי אֱלֹהֵינוּ. Dado el estándar del proyecto para representar el nombre divino, «Yahvé» evita el ocultamiento del tetragrámaton y mantiene la transparencia textual. El vínculo con «nuestro Dios» preserva el tono de alianza y de oración.
  doctrine_reference: DOCTRINE.md Translation philosophy §2; tabla de términos disputados (nombre divino)
translation_notes:
  revision_awareness: El audit trail inglés pasó por una oscilación en la segunda cláusula entre «upon us» y «for us»; la revisión más reciente volvió a reflejar el paralelo con עָלֵינוּ. Por eso el español conserva la repetición de «sobre nosotros» y no suaviza la estructura. También se mantiene la segunda petición enfática sin añadir explicación al cuerpo del texto, reservando la nota para el efecto repetitivo del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la política del proyecto para el nombre divino.
  - Se conserva el paralelismo del hebreo con dos miembros prácticamente idénticos.
  - «La obra de nuestras manos» sigue la imagen concreta y no se reemplaza por una abstracción como «nuestro trabajo».
  - «Confirma» se usa de modo consistente en ambas instancias para reflejar כון sin introducir variación interpretativa.
