  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀καὶ λέγων· Μετανοεῖτε, ἤγγικεν γὰρ ἡ βασιλεία τῶν οὐρανῶν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/003/002.yaml
  text: and saying[a], “Repent[b], for the kingdom of heaven has drawn near.”
  footnotes:
  - marker: a
    text: Or 'Repent' (traditional). Greek μετανοέω literally = "change one's mind/thinking" (μετά "change" + νοέω "think, perceive"). In English Bible tradition this verb has long been rendered "repent," which in modern English drifts toward "feel guilty about sin / apologize." The Greek is broader and more cognitive — a fundamental reorientation of thinking, not primarily an emotional state. In John the Baptist's proclamation (and Jesus's parallel preaching, Mark 1:15), the call is for hearers to rethink everything in light of the kingdom's arrival. See REVISION_METHODOLOGY.md for the project-level analysis.
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'the kingdom of the heavens has come near.'
    reason: lexical_alternative
translation:
  language: ko
  text: 말하였습니다. 「회개하십시오. 하늘 나라가 가까이 왔습니다.」
  philosophy: optimal-equivalence
