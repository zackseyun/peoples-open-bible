translation:
  language: es
  text: 'Entonces les ordenó y les dijo[a]: «Yo estoy a punto de ser reunido con mi pueblo. Sepúltenme con mis antepasados en la cueva que está en el campo de Efrón el hitita»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estoy siendo reunido con mi pueblo». El hebreo usa un modismo que alude a la muerte inminente y a la reunión con su pueblo o sus antepasados en la muerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: he commanded
  chosen_spanish: les dio esta orden
  alternatives_spanish:
  - les mandó
  - les ordenó
  lexicon: HALOT
  rationale: צוה expresa una orden solemne; «dio esta orden» conserva la fuerza directiva sin sonar excesivamente arcaico en español.
- source_word: וַיֹּאמֶר אֲלֵהֶם
  english_pob_choice: and said to them
  chosen_spanish: y les dijo
  alternatives_spanish:
  - y les habló
  - y les dijo a ellos
  lexicon: HALOT
  rationale: Fórmula narrativa directa y natural en español, equivalente al habla dirigida al grupo.
- source_word: נֶאֱסָף אֶל־עַמִּי
  english_pob_choice: I am about to be gathered to my people
  chosen_spanish: yo estoy a punto de ser reunido con mi pueblo
  alternatives_spanish:
  - yo soy reunido con mi pueblo
  - yo estoy siendo reunido con mi pueblo
  lexicon: HALOT
  rationale: La pasiva refleja la construcción niphal y «a punto de» conserva el valor inminente del contexto, como en la decisión inglesa.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mis parientes
  - mi gente
  lexicon: HALOT
  rationale: «Mi pueblo» mantiene el idiomático hebreo y su resonancia familiar y teológica sin reducirlo a una mera referencia biológica.
- source_word: קִבְרוּ אֹתִי
  english_pob_choice: Bury me
  chosen_spanish: Sepúltenme
  alternatives_spanish:
  - Entiérrenme
  - Inhúmenme
  lexicon: HALOT
  rationale: El imperativo plural con objeto directo se traduce naturalmente como exhortación al grupo; «sepultar» conserva el registro digno del contexto funerario.
- source_word: אֶל אֲבֹתָי
  english_pob_choice: with my fathers
  chosen_spanish: con mis padres
  alternatives_spanish:
  - junto con mis padres
  - con mis antepasados
  lexicon: HALOT
  rationale: Aunque el hebreo usa literalmente «a», el contexto funerario y la tradición española permiten «con mis padres» para expresar el entierro junto a los antepasados sin forzar la sintaxis.
- source_word: הַמְּעָרָה
  english_pob_choice: the cave
  chosen_spanish: la cueva
  alternatives_spanish:
  - la gruta
  lexicon: HALOT
  rationale: «Cueva» es el equivalente claro y natural en español para מְעָרָה; evita tecnicismos innecesarios.
- source_word: אֲשֶׁר בִּשְׂדֵה עֶפְרוֹן
  english_pob_choice: that is in the field of Ephron
  chosen_spanish: que está en el campo de Efrón
  alternatives_spanish:
  - que se halla en el campo de Efrón
  lexicon: HALOT
  rationale: Conserva la estructura relativa y el nombre propio transliterado según la política del proyecto.
- source_word: הַחִתִּי
  english_pob_choice: the Hittite
  chosen_spanish: el hitita
  alternatives_spanish:
  - el heteo
  lexicon: HALOT
  rationale: Designación étnica estándar en español bíblico moderno para identificar a Efrón.
theological_decisions:
- issue: Sentido de «ser reunido con mi pueblo»
  english_pob_reading: Retain the idiom rather than reducing it to a simple statement of death
  chosen_spanish_reading: Mantener el modismo de reunión con el pueblo, sin convertirlo en «voy a morir»
  alternative_spanish_readings:
  - estoy por morir
  - voy a reunirme con mis antepasados
  rationale: La frase hebrea carga un sentido idiomático de muerte y reunión ancestral. En español se conserva la imagen para no borrar la tensión teológica del texto.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El texto sigue la revisión más reciente del audit trail inglés: se conserva la estructura de la oración, el imperativo plural y la cláusula relativa, sin añadir puntuación o contenido interpretativo no sustentado por el hebreo. La nota sobre «ser reunido con mi pueblo» mantiene la alternativa semántica documentada en el inglés POB.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma normal del nombre divino solo cuando corresponda; aquí no aparece.
  - Se mantiene «Mesías/Cristo» fuera de este versículo porque no aplica.
  - «hitita» se usa como gentilicio bíblico estándar, consistente con el proyecto.
  - La nota al pie está anclada correctamente en el verbo «dijo[a]» y no se deja sin marcador.
