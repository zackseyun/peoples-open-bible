lexical_decisions:
- source_word: ἔγνων
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - he llegado a saber
  - reconozco
  lexicon: BDAG
  rationale: 'El aoristo de γινώσκω expresa aquí una toma de conciencia que en español se comunica con naturalidad en presente: «sé». Mantiene el valor de reconocimiento actual sin volver la frase artificialmente literal.'
- source_word: χάριν τούτων
  english_pob_choice: because of these things
  chosen_spanish: por causa de estas cosas
  alternatives_spanish:
  - a causa de estas cosas
  - por estas cosas
  lexicon: LSJ
  rationale: χάριν con genitivo expresa causa o motivo. «Por causa de» conserva la relación causal y el tono bíblico sin introducir una interpretación más fuerte que el griego.
- source_word: εὗρόν με
  english_pob_choice: have come upon me
  chosen_spanish: me han sobrevenido
  alternatives_spanish:
  - me han alcanzado
  - me han encontrado
  lexicon: BDAG
  rationale: Aunque literalmente significa «me encontraron», en español el giro impersonal con eventos adversos se expresa mejor como «me han sobrevenido». Conserva la idea de desgracias que recaen sobre una persona.
- source_word: τὰ κακὰ ταῦτα
  english_pob_choice: these evils
  chosen_spanish: estos males
  alternatives_spanish:
  - estas calamidades
  - estos males terribles
  lexicon: BDAG
  rationale: κακά aquí designa desgracias o aflicciones, no mal moral cometido por el hablante. «Males» preserva el registro bíblico y la fuerza de calamidad sin sobreexplicar.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  lexicon: BDAG
  rationale: La cláusula griega termina en καὶ, por lo que se conserva la conjunción final en español para reflejar honestamente que el fragmento recibido está incompleto.
translation_notes:
  revision_awareness: Se siguió el testimonio griego suministrado (fragmentario) y el criterio del POB en inglés de no suplir palabras ausentes. No se introdujeron elementos no atestiguados por la fuente.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se evitó «SEÑOR» porque no corresponde a este fragmento.
  - Se mantuvo un español natural y formal, pero sin suavizar el carácter de desgracia del griego.
  - «Males» conserva la ambigüedad de κακά como calamidades y no como maldad moral.
