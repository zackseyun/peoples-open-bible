lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva el progreso secuencial con naturalidad en español.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: El dativo directo en español se expresa de forma natural con el pronombre átono «me».
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Noun definido referencial al rey persa ya identificado; «rey» es el equivalente directo y sobrio.
- source_word: עַל־מַה זֶּה
  english_pob_choice: What are you requesting?
  chosen_spanish: ¿Qué estás solicitando?
  alternatives_spanish:
  - ¿Qué pides?
  - ¿Qué estás pidiendo?
  lexicon: HALOT
  rationale: La expresión idiomática introduce la petición en contexto cortesano. «Solicitar» refleja bien el matiz formal de la petición y evita una calca extraña de la preposición.
- source_word: אַתָּה מְבַקֵּשׁ
  english_pob_choice: you are requesting
  chosen_spanish: estás solicitando
  alternatives_spanish:
  - pides
  - estás pidiendo
  - buscas
  lexicon: HALOT
  rationale: בקש puede significar «pedir/solicitar» o «buscar». Aquí la escena exige una solicitud concreta al rey; «solicitar» mantiene el valor de petición sin perder dignidad.
- source_word: וָאֶתְפַּלֵּל
  english_pob_choice: So I prayed
  chosen_spanish: Y oré
  alternatives_spanish:
  - Entonces oré
  - Y me puse a orar
  lexicon: HALOT
  rationale: El verbo indica oración inmediata en respuesta a la pregunta del rey. «Y oré» preserva la acción sin sobreinterpretar la causalidad que el inglés expresa con «So».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: al
  alternatives_spanish:
  - a
  lexicon: HALOT
  rationale: Con verbos de oración en español, la construcción natural es «orar al Dios...», manteniendo el sentido direccional relacional del hebreo.
- source_word: אֱלֹהֵי הַשָּׁמַיִם
  english_pob_choice: the God of heaven
  chosen_spanish: el Dios de los cielos
  alternatives_spanish:
  - el Dios del cielo
  - el Dios celestial
  lexicon: HALOT
  rationale: Se conserva el título reverencial postexílico. «Cielos» respeta la pluralidad formal del hebreo y evita reducirlo a una sola bóveda física; no se sustituye por una formulación devocional más interpretativa.
theological_decisions:
- issue: Título divino אֱלֹהֵי הַשָּׁמַיִם
  english_pob_reading: the God of heaven
  chosen_spanish_reading: el Dios de los cielos
  alternative_spanish_readings:
  - el Dios del cielo
  - Dios de los cielos
  rationale: El texto presenta un título para el Dios de Israel en contexto posexílico, sin añadir explicaciones doctrinales. Se preserva la reverencia y la formulación del título, evitando tanto el ocultamiento del nombre divino como una paráfrasis interpretativa.
  doctrine_reference: Nehemías 2:4; título divino en contexto posexílico; transparencia léxica y teológica
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió una pregunta más directa y natural para מְבַקֵּשׁ. Se reflejó esa dirección con «¿Qué estás solicitando?», manteniendo el tono formal y la progresión narrativa.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y «los cielos» para הַשָּׁמַיִם conforme a la terminología POB en español.
  - Se evita «SEÑOR» para el nombre divino porque aquí el texto no usa יהוה, sino el título «el Dios de los cielos».
  - El registro es bíblico pero moderno, sin calcos excesivamente literales.
