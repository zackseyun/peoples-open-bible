    rationale: El POB inglés conserva una nota específica sobre esta frase difícil. La revisión española debe mantener esa información auditada.
  - severity: medium
    issue: «Al campamento alrededor» es poco natural en español.
    rationale: Aunque intenta conservar la rareza del hebreo, en español suena defectuoso. Una solución como «al campamento de los alrededores» conserva el sentido espacial con mejor legibilidad sin sobreinterpretar demasiado.
