  spanish_quality_summary: El español es generalmente claro, pero 'Que él se siente entronizado' resulta algo forzado; 'se siente en el trono' sería más natural, aunque puede simplificarse mejor con la nota. Más importante, 'lealtad amorosa' suena calcado y poco eclesial. Una reparación mínima que preserve el audit trail es usar 'amor constante' y restituir el imperativo con 'dispón que'.
