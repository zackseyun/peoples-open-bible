  text: הִקְרִ֨ב אֶת קָרְבָּנ֜/וֹ קַֽעֲרַת כֶּ֣סֶף אַחַ֗ת שְׁלֹשִׁ֣ים וּ/מֵאָה֮ מִשְׁקָלָ/הּ֒ מִזְרָ֤ק אֶחָד֙ כֶּ֔סֶף שִׁבְעִ֥ים שֶׁ֖קֶל בְּ/שֶׁ֣קֶל הַ/קֹּ֑דֶשׁ שְׁנֵי/הֶ֣ם מְלֵאִ֗ים סֹ֛לֶת בְּלוּלָ֥ה בַ/שֶּׁ֖מֶן לְ/מִנְחָֽה־־׀׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/007/019.yaml
  text: 'He presented his offering: one silver plate[a], its weight one hundred thirty shekels; one silver basin, seventy shekels, by the shekel of the sanctuary[c][b]; both of them full of fine flour mixed with oil for a grain offering.'
  footnotes:
  - marker: a
    text: Or 'silver dish' for 'silver plate' (קַעֲרַת כֶּסֶף).
    reason: lexical_alternative
  - marker: b
    text: Or 'bowl' for 'basin' (מִזְרָק).
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'by the shekel of the sanctuary,' indicating the standard sacred weight.
    reason: cultural_note
