translation:
  language: es
  text: Para los judíos hubo luz, alegría, gozo y honor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los judíos tuvieron luz, alegría, gozo y honor». El hebreo permite tanto una lectura existencial («hubo») como una posesiva («tuvieron»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַיְּהוּדִים
  english_pob_choice: For the Jews
  chosen_spanish: Para los judíos
  alternatives_spanish:
  - A los judíos
  - Los judíos tuvieron
  lexicon: HALOT
  rationale: El l prefijado aquí marca relación/beneficio o posesión en una construcción que puede leerse de forma existencial o posesiva. En español, «Para los judíos» conserva bien esa apertura sin forzar todavía la posesión explícita.
- source_word: הָיְתָה
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - había
  - tuvieron
  lexicon: HALOT
  rationale: La forma hebrea con el sintagma frontal se presta a una lectura existencial. «Hubo» comunica en español una existencia/ocurrencia puntual y mantiene la posibilidad que el inglés auditado señaló entre lectura existencial y posesiva.
- source_word: אוֹרָה
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - resplandor
  - iluminación
  lexicon: HALOT
  rationale: «Luz» es la equivalencia directa y conserva la imagen metafórica de liberación y bienestar; «iluminación» sería demasiado interpretativa.
- source_word: שִׂמְחָה
  english_pob_choice: gladness
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: HALOT
  rationale: Se escogió «alegría» para reflejar el matiz de satisfacción festiva sin repetir exactamente el término siguiente. En español funciona de manera natural junto con «gozo».
- source_word: שָׂשׂוֹן
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - regocijo
  lexicon: HALOT
  rationale: «Gozo» mantiene el tono de júbilo y ayuda a distinguir este miembro del par casi sinónimo, evitando colapsarlo con el término anterior.
- source_word: יְקָר
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - dignidad
  - estima
  - esplendor
  lexicon: HALOT
  rationale: En este contexto apunta al honor o la dignidad concedida a los judíos tras el giro de su situación. «Honor» es la opción más transparente y cercana al valor social del término.
theological_decisions:
- issue: Lectura existencial frente a posesiva de la cláusula
  english_pob_reading: The Hebrew construction can be rendered either existentially ('there was') or possessively ('had').
  chosen_spanish_reading: 'Se preserva la lectura existencial: «hubo luz, alegría y gozo, y honor».'
  alternative_spanish_readings:
  - «Los judíos tuvieron luz, alegría y gozo, y honor»
  - «Para los judíos había luz...»
  rationale: El hebreo admite ambas lecturas, y la versión española mantiene esa tensión sin resolverla de forma excesivamente explicativa. «Hubo» suena natural y conserva la estructura breve del original.
  doctrine_reference: No aplica; se trata de una decisión sintáctico-semántica, no doctrinal.
translation_notes:
  revision_awareness: Sin cambios respecto al último repaso del texto base; se mantiene la alta concordancia con el audit trail inglés y no se detectan revisiones aplicadas que alteren el sentido.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el texto no contiene el tetragrámaton.
  - Se mantuvo «gozo» para distinguirlo de «alegría», preservando la acumulación de términos del hebreo.
  - «Hubo» refleja la opción existencial del audit trail, mientras que la nota conserva la alternativa posesiva.
  - La puntuación en español sigue la norma moderna y respeta la enumeración del hebreo.
