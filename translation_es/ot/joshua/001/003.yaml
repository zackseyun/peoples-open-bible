revisions:
- from: Todo lugar que pise la planta de vuestro pie[a], os lo he dado, tal como hablé a Moisés.
  to: Todo lugar donde pise la planta de sus pies[a], se lo he dado, tal como hablé a Moisés.
  rationale: Se reemplaza el registro peninsular por uno neutral latinoamericano y se mejora la sintaxis central para que la imagen hebrea sea clara y natural en español. «Donde» incorpora de manera idiomática la relación de אֲשֶׁר + בּוֹ; «la planta de sus pies» conserva el plural corporativo; «se lo he dado» mantiene la fuerza del perfecto como don ya concedido.
