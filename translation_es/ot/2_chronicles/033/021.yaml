translation:
  language: es
  text: Amón tenía veintidós años cuando comenzó a reinar[a], y reinó dos años en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Comenzó a reinar" conserva el sentido de acceso al trono que el hebreo expresa con el infinitivo constructo de מלך; no implica necesariamente una ceremonia específica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וּשְׁתַּיִם שָׁנָה
  english_pob_choice: was twenty-two years old
  chosen_spanish: tenía veintidós años
  alternatives_spanish:
  - era hijo de veintidós años
  - era de veintidós años
  lexicon: HALOT
  rationale: La construcción hebrea es un modismo de edad. En español bíblico natural, "tenía veintidós años" comunica con claridad la edad sin forzar un calco literal de "hijo de".
- source_word: אָמ֣וֹן
  english_pob_choice: Amon
  chosen_spanish: Amón
  alternatives_spanish:
  - Amon
  lexicon: Nombre propio transliterado
  rationale: Se translitera el nombre personal en forma española corriente con acento gráfico para la pronunciación.
- source_word: בְּמָלְכ֑וֹ
  english_pob_choice: when he became king
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando llegó a ser rey
  - al reinar
  lexicon: HALOT
  rationale: El valor temporal de ב + infinitivo de מלך expresa el momento de acceso al trono. "Comenzó a reinar" mantiene ese sentido de inicio de reinado en español natural.
- source_word: וּשְׁתַּיִם שָׁנִ֔ים
  english_pob_choice: two years
  chosen_spanish: dos años
  alternatives_spanish:
  - por dos años
  lexicon: HALOT
  rationale: La expresión cardinal con sustantivo indica duración. "Dos años" es la forma directa y fiel en español.
- source_word: מָלַ֖ךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó
  lexicon: HALOT
  rationale: El verbo מלך denota ejercer la realeza durante un período. "Reinó" es el equivalente español más preciso y transparente.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: Topónimo
  rationale: La preposición locativa y el nombre de lugar se trasladan de forma directa y idiomática.
translation_notes:
  revision_awareness: El texto inglés auditado se mantiene sin cambios en esta entrega; la versión española sigue la misma lectura de alta concordancia y conserva el sentido temporal de acceso al reinado, con adaptación idiomática al español.
  spanish_consistency_notes:
  - Se mantiene "Amón" para el nombre propio en forma española habitual.
  - Se evita "SEÑOR" u otras convenciones no pertinentes porque el versículo no contiene nombres divinos.
  - '"Reinó" y "comenzó a reinar" distinguen inicio de acceso y duración del reinado sin añadir información ajena al hebreo.'
