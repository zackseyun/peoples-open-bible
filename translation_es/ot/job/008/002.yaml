translation:
  language: es
  text: ¿Hasta cuándo seguirás diciendo estas cosas[a], y las palabras de tu boca sean un viento poderoso?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Hasta cuándo hablarás estas cosas, y las palabras de tu boca serán un viento fuerte?»'
