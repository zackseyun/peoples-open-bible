translation:
  language: es
  text: Entonces castigaré[a] su transgresión con una vara, y su iniquidad con azotes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'visitaré su transgresión con una vara ... y su iniquidad con golpes'. El verbo hebreo puede significar 'visitar' en el sentido de atender a o castigar, y 'golpes' es una alternativa más general a 'azotes'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָקַדְתִּי
  english_pob_choice: Then I will punish
  chosen_spanish: Entonces castigaré
  alternatives_spanish:
  - y visitaré
  - y atenderé
  - y castigaré
  lexicon: HALOT
  rationale: El verbo פקד puede significar 'visitar', 'atender' o 'castigar'. En este contexto disciplinario, con imágenes concretas de corrección corporal en el paralelo, el sentido punitivo es el principal. 'Entonces' conserva la secuencia respecto del contexto previo, y 'castigaré' comunica naturalmente esa fuerza en español.
- source_word: בְשֵׁבֶט
  english_pob_choice: with the rod
  chosen_spanish: con vara
  alternatives_spanish:
  - con una vara
  - con cetro
  - con bastón
  lexicon: HALOT
  rationale: שֵׁבֶט puede referirse a vara, bastón o cetro. Aquí funciona como instrumento de disciplina, no de gobierno real; por eso 'vara' transmite bien la imagen correctiva sin introducir un matiz ajeno.
- source_word: פִּשְׁעָם
  english_pob_choice: their transgression
  chosen_spanish: su transgresión
  alternatives_spanish:
  - su rebelión
  - su ofensa
  lexicon: HALOT
  rationale: פֶּשַׁע suele expresar transgresión o rebelión. 'Transgresión' conserva el peso moral del término y mantiene el paralelismo con 'iniquidad' sin sobrerinterpretar el matiz como rebelión política.
- source_word: וּבִנְגָעִים
  english_pob_choice: and with blows
  chosen_spanish: y con azotes
  alternatives_spanish:
  - y con plagas
  - y con aflicciones
  - y con golpes
  lexicon: HALOT
  rationale: נֶגַע puede significar plaga, aflicción, golpe o azote. Dado el paralelo con 'vara' y el contexto de disciplina, 'azotes' comunica bien la idea de castigo físico. En español, 'azotes' mantiene la intensidad sin restringir indebidamente a enfermedad.
- source_word: עֲוֺנָם
  english_pob_choice: their iniquity
  chosen_spanish: su iniquidad
  alternatives_spanish:
  - su culpa
  - su maldad
  lexicon: HALOT
  rationale: עָוֹן puede denotar iniquidad, culpa o la consecuencia de la culpa. 'Iniquidad' conserva el peso moral y el paralelismo poético con 'transgresión'.
theological_decisions:
- issue: Naturaleza de la respuesta divina al pecado del pueblo del pacto
  english_pob_reading: God promises real disciplinary punishment, not final rejection, in the broader psalmic context.
  chosen_spanish_reading: Dios promete un castigo disciplinario real, no un rechazo final, dentro del contexto más amplio del salmo.
  alternative_spanish_readings:
  - Dios solo advierte corrección
  - Dios anuncia una visita meramente correctiva
  rationale: El verso usa imágenes concretas de castigo ('vara', 'azotes'); por eso la traducción no debe suavizarse a una corrección vaga. A la vez, este versículo por sí solo no obliga a una conclusión doctrinal sobre rechazo definitivo, así que se preserva esa tensión sin resolverla aquí.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se alinea con la lectura inglesa aprobada y con el acuerdo alto del control cruzado.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención general del proyecto cuando corresponda; aquí el versículo no contiene el tetragrámaton.
  - Se usa 'transgresión' e 'iniquidad' para conservar el paralelismo moral del hebreo.
  - '''Vara'' y ''azotes'' reflejan el lenguaje disciplinario concreto del original sin atenuarlo.'
