translation:
  language: es
  text: Todos tus dirigentes huyeron juntos[a]; fueron capturados sin el arco. Todos tus fugitivos que fueron hallados fueron capturados juntos[b]; habían huido lejos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, 'fueron atados sin el arco'. El sentido puede ser que fueron capturados sin necesidad de usar el arco, o sin llevar un arco en la mano.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''todos los tuyos que fueron hallados fueron atados juntos; habían huido desde lejos''. La sintaxis hebrea del tramo final es condensada y admite una construal ligeramente distinta.'
    reason: alternative_reading
lexical_decisions:
- source_word: קְצִינַיִךְ
  english_pob_choice: your rulers
  chosen_spanish: tus gobernantes
  alternatives_spanish:
  - tus jefes
  - tus oficiales
  - tus comandantes
  lexicon: HALOT
  rationale: קָצִין puede designar un oficial, jefe o gobernante. 'Gobernantes' comunica bien la función de liderazgo cívico-político en el contexto de Jerusalén, sin estrecharlo solo a rango militar.
- source_word: נָדְדוּ
  english_pob_choice: have fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - han huido
  - se alejaron huyendo
  lexicon: HALOT
  rationale: En este contexto de asedio y captura, el verbo expresa huida. En español, el pretérito simple fluye mejor que el pretérito perfecto y mantiene la acción ya concluida.
- source_word: יַחַד
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - juntamente
  - todos juntos
  lexicon: HALOT
  rationale: Adverbio de acción colectiva; 'juntos' es natural y transparente en español.
- source_word: מִקֶּשֶׁת
  english_pob_choice: without the bow
  chosen_spanish: sin el arco
  alternatives_spanish:
  - sin el arco y la flecha
  - sin necesidad de arco
  - aparte del arco
  lexicon: HALOT
  rationale: La preposición מִן puede ser privativa o de separación. 'Sin el arco' conserva la idea de captura sin recurso al arco, como refleja la nota inglesa, y evita una traducción mecánica 'desde el arco'.
- source_word: אֻסָּרוּ
  english_pob_choice: were captured
  chosen_spanish: fueron capturados
  alternatives_spanish:
  - fueron apresados
  - fueron prendidos
  - fueron atados
  lexicon: HALOT
  rationale: Aunque el verbo básico es 'atar', en contexto militar/policial el pasivo comunica captura o aprisionamiento. 'Fueron capturados' preserva el sentido contextual sin perder la imagen de sometimiento.
- source_word: נִמְצָאַיִךְ
  english_pob_choice: your fugitives who were found
  chosen_spanish: tus fugitivos que fueron hallados
  alternatives_spanish:
  - los tuyos que fueron hallados
  - los que de ti fueron hallados
  - tus hombres que fueron hallados
  lexicon: HALOT
  rationale: El participio pasivo de מצא permite 'los hallados'. Dado el contexto y la revisión inglesa, 'fugitivos' refleja mejor a quienes escapaban, y 'fueron hallados' conserva la pasiva.
- source_word: אֻסְּרוּ
  english_pob_choice: were captured
  chosen_spanish: fueron capturados
  alternatives_spanish:
  - fueron apresados
  - fueron atados
  lexicon: HALOT
  rationale: Se mantiene la misma solución que para אֻסָּרוּ por consistencia y porque el contexto sigue siendo de captura/confinamiento.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - todos juntos
  - en conjunto
  lexicon: HALOT
  rationale: Repetición adverbial con יחד; se conserva la misma equivalencia natural en español.
- source_word: מֵרָחוֹק
  english_pob_choice: far away
  chosen_spanish: lejos
  alternatives_spanish:
  - desde lejos
  - de lejos
  - a gran distancia
  lexicon: HALOT
  rationale: La frase puede indicar distancia del lugar de huida. 'Lejos' es breve, idiomática y mantiene la idea espacial del término.
- source_word: בָּרָחוּ
  english_pob_choice: had fled
  chosen_spanish: habían huido
  alternatives_spanish:
  - huyeron
  - habían escapado
  lexicon: HALOT
  rationale: ברח significa huir. El pluscuamperfecto español aclara la secuencia respecto de 'fueron hallados' y 'fueron capturados', como en la nota inglesa.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que sustituyó 'men' por 'fugitives' para reflejar mejor נִמְצָאַיִךְ. También mantiene la aclaración de que la segunda mitad del verso admite una lectura alternativa por la sintaxis hebrea comprimida.
  spanish_consistency_notes:
  - Se mantuvo 'capturados' para ambos pasivos de אסר por consistencia contextual.
  - Se tradujo יחד/יַחְדָּו de forma uniforme como 'juntos'.
  - Se evitó 'SEÑOR' u otras sustituciones no pertinentes, ya que el verso no contiene el Tetragrámaton ni vocabulario teológico directo.
  - '''Lejos'' en español conserva la ambigüedad útil de distancia/alejamiento que el hebreo permite en el cierre del verso.'
