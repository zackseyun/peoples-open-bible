translation:
  language: es
  text: Pero no toméis como garantía[a] los planes de Yahvé, nuestro Dios, porque Dios no es como un hombre, para ser amenazado, ni como un hijo de hombre[b], para ser persuadido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "no toméis en prenda" o "no tratéis como aval" los planes de Yahvé, nuestro Dios. El griego usa la imagen de prenda o garantía.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, "un hijo de hombre": expresión semítica para un ser humano, no un título mesiánico.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐνεχυράζετε
  english_pob_choice: hold ... as security
  chosen_spanish: toméis como garantía
  alternatives_spanish:
  - toméis en prenda
  - lo tratéis como aval
  - lo toméis como prenda
  lexicon: LSJ
  rationale: El verbo griego remite al campo de la prenda/garantía/collateral. En español, 'tomar como garantía' conserva esa imagen jurídica-económica sin sonar tan técnico o duro como una traducción literal. Mantiene la advertencia contra someter los planes divinos a condiciones humanas.
- source_word: βουλὰς
  english_pob_choice: plans
  chosen_spanish: planes
  alternatives_spanish:
  - propósitos
  - consejos
  - designios
  lexicon: LSJ
  rationale: '''Planes'' es claro en español actual y refleja bien el sentido de propósito o intención de βουλή, sin perder la referencia a la acción decidida de Dios.'
- source_word: κυρίου τοῦ θεοῦ ἡμῶν
  english_pob_choice: the Lord our God
  chosen_spanish: Yahvé, nuestro Dios
  alternatives_spanish:
  - el Señor, nuestro Dios
  - nuestro Dios Yahvé
  lexicon: project default for YHWH / κύριος
  rationale: Aunque el griego dice κύριος, aquí el contexto del nombre divino permite explicitar 'Yahvé' según el criterio del proyecto para יהוה. Se conserva 'nuestro Dios' para reflejar el genitivo posesivo y el tono confesional.
- source_word: ἀπειληθῆναι
  english_pob_choice: to be threatened
  chosen_spanish: ser amenazado
  alternatives_spanish:
  - ser intimidado
  - ser presionado con amenazas
  lexicon: LSJ
  rationale: '''Ser amenazado'' es la correspondencia más directa y natural en español. Mantiene el contraste entre la soberanía divina y la presión humana.'
- source_word: διαπεισθῆναι
  english_pob_choice: to be persuaded
  chosen_spanish: ser persuadido
  alternatives_spanish:
  - ser convencido
  - dejarse persuadir
  - ser llevado a ceder
  lexicon: LSJ
  rationale: '''Ser persuadido'' reproduce con claridad el paralelismo del griego. Aunque ''convencido'' suena más idiomático, ''persuadido'' preserva mejor la forma del argumento.'
- source_word: υἱὸς ἀνθρώπου
  english_pob_choice: a son of man
  chosen_spanish: un hijo de hombre
  alternatives_spanish:
  - un ser humano
  - un hombre
  lexicon: LSJ
  rationale: Se mantiene la expresión semítica de forma bastante literal, como en el audit trail inglés. Así se conserva el paralelismo retórico con 'como un hombre' y se evita imponer un sentido mesiánico ajeno al contexto.
theological_decisions:
- issue: Contraste Dios/humanidad y posibilidad de presión
  english_pob_reading: Render the statement as a denial that God can be pressured or swayed like a human.
  chosen_spanish_reading: Presentar la frase como una negación de que Dios pueda ser amenazado o persuadido como un ser humano.
  alternative_spanish_readings:
  - Dios no es como un humano que pueda ser manipulado
  - Dios no se deja intimidar ni convencer como los hombres
  rationale: El griego formula dos infinitivos pasivos en paralelo y contrasta explícitamente a Dios con el ser humano. La redacción española conserva esa tensión sin suavizarla en una paráfrasis doctrinal más amplia.
  doctrine_reference: Mantener la tensión teológica; equivalencia óptima.
translation_notes:
  revision_awareness: El texto base y el control cruzado indican alta concordancia y ninguna revisión aplicada; esta versión conserva el sentido del audit trail inglés, explicitando el nombre divino según la convención del proyecto y manteniendo la imagen de garantía/prenda.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre 'amenazado' y 'persuadido' para reflejar el paralelismo griego.
  - '''Yahvé'' se usa como forma principal para el nombre divino conforme al proyecto; se preserva ''nuestro Dios''.'
  - '''Un hijo de hombre'' se conserva para mantener la expresión semítica y su valor retórico.'
  - No se sustituyó 'garantía' por una paráfrasis más general como 'prueba' o 'condición', para no perder la metáfora económica del griego.
