translation:
  language: es
  text: La palabra que vino a Yirmeyahu de parte de Yahvé, diciendo,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הַדָּבָר
  english_pob_choice: The word
  chosen_spanish: La palabra
  alternatives_spanish:
  - El mensaje
  - Esta palabra
  lexicon: HALOT
  rationale: דָּבָר puede significar 'palabra', 'asunto' o 'mensaje'. En los encabezados proféticos, 'la palabra' conserva la fórmula revelacional y suena natural en español sin reducirla indebidamente a 'mensaje'.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: HALOT
  rationale: La partícula relativa se expresa de forma natural con 'que' en español, manteniendo la subordinación simple del hebreo.
- source_word: הָיָה
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - fue
  - sucedió
  lexicon: HALOT
  rationale: Aunque el verbo hebreo literalmente es 'fue/estuvo', en esta fórmula profética la idea es que la palabra llegó a Jeremías; 'vino' preserva la recepción de la revelación sin sonar mecánico.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición direccional se traduce con el equivalente español simple 'a'.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Yirmeyahu
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Yirmeyahu
  lexicon: N/A
  rationale: En español bíblico, el nombre profético es inteligible y reconocible como 'Jeremías'; aquí se mantiene la forma tradicional para claridad lectora en castellano.
- source_word: מֵאֵת
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - de parte de
  lexicon: HALOT
  rationale: La preposición compuesta señala origen. En español, 'de Yahvé' comunica de modo natural el origen divino del mensaje sin perder la relación fuente-donante.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT / doctrina del Tetragrámaton
  rationale: Se conserva el nombre divino personal en la forma española 'Yahvé', siguiendo la política del proyecto de no sustituirlo por un título como 'SEÑOR'.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - 'diciendo:'
  - y dijo
  lexicon: HALOT
  rationale: El infinitivo introduce el discurso siguiente. 'Diciendo,' preserva la función marcadora del hebreo y concuerda con la puntuación formal del texto base.
theological_decisions:
- issue: Renderizar el nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Para mantener la transparencia del original y la audibilidad del nombre de pacto, se emplea 'Yahvé' en el texto principal, en lugar de una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH'
- issue: Fórmula profética de procedencia revelacional
  english_pob_reading: The word that came to Yirmeyahu from Yahweh, saying,
  chosen_spanish_reading: La palabra que vino a Jeremías de Yahvé, diciendo,
  alternative_spanish_readings:
  - La palabra que llegó a Jeremías de Yahvé, diciendo,
  - La palabra que fue a Jeremías de Yahvé, diciendo,
  rationale: La construcción hebrea expresa que la palabra divina llegó al profeta. 'Vino' conserva esa idea de recepción revelacional y evita una paráfrasis demasiado libre.
  doctrine_reference: Uso profético de דָּבָר + הָיָה + אֶל
translation_notes:
  revision_awareness: 'El inglés auditado fue revisado para mejorar la puntuación final: se prefirió coma tras ''saying'' en vez de dos puntos. La versión española sigue esa pauta con coma final en ''diciendo,'' para introducir de manera natural la continuación del discurso.'
  spanish_consistency_notes:
  - Se mantuvo la terminología del nombre divino como 'Yahvé', coherente con el proyecto.
  - Se tradujo la fórmula profética con una sintaxis española natural sin perder el sentido de origen revelacional.
  - No se añadieron notas al pie porque en este versículo no surgió una ambigüedad textual adicional que el español necesitara marcar.
