translation:
  language: es
  text: 'Maldito sea el que se acueste con la mujer de su padre[a], porque ha descubierto la falda de su padre[b]. Y todo el pueblo dirá: «Amén».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión 'la mujer de su padre' puede, por el contexto, referirse a su madrastra, pero el hebreo no usa ese término de manera explícita.
    reason: lexical_alternative
  - marker: b
    text: Lit. 'la falda de su padre'; el hebreo usa un eufemismo sexual relacionado con el lenguaje de Levítico 18:8 y 20:11. Otra posible lectura es 'ha descubierto la desnudez de su padre'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  english_pob_choice: Cursed
  chosen_spanish: Maldito sea
  alternatives_spanish:
  - Cursado sea
  - Sea maldito
  lexicon: HALOT
  rationale: La fórmula de maldición del pacto se expresa con una construcción natural y solemne en español. 'Maldito sea' conserva el tono jurídico-litúrgico sin sonar artificial.
- source_word: שֹׁכֵב עִם
  english_pob_choice: lies with
  chosen_spanish: se acueste con
  alternatives_spanish:
  - tenga relaciones con
  - duerma con
  lexicon: HALOT
  rationale: El hebreo usa un eufemismo sexual. 'Se acueste con' mantiene el registro idiomático y legal, y preserva mejor la imagen que una paráfrasis más explícita.
- source_word: אֵשֶׁת אָבִיו
  english_pob_choice: his father's wife
  chosen_spanish: la mujer de su padre
  alternatives_spanish:
  - la esposa de su padre
  - su madrastra
  lexicon: HALOT
  rationale: '''La mujer de su padre'' sigue de cerca la estructura hebrea sin añadir una especificación interpretativa. ''Esposa'' y ''madrastra'' serían más interpretativas que el original.'
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la maldición de manera directa y natural en español, conservando la fuerza causal del hebreo.
- source_word: גִלָּה
  english_pob_choice: has uncovered
  chosen_spanish: ha descubierto
  alternatives_spanish:
  - ha desnudado
  - ha expuesto
  lexicon: HALOT
  rationale: El verbo hebreo participa del eufemismo sexual 'descubrir desnudez/covering'. 'Ha descubierto' mantiene el paralelismo bíblico en español y el valor figurado.
- source_word: כְּנַף אָבִיו
  english_pob_choice: his father's covering
  chosen_spanish: la falda de su padre
  alternatives_spanish:
  - el cobertor de su padre
  - la cobertura de su padre
  - la desnudez de su padre
  lexicon: HALOT
  rationale: כָּנָף puede significar 'ala, borde, esquina, faldón'. En este contexto el inglés POB revisado prefirió 'skirt' para reflejar más directamente la imagen idiomática. 'Falda' en español conserva esa imagen de borde/colgadura sin convertirla en una interpretación demasiado abstracta.
- source_word: וְאָמַר כָּל הָעָם
  english_pob_choice: And all the people shall say
  chosen_spanish: Y todo el pueblo dirá
  alternatives_spanish:
  - Entonces todo el pueblo dirá
  - Y todo el pueblo responderá
  lexicon: HALOT
  rationale: La fórmula de respuesta comunitaria se puede expresar con futuro simple en español para un tono litúrgico solemne. 'Dirá' mantiene la sencillez del original.
- source_word: אָמֵן
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  - Verdaderamente
  lexicon: HALOT
  rationale: Se conserva la transliteración tradicional de la respuesta litúrgica, que es también la forma estándar y más reconocible en español.
theological_decisions:
- issue: Eufemismo sexual y lenguaje legal-covenantal
  english_pob_reading: Preserve the metaphor with 'has uncovered his father's skirt' rather than replacing it with an explicit interpretive paraphrase.
  chosen_spanish_reading: Preservar la metáfora con 'ha descubierto la falda de su padre' en vez de sustituirla por una paráfrasis explícita.
  alternative_spanish_readings:
  - ha descubierto la desnudez de su padre
  - ha violado el lecho de su padre
  rationale: El texto alude a la fórmula de prohibiciones sexuales de la Torá y conviene mantener la textura intertextual en vez de aplanarla. 'Falda' refleja la imagen de כָּנָף sin resolver por completo su alcance semántico, dejando visible la tensión del hebreo.
  doctrine_reference: Principios de equivalencia óptima y preservación del registro legal bíblico
translation_notes:
  revision_awareness: El borrador sigue la revisión reciente del POB inglés que favoreció 'skirt' sobre 'covering' para כְּנַף, conservando la imagen idiomática en español mediante 'falda'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - '''Amén'' se conserva sin traducir como respuesta litúrgica fija.'
  - Se evita 'siervo' porque el hebreo no contiene δοῦλος; el pasaje trata de un tabú sexual con fórmula de maldición.
  - '''La mujer de su padre'' sigue la literalidad hebrea sin imponer ''madrastra'' en el texto principal.'
