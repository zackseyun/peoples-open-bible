translation:
  language: es
  text: Escarba[a] en el valle y se regocija en su fuerza; sale al encuentro de las armas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cava en el valle» o «patea el suelo en el valle». El verbo hebreo es literalmente «cavar», usado aquí del movimiento de las pezuñas del caballo.
    reason: lexical_alternative
  - marker: b
    text: O «al encuentro de la batalla». El sustantivo hebreo puede denotar armas o armamento en conjunto y, por extensión, el conflicto armado mismo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחְפְּרוּ
  english_pob_choice: paws
  chosen_spanish: Escarba
  alternatives_spanish:
  - Araña
  - Escarba con las pezuñas
  - Patea el suelo
  lexicon: HALOT
  rationale: El hebreo חפר significa literalmente “cavar”, pero en el contexto del caballo expresa el movimiento de escarbar o raspar con las pezuñas. “Escarba” conserva la imagen concreta y el matiz físico sin introducir un giro más interpretativo que el hebreo.
- source_word: בָעֵמֶק
  english_pob_choice: in the valley
  chosen_spanish: en el valle
  alternatives_spanish:
  - en el hondonal
  - en la llanura
  lexicon: HALOT
  rationale: עֵמֶק denota un valle o depresión del terreno. “En el valle” es la equivalencia más directa y natural en español.
- source_word: וְיָשִׂישׂ
  english_pob_choice: and rejoices
  chosen_spanish: y se goza
  alternatives_spanish:
  - y se regocija
  - y se alegra
  lexicon: HALOT
  rationale: שׂוּשׂ expresa gozo, júbilo o regocijo. “Se goza” mantiene un tono bíblico claro en español y comunica el deleite del caballo sin perder naturalidad.
- source_word: בְּכֹחַ
  english_pob_choice: in its strength
  chosen_spanish: en su fuerza
  alternatives_spanish:
  - con su fuerza
  - por su fuerza
  - en la fuerza que tiene
  lexicon: HALOT
  rationale: 'La preposición ב con כֹּחַ puede entenderse como esfera o situación: el animal se deleita en su propia fuerza. “En su fuerza” preserva la construcción hebrea y el sentido de la fuente.'
- source_word: יֵצֵא
  english_pob_choice: it goes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale afuera
  - sale al exterior
  - avanza
  lexicon: HALOT
  rationale: יָצָא es el verbo común “salir”. “Sale” es suficiente y fiel; “avanza” añadiría una intensidad que el verbo por sí solo no exige.
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: al encuentro de
  alternatives_spanish:
  - para encontrar
  - hacia el encuentro con
  - a enfrentarse con
  lexicon: HALOT
  rationale: לקראת expresa dirigirse al encuentro de algo o alguien. “Al encuentro de” refleja bien el valor relacional y de aproximación del hebreo.
- source_word: נָשֶׁק
  english_pob_choice: the weapons
  chosen_spanish: las armas
  alternatives_spanish:
  - las armas de guerra
  - el armamento
  - la batalla
  lexicon: HALOT
  rationale: נָשֶׁק puede referirse al armamento o a las armas en conjunto. “Las armas” conserva el sentido concreto y permite la nota alternativa donde el término puede extenderse a la batalla.
theological_decisions:
- issue: El valor de נָשֶׁק entre armamento y conflicto armado
  english_pob_reading: Or 'to meet the battle.' The Hebrew noun can denote weaponry or arms collectively, and by extension the armed conflict itself.
  chosen_spanish_reading: “las armas”, con posibilidad de entender por extensión el combate
  alternative_spanish_readings:
  - “la batalla”
  - “el combate”
  - “el armamento”
  rationale: El término hebreo nombra primero armas/armamento, y solo por extensión puede referirse al conflicto. Mantener “las armas” conserva el sentido más concreto del texto y deja abierta la extensión semántica sin borrarla.
  doctrine_reference: Lexical and semantic range of נָשֶׁק in Hebrew military usage
translation_notes:
  revision_awareness: Se mantuvo el sentido estable del pasaje sin cambios de revisión aplicados; la redacción sigue de cerca el hebreo y conserva la ambigüedad documentada de נָשֶׁק mediante nota.
  spanish_consistency_notes:
  - Se usó “Yahvé” solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefirió el verbo simple “sale” para יֵצֵא, evitando intensificar indebidamente la escena.
  - “Se goza” preserva el matiz de júbilo de שׂוּשׂ con un tono bíblico natural en español.
  - “Las armas” conserva la concreción militar indicada por el audit trail inglés y permite la extensión a “batalla” sin imponerla en el texto principal.
