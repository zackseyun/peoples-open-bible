translation:
  language: es
  text: 'Y dijo Ornan a David: «Tómalo para ti, y que mi señor el rey haga lo que es bueno a sus ojos[a]. Mira, he dado los bueyes[b] para holocaustos, y los trillos para la leña[c], y el trigo para la ofrenda vegetal[d]. Lo he dado todo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «lo que es bueno a sus ojos»; se conserva el modismo hebreo para dejar visible la imagen original.
    reason: source_note
  - marker: b
    text: La palabra hebrea puede referirse específicamente a bueyes; aquí se traduce con «bueyes» por el contexto de animales de tiro y trilla.
    reason: lexical_alternative
  - marker: c
    text: Los trillos se ofrecen aquí como leña, es decir, como combustible para el sacrificio.
    reason: cultural_note
  - marker: d
    text: «Ofrenda vegetal» traduce la ofrenda sacrificial de cereal; otras posibilidades son «ofrenda de cereal» u «ofrenda de grano».
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח לָךְ
  english_pob_choice: Take it for yourself
  chosen_spanish: Tómalo para ti
  alternatives_spanish:
  - Tómalo
  - Tómalo para ti mismo
  lexicon: HALOT
  rationale: El imperativo con לָךְ expresa apropiación personal; «para ti» conserva ese matiz sin sonar forzado en español.
- source_word: וְיַעַשׂ אֲדֹנִי הַמֶּלֶךְ הַטּוֹב בְּעֵינָיו
  english_pob_choice: and let my lord the king do what is good in his eyes
  chosen_spanish: y que mi señor el rey haga lo que es bueno a sus ojos
  alternatives_spanish:
  - y que mi señor el rey haga lo que le parezca bueno
  - y que mi señor el rey haga lo que es bueno en su vista
  lexicon: HALOT
  rationale: Se mantiene el modismo hebreo «lo que es bueno a sus ojos» para no perder la transparencia formal del original; en español suena comprensible y preserva la imagen idiomática.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi amo el rey
  - mi señor, el rey
  lexicon: HALOT
  rationale: Es un tratamiento cortesano hacia David, no un título divino. «Mi señor el rey» refleja el registro real y respetuoso.
- source_word: הַטּוֹב בְּעֵינָיו
  english_pob_choice: what is good in his eyes
  chosen_spanish: lo que es bueno a sus ojos
  alternatives_spanish:
  - lo que le parezca bueno
  - lo que es recto a su juicio
  lexicon: HALOT
  rationale: La frase se conserva casi literalmente porque el hebreo usa un modismo visual/judicial. En español, «a sus ojos» comunica bien la evaluación personal implícita.
- source_word: רְאֵה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Ve
  lexicon: HALOT
  rationale: «Mira» funciona de forma natural como introducción enfática y mantiene la fuerza discursiva del hebreo.
- source_word: הַבָּקָר
  english_pob_choice: the oxen
  chosen_spanish: los bueyes
  alternatives_spanish:
  - los toros
  - el ganado vacuno
  lexicon: HALOT
  rationale: Se eligió «bueyes» porque el contexto de trillo y ofrenda remite con más precisión a animales de tiro; en español comunica el valor concreto del término sin forzar una abstracción colectiva.
- source_word: לָעֹלוֹת
  english_pob_choice: for burnt offerings
  chosen_spanish: para holocaustos
  alternatives_spanish:
  - para ofrendas quemadas
  - para sacrificios totalmente quemados
  lexicon: HALOT
  rationale: «Holocaustos» es el equivalente cultual tradicional y exacto para עֹלוֹת en español bíblico, y evita una perífrasis menos establecida.
- source_word: הַמּוֹרִגִּים לָעֵצִים
  english_pob_choice: the threshing sledges for wood
  chosen_spanish: los trillos para la leña
  alternatives_spanish:
  - los trillos para madera
  - los utensilios de trillar para leña
  lexicon: HALOT
  rationale: «Trillos» traduce el implemento de trilla; «para la leña» expresa la función de combustible que la nota inglesa explicita. «Leña» es más natural que «madera» en español para este contexto.
- source_word: וְהַחִטִּים לַמִּנְחָה
  english_pob_choice: and the wheat for the grain offering
  chosen_spanish: y el trigo para la ofrenda vegetal
  alternatives_spanish:
  - y el trigo para la ofrenda de cereal
  - y el trigo para la ofrenda de grano
  lexicon: HALOT
  rationale: Se evita «grano» como término demasiado general y «vegetal» refleja la terminología cultual usada en español bíblico para מִנְחָה; conserva además la distinción entre el cereal ofrecido y el acto sacrificial.
- source_word: הַכֹּל נָתָתִּי
  english_pob_choice: I have given it all
  chosen_spanish: Todo lo he dado
  alternatives_spanish:
  - Lo he dado todo
  - He dado todo
  lexicon: HALOT
  rationale: La inversión es natural en español y mantiene el carácter totalizador del perfecto hebreo; la formulación es solemne y clara.
theological_decisions:
- issue: Renderización de מִנְחָה en contexto sacrificial
  english_pob_reading: grain offering
  chosen_spanish_reading: ofrenda vegetal
  alternative_spanish_readings:
  - ofrenda de cereal
  - ofrenda de grano
  rationale: El término hebreo puede ser más amplio que «grano» y en la tradición bíblica española «ofrenda vegetal» funciona como equivalente cultual establecido. Evita reducir el sentido a una materia prima genérica y mantiene el valor sacrificial específico.
  doctrine_reference: Levítico 2; HALOT/uso cultual en español bíblico
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que precisó «oxen» frente a «cattle»; en español se optó por «bueyes» para ajustar mejor el referente concreto del hebreo y la escena de la trilla, sin perder la función sacrificial. También se respetó la lectura idiomática de «what is good in his eyes» y la equivalencia cultual de מִנְחָה.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma de nombre divino cuando aparezca en el contexto inmediato, aunque en este versículo no figura.
  - «Mi señor el rey» conserva el registro cortesano y evita introducir lenguaje eclesiástico ajeno al hebreo.
  - Se prefirió «holocaustos» para עֹלוֹת por ser el término cultual español más preciso y estable.
  - «Ofrenda vegetal» se usa como término técnico de sacrificio, no en sentido botánico moderno.
