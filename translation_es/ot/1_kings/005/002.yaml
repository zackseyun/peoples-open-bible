    text: 'Hebreo: ''pan''; aquí se usa en un sentido más amplio de provisión alimentaria para la casa de Salomón.'
    reason: lexical_alternative
  - marker: b
    text: Un cor era una gran medida de volumen para productos secos. El hebreo lee 'treinta cors' y 'sesenta cors'.
    reason: cultural_note
  revision_rationale: Se ajusta el español para conservar mejor la distinción léxica del hebreo entre סֹלֶת y קָמַח, usando 'harina fina' frente a 'harina común', que resulta más claro y natural que 'flor de harina' frente a 'harina'. También se simplifica levemente la sintaxis. Se mantiene la nota sobre לֶחֶם y la nota cultural sobre 'cor'.
