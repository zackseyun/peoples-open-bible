translation:
  language: es
  text: 'El que sea simple, que entre aquí; y al que le falta entendimiento[a], ella le dice:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «falto de corazón». En Proverbios, «corazón» suele referirse al entendimiento, el juicio o el discernimiento interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Whoever
  chosen_spanish: ¿Quién…?
  alternatives_spanish:
  - Quienquiera que
  - El que
  lexicon: HALOT
  rationale: 'El hebreo usa מִי de manera idiomática para introducir una invitación general. En español, una pregunta retórica con valor general es natural: «¿Quién es simple…?»; los puntos suspensivos acompañan el giro proverbial y mantienen el tono de convocatoria.'
- source_word: פֶתִי
  english_pob_choice: simple
  chosen_spanish: simple
  alternatives_spanish:
  - naive
  - inexperto
  - ingenuo
  lexicon: HALOT
  rationale: En Proverbios, פתי designa al ingenuo o fácilmente engañable, no solo al poco inteligente. «Simple» conserva la categoría sapiencial y la amplitud semántica tradicional sin volverlo técnico.
- source_word: יָסֻר הֵנָּה
  english_pob_choice: let him turn in here
  chosen_spanish: que se aparte para acá
  alternatives_spanish:
  - que entre aquí
  - que vuelva acá
  - que se desvíe para acá
  lexicon: HALOT
  rationale: סור expresa apartarse o desviarse en dirección a un lugar. «Se aparte para acá» conserva el movimiento direccional y suena natural en español; «aquí» puede añadirse implícitamente, pero «para acá» mantiene la invitación de cercanía del deíctico הֵנָּה.
- source_word: חֲסַר לֵב
  english_pob_choice: him who lacks sense
  chosen_spanish: al que le falta entendimiento
  alternatives_spanish:
  - al que carece de corazón
  - al sensato que no entiende
  - al falto de juicio
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «falto de corazón», donde corazón implica entendimiento, juicio o discernimiento. En español, «entendimiento» comunica ese sentido sapiencial sin perder la metáfora de capacidad interior; la nota conserva la alternativa literal.
- source_word: וְאָמְרָה לוֹ
  english_pob_choice: she says
  chosen_spanish: ella le dice
  alternatives_spanish:
  - ella dice
  - ella dijo a él
  - le dice
  lexicon: HALOT
  rationale: El imperfecto/narrativo femenino introduce el habla de la mujer/Folía en discurso proverbial. «Ella le dice» respeta el tiempo presente discursivo de la POB y mantiene el dativo explícito «le» para el destinatario.
translation_notes:
  revision_awareness: Coincide sustancialmente con el inglés POB y el texto hebreo. Se conserva la fuerza proverbial de la invitación, el valor idiomático de פתי y la metáfora sapiencial de «corazón» mediante una equivalencia funcional en español, con nota para la lectura literal.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u այլ terminología no pertinente, dado que el versículo no contiene el nombre divino.
  - Se prefirió «entendimiento» frente a «corazón» en el cuerpo principal para no oscurecer el sentido idiomático en español; la nota preserva la tensión literal.
  - Se mantuvo un estilo publicable y bíblico sin arcaísmos innecesarios, pero sin suavizar el llamado sapiencial.
