revisions:
- from: 'Entonces me dijo[a]: «Hijo de hombre, por favor, perfora el muro». Así perforé el muro, y he aquí que había una abertura.'
  to: 'Entonces me dijo[a]: «Hijo de hombre, por favor, abre brecha en el muro». Así abrí brecha en el muro, y he aquí que había una abertura.'
  rationale: Se ajusta el verbo principal para reflejar mejor חתר en el contexto de una pared y para sonar más natural en español. Se conserva el matiz de ruego con ‘por favor’, la viveza discursiva con ‘he aquí’, y la nota léxica alternativa, ahora más alineada con el hebreo y con el texto español. No se requiere adjudicación adicional.
