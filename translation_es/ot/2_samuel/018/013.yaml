- from: O si yo hubiera procedido falsamente contra su vida, y nada se le oculta al rey, tú mismo habrías quedado apartado[a].
  to: O si yo hubiera procedido falsamente contra su vida —y nada se le oculta al rey—, tú mismo te habrías mantenido apartado[a].
  rationale: Se ajusta únicamente la cláusula final para reflejar mejor el valor activo de תִּתְיַצֵּב y el matiz contextual de מִנֶּגֶד. 'Te habrías mantenido apartado' conserva el sentido preferido del POB ('stood aloof') en un español natural, mientras la nota preserva la alternativa 'ponerse contra mí'. También se mejora levemente la puntuación con rayas para seguir el énfasis del inglés auditado.
