translation:
  language: es
  text: Pero, como el joven no prestaba atención en absoluto, el rey mandó llamar a la madre y la instó a que fuera consejera del muchacho para ponerlo a salvo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para su seguridad», «para su preservación» o «para su salvación». El griego σωτηρία puede abarcar una gama de sentidos desde preservación física hasta liberación más amplia; aquí el contexto inmediato favorece preservar su vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ δὲ νεανίου
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el joven hombre
  lexicon: LSJ
  rationale: νεανίας/νεανίου designa a un joven; en español, «el joven» es natural y suficientemente preciso, sin añadir información no explícita.
- source_word: μηδαμῶς προσέχοντος
  english_pob_choice: was paying no attention at all
  chosen_spanish: no le prestaba ninguna atención
  alternatives_spanish:
  - no escuchaba en absoluto
  - no hacía ningún caso
  lexicon: LSJ
  rationale: La frase expresa una negativa total a atender. «No le prestaba ninguna atención» transmite bien la intensidad de μηδαμῶς y suena idiomático en español.
- source_word: προσκαλεσάμενος
  english_pob_choice: called ... to him
  chosen_spanish: llamó a la madre
  alternatives_spanish:
  - la hizo llamar
  - la convocó
  lexicon: LSJ
  rationale: El participio medio indica que el rey la hizo venir a su presencia. En español, «llamó a la madre» conserva la acción sin forzar una construcción demasiado formal.
- source_word: παρῄνει
  english_pob_choice: urged
  chosen_spanish: la instó
  alternatives_spanish:
  - la exhortó
  - la aconsejó
  lexicon: LSJ
  rationale: παραινέω puede significar exhortar, aconsejar o instar. «La instó» refleja mejor la presión persuasiva del rey en este contexto.
- source_word: γενέσθαι τοῦ μειρακίου σύμβουλον
  english_pob_choice: to become an adviser to the youth
  chosen_spanish: a convertirse en consejera del joven
  alternatives_spanish:
  - a actuar como consejera del joven
  - a darle consejo al joven
  lexicon: LSJ
  rationale: La construcción expresa llegar a ser/servir como consejero. «Concejera» concuerda con «la madre» y «del joven» preserva la distinción lexical entre νεανίου y μειρακίου.
- source_word: ἐπὶ σωτηρία
  english_pob_choice: for his safety
  chosen_spanish: para su seguridad
  alternatives_spanish:
  - para su salvación
  - para su preservación
  - para salvarle la vida
  lexicon: LSJ
  rationale: σωτηρία puede abarcar seguridad, rescate, preservación o salvación. Aquí el contexto inmediato es la conservación de la vida del joven; «para su seguridad» mantiene la amplitud sin imponer un sentido doctrinal.
theological_decisions:
- issue: Rango semántico de σωτηρία en un contexto de martirio
  english_pob_reading: for his safety
  chosen_spanish_reading: para su seguridad
  alternative_spanish_readings:
  - para su salvación
  - para su preservación
  - para salvarle la vida
  rationale: El rey busca persuadir a la madre para que incline al joven a ceder y así evitar su muerte. En español, «seguridad» comunica el sentido práctico de resguardo inmediato, dejando abierta la amplitud de σωτηρία sin teologizarla.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve lexical/theological tension rather than importing later doctrinal sense where the context is temporal rescue.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail al preferir un equivalente natural para ἐπὶ σωτηρία, pero en español se optó por «para su seguridad» por ser la opción más fluida y contextual en la oración completa. Se mantuvo la estructura narrativa y la distinción entre νεανίου y μειρακίου.
  spanish_consistency_notes:
  - Se mantuvo «joven» para νεανίου y «del joven» para μειρακίου, distinguiendo los dos términos griegos sin sobreinterpretar.
  - Se evitó «Cristo», «SEÑOR» u otra terminología no pertinente; el versículo no contiene vocabulario explícitamente cristológico o divino.
  - «Consejera» concuerda con «la madre» y respeta el valor funcional de σύμβουλον como asesoramiento persuasivo.
