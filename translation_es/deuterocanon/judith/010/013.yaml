    reason: lexical_alternative
  revision_rationale: Se corrige «sus fuerzas» a «vuestras fuerzas» para reflejar ὑμῶν con fidelidad al interlocutor del discurso. También se mejora la claridad partitiva con «de entre sus hombres» y se reubica/ajusta la nota sobre «carne» para que corresponda exactamente a la expresión griega preservada por el POB inglés.
