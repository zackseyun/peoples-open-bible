translation:
  language: es
  text: Miren, hoy yo voy por el camino de toda la tierra[a], y ustedes saben con todo su corazón y con toda su alma que no ha fallado ni una sola cosa de todas las buenas cosas que Yahvé su Dios habló acerca de ustedes. Todas han venido a ustedes; de ellas no ha fallado ni una sola cosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «el camino de toda la tierra» es un hebraísmo que alude al destino común de todos, especialmente la muerte.
    reason: cultural_note
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y mira[a]
  alternatives_spanish:
  - Y he aquí
  - Y mira
  lexicon: HALOT
  rationale: Se conserva la función discursiva de llamar la atención al inicio de la afirmación. En español, «mira» comunica esa interpelación solemne con menos arcaísmo que «he aquí», manteniendo el tono elevado sin mecanicismo.
- source_word: אָנֹכִי הוֹלֵךְ הַיּוֹם
  english_pob_choice: today I am going
  chosen_spanish: hoy yo voy
  alternatives_spanish:
  - hoy estoy yendo
  - hoy me voy
  lexicon: HALOT
  rationale: El participio con marcador temporal expresa una salida inminente. «Voy» conserva la imagen hebrea de movimiento y evita sobreexplicar como muerte explícita; el contexto idiomático ya lo sugiere.
- source_word: בְּדֶרֶךְ כָּל הָאָרֶץ
  english_pob_choice: the way of all the earth
  chosen_spanish: por el camino de toda la tierra
  alternatives_spanish:
  - por el camino de toda la humanidad
  - por el destino común de toda la tierra
  lexicon: HALOT
  rationale: Se mantiene el giro idiomático y su dignidad literaria. «Camino de toda la tierra» refleja la metáfora hebrea tradicional de la muerte común de todos, sin convertirla en una paráfrasis interpretativa.
- source_word: וִידַעְתֶּם
  english_pob_choice: you know
  chosen_spanish: ustedes saben
  alternatives_spanish:
  - ustedes han sabido
  - ustedes deben saber
  lexicon: HALOT
  rationale: En este contexto la forma verbal funciona como reconocimiento asentado en la experiencia. «Saben» es natural en español y conserva el tono exhortativo y de certeza compartida.
- source_word: בְּכָל לְבַבְכֶם וּבְכָל נַפְשְׁכֶם
  english_pob_choice: with all your heart and with all your soul
  chosen_spanish: con todo su corazón y con toda su alma
  alternatives_spanish:
  - con todo su ser y con toda su vida
  - con todo su interior y con toda su alma
  lexicon: HALOT
  rationale: Se conservan los términos antropológicos bíblicos «corazón» y «alma», que en español bíblico son claros y transmiten la totalidad de la persona sin diluir la imagen.
- source_word: לֹא נָפַל דָּבָר אֶחָד
  english_pob_choice: not one thing has failed
  chosen_spanish: no ha fallado ni una sola cosa
  alternatives_spanish:
  - no ha caído ni una sola cosa
  - no ha faltado ni una sola cosa
  lexicon: HALOT
  rationale: El hebreo usa el verbo «caer» en sentido idiomático de fallar o no cumplirse. En español, «fallado» expresa con naturalidad la idea de incumplimiento; «cosa» sigue la revisión inglesa que privilegia דָּבָר como «thing» en este contexto.
- source_word: מִכֹּל הַדְּבָרִים הַטּוֹבִים
  english_pob_choice: from all the good things
  chosen_spanish: de todas las buenas cosas
  alternatives_spanish:
  - de todas las buenas palabras
  - de todas las buenas promesas
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa que corrigió la tendencia a «words» y destacó el valor de דָּבָר aquí como «things/ matters». En español, «buenas cosas» comunica de modo claro y suficientemente literal el conjunto de beneficios/promesas cumplidas.
- source_word: אֲשֶׁר דִּבֶּר יְהוָה אֱלֹהֵיכֶם עֲלֵיכֶם
  english_pob_choice: that Yahweh your God spoke concerning you
  chosen_spanish: que Yahvé su Dios habló acerca de ustedes
  alternatives_spanish:
  - que Yahvé su Dios habló a ustedes
  - que Yahvé su Dios prometió acerca de ustedes
  lexicon: HALOT
  rationale: «Acerca de ustedes» reproduce el valor de עַל como referencia a lo dicho respecto del pueblo. Se conserva «Yahvé» por la convención del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, evitando la sustitución por «Señor» y manteniendo la transparencia del nombre divino.
- source_word: הַכֹּל בָּאוּ לָכֶם
  english_pob_choice: All of them have come to you
  chosen_spanish: Todas han venido a ustedes
  alternatives_spanish:
  - Todas han llegado a ustedes
  - Todas les han venido
  lexicon: HALOT
  rationale: El plural colectivo vuelve sobre las cosas/buenas palabras mencionadas. «Han venido» conserva la imagen de llegada o cumplimiento sin añadir una explicación demasiado interpretativa.
- source_word: לֹא נָפַל מִמֶּנּוּ דָּבָר אֶחָד
  english_pob_choice: not one thing of them has failed
  chosen_spanish: no ha fallado de ellas ni una sola cosa
  alternatives_spanish:
  - no se ha caído de ellas ni una sola cosa
  - no ha fallado de ellos ni una sola cosa
  lexicon: HALOT
  rationale: La repetición hebrea reafirma la ausencia total de fracaso. En español, «de ellas» retoma naturalmente el antecedente femenino plural de «cosas», y «ni una sola cosa» preserva la fuerza enfática del original.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo contiene el nombre propio del pacto, no un título genérico. Mantener «Yahvé» conserva la transparencia del original y la coherencia con el estándar del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido idiomático de 'el camino de toda la tierra'
  english_pob_reading: a Hebrew idiom for the common destiny of all people, especially death
  chosen_spanish_reading: un hebraísmo que alude al destino común de todos, especialmente la muerte
  alternative_spanish_readings:
  - una referencia directa a la muerte
  - el destino común de toda la humanidad
  rationale: Se mantiene la metáfora en el texto principal, porque el hebreo la usa de forma literaria. La equivalencia idiomática se deja implícita para no borrar el matiz poético y solemne.
  doctrine_reference: Uso idiomático bíblico; no implica una doctrina particular, sino una decisión de preservación metafórica
- issue: Repetición de la negación total ('no ha fallado... no ha fallado')
  english_pob_reading: not one thing has failed ... not one thing of them has failed
  chosen_spanish_reading: no ha fallado ni una sola cosa ... no ha fallado de ellas ni una sola cosa
  alternative_spanish_readings:
  - no ha faltado ni una sola cosa
  - no se ha incumplido ni una sola cosa
  rationale: Se conserva la duplicación enfática presente en el hebreo y en la revisión inglesa. La primera cláusula afirma la ausencia de fracaso; la segunda lo reafirma sobre el conjunto ya mencionado, sin suavizar la intensificación retórica.
  doctrine_reference: Principio de fidelidad divina a la palabra pronunciada; coherente con el énfasis bíblico en el cumplimiento total de la palabra de Yahvé
translation_notes:
  revision_awareness: La revisión inglesa más reciente desplazó 'word/words' hacia 'thing/things' para reflejar mejor דָּבָר en este contexto y reforzó la lectura de cumplimiento total. La versión española sigue esa revisión con «cosa(s)» en vez de «palabra(s)», mantiene la metáfora de «caer/fallar» con una formulación natural en español y conserva la repetición enfática del versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se conserva la dupla bíblica «corazón/alma» para לֵבָב / נֶפֶשׁ.
  - Se evita traducir el hebraísmo idiomático por una simple paráfrasis de muerte en el texto principal, dejando la explicación en nota.
  - Se refleja la revisión lexical sobre דָּבָר con «cosa(s)», no con «palabra(s)».
  - Se mantiene un registro reverente y publicable, con sintaxis natural en español latinoamericano.
