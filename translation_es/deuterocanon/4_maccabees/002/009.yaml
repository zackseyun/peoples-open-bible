revisions:
- from: 'Y aun si alguien es avaro[a], está dominado por la ley por medio de la razón, sin recoger los restos de la cosecha ni volver a pasar por las viñas. Y también en las demás cosas se puede reconocer esto: que la razón domina sobre las pasiones.'
  to: 'Y aun si alguien es avaro, es refrenado por la ley por medio de la razón, sin recoger lo que quedó sin cosechar ni volver a pasar por las viñas[a]. Y también en las demás cosas se puede reconocer esto: que la razón domina sobre las pasiones.'
  rationale: Se ajusta el verbo principal para reflejar mejor el pasivo κρατεῖται ('es refrenado'), se precisa la imagen agrícola de ἀμήτους como 'lo que quedó sin cosechar', y se reubica la nota léxica al verbo raro de las viñas, en línea con la auditoría inglesa.
