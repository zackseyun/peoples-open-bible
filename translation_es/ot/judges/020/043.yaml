base_translation:
  language: en
  yaml_path: translation/ot/judges/020/043.yaml
  text: They surrounded Benjamin[a], pursued him, and trod him down as far as opposite Gibeah[c][b], toward the east.
  footnotes:
  - marker: a
    text: Or 'pursued him from Menuchah,' if מְנוּחָה is taken as a place name rather than adverbially.
    reason: alternative_reading
  - marker: b
    text: Or 'drove him along' for 'trampled him down'; the Hebrew verb can carry either a forceful treading sense or a causative movement sense in this context.
    reason: lexical_alternative
  - marker: c
    text: Literally 'from the east of the sun,' that is, 'eastward' or 'on the east side.'
    reason: lexical_alternative
