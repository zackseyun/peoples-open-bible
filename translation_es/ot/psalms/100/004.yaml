translation:
  language: es
  text: Entren en sus puertas con acción de gracias[a], en sus atrios con alabanza; denle gracias; bendigan su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con una ofrenda de acción de gracias» para בְּתוֹדָה, ya que el término hebreo puede designar tanto la acción de gracias como una ofrenda de agradecimiento, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֹּאוּ
  english_pob_choice: Enter
  chosen_spanish: Entren
  alternatives_spanish:
  - Entren
  - Pasen
  - Entren ustedes
  lexicon: HALOT
  rationale: El imperativo plural de בוא expresa movimiento hacia adentro. «Entren» reproduce la invitación de acceso al espacio sagrado con naturalidad en español y conserva la fuerza directiva.
- source_word: שְׁעָרָיו
  english_pob_choice: his gates
  chosen_spanish: sus puertas
  alternatives_spanish:
  - sus puertas
  - sus portones
  - las puertas de él
  lexicon: HALOT
  rationale: «Puertas» comunica bien la imagen cultual en español; aunque «gates» puede ser «portones», «puertas» es más natural y sigue siendo suficientemente concreto para el acceso al recinto.
- source_word: בְּתוֹדָה
  english_pob_choice: with thanksgiving
  chosen_spanish: con acción de gracias
  alternatives_spanish:
  - con gratitud
  - en acción de gracias
  - con un sacrificio de acción de gracias
  lexicon: HALOT
  rationale: תוֹדָה puede ser agradecimiento o una ofrenda de agradecimiento. Aquí, como en el inglés POB, el sentido básico de agradecimiento encaja mejor con el paralelismo con «alabanza», y «acción de gracias» preserva esa ambigüedad mejor que una paráfrasis más interpretativa.
- source_word: חֲצֵרֹתָיו
  english_pob_choice: his courts
  chosen_spanish: sus atrios
  alternatives_spanish:
  - sus atrios
  - sus patios
  - sus recintos
  lexicon: HALOT
  rationale: «Atrios» mantiene el registro cultual y la imagen del templo. «Patios» sería más cotidiano pero menos preciso para este contexto.
- source_word: בִּתְהִלָּה
  english_pob_choice: with praise
  chosen_spanish: con alabanza
  alternatives_spanish:
  - con alabanza
  - en alabanza
  - con canto de alabanza
  lexicon: HALOT
  rationale: תְהִלָּה significa alabanza. «Con alabanza» reproduce el paralelismo con «con acción de gracias» y evita introducir «canto» sin base explícita.
- source_word: הוֹדוּ לוֹ
  english_pob_choice: give thanks to him
  chosen_spanish: denle gracias
  alternatives_spanish:
  - denle gracias
  - agradezcanle
  - confiesenle
  lexicon: HALOT
  rationale: En el uso cúltico, הודה suele significar dar gracias. Se conserva la relación léxica con תוֹדָה mediante «gracias» y se mantiene el destinatario implícito de la acción.
- source_word: בָּרֲכוּ
  english_pob_choice: bless
  chosen_spanish: bendigan
  alternatives_spanish:
  - bendigan
  - alaben
  - digan bien de
  lexicon: HALOT
  rationale: El imperativo plural de ברך aplicado al nombre divino se expresa mejor como «bendigan» en español bíblico y litúrgico; «alaben» borraría la distinción respecto de תְהִלָּה.
- source_word: שְׁמוֹ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su nombre
  - el nombre de él
  lexicon: HALOT
  rationale: «Su nombre» conserva la referencia reverente a la identidad y reputación reveladas de Dios, con la economía natural del español.
theological_decisions:
- issue: Imagen cultual de puertas y atrios
  english_pob_reading: Retain the temple-access imagery literally as 'gates' and 'courts.'
  chosen_spanish_reading: Conservar literalmente la imagen de acceso al recinto sagrado mediante «puertas» y «atrios».
  alternative_spanish_readings:
  - generalizar a «presencia»
  - generalizar a «casa»
  - parafrasear como «acérquense a Dios»
  rationale: El hebreo presenta un escenario de acceso al espacio santo; la traducción debe preservar esa imaginería en vez de convertirla en una abstracción devocional. Así se respeta la tensión cultual del texto y su concreción poética.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La revisión inglesa eliminó la conjunción innecesaria antes de ''his courts'' para reflejar mejor el paralelismo hebreo. En español se siguió esa misma decisión sintáctica, manteniendo la coordinación asindética: «con acción de gracias[a], por sus atrios con alabanza».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» cuando aparezca el nombre divino en otros pasajes del proyecto; aquí no hay Tetragrámaton explícito en el verso.
  - Se evitó «SEÑOR» como sustituto de nombre divino porque el texto no lo requiere y el verso usa pronombres posesivos sobre Dios.
  - Se preservó la distinción entre «acción de gracias» y «alabanza», y entre «denle gracias» y «bendigan», para no borrar el paralelismo léxico del hebreo.
