review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo: Edom actuó vengativamente contra la casa de Judá, contrajo culpa grave y tomó venganza contra ellos. Sin embargo, hay dos ajustes importantes: (1) el título divino אֲדֹנָי יְהוִה debe alinearse mejor con la política del proyecto en español; «el Señor Yahvé» conserva ambos elementos, pero suena algo híbrido y menos natural que «el Señor Dios Yahvé» o una solución equivalente. (2) La nota [b] no ofrece una alternativa real distinta del texto principal, pues repite «incurrió en gran culpa».'
  spanish_quality_summary: 'El español es claro y digno, pero «actuó con venganza» resulta algo menos natural que «actuó vengativamente» o «tomó venganza». Dado que la nota ya preserva la literalidad enfática, conviene mejorar la fluidez en el texto principal. También conviene ajustar la nota [b] para que refleje mejor la alternativa documentada: «se hizo muy culpable» / «fue hallado muy culpable».'
  glossary_alignment: 'Hay buena alineación general con la terminología del proyecto: «Yahvé», «casa de Judá», «culpa». La principal tensión está en אֲדֹנָי יְהוִה: el inglés histórico «the Lord GOD» no debe arrastrarse mecánicamente, pero en español «el Señor Yahvé» puede sentirse abrupto. «el Señor Dios Yahvé» preserva título + nombre divino con mejor naturalidad y sin enmascarar YHWH. La repetición de la raíz נקם está bien preservada con texto + nota.'
  issues:
  - severity: medium
    issue: La expresión principal «actuó con venganza» es menos idiomática que una opción adverbial.
    rationale: El hebreo בִּנְקֹם נָקָם es enfático; el texto principal puede sonar más natural en español con «actuó vengativamente», mientras la nota conserva la literalidad «con venganza, venganza».
  - severity: medium
    issue: La nota [b] repite esencialmente la misma redacción del texto principal.
    rationale: 'Una nota de alternativa debe aportar una opción distinta o explicar mejor la construcción enfática. «También: “e incurrió en gran culpa”» no añade valor porque es igual al cuerpo principal.'
  - severity: low
    issue: El compuesto divino «el Señor Yahvé» es defendible pero estilísticamente algo áspero.
    rationale: No es un error doctrinal, pero «el Señor Dios Yahvé» suena más completo en español al reflejar אֲדֹנָי + יְהוִה sin duplicación extraña ni ocultamiento del nombre divino.
  revised_spanish_text: 'Así dice el Señor Dios Yahvé: Porque Edom actuó vengativamente[a] contra la casa de Judá, e incurrió en gran culpa[b], y se vengó de ellos.'
  revised_footnotes:
