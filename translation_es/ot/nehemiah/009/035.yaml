translation:
  language: es
  text: Aun en su reino, y en medio de tu gran bondad[a] que les diste, y en la tierra ancha y fértil[b] que pusiste delante de ellos, no te sirvieron[c] y no se apartaron de sus malas obras[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''en tu abundante bondad'' o ''con tu gran generosidad''.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'la tierra ancha y gorda', un modismo para una tierra espaciosa y fértil.
    reason: cultural_note
  - marker: c
    text: 'O: ''no te adoraron''; el verbo hebreo puede incluir adoración y servicio.'
    reason: lexical_alternative
  - marker: d
    text: 'O: ''no se arrepintieron de sus malas obras''; literalmente, ''no se volvieron de sus malas obras''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּמַלְכוּתָם
  english_pob_choice: in their kingdom
  chosen_spanish: en su reino
  alternatives_spanish:
  - en su realeza
  - bajo su gobierno
  lexicon: HALOT
  rationale: מַלְכוּת puede denotar reino, reinado o autoridad real. En este contexto, 'en su reino' comunica de manera natural el estado político asentado del pueblo sin perder la referencia al ámbito de su soberanía.
- source_word: וּבְטוּבְךָ הָרָב
  english_pob_choice: amid your great goodness
  chosen_spanish: en medio de tu gran bondad
  alternatives_spanish:
  - en tu abundante bondad
  - con tu gran generosidad
  lexicon: HALOT
  rationale: טוּב expresa bondad, generosidad o beneficio. 'Bondad' conserva el valor moral y benéfico; 'en medio de' refleja el בְ repetido con una construcción española natural.
- source_word: אֲשֶׁר נָתַתָּ לָהֶם
  english_pob_choice: that you gave them
  chosen_spanish: que les diste
  alternatives_spanish:
  - que les habías dado
  - que diste a ellos
  lexicon: HALOT
  rationale: El hebreo narra en pasado simple una acción divina de dádiva. 'Les diste' es directo, fiel y evita una perífrasis innecesaria.
- source_word: אֶרֶץ הָרְחָבָה וְהַשְּׁמֵנָה
  english_pob_choice: the broad and fertile land
  chosen_spanish: la tierra ancha y fértil
  alternatives_spanish:
  - la tierra espaciosa y fértil
  - la tierra amplia y fecunda
  lexicon: HALOT
  rationale: רְחָבָה es 'ancha/espaciosa' y שְׁמֵנָה literalmente 'gorda', idiomáticamente 'fértil'. 'Ancha y fértil' conserva la imagen concreta y es idiomática en español.
- source_word: אֲשֶׁר נָתַתָּ לִפְנֵיהֶם
  english_pob_choice: that you set before them
  chosen_spanish: que pusiste delante de ellos
  alternatives_spanish:
  - que colocaste ante ellos
  - que les pusiste por delante
  lexicon: HALOT
  rationale: לִפְנֵי significa 'delante de / ante'. 'Pusiste delante de ellos' mantiene la idea de presentar/proveer sin volverla literal y torpe.
- source_word: לֹא עֲבָדוּךָ
  english_pob_choice: they did not serve you
  chosen_spanish: no te sirvieron
  alternatives_spanish:
  - no te adoraron
  - no te prestaron servicio
  lexicon: HALOT
  rationale: עבד respecto de Dios abarca servicio obediencial y también adoración. 'Servir' preserva esa amplitud; 'sirvieron' es la forma más natural en español.
- source_word: וְלֹא שָׁבוּ
  english_pob_choice: did not turn
  chosen_spanish: no se volvieron
  alternatives_spanish:
  - no se apartaron
  - no se arrepintieron
  lexicon: HALOT
  rationale: שׁוּב significa 'volver/turnar'. Con מִן y una conducta mala, 'se volvieron de' comunica el giro moral exigido por el verbo sin imponer 'arrepentirse' como traducción cerrada.
- source_word: מִמַּעַלְלֵיהֶם הָרָעִים
  english_pob_choice: from their evil deeds
  chosen_spanish: de sus malas obras
  alternatives_spanish:
  - de sus malas acciones
  - de sus perversas obras
  lexicon: HALOT
  rationale: מַעֲלָלִים refiere a obras, acciones o prácticas. 'Malas obras' conserva el juicio moral explícito y suena natural en un registro bíblico contemporáneo.
theological_decisions:
- issue: Alcance de עבד aplicado a Dios
  english_pob_reading: serve you
  chosen_spanish_reading: te sirvieron
  alternative_spanish_readings:
  - te adoraron
  rationale: El verbo no se limita al acto litúrgico; incluye lealtad obediente y servicio de pacto. 'Sirvieron' mantiene ese campo semántico amplio sin reducirlo a 'adoraron'.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido moral de שׁוּב con מִן
  english_pob_reading: did not turn from their evil deeds
  chosen_spanish_reading: no se volvieron de sus malas obras
  alternative_spanish_readings:
  - no se arrepintieron de sus malas obras
  rationale: 'La imagen del texto es concreta: un giro o apartarse de las obras malas. ''Se volvieron de'' preserva la metáfora hebrea y deja visible la tensión entre giro externo y arrepentimiento interior.'
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa: mantiene la secuencia ''in their kingdom / amid your great goodness / in the broad and fertile land'', evita perífrasis innecesarias, y conserva la tensión léxica de עבד y שׁוּב con notas alternativas donde el español podría inclinarse hacia ''adorar'' o ''arrepentirse''.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' por defecto en el proyecto solo cuando aparece el nombre divino; aquí el versículo usa pronombres de segunda persona, así que no se introduce el nombre.
  - '''Bondad'' se eligió para טוּב por ser más amplia y menos marcadamente afectiva que ''generosidad''.'
  - '''Malas obras'' mantiene el sustantivo concreto del hebreo, en lugar de abstraerlo a ''maldad''.'
  - La estructura coordinada reproduce la acumulación del hebreo sin sobredeterminar relaciones causales o temporales.
