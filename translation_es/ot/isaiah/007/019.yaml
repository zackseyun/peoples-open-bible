translation:
  language: es
  text: Y vendrán y se asentarán[a] todos en los barrancos escarpados[b], en las hendiduras de las rocas, en todos los zarzales, y en todos los lugares de agua[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descansarán»; el verbo puede indicar llegar a reposo o instalarse.
    reason: lexical_alternative
  - marker: b
    text: El hebreo de «los barrancos escarpados» refleja una expresión difícil, tradicionalmente vertida de varias maneras, como «valles desolados» o «barrancos de precipicios».
    reason: lexical_alternative
  - marker: c
    text: El término final es raro e incierto; también puede entenderse como «abrevaderos» o «praderas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאוּ
  english_pob_choice: And they will come
  chosen_spanish: Y vendrán
  alternatives_spanish:
  - Y vendrán a
  - Y llegarán
  lexicon: HALOT
  rationale: El valor futuro profético se expresa naturalmente en español con «vendrán». Mantiene el sentido básico de בוא sin añadir matices ajenos.
- source_word: וְנָחוּ
  english_pob_choice: and settle
  chosen_spanish: se asentarán
  alternatives_spanish:
  - reposarán
  - se detendrán
  - descansarán
  lexicon: HALOT
  rationale: Como el inglés POB, aquí no se trata solo de «descansar», sino de tomar posición o establecerse en esos lugares. «Se asentarán» comunica bien esa idea en español.
- source_word: כֻלָּם
  english_pob_choice: they will all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - en conjunto
  lexicon: HALOT
  rationale: Conserva la totalidad distributiva del hebreo. En español, «todos» basta con el sujeto implícito de la cláusula.
- source_word: בְּנַחֲלֵי הַבַּתּוֹת
  english_pob_choice: in the steep ravines
  chosen_spanish: en los hondos barrancos
  alternatives_spanish:
  - en los barrancos escarpados
  - en los valles abruptos
  - en los barrancos de las hijas
  lexicon: HALOT
  rationale: La expresión hebrea es difícil. Sigo la decisión del POB inglés de dar un sentido geográfico claro y natural, sin forzar una traducción literal opaca. «Hondos barrancos» transmite la idea de terreno profundo y quebrado, aunque no resuelve por completo la rareza del término.
- source_word: וּבִנְקִיקֵי הַסְּלָעִים
  english_pob_choice: in the clefts of the rocks
  chosen_spanish: en las hendiduras de las rocas
  alternatives_spanish:
  - en las grietas de las peñas
  - en los resquicios de las peñas
  lexicon: HALOT
  rationale: נקיקים son hendiduras o grietas; סלעים son rocas/peñas. «Hendiduras de las rocas» conserva la concreción física y suena natural en español.
- source_word: וּבְכֹל הַנַּעֲצוּצִים
  english_pob_choice: in all the thornbushes
  chosen_spanish: en todos los zarzales
  alternatives_spanish:
  - en todos los matorrales espinosos
  - en todos los espinares
  lexicon: HALOT
  rationale: El término designa vegetación espinosa. «Zarzales» comunica bien una maleza densa y espinosa en español corriente, sin perder el carácter agreste de la imagen.
- source_word: וּבְכֹל הַנַּהֲלֹלִים
  english_pob_choice: in all the watering places
  chosen_spanish: en todos los manantiales
  alternatives_spanish:
  - en todos los abrevaderos
  - en todos los lugares de agua
  lexicon: HALOT
  rationale: Sigo la revisión del POB inglés que privilegia un lugar asociado al agua. Dado el campo semántico incierto, «manantiales» mantiene una referencia natural al agua y es más idiomático que una glosa demasiado técnica.
theological_decisions:
- issue: No suavizar la imagen de invasión/ocupación del verso
  english_pob_reading: The verse depicts the invaders spreading into rugged, hidden, and watery places.
  chosen_spanish_reading: El verso presenta a los invasores extendiéndose por barrancos, grietas, zarzales y lugares de agua.
  alternative_spanish_readings:
  - El verso describe descanso pacífico en paisajes rurales
  - El verso habla de personas que simplemente pasan por esos lugares
  rationale: La secuencia verbal y la acumulación de lugares sugieren ocupación amplia, no una escena neutral. La traducción debe preservar esa tensión imagética.
  doctrine_reference: Contexto literario de Isaías 7; lectura histórica y descriptiva del juicio/invasión.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del POB inglés, que sustituyó «pastures» por «watering places» para reflejar mejor הַנַּהֲלֹלִים. En español se optó por «manantiales» por claridad idiomática, manteniendo el matiz acuoso de la revisión y dejando constancia de la incertidumbre en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se conserva un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Las notas marcan la incertidumbre léxica donde el hebreo es difícil, especialmente en los dos últimos sintagmas topográficos.
