review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: la conspiración de Zimri, su cargo militar, el marco circunstancial en Tirsa y la referencia a la casa de Arza. Sin embargo, no preserva de la mejor manera la función idiomática de אֲשֶׁר עַל הַבַּיִת, que en este contexto no debe quedar en el texto principal como el calco poco natural «estaba sobre la casa», sino como un título administrativo inteligible. También conviene afinar la fluidez de «mientras él estaba» y la expresión del beber hasta la embriaguez para mantener la viveza sin rigidez.'
  spanish_quality_summary: El español es generalmente claro, pero contiene un calco poco natural en «que estaba sobre la casa», que afecta la legibilidad. «Mientras él estaba» suena algo redundante; «mientras estaba» basta. El resto es comprensible y digno, con buen registro narrativo. La nota b ya explica correctamente el sentido administrativo, por lo que el texto principal debería armonizar con esa explicación.
  glossary_alignment: 'No hay conflictos con la terminología teológica global. «Su siervo» es aceptable aquí por el contexto cortesano documentado. «Carros de guerra» es una expansión defendible para רכב. El principal desajuste léxico está en עַל־הַבַּיִת: la decisión española documentada favorece un calco, pero el propio criterio del proyecto pide evitar calcos de madera cuando el español resulta antinatural; «encargado de la casa real» o «a cargo de la casa real» comunica mejor el título.'
  issues:
  - severity: medium
    issue: Calco antinatural en «que estaba sobre la casa».
    rationale: Aunque reproduce formalmente el hebreo, en español moderno y eclesial resulta forzado y opaco. El sentido administrativo está bien establecido en la evidencia inglesa y debe expresarse con claridad en el texto principal.
  - severity: low
    issue: «Mientras él estaba» suena innecesariamente pesado.
    rationale: El pronombre explícito no aporta contraste aquí. «Mientras estaba» mantiene la relación circunstancial con mejor fluidez.
  - severity: low
    issue: La nota b queda parcialmente desconectada del texto principal.
    rationale: Si el texto principal usa un calco opaco y la nota lo corrige, el lector recibe una señal mixta. Conviene que el texto principal ya refleje el sentido administrativo, dejando la nota como aclaración cultural.
