review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: valor consecutivo/futuro de וִידַעְתֶּם, nombre divino Yahvé, temporalidad de בפתחי, imagen concreta de abrir sepulcros y sacar al pueblo de ellos, y vocativo final. También preserva la tensión teológica sin resolverla de forma interpretativa en el texto principal.'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero tiene dos problemas de fidelidad/estilo: 1) el uso de «sus/los» rompe el tratamiento directo de segunda persona del hebreo y suena menos inmediato que «sus/ustedes» o mejor «vuestros/los»; en español latinoamericano neutral y eclesial, aquí conviene «sus ... los» solo si se mantiene claramente el vocativo directo, pero «los haga subir» puede oírse más distante. 2) La nota b introduce «resucite», que sobreinterpreta el verbo העלה y contradice la rationale inglesa que prefiere no fijar una lectura de resurrección en la nota alternativa. Además, «traer arriba» es poco natural; «hacer subir» o «sacar» funciona mejor en nota.'
  glossary_alignment: 'Alineación buena con los términos del proyecto: יְהוָה -> «Yahvé» correctamente; no se detectan choques con otras políticas léxicas. La excepción en nota «el SEÑOR» está permitida como alternativa lexical porque refleja la nota inglesa, aunque en el texto principal debe mantenerse «Yahvé».'
  issues:
  - severity: medium
    issue: La nota [b] usa «resucite», que sobreinterpreta וּבְהַעֲלוֹתִי.
    rationale: El rastro inglés explícitamente evita resolver el verbo como «raise you up» en el texto principal y aun en nota explica el sentido literal «cause to go up / bring up». «Resucite» introduce una especificación teológica mayor que la evidencia fuente y la rationale documentada.
  - severity: low
    issue: «Traer arriba» en la nota [b] no suena natural en español.
    rationale: Aunque intenta calcar la explicación inglesa, en español bíblico natural es mejor «hacer subir» o «sacar» como glosa del literal.
  - severity: low
    issue: El conjunto de pronombres de segunda persona podría sonar más natural con formulación menos distante.
    rationale: El hebreo es segunda persona plural directa. El borrador con «sus sepulcros ... los haga subir ... oh pueblo mío» es comprensible, pero una pequeña mejora estilística en español eclesial neutral es usar «de sus sepulcros, pueblo mío» sin «oh», o mantener «oh» si se desea mayor solemnidad. No es error grave.
  revised_spanish_text: Entonces sabrán que yo soy Yahvé[a], cuando abra sus sepulcros y los haga subir de sus sepulcros[b], oh pueblo mío.
  revised_footnotes: *id001
  revision_rationale: Se conserva el texto principal, que es fiel y natural, pero se corrige la nota [b] para quitar «resucite», que sobreinterpreta el hebreo y va contra la rationale auditada. También se mejora la explicación literal en español con «hacer subir» o «sacar».
