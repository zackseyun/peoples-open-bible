translation:
  language: es
  text: 'Si tu padre realmente nota mi ausencia[a], entonces dirás: «David me pidió encarecidamente permiso[b] para correr[c] a Belén, su ciudad, porque allí está el sacrificio anual[d] para toda la familia.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Si tu padre seguramente me echa de menos». El hebreo usa un infinitivo absoluto con un verbo finito para dar énfasis.
    reason: lexical_alternative
  - marker: b
    text: O «me pidió permiso con urgencia». El hebreo también usa un infinitivo absoluto con un verbo finito para dar énfasis.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «correr a Belén»; el sentido es ir allí con rapidez.
    reason: lexical_alternative
  - marker: d
    text: O «el sacrificio de cada año».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם פָּקֹד יִפְקְדֵנִי
  english_pob_choice: surely notices me
  chosen_spanish: seguramente me echa de menos
  alternatives_spanish:
  - seguramente me nota
  - ciertamente se da cuenta de mi ausencia
  - seguramente me visita
  lexicon: HALOT
  rationale: La forma enfática hebrea pide reproducir la intensificación. En este contexto, Saúl notaría la ausencia de David en la mesa; por eso se evita un calco como ‘me visita’ y se opta por una expresión natural que conserve la idea de percibir su ausencia.
- source_word: אָבִיךָ
  english_pob_choice: your father
  chosen_spanish: tu padre
  alternatives_spanish:
  - su padre
  lexicon: HALOT
  rationale: Es la correspondencia directa del sufijo de segunda persona masculina singular dirigido a Jonatán.
- source_word: נִשְׁאֹל נִשְׁאַל מִמֶּנִּי
  english_pob_choice: earnestly asked leave of me
  chosen_spanish: me pidió encarecidamente permiso
  alternatives_spanish:
  - me pidió con insistencia
  - me solicitó permiso con urgencia
  - me rogó permiso
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito da énfasis; en español conviene reflejar la fuerza con ‘encarecidamente’. ‘Pidió permiso’ transmite la idea idiomática de solicitar autorización para ausentarse, sin perder el valor de ‘de mí’.
- source_word: לָרוּץ
  english_pob_choice: to run
  chosen_spanish: para correr
  alternatives_spanish:
  - para ir rápidamente
  - para apresurarse
  lexicon: HALOT
  rationale: Se conserva el verbo concreto ‘correr’, como hace la POB inglesa, porque el hebreo es literal. Aunque el sentido incluye prisa, no se diluye en un verbo más genérico.
- source_word: בֵּית לֶחֶם עִירוֹ
  english_pob_choice: Bethlehem, his city
  chosen_spanish: Belén, su ciudad
  alternatives_spanish:
  - Belén, su pueblo
  - Belén, su localidad natal
  lexicon: HALOT
  rationale: La apposición hebrea se refleja de manera literal y clara. ‘Su ciudad’ mantiene la relación gramatical sin introducir una glosa interpretativa más fuerte que el texto.
- source_word: זֶבַח הַיָּמִים
  english_pob_choice: the yearly sacrifice
  chosen_spanish: el sacrificio anual
  alternatives_spanish:
  - el sacrificio de cada año
  - la ofrenda anual
  lexicon: HALOT
  rationale: La expresión denota una observancia recurrente; ‘anual’ preserva la referencia al ciclo regular. Se evita ‘fiesta’ o formulaciones expansivas porque el hebreo habla de sacrificio.
- source_word: לְכָל הַמִּשְׁפָּחָה
  english_pob_choice: for the whole family
  chosen_spanish: para toda la familia
  alternatives_spanish:
  - para toda la parentela
  - para todo el clan
  lexicon: HALOT
  rationale: En este marco doméstico, ‘familia’ es la opción más natural. ‘Toda’ reproduce כָל, manteniendo el alcance completo.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB en inglés, que ajustó ‘definitely notices’ a ‘surely notices’ por un registro más formal. En español se optó por una equivalencia igualmente formal y natural que conserve el énfasis del infinitivo absoluto hebreo. La traducción mantiene la estructura discursiva del original y conserva las alternativas relevantes en notas.
  spanish_consistency_notes:
  - Se preservó el valor enfático del hebreo con recursos naturales del español, sin neutralizar la intensidad.
  - ‘Belén, su ciudad’ refleja la aposición del original y evita una paráfrasis interpretativa excesiva.
  - ‘Sacrificio anual’ mantiene el sustantivo ‘sacrificio’, coherente con la evidencia léxica del pasaje.
  - Las notas a, b, c y d corresponden a alternativas lexicales documentadas en el audit trail inglés.
