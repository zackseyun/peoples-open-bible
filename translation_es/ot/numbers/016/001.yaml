translation:
  language: es
  text: Coré, hijo de Izhar, hijo de Coat, hijo de Leví, tomó[a] consigo a Datán y Abiram, hijos de Eliab, y a On, hijo de Pelet, hijos de Rubén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «y tomó»; el objeto no se expresa. Aquí se entiende «consigo» por el contexto inmediato del versículo siguiente, donde se mencionan los hombres que se unieron a la rebelión.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took men
  chosen_spanish: tomaron hombres
  alternatives_spanish:
  - tomó
  - tomaron
  - se juntaron
  lexicon: HALOT
  rationale: El hebreo dice literalmente «y tomó», pero el objeto está elíptico. Siguiendo el audit trail en inglés, se mantiene la idea de acción conjunta y se explicita el objeto implícito con «hombres», que el contexto inmediato del v. 2 confirma. «Se juntaron» sería más interpretativo y «tomó» dejaría una elipsis poco natural en español.
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  lexicon: Convención bíblica española para el nombre propio
  rationale: Se usa la forma española tradicional y ampliamente reconocible del nombre propio, sin perder la identificación del personaje.
- source_word: בֶּן יִצְהָר בֶּן קְהָת בֶּן לֵוִי
  english_pob_choice: son of Izhar, son of Kohath, son of Levi
  chosen_spanish: hijo de Izhar, hijo de Coat, hijo de Leví
  alternatives_spanish:
  - descendiente de Izhar, Coat y Leví
  lexicon: HALOT
  rationale: Se conserva la cadena genealógica literal con repetición de «hijo de», porque el hebreo enfatiza el linaje. «Descendiente de» suaviza la estructura, pero pierde la forma genealógica explícita del texto.
- source_word: וְדָתָן וַאֲבִירָם
  english_pob_choice: along with Dathan and Abiram
  chosen_spanish: y Datán y Abiram
  alternatives_spanish:
  - junto con Datán y Abiram
  lexicon: Convención bíblica española para nombres propios
  rationale: El hebreo enlaza a estos personajes con Coré en la acción. En español, la coordinación simple reproduce bien esa unión sin añadir matiz interpretativo excesivo.
- source_word: בְּנֵי אֱלִיאָב
  english_pob_choice: sons of Eliab
  chosen_spanish: hijos de Eliab
  alternatives_spanish:
  - descendientes de Eliab
  lexicon: HALOT
  rationale: «Hijos de» es la equivalencia directa y mantiene el patrón genealógico. «Descendientes» es posible, pero menos transparente y menos cercano al hebreo.
- source_word: וְא֥וֹן בֶּן פֶּ֖לֶת
  english_pob_choice: and On son of Peleth
  chosen_spanish: y On, hijo de Pelet
  alternatives_spanish:
  - y On, el hijo de Pelet
  lexicon: Convención bíblica española para nombres propios
  rationale: Se conserva la apposición genealógica de manera natural en español y se adaptan los nombres propios a formas habituales en español bíblico.
- source_word: בְּנֵי רְאוּבֵן
  english_pob_choice: sons of Reuben
  chosen_spanish: hijos de Rubén
  alternatives_spanish:
  - rubenitas
  lexicon: HALOT
  rationale: Se mantiene la forma literal del hebreo en una lista genealógica. «Rubenitas» sería idiomático, pero menos transparente respecto a la estructura del original.
theological_decisions:
- issue: Objeto implícito en וַיִּקַּח
  english_pob_reading: 'Supply the implied object in English: ''took men'''
  chosen_spanish_reading: 'Explicitar «hombres» como objeto implícito: «tomaron hombres»'
  alternative_spanish_readings:
  - dejar «tomaron» sin objeto
  - parafrasear como «se rebelaron»
  rationale: No se traduce un objeto inexistente en el hebreo, sino que se hace explícito el complemento implícito que el contexto inmediato exige para que la frase sea comprensible. Se evita convertir el inicio de la narración en una paráfrasis doctrinal o dinámica más fuerte que el verbo לקח.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el audit trail; el pasaje presenta alta concordancia entre el texto fuente y la lectura inglesa, con la única decisión relevante de explicitar el objeto implícito de וַיִּקַּח.
  spanish_consistency_notes:
  - Se mantiene la secuencia genealógica con «hijo de» para respetar la forma hebrea.
  - Se usan formas españolas habituales para los nombres propios bíblicos cuando existe convención establecida en español.
  - Se evita introducir vocabulario interpretativo como «se rebelaron» o «se unieron» porque el hebreo sólo dice «tomó» con objeto elíptico.
