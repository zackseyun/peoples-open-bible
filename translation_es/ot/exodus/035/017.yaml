translation:
  language: es
  text: los tapices del atrio[a], sus pilares y sus bases[b], y la cortina[c] de la entrada del atrio—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las cortinas del atrio».
    reason: lexical_alternative
  - marker: b
    text: O «sus zócalos» para «sus bases».
    reason: lexical_alternative
  - marker: c
    text: O «la cortina para la entrada del atrio».
    reason: lexical_alternative
lexical_decisions:
- source_word: קַלְעֵי
  english_pob_choice: hangings
  chosen_spanish: cortinas
  alternatives_spanish:
  - hangas
  - velos
  lexicon: HALOT
  rationale: En español, «cortinas» comunica de forma natural los paños textiles que delimitan el atrio. «Hangings» no es idiomático; «cortinas» preserva la función material sin sobrecargar el texto. Mantiene abierta la alternativa lexical que el inglés POB anotó como «curtains of the court».
- source_word: חָצֵר
  english_pob_choice: court
  chosen_spanish: atrio
  alternatives_spanish:
  - patio
  - patio exterior
  lexicon: HALOT
  rationale: En contexto tabernacular, «atrio» es la equivalencia tradicional y clara para el recinto exterior sagrado. «Patio» puede sonar demasiado doméstico; «atrio» conserva mejor el valor técnico del espacio cercado.
- source_word: עַמֻּדָיו
  english_pob_choice: its pillars
  chosen_spanish: sus columnas
  alternatives_spanish:
  - sus pilares
  - sus postes
  lexicon: HALOT
  rationale: «Columnas» expresa bien los soportes verticales del cerramiento y suena más natural en español que «pilares» en este contexto, aunque ambas opciones son posibles. Se mantiene la imagen arquitectónica del texto hebreo.
- source_word: אֲדָנֶיהָ
  english_pob_choice: its bases
  chosen_spanish: sus bases
  alternatives_spanish:
  - sus zócalos
  - sus zoclos
  - sus enchufes
  lexicon: HALOT
  rationale: «Bases» reproduce de manera transparente el elemento de apoyo de las columnas. El inglés POB dejó la alternativa «sockets»; en español, «bases» es más claro y no pierde la idea de sustentación.
- source_word: מָסַךְ
  english_pob_choice: screen
  chosen_spanish: cortina
  alternatives_spanish:
  - pantalla
  - velo
  - lienzo
  lexicon: HALOT
  rationale: En un contexto de tabernáculo, el término designa una pieza textil que cubre la entrada. «Cortina» es la opción más natural y comprensible en español, aunque el inglés distinguió «screen» para diferenciarla de los paños perimetrales.
- source_word: שַׁעַר
  english_pob_choice: gate
  chosen_spanish: entrada
  alternatives_spanish:
  - puerta
  - portón
  lexicon: HALOT
  rationale: «Entrada» evita sugerir una puerta rígida o arquitectónicamente moderna, y conserva la función de acceso del término hebreo en este verso. La combinación «cortina de la entrada» refleja bien el sentido del pasaje.
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin revisiones aplicadas; por eso se mantiene la estructura del verso y solo se ajusta la idiomaticidad al español, conservando las alternativas léxicas documentadas en notas.
  spanish_consistency_notes:
  - Se usa «atrio» de modo consistente para חָצֵר en lenguaje tabernacular.
  - Se preserva la distinción entre los paños perimetrales («cortinas») y la pieza de acceso («cortina» de la entrada).
  - Se evita «SEÑOR» u otra terminología no pertinente porque este verso no contiene el nombre divino.
  - «Bases» se mantiene como término amplio y claro, compatible con la nota alternativa sobre «zócalos».
