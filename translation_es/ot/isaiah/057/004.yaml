base_translation:
  language: en
  yaml_path: translation/ot/isaiah/057/004.yaml
  text: At whom do you sport yourselves? Against whom do you open your mouth wide and stick out your tongue? Are you not children of transgression[c][b][a], offspring of deceit?
  footnotes:
