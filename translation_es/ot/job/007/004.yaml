  text: אִם שָׁכַ֗בְתִּי וְ/אָמַ֗רְתִּי מָתַ֣י אָ֭קוּם וּ/מִדַּד עָ֑רֶב וְ/שָׂבַ֖עְתִּי נְדֻדִ֣ים עֲדֵי נָֽשֶׁף־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/job/007/004.yaml
  text: When I lie down[a], I say, ‘When will I arise?’ But the evening drags on[c][b], and I am full of tossing until dawn.
  footnotes:
  - marker: a
    text: 'Or ''If I lie down.'' The Hebrew particle can be read conditionally, but here it likely introduces a repeated circumstance: ''When I lie down.'''
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and the evening is measured.' The sense is that the evening seems to stretch out slowly.
    reason: lexical_alternative
  - marker: c
    text: Hebrew נָשֶׁף can mean 'twilight' and may refer specifically here to morning twilight, that is, dawn.
    reason: lexical_alternative
