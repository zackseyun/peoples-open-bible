translation:
  language: es
  text: El justo camina en su integridad; dichosos[a] sus hijos[b] después de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «felices»; el hebreo אַשְׁרֵי expresa dicha o bienestar en sentido amplio.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «sus hijos»; aquí puede funcionar genéricamente para referirse a sus descendientes o hijos en sentido inclusivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִתְהַלֵּךְ
  english_pob_choice: walks
  chosen_spanish: camina
  alternatives_spanish:
  - anda
  - vive
  - se conduce
  lexicon: HALOT
  rationale: El hitpael de הלך expresa el modo de vivir o conducirse. "Camina" conserva la metáfora hebrea de la conducta como un andar y suena natural en el registro sapiencial del español.
- source_word: בְּתֻמּוֹ
  english_pob_choice: in his integrity
  chosen_spanish: en su integridad
  alternatives_spanish:
  - en su blamelessness
  - con integridad
  - en su rectitud
  lexicon: HALOT
  rationale: תֹּם/תֻּם denota integridad, completitud o carácter íntegro. "En su integridad" refleja bien la preposición בְּ y mantiene el sentido ético del contexto.
- source_word: צַדִּיק
  english_pob_choice: a righteous man
  chosen_spanish: el justo
  alternatives_spanish:
  - un justo
  - la persona justa
  - el hombre justo
  lexicon: HALOT
  rationale: El hebreo usa singular masculino en sentido proverbial y representativo. En español, "el justo" conserva esa forma proverbial sin recargar la frase con un sustantivo innecesario.
- source_word: אַשְׁרֵי
  english_pob_choice: blessed are
  chosen_spanish: dichosos
  alternatives_spanish:
  - bienaventurados
  - felices
  - afortunados
  lexicon: HALOT
  rationale: אַשְׁרֵי expresa una exclamación de bienestar y dicha en tono sapiencial. "Dichosos" mantiene ese registro elevado y evita reducirlo solo a una emoción subjetiva.
- source_word: בָנָיו
  english_pob_choice: his children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - su descendencia
  - sus vástagos
  lexicon: HALOT
  rationale: Aunque formalmente proviene de בנים, aquí funciona de modo generico para la descendencia. "Sus hijos" conserva la forma breve y natural del proverbio, y en español puede abarcar descendientes en este contexto.
- source_word: אַחֲרָיו
  english_pob_choice: after him
  chosen_spanish: después de él
  alternatives_spanish:
  - tras él
  - a su paso
  - luego de él
  lexicon: HALOT
  rationale: La expresión indica a los que vienen después de él, aquí sus descendientes. "Después de él" es la forma más directa y natural en español.
theological_decisions:
- issue: Lenguaje masculino representativo en un dicho sapiencial
  english_pob_reading: a righteous man
  chosen_spanish_reading: el justo
  alternative_spanish_readings:
  - la persona justa
  - uno que es justo
  rationale: El hebreo usa una forma masculina singular en sentido proverbial y representativo. "El justo" conserva esa referencia sin neutralizar innecesariamente el patrón formal del texto, y no excluye a las mujeres del principio moral.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide con la resolución auditada del inglés: imagen de caminar/conducta, integridad ética, justo singular representativo, y אַשְׁרֵי como bienaventuranza sapiencial. No se detectan revisiones posteriores que exijan cambio respecto del pasaje base.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantuvo la metáfora de «camina» para preservar la imagen sapiencial hebrea.
  - «Sus hijos» se entiende en sentido inclusivo de descendencia dentro del contexto proverbial.
