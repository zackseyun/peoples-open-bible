translation:
  language: es
  text: Por favor, permite que tu siervo vuelva[a], para que muera en mi propia ciudad, junto a la sepultura de mi padre y de mi madre. Pero aquí está tu siervo Kimham; que él cruce con mi señor el rey, y haz con él lo que sea bueno a tus ojos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «con la sepultura de mi padre y de mi madre»; el sentido probablemente es de ubicación junto al lugar de enterramiento familiar.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo que te parezca bien».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשָׁב נָא
  english_pob_choice: Please let ... return
  chosen_spanish: Por favor, deja que ... vuelva
  alternatives_spanish:
  - Por favor, permite que ... regrese
  - Que ... vuelva, por favor
  lexicon: HALOT
  rationale: El hebreo expresa una súplica respetuosa con valor de retorno. En español, «deja que» comunica bien la petición y mantiene el tono deferente de נא sin volverse rígido.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  lexicon: HALOT
  rationale: Aquí la autoidentificación cortesana ante el rey es mejor como «siervo» en español natural y reverente. «Esclavo» conservaría fuerza léxica, pero sonaría menos adecuado al registro del discurso.
- source_word: וְאָמֻת
  english_pob_choice: that I may die
  chosen_spanish: para que muera
  alternatives_spanish:
  - y muera
  - para morir
  lexicon: HALOT
  rationale: La relación de propósito/resultando tras la petición se expresa de forma más natural con «para que muera». Conserva la intención de volver para morir allí.
- source_word: בְּעִירִי
  english_pob_choice: in my own city
  chosen_spanish: en mi propia ciudad
  alternatives_spanish:
  - en mi ciudad
  lexicon: HALOT
  rationale: El sufijo posesivo pide una expresión posesiva clara en español. «Propia» añade el matiz personal del hebreo sin exagerarlo.
- source_word: עִם קֶבֶר אָבִי וְאִמִּי
  english_pob_choice: by the grave of my father and my mother
  chosen_spanish: junto a la sepultura de mi padre y de mi madre
  alternatives_spanish:
  - junto al sepulcro de mi padre y de mi madre
  - al lado de la sepultura de mi padre y de mi madre
  lexicon: HALOT
  rationale: El POB inglés ya tomó el valor contextual de עִם como proximidad física, no compañía literal. «Junto a» preserva ese sentido; «sepultura»/«sepulcro» reflejan con dignidad el lugar de enterramiento familiar.
- source_word: וְהִנֵּה
  english_pob_choice: But here is
  chosen_spanish: Pero aquí está
  alternatives_spanish:
  - Y aquí está
  - Mira, aquí está
  lexicon: HALOT
  rationale: La partícula introduce una presentación contrastiva. «Pero aquí está» transmite el giro del discurso entre la petición de Barzilai y la oferta de Kimham.
- source_word: כִמְהָם
  english_pob_choice: Kimham
  chosen_spanish: Quimam
  alternatives_spanish:
  - Kimham
  lexicon: HALOT
  rationale: Se conserva el nombre propio con adaptación gráfica habitual al español bíblico. La forma «Quimam» evita una lectura demasiado anglicada.
- source_word: יַעֲבֹר עִם
  english_pob_choice: let him cross over with
  chosen_spanish: que él cruce con
  alternatives_spanish:
  - que pase con
  - que atraviese con
  lexicon: HALOT
  rationale: El verbo «cruzar» mantiene el valor narrativo de atravesar el Jordán o pasar al otro lado, que es relevante en el contexto. El jussivo se expresa bien con «que él cruce».
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi señor, el rey
  lexicon: HALOT
  rationale: «Señor» reproduce el trato reverente de אֲדֹנִי en español bíblico, y «el rey» mantiene el título explícito. La construcción suena natural y cortesana.
- source_word: וַעֲשֵׂה ל֕וֹ
  english_pob_choice: and do for him
  chosen_spanish: y haz para él
  alternatives_spanish:
  - y hazle
  - y obre para él
  lexicon: HALOT
  rationale: «Hacer para» conserva la idea de actuar en beneficio de alguien, conforme al sentido contextual del hebreo y al audit trail inglés.
- source_word: אֵת אֲשֶׁר טוֹב בְּעֵינֶיךָ
  english_pob_choice: what is good in your eyes
  chosen_spanish: lo que es bueno ante tus ojos
  alternatives_spanish:
  - lo que te parezca bueno
  - lo que es bueno a tus ojos
  lexicon: HALOT
  rationale: Se mantiene el modismo hebreo de «ante tus ojos», que en español puede sonar algo más natural que una calca directa sin perder la metáfora evaluativa del original.
theological_decisions:
- issue: Tratamiento respetuoso del rey y del hablante
  english_pob_reading: my lord the king / your servant
  chosen_spanish_reading: mi señor el rey / tu siervo
  alternative_spanish_readings:
  - mi amo el rey / tu esclavo
  rationale: El versículo usa lenguaje cortesano de sumisión respetuosa; en español bíblico estándar, «señor» y «siervo» comunican con claridad el registro de honor sin introducir dureza innecesaria.
  doctrine_reference: ética del lenguaje cortesano en narrativas históricas
- issue: Sentido de proximidad funeraria en עִם קֶבֶר
  english_pob_reading: by the grave
  chosen_spanish_reading: junto a la sepultura
  alternative_spanish_readings:
  - cerca de la sepultura
  - con la sepultura
  rationale: El hebreo no indica compañía sino proximidad física al lugar de sepultura familiar. «Junto a» preserva el matiz y evita una traducción literal engañosa.
  doctrine_reference: lexicografía contextual de preposiciones hebreas
translation_notes:
  revision_awareness: El inglés POB revisó «near the grave» a «by the grave» para acercarse más al hebreo manteniendo naturalidad. La versión española adopta ese mismo ajuste con «junto a la sepultura», sin suavizar el contraste introductorio ni el modismo final de evaluación.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; aquí no aparece.
  - Se usa «siervo» por el registro cortesano del contexto, no «esclavo», conforme al uso ya documentado en el versículo en inglés.
  - Se conserva la imagen espacial de proximidad funeraria sin convertirla en mera referencia abstracta.
  - El nombre propio se adapta al español bíblico como «Quimam» para una lectura fluida y consistente.
