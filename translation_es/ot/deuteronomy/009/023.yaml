translation:
  language: es
  text: 'Y cuando Yahvé los envió desde Cades-barnea, diciendo: «Suban y posean la tierra que les he dado», ustedes se rebelaron contra la boca[a] de Yahvé su Dios, y no le creyeron[b] ni escucharon su voz[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «contra la boca de Yahvé su Dios», un modismo que significa su mandato o su palabra.'
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «no confiaron en él».'
    reason: lexical_alternative
  - marker: c
    text: 'También puede entenderse: «ni obedecieron su voz».'
    reason: alternative_reading
lexical_decisions:
- source_word: וּבִשְׁלֹחַ
  english_pob_choice: And when ... sent
  chosen_spanish: Y cuando ... envió
  alternatives_spanish:
  - Y al enviar ...
  - Y cuando ... mandó
  lexicon: HALOT
  rationale: La construcción con infinitivo introducida por prefijo expresa circunstancia temporal; en español bíblico natural se rinde mejor con «Y cuando...». Mantiene la relación temporal sin calcar la sintaxis hebrea.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton según la norma del proyecto en español. «Yahvé» evita la sustitución por un título y refleja la decisión doctrinal documentada.
- source_word: מִקָּדֵשׁ בַּרְנֵעַ
  english_pob_choice: from Kadesh-barnea
  chosen_spanish: desde Cades-barnea
  alternatives_spanish:
  - de Cades-barnea
  - desde Kades-barnea
  lexicon: HALOT
  rationale: Es un topónimo que se translitera/adapta al español. «Desde» responde al valor de procedencia del contexto («sent you from»), y «Cades» sigue la adaptación castellana frecuente del nombre.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: Marcador quotativo estándar para introducir el discurso directo. «Diciendo» es natural y conserva la función sintáctica del hebreo.
- source_word: עֲלוּ
  english_pob_choice: Go up
  chosen_spanish: Suban
  alternatives_spanish:
  - Subid
  - Ascendan
  lexicon: HALOT
  rationale: עלה en este contexto se refiere al avance hacia la tierra; «Suban» conserva la imagen direccional del hebreo y suena natural en español contemporáneo.
- source_word: וּרְשׁוּ
  english_pob_choice: possess
  chosen_spanish: posean
  alternatives_spanish:
  - tomen posesión de
  - hereden
  lexicon: HALOT
  rationale: En contextos de conquista y promesa, ירשׁ expresa tomar posesión/ocupar como herencia. «Posean» mantiene la correspondencia léxica que el POB inglés prefirió, con un registro bíblico claro en español.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  lexicon: HALOT
  rationale: En Deuteronomio, «la tierra» conserva la referencia covenantal y evita sobreexplicar. Es la opción más fiel al uso bíblico del sustantivo sin añadir material interpretativo.
- source_word: אֲשֶׁר נָתַתִּי לָכֶם
  english_pob_choice: that I have given you
  chosen_spanish: que les he dado
  alternatives_spanish:
  - que les di
  - que estoy dando
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una dádiva ya concedida y vigente; «les he dado» conserva esa vigencia y el matiz de don establecido.
- source_word: וַתַּמְרוּ
  english_pob_choice: you rebelled
  chosen_spanish: se rebelaron
  alternatives_spanish:
  - desobedecieron
  - se alzaron
  lexicon: HALOT
  rationale: מרה denota rebeldía/defianza frente a la autoridad. «Se rebelaron» reproduce con claridad la fuerza del verbo y el valor colectivo del pronombre.
- source_word: אֶת־פִּי יְהוָה אֱלֹהֵיכֶם
  english_pob_choice: against the mouth of Yahweh your God
  chosen_spanish: contra la boca de Yahvé su Dios
  alternatives_spanish:
  - contra la palabra de Yahvé su Dios
  - contra el mandato de Yahvé su Dios
  lexicon: HALOT
  rationale: Se conserva el hebraísmo «la boca de Yahvé» porque el POB inglés decidió mantener la imagen literal, anotando que funciona como idiomatismo para mandato/voz. En español también puede sostenerse sin oscurecer el sentido, y la nota aclara la equivalencia semántica.
- source_word: וְלֹא הֶאֱמַנְתֶּם לוֹ
  english_pob_choice: and you did not believe him
  chosen_spanish: y no le creyeron
  alternatives_spanish:
  - y no confiaron en él
  - y no lo creyeron
  lexicon: HALOT
  rationale: אמן en hifil aquí significa creer/confiar. «No le creyeron» respeta la referencia directa a la respuesta de fe ante la palabra divina; la alternativa «confiaron» es válida, pero menos inmediata frente al paralelo con la obediencia.
- source_word: וְלֹא שְׁמַעְתֶּם בְּקֹלוֹ
  english_pob_choice: or listen to his voice
  chosen_spanish: ni escucharon su voz
  alternatives_spanish:
  - ni obedecieron su voz
  - ni oyeron su voz
  lexicon: HALOT
  rationale: שׁמע בקול puede significar escuchar u obedecer. Se eligió «escucharon su voz» para conservar la imagen auditiva del hebreo; la obediencia queda implícita en el contexto de la rebelión y el verbo de escucha.
theological_decisions:
- issue: Nombre divino יְהוָה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La línea doctrinal del proyecto pide transliterar el Tetragrámaton como nombre propio. En este versículo no hay razón para sustituirlo por un título, porque la forma directa preserva mejor la identidad del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza de אֶת־פִּי como hebraísmo
  english_pob_reading: against the mouth of Yahweh your God
  chosen_spanish_reading: contra la boca de Yahvé su Dios
  alternative_spanish_readings:
  - contra la palabra de Yahvé su Dios
  - contra el mandato de Yahvé su Dios
  rationale: Se mantiene el hebraísmo porque el texto inglés auditado decidió conservarlo explícitamente, y el español puede cargar la misma figura sin perder inteligibilidad. La nota explica que el modismo remite a mandato o palabra, evitando borrar la tensión lexical.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Relación entre 'creer' y 'escuchar' al final del versículo
  english_pob_reading: you did not believe him or listen to his voice
  chosen_spanish_reading: no le creyeron ni escucharon su voz
  alternative_spanish_readings:
  - no confiaron en él ni obedecieron su voz
  - no le creyeron ni obedecieron su voz
  rationale: El hebreo enlaza incredulidad y desobediencia auditiva. En español, «creyeron» y «escucharon» conservan ambas capas sin reemplazar una por la otra; la obediencia queda en la implicación semántica del verbo 'escuchar' en contexto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una revisión que prefirió conservar el hebraísmo «against the mouth of Yahweh your God» en lugar de sustituirlo por «against the command of...», y mantuvo el paralelo «believe him / listen to his voice». La versión española sigue esa decisión, pero la vuelve publicable en español con «contra la boca de Yahvé su Dios» y con una nota explicativa del modismo. También se respetó la fuerza perfectiva de «that I have given you» con «les he dado».
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «la tierra» para הָאָרֶץ conforme al uso covenantal de Deuteronomio.
  - Se preserva el paralelismo «no le creyeron ni escucharon su voz» sin convertir el segundo miembro en mera repetición del primero.
  - «Cades-barnea» se escribe con adaptación castellana del primer elemento y guion en el topónimo compuesto.
