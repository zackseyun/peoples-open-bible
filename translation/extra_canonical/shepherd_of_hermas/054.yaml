  text: Καθήμενος ἐν τῷ οἴκῳ μου καὶ δοξάζων τὸν Κύριον περὶ πάντων ὧν ἑωράκειν, καὶ συζητῶν περὶ τῶν ἐντολῶν, ὅτι καλαὶ καὶ δυναταὶ καὶ ἱλαραὶ καὶ ἔνδοξοι καὶ δυνάμεναι σῶσαι ψυχὴν ἀνθρώπου, ἔλεγον ἐν ἐμαυτῷ· Μακάριος ἔσομαι ἐὰν ταῖς ἐντολαῖς ταύταις πορευθῶ, καὶ ὃς ἂν ταύταις πορευθῇ, μακάριος ἔσται. 2. ὡς ταῦτα ἐν ἐμαυτῷ ἐλάλουν, βλέπω αὐτὸν ἐξαίφνης παρακαθήμενόν μοι καὶ λέγοντα ταῦτα· Τί διψυχεῖς περὶ τῶν ἐντολῶν ὧν σοι ἐνετειλάμην; καλαί εἰσιν· ὅλως μὴ διψυχήσῃς, ἀλλ᾽ ἔνδυσαι τὴν πίστιν τοῦ Κυρίου, καὶ ἐν αὐταῖς πορεύσῃ· ἐγὼ γάρ σε ἐνδυναμώσω ἐν αὐταῖς. 3. αὗται αἱ ἐντολαὶ σύμφοροί εἰσι τοῖς μέλλουσι μετανοεῖν· ἐὰν γὰρ μὴ πορευθῶσιν ἐν αὐταῖς, εἰς μάτην ἐστὶν ἡ μετάνοια αὐτῶν. 4. οἱ οὖν μετανοοῦντες ἀποβάλλετε τὰς πονηρίας τοῦ αἰῶνος τούτου τὰς ἐκτριβούσας ὑμᾶς· ἐνδυσάμενοι δὲ πᾶσαν ἀρετὴν δικαιοσύνης δυνήσεσθε τηρῆσαι τὰς ἐντολὰς ταύτας καὶ μηκέτι προστιθέναι ταῖς ἁμαρτίαις ὑμῶν. ἐὰν οὖν μηκέτι μηδὲν προσθῆτε, ἀποστήσεσθε ἀπὸ τῶν προτέρων ἁμαρτιῶν ὑμῶν. πορεύεσθε οὖν ταῖς ἐντολαῖς μου ταύταις, καὶ ζήσεσθε τῷ Θεῷ. ταῦτα [πάντα] παρ' ἐμοῦ λελάληται ὑμῖν. 5. καὶ μετὰ τὸ ταῦτα λαλῆσαι αὐτὸν μετ' ἐμοῦ, λέγει μοι· Ἄγωμεν εἰς ἀγρόν, καὶ δείξω σοι τοὺς ποιμένας τῶν προβάτων. Ἄγωμεν, φημί, κύριε. καὶ ἤλθομεν εἴς τι πεδίον, καὶ δεικνύει μοι ποιμένα νεανίσκον ἐνδεδυμένον σύνθεσιν ἱματίων, τῷ χρώματι κροκώδη. 6. ἔβοσκε δὲ πρόβατα πολλὰ λίαν, καὶ τὰ πρόβατα ταῦτα ὡσεὶ τρυφῶντα ἦν καὶ λίαν σπαταλῶντα, καὶ ἱλαρὰ ἦν σκιρτῶντα ὧδε κἀκεῖ· καὶ αὐτὸς ὁ ποιμὴν πάνυ ἱλαρὸς ἦν ἐπὶ τῷ ποιμνίῳ αὐτοῦ· καὶ αὐτὴ ἡ ἰδέα τοῦ ποιμένος ἱλαρὰ ἦν λίαν, καὶ ἐν τοῖς προβάτοις περιέτρεχε.
