translation:
  language: es
  text: Y Lisias marchó al principio con una gran fuerza[a], pero fue rechazado ante ellos, y prevalecieron con las armas que habían tomado de los campamentos que habían derrotado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «prevalecieron con las armas que habían tomado de los campamentos que habían destruido/abatido». El griego permite tanto un énfasis en «hacerse fuertes» como en «prevalecer», y la cláusula final es un giro militar comprimido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπορεύθη
  english_pob_choice: marched
  chosen_spanish: marchó
  alternatives_spanish:
  - avanzó
  - fue
  lexicon: LSJ
  rationale: En contexto militar, el verbo griego describe el movimiento de una fuerza armada; «marchó» conserva ese matiz de desplazamiento militar mejor que un simple «fue».
- source_word: δυνάμει ἰσχυρᾷ
  english_pob_choice: with a strong force
  chosen_spanish: con una fuerza poderosa
  alternatives_spanish:
  - con una gran fuerza
  - con un ejército poderoso
  lexicon: LSJ
  rationale: La frase alude a poder/fortaleza militar. «Fuerza poderosa» preserva el valor de δύναμις sin imponer innecesariamente «ejército», que el griego no expresa de forma explícita.
- source_word: ἐν πρώτοις
  english_pob_choice: at first
  chosen_spanish: al principio
  alternatives_spanish:
  - al comienzo
  - primeramente
  lexicon: LSJ
  rationale: La expresión marca una fase inicial de la campaña; «al principio» es natural en español y mantiene el contraste narrativo con la inversión posterior.
- source_word: ἀνετράπη ἀπὸ προσώπου αὐτῶν
  english_pob_choice: was driven back before them
  chosen_spanish: fue rechazado delante de ellos
  alternatives_spanish:
  - fue arrojado de delante de ellos
  - fue echado atrás ante ellos
  lexicon: LSJ
  rationale: El pasivo de ἀνατρέπω en contexto bélico comunica ser repelido o hecho retroceder. «Rechazado delante de ellos» conserva el giro espacial de ἀπὸ προσώπου αὐτῶν sin perder naturalidad.
- source_word: ἴσχυσαν
  english_pob_choice: they prevailed
  chosen_spanish: prevalecieron
  alternatives_spanish:
  - se fortalecieron
  - se impusieron
  lexicon: LSJ
  rationale: El verbo puede significar «hacerse fuertes» o «prevalecer». Dado el contexto bélico y la revisión inglesa, «prevalecieron» transmite el resultado victorioso sin borrar la ambigüedad de fondo.
- source_word: ὅπλοις
  english_pob_choice: with the weapons
  chosen_spanish: con las armas
  alternatives_spanish:
  - con las armas de guerra
  - con los instrumentos de guerra
  lexicon: LSJ
  rationale: ὅπλα son armas; «armas» es el equivalente más directo y idiomático en español.
- source_word: παρεμβολῶν
  english_pob_choice: camps
  chosen_spanish: campamentos
  alternatives_spanish:
  - campamentos militares
  - campas
  lexicon: LSJ
  rationale: En contexto militar, παρεμβολή significa campamento o encampamiento. «Campamentos» es claro y fiel en español moderno.
- source_word: ἐξέκοψαν
  english_pob_choice: had overthrown
  chosen_spanish: habían derribado
  alternatives_spanish:
  - habían destruido
  - habían abatido
  lexicon: LSJ
  rationale: El verbo tiene sentido literal de cortar/derribar y, en el marco militar, de abatir o destruir. «Derribado» conserva la imagen fuerte sin sobreinterpretar como una derrota más abstracta.
translation_notes:
  revision_awareness: He seguido de cerca el griego y el audit trail inglés. Mantengo la ambigüedad de ἴσχυσαν en una forma española que puede leerse como victoria lograda con armas capturadas, sin reducirla a una sola interpretación. También conservo la imagen militar de ἀπὸ προσώπου αὐτῶν y el clausulado comprimido sobre los campamentos.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando corresponde al Tetragrámaton; aquí no aparece ningún nombre divino.
  - Elegí «armas» en lugar de un término más técnico para respetar el registro militar general del griego.
  - Mantengo un español formal pero fluido, evitando calcos innecesarios.
  - La nota al pie recoge la alternativa semántica relevante donde el griego admite dos matices cercanos.
