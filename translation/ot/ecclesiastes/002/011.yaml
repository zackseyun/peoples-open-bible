theological_decisions:
- issue: Rendering of הֶבֶל in Ecclesiastes
  chosen_reading: vanity
  alternative_readings:
  - vapor
  - breath
  - meaninglessness
  rationale: The term is central to Ecclesiastes and should preserve its layered sense of transience and futility without collapsing it into a single modern abstraction. 'Vanity' keeps the thematic continuity of the book and avoids importing a stronger nihilistic claim than the Hebrew itself requires. A footnote preserves 'vapor' as an important lexical nuance.
  doctrine_reference: Translation philosophy §§1, 3, 5
