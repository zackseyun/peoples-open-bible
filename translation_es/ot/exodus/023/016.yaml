revisions:
- from: y la Fiesta de la Cosecha[a], las primicias de tus labores, de lo que siembras en el campo; y la Fiesta de la Recolección[c][b], al fin del año, cuando recoges tus labores del campo.
  to: y la Fiesta de la Cosecha[a], las primicias de tus labores, de lo que siembras en el campo; y la Fiesta de la Recolección[c][b], al final del año, cuando recoges el fruto de tus labores del campo.
  rationale: Se hicieron ajustes menores para mejorar la naturalidad del español sin apartarse del sentido fuente ni del razonamiento léxico del POB. «Al final del año» expresa más idiomáticamente el hebreo temporal. «Cuando recoges el fruto de tus labores del campo» preserva la relación con מַעֲשֶׂיךָ como resultado del trabajo humano en contexto agrícola, evitando una frase española torpe. También se afinó la nota cultural para usar vocabulario agrícola más claro.
