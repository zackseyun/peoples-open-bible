translation:
  language: es
  text: Por eso, aférrate a su bondad[a], y la asamblea contará su alabanza. El pan es instrucción[c][b], y el vino con ello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego ofrece una lectura sustancialmente distinta: «He visto muchas cosas en mi extravío, y mi entendimiento es mayor que mis palabras». Los testigos hebreo y griego divergen claramente aquí.'
    reason: textual_variant
  - marker: b
    text: También puede entenderse como «su generosidad» o «su benevolencia» para טובו.
    reason: lexical_alternative
  - marker: c
    text: El final es textual y semánticamente difícil; «disciplina» o «corrección» también son posibles para מוסר.
    reason: lexical_alternative
lexical_decisions:
- source_word: על כן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: Introduce una conclusión inferencial natural en español sin perder el valor de consecuencia del original.
- source_word: חזק
  english_pob_choice: hold fast
  chosen_spanish: aférrate a
  alternatives_spanish:
  - sujétate a
  - mantente firme en
  lexicon: HALOT
  rationale: En este contexto, con טובו como objeto, la fuerza del imperativo se expresa mejor como una exhortación a adherirse firmemente a su bondad.
- source_word: טובו
  english_pob_choice: his goodness
  chosen_spanish: su bondad
  alternatives_spanish:
  - su benevolencia
  - su generosidad
  lexicon: HALOT
  rationale: Bondad conserva el sentido amplio de טוב y permite también la posible implicación de benevolencia o generosidad sin forzarla.
- source_word: ותהלתו
  english_pob_choice: his praise
  chosen_spanish: su alabanza
  alternatives_spanish:
  - la alabanza de él
  - su gloria
  lexicon: HALOT
  rationale: תהלה se rinde de forma directa como alabanza, con posesivo natural en español.
- source_word: קהל
  english_pob_choice: assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - el grupo reunido
  lexicon: HALOT
  rationale: Asamblea comunica bien el sujeto colectivo sin imponer de entrada un matiz estrictamente litúrgico.
- source_word: מוסר
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - disciplina
  - corrección
  lexicon: HALOT
  rationale: Aunque el término puede abarcar disciplina o corrección, instrucción resulta más natural en español y sigue la revisión más reciente del audit trail.
- source_word: לחם
  english_pob_choice: Bread
  chosen_spanish: El pan
  alternatives_spanish:
  - Pan
  lexicon: HALOT
  rationale: Se conserva el sustantivo literal, dado el carácter proverbial y la dificultad semántica de la cláusula.
- source_word: ויין יחדו
  english_pob_choice: and wine with it
  chosen_spanish: y el vino con él
  alternatives_spanish:
  - y el vino junto con él
  - y el vino asimismo
  lexicon: HALOT
  rationale: Con él mantiene la relación breve y algo oscura del hebreo יחדו, sin sobreexplicar la frase.
theological_decisions:
- issue: Base textual en una versión con fuerte desajuste entre hebreo y griego
  english_pob_reading: The English POB follows the Hebrew main line but flags the Greek as a substantially different reading in a footnote.
  chosen_spanish_reading: Mantener la línea principal del hebreo en el texto español y señalar en nota que el griego ofrece una lectura muy distinta.
  alternative_spanish_readings:
  - 'Traducir sólo el griego: «He visto muchas cosas en mi extravío, y mi entendimiento es mayor que mis palabras».'
  - Fusionar ambas versiones en una sola redacción sintética.
  rationale: La política del proyecto prioriza el hebreo donde existe, pero esta perícopa presenta una divergencia textual importante. Por eso el cuerpo principal sigue el hebreo y la nota preserva honestamente la variante griega sin mezclar testimonios.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando está conservado; usar el paralelo griego como insumo real y mantener la incertidumbre con transparencia.'
- issue: Valor semántico de מוסר en un contexto proverbial
  english_pob_reading: '''instruction'' is preferred in the latest English revision, while ''discipline'' and ''correction'' remain possible.'
  chosen_spanish_reading: instrucción
  alternative_spanish_readings:
  - disciplina
  - corrección
  rationale: Instrucción es la opción más fluida en español y conserva el rango de sentido sin endurecer innecesariamente el proverbio. Las alternativas quedan implícitas en la nota lexical.
  doctrine_reference: Consistencia terminológica interna del proyecto para términos de enseñanza/amonestación.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que ajustó el segundo hemistiquio inglés de 'discipline' a 'instruction' y simplificó la clausula final a 'with it'. La versión española sigue esa preferencia revisada, pero conserva la ambigüedad básica del hebreo y la nota sobre la lectura griega divergente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se evitó 'SEÑOR' como sustituto no solicitado.
  - Se prefirió 'asamblea' sobre 'congregación' para no cargar el texto con un matiz litúrgico añadido.
  - Se conservó una sintaxis breve y proverbial, acorde con el hebreo.
  - Las notas preservan la tensión textual entre hebreo y griego sin armonización artificial.
