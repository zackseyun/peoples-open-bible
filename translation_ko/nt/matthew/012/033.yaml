  text: 'Either make the tree good and its fruit good[a], or make the tree rotten and its fruit rotten[b]; for the tree is known by its fruit.'
  footnotes:
  - marker: a
    text: Or 'bad' instead of 'rotten' for σαπρός; the Greek can denote something spoiled, corrupt, or worthless.
    reason: lexical_alternative
  - marker: b
    text: The repeated 'make' may function rhetorically as 'consider' or 'show to be,' but the Greek form is imperative.
    reason: alternative_reading
