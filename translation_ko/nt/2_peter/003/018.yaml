  yaml_path: translation/nt/2_peter/003/018.yaml
  text: But grow in the grace and knowledge of our Lord and Savior Jesus Messiah[a]. To him be the glory both now and to the day of eternity[b]. Amen.
  footnotes:
  - marker: a
    text: Or, following traditional English usage, 'Jesus Christ.'
    reason: alternative_reading
  - marker: b
    text: Or 'now and forever.' The Greek more literally reads 'now and to the day of eternity.'
    reason: lexical_alternative
translation:
