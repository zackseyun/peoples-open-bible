  to: Y el reino, el dominio y la grandeza de los reinos bajo todo el cielo serán dados al pueblo de los santos del Altísimo[a]. Su reino será un reino eterno[b], y todos los dominios le servirán[c] y le obedecerán.
  rationale: Se corrigen las notas para reflejar fielmente las alternativas y la justificación teológica del POB inglés, y se suaviza 'bajo todos los cielos' a 'bajo todo el cielo' para mejorar la naturalidad en español sin alterar el sentido. El resto del texto preserva adecuadamente el singular pronominal y la terminología clave.
