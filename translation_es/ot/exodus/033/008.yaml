  to: Y cada vez que Moisés salía a la tienda[a], todo el pueblo se levantaba y permanecía de pie, cada hombre[b] a la entrada de su tienda, y seguían con la vista a Moisés hasta que él entraba en la tienda.
  rationale: Se reemplazó 'tabernáculo' por 'tienda' para seguir de cerca el hebreo y la decisión auditada del English POB, dejando la referencia contextual en nota. Se restauró el valor distributivo masculino de אִישׁ con 'cada hombre' y su nota correspondiente. Se cambió 'miraban tras Moisés' por 'seguían con la vista a Moisés' para expresar el sentido de mirar tras él de manera natural en español. También se ajustó la construcción inicial a 'Y cada vez que' para hacer explícito el valor habitual del hebreo sin rigidez.
