  text: וְ/הָיְתָ֤ה בָבֶל֙ צְבִ֣י מַמְלָכ֔וֹת תִּפְאֶ֖רֶת גְּא֣וֹן כַּשְׂדִּ֑ים כְּ/מַהְפֵּכַ֣ת אֱלֹהִ֔ים אֶת סְדֹ֖ם וְ/אֶת עֲמֹרָֽה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/013/019.yaml
  text: And Babylon[a], the beauty of kingdoms, the glory of the Chaldeans’ pride, will be like God’s overthrow of Sodom and Gomorrah.
  footnotes:
