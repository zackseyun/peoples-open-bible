revisions:
- from: Todo lo que toque su carne[a] será santo, y si algo de su sangre es rociado[b] sobre una vestidura, lavarás aquello sobre lo cual fue rociado, en un lugar santo.
  to: Todo lo que toque su carne quedará santo,[a] y si algo de su sangre salpica[b] sobre una vestidura, lavarás la parte de la vestidura sobre la cual salpique, en un lugar santo.
  rationale: Se ajustó 'será santo' a 'quedará santo' para reflejar mejor el cambio de estado ritual de יקדשׁ. Se cambió 'es rociado' por 'salpica' para alinearse con la decisión léxica auditada que evita sobreritualizar el verbo en este contexto. También se rehízo la cláusula relativa para un español más natural sin perder la referencia específica al área de la vestidura afectada por la sangre.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:03:08Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: totalidad indefinida, contacto con la carne de la ofrenda, resultado de santidad ritual, sangre sobre una prenda, lavado en lugar santo. Sin embargo, dos elecciones debilitan la fidelidad al expediente POB: ''será santo'' no refleja tan claramente el cambio de estado de יִקְדָּשׁ como ''quedará santo'', y ''rociado'' inclina demasiado hacia aspersión ritual donde el inglés auditado prefirió ''spattered'' por el contexto de sangre en una vestidura. También ''aquello sobre lo cual fue rociado'' es gramatical pero torpe; conviene una formulación más natural que siga refiriéndose a la prenda/mancha afectada.'
  spanish_quality_summary: El español es mayormente comprensible, pero suena algo forzado en 'aquello sobre lo cual fue rociado'. 'Vestidura' es aceptable en registro bíblico, aunque 'prenda' sería más natural; no obstante, no es necesario cambiarlo. La frase mejora con una formulación más idiomática y precisa para el lavado. El conjunto debe sonar moderno-digno sin calco innecesario.
  glossary_alignment: 'No hay conflicto con términos del glosario principal. ''Santo'' y ''lugar santo'' encajan. La principal cuestión léxica es mantener el matiz contextual de נזה: en español conviene ''salpique/salpica'' o una nota que preserve la alternativa ritual ''rociado/asperjado''.'
  issues:
  - severity: medium
    issue: יִּקְדָּשׁ se vierte como 'será santo'
    rationale: Aunque no es falso, el expediente inglés justificó explícitamente un cambio de estado ('shall become holy'). En español 'quedará santo' o 'quedará consagrado como santo' refleja mejor el resultado por contacto sin introducir otro rito.
  - severity: medium
    issue: יִזֶּה ... se vierte como 'es rociado'
    rationale: El POB inglés escogió 'spattered' por el contexto de sangre sobre una vestidura y posterior lavado. 'Rociado' suena más técnico/ritual de lo que el contexto requiere. 'Salpica' o 'salpicada' preserva mejor el sentido contextual, con nota para la alternativa 'rociada/asperjada'.
  - severity: medium
    issue: '''aquello sobre lo cual fue rociado'' es poco natural'
    rationale: La frase replica la sintaxis pero resulta pesada en español. Debe conservar la referencia a la prenda afectada sin sonar acartonada; 'la prenda sobre la cual caiga/salpique' o 'la parte de la vestidura sobre la cual salpique' mejora la legibilidad.
  revised_spanish_text: Todo lo que toque su carne quedará santo,[a] y si algo de su sangre salpica[b] sobre una vestidura, lavarás la parte de la vestidura sobre la cual salpique, en un lugar santo.
  revised_footnotes:
  - marker: a
    text: O 'será santo'. El hebreo expresa que entra en un estado de santidad ritual por contacto con la ofrenda.
    reason: lexical_alternative
  - marker: b
    text: O 'es rociada' u 'asperjada'. El verbo hebreo puede denotar aspersión ritual, pero aquí 'salpica' encaja mejor porque la sangre cae sobre una vestidura y luego debe lavarse.
    reason: lexical_alternative
  revision_rationale: Se ajustó 'será santo' a 'quedará santo' para reflejar mejor el cambio de estado ritual de יקדשׁ. Se cambió 'es rociado' por 'salpica' para alinearse con la decisión léxica auditada que evita sobreritualizar el verbo en este contexto. También se rehízo la cláusula relativa para un español más natural sin perder la referencia específica al área de la vestidura afectada por la sangre.
