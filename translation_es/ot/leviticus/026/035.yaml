revisions:
- from: Todos los días de su desolación reposará[a]—el reposo[b] que no tuvo durante sus sábados[c], mientras habitabais en ella.
  to: Todos los días de su desolación reposará[a]—el reposo que no tuvo durante sus sábados[b], mientras ustedes vivían en ella.
  rationale: Se corrige la inconsistencia pronominal y de registro usando una formulación natural para español latinoamericano amplio («mientras ustedes vivían en ella»). Se conservan «reposará» y «reposo» para reflejar la repetición hebrea. También se reubican y simplifican las notas para que sus marcadores coincidan con el contenido auditado en inglés y se elimina la nota estilística innecesaria sobre el plural, ya que la aclaración contextual sobre «sábados» basta.
