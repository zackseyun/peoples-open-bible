translation:
  language: es
  text: Cesó la vida en las aldeas[a] en Israel; cesó hasta que yo, Débora, me levanté—hasta que me levanté como madre en Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la población rural en Israel», o «los habitantes de las aldeas en Israel». El sustantivo hebreo es difícil y puede referirse a los pobladores de las aldeas o a la vida aldeana en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָדְלוּ / חָדֵלּוּ
  english_pob_choice: ceased
  chosen_spanish: cesó
  alternatives_spanish:
  - se acabó
  - terminó
  - cesó
  lexicon: HALOT
  rationale: El verbo repetido expresa cese o interrupción; «cesó» conserva la repetición poética y la solemnidad del lamento. En singular funciona de forma natural con el sustantivo colectivo «la vida de aldea».
- source_word: פְרָזוֹן
  english_pob_choice: village life
  chosen_spanish: la vida de aldea
  alternatives_spanish:
  - la población rural
  - los habitantes de las aldeas
  - la vida rural
  lexicon: HALOT
  rationale: El término es difícil y puede referirse al modo de vida de los habitantes rurales más que solo a los asentamientos. «La vida de aldea» reproduce bien el sentido social de vida rural no fortificada y evita cerrar indebidamente la ambigüedad del hebreo.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - dentro de Israel
  lexicon: HALOT
  rationale: La preposición ב es locativa aquí; «en Israel» es la forma más natural y fiel en español.
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  - hasta que llegó el momento en que
  lexicon: HALOT
  rationale: La frase marca el punto de giro temporal del poema. «Hasta que» comunica con claridad que la situación anterior duró hasta el levantamiento de Débora.
- source_word: שַׁקַּמְתִּי
  english_pob_choice: I arose
  chosen_spanish: me levanté
  alternatives_spanish:
  - me alzé
  - me puse en pie
  - me levanté para actuar
  lexicon: HALOT
  rationale: Aunque «arose» es más elevado en inglés, en español «me levanté» expresa bien el acto de levantarse y presentarse para actuar, sin sonar forzado. El sentido de iniciativa queda reforzado por la repetición.
- source_word: דְּבוֹרָה
  english_pob_choice: Deborah
  chosen_spanish: Débora
  alternatives_spanish:
  - Débora
  lexicon: Convención onomástica
  rationale: Nombre propio transliterado según el uso español estándar.
- source_word: אֵם
  english_pob_choice: a mother
  chosen_spanish: madre
  alternatives_spanish:
  - una madre
  - madre
  lexicon: HALOT
  rationale: 'La imagen es metafórica u honorífica: Débora se presenta como figura protectora y orientadora para Israel. En español, el paralelo natural con «como madre en Israel» mantiene la fuerza del hebreo sin introducir un artículo que el verso no exige de manera necesaria.'
theological_decisions:
- issue: Imagen metafórica de Débora como madre en Israel
  english_pob_reading: Deborah describes herself as arising 'as a mother in Israel,' a metaphor for protective, nurturing leadership within Israel.
  chosen_spanish_reading: Débora se describe como quien se levantó «como madre en Israel», es decir, como figura de protección y liderazgo para Israel.
  alternative_spanish_readings:
  - «madre de Israel» como título más fuerte
  - lectura estrictamente literal de maternidad biológica
  rationale: El hebreo dice «madre en Israel», no «madre de Israel». Mantener «en Israel» preserva el texto fuente y evita sobrecargar el verso con un título que el hebreo no formula. La imagen sigue siendo claramente honorífica y de liderazgo protector.
  doctrine_reference: Translation philosophy §§1, 3, 4, 5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje mantiene el consenso de alta concordancia y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino cuando aparezca en el contexto mayor, aunque en este verso no se presenta.
  - Se usa «Débora» y no «Deborah» conforme a la ortografía española habitual.
  - Se conserva la ambigüedad controlada de פְרָזוֹן mediante una nota, siguiendo el tratamiento del inglés POB.
  - La repetición verbal del hebreo queda reflejada con dos ocurrencias de «cesó» y dos de «me levanté» para preservar el paralelismo poético.
