translation:
  language: es
  text: 'Por tanto, di[a]: «He aquí, yo le doy mi alianza de paz».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi alianza de bienestar» o «mi alianza de plenitud». El hebreo shalom puede abarcar paz, bienestar y plenitud.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa con naturalidad la relación inferencial fuerte del hebreo; mantiene el valor concluyente sin caer en una paráfrasis excesiva.
- source_word: אֱמֹר
  english_pob_choice: say
  chosen_spanish: di
  alternatives_spanish:
  - diles
  - habla
  lexicon: HALOT
  rationale: En la fórmula de comisión dirigida a Moisés, el imperativo singular «di» reproduce con precisión el mandato de transmitir el mensaje divino.
- source_word: הִנְנִי
  english_pob_choice: Behold, I
  chosen_spanish: He aquí, yo
  alternatives_spanish:
  - Mira, yo
  - Aquí estoy, yo
  lexicon: HALOT
  rationale: «He aquí» conserva el valor deíctico y solemne de la partícula; «yo» mantiene explícita la primera persona enfática del hebreo.
- source_word: נֹתֵן
  english_pob_choice: am giving
  chosen_spanish: le doy
  alternatives_spanish:
  - estoy dando
  - estoy por darle
  lexicon: HALOT
  rationale: El participio con הִנְנִי expresa una acción declarativa/presente; en español «le doy» comunica con naturalidad la acción divina sin añadir una perífrasis innecesaria.
- source_word: לוֹ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El dativo hebreo se expresa de forma idiomática en español con el complemento indirecto «le», manteniendo la referencia al destinatario.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: Aunque «covenant» suele traducirse como «pacto» o «alianza», aquí «pacto» es claro, sobrio y fiel al peso técnico-teológico del término sin imponer un registro eclesiástico fijo.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: de paz
  alternatives_spanish:
  - de bienestar
  - de plenitud
  lexicon: HALOT
  rationale: La construcción genitiva «pacto de paz» preserva la fórmula estable y el término base «paz», dejando implícita la amplitud semántica de שָׁלוֹם sin expandirla en el texto principal.
theological_decisions:
- issue: Covenant formula בְּרִיתִי שָׁלוֹם
  english_pob_reading: my covenant of peace
  chosen_spanish_reading: mi pacto de paz
  alternative_spanish_readings:
  - mi alianza de paz
  - mi pacto de bienestar
  - mi pacto de plenitud
  rationale: Se conserva la estructura formal del hebreo y la carga teológica de שָׁלוֹם en contexto pactal. «Paz» es la opción principal porque mantiene la fórmula reconocible sin desplazar el sentido hacia una explicación interpretativa.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological weight without paraphrase'
translation_notes:
  revision_awareness: La versión española sigue la revisión más formal del inglés auditado, que prefirió «Behold» para reflejar mejor הִנְנִי. Por eso se adopta «He aquí» en vez de una formulación más coloquial. También se preserva la fórmula pactal con «de paz» para no diluir el peso teológico de שָׁלוֹם.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - Se mantiene «pacto» como equivalente técnico de בְּרִית en esta unidad.
  - «He aquí» conserva el tono solemne y la deixis enfática del original.
