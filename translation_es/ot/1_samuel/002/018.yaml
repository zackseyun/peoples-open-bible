translation:
  language: es
  text: Samuel servía[a] delante de Yahvé, un muchacho vestido con un efod de lino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «delante del rostro/presencia de Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁמוּאֵל
  english_pob_choice: Now Samuel
  chosen_spanish: Y Samuel
  alternatives_spanish:
  - Ahora Samuel
  - Entonces Samuel
  lexicon: HALOT
  rationale: La conjunción ו aquí mantiene la continuidad narrativa. En español, 'Y Samuel' conserva el enlace directo sin añadir un adverbio temporal que el hebreo no exige.
- source_word: מְשָׁרֵת
  english_pob_choice: was ministering
  chosen_spanish: servía
  alternatives_spanish:
  - estaba ministrando
  - estaba sirviendo
  - ministraba
  lexicon: HALOT
  rationale: El participio expresa acción continua. 'Servía' comunica el servicio cultual de manera natural en español y evita el anglicismo de 'ministrar' como verbo principal.
- source_word: אֶת פְּנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en la presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La expresión idiomática literalmente alude al rostro/presencia de Yahvé. 'Delante de Yahvé' conserva el valor espacial-relacional sin borrar la tensión lexical del hebreo. Se mantiene 'Yahvé' según la guía terminológica del proyecto.
- source_word: נַעַר
  english_pob_choice: a boy
  chosen_spanish: un muchacho
  alternatives_spanish:
  - un niño
  - un joven
  - un muchacho joven
  lexicon: HALOT
  rationale: El término indica edad juvenil. 'Muchacho' es natural en español bíblico contemporáneo y evita cargar el texto con una precisión innecesaria como 'niño' o 'joven'.
- source_word: חָגוּר
  english_pob_choice: clothed with
  chosen_spanish: vestido
  alternatives_spanish:
  - ceñido
  - girdado
  - ataviado
  lexicon: HALOT
  rationale: El participio pasivo comunica estar provisto o cubierto con una prenda. 'Vestido' resulta claro y fluido en español; 'ceñido' preservaría el matiz etimológico, pero sería menos transparente aquí.
- source_word: אֵפוֹד
  english_pob_choice: ephod
  chosen_spanish: efod
  alternatives_spanish:
  - éfod
  - prenda sacerdotal
  - delantal ritual
  lexicon: HALOT
  rationale: Se conserva el préstamo tradicional 'efod' porque el término designa una prenda cultual específica sin equivalente exacto en español.
- source_word: בָּד
  english_pob_choice: linen
  chosen_spanish: lino
  alternatives_spanish:
  - lino fino
  - lino puro
  lexicon: HALOT
  rationale: En contexto de vestidura cultual, בָּד refiere al material 'lino'. 'Lino' es la traducción directa y suficiente; no se añade 'fino' porque el hebreo no lo expresa explícitamente.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Conforme a la terminología del proyecto, se traduce como 'Yahvé' y no se sustituye por un título velado como 'el SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El análisis de revisión en inglés indica acuerdo alto y sin cambios en la última pasada; por tanto, esta versión española sigue de cerca las decisiones léxicas auditadas sin introducir reinterpretaciones.
  spanish_consistency_notes:
  - Se mantiene el nombre divino 'Yahvé' de forma consistente con la guía del proyecto.
  - Se conserva 'efod' como préstamo técnico para respetar el término cultual específico.
  - El verbo 'servía' refleja el aspecto continuo del participio hebreo sin forzar una traducción más técnica que resulte menos natural en español.
