review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: el sol y la luna se oscurecen, y las estrellas dejan de emitir su brillo. También preserva correctamente la tensión poética del juicio cósmico sin sobreinterpretar la imagen. Sin embargo, la nota al pie española no reproduce con suficiente precisión la alternativa inglesa, porque desplaza el foco desde la expresión completa hacia ''las estrellas'' y añade formulación algo redundante.'
  spanish_quality_summary: El español principal es claro, natural y digno. 'Se oscurecen' y 'retiran su brillo' funcionan bien en registro bíblico moderno. La única reparación necesaria está en la redacción de la nota, que actualmente tiene comillas defectuosas y una formulación menos limpia de lo deseable.
  glossary_alignment: 'No hay términos del glosario maestro en disputa en este versículo. Las decisiones léxicas clave concuerdan con el expediente: קָדָרוּ -> ''se oscurecen''; אָסְפוּ נָגְהָם -> ''retiran su brillo''.'
  issues:
  - severity: medium
    issue: La nota al pie está mal puntuada y no refleja con precisión la alternativa léxica documentada.
    rationale: El inglés conserva la alternativa completa 'the stars gather in their shining', mientras que la nota española dice 'las estrellas recogen su brillo' con comillas defectuosas y luego explica 'retiran o retienen', lo cual introduce una duplicación innecesaria. Conviene anclar la alternativa a la frase verbal y explicarla con español más limpio.
  revised_spanish_text: El sol y la luna se oscurecen[a], y las estrellas retiran su brillo.
  revised_footnotes:
  - marker: a
    text: 'O: "las estrellas recogen su resplandor", es decir, dejan de emitir su luz.'
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel, natural y claro. Solo se corrige la nota al pie para que reproduzca mejor la alternativa léxica del hebreo y del expediente inglés, con puntuación correcta y una explicación más idiomática en español.
