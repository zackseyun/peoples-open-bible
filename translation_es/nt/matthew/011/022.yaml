lexical_decisions:
- source_word: πλὴν
  english_pob_choice: But
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - No obstante
  lexicon: BDAG
  rationale: Introduces un contraste fuerte con la denuncia anterior. En español, «Sin embargo» conserva bien la oposición discursiva y suena natural en un registro bíblico moderno.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les aseguro
  lexicon: BDAG
  rationale: La fórmula directa mantiene el tono solemne y personal. Se usa «les digo» para reflejar el pronombre plural implícito de ὑμῖν sin sobrecargar el ritmo de la frase.
- source_word: Τύρῳ καὶ Σιδῶνι
  english_pob_choice: for Tyre and Sidon
  chosen_spanish: a Tiro y a Sidón
  alternatives_spanish:
  - para Tiro y Sidón
  - con respecto a Tiro y Sidón
  lexicon: BDAG
  rationale: El dativo con comparativo expresa el ámbito de referencia de la comparación. En español, la construcción natural es «a Tiro y a Sidón» dentro de una comparación de personas o ciudades destinatarias del trato en el juicio.
- source_word: ἀνεκτότερον
  english_pob_choice: more tolerable
  chosen_spanish: más tolerable
  alternatives_spanish:
  - más soportable
  - más llevadero
  lexicon: BDAG
  rationale: El comparativo de ἀνεκτός alude a lo que puede ser soportado. «Más tolerable» conserva el matiz judicial y formal de la lectura inglesa auditada.
- source_word: ἔσται
  english_pob_choice: it will be
  chosen_spanish: les será
  alternatives_spanish:
  - será
  - va a ser
  lexicon: BDAG
  rationale: El griego futuro copulativo requiere una formulación idiomática en español. «Les será» integra naturalmente el complemento dativo y mantiene la impersonalidad relativa del original.
- source_word: ἐν ἡμέρᾳ κρίσεως
  english_pob_choice: on the day of judgment
  chosen_spanish: en el día del juicio
  alternatives_spanish:
  - en el día del juicio final
  - en el día del juicio
  lexicon: BDAG
  rationale: La frase señala el momento escatológico del juicio. «Juicio» preserva el sentido forense de κρίσις y es la expresión más natural y transparente en español.
- source_word: κρίσεως
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - juicio
  - condenación
  lexicon: BDAG
  rationale: κρίσις aquí nombra el acto/escena judicial, no solo su resultado negativo. «Juicio» mantiene ese alcance amplio y evita estrechar indebidamente el sentido a «condenación».
- source_word: ἢ ὑμῖν
  english_pob_choice: than for you
  chosen_spanish: que a ustedes
  alternatives_spanish:
  - que para ustedes
  - más que a ustedes
  lexicon: BDAG
  rationale: La comparación final en español fluye de manera natural con «que a ustedes». Esta elección preserva el contraste sin añadir explicaciones ajenas al texto.
theological_decisions:
- issue: Naturaleza del día de juicio
  english_pob_reading: the day of judgment
  chosen_spanish_reading: el día del juicio
  alternative_spanish_readings:
  - un día de juicio
  - el día del juicio final
  rationale: El griego anartro puede traducirse de forma natural en español con artículo definido, como en la versión inglesa auditada. Se conserva la referencia escatológica sin precisar más de lo que el texto dice.
  doctrine_reference: Preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.
translation_notes:
  revision_awareness: La versión sigue de cerca el texto griego y coincide con la lectura inglesa auditada en su sentido principal. No hay revisiones aplicadas en el expediente base, y se conserva la comparación escatológica sin expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni una cita explícita del nombre divino.
  - Se usa «juicio» para κρίσις conforme al valor forense documentado.
  - Se evita «Mesías/Cristo» porque no aparece en el versículo.
  - Se conserva el registro sobrio y público de una formulación proclamativa de Jesús.
