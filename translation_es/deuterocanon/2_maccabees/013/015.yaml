    reason: lexical_alternative
  - marker: b
    text: Literalmente, “el que estaba en la estructura tipo casa”, probablemente el ocupante de la torre o asiento montado sobre el elefante.
    reason: cultural_note
  revision_rationale: Se corrige el anclaje de la nota cultural para que corresponda al ocupante del elefante, conforme a la evidencia griega y a la auditoría inglesa. Se reemplaza “contraseña” por “consigna” para un español más natural en contexto militar; “corte real” por “recinto real” para reflejar el sentido espacial de αὐλή; y “derribó” por “mató” para expresar con claridad la fuerza letal de ἀνεῖλεν respecto de los hombres. El resto del verso se conserva sustancialmente.
