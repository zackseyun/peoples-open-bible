revisions:
- from: Y ustedes serán para mí un reino de sacerdotes y una nación santa[a][b]. Estas son las palabras que hablarás a los hijos de Israel.
  to: Y ustedes serán para mí un reino de sacerdotes[a] y una nación santa. Estas son las palabras que hablarás a los hijos de Israel[b].
  rationale: 'Se aprueba el texto base con una reparación menor: la nota léxica alternativa debe ajustarse para reflejar la alternativa auditada del POB inglés y el sentido del hebreo. «Un reino sacerdotal» preserva mejor מַמְלֶכֶת כֹּהֲנִים que «un sacerdocio real», que desplaza la imagen hacia la formulación neotestamentaria de 1 Pedro 2:9. También se reubica la nota [b] en «hijos de Israel» para anclarla exactamente donde aplica y evitar sobrecargar «nación santa» con una nota ajena.'
