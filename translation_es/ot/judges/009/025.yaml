translation:
  language: es
  text: Entonces los líderes de Siquem[a] pusieron emboscadores contra él en las cumbres de los montes, y robaron a todo el que pasaba junto a ellos por el camino; y se informó a Abimelec.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los ciudadanos de Siquem’ o ‘los señores de Siquem’. La expresión hebrea dice literalmente ‘los בעלי de Siquem’ y puede referirse a los hombres principales o detentadores de poder de la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַעֲלֵי שְׁכֶם
  english_pob_choice: the leaders of Shechem
  chosen_spanish: los líderes de Siquem
  alternatives_spanish:
  - los ciudadanos de Siquem
  - los señores de Siquem
  - los hombres de Siquem
  lexicon: HALOT
  rationale: בַּעֲלֵי literalmente puede significar ‘dueños/señores de’, pero en este contexto cívico-político designa a los hombres principales o detentadores de poder de la ciudad. ‘Líderes’ comunica ese sentido social y político sin sugerir un sistema feudal.
- source_word: וַיָּשִׂימוּ לוֹ מְאָרְבִים
  english_pob_choice: set men in ambush for him
  chosen_spanish: pusieron hombres en emboscada contra él
  alternatives_spanish:
  - establecieron una emboscada contra él
  - pusieron emboscadores contra él
  - tendieron una emboscada para él
  lexicon: HALOT
  rationale: El verbo שׂים con el complemento indirecto y el participio מְאָרְבִים expresa la idea de colocar una emboscada contra alguien. ‘Pusieron hombres en emboscada’ conserva el matiz personal del participio y suena natural en español.
- source_word: מְאָרְבִים
  english_pob_choice: men in ambush
  chosen_spanish: hombres en emboscada
  alternatives_spanish:
  - emboscadores
  - los que estaban al acecho
  - hombres acechando
  lexicon: HALOT
  rationale: El participio de ארב refiere a personas que están al acecho. ‘Hombres en emboscada’ preserva la referencia a personas, no solo a una táctica abstracta.
- source_word: עַל רָאשֵׁי הֶהָרִים
  english_pob_choice: on the tops of the mountains
  chosen_spanish: en las cumbres de los montes
  alternatives_spanish:
  - sobre las cimas de los montes
  - en las cimas de las montañas
  - sobre las cumbres de los montes
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente ‘sobre las cabezas de los montes’. ‘Cumbres de los montes’ mantiene la correspondencia léxica y la elevación estratégica, mientras conserva buen español.
- source_word: וַיִּגְזְלוּ
  english_pob_choice: they robbed
  chosen_spanish: robaron
  alternatives_spanish:
  - saquearon
  - despojaron
  - asaltaron
  lexicon: HALOT
  rationale: גזל suele denotar toma violenta o robo. ‘Robaron’ encaja bien con viajeros despojados en el camino y reproduce la fuerza concreta del verbo.
- source_word: כָּל אֲשֶׁר יַעֲבֹר עֲלֵיהֶם
  english_pob_choice: everyone who passed by them
  chosen_spanish: a todo el que pasaba junto a ellos
  alternatives_spanish:
  - a todos los que pasaban junto a ellos
  - a cualquiera que pasara junto a ellos
  - a todo el que cruzaba junto a ellos
  lexicon: HALOT
  rationale: El singular tras כָּל tiene valor distributivo. ‘Todo el que pasaba junto a ellos’ conserva ese sentido colectivo-distributivo con español natural.
- source_word: בַּדָּרֶךְ
  english_pob_choice: on the road
  chosen_spanish: por el camino
  alternatives_spanish:
  - en el camino
  - sobre el camino
  - por la ruta
  lexicon: HALOT
  rationale: El sustantivo con artículo designa la vía por donde transitan los viajeros. ‘Por el camino’ es una traducción idiomática y fiel en español.
- source_word: וַיֻּגַּד לַאֲבִימֶלֶךְ
  english_pob_choice: it was reported to Abimelech
  chosen_spanish: se le informó a Abimelec
  alternatives_spanish:
  - se informó a Abimelec
  - Abimelec fue informado
  - le llevaron la noticia a Abimelec
  lexicon: HALOT
  rationale: La forma pasiva deja indeterminado al informante. ‘Se le informó’ preserva la impersonalidad del hebreo y el avance narrativo.
- source_word: אֲבִימֶלֶךְ
  english_pob_choice: Abimelech
  chosen_spanish: Abimelec
  alternatives_spanish:
  - Abimelec
  - Abimélec
  lexicon: Transliteración estándar en español bíblico
  rationale: Se usa la forma española habitual ‘Abimelec’ para el nombre propio, de acuerdo con la convención bíblica en español.
translation_notes:
  revision_awareness: 'La auditoría inglesa muestra un único ajuste reciente: ‘hilltops’ pasó a ‘the tops of the mountains’ para acercarse más al hebreo. La versión española sigue esa preferencia con ‘las cumbres de los montes’, manteniendo correspondencia léxica y fluidez natural. No se observan otros cambios de revisión relevantes.'
  spanish_consistency_notes:
  - Se conserva ‘Siquem’ y ‘Abimelec’ con ortografía española bíblica estándar.
  - Se mantiene el registro narrativo en pasado con sintaxis clara y sobria.
  - No se introduce terminología eclesiástica ajena al contexto militar-político del versículo.
  - La nota al pie enmarca la ambigüedad de בַעֲלֵי sin forzar una sola lectura.
