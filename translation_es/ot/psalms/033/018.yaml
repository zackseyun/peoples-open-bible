translation:
  language: es
  text: He aquí, el ojo de Yahvé está sobre los que lo temen, sobre los que esperan[a] su amor fiel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ponen su esperanza en su amor fiel». El verbo hebreo puede expresar tanto esperar como esperar con esperanza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Ciertamente
  lexicon: HALOT
  rationale: La partícula de atención y énfasis se expresa bien con la fórmula bíblica natural «He aquí», que conserva el valor deíctico y solemne del original sin sonar forzada en español.
- source_word: עֵין
  english_pob_choice: the eye
  chosen_spanish: el ojo
  alternatives_spanish:
  - la mirada
  - el ojo vigilante
  lexicon: HALOT
  rationale: Se mantiene la metáfora antropomórfica literal de «ojo», porque el hebreo presenta la imagen de vigilancia atenta de forma transparente. «Ojo» es claro y fiel en español bíblico actual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La convención del proyecto en español es usar «Yahvé» para el Nombre divino. Se conserva el nombre personal del pacto, no una sustitución por título.
- source_word: אֶל
  english_pob_choice: is on
  chosen_spanish: está sobre
  alternatives_spanish:
  - está hacia
  - está puesto sobre
  lexicon: HALOT
  rationale: La preposición con «ojo» expresa atención dirigida. «Está sobre» reproduce de manera natural en español la idea de vigilancia/atención sin perder la dirección del hebreo.
- source_word: יְרֵאָיו
  english_pob_choice: those who fear him
  chosen_spanish: los que lo temen
  alternatives_spanish:
  - los que le reverencian
  - los que temen a él
  lexicon: HALOT
  rationale: Se preserva el registro bíblico de «temer» aplicado a Dios, que comunica reverencia y temor reverente. «Lo temen» sigue de cerca la sintaxis pronominal del hebreo.
- source_word: לַמְיַחֲלִים
  english_pob_choice: those who wait
  chosen_spanish: los que esperan
  alternatives_spanish:
  - los que aguardan
  - los que esperan con confianza
  lexicon: HALOT
  rationale: El verbo admite el sentido de esperar con expectación. «Esperan» conserva la postura durativa y deja que el complemento siguiente especifique el objeto de esa espera; se evita forzar solo el matiz de «aguardar».
- source_word: לְחַסְדּוֹ
  english_pob_choice: for his steadfast love
  chosen_spanish: su amor constante
  alternatives_spanish:
  - su misericordia
  - su amor leal
  - su amor fiel
  lexicon: HALOT
  rationale: חֶסֶד tiene un campo semántico de amor leal, benevolencia de pacto y fidelidad. «Amor constante» comunica esa continuidad y compromiso sin estrechar el término a «misericordia» ni usar una fórmula demasiado técnica.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se sigue la decisión doctrinal del proyecto de transliterar el Tetragrámaton como «Yahvé», manteniendo el Nombre personal de Dios en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: חֶסֶד como término de pacto
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor constante
  alternative_spanish_readings:
  - misericordia
  - amor leal
  - amor fiel
  rationale: El versículo no habla solo de compasión aislada, sino del amor fiel y persistente de Yahvé hacia los suyos. «Amor constante» preserva esa dimensión relacional y duradera.
  doctrine_reference: Lexical theology of חֶסֶד in Psalms
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se registran revisiones aplicadas y el veredicto de control cruzado fue de alta concordancia. La redacción española busca reflejar ese estado estable sin introducir cambios no atestiguados.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar español del proyecto para el Nombre divino.
  - 'Se conserva el paralelismo hebreo con dos miembros: los que temen a Yahvé / los que esperan su amor constante.'
  - «Ojo» mantiene la metáfora antropomórfica sin explicitarla como «mirada» o «vigilancia».
  - La nota mantiene la alternativa verbal que en inglés se expresaba con 'wait/hope' sin sobrecargar el texto principal.
