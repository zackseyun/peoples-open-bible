translation:
  language: es
  text: Pero Yahvé estaba con José y le mostró un amor fiel[a], y le dio favor a los ojos del jefe de la cárcel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «amor leal». El hebreo חָסֶד también puede expresarse como «amor constante», «bondad leal» o «fidelidad amorosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del tetragrámaton en una forma reconocible y reverente para el español, conforme al criterio del proyecto de no ocultarlo con un título. «Yahvé» comunica el mismo valor personal del nombre que «Yahweh» en inglés.
- source_word: וַיְהִי ... אֶת
  english_pob_choice: was with
  chosen_spanish: estaba con
  alternatives_spanish:
  - permanecía con
  - fue con
  lexicon: HALOT
  rationale: La construcción expresa presencia y acompañamiento; en español «estaba con» es natural y fiel al valor idiomático, sin añadir matices ajenos como movimiento o simple localización.
- source_word: חָסֶד
  english_pob_choice: showed him steadfast love
  chosen_spanish: le mostró un amor fiel
  alternatives_spanish:
  - le mostró amor constante
  - le mostró lealtad amorosa
  - le mostró bondad
  lexicon: HALOT
  rationale: «חָסֶד» abarca un amor leal, persistente y cargado de fidelidad; «amor fiel» preserva esa tensión entre afecto y lealtad. No se reduce a «bondad», que sería demasiado débil, ni se expande innecesariamente a una formulación doctrinal no explícita en el verso.
- source_word: וַיִּתֵּן חִנּוֹ
  english_pob_choice: he gave him favor
  chosen_spanish: le concedió favor
  alternatives_spanish:
  - le dio favor
  - le otorgó gracia
  - le concedió aceptación
  lexicon: HALOT
  rationale: «חֵן/חִן» en este contexto administrativo-cortesano es «favor»; el verbo «concedió» refleja bien el acto de otorgar gracia/favor desde una posición superior. «Gracia» podría sonar demasiado teológica o abstracta aquí.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: a los ojos de
  alternatives_spanish:
  - en los ojos de
  - ante
  lexicon: HALOT
  rationale: Se mantiene el giro semítico «a los ojos de», que en español es claro y conserva la textura de la fuente. «Ante» sería más fluido, pero perdería parte de la imagen original.
- source_word: שַׂר
  english_pob_choice: chief
  chosen_spanish: jefe
  alternatives_spanish:
  - jefe principal
  - oficial
  - comandante
  lexicon: HALOT
  rationale: Para español, «jefe» comunica autoridad de manera natural y funcional en el contexto de la cárcel. Se evita un título más técnico o militar que podría desorientar en este escenario.
- source_word: בֵּית הַסֹּהַר
  english_pob_choice: the chief of the prison
  chosen_spanish: de la cárcel
  alternatives_spanish:
  - de la prisión
  - del calabozo
  - de la casa de la cárcel
  lexicon: HALOT
  rationale: La expresión hebrea alude al lugar de confinamiento; en español «cárcel» es clara y digna, y funciona bien con «jefe de la cárcel». No se fuerza una calca como «casa de la prisión».
theological_decisions:
- issue: Valor de חָסֶד en relación con la acción de Yahvé
  english_pob_reading: showed him steadfast love
  chosen_spanish_reading: le mostró un amor fiel
  alternative_spanish_readings:
  - le mostró amor constante
  - le mostró bondad
  - le mostró amor leal
  rationale: El verso atribuye a Yahvé una benevolencia sostenida hacia José. «Amor fiel» conserva tanto la dimensión afectiva como la lealtad perseverante de חָסֶד, sin convertir el texto en una afirmación explícita del pacto que aquí no aparece nombrado.
  doctrine_reference: Translation philosophy §3, §5
- issue: Título para שַׂר בֵּית הַסֹּהַר
  english_pob_reading: chief of the prison
  chosen_spanish_reading: jefe de la cárcel
  alternative_spanish_readings:
  - jefe de la prisión
  - alcaide de la cárcel
  - encargado de la cárcel
  rationale: La frase debe sonar natural en español y conservar la idea de autoridad. «Jefe de la cárcel» sigue de cerca la estructura hebrea sin imponer un término más moderno o interpretativo que pudiera alejarse del registro del pasaje.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'El audit trail inglés muestra oscilación entre «steadfast love», «covenant faithfulness» y formulaciones más literales para חָסֶד, además de ajustes sobre el título del funcionario carcelario. Esta versión española adopta una solución intermedia y publicable: conserva el nombre divino como Yahvé, traduce חָסֶד con una expresión que mantiene su peso leal-afectivo, y prefiere un título natural pero cercano al hebreo («jefe de la cárcel»).'
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה, según el estándar del proyecto.
  - Se usa «amor fiel» para conservar la fuerza relacional de חָסֶד sin sobrerinterpretar el verso.
  - «A los ojos de» reproduce el hebraísmo de בְּעֵינֵי sin perder claridad en español.
  - «Cárcel» se elige por naturalidad y alcance semántico amplio en este contexto narrativo.
