review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el contraste central del hebreo: la sabiduría está cercana/inmediata al entendido, mientras la mirada del necio vaga lejos. También preserva adecuadamente la lectura preposicional de אֶת, el valor adversativo de וְ y la hipérbole de בִּקְצֵה אָרֶץ. Sin embargo, la formulación «delante del rostro de» resulta poco natural en español y sobretraduce la concreción de פְּנֵי de una manera que entorpece la lectura sin añadir fidelidad real.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «delante del rostro de un hombre que discierne» suena forzado y algo calcado. Una forma como «ante el rostro de un hombre entendido» conserva mejor la imagen hebrea con mayor naturalidad bíblica. Además, la nota c del borrador está mal formulada: no debe contraponer «la tierra» a «los confines de la tierra», sino «la tierra» a «la tierra»/«el país» como alternativa para אָרֶץ dentro de la expresión completa.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Sabiduría», «necio» y «tierra» son adecuados. El masculino proverbial se mantiene conforme al rastro de auditoría inglés. La mejora propuesta afecta sobre todo naturalidad y precisión de notas, no términos doctrinales de glosario.
  issues:
  - severity: medium
    issue: 'Expresión principal demasiado calcada: «delante del rostro de»'
    rationale: Aunque intenta conservar פְּנֵי literalmente, en español suena rígido y poco idiomático. «Ante el rostro de» preserva mejor la imagen concreta con lectura más natural.
  - severity: low
    issue: «un hombre que discierne» es correcto pero menos fluido que una opción adjetival
    rationale: El participio proverbial puede expresarse naturalmente como «un hombre entendido», que mantiene el masculino singular y el sentido de discernimiento sin perífrasis pesada.
  - severity: medium
    issue: La nota c no representa bien la alternativa documentada para אָרֶץ
    rationale: La alternativa inglesa es «la tierra» o «el país» en lugar de «la tierra/el mundo» dentro de toda la frase, no «la tierra» en vez de «los confines de la tierra», lo cual altera qué elemento está en variación.
  revised_spanish_text: La sabiduría está ante el rostro de un hombre entendido[a][b], pero los ojos del necio están en los confines de la tierra[c].
