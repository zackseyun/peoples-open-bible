translation:
  language: es
  text: Porque por todos los tormentos los convenceré de que solo los hijos de los hebreos[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «los hijos de los hebreos»; alternativamente, «los hijos varones de los hebreos» o «los jóvenes hebreos».'
    reason: lexical_alternative
  - marker: b
    text: La redacción griega conservada parece sintácticamente incompleta aislada y probablemente continúa en el versículo siguiente; esta traducción refleja la cláusula preservada sin añadir material no expresado.
    reason: textual_variant
lexical_decisions:
- source_word: διὰ
  english_pob_choice: through
  chosen_spanish: por
  alternatives_spanish:
  - a través de
  - mediante
  lexicon: BDAG
  rationale: Con genitivo de medio o instrumento, διὰ expresa el medio por el cual se logrará algo. En español, «por» comunica de manera natural ese sentido instrumental sin forzar una construcción pesada.
- source_word: πασῶν ... τῶν βασάνων
  english_pob_choice: all the tortures
  chosen_spanish: todos los tormentos
  alternatives_spanish:
  - todas las torturas
  - todos los suplicios
  lexicon: BDAG
  rationale: βάσανος alude a tortura, tormento o suplicio. «Tormentos» conserva la pluralidad y el carácter de sufrimiento extremo en un español solemne y comprensible.
- source_word: πείσω
  english_pob_choice: I will convince
  chosen_spanish: yo los convenceré
  alternatives_spanish:
  - yo los persuadiré
  - yo les probaré
  lexicon: BDAG
  rationale: El futuro de πείθω aquí comunica la idea de convencer mediante la experiencia de los tormentos. «Convenceré» preserva ese valor con claridad y sin suavizar el desafío implícito.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - ustedes
  - a ustedes
  lexicon: BDAG
  rationale: El griego usa pronombre de segunda persona plural como objeto directo. En español, el referente queda marcado por el contexto; se evita repetir «ustedes» de modo pesado y se mantiene la referencia implícita en el clítico.
- source_word: μόνοι
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - solamente
  lexicon: BDAG
  rationale: «Solo» reproduce la exclusividad de μόνοι con una forma natural y breve en español.
- source_word: οἱ παῖδες Ἑβραίων
  english_pob_choice: the sons of the Hebrews
  chosen_spanish: los hijos de los hebreos
  alternatives_spanish:
  - los hijos varones de los hebreos
  - los jóvenes hebreos
  lexicon: BDAG
  rationale: παῖδες puede significar hijos, niños o jóvenes. Dado que el contexto trata de varones concretos, «hijos» conserva la relación filial y la referencia masculina sin introducir una paráfrasis más libre.
theological_decisions:
- issue: Referencia masculina de παῖδες en un contexto de martirio
  english_pob_reading: sons
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - niños
  - jóvenes
  rationale: El pasaje se refiere a los hermanos mártires; en español, «hijos» mantiene la filiación y deja claro el referente masculino en contexto, sin necesitar un añadido doctrinal o explicativo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Cláusula griega probablemente incompleta
  english_pob_reading: The surviving Greek wording appears syntactically incomplete in isolation and likely continues into the next verse; this translation reflects the extant clause without supplying unstated material.
  chosen_spanish_reading: La redacción griega conservada parece sintácticamente incompleta en aislamiento y probablemente continúa en el versículo siguiente; esta traducción refleja la cláusula existente sin suplir material no expresado.
  alternative_spanish_readings:
  - Suplementar la frase para hacerla correr con fluidez
  - Suponer la continuación implícita del verso
  rationale: 'Se conserva la tensión textual documentada por la tradición inglesa: el versículo llega truncado en el testimonio preservado. En español no se completa la cláusula con material no atestiguado.'
  doctrine_reference: Doctrina de crítica textual y fidelidad a la evidencia disponible
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió 'every tortures' a 'all the tortures' para reflejar con más precisión el plural griego πασῶν... τῶν βασάνων. La versión española sigue ese ajuste con un plural explícito («todos los tormentos»), manteniendo además la advertencia textual de que la cláusula griega preservada parece incompleta.
  spanish_consistency_notes:
  - Se mantiene «hebreos» como etnónimo correspondiente al griego Ἑβραίων.
  - Se evita «Cristo» u otras fórmulas litúrgicas, pues este versículo no las contiene.
  - Se conserva un registro solemne y directo, apto para lectura eclesial moderna.
  - La puntuación y el orden siguen el valor discursivo del griego sin añadir contenido inferencial.
