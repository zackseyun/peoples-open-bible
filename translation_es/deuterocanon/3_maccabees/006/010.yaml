base_translation:
  language: en
  yaml_path: translation/deuterocanon/3_maccabees/006/010.yaml
  text: But if our way of life in exile has been marked by ungodliness[a], then, after rescuing us from the hand of our enemies, destroy us by whatever death you choose[b], Master.
  footnotes:
  - marker: a
    text: Or 'in our colony/settlement'; the Greek term can denote a colony or settlement, but here likely refers to the community's life in exile.
    reason: lexical_alternative
  - marker: b
    text: Or 'Lord' or 'Sovereign' for 'Master'; the Greek address is δέσποτα, not κύριος.
    reason: lexical_alternative
