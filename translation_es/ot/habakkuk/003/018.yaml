translation:
  language: es
  text: Con todo[a], yo me alegraré en Yahvé; me regocijaré en el Dios de mi salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo abre con וַאֲנִי, literalmente 'y/pero yo' o 'en cuanto a mí', subrayando la resolución personal de Habacuc frente a la devastación del versículo anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahvé
  - en el SEÑOR
  lexicon: WLC / POB doctrine default
  rationale: El hebreo marca la esfera u objeto de la alegría con la preposición ב. En español, 'en Yahvé' conserva ese valor relacional y sigue el criterio POB de usar el nombre divino en forma explícita. Se evita 'SEÑOR' como máscara tipográfica porque el paquete auditado no la exige aquí.
- source_word: אֶעְלֹוזָה
  english_pob_choice: I will rejoice
  chosen_spanish: me alegraré
  alternatives_spanish:
  - me regocijaré
  - me gozaré
  lexicon: HALOT
  rationale: El verbo expresa júbilo/exultación. 'Me alegraré' comunica la idea con naturalidad en español y mantiene el tono de resolución personal. 'Me regocijaré' queda como posibilidad más elevada, pero menos común.
- source_word: אָגִילָה
  english_pob_choice: I will exult
  chosen_spanish: me regocijaré
  alternatives_spanish:
  - me alegraré
  - exultaré
  lexicon: HALOT
  rationale: El segundo verbo intensifica el primero con un matiz de gozo jubiloso. 'Me regocijaré' preserva esa elevación semántica sin sonar forzado; 'exultaré' es más literal pero menos idiomático en español bíblico actual.
- source_word: בֵּאלֹהֵי
  english_pob_choice: in the God of
  chosen_spanish: en el Dios de
  alternatives_spanish:
  - en Dios, el
  - en mi Dios, el
  lexicon: HALOT
  rationale: 'Se conserva la repetición de la preposición y la relación de constructo con un español claro: ''el Dios de''. Esto permite mantener la estructura del hebreo sin sobreexplicar.'
- source_word: יִשְׁעִי
  english_pob_choice: my salvation
  chosen_spanish: mi salvación
  alternatives_spanish:
  - mi liberación
  - mi rescate
  lexicon: HALOT
  rationale: El sustantivo ישׁע puede referir salvación, liberación o rescate. 'Mi salvación' coincide con el registro teológico y poético del verso y con la lectura auditada en inglés.
- source_word: וַאֲנִי
  english_pob_choice: Yet I
  chosen_spanish: con todo, yo
  alternatives_spanish:
  - pero yo
  - así que yo
  lexicon: HALOT
  rationale: La partícula con el pronombre independiente funciona aquí de modo contrastivo frente a la ruina descrita antes. 'Con todo, yo' reproduce bien la oposición y el énfasis personal en español.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. La política terminológica del proyecto pide 'Yahvé' en el texto principal, por fidelidad al nombre del pacto y en continuidad con la transparencia del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Preserving the intensification between two near-synonymous joy verbs
  english_pob_reading: I will rejoice / I will exult
  chosen_spanish_reading: me alegraré / me regocijaré
  alternative_spanish_readings:
  - me alegraré / exultaré
  - me regocijaré / me alegraré
  rationale: El hebreo usa dos verbos poéticos cercanos para intensificar el gozo. En español, mantener dos verbos distintos evita aplanar la fuerza retórica del paralelismo. La combinación elegida preserva contraste y naturalidad.
  doctrine_reference: Poética hebrea y paralelismo sinónimico; sin doctrina controvertida
translation_notes:
  revision_awareness: Se revisó el audit trail inglés y no se detectaron cambios posteriores sustantivos; el criterio vigente mantiene la equivalencia óptima y el uso del nombre divino explícito. La versión española conserva el contraste inicial, la intensificación de los verbos de gozo y el paralelismo del cierre.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en lugar de 'SEÑOR' conforme a la convención del proyecto.
  - Se mantiene 'Dios de mi salvación' para reflejar el constructo hebreo y el tono teológico del verso.
  - '''Me alegraré / me regocijaré'' conserva la duplicación poética sin caer en repetición exacta.'
  - La nota [a] se vincula al contraste inicial de וַאֲנִי y no introduce una variación textual, solo una alternativa lexical relevante.
