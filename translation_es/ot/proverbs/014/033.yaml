translation:
  language: es
  text: En el corazón del entendido[a] reposa la sabiduría, pero en medio de los necios se da a conocer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La sabiduría reposa en el corazón de uno que tiene entendimiento, pero entre los necios se da a conocer»'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּלֵב
  english_pob_choice: in the heart of
  chosen_spanish: en el corazón de
  alternatives_spanish:
  - dentro del corazón de
  - en la mente de
  lexicon: HALOT
  rationale: לֵב designa en hebreo el centro interior de la persona, no solo el órgano físico; "corazón" conserva esa imagen concreta y sigue siendo natural en español bíblico actual.
- source_word: נָבוֹן
  english_pob_choice: a discerning man
  chosen_spanish: uno que tiene entendimiento
  alternatives_spanish:
  - un hombre entendido
  - una persona con entendimiento
  - un hombre prudente
  lexicon: HALOT
  rationale: El adjetivo describe a alguien con entendimiento/discernimiento. En español, una forma inclusiva como "uno que tiene entendimiento" preserva el carácter proverbial sin imponer un sustantivo masculino donde el hebreo funciona de modo representativo.
- source_word: תָּנוּחַ
  english_pob_choice: rests
  chosen_spanish: reposa
  alternatives_spanish:
  - descansa
  - se asienta
  - permanece
  lexicon: HALOT
  rationale: El verbo expresa la idea de llegar a reposo o asentarse. "Reposa" conserva la imagen de quietud habitual de la sabiduría en el interior del entendido.
- source_word: חָכְמָה
  english_pob_choice: Wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - sabiduría
  lexicon: HALOT
  rationale: El sustantivo es el sujeto de la primera cláusula. En español no se requiere mayúscula para reflejar abstracción, y "sabiduría" mantiene la referencia general del proverbio.
- source_word: וּבְקֶרֶב
  english_pob_choice: but in the midst of
  chosen_spanish: pero en medio de
  alternatives_spanish:
  - y en medio de
  - pero entre
  lexicon: HALOT
  rationale: El contexto pide contraste, por lo que "pero" expresa mejor la oposición. "En medio de" conserva la metáfora espacial de קֶרֶב de manera natural en español.
- source_word: כְּסִילִים
  english_pob_choice: fools
  chosen_spanish: los necios
  alternatives_spanish:
  - los insensatos
  - los tontos
  lexicon: HALOT
  rationale: En la literatura sapiencial, כְּסִילִים nombra a personas moral e intelectualmente torpes. "Necios" es el equivalente tradicional y preciso en español bíblico.
- source_word: תִּוָּדֵעַ
  english_pob_choice: it makes itself known
  chosen_spanish: se da a conocer
  alternatives_spanish:
  - se hace visible
  - se hace conocido
  - es conocida
  lexicon: HALOT
  rationale: El nifal de ידע puede leerse como pasivo o inchoativo/reflexivo. "Se da a conocer" conserva la idea de que la sabiduría se vuelve evidente entre los necios, sin forzar una pasiva rígida.
translation_notes:
  revision_awareness: El hebreo y el inglés POB coinciden sustancialmente; la revisión más sensible en español fue elegir una formulación inclusiva para נָבוֹן sin perder el sentido proverbial, y conservar el contraste espacial/adversativo con una construcción natural en español.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de dos miembros con contraste fuerte entre reposo interior y manifestación externa.
  - '"Necios" se conserva como término sapiencial estable para כְּסִילִים.'
  - La cláusula final se tradujo con un matiz reflexivo/incoativo para respetar la ambigüedad del nifal de ידע.
