translation:
  language: es
  text: 'Y Yahvé me dijo otra vez: «Ve, ama a una mujer amada por otro[a] y que comete adulterio, como Yahvé ama a los hijos de Israel[b], aunque se vuelven a otros dioses y aman tortas de pasas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una esposa amada por otro y que comete adulterio». El hebreo אִשָּׁה puede significar «mujer» o «esposa», y רֵעַ puede significar «compañero», «amigo», «asociado» o, según el contexto, posiblemente «marido».
    reason: lexical_alternative
  - marker: b
    text: «Tortas de pasas» probablemente se refiere a tortas prensadas de uvas pasas, posiblemente asociadas con prácticas festivas o idolátricas.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: default project terminology
  rationale: Se sigue el criterio del proyecto de preservar el nombre divino como transliteración reverente y no como sustituto en versales. «Yahvé» mantiene la identificación del tetragrámaton y la continuidad con el texto fuente.
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - una vez más
  - todavía
  lexicon: HALOT
  rationale: En este contexto narrativo introduce una nueva reiteración del mandato profético; «otra vez» conserva bien el valor adverbial de repetición.
- source_word: לֵךְ אֱהַב
  english_pob_choice: Go, love
  chosen_spanish: Ve, ama
  alternatives_spanish:
  - Ve, muestra amor a
  - Ve y ama
  lexicon: HALOT
  rationale: Se conservan dos imperativos directos, como en el hebreo. «Ama» mantiene el enlace léxico con la comparación sobre el amor de Yahvé en la segunda mitad del versículo.
- source_word: אִשָּׁה
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  lexicon: HALOT
  rationale: Se mantiene el valor indefinido y general de אִשָּׁה, sin resolver en la traducción la discusión sobre si debe entenderse explícitamente como «esposa». El contexto narrativo permite la resonancia marital sin imponerla.
- source_word: אֲהֻבַת רֵעַ
  english_pob_choice: loved by another
  chosen_spanish: amada por otro
  alternatives_spanish:
  - amada por un compañero
  - amada por un esposo
  - amada por otro hombre
  lexicon: HALOT
  rationale: «Otro» refleja con mayor cercanía la amplitud semántica de רֵעַ ('compañero, asociado, amigo, otro') y preserva la tensión interpretativa documentada por la tradición de audit trail. Se evita precisar «esposo» o «hombre» sin base explícita en el hebreo.
- source_word: וּמְנָאָפֶת
  english_pob_choice: and committing adultery
  chosen_spanish: y adúltera
  alternatives_spanish:
  - y cometiendo adulterio
  - y que comete adulterio
  lexicon: HALOT
  rationale: El participio describe conducta caracterizada por adulterio; en español, un adjetivo predicativo breve transmite bien la cualidad persistente sin perder el sentido activo del hebreo.
- source_word: כְּאַהֲבַת יְהוָה אֶת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: just as Yahweh loves the children of Israel
  chosen_spanish: como Yahvé ama a los hijos de Israel
  alternatives_spanish:
  - como Yahvé ama al pueblo de Israel
  - según el amor de Yahvé por los hijos de Israel
  lexicon: HALOT
  rationale: Se preserva la comparación con el mismo verbo «amar» para reflejar el paralelismo del hebreo. «Hijos de Israel» conserva la expresión pactual y formal del original.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the children of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la formulación tradicional y formal del hebreo, que aquí funciona como expresión colectiva del pueblo del pacto.
- source_word: וְהֵם פֹּנִים אֶל אֱלֹהִים אֲחֵרִים
  english_pob_choice: though they turn to other gods
  chosen_spanish: aunque ellos se vuelven a otros dioses
  alternatives_spanish:
  - y ellos se vuelven a otros dioses
  - mientras ellos se vuelven a otros dioses
  lexicon: HALOT
  rationale: Se traduce el participio con valor habitual/continuativo como una acción de desviación recurrente. «Aunque» expresa la relación concesiva que el hebreo presenta por contraste con el amor de Yahvé.
- source_word: אֲשִׁישֵׁי עֲנָבִים
  english_pob_choice: raisin cakes
  chosen_spanish: tortas de pasas
  alternatives_spanish:
  - pasteles de pasas
  - tortas de uvas pasas
  lexicon: HALOT
  rationale: La expresión idiomática se vierte de modo natural en español. «Tortas de pasas» comunica el alimento sin forzar una equivalencia demasiado técnica; en nota se preserva la posibilidad cultural de «tortas de uvas pasas».
- source_word: וְאֹהֲבֵי אֲשִׁישֵׁי עֲנָבִים
  english_pob_choice: and love raisin cakes
  chosen_spanish: y aman tortas de pasas
  alternatives_spanish:
  - y son amantes de las tortas de pasas
  - y aman pasteles de pasas
  lexicon: HALOT
  rationale: Se mantiene la repetición del verbo «amar», importante en la estructura retórica del versículo, y se evita suavizar la fuerza del sustantivo participial.
theological_decisions:
- issue: Identidad de la mujer en el signo profético
  english_pob_reading: Render the phrase generically as 'a woman' rather than explicitly identifying her as Gomer in the translation.
  chosen_spanish_reading: «una mujer» y no «tu esposa» ni un nombre propio.
  alternative_spanish_readings:
  - «una esposa»
  - «tu esposa»
  - «Gómer»
  rationale: El hebreo no nombra a Gómer ni dice de forma explícita «tu esposa». La versión española mantiene el mismo nivel de especificidad y conserva la tensión interpretativa documentada en el audit trail.
  doctrine_reference: Preservar la tensión textual sin resolverla artificialmente.
- issue: Relación concesiva entre el amor de Yahvé y la infidelidad de Israel
  english_pob_reading: Use 'though they turn to other gods' to express the contrast.
  chosen_spanish_reading: «aunque ellos se vuelven a otros dioses».
  alternative_spanish_readings:
  - «y ellos se vuelven a otros dioses»
  - «mientras ellos se vuelven a otros dioses»
  rationale: La cláusula concesiva hace más explícito el contraste retórico que ya está presente en el hebreo entre el amor de Yahvé y la idolatría de Israel.
  doctrine_reference: Equivalencia óptima; contraste pactual e infidelidad idolátrica.
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión del inglés POB, que afinó la frase de רֵעַ de «another man» a «another» para ajustarse mejor a la amplitud léxica del hebreo. Por eso el español principal usa «otro» y no introduce de manera innecesaria «hombre» o «esposo».
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el nombre divino.
  - Se mantiene la repetición de «amar» en ambas mitades del versículo para preservar el paralelismo.
  - «Hijos de Israel» se conserva como fórmula pactual formal.
  - La nota de pie a marca la ambigüedad de רֵעַ sin cerrar la discusión en el cuerpo principal.
  - La nota de pie b conserva el valor cultural de la expresión sobre las tortas de pasas.
