translation:
  language: es
  text: Y los hombres fueron a Holofernes y le informaron[a] según estas palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en estas palabras». El griego dice más literalmente «según estas palabras», probablemente remitiendo al mensaje exacto que acababan de transmitir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεγένοντο
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - se presentaron
  lexicon: BDAG
  rationale: El verbo griego expresa llegada/presencia en un contexto narrativo sencillo. «Vinieron» conserva la naturalidad del español sin añadir matices formales que el griego no exige.
- source_word: οἱ ἄνδρες
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - los representantes
  lexicon: BDAG
  rationale: El plural masculino es explícito en el griego. «Los hombres» es la equivalencia directa y mantiene la referencia a los enviados del relato.
- source_word: ἀπήγγειλαν
  english_pob_choice: reported
  chosen_spanish: le informaron
  alternatives_spanish:
  - le reportaron
  - le comunicaron
  - le contaron
  lexicon: BDAG
  rationale: El verbo denota llevar de vuelta un mensaje o dar informe. «Le informaron» suena natural en español y conserva el sentido de transmisión fiel de un recado.
- source_word: κατὰ τὰ ῥήματα ταῦτα
  english_pob_choice: according to these words
  chosen_spanish: según estas palabras
  alternatives_spanish:
  - en estas palabras
  - con estas palabras
  - a este efecto
  lexicon: BDAG
  rationale: La frase griega señala correspondencia con las palabras recién dichas. «Según estas palabras» refleja esa relación de ajuste verbal y evita suavizarla demasiado.
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa concuerdan estrechamente; no hubo revisiones sustantivas. La única cuestión de estilo es cómo reflejar en español la expresión algo literal κατὰ τὰ ῥήματα ταῦτα, que la versión inglesa marcó con nota alternativa.
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Holofernes» sin adaptación teológica adicional, conforme al contexto narrativo.
  - La preposición verbalizada con «le informaron» evita un calco rígido y conserva el valor de reporte del verbo griego.
  - La nota a pie de página preserva la alternativa idiomática sin borrar la literalidad del original.
