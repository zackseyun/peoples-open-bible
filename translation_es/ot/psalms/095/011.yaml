translation:
  language: es
  text: 'Así que juré en mi ira[a][b]: «No entrarán en mi reposo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «si entran en mi reposo»; es una fórmula de juramento que significa «no entrarán en mi reposo».'
    reason: lexical_alternative
  - marker: b
    text: O «mi lugar de reposo».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: so
  chosen_spanish: Así que
  alternatives_spanish:
  - por eso
  - de modo que
  - entonces
  lexicon: HALOT
  rationale: El hebreo enlaza esta declaración con la anterior en sentido consecutivo. «Así que» comunica bien la relación de resultado en español natural, sin volverla más explicativa de lo que permite el texto.
- source_word: נִשְׁבַּעְתִּי
  english_pob_choice: I swore
  chosen_spanish: juré
  alternatives_spanish:
  - hice un juramento
  - prometí bajo juramento
  lexicon: HALOT
  rationale: El verbo expresa jurar/tomar juramento. «Juré» es directo, idiomático y conserva la fuerza declarativa del original.
- source_word: בְאַפִּי
  english_pob_choice: in my anger
  chosen_spanish: en mi ira
  alternatives_spanish:
  - en mi enojo
  - en mi furor
  lexicon: HALOT
  rationale: El hebreo usa un modismo de la parte de la nariz/ira para expresar enojo divino. «Ira» mantiene la intensidad semántica y es un registro apropiado en español bíblico actual.
- source_word: אִם יְבֹאוּן
  english_pob_choice: They shall not enter
  chosen_spanish: No entrarán
  alternatives_spanish:
  - si entran
  - ciertamente no entrarán
  lexicon: HALOT
  rationale: Después de un juramento, אִם funciona como fórmula elíptica de negación. El español requiere hacer explícita la negación para que el sentido del juramento sea claro y fiel a la fuerza del hebreo.
- source_word: יְבֹאוּן אֶל
  english_pob_choice: enter
  chosen_spanish: entrarán
  alternatives_spanish:
  - entrarán a
  - irán a
  lexicon: HALOT
  rationale: La idea es acceso negado a un lugar. En español, el verbo simple «entrar» comunica de manera natural la combinación de בוא + אֶל sin calco pesado.
- source_word: מְנוּחָתִי
  english_pob_choice: my rest
  chosen_spanish: mi reposo
  alternatives_spanish:
  - mi descanso
  - mi lugar de reposo
  lexicon: HALOT
  rationale: «Reposo» preserva la resonancia teológica de מְנוּחָה y deja abierta la tensión entre estado de descanso y lugar de reposo, como lo hace el inglés POB con «my rest».
theological_decisions:
- issue: Fórmula de juramento elíptica con אִם
  english_pob_reading: 'Explicit negation in English: ''They shall not enter my rest.'''
  chosen_spanish_reading: 'Negación explícita: «No entrarán en mi reposo».'
  alternative_spanish_readings:
  - «Si entran en mi reposo»
  - «Ciertamente no entrarán en mi reposo»
  rationale: La construcción hebrea usa אִם de manera elíptica en un juramento, no como condicional ordinario. El español debe expresar la negación para comunicar la fuerza real del texto, sin perder que la forma subyacente es juramentaria.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor de מְנוּחָה
  english_pob_reading: my rest
  chosen_spanish_reading: mi reposo
  alternative_spanish_readings:
  - mi descanso
  - mi lugar de reposo
  rationale: «Reposo» conserva la posibilidad de entender tanto el estado de descanso como el lugar de reposo, sin reducir el alcance semántico. Así se mantiene la tensión documentada por el texto fuente y el audit trail.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el audit trail inglés, conservando la estructura juramentaria de אִם mediante negación explícita en español y manteniendo abierta la doble posibilidad semántica de מְנוּחָה. No se aplicaron revisiones posteriores en el contexto provisto.
  spanish_consistency_notes:
  - Se usa «Yahvé» según la convención del proyecto cuando aparezca el nombre divino en el contexto amplio, aunque en este versículo no se explicita en la cita directa.
  - «Reposo» se mantiene de forma consistente para מְנוּחָה por su carga bíblico-teológica.
  - La puntuación con dos puntos introduce correctamente la cita directa en español bíblico moderno.
