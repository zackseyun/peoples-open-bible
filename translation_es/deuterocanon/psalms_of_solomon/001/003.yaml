translation:
  language: es
  text: Pensé en mi corazón que estaba lleno de rectitud[a], cuando prosperé y llegué a tener muchos hijos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia». El griego puede significar ambas cosas, pero aquí probablemente se refiere a una rectitud moral percibida.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «llegar a ser grande en hijos»; es decir, «tener muchos hijos» o «aumentar en descendencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλογισάμην
  english_pob_choice: I thought
  chosen_spanish: Pensé
  alternatives_spanish:
  - Consideré
  - Razoné
  lexicon: LSJ
  rationale: El aoristo medio de λογίζομαι introduce una reflexión interior. «Pensé» comunica de manera natural el acto de evaluar dentro de uno mismo, sin volver el verbo innecesariamente técnico.
- source_word: ἐν καρδίᾳ μου
  english_pob_choice: in my heart
  chosen_spanish: en mi corazón
  alternatives_spanish:
  - dentro de mí
  - en mi interior
  lexicon: LSJ
  rationale: La expresión conserva el matiz bíblico de asiento interno de pensamiento y autoevaluación. «En mi corazón» es la equivalencia más directa y reconocible en español.
- source_word: ἐπλήσθην
  english_pob_choice: I was filled
  chosen_spanish: estaba lleno
  alternatives_spanish:
  - fui lleno
  - me había llenado
  lexicon: LSJ
  rationale: El pasivo indica un estado de plenitud. En este discurso interior, el español fluye mejor con «estaba lleno», que conserva el estado sin forzar un tiempo más pesado.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia/rectitud
  lexicon: LSJ
  rationale: Aunque el inglés POB favorece «righteousness» por la autoevaluación moral, en español «justicia» recoge bien el campo semántico de δικαιοσύνη. Se mantiene la tensión posible con «rectitud» en nota para no borrar la alternativa léxica.
- source_word: ἐν τῷ εὐθηνῆσαί με
  english_pob_choice: when I prospered
  chosen_spanish: cuando prosperé
  alternatives_spanish:
  - al prosperar
  - cuando florecí
  lexicon: LSJ
  rationale: El infinitivo articular con ἐν tiene fuerza temporal. «Cuando prosperé» expresa con claridad ese marco temporal en español y mantiene el sentido de prosperidad/thriving.
- source_word: πολλὴν γενέσθαι
  english_pob_choice: became great
  chosen_spanish: llegué a ser grande
  alternatives_spanish:
  - me hice grande
  - llegué a ser abundante
  lexicon: LSJ
  rationale: La frase griega es comprimida; πολλήν aporta la idea de grandeza/abundancia. «Llegué a ser grande» refleja el aumento sin añadir elementos ajenos al texto.
- source_word: ἐν τέκνοις
  english_pob_choice: in children
  chosen_spanish: en hijos
  alternatives_spanish:
  - en hijos/descendencia
  - en descendencia
  lexicon: LSJ
  rationale: τέκνα puede significar hijos o descendencia. «En hijos» sigue de cerca la forma del griego y conserva la referencia concreta a la abundancia de progenie.
theological_decisions:
- issue: Rendering of δικαιοσύνη as a self-assessment under prosperity
  english_pob_reading: I was filled with righteousness when I prospered and became great in children.
  chosen_spanish_reading: estaba lleno de justicia cuando prosperé y llegué a ser grande en hijos.
  alternative_spanish_readings:
  - estaba lleno de rectitud cuando prosperé y llegué a ser grande en hijos
  - estaba lleno de justicia/rectitud cuando prosperé y llegué a ser grande en hijos
  rationale: El contexto muestra una percepción interior de estado moral asociada a prosperidad y fecundidad. «Justicia» preserva la ambigüedad de δικαιοσύνη y mantiene el término doctrinalmente cargado; se deja constancia de «rectitud» como alternativa posible sin borrar el matiz ético.
  doctrine_reference: 'DOCTRINE.md contested terms: δικαιοσύνη → justice/righteousness'
translation_notes:
  revision_awareness: El texto inglés más reciente simplifica la cláusula de temporalidad y prefiere «became great in children». La versión española sigue ese estado revisado y evita la expansión paraprástica, manteniendo a la vez la ambigüedad controlada de δικαιοσύνη mediante nota.
  spanish_consistency_notes:
  - Se usa «Dios» solo cuando el texto lo exige; aquí no aparece.
  - Se mantiene el registro bíblico sobrio y moderno, evitando arcaísmos innecesarios.
  - «Hijos» traduce τέκνοις de forma literal y natural en español, con aclaración en nota sobre descendencia.
  - Las notas usan marcadores únicos y se anclan exactamente en las palabras correspondientes del texto.
