id: 3MA.5.5
reference: 3 Maccabees 5:5
source:
  edition: lxx-swete-1909
  text: οἵ τε πρὸς τούτοις λειτουργοὶ κατὰ τὴν ἑσπέραν ἐξιόντες τὰς τῶν ταλαιπωρουμένων ἐδέσμευον χεῖρας, τὴν τε λοιπὴν ἐμηχανῶντο περὶ αὐτοὺς ἀσφάλειαν ἔννυχον, δοξαντες ὁμοῦ λήμψεσθαι τὸ φύλον πέρας τῆς ὀλεθρίας.
  language: Greek
  pages:
  - 742
  confidence: high
  validation: agree
translation:
  text: And in addition[a], the attendants, going out at evening, bound the hands of those who were suffering, and contrived the rest of the nighttime security concerning them[b], thinking that they would together bring the race to the end of destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the people' or 'the nation' for 'the race' (τὸ φύλον), referring to the Jewish people as a whole.
    reason: lexical_alternative
  - marker: b
    text: The Greek phrase rendered 'the complete destruction' is literally closer to 'the end/consummation of destruction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λειτουργοὶ
  chosen: attendants
  alternatives:
  - servants
  - officials
  - ministers
  lexicon: LSJ
  rationale: In this narrative context the word refers to those carrying out assigned service under authority, not cultic 'ministers' in a worship setting. 'Attendants' preserves the sense of functionaries without importing ecclesiastical overtones.
- source_word: κατὰ τὴν ἑσπέραν
  chosen: at evening
  alternatives:
  - toward evening
  - in the evening
  lexicon: LSJ
  rationale: A straightforward temporal phrase. 'At evening' is concise and natural while remaining close to the Greek.
- source_word: τὰς τῶν ταλαιπωρουμένων ... χεῖρας
  chosen: the hands of those who were suffering
  alternatives:
  - the hands of the afflicted
  - the hands of the miserable
  lexicon: LSJ
  rationale: ταλαιπωρουμένων denotes people in distress or misery. 'Those who were suffering' communicates their condition in readable modern English without sounding archaic.
- source_word: ἐδέσμευον
  chosen: bound
  alternatives:
  - tied
  - fettered
  lexicon: LSJ
  rationale: The verb indicates binding or fastening. 'Bound' is the most direct and idiomatic rendering here.
- source_word: τὴν τε λοιπὴν ... ἀσφάλειαν ἔννυχον
  chosen: the rest of the nighttime security
  alternatives:
  - the remaining overnight security
  - night watch for the remainder
  lexicon: LSJ
  rationale: The phrase is somewhat compressed in Greek. It refers to additional security measures for the night. 'The rest of the nighttime security' keeps the structure visible while remaining intelligible.
- source_word: ἐμηχανῶντο
  chosen: devised
  alternatives:
  - contrived
  - arranged
  - planned
  lexicon: LSJ
  rationale: The middle voice suggests active contrivance or planning. 'Devised' captures intentional arrangement, with a slightly negative shade fitting the hostile action.
- source_word: δοξαντες
  chosen: thinking
  alternatives:
  - supposing
  - expecting
  lexicon: LSJ
  rationale: The participle introduces their assumption or expectation. 'Thinking' is simple and accurate.
- source_word: λήμψεσθαι
  chosen: would receive
  alternatives:
  - would obtain
  - would get
  lexicon: LSJ
  rationale: λαμβάνω commonly means receive or obtain. 'Would receive' is formally close, though the idiom is unusual in English; it preserves the Greek notion of coming into possession of an outcome.
- source_word: τὸ φύλον
  chosen: the race
  alternatives:
  - the people
  - the nation
  - the stock
  lexicon: LSJ
  rationale: In context this refers to the Jewish ethnic group as a whole. 'Race' reflects the collective ethnic sense of φύλον here better than 'tribe,' which would sound too narrow, though 'people' is also possible.
- source_word: πέρας τῆς ὀλεθρίας
  chosen: the complete destruction
  alternatives:
  - the end of destruction
  - the final ruin
  - the consummation of destruction
  lexicon: LSJ
  rationale: πέρας can mean end, completion, or consummation. In context the sense is not merely 'an end' but the full carrying-through of ruin. 'The complete destruction' expresses the expected annihilating outcome in natural English.
