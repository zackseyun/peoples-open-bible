review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la secuencia narrativa hebrea: dijo a sus hijos, les ordenó preparar el animal, ellos lo hicieron, y él montó. Sin embargo, hay dos desajustes importantes con el sentido y con la auditoría inglesa: בָּנָיו es específicamente masculino plural, por lo que «sus hijos» en español puede pasar, pero «sus hijos[a]» con una nota mal anclada no corresponde; y la nota inglesa fue mal trasladada, porque el alternativo formal pertenece a «So/And they saddled...», no a «his sons». Además, «aparejar el asno» es comprensible pero menos natural y menos preciso que «ensillar el asno» en este contexto de montar.'
  spanish_quality_summary: El texto es legible, pero la nota al pie está colocada en el lugar equivocado y su contenido no corresponde al anclaje. «Aparéjenme el asno» suena algo forzado en español bíblico contemporáneo; «Ensíllenme el asno» es más claro y natural. «Y montó sobre él» es aceptable, pero «y montó en él» o «y se montó en él» sería menos literal; aun así, «sobre él» sigue siendo fiel y digno. Conviene mantener «asno» por registro bíblico.
  glossary_alignment: 'No hay términos teológicos mayores en juego. «Asno» concuerda con el registro buscado. La principal corrección es lexical/estilística: חבש en este contexto se expresa mejor con «ensillar» que con «aparejar». También debe corregirse la gestión de la nota al pie para reflejar la alternativa documentada en el POB inglés.'
  issues:
  - severity: high
    issue: La nota al pie está anclada a «sus hijos[a]», pero su contenido trata sobre la cláusula «Y ellos le aparejaron el asno».
    rationale: Esto rompe la correspondencia entre texto y nota exigida por el proyecto y distorsiona la auditoría inglesa, donde la nota alternativa pertenece a la segunda acción narrativa, no a «his sons».
  - severity: medium
    issue: «Aparéjenme / le aparejaron el asno» es menos natural y menos específico que «ensíllenme / le ensillaron el asno».
    rationale: El hebreo חבש aquí significa preparar el animal para montarlo; en español, «ensillar» expresa esa acción de manera más idiomática y precisa en este contexto.
  - severity: low
    issue: «sus hijos» puede mantenerse, pero la justificación lexical debería reconocer más claramente que aquí se refiere a hijos varones.
    rationale: El hebreo es masculino plural específico. «Sus hijos» es aceptable en español, pero no debe tratarse como plenamente neutral.
  revised_spanish_text: 'Y dijo a sus hijos: «Ensíllenme el asno». Y ellos le ensillaron el asno[a], y montó sobre él.'
  revised_footnotes:
  - marker: a
    text: 'O, más formalmente: «Y le ensillaron el asno».'
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación de la nota al pie para que ancle la cláusula correcta según la auditoría inglesa. Se sustituye «aparejar» por «ensillar» por mayor naturalidad y precisión contextual en español, manteniendo «asno» por registro bíblico. No se requiere adjudicación adicional.
