    issue: הֲדָפוֹ se vierte como 'lo derribó'
    rationale: El hebreo הֲדָפוֹ y la auditoría inglesa apuntan a empujar, rechazar o ahuyentar, no primariamente a derribar. 'Derribó' introduce una imagen de caída física más específica de la que exige el texto.
  revised_spanish_text: ¿Por qué fue arrastrado tu poderoso[a]? No se mantuvo en pie, porque Yahvé lo rechazó.
