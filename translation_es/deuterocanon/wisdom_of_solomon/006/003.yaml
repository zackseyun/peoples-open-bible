  source_alignment_summary: 'El borrador español refleja bien el sentido del griego: la autoridad y la soberanía proceden de Dios, y él examinará tanto las obras como las deliberaciones internas de los gobernantes. Las decisiones principales (''autoridad'', ''soberanía'', ''Yahvé'', ''el Altísimo'', ''examinará'', ''investigará'', ''planes'') están alineadas con la evidencia fuente y con la auditoría inglesa.'
  spanish_quality_summary: 'El texto principal es claro, natural y digno en español eclesial. Sin embargo, hay un error notable en la nota b: ''counselos'' no es español. Además, en esa misma nota conviene usar una alternativa española natural como ''consejos'' o mejor ''designios/deliberaciones''. El resto del verso lee bien.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: κύριος se vierte como ''Yahvé'' conforme a la política del proyecto, Ὕψιστος como ''el Altísimo'', y los términos de autoridad política se distinguen adecuadamente como ''autoridad'' y ''soberanía''. No hay conflicto doctrinal ni terminológico serio.'
  issues:
  - severity: medium
    issue: La nota b contiene la forma no española 'counselos'.
    rationale: Es un error lingüístico visible que afecta la calidad editorial y no preserva adecuadamente la alternativa léxica documentada en inglés.
  - severity: low
    issue: La alternativa léxica de βουλάς en la nota b puede expresarse mejor en español.
    rationale: Para lectores hispanos, 'consejos' puede funcionar, pero 'deliberaciones' o 'intenciones' explica mejor el matiz de planes internos; al menos debe evitarse el anglicismo/forma híbrida actual.
  revised_spanish_text: Porque la autoridad les fue dada por Yahvé[a], y la soberanía por el Altísimo, quien examinará sus obras e investigará sus planes[b];
  revised_footnotes:
  - marker: a
    text: O 'de Yahvé'; el griego con παρά + genitivo marca la fuente de la autoridad.
    reason: lexical_alternative
  - marker: b
    text: '''Planes'' también puede verterse ''consejos'' o ''intenciones'', subrayando la deliberación interior además de las acciones externas.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural, y solo se corrige la nota b para eliminar el error 'counselos' y ofrecer alternativas léxicas correctas en español conforme a la auditoría inglesa.
