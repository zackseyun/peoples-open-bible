revisions:
- from: En la soberbia del impío[a], el pobre es perseguido con vehemencia[b]; caigan atrapados en las maquinaciones que han ideado.
  to: En la soberbia del impío, el pobre es perseguido encarnizadamente[a]; sean atrapados[b] en las maquinaciones que han ideado.
  rationale: Se corrigen los anclajes de las notas para que coincidan con las ambigüedades reales del hebreo y del audit trail inglés. También se ajusta «caigan atrapados» a «sean atrapados» para reflejar mejor la voz pasiva de יִתָּפְשׂוּ, y se sustituye «con vehemencia» por «encarnizadamente» para una expresión más natural de persecución hostil en español bíblico moderno.
