- from: porque me han abandonado y han hecho ofrendas[a] a otros dioses, para provocarme a ira por todo el trabajo de sus manos. Por eso mi furor ha sido encendido contra este lugar, y no se apagará.
  to: porque me han abandonado y han hecho ofrendas[a] a otros dioses, para provocarme a ira con toda la obra de sus manos. Por eso mi ira se ha encendido contra este lugar, y no se apagará.
  rationale: 'Se hicieron reparaciones menores para mejorar fidelidad idiomática y corrección del español: «obra de sus manos» refleja mejor el hebreo que «trabajo de sus manos», y «mi ira se ha encendido» preserva con naturalidad la metáfora del fuego y evita una construcción pasiva torpe. Se mantuvo la nota sobre «quemado incienso» porque corresponde al rastro léxico documentado en el English POB.'
