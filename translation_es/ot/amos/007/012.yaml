review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la secuencia narrativa, el vocativo חֹזֶה como «Vidente», la doble orden «ve, huye», «la tierra de Judá», y mantiene correctamente el literal «come allí pan» con nota para el sentido de sustento. La alineación con el hebreo y con la auditoría inglesa es en general fiel.
  spanish_quality_summary: 'El texto principal es natural y claro en español bíblico moderno. La única reparación necesaria está en la nota: «haz allí tu vida» no corresponde bien al sentido documentado de «make your living there»; en español suena impropio y puede entenderse existencialmente, no como sustento. Conviene reemplazarlo por una formulación idiomática clara como «gánate allí la vida» o «hazte allí tu sustento».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Vidente» para חֹזֶה está bien justificado frente a «profeta». No aparece terminología sensible adicional.
  issues:
  - severity: medium
    issue: La nota al pie incluye la alternativa «haz allí tu vida».
    rationale: No reproduce fielmente el sentido auditado «make your living there». En español neutral, «hacer tu vida» suele significar establecerse o vivir independientemente, no ganarse el sustento. Esto debilita la precisión léxica de la nota.
  revised_spanish_text: 'Entonces Amazías dijo a Amós: «Vidente, ve, huye a la tierra de Judá, y come allí pan[a], y profetiza allí».'
  revised_footnotes:
