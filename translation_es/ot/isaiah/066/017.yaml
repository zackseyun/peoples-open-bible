  rationale: Se elimina «todos» porque no corresponde directamente al hebreo יַחְדָּו y sobrecarga la frase. Se conserva el resto del borrador, incluida la nota sobre la frase cultual oscura, porque refleja bien el source packet y el audit trail inglés.
