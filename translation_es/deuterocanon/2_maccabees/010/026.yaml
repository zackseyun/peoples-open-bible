translation:
  language: es
  text: Por tanto, harás bien en enviarles y darles garantías de buena fe[a], para que, conociendo nuestra intención, estén animados[b] y vivan contentos con apoyo para sus propios asuntos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «habiendo dado las derechas», un modismo griego que expresa promesa, pacto o garantía de paz y buena fe.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «de buen ánimo» o «confiados».
    reason: lexical_alternative
  - marker: c
    text: La frase final también puede leerse más estrechamente como «con apoyo para sus propias posesiones/asuntos».
    reason: lexical_alternative
lexical_decisions:
- source_word: εὖ ... ποιήσεις
  english_pob_choice: you will do well
  chosen_spanish: harás bien
  alternatives_spanish:
  - obrarás bien
  - harás lo correcto
  - te convendrá
  lexicon: LSJ
  rationale: La fórmula griega expresa una recomendación aprobatoria; «harás bien» reproduce de forma natural la fuerza exhortativa sin volverlo mecánico.
- source_word: διαπεμψάμενος πρὸς αὐτούς
  english_pob_choice: to send to them
  chosen_spanish: enviarles
  alternatives_spanish:
  - mandar a ellos
  - despacharles
  - enviar mensajeros a ellos
  lexicon: LSJ
  rationale: El griego sugiere envío o comunicación hacia ellos, sin explicitar mensajeros; «enviarles» conserva amplitud y fluidez en español.
- source_word: δοὺς δεξιάς
  english_pob_choice: give pledges of good faith
  chosen_spanish: darles garantías de buena fe
  alternatives_spanish:
  - darles la diestra
  - darles aseguranzas
  - estrechar la mano derecha
  lexicon: LSJ
  rationale: La expresión es idiomática y alude a un gesto de promesa o pacto. En español, «garantías de buena fe» comunica el valor pragmático del gesto sin perder su sentido diplomático.
- source_word: προαίρεσιν
  english_pob_choice: intention
  chosen_spanish: intención
  alternatives_spanish:
  - propósito
  - resolución
  - voluntad
  lexicon: LSJ
  rationale: «Intención» refleja la decisión deliberada o propósito que está presente en el contexto de negociación.
- source_word: εὔθυμοί
  english_pob_choice: encouraged
  chosen_spanish: estén animados
  alternatives_spanish:
  - estén de buen ánimo
  - estén confiados
  - estén alentados
  lexicon: LSJ
  rationale: El término describe buen ánimo o disposición positiva; «estén animados» mantiene la idea de ánimo fortalecido y suena natural en español bíblico contemporáneo.
- source_word: ἡδέως διαγίνωνται
  english_pob_choice: may live gladly
  chosen_spanish: vivan contentos
  alternatives_spanish:
  - pasen la vida con gusto
  - vivan con alegría
  - transcurran agradablemente
  lexicon: LSJ
  rationale: La expresión apunta a vivir/pasar el tiempo con agrado; «vivan contentos» recoge el matiz de bienestar sereno con sobriedad.
- source_word: πρὸς τῇ τῶν ἰδίων ἀντιλήψει
  english_pob_choice: with support for their own interests
  chosen_spanish: con apoyo para sus propios intereses
  alternatives_spanish:
  - con ayuda para sus propios asuntos
  - con respaldo para sus propias posesiones
  - con protección de lo suyo
  lexicon: LSJ
  rationale: ἀντίληψις puede significar ayuda o apoyo, y τῶν ἰδίων abre la referencia a lo propio de ellos. Se evita reducirlo solo a bienes materiales y se conserva la amplitud del texto.
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del inglés auditado al hacer explícito el destinatario de «darles», y al reflejar la cláusula final con una formulación natural en español que conserve la amplitud de πρὸς τῇ τῶν ἰδίων ἀντιλήψει sin restringirla indebidamente a bienes materiales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma de la serie, aunque este versículo no contiene el tetragrámaton.
  - Se usa «intención» para προαίρεσις, en continuidad con la decisión inglesa auditada.
  - Se prefiere «garantías de buena fe» para el modismo de la diestra, con nota explicativa para preservar la tensión entre literalidad y sentido idiomático.
  - «Estén animados» y «vivan contentos» buscan un registro bíblico moderno y legible, sin depender de fórmulas eclesiásticas fosilizadas.
