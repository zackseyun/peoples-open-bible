translation:
  language: es
  text: 'Entonces enviaron y reunieron a todos los señores de los filisteos ante ellos, y dijeron: «¿Qué haremos con el arca del Dios de Israel?». Y dijeron: «Que el arca del Dios de Israel sea llevada a Gat[a]». Entonces trasladaron el arca del Dios de Israel a Gat.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que el arca del Dios de Israel vaya a Gat», con el verbo enfatizando el movimiento o traslado más que el modo exacto de transporte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלְחוּ
  english_pob_choice: they sent
  chosen_spanish: enviaron
  alternatives_spanish:
  - mandaron
  - despacharon
  lexicon: HALOT
  rationale: En este contexto, שׁלח introduce el envío de mensajeros para convocar a los jefes; «enviaron» conserva el sentido directo sin añadir matices innecesarios.
- source_word: וַיַּאַסְפוּ
  english_pob_choice: and gathered
  chosen_spanish: y reunieron
  alternatives_spanish:
  - y juntaron
  - y convocaron
  lexicon: HALOT
  rationale: אָסף expresa reunir/convocar; «reunieron» mantiene el acto concreto de juntar a los jefes en presencia de quienes hablan.
- source_word: סַרְנֵי פְלִשְׁתִּים
  english_pob_choice: the lords of the Philistines
  chosen_spanish: los señores de los filisteos
  alternatives_spanish:
  - los gobernantes de los filisteos
  - los príncipes de los filisteos
  lexicon: HALOT
  rationale: סֶרֶן es el título de los jefes de las ciudades filisteas. «Señores» sigue el peso honorífico de «lords» y evita «príncipes», que sugeriría una monarquía hereditaria.
- source_word: אֲלֵיהֶם
  english_pob_choice: to themselves
  chosen_spanish: junto a ellos
  alternatives_spanish:
  - a ellos
  - ante ellos
  lexicon: HALOT
  rationale: La idea es que los hicieron venir a su presencia/lugar. En español, «junto a ellos» comunica la reunión sin forzar un giro reflexivo poco natural.
- source_word: מַה נַּעֲשֶׂה
  english_pob_choice: What shall we do
  chosen_spanish: ¿Qué haremos?
  alternatives_spanish:
  - ¿Qué debemos hacer?
  - ¿Qué vamos a hacer?
  lexicon: HALOT
  rationale: El imperfecto cohortativo expresa deliberación; «¿Qué haremos?» conserva la consulta directa y sobria del hebreo.
- source_word: לַאֲרוֹן
  english_pob_choice: with the ark
  chosen_spanish: con el arca
  alternatives_spanish:
  - respecto del arca
  - al arca
  lexicon: HALOT
  rationale: Aunque el inglés opta por «with», en español la pregunta natural es «¿Qué haremos con...?». Mantiene la función del complemento sin literalidad rígida.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  lexicon: HALOT
  rationale: La construcción posesiva se expresa de manera directa y reverente con «el Dios de Israel».
- source_word: גַּת
  english_pob_choice: Gath
  chosen_spanish: Gat
  alternatives_spanish:
  - Gath
  lexicon: HALOT
  rationale: Se translitera el topónimo al español como «Gat», forma breve y clara para lectores hispanos.
- source_word: יִסֹּב
  english_pob_choice: be brought around
  chosen_spanish: sea llevada
  alternatives_spanish:
  - sea trasladada
  - vaya alrededor
  lexicon: HALOT
  rationale: El verbo סבב aquí señala movimiento/traslado del arca. «Sea llevada» comunica el traslado de manera natural en español y deja abierta la cuestión del modo exacto, como en la nota inglesa.
- source_word: וַיַּסֵּבּוּ
  english_pob_choice: they brought ... around
  chosen_spanish: llevaron ... alrededor
  alternatives_spanish:
  - trasladaron ...
  - hicieron ... ir alrededor
  lexicon: HALOT
  rationale: 'El hifil es causativo: hicieron que el arca siguiera el movimiento hacia Gat. «Llevaron ... alrededor» conserva la continuidad léxica con la cláusula anterior y el matiz de traslado.'
theological_decisions:
- issue: Tratamiento del nombre divino en אֱלֹהֵי יִשְׂרָאֵל
  english_pob_reading: the God of Israel
  chosen_spanish_reading: el Dios de Israel
  alternative_spanish_readings:
  - el Dios de Israel
  - el Dios de Israel
  rationale: Aquí el hebreo usa אֱלֹהֵי como constructo con valor singular referencial; no se trata de pluralidad de dioses sino del único Dios asociado a Israel. «Dios» comunica bien esa referencia sin perder la forma constructa.
  doctrine_reference: Monoteísmo bíblico; uso referencial singular de אֱלֹהִים en constructo.
- issue: Verbo de movimiento del arca (יִסֹּב / וַיַּסֵּבּוּ)
  english_pob_reading: be brought around / they brought ... around
  chosen_spanish_reading: sea llevada / llevaron ... alrededor
  alternative_spanish_readings:
  - sea trasladada / trasladaron ...
  - vaya a Gat / hicieron ir ...
  rationale: La POB inglesa preserva la tensión entre un verbo de circular/volver y el hecho narrativo de mover el arca. En español, «llevada» y «llevaron ... alrededor» conservan el desplazamiento sin resolver excesivamente el modo técnico de transporte.
  doctrine_reference: Coherencia narrativa y precisión lexical; no hay implicación doctrinal directa, pero sí fidelidad al aspecto verbal.
translation_notes:
  revision_awareness: La versión anterior fue corregida para anclar la nota [a] directamente en «Gat[a]», eliminando el error de una nota sin marcador en el texto. Se mantuvo la decisión auditada de traducir el verbo de סבב con una formulación de movimiento/traslado, ahora explicitada en la nota española.
  spanish_consistency_notes:
  - Se mantuvo «Dios de Israel» de manera uniforme para אֱלֹהֵי יִשְׂרָאֵל.
  - «Señores de los filisteos» conserva el registro honorífico del título filisteo sin introducir una monarquía implícita.
  - Se evitó «SEÑOR» para el nombre divino, conforme a las pautas del proyecto.
  - La cláusula final conserva el eco de movimiento («alrededor») para reflejar el doble uso de סבב en el hebreo.
