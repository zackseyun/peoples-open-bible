translation:
  language: es
  text: Cuando Josué y todo Israel vieron que la emboscada había capturado la ciudad y que el humo de la ciudad había subido[a], se volvieron y derribaron a los hombres de Hai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la fuerza en emboscada había capturado la ciudad'. El participio hebreo puede expresarse de manera más explícita para identificar al contingente que estaba al acecho.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאוּ
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - vio y comprendió
  - advirtió
  - percibió
  lexicon: HALOT
  rationale: El verbo de visión/percepción se mantiene concreto y narrativo. En español, 'vio' reproduce de forma natural la observación inmediata que desencadena la acción militar siguiente.
- source_word: כִּי ... וְכִי
  english_pob_choice: that ... and that
  chosen_spanish: que ... y que
  alternatives_spanish:
  - cuando ... y
  - porque ... y porque
  lexicon: HALOT
  rationale: Aquí las cláusulas introducen el contenido de lo que Josué e Israel vieron. 'Que ... y que' conserva la estructura explicativa sin forzar una lectura causal o temporal.
- source_word: לָכַד
  english_pob_choice: had captured
  chosen_spanish: había capturado
  alternatives_spanish:
  - capturó
  - había tomado
  - había apresado
  lexicon: HALOT
  rationale: El pluscuamperfecto español refleja la acción completada antes del momento de la percepción, como en el inglés POB, y conserva el sentido militar de capturar.
- source_word: הָאֹרֵב
  english_pob_choice: the ambush
  chosen_spanish: la emboscada
  alternatives_spanish:
  - el grupo en emboscada
  - los emboscados
  - la fuerza en emboscada
  lexicon: HALOT
  rationale: El participio hebreo designa a la fuerza oculta. 'La emboscada' es una forma idiomática en español que conserva la referencia colectiva y militar sin perder claridad.
- source_word: עָלָה עֲשַׁן הָעִיר
  english_pob_choice: the smoke of the city had gone up
  chosen_spanish: el humo de la ciudad había subido
  alternatives_spanish:
  - el humo de la ciudad había ascendido
  - el humo de la ciudad se había elevado
  - el humo de la ciudad había subido al cielo
  lexicon: HALOT
  rationale: '''Había subido'' mantiene la imagen hebrea de ascenso del humo. Se evita una paráfrasis excesiva y se conserva el movimiento vertical del original.'
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: they turned back
  chosen_spanish: se volvieron
  alternatives_spanish:
  - volvieron atrás
  - dieron vuelta
  - retrocedieron
  lexicon: HALOT
  rationale: En contexto bélico, el verbo indica un cambio de dirección para reanudar el ataque. 'Se volvieron' resulta natural en español y conserva la idea de giro estratégico.
- source_word: וַיַּכּוּ
  english_pob_choice: struck down
  chosen_spanish: golpearon
  alternatives_spanish:
  - hirieron
  - aplastaron
  - derribaron
  lexicon: HALOT
  rationale: El verbo נכה puede abarcar golpear o herir con fuerza. Aquí se opta por 'golpearon' para no añadir de manera automática el matiz de muerte que el hebreo inmediato no explicita en esta cláusula.
- source_word: אַנְשֵׁי הָעָי
  english_pob_choice: the men of Ai
  chosen_spanish: los hombres de Hai
  alternatives_spanish:
  - la gente de Hai
  - los varones de Hai
  - los habitantes de Hai
  lexicon: HALOT
  rationale: Se conserva 'hombres' por la precisión del hebreo אַנְשֵׁי. 'Hai' sigue la forma española tradicional del topónimo, más reconocible y de lectura natural que una transliteración estricta.
translation_notes:
  revision_awareness: El borrador sigue de cerca la puntuación y la secuencia temporal del texto hebreo, a la vez que adapta el resultado a un español publicable. Se tomó la decisión de mantener la ambigüedad del sujeto en 'la emboscada' mediante una nota alternativa, en línea con el aparato inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se conserva 'Hai' para el topónimo por consistencia con el español bíblico y la inteligibilidad eclesial.
  - Se mantiene 'hombres' para אַנְשֵׁי, evitando neutralización no sustentada por el hebreo.
  - La estructura 'vio que... y que...' refleja la sintaxis observada en el texto base sin introducir causalidad.
  - El tono es sobrio y narrativo, adecuado para una edición bíblica pública.
