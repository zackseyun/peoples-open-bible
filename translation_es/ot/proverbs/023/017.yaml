translation:
  language: es
  text: No dejes que tu corazón envidie a los pecadores[a], sino mantente en el temor de Yahvé todo el día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No tenga envidia tu corazón de los pecadores, sino permanezca en el temor de Yahvé todo el día».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagas que
  - No dejes que
  lexicon: HALOT
  rationale: La partícula prohibitiva exige una negación imperativa en español; «No» conserva la fuerza directa del mandato sin añadir contenido.
- source_word: יְקַנֵּא
  english_pob_choice: envy
  chosen_spanish: envidies
  alternatives_spanish:
  - tenga envidia
  - sea celoso de
  lexicon: HALOT
  rationale: En este contexto el verbo expresa deseo/envidia frente al aparente bienestar de otros; «envidies» es la equivalencia más natural y precisa en español.
- source_word: לִבְּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tú
  lexicon: HALOT
  rationale: Se conserva «corazón» para mantener la imagen bíblica del centro interior de la persona, en vez de reducirla a una paráfrasis abstracta.
- source_word: בַּחַטָּאִים
  english_pob_choice: sinners
  chosen_spanish: a los pecadores
  alternatives_spanish:
  - a los que pecan
  - a los malos
  lexicon: HALOT
  rationale: «Pecadores» reproduce de manera directa la categoría moral del hebreo y mantiene la referencia personal al grupo caracterizado por el pecado.
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: HALOT
  rationale: 'La combinación introduce una corrección contrastiva: no X, sino Y. En español, «sino» refleja mejor esa estructura adversativa que un simple «pero».'
- source_word: בְּיִרְאַת יְהוָה
  english_pob_choice: in the fear of Yahweh
  chosen_spanish: en el temor de Yahvé
  alternatives_spanish:
  - en reverencia a Yahvé
  - en el temor del Señor
  lexicon: HALOT
  rationale: Se conserva la expresión bíblica fija «temor de Yahvé», sin suavizarla a solo «reverencia», porque el hebreo apunta a una disposición religiosa reverente y temerosa a la vez.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la política del proyecto de traducir el Tetragrámaton por «Yahvé», preservando el nombre propio divino en lugar de sustituirlo por un título.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el día entero
  - constantemente
  lexicon: HALOT
  rationale: La expresión marca duración continua durante la jornada; «todo el día» es natural en español y conserva la fuerza temporal sin sobreinterpretar.
theological_decisions:
- issue: Cómo expresar la segunda cláusula elíptica en contraste con la primera prohibición
  english_pob_reading: be in the fear of Yahweh all day long
  chosen_spanish_reading: mantente en el temor de Yahvé todo el día
  alternative_spanish_readings:
  - permanece en el temor de Yahvé todo el día
  - vive en el temor de Yahvé todo el día
  rationale: El hebreo contrapone la envidia hacia los pecadores con una postura sostenida de temor reverente a Yahvé. «Mantente» comunica esa continuidad sin añadir el matiz interpretativo de «continuar en» más allá del contraste de la cláusula.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preservar el paralelismo y la elipsis del hebreo con español natural.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente reemplazó 'continue in' por 'be in' para reflejar con mayor cercanía el hebreo. Por eso la redacción española evita 'continúa en' y usa una formulación estática/durativa («mantente en») que conserva el contraste sin añadir una idea de progreso no explicitada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la política del proyecto para יהוה.
  - «Corazón» se conserva por la metáfora antropológica bíblica, no como simple sinónimo de mente.
  - «Temor de Yahvé» se traduce de modo estable como expresión técnica bíblica, no como mera ansiedad o pánico.
