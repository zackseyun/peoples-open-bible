translation:
  language: es
  text: Dormitan tus pastores[a], rey de Asiria; tus nobles yacen[b]. Tu pueblo está disperso[c] sobre los montes, y no hay quien lo reúna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘duermen’. El hebreo puede sugerir líderes negligentes o incapacitados, no solo el acto literal de dormir. ‘Tus pastores’ es una metáfora de los gobernantes o dirigentes de Asiria.
    reason: lexical_alternative
  - marker: b
    text: O ‘tus poderosos habitan/descansan’. El verbo hebreo puede significar ‘habitar’, pero aquí probablemente continúa la imagen de dirigentes tendidos e inactivos.
    reason: alternative_reading
  - marker: c
    text: El hebreo detrás de ‘está disperso’ es difícil; este sentido se apoya en la cláusula siguiente, ‘y no hay quien lo reúna’.
    reason: textual_variant
lexical_decisions:
- source_word: נָמוּ
  english_pob_choice: slumber
  chosen_spanish: se adormecieron
  alternatives_spanish:
  - duermen
  - se durmieron
  - están adormecidos
  lexicon: HALOT
  rationale: El verbo comunica sueño o somnolencia; en este contexto profético, ‘se adormecieron’ conserva la imagen de líderes inactivos o incapaces y suena natural en español, sin volverlo meramente literal.
- source_word: רֹעֶיךָ
  english_pob_choice: your shepherds
  chosen_spanish: tus pastores
  alternatives_spanish:
  - tus gobernantes
  - tus dirigentes
  - tus líderes
  lexicon: HALOT
  rationale: Se mantiene la metáfora de ‘pastores’, que es la elección del POB en inglés y forma parte del lenguaje profético. Aunque alude a gobernantes, no se sustituye por un término explicativo en el texto principal.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: O king of Assyria
  chosen_spanish: rey de Asiria
  alternatives_spanish:
  - oh rey de Asiria
  - rey asirio
  lexicon: HALOT
  rationale: El hebreo funciona como vocativo; en español puede expresarse con una coma sin necesidad de ‘oh’. ‘Rey de Asiria’ conserva la forma directa y la solemnidad del خطاب.
- source_word: יִשְׁכְּנוּ
  english_pob_choice: lie down
  chosen_spanish: se recuestan
  alternatives_spanish:
  - habitan
  - descansan
  - yacen
  lexicon: HALOT
  rationale: Aunque שכן suele ser ‘habitar’, aquí el paralelismo con ‘adormecerse’ favorece el sentido de recostarse o yacer. ‘Se recuestan’ mantiene la imagen de inmovilidad y es idiomático en español.
- source_word: אַדִּירֶיךָ
  english_pob_choice: your nobles
  chosen_spanish: tus nobles
  alternatives_spanish:
  - tus poderosos
  - tus hombres ilustres
  - tus magnates
  lexicon: HALOT
  rationale: ‘Nobles’ refleja bien el valor social-político de אַדִּירִים en este contexto. Evita forzar un matiz exclusivamente militar y sigue de cerca la lectura inglesa auditada.
- source_word: נָפֹשׁוּ
  english_pob_choice: are scattered
  chosen_spanish: está disperso
  alternatives_spanish:
  - se dispersa
  - son esparcidos
  - están esparcidos
  lexicon: HALOT
  rationale: El hebreo es difícil; siguiendo el contexto y la línea final, se expresa la dispersión del pueblo. En español se ajusta a ‘está disperso’ para concordar con ‘tu pueblo’ como colectivo.
- source_word: עַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - tu nación
  - tus súbditos
  lexicon: HALOT
  rationale: ‘Pueblo’ es la equivalencia más natural y fiel al hebreo. Mantiene el referente colectivo sin estrecharlo indebidamente a un grupo militar.
- source_word: עַל הֶהָרִים
  english_pob_choice: on the mountains
  chosen_spanish: sobre los montes
  alternatives_spanish:
  - en los montes
  - por los montes
  - sobre las montañas
  lexicon: HALOT
  rationale: ‘Montes’ es una forma española plenamente válida y más literaria que ‘montañas’ en este contexto poético. ‘Sobre’ conserva la preposición hebrea de manera directa.
- source_word: וְאֵין מְקַבֵּץ
  english_pob_choice: and there is no one to gather them
  chosen_spanish: y no hay quien lo reúna
  alternatives_spanish:
  - y no hay quien los junte
  - y no hay quien los congregue
  - y nadie los reúne
  lexicon: HALOT
  rationale: La idea de ‘reunir’ expresa היטב el contraste con la dispersión. El singular ‘lo’ concuerda con ‘tu pueblo’ como colectivo en español, sin alterar el sentido del hebreo.
theological_decisions:
- issue: Metáfora de ‘pastores’ para los dirigentes de Asiria
  english_pob_reading: Your shepherds is a metaphor for Assyria's rulers or leaders.
  chosen_spanish_reading: ‘Tus pastores’ se mantiene como metáfora de los dirigentes de Asiria.
  alternative_spanish_readings:
  - tus gobernantes
  - tus líderes
  - tus autoridades
  rationale: La decisión conserva la imagen pastoral del original y del POB inglés. En español, traducirlo directamente como ‘pastores’ evita perder la metáfora profética, mientras que la aclaración interpretativa puede ir en nota.
  doctrine_reference: Uso profético-metafórico del lenguaje pastoral; cf. Ezequiel 34 como marco conceptual
- issue: Sentido de ‘nobles’ / ‘mighty ones’ y la pasividad del verbo
  english_pob_reading: Or 'your mighty ones dwell/rest.' The Hebrew verb can mean 'dwell,' but here likely continues the image of leaders lying inactive.
  chosen_spanish_reading: ‘Tus nobles se recuestan’ conserva la pasividad e inmovilidad del paralelismo.
  alternative_spanish_readings:
  - tus poderosos habitan
  - tus poderosos descansan
  - tus magnates yacen
  rationale: En español, ‘se recuestan’ comunica mejor la imagen de estar tendidos o inactivos dentro del paralelismo con ‘se adormecieron’. No se traduce como simple ‘habitan’ porque el contexto favorece la inactividad, no la residencia.
  doctrine_reference: Paralelismo poético hebreo y semántica contextual del verbo שכן
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada y quedó sin cambios en el último pase; el acuerdo de revisión es alto y no se registraron objeciones sustantivas, por lo que la redacción española sigue de cerca esa lectura estable.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ por norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se mantuvo la metáfora ‘pastores’ en lugar de sustituirla por ‘gobernantes’, para no borrar un rasgo léxico documentado.
  - Se prefirió ‘montes’ por cohesión poética con el hebreo y por naturalidad bíblica en español.
  - El pronombre objeto singular ‘lo’ en ‘lo reúna’ trata ‘tu pueblo’ como colectivo, acorde con el uso español natural y con el referente singular-comunal del hebreo.
