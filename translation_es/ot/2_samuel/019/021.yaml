translation:
  language: es
  text: Porque tu siervo sabe que yo he pecado. Y he aquí, hoy he venido, el primero de toda la casa de José[a], para descender al encuentro de mi señor el rey[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «La casa de José» se refiere aquí a las tribus de José, especialmente a los grupos tribales del norte asociados con Efraín y Manasés.
    reason: cultural_note
  - marker: b
    text: O «desde toda la casa de José». La construcción hebrea también puede entenderse en el sentido de que él fue el primero de entre todo el grupo de José en bajar para encontrarse con el rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  lexicon: HALOT
  rationale: En este contexto de habla cortesana ante el rey, el POB inglés eligió una forma deferente. En español, «siervo» comunica adecuadamente la fórmula de respeto sin introducir con demasiada fuerza la idea de esclavitud, que aquí no es el foco pragmático.
- source_word: חָטָאתִי
  english_pob_choice: I have sinned
  chosen_spanish: yo he pecado
  alternatives_spanish:
  - yo pequé
  - he pecado
  lexicon: HALOT
  rationale: El verbo hebreo expresa falta moral real. «He pecado» conserva el valor perfecto como confesión actual de una acción pasada, y la forma con sujeto explícito refuerza la confesión personal en español.
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y mira, aquí
  lexicon: HALOT
  rationale: «He aquí» preserva la fuerza deíctica y la solemnidad del hebreo y coincide con la revisión inglesa hacia un registro más formal.
- source_word: בָאתִי
  english_pob_choice: I have come
  chosen_spanish: he venido
  alternatives_spanish:
  - he llegado
  - vine
  lexicon: HALOT
  rationale: 'El perfecto hebreo se entiende aquí como acción con resultado presente: el hablante está ya delante del rey. «He venido» conserva ese valor mejor que un simple pretérito.'
- source_word: רִאשׁוֹן
  english_pob_choice: as the first
  chosen_spanish: el primero
  alternatives_spanish:
  - primero
  - como el primero
  lexicon: HALOT
  rationale: El hebreo funciona de modo predicativo en la frase. En español, «el primero» es la forma más natural y deja clara la prioridad del hablante dentro del grupo.
- source_word: לְכָל בֵּית יוֹסֵף
  english_pob_choice: of all the house of Joseph
  chosen_spanish: de toda la casa de José
  alternatives_spanish:
  - de todo el linaje de José
  - entre toda la casa de José
  lexicon: HALOT
  rationale: Se mantiene la designación tribal «casa de José» para no diluir la referencia histórica. «De toda» expresa bien el sentido colectivo y la posible lectura distributiva sin forzarla.
- source_word: בֵּית יוֹסֵף
  english_pob_choice: the house of Joseph
  chosen_spanish: la casa de José
  alternatives_spanish:
  - la casa de Efraín
  - la casa de José
  lexicon: HALOT
  rationale: Se conserva la expresión literal, porque la fuente inglesa también la preserva y el contexto tribal se aclara en nota. No se sustituye por una etiqueta interpretativa en el texto principal.
- source_word: לָרֶדֶת
  english_pob_choice: to come down
  chosen_spanish: para descender
  alternatives_spanish:
  - para bajar
  - para ir a bajar
  lexicon: HALOT
  rationale: Aunque en español cotidiano «bajar» sería más común, «descender» respeta mejor la imagen espacial y la elevación implícita del movimiento hacia el rey.
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: a encontrarme con
  alternatives_spanish:
  - para encontrarme con
  - a recibir
  lexicon: HALOT
  rationale: La construcción con infinitivo final pide en español una forma natural de finalidad. «A encontrarme con» transmite el ir al encuentro de alguien sin perder la dirección del hebreo.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi señor, el rey
  - mi señor rey
  lexicon: HALOT
  rationale: Se conserva la fórmula de respeto y el título real. «Señor» refleja el trato cortesano del original y del POB inglés; «rey» mantiene el referente explícito.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión inglesa más reciente: se conserva el tono formal de «he aquí», se mantienen las comas que separan la aposición («el primero de toda la casa de José») y se respeta la lectura verbal de resultado presente en «he venido»; también se evita una paráfrasis que borre la referencia tribal o la confesión personal.'
  spanish_consistency_notes:
  - Se mantuvo «casa de José» de forma literal por coherencia con el tratamiento POB de designaciones tribales.
  - Se prefirió «tu siervo» frente a «tu esclavo» por el registro cortesano del pasaje.
  - No se añadió ninguna nota doctrinal porque el versículo no desarrolla una enseñanza teológica explícita, sino una confesión y una fórmula de acercamiento al rey.
