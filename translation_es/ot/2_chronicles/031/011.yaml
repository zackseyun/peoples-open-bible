    issue: «cámaras» para לְשָׁכוֹת suena poco natural y ambiguo en español general
    rationale: Aunque puede defenderse léxicamente, en español eclesial amplio «cámaras» no es la opción más clara para cuartos del templo. «Aposentos» preserva mejor el sentido arquitectónico con registro digno y legible.
  - severity: low
