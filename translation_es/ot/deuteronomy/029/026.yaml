translation:
  language: es
  text: Entonces el enojo de Yahvé se encendió contra aquella tierra, para traer sobre ella toda la maldición escrita en este libro.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּחַר אַף
  english_pob_choice: the anger ... burned
  chosen_spanish: el enojo ... se encendió
  alternatives_spanish:
  - la ira ... se encendió
  - el enojo ... ardió
  - la ira ... ardió
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y conserva la imagen de un enojo que arde. En español, «se encendió» comunica bien ese valor figurado sin volverlo plano ni excesivamente literal. «Enojo» funciona de manera natural y clara, aunque «ira» también sería posible.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio del texto hebreo como «Yahvé», conforme al criterio del proyecto en español. «SEÑOR» ocultaría el Tetragrámaton y «Yahweh» sería menos natural en español público.
- source_word: בָּאָרֶץ הַהִוא
  english_pob_choice: against that land
  chosen_spanish: contra aquella tierra
  alternatives_spanish:
  - sobre aquella tierra
  - en aquella tierra
  lexicon: HALOT
  rationale: Aunque la preposición hebrea puede expresar la dirección del enojo hacia el objeto, en español «contra aquella tierra» reproduce mejor la relación hostil del contexto judicial. «Aquella tierra» conserva la referencia definida y distante del pasaje.
- source_word: לְהָבִיא
  english_pob_choice: to bring
  chosen_spanish: para traer
  alternatives_spanish:
  - para hacer venir
  - a fin de traer
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad o resultado. «Para traer» es natural en español y conserva el movimiento de juicio hacia el objeto afectado.
- source_word: עָלֶיהָ
  english_pob_choice: upon it
  chosen_spanish: sobre ella
  alternatives_spanish:
  - encima de ella
  - sobre ello
  lexicon: HALOT
  rationale: La forma femenina remite a «tierra». En español, «sobre ella» mantiene la referencia gramatical y el tono de juicio; «sobre ello» perdería la concordancia con el antecedente.
- source_word: כָּל הַקְּלָלָה
  english_pob_choice: every curse
  chosen_spanish: toda la maldición
  alternatives_spanish:
  - cada maldición
  - toda maldición
  - la maldición entera
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular colectivo, en este contexto covenantal/judicial «toda la maldición» suena más natural que «cada maldición» y conserva la idea de totalidad sin forzar un plural inexistente.
- source_word: הַכְּתוּבָה
  english_pob_choice: written
  chosen_spanish: escrita
  alternatives_spanish:
  - que está escrita
  - registrada
  lexicon: HALOT
  rationale: El participio pasivo se vierte directamente como «escrita», que es claro, conciso y mantiene el valor documental/jurídico del texto.
- source_word: בַּסֵּפֶר הַזֶּה
  english_pob_choice: in this book
  chosen_spanish: en este libro
  alternatives_spanish:
  - en este rollo
  - en este documento
  lexicon: HALOT
  rationale: «Libro» es la equivalencia más estable y comprensible en este contexto; puede referir al soporte escrito del pacto sin necesidad de especificar «rollo». «Este» conserva la deixis del original.
theological_decisions:
- issue: Nombre divino en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El hebreo usa directamente יְהוָה. Se preserva el nombre divino como «Yahvé» por coherencia con la norma editorial del proyecto y para evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido auditado del texto hebreo y concuerda con la revisión inglesa vigente sin introducir cambios textuales ni notas variantes, ya que no se documentaron revisiones adicionales en el expediente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה de forma consistente con el estándar del proyecto.
  - Se eligió un español sobrio y publicable, evitando calcos como «hacer venir sobre ella» cuando «traer sobre ella» comunica mejor el juicio.
  - «Tierra» se conservó como referente femenino para permitir la concordancia pronominal de «ella».
