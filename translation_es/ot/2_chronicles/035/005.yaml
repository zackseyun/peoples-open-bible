review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: mandato inicial, ubicación en el lugar santo, arreglo según divisiones, distinción entre los hermanos no levitas y la división correspondiente de los levitas. También preserva la repetición de «según» en la última frase, en línea con la revisión del POB en inglés. Sin embargo, «estén» suena más a estado que a tomar posición, y «las casas paternas de sus hermanos» puede entenderse menos claramente que una formulación más natural con complemento preposicional.'
  spanish_quality_summary: El español es en general claro y digno, pero hay una pequeña rigidez en «Y estén en el lugar santo» y una leve aspereza sintáctica en «las casas paternas de sus hermanos». Una reparación menor mejora la naturalidad y la fuerza imperativa sin apartarse del hebreo ni del rastro de auditoría inglés.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Levitas», «lugar santo» y «casa paterna» son adecuados. La decisión de mantener «los hijos del pueblo» con nota es coherente con la filosofía de precisión de género y con la distinción social/cultual documentada.
  issues:
  - severity: medium
    issue: «Y estén en el lugar santo» debilita el valor directivo de וְעִמְדוּ
    rationale: Aunque gramaticalmente posible, «estén» en español puede sonar estático. «Párense» sería demasiado coloquial; «manténganse» añade aspecto no explícito. «Tomen su puesto» o «colóquense» interpretan demasiado. Una opción como «Y pónganse en el lugar santo» mejora el mandato de colocarse, pero como el cambio es menor, basta revisar con una forma más natural de posicionamiento.
  - severity: low
    issue: «las casas paternas de sus hermanos» resulta algo trabado
    rationale: El hebreo expresa una relación genealógica estándar. En español bíblico legible, «las casas paternas entre sus hermanos» o «de sus hermanos, los hijos del pueblo» puede sonar mejor. La revisión propuesta mantiene la literalidad pero aligera la lectura.
  revised_spanish_text: Y pónganse en el lugar santo, según las divisiones de las casas paternas de sus hermanos[a], los hijos del pueblo, y según la división de una casa paterna para los levitas.
  revised_footnotes:
  - marker: a
    text: O «la gente del pueblo»; literalmente, «los hijos del pueblo», para distinguir a los israelitas no levitas de los levitas.
    reason: lexical_alternative
  revision_rationale: Se hace una reparación menor para expresar mejor el imperativo de posicionarse implícito en וְעִמְדוּ y mejorar la naturalidad del español sin alterar el sentido, la estructura ni las decisiones léxicas clave del POB inglés.
