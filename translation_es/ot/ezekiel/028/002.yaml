translation:
  language: es
  text: 'hijo de hombre[a], di al príncipe de Tiro: «Así dice el Señor Yahvé: Porque tu corazón se ha enaltecido, y dijiste: “Yo soy un dios; me siento en la sede de los dioses, en el corazón de los mares”, pero tú eres hombre y no dios, aunque has puesto tu corazón como el corazón de los dioses[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Soy Dios; me siento en la sede de Dios, en el corazón de los mares». El hebreo אֵל / אֱלֹהִים aquí puede leerse en sentido singular.'
    reason: alternative_reading
  - marker: b
    text: 'O: «aunque has puesto tu corazón como el corazón de Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Mantiene el giro profético fijo de Ezequiel y conserva la fuerza idiomática sin convertirlo en una paráfrasis genérica. En español, «Hijo de hombre» es reconocible y auditable como correspondencia directa del hebreo.
- source_word: לִנְגִיד צֹר
  english_pob_choice: to the prince of Tyre
  chosen_spanish: al príncipe de Tiro
  alternatives_spanish:
  - al gobernante de Tiro
  - al líder de Tiro
  lexicon: HALOT
  rationale: נָגִיד puede abarcar líder o gobernante, pero «príncipe» comunica bien el rango y sigue la elección inglesa documentada, sin elevarlo a «rey» ni diluir el título.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: HALOT
  rationale: Se traduce el nombre divino con el término project-default «Yahvé» en lugar de enmascararlo como «SEÑOR». «Señor Yahvé» refleja el compuesto אֲדֹנָי יְהוִה de forma digna y legible en español.
- source_word: יַעַן גָּבַהּ לִבְּךָ
  english_pob_choice: Because your heart is proud
  chosen_spanish: Porque tu corazón se ha enaltecido
  alternatives_spanish:
  - Porque tu corazón es orgulloso
  - Porque tu corazón se ha vuelto altivo
  lexicon: HALOT
  rationale: El hebreo literalmente habla del corazón elevado/exaltado. «Se ha enaltecido» preserva la imagen y el matiz idiomático mejor que un adjetivo abstracto; mantiene la causalidad de יַעַן.
- source_word: אֵל אָ֔נִי
  english_pob_choice: I am a god
  chosen_spanish: Yo soy un dios
  alternatives_spanish:
  - Yo soy Dios
  - Yo soy divino
  lexicon: HALOT
  rationale: Aquí אֵל se entiende como una autoexaltación pagana y no como referencia directa al Dios de Israel. «Un dios» conserva el contraste con la divinidad verdadera y refleja la lectura contextual del POB.
- source_word: מוֹשַׁב אֱלֹהִים
  english_pob_choice: the seat of gods
  chosen_spanish: la sede de los dioses
  alternatives_spanish:
  - el trono de los dioses
  - la morada de los dioses
  - la sede de Dios
  lexicon: HALOT
  rationale: «Sede» mantiene la imagen de asiento o lugar de residencia. «Los dioses» conserva la lectura plural documentada en el audit trail y evita borrar la tensión textual con una singularización prematura.
- source_word: בְּלֵב יַמִּים
  english_pob_choice: in the heart of the seas
  chosen_spanish: en el corazón de los mares
  alternatives_spanish:
  - en medio de los mares
  - en el centro de los mares
  lexicon: HALOT
  rationale: La metáfora espacial se conserva literalmente en español, con «corazón» como centro/midst. «Mares» sigue el plural hebreo y la imaginería poética del pasaje.
- source_word: וְאַתָּה אָדָם וְלֹא אֵל
  english_pob_choice: yet you are a man and not a god
  chosen_spanish: pero tú eres hombre y no dios
  alternatives_spanish:
  - pero tú eres humano y no un dios
  - pero tú eres un hombre y no Dios
  lexicon: HALOT
  rationale: La contraposición enfatiza la condición mortal frente a la pretensión divina. En español, la forma sin artículo («hombre»/«dios») reproduce el contraste breve y tajante del hebreo.
- source_word: וַתִּתֵּן לִבְּךָ כְּלֵב אֱלֹהִים
  english_pob_choice: though you set your heart like the heart of gods
  chosen_spanish: aunque has puesto tu corazón como el corazón de los dioses
  alternatives_spanish:
  - aunque has puesto tu corazón como el corazón de Dios
  - aunque has dispuesto tu mente como la mente de los dioses
  lexicon: HALOT
  rationale: «Poner el corazón» conserva el modismo hebreo de fijar la disposición interior o la autoestimación. Se mantiene «corazón» y el plural «dioses» para coherencia con la lectura anterior y sin eliminar la alternativa singular.
theological_decisions:
- issue: Cómo rendir אֵל / אֱלֹהִים en la arrogancia del gobernante sin borrar la ambigüedad documentada
  english_pob_reading: Render the boast as generic/plural divinity ('a god,' 'gods') rather than as a direct claim to be the God of Israel.
  chosen_spanish_reading: «Yo soy un dios» / «la sede de los dioses» / «el corazón de los dioses»
  alternative_spanish_readings:
  - «Yo soy Dios» / «la sede de Dios» / «el corazón de Dios»
  - «Yo soy un dios» / «la sede de Dios»
  rationale: El contexto inmediato presenta la soberbia de un gobernante pagano que se deifica a sí mismo. La lectura plural/genérica preserva el tono irónico y la tensión del hebreo; sin embargo, la posibilidad singular debe quedar visible en nota, no borrada.
  doctrine_reference: Mantener la distinción entre Yahvé y otros usos de lenguaje divino; no resolver en el texto una ambigüedad que el hebreo permite.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió solo la puntuación final para que la cita divina abarque toda la cláusula. La redacción española sigue ese mismo criterio, cerrando la cita al final de la palabra final del discurso divino y sin introducir cambios de sentido.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto, evitando la convención de ocultarlo como «SEÑOR».
  - Se conserva la imagen de «corazón» en todos los casos, porque el hebreo repite לֵב y no exige una sustitución por «mente» o «pensamiento».
  - Se mantiene la alternancia entre singular y plural en las formas divinas según el contexto y la nota, para no borrar la tensión textual documentada.
  - 'La puntuación de la cita directa sigue la revisión del audit trail inglés: toda la oración divina queda encerrada entre comillas angulares y la cita final se cierra al final del versículo.'
