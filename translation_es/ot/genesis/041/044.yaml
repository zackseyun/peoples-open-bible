  to: 'Entonces el faraón dijo a José[a]: «Yo soy Faraón[b], y sin ti nadie alzará su mano o su pie en toda la tierra de Egipto»'
  rationale: La revisión corrige la incoherencia entre texto y nota en el modismo «mano o pie», mejora la naturalidad y precisión de וּבִלְעָדֶיךָ con «sin ti», y hace más idiomática la autoidentificación regia con «Yo soy Faraón». Se preservan plenamente el sentido fuente y las notas del POB inglés.
