base_translation:
  language: en
  yaml_path: translation/ot/leviticus/011/032.yaml
  text: 'And everything on which any of them falls when they are dead shall become unclean: any wooden vessel or garment or skin or sackcloth[a], any vessel with which work is done. It shall be put into the water, and it shall be unclean until the evening; then it shall be clean.'
  footnotes:
