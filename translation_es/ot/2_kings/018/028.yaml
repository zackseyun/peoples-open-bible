translation:
  language: es
  text: 'Entonces el Rabsaqué se puso de pie y gritó en voz alta en la lengua de Judá[a], y habló y dijo: «Oigan la palabra del gran rey, el rey de Asiria».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "en hebreo". El término hebreo denota más específicamente la lengua de Judá.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se puso en pie
  alternatives_spanish:
  - se levantó
  - estuvo de pie
  lexicon: HALOT
  rationale: El hebreo narra una acción simple de ponerse de pie dentro de la secuencia wayyiqtol. 'Se puso en pie' conserva la imagen corporal sin sonar forzado en español moderno.
- source_word: רַב־שָׁקֵה
  english_pob_choice: the Rabshakeh
  chosen_spanish: el Rabsaqué
  alternatives_spanish:
  - el Rab-shakeh
  - el chief cupbearer
  lexicon: HALOT
  rationale: Se mantiene el título/nombre tradicionalmente transliterado como forma designativa del oficial asirio. 'Rabsaqué' es la adaptación española más reconocible y evita traducir el cargo de manera explicativa en el texto principal.
- source_word: וַיִּקְרָא בְקוֹל גָּדוֹל
  english_pob_choice: called out in a loud voice
  chosen_spanish: gritó en voz alta
  alternatives_spanish:
  - clamó en voz alta
  - proclamó en voz alta
  lexicon: HALOT
  rationale: El conjunto expresa alzar la voz públicamente. 'Gritó en voz alta' comunica con naturalidad la intensidad auditiva, sin perder el carácter público del anuncio.
- source_word: יְהוּדִית
  english_pob_choice: in Judean
  chosen_spanish: en judeo
  alternatives_spanish:
  - en judío
  - en la lengua de Judá
  lexicon: HALOT
  rationale: El término señala la lengua/dialecto de Judá. 'En judeo' intenta reflejar esa especificidad histórica y lingüística sin sustituirla por 'hebreo'; se conserva así la tensión documentada en la nota inglesa entre la denominación general y la más precisa.
- source_word: וַיְדַבֵּר וַיֹּאמֶר
  english_pob_choice: and he spoke and said
  chosen_spanish: y habló y dijo
  alternatives_spanish:
  - y habló, diciendo
  - y habló, y dijo
  lexicon: HALOT
  rationale: Se conserva la duplicación semítica de los verbos de habla. La versión española mantiene el énfasis narrativo sin añadir contenido interpretativo.
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  - Oíd
  lexicon: HALOT
  rationale: El imperativo plural se vierte con una forma natural y digna en español. 'Oigan' transmite la apelación directa y pública del heraldo.
- source_word: דְּבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la declaración
  lexicon: HALOT
  rationale: Se conserva 'palabra' como equivalente formal para un pronunciamiento oficial. 'Mensaje' sería más interpretativo y 'declaración' diluye el eco bíblico del término.
- source_word: הַמֶּלֶךְ הַגָּדוֹל
  english_pob_choice: the great king
  chosen_spanish: el gran rey
  alternatives_spanish:
  - el poderoso rey
  - el rey العظيم
  lexicon: HALOT
  rationale: El título imperial asirio se traduce de modo directo y solemnemente literal. 'Gran rey' refleja mejor el titulaje real que una paráfrasis dinámica.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - Asiria, su rey
  lexicon: HALOT
  rationale: Se sigue la construcción posesiva normal en español, clara y formal. No requiere adaptación adicional.
theological_decisions:
- issue: La referencia a la lengua de Judea frente a 'hebreo'
  english_pob_reading: Or “in Hebrew.” The Hebrew term more specifically denotes the language of Judah.
  chosen_spanish_reading: en judeo
  alternative_spanish_readings:
  - en hebreo
  - en la lengua de Judá
  rationale: La nota inglesa preserva la tensión entre la designación tradicional y la precisión histórica. El texto principal usa 'en judeo' para reflejar la especificidad del término יְהוּדִית; la nota explica que también puede entenderse como 'en hebreo' en el uso posterior más general.
  doctrine_reference: Filología bíblica / precisión histórico-lingüística
translation_notes:
  revision_awareness: 'Se ha respetado el estado de alta concordancia del audit trail inglés: no hubo revisiones aplicadas y la formulación base se mantiene estable. La traducción española sigue la misma lectura sin introducir aclaraciones ausentes del original, salvo la nota léxica sobre יְהוּדִית.'
  spanish_consistency_notes:
  - Se mantiene 'el Rabsaqué' como título/nombre propio coherente con la tradición de transliteración.
  - '''Gran rey'' conserva el tono titulárico imperial del original.'
  - La duplicación verbal 'habló y dijo' reproduce el paralelismo semítico sin omisión.
  - Se usa 'judeo' para el valor histórico de יְהוּדִית, con nota que preserva la alternativa 'hebreo'.
