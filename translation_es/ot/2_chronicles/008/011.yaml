  glossary_alignment: 'Se alinea bien con la terminología del proyecto: «Yahvé» para יְהוָה, «esposa» para אִשָּׁה en este contexto, «casa» para בַּיִת, y explicitación contextual del plural implícito como «lugares». No hay conflictos teológicos ni terminológicos mayores.'
