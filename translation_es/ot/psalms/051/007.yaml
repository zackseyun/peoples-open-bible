translation:
  language: es
  text: He aquí[a], en iniquidad fui dado a luz[b][c], y en pecado me concibió mi madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ciertamente» o «En verdad» para la partícula inicial.
    reason: lexical_alternative
  - marker: b
    text: O «nací» para «fui dado a luz».
    reason: lexical_alternative
  - marker: c
    text: Este versículo a menudo se entiende ya sea como una confesión de pecaminosidad desde la concepción o como una hipérbole poética en penitencia; el hebreo mismo no resuelve por completo el debate.
    reason: alternative_reading
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Ciertamente
  - Mira
  lexicon: HALOT
  rationale: La partícula abre la línea con énfasis solemne. «He aquí» conserva ese valor demostrativo/exclamativo en español bíblico sin sobretraducirla ni suavizarla demasiado.
- source_word: בְּעָוֹן
  english_pob_choice: in iniquity
  chosen_spanish: en iniquidad
  alternatives_spanish:
  - en culpa
  - con iniquidad
  lexicon: HALOT
  rationale: עָוֹן puede abarcar iniquidad, culpa o perversidad moral. «En iniquidad» mantiene la preposición y la amplitud semántica, igual que la opción inglesa auditada.
- source_word: חוֹלָלְתִּי
  english_pob_choice: I was brought forth
  chosen_spanish: fui engendrado
  alternatives_spanish:
  - fui traído a luz
  - nací
  lexicon: HALOT
  rationale: El verbo admite imagen de nacimiento/traer al mundo. En español, «fui engendrado» conserva el paralelo con la concepción del segundo hemistiquio y evita un giro demasiado interpretativo como «nací».
- source_word: וּבְחֵטְא
  english_pob_choice: and in sin
  chosen_spanish: y en pecado
  alternatives_spanish:
  - y con pecado
  - y en un estado pecaminoso
  lexicon: HALOT
  rationale: חֵטְא es el término común para pecado. «Y en pecado» respeta la preposición y el paralelismo con «en iniquidad» sin expandir el sentido.
- source_word: יֶחֱמַתְנִי
  english_pob_choice: my mother conceived me
  chosen_spanish: me concibió mi madre
  alternatives_spanish:
  - mi madre quedó encinta de mí
  - mi madre me concibió
  lexicon: HALOT
  rationale: El verbo se entiende aquí en el sentido de concebir. El orden español «me concibió mi madre» preserva el contenido y mantiene el paralelismo poético.
- source_word: אִמִּי
  english_pob_choice: my mother
  chosen_spanish: mi madre
  alternatives_spanish:
  - mi madre
  lexicon: HALOT
  rationale: Correspondencia directa y transparente del sustantivo posesivo.
theological_decisions:
- issue: Relación entre concepción, nacimiento e iniquidad/pecado
  english_pob_reading: The wording should preserve the tension rather than settle later theological debates.
  chosen_spanish_reading: La redacción deja en pie la relación entre la existencia del salmista desde la concepción y el lenguaje de iniquidad/pecado, sin decidir si se trata de pecado innato, hipérbole penitencial o referencia al acto materno.
  alternative_spanish_readings:
  - La versión alude principalmente al pecado de la madre en la concepción
  - La versión enseña de forma directa el pecado innato desde la concepción
  - La versión es solo lenguaje hiperbólico de penitencia
  rationale: El hebreo vincula concepción y nacimiento con עָוֹן y חֵטְא, pero no explicita el mecanismo doctrinal. La traducción debe conservar esa tensión, no resolverla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se corrigió la anotación para que cada marca de nota aparezca exactamente en el texto español; se omitió la nota previa [c] porque no tenía anclaje textual en esta redacción.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, aunque este versículo no la requiere.
  - Se usó «pecado» y «iniquidad» para reproducir la distinción poética del hebreo sin nivelarla.
  - La sintaxis conserva el paralelismo de dos hemistiquios y evita una paráfrasis explicativa.
