translation:
  language: es
  text: Es un sabbat de completo reposo para ustedes, y se humillarán[a]; es un estatuto perpetuo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "se afligirán"; tradicionalmente se entiende que esto incluye ayuno y autonegación.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁבַּת
  english_pob_choice: Sabbath
  chosen_spanish: sábado
  alternatives_spanish:
  - Sabbath
  - día de reposo
  lexicon: HALOT
  rationale: En español, "sábado" comunica de manera natural el día sagrado de reposo; "Sabbath" puede conservarse como término técnico, pero en este contexto la equivalencia comunicativa y cultual se expresa mejor con "sábado". Se mantiene la relación con el mandamiento ritual sin perder inteligibilidad.
- source_word: שַׁבָּתוֹן
  english_pob_choice: complete rest
  chosen_spanish: completo reposo
  alternatives_spanish:
  - reposo completo
  - solemne reposo
  - reposo
  lexicon: HALOT
  rationale: La forma intensiva/apositiva pide reforzar el sentido de reposo pleno. "Completo reposo" preserva la fuerza superlativa de la expresión sin sonar arcaico en español.
- source_word: הִיא לָכֶם
  english_pob_choice: It is ... for you
  chosen_spanish: es ... para ustedes
  alternatives_spanish:
  - será ... para ustedes
  - es ... para vosotros
  lexicon: HALOT
  rationale: Se conserva la cláusula copulativa declarativa y el destinatario comunitario. "Para ustedes" ofrece un español neutral y reverente, adecuado para lectura pública.
- source_word: וְעִנִּיתֶם
  english_pob_choice: you shall humble yourselves
  chosen_spanish: se humillarán
  alternatives_spanish:
  - se afligirán
  - se negarán a sí mismos
  - ayunarán
  lexicon: HALOT
  rationale: El valor de ענה en este contexto ritual expresa autohumillación o autonegación. "Se humillarán" mantiene la amplitud semántica del hebreo y evita especificar ayuno en el texto principal, como hace la POB inglesa.
- source_word: נַפְשֹׁתֵיכֶם
  english_pob_choice: yourselves
  chosen_spanish: se
  alternatives_spanish:
  - sus almas
  - sus vidas
  - ustedes mismos
  lexicon: HALOT
  rationale: En la construcción reflexiva, נֶפֶשׁ funciona idiomáticamente. El español natural reproduce la idea con el pronombre reflexivo implícito en "se humillarán", evitando una literalidad engañosa como "almas".
- source_word: חֻקַּת עוֹלָם
  english_pob_choice: a permanent statute
  chosen_spanish: un estatuto perpetuo
  alternatives_spanish:
  - un estatuto permanente
  - un estatuto para siempre
  - un estatuto perpetuo
  lexicon: HALOT
  rationale: '"Estatuto" conserva el lenguaje jurídico-cultual; "perpetuo" expresa la duración normativa de עוֹלָם sin cargar de manera innecesaria con un matiz filosófico. La frase sigue el registro legal del hebreo.'
theological_decisions:
- issue: La orden de autoaflicción/autohumillación en el Día de la Expiación
  english_pob_reading: '"you shall humble yourselves" in the main text, with a note that the traditional understanding includes fasting and self-denial.'
  chosen_spanish_reading: '"se humillarán" en el texto principal, con nota que preserve la alternativa más formal "se afligirán" y la comprensión tradicional de ayuno y autonegación.'
  alternative_spanish_readings:
  - se afligirán
  - ayunarán
  - se negarán a sí mismos
  rationale: El hebreo usa la idiomática combinación ענה + נפש, que no equivale léxicamente a "ayunar" aunque históricamente lo incluya. Mantener "se humillarán" evita estrechar indebidamente el mandato y conserva la tensión documental entre el sentido amplio y la comprensión tradicional.
  doctrine_reference: Levítico 16:31; preservación de tensión lexical/ritual sin resolverla en el texto principal.
translation_notes:
  revision_awareness: La revisión más reciente del expediente inglés indica que no hubo cambios y que el acuerdo con la fuente es alto; por tanto, el borrador español sigue la solución establecida sin introducir nuevas variantes interpretativas.
  spanish_consistency_notes:
  - Se mantiene el tono cultual y jurídico del versículo.
  - '"Completo reposo" reproduce la intensificación del hebreo sin recurrir a arcaísmos.'
  - '"Se humillarán" deja abierta la lectura tradicional de ayuno mediante la nota, sin imponerla en el cuerpo principal.'
  - Se evitó "SEÑOR" y no hay mención al Nombre divino en este versículo.
