  to: para poner a los abatidos en alto,[b] y los que están de luto[a] son exaltados a salvación.
  rationale: Se cambia «los elevan» por «son exaltados» para reflejar con mayor fidelidad el valor resultativo/pasivo de שָׂגְבוּ y evitar introducir un agente no expresado. También se reancla la nota [b] en «en alto»/la frase correspondiente, porque la alternativa auditada en inglés pertenece realmente a la relación de elevación/destino («on high» / «to salvation, deliverance, safety»), no al verbo activo «elevan». Se conservan «los abatidos», «los que están de luto» y «salvación» por fidelidad al expediente léxico y buena legibilidad en español.
