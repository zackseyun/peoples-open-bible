translation:
  language: es
  text: Rubén, tú eres mi primogénito, mi fuerza y las primicias de mi vigor[a], preeminente en dignidad y preeminente en poder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el comienzo de mi fuerza»; la expresión hebrea se refiere a la primera manifestación del vigor generativo del padre.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאוּבֵן
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Rubén, en transliteración
  - Reuvén
  lexicon: N/A (nombre propio)
  rationale: Nombre propio bíblico estándar en español. Se conserva la forma reconocible y de lectura natural en una edición bíblica en español.
- source_word: בְּכֹרִי
  english_pob_choice: my firstborn
  chosen_spanish: mi primogénito
  alternatives_spanish:
  - mi hijo mayor
  - mi primogénito varón
  lexicon: HALOT
  rationale: בְּכוֹר expresa primacía de nacimiento y estatus. 'Primogénito' comunica mejor que 'hijo mayor' la fuerza hereditaria y poética del término, y es un equivalente natural en español bíblico.
- source_word: כֹּחִי
  english_pob_choice: my strength
  chosen_spanish: mi fuerza
  alternatives_spanish:
  - mi poder
  - mi vigor
  lexicon: HALOT
  rationale: '''Fuerza'' conserva el campo semántico básico de כֹּחַ y mantiene el paralelismo poético con la expresión siguiente sin introducir matices demasiado abstractos.'
- source_word: רֵאשִׁית אוֹנִי
  english_pob_choice: the firstfruits of my vigor
  chosen_spanish: las primicias de mi vigor
  alternatives_spanish:
  - el principio de mi vigor
  - la primera expresión de mi vigor
  - las primicias de mi virilidad
  lexicon: HALOT
  rationale: La expresión es idiomática y alude al primer despliegue de la potencia generativa del padre. 'Primicias' preserva la idea de primer fruto/ofrenda inicial y suena natural en español; 'vigor' conserva el sentido de energía vital o generativa sin volverlo clínico o excesivamente explícito.
- source_word: יֶתֶר שְׂאֵת
  english_pob_choice: preeminent in dignity
  chosen_spanish: preeminente en dignidad
  alternatives_spanish:
  - sobresaliente en dignidad
  - superior en honor
  - preeminente en elevación
  lexicon: HALOT
  rationale: יֶתֶר marca exceso/superioridad; שְׂאֵת puede referirse a elevación, dignidad u honor. 'Preeminente en dignidad' sigue de cerca la revisión del inglés POB y conserva la tensión entre elevación y honor sin suavizarla.
- source_word: וְיֶתֶר עָז
  english_pob_choice: preeminent in power
  chosen_spanish: preeminente en poder
  alternatives_spanish:
  - sobresaliente en poder
  - superior en fuerza
  - preeminente en vigor
  lexicon: HALOT
  rationale: El paralelismo con la cláusula anterior sugiere un segundo predicado de superioridad. 'Poder' comunica el campo de עָז y mantiene la simetría con 'dignidad' en español.
theological_decisions:
- issue: Sentido antropológico de 'las primicias de mi vigor'
  english_pob_reading: The phrase refers to the first expression of a father's generative vigor.
  chosen_spanish_reading: La frase alude a la primera manifestación del vigor generativo del padre.
  alternative_spanish_readings:
  - las primeras fuerzas de mi vida
  - la primera expresión de mi vigor
  rationale: Se preserva la tensión semántica del hebreo, que no es solo cronológica sino también generativa. La redacción evita reducir el sentido a mera antigüedad de nacimiento o a lenguaje sexual innecesariamente explícito.
  doctrine_reference: Génesis 49:3; nota lexical de la POB en inglés
- issue: Relación entre 'dignidad' y 'poder' en el paralelismo hebreo
  english_pob_reading: preeminent in dignity and preeminent in power
  chosen_spanish_reading: preeminente en dignidad y preeminente en poder
  alternative_spanish_readings:
  - preeminente en honor y preeminente en fuerza
  - sobresaliente en honra y poder
  rationale: Se conserva el paralelismo y la repetición de יתר para no borrar la noción de superioridad/excelencia. 'Dignidad' refleja mejor שְׂאֵת que 'honor' en español contemporáneo, sin perder la dimensión de elevación.
  doctrine_reference: Génesis 49:3; revisión aplicada del POB en inglés
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del POB en inglés, que sustituyó 'excelling in honor' por 'preeminent in dignity' para reflejar mejor יֶתֶר שְׂאֵת, y conservé esa preferencia en español con 'preeminente en dignidad'. También mantuve el paralelismo de 'preeminente en poder'.
  spanish_consistency_notes:
  - Se mantuvo 'primogénito' para בְּכוֹרִי como término bíblico natural y preciso.
  - Se evitó 'SEÑOR' u otras sustituciones por convenciones litúrgicas, ya que este versículo no contiene el nombre divino.
  - '''Vigor'' se usó para אֹן para conservar el matiz de energía vital/generativa documentado en la nota inglesa.'
  - La puntuación reproduce el tono poético del oráculo y conserva la enumeración paralela del hebreo.
