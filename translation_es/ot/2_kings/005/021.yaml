translation:
  language: es
  text: 'Así, Giezi persiguió a Naamán. Cuando Naamán lo vio corriendo detrás de él, bajó del carro a su encuentro y dijo: «¿Está todo bien?[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¿Está todo bien?» La expresión usa shalom como saludo o pregunta por el bienestar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְדֹּף
  english_pob_choice: pursued
  chosen_spanish: persiguió
  alternatives_spanish:
  - corrió tras
  - fue tras
  lexicon: HALOT
  rationale: רדף expresa persecución o ir tras alguien; «persiguió» conserva la iniciativa intencional del verbo y suena natural en español narrativo.
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: detrás de
  alternatives_spanish:
  - tras
  - después de
  lexicon: HALOT
  rationale: En este contexto espacial de seguimiento, «detrás de» comunica con claridad la dirección del movimiento sin perder el matiz de persecución.
- source_word: וַיִּרְאֶה ... רָץ אַחֲרָיו
  english_pob_choice: saw him running after him
  chosen_spanish: lo vio corriendo detrás de él
  alternatives_spanish:
  - vio que corría tras él
  - lo vio correr tras él
  lexicon: HALOT
  rationale: La construcción hebrea combina percepción visual y acción en curso; el español mantiene ambas con una frase compacta y natural.
- source_word: וַיִּפֹּל מֵעַל הַמֶּרְכָּבָה
  english_pob_choice: got down from the chariot
  chosen_spanish: bajó del carro
  alternatives_spanish:
  - se bajó del carro
  - descendió del carro
  lexicon: HALOT
  rationale: נפל aquí funciona idiomáticamente como descender rápido del vehículo. «Bajó del carro» conserva el sentido sin sugerir una caída accidental.
- source_word: לִקְרָאתוֹ
  english_pob_choice: to meet him
  chosen_spanish: para recibirlo
  alternatives_spanish:
  - para encontrarse con él
  - a su encuentro
  lexicon: HALOT
  rationale: לקראת puede indicar ir al encuentro de alguien. En español, «para recibirlo» comunica ese movimiento de acercamiento con tono natural y respetuoso.
- source_word: הֲשָׁלוֹם
  english_pob_choice: Is all well?
  chosen_spanish: ¿Está todo bien?
  alternatives_spanish:
  - ¿Va todo bien?
  - ¿Está bien todo?
  lexicon: HALOT
  rationale: שלום aquí es una pregunta idiomática por el bienestar. «¿Está todo bien?» mantiene la pregunta directa y la carga de bienestar, en lugar de traducirlo como «paz».
theological_decisions:
- issue: Sentido idiomático de שָׁלוֹם
  english_pob_reading: The expression uses shalom as a greeting or inquiry about well-being.
  chosen_spanish_reading: La expresión usa shalom como saludo o pregunta por el bienestar.
  alternative_spanish_readings:
  - La expresión usa shalom como saludo de paz.
  - La expresión usa shalom como pregunta por la tranquilidad.
  rationale: No se trata de una afirmación doctrinal sobre paz interior, sino de una fórmula conversacional. La traducción conserva ese valor pragmático para no sobrecargar el versículo con un sentido abstracto.
  doctrine_reference: Usage of שלום as greeting/inquiry in narrative Hebrew; lexical, not doctrinal.
translation_notes:
  revision_awareness: El inglés revisado prefirió una pregunta más directa y formal («Is all well?») en lugar de una paráfrasis más expansiva. El español sigue esa revisión con una formulación breve y sobria, manteniendo la idiomaticidad de שָׁלוֹם.
  spanish_consistency_notes:
  - Se usa «Naamán» y «Giezi» de forma consistente con la transliteración bíblica habitual en español.
  - Se prefiere «carro» para הַמֶּרְכָּבָה, en vez de «carroza», por ser más neutral y acorde al contexto narrativo.
  - Se mantiene el tiempo narrativo en pasado simple para reflejar la sucesión de acciones del hebreo waw-consecutivo.
  - El ancla de nota [a] se coloca solo en la pregunta final, donde aparece la ambigüedad lexical de שָׁלוֹם.
