translation:
  language: es
  text: En sus días subió Senaquerib y envió a Rabsaces; extendió su mano contra Sión y blasfemó en su soberbia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego dice: «y se jactó en su arrogancia». El testimonio hebreo, seguido en el texto principal, habla de blasfemia.'
    reason: alternative_reading
lexical_decisions:
- source_word: בימיו / ἐν ἡμέραις αὐτοῦ
  english_pob_choice: In his days
  chosen_spanish: En sus días
  alternatives_spanish:
  - En aquellos días
  - Durante su tiempo
  lexicon: HALOT / LXX ἐν ἡμέραις
  rationale: La fórmula temporal se conserva de manera natural en español y corresponde bien al hebreo y al griego.
- source_word: עלה / ἀνέβη
  english_pob_choice: came up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - vino contra
  lexicon: HALOT / LSJ ἀναβαίνω
  rationale: El verbo expresa avance militar en este contexto; 'subió' mantiene la imagen direccional sin volver la frase pesada.
- source_word: סנחריב / Σενναχηρεὶμ
  english_pob_choice: Sennacherib
  chosen_spanish: Senaquerib
  alternatives_spanish:
  - Sennáquerib
  - Senaquerib
  lexicon: Transliteración tradicional española
  rationale: Se usa la forma establecida y reconocible en español bíblico, compatible con el nombre propio del original.
- source_word: וישלח את רבשקה / καὶ ἀπέστειλεν Ῥαψάκην
  english_pob_choice: sent Rabshakeh
  chosen_spanish: envió a Rabsaces
  alternatives_spanish:
  - envió a Rabshakeh
  - mandó a Rabsaces
  lexicon: Transliteración bíblica tradicional
  rationale: En español es más natural tratarlo como título/persona con artículo implícito en la sintaxis, y 'Rabsaces' es una transliteración tradicional más usable que el préstamo inglés.
- source_word: ויט ידו / καὶ ἐπῆρεν ἡ χεὶρ αὐτοῦ
  english_pob_choice: he stretched out his hand
  chosen_spanish: extendió su mano
  alternatives_spanish:
  - levantó su mano
  - alzó su mano
  lexicon: HALOT / LSJ
  rationale: '''Extender la mano'' comunica la acción hostil con naturalidad en español y evita una literalidad extraña. Se mantiene la ambigüedad entre gesto agresivo y acto de desafío.'
- source_word: על ציון / ἐπὶ Σειών
  english_pob_choice: against Zion
  chosen_spanish: contra Sión
  alternatives_spanish:
  - sobre Sión
  - hacia Sión
  lexicon: HALOT / LSJ
  rationale: La preposición hostil se expresa mejor con 'contra', que hace explícita la agresión presente en el contexto.
- source_word: ויגדף / ἐμεγαλαύχησεν
  english_pob_choice: blasphemed / boasted
  chosen_spanish: blasfemó
  alternatives_spanish:
  - se jactó
  - se ensoberbeció
  lexicon: HALOT / LSJ
  rationale: El hebreo transmitido por el testimonio base requiere un verbo de habla impía; 'blasfemó' preserva esa fuerza teológica. La alternativa griega de jactancia queda reflejada en la nota.
- source_word: בגאונו / ὑπερηφανίᾳ αὐτοῦ
  english_pob_choice: in his pride
  chosen_spanish: en su soberbia
  alternatives_spanish:
  - en su orgullo
  - en su arrogancia
  lexicon: HALOT / LSJ ὑπερηφανία
  rationale: '''Soberbia'' capta bien el matiz moral del hebreo y enlaza con el griego ὑπερηφανία; es un término claro y bíblicamente reconocible en español.'
theological_decisions:
- issue: Tensión entre el hebreo conservado y el paralelo griego al final del versículo
  english_pob_reading: The Hebrew witness speaks of blasphemous speech; the Greek parallel says he boasted in his arrogance.
  chosen_spanish_reading: 'La línea principal sigue el hebreo: ''blasfemó en su soberbia''.'
  alternative_spanish_readings:
  - se jactó en su soberbia
  - se ensoberbeció en su soberbia
  rationale: El testimonio hebreo es primario donde se conserva, y el griego aporta una alternativa real que no debe borrarse. La nota preserva la tensión entre blasfemia impía y jactancia arrogante.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácides desde el hebreo cuando se conserva; DOCTRINE.md: preservar tensiones textuales y teológicas.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el cierre revisado del flujo de trabajo: no se requerían cambios respecto al análisis anterior, y se mantuvo la prioridad del hebreo con la alternativa griega preservada en nota.'
  spanish_consistency_notes:
  - Se mantiene 'Sión' como forma bíblica estable en español.
  - Se usa 'blasfemó' para respetar la fuerza religiosa del hebreo, sin suavizarla a mera jactancia.
  - '''Soberbia'' se eligió para acercar el matiz de ὑπερηφανία sin perder naturalidad en español.'
  - La transliteración 'Rabsaces' evita depender del inglés y funciona bien en lectura eclesial en español.
