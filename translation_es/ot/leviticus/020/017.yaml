translation:
  language: es
  text: Si un hombre toma a su hermana, hija de su padre o hija de su madre, y ve su desnudez, y ella ve su propia desnudez, es una vergüenza[a], y serán cortados[b] a la vista de los hijos de su pueblo. Él ha descubierto la desnudez de su hermana; llevará su culpa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una cosa vergonzosa' o 'un oprobio', porque el hebreo חֶסֶד aparece aquí en un sentido raro y negativo, no en su sentido usual de 'bondad' o 'amor leal'.
    reason: lexical_alternative
  - marker: b
    text: La expresión 'serán cortados' conserva la fórmula legal hebrea sin precisar si la pena es muerte, expulsión o alguna otra forma de remoción.
    reason: alternative_reading
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El singular masculino se conserva en español para reflejar la formulación legal hebrea y mantener la correspondencia de género del original.
- source_word: יִקַּח
  english_pob_choice: takes
  chosen_spanish: toma
  alternatives_spanish:
  - se casa con
  - tiene relaciones con
  lexicon: HALOT
  rationale: '''Toma'' reproduce el valor literal del verbo sin sobreespecificar la acción; el contexto legal-sexual aclara el alcance de la transgresión.'
- source_word: אֲחֹתוֹ בַּת אָבִיו אוֹ בַת אִמּוֹ
  english_pob_choice: his sister, his father's daughter or his mother's daughter
  chosen_spanish: a su hermana, hija de su padre o hija de su madre
  alternatives_spanish:
  - a su hermana, ya sea hija de su padre o hija de su madre
  - a su hermana, por parte de su padre o de su madre
  lexicon: HALOT
  rationale: Se conserva la aclaración appositiva del hebreo, haciendo explícito que se incluyen hermanas por parte de padre o de madre.
- source_word: וְרָאָה אֶת עֶרְוָתָהּ וְהִיא תִרְאֶה אֶת עֶרְוָתוֹ
  english_pob_choice: and sees her nakedness, and she sees his nakedness
  chosen_spanish: y ve su desnudez, y ella ve la desnudez de él
  alternatives_spanish:
  - y ve su desnudez, y ella ve su desnudez
  - y descubre su desnudez, y ella descubre la de él
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea 'ver la desnudez' para preservar el idioma legal del Levítico; en español 'desnudez' transmite la expresión sin explicitar más de lo que el texto dice.
- source_word: חֶסֶד
  english_pob_choice: a disgrace
  chosen_spanish: una infamia
  alternatives_spanish:
  - una vergüenza
  - una deshonra
  - una cosa vergonzosa
  lexicon: HALOT
  rationale: En este uso raro y negativo, חֶסֶד no significa 'bondad' sino una acción vergonzosa. 'Infamia' comunica bien el juicio de deshonor y mantiene la fuerza condenatoria del pasaje.
- source_word: וְנִכְרְתוּ
  english_pob_choice: they shall be cut off
  chosen_spanish: serán cortados
  alternatives_spanish:
  - serán eliminados
  - serán excluidos
  lexicon: HALOT
  rationale: Se preserva la fórmula legal 'cortados' para no resolver la ambigüedad del castigo, que el hebreo deja abierta.
- source_word: לְעֵינֵי בְּנֵי עַמָּם
  english_pob_choice: in the sight of the sons of their people
  chosen_spanish: delante de los ojos de los hijos de su pueblo
  alternatives_spanish:
  - a la vista de su pueblo
  - en presencia de los hijos de su pueblo
  lexicon: HALOT
  rationale: La traducción mantiene la imagen idiomática y la referencia social del hebreo, con una formulación natural en español bíblico contemporáneo.
- source_word: גִּלָּה
  english_pob_choice: has uncovered
  chosen_spanish: ha descubierto
  alternatives_spanish:
  - ha destapado
  - ha expuesto
  lexicon: HALOT
  rationale: En español, 'descubrir' reproduce con naturalidad el idiomático hebreo 'desnudar/descubrir' en leyes de incesto y mantiene el vínculo léxico con el contexto inmediato.
- source_word: עֲוֺנוֹ יִשָּׂא
  english_pob_choice: he shall bear his guilt
  chosen_spanish: llevará su culpa
  alternatives_spanish:
  - llevará su iniquidad
  - soportará su culpa
  lexicon: HALOT
  rationale: La fórmula legal se expresa de manera clara y directa en español, conservando la idea de cargar con la culpa y sus consecuencias.
theological_decisions:
- issue: Sentido negativo de חֶסֶד en este versículo
  english_pob_reading: '''a disgrace'' rather than the usual positive sense of ''kindness'' or ''steadfast love'''
  chosen_spanish_reading: '''una infamia'' en sentido de acto vergonzoso'
  alternative_spanish_readings:
  - '''bondad'''
  - '''amor leal'''
  - '''misericordia'''
  rationale: El contexto de prohibición sexual exige un valor negativo; traducirlo positivamente falsearía el juicio moral del versículo. Se conserva la tensión léxica al no usar el sentido habitual positivo de חֶסֶד.
  doctrine_reference: Mantener la ambigüedad léxica cuando el hebreo usa una palabra con sentido raro y contextualmente invertido.
- issue: Fórmula penal de וְנִכְרְתוּ
  english_pob_reading: retain 'they shall be cut off' without specifying the exact mode of penalty
  chosen_spanish_reading: mantener 'serán cortados' sin precisar si implica muerte, expulsión o exclusión
  alternative_spanish_readings:
  - '''serán ejecutados'''
  - '''serán expulsados'''
  - '''serán excluidos'''
  rationale: El hebreo presenta una fórmula legal ambigua. La traducción no debe resolver una cuestión debatida que el texto no determina explícitamente.
  doctrine_reference: Preservar la tensión jurídica y no sobreinterpretar la pena.
translation_notes:
  revision_awareness: La redacción sigue la última revisión del inglés POB, que eliminó el sujeto repetido antes de 'sees' para hacer más fluida la oración. En español se reprodujo ese ajuste con la coordinación 'y ve..., y ella ve...' sin añadir sujeto repetido ni reinterpretar el pasaje.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general en este proyecto, pero este versículo no contiene el nombre divino.
  - '''Desnudez'' se conserva para reflejar el idioma legal de Levítico y mantener la repetición léxica del hebreo.'
  - '''Serán cortados'' sigue la convención POB de preservar la ambigüedad del castigo.'
  - '''Infamia'' se eligió para representar el valor negativo raro de חֶסֶד sin volverlo un término positivo.'
