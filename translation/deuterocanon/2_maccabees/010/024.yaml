theological_decisions:
- issue: Rendering culturally loaded Ἑλληνικά
  chosen_reading: Greek ways
  alternative_readings:
  - Greek customs
  - Hellenism
  - Greek culture
  rationale: The phrase concerns adoption of Greek cultural-religious practices in contrast to Jewish customary life. 'Greek ways' is readable and sufficiently broad, avoiding the more technical but potentially anachronistic 'Hellenism' in the main text.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic or academic.'
- issue: Rendering τὰ νόμιμα in Jewish context
  chosen_reading: their lawful customs
  alternative_readings:
  - their laws
  - their ancestral customs
  rationale: The term includes legally sanctioned customary observances. 'Lawful customs' preserves both legal and customary dimensions and avoids importing a narrower codified-law sense than the Greek requires.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source sense without paraphrase.'
