  glossary_alignment: No hay conflictos con la terminología del proyecto. «Viento», «aguas» y el sujeto implícito están bien resueltos. No intervienen términos sensibles como Yahvé, Mesías, espíritu/Espíritu en sentido doctrinal principal, aunque la nota lexical sobre רוּחַ está bien preservada.
