id: LUK.9.19
reference: Luke 9:19
source:
  edition: SBLGNT
  text: οἱ δὲ ἀποκριθέντες εἶπαν· Ἰωάννην τὸν βαπτιστήν, ἄλλοι δὲ Ἠλίαν, ἄλλοι δὲ ὅτι προφήτης τις τῶν ἀρχαίων ἀνέστη.
translation:
  text: And they answered[a], “John the Baptist; but others, Elijah; and others, that some prophet of the ancients has risen.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a prophet from long ago has arisen.” The Greek can be understood more idiomatically this way.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθέντες εἶπαν
  chosen: they answered
  alternatives:
  - answering, they said
  - they replied
  lexicon: BDAG
  rationale: The participle + finite verb is a common Semitic-influenced Greek idiom. In natural English, 'they answered' captures the sense without unnecessary redundancy.
- source_word: Ἰωάννην τὸν βαπτιστήν
  chosen: John the Baptist
  alternatives:
  - John the Baptizer
  lexicon: BDAG
  rationale: '''John the Baptist'' is the standard English designation and accurately reflects the identifying title βαπτιστής in this context.'
- source_word: ἄλλοι δὲ ... ἄλλοι δὲ
  chosen: but others ... and others
  alternatives:
  - others ... others
  - some ... others
  lexicon: BDAG
  rationale: This preserves the repeated contrastive structure while producing readable English. The first δέ is brought out with 'but,' while the second is smoothly rendered with 'and' in the list.
- source_word: Ἠλίαν
  chosen: Elijah
  lexicon: BDAG
  rationale: Standard English transliteration of the prophet's name.
- source_word: ὅτι
  chosen: that
  alternatives:
  - saying that
  lexicon: BDAG
  rationale: Introduces the content of what 'others' were saying. 'That' is the most direct and natural rendering here.
- source_word: προφήτης τις
  chosen: some prophet
  alternatives:
  - a certain prophet
  - a prophet
  lexicon: BDAG
  rationale: τις is indefinite; 'some prophet' preserves the indefiniteness more explicitly than simply 'a prophet.'
- source_word: τῶν ἀρχαίων
  chosen: of the ancients
  alternatives:
  - of old
  - from long ago
  - of the ancient ones
  lexicon: BDAG
  rationale: The phrase refers to people from ancient times, not merely an abstract past. 'Of the ancients' preserves the genitive sense and the personal reference better than the more idiomatic but less explicit 'of old.'
- source_word: ἀνέστη
  chosen: has risen
  alternatives:
  - has arisen
  - rose
  lexicon: BDAG
  rationale: In context this refers to a figure from the past appearing again; 'has risen' is the most natural English rendering and preserves the verbal connection to rising without overinterpreting beyond the text.
