revisions:
- from: Así Miriam quedó confinada[a] fuera del campamento durante siete días, y el pueblo no se puso en marcha hasta que Miriam fue introducida[b].
  to: Entonces Miriam quedó confinada[a] fuera del campamento durante siete días, y el pueblo no se puso en marcha hasta que Miriam fue readmitida[b].
  rationale: Se ajusta el texto principal para mejorar la naturalidad y precisión contextual del español. «Readmitida» comunica mejor que Miriam fue recibida nuevamente en el campamento, mientras la nota conserva la alternativa más literal «fue reunida», en línea con la auditoría inglesa y el hebreo. También se cambia «Así» por «Entonces» para una narración más fluida.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:32:13Z'
review_pass:
