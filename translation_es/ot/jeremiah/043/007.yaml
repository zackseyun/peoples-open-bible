translation:
  language: es
  text: Así entraron en la tierra de Egipto[a], porque no escucharon la voz de Yahvé, y llegaron hasta Tafnes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «no obedecieron a Yahvé». El hebreo «no escuchar la voz de» puede llevar el sentido de rehusar obediencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: entered
  chosen_spanish: entraron
  alternatives_spanish:
  - vinieron
  - llegaron
  lexicon: HALOT
  rationale: El verbo בוא puede significar 'venir', 'ir' o 'entrar'; en este contexto, con 'la tierra de Egipto' como destino, 'entraron' expresa con naturalidad el ingreso al territorio, como en la decisión inglesa.
- source_word: אֶרֶץ מִצְרַיִם
  english_pob_choice: the land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - Egipto
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'tierra de Egipto'. Mantener 'la tierra de' conserva el matiz territorial y sigue de cerca la forma del original.
- source_word: לֹא שָׁמְעוּ בְּקוֹל
  english_pob_choice: did not listen to the voice of
  chosen_spanish: no escucharon la voz de
  alternatives_spanish:
  - no obedecieron la voz de
  - no atendieron a la voz de
  lexicon: HALOT
  rationale: La expresión hebrea literalmente habla de 'escuchar la voz de', pero puede implicar desobediencia. En español, 'no escucharon la voz de' preserva la imagen idiomática sin borrar la tensión obediencia/escucha.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se usa el nombre divino en su forma transliterada recomendada para el texto principal en español, en lugar de una sustitución por título.
- source_word: וַיָּבֹאוּ עַד
  english_pob_choice: they came as far as
  chosen_spanish: y llegaron hasta
  alternatives_spanish:
  - y vinieron hasta
  - y alcanzaron hasta
  lexicon: HALOT
  rationale: La construcción con עַד marca el límite o el punto hasta donde llegaron. 'Llegaron hasta' reproduce bien ese sentido de alcance/destino.
- source_word: תַּחְפַּנְחֵס
  english_pob_choice: Tahpanhes
  chosen_spanish: Tafnes
  alternatives_spanish:
  - Tahpanhes
  lexicon: HALOT
  rationale: Se prefiere la forma toponímica usual en español bíblico 'Tafnes', que corresponde al mismo lugar y suena más natural para lectores hispanohablantes.
theological_decisions:
- issue: La forma de renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El versículo usa el Tetragrámaton directamente. En la tradición de esta traducción, se preserva el nombre divino mediante transliteración, evitando la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: El modismo hebreo 'no escuchar la voz de'
  english_pob_reading: did not listen to the voice of / could carry the sense of refusing obedience
  chosen_spanish_reading: no escucharon la voz de
  alternative_spanish_readings:
  - no obedecieron la voz de
  - no hicieron caso de la voz de
  rationale: La frase española mantiene la imagen verbal del hebreo y deja que el contexto comunique la desobediencia, sin reducir de entrada el modismo a una paráfrasis interpretativa.
  doctrine_reference: Jeremiah 43:7 context and English footnote a
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto español principal junto a la frase correspondiente. La nota conserva la alternativa léxica documentada por el POB en inglés sin desplazar el sentido literal del hebreo.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera consistente con el nombre divino en el texto principal.
  - Se mantuvo 'la tierra de Egipto' para conservar el valor territorial del hebreo.
  - '''Entraron'' y ''llegaron hasta'' distinguen el ingreso al país del alcance hasta Tafnes.'
  - La nota [a] está anclada en 'no escucharon la voz de', donde surge la alternativa obediencia/escucha.
