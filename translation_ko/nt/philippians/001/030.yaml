id: PHP.1.30
reference: Philippians 1:30
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τὸν αὐτὸν ἀγῶνα ἔχοντες οἷον εἴδετε ἐν ἐμοὶ καὶ νῦν ἀκούετε ἐν ἐμοί.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/030.yaml
  text: having the same struggle that you saw in me and now hear that I still have.
translation:
  language: ko
  text: 여러분이 내게서 보았고[a] 지금도 내가 여전히 겪고 있다고 듣고 있는, 그와 동일한 분투를 여러분이 함께 겪고 있는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἐν ἐμοί는 본래 「내 안에서」 또는 「나에게서」를 의미하며, 바울 자신의 경험을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸν αὐτὸν ἀγῶνα
  english_pob_choice: the same struggle
  chosen_korean: 동일한 분투
  alternatives_korean:
  - 같은 싸움
  - 동일한 경기
  lexicon: BDAG
  rationale: ἀγών은 운동 경기·전투의 비유로 영적 분투를 가리킨다. 27절 συναθλοῦντες(함께 분투)와 일관되게 「분투」로 옮긴다.
- source_word: ἔχοντες
  english_pob_choice: having
  chosen_korean: 겪고 있는 것
  alternatives_korean:
  - 가지고 있는
  - 품고 있는
  lexicon: BDAG
  rationale: 분사가 빌립보 성도의 경험을 표현하므로, 「겪고 있다」가 분투의 능동적 통과를 자연스럽게 담는다. 합쇼체 종결로 「것입니다」를 더한다.
- source_word: οἷον εἴδετε ἐν ἐμοὶ
  english_pob_choice: that you saw in me
  chosen_korean: 여러분이 내게서 보았고
  alternatives_korean:
  - 여러분이 내 안에서 본
  - 내 안에서 여러분이 본
  lexicon: BDAG
  rationale: ἐν ἐμοί는 바울 자신의 경험에서 본 것을 가리킨다. 「내게서 보았다」가 자연스러운 한국어이다.
- source_word: νῦν ἀκούετε ἐν ἐμοί
  english_pob_choice: now hear that I still have
  chosen_korean: 지금도 내가 여전히 겪고 있다고 듣고 있는
  alternatives_korean:
  - 지금도 내 안에서 듣고 있는
  - 지금도 나에 관해 듣고 있는
  lexicon: BDAG
  rationale: 영어 POB는 「now hear that I still have」로 헬라어의 함축된 의미를 풀어 옮겼다(바울이 여전히 그 분투를 겪고 있음을 듣는다). 한국어도 동일한 풀어쓰기로 「지금도 내가 여전히 겪고 있다고 듣고 있는」으로 명료하게 한다. 「여전히(still)」를 보존한다.
