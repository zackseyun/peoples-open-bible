translation:
  language: es
  text: Y Balaam hijo de Beor, el adivino, los hijos de Israel lo mataron a espada, entre sus muertos.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «junto con sus muertos». La frase hebrea final es algo inusual; indica que Balaam fue muerto en relación con los otros que Israel había matado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Además
  - Entonces
  lexicon: HALOT
  rationale: El hebreo suma otro elemento en el resumen de conquista; en español, "Y" conserva la fuerza aditiva sin sobrecargar el texto. אֶת no requiere marcación separada en español cuando funciona como objeto directo ya implícito en la sintaxis.
- source_word: בִּלְעָם
  english_pob_choice: Balaam
  chosen_spanish: Balaam
  alternatives_spanish:
  - Balaam
  lexicon: nombre propio
  rationale: Se mantiene el nombre propio con la forma española estándar y reconocible.
- source_word: בֶּן בְּע֖וֹר
  english_pob_choice: son of Beor
  chosen_spanish: hijo de Beor
  alternatives_spanish:
  - el hijo de Beor
  lexicon: HALOT
  rationale: La construcción patronímica hebrea se vierte de manera directa y natural en español con "hijo de".
- source_word: הַ/קּוֹסֵ֑ם
  english_pob_choice: the diviner
  chosen_spanish: el adivino
  alternatives_spanish:
  - el divinador
  - el que practicaba adivinación
  lexicon: HALOT
  rationale: קֹסֵם designa al que practica adivinación. "Adivino" comunica esa función de modo claro y conciso en español, preservando el matiz peyorativo/negativo del contexto.
- source_word: הָרְג֧וּ
  english_pob_choice: killed
  chosen_spanish: lo mataron
  alternatives_spanish:
  - lo mató
  - lo dieron muerte
  lexicon: HALOT
  rationale: El plural hebreo exige plural en español; se usa el pronombre objeto "lo" para retomar a Balaam de forma idiomática. "Mataron" refleja el verbo básico sin añadir color estilístico.
- source_word: בְנֵֽי יִשְׂרָאֵ֛ל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la literalidad de la expresión hebrea "hijos de Israel", que el English POB también retiene por precisión formal.
- source_word: בַּ/חֶ֖רֶב
  english_pob_choice: with the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - con la espada
  - por la espada
  lexicon: HALOT
  rationale: La preposición instrumental hebrea se expresa con una construcción natural en español. "A espada" es idiomático para muerte violenta en combate y mantiene la economía del hebreo.
- source_word: אֶל חַלְלֵי/הֶֽם
  english_pob_choice: among their slain
  chosen_spanish: entre sus muertos
  alternatives_spanish:
  - junto con sus muertos
  - entre los caídos de ellos
  lexicon: HALOT
  rationale: El cierre hebreo es inusual y denota asociación con los ya muertos. "Entre sus muertos" preserva esa relación sin forzar una explicación dentro del cuerpo del versículo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y coincide sustancialmente con la línea auditada en inglés. Se conserva la rareza de la frase final sin suavizarla en exceso, y se evita traducirla de manera interpretativa más allá de lo que el hebreo permite.
  spanish_consistency_notes:
  - Se prefirió «hijos de Israel» para mantener la correspondencia con la expresión hebrea y con el audit trail inglés.
  - Se eligió «a espada» como equivalente idiomático de la construcción instrumental hebrea.
  - La nota al pie conserva la ambigüedad semántica final documentada en el inglés POB, sin resolverla de forma definitiva.
