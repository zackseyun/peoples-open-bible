lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: En fórmulas narrativas de discurso divino, דיבר introduce una unidad de habla; en español, «habló» reproduce bien esa apertura de oráculo y suena más natural que una repetición mecánica de «dijo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio del pacto, el Tetragrámaton. La norma del proyecto en español es «Yahvé», que preserva el nombre divino en lugar de sustituirlo por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla; en español, «a» es la equivalencia directa y natural.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español para מֹשֶׁה.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: La construcción infinitiva funciona como introducción fija del contenido del discurso. «Diciendo» conserva esa fórmula sin cargarla de interpretación adicional.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El versículo nombra explícitamente a YHWH. Conforme a la política del proyecto, no se lo oculta tras una sustitución titulada; «Yahvé» mantiene el valor del nombre revelado y es la forma preferida en el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece anclado en el texto español junto a «Yahvé». No se añadieron notas sin anclaje.'
  spanish_consistency_notes:
  - Se mantuvo el nombre divino «Yahvé» conforme a la terminología predeterminada del proyecto.
  - La fórmula narrativa «habló a Moisés, diciendo» sigue de cerca la estructura hebrea y la POB inglesa.
  - No se introdujeron añadidos explicativos que no estén respaldados por el original.
