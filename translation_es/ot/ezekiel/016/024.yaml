translation:
  language: es
  text: Construiste para ti un montículo[a] e hiciste para ti un lugar alto en cada plaza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘estructura abovedada’, ‘plataforma’, o quizá una estructura asociada con prostitución; el término hebreo es raro e incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּבְנִי לָךְ
  english_pob_choice: You built for yourself
  chosen_spanish: Construiste para ti
  alternatives_spanish:
  - Te construiste
  - Construiste para ti misma
  lexicon: HALOT
  rationale: Mantiene el valor benefactivo/reflexivo de לָךְ de manera natural en español, sin añadir énfasis innecesario.
- source_word: גֶּב
  english_pob_choice: mound
  chosen_spanish: montículo
  alternatives_spanish:
  - mound
  - elevación
  - terraplén
  - estructura abovedada
  lexicon: HALOT
  rationale: ‘Montículo’ conserva la idea concreta de una estructura levantada y evita resolver la rareza del término con una identificación demasiado específica. En español suena natural y deja abierta la tensión lexical documentada.
- source_word: וַתַּעֲשִׂי לָךְ
  english_pob_choice: made for yourself
  chosen_spanish: te hiciste
  alternatives_spanish:
  - hiciste para ti
  - te fabricaste
  - te construiste
  lexicon: HALOT
  rationale: El verbo ‘hacer’ en español puede sonar demasiado genérico; ‘te hiciste’ conserva el matiz reflexivo/benefactivo y funciona bien con la segunda cláusula sin forzar el estilo.
- source_word: רָמָה
  english_pob_choice: high place
  chosen_spanish: lugar alto
  alternatives_spanish:
  - alto lugar
  - santuario elevado
  - altura
  lexicon: HALOT
  rationale: ‘Lugar alto’ reproduce el sentido cultual reconocido del término en el contexto profético, pero evita introducir una reinterpretación más explícita que el hebreo no obliga a decidir aquí.
- source_word: בְּכָל רְחוֹב
  english_pob_choice: in every square
  chosen_spanish: en cada plaza
  alternatives_spanish:
  - en cada calle
  - en cada espacio abierto
  - por toda la plaza
  lexicon: HALOT
  rationale: ‘Plaza’ comunica el espacio público abierto que el inglés POB entendió como ‘square’, y en español resulta más idiomático que ‘cuadrado’ o ‘calle’ para el contexto urbano público.
theological_decisions:
- issue: Si traducir גֶּב con un término explícitamente sexual/cultual en el texto principal
  english_pob_reading: Retain relatively literal architectural language ('mound' and 'high place') and allow the broader chapter context to supply the metaphorical force.
  chosen_spanish_reading: Mantener lenguaje arquitectónico relativamente literal ('montículo' y 'lugar alto') y dejar que el contexto amplio del capítulo aporte la fuerza metafórica.
  alternative_spanish_readings:
  - ‘burdel’
  - ‘santuario de prostitución’
  - ‘estructura de prostitución’
  rationale: El hebreo de esta palabra es raro e incierto. Siguiendo el audit trail inglés, conviene no resolver la ambigüedad con una identificación más fuerte que la evidencia léxica disponible, aunque el contexto de Ezequiel 16 sí sugiera una carga cultual y sexual.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; esta versión sigue el pasaje auditado y conserva la ambigüedad léxica documentada en el hebreo y en la nota inglesa.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - ‘Lugar alto’ se usa de forma consistente para רָמָה cuando el contexto es cultual.
  - Se evita interpretar גֶּב como ‘burdel’ en el texto principal para no sobretraducir una raíz rara e incierta.
  - ‘Plaza’ refleja el espacio público abierto de רְחוֹב y conserva la visibilidad pública de la acusación.
