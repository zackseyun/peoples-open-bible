    text: 'O: «su corazón se volvió orgulloso». El griego dice literalmente: «su corazón fue levantado» o «fue enaltecido», un modismo frecuentemente asociado con la soberbia.'
    reason: lexical_alternative
  revision_rationale: 'La revisión conserva toda la estructura y el sentido del griego y de la POB inglesa, pero mejora tres puntos: (1) «quedó en calma» expresa mejor ἡσύχασεν que «quedó en silencio»; (2) «fue exaltado» refleja con mayor precisión ὑψώθη; y (3) «su corazón fue enaltecido» mantiene el idiomatismo de ἐπήρθη ἡ καρδία αὐτοῦ en un español más natural. La nota se normaliza para claridad y buena puntuación.'
