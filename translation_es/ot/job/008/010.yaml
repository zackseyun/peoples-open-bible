    rationale: 'El hebreo plantea una pregunta retórica simple: «¿No ellos te enseñarán...?» En español, «¿No serán ellos quienes...?» añade un giro identificativo y algo enfático que no es necesario y resulta menos natural.'
  - severity: medium
