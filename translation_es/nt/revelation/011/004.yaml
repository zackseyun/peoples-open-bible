translation:
  language: es
  text: Estos son los dos olivos y los dos candelabros[a] que están delante del Señor de la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Alusión a Zacarías 4, donde la imaginería de los olivos y del candelabro simboliza a los siervos designados por Dios y empoderados por su Espíritu.
    reason: cross_reference
  - marker: b
    text: 'O: «de pie delante del Señor de la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὗτοί
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Estos hombres
  - Estos testigos
  lexicon: BDAG
  rationale: Pronombre demostrativo masculino plural; en español, «Estos» reproduce la referencia inmediata sin introducir explícitamente «testigos» en el verso, como hace la versión inglesa auditada.
- source_word: ἐλαῖαι
  english_pob_choice: olive trees
  chosen_spanish: olivos
  alternatives_spanish:
  - árboles de olivo
  - olivos/árboles de olivo
  lexicon: BDAG
  rationale: En este contexto apocalíptico e intertextual, la imagen remite a los olivos de Zacarías 4. «Olivos» es natural en español y conserva la metáfora sin explicarla de más.
- source_word: λυχνίαι
  english_pob_choice: lampstands
  chosen_spanish: candelabros
  alternatives_spanish:
  - portalamparas
  - candeleros
  lexicon: BDAG
  rationale: λυχνία designa el soporte de la lámpara, no la lámpara misma. «Candelabros» es el equivalente español más claro y usual, y conserva la imagen apocalíptica.
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: BDAG
  rationale: La preposición indica posición frente a alguien. «Delante de» es natural en español y mantiene el sentido espacial y reverencial.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Para κύριος, el español bíblico común y fiel aquí es «Señor». En este pasaje no se requiere otra glosa porque la referencia reverencial encaja con el contexto apocalíptico.
- source_word: γῆς
  english_pob_choice: earth
  chosen_spanish: tierra
  alternatives_spanish:
  - mundo
  - suelo
  lexicon: BDAG
  rationale: En Apocalipsis, γῆ puede abarcar la tierra en sentido global. «Tierra» mantiene mejor la amplitud cósmica del título «Señor de la tierra».
- source_word: ἑστῶτες
  english_pob_choice: standing
  chosen_spanish: que están
  alternatives_spanish:
  - de pie
  - que permanecen de pie
  lexicon: BDAG
  rationale: El participio expresa estado/posición permanente; en español, «que están» enlazado con «delante de» comunica la idea sin forzar una perífrasis pesada. Se conserva la opción relacional del inglés auditado mediante el añadido de una nota.
theological_decisions:
- issue: Relación de la imagen con Zacarías 4 y la identidad de los dos testigos
  english_pob_reading: 'Retain the metaphor directly: ''the two olive trees and the two lampstands,'' without explicating the symbolism in the main text.'
  chosen_spanish_reading: 'Mantener la metáfora directamente: «los dos olivos y los dos candelabros», sin explicar en el cuerpo del texto su simbolismo.'
  alternative_spanish_readings:
  - Estos dos testigos son como los dos olivos y los dos candelabros
  - Los dos olivos y los dos candelabros representan a los dos testigos
  rationale: El griego identifica por imaginería apocalíptica, no por paráfrasis explicativa. La traducción conserva la tensión teológica e intertextual con Zacarías 4 sin resolver la identidad de manera prematura.
  doctrine_reference: Translation philosophy §3; mantener la tensión teológica e intertextual.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no registran revisiones sustantivas; se mantiene la metáfora sin expansión interpretativa, y la nota alternativa preserva la lectura participial posible de ἑστῶτες.
  spanish_consistency_notes:
  - Se conserva «Señor» para κύριος por coherencia con el estándar POB en contextos reverenciales.
  - Se usa «tierra» para γῆ conforme al alcance cósmico de Apocalipsis.
  - «Olivos» y «candelabros» mantienen la imaginería bíblica sin introducir explicación doctrinal en el texto principal.
