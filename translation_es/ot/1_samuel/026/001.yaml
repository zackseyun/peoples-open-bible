base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/026/001.yaml
  text: Then the Ziphites came to Saul at Gibeah[a], saying, “Is not David hiding on the hill of Hachilah, which is before the wasteland?”
  footnotes:
  - marker: a
    text: Or “before Jeshimon” or “opposite the wasteland.” The Hebrew place expression may be understood either as a common noun (“wasteland/desert”) or as the regional name Jeshimon.
    reason: lexical_alternative
