  yaml_path: translation/nt/matthew/028/010.yaml
  text: Then Jesus said to them[a], “Do not be afraid. Go, tell my brothers to go to Galilee[c][b], and there they will see me.”
  footnotes:
  - marker: a
    text: Or 'tell my brothers.' The verb can be rendered more simply as 'tell,' but 'report' preserves the sense of delivering a message.
    reason: lexical_alternative
  - marker: b
    text: '''My brothers'' refers here to Jesus'' disciples. The Greek is masculine plural, not a gender-neutral term.'
    reason: lexical_alternative
  - marker: c
    text: Or 'report to my brothers that they should go'.
    reason: previous_rendering
