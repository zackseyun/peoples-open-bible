revisions:
- from: Él los ha llenado de sabiduría de corazón para hacer toda obra de artesano, de diseñador y de bordador en azul, en púrpura, en escarlata y en lino fino, y de tejedor; hacedores de toda obra y [a]devisores de diseños.
  to: 'Él los ha llenado de sabiduría de corazón[a] para hacer toda clase de trabajo de grabador[b], de diseñador y de bordador en azul, en púrpura, en hilo escarlata y en lino fino, y de tejedor: hacedores de toda obra e ideadores[c] de diseños.'
  rationale: La revisión restaura mejor la decisión léxica auditada para חָרָשׁ con «grabador» en el texto principal y deja «artesano» como alternativa en nota; explicita el matiz textil con «hilo escarlata»; reemplaza el poco idiomático «devisores» por «ideadores», que sigue reflejando el cierre enfático; y añade la nota cultural sobre «sabiduría de corazón» que la auditoría inglesa preservó. También se suavizó «toda obra» a «toda clase de trabajo» al inicio para un español más natural, manteniendo luego «hacedores de toda obra» en el resumen final por cercanía formal al hebreo.
