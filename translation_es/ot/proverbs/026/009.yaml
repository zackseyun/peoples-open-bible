translation:
  language: es
  text: Como una espina que sube a la mano de un borracho[b][a], así es un proverbio en la boca de los necios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa léxica: "Como un espino en la mano de un borracho, así es un proverbio en la boca de los necios". El hebreo también puede referirse a una planta espinosa completa; aquí se opta por "espina" para concentrar la imagen del daño punzante.'
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo literalmente significa "sube" o "asciende"; la imagen puede ser la de una espina que es alzada, blandida o que se mete en la mano del borracho de manera peligrosa y descontrolada.
    reason: lexical_alternative
lexical_decisions:
- source_word: חוֹחַ
  english_pob_choice: thorn
  chosen_spanish: espina
  alternatives_spanish:
  - espino
  - zarza espinosa
  lexicon: HALOT
  rationale: El término denota algo espinoso y dañino. 'Espina' comunica con naturalidad la imagen breve y punzante del proverbio, sin añadir la idea de un arbusto completo que no exige el contexto.
- source_word: עָלָה
  english_pob_choice: goes up / comes up
  chosen_spanish: se levanta
  alternatives_spanish:
  - sube
  - asciende
  - sale
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'sube/asciende'. En español, 'se levanta' conserva la acción ascendente y puede sugerir el movimiento peligroso y repentino de la imagen sin forzar una explicación interpretativa.
- source_word: בְּיַד
  english_pob_choice: in the hand of
  chosen_spanish: en la mano de
  alternatives_spanish:
  - en el agarre de
  - por la mano de
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal concreta del hebreo con la preposición 'en', que corresponde de forma directa a la estructura del original.
- source_word: שִׁכּוֹר
  english_pob_choice: drunkard
  chosen_spanish: borracho
  alternatives_spanish:
  - ebrio
  - hombre ebrio
  - persona borracha
  lexicon: HALOT
  rationale: El sustantivo/adjetivo describe a una persona caracterizada por la embriaguez. 'Borracho' es natural en español y conserva el tono proverbial directo del hebreo.
- source_word: מָשָׁל
  english_pob_choice: proverb
  chosen_spanish: proverbio
  alternatives_spanish:
  - dicho
  - máxima
  - parábola
  lexicon: HALOT
  rationale: En literatura sapiencial, מָשָׁל corresponde bien a 'proverbio'. Es la equivalencia más transparente y conserva el género literario del versículo.
- source_word: בְּפִי
  english_pob_choice: in the mouth of
  chosen_spanish: en la boca de
  alternatives_spanish:
  - en los labios de
  lexicon: HALOT
  rationale: La imagen concreta de habla se preserva con 'en la boca de', paralela a 'en la mano de' en la primera línea.
- source_word: כְסִילִים
  english_pob_choice: fools
  chosen_spanish: necios
  alternatives_spanish:
  - fools
  - insensatos
  - torpes
  lexicon: HALOT
  rationale: En la sabiduría bíblica, כְּסִילִים no alude solo a falta de inteligencia, sino a necedad moral y espiritual. 'Necios' transmite mejor esa carga en español sin caer en una burla excesivamente coloquial.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que ajustó la relación entre el verbo y la preposición ('goes up into') para reflejar más directamente el hebreo. En español se preserva esa dirección con 'se levanta en la mano de'.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo concreto 'en la mano de / en la boca de'.
  - Se evitó traducir 'מָשָׁל' como 'parábola' para no desplazar el sentido sapiencial específico.
  - '''Necios'' se usa de manera consistente con la terminología sapiencial bíblica para כְּסִילִים.'
