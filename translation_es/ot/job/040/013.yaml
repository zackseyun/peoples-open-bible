translation:
  language: es
  text: Escóndelos[a] juntos en el polvo; ata sus rostros en el lugar escondido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sepúltalos juntos en el polvo». El verbo hebreo puede significar «esconder» o, en este contexto, sugerir sepultura.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en secreto» o «en ocultamiento». La frase final es difícil; probablemente alude a un lugar escondido y hace eco del verbo inicial «esconder».'
    reason: alternative_reading
lexical_decisions:
- source_word: טָמְנֵם
  english_pob_choice: Hide them
  chosen_spanish: Escóndelos
  alternatives_spanish:
  - Sepúltalos
  - Cúbrelos
  - Ocúltalos
  lexicon: HALOT
  rationale: El verbo טמן admite ‘ocultar/esconder’ y, en este contexto de polvo y muerte, también puede sugerir sepultura. ‘Escóndelos’ conserva el valor básico del verbo sin decidir de más por una lectura funeraria explícita que el texto no obliga a imponer.
- source_word: בֶּעָפָר
  english_pob_choice: in the dust
  chosen_spanish: en el polvo
  alternatives_spanish:
  - en el polvo de la tierra
  - en la tierra
  - en el barro
  lexicon: HALOT
  rationale: עָפָר designa polvo o tierra suelta; ‘polvo’ mantiene el tono poético y la resonancia de mortalidad mejor que ‘tierra’, que puede sonar más general y menos imagística.
- source_word: יָחַד
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - juntamente
  - todos juntos
  lexicon: HALOT
  rationale: El adverbio expresa acción colectiva. ‘Juntos’ es natural en español y conserva el sentido grupal sin añadir énfasis innecesario.
- source_word: פְּנֵיהֶם
  english_pob_choice: their faces
  chosen_spanish: sus rostros
  alternatives_spanish:
  - sus caras
  - sus rostros
  lexicon: HALOT
  rationale: Literalmente es ‘sus caras/rostros’. ‘Rostros’ es más solemne y transparente en un registro poético, manteniendo la concreción del hebreo.
- source_word: חֲבֹשׁ
  english_pob_choice: bind
  chosen_spanish: ata
  alternatives_spanish:
  - liga
  - vendа
  - enciérralos
  lexicon: HALOT
  rationale: חבשׁ significa ‘atar, vendar, sujetar’. ‘Ata’ preserva el núcleo léxico y funciona bien con el complemento siguiente, sin reducirlo a una interpretación más específica como ‘encierra’ o ‘prisión’.
- source_word: בַּטָּמוּן
  english_pob_choice: in the hidden place
  chosen_spanish: en el lugar escondido
  alternatives_spanish:
  - en el escondite
  - en lo oculto
  - en secreto
  lexicon: HALOT
  rationale: La forma final es difícil y probablemente remite a ‘lo escondido/oculto’, con eco del verbo inicial. ‘Lugar escondido’ conserva la relación verbal y la ambigüedad del hebreo mejor que una paráfrasis más abstracta.
translation_notes:
  revision_awareness: 'Coincide con el último pasaje revisado: no se reportaron cambios y el estado de consenso fue de alta concordancia. Se mantuvo la misma solución semántica general del inglés auditado, ajustando solo la naturalidad del español.'
  spanish_consistency_notes:
  - Se preservó la repetición conceptual entre ‘esconder’ y ‘lugar escondido’ para reflejar el posible juego de palabras del hebreo.
  - Se evitó introducir ‘SEÑOR’ u otra terminología ajena, ya que el verso no contiene el nombre divino ni un título teológico equivalente.
  - Se mantuvo un registro poético y sobrio, acorde con la imaginería de muerte/resto de Job 40:13.
