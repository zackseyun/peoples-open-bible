id: 2CH.24.27
reference: 2 Chronicles 24:27
source:
  edition: WLC
  text: וּ/בָנָ֞י/ו ו/רב הַ/מַּשָּׂ֣א עָלָ֗י/ו וִ/יסוֹד֙ בֵּ֣ית הָ/אֱלֹהִ֔ים הִנָּ֣/ם כְּתוּבִ֔ים עַל מִדְרַ֖שׁ סֵ֣פֶר הַ/מְּלָכִ֑ים וַ/יִּמְלֹ֛ךְ אֲמַצְיָ֥הוּ בְנ֖/וֹ תַּחְתָּֽי/ו־׃פ
translation:
  text: Now his sons[a], the many oracles against him, and the founding of the house of God—behold, they are written in the Midrash of the Book of the Kings[b]. And Amaziah his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'the greatness of the burden upon him,' 'the abundance of the pronouncement against him,' or even 'the heavy tribute laid on him.' The Hebrew phrase is difficult, and מַשָּׂא can mean 'burden,' 'oracle,' or in some contexts a load imposed.
    reason: lexical_alternative
  - marker: b
    text: '''Midrash'' here likely means an interpretive record, exposition, or commentary associated with the Book of the Kings.'
    reason: cultural_note
lexical_decisions:
- source_word: וּבָנָיו
  chosen: Now his sons
  alternatives:
  - And his sons
  - As for his sons
  lexicon: HALOT
  rationale: The conjunction waw here introduces the final summary notice. 'Now' gives natural English discourse flow while preserving the connective sense; 'his sons' is a straightforward rendering of the plural noun with 3ms suffix.
- source_word: וְרֹב הַמַּשָּׂא עָלָיו
  chosen: the many oracles against him
  alternatives:
  - the greatness of the burden upon him
  - the abundance of the pronouncement against him
  - the heavy tribute laid on him
  lexicon: HALOT
  rationale: מַשָּׂא often means 'burden' literally, but in prophetic and historiographic contexts it can denote an utterance/oracle, often of judgment. In this context, paired with a record source and Joash's negative end, 'oracles against him' best captures the likely sense. רֹב is rendered 'many' to express abundance. Because the phrase is difficult and debated, alternatives are preserved in a footnote.
- source_word: וִיסוֹד
  chosen: the founding of
  alternatives:
  - the foundation of
  - the repairing of
  - the establishment of
  lexicon: HALOT
  rationale: From יסד, the noun/infinitive-like form points to founding/establishing. Given the chapter's focus on temple restoration, 'founding' or 'foundation' are both possible; 'founding of' is chosen as a natural English expression while leaving open whether it refers to foundational work or institutional establishment.
- source_word: בֵּית הָאֱלֹהִים
  chosen: the house of God
  alternatives:
  - the temple of God
  lexicon: HALOT
  rationale: A formally transparent rendering of the Hebrew idiom. 'Temple of God' is idiomatic English, but 'house of God' preserves the source wording and its broader semantic range.
- source_word: הִנָּם כְּתוּבִים
  chosen: behold, they are written
  alternatives:
  - indeed, they are written
  - see, they are written
  lexicon: HALOT
  rationale: הִנָּם adds deictic emphasis; 'behold' preserves that emphasis in a concise, traditional but still understandable way. The passive participle is rendered with an English present passive.
- source_word: עַל מִדְרַשׁ סֵפֶר הַמְּלָכִים
  chosen: in the Midrash of the Book of the Kings
  alternatives:
  - in the commentary on the Book of the Kings
  - in the exposition of the Book of the Kings
  lexicon: HALOT
  rationale: מִדְרַשׁ here likely denotes an interpretive record, exposition, or commentary. Because 'Midrash' is the direct transliteration and avoids over-specifying the genre, it is retained in the main text, with explanatory alternatives suitable for a footnote.
- source_word: וַיִּמְלֹךְ ... תַּחְתָּיו
  chosen: And Amaziah his son reigned in his place
  alternatives:
  - became king in his place
  - reigned instead of him
  lexicon: HALOT
  rationale: Standard royal succession formula. 'Reigned in his place' is idiomatic and faithful to the Hebrew construction.
