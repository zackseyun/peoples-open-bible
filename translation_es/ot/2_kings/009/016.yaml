base_translation:
  language: en
  yaml_path: translation/ot/2_kings/009/016.yaml
  text: So Jehu mounted up and went to Jezreel[a], because Joram was lying there[b], and Ahaziah king of Judah had gone down to see Joram.
  footnotes:
