lexical_decisions:
- source_word: Filii
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  - hijo de linaje de
  lexicon: —
  rationale: La serie genealógica en latín se expresa de forma natural en español con «hijo de», manteniendo la repetición de la cadena de ascendencia sin añadir interpretación.
- source_word: Ahiae
  english_pob_choice: Ahijah
  chosen_spanish: Ahías
  alternatives_spanish:
  - Ahiya
  - Ajías
  lexicon: —
  rationale: Se adapta el nombre propio al uso bíblico habitual en español, preservando la identidad personal del linaje.
- source_word: Finees
  english_pob_choice: Phinehas
  chosen_spanish: Finees
  alternatives_spanish:
  - Finees
  - Finés
  lexicon: —
  rationale: Se conserva la forma bíblica establecida en español para Phinehas, con ortografía tradicional y reconocible.
- source_word: Heli
  english_pob_choice: Eli
  chosen_spanish: Elí
  alternatives_spanish:
  - Eli
  lexicon: —
  rationale: Se usa la forma acentuada española para el nombre bíblico, conforme a la pronunciación y a la lectura habitual.
- source_word: Ameriae
  english_pob_choice: Amariah
  chosen_spanish: Amarías
  alternatives_spanish:
  - Amarías
  - Amarías
  lexicon: —
  rationale: La forma española bíblica más natural de Amariah es «Amarías», que conserva la referencia nominal sin calco latino.
- source_word: Aziei
  english_pob_choice: Aziah
  chosen_spanish: Azías
  alternatives_spanish:
  - Azías
  - Azijas
  lexicon: —
  rationale: Se opta por la forma bíblica castellana de este nombre, con la vocal final marcada según uso español.
- source_word: Marimoth
  english_pob_choice: Meraioth
  chosen_spanish: Meraiot
  alternatives_spanish:
  - Meraiot
  - Meraiot
  lexicon: —
  rationale: Se adapta el nombre al español conservando la base consonántica del latín y la equivalencia con la línea sacerdotal conocida.
- source_word: Arna
  english_pob_choice: Arna
  chosen_spanish: Arna
  alternatives_spanish:
  - Arna
  lexicon: —
  rationale: Se mantiene el nombre tal como aparece en el testimonio latino, sin forzar una identificación no explícita en el texto.
- source_word: Oziae
  english_pob_choice: Uzziah
  chosen_spanish: Uzzías
  alternatives_spanish:
  - Uzías
  - Uzzías
  lexicon: —
  rationale: Se sigue de cerca la forma latina y el ajuste del POB inglés a «Uzziah», preservando la identidad del nombre con la grafía española más clara.
- source_word: Borith
  english_pob_choice: Borith
  chosen_spanish: Borit
  alternatives_spanish:
  - Borit
  - Bórit
  lexicon: —
  rationale: El nombre se translitera de manera sencilla al español sin introducir una acentuación no atestiguada.
- source_word: Abissei
  english_pob_choice: Abishua
  chosen_spanish: Abisúa
  alternatives_spanish:
  - Abisúa
  - Abisúa
  lexicon: —
  rationale: Se sigue la revisión del POB inglés que corrige la lectura hacia Abishua; en español, «Abisúa» es la forma bíblica natural y evita confundirlo con Abisai/Abishai.
- source_word: Eleazar
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  alternatives_spanish:
  - Eleazar
  lexicon: —
  rationale: Se conserva la forma bíblica española ampliamente establecida, correspondiente de manera directa al nombre latino.
theological_decisions:
- issue: Identidad de Abissei / Abishua frente a Abishai
  english_pob_reading: Or 'son of Abishai' (later revised to Abishua in the audit trail).
  chosen_spanish_reading: hijo de Abisúa[a]
  alternative_spanish_readings:
  - hijo de Abisai
  - hijo de Abisúa
  rationale: La revisión auditada indica que el testimonio latino apunta a Abishua, figura de la línea sacerdotal de Esdras, no a Abishai, el guerrero davídico. El español debe reflejar esa corrección y conservar, si se desea, la alternativa histórica solo como nota.
  doctrine_reference: Ezra 7:1–5; 1 Crónicas 6:4
- issue: Cadena genealógica repetitiva
  english_pob_reading: son of ... son of ...
  chosen_spanish_reading: hijo de ... hijo de ...
  alternative_spanish_readings:
  - descendiente de ...
  - linaje de ...
  rationale: La genealogía funciona como enumeración documental; en español conviene mantener la repetición literal para no debilitar la estructura y la trazabilidad del linaje.
  doctrine_reference: Contexto genealógico de Esdras
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que corrige «Uzzi» a «Uzziah» y la adjudicación previa que prefería «Abishua» sobre «Abishai». La versión española sigue esas decisiones auditadas y ajusta los nombres propios a formas bíblicas naturales en español.
  spanish_consistency_notes:
  - Se mantuvo la secuencia genealógica con puntuación mínima, como en el latín y en la traducción inglesa auditada.
  - Se evitó sustituir nombres propios por equivalentes no pertinentes en español cuando el linaje bíblico exige una identificación específica.
  - La nota al pie conserva la alternativa transmitida por el POB inglés, pero el cuerpo principal refleja la lectura revisada y más probable.
