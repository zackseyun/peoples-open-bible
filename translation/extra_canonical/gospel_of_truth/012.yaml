technical_vocabulary_note: 'Key Valentinian terms are preserved: “Fullness (Pleroma)”
  for ⲡⲗⲏⲣⲱⲙⲁ; “hylē (matter)” for ⲧϩⲩⲗⲏ; “Depth” for ⲃⲁⲑⲟⲥ as a divine epithet; “Error”
  for personified ⲡⲗⲁⲛⲏ; “change of mind” for ⲙⲉⲧⲁⲛⲟⲓⲁ with the traditional ‘repentance’
  sense footnoted; “chrism” for the anointing/ointment term; “perfect” for ⲧⲉⲗⲓⲟⲥ;
  and “seal” retained as sacramental metaphor. Following Cartha policy on titles,
  ⲡⲭⲥ is rendered “Messiah” (title-sense), with “Christ” referenced in a footnote.
  These choices keep the cosmological and sacramental registers audible without flattening
  them.'
textual_note: Translated directly from Codex I, pp. 35–36 OCR. No Codex XII overlap
  is available for this section; thus no external repairs were attempted. Several
  pronoun subjects are context-dependent (e.g., the subject of “breathed forth” and
  “pursued” is taken as Incorruptibility; the “physician” analogy governs subsequent
  clauses). The phrase “no seal is loosened” reflects the idiom with ⲛⲁⲃⲱⲕ (to loosen/undo)
  in the context of sealed vessels. “Need” renders ⲡϣⲧⲁ, contrasted with the filling
  action of the Fullness. Where the Coptic bears metaphoric density (e.g., “breath
  and its power draws it”), the imagery is retained rather than naturalized.
