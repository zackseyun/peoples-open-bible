translation:
  language: es
  text: Pero ellos[a], como Adán, transgredieron el pacto; allí me fueron infieles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «como hombre» o «como la humanidad». El hebreo אָדָם puede referirse tanto a Adán personalmente como a la humanidad en general.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהֵמָּה
  english_pob_choice: But they
  chosen_spanish: Pero ellos
  alternatives_spanish:
  - Y ellos
  - Y ellos, sin embargo
  lexicon: HALOT
  rationale: El hebreo es enfático en el pronombre y el contexto anterior admite contraste adversativo. «Pero» reproduce bien ese giro, y «ellos» mantiene la fuerza del pronombre explícito sin volver la frase pesada.
- source_word: כְּאָדָם
  english_pob_choice: like Adam
  chosen_spanish: como Adán
  alternatives_spanish:
  - como hombre
  - como la humanidad
  lexicon: HALOT
  rationale: Se conserva la lectura de nombre propio en el texto principal, porque el hebreo permite esa interpretación y encaja con la resonancia de una ruptura primordial. La alternativa genérica queda implícitamente abierta en la nota.
- source_word: עָבְרוּ
  english_pob_choice: transgressed
  chosen_spanish: transgredieron
  alternatives_spanish:
  - violaron
  - quebraron
  - pasaron por encima
  lexicon: HALOT
  rationale: Con בְּרִית como objeto, el verbo expresa quebrantar o sobrepasar límites pactales. «Transgredieron» conserva mejor ese peso jurídico y teológico que una traducción más débil.
- source_word: בְרִית
  english_pob_choice: the covenant
  chosen_spanish: el pacto
  alternatives_spanish:
  - el convenio
  - un pacto
  lexicon: HALOT
  rationale: En español, «pacto» comunica de manera natural la relación formal y vinculante que el contexto exige. Se opta por el artículo definido porque el pasaje apunta a un pacto concreto, no a uno cualquiera.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - entonces
  - ahí
  lexicon: HALOT
  rationale: El adverbio espacial se mantiene como «allí», dejando sin forzar el referente exacto. Algunas lecturas entienden un matiz temporal; se conserva aquí la lectura más directa.
- source_word: בָּגְדוּ
  english_pob_choice: dealt faithlessly
  chosen_spanish: actuaron con infidelidad
  alternatives_spanish:
  - fueron infieles
  - obraron traidoramente
  - actuaron con traición
  lexicon: HALOT
  rationale: La raíz denota traición o infidelidad de pacto. «Actuaron con infidelidad» suena natural en español y preserva la relación con el lenguaje pactal sin endurecerlo innecesariamente.
- source_word: בִי
  english_pob_choice: with me
  chosen_spanish: contra mí
  alternatives_spanish:
  - conmigo
  - hacia mí
  lexicon: HALOT
  rationale: Aunque la preposición puede reflejarse con «con», el verbo בגד en español se entiende mejor como una infidelidad dirigida «contra» la persona ofendida. Esta opción conserva el carácter relacional y ofensivo del acto.
theological_decisions:
- issue: Sentido de כְּאָדָם en un contexto de pacto
  english_pob_reading: like Adam
  chosen_spanish_reading: como Adán
  alternative_spanish_readings:
  - como hombre
  - como la humanidad
  rationale: Se mantiene la lectura personal porque el hebreo lo permite y porque la alusión a una deslealtad arquetípica armoniza con el tono del versículo. La alternativa general queda preservada como posibilidad real de lectura, sin ocultar la ambigüedad del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3; Contested terms table for אָדָם'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; la versión auditada más reciente indicaba que no había cambios necesarios y fue confirmada por revisión de alta concordancia.
  spanish_consistency_notes:
  - Se conserva la tensión interpretativa de אָדָם mediante nota, en vez de resolverla de forma definitiva en el texto principal.
  - Se usa «pacto» en lugar de «alianza» para reflejar el lenguaje pactal con una opción natural y ampliamente comprensible en español.
  - «Actuaron con infidelidad contra mí» busca equilibrar naturalidad y fuerza covenantal, manteniendo el matiz de traición personal del hebreo.
