review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: anuncio futuro de muerte, distributivo ''todo primogénito'', rango social ''desde ... hasta ...'', y la inclusión final de los primogénitos del ganado/livestock. Sin embargo, dos elecciones no preservan con suficiente precisión el sentido fuente ni la auditoría inglesa: la nota [a] introduce una alternativa no documentada en el POB inglés para וּמֵת, y ''detrás de los molinos'' debilita la imagen concreta de הָרֵחָיִם como ''piedras/molinos de mano'' o ''muelas de molino''.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero 'detrás de los molinos' suena algo impreciso e incluso puede sugerir edificios o máquinas, no la labor humilde de moler grano. 'De los animales domésticos' es comprensible, pero 'del ganado' suena más natural y bíblico en este contexto sin restringir excesivamente en español eclesial. También conviene eliminar la coma antes de 'que está detrás...' para no marcar innecesariamente la cláusula como explicativa separada del referente.
  glossary_alignment: Se mantiene bien 'esclava' para הַשִּׁפְחָה, en línea con la preferencia del proyecto por lenguaje explícito de servidumbre. No hay términos divinos en juego. La desviación principal respecto a la auditoría es la nota sobre וּמֵת, que reemplaza la alternativa léxica inglesa relevante (sobre 'esclava/sierva') por una nota aspectual no necesaria.
  issues:
  - severity: medium
    issue: La nota [a] no sigue la evidencia ni la auditoría inglesa.
    rationale: El POB inglés conserva una nota léxica sobre הַשִּׁפְחָה ('maidservant' / 'female slave'), no una nota sobre וּמֵת. La nota española actual añade 'morirá ciertamente', alternativa no sustentada aquí como nota necesaria.
  - severity: medium
    issue: '''Detrás de los molinos'' es demasiado impreciso para אַחַר הָרֵחָיִם.'
    rationale: הָרֵחָיִם refiere las piedras/muelas de molino, imagen de trabajo servil de molienda. 'Molinos' puede sonar a instalaciones o artefactos más amplios y pierde concreción social y visual.
  - severity: low
    issue: '''Animales domésticos'' es correcto pero menos natural que ''ganado'' en este registro bíblico.'
    rationale: Aunque בְּהֵמָה es amplio, 'ganado' en español bíblico general comunica con más naturalidad el colectivo de animales de cría/livestock en este contexto.
