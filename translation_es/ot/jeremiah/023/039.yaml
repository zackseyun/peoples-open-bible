translation:
  language: es
  text: 'Por tanto[a], he aquí, yo ciertamente los levantaré y los arrojaré: a ustedes y a la ciudad que les di a ustedes y a sus padres, de delante de mí[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "los olvidaré por completo"; el hebreo aquí es difícil, y algunos entienden un sentido verbal distinto de "levantar/cargar".'
    reason: alternative_reading
  - marker: b
    text: 'O: "fuera de mi presencia".'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por esta razón
  lexicon: HALOT
  rationale: Expresa con naturalidad la conclusión inferida del contexto profético y mantiene el valor consecuencial del hebreo.
- source_word: הִנְנִי
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - ved
  lexicon: HALOT
  rationale: Conserva la deíxis solemne del discurso profético en un español bíblico actual y comprensible.
- source_word: וְנָשִׁיתִי אֶתְכֶם נָשֹׂא
  english_pob_choice: I will surely lift you up
  chosen_spanish: yo ciertamente os levantaré
  alternatives_spanish:
  - yo ciertamente os llevaré
  - yo ciertamente os alzaré
  lexicon: HALOT
  rationale: El hebreo es difícil y admite una tensión interpretativa entre 'olvidar' y un sentido de 'levantar/llevar'. El español principal conserva la decisión de la POB de mantener el verbo de elevación/movimiento y la intensificación con 'ciertamente', sin resolver por completo la ambigüedad de fondo.
- source_word: וְנָטַשְׁתִּי אֶתְכֶם
  english_pob_choice: and cast you away
  chosen_spanish: y os arrojaré
  alternatives_spanish:
  - y os abandonaré
  - y os dejaré
  lexicon: HALOT
  rationale: '''Arrojar'' comunica mejor en español la expulsión judicial y violenta que el contexto exige, manteniendo la fuerza de desecho o alejamiento del verbo hebreo.'
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: HALOT
  rationale: Se conserva la referencia genérica del hebreo, sin nombrar explícitamente Jerusalén donde el texto no lo hace.
- source_word: אֲשֶׁר נָתַתִּי לָכֶם וְלַאֲבוֹתֵיכֶם
  english_pob_choice: that I gave to you and to your fathers
  chosen_spanish: que di a vosotros y a vuestros padres
  alternatives_spanish:
  - que les di a ustedes y a sus padres
  - que entregué a ustedes y a sus padres
  lexicon: HALOT
  rationale: Preserva la relación de dádiva del pacto y el vínculo histórico con los antepasados, evitando suavizar el 'dar' del hebreo.
- source_word: מֵעַל פָּנָי
  english_pob_choice: from before my face
  chosen_spanish: de delante de mi rostro
  alternatives_spanish:
  - de mi presencia
  - fuera de mi presencia
  lexicon: HALOT
  rationale: Mantiene la imagen antropomórfica y forense del hebreo, siguiendo la preferencia de la POB por no neutralizarla en la traducción principal.
theological_decisions:
- issue: Ambigüedad lexical/textual de וְנָשִׁיתִי ... נָשֹׂא
  english_pob_reading: I will surely lift you up
  chosen_spanish_reading: yo ciertamente os levantaré
  alternative_spanish_readings:
  - yo ciertamente os olvidaré
  - yo ciertamente os llevaré
  rationale: 'Se conserva la tensión documentada: algunos entienden un sentido de ''olvidar'', mientras que la lectura principal sigue el MT con el eco de נשׂא y la intensificación por infinitivo absoluto. En español, ''levantaré'' deja abierta la idea de alzar/cargar con el pueblo antes de arrojarlo, sin borrar la dificultad textual.'
  doctrine_reference: 'Translation philosophy §3: preservar tensiones interpretativas genuinas cuando existen'
- issue: Lenguaje de presencia divina en מֵעַל פָּנָי
  english_pob_reading: from before my face
  chosen_spanish_reading: de delante de mi rostro
  alternative_spanish_readings:
  - de mi presencia
  - fuera de mi presencia
  rationale: La elección conserva el hebraísmo relacional y judicial del original. 'Rostro' evita reducir el texto a una expresión puramente abstracta y refleja la imagen bíblica de la presencia de Yahvé.
  doctrine_reference: Teología bíblica de la presencia divina y del juicio de expulsión
translation_notes:
  revision_awareness: Se siguió el último pase sin cambios del contexto inglés, manteniendo la decisión principal sobre נָשׂא y la cláusula final de expulsión; no se detectaron revisiones posteriores que exigieran ajustar el español.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando el contexto lo requiera en el libro; en este versículo no aparece el nombre divino en la forma explícita, por lo que no fue necesario introducirlo.
  - Se prefirió 'he aquí' por su registro profético y 'de delante de mi rostro' para conservar la imagen semítica y la correspondencia con el audit trail inglés.
  - La segunda persona plural se sostuvo con 'os/vosotros/vuestros' para concordar con el español bíblico neutral y la referencia comunitaria del texto.
