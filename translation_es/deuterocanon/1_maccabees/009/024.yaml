revisions:
- from: En aquellos días hubo[a] una hambre muy grande, y la tierra se pasó a ellos.
  to: En aquellos días hubo una hambruna muy grave, y el país se pasó a su lado.[a]
  rationale: 'Se ajusta la frase para que el español suene natural y siga fielmente el griego y la auditoría inglesa: «hambruna muy grave» expresa mejor λιμὸς μεγάλη σφόδρα que «hambre muy grande», y «el país se pasó a su lado» comunica con claridad el sentido de αὐτομόλησεν μετʼ αὐτῶν como cambio de lealtad/alineación. Se conserva en nota una alternativa más cercana a la amplitud del griego.'
