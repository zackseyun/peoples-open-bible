  glossary_alignment: No hay conflictos con la terminología proyectual. «Proverbio», «boca» y «necios» encajan bien con el uso bíblico. La revisión propuesta solo mejora la naturalidad de la imagen verbal sin alterar el sentido ni la justificación léxica principal.
