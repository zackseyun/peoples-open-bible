id: GEN.49.32
reference: Genesis 49:32
source:
  edition: WLC
  text: מִקְנֵ֧ה הַ/שָּׂדֶ֛ה וְ/הַ/מְּעָרָ֥ה אֲשֶׁר בּ֖/וֹ מֵ/אֵ֥ת בְּנֵי חֵֽת־־׃
translation:
  text: The field and the cave that is in it were purchased from the sons of Heth[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from the Hittites.' The Hebrew reads 'from the sons of Heth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the purchase of the field and the cave that is in it, from the sons of Heth.'.
    reason: previous_rendering
lexical_decisions:
- source_word: מִקְנֵה
  chosen: the purchase of
  alternatives:
  - the acquired property of
  - the buying of
  - the possession of
  lexicon: HALOT
  rationale: In context this noun refers to what was acquired by purchase, specifically the transaction by which the burial site came into Jacob's family possession. 'The purchase of' best captures the elliptical resumptive style of this verse in relation to the earlier narrative about buying the field and cave, while remaining natural in English.
- source_word: הַשָּׂדֶה
  chosen: the field
  lexicon: HALOT
  rationale: Standard rendering of שָׂדֶה in this land-ownership context.
- source_word: וְהַמְּעָרָה
  chosen: and the cave
  lexicon: HALOT
  rationale: Straightforward rendering; the conjunction links the two items acquired.
- source_word: אֲשֶׁר בּוֹ
  chosen: that is in it
  alternatives:
  - which was in it
  - that was there
  lexicon: HALOT
  rationale: The relative clause modifies 'the cave' in relation to the field. Present tense is acceptable in English for this summarizing statement, though the sense is historical.
- source_word: מֵאֵת
  chosen: from
  alternatives:
  - from the hand of
  lexicon: HALOT
  rationale: This preposition marks source/origin of acquisition. 'From' is the natural English equivalent; the fuller idiom 'from the hand of' would overtranslate here.
- source_word: בְּנֵי חֵת
  chosen: the sons of Heth
  alternatives:
  - the Hittites
  lexicon: HALOT
  rationale: A more formally transparent rendering preserves the Hebrew ethnonym and familial expression used in Genesis. 'Hittites' is a valid contextual equivalent but is better preserved as an alternative because the Hebrew literally reads 'sons of Heth.'
