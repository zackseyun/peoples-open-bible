- from: El deseo del perezoso lo mata[a], porque sus manos rehúsan trabajar.
  to: El deseo del perezoso lo hace morir[a], porque sus manos rehúsan trabajar.
  rationale: Se revisa el verbo principal para reflejar mejor la causatividad de תְּמִיתֶנּוּ («lo hace morir»), y se corrige la nota para que preserve una alternativa real y útil («lo mata») en lugar de duplicar el texto principal. No se requieren más cambios.
