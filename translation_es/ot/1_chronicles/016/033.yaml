    text: Or 'will shout for joy.' The Hebrew verb can denote jubilant ringing out, whether sung or shouted.
    reason: lexical_alternative
  - marker: b
    text: Or 'he is coming to judge the earth.' The Hebrew form can express a coming action with vivid certainty in poetic context.
    reason: lexical_alternative
  - marker: c
    text: Or 'the land,' if taken more locally; here the wider cosmic context favors 'the earth.'
    reason: alternative_reading
