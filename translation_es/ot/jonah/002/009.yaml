translation:
  language: es
  text: Los que se aferran a ídolos vanos abandonan su misericordia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su amor leal»; posiblemente significa que renuncian a la misericordia disponible para ellos de parte de Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: מְשַׁמְּרִים
  english_pob_choice: cling to
  chosen_spanish: se aferran a
  alternatives_spanish:
  - se adhieren a
  - se mantienen en
  - guardan
  lexicon: HALOT
  rationale: El verbo hebreo puede significar guardar/observar, pero en este giro con הבלי שוא expresa una adhesión idólatra persistente. «Se aferran a» comunica devoción y apego continuo sin convertirlo en mera observancia.
- source_word: הַבְלֵי שָׁוְא
  english_pob_choice: worthless idols
  chosen_spanish: ídolos vanos
  alternatives_spanish:
  - ídolos inútiles
  - vanidades vacías
  - ídolos vacíos
  lexicon: HALOT
  rationale: La expresión combina vaciedad/vanidad con falsedad o nulidad; en el contexto profético el referente son ídolos. «Ídolos vanos» mantiene el matiz de vaciedad y engaño con una forma natural en español.
- source_word: חַסְדָּם
  english_pob_choice: their own mercy
  chosen_spanish: su misericordia
  alternatives_spanish:
  - su amor leal
  - su lealtad de pacto
  - su gracia
  lexicon: HALOT
  rationale: El hebreo חסד admite misericordia, amor leal y lealtad de pacto. Dado el ajuste revisado del POB inglés y la ambigüedad del sufijo posesivo, «su misericordia» sigue de cerca el sentido más directo sin eliminar la tensión interpretativa sobre si se trata de misericordia recibida o lealtad debida.
- source_word: יַעֲזֹבוּ
  english_pob_choice: forsake
  chosen_spanish: abandonan
  alternatives_spanish:
  - dejan
  - desamparan
  - forsaken
  lexicon: HALOT
  rationale: עזב significa abandonar/abandonar o dejar de lado. «Abandonan» reproduce bien el tono solemne y la relación con la infidelidad idólatra.
theological_decisions:
- issue: Sentido de חַסְדָּם en relación con la idolatría
  english_pob_reading: Those who cling to worthless idols forsake their own mercy.
  chosen_spanish_reading: Los que se aferran a ídolos vanos abandonan su misericordia.
  alternative_spanish_readings:
  - Los que se aferran a ídolos vanos abandonan su amor leal.
  - Los que se aferran a ídolos vanos abandonan la misericordia que les corresponde.
  rationale: El hebreo permite entender חסד como misericordia, amor leal o lealtad de pacto, y el sufijo posesivo admite varias relaciones. La redacción española mantiene «misericordia» como opción principal, pero la nota conserva la alternativa para no resolver en exceso la tensión semántica.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que sustituyó «covenant loyalty» por «mercy» para reflejar con mayor directidad חַסְדָּם. La versión española sigue ese ajuste y conserva la tensión interpretativa con nota.
  spanish_consistency_notes:
  - Se mantiene «ídolos» en lugar de un calco más abstracto como «vanidades» porque el contexto profético ya identifica el referente.
  - Se usa «misericordia» y no «gracia» porque el término hebreo חסד aquí se alinea mejor con la nota revisada del POB inglés y con el sentido relacional del pasaje.
  - «Se aferran a» transmite la idea de adhesión persistente mejor que «guardan», que en español podría sonar a observancia religiosa neutral.
