translation:
  language: es
  text: Entonces ella permanecerá durante treinta y tres días en la sangre[a] de su purificación. No tocará cosa santa alguna, y no entrará en el santuario, hasta que se cumplan los días de su purificación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘en la sangre de purificación’. La expresión hebrea es literalmente ‘en las sangres/sangre de purificación’ y se refiere al período posparto asociado con la purificación ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁלֹשִׁים יוֹם וּ/שְׁלֹ֣שֶׁת יָמִים
  english_pob_choice: for thirty-three days
  chosen_spanish: durante treinta y tres días
  alternatives_spanish:
  - por treinta y tres días
  - treinta días y tres días
  lexicon: HALOT
  rationale: El hebreo expresa literalmente ‘treinta días y tres días’, pero en español corriente la forma natural y exacta es ‘treinta y tres días’. ‘Durante’ comunica la duración de manera idiomática sin añadir sentido ajeno.
- source_word: תֵּשֵׁב
  english_pob_choice: she shall remain
  chosen_spanish: permanecerá
  alternatives_spanish:
  - se sentará
  - se quedará
  lexicon: HALOT
  rationale: El verbo puede significar sentarse, habitar o permanecer. En este contexto legal-ritual, la idea es continuar en un estado durante un período; ‘permanecerá’ conserva esa fuerza sin sonar rígido.
- source_word: בִּ/דְמֵי טָהֳרָה
  english_pob_choice: in the blood of her purification
  chosen_spanish: en la sangre de su purificación
  alternatives_spanish:
  - en la sangre de la purificación
  - en la sangre de su limpieza
  lexicon: HALOT
  rationale: Se preserva la imagen concreta del hebreo y el matiz cultual de טָהֳרָה como purificación ritual. ‘Su’ refleja el sufijo femenino del contexto. ‘Limpieza’ sería posible, pero ‘purificación’ es más preciso en este marco legal.
- source_word: בְּ/כָל קֹדֶשׁ
  english_pob_choice: any holy thing
  chosen_spanish: cosa santa alguna
  alternatives_spanish:
  - ninguna cosa santa
  - cualquier cosa santa
  - cosa sagrada alguna
  lexicon: HALOT
  rationale: La frase hebrea abarca cualquier objeto o cosa consagrada. ‘Cosa santa alguna’ mantiene un registro más formal y literal que ‘cualquier cosa santa’, y evita limitar innecesariamente el alcance de la prohibición.
- source_word: לֹֽא תִגָּע
  english_pob_choice: she shall not touch
  chosen_spanish: No tocará
  alternatives_spanish:
  - No deberá tocar
  - No tocará ella
  lexicon: HALOT
  rationale: La prohibición legal se expresa bien con futuro simple en español bíblico formal. La omisión del pronombre explícito mantiene la fluidez sin perder el referente femenino ya claro en el contexto.
- source_word: וְ/אֶל הַ/מִּקְדָּשׁ לֹא תָבֹא
  english_pob_choice: and she shall not come into the sanctuary
  chosen_spanish: y no entrará en el santuario
  alternatives_spanish:
  - y no irá al santuario
  - y no vendrá al santuario
  lexicon: HALOT
  rationale: מִקְדָּשׁ designa el santuario/espacio sagrado. ‘Entrará en el santuario’ expresa con naturalidad la idea espacial de ‘venir a/entrar en’ un lugar sagrado.
- source_word: עַד מְלֹאת
  english_pob_choice: until ... are completed
  chosen_spanish: hasta que se cumplan
  alternatives_spanish:
  - hasta que terminen
  - hasta la completa terminación de
  lexicon: HALOT
  rationale: El infinitivo de מלא comunica cumplimiento o completitud. ‘Hasta que se cumplan’ traduce esa idea en un español claro y jurídico, sin forzar una paráfrasis.
- source_word: יְמֵי טָהֳרָהּ
  english_pob_choice: the days of her purification
  chosen_spanish: los días de su purificación
  alternatives_spanish:
  - los días de su limpieza
  - los días de su purificación ritual
  lexicon: HALOT
  rationale: Se conserva el sustantivo ‘purificación’ para mantener la categoría ceremonial, no moral. El posesivo ‘su’ reproduce el sufijo hebreo y enlaza con el marco de la mujer en posparto.
theological_decisions:
- issue: No moralizar la impureza ritual asociada al posparto
  english_pob_reading: purification
  chosen_spanish_reading: purificación
  alternative_spanish_readings:
  - limpieza
  - purificación ritual
  rationale: El texto trata de estado ritual, no de culpa moral. ‘Purificación’ preserva la categoría cultual y evita leer pecado donde el hebreo no lo expresa.
  doctrine_reference: 'Principio traductológico POB: no importar afirmaciones doctrinales que el texto no haga; preservar la tensión ritual/legal del pasaje.'
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión final del POB en inglés, que precisó ‘any holy thing’ para reflejar con mayor literalidad la prohibición de contacto con lo santo. En español se conserva ese ajuste con ‘cosa santa alguna’, manteniendo la misma amplitud y el tono formal.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ en este versículo solo si apareciera el tetragrámaton; aquí no aparece, por lo que no se introduce.
  - ‘Purificación’ se mantiene de forma consistente como término cultual, no como limpieza moral.
  - ‘Santuario’ traduce מִקְדָּשׁ en forma estable y no se sustituye por ‘templo’ para no restringir indebidamente el alcance del hebreo.
