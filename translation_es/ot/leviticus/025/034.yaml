translation:
  language: es
  text: Pero la tierra de pasto de sus ciudades no se venderá[a], porque es su posesión permanente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tierra común» o «tierra abierta» para מִגְרָשׁ, refiriéndose al terreno alrededor de las ciudades levíticas.
    reason: lexical_alternative
  - marker: b
    text: O «posesión eterna». El hebreo עוֹלָם puede denotar permanencia duradera; aquí se refiere al carácter no transferible de la tierra.
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/שְׂדֵה
  english_pob_choice: But the pastureland
  chosen_spanish: Pero la tierra de pasto
  alternatives_spanish:
  - Y el campo
  - Pero el pastizal
  lexicon: HALOT
  rationale: שָׂדֶה con מִגְרָשׁ en este contexto apunta al terreno abierto alrededor de las ciudades levíticas; «tierra de pasto» comunica bien la función del terreno sin volverlo más técnico de lo necesario. El conector inicial se vierte como «Pero» para conservar el contraste legal con el versículo anterior.
- source_word: מִגְרַשׁ
  english_pob_choice: pastureland
  chosen_spanish: tierra de pasto
  alternatives_spanish:
  - terreno común
  - tierra abierta
  lexicon: HALOT
  rationale: מִגְרָשׁ designa el terreno abierto o de uso exterior alrededor de una ciudad, especialmente en las ciudades levíticas. «Tierra de pasto» expresa de forma natural la idea de terreno no edificado y utilizable alrededor de la ciudad.
- source_word: עָרֵי/הֶם
  english_pob_choice: of their cities
  chosen_spanish: de sus ciudades
  alternatives_spanish:
  - perteneciente a sus ciudades
  - de las ciudades de ellos
  lexicon: HALOT
  rationale: El constructo señala el terreno asociado a sus ciudades. «De sus ciudades» reproduce con sencillez la relación posesiva sin sobreexplicar la sintaxis hebrea.
- source_word: לֹא יִמָּכֵר
  english_pob_choice: must not be sold
  chosen_spanish: no se venderá
  alternatives_spanish:
  - no debe venderse
  - no será vendido
  lexicon: HALOT
  rationale: 'El nifal de מכר expresa prohibición pasiva: no debe entrar en venta. En español jurídico-bíblico, «no se venderá» mantiene la fuerza normativa y suena natural.'
- source_word: אֲחֻזַּת עוֹלָם
  english_pob_choice: permanent possession
  chosen_spanish: posesión permanente
  alternatives_spanish:
  - posesión perpetua
  - posesión eterna
  lexicon: HALOT
  rationale: אֲחֻזָּה es una posesión hereditaria o tenencia de tierra; עוֹלָם aquí indica permanencia no transferible dentro del orden legal del pacto. «Posesión permanente» preserva esa fuerza sin introducir una connotación metafísica excesiva.
- source_word: הוּא לָהֶם
  english_pob_choice: it is their
  chosen_spanish: es su
  alternatives_spanish:
  - les pertenece como
  - es de ellos como
  lexicon: HALOT
  rationale: La construcción pronominal se integra de manera idiomática en español como «es su…», manteniendo la referencia posesiva sin añadir elementos innecesarios.
theological_decisions:
- issue: Valor de עוֹלָם en la ley de la tierra
  english_pob_reading: Rendered as 'permanent' rather than 'everlasting'
  chosen_spanish_reading: «posesión permanente» en lugar de «posesión eterna»
  alternative_spanish_readings:
  - posesión perpetua
  - posesión eterna
  rationale: En este contexto jurídico, עוֹלָם señala estabilidad y carácter no transferible dentro del orden del pacto. «Permanente» preserva el alcance legal sin cargar el texto con una afirmación más absoluta de la que exige el hebreo.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del inglés al evitar añadidos explicativos como «campo de» o «perteneciente a», y conserva la lectura jurídica de la prohibición y de «posesión permanente».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en todo el proyecto, aunque este versículo no lo contenga.
  - «No se venderá» conserva el tono normativo del hebreo y del inglés POB, evitando una paráfrasis más débil.
  - «Posesión permanente» sigue la decisión auditada de no traducir עוֹלָם como «eterna» en este contexto legal.
