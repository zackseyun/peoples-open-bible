id: 2TI.3.2
reference: 2 Timothy 3:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἔσονται γὰρ οἱ ἄνθρωποι φίλαυτοι, φιλάργυροι, ἀλαζόνες, ὑπερήφανοι, βλάσφημοι, γονεῦσιν ἀπειθεῖς, ἀχάριστοι, ἀνόσιοι,
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/003/002.yaml
  text: For people will be lovers of self, lovers of money, boastful, arrogant, slanderous, disobedient to parents, ungrateful, unholy,
translation:
  language: ko
  text: 사람들이 자기를 사랑하고, 돈을 사랑하고, 자랑하고, 교만하고, 비방하고, 부모에게 순종하지 아니하고, 감사할 줄 모르고, 거룩하지 못하고,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: φίλαυτοι
  english_pob_choice: lovers of self
  chosen_korean: 자기를 사랑하고
  alternatives_korean:
  - 자기 사랑에 빠지고
  - 이기적이고
  lexicon: BDAG
  rationale: φίλ-(사랑)+αὐτός(자기) 합성어를 「자기를 사랑하다」로 직역에 가깝게 옮긴다. 다음 어휘 φιλάργυροι(돈 사랑)와 운율적 짝을 이룬다.
- source_word: φιλάργυροι
  english_pob_choice: lovers of money
  chosen_korean: 돈을 사랑하고
  alternatives_korean:
  - 재물을 사랑하고
  - 탐욕스럽고
  lexicon: BDAG
  rationale: φιλ-+ἀργύριον(돈/은). 「돈을 사랑하다」가 직역에 가깝고 자연스럽다.
- source_word: ἀλαζόνες
  english_pob_choice: boastful
  chosen_korean: 자랑하고
  alternatives_korean:
  - 자만하고
  - 허풍을 떨고
  lexicon: BDAG
  rationale: ἀλαζών은 「자기를 과장해 떠벌리는 자」. 한국 성서 전통의 「자랑하다」가 자연스럽다.
- source_word: ὑπερήφανοι
  english_pob_choice: arrogant
  chosen_korean: 교만하고
  alternatives_korean:
  - 거만하고
  - 오만하고
  lexicon: BDAG
  rationale: ὑπερήφανος는 「자기를 남 위에 두는」 교만. 한국 성서 전통의 「교만하다」가 자연스럽다.
- source_word: βλάσφημοι
  english_pob_choice: slanderous
  chosen_korean: 비방하고
  alternatives_korean:
  - 모독하고
  - 욕설하고
  lexicon: BDAG
  rationale: βλάσφημος는 사람·하나님 모두에 대한 「비방·모독」을 함께 가리킨다. 본 절의 「부모에게 순종하지 아니함」 등 인간 관계 목록 가운데에서는 「비방」이 자연스러우나, 신성 모독의 가능성도 남는다.
- source_word: γονεῦσιν ἀπειθεῖς
  english_pob_choice: disobedient to parents
  chosen_korean: 부모에게 순종하지 아니하고
  alternatives_korean:
  - 부모를 거역하고
  - 부모에게 거스르고
  lexicon: BDAG
  rationale: ἀπειθής는 「순종하지 않음」. 한국 성서 전통의 「순종하지 아니하고」를 보존한다.
- source_word: ἀχάριστοι
  english_pob_choice: ungrateful
  chosen_korean: 감사할 줄 모르고
  alternatives_korean:
  - 배은망덕하고
  - 감사하지 않고
  lexicon: BDAG
  rationale: ἀ-χάρις(은혜를 모름)를 한국어 관용 「감사할 줄 모른다」로 자연스럽게 옮긴다.
- source_word: ἀνόσιοι
  english_pob_choice: unholy
  chosen_korean: 거룩하지 못하고
  alternatives_korean:
  - 부정하고
  - 경건치 못하고
  lexicon: BDAG
  rationale: ὅσιος의 부정형으로, 신적·인륜적 경외심의 결여를 가리킨다. 「거룩하지 못하다」가 자연스럽다.
