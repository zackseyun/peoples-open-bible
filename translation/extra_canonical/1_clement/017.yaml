id: 1CLEM.17
reference: 1 Clement 17
unit: chapter
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Μιμηταὶ γενώμεθα κἀκείνων, οἵτινες ἐν δέρμασιν αἰγείοις καὶ μηλωταῖς περιεπάτησαν κηρύσσοντες τὴν ἔλευσιν τοῦ Χριστοῦ· λέγομεν δὲ Ἠλίαν καὶ Ἐλισαιέ, ἔτι δὲ καὶ Ἰεζεκιὴλ, τοὺς προφήτας· πρὸς τούτοις καὶ τοὺς μεμαρτυρημένους. 2. ἐμαρτυρήθη μεγάλως Ἀβραὰμ καὶ φίλος προσηγορεύθη τοῦ θεοῦ, καὶ λέγει ἀτενίζων εἰς τὴν δόξαν τοῦ θεοῦ ταπεινοφρονῶν· Ἐγὼ δέ εἰμι γῆ καὶ σποδός. 3. ἐπὶ δὲ καὶ περὶ Ἰὼβ οὕτως γέγραπται· Ἰὼβ δὲ ἦν δίκαιος καὶ ἄμεμπτος, ἀληθινός, θεοσεβής, ἀπεχόμενος ἀπὸ παντὸς κακοῦ. 4. ἀλλ’ αὐτὸς ἑαυτοῦ κατηγορεῖ λέγων· Οὐδεὶς καθαρὸς ἀπὸ ῥύπου, οὐδ’ ἂν μιᾶς ἡμέρας ἡ ζωὴ αὐτοῦ. 5. Μωσῆς πιστὸς ἐν ὅλῳ τῷ οἴκῳ αὐτοῦ ἐκλήθη, καὶ διὰ τῆς ὑπηρεσίας αὐτοῦ ἐκρίνεν ὁ θεὸς Αἴγυπτον διὰ τῶν μαστίγων καὶ τῶν αἰκισμάτων αὐτῶν· ἀλλὰ κἀκεῖνος δοξασθεὶς μεγάλως οὐκ ἐμεγαλοφρόνησεν, ἀλλ’ εἶπεν ἐπὶ τῆς βάτου χρηματισμοῦ αὐτῷ δεδομένου· Τίς εἰμι ἐγώ, ὅτι με πέμπεις; Ἐγὼ δέ εἰμι ἰσχνόφωνος καὶ βραδύγλωσσος. 6. καὶ πάλιν λέγει· Ἐγὼ δέ εἰμι ἀτμὶς ἀπὸ χύτρας.
  language: Greek
  pages:
  - 285
  note: This chapter comes from the normalized Funk 1901 OCR layer.
translation:
  text: 'Let us also become imitators of those who went about in goatskins and sheepskins[a], proclaiming the coming of the Messiah. We mean Elijah and Elisha, and also Ezekiel, and the prophets; and besides these, those who have been testified to. 2. Abraham was greatly testified to and was called the friend of God, and looking intently at the glory of God, he says in humility, “But I am dust and ashes.” 3. And moreover, concerning Job it is thus written: “Now Job was righteous and blameless, true, God-fearing, and abstaining from every evil.” 4. But he himself accuses himself, saying, “No one is clean from defilement, not even if his life is but one day.” 5. Moses was called faithful in all his house, and through his service God judged Egypt through the plagues and their torments; yet even he, though greatly glorified, did not become high-minded, but said, when a divine message was given to him at the bush, “Who am I, that you send me? But I am weak-voiced and slow of tongue.” 6. And again he says[b][c][d][e], “But I am steam from a pot.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The clothing imagery recalls the scriptural description of prophetic hardship and may echo Hebrews 11:37.
    reason: cross_reference
    anchor_ref: '17:1'
  - marker: e
    text: The wording reflects a traditional scriptural citation about human impurity and brevity of life; the exact form differs from the standard text of Job in some manuscripts.
    reason: textual_variant
    anchor_ref: '17:4'
  - marker: d
    text: Or “steam from a pot.” The image emphasizes frailty and insubstantiality.
    reason: lexical_alternative
    anchor_ref: '17:6'
  - marker: c
    text: Or 'by their plagues and torments'.
    reason: previous_rendering
  - marker: b
    text: Or 'And concerning Job'.
    reason: previous_rendering
lexical_decisions:
- source_word: Μιμηταὶ
  chosen: imitators
  alternatives:
  - followers
  lexicon: BDAG
  rationale: Keeps the paraenetic force of deliberate imitation rather than the broader and weaker 'followers.'
- source_word: δέρμασιν αἰγείοις καὶ μηλωταῖς
  chosen: in goatskins and sheepskins
  alternatives:
  - in goat skins and fleeces
  - in skins of goats and sheep
  lexicon: LSJ
  rationale: Preserves the concrete prophetic imagery and echoes scriptural diction, especially Heb 11:37, without over-paraphrase.
- source_word: κηρύσσοντες
  chosen: proclaiming
  alternatives:
  - preaching
  - announcing
  lexicon: BDAG
  rationale: '''Proclaiming'' preserves heraldic force and suits prophetic announcement.'
- source_word: τὴν ἔλευσιν τοῦ Χριστοῦ
  chosen: the coming of the Messiah
  alternatives:
  - the coming of Christ
  lexicon: BDAG
  rationale: Following project policy, Χριστοῦ as title is rendered 'Messiah' to preserve its meaning rather than traditional transliteration.
- source_word: τοὺς μεμαρτυρημένους
  chosen: those who have received testimony
  alternatives:
  - those who were attested
  - those well attested
  lexicon: BDAG
  rationale: The perfect participle points to persons commended or borne witness to; this rendering keeps the passive nuance and links with the repeated ἐμαρτυρήθη in the chapter.
- source_word: ἐμαρτυρήθη μεγάλως
  chosen: received great testimony
  alternatives:
  - was greatly attested
  - was highly commended
  lexicon: BDAG
  rationale: Maintains lexical consistency with the martyr/witness language in context while avoiding a modern idiom that could obscure the passive form.
- source_word: φίλος προσηγορεύθη τοῦ θεοῦ
  chosen: was called the friend of God
  alternatives:
  - was addressed as God's friend
  lexicon: LSJ
  rationale: Natural English that preserves the honorific designation.
- source_word: ἀτενίζων
  chosen: as he fixed his gaze on
  alternatives:
  - looking intently at
  - gazing upon
  lexicon: BDAG
  rationale: Captures the participle's sense of intent looking while fitting the sentence smoothly.
- source_word: ταπεινοφρονῶν
  chosen: in humility of mind
  alternatives:
  - being humble-minded
  - with lowliness
  lexicon: BDAG
  rationale: Preserves the specifically inward disposition, an important paraenetic theme in 1 Clement.
- source_word: δίκαιος
  chosen: righteous
  alternatives:
  - just
  lexicon: BDAG
  rationale: Default project rendering for moral covenantal uprightness.
- source_word: ἄμεμπτος
  chosen: blameless
  alternatives:
  - irreproachable
  lexicon: BDAG
  rationale: Standard and clear rendering in virtue lists and character descriptions.
- source_word: ἀληθινός
  chosen: 'true'
  alternatives:
  - genuine
  - truthful
  lexicon: BDAG
  rationale: Retains the simple predicate quality found in the citation without interpretive expansion.
- source_word: θεοσεβής
  chosen: God-fearing
  alternatives:
  - devout
  lexicon: BDAG
  rationale: Preserves explicit God-reference rather than the more generalized 'devout.'
- source_word: ἀπεχόμενος ἀπὸ παντὸς κακοῦ
  chosen: turning away from every evil thing
  alternatives:
  - abstaining from every evil
  - keeping away from all evil
  lexicon: BDAG
  rationale: A readable rendering that preserves active moral avoidance.
- source_word: κατηγορεῖ
  chosen: brings accusation against himself
  alternatives:
  - accuses himself
  - condemns himself
  lexicon: BDAG
  rationale: Keeps the judicial flavor of the verb while remaining idiomatic.
- source_word: ῥύπου
  chosen: defilement
  alternatives:
  - filth
  - stain
  lexicon: LSJ
  rationale: Conveys moral impurity in a scriptural register without sounding merely physical.
- source_word: πιστὸς ἐν ὅλῳ τῷ οἴκῳ αὐτοῦ
  chosen: faithful in all his house
  alternatives:
  - faithful in his whole household
  lexicon: BDAG
  rationale: Retains the familiar scriptural phrasing from Num 12:7 / Heb 3:2 and preserves ecclesial resonance.
- source_word: ὑπηρεσίας
  chosen: service
  alternatives:
  - ministry
  - assistance
  lexicon: BDAG
  rationale: Broad enough to cover Moses' commissioned agency without importing later technical church-office language.
- source_word: ἐκρίνεν
  chosen: judged
  alternatives:
  - punished
  - condemned
  lexicon: BDAG
  rationale: Preserves the theological framing of God's acts against Egypt as judgment.
- source_word: μαστίγων καὶ τῶν αἰκισμάτων
  chosen: plagues and torments
  alternatives:
  - scourges and afflictions
  - lashes and tortures
  lexicon: LSJ
  rationale: Reflects the paired terms for punitive blows and sufferings in a way that fits the Exodus context.
- source_word: οὐκ ἐμεγαλοφρόνησεν
  chosen: did not become high-minded
  alternatives:
  - did not grow proud
  - was not arrogant
  lexicon: BDAG
  rationale: Keeps the contrast with humility explicit and somewhat elevated, matching Clement's moral rhetoric.
- source_word: ἐπὶ τῆς βάτου χρηματισμοῦ αὐτῷ δεδομένου
  chosen: when an oracle was given to him at the bush
  alternatives:
  - when he received a divine message at the bush
  - at the bush when he was addressed
  lexicon: BDAG
  rationale: χρηματισμός carries divine communication; 'oracle' preserves that solemnity, though not in a pagan sense.
- source_word: ἰσχνόφωνος
  chosen: weak-voiced
  alternatives:
  - faint-voiced
  - poor of speech
  lexicon: LSJ
  rationale: A literal but intelligible rendering that preserves the unusual self-deprecating expression.
- source_word: βραδύγλωσσος
  chosen: slow of tongue
  alternatives:
  - slow-tongued
  - slow in speech
  lexicon: LSJ
  rationale: Keeps the scriptural cadence of Moses' protest.
- source_word: ἀτμὶς ἀπὸ χύτρας
  chosen: vapor from a pot
  alternatives:
  - steam from a kettle
  - a mist from a pot
  lexicon: LSJ
  rationale: Preserves the vivid metaphor of frailty and insubstantiality with minimal interpretation.
theological_decisions:
- issue: Rendering Χριστοῦ in τὴν ἔλευσιν τοῦ Χριστοῦ
  chosen_reading: the coming of the Messiah
  alternative_readings:
  - the coming of Christ
  rationale: The term functions as a title here, not merely a name-like designation. Project policy prefers 'Messiah' where the titular sense is active, especially in prophetic context.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Sense of τοὺς μεμαρτυρημένους / ἐμαρτυρήθη
  chosen_reading: language of receiving testimony/being attested
  alternative_readings:
  - commended
  - approved
  rationale: The chapter repeatedly uses μαρτυρ- language to mark divine or scriptural commendation. Preserving that lexical network is preferable to smoothing each instance differently.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms, or documented exception.'
