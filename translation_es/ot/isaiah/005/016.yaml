translation:
  language: es
  text: Pero Yahvé de los ejércitos es exaltado en justicia[a], y el Dios Santo es mostrado santo[b] en rectitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en juicio». El hebreo מִשְׁפָּט puede denotar tanto justicia en principio como juicio judicial en acción.
    reason: lexical_alternative
  - marker: b
    text: O «es santificado» o «es mostrado santo». La idea es que la santidad de Dios se manifiesta o queda vindicada.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como transliteración reverente y transparente, siguiendo la decisión base de no sustituir el nombre por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de los ejércitos de los cielos
  lexicon: HALOT
  rationale: En español, «de los ejércitos» comunica de forma clara el título divino y mantiene la amplitud semántica del hebreo sin estrecharlo solo a lo militar humano.
- source_word: וַיִּגְבַּה
  english_pob_choice: is exalted
  chosen_spanish: será exaltado
  alternatives_spanish:
  - es exaltado
  - se exaltará
  lexicon: HALOT
  rationale: El hebreo expresa elevación/exaltación en un marco de vindicación judicial. El futuro en español mantiene el valor contextualmente prospectivo y solemne del enunciado profético sin añadir interpretación ajena.
- source_word: בַּמִּשְׁפָּט
  english_pob_choice: in justice
  chosen_spanish: en justicia
  alternatives_spanish:
  - en juicio
  - en el juicio
  lexicon: HALOT
  rationale: Se conserva la ambigüedad controlada del término hebreo entre justicia y acto judicial. «En justicia» permite abarcar el sentido moral y forense que el contexto exige.
- source_word: וְהָאֵל הַקָּדוֹשׁ
  english_pob_choice: the Holy God
  chosen_spanish: el Dios Santo
  alternatives_spanish:
  - el Santo Dios
  - Dios, el Santo
  lexicon: HALOT
  rationale: En español, «el Dios Santo» preserva de modo natural el valor titular y atributivo de אֵל הַקָּדוֹשׁ, sin perder la cualidad de santidad destacada por Isaías.
- source_word: נִקְדָּשׁ
  english_pob_choice: is shown holy
  chosen_spanish: será mostrado santo
  alternatives_spanish:
  - será santificado
  - será vindicado como santo
  lexicon: HALOT
  rationale: Se evita «ser santificado» como formulación principal porque en español puede sugerir una acción cultual o que Dios llegue a ser santo. «Ser mostrado santo» refleja mejor la manifestación pública de su santidad en el contexto de juicio.
- source_word: בִּצְדָקָה
  english_pob_choice: in righteousness
  chosen_spanish: en rectitud
  alternatives_spanish:
  - en justicia
  - en justicia recta
  lexicon: HALOT
  rationale: Se usa «rectitud» para distinguir este término de מִשְׁפָּט y conservar la pareja semántica del versículo. En español, «rectitud» comunica bien la integridad moral y la conformidad correcta con el carácter divino.
theological_decisions:
- issue: Cómo expresar נִקְדָּשׁ sin implicar cambio en la santidad divina
  english_pob_reading: is shown holy
  chosen_spanish_reading: será mostrado santo
  alternative_spanish_readings:
  - será santificado
  - será hecho santo
  rationale: La forma pasiva del hebreo señala manifestación o vindicación pública de la santidad divina, no adquisición de santidad. «Será mostrado santo» conserva ese valor sin sugerir pasividad ontológica indebida.
  doctrine_reference: Translation philosophy §1, §3
- issue: Mantener la distinción entre מִשְׁפָּט y צְדָקָה
  english_pob_reading: justice ... righteousness
  chosen_spanish_reading: justicia ... rectitud
  alternative_spanish_readings:
  - juicio ... justicia
  - justicia ... justicia
  rationale: 'Isaías usa dos términos relacionados pero no idénticos. Traducirlos con palabras distintas preserva la textura poética y la progresión teológica: la exaltación de Yahvé aparece en el ámbito de la justicia, y la santidad del Dios Santo se manifiesta en rectitud.'
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: El texto sigue de cerca la revisión inglesa más reciente, que prefirió una formulación pasiva para נִקְדָּשׁ («is shown holy») frente a una activa más interpretativa. La versión española adopta esa misma cautela semántica con «será mostrado santo», manteniendo también la distinción entre מִשְׁפָּט y צְדָקָה.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el nombre divino, en coherencia con el proyecto.
  - Se usa «Dios Santo» para reflejar el título de Isaías con registro natural en español.
  - Se diferencia «justicia» de «rectitud» para no nivelar los dos miembros paralelos del versículo.
  - Las notas [a] y [b] están ancladas en los dos puntos de decisión lexical más sensibles del hebreo.
