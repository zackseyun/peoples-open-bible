revisions:
- from: Nuestra casa santa y hermosa[a], donde nuestros padres te alabaron, se ha convertido en una quemadura con fuego, y todas nuestras cosas preciosas se han vuelto una ruina.
  to: Nuestra casa santa y hermosa, donde nuestros padres[b] te alabaron, ha venido a ser pasto del fuego[a], y todas nuestras cosas preciosas se han vuelto una ruina.
  rationale: Se reemplaza 'una quemadura con fuego' por 'ha venido a ser pasto del fuego' para expresar la devastación del templo en un español natural y solemne, preservando el peso nominal y el efecto fuerte del hebreo sin producir una imagen equívoca. Se reubica la nota alternativa al lugar correcto y se añade la nota sobre 'padres/antepasados' para reflejar el audit trail inglés.
  reviewer_model: gpt-5.4
