base_translation:
  language: en
  yaml_path: translation/ot/joshua/015/011.yaml
  text: Then the border went out to the shoulder of Ekron northward[a], and the border bent toward Shikkeron, and passed over Mount Baalah, and went out to Jabneel[c][b]; and the ends of the border were at the sea.
  footnotes:
