translation:
  language: es
  text: Por eso, sus amigos y guardaespaldas, al ver la aguda aflicción[a] que le había sobrevenido, se apresuraron a poner las cosas en orden[b], temiendo que aun su vida llegara a faltar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la aguda aflicción que se había apoderado de él'. El griego describe una condición repentina y severa sin precisar su naturaleza exacta.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'temiendo que aun la vida / el vivir faltara'. Es decir, temían que muriera.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅθεν
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: LSJ
  rationale: Expresa con naturalidad la conclusión inferida del contexto previo y conserva el valor causal/consecutivo del griego.
- source_word: φίλοι
  english_pob_choice: friends
  chosen_spanish: amigos
  alternatives_spanish:
  - compañeros
  - cortesanos
  lexicon: LSJ
  rationale: El sentido básico es 'amigos'; no hay necesidad de introducir 'cortesanos' sin apoyo directo en el texto.
- source_word: σωματοφύλακες
  english_pob_choice: bodyguards
  chosen_spanish: guardias personales
  alternatives_spanish:
  - guardias
  - escoltas
  lexicon: LSJ
  rationale: Conserva la función de protección corporal/personal y resulta idiomático en español sin perder la referencia concreta.
- source_word: ὀξεῖαν ... εὔθυναν
  english_pob_choice: the acute distress
  chosen_spanish: la aguda aflicción
  alternatives_spanish:
  - la aflicción aguda
  - la grave aflicción
  lexicon: LSJ
  rationale: '''ὀξεῖαν'' comunica intensidad súbita o severa; ''aflicción'' evita una lectura médica demasiado específica y sigue el alcance del griego y del audit trail inglés.'
- source_word: καταλαβοῦσαν αὐτὸν
  english_pob_choice: that had come upon him
  chosen_spanish: que le había sobrevenido
  alternatives_spanish:
  - que lo había asaltado
  - que lo había alcanzado
  lexicon: LSJ
  rationale: '''Sobrevenir'' expresa bien la idea de una condición repentina que llega sobre alguien, sin endurecerla a un matiz más violento que el contexto no exige.'
- source_word: εὔθυναν
  english_pob_choice: hurried to set matters straight
  chosen_spanish: se apresuraron a poner las cosas en orden
  alternatives_spanish:
  - se apresuraron a corregir la situación
  - tomaron medidas para remediarlo
  lexicon: LSJ
  rationale: El verbo puede significar corregir, enderezar o poner en orden. En este contexto transmite la reacción urgente de los acompañantes ante la crisis del rey.
- source_word: φοβούμενοι
  english_pob_choice: fearing
  chosen_spanish: temiendo
  alternatives_spanish:
  - con temor de
  - por temor a
  lexicon: LSJ
  rationale: Equivale de forma directa al participio y conserva la motivación de la acción.
- source_word: μὴ καὶ τὸ ζῆν ἐκλείπῃ
  english_pob_choice: that even his life might fail
  chosen_spanish: que aun su vida llegara a faltar
  alternatives_spanish:
  - que incluso su vida pudiera extinguirse
  - que aun llegara a morir
  lexicon: LSJ
  rationale: Mantiene la imagen del griego, donde 'el vivir/la vida' es lo que falla o cesa, sin reducirlo demasiado pronto a 'morir'. Loza naturalidad española con esa misma tensión semántica.
translation_notes:
  revision_awareness: La redacción toma en cuenta la revisión inglesa reciente que prefirió 'acute distress' sobre 'sharp distress' y simplificó la clausula final para reflejar más directamente el griego. En español se preserva esa naturalidad formal con 'aguda aflicción' y se mantiene la imagen del vivir que 'falta' en vez de explicitar prematuramente 'morir'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - '''Mesías/Cristo'' no interviene en este versículo.'
  - Se evita 'siervo' porque σωματοφύλακες no designa servicio general sino custodia personal.
  - La construcción final conserva la tensión del griego entre vida y cese, sin añadir interpretación doctrinal.
