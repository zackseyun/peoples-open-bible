    text: 'O: «hizo que la tormenta quedara en calma». El hebreo expresa literalmente causar que la tormenta llegue a quietud o silencio.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «sus olas». El sufijo puede entenderse como referido a los que iban en la barca («sus olas») o al mar/las aguas («sus olas», es decir, las de este).
    reason: lexical_alternative
