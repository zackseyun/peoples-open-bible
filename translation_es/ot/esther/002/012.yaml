    rationale: La auditoría inglesa conserva explícitamente la alternativa «ley/costumbre/regulación establecida». El español debería preservar esa flexibilidad semántica con nota al lector.
  - severity: medium
    issue: «Entrar a ver al rey» debilita la formulación fuente
    rationale: לָבוֹא אֶל־הַמֶּלֶךְ es más exactamente «entrar adonde el rey» o «presentarse ante el rey». «A ver» introduce una matización más coloquial y menos cercana al acceso cortesano del hebreo.
