translation:
  language: es
  text: Cuando su escudero[a] vio que Saúl estaba muerto, también él cayó sobre la espada[b] y murió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, ‘el que llevaba sus armas’.
    reason: lexical_alternative
  - marker: b
    text: La expresión ‘cayó sobre la espada’ es un modismo para quitarse la vida con una espada.
    reason: cultural_note
lexical_decisions:
- source_word: נֹשֵׂא כֵלָיו
  english_pob_choice: his armor-bearer
  chosen_spanish: su escudero
  alternatives_spanish:
  - el que llevaba sus armas
  - su portador de armas
  lexicon: HALOT
  rationale: El hebreo significa literalmente ‘el portador de sus armas/equipo’. En español, ‘escudero’ comunica de forma natural y fiel la función militar del personaje; ‘portador de armas’ suena demasiado técnico o forzado, y ‘el que llevaba sus armas’ conserva el sentido pero pierde la designación de oficio/rol.
- source_word: כִּי מֵת שָׁאוּל
  english_pob_choice: that Saul was dead
  chosen_spanish: que Saúl estaba muerto
  alternatives_spanish:
  - que Saúl había muerto
  - que Saúl ya estaba muerto
  lexicon: HALOT
  rationale: Después de ‘vio’, el hebreo introduce el contenido percibido. En español, ‘que Saúl estaba muerto’ refleja bien el estado observado; ‘había muerto’ enfatiza anterioridad verbal, pero aquí el foco está en la condición resultante.
- source_word: וַיִּפֹּל גַּם הוּא
  english_pob_choice: he too fell
  chosen_spanish: también él se dejó caer
  alternatives_spanish:
  - también él cayó
  - él también cayó
  lexicon: HALOT
  rationale: El verbo ‘caer’ es literal, pero en este contexto español necesita hacer explícita la acción suicida sin perder la imagen hebrea. ‘Se dejó caer’ conserva la idea de caída sobre la espada y comunica con claridad la intención del gesto.
- source_word: עַל הַחֶרֶב
  english_pob_choice: on the sword
  chosen_spanish: sobre la espada
  alternatives_spanish:
  - en la espada
  - contra la espada
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática del hebreo. ‘Sobre la espada’ es la forma más natural en español para el acto de arrojarse o caer sobre un arma; ‘en la espada’ resulta menos idiomático.
- source_word: וַיָּמֹת
  english_pob_choice: and died
  chosen_spanish: y murió
  alternatives_spanish:
  - y murió así
  - y falleció
  lexicon: HALOT
  rationale: Renderización directa y sobria del cierre narrativo. ‘Murió’ preserva la brevedad del hebreo; ‘falleció’ suaviza indebidamente el registro y ‘y murió así’ añade información no explícita.
theological_decisions:
- issue: La frase ‘cayó sobre la espada’ es un modismo narrativo que describe suicidio, no una simple caída accidental.
  english_pob_reading: The phrase 'fell on the sword' is an idiom for killing oneself with a sword.
  chosen_spanish_reading: ‘Se dejó caer sobre la espada’ mantiene el modismo y deja claro el sentido suicida por el contexto.
  alternative_spanish_readings:
  - ‘cayó sobre la espada’
  - ‘se arrojó sobre la espada’
  rationale: En español, una traducción demasiado literal puede sonar ambigua. ‘Se dejó caer’ conserva la imagen del hebreo y, junto con el contexto inmediato, comunica la acción mortal sin introducir una interpretación más fuerte que el texto base exige.
  doctrine_reference: 'Narrativa histórica: uso idiomático sin implicaciones doctrinales adicionales.'
translation_notes:
  revision_awareness: Se siguió el sentido del texto hebreo y se mantuvo la equivalencia óptima del registro narrativo; no se requieren revisiones respecto del contexto auditado en inglés.
  spanish_consistency_notes:
  - Se usa ‘Saúl’ para el nombre propio y ‘espada’ para הַחֶרֶב, manteniendo el referente concreto del arma.
  - ‘Escudero’ se eligió como equivalente funcional en español para נֹשֵׂא כֵלָיו, sin perder la alternativa literal documentada.
  - Se preserva la secuencia narrativa breve del hebreo con verbos simples y directos.
