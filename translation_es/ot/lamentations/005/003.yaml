translation:
  language: es
  text: Hemos quedado huérfanos[a], sin padre; nuestras madres son como viudas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'huérfanos de padre'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְתוֹמִים
  english_pob_choice: orphans
  chosen_spanish: huérfanos
  alternatives_spanish:
  - sin padre
  - padreless
  lexicon: HALOT
  rationale: El sustantivo describe a quienes han quedado privados de protección parental. 'Huérfanos' es la opción natural en español y conserva el sentido relacional de pérdida; 'sin padre' sería más literal pero menos idiomático como sustantivo principal.
- source_word: הָיִינוּ
  english_pob_choice: have become
  chosen_spanish: nos hemos vuelto
  alternatives_spanish:
  - éramos
  - hemos sido
  lexicon: HALOT
  rationale: El qatal de היה en este lamento expresa un estado resultante de una calamidad. 'Nos hemos vuelto' comunica mejor el paso a esta condición que un simple pasado descriptivo.
- source_word: אֵין אָב
  english_pob_choice: without a father
  chosen_spanish: sin padre
  alternatives_spanish:
  - no hay padre
  - padreless
  lexicon: HALOT
  rationale: La negación existencial con sustantivo se vierte con naturalidad en español como 'sin padre', manteniendo la pérdida paterna enfatizada por el hebreo.
- source_word: אִמֹּתֵינוּ
  english_pob_choice: our mothers
  chosen_spanish: nuestras madres
  lexicon: HALOT
  rationale: 'Es un posesivo plural directo y no presenta dificultad semántica: ''nuestras madres''.'
- source_word: כְּאַלְמָנוֹת
  english_pob_choice: like widows
  chosen_spanish: como viudas
  alternatives_spanish:
  - cual viudas
  - en condición de viudas
  lexicon: HALOT
  rationale: El prefijo comparativo כ exige mantener la comparación. 'Como viudas' conserva la figura sin convertirla en una afirmación literal más fuerte de lo que el hebreo dice.
theological_decisions:
- issue: Fuerza de la comparación en el cierre
  english_pob_reading: our mothers are like widows
  chosen_spanish_reading: nuestras madres son como viudas
  alternative_spanish_readings:
  - nuestras madres son viudas
  rationale: Se preserva la partícula comparativa del hebreo para no intensificar indebidamente el enunciado. El lamento apunta a la vulnerabilidad y abandono social, no necesariamente a la muerte literal de todos los esposos.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El pasaje mantiene alta concordancia con el paquete fuente: se conservó el valor aspectual resultativo de הָיִינוּ, la negación existencial de אֵין אָב y la comparación explícita de כְּאַלְמָנוֹת. No se registraron revisiones posteriores que requirieran ajuste.'
  spanish_consistency_notes:
  - Se usa 'huérfanos' en plural masculino genérico para reflejar el plural hebreo.
  - Se evitó 'SEÑOR' o sustituciones teológicas no pertinentes; no aparecen nombres divinos en este versículo.
  - Se mantuvo un registro sobrio y bíblico en español sin arcaísmos innecesarios.
