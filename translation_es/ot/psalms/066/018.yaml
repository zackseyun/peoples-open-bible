  - severity: low
    issue: El pronombre «yo» es innecesariamente enfático
    rationale: El hebreo no requiere un énfasis especial aquí, y en español la forma verbal ya expresa la primera persona. Quitar «yo» mejora la fluidez sin perder sentido.
