    text: 'Hebreo: «como ayer y el tercer día», un modismo que significa «como antes» o «como anteriormente».'
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota para que corresponda al modismo hebreo final. Se mejoró la naturalidad de «desde en medio» a «de en medio». Se reemplazó «se alzaron hasta la tierra seca» por «fueron levantadas a tierra seca» para reflejar mejor נִתְּקוּ en una construcción más idiomática. Se cambió «siguieron» por «corrieron» para expresar con más claridad la reanudación del curso de las aguas, manteniendo el sentido del hebreo en español natural.
