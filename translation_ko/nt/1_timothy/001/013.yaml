id: 1TI.1.13
reference: 1 Timothy 1:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀τὸ πρότερον ὄντα βλάσφημον καὶ διώκτην καὶ ὑβριστήν· ἀλλὰ ἠλεήθην, ὅτι ἀγνοῶν ἐποίησα ἐν ἀπιστίᾳ,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/001/013.yaml
  text: formerly a blasphemer and a persecutor and a violent man[a]; but I was shown mercy, because I acted ignorantly in unbelief[d][c][b],
  footnotes:
  - marker: a
    text: Or 'an insolent man' or 'a brutal man.' The Greek term denotes abusive, outrageously violent behavior, not merely pride.
    reason: lexical_alternative
  - marker: b
    text: Or 'I received mercy.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in ignorance' or 'being ignorant.'
    reason: lexical_alternative
  - marker: d
    text: Or 'in faithlessness.' Here the sense is most likely lack of faith rather than covenantal unfaithfulness.
    reason: lexical_alternative
translation:
  language: ko
  text: 나는 전에는 모독하는 자요 박해하는 자요 폭력적인 자[a]였습니다. 그러나 자비를 입었습니다[b]. 내가 믿지 않을 때 알지 못하고[c] 행한 까닭입니다[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「오만한 자」 「잔혹한 자」. 헬라어 ὑβριστής는 단순한 교만이 아니라 학대·폭력적 행위자를 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「긍휼히 여김을 받았습니다」.
    reason: lexical_alternative
  - marker: c
    text: 또는 「무지함 가운데」 「알지 못한 채로」.
    reason: lexical_alternative
  - marker: d
    text: 또는 「불신앙 가운데」. 본문은 언약적 불성실보다는 신앙의 결여를 가리키는 것으로 보인다.
    reason: lexical_alternative
lexical_decisions:
- source_word: βλάσφημον
  english_pob_choice: a blasphemer
  chosen_korean: 모독하는 자
  alternatives_korean:
  - 신성 모독자
  - 비방하는 자
  lexicon: BDAG
  rationale: 신성·거룩한 것에 대한 모독의 어감. 「모독하는 자」가 자연스럽고 일관된다.
- source_word: διώκτην
  english_pob_choice: a persecutor
  chosen_korean: 박해하는 자
  alternatives_korean:
  - 핍박하는 자
  lexicon: BDAG
  rationale: 한국 교회 정립 어휘 「박해」.
- source_word: ὑβριστήν
  english_pob_choice: a violent man
  chosen_korean: 폭력적인 자
  alternatives_korean:
  - 오만한 자
  - 잔혹한 자
  - 학대하는 자
  lexicon: BDAG
  rationale: 단순한 교만이 아니라 학대·폭력 행위. 영어 POB「violent man」을 따라 「폭력적인 자」로 옮긴다.
- source_word: ἠλεήθην
  english_pob_choice: I was shown mercy
  chosen_korean: 자비를 입었습니다
  alternatives_korean:
  - 긍휼히 여김을 받았습니다
  - 자비를 받았습니다
  lexicon: BDAG
  rationale: 2절 ἔλεος를 「자비」로 옮긴 일관성에 맞춰 「자비를 입었습니다」로 옮긴다.
- source_word: ἀγνοῶν ἐποίησα
  english_pob_choice: I acted ignorantly
  chosen_korean: 알지 못하고 행한
  alternatives_korean:
  - 무지하게 행한
  - 모르고 한
  lexicon: BDAG
  rationale: 분사 + 동사 구조를 「알지 못하고 행한」으로 자연스럽게 옮긴다.
- source_word: ἐν ἀπιστίᾳ
  english_pob_choice: in unbelief
  chosen_korean: 믿지 않을 때
  alternatives_korean:
  - 불신앙 가운데
  - 믿음 없이
  lexicon: BDAG
  rationale: ἀπιστία는 신앙의 결여. 한국어로 「믿지 않을 때」가 자연스럽다.
