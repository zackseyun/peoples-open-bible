translation:
  language: es
  text: Acerca la tribu de Leví[a], y colócala delante de Aarón, el sacerdote; y ellos le servirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "ministrarle". El verbo hebreo puede denotar servicio de asistente o servicio litúrgico.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְרֵב
  english_pob_choice: Bring near
  chosen_spanish: Haz que se acerque
  alternatives_spanish:
  - Acerca
  - Trae cerca
  - Presenta
  lexicon: HALOT
  rationale: El verbo hebreo en hifil expresa causar que algo se acerque. En español, "haz que se acerque" conserva el valor causativo y el matiz cultual sin sonar demasiado rígido.
- source_word: מַטֵּה לֵוִי
  english_pob_choice: the tribe of Levi
  chosen_spanish: la tribu de Leví
  alternatives_spanish:
  - el bastón de Leví
  - el clan de Leví
  lexicon: HALOT
  rationale: En contexto tribal, מַטֵּה no es "bastón" sino "tribu". "Leví" mantiene el nombre propio bíblico usual en español y la referencia colectiva.
- source_word: וְהַעֲמַדְתָּ אֹתוֹ
  english_pob_choice: and set it
  chosen_spanish: y colócala
  alternatives_spanish:
  - y ponla
  - y establécela
  - y sitúala
  lexicon: HALOT
  rationale: El hifil de עמד tiene la idea de hacer estar de pie / colocar / situar. "Colócala" suena natural en español y conserva el sentido de poner ante alguien en una presentación formal.
- source_word: לִפְנֵי אַהֲרֹן הַכֹּהֵן
  english_pob_choice: before Aaron the priest
  chosen_spanish: delante de Aarón, el sacerdote
  alternatives_spanish:
  - en presencia de Aarón, el sacerdote
  - ante Aarón, el sacerdote
  lexicon: HALOT
  rationale: '"Delante de" transmite bien לִפְנֵי con una imagen espacial directa. Se mantiene el título "el sacerdote" como designación funcional sin sustituirlo por formulaciones más eclesiásticas.'
- source_word: וְשֵׁרְתוּ אֹתוֹ
  english_pob_choice: and they shall serve him
  chosen_spanish: y ellos le servirán
  alternatives_spanish:
  - y le ministrarán
  - y le prestarán servicio
  lexicon: HALOT
  rationale: שׁרת denota servicio atento o ministerial. "Servirán" conserva la amplitud semántica sin imponer la terminología litúrgica más técnica de "ministrar".
theological_decisions:
- issue: Objeto del servicio levítico
  english_pob_reading: The Levites are presented before Aaron in order to serve him in his priestly role.
  chosen_spanish_reading: Los levitas son presentados delante de Aarón para servirle en su función sacerdotal.
  alternative_spanish_readings:
  - Los levitas sirven con él, no a él
  - Los levitas realizan un servicio general
  rationale: 'El pronombre hebreo exige un objeto directo: el servicio se dirige a Aarón. La traducción española conserva esa relación y evita diluirla en una lectura más general.'
  doctrine_reference: Éxodo 28–29; Números 3
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado en inglés sin traducir mecánicamente: se preservó el valor causativo de הַקְרֵב, el sentido tribal de מַטֵּה לֵוִי y el objeto directo de שֵׁרְתוּ אֹתוֹ. No hubo revisiones posteriores que alteraran la decisión de base.'
  spanish_consistency_notes:
  - Se usó "Leví" para el nombre propio y "Aarón, el sacerdote" para reproducir el título funcional del texto fuente.
  - Se mantuvo el pronombre singular para la tribu en "colócala", y el plural en "ellos le servirán" conforme al cambio colectivo-plural del hebreo.
  - Se evitó "SEÑOR" o formulaciones eclesiásticas no necesarias, porque este versículo no contiene el nombre divino ni requiere tecnicismo litúrgico adicional.
