  text: 'Entonces Zofar, el naamatita, respondió y dijo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: El hebreo formulaico וַיַּעַן en introducciones de discurso puede traducirse como 'respondió' o 'contestó'. En español, 'respondió' conserva el valor dialogal sin sonar forzado y refleja bien la transición a su intervención.
- source_word: צֹפַר
  english_pob_choice: Zophar
  chosen_spanish: Zofar
  alternatives_spanish:
  - Zophar
  lexicon: convención transliteratoria española
  rationale: El nombre propio se translitera al español como 'Zofar', ajustando la ortografía a la fonética española y manteniendo la identificación inequívoca del personaje.
- source_word: הַנַּעֲמָתִי
  english_pob_choice: the Naamathite
  chosen_spanish: el naamatita
  alternatives_spanish:
  - el de Naama
  - el naamatita
  lexicon: HALOT
  rationale: El gentilicio hebreo identifica el origen o asociación de Zofar. 'Naamatita' reproduce esa relación en español de manera natural y directa, equivalente funcional de 'the Naamathite'.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  - diciendo
  lexicon: HALOT
  rationale: En la fórmula narrativa hebrea, אמר suele traducirse 'dijo'. Conservar 'respondió y dijo' reproduce la secuencia estilística del original sin necesidad de una traducción más literal pero menos natural.
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés muestran acuerdo alto y ninguna revisión aplicada; por ello no se introducen variantes textuales ni notas de tensión lexical. Se conserva la fórmula narrativa completa con una equivalencia natural en español.
  spanish_consistency_notes:
  - Se usa 'Zofar' como transliteración española estable del nombre propio.
  - Se mantiene 'naamatita' para el gentilicio, evitando paráfrasis geográfica.
  - La fórmula verbal conserva dos verbos narrativos ('respondió y dijo') como en el hebreo y en la POB inglesa.
