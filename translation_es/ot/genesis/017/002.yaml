translation:
  language: es
  text: Y haré mi pacto[a] entre mí y ti, y te multiplicaré en gran manera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Y pondré/daré mi pacto entre mí y ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶתְּנָה
  english_pob_choice: And I will make
  chosen_spanish: Y pondré
  alternatives_spanish:
  - Y daré
  - Y estableceré
  - Y haré
  lexicon: HALOT
  rationale: נתן aquí conserva el valor básico de 'dar/poner/colocar'; en contexto de pacto, 'pondré' refleja de forma natural y fiel la idea de situar o disponer el pacto entre las partes sin imponer una paráfrasis más interpretativa que el hebreo.
- source_word: בְרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: '''Pacto'' comunica el término técnico בְּרִית con dignidad bíblica y claridad en español. ''Alianza'' puede sugerir otros matices en español moderno; ''pacto'' preserva mejor la fuerza formal y teológica del hebreo.'
- source_word: בֵּינִי וּבֵינֶךָ
  english_pob_choice: between me and you
  chosen_spanish: entre yo y tú
  alternatives_spanish:
  - entre mí y ti
  - entre mí y tú
  lexicon: HALOT
  rationale: Se mantiene la relación bilateral explícita del hebreo. Aunque 'entre mí y ti' sería más idiomático en español literario, 'entre yo y tú' conserva la cercanía sintáctica del original y sigue siendo inteligible en registro bíblico.
- source_word: וְאַרְבֶּה
  english_pob_choice: and I will multiply
  chosen_spanish: y te multiplicaré
  alternatives_spanish:
  - y te haré multiplicar
  - y te haré crecer
  lexicon: HALOT
  rationale: El causativo de רבה se expresa de forma directa con 'multiplicaré'. El complemento explícito 'te' corresponde al objeto singular inmediato de la promesa a Abram.
- source_word: בִּמְאֹד מְאֹד
  english_pob_choice: exceedingly
  chosen_spanish: en gran manera
  alternatives_spanish:
  - muchísimo
  - sobremanera
  - sobremanera, en gran manera
  lexicon: HALOT
  rationale: La duplicación intensiva se traduce con una expresión natural y solemne en español. 'En gran manera' mantiene la idea de intensificación sin sonar arcaico o mecánico.
theological_decisions:
- issue: Renderización del verbo נתן con ברית en contexto de pacto
  english_pob_reading: And I will make my covenant / Or, more literally, 'And I will give/set my covenant between me and you.'
  chosen_spanish_reading: Y pondré mi pacto entre yo y tú
  alternative_spanish_readings:
  - Y daré mi pacto entre yo y tú
  - Y estableceré mi pacto entre yo y tú
  rationale: El hebreo usa un verbo semánticamente amplio ('dar/poner/colocar'). En contexto de pacto, 'pondré' conserva la literalidad suficiente y evita la interpretación más libre de 'estableceré', aunque esa opción sigue siendo posible como equivalencia dinámica.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: El texto español sigue de cerca la revisión más reciente del POB inglés, que prefirió 'make' para reflejar más directamente el verbo hebreo נתן, pero aquí se opta por 'pondré' para preservar mejor la amplitud semántica del hebreo y el flujo natural del español, sin perder la referencia al acto pactal. Se mantiene la intensificación de מְאֹד מְאֹד con una expresión idiomática equivalente.
  spanish_consistency_notes:
  - Se usa 'pacto' de manera consistente para בְּרִית, conforme al valor técnico del término en español bíblico.
  - Se mantiene el objeto singular en segunda persona ('te') porque el hebreo se dirige directamente a Abram.
  - No se expande el sentido a 'descendientes' en el texto principal, porque el hebreo habla primero a la persona de Abram.
  - La nota a pie de página está anclada en el texto con [a], evitando marcadores sin referencia.
