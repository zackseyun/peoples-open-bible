revisions:
- from: y un macho cabrío de las cabras[a], para expiación por ustedes—
  to: y un macho cabrío, como ofrenda por el pecado, para hacer expiación[a] por ustedes—
  rationale: 'Se restituye la distinción léxica del hebreo: חַטָּאת = «ofrenda por el pecado» y לְכַפֵּר = «para hacer expiación». Se elimina el calco poco natural «de las cabras». «Un macho cabrío» conserva adecuadamente el animal sacrificial; el numeral de אֶחָד queda suficientemente representado por «un» en español dentro de la enumeración, sin la torpeza de «uno» pospuesto. La nota se conserva solo para la alternativa relacionada con כפר, no para reemplazar la ofrenda misma.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:32:44Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva parcialmente el sentido, pero no refleja con suficiente fidelidad dos elementos clave del hebreo: אֶחָד debe quedar explícito como «uno», y חַטָּאת en este contexto cultual nombra la ofrenda por el pecado, no simplemente «expiación». Además, «macho cabrío de las cabras» suena innecesariamente literalizante en español.'
  spanish_quality_summary: El español es comprensible, pero «un macho cabrío de las cabras, para expiación por ustedes» resulta poco natural y difumina la estructura sacrificial. Una formulación más clara y fiel es «y un macho cabrío como ofrenda por el pecado, para hacer expiación por ustedes—».
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto, pero sí con la racionalidad léxica auditada: חַטָּאת debe mantenerse como categoría sacrificial («ofrenda por el pecado») y כפר como la acción resultante («hacer expiación»). La nota alternativa debe corresponder a una alternativa real del texto principal; aquí conviene anclarla en «expiación».'
  issues:
  - severity: high
    issue: חַטָּאת fue traducido como «para expiación»
    rationale: En este contexto sacerdotal חַטָּאת designa la ofrenda por el pecado, no la acción de expiar. El borrador fusiona indebidamente חַטָּאת con לְכַפֵּר y pierde una distinción cultual importante del hebreo y del POB inglés.
  - severity: medium
    issue: אֶחָד no queda suficientemente explícito
    rationale: Aunque «un» puede sonar natural, aquí la serie sacrificial enumerativa favorece conservar el numeral claramente como «uno» o mediante una estructura que no lo diluya. El inglés auditado lo preserva de forma explícita.
  - severity: medium
    issue: «de las cabras» es una reproducción poco natural del constructo עִזִּים
    rationale: En español «macho cabrío» ya comunica adecuadamente el sentido de שְׂעִיר עִזִּים. Añadir «de las cabras» no aporta significado útil y degrada la legibilidad.
  - severity: low
    issue: La nota al pie no corresponde bien con el punto léxico más útil en español
    rationale: Si el texto principal dice «para hacer expiación», la alternativa natural es «o, para hacer expiación por ustedes / o, para hacer atonement», pero el principal debe primero restaurar «ofrenda por el pecado». Conviene anclar la nota en «expiación» para reflejar la alternativa entre expiación y atonement.
  revised_spanish_text: y un macho cabrío, como ofrenda por el pecado, para hacer expiación[a] por ustedes—
  revised_footnotes:
  - marker: a
    text: O «para hacer expiación por ustedes». También puede expresarse «para hacer atonamiento por ustedes», pero «expiación» es más natural en español.
    reason: lexical_alternative
  revision_rationale: 'Se restituye la distinción léxica del hebreo: חַטָּאת = «ofrenda por el pecado» y לְכַפֵּר = «para hacer expiación». Se elimina el calco poco natural «de las cabras». «Un macho cabrío» conserva adecuadamente el animal sacrificial; el numeral de אֶחָד queda suficientemente representado por «un» en español dentro de la enumeración, sin la torpeza de «uno» pospuesto. La nota se conserva solo para la alternativa relacionada con כפר, no para reemplazar la ofrenda misma.'
