revisions:
- from: 'Y el pueblo que estaba acampado[a] oyó decir: «Zimri ha conspirado y también ha derribado al rey». Entonces todo Israel hizo rey sobre Israel a Omri, el comandante del ejército[b], aquel día en el campamento.'
