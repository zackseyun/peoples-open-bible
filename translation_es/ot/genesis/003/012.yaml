translation:
  language: es
  text: 'Y el hombre dijo[a]: «La mujer que tú me diste para estar conmigo, ella me dio del árbol, y comí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «del árbol»; no se añade «fruto» porque no aparece en el texto fuente, aunque el contexto lo sugiera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָדָם
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el ser humano
  - el humano
  lexicon: HALOT
  rationale: En este contexto el referente es el individuo masculino, Adán, no la humanidad en general. «El hombre» mantiene la referencia directa y la naturalidad narrativa del español.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: HALOT
  rationale: La forma hebrea permite «mujer» o, en algunos contextos, «esposa». Aquí el texto conserva mejor la designación inmediata y directa «la mujer».
- source_word: אֲשֶׁר נָתַתָּה עִמָּדִי
  english_pob_choice: whom you gave to be with me
  chosen_spanish: que tú me diste para estar conmigo
  alternatives_spanish:
  - que tú me diste conmigo
  - que tú pusiste conmigo
  lexicon: HALOT
  rationale: La construcción expresa a la mujer como la que Dios dio al hombre en compañía. «Para estar conmigo» comunica con naturalidad la relación de compañía de עִמָּדִי sin añadir un significado ajeno al hebreo.
- source_word: הִוא
  english_pob_choice: she
  chosen_spanish: ella
  alternatives_spanish:
  - esa misma
  - ella misma
  lexicon: HALOT
  rationale: El pronombre independiente es enfático en hebreo. En español se conserva con «ella» y la puntuación, sin volverlo innecesariamente redundante.
- source_word: נָֽתְנָה לִּ֥י
  english_pob_choice: gave me
  chosen_spanish: me dio
  alternatives_spanish:
  - me ha dado
  lexicon: HALOT
  rationale: El pasado simple funciona bien en la secuencia narrativa. «Me dio» reproduce la acción sin introducir matices aspectuales que no se exigen aquí.
- source_word: מִן הָעֵץ
  english_pob_choice: from the tree
  chosen_spanish: del árbol
  alternatives_spanish:
  - del árbol, y comí
  - del árbol
  lexicon: HALOT
  rationale: A diferencia del inglés, el hebreo no explicita «fruto»; por eso se evita añadirlo. «Del árbol» refleja fielmente la forma del original y mantiene la tensión interpretativa que el POB inglés también preservó en su revisión final.
- source_word: וָאֹכֵל
  english_pob_choice: and I ate
  chosen_spanish: y comí
  alternatives_spanish:
  - y comí de ello
  - así que comí
  lexicon: HALOT
  rationale: Se traduce con un pasado narrativo simple para conservar la secuencia del relato y no introducir inferencias adicionales.
theological_decisions:
- issue: Posible desplazamiento de culpa hacia Dios en la respuesta del hombre
  english_pob_reading: Retain the wording 'the woman whom you gave to be with me' without softening or intensifying it.
  chosen_spanish_reading: Mantener «la mujer que tú me diste para estar conmigo» sin atenuar ni amplificar la implicación.
  alternative_spanish_readings:
  - la mujer que me diste
  - la mujer que tú pusiste conmigo
  rationale: El hebreo conserva la respuesta del hombre tal como está, con su carga implícita de transferencia de culpa. La traducción no debe resolver esa tensión ni suavizarla, sino dejarla audible en español.
  doctrine_reference: 'Principio POB: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés: se evitó añadir «fruto» y se conservó el orden y la fuerza de la réplica del hombre, con una formulación española natural pero fiel al hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; aquí no aparece, por lo que no se introduce.
  - Se mantiene «mujer» y no «esposa» para conservar la referencia inmediata del hebreo.
  - Se preserva el pronombre enfático con «ella» y la puntuación, en lugar de sobretraducirlo con énfasis artificial.
