translation:
  language: es
  text: Después de esto, hubo guerra en Gezer con los filisteos. Entonces Sibecai el husatita abatió a Sippai[a], uno de los descendientes de los Refaim[b], y ellos fueron sometidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Safai» para el nombre traducido «Sippai».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los Refaim»; tradicionalmente también se traduce «los gigantes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי אַחֲרֵי כֵן
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Después
  - Y sucedió después de esto
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea se expresa con naturalidad en español como una transición temporal breve. «Después de esto» conserva el orden secuencial sin volverlo artificioso.
- source_word: וַתַּעֲמֹד מִלְחָמָה
  english_pob_choice: war arose
  chosen_spanish: se levantó la guerra
  alternatives_spanish:
  - hubo guerra
  - estalló la guerra
  - la guerra surgió
  lexicon: HALOT
  rationale: עמד con מלחמה en contexto narrativo marca la irrupción o aparición del conflicto. «Se levantó la guerra» mantiene esa fuerza verbal en español sin perder la imagen.
- source_word: בְּגֶזֶר
  english_pob_choice: at Gezer
  chosen_spanish: en Gezer
  alternatives_spanish:
  - en Gezer, la ciudad
  - en la región de Gezer
  lexicon: HALOT
  rationale: Para un lugar de batalla, el hebreo locativo se vierte de forma natural con «en». El nombre propio se mantiene transliterado.
- source_word: עִם פְּלִשְׁתִּים
  english_pob_choice: with the Philistines
  chosen_spanish: contra los filisteos
  alternatives_spanish:
  - con los filisteos
  lexicon: HALOT
  rationale: Aunque עִם literalmente es «con», en contexto bélico el sentido es hostil. En español, «contra» comunica mejor esa relación sin traicionar el valor contextual.
- source_word: הִכָּה
  english_pob_choice: struck down
  chosen_spanish: hirió
  alternatives_spanish:
  - derribó
  - mató
  - golpeó
  lexicon: HALOT
  rationale: El verbo נכה cubre golpear y abatir; en español «hirió» conserva el acto de asestar el golpe, aunque el contexto narrativo deja claro el resultado victorioso.
- source_word: סִבְּכַי הַחֻשָׁתִי
  english_pob_choice: Sibbecai the Hushathite
  chosen_spanish: Sibecai, el húsata
  alternatives_spanish:
  - Sibecai, el husatita
  - Sibbecai, el de Husa
  lexicon: HALOT
  rationale: Se translitera el nombre propio y se vierte el gentilicio con una forma natural en español. «Húsata» preserva el origen gentilicio sin sobrecargarlo con una forma más técnica o menos transparente.
- source_word: סִפַּי
  english_pob_choice: Sippai
  chosen_spanish: Sippai
  alternatives_spanish:
  - Safai
  lexicon: HALOT
  rationale: Se mantiene la transliteración principal del POB inglés; la alternativa tradicional se conserva en nota.
- source_word: מִילִדֵי הָרְפָאִים
  english_pob_choice: one of the descendants of the Rephaim
  chosen_spanish: uno de los descendientes de los refaítas
  alternatives_spanish:
  - uno de los hijos de los refaítas
  - uno de los descendientes de los Refaim
  - uno de los gigantes
  lexicon: HALOT
  rationale: ילידי indica descendencia/origen de nacimiento. «Refaítas» conserva el valor de clan o grupo étnico sin imponer la glosa interpretativa «gigantes», aunque esa lectura se mantiene disponible en la tradición.
- source_word: וַיִּכָּנֵעוּ
  english_pob_choice: they were subdued
  chosen_spanish: fueron sometidos
  alternatives_spanish:
  - quedaron sometidos
  - se rindieron
  - fueron humillados
  lexicon: HALOT
  rationale: El nifal de כנע en contexto militar expresa sometimiento/ser vencidos. «Fueron sometidos» refleja bien el resultado de la derrota sin añadir matices no requeridos.
theological_decisions:
- issue: Identidad y traducción de הָרְפָאִים
  english_pob_reading: the Rephaim; traditionally also rendered the giants
  chosen_spanish_reading: los refaítas
  alternative_spanish_readings:
  - los gigantes
  - los Refaím
  rationale: Se prefirió la transliteración etnónimica para no imponer una interpretación más fuerte que el hebreo. La lectura tradicional «gigantes» se conserva como alternativa posible en nota, no como texto principal.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: 'El texto inglés auditado muestra acuerdo alto y sin revisiones aplicadas; la redacción española sigue la lectura principal establecida, preservando en nota las dos alternativas léxicas relevantes: el nombre Sippai/Safai y el grupo Rephaim/gigantes.'
  spanish_consistency_notes:
  - Se mantuvo «Gezer» como topónimo transliterado sin adaptación.
  - Se eligió «filisteos» en minúscula por tratarse del etnónimo común en español.
  - Se usó «fue sometidos»? No; se corrigió a «fueron sometidos» para concordancia plural.
  - Se evitó «Cristo/SEÑOR» porque no aplica en este versículo.
