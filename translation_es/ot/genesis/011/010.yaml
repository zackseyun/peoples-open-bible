translation:
  language: es
  text: Estas son las generaciones de Sem. Sem tenía cien años, y engendró a Arpajshad[a] dos años después del diluvio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Arpajshad se traduce tradicionalmente como «Arfaxad» en algunas versiones en español, reflejando la forma griega más que la hebrea.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Esto es
  lexicon: HALOT
  rationale: El demostrativo plural introduce una fórmula genealógica en plural; en español, 'Estas son' mantiene la construcción natural y el valor de encabezado.
- source_word: תּוֹלְדֹת
  english_pob_choice: the generations of
  chosen_spanish: las generaciones de
  alternatives_spanish:
  - la descendencia de
  - la historia de
  - el linaje de
  lexicon: HALOT
  rationale: En Génesis, תּוֹלְדֹת funciona como fórmula estructural genealógica. 'Generaciones' conserva la correspondencia formal y el uso tradicional de la sección, sin perder el sentido de linaje/progenie.
- source_word: שֵׁם
  english_pob_choice: Shem
  chosen_spanish: Sem
  alternatives_spanish:
  - Shem
  lexicon: Nombre propio bíblico estándar en español
  rationale: Se usa la forma española establecida del nombre, que es más reconocible y natural para lectores bíblicos hispanohablantes.
- source_word: בֶּן מְאַת שָׁנָה
  english_pob_choice: was one hundred years old
  chosen_spanish: tenía cien años
  alternatives_spanish:
  - era de cien años
  - era un hijo de cien años
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática. En español, 'tenía cien años' expresa con naturalidad la edad sin forzar un calco literal.
- source_word: וַיּוֹלֶד
  english_pob_choice: he fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  lexicon: HALOT
  rationale: En genealogías, el verbo marca la relación de paternidad biológica/ genealógica. 'Engendró' conserva la fuerza lexical y el registro bíblico; se mantiene el objeto directo explícito en español.
- source_word: אֶת אַרְפַּכְשָׁד
  english_pob_choice: Arpachshad
  chosen_spanish: Arpajshad
  alternatives_spanish:
  - Arpaxad
  - Arfaxad
  lexicon: Transliteración directa del hebreo
  rationale: Se sigue la forma cercana al hebreo con 'j' para reflejar el fricativo gutural aproximado y evitar la tradicionalización por vía griega. Se conserva la identidad del nombre sin depender de la forma helenizada.
- source_word: שְׁנָתַיִם
  english_pob_choice: two years
  chosen_spanish: dos años
  alternatives_spanish:
  - por dos años
  lexicon: HALOT
  rationale: La forma dual se expresa de manera directa y natural en español como 'dos años'.
- source_word: אַחַר הַמַּבּוּל
  english_pob_choice: after the flood
  chosen_spanish: después del diluvio
  alternatives_spanish:
  - después del flood
  - tras el diluvio
  lexicon: HALOT
  rationale: '''Diluvio'' es el equivalente bíblico claro en español para el evento del arca de Noé. ''Después de'' mantiene la relación temporal exacta.'
translation_notes:
  revision_awareness: 'El texto sigue el paquete fuente hebreo (WLC) y concuerda con el audit trail inglés: mantiene la fórmula genealógica, el valor idiomático de la edad, el verbo genealógico de engendrar y la referencia temporal al diluvio. No se introdujeron revisiones adicionales porque el pass más reciente indicó alta concordancia y sin cambios.'
  spanish_consistency_notes:
  - Se conserva el patrón bíblico de fórmulas genealógicas con 'las generaciones de'.
  - Se prefirió 'Sem' como forma española establecida del nombre propio.
  - '''Engendró'' preserva la fuerza genealógica del hebreo וַיּוֹלֶד.'
  - Se evitó 'Arfaxad' o 'Arphaxad' para no desplazar la transliteración hebrea directa documentada por el audit trail.
  - '''Diluvio'' traduce el referente con claridad bíblica y naturalidad en español.'
