review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: negación gnómica, contraste entre cantidad/edad y verdadera sabiduría, y מִשְׁפָּט como discernimiento moral-jurídico. Sin embargo, ''los muchos'' suena poco idiomático en español y debilita la legibilidad sin aportar una ventaja clara de fidelidad frente a una formulación más natural.'
  spanish_quality_summary: 'La redacción actual es comprensible, pero algo rígida y repetitiva: ''No son los muchos los que son sabios'' resulta torpe en español. Una leve reestructuración mantiene el énfasis y mejora la fluidez: ''No son sabios los muchos...'' También conviene anclar la nota al término español que traduce מִשְׁפָּט, no a ''sabios''.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Ancianos' funciona aquí en sentido etario y no eclesiástico. 'Justicia' coincide con la decisión auditada para מִשְׁפָּט, con alternativas preservadas en nota.
  issues:
  - severity: medium
    issue: 'Expresión poco natural: ''los muchos'''
    rationale: Aunque intenta calcar 'the many', en español bíblico y general suena forzado. 'Los muchos' no añade precisión semántica suficiente y afecta la legibilidad. 'Muchos' conserva el valor sustantivado de רַבִּים en un español más natural.
  - severity: medium
    issue: 'Estructura demasiado pesada: ''No son los muchos los que son sabios'''
    rationale: La doble cópula y la construcción hendida producen un estilo madera. El hebreo expresa una máxima sencilla; 'No son sabios muchos...' o 'No son sabios los muchos...' transmite mejor el sentido gnómico en español.
  - severity: low
    issue: Anclaje de nota en palabra incorrecta
    rationale: La nota explica alternativas de מִשְׁפָּט, por lo que el marcador debe ir junto a 'justicia', no junto a 'sabios'.
  revised_spanish_text: No son sabios muchos, ni los ancianos entienden la justicia[a].
  revised_footnotes:
