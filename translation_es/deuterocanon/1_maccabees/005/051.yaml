translation:
  language: es
  text: Y exterminó a todos los varones[a] con el filo de la espada, y la arrancó de raíz[b], y tomó el botín de la ciudad, y pasó por la ciudad sobre los muertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en la boca de la espada», una locución que significa «con el filo de la espada».
    reason: lexical_alternative
  - marker: b
    text: 'También: «la desarraigó»; el verbo conserva la imagen de arrancar por las raíces.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπώλεσεν
  english_pob_choice: destroyed
  chosen_spanish: exterminó
  alternatives_spanish:
  - destruyó
  - aniquiló
  lexicon: LSJ
  rationale: En este contexto militar, el verbo expresa una destrucción letal y total. «Exterminó» conserva la fuerza de aniquilación del griego y evita suavizarlo a un simple «venció» o «derrotó».
- source_word: πᾶν ἀρσενικόν
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - todo varón masculino
  - todos los hombres
  lexicon: LSJ
  rationale: La frase es abarcadora y marcadamente de género. «Todo varón» preserva la dureza y el alcance del griego sin convertirlo en un término genérico que diluya la especificidad sexual.
- source_word: ἐν στόματι ῥομφαίας
  english_pob_choice: with the edge of the sword
  chosen_spanish: con el filo de la espada
  alternatives_spanish:
  - a filo de espada
  - con la boca de la espada
  lexicon: LSJ
  rationale: La expresión literal «en la boca de la espada» es una locución semítica/helénica. «Con el filo de la espada» comunica en español la misma imagen idiomática con naturalidad y mantiene la referencia al borde cortante.
- source_word: ἐξερρίζωσεν
  english_pob_choice: uprooted it
  chosen_spanish: la desarraigó
  alternatives_spanish:
  - la arrancó de raíz
  - la arrancó
  lexicon: LSJ
  rationale: El verbo conserva la metáfora de arrancar por las raíces. «Desarraigó» mantiene esa imagen en español y refleja mejor el valor figurado del griego que un mero «destruyó».
- source_word: αὐτήν
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - la ciudad
  - ella
  lexicon: Greek grammar
  rationale: El pronombre retoma πόλις, femenino gramatical en griego. En español, el referente implícito femenino se expresa naturalmente con «la», evitando una repetición innecesaria de «la ciudad».
- source_word: τὰ σκῦλα
  english_pob_choice: the plunder
  chosen_spanish: el botín
  alternatives_spanish:
  - los despojos
  - el saqueo
  lexicon: LSJ
  rationale: El término designa lo tomado en guerra. «Botín» es la equivalencia directa y digna en español; «despojos» sería posible, pero suena más marcado y menos neutral.
- source_word: διῆλθεν διὰ τῆς πόλεως
  english_pob_choice: passed through the city
  chosen_spanish: pasó por la ciudad
  alternatives_spanish:
  - atravesó la ciudad
  - recorrió la ciudad
  lexicon: LSJ
  rationale: El verbo significa ir o pasar a través de un lugar. «Pasó por la ciudad» es natural y fiel, sin añadir el matiz militar de «marchó» que no está explícito en el verbo.
- source_word: ἐπάνω τῶν ἀπεκταμμένων
  english_pob_choice: over the slain
  chosen_spanish: sobre los muertos
  alternatives_spanish:
  - sobre los caídos
  - sobre los asesinados
  lexicon: LSJ
  rationale: El participio indica a los que habían sido matados. «Los muertos» es conciso y comprensible en español; «los caídos» es posible, pero puede suavizar el carácter violento del pasaje.
theological_decisions:
- issue: Fuerza de la violencia militar y del lenguaje de exterminio
  english_pob_reading: Retain the full force of the military violence in straightforward English ('destroyed every male,' 'with the edge of the sword,' 'uprooted it').
  chosen_spanish_reading: 'Conservar la fuerza plena de la violencia militar: «exterminó a todo varón», «con el filo de la espada», «la desarraigó».'
  alternative_spanish_readings:
  - suavizar a «derrotó a todo varón»
  - interpretar «desarraigó» solo como retirada sin destrucción
  rationale: El griego es explícito y severo. La versión española no debe atenuar ni moralizar el pasaje, sino reflejar su crudeza con términos directos y audibles.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de Swete (1909) y coincide con la evaluación de alta concordancia del control cruzado. Se han mantenido la violencia explícita y la metáfora de arrancar de raíz, sin introducir suavizaciones interpretativas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se mantiene «espada» para ῥομφαία en una locución idiomática, con nota para el sentido literal.
  - «Botín» conserva el valor bélico de τὰ σκῦλα sin coloquialismo.
  - «Los muertos» traduce el participio sustantivado de manera natural y sin perder el tono fúnebre.
