  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparece Yahvé ni otros términos sensibles del glosario. La decisión de usar 'descendencia' para זֶרַע es válida en español contemporáneo, pero la nota alternativa debe reflejar una opción distinta como 'tus descendientes' o 'tu semilla'.
