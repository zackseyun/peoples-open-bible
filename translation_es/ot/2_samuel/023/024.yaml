  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: Asahel/Asael, el hermano de Joab, está entre los Treinta; luego sigue Elhanán hijo de Dodo de Belén. También preserva correctamente la variante textual en nota para דֹּדוֹ / Dodai. Sin embargo, la nota está anclada en «Treinta», cuando en realidad corresponde a «Dodo», lo cual desaline­a el aparato con la evidencia fuente y el rastro de auditoría inglés.'
