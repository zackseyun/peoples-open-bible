translation:
  language: es
  text: los que se encaminan a descender a Egipto, pero no han preguntado de mi boca[a], para buscar refugio[b] en la fortaleza de Faraón y ampararse en la sombra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «pero no han preguntado por mi consejo» o «pero no me han consultado»; el hebreo dice literalmente: «pero a mi boca no han preguntado».'
    reason: lexical_alternative
  - marker: b
    text: O «para fortalecerse en la fortaleza de Faraón»; la expresión hebrea puede destacar tanto la búsqueda de protección como de fuerza.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַהֹלְכִים
  english_pob_choice: who set out
  chosen_spanish: los que se encaminan
  alternatives_spanish:
  - los que van
  - los que están yendo
  - los que caminan
  lexicon: HALOT
  rationale: El participio se usa de manera sustantiva para describir a un grupo; «los que se encaminan» mantiene ese valor descriptivo y comunica intención de movimiento mejor que un simple «van».
- source_word: לָרֶדֶת
  english_pob_choice: to go down
  chosen_spanish: a descender
  alternatives_spanish:
  - a bajar
  - a ir hacia abajo
  lexicon: HALOT
  rationale: En español, «descender» conserva el movimiento literal y la convención bíblica de «bajar a Egipto» sin volver la frase artificial.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - Mizraim
  lexicon: HALOT
  rationale: Es el nombre propio usual en español; no hay necesidad de transliteración.
- source_word: וּפִי
  english_pob_choice: my mouth
  chosen_spanish: a mi boca
  alternatives_spanish:
  - a mi boca, es decir, a mi palabra
  - a mi consejo
  lexicon: HALOT
  rationale: Se preserva la expresión concreta «mi boca» para reflejar la fuerza profética del hebreo. En español, «preguntar a mi boca» suena menos natural que «preguntar a mi boca» con preposición; por eso se mantiene la estructura breve y transparente, dejando la metáfora intacta.
- source_word: שָׁאָלוּ
  english_pob_choice: have not asked
  chosen_spanish: no han preguntado
  alternatives_spanish:
  - no han consultado
  - no han inquirido
  lexicon: HALOT
  rationale: «Preguntar» conserva el sentido básico de שאל y sigue bien la imagen de buscar dirección de Yahvé.
- source_word: לָעוֹז
  english_pob_choice: to seek refuge
  chosen_spanish: para buscar refugio
  alternatives_spanish:
  - para fortalecerse
  - para buscar protección
  lexicon: HALOT
  rationale: La línea paralela con la sombra de Egipto favorece un sentido de protección/refugio. «Buscar refugio» es natural en español y mantiene la tensión semántica del hebreo.
- source_word: בְּמָעוֹז פַּרְעֹה
  english_pob_choice: in Pharaoh’s stronghold
  chosen_spanish: en la fortaleza de Faraón
  alternatives_spanish:
  - en el baluarte de Faraón
  - en la protección de Faraón
  lexicon: HALOT
  rationale: «Fortaleza» comunica el sustantivo מָעוֹז como lugar o fuente de seguridad sin perder la imagen concreta de poder defensivo vinculada a Faraón.
- source_word: וְלַחְסוֹת
  english_pob_choice: and to take shelter
  chosen_spanish: y ampararse
  alternatives_spanish:
  - y buscar refugio
  - y cobijarse
  lexicon: HALOT
  rationale: חסה implica refugiarse/buscar cobijo. «Ampararse» funciona bien en español bíblico contemporáneo y enlaza con la imagen de protección sin sonar arcaico.
- source_word: בְּצֵל מִצְרַיִם
  english_pob_choice: in the shadow of Egypt
  chosen_spanish: en la sombra de Egipto
  alternatives_spanish:
  - bajo la sombra de Egipto
  - a la sombra de Egipto
  lexicon: HALOT
  rationale: «Sombra» conserva la metáfora de protección del hebreo צֵל. «En la sombra de Egipto» es fiel y claro en español, y no diluye la imagen.
theological_decisions:
- issue: La expresión antropomórfica וּפִי
  english_pob_reading: but have not asked at my mouth
  chosen_spanish_reading: pero no han preguntado a mi boca
  alternative_spanish_readings:
  - pero no han consultado conmigo
  - pero no han pedido mi consejo
  rationale: Se mantiene la imagen concreta de la «boca» para no suavizar el carácter personal y profético de la revelación divina. La nota permite la lectura interpretativa sin sustituirla en el texto principal.
  doctrine_reference: Translation philosophy §1, §3
- issue: El sentido de לָעוֹז en paralelo con בְּצֵל מִצְרָיִם
  english_pob_reading: to take refuge / to seek refuge
  chosen_spanish_reading: para buscar refugio
  alternative_spanish_readings:
  - para fortalecerse
  - para buscar protección
  rationale: El paralelismo poético sugiere dependencia de Egipto como amparo. «Buscar refugio» conserva esa acusación de confianza mal puesta y evita una traducción demasiado oscura de la raíz.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió la referencia a 'asked at my mouth' y mantuvo el paralelismo con shelter/refuge. El español conserva la literalidad de 'mi boca' y opta por 'buscar refugio' / 'ampararse' para reflejar el doble movimiento de dependencia de Egipto, sin perder la metáfora de sombra y fortaleza.
  spanish_consistency_notes:
  - Se usa «Yahvé» como nombre divino en el estilo general del proyecto; en este versículo el hebreo presenta la voz divina por medio de «mi boca», por lo que no hace falta introducir el nombre explícitamente en el texto principal.
  - «Faraón» se escribe con mayúscula inicial conforme al uso bíblico en español.
  - Se mantiene «Egipto» como topónimo estándar y se conserva la metáfora espacial de descenso/sombra.
