  to: Yo extenderé mi red sobre él[a], y será atrapado en mi trampa. Luego lo llevaré a Babilonia, la tierra de los caldeos; sin embargo, no la verá[b], y allí morirá.
  rationale: 'La revisión es menor y estilístico-semántica: cambia ''traeré'' por ''llevaré'' para expresar mejor en español el movimiento hacia Babilonia, y fortalece el matiz adversativo con ''sin embargo''. El resto del borrador preserva fielmente el sentido del hebreo y las decisiones documentadas por POB.'
