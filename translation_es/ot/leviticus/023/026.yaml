review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja fielmente la fórmula hebrea: וַיְדַבֵּר = «habló», אֶל = «a», מֹשֶׁה = «Moisés», לֵּאמֹר = «diciendo». También preserva correctamente יְהוָה como nombre divino, no como título.'
  spanish_quality_summary: 'El español principal es natural, claro y digno: «Yahvé habló a Moisés, diciendo,» funciona bien en contexto y suena bíblico sin ser arcaico. La única reparación necesaria está en la nota, donde se presenta «Yahvé» como alternativa a «YHWH», aunque ya es la forma adoptada en el texto; la nota debe reflejar que el hebreo subyacente es YHWH y que una alternativa de representación es «Jehová».'
  glossary_alignment: 'Alineación correcta con la terminología del proyecto: יְהוָה → «Yahvé», no «SEÑOR»; משה → «Moisés». No hay conflicto léxico-teológico aparte del ajuste menor en la formulación de la nota.'
  issues:
  - severity: low
    issue: La nota al pie enumera «Yahvé» como alternativa de representación de «YHWH», aunque es precisamente la forma escogida en el texto principal.
    rationale: La nota debe documentar el hebreo subyacente y alternativas reales no adoptadas en el texto. Tal como está, resulta redundante y ligeramente confusa para el lector.
  revised_spanish_text: Yahvé habló a Moisés[a], diciendo,
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; también puede representarse como «Jehová».'
    reason: alternative_reading
