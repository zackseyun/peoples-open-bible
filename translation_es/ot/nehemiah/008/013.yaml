- from: Y al segundo día[a] se reunieron los jefes de las casas paternas de todo el pueblo, los sacerdotes y los levitas, ante Esdras, el escriba, para entender las palabras de la ley.
  to: Y al segundo día[a] se reunieron los jefes de las casas paternas de todo el pueblo, los sacerdotes y los levitas, a Esdras el escriba, para adquirir entendimiento de las palabras de la ley.
  rationale: Se ajusta «ante Esdras» a «a Esdras» para reflejar mejor אֶל y el expediente inglés. Se cambia «para entender» por «para adquirir entendimiento» para conservar mejor el matiz de gaining insight de וּלְהַשְׂכִּיל. También se quita la coma en «Esdras el escriba» para una lectura más fluida y natural en español.
