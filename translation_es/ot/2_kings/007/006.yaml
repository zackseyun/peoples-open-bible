    text: O «el campamento arameo».
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo repite «el sonido de»: «el sonido de carros, el sonido de caballos, el sonido de un gran ejército».'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «cada uno a su hermano».
    reason: lexical_alternative
  revision_rationale: Se revisa «Yahvé» a «el Señor» para reflejar con mayor fidelidad el término hebreo אֲדֹנָי en este versículo; se cambia «alquilado» por «contratado» por naturalidad y precisión contextual en español; y se ajustan las notas para conservar las alternativas relevantes del rastro inglés, eliminando la nota redundante sobre «los reyes de Egipto».
