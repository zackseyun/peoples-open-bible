id: 2CH.6.24
reference: 2 Chronicles 6:24
source:
  edition: WLC
  text: וְֽ/אִם יִנָּגֵ֞ף עַמְּ/ךָ֧ יִשְׂרָאֵ֛ל לִ/פְנֵ֥י אוֹיֵ֖ב כִּ֣י יֶֽחֶטְאוּ לָ֑/ךְ וְ/שָׁ֨בוּ֙ וְ/הוֹד֣וּ אֶת שְׁמֶ֔/ךָ וְ/הִתְפַּֽלְל֧וּ וְ/הִֽתְחַנְּנ֛וּ לְ/פָנֶ֖י/ךָ בַּ/בַּ֥יִת הַ/זֶּֽה־־־׃
translation:
  text: If your people Israel are struck down before an enemy because they have sinned against you[a], and they turn back and confess your name, and pray and plead for favor before you in this house[c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'return'; the Hebrew verb can also carry the sense 'repent' in covenant contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'confess your name' or 'praise your name.'
    reason: lexical_alternative
  - marker: c
    text: Or 'make supplication' or 'seek mercy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִנָּגֵף
  chosen: are struck down
  alternatives:
  - are defeated
  - are smitten
  lexicon: HALOT
  rationale: Nifal of נגב/נגף here denotes being beaten or struck before an אויב in battle. 'Are struck down' preserves the passive/resultative sense and fits the military context without sounding archaic like 'smitten.'
- source_word: לִפְנֵי אוֹיֵב
  chosen: before an enemy
  alternatives:
  - before the enemy
  - by an enemy
  lexicon: HALOT
  rationale: Literally 'before an enemy.' The singular is indefinite in Hebrew and need not be made definite in English. 'Before' preserves the idiom of defeat in the presence/power of the foe.
- source_word: כִּי יֶחֶטְאוּ לָךְ
  chosen: because they have sinned against you
  alternatives:
  - for they sin against you
  - when they sin against you
  lexicon: HALOT
  rationale: כִּי here gives the reason for the defeat. The preposition with the 2ms suffix is naturally rendered 'against you' in English for sin directed toward God.
- source_word: וְשָׁבוּ
  chosen: they turn back
  alternatives:
  - they return
  - they repent
  lexicon: HALOT
  rationale: שׁוב often carries covenantal return/repentance nuance. 'Turn back' preserves the verbal imagery without over-interpreting as a technical term, while still allowing repentance to be heard in context.
- source_word: וְהוֹדוּ אֶת שְׁמֶךָ
  chosen: give thanks to your name
  alternatives:
  - confess your name
  - praise your name
  lexicon: HALOT
  rationale: ידה in the Hifil can mean confess, praise, or give thanks depending on context. Here, in a prayer of restoration, acknowledgment of God expressed in thankful praise is most natural. 'To your name' is retained to preserve the Hebrew emphasis on God's revealed character and reputation.
- source_word: וְהִתְפַּלְלוּ
  chosen: pray
  alternatives:
  - pray to you
  lexicon: HALOT
  rationale: Standard rendering of פלל in the Hitpael. 'To you' is implicit and need not be repeated because the following phrase 'before you' supplies the orientation.
- source_word: וְהִתְחַנְּנוּ
  chosen: plead for favor
  alternatives:
  - make supplication
  - seek mercy
  - entreat
  lexicon: HALOT
  rationale: The Hitpael of חנן expresses earnest supplication for grace or favor. 'Plead for favor' is readable modern English and preserves the grace-oriented sense better than the more formal 'make supplication.'
- source_word: לְפָנֶיךָ
  chosen: before you
  alternatives:
  - in your presence
  lexicon: HALOT
  rationale: A common idiom for direct address in prayer. 'Before you' is both natural and close to the Hebrew.
- source_word: בַּבַּיִת הַזֶּה
  chosen: in this house
  alternatives:
  - toward this house
  - in this temple
  lexicon: HALOT
  rationale: בית literally means 'house.' In Solomon's temple prayer, 'this house' preserves the Hebrew wording and the dedicatory setting. 'Temple' is interpretive and less formally aligned here.
