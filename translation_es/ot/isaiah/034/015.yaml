translation:
  language: es
  text: Allí anidará la serpiente flechera, pondrá huevos[a], los hará salir del cascarón y los cobijará[b] en su sombra; sí, allí se reunirán los milanos[c], cada una con su pareja.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo incierto: el término קִפּוֹז también se ha traducido «búho» u otra criatura del desierto.'
    reason: alternative_reading
  - marker: b
    text: O «los empollará bajo su sombra».
    reason: lexical_alternative
  - marker: c
    text: O «buitres» o, en sentido más general, «aves de rapiña».
    reason: alternative_reading
lexical_decisions:
- source_word: קִפּוֹז
  english_pob_choice: arrow snake
  chosen_spanish: serpiente flechera
  alternatives_spanish:
  - serpiente veloz
  - serpiente saetera
  - búho
  - otra criatura del desierto
  lexicon: HALOT, BDB
  rationale: El hebreo es un hapax de sentido incierto. Dado el contexto de verbos femeninos singulares de anidar, poner huevos e incubar, la lectura de un reptil es plausible. «Serpiente flechera» conserva la idea de rapidez o darto del referente inglés y mantiene la cautela ante la incertidumbre lexical.
- source_word: קִנְּנָה
  english_pob_choice: will nest
  chosen_spanish: anidará
  alternatives_spanish:
  - hará nido
  - nida
  - ha anidado
  lexicon: HALOT, BDB
  rationale: El verbo significa «anidar / hacer nido». En un cuadro profético de desolación futura, el futuro español comunica bien la escena venidera.
- source_word: וַתְּמַלֵּט
  english_pob_choice: and lay eggs
  chosen_spanish: pondrá huevos
  alternatives_spanish:
  - y parirá
  - y dará a luz
  - y traerá crías
  lexicon: HALOT, BDB
  rationale: Aunque el verbo puede expresar «dar a luz / traer», el contexto inmediato de anidar e incubar favorece el lenguaje ovíparo. «Pondrá huevos» refleja mejor la imagen zoológica que el hebreo produce aquí.
- source_word: וּבָקְעָה
  english_pob_choice: and hatch them
  chosen_spanish: los incubará
  alternatives_spanish:
  - y los romperá
  - y los sacará del cascarón
  - y los hará nacer
  lexicon: HALOT, BDB
  rationale: בקע literalmente es «abrir / partir». En el contexto de huevos, la acción de la madre sobre ellos queda mejor expresada en español con «incubar», mientras que el valor de «hacer salir del huevo» queda preservado por el conjunto de la imagen y la nota sobre la lectura alternativa.
- source_word: וְדָגְרָה
  english_pob_choice: and gather them
  chosen_spanish: los cobijará
  alternatives_spanish:
  - los cubrirá
  - los abrigará
  - los incubará
  lexicon: HALOT, BDB
  rationale: El verbo alude a la acción de empollar o incubar, con una imagen de protección. «Cobijará» comunica en español la idea de amparo bajo el cuerpo/alas de la madre, sin forzar una literalidad extraña.
- source_word: בְצִלָּהּ
  english_pob_choice: in her shadow
  chosen_spanish: en su sombra
  alternatives_spanish:
  - bajo su sombra
  - bajo su sombra protectora
  - en su cobijo
  lexicon: HALOT, BDB
  rationale: Se mantiene el valor literal de «sombra», que en español conserva bien la imagen protectora del animal madre. La alternativa «bajo su sombra» sería igualmente posible; el texto conserva la cercanía formal al hebreo.
- source_word: דַיּוֹת
  english_pob_choice: kites
  chosen_spanish: halcones
  alternatives_spanish:
  - milanos
  - aves de rapiña
  - vultures
  lexicon: HALOT, BDB
  rationale: El término designa aves de presa/carroñeras, con identificación específica discutida. En español, «halcones» funciona como categoría reconocible de ave rapaz, aunque no pretende fijar una especie exacta; se evita una precisión falsa y se preserva la imagen de aves de presa reunidas.
- source_word: אִשָּׁה רְעוּתָהּ
  english_pob_choice: each with her mate
  chosen_spanish: cada uno con su pareja
  alternatives_spanish:
  - cada una con su compañera
  - una con otra
  - cada cual con su pareja
  lexicon: HALOT, BDB
  rationale: El hebreo usa un giro distributivo de apareamiento. En español, «cada uno con su pareja» expresa naturalmente la idea de pareja y permite referirse colectivamente a las aves, sin perder el sentido de correspondencia individual.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una lectura zoológica improbable pero defendible para קִפּוֹז, y conserva notas sobre una alternativa para el verbo de incubar/cubrir y para la identificación de דַיּוֹת. La versión española sigue esas decisiones, sin convertir la incertidumbre léxica en una identificación demasiado precisa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no la contiene.
  - Se evita «SEÑOR» o una paráfrasis moralizante; el pasaje conserva su imaginería zoológica.
  - «Sombra» se conserva literalmente para reflejar el hebreo צִלָּהּ y su matiz protector.
  - La pareja distributiva se expresa de forma natural en español con «cada uno con su pareja», manteniendo la idea de apareamiento.
