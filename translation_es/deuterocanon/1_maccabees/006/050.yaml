translation:
  language: es
  text: Y el rey capturó Betsura[a], y apostó allí una guarnición[b] para guardarla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tomó Betsura» o «se apoderó de Betsura». El verbo griego puede expresarse de manera más general como tomar posesión de la ciudad.
    reason: lexical_alternative
  - marker: b
    text: O «puso allí una guardia» o «asignó allí una guarnición». El griego destaca la designación de una fuerza militar para retener el lugar.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατελάβετο
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - tomó
  - se apoderó de
  - ocupó
  lexicon: LSJ
  rationale: En contexto militar, el verbo indica tomar posesión de una plaza fortificada. «Capturó» comunica bien la acción de conquista o aprehensión sin suavizarla a un simple «tomó» ni cargarla de una interpretación estratégica más fuerte como «ocupó».
- source_word: ὁ βασιλεύς
  english_pob_choice: the king
  chosen_spanish: el rey
  lexicon: LSJ
  rationale: Corresponde de manera directa al sujeto del texto griego, sin introducir nombre propio ni otro matiz no presente en el versículo.
- source_word: τὴν Βεθσούραν
  english_pob_choice: Bethsura
  chosen_spanish: Betsura
  alternatives_spanish:
  - Bethsura
  - Betsur
  lexicon: transliteración de nombre propio
  rationale: Se conserva el nombre del lugar como topónimo transliterado. «Betsura» adapta la forma griega al español de manera legible y mantiene la referencia geográfica sin imponer una armonización hebrea no exigida por este texto.
- source_word: ἐπέταξεν
  english_pob_choice: stationed
  chosen_spanish: puso allí
  alternatives_spanish:
  - estacionó allí
  - asignó allí
  - apostó allí
  lexicon: LSJ
  rationale: El verbo, junto con φρουράν y el infinitivo siguiente, expresa que el rey dispuso una fuerza en ese lugar. «Puso allí» permite que la frase en español fluya naturalmente y deja que el complemento «una guarnición» precise el sentido militar.
- source_word: φρουράν
  english_pob_choice: a garrison
  chosen_spanish: una guarnición
  alternatives_spanish:
  - una guardia
  - una tropa de custodia
  - un destacamento
  lexicon: LSJ
  rationale: En un contexto de ciudad tomada, «guarnición» es el término español más preciso para una fuerza militar dejada en el lugar para sostenerlo y defenderlo.
- source_word: τηρεῖν αὐτήν
  english_pob_choice: to guard it
  chosen_spanish: para guardarla
  alternatives_spanish:
  - para vigilarla
  - para custodiarla
  - para conservarla
  lexicon: LSJ
  rationale: «Guardar» refleja bien el valor de proteger y mantener bajo control el sitio ocupado. El pronombre se mantiene en femenino, acorde con la ciudad implícita en el griego.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés concuerdan en lo esencial: el rey toma Betsura y deja una fuerza militar allí. No se requieren revisiones respecto del análisis previo; se conserva la distinción entre «capturar/tomar posesión» y «estacionar/poner una guarnición».'
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y directo, acorde con narrativa histórica.
  - «Betsura» sigue la transliteración española del nombre griego documentado en el audit trail.
  - No se introdujo «SEÑOR» ni terminología teológica ajena al versículo.
  - La relación final «para guardarla» conserva la función del infinitivo griego sin sobreinterpretar la acción.
