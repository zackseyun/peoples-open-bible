translation:
  language: es
  text: ¿Seguirás la senda antigua[a], que han hollado los hombres de iniquidad?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la senda de antiguo» o «la senda de tiempos antiguos». El hebreo se refiere a un camino seguido desde hace mucho tiempo en el pasado, no necesariamente a algo eterno.
    reason: lexical_alternative
  - marker: b
    text: O «hombres malvados» o «hombres de maldad». La frase hebrea es literalmente «hombres de iniquidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹרַח / אֹרַח
  english_pob_choice: the path
  chosen_spanish: la senda
  alternatives_spanish:
  - el camino
  - la ruta
  - la vereda
  lexicon: HALOT
  rationale: אֹרַח designa un trayecto o curso; en español, «senda» conserva la imagen de un camino transitado y su uso metafórico, sin sonar tan técnico como «ruta».
- source_word: עוֹלָם
  english_pob_choice: ancient
  chosen_spanish: antigua
  alternatives_spanish:
  - de antiguo
  - de tiempos antiguos
  - eterna
  lexicon: HALOT
  rationale: Siguiendo el sentido contextual de algo seguido desde hace mucho tiempo, «antigua» comunica mejor que «eterna» y evita una lectura teológica indebida de perpetuidad.
- source_word: תִּשְׁמֹר
  english_pob_choice: will you keep to
  chosen_spanish: guardarás
  alternatives_spanish:
  - seguirás
  - mantendrás
  - observarás
  lexicon: HALOT
  rationale: Con objeto de ruta, שׁמר puede expresarse como seguir o mantener el curso; «guardarás» conserva el matiz de atención/fidelidad al camino y funciona con la pregunta retórica del verso.
- source_word: דָּרְכוּ
  english_pob_choice: have trodden
  chosen_spanish: han hollado
  alternatives_spanish:
  - han pisado
  - han andado
  - han recorrido
  lexicon: HALOT
  rationale: «Hollar» preserva la imagen concreta de pisar una senda, más cercana a «have trodden» que «han andado», y mantiene el tono poético del hebreo.
- source_word: מְתֵי אָוֶן
  english_pob_choice: men of wickedness
  chosen_spanish: los hombres de iniquidad
  alternatives_spanish:
  - los hombres de maldad
  - los hombres perversos
  - los hombres de impiedad
  lexicon: HALOT
  rationale: «מתי» es «hombres/personas de» y אָוֶן puede ser iniquidad, maldad o perversidad; «iniquidad» reproduce el sustantivo abstracto y la fuerza moral del sintagma, cercana a la opción inglesa.
theological_decisions:
- issue: Valor de עוֹלָם aplicado a la senda
  english_pob_reading: ancient path, not necessarily something eternal
  chosen_spanish_reading: senda antigua, no senda eterna
  alternative_spanish_readings:
  - senda de antiguo
  - senda de tiempos antiguos
  - senda perpetua
  rationale: El hebreo señala un camino de tiempo remoto, no una cualidad eterna. En español, «antigua» evita absolutizar el término y preserva la tensión contextual señalada en la auditoría inglesa.
  doctrine_reference: Semántica contextual; no implica eternidad ontológica
- issue: Naturaleza moral de מְתֵי אָוֶן
  english_pob_reading: men of wickedness
  chosen_spanish_reading: hombres de iniquidad
  alternative_spanish_readings:
  - hombres de maldad
  - hombres perversos
  - hombres de impiedad
  rationale: La expresión hebrea es literalmente «hombres de iniquidad». Mantener «iniquidad» conserva la dureza moral del original y evita suavizar la acusación.
  doctrine_reference: Ética bíblica; lenguaje de culpa moral
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que los marcadores [a] y [b] aparezcan exactamente en el texto español, y se alineó la traducción con el paralelo auditado: «path» -> «senda», «ancient» -> «antigua», «have trodden» -> «han hollado», y «men of wickedness» -> «hombres de iniquidad».'
  spanish_consistency_notes:
  - Se mantuvo una estructura interrogativa que refleja el hebreo y el inglés POB.
  - «Senda» y «camino» se consideraron; se eligió «senda» por su tono poético y metafórico.
  - Se evitó «eterna» para עוֹלָם, siguiendo la advertencia del audit trail de que no se trata de una afirmación ontológica.
  - La fórmula «hombres de iniquidad» conserva el registro formal y la dureza moral del hebreo.
  - No se introdujeron términos eclesiásticos ajenos al texto ni se suavizó la acusación.
