review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro de auditoría inglés en los puntos principales: mantiene «El necio», conserva «en su corazón», reproduce la negación existencial «No hay Dios» y preserva correctamente el cambio retórico de singular a plural. También cierra bien con «no hay quien haga el bien». Sin embargo, en la cláusula וְהִתְעִיבוּ עָוֶל se aparta de la decisión léxica del POB inglés al usar «iniquidad» donde la auditoría documentó preferencia por «injustice» y explicó su fuerza ético-social; en español «injusticia» preserva mejor esa decisión y es más clara.'
  spanish_quality_summary: El español es legible y digno, pero «han cometido iniquidad abominable» suena algo pesado y menos natural que una formulación con «injusticia». Además, la nota al pie anclada en «corazón» está mal ubicada, porque la variante explicada corresponde a la cláusula sobre la injusticia abominable, no a «en su corazón». Reubicar la nota mejora fidelidad editorial y claridad para el lector.
  glossary_alignment: 'Buen ajuste general con la terminología del proyecto: «Dios», «necio», y la conservación de la imaginería de «corazón» están bien. La principal desalineación es עָוֶל: dado que el POB inglés eligió «injustice» por su dimensión ética-social, el español por defecto debe seguir «injusticia» salvo razón fuerte en contrario, que aquí no se justifica. No hay temas sobre Yahvé/Mesías/Espíritu/etc. en este versículo.'
  issues:
