review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: relación distributiva («para las familias de»), linaje («hijos de Coat»), identificación («los levitas»), remanente («que habían quedado»), y procedencia tribal («de la tribu de Efraín»). También preserva adecuadamente la nota alternativa para עָרֵי גוֹרָלָם. Sin embargo, «las ciudades de su suerte» suena poco natural y puede leerse ambiguamente en español moderno; el hebreo apunta a ciudades asignadas por sorteo/lote. Además, «que habían quedado» introduce un pluscuamperfecto no necesario donde el participio hebreo se puede verter más directamente.'
  spanish_quality_summary: 'El texto es legible y digno, pero conviene pulir dos puntos para un español más natural y fiel: 1) cambiar «las ciudades de su suerte» por una formulación idiomática como «las ciudades que les tocaron por sorteo», que comunica mejor el sentido de גורל; 2) simplificar «que habían quedado» a «que quedaban» o «que quedaron», evitando una matización temporal innecesaria. El resto del verso está bien en español eclesial neutral.'
  glossary_alignment: 'No hay términos del glosario maestro en disputa en este versículo. «Levitas», «tribu» y el nombre «Efraín» están bien. «Coat» sigue la forma convencional española para Kohath. La decisión principal es estilístico-lexical sobre גורל: mejor expresar claramente asignación por sorteo que mantener el calco «su suerte».'
  issues:
  - severity: medium
    issue: «las ciudades de su suerte» es demasiado calcado y ambiguo
    rationale: Aunque refleja formalmente עָרֵי גוֹרָלָם, en español actual puede sugerir fortuna personal más que lote/asignación por sorteo. El propio expediente inglés admite una expansión más explícita, y en español esa expansión mejora la fidelidad comunicativa.
  - severity: low
    issue: «que habían quedado» añade un matiz temporal innecesario
    rationale: El participio הַנּוֹתָרִים significa «los restantes/los que quedaban». El pluscuamperfecto no distorsiona gravemente, pero es menos directo que una forma más simple.
  - severity: low
    issue: La nota al pie puede sonar más natural en español
    rationale: «asignadas a ellos por suerte» es comprensible pero poco idiomático; «asignadas a ellos por sorteo» o «que les fueron asignadas por sorteo» suena mejor y mantiene el sentido.
  revised_spanish_text: Y para las familias de los hijos de Coat[a], los levitas que quedaban de los hijos de Coat, las ciudades que les tocaron por sorteo fueron de la tribu de Efraín.
  revised_footnotes:
  - marker: a
    text: 'También, más literalmente: «las ciudades de su lote fueron de la tribu de Efraín».'
    reason: lexical_alternative
  revision_rationale: Se revisa principalmente עָרֵי גוֹרָלָם para evitar un calco poco natural en español («las ciudades de su suerte») y expresar con claridad el sentido de asignación por lote/sorteo. Se mantiene una nota con una alternativa más cercana a la forma hebrea («de su lote»). También se ajusta הַנּוֹתָרִים a «que quedaban», que reproduce mejor el participio sin añadir una anterioridad innecesaria. El resto del verso se conserva por ser fiel y natural.
