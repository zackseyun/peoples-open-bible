  from: he will make their pasture desolate because of them
  to: he will make their pasture desolate
  rationale: The Hebrew phrase is `יַשִּׁים עֲלֵיהֶם נָוֶה` (yashim ‘alehem naweh), literally 'he will make desolate upon them the pasture.' The prepositional phrase `עֲלֵיהֶם` ('upon them') is best rendered idiomatically in English as a possessive, indicating whose pasture is affected. The current draft does this by saying 'their pasture.' However, it then adds 'because of them,' translating the same prepositional phrase a second time with a different sense. This is redundant and grammatically awkward. The suggested rewrite removes the redundant phrase, resulting in a cleaner and more accurate translation of the Hebrew idiom.
