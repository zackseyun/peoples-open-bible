translation:
  language: es
  text: Y creyó a Yahvé[a][c], y él se lo contó[b] como justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «confió en Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo consideró» o «se lo acreditó como justicia».'
    reason: lexical_alternative
  - marker: c
    text: La sintaxis hebrea suele entenderse como que Yahvé contó la fe de Abram como justicia; una alternativa menos probable toma a Abram como sujeto de «contó».
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/הֶאֱמִ֖ן
  english_pob_choice: And he believed
  chosen_spanish: Y creyó
  alternatives_spanish:
  - Y confió
  - Y puso su fe en
  lexicon: HALOT
  rationale: El hiphil de אמן expresa aquí creer/confiar en alguien. «Creyó» es la forma más directa y natural en español, y mantiene la conexión bíblica e intertextual del verbo sin volverlo explicativo.
- source_word: בַּֽ/יהוָ֑ה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: HALOT
  rationale: Siguiendo la convención del proyecto, el nombre divino יהוה se vierte como «Yahvé» en el texto principal. Aquí la fe se dirige al sujeto divino explícito del hebreo, no a un título genérico.
- source_word: וַ/יַּחְשְׁבֶ֥/הָ
  english_pob_choice: and he counted it
  chosen_spanish: y le fue contado
  alternatives_spanish:
  - y lo contó
  - y le fue considerado
  - y le fue acreditado
  lexicon: HALOT
  rationale: חשב conserva el campo semántico de contar/considerar/imputar. En español, la pasiva impersonal «le fue contado» preserva el valor de cómputo o imputación sin forzar un sujeto ambiguo en el texto principal.
- source_word: לּ֖/וֹ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - para él
  - a él
  lexicon: HALOT
  rationale: El dativo pronominal se expresa de forma natural con «le», que conserva la relación de atribución o cómputo hacia Abram.
- source_word: צְדָקָֽה
  english_pob_choice: as righteousness
  chosen_spanish: por justicia
  alternatives_spanish:
  - como justicia
  - como rectitud
  - por rectitud
  lexicon: HALOT
  rationale: צְדָקָה aquí designa la cualidad de justicia/rectitud en sentido forense y de pacto. «Por justicia» mantiene la relación resultativa sin añadir una paráfrasis interpretativa como «estatus justo».
theological_decisions:
- issue: Sujeto implícito de וַיַּחְשְׁבֶהָ / imputation wording
  english_pob_reading: 'The LORD is the subject: Abram believed the LORD, and the LORD counted it to him as righteousness.'
  chosen_spanish_reading: Abram creyó a Yahvé, y Yahvé le contó eso por justicia, reflejado en español con una construcción pasiva que evita resolver en exceso el sujeto en la frase breve.
  alternative_spanish_readings:
  - Yahvé le contó eso por justicia
  - Abram lo contó por justicia
  rationale: El hebreo admite discusión sobre el sujeto de וַיַּחְשְׁבֶהָ. La tradición de lectura mayoritaria entiende a Yahvé como sujeto, pero la forma española más sobria aquí es una pasiva impersonal que conserva la tensión y evita introducir demasiado explícitamente un agente no expresado en la flexión verbal española.
  doctrine_reference: Preservar la tensión sintáctica y canónica; no resolver más allá de lo que el texto exige.
- issue: Referente del sufijo femenino en «contó/counted it»
  english_pob_reading: The suffix refers to Abram's believing/faith, rendered simply as 'it.'
  chosen_spanish_reading: El referente se deja igualmente implícito con «le fue contado», sin sustituirlo por una glosa explícita como «su fe».
  alternative_spanish_readings:
  - le fue contada su fe
  - le fue contado esto
  rationale: El sufijo femenino puede referirse al acto de creer o a la respuesta de Abram. La redacción española evita convertir ese referente en una explicación interpretativa dentro del versículo.
  doctrine_reference: Equivalencia óptima; evitar sobretraducción.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el último pase revisado del audit trail; no se detectaron cambios necesarios respecto de la lectura principal. Se mantuvo la convención del nombre divino como «Yahvé» y se optó por una formulación española que preserve la ambigüedad sintáctica sin perder la claridad pública del versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme a la política del proyecto para יהוה.
  - Se mantiene «justicia» para צְדָקָה, evitando sustituirlo por «rectitud» en el texto principal, aunque esta queda como alternativa levemente posible.
  - La construcción «le fue contado» evita una paraphrasis doctrinal más explícita y conserva el matiz de imputación/consideración del hebreo.
