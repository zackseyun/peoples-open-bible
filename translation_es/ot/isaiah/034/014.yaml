translation:
  language: es
  text: Y se encontrarán los seres del desierto con las hienas[a], y el demonio cabrío llamará a su compañero; ciertamente, allí se aquietará Lilith[b] y hallará para sí un lugar de reposo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «chacales» para «hienas»; el término hebreo para este animal es incierto.
    reason: lexical_alternative
  - marker: b
    text: «Lilith» también puede renderizarse como «criatura nocturna» o «monstruo nocturno»; algunas traducciones antiguas tienen «lechuza».
    reason: lexical_alternative
lexical_decisions:
- source_word: צִיִּים
  english_pob_choice: desert creatures
  chosen_spanish: los seres del desierto
  alternatives_spanish:
  - las criaturas del desierto
  - los animales del desierto
  lexicon: HALOT
  rationale: El hebreo nombra seres asociados con parajes desolados, sin precisar una especie concreta. «Seres del desierto» preserva esa amplitud y suena natural en español.
- source_word: אִיִּים
  english_pob_choice: hyenas
  chosen_spanish: las hienas
  alternatives_spanish:
  - los chacales
  - las criaturas aulladoras
  - los animales salvajes de las costas o del desierto
  lexicon: HALOT
  rationale: La identificación zoológica es incierta, pero «hienas» refleja la opción moderna adoptada en el POB inglés y mantiene el tono de fauna salvaje y carroñera. La nota conserva la alternativa tradicional «chacales».
- source_word: שָׂעִיר
  english_pob_choice: goat-demon
  chosen_spanish: macho cabrío demoníaco
  alternatives_spanish:
  - macho cabrío
  - sátiro
  lexicon: HALOT
  rationale: En este contexto de ruina poblada por seres extraños, el término no parece referirse solo a un macho cabrío literal. «Macho cabrío demoníaco» comunica la fuerza cultual/numinosa del hebreo sin recurrir a «sátiro», que puede sugerir mitología grecorromana ajena al texto.
- source_word: עַל רֵעֵהוּ יִקְרָא
  english_pob_choice: will call to its fellow
  chosen_spanish: llamará a su compañero
  alternatives_spanish:
  - clamará a su compañero
  - llamará a su semejante
  - llamará a su par
  lexicon: HALOT
  rationale: La expresión idiomática apunta a un llamado entre seres de la misma clase. «Su compañero» conserva la relación recíproca con un español claro y menos áspero que una traducción demasiado literal.
- source_word: אַךְ
  english_pob_choice: indeed
  chosen_spanish: ciertamente
  alternatives_spanish:
  - de hecho
  - sí
  - en verdad
  lexicon: HALOT
  rationale: La partícula refuerza la afirmación. «Ciertamente» transmite bien ese matiz enfático sin añadir contenido.
- source_word: הִרְגִּיעָה
  english_pob_choice: will settle down
  chosen_spanish: se aquietará
  alternatives_spanish:
  - se reposará
  - descansará
  - se establecerá
  lexicon: HALOT
  rationale: El verbo expresa llegar a la quietud o al reposo. «Se aquietará» conserva esa idea de asentarse en paz, coherente con el sustantivo siguiente.
- source_word: לִּילִית
  english_pob_choice: Lilith
  chosen_spanish: Lilith
  alternatives_spanish:
  - criatura nocturna
  - monstruo nocturno
  - lechuza
  lexicon: HALOT
  rationale: El término es raro y discutido. La transliteración mantiene la ambigüedad del hebreo y su posible resonancia mítica; la nota recoge las alternativas lexicográficas que el POB inglés preservó.
- source_word: מָנוֹחַ
  english_pob_choice: a resting place
  chosen_spanish: un lugar de reposo
  alternatives_spanish:
  - reposo
  - un sitio de descanso
  - un lugar de descanso
  lexicon: HALOT
  rationale: El sustantivo puede expresar tanto reposo como el lugar donde se encuentra. «Un lugar de reposo» conserva la imagen concreta de habitar en ruinas.
theological_decisions:
- issue: Si atenuar o conservar la fuerza extraña/numinosa de las criaturas del desierto
  english_pob_reading: Retain the likely supernatural/mythic force in 'goat-demon' and transliterated 'Lilith' rather than reducing both to ordinary animals.
  chosen_spanish_reading: Conservar la fuerza extraña y numinosa con «macho cabrío demoníaco» y «Lilith», sin reducirlos a animales ordinarios.
  alternative_spanish_readings:
  - Reducir ambos a animales corrientes del desierto
  - Neutralizar la referencia de «Lilith» como simple ave nocturna
  rationale: El versículo presenta un cuadro de desolación habitada por seres inquietantes. La traducción debe reflejar ese efecto sin afirmar más demonología de la que el texto mismo expresa.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el POB inglés y el hebreo masorético. No se aplicaron revisiones posteriores al contenido de este versículo; el control cruzado reporta alto acuerdo y sin cambios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conserva la transliteración «Lilith» para respetar la ambigüedad léxica documentada.
  - «Macho cabrío demoníaco» preserva la carga semántica de שָׂעִיר en este contexto de ruina poblada por seres extraños.
  - Se usa español neutro y publicación-readable, evitando calcos rígidos donde la sintaxis española requería naturalidad.
