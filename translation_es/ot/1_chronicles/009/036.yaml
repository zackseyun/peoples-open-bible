translation:
  language: es
  text: Y su hijo, el primogénito, fue Abdón[a], Zur, Quis, Baal, Ner y Nadab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice, literalmente: «Y su hijo, el primogénito: Abdón, y Zur, y Quis, y Baal, y Ner, y Nadab». La repetición de la conjunción antes de cada nombre se expresa en español como una lista fluida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנוֹ
  english_pob_choice: And his ... son
  chosen_spanish: Y su hijo
  alternatives_spanish:
  - Y su ... hijo
  - Y su hijo fue
  lexicon: HALOT
  rationale: El hebreo expresa posesión con sufijo de tercera persona masculina singular; en español conviene decir «su hijo» para mantener la relación genealógica de manera natural. La conjunción inicial se conserva con «Y» para continuar la lista genealógica.
- source_word: הַבְּכוֹר
  english_pob_choice: firstborn
  chosen_spanish: el primogénito
  alternatives_spanish:
  - el primero nacido
  - el mayor
  lexicon: HALOT
  rationale: «Primogénito» preserva el valor técnico-genealógico de הַבְּכוֹר mejor que «el mayor», y es idiomático en español bíblico sin perder la fuerza formal del término.
- source_word: עַבְדּוֹן
  english_pob_choice: Abdon
  chosen_spanish: Abdón
  alternatives_spanish:
  - Abdon
  lexicon: Nombre propio transliterado
  rationale: Se translitera el nombre propio al uso español con acento gráfico para reflejar la pronunciación natural en español y mantener la identidad del personaje.
- source_word: וְצוּר
  english_pob_choice: then Zur
  chosen_spanish: luego Zur
  alternatives_spanish:
  - y Zur
  - después Zur
  lexicon: Nombre propio transliterado
  rationale: El hebreo repite la conjunción ante cada nombre; en español, una lista fluida se expresa mejor con «luego» tras el primer elemento, como recurso idiomático que mantiene la continuidad del listado sin sugerir una secuencia histórica adicional.
- source_word: וְקִישׁ
  english_pob_choice: Kish
  chosen_spanish: Quis
  alternatives_spanish:
  - Kish
  lexicon: Nombre propio transliterado
  rationale: Se adapta el nombre al sistema ortográfico español con «Qu-» para el sonido /k/ ante «i», conservando la forma reconocible del nombre propio.
- source_word: וּבַעַל
  english_pob_choice: Baal
  chosen_spanish: Baal
  alternatives_spanish:
  - Baal
  - Baal
  lexicon: Nombre propio transliterado
  rationale: Aunque la forma coincide con un título/divinidad en otros contextos, aquí funciona claramente como nombre personal en la genealogía; por fidelidad al texto se conserva sin eufemismo.
- source_word: וְנֵר
  english_pob_choice: Ner
  chosen_spanish: Ner
  alternatives_spanish:
  - Ner
  lexicon: Nombre propio transliterado
  rationale: Nombre propio conservado de forma directa, sin alteración semántica.
- source_word: וְנָדָב
  english_pob_choice: and Nadab
  chosen_spanish: y Nadab
  alternatives_spanish:
  - Nadab
  lexicon: Nombre propio transliterado
  rationale: El último miembro de la serie se introduce con la conjunción normal en español para cerrar el listado de forma natural.
theological_decisions:
- issue: Tratamiento del nombre Baal dentro de una genealogía israelita
  english_pob_reading: Baal as a personal name
  chosen_spanish_reading: Baal como nombre personal
  alternative_spanish_readings:
  - sustitución eufemística del nombre
  - adaptación para evitar la asociación con la deidad cananea
  rationale: El texto hebreo presenta explícitamente בַּעַל como nombre propio. En esta genealogía no corresponde suavizar ni modificar la forma por sensibilidades posteriores, porque eso ocultaría el dato textual. La traducción debe reflejar el nombre tal como aparece en la fuente.
  doctrine_reference: Principios de fidelidad textual y transparencia de la POB
translation_notes:
  revision_awareness: La versión inglesa auditada no muestra revisiones aplicadas y fue marcada como estable; por eso la propuesta española sigue de cerca la segmentación genealógica del hebreo, con ajustes idiomáticos mínimos para una lectura natural en español.
  spanish_consistency_notes:
  - Se mantiene «Baal» como nombre propio, no como título teológico, por exigencia del contexto genealógico.
  - Se usa «primogénito» para conservar el valor técnico de הַבְּכוֹר.
  - Se opta por una lista española fluida («luego», «y») en lugar de repetir mecánicamente cada conjunción hebrea.
