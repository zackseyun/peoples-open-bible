translation:
  language: es
  text: '¡El Fuerte[a], Dios, Yahvé! ¡El Fuerte, Dios, Yahvé! Él sabe, e Israel mismo sabrá: si fue en rebelión, o si en infidelidad contra Yahvé[b], no nos salves en este día.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo repite dos veces la invocación divina: «El Fuerte, Dios, Yahvé; El Fuerte, Dios, Yahvé», como apelación solemne e intensiva.'
    reason: cultural_note
  - marker: b
    text: O «si en transgresión» / «si en infidelidad», para el sentido de מַעַל, que puede expresar ruptura de confianza o deslealtad de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵל אֱלֹהִים יְהוָה
  english_pob_choice: The Mighty One, God, Yahweh
  chosen_spanish: ¡El Fuerte, Dios, Yahvé!
  alternatives_spanish:
  - ¡El Poderoso, Dios, Yahvé!
  - ¡El Fuerte, Dios, el Señor!
  - ¡Dios de dioses, Yahvé!
  lexicon: HALOT
  rationale: אֵל funciona aquí como título divino enfático e independiente, repetido solemne y apelativamente. «El Fuerte» intenta conservar la fuerza titular sin fusionarlo con אֱלֹהִים; «Dios» traduce אֱלֹהִים, y «Yahvé» preserva el nombre divino según el estándar del proyecto.
- source_word: הוּא יֹדֵעַ
  english_pob_choice: He knows
  chosen_spanish: Él lo sabe
  alternatives_spanish:
  - Él sabe
  - Él conoce
  lexicon: HALOT
  rationale: El sentido es directo y presente; en español «lo sabe» expresa con naturalidad el conocimiento ya afirmado por el hebreo sin añadir matices ajenos.
- source_word: וְיִשְׂרָאֵל הוּא יֵדָע
  english_pob_choice: and Israel itself will know
  chosen_spanish: e Israel mismo lo sabrá
  alternatives_spanish:
  - y Israel mismo sabrá
  - e Israel lo sabrá
  lexicon: HALOT
  rationale: El hebreo enfatiza a Israel con el pronombre explícito; «mismo» conserva esa fuerza enfática de manera idiomática. El futuro comunica el valor prospectivo del imperfecto.
- source_word: אִם בְּמֶרֶד
  english_pob_choice: if it was in rebellion
  chosen_spanish: si fue en rebelión
  alternatives_spanish:
  - si fue por rebelión
  - si estuvo en rebelión
  lexicon: HALOT
  rationale: «Rebelión» es el equivalente más directo de מֶרֶד. Se mantiene la condicionalidad elíptica del hebreo sin sobreexplicar la construcción.
- source_word: וְאִם בְּמַעַל
  english_pob_choice: or if in unfaithfulness
  chosen_spanish: o si en infidelidad
  alternatives_spanish:
  - o si en deslealtad
  - o si en traición
  lexicon: HALOT
  rationale: מַעַל denota ruptura de confianza o deslealtad en contexto de pacto. «Infidelidad» conserva esa carga relacional y funciona con registro bíblico claro en español.
- source_word: בַּיהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - ante Yahvé
  - respecto de Yahvé
  lexicon: HALOT
  rationale: En este contexto la relación es adversativa; «contra» expresa mejor la idea de agravio o infidelidad dirigida a Yahvé.
- source_word: אַל תּוֹשִׁיעֵנוּ
  english_pob_choice: do not save us
  chosen_spanish: no nos salves
  alternatives_spanish:
  - no nos liberes
  - no nos rescates
  lexicon: HALOT
  rationale: El verbo hifil de ישׁע se traduce de forma transparente como «salvar». La forma negativa imperativa en español reproduce el tono de súplica/juramento.
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: this day
  chosen_spanish: en este día
  alternatives_spanish:
  - hoy
  - este día
  lexicon: HALOT
  rationale: «En este día» conserva el registro solemne del hebreo y encaja bien con la fórmula apelativa del versículo.
theological_decisions:
- issue: Representación del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para nombrar el nombre propio divino como «Yahvé», manteniendo la distinción respecto de títulos como «Dios» y evitando la sustitución por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza retórica de la invocación divina repetida
  english_pob_reading: The Mighty One, God, Yahweh! The Mighty One, God, Yahweh!
  chosen_spanish_reading: ¡El Fuerte, Dios, Yahvé! ¡El Fuerte, Dios, Yahvé!
  alternative_spanish_readings:
  - ¡El Poderoso, Dios, Yahvé! ¡El Poderoso, Dios, Yahvé!
  - ¡Dios de dioses, Yahvé! ¡Dios de dioses, Yahvé!
  rationale: La repetición se conserva para reflejar la solemnidad y el carácter apelativo/juramento del hebreo. No se comprime la doble invocación, porque el texto fuente la intensifica deliberadamente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s plain sense and theological tension'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail al preferir «infidelidad» para מַעַל en lugar de una opción más literal pero menos natural. También se preservó la repetición enfática de la invocación divina y el giro condicional elíptico del hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se evitó «SEÑOR» como máscara litúrgica y «Cristo» no aplica al versículo.
  - Se mantuvo la distinción entre «Dios» (אֱלֹהִים) y el nombre propio «Yahvé».
  - «El Fuerte» intenta conservar el valor titular de אֵל sin diluirlo en un simple adjetivo.
