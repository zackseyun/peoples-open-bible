revisions:
- from: No haya quien le extienda bondad[a], ni quien muestre favor a sus hijos huérfanos[b].
  to: No haya quien le extienda bondad[a], ni quien muestre favor a sus hijos sin padre[b].
  rationale: Se mantiene la fuerza imprecatoria y la estructura del original, pero se mejora la naturalidad española y la precisión de las notas. «Sus hijos sin padre» refleja mejor יְתוֹמָיו que «sus hijos huérfanos», y la nota [a] corrige una explicación literal inexacta del hebreo.
