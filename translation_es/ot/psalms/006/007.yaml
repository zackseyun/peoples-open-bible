  to: Estoy cansado con mi gemir; cada noche inundo mi cama[a]; con mis lágrimas empapo mi lecho.
  rationale: Se corrige 'toda la noche' a 'cada noche' para reflejar la recurrencia habitual de בְכָל לַיְלָה, en línea con el source y la auditoría inglesa. Se ajusta 'de tanto gemir' a 'con mi gemir' para conservar mejor el valor de acompañamiento/instrumento de בְּאַנְחָתִי. Se reemplazan las notas por una sola nota útil y fiel sobre la hipérbole 'hago nadar mi cama', que es la principal alternativa léxica documentada. El resto del paralelismo español se mantiene por su buena calidad.
