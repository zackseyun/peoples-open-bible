translation:
  language: es
  text: Tú partiste el mar delante de ellos[a], y pasaron por en medio del mar sobre tierra seca; y arrojaste a sus perseguidores en las profundidades[b], como una piedra en aguas poderosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dividiste el mar».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en lo profundo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּקַעְתָּ
  english_pob_choice: split
  chosen_spanish: partiste
  alternatives_spanish:
  - dividiste
  - abriste
  lexicon: HALOT
  rationale: בקַע expresa la acción física de partir o abrir. En español, «partiste el mar» conserva la fuerza verbal y evita una formulación demasiado explicativa.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - en frente de ellos
  lexicon: HALOT
  rationale: La idea idiomática es de ubicación frontal. «Delante de ellos» suena natural en español y mantiene el sentido direccional sin sobrerreformular.
- source_word: וַיַּעַבְרוּ
  english_pob_choice: they passed through
  chosen_spanish: pasaron por en medio
  alternatives_spanish:
  - atravesaron
  - cruzaron
  lexicon: HALOT
  rationale: עבר aquí enfatiza el tránsito a través del mar. «Pasaron por en medio» preserva la imagen de movimiento a través de un espacio abierto, en línea con el hebreo y con el POB inglés.
- source_word: בְתוֹךְ הַיָּם
  english_pob_choice: the midst of the sea
  chosen_spanish: por en medio del mar
  alternatives_spanish:
  - en medio del mar
  - en el interior del mar
  lexicon: HALOT
  rationale: תוֹךְ es «medio/interior». «Por en medio del mar» conserva la idea concreta de tránsito central y funciona bien con el verbo de movimiento.
- source_word: בַּיַּבָּשָׁה
  english_pob_choice: on dry ground
  chosen_spanish: sobre tierra seca
  alternatives_spanish:
  - en tierra seca
  - sobre suelo seco
  lexicon: HALOT
  rationale: La expresión bíblica recalca el milagro de un lecho seco. «Sobre tierra seca» comunica bien la condición del terreno en español y mantiene la imagen.
- source_word: רֹדְפֵיהֶם
  english_pob_choice: their pursuers
  chosen_spanish: sus perseguidores
  alternatives_spanish:
  - los que los perseguían
  - sus acosadores
  lexicon: HALOT
  rationale: El participio describe a quienes los iban persiguiendo. «Sus perseguidores» es directo y preciso en el contexto del éxodo.
- source_word: הִשְׁלַכְתָּ
  english_pob_choice: threw
  chosen_spanish: arrojaste
  alternatives_spanish:
  - echaste
  - lanzaste
  lexicon: HALOT
  rationale: La forma intensiva-causativa de שלך se expresa bien con «arrojar». Conserva la violencia del acto sin exagerarlo.
- source_word: בִמְצוֹלֹת
  english_pob_choice: into the depths
  chosen_spanish: en lo profundo
  alternatives_spanish:
  - en las profundidades
  - en los abismos
  lexicon: HALOT
  rationale: מְצוֹלוֹת refiere a las profundidades del mar. «En lo profundo» es una solución española sobria que mantiene el valor locativo y la imagen de hundimiento.
- source_word: כְּמוֹ אֶבֶן
  english_pob_choice: like a stone
  chosen_spanish: como piedra
  alternatives_spanish:
  - como una piedra
  - igual que una piedra
  lexicon: HALOT
  rationale: El hebreo usa una comparación simple. En español, «como piedra» reproduce la concisión y el paralelismo del original.
- source_word: בְּמַיִם עַזִּים
  english_pob_choice: in mighty waters
  chosen_spanish: en aguas poderosas
  alternatives_spanish:
  - en aguas fuertes
  - en aguas impetuosas
  - en aguas violentas
  lexicon: HALOT
  rationale: עַזִּים significa fuertes/poderosas. «Aguas poderosas» conserva la dignidad poética y el sentido de fuerza sin introducir una matiz excesivamente interpretativo.
theological_decisions:
- issue: Dirección retórica a Dios y memoria del éxodo
  english_pob_reading: Retain direct second-person address ('You split... you threw') as a confession of God's historical saving act.
  chosen_spanish_reading: Mantener la segunda persona directa («Tú partiste... arrojaste») como confesión de la acción salvadora histórica de Dios.
  alternative_spanish_readings:
  - Una formulación impersonal («se partió el mar» / «fueron arrojados»).
  - Una pasiva más distante que atenúe el sujeto divino.
  rationale: El versículo forma parte de una oración comunitaria que recuerda los actos de Yahvé. Conservar el адресamiento directo preserva el tono de alabanza y memoria agradecida, sin diluir el sujeto teológico del texto.
  doctrine_reference: Éxodo 14; Nehemías 9:6-15; principio POB de mantener el sentido llano y la agencia divina explícita.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés: se preserva la secuencia verbal, la imagen de tránsito a través del mar, el hundimiento de los perseguidores y la comparación final. Se adoptó «en lo profundo» para reflejar la ambigüedad locativa de בִמְצוֹלֹת sin perder naturalidad en español, y «aguas poderosas» para mantener la fuerza de עַזִּים con un registro bíblico digno. No se introduce máscara de sustitución para el nombre divino porque este versículo no lo contiene explícitamente.'
  spanish_consistency_notes:
  - Se usa «Tú» mayúsculo al dirigirse a Dios en segunda persona, coherente con un registro reverente.
  - «Mar» se mantiene singular como en el hebreo y en el inglés POB.
  - «Sus perseguidores» conserva el referente directo del participio sin convertirlo en abstracción.
  - «En lo profundo» respeta la posible alternancia con «las profundidades», tal como el POB inglés preservó «the depths» con nota alternativa.
