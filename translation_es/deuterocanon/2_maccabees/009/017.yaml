translation:
  language: es
  text: Y además de estas cosas, también se haría judío[a] y visitaría todo lugar habitado, proclamando el poder de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sería judío». El griego admite una traducción más literal, pero en contexto expresa asumir identidad o lealtad judía más que simplemente indicar etnia.'
    reason: lexical_alternative
  - marker: b
    text: «El poder de Dios» también puede entenderse como «la fuerza de Dios» o «el dominio de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸς δὲ τούτοις
  english_pob_choice: And besides these things
  chosen_spanish: Y además de estas cosas
  alternatives_spanish:
  - Y además
  - Y junto con estas cosas
  lexicon: LSJ
  rationale: La expresión griega añade algo más a lo ya dicho; «además de estas cosas» conserva el valor aditivo con español natural y sin sobretraducir.
- source_word: Ἰουδαῖος ἔσεσθαι
  english_pob_choice: he would also become a Jew
  chosen_spanish: se haría judío
  alternatives_spanish:
  - también sería judío
  - se convertiría en judío
  lexicon: LSJ
  rationale: El futuro de εἰμί con Ἰουδαῖος sugiere asumir identidad o lealtad judía, no solo etnia. «Se haría judío» preserva esa fuerza de adopción de identidad de modo idiomático en español.
- source_word: καὶ πάντα τόπον οἰκητὴν
  english_pob_choice: and would visit every inhabited place
  chosen_spanish: y visitaría todo lugar habitado
  alternatives_spanish:
  - y llegaría a todo lugar habitado
  - y recorrería todo lugar habitado
  lexicon: LSJ
  rationale: La secuencia describe desplazamiento hacia lugares poblados; «todo lugar habitado» refleja οἰκητήν y «visitaría» reproduce bien la idea de ir de un lugar a otro sin cargar de sentido adicional.
- source_word: καταγγέλλοντα
  english_pob_choice: proclaiming
  chosen_spanish: proclamando
  alternatives_spanish:
  - anunciando
  - declarando
  lexicon: LSJ
  rationale: El participio expresa declaración pública. «Proclamando» mantiene el tono formal y público del anuncio.
- source_word: τὸ τοῦ θεοῦ κράτος
  english_pob_choice: the power of God
  chosen_spanish: el poder de Dios
  alternatives_spanish:
  - la fuerza de Dios
  - el dominio de Dios
  lexicon: LSJ
  rationale: κράτος puede abarcar fuerza, poder o dominio; en este contexto, «el poder de Dios» es la opción más clara y natural en español, sin perder la posibilidad de la matización alternativa.
theological_decisions:
- issue: Sentido de Ἰουδαῖος ἔσεσθαι en el juramento de Antíoco
  english_pob_reading: He promises to adopt Jewish identity/allegiance ('become a Jew')
  chosen_spanish_reading: Promete adoptar identidad o lealtad judía («se haría judío»)
  alternative_spanish_readings:
  - Promete simplemente favorecer a los judíos
  - Promete vivir como judío sin cambio de identidad
  rationale: El griego expresa una afirmación más fuerte que simpatía externa; la traducción conserva la idea de adoptar identidad/lealtad sin introducir un tecnicismo posterior de conversión.
  doctrine_reference: Principio de primacía del texto original; conservar el sentido llano y la tensión lexical documentada.
translation_notes:
  revision_awareness: La base inglesa revisó «go to every inhabited place» a «visit every inhabited place» para hacer más natural ἐπελεύσεσθαι; la versión española adopta directamente «visitaría» para reflejar ese movimiento itinerante sin perder el matiz de desplazamiento. También se mantuvo la idea de «inhabited place» mediante «lugar habitado» y se conservó la fuerza de adopción identitaria de Ἰουδαῖος ἔσεσθαι.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ, en coherencia con el estándar del proyecto.
  - «Judío» se mantiene en minúscula por tratarse de identidad/adscripción, no de título.
  - No se usa un calco rígido de «iría a» porque «visitaría» expresa mejor la acción de recorrer lugares habitados en español natural.
  - Se conserva el orden discursivo aditivo con «Y además de estas cosas» para reflejar πρὸς δὲ τούτοις.
