translation:
  language: es
  text: 'Y él ha calumniado a tu siervo a mi señor el rey[a], porque tu siervo dijo: «Yo ensillaré el asno para mí, para que pueda montar sobre él e ir con el rey», porque tu siervo es cojo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me ha engañado» o «me ha traicionado». El verbo hebreo puede implicar engaño o trato traicionero; aquí se elige «ha calumniado» porque el contexto enfatiza una falsa presentación ante el rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi señor, el rey
  - mi amo el rey
  lexicon: HALOT
  rationale: La fórmula es de cortesía cortesana y conviene conservar tanto el matiz deferente como el título real. «Señor» funciona mejor que «amo» en español actual para este registro, y mantiene la relación de respeto sin volver la frase extraña.
- source_word: עַבְדִּי / עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: El hebreo usa la autodenominación servil propia del habla ante el rey. En español, «siervo» conserva mejor la fórmula de humillación cortés que «servidor», y evita la dureza más directa de «esclavo» en un contexto cortesano.
- source_word: רִמָּנִי
  english_pob_choice: has slandered me
  chosen_spanish: ha calumniado
  alternatives_spanish:
  - me ha engañado
  - me ha traicionado
  lexicon: HALOT
  rationale: La POB inglesa eligió «has slandered» por el sentido de falsa representación ante el rey. En español, «ha calumniado» reproduce bien la acusación de haber presentado una versión falsa o dañina; «engañado» y «traicionado» son posibles, pero menos precisos para el énfasis judicial/social del contexto.
- source_word: אֶחְבְּשָׁה לִּי הַחֲמוֹר
  english_pob_choice: I will saddle the donkey for myself
  chosen_spanish: yo ensillaré para mí el asno
  alternatives_spanish:
  - yo aparejaré para mí el asno
  - yo ensillaré el asno para mí
  lexicon: HALOT
  rationale: חבש aplicado a un asno se refiere a prepararlo para montar, por lo que «ensillar» comunica bien la acción. «Asno» conserva el animal del texto con un registro natural; la posición «para mí» reproduce el dativo de interés/reflexivo del hebreo.
- source_word: וְאֶרְכַּב עָלֶיהָ
  english_pob_choice: so that I may ride on it
  chosen_spanish: para que pueda montar sobre él
  alternatives_spanish:
  - y montar sobre él
  - para que yo lo monte
  lexicon: HALOT
  rationale: El hebreo expresa intención/purpose en la secuencia verbal. «Para que pueda montar sobre él» transmite ese valor final de forma clara y digna; «montar» es más natural en español que una repetición mecánica de «ir a caballo», y el pronombre masculino concuerda con «asno».
- source_word: וְאֵלֵךְ אֶת הַמֶּלֶךְ
  english_pob_choice: and go with the king
  chosen_spanish: y ir con el rey
  alternatives_spanish:
  - y acompañar al rey
  - y caminar con el rey
  lexicon: HALOT
  rationale: El sentido aquí es de acompañamiento, no simplemente de destino. «Ir con el rey» mantiene la sencillez del hebreo y la relación de compañía; «acompañar al rey» es una alternativa válida, pero algo más interpretativa.
- source_word: פִסֵּחַ
  english_pob_choice: lame
  chosen_spanish: cojo
  alternatives_spanish:
  - lame
  - lisiado
  lexicon: HALOT
  rationale: El adjetivo describe una limitación física concreta. En español, «cojo» es claro y natural; «lame» también sería posible, pero en el uso moderno suele sonar menos idiomático en muchas regiones. Se evita «lisiado» por ser más amplio y más fuerte de lo que requiere el hebreo.
theological_decisions:
- issue: La autodesignación servil ante el rey
  english_pob_reading: your servant / my lord the king
  chosen_spanish_reading: tu siervo / mi señor el rey
  alternative_spanish_readings:
  - tu servidor / mi señor el rey
  - tu esclavo / mi señor el rey
  rationale: No hay una cuestión doctrinal directa, pero sí una decisión teológica/lexical sobre cómo traducir la relación jerárquica sin borrar su fuerza. «Siervo» preserva la fórmula de subordinación y honra cortesana que el texto muestra; «esclavo» sería más fuerte de lo necesario y «servidor» suaviza demasiado la autodenominación.
  doctrine_reference: No aplica una doctrina específica; decisión de registro y fidelidad semántica.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que cambió «Let me saddle» por «I will saddle» para reflejar con mayor precisión la primera persona del verbo hebreo. La versión española conserva ese valor volitivo con «yo ensillaré».
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se mantiene «siervo» en la fórmula de cortesía real, de acuerdo con el uso POB de servant cuando el texto enfatiza sumisión personal.
  - «Calumniado» se eligió para reflejar el matiz de falsa representación social/judicial que la POB inglesa resolvió con «slandered».
  - «Cojo» traduce el adjetivo físico sin añadir una carga social más fuerte que la requerida por el hebreo.
