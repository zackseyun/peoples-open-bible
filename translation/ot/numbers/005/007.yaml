id: NUM.5.7
reference: Numbers 5:7
source:
  edition: WLC
  text: וְ/הִתְוַדּ֗וּ אֶֽת חַטָּאתָ/ם֮ אֲשֶׁ֣ר עָשׂוּ֒ וְ/הֵשִׁ֤יב אֶת אֲשָׁמ/וֹ֙ בְּ/רֹאשׁ֔/וֹ וַ/חֲמִישִׁת֖/וֹ יֹסֵ֣ף עָלָ֑י/ו וְ/נָתַ֕ן לַ/אֲשֶׁ֖ר אָשַׁ֥ם לֽ/וֹ־־׃
translation:
  text: then they shall confess the sin that they have committed[a], and he shall make full restitution for his guilt, adding a fifth to it[b], and give it to the one against whom he was guilty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'to the one he wronged.' The Hebrew literally identifies the recipient as the person with respect to whom he incurred guilt.
    reason: lexical_alternative
  - marker: b
    text: '''Make full restitution for his guilt'' renders a Hebrew expression that can also be translated ''restore what he owes'' or ''repay his compensation''; the sense here is repayment of the principal amount, not a sacrificial guilt offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִתְוַדּוּ
  chosen: then they shall confess
  alternatives:
  - and they shall confess
  - they must confess
  lexicon: HALOT
  rationale: Hitpael of ידה here means to confess openly/acknowledge wrongdoing. 'Shall confess' preserves the legal-prescriptive force without over-paraphrase; 'then' reflects the sequential waw in context.
- source_word: חַטָּאתָם אֲשֶׁר עָשׂוּ
  chosen: the sin that they have committed
  alternatives:
  - their sin which they did
  - the wrong they have done
  lexicon: HALOT
  rationale: חטאת can denote sin/offense; here the object of confession is the wrongdoing committed. 'Committed' is idiomatic English for עשה with sin while remaining close to the source.
- source_word: וְהֵשִׁיב
  chosen: he shall make full restitution
  alternatives:
  - he shall restore
  - he shall repay
  lexicon: HALOT
  rationale: Hiphil of שוב in restitution contexts means restore/repay. 'Make full restitution' captures the legal-economic sense in this verse better than the more general 'restore'.
- source_word: אֶת אֲשָׁמוֹ
  chosen: for his guilt
  alternatives:
  - his compensation
  - what he owes for his guilt
  - his guilt offering
  lexicon: HALOT
  rationale: אָשָׁם can mean guilt, liability, compensation, or guilt offering depending on context. Here, because the verse speaks of repayment to the injured party plus an added fifth, the sense is not sacrificial 'guilt offering' but the liability arising from guilt. Rendering with 'for his guilt' keeps the connection to culpability while fitting the restitution action.
- source_word: בְּרֹאשׁוֹ
  chosen: full
  alternatives:
  - in full
  - as principal
  lexicon: HALOT
  rationale: Literally 'at its head/on top of it,' an idiom for the principal amount itself. In English legal style, 'make full restitution' naturally conveys repayment of the principal before the added fifth.
- source_word: וַחֲמִישִׁתוֹ יֹסֵף עָלָיו
  chosen: adding a fifth to it
  alternatives:
  - and add one-fifth to it
  - with an additional fifth
  lexicon: HALOT
  rationale: The phrase specifies an added twenty percent beyond the principal. 'Adding a fifth to it' is clear, direct, and close to the Hebrew.
- source_word: וְנָתַן
  chosen: and give it
  alternatives:
  - and he shall give it
  - and pay it
  lexicon: HALOT
  rationale: Simple rendering of נתן; 'give it' keeps the concrete transfer language, while the object is understood from the restitution clause.
- source_word: לַאֲשֶׁר אָשַׁם לוֹ
  chosen: to the one against whom he was guilty
  alternatives:
  - to the one he wronged
  - to the injured party
  - to the one to whom he became liable
  lexicon: HALOT
  rationale: The clause identifies the recipient as the person wronged. Because English lacks a natural direct equivalent of the Hebrew construction, 'the one against whom he was guilty' preserves the guilt/liability nuance more closely than the smoother but less explicit 'the one he wronged'.
