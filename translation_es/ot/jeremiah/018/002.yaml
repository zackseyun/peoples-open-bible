translation:
  language: es
  text: Levántate y baja a la casa del alfarero[a], y allí te haré oír mis palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Levántate y baja a la casa del alfarero, y allí haré que oigas mis palabras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֥וּם
  english_pob_choice: Arise
  chosen_spanish: ¡Levántate!
  alternatives_spanish:
  - Ponte en pie
  - Alzate
  lexicon: HALOT
  rationale: El imperativo de קום expresa levantarse o ponerse en pie. «Levántate» conserva el tono profético y suena natural en español bíblico sin volverse arcaico.
- source_word: וְ/יָרַדְתָּ֖
  english_pob_choice: and go down
  chosen_spanish: y baja
  alternatives_spanish:
  - y desciende
  - y ve hacia abajo
  lexicon: HALOT
  rationale: ירד conserva la imagen direccional de descender. «Baja» mantiene esa fuerza espacial en español y es más natural que «desciende» en una orden narrativa.
- source_word: בֵּ֣ית הַ/יּוֹצֵ֑ר
  english_pob_choice: to the potter’s house
  chosen_spanish: a la casa del alfarero
  alternatives_spanish:
  - a la casa del potero
  - a la casa del que modela
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «casa del alfarero». «Alfarero» es el equivalente léxico normal en español y preserva la imagen concreta del artesano de barro.
- source_word: הַ/יּוֹצֵר
  english_pob_choice: potter
  chosen_spanish: alfarero
  alternatives_spanish:
  - modelador
  - artesano
  lexicon: HALOT
  rationale: Aunque el participio puede significar «el que forma», el contexto inmediato trata de trabajo con barro; «alfarero» es la precisión contextual adecuada y la más transparente para el lector.
- source_word: וְ/שָׁ֖מָּ/ה
  english_pob_choice: and there
  chosen_spanish: y allí
  alternatives_spanish:
  - y ahí
  - entonces allí
  lexicon: HALOT
  rationale: La expresión adverbial marca lugar. «Y allí» conserva la secuencia del mandato y la referencia espacial.
- source_word: אַשְׁמִֽיעֲ/ךָ֥
  english_pob_choice: I will let you hear
  chosen_spanish: te haré oír
  alternatives_spanish:
  - te dejaré oír
  - te haré escuchar
  lexicon: HALOT
  rationale: 'El hifil de שמע es causativo: «hacer oír» refleja mejor la fuerza del verbo que un simple «decir». «Te haré oír» mantiene esa causalidad con español natural.'
- source_word: אֶת דְּבָרָֽ/י
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mi palabra
  - mi mensaje
  lexicon: HALOT
  rationale: El hebreo está en plural, por lo que «mis palabras» conserva la forma y evita reducirla prematuramente a un singular interpretativo.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto hebreo de WLC y el patrón de la POB inglesa: mandato encadenado, localización concreta y causativo de שמע. Se mantiene la alternancia entre naturalidad idiomática y conservación de la imagen original, sin introducir interpretaciones adicionales.'
  spanish_consistency_notes:
  - Se emplea «alfarero» como término estable para יוצר en este pasaje, en coherencia con el contexto del trabajo con barro.
  - Se conserva el plural «palabras» para דְּבָרָי conforme al hebreo.
  - La construcción «te haré oír» refleja el causativo hebreo sin convertirlo en una simple cita declarativa.
