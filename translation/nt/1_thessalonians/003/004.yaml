id: 1TH.3.4
reference: 1 Thessalonians 3:4
source:
  edition: SBLGNT
  text: καὶ γὰρ ὅτε πρὸς ὑμᾶς ἦμεν, προελέγομεν ὑμῖν ὅτι μέλλομεν θλίβεσθαι, καθὼς καὶ ἐγένετο καὶ οἴδατε.
translation:
  text: For even when we were with you[a], we kept telling you beforehand that we were going to suffer affliction, just as it also happened, and you know it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be afflicted' or 'suffer tribulation.' The Greek verb can denote experiencing pressure, distress, or persecution.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ γὰρ
  chosen: For even
  alternatives:
  - For
  - Indeed
  - Because even
  lexicon: BDAG
  rationale: The combination is explanatory and slightly emphatic, linking this verse to the previous statement. 'For even' preserves both the causal force of γάρ and the added emphasis of καί without sounding wooden.
- source_word: ὅτε πρὸς ὑμᾶς ἦμεν
  chosen: when we were with you
  alternatives:
  - when we were among you
  - while we were with you
  lexicon: BDAG
  rationale: πρὸς ὑμᾶς with ἦμεν idiomatically means being in their presence/with them. 'With you' is natural modern English and fits the relational context.
- source_word: προελέγομεν
  chosen: we kept telling you beforehand
  alternatives:
  - we told you beforehand
  - we were foretelling to you
  - we warned you in advance
  lexicon: BDAG
  rationale: The imperfect tense suggests repeated or ongoing action during Paul's stay, so 'kept telling' best reflects aspect. προλέγω includes the sense of saying in advance, hence 'beforehand.' 'Warned' is possible but too interpretive because the verb itself is simply 'say beforehand.'
- source_word: ὅτι μέλλομεν θλίβεσθαι
  chosen: that we were going to suffer affliction
  alternatives:
  - that we were about to be afflicted
  - that we would suffer tribulation
  - that we were going to be troubled
  lexicon: BDAG
  rationale: μέλλομεν conveys impending/future expectation; 'were going to' is idiomatic. θλίβεσθαι here refers to experiencing pressure/trouble/persecution. 'Suffer affliction' preserves the verbal force and the semantic range without narrowing it too much to one type of suffering.
- source_word: θλίβεσθαι
  chosen: suffer affliction
  alternatives:
  - be afflicted
  - suffer tribulation
  lexicon: BDAG
  rationale: This keeps lexical continuity with θλῖψις language in the immediate context while remaining readable. 'Tribulation' is more traditional but less natural in contemporary English and can sound overly technical or eschatological here.
- source_word: καθὼς καὶ ἐγένετο
  chosen: just as it also happened
  alternatives:
  - just as indeed it happened
  - as also happened
  - just as it came to pass
  lexicon: BDAG
  rationale: καθώς marks correspondence between prediction and fulfillment. The added καί is retained with 'also,' though lightly, to reflect the Greek emphasis that events unfolded as predicted.
- source_word: καὶ οἴδατε
  chosen: and you know it
  alternatives:
  - and you know
  - as you know
  lexicon: BDAG
  rationale: The object is implicit in Greek but natural in English. 'You know it' makes explicit that the Thessalonians know the fulfillment just mentioned. 'As you know' is possible but slightly reshapes coordination into subordination.
