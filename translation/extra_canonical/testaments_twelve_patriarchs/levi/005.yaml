theological_decisions:
- issue: Divine speaker in verse 2 ('until I come and dwell in the midst of Israel')
  chosen_reading: Retained as first-person divine speech from the enthroned Most High rather than reassigned to the angel.
  alternative_readings:
  - The angel could be understood as speaking on God's behalf throughout the vision.
  - The line may reflect a transmission seam between divine and angelic speech.
  rationale: The immediate context first presents Levi seeing the Holy Most High on the throne, followed by direct speech. The first-person promise to dwell in Israel is weighty and should not be diluted by harmonizing it into indirect angelic paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Reference of 'tablets of the fathers' in verse 4
  chosen_reading: Understood as heavenly/prewritten tablets known from apocalyptic tradition.
  alternative_readings:
  - Ancestral records in a more general sense
  - earthly memorial tablets
  rationale: Within Levi's visionary-apocalyptic setting, preinscribed heavenly tablets are the most plausible referent. Because 'heavenly' is not explicit in the Greek, the decision is documented and footnoted for transparency.
- issue: Meaning of the angelic role in verse 6
  chosen_reading: Protective intercessor for Israel against destruction and demonic assault.
  alternative_readings:
  - An angel who rejects/excuses Israel
  - an angel set over Israel in a governing sense
  rationale: The transmitted participle is difficult, but the purpose clause and explanatory 'for every evil spirit attacks it' favor a mediatorial-protective role rather than simple governance or rejection.
