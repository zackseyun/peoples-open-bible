translation:
  language: es
  text: Y Judas combatía[a] contra los hijos de Esaú en Judea, en la región de Akrabattene[b], porque tenían cercado a Israel. Y les dio un gran golpe, y los sometió, y tomó sus despojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los descendientes de Esaú»; es decir, probablemente los edomitas. El griego dice literalmente «los hijos de Esaú».'
    reason: lexical_alternative
  - marker: b
    text: Akrabattene es un nombre regional en Judea; la sintaxis griega es comprimida y también puede entenderse como «en Judea, en Akrabattene».
    reason: cultural_note
lexical_decisions:
- source_word: ἐπολέμει
  english_pob_choice: fought against
  chosen_spanish: combatía contra
  alternatives_spanish:
  - luchaba contra
  - hacía guerra contra
  lexicon: LSJ
  rationale: El imperfecto indica acción militar en curso. «Combatía contra» conserva ese aspecto durativo y la oposición explícita de πρὸς, sin sonar tan rígido como un calco literal.
- source_word: υἱοὺς Ἠσαῦ
  english_pob_choice: the sons of Esau
  chosen_spanish: los hijos de Esaú
  alternatives_spanish:
  - los descendientes de Esaú
  - los edomitas
  lexicon: LSJ
  rationale: Se mantiene la expresión genealógica literal del griego. «Edomitas» es una identificación histórica plausible, pero el texto dice «hijos de Esaú», y esa formulación se conserva.
- source_word: ἐν τῇ Ἰουδαίᾳ τὴν Ἀκραβαττήνην
  english_pob_choice: in Judea, in the Akrabattene region
  chosen_spanish: en Judea, en la región de Akrabattene
  alternatives_spanish:
  - en Judea, en Akrabattene
  - en Judea, junto a Akrabattene
  lexicon: LSJ
  rationale: La sintaxis griega es comprimida y apposicional. «Región de Akrabattene» refleja la función geográfica del nombre y evita resolver de forma excesiva la relación sintáctica.
- source_word: περικάθηντο
  english_pob_choice: were hemming in
  chosen_spanish: rodeaban
  alternatives_spanish:
  - acorralaban
  - asediaban
  lexicon: LSJ
  rationale: El verbo sugiere un rodeo o presión envolvente. «Rodeaban» es natural en español y mantiene la idea de cerco hostil sin imponer necesariamente un asedio formal.
- source_word: τὸν Ἰσραήλ
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - los israelitas
  lexicon: LSJ
  rationale: Se conserva el singular colectivo «Israel», como en el griego, en vez de dispersarlo en una referencia plural.
- source_word: ἐπάταξεν ... πληγὴν μεγάλην
  english_pob_choice: struck them with a great blow
  chosen_spanish: les dio un gran golpe
  alternatives_spanish:
  - les asestó un gran golpe
  - les infligió una gran derrota
  lexicon: LSJ
  rationale: La expresión es un modismo bélico de victoria. «Les dio un gran golpe» mantiene la imagen de golpe/derrota sin añadir más interpretación que la requerida por el contexto.
- source_word: συνέστειλεν αὐτούς
  english_pob_choice: humbled them
  chosen_spanish: los sometió
  alternatives_spanish:
  - los humilló
  - los abatió
  - los redujo
  lexicon: LSJ
  rationale: El verbo puede denotar reducir, restringir o subyugar. En este contexto militar, «los sometió» expresa derrota y dominación sin exagerar hasta la destrucción total.
- source_word: τὰ σκῦλα
  english_pob_choice: their spoils
  chosen_spanish: sus despojos
  alternatives_spanish:
  - su botín
  - sus saqueos
  lexicon: LSJ
  rationale: «Despojos» es un término español adecuado para el botín militar y preserva la concreción del sustantivo griego.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de Swete y mantiene la lectura auditada del inglés POB. La principal decisión de estilo fue traducir el imperfecto bélico con un verbo aspectual en curso («combatía») y conservar la denominación geográfica «Akrabattene» como nombre de región, sin resolver en exceso la sintaxis comprimida del original.
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio para reflejar la conexión narrativa continua del pasaje.
  - Se usa «hijos de Esaú» y no una equivalencia interpretativa como «edomitas» en el texto principal.
  - «Israel» se conserva como colectivo singular, conforme al griego.
  - «Sus despojos» mantiene el plural posesivo y el sentido militar de τὰ σκῦλα.
  - La nota al pie usa una alternativa léxica ya documentada en el audit trail y no introduce una glosa doctrinal nueva.
