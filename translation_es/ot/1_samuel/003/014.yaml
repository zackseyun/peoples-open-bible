review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: consecuencia del juicio previo, juramento divino vigente, negación enfática de expiación, y exclusión de sacrificio/ofrenda como medio expiatorio. También conserva correctamente la nota sobre la fórmula de juramento con אִם y la posible especificidad de minchah.'
  spanish_quality_summary: El español es claro y digno, pero hay un ajuste importante de matiz léxico. 'La culpa ... será expiada' suena menos natural y menos fiel al peso moral de עָוֹן que 'la iniquidad ... será expiada'. Además, 'Por tanto' encaja un poco mejor que 'Por eso' con el tono solemne y formal del contexto profético.
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto. La decisión principal a corregir es עָוֹן: aunque ''culpa'' es posible, aquí el inglés auditado eligió ''iniquity'' por su gravedad judicial-sacrificial, y en español ''iniquidad'' preserva mejor ese registro que ''culpa''. ''Expiada'', ''sacrificio'' y ''ofrenda'' están bien; la nota sobre minchah también está alineada.'
  issues:
  - severity: medium
    issue: עָוֹן se tradujo como 'culpa' en vez de 'iniquidad'.
    rationale: En este contexto de juicio severo y expiación cultual, 'iniquidad' preserva mejor la gravedad moral y judicial del hebreo y sigue más de cerca la decisión documentada del inglés POB. 'Culpa' reduce el peso del término y suena más abstracto o forense que moral.
  - severity: low
    issue: '''Por eso'' puede sonar algo coloquial para este contexto.'
    rationale: '''Por tanto'' mantiene la fuerza inferencial de וְלָכֵן con un tono más formal y bíblicamente natural en español eclesial legible.'
  revised_spanish_text: 'Por tanto he jurado a la casa de Elí: la iniquidad de la casa de Elí no será expiada jamás por sacrificio ni por ofrenda[a][b].'
  revised_footnotes:
  - marker: a
    text: 'O: «ciertamente no será expiada». La fórmula hebrea de juramento usa «si» para expresar una negación enfática.'
    reason: lexical_alternative
  - marker: b
    text: «Ofrenda» traduce el hebreo minchah, a menudo con el sentido más específico de «ofrenda de cereal».
    reason: lexical_alternative
  revision_rationale: 'La revisión es menor pero conveniente: fortalece el registro formal con ''Por tanto'' y, sobre todo, restituye el peso semántico de עָוֹן con ''iniquidad'', en línea con la justificación léxica y teológica del expediente inglés. No cambia el sentido general ni las notas ya bien planteadas.'
