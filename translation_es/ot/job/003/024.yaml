translation:
  language: es
  text: Porque mi gemido viene antes que mi pan[a][b], y mis alaridos se derraman como agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi alimento»; el hebreo «mi pan» puede referirse de manera más amplia a lo que uno come.
    reason: lexical_alternative
  - marker: b
    text: O «mis rugidos»; el término hebreo puede evocar un clamor fuerte, casi animal, que intensifica la angustia de Job.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque es que
  lexicon: HALOT
  rationale: La partícula introduce aquí una explicación del estado de Job. «Porque» conserva bien la fuerza explicativa y suena natural en español poético.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: antes de
  alternatives_spanish:
  - delante de
  - antes que
  - en frente de
  lexicon: HALOT
  rationale: 'La relación temporal es la más clara en este contexto: el gemido precede a la comida. «Antes de» expresa esa secuencia sin forzar el español.'
- source_word: לַחְמִי
  english_pob_choice: my bread
  chosen_spanish: mi pan
  alternatives_spanish:
  - mi alimento
  - mi comida
  lexicon: HALOT
  rationale: El hebreo dice literalmente «pan» y puede abarcar lo que se come. Se conserva la imagen concreta en el texto principal y se deja abierta la amplitud semántica en nota.
- source_word: אַנְחָתִי
  english_pob_choice: my sighing
  chosen_spanish: mi gemido
  alternatives_spanish:
  - mi suspiro
  - mi quejido
  - mi lamento
  lexicon: HALOT
  rationale: אַנְחָה puede ser «gemido» o «suspiro» de dolor. «Gemido» comunica bien el sufrimiento y encaja con el paralelismo con los «alaridos» siguientes.
- source_word: וַיִּתְּכוּ
  english_pob_choice: pour out
  chosen_spanish: se derraman
  alternatives_spanish:
  - se vierten
  - brotan
  - se desbordan
  lexicon: HALOT
  rationale: La imagen es de flujo abundante e incontrolado. «Se derraman» preserva la metáfora líquida y funciona con el símil «como agua».
- source_word: שַׁאֲגֹתָי
  english_pob_choice: my groanings
  chosen_spanish: mis alaridos
  alternatives_spanish:
  - mis rugidos
  - mis bramidos
  - mis gemidos
  lexicon: HALOT
  rationale: El sustantivo procede de שׁאג y puede evocar un clamor fuerte, incluso animal. «Alaridos» mantiene esa intensidad auditiva mejor que «gemidos» en este verso, aunque el español admite como alternativa el matiz más suave.
translation_notes:
  revision_awareness: Se siguió el texto hebreo directamente y se contrastó con el audit trail en inglés. La decisión principal fue conservar la imagen concreta de «pan» y traducir el par poético con vocabulario español natural pero intenso, manteniendo las ambigüedades léxicas documentadas en las notas.
  spanish_consistency_notes:
  - Se mantuvo el registro poético y lamentativo sin añadir explicaciones no presentes en el hebreo.
  - Se preservó la metáfora concreta de alimento/pan en el texto principal, con ampliación semántica en nota.
  - Se reflejó la fuerza del verbo de derramamiento con una construcción pronominal natural en español.
  - Se evitó el calco rígido de «mi groaning(s)» y se eligió un par de términos que conserva el paralelismo y la intensidad del verso.
