translation:
  language: es
  text: Su pórtico[a] miraba al atrio exterior, y había palmeras en sus jambas, y se subía a él por ocho gradas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su vestíbulo ... sus pilastras»; los términos arquitectónicos hebreos de Ezequiel 40 son especializados y a veces se traducen de manera diferente en distintas versiones.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלַמּוֹ
  english_pob_choice: its portico
  chosen_spanish: su pórtico
  alternatives_spanish:
  - su vestíbulo
  - su portal
  lexicon: HALOT
  rationale: En este pasaje de visión arquitectónica, el término designa la estructura de entrada. «Pórtico» conserva el valor arquitectónico del inglés POB y suena natural en español. «Vestíbulo» podría sugerir un espacio interior, y «portal» es más amplio y menos preciso.
- source_word: אֶל חָצֵר הַחִיצוֹנָה
  english_pob_choice: faced the outer court
  chosen_spanish: daba al atrio exterior
  alternatives_spanish:
  - miraba al atrio exterior
  - estaba orientado hacia el atrio exterior
  lexicon: HALOT
  rationale: La preposición direccional expresa orientación. «Daba al» comunica de modo idiomático que la entrada se abría u orientaba hacia el atrio exterior, sin introducir una imagen distinta.
- source_word: תִמֹרִים
  english_pob_choice: palm trees
  chosen_spanish: palmeras
  alternatives_spanish:
  - adornos de palmeras
  - palmas
  lexicon: HALOT
  rationale: Aunque el contexto arquitectónico sugiere una forma decorativa, en español «palmeras» reproduce de forma directa la imagen del texto fuente. Se evita forzar una explicación interpretativa en el cuerpo principal.
- source_word: אֵילָו
  english_pob_choice: its jambs
  chosen_spanish: sus jambas
  alternatives_spanish:
  - sus pilastras
  - sus postes
  lexicon: HALOT
  rationale: «Jambas» es el equivalente arquitectónico preciso para los elementos laterales de una abertura. Mantiene la precisión técnica del inglés POB sin recurrir a un término más vago.
- source_word: מַעֲלוֹת שְׁמוֹנֶה
  english_pob_choice: eight steps
  chosen_spanish: ocho gradas
  alternatives_spanish:
  - ocho escalones
  - ocho peldaños
  lexicon: HALOT
  rationale: El hebreo indica una serie de peldaños o gradas. «Gradas» es digno y adecuado para una estructura de templo; «escalones» o «peldaños» también serían posibles, pero menos solemnes.
- source_word: מַעֲלוֹ
  english_pob_choice: went up to it
  chosen_spanish: subían a él
  alternatives_spanish:
  - llevaban a él
  - se subía por ellas
  lexicon: HALOT
  rationale: El sustantivo con sufijo expresa el acceso o subida vinculada a la estructura. «Subían a él» mantiene la idea de ascenso sin sobreexplicar el mecanismo arquitectónico.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; se mantiene la lectura estable del pasaje con alta concordancia. La versión española conserva esa estabilidad y solo ajusta la naturalidad idiomática en español sin alterar el contenido.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como convención general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se mantiene terminología arquitectónica precisa («pórtico», «atrio», «jambas», «gradas») para reflejar el campo semántico especializado de Ezequiel 40.
  - No se añade explicación interpretativa al cuerpo principal donde el texto hebreo simplemente describe la disposición del edificio.
