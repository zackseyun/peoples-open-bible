    changes_summary: Revised 'they shine' to 'they are sleek' for better lexical sense; changed 'evil words' to 'evil deeds' to reflect the Hebrew; smoothed the middle clause to 'They do not judge with justice the case of the fatherless, that they may prosper' for accuracy and natural English.
translation:
  language: es
  text: Han engordado[a]; están lustrosos. También han sobrepasado las obras malas. No juzgan con justicia la causa del huérfano[c], de modo que prosperan[b], y no defienden el derecho de los pobres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''Incluso han sobrepasado cosas/materias malas''; el hebreo dice literalmente: ''han sobrepasado palabras de mal''.'
    reason: lexical_alternative
  - marker: b
    text: La cláusula 'de modo que prosperan' es difícil. También puede entenderse como 'y prosperan' o 'aunque prosperen'.
    reason: alternative_reading
  - marker: c
    text: '''Huérfano'' también puede traducirse ''sin padre''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְנוּ
  english_pob_choice: have grown fat
  chosen_spanish: se han engordado
  alternatives_spanish:
  - están gordos
  - han engordado
  lexicon: HALOT
  rationale: El verbo perfecto conserva la imagen concreta de prosperidad autoindulgente. 'Se han engordado' mantiene la crítica profética y la fuerza corporal de la metáfora.
- source_word: עָשְׁתוּ
  english_pob_choice: are sleek
  chosen_spanish: están lustrosos
  alternatives_spanish:
  - están relucientes
  - están aceitados
  lexicon: HALOT
  rationale: La forma rara sugiere apariencia externa bien alimentada y brillante. 'Lustrosos' transmite esa superficie pulida sin perder el matiz figurado.
- source_word: גַּם עָבְרוּ
  english_pob_choice: They also have gone beyond
  chosen_spanish: También han pasado de
  alternatives_spanish:
  - También han sobrepasado
  - También han transgredido
  lexicon: HALOT
  rationale: '''עבר'' con el complemento de maldad expresa cruzar un límite. ''Han pasado de'' preserva la metáfora espacial de exceder el límite del mal.'
- source_word: דִבְרֵי רָע
  english_pob_choice: evil deeds / evil words
  chosen_spanish: las obras malas
  alternatives_spanish:
  - las palabras malas
  - las cosas malas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'palabras de mal', pero el contexto profético exige prácticas culpables. 'Obras malas' refleja el sentido contextual sin borrar la literalidad explicable en nota.
- source_word: דִּין לֹא דָנוּ
  english_pob_choice: they do not judge with justice / they do not judge the case
  chosen_spanish: No juzgan con justicia
  alternatives_spanish:
  - No juzgan el caso
  - No dictan justicia
  lexicon: HALOT
  rationale: La construcción cognada intensifica el acto jurídico. 'Con justicia' recoge el adverbial del POB y evita que el giro español suene incompleto.
- source_word: דִּין יָתוֹם
  english_pob_choice: the case of the fatherless
  chosen_spanish: la causa del huérfano
  alternatives_spanish:
  - el caso del huérfano
  - la causa del padreless
  lexicon: HALOT
  rationale: '''יָתוֹם'' designa a quien ha quedado sin padre; en español ''huérfano'' es la manera idiomática de preservar la vulnerabilidad legal sin forzar ''padreless''.'
- source_word: וְיַצְלִיחוּ
  english_pob_choice: that they may prosper
  chosen_spanish: para que prosperen
  alternatives_spanish:
  - y prosperan
  - aunque prosperen
  lexicon: HALOT
  rationale: La secuencia hebrea es difícil y admite matiz de propósito o resultado. 'Para que prosperen' conserva esa tensión sin resolverla de forma excesiva.
- source_word: וּמִשְׁפַּט אֶבְיוֹנִים לֹא שָׁפָטוּ
  english_pob_choice: and they do not uphold the justice of the poor
  chosen_spanish: y no defienden el derecho de los pobres
  alternatives_spanish:
  - y no juzgan la justicia de los pobres
  - y no hacen justicia a los pobres
  lexicon: HALOT
  rationale: '''מִשְׁפָּט'' puede ser derecho/justicia/causa. ''Defienden el derecho'' mantiene la dimensión jurídica y la obligación ética en español natural.'
theological_decisions:
- issue: Sentido de יָתוֹם
  english_pob_reading: fatherless / orphan
  chosen_spanish_reading: huérfano
  alternative_spanish_readings:
  - orfanato
  - niño sin padre
  rationale: En español bíblico contemporáneo, 'huérfano' comunica con claridad el estado de desamparo que el hebreo enfatiza. 'Niño sin padre' sería más explicativo, pero menos conciso y menos texto-fiel en el verso.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4, preserve source imagery and social concern
- issue: Cláusula difícil וְיַצְלִיחוּ
  english_pob_reading: that they may prosper / yet they prosper / though they prosper
  chosen_spanish_reading: para que prosperen
  alternative_spanish_readings:
  - y prosperan
  - aunque prosperen
  rationale: La sintaxis hebrea es comprimida y no se debe eliminar su ambigüedad. La opción elegida suena natural en español y permite leer la relación causal o resultativa sin cerrarla totalmente.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3, preserve theological tension rather than resolve it
- issue: Término jurídico מִשְׁפַּט
  english_pob_reading: justice / legal right / case
  chosen_spanish_reading: derecho
  alternative_spanish_readings:
  - justicia
  - causa
  rationale: '''Derecho'' en español sostiene el campo jurídico-ético de מִשְׁפָּט y evita repetir ''justicia'' demasiado mecánicamente. En este contexto, el énfasis está en el derecho que los pobres reciben o se les niega.'
  doctrine_reference: DOCTRINE.md § Translation philosophy 2, preserve legal/covenantal force
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: ''are sleek'' se refleja como ''están lustrosos''; ''evil words'' del literal hebreo se adapta contextualmente como ''obras malas''; y la cláusula intermedia conserva la dificultad sintáctica con ''para que prosperen'', sin borrar la ambigüedad documentada.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general cuando corresponda; aquí no aparece.
  - '''Mesías/Cristo'' no interviene en este versículo.'
  - '''espíritu'', ''carne'' y otros términos clave no aparecen en el texto.'
  - Se prefirió 'huérfano' por claridad natural en español, pero la nota preserva la alternativa más literal subyacente.
  - '''derecho'' se usó para מִשְׁפָּט por su fuerza jurídica y su fluidez en español contemporáneo.'
