lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y fue
  - Y pasó
  lexicon: HALOT
  rationale: La forma wayyiqtol de היה funciona aquí como marcador narrativo de transición. «Aconteció» conserva ese valor fórmico y sigue siendo natural en español bíblico, sin caer en una calca demasiado rígida.
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - tras
  - después
  lexicon: HALOT
  rationale: La preposición indica secuencia temporal directa. «Después de» es claro, idiomático y mantiene el orden temporal del hebreo.
- source_word: הַמַּגֵּפָה
  english_pob_choice: the plague
  chosen_spanish: la plaga
  alternatives_spanish:
  - el golpe
  - la aflicción
  - la pestilencia
  lexicon: HALOT
  rationale: En contextos de juicio, מַגֵּפָה suele referirse a una plaga o mortandad. «Plaga» comunica mejor el valor léxico y contextual que alternativas más genéricas o menos naturales.
theological_decisions:
- issue: La cláusula funciona como versículo completo y de transición narrativa
  english_pob_reading: Translate the clause as a standalone transitional sentence.
  chosen_spanish_reading: Traducirla como una oración breve completa que conserva su función de transición.
  alternative_spanish_readings:
  - Tratarla solo como inicio de la siguiente unidad en el formato español
  - Expandirla con material interpretativo para hacerla más fluida
  rationale: El hebreo aquí consiste únicamente en una fórmula de transición narrativa. Mantenerla como oración completa respeta la división versicular recibida y no añade contenido que el texto no expresa.
  doctrine_reference: No hay implicación doctrinal directa; se trata de función discursiva.
translation_notes:
  revision_awareness: La versión inglesa auditada se mantuvo sin cambios en la revisión más reciente. El español sigue la misma lectura de transición narrativa, conservando la brevedad del hebreo y la opción léxica de inicio formal, sin introducir ampliaciones.
  spanish_consistency_notes:
  - Se preserva el nombre divino ausente en este versículo; no corresponde ninguna sustitución por «Yahvé».
  - «Plaga» reproduce de manera directa el sustantivo hebreo y mantiene el registro bíblico sin volverlo arcaizante.
  - La nota al pie ofrece la alternativa tradicional equivalente a la del audit trail inglés, adaptada al español.
