    rationale: 'El inglés POB conserva dos alternativas: una para עֶדְיָהּ («her adornment») y otra para קִשֻּׁרֶיהָ (bandas, cintas, adornos atados). En español, la nota actual se coloca en «olvida[a]»/«su adorno» pero explica también el segundo sustantivo, lo que borra una distinción léxica documentada en el audit trail.'
