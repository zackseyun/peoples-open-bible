revisions:
- from: Porque los elementos[a], al cambiar entre sí, como en un arpa las notas de la melodía alteran el nombre, mientras permanecen siempre en el sonido[b], cosa que puede inferirse con precisión a partir de la vista de lo acontecido.
  to: Porque los elementos[a], al cambiar entre sí, como en un arpa las notas de la melodía alteran el nombre, aunque siempre permanecen en el mismo sonido, como puede inferirse con precisión por lo que se vio en lo sucedido[b].
  rationale: Se mantiene la fidelidad al griego y a la POB inglesa, pero se corrigen dos calcos poco naturales en español. «Por lo que se vio en lo sucedido» conserva la imaginería visual de ὄψις mejor que «la vista de lo acontecido» en un español más fluido. «Aunque siempre permanecen en el mismo sonido» preserva la continuidad auditiva de ἤχῳ y mejora la claridad del símil musical.
