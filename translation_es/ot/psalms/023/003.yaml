translation:
  language: es
  text: Él restaura mi alma[a]; me guía por sendas de rectitud[b], por amor de su nombre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «me devuelve la vida», «me refresca» o «me trae de vuelta». El hebreo usa נֶפֶשׁ («alma»), que puede significar la vida entera o la persona completa, no solo el aspecto inmaterial.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por sendas rectas» o «por caminos de justicia».'
    reason: lexical_alternative
  - marker: c
    text: «Por amor de su nombre» significa por la honra de su propio carácter y reputación.
    reason: cultural_note
lexical_decisions:
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  - mi interior
  lexicon: HALOT / uso bíblico de נֶפֶשׁ
  rationale: נֶפֶשׁ puede referirse a la vida, al yo completo o al interior de la persona. En español, ‘alma’ conserva una formulación tradicional y sobria, y sigue siendo lo bastante amplia para abarcar la restauración de la persona entera sin reducir el término a una parte inmortal separada.
- source_word: יְשׁוֹבֵב
  english_pob_choice: restores
  chosen_spanish: restaura
  alternatives_spanish:
  - revive
  - me renueva
  - me trae de vuelta
  lexicon: HALOT
  rationale: El verbo tiene valor causativo de volver/restaurar/revivir. ‘Restaura’ expresa bien esa acción sobre la persona del salmista y suena natural en español bíblico contemporáneo.
- source_word: יַנְחֵנִי
  english_pob_choice: he leads me
  chosen_spanish: me guía
  alternatives_spanish:
  - me conduce
  - me lleva
  - me dirige
  lexicon: HALOT
  rationale: La forma hiphil de נחה puede significar ‘guiar’ o ‘conducir’. En español, ‘me guía’ es claro, mantiene la imagen pastoral y evita una rigidez innecesaria.
- source_word: בְּמַעְגְּלֵי
  english_pob_choice: in paths of
  chosen_spanish: por sendas de
  alternatives_spanish:
  - en caminos de
  - en huellas de
  - en rutas de
  lexicon: HALOT
  rationale: מַעְגָּל denota senda, curso o huella. ‘Sendas’ reproduce bien el matiz poético y resulta idiomático en español; se prefirió ‘por’ para reflejar el movimiento de ser guiado.
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - lo recto
  - justeza
  lexicon: HALOT
  rationale: צֶדֶק puede abarcar justicia, rectitud o lo que es correcto. Aquí ‘justicia’ preserva la fuerza ética y covenantal del término; en español también permite escuchar la posibilidad alternativa ‘sendas rectas/justas’ sin perder el núcleo semántico.
- source_word: לְמַעַן
  english_pob_choice: for the sake of
  chosen_spanish: por amor de
  alternatives_spanish:
  - a causa de
  - por causa de
  - por motivo de
  lexicon: HALOT
  rationale: La expresión introduce motivo o finalidad. ‘Por amor de’ es una forma española natural y reverente para comunicar que la acción divina está motivada por la honra de su nombre.
- source_word: שְׁמוֹ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su reputación
  - su renombre
  - su carácter
  lexicon: HALOT
  rationale: שֵׁם significa literalmente ‘nombre’ y connota reputación, carácter y honra. Se mantiene la forma literal ‘su nombre’, porque en español conserva la resonancia bíblica y deja abierta la explicación teológica.
theological_decisions:
- issue: Sentido de ‘restores my soul’
  english_pob_reading: A holistic restoration/revival of the psalmist's life/self under the shepherd's care, expressed with the traditional phrase 'my soul.'
  chosen_spanish_reading: Una restauración integral de la vida/persona del salmista bajo el cuidado del pastor, expresada con ‘mi alma’.
  alternative_spanish_readings:
  - me devuelve la vida
  - me renueva
  - me trae de vuelta
  rationale: En español, ‘alma’ puede sonar más estrecho si se lee con categorías posteriores, pero aquí debe conservar la amplitud de נֶפֶשׁ. La traducción mantiene la formulación tradicional sin borrar la idea de vida entera restaurada.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Sentido de ‘paths of righteousness’
  english_pob_reading: Paths characterized by righteousness, that is, morally right ways under God's guidance.
  chosen_spanish_reading: Caminos caracterizados por justicia, es decir, por rectitud moral bajo la guía de Dios.
  alternative_spanish_readings:
  - sendas rectas
  - sendas de rectitud
  - caminos justos
  rationale: ‘Justicia’ mantiene la densidad moral y relacional de צֶדֶק. Aunque ‘rectitud’ o ‘rectas’ son alternativas posibles, ‘justicia’ enlaza mejor con el peso ético del término en la poesía bíblica.
  doctrine_reference: Translation philosophy §5; campo semántico de δικαιοσύνη por analogía
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y no requirió cambios; se conserva la solución auditada con equivalencias óptimas ya aprobadas.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una referencia explícita donde deba aparecer.
  - Se eligió ‘alma’ para נֶפֶשׁ por continuidad bíblica y amplitud semántica, sin imponer una antropología dualista.
  - ‘Justicia’ traduce צֶדֶק para sostener el peso ético y covenantal del texto, mientras que la nota preserva la alternativa ‘sendas rectas’.
  - ‘Por amor de su nombre’ conserva la literalidad de שֵׁם y deja la explicación teológica en nota, evitando paraphrasearlo como simple ‘reputación’ en el texto principal.
