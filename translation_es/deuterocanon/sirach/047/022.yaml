translation:
  language: es
  text: Pero Dios no abandonará su misericordia[a], ni dejará caer por tierra ninguna de sus palabras. No arrancará de su elegido[b] la descendencia y la posteridad, ni destruirá la semilla del que lo amó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Pero el Señor ciertamente no abandonará su misericordia, y ciertamente no destruirá ninguna de sus obras». El hebreo aquí dice, en cambio: «ni dejará caer por tierra ninguna de sus palabras».'
    reason: textual_variant
  - marker: b
    text: El hebreo puede leerse en plural («de sus elegidos»), pero el paralelo griego apoya el singular («de su elegido»).
    reason: alternative_reading
lexical_decisions:
- source_word: אל / Κύριος
  english_pob_choice: God / the Lord
  chosen_spanish: Dios
  alternatives_spanish:
  - el Señor
  lexicon: HALOT; LXX παράλληλο
  rationale: El testigo hebreo conserva אל, un título genérico para Dios, mientras que el paralelo griego lee Κύριος. En español, «Dios» sigue más de cerca el hebreo base del expediente y evita borrar esa diferencia textual; «el Señor» queda como alternativa posible por el paralelo griego.
- source_word: יטוש
  english_pob_choice: abandon
  chosen_spanish: abandonará
  alternatives_spanish:
  - dejará
  - desamparará
  - abandonará
  lexicon: HALOT
  rationale: «Abandonará» reproduce bien la fuerza de no dejar ni soltar lo que se tiene, en un español claro y natural.
- source_word: חסד
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - bondad
  - amor leal
  - gracia
  lexicon: HALOT
  rationale: «Misericordia» es la equivalencia más directa y publicable para el hebreo חסד en este contexto de preservación divina; además, encaja con el paralelo griego ἔλεος. «Amor leal» sería posible, pero en español bíblico puede sonar explicativo más que textual.
- source_word: ולא יפיל מדבריו ארצה
  english_pob_choice: nor let any of his words fall to the ground
  chosen_spanish: ni dejará caer por tierra ninguna de sus palabras
  alternatives_spanish:
  - ni hará caer por tierra ninguna de sus palabras
  - ni permitirá que sus palabras caigan al suelo
  - ni dejará caer al suelo ninguna de sus palabras
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de «caer por tierra», que expresa el fracaso de una palabra. «Ninguna de sus palabras» mantiene el matiz distributivo del hebreo.
- source_word: לא יכרית
  english_pob_choice: He will not cut off
  chosen_spanish: No cortará
  alternatives_spanish:
  - No eliminará
  - No arrancará
  - No exterminará
  lexicon: HALOT
  rationale: «No cortará» preserva la imagen verbal y el tono de alianza/dinastía del original sin sobrecargar el español.
- source_word: לבחיריו
  english_pob_choice: from his chosen one
  chosen_spanish: de su elegido
  alternatives_spanish:
  - de sus elegidos
  - de su escogido
  - de su elegido
  lexicon: HALOT
  rationale: Se prefiere el singular «su elegido» porque el contexto real/davídico y el paralelo griego singularizan la referencia; «elegido» es transparente y conserva la tensión textual sin resolverla con una pluralización innecesaria.
- source_word: נין ונכד
  english_pob_choice: offspring and posterity
  chosen_spanish: la descendencia y la posteridad
  alternatives_spanish:
  - la prole y la posteridad
  - los hijos y los nietos
  - la descendencia
  lexicon: HALOT
  rationale: La pareja hebrea expresa continuidad generacional. «Descendencia y posteridad» reproduce dos términos correlativos en un registro digno; no se reduce a una sola palabra para no perder el paralelismo.
- source_word: זרע
  english_pob_choice: seed
  chosen_spanish: la semilla
  alternatives_spanish:
  - la descendencia
  - la estirpe
  - el linaje
  lexicon: HALOT
  rationale: «Semilla» conserva la metáfora bíblica y el eco dinástico/covenantal del hebreo. En español moderno puede sonar figurada, pero aquí es fiel y comprensible.
- source_word: אובהו
  english_pob_choice: the one who loved him
  chosen_spanish: del que lo amó
  alternatives_spanish:
  - del que lo ama
  - de su amado
  - del que lo había amado
  lexicon: HALOT
  rationale: El participio aoristo y el paralelo griego apuntan a una referencia a alguien que lo amó; «del que lo amó» respeta ese valor sin introducir más especificación de la que el texto exige.
- source_word: ישמיד
  english_pob_choice: destroy
  chosen_spanish: destruirá
  alternatives_spanish:
  - aniquilará
  - borrará
  - exterminará
  lexicon: HALOT
  rationale: «Destruirá» transmite la fuerza del verbo sin intensificarlo más allá de lo que el verso sostiene.
theological_decisions:
- issue: Divergencia entre el testigo hebreo y el paralelo griego en la primera cláusula
  english_pob_reading: The POB English follows the Hebrew sense with 'God' and notes the Greek parallel 'the Lord will certainly not abandon his mercy...'.
  chosen_spanish_reading: Dios no abandonará su misericordia
  alternative_spanish_readings:
  - el Señor no abandonará su misericordia
  rationale: El texto principal sigue el hebreo conservado, como base primaria del expediente, pero la nota reconoce la lectura griega relevante. En español, «Dios» evita sustituir sin justificación el título del testigo hebreo por una tradición de traducción.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; preserve textual variants when both witnesses are meaningful.'
- issue: Número y alcance de 'su elegido'
  english_pob_reading: '''his chosen one'' may be singular, though a plural is possible in Hebrew; the Greek parallel supports the singular.'
  chosen_spanish_reading: de su elegido
  alternative_spanish_readings:
  - de sus elegidos
  rationale: Se mantiene el singular para reflejar la lectura preferida por el paralelo griego y por el sentido dinástico del pasaje. Se deja constancia de la alternativa plural para no borrar la tensión textual.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than smooth it away; use the strongest source-supported reading.'
translation_notes:
  revision_awareness: Se integró la revisión más reciente del expediente inglés al conservar la pareja generacional completa con «descendencia y posteridad», evitando simplificarla a un solo término. También se mantuvo la tensión textual entre el hebreo («sus palabras») y el paralelo griego («sus obras») mediante nota.
  spanish_consistency_notes:
  - Se usa «Dios» para אל, reservando «Yahvé» para el tetragrama cuando corresponda en otros pasajes.
  - Se mantuvo «misericordia» para חסד por coherencia con el paralelo griego ἔλεος y el tono covenantal del contexto.
  - «Semilla» se conserva como metáfora bíblica reconocible, sin sustituirla por un término más explicativo que borraría el eco dinástico.
  - El estilo busca español bíblico moderno y digno, sin calcos innecesarios, pero con fidelidad a las divergencias textuales del expediente.
