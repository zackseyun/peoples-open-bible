translation:
  language: es
  text: La voz de Yahvé hiende llamas de fuego[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «destellos de fuego», probablemente una alusión a relámpagos dentro de la imaginería de tormenta del salmo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹל
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  lexicon: HALOT
  rationale: '"קוֹל" puede significar "voz" o "sonido". En el Salmo 29, la repetición de "la voz de Yahvé" conserva mejor el paralelismo poético y la personificación teológica del trueno como palabra poderosa de Dios.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton en forma transparente. "Yahvé" es el equivalente español establecido en el proyecto para evitar la sustitución por un título y mantener el nombre personal del pacto.
- source_word: חֹצֵב
  english_pob_choice: hews out
  chosen_spanish: hiende
  alternatives_spanish:
  - talla
  - corta
  - abre
  lexicon: HALOT
  rationale: El participio transmite la acción concreta de cortar o labrar con fuerza. "Hiende" preserva mejor la imagen enérgica de la voz divina produciendo o abriendo fuego, sin volverla demasiado interpretativa.
- source_word: לַהֲבוֹת
  english_pob_choice: flames
  chosen_spanish: llamas
  alternatives_spanish:
  - fulgores
  - destellos
  - flashes
  lexicon: HALOT
  rationale: El sustantivo denota llamas o lenguas de fuego. "Llamas" es la correspondencia más directa en español, y mantiene abierta la lectura poética que luego puede sugerir relámpagos sin introducirlo de forma obligatoria en el texto principal.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: de fuego
  alternatives_spanish:
  - de incendio
  - ardiente
  lexicon: HALOT
  rationale: La combinación hebrea intensifica la imagen como "llamas de fuego". En español conviene conservar la construcción nominal completa para no perder el énfasis idiomático.
theological_decisions:
- issue: Imagen de tormenta y posible referencia a relámpagos
  english_pob_reading: 'The verse is translated with concrete imagery: ''hews out flames of fire,'' leaving the poetic identification with lightning implicit rather than explicit in the main text.'
  chosen_spanish_reading: 'La traducción mantiene la imagen concreta: "hiende llamas de fuego", dejando implícita la posible alusión a relámpagos sin explicitarla en el texto principal.'
  alternative_spanish_readings:
  - La voz de Yahvé destella relámpagos.
  - La voz de Yahvé lanza flashes de fuego.
  rationale: El hebreo presenta una imagen poética intensa, no una descripción meteorológica técnica. En español conviene conservar la concreción y la agencia divina sin cerrar prematuramente la metáfora con una identificación interpretativa.
  doctrine_reference: Salmo 29; filosofía de traducción del POB §§1, 3, 6
translation_notes:
  revision_awareness: 'No se registran revisiones aplicadas en el expediente inglés; el pasaje llega con aprobación final sin cambios, por lo que la propuesta española sigue la línea auditada: nombre divino transparente, imaginería concreta y nota alternativa para la posible alusión a relámpagos.'
  spanish_consistency_notes:
  - Se usa "Yahvé" de manera consistente con la norma del proyecto para יהוה.
  - Se prefiere "llamas de fuego" como calco semánticamente transparente de la expresión hebrea intensiva.
  - La nota al pie preserva la alternativa léxica sin sustituir el sentido principal del texto.
