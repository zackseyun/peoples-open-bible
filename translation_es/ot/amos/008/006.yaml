  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: propósito de comprar/explotar a los pobres y necesitados por precios irrisorios, y vender grano de baja calidad. Conserva correctamente «por plata», la distinción entre «pobres» y «necesitado», y «un par de sandalias». El principal problema está en וּמַפַּל בַּר: «las barridas del grano» es poco natural y la nota contiene un error léxico grave.'
  spanish_quality_summary: El español es en general claro, pero «las barridas del grano» suena forzado y poco idiomático en español bíblico natural. «Los barridos del grano» tampoco sería mejor. Una formulación como «las sobras del grano» comunica con claridad la idea de remanentes de inferior calidad, mientras la nota puede preservar alternativas más literales como «los desechos del grano» o «el grano caído».
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. Las decisiones léxicas clave están bien alineadas, salvo que la nota al pie dice «el refugio del trigo», que no corresponde al inglés auditado ni al hebreo; debe ser algo como «los desechos del grano» o «el grano caído».
  issues:
  - severity: high
    issue: La nota al pie traduce erróneamente la alternativa léxica como «el refugio del trigo».
    rationale: El inglés auditado dice «the refuse of the wheat»; «refuse» aquí significa desecho/refugallo, no «refugio». Esto altera el sentido del texto y debe corregirse.
  - severity: medium
    issue: «Las barridas del grano» es poco natural en español.
    rationale: Aunque intenta reflejar «sweepings», la expresión no suena idiomática ni clara para lectores generales. Conviene una forma más natural en español principal y dejar el matiz más técnico en la nota.
  - severity: low
    issue: La combinación «los pobres ... y al necesitado» mezcla plural y singular colectivo.
    rationale: No es incorrecto, pero «y al necesitado» mantiene bien la distinción semántica; no requiere cambio obligatorio. Se puede conservar por fidelidad y fluidez.
  revised_spanish_text: para comprar a los pobres por plata, y al necesitado por un par de sandalias, y vender las sobras[a] del grano.
