translation:
  language: es
  text: Cuando salgas en campaña contra tus enemigos[a], entonces guárdate de toda cosa mala.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «toda cosa impura» o «cualquier cosa impropia». La expresión hebrea es amplia y, en este contexto, puede incluir impureza ritual sin limitarse a ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: En este contexto legal e instructivo, כִּי introduce una situación prevista; «Cuando» transmite mejor ese valor que un condicional más abierto.
- source_word: תֵצֵא
  english_pob_choice: you go out
  chosen_spanish: salgas
  alternatives_spanish:
  - vayas
  - saldrás
  - salgas a campaña
  lexicon: HALOT
  rationale: El hebreo expresa salir en movimiento; en español, «salgas» conserva el verbo básico y, junto con «en campaña», comunica el sentido militar sin añadir más de lo que el texto requiere.
- source_word: מַחֲנֶה
  english_pob_choice: as an army
  chosen_spanish: en campaña
  alternatives_spanish:
  - como ejército
  - como campamento
  - la tropa
  lexicon: HALOT
  rationale: El hebreo puede designar «campamento» o, por metonimia, la fuerza militar. «En campaña» mantiene el marco bélico de forma natural en español y evita una construcción extraña como «un campamento sale».
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - contra de
  lexicon: HALOT
  rationale: En contexto militar, עַל tiene fuerza adversativa; «contra» es la equivalencia más clara y natural.
- source_word: אֹיְבֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - los que te son hostiles
  - tus adversarios
  lexicon: HALOT
  rationale: Es la equivalencia directa y adecuada del sustantivo con sufijo de segunda persona.
- source_word: וְנִשְׁמַרְתָּ
  english_pob_choice: then keep yourself
  chosen_spanish: entonces guárdate
  alternatives_spanish:
  - y cuídate
  - y mantente en guardia
  - entonces cuídate
  lexicon: HALOT
  rationale: El nifal de שׁמר aquí tiene matiz reflexivo/exhortativo. «Guárdate» conserva esa fuerza personal y suena natural en español bíblico contemporáneo.
- source_word: מִכֹּל
  english_pob_choice: from every
  chosen_spanish: de toda
  alternatives_spanish:
  - de cada
  - de todo
  lexicon: HALOT
  rationale: La preposición con כֹּל expresa evitación total. «De toda» conserva el distributivo y fluye mejor con «cosa mala».
- source_word: דָּבָר
  english_pob_choice: thing
  chosen_spanish: cosa
  alternatives_spanish:
  - asunto
  - materia
  - palabra
  lexicon: HALOT
  rationale: Aunque דָּבָר puede significar «palabra» o «asunto», en esta construcción el referente es amplio; «cosa» es la forma más natural en español.
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: mala
  alternatives_spanish:
  - malvada
  - perversa
  - impura
  lexicon: HALOT
  rationale: Se mantiene la amplitud semántica de רָע sin reducirla a una sola esfera. «Mala» permite abarcar tanto lo moral como lo ritualmente inapropiado en el contexto del campamento.
theological_decisions:
- issue: Alcance de דָּבָר רָע en la legislación de pureza del campamento
  english_pob_reading: Rendered broadly as 'every evil thing' without narrowing to ritual impurity alone.
  chosen_spanish_reading: «toda cosa mala», sin limitarla a impureza ritual.
  alternative_spanish_readings:
  - toda cosa impura
  - cualquier cosa impropia
  rationale: El contexto inmediato desarrolla pureza ritual, pero la frase hebrea es más amplia. La traducción conserva esa amplitud y no resuelve de antemano la tensión entre mal moral e impureza ceremonial.
  doctrine_reference: Primacía del hebreo original; preservar tensiones léxicas y teológicas en lugar de cerrarlas prematuramente.
translation_notes:
  revision_awareness: El borrador sigue el paquete fuente hebreo y el trazado de decisiones del POB en inglés. Se mantuvo la amplitud de דָּבָר רָע, evitando estrecharla a una sola categoría ritual, y se eligió una formulación española natural para el marco militar e instructivo del versículo.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; este versículo no lo contiene.
  - Se prefirió un registro bíblico contemporáneo, no arcaizante.
  - «Guárdate» conserva el valor reflexivo del hebreo nifal de שׁמר.
  - «Tos enemigos» y «en campaña» mantienen el contexto militar sin sobretraducción.
