review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del hebreo y del POB inglés: alarma súbita, dolores que los agarran, comparación con la mujer de parto, mirada mutua de estupor e imagen final de rostros ardientes. Sin embargo, hay dos puntos donde la fidelidad puede mejorarse: «mirará» debilita el matiz de asombro fijo de יִתְמָהוּ, y «angustias de parto» es menos directo que la opción más natural y concreta «dolores de parto» para חֲבָלִים en este contexto.'
  spanish_quality_summary: 'El español es claro y digno, pero puede sonar más natural y preciso con ajustes menores. «Se espantarán» funciona, aunque «quedarán consternados» o similar también serviría; no exige cambio. Sí conviene fortalecer «mirará» a «se quedará mirando» para reflejar mejor el estupor, y cambiar «angustias de parto» por «dolores de parto», expresión más idiomática y más cercana al paralelo hebreo. La nota al pie necesita pulirse: la alternativa «estarán en llamas» encaja mejor que «caras», y conviene mejorar la redacción.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. Las decisiones léxicas principales son compatibles con la filosofía POB, salvo que «mirará» queda algo reducido frente al inglés «will stare» y al hebreo.
  issues:
  - severity: medium
    issue: «mirará» debilita el sentido de יִתְמָהוּ
    rationale: El verbo hebreo expresa mirar con estupor o quedar mirando asombrado. «Mirará» puede sonar demasiado neutral en español. «Se quedará mirando» o «se mirarán atónitos» preserva mejor la fuerza del original sin añadir interpretación excesiva.
  - severity: low
    issue: «angustias de parto» suena menos idiomático que «dolores de parto»
    rationale: Aunque no es incorrecto, «dolores de parto» es la colocación más natural y directa en español bíblico contemporáneo y refleja mejor el paralelismo con «dolores».
  - severity: low
    issue: La nota al pie puede mejorar su naturalidad en español
    rationale: «Sus rostros estarán en llamas» es una alternativa más natural que formularla con comillas y redacción algo pesada; además conviene mantener «rostros» en lugar de alternar con «caras».
  revised_spanish_text: Se espantarán; dolores y dolores de parto los tomarán. Se retorcerán como mujer que da a luz. Cada hombre se quedará mirando a su prójimo; sus rostros serán rostros de llama[a].
  revised_footnotes:
