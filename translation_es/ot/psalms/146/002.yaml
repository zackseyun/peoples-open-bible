    text: 'Hebreo: ‘en mi vida’ y ‘en mi continuancia/existencia’; la traducción vierte el modismo como duración: ‘toda mi vida’ / ‘mientras aún viva’.'
    reason: lexical_alternative
  revision_rationale: 'Se corrigen dos puntos principales: ‘cantaré salmos’ se reemplaza por ‘cantaré alabanzas’ para reflejar mejor זמר sin añadir una especificación no presente en el hebreo; y ‘mientras tenga ser’ se reemplaza por ‘mientras aún viva’ para lograr un español natural que conserve la idea de existencia continuada de בְּעוֹדִי. También se ajusta la primera cola a ‘toda mi vida’ para reflejar mejor el audit trail inglés ‘all my life’ y mantener un paralelismo durativo claro.'
