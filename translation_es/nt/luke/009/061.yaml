translation:
  language: es
  text: 'Y otro también dijo: «Te seguiré, Señor, pero primero permíteme[a] despedirme[b] de los de mi casa[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «déjame».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tomar licencia de» o «decir adiós a».'
    reason: lexical_alternative
  - marker: c
    text: 'Lit.: «los que están en mi casa», es decir, las personas de su hogar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕτερος
  english_pob_choice: another
  chosen_spanish: otro también
  alternatives_spanish:
  - otro
  - alguien más
  - uno más
  lexicon: BDAG
  rationale: ἕτερος introduce a una persona adicional distinta de las anteriores. «Otro también» conserva la suma de la partícula καὶ y el sentido de adición sin sonar rígido en español.
- source_word: Ἀκολουθήσω
  english_pob_choice: I will follow
  chosen_spanish: Te seguiré
  alternatives_spanish:
  - Te seguiré a ti
  - Te seguiré yo
  lexicon: BDAG
  rationale: El futuro expresa intención y compromiso. En español, «Te seguiré» es natural y conserva la fuerza volitiva del verbo.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  - señor
  lexicon: BDAG
  rationale: Se mantiene «Señor» por la convención del proyecto para κύριος cuando se dirige a Jesús, preservando el peso respetuoso y la posible carga teológica del vocativo.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: pero primero
  alternatives_spanish:
  - primero
  - antes de eso
  - en primer lugar
  lexicon: BDAG
  rationale: La idea de prioridad se expresa de forma idiomática con «pero primero», que mantiene la oposición implícita con la promesa anterior y fluye bien en español.
- source_word: ἐπίτρεψόν μοι
  english_pob_choice: permit me
  chosen_spanish: permíteme
  alternatives_spanish:
  - permite que me
  - déjame
  - concédeme
  lexicon: BDAG
  rationale: El imperativo aoristo pide permiso. «Permíteme» conserva la cortesía formal y refleja bien el matiz de solicitud.
- source_word: ἀποτάξασθαι
  english_pob_choice: to say farewell
  chosen_spanish: despedirme
  alternatives_spanish:
  - decir adiós
  - tomar licencia de
  - despedirme de
  lexicon: BDAG
  rationale: El infinitivo medio significa tomar despedida o decir adiós. «Despedirme» es el equivalente más natural; el complemento «de» hace explícito el objeto de la despedida.
- source_word: τοῖς εἰς τὸν οἶκόν μου
  english_pob_choice: those in my house
  chosen_spanish: de los de mi casa
  alternatives_spanish:
  - de los que están en mi casa
  - de mi familia
  - de los de mi hogar
  lexicon: BDAG
  rationale: La construcción literal «los que están en mi casa» suena pesada en español. «Los de mi casa» conserva la referencia a las personas pertenecientes al ámbito doméstico sin sobreespecificar la composición del grupo.
theological_decisions:
- issue: Renderizado de κύριε en el discurso dirigido a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - sir
  rationale: Se sigue la lectura del POB inglés y la terminología del proyecto para κύριος, manteniendo la tensión entre cortesía y reconocimiento de autoridad en el discurso a Jesús.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord); Translation philosophy #3'
- issue: Alcance de τοῖς εἰς τὸν οἶκόν μου
  english_pob_reading: those in my house / those belonging to his home
  chosen_spanish_reading: los de mi casa
  alternative_spanish_readings:
  - los que están en mi casa
  - mi familia
  - mi casa
  rationale: Se conserva la referencia a las personas vinculadas con el hogar sin convertirla en una categoría social más técnica de lo que exige el griego. La frase deja abierta la mezcla de familiares y otros integrantes del entorno doméstico.
  doctrine_reference: Revision audit 2026-04-23T09:49:53Z; Luke 9:61 source phrase
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «at my house» por «in my house» para reflejar mejor τοῖς εἰς τὸν οἶκόν μου; la propuesta española sigue esa revisión con «de los de mi casa», evitando una localización física rígida y conservando el valor relacional del giro.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριε, en coherencia con el tratamiento del proyecto para el vocativo aplicado a Jesús.
  - Se evita «Cristo» porque el texto no contiene Χριστός ni un título mesiánico explícito.
  - «Despedirme» conserva el sentido de ἀποτάξασθαι sin caer en una paráfrasis extensa.
  - La expresión «los de mi casa» intenta preservar la ambigüedad útil del griego entre casa física y grupo doméstico.
