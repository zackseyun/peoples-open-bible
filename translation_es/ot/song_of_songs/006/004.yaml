translation:
  language: es
  text: Tú eres hermosa[a], mi amada, como Tirsa, encantadora como Jerusalén, imponente cual ejércitos con estandartes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘temible cual ejércitos con estandartes’. La imagen hebrea es la de filas militares ordenadas bajo estandartes, resaltando su esplendor imponente.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָפָה
  english_pob_choice: beautiful
  chosen_spanish: hermosa
  alternatives_spanish:
  - bella
  - bonita
  lexicon: HALOT
  rationale: El adjetivo predicativo expresa elogio directo de la belleza. 'Hermosa' es natural en español actual y conserva el tono poético sin sonar arcaico.
- source_word: רַעְיָתִי
  english_pob_choice: my love
  chosen_spanish: mi amada
  alternatives_spanish:
  - mi amor
  - mi querida
  - mi compañera
  lexicon: HALOT
  rationale: Es un término de afecto íntimo repetido en el Cantar. 'Mi amada' comunica bien la relación amorosa y es más fiel al matiz afectivo que 'mi compañera'.
- source_word: כְּתִרְצָה
  english_pob_choice: like Tirzah
  chosen_spanish: como Tirsa
  alternatives_spanish:
  - como Tirsá
  - igual que Tirsa
  lexicon: HALOT
  rationale: Se mantiene el nombre propio como topónimo transliterado en español. 'Como' conserva el valor comparativo del prefijo כ.
- source_word: נָאוָה
  english_pob_choice: lovely
  chosen_spanish: encantadora
  alternatives_spanish:
  - hermosa
  - atractiva
  - agradable
  lexicon: HALOT
  rationale: Se evita repetir 'hermosa' para respetar la variación poética del hebreo. 'Encantadora' preserva el matiz elogioso y la diferencia estilística entre los dos adjetivos.
- source_word: כִּירוּשָׁלִָם
  english_pob_choice: like Jerusalem
  chosen_spanish: como Jerusalén
  alternatives_spanish:
  - igual que Jerusalén
  - como la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Se conserva el paralelo con otro nombre propio reconocible en español. 'Como' sigue el comparativo hebreo sin sobreexplicar en el cuerpo del texto.
- source_word: אֲיֻמָּה
  english_pob_choice: awe-inspiring
  chosen_spanish: imponente
  alternatives_spanish:
  - awe-inspiradora
  - imponedora
  - temible
  lexicon: HALOT
  rationale: El adjetivo hebreo puede expresar algo que inspira sobrecogimiento o temor. 'Imponente' captura bien esa presencia majestuosa en español y evita la ambigüedad negativa de 'temible'.
- source_word: כַּנִּדְגָּלוֹת
  english_pob_choice: as bannered armies
  chosen_spanish: como ejércitos con estandartes
  alternatives_spanish:
  - como ejércitos enarbolados
  - como huestes con estandartes
  - como tropas con banderas
  lexicon: HALOT
  rationale: Se preserva la imagen militar ordenada y visible por estandartes. 'Ejércitos con estandartes' es claro en español y mantiene la fuerza visual del hebreo.
theological_decisions:
- issue: El sentido de אֲיֻמָּה en un contexto poético de amor
  english_pob_reading: awe-inspiring
  chosen_spanish_reading: imponente
  alternative_spanish_readings:
  - temible
  - sobrecogedora
  - majestuosa
  rationale: 'No hay una afirmación doctrinal, pero sí una tensión semántica: el término puede sugerir temor o imponente grandeza. ''Imponente'' conserva la idea de presencia poderosa sin introducir una carga negativa innecesaria en el poema.'
  doctrine_reference: Poética bíblica / semántica lexical
- issue: La comparación militar de כַּנִּדְגָּלוֹת
  english_pob_reading: bannered armies
  chosen_spanish_reading: ejércitos con estandartes
  alternative_spanish_readings:
  - huestes con estandartes
  - ejércitos en formación
  - tropas con banderas
  rationale: La imagen debe mantenerse concreta y no suavizarse. 'Ejércitos con estandartes' conserva el orden, la disciplina y el esplendor marcial sugeridos por el hebreo y por la nota inglesa.
  doctrine_reference: Poética bíblica / imaginería militar
translation_notes:
  revision_awareness: 'Se siguió el auditoría inglesa más reciente: la comparación final se expresó naturalmente con ''como'' en español, sin perder el sentido del hebreo ni la imagen de orden militar. También se preservó la variación poética entre ''hermosa'' y ''encantadora'' para reflejar los dos adjetivos hebreos distintos.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como default del proyecto no porque aparezca en este verso, sino para coherencia general del registro.
  - Se transliteró Tirzah como 'Tirsa' para una forma natural en español, manteniendo el topónimo propio.
  - Se evitó 'SEÑOR' y 'Cristo' porque no corresponden a este pasaje.
  - La nota al pie se ancló en 'hermosa' para reflejar la alternativa lexical principal del primer adjetivo.
