    rationale: El POB inglés incluye explícitamente una nota alternativa para 'the Messiah' / 'the Christ'. En español, la alternativa correspondiente ('el Cristo') debe preservarse en nota para mantener la trazabilidad léxica y teológica del audit trail.
  - severity: low
