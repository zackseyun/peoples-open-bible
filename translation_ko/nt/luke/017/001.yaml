  text: Then he said to his disciples[a], “It is impossible for stumbling blocks not to come, but woe to the one through whom they come.”
  footnotes:
  - marker: a
    text: Or 'for offenses not to come,' 'for causes of sin not to come,' or 'for temptations to sin not to come.' The Greek σκάνδαλα carries the sense of things that trip people up morally or spiritually.
    reason: lexical_alternative
