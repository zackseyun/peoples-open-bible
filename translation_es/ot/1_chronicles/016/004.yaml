translation:
  language: es
  text: Él designó a algunos de los levitas para ministrar delante del arca de Yahvé, para conmemorar[a], para dar gracias y para alabar a Yahvé, el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para hacer mención». El verbo hebreo puede denotar causar recuerdo en un sentido litúrgico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: He appointed
  chosen_spanish: designó
  alternatives_spanish:
  - nombró
  - asignó
  - puso
  lexicon: HALOT
  rationale: En este contexto administrativo y cultual, el verbo hebreo implica asignación oficial de personas a una función. «Designó» comunica esa idea con naturalidad en español sin perder el matiz de establecimiento para el servicio.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: «Delante de» conserva la referencia espacial y cultual de la frase, y suena más natural que una formulación más técnica en español.
- source_word: אֲרוֹן יְהוָה
  english_pob_choice: the ark of Yahweh
  chosen_spanish: el arca de Yahvé
  alternatives_spanish:
  - el arca de Yahvé
  - el arca de Yavé
  lexicon: HALOT
  rationale: Se mantiene la relación constructa de manera directa y se usa «Yahvé» según la norma del proyecto para el Tetragrámaton.
- source_word: מִן הַלְוִיִּם
  english_pob_choice: some of the Levites
  chosen_spanish: a algunos de los levitas
  alternatives_spanish:
  - de entre los levitas
  - algunos levitas
  lexicon: HALOT
  rationale: El valor partitivo de מִן queda bien expresado con «a algunos de los levitas», manteniendo también la función verbal de designación.
- source_word: מְשָׁרְתִים
  english_pob_choice: to minister
  chosen_spanish: para ministrar
  alternatives_spanish:
  - para servir
  - para ejercer su ministerio
  lexicon: HALOT
  rationale: «Ministrar» preserva el registro cultual y formal del verbo en este contexto de servicio sagrado.
- source_word: וּלְהַזְכִּיר
  english_pob_choice: to commemorate / to bring remembrance
  chosen_spanish: para traer memoria
  alternatives_spanish:
  - para hacer memoria
  - para conmemorar
  - para recordar
  lexicon: HALOT
  rationale: La raíz puede expresar una acción litúrgica de hacer venir a la memoria. «Traer memoria» intenta conservar esa fuerza causal sin reducirla a un mero «recordar» subjetivo ni cerrar del todo la alternativa de conmemoración.
- source_word: וּלְהוֹדוֹת
  english_pob_choice: to give thanks
  chosen_spanish: para dar gracias
  alternatives_spanish:
  - para agradecer
  - para ofrecer acción de gracias
  lexicon: HALOT
  rationale: En este contexto de adoración, el sentido es claramente de acción de gracias; «dar gracias» es la forma más clara y natural en español.
- source_word: וּלְהַלֵּל
  english_pob_choice: to praise
  chosen_spanish: para alabar
  alternatives_spanish:
  - para loar
  - para ensalzar
  lexicon: HALOT
  rationale: «Alabar» es el equivalente más directo y digno para el verbo de alabanza en contexto litúrgico.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - el Dios de los israelitas
  lexicon: HALOT
  rationale: Se conserva la fórmula pactual tradicional y clara en español.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton; por la norma del proyecto, se translitera como «Yahvé» en lugar de ocultarlo con un título sustitutivo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido litúrgico de להזכיר
  english_pob_reading: to commemorate / to make mention
  chosen_spanish_reading: para traer memoria
  alternative_spanish_readings:
  - para hacer memoria
  - para conmemorar
  - para hacer mención
  rationale: No se reduce a memoria mental privada; el hebreo admite un acto litúrgico de evocación o proclamación memorial. «Traer memoria» preserva esa tensión y deja abierta la dimensión cultual.
  doctrine_reference: HALOT; English POB lexical note on liturgical remembrance
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «to bring remembrance» a «to commemorate» por mayor naturalidad, pero el comentario lexical sigue reconociendo la posibilidad de «make mention» y la fuerza litúrgica del verbo. La presente redacción española evita cerrar demasiado el rango semántico al usar «traer memoria», que conserva la causalidad y la dimensión de evocación ritual.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה, conforme al criterio editorial del proyecto.
  - Se preservó el tono cultual con «ministrar», «dar gracias» y «alabar».
  - La colocación del marcador [a] acompaña únicamente la frase con ambigüedad lexical relevante.
  - «Dios de Israel» se dejó sin variación para conservar la fórmula pactual estándar.
