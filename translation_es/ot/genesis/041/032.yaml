translation:
  language: es
  text: Y en cuanto a que el sueño fue repetido a Faraón dos veces, es porque el asunto está establecido de parte de Dios[a], y Dios se apresura a hacerlo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el asunto está fijado por Dios».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Dios lo hará pronto» o «Dios está a punto de hacerlo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: And as for
  chosen_spanish: Y en cuanto a
  alternatives_spanish:
  - Y respecto a
  - Y acerca de
  lexicon: HALOT
  rationale: La expresión introduce una aclaración explicativa sobre la repetición del sueño. «En cuanto a» conserva bien la función discursiva sin volver la frase pesada o artificial en español.
- source_word: הִשָּׁנוֹת
  english_pob_choice: being repeated
  chosen_spanish: fue repetido
  alternatives_spanish:
  - el ser repetido
  - la repetición
  lexicon: HALOT
  rationale: El infinitivo hebreo apunta a la repetición del sueño; en español, una construcción pasiva natural comunica mejor el hecho sin perder el valor verbal.
- source_word: הַחֲלוֹם
  english_pob_choice: the dream
  chosen_spanish: el sueño
  alternatives_spanish:
  - el sueño
  - el sueño soñado
  lexicon: HALOT
  rationale: Correspondencia directa y natural para חֲלוֹם en este contexto.
- source_word: אֶל־פַּרְעֹה
  english_pob_choice: to Pharaoh
  chosen_spanish: a Faraón
  alternatives_spanish:
  - para Faraón
  - hacia Faraón
  lexicon: HALOT
  rationale: La preposición marca dirección/referencia hacia Faraón; en español «a Faraón» es la opción más natural y fiel.
- source_word: פַּעֲמָיִם
  english_pob_choice: twice
  chosen_spanish: dos veces
  alternatives_spanish:
  - dos ocasiones
  - dos veces
  lexicon: HALOT
  rationale: Equivalente idiomático normal en español para el adverbio dual.
- source_word: נָכוֹן
  english_pob_choice: is fixed
  chosen_spanish: está firme
  alternatives_spanish:
  - está establecido
  - está determinado
  - es cierto
  lexicon: HALOT
  rationale: «Firme» transmite la idea de algo establecido, seguro y no revocable, manteniendo la fuerza de נָכוֹן sin sonar excesivamente abstracto.
- source_word: הַדָּבָר
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - la cosa
  - el hecho
  - la palabra
  lexicon: HALOT
  rationale: Aquí דָּבָר se refiere a la cuestión/acontecimiento anunciado; «asunto» resulta natural en español y conserva la amplitud semántica.
- source_word: מֵעִם הָאֱלֹהִים
  english_pob_choice: by God
  chosen_spanish: por Dios
  alternatives_spanish:
  - de parte de Dios
  - desde Dios
  - con Dios
  lexicon: HALOT
  rationale: La frase expresa origen y autorización divinos. En español, «por Dios» encaja bien con «está firme» y evita un calco menos natural.
- source_word: וּמְמַהֵר
  english_pob_choice: is hastening
  chosen_spanish: se apresura
  alternatives_spanish:
  - está apresurándose
  - se da prisa
  lexicon: HALOT
  rationale: El participio de מהר comunica acción inminente. «Se apresura» mantiene el sentido verbal y resulta idiomático en español.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - la deidad
  lexicon: HALOT
  rationale: El contexto identifica claramente al Dios de Israel; en español se mantiene el singular teológico «Dios».
- source_word: לַעֲשֹׂתוֹ
  english_pob_choice: to do it
  chosen_spanish: a realizarlo
  alternatives_spanish:
  - a hacerlo
  - a llevarlo a cabo
  lexicon: HALOT
  rationale: El infinitivo con sufijo remite al cumplimiento del asunto anunciado. «Realizarlo» expresa ejecución efectiva con un tono claro y formal.
theological_decisions:
- issue: Sentido de מֵעִם הָאֱלֹהִים en relación con la fijación del asunto
  english_pob_reading: the matter is fixed by God
  chosen_spanish_reading: el asunto está firme por Dios
  alternative_spanish_readings:
  - el asunto está establecido por Dios
  - el asunto viene de parte de Dios
  rationale: La formulación conserva la tensión entre estado de firmeza/certeza y procedencia divina. «Por Dios» permite entender tanto origen como respaldo causal sin borrar el matiz de determinación.
  doctrine_reference: Providencia y soberanía divina en la interpretación del sueño (cf. contexto de Génesis 41).
- issue: Forma singular de אֱלֹהִים
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - los dioses
  rationale: Aunque la forma hebrea es plural morfológicamente, el contexto y la sintaxis se refieren inequívocamente al Dios verdadero. El singular español evita una lectura errónea.
  doctrine_reference: Monoteísmo bíblico y uso contextual de אֱלֹהִים.
translation_notes:
  revision_awareness: El texto sigue el estado de la última revisión inglesa, que quedó sin cambios y con alta concordancia textual y de decisión léxica. No se introdujeron correcciones textuales adicionales; solo se ajustó la expresión al español natural manteniendo la misma lectura de fondo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo usa exclusivamente אֱלֹהִים y por eso se traduce «Dios».
  - Se conserva el valor explicativo de וְעַל con una construcción española equivalente, sin convertirla en una paráfrasis causal excesiva.
  - No se domestica נָכוֹן como mero «cierto» para preservar la idea de firmeza/establecimiento.
  - «Se apresura» conserva el aspecto progresivo/inminente del participio hebreo mejor que un simple adverbio temporal.
