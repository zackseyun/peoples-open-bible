  text: ἐκ γὰρ τῆς καρδίας ἐξέρχονται διαλογισμοὶ πονηροί, φόνοι, μοιχεῖαι, πορνεῖαι, κλοπαί, ψευδομαρτυρίαι, βλασφημίαι.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/019.yaml
  text: 'For out of the heart come evil thoughts[a], murders, adulteries, sexual immoralities, thefts, false testimonies, and blasphemies.'
translation:
  language: ko
  text: '「마음에서 악한 생각들, 살인, 간음, 음행, 도둑질, 거짓 증언, 비방이 나오기 때문이다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「신성모독」. 헬라어 βλασφημία는 맥락에 따라 사람에 대한 비방이나 하나님에 대한 신성모독을 모두 가리킬 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαλογισμοὶ πονηροί
  english_pob_choice: evil thoughts
  chosen_korean: 악한 생각들
  alternatives_korean:
  - 악한 사고
  lexicon: BDAG
  rationale: 내면의 추론·계획. 「악한 생각」이 한국어에서 자연스럽다.
- source_word: πορνεῖαι
  english_pob_choice: sexual immoralities
  chosen_korean: 음행
  alternatives_korean:
  - 성적 부정
  lexicon: BDAG
  rationale: 결혼 외 모든 성적 부도덕을 포괄. 「음행」이 한국 성경 정착어이며 의미 폭을 살린다.
- source_word: βλασφημίαι
  english_pob_choice: blasphemies
  chosen_korean: 비방
  alternatives_korean:
  - 신성모독
  - 모독
  lexicon: BDAG
  rationale: 사람들 사이의 악행 목록 안에 위치하므로 「비방」이 우선되며, 신적 대상의 모독 가능성은 각주로 보존한다.
