translation:
  language: es
  text: 'Y dijeron a Moisés: «Habla tú con nosotros, y escucharemos[a]; pero no hable Dios con nosotros, no sea que muramos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oiremos». El verbo hebreo puede denotar oír en el sentido de escuchar atentamente o responder obedientemente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they said
  chosen_spanish: Y ellos dijeron
  alternatives_spanish:
  - Entonces dijeron
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración pasada; en español, «Y ellos dijeron» conserva la secuencia natural sin añadir matices inexistentes.
- source_word: אֶל מֹשֶׁה
  english_pob_choice: to Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - para Moisés
  lexicon: HALOT
  rationale: La preposición אֶל marca dirección/alocución; «a Moisés» es la equivalencia más directa y natural en español.
- source_word: דַּבֵּר אַתָּה
  english_pob_choice: You speak
  chosen_spanish: Tú habla
  alternatives_spanish:
  - Habla tú
  lexicon: HALOT
  rationale: El imperativo con pronombre explícito enfatiza que Moisés, no Dios, debe hablar. En español, «Tú habla» conserva ese énfasis directo y la carga contrastiva.
- source_word: עִמָּנוּ
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - con nosotros mismos
  - a nosotros
  lexicon: HALOT
  rationale: עִם normalmente significa «con»; en español, «habla con nosotros» mantiene el sentido relacional mejor que «háblanos».
- source_word: וְנִשְׁמָעָה
  english_pob_choice: and we will listen
  chosen_spanish: y escucharemos
  alternatives_spanish:
  - y oiremos
  - y escucharemos obedientemente
  lexicon: HALOT
  rationale: 'La forma cohortativa expresa una respuesta volitiva: «escucharemos» comunica mejor la escucha atenta y receptiva que un mero «oiremos».'
- source_word: וְאַל יְדַבֵּר
  english_pob_choice: but let not ... speak
  chosen_spanish: pero no hable
  alternatives_spanish:
  - y no hable
  - que no hable
  lexicon: HALOT
  rationale: אַל con imperfecto expresa prohibición; «pero no hable» reproduce el tono de ruego/prohibición con una transición adversativa natural tras la petición previa.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  lexicon: HALOT
  rationale: Aunque la forma es plural, el verbo es singular y el contexto del Sinaí exige referir al Dios de Israel; «Dios» es la lectura contextual correcta.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - no vaya a
  lexicon: HALOT
  rationale: פֶּן introduce un resultado temido; en español, «para que no» comunica con claridad la finalidad evitativa sin sonar arcaico.
- source_word: נָמוּת
  english_pob_choice: we die
  chosen_spanish: muramos
  alternatives_spanish:
  - moramos
  - moriremos
  lexicon: HALOT
  rationale: 'Tras una cláusula de prevención, el subjuntivo español es natural: «para que no muramos» refleja el temor al resultado fatal con idiomaticidad y fidelidad.'
theological_decisions:
- issue: Referente singular de אֱלֹהִים en contexto de Sinaí
  english_pob_reading: Singular 'God'
  chosen_spanish_reading: Singular 'Dios'
  alternative_spanish_readings:
  - plural 'dioses'
  rationale: La sintaxis hebrea y el contexto narrativo apuntan al único Dios de Israel; no hay base aquí para pluralizar el referente.
  doctrine_reference: Monoteísmo bíblico; concordancia gramatical del contexto inmediato
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior anclando la nota al texto: el marcador [a] aparece ahora en «con nosotros[a]». No se añadieron notas sin anclaje.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים por el contexto singular y la concordancia verbal.
  - Se prefiere «escucharemos» para reflejar la escucha receptiva que el inglés POB resolvió como 'listen'.
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - No se introdujo terminología eclesiástica ajena al hebreo; el registro es reverente pero directo.
