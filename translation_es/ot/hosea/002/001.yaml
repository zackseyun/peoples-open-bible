translation:
  language: es
  text: 'Sin embargo, el número de los hijos de Israel será como la arena del mar[a], que no puede medirse ni contarse; y en el lugar donde se les dice: «Ustedes no son mi pueblo», se les dirá: «Hijos del Dios vivo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendientes de Israel» y «descendientes del Dios vivo». El hebreo tiene «hijos» en ambas expresiones.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: Yet ... will be
  chosen_spanish: Sin embargo ... será
  alternatives_spanish:
  - Y ... será
  - Ahora ... será
  lexicon: HALOT
  rationale: La forma con waw introduce una inversión fuerte desde el juicio previo hacia la restauración; «Sin embargo» comunica bien ese giro discursivo sin perder el valor futuro de היה.
- source_word: מִסְפַּר
  english_pob_choice: the number
  chosen_spanish: el número
  alternatives_spanish:
  - la multitud
  lexicon: HALOT
  rationale: «El número» conserva el sustantivo concreto del hebreo y mantiene la relación con la idea de ser incontable en la cláusula siguiente.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos/niños de Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: «Hijos» refleja de manera directa בני y preserva el paralelismo interno con «Hijos del Dios vivo» al final del versículo.
- source_word: כְּחוֹל הַיָּם
  english_pob_choice: like the sand of the sea
  chosen_spanish: como la arena del mar
  alternatives_spanish:
  - como la arena junto al mar
  - como la arena de la mar
  lexicon: HALOT
  rationale: Es la equivalencia natural y fiel de la imagen hebrea de innumerabilidad, con español moderno y reverente.
- source_word: אֲשֶׁר לֹא יִמַּד וְלֹא יִסָּפֵר
  english_pob_choice: which cannot be measured or counted
  chosen_spanish: que no puede medirse ni contarse
  alternatives_spanish:
  - que no será medido ni contado
  - que no puede medirse y no puede contarse
  lexicon: HALOT
  rationale: Se conserva la doble imposibilidad de los verbos pasivos/mediales hebreos con una formulación natural en español.
- source_word: בִּמְקוֹם
  english_pob_choice: in the place
  chosen_spanish: en el lugar
  alternatives_spanish:
  - en el sitio
  - donde
  lexicon: HALOT
  rationale: «En el lugar» mantiene la concreción locativa antes de desarrollar la cláusula relativa, sin reducir prematuramente el sintagma a «donde».
- source_word: יֵאָמֵר ... יֵאָמֵר
  english_pob_choice: it is said ... it will be said
  chosen_spanish: se les diga ... se les dirá
  alternatives_spanish:
  - se diga ... se dirá
  - les digan ... les dirán
  lexicon: HALOT
  rationale: El impersonal con «se» reproduce de forma idiomática el pasivo hebreo y evita introducir un hablante específico.
- source_word: לֹא עַמִּי אַתֶּם
  english_pob_choice: You are not my people
  chosen_spanish: Ustedes no son mi pueblo
  alternatives_spanish:
  - No son mi pueblo
  - Ustedes no son mi gente
  lexicon: HALOT
  rationale: «Mi pueblo» es la fórmula de pacto natural y fiel en español; el pronombre plural mantiene el tono directo del discurso.
- source_word: בְּנֵי אֵל חָי
  english_pob_choice: Sons of the living God
  chosen_spanish: Hijos del Dios vivo
  alternatives_spanish:
  - Hijos del Dios viviente
  - Sons/Hijos del Dios vivo
  lexicon: HALOT
  rationale: «Dios vivo» es la expresión bíblica estable y natural en español. Se conserva «Hijos» para reflejar בני y sostener el paralelismo con «hijos de Israel».
theological_decisions:
- issue: Lenguaje filial masculino en el paralelismo restaurador
  english_pob_reading: Retain 'sons' in both 'sons of Israel' and 'Sons of the living God.'
  chosen_spanish_reading: Retener «hijos» en «los hijos de Israel» y «Hijos del Dios vivo».
  alternative_spanish_readings:
  - los niños de Israel / niños del Dios vivo
  - los hijos/descendientes de Israel / descendientes del Dios vivo
  rationale: El hebreo usa בני en ambas frases. Para preservar la correspondencia literaria y la forma del original, se mantiene «hijos» en vez de neutralizar el término.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Fuerza discursiva de la conjunción inicial
  english_pob_reading: Render adversatively with 'Yet' rather than a simple 'And.'
  chosen_spanish_reading: 'Renderizar con una conjunción adversativa: «Sin embargo».'
  alternative_spanish_readings:
  - Y
  - Ahora
  rationale: El contexto inmediato pasa del juicio al anuncio de reversión; «Sin embargo» expresa ese contraste sin añadir contenido ajeno al texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy, optimal equivalence
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en el texto español en «arena del mar[a]», de modo que cada marcador de nota aparece exactamente donde corresponde.
  spanish_consistency_notes:
  - Se mantuvo «hijos» de forma consistente en ambas expresiones paralelas.
  - Se usó «Dios vivo» por ser la forma bíblica natural en español y no una paráfrasis.
  - La estructura del versículo conserva el contraste profético entre juicio previo y restauración futura.
