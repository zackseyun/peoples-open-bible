translation:
  language: es
  text: 'Pero un mensajero llegó a Saúl, diciendo: «Apresúrate y ven[a], porque los filisteos han hecho una incursión en la tierra[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ve», más literalmente reflejando el hebreo לֵכָה. Se prefirió «ven» por la perspectiva contextual del mensajero que llama a Saúl.
    reason: lexical_alternative
  - marker: b
    text: O «han asaltado la tierra» o «han invadido la tierra». El verbo hebreo puede denotar una incursión de saqueo o un avance hostil contra el territorio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מַלְאָךְ
  english_pob_choice: But a messenger
  chosen_spanish: Pero un mensajero
  alternatives_spanish:
  - Y un mensajero
  - un enviado
  lexicon: HALOT
  rationale: מַלְאָךְ en contexto humano significa normalmente 'mensajero'. El prefijo conjuntivo se vierte como 'Pero' para reflejar la interrupción narrativa y el contraste con la persecución en curso de Saúl, siguiendo la lógica del auditor inglés.
- source_word: בָּא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: HALOT
  rationale: El perfecto de בוא en narración se expresa con naturalidad como 'llegó' en español moderno, manteniendo el valor de arribo puntual.
- source_word: אֶל שָׁאוּל
  english_pob_choice: to Saul
  chosen_spanish: a Saúl
  alternatives_spanish:
  - a Shaúl
  lexicon: HALOT
  rationale: Se conserva el nombre usual 'Saúl' para inteligibilidad en español; la preposición 'a' reproduce la dirección del hebreo אֶל.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y le dijo
  - con el mensaje
  lexicon: HALOT
  rationale: El infinitivo constructo introduce discurso directo; 'diciendo' es la equivalencia directa y sobria en español.
- source_word: מַהֲרָה
  english_pob_choice: Hurry
  chosen_spanish: Apresúrate
  alternatives_spanish:
  - Date prisa
  - Rápido
  lexicon: HALOT
  rationale: La forma exhortativa de מהר pide urgencia. 'Apresúrate' es una fórmula natural, digna y precisa, equivalente a 'Hurry'.
- source_word: וְלֵכָה
  english_pob_choice: and come
  chosen_spanish: y ven
  alternatives_spanish:
  - y ve
  - y acude
  lexicon: HALOT
  rationale: Aunque הלך literalmente es 'ir', aquí funciona desde la perspectiva del mensajero que convoca a Saúl al lugar amenazado; por eso 'ven' comunica mejor el movimiento requerido sin perder la fuerza del mandato. La alternativa más formal 've' queda como posibilidad implícita, pero no es la opción principal.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Introduce la razón del mandato urgente; 'porque' expresa causalidad de manera clara en español.
- source_word: פָשְׁטוּ
  english_pob_choice: have raided
  chosen_spanish: han invadido
  alternatives_spanish:
  - han saqueado
  - han hecho una incursión
  - han asaltado
  lexicon: HALOT
  rationale: El verbo פשט en contexto militar puede abarcar un raid o incursión hostil. En español, 'han invadido' comunica la entrada agresiva y la amenaza territorial que el contexto exige; las alternativas más específicas de 'incursión/saqueo' quedan abiertas porque el hebreo no obliga a un solo matiz castellano.
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Nombre étnico estándar en español bíblico.
- source_word: עַל הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: הָאָרֶץ se traduce con el término general 'la tierra', suficientemente amplio para el territorio amenazado. En este contexto, 'la tierra' conserva la ambigüedad geográfica del hebreo sin precisar indebidamente una unidad política.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió una formulación más natural para פָשְׁטוּ ('have raided') frente a una paráfrasis más explícita. En español se siguió una solución igualmente natural y precisa ('han invadido'), evitando cargar el verbo con un matiz de saqueo no exigido por el contexto inmediato.
  spanish_consistency_notes:
  - Se emplea 'Saúl' según la convención española estándar del nombre propio.
  - Se conserva el tono narrativo sobrio y directo, sin añadir elementos interpretativos ajenos al hebreo.
  - El mandato 'Apresúrate y ven' mantiene el paralelismo urgente del hebreo con estilo publicable en español bíblico contemporáneo.
