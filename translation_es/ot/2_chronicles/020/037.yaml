translation:
  language: es
  text: 'Entonces Eliezer hijo de Dodavahu, de Maresá, profetizó contra Josafat, diciendo: «Porque te uniste con Ocozías, Yahvé quebró tus obras[a]». Así que las naves fueron destrozadas y no pudieron ir[b] a Tarsis.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yahvé quebró tu empresa». El hebreo dice «tus obras», refiriéndose aquí al proyecto de construcción de naves de Josafat.
    reason: lexical_alternative
  - marker: b
    text: O «no pudieron ir» o «fueron impedidas de ir» a Tarsis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְנַבֵּא
  english_pob_choice: prophesied
  chosen_spanish: profetizó
  alternatives_spanish:
  - habló proféticamente
  - declaró como profeta
  lexicon: HALOT
  rationale: El verbo hitpael de נבא aquí expresa hablar en calidad de profeta. «Profetizó» mantiene ese valor formal en español sin añadir explicación innecesaria.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - acerca de
  - sobre
  lexicon: HALOT
  rationale: En este contexto, el oráculo va dirigido a Josafat con tono de reprensión; «contra» refleja mejor esa dirección adversativa que una simple referencia temática.
- source_word: מִמָּרֵשָׁה
  english_pob_choice: from Mareshah
  chosen_spanish: de Maresá
  alternatives_spanish:
  - desde Maresá
  - procedente de Maresá
  lexicon: HALOT
  rationale: El prefijo מִן indica origen o procedencia. «De Maresá» es natural en español y conserva la relación geográfica.
- source_word: כְּהִתְחַבֶּרְךָ
  english_pob_choice: Because you joined yourself with
  chosen_spanish: Porque te uniste con
  alternatives_spanish:
  - cuando te aliaste con
  - porque te asociaste con
  lexicon: HALOT
  rationale: El hitpael de חבר comunica unirse o aliarse con otro. «Te uniste con» preserva la fuerza reflexiva y la conexión causal del hebreo.
- source_word: פָּרַץ
  english_pob_choice: has broken
  chosen_spanish: quebró
  alternatives_spanish:
  - rompió
  - derribó
  - desbarató
  lexicon: HALOT
  rationale: El verbo puede expresar romper, irrumpir o frustrar. En esta frase, con «tus obras» como objeto, «quebró» reproduce bien la idea de frustrar o echar por tierra la empresa.
- source_word: מַעֲשֶׂיךָ
  english_pob_choice: your works
  chosen_spanish: tus obras
  alternatives_spanish:
  - tu obra
  - tu empresa
  - lo que emprendiste
  lexicon: HALOT
  rationale: El plural hebreo significa literalmente «tus obras». Se conserva esa forma, y el contexto de las naves aclara que se trata del proyecto naviero de Josafat.
- source_word: וַיִּשָּׁבְרוּ אֳנִיּוֹת
  english_pob_choice: So the ships were wrecked
  chosen_spanish: Así que las naves fueron destrozadas
  alternatives_spanish:
  - y las naves se rompieron
  - y las naves quedaron hechas pedazos
  - y las naves naufragaron
  lexicon: HALOT
  rationale: El nifal indica que las naves llegaron a estar quebradas. «Fueron destrozadas» comunica con claridad el resultado y mantiene la relación con el verbo de quebrar del verso anterior.
- source_word: וְלֹא עָצְרוּ לָלֶכֶת
  english_pob_choice: and were not able to go
  chosen_spanish: y no pudieron ir
  alternatives_spanish:
  - y no pudieron continuar
  - y no les fue posible ir
  - y fueron impedidas de ir
  lexicon: HALOT
  rationale: El verbo עצר aquí expresa quedar impedido o retenido. Como sujeto son naves, «no pudieron ir» transmite el efecto práctico de forma natural en español.
- source_word: תַּרְשִׁישׁ
  english_pob_choice: Tarshish
  chosen_spanish: Tarsis
  alternatives_spanish:
  - Tarshish
  lexicon: HALOT
  rationale: Es un nombre de lugar. En español bíblico se admite «Tarsis» como forma tradicional y legible; se mantiene como transliteración del topónimo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino del Tetragrama según la convención del proyecto: «Yahvé», en lugar de sustituirlo por un título.'
theological_decisions:
- issue: Alcance de «tus obras» en una reprensión profética
  english_pob_reading: The Hebrew says “your works,” referring here to Jehoshaphat’s shipbuilding enterprise.
  chosen_spanish_reading: «tus obras» se conserva literalmente, con la implicación contextual de la empresa naviera de Josafat.
  alternative_spanish_readings:
  - «tu empresa»
  - «lo que emprendiste»
  - «tu obra»
  rationale: La frase hebrea es plural y el texto inglés preserva esa tensión con una nota. En español conviene mantener «tus obras» en el cuerpo y dejar que el contexto explique el referente concreto, sin borrar la forma original.
  doctrine_reference: Principio de fidelidad lexical al plural hebreo מַעֲשֶׂיךָ y a la nota auditada de la POB inglesa.
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El versículo contiene el Tetragrama. Siguiendo la norma del proyecto, se traduce por el nombre propio divino «Yahvé» y no por una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH'
- issue: Causalidad y juicio en «porque te uniste con»
  english_pob_reading: Because you joined yourself with Ahaziah
  chosen_spanish_reading: Porque te uniste con Ocozías
  alternative_spanish_readings:
  - cuando te aliaste con Ocozías
  - por haberte aliado con Ocozías
  rationale: La construcción hebrea introduce la causa del juicio. «Porque» mantiene la relación causal directa; «te uniste con» conserva la unión/alineación sin convertirla en una formulación más técnica de la que el texto exige.
  doctrine_reference: 'Principio narrativo-profético: la acción política de Josafat es presentada como motivo del quebranto divino.'
translation_notes:
  revision_awareness: 'Se revisó el contexto auditado en inglés y no se introdujeron cambios sustantivos respecto a la lectura aprobada: se mantuvo la estructura causal, el valor adversativo de עַל, el plural literal «obras», y la conclusión sobre las naves. La única adaptación relevante es idiomática en español: «naves» y «fueron destrozadas» para expresar con naturalidad el resultado del hebreo sin alterar la correspondencia semántica.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» para el Tetragrama, conforme al estándar del proyecto.
  - Se mantiene «Mesías/Cristo» sin relevancia en este versículo; no aplica.
  - Se usa «Ocozías» para el nombre propio siguiendo la forma española bíblica habitual.
  - Se conserva el plural «obras» para reflejar מַעֲשֶׂיךָ y la nota explicativa del texto fuente.
  - Se eligió «naves» como término bíblico claro y compatible con el contexto de navegación hacia Tarsis.
