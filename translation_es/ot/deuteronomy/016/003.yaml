translation:
  language: es
  text: No comerás con él pan con levadura. Durante siete días comerás con él panes sin levadura[a], el pan de aflicción, porque saliste de la tierra de Egipto de prisa, para que recuerdes el día de tu salida de la tierra de Egipto todos los días de tu vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el pan de pobreza» o «el pan de miseria». La expresión hebrea puede enfatizar la dureza, la carencia o la aflicción asociadas con el éxodo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָיו
  english_pob_choice: with it
  chosen_spanish: con él
  alternatives_spanish:
  - con ello
  - junto con él
  - sobre él
  lexicon: HALOT
  rationale: En el contexto de la comida pascual, la preposición no describe ubicación física sino acompañamiento en la misma comida. 'Con él' conserva ese valor idiomático en español sin volverlo torpe.
- source_word: חָמֵץ
  english_pob_choice: leavened bread
  chosen_spanish: pan con levadura
  alternatives_spanish:
  - levadura
  - algo fermentado
  - pan leudado
  lexicon: HALOT
  rationale: La prohibición apunta al alimento consumido en la fiesta; 'pan con levadura' comunica de forma natural el resultado comestible, no solo el ingrediente.
- source_word: מַצּוֹת
  english_pob_choice: unleavened bread
  chosen_spanish: panes sin levadura
  alternatives_spanish:
  - tortas sin levadura
  - matzot
  - pan ácimo
  lexicon: HALOT
  rationale: '''Panes sin levadura'' es claro y fiel en español moderno. Mantiene el plural del hebreo y evita tecnicismos menos transparentes.'
- source_word: לֶחֶם עֹנִי
  english_pob_choice: the bread of affliction
  chosen_spanish: el pan de aflicción
  alternatives_spanish:
  - el pan de pobreza
  - el pan de miseria
  - el pan de la aflicción
  lexicon: HALOT
  rationale: '''Aflicción'' preserva la carga de sufrimiento y humillación asociada al éxodo, sin reducir el sentido a pobreza económica. Conserva la tensión lexical documentada por la POB inglesa.'
- source_word: בְחִפָּזוֹן
  english_pob_choice: in haste
  chosen_spanish: apresuradamente
  alternatives_spanish:
  - a toda prisa
  - en prisa
  - con premura
  lexicon: HALOT
  rationale: El adverbio español transmite el matiz de salida urgente y natural en contexto narrativo-litúrgico. Evita sobreinterpretar como pánico o alarma.
- source_word: לְמַעַן תִּזְכֹּר
  english_pob_choice: so that you may remember
  chosen_spanish: para que recuerdes
  alternatives_spanish:
  - a fin de que recuerdes
  - para recordar
  - de modo que recuerdes
  lexicon: HALOT
  rationale: La cláusula final expresa propósito. 'Para que recuerdes' mantiene el valor volitivo y la forma de mandato dirigido al oyente.
- source_word: יֹום צֵאתְךָ
  english_pob_choice: the day of your coming out
  chosen_spanish: el día de tu salida
  alternatives_spanish:
  - el día en que saliste
  - el día de tu salida de
  - el día de tu partida
  lexicon: HALOT
  rationale: En español, la construcción nominal 'el día de tu salida' conserva la compactación del hebreo y es idiomática; el complemento 'de la tierra de Egipto' hace explícito el referente.
- source_word: כֹּל יְמֵי חַיֶּיךָ
  english_pob_choice: all the days of your life
  chosen_spanish: todos los días de tu vida
  alternatives_spanish:
  - toda tu vida
  - durante toda tu vida
  - todos los días de tu existencia
  lexicon: HALOT
  rationale: Es la equivalencia idiomática más directa y reconocible en español, preservando el sentido distributivo de memoria continua a lo largo de la vida.
theological_decisions:
- issue: Sentido memorial de לֶחֶם עֹנִי
  english_pob_reading: Rendered as 'the bread of affliction' to preserve the memorial of hardship in Egypt and the urgency of departure.
  chosen_spanish_reading: Traducido como 'el pan de aflicción' para conservar el recuerdo ritual del sufrimiento y de la liberación apresurada.
  alternative_spanish_readings:
  - el pan de pobreza
  - el pan de miseria
  rationale: 'El hebreo puede señalar aflicción, pobreza o miseria. ''Aflicción'' mantiene esa amplitud y deja visible la tensión teológica: memoria del padecimiento y de la salvación.'
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'La redacción sigue el último estado revisado del texto fuente en inglés: se evitó añadir una conjunción causal inicial que no está en el hebreo. También se preservó la estructura breve y paralela del mandato, manteniendo el valor memorial y ritual sin ampliar el sentido.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - '''Con él'' mantiene el valor idiomático de עָלָיו en contexto de comida ritual.'
  - Se conservó el plural de 'panes sin levadura' para reflejar מַצּוֹת.
  - '''Aflicción'' se eligió como término principal para לֶחֶם עֹנִי, dejando alternativas en nota para no perder la amplitud semántica.'
