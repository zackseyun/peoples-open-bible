revisions:
- from: ¡Qué desfallecido[a] está tu corazón, declara el Señor Yahvé, cuando haces todas estas cosas, las obras de una prostituta descarada!
  to: ¡Qué débil es tu corazón, declara el Señor Yahvé, cuando haces todas estas cosas, las obras de una prostituta descarada[a]!
  rationale: Se ajusta אֲמֻלָה a 'débil' por fidelidad al expediente y mejor naturalidad en español. Se elimina la nota sobre 'desfallecido' y se restituye la nota léxica requerida para שַׁלָּטֶת, preservando la alternativa documentada ('dominante') y su campo semántico.
