translation:
  language: es
  text: los hijos de los siervos de Salomón[a], los hijos de Asafeiot, los hijos de Farida, los hijos de Jeeleí, los hijos de Lozón, los hijos de Isdael, los hijos de Safuei,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego presenta aquí varios nombres de familia que difieren notablemente del paralelo masorético aproximado, el cual tiene una lista más corta: «los hijos de Gidél, los hijos de Gahár, los hijos de Reaía».'
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὶ
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - hijos de
  lexicon: LSJ
  rationale: Fórmula genealógica repetida; en español, «los hijos de» mantiene el registro formal y es natural en listas de descendencia.
- source_word: παίδων Σαλωμών
  english_pob_choice: Solomon’s servants
  chosen_spanish: los siervos de Salomón
  alternatives_spanish:
  - los servidores de Salomón
  - los esclavos de Salomón
  lexicon: LSJ
  rationale: El griego permite la idea de siervos/servidores. «Siervos» conserva el matiz de pertenencia y subordinación sin forzar «esclavos» en un contexto genealógico-administrativo; además sigue la decisión inglesa auditada de no absolutizar la esclavitud como rasgo identitario aquí.
- source_word: Ἀσσαφειώθ
  english_pob_choice: Assapheioth
  chosen_spanish: Assafeiot
  alternatives_spanish:
  - Asafeiot
  - Assaphiot
  lexicon: transliteración griega
  rationale: Nombre propio transliterado desde el testimonio griego, conservando la secuencia aproximada de sonidos y una forma legible para el lector español.
- source_word: Φαρειδά
  english_pob_choice: Phaerida
  chosen_spanish: Farida
  alternatives_spanish:
  - Fareda
  - Phaerida
  lexicon: transliteración griega
  rationale: Se adapta a ortografía española natural, sin añadir aspiración inglesa; mantiene la forma griega como nombre propio transparente.
- source_word: Ἰεηλεί
  english_pob_choice: Jeelei
  chosen_spanish: Jeleí
  alternatives_spanish:
  - Ieleí
  - Yeleí
  lexicon: transliteración griega
  rationale: Se opta por una transliteración española legible del nombre griego, preservando la secuencia vocálica sin imponer una forma hebraizante no atestiguada aquí.
- source_word: Λοζών
  english_pob_choice: Lozon
  chosen_spanish: Lozón
  alternatives_spanish:
  - Lozon
  lexicon: transliteración griega
  rationale: Se conserva el nombre propio con acento gráfico español para indicar la prosodia probable y mantener lectura fluida.
- source_word: Ἰσδαήλ
  english_pob_choice: Isdael
  chosen_spanish: Isdael
  alternatives_spanish:
  - Yisdael
  lexicon: transliteración griega
  rationale: La forma española coincide con la transliteración base del griego y preserva el nombre propio sin armonizarlo con el paralelo hebreo.
- source_word: Σαφυεί
  english_pob_choice: Saphuei
  chosen_spanish: Safuei
  alternatives_spanish:
  - Saphuei
  - Safuie
  lexicon: transliteración griega
  rationale: Se ajusta a ortografía española sencilla y fiel al sonido aproximado del griego, evitando conservar grafías inglesas innecesarias.
theological_decisions:
- issue: Relación entre la lista griega y el paralelo masorético aproximado en Nehemías 7:57
  english_pob_reading: Translate the Greek list of names as it stands, while recognizing that the MT parallel preserves a shorter and substantially different set of names.
  chosen_spanish_reading: Traducir la lista griega tal como está, reconociendo en nota que el paralelo hebreo masorético conserva una serie más breve y distinta.
  alternative_spanish_readings:
  - Armonizar los nombres con Gidél, Gahár y Reaía
  rationale: La primacía textual corresponde al griego de 1 Esdras; el paralelo hebreo funciona como control, no como texto rector. Por eso se preserva la lista griega y se documenta la diferencia en una nota.
  doctrine_reference: 'PHILOSOPHY.md: primacía de la fuente original; política de paralelos MT para 1 Esdras'
translation_notes:
  revision_awareness: El último pase de revisión indicó que no se requerían cambios; se mantiene la traducción alineada con el testimonio griego de Swete 1909 y se conserva la diferencia con el paralelo hebreo en nota.
  spanish_consistency_notes:
  - Se usa «hijos de» para la fórmula genealógica, coherente con otros registros de linaje.
  - Se prefieren transliteraciones españolas legibles para nombres propios griegos, sin armonizarlos con el hebreo paralelo.
  - Se conserva «siervos» para παίδων por consistencia con la decisión inglesa auditada y por el carácter administrativo-genealógico del listado.
