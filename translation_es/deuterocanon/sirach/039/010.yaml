review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en la mayoría de los elementos: ἔθνη = «las naciones», σοφίαν = «sabiduría», ἐξαγγελεῖ = «proclamará», ἐκκλησία = «asamblea», ἔπαινον = «alabanza», y mantiene correctamente el posesivo singular «su». Sin embargo, διηγήσονται significa ‘relatarán/recontarán/contarán en detalle’, no ‘recitarán’. «Recitarán» desplaza el sentido hacia declamar de memoria o recitar un texto, lo cual no refleja con precisión el valor narrativo/testimonial del verbo griego ni la decisión léxica auditada en inglés.'
  spanish_quality_summary: El español es claro y digno, pero «recitarán su sabiduría» suena algo extraño en registro bíblico moderno y menos natural que «relatarán» o «contarán». La nota al pie está bien formulada y la sintaxis general fluye correctamente.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «asamblea» evita el anacronismo de «iglesia» para ἐκκλησία; no hay conflictos con términos doctrinales mayores. La única desalineación relevante es léxica: διηγήσονται debe reflejar narración/recuento, no recitación.'
  issues:
  - severity: medium
    issue: «recitarán» para διηγήσονται
    rationale: El verbo διηγέομαι denota narrar, relatar o contar con cierto detalle. «Recitar» en español suele implicar declamación o repetición memorizada, y no preserva bien la fuerza semántica del griego ni la rationale del English POB («will recount»).
  - severity: low
    issue: Anclaje de nota al pie sobre la palabra equivocada
    rationale: La nota explica una alternativa para ἐκκλησία («congregación»), pero el marcador [a] está colocado en «sabiduría». Conviene moverlo a «asamblea» para que el anclaje corresponda al término comentado.
  revised_spanish_text: Las naciones relatarán su sabiduría, y la asamblea[a] proclamará su alabanza.
  revised_footnotes:
  - marker: a
    text: 'O: «la congregación proclamará su alabanza». El griego ἐκκλησία designa la comunidad reunida o asamblea.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «recitarán» por «relatarán» para reflejar con mayor fidelidad el sentido narrativo de διηγήσονται y ajustarse a la decisión léxica auditada («will recount»). También se mueve la nota [a] desde «sabiduría» a «asamblea», porque la nota trata la alternativa de ἐκκλησία, no de σοφία.
