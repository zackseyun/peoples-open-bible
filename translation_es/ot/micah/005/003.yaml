    text: Or 'And they will live securely.' The Hebrew verb literally means 'dwell' or 'sit,' with security implied by the context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'for now'; some translations render this 'for then' to smooth the prophetic sequence, but the Hebrew adverb is 'now.'
    reason: alternative_reading
