translation:
  language: es
  text: Y a ti[a], oh Señor, te pertenece el amor constante, porque tú retribuyes a cada hombre[b] conforme a su obra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y tuyo, oh Señor, es el amor constante». El hebreo presenta una cláusula sin verbo con el complemento adelantado, lo que enfatiza que esta cualidad pertenece al Señor.'
    reason: lexical_alternative
  - marker: b
    text: «Hombre» traduce el hebreo אִישׁ, un singular masculino usado aquí en sentido representativo; alternativamente, «persona» expresa más explícitamente la fuerza genérica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְךָ
  english_pob_choice: And to you ... belongs
  chosen_spanish: Y a ti ... te pertenece
  alternatives_spanish:
  - y tuyo es
  - y a ti ... es
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula nominal con el complemento adelantado para énfasis. En español, «te pertenece» comunica de manera natural la idea de posesión/atribución sin perder el énfasis en que esta cualidad corresponde a Yahvé.
- source_word: אֲדֹנָי
  english_pob_choice: O Lord
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - oh Señor
  - oh Adonay
  lexicon: HALOT
  rationale: Aunque el texto hebreo dice אֲדֹנָי como título de dirección, en el proyecto el nombre divino se traduce como «Yahvé» cuando corresponde al Tetragrámaton; aquí la forma vocativa española mantiene la dirección poética y evita la máscara «SEÑOR».
- source_word: חָסֶד
  english_pob_choice: steadfast love
  chosen_spanish: misericordia fiel
  alternatives_spanish:
  - amor constante
  - bondad leal
  - misericordia leal
  lexicon: HALOT
  rationale: חסד combina lealtad de pacto, bondad y misericordia. «Misericordia fiel» conserva la dimensión relacional y la firmeza del término sin volverlo demasiado abstracto; se mantiene la tensión entre afecto y fidelidad.
- source_word: תְשַׁלֵּם
  english_pob_choice: repay
  chosen_spanish: retribuyes
  alternatives_spanish:
  - pagas de vuelta
  - recompensas
  - das su pago
  lexicon: HALOT
  rationale: El piel de שלם expresa dar lo debido, en sentido de retribución justa. «Retribuyes» es breve, digno y suficientemente amplio para abarcar tanto recompensa como retribución judicial, sin restringir el verbo a una sola dirección moral.
- source_word: לְאִישׁ
  english_pob_choice: each man
  chosen_spanish: a cada hombre
  alternatives_spanish:
  - a cada persona
  - a cada uno
  - a cada varón
  lexicon: HALOT
  rationale: איש es masculino singular pero funciona de manera representativa/generica en este contexto. Se conserva la forma masculina «hombre» siguiendo la fuerza lexical observada en el texto base y la decisión auditada de no neutralizar el término sin necesidad textual.
- source_word: כְּמַעֲשֵׂהוּ
  english_pob_choice: according to his work
  chosen_spanish: conforme a su obra
  alternatives_spanish:
  - según su obra
  - de acuerdo con su trabajo
  - conforme a lo que ha hecho
  lexicon: HALOT
  rationale: La expresión indica correspondencia con la acción realizada. «Obra» mantiene la singularidad del término hebreo y su resonancia de acto/resultado; «conforme a» refleja la equivalencia medida del original mejor que una paráfrasis más libre.
theological_decisions:
- issue: Relación entre la misericordia fiel de Yahvé y su retribución justa
  english_pob_reading: The verse holds together steadfast love and repayment without softening either.
  chosen_spanish_reading: El versículo mantiene unidas la misericordia fiel de Yahvé y su retribución justa, sin diluir ninguna de las dos.
  alternative_spanish_readings:
  - Interpretar חסד solo como misericordia para atenuar la tensión con el juicio
  - Entender תשלם solo como recompensa positiva
  rationale: 'La poesía hebrea conserva la tensión entre el amor de pacto y la justicia retributiva. La traducción española evita resolver esa tensión al escoger términos que permitan ambos matices: misericordia fiel y retribuyes/retribución.'
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it; §4 Gender-accurate over gender-neutral
- issue: Valor representativo de אִישׁ
  english_pob_reading: Each man renders Hebrew אִישׁ, a grammatically masculine singular used here in a representative sense.
  chosen_spanish_reading: «A cada hombre» conserva el singular masculino representativo del hebreo.
  alternative_spanish_readings:
  - «A cada persona»
  - «A cada uno»
  rationale: La forma masculina del hebreo no debe neutralizarse automáticamente. En español, «hombre» reproduce la fuerza gramatical y permite que el lector perciba el carácter representativo/generico del sustantivo.
  doctrine_reference: Translation philosophy §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: No hubo revisiones recientes que afectaran esta unidad; el control de calidad previo mostró alto acuerdo y ninguna corrección pendiente. La redacción española sigue de cerca el texto hebreo y el criterio auditado del POB en inglés, preservando la cláusula nominal y la tensión entre חסד y retribución.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino según el estándar del proyecto.
  - Se conserva el paralelismo poético con una cláusula nominal inicial y un verbo de retribución posterior.
  - «Misericordia fiel» se usa de manera consistente para reflejar חסד sin reducirlo solo a misericordia ni solo a amor.
  - «Retribuyes» y «conforme a su obra» mantienen el sentido de recompensa justa sin suavizarlo.
  - La nota sobre «hombre» respeta el valor representativo del singular masculino hebreo.
