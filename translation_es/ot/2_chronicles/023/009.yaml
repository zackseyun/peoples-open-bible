translation:
  language: es
  text: Entonces Joiada el sacerdote dio a los jefes de cientos[a] las lanzas, los escudos y los escudos grandes[b] que pertenecían al rey David, que estaban en la casa de Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los capitanes de cientos». El hebreo se refiere a oficiales militares sobre unidades de cien.
    reason: lexical_alternative
  - marker: b
    text: O «paveses» o «escudos mayores». El hebreo distingue este objeto de los escudos comunes.
    reason: lexical_alternative
  - marker: c
    text: O «el templo de Dios». Literalmente, «la casa de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוֹיָדָע הַכֹּהֵן
  english_pob_choice: Jehoiada the priest
  chosen_spanish: Joyaida el sacerdote
  alternatives_spanish:
  - Joiada el sacerdote
  - Jehoyadá el sacerdote
  lexicon: nombre propio hebreo transliterado
  rationale: Se translitera el nombre propio con una forma española natural y estable; se conserva el título apposicional «el sacerdote» como en el hebreo.
- source_word: לְשָׂרֵי הַמֵּאוֹת
  english_pob_choice: to the commanders of hundreds
  chosen_spanish: a los jefes de cientos
  alternatives_spanish:
  - a los comandantes de centenas
  - a los capitanes de cientos
  lexicon: HALOT
  rationale: «שָׂרֵי הַמֵּאוֹת» designa oficiales militares sobre unidades de cien. «Jefes de cientos» mantiene la estructura hebrea y evita una asociación romana implícita.
- source_word: הַחֲנִיתִים
  english_pob_choice: the spears
  chosen_spanish: las lanzas
  alternatives_spanish:
  - las jabalinas
  - las armas arrojadizas
  lexicon: HALOT
  rationale: El término designa una arma de asta; en español «lanza» es claro y fiel. «Lanzas» preserva el plural del hebreo.
- source_word: הַמָּגִנּוֹת
  english_pob_choice: the shields
  chosen_spanish: los escudos
  alternatives_spanish:
  - los broqueles
  - los paveses
  lexicon: HALOT
  rationale: «מגינים» es el término general para escudos. «Escudos» es la equivalencia natural y no introduce un matiz técnico innecesario.
- source_word: הַשְּׁלָטִים
  english_pob_choice: the large shields
  chosen_spanish: los escudos grandes
  alternatives_spanish:
  - los escudos mayores
  - los paveses
  lexicon: HALOT
  rationale: El hebreo distingue este objeto de los escudos normales. «Escudos grandes» conserva esa diferencia de manera transparente en español.
- source_word: אֲשֶׁר לַמֶּלֶךְ דָּוִיד
  english_pob_choice: that belonged to King David
  chosen_spanish: que pertenecían al rey David
  alternatives_spanish:
  - que eran del rey David
  - que eran propiedad del rey David
  lexicon: HALOT
  rationale: El relativo expresa posesión; el plural en español concuerda con los objetos enumerados. Se evita forzar una idea de antigüedad que el hebreo aquí no exige explícitamente.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  - la casa del Dios
  lexicon: HALOT
  rationale: Se conserva la expresión literal del hebreo, como en la POB inglesa. En español «casa de Dios» es natural y mantiene la dicción del Cronista.
theological_decisions:
- issue: Distinción entre «casa de Dios» y «templo de Dios»
  english_pob_reading: Literally, 'the house of God.' The English POB keeps the literal form in the main text, with a note that 'temple of God' is a valid sense.
  chosen_spanish_reading: la casa de Dios
  alternative_spanish_readings:
  - el templo de Dios
  rationale: Se conserva la formulación literal del hebreo para no perder la imagen del lugar sagrado tal como la presenta Crónicas. La opción «templo de Dios» queda implícita como sentido contextual, pero no desplaza la frase de base.
  doctrine_reference: none
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «had belonged» a «belonged» por reflejar más directamente el perfecto hebreo sin una anterioridad excesiva. En español se siguió ese ajuste con «pertenecían», que expresa posesión sin introducir pasado anterior innecesario.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el Tetragrámaton en la forma de cita divina directa; el texto habla de «Dios».
  - Se mantuvo un registro formal y bíblico, pero con sintaxis natural en español.
  - Se preservó la distinción entre dos clases de escudos, como en la POB inglesa.
