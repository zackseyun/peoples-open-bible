translation:
  language: es
  text: Los labios mentirosos son una abominación para Yahvé[a], pero los que actúan con fidelidad son su deleite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que practican fidelidad», «los que actúan con verdad» o «los que son dignos de confianza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹעֲבַת
  english_pob_choice: an abomination
  chosen_spanish: una abominación
  alternatives_spanish:
  - algo detestable
  - una cosa abominable
  lexicon: HALOT
  rationale: El sustantivo expresa algo moralmente repugnante o aborrecible; «abominación» conserva la fuerza ética fuerte del hebreo y sigue el valor que el POB documenta en inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino; en español se adopta «Yahvé» conforme al criterio del proyecto para preservar el Tetragrámaton como nombre personal, no como título sustituido.
- source_word: שִׂפְתֵי שָׁקֶר
  english_pob_choice: lying lips
  chosen_spanish: los labios mentirosos
  alternatives_spanish:
  - labios de mentira
  - labios falsos
  lexicon: HALOT
  rationale: La construcción hebrea significa literalmente «labios de mentira». «Labios mentirosos» mantiene la metáfora idiomática en un español natural y conserva el sentido moral de engaño.
- source_word: וְעֹשֵׂי
  english_pob_choice: but those who act
  chosen_spanish: pero los que actúan
  alternatives_spanish:
  - y los que hacen
  - pero los que hacen
  lexicon: HALOT
  rationale: El participio indica personas que hacen/actúan; en el paralelismo antitético, «pero» refleja bien el contraste implícito y «actúan» evita una literalidad áspera sin perder el valor aspectual.
- source_word: אֱמוּנָה
  english_pob_choice: faithfully
  chosen_spanish: con fidelidad
  alternatives_spanish:
  - fielmente
  - con lealtad
  - con verdad
  lexicon: HALOT
  rationale: Aquí el sustantivo denota fidelidad, fiabilidad y veracidad práctica. En español, la frase adverbial «con fidelidad» comunica la idea conductual sin reducirla a una sola matización.
- source_word: רְצוֹנוֹ
  english_pob_choice: his delight
  chosen_spanish: su deleite
  alternatives_spanish:
  - su favor
  - su placer
  - le son gratos
  lexicon: HALOT
  rationale: El término puede significar placer, favor o deleite. «Su deleite» preserva el paralelismo relacional con «abominación» y expresa con claridad el agrado personal de Yahvé.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el nombre propio divino visible en el texto, siguiendo la política del POB de no sustituir el Tetragrámaton por un título. «Yahvé» es la forma española estándar del mismo criterio transliterado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: No se introdujeron cambios doctrinales o textuales respecto del audit trail inglés; la versión española sigue el mismo contraste antitético y mantiene la fuerza de los términos clave. Se ajustó la sintaxis para que el paralelismo suene natural en español sin debilitar el hebreo.
  spanish_consistency_notes:
  - Se conservó el nombre divino como «Yahvé» de manera consistente con la terminología del proyecto.
  - «Abominación» mantiene el registro fuerte que el POB documenta para תּוֹעֲבַת.
  - «Con fidelidad» se eligió para preservar el matiz conductual de אֱמוּנָה sin convertirlo en una abstracción demasiado técnica.
  - El contraste con «pero» refleja el paralelismo adversativo implícito del proverbio.
