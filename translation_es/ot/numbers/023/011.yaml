    reason: lexical_alternative
  revision_rationale: Se revisa únicamente la representación del infinitivo absoluto hebreo para conservar mejor su fuerza enfática sin introducir la idea de intensidad cuantitativa. «Los has ciertamente bendecido» es más fiel al hebreo y al rastro auditado en inglés que «en gran manera».
