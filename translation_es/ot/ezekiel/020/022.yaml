translation:
  language: es
  text: Pero retiré mi mano[a], y actué por causa de mi nombre, para que no fuera profanado[b] a la vista de las naciones, ante cuyos ojos los había sacado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «volví atrás mi mano»; «aparté mi mano». El modismo hebreo expresa que Dios se abstuvo de llevar a cabo el juicio amenazado.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «para que no se profanara»; el objeto implícito es el nombre de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲשִׁבֹתִי אֶת־יָדִי
  english_pob_choice: I withdrew my hand
  chosen_spanish: retiré mi mano
  alternatives_spanish:
  - retiré mi mano hacia atrás
  - aparté mi mano
  - me abstuve
  lexicon: HALOT
  rationale: El hebreo es un modismo que expresa retraerse de ejecutar una acción prevista, no un movimiento físico aislado. «Retiré mi mano» conserva la imagen y comunica la restricción divina de modo natural en español.
- source_word: וָאַעַשׂ
  english_pob_choice: I acted
  chosen_spanish: actué
  alternatives_spanish:
  - procedí así
  - obré
  lexicon: HALOT
  rationale: עשה es amplio (‘hacer, actuar’). Aquí introduce la conducta de Dios en función de su nombre; «actué» es breve, claro y no añade matices ajenos al texto.
- source_word: לְמַעַן שְׁמִי
  english_pob_choice: for the sake of my name
  chosen_spanish: por amor de mi nombre
  alternatives_spanish:
  - por causa de mi nombre
  - por el bien de mi nombre
  - por la honra de mi nombre
  lexicon: HALOT
  rationale: Se mantiene el valor teológico de la expresión sin reemplazar «nombre» por una paráfrasis. «Por amor de» expresa finalidad y preocupación por el honor público del nombre divino con un registro bíblico inteligible.
- source_word: לְבִלְתִּי הֵחֵל
  english_pob_choice: so that it would not be profaned
  chosen_spanish: para que no fuera profanado
  alternatives_spanish:
  - para no profanarlo
  - a fin de que no fuera profanado
  - para que no quedara profanado
  lexicon: HALOT
  rationale: חלל comunica profanar/desecrar. En español, la pasiva «no fuera profanado» preserva el foco en el nombre de Dios implícito por el contexto, como hace la nota inglesa al explicitar ese referente.
- source_word: לְעֵינֵי הַגּוֹיִם
  english_pob_choice: in the sight of the nations
  chosen_spanish: a la vista de las naciones
  alternatives_spanish:
  - ante las naciones
  - en presencia de las naciones
  - delante de las naciones
  lexicon: HALOT
  rationale: La imagen es pública y perceptible. «A la vista de» conserva el motivo de observación de forma natural en español y mantiene la resonancia con el lenguaje de «ojos» del hebreo.
- source_word: אֲשֶׁר הוֹצֵאתִי אוֹתָם
  english_pob_choice: in whose sight I had brought them out
  chosen_spanish: ante cuyos ojos los había sacado
  alternatives_spanish:
  - ante cuya vista los había sacado
  - en cuyo presencia los había sacado
  - de cuyo campo visual los había sacado
  lexicon: HALOT
  rationale: הוציא en hiphil es ‘sacar, hacer salir’. «Los había sacado» es fiel y fluido en español. «Ante cuyos ojos» reproduce la repetición del motivo visual del hebreo y enlaza con la cláusula anterior.
theological_decisions:
- issue: Restricción divina frente al juicio amenazado
  english_pob_reading: The verse states that God refrained from executing the threatened action and instead acted to preserve the honor of his name before the nations.
  chosen_spanish_reading: El versículo dice que Dios retiró su mano, es decir, se abstuvo de ejecutar el juicio amenazado, y actuó para preservar el honor de su nombre delante de las naciones.
  alternative_spanish_readings:
  - Dios apartó su mano
  - Dios se contuvo
  rationale: La frase hebrea es idiomática; la traducción española mantiene la imagen de la mano y hace explícita la idea de contención. Esto conserva la tensión del texto entre juicio merecido y gracia gobernada por el nombre de Dios.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Relación entre «mi nombre» y la profanación pública
  english_pob_reading: '''My name'' is retained as a covenantal expression for God''s public honor/reputation, not paraphrased as ''my reputation'' in the main text.'
  chosen_spanish_reading: «Mi nombre» se conserva como expresión pactual del honor público de Dios; no se reemplaza por «mi reputación» en el texto principal.
  alternative_spanish_readings:
  - mi reputación
  - mi honra
  rationale: El hebreo dice literalmente «mi nombre». En español, conservarlo evita perder el peso bíblico-teológico de la fórmula y deja que el contexto explique su sentido de honor público entre las naciones.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB que prefirió «withdrew my hand» frente a «held back my hand» por mayor cercanía al modismo hebreo, y que ajustó la cláusula final para reflejar más directamente el doble «en cuya/s cuyos ojos/vista». La versión española refleja esa cercanía léxica con «retiré mi mano» y conserva la repetición visual con «a la vista de... ante cuyos ojos».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino explícito; aquí el sujeto está implícito en la primera persona divina, por lo que no se inserta.
  - Se conserva «mi nombre» y no se sustituye por términos eclesiásticos como «gloria» u «honra» salvo como apoyo explicativo en la nota.
  - «Naciones» traduce consistentemente גּוֹיִם con sentido colectivo, no etnológico técnico.
  - La puntuación mantiene un registro bíblico moderno y legible, con coma antes de la cláusula final para marcar la repetición enfática del motivo visual.
