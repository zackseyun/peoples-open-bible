translation:
  language: es
  text: 'Acán respondió a Josué y dijo[a]: «En verdad, yo he pecado contra Yahvé, el Dios de Israel, y esto es lo que hice:»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “así y así hice”. La expresión hebrea es un modismo que introduce los detalles de lo ocurrido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: En español, "respondió" conserva la estructura narrativa de réplica directa sin sonar forzado; junto con "dijo" reproduce la fórmula de diálogo del hebreo.
- source_word: עָכָן
  english_pob_choice: Achan
  chosen_spanish: Acán
  alternatives_spanish:
  - Achan
  lexicon: Convención bíblica española estándar
  rationale: Se translitera al castellano como "Acán" para lectura natural en español bíblico, manteniendo el nombre propio identificado en la tradición de traducción española.
- source_word: וַיֹּאמַר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: '"Dijo" mantiene el verbo de habla simple y fiel; en combinación con "respondió" preserva la secuencia narrativa hebrea.'
- source_word: אָמְנָה
  english_pob_choice: Truly
  chosen_spanish: En verdad
  alternatives_spanish:
  - Ciertamente
  - Verdaderamente
  - Sí, en verdad
  lexicon: HALOT
  rationale: La partícula expresa afirmación solemne en contexto confesional; "En verdad" transmite esa solemnidad sin cargar el registro hacia un arcaísmo excesivo.
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  - yo
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis; en español puede conservarse explícitamente como "yo" para reflejar el énfasis del hebreo.
- source_word: חָטָאתִי
  english_pob_choice: have sinned
  chosen_spanish: he pecado
  alternatives_spanish:
  - pecó
  - he pecado
  lexicon: HALOT
  rationale: El perfecto hebreo en una confesión presente se expresa bien con el presente perfecto español, que comunica una culpa ya cometida con relevancia actual.
- source_word: לַיהוָה
  english_pob_choice: against the LORD
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - a Yahvé
  - frente a Yahvé
  lexicon: HALOT
  rationale: Con חטא, la preposición puede marcar al agraviado; "contra" reproduce con claridad la relación ofensa-víctima. Se mantiene "Yahvé" según el criterio del proyecto para el Tetragrama.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - Dios de Israel
  lexicon: HALOT
  rationale: La construcción en aposición se vierte de forma directa y reverente, conservando el identificador pactal del Dios de Israel.
- source_word: וְכָזֹאת וְכָזֹאת
  english_pob_choice: this is what I did
  chosen_spanish: esto es lo que hice
  alternatives_spanish:
  - así y así hice
  - esto y esto hice
  - tal y tal cosa hice
  lexicon: HALOT
  rationale: El hebreo usa una fórmula idiomática de introducción de detalles; la versión española "esto es lo que hice" preserva la función introductoria y la naturalidad, sin forzar un calco como "así y así".
- source_word: עָשִׂיתִי
  english_pob_choice: I did
  chosen_spanish: hice
  alternatives_spanish:
  - he hecho
  - hice
  lexicon: HALOT
  rationale: El pretérito simple comunica la acción concreta anunciada por la fórmula previa y anticipa la explicación inmediata del versículo siguiente.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo contiene el Tetragrama y el proyecto exige "Yahvé" en el texto principal; se evita el reemplazo por una designación genérica para preservar el nombre de pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación de pecado con el objeto לַיהוָה
  english_pob_reading: have sinned against the LORD
  chosen_spanish_reading: he pecado contra Yahvé
  alternative_spanish_readings:
  - he pecado a Yahvé
  - he pecado delante de Yahvé
  rationale: Con חטא, el destinatario ofendido es parte del sentido; "contra" expresa mejor la ofensa personal y pactal en español.
  doctrine_reference: HALOT, entrada חטא; uso idiomático confesional
- issue: Fórmula idiomática וְכָזֹאת וְכָזֹאת
  english_pob_reading: this is what I did
  chosen_spanish_reading: esto es lo que hice
  alternative_spanish_readings:
  - así y así hice
  - esto y esto hice
  - tal y tal cosa hice
  rationale: La frase hebrea introduce la narración de los detalles; la traducción elegida mantiene esa función sin obscurecer el sentido con una literalidad opaca.
  doctrine_reference: Nota lexical del versículo
translation_notes:
  revision_awareness: Se corrigió el problema de validación asegurando que el marcador de nota [a] aparezca exactamente en el texto español y que la nota corresponda a la alternativa lexical documentada para la expresión idiomática.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como forma principal para יהוה, conforme al criterio del proyecto.
  - Se conserva la primera persona enfática con "yo" para reflejar אָנֹכִי.
  - El diálogo respeta la puntuación española con comillas angulares y dos puntos antes de la cita.
  - La nota [a] está anclada en el punto exacto donde comienza la fórmula idiomática traducida.
