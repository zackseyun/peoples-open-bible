    changes_summary: 'Made minor stylistic and lexical refinements: changed ''so as to'' to ''in order to'' for smoother formal English, ''what is righteous'' to ''what is right'' for more natural rendering of τὸ δίκαιον, and ''just as'' to ''as'' for concision. Kept the rest unchanged as accurate and complete.'
translation:
  language: es
  text: '1[a]. Y ahora oíd una palabra de verdad: escuchad para practicar la justicia y toda ley del Altísimo, y no os dejéis extraviar, hijos, por el espíritu de odio, porque es maligno en todas las acciones de los hombres. 2. Cuanto haga el que odia es abominable. Si alguien practica la ley del Señor[b], el que odia no lo elogia. Si alguien teme al Señor y desea lo que es justo, el que odia no lo ama. 3. Reprocha la verdad, envidia al que prospera, abraza la calumnia, ama la arrogancia, porque el odio ciega su alma, como cegó la mía cuando miraba a José.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'oíd la palabra verdadera'; la apertura griega admite tanto una formulación indefinida como una más definida en clave exhortativa.
    reason: lexical_alternative
  - marker: b
    text: '''El que prospera'' puede también rendirse ''el que tiene éxito'' o posiblemente ''el que obra rectamente'', pero el contexto inmediato de envidia favorece la acción exitosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λόγον ἀληθείας
  english_pob_choice: a word of truth
  chosen_spanish: una palabra de verdad
  alternatives_spanish:
  - una palabra verdadera
  - la palabra de verdad
  lexicon: LSJ
  rationale: Conserva la solemnidad introductoria del testamento.
- source_word: τοῦ ποιεῖν δικαιοσύνην
  english_pob_choice: in order to practice righteousness
  chosen_spanish: para practicar la justicia
  alternatives_spanish:
  - a fin de hacer justicia
  lexicon: LSJ
  rationale: Preserva la fuerza parenética del infinitivo de propósito.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: LSJ
  rationale: Default POB para δικαιοσύνη; abarca la conducta recta ante Dios.
- source_word: νόμον ὑψίστου
  english_pob_choice: every law of the Most High
  chosen_spanish: toda ley del Altísimo
  alternatives_spanish:
  - todo mandamiento del Altísimo
  lexicon: LSJ
  rationale: Mantiene el título divino elevado y el sentido distributivo de πάντα.
- source_word: πλανᾶσθε
  english_pob_choice: be led astray
  chosen_spanish: os dejéis extraviar
  alternatives_spanish:
  - os extraviéis
  - seáis engañados
  lexicon: LSJ
  rationale: El medio/pasivo sugiere ser desviado por una influencia externa.
- source_word: πνεύματι τοῦ μίσους
  english_pob_choice: the spirit of hatred
  chosen_spanish: el espíritu de odio
  alternatives_spanish:
  - un espíritu de odio
  lexicon: LSJ
  rationale: Conserva la fuerza moral personificada central a la advertencia.
- source_word: βδελυκτόν
  english_pob_choice: abominable
  chosen_spanish: abominable
  alternatives_spanish:
  - detestable
  lexicon: LSJ
  rationale: Termino fuerte moral-religioso que preserva la severidad.
- source_word: φοβεῖται Κύριον
  english_pob_choice: fears the Lord
  chosen_spanish: teme al Señor
  alternatives_spanish:
  - reverencia al Señor
  lexicon: LSJ
  rationale: Idioma bíblico tradicional, claro y de peso covenantal.
- source_word: θέλει τὸ δίκαιον
  english_pob_choice: desires what is right
  chosen_spanish: desea lo que es justo
  alternatives_spanish:
  - quiere lo recto
  lexicon: LSJ
  rationale: Expresa inclinación moral; 'lo que es justo' mantiene el registro ético.
- source_word: ψέγει
  english_pob_choice: reproaches
  chosen_spanish: reprocha
  alternatives_spanish:
  - censura
  - vitupera
  lexicon: LSJ
  rationale: Verbo fuerte de censura adecuado para el catálogo de vicios.
- source_word: τῷ κατορθοῦντι
  english_pob_choice: the one who prospers
  chosen_spanish: el que prospera
  alternatives_spanish:
  - el que tiene éxito
  - el que obra rectamente
  lexicon: LSJ
  rationale: El contexto con envidia favorece acción próspera/exitosa.
- source_word: καταλαλιὰν ἀσπάζεται
  english_pob_choice: embraces slander
  chosen_spanish: abraza la calumnia
  alternatives_spanish:
  - acoge la maledicencia
  lexicon: LSJ
  rationale: Conserva la metáfora viva del afecto por la difamación.
- source_word: ὑπερηφανίαν
  english_pob_choice: arrogance
  chosen_spanish: arrogancia
  alternatives_spanish:
  - soberbia
  lexicon: LSJ
  rationale: Evita el más amplio 'orgullo' y conserva la nitidez del catálogo.
- source_word: ἐκτυφλοῖ τὴν ψυχήν
  english_pob_choice: blinds his soul
  chosen_spanish: ciega su alma
  alternatives_spanish:
  - oscurece el alma
  lexicon: LSJ
  rationale: Directo y vivaz; transmite la metáfora con claridad.
theological_decisions:
- issue: Personificación del odio como fuerza espiritual
  chosen_reading: Traducir πνεύματι τοῦ μίσους como 'el espíritu de odio' en el texto principal
  alternative_readings:
  - por un espíritu de odio
  - por intención odiosa
  rationale: El griego permite naturalmente una fuerza moral personificada o cuasipersonificada. Conservar 'espíritu' mantiene la textura moral-psicológica del Testamento sin forzar una lectura plenamente demonológica.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'El revision_pass de gpt-5.4 efectuó refinamientos estilísticos menores en el inglés: ''so as to'' → ''in order to'', ''what is righteous'' → ''what is right'', ''just as'' → ''as''. En español usamos ''para practicar'', ''lo que es justo'' (preserva matiz ético) y ''como'' (sin ''tal''), conformes a la concisión y formalidad de la revisión.'
  spanish_consistency_notes:
  - '''hijos'' en vocativo sin posesivo, alineado con la revisión inglesa.'
  - '''el Altísimo'' para ὑψίστου.'
  - '''el espíritu de odio'' (artículo definido) para personificación moral.'
  - '''el que odia'' para ὁ μισῶν a lo largo del capítulo.'
  - '''José'' como nombre propio en español.'
