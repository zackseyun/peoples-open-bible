revisions:
- from: ¡Cuántas veces se rebelaron contra él en el desierto[a] y lo entristecieron[b] en la estepa![a]
  to: ¡Cuántas veces[a] se rebelaron contra él en el desierto, y lo entristecieron[b] en el yermo!
  rationale: Se corrige el anclaje y la unicidad de las notas para cumplir el formato requerido y reflejar con precisión las decisiones léxicas del expediente inglés. Se mantiene la estructura y el sentido del borrador, pero se sustituye «estepa» por «yermo» para representar mejor בִּישִׁימוֹן como lugar desolado y distinguirlo de «desierto» sin introducir un matiz geográfico menos adecuado. También se mejora la naturalidad de las alternativas en nota.
