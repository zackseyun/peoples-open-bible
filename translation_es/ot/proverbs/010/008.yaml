translation:
  language: es
  text: El sabio de corazón acepta mandatos, pero el necio de labios[a] caerá en ruina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: “el necio de labios será derribado”. El verbo final es raro y puede significar ser echado abajo o llegar a la ruina.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲכַם לֵב
  english_pob_choice: a wise-hearted man
  chosen_spanish: el sabio de corazón
  alternatives_spanish:
  - el hombre sabio de corazón
  - el sabio en corazón
  - una persona sabia de corazón
  lexicon: HALOT
  rationale: Conserva la imagen hebrea de la sede interior del pensamiento y la voluntad en el “corazón”, sin volverla un mero adorno emocional. En español, “el sabio de corazón” suena natural y mantiene la densidad proverbial del hebreo.
- source_word: יִקַּח
  english_pob_choice: accepts
  chosen_spanish: recibe
  alternatives_spanish:
  - acepta
  - toma
  - recibe y acepta
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente “tomar”, pero en este contexto expresa la recepción de mandatos. “Recibe” es fiel y natural; “acepta” también es posible, pero “recibe” preserva mejor la idea de acoger lo mandado.
- source_word: מִצְוֺת
  english_pob_choice: commands
  chosen_spanish: mandatos
  alternatives_spanish:
  - mandamientos
  - instrucciones
  - órdenes
  lexicon: HALOT
  rationale: “Mandatos” conserva la fuerza normativa del plural hebreo sin sonar excesivamente eclesiástico como “mandamientos”, ni demasiado débil como “instrucciones”. Es una buena equivalencia para el tono sapiencial.
- source_word: אֱוִיל
  english_pob_choice: a foolish man
  chosen_spanish: el necio
  alternatives_spanish:
  - el hombre necio
  - el insensato
  - un necio
  lexicon: HALOT
  rationale: En proverbios, el término designa una categoría moral y práctica. “Necio” es la forma española más estable y sobria para ese contraste sapiencial, y evita una paráfrasis psicológica.
- source_word: שְׂפָתַיִם
  english_pob_choice: of lips
  chosen_spanish: de labios
  alternatives_spanish:
  - labioso
  - hablador
  - con labios
  lexicon: HALOT
  rationale: La construcción hebrea identifica al necio por su habla. “De labios” reproduce la imagen de modo transparente. Aunque en español resulte algo marcado, preserva el rasgo expresivo del original mejor que “hablador”, que ya interpreta.
- source_word: יִלָּבֵט
  english_pob_choice: will come to ruin
  chosen_spanish: caerá en ruina
  alternatives_spanish:
  - será derribado
  - se precipitará
  - acabará arruinado
  lexicon: HALOT
  rationale: El verbo es raro y la tradición textual/lexical admite el matiz de ser derribado o llegar a la ruina. “Caerá en ruina” mantiene la pasividad/resultatividad del hebreo y sugiere el sentido de derrumbe sin exagerar la imagen.
translation_notes:
  revision_awareness: La redacción sigue el sentido del texto hebreo masorético y la solución inglesa revisada (“will come to ruin”), pero evita depender mecánicamente del inglés. Se preserva la tensión del verbo raro יִלָּבֵט mediante una traducción principal natural y una nota que mantiene la alternativa más literal.
  spanish_consistency_notes:
  - Se usó “Yahvé” solo cuando corresponda; este versículo no contiene el nombre divino.
  - “Necio” se mantiene para אֱוִיל por consistencia sapiencial.
  - “Mandatos” se eligió como equivalente de מִצְוֺת por su fuerza normativa y neutralidad estilística.
  - La nota al pie preserva la incertidumbre léxica del verbo final sin resolverla de manera excesiva.
