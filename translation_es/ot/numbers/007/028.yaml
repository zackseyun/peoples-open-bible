lexical_decisions:
- source_word: שְׂעִיר
  english_pob_choice: male goat
  chosen_spanish: macho cabrío
  alternatives_spanish:
  - cabro
  - macho de cabra
  lexicon: HALOT
  rationale: En contexto sacrificial, שְׂעִיר designa un macho de cabra; «macho cabrío» conserva el rasgo de sexo explícito que el hebreo expresa y suena natural en español bíblico contemporáneo.
- source_word: עִזִּים
  english_pob_choice: goat
  chosen_spanish: de las cabras
  alternatives_spanish:
  - de cabras
  - cabras
  lexicon: HALOT
  rationale: El complemento constructo especifica la especie o clase («de cabras»). En español, «macho cabrío de las cabras» mantiene la relación del hebreo sin perder claridad, aunque sea algo más literal que una sola expresión idiomática.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  - un solo
  lexicon: HALOT
  rationale: El numeral es explícito en el hebreo y debe conservarse; en español, ante un sustantivo masculino singular, «un» expresa correctamente la cantidad sin añadir énfasis innecesario.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para una ofrenda por el pecado
  alternatives_spanish:
  - como ofrenda por el pecado
  - para una ofrenda expiatoria
  lexicon: HALOT
  rationale: En este contexto cultual, חַטָּאת corresponde a la ofrenda por el pecado, no al pecado abstracto. «Para una ofrenda por el pecado» conserva el valor sacrificial y es comprensible en español moderno.
theological_decisions:
- issue: Sentido cultual de חַטָּאת
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda expiatoria
  - sacrificio por el pecado
  rationale: La lista inmediata de animales para sacrificio requiere el sentido litúrgico/cultual. «Ofrenda por el pecado» evita trasladar al texto una interpretación más abstracta o moralizante de ‘pecado’.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve the source text''s plain sacrificial sense.'
translation_notes:
  revision_awareness: El pasaje coincide plenamente con la línea inglesa auditada (high_agreement, sin revisiones aplicadas). Se mantuvo el sentido sacrificial directo del hebreo y se evitó introducir glosas no necesarias.
  spanish_consistency_notes:
  - Se conserva el número singular explícito («un») como en el hebreo y en la versión inglesa auditada.
  - Se eligió «ofrenda por el pecado» para mantener el sentido cultual de חַטָּאת en una lista de ofrendas.
  - No se usaron notas al pie porque el verso es directo y la validación previa requería que todo marcador aparezca en el texto.
