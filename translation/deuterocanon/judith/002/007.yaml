id: JDT.2.7
reference: Judith 2:7
source:
  edition: lxx-swete-1909
  text: καὶ ἑτοιμάζειν γῆν καὶ ὕδωρ, ὅτι ἐξελεύσομαι ἐν θυμῷ μου ἐπʼ αὐτούς, καὶ καλύψω πᾶν τὸ πρόσωπον τῆς γῆς τοῖς ποσὶν τῆς δυνάμεώς μου, καὶ δώσω αὐτοὺς εἰς διαρπαγὴν αὐτοῖς·
  language: Greek
