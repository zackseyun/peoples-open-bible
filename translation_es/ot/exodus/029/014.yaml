revisions:
- from: Pero la carne del toro[a], y su piel, y su estiércol, los quemarás con fuego fuera del campamento; es una ofrenda por el pecado.
  to: Pero la carne del toro[a], y su piel, y su estiércol, quemarás todo eso con fuego fuera del campamento; es una ofrenda por el pecado.
