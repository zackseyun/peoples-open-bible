translation:
  language: es
  text: Ante un[a] maestro y una maestra, avergüénzate de una mentira; ante una asamblea y el pueblo, de una transgresión; ante un compañero y un amigo, de una mala acción[b]; y donde resides[c], de un robo[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice 'maestro y maestra'; el paralelo griego tiene 'juez y gobernante'. El texto principal sigue el hebreo como testimonio primario del Sirácides hebreo conservado.
    reason: textual_variant
  - marker: b
    text: El hebreo מעל también puede traducirse como 'transgresión' o 'quebrantamiento de la confianza'.
    reason: lexical_alternative
  - marker: c
    text: 'La frase hebrea es difícil: literalmente, algo como ''desde/en el lugar donde resides, acerca de זר''.'
    reason: textual_variant
  - marker: d
    text: El paralelo griego apunta hacia 'robo/robar', lo que se refleja en el texto principal.
    reason: textual_variant
lexical_decisions:
- source_word: מאדון וגברת
  english_pob_choice: Before a master and mistress
  chosen_spanish: Ante un maestro y una maestra
  alternatives_spanish:
  - Ante un señor y una señora
  - Delante de un amo y una ama
  lexicon: HALOT
  rationale: Sigo el testimonio hebreo principal, como hace el POB inglés. En español, 'maestro/maestra' evita la aspereza de 'amo/ama' y conserva el paralelismo humano sin introducir un tono innecesariamente social o litúrgico. 'Ante' reproduce el valor relacional de la frase de vergüenza pública mejor que un simple 'de'.
- source_word: על שקר
  english_pob_choice: of a lie
  chosen_spanish: de una mentira
  alternatives_spanish:
  - de falsedad
  - por mentir
  lexicon: HALOT
  rationale: '''Mentira'' es el equivalente más natural y preciso en español para שקר en este contexto de lista de vergüenzas. Mantiene el sustantivo del original sin suavizarlo en una paráfrasis verbal.'
- source_word: מעדה ועם
  english_pob_choice: before an assembly and the people
  chosen_spanish: ante una asamblea y el pueblo
  alternatives_spanish:
  - ante una congregación y el pueblo
  - ante la asamblea y la gente
  lexicon: HALOT
  rationale: '''Asamblea'' conserva el sentido amplio de עדה sin cargarlo demasiado con resonancias específicamente cúlticas. ''El pueblo'' reproduce עם de forma directa y clara.'
- source_word: על פשע
  english_pob_choice: of transgression
  chosen_spanish: de una transgresión
  alternatives_spanish:
  - de una ofensa
  - de una rebelión
  lexicon: HALOT
  rationale: '''Transgresión'' preserva el peso moral y jurídico de פשע mejor que ''ofensa''. En español suena elevado pero todavía transparente.'
- source_word: מחבר ורע
  english_pob_choice: before a companion and a friend
  chosen_spanish: ante un compañero y un amigo
  alternatives_spanish:
  - ante un asociado y un amigo
  - ante un compañero y un camarada
  lexicon: HALOT
  rationale: La pareja hebrea denota vínculos cercanos; 'compañero y amigo' es la formulación más natural y mantiene el paralelismo sin introducir matices comerciales que el contexto no exige.
- source_word: על מעל
  english_pob_choice: of wrongdoing
  chosen_spanish: de una mala acción
  alternatives_spanish:
  - de un agravio
  - de una infidelidad
  - de un abuso
  lexicon: HALOT
  rationale: '''Mala acción'' comunica la amplitud semántica de מעל sin forzar una lectura exclusivamente cultual o legal. En una lista de vergüenzas, funciona bien en español y deja espacio a la alternativa ''trespass/breach of trust'' señalada por el POB inglés.'
- source_word: וממקום תגור
  english_pob_choice: and where you sojourn
  chosen_spanish: y donde sojuznes
  alternatives_spanish:
  - y donde sojornes
  - y en el lugar donde habites
  lexicon: HALOT
  rationale: El hebreo sugiere el lugar donde uno reside o se aloja. La forma elegida intenta reflejar el matiz de residencia/sojourn con un verbo cercano al campo léxico, aunque es menos común en español; se documenta la tensión porque la redacción más idiomática ('donde sojornes') sería más clara, pero también menos transparente para la raíz hebrea.
- source_word: על זר
  english_pob_choice: of theft
  chosen_spanish: de un robo
  alternatives_spanish:
  - de hurto
  - de lo ajeno
  - de bienes ajenos
  lexicon: HALOT
  rationale: La lectura es difícil, y el paralelo griego apoya el sentido de robo/stealing. 'Robo' recoge bien ese valor en español y mantiene el cierre de la lista de vergüenzas de manera clara y audit-able.
theological_decisions:
- issue: Uso de la variante hebrea frente al paralelo griego
  english_pob_reading: The main text follows the Hebrew as the primary witness for extant Hebrew Sirach, while acknowledging the Greek parallel 'judge and ruler' as a textual variant.
  chosen_spanish_reading: 'El texto principal sigue el hebreo: ''maestro y maestra''.'
  alternative_spanish_readings:
  - '''juez y gobernante'''
  - '''juez y magistrado'''
  rationale: Siguiendo el POB inglés, el testimonio hebreo es la base principal porque es la forma extante más directa de Sirácides en este versículo. La variante griega se reconoce como respaldo textual alterno, pero no se impone en el cuerpo principal.
  doctrine_reference: Textual criticism / witness priority
- issue: 'Último miembro difícil: משמעות de זר'
  english_pob_reading: The final Hebrew phrase is difficult; the Greek parallel points toward 'theft/stealing,' which is reflected in the main text.
  chosen_spanish_reading: '''de un robo'''
  alternative_spanish_readings:
  - '''de lo ajeno'''
  - '''de una cosa extraña'''
  - '''de la propiedad ajena'''
  rationale: La decisión mantiene visible la dificultad textual y no la borra con una solución demasiado segura. 'Robo' es la mejor síntesis del apoyo griego y del sentido contextual de la lista de vergüenzas, sin inventar un detalle no atestiguado.
  doctrine_reference: Textual criticism / semantic ambiguity
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB, que sustituyó ''where you live'' por ''where you sojourn'' para acercarse más a ממקום תגור. La versión española refleja ese ajuste y mantiene la misma prioridad textual: hebreo como base principal, griego como paralelo de control para el último miembro difícil.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa 'ante' de manera consistente para el marco de vergüenza pública, porque en español comunica mejor la relación social del hebreo que un literal 'de frente a'.
  - '''Transgresión'' y ''mala acción'' conservan dos grados de gravedad sin colapsarlos en un solo término.'
  - Se evitó 'siervo', 'congregación' o 'SEÑOR' porque el contexto y la evidencia no los exigen como opciones principales.
