translation:
  language: es
  text: Porque hemos oído de tu sabiduría y de la astucia de tu alma[a], y se ha divulgado por toda la tierra[b] que solo tú eres bueno en todo el reino[c], poderoso en conocimiento, y maravilloso en los ejércitos de guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la astucia de tu alma»; ψυχή puede significar «alma», «vida» o el yo interior, pero aquí probablemente se refiere a la facultad interna de pensar o planear.
    reason: lexical_alternative
  - marker: b
    text: O «por toda la tierra»; γῆ puede significar «tierra», «país» o «mundo», según el contexto.
    reason: lexical_alternative
  - marker: c
    text: O «en el reino entero»; el singular probablemente alude a su dominio entero, no a todos los reinos universalmente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠκούσαμεν
  english_pob_choice: we have heard
  chosen_spanish: hemos oído
  alternatives_spanish:
  - oímos
  - hemos escuchado
  lexicon: LSJ
  rationale: El aoristo en este contexto de discurso cortesano comunica información recibida y vigente; «hemos oído» preserva ese valor resultativo sin volverlo demasiado literal.
- source_word: σοφίαν
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - conocimiento
  lexicon: LSJ
  rationale: «Sabiduría» es el equivalente natural y más fiel en español para σοφία en este elogio.
- source_word: πανουργεύματα
  english_pob_choice: cunning
  chosen_spanish: astucia
  alternatives_spanish:
  - ingenio
  - habilidad
  - cautela
  lexicon: LSJ
  rationale: La palabra griega puede oscilar entre habilidad perspicaz y matiz más retorcido; «astucia» conserva esa ambigüedad mejor que opciones demasiado positivas como «ingenio».
- source_word: τῆς ψυχῆς σου
  english_pob_choice: of your soul
  chosen_spanish: de tu alma
  alternatives_spanish:
  - de tu vida
  - de tu interior
  - de tu mente
  lexicon: LSJ
  rationale: Aunque ψυχή puede abarcar «alma», «vida» o interioridad, aquí alude al centro interno del pensar y planear. «Alma» sigue de cerca el alcance del griego y mantiene el tono formal.
- source_word: ἀνηγγέλη
  english_pob_choice: it has been reported
  chosen_spanish: se ha anunciado
  alternatives_spanish:
  - se ha informado
  - se ha divulgado
  - fue anunciado
  lexicon: LSJ
  rationale: La pasiva impersonal se conserva con una forma natural en español. «Se ha anunciado» comunica difusión general sin centrar el sujeto agente.
- source_word: πάσῃ τῇ γῇ
  english_pob_choice: throughout all the earth
  chosen_spanish: por toda la tierra
  alternatives_spanish:
  - por toda la tierra habitada
  - por toda la tierra/país
  - por todo el mundo
  lexicon: LSJ
  rationale: «Tierra» refleja γῆ con la amplitud hiperbólica del discurso; evita limitarlo a «país» y no fuerza el giro moderno «mundo».
- source_word: μόνος
  english_pob_choice: alone
  chosen_spanish: solo tú
  alternatives_spanish:
  - únicamente tú
  - tú solo
  lexicon: LSJ
  rationale: El adverbio se integra de modo idiomático en español para marcar la exclusividad enfática del sujeto.
- source_word: ἀγαθὸς
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - noble
  - excelente
  lexicon: LSJ
  rationale: «Bueno» es la correspondencia más directa y sobria; en este contexto el elogio es general y no exige una especificación más estrecha.
- source_word: ἐν πάσῃ βασιλείᾳ
  english_pob_choice: in all the kingdom
  chosen_spanish: en todo el reino
  alternatives_spanish:
  - en todo el reino / en todo tu reino
  - en todo el reino entero
  - en todo reino
  lexicon: LSJ
  rationale: La forma singular βασιλείᾳ se entiende naturalmente como la esfera total de su dominio. «En todo el reino» mantiene esa lectura sin universalizarla.
- source_word: δυνατὸς ἐν ἐπιστήμῃ
  english_pob_choice: mighty in knowledge
  chosen_spanish: poderoso en conocimiento
  alternatives_spanish:
  - poderoso en saber
  - fuerte en conocimiento
  - muy sabio
  lexicon: LSJ
  rationale: Se conserva la unión inusual de fuerza con capacidad intelectual. «Poderoso en conocimiento» suena formal y respeta la construcción.
- source_word: θαυμαστὸς
  english_pob_choice: marvelous
  chosen_spanish: admirable
  alternatives_spanish:
  - maravilloso
  - asombroso
  lexicon: LSJ
  rationale: «Admirable» preserva el tono encomiástico y resulta natural en español culto; evita un matiz excesivamente emotivo de «maravilloso».
- source_word: ἐν στρατεύμασιν πολέμου
  english_pob_choice: in the armies of war
  chosen_spanish: en los ejércitos de guerra
  alternatives_spanish:
  - en los ejércitos para la guerra
  - en las huestes de guerra
  - en las fuerzas de combate
  lexicon: LSJ
  rationale: La expresión griega es militar y algo redundante. «Ejércitos de guerra» mantiene el paralelismo formal sin diluir la imagen bélica.
theological_decisions:
- issue: Alcance de γῆ
  english_pob_reading: throughout all the earth
  chosen_spanish_reading: por toda la tierra
  alternative_spanish_readings:
  - por toda la tierra habitada
  - por todo el mundo
  - por todo el país
  rationale: No se restringe a un país ni se moderniza a una formulación interpretativa; se conserva la amplitud hiperbólica del elogio cortesano del texto griego.
  doctrine_reference: N/A
- issue: Valor de ψυχή en la expresión «la astucia de tu alma»
  english_pob_reading: the cunning of your soul
  chosen_spanish_reading: la astucia de tu alma
  alternative_spanish_readings:
  - la astucia de tu interior
  - la astucia de tu mente
  - la astucia de tu vida
  rationale: Se mantiene la tensión de ψυχή entre interioridad, vida y alma, sin reducirla a una psicología moderna; el español «alma» es el reflejo más cercano y auditable.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El texto español sigue el estado revisado más reciente del audit trail: se prefirió una forma que refleje directamente ψυχῆς como interioridad/alma, conservando el elogio retórico completo y la estructura paralela del griego.'
  spanish_consistency_notes:
  - Se mantuvo un registro solemne y bibliocéntrico, sin calcar el inglés de forma innecesaria.
  - «Sabiduría» se reservó para σοφία y «astucia» para πανουργεύματα, preservando la tensión entre elogio y posible ambivalencia.
  - Se respetó la ambigüedad de ψυχή con una nota, en lugar de normalizarla a «mente».
  - La pasiva impersonal en español conserva la difusión amplia del anuncio sin introducir un sujeto no presente en el griego.
