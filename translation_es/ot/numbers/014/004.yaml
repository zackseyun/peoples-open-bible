translation:
  language: es
  text: 'Y dijeron unos a otros[a]: «Designemos un líder[b] y volvamos a Egipto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «cada hombre a su hermano». El modismo hebreo expresa reciprocidad entre ellos.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «pongamos una cabeza». Aquí «cabeza» significa una persona colocada sobre el grupo, es decir, un líder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they said
  chosen_spanish: Y se decían
  alternatives_spanish:
  - Y dijeron
  - Entonces se decían
  lexicon: HALOT
  rationale: El wayyiqtol marca avance narrativo; en español, el imperfecto con valor iterativo/recíproco comunica bien la conversación mutua sin perder la secuencia del relato.
- source_word: אִישׁ אֶל אָחִיו
  english_pob_choice: to one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - cada uno a su hermano
  - el uno al otro
  lexicon: HALOT
  rationale: El hebreo es literalmente un modismo distributivo ('un hombre a su hermano'), pero aquí expresa reciprocidad entre los miembros del grupo. 'Unos a otros' transmite el sentido natural en español.
- source_word: נִתְּנָה
  english_pob_choice: Let us appoint
  chosen_spanish: Designemos
  alternatives_spanish:
  - Pongamos
  - Establezcamos
  - Nombramos
  lexicon: HALOT
  rationale: 'La forma cohortativa con נתן y objeto רֹאשׁ es idiomática: ''poner/nombrar cabeza'' = designar a alguien como autoridad. ''Designemos'' conserva la fuerza exhortativa y evita un calco oscuro.'
- source_word: רֹאשׁ
  english_pob_choice: a leader
  chosen_spanish: un jefe
  alternatives_spanish:
  - un líder
  - una cabeza
  - un principal
  lexicon: HALOT
  rationale: Aunque literalmente es 'cabeza', aquí designa a la persona colocada al frente del grupo. 'Jefe' comunica la función de autoridad con naturalidad en español; 'líder' es posible, pero menos marcado como cargo.
- source_word: וְנָשׁוּבָה
  english_pob_choice: and return
  chosen_spanish: y volvamos
  alternatives_spanish:
  - y regresemos
  - y retornemos
  lexicon: HALOT
  rationale: La cohortativa de שוב mantiene el tono volitivo. 'Volvamos' reproduce la exhortación inclusiva de primera persona plural de forma idiomática.
- source_word: מִצְרָיְמָה
  english_pob_choice: to Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - de vuelta a Egipto
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia Egipto; 'a Egipto' es suficiente en español, mientras que el matiz de regreso ya queda expresado por 'volvamos'.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail en inglés y el texto hebreo: se preservó el valor narrativo del wayyiqtol, la reciprocidad del modismo אִישׁ אֶל אָחִיו y la idiomaticidad de נִתְּנָה רֹאשׁ sin calcarla mecánicamente.'
  spanish_consistency_notes:
  - Se mantuvo 'Egipto' sin artículo, conforme al uso normal en español bíblico.
  - Se optó por 'jefe' en lugar de 'líder' para reflejar mejor la idea de autoridad puesta al frente del grupo.
  - Se usó 'unos a otros' como equivalente idiomático de reciprocidad, con nota para la literalidad hebrea.
