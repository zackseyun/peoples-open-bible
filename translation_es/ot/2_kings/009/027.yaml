base_translation:
  language: en
  yaml_path: translation/ot/2_kings/009/027.yaml
  text: When Ahaziah king of Judah saw this[a], he fled by the way of Beth-haggan. And Jehu pursued him and said, “Strike him too, in the chariot!” So they struck him at the ascent of Gur, which is by Ibleam[b]. But he fled to Megiddo and died there.
  footnotes:
  - marker: a
    text: Beth-haggan may mean 'house of the garden,' but here it is likely a place-name, so it is transliterated.
    reason: cultural_note
  - marker: b
    text: Or 'Strike him too in the chariot'; the Hebrew preposition is somewhat flexible here and may indicate location or direction.
    reason: lexical_alternative
