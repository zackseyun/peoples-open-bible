translation:
  language: es
  text: 'Entonces el rey dijo a Ziba[a]: «Mira, todo lo que pertenece a Mefiboset es tuyo». Y Ziba dijo: «Me postro; que halle favor en tus ojos, mi señor el rey».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «rindo homenaje». El verbo hebreo puede expresar postrarse o inclinarse profundamente en sumisión o reverencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: La partícula exclamativa introduce una declaración enfática del rey. «Mira» conserva el valor de atención inmediata sin sonar arcaico; «He aquí» sería más formal pero más marcado bíblicamente en español.
- source_word: לְךָ
  english_pob_choice: is yours
  chosen_spanish: es tuyo
  alternatives_spanish:
  - te pertenece
  - es de tu propiedad
  lexicon: HALOT
  rationale: La construcción expresa transferencia/atribución de posesión. «Es tuyo» comunica con claridad el sentido posesivo del decreto sin perder el matiz jurídico.
- source_word: כֹּל אֲשֶׁר לִמְפִי בֹשֶׁת
  english_pob_choice: all that belongs to Mephibosheth
  chosen_spanish: todo lo que pertenece a Mefiboset
  alternatives_spanish:
  - todo lo que es de Mefiboset
  - todo lo que pertenecía a Mefiboset
  lexicon: HALOT
  rationale: La frase se refiere a los bienes/posesiones de Mefiboset. «Pertenece» mantiene la idea de posesión establecida por la sentencia del rey; el presente refleja el decreto inmediato en discurso directo.
- source_word: מְפִי בֹשֶׁת
  english_pob_choice: Mephibosheth
  chosen_spanish: Mefiboset
  alternatives_spanish:
  - Merib-baal
  lexicon: HALOT
  rationale: Se translitera la forma masorética del nombre con ortografía española adaptada. «Merib-baal» es una forma tradicional alternativa, pero no corresponde al texto consonántico de este versículo.
- source_word: הִשְׁתַּחֲוֵיתִי
  english_pob_choice: I bow down
  chosen_spanish: Me inclino
  alternatives_spanish:
  - Me postro
  - Rindo homenaje
  lexicon: HALOT
  rationale: El verbo describe una inclinación/postración en señal de sumisión o reverencia. «Me inclino» conserva el gesto con una frase natural en español; «me postro» intensifica más de lo que exige el contexto inmediato.
- source_word: אֶמְצָא חֵן בְּעֵינֶיךָ
  english_pob_choice: may I find favor in your eyes
  chosen_spanish: que halle favor en tus ojos
  alternatives_spanish:
  - que encuentre gracia ante tus ojos
  - que encuentre favor a tus ojos
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de «en tus ojos» y el valor de fórmula de favor. «Favor» es la opción más fiel aquí; «gracia» podría sonar doctrinalmente cargada en español sin necesidad textual.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi amo el rey
  - mi soberano el rey
  lexicon: HALOT
  rationale: Es un tratamiento cortesano de deferencia. «Mi señor el rey» reproduce de forma natural la relación de respeto y autoridad; «mi amo» sería demasiado servil en español contemporáneo.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo masorético de 2 Samuel 16:4 y conserva la decisión formal del POB inglés de traducir la fórmula de favor como «favor» y no «gracia». También refleja el ajuste revisado en el audit trail inglés, donde se prefirió un registro más formal para הִנֵּה; en español se optó por «Mira» por claridad y fluidez, sin perder la fuerza deíctica del hebreo.
  spanish_consistency_notes:
  - Se mantiene Mefiboset con una sola ortografía estable en toda la línea.
  - «Favor» se usa como fórmula relacional, no como término técnico doctrinal.
  - La puntuación y las comillas siguen el uso español moderno de discurso directo.
  - El tratamiento «mi señor el rey» conserva la cortesía de corte sin sustituirla por lenguaje eclesiástico tradicional.
