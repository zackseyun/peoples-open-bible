translation:
  language: es
  text: 'Entonces me llevó a la nave[a] y midió las jambas: seis codos de ancho por un lado y seis codos de ancho por el otro lado, el ancho de la tienda[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sala principal» o «santuario»; el hebreo se refiere a la habitación principal del edificio del templo, no al complejo entero.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «tienda». En este contexto de visión del templo, algunos lo entienden como una designación arquitectónica técnica y lo traducen «tabernáculo».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵיכָל
  english_pob_choice: nave
  chosen_spanish: nave
  alternatives_spanish:
  - salón principal
  - santuario
  - templo principal
  lexicon: HALOT
  rationale: En esta visión arquitectónica de Ezequiel, הֵיכָל designa la sala principal del edificio del templo, no todo el complejo. «Nave» conserva esa distinción y evita confundirlo con el recinto total. Se mantiene la idea arquitectónica del inglés POB, pero con una palabra natural en español.
- source_word: אֵילִים
  english_pob_choice: jambs
  chosen_spanish: postes
  alternatives_spanish:
  - jambas
  - pilastras
  - marcos laterales
  lexicon: HALOT
  rationale: El término se refiere a los elementos estructurales del acceso medidos en la visión. En español, «postes» comunica de manera clara la función visible de soporte; «jambas» sería más técnico pero menos natural para muchos lectores. Se evita «columnas» porque sugiere piezas exentas, no el marco de una entrada.
- source_word: אַמּוֹת
  english_pob_choice: cubits
  chosen_spanish: codos
  alternatives_spanish:
  - codos
  - cubitos
  lexicon: HALOT
  rationale: «Codos» es el equivalente estándar en español para la medida antigua y conserva el valor cultural del texto fuente sin modernizarlo indebidamente.
- source_word: רֹחַב
  english_pob_choice: wide / width
  chosen_spanish: ancho
  alternatives_spanish:
  - anchura
  - brote
  - amplitud
  lexicon: HALOT
  rationale: En las dos primeras apariciones, el adjetivo natural en español es «ancho». En la frase final, la misma raíz se expresa idiomáticamente como «el ancho de…», manteniendo la relación semántica entre medida y dimensión.
- source_word: מִפּוֹ ... מִפּוֹ
  english_pob_choice: on one side ... on the other side
  chosen_spanish: por un lado ... por el otro lado
  alternatives_spanish:
  - de este lado ... de aquel lado
  - a un lado ... al otro
  lexicon: HALOT
  rationale: La expresión deíctica duplicada indica dos lados correspondientes del vano. «Por un lado ... por el otro lado» es idiomático en español y preserva el paralelismo del hebreo sin volverlo mecánico.
- source_word: אֹהֶל
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - tienda
  - tabernáculo
  lexicon: HALOT
  rationale: El sentido léxico básico es «tienda». En español, «tienda» comunica directamente el significado del hebreo y permite conservar la tensión interpretativa que el POB inglés deja abierta con su nota sobre un posible sentido técnico arquitectónico. «Tabernáculo» sería una interpretación más específica que no está exigida por el hebreo.
- source_word: וַיְבִיאֵנִי
  english_pob_choice: Then he brought me
  chosen_spanish: Entonces me llevó
  alternatives_spanish:
  - Y me llevó
  - Luego me llevó
  lexicon: HALOT
  rationale: La forma narrativa consecutiva se vierte con «Entonces» para marcar la secuencia de la visión de manera natural en español. «Me llevó» conserva el movimiento guiado por el mediador de la visión.
- source_word: וַיָּמָד
  english_pob_choice: measured
  chosen_spanish: midió
  alternatives_spanish:
  - midió
  - tomó medidas
  lexicon: HALOT
  rationale: «Midió» es la correspondencia directa y precisa para la acción de medir en el contexto arquitectónico de la visión.
theological_decisions:
- issue: Sentido de הֵיכָל en la visión del templo
  english_pob_reading: nave
  chosen_spanish_reading: nave
  alternative_spanish_readings:
  - santuario
  - templo
  rationale: No se traduce como «templo» porque el hebreo distingue la sala principal del edificio de todo el complejo. «Nave» mantiene esa distinción espacial, importante para la lectura arquitectónica y visionaria del pasaje.
  doctrine_reference: Ezequiel 40–48; distinción del espacio sagrado en la visión del templo
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y el estado de alta concordancia sin revisiones aplicadas; la redacción española busca reflejar la misma decisión óptima-equivalente, manteniendo las dos notas léxicas donde el inglés POB preserva alternativas interpretativas.
  spanish_consistency_notes:
  - Se conservó la distinción entre la sala principal del templo y el complejo total mediante «nave».
  - Se prefirió «tienda» para mantener el sentido léxico de אֹהֶל y dejar abierta la nota interpretativa.
  - Se usó terminología arquitectónica natural en español sin perder la precisión del texto fuente.
  - Se mantuvo la unidad de medida antigua como «codos» para no modernizar el texto.
