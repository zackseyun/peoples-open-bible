translation:
  language: es
  text: Porque yo estoy contigo —oráculo de Yahvé— para salvarte[a]. Porque llevaré a completa destrucción a todas las naciones entre las cuales te he dispersado, pero a ti no te llevaré a completa destrucción. Te disciplinaré con justicia, y de ningún modo te dejaré sin castigo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «declara Yahvé». La fórmula hebrea נְאֻם יְהוָה es una expresión profética de declaración solemne.
    reason: lexical_alternative
  - marker: b
    text: O, «ciertamente no te absolveré». El hebreo intensifica con negación el verbo «absolver/dejar impune»; aquí se conserva el sentido disciplinario del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el default del proyecto para el nombre divino, manteniendo el nombre propio de pacto en español y evitando la sustitución por un título impersonal.
- source_word: נְאֻם יְהוָה
  english_pob_choice: oracle of Yahweh
  chosen_spanish: oráculo de Yahvé
  alternatives_spanish:
  - declara Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: נְאֻם es una fórmula profética de enunciación; «oráculo de Yahvé» conserva el registro formal y la fuerza de declaración profética mejor que una paráfrasis más fluida.
- source_word: לְהוֹשִׁיעֶךָ
  english_pob_choice: to save you
  chosen_spanish: para salvarte
  alternatives_spanish:
  - para librarte
  - para rescatarte
  lexicon: HALOT
  rationale: El hifil de ישׁע abarca salvar/liberar/rescatar. «Salvarte» es natural en español y preserva el alcance amplio de rescate y preservación.
- source_word: כָלָה
  english_pob_choice: a full end
  chosen_spanish: un fin completo
  alternatives_spanish:
  - una destrucción total
  - un acabamiento completo
  lexicon: HALOT
  rationale: La expresión hebrea repite la idea de consumación total. «Un fin completo» conserva esa intensificación y evita reducirla solo a destrucción física.
- source_word: הֲפִצוֹתִיךָ
  english_pob_choice: I have scattered you
  chosen_spanish: te dispersé
  alternatives_spanish:
  - te esparcí
  - te di por disperso
  lexicon: HALOT
  rationale: El hifil de פוץ indica dispersión entre las naciones. «Dispersé» es claro en español y mantiene la imagen de exilio sin endurecerla innecesariamente.
- source_word: אַךְ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - mas
  lexicon: HALOT
  rationale: Aquí la partícula marca contraste entre las naciones y el pueblo destinatario. «Pero» transmite bien la oposición lógica en español.
- source_word: וְיִסַּרְתִּיךָ
  english_pob_choice: I will discipline you
  chosen_spanish: Te disciplinaré
  alternatives_spanish:
  - Te corregiré
  - Te castigaré
  lexicon: HALOT
  rationale: יסר expresa corrección formativa con severidad. «Disciplinaré» preserva el matiz de corrección justa y no se limita a castigo retributivo.
- source_word: לַמִּשְׁפָּט
  english_pob_choice: with justice
  chosen_spanish: con justicia
  alternatives_spanish:
  - según justicia
  - con juicio
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí señala una disciplina medida y justa. «Con justicia» es idiomático y conserva el sentido de proporcionalidad judicial.
- source_word: וְנַקֵּה לֹא אֲנַקֶּךָּ
  english_pob_choice: I will by no means leave you unpunished
  chosen_spanish: de ningún modo te dejaré sin castigo
  alternatives_spanish:
  - ciertamente no te absolveré
  - no te declararé inocente
  lexicon: HALOT
  rationale: La negación intensificada no se limita a un lenguaje forense de absolución; en contexto expresa que Yahvé no eximirá de la sanción debida. «De ningún modo te dejaré sin castigo» conserva la fuerza enfática y el tono disciplinario del versículo.
theological_decisions:
- issue: Tensión entre salvación del pueblo y disciplina punitiva final
  english_pob_reading: God will save his people, yet not leave them unpunished
  chosen_spanish_reading: Dios/Yahvé salvará y preservará a su pueblo, pero no lo eximirá del castigo merecido
  alternative_spanish_readings:
  - Yahvé los salvará, pero no los absolverá
  - Yahvé los salvará, pero ciertamente no los dejará sin castigo
  rationale: 'El versículo mantiene ambas verdades: rescate real del exilio y corrección justa. La redacción española evita resolver la tensión suavizándola o sustituyéndola por un lenguaje exclusivamente forense.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje hebreo y el audit trail inglés sin cambios sustanciales respecto de la lectura revisada: se conservan el registro profético de נְאֻם, la fuerza de כָלָה como consumación total, y la tensión entre salvar y disciplinar con justicia.'
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino, coherente con el estándar del proyecto.
  - «Oráculo de Yahvé» conserva el tono profético formal sin recurrir a un sustituto litúrgico más opaco.
  - «Disciplinaré con justicia» preserva el matiz correctivo de יסר y el sentido de מִשְׁפָּט.
  - La cláusula final evita resolver la tensión teológica entre misericordia y juicio, siguiendo el audit trail inglés.
  - Se usa «te» por la segunda persona singular coherente con el hebreo 2ms del versículo.
