translation:
  language: es
  text: Y vestirás a Aarón, tu hermano, y a sus hijos con él, y los ungirás y los investirás[a] y los consagrarás, y servirán como sacerdotes para mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «llenar sus manos», un hebraísmo para instalar o investir a alguien en el servicio sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִלְבַּשְׁתָּ
  english_pob_choice: you shall clothe
  chosen_spanish: vestirás
  alternatives_spanish:
  - los vestirás
  - pondrás vestiduras sobre ellos
  lexicon: HALOT
  rationale: 'El hifil de לבשׁ es causativo: hacer que alguien sea vestido. «Vestirás» comunica bien la acción ritual y conserva la naturalidad en español; el objeto directo se expresa inmediatamente con el pronombre y la expansión nominal.'
- source_word: אֹתָם ... אֶת אַהֲרֹן אָחִיךָ וְאֶת בָּנָיו אִתּוֹ
  english_pob_choice: Aaron your brother and his sons with him
  chosen_spanish: Aarón, tu hermano, y a sus hijos con él
  alternatives_spanish:
  - Aarón tu hermano y sus hijos con él
  - Aarón, tu hermano, y sus hijos con él
  lexicon: HALOT
  rationale: En español, la aposición funciona mejor con comas para aclarar el referente del pronombre resumptivo. Se conserva la estructura hebrea sin añadir explicación extra ni desplazar el foco al pronombre inicial.
- source_word: וּמָשַׁחְתָּ אֹתָם
  english_pob_choice: and you shall anoint them
  chosen_spanish: y los ungirás
  alternatives_spanish:
  - y los consagrarás con aceite
  - y los aceitarás
  lexicon: HALOT
  rationale: משׁח en contexto sacerdotal es el acto técnico de ungir con aceite. «Ungir» es el equivalente más fiel y más natural en español religioso.
- source_word: וּמִלֵּאתָ אֶת יָדָם
  english_pob_choice: and ordain them
  chosen_spanish: y los investirás
  alternatives_spanish:
  - y les llenarás las manos
  - y los ordenarás
  lexicon: HALOT
  rationale: La expresión literal «llenar las manos» es un hebraísmo técnico de instalación en el oficio sacerdotal. «Investir» comunica con precisión la idea de poner a alguien en un cargo o dignidad, sin depender de un término eclesiástico posterior como «ordenar»; se preserva así el valor funcional del rito. La nota mantiene la alternativa literal para transparencia.
- source_word: וְקִדַּשְׁתָּ אֹתָם
  english_pob_choice: and consecrate them
  chosen_spanish: y los consagrarás
  alternatives_spanish:
  - y los santificarás
  - y los harás santos
  lexicon: HALOT
  rationale: En contexto sacerdotal, קדשׁ implica apartar para uso sagrado. «Consagrar» es el equivalente formal más idiomático en español y mantiene la dimensión de dedicación ritual.
- source_word: וְכִהֲנ֥וּ לִי
  english_pob_choice: and they shall serve as priests to me
  chosen_spanish: y ellos ejercerán el sacerdocio para mí
  alternatives_spanish:
  - y serán sacerdotes para mí
  - y ministrarán como sacerdotes para mí
  lexicon: HALOT
  rationale: כהן en piel expresa función sacerdotal. «Ejercerán el sacerdocio» evita reducir la frase a una identidad estática («serán sacerdotes») y conserva el matiz de desempeño del oficio, con el dativo de relación «para mí».
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - de mi parte
  lexicon: HALOT
  rationale: «Para mí» expresa en español la relación de servicio o dedicación dirigida a Yahvé mejor que un simple «a mí», que suena menos funcional en este contexto ritual.
theological_decisions:
- issue: El hebraísmo sacerdotal מִלֵּא אֶת־יָדִים
  english_pob_reading: ordain them with a footnote for the literal idiom
  chosen_spanish_reading: investirlos, con nota sobre el hebraísmo literal «llenar las manos»
  alternative_spanish_readings:
  - ordenarlos
  - llenarles las manos
  rationale: El texto describe la instalación oficial en el sacerdocio. «Investir» comunica esa función sin importar una terminología eclesial ajena; la nota conserva la literalidad del hebreo para el audit trail. «Ordenarlos» podría sonar demasiado técnico o denominacional en español, y «llenarles las manos» sería opaco en el cuerpo principal.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: Se corrigió el anclaje de la nota para que el marcador [a] aparezca en el texto principal. La redacción española sigue de cerca la revisión final del inglés POB, pero reemplaza «ordain» por «investir» como equivalente natural y transparente en español, manteniendo la nota literal del idiomatismo hebreo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como convención del proyecto cuando el versículo alude al servicio sacerdotal destinado a él, aunque en este texto concreto la forma no aparece explícitamente.
  - Se evitó «SEÑOR» y también «Cristo», pues no corresponden al léxico de este versículo.
  - «Consagrar» y «ungir» se mantienen como términos rituales estables dentro del registro bíblico español del proyecto.
  - La puntuación usa comas para reproducir la aposición hebrea de manera legible en español.
