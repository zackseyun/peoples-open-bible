translation:
  language: es
  text: Los pasos de un hombre son afirmados por Yahvé, y se complace en su camino[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El sujeto de «se complace» puede entenderse como Yahvé o como el hombre; el hebreo no lo expresa de modo explícito.
    reason: theological_note
lexical_decisions:
- source_word: מֵיְהוָה
  english_pob_choice: from the LORD / by the LORD
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - por Yahvé
  - proceden de Yahvé
  lexicon: HALOT
  rationale: La preposición מִן expresa origen o procedencia; en español, "de Yahvé" comunica de manera natural que la firmeza de los pasos procede de él. Se conserva "Yahvé" según el estándar español del proyecto, evitando el ocultamiento del nombre divino.
- source_word: מִצְעֲדֵי
  english_pob_choice: steps
  chosen_spanish: los pasos
  alternatives_spanish:
  - las pisadas
  - las huellas
  lexicon: HALOT
  rationale: '"Pasos" es el equivalente natural para צעדֵי y mantiene la imagen del caminar y del curso de vida sin caer en un calco rígido.'
- source_word: גֶבֶר
  english_pob_choice: a man's
  chosen_spanish: de un hombre
  alternatives_spanish:
  - de una persona
  - de un varón
  lexicon: HALOT
  rationale: גבר es masculino y en este contexto sapiencial funciona de manera general. "Un hombre" conserva el matiz gramatical y el paralelismo del hebreo.
- source_word: כּוֹנָנוּ
  english_pob_choice: are established
  chosen_spanish: se establecen
  alternatives_spanish:
  - son afirmados
  - quedan firmes
  lexicon: HALOT
  rationale: El pasivo de כון expresa ser establecido o afirmado. "Se establecen" reproduce bien esa pasividad sin sobreinterpretar como "guiados".
- source_word: וְדַרְכּוֹ
  english_pob_choice: his way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su senda de vida
  lexicon: HALOT
  rationale: '"Camino" es el equivalente bíblico y español más natural para דרך, y preserva el alcance literal y figurado del término.'
- source_word: יֶחְפָּץ
  english_pob_choice: he delights
  chosen_spanish: él se complace
  alternatives_spanish:
  - él se deleita
  - él tiene agrado
  lexicon: HALOT
  rationale: חפץ puede significar deleitarse, complacerse o desear. "Se complace" es idiomático y permite mantener la ambigüedad del sujeto, que el hebreo no explicita de forma inequívoca.
theological_decisions:
- issue: Sujeto de יֶחְפָּץ ('he delights')
  english_pob_reading: The LORD delights in his way, though the Hebrew allows another reading.
  chosen_spanish_reading: Él se complace en su camino, con antecedente abierto en el texto español.
  alternative_spanish_readings:
  - Yahvé se complace en su camino
  - el hombre se complace en su camino
  rationale: 'El hebreo deja implícito el sujeto de יֶחְפָּץ. Dado que el español necesita pronombre explícito, se conserva "él" para no resolver la tensión interpretativa en la línea principal. La nota preserva las dos posibilidades principales: que el sujeto sea Yahvé o que sea el hombre.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica cuando el hebreo no fija una sola lectura y registrar la alternativa en nota.'
- issue: Relación entre origen divino y firmeza del caminar
  english_pob_reading: From Yahweh a man's steps are established
  chosen_spanish_reading: De Yahvé se establecen los pasos de un hombre
  alternative_spanish_readings:
  - Yahvé establece los pasos de un hombre
  - Los pasos de un hombre son establecidos por Yahvé
  rationale: La estructura española mantiene el origen indicado por מִן sin perder la pasiva del verbo. Así se conserva tanto la agencia divina como el énfasis en la estabilidad del caminar humano.
  doctrine_reference: Hebrew source structure and POB policy on auditable source-based renderings.
translation_notes:
  revision_awareness: El inglés audit trail pasó por revisiones que oscilaron entre la pasiva y la activa en la primera cola para clarificar el sujeto. En español, la construcción "De Yahvé se establecen..." conserva el origen divino del primer hemistiquio, mientras que "él se complace" mantiene la ambigüedad verbal del segundo sin forzar una resolución que el hebreo no exige. Se integró la advertencia del audit trail sobre la ambigüedad del sujeto de יֶחְפָּץ, pero se evitó fijarlo de manera indebida.
  spanish_consistency_notes:
  - Se conserva "Yahvé" para el nombre divino, de acuerdo con el estándar del proyecto.
  - '"Pasos" y "camino" mantienen el paralelismo sapiencial y la metáfora de conducta.'
  - Se evitó introducir "Señor" como sustituto del nombre divino.
  - La ambigüedad del segundo hemistiquio se preserva con un pronombre explícito pero no referenciado en el texto principal, reforzado por la nota.
