  text: una cazoleta de oro de diez siclos[a], llena de incienso;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «una cazoleta, diez, oro, llena de incienso»; «siclos» se explicita por la fórmula repetida de la ofrenda en el contexto inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּף
  english_pob_choice: dish
  chosen_spanish: platillo
  alternatives_spanish:
  - plato
  - vasija
  - recipiente
  lexicon: HALOT
  rationale: En este contexto de ofrenda cultual, כַּף designa un recipiente pequeño para contener la ofrenda; «platillo» comunica esa forma y función mejor que «cuchara» en español actual, y mantiene el valor concreto del objeto.
- source_word: אַחַת
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - una
  lexicon: HALOT
  rationale: 'El hebreo concuerda en femenino con כַּף; en español se requiere la forma femenina implícita por el sustantivo: «una».'
- source_word: עֲשָׂרָה
  english_pob_choice: ten shekels
  chosen_spanish: diez siclos
  alternatives_spanish:
  - diez
  lexicon: HALOT
  rationale: La cifra está elíptica en hebreo y el contexto inmediato de las ofrendas ya presupone la unidad de peso. En español conviene explicitar «siclos» para hacer inteligible la medida sin añadir una idea extra ajena al contexto.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - de oro puro
  - dorado
  lexicon: HALOT
  rationale: Funciona como material del recipiente; en español la construcción más natural y fiel es «de oro», no el adjetivo «dorado».
- source_word: מְלֵאָה
  english_pob_choice: full of
  chosen_spanish: lleno de
  alternatives_spanish:
  - llena de
  lexicon: HALOT
  rationale: La forma hebrea concuerda con el sustantivo implícito y describe el contenido del recipiente. En español, por la concordancia con «platillo», «lleno de» conserva la imagen de plenitud contenida.
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - incienso aromático
  lexicon: HALOT
  rationale: Es el término cultual usual para la sustancia aromática ofrecida en el santuario; «incienso» es la equivalencia normal y suficientemente precisa en español.
translation_notes:
  revision_awareness: El texto hebreo es elíptico y el testimonio inglés ya decidió suplir la unidad de peso desde el contexto. La versión española conserva esa decisión, pero adapta el recipiente a una palabra natural en español («platillo») y mantiene la misma explicitación contextual de «siclos» en nota.
  spanish_consistency_notes:
  - Se mantuvo el orden conciso del hebreo sin forzar una paráfrasis.
  - No se usó «SEÑOR» ni terminología no pertinente a este verso.
  - La concordancia femenina se resolvió naturalmente con «una» y «llena», aunque el texto final permanece breve por estilo poético/listado.
