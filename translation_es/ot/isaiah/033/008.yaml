translation:
  language: es
  text: Las calzadas quedan desoladas; el viajero ha dejado de pasar por el camino. Ha quebrantado el pacto, ha despreciado las ciudades[a] y no ha tenido en cuenta al hombre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, siguiendo algunas versiones antiguas, «ha despreciado los testigos» en lugar de «ha despreciado las ciudades». El Texto Masorético lee «ciudades».
    reason: textual_variant
  - marker: b
    text: Hebreo «hombre» (ʾenosh), un término singular para un ser humano o mortal; aquí tiene fuerza genérica.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשַׁ֣מּוּ
  english_pob_choice: lie desolate
  chosen_spanish: quedan desoladas
  alternatives_spanish:
  - están desoladas
  - yacen desoladas
  - quedan devastadas
  lexicon: HALOT
  rationale: El verbo expresa un estado resultante de desolación o devastación. «Quedan desoladas» conserva ese valor de resultado y suena natural en español.
- source_word: מְסִלּ֔וֹת
  english_pob_choice: highways
  chosen_spanish: las calzadas
  alternatives_spanish:
  - las carreteras
  - los caminos principales
  - las vías
  lexicon: HALOT
  rationale: El término se refiere a vías principales o levantadas para el tránsito público. «Calzadas» mantiene la idea de vía amplia y pública mejor que un simple «camino».
- source_word: שָׁבַ֖ת
  english_pob_choice: has ceased
  chosen_spanish: ha cesado
  alternatives_spanish:
  - ha parado
  - se ha detenido
  - ha dejado
  lexicon: HALOT
  rationale: El perfecto señala cesación concluida. «Ha cesado» conserva bien ese matiz.
- source_word: עֹבֵ֣ר אֹ֑רַח
  english_pob_choice: the traveler ... from the road
  chosen_spanish: el transitante ... de la senda
  alternatives_spanish:
  - el viajero ... del camino
  - el que pasa ... de la senda
  - el caminante ... del camino
  lexicon: HALOT
  rationale: La construcción literalmente describe al que pasa por la vía. «Transitante» refleja el participio con cierta formalidad; «senda» mantiene la imagen de un trayecto de paso, sin perder la relación con las calzadas.
- source_word: הֵפֵ֤ר בְּרִית֙
  english_pob_choice: He has broken the covenant
  chosen_spanish: Ha quebrantado el pacto
  alternatives_spanish:
  - Ha roto el pacto
  - Ha violado el pacto
  - Ha anulado el pacto
  lexicon: HALOT
  rationale: «Quebrantar» comunica la fuerza de violar o romper una alianza. «Pacto» preserva el término bíblico de forma clara para el lector español.
- source_word: מָאַ֣ס עָרִ֔ים
  english_pob_choice: despised the cities
  chosen_spanish: ha despreciado las ciudades
  alternatives_spanish:
  - ha rechazado las ciudades
  - ha desdeñado las ciudades
  lexicon: HALOT
  rationale: El hebreo dice literalmente «ciudades». Se conserva esa lectura textual en la línea principal; «despreciado» refleja היטב el valor de מָאַס.
- source_word: לֹ֥א חָשַׁ֖ב אֱנֽוֹשׁ
  english_pob_choice: regarded no man
  chosen_spanish: no ha estimado a nadie
  alternatives_spanish:
  - no ha considerado al hombre
  - no ha tenido en cuenta a nadie
  - no ha estimado al ser humano
  lexicon: HALOT
  rationale: El idiomático hebreo expresa falta de consideración por los seres humanos. En español, «no ha estimado a nadie» transmite con naturalidad el sentido general sin forzar el singular masculino donde el castellano lo haría sonar menos fluido.
theological_decisions:
- issue: Lectura de עָרִים en el texto masorético frente a la variante antigua de «testigos»
  english_pob_reading: The Masoretic Text reads 'cities,' with a footnote noting some ancient versions may read 'witnesses.'
  chosen_spanish_reading: Se mantiene «las ciudades» en el texto principal, con nota sobre la variante «testigos».
  alternative_spanish_readings:
  - los testigos
  - los testigos (según algunas versiones antiguas)
  - las ciudades (MT)
  rationale: El hebreo consonántico masorético apoya claramente «ciudades». La variante antigua se conserva en nota para no borrar la tensión textual documentada.
  doctrine_reference: Principio POB de transparencia textual y respeto por el texto base masorético
- issue: Sujeto implícito y forma verbal singular en la segunda mitad del versículo
  english_pob_reading: The Hebrew uses singular verbs without explicitly naming the subject; English preserves that with 'He'
  chosen_spanish_reading: 'Se conserva una construcción singular implícita: «Ha quebrantado... ha despreciado... no ha estimado...»'
  alternative_spanish_readings:
  - Él ha quebrantado...
  - El enemigo ha quebrantado...
  - El transgresor ha quebrantado...
  rationale: El hebreo mantiene un sujeto singular no explicitado. El español puede sostener esa misma ambigüedad sin sobreinterpretarla, evitando identificar al sujeto más allá de lo que el versículo mismo dice.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3
- issue: Tratamiento de אֱנוֹשׁ como término genérico para un ser humano mortal
  english_pob_reading: '''man'' ... a singular term for a human being or mortal man; here it has generic force.'
  chosen_spanish_reading: «nadie» en el texto principal, con la fuerza genérica explicada en nota según el término hebreo.
  alternative_spanish_readings:
  - el hombre
  - ningún hombre
  - ser humano
  rationale: En español contemporáneo, «nadie» comunica con claridad la idea de falta de consideración por cualquier persona. La nota deja constancia de que el hebreo usa אֱנוֹשׁ, término singular genérico para un ser humano mortal, sin perder el valor inclusivo de la frase.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
translation_notes:
  revision_awareness: El contexto inglés indica alta concordancia y ninguna revisión posterior sustantiva. La versión española mantiene el texto masorético principal de «ciudades», conserva la ambigüedad del sujeto singular implícito y refleja la nota de variante antigua sin expandirla más allá del audit trail.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefiere «pacto» para בְּרִית por ser el término bíblico usual y por coherencia con el contexto de alianza/ruptura.
  - Se evita traducir mecánicamente «highways» por «carreteras» para preservar el registro bíblico y la imagen de vías principales.
  - La nota b explica el genérico de אֱנוֹשׁ sin imponer una masculinización innecesaria en el texto principal.
