    text: 'O, más literalmente: «mi pueblo no será avergonzado para siempre».'
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación y el contenido de la nota para reflejar fielmente el rastro inglés y la alternativa literal de לְעוֹלָם. También se mejora la naturalidad de la cláusula final en español con «no volverá a ser avergonzado», que conserva la idea de reversión permanente de la vergüenza pública y armoniza bien con la nota más literal «para siempre».
