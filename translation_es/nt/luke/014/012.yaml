  yaml_path: translation/nt/luke/014/012.yaml
  text: And he was also saying to the one who had invited him[a], “When you give a luncheon or a dinner, do not invite your friends or your brothers or your relatives or rich neighbors[c][b], lest they also invite you in return and it become repayment to you.”
  footnotes:
  - marker: a
    text: Or, 'breakfast' for 'luncheon'; the Greek ἄριστον refers to an earlier meal, often around midday rather than a modern morning breakfast.
    reason: lexical_alternative
  - marker: b
    text: Or, 'they invite you back.' The Greek verb means to invite in return.
    reason: lexical_alternative
  - marker: c
    text: Or, 'you be repaid.' The Greek more literally says, 'it become repayment to you.'
    reason: lexical_alternative
