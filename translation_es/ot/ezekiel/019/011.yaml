  glossary_alignment: 'No hay conflictos con la terminología del proyecto. Las decisiones léxicas principales son adecuadas: מַטּוֹת como «ramas», שִׁבְטֵי מֹשְׁלִים como «cetros de los que gobiernan/gobernantes», y עֲבֹתִים en sentido botánico. La revisión solo corrige la ubicación de la nota y afina la voz de וַיֵּרָא.'
