  yaml_path: translation/ot/2_samuel/015/003.yaml
  text: Then Absalom said to him[a], “Look, your claims are good and right[b], but there is no one from the king to hear you.”
  footnotes:
  - marker: a
    text: Or “your case is good and right.” The Hebrew דָּבָר can mean “word,” “matter,” or, in a legal context, “case/claim.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “there is no hearer for you from the king,” meaning no one commissioned by the king to hear the case.
    reason: lexical_alternative
