  yaml_path: translation/ot/isaiah/013/022.yaml
  text: Hyenas will cry out in her palaces[a], and jackals in her luxurious halls. Her time is near to come[c][b], and her days will not be prolonged.
  footnotes:
  - marker: a
    text: Or 'wild animals' or 'jackals' for 'hyenas'; the Hebrew term אִיִּים is uncertain in precise zoological reference.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word in 'her palaces' is difficult; some take it more literally as 'widows,' but the context strongly favors ruined noble dwellings or palaces.
    reason: lexical_alternative
  - marker: c
    text: Babylon is personified as a woman, hence 'her time' and 'her days.'
    reason: cultural_note
