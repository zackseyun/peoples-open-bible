translation:
  language: es
  text: Sadoc hijo de Ahitub y Ahimelec hijo de Abiatar eran sacerdotes[a], y Seraías era secretario[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ministros principales' o 'funcionarios reales' para 'sacerdotes'; algunos toman aquí el término en un sentido más amplio, administrativo de corte, porque el versículo enumera oficiales de David.
    reason: lexical_alternative
  - marker: b
    text: O 'escriba'. El término hebreo designa a un funcionario responsable de la escritura o de la administración.
    reason: lexical_alternative
lexical_decisions:
- source_word: צָדוֹק
  english_pob_choice: Zadok
  chosen_spanish: Sadoc
  alternatives_spanish:
  - Zadok
  lexicon: nombre propio
  rationale: Se translitera el nombre propio al uso habitual en español bíblico; 'Sadoc' conserva la correspondencia con el hebreo y es más natural en español que mantener la forma inglesa.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: El marcador genealógico expresa filiación inmediata en esta lista de oficiales; 'hijo de' es el equivalente directo y natural en español.
- source_word: אֲחִיטוּב
  english_pob_choice: Ahitub
  chosen_spanish: Ahitub
  lexicon: nombre propio
  rationale: Nombre propio transliterado sin cambio semántico.
- source_word: אֲחִימֶלֶךְ
  english_pob_choice: Ahimelech
  chosen_spanish: Ahimelec
  alternatives_spanish:
  - Ahimeleq
  lexicon: nombre propio
  rationale: Se usa una forma española estable y legible del nombre propio, manteniendo la correspondencia con el hebreo.
- source_word: אֶבְיָתָר
  english_pob_choice: Abiathar
  chosen_spanish: Abiatar
  alternatives_spanish:
  - Abíatar
  lexicon: nombre propio
  rationale: Nombre propio transliterado al uso español; la forma sin h mantiene una lectura bíblica natural en español.
- source_word: כֹּהֲנִים
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - sumos sacerdotes
  - ministros principales
  - funcionarios reales
  lexicon: HALOT
  rationale: El sentido básico y primario de כֹּהֲנִים es 'sacerdotes'. Aunque el contexto enumera oficiales de la corte y existe una interpretación administrativa más amplia, el texto hebreo no exige apartarse del sentido directo; por eso se mantiene 'sacerdotes' y la alternativa se documenta en nota.
- source_word: שְׂרָיָה
  english_pob_choice: Seraiah
  chosen_spanish: Seraías
  alternatives_spanish:
  - Saraías
  lexicon: nombre propio
  rationale: Nombre propio transliterado de forma estándar en español bíblico.
- source_word: סוֹפֵר
  english_pob_choice: secretary
  chosen_spanish: secretario
  alternatives_spanish:
  - escriba
  - cronista
  lexicon: HALOT
  rationale: En una lista de cargos de corte, 'secretario' comunica bien la función administrativa del término hebreo. 'Escriba' queda como alternativa válida, más literal, preservada en nota.
theological_decisions:
- issue: Sentido de כֹּהֲנִים en una lista de funcionarios reales
  english_pob_reading: priests, with a footnoted possibility of chief ministers or royal officials
  chosen_spanish_reading: sacerdotes, con nota sobre la posible lectura administrativa
  alternative_spanish_readings:
  - ministros principales
  - funcionarios reales
  rationale: No hay una razón textual suficiente para reemplazar el sentido básico del término hebreo en el cuerpo del texto. Sin embargo, como el versículo aparece dentro de una lista de oficiales de David, se conserva la tensión interpretativa en una nota para que el lector conozca la alternativa sin borrarla.
  doctrine_reference: Principio de primacía del idioma original y preservación de ambigüedad genuina en notas
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no se necesitaban cambios: se mantuvo el acuerdo alto con el texto fuente y con la auditoría inglesa, sin modificaciones aplicadas.'
  spanish_consistency_notes:
  - 'Se mantuvo el orden coordinado del hebreo: nombres + oficio final.'
  - '''Seraías'' se usa con acento gráfico español normal; los nombres propios siguen transliteración estándar y no traducción.'
  - Se evitó 'SEÑOR' o terminología eclesiástica ajena al hebreo; el versículo no contiene el Tetragrámaton ni vocabulario doctrinal adicional.
  - La nota sobre כֹּהֲנִים preserva la tensión lexical sin imponer la lectura administrativa en el texto principal.
