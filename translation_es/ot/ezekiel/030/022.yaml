review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: inferencia profética, fórmula de mensajero, oposición de Yahvé contra Faraón, quiebre de ambos brazos y caída de la espada. También preserva correctamente la alternativa léxica sobre los dos brazos. Sin embargo, la representación del título אֲדֹנָי יְהוִה como «Yahvé, el Señor» invierte el orden y suena menos natural que una solución española más fiel y clara como «el Señor Yahvé», que además mantiene el uso proyectual de Yahvé para יְהוִה sin crear una aposición extraña.'
  spanish_quality_summary: El español es en general claro y digno. No obstante, «[a]He aquí» está mal anclado tipográficamente; el marcador debe ir junto a la frase anotada, no antes de «He aquí» al inicio de la oración. Además, «Yahvé, el Señor» suena forzado en español bíblico corriente. «Tanto el fuerte como el quebrado» es entendible, pero con el antecedente «brazos» ya expreso funciona aceptablemente y la nota aclara la elipsis.
  glossary_alignment: 'Alineación parcial con el glosario: se usa correctamente «Yahvé» para יְהוִה, pero en el título compuesto la mejor alineación contextual es «el Señor Yahvé», no «Yahvé, el Señor». El resto de la terminología principal («brazos», «quebraré», «espada») concuerda con las decisiones documentadas.'
  issues:
  - severity: medium
    issue: Título divino «Yahvé, el Señor»
    rationale: Para אֲדֹנָי יְהוִה, el borrador preserva ambos elementos pero en un orden invertido y con puntuación apositiva poco natural. «El Señor Yahvé» mantiene mejor la secuencia semántica del hebreo y la legibilidad en español, evitando a la vez «Señor Señor».
  - severity: low
    issue: Ubicación del marcador de nota [a]
    rationale: El marcador aparece antes de «He aquí», pero la nota explica la alternativa de «el brazo fuerte y el brazo quebrado». Debe anclarse en la frase correspondiente, no al inicio del versículo.
  revised_spanish_text: 'Por tanto, así dice el Señor Yahvé: He aquí que estoy contra el faraón, rey de Egipto, y quebraré sus brazos, tanto el fuerte como el quebrado[a], y haré que la espada caiga de su mano.'
  revised_footnotes:
