revisions:
- from: Por tanto,[a] nada se opone a que algunos parezcan estar dominados por las pasiones debido a un razonamiento débil.
  to: Por tanto,[a] nada se opone por el hecho de que algunos parezcan estar dominados por las pasiones debido a una razón débil.
  rationale: Se ajustó la construcción para reflejar explícitamente τὸ φαίνεσθαί como un hecho aparente sustantivado («por el hecho de que»), y se cambió «razonamiento débil» por «razón débil» para conservar mejor el contraste filosófico central de 4 Macabeos entre razón y pasiones, en línea con el expediente inglés.
