translation:
  language: es
  text: 'Y de entre los sacerdotes[a], los que se atribuían el sacerdocio, pero no fueron hallados: los hijos de Obbeia, los hijos de Akbos, los hijos de Iaddous, el que había tomado a Augia como esposa de entre las hijas de Phaexeldai[b],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego es elíptico: «no fueron hallados» probablemente significa que no se encontró su registro genealógico o su acreditación sacerdotal, como en el paralelo de Esdras.'
    reason: lexical_alternative
  - marker: b
    text: Los nombres propios aquí difieren del paralelo hebreo aproximado; esta traducción sigue el texto griego de 1 Esdras sin armonizar con Esdras/Nehemías.
    reason: textual_variant
lexical_decisions:
- source_word: ἐκ τῶν ἱερέων
  english_pob_choice: from the priests
  chosen_spanish: de entre los sacerdotes
  alternatives_spanish:
  - entre los sacerdotes
  - de los sacerdotes
  lexicon: LSJ
  rationale: La construcción griega señala pertenencia o procedencia dentro del grupo sacerdotal. «De entre» preserva esa relación en español sin sonar rígido, y evita interpretar demasiado como mera ubicación física.
- source_word: οἱ ἐμποιούμενοι ἱερωσύνης
  english_pob_choice: those who claimed the priesthood
  chosen_spanish: los que se atribuían el sacerdocio
  alternatives_spanish:
  - los que reclamaban el sacerdocio
  - los que alegaban ser sacerdotes
  - los que se presentaban como sacerdotes
  lexicon: LSJ
  rationale: El participio expresa una pretensión o autoatribución de la condición sacerdotal. «Se atribuían» conserva la idea de una afirmación de estatus sin suavizarla a una mera función litúrgica.
- source_word: οὐχ εὑρέθησαν
  english_pob_choice: were not found
  chosen_spanish: no fueron hallados
  alternatives_spanish:
  - no se los encontró
  - no aparecieron
  lexicon: LSJ
  rationale: La pasiva griega se mantiene en una forma natural en español. El complemento implícito del contexto es su registro genealógico o su acreditación sacerdotal, pero no se explicita en el texto principal.
- source_word: υἱοὶ Ὀββειά
  english_pob_choice: the sons of Obbeia
  chosen_spanish: los hijos de Obbeia
  alternatives_spanish:
  - los descendientes de Obbeia
  lexicon: genealogical usage
  rationale: En listas genealógicas, υἱοί se traduce con normalidad como «hijos», que en español también puede abarcar descendientes. Se conserva la forma genealógica estándar.
- source_word: υἱοὶ Ἀκβώς
  english_pob_choice: the sons of Akbos
  chosen_spanish: los hijos de Akbos
  alternatives_spanish:
  - los descendientes de Akbos
  lexicon: genealogical usage
  rationale: Se mantiene el paralelismo genealógico y la transliteración según el testimonio griego, sin armonizar con otras listas bíblicas.
- source_word: υἱοὶ Ἰαδδοὺς
  english_pob_choice: the sons of Iaddous
  chosen_spanish: los hijos de Iaddous
  alternatives_spanish:
  - los descendientes de Iaddous
  lexicon: genealogical usage
  rationale: Se conserva el nombre griego y la fórmula genealógica, respetando la forma del texto fuente.
- source_word: τοῦ λαβόντος Αὐγίαν γυναῖκα
  english_pob_choice: who had taken Augia as a wife
  chosen_spanish: que había tomado a Augia como esposa
  alternatives_spanish:
  - que se había casado con Augia
  - que había tomado a Augia por mujer
  lexicon: LSJ
  rationale: La construcción con λαμβάνω + γυναῖκα es un giro idiomático para contraer matrimonio. «Había tomado ... como esposa» conserva la literalidad del griego y es inteligible en español.
- source_word: τῶν θυγατέρων Φαηξελδαίου
  english_pob_choice: from the daughters of Phaexeldai
  chosen_spanish: de entre las hijas de Phaexeldai
  alternatives_spanish:
  - de las hijas de Phaexeldai
  - entre las hijas de Phaexeldai
  lexicon: transliterated proper name
  rationale: El nombre propio se translitera desde el griego, porque el testimonio primario aquí es 1 Esdras griego y el paralelo hebreo es aproximado. «De entre» refleja mejor la procedencia familiar dentro del grupo de hijas.
theological_decisions:
- issue: Identificación sacerdotal y falta de registro genealógico
  english_pob_reading: Those who claimed the priesthood, but were not found
  chosen_spanish_reading: Los que se atribuían el sacerdocio, pero no fueron hallados
  alternative_spanish_readings:
  - los que reclamaban el sacerdocio, pero no fueron hallados
  - los que afirmaban ser sacerdotes, pero no fueron hallados
  rationale: El sentido no es una condena doctrinal abstracta, sino una constatación de ausencia de verificación genealógica/registral para ejercer como sacerdotes. Se mantiene la tensión del texto sin explicitar más de lo que dice el griego.
  doctrine_reference: Genealogical qualification for priestly office in Ezra/1 Esdras parallel tradition
translation_notes:
  revision_awareness: El borrador sigue el texto griego de Swete como ancla principal y conserva la estructura de la lista genealógica. Se incorporó la misma decisión de la POB inglesa de mantener «were not found» de forma pasiva y dejar implícito el objeto de la falta, sin armonizar con el paralelo hebreo. También se respetó la variante onomástica del griego frente al paralelo MT aproximado.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - Se mantiene la fórmula genealógica «los hijos de» como convención bíblica clara en español.
  - Se conserva la transliteración de los nombres griegos para evitar una armonización injustificada con otros libros paralelos.
  - «Sacerdocio» se usa para ἱερωσύνη, porque el foco está en la pretensión/condición sacerdotal, no en un acto cultual particular.
