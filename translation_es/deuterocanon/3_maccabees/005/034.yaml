translation:
  language: es
  text: Pero cada uno de los amigos, con semblante sombrío, despidió[a] a los que se habían reunido, cada uno a su propia ocupación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma griega transmitida para ὑπεκρέων es poco común y el testimonio de la fuente está marcado con desajuste menor; la traducción sigue el sentido contextual de «despedir» a los reunidos individualmente.
    reason: textual_variant
  - marker: b
    text: 'También puede entenderse: «a su propio negocio» o «a sus propios asuntos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ καθ᾽ εἷς
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada uno de ellos
  - uno por uno
  lexicon: LSJ
  rationale: La expresión distributiva señala una acción individualizada. «Cada uno» conserva esa distribución con naturalidad en español.
- source_word: τῶν φίλων
  english_pob_choice: of the friends
  chosen_spanish: de los amigos
  alternatives_spanish:
  - de los compañeros
  - de los cortesanos
  lexicon: LSJ
  rationale: φίλοι significa literalmente «amigos». Aunque en contexto real de corte puede aludir a allegados del rey, el griego aquí usa el término común; por eso se mantiene «amigos».
- source_word: σκυθρωπῶς
  english_pob_choice: looking grim
  chosen_spanish: con semblante sombrío
  alternatives_spanish:
  - con gesto adusto
  - con aire sombrío
  - con rostro adusto
  lexicon: LSJ
  rationale: El adverbio describe una apariencia lúgubre o severa. «Con semblante sombrío» expresa la tonalidad visible sin sobreinterpretar el matiz exacto.
- source_word: ὑπεκρέων
  english_pob_choice: dismissed
  chosen_spanish: despedía
  alternatives_spanish:
  - despachaba
  - enviaba fuera
  - iba despidiendo
  lexicon: LSJ
  rationale: La forma es inusual y el testimonio textual está marcado con desajuste menor. En contexto, junto con ἀπέλυαν, la acción es la de dejar ir o despedir a los reunidos; «despedía» transmite esa función sin afirmar más de lo que el contexto garantiza.
- source_word: τοὺς συνθροισμένους
  english_pob_choice: those who had gathered
  chosen_spanish: a los que se habían reunido
  alternatives_spanish:
  - a los reunidos
  - al grupo que se había reunido
  lexicon: LSJ
  rationale: El participio indica personas congregadas. «A los que se habían reunido» mantiene el valor verbal y la referencia al grupo.
- source_word: ἀπέλυαν
  english_pob_choice: dismissed
  chosen_spanish: despedía
  alternatives_spanish:
  - dejaba ir
  - enviaba fuera
  - soltaba
  lexicon: LSJ
  rationale: ἀπολύω puede significar soltar, dejar ir, despedir o enviar fuera. En este contexto de dispersión, «despedía» es el equivalente español más natural y preciso.
- source_word: ἕκαστον
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - a cada uno
  - cada cual
  lexicon: LSJ
  rationale: El distributivo acusativo subraya que la dispersión era individual. «Cada uno» preserva ese énfasis.
- source_word: ἐπὶ τὴν ἰδίαν ἀσχολίαν
  english_pob_choice: to his own occupation
  chosen_spanish: a su propia ocupación
  alternatives_spanish:
  - a su propio negocio
  - a sus propios asuntos
  - a su propio trabajo
  lexicon: LSJ
  rationale: ἀσχολία significa ocupación, ocupación habitual, negocio o actividad. «Ocupación» conserva el sentido de volver a la actividad ordinaria sin reducirlo demasiado a «trabajo».
translation_notes:
  revision_awareness: La versión inglesa más reciente pasó de «was dismissing» a «dismissed» para un pasado narrativo más natural. La redacción española adopta directamente un pretérito simple equivalente («despedía» en este contexto distributivo) y mantiene la observación textual sobre la forma griega inusual.
  spanish_consistency_notes:
  - Se mantiene «amigos» para φίλοι, en lugar de «cortesanos», porque el griego usa el término ordinario y el contexto no obliga a institucionalizarlo.
  - «Con semblante sombrío» traduce σκυθρωπῶς con un registro digno y natural en español.
  - Se conserva la idea de dispersión individual mediante «cada uno» / «a cada uno» como refuerzo distributivo.
  - «Ocupación» se elige como equivalente principal de ἀσχολία; las alternativas se dejan registradas en la nota.
  - No se usa «SEÑOR» ni terminología litúrgica ajena al versículo, porque no hay aquí el nombre divino ni un título cristológico.
