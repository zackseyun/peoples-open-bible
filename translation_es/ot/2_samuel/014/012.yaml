translation:
  language: es
  text: 'Entonces la mujer dijo: «Por favor, permite que tu sierva[a] hable una palabra a mi señor el rey». Y él dijo: «Habla».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «tu sierva» o, más literalmente, «tu esclava»; aquí «sierva» conserva el tratamiento humilde y cortés de la escena.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: Then the woman said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva avanza la escena; «Entonces» conserva la sucesión y suena natural en español.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: HALOT
  rationale: El contexto inmediato identifica simplemente a la mujer que habla con el rey; «mujer» es el equivalente contextual directo.
- source_word: תְּדַבֶּר נָא
  english_pob_choice: Please let ... speak
  chosen_spanish: Por favor, deja que ... hable
  alternatives_spanish:
  - Por favor, permita que ... hable
  - Por favor, que ... hable
  lexicon: HALOT
  rationale: El imperfecto/jusivo con נָא expresa una petición respetuosa. En español, «deja que» comunica bien la solicitud deferente dirigida al rey sin perder la naturalidad.
- source_word: שִׁפְחָתְךָ
  english_pob_choice: your servant
  chosen_spanish: tu sierva
  alternatives_spanish:
  - tu criada
  - tu servidora
  lexicon: HALOT
  rationale: El hebreo es femenino («sierva», «esclava/servidora femenina»). Aquí conviene preservar esa marca de género que el inglés POB dejó en nota, en vez de neutralizarla por completo.
- source_word: אֶל אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: to my lord the king
  chosen_spanish: a mi señor el rey
  alternatives_spanish:
  - a mi amo el rey
  - al rey, mi señor
  lexicon: HALOT
  rationale: «Adoní» es un tratamiento humano de respeto; «señor» reproduce la cortesía cortesana. «Mi señor el rey» mantiene la relación deferente del original.
- source_word: דָּבָר
  english_pob_choice: a word
  chosen_spanish: una palabra
  alternatives_spanish:
  - un asunto
  - una cosa
  lexicon: HALOT
  rationale: El sustantivo puede significar «palabra» o «asunto». En esta fórmula de petición, «una palabra» conserva la concisión y el paralelismo con el hebreo y con la traducción inglesa auditada.
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Entonces él dijo
  lexicon: HALOT
  rationale: La continuidad narrativa es directa; «Y él dijo» es natural y fiel.
- source_word: דַּבֵּרִי
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Hablad
  lexicon: HALOT
  rationale: El imperativo femenino singular se conserva en español con «Habla», que funciona como orden breve y directa hacia la mujer.
translation_notes:
  revision_awareness: El antecedente inglés mantiene la equivalencia óptima y una nota léxica sobre שִׁפְחָה/שִׁפְחָתְךָ. La versión española preserva esa tensión entre el giro cortesano natural y la literalidad femenina del término, sin introducir una paráfrasis más amplia que el hebreo.
  spanish_consistency_notes:
  - Se mantiene «sierva» para reflejar el femenino de שִׁפְחָתְךָ, en línea con la nota auditada.
  - «Mi señor el rey» conserva el registro de respeto cortesano sin recurrir a mayúsculas devocionales ni a «SEÑOR».
  - Se usa «Entonces» para el avance narrativo, no como adición interpretativa.
  - La orden final se traduce con la forma imperativa femenina singular «Habla», coherente con el hebreo.
