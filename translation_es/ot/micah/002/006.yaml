base_translation:
  language: en
  yaml_path: translation/ot/micah/002/006.yaml
  text: “Do not preach,” they preach[a]. “They should not preach of these things[c][b]; disgrace will not overtake us.”
  footnotes:
  - marker: a
    text: Or, 'Do not prophesy,' they say; 'they should not prophesy to these people.' The Hebrew verb literally means 'drip,' used metaphorically for prophetic speech.
    reason: lexical_alternative
  - marker: b
    text: Or, 'to these people' instead of 'about these things.'
    reason: alternative_reading
  - marker: c
    text: The final clause is difficult Hebrew; more literally, 'disgraces will not turn back' or 'reproaches will not depart.'
    reason: textual_variant
