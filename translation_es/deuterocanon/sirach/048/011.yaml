translation:
  language: es
  text: Dichoso el que te vio y murió[a], y dichoso eres tú, porque ciertamente vivirás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: “Dichosos los que te vieron y los adornados en amor, porque también nosotros viviremos”. El testimonio hebreo, en cambio, dice: “y dichoso eres tú, porque ciertamente vivirás”.'
    reason: alternative_reading
lexical_decisions:
- source_word: אשרי
  english_pob_choice: Happy is / happy are
  chosen_spanish: Dichosos
  alternatives_spanish:
  - Bienaventurados
  - Felices
  lexicon: HALOT
  rationale: La fórmula hebrea de beatitud expresa un estado envidiable o feliz. "Dichosos" conserva el tono exclamativo y es natural en español, sin forzar un registro demasiado litúrgico como "bienaventurados".
- source_word: ראך
  english_pob_choice: saw you
  chosen_spanish: te vieron
  alternatives_spanish:
  - te vio
  - te contemplaron
  lexicon: HALOT
  rationale: 'El hebreo tiene un verbo en plural con sufijo de segunda persona singular, por lo que el español debe reflejar plural: "te vieron". Se mantiene la referencia directa al profeta en el tono de la línea.'
- source_word: ומת
  english_pob_choice: and died
  chosen_spanish: y murieron
  alternatives_spanish:
  - y murió
  - y luego murieron
  lexicon: HALOT
  rationale: El texto hebreo breve une la visión con la muerte mediante una simple coordinación. En español, el plural mantiene la concordancia con el sujeto plural implícito de la primera mitad del verso.
- source_word: ואשריך
  english_pob_choice: and happy are you
  chosen_spanish: y dichoso eres tú
  alternatives_spanish:
  - y bienaventurado eres tú
  - y feliz eres tú
  lexicon: HALOT
  rationale: Se conserva el paralelismo directo de una segunda beatitud en segunda persona. "Dichoso" une fidelidad semántica con un español claro y bíblico.
- source_word: כי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la bienaventuranza, y "porque" expresa de manera natural esa relación causal en español.
- source_word: חיה תחיה
  english_pob_choice: you will surely live
  chosen_spanish: ciertamente vivirás
  alternatives_spanish:
  - de cierto vivirás
  - seguramente vivirás
  lexicon: HALOT
  rationale: La construcción hebrea con infinitivo absoluto intensifica la certeza. "Ciertamente" reproduce ese énfasis de modo fluido y digno en español.
theological_decisions:
- issue: Texto hebreo como base principal frente a la expansión griega
  english_pob_reading: Translate the extant Hebrew as the primary text, while preserving the notable Greek expansion in a footnote.
  chosen_spanish_reading: Traducir el hebreo conservado como texto principal y anotar la expansión griega notable en una nota.
  alternative_spanish_readings:
  - Seguir la forma griega en el cuerpo del texto
  - Fusionar hebreo y griego en una sola redacción
  rationale: Sirácides conserva aquí dos formas relevantes. El hebreo existente ofrece la base principal, pero la variante griega es sustancial y debe quedar visible para la auditoría textual. Por eso se preserva como nota sin desplazar el texto hebreo.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual input'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente sin cambios sustantivos; el cotejo indicó alta concordancia y no hubo correcciones necesarias.
  spanish_consistency_notes:
  - Se mantuvo "dichoso" de forma uniforme para la fórmula de beatitud.
  - Se respetó la tensión textual entre el hebreo y el griego mediante una nota, sin mezclar ambas lecturas en el cuerpo principal.
  - La nota se ancla en la primera beatitud con [a], donde la divergencia textual afecta directamente la formulación.
  - El español evita el calco rígido y conserva la estructura paralela del verso.
