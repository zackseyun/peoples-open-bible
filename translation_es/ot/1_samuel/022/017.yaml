    text: 'Hebrew: ''their hand also is with David,'' an idiom meaning they support or side with David.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''did not uncover my ear,'' that is, ''did not inform me.'''
    reason: lexical_alternative
