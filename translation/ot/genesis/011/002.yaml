id: GEN.11.2
reference: Genesis 11:2
source:
  edition: WLC
  text: וַֽ/יְהִ֖י בְּ/נָסְעָ֣/ם מִ/קֶּ֑דֶם וַֽ/יִּמְצְא֥וּ בִקְעָ֛ה בְּ/אֶ֥רֶץ שִׁנְעָ֖ר וַ/יֵּ֥שְׁבוּ שָֽׁם׃
translation:
  text: And as they journeyed from the east[a], they found a plain in the land of Shinar and settled there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as they migrated eastward.' The Hebrew phrase מִקֶּדֶם can be understood either as indicating origin ('from the east') or direction ('eastward').
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And as it happened / And as
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the circumstance of the following action. In natural modern English, this is best absorbed into a temporal clause ('And as...') rather than retained with a wooden formula like 'it came to pass.'
- source_word: בְּנָסְעָם
  chosen: as they migrated
  alternatives:
  - when they journeyed
  - in their traveling
  lexicon: HALOT
  rationale: נסע commonly denotes pulling up camp and journeying onward. 'Migrated' fits the broader population movement in context, while remaining within the semantic range of travel/journeying.
- source_word: מִקֶּדֶם
  chosen: from the east
  alternatives:
  - eastward
  - from the east country
  lexicon: HALOT
  rationale: 'קדם can denote ''east'' or ''eastward,'' creating a known ambiguity here: either direction of travel (''eastward'') or point of origin (''from the east''). The preposition מן most naturally marks source, so ''from the east'' is preferred in the main text, while the directional alternative is preserved in a footnote.'
- source_word: וַיִּמְצְאוּ
  chosen: they found
  alternatives:
  - they came upon
  - they discovered
  lexicon: HALOT
  rationale: מצא is straightforwardly 'find.' 'Found' is the most direct and contextually appropriate rendering.
- source_word: בִקְעָה
  chosen: a plain
  alternatives:
  - a valley
  - a broad valley
  lexicon: HALOT
  rationale: בִקְעָה refers to a broad plain or valley. 'Plain' best fits the geography of Shinar and standard English usage here.
- source_word: בְּאֶרֶץ שִׁנְעָר
  chosen: in the land of Shinar
  alternatives:
  - in Shinar
  - in the country of Shinar
  lexicon: HALOT
  rationale: אֶרֶץ is retained as 'land' for a slightly more formal geographic designation, and שִׁנְעָר is transliterated as a place name per translation philosophy.
- source_word: וַיֵּשְׁבוּ שָׁם
  chosen: and settled there
  alternatives:
  - and they dwelt there
  - and they lived there
  lexicon: HALOT
  rationale: ישב often means to dwell or settle. In this migration context, 'settled there' captures both residence and the cessation of movement more clearly than 'lived there.'
