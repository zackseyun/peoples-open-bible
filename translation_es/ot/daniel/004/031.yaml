base_translation:
  language: en
  yaml_path: translation/ot/daniel/004/031.yaml
  text: At the end of the days[a], I, Nebuchadnezzar, lifted my eyes to heaven, and my understanding returned to me; and I blessed the Most High, and I praised and honored him who lives forever, for his dominion is an everlasting dominion, and his kingdom is from generation to generation.
  footnotes:
