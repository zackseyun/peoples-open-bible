id: 2KI.4.5
reference: 2 Kings 4:5
source:
  edition: WLC
  text: וַ/תֵּ֨לֶךְ֙ מֵֽ/אִתּ֔/וֹ וַ/תִּסְגֹּ֣ר הַ/דֶּ֔לֶת בַּעֲדָ֖/הּ וּ/בְעַ֣ד בָּנֶ֑י/הָ הֵ֛ם מַגִּשִׁ֥ים אֵלֶ֖י/הָ וְ/הִ֥יא מיצקת׃
translation:
  text: So she went from him and shut the door behind herself and behind her sons; they were bringing the vessels to her[a], and she was pouring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew simply says, 'they were bringing to her'; 'the vessels' is supplied from the context of the empty containers in the preceding verses.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶךְ מֵאִתּוֹ
  chosen: So she went from him
  alternatives:
  - Then she went from him
  - So she left him
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. מֵאִתּוֹ is literally 'from with him,' idiomatically 'from him.' 'So she went from him' preserves the sequence and the physical departure after Elisha's instruction.
- source_word: וַתִּסְגֹּר הַדֶּלֶת
  chosen: and shut the door
  alternatives:
  - and closed the door
  lexicon: HALOT
  rationale: סגר commonly means 'shut/close.' 'Shut the door' is natural English and keeps the concrete action.
- source_word: בַּעֲדָהּ וּבְעַד בָּנֶיהָ
  chosen: behind herself and behind her sons
  alternatives:
  - on herself and on her sons
  - upon herself and upon her sons
  lexicon: HALOT
  rationale: בְּעַד with סגר הדלת idiomatically indicates shutting the door 'behind' someone, i.e., enclosing them inside. Rendering 'behind herself and behind her sons' makes the Hebrew prepositional phrase explicit and preserves the repeated structure.
- source_word: הֵם מַגִּשִׁים אֵלֶיהָ
  chosen: they were bringing the vessels to her
  alternatives:
  - they were bringing them to her
  - they kept bringing them to her
  lexicon: HALOT
  rationale: The participle מַגִּשִׁים conveys ongoing action. The object 'the vessels' is implied from the immediate context (vv. 3–4) and is supplied in English for clarity. 'Were bringing' captures the durative sense.
- source_word: וְהִיא מיצקת
  chosen: and she was pouring
  alternatives:
  - and she poured
  - while she was pouring
  lexicon: HALOT
  rationale: The participle מיצקת also suggests ongoing action concurrent with her sons' bringing. 'Was pouring' best reflects the iterative/process sense in context.
