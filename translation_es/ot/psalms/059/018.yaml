translation:
  language: es
  text: Oh, fuerza mía, a ti cantaré alabanzas, porque Dios es mi baluarte, el Dios de mi amor fiel.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi Dios misericordioso» o «el Dios que me muestra amor fiel». El hebreo dice literalmente «el Dios de mi amor fiel».
    reason: alternative_reading
lexical_decisions:
- source_word: עֻזִּי
  english_pob_choice: O my strength
  chosen_spanish: Oh mi fortaleza
  alternatives_spanish:
  - Mi fortaleza
  lexicon: HALOT
  rationale: En este vocativo poético, עֹז/עֻזִּי expresa fuerza, poder o fortaleza. ‘Oh’ preserva la fuerza de la invocación directa, y ‘fortaleza’ comunica bien el sentido de protección y firmeza que la POB inglesa quiso destacar con ‘my strength’.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - para ti
  lexicon: HALOT
  rationale: La preposición אֶל marca dirección hacia Dios. ‘A ti’ es la forma natural en español y conserva la orientación de la alabanza sin introducir una finalidad no expresada.
- source_word: אֲזַמֵּרָה
  english_pob_choice: I will sing praises
  chosen_spanish: cantaré alabanzas
  alternatives_spanish:
  - cantaré
  - haré música de alabanza
  lexicon: HALOT
  rationale: El piel de זמר en los Salmos suele implicar canto de alabanza, no solo cantar en general. ‘Cantaré alabanzas’ mantiene el valor cultual y evita un calco rígido.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים designa al Dios de Israel en sentido singular. ‘Dios’ es la equivalencia normal y clara en español.
- source_word: מִשְׂגַּבִּי
  english_pob_choice: my stronghold
  chosen_spanish: mi baluarte
  alternatives_spanish:
  - mi refugio
  - mi fortaleza
  lexicon: HALOT
  rationale: מִשְׂגָּב denota un lugar alto y seguro, por extensión una posición de defensa. ‘Baluarte’ comunica bien la idea de defensa protectora en español bíblico moderno y conserva algo de la solidez de ‘stronghold’.
- source_word: אֱלֹהֵי חַסְדִּי
  english_pob_choice: the God of my steadfast love
  chosen_spanish: el Dios de mi amor leal
  alternatives_spanish:
  - mi Dios misericordioso
  - el Dios que me muestra amor leal
  - el Dios de mi misericordia
  lexicon: HALOT
  rationale: חֶסֶד tiene un rango de lealtad pactal, misericordia y amor constante. ‘Amor leal’ mantiene el vínculo con la noción de fidelidad y evita reducir el término a mero afecto. La estructura posesiva ‘de mi…’ conserva la densidad poética del hebreo, tal como la POB inglesa retiene ‘the God of my steadfast love’.
theological_decisions:
- issue: Sentido de חַסְדִּי en relación con Dios
  english_pob_reading: Objective/genitival sense preserved as 'the God of my steadfast love'
  chosen_spanish_reading: 'Se conserva la lectura genitiva: ''el Dios de mi amor leal'''
  alternative_spanish_readings:
  - mi Dios misericordioso
  - el Dios que me muestra amor leal
  rationale: El hebreo permite una formulación comprimida que puede aludir al amor leal del salmista hacia Dios o al amor leal que Dios le muestra. La traducción principal mantiene esa tensión sin resolverla en una paráfrasis más explícita.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el borrador sigue de cerca la lectura del texto hebreo y el criterio auditado de la POB inglesa, con ajuste natural al español.
  spanish_consistency_notes:
  - Se usa 'Dios' para אֱלֹהִים en sentido singular.
  - Se mantiene el valor poético y vocativo del verso con una invocación inicial.
  - '''Amor leal'' se emplea para חֶסֶד con el fin de conservar el matiz de lealtad pactal sin borrar la posible ambigüedad teológica.'
