theological_decisions:
- issue: Rendering κρίσις in a battle context with possible theological overtones
  chosen_reading: judgment
  alternative_readings:
  - decision
  - crisis
  rationale: The immediate sense is the decisive outcome of battle, but 'judgment' also fits the elevated tone of the narrative and does not exceed what the Greek can bear. Alternatives are plausible but less weighty.
  doctrine_reference: Preserve theological tension rather than resolve it.
