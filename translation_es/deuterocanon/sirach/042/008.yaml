revisions:
- from: 'En cuanto a la disciplina de un simple[b] y de un necio, y de un anciano que vuelve y toma consejo en la inmoralidad sexual[a]: sé verdaderamente cuidadoso[c], y un hombre modesto delante de todo ser viviente.'
  to: 'En cuanto a la disciplina de un ingenuo y de un necio, y de un anciano que vuelve y toma consejo en inmoralidad sexual[a]: sé verdaderamente cuidadoso[b], y sé un hombre modesto ante todo ser viviente.'
  rationale: Se ajustó «simple» a «ingenuo» para comunicar mejor el sentido de פותה en español actual; se reparó la elipsis de la exhortación final con «y sé un hombre modesto»; y se mejoró la fluidez con «ante». Se mantuvieron la estructura, la prioridad del hebreo y las dos notas realmente necesarias del expediente inglés.
