translation:
  language: es
  text: Me persuadiste[a], Yahvé, y me dejé persuadir; me dominaste y prevaleciste. He llegado a ser motivo de risa todo el día; todos se burlan de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Me engañaste, Yahvé, y fui engañado». El verbo hebreo puede expresar persuadir, seducir o engañar; el lamento de Jeremías es intencionalmente enérgico.'
    reason: alternative_reading
lexical_decisions:
- source_word: פִּתִּיתַנִי
  english_pob_choice: You persuaded me
  chosen_spanish: Me persuadiste
  alternatives_spanish:
  - Me engañaste
  - Me sedujiste
  lexicon: HALOT
  rationale: El verbo פתה puede significar persuadir, seducir o engañar según el contexto. En este lamento, 'Me persuadiste' conserva la fuerza causal sin resolver demasiado pronto la tensión teológica. Se mantiene la posibilidad de la lectura más dura en nota.
- source_word: וָאֶפָּת
  english_pob_choice: and I was persuaded
  chosen_spanish: y fui persuadido
  alternatives_spanish:
  - y me dejé persuadir
  - y fui engañado
  lexicon: HALOT
  rationale: La forma pasiva/reflexiva sigue el paralelo del verbo anterior. 'Fui persuadido' es claro y mantiene la correspondencia. La alternativa 'fui engañado' se preserva como lectura posible más intensa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  lexicon: transliteración del nombre divino
  rationale: La política del proyecto pide rendir el Tetragrámaton como 'Yahvé' en el texto principal, preservando el nombre propio divino en lugar de sustituirlo por un título.
- source_word: חֲזַקְתַּנִי
  english_pob_choice: you overpowered me
  chosen_spanish: me venciste
  alternatives_spanish:
  - me sobrepusiste tu fuerza
  - me dominaste
  lexicon: HALOT
  rationale: El verbo expresa haber sido fortalecido/sojuzgado por otro en un sentido de fuerza ejercida. 'Me venciste' comunica bien esa imposición en español sin sonar artificial.
- source_word: וַתּוּכָל
  english_pob_choice: and prevailed
  chosen_spanish: y prevaleciste
  alternatives_spanish:
  - y triunfaste
  - y venciste
  lexicon: HALOT
  rationale: '''Prevaleciste'' reproduce el matiz de éxito dominante y mantiene el paralelismo con el miembro anterior.'
- source_word: הָיִיתִי לִשְׂחוֹק
  english_pob_choice: I have become a laughingstock
  chosen_spanish: He llegado a ser motivo de risa
  alternatives_spanish:
  - Me he vuelto un hazmerreír
  - He sido objeto de burla
  lexicon: HALOT
  rationale: '''Motivo de risa'' expresa de forma natural la condición de ser objeto de escarnio. Se evita una calca dura y se conserva el sentido social de vergüenza pública.'
- source_word: כָּל הַיּוֹם כֻּלֹּה
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el tiempo
  - durante todo el día
  lexicon: HALOT
  rationale: La expresión totalizante se traduce de modo idiomático y conciso como 'todo el día', sin perder la intensidad durativa.
- source_word: לֹעֵג לִי
  english_pob_choice: everyone mocks me
  chosen_spanish: todos se burlan de mí
  alternatives_spanish:
  - todos se mofan de mí
  - cada uno se burla de mí
  lexicon: HALOT
  rationale: El participio singular funciona distributivamente; en español, el plural 'todos' comunica naturalmente la idea de burlas generalizadas. 'Se burlan de mí' conserva el tono de desprecio.
theological_decisions:
- issue: Cómo reflejar la tensión del verbo פתה sin suavizar ni absolutizar la acusación
  english_pob_reading: Use 'persuaded' in the main text and preserve 'deceived' in a footnote
  chosen_spanish_reading: Usar 'Me persuadiste' en el texto principal y conservar 'Me engañaste' en nota
  alternative_spanish_readings:
  - Me engañaste, Yahvé, y fui engañado
  - Me sedujiste, Yahvé, y fui seducido
  rationale: El lamento de Jeremías es deliberadamente agudo. 'Me persuadiste' evita imponer en el texto principal una acusación más cerrada de engaño, pero la nota mantiene la lectura más fuerte para no borrar la tensión teológica documentada en el hebreo y en el audit trail inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje quedó con alto acuerdo entre revisores y no requirió ajustes. La presente redacción sigue la decisión establecida de mantener la tensión de פתה en el texto principal y reservar la lectura más fuerte para nota.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se conserva la alternancia entre una lectura principal menos cerrada y una nota con la alternativa más fuerte, para respetar la tensión del lamento.
  - La voz poética se mantiene directa y sobria, sin expandir el sentido más allá del hebreo.
