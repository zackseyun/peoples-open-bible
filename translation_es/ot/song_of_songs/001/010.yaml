review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: elogio de las mejillas y del cuello con adornos. Mantiene correctamente «mejillas» para לְחָיַיִךְ y «cuello» para צַוָּארֵךְ. Sin embargo, la distribución de las notas y la elección de «hileras de joyas» para בַּחֲרוּזִים no preservan tan bien como podrían la idea de adornos ensartados/encordados que sí registra la auditoría inglesa.'
  spanish_quality_summary: El español es claro y poético, pero «con hileras de joyas» suena algo menos natural y menos preciso que «con collares de cuentas» o «con sartas de joyas/cuentas». Además, falta una nota para el segundo término ornamental, mientras que la nota [b] actual quedó anclada al primer sintagma y no cubre la alternativa léxica inglesa sobre cuentas/collares para חֲרוּזִים.
  glossary_alignment: 'No hay términos teológicos de proyecto implicados. Las decisiones léxicas principales están alineadas, salvo que conviene reflejar mejor el contraste entre בַּתֹּרִים («ornamentos» / posible «hileras») y בַּחֲרוּזִים (adornos ensartados: «collares de cuentas», «sartas», etc.).'
  issues:
  - severity: medium
    issue: La nota [b] está asociada a «ornamentos», pero falta una nota para «hileras de joyas».
    rationale: La auditoría inglesa conserva alternativas para ambos sintagmas ornamentales. En español, solo se documentó la alternativa de בַּתֹּרִים, dejando sin nota la de בַּחֲרוּזִים.
  - severity: medium
    issue: «Hileras de joyas» no expresa con suficiente claridad la idea de adornos ensartados.
    rationale: El hebreo חֲרוּזִים apunta a cuentas/joyas ensartadas o collares. «Hileras» puede sugerir mera disposición en fila más que un adorno colgante o ensartado.
  - severity: low
    issue: La nota [a] sobre «hermosas» es aceptable, pero no corresponde a una alternativa preservada en la auditoría inglesa tan importante como las dos de los adornos.
    rationale: No es incorrecta, pero en un versículo tan breve conviene priorizar las notas donde hay mayor incertidumbre léxica en el hebreo.
  revised_spanish_text: Tus mejillas son hermosas con ornamentos[a], tu cuello con collares de cuentas[b].
  revised_footnotes:
  - marker: a
    text: O «con hileras»; el término hebreo probablemente se refiere a filas o arreglos de adornos. Algunos lo entienden más literalmente como un tipo específico de adorno.
    reason: lexical_alternative
  - marker: b
    text: O «con cuentas» o «con collares»; el hebreo se refiere a adornos ensartados.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el segundo sintagma a «collares de cuentas» para reflejar mejor la idea de adornos ensartados de חֲרוּזִים, en línea con la auditoría inglesa. También se redistribuyen las notas para que cubran exactamente las dos incertidumbres léxicas principales del versículo: בַּתֹּרִים y בַּחֲרוּזִים. Se elimina la nota sobre «hermosas» por ser menos necesaria aquí.'
