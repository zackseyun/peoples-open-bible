id: EZK.41.7
reference: Ezekiel 41:7
source:
  edition: WLC
  text: וְֽ/רָחֲבָ֡ה וְֽ/נָסְבָה֩ לְ/מַ֨עְלָ/ה לְ/מַ֜עְלָ/ה לַ/צְּלָע֗וֹת כִּ֣י מֽוּסַב הַ֠/בַּיִת לְ/מַ֨עְלָ/ה לְ/מַ֜עְלָ/ה סָבִ֤יב סָבִיב֙ לַ/בַּ֔יִת עַל כֵּ֥ן רֹֽחַב לַ/בַּ֖יִת לְ/מָ֑עְלָ/ה וְ/כֵ֧ן הַ/תַּחְתּוֹנָ֛ה יַעֲלֶ֥ה עַל הָ/עֶלְיוֹנָ֖ה לַ/תִּיכוֹנָֽה־׀־־־׃
translation:
  text: And the side chambers became wider as they went around upward and upward[a], because the structure of the temple went around upward and upward all around the temple. Therefore the width of the temple increased upward[c][b], and so one went up from the lowest story to the highest by way of the middle story.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the side rooms.' The Hebrew term can denote side structures or chambers attached to the main building.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase rendered 'the structure of the temple went around' is architecturally difficult; some understand it as an encircling ledge, gallery, or offset in the wall.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''from the lowest to the highest, to the middle.'' The clause is compressed; the sense is ascent from the lower level to the upper by passing through the middle level.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָחֲבָה
  chosen: became wider
  alternatives:
  - widened
  - was broadened
  lexicon: HALOT
  rationale: Qal perfect feminine singular from רחב, agreeing with the feminine subject understood from 'side chambers.' 'Became wider' captures the stative/resultative sense in context of increasing width on higher levels.
- source_word: וְנָסְבָה
  chosen: as they went around
  alternatives:
  - and turned
  - and wound around
  lexicon: HALOT
  rationale: From סבב, here describing the surrounding or winding arrangement of the side chambers. Rendered with an iterative sense tied to ascent rather than a simple 'turned,' which would be too abrupt in English.
- source_word: לְמַעְלָה לְמַעְלָה
  chosen: upward and upward
  alternatives:
  - higher and higher
  - story by story upward
  lexicon: HALOT
  rationale: The repeated adverb emphasizes progressive ascent. 'Upward and upward' preserves the Hebrew repetition more closely than smoothing it to 'higher and higher.'
- source_word: לַצְּלָעוֹת
  chosen: the side chambers
  alternatives:
  - the side rooms
  - the ribs/sides
  lexicon: HALOT
  rationale: In temple-building context צלעות refers to side chambers/side structures attached to the main building, not literal 'ribs.' 'Side chambers' is the established architectural sense and remains clear in modern English.
- source_word: כִּי מוּסַב הַבַּיִת
  chosen: because the structure of the temple went around
  alternatives:
  - because the temple had an encircling ledge
  - because there was a surrounding arrangement for the temple
  - because the temple was surrounded
  lexicon: HALOT
  rationale: מוּסַב is a difficult architectural term from סבב. Rather than over-specifying an uncertain feature such as 'ledge,' 'structure ... went around' preserves the idea of an encircling construction that explains the widening upper chambers.
- source_word: סָבִיב סָבִיב לַבַּיִת
  chosen: all around the temple
  alternatives:
  - round about the temple
  - around and around the temple
  lexicon: HALOT
  rationale: The doubled סביב intensifies the encircling sense. 'All around' is natural English while still reflecting the repetition's force.
- source_word: עַל כֵּן רֹחַב לַבַּיִת לְמָעְלָה
  chosen: Therefore the width of the temple increased upward
  alternatives:
  - Therefore there was greater width for the temple upward
  - Therefore the temple had increasing width upward
  lexicon: HALOT
  rationale: 'The clause is elliptical. Supplying ''increased'' makes the sense explicit in English without adding foreign content: the building''s width expanded on the higher levels because of the surrounding construction.'
- source_word: וְכֵן הַתַּחְתּוֹנָה יַעֲלֶה עַל הָעֶלְיוֹנָה לַתִּיכוֹנָה
  chosen: and so one went up from the lowest story to the highest by way of the middle story
  alternatives:
  - and so the ascent was from the lower to the upper through the middle
  - and thus one ascended from the lowest chamber to the highest through the middle one
  lexicon: HALOT
  rationale: 'This final clause is syntactically compressed and somewhat difficult. The sense is of upward movement through three levels: lower, middle, upper. ''One went up'' avoids forcing an explicit subject not present in Hebrew, while ''by way of the middle story'' reflects לַתִּיכוֹנָה as the route through the middle level.'
- source_word: הַבַּיִת
  chosen: the temple
  alternatives:
  - the house
  lexicon: HALOT
  rationale: In Ezekiel's temple vision, 'house' refers to the temple building. 'Temple' communicates the referent clearly in contemporary English while remaining faithful to context.
