translation:
  language: es
  text: ¡Ay de los que están tranquilos en Sion, y de los que se sienten seguros en el monte de Samaria, los hombres distinguidos[a] de lo principal entre las naciones[b], a quienes viene la casa de Israel[c]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los designados» o «los nombrados», refiriéndose a personas prominentes o notables.
    reason: lexical_alternative
  - marker: b
    text: O «lo primero entre las naciones» o «lo principal entre las naciones».
    reason: lexical_alternative
  - marker: c
    text: 'La cláusula hebrea es muy comprimida: literalmente, «y la casa de Israel viene a ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de los!
  lexicon: HALOT
  rationale: El interjección profética expresa a la vez lamento y denuncia. En español, «¡Ay de!» comunica mejor ese matiz que un simple «¡ay» aislado, manteniendo el tono de advertencia sin sonar excesivamente arcaico.
- source_word: הַשַּׁאֲנַנִּים
  english_pob_choice: those who are at ease
  chosen_spanish: los que están tranquilos
  alternatives_spanish:
  - los complacientes
  - los que están seguros
  lexicon: HALOT
  rationale: El hebreo denota calma, autosatisfacción o despreocupación. «Los que están tranquilos» conserva la idea de seguridad relajada sin imponer todavía una interpretación moral más fuerte que el contexto luego desarrolla.
- source_word: בְּצִיּוֹן
  english_pob_choice: in Zion
  chosen_spanish: en Sion
  alternatives_spanish:
  - en Zion
  lexicon: HALOT
  rationale: Se mantiene el topónimo bíblico en su forma española tradicional «Sion», más natural para lectura eclesial que la transliteración inglesa. No se sustituye por un equivalente explicativo porque el lugar es parte del contraste profético.
- source_word: וְהַבֹּטְחִים
  english_pob_choice: those who feel secure
  chosen_spanish: los que se sienten seguros
  alternatives_spanish:
  - los que confían
  - los confiados
  lexicon: HALOT
  rationale: בטח puede expresar confianza o seguridad. Aquí el contexto apunta a una seguridad falsa o complaciente; «se sienten seguros» conserva ese matiz de auto-confianza sin convertirlo en una virtud espiritual.
- source_word: בְּהַר שֹׁמְרוֹן
  english_pob_choice: on the mountain of Samaria
  chosen_spanish: en el monte de Samaria
  alternatives_spanish:
  - sobre el monte de Samaria
  - en el monte Samaria
  lexicon: HALOT
  rationale: El hebreo usa la imagen geográfica de «monte». En español, «monte de Samaria» reproduce bien la construcción sin forzar el nombre propio compuesto ni perder la referencia topográfica.
- source_word: נְקֻבֵי
  english_pob_choice: distinguished men
  chosen_spanish: los hombres distinguidos
  alternatives_spanish:
  - los designados
  - los nombrados
  - los marcados
  lexicon: HALOT
  rationale: El término puede significar «nombrados/designados», pero en contexto apunta a personas notables o prominentes. «Distinguidos» preserva la idea social de preeminencia y deja visible la tensión con el sentido más literal, que se recoge en la nota.
- source_word: רֵאשִׁית הַגּוֹיִם
  english_pob_choice: the foremost of the nations
  chosen_spanish: de lo primero de las naciones
  alternatives_spanish:
  - de la primacía de las naciones
  - de la primera de las naciones
  - del primero de los pueblos
  lexicon: HALOT
  rationale: La expresión es comprimida y puede apuntar a «primero/lo principal/la preeminencia». Se mantiene la fuerza superlativa con una formulación cercana al hebreo, sin borrar la ambigüedad léxica documentada por la POB inglesa.
- source_word: וּבָאוּ לָהֶם
  english_pob_choice: to whom ... comes
  chosen_spanish: a quienes se acerca
  alternatives_spanish:
  - a quienes llega
  - y la casa de Israel viene a ellos
  - a quienes viene la casa de Israel
  lexicon: HALOT
  rationale: La cláusula hebrea es breve y sintácticamente compacta. «A quienes se acerca» hace explícita la relación implícita, conservando la dirección del movimiento y la dependencia de la casa de Israel hacia esos líderes.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión de pacto «casa de Israel» para no reducirla a un simple nombre geográfico o étnico. Mantiene el peso colectivo y tradicional del hebreo.
theological_decisions:
- issue: Alcance de la denuncia entre Sion y Samaria
  english_pob_reading: The verse addresses complacent elites in both Judah (Zion) and Israel (Samaria).
  chosen_spanish_reading: La denuncia alcanza a los acomodados de Sion y a los seguros de Samaria, manteniendo el paralelo entre ambos centros de poder.
  alternative_spanish_readings:
  - La denuncia se dirige solo al norte con Sion como referencia retórica.
  - El texto debería homogenizarse a un solo grupo de líderes.
  rationale: La estructura paralela del hebreo nombra explícitamente ambos lugares. La traducción española conserva esa amplitud sin resolver artificialmente la tensión geográfica o política.
  doctrine_reference: Profecía de juicio contra la complacencia; lectura histórico-canónica del libro de Amós.
translation_notes:
  revision_awareness: 'Se ha seguido el acuerdo alto del repaso reciente: no hubo cambios de fondo en la revisión más reciente, y la redacción española mantiene el paralelismo, la ambigüedad léxica de נְקֻבֵי y רֵאשִׁית, y la cláusula hebrea comprimida sobre la venida de la casa de Israel.'
  spanish_consistency_notes:
  - Se usa «Sion» como forma española estable del topónimo bíblico.
  - Se conserva «casa de Israel» por consistencia con la terminología pactual de la serie.
  - Se mantiene el tono profético de reprensión con «¡Ay de!» en vez de una paráfrasis más suave.
  - «Monte de Samaria» preserva la imagen geográfica del hebreo.
  - No se sustituye «los que están tranquilos / se sienten seguros» por vocabulario homilético más interpretativo.
