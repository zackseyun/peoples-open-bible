translation:
  language: es
  text: Él ha convertido mi vid en una desolación y mi higuera en un tocón[a]; la ha despojado por completo y la ha arrojado; sus ramas se han vuelto blancas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tocones»; el hebreo es raro y puede sugerir restos quebrados o mutilados, no solo un corte limpio.
    reason: lexical_alternative
  - marker: b
    text: O «sus brotes/zarcillos se han vuelto blancos»; probablemente describe la madera expuesta tras ser arrancada la corteza.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂם
  english_pob_choice: has made
  chosen_spanish: ha convertido
  alternatives_spanish:
  - ha hecho
  - ha puesto
  - ha vuelto
  lexicon: HALOT
  rationale: El verbo hebreo con לְשַׁמָּה expresa el resultado de convertir algo en ruina; en español, «ha convertido» transmite bien ese valor resultativo sin sonar forzado.
- source_word: גַּפְנִי
  english_pob_choice: my vine
  chosen_spanish: mi vid
  alternatives_spanish:
  - mi parra
  - mi viña
  lexicon: HALOT
  rationale: גֶּפֶן designa la vid, no la viña. «Mi vid» conserva el objeto vegetal concreto del texto y la posesión del lamento.
- source_word: לְשַׁמָּה
  english_pob_choice: a desolation
  chosen_spanish: en una desolación
  alternatives_spanish:
  - en ruina
  - en devastación
  - en desierto
  lexicon: HALOT
  rationale: שַׁמָּה nombra desolación/ruina. La preposición y el sustantivo mantienen en español la imagen de transformación en estado de ruina.
- source_word: וּתְאֵנָתִי
  english_pob_choice: my fig tree
  chosen_spanish: mi higuera
  alternatives_spanish:
  - mi árbol de higos
  - mi higuera de higos
  lexicon: HALOT
  rationale: תְּאֵנָה es la higuera; «higuera» es la forma natural y fiel en español para el árbol mencionado.
- source_word: לִקְצָפָה
  english_pob_choice: a stump
  chosen_spanish: un tocón
  alternatives_spanish:
  - un muñón
  - un tronco cortado
  - astillas
  lexicon: HALOT
  rationale: La palabra hebrea es rara y el audit trail inglés privilegia «a stump» tras revisión. «Tocón» es el equivalente español más natural para un árbol reducido a la base cortada, manteniendo la idea de resto mutilado sin exagerar el detalle.
- source_word: חָשֹׂף חֲשָׂפָהּ
  english_pob_choice: has stripped it bare
  chosen_spanish: la ha despojado por completo
  alternatives_spanish:
  - la ha pelado
  - la ha desnudado
  - la ha despojado
  lexicon: HALOT
  rationale: La combinación intensiva del mismo radical pide una traducción enfática. «Despojado por completo» conserva la fuerza de la intensificación y evita una imagen demasiado coloquial.
- source_word: וְהִשְׁלִיךְ
  english_pob_choice: and cast it away
  chosen_spanish: y la ha echado
  alternatives_spanish:
  - y la ha arrojado
  - y la ha lanzado
  - y la ha echado fuera
  lexicon: HALOT
  rationale: El verbo significa arrojar/castar. «Echar» en pasado compuesto comunica el movimiento violento y admite un español sobrio y bíblico.
- source_word: הִלְבִּינוּ
  english_pob_choice: have turned white
  chosen_spanish: se han vuelto blancos
  alternatives_spanish:
  - han quedado blancos
  - se han blanqueado
  - han blanqueado
  lexicon: HALOT
  rationale: El hebreo describe el resultado visible de la madera expuesta tras ser despojada de la corteza. «Se han vuelto blancos» preserva el efecto observacional sin decidir de forma excesiva entre pasivo o medio.
- source_word: שָׂרִיגֶיהָ
  english_pob_choice: its branches
  chosen_spanish: sus sarmientos
  alternatives_spanish:
  - sus ramas
  - sus brotes
  - sus pámpanos
  lexicon: HALOT
  rationale: שָׂרִיג puede referirse a sarmientos/tentáculos/brotes de vid. Dado el contexto agrícola y la imagen de la vid, «sarmientos» preserva mejor el matiz botánico que «ramas».
theological_decisions:
- issue: Imagen de juicio agrícola aplicada a la vid y la higuera
  english_pob_reading: 'A lament describing devastation: vine and fig tree reduced, stripped, and whitened.'
  chosen_spanish_reading: 'Un lamento de desolación agrícola: la vid y la higuera han sido reducidas, despojadas y dejadas blanqueadas.'
  alternative_spanish_readings:
  - Una metáfora general de ruina nacional
  - Una descripción literal de poda o tala
  rationale: El verso funciona como lamentación profética con imagen concreta de devastación. La traducción conserva esa concreción sin convertirla en metáfora vaga ni en mera descripción hortícola.
  doctrine_reference: Joel 1:7; juicio profético en el libro de Joel
translation_notes:
  revision_awareness: El inglés POB revisó su propia traducción de Joel 1:7, cambiando «splinters» por «a stump» para לִקְצָפָה y ajustando «thrown it down» a «cast it away» para reflejar mejor וְהִשְׁלִיךְ. La versión española sigue esa revisión, prefiriendo «tocón» y «la ha echado», y mantiene la nota sobre la posible lectura botánica de los sarmientos blanqueados.
  spanish_consistency_notes:
  - Se mantiene «vid» para גֶּפֶן y «higuera» para תְּאֵנָה, con vocabulario agrícola natural en español.
  - Se usa «Yahvé» solo cuando el texto fuente lo exija explícitamente; este verso no contiene el nombre divino.
  - «Sarmientos» conserva la imagen vitícola del hebreo frente a una generalización a «ramas».
  - La intensificación verbal se refleja con «despojado por completo».
