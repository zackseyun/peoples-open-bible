review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: el adúltero encuentra daño/deshonra y su afrenta perdura. Sin embargo, la nota [a] no preserva una verdadera alternativa léxica, porque repite exactamente la misma frase del texto principal en vez de reflejar la alternativa inglesa documentada (''wound and dishonor'' / ''bodily harm and public shame''). Además, la nota [b] está formulada de manera torpe y con puntuación poco natural.'
  spanish_quality_summary: El texto principal es claro y fiel. 'Hallará' suena digno y bíblico; 'deshonra' y 'oprobio' comunican bien la dimensión pública. 'Herida' es aceptable, aunque algo más estrecho que 'injury'; la nota puede compensarlo con 'daño corporal'. Las notas necesitan reparación de estilo y contenido para sonar naturales en español y cumplir mejor su función.
  glossary_alignment: 'No hay términos del glosario teológico principal en juego. Las decisiones léxicas están mayormente alineadas con el expediente inglés: נגע -> ''herida'' con alternativa más amplia en nota; קלון -> ''deshonra''; חרפתו -> ''oprobio''; לא תמחה -> ''no será borrado''.'
  issues:
  - severity: medium
    issue: La nota [a] repite el texto principal en lugar de ofrecer una alternativa real.
    rationale: El expediente inglés documenta una alternativa léxica ('wound and dishonor') y una explicación más concreta ('bodily harm and public shame'). La nota española actual dice 'También puede entenderse como "herida y deshonra"', que no añade información porque eso ya aparece en el texto.
  - severity: low
    issue: La nota [b] tiene redacción y puntuación poco naturales.
    rationale: 'La forma "''O: ''''su oprobio no será borrado'''' / ''''su deshonra no será borrada''''.''" es innecesariamente enrevesada. Debe expresarse con una fórmula sencilla y española.'
  revised_spanish_text: Hallará herida y deshonra[a], y su oprobio no será borrado[b].
  revised_footnotes:
  - marker: a
    text: O 'herida y deshonor'; los términos hebreos también pueden entenderse más concretamente como daño corporal y vergüenza pública.
    reason: lexical_alternative
  - marker: b
    text: O 'su deshonra no será borrada'.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es sustancialmente fiel y legible, pero se corrigen las notas para que reflejen de verdad las alternativas léxicas documentadas en el expediente inglés y suenen naturales en español.
