  yaml_path: translation/nt/1_corinthians/011/024.yaml
  text: And after giving thanks[a], he broke it and said, “This is my body, which is for you[b]. Do this in remembrance of me.”
  footnotes:
  - marker: a
    text: Or 'which is on your behalf' or 'which is for your sake.'
