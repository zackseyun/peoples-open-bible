translation:
  language: es
  text: En aquel tiempo Herodes el tetrarca[a] oyó la noticia[b] acerca de Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Título político histórico; se conserva el término técnico "tetrarca" en lugar de una paráfrasis.
    reason: cultural_note
  - marker: b
    text: O «el informe acerca de Jesús».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν ἐκείνῳ τῷ καιρῷ
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - Entonces
  lexicon: BDAG
  rationale: La frase funciona como marcador temporal idiomático. "En aquel tiempo" conserva el valor temporal de forma natural en español y evita una reproducción mecánica de la estructura griega.
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró de
  lexicon: BDAG
  rationale: El aoristo de ἀκούω aquí expresa la acción básica de oír. "Oyó" es el equivalente más directo y sobrio; "se enteró de" añade interpretación, y "escuchó" suena menos natural en este contexto narrativo.
- source_word: Ἡρῴδης
  english_pob_choice: Herod
  chosen_spanish: Herodes
  alternatives_spanish:
  - Herodes
  lexicon: transliteration
  rationale: Se conserva la transliteración estándar del nombre propio en español bíblico.
- source_word: ὁ τετραάρχης
  english_pob_choice: the tetrarch
  chosen_spanish: el tetrarca
  alternatives_spanish:
  - el gobernante de la cuarta parte
  - el gobernante territorial
  lexicon: BDAG
  rationale: '"Tetrarca" es el título histórico establecido en español y mantiene la precisión política del término sin diluirlo en una paráfrasis.'
- source_word: τὴν ἀκοὴν
  english_pob_choice: the report
  chosen_spanish: la noticia
  alternatives_spanish:
  - el informe
  - el rumor
  lexicon: BDAG
  rationale: ἀκοή aquí no alude a la facultad de oír sino a lo que se oye. "La noticia" comunica bien el contenido divulgado y preserva la alternativa inglesa "the news"; "el informe" suena más administrativo y "rumor" sería demasiado restrictivo.
- source_word: Ἰησοῦ
  english_pob_choice: about Jesus
  chosen_spanish: acerca de Jesús
  alternatives_spanish:
  - de Jesús
  - sobre Jesús
  lexicon: BDAG
  rationale: El genitivo tras ἀκοή se vierte de manera natural con una expresión preposicional que indique contenido. "Acerca de Jesús" conserva el sentido informativo sin forzar una lectura posesiva.
translation_notes:
  revision_awareness: Se siguió el estado de alta concordancia del audit trail inglés, sin revisiones aplicadas. La redacción española procura fidelidad semántica con fluidez natural y conserva la distinción entre el título histórico y el contenido oído.
  spanish_consistency_notes:
  - Se mantiene "Jesús" como nombre propio constante.
  - Se traduce el título político con "tetrarca" para conservar precisión histórica.
  - Se usa "acerca de" para el complemento dependiente de ἀκοή, evitando una posesión literal que suene impropia en español.
  - No hay decisiones doctrinales en este versículo; el foco es léxico y sintáctico.
