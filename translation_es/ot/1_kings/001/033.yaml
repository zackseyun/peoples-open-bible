  rationale: Se reemplazó el tratamiento peninsular («Tomad», «vosotros», «vuestro») por formas neutrales de amplia comprensión latinoamericana («Lleven», «ustedes», «su»). También se ajustó «bajadlo» a «llévenlo abajo» para expresar de manera más natural el causativo con sentido topográfico de descenso hacia Gihón, sin alterar el significado. Se conservó la nota sobre el valor causativo del verbo.
