    issue: πᾶσαν ἀδικίαν como 'toda injusticia'
    rationale: La auditoría inglesa eligió 'every kind of unrighteousness' para preservar el alcance amplio de πᾶσαν con ἀδικία. En español, 'toda injusticia' puede leerse como categoría abstracta o sonar menos explícito que 'toda clase de injusticia'.
  - severity: medium
    issue: '''en arrogancia'' suena poco natural en español'
    rationale: Aunque formalmente cercano al griego, en español bíblico natural 'con soberbia' o 'con arrogancia' fluye mejor que 'en arrogancia' para expresar manera.
  - severity: low
    issue: '''hacen'' es menos idiomático con ''injusticia'''
    rationale: Con 'injusticia', verbos como 'cometen' u 'obran' suelen sonar más naturales. No es error semántico grave, pero mejora la legibilidad.
  revised_spanish_text: Que Dios quite a los que cometen toda clase de injusticia con soberbia[a][b], porque el Señor nuestro Dios es un juez grande y poderoso en justicia[c].
