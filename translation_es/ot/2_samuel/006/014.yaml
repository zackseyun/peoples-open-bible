base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/006/014.yaml
  text: And David was dancing with all his might before Yahweh[b][a], and David was wearing a linen ephod.
  footnotes:
  - marker: a
    text: Or 'was whirling' or 'was leaping about'; the Hebrew depicts energetic celebratory movement.
    reason: lexical_alternative
  - marker: b
    text: An ephod was a distinctive priestly or cultic garment; here David is described as wearing one made of linen.
    reason: cultural_note
