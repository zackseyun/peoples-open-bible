translation:
  language: es
  text: Entonces enviaron y tomaron a Jeremías del atrio de la guardia, y lo entregaron a Gedalías hijo de Ahicam, hijo de Safán, para llevarlo a la casa[a]. Y vivió entre el pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a una casa». El hebreo dice literalmente «a la casa», lo que puede referirse a una residencia bajo el cuidado de Gedalías.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלְחוּ
  english_pob_choice: they sent
  chosen_spanish: enviaron
  alternatives_spanish:
  - mandaron
  - despacharon
  lexicon: HALOT
  rationale: El verbo básico שׁלח aquí expresa el envío dentro de la secuencia narrativa. «Enviaron» preserva el movimiento de envío sin añadir objetos ni matices que el hebreo no especifica.
- source_word: וַיִּקְחוּ אֶת יִרְמְיָהוּ
  english_pob_choice: took Jeremiah
  chosen_spanish: sacaron a Jeremías
  alternatives_spanish:
  - tomaron a Jeremías
  - trajeron a Jeremías
  lexicon: HALOT
  rationale: לקח puede ser simplemente «tomar», pero en este contexto el resultado es la extracción de Jeremías de su confinamiento. «Sacaron» comunica mejor la función narrativa sin abandonar la acción de tomar/retirar implícita en el hebreo.
- source_word: מֵחֲצַר הַמַּטָּרָה
  english_pob_choice: from the court of the guard
  chosen_spanish: del atrio de la guardia
  alternatives_spanish:
  - del patio de la guardia
  - del atrio de los guardias
  lexicon: HALOT
  rationale: חָצֵר es «atrio/patio» y מַטָּרָה en Jeremías designa el lugar de custodia vigilada. «Atrio de la guardia» mantiene el valor espacial y la referencia al personal de custodia sin convertirlo innecesariamente en «prisión».
- source_word: וַיִּתְּנוּ אֹתוֹ אֶל
  english_pob_choice: they entrusted him to
  chosen_spanish: lo entregaron a
  alternatives_spanish:
  - lo encomendaron a
  - lo confiaron a
  lexicon: HALOT
  rationale: נתן + אֶל literalmente es «dar a», pero en el contexto de transferencia de responsabilidad «lo entregaron a» es natural en español y conserva la idea de poner a Jeremías bajo el cuidado/autoridad de otro. «Confiaron» sería más interpretativo que el hebreo inmediato.
- source_word: גְּדַלְיָהוּ בֶּן אֲחִיקָם בֶּן שָׁפָן
  english_pob_choice: Gedaliah son of Ahikam, son of Shaphan
  chosen_spanish: Gedalías hijo de Ahicam, hijo de Safán
  alternatives_spanish:
  - Gedalías hijo de Ahicam, hijo de Safán
  lexicon: transliteration policy
  rationale: Se conservan los nombres propios en transliteración según la práctica del proyecto, y se mantiene íntegra la cadena patronímica del texto hebreo.
- source_word: לְהוֹצִאֵהוּ
  english_pob_choice: to bring him
  chosen_spanish: para llevarlo
  alternatives_spanish:
  - para sacarlo
  - para conducirlo
  lexicon: HALOT
  rationale: El hifil de יצא expresa causar la salida o llevar fuera. Dado que sigue un complemento direccional, «para llevarlo» evita redundancia y comunica con naturalidad la finalidad de traslado.
- source_word: אֶל הַבָּיִת
  english_pob_choice: to the house
  chosen_spanish: a la casa
  alternatives_spanish:
  - a la vivienda
  - a su casa
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a la casa». En español, «a la casa» preserva la literalidad y mantiene abierta la misma ambigüedad de destino que el inglés POB documentó; no se fuerza «su casa», que no está explícito.
- source_word: וַיֵּשֶׁב
  english_pob_choice: he lived
  chosen_spanish: habitó
  alternatives_spanish:
  - vivió
  - se estableció
  lexicon: HALOT
  rationale: ישׁב puede significar «habitar/vivir». «Habitó» es formal y recoge la idea de residencia continua más que el acto puntual de sentarse.
- source_word: בְּתוֹךְ הָעָם
  english_pob_choice: among the people
  chosen_spanish: entre el pueblo
  alternatives_spanish:
  - en medio del pueblo
  - entre la gente
  lexicon: HALOT
  rationale: La expresión marca inserción comunitaria. «Entre el pueblo» preserva el sentido colectivo de עָם y sugiere la restauración de Jeremías dentro de la comunidad.
theological_decisions:
- issue: 'Destino de traslado: «a la casa» vs. una paráfrasis residencial'
  english_pob_reading: to the house, with the note that it may refer to a residence under Gedaliah's care
  chosen_spanish_reading: a la casa, dejando abierta la posibilidad de una residencia bajo el cuidado de Gedalías
  alternative_spanish_readings:
  - a su casa
  - a la vivienda
  - a la residencia
  rationale: El hebreo y el audit trail inglés no especifican posesión; la nota del POB indica que «la casa» puede referirse a una residencia bajo la responsabilidad de Gedalías. Mantener «a la casa» conserva esa tensión y evita resolverla demasiado pronto.
  doctrine_reference: Ninguno; decisión de precisión textual y contextual.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que cambió «bring him home» por «bring him to the house» para acercarse más al hebreo literal. Por eso la versión española conserva «a la casa» y no suaviza el final con una equivalencia más libre.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Gedalías», «Ahicam» y «Safán» siguen la transliteración usual ya que el texto presenta nombres propios y patronímicos.
  - «Pueblo» traduce עָם en sentido colectivo, evitando «gente» para no debilitar el tono comunitario del pasaje.
  - La estructura de dos acciones sucesivas («enviaron y sacaron») refleja la secuencia verbal hebrea sin añadir elementos narrativos no explicitados.
