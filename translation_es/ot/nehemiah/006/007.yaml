base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/006/007.yaml
  text: And you have even appointed prophets to proclaim concerning you in Jerusalem[a], saying, ‘There is a king in Judah!’ And now these reports will be heard by the king. So now, come[b], and let us consult together.
  footnotes:
  - marker: a
    text: Or 'these things' or 'such words.' The Hebrew can refer broadly to words, matters, or reports.
    reason: lexical_alternative
  - marker: b
    text: The quoted accusation is literally 'king in Judah,' a terse Hebrew report that implies a claim of kingship without explicitly naming Nehemiah in the quotation itself.
    reason: alternative_reading
