  rationale: 'The draft translates ''ܘܡܕܪܗ ܕܡܘܣܪ ܢܛܪܘ'' as ''and kept the path of discipline,'' which creates a glaring contradiction in a list of wicked actions. The negative particle ''ܠܐ'' (not) from the preceding clause (ܘܡܢ ܪ̈ܚܡܐ ܠܐ ܐܚܣܘ) governs both verbs, meaning ''nor keep the path of discipline.'' | Adjudicator: The reviewer correctly identifies a case of double-duty negation, a common feature in Semitic rhetoric where a single negative particle (ܠܐ) in the first clause governs the coordinated second clause. '
