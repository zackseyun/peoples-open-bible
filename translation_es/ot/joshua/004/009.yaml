translation:
  language: es
  text: Y Josué levantó doce piedras en medio del Jordán, debajo del lugar donde estaban de pie los pies de los sacerdotes que llevaban el arca del pacto, y allí están hasta hoy[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «debajo del lugar donde estaban los pies de los sacerdotes». La expresión hebrea es muy literal y se refiere al sitio donde los sacerdotes estaban de pie mientras llevaban el arca.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵקִים
  english_pob_choice: set up
  chosen_spanish: levantó
  alternatives_spanish:
  - erigió
  - levantó y colocó
  lexicon: HALOT
  rationale: El verbo en hifil de קום puede significar establecer o levantar un objeto. En español, «levantó» comunica con naturalidad la acción de alzar y disponer las piedras memoriales, sin perder el sentido de colocarlas como señal.
- source_word: בְּתוֹךְ הַיַּרְדֵּן
  english_pob_choice: in the midst of the Jordan
  chosen_spanish: en medio del Jordán
  alternatives_spanish:
  - en el centro del Jordán
  - dentro del Jordán
  lexicon: HALOT
  rationale: בְּתוֹךְ expresa interioridad o centralidad. «En medio del Jordán» conserva el matiz solemne y espacial del hebreo, y es la equivalencia española más natural para la fórmula inglesa auditable.
- source_word: תַּחַת מַצַּב רַגְלֵי
  english_pob_choice: under the place where the feet ... stood
  chosen_spanish: debajo del lugar donde se detuvieron los pies
  alternatives_spanish:
  - bajo el lugar donde estaban los pies
  - debajo del sitio de la huella de los pies
  lexicon: HALOT
  rationale: מַצָּב se refiere a un lugar de pie o de estación. La imagen hebrea es muy literal; en español, «debajo del lugar donde se detuvieron los pies» preserva el valor locativo y la referencia concreta al sitio ocupado por los sacerdotes, sin oscurecerla con una calca demasiado áspera.
- source_word: נֹשְׂאֵי אֲרוֹן הַבְּרִית
  english_pob_choice: carrying the ark of the covenant
  chosen_spanish: que llevaban el arca del pacto
  alternatives_spanish:
  - que cargaban el arca del pacto
  - que portaban el arca del pacto
  lexicon: HALOT
  rationale: El participio describe a los sacerdotes como los que llevaban el arca. «Llevaban» es claro y digno en español; «arca del pacto» mantiene la terminología bíblica y refleja el sustantivo hebreo בְּרִית con precisión.
- source_word: וַיִּהְיוּ שָׁם
  english_pob_choice: and they are there
  chosen_spanish: y allí están
  alternatives_spanish:
  - y estuvieron allí
  - y permanecen allí
  lexicon: HALOT
  rationale: Aunque la forma verbal es narrativa pasada, la construcción con עַד הַיּוֹם הַזֶּה expresa continuidad desde la perspectiva del narrador. «Y allí están» preserva ese valor de permanencia actual sin forzar una explicación en el cuerpo principal.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta el día de hoy
  - hasta este día
  lexicon: HALOT
  rationale: Es un hebraísmo temporal estándar. «Hasta hoy» es natural en español y conserva el sentido de vigencia hasta el momento narrativo, sin añadir una lectura histórica externa.
theological_decisions:
- issue: Tensión narrativa entre este versículo y el conjunto de las doce piedras erigidas en Guilgal en el contexto cercano
  english_pob_reading: Translate this verse straightforwardly as describing Joshua setting up twelve stones in the Jordan itself.
  chosen_spanish_reading: Traducir el versículo de manera directa como la colocación de doce piedras en medio del Jordán.
  alternative_spanish_readings:
  - Interpretarlo como una recapitulación de las piedras llevadas del Jordán y erigidas en otro lugar
  - Suavizar la lectura para armonizarlo con el monumento de Guilgal
  rationale: El hebreo afirma explícitamente que Josué las levantó en medio del Jordán. La traducción debe preservar esa afirmación textual, aun cuando exista una tensión aparente con el memorial mencionado en el contexto. La reconciliación interpretativa no debe imponerse en el texto principal.
  doctrine_reference: Translation philosophy §1, §3
- issue: Fórmula temporal final עַד הַיּוֹם הַזֶּה
  english_pob_reading: 'Render as an ongoing state from the narrator''s perspective: ''they are there to this day.'''
  chosen_spanish_reading: 'Mantener la perspectiva del narrador: «y allí están hasta hoy».'
  alternative_spanish_readings:
  - «y allí estuvieron hasta hoy»
  - «y permanecen allí hasta hoy»
  rationale: La fórmula hebrea marca continuidad hasta el tiempo del narrador. En español, «hasta hoy» comunica esa vigencia sin afirmar más de lo que el texto exige sobre la situación visible para el lector actual.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió una formulación más natural de la relación espacial y eliminó el pluscuamperfecto innecesario. En español, se reflejó esa misma tendencia con una sintaxis fluida («debajo del lugar donde se detuvieron los pies») y un presente narrativo final («y allí están»), sin suavizar la afirmación hebrea sobre la ubicación de las piedras.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» según el estándar del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se eligió «arca del pacto» para conservar la terminología bíblica estable del pasaje.
  - «Hasta hoy» se usó como equivalente idiomático de עַד הַיּוֹם הַזֶּה.
  - Se evitó armonizar el texto con otras referencias del relato para no borrar la tensión narrativa documentada.
