translation:
  language: es
  text: Y sucederá[a] que, si obedeces diligentemente la voz de Yahvé tu Dios, cuidando de poner por obra todos sus mandamientos que yo te mando hoy, entonces Yahvé tu Dios te pondrá en alto sobre todas las naciones de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «si al escuchar escuchas la voz de Yahvé tu Dios», un modismo que expresa escucha atenta y obediente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y será
  - Y acontecerá
  lexicon: HALOT
  rationale: Expresa bien la fórmula introductoria de consecuencia y su tono formal, sin sonar mecánica en español.
- source_word: אִם שָׁמֹעַ תִּשְׁמַע
  english_pob_choice: if you diligently obey
  chosen_spanish: si escuchas con diligencia
  alternatives_spanish:
  - si obedeces fielmente
  - si realmente escuchas
  lexicon: HALOT
  rationale: La duplicación verbal intensifica la acción; en español, 'escuchar con diligencia' conserva la imagen de oír atentamente y la fuerza obediente del hebreo.
- source_word: בְּקוֹל
  english_pob_choice: the voice
  chosen_spanish: la voz
  alternatives_spanish:
  - lo que dice
  - el sonido
  lexicon: HALOT
  rationale: Se conserva 'voz' para mantener el modismo del pacto 'escuchar la voz de Yahvé'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio POB de rendir el Nombre divino con 'Yahvé' en el texto principal.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, el Dios tuyo
  lexicon: HALOT
  rationale: La forma posesiva directa del hebreo se mantiene de modo natural en español.
- source_word: לִשְׁמֹר לַעֲשׂוֹת
  english_pob_choice: being careful to do
  chosen_spanish: cuidando de poner por obra
  alternatives_spanish:
  - cuidando de hacer
  - guardando para hacer
  lexicon: HALOT
  rationale: El par de infinitivos expresa observancia cuidadosa que desemboca en obediencia práctica; 'poner por obra' es una solución idiomática y fiel al registro bíblico.
- source_word: כָּל מִצְוֺתָיו
  english_pob_choice: all his commandments
  chosen_spanish: todos sus mandamientos
  alternatives_spanish:
  - todas sus órdenes
  - cada uno de sus mandamientos
  lexicon: HALOT
  rationale: '''Mandamientos'' preserva el campo legal-covenantal mejor que ''órdenes''.'
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  english_pob_choice: that I am commanding you today
  chosen_spanish: que yo te mando hoy
  alternatives_spanish:
  - que hoy te estoy mandando
  - que te mando en este día
  lexicon: HALOT
  rationale: La forma progresiva inglesa puede expresarse de manera más natural con el presente castellano; 'hoy' conserva la inmediatez del discurso de Moisés.
- source_word: וּנְתָנְךָ
  english_pob_choice: then ... will set you
  chosen_spanish: te pondrá en alto
  alternatives_spanish:
  - te colocará
  - te exaltará
  lexicon: HALOT
  rationale: En este contexto נתן con complemento predicativo no significa simplemente 'dar', sino colocar en una posición elevada; 'poner en alto' comunica bien esa elevación.
- source_word: עֶלְיוֹן
  english_pob_choice: high
  chosen_spanish: en alto
  alternatives_spanish:
  - exaltado
  - alto
  lexicon: HALOT
  rationale: Aquí el adjetivo describe la condición elevada de Israel, no el título divino 'Altísimo'; 'en alto' mantiene la comparación implícita.
- source_word: עַל כָּל גּוֹיֵי הָאָרֶץ
  english_pob_choice: above all the nations of the earth
  chosen_spanish: sobre todas las naciones de la tierra
  alternatives_spanish:
  - por encima de todas las naciones de la tierra
  - sobre todos los pueblos de la tierra
  lexicon: HALOT
  rationale: '''Naciones'' corresponde a גּוֹיֵי y ''tierra'' a הָאָרֶץ; ''sobre'' conserva la comparación de superioridad.'
theological_decisions:
- issue: Rendición del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se mantiene la política POB de nombrarlo como 'Yahvé' en vez de ocultarlo con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Índole del imperativo de obediencia en שָׁמֹעַ תִּשְׁמַע בְּקוֹל
  english_pob_reading: diligently obey the voice of Yahweh your God
  chosen_spanish_reading: escuchas con diligencia la voz de Yahvé tu Dios
  alternative_spanish_readings:
  - obedeces diligentemente la voz de Yahvé tu Dios
  - oyes con atención la voz de Yahvé tu Dios
  rationale: Se conserva la tensión entre oír y obedecer sin reducirla a mera audición. 'Escuchar con diligencia' deja visible el modismo hebreo y sigue siendo natural en español.
  doctrine_reference: DOCTRINE.md Covenant obedience idiom
translation_notes:
  revision_awareness: La revisión inglesa más reciente quedó sin cambios y el veredicto de concordancia fue alto; por eso la redacción española sigue de cerca las decisiones léxicas del auditor inglés, especialmente en el modismo de obediencia, el Nombre divino y la idea de elevación sobre las naciones.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - Se conserva 'la voz' para בְּקוֹל, evitando neutralizar el modismo.
  - '''Mandamientos'' preserva el registro pactal/legal del pasaje.'
  - '''Naciones de la tierra'' sigue el alcance universal del hebreo.'
  - La nota al pie marca la alternativa literal del modismo sin sustituir el texto principal.
