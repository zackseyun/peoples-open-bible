translation:
  language: es
  text: Y tanto los ausentes como los presentes fueron afligidos por igual;[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron angustiados» o «fueron atormentados»; el verbo griego transmite la idea de quedar desgastados o afligidos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόντες
  english_pob_choice: those absent
  chosen_spanish: los ausentes
  alternatives_spanish:
  - los que estaban ausentes
  - los que no estaban presentes
  lexicon: LSJ
  rationale: El participio expresa estar lejos o no presente. «Los ausentes» mantiene el contraste formal con «los presentes» y suena natural en español bíblico sin añadir matices innecesarios.
- source_word: παρόντες
  english_pob_choice: those present
  chosen_spanish: los presentes
  alternatives_spanish:
  - los que estaban presentes
  - los allí presentes
  lexicon: LSJ
  rationale: El participio de πάρειμι indica presencia. «Los presentes» conserva la antítesis exacta con ἀπόντες y es idiomático en español.
- source_word: ὁμοίως
  english_pob_choice: alike
  chosen_spanish: por igual
  alternatives_spanish:
  - igualmente
  - de la misma manera
  lexicon: LSJ
  rationale: La idea es de igualdad de grado o manera. «Por igual» comunica esa equivalencia de forma clara y fluida en español.
- source_word: ἐτρύχοντο
  english_pob_choice: were afflicted
  chosen_spanish: fueron afligidos
  alternatives_spanish:
  - fueron angustiados
  - fueron atormentados
  - fueron desgastados
  lexicon: LSJ
  rationale: El imperfecto medio/pasivo de τρύχω sugiere sufrimiento continuo, aflicción o desgaste. «Fueron afligidos» conserva la amplitud semántica del texto y evita precisar más de lo que el griego exige.
theological_decisions:
- issue: Alcance del sufrimiento expresado por ἐτρύχοντο
  english_pob_reading: general affliction/distress rather than a narrower 'torment'
  chosen_spanish_reading: aflicción general, no necesariamente «tormento»
  alternative_spanish_readings:
  - fueron atormentados
  - fueron angustiados
  rationale: La frase afirma que ambos grupos padecieron de la misma manera. Mantener «afligidos» preserva la amplitud del verbo griego y no fija una imagen más intensa o especializada de castigo que el texto no obliga a concluir.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; Original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: No se detectaron cambios en la pasada de revisión más reciente; el texto griego y la auditoría inglesa muestran alto acuerdo, así que no fue necesaria una revisión adicional.
  spanish_consistency_notes:
  - Se mantuvo la antítesis «ausentes/presentes» para reflejar el paralelo griego.
  - Se prefirió «afligidos» por su amplitud semántica y por coherencia con la nota lexical del audit trail inglés.
  - Se evitó «tormento» como sentido principal para no estrechar indebidamente ἐτρύχοντο.
