translation:
  language: es
  text: 'Cuando entraron[a], vio a Eliab y dijo: «Ciertamente, el ungido[b] de Yahvé está delante de Yahvé»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando ellos entraron». El hebreo usa un infinitivo constructo con sufijo; en español puede expresarse de forma más explícita o más fluida según el contexto narrativo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el Mesías de Yahvé». El hebreo emplea la misma palabra que después se traduce «Mesías», pero aquí se refiere al que Samuel supone que Yahvé ha escogido y ungido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Y aconteció que
  - Y sucedió que
  lexicon: HALOT
  rationale: La forma waw-consecutiva introduce el siguiente evento narrativo; «Cuando» expresa de manera natural en español la relación temporal con la acción siguiente sin recurrir a fórmulas arcaicas.
- source_word: בְּבוֹאָם
  english_pob_choice: they came in
  chosen_spanish: ellos entraron
  alternatives_spanish:
  - su entrada
  - cuando entraron
  lexicon: HALOT
  rationale: El infinitivo constructo con prefijo ב y sufijo 3mp describe la llegada/entrada de varios varones. «Ellos entraron» conserva el movimiento narrativo con español fluido y directo.
- source_word: וַיַּרְא
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - lo miró
  - observó
  lexicon: HALOT
  rationale: El verbo ראה mantiene su fuerza observacional simple. «Vio» es la equivalencia más directa y evita añadir matices interpretativos.
- source_word: אֶת אֱלִיאָב
  english_pob_choice: Eliab
  chosen_spanish: a Eliab
  alternatives_spanish:
  - Eliab
  lexicon: HALOT
  rationale: El marcador de objeto directo se refleja de modo natural con la preposición personal «a» en español.
- source_word: וַיֹּאמֶר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y pensó
  - y se dijo
  lexicon: HALOT
  rationale: אמר normalmente significa «decir». Aunque la frase podría ser interior, el hebreo no lo marca explícitamente; por eso se conserva el verbo de habla sin expandirlo.
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Seguro
  - Sin duda
  - Sólo
  lexicon: HALOT
  rationale: Aquí אַךְ expresa una afirmación fuerte o una suposición segura. «Ciertamente» reproduce bien ese tono de convicción inmediata en español.
- source_word: נֶגֶד
  english_pob_choice: before the LORD
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: נֶגֶד significa «delante de / en presencia de». Dado que el texto hebreo nombra a Yahvé explícitamente, se traduce con la misma referencia personal para evitar ambigüedad y mantener la concreción del original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal como «Yahvé», conforme a la terminología del proyecto y al valor del Tetragrámaton en el hebreo.
- source_word: מְשִׁיחוֹ
  english_pob_choice: his anointed
  chosen_spanish: el ungido
  alternatives_spanish:
  - su ungido
  - su Mesías
  lexicon: HALOT
  rationale: En este contexto real premesiánico, el sentido inmediato es «el ungido» como persona designada/anunciada para reinar. «Mesías» se reserva cuando el contexto o la tradición del texto lo requieran de forma más específica.
theological_decisions:
- issue: Relación entre מְשִׁיחוֹ y la terminología mesiánica posterior
  english_pob_reading: his anointed
  chosen_spanish_reading: el ungido
  alternative_spanish_readings:
  - su Mesías
  rationale: Aunque la palabra puede estar detrás del título posterior «Mesías», aquí Samuel está identificando al escogido de Yahvé en un contexto histórico inmediato de elección real. «El ungido» conserva el sentido lexical y evita importar una lectura cristológica o litúrgica que el contexto no exige.
  doctrine_reference: Translate titles according to immediate context; preserve later theological connections in notes rather than in the main line.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado desde «before him» a «before the LORD» para reflejar נֶגֶד יְהוָה de forma explícita; la versión española sigue esa lectura revisada con «delante de Yahvé», manteniendo la claridad referencial y el paralelismo con el hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene «ungido» en el cuerpo del texto para el sentido inmediato; «Mesías» queda documentado en nota como alternativa lexical.
  - La puntuación y las comillas siguen convención española, con dos puntos tras el verbo introductorio de habla.
  - «Delante de Yahvé» conserva la relación espacial/presencial del hebreo נגד sin convertirla en una fórmula más interpretativa.
