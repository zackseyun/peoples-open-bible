revisions:
- from: Cuando Aarón coloque las lámparas al atardecer[a], quemará incienso[b] regular delante de Yahvé, por todas sus generaciones.
  to: Y cuando Aarón coloque las lámparas al atardecer[a], quemará incienso regularmente[b] delante de Yahvé, a lo largo de sus generaciones.
  rationale: Se ajusta la redacción para que el español sea natural y fiel al hebreo y al audit trail. 'quemará incienso regularmente' expresa mejor el valor cultual de תָּמִיד que 'incienso regular' en español. 'a lo largo de sus generaciones' reproduce con claridad לְדֹרֹתֵיכֶם en tratamiento neutral de ustedes. Se mantienen Yahvé y las notas léxicas existentes.
