translation:
  language: es
  text: Todo lugar donde pise la planta de sus pies será de ustedes; desde el desierto y el Líbano, desde el río, el río Éufrates, hasta el mar occidental[a], será su límite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta el mar occidental», tradicionalmente entendido como el mar Mediterráneo; literalmente, «el mar de atrás/último».
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הַמָּקוֹם
  english_pob_choice: Every place
  chosen_spanish: Todo lugar
  alternatives_spanish:
  - Cada lugar
  - Todo sitio
  lexicon: HALOT
  rationale: La forma distributiva hebrea pide un equivalente natural y completo en español. «Todo lugar» conserva el alcance de cada ubicación sin introducir un matiz distinto.
- source_word: אֲשֶׁר תִּדְרֹךְ כַּף רַגְלְכֶם בּוֹ
  english_pob_choice: where the sole of your foot treads
  chosen_spanish: que pise la planta de su pie
  alternatives_spanish:
  - donde la planta de su pie pisa
  - sobre el que la planta de su pie camina
  lexicon: HALOT
  rationale: כַּף רֶגֶל es una expresión fija para la planta o suela del pie, y דָּרַךְ aquí conserva la imagen de pisar/poner el pie. En español, «pise la planta de su pie» mantiene la concreción corporal y la fuerza idiomática sin sonar forzado.
- source_word: לָכֶם יִהְיֶה
  english_pob_choice: will be yours
  chosen_spanish: será de ustedes
  alternatives_spanish:
  - les pertenecerá
  - será suyo
  lexicon: HALOT
  rationale: El hebreo expresa posesión/resultación. «Será de ustedes» comunica pertenencia de modo natural en español y mantiene el tono de promesa territorial.
- source_word: מִן הַמִּדְבָּר
  english_pob_choice: from the wilderness
  chosen_spanish: desde el desierto
  alternatives_spanish:
  - desde el desierto árido
  - desde el yermo
  lexicon: HALOT
  rationale: מִדְבָּר puede ser «desierto» o «wilderness». Aquí la fórmula geográfica funciona mejor con «desierto» en español, porque el verso enumera fronteras conocidas y no requiere el matiz más amplio de «wilderness».
- source_word: וְהַלְּבָנוֹן
  english_pob_choice: and Lebanon
  chosen_spanish: y el Líbano
  alternatives_spanish:
  - hasta el Líbano
  - y hacia el Líbano
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico como hito fronterizo. El hebreo enlaza el término con la serie de límites territoriales; en español, «y el Líbano» mantiene esa yuxtaposición.
- source_word: מִן הַנָּהָר נְהַר פְּרָת
  english_pob_choice: from the River, the Euphrates River
  chosen_spanish: desde el río, el río Éufrates
  alternatives_spanish:
  - desde el Río, el Éufrates
  - desde el río Éufrates
  lexicon: HALOT
  rationale: El hebreo dice primero «el río» y luego lo especifica como «río Éufrates». Mantener ambas partes preserva la estructura enfática y evita borrar la apposición original.
- source_word: וְעַד הַיָּם הָאַחֲרוֹן
  english_pob_choice: as far as the western sea
  chosen_spanish: hasta el mar occidental
  alternatives_spanish:
  - hasta el mar de atrás
  - hasta el mar último
  lexicon: HALOT
  rationale: אַחֲרוֹן literalmente es «posterior/último». En este contexto geográfico, la referencia es direccional; «mar occidental» comunica el sentido territorial de manera clara en español sin ocultar el valor literal de base.
- source_word: יִהְיֶה גְּבֻלְכֶם
  english_pob_choice: will be your border
  chosen_spanish: será su límite
  alternatives_spanish:
  - será su frontera
  - será su territorio
  lexicon: HALOT
  rationale: גְּבוּל puede ser «límite», «frontera» o «territorio». «Límite» reproduce bien la imagen de contorno geográfico y encaja con la enumeración precedente.
theological_decisions:
- issue: Promesa territorial sin interpretación adicional
  english_pob_reading: Render the verse as a territorial boundary promise without importing later theological interpretations about fulfillment or typology.
  chosen_spanish_reading: Presentar el versículo como una promesa de límites territoriales, sin añadir lectura tipológica ni resolver debates sobre su cumplimiento.
  alternative_spanish_readings:
  - Interpretarlo como un ideal de fronteras
  - Interpretarlo como posesión perpetua incondicional
  rationale: El texto hebreo formula una promesa geográfica en lenguaje de pacto. La traducción debe dejar visible esa afirmación y no adelantar conclusiones doctrinales que el versículo por sí solo no explicita.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto en inglés fue revisado para mejorar la puntuación con punto y coma tras «yours». En español, se siguió esa misma división retórica con punto y coma después de «ustedes» para separar la promesa de posesión de la descripción de los límites territoriales, sin introducir cambios léxicos innecesarios.
  spanish_consistency_notes:
  - Se mantuvo «Líbano» y «Éufrates» como nombres propios geográficos estables.
  - Se usó «desierto» en lugar de «wilderness» para la serie de fronteras, por claridad natural en español.
  - Se evitó «SEÑOR» y cualquier sustitución reverencial porque el verso no contiene el nombre divino.
  - Se preservó la repetición de «río» para reflejar la apposición hebrea «el río, el río Éufrates».
