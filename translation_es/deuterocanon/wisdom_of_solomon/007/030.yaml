translation:
  language: es
  text: Porque a esto[a] lo sucede la noche, pero el mal no prevalece contra la sabiduría[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque la luz es seguida por la noche»; el griego dice «esto», refiriéndose a la mención de la luz en el versículo anterior.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el mal no puede resistir a la sabiduría».'
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: a esto
  alternatives_spanish:
  - esto
  - a ello
  - a esta realidad
  lexicon: LSJ
  rationale: El griego usa un demostrativo neutro que retoma el contexto anterior de manera implícita. En español, «a esto» conserva esa referencia anafórica sin añadir explícitamente «luz», que no está en el texto inmediato.
- source_word: διαδέχεται
  english_pob_choice: succeeds
  chosen_spanish: le sigue
  alternatives_spanish:
  - sucede a
  - viene después de
  - da paso a
  lexicon: LSJ
  rationale: El verbo expresa sucesión temporal. «Le sigue» es natural en español y conserva la idea de que la noche viene después de aquello a lo que se refiere τοῦτο, sin forzar una estructura extraña.
- source_word: νύξ
  english_pob_choice: night
  chosen_spanish: la noche
  alternatives_spanish:
  - noche
  lexicon: LSJ
  rationale: Equivalencia directa y transparente; mantiene el contraste implícito con la luz del contexto previo.
- source_word: σοφίας
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - sabiduría
  lexicon: LSJ
  rationale: El genitivo con ἀντισχύει señala el ámbito o la entidad contra la cual se intenta resistir. «Sabiduría» es el equivalente regular y adecuado en este pasaje.
- source_word: οὐκ ἀντισχύει
  english_pob_choice: does not prevail against
  chosen_spanish: no prevalece contra
  alternatives_spanish:
  - no puede resistir a
  - no logra vencer a
  - no tiene fuerza contra
  lexicon: LSJ
  rationale: «No prevalece contra» reproduce bien la fuerza de resistencia/victoria del compuesto sin intensificarlo innecesariamente. En español mantiene la imagen de contienda implícita.
- source_word: κακία
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la maldad
  - la perversidad
  - la malicia
  lexicon: LSJ
  rationale: En este contexto sapiencial, κακία designa mal moral en sentido amplio. «El mal» es el término más natural y abarcador en español, y conserva la oposición general con la sabiduría.
theological_decisions:
- issue: Referente implícito de τοῦτο
  english_pob_reading: Keep the demonstrative implicit as 'this' rather than making it explicit as 'light.'
  chosen_spanish_reading: Mantener el demostrativo implícito como «a esto» en vez de explicitar «luz».
  alternative_spanish_readings:
  - Porque la luz le sigue la noche
  - Porque a la luz le sigue la noche
  rationale: El griego dice «esto», no «luz». Aunque el antecedente inmediato es claro por el contexto, la traducción debe respetar esa reserva y no introducir un sustantivo ausente en la línea.
  doctrine_reference: Translation philosophy §1, §5
- issue: Alcance de ἀντισχύει con σοφίας y κακία
  english_pob_reading: Render as 'evil does not prevail against wisdom.'
  chosen_spanish_reading: «El mal no prevalece contra la sabiduría».
  alternative_spanish_readings:
  - La maldad no puede resistir a la sabiduría
  - El mal no puede vencer a la sabiduría
  rationale: La frase expresa la incapacidad del mal para imponerse sobre la sabiduría. «No prevalece contra» conserva la imagen de contienda y victoria sin convertirla en una paráfrasis doctrinal.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés auditado, que ajustó la relación sintáctica de la primera cláusula para reflejar con más precisión el objeto griego. La versión española mantiene esa misma dirección al colocar el demostrativo como término anticipado de la sucesión, sin explicitar el antecedente.
  spanish_consistency_notes:
  - Se conserva «sabiduría» para σοφία/σοφίας, en línea con el uso estable del pasaje.
  - Se evita traducir κακία con un término técnico más estrecho que «el mal», porque el contexto sapiencial es moral general.
  - La primera cláusula mantiene una construcción breve y formal, para reflejar la concisión del griego.
  - No se introduce «Cristo», «Señor» ni terminología eclesiástica ajena al texto.
