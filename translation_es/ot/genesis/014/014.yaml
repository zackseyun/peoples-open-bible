revisions:
- from: Cuando Abram oyó que su pariente[a] había sido hecho cautivo, sacó a sus hombres entrenados, nacidos en su casa, trescientos dieciocho[b], y persiguió a los invasores hasta Dan.
  to: Cuando Abram oyó que su pariente[a] había sido hecho cautivo, sacó[b] a sus hombres entrenados, nacidos en su casa, trescientos dieciocho, y los persiguió hasta Dan.
  rationale: Se corrige una expansión interpretativa innecesaria («a los invasores») para mantener el objeto implícito del hebreo, y se realinea la nota [b] con el verdadero punto léxico debatido en וַיָּרֶק, conforme al expediente auditado en inglés. El resto del texto puede mantenerse con mínimos ajustes.
  reviewer_model: gpt-5.4
