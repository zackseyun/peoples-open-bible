translation:
  language: es
  text: Porque no me complazco en la muerte del que muere[a], declara el Señor Yahvé[b]. Por tanto, vuélvanse y vivan[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no deseo la muerte del que muere».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: אֲדֹנָי יְהוִה; alternativamente, «el Señor Dios».'
    reason: alternative_reading
  - marker: c
    text: 'O: «regresen y vivan».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base explicativa de la exhortación precedente. «Porque» comunica bien la relación causal o fundamentadora en español natural y mantiene el registro profético.
- source_word: לֹא אֶחְפֹּץ
  english_pob_choice: I take no pleasure
  chosen_spanish: no me complazco
  alternatives_spanish:
  - no deseo
  - no me deleito
  lexicon: HALOT
  rationale: חפץ puede expresar deseo, deleite o complacencia. «No me complazco» conserva la fuerza afectiva del verbo y suena natural en español sin perder el matiz de gusto o satisfacción negada.
- source_word: בְּמוֹת
  english_pob_choice: in the death
  chosen_spanish: en la muerte
  alternatives_spanish:
  - en el morir
  - en la muerte de
  lexicon: HALOT
  rationale: La construcción con ב más מות se vierte de manera directa como «en la muerte». Es la forma más clara y fiel al giro del hebreo en este contexto.
- source_word: הַמֵּת
  english_pob_choice: the one who dies
  chosen_spanish: del que muere
  alternatives_spanish:
  - del moribundo
  - del que está muriendo
  - del muerto
  lexicon: HALOT
  rationale: El participio puede significar «el que muere» o «el que está muriendo». «Del que muere» sigue de cerca el valor verbal sin convertirlo en un sustantivo más interpretativo como «el muerto».
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - afirma
  lexicon: HALOT
  rationale: Fórmula profética solemne. «Declara» reproduce bien el tono autorizado y formal del hebreo.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Soberano Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino como «Yahvé» según la política del proyecto. «Señor Yahvé» refleja adecuadamente la combinación אֲדֹנָי + יְהוִה sin enmascarar el Tetragrámaton.
- source_word: וְהָשִׁיבוּ
  english_pob_choice: turn back
  chosen_spanish: conviértanse
  alternatives_spanish:
  - vuélvanse
  - regresen
  - arrepiéntanse
  lexicon: HALOT
  rationale: שוב expresa volver/retornar. En este contexto exhortativo, «conviértanse» comunica el giro moral y relacional sin perder el movimiento de retorno implícito en el hebreo.
- source_word: וִחְיוּ
  english_pob_choice: and live
  chosen_spanish: y vivan
  alternatives_spanish:
  - para que vivan
  - y vivirán
  lexicon: HALOT
  rationale: La secuencia final es una exhortación breve y directa. «Y vivan» mantiene la concisión imperativa del hebreo.
theological_decisions:
- issue: Nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Soberano Yahvé
  rationale: Se sigue la directriz del proyecto de representar יהוה como «Yahvé». La combinación con אֲדֹנָי se vuelve «Señor Yahvé», que preserva ambos elementos sin recurrir a una sustitución litúrgica como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Matiz de movimiento moral en וְהָשִׁיבוּ
  english_pob_reading: turn back
  chosen_spanish_reading: conviértanse
  alternative_spanish_readings:
  - vuélvanse
  - regresen
  - arrepiéntanse
  rationale: El hebreo literalmente habla de volver/retornar. En español, «conviértanse» expresa adecuadamente el retorno requerido en un contexto de exhortación profética, sin resolver indebidamente toda la tensión semántica hacia un solo término doctrinal.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; context-sensitive rendering of שוב'
- issue: Objeto de la no complacencia divina
  english_pob_reading: the one who dies
  chosen_spanish_reading: el que muere
  alternative_spanish_readings:
  - el muerto
  - el moribundo
  - el malvado
  rationale: 'Se conserva la referencia del hebreo a la persona que muere, no se reemplaza por «el malvado» aunque el contexto sea más amplio. Esto mantiene la amplitud teológica del enunciado: no se introduce una especificación ausente en la frase.'
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del contexto inglés, que cambió «So» por «Therefore» para un registro más formal. En español se reflejó con «Por tanto», manteniendo la conexión causal y el tono profético solemne. También se preservó la decisión revisada de no interpretar «the one who dies» como «the wicked».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la terminología del proyecto para יהוה.
  - «Señor Yahvé» traduce el título compuesto אֲדֹנָי יְהוִה sin recurrir a «SEÑOR».
  - 'La exhortación final se vierte como plural de cortesía y concordancia natural: «conviértanse y vivan».'
  - Se conserva el paralelismo breve y solemne del verso sin ampliar el contenido con glosas explicativas en el texto principal.
