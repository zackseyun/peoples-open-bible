translation:
  language: es
  text: Él declara los cambios que están por venir[a][b], y revela la investigación de las cosas ocultas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Él declara lo que ha pasado y lo que está por venir, y revela las huellas de las cosas ocultas». Esto refleja una expansión temporal más plena que el hebreo conservado.'
    reason: alternative_reading
  - marker: b
    text: El rollo de Masada para esta sección es fragmentario y no conserva este versículo en una forma suficiente para reemplazar aquí la redacción de la Geniza de El Cairo.
    reason: textual_variant
lexical_decisions:
- source_word: מחוה
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - anuncia
  - da a conocer
  - proclama
  lexicon: HALOT
  rationale: El hebreo expresa hacer saber o reportar. «Declara» conserva el registro sapiencial elevado y corresponde bien al griego ἀπαγγέλλων («declarando/reportando»).
- source_word: חליפות
  english_pob_choice: the changes
  chosen_spanish: los cambios
  alternatives_spanish:
  - las sucesiones
  - las alternancias
  - lo que pasa
  lexicon: HALOT
  rationale: El sustantivo sugiere cambios o sucesiones de eventos. «Los cambios» es natural en español y mantiene la idea de desarrollo temporal sin sobrecargarla con una lectura técnica.
- source_word: נהיות
  english_pob_choice: that are coming
  chosen_spanish: que están por venir
  alternatives_spanish:
  - que llegan a ser
  - que suceden
  - futuras
  lexicon: HALOT
  rationale: La forma participial apunta a cosas que llegan a existir o suceden. «Están por venir» comunica esa expectativa futura de manera idiomática en español, sin perder el matiz de evento en proceso.
- source_word: ומגלה
  english_pob_choice: and reveals
  chosen_spanish: y revela
  alternatives_spanish:
  - y descubre
  - y desvela
  - y da a conocer
  lexicon: HALOT
  rationale: «Revela» es la equivalencia más directa y digna para גלה en contexto de conocimiento oculto.
- source_word: חקר
  english_pob_choice: the search
  chosen_spanish: la búsqueda
  alternatives_spanish:
  - la investigación
  - el rastreo
  - la indagación
  lexicon: HALOT
  rationale: El hebreo puede denotar búsqueda, sondeo o investigación. «La búsqueda» conserva la idea de acto de buscar sin sonar excesivamente técnico, y se ajusta a la continuación «de las cosas ocultas».
- source_word: נסתרות
  english_pob_choice: hidden things
  chosen_spanish: las cosas ocultas
  alternatives_spanish:
  - los secretos
  - lo oculto
  - las cosas secretas
  lexicon: HALOT
  rationale: La forma plural femenina sugiere realidades ocultas. «Las cosas ocultas» mantiene amplitud semántica y evita restringirlo demasiado a «secretos».
theological_decisions:
- issue: Relación entre el hebreo conservado y el paralelo griego más explícito
  english_pob_reading: Translate the extant Hebrew as primary, while allowing the Greek to inform the sense of temporal change without importing its explicit 'past and future' wording into the main text.
  chosen_spanish_reading: Traducir como base el hebreo transmitido, dejando solo una referencia implícita a sucesión temporal en «los cambios que están por venir».
  alternative_spanish_readings:
  - Él declara lo que ha pasado y lo que va a pasar, y revela los rastros de las cosas ocultas.
  - Él anuncia lo pasado y lo futuro, y revela las huellas de lo oculto.
  rationale: En Sirácida, donde el hebreo está disponible, el texto hebreo debe primar. El griego amplía la formulación con pasado y futuro; por eso esa expansión se reserva para la nota, no para el texto principal.
  doctrine_reference: 'PHILOSOPHY.md: Sirach Hebrew primary where extant; Greek parallel used as audited support, not as a replacement of the Hebrew base.'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB al preferir una formulación más natural para la sucesión temporal («que están por venir») y una expresión sencilla para חקר («la búsqueda»), mientras mantiene la primacía del hebreo sobre la expansión griega.
  spanish_consistency_notes:
  - Se usa «Dios» solo cuando el contexto lo requiera; este versículo no menciona el nombre divino explícitamente.
  - Se evitó «Cristo» porque no hay lenguaje mesiánico en el verso.
  - «Cosas ocultas» conserva el plural amplio del hebreo נסתרות y no reduce el sentido a «secretos» exclusivamente.
  - La nota griega se limita a la expansión temporal documentada y no desplaza el texto hebreo principal.
