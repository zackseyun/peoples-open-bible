translation:
  language: es
  text: Y todos los que estaban alrededor de ellos fortalecieron sus manos[a] con objetos de plata, con oro, con bienes, con ganado y con cosas preciosas, además de todo lo que se ofreció voluntariamente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus vecinos los ayudaron», para el modismo «fortalecieron sus manos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «además de toda ofrenda voluntaria».'
    reason: lexical_alternative
lexical_decisions:
- source_word: סְבִיבֹתֵיהֶם
  english_pob_choice: those around them
  chosen_spanish: los que estaban alrededor de ellos
  alternatives_spanish:
  - sus vecinos
  - los que los rodeaban
  lexicon: HALOT
  rationale: El hebreo describe a los cercanos o circundantes; «los que estaban alrededor de ellos» conserva esa cercanía sin imponer de entrada una relación cívica específica como «vecinos».
- source_word: חִזְּקוּ בִידֵיהֶם
  english_pob_choice: strengthened their hands
  chosen_spanish: fortalecieron sus manos
  alternatives_spanish:
  - los ayudaron
  - los apoyaron
  lexicon: HALOT
  rationale: La imagen idiomática se conserva en español con una traducción literal inteligible. «Fortalecieron sus manos» mantiene la fuerza expresiva del hebreo y su posible tensión con una paráfrasis más explicativa.
- source_word: בִּכְלֵי כֶסֶף
  english_pob_choice: with vessels of silver
  chosen_spanish: con vasos de plata
  alternatives_spanish:
  - con utensilios de plata
  - con vasijas de plata
  lexicon: HALOT
  rationale: כְּלִי puede ser vasija, vaso u objeto/utensilio. «Vasos de plata» sigue de cerca la forma concreta del listado de dones y resulta natural en español bíblico contemporáneo.
- source_word: בַּזָּהָב
  english_pob_choice: with gold
  chosen_spanish: con oro
  alternatives_spanish:
  - con objetos de oro
  lexicon: HALOT
  rationale: El hebreo continúa la lista con el material mismo; en español, «con oro» es la forma más directa y fiel, sin redundancia innecesaria.
- source_word: בָּרְכוּשׁ
  english_pob_choice: with goods
  chosen_spanish: con bienes
  alternatives_spanish:
  - con posesiones
  - con propiedad
  lexicon: HALOT
  rationale: רְכוּשׁ denota bienes o propiedad movable. «Bienes» conserva amplitud semántica y suena natural en una enumeración de aportes materiales.
- source_word: וּבַבְּהֵמָה
  english_pob_choice: with livestock
  chosen_spanish: con ganado
  alternatives_spanish:
  - con animales
  - con bestias
  lexicon: HALOT
  rationale: En este contexto económico, בְּהֵמָה apunta a animales domésticos como riqueza. «Ganado» expresa bien ese valor patrimonial en español.
- source_word: וּבַמִּגְדָּנוֹת
  english_pob_choice: with precious things
  chosen_spanish: con cosas preciosas
  alternatives_spanish:
  - con objetos valiosos
  - con presentes selectos
  lexicon: HALOT
  rationale: מִגְדָּנוֹת puede abarcar regalos finos o cosas preciosas. «Cosas preciosas» mantiene amplitud y no restringe el término a alimentos o a una sola clase de ofrenda.
- source_word: לְבַד
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - fuera de
  lexicon: HALOT
  rationale: El valor aditivo de לְבַד se expresa con «además de», que suena natural y conserva la relación de suma respecto de la lista anterior.
- source_word: הִתְנַדֵּב
  english_pob_choice: all that was freely offered
  chosen_spanish: todo lo que se ofreció voluntariamente
  alternatives_spanish:
  - toda ofrenda voluntaria
  - todo lo que se dio de buena voluntad
  lexicon: HALOT
  rationale: El hitpael de נדב comunica entrega voluntaria o de buena voluntad. La redacción evita añadir un sujeto inexistente y conserva el carácter libre de la ofrenda.
theological_decisions:
- issue: La metáfora idiomática «fortalecieron sus manos» frente a una paráfrasis de ayuda práctica
  english_pob_reading: Retain the idiom, with a footnote giving 'their neighbors helped them' as an alternative.
  chosen_spanish_reading: 'Se conserva la metáfora: «fortalecieron sus manos».'
  alternative_spanish_readings:
  - los ayudaron
  - los apoyaron
  rationale: El hebreo usa un giro idiomático con fuerza retórica. Mantenerlo en español preserva la textura del texto y el posible matiz de apoyo activo sin reducirlo demasiado pronto a una explicación.
  doctrine_reference: Principio de equivalencia formal con preservación de imagen textual
- issue: El alcance de מִגְדָּנוֹת y la relación con la ofrenda voluntaria final
  english_pob_reading: '''precious things'' plus a separate clause ''besides all that was freely offered.'''
  chosen_spanish_reading: «cosas preciosas», además de todo lo que se ofreció voluntariamente.
  alternative_spanish_readings:
  - «presentes selectos», además de toda ofrenda voluntaria
  - «objetos valiosos», además de todo lo que se dio voluntariamente
  rationale: Se mantiene la distinción entre los bienes listados y la cláusula final de donación libre. Así no se borra la posible amplitud del término ni se confunde con la ofrenda voluntaria mencionada aparte.
  doctrine_reference: Respeto a la distinción semántica del texto hebreo
translation_notes:
  revision_awareness: 'El pasaje coincide con el estado de revisión más reciente: no se registraron cambios y el cotejo externo indicó alta concordancia. Por eso la versión española sigue de cerca la lectura auditada de la POB inglesa sin introducir ajustes textuales adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada del proyecto cuando corresponda; aquí no aparece en el versículo.
  - Se usa «fortalecieron sus manos» para conservar el modismo hebreo documentado por la POB inglesa.
  - Se evita «SEÑOR» como sustituto no presente en este versículo.
  - 'Se eligen sustantivos concretos y neutrales: «vasos», «plata», «oro», «bienes», «ganado», «cosas preciosas».'
  - 'La cláusula final se formula como adición separada: «además de todo lo que se ofreció voluntariamente».'
