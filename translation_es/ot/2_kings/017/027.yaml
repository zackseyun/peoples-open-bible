translation:
  language: es
  text: 'Entonces el rey de Asiria mandó[a], diciendo: «Lleven allá a uno de los sacerdotes, de los que ustedes desterraron de allí[b], y que vaya y viva allí[c], y que les enseñe la costumbre[d] del dios[e] de la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ordenó» o «dio órdenes».
    reason: lexical_alternative
  - marker: b
    text: O «exiliaron de allí»; el hebreo también puede leerse con el matiz de «deportaron».
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo usa verbos plurales aquí («vayan» / «vivan»), aunque el sentido es singular: «uno de los sacerdotes» ... «que les enseñe».'
    reason: textual_variant
  - marker: d
    text: O «la ley» o «la norma» del dios de la tierra.
    reason: lexical_alternative
  - marker: e
    text: O «el Dios de la tierra»; la minúscula refleja la perspectiva del rey asirio.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio la orden
  lexicon: HALOT
  rationale: צוה en forma narrativa expresa una orden real. «Mandó» conserva el acto de mando con naturalidad en español y evita una redundancia innecesaria con «dijo».
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - Asiria, el rey
  - el monarca de Asiria
  lexicon: HALOT
  rationale: La construcción posesiva se mantiene de forma idiomática en español con «el rey de Asiria».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - así
  lexicon: HALOT
  rationale: Fórmula introductoria de discurso directo; «diciendo» es la equivalencia natural y fiel.
- source_word: הֹלִיכוּ שָׁמָּה
  english_pob_choice: Take there
  chosen_spanish: Lleven allá
  alternatives_spanish:
  - Traigan allá
  - Envíen allá
  lexicon: HALOT
  rationale: El hifil de הלך permite «llevar», «traer» o «enviar» según la perspectiva. Aquí «Lleven allá» comunica el traslado por mandato real sin fijar más de lo que el hebreo exige.
- source_word: אֶחָד מֵהַכֹּהֲנִים
  english_pob_choice: one of the priests
  chosen_spanish: uno de los sacerdotes
  alternatives_spanish:
  - un sacerdote
  - uno entre los sacerdotes
  lexicon: HALOT
  rationale: «כהנים» se traduce con el término normal y claro «sacerdotes». La construcción partitiva se expresa con naturalidad como «uno de».
- source_word: אֲשֶׁר הִגְלִיתֶם מִשָּׁם
  english_pob_choice: whom you exiled from there
  chosen_spanish: de los que ustedes desterraron de allí
  alternatives_spanish:
  - a quienes ustedes exiliaron de allí
  - a quienes ustedes deportaron de allí
  lexicon: HALOT
  rationale: הגלה en hifil implica destierro/exilio. «Desterraron» mantiene la fuerza de expulsión y suena más natural que una traducción mecánica.
- source_word: וְיֵלְכוּ
  english_pob_choice: let him go
  chosen_spanish: y que vaya
  alternatives_spanish:
  - y que vayan
  - y que él vaya
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural, el sentido en contexto es singular, en coordinación con «uno de los sacerdotes» y con el verbo siguiente en singular. Se refleja el sentido contextual con una nota textual.
- source_word: וְיֵשְׁבוּ שָׁם
  english_pob_choice: and live there
  chosen_spanish: y habite allí
  alternatives_spanish:
  - y viva allí
  - y resida allí
  - y more allí
  lexicon: HALOT
  rationale: ישב aquí indica residencia estable. «Habite allí» preserva el tono bíblico sin sonar arcaico en exceso.
- source_word: וְיֹרֵם
  english_pob_choice: and let him teach them
  chosen_spanish: y que les enseñe
  alternatives_spanish:
  - y que les instruya
  - y que les muestre
  lexicon: HALOT
  rationale: ירה en hifil puede significar enseñar o instruir, especialmente en práctica religiosa o normativa. «Les enseñe» es la opción más clara y fiel.
- source_word: מִשְׁפַּט
  english_pob_choice: the custom
  chosen_spanish: el mandato
  alternatives_spanish:
  - la norma
  - la costumbre
  - la ley
  lexicon: HALOT
  rationale: En esta expresión, משפט puede referirse a la práctica prescrita o al debido proceder del dios local. «Mandato» preserva el sentido de obligación normativa y evita reducirlo solo a «costumbre»; además, en español suena más preciso en este contexto de instrucción religiosa.
- source_word: אֱלֹהֵי הָאָרֶץ
  english_pob_choice: the god of the land
  chosen_spanish: del dios de la tierra
  alternatives_spanish:
  - del Dios de la tierra
  - del dios del país
  lexicon: HALOT
  rationale: Se conserva el minúsculo «dios» para reflejar la perspectiva asiria del hablante, sin resolver la tensión teológica del narrador. «Tierra» reproduce el referente territorial del hebreo; «país» sería una posible actualización interpretativa, pero menos literal.
theological_decisions:
- issue: Capitalización de אֱלֹהֵי הָאָרֶץ
  english_pob_reading: the god of the land
  chosen_spanish_reading: el dios de la tierra
  alternative_spanish_readings:
  - el Dios de la tierra
  rationale: El contexto presenta la voz del rey asirio, que concibe una deidad territorial. Mantener «dios» en minúscula preserva esa perspectiva y la tensión narrativa sin borrar la identidad real del Dios de Israel para el lector.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
- issue: Número verbal en וְיֵלְכוּ / וְיֵשְׁבוּ frente al antecedente singular
  english_pob_reading: singular sense in English ('let him go and live there')
  chosen_spanish_reading: singular de sentido («y que vaya y habite allí»), con nota sobre el plural hebreo
  alternative_spanish_readings:
  - plural formal («y que vayan y habiten allí» )
  rationale: El antecedente inmediato es «uno de los sacerdotes» y el último verbo introduce un objeto singular en la idea. El español puede reflejar el sentido sin ocultar la irregularidad morfológica del hebreo.
  doctrine_reference: Source-critical grammatical observation; preserve the documented irregularity in a note.
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y no requirió cambios sustanciales; se mantuvo la lectura contextual del singular implícito, la distinción entre perspectiva asiria y teología narrativa, y el valor normativo de משפט en este contexto. No hubo revisiones aplicadas en el último pase.
  spanish_consistency_notes:
  - Se mantiene «Asiria» para אַשּׁוּר y «Yahvé» no aparece en este versículo.
  - «dios» se escribe en minúscula por la perspectiva del hablante, pero la nota conserva la alternativa capitalizada.
  - «desterraron» cubre el matiz de גלה en hifil mejor que un simple «expulsaron».
  - «mandato» se usa para משפט por su carga normativa; la nota preserva «ley/norma» como alternativas.
  - Se evitó forzar el plural hebreo en el cuerpo principal, pero la nota textual lo documenta.
