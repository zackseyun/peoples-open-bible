translation:
  language: es
  text: Muestra tu amor fiel maravilloso[a], oh Salvador de los que se refugian, de los que se levantan contra ellos,[b] con tu mano derecha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Haz maravilloso tu amor fiel»; el imperativo hebreo puede significar mostrar algo como extraordinario o hacerlo distinto y maravilloso.'
    reason: lexical_alternative
  - marker: b
    text: 'La frase final también puede entenderse con «los que se refugian»: «los que se refugian en tu mano derecha».'
    reason: alternative_reading
lexical_decisions:
- source_word: הַפְלֵה
  english_pob_choice: Show ... wondrous
  chosen_spanish: Muestra ... admirable
  alternatives_spanish:
  - Haz maravilloso
  - Manifiesta de modo maravilloso
  - Muestra tu maravilla
  lexicon: HALOT
  rationale: El imperativo en hifil de פלא puede expresar hacer que algo sea extraordinario o mostrarlo como asombroso. En español, 'muestra' conserva el valor imperativo de petición dirigida a Dios, y 'admirable' comunica la cualidad extraordinaria sin sonar forzado. 'Admirable' también evita una perífrasis demasiado pesada en este verso breve.
- source_word: חֲסָדֶיךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu misericordia
  alternatives_spanish:
  - tu amor constante
  - tu amor fiel
  - tu lealtad amorosa
  lexicon: HALOT
  rationale: חסד abarca lealtad pactal, misericordia y amor fiel. En español, 'misericordia' es una opción natural y reverente para el registro poético, aunque no agota la idea pactal. Se conserva la tensión semántica en vez de imponer una fórmula rígida que suene técnica o arcaica.
- source_word: מוֹשִׁיעַ
  english_pob_choice: O Savior of
  chosen_spanish: oh Salvador
  alternatives_spanish:
  - oh quien salva
  - oh libertador
  - oh salvador de
  lexicon: HALOT
  rationale: El participio funciona como apelativo en oración. 'Salvador' mantiene la invocación directa y la identidad divina de quien salva. Se omite 'de' en el texto principal para evitar un giro demasiado pesado; el complemento queda claro por el contexto inmediato.
- source_word: חוֹסִים
  english_pob_choice: those who take refuge
  chosen_spanish: de los que se refugian
  alternatives_spanish:
  - de los que buscan refugio
  - de los que hallan refugio
  - de los que confían
  lexicon: HALOT
  rationale: חסה expresa la imagen concreta de refugiarse. 'Se refugian' conserva el movimiento y la dependencia protectora mejor que 'confían', que sería más abstracto. La preposición 'de' mantiene la relación del participio con 'Salvador'.
- source_word: מִמִּתְקוֹמְמִים
  english_pob_choice: from those who rise up against them
  chosen_spanish: frente a los que se levantan contra ellos
  alternatives_spanish:
  - de los que se levantan contra ellos
  - contra los que se alzan
  - de sus adversarios que se alzan
  lexicon: HALOT
  rationale: 'El participio hitpolel de קום tiene fuerza hostil: levantarse contra alguien. ''Frente a'' preserva la idea de oposición y combate, y el complemento ''contra ellos'' hace explícito el objeto implícito en español. Se mantiene la ambigüedad del referente en la frase final, como permite el hebreo.'
- source_word: בִּימִינֶךָ
  english_pob_choice: by your right hand
  chosen_spanish: con tu mano derecha
  alternatives_spanish:
  - por tu mano derecha
  - mediante tu mano derecha
  - a tu mano derecha
  lexicon: HALOT
  rationale: La frase instrumental se entiende naturalmente como el medio poderoso de salvación. 'Con tu mano derecha' es idiomático en español bíblico y conserva la imagen antropomórfica de poder divino. Aunque 'por' o 'mediante' también son posibles, 'con' resulta más fluido en este contexto poético.
theological_decisions:
- issue: Relación sintáctica final de בִּימִינֶךָ
  english_pob_reading: 'Attached to God''s saving action: ''... by your right hand.'''
  chosen_spanish_reading: 'Unida a la acción salvadora de Dios: ''con tu mano derecha''.'
  alternative_spanish_readings:
  - 'Unida a los que se refugian: ''de los que se refugian a tu mano derecha'''
  - 'Unida más libremente a los adversarios: ''frente a los que se levantan contra tu mano derecha'''
  rationale: El hebreo permite más de una relación sintáctica para la frase final. La lectura principal entiende la mano derecha de Dios como instrumento de salvación, coherente con el paralelismo y el tono del salmo. Se conserva la tensión textual sin forzar una resolución más especulativa.
  doctrine_reference: 'Translation philosophy §3: preservar tensiones textuales genuinas y reflejar la ambigüedad cuando no puede resolverse con seguridad.'
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo WLC y toma como contexto la revisión inglesa más reciente, que solo capitalizó 'Savior'. En español se mantuvo ese tono formal y se ajustó la sintaxis para una lectura publicable, sin perder la ambigüedad final del hebreo ni la fuerza del imperativo inicial.
  spanish_consistency_notes:
  - Se prefirió 'misericordia' para חסד por claridad y registro litúrgico en español, aunque se reconoce que no agota la carga pactal de 'steadfast love'.
  - Se mantuvo 'Salvador' como vocativo para reflejar la función del participio hebreo y la decisión estable del POB inglés.
  - La frase final usa 'con tu mano derecha' como lectura instrumental principal; la nota preserva la alternativa de enlace sintáctico con 'los que se refugian'.
  - Se evitó 'SEÑOR' porque el texto fuente hebreo no contiene el tetragrámaton en este versículo.
