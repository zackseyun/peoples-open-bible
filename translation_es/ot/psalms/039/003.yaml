translation:
  language: es
  text: Estaba mudo[a] en silencio; guardé silencio de lo bueno[b], y mi dolor se agitó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quedé mudo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «incluso de lo bueno», posiblemente con el sentido de «me abstuve hasta de hablar lo bueno» o «me abstuve de lo que es bueno».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶאֱלַ֣מְתִּי
  english_pob_choice: I was mute
  chosen_spanish: Estaba mudo
  alternatives_spanish:
  - Me quedé mudo
  - Estuve callado
  lexicon: HALOT
  rationale: El nifal de אלם expresa volverse mudo o quedar sin habla. «Estaba mudo» conserva la auto-descripción del salmista sin decidir si el silencio fue voluntario o impuesto.
- source_word: ד֭וּמִיָּה
  english_pob_choice: in silence
  chosen_spanish: en silencio
  alternatives_spanish:
  - en quietud
  - en absoluto silencio
  lexicon: HALOT
  rationale: El sustantivo denota silencio o quietud. «En silencio» suena natural en español y mantiene el paralelismo intensificador con el primer verbo.
- source_word: הֶחֱשֵׁ֣יתִי
  english_pob_choice: I kept quiet
  chosen_spanish: guardé silencio
  alternatives_spanish:
  - me callé
  - guardé quietud
  lexicon: HALOT
  rationale: El hifil de חשׁה significa callar o guardar silencio. «Guardé silencio» distingue levemente esta acción de «estaba mudo» y preserva la estructura paralela del hebreo.
- source_word: מִ/טּ֑וֹב
  english_pob_choice: from good
  chosen_spanish: lejos de lo bueno
  alternatives_spanish:
  - de lo bueno
  - aun de lo bueno
  - de hablar lo bueno
  lexicon: HALOT
  rationale: 'La preposición מן con טוֹב es compacta y ambigua. «Lejos de lo bueno» mantiene esa ambigüedad en español: puede referirse a abstenerse de hablar lo bueno o a apartarse de lo que es bueno, sin resolverlo demasiado pronto.'
- source_word: וּ/כְאֵבִ֥/י
  english_pob_choice: and my pain
  chosen_spanish: y mi dolor
  alternatives_spanish:
  - y mi pena
  - y mi angustia
  lexicon: HALOT
  rationale: כְּאֵב puede referirse a dolor físico o emocional. «Dolor» es suficientemente amplio para conservar la fuerza afectiva del salmo.
- source_word: נֶעְכָּֽר
  english_pob_choice: was stirred up
  chosen_spanish: se agitó
  alternatives_spanish:
  - fue turbado
  - se perturbó
  - se removió
  lexicon: HALOT
  rationale: El nifal de עכר puede significar ser agitado, turbado o perturbado. «Se agitó» comunica bien el aumento de la conmoción interior producido por el silencio forzado.
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó el «even» añadido por claridad porque no está explícito en el hebreo; por eso el español evita introducir un equivalente explícito y conserva la ambigüedad compacta de מִטּוֹב.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - Se prefirió un registro sobrio y publicado, evitando calcos como «silencio de bueno» o «de bueno» sin mediación.
  - Se preservó la tensión semántica de מִטּוֹב en la nota, sin forzar una sola interpretación.
