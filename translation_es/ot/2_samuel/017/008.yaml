translation:
  language: es
  text: 'Husai dijo: «Tú conoces a tu padre y a sus hombres, que son hombres valientes y fieros[a], como una osa privada de sus cachorros en el campo. Y tu padre es un hombre de guerra; no pasará la noche con el pueblo[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O también, «de espíritu amargo» o «amargados»; literalmente, «amargos de alma».
    reason: lexical_alternative
  - marker: b
    text: O «no se alojará con el pueblo». Aquí «pueblo» probablemente se refiere a la fuerza de combate de David.
    reason: lexical_alternative
lexical_decisions:
- source_word: גִבֹּרִים
  english_pob_choice: mighty men
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - hombres poderosos
  - hombres esforzados
  - hombres guerreros
  lexicon: HALOT
  rationale: El hebreo destaca fuerza/valor en contexto militar. «Hombres valientes» conserva la idea de capacidad y bravura sin sonar arcaico; evita reducirlo solo a una profesión militar, aunque el contexto lo sugiera.
- source_word: וּמָרֵי נֶפֶשׁ
  english_pob_choice: fierce
  chosen_spanish: de espíritu amargo
  alternatives_spanish:
  - fieros
  - amargados
  - encendidos de ira
  lexicon: HALOT
  rationale: La expresión es literalmente difícil y conserva una tensión emocional. «De espíritu amargo» mantiene la imagen hebrea de amargura interior y no borra el matiz afectivo que la revisión inglesa suavizó hacia «fierce».
- source_word: כְּדֹב שַׁכּוּל
  english_pob_choice: like a bear robbed of her cubs
  chosen_spanish: como una osa privada de sus cachorros
  alternatives_spanish:
  - como una osa despojada de sus cachorros
  - como una osa sin sus crías
  lexicon: HALOT
  rationale: Se conserva la imagen comparativa completa y el género femenino implícito en el hebreo y en el inglés auditado. «Privada de sus cachorros» es natural en español y comunica la ferocidad resultante.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en la llanura
  lexicon: HALOT
  rationale: «Campo» reproduce el locativo directo y mantiene la idiomaticidad bíblica en español.
- source_word: אִישׁ מִלְחָמָה
  english_pob_choice: a man of war
  chosen_spanish: un hombre de guerra
  alternatives_spanish:
  - un guerrero
  - un hombre guerrero
  - un combatiente
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática y personal: caracteriza a David como experto en guerra. «Hombre de guerra» conserva la forma y la fuerza del giro sin sustituirlo por un término más interpretativo.'
- source_word: לֹא יָלִין אֶת־הָעָם
  english_pob_choice: he will not spend the night with the people
  chosen_spanish: no pasará la noche con el pueblo
  alternatives_spanish:
  - no pernoctará con el pueblo
  - no se quedará a pasar la noche con la gente
  - no pernoctará con la tropa
  lexicon: HALOT
  rationale: יַלִין indica alojarse o pasar la noche. «El pueblo» sigue de cerca el hebreo y deja visible la ambigüedad militar que el contexto resuelve; «tropa» sería más explícito pero menos fiel al sustantivo usado.
- source_word: יָדַעְתָּ
  english_pob_choice: You know
  chosen_spanish: Tú conoces
  alternatives_spanish:
  - Tú sabes
  - Tú bien conoces
  lexicon: HALOT
  rationale: El perfecto hebreo funciona como conocimiento presente y apelativo directo. «Tú conoces» suena natural en español y conserva la fuerza de la observación.
- source_word: אֲנָשָׁיו
  english_pob_choice: his men
  chosen_spanish: a sus hombres
  alternatives_spanish:
  - a sus soldados
  - a sus seguidores
  lexicon: HALOT
  rationale: «Sus hombres» reproduce de modo sobrio el hebreo y, en contexto, puede incluir el grupo de combate sin imponer una especificación que el texto no verbaliza.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo de WLC y toma en cuenta el audit trail inglés: allí se movió de «bitter of soul» a «fierce» y de «troops» a «the people». En español se prefirió mantener visible la tensión de מָרֵי נֶפֶשׁ con «de espíritu amargo», y conservar «el pueblo» para no cerrar prematuramente la referencia militar implícita.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general en el proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantuvo «hombres» para אֲנָשָׁיו por correspondencia directa con el hebreo y por el paralelismo interno.
  - «Campo» traduce בַּשָּׂדֶה sin expandirlo a «campo abierto», aunque esa es una alternativa semánticamente válida.
  - Se prefirió no introducir «tropa» en el texto principal porque el hebreo dice הָעָם, cuyo alcance contextual queda abierto en español.
