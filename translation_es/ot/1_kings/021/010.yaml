translation:
  language: es
  text: 'Hagan sentar a dos hombres malvados frente a él[a], y que testifiquen contra él, diciendo: «Has maldecido a Dios y al rey». Después sáquenlo y apedréenlo, para que muera».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, ‘Has bendecido a Dios y al rey’. Aquí ‘bendecido’ funciona como un eufemismo para ‘maldecido’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹשִׁיבוּ
  english_pob_choice: seat
  chosen_spanish: hagan sentar
  alternatives_spanish:
  - pongan
  - coloquen
  lexicon: HALOT
  rationale: El causativo de ישׁב pide en español una forma también causativa. «Hagan sentar» conserva la fuerza de hacer ocupar un lugar y suena natural en una escena judicial.
- source_word: שְׁנַיִם אֲנָשִׁים
  english_pob_choice: two ... men
  chosen_spanish: dos hombres
  alternatives_spanish:
  - dos varones
  - dos personas
  lexicon: HALOT
  rationale: El hebreo especifica dos hombres. «Dos hombres» es directo y preserva el matiz masculino del testimonio legal.
- source_word: בְּנֵי בְלִיַּעַל
  english_pob_choice: worthless men
  chosen_spanish: hombres perversos
  alternatives_spanish:
  - hombres inútiles
  - malvados
  - hijos de Belial
  lexicon: HALOT
  rationale: La expresión idiomática señala gente moralmente corrupta o sin freno. «Perversos» comunica la carga ética sin introducir asociaciones posteriores de nombre propio; «hijos de Belial» sería demasiado opaco para el texto principal.
- source_word: נֶגְדּוֹ
  english_pob_choice: opposite him
  chosen_spanish: frente a él
  alternatives_spanish:
  - enfrente de él
  - opuestos a él
  lexicon: HALOT
  rationale: La posición es frontal y formal. «Frente a él» es natural en español y mantiene el cuadro judicial.
- source_word: וִיעִדֻהוּ
  english_pob_choice: let them testify against him
  chosen_spanish: que testifiquen contra él
  alternatives_spanish:
  - que den testimonio contra él
  - que declaren contra él
  lexicon: HALOT
  rationale: En contexto forense, עוד en esta forma apunta a testimonio legal. «Testifiquen contra él» conserva ese valor jurídico.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y digan
  lexicon: HALOT
  rationale: Equivale a la introducción de cita estándar; «diciendo» es la opción más natural en español.
- source_word: בֵּרַכְתָּ
  english_pob_choice: have cursed
  chosen_spanish: has maldecido
  alternatives_spanish:
  - has bendecido
  - has blasfemado
  lexicon: HALOT
  rationale: El hebreo usa ברך como eufemismo reverencial. En la acusación fabricada, el sentido requerido es el de insultar o maldecir a Dios; «maldecido» comunica mejor la carga legal que «bendecido» en el cuerpo principal.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  lexicon: HALOT
  rationale: 'Aquí el referente es singular: la falsa acusación es contra Dios y el rey. «Dios» es la traducción adecuada.'
- source_word: וָמֶלֶךְ
  english_pob_choice: and the king
  chosen_spanish: y el rey
  alternatives_spanish:
  - y al rey
  lexicon: HALOT
  rationale: La coordinación es sencilla; «el rey» reproduce el referente político sin añadir nada al texto.
- source_word: וְהוֹצִיאֻהוּ
  english_pob_choice: bring him out
  chosen_spanish: sáquenlo
  alternatives_spanish:
  - háganlo salir
  - llévenlo fuera
  lexicon: HALOT
  rationale: El verbo indica sacar para la ejecución. «Sáquenlo» es breve, idiomático y conserva la direccionalidad.
- source_word: וְסִקְלֻהוּ
  english_pob_choice: stone him
  chosen_spanish: apedréenlo
  alternatives_spanish:
  - mátenlo a pedradas
  - lancen piedras contra él
  lexicon: HALOT
  rationale: «Apedrear» es el verbo español estándar para la ejecución por piedras y preserva el carácter legal del castigo.
- source_word: וְיָמֹת
  english_pob_choice: so that he dies
  chosen_spanish: para que muera
  alternatives_spanish:
  - y así muera
  - de modo que muera
  lexicon: HALOT
  rationale: La cláusula final expresa resultado/intención. «Para que muera» es natural y mantiene la relación final.
theological_decisions:
- issue: Eufemismo verbal en ברך con Dios como objeto
  english_pob_reading: render as 'cursed' in the main text, with a footnote preserving the literal 'blessed'
  chosen_spanish_reading: traducir en el texto principal como «has maldecido», con nota sobre el valor literal «has bendecido»
  alternative_spanish_readings:
  - «has bendecido» en el cuerpo principal con explicación
  - «has blasfemado» como equivalencia interpretativa
  rationale: La fórmula hebrea usa un eufemismo reverencial, pero el cargo es una acusación falsa de blasfemia/maldición contra Dios. Mantener «has bendecido» en el texto principal oscurecería el sentido legal de la escena; la nota preserva la transparencia textual.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Expresión בני בליעל
  english_pob_reading: worthless men
  chosen_spanish_reading: hombres perversos
  alternative_spanish_readings:
  - hombres malvados
  - hijos de Belial
  - hombres sin valor
  rationale: No se trata de un título doctrinal o de un nombre propio en este contexto, sino de una caracterización moral degradante. «Perversos» mantiene el juicio ético sin introducir connotaciones ajenas.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo directamente y concuerda con el audit trail inglés: mantiene la escena judicial, el valor forense de ''testificar'', la acusación fabricada, y el eufemismo de ברך con una nota breve para transparencia. No se documentaron revisiones posteriores que alteraran la elección principal.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים y «rey» para מֶלֶךְ, manteniendo la acusación paralela.
  - «Apedréenlo» conserva el verbo legal de ejecución por lapidación sin explicitar más de lo que el hebreo dice.
  - La nota al pie marca solo el punto donde el español pierde el eufemismo literal si se traduce por sentido.
