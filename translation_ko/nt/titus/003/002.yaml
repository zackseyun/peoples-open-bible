id: TIT.3.2
reference: Titus 3:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μηδένα βλασφημεῖν, ἀμάχους εἶναι, ἐπιεικεῖς, πᾶσαν ἐνδεικνυμένους πραΰτητα πρὸς πάντας ἀνθρώπους.
base_translation:
  language: en
  yaml_path: translation/nt/titus/003/002.yaml
  text: to slander no one[a], to be peaceable, gentle[c][b], showing all meekness toward all people.
  footnotes:
  - marker: a
    text: Or 'to speak evil of no one.' The verb can denote abusive speech more broadly than formal slander.
    reason: lexical_alternative
  - marker: b
    text: Or 'peaceable' for 'non-contentious.'
    reason: lexical_alternative
  - marker: c
    text: Or 'showing all gentleness toward all people.' The noun πραΰτης can also be rendered 'gentleness,' but 'meekness' was chosen here to distinguish it from ἐπιεικεῖς ('gentle') earlier in the verse.
    reason: lexical_alternative
translation:
  language: ko
  text: 아무도 비방하지 말고[a], 다투지 않으며[b], 너그럽고, 모든 사람에게 온유함[c]을 다해 보이며 살아야 함을 일깨워 주십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「아무에 대해서도 악담하지 말고」. 헬라어 동사는 공식적 비방을 넘어 모욕적인 말 전반을 포괄한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「다툼이 없으며」, 「평화로우며」.
    reason: lexical_alternative
  - marker: c
    text: 또는 「모든 사람에게 모든 부드러움을 보이며」. πραΰτης는 「부드러움」으로도 옮길 수 있으나, 앞의 ἐπιεικεῖς(「너그러운」)와 구분하기 위해 「온유함」을 택한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδένα βλασφημεῖν
  english_pob_choice: to slander no one
  chosen_korean: 아무도 비방하지 말고
  alternatives_korean:
  - 누구도 욕하지 말고
  - 어떤 사람에 대해서도 악담하지 말고
  lexicon: BDAG
  rationale: βλασφημέω는 신적 대상(모독)과 인간적 대상(비방·악담) 모두에 쓰인다. 본문에서는 사람을 향한 행위이므로 「비방」이 적절. 2:5의 「모독」과 어감을 구분한다.
- source_word: ἀμάχους
  english_pob_choice: peaceable
  chosen_korean: 다투지 않으며
  alternatives_korean:
  - 다툼이 없으며
  - 싸우지 않으며
  lexicon: BDAG
  rationale: ἄμαχος는 「싸우지 않는·다투지 않는」. 부정형 자연스럽게 「다투지 않으며」.
- source_word: ἐπιεικεῖς
  english_pob_choice: gentle
  chosen_korean: 너그럽고
  alternatives_korean:
  - 관대하고
  - 부드럽고
  lexicon: BDAG
  rationale: ἐπιεικής는 「관대한·너그러운·합당한 양보의 자세를 가진」. 「너그럽다」가 그 어감을 잘 담는다. 뒤따르는 πραΰτης와 구분된다.
- source_word: πᾶσαν ... πραΰτητα
  english_pob_choice: all meekness
  chosen_korean: 온유함을 다해
  alternatives_korean:
  - 모든 온유로
  - 온전한 온유로
  lexicon: BDAG
  rationale: πραΰτης는 신약 미덕 중 핵심. 「온유」가 정립된 등가어. πᾶσαν은 「~을 다하여」로 강조.
- source_word: πρὸς πάντας ἀνθρώπους
  english_pob_choice: toward all people
  chosen_korean: 모든 사람에게
  alternatives_korean:
  - 모든 이를 향하여
  lexicon: BDAG
  rationale: 자연스러운 한국어 어구.
