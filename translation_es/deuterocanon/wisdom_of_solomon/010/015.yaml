translation:
  language: es
  text: Ella rescató a un pueblo santo y a una descendencia irreprensible de una nación de opresores[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de una nación que afligía», o «de una nación que los oprimía». El participio griego θλιβόντων puede entenderse de manera adjetival en vez de como el sustantivo «opresores».
    reason: lexical_alternative
lexical_decisions:
- source_word: αὔτη
  english_pob_choice: She
  chosen_spanish: Ella
  alternatives_spanish:
  - Esta
  - Esta misma
  - Sabiduría
  lexicon: LSJ
  rationale: El demostrativo femenino remite a la Sabiduría personificada en el contexto. «Ella» conserva esa referencia anafórica y la personificación en español de modo natural; «Sabiduría» explicita más de lo que el griego dice aquí.
- source_word: λαὸν
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - nación
  - pueblo
  lexicon: LSJ
  rationale: «Pueblo» mantiene el valor colectivo y conveniene para el pueblo del pacto. También permite distinguirlo de ἔθνος, que en esta frase se traduce como «nación».
- source_word: ὅσιον
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - piadoso
  - devoto
  - santo
  lexicon: LSJ
  rationale: «Santo» comunica con claridad la cualidad religiosa/moral del grupo rescatado y funciona bien con «pueblo». «Piadoso» o «devoto» suavizan o desplazan el matiz.
- source_word: σπέρμα
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - semilla
  - descendientes
  - linaje
  lexicon: LSJ
  rationale: El sustantivo singular tiene sentido colectivo. «Descendencia» conserva esa colectividad sin sonar demasiado literal ni introducir un tono biológico ajeno al contexto.
- source_word: ἄμεμπτον
  english_pob_choice: blameless
  chosen_spanish: sin mancha
  alternatives_spanish:
  - irreprensible
  - sin culpa
  - sin reproche
  lexicon: LSJ
  rationale: «Sin mancha» expresa bien la idea de integridad moral y es natural en español bíblico. «Irreprensible» también sería posible, pero suena más técnico.
- source_word: ἐρρύσατο
  english_pob_choice: rescued
  chosen_spanish: rescató
  alternatives_spanish:
  - libró
  - salvó
  - liberó
  lexicon: LSJ
  rationale: El verbo denota sacar a alguien de peligro o opresión. «Rescató» es vivo e idiomático en español y conserva el sentido de acción liberadora sin cargar de más el campo soteriológico de «salvó».
- source_word: ἔθνους
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - gente
  - etnia
  lexicon: LSJ
  rationale: «Nación» preserva la distinción con λαός y refleja la entidad colectiva hostil mencionada por el griego.
- source_word: θλιβόντων
  english_pob_choice: of oppressors
  chosen_spanish: de opresores
  alternatives_spanish:
  - de los que afligían
  - de una nación que los oprimía
  - de quienes los afligían
  lexicon: LSJ
  rationale: La participación puede entenderse como adjetival o sustantivada. «Opresores» sigue la lectura del POB inglés y expresa con fuerza la acción hostil; las alternativas mantienen la otra posibilidad semántica sin borrarla.
theological_decisions:
- issue: Referencia del pronombre femenino αὔτη
  english_pob_reading: The pronoun refers to personified Wisdom, rendered as 'She.'
  chosen_spanish_reading: El pronombre se traduce con «Ella» para conservar la personificación de la Sabiduría.
  alternative_spanish_readings:
  - «Sabiduría»
  - «Esta»
  rationale: El contexto personifica a la Sabiduría como sujeto agente. «Ella» mantiene esa referencia sin sustituir el pronombre por un nombre explícito que el griego no usa aquí.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Descripción moral/covenantal del pueblo y la descendencia
  english_pob_reading: The descriptors are rendered straightforwardly as 'holy' and 'blameless' without softening or expanding them.
  chosen_spanish_reading: «Santo» y «sin mancha» se conservan de forma directa, sin atenuar su fuerza ética y pactal.
  alternative_spanish_readings:
  - «piadoso» y «sin reproche»
  - «devoto» y «irreprensible»
  rationale: La frase caracteriza al pueblo rescatado en términos de pureza moral y pertenencia pactal. La traducción mantiene esa carga teológica sin introducir categorías posteriores.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: 'El contexto auditado coincide sustancialmente con la versión inglesa POB: no hubo revisiones aplicadas y el control de calidad reporta alta concordancia con solo una observación menor sobre la lectura de θλιβόντων. La decisión española conserva esa tensión léxica en nota sin borrarla en el cuerpo principal.'
  spanish_consistency_notes:
  - Se mantiene la distinción entre λαός = «pueblo» y ἔθνος = «nación».
  - «Santo» traduce ὅσιον con registro bíblico claro y no se reemplaza por términos más devocionales salvo necesidad contextual.
  - «Descendencia» conserva el singular colectivo de σπέρμα.
  - Se usa «rescató» para ἐρρύσατο por su naturalidad y su valor de liberación concreta.
  - La nota de θλιβόντων preserva la alternativa adjetival indicada por el aparato inglés.
