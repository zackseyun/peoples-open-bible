theological_decisions:
- issue: Meaning of 'created' for the announced things
  chosen_reading: Retain creation language ('they are created') for the new events/things God now brings forth or announces, without softening to mere 'predicted' or 'declared.'
  alternative_readings:
  - they are brought about
  - they are announced
  rationale: The Hebrew uses ברא, a strong verb of creating. In Isaiah this can describe God's sovereign bringing forth of historical realities, not only material creation. Preserving 'created' maintains the theological emphasis on God's sovereign authorship of the events.
  doctrine_reference: Translation philosophy §1, §5
- issue: Object reference of 'them'
  chosen_reading: Translate with generic 'them' referring to the newly revealed things/events.
  alternative_readings:
  - these things
  - it
  rationale: The Hebrew suffixes refer back to the matters God is revealing in context. English 'them' is natural and avoids over-specifying beyond the text while preserving plurality.
  doctrine_reference: Translation philosophy §1, §6
