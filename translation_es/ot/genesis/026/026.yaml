translation:
  language: es
  text: Entonces Abimelec fue a él de Gerar, con Ahuzat su amigo[a] y Ficol, el comandante de su ejército.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su compañero». El término hebreo puede designar tanto a un amigo personal como a un asociado o acompañante de corte.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲבִימֶלֶךְ
  english_pob_choice: Then Abimelech
  chosen_spanish: Entonces Abimelec
  alternatives_spanish:
  - Y Abimelec
  - Ahora Abimelec
  lexicon: HALOT
  rationale: El waw narrativo se expresa de forma natural en español con «Entonces» para continuar la secuencia histórica sin sonar mecánico. El nombre propio se translitera según uso estándar.
- source_word: הָלַךְ אֵלָיו
  english_pob_choice: went to him
  chosen_spanish: fue a él
  alternatives_spanish:
  - fue hacia él
  - se dirigió a él
  lexicon: HALOT
  rationale: «Ir a él» conserva la dirección del hebreo sin desplazar innecesariamente la perspectiva narrativa. «Fue a él» es fluido y fiel; se evita sustituir el pronombre por el nombre propio para respetar el texto base.
- source_word: מִגְרָר
  english_pob_choice: from Gerar
  chosen_spanish: desde Gerar
  alternatives_spanish:
  - de Gerar
  lexicon: HALOT
  rationale: El nombre de lugar se translitera como «Gerar». «Desde» comunica bien el punto de partida y mantiene el movimiento explícito del hebreo מִן.
- source_word: וַאֲחֻזַּת
  english_pob_choice: with Ahuzzath
  chosen_spanish: con Ahuzat
  alternatives_spanish:
  - y Ahuzat
  lexicon: HALOT
  rationale: Aunque la forma hebrea lleva waw, el sentido en español aquí es acompañamiento; por eso se usa «con». El nombre se adapta a una transliteración española simple y reconocible.
- source_word: מֵרֵעֵהוּ
  english_pob_choice: his friend
  chosen_spanish: su amigo
  alternatives_spanish:
  - su compañero
  - su allegado
  lexicon: HALOT
  rationale: La revisión del POB inglés prefirió «his friend» frente a «adviser», reflejando con más precisión el valor básico de רע. En español, «su amigo» conserva esa amplitud semántica sin introducir una función oficial que el hebreo no exige. Se evita «consejero» por no estar suficientemente sustentado por el texto.
- source_word: וּפִיכֹל
  english_pob_choice: and Phicol
  chosen_spanish: y Ficol
  alternatives_spanish:
  - y Phicol
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se usa «Ficol» para una grafía española más natural, manteniendo la referencia al personaje.
- source_word: שַׂר צְבָאוֹ
  english_pob_choice: the commander of his army
  chosen_spanish: el comandante de su ejército
  alternatives_spanish:
  - el capitán de su ejército
  - el jefe de su ejército
  lexicon: HALOT
  rationale: שַׂר denota autoridad o mando, y צָבָא se refiere al ejército/fuerza militar. «Comandante de su ejército» expresa bien la función militar con registro claro y contemporáneo, sin perder la fuerza del hebreo.
translation_notes:
  revision_awareness: 'El contexto auditado muestra una revisión reciente del texto inglés: se corrigió ''his adviser'' a ''his friend'' para reflejar más exactamente מֵרֵעֵהוּ. El español adopta esa decisión y no recupera la opción interpretativa de ''consejero''.'
  spanish_consistency_notes:
  - Se mantiene el orden narrativo simple, con verbos de movimiento naturales en español.
  - 'Los nombres propios se transliteran de forma consistente: Abimelec, Gerar, Ahuzat, Ficol.'
  - «Su amigo» se conserva en el texto principal y se documenta la alternativa semántica en nota para no borrar la tensión lexical del hebreo.
  - Se evita el término eclesiástico o tradicionalizante donde el hebreo solo pide un referente narrativo y militar.
