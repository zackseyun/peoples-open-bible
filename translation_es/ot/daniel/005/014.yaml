translation:
  language: es
  text: Y he oído acerca de ti que el espíritu de los dioses[a] está en ti, y que luz[b], entendimiento y sabiduría extraordinaria se hallan en ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'el espíritu de Dios' o 'el Espíritu de Dios'. El arameo dice literalmente 'el espíritu de los dioses', reflejando la manera de hablar del rey.
    reason: alternative_reading
  - marker: b
    text: O, 'iluminación' o 'brillo'. Aquí 'luz' se usa de manera metafórica para claridad mental.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁמְעֵת
  english_pob_choice: And I have heard
  chosen_spanish: Y he oído
  alternatives_spanish:
  - Y he escuchado
  - Y he sabido
  lexicon: HALOT
  rationale: El perfecto arameo expresa información ya recibida; en español, el pretérito perfecto compuesto comunica bien la noticia reportada con valor actual, de modo natural y formal.
- source_word: עֲלָיִךְ
  english_pob_choice: about you
  chosen_spanish: acerca de ti
  alternatives_spanish:
  - con respecto a ti
  - de ti
  lexicon: HALOT
  rationale: Después de 'oír', la construcción idiomática en español es 'acerca de ti'; conserva el sentido relacional sin sobreactuar.
- source_word: רוּחַ אֱלָהִין
  english_pob_choice: the spirit of the gods
  chosen_spanish: el espíritu de los dioses
  alternatives_spanish:
  - el espíritu de Dios
  - el Espíritu de Dios
  - un espíritu de los dioses
  lexicon: HALOT
  rationale: El arameo es plural y el contexto es la voz del rey pagano; 'los dioses' preserva esa formulación sin normalizarla teológicamente. 'Espíritu' mantiene el valor de רוּחַ.
- source_word: וְנַהִירוּ
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - iluminación
  - brillo
  - luminosidad
  lexicon: HALOT
  rationale: La revisión inglesa favoreció 'light' por correspondencia más directa; en español, 'luz' es la equivalencia más natural y mantiene el matiz metafórico de claridad mental.
- source_word: וְשָׂכְלְתָנוּ
  english_pob_choice: insight
  chosen_spanish: inteligencia
  alternatives_spanish:
  - perspicacia
  - entendimiento
  - discernimiento
  lexicon: HALOT
  rationale: El término apunta a capacidad de comprender y razonar con acierto. 'Inteligencia' funciona en esta serie junto con 'luz' y 'sabiduría' sin perder el valor cognitivo.
- source_word: וְחָכְמָה יַתִּירָה
  english_pob_choice: extraordinary wisdom
  chosen_spanish: sabiduría extraordinaria
  alternatives_spanish:
  - sabiduría sobresaliente
  - sabiduría excelente
  - sabiduría abundante
  lexicon: HALOT
  rationale: '''Sabiduría'' traduce חָכְמָה; ''extraordinaria'' reproduce היטירָה/יַתִּירָה como intensificador de excedencia, en español claro y sobrio.'
- source_word: הִשְׁתְּכַחַת
  english_pob_choice: are found
  chosen_spanish: se hallan
  alternatives_spanish:
  - son encontradas
  - han sido halladas
  - se encuentran
  lexicon: HALOT
  rationale: El verbo indica estar hallado/encontrado. 'Se hallan' suena natural en español formal y conserva la idea de constatación.
theological_decisions:
- issue: Cómo reflejar אֱלָהִין en la boca de Belshazzar sin imponer una lectura monoteísta
  english_pob_reading: the spirit of the gods
  chosen_spanish_reading: el espíritu de los dioses
  alternative_spanish_readings:
  - el espíritu de Dios
  - el Espíritu de Dios
  rationale: La formulación plural respeta el habla real del rey y la morfología aramea. Mantener el plural evita suavizar el trasfondo pagano del discurso; la alternativa singular puede anotarse, pero no conviene imponerla en el texto principal.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo traducir רוּחַ en este contexto
  english_pob_reading: the spirit of the gods
  chosen_spanish_reading: espíritu
  alternative_spanish_readings:
  - Espíritu
  rationale: Aquí no se trata del Espíritu Santo en el texto mismo, sino de una atribución pagana de capacidad interior o poder. 'Espíritu' en minúscula preserva la ambigüedad histórica y discursiva.
  doctrine_reference: Lexical distinction רוח / Espíritu Santo
translation_notes:
  revision_awareness: 'La redacción sigue el texto arameo de WLC y toma en cuenta el audit trail inglés: se conserva el plural de אֱלָהִין por la perspectiva pagana del hablante, y se adopta ''luz'' en lugar de un tecnicismo como ''iluminación'', siguiendo la revisión inglesa más reciente. La serie nominal se mantiene con paralelismo claro en español.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' por defecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - '''Espíritu'' se dejó en minúscula porque el contexto no exige una referencia explícita al Espíritu Santo.'
  - Se mantuvo la secuencia de tres cualidades en forma coordinada para reflejar el paralelismo arameo.
  - '''Se hallan'' conserva la pasiva/resultativa sin introducir un sujeto inexistente.'
