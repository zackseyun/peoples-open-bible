source:
  edition: WLC
  text: לְ/דָוִ֗ד מִ֫זְמ֥וֹר חֶֽסֶד וּ/מִשְׁפָּ֥ט אָשִׁ֑ירָה לְ/ךָ֖ יְהוָ֣ה אֲזַמֵּֽרָה־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/101/000.yaml
  text: Of David[a]. A psalm. I will sing of steadfast love and justice; to you, Yahweh[b], I will sing praise.
  footnotes:
  - marker: a
    text: Or 'mercy and judgment.' The Hebrew terms can also be rendered more narrowly as 'mercy' and 'judgment,' but 'steadfast love and justice' better reflects the broader covenantal and ethical sense here.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Of David' in the superscription; this may indicate authorship, dedication, or association.
    reason: alternative_reading
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:36:26Z'
    unchanged: false
    changes_summary: Completed the verse by adding the omitted main clause and final verb phrase. Rendered חֶסֶד וּמִשְׁפָּט as 'steadfast love and justice' and preserved יְהוָה as 'Yahweh.'
translation:
  language: es
  text: De David[a]. Salmo. Cantaré del amor fiel[b] y de la justicia; a ti, Yahvé, cantaré alabanzas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «De David». La forma puede indicar autoría, dedicación o asociación.'
    reason: source_note
  - marker: b
    text: O «misericordia y juicio». Los términos hebreos también pueden traducirse de manera más estrecha así, pero «amor fiel y justicia» refleja mejor aquí su sentido más amplio, pactual y ético.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - De parte de David
  - Perteneciente a David
  lexicon: לְ + nombre propio en superscripción
  rationale: La superscripción hebrea permite varias relaciones (autoría, dedicación o asociación). «De David» conserva esa ambigüedad breve y natural en español, como la nota inglesa documenta.
- source_word: מִזְמ֥וֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Cántico
  lexicon: מִזְמוֹר
  rationale: «Salmo» es el equivalente directo y aceptado para el género poético indicado por el hebreo, sin añadir información no presente.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: misericordia fiel
  alternatives_spanish:
  - amor constante
  - amor leal
  - bondad constante
  - misericordia
  lexicon: חֶסֶד
  rationale: El inglés POB opta por «steadfast love» para abarcar el sentido pactual de חֶסֶד. En español, «misericordia fiel» conserva el componente relacional/pactual y evita reducirlo solo a piedad emotiva; «amor constante» también sería posible, pero puede perder la dimensión de fidelidad comprometida.
- source_word: וּמִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - derecho
  - rectitud
  lexicon: מִשְׁפָּט
  rationale: Se sigue la decisión inglesa de ampliar más allá de «judgment» hacia el campo ético y pactual. «Justicia» comunica bien ese alcance en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: יהוה
  rationale: Se preserva el nombre divino según el estándar del proyecto. Dado que el contexto no exige una sustitución reverencial, «Yahvé» mantiene la visibilidad del tetragrámaton.
- source_word: אֲזַמֵּרָה
  english_pob_choice: I will sing praise
  chosen_spanish: cantaré alabanzas
  alternatives_spanish:
  - cantaré
  - entonaré
  - haré música de alabanza
  lexicon: זמר
  rationale: 'La revisión inglesa aclaró el sentido como acto de alabanza cantada. «Cantaré alabanzas» expresa bien ese valor verbal en español sin sonar forzado, y mantiene el paralelismo con «Cantaré». '
- source_word: חֶסֶד וּמִשְׁפָּט
  english_pob_choice: steadfast love and justice
  chosen_spanish: la misericordia fiel y la justicia
  alternatives_spanish:
  - el amor constante y la justicia
  - la bondad fiel y la justicia
  lexicon: constructo coordinado de cualidades
  rationale: Se conserva la coordinación de dos rasgos divinos o ético-pactuales. El artículo singular antes de cada sustantivo es natural en español y evita una calca rígida.
theological_decisions:
- issue: Tratamiento del nombre divino en la superscripción y en la línea poética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto exige visibilizar יהוה como nombre propio. Usar «Yahvé» mantiene la referencia directa y evita la sustitución por un título en mayúsculas, coherente con la política del POB en español.
  doctrine_reference: Tetragrammaton rendering policy
- issue: Sentido de חֶסֶד en clave pactual, no meramente emocional
  english_pob_reading: steadfast love
  chosen_spanish_reading: misericordia fiel
  alternative_spanish_readings:
  - amor constante
  - amor leal
  rationale: La combinación hebrea con מִשְׁפָּט sugiere una ética/covenantidad amplia. «Misericordia fiel» intenta preservar tanto la benevolencia como la lealtad, sin reducir el término a «misericordia» a secas.
  doctrine_reference: Covenant love / hesed semantics
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que completó la cláusula final como «I will sing praise» y mantuvo «Yahweh» en lugar de una sustitución reverencial. La redacción española sigue esa lectura revisada y conserva la tensión lexical de חֶסֶד con una solución que explica su alcance pactual.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» de manera consistente con la política del proyecto.
  - La superscripción se traduce brevemente sin sobreexplicar dentro del texto principal.
  - «Cantaré alabanzas» evita un calco de «haré música» y conserva el tono poético.
  - La nota sobre חֶסֶד deja abierta la alternativa tradicional «misericordia y juicio» sin imponerla en el cuerpo principal.
