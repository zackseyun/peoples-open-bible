translation:
  language: es
  text: Y ustedes, mi rebaño, el rebaño de mi pasto—a ustedes, hombres[a], y yo soy su Dios, declara el Señor, Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seres humanos» o «humanidad». El hebreo אָדָם puede designar a la humanidad en general; aquí contrasta al rebaño metafórico con su condición humana real.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתֵּן
  english_pob_choice: And you
  chosen_spanish: Y ustedes
  alternatives_spanish:
  - Y ustedes mismos
  - Ahora ustedes
  - Y en cuanto a ustedes
  lexicon: HALOT
  rationale: La forma hebrea abre con un pronombre de segunda persona plural con valor de énfasis y contraste. «Y ustedes» conserva la dirección inmediata sin añadir una paráfrasis discursiva más fuerte de la que el texto exige.
- source_word: צֹאנִי
  english_pob_choice: my flock
  chosen_spanish: mi rebaño
  alternatives_spanish:
  - mis ovejas
  - mi flanco de ovejas
  lexicon: HALOT
  rationale: El sustantivo es colectivo y pastoral. «Rebaño» funciona de manera natural en español y preserva el valor metafórico colectivo mejor que una traducción más literal y menos idiomática.
- source_word: צֹאן מַרְעִיתִי
  english_pob_choice: the flock of my pasture
  chosen_spanish: el rebaño de mi pastizal
  alternatives_spanish:
  - el rebaño de mi pastura
  - las ovejas de mi pasto
  - mi rebaño apacentado
  lexicon: HALOT
  rationale: Se mantiene la apposición del hebreo con una construcción transparente. «Pastizal» comunica el lugar/ámbito de pastoreo de forma clara en español; evita reducir la expresión a un adjetivo y conserva la imagen del pastoreo.
- source_word: אָדָם
  english_pob_choice: men
  chosen_spanish: seres humanos
  alternatives_spanish:
  - hombres
  - humanidad
  - humanos
  lexicon: HALOT
  rationale: El hebreo אָדָם aquí contrasta a la metáfora del rebaño con su realidad humana. En español, «seres humanos» comunica el valor genérico sin introducir un masculino plural que pueda sonar más restringido de lo que el contexto warrants. La tensión con la metáfora se preserva.
- source_word: אַתֶּם
  english_pob_choice: you are
  chosen_spanish: ustedes son
  alternatives_spanish:
  - ustedes mismos son
  - son ustedes
  lexicon: HALOT
  rationale: El copulativo implícito se expresa de forma natural en español. «Ustedes son» mantiene la afirmación directa y enfática del hebreo.
- source_word: אֲנִי אֱלֹהֵיכֶם
  english_pob_choice: I am your God
  chosen_spanish: yo soy su Dios
  alternatives_spanish:
  - yo soy el Dios de ustedes
  - yo soy su Dios y Señor
  lexicon: HALOT
  rationale: Se conserva la fórmula pactual en español claro. «Su Dios» retiene la relación de pertenencia; se evita expandirla con términos no presentes en el hebreo.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - afirma
  - oráculo de
  lexicon: HALOT
  rationale: «Declara» reproduce la fórmula profética con el tono solemne que tiene en español bíblico contemporáneo, sin recurrir a un giro arcaizante.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios Yahvé
  - el Señor, Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para YHWH: «Yahvé». En la combinación אֲדֹנָי יְהוִה, el español puede expresar la doble referencia con «el Señor Yahvé», que evita la repetición artificial y conserva el título compuesto sin masking convencional.'
theological_decisions:
- issue: Valor de אָדָם en el cierre de la metáfora pastoral
  english_pob_reading: men
  chosen_spanish_reading: seres humanos
  alternative_spanish_readings:
  - hombres
  - humanidad
  rationale: El versículo explicita que el rebaño es metafórico y que los destinatarios pertenecen al ámbito humano. «Seres humanos» conserva el alcance genérico de אָדָם y deja visible la tensión entre imagen pastoral e identidad real, sin limitarla innecesariamente a un masculino plural.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אָדָם
- issue: Renderización del nombre divino YHWH en combinación con אֲדֹנָי
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor, Yahvé
  rationale: El proyecto pide usar «Yahvé» para יהוה. Aquí el hebreo tiene la combinación solemne אֲדֹנָי יְהוִה; en español, «el Señor Yahvé» comunica la unión de título y nombre sin sustituir el nombre divino por un eufemismo ni crear una repetición poco natural.
  doctrine_reference: Project-level Spanish terminology defaults for יהוה / YHWH
translation_notes:
  revision_awareness: El borrador sigue el pasaje base y el audit trail en alto acuerdo, sin revisiones aplicadas en la fuente inglesa. Se ha ajustado la salida al criterio español del proyecto para יהוה y se ha hecho explícita la alternativa semántica de אָדָם mediante nota, manteniendo la tensión léxica del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה según el estándar del proyecto.
  - «Señor Yahvé» se usa para reflejar אֲדֹנָי יְהוִה sin máscara convencional y sin calco extraño.
  - «Rebaño» conserva el sentido colectivo de צֹאן en un español natural y bíblicamente claro.
  - La nota sobre אָדָם preserva la ambigüedad relevante entre «seres humanos», «humanos» y «humanidad».
