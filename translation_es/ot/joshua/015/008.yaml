revisions:
- from: Entonces el límite subía por el valle de Ben-hinón hasta la ladera[a] del jebuseo[b] por el sur (es decir, Jerusalén), y el límite subía hasta la cima del monte que está frente al valle de Hinón[c], al extremo norte del valle de Refaím.
  to: Y el límite subía por el valle de Ben-hinón hasta la ladera[a] del jebuseo, por el sur (es decir[b], Jerusalén), y el límite subía hasta la cima del monte que está frente al valle de Hinón, al oeste[c], en el extremo norte del valle de Refaím.
  rationale: 'La revisión es menor pero necesaria: reincorpora en el texto principal el valor direccional de יָמָּה (''al oeste''), preserva en nota la alternativa appositiva documentada por el POB inglés, y suaviza la cadena narrativa con un inicio más cercano al hebreo. El resto del texto estaba bien encaminado y solo se ajustó para mayor fidelidad y claridad.'
