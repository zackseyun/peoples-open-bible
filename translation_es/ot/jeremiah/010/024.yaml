translation:
  language: es
  text: Disciplíname[a], Yahvé, pero con justicia[b], no en tu ira, no sea que me disminuyas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Corrígeme, Yahvé’, o ‘Castígame, Yahvé’.
    reason: lexical_alternative
  - marker: b
    text: O ‘con juicio’ o ‘conforme a justicia’. El término hebreo puede denotar juicio, justicia o medida adecuada.
    reason: lexical_alternative
  - marker: c
    text: O ‘no sea que me hagas pequeño’ o ‘no sea que me reduzcas’.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַסְּרֵנִי
  english_pob_choice: Discipline me
  chosen_spanish: Disciplíname
  alternatives_spanish:
  - Corrígeme
  - Castígame
  lexicon: HALOT
  rationale: El Piel de יסר pide una acción correctiva y formativa de parte de Yahvé. «Disciplíname» conserva la idea de corrección severa sin caer en un calco torpe; «corrígeme» es posible pero algo más estrecho, y «castígame» suena más punitivo de lo que exige el contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto, no un título sustitutivo. «Yahvé» es la forma española acordada para el Tetragrámaton y mantiene la transparencia del texto hebreo.
- source_word: אַךְ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - solo
  - ciertamente
  - sin embargo
  lexicon: HALOT
  rationale: 'אַךְ introduce una restricción: el hablante no rechaza la disciplina, sino su forma destructiva. «Pero» expresa bien ese contraste en español y deja visible la limitación implícita.'
- source_word: בְּמִשְׁפָּט
  english_pob_choice: with justice
  chosen_spanish: con justicia
  alternatives_spanish:
  - con juicio
  - conforme a justicia
  - con debido juicio
  lexicon: HALOT
  rationale: מִשְׁפָּט puede abarcar juicio, justicia y trato conforme al orden debido. En esta súplica, «con justicia» comunica mejor un trato medido y recto, sin endurecer indebidamente el sentido hacia condena.
- source_word: בְּאַפְּךָ
  english_pob_choice: in your anger
  chosen_spanish: en tu ira
  alternatives_spanish:
  - en tu enojo
  - con tu ira
  - en tu furor
  lexicon: HALOT
  rationale: אַף se refiere al enojo o ira. «Ira» conserva la fuerza del término y es natural en registro bíblico español; «enojo» sería más llano, pero algo más débil.
- source_word: פֶּן תַּמְעִיטֵנִי
  english_pob_choice: lest you diminish me
  chosen_spanish: no sea que me disminuyas
  alternatives_spanish:
  - no sea que me reduzcas a nada
  - no sea que me hagas pequeño
  - para que no me disminuyas
  lexicon: HALOT
  rationale: El Hiphil de מעט expresa hacer pequeño, disminuir. «Me disminuyas» sigue de cerca el sentido base y respeta la cautela del hebreo; no se expande más allá hacia una destrucción total que el texto no dice explícitamente.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. Traducirlo como «Yahvé» preserva el nombre personal de Dios y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tensión entre disciplina y juicio
  english_pob_reading: with justice, not in your anger
  chosen_spanish_reading: con justicia, no en tu ira
  alternative_spanish_readings:
  - con juicio, no en tu furor
  - conforme a justicia, no en tu enojo
  rationale: La oración pide disciplina, pero delimitada por justicia y no por ira desbordada. La traducción mantiene esa tensión teológica sin suavizar el carácter correctivo del ruego ni convertirlo en una petición de mera amabilidad.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La versión inglesa revisó el cierre desde una paráfrasis más fuerte hacia «diminish me», para mantenerse más cerca del sentido de מעט sin ampliar indebidamente la amenaza. En español se reflejó esa cautela con «no sea que me disminuyas», y se evitó una formulación más interpretativa como «me reduzcas a nada».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, conforme al criterio POB en español.
  - Se usa «disciplíname» para יסר por su valor correctivo, no meramente punitivo.
  - «Ira» preserva el peso semántico de אַף sin forzar un registro arcaico.
  - «Con justicia» conserva la tensión entre corrección y trato medido.
  - 'La última cláusula queda cercana al hebreo: מעט → «disminuyas», sin expansión doctrinal o retórica.'
