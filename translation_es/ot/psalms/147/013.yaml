translation:
  language: es
  text: Porque ha fortalecido los cerrojos de tus puertas; ha bendecido a tus hijos e hijas[a] dentro de ti[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus hijos». El hebreo בנים puede ser específicamente masculino o un término más amplio para hijos/descendientes; aquí el sentido cívico amplio encaja bien con la referencia a Jerusalén.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en medio de ti».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la alabanza precedente. «Porque» conserva el valor causal y suena natural en español poético.
- source_word: חִזַּק
  english_pob_choice: has strengthened
  chosen_spanish: ha fortalecido
  alternatives_spanish:
  - ha hecho fuertes
  - ha afirmado
  - ha reforzado
  lexicon: HALOT
  rationale: El piel perfecto expresa hacer firme o dar fuerza. «Ha fortalecido» comunica bien la acción completada sin sobrecargar el español con un calco rígido.
- source_word: בְּרִיחֵי
  english_pob_choice: bars
  chosen_spanish: cerrojos
  alternatives_spanish:
  - barras
  - trancas
  - pasadores
  lexicon: HALOT
  rationale: El término denota los elementos que aseguran la puerta. «Cerrojos» es una opción española natural y suficientemente amplia; evita especificar indebidamente un mecanismo concreto.
- source_word: שְׁעָרַיִךְ
  english_pob_choice: your gates
  chosen_spanish: tus puertas
  alternatives_spanish:
  - tus portones
  - tus entradas
  lexicon: HALOT
  rationale: El constructo plural con sufijo femenino singular se refiere a las puertas de la ciudad personificada. «Tus puertas» preserva la imagen y mantiene el tratamiento directo a Sion/Jerusalén.
- source_word: בֵּרַךְ
  english_pob_choice: has blessed
  chosen_spanish: ha bendecido
  alternatives_spanish:
  - ha dado bendición a
  - ha colmado de bendición a
  lexicon: HALOT
  rationale: El piel perfecto de ברך se traduce de forma directa como bendecir. «Ha bendecido» es la forma más clara y fiel en español.
- source_word: בָּנַיִךְ
  english_pob_choice: your children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos e hijas
  - tus descendientes
  - tus muchachos
  lexicon: HALOT
  rationale: Aunque בנים puede tener sentido colectivo, en español «hijos» puede funcionar de manera genérica y conserva la relación filial sin introducir una paráfrasis más amplia. Para mantener la misma amplitud semántica que el inglés POB, se deja abierta la lectura colectiva en nota.
- source_word: בְּקִרְבֵּךְ
  english_pob_choice: within you
  chosen_spanish: dentro de ti
  alternatives_spanish:
  - en medio de ti
  - en tu interior
  lexicon: HALOT
  rationale: La frase literalmente significa «en tu medio». «Dentro de ti» es un español natural que conserva la personificación de la ciudad sin perder el sentido locativo.
theological_decisions:
- issue: Ciudad personificada como destinataria femenina singular
  english_pob_reading: The verse addresses Jerusalem/Zion as a feminine singular city, retained through repeated 'your' and 'within you.'
  chosen_spanish_reading: El verso se dirige a Jerusalén/Sion como ciudad personificada en femenino singular, preservada mediante «tus» y «ti».
  alternative_spanish_readings:
  - Nombrar explícitamente a Jerusalén dentro del verso
  - Usar un plural impersonal
  rationale: El hebreo usa sufijos de segunda persona femenina singular. El español debe conservar esa personificación sin añadir un nombre que no aparece en el texto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido de בנים en contexto cívico
  english_pob_reading: your children
  chosen_spanish_reading: tus hijos
  alternative_spanish_readings:
  - tus hijos y descendientes
  - tus hijos varones
  rationale: El término puede ser específico o colectivo. En el contexto de una ciudad, la lectura colectiva es plausible, pero «hijos» sigue siendo un equivalente natural y fiel en español, dejando la amplitud semántica abierta.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés sin depender mecánicamente de él. Se conservaron el valor causal de כִּי, el aspecto perfecto de los verbos y la personificación femenina de la ciudad. No hubo revisiones aplicadas en el pasaje fuente, y el consenso de revisión fue de alta concordancia.
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto cuando corresponda; este versículo no contiene el Tetragrámaton.
  - Se prefirió «hijos» con nota para conservar la posibilidad de lectura colectiva sin imponer una paráfrasis más explicativa.
  - «Dentro de ti» mantiene el paralelismo con el inglés POB «within you» y su equivalente literal «en medio de ti».
