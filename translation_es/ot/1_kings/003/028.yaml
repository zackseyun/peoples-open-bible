base_translation:
  language: en
  yaml_path: translation/ot/1_kings/003/028.yaml
  text: And all Israel heard of the judgment that the king had rendered[a], and they feared the king[b], because they saw that the wisdom of God was within him to administer justice.
  footnotes:
  - marker: a
    text: Or, 'they feared the king' or 'they revered the king.' The Hebrew can express fear, reverence, or awe in response to recognized authority.
    reason: lexical_alternative
  - marker: b
    text: Or, 'to do justice' or 'to render judgment.'
    reason: lexical_alternative
