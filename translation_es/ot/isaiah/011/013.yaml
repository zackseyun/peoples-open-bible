base_translation:
  language: en
  yaml_path: translation/ot/isaiah/011/013.yaml
  text: The jealousy of Ephraim will depart[a], and the adversaries of Judah will be cut off; Ephraim will not be jealous of Judah[b], and Judah will not harass Ephraim.
  footnotes:
  - marker: a
    text: Or 'envy' for 'jealousy' in both occurrences involving Ephraim; the Hebrew קנא/קנאה can denote jealous rivalry or envy in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'Judah will not be hostile to Ephraim' or 'will not oppress Ephraim'; the Hebrew verb can convey enmity, harassment, or oppression.
    reason: lexical_alternative
