translation:
  text: A scribe’s wisdom increases wisdom[a], and one free from busyness will become wise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''lacking occupation/business.'' The Greek parallel points toward the sense of being at rest or in leisure, which supports the rendering ''free from busyness.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: חכמת
  chosen: wisdom
  alternatives:
  - skill
  - learning
  lexicon: HALOT
  rationale: The noun plainly denotes wisdom rather than mere technical skill here, and it frames the verse's contrast with freedom from occupation.
- source_word: סופר
  chosen: scribe
  alternatives:
  - writer
  - scholar
  - secretary
  lexicon: HALOT
  rationale: In Ben Sira this term commonly refers to the learned textual professional, not merely someone who writes. 'Scribe' preserves the social role and links with the surrounding context about trades and study.
- source_word: תרבה
  chosen: increases
  alternatives:
  - multiplies
  - abounds in
  lexicon: HALOT
  rationale: The Hiphil sense is causative/incremental. 'Increases' is natural English and preserves the idea of growth without overinterpreting the mechanism.
- source_word: וחסר עסק
  chosen: one free from busyness
  alternatives:
  - one lacking occupation
  - one with little business
  - one without work
  lexicon: HALOT
  rationale: Literally 'lacking occupation/business.' In context the point is not unemployment as such but freedom from distracting practical labor, matching the contrast with the scribe's leisure for study. 'Free from busyness' captures the idiom in readable English.
- source_word: עסק
  chosen: busyness
  alternatives:
  - occupation
  - business
  - work
  lexicon: HALOT
  rationale: The word can denote occupation or business. Because the verse contrasts manual/professional demands with the cultivation of wisdom, 'busyness' best conveys being tied up with affairs.
- source_word: יתחכם
  chosen: will become wise
  alternatives:
  - will grow wise
  - will show himself wise
  lexicon: HALOT
  rationale: The hitpael here is best rendered as entering or attaining wisdom, not merely appearing wise. 'Will become wise' is straightforward and idiomatic.
- source_word: ἐν ἀναπαύσει
  chosen: free from busyness
  alternatives:
  - at rest
  - in leisure
  lexicon: LSJ
  rationale: The Greek parallel emphasizes rest/leisure, which supports taking וחסר עסק as freedom from pressing occupation rather than absolute lack of employment.
