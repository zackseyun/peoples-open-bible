translation:
  language: es
  text: Entra en la peña y escóndete en el polvo, de delante del terror de Yahvé[a][b] y del esplendor de su majestad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el pavor de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: Heb. literalmente «de delante de», expresando huida de la presencia de Yahvé.
    reason: lexical_alternative
  - marker: c
    text: O «de la majestad de su esplendor». El hebreo une dos sustantivos cercanos para intensificar la idea de gloria real abrumadora.
    reason: lexical_alternative
lexical_decisions:
- source_word: בּוֹא
  english_pob_choice: Enter
  chosen_spanish: Entra
  alternatives_spanish:
  - Entra en
  - Métete en
  - Ve dentro de
  lexicon: HALOT
  rationale: El imperativo pide una orden directa. «Entra» comunica bien el movimiento hacia adentro; con la preposición «en» en español resulta natural y fiel al sentido del hebreo con el complemento locativo.
- source_word: בַּצּוּר
  english_pob_choice: the rock
  chosen_spanish: la peña
  alternatives_spanish:
  - la roca
  - el peñasco
  - la piedra
  lexicon: HALOT
  rationale: צור puede ser roca, peña o peñasco. «Peña» conserva la imagen de refugio rocoso y suena natural en español bíblico sin perder concreción.
- source_word: וְהִטָּמֵן
  english_pob_choice: and hide yourself
  chosen_spanish: escóndete
  alternatives_spanish:
  - y ocúltate
  - y escóndete a ti mismo
  - y hazte ocultar
  lexicon: HALOT
  rationale: El valor reflexivo/medio se expresa con un imperativo pronominal natural en español. «Escóndete» comunica mejor la fuerza directa que una perífrasis más literal.
- source_word: בֶּעָפָר
  english_pob_choice: in the dust
  chosen_spanish: en el polvo
  alternatives_spanish:
  - en el polvo de la tierra
  - en el polvo de la tierra
  - en el polvo
  lexicon: HALOT
  rationale: עפר puede referirse a polvo o tierra pulverizada. «Polvo» preserva la imagen de humillación y ocultamiento; es una equivalencia idiomática normal en español.
- source_word: מִפְּנֵי
  english_pob_choice: from before
  chosen_spanish: a causa de
  alternatives_spanish:
  - de delante de
  - ante
  - frente a
  lexicon: HALOT
  rationale: La expresión hebrea literalmente indica alejamiento «de delante de» o «desde la presencia de». En español, «a causa de» transmite el efecto de huida motivada por esa presencia temible, pero la nota preserva la alternativa espacial que el hebreo sugiere.
- source_word: פַּחַד יְהוָה
  english_pob_choice: the terror of Yahweh
  chosen_spanish: el terror de Yahvé
  alternatives_spanish:
  - el temor de Yahvé
  - el pavor de Yahvé
  - el terror del SEÑOR
  lexicon: HALOT
  rationale: פּחד en este contexto expresa temor aterrador, no reverencia devocional. «Terror» mantiene la intensidad del juicio; «Yahvé» sigue el principio del proyecto de no sustituir el Nombre divino por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio como «Yahvé», conforme al criterio del proyecto. La forma con tilde es la adaptación habitual en español para lectura fluida y acentuación.
- source_word: וּמֵהֲדַר
  english_pob_choice: and from the splendor of
  chosen_spanish: y de la esplendidez de
  alternatives_spanish:
  - y del esplendor de
  - y de la majestad de
  - y de la hermosura de
  lexicon: HALOT
  rationale: הדר puede ser esplendor, majestad o adorno. «Esplendidez» permite conservar el matiz de brillante magnificencia y evita repetir sin necesidad el término de la frase paralela.
- source_word: גְּאֹנוֹ
  english_pob_choice: his majesty
  chosen_spanish: su majestad
  alternatives_spanish:
  - su exaltación
  - su grandeza
  - su orgullo
  lexicon: HALOT
  rationale: גאון aquí no expresa orgullo humano en sentido negativo, sino elevación/majestad en un contexto de manifestación divina. «Majestad» es el equivalente más claro y reverente en español.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo trae el Tetragrámaton. Se mantiene como nombre propio en español, no como título enmascarado, para conservar la transparencia del original y la práctica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de פַּחַד en contexto de juicio
  english_pob_reading: the terror of Yahweh
  chosen_spanish_reading: el terror de Yahvé
  alternative_spanish_readings:
  - el temor de Yahvé
  - el pavor de Yahvé
  rationale: Aquí no se trata del «temor de Yahvé» en sentido sapiencial/devocional, sino de una experiencia aterradora ante la presencia judicial de Dios. «Terror» conserva esa tensión teológica sin suavizarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Matiz de מִפְּנֵי
  english_pob_reading: from before
  chosen_spanish_reading: a causa de
  alternative_spanish_readings:
  - de delante de
  - ante
  - frente a
  rationale: El hebreo puede leerse espacialmente como huida «de delante de» la presencia de Yahvé. En la línea principal se usa una solución dinámica breve; la nota preserva la lectura espacial para no perder el matiz de presencia.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: La revisión del POB inglés añadió «into» en «Enter into the rock» para reflejar con mayor naturalidad la preposición hebrea. En español, «Entra en la peña» ya incorpora ese movimiento de ingreso, por lo que no se requiere una marca adicional. Se mantuvo la distinción entre el terror judicial y la duplicación de términos de gloria mediante una solución léxica y notas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma del nombre divino, coherente con el criterio del proyecto.
  - Se eligió un registro bíblico claro y moderno, sin depender de fórmulas eclesiásticas tradicionales que oculten el hebreo.
  - «Terror» se conserva para פַּחַד en contexto de juicio; no se suavizó a «temor» por consistencia teológica.
  - La pareja «esplendidez / majestad» intenta reflejar la duplicación poética del hebreo sin hacerla idéntica en español.
  - «Peña» y «polvo» conservan la imaginería de refugio y humillación del original.
