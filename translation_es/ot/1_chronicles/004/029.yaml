lexical_decisions:
- source_word: וּ/בְ/בִלְהָה
  english_pob_choice: and in Bilhah
  chosen_spanish: y en Bilha
  alternatives_spanish:
  - y en Bilhah
  - y en Bilá
  lexicon: HALOT
  rationale: El hebreo usa la preposición ב con una lista de lugares; en español, «en» es la forma más natural y fiel para este valor locativo. El nombre propio se adapta a la ortografía española como «Bilha», conservando la transliteración del topónimo sin forzar una traducción.
- source_word: וּ/בְ/עֶצֶם
  english_pob_choice: and in Ezem
  chosen_spanish: y en Ezem
  alternatives_spanish:
  - y en Ezem
  lexicon: HALOT
  rationale: Se mantiene el paralelismo de la serie de lugares con «y en». «Ezem» se translitera directamente porque es un topónimo.
- source_word: וּ/בְ/תוֹלָד
  english_pob_choice: and in Tolad
  chosen_spanish: y en Tolad
  alternatives_spanish:
  - y en Tolad
  lexicon: HALOT
  rationale: La misma construcción coordinada continúa la lista geográfica. «Tolad» se conserva como nombre propio transliterado, y «en» refleja de modo transparente la preposición hebrea ב.
