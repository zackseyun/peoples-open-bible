translation:
  language: es
  text: Para el director del coro; según el Guitit[a]. Salmo de David[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Gittith; probablemente un término musical o litúrgico, quizá el nombre de una melodía o de un instrumento.
    reason: cultural_note
  - marker: b
    text: 'O: «por David» o «para David». El hebreo «de David» puede indicar autoría, asociación o dedicación.'
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el director musical
  - Para el maestro de coro
  - Para el líder
  lexicon: HALOT
  rationale: En los títulos de los salmos, el participio señala a quien dirige la ejecución musical. «Director del coro» comunica esa función de manera clara y natural en español sin resolver de más el matiz técnico.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - sobre
  - con referencia a
  - de acuerdo con
  lexicon: HALOT
  rationale: En una superscripción musical, la preposición introduce una indicación de ejecución o de melodía. «Según» conserva esa relación sin imponer un valor técnico más específico del que permite el hebreo.
- source_word: הַגִּתִּית
  english_pob_choice: the Gittith
  chosen_spanish: el Guitit
  alternatives_spanish:
  - la Guitit
  - el instrumento guittita
  - la tonada del lagar
  lexicon: HALOT
  rationale: El referente es incierto; transliterar preserva la opacidad del término hebreo. Se adapta la forma a una ortografía española legible, manteniendo el artículo como parte del encabezado musical.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Cántico
  - Poema
  - Melodía
  lexicon: HALOT
  rationale: «Salmo» es el equivalente establecido y más preciso para esta etiqueta de género en las superscripciones bíblicas.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición hebrea permite autoría, asociación o dedicación. «De David» conserva esa ambigüedad mejor que una opción más cerrada como «por David».
theological_decisions:
- issue: Relación exacta de David con el salmo
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: La superscripción no obliga a decidir entre autoría, dedicación o asociación. Traducir «de David» preserva la tensión documental en vez de resolverla interpretativamente.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica/textual cuando el hebreo deja abierta la relación'
- issue: Valor de הַגִּתִּית como término musical incierto
  english_pob_reading: according to the Gittith
  chosen_spanish_reading: según el Guitit
  alternative_spanish_readings:
  - según la Guitit
  - según el instrumento de Gat
  - según la tonada del lagar
  rationale: Como el término no es seguro, la transliteración evita fingir certeza. La nota mantiene abierta la posibilidad de un instrumento, una melodía o un tecnicismo litúrgico.
  doctrine_reference: 'Translation philosophy §2: transparencia textual y no-supresión de ambigüedades'
translation_notes:
  revision_awareness: La versión inglesa más reciente mantuvo sin cambios la puntuación con punto y coma entre las dos primeras cláusulas, y la revisión automática preferida esta estructura unificada del encabezado. También conservó la transliteración de Gittith por la incertidumbre del término y la traducción ambigua de לְדָוִד como «of David».
  spanish_consistency_notes:
  - He mantenido un registro transparente de los elementos de encabezado, con puntuación que integra las tres unidades del superscrito sin fragmentarlas.
  - He evitado «SEÑOR» como máscara para el nombre divino porque este versículo no lo contiene.
  - He usado transliteración para Gittith con artículo español natural, siguiendo el principio de no falsear la certeza léxica.
  - «Salmo» se conserva como rótulo de género, no como paráfrasis.
  - «de David» mantiene la ambigüedad documental que el hebreo permite.
