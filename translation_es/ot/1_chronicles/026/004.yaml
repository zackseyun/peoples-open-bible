translation:
  language: es
  text: 'Y Obed-edom tuvo hijos: Semaías el primogénito[a], Jozabad el segundo, Joá el tercero, y Sakar el cuarto[b], y Netanel el quinto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «Y a Obed-edom, hijos»; aquí se expresa de forma natural con «tuvo hijos» para una fórmula genealógica en español.'
    reason: lexical_alternative
  - marker: b
    text: El nombre hebreo aquí es Sakar, distinto de Isacar. Se conserva la forma breve del texto y no se la identifica con el nombre tribal más conocido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/עֹבֵ֥ד אֱדֹ֖ם
  english_pob_choice: And Obed-edom
  chosen_spanish: Y a Obed-edom
  alternatives_spanish:
  - Y Obed-edom
  - Y Obed-edom tuvo
  lexicon: HALOT
  rationale: 'La construcción hebrea con la preposición לְ indica dirección o relación: «a/para Obed-edom». En una fórmula genealógica, el español natural puede conservar el dativo con «a» y luego explicitar la relación con la frase verbal, sin borrar el matiz del original.'
- source_word: בָּנִ֑ים
  english_pob_choice: had sons
  chosen_spanish: le nacieron hijos
  alternatives_spanish:
  - tuvo hijos
  - había hijos
  lexicon: HALOT
  rationale: El hebreo usa una formulación nominal elíptica. En español, «le nacieron hijos» reproduce bien el hecho genealógico con naturalidad y mantiene el carácter de lista familiar sin añadir interpretación extra.
- source_word: שְׁמַֽעְיָ֤ה
  english_pob_choice: Shemaiah
  chosen_spanish: Semaías
  alternatives_spanish:
  - Semaya
  - Shemaya
  lexicon: HALOT
  rationale: Nombre propio transliterado al español de forma convencional y legible. «Semaías» preserva la identificación del nombre hebreo sin forzar una grafía inglesa.
- source_word: הַ/בְּכוֹר֙
  english_pob_choice: the firstborn
  chosen_spanish: el primogénito
  alternatives_spanish:
  - el primero
  - el mayor
  lexicon: HALOT
  rationale: בְּכוֹר no es solo un ordinal, sino un título de primogenitura. «Primogénito» conserva ese valor lexical y genealógico mejor que un simple «primero».
- source_word: יְהוֹזָבָ֣ד
  english_pob_choice: Jehozabad
  chosen_spanish: Jozabad
  alternatives_spanish:
  - Jehozabad
  - Yehozabad
  lexicon: HALOT
  rationale: Se adapta el nombre al español manteniendo el elemento teofórico reconocible y una forma natural de lectura. La variante breve «Jozabad» es común en transliteración española de nombres hebreos con ye-/yo- inicial.
- source_word: הַ/שֵּׁנִ֔י
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el siguiente
  lexicon: HALOT
  rationale: Adjetivo ordinal directo. No requiere paráfrasis; «el segundo» conserva la secuencia de nacimiento.
- source_word: יוֹאָ֤ח
  english_pob_choice: Joah
  chosen_spanish: Joac
  alternatives_spanish:
  - Joah
  lexicon: HALOT
  rationale: Se opta por una grafía española que refleje la pronunciación probable y evite una terminación inglesa artificial. El hebreo permite esta transliteración breve y clara en español.
- source_word: הַ/שְּׁלִשִׁי֙
  english_pob_choice: the third
  chosen_spanish: el tercero
  alternatives_spanish:
  - el tercer hijo
  lexicon: HALOT
  rationale: Ordinal simple. En español, «el tercero» funciona naturalmente dentro de una lista genealógica y mantiene el paralelo con los demás ordinales.
- source_word: וְ/שָׂכָ֣ר
  english_pob_choice: and Sakar
  chosen_spanish: Sakar
  alternatives_spanish:
  - Zacar
  - Zacarías
  lexicon: HALOT
  rationale: La forma consonántica aquí corresponde al nombre Sakar, no al más conocido Issachar. Se conserva la distinción del texto hebreo y la transliteración breve empleada por la POB en inglés.
- source_word: הָ/רְבִיעִ֔י
  english_pob_choice: the fourth
  chosen_spanish: el cuarto
  alternatives_spanish:
  - el cuarto hijo
  lexicon: HALOT
  rationale: Ordinal directo, sin necesidad de expansión. «El cuarto» es suficiente y fiel al flujo de la lista.
- source_word: וּ/נְתַנְאֵ֖ל
  english_pob_choice: and Nethanel
  chosen_spanish: y Natanael
  alternatives_spanish:
  - y Natanel
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con forma reconocible y cercana al hebreo. «Natanael» conserva la raíz nominal y es inteligible para lectores en español.
- source_word: הַ/חֲמִישִֽׁי
  english_pob_choice: the fifth
  chosen_spanish: el quinto
  alternatives_spanish:
  - el quinto hijo
  lexicon: HALOT
  rationale: Ordinal directo y claro, adecuado para una lista de nacimientos.
theological_decisions:
- issue: Fórmula genealógica implícita
  english_pob_reading: The English supplies 'had' to express the genealogical formula naturally.
  chosen_spanish_reading: «le nacieron» expresa la relación genealógica sin introducir un verbo de posesión no explícito.
  alternative_spanish_readings:
  - «tuvo hijos»
  - «había hijos»
  rationale: El hebreo presenta una construcción nominal elíptica. En español, «le nacieron hijos» conserva el sentido relacional y evita convertir la frase en una posesión más fuerte de lo que el texto dice.
  doctrine_reference: Neutral; cuestión de estilo y fidelidad sintáctica, no doctrinal.
translation_notes:
  revision_awareness: Coincide con el contexto inglés POB en la elección de la estructura genealogía + nombres propios, y mantiene la distinción lexical importante entre Sakar e Isacar. No se observan revisiones posteriores que requieran ajuste.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término reservado para el nombre divino cuando aparezca; en este versículo no ocurre.
  - Se usa «primogénito» para preservar el valor lexical de בְּכוֹר.
  - Los nombres propios se transliteran con grafía española legible y consistente.
  - 'La secuencia ordinal se vierte de forma uniforme: segundo, tercero, cuarto, quinto.'
