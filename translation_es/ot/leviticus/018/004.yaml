revisions:
- from: Harán mis juicios[a], y guardarán mis estatutos, para andar en ellos. Yo soy Yahvé, su Dios.
  to: Harán mis juicios[a], y guardarán mis estatutos, para andar en ellos. Yo soy Yahvé, el Dios de ustedes.
  rationale: Se mantiene la estructura y las decisiones léxicas principales del borrador, pero se corrige «su Dios» a «el Dios de ustedes» para reflejar con mayor fidelidad la segunda persona plural directa de אֱלֹהֵיכֶם y evitar ambigüedad en español neutral latinoamericano. No se requiere adjudicación adicional porque el ajuste es claro, local y no doctrinalmente controvertido.
