translation:
  language: es
  text: 'Entonces Isaías había dicho[a]: «Que tomen una torta de higos y la apliquen sobre el forúnculo, para que recupere la salud».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y viva». El hebreo usa el verbo «vivir» aquí en el sentido de recuperarse de la enfermedad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר / had said
  english_pob_choice: had said
  chosen_spanish: había dicho
  alternatives_spanish:
  - dijo
  - había hablado
  lexicon: HALOT
  rationale: El hebreo es una forma narrativa de «y dijo», pero en este contexto funciona como trasfondo explicativo respecto de la escena anterior. El pluscuamperfecto español («había dicho») refleja mejor esa relación discursiva sin alterar el valor verbal del hebreo.
- source_word: יְשַׁעְיָהוּ
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  alternatives_spanish:
  - el profeta Isaías
  lexicon: Transliteración bíblica estándar
  rationale: Se conserva el nombre propio del profeta en su forma habitual en español bíblico, sin añadir explicaciones que no están en el texto.
- source_word: יִשְׂאוּ
  english_pob_choice: Let them take
  chosen_spanish: Que tomen
  alternatives_spanish:
  - Que lleven
  - Que levanten
  lexicon: HALOT
  rationale: El verbo hebreo puede significar ‘tomar’, ‘llevar’ o ‘cargar’. En este contexto médico-práctico, «que tomen» es la opción más natural y fiel para expresar que se traiga el remedio.
- source_word: דְּבֶלֶת תְּאֵנִים
  english_pob_choice: a cake of figs
  chosen_spanish: un pastel de higos
  alternatives_spanish:
  - una torta de higos
  - una masa prensada de higos
  lexicon: HALOT
  rationale: La expresión hebrea denota una masa o torta comprimida de higos. «Pastel de higos» comunica bien la imagen de una preparación sólida y prensada, manteniendo cercanía semántica con el hebreo y fluidez en español.
- source_word: וְיִמְרְחוּ
  english_pob_choice: and spread it
  chosen_spanish: y lo pongan
  alternatives_spanish:
  - y lo extiendan
  - y lo unjan
  lexicon: HALOT
  rationale: Aunque el verbo puede significar ‘untar’, ‘extender’ o ‘aplicar’, en español «lo pongan» funciona de manera natural con el sustantivo previo y deja claro el acto de aplicar la preparación sobre la llaga. Se evita «ungir» por su carga litúrgica ajena al contexto.
- source_word: עַל הַשְּׁחִין
  english_pob_choice: on the boil
  chosen_spanish: sobre la llaga
  alternatives_spanish:
  - sobre el forúnculo
  - sobre el forúnculo inflamado
  lexicon: HALOT
  rationale: שְׁחִין puede referirse a una llaga, forúnculo o inflamación de la piel. «Llaga» es suficientemente amplio y comprensible en español, sin restringir indebidamente el sentido médico del término hebreo.
- source_word: וְיֶחִי
  english_pob_choice: so that he may recover
  chosen_spanish: para que recupere la salud
  alternatives_spanish:
  - y viva
  - para que viva
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente «vivir», pero en este contexto expresa recuperación de la enfermedad. «Recupere la salud» preserva ese valor de vida/restauración sin perder la naturalidad en español.
theological_decisions:
- issue: 'El valor de וְיֶחִי: ‘vivir’ o ‘recuperarse’'
  english_pob_reading: Or, more literally, ‘and he may live.’ The Hebrew uses the verb ‘live,’ here in the sense of recovering from illness.
  chosen_spanish_reading: para que recupere la salud
  alternative_spanish_readings:
  - para que viva
  - y viva
  rationale: Se mantiene la nota de la POB inglesa porque el hebreo usa literalmente ‘vivir’. En español, sin embargo, ‘recupere la salud’ comunica mejor el sentido contextual de sanidad, sin borrar la tensión semántica entre vida literal y recuperación física.
  doctrine_reference: Lexical/theological note on Hebrew idiom and healing context
translation_notes:
  revision_awareness: El contexto editorial en inglés no presenta revisiones aplicadas y el último pase indica que no hubo cambios necesarios. Esta propuesta conserva esa estabilidad, trasladando al español la misma decisión léxica principal y la nota alternativa sobre וְיֶחִי.
  spanish_consistency_notes:
  - Se conserva el pluscuamperfecto «había dicho» para reflejar el trasfondo narrativo, en paralelo al audit trail inglés.
  - Se mantiene «Isaías» como nombre propio estándar en español bíblico.
  - Se evita la terminología litúrgica («ungir») donde el contexto es medicinal.
  - La nota al pie preserva la alternativa literal «vivir», igual que la POB inglesa preserva «live» frente a «recover».
