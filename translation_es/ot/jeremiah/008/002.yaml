translation:
  language: es
  text: Y los extenderán[a] delante del sol, de la luna y de todo el ejército de los cielos, los cuales amaron, a los cuales sirvieron, tras los cuales anduvieron, a los cuales buscaron[b] y ante los cuales se postraron. No serán recogidos ni sepultados; serán estiércol sobre la superficie de la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los tenderán». El hebreo presenta la acción de extender los cuerpos o restos delante de los astros.'
    reason: lexical_alternative
  - marker: b
    text: «Buscaron» también puede traducirse «consultaron» o «de los cuales inquirieron», destacando la consulta religiosa dirigida a los cuerpos celestes.
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «sobre la faz de la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁטָחוּם
  english_pob_choice: they will spread them out
  chosen_spanish: los extenderán
  alternatives_spanish:
  - los tenderán
  - los pondrán extendidos
  lexicon: HALOT
  rationale: שׁטח expresa la acción concreta de extender o poner algo desplegado. En español, 'los extenderán' comunica con naturalidad la imagen de los cuerpos expuestos sin volverla demasiado interpretativa.
- source_word: לַשֶּׁמֶשׁ
  english_pob_choice: before the sun
  chosen_spanish: delante del sol
  alternatives_spanish:
  - ante el sol
  - para el sol
  lexicon: HALOT
  rationale: El lamed aquí marca ubicación/exposición frente al astro. 'Delante de' reproduce bien el valor espacial y evita sugerir dirección u ofrecimiento.
- source_word: וְלַיָּרֵחַ
  english_pob_choice: and the moon
  chosen_spanish: de la luna
  alternatives_spanish:
  - y la luna
  lexicon: HALOT
  rationale: La coordinación mantiene la lista de cuerpos celestes. En español, repetir 'delante de' sólo una vez al inicio de la serie resulta más natural y fiel al sentido global.
- source_word: וּלְכֹל צְבָא הַשָּׁמַיִם
  english_pob_choice: and all the host of the heavens
  chosen_spanish: de todo el ejército de los cielos
  alternatives_spanish:
  - de toda la hueste de los cielos
  - de todo el host de los cielos
  lexicon: HALOT
  rationale: צָבָא puede ser 'ejército/hueste'. Elegí 'ejército de los cielos' porque conserva el lenguaje bíblico y el plural 'cielos' reflejando mejor הַשָּׁמַיִם que la forma tradicional singularizada.
- source_word: אֲהֵבוּם
  english_pob_choice: which they loved
  chosen_spanish: a quienes amaron
  alternatives_spanish:
  - a los cuales amaron
  - que amaron
  lexicon: HALOT
  rationale: Aunque se refiere a cuerpos celestes, el antecedente puede percibirse como personal por la cadena de verbos cultuales; 'a quienes' conserva esa fuerza relacional y el vínculo afectivo-idolátrico.
- source_word: עֲבָדוּם
  english_pob_choice: which they served
  chosen_spanish: a quienes sirvieron
  alternatives_spanish:
  - a quienes adoraron
  - a quienes rindieron culto
  lexicon: HALOT
  rationale: עבד en contexto cultual puede ser 'servir' o 'adorar'. Mantengo 'sirvieron' para no borrar la distinción que el texto hace entre servir y postrarse, como en el audit trail inglés.
- source_word: הָלְכוּ אַחֲרֵיהֶם
  english_pob_choice: after which they walked
  chosen_spanish: tras quienes anduvieron
  alternatives_spanish:
  - a quienes siguieron
  - después de quienes caminaron
  lexicon: HALOT
  rationale: El hebreo idiomático 'andar tras' expresa seguimiento en lealtad. 'Tras quienes anduvieron' conserva la metáfora y el paralelismo de la serie verbal.
- source_word: דְּרָשׁוּם
  english_pob_choice: which they sought
  chosen_spanish: a quienes buscaron
  alternatives_spanish:
  - a quienes consultaron
  - de quienes inquirieron
  lexicon: HALOT
  rationale: En contextos religiosos, דרש puede implicar buscar o consultar. 'Buscaron' es suficientemente amplio y no reduce el matiz a adivinación, aunque esa posibilidad se mantiene como alternativa.
- source_word: הִשְׁתַּחֲוּ לָהֶם
  english_pob_choice: to which they bowed down
  chosen_spanish: ante quienes se postraron
  alternatives_spanish:
  - a quienes adoraron
  - delante de quienes se inclinaron
  lexicon: HALOT
  rationale: השתחוה es postración corporal de reverencia/culto. 'Se postraron' preserva el gesto físico y evita borrar la diferencia con 'sirvieron'.
- source_word: לֹא יֵאָסְפוּ
  english_pob_choice: They will not be gathered
  chosen_spanish: No serán recogidos
  alternatives_spanish:
  - No serán juntados
  - No serán reunidos
  lexicon: HALOT
  rationale: אָסף, en contexto funerario, alude a recoger restos para sepultura. 'Recogidos' conserva esa idea sin sonar artificial en español.
- source_word: וְלֹא יִקָּבֵרוּ
  english_pob_choice: and they will not be buried
  chosen_spanish: ni sepultados
  alternatives_spanish:
  - ni enterrados
  lexicon: HALOT
  rationale: '''Sepultados'' es un equivalente digno y claro; mantiene la referencia funeraria junto a ''recogidos'' sin redundancia excesiva.'
- source_word: לְדֹמֶן
  english_pob_choice: dung
  chosen_spanish: estiércol
  alternatives_spanish:
  - dung
  - boñiga
  lexicon: HALOT
  rationale: דֹּמֶן denota excremento usado como estiércol. En español bíblico moderno, 'estiércol' comunica la humillación del cadáver con claridad y naturalidad.
- source_word: עַל פְּנֵי הָאֲדָמָה
  english_pob_choice: on the surface of the ground
  chosen_spanish: sobre la superficie de la tierra
  alternatives_spanish:
  - sobre la faz de la tierra
  - sobre la tierra
  lexicon: HALOT
  rationale: La expresión literalmente apunta a la superficie expuesta. 'Sobre la superficie de la tierra' conserva el énfasis visual y el carácter deshonroso del entierro negado.
theological_decisions:
- issue: Conservar la cadena de devoción idolátrica sin fusionar verbos
  english_pob_reading: Preserve the sequence as loved / served / walked after / sought / bowed down
  chosen_spanish_reading: Mantener la secuencia amaron / sirvieron / anduvieron tras / buscaron / se postraron
  alternative_spanish_readings:
  - condensar en 'adoraron'
  - reducir a una sola cláusula de culto
  rationale: El hebreo acumula acciones distintas para mostrar la totalidad de la entrega a los astros. En español conviene conservar esa progresión para no borrar la tensión entre afecto, servicio, seguimiento, búsqueda y postración.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Traducir צְבָא הַשָּׁמַיִם de modo que no se oculte el plural hebreo
  english_pob_reading: all the host of the heavens
  chosen_spanish_reading: todo el ejército de los cielos
  alternative_spanish_readings:
  - todo el ejército del cielo
  - toda la hueste celestial
  rationale: El hebreo usa 'cielos' en plural; mantenerlo ayuda a transparentar la forma original y el marco de culto astral sin suavizarlo en una fórmula devocional más genérica.
  doctrine_reference: Translation philosophy §§1, 6
- issue: No suavizar la humillación del final del versículo
  english_pob_reading: they will become dung on the surface of the ground
  chosen_spanish_reading: serán estiércol sobre la superficie de la tierra
  alternative_spanish_readings:
  - serán como estiércol
  - serán basura sobre la tierra
  rationale: La imagen profética es deliberadamente degradante. 'Estiércol' mantiene el golpe semántico y la vergüenza pública del juicio, sin sustituirlo por un eufemismo.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La redacción sigue de cerca el consenso alto del audit trail inglés, conservando la serie verbal completa, el valor espacial de לַ/ y el final deshonroso del versículo. Se ajustó la sintaxis para que el español suene natural sin perder la imagen de exposición pública ante los cuerpos celestes.
  spanish_consistency_notes:
  - Se usó 'Yahvé' sólo donde el texto fuente lo exigiera; este versículo no contiene el nombre divino.
  - Se mantuvo 'cielos' en plural para reflejar הַשָּׁמַיִם y conservar la forma hebrea.
  - Se prefirió 'se postraron' en vez de 'adoraron' para distinguir la postración física de la acción cultual previa de 'sirvieron'.
  - '''Estiércol'' reproduce la fuerza degradante de לְדֹמֶן sin oscurecer el sentido funerario del pasaje.'
