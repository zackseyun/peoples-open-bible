translation:
  language: es
  text: Quien comparte con un ladrón odia su propia vida; oye una maldición[a] y no la declara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oye una adjuración». El hebreo puede referirse a una fórmula juramentada que invoca maldición, probablemente en un contexto legal donde el testigo queda obligado a hablar.
    reason: lexical_alternative
lexical_decisions:
- source_word: חוֹלֵק
  english_pob_choice: shares
  chosen_spanish: comparte
  alternatives_spanish:
  - es partícipe de
  - tiene parte con
  - comparte con
  lexicon: HALOT
  rationale: El participio expresa participación o complicidad con el ladrón; «comparte» comunica la asociación de manera natural en español y puede implicar participación en el acto o beneficio ilícito sin sobrecargar el verso.
- source_word: עִם גַּנָּב
  english_pob_choice: with a thief
  chosen_spanish: con un ladrón
  alternatives_spanish:
  - con el ladrón
  - en complicidad con un ladrón
  lexicon: HALOT
  rationale: El hebreo presenta una asociación general, proverbiales, no un individuo ya identificado. «Un ladrón» conserva ese valor genérico.
- source_word: שׂוֹנֵא נַפְשׁוֹ
  english_pob_choice: hates his own life
  chosen_spanish: odia su propia vida
  alternatives_spanish:
  - se odia a sí mismo
  - odia su propia alma
  - odia su propia vida
  lexicon: HALOT
  rationale: נפש aquí se refiere a la vida o al propio ser en un sentido práctico y autoconsciente. «Vida» evita introducir una dicotomía alma/cuerpo que el hebreo no exige en este proverbio.
- source_word: אָלָה
  english_pob_choice: a curse
  chosen_spanish: una maldición
  alternatives_spanish:
  - una imprecación
  - una adjuración
  - un juramento con maldición
  lexicon: HALOT
  rationale: La palabra puede designar una fórmula de maldición y, por extensión, una adjuración juramentada. En español, «maldición» conserva mejor el peso léxico del término y deja abierta la nota explicativa.
- source_word: וְלֹא יַגִּיד
  english_pob_choice: and does not disclose it
  chosen_spanish: y no la divulga
  alternatives_spanish:
  - y no la declara
  - y no la da a conocer
  - y no la revela
  lexicon: HALOT
  rationale: El verbo hiphil de נגד significa declarar, contar o dar a conocer. «Divulga» funciona bien en español formal y mantiene la idea de no comunicar lo sabido.
theological_decisions:
- issue: Complicidad con el ladrón y autodaño moral
  english_pob_reading: one who is complicit with a thief harms himself by refusing to disclose what he knows
  chosen_spanish_reading: quien comparte con un ladrón odia su propia vida al callar lo que sabe
  alternative_spanish_readings:
  - quien es cómplice de un ladrón se perjudica a sí mismo
  - quien participa con un ladrón se odia a sí mismo
  rationale: 'No se debe suavizar la idea moral del proverbio: la complicidad y el encubrimiento dañan al propio sujeto. La formulación española mantiene la tensión ética sin moralizar más de lo que el texto dice.'
  doctrine_reference: Sabiduría proverbial; responsabilidad moral y veracidad en el testimonio
- issue: Sentido legal de אָלָה
  english_pob_reading: hears a curse / hears an adjuration
  chosen_spanish_reading: oye una maldición
  alternative_spanish_readings:
  - oye una adjuración
  - oye un juramento maldito
  - oye una fórmula de maldición
  rationale: El hebreo admite una referencia a una fórmula de maldición en contexto jurídico. «Maldición» conserva el campo semántico central y permite la nota que explica la posible adjuración.
  doctrine_reference: Ley y testimonio; integridad ante un juramento o fórmula vinculante
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparece exactamente en el texto principal junto al término correspondiente. También se mantuvo la decisión revisada del POB inglés de traducir אָלָה con un término de maldición y de preservar el matiz de no divulgar lo oído.
  spanish_consistency_notes:
  - Se usó «ladrón» en singular indefinido para conservar el estilo proverbial genérico.
  - Se prefirió «divulga» por su registro formal y por su compatibilidad con el sentido de no revelar información.
  - Se evitó «alma» para נֶפֶשׁ, porque en este contexto el énfasis es la vida o el propio ser en sentido práctico.
