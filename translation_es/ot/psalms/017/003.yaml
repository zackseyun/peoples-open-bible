translation:
  language: es
  text: Tú has examinado mi corazón; me has visitado de noche; me has probado y no encuentras nada[a]. He resuelto que mi boca no transgreda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «He resuelto; mi boca no pasará más allá», es decir, el salmista decide no sobrepasarse en el hablar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּחַנְתָּ
  english_pob_choice: have examined
  chosen_spanish: has examinado
  alternatives_spanish:
  - has probado
  - has sondeado
  lexicon: HALOT
  rationale: בחן expresa examinar o probar con discernimiento. En español, 'examinar' mantiene bien la idea de escrutinio del interior y suena natural con 'mi corazón'.
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi corazón interior
  - mi ser interior
  lexicon: HALOT
  rationale: '''Corazón'' es el equivalente bíblico habitual para el centro interior de la persona, incluyendo pensamiento e intención. No se requiere una paráfrasis más explicativa aquí.'
- source_word: פָּקַדְתָּ
  english_pob_choice: have visited
  chosen_spanish: me has visitado
  alternatives_spanish:
  - me has inspeccionado
  - me has atendido
  lexicon: HALOT
  rationale: פקד tiene un rango amplio que incluye visitar, atender e inspeccionar. 'Visitar' conserva el giro idiomático y permite que 'de noche' quede natural en español.
- source_word: לַּיְלָה
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - en la noche
  - por la noche
  lexicon: HALOT
  rationale: La función adverbial del hebreo se expresa con naturalidad en español como 'de noche'. Es breve y fiel al registro poético.
- source_word: צְרַפְתַּנִי
  english_pob_choice: have tested me
  chosen_spanish: me has probado
  alternatives_spanish:
  - me has refinado
  - me has ensayado
  lexicon: HALOT
  rationale: צָרַף alude literalmente al refinado de metales y metafóricamente a la prueba de una persona. 'Probar' conserva la fuerza evaluativa; 'refinar' preserva más la imagen, pero aquí el contexto inmediato favorece la claridad.
- source_word: בַל תִּמְצָא
  english_pob_choice: find nothing
  chosen_spanish: no hallaste nada
  alternatives_spanish:
  - no encuentras nada
  - no hallaste nada en mí
  lexicon: HALOT
  rationale: 'El hebreo es elíptico: la negación recae sobre el verbo y el objeto no está explicitado. ''No hallaste nada'' mantiene la brevedad del original sin añadir interpretaciones innecesarias.'
- source_word: זַמֹּתִי
  english_pob_choice: I have purposed
  chosen_spanish: He resuelto
  alternatives_spanish:
  - He planeado
  - He pensado
  lexicon: HALOT
  rationale: La forma se entiende verbalmente de זמם. En español, 'he resuelto' comunica bien la decisión interior y prepara la cláusula siguiente sobre la boca.
- source_word: בַּל יַעֲבָר פִּי
  english_pob_choice: that my mouth will not transgress
  chosen_spanish: que mi boca no se extravíe
  alternatives_spanish:
  - que mi boca no transgreda
  - que mi boca no pase más allá
  lexicon: HALOT
  rationale: עבר literalmente es 'pasar más allá'. En relación con la boca, la idea es no sobrepasar los límites en el hablar. 'No se extravíe' comunica el sentido ético en un español claro; la opción más literal queda preservada como alternativa.
theological_decisions:
- issue: Lectura del cierre del versículo
  english_pob_reading: 'The psalmist''s resolve is about speech: ''I have purposed that my mouth will not transgress.'''
  chosen_spanish_reading: 'El salmista expresa su resolución respecto de su habla: ''He resuelto que mi boca no se extravíe.'''
  alternative_spanish_readings:
  - Mi boca no transgrede.
  - He resuelto que mi boca no pase más allá.
  rationale: El hebreo es comprimido y permite varias reconstrucciones. La elección principal sigue la lectura verbal de זַמֹּתִי y entiende בַּל יַעֲבָר פִּי como el contenido de esa resolución. 'No se extravíe' recoge la fuerza moral de 'no transgreda' sin perder naturalidad en español.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'Coincide con el último pase del contexto inglés: no se reportan cambios recientes y la decisión principal del cierre del versículo permanece estable. La redacción española sigue el mismo entendimiento sintáctico y semántico del audit trail.'
  spanish_consistency_notes:
  - Se mantiene 'Dios/Yahvé' no requerido aquí; no aparece lenguaje divino explícito en el versículo.
  - Se prefirió 'probar' para צָרַף en el cuerpo y se dejó la alternativa 'refinar' en la decisión léxica por su valor imagético.
  - La nota al pie conserva la alternativa más literal del cierre, equivalente funcional a la observación inglesa sobre 'pass beyond'.
  - '''Corazón'' se usa como antropología bíblica estándar, en paralelo con el inglés auditado.'
