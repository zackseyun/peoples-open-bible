base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/018/003.yaml
  text: 'And this shall be the priests’ due from the people[a], from those who sacrifice a sacrifice, whether an ox or a sheep: he shall give to the priest the shoulder, the two cheeks[d][c][b], and the stomach.'
  footnotes:
  - marker: a
    text: 'Or ''from those who offer a sacrifice.'' The Hebrew repeats the sacrificial root for emphasis: literally, ''from sacrificers of the sacrifice.'''
    reason: lexical_alternative
  - marker: b
    text: '''Shoulder'' translates a word literally meaning ''arm''; in this context it refers to the animal’s foreleg or shoulder portion.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the cheeks' or 'the jawbones.' The Hebrew form is dual.
    reason: lexical_alternative
  - marker: d
    text: Traditionally 'the maw.'
    reason: lexical_alternative
