  text: μέλλει γὰρ ὁ υἱὸς τοῦ ἀνθρώπου ἔρχεσθαι ἐν τῇ δόξῃ τοῦ πατρὸς αὐτοῦ μετὰ τῶν ἀγγέλων αὐτοῦ, καὶ τότε ἀποδώσει ἑκάστῳ κατὰ τὴν πρᾶξιν αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/016/027.yaml
  text: 'For the Son of Man is about to come in the glory of his Father with his angels[b][a], and then he will repay each one according to his deed.'
translation:
  language: ko
  text: '「인자가 자기 아버지의 영광 안에서 자기 천사들과 함께 오려 한다. 그때에 그가 각 사람에게 그의 행한 대로 갚을 것이다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「올 것이다」. 헬라어는 「오려 한다(임박)」로 임박성의 어감을 보존한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「그가 행한 대로」. 헬라어는 단수 「행위」를 사용하여 각 사람의 행위를 분배적으로 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: μέλλει ... ἔρχεσθαι
  english_pob_choice: is about to come
  chosen_korean: 오려 한다
  alternatives_korean:
  - 올 것이다
  - 곧 오시리라
  lexicon: BDAG
  rationale: μέλλω + 부정사는 임박한 미래. 「오려 한다」가 그 임박성을 살린다.
- source_word: ἀποδώσει ἑκάστῳ κατὰ τὴν πρᾶξιν αὐτοῦ
  english_pob_choice: will repay each one according to his deed
  chosen_korean: 각 사람에게 그의 행한 대로 갚을 것이다
  lexicon: BDAG
  rationale: ἀποδίδωμι의 「갚다·보응하다」. 「행한 대로 갚다」가 자연스럽다.
