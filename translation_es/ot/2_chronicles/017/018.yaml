translation:
  language: es
  text: Y a su lado estaba Jehosabad[a], y con él estaban 180.000 hombres armados para la guerra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a su mano/lado». Este giro también puede sugerir subordinación o ubicación administrativa junto a él.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «180.000 tropas equipadas para la guerra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַל יָד֖/וֹ
  english_pob_choice: And at his side
  chosen_spanish: Y a su lado
  alternatives_spanish:
  - Y junto a él
  - Y bajo su mando
  lexicon: HALOT
  rationale: El hebreo idiomático עַל יָד con sufijo puede significar literalmente 'en su mano/lado' y, según el contexto, indicar proximidad o asociación administrativa. 'A su lado' preserva esa cercanía relacional sin imponer de antemano una lectura estrictamente jerárquica.
- source_word: יְהוֹזָבָד
  english_pob_choice: Jehozabad
  chosen_spanish: Jehozabad
  alternatives_spanish:
  - Jehosabad
  lexicon: Convención onomástica
  rationale: Se translitera el nombre propio con una forma clara y reconocible en español, manteniendo la correspondencia directa con el original.
- source_word: וְעִמּוֹ
  english_pob_choice: and with him were
  chosen_spanish: y con él
  alternatives_spanish:
  - y con él estaban
  - acompañado de él
  lexicon: HALOT
  rationale: La preposición עִם con sufijo expresa compañía/acompañamiento. En español, el verbo copulativo puede omitirse naturalmente sin perder el sentido del hebreo.
- source_word: מֵאָה וּשְׁמוֹנִים אֶלֶף
  english_pob_choice: 180,000
  chosen_spanish: '180.000'
  alternatives_spanish:
  - ciento ochenta mil
  lexicon: HALOT
  rationale: El numeral se expresa con cifras para claridad y fluidez en un contexto militar cuantitativo, siguiendo el valor exacto del hebreo.
- source_word: חֲלוּצֵי צָבָא
  english_pob_choice: armed for war
  chosen_spanish: hombres armados para la guerra
  alternatives_spanish:
  - tropas equipadas para la guerra
  - guerreros armados para la guerra
  lexicon: HALOT
  rationale: חֲלוּצִים denota gente equipada o preparada para servicio militar, y צָבָא añade el ámbito de guerra/ejército. 'Armados para la guerra' conserva la fuerza militar del original sin suavizarla a un sentido genérico de 'soldados'.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que prefirió una expresión que refleje con más precisión חֲלוּצֵי צָבָא como 'armed for war', manteniendo a la vez naturalidad. En español se conservó esa precisión con 'armados para la guerra'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general cuando el texto exija el nombre divino; este versículo no lo contiene.
  - Se prefirió una construcción breve y narrativa en español para reproducir la relación sintáctica del hebreo sin sobreactuar la explicación.
  - '''A su lado'' mantiene abierta la ambigüedad entre proximidad física y relación de servicio/dirección, como en la nota auditada del inglés.'
