translation:
  language: es
  text: 'Las casas de Jerusalén y las casas de los reyes de Judá llegarán a ser como el lugar inmundo[a] de Tófet: todas las casas en cuyas azoteas quemaron incienso a todo el ejército de los cielos y derramaron libaciones a otros dioses[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lugar profanado de Tófet».'
    reason: lexical_alternative
  - marker: b
    text: «Ejército de los cielos» se refiere a los astros concebidos como objeto de adoración en la idolatría astral.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיוּ
  english_pob_choice: will become
  chosen_spanish: serán como
  alternatives_spanish:
  - llegarán a ser como
  - se convertirán en
  lexicon: HALOT
  rationale: El hebreo con כְּ/כִּמְקוֹם introduce comparación y resultado; en español, ‘serán como’ comunica ese estado resultante sin forzar un verbo de cambio que suene más explícito de lo que el texto exige.
- source_word: בָּתֵּי יְרוּשָׁלִַם
  english_pob_choice: the houses of Jerusalem
  chosen_spanish: las casas de Jerusalén
  alternatives_spanish:
  - las viviendas de Jerusalén
  lexicon: HALOT
  rationale: Se conserva la estructura nominal simple del hebreo. ‘Casas’ mantiene el paralelismo con la siguiente cola y evita expandir el sentido a ‘edificios’ o ‘palacios’ sin necesidad.
- source_word: וּבָתֵּי מַלְכֵי יְהוּדָה
  english_pob_choice: and the houses of the kings of Judah
  chosen_spanish: y las casas de los reyes de Judá
  alternatives_spanish:
  - y los palacios de los reyes de Judá
  - y las casas reales de Judá
  lexicon: HALOT
  rationale: El texto hebreo usa ‘casas’; se conserva esa forma en vez de interpretarla como ‘palacios’. ‘Reyes de Judá’ mantiene el paralelo del constructo y la referencia dinástica.
- source_word: כִּמְקוֹם הַתֹּפֶת
  english_pob_choice: like the ... place of Topheth
  chosen_spanish: como el lugar de Tófet
  alternatives_spanish:
  - como Tófet
  - como el sitio de Tófet
  lexicon: HALOT
  rationale: Se mantiene מָקוֹם explícito como ‘lugar’. ‘Tófet’ translitera el topónimo y preserva la referencia al sitio condenado sin reemplazarlo por una glosa interpretativa.
- source_word: הַטְּמֵאִים
  english_pob_choice: unclean
  chosen_spanish: inmundo
  alternatives_spanish:
  - impuro
  - contaminado
  lexicon: HALOT
  rationale: ‘Inmundo’ refleja bien el campo bíblico de impureza ritual y moral. Aunque ‘impuro’ es posible, ‘inmundo’ conserva el registro tradicional sin volverse arcaizante en exceso.
- source_word: קִטְּרוּ
  english_pob_choice: they burned incense
  chosen_spanish: quemaron incienso
  alternatives_spanish:
  - ofrecieron incienso
  - echaron incienso
  lexicon: HALOT
  rationale: En contexto cúltico, ‘quemar incienso’ es la equivalencia española natural y precisa para el piel de קטר. Se evita una paráfrasis más amplia como ‘ofrecieron’.
- source_word: עַל גַּגֹּתֵיהֶם
  english_pob_choice: on whose rooftops
  chosen_spanish: en cuyos tejados
  alternatives_spanish:
  - sobre sus tejados
  - en sus azoteas
  lexicon: HALOT
  rationale: ‘Tejados’ reproduce bien la imagen de culto en altura y suena natural en español general. El relativo ‘en cuyos’ conserva la relación sintáctica del hebreo.
- source_word: לְכֹל צְבָא הַשָּׁמַיִם
  english_pob_choice: to all the host of heaven
  chosen_spanish: a todo el ejército de los cielos
  alternatives_spanish:
  - al ejército entero de los cielos
  - a toda la hueste de los cielos
  lexicon: HALOT
  rationale: ‘Ejército de los cielos’ traduce el idioma bíblico de צְבָא הַשָּׁמַיִם con un término transparente para lectores hispanos. ‘Todo’ conserva el valor distributivo de כֹל.
- source_word: וְהַסֵּךְ נְסָכִים
  english_pob_choice: and poured out drink offerings
  chosen_spanish: y derramaron libaciones
  alternatives_spanish:
  - y derramaron ofrendas de libación
  - y vertieron libaciones
  lexicon: HALOT
  rationale: ‘Libaciones’ es el equivalente cultual adecuado para נְסָכִים. ‘Derramaron’ reproduce la imagen verbal del acto sacrificial y coordina con ‘quemaron incienso’.
- source_word: לֵאלֹהִים אֲחֵרִים
  english_pob_choice: to other gods
  chosen_spanish: a otros dioses
  alternatives_spanish:
  - para otros dioses
  lexicon: HALOT
  rationale: La forma breve y directa ‘a otros dioses’ conserva la acusación profética sin añadir matices explicativos que el hebreo no demanda.
theological_decisions:
- issue: Topheth as a place of impurity/judgment
  english_pob_reading: unclean place of Topheth
  chosen_spanish_reading: el lugar inmundo de Tófet
  alternative_spanish_readings:
  - el lugar impuro de Tófet
  - el lugar contaminado de Tófet
  rationale: ‘Inmundo’ preserva la categoría bíblica de impureza y encaja con el juicio sobre Jerusalén y Judá. Mantiene la tensión entre contaminación ritual y juicio profético sin reducirla a suciedad física.
  doctrine_reference: Impureza ritual y profética en el AT; cf. categorías léxicas de טמא en Levítico y Jeremías.
- issue: Reference to houses of the kings of Judah
  english_pob_reading: literal 'houses' retained
  chosen_spanish_reading: casas de los reyes de Judá
  alternative_spanish_readings:
  - palacios de los reyes de Judá
  - residencias reales de Judá
  rationale: Se conserva el sustantivo ‘casas’ porque el hebreo usa el término común y el texto no explicita ‘palacios’. Esto evita sobreinterpretar la referencia y mantiene el paralelismo con ‘casas de Jerusalén’.
  doctrine_reference: Principio de mínimo suplemento interpretativo en traducción bíblica.
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés coinciden en los puntos principales: comparación resultante (‘will become’), mantenimiento de ‘houses’ en ambos paralelismos, y el valor cultual de ‘burned incense’ / ‘poured out drink offerings’. La versión española sigue esa lectura y conserva la ambigüedad relevante de טמא mediante ‘inmundo’, sin reemplazarla por una glosa interpretativa. No se incorporaron revisiones adicionales porque el pasaje no muestra cambios aplicados en el registro auditado.'
  spanish_consistency_notes:
  - Se normalizó ‘Tófet’ como transliteración española coherente con usos bíblicos en español.
  - Se prefirió ‘ejército de los cielos’ frente a ‘hueste celestial’ para conservar transparencia léxica y paralelismo con el hebreo.
  - Se mantuvo el plural ‘casas’ en ambos miembros del verso para reproducir la simetría del original.
  - El marcador [a] se colocó junto a ‘inmundo’ porque esa es la principal alternativa lexical documentada; [b] acompaña la expresión ‘ejército de los cielos’ por su posible malentendido cultural.
