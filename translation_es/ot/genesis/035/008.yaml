translation:
  language: es
  text: Y murió Débora, la nodriza de Rebeca, y fue sepultada debajo de Betel, bajo la encina[a]. Y llamó a aquel lugar Allón-bacut[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término hebreo אַלּוֹן puede referirse a una encina o a una terebinta; no se puede determinar con certeza la especie exacta.
    reason: lexical_alternative
  - marker: b
    text: Allón-bacut probablemente significa «encina de llanto»; si אַלּוֹן se entiende como «terebinta», entonces «terebinta de llanto».
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵינֶקֶת
  english_pob_choice: nurse
  chosen_spanish: nodriza
  alternatives_spanish:
  - enfermera
  - niñera
  lexicon: HALOT
  rationale: מֵינֶקֶת designa a una mujer que cría y amamanta a un niño. En español, 'nodriza' conserva ese sentido de cuidado materno-lácteo con dignidad y sin introducir la profesionalización moderna de 'enfermera'. 'Nodriza' también evita la ambigüedad de 'niñera', que no sugiere lactancia.
- source_word: מִתַּחַת לְבֵית־אֵל
  english_pob_choice: below Bethel
  chosen_spanish: debajo de Betel
  alternatives_spanish:
  - bajo Betel
  - al sur de Betel
  lexicon: HALOT
  rationale: La expresión señala una ubicación más baja o por debajo de Betel. 'Debajo de Betel' reproduce el valor espacial sin forzar una orientación geográfica que el hebreo no especifica.
- source_word: תַּחַת הָאַלּוֹן
  english_pob_choice: under the oak
  chosen_spanish: bajo la encina
  alternatives_spanish:
  - bajo el roble
  - bajo la terebinta
  lexicon: HALOT
  rationale: אַלּוֹן puede referirse a un gran árbol, usualmente 'oak' o a veces 'terebinth'. En español, 'encina' permite una referencia natural a un árbol robusto sin comprometer con demasiada certeza una especie exacta; la alternativa 'terebinta' resulta menos transparente para lectores generales. Se conserva la tensión lexical en la nota.
- source_word: וַיִּקְרָא שְׁמֹו
  english_pob_choice: So he called its name
  chosen_spanish: Y él llamó su nombre
  alternatives_spanish:
  - Y llamó su nombre
  - Y fue llamado su nombre
  lexicon: HALOT
  rationale: El hebreo usa un verbo activo en 3ms con sujeto implícito. 'Y él llamó su nombre' conserva esa agencia y sigue de cerca la revisión inglesa más reciente, evitando una pasiva que debilitaría la forma verbal del texto.
- source_word: אַלּוֹן בָּכוּת
  english_pob_choice: Allon-bacuth
  chosen_spanish: Allón-bacut
  alternatives_spanish:
  - Allón-Bacut
  - Alón-bacut
  lexicon: HALOT
  rationale: Los nombres propios se transliteran. Se adapta al patrón gráfico español con acento prosódico en la primera parte ('Allón') y se conserva el segundo elemento transliterado de forma sobria ('bacut'). El significado transparente se reserva para la nota.
- source_word: וַתָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - pasó a mejor vida
  lexicon: HALOT
  rationale: וַתָּמָת significa simplemente 'murió'. 'Murió' es directo y fiel; evita suavizaciones no justificadas por el hebreo.
- source_word: וַתִּקָּבֵר
  english_pob_choice: she was buried
  chosen_spanish: fue sepultada
  alternatives_spanish:
  - fue enterrada
  - la sepultaron
  lexicon: HALOT
  rationale: 'El verbo nifal expresa pasividad: ''fue sepultada'' reproduce bien la voz pasiva y mantiene un registro más digno y bíblico sin caer en formulación eclesiástica arcaizante.'
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste del POB inglés: se mantiene la voz activa en «Y él llamó su nombre», en lugar de una pasiva como «fue llamado su nombre». También se conserva el nombre propio transliterado y la nota de alternativa botánica para אַלּוֹן, de acuerdo con el historial auditado.'
  spanish_consistency_notes:
  - Se usa 'Betel' como forma estable del topónimo.
  - Se usa 'Yahvé' solo cuando el texto fuente lo exija; aquí no aparece.
  - Se evita 'SEÑOR' y 'Cristo' porque no corresponden al versículo.
  - Se mantiene el pasado narrativo simple español para reflejar la secuencia hebrea con naturalidad.
