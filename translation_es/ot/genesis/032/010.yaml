base_translation:
  language: en
  yaml_path: translation/ot/genesis/032/010.yaml
  text: And Jacob said[a], “O God of my father Abraham and God of my father Isaac, O Yahweh, who said to me, ‘Return to your land and to your kindred[b], and I will do you good,’”
  footnotes:
