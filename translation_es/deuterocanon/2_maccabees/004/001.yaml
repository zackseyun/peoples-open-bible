translation:
  language: es
  text: Pero el ya mencionado Simón[a], que se había convertido en delator de los fondos y de la patria, seguía difamando a Onías, como si este hubiera incitado a Heliodoro y hubiera llegado a ser el autor de estos males[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el antes mencionado’. El griego mira hacia atrás a Simón ya presentado en el contexto.
    reason: lexical_alternative
  - marker: b
    text: O ‘la causa de estos males’. La expresión griega puede referirse en sentido amplio a hechos dañinos o desgracias, no solo al mal moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: προειρημένος
  english_pob_choice: previously mentioned
  chosen_spanish: el ya mencionado
  alternatives_spanish:
  - el antes mencionado
  - el mencionado anteriormente
  lexicon: LSJ
  rationale: Mantiene la referencia retrospectiva sin volver el español forzado o arcaizante. 'Ya mencionado' comunica con naturalidad el enlace con el contexto previo.
- source_word: Σίμων
  english_pob_choice: Simon
  chosen_spanish: Simón
  alternatives_spanish:
  - Simon
  lexicon: nombre propio
  rationale: Nombre propio bíblico usual en español, con adaptación ortográfica estándar.
- source_word: ἐνδείκτης
  english_pob_choice: informer against
  chosen_spanish: delator contra
  alternatives_spanish:
  - informante contra
  - denunciante de
  lexicon: LSJ
  rationale: La palabra expresa a quien acusa o denuncia hostilmente. 'Delator contra' conserva el matiz adversativo del genitivo y su tono de acusación.
- source_word: τῶν χρημάτων
  english_pob_choice: the funds
  chosen_spanish: los fondos
  alternatives_spanish:
  - el dinero
  - los recursos
  lexicon: LSJ
  rationale: '''Fondos'' es más natural en español para un contexto de bienes destinados a uso público o sagrado, y evita restringir innecesariamente el referente.'
- source_word: τῆς πατρίδος
  english_pob_choice: the homeland
  chosen_spanish: la patria
  alternatives_spanish:
  - la tierra natal
  - el país
  lexicon: LSJ
  rationale: '''Patria'' conserva bien el valor de pertenencia nacional/cívica de πατρίς y es idiomática en español bíblico sin sonar anticuada en exceso.'
- source_word: ἐκακολόγει
  english_pob_choice: kept slandering
  chosen_spanish: seguía difamando
  alternatives_spanish:
  - seguía hablando mal de
  - continuaba calumniando
  lexicon: LSJ
  rationale: El imperfecto pide una acción continuada. 'Difamando' expresa el carácter injurioso de la acción; 'seguía' reproduce la duratividad.
- source_word: ἐπισεσυκὼς
  english_pob_choice: had incited
  chosen_spanish: hubiera incitado
  alternatives_spanish:
  - hubiera provocado
  - hubiera azuzado
  lexicon: LSJ
  rationale: En la acusación atribuida a Simón, 'incitar' corresponde bien al sentido de haber movido a Heliodoro a actuar. Se conserva el valor de acción previa en el pluscuamperfecto subjuntivo.
- source_word: τῶν κακῶν δημιουργός
  english_pob_choice: the author of these evils
  chosen_spanish: autor de estos males
  alternatives_spanish:
  - causante de estos males
  - autor de estas desgracias
  - causa de estos males
  lexicon: LSJ
  rationale: '''Males'' traduce bien τῶν κακῶν sin limitarlo a mal moral; puede abarcar daños, desgracias o aflicciones. ''Autor'' preserva la imputación de responsabilidad activa.'
- source_word: καθεστηκώς
  english_pob_choice: had become
  chosen_spanish: se hubiera hecho
  alternatives_spanish:
  - hubiera llegado a ser
  - se hubiera constituido como
  lexicon: LSJ
  rationale: Con δημιουργός, el participio indica que se le atribuye haber llegado a ese estado o rol. 'Se hubiera hecho' suena natural y mantiene la relación con la acusación.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de Swete, con apoyo del audit trail inglés para los valores de ἐνδείκτης, ἐκακολόγει, ἐπισεσυκώς y τῶν κακῶν. Se evitó traducir mecánicamente desde el inglés: se ajustó la sintaxis al español, se mantuvo el matiz acusatorio de ''delator'', y se eligió ''males'' para no reducir κακά a mal moral únicamente.'
  spanish_consistency_notes:
  - Se conserva 'patria' para πατρίς por coherencia con el tono cívico-político del pasaje.
  - '''Fondos'' mantiene la referencia amplia a recursos/bienes sin especificar más de lo que el verso dice.'
  - No se usa 'Cristo' ni terminología teológica fija; el verso es narrativo y acusatorio, no doctrinal.
