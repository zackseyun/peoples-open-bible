    rationale: La nota principal del inglés está sobre la frase difícil «bringing guilt from Yahweh upon us», pero en español [a] está anclada a «los cautivos». Esto desaline­a el foco exegético principal.
  - severity: medium
    issue: La nota sobre «ya es grande» no corresponde al pie de página preservado en el POB inglés.
    rationale: El rastro inglés conserva una nota sobre «burning of anger», no sobre «already great». La explicación de «ya» puede mantenerse en la decisión léxica, pero no necesita nota si no hay nueva ambigüedad en español.
  - severity: low
