  text: ἡ γὰρ ὕπανδρος γυνὴ τῷ ζῶντι ἀνδρὶ δέδεται νόμῳ· ἐὰν δὲ ἀποθάνῃ ὁ ἀνήρ, κατήργηται ἀπὸ τοῦ νόμου τοῦ ἀνδρός.
base_translation:
  language: en
  yaml_path: translation/nt/romans/007/002.yaml
  text: For a married woman is bound by law to her husband while he lives; but if the husband dies[a], she is released from the law of her husband.
  footnotes:
  - marker: a
    text: Or, "she is freed from her husband's law"; the Greek likely means the legal bond that tied her to her husband.
    reason: lexical_alternative
