translation:
  language: es
  text: 'Y Jesús, al verlo, dijo: «¡Qué difícil es para los que tienen riqueza[a] entrar en el reino de Dios!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que tienen dinero». χρήματα puede significar dinero o riqueza/posesiones; aquí se ha optado por ''riqueza'' por el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδὼν
  english_pob_choice: seeing
  chosen_spanish: al verlo
  alternatives_spanish:
  - cuando lo vio
  - viéndolo
  lexicon: BDAG
  rationale: El participio aoristo se vierte de modo temporal y natural en español con 'al verlo', manteniendo la relación inmediata con la acción principal sin recargar la sintaxis.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: δέ funciona aquí como un conector narrativo leve; 'Y' conserva la transición sin introducir contraste que el griego no exige.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre acusativo se integra con naturalidad en español como objeto directo 'lo', referido al hombre rico en el contexto.
- source_word: Πῶς δυσκόλως
  english_pob_choice: How difficult it is
  chosen_spanish: ¡Qué difícil es
  alternatives_spanish:
  - ¡Cuán difícil es
  - ¡Qué duro es
  lexicon: BDAG
  rationale: La combinación exclamativa expresa intensidad; '¡Qué difícil es' comunica bien el valor de δυσκόλως en español moderno y digno.
- source_word: οἱ τὰ χρήματα ἔχοντες
  english_pob_choice: those who have wealth
  chosen_spanish: los que tienen riqueza
  alternatives_spanish:
  - los que tienen dinero
  - los que poseen riquezas
  - los ricos
  lexicon: BDAG
  rationale: Se conserva la construcción participial con 'los que tienen...', y 'riqueza' refleja χρήματα como riqueza/posesiones sin reducirlo solo a dinero. Se evita 'los ricos' para no borrar la forma descriptiva del griego.
- source_word: εἰς τὴν βασιλείαν τοῦ θεοῦ
  english_pob_choice: into the kingdom of God
  chosen_spanish: entrar en el reino de Dios
  alternatives_spanish:
  - entrar en el reino de Dios
  - entrar al reino de Dios
  lexicon: BDAG
  rationale: '''Reino de Dios'' preserva la expresión bíblica transparente. En español, con ''entrar'' es natural ''entrar en'' y mantiene el sentido direccional de εἰς.'
- source_word: εἰσπορεύονται
  english_pob_choice: to enter
  chosen_spanish: entrar
  alternatives_spanish:
  - ir dentro
  - ingresar
  lexicon: BDAG
  rationale: El verbo de entrada se vierte con el infinitivo 'entrar', que en español encaja con la construcción exclamativa sobre la dificultad de la acción.
theological_decisions:
- issue: Fuerza de la declaración de Jesús sobre los que tienen riqueza
  english_pob_reading: A general statement about the difficulty wealthy people face in entering God's kingdom
  chosen_spanish_reading: Una afirmación general sobre la dificultad que enfrentan quienes tienen riqueza para entrar en el reino de Dios
  alternative_spanish_readings:
  - Una afirmación sobre la imposibilidad de que los ricos entren en el reino de Dios
  rationale: El griego dice 'qué difícil', no 'imposible'; la traducción conserva la tensión sin resolverla ni intensificarla más allá del texto.
  doctrine_reference: Preservar la tensión teológica del pasaje sin armonizarla prematuramente con el contexto siguiente.
translation_notes:
  revision_awareness: La versión española sigue de cerca la revisión final del POB en inglés, que hizo más directa la relación participial ('Jesus, seeing him'). Se refleja esa misma estructura con 'Y Jesús, al verlo, dijo', manteniendo la exclamación de dificultad y la restricción semántica de 'wealth' frente a 'money'.
  spanish_consistency_notes:
  - Se usa 'reino de Dios' de forma consistente con la terminología POB.
  - Se evita 'Cristo' porque el texto nombra a Jesús directamente.
  - Se mantiene 'riqueza' en el texto principal para reflejar χρήματα como riqueza/posesiones, dejando 'dinero' como alternativa en nota.
  - La puntuación y comillas siguen el uso español contemporáneo.
