translation:
  language: es
  text: Y todo el ejército de los caldeos, que estaban con el capitán de la guardia[a], derribaron las murallas de Jerusalén por todos lados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jefe de los verdugos» o «capitán de la guardia personal» para el título hebreo rab-tabbaḥim.
    reason: lexical_alternative
lexical_decisions:
- source_word: חוֹמֹת
  english_pob_choice: walls
  chosen_spanish: murallas
  alternatives_spanish:
  - muros
  - paredes
  lexicon: HALOT
  rationale: En este contexto militar, חוֹמֹת se refiere a las defensas urbanas de Jerusalén. 'Murallas' comunica mejor la idea de fortificación que el más general 'muros' y evita la sensación doméstica de 'paredes'.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: HALOT
  rationale: Se usa la forma española normal del topónimo.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: por todos lados
  alternatives_spanish:
  - alrededor
  - en derredor
  lexicon: HALOT
  rationale: La expresión indica extensión circundante completa. 'Por todos lados' transmite con naturalidad que las murallas fueron derribadas en toda la circunferencia de la ciudad.
- source_word: נָתְצוּ
  english_pob_choice: tore down
  chosen_spanish: derribó
  alternatives_spanish:
  - derribaron
  - demolieron
  - tiraron abajo
  lexicon: HALOT
  rationale: El verbo expresa destrucción de estructuras. En español, 'derribar' conserva el valor físico y contundente del acto; aquí se prefiere la forma singular colectiva en el flujo de la oración española, aunque el referente sea plural, por concordancia estilística con el sujeto colectivo.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todo el
  alternatives_spanish:
  - todo
  - la totalidad del
  lexicon: HALOT
  rationale: כָּל cuantifica el colectivo militar. 'Todo el' es la forma natural en español antes de un sustantivo colectivo como 'ejército'.
- source_word: חֵיל
  english_pob_choice: army
  chosen_spanish: ejército
  alternatives_spanish:
  - fuerza
  - tropas
  lexicon: HALOT
  rationale: En este contexto bélico, חֵיל denota una fuerza armada. 'Ejército' es el equivalente idiomático más claro en español.
- source_word: כַּשְׂדִּים
  english_pob_choice: Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - caldeos
  - los babilonios
  lexicon: HALOT
  rationale: Se conserva el etnónimo del hebreo. 'Caldeos' reproduce directamente la designación del texto fuente; 'babilonios' sería contextual pero menos exacto lexicalmente.
- source_word: אֲשֶׁר
  english_pob_choice: who were with
  chosen_spanish: que estaba con
  alternatives_spanish:
  - que estaban con
  - que iba con
  lexicon: HALOT
  rationale: La partícula relativa introduce la relación implícita entre el ejército caldeo y el título siguiente. En español, 'que estaba con' fluye de manera natural y conserva la dependencia sintáctica sin añadir precisión no garantizada por el hebreo.
- source_word: רַב טַבָּחִים
  english_pob_choice: captain of the guard
  chosen_spanish: capitán de la guardia
  alternatives_spanish:
  - jefe de los verdugos
  - capitán de la escolta
  lexicon: HALOT
  rationale: Se adopta la equivalencia contextual ya documentada por el audit trail inglés. En español, 'capitán de la guardia' es la opción más idiomática y preserva la función oficial del título; las alternativas más literales se mantienen como posibles lecturas semánticas.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés: mantiene el etnónimo ''caldeos'', el título oficial ''capitán de la guardia'' y el sentido espacial completo de סָבִיב. No se registran revisiones posteriores que alteren la lectura base.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque no hay aquí un tetragrámaton ni un reemplazo divino.
  - '''Murallas'' se prefiere a ''muros'' por el contexto de fortificación urbana.'
  - La concordancia verbal se ajusta al español idiomático con sujeto colectivo, sin cambiar el referente plural del hebreo.
