review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido básico del hebreo y del English POB: mantiene la condición inicial, el nombre divino «Yahvé», la fórmula «poner allí su nombre», el permiso de matar para comer localmente, y la expresión literal «dentro de tus puertas». Sin embargo, hay un desajuste importante en el anclaje de notas: la nota [b] en español está colocada tras «como te he mandado», pero su contenido explica «según todo el deseo de tu alma», siguiendo el audit trail inglés. Además, «y comerás» suaviza menos bien la fuerza permisiva de וְאָכַלְתָּ que «y podrás comer».'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero «vacada» suena menos natural y menos ampliamente eclesial en español general latinoamericano que «ganado» o «manada de ganado». «Degollar» es defendible léxicamente, aunque algo áspero; en este contexto legal «matar» sería más natural, pero no es necesario corregirlo si se quiere conservar precisión. La reparación necesaria es pequeña: mover la nota [b] al sintagma correcto y mejorar la fuerza permisiva de «comerás» a «podrás comer».'
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; se preserva la antropología de «alma»; «puertas» conserva la literalidad deseada. No hay conflicto teológico relevante. La única inconsistencia material con el audit trail es que la nota lexical_alternative b fue asociada al segmento equivocado en el texto español.'
  issues:
  - severity: high
    issue: La nota [b] está anclada al lugar equivocado.
    rationale: El contenido de la nota [b] («según todo lo que anhela tu alma» / «según todo tu apetito») corresponde a בְּכֹל אַוַּת נַפְשֶׁךָ, no a «como te he mandado». Debe aparecer junto a la frase final pertinente.
  - severity: medium
    issue: «Y comerás» no refleja tan bien la fuerza permisiva del contexto legal.
    rationale: El English POB justificó «you may eat» para comunicar permiso. En español, «y podrás comer» preserva mejor esa concesión que un futuro simple.
  - severity: low
    issue: «Vacada» es menos natural en español general contemporáneo.
    rationale: Aunque no es incorrecto, «ganado» sería más ampliamente comprensible en un español eclesial panhispánico. No obstante, esto no impide una reparación mínima.
