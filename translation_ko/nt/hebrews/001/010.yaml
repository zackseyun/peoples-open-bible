source:
  edition: SBLGNT
  text: καί· Σὺ κατ’ ἀρχάς, κύριε, τὴν γῆν ἐθεμελίωσας, καὶ ἔργα τῶν χειρῶν σού εἰσιν οἱ οὐρανοί·
base_translation:
  language: en
  yaml_path: translation/nt/hebrews/001/010.yaml
  text: And, “You, Lord, in the beginning laid the foundation of the earth, and the heavens are the works of your hands.”
translation:
  language: ko
  text: 또 「야훼여[a], 당신이 태초에 땅의 기초를 놓으셨고, 하늘은 당신의 손으로 지으신 작품입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 시편 102:25-27(LXX 101:26-28)의 인용. 70인역의 κύριε는 히브리어 본문의 「יהוה(야훼)」를 옮긴 것이므로, 한국어 번역에서도 「야훼」로 복원한다. 본문은 이 시편을 아들에게 적용한다.
    reason: ot_citation
theological_decisions:
- issue: 70인역의 κύριε = יהוה를 「야훼」로 복원
  chosen_reading: 야훼
  alternative_readings:
  - 주
  - 여호와
  rationale: 본문은 시편 102편의 야훼 호칭을 그대로 아들에게 적용한다. 「주」로 옮기면 인용된 야훼 호명이 가려져 본문의 신학적 주장(아들 = 창조주 야훼)이 약화된다. 한국 학계 표기 「야훼」를 채택한다.
  doctrine_reference: 'DOCTRINE.md: divine names; KOREAN_PIPELINE.md glossary κύριος (= YHWH)'
