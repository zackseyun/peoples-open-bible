translation:
  language: es
  text: 'Así dice Yahvé: Ve y compra un frasco[a] de barro de alfarero, y toma algunos de los ancianos del pueblo y algunos de los ancianos de los sacerdotes[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una jarra de barro de alfarero» o «una botella de alfarero». El hebreo בַקְבֻּק designa un recipiente formado, probablemente de cuello estrecho.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «de entre los ancianos del pueblo y de entre los ancianos de los sacerdotes», lo cual indica que Jeremías debe tomar representantes de ambos grupos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Así dice el Señor
  lexicon: HALOT
  rationale: La fórmula profética pide un registro solemne y natural en español. 'Así dice' conserva el valor introductorio de כֹּה אָמַר y el presente profético de la traducción inglesa. 'Yahvé' sigue el criterio doctrinal del proyecto para יְהוָה.
- source_word: הָלוֹךְ וְקָנִיתָ
  english_pob_choice: Go and buy
  chosen_spanish: Ve y compra
  alternatives_spanish:
  - Anda y compra
  - Ve y adquiere
  lexicon: HALOT
  rationale: El infinitivo absoluto con el verbo siguiente funciona como mandato enfático; 'Ve y compra' reproduce esa secuencia de forma idiomática y directa en español.
- source_word: בַקְבֻּק
  english_pob_choice: flask
  chosen_spanish: vasija
  alternatives_spanish:
  - jarra
  - frasco
  - botella
  lexicon: HALOT
  rationale: El término hebreo designa un recipiente formado, probablemente de cuello estrecho. 'Vasija' es más amplio que 'frasco' o 'botella' y evita fijar una forma demasiado específica en el texto principal; la nota preserva la alternativa lexical.
- source_word: יוֹצֵר חָרֶשׂ
  english_pob_choice: potter’s earthenware
  chosen_spanish: de barro del alfarero
  alternatives_spanish:
  - de barro cocido del alfarero
  - de cerámica del alfarero
  - de barro
  lexicon: HALOT
  rationale: La construcción genitiva describe el recipiente como hecho por un alfarero y hecho de barro/cerámica. 'De barro del alfarero' mantiene ambos elementos con naturalidad en español y evita un calco pesado.
- source_word: וּמִזִּקְנֵי הָעָם
  english_pob_choice: and take some of the elders of the people
  chosen_spanish: y toma algunos de los ancianos del pueblo
  alternatives_spanish:
  - y toma a algunos ancianos del pueblo
  - y toma algunos de entre los ancianos del pueblo
  - y toma de los ancianos del pueblo
  lexicon: HALOT
  rationale: El מן partitivo indica selección de entre ellos. 'Algunos de los ancianos del pueblo' expresa esa idea con claridad, conservando el sentido representativo documentado por la traducción inglesa.
- source_word: וּמִזִּקְנֵי הַכֹּהֲנִים
  english_pob_choice: and some of the elders of the priests
  chosen_spanish: y algunos de los ancianos de los sacerdotes
  alternatives_spanish:
  - y algunos de entre los ancianos de los sacerdotes
  - y algunos de los ancianos sacerdotales
  - y algunos de los ancianos de los sacerdotes
  lexicon: HALOT
  rationale: Se mantiene el paralelismo del hebreo y la relación partitiva. 'De los sacerdotes' sigue más de cerca la estructura hebrea que una paráfrasis como 'sacerdotales', que suavizaría la transparencia textual.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se adopta el equivalente español tradicional del proyecto para el Tetragrama, preservando el nombre propio divino en lugar de sustituirlo por un título. Esto mantiene la transparencia auditable de la traducción y evita ocultar el nombre del hablante profético.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue de cerca el consenso alto del paquete de fuente y el texto inglés auditado, sin cambios revisados pendientes. Se conservó la fórmula profética, el nombre divino según el estándar del proyecto y la lectura partitiva de ambos grupos de ancianos.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de acuerdo con la terminología del proyecto para יְהוָה.
  - '''Ancianos'' conserva el valor de זִקְנֵי como designación de autoridad comunitaria; no se sustituyó por ''líderes'' ni ''notables''.'
  - La nota sobre בַקְבֻּק preserva la ambigüedad lexical documentada en la traducción inglesa sin introducir una forma demasiado cerrada en el cuerpo del texto.
