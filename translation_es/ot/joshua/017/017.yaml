  text: Joshua said to the house of Joseph—to Ephraim and Manasseh—saying[a], “You are a numerous people, and you have great strength[b]; you shall not have only one allotment.”
  footnotes:
  - marker: a
    text: Or “a great people.” The Hebrew phrase can denote either numerical size or greatness; here the land-allotment context favors “numerous people.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “lot.” In Joshua this often refers to an inheritance portion assigned by lot; hence “allotment.”
    reason: lexical_alternative
