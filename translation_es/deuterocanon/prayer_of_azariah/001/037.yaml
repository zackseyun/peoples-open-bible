review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: imperativos plurales dirigidos a las aguas y a las realidades sobre los cielos para bendecir/alabar al Señor, con el doble mandato de himnar y exaltar para siempre. Sin embargo, dos elecciones debilitan la fidelidad puntual: «arriba de los cielos» suena menos digno y menos preciso que «sobre los cielos», y sobre todo «ensálcenlo muy por encima» introduce una idea espacial comparativa ajena al griego; ὑπερυψοῦτε intensifica la exaltación de él, no lo coloca ''por encima'' de algo en la sintaxis española.'
  spanish_quality_summary: El texto es en general legible, pero «ensálcenlo muy por encima» resulta poco natural e incluso ambiguo en español bíblico moderno. «Sobre los cielos» encaja mejor con el registro y con la nota léxica. Conviene también mantener una cadencia litúrgica más limpia en el segundo hemistiquio.
  glossary_alignment: '«Señor» para κύριος está alineado con el audit trail y la política del proyecto en este contexto griego. «Bendigan», «aguas» y «para siempre» son adecuados. La principal desalineación está en ὑπερυψοῦτε: el borrador no refleja bien el valor de ''exaltar sobremanera''.'
  issues:
  - severity: medium
    issue: «ensálcenlo muy por encima» no refleja bien ὑπερυψοῦτε
    rationale: La expresión española sugiere una relación espacial o comparativa ('por encima de...') que no está explícita en el griego. El verbo pide intensificación de exaltación, no ubicación superior.
  - severity: low
    issue: «arriba de los cielos» es menos preciso y menos digno que «sobre los cielos»
    rationale: Aunque comprensible, «arriba de» suena más coloquial. La nota ya usa «sobre los cielos», que además representa mejor ἐπάνω en este registro poético-litúrgico.
  revised_spanish_text: Bendigan al Señor[a], aguas y todo lo que está sobre los cielos; cántenle alabanzas y exáltenlo en gran manera para siempre.
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «todo lo que está sobre el cielo». La frase griega puede entenderse de manera colectiva como las realidades cósmicas superiores al cielo o los cielos.
    reason: lexical_alternative
  revision_rationale: Se ajusta «arriba de los cielos» a «sobre los cielos» para mayor precisión y mejor registro. Se reemplaza «ensálcenlo muy por encima» por «exáltenlo en gran manera», que comunica la intensificación de ὑπερυψοῦτε sin introducir una noción espacial ajena. La nota se armoniza con la variante singular/plural mencionada en el audit trail inglés.
