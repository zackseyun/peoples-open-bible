  rationale: 한국 교회 전통의 「형제 사랑」 / 「형제애」가 정착되어 있다. 「형제 사랑」이 합쇼체 산문에서 자연스럽다.
- source_word: θεοδίδακτοί ἐστε
  english_pob_choice: are taught by God
