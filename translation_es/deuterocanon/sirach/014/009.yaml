revisions:
- from: A los ojos del codicioso[a], su porción es demasiado poca, y al tomar la parte de su prójimo destruye su propia porción.
  to: A los ojos del codicioso[a], su porción es demasiado poca, y al tomar la porción de su prójimo destruye su propia porción.
