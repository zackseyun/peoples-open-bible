translation:
  language: es
  text: Tú gobiernas sobre el oleaje del mar[a]; cuando se levantan sus olas[b], las apaciguas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la majestad/el orgullo del mar». El término hebreo puede denotar exaltación, majestad o oleaje creciente; aquí el contexto favorece la imagen del mar encrespado.
    reason: lexical_alternative
  - marker: b
    text: O «las calmas» o «las sometes».
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹשֵׁל
  english_pob_choice: rule
  chosen_spanish: gobiernas
  alternatives_spanish:
  - reinas sobre
  - dominas sobre
  - ejerces dominio sobre
  lexicon: HALOT
  rationale: El participio expresa un gobierno continuo y soberano. En español, «gobiernas» comunica esa acción estable sin sonar forzado; «reinas sobre» sería posible, pero desplaza el matiz de administración activa, y «dominas sobre» puede sonar más duro que el contexto poético exige.
- source_word: בְּגֵאוּת
  english_pob_choice: over the swelling
  chosen_spanish: la hinchazón
  alternatives_spanish:
  - el orgullo
  - la majestad
  - el alzarse
  lexicon: HALOT
  rationale: El término puede significar exaltación, majestad o hinchazón/sobresalir. En el contexto del mar, «la hinchazón» conserva la imagen concreta del oleaje encrespado. No se añade «sobre» dentro del sintagma porque el verbo ya marca la relación de dominio.
- source_word: הַיָּם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar grande
  - el océano
  lexicon: HALOT
  rationale: «Mar» es el equivalente natural y bíblico en español para יָם. En un poema, suena más fluido que «océano» y mantiene el paralelismo con las olas.
- source_word: בְּשׂוֹא
  english_pob_choice: when ... rise
  chosen_spanish: cuando se levantan
  alternatives_spanish:
  - cuando suben
  - al levantarse
  - en el alzarse
  lexicon: HALOT
  rationale: El infinitivo constructo introduce la circunstancia del ascenso de las olas. «Cuando se levantan» expresa con claridad la imagen de las olas que se alzan sin perder el ritmo poético.
- source_word: גַלָּיו
  english_pob_choice: its waves
  chosen_spanish: sus olas
  alternatives_spanish:
  - sus ondas
  - sus olas del mar
  lexicon: HALOT
  rationale: El sufijo remite al mar; en español, «sus olas» es la forma más natural. «Olas» preserva mejor el movimiento visible que «ondas».
- source_word: תְשַׁבְּחֵם
  english_pob_choice: you still them
  chosen_spanish: tú las apaciguas
  alternatives_spanish:
  - tú las calmas
  - tú las sosegas
  - tú las aquietas
  lexicon: HALOT
  rationale: El verbo en este contexto transmite aplacar/pacificar aguas agitadas. «Apaciguas» conserva la fuerza de someter el tumulto y suena adecuado en español poético; no se opta por «alabas» porque aquí el sentido contextual es el de calmar, no el de elogiar.
theological_decisions:
- issue: Soberanía divina sobre el mar y sus olas
  english_pob_reading: A direct affirmation that God exercises sovereign control over the sea and its waves.
  chosen_spanish_reading: Afirmación directa de que Dios ejerce dominio soberano sobre el mar y sus olas.
  alternative_spanish_readings:
  - Alusión mitopoética a la victoria de Dios sobre el caos cósmico
  - Descripción meramente meteorológica del control de Dios sobre el agua
  rationale: 'La traducción conserva la imagen concreta de dominio y apaciguamiento sin desarrollar explícitamente un marco mitológico más amplio. Así se mantiene la tensión interpretativa del poema: soberanía real sobre las aguas tumultuosas, sin resolver el trasfondo teológico más allá de lo que el verso dice.'
  doctrine_reference: Preservar la tensión teológica sin sobreinterpretar; soberanía de Dios sobre la creación.
translation_notes:
  revision_awareness: El texto base en inglés ya había fijado la lectura contextual de גֵּאוּת como ‘swelling’ y de תְשַׁבְּחֵם como ‘still them’. No hubo revisiones posteriores que alteraran esa decisión; por eso el español sigue la misma línea semántica, ajustada a una formulación natural y poética en castellano.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en la segunda persona, como en el hebreo y el inglés, sin introducir un sujeto nominal innecesario.
  - Se conserva el paralelismo mar/olas y la relación de dominio-apaciguamiento.
  - «Apaciguas» traduce el efecto contextual del verbo sin perder el contraste entre el mar que se agita y la acción divina que lo detiene.
