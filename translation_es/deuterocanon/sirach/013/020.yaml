translation:
  language: es
  text: Cuando un hombre rico tropieza, lo sostiene un amigo; pero cuando un hombre pobre tropieza, es echado de amigo en amigo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'de un amigo a otro'. El hebreo sugiere que al pobre lo van pasando o echando repetidamente, en lugar de recibir ayuda verdadera.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָשִׁיר
  english_pob_choice: a rich man
  chosen_spanish: un hombre rico
  alternatives_spanish:
  - el rico
  - un rico
  lexicon: HALOT
  rationale: Conserva el singular proverbial del hebreo y evita una abstracción excesiva; 'hombre rico' suena natural en español y mantiene el contraste social.
- source_word: מוּט
  english_pob_choice: stumbles
  chosen_spanish: tropieza
  alternatives_spanish:
  - vacila
  - tambalea
  - se tambalea
  lexicon: HALOT
  rationale: '''Tropieza'' comunica bien el sentido proverbial de una desestabilización o revés sin sugerir necesariamente caída total.'
- source_word: נִסְמָךְ
  english_pob_choice: is supported
  chosen_spanish: lo sostiene
  alternatives_spanish:
  - lo apoya
  - lo sustenta
  - es sostenido
  lexicon: HALOT
  rationale: El hebreo expresa apoyo recibido; 'lo sostiene' es idiomático en español y conserva la acción concreta de ayuda social.
- source_word: מֵרֵעַ
  english_pob_choice: by a friend
  chosen_spanish: un amigo
  alternatives_spanish:
  - un compañero
  - un allegado
  lexicon: HALOT
  rationale: '''Amigo'' es la equivalencia más directa y clara para רֵעַ en este proverbio.'
- source_word: דַל
  english_pob_choice: a poor man
  chosen_spanish: un hombre pobre
  alternatives_spanish:
  - el pobre
  - un pobre
  lexicon: HALOT
  rationale: Mantiene el paralelismo proverbial con 'un hombre rico' y conserva el contraste socioeconómico del hebreo.
- source_word: נָמוֹט
  english_pob_choice: stumbles
  chosen_spanish: tropieza
  alternatives_spanish:
  - vacila
  - tambalea
  - se tambalea
  lexicon: HALOT
  rationale: Se repite la misma base verbal en español para preservar el paralelismo entre rico y pobre.
- source_word: נִדְחָה
  english_pob_choice: is driven away
  chosen_spanish: es conducido
  alternatives_spanish:
  - es echado
  - es apartado
  - es alejado
  lexicon: HALOT
  rationale: '''Conducido'' refleja la idea de ser impulsado o llevado de un lado a otro; se combina con el complemento siguiente para expresar el rechazo reiterado.'
- source_word: מֵרֵעַ אֶל רֵעַ
  english_pob_choice: from friend to friend
  chosen_spanish: de amigo en amigo
  alternatives_spanish:
  - de un amigo a otro
  - de amigo tras amigo
  lexicon: HALOT
  rationale: La locución española fija el sentido de traslado repetido y conserva la concisión del hebreo.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece exactamente en el texto español, anclado en la cláusula correspondiente. Se mantiene la lectura hebrea principal, en lugar de la variante griega citada como control textual.'
  spanish_consistency_notes:
  - Se preserva el paralelismo entre 'un hombre rico' y 'un hombre pobre'.
  - Se mantiene la imagen social concreta de apoyo frente a rechazo.
  - La frase 'de amigo en amigo' conserva la repetición implícita del hebreo sin sobreexplicar.
