translation:
  language: es
  text: Será como un árbol plantado junto al agua, que extiende sus raíces hacia un arroyo[a]; no teme cuando llega el calor, y su hoja permanece verde[b]. En un año de sequía no se angustia, y no deja de dar fruto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia un curso de agua» o «hacia un canal» para «hacia un arroyo».
    reason: lexical_alternative
  - marker: b
    text: O «su hoja está fresca/lozana»; el adjetivo hebreo incluye la idea de frescura además de verdor.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְעֵץ
  english_pob_choice: like a tree
  chosen_spanish: como un árbol
  alternatives_spanish:
  - como árbol
  lexicon: HALOT
  rationale: El comparativo כְּ se conserva de manera natural con «como». «Un árbol» mantiene la imagen simétrica del hebreo y suena idiomático en español.
- source_word: שָׁתוּל
  english_pob_choice: planted
  chosen_spanish: plantado
  alternatives_spanish:
  - trasplantado
  - puesto
  lexicon: HALOT
  rationale: El participio pasivo describe un árbol establecido deliberadamente. «Plantado» comunica bien la idea sin introducir una especificación adicional que el hebreo no exige.
- source_word: עַל מַיִם
  english_pob_choice: by water
  chosen_spanish: junto a las aguas
  alternatives_spanish:
  - cerca de las aguas
  - al lado de las aguas
  - sobre las aguas
  lexicon: HALOT
  rationale: Aunque עַל es literalmente «sobre/upon», aquí expresa proximidad a una fuente de agua. «Junto a» evita un calco poco natural y preserva la relación espacial.
- source_word: יוּבַל
  english_pob_choice: a stream
  chosen_spanish: un arroyo
  alternatives_spanish:
  - un cauce
  - un canal
  - un curso de agua
  lexicon: HALOT
  rationale: יוּבַל puede referirse a un canal o curso de agua. «Arroyo» es una equivalencia comprensible en español; se mantiene una alternativa implícita en la nota sobre el término de agua corriente.
- source_word: יְשַׁלַּח שָׁרָשָׁיו
  english_pob_choice: sends out its roots
  chosen_spanish: extiende sus raíces
  alternatives_spanish:
  - echa sus raíces
  - envía sus raíces hacia afuera
  - alarga sus raíces
  lexicon: HALOT
  rationale: El piel de שׁלח con «raíces» expresa expansión hacia afuera. «Extiende» conserva el movimiento imagenal sin sonar forzado en español.
- source_word: לֹא יִרָא
  english_pob_choice: it does not fear
  chosen_spanish: no teme
  alternatives_spanish:
  - no tiene miedo
  - no se asusta
  lexicon: HALOT
  rationale: «Teme» es una forma breve y digna que reproduce bien ירא en el marco personificado del árbol.
- source_word: כִּי יָבֹא חֹם
  english_pob_choice: when heat comes
  chosen_spanish: cuando llega el calor
  alternatives_spanish:
  - cuando viene el calor
  - cuando llega el calor intenso
  lexicon: HALOT
  rationale: El valor temporal de כִּי se refleja con «cuando». «Calor» traduce חֹם de manera natural en el contexto agrícola de la imagen.
- source_word: עָלֵהוּ רַעֲנָן
  english_pob_choice: its leaf remains green
  chosen_spanish: su hoja permanece verde
  alternatives_spanish:
  - su hoja está fresca
  - su follaje permanece verde
  - su hoja está lozana
  lexicon: HALOT
  rationale: רַעֲנָן incluye la idea de frescura y verdor. «Permanece verde» recoge el estado continuo señalado por el contexto, manteniendo claridad en español.
- source_word: וּבִשְׁנַת בַּצֹּרֶת
  english_pob_choice: In a year of drought
  chosen_spanish: En año de sequía
  alternatives_spanish:
  - En un año de sequía
  - Durante un año de sequía
  lexicon: HALOT
  rationale: La construcción constructa admite una formulación breve y proverbial en español. Se conserva la fuerza de imagen sin añadir un artículo que el hebreo no exige.
- source_word: לֹא יִדְאָג
  english_pob_choice: it is not anxious
  chosen_spanish: no se angustia
  alternatives_spanish:
  - no se inquieta
  - no se preocupa
  lexicon: HALOT
  rationale: דאג expresa una preocupación ansiosa. «No se angustia» mantiene el matiz emocional de inquietud y armoniza con «no teme».
- source_word: לֹא יָמִישׁ מֵעֲשׂוֹת פֶּרִי
  english_pob_choice: it does not cease from bearing fruit
  chosen_spanish: no deja de dar fruto
  alternatives_spanish:
  - no cesa de dar fruto
  - no deja de producir fruto
  - no se aparta de dar fruto
  lexicon: HALOT
  rationale: מושׁ con מן + infinitivo expresa no apartarse ni cesar de una actividad. «No deja de dar fruto» es natural y fiel al sentido durativo.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto fuente hebreo y con la solución inglesa auditada; no se detectan revisiones aplicadas en el pasaje de referencia. La versión española mantiene la misma línea interpretativa, ajustando solo la formulación idiomática para el español.
  spanish_consistency_notes:
  - Se usa «Yahvé» como terminología por defecto cuando corresponda; en este versículo no aparece el nombre divino.
  - Se preserva la imagen arbórea literal sin convertirla en alegoría explicativa.
  - «Árbol plantado» y «no deja de dar fruto» mantienen el paralelismo y el ritmo del hebreo.
  - Se evita «SEÑOR» o fórmulas eclesiásticas no presentes en el texto base.
