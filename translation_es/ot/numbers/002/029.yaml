  - Se mantiene la fórmula tribal con «tribu de Neftalí» y «hijos de Neftalí» para conservar la estructura hebrea.
  - 'Los nombres propios se transliteran de manera consistente al español bíblico: Neftalí, Ahira, Enán.'
