  glossary_alignment: No hay conflicto con los términos teológicos del proyecto. 'Pectoral' está bien justificado para חֹשֶׁן. 'Cadenas trenzadas' preserva adecuadamente עֲבֹתֹת, con posibilidad de nota por 'retorcidas'. La elección 'aros' para הַטַּבָּעֹת se aparta innecesariamente de la precisión habitual de 'anillos/argollas'.
