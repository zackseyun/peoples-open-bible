translation:
  language: es
  text: Ve al faraón por la mañana. Mira, él sale al agua, y te pondrás para encontrarte con él en la orilla del Nilo[a], y tomarás en tu mano la vara que fue convertida en serpiente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el río». El hebreo יְאֹר en Éxodo suele referirse específicamente al Nilo.
    reason: lexical_alternative
  - marker: b
    text: O «serpiente». El hebreo נָחָשׁ puede verterse «serpiente» o «culebra»; se usa «serpiente» por el registro más formal y por la consistencia del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Ve tú
  lexicon: HALOT
  rationale: El imperativo directo de הלך se expresa de forma natural y concisa en español con «Ve». Mantiene el mandato inmediato sin añadir énfasis innecesario.
- source_word: אֶל פַּרְעֹה
  english_pob_choice: to Pharaoh
  chosen_spanish: al faraón
  alternatives_spanish:
  - hacia el faraón
  - para el faraón
  lexicon: HALOT
  rationale: אֶל indica dirección hacia una persona; en español, «al faraón» comunica esa orientación de manera idiomática y fiel.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - a la mañana
  lexicon: HALOT
  rationale: La expresión temporal se vierte de forma natural con «por la mañana», que suena más fluida que un calco literal.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Observa
  lexicon: HALOT
  rationale: הִנֵּה introduce atención inmediata; «Mira» conserva esa fuerza deíctica en español moderno y solemne.
- source_word: יֹצֵא הַמַּיְמָה
  english_pob_choice: he is going out to the water
  chosen_spanish: él sale al agua
  alternatives_spanish:
  - él está saliendo al agua
  - él va hacia el agua
  lexicon: HALOT
  rationale: El participio y la dirección del movimiento se traducen con un presente de valor progresivo o habitual; «sale al agua» mantiene la idea de salida hacia el agua sin recargar la frase.
- source_word: וְנִצַּבְתָּ
  english_pob_choice: you shall stand
  chosen_spanish: te pondrás
  alternatives_spanish:
  - te plantarás
  - te colocarás
  lexicon: HALOT
  rationale: En este contexto, נצב tiene el sentido de colocarse en posición para esperar o recibir. «Te pondrás» transmite la acción de situarse sin sonar forzado.
- source_word: לִקְרָאתוֹ
  english_pob_choice: to meet him
  chosen_spanish: para recibirlo
  alternatives_spanish:
  - para encontrarlo
  - para enfrentarlo
  lexicon: HALOT
  rationale: La expresión puede significar encontrarse con alguien o salir a su encuentro. «Para recibirlo» conserva la orientación de encuentro y evita una formulación demasiado literal que sonaría rígida en español.
- source_word: עַל שְׂפַת הַיְאֹר
  english_pob_choice: on the bank of the Nile
  chosen_spanish: en la orilla del Nilo
  alternatives_spanish:
  - a la orilla del Nilo
  - sobre la ribera del Nilo
  lexicon: HALOT
  rationale: שָׂפָה es «orilla/borde/banco»; «en la orilla del Nilo» es natural y preciso. Se conserva el referente específico, siguiendo la decisión inglesa de entender יְאֹר como el Nilo.
- source_word: וְהַמַּטֶּה
  english_pob_choice: the staff
  chosen_spanish: la vara
  alternatives_spanish:
  - el bastón
  - el cetro
  lexicon: HALOT
  rationale: מַטֶּה puede ser «vara» o «bastón». «Vara» mantiene mejor el objeto narrativo y su resonancia bíblica sin caer en una palabra demasiado pastoral o moderna.
- source_word: אֲשֶׁר נֶהְפַּךְ לְנָחָשׁ
  english_pob_choice: that was turned into a serpent
  chosen_spanish: que fue convertida en serpiente
  alternatives_spanish:
  - que se volvió serpiente
  - que fue transformada en serpiente
  lexicon: HALOT
  rationale: נֶהְפַּךְ expresa pasivo/reflexivo de cambio de estado; «fue convertida» preserva la pasividad. «Serpiente» sigue la revisión inglesa más formal y mantiene la carga bíblica de נָחָשׁ.
- source_word: תִּקַּח בְּיָדֶךָ
  english_pob_choice: you shall take in your hand
  chosen_spanish: tomarás en tu mano
  alternatives_spanish:
  - la tomarás en tu mano
  - la cogerás con tu mano
  lexicon: HALOT
  rationale: El mandato injuntivo se expresa con futuro de mandato en español bíblico actual. «En tu mano» reproduce la concreción hebrea sin reducir el sentido a una simple acción de tomar.
theological_decisions:
- issue: Rendering of יְאֹר as a specific river rather than a generic watercourse
  english_pob_reading: the Nile
  chosen_spanish_reading: el Nilo
  alternative_spanish_readings:
  - el río
  - la corriente
  rationale: En Éxodo, יְאֹר se refiere específicamente al Nilo en su contexto egipcio. Mantener «el Nilo» evita perder el referente histórico-geográfico y sigue la decisión auditada de la POB en inglés.
  doctrine_reference: N/A (lexical-historical clarity)
- issue: Rendering of נָחָשׁ in a dignified register
  english_pob_reading: serpent
  chosen_spanish_reading: serpiente
  alternative_spanish_readings:
  - culebra
  - víbora
  rationale: La revisión inglesa elevó «snake» a «serpent» por registro más formal y por consistencia tradicional en este contexto. «Serpiente» conserva esa formalidad en español y evita una domesticación excesiva.
  doctrine_reference: N/A (register and biblical imagery)
translation_notes:
  revision_awareness: La base inglesa fue revisada para cambiar «snake» por «serpent» y elevar el registro de נָחָשׁ; el español sigue esa revisión con «serpiente». También se conserva la decisión auditada de interpretar יְאֹר como el Nilo. He evitado un calco rígido en la secuencia verbal, pero mantengo la progresión imperativa del hebreo.
  spanish_consistency_notes:
  - Usé «Yahvé» cuando aparezca el nombre divino; en este versículo no aparece.
  - Conservo «faraón» en minúscula por uso común en español bíblico cuando funciona como título.
  - «Vara» y «serpiente» mantienen el tono narrativo y la consistencia con el registro formal del texto fuente.
