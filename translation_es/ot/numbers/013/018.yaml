translation:
  language: es
  text: Miren cómo es la tierra[a], y si el pueblo que habita en ella es fuerte o débil[b], si son pocos o muchos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «qué es ella». La frase pregunta por la condición o el carácter de la tierra, no solo por su identidad.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «el pueblo que habita sobre ella». En español, para los habitantes de una tierra, lo natural es decir «en ella».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּרְאִיתֶם
  english_pob_choice: See
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Observen
  lexicon: HALOT
  rationale: El hebreo funciona como una instrucción plural en el contexto del encargo a los espías. «Miren» conserva el valor de inspección y suena natural en español contemporáneo sin perder el matiz de observar con atención.
- source_word: הָאָרֶץ מַה הִוא
  english_pob_choice: what the land is like
  chosen_spanish: cómo es la tierra
  alternatives_spanish:
  - qué es la tierra
  - cuál es la condición de la tierra
  lexicon: HALOT
  rationale: La pregunta no busca solo identificar la tierra, sino evaluar su carácter o condición. «Cómo es la tierra» comunica ese sentido evaluativo en español de manera idiomática y fiel al hebreo.
- source_word: הָעָם הַיֹּשֵׁב עָלֶיהָ
  english_pob_choice: the people who dwell in it
  chosen_spanish: el pueblo que habita en ella
  alternatives_spanish:
  - el pueblo que vive en ella
  - la gente que mora en ella
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el pueblo que se sienta/habita sobre ella», es decir, que reside allí. «Habita en ella» refleja el sentido normal en español para habitantes de una tierra, sin forzar el calco de «sobre».
- source_word: הֶחָזָק
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - poderoso
  - robusto
  lexicon: HALOT
  rationale: En este contraste de población, חזק describe fortaleza. «Fuerte» es la equivalencia más directa y clara en español para esta evaluación general.
- source_word: הֲרָפֶה
  english_pob_choice: weak
  chosen_spanish: débil
  alternatives_spanish:
  - flojo
  - debilitado
  lexicon: HALOT
  rationale: Como antónimo de חזק, רפה expresa falta de fuerza. «Débil» mantiene el contraste semántico con «fuerte» de forma transparente y natural.
- source_word: הַמְעַט
  english_pob_choice: few
  chosen_spanish: poco
  alternatives_spanish:
  - son pocos
  - de escaso número
  lexicon: HALOT
  rationale: El hebreo contrapone cantidad a רָב. En español, con el verbo implícito de la pregunta, «poco» funciona como adjetivo cuantitativo abreviado y comprensible; la alternativa más explícita sería «son pocos».
- source_word: רָב
  english_pob_choice: many
  chosen_spanish: numeroso
  alternatives_spanish:
  - mucho
  - muchos
  lexicon: HALOT
  rationale: Para mantener el paralelismo con «poco» y evitar una repetición pesada, «numeroso» expresa bien la idea de gran cantidad en español. Conserva el contraste cuantitativo del hebreo.
theological_decisions:
- issue: La evaluación de la tierra y del pueblo es descriptiva, no confesional.
  english_pob_reading: See what the land is like, and whether the people who dwell in it are strong or weak, whether they are few or many.
  chosen_spanish_reading: Miren cómo es la tierra, y si el pueblo que habita en ella es fuerte o débil, si es poco o numeroso.
  alternative_spanish_readings:
  - Miren qué tal es la tierra...
  - '...si son pocos o muchos'
  rationale: El versículo presenta una tarea de reconocimiento militar y geográfico. No introduce un juicio moral o doctrinal; por eso la redacción española mantiene el tono descriptivo y exploratorio del hebreo.
  doctrine_reference: Números 13:18; contexto narrativo de la comisión de los espías
translation_notes:
  revision_awareness: No se detectaron revisiones aplicadas en el expediente inglés; el texto español se elaboró directamente desde el hebreo con apoyo del audit trail inglés, manteniendo el mismo sentido sin cambios textuales relevantes en la tradición POB revisada.
  spanish_consistency_notes:
  - Se usa «Miren» para conservar el plural imperativo del hebreo.
  - Se evita «SEÑOR» o «Cristo» porque no aparecen en este versículo.
  - «fuerte/débil» reproduce con claridad el contraste חזק/רפה.
  - «poco/numeroso» conserva el contraste cuantitativo de מְעַט/רָב.
  - La nota [b] explica la adaptación idiomática de עָלֶיהָ a «en ella» en español.
