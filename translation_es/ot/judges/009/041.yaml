translation:
  language: es
  text: Y Abimelec se quedó en Aruma, y Zebul echó a Gaal y a sus hermanos de Siquem[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'expulsó a Gaal y a sus hermanos para que no habitaran en Siquem'. La construcción infinitiva hebrea expresa exclusión de residir allí.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  english_pob_choice: stayed
  chosen_spanish: se quedó
  alternatives_spanish:
  - permaneció
  - habitó
  - residió
  lexicon: HALOT
  rationale: ישׁב puede significar 'sentarse', 'permanecer' o 'habitar'. En este contexto narrativo, después de la acción militar, 'se quedó' comunica con naturalidad que Abimelec permaneció en Aruma sin sonar demasiado solemne ni sugerir una residencia estable más fuerte de lo que exige el pasaje.
- source_word: בָּאָרוּמָה
  english_pob_choice: in Arumah
  chosen_spanish: en Aruma
  alternatives_spanish:
  - en Arumá
  lexicon: Nombre propio / transliteración
  rationale: Es un topónimo, por lo que se translitera. 'En Aruma' conserva la forma breve y readable en español, mientras que 'Arumá' marcaría una adaptación ortográfica menos uniforme con el nombre bíblico.
- source_word: וַיְגָרֶשׁ
  english_pob_choice: drove ... out
  chosen_spanish: expulsó
  alternatives_spanish:
  - echó
  - arrojó fuera
  - desterró
  lexicon: HALOT
  rationale: גרשׁ expresa expulsión o alejamiento forzoso. 'Expulsó' conserva bien la fuerza del verbo y suena natural en español. 'Desterró' sugiere una medida más jurídica de la que el hebreo no obliga a deducir.
- source_word: זְבֻל
  english_pob_choice: Zebul
  chosen_spanish: Zebul
  lexicon: Nombre propio / transliteración
  rationale: Nombre personal transliterado de modo estándar.
- source_word: גַּעַל
  english_pob_choice: Gaal
  chosen_spanish: Gaal
  alternatives_spanish:
  - Gaal’
  lexicon: Nombre propio / transliteración
  rationale: Nombre personal transliterado. Se mantiene la forma simple usada en el expediente inglés revisado; en español no se añade apóstrofo porque no es necesario para la lectura ni para una transliteración funcional.
- source_word: אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus parientes
  - a sus compañeros
  lexicon: HALOT
  rationale: El sustantivo básico es 'hermanos'. No hay motivo suficiente para suavizarlo a 'parientes' o 'compañeros'; conservarlo mantiene la precisión léxica y la coherencia con el audit trail.
- source_word: מִשֶּׁבֶת
  english_pob_choice: from dwelling
  chosen_spanish: para que no habitaran
  alternatives_spanish:
  - para que no residieran
  - para impedirles morar
  - de habitar
  lexicon: HALOT
  rationale: La construcción infinitiva con מן comunica exclusión de residir en un lugar. En español, 'para que no habitaran' expresa con claridad el resultado, sin forzar una literalidad extraña. Mantiene el valor de prevención/exclusión presente en el hebreo.
- source_word: בִּשְׁכֶם
  english_pob_choice: in Shechem
  chosen_spanish: en Siquem
  alternatives_spanish:
  - en Shequem
  lexicon: Nombre propio / transliteración
  rationale: Topónimo bíblico transliterado con la forma castellana tradicional 'Siquem', ampliamente reconocible y natural en español bíblico.
translation_notes:
  revision_awareness: 'Se siguió el expediente inglés revisado y el resumen de revisión: se conservó la idea de ''stayed/dwelling'' como permanencia en Aruma y se reflejó la construcción infinitiva de exclusión con una formulación natural en español. No se introdujeron lecturas textuales alternativas porque el paquete de fuente muestra alta concordancia y no ofrece variante textual significativa.'
  spanish_consistency_notes:
  - Se emplea 'Yahvé' solo cuando el texto lo requiera; aquí no aparece.
  - Se traduce el topónimo שְׁכֶם como 'Siquem', forma habitual y clara en español bíblico.
  - Se mantiene el nombre 'Gaal' sin apostrofo por consistencia con el expediente revisado y por legibilidad en español.
  - '''Expulsó'' preserva la fuerza del verbo hebreo גרשׁ sin añadir una connotación legal no presente en el contexto.'
