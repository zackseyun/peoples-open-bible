  spanish_consistency_notes:
  - 'Se mantiene la secuencia nominal breve del hebreo: dos fórmulas paralelas «el rey de X, uno».'
  - Se usa «Horma» en vez de una traducción semántica del topónimo para preservar la convención onomástica bíblica.
  - No se añade artículo al numeral ni se expande a «un rey», porque el hebreo elide el sustantivo en la segunda unidad.
