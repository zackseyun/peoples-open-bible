translation:
  language: es
  text: Y les pesé la plata[a], el oro y los utensilios —la contribución para la casa de nuestro Dios que habían ofrecido el rey, sus consejeros, sus oficiales y todo Israel que estaba presente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ofrenda para la casa de nuestro Dios». El término hebreo puede denotar una contribución apartada para uso sagrado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁקֳלָה
  english_pob_choice: And I weighed out
  chosen_spanish: Y pesé y les entregué
  alternatives_spanish:
  - Y pesé
  - Y pesé y repartí por peso
  lexicon: HALOT
  rationale: שקל expresa el acto de pesar; en contexto, Ezra transfiere formalmente objetos de valor ya medidos. En español, «pesé y les entregué» conserva el acto literal y la idea distributiva implícita en לָהֶם sin volverlo mecánico.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: HALOT
  rationale: La preposición indica destinatarios. En español, el dativo «les» comunica naturalmente la entrega a los receptores.
- source_word: הַכֶּסֶף
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  lexicon: HALOT
  rationale: Aunque כסף a veces puede significar dinero, aquí va junto con oro y utensilios como bienes del templo; por eso «la plata» refleja mejor el material precioso.
- source_word: הַזָּהָב
  english_pob_choice: the gold
  chosen_spanish: el oro
  lexicon: HALOT
  rationale: Correspondencia directa del metal precioso mencionado en la lista de ofrendas.
- source_word: הַכֵּלִים
  english_pob_choice: the vessels
  chosen_spanish: los utensilios
  alternatives_spanish:
  - los vasos
  - los objetos
  lexicon: HALOT
  rationale: כֵּלִים es amplio; en contexto del templo, «utensilios» comunica bien los objetos/implementos sagrados sin sonar demasiado arcaico. «Vasos» podría estrechar demasiado el sentido.
- source_word: תְּרוּמַת
  english_pob_choice: the contribution
  chosen_spanish: la contribución
  alternatives_spanish:
  - la ofrenda
  - la ofrenda apartada
  lexicon: HALOT
  rationale: תְּרוּמָה denota algo apartado para uso sagrado. «Contribución» mantiene la idea de donación dedicada a un fin santo y evita cargar el término con un tecnicismo ritual innecesario.
- source_word: בֵּית אֱלֹהֵינוּ
  english_pob_choice: the house of our God
  chosen_spanish: la casa de nuestro Dios
  alternatives_spanish:
  - el templo de nuestro Dios
  - la casa de Dios
  lexicon: HALOT
  rationale: Se conserva la imagen literal de «casa», que es la forma del hebreo, mientras «nuestro Dios» mantiene el posesivo del texto fuente.
- source_word: הֵרִימוּ
  english_pob_choice: had offered
  chosen_spanish: habían ofrecido
  alternatives_spanish:
  - habían contribuido
  - habían levantado
  lexicon: HALOT
  rationale: El hifil de רום puede usarse idiomáticamente para presentar una contribución. «Habían ofrecido» es la equivalencia española más natural para una donación cultual, conservando el valor anterior al acto de pesar.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  lexicon: HALOT
  rationale: Traducción directa del donor real.
- source_word: יֹעֲצָיו
  english_pob_choice: his counselors
  chosen_spanish: sus consejeros
  alternatives_spanish:
  - sus asesores
  - sus ministros
  lexicon: HALOT
  rationale: El sustantivo designa a quienes dan consejo. «Consejeros» es claro y fiel en español.
- source_word: שָׂרָיו
  english_pob_choice: his officials
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus príncipes
  - sus gobernantes
  lexicon: HALOT
  rationale: En el contexto administrativo persa, «oficiales» comunica función y evita sugerir un rango nobiliario específico que el hebreo no obliga aquí.
- source_word: כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo el Israel
  - todos los israelitas
  lexicon: HALOT
  rationale: La expresión colectiva se conserva de manera natural con «todo Israel», fórmula transparente y tradicional a la vez.
- source_word: הַנִּמְצָאִים
  english_pob_choice: who were present
  chosen_spanish: que estaba presente
  alternatives_spanish:
  - que se hallaba presente
  - que fueron hallados allí
  lexicon: HALOT
  rationale: El participio de מצא aquí indica los que estaban presentes o reunidos allí. En español, «que estaba presente» fluye bien con el colectivo «todo Israel» y mantiene el sentido contextual.
theological_decisions:
- issue: Sentido cultual de תְּרוּמָה
  english_pob_reading: the contribution
  chosen_spanish_reading: la contribución
  alternative_spanish_readings:
  - la ofrenda
  - la ofrenda apartada
  rationale: El versículo habla de bienes entregados para el templo. «Contribución» comunica que se trata de una entrega dedicada al uso sagrado sin introducir una categoría sacrificial más específica de la que exige el texto.
  doctrine_reference: Principio POB de primacía del texto original y equivalencia óptima
- issue: Imagen de בֵּית אֱלֹהֵינוּ
  english_pob_reading: the house of our God
  chosen_spanish_reading: la casa de nuestro Dios
  alternative_spanish_readings:
  - el templo de nuestro Dios
  rationale: Se preserva la metáfora del hebreo («casa») en vez de sustituirla por una interpretación explicativa. Así se conserva la textura del original y la referencia al santuario.
  doctrine_reference: Principio POB de transparencia textual y auditable source-based rendering
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el consenso del audit trail inglés y no requiere ajustes textuales respecto del sentido base: peso/entrega de los metales y utensilios, seguido de la identificación de la contribución para la casa de Dios y de sus oferentes.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplica aquí, pues el texto dice «Dios»/אֱלֹהים.
  - «Casa de nuestro Dios» conserva la metáfora del hebreo y la posesión comunitaria.
  - «Ofrecido» se ha resuelto como «habían ofrecido» para reflejar anterioridad narrativa.
  - Se eligió «oficiales» sobre «príncipes» por el contexto administrativo persa.
  - «Utensilios» evita estrechar indebidamente כֵּלִים a vasos litúrgicos únicamente.
