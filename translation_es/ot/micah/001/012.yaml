revisions:
- from: Porque la habitante de Marot[a] espera con ansiedad el bien, pues ha descendido el mal[b] de parte de Yahvé[c] hasta la puerta de Jerusalén.
  to: Porque la habitante de Marot[a] espera con ansiedad el bien, pues ha descendido la calamidad de parte de Yahvé hasta la puerta de Jerusalén.
  rationale: Se cambia 'el mal' por 'la calamidad' para ajustarse al sentido contextual de רָע en el expediente POB y evitar una ambigüedad teológica innecesaria en español. Se conserva 'de parte de Yahvé' y la personificación singular 'la habitante de Marot'. Se simplifican las notas para dejar solo la alternativa léxica realmente útil sobre חָלָה.
