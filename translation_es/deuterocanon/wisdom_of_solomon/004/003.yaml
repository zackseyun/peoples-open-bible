review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego: contrasta la abundante descendencia de los impíos con su falta de provecho y mantiene la doble metáfora vegetal de raíz/fundamento. Sin embargo, hay un problema de precisión léxica en ἐκ νόθων μοσχευμάτων: «injertos espurios» desplaza demasiado μοσχευμάτων hacia ‘grafts’ cuando el POB auditado prioriza ‘shoots/offshoots’, y en español «retoños» o «brotes» preserva mejor la imagen. También conviene pluralizar los verbos de la segunda mitad para reflejar mejor el sujeto implícito que retoma los brotes/retoños.'
  spanish_quality_summary: El español es claro, digno y natural. «La numerosa descendencia de los impíos no servirá de nada» funciona bien. No obstante, «de injertos espurios no echará raíz… ni establecerá…» suena algo menos natural y más ambiguo en número; con «retoños ilegítimos» y verbos en plural la frase fluye mejor y conserva la metáfora hortícola con mayor claridad.
  glossary_alignment: No hay términos de glosario principal en juego salvo ἀσεβῶν, para lo cual «impíos» está bien alineado con la decisión POB ‘ungodly’. La elección «espurios» conserva severidad, pero «injertos» no refleja de forma óptima la decisión auditada sobre μοσχεύματα. Se recomienda «retoños ilegítimos» como término principal y mantener alternativas en nota.
  issues:
  - severity: medium
    issue: «Injertos espurios» no representa óptimamente μοσχευμάτων en este contexto.
    rationale: Aunque léxicamente posible en abstracto, el rastro auditado del POB eligió ‘shoots’/‘offshoots’ como imagen principal, no ‘grafts’. En español, «injertos» sugiere una operación hortícola más técnica y puede desviar la figura.
  - severity: medium
    issue: La segunda mitad usa singular («no echará… ni establecerá…») donde el antecedente metafórico se entiende mejor en plural.
    rationale: El inglés auditado hace explícito el plural (‘they will not put down… nor establish…’), refiriéndolo a los brotes/retoños. En español, el singular puede leerse como si volviera a «descendencia»; el plural aclara la referencia y la progresión de la metáfora.
  - severity: low
    issue: La nota [a] introduce una alternativa no documentada por el POB inglés.
    rationale: El POB inglés da como alternativas ‘illegitimate offshoots’ o ‘spurious grafts’ para la nota correspondiente a νόθων μοσχευμάτων, mientras que para οὐ χρησιμεύσει solo conserva ‘will be of no use’. La nota española [a] es posible, pero no necesaria; aun así, no es grave si se mantiene como aclaración idiomática.
  revised_spanish_text: Pero la numerosa descendencia de los impíos no servirá de nada, y de retoños ilegítimos[a] no echarán raíces en lo profundo[b], ni establecerán una base firme.
