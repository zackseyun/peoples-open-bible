  - severity: medium
    issue: ‘gloriosamente’ suena poco idiomático en ‘revelar las obras de Dios gloriosamente’.
    rationale: El adverbio reproduce formalmente el inglés/gliego, pero en español la combinación es rígida. Conviene una formulación más natural que mantenga el matiz doxológico, con nota para la alternativa ‘honorablemente’.
  - severity: low
