  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y la línea de la POB inglesa: ἄνθρωπος = «Un hombre», παραβαίνων conserva fuerza moral, ἀπὸ τῆς κλίνης αὐτοῦ mantiene el eufemismo, y Τίς με ὁρᾷ; está bien reflejado. El punto principal a corregir es la preposición: «desde su lecho» suena espacial/origen físico y no expresa bien el valor de ἀπό aquí; «de su lecho» preserva mejor el giro eufemístico. Además, en español «dice en su alma» es muy literal pero poco natural; puede conservarse la textura antropológica con «dice en su interior[a]», que sigue señalando habla interna sin dureza innecesaria.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero «transgrede desde su lecho» resulta algo forzado en español. «Transgrede de su lecho» tampoco es plenamente idiomático; una mejor solución, fiel al participio y al eufemismo, es «Un hombre que se aparta de su lecho». Esto mantiene la indirecta sexual sin sobreexplicarla y mejora la legibilidad. También conviene ajustar la nota para explicar la alternativa más explícita y el matiz del griego.
  glossary_alignment: No hay términos de glosario mayor en juego fuera de opciones léxicas contextuales. «Un hombre» concuerda con la decisión de ἄνθρωπος. No hay conflicto con nombres divinos ni títulos mesiánicos. La revisión propuesta respeta la decisión inglesa de no hacer explícito «adulterio» en el texto principal.
