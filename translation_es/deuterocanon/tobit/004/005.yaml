translation:
  language: es
  text: Todos los días[a], hijo, recuerda a Yahvé nuestro Dios. No desees transgredir sus mandamientos. Practica la rectitud todos los días de tu vida, y no camines por los caminos de la injusticia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Practica la justicia … y no camines por los caminos de la injusticia». Los términos griegos pueden expresar tanto rectitud personal como justicia e injusticia en sentido social.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μνημόνευε
  english_pob_choice: remember
  chosen_spanish: recuerda
  alternatives_spanish:
  - ten presente
  - acuérdate de
  lexicon: BDAG
  rationale: El imperativo griego pide una memoria continua y activa. «Recuerda» es natural en español y conserva la fuerza exhortativa sin suavizarla ni volverla paráfrasis.
- source_word: παιδίον
  english_pob_choice: child
  chosen_spanish: niño
  alternatives_spanish:
  - hijo
  - pequeño
  - criatura
  lexicon: LSJ
  rationale: Aunque el inglés POB opta por «child» para no especificar género, en español «niño» funciona como vocativo afectivo y suena más natural que un calco rígido. Mantiene la cercanía del trato sin añadir «mi» ni convertirlo en un título técnico.
- source_word: Κυρίου τοῦ θεοῦ ἡμῶν
  english_pob_choice: the Lord our God
  chosen_spanish: Yahvé, nuestro Dios
  alternatives_spanish:
  - el Señor, nuestro Dios
  - el Señor Dios nuestro
  lexicon: LSJ
  rationale: 'Se sigue la norma del proyecto para יהוה/YHWH: «Yahvé» en el texto principal. Aunque el griego dice κύριος, aquí la forma corresponde al Nombre divino del trasfondo bíblico; por eso no se enmascara con «SEÑOR». «Nuestro Dios» preserva el genitivo inclusivo.'
- source_word: μὴ θελήσῃς παραβῆναι
  english_pob_choice: Do not desire to transgress
  chosen_spanish: No desees transgredir
  alternatives_spanish:
  - No quieras transgredir
  - No te propongas quebrantar
  - No decidas violar
  lexicon: BDAG
  rationale: La construcción combina volición y acto; «no desees transgredir» conserva ambas capas mejor que un simple «no transgredas». «Transgredir» mantiene el registro bíblico y jurídico del mandato.
- source_word: ἐντολάς
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - preceptos
  - mandatos
  lexicon: BDAG
  rationale: «Mandamientos» es el equivalente bíblico más directo y mantiene el registro ético-religioso del texto sin volverlo arcaico.
- source_word: δικαιοσύνην ποίει
  english_pob_choice: Practice righteousness
  chosen_spanish: Practica la justicia
  alternatives_spanish:
  - Practica la rectitud
  - Haz justicia
  - Actúa con justicia
  lexicon: BDAG
  rationale: El griego puede leerse como «hacer justicia» o «practicar rectitud». En español, «practica la justicia» conserva el imperativo habitual y deja abierta la amplitud social y moral del término, como lo señala la nota inglesa.
- source_word: πάσας τὰς ἡμέρας τῆς ζωῆς σου
  english_pob_choice: all the days of your life
  chosen_spanish: todos los días de tu vida
  alternatives_spanish:
  - durante toda tu vida
  - cada día de tu vida
  lexicon: LSJ
  rationale: Es la equivalencia idiomática natural en español y retiene el énfasis de continuidad del original.
- source_word: μὴ πορευθῇς
  english_pob_choice: do not walk
  chosen_spanish: no camines
  alternatives_spanish:
  - no vayas
  - no sigas
  - no andes
  lexicon: BDAG
  rationale: «Caminar» conserva la metáfora bíblica de conducta y se enlaza bien con «los caminos» del miembro siguiente.
- source_word: ταῖς ὁδοῖς τῆς ἀδικίας
  english_pob_choice: in the ways of unrighteousness
  chosen_spanish: por los caminos de la injusticia
  alternatives_spanish:
  - por los caminos de la maldad
  - en los senderos de la injusticia
  - por las sendas de la injusticia
  lexicon: BDAG
  rationale: La oposición con δικαιοσύνη permite y favorece en español «justicia / injusticia». Además, «caminos» y «por los caminos» reproducen la metáfora de conducta con claridad natural.
theological_decisions:
- issue: 'δικαιοσύνη / ἀδικία: justicia vs. rectitud / injusticia vs. injusticia moral'
  english_pob_reading: righteousness / unrighteousness with footnoted justice / injustice alternative
  chosen_spanish_reading: justicia / injusticia
  alternative_spanish_readings:
  - rectitud / iniquidad
  - justicia / maldad
  rationale: Aunque el inglés POB privilegia «righteousness / unrighteousness», en español la pareja «justicia / injusticia» comunica con más naturalidad la amplitud moral y social del contraste. Se conserva la nota conceptual porque el griego admite ambas dimensiones y no conviene borrar esa tensión léxica.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη can carry both righteousness and justice; preserve the wider ethical force'
- issue: Renderizar el Nombre divino en una frase griega con κύριος
  english_pob_reading: the Lord our God
  chosen_spanish_reading: Yahvé, nuestro Dios
  alternative_spanish_readings:
  - el Señor, nuestro Dios
  rationale: La pauta del proyecto exige «Yahvé» cuando el trasfondo remite al Nombre divino. Aunque el griego emplea κύριος, en Tobit la referencia es al Dios de Israel, y mantener «Yahvé» evita la ocultación del Nombre y preserva la transparencia traductológica.
  doctrine_reference: Project terminology default for יהוה / YHWH -> Yahvé
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el texto base y la auditoría inglesa; no se registran revisiones aplicadas. La única tensión relevante es la pareja δικαιοσύνη / ἀδικία, que en español se resuelve con «justicia / injusticia» en el texto y se conserva como alternativa lexicográfica en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según el estándar del proyecto para el Nombre divino, aun cuando el griego tenga κύριος.
  - Se usa «mandamientos» para ἐντολάς por consistencia bíblica y claridad.
  - Se preserva la metáfora de caminar/caminos para μὴ πορευθῇς / ὁδοῖς.
  - No se introduce lenguaje eclesiástico adicional ni se suaviza la advertencia moral del texto.
