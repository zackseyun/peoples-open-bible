translation:
  language: es
  text: Y sucedió que al día siguiente tomó la tela de cubrir[a], la sumergió en agua, la extendió sobre su rostro, y murió[b]. Entonces Hazael reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la colcha», «el cubrecama» o «la tela tejida/enrejada»; el término hebreo es raro, así que no se puede precisar con certeza el tipo exacto de tela.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo no nombra explícitamente quién realizó estas acciones. En el contexto, muchos entienden que el sujeto es Hazael, pero el texto mismo solo dice «él» de manera implícita hasta que Hazael es nombrado en la cláusula final.
    reason: alternative_reading
lexical_decisions:
- source_word: מִמָּחֳרָת
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - en el día siguiente
  lexicon: HALOT
  rationale: La expresión temporal hebrea señala el día posterior al acontecimiento previo. «Al día siguiente» es natural en español y conserva la secuencia narrativa sin sobreexplicar.
- source_word: הַמַּכְבֵּר
  english_pob_choice: the covering cloth
  chosen_spanish: la manta
  alternatives_spanish:
  - la cubierta
  - la colcha
  - la tela de cubrir
  lexicon: HALOT
  rationale: El sustantivo es raro y el tipo exacto de objeto es incierto. «Manta» comunica una pieza de tela de cobertura en español claro y fluido; la incertidumbre léxica se preserva en la nota.
- source_word: וַיִּטְבֹּל בַּמַּיִם
  english_pob_choice: dipped it in water
  chosen_spanish: la sumergió en agua
  alternatives_spanish:
  - la metió en agua
  - la empapó en agua
  lexicon: HALOT
  rationale: El verbo indica inmersión o mojado por introducción en agua. «La sumergió en agua» mantiene bien la secuencia de acciones y evita un matiz de remojo más prolongado que no está explícito.
- source_word: וַיִּפְרֹשׂ עַל פָּנָיו
  english_pob_choice: spread it over his face
  chosen_spanish: la extendió sobre su rostro
  alternatives_spanish:
  - la puso sobre su rostro
  - la tendió sobre su rostro
  lexicon: HALOT
  rationale: «Extender» refleja el valor del verbo hebreo de desplegar o poner cubriendo. «Rostro» es una opción digna y precisa en español bíblico; se evita una formulación más idiomática que pudiera perder el paralelismo físico.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y falleció
  lexicon: HALOT
  rationale: El hebreo simplemente avanza la narración con una acción final. «Y murió» reproduce de modo directo la secuencia sin añadir causalidad ni reinterpretación.
- source_word: וַיִּמְלֹךְ חֲזָהאֵל תַּחְתָּיו
  english_pob_choice: Then Hazael reigned in his place
  chosen_spanish: Entonces reinó Hazael en su lugar
  alternatives_spanish:
  - Y Hazael reinó en su lugar
  - Entonces Hazael fue rey en su lugar
  lexicon: HALOT
  rationale: «Reinó» conserva el verbo de entronización/sucesión. «En su lugar» sigue la fórmula de reemplazo del hebreo y expresa la sucesión al trono con naturalidad.
theological_decisions:
- issue: Sujeto implícito de los verbos «tomó», «sumergió» y «extendió»
  english_pob_reading: Render with the English pronoun 'he' without identifying the subject by name in the main text
  chosen_spanish_reading: Mantener el sujeto implícito en la narración española hasta que se nombre explícitamente a Hazael en la cláusula final
  alternative_spanish_readings:
  - Identificar al sujeto como Hazael desde el inicio
  - Introducir un sujeto no especificado como «él» en la traducción principal
  rationale: El hebreo no nombra al actor en esas formas verbales; la identificación con Hazael es inferida por el contexto, pero no explicitada hasta el final. La redacción española evita añadir una certeza que el texto fuente no formula de manera abierta.
  doctrine_reference: Primacía del texto original; preservación de ambigüedad textual donde el hebreo la mantiene.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que corrigió la redacción causal «so that he died» por la simple secuencia narrativa «and he died». La traducción española refleja esa misma decisión y evita introducir una causalidad más fuerte que la del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «Hazael» como nombre propio transliterado de forma estándar.
  - Se evitó «SEÑOR» o una paráfrasis explicativa, porque no corresponden al hebreo de este versículo.
  - El tono es bíblico contemporáneo, con sintaxis clara y sin arcaísmos innecesarios.
