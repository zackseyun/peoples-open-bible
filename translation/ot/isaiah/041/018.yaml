id: ISA.41.18
reference: Isaiah 41:18
source:
  edition: WLC
  text: אֶפְתַּ֤ח עַל שְׁפָיִים֙ נְהָר֔וֹת וּ/בְ/ת֥וֹךְ בְּקָע֖וֹת מַעְיָנ֑וֹת אָשִׂ֤ים מִדְבָּר֙ לַ/אֲגַם מַ֔יִם וְ/אֶ֥רֶץ צִיָּ֖ה לְ/מוֹצָ֥אֵי מָֽיִם־־׃
translation:
  text: I will open rivers on the bare heights[a], and springs in the midst of the valleys; I will make the wilderness into a pool of water[b], and the dry land into springs of water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'high places,' 'barren hills' for 'bare heights.'
    reason: lexical_alternative
  - marker: b
    text: Or 'springs of water' for 'sources of water.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפְתַּח
  chosen: I will open
  alternatives:
  - I will make open
  - I will cause to open
  lexicon: HALOT
  rationale: Qal imperfect 1cs of פתח naturally means 'open.' 'I will open' is direct and idiomatic in English, preserving the divine first-person promise.
- source_word: שְׁפָיִים
  chosen: bare heights
  alternatives:
  - high places
  - treeless heights
  - barren hills
  lexicon: HALOT
  rationale: The noun refers to exposed, often barren heights. 'Bare heights' captures both elevation and lack of vegetation better than the more cultically loaded 'high places.'
- source_word: נְהָרוֹת
  chosen: rivers
  alternatives:
  - streams
  lexicon: HALOT
  rationale: The standard sense is 'rivers.' Although smaller watercourses are possible in context, 'rivers' best reflects the lexical value and the abundance imagery.
- source_word: וּבְתוֹךְ בְּקָעוֹת
  chosen: in the midst of the valleys
  alternatives:
  - in the valleys
  - within the plains
  lexicon: HALOT
  rationale: בקעות can denote valleys or broad depressions. Given the contrast with heights and the poetic parallelism, 'valleys' is the clearest English rendering. 'In the midst of' preserves בְתוֹךְ rather than flattening it.
- source_word: מַעְיָנוֹת
  chosen: springs
  alternatives:
  - fountains
  - water springs
  lexicon: HALOT
  rationale: The word denotes natural springs. 'Springs' is modern and precise; 'fountains' could sound artificial in contemporary English.
- source_word: אָשִׂים
  chosen: I will make
  alternatives:
  - I will set
  - I will turn
  lexicon: HALOT
  rationale: שׂים commonly means 'put, set, make.' In this transformational context, 'I will make' is idiomatic and preserves the causative sense without overinterpreting.
- source_word: מִדְבָּר
  chosen: the wilderness
  alternatives:
  - the desert
  lexicon: HALOT
  rationale: Both are possible, but 'wilderness' is slightly broader and fits prophetic diction well. It avoids implying only sandy desert terrain.
- source_word: לַאֲגַם מַיִם
  chosen: into a pool of water
  alternatives:
  - into a marsh
  - into a lake
  lexicon: HALOT
  rationale: אגם denotes a pool or marshy body of water. 'Pool of water' is the most neutral and natural in English, preserving the image of gathered water without narrowing it to a swamp or large lake.
- source_word: אֶרֶץ צִיָּה
  chosen: the dry land
  alternatives:
  - the parched land
  - the arid land
  lexicon: HALOT
  rationale: The phrase denotes land marked by dryness or drought. 'Dry land' is simple and readable, though the context implies severe dryness.
- source_word: לְמוֹצָאֵי מָיִם
  chosen: into sources of water
  alternatives:
  - into springs of water
  - into watercourses
  - into places where water springs out
  lexicon: HALOT
  rationale: מוֹצָאֵי literally refers to goings-out or outlets, here of water. 'Sources of water' captures the emergence point of water and avoids awkward repetition with the earlier מַעְיָנוֹת while preserving the sense.
