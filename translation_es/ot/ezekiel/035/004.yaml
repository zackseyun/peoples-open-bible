review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: «Haré tus ciudades … y tú …; entonces sabrás que yo soy Yahvé» preserva la estructura de juicio y la fórmula de reconocimiento. Sin embargo, «serás una desolación» atenúa el matiz de transición de תִהְיֶה que el expediente inglés documenta como «you will become». Además, la nota al pie [a] está anclada en «ruinas», pero su contenido explica el Tetragrámaton y debe ir anclada en «Yahvé».'
  spanish_quality_summary: El español es claro y digno, pero «Haré tus ciudades ruinas» suena algo duro/menos idiomático en español. «Convertiré tus ciudades en ruinas» o «Haré de tus ciudades ruinas» fluye mejor. Asimismo, la nota al pie está mal ubicada. El resto del versículo es natural y legible.
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: יְהוָה → «Yahvé» está correcto. «Ciudades», «desolación» y la fórmula «sabrás que yo soy Yahvé» son adecuadas. Se recomienda ajustar היה a «llegarás a ser» para conservar mejor el valor de cambio de estado documentado en el expediente POB.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «ruinas» pero explica «Yahvé».
    rationale: Las instrucciones exigen que el marcador aparezca en la palabra o frase pertinente. Aquí la nota trata del Tetragrámaton, por lo que debe ir en «Yahvé[a]», no en «ruinas[a]».
  - severity: medium
    issue: «Serás una desolación» no refleja tan bien el matiz de transición de תִהְיֶה.
    rationale: El expediente lexical inglés justifica «become» frente a «be». En español, «llegarás a ser una desolación» conserva mejor ese ingreso a un estado sin perder naturalidad.
  - severity: low
    issue: «Haré tus ciudades ruinas» es algo menos idiomático en español.
    rationale: Aunque comprensible, «convertiré tus ciudades en ruinas» suena más natural y expresa claramente la construcción causativa con predicado nominal.
  revised_spanish_text: Convertiré tus ciudades en ruinas, y tú llegarás a ser una desolación; entonces sabrás que yo soy Yahvé[a].
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR», pero aquí se translitera como «Yahvé» para conservar el nombre divino.'
    reason: alternative_reading
  revision_rationale: Se reubica la nota al pie en «Yahvé» porque trata del nombre divino. Se mejora «Haré tus ciudades ruinas» a «Convertiré tus ciudades en ruinas» por mayor naturalidad en español sin apartarse del hebreo. Se cambia «serás» por «llegarás a ser» para reflejar mejor el matiz de transición de היה señalado en el expediente inglés.
