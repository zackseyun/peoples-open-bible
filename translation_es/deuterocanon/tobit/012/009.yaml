revisions:
- from: La limosna rescata de la muerte[a], y ella limpiará toda pecad[a]. Los que practican limosnas y justicias[b] serán llenados de vida.
  to: La limosna rescata de la muerte y limpiará todo pecado. Los que practican limosnas y obras justas[a] serán llenados de vida.
  rationale: 'Se corrige el error textual ''toda pecad[a]'' a ''todo pecado'', se elimina el pronombre innecesario ''ella'', se reemplaza ''justicias'' por ''obras justas'' para una lectura natural y fiel al sentido práctico del plural δικαιοσύνας, y se reubica la única nota para que ancle correctamente en la cláusula donde aplica la alternativa inglesa preservada. No hace falta adjudicación adicional: el ajuste es claro, textual y estilístico, no una disputa doctrinal irresoluble.'
