translation:
  language: es
  text: 'Yahvé nuestro Dios nos habló en Horeb[a], diciendo[b]: «Han permanecido en este monte suficiente tiempo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Horeb, el nombre usado aquí para el monte también asociado con Sinaí.
    reason: cross_reference
  - marker: b
    text: 'O: «Basta ya; no permanezcan más en este monte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino יהוה, y el criterio POB documentado para español es mantenerlo como «Yahvé», no sustituirlo por un título. Se preserva así el nombre del pacto, en paralelo con el inglés «Yahweh».
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestros dioses
  lexicon: HALOT
  rationale: Aunque la forma hebrea procede de אֱלֹהִים, el contexto y el sufijo de primera persona plural exigen referencia singular al Dios de Israel. En español la forma idiomática y fiel es «nuestro Dios».
- source_word: דִּבֶּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - pronunció
  lexicon: HALOT
  rationale: El verbo דבר expresa hablar. «Habló» conserva el acto de comunicación y suena natural en español antes de la cita directa introducida por לֵאמֹר.
- source_word: אֵלֵינוּ
  english_pob_choice: to us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  - con nosotros
  lexicon: HALOT
  rationale: La preposición אֶל indica dirección hacia los destinatarios. En español, con el verbo «habló», el dativo clítico «nos» expresa de forma natural «habló ... a nosotros» sin añadir peso innecesario.
- source_word: בְּחֹרֵב
  english_pob_choice: at Horeb
  chosen_spanish: en Horeb
  alternatives_spanish:
  - en el Horeb
  lexicon: HALOT
  rationale: El ב locativo puede traducirse con «en». Se conserva el nombre propio «Horeb», como en el contexto inglés, porque el texto hebreo lo usa aquí y la tradición POB anota la relación con Sinaí en nota.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La fórmula introductoria del discurso se rinde de manera directa con «diciendo», que introduce correctamente la cita sin forzar un giro más interpretativo.
- source_word: רַב לָכֶם
  english_pob_choice: You have stayed ... long enough
  chosen_spanish: Ya es suficiente
  alternatives_spanish:
  - Basta ya
  - Es bastante para ustedes
  lexicon: HALOT
  rationale: La expresión hebrea comunica suficiencia/exceso. En español, el núcleo idiomático que mejor preserva el sentido es «Ya es suficiente», evitando una paráfrasis que dependa demasiado de «quedarse» o «estar».
- source_word: שֶׁבֶת
  english_pob_choice: stayed
  chosen_spanish: haber permanecido
  alternatives_spanish:
  - quedarse
  - estar
  - habitar
  lexicon: HALOT
  rationale: שֶׁבֶת, infinitivo de ישׁב, indica permanencia prolongada. «Haber permanecido» mantiene el valor verbal y la duración implícita en la sentencia de suficiencia.
- source_word: בָּהָר הַזֶּה
  english_pob_choice: at this mountain
  chosen_spanish: en este monte
  alternatives_spanish:
  - en esta montaña
  - sobre este monte
  lexicon: HALOT
  rationale: הַר puede ser «monte» o «montaña». Dado el registro bíblico y el contexto de Horeb, «monte» es más sobrio y tradicional en español, pero sin recurrir a una formulación eclesiástica que oculte el topónimo o la imagen espacial.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre propio del pacto en lugar de reemplazarlo por un título. La lectura española sigue la política POB de transliteración del Tetragrama y mantiene la transparencia respecto del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación entre Horeb y Sinaí
  english_pob_reading: Horeb, the name used here for the mountain also associated with Sinai
  chosen_spanish_reading: Horeb
  alternative_spanish_readings:
  - Sinaí
  rationale: El hebreo nombra Horeb; no se armoniza a Sinaí en el texto principal. La relación con Sinaí se deja para la nota, preservando la forma del texto fuente y la distinción terminológica documentada.
  doctrine_reference: Consistencia toponímica POB / cross-reference audit
- issue: Sentido de רַב לָכֶם שֶׁבֶת
  english_pob_reading: You have stayed ... long enough
  chosen_spanish_reading: Ya es suficiente que hayan permanecido en este monte
  alternative_spanish_readings:
  - Basta ya de permanecer en este monte
  - Han permanecido aquí bastante tiempo
  rationale: La construcción hebrea expresa suficiencia y terminación de una permanencia prolongada. La redacción elegida conserva el mandato implícito de fin de estadía sin perder el valor idiomático de la frase.
  doctrine_reference: Lexical force of sufficiency / HALOT
- issue: Número y persona en la exhortación
  english_pob_reading: You have stayed ...
  chosen_spanish_reading: hayan permanecido
  alternative_spanish_readings:
  - han permanecido
  - permanezcan
  rationale: El hebreo se dirige a un grupo («a ustedes»). En español, el subjuntivo perfecto mantiene el matiz retrospectivo de la suficiencia y evita una simple descripción neutra, acercándose al tono exhortativo del enunciado.
  doctrine_reference: Discourse force of Hebrew address
translation_notes:
  revision_awareness: El contexto inglés fue revisado y quedó sin cambios sustanciales; la cruz de control indicó alta concordancia y ninguna corrección aplicada. La redacción española sigue ese mismo estado estable, conservando las decisiones auditadas sobre Yahvé, Horeb y la expresión de suficiencia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme a la terminología POB en español.
  - Se conserva «Horeb» en el cuerpo y se explica su asociación con Sinaí en nota, sin armonización.
  - Se usa «monte» para הַר en un registro bíblico natural y coherente con el contexto.
  - La nota b refleja la alternativa lexical del hebreo, preservando la tensión entre suficiencia y prohibición implícita.
  - La cita directa en español respeta la estructura del verso sin añadir contenido interpretativo ajeno al hebreo.
