base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/005.yaml
  text: For he was afraid to tell Noah about it, lest he be angry with him because of it. And in the fifth jubilee, in the first week, in the first year, he took a wife, and her name was Melka, the daughter of Madai, the son of Japheth; and in the fourth year of it he fathered a son, and he called his name Salah.
  footnotes:
  - marker: a
    text: Or 'in the fourth year she bore him a son'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:50Z'
    unchanged: false
    changes_summary: Removed unsupported material ('he wrote it down and said nothing about it') and restored the omitted second sentence about the fifth jubilee, Noah's wife Melka, and the birth and naming of Salah. Adjusted wording for accuracy and natural formal English.
translation:
  language: es
  text: Porque tenía miedo de decírselo a Noé, no fuera que se enojara con él por eso. Y en el quinto jubileo, en la primera semana, en el primer año, tomó esposa, y su nombre era Melca, hija de Madai, hijo de Jafet; y en el cuarto año de esa semana engendró un hijo, y le puso por nombre Salah.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: እስመ / because
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque era que
  lexicon: causal conjunction
  rationale: La cláusula causal debe abrir la oración con naturalidad en español; «Porque» conserva la relación explicativa sin añadir matiz interpretativo.
- source_word: ይፈርህ / was afraid
  english_pob_choice: was afraid
  chosen_spanish: tenía miedo
  alternatives_spanish:
  - temía
  - estaba temeroso
  lexicon: verb of fear
  rationale: «Tenía miedo» comunica bien la emoción de temor en español moderno y sigue la fuerza directa del ge’ez sin endurecer el estilo.
- source_word: ነጊረ / tell
  english_pob_choice: tell
  chosen_spanish: decirle
  alternatives_spanish:
  - contarle
  - informarle
  lexicon: speech verb
  rationale: El verbo base es «decir»; el dativo «le» mantiene la referencia explícita a Noé y evita una paráfrasis excesiva.
- source_word: ከመ፡ ኢይትመዐዐ / lest he be angry
  english_pob_choice: lest he be angry
  chosen_spanish: no fuera que se enojara
  alternatives_spanish:
  - para que no se enojara
  - no sea que se enoje
  lexicon: fear/purpose clause
  rationale: «No fuera que» reproduce la cláusula de prevención o temor implícita en el original y preserva el sentido hipotético de la reacción de Noé.
- source_word: በእንቲአሃ / because of it
  english_pob_choice: because of it
  chosen_spanish: por eso
  alternatives_spanish:
  - a causa de ello
  - por ello
  lexicon: causal reference
  rationale: «Por eso» es un equivalente idiomático claro para retomar el motivo del enojo sin cargar la frase de forma artificial.
- source_word: ነሥአ፡ ሎቱ፡ ብእሲተ / he took a wife
  english_pob_choice: he took a wife
  chosen_spanish: tomó esposa
  alternatives_spanish:
  - tomó una esposa
  - tomó mujer
  lexicon: marriage formula
  rationale: Se conserva la fórmula narrativa directa. «Tomó esposa» suena sobrio y fiel al registro genealógico del pasaje.
- source_word: ሜልካ / Melka
  english_pob_choice: Melka
  chosen_spanish: Melca
  alternatives_spanish:
  - Melka
  lexicon: proper name
  rationale: Se adapta la grafía al español con «c» para reflejar pronunciación aproximada y facilitar lectura, sin alterar el nombre propio.
- source_word: ወለተ፡ አመዳይ፡ ወልደ፡ ያፌት / the daughter of Madai, the son of Japheth
  english_pob_choice: the daughter of Madai, the son of Japheth
  chosen_spanish: la hija de Madai, hijo de Jafet
  alternatives_spanish:
  - la hija de Madai, el hijo de Jafet
  - la hija de Madai, descendiente de Jafet
  lexicon: genealogical apposition
  rationale: La apposición genealógica se mantiene compacta y clara. «Jafet» sigue la forma bíblica habitual en español.
- source_word: ወበዓመት፡ ራብዕ / in the fourth year of it
  english_pob_choice: in the fourth year of it
  chosen_spanish: en el cuarto año de ella
  alternatives_spanish:
  - en el cuarto año de eso
  - en su cuarto año
  lexicon: temporal formula
  rationale: Aunque el referente es el jubileo/semana, se conserva el femenino de referencia cercano a «semana» como solución española natural y transparente; el contexto numérico sigue el patrón cronológico del pasaje.
- source_word: ወሊደ / fathered a son
  english_pob_choice: he fathered a son
  chosen_spanish: concibió un hijo
  alternatives_spanish:
  - engendró un hijo
  - tuvo un hijo
  lexicon: procreation verb
  rationale: El ge’ez es masculino y activa la paternidad del sujeto; en español, «concibió» preserva bien la idea de dar origen a un hijo, aunque «engendró» sería más literal. Se evita «tuvo» por ser más vago.
- source_word: ወጸውዐ ስሞ / he called his name
  english_pob_choice: he called his name
  chosen_spanish: le puso por nombre
  alternatives_spanish:
  - lo llamó
  - llamó su nombre
  lexicon: naming formula
  rationale: «Le puso por nombre» es la fórmula española más natural y fiel para la designación nominal.
- source_word: Salah
  english_pob_choice: Salah
  chosen_spanish: Salah
  alternatives_spanish:
  - Sala
  lexicon: proper name
  rationale: Se conserva la forma propia usada en la fuente y en la tradición bíblica española más cercana.
theological_decisions:
- issue: La reacción de Noé como motivo de ocultamiento
  english_pob_reading: lest he be angry with him because of it
  chosen_spanish_reading: no fuera que se enojara con él por eso
  alternative_spanish_readings:
  - no sea que se enoje con él por eso
  - para que no se enojara con él
  rationale: La frase mantiene el temor relacional sin añadir juicio doctrinal. No se suaviza ni se amplifica el conflicto; solo se transmite el motivo narrativo tal como está en la fuente.
  doctrine_reference: Narrative restraint; no doctrinal expansion
- issue: Cronología del quinto jubileo y su cuarta año
  english_pob_reading: in the fifth jubilee, in the first week, in the first year ... and in the fourth year of it
  chosen_spanish_reading: en el quinto jubileo, en la primera semana, en el primer año ... y en el cuarto año de ella
  alternative_spanish_readings:
  - en el quinto jubileo, en la primera semana, en el primer año ... y en el cuarto año de él
  - en el cuarto año de ese jubileo
  rationale: Se conserva la estructura cronológica del texto apocalíptico sin reinterpretarla. El referente inmediato de «semana» hace natural el femenino en español, aunque la lectura funcional apunta al bloque temporal del jubileo.
  doctrine_reference: Chronological formula in Jubilees; no doctrinal claim
- issue: Paternidad expresada con verbo masculino singular
  english_pob_reading: he fathered a son
  chosen_spanish_reading: concibió un hijo
  alternative_spanish_readings:
  - engendró un hijo
  - engendró a un hijo
  rationale: La revisión inglesa confirmó que el sujeto es masculino y que no se trata de que la esposa diera a luz. En español, «concibió» comunica el evento generativo sin introducir una falsedad biológica sobre el sujeto narrativo; aun así, «engendró» es la alternativa más literal y queda disponible.
  doctrine_reference: Textual accuracy; genealogical narration
translation_notes:
  revision_awareness: 'Se revisó el cierre del versículo a la luz del pase de corrección: el sujeto del verbo genealógico es masculino y la referencia cronológica es «in the fourth year of it», no «she bore him a son». Por eso la versión española evita cualquier construcción que haga a Melca sujeto del nacimiento y conserva la secuencia cronológica completa del texto restaurado.'
  spanish_consistency_notes:
  - Se mantiene Yahvé no aplicable aquí; el pasaje usa nombres propios y fórmulas genealógicas.
  - Se conserva la forma «Jafet» en lugar de «Jafet» con variantes para uniformidad bíblica en español.
  - Se usa «jubileo» y «semana» en el sentido técnico propio de Jubileos, sin reinterpretación calendárica.
  - La nota al pie está anclada únicamente en la frase «concibió un hijo» mediante [a].
