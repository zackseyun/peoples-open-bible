    reason: lexical_alternative
  revision_rationale: Se ajusta «y les habló» a «y les dijo» para reflejar mejor la fórmula narrativa hebrea con cita directa y sonar más natural en español. Se conserva «hombre de Dios» y el jussivo «descienda fuego». Se añade una nota cultural para «tus/sus cincuenta», ya que la elipsis militar puede no ser inmediata en español. En la segunda mitad se mantiene explícitamente «fuego de Dios», conforme al hebreo אֵשׁ אֱלֹהִים y a la documentación léxica, y se suaviza la frase final con una puntuación que mejora la naturalidad sin alterar el sentido.
