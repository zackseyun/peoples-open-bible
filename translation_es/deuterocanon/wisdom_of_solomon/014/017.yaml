review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien el sentido general del griego: incapacidad de honrar en presencia por la distancia, reproducción de la apariencia, fabricación de una imagen, y propósito de halagar al ausente como si estuviera presente. Sin embargo, hay un desajuste importante en la colocación de las notas: la nota [a] está anclada en «en persona», pero la alternativa documentada corresponde a τὴν πόρρωθεν ὄψιν («la apariencia distante / la apariencia desde lejos»), no a ἐν ὄψει. Además, «apariencia distante» suena algo calcada en español; «apariencia de lejos» transmite mejor el matiz visual y espacial del original.'
  spanish_quality_summary: El español es claro y digno, pero requiere una reparación menor para mejorar naturalidad y coherencia de notas. «Como no podían honrarlos en persona porque vivían lejos» funciona bien. «Reprodujeron la apariencia de lejos» suena más natural que «la apariencia distante». El resto del verso es legible; «halagaran al ausente como si estuviera presente» comunica bien κολακεύωσιν y la antítesis ausente/presente.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Honrar» respeta la decisión de no intensificar τιμᾶν a lenguaje cultual. «Halagaran» preserva el tono crítico de κολακεύωσιν. No aparecen términos sensibles del glosario principal como Yahvé, Mesías, Espíritu, etc.
  issues:
  - severity: high
    issue: La nota [a] está anclada en la frase equivocada.
    rationale: La nota «O “de la apariencia desde lejos” para “la apariencia distante”» explica τὴν πόρρωθεν ὄψιν, pero en el borrador [a] aparece sobre «en persona», que traduce ἐν ὄψει. Esto rompe la trazabilidad entre texto y nota.
  - severity: medium
    issue: «La apariencia distante» es poco idiomático en español.
    rationale: Aunque es comprensible, suena más calco del inglés que español natural. «La apariencia de lejos» o «la apariencia desde lejos» mantiene el valor visual de ὄψις con πόρρωθεν de forma más clara.
  - severity: low
    issue: La nota [b] está correctamente formulada, pero queda mejor anclada en el verbo de finalidad.
    rationale: La alternativa documenta κολακεύωσιν como «cortejaran el favor». Conviene mantenerla vinculada al tramo verbal final del propósito.
  revised_spanish_text: Como no podían honrarlos en persona porque vivían lejos, reprodujeron la apariencia de lejos[a] e hicieron una imagen visible del rey honrado, para que, con su celo, halagaran[b] al ausente como si estuviera presente.
  revised_footnotes:
