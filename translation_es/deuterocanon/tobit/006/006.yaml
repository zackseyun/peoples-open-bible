translation:
  language: es
  text: Y el muchacho hizo como el ángel le había dicho. Entonces asaron el pez y lo comieron, y ambos siguieron viajando hasta que se acercaron a Ecbatana[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego indica aproximación a Ecbatana, no necesariamente la llegada completa a la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ παιδάριον
  english_pob_choice: the young man
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el joven
  - el muchacho joven
  - el chico
  lexicon: BDAG
  rationale: En este contexto narrativo Tobias no funciona como un niño pequeño, sino como un viajero en edad de matrimonio. «Muchacho» conserva la idea de juventud sin sonar demasiado técnico o demasiado infantil.
- source_word: ἐποίησεν
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - cumplió
  - realizó
  lexicon: BDAG
  rationale: El verbo expresa obediencia concreta a la instrucción del ángel; «hizo» es natural en español y mantiene la simplicidad del griego.
- source_word: ὡς εἶπεν αὐτῷ ὁ ἄγγελος
  english_pob_choice: as the angel told him
  chosen_spanish: como el ángel le había dicho
  alternatives_spanish:
  - como el ángel le dijo
  - como el ángel le había ordenado
  - según le había dicho el ángel
  lexicon: BDAG
  rationale: «Le había dicho» refleja bien la relación temporal y la obediencia a una instrucción verbal, sin forzar el matiz a una orden formal.
- source_word: τὸν δὲ ἰχθὺν ὀπτήσαντες
  english_pob_choice: they roasted the fish
  chosen_spanish: asaron el pez
  alternatives_spanish:
  - rostizaron el pez
  - lo asaron
  - lo cocinaron al fuego
  lexicon: BDAG
  rationale: «Asaron» expresa el sentido de ὀπτάω en un español natural. Se mantiene «el pez» para conservar el referente explícito del griego, aunque luego el pronombre lo retoma de forma idiomática.
- source_word: ἔφαγον
  english_pob_choice: ate it
  chosen_spanish: lo comieron
  alternatives_spanish:
  - comieron
  - comieron de él
  lexicon: BDAG
  rationale: El objeto está implícito en el contexto; «lo comieron» lo hace explícito de manera natural y evita una elipsis que en español podría sonar abrupta.
- source_word: ὥδευον
  english_pob_choice: traveled on
  chosen_spanish: siguieron viajando
  alternatives_spanish:
  - continuaron el viaje
  - iban de camino
  - prosiguieron
  lexicon: BDAG
  rationale: El imperfecto señala una acción continua. «Siguieron viajando» comunica ese avance sostenido con un español claro y fluido.
- source_word: ἀμφότεροι
  english_pob_choice: both of them
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos dos
  - los dos juntos
  lexicon: BDAG
  rationale: «Ambos» preserva explícitamente que viajan juntos Tobias y el ángel, sin necesidad de repetir los participantes.
- source_word: ἕως ἤγγισαν
  english_pob_choice: until they came near
  chosen_spanish: hasta que llegaron cerca
  alternatives_spanish:
  - hasta que se acercaron
  - hasta que estuvieron cerca
  - hasta que llegaron a las cercanías
  lexicon: BDAG
  rationale: La idea central es aproximación, no necesariamente llegada plena. «Llegaron cerca» conserva esa tensión y suena idiomático en español.
- source_word: ἐν Ἐκβατάνοις
  english_pob_choice: Ecbatana
  chosen_spanish: Ecbatana
  alternatives_spanish:
  - Ecbátana
  - en Ecbatana
  lexicon: LSJ
  rationale: El topónimo se translitera de forma estable. En español, «Ecbatana» es reconocible y mantiene continuidad con el nombre propio del relato.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español en el lugar correspondiente. No se añadieron notas no ancladas.
  spanish_consistency_notes:
  - Se mantuvo un registro narrativo simple y sobrio, acorde con Tobit.
  - Se evitó traducir mecánicamente desde el inglés cuando el español pedía una coordinación más natural.
  - Se conservó la tensión lexical de ἕως ἤγγισαν mediante una nota, sin borrar el matiz de aproximación.
