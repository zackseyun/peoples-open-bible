translation:
  language: es
  text: Rescaten al pobre y al necesitado[a]; líbrenlos de la mano de los impíos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el débil y el necesitado». El hebreo דַל puede significar «pobre» o «débil», destacando tanto la vulnerabilidad como la pobreza.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּלְּטוּ
  english_pob_choice: Rescue
  chosen_spanish: Rescaten
  alternatives_spanish:
  - Libren
  - Salven
  lexicon: HALOT
  rationale: El imperativo plural pide intervención activa para poner a alguien a salvo. «Rescaten» comunica con claridad esa acción urgente en un español actual y digno.
- source_word: דַל
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el débil
  - el necesitado
  - el humilde
  lexicon: HALOT
  rationale: En paralelo con אֶבְיוֹן y en un contexto de injusticia, el término apunta a una persona socialmente vulnerable; «el pobre» conserva bien ese campo semántico en español.
- source_word: אֶבְיוֹן
  english_pob_choice: needy
  chosen_spanish: el necesitado
  alternatives_spanish:
  - el indigente
  - el menesteroso
  - el que está en necesidad
  lexicon: HALOT
  rationale: «Necesitado» mantiene la idea de carencia o penuria sin volver el verso artificial; además diferencia levemente el término del primer miembro paralelo.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de las manos de
  - del dominio de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y concreta. «De la mano de» reproduce la imagen de control o poder ejercido por los agresores, manteniendo la metáfora bíblica.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los injustos
  - los perversos
  lexicon: HALOT
  rationale: En el lenguaje bíblico, רְשָׁעִים no solo describe maldad moral general, sino también culpa e injusticia. «Impíos» preserva ese tono ético-judicial y es un término bien asentado en español bíblico.
- source_word: הַצִּילוּ
  english_pob_choice: deliver
  chosen_spanish: líbrenlos
  alternatives_spanish:
  - delíverenlos
  - sáquenlos
  - arránquenlos
  lexicon: HALOT
  rationale: El segundo imperativo añade el matiz de librar de una situación de dominio o peligro. «Líbrenlos» conserva el paralelismo con «Rescaten» y la fuerza del mandato sin duplicarlo mecánicamente.
theological_decisions:
- issue: Cómo preservar los dos imperativos paralelos sin fusionarlos
  english_pob_reading: 'Use two coordinated commands: ''Rescue ...; deliver ...'''
  chosen_spanish_reading: 'Usar dos mandatos coordinados: «Rescaten ...; líbrenlos ...»'
  alternative_spanish_readings:
  - «Rescaten al pobre y al necesitado de la mano de los impíos»
  rationale: El hebreo usa dos imperativos en paralelo para intensificar la obligación de proteger a los vulnerables. Mantener ambos verbos conserva la urgencia poética y la fuerza judicial del versículo.
  doctrine_reference: 'Translation philosophy §5: Consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: La revisión más reciente del texto fuente inglés no introdujo cambios; el acuerdo de revisión fue alto y se mantuvo la lectura base sin modificaciones. Por eso la propuesta española sigue de cerca el trazado auditado del inglés, pero decide cada término a partir del hebreo.
  spanish_consistency_notes:
  - Se preserva la distinción entre rescatar y librar para reflejar los dos imperativos hebreos.
  - «Impíos» se usa aquí por su valor bíblico-ético y su afinidad con el tono judicial del salmo.
  - La nota de pie de página solo se ancla en «pobre» porque la ambigüedad léxica relevante pertenece a דַל; no se añade otra nota para אֶבְיוֹן porque «necesitado» ya es suficientemente transparente en español.
