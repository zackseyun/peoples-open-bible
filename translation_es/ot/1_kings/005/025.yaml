review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: Salomón dio a Hiram una cantidad específica de trigo y aceite, y luego se indica la práctica repetida anual. También conserva correctamente ''trigo'', la unidad antigua ''cor'', y la nota sobre ''aceite batido''. Sin embargo, en español ''se lo daría'' introduce un matiz potencialmente condicional o futuro en el pasado menos natural que el valor habitual del imperfecto hebreo en este contexto; conviene una forma habitual más clara.'
  spanish_quality_summary: 'El texto es mayormente claro y fiel, pero tiene dos detalles de naturalidad y precisión: ''veinte mil cor / veinte cor'' debe ir en plural en español (''cores'') para concordancia idiomática con el numeral, y ''se lo daría'' suena menos natural que ''solía darle'' o ''le daba''. Además, ''para su casa'' es aceptable, pero ''para su casa[a]'' puede mantenerse si la nota aclara la referencia a la casa real/corte.'
  glossary_alignment: No hay términos teológicos sensibles aquí. 'Trigo' para חִטִּים y 'aceite batido' para שֶׁמֶן כָּתִית están bien alineados con el audit trail. La unidad כֹּר se preserva mejor como 'cores' en el texto español, manteniendo la transliteración técnica sin volverla genérica.
  issues:
  - severity: medium
    issue: Uso de 'se lo daría' para יִתֵּן ... שָׁנָה בְשָׁנָה
    rationale: Aunque comprensible, en español puede leerse como condicional/futuro del pasado. El hebreo con כֹּה + imperfecto + 'año tras año' expresa práctica habitual. 'solía darle' o 'le daba' comunica mejor ese valor.
  - severity: medium
    issue: Número de la unidad 'cor' tras numerales
    rationale: 'En español, con un sustantivo contable adaptado, lo natural es pluralizar: ''veinte mil cores'' y ''veinte cores''. Dejar ''cor'' invariable suena poco idiomático y entorpece la lectura.'
  - severity: low
    issue: Anclaje 'su casa' puede sonar demasiado doméstico sin apoyo de la nota
    rationale: La nota ya aclara bien que probablemente se refiere al entorno palaciego/real de Hiram. El texto principal puede mantenerse cercano al hebreo mientras la nota preserve esa explicación.
  revised_spanish_text: Y Salomón dio a Hiram veinte mil cores de trigo como alimento para su casa[a], y veinte cores de aceite batido[b]. Así Salomón solía darle a Hiram año tras año.
  revised_footnotes:
