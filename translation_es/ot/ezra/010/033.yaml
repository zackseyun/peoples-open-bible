lexical_decisions:
- source_word: מִ/בְּנֵי
  english_pob_choice: From the sons of
  chosen_spanish: De los hijos de
  alternatives_spanish:
  - Entre los hijos de
  - De la casa de
  lexicon: HALOT
  rationale: En una lista genealógica, la preposición introduce miembros pertenecientes a un grupo familiar. «De los hijos de» conserva bien ese valor de procedencia/pertenencia sin sonar forzado en español.
- source_word: חָשֻׁם
  english_pob_choice: Hashum
  chosen_spanish: Hashum
  alternatives_spanish:
  - Jasum
  lexicon: HALOT
  rationale: Nombre propio; se translitera para mantener la forma reconocible del registro bíblico y evitar una traducción impropia.
- source_word: מַתְּנַי
  english_pob_choice: Mattenai
  chosen_spanish: Mattenai
  alternatives_spanish:
  - Matenai
  lexicon: HALOT
  rationale: Nombre propio transliterado; se conserva la forma tradicional próxima al hebreo y al audit trail en inglés.
- source_word: מַתַּתָּה
  english_pob_choice: Mattattah
  chosen_spanish: Mattattah
  alternatives_spanish:
  - Mattathah
  lexicon: HALOT
  rationale: Nombre propio transliterado; se preserva la duplicación consonántica reflejada en la forma inglesa auditada. Se mantiene la grafía del inglés POB como referencia trazable.
- source_word: זָבָד
  english_pob_choice: Zabad
  chosen_spanish: Zabad
  alternatives_spanish:
  - Zabad
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente, sin intento de equivalencia semántica.
- source_word: אֱלִיפֶלֶט
  english_pob_choice: Eliphelet
  chosen_spanish: Eliphelet
  alternatives_spanish:
  - Elifelet
  lexicon: HALOT
  rationale: Nombre propio transliterado con la forma convencional usada en el contexto bíblico en inglés.
- source_word: יְרֵמַי
  english_pob_choice: Jeremai
  chosen_spanish: Jeremai
  alternatives_spanish:
  - Jeremay
  lexicon: HALOT
  rationale: Nombre propio transliterado; se conserva la terminación -ai que corresponde al patrón inglés auditado.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasés
  lexicon: HALOT
  rationale: Nombre propio bíblico con forma asentada en español. Aunque el inglés POB usa la transliteración «Manasseh», en español «Manasés» es la equivalencia tradicional y legible para este antropónimo.
- source_word: שִׁמְעִי
  english_pob_choice: Shimei
  chosen_spanish: Shimei
  alternatives_spanish:
  - Shimi
  lexicon: HALOT
  rationale: Nombre propio transliterado; se conserva la forma habitual de referencia bíblica y se evita una españolización artificial.
translation_notes:
  revision_awareness: El pasaje presenta acuerdo alto con el texto base; no se requirieron revisiones sustantivas. Se mantuvo la estructura de lista genealógica y la transliteración de nombres propios, con la única adaptación habitual al español para Manasseh > Manasés por claridad y uso bíblico asentado.
  spanish_consistency_notes:
  - Se preserva «hijos de» para בְּנֵי en contexto genealógico/listado.
  - Se mantuvieron los nombres propios sin traducir, siguiendo la práctica POB de transliteración y la legibilidad bíblica en español.
  - Se optó por «Manasés» como forma española establecida, coherente con el uso bíblico en español, sin afectar la trazabilidad del nombre propio.
