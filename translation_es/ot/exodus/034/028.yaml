  to: Y estuvo allí con Yahvé cuarenta días y cuarenta noches; no comió pan ni bebió agua. Y escribió[a] sobre las tablas las palabras del pacto[b], las diez palabras.
  rationale: Se corrige el error gramatical «los diez palabras» a «las diez palabras» para reflejar fielmente el hebreo y el buen español. Se mueve la nota sobre el sujeto de «escribió» al verbo pertinente, y se conserva una nota separada para la designación tradicional «los Diez Mandamientos».
