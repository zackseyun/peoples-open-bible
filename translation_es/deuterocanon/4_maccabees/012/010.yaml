translation:
  language: es
  text: 'Y corriendo hasta ponerse cerca de las sartenes[a], dijo[b]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cerca de las sartenes» o «junto a las sartenes». La expresión griega ἐπὶ πλησίον combina movimiento hacia un lugar con proximidad inmediata.
    reason: lexical_alternative
  - marker: b
    text: τήγανα son utensilios de cocina, aquí las sartenes o planchas calentadas que funcionan como instrumentos de tortura en el contexto narrativo.
    reason: cultural_note
lexical_decisions:
- source_word: δραμὼν
  english_pob_choice: running
  chosen_spanish: corriendo
  alternatives_spanish:
  - habiendo corrido
  - después de correr
  lexicon: LSJ
  rationale: El participio aoristo expresa una acción previa y veloz antes del verbo principal. «Corriendo» conserva el movimiento vivo del relato sin volverlo pesado en español.
- source_word: ἐπὶ πλησίον
  english_pob_choice: up close to
  chosen_spanish: hasta cerca de
  alternatives_spanish:
  - cerca de
  - junto a
  - hacia la cercanía de
  lexicon: LSJ
  rationale: La expresión combina impulso direccional y proximidad inmediata. «Hasta cerca de» mantiene ese desplazamiento hacia la proximidad en un español natural.
- source_word: τῶν τηγάνων
  english_pob_choice: the frying pans
  chosen_spanish: las sartenes
  alternatives_spanish:
  - los sartenes
  - las ollas
  - las planchas
  lexicon: LSJ
  rationale: τήγανον designa un utensilio de cocción, literalmente una sartén o sartén/pan plano. En este contexto martirial alude a instrumentos de tortura calentados; «sartenes» es la equivalencia léxica más directa y comprensible.
- source_word: ἔφη
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - declaró
  lexicon: LSJ
  rationale: Es la fórmula narrativa usual de introducción del habla. «Dijo» es el equivalente español más natural y preciso.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada nota al pie tenga su marcador correspondiente exactamente anclado en el texto español.
  spanish_consistency_notes:
