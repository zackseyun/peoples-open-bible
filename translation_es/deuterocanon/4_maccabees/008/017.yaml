translation:
  language: es
  text: ¡Ay de nosotros! ¡Qué miserables y totalmente insensatos somos! Cuando el rey nos exhorta y nos llama a recibir un beneficio[a], ¿no deberíamos dejarnos convencer por él?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿no deberíamos obedecerle?». El griego πεισθείημεν puede llevar el sentido de ser persuadidos y, por extensión, ceder u obedecer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὦ τάλανες
  english_pob_choice: Alas for us! How miserable
  chosen_spanish: ¡Ay de nosotros! ¡Qué miserables somos!
  alternatives_spanish:
  - ¡Ay de nosotros, qué desdichados somos!
  - ¡Pobre de nosotros!
  - ¡Ay de nosotros, qué wretched somos!
  lexicon: LSJ
  rationale: Ὦ introduce una exclamación de lamento; τάλανες expresa miseria o desdicha. En español, «¡Ay de nosotros!» conserva el tono exclamativo y lamentoso, y «qué miserables somos» reproduce la autodenuncia sin caer en calco rígido.
- source_word: λίαν ἀνόητοι
  english_pob_choice: utterly foolish
  chosen_spanish: totalmente insensatos
  alternatives_spanish:
  - sumamente necios
  - completamente insensatos
  - excesivamente necios
  lexicon: LSJ
  rationale: λίαν intensifica ἀνόητοι. «Totalmente insensatos» comunica la fuerza del reproche y mantiene un registro natural y digno en español.
- source_word: βασιλέως
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - un rey
  lexicon: LSJ
  rationale: El genitivo absoluto apunta a un rey determinado por el contexto; por eso el artículo definido es la opción más fiel en español.
- source_word: παρακαλοῦντος
  english_pob_choice: urges
  chosen_spanish: nos exhorta
  alternatives_spanish:
  - nos urge
  - nos ruega
  - nos apela
  lexicon: LSJ
  rationale: παρακαλέω aquí expresa una apelación insistente. «Nos exhorta» conserva el matiz de presión persuasiva y funciona bien en castellano eclesial contemporáneo.
- source_word: ἐπὶ εὐεργεσίᾳ φωνοῦντος
  english_pob_choice: calls us to receive a benefit
  chosen_spanish: nos llama a recibir un beneficio
  alternatives_spanish:
  - nos llama con una oferta de favor
  - nos convoca para hacernos un bien
  - nos llama a una bienhechuranza
  lexicon: LSJ
  rationale: La frase indica que el rey llama con vistas a un acto de beneficencia o favor. «Recibir un beneficio» sigue de cerca el sentido sin añadir contenido ajeno y es suficientemente claro en español.
- source_word: μὴ πεισθείημεν αὐτῷ;
  english_pob_choice: should we not be persuaded by him?
  chosen_spanish: ¿no deberíamos ser persuadidos por él?
  alternatives_spanish:
  - ¿no deberíamos obedecerle?
  - ¿no deberíamos ceder ante él?
  - ¿no deberíamos dejarnos convencer por él?
  lexicon: LSJ
  rationale: πείθομαι puede significar ser persuadido, dejarse convencer u obedecer según el contexto. Se conserva «ser persuadidos» para mantener la tensión lexical documentada por la POB inglesa y evitar cerrar demasiado el sentido.
translation_notes:
  revision_awareness: La versión inglesa revisada separa con una exclamación inicial la interjección de lamento («Alas for us!») y mantiene el resto sin cambios. La propuesta española refleja esa misma pausa con una exclamación independiente y conserva la ambigüedad de πεισθείημεν mediante una nota textual/lexical.
  spanish_consistency_notes:
  - Se usa «rey» con artículo definido, conforme al contexto inmediato del pasaje.
  - Se mantiene «beneficio» para εὐεργεσία, sin convertirlo en un término litúrgico o teológico no presente en el griego.
  - Se preserva la distinción entre exhortación y persuasión, evitando sustituirla directamente por «obedecer» en el texto principal.
