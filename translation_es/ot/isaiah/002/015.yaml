translation:
  language: es
  text: y contra toda torre alta[a], y contra toda muralla fortificada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre toda torre alta, y sobre toda muralla fortificada». La preposición hebrea עַל puede traducirse más literalmente como «sobre», pero aquí, por el contexto, lleva el sentido de que el juicio viene contra estos objetos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: and against
  chosen_spanish: y contra
  alternatives_spanish:
  - y sobre
  - y encima de
  lexicon: HALOT
  rationale: El hebreo עַל puede ser espacial (“sobre”) o adversativo según el contexto. En Isaías 2:12–16 la lista describe aquello sobre lo que cae el juicio del día de Yahvé; por eso “contra” comunica la fuerza hostil que el POB inglés también marcó con “against”.
- source_word: כָּל
  english_pob_choice: every
  chosen_spanish: toda / todo
  alternatives_spanish:
  - cada
  - todo
  lexicon: HALOT
  rationale: Con sustantivos singulares distributivos, כָּל expresa la totalidad de las instancias del tipo mencionado. En español, “toda torre” y “todo muro” conservan ese valor distributivo de manera natural.
- source_word: מִגְדָּל
  english_pob_choice: tower
  chosen_spanish: torre
  alternatives_spanish:
  - torre de vigilancia
  - atalaya
  lexicon: HALOT
  rationale: El sustantivo nombra una torre o estructura elevada. “Torre” es la correspondencia más directa y no añade especificaciones que el hebreo no exige.
- source_word: גָּבֹהַ
  english_pob_choice: high
  chosen_spanish: alta
  alternatives_spanish:
  - elevada
  - alta y altiva
  lexicon: HALOT
  rationale: El adjetivo significa “alto” o “elevado”. “Alta” mantiene el sentido físico sin introducir una interpretación más metafórica de la que el texto inmediato requiere.
- source_word: חוֹמָה
  english_pob_choice: wall
  chosen_spanish: muro
  alternatives_spanish:
  - pared
  - muralla
  lexicon: HALOT
  rationale: Aunque puede referirse a una muralla defensiva, en este contexto “muro” conserva la referencia general a una estructura de cerramiento. “Muralla” también sería posible, pero “muro” evita especificar demasiado si el hebreo no lo fuerza.
- source_word: בְצוּרָה
  english_pob_choice: fortified
  chosen_spanish: fortificado
  alternatives_spanish:
  - fuerte
  - asediada
  - reconstruida
  lexicon: HALOT
  rationale: El adjetivo deriva de la idea de hacer seguro o fortificar. “Fortificado” comunica claramente el matiz defensivo-militar que el POB inglés explicitó con “fortified”.
theological_decisions:
- issue: Dirección adversativa de עַל en el contexto del día de Yahvé
  english_pob_reading: Render the repeated עַל phrases as objects of judgment with 'against' rather than a neutral spatial 'upon.'
  chosen_spanish_reading: Traducir los dos grupos con “contra” en vez de un “sobre” meramente espacial.
  alternative_spanish_readings:
  - y sobre toda torre alta, y sobre todo muro fortificado
  - y aun sobre toda torre alta, y aun sobre todo muro fortificado
  rationale: El contexto inmediato (Isaías 2:12–16) presenta el juicio de Yahvé sobre lo exaltado del ser humano. “Contra” hace audible esa dirección hostil sin agregar contenido nuevo, siguiendo la decisión del POB inglés de no neutralizar el matiz.
  doctrine_reference: Isaías 2:12–16; traducción por equivalencia óptima en contexto de juicio
- issue: Posible matiz defensivo de חוֹמָה
  english_pob_reading: wall
  chosen_spanish_reading: muro
  alternative_spanish_readings:
  - muralla
  - pared
  rationale: En español, “muro” mantiene la imagen de una barrera arquitectónica general y no fuerza el lector a pensar exclusivamente en una fortificación urbana. El adjetivo “fortificado” ya aporta el matiz militar presente en el texto.
  doctrine_reference: HALOT; mantener la tensión semántica entre estructura general y defensa
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se registran cambios posteriores; el consenso de control cruzado fue de alta concordancia y sin observaciones.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma de יהוה según el estándar del proyecto, aunque este versículo no la contiene explícitamente.
  - Se prefirió un español moderno y sobrio, evitando arcaísmos innecesarios.
  - Se preservó la distinción entre el valor espacial básico de עַל y su fuerza adversativa contextual mediante nota textual y traducción principal.
  - La duplicación distributiva de כָּל se reflejó con “toda/todo” para conservar la universalidad de cada elemento de la serie.
