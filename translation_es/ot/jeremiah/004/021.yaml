translation:
  language: es
  text: ¿Hasta cuándo habré de ver la señal[a] y oír el sonido de la trompeta[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «bandera», «estandarte» o simplemente «señal». El hebreo נֵס denota un signo elevado, a menudo de carácter militar.
    reason: lexical_alternative
  - marker: b
    text: שׁוֹפָר es un cuerno, con frecuencia de carnero, usado para alarma o convocatoria.
    reason: cultural_note
lexical_decisions:
- source_word: עַד מָתַי
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Hasta cuándo será
  - ¿Hasta cuándo habré de
  lexicon: HALOT
  rationale: La expresión hebrea es una pregunta temporal lamentativa e idiomática. «¿Hasta cuándo» preserva bien el tono de queja y la fuerza retórica sin volverlo rígido.
- source_word: אֶרְאֶה
  english_pob_choice: must I see
  chosen_spanish: habré de ver
  alternatives_spanish:
  - tendré que ver
  - veré
  lexicon: HALOT
  rationale: En este lamento, el imperfecto 1cs expresa una experiencia continua y penosa. «Habré de ver» comunica esa carga con naturalidad en español, sin perder la idea de obligación o padecimiento implícita en la lectura inglesa.
- source_word: נֵּס
  english_pob_choice: signal flag
  chosen_spanish: señal
  alternatives_spanish:
  - bandera de señal
  - estandarte
  - bandera
  lexicon: HALOT
  rationale: El término hebreo designa una señal elevada, a menudo militar. En español, «señal» conserva la función visible y evita imponer una imagen demasiado específica donde el hebreo admite varias concreciones.
- source_word: אֶשְׁמְעָה
  english_pob_choice: and hear
  chosen_spanish: oír
  alternatives_spanish:
  - escuchar
  - habré de oír
  lexicon: HALOT
  rationale: El paralelismo con el verbo anterior permite mantener un giro fluido en español. «Oír» refleja el valor básico del verbo y encaja con el ritmo del lamento.
- source_word: קוֹל שׁוֹפָר
  english_pob_choice: the sound of the trumpet
  chosen_spanish: el sonido de la trompeta
  alternatives_spanish:
  - la voz de la trompeta
  - el sonido del cuerno
  lexicon: HALOT
  rationale: «קול» aquí es sonido audible, no «voz». «Trompeta» sigue la tradición idiomática y comunica bien la función de alarma del שׁוֹפָר en español contemporáneo.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo WLC y el auditable POB inglés: mantiene la estructura interrogativa lamentativa, la relación entre ver y oír, y la ambigüedad funcional de נֵס sin forzar una equivalencia más técnica que la disponible en el contexto.'
  spanish_consistency_notes:
  - Se usa «señal» para נֵס en el cuerpo principal por claridad y neutralidad; se conserva la alternativa tradicional en nota.
  - Se traduce שׁוֹפָר como «trompeta» en el texto principal, con nota cultural para no perder su referencia a un cuerno ritual o militar.
  - La puntuación interrogativa completa sigue la norma española y mantiene el tono de lamento profético.
