translation:
  language: es
  text: Canten alabanzas a Yahvé[a], porque ha obrado con majestad; que esto se dé a conocer en toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha actuado gloriosamente» o «ha hecho cosas excelentes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זַמְּרוּ
  english_pob_choice: Sing praise
  chosen_spanish: Cantad alabanzas
  alternatives_spanish:
  - Cantad
  - Haced música
  - Cantad salmos
  lexicon: HALOT
  rationale: El piel imperativo plural de זמר pide un acto de alabanza con música. En español, «cantad alabanzas» transmite mejor la acción de cantar con contenido doxológico que un simple «cantad».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se rinde como el nombre propio divino, no como sustitución por un título. «Yahvé» es la forma establecida en el proyecto para preservar el nombre del pacto.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del imperativo; «porque» expresa con naturalidad esa relación causal en español.
- source_word: גֵא֖וּת עָשָׂה
  english_pob_choice: he has done gloriously
  chosen_spanish: ha hecho cosas gloriosas
  alternatives_spanish:
  - ha obrado con majestad
  - ha hecho de manera majestuosa
  - ha hecho cosas excelentes
  lexicon: HALOT
  rationale: La combinación abstracta de גֵאוּת con עשה admite una relación semántica fuerte con majestuosidad/excelencia. En español, «cosas gloriosas» conserva la idea de obras que manifiestan la gloria sin volverla demasiado idiomática o adverbializada.
- source_word: מידעת זֹאת
  english_pob_choice: let this be made known
  chosen_spanish: que esto se dé a conocer
  alternatives_spanish:
  - que esto sea conocido
  - den a conocer esto
  lexicon: HALOT
  rationale: La forma apunta a un sentido pasivo/jusivo en contexto de proclamación. «Que esto se dé a conocer» mantiene el valor exhortativo sin convertirlo en una orden distinta.
- source_word: בְּכָל הָאָרֶץ
  english_pob_choice: in all the earth
  chosen_spanish: en toda la tierra
  alternatives_spanish:
  - por toda la tierra
  - en toda la tierra
  lexicon: HALOT
  rationale: אָרֶץ aquí es global, no solo «tierra» en sentido de país o suelo. «En toda la tierra» es natural en español y refleja la amplitud universal del texto.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El versículo usa directamente el nombre del pacto. Se mantiene una transliteración del nombre divino en lugar de una sustitución por título, siguiendo la práctica del POB y la evidencia del hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La revisión inglesa más reciente afinó el hebreo abstracto גֵאוּת/עָשָׂה desde «has done glorious things» hacia «has done gloriously». La versión española mantiene la misma decisión de fondo con una formulación natural que no oculta la tensión entre lo abstracto y lo resultativo en el original.
  spanish_consistency_notes:
  - Se conserva el registro poético y exhortativo.
  - «Yahvé» se usa de forma consistente con el estándar del proyecto para el Tetragrámaton.
  - No se introduce una glosa teológica añadida; la frase final mantiene el alcance universal del hebreo.
  - La nota alternativa está anclada explícitamente en el texto mediante [a].
