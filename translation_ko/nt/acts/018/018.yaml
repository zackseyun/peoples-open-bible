source:
  edition: SBLGNT
  text: Ὁ δὲ Παῦλος ἔτι προσμείνας ἡμέρας ἱκανὰς τοῖς ἀδελφοῖς ἀποταξάμενος ἐξέπλει εἰς τὴν Συρίαν, καὶ σὺν αὐτῷ Πρίσκιλλα καὶ Ἀκύλας, κειράμενος ⸂ἐν Κεγχρεαῖς τὴν κεφαλήν⸃, εἶχεν γὰρ εὐχήν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/018/018.yaml
  text: After Paul had remained many more days[a], he said farewell to the brothers and sailed away for Syria, and with him were Priscilla and Aquila. In Cenchreae he had his head shaved[e][d][c][b], for he had a vow.
  footnotes:
  - marker: a
    text: Or, 'having cut his hair.' The Greek verb can refer more generally to cutting or shearing hair, not necessarily complete shaving.
    reason: lexical_alternative
  - marker: b
    text: Some interpreters take the haircut and vow to refer to Aquila rather than Paul, though the Greek grammar most naturally points to Paul.
    reason: alternative_reading
  - marker: c
    text: The text says only 'a vow'; many connect it with a Nazirite-type vow, but this is not stated explicitly.
    reason: cultural_note
  - marker: d
    text: '"Brothers" here likely refers to the community of believers, including women as well as men.'
    reason: lexical_alternative
  - marker: e
    text: Or 'and with him were Priscilla and Aquila.'.
    reason: previous_rendering
translation:
  language: ko
  text: 바울은 여러 날을 더 머문 후에 형제들과 작별하고 시리아로 배를 타고 떠났는데, 그와 함께 브리스길라와 아굴라가 있었습니다. 그가 겐그레아에서 머리를 깎았으니, 이는 그가 서원하였기 때문입니다.
  philosophy: optimal-equivalence
