  yaml_path: translation/ot/numbers/018/017.yaml
  text: But you shall not redeem the firstborn of an ox[a], or the firstborn of a sheep, or the firstborn of a goat; they are holy. You shall sprinkle their blood on the altar, and you shall burn their fat as a food offering, a pleasing aroma to Yahweh.
