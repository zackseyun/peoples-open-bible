revisions:
- from: 'Y llamaron a Lot y le dijeron[a]: «¿Dónde están los hombres que vinieron a ti esta noche? Sácalos a nosotros para que los conozcamos».'
  to: 'Y llamaron a Lot y le dijeron[a]: «¿Dónde están los hombres que vinieron a ti esta noche? Sácalos, para que los conozcamos».'
  rationale: 'Se corrige el único problema importante de legibilidad y fidelidad idiomática: se elimina el calco «a nosotros», que no funciona en español, mientras se conserva el mandato de sacar a los hombres y el propósito «para que los conozcamos». También se pule la nota para reflejar mejor que la forma hebrea es literal.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:21:27Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y la auditoría inglesa en casi todos los puntos: «llamaron», «¿dónde están los hombres...?», «esta noche», y la decisión de mantener «conocer» en el texto principal con nota explicativa. Sin embargo, «Sácalos a nosotros» no suena natural en español y no expresa bien el sentido direccional idiomático de הוֹצִיאֵם אֵלֵינוּ, que en español se vierte mejor como «Sácalos para que salgan con nosotros / tráelos afuera a nosotros / sácalos para nosotros» según contexto; aquí la opción natural y fiel es «Sácalos para nosotros» no, mejor «Sácalos para que vengan con nosotros» sería demasiado interpretativa. La formulación estándar y fiel es «Sácalos para nosotros» tampoco es buena. La mejor reparación breve es «Sácalos para que estén con nosotros»? No. Lo más directo y natural en español bíblico legible es «Sácalos para nosotros» sigue extraño. Por tanto conviene reestructurar toda la cláusula como «Sácalos para que podamos conocerlos»,
    pero eso pierde «a nosotros». Mejor: «Sácalos, para que los conozcamos»; el complemento «a nosotros» puede omitirse en español sin pérdida sustancial porque queda implícito en el verbo de movimiento y el propósito. Eso preserva el sentido sin calco torpe.'
  spanish_quality_summary: 'La redacción es clara y digna, pero contiene un calco poco idiomático: «Sácalos a nosotros». Además, la nota «El hebreo dice “conocerlos”» sería más natural como «El hebreo dice literalmente “conocerlos”». El resto del verso es plenamente legible y adecuado para español eclesial neutral.'
  glossary_alignment: No hay términos del glosario principal en juego salvo la preservación de la literalidad de ידע como «conocer». Esa decisión está bien alineada con la política del proyecto y la nota mantiene la alternativa contextual sexual. No hay conflicto con Yahvé/Mesías/etc.
  issues:
  - severity: medium
    issue: Calco no idiomático en «Sácalos a nosotros»
    rationale: Aunque refleja mecánicamente אֵלֵינוּ, en español suena antinatural y distrae al lector. La traducción debe preservar el sentido sin calcar una construcción impropia del español.
  - severity: low
    issue: Nota al pie mejorable en naturalidad
    rationale: «El hebreo dice “conocerlos”» es entendible, pero «dice literalmente» comunica mejor la decisión traductológica y suena más natural en este tipo de nota.
  revised_spanish_text: 'Y llamaron a Lot y le dijeron[a]: «¿Dónde están los hombres que vinieron a ti esta noche? Sácalos, para que los conozcamos».'
  revised_footnotes:
  - marker: a
    text: 'O, más explícitamente en contexto: «para tener relaciones sexuales con ellos». El hebreo dice literalmente «conocerlos».'
    reason: lexical_alternative
  revision_rationale: 'Se corrige el único problema importante de legibilidad y fidelidad idiomática: se elimina el calco «a nosotros», que no funciona en español, mientras se conserva el mandato de sacar a los hombres y el propósito «para que los conozcamos». También se pule la nota para reflejar mejor que la forma hebrea es literal.'
