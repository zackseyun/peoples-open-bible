  yaml_path: translation/nt/mark/012/019.yaml
  text: Teacher[a], Moses wrote for us that if someone's brother dies and leaves behind a wife and leaves no child[c][b], his brother should take the wife and raise up offspring for his brother.
  footnotes:
  - marker: a
    text: Or, more literally, 'leaves no child'; some translations render 'leaves no children.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'raise up seed for his brother,' an idiom referring to producing offspring in fulfillment of levirate marriage obligations.
    reason: lexical_alternative
  - marker: c
    text: See Deuteronomy 25:5 for the Mosaic law being referenced.
    reason: cross_reference
translation:
  language: ko
  text: 「선생님, 모세는 우리에게 「만일 어떤 사람의 형이 아내를 두고 자녀 없이 죽으면, 그 동생이 그 아내를 데려다가 그의 형을 위하여 자손을 일으켜야 한다」 하고 기록해 주었습니다.
  philosophy: optimal-equivalence
