translation:
  language: es
  text: Del fruto de la boca del hombre comerá lo bueno, pero el alma[a] de los traicioneros[b] se alimenta de violencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: נֶפֶשׁ («alma»). Aquí puede implicar también «deseo» o «apetito»; se conserva «alma» en el texto principal por fidelidad al término y a la revisión inglesa.'
    reason: lexical_alternative
  - marker: b
    text: La segunda cola del verso es elíptica en hebreo. Puede entenderse como «el alma de los traicioneros [se alimenta] de violencia».
    reason: alternative_reading
lexical_decisions:
- source_word: מִ/פְּרִי
  english_pob_choice: From the fruit of
  chosen_spanish: Del fruto de
  alternatives_spanish:
  - Por el fruto de
  - De el fruto de
  lexicon: HALOT
  rationale: פְּרִי conserva la imagen concreta de «fruto» y, con la preposición מִן, expresa fuente o resultado. «Del fruto de» mantiene esa metáfora proverbial en español sin perder naturalidad.
- source_word: פִי
  english_pob_choice: mouth
  chosen_spanish: la boca
  alternatives_spanish:
  - la boca
  - la palabra
  - el habla
  lexicon: HALOT
  rationale: El hebreo dice literalmente «boca». En español, «boca» preserva el ícono corporal y el paralelismo con el texto fuente mejor que una abstracción como «habla» o «palabra».
- source_word: אִישׁ
  english_pob_choice: a man's
  chosen_spanish: del hombre
  alternatives_spanish:
  - de un hombre
  - de una persona
  - de alguien
  lexicon: HALOT
  rationale: אִישׁ es masculino singular y funciona genéricamente en el proverbio. «Del hombre» conserva esa forma representativa sin volver el texto excesivamente marcado.
- source_word: יֹאכַל
  english_pob_choice: he eats
  chosen_spanish: comerá
  alternatives_spanish:
  - come
  - comerá uno
  - disfrutará
  lexicon: HALOT
  rationale: El imperfecto hebreo puede expresar valor gnómico. En español, el futuro proverbial («comerá») comunica bien la verdad general y mantiene la imagen de comer ligada al «fruto».
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: bien
  alternatives_spanish:
  - bueno
  - lo bueno
  - bondad
  lexicon: HALOT
  rationale: En este contexto, טוֹב puede funcionar como resultado beneficioso de las palabras. «Bien» fluye naturalmente en español y expresa el efecto positivo sin forzar una nominalización.
- source_word: וְ/נֶפֶשׁ
  english_pob_choice: but the soul
  chosen_spanish: pero el alma
  alternatives_spanish:
  - pero el alma
  - pero el apetito
  - y el alma
  lexicon: HALOT
  rationale: נֶפֶשׁ se deja como «alma» para respetar la decisión revisada del POB inglés y la amplitud semántica del término. Aquí puede sugerir interioridad o deseo; no se reduce a «apetito» en el cuerpo principal.
- source_word: בֹּגְדִים
  english_pob_choice: the treacherous
  chosen_spanish: de los traicioneros
  alternatives_spanish:
  - de los traidores
  - de los infieles
  - de los pérfidos
  lexicon: HALOT
  rationale: El participio plural describe a personas caracterizadas por traición o infidelidad. «Traicioneros» reproduce ese rasgo de carácter sin endurecerlo demasiado en una categoría legal o política como «traidores».
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - violencia
  - daño violento
  - injusticia violenta
  lexicon: HALOT
  rationale: חָמָס denota violencia, brutalidad o daño violento. «Violencia» es la equivalencia más transparente y mantiene el contraste proverbial con «bien».
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que ajustó la segunda cola desde una lectura con 'appetite' a 'the soul' para renderizar נֶפֶשׁ con mayor precisión léxica. La presente versión española sigue esa revisión, conservando el carácter elíptico del hemistiquio final y evitando sobreexplicar el predicado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni κύριος.
  - Se evitó «Cristo»/«Mesías» porque no aparecen en el texto.
  - Se conservó la metáfora de comida/fruto/boca para reflejar el paralelismo hebreo.
  - «Violencia» se usó en sentido ético-jurídico amplio, acorde con חָמָס.
