translation:
  language: es
  text: Y si venden algo a su prójimo, o compran de su prójimo, nadie oprimirá[a] a su hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no hagan injusticia unos a otros»; el verbo puede implicar tomar ventaja de manera desleal, especialmente en asuntos comerciales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Y cuando
  - Si
  lexicon: HALOT
  rationale: En el hebreo legal introduce una cláusula condicional; «Y si» conserva el enlace con la frase anterior y el valor casuístico.
- source_word: תִמְכְּרוּ
  english_pob_choice: you sell
  chosen_spanish: vendéis
  alternatives_spanish:
  - vendéis algo
  - vendáis
  lexicon: HALOT
  rationale: El imperfecto plural en contexto legal expresa condición general; el presente indicativo en español funciona naturalmente con valor condicional.
- source_word: מִמְכָּר
  english_pob_choice: something
  chosen_spanish: algo
  alternatives_spanish:
  - una venta
  - mercancía
  lexicon: HALOT
  rationale: El sustantivo apunta a un objeto o transacción de venta; «algo» sigue bien al verbo «vender» sin forzar un tecnicismo.
- source_word: לַעֲמִיתֶךָ
  english_pob_choice: to your neighbor
  chosen_spanish: a vuestro prójimo
  alternatives_spanish:
  - a vuestro compañero
  - a vuestro semejante
  lexicon: HALOT
  rationale: עָמִית es un par en el ámbito comunitario/ético; «prójimo» comunica bien la relación de cercanía y obligación dentro del pacto.
- source_word: אוֹ קָנֹה
  english_pob_choice: or buy
  chosen_spanish: o compráis
  alternatives_spanish:
  - o adquiriréis
  - o compráis algo
  lexicon: HALOT
  rationale: El infinitivo absoluto coordinado con el verbo anterior expresa aquí la acción de comprar; «compráis» mantiene la simetría verbal del hebreo.
- source_word: מִיַּד
  english_pob_choice: from ... hand
  chosen_spanish: de la mano de
  alternatives_spanish:
  - de
  - de la mano
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; «de la mano de» conserva la imagen concreta del original, aunque en español suene más marcada que la versión inglesa revisada.
- source_word: עֲמִיתֶךָ
  english_pob_choice: your neighbor’s
  chosen_spanish: vuestro prójimo
  alternatives_spanish:
  - vuestro compañero
  - vuestro semejante
  lexicon: HALOT
  rationale: Se mantiene la misma equivalencia para עָמִית que en la primera ocurrencia, con concordancia posesiva natural en español.
- source_word: אַל
  english_pob_choice: no ... shall
  chosen_spanish: nadie ...
  alternatives_spanish:
  - no ...
  - ningún hombre ...
  lexicon: HALOT
  rationale: En español legal, «nadie» permite expresar la prohibición distributiva del hebreo sin añadir una negación poco natural con futuro/voluntad.
- source_word: תּוֹנ֖וּ
  english_pob_choice: oppress
  chosen_spanish: oprimirá
  alternatives_spanish:
  - maltratará
  - defraudará
  - hará injusticia a
  lexicon: HALOT
  rationale: En este contexto comercial, el verbo puede implicar sacar ventaja o hacer daño; «oprimirá» conserva la fuerza amplia que la POB inglesa eligió con «oppress».
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: nadie
  alternatives_spanish:
  - ningún hombre
  - ninguna persona
  lexicon: HALOT
  rationale: Aunque אִישׁ es masculino singular, en español «nadie» reproduce el alcance distributivo de la prohibición de manera natural y sin perder el referente general.
- source_word: אָחִיו
  english_pob_choice: his brother
  chosen_spanish: a su hermano
  alternatives_spanish:
  - a su prójimo
  - a su compatriota
  lexicon: HALOT
  rationale: אָח conserva su sentido literal de «hermano», con la extensión comunitaria implícita en el contexto de la ley.
theological_decisions:
- issue: Alcance comunitario de prójimo/hermano en ley económica
  english_pob_reading: The law prohibits taking unfair advantage in dealings with a fellow community member, expressed through 'neighbor' and 'brother'.
  chosen_spanish_reading: La ley prohíbe aprovecharse injustamente en transacciones con un miembro de la comunidad, expresado por «prójimo» y «hermano».
  alternative_spanish_readings:
  - aprovecharse del otro
  - defraudar a un hermano israelita
  - hacer injusticia al prójimo
  rationale: El hebreo usa términos relacionales del pacto; la redacción española conserva esa tensión entre literalidad («hermano») y alcance comunitario («prójimo»).
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Fuerza de la prohibición con אַל + verbo
  english_pob_reading: No man shall oppress his brother.
  chosen_spanish_reading: Nadie oprimirá a su hermano.
  alternative_spanish_readings:
  - No oprimiréis a vuestro hermano.
  - Ningún hombre oprimirá a su hermano.
  rationale: Se preserva el tono legal y distributivo de la prohibición hebrea con una formulación natural en español, sin perder el sujeto representativo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El audit trail inglés revisó la frase para eliminar una mención literal de «hand» en la segunda mitad por naturalidad, pero el hebreo conserva מִיַּד; por eso la versión española mantiene «de la mano de» para reflejar explícitamente el idiomismo original. También se sostuvo la distinción relacional entre עָמִית y אָח, siguiendo el sentido legal-comunitario documentado en el paquete fuente.
  spanish_consistency_notes:
  - Se tradujo עָמִית de manera consistente como «prójimo» en ambas apariciones.
  - Se mantuvo «hermano» para אָח, respetando la literalidad y el valor comunitario implícito.
  - La prohibición se expresó con un sujeto distributivo natural en español («nadie»), pero la nota conserva la alternativa más cercana al hebreo («no hagáis injusticia unos a otros»).
  - Se preservó la imagen concreta de «la mano» para מִיַּד, ya que forma parte del hebreo fuente y está motivada por la transacción.
