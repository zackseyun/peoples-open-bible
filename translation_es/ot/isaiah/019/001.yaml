revisions:
- from: 'Oráculo acerca de Egipto: He aquí[a], Yahvé cabalga sobre una nube ligera y viene a Egipto; los ídolos de Egipto temblarán[c][b] delante de él, y el corazón de Egipto se derretirá dentro de él.'
  to: 'Oráculo acerca de Egipto: He aquí[a], Yahvé cabalga sobre una nube veloz y viene a Egipto; los ídolos de Egipto temblarán[b] delante de él, y el corazón de Egipto se derretirá[c] dentro de Egipto.'
  rationale: 'La revisión hace dos reparaciones pequeñas pero importantes: cambia ''nube ligera'' por ''nube veloz'' para reflejar mejor el matiz contextual de קַל y la decisión auditada ''swift'', y sustituye ''dentro de él'' por ''dentro de Egipto'' en el texto principal para lograr un español natural mientras conserva en nota la alternativa más literal que refleja la personificación singular del hebreo. Se mantiene intacta la imaginería teofánica y la terminología del proyecto, especialmente ''Yahvé''.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:27:19Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: encabezamiento profético, teofanía de Yahvé sobre una nube, llegada a Egipto, temblor de los ídolos y desfallecimiento interno de Egipto. Mantiene correctamente Yahvé para יְהוָה y preserva la imaginería teofánica sin parafrasearla. Sin embargo, dos elecciones españolas no siguen bien la racionalidad auditada ni suenan óptimas en español: ''nube ligera'' debilita el matiz de rapidez de קַל en este contexto, y ''dentro de él'' en el texto principal contradice el inglés POB (''within it'') y produce una referencia masculina poco natural para ''Egipto'' en español; ese valor masculino singular debe conservarse en nota, no imponerse en la línea principal.'
  spanish_quality_summary: El español es generalmente claro y digno, pero presenta leves problemas de naturalidad y precisión. 'He aquí' es aceptable en registro bíblico. 'Cabalga sobre una nube ligera' suena algo físico/visual más que dinámico; 'nube veloz' o 'nube ligera' son posibles, pero 'veloz' comunica mejor el valor contextual. La mayor dificultad es 'dentro de él', que en español resulta torpe y ambiguo; 'dentro de Egipto' o 'en su interior' leen mejor. También conviene ajustar la nota correspondiente para que la alternativa sea verdaderamente alternativa al nuevo texto principal.
  glossary_alignment: 'La terminología principal del proyecto está bien seguida: יהוה -> ''Yahvé''; מַשָּׂא -> ''oráculo''; אֱלִילֵי -> ''ídolos''; לְבַב -> ''corazón''. No hay conflicto doctrinal relevante. La única desviación de la lógica léxica documentada está en בְּקִרְבּוֹ, donde el texto español principal debería evitar el masculino ''él'' y reservar esa observación para nota; y en קַל, donde ''veloz'' alinea mejor con ''swift'' y con la explicación contextual de rapidez.'
  issues:
  - severity: medium
    issue: '''nube ligera'' no comunica con suficiente claridad el valor contextual de rapidez en עָב קַל'
    rationale: Aunque 'ligera' puede defenderse léxicamente, la auditoría inglesa eligió 'swift cloud' por la fuerza dinámica de la teofanía. En español, 'nube veloz' transmite mejor esa rapidez sin parafrasear.
  - severity: high
    issue: '''dentro de él'' en el texto principal es poco natural y no sigue la decisión auditada de tratar a Egipto como ''it'' en la línea principal'
    rationale: El inglés POB escogió 'within it' y dejó 'within him' como alternativa en nota. En español, 'dentro de él' suena ambiguo e innecesariamente literal; conviene una formulación natural en el texto principal y una nota que explique la singularidad/personificación del hebreo.
  - severity: low
    issue: La nota c debe ajustarse para corresponder al nuevo anclaje y a una alternativa real
    rationale: Si el texto principal ya no dice 'dentro de él', la nota no debe repetirlo como texto principal sino ofrecer la alternativa/personificación apropiada.
  revised_spanish_text: 'Oráculo acerca de Egipto: He aquí[a], Yahvé cabalga sobre una nube veloz y viene a Egipto; los ídolos de Egipto temblarán[b] delante de él, y el corazón de Egipto se derretirá[c] dentro de Egipto.'
  revised_footnotes:
  - marker: a
    text: O «carga acerca de Egipto» o «pronunciamiento acerca de Egipto».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de delante de él», es decir, ante su presencia.'
    reason: lexical_alternative
  - marker: c
    text: O «dentro de él»; el hebreo trata a Egipto como una entidad singular.
    reason: lexical_alternative
  revision_rationale: 'La revisión hace dos reparaciones pequeñas pero importantes: cambia ''nube ligera'' por ''nube veloz'' para reflejar mejor el matiz contextual de קַל y la decisión auditada ''swift'', y sustituye ''dentro de él'' por ''dentro de Egipto'' en el texto principal para lograr un español natural mientras conserva en nota la alternativa más literal que refleja la personificación singular del hebreo. Se mantiene intacta la imaginería teofánica y la terminología del proyecto, especialmente ''Yahvé''.'
