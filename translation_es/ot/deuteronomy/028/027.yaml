translation:
  language: es
  text: Yahvé te herirá con los forúnculos de Egipto, con tumores[a], con costras y con picazón, de las cuales no podrás sanar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hemorroides' para 'tumores'; el término hebreo es incierto y puede referirse más específicamente a inflamaciones en la región anal.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַכְּכָה / יְהוָה
  english_pob_choice: Yahweh will strike you
  chosen_spanish: Yahvé te herirá
  alternatives_spanish:
  - Yahvé te golpeará
  - Yahvé te castigará
  lexicon: HALOT
  rationale: El verbo causativo de נכה expresa golpear/herir con fuerza; en español bíblico, 'herirá' conserva el carácter de acción divina directa sin sonar tan coloquial como 'golpeará'. 'Yahvé' sigue el criterio del proyecto para el Tetragrámaton.
- source_word: בִּשְׁחִין מִצְרַיִם
  english_pob_choice: with the boils of Egypt
  chosen_spanish: con la sarna de Egipto
  alternatives_spanish:
  - con los forúnculos de Egipto
  - con las úlceras de Egipto
  - con la enfermedad de Egipto
  lexicon: HALOT
  rationale: El término שְׁחִין designa una afección cutánea inflamada; 'sarna' es una equivalencia médica amplia y natural en español, aunque no exacta en sentido técnico. Se conserva el vínculo genitivo 'de Egipto' para mantener la referencia tradicional y la posible alusión a las plagas.
- source_word: וּבְעפלים
  english_pob_choice: with tumors
  chosen_spanish: con tumores
  alternatives_spanish:
  - con hemorroides
  lexicon: HALOT
  rationale: La raíz es lexicográficamente incierta; el POB inglés eligió la opción amplia 'tumors' y reservó la alternativa específica en nota. 'Tumores' mantiene esa amplitud sin cerrar indebidamente el sentido.
- source_word: וּבַגָּרָב
  english_pob_choice: with scabs
  chosen_spanish: con costras
  alternatives_spanish:
  - con escamas
  - con una afección cutánea
  lexicon: HALOT
  rationale: גָּרָב nombra una enfermedad o erupción cutánea asociada con llagas/costras. 'Costras' reproduce bien la imagen visible y es idiomático en español.
- source_word: וּבֶחָרֶס
  english_pob_choice: with itch
  chosen_spanish: con sarna
  alternatives_spanish:
  - con comezón
  - con picazón
  - con eccema
  lexicon: HALOT
  rationale: El hebreo apunta a una afección que produce intensa comezón; para evitar una repetición poco natural de 'comezón' junto con 'costras', 'sarna' comunica una erupción pruriginosa y enfermiza en español. La tensión léxica se conserva en la nota al admitir un sentido de 'comezón/picazón'.
- source_word: אֲשֶׁר לֹא תוּכַל לְהֵרָפֵא
  english_pob_choice: from which you cannot be healed
  chosen_spanish: de la cual no podrás sanar
  alternatives_spanish:
  - de la cual no podrás ser sanado
  - que no podrás curar
  lexicon: HALOT
  rationale: El infinitivo pasivo de רפא expresa quedar curado/sanado. 'No podrás sanar' resulta natural en español y preserva la imposibilidad de curación; la voz pasiva literal queda como alternativa.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se aplica el estándar del proyecto para יְהוָה, transliterando el nombre divino en lugar de sustituirlo por un título. 'Yahvé' es la forma española de uso más estable y readable dentro del marco POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el auditorío inglés: se mantiene Yahvé para el Nombre divino, se conserva la cadena de afecciones cutáneas/genitales con una opción amplia para el término incierto de וּבְעפלים, y se respeta la cláusula final de incurabilidad sin intensificarla ni suavizarla indebidamente.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' para יהוה según la política del proyecto.
  - Se mantiene el paralelismo de cuatro males con preposición repetida en español para reflejar el hebreo.
  - La ambigüedad léxica de עפלים queda preservada mediante nota, sin fijar un sentido más específico en el texto principal.
  - '''Sanar'' funciona como equivalente natural de la pasiva de רפא y evita una formulación demasiado literal pero poco fluida.'
