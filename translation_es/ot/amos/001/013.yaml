  rationale: Se conserva todo lo que ya estaba bien alineado con la fuente y con el audit trail, pero se sustituye «abrieron a las mujeres embarazadas» por «desgarraron el vientre de las mujeres embarazadas» para reflejar con fidelidad el valor violento de בִּקְעָם y producir un español natural e inequívoco.
