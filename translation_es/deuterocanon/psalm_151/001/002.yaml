translation:
  language: es
  text: Mis manos hicieron un instrumento; mis dedos formaron una lira[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un salterio», término tradicional para ψαλτήριον, un instrumento de cuerdas.
