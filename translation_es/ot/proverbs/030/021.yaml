translation:
  language: es
  text: 'Bajo tres cosas[a] tiembla la tierra, y bajo cuatro no puede soportar[b]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «se estremece». El verbo hebreo puede expresar temblor, agitación o sacudida.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «no puede resistir» o «no puede sostener». El infinitivo hebreo de נָשָׂא puede expresar la idea de cargar, sostener o soportar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּ֣חַת
  english_pob_choice: under
  chosen_spanish: bajo
  alternatives_spanish:
  - debajo de
  - bajo de
  lexicon: HALOT
  rationale: En el dicho numérico sapiencial, la preposición expresa la circunstancia o conjunto de casos. «Bajo» conserva la estructura repetida del hebreo y suena natural en español.
- source_word: שָׁ֭לוֹשׁ
  english_pob_choice: three things
  chosen_spanish: tres cosas
  alternatives_spanish:
  - tres
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tres». En español, para un proverbio de este tipo, «tres cosas» hace explícito el sustantivo implícito sin alejarse del patrón retórico.
- source_word: רָ֣גְזָה
  english_pob_choice: trembles
  chosen_spanish: tiembla
  alternatives_spanish:
  - se estremece
  - se agita
  lexicon: HALOT
  rationale: El verbo comunica sacudida, temblor o agitación. «Tiembla» es una equivalencia clara y natural para la personificación de la tierra.
- source_word: אֶ֑רֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: Aunque puede significar «país», aquí el sentido es cósmico y personificado. «La tierra» reproduce mejor el alcance del proverbio.
- source_word: וְ/תַ֥חַת
  english_pob_choice: and under
  chosen_spanish: y bajo
  alternatives_spanish:
  - e incluso bajo
  - y debajo de
  lexicon: HALOT
  rationale: La conjunción repite la estructura paralela del primer hemistiquio. «Y bajo» mantiene la forma del dicho sin forzar el español.
- source_word: אַ֝רְבַּ֗ע
  english_pob_choice: four
  chosen_spanish: cuatro
  alternatives_spanish:
  - cuatro cosas
  lexicon: HALOT
  rationale: En la fórmula sapiencial «tres... cuatro», el segundo número completa el paralelismo y el sustantivo queda implícito.
- source_word: לֹא
  english_pob_choice: it cannot
  chosen_spanish: no puede
  alternatives_spanish:
  - no es capaz de
  - no logra
  lexicon: HALOT
  rationale: La forma verbal con valor modal se expresa de manera natural con «no puede».
- source_word: תוּכַ֥ל
  english_pob_choice: it cannot
  chosen_spanish: puede
  alternatives_spanish:
  - pueda
  lexicon: HALOT
  rationale: Con la negación previa, el verbo expresa incapacidad. En español se integra naturalmente en la perífrasis «no puede».
- source_word: שְׂאֵֽת
  english_pob_choice: bear up
  chosen_spanish: soportarlo
  alternatives_spanish:
  - sostenerlo
  - llevarlo
  - endurecerlo
  lexicon: HALOT
  rationale: El infinitivo de נָשָׂא puede significar llevar, cargar, soportar o endurecer. En español, «soportarlo» comunica bien la idea de no poder sostener o aguantar la carga sin sonar arcaico. El pronombre recoge el objeto implícito del hebreo.
theological_decisions:
- issue: Personificación de la tierra como sujeto que no soporta ciertas realidades
  english_pob_reading: the earth trembles ... it cannot bear up
  chosen_spanish_reading: la tierra tiembla ... no puede soportarlo
  alternative_spanish_readings:
  - la tierra se estremece ... no puede sostenerlo
  - la tierra tiembla ... no puede endurecerlo
  rationale: Se conserva la imagen sapiencial de una tierra personificada que reacciona ante lo intolerable. No se añade explicación doctrinal que el texto no contiene; se mantiene el efecto poético y retórico.
  doctrine_reference: Literatura sapiencial; personificación poética
- issue: 'Sentido de נשׂא en el infinitivo: cargar, soportar o endurecer'
  english_pob_reading: cannot bear up
  chosen_spanish_reading: no puede soportarlo
  alternative_spanish_readings:
  - no puede llevarlo
  - no puede sostenerlo
  - no puede endurecerlo
  rationale: El audit trail inglés preserva la tensión semántica entre cargar, sostener y resistir. «Soportarlo» mantiene esa amplitud en español sin perder claridad ni forzar una sola acepción.
  doctrine_reference: HALOT; נָשָׂא
translation_notes:
  revision_awareness: El pasaje presenta acuerdo alto en el control cruzado y no requirió cambios textuales. La versión española mantiene la fórmula numérica hebrea («tres... cuatro»), la personificación de la tierra y la amplitud semántica de שְׂאֵת/נָשָׂא sin suavizarla en exceso.
  spanish_consistency_notes:
  - Se usó «tierra» para אֶרֶץ por el alcance personificado y cósmico del proverbio.
  - Se evitó «SEÑOR» u otro remplazo porque no aparece el tetragrámaton en este versículo.
  - «Soportarlo» conserva el objeto implícito del hebreo y la tensión entre cargar y resistir.
