  text: For you know that afterward[a], when he wanted to inherit the blessing, he was rejected, for he found no opportunity for repentance[b], though he sought it with tears.
  footnotes:
  - marker: a
    text: Or, 'he found no place for repentance'; this may mean he found no opportunity to reverse the outcome, or that he could not obtain a change of mind from Isaac.
    reason: alternative_reading
  - marker: b
    text: The pronoun 'it' may refer to 'the blessing' or, less likely, to 'repentance/opportunity'; the Greek leaves the referent ambiguous.
    reason: lexical_alternative
