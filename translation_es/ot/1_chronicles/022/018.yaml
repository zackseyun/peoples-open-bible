  revised_footnotes:
  - marker: a
    text: O, 'a la vista de su pueblo'. El pronombre en 'su pueblo' se entiende mejor como referido a Yahvé, aunque algunos pueden entenderlo como referido a David.
    reason: alternative_reading
  revision_rationale: Se añade una nota para preservar la alternativa interpretativa documentada en el POB inglés sobre el referente de 'su pueblo', y se ajusta 'por todos lados' a 'por todas partes' para un registro más natural y digno sin alterar el sentido.
