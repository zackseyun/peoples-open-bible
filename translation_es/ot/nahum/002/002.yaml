translation:
  language: es
  text: Ha subido un destructor[a] contra tu rostro[b]. Guarda la fortaleza[c]; vigila el camino; fortalece tus lomos; reúne toda tu fuerza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un dispersador» o «uno que hace pedazos»; el término hebreo puede enfatizar tanto la dispersión como la destrucción violenta.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «contra tu rostro»; es un modismo que significa directamente delante de ti o contra ti.
    reason: lexical_alternative
  - marker: c
    text: O «la plaza fuerte» o posiblemente «la fortificación» / «las obras de asedio»; el sustantivo hebreo puede referirse con mayor amplitud a una posición fortificada o sitiada.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָה
  english_pob_choice: has come up
  chosen_spanish: Subió
  alternatives_spanish:
  - ha avanzado
  - ha venido
  lexicon: HALOT
  rationale: El perfecto hebreo presenta al atacante como ya en movimiento o ya llegado; «subió» conserva la imagen militar de ascender contra una ciudad o posición fortificada, sin introducir una paráfrasis más explicativa de lo que el hebreo permite.
- source_word: מֵפִיץ
  english_pob_choice: a scatterer
  chosen_spanish: saqueador
  alternatives_spanish:
  - dispersador
  - destructor
  - el que hace pedazos
  lexicon: HALOT
  rationale: El sustantivo participial describe un agente de destrucción con matiz de dispersar o desbaratar. En español, «saqueador» comunica de forma natural la acción hostil y devastadora, aunque no agota por completo la posible tensión entre dispersar y hacer pedazos; por eso se mantienen alternativas más literales.
- source_word: עַל פָּנַיִךְ
  english_pob_choice: against your face
  chosen_spanish: contra tu rostro
  alternatives_spanish:
  - delante de ti
  - contra ti
  lexicon: HALOT
  rationale: Se conserva la imagen corporal del hebreo («sobre tu rostro») con una expresión española comprensible. «Contra tu rostro» mantiene el tono vívido y la fuerza de confrontación del idiomático original.
- source_word: נָצוֹר
  english_pob_choice: Guard
  chosen_spanish: Guarda
  alternatives_spanish:
  - Mantén guardia
  - Protege
  lexicon: HALOT
  rationale: Es un imperativo breve y militar. «Guarda» reproduce la urgencia de la instrucción defensiva con un verbo natural en español bíblico contemporáneo.
- source_word: מְצֻרָה
  english_pob_choice: the fortress
  chosen_spanish: la fortaleza
  alternatives_spanish:
  - la fortificación
  - la plaza fortificada
  - la obra de asedio
  lexicon: HALOT
  rationale: El sustantivo puede referirse a una posición fortificada o al estado de asedio/fortificación. «La fortaleza» es una equivalencia sobria y pública para este contexto, sin cerrar del todo la amplitud del término hebreo.
- source_word: צַפֵּה דֶרֶךְ
  english_pob_choice: watch the road
  chosen_spanish: vigila el camino
  alternatives_spanish:
  - mira el camino
  - mantén vigilado el camino
  lexicon: HALOT
  rationale: El par imperativo + objeto tiene tono de centinela. «Camino» es la forma más natural en español para la vía de aproximación, y «vigila» conserva el sentido de observación defensiva.
- source_word: חַזֵּק מָתְנַיִם
  english_pob_choice: strengthen your loins
  chosen_spanish: refuerza tus lomos
  alternatives_spanish:
  - ciñe tus lomos
  - fortalece tus lomos
  lexicon: HALOT
  rationale: Se preserva la metáfora corporal tradicional del hebreo. «Refuerza» expresa preparación para la acción, y «lomos» mantiene el valor idiomático que en español bíblico es entendible sin reemplazarlo por una explicación abstracta.
- source_word: אַמֵּץ כֹּחַ
  english_pob_choice: muster your strength
  chosen_spanish: alista mucho tu fuerza
  alternatives_spanish:
  - muster tu fuerza
  - fortalece tu vigor
  - pon toda tu fuerza
  lexicon: HALOT
  rationale: El imperativo pide intensificar o reunir la fuerza disponible. «Alista» comunica preparación activa, y se retiene «mucho» para reflejar el adverbio final מְאֹד; aunque la combinación es poco usual, preserva la fuerza exhortativa del hebreo sin diluirla.
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran manera
  - sobremanera
  - muy
  lexicon: HALOT
  rationale: El adverbio intensifica la última orden. «Mucho» es la forma más directa en español para conservar el énfasis final, aunque su colocación con «alista» resulta algo marcada; la marca se compensa por fidelidad al cierre enfático del verso.
theological_decisions:
- issue: Imagen militar e idiomática de «contra tu rostro / sobre tu rostro»
  english_pob_reading: Literally 'against your face,' an idiom meaning directly before you or against you.
  chosen_spanish_reading: contra tu rostro
  alternative_spanish_readings:
  - delante de ti
  - contra ti
  rationale: Se mantiene el idiomatismo corporal del hebreo para no suavizar la confrontación. La opción «contra tu rostro» deja visible la tensión textual entre literalidad e idiomática, mientras que «delante de ti» explicaría el sentido pero perdería la imagen.
  doctrine_reference: Hermenéutica de la imagen profética y preservación del tropo bíblico
- issue: Posible amplitud semántica de מְצֻרָה
  english_pob_reading: the fortress; Or possibly 'the stronghold' or 'the siegeworks/fortification'
  chosen_spanish_reading: la fortaleza
  alternative_spanish_readings:
  - la fortificación
  - la plaza fortificada
  - la obra de asedio
  rationale: El hebreo admite más de una lectura concreta. «La fortaleza» es una solución pública y legible, pero se conserva en las notas la amplitud semántica para no borrar la incertidumbre lexicográfica.
  doctrine_reference: Respeto de variantes léxicas y transparencia textual
- issue: Metáfora corporal de «lomos»
  english_pob_reading: strengthen your loins
  chosen_spanish_reading: refuerza tus lomos
  alternative_spanish_readings:
  - ciñe tus lomos
  - fortalece tus lomos
  rationale: Se conserva la metáfora sin convertirla en una abstracción como «prepárate». La imagen de los lomos en el hebreo bíblico es parte del mandato de preparación para la acción; mantenerla ayuda a la recepción canónica del pasaje.
  doctrine_reference: Preservación de metáfora semítica en traducción bíblica
translation_notes:
  revision_awareness: La versión base en inglés fue revisada sin cambios en el pase más reciente; el cotejo final indicó alta concordancia con observaciones menores. Esta propuesta mantiene la estructura imperativa y las tensiones léxicas del audit trail, pero ajusta el español para una lectura pública natural.
  spanish_consistency_notes:
  - Se preservó el orden de las cuatro órdenes militares del verso.
  - Se mantuvo la metáfora corporal de «rostro» y «lomos» para reflejar el hebreo.
  - Se evitó el uso de «SEÑOR» u otra sustitución teológica no presente en este versículo.
  - Se eligió un español bíblico moderno, evitando arcaísmos innecesarios y sin aplanar la fuerza profética del original.
