  text: καὶ γὰρ οἱ ὄντες ἐν τῷ σκήνει στενάζομεν βαρούμενοι ἐφ’ ᾧ οὐ θέλομεν ἐκδύσασθαι ἀλλ’ ἐπενδύσασθαι, ἵνα καταποθῇ τὸ θνητὸν ὑπὸ τῆς ζωῆς.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/005/004.yaml
  text: For indeed, while we are in this tent, we groan, being burdened, because we do not want to be unclothed but to be further clothed, so that what is mortal may be swallowed up by life.
  footnotes:
  - marker: a
    text: Or 'to be clothed over.' The Greek verb suggests putting on an outer garment over what is already worn.
    reason: lexical_alternative
  - marker: b
    text: Or 'the mortal' or 'mortality.'
    reason: lexical_alternative
translation:
  language: ko
  text: 참으로 우리는 이 장막에 있는 동안 무거운 짐에 눌려 탄식합니다. 그 이유는 우리가 벗기를 원하는 것이 아니라 덧입기를 원하기 때문이며, 이는 죽을 것이 생명에 의해 삼켜지게 하려는 것입니다.
  philosophy: optimal-equivalence
