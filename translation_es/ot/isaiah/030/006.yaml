translation:
  language: es
  text: 'Oráculo acerca de las bestias del Negev[a]: por una tierra de angustia y dificultad, de leona y león[b], de víbora y serpiente ardiente que vuela, llevan sus riquezas sobre los hombros de asnos y sus tesoros sobre las jorobas de camellos, a un pueblo que no les aprovechará[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «carga acerca de las bestias del Sur». El hebreo del encabezamiento usa un término profético que puede verterse como «oráculo» o «carga», y «Negev» también puede entenderse más ampliamente como «el Sur».
    reason: lexical_alternative
  - marker: b
    text: O «león y león». Los dos términos hebreos para león son distintos, pero su diferencia precisa en este contexto es incierta.
    reason: lexical_alternative
  - marker: c
    text: O «a un pueblo que no les ayudará». El verbo hebreo puede significar «aprovechar» o «ser de ayuda».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשָּׂא
  english_pob_choice: An oracle
  chosen_spanish: Oráculo
  alternatives_spanish:
  - Carga
  - Pronunciamiento
  lexicon: HALOT
  rationale: En encabezados proféticos, מַשָּׂא introduce una comunicación oracular. «Oráculo» conserva ese valor de encabezamiento y es más transparente en español que «carga», aunque esta última mantiene la tradición de «burden».
- source_word: בַּהֲמוֹת נֶגֶב
  english_pob_choice: the beasts of the Negev
  chosen_spanish: las bestias del Negev
  alternatives_spanish:
  - las bestias del Sur
  - los animales del Negev
  lexicon: HALOT
  rationale: בַּהֲמוֹת nombra bestias o animales; «Negev» preserva el referente geográfico concreto mejor que «Sur» y evita perder el matiz regional del texto.
- source_word: בְּאֶרֶץ צָרָה וְצוּקָה
  english_pob_choice: through a land of distress and hardship
  chosen_spanish: por una tierra de angustia y opresión
  alternatives_spanish:
  - en una tierra de aflicción y angustia
  - por una tierra de angustia y dureza
  lexicon: HALOT
  rationale: 'La preposición con «tierra» se entiende bien como trayecto: «por». צָרָה y צוּקָה forman un par de cercanía semántica; «angustia y opresión» comunica bien la presión y estrechez del pasaje, aunque «hardship» también podría verterse como «dureza».'
- source_word: לָבִיא וָלַיִשׁ
  english_pob_choice: lioness and lion
  chosen_spanish: leona y león
  alternatives_spanish:
  - león y león
  - gran león y león
  lexicon: HALOT
  rationale: El hebreo distingue dos términos leoninos; como en inglés, conviene reflejar esa distinción sin volverla rígida. «Leona y león» preserva la doble imagen y fluye con naturalidad en español, aunque la diferencia zoológica exacta sigue siendo incierta.
- source_word: אֶפְעֶה
  english_pob_choice: viper
  chosen_spanish: víbora
  alternatives_spanish:
  - áspid
  - serpiente venenosa
  lexicon: HALOT
  rationale: Designa una serpiente venenosa. «Víbora» es un equivalente claro y natural en español moderno; «serpiente venenosa» explicita el sentido pero pierde concisión.
- source_word: שָׂרָף מְעוֹפֵף
  english_pob_choice: flying fiery serpent
  chosen_spanish: serpiente ardiente que vuela
  alternatives_spanish:
  - serpiente voladora ardiente
  - serpiente ígnea que vuela
  lexicon: HALOT
  rationale: שָׂרָף apunta a una serpiente ardiente/abrasadora, y מְעוֹפֵף significa volador o que vuela. «Serpiente ardiente que vuela» mantiene el orden natural del español y conserva la imagen, sin resolver indebidamente su referencial zoológico.
- source_word: יִשְׂאוּ
  english_pob_choice: they carry
  chosen_spanish: llevan
  alternatives_spanish:
  - cargan
  - transportan
  lexicon: HALOT
  rationale: Aquí describe el traslado de bienes sobre animales de carga. «Llevan» es natural y suficientemente fiel; «cargan» podría sonar más áspero y «transportan» más técnico.
- source_word: עַל כֶּתֶף עֲיָרִים
  english_pob_choice: on the shoulders of donkeys
  chosen_spanish: sobre los lomos de asnos
  alternatives_spanish:
  - sobre los hombros de asnos
  - sobre el lomo de los asnos
  lexicon: HALOT
  rationale: כֶּתֶף es literalmente «hombro», pero en español aplicado a animales «lomos» resulta más natural. Se conserva el sentido de carga sobre el animal sin sonar forzado.
- source_word: חֵילֵהֶם
  english_pob_choice: their wealth
  chosen_spanish: sus riquezas
  alternatives_spanish:
  - sus bienes
  - sus tesoros
  lexicon: HALOT
  rationale: חַיִל puede denotar riqueza o recursos; en este contexto de envío diplomático, «riquezas» es fiel y fluido. «Tesoros» se reserva más bien para el término siguiente.
- source_word: דַּבֶּשֶׁת גְּמַלִּים
  english_pob_choice: the humps of camels
  chosen_spanish: las jorobas de camellos
  alternatives_spanish:
  - los lomos de camellos
  - las jorobas de los camellos
  lexicon: HALOT
  rationale: דַּבֶּשֶׁת designa específicamente la joroba del camello. «Jorobas» preserva la imaginería concreta del hebreo mejor que una generalización como «lomos».
- source_word: אֹצְרֹתָם
  english_pob_choice: their treasures
  chosen_spanish: sus tesoros
  alternatives_spanish:
  - sus depósitos
  - sus bienes
  lexicon: HALOT
  rationale: El sustantivo se refiere a bienes almacenados o tesoros. En este contexto, «tesoros» es la mejor equivalencia española y mantiene el contraste con «riquezas».
- source_word: עַל עַם לֹא יוֹעִילוּ
  english_pob_choice: to a people who cannot profit them
  chosen_spanish: a un pueblo que no les aprovechará
  alternatives_spanish:
  - a un pueblo que no les será de ayuda
  - a un pueblo del que no obtendrán provecho
  lexicon: HALOT
  rationale: יוֹעִילוּ puede significar «aprovechar», «beneficiar» o «ayudar». «No les aprovechará» conserva la idea de provecho y la ironía del pasaje; además sigue de cerca la relación verbal del hebreo.
theological_decisions:
- issue: Caracterización del listado de criaturas peligrosas
  english_pob_reading: Render the animal terms straightforwardly as features of the hazardous wilderness journey, without allegorizing them.
  chosen_spanish_reading: Presentar los términos animales de manera literal como rasgos del viaje peligroso por el desierto, sin alegorizarlos.
  alternative_spanish_readings:
  - Interpretar algunas criaturas como símbolos de potencias políticas
  - Reducir la lista a un genérico «bestias salvajes y serpientes»
  rationale: El texto subraya la dureza y el riesgo del camino. Mantener la imaginería concreta respeta la tensión profética y evita introducir lecturas simbólicas que el verso no explicita.
  doctrine_reference: 'Filosofía de traducción: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: La comparación con la revisión más reciente no exige cambios sustantivos; esta versión conserva el sentido auditado del original hebreo y sigue las decisiones léxicas ya establecidas en el expediente inglés, adaptándolas a un español natural y publicable.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantiene «Mesías/Cristo» fuera del texto porque no aparece en el verso.
  - «Oráculo» se usa como equivalente de מַשָּׂא para preservar la función de encabezamiento profético.
  - Se opta por «Negev» en transliteración para mantener el referente geográfico concreto.
  - Las imágenes animales y de carga se mantienen literales para no borrar la tensión del pasaje.
