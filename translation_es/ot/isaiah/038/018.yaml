translation:
  language: es
  text: Porque el Seol[a] no te da gracias; la muerte no te alaba; los que descienden a la fosa no esperan tu fidelidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sepulcro» o «la región de los muertos» para «Seol».
    reason: lexical_alternative
  - marker: b
    text: O «aguardan tu verdad». El hebreo también puede entenderse como «esperan tu verdad/fidelidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - el sepulcro
  - la región de los muertos
  lexicon: HALOT
  rationale: Conservo el término técnico hebreo transliterado como «Seol», para no reducirlo a «sepulcro» ni a otra imagen más estrecha. En español, esta forma mantiene el referente del mundo de los muertos y sigue siendo inteligible en un registro bíblico moderno.
- source_word: תּוֹדֶךָּ
  english_pob_choice: thank you
  chosen_spanish: te da gracias
  alternatives_spanish:
  - te alaba
  - te agradece
  lexicon: HALOT
  rationale: La forma verbal aquí expresa dar gracias o agradecer. «Te da gracias» preserva el sentido de acción de gracias y mantiene la diferencia con el verbo paralelo «alaba» en el segundo colon.
- source_word: מָוֶת
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - la muerte
  lexicon: HALOT
  rationale: Traducción directa y natural del sustantivo, conservando la personificación poética del paralelismo.
- source_word: יְהַלְלֶךָּ
  english_pob_choice: praise you
  chosen_spanish: te alaba
  alternatives_spanish:
  - te celebra
  - te exalta
  lexicon: HALOT
  rationale: «Alabar» es el equivalente más natural y fiel para הלל en este contexto poético. Mantiene el paralelismo con el primer miembro sin añadir matices no sustentados.
- source_word: יְשַׂבְּרוּ
  english_pob_choice: hope for
  chosen_spanish: esperan
  alternatives_spanish:
  - aguardan
  - ponen su esperanza en
  lexicon: HALOT
  rationale: El verbo puede expresar esperar con expectación o esperar en esperanza. «Esperan» conserva esa amplitud sin sobreespecificar. En español, «esperar tu fidelidad» transmite la idea de confiar en ella o aguardarla.
- source_word: יוֹרְדֵי ב֖וֹר
  english_pob_choice: those who go down to the pit
  chosen_spanish: los que descienden a la fosa
  alternatives_spanish:
  - los que bajan al sepulcro
  - los que van bajando al pozo
  lexicon: HALOT
  rationale: «Fosa» reproduce la imagen concreta de בּוֹר y evita interpretarla como simple tumba. «Descienden» conserva el participio hebreo y la imaginería de descenso al ámbito de la muerte.
- source_word: בּוֹר
  english_pob_choice: the pit
  chosen_spanish: la fosa
  alternatives_spanish:
  - el pozo
  - el sepulcro
  lexicon: HALOT
  rationale: En este contexto poético, «fosa» comunica bien la imagen de profundidad y muerte, y en español resulta más natural que «pozo» sin perder la metáfora.
- source_word: אֲמִתֶּךָ
  english_pob_choice: your faithfulness
  chosen_spanish: tu fidelidad
  alternatives_spanish:
  - tu verdad
  - tu veracidad
  lexicon: HALOT
  rationale: «Fidelidad» capta el sentido relacional y de pacto que la hebrea אֱמֶת puede tener aquí. En español, evita la ambigüedad de «verdad», que podría sonar más abstracta o proposicional en este contexto.
theological_decisions:
- issue: Si la afirmación sobre los muertos debe leerse ontológicamente o desde la perspectiva del culto terrenal
  english_pob_reading: 'The verse speaks phenomenologically from the perspective of earthly worship: the dead in Sheol do not participate in public thanksgiving and praise as the living do.'
  chosen_spanish_reading: 'El versículo se entiende de manera fenomenológica, desde la perspectiva del culto en esta vida: los muertos en el Seol no participan del agradecimiento y la alabanza públicos como los vivos.'
  alternative_spanish_readings:
  - Los muertos son incapaces de toda relación consciente con Dios.
  - El texto solo afirma que no alaban en ese momento, sin implicar nada más.
  rationale: La poesía hebrea subraya la pérdida de la alabanza y la esperanza en la esfera de la muerte, pero no obliga a formular una doctrina exhaustiva sobre el estado intermedio. La redacción española conserva esa tensión teológica sin resolverla de más.
  doctrine_reference: Preservar la tensión teológica; no ir más allá del texto.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente sin cambios sustantivos: mantiene la distinción poética entre agradecer, alabar y esperar; conserva el término técnico «Seol»; y prefiere «fidelidad» para אֲמִתֶּךָ, de acuerdo con el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «Seol» como transliteración estable del término hebreo técnico.
  - Se reserva «fidelidad» para אֲמִתֶּךָ por su valor de pacto y confiabilidad.
  - 'Se traduce el paralelismo con verbos diferenciados: «da gracias», «alaba», «esperan».'
  - «Fosa» mantiene la imagen de בּוֹר sin domesticarse a «sepulcro» en el texto principal.
