  to: Entonces el rey volvió y llegó hasta el Jordán, y Judá[a] llegó a Gilgal para ir a recibir al rey, para hacer cruzar al rey el Jordán.
  rationale: Se corrigió la nota al pie para reflejar una alternativa real y documentada, y se reemplazó la construcción poco idiomática «hacer pasar al rey el Jordán» por «hacer cruzar al rey el Jordán», que preserva la causatividad del hebreo con mejor español. No se requieren cambios mayores ni adjudicación adicional.
