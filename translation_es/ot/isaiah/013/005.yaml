    text: 'O: «desde los confines más lejanos de los cielos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y los instrumentos de su furor».'
    reason: lexical_alternative
  - marker: c
    text: «Toda la tierra» también puede traducirse «todo el país», pero el lenguaje cósmico del verso favorece aquí el sentido más amplio.
    reason: lexical_alternative
  revision_rationale: Se corrigen las notas para que coincidan con la evidencia fuente y la auditoría inglesa, se mejora la naturalidad de 'tierra lejana', y se ajusta la puntuación para reflejar mejor la estructura parentética del versículo sin cambiar su sentido.
