translation:
  language: es
  text: En aquel tiempo, Salomón celebró la fiesta[a], y con él todo Israel, una gran asamblea desde Lebo-Hamat hasta el arroyo de Egipto[b], delante de Yahvé nuestro Dios, siete días y siete días, catorce días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde la entrada de Hamat». El hebreo puede leerse como una expresión descriptiva de frontera o como el nombre propio Lebo-Hamat.
    reason: alternative_reading
  - marker: b
    text: O «uadi de Egipto». El término hebreo suele referirse a un cauce estacional más que a un río principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: held
  chosen_spanish: celebró
  alternatives_spanish:
  - hizo
  - observó
  - guardó
  lexicon: HALOT
  rationale: Con חָג, el verbo hebreo expresa la celebración u observancia de una fiesta. En español, «celebró» transmite la acción festiva de modo natural y fiel, sin reducirla a un simple «hacer».
- source_word: הֶחָג
  english_pob_choice: the feast
  chosen_spanish: la fiesta
  alternatives_spanish:
  - la festividad
  - el festejo
  lexicon: HALOT
  rationale: חָג designa una fiesta o festividad de peregrinación. «Fiesta» es claro, digno y suficientemente amplio para este contexto de dedicación del templo.
- source_word: קָהָל גָּדוֹל
  english_pob_choice: a great assembly
  chosen_spanish: una gran asamblea
  alternatives_spanish:
  - una gran congregación
  - una gran reunión
  lexicon: HALOT
  rationale: «Asamblea» preserva el sentido formal de un pueblo reunido, evitando la carga eclesiástica específica de «congregación» y manteniendo el tono público del pasaje.
- source_word: מִלְּבֹא חֲמָת
  english_pob_choice: from Lebo-hamath
  chosen_spanish: desde Lebo-Hamat
  alternatives_spanish:
  - desde la entrada de Hamat
  lexicon: HALOT
  rationale: La frase puede leerse como nombre geográfico fijo o como expresión descriptiva. En el texto principal se conserva la forma toponímica «Lebo-Hamat», con la alternativa descriptiva preservada en nota.
- source_word: נַחַל מִצְרַיִם
  english_pob_choice: the Brook of Egypt
  chosen_spanish: el arroyo del río de Egipto
  alternatives_spanish:
  - el torrente de Egipto
  - el uadi de Egipto
  - el arroyo de Egipto
  lexicon: HALOT
  rationale: נַחַל suele referirse a un wadi, cauce estacional o arroyo, no a un gran río. Para mantener ese valor y a la vez sonar natural en español, se usa «arroyo»; se conserva «de Egipto» para reflejar el término hebreo. La opción «río» en inglés queda evitada por su posible confusión con el Nilo.
- source_word: לִפְנֵי יְהוָה אֱלֹהֵינוּ
  english_pob_choice: before Yahweh our God
  chosen_spanish: delante de Yahvé nuestro Dios
  alternatives_spanish:
  - en presencia de Yahvé nuestro Dios
  - ante Yahvé nuestro Dios
  lexicon: HALOT
  rationale: 'לִפְנֵי expresa localización relacional: «delante de» / «ante» / «en presencia de». Se mantiene la convención del proyecto para יְהוָה como «Yahvé», no como una sustitución reverencial impersonal.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé». Esta forma conserva el nombre del pacto y evita la máscara litúrgica de «SEÑOR».'
- source_word: שִׁבְעַת יָמִים וְשִׁבְעַת יָמִים
  english_pob_choice: seven days and seven days
  chosen_spanish: siete días y siete días
  alternatives_spanish:
  - durante siete días y siete días
  - siete días, y otros siete días
  lexicon: HALOT
  rationale: La repetición hebrea se conserva de manera transparente en español, porque probablemente marca dos periodos consecutivos de siete días. No se colapsa la estructura en una paráfrasis más fluida que borraría esa repetición.
- source_word: אַרְבָּעָה עָשָׂר יוֹם
  english_pob_choice: fourteen days
  chosen_spanish: catorce días
  alternatives_spanish:
  - 14 días
  lexicon: HALOT
  rationale: La suma final resume la duración total. «Catorce días» es la formulación natural y exacta en español.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al estándar del proyecto, se preserva el nombre divino en español como «Yahvé», manteniendo su valor pactual y evitando una sustitución reverencial genérica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Lectura de מִלְּבֹא חֲמָת
  english_pob_reading: from Lebo-hamath / from the entrance of Hamath
  chosen_spanish_reading: desde Lebo-Hamat
  alternative_spanish_readings:
  - desde la entrada de Hamat
  rationale: La frase funciona en la tradición bíblica tanto como topónimo fijo como expresión descriptiva de frontera. El texto principal conserva el topónimo, mientras la nota ofrece la lectura alternativa sin borrar la tensión lexical.
  doctrine_reference: No doctrinal issue; lexical boundary marker preserved per source
- issue: Valor de נַחַל מִצְרַיִם
  english_pob_reading: the Brook of Egypt / the Wadi of Egypt
  chosen_spanish_reading: el arroyo del río de Egipto
  alternative_spanish_readings:
  - el arroyo de Egipto
  - el torrente de Egipto
  - el uadi de Egipto
  rationale: El hebreo נַחַל apunta a un cauce estacional o arroyo. La formulación española busca reflejar ese valor, aunque la construcción resulte menos habitual; así se evita rebajar el contenido geográfico a un «río» en sentido estricto.
  doctrine_reference: No doctrinal issue; geographical lexical precision
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó de una versión con guiones largos y «the LORD» a una redacción con comas y «Yahweh». La versión española sigue esa línea revisada: mantiene la estructura sintáctica sobria, conserva la repetición de «siete días y siete días», y refleja el nombre divino como «Yahvé» de forma consistente con el estándar del proyecto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en todo el versículo.
  - Se conserva la repetición de «siete días y siete días» para no ocultar la estructura hebrea.
  - «Lebo-Hamat» se escribe con guion para reflejar el toponímico compuesto.
  - «Asamblea» se usa por su valor formal y comunitario, no como término litúrgico técnico.
  - La nota b preserva la ambigüedad de נַחַל sin imponer una sola equivalencia geográfica.
