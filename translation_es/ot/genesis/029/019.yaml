translation:
  language: es
  text: 'Labán dijo[a]: «Es mejor que yo te la dé a ti que dársela a otro hombre. Quédate conmigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Es bueno para mí darla a ti más que darla a otro hombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió
  - habló
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol de אמר introduce el discurso directo; en español, «dijo» es la equivalencia natural y transparente, sin añadir matiz de respuesta que el hebreo no exige.
- source_word: טוֹב
  english_pob_choice: it is better
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Es bueno
  - Es mejor
  lexicon: HALOT
  rationale: En la construcción comparativa con מִן + infinitivo, el valor es comparativo. «Mejor es» conserva ese sentido con una formulación española digna y clara.
- source_word: תִּתִּי אֹתָהּ לָךְ
  english_pob_choice: that I give her to you
  chosen_spanish: que yo se la dé a ti
  alternatives_spanish:
  - que yo te la dé
  - darla a ti
  lexicon: HALOT
  rationale: El infinitivo con sufijo funciona verbalmente tras טוֹב. En español se vuelve más natural como cláusula con subjuntivo. «Se la dé» reproduce el objeto femenino y el destinatario sin perder claridad.
- source_word: מִתִּתִּי אֹתָהּ לְאִישׁ אַחֵר
  english_pob_choice: than that I give her to another man
  chosen_spanish: que dársela a otro hombre
  alternatives_spanish:
  - que yo se la dé a otro hombre
  - que darla a otro hombre
  lexicon: HALOT
  rationale: La comparación con מִן + infinitivo queda bien en español con «que + infinitivo». «Otro hombre» preserva la literalidad de אִישׁ אַחֵר sin añadir la interpretación «otro esposo».
- source_word: אִישׁ אַחֵר
  english_pob_choice: another man
  chosen_spanish: otro hombre
  alternatives_spanish:
  - otro esposo
  - alguien más
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «un hombre otro». En este contexto matrimonial podría insinuar «esposo», pero «otro hombre» mantiene la forma del original y evita una glosa interpretativa.
- source_word: שְׁבָה
  english_pob_choice: stay
  chosen_spanish: Quédate
  alternatives_spanish:
  - Permanece
  - Vive
  lexicon: HALOT
  rationale: El imperativo de ישׁב aquí indica permanecer/seguir en un lugar. «Quédate» comunica bien el sentido inmediato en español contemporáneo.
- source_word: עִמָּדִי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - a mi lado
  - junto a mí
  lexicon: HALOT
  rationale: La preposición expresa compañía y permanencia con Laban; «conmigo» es la forma más natural y fiel en español.
translation_notes:
  revision_awareness: El texto coincide con la evaluación de alta concordancia y no requiere cambios sustantivos respecto del sentido hebreo ni del audit trail inglés; se conservó la comparativa y el matiz literal de אִישׁ אַחֵר.
  spanish_consistency_notes:
  - Se mantuvo el tono narrativo sobrio y directo propio del relato.
  - Se evitó «esposo» para no añadir una interpretación no explícita en el hebreo.
  - Se prefirió «Quédate conmigo» por naturalidad y fidelidad al imperativo de permanencia.
  - La nota al pie conserva la alternativa literal que el audit trail inglés consideró importante.
