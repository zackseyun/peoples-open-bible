translation:
  language: es
  text: Y en tu descendencia serán bendecidas[a] todas las naciones de la tierra, porque has obedecido mi voz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «se bendecirán a sí mismas». El verbo hebreo puede entenderse reflexivamente aquí.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִתְבָּרֲכוּ
  english_pob_choice: will be blessed
  chosen_spanish: serán bendecidas
  alternatives_spanish:
  - se bendecirán
  - se bendecirán a sí mismas
  lexicon: HALOT
  rationale: El hitpael de ברך admite una lectura pasiva/resultativa o reflexiva. En español, «serán bendecidas» expresa con naturalidad el sentido promesal del contexto abrahámico, sin cerrar la posibilidad reflexiva que el hebreo también permite.
- source_word: בְזַרְעֲךָ
  english_pob_choice: in your offspring
  chosen_spanish: en tu descendencia
  alternatives_spanish:
  - por tu descendencia
  - en tu simiente
  lexicon: HALOT
  rationale: זֶרַע es un sustantivo colectivo; «descendencia» comunica bien la idea de linaje colectivo en español contemporáneo. Mantengo «en» para reflejar la fórmula pactual y no forzar una causalidad instrumental que el hebreo no explicita.
- source_word: כֹּל גּוֹיֵי הָאָרֶץ
  english_pob_choice: all the nations of the earth
  chosen_spanish: todas las naciones de la tierra
  alternatives_spanish:
  - todos los pueblos de la tierra
  lexicon: HALOT
  rationale: גּוֹיִם se traduce de forma directa como «naciones». «De la tierra» conserva el alcance universal del hebreo הָאָרֶץ en este contexto.
- source_word: עֵקֶב אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - debido a que
  - ya que
  lexicon: HALOT
  rationale: La expresión introduce la base causal de la reafirmación de la promesa. «Porque» es la forma más natural y fiel en español.
- source_word: שָׁמַעְתָּ בְּקֹלִי
  english_pob_choice: you have obeyed my voice
  chosen_spanish: has obedecido mi voz
  alternatives_spanish:
  - has escuchado mi voz
  - has oído mi voz
  lexicon: HALOT
  rationale: El hebreo שׁמע בקול implica respuesta obediente, no solo percepción auditiva. «Has obedecido mi voz» conserva esa fuerza idiomática mejor que una traducción literal de «oír» o «escuchar».
theological_decisions:
- issue: Sentido del hitpael de ברך en la promesa abrahámica
  english_pob_reading: The nations are described as receiving blessing in Abraham's offspring ('will be blessed').
  chosen_spanish_reading: Las naciones reciben bendición en la descendencia de Abraham («serán bendecidas»).
  alternative_spanish_readings:
  - las naciones se bendecirán a sí mismas
  - las naciones serán usadas como fórmula de autobenecir
  rationale: 'El contexto del pacto favorece una lectura pasiva/resultativa: las naciones participan de la bendición mediante la descendencia prometida. Sin embargo, el hebreo también puede sostener una lectura reflexiva, por lo que la nota preserva esa tensión en lugar de eliminarla.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica cuando el hebreo la permite.'
translation_notes:
  revision_awareness: Ajusté la nota de pie para que el marcador [a] aparezca explícitamente en el texto español, corrigiendo la validación anterior. No se realizaron otros cambios de sentido respecto del contexto auditado.
  spanish_consistency_notes:
  - He mantenido un registro bíblico claro y contemporáneo, evitando el calco mecánico.
  - «Descendencia» conserva el valor colectivo de זֶרַע sin perder legibilidad.
  - «Naciones de la tierra» sigue la terminología pactual más directa y natural en español.
  - La voz verbal en plural («serán bendecidas») respeta el sujeto plural «todas las naciones».
  - La nota [a] queda anclada en el término traducido para señalar la alternativa reflexiva sin romper la lectura principal.
