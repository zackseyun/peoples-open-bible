translation:
  text: 'Among the peoples[a], they have named me “Death.”

    I am she whom they call “Law,” and you have called me “Lawlessness.”

    I am she whom you pursued, and I am she whom you seized.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They have named me “Law,” and you have named me “Lawlessness.”'.
    reason: previous_rendering
lexical_decisions:
- source_word: ϩⲛⲙⲁⲛⲓⲙ
  chosen: among the peoples
  alternatives:
  - in many places
  - among the nations
  lexicon: Crum, Coptic Dictionary (general sense of locative phrase; segmentation
    uncertain)
  rationale: ϩⲛ marks location (“in/among”); ⲙⲁⲛⲓⲙ is uncertain in this OCR, possibly
    “places” or a collective plural. I chose a broad social sense to avoid false precision
    while keeping the plural-locative force.
- source_word: ⲙⲟⲩⲧⲉ (verb)
  chosen: name/call
  alternatives:
  - call
  - entitle
  lexicon: Crum, Coptic Dictionary; common Sahidic usage ⲙⲟⲩⲧⲉ ⲉⲣⲟⲥ ϫⲉ … = “call/name
    (me) …”
  rationale: Standard verb of naming with ϫⲉ introducing the quoted name.
- source_word: ⲡⲙⲟⲩ
  chosen: Death
  alternatives:
  - the death
  lexicon: Crum, Coptic Dictionary
  rationale: ⲡ- marks definiteness, but in quoted naming I render as the title “Death”
    to reflect the onomastic function and cadence.
- source_word: ⲡⲛⲟⲙⲟⲥ
  chosen: Law
  alternatives:
  - statute
  - rule
  lexicon: Greek loan (νόμος) in Coptic; standard legal term
  rationale: Capitalized to mirror the quoted title and to sharpen the antithesis
    with ⲁⲛⲟⲙⲓⲁ.
- source_word: ⲧⲁⲛⲟⲙⲓⲁ
  chosen: Lawlessness
  alternatives:
  - transgression
  - iniquity
  lexicon: Greek loan (ἀνομία) in Coptic
  rationale: “Lawlessness” keeps the formal antithetical echo with “Law” and preserves
    the Greek-derived pair.
- source_word: ⲁⲧⲉⲧⲛⲙⲟⲩⲧⲉ
  chosen: you have named (me)
  alternatives:
  - you called (me)
  lexicon: Sahidic perfect 2nd plural; Crum, grammar notes
  rationale: Perfect aspect (“you have named”) matches the form and contrasts with
    the third plural in the preceding clause.
- source_word: ⲁⲛⲟⲕ ⲧⲉ …
  chosen: I am she …
  alternatives:
  - I am the one …
  lexicon: Sahidic copular construction with feminine ⲧⲉ
  rationale: Thunder’s speaker is grammatically feminine; retaining “she” preserves
    voice and cadence.
- source_word: ⲡⲱⲧ ⲛⲥⲱⲥ
  chosen: pursued me
  alternatives:
  - ran after me
  - chased me
  lexicon: Crum, Coptic Dictionary (ⲡⲱⲧ “to run”); idiomatic with object as ‘pursue’
  rationale: “Pursued” matches the idiom and pairs well with “seized” to keep the
    action parallelism tight.
- source_word: ⲁⲙⲁϩⲧⲉ
  chosen: seized
  alternatives:
  - grasped
  - held fast
  - arrested
  lexicon: Crum, Coptic Dictionary
  rationale: “Seized” carries the physical and confrontational nuance that balances
    “pursued.”
parallelism_check: 'This line block retains two clear pairs: (1) Law vs. Lawlessness
  (explicit antithesis); (2) pursued vs. seized (sequential pursuit/capture pair,
  not a contradiction but a coupled action that the poem often uses for rhythmic/semantic
  parallelism). The “Death” naming stands alone in this block, likely paired with
  “Life” in an adjacent segment; I have not forced a synthetic pair to avoid distorting
  the given lines.'
voice_check: The feminine first-person voice is preserved in the double “I am she
  …” declarations, while third-person attributions remain as “they have named me …
  / you have named me …,” maintaining the speaker’s confrontational, paradox-forward
  tone.
alignment_risk_note: 'Alignment confidence is only medium, and the consult text (“wisdom
  of the Greeks … knowledge of the barbarians”) does not match the visible Coptic,
  which clearly includes ⲡⲛⲟⲙⲟⲥ/ⲁⲛⲟⲙⲓⲁ (“law/lawlessness”), ⲡⲙⲟⲩ (“death”), and the
  pursuit/seizure verbs (ⲡⲱⲧ, ⲁⲙⲁϩⲧⲉ). I therefore translate what is legible rather
  than forcing it to the consult. Two places are especially uncertain due to OCR segmentation:
  (a) ϩⲛⲙⲁⲛⲓⲙ (rendered broadly as “among the peoples”) and (b) the missing/merged
  subject marker before ⲙⲟⲩⲧⲉ ϫⲉ ⲡⲙⲟⲩ, where I infer a third-plural “they have named
  me.”'
