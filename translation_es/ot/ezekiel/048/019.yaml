translation:
  language: es
  text: Y los que sirven a la ciudad la servirán de entre todas las tribus de Israel[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que sirve a la ciudad la servirá». El participio hebreo es singular, pero aquí probablemente tiene sentido colectivo.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice «la servirá / le servirá», con sufijo masculino singular; en contexto, se refiere a la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֹבֵד
  english_pob_choice: those who serve
  chosen_spanish: los que sirvan
  alternatives_spanish:
  - el que sirva
  - los que sirven
  - los servidores
  lexicon: HALOT
  rationale: El participio singular con artículo puede funcionar con sentido colectivo en contexto. En español, el plural relativo 'los que sirvan' expresa de manera natural ese valor colectivo sin perder el vínculo léxico con 'servir'.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  - la ciudad misma
  lexicon: HALOT
  rationale: עִיר se traduce de forma directa por 'ciudad'. El artículo definido se conserva con 'la ciudad'.
- source_word: יַעַבְדֻהוּ
  english_pob_choice: shall serve it
  chosen_spanish: la servirán
  alternatives_spanish:
  - servirán a ella
  - le servirán
  - la trabajarán
  lexicon: HALOT
  rationale: El verbo עבד mantiene aquí el sentido de prestar servicio/labor. En español, repetir 'servir' conserva la relación léxica con el participio inicial. El sufijo masculino singular se resuelve naturalmente con 'la' por la referencia a 'ciudad' en español.
- source_word: מִכֹּל
  english_pob_choice: from all
  chosen_spanish: de entre todas
  alternatives_spanish:
  - de todas
  - de entre todos
  lexicon: HALOT
  rationale: 'מן + כֹּל expresa origen o procedencia: los que sirven a la ciudad provienen de todas las tribus. ''De entre todas'' comunica mejor esa procedencia que un simple ''de todas''.'
- source_word: שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: the tribes of Israel
  chosen_spanish: las tribus de Israel
  alternatives_spanish:
  - las tribus israelitas
  - las tribus de Israel
  lexicon: HALOT
  rationale: Construcción estándar. 'Las tribus de Israel' conserva el genitivo de pertenencia y la formulación natural en español.
translation_notes:
  revision_awareness: El audit trail inglés revisó 'work in the city' por 'serve the city' para reflejar con más precisión el hebreo y mantener coherencia con el verbo siguiente. La versión española sigue esa decisión y conserva la posible tensión entre el participio singular hebreo y el sentido colectivo en plural mediante una nota.
  spanish_consistency_notes:
  - Se mantiene 'servir' para ambos miembros de la cláusula, siguiendo la consistencia léxica del hebreo עבד.
  - Se opta por 'la ciudad' para ajustar el género natural del referente en español; el sufijo hebreo masculino singular se explica en nota.
  - Se conserva el valor colectivo del participio singular mediante 'los que sirvan'.
