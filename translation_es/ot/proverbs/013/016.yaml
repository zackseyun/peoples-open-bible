review_pass:
  verdict: approve
  source_alignment_summary: 'El borrador español refleja fielmente el hebreo y el rastro auditado en inglés: כָּל con sentido distributivo, עָרוּם como «prudente», יַעֲשֶׂה como conducta habitual («obra»), בְדָעַת como base instrumental («con conocimiento»), y el segundo colon con contraste proverbial natural («pero el necio»). «Despliega necedad» preserva bien el sentido de יִפְרֹשׂ como hacer visible o extender, y la nota conserva las alternativas léxicas documentadas.'
  spanish_quality_summary: El español es claro, natural y digno. La sintaxis proverbial fluye bien y evita calcos toscos. «Todo hombre prudente» suena algo más marcado por género que otras opciones posibles, pero sigue siendo legible y coherente con la decisión auditada de representar el singular masculino. La nota al pie está bien formulada y comprensible.
  glossary_alignment: No hay términos de glosario mayor en juego aparte del vocabulario sapiencial. «Necio / necedad» y «prudente» concuerdan bien con el uso de Proverbios. No hay conflictos con los defaults del proyecto.
  issues:
  - severity: low
    issue: «Todo hombre prudente» puede sonar algo pesado en español contemporáneo.
    rationale: Aunque es fiel al masculino representativo del hebreo y al audit trail inglés, en español más idiomático también podría decirse «Todo prudente» o «Todo el prudente actúa…»; sin embargo, no hace falta corrección porque la redacción actual sigue siendo natural y clara.
