translation:
  language: ko
  text: 곧 메시아께서 고난을 당하시고, 죽은 자들 가운데서 부활하신 첫 분으로서, 백성과 이방인들에게 빛을 선포하시리라는 것입니다.」
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: '글로사리: 칭호 Χριστός→메시아. 이 절은 메시아 칭호가 고난·부활·이방 선교의 신학을 응축하는 핵심 구절.'
- source_word: ἀναστάσεως νεκρῶν
  english_pob_choice: rise from the dead
  chosen_korean: 죽은 자들 가운데서 부활하신
  alternatives_korean:
  - 죽음으로부터의 부활
  lexicon: BDAG
  rationale: '글로사리: ἀνάστασις→부활. 「가운데서」 표현으로 죽은 자들 무리에서 일어남의 형상을 살린다.'
theological_decisions:
- issue: '아그립바 앞 변론의 신학적 절정: 메시아의 고난·부활·이방 선교'
  chosen_reading: 메시아께서 고난을 당하시고, 죽은 자들 가운데서 부활하신 첫 분으로서
  alternative_readings:
  - 그리스도가 고난을 받고 부활하여
  rationale: 바울의 사도행전 회심 증언의 신학적 절정. Χριστός를 명백한 칭호로 보존하고, 부활을 「죽은 자들 가운데서」의 명확한 어휘로 옮긴다. 이방 선교는 변론 전체의 변증적 정점.
  doctrine_reference: 'DOCTRINE.md: Translate titles; Original-language primacy'
