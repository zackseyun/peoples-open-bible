translation:
  language: es
  text: Y si[a], a pesar de estas cosas, no me escuchan, entonces seguiré disciplinándolos[b] siete veces más por sus pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por todo esto' o 'después de esto'; el modismo hebreo significa a pesar de los juicios anteriores.
    reason: lexical_alternative
  - marker: b
    text: O 'siete veces'. La expresión hebrea puede indicar una intensificación del castigo, no necesariamente un conteo estrictamente numérico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Pero si
  - Si
  lexicon: HALOT
  rationale: La conjunción conserva la continuidad del discurso de advertencia y su valor condicional. En español, 'Y si' reproduce mejor la conexión con lo anterior que 'Pero si', que introduciría un contraste más fuerte de lo que exige el hebreo.
- source_word: עַד אֵלֶּה
  english_pob_choice: despite these things
  chosen_spanish: aun con esto
  alternatives_spanish:
  - a pesar de esto
  - después de esto
  - por todo esto
  lexicon: HALOT
  rationale: La expresión hebrea comunica persistencia en la desobediencia frente a los castigos previos. 'Aun con esto' mantiene la idea adversativa sin forzar una paráfrasis demasiado interpretativa; 'a pesar de esto' también sería viable, pero suena un poco más pesado.
- source_word: לֹא תִשְׁמְעוּ לִי
  english_pob_choice: you do not listen to me
  chosen_spanish: no me escuchan
  alternatives_spanish:
  - no me oyen
  - no obedecen a mí
  - no me prestan atención
  lexicon: HALOT
  rationale: שמע con ל expresa oír con respuesta obediente. 'No me escuchan' conserva la imagen auditiva y, en español bíblico moderno, deja implícita la obediencia covenantal sin volverla una glosa.
- source_word: וְיָסַפְתִּי
  english_pob_choice: I will continue
  chosen_spanish: seguiré
  alternatives_spanish:
  - añadiré
  - volveré a
  - procederé a
  lexicon: HALOT
  rationale: יסף aquí no significa simplemente 'sumar', sino intensificar o continuar la acción punitiva. 'Seguiré' transmite la continuidad/escalada de forma natural en español.
- source_word: לְיַסְּרָה אֶתְכֶם
  english_pob_choice: to discipline you
  chosen_spanish: corrigiéndolos
  alternatives_spanish:
  - disciplinarlos
  - castigarlos
  - reprendiéndolos
  lexicon: HALOT
  rationale: יסר en este contexto de maldición del pacto combina corrección y castigo. 'Corrigiéndolos' preserva esa tensión en una forma verbal natural, sin reducir el verbo a pura retribución; se evita 'disciplinarlos' por sonar más abstracto y menos fluido en esta construcción española.
- source_word: שֶׁבַע
  english_pob_choice: sevenfold
  chosen_spanish: siete veces
  alternatives_spanish:
  - siete veces más
  - siete pliegues
  lexicon: HALOT
  rationale: En español, la forma más clara y fiel para la intensificación es 'siete veces'. Aunque 'siete veces' puede leerse cuantitativamente, en este contexto judicial/pactual comunica adecuadamente la severidad aumentada; 'siete veces' además evita un giro menos idiomático como 'siete pliegues'.
- source_word: עַל חַטֹּאתֵיכֶם
  english_pob_choice: for your sins
  chosen_spanish: por sus pecados
  alternatives_spanish:
  - a causa de sus pecados
  - por causa de sus pecados
  - debido a sus pecados
  lexicon: HALOT
  rationale: עַל introduce el fundamento/causa del juicio. 'Por sus pecados' es natural y directo en español; 'por' conserva la relación causal sin exagerar el peso explicativo. Se usa 'pecados' por el plural relacional del hebreo y por la necesidad de fluidez en la fórmula.
theological_decisions:
- issue: Alcance de יסר en contexto de maldición del pacto
  english_pob_reading: discipline
  chosen_spanish_reading: corregir con castigo
  alternative_spanish_readings:
  - castigar
  - reprender
  - disciplinar
  rationale: El verbo hebreo mantiene una tensión entre corrección y sanción. 'Corrigiéndolos' deja visible que no es mero castigo retributivo ni una corrección suave; el contexto de Levítico 26 exige conservar la seriedad pactual sin resolver la tensión en una sola dirección.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Valor de שֶׁבַע en fórmula de juicio
  english_pob_reading: sevenfold / seven times
  chosen_spanish_reading: siete veces
  alternative_spanish_readings:
  - siete veces más
  - siete veces mayor
  rationale: La expresión admite lectura adverbial de intensificación más que conteo aritmético. 'Siete veces' mantiene abierta la ambigüedad que el inglés POB documenta, permitiendo tanto la lectura intensiva como la numérica si el lector la inferiere.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente del expediente: sin revisiones aplicadas y con alta concordancia general. La redacción española intenta conservar la secuencia condicional, la idiomática hebrea de persistencia ''aun con esto'', y la ambigüedad intensiva de ''siete veces'' sin suavizar el tono judicial del pasaje.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo requiera; en este versículo no aparece el nombre divino, por lo que no se introduce.
  - Se traduce שמע con una forma de 'escuchar' para conservar la metáfora auditiva y la obediencia implícita.
  - Se evita 'siervo' y otras terminologías no pertinentes; el verbo יסר se vierte con una forma que conserva la tensión corrección/castigo.
  - El registro busca ser bíblico moderno y sobrio, sin calcos innecesarios ni arcaísmos.
  - La puntuación y el uso de corchetes de nota siguen la convención del proyecto.
