revisions:
- from: Y en todo monte alto y en todo collado encumbrado habrá quebradas[a], cauces de aguas, en el día de gran matanza, cuando caigan las torres.
  to: Y en todo monte alto y en todo collado encumbrado habrá arroyos, cauces de agua[a], en el día de gran matanza, cuando caigan las torres.
  rationale: Se reemplaza «quebradas» por «arroyos» para una referencia hídrica más clara y panhispánica; se suaviza «cauces de aguas» a «cauces de agua»; y se mueve la nota al segundo término hidráulico, en conformidad con el rastro auditado en inglés y con la incertidumbre léxica documentada para יִבְלֵי מָיִם.
