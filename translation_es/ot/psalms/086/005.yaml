revisions:
- from: Porque tú[a], Señor, eres bueno y perdonador, abundante en amor leal para todos los que te invocan.
  to: Porque tú[a], Señor, eres bueno y dispuesto a perdonar, abundante en amor leal con todos los que te invocan.
  rationale: Se ajusta «perdonador» a «dispuesto a perdonar» para lograr un español más natural y plenamente fiel al valor adjetival de סַלָּח, apoyado además por la alternativa ya documentada en la auditoría inglesa. Se cambia «para todos» por «con todos» para mejorar la idiomaticidad con «abundante en amor leal», sin alterar el sentido de חֶסֶד dirigido a quienes invocan a Dios. La nota se actualiza de forma paralela y mantiene la alternativa significativa «perdonador / grande en amor leal».
