revisions:
- from: 'Para el director del coro[a]. De David. En Yahvé me he refugiado; ¿cómo pueden decir a mi alma[b]: “Huye como un pájaro a tu monte”?'
  to: 'Para el director del coro.[a] De David. En Yahvé me he refugiado; ¿cómo pueden decir a mi alma[b]: «Huyan como un ave a su monte»?'
  rationale: Se corrige la cita final para reflejar las formas plurales del hebreo, se reemplaza una nota defectuosa por una alternativa real para la superscripción, y se afina el registro de «pájaro» a «ave» sin apartarse del sentido documentado.
