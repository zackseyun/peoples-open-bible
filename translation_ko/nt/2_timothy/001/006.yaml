id: 2TI.1.6
reference: 2 Timothy 1:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: δι’ ἣν αἰτίαν ἀναμιμνῄσκω σε ἀναζωπυρεῖν τὸ χάρισμα τοῦ θεοῦ, ὅ ἐστιν ἐν σοὶ διὰ τῆς ἐπιθέσεως τῶν χειρῶν μου·
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/001/006.yaml
  text: For this reason I remind you to rekindle the gift of God that is in you through the laying on of my hands.
translation:
  language: ko
  text: 그러므로 내가 그대에게 일깨워 줍니다. 내 손을 그대 위에 얹음으로써 그대 안에 있는 하나님의 선물을 불일듯이 일으키십시오.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἀναζωπυρέω는 사그라드는 불씨를 다시 살려 활활 타오르게 함을 뜻한다. 본문은 디모데에게 받은 은사를 다시 점화하라는 강한 권면이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: δι’ ἣν αἰτίαν
  english_pob_choice: For this reason
  chosen_korean: 그러므로
  alternatives_korean:
  - 이런 이유로
  - 그 까닭에
  lexicon: BDAG
  rationale: 앞 절의 신앙 계승을 받아 권면으로 이어가는 접속사. 한국어 「그러므로」가 가장 자연스럽다.
- source_word: ἀναμιμνῄσκω σε
  english_pob_choice: I remind you
  chosen_korean: 그대에게 일깨워 줍니다
  alternatives_korean:
  - 그대에게 상기시킵니다
  - 그대에게 다시 알려 줍니다
  lexicon: BDAG
  rationale: ἀναμιμνῄσκω의 「다시 기억하게 함」을 한국어 「일깨워 주다」로 자연스럽게 옮긴다.
- source_word: ἀναζωπυρεῖν
  english_pob_choice: rekindle
  chosen_korean: 불일듯이 일으키십시오
  alternatives_korean:
  - 다시 불붙이십시오
  - 활활 타오르게 하십시오
  lexicon: BDAG
  rationale: 글로사리 지침에 따라 「불일듯이 일으키다」를 채택한다. 사그라드는 불씨를 다시 살리는 강렬한 이미지를 보존하며, 한국어 관용 표현으로도 익숙하다.
- source_word: χάρισμα τοῦ θεοῦ
  english_pob_choice: gift of God
  chosen_korean: 하나님의 선물
  alternatives_korean:
  - 하나님의 은사
  - 하나님이 주신 은혜의 선물
  lexicon: BDAG
  rationale: χάρισμα는 χάρις(은혜)에서 파생된 「은혜의 선물」을 뜻한다. 「선물」이 직관적이며, 「은사」는 한국 교회 전통 용어이나 본문 맥락에서는 보다 일반적인 「선물」이 적절하다.
- source_word: ἐπιθέσεως τῶν χειρῶν μου
  english_pob_choice: laying on of my hands
  chosen_korean: 내 손을 그대 위에 얹음으로써
  alternatives_korean:
  - 나의 안수를 통하여
  - 내 손을 얹은 것을 통하여
  lexicon: BDAG
  rationale: 「안수」가 교회 전통 용어이나 본문은 사도적 위임의 구체적 장면을 묘사하므로, 풀어쓴 「손을 얹음」이 본문 이미지를 살린다.
