revisions:
- from: Mira[a], vienen días —declara Yahvé— en que el que ara alcanzará al que siega, y el que pisa las uvas al que siembra la semilla[b]; los montes destilarán mosto[c], y todas las colinas se derretirán.
  to: Miren, vienen días —declara Yahvé— en que el que ara alcanzará al que siega, y el que pisa las uvas al que siembra la semilla[a]; los montes destilarán vino dulce[b][c], y todas las colinas se derretirán.
  rationale: Se ajustó el llamado profético inicial a ‘Miren’ para un registro más natural y digno; se corrigieron las notas para que reflejen fielmente las alternativas auditadas; y se cambió ‘mosto’ por ‘vino dulce’ para alinearlo con la elección principal documentada para עָסִיס, preservando ‘vino nuevo’ como alternativa en nota. También se separaron correctamente la nota léxica y la nota cultural con marcadores distintos.
