translation:
  language: es
  text: A Dios dirijo mi voz[a], y clamo; a Dios dirijo mi voz[b], y él me presta oído.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'y él me escuchó' / 'y él me oyó'. El verbo hebreo subraya una escucha atenta.
    reason: lexical_alternative
  - marker: b
    text: Lit. 'Mi voz es a Dios'.
    reason: previous_rendering
lexical_decisions:
- source_word: קוֹלִי
  english_pob_choice: My voice
  chosen_spanish: Mi voz
  alternatives_spanish:
  - Levanto mi voz
  - Alzo mi voz
  lexicon: HALOT
  rationale: El hebreo conserva el sustantivo 'voz' con sufijo de primera persona; 'mi voz' mantiene el paralelismo y la repetición del verso sin convertir de inmediato la imagen en una paráfrasis verbal.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: para
  alternatives_spanish:
  - hacia
  - a
  lexicon: HALOT
  rationale: En español, 'para Dios' expresa de manera natural la dirección de la voz y el movimiento de la oración/clamor hacia él, sin perder la fuerza direccional del hebreo.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios verdadero
  lexicon: HALOT
  rationale: El término hebreo designa aquí al único Dios verdadero; 'Dios' es la forma normal y fiel en español.
- source_word: וְאֶצְעָקָה
  english_pob_choice: and I cry out
  chosen_spanish: y clamo
  alternatives_spanish:
  - y grito
  - y clamo con fuerza
  lexicon: HALOT
  rationale: צעק expresa un clamor intenso de ayuda. 'Clamo' conserva la intensidad poética en español mejor que 'llamo' o una simple 'digo'.
- source_word: וְהַאֲזִין
  english_pob_choice: and he gives ear
  chosen_spanish: y él me presta oído
  alternatives_spanish:
  - y él me escucha
  - y él oye atentamente
  lexicon: HALOT
  rationale: La raíz אזן enfatiza atención al oír. 'Me presta oído' reproduce ese matiz de escucha atenta y mantiene el tono poético sin reducirlo a un mero 'oyó'.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: 'Con ''presta oído'' en español, el complemento se integra naturalmente como objeto indirecto: ''me presta oído'', preservando la dirección del original.'
theological_decisions:
- issue: Respuesta divina expresada como escucha atenta
  english_pob_reading: The verse states that God gives ear to the psalmist.
  chosen_spanish_reading: El verso afirma que Dios presta oído al salmista.
  alternative_spanish_readings:
  - Dios lo escucha
  - Dios atiende a su clamor
  rationale: 'Se conserva el valor declarativo del hebreo: no es una petición, sino una afirmación de que Dios atiende. ''Presta oído'' mantiene la textura semítica y la idea de escucha atenta sin convertirla en un lenguaje más doctrinal o interpretativo de la tradición.'
  doctrine_reference: Primacía del sentido del texto original y preservación de la tensión poética declarativa.
translation_notes:
  revision_awareness: 'El audit trail inglés osciló entre una versión más literal (''My voice is to God'') y una más idiomática (''I lift my voice to God''), pero la revisión más reciente volvió a la literalidad para preservar el paralelismo. La redacción española sigue esa decisión: mantiene la repetición de ''mi voz es para Dios'' y evita una paráfrasis más libre, mientras resuelve la naturalidad con ''clamo'' y ''presta oído''.'
  spanish_consistency_notes:
  - Se usa 'Dios' de forma consistente para אֱלֹהִים.
  - Se mantiene la repetición del primer hemistiquio para reflejar el paralelismo hebreo.
  - '''Presta oído'' conserva la idea de escucha atenta documentada en el audit trail.'
  - La puntuación separa los dos hemistiquios con punto y coma para respetar la cadencia poética.
