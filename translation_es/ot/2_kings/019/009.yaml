translation:
  language: es
  text: 'Cuando oyó decir acerca de Tirhaca, rey de Cus[a]: «Mira, ha salido a pelear contra ti», volvió atrás y envió mensajeros a Ezequías, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rey de Etiopía». El hebreo dice «Cus», la región antigua al sur de Egipto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: When he heard
  chosen_spanish: Cuando oyó
  alternatives_spanish:
  - Y oyó
  - Ahora oyó
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva expresa avance temporal; «Cuando oyó» conserva esa relación de tiempo de manera natural en español y evita una repetición demasiado mecánica del enlace inicial.
- source_word: אֶל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - de
  lexicon: HALOT
  rationale: Con שמע, la preposición introduce el asunto oído. «Acerca de» mantiene el sentido de contenido/reportaje sin endurecer el español.
- source_word: תִּרְהָקָה
  english_pob_choice: Tirhakah
  chosen_spanish: Tirhaca
  alternatives_spanish:
  - Tirhaka
  - Tirhacá
  lexicon: transliteración estándar
  rationale: Se translitera el nombre propio al español con una forma fluida y reconocible, sin introducir una equivalencia interpretativa.
- source_word: מֶלֶך כּוּשׁ
  english_pob_choice: king of Cush
  chosen_spanish: rey de Cus
  alternatives_spanish:
  - rey de Etiopía
  lexicon: HALOT
  rationale: Se conserva el topónimo hebreo כּוּשׁ como «Cus» para seguir más de cerca la fuente; «Etiopía» es la alternativa tradicional, pero atenúa la forma concreta del original.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con este mensaje
  lexicon: HALOT
  rationale: «Diciendo» reproduce la introducción de discurso directo y mantiene la estructura hebrea del relato.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira, pues
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención del oyente. «Mira» es claro y natural en español contemporáneo, sin la arcaización de «He aquí».
- source_word: יָצָא
  english_pob_choice: has come out
  chosen_spanish: ha salido
  alternatives_spanish:
  - ha salido fuera
  - ha marchado
  lexicon: HALOT
  rationale: El verbo expresa salida/movimiento desde un lugar. «Ha salido» conserva la imagen básica sin sobreespecificar el movimiento militar.
- source_word: לְהִלָּחֵם
  english_pob_choice: to fight
  chosen_spanish: a pelear
  alternatives_spanish:
  - a combatir
  - a luchar
  lexicon: HALOT
  rationale: «Pelear» es una equivalencia directa y natural en español. Evita un registro excesivamente técnico y no añade matices no presentes en el hebreo.
- source_word: אִתָּךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - con ti
  lexicon: HALOT
  rationale: Aunque la preposición hebrea puede ser literalmente «con», en contexto bélico el sentido es hostil. «Contra ti» expresa correctamente el valor contextual que la POB inglesa ya documentó.
- source_word: וַיָּשָׁב
  english_pob_choice: he turned back
  chosen_spanish: volvió atrás
  alternatives_spanish:
  - regresó
  - se volvió
  lexicon: HALOT
  rationale: La expresión conserva el movimiento de retorno/retroceso sin introducir una interpretación más fuerte como «se retiró».
- source_word: וַיִּשְׁלַח מַלְאָכִים
  english_pob_choice: and sent messengers
  chosen_spanish: envió mensajeros
  alternatives_spanish:
  - envió emisarios
  - mandó mensajeros
  lexicon: HALOT
  rationale: מַלְאָכִים aquí designa mensajeros humanos; «mensajeros» reproduce ese sentido diplomático y evita «ángeles», que sería incorrecto en este contexto.
- source_word: אֶל חִזְקִיָּהוּ
  english_pob_choice: to Hezekiah
  chosen_spanish: a Ezequías
  alternatives_spanish:
  - hacia Ezequías
  - para Ezequías
  lexicon: nombre propio bíblico
  rationale: Se usa la forma bíblica española habitual «Ezequías» y la preposición simple «a» para el destinatario del envío.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: La repetición de לֵאמֹר se conserva como introducción a la cita que continúa en el versículo siguiente.
theological_decisions:
- issue: Nombre divino no presente; tratamiento del topónimo כּוּשׁ
  english_pob_reading: king of Cush, with a footnote noting 'Ethiopia' as an alternative lexical equivalent
  chosen_spanish_reading: rey de Cus, con nota de alternativa a «Etiopía»
  alternative_spanish_readings:
  - rey de Etiopía
  rationale: La decisión es principalmente lexical, no doctrinal. Se conserva «Cus» para respetar el término fuente y se aclara en nota la equivalencia tradicional más conocida, siguiendo el criterio auditado de la POB inglesa.
  doctrine_reference: Sin implicación doctrinal directa; cuestión de identificación geográfica e histórica.
translation_notes:
  revision_awareness: La POB inglesa mantiene una equivalencia óptima sin cambios en su última revisión; se conserva la estructura narrativa y la nota lexical sobre כּוּשׁ/Cush, trasladada al español como Cus/Etiopía con la misma cautela histórica.
  spanish_consistency_notes:
  - Se mantiene «mensajeros» para מַלְאָכִים y no «ángeles», por el contexto diplomático-militar.
  - Se conserva el discurso directo con dos participios de reporte («diciendo») para reflejar לֵאמֹר.
  - «Mira» se prefiere a «He aquí» por claridad moderna y porque la POB inglesa eligió un deíctico no arcaico.
  - La transliteración «Ezequías» sigue la forma bíblica estándar en español.
  - La nota textual/lexical sobre Cus se ancla en la palabra correspondiente para preservar el audit trail.
