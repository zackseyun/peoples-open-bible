translation:
  text: And having been encouraged by the very noble words of Judas[a], which were able to stir them on to virtue and to make the souls of young men manly, they resolved not merely to make a campaign, but to press on bravely and, engaging with all courage, settle the matter[d][c][b], because the city and the holy things and the temple were also in danger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'able to urge them toward excellence' or, in the military setting, 'valor.' The Greek ἀρετή can carry both moral and martial overtones.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to make the souls of young men manly.' The Greek preserves explicit masculine imagery for courage.
    reason: lexical_alternative
  - marker: c
    text: The sense is not that they decided not to fight, but that they resolved not merely to undertake a campaign; they meant to press the conflict to a decisive outcome.
    reason: alternative_reading
  - marker: d
    text: The Greek distinguishes 'the holy things' from 'the temple,' so both are represented separately here.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρακληθέντες
  chosen: after they had been encouraged
  alternatives:
  - having been exhorted
  - having been comforted
  lexicon: BDAG
  rationale: The passive participle from παρακαλέω can mean encourage, exhort, or comfort. In this military context, with Judas's speech moving them toward action, 'encouraged' best captures the strengthening effect without losing the hortatory force.
- source_word: πάνυ καλοῖς
  chosen: very noble
  alternatives:
  - very fine
  - very good
  lexicon: LSJ
  rationale: καλός here describes the quality of Judas's words in an elevated moral sense. 'Noble' fits the martial-ethical context better than the flatter 'good' or merely aesthetic 'fine'.
- source_word: δυναμένοις ἐπ' ἀρετὴν παρορμῆσαι
  chosen: able to stir them on to virtue
  alternatives:
  - able to urge them toward excellence
  - able to incite them to valor
  lexicon: LSJ
  rationale: ἀρετή can denote virtue, excellence, or valor. Because the phrase is broad and moral rather than narrowly military, 'virtue' is retained in the main text, while the surrounding context already conveys courage.
- source_word: ψυχὰς νέων ἐπανδρῶσαι
  chosen: to make the souls of young men manly
  alternatives:
  - to embolden the hearts of the young
  - to make young men's spirits courageous
  lexicon: LSJ
  rationale: ἐπανδρόω literally conveys making manly or giving courage. To preserve the gendered imagery of the Greek and the project's gender-accurate policy, 'make the souls of young men manly' is kept, though somewhat idiomatic smoothing is applied with 'souls' rather than a more abstract paraphrase.
- source_word: διέγνωσαν μὴ στρατεύεσθαι
  chosen: they decided not merely to make a campaign
  alternatives:
  - they resolved not just to march out
  - they determined not simply to take the field
  lexicon: LSJ
  rationale: The infinitive στρατεύεσθαι means to campaign or serve in war. In context it is contrasted with the stronger resolve that follows; the sense is not abstention from fighting, but not merely undertaking an ordinary campaign. 'Not merely to make a campaign' preserves that contrast.
- source_word: γενναίως δὲ ἐφέρεσθαι
  chosen: but to press on bravely
  alternatives:
  - but to conduct themselves nobly
  - but to advance courageously
  lexicon: LSJ
  rationale: ἐφέρεσθαι here has the sense of moving forward or bearing oneself in action. 'Press on bravely' captures active forward motion in battle better than the more static 'conduct themselves nobly'.
- source_word: μετὰ πάσης εὐανδρείας
  chosen: with all courage
  alternatives:
  - with every manly courage
  - with full valor
  lexicon: LSJ
  rationale: εὐανδρία denotes manliness, valor, or courage. 'With all courage' is natural English while preserving the totalizing force of πάσης. The more literal gendered nuance is already represented earlier in the verse.
- source_word: ἐμπλακέντες
  chosen: engaging
  alternatives:
  - becoming entangled
  - joining battle
  lexicon: LSJ
  rationale: In military context the participle suggests entering into conflict rather than generic entanglement. 'Engaging' is concise and battle-appropriate.
- source_word: κρῖναι τὰ πράγματα
  chosen: settle the matter
  alternatives:
  - decide the issue
  - bring affairs to judgment
  lexicon: LSJ
  rationale: The idiom means to bring the situation to a decisive outcome. 'Settle the matter' is idiomatic English that preserves the sense of decisive resolution in battle.
- source_word: τὴν πόλιν καὶ τὰ ἅγια καὶ τὸ ἱερὸν
  chosen: the city and the holy things and the temple
  alternatives:
  - the city and the sanctuary and the temple
  - the city and the sacred things and the shrine
  lexicon: LSJ
  rationale: The text distinguishes τὰ ἅγια from τὸ ἱερόν, so both should be represented rather than collapsed into one term. 'Holy things' preserves the distinction, while 'temple' is the natural rendering of ἱερόν.
- source_word: κινδυνεύειν
  chosen: were also in danger
  alternatives:
  - were at risk
  - were endangered
  lexicon: BDAG
  rationale: 'The infinitive gives the reason for their resolve: these sacred and civic realities were under threat. ''Were also in danger'' preserves the explanatory force of διὰ τὸ and the καί.'
