    text: Or 'in hostility toward me' / 'in opposition to me.' The Hebrew idiom 'walk with me in qeri' is difficult; in this chapter it conveys a stance of opposition rather than mere chance.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will add to strike you seven times for your sins.'
    reason: alternative_reading
