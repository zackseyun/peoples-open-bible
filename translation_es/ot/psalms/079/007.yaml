translation:
  language: es
  text: Porque devoraron a Jacob y asolaron su morada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Porque devoraron a Jacob y hicieron desolada su habitación».'
