translation:
  language: es
  text: 'Yahvé habló[a] a Moisés y a Eleazar hijo de Aarón el sacerdote, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «dijo»; se traduce «habló ... diciendo» para preservar naturalmente en español la fórmula de introducción al discurso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El hebreo usa el verbo común de habla en una fórmula narrativa de introducción al discurso. En español, «habló ... diciendo» preserva con naturalidad la fórmula discursiva que el POB inglés rindió como «spoke ... saying».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton, siguiendo la convención del POB de no sustituirlo por un título. «Yahvé» es la forma española transparente y auditable para יְהוָה.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición direccional que marca destinatario de la խոսla divina se expresa naturalmente en español con «a».
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: convención onomástica
  rationale: Nombre propio bíblico en forma española estándar.
- source_word: וְאֶל
  english_pob_choice: and to
  chosen_spanish: y a
  alternatives_spanish:
  - y hacia
  lexicon: HALOT
  rationale: Coordina un segundo destinatario manteniendo la relación sintáctica del hebreo.
- source_word: אֶלְעָזָר
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  lexicon: convención onomástica
  rationale: Nombre propio bíblico en forma española estándar.
- source_word: בֶּן אַהֲרֹן
  english_pob_choice: son of Aaron
  chosen_spanish: hijo de Aarón
  alternatives_spanish:
  - el hijo de Aarón
  lexicon: HALOT
  rationale: La cadena constructa indica filiación; «hijo de Aarón» reproduce la relación de linaje sin añadir artículo innecesario.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - sacerdote
  lexicon: HALOT
  rationale: El título definido apposicional identifica a Aarón en este contexto. «El sacerdote» conserva la definitud del hebreo y su función identificadora.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: La forma infinitiva introduce discurso directo; «diciendo» preserva la fórmula narrativa de manera natural en español.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo contiene יְהוָה directamente. Se mantiene el nombre propio divino, no una sustitución por título, en continuidad con la doctrina editorial del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación entre Aarón y el título sacerdotal
  english_pob_reading: Aaron the priest
  chosen_spanish_reading: Aarón, el sacerdote
  alternative_spanish_readings:
  - Aarón el sacerdote
  - Aarón, sacerdote
  rationale: El hebreo presenta הַכֹּהֵן como aposición definida. En español, la coma ayuda a reflejar esa aposición sin convertirla en un epíteto más suelto ni perder la referencia a Aarón.
  doctrine_reference: Gramática contextual del hebreo bíblico
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación eliminando la nota al pie sin ancla. La traducción mantiene el valor audit trail del POB inglés: יְהוָה se rinde como Yahvé, וַיֹּאמֶר como fórmula narrativa de habla, y לֵאמֹר como marcador de introducción al discurso.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - 'Se conservan nombres propios bíblicos en formas españolas estándar: Moisés, Eleazar, Aarón.'
  - La puntuación con coma en «Aarón, el sacerdote» refleja la aposición definida del hebreo y mejora la lectura en español.
  - No se introducen notas al pie, ya que no hay ambigüedad textual adicional que requiera anclaje en este versículo.
