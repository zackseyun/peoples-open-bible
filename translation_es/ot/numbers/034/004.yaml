translation:
  language: es
  text: Entonces el límite girará para ustedes desde el sur de la subida de Akrabbim[a], y pasará a Zin; y su extremo estará al sur de Cades-barnea; luego saldrá a Hazar-addar y pasará a Azmón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Akrabbim probablemente significa ‘escorpiones’; el topónimo podría renderizarse como ‘la subida de los Escorpiones’ o ‘el paso de los Escorpiones’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָסַב
  english_pob_choice: shall turn
  chosen_spanish: se volverá
  alternatives_spanish:
  - girará
  - rodeará
  lexicon: HALOT
  rationale: En descripciones de frontera, נָסַב expresa que la línea cambia de dirección. ‘Se volverá’ conserva el movimiento direccional sin sonar mecánico en español.
- source_word: הַגְּבוּל
  english_pob_choice: the border
  chosen_spanish: el límite
  alternatives_spanish:
  - la frontera
  - el confín
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, ‘límite’ transmite bien el sentido territorial de גְּבוּל y suena natural en una lista de lindes.
- source_word: מִנֶּגֶב
  english_pob_choice: from the south of
  chosen_spanish: desde el sur de
  alternatives_spanish:
  - al sur de
  - desde la parte sur de
  lexicon: HALOT
  rationale: La función geográfica de נֶגֶב aquí es locativa respecto al punto de referencia. ‘Desde el sur de’ sigue de cerca la relación espacial del hebreo y del inglés POB.
- source_word: לְמַעֲלֵה עַקְרַבִּים
  english_pob_choice: the Ascent of Akrabbim
  chosen_spanish: la subida de Akrabbim
  alternatives_spanish:
  - el ascenso de Akrabbim
  - el paso de Akrabbim
  lexicon: HALOT
  rationale: מַעֲלֶה describe una subida o pendiente. Se mantiene el topónimo Akrabbim en transliteración, y ‘subida’ conserva el valor topográfico. El inglés POB nota que el nombre podría aludir a ‘scorpions’, pero la traducción principal conserva el nombre propio.
- source_word: וְעָבַר
  english_pob_choice: and cross
  chosen_spanish: y pasará
  alternatives_spanish:
  - y cruzará
  - y pasará por
  lexicon: HALOT
  rationale: En rutas fronterizas, עָבַר indica que la línea atraviesa o continúa más allá de un punto. ‘Pasará’ es suficientemente literal y fluido en español.
- source_word: צִנָה
  english_pob_choice: to Zin
  chosen_spanish: a Zin
  alternatives_spanish:
  - hasta Zin
  - hacia Zin
  lexicon: HALOT
  rationale: La partícula direccional con el topónimo indica movimiento hacia esa región. ‘A Zin’ es la forma más breve y natural en español.
- source_word: תּוֹצְאֹתָיו
  english_pob_choice: its end
  chosen_spanish: su extremo
  alternatives_spanish:
  - su término
  - su terminación
  lexicon: HALOT
  rationale: Aunque el inglés POB revisó ‘end’ como singular, el hebreo usa un sustantivo de salida/extremo. ‘Extremo’ mantiene la imagen de remate fronterizo y permite un singular natural en español.
- source_word: לְקָדֵשׁ בַּרְנֵעַ
  english_pob_choice: south of Kadesh-barnea
  chosen_spanish: al sur de Cades-barnea
  alternatives_spanish:
  - hacia Cades-barnea
  - frente a Cades-barnea
  lexicon: HALOT
  rationale: La combinación con מִנֶּגֶב señala ubicación al sur de ese lugar. Se translitera el nombre como topónimo bíblico, y ‘al sur de’ reproduce la relación espacial.
- source_word: וְיָצָא
  english_pob_choice: then it shall go out to
  chosen_spanish: luego saldrá a
  alternatives_spanish:
  - entonces saldrá a
  - y saldrá a
  lexicon: HALOT
  rationale: En listas de fronteras, יָצָא indica que la línea sale hacia otro punto. ‘Saldrá a’ refleja bien la continuidad del trayecto.
- source_word: חֲצַר אַדָּר
  english_pob_choice: Hazar-addar
  chosen_spanish: Hazar-adar
  alternatives_spanish:
  - Hazar-addar
  lexicon: HALOT
  rationale: Se conserva el topónimo transliterado. La forma con ‘adar’ sigue la pronunciación habitual en español bíblico y evita una grafía híbrida innecesaria.
- source_word: עַצְמֹנָה
  english_pob_choice: to Azmon
  chosen_spanish: a Azmón
  alternatives_spanish:
  - hasta Azmón
  - hacia Azmón
  lexicon: HALOT
  rationale: Topónimo transliterado con adaptación acentual al español. ‘A’ expresa la dirección hacia el lugar.
translation_notes:
  revision_awareness: El inglés POB mantiene la estructura de itinerario fronterizo y revisó ‘its end points’ a singular ‘its end’. Para el español, se preserva esa precisión con ‘su extremo’. Se conservan los topónimos transliterados, con nota léxica para Akrabbim por su posible sentido común.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general, pero este versículo no contiene el Tetragrámaton.
  - Se usa ‘límite’ para גְּבוּל en contexto territorial.
  - 'Se conserva la transliteración de topónimos bíblicos, con acento español cuando corresponde: Azmón, Cades-barnea.'
  - No se traduce Akrabbim en el texto principal para no borrar el valor de nombre propio atestiguado por la tradición textual y el audit trail en inglés.
