translation:
  language: es
  text: Por este motivo, en aquel tiempo se acercaron ciertos hombres caldeos y acusaron maliciosamente a los judíos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los judeanos». El término arameo puede designar al pueblo de Judá en sentido étnico-geográfico, además de «los judíos».
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל־קֳבֵל דְּנָה
  english_pob_choice: For this reason
  chosen_spanish: Por[a] este motivo
  alternatives_spanish:
  - Por tanto
  - Por esta razón
  - Debido a esto
  lexicon: HALOT
  rationale: La locución aramea expresa una relación causal o inferencial. «Por este motivo» conserva el sentido de causa y funciona de manera natural en español formal.
- source_word: בֵּהּ זִמְנָא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - entonces
  - en ese momento
  - aquel tiempo
  lexicon: HALOT
  rationale: La frase marca el momento de la acción. «En aquel tiempo» mantiene el valor temporal con registro digno y claro.
- source_word: קְרִבוּ
  english_pob_choice: came forward
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se presentaron
  - avanzaron
  - se acercaron al rey
  lexicon: HALOT
  rationale: El verbo significa acercarse o aproximarse. En español, «se acercaron» reproduce bien el movimiento narrativo sin forzar una especificación no expresada en el texto.
- source_word: גֻּבְרִין כַּשְׂדָּאִין
  english_pob_choice: certain Chaldean men
  chosen_spanish: ciertos hombres caldeos
  alternatives_spanish:
  - algunos caldeos
  - ciertos caldeos
  - ciertos hombres de Caldea
  lexicon: HALOT
  rationale: «Hombres caldeos» conserva el sustantivo explícito del arameo. «Ciertos» refleja el carácter indefinido; no se añade «oficiales» porque el texto no lo dice de forma explícita.
- source_word: וַאֲכַלוּ קַרְצֵיהוֹן
  english_pob_choice: maliciously accused
  chosen_spanish: acusaron maliciosamente
  alternatives_spanish:
  - denunciaron con mala intención
  - calumniaron
  - los acusaron
  lexicon: HALOT
  rationale: La idiomática aramea literalmente alude a «comer las piezas» de alguien, con el sentido de denunciar o acusar con hostilidad. «Acusaron maliciosamente» comunica el valor forense y la intención hostil sin perder la tensión idiomática.
- source_word: דִּי יְהוּדָיֵא
  english_pob_choice: the Jews
  chosen_spanish: a los judíos
  alternatives_spanish:
  - a los judeanos
  - al pueblo de Judá
  lexicon: HALOT
  rationale: El término puede referir al pueblo de Judá en sentido étnico-geográfico o a «los judíos». En este contexto cortesano exílico, «los judíos» es la forma más clara y corriente en español. La alternativa «judeanos» queda reconocida como posibilidad semántica.
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo/arameo base y con la POB inglesa auditada; no se registran revisiones aplicadas en el paquete de referencia. Se preserva la equivalencia óptima sin añadir información contextual no expresada.
  spanish_consistency_notes:
  - Se mantiene «caldeos» para כַּשְׂדָּאִין y no «babilonios», porque el arameo usa el etnónimo explícito del texto.
  - Se evita una traducción demasiado literal del idiomático וַאֲכַלוּ קַרְצֵיהוֹן, pero se conserva su matiz hostil con «acusaron maliciosamente».
  - El marcador de nota [a] se coloca en «Por» para señalar la alternativa lexical sobre יְהוּדָיֵא sin interrumpir la fluidez del español.
