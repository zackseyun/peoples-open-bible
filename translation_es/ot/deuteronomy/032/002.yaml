translation:
  language: es
  text: Descienda mi enseñanza como la lluvia[a]; gotee mi hablar como el rocío, como chubascos sobre la hierba[b], y como abundante lluvia sobre las plantas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «caiga» / «destile»: el verbo hebreo presenta la enseñanza como si descendiera como lluvia.'
    reason: lexical_alternative
  - marker: b
    text: «Chubascos» traduce un término hebreo raro que puede denotar lluvia ligera o gotas de lluvia.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעֲרֹף
  english_pob_choice: fall
  chosen_spanish: descienda
  alternatives_spanish:
  - caiga
  - fluya
  lexicon: HALOT
  rationale: El verbo poético describe algo que baja en gotas, como lluvia. «Descienda» conserva el movimiento descendente y suena natural en español sin perder la imagen de precipitación.
- source_word: לִקְחִי
  english_pob_choice: my teaching
  chosen_spanish: mi enseñanza
  alternatives_spanish:
  - mi instrucción
  - mi doctrina
  lexicon: HALOT
  rationale: לֶקַח/לִקְחִי puede referirse a instrucción recibida o impartida. «Enseñanza» comunica bien el sentido didáctico en el contexto de Moisés y evita una palabra demasiado técnica.
- source_word: תִּזַּל
  english_pob_choice: drip
  chosen_spanish: gotee
  alternatives_spanish:
  - fluya
  - chorree
  lexicon: HALOT
  rationale: El paralelo con el rocío favorece una imagen de caída suave y continua. «Gotee» mantiene la fuerza imagética de נזל sin volverse áspero o excesivamente literal.
- source_word: אִמְרָתִי
  english_pob_choice: my speech
  chosen_spanish: mi palabra
  alternatives_spanish:
  - mi dicho
  - mi habla
  lexicon: HALOT
  rationale: אִמְרָה puede ser palabra, dicho o declaración. «Mi palabra» preserva la amplitud del hebreo y mantiene el paralelismo con «mi enseñanza».
- source_word: שְׂעִירִם
  english_pob_choice: showers
  chosen_spanish: lluvias
  alternatives_spanish:
  - chubascos
  - aguaceros leves
  lexicon: HALOT
  rationale: El término es raro y debatido, pero en contexto apunta a lluvia ligera o rocío de lluvia. «Lluvias» reproduce de forma clara el valor general sin introducir una especificación incierta.
- source_word: דֶשֶׁא
  english_pob_choice: grass
  chosen_spanish: hierba
  alternatives_spanish:
  - pasto
  - césped
  lexicon: HALOT
  rationale: דשא refiere vegetación tierna o hierba. «Hierba» es un equivalente natural y neutral en español, más cercano al campo semántico general que una expresión más interpretativa.
- source_word: רְבִיבִים
  english_pob_choice: abundant rain
  chosen_spanish: abundante lluvia
  alternatives_spanish:
  - lluvia copiosa
  - fuertes lluvias
  lexicon: HALOT
  rationale: רְבִיבִים expresa lluvia abundante o copiosa. «Abundante lluvia» conserva la intensidad sin añadir una connotación demasiado violenta.
- source_word: עֵשֶׂב
  english_pob_choice: plants
  chosen_spanish: plantas
  alternatives_spanish:
  - vegetación
  - hierba
  lexicon: HALOT
  rationale: עֵשֶׂב es más amplio que «hierba» y puede abarcar plantas o vegetación. «Plantas» sigue de cerca la revisión inglesa final y evita una expansión interpretativa.
translation_notes:
  revision_awareness: 'La revisión inglesa final ajustó el cierre desde interpretaciones más expansivas («tender grass», «green plants») a formas más cercanas al hebreo simple («grass», «plants»). En español, se siguió esa misma cautela: «hierba» y «plantas» evitan agregar matices no explícitos en el texto fuente.'
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo poético con dos colon principales: enseñanza/palabra y lluvia/rocío.'
  - Se evitó «SEÑOR» y «Cristo» porque el versículo no contiene esos términos.
  - 'La serie de imágenes meteorológicas se preservó de manera continua: lluvia, rocío, lluvias, abundante lluvia.'
