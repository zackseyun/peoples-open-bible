  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: una imagen concreta de ceñirse para la labor y de fortalecer los brazos. Sin embargo, la sintaxis española actual (''se ciñe con fuerza sus lomos'') suena forzada y menos natural que el orden alternativo ya preservado en la nota. Además, el POB inglés eligió ''waist'' como texto principal y dejó ''loins'' como alternativa; en español conviene igualmente preferir un término principal más claro y actual.'
  spanish_quality_summary: La redacción es comprensible, pero 'se ciñe con fuerza sus lomos' resulta poco idiomática en español moderno. 'Se ciñe la cintura con fuerza' fluye mejor y mantiene la imagen corporal concreta. El resto del verso ('y fortalece sus brazos') es natural y fiel.
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. La revisión propuesta alinea mejor la decisión léxica principal con la del POB inglés: hebreo concreto preservado en el texto principal con español claro (''cintura''), y la alternativa tradicional (''lomos'') en nota.'
  issues:
  - severity: medium
    issue: Orden sintáctico poco natural en 'se ciñe con fuerza sus lomos'
    rationale: Aunque entendible, en español suena forzado. La construcción más idiomática es 'se ciñe la cintura con fuerza' o 'se ciñe los lomos con fuerza'.
  - severity: medium
    issue: El texto principal usa 'sus lomos' donde el audit trail inglés prefirió una expresión anatómica más clara
    rationale: El POB inglés puso 'her waist' en el texto y reservó 'loins' para nota. En español, 'cintura' comunica mejor la anatomía en registro moderno sin perder la imagen concreta.
  - severity: low
    issue: La nota contiene comillas y formato algo torpes
    rationale: 'Puede simplificarse y normalizarse para mayor legibilidad: ''O: "Se ciñe los lomos con fuerza"...''.'
  revised_spanish_text: Ella se ciñe la cintura con fuerza y fortalece sus brazos[a].
  revised_footnotes:
