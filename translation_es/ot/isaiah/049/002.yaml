  text: וַ/יָּ֤שֶׂם פִּ/י֙ כְּ/חֶ֣רֶב חַדָּ֔ה בְּ/צֵ֥ל יָד֖/וֹ הֶחְבִּיאָ֑/נִי וַ/יְשִׂימֵ֨/נִי֙ לְ/חֵ֣ץ בָּר֔וּר בְּ/אַשְׁפָּת֖/וֹ הִסְתִּירָֽ/נִי׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/049/002.yaml
  text: And he made my mouth like a sharp sword; in the shadow of his hand he hid me[a]. And he made me a polished arrow; in his quiver he concealed me.
  footnotes:
