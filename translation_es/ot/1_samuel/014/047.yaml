  text: וְ/שָׁא֛וּל לָכַ֥ד הַ/מְּלוּכָ֖ה עַל יִשְׂרָאֵ֑ל וַ/יִּלָּ֣חֶם סָבִ֣יב בְּֽ/כָל אֹיְבָ֡י/ו בְּ/מוֹאָ֣ב וּ/בִ/בְנֵי עַמּ֨וֹן וּ/בֶ/אֱד֜וֹם וּ/בְ/מַלְכֵ֤י צוֹבָה֙ וּ/בַ/פְּלִשְׁתִּ֔ים וּ/בְ/כֹ֥ל אֲשֶׁר יִפְנֶ֖ה יַרְשִֽׁיעַ־׀־׀־־׃
