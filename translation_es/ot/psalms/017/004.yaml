translation:
  language: es
  text: En cuanto a las obras del hombre[a], por la palabra de tus labios yo me he apartado de los caminos de los violentos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «he guardado de los caminos de los violentos»; el hebreo también puede leerse como «he observado los caminos de los violentos», pero el contexto favorece el sentido de evitarlos.
    reason: alternative_reading
lexical_decisions:
- source_word: לִ/פְעֻלּוֹת
  english_pob_choice: As for the deeds of
  chosen_spanish: En cuanto a las obras de
  alternatives_spanish:
  - Con respecto a las obras de
  - En cuanto a los hechos de
  lexicon: HALOT
  rationale: El prefijo ל con פְעֻלּוֹת introduce el tema o esfera del enunciado. En español, «En cuanto a» conserva bien ese valor tópico. «Obras» es natural y suficientemente amplio para פְעֻלּוֹת en este contexto poético.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - la gente
  - las personas
  lexicon: HALOT
  rationale: El sustantivo singular genérico se refiere a los seres humanos en general. «El hombre» preserva el singular hebreo y la lectura genérica sin convertirlo en un plural explicativo.
- source_word: בִּ/דְבַר
  english_pob_choice: by
  chosen_spanish: por
  alternatives_spanish:
  - mediante
  - por medio de
  - según
  lexicon: HALOT
  rationale: 'La preposición ב con דָּבָר es instrumental aquí: la contención del salmista está gobernada o efectuada por la palabra divina. «Por» es la forma más breve y natural en español antes de «la palabra de tus labios».'
- source_word: שְׂפָתֶי/ךָ
  english_pob_choice: your lips
  chosen_spanish: tus labios
  alternatives_spanish:
  - tu boca
  lexicon: HALOT
  rationale: Se conserva la expresión antropomórfica literal del hebreo. «Labios» mantiene la imagen poética y la forma idiomática «la palabra de tus labios».
- source_word: שָׁמַרְתִּי
  english_pob_choice: I have kept myself from
  chosen_spanish: yo me he apartado de
  alternatives_spanish:
  - me he guardado de
  - me he mantenido lejos de
  - he observado
  lexicon: HALOT
  rationale: Aunque שׁמר puede significar «guardar», aquí el objeto y el contexto favorecen la idea de evitación o contención. «Me he apartado de» expresa bien esa lectura sin perder la fuerza de autorrestricción.
- source_word: אָרְחוֹת
  english_pob_choice: the paths of
  chosen_spanish: los caminos de
  alternatives_spanish:
  - las sendas de
  - los pasos de
  lexicon: HALOT
  rationale: «Caminos» transmite la metáfora hebrea de curso de vida o conducta de modo claro en español. Es ligeramente más natural que «sendas» y conserva el paralelismo con la idea de conducta.
- source_word: פָּרִיץ
  english_pob_choice: the violent
  chosen_spanish: el violento
  alternatives_spanish:
  - el impío violento
  - el agresor
  - el hombre violento
  lexicon: HALOT
  rationale: פָּרִיץ designa a una persona violenta o rapaz, no simplemente a un pecador genérico. En español singular, «el violento» preserva el valor lexical y mantiene la referencia genérica del término.
theological_decisions:
- issue: Sentido de שׁמרתי en la cláusula final
  english_pob_reading: The psalmist says that by God's spoken word he has kept himself away from violent ways.
  chosen_spanish_reading: El salmista dice que, por la palabra de Dios, se ha apartado de los caminos violentos.
  alternative_spanish_readings:
  - El salmista dice que ha observado los caminos del violento.
  - El salmista dice que ha vigilado los caminos del violento.
  rationale: El verbo שׁמר puede significar «guardar», «observar» o «vigilar», pero el contexto de integridad favorece la idea de evitar esas sendas, no de imitarlas ni simplemente contemplarlas. La frase «por la palabra de tus labios» explica naturalmente el medio de esa evitación.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión lexical sin resolverla artificialmente; cuando el contexto favorece una lectura, se expresa en el texto y se registra la alternativa en nota.'
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el pasaje presenta alto grado de acuerdo en la auditoría inglesa, con una única cuestión menor sobre el valor de שׁמרתי resuelta en favor de la evitación contextual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto cuando el texto lo requiera; aquí el verso usa un pronombre de segunda persona y no introduce el Tetragrámaton explícito.
  - Se traduce el singular genérico אָדָם como «el hombre» para conservar la forma hebrea sin crear un plural interpretativo.
  - «Labios» conserva la imagen antropomórfica del hebreo y no se sustituye por «boca» salvo necesidad contextual.
  - «Caminos» se usa para אָרְחוֹת por su valor metafórico de conducta y por naturalidad en español.
  - La nota al pie conserva la tensión de lectura de שׁמרתי, tal como lo hace el audit trail inglés.
