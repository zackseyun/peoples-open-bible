translation:
  language: es
  text: Si haces bien[a], ¿no habrá aceptación? Pero si no haces bien, el pecado está agazapado a la puerta; su deseo es para ti[d][c][b], pero tú debes dominarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «alzamiento»; la idea puede ser que el rostro de Caín sería alzado o que recibiría aceptación.
    reason: lexical_alternative
  - marker: b
    text: O «una ofrenda por el pecado está echada a la puerta», aunque la imagen inmediata sugiere más naturalmente el pecado personificado como una bestia agazapada.
    reason: alternative_reading
  - marker: c
    text: O «su anhelo» o «su impulso». Compárese la formulación semejante en Génesis 3:16.
    reason: cross_reference
  - marker: d
    text: O «dominarás sobre él» o «puedes dominarlo». El hebreo puede leerse como exhortación, predicción o posibilidad.
    reason: alternative_reading
lexical_decisions:
- source_word: תֵּיטִיב
  english_pob_choice: do well
  chosen_spanish: haces bien
  alternatives_spanish:
  - haces lo bueno
  - actúas rectamente
  lexicon: HALOT
  rationale: El verbo en hifil expresa hacer lo correcto o bueno, no solo sentirse bien. «Haces bien» conserva la brevedad condicional del hebreo y su fuerza moral.
- source_word: שְׂאֵת
  english_pob_choice: acceptance
  chosen_spanish: levantamiento
  alternatives_spanish:
  - aceptación
  - levantamiento del rostro
  - exaltación
  lexicon: HALOT
  rationale: El término es literalmente «alzamiento/levantamiento», y el texto puede aludir al rostro o a la condición de Caín. Para no perder la tensión léxica, el cuerpo principal mantiene una versión más literal; la interpretación de aceptación queda implícita y se documenta en la nota.
- source_word: לַפֶּתַח
  english_pob_choice: at the door
  chosen_spanish: a la puerta
  alternatives_spanish:
  - en la entrada
  - en el umbral
  lexicon: HALOT
  rationale: Es una expresión locativa directa; «a la puerta» es natural en español y conserva la imagen vívida del peligro al borde del acceso.
- source_word: חַטָּאת
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - ofrenda por el pecado
  lexicon: HALOT
  rationale: En este contexto la imagen de una bestia agazapada favorece la personificación del pecado. «Pecado» comunica bien el sentido; la lectura alternativa de ofrenda por el pecado se preserva como posibilidad interpretativa.
- source_word: רֹבֵץ
  english_pob_choice: is crouching
  chosen_spanish: está agazapado
  alternatives_spanish:
  - está echado
  - acecha
  lexicon: HALOT
  rationale: El participio describe a un animal echado/en posición de ataque. «Está agazapado» conserva la metáfora predatoria y la amenaza inminente.
- source_word: תְּשׁוּקָתוֹ
  english_pob_choice: its desire
  chosen_spanish: su deseo
  alternatives_spanish:
  - su anhelo
  - su impulso
  lexicon: HALOT
  rationale: El sustantivo indica deseo/ansia. «Su deseo» es claro en español y mantiene el vínculo verbal con Génesis 3:16 sin resolver de más el matiz exacto.
- source_word: תִּמְשָׁל בּוֹ
  english_pob_choice: you must rule over it
  chosen_spanish: debes dominarlo
  alternatives_spanish:
  - lo dominarás
  - puedes dominarlo
  lexicon: HALOT
  rationale: El imperfecto permite matiz exhortativo, predictivo o de posibilidad. «Debes dominarlo» comunica la amonestación divina sin cerrar indebidamente la tensión interpretativa.
theological_decisions:
- issue: Si la frase final promete dominio, lo ordena o afirma la capacidad de Caín
  english_pob_reading: 'The main text renders the final clause as exhortation: ''you must rule over it.'''
  chosen_spanish_reading: 'La cláusula final se vierte como exhortación: «debes dominarlo».'
  alternative_spanish_readings:
  - «lo dominarás» (predictivo)
  - «puedes dominarlo» (posibilidad/capacidad)
  rationale: El hebreo admite varios matices. En el contexto de advertencia divina, la exhortación conserva mejor la fuerza moral sin convertirla en promesa determinista ni en una afirmación doctrinal cerrada sobre la capacidad humana.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Revisión más reciente: sin cambios necesarios; el texto fuente y la auditoría inglesa muestran acuerdo alto, sin correcciones aplicadas en la pasada final.'
  spanish_consistency_notes:
  - Se prefirió «Dios» no aplica aquí porque el verso no usa el nombre divino explícitamente; la voz divina se sobreentiende por el contexto narrativo.
  - Se mantuvo la personificación del pecado en masculino singular conforme al antecedente implícito en español y al referente narrativo.
  - Se preservó la tensión interpretativa del hebreo en la cláusula final con una nota de alternativas, sin resolverla de manera dogmática.
  - «Levantamiento» se eligió para no borrar la literalidad de שְׂאֵת; la posible lectura de «aceptación» queda explicada en la nota.
