base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/007/004.yaml
  text: For he will turn your son away from following me[a], and they will serve other gods; then the anger of Yahweh will burn against you[c][b], and he will quickly destroy you.
  footnotes:
