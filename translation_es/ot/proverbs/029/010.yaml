translation:
  language: es
  text: Los hombres sanguinarios odian al íntegro[a], pero los rectos buscan su vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los rectos cuidan de su vida» o «tratan de protegerlo». El hebreo puede entenderse en sentido positivo aquí.
    reason: alternative_reading
lexical_decisions:
- source_word: אַנְשֵׁי דָמִים
  english_pob_choice: Men of blood
  chosen_spanish: Los hombres sanguinarios
  alternatives_spanish:
  - Hombres de sangre
  - Hombres de derramamiento de sangre
  - Hombres violentos
  lexicon: HALOT
  rationale: La expresión hebrea es un idiomático de fuerza moral y violenta, no una referencia literal a sangre como sustancia. En español, «sanguinarios» comunica bien esa carga sin perder el matiz de violencia homicida, y evita una construcción demasiado extraña como «hombres de sangre».
- source_word: יִשְׂנְאוּ
  english_pob_choice: hate
  chosen_spanish: odian
  alternatives_spanish:
  - aborrecen
  - detestan
  lexicon: HALOT
  rationale: El verbo hebreo expresa odio de manera directa. «Odiar» conserva la fuerza semántica y el paralelismo con la primera cola.
- source_word: תָם
  english_pob_choice: the blameless
  chosen_spanish: al íntegro
  alternatives_spanish:
  - al inocente
  - al irreprochable
  - al hombre de integridad
  lexicon: HALOT
  rationale: תָם puede denotar al íntegro, inocente o sin culpa. «Íntegro» expresa bien la idea de integridad moral en español y evita confundirlo con el segundo miembro, donde aparece otro término de rectitud.
- source_word: וִישָׁרִים
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los justos
  - los íntegros
  - las personas rectas
  lexicon: HALOT
  rationale: ישרים describe a quienes son rectos o moralmente correctos. «Los rectos» mantiene el sentido plural y la correspondencia sapiencial con el primer colon.
- source_word: יְבַקְשׁוּ
  english_pob_choice: seek
  chosen_spanish: buscan
  alternatives_spanish:
  - buscan la vida de
  - procuran
  - tratan de hallar
  lexicon: HALOT
  rationale: En este contexto, el verbo puede expresar tanto búsqueda hostil como búsqueda para bien. «Buscan» conserva esa ambigüedad en español mejor que una paráfrasis más resuelta como «quieren proteger».
- source_word: נַפְשׁוֹ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - su persona
  - a él
  lexicon: HALOT
  rationale: נפש aquí puede significar vida, ser o persona. «Su vida» es la opción más literal y mantiene abierta la tensión interpretativa documentada en el texto fuente.
theological_decisions:
- issue: 'Ambigüedad del segundo hemistiquio: los rectos ¿buscan destruir la vida del justo o la procuran para su bien?'
  english_pob_reading: seek his life
  chosen_spanish_reading: buscan su vida
  alternative_spanish_readings:
  - buscan proteger su vida
  - cuidan de su vida
  - buscan darle protección
  rationale: La forma hebrea יְבַקְשׁוּ נַפְשׁוֹ admite una lectura hostil («buscan su vida») y una benevolente («procuran/cuidan su vida»). La redacción principal conserva la ambigüedad, en línea con la filosofía de la POB de no resolver de antemano una tensión significativa del original. La nota ofrece la lectura positiva documentada por el audit trail.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el paquete fuente; el pasaje pasó por revisión reciente sin cambios y con una nota de control que señaló posibles cuestiones mayores, especialmente en la ambigüedad del segundo colon. Esta propuesta conserva esa tensión interpretativa en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma POB cuando el tetragrámaton aparezca; aquí no ocurre.
  - Se traduce תָם con un término de integridad moral («íntegro») y ישָׁרִים con otro distinto («rectos») para evitar uniformar artificialmente ambos miembros.
  - Se evita «siervos» o lenguaje eclesial tradicional no sustentado por el hebreo.
  - Se mantiene una construcción directa y proverbial, con paralelismo claro y sin suavizar la dureza de «odian».
