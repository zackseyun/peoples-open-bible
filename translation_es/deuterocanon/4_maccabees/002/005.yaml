translation:
  language: es
  text: 'Pues la ley dice[a]: «No desearás la esposa de tu prójimo, ni nada de lo que es de tu prójimo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No codiciarás la esposa de tu prójimo, ni nada de lo que es de tu prójimo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει γοῦν
  english_pob_choice: says, then
  chosen_spanish: 'dice: «…»'
  alternatives_spanish:
  - 'dice, entonces: «…»'
  - 'dice, pues: «…»'
  lexicon: BDAG; LSJ
  rationale: En español, el valor inferencial/confirmatorio de γοῦν se integra con naturalidad en la transición «Porque…», que enlaza la cita con el argumento previo sin forzar un adverbio pesado. «Dice» preserva el presente introductorio del verbo griego.
- source_word: ὁ νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  lexicon: BDAG
  rationale: Aquí se trata de la ley mosaica citada como autoridad normativa. «Ley» es la forma natural en español y mantiene el sentido de fuente normativa del mandato.
- source_word: Οὐκ ἐπιθυμήσεις
  english_pob_choice: You shall not desire
  chosen_spanish: No desearás
  alternatives_spanish:
  - No codiciarás
  lexicon: BDAG
  rationale: ἐπιθυμέω puede abarcar deseo intenso o codicia. Se eligió «desearás» para seguir de cerca el matiz léxico y el argumento de 4 Macabeos sobre las pasiones, dejando «codiciarás» como alternativa tradicional válida.
- source_word: τὴν γυναῖκα
  english_pob_choice: your neighbor’s wife
  chosen_spanish: la esposa
  alternatives_spanish:
  - la mujer
  lexicon: BDAG
  rationale: En combinación con τοῦ πλησίον σου, el referente es marital; «esposa» expresa con claridad esa relación en español contemporáneo sin alterar el sentido.
- source_word: τοῦ πλησίον σου
  english_pob_choice: your neighbor’s
  chosen_spanish: de tu prójimo
  alternatives_spanish:
  - de tu vecino
  - de tu semejante
  lexicon: BDAG
  rationale: «Prójimo» conserva el valor comunitario y ético de πλησίον mejor que «vecino», que en español puede sonar demasiado local o geográfico.
- source_word: οὐδὲ ὅσα
  english_pob_choice: nor anything
  chosen_spanish: ni nada de lo que
  alternatives_spanish:
  - ni cualquier cosa que
  - ni nada
  lexicon: LSJ
  rationale: El griego neutro plural se expresa de manera inclusiva y natural en español con una construcción relativa amplia. «Ni nada de lo que…» evita una paraphrasis demasiado compacta y mantiene la generalidad.
- source_word: τῷ πλησίον σού ἐστιν
  english_pob_choice: belongs to your neighbor
  chosen_spanish: es de tu prójimo
  alternatives_spanish:
  - pertenece a tu prójimo
  - es tu prójimo
  lexicon: BDAG
  rationale: La relación de posesión se expresa de forma idiomática y breve con «es de». Esto conserva la fuerza posesiva sin sobrecargar el verso.
theological_decisions:
- issue: Ἐπιθυμέω en una cita del mandamiento
  english_pob_reading: You shall not desire / covet
  chosen_spanish_reading: No desearás
  alternative_spanish_readings:
  - No codiciarás
  rationale: El contexto de 4 Macabeos destaca el gobierno de los impulsos; «desearás» refleja el campo semántico básico del verbo y mantiene visible la conexión entre deseo desordenado y pasión. Se preserva «codiciarás» como alternativa tradicional por su arraigo bíblico.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Formulación de la posesión final
  english_pob_reading: that belongs to your neighbor / that is your neighbor’s
  chosen_spanish_reading: de tu prójimo
  alternative_spanish_readings:
  - pertenece a tu prójimo
  - es de tu prójimo
  rationale: La frase griega expresa posesión amplia sobre bienes, no solo una lista concreta. «De tu prójimo» permite incluir el sentido general sin restringirlo a un solo tipo de propiedad.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La versión inglesa final no requirió cambios en la última revisión; se conservó su decisión principal de reflejar ἐπιθυμέω con un término más transparente que el tradicional «covet». La presente versión española sigue esa misma línea, pero usa «desearás» como equivalente más natural y añade la alternativa tradicional en nota.
  spanish_consistency_notes:
  - Se mantiene «prójimo» para πλησίον de forma consistente con el registro bíblico y ético del pasaje.
  - Se evita «SEÑOR» porque aquí ὁ νόμος introduce una cita de la ley, no un reemplazo reverencial del nombre divino.
  - La cita se presenta con comillas latinas para lectura pública clara y digna.
  - El segmento final se traduce de forma amplia para reflejar el valor neutro plural de ὅσα sin perder la idea de posesión.
