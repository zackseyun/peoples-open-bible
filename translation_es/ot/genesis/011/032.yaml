  text: Los días de Taré fueron doscientos cinco años, y Taré murió en Harán.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  - llegaron a ser
  lexicon: HALOT
  rationale: En este resumen de duración de vida, el imperfecto narrativo hebreo funciona como una afirmación de resultado/suma. «Fueron» conserva la forma breve y natural del dato genealógico sin añadir matices no presentes.
- source_word: יְמֵי
  english_pob_choice: The days of
  chosen_spanish: Los días de
  alternatives_spanish:
  - La vida de
  - Los años de
  lexicon: HALOT
  rationale: Se conserva el hebraísmo de construcción para reflejar el modismo de duración de vida. En español «Los días de» suena suficientemente natural en este contexto genealógico y mantiene la huella del original.
- source_word: תֶּרַח
  english_pob_choice: Terah
  chosen_spanish: Taré
  alternatives_spanish:
  - Teraj
  - Terah
  lexicon: transliteración tradicional en español
  rationale: Se usa la forma habitual en español bíblico, «Taré», que comunica el nombre propio de manera legible para una audiencia amplia. La variante «Teraj» sería más cercana al sonido hebreo, pero menos establecida en español.
- source_word: חָמֵשׁ שָׁנִים וּמָאתַיִם שָׁנָה
  english_pob_choice: two hundred and five years
  chosen_spanish: doscientos cinco años
  alternatives_spanish:
  - cinco años y doscientos años
  - doscientos y cinco años
  lexicon: HALOT
  rationale: Se sigue el orden idiomático normal del español para los numerales compuestos. «Años» expresa con claridad la unidad temporal pluralizada, como en la normalización inglesa del POB.
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - pasó a mejor vida
  lexicon: HALOT
  rationale: «Murió» reproduce con transparencia el verbo hebreo מות sin eufemismo. Es la opción más directa y fiel al registro sobrio del versículo.
- source_word: בְּחָרָן
  english_pob_choice: in Haran
  chosen_spanish: en Harán
  alternatives_spanish:
  - en Jarán
  - en Haran
  lexicon: HALOT
  rationale: La preposición y el nombre de lugar se vierten de forma natural en español. «Harán» es la forma bíblica establecida y coherente con la lectura geográfica del texto.
