review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del griego: invocación solemne de testigos, merismo ''cielo y tierra'', títulos divinos coordinados y cláusula final de propósito/resultado negativo. Sin embargo, dos elecciones importantes no preservan fielmente el sentido ni el español natural: ''nos venga'' sugiere en español moderno una venganza impropia o incluso ambigua, mientras que ἐκδικεῖ aquí, según el propio expediente inglés, apunta a retribución/punición divina; y ''Señor de nuestros padres'' suena menos natural que ''Señor de nuestros antepasados'' o la opción más estructural ''nuestro Dios y el Señor de nuestros antepasados''.'
  spanish_quality_summary: El texto es mayormente legible y solemne, pero 'Llamamos a testificar contra ustedes al cielo y a la tierra...' resulta algo forzado frente a un español más natural como 'Ponemos por testigos contra ustedes...' o 'Invocamos como testigos contra ustedes...'. Además, 'nos venga' no es una formulación eclesial clara en español actual. La revisión propuesta mejora naturalidad sin alejarse del valor forense del griego.
  glossary_alignment: 'No hay conflicto con términos troncales del proyecto como Dios, Señor, Jesús, Mesías o Yahvé. Se mantiene κύριος como ''Señor''. La principal corrección léxica necesaria es ἐκδικεῖ: en español bíblico neutral conviene ''nos castiga'' o ''nos da su merecido juicio'', y dado el expediente inglés, ''nos castiga por nuestros pecados'' funciona mejor en el texto principal, dejando la alternativa más literal en nota.'
  issues:
  - severity: medium
    issue: '''nos venga'' para ἐκδικεῖ'
    rationale: Aunque formalmente cercano a 'avenges', en español moderno 'vengar' con objeto directo de persona ('nos venga') es poco natural y puede sonar teológicamente confuso. El propio expediente inglés admite explícitamente 'punishes us for our sins', que comunica mejor aquí la retribución divina.
  - severity: medium
    issue: '''Señor de nuestros padres'' suena rígido en español contemporáneo'
    rationale: '''Padres'' puede entenderse literalmente como progenitores inmediatos. En este contexto patriarcal-histórico, ''antepasados'' comunica mejor el sentido amplio y es más natural para lectura pública.'
  - severity: low
    issue: '''Llamamos a testificar contra ustedes'' es algo pesado'
    rationale: Es entendible, pero menos idiomático que una fórmula forense natural. 'Invocamos como testigos contra ustedes' preserva la explicación lexical documentada y fluye mejor.
  revised_spanish_text: Invocamos como testigos contra ustedes[a] al cielo y a la tierra, y a nuestro Dios y Señor de nuestros antepasados, que nos castiga por nuestros pecados y por los pecados de nuestros antepasados[b], para que hoy no actúe conforme a estas palabras.
  revised_footnotes:
