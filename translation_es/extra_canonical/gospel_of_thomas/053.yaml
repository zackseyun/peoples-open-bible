base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/053.yaml
  text: His disciples said to him[1], “Does circumcision benefit or not?” He said to them, “If it were beneficial, their father would beget them circumcised from their mother. Rather[6][5][4][3][2], the circumcision of truth in spirit has become entirely profitable.”
  footnotes:
  - marker: '1'
    text: ‘If it were beneficial’ reflects the irrealis construction ⲛⲉⲣⲉ…; cf. Layton, Grammar §280.
    reason: lexical_alternative
  - marker: '2'
    text: ‘Beget them … from their mother’ reflects a paternal subject (ⲡⲉⲩⲉⲓⲱⲧ) and source construction (ⲉⲃⲟⲗ ϩⲛ ⲡⲉⲩⲙⲁⲁⲩ).
    reason: cultural_note
  - marker: '3'
    text: ‘Circumcision of truth’ can be taken adjectivally as ‘true circumcision.’
    reason: lexical_alternative
  - marker: '4'
    text: ‘Has become entirely profitable’ renders the idiom ⲁϥϭⲛ̄ϩⲏⲩ ⲧⲏⲣϥ; lit. ‘has become entirely (so),’ with ‘profitable’ supplied from context.
    reason: lexical_alternative
  - marker: '5'
    text: 'Conceptual echoes: Rom 2:29; Phil 3:3.'
    reason: cross_reference
  - marker: '6'
    text: Lycopolitan-influenced pronominal form ⲛⲁⲛⲧⲟϥ (‘to him’) occurs in this saying.
    reason: dialect_note
