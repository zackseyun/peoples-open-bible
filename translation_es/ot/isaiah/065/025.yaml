  text: זְאֵ֨ב וְ/טָלֶ֜ה יִרְע֣וּ כְ/אֶחָ֗ד וְ/אַרְיֵה֙ כַּ/בָּקָ֣ר יֹֽאכַל תֶּ֔בֶן וְ/נָחָ֖שׁ עָפָ֣ר לַחְמ֑/וֹ לֹֽא יָרֵ֧עוּ וְ/לֹֽא יַשְׁחִ֛יתוּ בְּ/כָל הַ֥ר קָדְשִׁ֖/י אָמַ֥ר יְהוָֽה־־־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/065/025.yaml
  text: The wolf and the lamb will graze together[a], and the lion will eat straw like the ox; and dust will be the serpent’s food[c][b]. They will do no evil or destruction in all my holy mountain," says Yahweh.
  footnotes:
  - marker: a
    text: Or 'young goat' for 'lamb'; the Hebrew טָלֶה can refer more broadly to a young small livestock animal.
    reason: lexical_alternative
  - marker: b
    text: The serpent’s eating dust likely echoes Genesis 3:14.
    reason: cross_reference
  - marker: c
    text: Or 'will not harm or destroy'; the first verb can emphasize harmful action as well as evil-doing.
    reason: lexical_alternative
