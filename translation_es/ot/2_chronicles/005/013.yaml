translation:
  language: es
  text: 'Y aconteció que, cuando los que tocaban las trompetas y los cantores eran como uno[a], para hacer oír un solo sonido, al alabar y dar gracias a Yahvé, y cuando alzaban la voz con trompetas, címbalos e instrumentos musicales, y alababan a Yahvé: «Porque él es bueno, porque su amor fiel[b] es para siempre», la casa, la casa de Yahvé, se llenó de una nube.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «como uno»; también puede entenderse «al unísono».
    reason: lexical_alternative
  - marker: b
    text: «Amor fiel» traduce aquí חֶסֶד, que a menudo denota amor leal o pactual; tradicionalmente también se ha traducido «misericordia» o «bondad amorosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it came to pass
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y pasó
  - Y sucedió
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce el hecho con valor discursivo; «aconteció» mantiene ese arranque solemne sin sonar tan arcaico como otras opciones.
- source_word: כְאֶחָד
  english_pob_choice: were as one
  chosen_spanish: estaban unidos
  alternatives_spanish:
  - estaban como uno
  - estaban en un mismo sentir
  lexicon: HALOT
  rationale: La idea central es la unidad de acción, no solo simultaneidad. «Unidos» comunica la cohesión sin forzar una expresión extraña en español.
- source_word: למחצצרים
  english_pob_choice: the trumpeters
  chosen_spanish: los trompeteros
  alternatives_spanish:
  - los que tocaban las trompetas
  - los trompetistas
  lexicon: HALOT
  rationale: El sustantivo denota a quienes hacen sonar las trompetas; «trompeteros» conserva el valor de oficio/función.
- source_word: ולמשׁררים
  english_pob_choice: the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantantes
  - los que cantaban
  lexicon: HALOT
  rationale: Para un contexto litúrgico, «cantores» es claro y digno; distingue bien la función vocal del grupo.
- source_word: להשמיע קול אחד
  english_pob_choice: to make one sound
  chosen_spanish: para hacer oír una sola voz
  alternatives_spanish:
  - para producir un solo sonido
  - para emitir una sola voz
  lexicon: HALOT
  rationale: «Hacer oír» reproduce la finalidad audible del hebreo; «una sola voz» preserva la unidad sonora de manera natural en español.
- source_word: להלל ולהודות
  english_pob_choice: in praising and giving thanks
  chosen_spanish: para alabar y dar gracias
  alternatives_spanish:
  - alabando y dando gracias
  - en alabanza y gratitud
  lexicon: HALOT
  rationale: Son infinitivos de propósito; la formulación española es directa y mantiene los dos actos verbales distinguidos.
- source_word: ליהוה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - al Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto: el Tetragrámaton se rinde como «Yahvé» en el texto principal.'
- source_word: וכהרים קול
  english_pob_choice: and as they lifted up the voice
  chosen_spanish: y alzaban la voz
  alternatives_spanish:
  - y levantaban la voz
  - y alzaban un grito
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; «alzar la voz» es la equivalencia más natural y fiel.
- source_word: בחצצרות ובמצלתים ובכלי השיר
  english_pob_choice: with trumpets and cymbals and instruments of song
  chosen_spanish: con trompetas, címbalos e instrumentos de canto
  alternatives_spanish:
  - con trompetas, címbalos e instrumentos musicales
  - con trompetas y címbalos y utensilios de canto
  lexicon: HALOT
  rationale: «Instrumentos de canto» conserva la relación semántica con el hebreo כלי השיר y evita diluir la referencia a instrumentos usados para el canto/adoración.
- source_word: ובהלל ליהוה
  english_pob_choice: and in praising Yahweh
  chosen_spanish: y al alabar a Yahvé
  alternatives_spanish:
  - y mientras alababan a Yahvé
  - y en alabanza a Yahvé
  lexicon: HALOT
  rationale: El hebreo retoma la acción de alabar como circunstancia acompañante; «al alabar» refleja bien ese valor verbal.
- source_word: כי טוב
  english_pob_choice: For he is good
  chosen_spanish: Porque es bueno
  alternatives_spanish:
  - Pues es bueno
  - Porque él es bueno
  lexicon: HALOT
  rationale: Se conserva la fórmula litúrgica breve y directa; el sujeto divino queda sobreentendido, como en el hebreo.
- source_word: כי לעולם חסדו
  english_pob_choice: for his steadfast love endures forever
  chosen_spanish: porque para siempre es su misericordia
  alternatives_spanish:
  - porque su misericordia es para siempre
  - porque su amor fiel es para siempre
  lexicon: HALOT
  rationale: Aquí se adopta «misericordia» como opción tradicional y plenamente comprensible en español, sin negar la fuerza de חֶסֶד como lealtad amorosa/pactual.
- source_word: והבית מלא ענן בית יהוה
  english_pob_choice: the house, the house of Yahweh, was filled with a cloud
  chosen_spanish: la casa, la casa de Yahvé, se llenó de una nube
  alternatives_spanish:
  - el templo, la casa de Yahvé, se llenó de una nube
  - la casa de Yahvé se llenó de una nube
  lexicon: HALOT
  rationale: Se respeta la repetición enfática «la casa, la casa de Yahvé» y el artículo indefinido de «una nube», conforme al hebreo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahweh
  rationale: La política del proyecto pide verter explícitamente el Tetragrámaton como «Yahvé» en español, en vez de ocultarlo con un título. Esto preserva el nombre de pacto y la trazabilidad textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Spanish convention Yahvé'
- issue: Sentido de חֶסֶד en la doxología
  english_pob_reading: his steadfast love endures forever
  chosen_spanish_reading: para siempre es su misericordia
  alternative_spanish_readings:
  - su amor fiel es para siempre
  - su lealtad amorosa es para siempre
  rationale: En español bíblico, «misericordia» comunica bien la fidelidad benevolente de חֶסֶד sin perder inteligibilidad litúrgica. Se reconoce que el término también puede sugerir amor leal/pactual.
  doctrine_reference: DOCTRINE.md Translation philosophy §6; consistency of key terms §5
- issue: Unidad sonora de músicos y cantores
  english_pob_reading: were as one / to make one sound
  chosen_spanish_reading: estaban unidos / para hacer oír una sola voz
  alternative_spanish_readings:
  - estaban como uno / para producir un solo sonido
  - estaban en un mismo sentir / para emitir una sola voz
  rationale: La combinación comunica tanto la unidad de los ejecutantes como el resultado auditivo único. «Voz» en español permite unir ambos aspectos sin desdibujar el eco poético del hebreo.
  doctrine_reference: Lexical consistency; source structure preservation
translation_notes:
  revision_awareness: 'Se tomó en cuenta el ajuste del inglés POB hacia una estructura más cercana al hebreo: simultaneidad marcada por «as…» y el uso de «one sound/voice». En español se evitó una calca rígida, pero se preservaron la unidad de los ejecutantes, la secuencia de alabanza y el cierre litúrgico con חֶסֶד y la repetición enfática de «la casa».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se distingue «alabar» y «dar gracias» como dos acciones paralelas.
  - «Una nube» mantiene la indefinición del hebreo.
  - La repetición «la casa, la casa de Yahvé» se conserva por énfasis.
  - Las notas [a] y [b] están ancladas exactamente en el texto principal.
