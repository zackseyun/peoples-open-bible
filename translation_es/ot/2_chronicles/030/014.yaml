translation:
  language: es
  text: Ellos se levantaron y quitaron los altares que estaban en Jerusalén, y quitaron todos los altares de incienso[a] y los arrojaron al valle del Cedrón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''todos los lugares para quemar incienso'' o ''todos los soportes de incienso''. El término hebreo se refiere a instalaciones cultuales asociadas con quemar incienso.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''al nahr/torrente/wadi/valle de Cedrón''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  english_pob_choice: They arose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - se pusieron de pie
  lexicon: HALOT
  rationale: קום en esta secuencia narrativa introduce acción decidida. En español, 'se levantaron' comunica ese movimiento inicial con naturalidad y sin añadir matiz interpretativo excesivo.
- source_word: וַיָּסִירוּ / הֵסִירוּ
  english_pob_choice: removed
  chosen_spanish: quitaron
  alternatives_spanish:
  - removieron
  - retiraron
  lexicon: HALOT
  rationale: סור/הסיר expresa quitar o retirar. 'Quitar' es claro y directo en español, y puede repetirse para ambos verbos del verso sin perder fuerza.
- source_word: הַמִּזְבְּחוֹת
  english_pob_choice: the altars
  chosen_spanish: los altares
  alternatives_spanish:
  - los sacrificatorios
  - los altares de culto
  lexicon: HALOT
  rationale: מזבחות es el plural ordinario de 'altar'; el contexto ya indica su carácter ilegítimo. 'Altares' conserva la correspondencia más natural y fiel.
- source_word: אֲשֶׁר בִּירוּשָׁלָם
  english_pob_choice: that were in Jerusalem
  chosen_spanish: que estaban en Jerusalén
  alternatives_spanish:
  - que había en Jerusalén
  - en Jerusalén
  lexicon: HALOT
  rationale: La cláusula relativa se mantiene para reflejar la sintaxis hebrea y precisar la ubicación de los altares sin perder fluidez en español.
- source_word: הַמְקַטְּרוֹת
  english_pob_choice: the incense altars
  chosen_spanish: los altares de incienso
  alternatives_spanish:
  - los lugares para quemar incienso
  - los soportes de incienso
  lexicon: HALOT
  rationale: El término alude a instalaciones cultuales asociadas con el incienso. 'Altares de incienso' es una solución clara en español, aunque el hebreo también puede abarcar lugares o estructuras para quemarlo.
- source_word: וַיַּשְׁלִיכוּ
  english_pob_choice: threw
  chosen_spanish: los arrojaron
  alternatives_spanish:
  - los echaron
  - los tiraron
  lexicon: HALOT
  rationale: שׁלך implica lanzar con fuerza o desechar. 'Arrojaron' mantiene mejor esa energía que un verbo más neutral.
- source_word: לְנַחַל קִדְרוֹן
  english_pob_choice: into the Kidron Valley
  chosen_spanish: al valle del Cedrón
  alternatives_spanish:
  - al torrente del Cedrón
  - al wadi del Cedrón
  lexicon: HALOT
  rationale: נחל puede ser torrente, valle o cauce estacional. 'Valle del Cedrón' es inteligible en español general y conserva la referencia geográfica; 'Cedrón' es la forma española tradicional del topónimo.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente en el texto español ambos marcadores de nota. También se unificó el tratamiento del topónimo con 'Cedrón' para mayor naturalidad en español, manteniendo la relación con el Kidron del hebreo.
  spanish_consistency_notes:
  - Se mantuvo la repetición verbal 'quitaron' para reflejar ambos verbos hebreos de 'remover' sin sobrecargar el estilo.
  - '''Cedrón'' sigue la forma española tradicional del nombre propio, coherente con uso bíblico en español.'
  - No se introdujo una nota teológica porque el versículo no presenta una decisión doctrinal controvertida en esta sección.
