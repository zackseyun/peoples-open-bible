revisions:
- from: ¿Por qué habría de quejarse un hombre vivo, un hombre, por sus pecados[a][b]?
  to: ¿Por qué se queja un hombre que aún vive, el hombre, por sus pecados[a][b]?
  rationale: Se simplifica la pregunta retórica para reflejar mejor el hebreo y sonar más natural en español. Se cambia 'un hombre vivo' por 'un hombre que aún vive' para evitar una expresión menos idiomática y dejar claro el contraste implícito de seguir con vida. Se mantiene la duplicación appositiva con 'el hombre' para conservar el énfasis hebreo con mejor fluidez. Las notas se conservan porque reflejan correctamente las alternativas textuales e interpretativas del expediente inglés.
  reviewer_model: gpt-5.4
