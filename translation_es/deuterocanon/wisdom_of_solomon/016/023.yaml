translation:
  language: es
  text: Pero esto otra vez[a], para que los justos fueran alimentados, olvidó incluso su propio poder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "perdió su propia fuerza" / "dejó de lado su propio poder". El griego personifica al sujeto al decir que "olvidó" su propio poder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - ello
  - esta cosa
  lexicon: LSJ
  rationale: El demostrativo retoma el fenómeno previo y en español 'esto' conserva mejor la deixis que un pronombre más vago.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - una vez más
  lexicon: LSJ
  rationale: La locución 'de nuevo' suena natural en español moderno y mantiene la idea de repetición o reanudación.
- source_word: ἵνα τραφῶσιν
  english_pob_choice: so that ... might be fed
  chosen_spanish: para que ... sean alimentados
  alternatives_spanish:
  - para que ... sean nutridos
  - a fin de que ... sean alimentados
  lexicon: LSJ
  rationale: ἵνα con subjuntivo expresa propósito; 'sean alimentados' conserva el pasivo griego de τρέφω mejor que una forma activa.
- source_word: δίκαιοι
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los piadosos
  lexicon: LSJ
  rationale: Como plural sustantivado, 'los justos' es idiomático en español y preserva la categoría moral-religiosa del término.
- source_word: ἐπιλησθῇ
  english_pob_choice: forgot
  chosen_spanish: olvidó
  alternatives_spanish:
  - se olvidó de
  - desatendió
  lexicon: LSJ
  rationale: Aunque el griego tiene forma medio/subjuntiva, el POB inglés mantiene la personificación con un pasado narrativo; 'olvidó' la reproduce con naturalidad.
- source_word: ἰδίας
  english_pob_choice: its own
  chosen_spanish: su propio
  alternatives_spanish:
  - su mismo
  - su propia
  lexicon: LSJ
  rationale: La idea reflexiva se expresa mejor con 'su propio', que conserva la referencia interna del posesivo griego.
- source_word: δυνάμεως
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - capacidad
  - potencia
  lexicon: LSJ
  rationale: '''Poder'' es amplio y mantiene la personificación/eficacia operativa del elemento; ''fuerza'' sería una alternativa válida pero algo más física.'
theological_decisions:
- issue: Personificación del elemento creado
  english_pob_reading: Retain the personified wording ('forgot even its own power') rather than flattening to an impersonal paraphrase.
  chosen_spanish_reading: Conservar el lenguaje personificado ('olvidó incluso su propio poder') en vez de convertirlo en una paráfrasis impersonal.
  alternative_spanish_readings:
  - perdió incluso su fuerza natural
  - dejó de ejercer su poder habitual
  rationale: El griego atribuye al sujeto una acción propia de una persona; mantener esa personificación respeta la imagen teológica de la creación sirviendo al propósito divino para los justos.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el pasaje coincide con la versión auditada más reciente y con el veredicto de alta concordancia.
  spanish_consistency_notes:
  - Se usa 'justos' para δίκαιοι en coherencia con el registro bíblico y con la preferencia del POB por categorías morales sustantivadas.
  - Se evita 'SEÑOR' u otra sustitución no pertinente porque el verso no contiene el nombre divino.
  - '''Poder'' se mantiene como equivalente general de δύναμις, coherente con el contexto de fuerza operativa/personificada.'
