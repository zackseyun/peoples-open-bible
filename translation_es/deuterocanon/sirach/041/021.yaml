translation:
  language: es
  text: y de mirar el rostro de una mujer extraña[a], y de acercarse a su sirvienta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo זרה también puede traducirse como 'mujer ajena' o 'mujer extraña'; el griego paralelo dice 'mujer casada', lo que apoya el sentido más específico de la mujer de otro.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπὸ ἀποστροφῆς προσώπου
  english_pob_choice: of looking at the face
  chosen_spanish: de apartar la mirada
  alternatives_spanish:
  - de mirar
  - de contemplar
  lexicon: LSJ / contextual parallel with Hebrew מַבִּיט
  rationale: El griego expresa una acción de apartar el rostro o la mirada; en español, 'apartar la mirada' comunica mejor el gesto evitativo que una simple mención neutra de 'mirar', y mantiene el tono de advertencia moral del contexto.
- source_word: γυναικὸς ὑπάνδρου
  english_pob_choice: a strange woman / another man’s wife
  chosen_spanish: una mujer casada
  alternatives_spanish:
  - la esposa de otro
  - una mujer ajena
  - una mujer extraña
  lexicon: LSJ / paralelo griego frente al hebreo זרה
  rationale: El griego aclara que se trata de una mujer 'bajo marido', es decir, casada. En español, 'una mujer casada' expresa de forma natural esa precisión sin introducir una paráfrasis más interpretativa que el dato del paralelo permite.
- source_word: שפחתה / δόσεως
  english_pob_choice: her maidservant
  chosen_spanish: su sirvienta
  alternatives_spanish:
  - su criada
  - su esclava
  - su servidora
  lexicon: HALOT / LXX concordance
  rationale: Aunque el hebreo y el griego del contexto tienen una dificultad textual sobre la segunda mitad del verso, la imagen conservada en la tradición paralela es la de acercarse a la subordinada doméstica de esa mujer. 'Sirvienta' es un español claro y relativamente amplio, sin forzar 'esclava' donde el contexto inmediato no la exige con plena seguridad.
theological_decisions:
- issue: Cómo reflejar la cualificación del griego frente al hebreo ambiguo en la mujer prohibida
  english_pob_reading: a strange woman / another man’s wife, with footnote preserving the broader lexical option
  chosen_spanish_reading: una mujer casada, con nota que reconoce la lectura más amplia posible
  alternative_spanish_readings:
  - una mujer extraña
  - la mujer de otro
  - una extranjera
  rationale: El hebreo admite un sentido más amplio, pero el paralelo griego especifica ὑπάνδρου. Para no borrar esa tensión, el texto principal adopta la lectura aclarada por el griego y la nota conserva la alternativa léxica más amplia que sigue siendo posible en hebreo.
  doctrine_reference: Principio de primacía de las fuentes originales con uso responsable de paralelos textuales; conservar tensiones textuales cuando no pueden resolverse sin pérdida de evidencia.
- issue: 'Segunda mitad del versículo: relación entre la hebrea ''ofrenda/porción'' y la imagen de la sirvienta en el paralelo griego'
  english_pob_reading: of drawing near to her maidservant
  chosen_spanish_reading: de acercarse a su sirvienta
  alternative_spanish_readings:
  - de acercarse a su criada
  - de acercarse a la esclava de ella
  rationale: El hebreo transmitido en el paquete de fuente presenta una forma difícil y el griego conserva una línea paralela que apunta a la proximidad indebida con la subordinada doméstica. La traducción española sigue esa imagen conservada sin exagerar el grado social con 'esclava' como primera opción.
  doctrine_reference: Uso del paralelo griego como control de sentido cuando el hebreo del testimonio es difícil o compuesto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que volvió a una lectura más literal de 'a strange woman', pero el paquete de fuente exige usar el griego paralelo como control real de sentido. Por eso la redacción española sigue la precisión griega en el cuerpo del texto y deja constancia de la alternativa hebrea amplia en la nota.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, evitando arcaísmos innecesarios.
  - '''Mujer casada'' se usó como equivalente claro de γυναικὸς ὑπάνδρου.'
  - '''Sirvienta'' se prefirió por naturalidad y porque no obliga a definir el estatus jurídico de la subordinada doméstica.'
