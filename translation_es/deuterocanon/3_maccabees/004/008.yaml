translation:
  language: es
  text: Y sus parientes, con lazos corredizos ceñidos alrededor de sus cuellos en vez de guirnaldas, aunque en la plenitud de la juventud, pasaban en lamentos los días restantes de sus bodas, en vez de banquetes y holganza juvenil, ya viendo a Hades[a] tendido a sus pies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muerte» o «sepulcro» para «Hades»; el griego usa Ἅιδης, conservando la imagen del inframundo o del reino de los muertos sin especificar un castigo final.
    reason: lexical_alternative
lexical_decisions:
- source_word: συγγενεῖς
  english_pob_choice: relatives
  chosen_spanish: parientes
  alternatives_spanish:
  - familiares
  - deudos
  lexicon: LSJ
  rationale: El término expresa vínculo de sangre o parentesco. «Parientes» es natural en español y amplio, sin limitarse a varones ni volverlo demasiado técnico.
- source_word: βρόχους
  english_pob_choice: nooses
  chosen_spanish: lazos
  alternatives_spanish:
  - nudos corredizos
  - sogas
  lexicon: LSJ
  rationale: En español, «lazo» conserva la imagen de una atadura/loop y evita una dureza innecesaria; el contexto ya comunica su carácter siniestro por el contraste con las guirnaldas. A diferencia del inglés, «noose» no tiene una opción única y natural en todos los registros; por eso se eligió un término amplio, manteniendo la imagen de constricción.
- source_word: ὡς ἀντὶ στεφέων
  english_pob_choice: instead of garlands
  chosen_spanish: en vez de guirnaldas
  alternatives_spanish:
  - en lugar de coronas
  - como en vez de coronas
  lexicon: LSJ
  rationale: La idea es de contraste irónico con adorno festivo. «Guirnaldas» funciona bien en español para el ámbito nupcial y festivo, y evita un calco demasiado rígido de «coronas» que podría sonar menos natural aquí.
- source_word: τοὺς αὐχένας περιπεπλεγμένοι
  english_pob_choice: wrapped around their necks
  chosen_spanish: ceñidos alrededor de sus cuellos
  alternatives_spanish:
  - enredados alrededor de sus cuellos
  - enroscados en sus cuellos
  lexicon: LSJ
  rationale: El participio describe la colocación del lazo sobre el cuello. «Ceñidos» mantiene la imagen física de rodear/abarcar el cuello con una formulación más fluida en español.
- source_word: μετὰ ἀκμαίας νεανικῆς ἡλικίας
  english_pob_choice: though in the full bloom of youth
  chosen_spanish: aunque en la plenitud de la juventud
  alternatives_spanish:
  - estando en el vigor de la juventud
  - en el apogeo juvenil
  lexicon: LSJ
  rationale: La frase subraya vigor y plenitud vital. «Plenitud de la juventud» preserva ese énfasis con dignidad y naturalidad idiomática.
- source_word: εὐωχίας
  english_pob_choice: feasting
  chosen_spanish: banquetes
  alternatives_spanish:
  - festines
  - comidas festivas
  lexicon: LSJ
  rationale: En contexto de bodas, el término apunta a la celebración con comida abundante. «Banquetes» conserva el matiz ceremonial y suena bien en español.
- source_word: νεωτερικῆς ῥᾳθυμίας
  english_pob_choice: youthful ease
  chosen_spanish: holganza juvenil
  alternatives_spanish:
  - ocio juvenil
  - comodidad juvenil
  - juventud despreocupada
  lexicon: LSJ
  rationale: Ῥᾳθυμία puede implicar holgura, despreocupación o inactividad. «Holganza juvenil» mantiene la dimensión de ocio/ease sin moralizar de más ni perder el contraste con el lamento.
- source_word: τὰς ἐπιλοίπους τῶν γάμων ἡμέρας
  english_pob_choice: the remaining days of their weddings
  chosen_spanish: los días restantes de sus bodas
  alternatives_spanish:
  - el resto de los días de boda
  - los días que quedaban de sus bodas
  lexicon: LSJ
  rationale: El plural γάμων sugiere las festividades nupciales. «Bodas» funciona en español para ese conjunto ceremonial, y «días restantes» reproduce la idea de lo que aún quedaba por transcurrir.
- source_word: ἐν θρήνοις διῆγον
  english_pob_choice: spent ... in mourning
  chosen_spanish: pasaban en lamentos
  alternatives_spanish:
  - transcurrían en duelo
  - vivían en llanto
  lexicon: LSJ
  rationale: El verbo expresa pasar el tiempo, y θρῆνοι son lamentos. «En lamentos» conserva el sustantivo de la fuente y el tono elegíaco, aunque en español «duelo» también sería posible como equivalencia interpretativa.
- source_word: παρὰ πόδας ἤδη τὸν ἅδην ὁρῶντες κείμενον
  english_pob_choice: already seeing Hades lying at their feet
  chosen_spanish: ya viendo al Hades tendido a sus pies
  alternatives_spanish:
  - ya viendo a Hades tendido a sus pies
  - ya viendo la muerte tendida a sus pies
  - ya viendo el Hades postrado a sus pies
  lexicon: LSJ
  rationale: Se preserva Ἅιδης como «Hades» para respetar el término griego y su imaginería del reino de los muertos. «Tendido a sus pies» conserva la inmediatez amenazante del participio κείμενον y la proximidad de la muerte.
theological_decisions:
- issue: Tratamiento de Ἅιδης
  english_pob_reading: Hades
  chosen_spanish_reading: Hades
  alternative_spanish_readings:
  - muerte
  - sepulcro
  - el reino de los muertos
  rationale: En este pasaje deuterocanónico, el término griego nombra directamente a Ἅιδης sin exigir una traducción doctrinalmente más específica. Mantener «Hades» respeta la fuente y conserva la tensión entre la imagen del inframundo y una lectura más general de la muerte.
  doctrine_reference: Primacía del texto original; no resolver la imaginería del más allá más allá de lo que el griego afirma explícitamente.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al preferir una construcción directa para ὡς ἀντὶ στεφέων, evitando fórmulas redundantes. También se tuvo en cuenta la decisión auditada de conservar Ἅιδης como término propio y no reducirlo a «muerte» en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Hades» en el texto principal, en línea con la decisión auditada de preservar Ἅιδης.
  - Se usa «bodas» en plural para reflejar el plural griego γάμων como festividades nupciales.
  - La coordinación «banquetes y holganza juvenil» mantiene el contraste entre fiesta y despreocupación expresado por εὐωχίας y νεωτερικῆς ῥᾳθυμίας.
  - La puntuación busca hacer legible la acumulación participial del griego sin descomponerla excesivamente.
