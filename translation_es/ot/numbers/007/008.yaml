    rationale: En una edición española conviene usar equivalentes españoles, p. ej. 'vagones' no sería adecuado en este contexto; mejor 'carros' o 'carretones' según se quiera matizar. Dado el rastro inglés, basta con 'carros' como alternativa léxica española.
  revised_spanish_text: Y dio las cuatro carretas[a] y los ocho bueyes a los hijos de Merari, conforme a su servicio, bajo la dirección de Itamar[b], hijo de Aarón, el sacerdote.
  revised_footnotes:
