translation:
  language: es
  text: Tus dos pechos son como dos cervatillos[a], gemelos de una gacela[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «crías de ciervo»; el término hebreo puede traducirse de manera más general, aunque aquí se mantiene «cervatillos» por la imagen poética.
    reason: lexical_alternative
  - marker: b
    text: O «una cierva». La forma hebrea es femenina singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁנֵי
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - ambos
  lexicon: HALOT
  rationale: El numeral en constructo introduce la pareja explícita del miembro corporal; 'dos' conserva esa precisión sin forzar una expresión más idiomática que atenúe la imagen poética.
- source_word: שָׁדַיִךְ
  english_pob_choice: your breasts
  chosen_spanish: tus pechos
  alternatives_spanish:
  - tus senos
  - tu busto
  lexicon: HALOT
  rationale: '''שַׁד'' refiere literalmente al pecho/breast; en español ''pechos'' es claro, directo y adecuado al registro poético-erótico del contexto, sin eufemismo excesivo.'
- source_word: כִּשְׁנֵי
  english_pob_choice: like two
  chosen_spanish: como dos
  alternatives_spanish:
  - cual dos
  - así como dos
  lexicon: HALOT
  rationale: La partícula comparativa marca símil; 'como' es la equivalencia natural en español y preserva la comparación sin añadir matices.
- source_word: עֳפָרִים
  english_pob_choice: fawns
  chosen_spanish: cervatillos
  alternatives_spanish:
  - crías de ciervo
  - ciervos jóvenes
  lexicon: HALOT
  rationale: El término alude a animales jóvenes, y en español 'cervatillos' comunica bien la ternura y gracia de la imagen poética, manteniendo la fuerza visual del paralelismo.
- source_word: תָּאֳמֵי
  english_pob_choice: twins of
  chosen_spanish: mellizos de
  alternatives_spanish:
  - gemelos de
  - dos crías de
  lexicon: HALOT
  rationale: El constructo indica una pareja perfectamente emparejada; 'mellizos de' expresa esa cualidad dual de manera natural en español y conserva el matiz de correspondencia.
- source_word: צְבִיָּה
  english_pob_choice: a gazelle
  chosen_spanish: una gacela
  alternatives_spanish:
  - una cierva
  lexicon: HALOT
  rationale: La forma femenina apunta a una hembra del animal comparado; 'gacela' sigue el trasfondo poético del Cantar y es más específica que 'cierva' para este campo imaginario.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el trazado de decisiones del POB en inglés; no se detectaron revisiones sustantivas en el paquete de auditoría, y la concordancia externa fue alta (agree).
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo doble del hebreo: primero los pechos, luego la comparación con dos jóvenes animales y su cualidad de pareja.'
  - Se evitó 'SEÑOR' u այլ terminología litúrgica ajena; no aplica a este verso.
  - '''Gacela'' se conserva por coherencia imagética con el Cantar y para reflejar la nota alternativa sobre ''cierva'' sin ocultar la ambigüedad de género del hebreo.'
  - Se eligió 'pechos' por fidelidad léxica y claridad contemporánea; es más directo que un eufemismo y corresponde al registro del poema.
