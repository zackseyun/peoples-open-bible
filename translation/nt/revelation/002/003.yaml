theological_decisions:
- issue: Sense of suffering/endurance language in the commendation
  chosen_reading: The verse commends sustained endurance and bearing hardship for Jesus' name, without specifying a particular form of persecution or labor beyond the text.
  alternative_readings:
  - The final clause could be read more narrowly as 'you have not labored in vain' or 'you have not tired from labor.'
  rationale: The wording should preserve the text's commendation without importing a more specific theology of persecution, ministry labor, or reward than the Greek states. The parallelism favors endurance under strain.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
