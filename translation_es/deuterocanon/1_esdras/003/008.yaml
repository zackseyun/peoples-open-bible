translation:
  language: es
  text: Y entonces[a], después de que cada uno escribió su propia declaración, las sellaron y las pusieron bajo la almohada de Darío el rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bajo el apoyo para la cabeza de Darío el rey». El griego προσκεφάλαιον puede significar «almohada» o «apoyo para la cabeza».
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: then
  chosen_spanish: Y entonces
  alternatives_spanish:
  - entonces
  - y luego
  lexicon: LSJ
  rationale: Marca la transición narrativa inmediata; «entonces» es la equivalencia natural y conserva la secuencia del relato.
- source_word: γράψαντες
  english_pob_choice: after each had written his own statement
  chosen_spanish: después de que cada uno había escrito
  alternatives_spanish:
  - habiendo escrito cada uno
  - cuando cada uno escribió
  lexicon: LSJ
  rationale: El participio aoristo anterior a los verbos principales expresa acción previa; en español se rinde con una construcción temporal anterior clara y natural.
- source_word: ἕκαστος
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada uno de ellos
  - cada persona
  lexicon: LSJ
  rationale: El sentido distributivo es individual y directo; «cada uno» mantiene esa fuerza con naturalidad.
- source_word: τὸν ἑαυτοῦ λόγον
  english_pob_choice: his own statement
  chosen_spanish: su propia declaración
  alternatives_spanish:
  - su propio escrito
  - su propia exposición
  - su propio argumento
  lexicon: LSJ
  rationale: En este contexto de competencia y escritos, λόγος se refiere a lo que cada uno redactó; «declaración» comunica bien la idea de texto presentado sin forzar una interpretación excesiva.
- source_word: ἐσφραγίσαντο
  english_pob_choice: they sealed them
  chosen_spanish: las sellaron
  alternatives_spanish:
  - las pusieron bajo sello
  - las cerraron con sello
  lexicon: LSJ
  rationale: El verbo implica sellar los escritos; en español se sobreentiende el objeto por el contexto, y el femenino plural concuerda con «declaraciones».
- source_word: ἔθηκαν
  english_pob_choice: placed
  chosen_spanish: las pusieron
  alternatives_spanish:
  - las colocaron
  - las depositaron
  lexicon: LSJ
  rationale: Verbo narrativo simple; «pusieron» es natural y mantiene el movimiento físico del texto.
- source_word: ὑπὸ τὸ προσκεφάλαιον
  english_pob_choice: under the pillow
  chosen_spanish: bajo la almohada
  alternatives_spanish:
  - bajo el cabezal
  - debajo del cabezal
  lexicon: LSJ
  rationale: προσκεφάλαιον puede significar almohada o cabezal/apoyo para la cabeza; se elige «almohada» como la opción más clara para el lector moderno.
- source_word: Δαρείου τοῦ βασιλέως
  english_pob_choice: of Darius the king
  chosen_spanish: de Darío, el rey
  alternatives_spanish:
  - del rey Darío
  - de Darío el rey
  lexicon: LSJ
  rationale: Se conserva la cercanía al orden griego y la aposición explícita; «el rey» refleja τοῦ βασιλέως sin ocultarlo en un título más idiomático.
translation_notes:
  revision_awareness: El texto griego y el contexto auditado inglés están en alto acuerdo; no se detectan revisiones aplicadas en el registro base. La principal decisión abierta es léxica en προσκεφάλαιον, donde el inglés ya consignó la alternativa «headrest».
  spanish_consistency_notes:
  - Se mantuvo un español moderno y sobrio, apto para lectura eclesial.
  - Se evitó sustituir el nombre divino o terminología doctrinal, ya que este versículo no contiene esos elementos.
  - La concordancia pronominal y de género sigue la referencia a «las declaraciones» para preservar la fluidez en español.
