base_translation:
  language: en
  yaml_path: translation/ot/exodus/010/019.yaml
  text: And Yahweh turned a very strong west wind[a], and it carried away the locusts and drove them into the Sea of Reeds[b]. Not one locust remained in all the territory of Egypt.
  footnotes:
