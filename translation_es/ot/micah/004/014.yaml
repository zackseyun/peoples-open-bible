translation:
  language: es
  text: Ahora reúnete en tropas[a], hija de tropas; un asedio ha sido puesto contra nosotros. Con una vara golpean[b] al juez de Israel[c] en la mejilla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘hiérete’ o ‘córtate’, si el verbo se toma en el sentido de autolesión más que de reunir tropas.
    reason: lexical_alternative
  - marker: b
    text: O ‘golpearán’; el imperfecto hebreo puede leerse con fuerza futura en contexto profético.
    reason: lexical_alternative
  - marker: c
    text: ‘El juez de Israel’ puede referirse en general al gobernante o líder de Israel; algunos intérpretes también ven en el contexto una prefiguración mesiánica.
    reason: alternative_reading
lexical_decisions:
- source_word: תִּתְגֹּדְדִי
  english_pob_choice: muster yourself in troops
  chosen_spanish: reúnete en tropas
  alternatives_spanish:
  - hiérete
  - córtate
  - junta tus tropas
  lexicon: HALOT
  rationale: El hitpolel de גדד puede expresar tanto autolesión como agrupamiento militar. En este contexto de asedio y de ‘hija de tropas’, se favorece el sentido de reunir fuerzas; ‘reúnete en tropas’ conserva el matiz reflexivo sin sonar forzado en español.
- source_word: בַת גְּדוּד
  english_pob_choice: daughter of troops
  chosen_spanish: hija de tropas
  alternatives_spanish:
  - hija de un tropel
  - ciudad de tropas
  - hija de una tropa
  lexicon: HALOT
  rationale: Se mantiene la personificación hebrea ‘hija de X’ para una ciudad o comunidad. ‘Tropas’ comunica el campo militar de גְּדוּד y suena natural en español sin perder el paralelo con el hebreo.
- source_word: מָצוֹר
  english_pob_choice: a siege
  chosen_spanish: un asedio
  alternatives_spanish:
  - sitio
  - obras de sitio
  - fuerza sitiadora
  lexicon: HALOT
  rationale: El sustantivo designa la situación o acción de sitiar. ‘Asedio’ es idiomático en español y no especifica más de lo que el hebreo exige.
- source_word: שָׂם עָלֵינוּ
  english_pob_choice: is set against us
  chosen_spanish: está puesto contra nosotros
  alternatives_spanish:
  - ha sido puesto contra nosotros
  - ha sido colocado contra nosotros
  - se ha levantado contra nosotros
  lexicon: HALOT
  rationale: El hebreo usa un perfecto singular con sujeto implícito. En español, la pasiva/resultativa ‘está puesto contra nosotros’ conserva la imagen de algo ya colocado en posición de ataque sin introducir un sujeto no expresado.
- source_word: בַּשֵּׁבֶט
  english_pob_choice: with a rod
  chosen_spanish: con una vara
  alternatives_spanish:
  - con un cetro
  - con un bastón
  - con una caña
  lexicon: HALOT
  rationale: שֵׁבֶט puede ser vara, bastón o cetro. Aquí el contexto de golpeo favorece ‘vara’, que transmite el instrumento de castigo o insulto con claridad.
- source_word: יַכּוּ
  english_pob_choice: they strike
  chosen_spanish: golpean
  alternatives_spanish:
  - golpearán
  - hierven
  - hieren
  lexicon: HALOT
  rationale: El imperfecto puede leerse con valor presente o futuro. Se eligió un presente vivo en español para reflejar la escena profética inmediata; el matiz futuro queda preservado en la nota.
- source_word: עַל הַלְּחִי
  english_pob_choice: on the cheek
  chosen_spanish: en la mejilla
  alternatives_spanish:
  - en la quijada
  - sobre la mejilla
  lexicon: HALOT
  rationale: לְחִי puede significar mejilla o quijada. ‘Mejilla’ comunica mejor la humillación del golpe en el rostro.
- source_word: שֹׁפֵט יִשְׂרָאֵל
  english_pob_choice: the judge of Israel
  chosen_spanish: el juez de Israel
  alternatives_spanish:
  - el gobernante de Israel
  - el líder de Israel
  lexicon: HALOT
  rationale: Se conserva ‘juez’ de manera directa para no neutralizar el término participial y para mantener la posible resonancia política/judicial del hebreo. El posible alcance de ‘gobernante’ queda como alternativa, no como sustitución.
theological_decisions:
- issue: Identificación del 'juez de Israel'
  english_pob_reading: Render the phrase non-interpretively as 'the judge of Israel' without making an explicit messianic identification in the main text.
  chosen_spanish_reading: Traducir de forma no interpretativa como ‘el juez de Israel’, sin identificarlo explícitamente como el Mesías en el texto principal.
  alternative_spanish_readings:
  - el gobernante de Israel
  - un gobernante mesiánico prefigurado
  rationale: El contexto inmediato habla de humillación del dirigente bajo asedio, pero no lo identifica inequívocamente como el Mesías. Se preserva así la tensión teológica, dejando abierta la lectura cristológica sin imponerla en la traducción principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No hay revisiones posteriores en el paquete; se sigue el pasaje hebreo WLC y el registro auditado en inglés, sin cambios respecto al último pase.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conservó la metáfora hebrea ‘hija de tropas’ en vez de reemplazarla por una paráfrasis explicativa.
  - Se evitó ‘Cristo’ en el texto principal para no resolver la tensión mesiánica que el audit trail deja abierta.
  - Se usó un presente narrativo/profético en ‘golpean’ para mantener viveza sin perder la posibilidad de futuro indicada en la nota.
  - La puntuación y el orden responden al español natural, pero el paralelismo interno del hebreo queda visible.
