translation:
  language: es
  text: Sacúdete del polvo; levántate, siéntate[a], Jerusalén. Suelta las ataduras de tu cuello[b], cautiva hija de Sion[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice simplemente «siéntate». El contexto sugiere restauración de dignidad, pero esa idea no se agrega al verbo en el texto principal.
    reason: theological_note
  - marker: b
    text: La forma hebrea detrás de «suelta» es difícil e irregular; el sentido probable es «desátate» o «sé soltada» de las ataduras de tu cuello.
    reason: textual_variant
  - marker: c
    text: O «hija de Zion».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְנַעֲרִי
  english_pob_choice: Shake yourself
  chosen_spanish: Sacúdete
  alternatives_spanish:
  - Sacúdete a ti misma
  - Sacúdete de encima
  lexicon: HALOT
  rationale: 'El hitpael imperativo femenino singular expresa una acción reflexiva: sacudir(se) el polvo o la humillación adherida. «Sacúdete» conserva esa fuerza reflexiva con español natural y breve.'
- source_word: מֵעָפָר
  english_pob_choice: from the dust
  chosen_spanish: el polvo
  alternatives_spanish:
  - del polvo
  - de la tierra polvorienta
  lexicon: HALOT
  rationale: En español, tras «sacudirse», el complemento directo natural es «el polvo»; la imagen concreta de abatimiento se mantiene sin forzar una preposición redundante.
- source_word: קוּמִי
  english_pob_choice: rise up
  chosen_spanish: levántate
  alternatives_spanish:
  - levántate en pie
  - álzate
  lexicon: HALOT
  rationale: La orden femenina singular de קום pide un mandato claro y natural. «Levántate» comunica el impulso de recuperación y dignidad en español contemporáneo.
- source_word: שְּׁבִי
  english_pob_choice: sit down
  chosen_spanish: siéntate
  alternatives_spanish:
  - siéntate en tu lugar
  - toma asiento
  lexicon: HALOT
  rationale: El hebreo literalmente dice «siéntate». Dado que la revisión del POB retiró una interpretación honorífica no explícita, «siéntate» es la equivalencia más transparente y fiel.
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: Transliteration standard
  rationale: Nombre propio estándar en español bíblico y moderno.
- source_word: התפתחו
  english_pob_choice: Loosen
  chosen_spanish: Suelta
  alternatives_spanish:
  - Desata
  - Afloja
  lexicon: HALOT
  rationale: La forma es irregular y difícil; el sentido contextual apunta a librarse de ataduras. «Suelta» expresa el imperativo de liberar sin sobreespecificar la forma verbal problemática.
- source_word: מוֹסְרֵי
  english_pob_choice: the bonds
  chosen_spanish: las ataduras
  alternatives_spanish:
  - los lazos
  - las ligaduras
  lexicon: HALOT
  rationale: «Ataduras» reproduce bien la idea de restricciones físicas y figuradas, con un español natural y menos técnico que «ligaduras».
- source_word: צַוָּארֵךְ
  english_pob_choice: of your neck
  chosen_spanish: de tu cuello
  alternatives_spanish:
  - de tu cerviz
  - en tu cuello
  lexicon: HALOT
  rationale: La construcción hebrea con sufijo de 2fs se vierte con naturalidad como «de tu cuello»; «cuello» es más idiomático que «cerviz» en español actual.
- source_word: שְׁבִיָּה
  english_pob_choice: captive
  chosen_spanish: cautiva
  alternatives_spanish:
  - prisionera
  - captiva
  lexicon: HALOT
  rationale: Como adjetivo en aposición a «hija de Sion», «cautiva» conserva el matiz de exilio/ser llevada cautiva y suena más natural que el calco «captiva».
- source_word: בַּת צִיּוֹן
  english_pob_choice: daughter Zion
  chosen_spanish: hija de Sion
  alternatives_spanish:
  - Hija de Sion
  - hija de Sion
  lexicon: HALOT
  rationale: La personificación profética se expresa con el giro tradicional «hija de Sion», ampliamente inteligible en español y fiel al constructo hebreo.
theological_decisions:
- issue: Valor contextual de שְּׁבִי en la secuencia de humillación y restauración
  english_pob_reading: The POB briefly interpreted the verb as 'sit enthroned' but then revised to the literal 'sit down' because the source says simply 'sit' and does not explicitly include 'enthroned.'
  chosen_spanish_reading: siéntate
  alternative_spanish_readings:
  - siéntate en un lugar de honor
  - siéntate entronizada
  rationale: Para no introducir un matiz de entronización no presente en el hebreo, la traducción adopta el sentido literal revisado. El contexto de restauración queda sugerido por la secuencia completa, no añadido por la traducción.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Tratamiento de la forma irregular התפתחו
  english_pob_reading: Translated according to sense as a command to remove neck-bonds without overcommitting to a textual emendation.
  chosen_spanish_reading: Suelta las ataduras de tu cuello
  alternative_spanish_readings:
  - Desátate las ataduras del cuello
  - Que sean soltadas las ataduras de tu cuello
  rationale: 'La versión española mantiene la cautela auditada por el POB: comunica el sentido probable sin resolver de manera dogmática la dificultad morfológica o textual.'
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB para שְּׁבִי, evitando «entronizada» o «siéntate en trono» y manteniendo el valor literal «siéntate». También preserva la cautela del aparato frente a la forma irregular התפתחו, traduciendo por sentido sin emendar el texto. La versión inicial con «siéntate entronizada» se considera una interpretación descartada por la revisión final.
  spanish_consistency_notes:
  - Se emplea «Sion» en la forma usual en español bíblico, coherente con el registro de la obra.
  - Se usa «cautiva» en lugar de «presa» o «prisionera» para mantener el paralelismo poético y el matiz de exilio.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes porque este versículo no contiene el Tetragrámaton ni κύριος.
  - «Levántate» y «siéntate» conservan la alternancia verbal del hebreo sin añadir ornamentación interpretativa.
