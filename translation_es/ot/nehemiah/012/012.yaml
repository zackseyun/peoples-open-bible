translation:
  language: es
  text: 'Y en los días de Joiakim hubo sacerdotes, jefes de las casas paternas[a]: de Seraía, Meraía; de Jeremías, Hananías.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jefes de las casas ancestrales» o «jefes de familia». El modismo hebreo se refiere a líderes de clanes o de casas familiares extensas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בִ/ימֵי
  english_pob_choice: And in the days of
  chosen_spanish: Y en los días de
  alternatives_spanish:
  - Ahora en los días de
  - Durante los días de
  lexicon: HALOT
  rationale: La expresión hebrea introduce un marco temporal narrativo. «Y en los días de» conserva la conexión del relato y refleja bien el giro idiomático en español.
- source_word: יֽוֹיָקִ֔ים
  english_pob_choice: Joiakim
  chosen_spanish: Joiakim
  alternatives_spanish:
  - Jehoiaquim
  lexicon: HALOT
  rationale: Se translitera el nombre propio. «Joiakim» sigue la forma usada para esta figura sacerdotal postexílica y la distingue del rey Jehoiaquim.
- source_word: הָי֥וּ
  english_pob_choice: there were
  chosen_spanish: hubo
  alternatives_spanish:
  - había
  - eran
  lexicon: HALOT
  rationale: El hebreo funciona de manera existencial; «hubo» suena natural en español y presenta la lista de manera adecuada.
- source_word: כֹהֲנִ֖ים
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - sacerdotes (lit. «sacerdotes»)
  - clérigos
  lexicon: HALOT
  rationale: Es el equivalente directo y normal del sustantivo hebreo para los sacerdotes.
- source_word: רָאשֵׁ֣י הָ/אָב֑וֹת
  english_pob_choice: heads of fathers’ houses
  chosen_spanish: cabezas de las casas paternas
  alternatives_spanish:
  - jefes de las casas paternas
  - cabezas de las casas ancestrales
  - jefes de familia
  lexicon: HALOT
  rationale: La imagen hebrea alude a jefes de clanes o casas familiares extensas. «Casas paternas» conserva el paralelismo con el hebreo y el sentido de linaje.
- source_word: לִ/שְׂרָיָ֣ה
  english_pob_choice: of Seraiah
  chosen_spanish: de Seraía
  alternatives_spanish:
  - para Seraía
  - pertenecientes a Seraía
  lexicon: HALOT
  rationale: En esta lista, ל marca la división o casa asociada al nombre siguiente; «de Seraía» refleja mejor esa relación que una paráfrasis más libre.
- source_word: מְרָיָ֔ה
  english_pob_choice: Meraiah
  chosen_spanish: Meraía
  alternatives_spanish:
  - Meraiah
  lexicon: HALOT
  rationale: Transliteración del nombre propio al español con ortografía transparente y legible.
- source_word: לְ/יִרְמְיָ֖ה
  english_pob_choice: of Jeremiah
  chosen_spanish: de Jeremías
  alternatives_spanish:
  - para Jeremías
  - pertenecientes a Jeremías
  lexicon: HALOT
  rationale: Se conserva la relación de pertenencia o adscripción de la casa sacerdotal indicada por ל en el listado.
- source_word: חֲנַנְיָֽה
  english_pob_choice: Hananiah
  chosen_spanish: Hananías
  alternatives_spanish:
  - Hananías
  lexicon: HALOT
  rationale: Transliteración habitual al español del nombre propio.
theological_decisions:
- issue: Valor del sintagma 'cabezas de las casas paternas'
  english_pob_reading: heads of fathers’ houses
  chosen_spanish_reading: cabezas de las casas paternas
  alternative_spanish_readings:
  - jefes de las casas paternas
  - jefes de familia
  rationale: No se suaviza a un término genérico como «jefes de familia» porque el hebreo conserva una estructura clanica específica. La formulación mantiene la tensión entre literalidad e inteligibilidad.
  doctrine_reference: Organización tribal/clánica de Israel; cf. Nm 1:4, 1 Cr 24:31.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que prefirió «of Seraiah, Meraiah; of Jeremiah, Hananiah» para reflejar mejor la lista hebrea. En español, esa relación se expresó con «de» en vez de una construcción más interpretativa, y se evitó traducir mecánicamente como «para».
  spanish_consistency_notes:
  - Se mantuvo un registro formal y bíblico, pero en español natural.
  - Los nombres propios se transliteraron de manera consistente y legible.
  - Se preservó el plural de «días» y la estructura de lista del hebreo.
  - La nota [a] está anclada en el texto y explica la alternativa idiomática sin borrar el sentido clanico.
