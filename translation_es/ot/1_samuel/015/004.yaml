translation:
  language: es
  text: 'Entonces Saúl convocó al pueblo y les pasó revista en Telaim: doscientos mil soldados de a pie[a], y diez mil hombres de Judá.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «con corderos», si בַּטְּלָאִים se toma literalmente y no como el nombre del lugar Telaim.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְשַׁמַּע
  english_pob_choice: summoned
  chosen_spanish: reunió
  alternatives_spanish:
  - convocó
  - llamó a reunir
  lexicon: HALOT
  rationale: El verbo en hifil expresa la acción de convocar o reunir al pueblo para la campaña. 'Reunió' comunica bien la idea de convocatoria militar en español sin sonar forzado; 'convocó' también sería posible, pero 'reunió' conserva con naturalidad el resultado de la acción.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a las tropas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'el pueblo'. Aunque el contexto es militar, la redacción no usa un término explícito para 'ejército'; por eso se preserva 'pueblo'.
- source_word: וַיִּפְקְדֵם
  english_pob_choice: mustered them
  chosen_spanish: los pasó revista
  alternatives_spanish:
  - los numeró
  - los mustró
  lexicon: HALOT
  rationale: En contexto militar, פקד significa revisar o pasar revista a tropas. 'Los pasó revista' expresa esa inspección/muster sin reducirlo a mero conteo, y evita el calco poco natural 'los mustró'.
- source_word: בַּטְּלָאִים
  english_pob_choice: at Telaim
  chosen_spanish: en Telaim
  alternatives_spanish:
  - en los telaos
  - con corderos
  lexicon: HALOT
  rationale: La lectura principal del POB inglés toma la forma como nombre de lugar. En español se mantiene el topónimo 'Telaim'. La preposición 'en' es la más natural para el lugar de la revista.
- source_word: מָאתַיִם אֶלֶף
  english_pob_choice: two hundred thousand
  chosen_spanish: doscientos mil
  alternatives_spanish:
  - doscientas mil
  lexicon: HALOT
  rationale: Construcción numérica directa; en español concuerda con el sustantivo masculino implícito de 'soldados'.
- source_word: רַגְלִי
  english_pob_choice: foot soldiers
  chosen_spanish: soldados de a pie
  alternatives_spanish:
  - infantería
  - soldados a pie
  lexicon: HALOT
  rationale: La expresión hebrea literalmente remite a los que van a pie. 'Soldados de a pie' es clara, digna y conserva la imagen militar sin tecnicismo excesivo.
- source_word: וַעֲשֶׂרֶת אֲלָפִים
  english_pob_choice: and ten thousand
  chosen_spanish: y diez mil
  alternatives_spanish:
  - y diez millares
  lexicon: HALOT
  rationale: Número coordinado sencillo; 'diez mil' es la forma natural en español.
- source_word: אֶת אִישׁ יְהוּדָה
  english_pob_choice: men of Judah
  chosen_spanish: hombres de Judá
  alternatives_spanish:
  - varones de Judá
  - los hombres de Judá
  lexicon: HALOT
  rationale: אִישׁ funciona colectivamente para los miembros de Judá. 'Hombres de Judá' es idiomático y conserva la referencia tribal.
translation_notes:
  revision_awareness: 'Se siguió la lectura principal del POB inglés y del texto hebreo masorético: Telaim como topónimo, con la alternativa literal ''con corderos'' preservada como nota. No se detectaron revisiones posteriores que alteren el sentido.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' cuando aparezca el nombre divino en este proyecto; en este versículo no aparece.
  - Se conserva un registro militar sobrio y natural, evitando 'ejército' porque el hebreo dice 'el pueblo'.
  - La nota alternativa se ancla en el topónimo 'Telaim' para reflejar la ambigüedad del hebreo בַּטְּלָאִים.
