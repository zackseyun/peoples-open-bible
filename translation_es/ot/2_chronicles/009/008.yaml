translation:
  language: es
  text: Bendito sea Yahvé tu Dios[a], que se agradó de ti y te puso en su trono como rey para Yahvé tu Dios. Porque tu Dios amó a Israel para establecerlo[b] para siempre, te hizo rey sobre ellos para administrar justicia y rectitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que Yahvé tu Dios sea bendito».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para establecerlo para siempre», con referencia colectiva a Israel como pueblo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי ... בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Que sea bendito
  - Sea bendito
  lexicon: HALOT
  rationale: La fórmula jussiva con participio de bendición en hebreo se expresa de forma idiomática en español con «Bendito sea», que conserva el valor benedictorio sin sonar forzada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, manteniendo la forma auditada y transparente «Yahvé».
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y
  - Dios tuyo
  lexicon: HALOT
  rationale: La posesión se expresa de manera directa y natural en español con «tu Dios».
- source_word: חָפֵץ בְּךָ
  english_pob_choice: delighted in you
  chosen_spanish: se agradó de ti
  alternatives_spanish:
  - se deleitó en ti
  - tuvo agrado en ti
  lexicon: HALOT
  rationale: El verbo transmite beneplácito o agrado; «se agradó de ti» conserva el matiz evaluativo y resulta natural en español bíblico contemporáneo.
- source_word: לְתִתְּךָ עַל כִּסְאוֹ
  english_pob_choice: set you on his throne
  chosen_spanish: te puso sobre su trono
  alternatives_spanish:
  - te sentó sobre su trono
  - te colocó sobre su trono
  lexicon: HALOT
  rationale: El hebreo indica entronización/nombramiento. «Te puso sobre su trono» mantiene la imagen real y la referencia teológica al trono como perteneciente a Yahvé.
- source_word: לְמֶלֶךְ לַיהוָה אֱלֹהֶיךָ
  english_pob_choice: as king for Yahweh your God
  chosen_spanish: como rey para Yahvé tu Dios
  alternatives_spanish:
  - como rey para Yahvé, tu Dios
  - para ser rey para Yahvé tu Dios
  lexicon: HALOT
  rationale: «Como rey para Yahvé tu Dios» reproduce el valor de finalidad/relación del lamed sin sobreinterpretar el matiz teocrático.
- source_word: בְּאַהֲבַת אֱלֹהֶיךָ אֶת יִשְׂרָאֵל
  english_pob_choice: Because your God loved Israel
  chosen_spanish: Porque tu Dios amó a Israel
  alternatives_spanish:
  - Por el amor de tu Dios a Israel
  - A causa de que tu Dios amó a Israel
  lexicon: HALOT
  rationale: El sustantivo con בְּ expresa aquí relación causal; «Porque tu Dios amó a Israel» es claro y fiel al flujo lógico del hebreo.
- source_word: לְהַעֲמִידוֹ לְעוֹלָם
  english_pob_choice: to establish them forever
  chosen_spanish: para establecerlo para siempre
  alternatives_spanish:
  - para establecerlo eternamente
  - para afirmarlo para siempre
  lexicon: HALOT
  rationale: El sufijo singular de referencia colectiva se mantiene como singular en español para no borrar la forma del original; el antecedente es Israel como pueblo.
- source_word: וַיִּתֶּנְךָ עֲלֵיהֶם לְמֶלֶךְ
  english_pob_choice: he made you king over them
  chosen_spanish: te hizo rey sobre ellos
  alternatives_spanish:
  - te nombró rey sobre ellos
  - te constituyó rey sobre ellos
  lexicon: HALOT
  rationale: En contexto de entronización, «hacer rey» comunica el acto de nombramiento con fidelidad y naturalidad.
- source_word: לַעֲשׂוֹת מִשְׁפָּט וּצְדָקָה
  english_pob_choice: to administer justice and righteousness
  chosen_spanish: para hacer justicia y rectitud
  alternatives_spanish:
  - para ejercer justicia y rectitud
  - para practicar justicia y rectitud
  lexicon: HALOT
  rationale: La pareja hebrea se conserva en español con dos sustantivos distintos. «Rectitud» evita confundir צְדָקָה con un tecnicismo doctrinal no requerido por el contexto.
theological_decisions:
- issue: El trono de Salomón como trono de Yahvé
  english_pob_reading: Rendered as 'his throne,' referring to the LORD's throne, not merely Solomon's royal throne.
  chosen_spanish_reading: «su trono» se entiende como el trono de Yahvé, no solo como el trono dinástico de Salomón.
  alternative_spanish_readings:
  - el trono real
  - su propio trono
  rationale: 'El hebreo y el contexto crónico sostienen la dimensión teológica del reinado: el rey gobierna bajo autoridad divina. Mantener «su trono» preserva esa tensión sin explicitar en exceso.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistent divine kingship language.'
- issue: Referencia colectiva en לְהַעֲמִידוֹ לְעוֹלָם
  english_pob_reading: '''to establish them forever,'' with ''them'' referring to Israel as a collective people.'
  chosen_spanish_reading: El singular «lo» conserva la forma del sufijo hebreo, con referencia colectiva a Israel como pueblo.
  alternative_spanish_readings:
  - para establecerlos para siempre
  - para establecer a Israel para siempre
  rationale: El hebreo usa sufijo singular, aunque el referente sea colectivo. Mantenerlo en singular permite transparencia formal; la colectividad se recupera por el antecedente «Israel».
  doctrine_reference: 'DOCTRINE.md: Preserve source form when meaningful; avoid smoothing away referential tension.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el cierre revisionado del texto inglés: se evitó añadir una idea verbal como «deseó» o «quiso» y se conservó la relación causal/infinita del hebreo con una construcción española igualmente directa. También se mantuvo la lectura teológica del trono como perteneciente a Yahvé.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en coherencia con el estándar del proyecto para el nombre divino.
  - Se prefirió «rectitud» para צְדָקָה, reservando «justicia» para מִשְׁפָּט y conservando la distinción léxica.
  - Se mantuvo el valor de entronización de «te puso sobre su trono» sin reducirlo a mera colocación física.
  - El singular de «lo» en la referencia a Israel preserva la forma del hebreo y queda aclarado en la nota.
  - La fórmula benedictoria se hizo idiomática en español sin perder el tono litúrgico.
