translation:
  language: es
  text: 'Esta es la porción del hombre malvado con Dios[a], y la herencia que los despiadados[b] reciben del Todopoderoso[c]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de Dios», en el sentido de lo que Dios asigna al malvado.
    reason: lexical_alternative
  - marker: b
    text: O «los violentos».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «toman»; se traduce «reciben» porque el contexto habla de una porción o herencia asignada.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Esta
  lexicon: HALOT
  rationale: El demostrativo introduce una afirmación completa; en español conviene suplir el verbo copulativo para una cláusula natural y fiel al sentido del hebreo.
- source_word: חֵלֶק
  english_pob_choice: portion
  chosen_spanish: porción
  alternatives_spanish:
  - parte
  - lote
  - suerte
  lexicon: HALOT
  rationale: «Porción» conserva la idea de una medida asignada o correspondencia de destino, y mantiene el paralelo con «herencia» sin fusionar ambos términos.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - ser humano
  lexicon: HALOT
  rationale: El singular genérico se refleja mejor con «hombre» en un enunciado sapiencial, sin perder el valor representativo del hebreo.
- source_word: רָשָׁע
  english_pob_choice: wicked
  chosen_spanish: malvado
  alternatives_spanish:
  - impío
  - malhechor
  - culpable
  lexicon: HALOT
  rationale: «Malvado» comunica el juicio moral del término en un registro claro y natural para el español bíblico contemporáneo.
- source_word: עִם אֵל
  english_pob_choice: with God
  chosen_spanish: con Dios
  alternatives_spanish:
  - de Dios
  - ante Dios
  lexicon: HALOT
  rationale: Se conserva el valor literal de la preposición «con»; en este contexto puede entenderse idiomáticamente como lo que le corresponde al malvado en relación con Dios, sin borrar la tensión semántica.
- source_word: נַחֲלַת
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - patrimonio
  - posesión
  - heredad
  lexicon: HALOT
  rationale: «Herencia» reproduce bien la idea de una porción recibida o asignada y funciona de manera natural junto a «porción».
- source_word: עָרִיצִים
  english_pob_choice: the ruthless
  chosen_spanish: los violentos
  alternatives_spanish:
  - los crueles
  - los tiranos
  - los despiadados
  lexicon: HALOT
  rationale: La POB inglesa preserva una alternativa léxica a «ruthless»; en español, «violentos» mantiene ese matiz de opresión y fuerza abusiva, y puede ser percibido como la alternativa que la nota inglesa deja abierta.
- source_word: מִשַּׁדַּי
  english_pob_choice: from the Almighty
  chosen_spanish: del Todopoderoso
  alternatives_spanish:
  - de Shaddai
  - del Omnipotente
  lexicon: HALOT
  rationale: Se traduce el título divino por su equivalente semántico, siguiendo el criterio del POB de traducir títulos; «Todopoderoso» es el equivalente bíblico más natural en español.
- source_word: יִקָּחוּ
  english_pob_choice: receive
  chosen_spanish: reciben
  alternatives_spanish:
  - toman
  - recibirán
  lexicon: HALOT
  rationale: Aunque el verbo básico es «tomar», el contexto de porción e herencia pide la idea de recepción de lo asignado; el presente gnómico en español expresa bien la afirmación proverbial.
theological_decisions:
- issue: Sentido idiomático de עִם אֵל
  english_pob_reading: with God may be understood idiomatically as from God in the sense of what God allots to the wicked man.
  chosen_spanish_reading: con Dios puede entenderse idiomáticamente como de parte de Dios, en el sentido de lo que Dios asigna al malvado.
  alternative_spanish_readings:
  - de Dios
  - por Dios
  - ante Dios
  rationale: La traducción principal conserva el hebreo «con Dios», pero la nota explicita que el sentido puede ser distributivo/asignativo, no necesariamente locativo o relacional en sentido estrecho. Así se preserva la tensión documentada por la POB inglesa.
  doctrine_reference: Job 27:13; decisión lexical sobre עִם אֵל en el audit trail
- issue: Naturaleza de שַׁדַּי como título divino
  english_pob_reading: from the Almighty
  chosen_spanish_reading: del Todopoderoso
  alternative_spanish_readings:
  - de Shaddai
  - del Omnipotente
  rationale: Se trata de un título divino traducible, no de un nombre propio transliterado. «Todopoderoso» conserva la fuerza teológica y sigue la política de la POB de traducir títulos.
  doctrine_reference: Translation philosophy §2 (Translate titles; transliterate names)
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés de alta concordancia: no hubo revisiones aplicadas en la versión base y la lectura final mantiene las tres decisiones clave documentadas: el valor idiomático de עִם אֵל, la alternativa léxica para עָרִיצִים y el ajuste contextual de יִקָּחוּ.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל y «Todopoderoso» para שַׁדַּי, sin transliterar títulos.
  - Se evita «SEÑOR» porque el texto no contiene יהוה.
  - «Porción» y «herencia» se distinguen para reflejar dos términos hebreos distintos.
  - La nota a y la traducción principal conservan la tensión entre «con» y «de parte de» sin resolverla por completo en el cuerpo del texto.
