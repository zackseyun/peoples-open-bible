revisions:
- from: ¿Dónde está la guarida de los leones[a], el lugar de pasto de los leoncillos, donde andaban el león y la leona, donde estaba el cachorro del león[b], y nadie los aterraba?
  to: ¿Dónde está la guarida de los leones, el lugar donde se alimentaban[a] los leoncillos, donde andaban el león y la leona, donde estaba el cachorro del león[b], sin que nadie los espantara?
  rationale: Se reubicó la nota [a] en la expresión que realmente comenta, se hizo más natural la frase sobre מִרְעֶה en español, y se suavizó «aterraba» a «espantara» para reflejar mejor וְאֵין מַחֲרִיד sin intensificación innecesaria. También se ajustó la clausura final a una construcción española más fluida y fiel al valor circunstancial del hebreo.
