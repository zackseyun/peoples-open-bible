translation:
  language: es
  text: Los demás hechos de Amasías[a], ¿no están escritos en el Libro de las Crónicas de los reyes de Judá?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los anales de los reyes de Judá'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, las demás de
  alternatives_spanish:
  - Y el resto de
  - As of the rest of
  - Ahora, el resto de
  lexicon: HALOT
  rationale: יֶתֶר expresa 'resto' o 'lo que queda'. En esta fórmula regnal, español natural pide una transición discursiva; 'Ahora' conserva ese enlace, y 'las demás de' refleja el valor de resto sin sonar rígido. Se evita un calco directo que resultaría poco idiomático.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: acciones
  alternatives_spanish:
  - hechos
  - obras
  - asuntos
  - palabras
  lexicon: HALOT
  rationale: En este registro historiográfico, דִּבְרֵי no significa solo 'palabras', sino los hechos y asuntos de un rey. 'Acciones' comunica bien el conjunto de actos históricos y mantiene la fuerza del resumen real.
- source_word: אֲמַצְיָהוּ
  english_pob_choice: Amaziah
  chosen_spanish: Amasías
  alternatives_spanish:
  - Amazías
  - Amasías
  lexicon: Standard biblical name transliteration
  rationale: El nombre propio se adapta a la forma bíblica usual en español, 'Amasías', que es inteligible y tradicional sin perder la identificación del referente.
- source_word: הֲלֹא הֵם כְּתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: ¿no están escritas?
  alternatives_spanish:
  - ¿acaso no están escritas?
  - ¿no se hallan escritas?
  - ¿no han sido escritas?
  lexicon: HALOT
  rationale: La pregunta retórica hebrea espera respuesta afirmativa. '¿No están escritas?' reproduce el valor pasivo y la fórmula archivística de modo natural en español. Se prefiere el plural femenino porque el antecedente implícito en español es 'las acciones'.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el Libro
  alternatives_spanish:
  - en el rollo
  - sobre el libro
  - en el registro
  lexicon: HALOT
  rationale: Aunque עַל es literalmente 'sobre', en este tipo de cita archivística el español natural usa 'en el Libro'. 'Libro' traduce bien סֵפֶר en esta fórmula formal.
- source_word: דִּבְרֵי הַיָּמִים
  english_pob_choice: the Chronicles
  chosen_spanish: de las Crónicas
  alternatives_spanish:
  - de los anales
  - de los registros
  - de la historia
  lexicon: HALOT
  rationale: La expresión designa un registro cronístico real. 'Crónicas' conserva la equivalencia tradicional y el sentido de anales históricos.
- source_word: לְמַלְכֵי יְהוּדָה
  english_pob_choice: of the Kings of Judah
  chosen_spanish: de los reyes de Judá
  alternatives_spanish:
  - para los reyes de Judá
  - perteneciente a los reyes de Judá
  lexicon: HALOT
  rationale: El לְ funciona aquí como relación de pertenencia/título del documento. 'De los reyes de Judá' expresa de forma clara el genitivo del encabezado documental.
translation_notes:
  revision_awareness: Se mantuvo el carácter formulístico de la pregunta retórica hebrea y la referencia archivística al documento real. La redacción española ajusta el antecedente implícito para concordancia natural, sin perder la estructura del original ni la decisión del POB inglés de conservar 'Book of the Chronicles'.
  spanish_consistency_notes:
  - Se usa 'Dios/Yahvé' según corresponda; este versículo no lo requiere.
  - Se preserva el tono historiográfico formal del texto.
  - Se eligió 'Crónicas' como equivalente principal de דִּבְרֵי הַיָּמִים, con nota alternativa que refleja 'anales'.
