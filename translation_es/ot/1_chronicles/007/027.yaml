lexical_decisions:
- source_word: נ֥וֹן
  english_pob_choice: Nun
  chosen_spanish: Nun
  alternatives_spanish:
  - Non
  lexicon: HALOT
  rationale: Es un nombre propio; se translitera de forma estándar al español como «Nun», no se traduce.
- source_word: בְּנ֖/וֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo de él
  lexicon: HALOT
  rationale: La fórmula genealógica hebrea expresa filiación directa. En español, «su hijo» reproduce con naturalidad la relación posesiva sin perder la transparencia estructural.
- source_word: יְהוֹשֻׁ֥עַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Jehosúa
  lexicon: HALOT
  rationale: Nombre propio. En español bíblico la forma asentada y clara es «Josué»; conserva la identificación tradicional del personaje y comunica bien al lector actual.
- source_word: בְּנֽ/וֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo de él
  lexicon: HALOT
  rationale: Se mantiene la repetición del hebreo en la enumeración genealógica, porque señala una línea sucesiva de descendencia.
