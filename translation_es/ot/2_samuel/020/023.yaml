translation:
  language: es
  text: Ahora Joab estaba al mando de todo el ejército de Israel, y Benaías hijo de Joyadá, de los cereteos[a] y de los peleteos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría entenderse «los quereteos». La forma exacta del nombre de este grupo no es segura en la transliteración.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יוֹאָב
  english_pob_choice: Now Joab
  chosen_spanish: Ahora Joab
  alternatives_spanish:
  - Y Joab
  - Joab
  lexicon: HALOT
  rationale: El וְ inicial funciona como transición narrativa en una lista administrativa; en español, «Ahora» comunica bien ese giro de introducción sin perder el valor conjuntivo.
- source_word: אֶל כָּל הַ/צָּבָא יִשְׂרָאֵל
  english_pob_choice: was over all the army of Israel
  chosen_spanish: estaba al mando de todo el ejército de Israel
  alternatives_spanish:
  - estaba sobre todo el ejército de Israel
  - estaba a cargo de todo el ejército de Israel
  lexicon: HALOT
  rationale: La preposición con la fórmula administrativa expresa autoridad/encargo. En español, «estar al mando de» es natural y conserva la idea de supervisión militar; «ejército» traduce צָבָא en este contexto.
- source_word: וּ/בְנָיָה בֶּן יְהוֹיָדָע
  english_pob_choice: and Benaiah son of Jehoiada
  chosen_spanish: y Benaías hijo de Joyadá
  alternatives_spanish:
  - y Benaías el hijo de Joyadá
  - y Benaía hijo de Jehoiadá
  lexicon: HALOT
  rationale: Se conserva la estructura genealógica simple. Se usa la forma castellanizada de los nombres propios para lectura eclesial en español, sin alterar la identificación del original.
- source_word: עַל ה/כרי וְ/עַל הַ/פְּלֵתִי
  english_pob_choice: was over the Cherethites and the Pelethites
  chosen_spanish: estaba al mando de los cereteos y de los peleteos
  alternatives_spanish:
  - estaba al mando de los quereteos y de los peleteos
  - estaba sobre los cereteos y sobre los peleteos
  lexicon: HALOT
  rationale: Se traslada el valor de administración/autoridad de עַל con «al mando de». Para los nombres de grupo, se opta por formas hispanizadas transparentes; esto mantiene la referencia étnica sin forzar transliteraciones inglesas. La vocalización/forma exacta del primer nombre es incierta, por eso la decisión permanece abierta.
theological_decisions:
- issue: Fórmula de autoridad militar y de oficio
  english_pob_reading: was over
  chosen_spanish_reading: estaba al mando de
  alternative_spanish_readings:
  - estaba sobre
  - estaba a cargo de
  rationale: 'No hay una cuestión doctrinal fuerte, pero sí una decisión semántica relevante: el hebreo administrativo indica autoridad institucional. «Al mando de» expresa mejor esa relación funcional que una simple traducción preposicional.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios sustantivos en esta revisión; se mantuvo la lectura administrativa y la única nota textual/lexical relevante sigue siendo la incertidumbre en el nombre del grupo ה/כרי.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se prefirió «estaba al mando de» para conservar el valor de autoridad sin sonar calcado.
  - 'Los nombres propios se adaptaron a una forma española común y legible: Joab, Benaías, Joyadá.'
  - La nota al pie marca solo la incertidumbre del etnónimo, como en el audit trail inglés.
