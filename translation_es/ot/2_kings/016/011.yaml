translation:
  language: es
  text: Entonces Urías el sacerdote construyó el altar[a], conforme a todo lo que el rey Acaz había enviado desde Damasco; así hizo Urías el sacerdote, hasta que el rey Acaz llegó de Damasco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘hizo conforme a ello’. La expresión hebrea ‘así hizo’ subraya que Urías siguió las instrucciones de Acaz con exactitud.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: built
  chosen_spanish: construyó
  alternatives_spanish:
  - edificó
  - levantó
  lexicon: HALOT
  rationale: בנה expresa la acción de construir. 'Construyó' comunica el hecho de forma natural en español sin perder el sentido material del verbo.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote ministro
  - el presbítero
  lexicon: HALOT
  rationale: כֹּהֵן corresponde de manera directa a 'sacerdote'. Se mantiene la repetición con Urias para respetar el énfasis del hebreo.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar de sacrificio
  lexicon: HALOT
  rationale: מִזְבֵּחַ es el término normal para 'altar'. La forma simple es clara y fiel.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - exactamente como
  lexicon: HALOT
  rationale: La construcción expresa conformidad exacta con lo enviado o indicado. 'Conforme a todo lo que' conserva el tono formal sin sonar forzado en español.
- source_word: שָׁלַח
  english_pob_choice: had sent
  chosen_spanish: había enviado
  alternatives_spanish:
  - envió
  lexicon: HALOT
  rationale: El pluscuamperfecto español ayuda a reflejar que el envío del rey antecede a la acción de Urias.
- source_word: מִדַּמֶּשֶׂק
  english_pob_choice: from Damascus
  chosen_spanish: desde Damasco
  alternatives_spanish:
  - de Damasco
  lexicon: HALOT
  rationale: La preposición מִן marca origen. 'Desde Damasco' expresa bien el punto de procedencia y la referencia espacial.
- source_word: כֵּן עָשָׂה
  english_pob_choice: thus ... did
  chosen_spanish: así hizo
  alternatives_spanish:
  - de este modo hizo
  - hizo así
  lexicon: HALOT
  rationale: El hebreo destaca la conformidad con las instrucciones. 'Así hizo' preserva la correspondencia y la repetición enfática del original.
- source_word: עַד בּוֹא
  english_pob_choice: until ... came
  chosen_spanish: hasta que ... vino
  alternatives_spanish:
  - hasta la llegada de
  lexicon: HALOT
  rationale: עַד con בוא marca el límite temporal de la acción. 'Hasta que ... vino' conserva el cierre temporal de manera natural.
- source_word: הַמֶּלֶךְ אָחָז
  english_pob_choice: King Ahaz
  chosen_spanish: el rey Acaz
  alternatives_spanish:
  - Acaz el rey
  lexicon: HALOT
  rationale: En español bíblico natural, 'el rey Acaz' mantiene el orden semítico sin perder claridad, y conserva el título explícito en ambas ocurrencias.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el audit trail en inglés, sin cambios de sentido respecto de la versión base auditada. Se preserva la repetición de 'el sacerdote' y de 'el rey Acaz' para reflejar el énfasis y la estructura del verso.
  spanish_consistency_notes:
  - Se usa 'Urias' sin tilde para mantener la forma usual del nombre en español bíblico y la concordancia interna del proyecto.
  - Se mantiene 'Acaz' como forma española del nombre propio.
  - '''Conforme a todo lo que'' y ''así hizo'' conservan la relación de correspondencia exacta del hebreo sin recurrir a una paráfrasis interpretativa.'
