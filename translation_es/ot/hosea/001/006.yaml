base_translation:
  language: en
  yaml_path: translation/ot/hosea/001/006.yaml
  text: Then she conceived again and bore a daughter[a]. And he said to him, “Call her name Lo-ruhamah, for I will no longer have compassion on the house of Israel[b], that I should ever forgive them.”
  footnotes:
  - marker: a
    text: Lo-ruhamah sounds like 'not shown compassion' or 'no mercy.'
    reason: lexical_alternative
  - marker: b
    text: Or possibly, 'for I will surely take them away.' The Hebrew of the final clause is difficult.
    reason: alternative_reading
