translation:
  language: es
  text: 'Para el director del coro: según La cierva del alba[a]. Salmo de David[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la gacela del alba». La expresión hebrea probablemente nombra una melodía o indicación musical.
    reason: lexical_alternative
  - marker: b
    text: «De David» puede indicar autoría, asociación, colección o dedicación; el hebreo no especifica con mayor precisión.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director de coro
  alternatives_spanish:
  - Al director de coro
  - Para el maestro de música
  lexicon: HALOT
  rationale: En los encabezados de salmos, el término designa al responsable musical o litúrgico. «Director de coro» conserva la función musical y es natural en español; «maestro de música» es posible, pero menos preciso para el encabezado.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - al son de
  - con la melodía de
  - según la melodía de
  lexicon: HALOT
  rationale: Aquí introduce una indicación de melodía o ejecución. «Según» mantiene la ambigüedad útil del hebreo y evita cerrar indebidamente la referencia a una melodía, estilo o indicación musical.
- source_word: אַיֶּלֶת הַשַּׁחַר
  english_pob_choice: The Doe of the Dawn
  chosen_spanish: La cierva del alba
  alternatives_spanish:
  - La gacela del alba
  - La cierva de la aurora
  lexicon: HALOT
  rationale: La expresión probablemente nombra una melodía o indicación musical. «Cierva» comunica mejor en español la imagen del sustantivo femenino que «hind», y «alba» conserva el valor poético de dawn. Se mantiene como título por la sintaxis del encabezado.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Cántico
  lexicon: HALOT
  rationale: En español, en encabezamientos bíblicos, «Salmo» es la forma más natural y fiel. El artículo indefinido puede omitirse por estilo de título sin alterar el sentido.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - para David
  - por David
  - asociado con David
  lexicon: HALOT
  rationale: 'La preposición hebrea permite varias relaciones: autoría, dedicación o asociación. «De David» preserva esa amplitud sin afirmar más de lo que el hebreo especifica. En español, esta forma es la más breve y editorialmente adecuada para un encabezado.'
theological_decisions:
- issue: Naturaleza de אַיֶּלֶת הַשַּׁחַר en el encabezado
  english_pob_reading: Treat as a musical/tune title rather than as part of the psalm body
  chosen_spanish_reading: Tratar la frase como título musical o de melodía, no como parte del cuerpo del salmo
  alternative_spanish_readings:
  - Tomarla como imagen temática del salmo
  - Entenderla como símbolo devocional
  rationale: La sintaxis del superscrito, con עַל, favorece una indicación de melodía o ejecución. Traducirla como título musical preserva la forma literaria y evita imponer una interpretación temática no explicitada por el hebreo.
  doctrine_reference: Principio de primacía del texto original y preservación de ambigüedad genuina
- issue: Alcance de לְדָוִד
  english_pob_reading: Render broadly as association ('of David')
  chosen_spanish_reading: Mantener una asociación amplia con David
  alternative_spanish_readings:
  - Atribución estricta de autoría ('por David')
  - Dedicatoria ('para David')
  rationale: El hebreo no determina de manera cerrada si se trata de autoría, dedicación o pertenencia a una colección. «De David» conserva esa tensión textual y evita resolverla con demasiada precisión.
  doctrine_reference: Principio de conservar tensiones semánticas documentadas
translation_notes:
  revision_awareness: El auditorio inglés corrigió el anclaje de la nota sobre «de David» para que quede al final del encabezado; por eso la nota [b] se coloca sobre «David» y no sobre el título musical. La frase musical conserva una nota alternativa equivalente a la del texto inglés, adaptada al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el tetragrámaton cuando aparezca en otros pasajes, pero en este versículo no hay ocurrencia.
  - «Salmo» se conserva como término técnico estándar en encabezados.
  - La puntuación separa claramente los elementos del superscrito para reflejar la estructura del hebreo.
