translation:
  language: es
  text: 'Sin embargo, los hijos de tu pueblo dicen[a]: «El camino del Señor no es justo», pero su propio camino no es justo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «no es recto» o «no es equitativo» en ambas ocurrencias de «no es justo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמְרוּ
  english_pob_choice: Yet ... say
  chosen_spanish: Sin embargo, ... dicen
  alternatives_spanish:
  - Y ... dicen
  - Pero ... dicen
  lexicon: HALOT
  rationale: La conjunción hebrea con el verbo introduce continuidad con contraste suave. «Sin embargo» expresa mejor el giro adversativo que un simple «y», y mantiene un registro natural y digno en español.
- source_word: בְּנֵי עַמְּךָ
  english_pob_choice: the sons of your people
  chosen_spanish: los hijos de tu pueblo
  alternatives_spanish:
  - tu pueblo
  - los hijos de tu gente
  lexicon: HALOT
  rationale: Se conserva la imagen formal de «hijos»/«sons» sin neutralizarla en «tu pueblo», siguiendo la decisión de no aplanar el hebreo cuando el texto distingue explícitamente a los miembros del pueblo.
- source_word: לֹא יִתָּכֵן
  english_pob_choice: is not just
  chosen_spanish: no es justo
  alternatives_spanish:
  - no es recto
  - no es correcto
  - no es equitativo
  lexicon: HALOT
  rationale: En este contexto forense, «justo» comunica la evaluación moral y legal que el pasaje discute. «Recto» o «correcto» son posibles, pero «justo» preserva mejor el peso de la acusación contra el camino de Yahvé.
- source_word: דֶּרֶךְ אֲדֹנָי
  english_pob_choice: the way of the Lord
  chosen_spanish: el camino de Yahvé
  alternatives_spanish:
  - el camino del Señor
  - el camino de Adonai
  lexicon: HALOT
  rationale: Aunque el texto hebreo dice אֲדֹנָי, el proyecto español pide Yahvé como forma principal para el nombre divino. Se conserva «camino» como metáfora de conducta/gobierno divino, sin sustituirla por una explicación interpretativa.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: HALOT
  rationale: Aquí אֲדֹנָי funciona como título divino referencial. En la política del proyecto, se traduce por «Yahvé» en el texto principal, en lugar de la convención de ocultarlo como «SEÑOR» o de usar «el Señor».
- source_word: וְהֵמָּה
  english_pob_choice: though it is they
  chosen_spanish: aunque el que ... es
  alternatives_spanish:
  - pero ellos
  - mientras que ellos
  lexicon: HALOT
  rationale: 'El pronombre independiente introduce contraste enfático y rebote retórico. En español se expresa haciendo explícita la inversión: la acusación no recae en Dios, sino en ellos mismos.'
- source_word: דַּרְכָּם
  english_pob_choice: their own way
  chosen_spanish: su propio camino
  alternatives_spanish:
  - su camino
  - el camino de ellos
  lexicon: HALOT
  rationale: «Propio» reproduce el contraste enfático del hebreo y evita que la frase quede demasiado general. Así se mantiene la reversión retórica del versículo.
- source_word: לֹא יִתָּכֵן
  english_pob_choice: is not just
  chosen_spanish: no es justo
  alternatives_spanish:
  - no es recto
  - no es correcto
  - no es equitativo
  lexicon: HALOT
  rationale: 'Se repite la misma equivalencia para mantener la simetría del reproche: lo que ellos afirman de Yahvé es exactamente lo que corresponde a su propio camino.'
theological_decisions:
- issue: Tratamiento del nombre divino en אֲדֹנָי
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: El proyecto español exige Yahvé como representación principal del nombre/título divino cuando el hebreo presenta referencia directa a Dios. Aunque la fuente inglesa usa «the Lord», aquí no se sigue la convención litúrgica de enmascaramiento, sino la política transparente del POB español.
  doctrine_reference: Política terminológica del proyecto sobre יהוה / YHWH
- issue: Valor moral de יִתָּכֵן en ambas cláusulas
  english_pob_reading: is not just
  chosen_spanish_reading: no es justo
  alternative_spanish_readings:
  - no es correcto
  - no es recto
  - no es equitativo
  rationale: La pregunta teológica del pasaje es la justicia del proceder divino frente a la acusación humana. «Justo» conserva el énfasis jurídico-moral sin diluirlo en una noción meramente de conveniencia o exactitud.
  doctrine_reference: Justicia / rectitud en contextos proféticos y judiciales
- issue: 'Reversión retórica: el juicio contra Dios recae sobre el acusador'
  english_pob_reading: though it is their own way that is not just
  chosen_spanish_reading: aunque el que no es justo es su propio camino
  alternative_spanish_readings:
  - pero su propio camino no es justo
  - aunque su camino es el que no es justo
  rationale: 'La construcción española mantiene la inversión acusatoria del hebreo: la supuesta injusticia de Yahvé se vuelve sobre el camino de los hijos del pueblo. Se evita suavizar la antítesis para no perder la fuerza profética del reproche.'
  doctrine_reference: Responsabilidad humana y justicia divina en Ezequiel 18–33
translation_notes:
  revision_awareness: 'Se siguió el pasaje con alta concordancia entre la traducción inglesa auditada y la revisión más reciente; no hubo cambios textuales sustantivos en el inglés. La redacción española refleja esa estabilidad y conserva las decisiones léxicas clave: contraste adversativo, paralelismo de «no es justo» y reversión retórica.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el referente divino, conforme al estándar español del proyecto.
  - Se preservó la repetición de «no es justo» para reflejar la simetría del hebreo y del audit trail inglés.
  - Se eligió «hijos de tu pueblo» para conservar la imagen formal del hebreo sin neutralizarla.
  - El registro es bíblico contemporáneo, con puntuación y comillas españolas estándar.
