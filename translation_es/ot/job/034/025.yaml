- from: Por tanto, él reconoce sus obras; los trastorna de noche[a], y quedan aplastados.
  to: Por tanto, él reconoce sus obras; los derriba de noche[a], y quedan aplastados.
  rationale: 'Se reemplaza «trastorna» por «derriba» para reflejar con mayor precisión el sentido de הפך en contexto de juicio: un derrocamiento o volteo de los impíos, no una mera perturbación. La nota al pie se ajusta para concordar con el texto revisado y preservar la alternativa léxica documentada por el POB inglés. No se requiere adjudicación adicional.'
