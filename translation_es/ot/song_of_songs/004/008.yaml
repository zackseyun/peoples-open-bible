base_translation:
  language: en
  yaml_path: translation/ot/song_of_songs/004/008.yaml
  text: Come with me from Lebanon[a], my bride; with me from Lebanon, come. Look from the summit of Amanah, from the summit of Senir and Hermon, from lions’ dens[b], from mountains of leopards.
  footnotes:
  - marker: a
    text: Or 'look down from the summit of Amanah, from the summit of Senir and Hermon.' The Hebrew verb here is difficult and may denote looking out from the mountain heights rather than descending from them.
    reason: lexical_alternative
  - marker: b
    text: Senir is an ancient name for part of the Hermon range.
    reason: cultural_note
