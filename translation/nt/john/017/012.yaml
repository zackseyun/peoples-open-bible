theological_decisions:
- issue: Referent of ᾧ δέδωκάς μοι
  chosen_reading: The relative clause modifies 'your name' ('in your name, which you have given to me').
  alternative_readings:
  - The clause refers to the disciples ('those whom you have given me') via a textual or interpretive adjustment.
  rationale: The transmitted Greek here uses a neuter singular relative pronoun, which most naturally refers to ὀνόματι ('name,' neuter singular), not to αὐτούς ('them,' masculine plural). The translation follows the source text's grammar rather than harmonizing to more familiar Johannine phrasing elsewhere.
  doctrine_reference: Original-language primacy over translation tradition
- issue: Meaning of ὁ υἱὸς τῆς ἀπωλείας
  chosen_reading: A Hebraic idiom indicating one characterized by or destined for destruction, rendered formally as 'the son of destruction.'
  alternative_readings:
  - the son of perdition
  - the one destined for destruction
  rationale: The phrase should not be expanded in the main text into a full doctrinal statement about predestination or reprobation. The formal rendering preserves the idiom and theological tension.
  doctrine_reference: Preserve theological tension rather than resolve it
