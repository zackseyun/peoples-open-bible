translation:
  language: es
  text: Dios entiende su camino[a], y él conoce su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su camino ... su lugar», reflejando la forma gramatical femenina de «sabiduría» en hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dios
  - los dioses
  lexicon: HALOT
  rationale: El hebreo presenta la forma plural morfológica con verbo singular, señalando al Dios único. En español bíblico, «Dios» es la equivalencia natural y conserva el referente singular sin introducir pluralidad indebida.
- source_word: הֵבִין
  english_pob_choice: understands
  chosen_spanish: entiende
  alternatives_spanish:
  - discierne
  - ha entendido
  lexicon: HALOT
  rationale: El hifil de בין expresa comprensión/discernimiento. «Entiende» conserva el valor gnómico y actual del dicho sapiencial, con un español claro y natural.
- source_word: דַּרְכָּהּ
  english_pob_choice: its way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su ruta
  - su manera
  lexicon: HALOT
  rationale: «Camino» mantiene la metáfora hebrea de trayectoria o modo de proceder. Se evita marcar género con «su camino» porque en español la posesión de un sustantivo masculino no obliga a resolver el referente con «su», aunque el antecedente personificado sea femenino en hebreo.
- source_word: וְהוּא
  english_pob_choice: and he
  chosen_spanish: y él
  alternatives_spanish:
  - y él mismo
  - y él también
  lexicon: HALOT
  rationale: La conjunción con pronombre independiente añade énfasis. «Y él» reproduce ese realce de forma natural en español.
- source_word: יָדַע
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  - ha conocido
  lexicon: HALOT
  rationale: Para מקום y este paralelismo poético, «conoce» suena más idiomático que «sabe» en español y conserva la idea de conocimiento pleno y relacional.
- source_word: אֶת מְקוֹמָהּ
  english_pob_choice: its place
  chosen_spanish: su lugar
  alternatives_spanish:
  - su sitio
  - su ubicación
  lexicon: HALOT
  rationale: מקום significa lugar/emplazamiento. «Lugar» es la equivalencia más directa y poética en español; mantiene la imagen espacial del hebreo sin añadir precisión técnica no requerida por el texto.
theological_decisions:
- issue: Referente femenino implícito en los sufijos de «su camino» y «su lugar»
  english_pob_reading: The suffixes refer to wisdom, personified in the surrounding context but rendered with English impersonal pronouns for natural style.
  chosen_spanish_reading: 'Los sufijos remiten a la sabiduría personificada en el contexto, pero en español se la vierte de manera natural con posesivos neutros: «su camino» y «su lugar».'
  alternative_spanish_readings:
  - «su camino[a], y él conoce su lugar» con nota aclaratoria sobre la sabiduría personificada
  - «su camino[a], y ella conoce su lugar»
  rationale: El hebreo de Job 28 personifica la sabiduría con género gramatical femenino. El español puede conservar esa referencia en nota sin forzar en el texto principal un pronombre femenino que, aunque posible, puede sonar menos idiomático y desplazar el énfasis del proverbio.
  doctrine_reference: Translation philosophy §6 (legibilidad moderna) y §5 (excepción documentada y coherencia terminológica)
translation_notes:
  revision_awareness: El texto base inglés fue revisado y quedó sin cambios; esta propuesta sigue el estado final estable (high_agreement, agree) y conserva la alternativa relevante sobre el referente femenino de los sufijos, adaptándola al español.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים conforme al estándar POB y al uso bíblico natural en español.
  - Se evita «SEÑOR» porque el texto hebreo no contiene el tetragrámaton.
  - 'Se conserva el paralelismo poético con dos cláusulas coordinadas: comprensión del camino y conocimiento del lugar.'
  - «Camino» y «lugar» preservan la metáfora espacial sin añadir explicaciones interpretativas al cuerpo del versículo.
