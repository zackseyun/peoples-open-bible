revisions:
- from: Te ruego que tu oído esté atento y tus ojos estén abiertos, para oír la oración de tu siervo, que hoy estoy orando delante de ti, día y noche, por los hijos de Israel, tus siervos[a], y confesando los pecados de los hijos de Israel, que hemos pecado contra ti. Yo y la casa de mi padre hemos pecado.
  to: Te ruego que tu oído esté atento y tus ojos estén abiertos, para oír la oración de tu siervo, que estoy orando delante de ti hoy, día y noche, por los hijos de Israel, tus siervos[a], y confesando los pecados de los hijos de Israel, que hemos pecado contra ti. Aun yo y la casa de mi padre hemos pecado.
  rationale: 'Se hicieron ajustes menores para mejorar fidelidad y naturalidad en español sin cambiar el sentido: se reubicó «hoy» para una sintaxis más fluida y se añadió «Aun» para reflejar el énfasis de וַאֲנִי, en línea con el audit trail en inglés. Se conservan el lenguaje antropomórfico, «hijos de Israel», «siervo» y la nota léxica existente.'
