translation:
  language: es
  text: 'No hablé en secreto[a], en una tierra de oscuridad; no dije a la descendencia de Jacob: «Búsquenme en vano». Yo, Yahvé, hablo justicia[b], declaro lo recto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No hablé en oculto», «No hablé escondidamente». El hebreo בַּסֵּתֶר denota ocultamiento o secreto; la idea es que Yahvé no se reveló de manera clandestina.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «hablo lo que es justo» / «hablo rectitud». צֶדֶק puede abarcar justicia, rectitud o lo justo; aquí se conserva el sustantivo «justicia» por su peso moral y covenantal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַסֵּתֶר
  english_pob_choice: in secret
  chosen_spanish: en secreto
  alternatives_spanish:
  - secretamente
  - en oculto
  lexicon: HALOT
  rationale: סֵתֶר expresa ocultamiento o secreto; «en secreto» es natural en español y conserva el contraste con la revelación pública de Yahvé.
- source_word: דִּבַּרְתִּי
  english_pob_choice: I did speak / I speak
  chosen_spanish: hablé
  alternatives_spanish:
  - he hablado
  - había hablado
  lexicon: HALOT
  rationale: 'El perfectivo hebreo con negación se rinde bien con pasado simple: «No hablé». Mantiene el carácter de declaración histórica o profética.'
- source_word: בִּמְקוֹם אֶרֶץ חֹשֶׁךְ
  english_pob_choice: in a land of darkness
  chosen_spanish: en tierra de oscuridad
  alternatives_spanish:
  - en una tierra oscura
  - en una tierra de tinieblas
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente algo más amplia, pero en español «tierra de oscuridad» conserva el sentido idiomático y la metáfora sin volverse torpe.
- source_word: לְזֶרַע יַעֲקֹב
  english_pob_choice: to the offspring of Jacob
  chosen_spanish: a la descendencia de Jacob
  alternatives_spanish:
  - a los descendientes de Jacob
  - al linaje de Jacob
  lexicon: HALOT
  rationale: זֶרַע funciona aquí como colectivo; «descendencia» mantiene el valor singular-colectivo y suena natural en registro bíblico moderno.
- source_word: תֹּהוּ
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - por nada
  - para nada
  lexicon: HALOT
  rationale: En este contexto תֹהוּ no apunta a caos primordial sino a futilidad. «En vano» reproduce bien la idea de búsqueda inútil o sin provecho.
- source_word: בַקְּשׁוּנִי
  english_pob_choice: Seek me
  chosen_spanish: Búsquenme
  alternatives_spanish:
  - Busquenme
  - Búquenme
  lexicon: HALOT
  rationale: El imperativo plural con sufijo se expresa de forma directa y clara con «Búsquenme».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la convención POB en español para el Tetragrama: «Yahvé», preservando el nombre divino en lugar de sustituirlo por un título.'
- source_word: דֹּבֵר צֶדֶק
  english_pob_choice: speak righteousness
  chosen_spanish: hablo justicia
  alternatives_spanish:
  - hablo rectitud
  - hablo justicia y rectitud
  lexicon: HALOT
  rationale: צֶדֶק admite justicia, rectitud o justicia/rectitud. En español, «hablo justicia» conserva el sustantivo y la fuerza ética/covenantal, como en el audit trail inglés.
- source_word: מַגִּיד מֵישָׁרִים
  english_pob_choice: declaring what is upright
  chosen_spanish: y declaro lo recto
  alternatives_spanish:
  - y anuncio lo recto
  - y declaro lo que es recto
  - y proclamo lo recto
  lexicon: HALOT
  rationale: מֵישָׁרִים se refiere a lo recto/upright. «Lo recto» es idiomático y mantiene el sentido de rectitud moral sin introducir una abstracción innecesaria.
theological_decisions:
- issue: Cómo renderizar la autoafirmación divina final sin suavizar su peso moral
  english_pob_reading: I, Yahweh, speak righteousness, declaring what is upright.
  chosen_spanish_reading: Yo, Yahvé, hablo justicia, y declaro lo recto.
  alternative_spanish_readings:
  - Yo, Yahvé, hablo rectitud, y declaro lo recto.
  - Yo, Yahvé, hablo lo que es justo, y declaro lo recto.
  rationale: El hebreo presenta a Yahvé como revelándose abiertamente y con integridad moral. «Hablo justicia» y «declaro lo recto» conservan la tensión entre declaración ética y fidelidad relacional, sin reducir צֶדֶק a mera legalidad ni mֵישָׁרִים a simple exactitud proposicional.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en vez de resolverla; consistencia de términos clave, salvo excepción documentada.'
translation_notes:
  revision_awareness: 'Sin cambios aplicados respecto del último pase: el acuerdo de revisión fue alto y no se reportaron incidencias. Se mantuvo la equivalencia óptima con preservación del nombre divino, la imagen de secreto/oscuridad y la doble afirmación moral final.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - «Descendencia» conserva el valor colectivo de זֶרַע sin forzar pluralización.
  - «En vano» refleja la noción de תֹהוּ como futilidad, no como caos cosmológico.
  - La pareja «justicia / lo recto» preserva la distinción entre צֶדֶק y מֵישָׁרִים sin borrarla.
