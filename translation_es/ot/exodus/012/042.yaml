review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: noche de שִׁמֻּרִים, dedicada a Yahvé, relacionada con la salida de Egipto, y de observancia continua para los hijos de Israel. También conserva correctamente «Yahvé» y «hijos de Israel». Sin embargo, «por todas sus generaciones» suena menos idiomático y menos preciso que una fórmula española más natural para לְדֹרֹתָם.'
  spanish_quality_summary: El texto es claro y fiel, pero necesita un ajuste menor de naturalidad/idiomaticidad en la cola final. «Para Yahvé para todos...» repite «para» de manera algo pesada, aunque aceptable; el problema principal es «por todas sus generaciones», que en español bíblico moderno se expresa mejor como «a través de sus generaciones» o «por sus generaciones».
  glossary_alignment: 'Buena alineación con el glosario del proyecto: יהוה → «Yahvé», שִׁמֻּרִים → «vigilia», בני ישראל → «hijos de Israel». No hay conflictos teológicos relevantes. La nota léxica sobre שִׁמֻּרִים está bien planteada.'
  issues:
  - severity: medium
    issue: La expresión «por todas sus generaciones» es poco natural para לְדֹרֹתָם.
    rationale: Aunque comprensible, en español suena forzada y no reproduce tan bien la fórmula bíblica de continuidad intergeneracional. «A través de sus generaciones» comunica mejor el sentido de observancia continua.
