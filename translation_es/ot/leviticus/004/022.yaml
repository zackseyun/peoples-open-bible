translation:
  language: es
  text: Cuando un dirigente[a] peca y hace inadvertidamente[b] una de las cosas que Yahvé su Dios ha mandado que no se hagan, y queda culpable[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘príncipe’ o ‘gobernante’. El hebreo נָשִׂיא designa a un líder o jefe reconocido.
    reason: lexical_alternative
  - marker: b
    text: O ‘por error’ o ‘sin darse cuenta’. El hebreo se refiere a una falta no intencional.
    reason: lexical_alternative
  - marker: c
    text: O ‘incurre en culpa’. El hebreo marca el estado resultante de culpabilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשִׂיא
  english_pob_choice: leader
  chosen_spanish: dirigente
  alternatives_spanish:
  - príncipe
  - jefe
  - líder
  lexicon: HALOT
  rationale: En este contexto legal, נָשִׂיא designa a una persona con autoridad reconocida; ‘dirigente’ comunica mejor esa función en español actual que ‘príncipe’, que puede sonar monárquico o demasiado tradicional.
- source_word: יֶחֱטָא
  english_pob_choice: sins
  chosen_spanish: peca
  alternatives_spanish:
  - peque un pecado
  - comete pecado
  lexicon: HALOT
  rationale: El verbo חטא se expresa con el verbo simple ‘pecar’, que preserva la fuerza directa del hebreo sin sobreexplicar.
- source_word: וְעָשָׂה אַחַת מִכָּל
  english_pob_choice: does one of any of the things
  chosen_spanish: hace una de cualquiera de las cosas
  alternatives_spanish:
  - hace una cosa entre todas
  - hace cualquiera de las cosas
  lexicon: HALOT
  rationale: La construcción partitiva se mantiene de forma natural en español. ‘Una de cualquiera de las cosas’ conserva la amplitud de ‘one of any’ sin perder claridad.
- source_word: מִצְוֺת יְהוָה אֱלֹהָיו
  english_pob_choice: the things that Yahweh his God has commanded
  chosen_spanish: las cosas que Yahvé su Dios ha mandado
  alternatives_spanish:
  - los mandamientos de Yahvé su Dios
  - los mandatos de Yahvé su Dios
  lexicon: HALOT
  rationale: El contexto del relativo siguiente (‘que no se hagan’) favorece ‘las cosas que... ha mandado’, siguiendo la solución del POB inglés para evitar forzar ‘mandamientos’ donde el texto destaca acciones prohibidas.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como ‘Yahvé’, conforme al principio del proyecto de no sustituir el Tetragrámaton por un título.
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - el Dios de él
  - su propio Dios
  lexicon: HALOT
  rationale: Se preserva el sufijo posesivo en español con ‘su Dios’, que refleja la relación de pacto y la responsabilidad personal del dirigente.
- source_word: אֲשֶׁר לֹא תֵעָשֶׂינָה
  english_pob_choice: has commanded not to be done
  chosen_spanish: ha mandado que no se hagan
  alternatives_spanish:
  - ha mandado que no se hagan
  - no deben hacerse
  - que no deben ser hechas
  lexicon: HALOT
  rationale: La pasiva/prohibitiva hebrea se vierte con una construcción natural en español. ‘Que no se hagan’ conserva el sentido de acciones prohibidas sin introducir una paráfrasis excesiva.
- source_word: בִּשְׁגָגָה
  english_pob_choice: unintentionally
  chosen_spanish: sin darse cuenta
  alternatives_spanish:
  - inintencionalmente
  - por error
  - por inadvertencia
  lexicon: HALOT
  rationale: ‘Sin darse cuenta’ comunica de manera clara y natural la inadvertencia implícita en שְׁגָגָה. Se evita una formulación técnica que sonaría menos idiomática en español bíblico contemporáneo.
- source_word: וְאָשֵׁם
  english_pob_choice: and becomes guilty
  chosen_spanish: y queda culpable
  alternatives_spanish:
  - y se vuelve culpable
  - y incurre en culpa
  lexicon: HALOT
  rationale: Se mantiene el resultado del acto con una formulación breve y formal. ‘Queda culpable’ expresa el estado resultante sin añadir matices no presentes en el hebreo.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la norma del proyecto de traducir el Tetragrámaton como ‘Yahvé’, preservando el nombre propio revelado de Dios en lugar de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación posesiva en אֱלֹהָיו
  english_pob_reading: his God
  chosen_spanish_reading: su Dios
  alternative_spanish_readings:
  - el Dios de él
  - su propio Dios
  rationale: El posesivo conserva la dimensión de responsabilidad del dirigente ante Dios en un marco de pacto. No se neutraliza la relación personal implícita en el hebreo.
  doctrine_reference: Levitical sacrificial law; covenant accountability
- issue: Valor de שְׁגָגָה
  english_pob_reading: unintentionally
  chosen_spanish_reading: sin darse cuenta
  alternative_spanish_readings:
  - por error
  - por inadvertencia
  - inintencionalmente
  rationale: En la legislación sacrificial, el término apunta a falta no deliberada. La redacción española conserva la distinción entre pecado intencional e inadvertido.
  doctrine_reference: Leviticus 4:2; sacrificial law on inadvertent sin
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente del inglés POB, que suprimió un ‘so’ añadido para dejar una relación resultativa más sobria. En español se reflejó directamente con ‘y queda culpable’, sin intensificador adicional.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ de forma consistente con el estándar del proyecto para יְהוָה.
  - Se prefirió ‘dirigente’ en lugar de ‘príncipe’ para evitar una connotación monárquica no exigida por נָשִׂיא.
  - Se mantuvo una sintaxis relativamente formal y transparente, acorde con la legislación levítica.
  - Los marcadores de nota [a], [b] y [c] corresponden exactamente a las alternativas explicadas en las notas.
