translation:
  language: es
  text: Pueden vivir con nosotros, y la tierra estará delante de ustedes[a]. Establézcanse en ella, comercien en ella, y adquieran propiedades en ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "la tierra estará a disposición de ustedes"; literalmente, "la tierra estará delante de ustedes".'
    reason: lexical_alternative
  - marker: b
    text: 'O: "tomen posesión en ella" o "obtengan tenencia en ella". El hebreo probablemente se refiere a obtener un derecho de propiedad o de tenencia en la tierra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִתָּנוּ תֵּשֵׁבוּ
  english_pob_choice: You may dwell with us
  chosen_spanish: Podréis habitar con nosotros
  alternatives_spanish:
  - podéis habitar con nosotros
  - habitaréis con nosotros
  - podréis vivir con nosotros
  lexicon: HALOT
  rationale: יׁשב expresa habitar, residir o establecerse. "Podréis" comunica aquí la fuerza invitacional/permisiva que el contexto sugiere, y "habitar con nosotros" conserva el sentido residencial sin volverlo coloquial.
- source_word: וְהָאָרֶץ תִּהְיֶה לִפְנֵיכֶם
  english_pob_choice: and the land will be before you
  chosen_spanish: y la tierra estará delante de vosotros
  alternatives_spanish:
  - y la tierra estará ante vosotros
  - y la tierra estará a vuestra disposición
  - y la tierra os será accesible
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice que la tierra estará "delante de" ellos. "Delante de vosotros" mantiene la imagen espacial sin añadir una interpretación que el texto no explicita; en nota puede quedar la idea de disponibilidad.
- source_word: שְׁבוּ
  english_pob_choice: Settle in it
  chosen_spanish: Habitad en ella
  alternatives_spanish:
  - Aposentaos en ella
  - Estableceos en ella
  - Residid en ella
  lexicon: HALOT
  rationale: El imperativo de יָשַׁב puede significar vivir, asentarse o habitar. Dado que la frase anterior ya expresa la invitación a residir con ellos, "Habitad en ella" evita sobretraducir con una idea de colonización que no está en el hebreo.
- source_word: וּסְחָרוּהָ
  english_pob_choice: trade in it
  chosen_spanish: comerciad en ella
  alternatives_spanish:
  - negociad en ella
  - haced comercio en ella
  - traficad en ella
  lexicon: HALOT
  rationale: סחר tiene sentido mercantil. "Comerciad" es una equivalencia natural en español bíblico moderno y conserva claramente la idea de actividad comercial sin añadir matices ajenos.
- source_word: וְהֵאָחֲזוּ בָּהּ
  english_pob_choice: and acquire property in it
  chosen_spanish: y adquirid en ella propiedad
  alternatives_spanish:
  - y tomad posesión de ella
  - y obtened posesión en ella
  - y retened propiedad en ella
  lexicon: HALOT
  rationale: El nifal de אָחַז aquí probablemente apunta a obtener o asegurar un derecho de tenencia/propiedad en la tierra. "Adquirid en ella propiedad" conserva el matiz sociojurídico sin reducirlo a un simple acto físico de agarrar o poseer.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail inglés: se conservó la imagen de la tierra "delante de" ellos, sin añadir "abierta". También se mantuvo la progresión verbal de habitar, asentarse/comerciar y obtener propiedad, evitando paráfrasis más amplias que el original no exige.'
  spanish_consistency_notes:
  - Se emplea "Yahvé" solo cuando aparece el nombre divino; aquí no aplica.
  - Se prefirió "habitar" frente a "vivir" para mantener la resonancia bíblica de יָשַׁב sin sonar arcaico.
  - '"Comerciad" y "propiedad" reflejan el campo semántico socioeconómico del texto; no se sustituyen por fórmulas eclesiásticas tradicionales.'
  - El paralelismo de tres imperativos se preserva en español para reflejar la estructura hebrea.
  - La nota de la tierra delante de vosotros preserva la tensión entre literalidad espacial y disponibilidad implícita sin resolverla por completo en el cuerpo del texto.
