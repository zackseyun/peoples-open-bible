    issue: «vengan» para לְכוּ
    rationale: Aunque el POB inglés eligió «come» por naturalidad idiomática inglesa, en español «vengan» suele implicar movimiento hacia quien habla. El hebreo imperativo de הלך aquí, seguido de cohortativo «y caminemos», funciona como exhortación compartida y se conserva mejor con «vayan» en esta línea, especialmente porque el propio pie de nota mantiene esa alternativa.
