review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido del hebreo: Josué rasga sus vestidos, cae en postración delante del arca de Yahvé, permanece así hasta la tarde junto con los ancianos de Israel, y ellos ponen/echan polvo sobre sus cabezas. También preserva correctamente Yahvé para יְהוָה. Sin embargo, hay dos puntos a ajustar: la nota [a] no corresponde a una alternativa real de «hasta la tarde», sino que crea una nota mal anclada sobre «delante del arca de Yahvé»; y «cayó rostro en tierra» suena algo calcado e incompleto en español natural.'
  spanish_quality_summary: El español es generalmente digno y comprensible, pero «cayó rostro en tierra» resulta menos idiomático que «cayó rostro en tierra» tradicionalmente podría tolerarse; aun así, «cayó postrado rostro en tierra» o «cayó con el rostro en tierra» comunica mejor la postura en español actual sin perder solemnidad. La puntuación con punto y coma funciona, y «rasgó sus vestidos», «ancianos de Israel» y «Yahvé» están bien logrados. La nota cultural [b] es útil y clara.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; no hay otros términos glosarios controvertidos aquí. «Ancianos» para זקני y «arca» para אֲרוֹן son apropiados. «Vestidos» es aceptable por registro, aunque «ropas» también sería posible. No hay conflicto teológico relevante.'
  issues:
  - severity: medium
    issue: La nota [a] está mal justificada y mal ubicada.
    rationale: El texto hebreo no ofrece una alternativa textual equivalente a anclar una nota en «hasta la tarde» con el contenido «O “ante el arca de Yahvé”». Esa nota proviene de una nota inglesa problemática y no debe conservarse así en español, porque confunde al lector y no corresponde a una variante significativa del sentido.
  - severity: medium
    issue: «Cayó rostro en tierra» suena calcado y poco natural en español contemporáneo.
    rationale: Aunque transmite la imagen, omite un enlace idiomático natural. «Cayó postrado rostro en tierra» o «cayó con el rostro en tierra» preserva mejor la fuerza de וַיִּפֹּל עַל־פָּנָיו אַרְצָה con buena legibilidad eclesial.
  - severity: low
    issue: «Echaron polvo» diverge del inglés auditado «put dust», pero sigue siendo fiel al hebreo y natural en español.
    rationale: No es un error de sentido. En español bíblico «echaron polvo sobre sus cabezas» es idiomático y adecuado para el gesto ritual; no requiere cambio forzoso.
