id: PHP.2.18
reference: Philippians 2:18
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τὸ δὲ αὐτὸ καὶ ὑμεῖς χαίρετε καὶ συγχαίρετέ μοι.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/018.yaml
  text: 'In the same way, you also rejoice and rejoice with me.'
translation:
  language: ko
  text: 그와 같이[a] 여러분도 기뻐하고 나와 함께 기뻐하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「마찬가지로 여러분도 기뻐하고 그 기쁨을 나와 함께 나누십시오」.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ...αὐτὸ
  english_pob_choice: In the same way
  chosen_korean: 그와 같이
  alternatives_korean:
  - 마찬가지로
  - 같은 모양으로
  lexicon: BDAG
  rationale: 관용적 부사구로 앞의 바울의 기쁨 호소를 받는다. 한국어 「그와 같이」가 자연스럽게 그 지시 흐름을 보존한다.
- source_word: χαίρετε
  english_pob_choice: rejoice
  chosen_korean: 기뻐하다
  alternatives_korean:
  - 즐거워하다
  lexicon: BDAG
  rationale: 현재 능동 명령형 2인칭 복수. 빌립보서의 「기쁨」 주제를 보존하기 위해 「기뻐하다」를 유지한다.
- source_word: συγχαίρετέ
  english_pob_choice: rejoice with
  chosen_korean: 함께 기뻐하다
  alternatives_korean:
  - 함께 즐거워하다
  - 기쁨을 나누다
  lexicon: BDAG
  rationale: 복합 동사가 공유된 기쁨을 더한다. 「함께 기뻐하다」가 가장 직접적이고 명료하다.
- source_word: μοι
  english_pob_choice: with me
  chosen_korean: 나와
  alternatives_korean:
  - 나와 함께
  lexicon: BDAG
  rationale: 여격 대명사를 한국어 「~와 함께」로 자연스럽게 옮긴다.
