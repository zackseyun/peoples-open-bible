translation:
  language: es
  text: que te condujo por el gran y temible desierto, con serpientes ardientes[a] y escorpiones, y tierra reseca[b] donde no había agua; que hizo brotar para ti agua de la roca de pedernal,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serpientes venenosas». La expresión hebrea tradicionalmente vertida «serpientes ardientes» puede aludir a serpientes cuya mordedura producía una sensación de ardor.
    reason: lexical_alternative
  - marker: b
    text: O «sequía» o «sed». El término hebreo denota una aridez extrema en un lugar sin agua.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמּוֹלִיכֲךָ
  english_pob_choice: who led you
  chosen_spanish: que te condujo
  alternatives_spanish:
  - que te llevó
  - que te iba conduciendo
  lexicon: HALOT
  rationale: El participio hifil con sufijo de segunda persona singular funciona aquí de manera relativa y remite a la acción pasada de Yahvé. «Condujo» conserva el sentido de guiar por el camino y suena natural en español.
- source_word: בַּמִּדְבָּר
  english_pob_choice: through the ... wilderness
  chosen_spanish: por el ... desierto
  alternatives_spanish:
  - en el desierto
  - a través del desierto
  lexicon: HALOT
  rationale: מִדְבָּר puede designar desierto o región inhóspita. «Por» comunica mejor el paso guiado por ese lugar, sin forzar una imagen de arena exclusivamente.
- source_word: הַגָּדֹל וְהַנּוֹרָא
  english_pob_choice: the great and fearsome
  chosen_spanish: el gran y temible
  alternatives_spanish:
  - el grande y terrible
  - el vasto y temible
  lexicon: HALOT
  rationale: Se conserva el par adjetival. «Temible» transmite נוֹרָא como algo que inspira temor reverente o sobrecogimiento, sin cargarlo de arcaísmo.
- source_word: נָחָשׁ שָׂרָף
  english_pob_choice: fiery serpents
  chosen_spanish: serpientes ardientes
  alternatives_spanish:
  - serpientes ígneas
  - serpientes venenosas
  lexicon: HALOT
  rationale: La combinación hebrea describe serpientes asociadas con un efecto ardiente. «Ardientes» mantiene la imagen sin reducirla de entrada a una explicación interpretativa única.
- source_word: וְעַקְרָב
  english_pob_choice: and scorpions
  chosen_spanish: y escorpiones
  alternatives_spanish:
  - y alacranes
  lexicon: HALOT
  rationale: «Escorpiones» es el equivalente más neutro y ampliamente entendible en español bíblico contemporáneo.
- source_word: וְצִמָּאוֹן
  english_pob_choice: and thirsty ground
  chosen_spanish: y con sequedad
  alternatives_spanish:
  - y con sed
  - y con tierra reseca
  - y con desierto seco
  lexicon: HALOT
  rationale: El sustantivo expresa sequedad intensa, aridez o carencia de agua. En español, «sequedad» preserva la fuerza abstracta y permite luego aclarar «donde no había agua».
- source_word: אֲשֶׁר אֵין מָיִם
  english_pob_choice: where there was no water
  chosen_spanish: donde no había agua
  alternatives_spanish:
  - en donde no había agua
  lexicon: HALOT
  rationale: La cláusula relativa se traduce de forma directa y clara, manteniendo la condición del lugar.
- source_word: הַמּוֹצִיא לְךָ מַיִם
  english_pob_choice: who brought out water for you
  chosen_spanish: que sacó para ti agua
  alternatives_spanish:
  - que hizo salir agua para ti
  - que trajo agua para ti
  lexicon: HALOT
  rationale: El hifil de יצא conserva la imagen de hacer salir agua. «Sacó» es natural en español y mantiene la concreción del milagro.
- source_word: מִצּוּר
  english_pob_choice: from the ... rock
  chosen_spanish: de la roca
  alternatives_spanish:
  - de la peña
  - de la peña rocosa
  lexicon: HALOT
  rationale: צוּר puede ser roca, peña o risco. «Roca» es la opción más clara y estable en español.
- source_word: הַחַלָּמִישׁ
  english_pob_choice: flinty
  chosen_spanish: de pedernal
  alternatives_spanish:
  - pedregosa
  - flíntica
  lexicon: HALOT
  rationale: חַלָּמִישׁ se relaciona con pedernal o roca muy dura. «De pedernal» conserva el matiz de dureza extrema que en inglés se expresa con «flinty».
theological_decisions:
- issue: Modo de nombrar al agente divino implícito en el participio
  english_pob_reading: The verse refers to the LORD's past action of leading Israel through the wilderness.
  chosen_spanish_reading: El texto se traduce como acción pasada de Yahvé guiando a Israel por el desierto.
  alternative_spanish_readings:
  - 'un participio presente: «que te conduce»'
  - una formulación impersonal
  rationale: Aunque el hebreo usa participio, el contexto retrospectivo de la exhortación pide un pasado español natural. Se mantiene la referencia a Yahvé sin sustituirla por un título genérico.
  doctrine_reference: 'Deut 8:2-5; POB terminology: Yahvé'
- issue: Naturaleza de las serpientes de fuego
  english_pob_reading: Or 'venomous snakes.' The Hebrew expression traditionally rendered 'fiery serpents' may refer to snakes whose bite caused a burning sensation.
  chosen_spanish_reading: «Serpientes ardientes» preserva la imagen tradicional sin cerrar el sentido a una sola explicación.
  alternative_spanish_readings:
  - «serpientes venenosas»
  - «serpientes de fuego»
  rationale: El hebreo admite la tensión entre una imagen literal de ardor y la posible referencia al efecto de la mordedura. La traducción evita resolverla de modo reductivo.
  doctrine_reference: Hebraísmo semántico; Deut 8:15
- issue: Sentido de צִמָּאוֹן
  english_pob_reading: Or 'drought' or 'thirst.' The Hebrew term denotes parched dryness in a place without water.
  chosen_spanish_reading: «Sequedad» deja abierto el matiz de aridez, sed o sequía.
  alternative_spanish_readings:
  - «sequía»
  - «sed»
  rationale: Como el contexto inmediato ya añade «donde no había agua», «sequedad» funciona como término paraguas y conserva la dureza del paisaje sin exagerar la personificación.
  doctrine_reference: HALOT; contexto poético-narrativo
- issue: Imagen de la roca milagrosa
  english_pob_reading: who brought out water for you from the flinty rock
  chosen_spanish_reading: «de la roca de pedernal» conserva la dureza extrema del término hebreo.
  alternative_spanish_readings:
  - «de la roca flintosa»
  - «de la roca dura como pedernal»
  rationale: La expresión subraya el contraste entre la dureza de la roca y el agua provista por Dios. «Pedernal» es comprensible y refleja la fuerza del original.
  doctrine_reference: Éxodo 17:6; Números 20:11
translation_notes:
  revision_awareness: Se tomó en cuenta el audit trail inglés de la POB y su conclusión de alta concordancia; no hubo revisiones aplicadas en la versión fuente, por lo que la propuesta española sigue de cerca las decisiones léxicas y la nota sobre la tensión semántica de «fiery serpents» y de צִמָּאוֹן.
  spanish_consistency_notes:
  - Se usa «Yahvé» de acuerdo con el estándar del proyecto.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - Se mantiene un registro bíblico contemporáneo, digno y natural.
  - Se conserva la concreción histórica del pasaje sin alegorización.
