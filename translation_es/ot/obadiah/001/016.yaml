translation:
  language: es
  text: Porque, así como ustedes bebieron en mi monte santo, todas las naciones beberán continuamente; beberán y tragarán[a], y serán como si no hubieran sido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «consumirán completamente»; el verbo hebreo puede enfatizar que beben hasta agotarlo. La imagen probablemente alude al juicio divino.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento del juicio anterior. «Porque» comunica bien la relación causal/discursiva en español sin volver el verso artificial.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - de la misma manera que
  lexicon: HALOT
  rationale: Mantiene la comparación explícita entre la acción pasada de Edom y la experiencia futura de las naciones.
- source_word: שְׁתִיתֶם
  english_pob_choice: you drank
  chosen_spanish: ustedes bebieron
  alternatives_spanish:
  - ustedes han bebido
  lexicon: HALOT
  rationale: El perfecto hebreo se rinde naturalmente con pasado simple en un contexto profético. «Bebieron» conserva el hecho histórico/aludido sin sobrecargarlo.
- source_word: עַל הַר קָדְשִׁי
  english_pob_choice: on my holy mountain
  chosen_spanish: sobre mi monte santo
  alternatives_spanish:
  - en mi monte santo
  - en mi monte sagrado
  lexicon: HALOT
  rationale: «Monte santo» es una equivalencia clara y reverente de הַר קָדְשִׁי. «Sobre» conserva el valor locativo del hebreo y la imagen concreta del lugar.
- source_word: יִשְׁתּוּ
  english_pob_choice: will drink
  chosen_spanish: beberán
  alternatives_spanish:
  - habrán de beber
  lexicon: HALOT
  rationale: El imperfecto profético se expresa de manera directa con futuro simple en español.
- source_word: כָל הַגּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - todas las naciones gentiles
  lexicon: HALOT
  rationale: «Naciones» conserva el sentido general de גוים en el contexto profético de juicio, sin imponer un contraste posterior ajeno al pasaje.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - sin cesar
  - de continuo
  lexicon: HALOT
  rationale: Expresa la idea de repetición e intensidad sostenida en un registro natural y formal.
- source_word: וְשָׁתוּ
  english_pob_choice: they will drink
  chosen_spanish: beberán
  alternatives_spanish:
  - y beberán
  lexicon: HALOT
  rationale: Se conserva la repetición verbal del hebreo para mantener la intensificación retórica; en español la coordinación puede quedar implícita sin perder fuerza.
- source_word: וְלָעוּ
  english_pob_choice: swallow
  chosen_spanish: tragarán
  alternatives_spanish:
  - se lo tragarán
  - engullirán
  lexicon: HALOT
  rationale: El verbo hebreo puede enfatizar el consumo completo; «tragarán» es la forma española más sobria y fiel al núcleo léxico, sin exagerar el matiz.
- source_word: וְהָיוּ כְּלֹא הָיוּ
  english_pob_choice: they will be as though they had never been
  chosen_spanish: serán como si no hubieran sido
  alternatives_spanish:
  - serán como si nunca hubieran existido
  - serán como si no hubieran existido
  lexicon: HALOT
  rationale: La frase idiomática expresa desaparición total. «Como si no hubieran sido» conserva la estructura comparativa y la contundencia del hebreo.
theological_decisions:
- issue: La imagen de beber como juicio divino
  english_pob_reading: Metaphor for the nations drinking the cup of divine judgment, in correspondence to Edom's prior revelry/profanation on Zion.
  chosen_spanish_reading: 'Metáfora del juicio divino: las naciones beberán la copa del castigo en correspondencia con la conducta de Edom.'
  alternative_spanish_readings:
  - Imagen literal de beber en el monte santo seguida de ruina literal
  - Imagen más general de destrucción violenta sin referencia a juicio
  rationale: El contexto inmediato de Obadías anuncia juicio contra Edom, y la imaginería profética de beber suele señalar la experiencia del castigo de Dios. El texto principal conserva el verbo literal para no resolver la metáfora en exceso.
  doctrine_reference: Preservar la tensión profética sin deshacer la imagen
- issue: El referente de «ustedes»
  english_pob_reading: Edom, representing those who exulted over Jerusalem's downfall.
  chosen_spanish_reading: Edom, representado por quienes se alegraron de la caída de Jerusalén.
  alternative_spanish_readings:
  - Las naciones colectivamente
  - Judá/Jerusalén tratado irónicamente
  rationale: El contexto inmediato dirige la acusación contra Edom; por eso el pronombre se entiende en ese marco, aunque no se explicita en el cuerpo del verso para no añadir interpretación indebida.
  doctrine_reference: Coherencia contextual del oráculo contra Edom
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que prefirió «swallow» sobre una formulación más marcada, por lo que el español usa «tragarán» como equivalente formal y sobrio. También se conservó la estructura comparativa y la secuencia verbal repetida del hebreo, sin suavizar la intensificación.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no lo contiene explícitamente, por lo que no aparece.
  - Se mantuvo el tono profético y judicial sin introducir glosas explicativas en el texto principal.
  - «Monte santo» y «naciones» siguen la terminología POB para mantener coherencia con otros textos del AT.
