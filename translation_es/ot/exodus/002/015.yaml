translation:
  language: es
  text: Cuando el faraón oyó este asunto[a], procuró matar a Moisés. Pero Moisés huyó del faraón y se quedó en la tierra de Madián, y se sentó junto al pozo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oyó esta cosa» o «se enteró de este incidente».
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa el mismo verbo dos veces («se quedó» / «se sentó»), primero para permanecer en Madián y luego para sentarse físicamente junto al pozo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - se enteró de
  - escuchó
  lexicon: HALOT
  rationale: שׁמע en este contexto comunica que Faraón llegó a conocer el hecho. En español, «oyó» mantiene la correspondencia más directa y natural sin explicitar más de lo que el hebreo dice.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this matter
  chosen_spanish: este asunto
  alternatives_spanish:
  - esta cosa
  - este incidente
  lexicon: HALOT
  rationale: דָּבָר puede referirse a un hecho o asunto reportado. «Este asunto» conserva la amplitud del hebreo y suena natural en español; «incidente» interpretaría más de lo necesario.
- source_word: וַיְבַקֵּשׁ לַהֲרֹג
  english_pob_choice: sought to kill
  chosen_spanish: buscó matar
  alternatives_spanish:
  - trató de matar
  - quiso matar
  lexicon: HALOT
  rationale: בקש + infinitivo expresa intento o búsqueda de realizar una acción. «Buscó matar» preserva esa fuerza de intención/acción sin convertirla en una simple volición.
- source_word: וַיִּבְרַח ... מִפְּנֵי
  english_pob_choice: fled from
  chosen_spanish: huyó de delante de
  alternatives_spanish:
  - huyó de
  - escapó de la presencia de
  lexicon: HALOT
  rationale: La preposición מִפְּנֵי añade la idea de huir de la presencia o delante de alguien. «Huyó de delante de» conserva mejor esa imagen que un simple «huyó de».
- source_word: וַיֵּשֶׁב בְּאֶרֶץ מִדְיָן
  english_pob_choice: stayed in the land of Midian
  chosen_spanish: se quedó en la tierra de Madián
  alternatives_spanish:
  - habitó en la tierra de Madián
  - vivió en la tierra de Madián
  lexicon: HALOT
  rationale: ישׁב puede significar sentarse, residir o permanecer. Dado el ajuste revisado en el inglés POB para no sugerir permanencia más fuerte de la que exige el texto, «se quedó» reproduce bien la idea de permanecer allí sin sobrecargarla.
- source_word: וַיֵּשֶׁב עַל הַבְּאֵר
  english_pob_choice: he sat down by the well
  chosen_spanish: se sentó junto al pozo
  alternatives_spanish:
  - se sentó junto al manantial
  - se quedó junto al pozo
  lexicon: HALOT
  rationale: El segundo יָשַׁב vuelve al sentido concreto de sentarse. «Junto al pozo» expresa de forma idiomática el valor de עַל en este contexto narrativo sin perder la referencia espacial.
- source_word: הַבְּאֵר
  english_pob_choice: the well
  chosen_spanish: el pozo
  alternatives_spanish:
  - el manantial
  - la fuente
  lexicon: HALOT
  rationale: El artículo definido hebreo pide mantener la definitud en español. «Pozo» es la equivalencia más natural y transparente aquí.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: el faraón
  alternatives_spanish:
  - Faraón
  lexicon: Transliteración tradicional del título egipcio en español bíblico.
  rationale: En español bíblico corriente, «faraón» es el equivalente natural del título. Se mantiene en minúscula por tratarse de un uso titular en oración.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moshe
  lexicon: Transliteración tradicional del nombre propio bíblico.
  rationale: Se usa la forma establecida en español para el nombre propio.
theological_decisions:
- issue: Intensidad de la acción expresada por בקש + infinitivo
  english_pob_reading: sought to kill
  chosen_spanish_reading: buscó matar
  alternative_spanish_readings:
  - trató de matar
  - quiso matar
  rationale: No se añade una valoración sobre la legalidad o moralidad del acto; solo se conserva la intención activa que el hebreo expresa mediante בקש + infinitivo. «Buscó matar» mantiene la tensión entre intento y propósito.
  doctrine_reference: Narrativa histórica; no doctrinal
- issue: Valor de וַיֵּשֶׁב en dos ocurrencias distintas
  english_pob_reading: stayed in the land of Midian ... sat down by the well
  chosen_spanish_reading: se quedó en la tierra de Madián ... se sentó junto al pozo
  alternative_spanish_readings:
  - habitó en la tierra de Madián ... se sentó junto al pozo
  - vivió en la tierra de Madián ... se sentó junto al pozo
  rationale: 'Se conserva la distinción semántica observada en el audit trail inglés: la primera ocurrencia indica permanencia/residencia, la segunda un acto físico de sentarse. El español refleja esa diferencia sin uniformarla.'
  doctrine_reference: Narrativa histórica; no doctrinal
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión más reciente del texto inglés POB: se prefirió una formulación más cercana a «heard this matter» y se suavizó la primera ocurrencia de ישׁב de «settled» a «stayed» para no implicar permanencia fuerte. Por eso el español usa «oyó este asunto» y «se quedó en la tierra de Madián», manteniendo la misma cautela semántica.'
  spanish_consistency_notes:
  - Se emplea «faraón» en minúscula por ser título dentro de la oración, alineado con el uso bíblico en español.
  - Se conserva «Madián» como forma estándar del topónimo en español.
  - «Pozo» traduce el sustantivo definido con naturalidad; no se añade artículo o calificación extra.
  - La doble ocurrencia de ישׁב queda diferenciada en español mediante «se quedó» / «se sentó», evitando borrar la variación lexical del hebreo.
