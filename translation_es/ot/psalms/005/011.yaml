revisions:
- from: Decláralos culpables[a], oh Dios; que caigan por sus propios consejos. Ahuyéntalos[b] por la multitud de sus transgresiones, porque se han rebelado contra ti.
  to: Decláralos culpables[a], oh, Dios; que caigan por sus propios consejos. Expúlsalos[b] por la multitud de sus transgresiones, porque se han rebelado contra ti.
  rationale: Se conserva la estructura y el sentido del borrador, pero se corrige הַדִּיחֵמוֹ con «Expúlsalos», que transmite mejor la idea de echar fuera o excluir. También se repara la nota alternativa no idiomática y se ajusta levemente la puntuación del vocativo para mayor naturalidad en español.
