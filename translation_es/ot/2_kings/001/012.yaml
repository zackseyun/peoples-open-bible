translation:
  language: es
  text: 'Elías respondió y les dijo[a]: «Si yo soy un hombre de Dios[b], descienda fuego desde el cielo y te consuma a ti y a tus cincuenta[c]». Entonces descendió fuego de Dios[d] desde el cielo y lo consumió, a él y a sus cincuenta[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y les habló».
    reason: lexical_alternative
  - marker: b
    text: O «si yo soy el hombre de Dios».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «tus cincuenta / sus cincuenta», es decir, la compañía de cincuenta hombres del capitán.
    reason: cultural_note
  - marker: d
    text: O «fuego vino de Dios». Hebreo «fuego de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  lexicon: HALOT
  rationale: En narrativa hebrea, ענה introduce una respuesta. En español, «respondió» conserva ese valor dialogal con naturalidad y dignidad.
- source_word: וַיְדַבֵּר אֲלֵיהֶם
  english_pob_choice: and said to them
  chosen_spanish: y les habló
  alternatives_spanish:
  - y les dijo
  lexicon: HALOT
  rationale: La combinación hebrea enfatiza el acto de dirigirse a ellos. «Les habló» evita la repetición enfática de «dijo» y mantiene el movimiento discursivo del texto.
- source_word: אִם אִישׁ הָאֱלֹהִים אָנִי
  english_pob_choice: If I am a man of God
  chosen_spanish: Si yo soy un hombre de Dios
  alternatives_spanish:
  - Si soy un hombre de Dios
  - Si yo soy el hombre de Dios
  lexicon: HALOT
  rationale: La frase funciona de modo predicativo como reivindicación de identidad profética. «Un hombre de Dios» preserva el título sin convertirlo en una fórmula más eclesiástica como «siervo».
- source_word: תֵּרֶד אֵשׁ מִן הַשָּׁמַיִם
  english_pob_choice: let fire come down from heaven
  chosen_spanish: descienda fuego desde el cielo
  alternatives_spanish:
  - que descienda fuego desde el cielo
  - baje fuego del cielo
  lexicon: HALOT
  rationale: El hebreo expresa fuerza jussiva/imprecatoria. «Descienda» reproduce mejor esa fuerza que una simple predicción en indicativo.
- source_word: וְתֹאכַל
  english_pob_choice: and consume
  chosen_spanish: y consuma
  alternatives_spanish:
  - y devore
  - y lo destruya
  lexicon: HALOT
  rationale: Con fuego, אכל conserva la idea de destrucción total. «Consuma» mantiene el paralelismo con la primera mitad del versículo y el sentido de consumición.
- source_word: חֲמִשֶּׁיךָ / חֲמִשָּׁיו
  english_pob_choice: your fifty
  chosen_spanish: tus cincuenta / a sus cincuenta
  alternatives_spanish:
  - tu compañía de cincuenta
  - sus cincuenta hombres
  lexicon: HALOT
  rationale: La expresión hebrea es abreviada y militar. La versión española conserva la tersura del original; el referente de la tropa queda claro por el contexto.
- source_word: וַתֵּרֶד אֵשׁ אֱלֹהִים
  english_pob_choice: Then fire came down from heaven
  chosen_spanish: Entonces descendió fuego de Dios
  alternatives_spanish:
  - Entonces descendió fuego desde Dios
  - Entonces bajó fuego de Dios
  lexicon: HALOT
  rationale: Se conserva la atribución explícita del hebreo אֵשׁ אֱלֹהִים. «De Dios» refleja con transparencia la relación posesiva/atributiva sin imponer una explicación adicional.
- source_word: וַתֹּאכַל אֹתוֹ וְאֶת חֲמִשָּׁיו
  english_pob_choice: and consumed him and his fifty
  chosen_spanish: y lo consumió a él y a sus cincuenta
  alternatives_spanish:
  - y lo consumió junto con sus cincuenta
  - y consumió al capitán y a sus cincuenta
  lexicon: HALOT
  rationale: Se preserva la referencia al individuo y a la compañía. El pronombre directo evita añadir palabras no presentes en el texto base, aunque «a él y a sus cincuenta» suena algo más pesado en español.
theological_decisions:
- issue: Título profético אִישׁ הָאֱלֹהִים
  english_pob_reading: man of God
  chosen_spanish_reading: hombre de Dios
  alternative_spanish_readings:
  - el hombre de Dios
  rationale: Se conserva el título profético tradicional sin reemplazarlo por terminología clerical posterior. La frase funciona aquí como autoidentificación de autoridad profética.
  doctrine_reference: Translation philosophy §§1, 5
- issue: 'Atribución de la segunda bajada de fuego: אֵשׁ אֱלֹהִים'
  english_pob_reading: Then fire came down from heaven
  chosen_spanish_reading: Entonces descendió fuego de Dios desde el cielo
  alternative_spanish_readings:
  - Entonces descendió fuego del cielo
  - Entonces descendió fuego divino desde el cielo
  rationale: El hebreo marca explícitamente la procedencia/relación con Dios. La lectura elegida no oculta esa atribución, aun cuando la redacción suene más marcada que una versión que solo diga «del cielo».
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'El borrador español sigue el texto hebreo directamente y toma como contexto auditado la evolución inglesa: la primera cláusula mantiene la fórmula narrativa «respondió... y les habló», la escena del fuego conserva la fuerza jussiva de תֵּרֶד/תֹאכַל, y la segunda cláusula retiene la atribución a Dios reflejada en אֵשׁ אֱלֹהִים. Se evita mecanicismo al usar español natural, pero sin borrar la tensión lexical entre «de Dios» y una simple mención del fuego que desciende del cielo.'
  spanish_consistency_notes:
  - Se usa «Dios» de manera consistente para אֱלֹהִים.
  - «Hombre de Dios» preserva el título profético sin sustituirlo por «siervo».
  - «Descienda»/«consuma» conserva el valor volitivo del hebreo.
  - La referencia a «sus cincuenta» mantiene la abreviatura militar del original, como en la tradición auditada en inglés.
