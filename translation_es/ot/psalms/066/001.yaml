- from: Para el director del coro[a]. Cántico, salmo. Griten a Dios[b], toda la tierra.
  to: Para el director del coro[a]. Cántico, salmo. Aclamen a Dios[b], toda la tierra.
  rationale: Se revisa únicamente הָרִיעוּ de «Griten» a «Aclamen» porque en español bíblico y culto «aclamar» expresa mejor una exclamación pública de alabanza dirigida a Dios, mientras que «gritar a Dios» puede sonar tosco o ambiguo. Se conservan la estructura, el alcance universal y las notas de alternativa con ajuste menor para reflejar la opción literal fuerte.
