    text: Or, 'they are no more.' The Hebrew idiom can be rendered more literally this way.
    reason: lexical_alternative
  - marker: b
    text: Or, 'they are taken away' for 'are gathered up.' The Hebrew verb here is rare and its nuance is debated.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'like the head of an ear of grain.'
    reason: cultural_note
