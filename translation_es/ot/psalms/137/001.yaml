  glossary_alignment: 'No hay conflictos con la terminología del proyecto. «Babilonia» y «Sion» están bien. La decisión de usar «junto a» para עַל y «ríos» para נַהֲרוֹת es fiel y natural. La principal corrección léxica requerida es ajustar בְזָכְרֵנוּ a un español temporal más puntual: «cuando recordamos» o «cuando nos acordamos de Sion».'
