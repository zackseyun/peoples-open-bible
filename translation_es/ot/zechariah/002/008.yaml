review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del hebreo: mandato urgente, destinatario específico, y la idea de que Jerusalén quedará sin limitación murada por la gran cantidad de población y ganado. Sin embargo, la nota [a] no preserva una alternativa real del hebreo/POB, porque repite esencialmente el mismo texto en lugar de reflejar la alternativa ligada a תֵשֵׁב/פְּרָזוֹת (''habitará'' / ''como poblados sin murallas''). Además, el marcador [b] está anclado dos veces a dos palabras distintas aunque la nota solo explica אָדָם, no ganado.'
  spanish_quality_summary: 'El español es claro y natural, con tono digno y legible. ''Aquel joven'', ''por la multitud'', y ''dentro de ella'' funcionan bien. La frase ''será habitada como aldeas sin muros'' es comprensible, aunque ''poblados sin murallas'' suena un poco más idiomático y evita una imagen excesivamente literal de varias ''aldeas''. Hay un problema formal de notas: el mismo marcador [b] no debe reutilizarse para dos anclajes distintos.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La elección de 'gente' para אָדָם es defendible en español y coincide con la revisión inglesa hacia 'people'. 'Ganado' para וּבְהֵמָה y 'Jerusalén' están bien. No aparece ninguna cuestión de Yahvé/Mesías/Espíritu/esclavo. La mejora principal es ajustar la alternativa léxica documentada para פְּרָזוֹת/תֵשֵׁב y corregir el uso de notas.
  issues:
  - severity: medium
    issue: La nota [a] no presenta una alternativa significativa.
    rationale: 'El inglés auditado conserva una alternativa real: ''Jerusalem will dwell like unwalled villages''. La nota española actual repite prácticamente la misma redacción principal, por lo que no cumple la función de preservar una opción léxica/documental.'
  - severity: medium
    issue: El marcador [b] se reutiliza en 'gente' y 'ganado'.
    rationale: Las instrucciones exigen marcadores únicos y no reutilizados para notas distintas. Además, la nota [b] solo comenta אָדָם, así que no debe anclarse también a 'ganado'.
  - severity: low
    issue: '''Aldeas sin muros'' es inteligible, pero ''poblados sin murallas'' representa mejor la imagen colectiva de פְּרָזוֹת en español bíblico natural.'
    rationale: No es un error de sentido grave, pero una leve mejora estilística evita la sensación de que Jerusalén se convierte literalmente en varias aldeas; la idea es de asentamiento abierto/no fortificado.
  revised_spanish_text: 'Y le dijo: “Corre, habla a aquel joven, diciendo: ‘Jerusalén será habitada como poblados sin murallas[a], por la multitud de gente[b] y de ganado dentro de ella.’”'
