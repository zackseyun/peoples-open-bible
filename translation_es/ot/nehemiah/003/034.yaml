translation:
  language: es
  text: 'Y dijo delante de sus hermanos y del ejército de Samaria[a]: «¿Qué están haciendo estos judíos débiles? ¿Lo restaurarán para sí mismos? ¿Sacrificarán? ¿Terminarán en un día? ¿Revivirán las piedras de entre los montones de polvo, aunque estén quemadas?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase hebrea es difícil. También puede entenderse «¿Lo reconstruirán por sí mismos?» o, más literalmente, «¿Lo dejarán para sí mismos?».
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי אֶחָיו
  english_pob_choice: before his brothers
  chosen_spanish: delante de sus hermanos
  alternatives_spanish:
  - en presencia de sus hermanos
  - ante sus hermanos
  lexicon: HALOT
  rationale: לִפְנֵי expresa hablar en presencia de alguien. En español, «delante de» conserva esa relación de ubicación/escucha sin forzar una traducción rígida. «Hermanos» sigue literalmente אֶחָיו y mantiene la auditabilidad del hebreo, aunque el contexto político sugiere asociados o compañeros.
- source_word: וְחֵיל שֹׁמְרוֹן
  english_pob_choice: and the army of Samaria
  chosen_spanish: y del ejército de Samaria
  alternatives_spanish:
  - y de la fuerza de Samaria
  - y del host de Samaria
  lexicon: HALOT
  rationale: חֵיל denota fuerza militar, tropas o ejército. «Ejército» es la opción natural y precisa en español para este contexto de burla pública y militar.
- source_word: הָאֲמֵלָלִים
  english_pob_choice: feeble
  chosen_spanish: débiles
  alternatives_spanish:
  - miserables
  - desdichados
  - flacos
  lexicon: HALOT
  rationale: El adjetivo es despectivo y señala debilidad/pobreza de condición. «Débiles» preserva el insulto de manera clara y evita cargar el texto con una emoción no necesaria en este contexto.
- source_word: הֲיַעַזְבוּ לָהֶם
  english_pob_choice: Will they restore it for themselves?
  chosen_spanish: ¿Lo dejarán para sí mismos?
  alternatives_spanish:
  - ¿Lo reconstruirán por sí mismos?
  - ¿Lo dejarán a su cargo?
  - ¿Lo restaurarán para sí mismos?
  lexicon: HALOT
  rationale: עזב es semánticamente difícil aquí; puede significar dejar/abandonar, pero el contexto de reconstrucción ha producido traducciones interpretativas. «Lo dejarán para sí mismos» conserva la ambigüedad del hebreo y refleja la nota auditada del inglés, sin resolver el giro hacia «reconstruir» más allá de lo que el texto exige.
- source_word: הֲיִזְבָּחוּ
  english_pob_choice: Will they sacrifice?
  chosen_spanish: ¿Sacrificarán?
  alternatives_spanish:
  - ¿Ofrecerán sacrificios?
  lexicon: HALOT
  rationale: זבח se refiere al acto sacrificial. El verbo simple «sacrificar» reproduce la rapidez retórica del reproche y mantiene la forma interrogativa breve del original.
- source_word: הַיְכַלּוּ בַיּוֹם
  english_pob_choice: Will they finish in a day?
  chosen_spanish: ¿Terminarán en un día?
  alternatives_spanish:
  - ¿Lo completarán en un día?
  - ¿Podrán terminar en un día?
  lexicon: HALOT
  rationale: כלה en piel significa completar/terminar. «Terminarán» es natural en español y conserva el ritmo de preguntas encadenadas.
- source_word: הַיְחַיּוּ אֶת הָאֲבָנִים
  english_pob_choice: Will they revive the stones
  chosen_spanish: ¿Harán revivir las piedras
  alternatives_spanish:
  - ¿Darían vida a las piedras
  - ¿Restaurarán las piedras
  lexicon: HALOT
  rationale: חיה significa hacer vivir, revivir. «Harán revivir» conserva la imagen viva y la personificación de las piedras, en vez de suavizarla con una paráfrasis más abstracta.
- source_word: מֵעֲרֵמוֹת הֶעָפָר
  english_pob_choice: from the heaps of dust
  chosen_spanish: de entre los montones de polvo
  alternatives_spanish:
  - de los montones de polvo
  - de entre los montones de tierra
  lexicon: HALOT
  rationale: עֲרֵמוֹת son montones o pilas; עָפָר es polvo/tierra suelta. «De entre» ayuda a reflejar el movimiento implícito de sacar algo desde dentro de esos montones, manteniendo la imagen concreta del hebreo.
- source_word: וְהֵמָּה שְׂרוּפוֹת
  english_pob_choice: though they are burned
  chosen_spanish: aunque estén quemadas
  alternatives_spanish:
  - y están quemadas
  - pues están quemadas
  lexicon: HALOT
  rationale: שְׂרוּפוֹת describe el estado de las piedras, dañadas por fuego. «Aunque estén quemadas» comunica bien el matiz adversativo implícito en la burla y su condición lamentable.
translation_notes:
  revision_awareness: Se mantuvo la decisión auditada de la POB inglesa de no suavizar la pregunta difícil הֲיַעַזְבוּ לָהֶם; en español se conservó la ambigüedad con una formulación literal y se marcó con nota la alternativa interpretativa de reconstrucción. También se mantuvo la imagen vívida de «revivir» las piedras y la clausula final adversativa de las piedras quemadas.
  spanish_consistency_notes:
  - Se usó «Yahvé» donde corresponda, pero este versículo no contiene el nombre divino.
  - Se prefirió «ejército» para חֵיל por claridad militar.
  - Se mantuvo «piedras» para אֲבָנִים, sin trasladar a «rubble», para respetar la metáfora auditada del original.
  - La puntuación reproduce el tono de preguntas encadenadas del hebreo y del inglés POB.
