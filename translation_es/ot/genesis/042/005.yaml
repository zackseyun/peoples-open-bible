revisions:
- from: Así que los hijos de Israel vinieron a comprar grano[a] entre los que venían, porque el hambre estaba en la tierra de Canaán.
  to: Los hijos de Israel vinieron a comprar grano[a] entre los que venían, porque había hambruna en la tierra de Canaán.
  rationale: Se elimina «Así que» por innecesario, y se corrige «el hambre estaba» a «había hambruna» para lograr un español natural y representar mejor רָעָב en este contexto. Se mantiene «entre los que venían» como una traducción suficientemente fiel de בְּתוֹךְ הַבָּאִים. La nota se ajusta para coherencia léxica y estilo español.
