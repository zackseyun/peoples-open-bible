id: COL.1.20
reference: Colossians 1:20
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ δι’ αὐτοῦ ἀποκαταλλάξαι τὰ πάντα εἰς αὐτόν, εἰρηνοποιήσας διὰ τοῦ αἵματος τοῦ σταυροῦ αὐτοῦ, ⸂[δι’ αὐτοῦ]⸃ εἴτε τὰ ἐπὶ τῆς γῆς εἴτε τὰ ⸀ἐν τοῖς οὐρανοῖς·
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/020.yaml
  text: and through him to reconcile all things to himself, having made peace through the blood of his cross—through him—whether the things on the earth or the things in the heavens.
translation:
  language: ko
  text: 또한 그분으로 말미암아 만물을 자신과 화목하게 하시기 위함입니다. 그분이 십자가의 피로 평화를 이루셨으니 — 그분으로 말미암아[a] — 땅 위에 있는 것들이든 하늘들[b]에 있는 것들이든 그러합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 일부 사본은 두 번째 「그분으로 말미암아」를 생략한다.
    reason: textual_variant
  - marker: b
    text: 헬라어는 복수형 「하늘들」이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: δι’ αὐτοῦ
  english_pob_choice: through him
  chosen_korean: 그분으로 말미암아
  alternatives_korean:
  - 그분을 통하여
  - 그분에 의해
  lexicon: BDAG
  rationale: 16절과 어휘적 일관성. διά + 속격의 매개적 의미를 보존한다.
- source_word: ἀποκαταλλάξαι
  english_pob_choice: to reconcile
  chosen_korean: 화목하게 하시기
  alternatives_korean:
  - 화해시키기
  - 회복시키기
  lexicon: BDAG
  rationale: 「화목하게 함」은 한국 교회의 정립된 표현이며 관계의 회복을 자연스럽게 담는다.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_korean: 만물
  alternatives_korean:
  - 모든 것
  lexicon: BDAG
  rationale: 16-17절과 어휘적 일관성.
- source_word: εἰς αὐτόν
  english_pob_choice: to himself
  chosen_korean: 자신과
  alternatives_korean:
  - 자신에게로
  - 그분께
  lexicon: BDAG
  rationale: 19절에서 함의된 주어가 하나님(아버지)이므로, 「자신과」 화목하게 하심으로 재귀적 의미를 보존한다.
- source_word: εἰρηνοποιήσας
  english_pob_choice: having made peace
  chosen_korean: 평화를 이루셨으니
  alternatives_korean:
  - 평화를 만드셨고
  - 화평을 이루시고
  lexicon: BDAG
  rationale: 부정과거 분사. 「평화를 이루셨으니」로 인과적·시간적 선행성을 살린다.
- source_word: διὰ τοῦ αἵματος τοῦ σταυροῦ αὐτοῦ
  english_pob_choice: through the blood of his cross
  chosen_korean: 십자가의 피로
  alternatives_korean:
  - 그분의 십자가의 피로
  - 그분의 십자가 피로 말미암아
  lexicon: BDAG
  rationale: 「피」와 「십자가」를 모두 보존한다. 한국어에서는 「그분의」를 생략해도 소속이 자연스럽다.
- source_word: εἴτε τὰ ἐπὶ τῆς γῆς εἴτε τὰ ἐν τοῖς οὐρανοῖς
  english_pob_choice: whether the things on the earth or the things in the heavens
  chosen_korean: 땅 위에 있는 것들이든 하늘들에 있는 것들이든
  alternatives_korean:
  - 땅의 것들이나 하늘의 것들이나
  lexicon: BDAG
  rationale: 16절과 어휘적 일관성. 복수 「하늘들」 보존.
theological_decisions:
- issue: 화목의 범위(τὰ πάντα)
  chosen_reading: 「만물」(우주적 범위를 좁히지 않음)
  alternative_readings:
  - 모든 사람
  - 보편 구원
  rationale: 본문은 우주적 화목을 선포하나, 인격적 존재의 최종 구원과의 관계를 좁히지 않는다. 본 번역도 그 신학적 긴장을 해소하지 않는다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: 「피」와 「십자가」의 직역
  chosen_reading: 「십자가의 피」를 직역으로 유지
  alternative_readings:
  - 십자가에서의 죽으심
  rationale: 헬라어는 「피」와 「십자가」를 명시한다. 두 단어 모두 보존하여 속죄의 무게를 살린다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy'
