    issue: '''que vienen a Babilonia'' es poco natural en español en este contexto'
    rationale: El participio hebreo puede preservarse semánticamente sin calcado temporal. En español, el presente relativo aquí sugiere una acción en curso, mientras que el versículo se refiere al grupo ya deportado y cuya restitución se promete.
  - severity: low
    issue: La nota al pie actual repite la misma formulación del texto
    rationale: Una nota de alternativa debe ofrecer una variante real o explicar la decisión; decir 'O los que vienen a Babilonia' cuando el texto ya dice eso no aporta información útil.
  revised_spanish_text: Y haré volver a este lugar a Jeconías hijo de Joaquim, rey de Judá, y a todos los desterrados[a] de Judá que vinieron a Babilonia, dice Yahvé, porque romperé el yugo del rey de Babilonia.
