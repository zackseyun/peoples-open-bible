theological_decisions:
- issue: Social-ethical force of the marriage clause
  chosen_reading: The warning links pride toward one's kin and people with the choice of taking a wife from among them, without importing a broader doctrinal claim beyond the verse.
  alternative_readings:
  - The clause could be read more narrowly as a command to marry within one's own people.
  - The syntax may be taken as warning against pride in relation to selecting a wife from among one's people.
  rationale: The Greek wording is somewhat compressed. The translation preserves the clause closely and avoids over-resolving whether the main emphasis is endogamy itself or the pride that can distort such a choice.
  doctrine_reference: Preserve theological tension rather than resolve it.
