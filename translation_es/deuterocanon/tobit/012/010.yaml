translation:
  language: es
  text: Pero los que pecan son enemigos de su propia vida[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enemigos de su propia alma». El griego puede entenderse de manera más amplia, pero «vida» es aquí el sentido más llano.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ... ἁμαρτάνοντες
  english_pob_choice: those who sin
  chosen_spanish: los que pecan
  alternatives_spanish:
  - los que están pecando
  - pecadores
  lexicon: BDAG
  rationale: El participio presente con artículo funciona de modo sustantivado. «Los que pecan» conserva el valor verbal y suena natural en español; «pecadores» sería más estático y nominal.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un contraste suave con la afirmación anterior. «Pero» transmite bien ese giro en español sin volverlo demasiado enfático.
- source_word: πολέμιοί
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - hostiles
  - adversarios
  lexicon: LSJ
  rationale: El predicado indica enemistad activa. «Enemigos» es la equivalencia más directa y transparente en español.
- source_word: τῆς ἑαυτῶν ζωῆς
  english_pob_choice: of their own life
  chosen_spanish: de su propia vida
  alternatives_spanish:
  - de su propia alma
  - de sus propias vidas
  - contra sí mismos
  lexicon: BDAG
  rationale: ζωή se entiende aquí en su sentido ordinario de «vida», no como término técnico para «alma». El singular griego se conserva de manera natural en español con «su propia vida».
theological_decisions:
- issue: Sentido de ζωή en un contexto sapiencial-moral
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  - vida espiritual
  rationale: El griego usa ζωή, que normalmente significa «vida». En este contexto expresa que el pecado obra en contra del propio bien y la propia vida, sin obligar a una antropología técnica sobre el alma. Mantener «vida» preserva esa tensión.
  doctrine_reference: 'Principio POB: primacía del original y preservación de tensiones léxicas donde el texto no define un sentido doctrinal más técnico.'
translation_notes:
  revision_awareness: El testigo griego y el contexto del audit trail inglés presentan alta concordancia; no se requieren revisiones textuales ni cambios de sentido respecto del inglés POB, solo ajuste natural al español.
  spanish_consistency_notes:
  - Se mantiene «vida» para ζωή, evitando sustituirla por «alma» sin respaldo explícito del griego.
  - «Los que pecan» conserva la fuerza verbal del participio, en lugar de un sustantivo más fijo como «pecadores».
  - «Pero» refleja el valor contrastivo de δέ sin sobrecargar el tono.
