translation:
  language: es
  text: En el lugar donde degüellan el holocausto[a], degollarán la ofrenda por la culpa, y arrojará su sangre contra el altar, alrededor de este.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «de reparación» o «de compensación». El término hebreo enfatiza tanto la culpa como la restitución.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּמְקוֹם
  english_pob_choice: In the place
  chosen_spanish: En el lugar
  alternatives_spanish:
  - En el sitio
  - En el lugar donde
  lexicon: HALOT
  rationale: מָקוֹם designa un lugar concreto; «en el lugar» conserva la localización precisa del rito y suena natural en español bíblico contemporáneo.
- source_word: אֲשֶׁר
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en que
  - en el cual
  lexicon: HALOT
  rationale: La relativa con antecedente locativo se expresa con naturalidad en español mediante «donde», manteniendo la relación espacial del hebreo.
- source_word: יִשְׁחֲטוּ
  english_pob_choice: they slaughter
  chosen_spanish: degüellan / degollarán
  alternatives_spanish:
  - sacrifican
  - matan
  lexicon: HALOT
  rationale: En contexto sacrificial, שָׁחַט implica un degüello ritual; «degollar» conserva la fuerza concreta y evita suavizar el acto con un término más general.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - la ofrenda del holocausto
  lexicon: HALOT
  rationale: עֹלָה es la ofrenda totalmente consumida por el fuego. «Holocausto» es el equivalente sacrificial tradicional en español y comunica la idea de ofrenda enteramente quemada.
- source_word: הָאָשָׁם
  english_pob_choice: the guilt offering
  chosen_spanish: la ofrenda por la culpa
  alternatives_spanish:
  - la ofrenda de reparación
  - la ofrenda de compensación
  lexicon: HALOT
  rationale: אָשָׁם abarca culpa y reparación/restauración. «Ofrenda por la culpa» mantiene el vínculo con la culpa señalado por el texto, sin perder el carácter sacrificial.
- source_word: דָּמוֹ
  english_pob_choice: its blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - la sangre de ella
  - la sangre de ese sacrificio
  lexicon: HALOT
  rationale: El sufijo posesivo se refiere a la ofrenda por la culpa. «Su sangre» es la forma idiomática y suficientemente precisa en español.
- source_word: יִזְרֹק
  english_pob_choice: he shall splash
  chosen_spanish: rociará
  alternatives_spanish:
  - arrojará
  - esparcirá
  lexicon: HALOT
  rationale: זָרַק describe la aplicación ritual de la sangre. «Rociará» conserva una acción litúrgica visible en español, sin volverla excesivamente técnica o dura.
- source_word: עַל הַמִּזְבֵּחַ
  english_pob_choice: against the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - contra el altar
  - en el altar
  lexicon: HALOT
  rationale: En español, la combinación con «rociar» se expresa de manera natural con «sobre el altar», manteniendo la idea de aplicación sobre su superficie.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en derredor
  - por todos lados
  lexicon: HALOT
  rationale: סָבִיב indica circunferencia o contorno. «Alrededor» es la solución natural y fiel que conserva el efecto distributivo del hebreo.
theological_decisions:
- issue: Renderización de הָעֹלָה
  english_pob_reading: burnt offering
  chosen_spanish_reading: holocausto
  alternative_spanish_readings:
  - ofrenda quemada
  - ofrenda totalmente quemada
  rationale: La instrucción es ritual y técnica; «holocausto» sigue siendo un término bíblico reconocido en español para la עֹלָה, y preserva la categoría sacrificial sin explicarla de más.
  doctrine_reference: Consistencia terminológica de ofrendas sacrificiales (POB §5)
- issue: Valor semántico de אָשָׁם
  english_pob_reading: guilt offering
  chosen_spanish_reading: ofrenda por la culpa
  alternative_spanish_readings:
  - ofrenda de reparación
  - ofrenda de compensación
  rationale: El término hebreo reúne culpa y restitución. «Ofrenda por la culpa» deja visible el componente de culpa documentado en la tradición auditada, mientras que las alternativas reflejan la dimensión reparadora.
  doctrine_reference: Consistencia terminológica de ofrendas sacrificiales (POB §5)
translation_notes:
  revision_awareness: La base inglesa auditada pasó de «on all sides» a «all around» para סָבִיב. La presente redacción sigue esa revisión con «alrededor», manteniendo el sentido distributivo natural en español. También se preservó la distinción cultual entre עֹלָה y אָשָׁם, evitando una paráfrasis que borrara la tensión léxica culpa/reparación.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca aquí explícitamente, sino por la terminología estándar del proyecto cuando el nombre divino surja en el contexto más amplio.
  - «Holocausto» se mantiene por ser el término sacrificial tradicional en español para עֹלָה; no se sustituyó por una paráfrasis más explicativa.
  - «Ofrenda por la culpa» conserva la ambigüedad documentada de אָשָׁם entre culpa y reparación.
  - «Rociará» funciona en español bíblico para la aplicación ritual de la sangre, aunque el inglés auditado prefirió «splash» para marcar la acción concreta.
