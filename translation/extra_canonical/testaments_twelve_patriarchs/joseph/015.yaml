translation:
  text: '4[a]. For she wanted to see me in the desire of sin, but I was ignorant in all these things.


    5. And I said to her, “This is not the custom among the Egyptians, to take what belongs to another before proof is given.”


    6. So I said this concerning the exchange. But the boy ought to be kept confined.


    1[b]. And after twenty-four days the Ishmaelites came, for they had heard that Jacob my father was mourning greatly for me. And when they came they said to me,


    2. “Why did you say that you were a slave? For behold, we have learned that you are the son of a great man in the land of Canaan, and that your father is still mourning for you in sackcloth and ashes.”


    3. When I heard these things, my inward parts were torn apart, and my heart melted, and I wanted very much to weep. But I restrained myself, so that I might not put my brothers to shame. And I said to them, “I do not know; I am a slave.”


    4. Then they took counsel to sell me, so that I might not be found in their hands.


    5. For they feared my father, lest he come and take vengeance on them; for they had heard that he was great before God and men.


    6. Then the trader said to them, “Release me from the judgment of Potiphar.”


    7. And they came near and asked me, saying, “Say that you were bought by us for silver[c][a], and he has us released.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek likely refers broadly to taking what belongs to another; in context this functions as Joseph's moral refusal regarding another man's wife, not merely theft of property.
    reason: lexical_alternative
    anchor_ref: '15:5'
  - marker: b
    text: The wording here is textually difficult. 'Concerning the exchange' and 'the boy ought to be kept shut up' reflect a compressed Greek text with variant readings.
    reason: textual_variant
    anchor_ref: '15:6'
  - marker: a
    text: Some witnesses may imply 'execute vengeance for the danger' or a similar phrase; the Greek is awkward, and the translation preserves the sense of feared retaliation without over-harmonizing.
    reason: textual_variant
    anchor_ref: '15:5'
  - marker: c
    text: That is, the trader asks Joseph to confirm a purchase story so that Potiphar will release those involved.
    reason: cultural_note
    anchor_ref: '15:7'
lexical_decisions:
- source_word: πόθος / ἐν πόθῳ ἁμαρτίας
  chosen: in the desire of sin
  alternatives:
  - with sinful desire
  - in lust for sin
  lexicon: LSJ
  rationale: Retains the morally charged phrasing and the testamentary tone without reducing it to merely sexual language; the Greek is broader than a modern idiom like 'lusted after me,' though that sense is present.
- source_word: ἠγνόουν
  chosen: I was ignorant
  alternatives:
  - I did not understand
  - I was unaware
  lexicon: LSJ
  rationale: Preserves Joseph's claim of innocence and simplicity in a more literal way; 'ignorant' here means inexperienced or unacquainted with such wickedness.
- source_word: τὰ ἀλλότρια
  chosen: what belongs to another
  alternatives:
  - another's property
  - what is another's
  lexicon: LSJ
  rationale: Keeps the ethical force broad enough to include another man's wife, not merely material property.
- source_word: μετάβολος
  chosen: trader
  alternatives:
  - broker
  - dealer
  lexicon: LSJ
  rationale: Best fits the narrative setting of a middleman involved in Joseph's sale and later legal exposure.
- source_word: ἐγκατάκλειστος
  chosen: kept shut up
  alternatives:
  - confined
  - imprisoned
  lexicon: LSJ
  rationale: A natural English rendering that preserves the custodial sense without over-specifying a formal prison term.
- source_word: δοῦλος
  chosen: slave
  alternatives:
  - servant
  lexicon: BDAG
  rationale: Follows project policy where bonded status is salient. In this chapter Joseph's social condition as owned property is central to the scene.
- source_word: διελύθη τὰ σπλάγχνα μου
  chosen: my inward parts were torn apart
  alternatives:
  - my heart was deeply moved
  - my bowels were troubled
  lexicon: LSJ
  rationale: Preserves the visceral Semitic-style emotional expression rather than flattening it into generic sadness.
- source_word: ἐτάκη
  chosen: melted
  alternatives:
  - fainted
  - grew weak
  lexicon: LSJ
  rationale: Maintains the metaphorical intensity of emotional collapse in parallel with the previous clause.
- source_word: ἐπέσχον ἐμαυτόν
  chosen: I restrained myself
  alternatives:
  - I held myself back
  - I controlled myself
  lexicon: LSJ
  rationale: Captures Joseph's deliberate self-mastery, a major virtue theme in this testament.
- source_word: αἰσχύνω
  chosen: put ... to shame
  alternatives:
  - disgrace
  - humiliate
  lexicon: LSJ
  rationale: Keeps the honor-shame dimension explicit and readable.
- source_word: ἐβουλεύσαντο
  chosen: took counsel
  alternatives:
  - plotted
  - decided
  lexicon: LSJ
  rationale: Preserves the deliberative, conspiratorial nuance of the Greek and the elevated register of the testament.
- source_word: ἐκδίκησιν
  chosen: vengeance
  alternatives:
  - revenge
  - punishment
  lexicon: LSJ
  rationale: Best reflects retaliatory justice language in the narrative.
- source_word: παρὰ Θεῷ καὶ ἀνθρώποις
  chosen: before God and men
  alternatives:
  - with God and men
  lexicon: LSJ
  rationale: This is a familiar Greek idiom for standing or reputation; 'before' is idiomatic in English and preserves the public-theological sense.
- source_word: κρίσις
  chosen: judgment
  alternatives:
  - case
  - trial
  lexicon: LSJ
  rationale: Leaves the legal sense somewhat open, which suits the compressed and textually difficult wording.
