translation:
  language: es
  text: Ellos me provocaron celos con lo que no es un dios[a]; me provocaron a ira con sus ídolos. Así que yo les provocaré celos con los que no son un pueblo[c][b]; les provocaré a ira con una nación necia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con sus cosas vanas» o «con sus vanidades»; el término hebreo puede denotar vacío y, en contexto, ídolos.
    reason: lexical_alternative
  - marker: b
    text: O «con un no-pueblo»; el hebreo establece un paralelismo deliberado con «lo que no es un dios».
    reason: lexical_alternative
  - marker: c
    text: «Necia» aquí tiene un sentido moral y espiritual, no meramente intelectual.
    reason: cultural_note
lexical_decisions:
- source_word: קִנְאוּנִי
  english_pob_choice: made me jealous
  chosen_spanish: me provocaron a celos
  alternatives_spanish:
  - me hicieron celoso
  - me movieron a celos
  lexicon: HALOT
  rationale: El verbo expresa el despertar de celos o celo reactivo. «Me provocaron a celos» conserva la reciprocidad con el verbo posterior y suena natural en español bíblico contemporáneo.
- source_word: בְּלֹא אֵל
  english_pob_choice: with what is not a god
  chosen_spanish: con lo que no es un dios
  alternatives_spanish:
  - con un no-dios
  - con aquello que no es Dios
  lexicon: HALOT
  rationale: La construcción hebrea contrapone de forma polémica lo que no es dios frente al Dios verdadero. «Con lo que no es un dios» preserva esa fuerza sin volverla mecánica.
- source_word: כִּעֲסוּנִי
  english_pob_choice: they provoked me to anger
  chosen_spanish: me irritaron
  alternatives_spanish:
  - me provocaron a ira
  - me enojaron
  lexicon: HALOT
  rationale: El verbo causativo puede expresarse como provocar a ira/enojo. «Me irritaron» transmite bien la acción causativa en un español sobrio; la nota conserva la idea de provocación intencional.
- source_word: בְּהַבְלֵיהֶם
  english_pob_choice: with their idols
  chosen_spanish: con sus ídolos
  alternatives_spanish:
  - con sus vanidades
  - con sus cosas vanas
  lexicon: HALOT
  rationale: Aunque el término puede significar vacío, vanidad o cosa vana, en este contexto apunta metonímicamente a ídolos. «Ídolos» comunica el referente claro, mientras la nota preserva la alternativa lexical.
- source_word: אַקְנִיאֵם
  english_pob_choice: I will make them jealous
  chosen_spanish: los provocaré a celos
  alternatives_spanish:
  - los haré celosos
  - los moveré a celos
  lexicon: HALOT
  rationale: Conviene mantener la simetría verbal con la primera línea del versículo. «Los provocaré a celos» reproduce la retribución deliberada del texto.
- source_word: בְּלֹא עָם
  english_pob_choice: with those who are not a people
  chosen_spanish: con los que no son pueblo
  alternatives_spanish:
  - con un no-pueblo
  - con aquellos que no son un pueblo
  lexicon: HALOT
  rationale: La frase conserva el paralelismo con «lo que no es un dios». «Los que no son pueblo» mantiene el impacto retórico sin identificar una nación concreta en el texto principal.
- source_word: בְּגוֹי נָבָל
  english_pob_choice: with a foolish nation
  chosen_spanish: con una nación necia
  alternatives_spanish:
  - con una nación insensata
  - con una nación fútil
  lexicon: HALOT
  rationale: נָבָל aquí no se limita a falta de inteligencia, sino que tiene una carga moral y espiritual. «Necia» comunica esa dimensión con naturalidad en español bíblico.
- source_word: אַכְעִיסֵם
  english_pob_choice: I will provoke them to anger
  chosen_spanish: los irritaré
  alternatives_spanish:
  - los provocaré a ira
  - los enojaré
  lexicon: HALOT
  rationale: El paralelismo con el verbo anterior sugiere una acción causativa semejante. «Los irritaré» es una versión breve y natural; la nota puede preservar la alternativa más explícita.
theological_decisions:
- issue: Referente de «los que no son pueblo» y «nación necia»
  english_pob_reading: Render generically rather than specifying a historical nation in the main text.
  chosen_spanish_reading: Mantenerlo en forma genérica, sin identificar una nación histórica específica en el texto principal.
  alternative_spanish_readings:
  - una nación gentil concreta
  - los gentiles colectivamente
  - una nación innoble
  rationale: El hebreo no identifica a esa nación en este versículo. Conservar la forma genérica preserva la tensión retórica y teológica del pasaje, sin importar una identificación posterior.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla en la traducción.
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: el texto inglés final no requirió cambios y el acuerdo de revisión fue alto. La versión española mantiene esa misma estructura semántica y el paralelismo retórico del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo «celos» para conservar la simetría verbal de קנא en ambas mitades del versículo.
  - Se usó «dios» en minúscula para reflejar el sustantivo común y la polémica contra los ídolos.
  - Se evitó especificar una nación histórica en el texto principal.
  - Se prefirió «írritar/provocar a celos» como equivalentes causativos consistentes con el hebreo.
  - 'La nota de «ídolos» preserva la alternativa semántica de hebel: vacío/vanidad/cosa vana.'
