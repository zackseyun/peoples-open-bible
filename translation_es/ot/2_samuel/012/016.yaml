  yaml_path: translation/ot/2_samuel/012/016.yaml
  text: And David sought God on behalf of the boy[b][a]. David fasted and went in and spent the night lying on the ground.
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'David fasted' or 'David kept a fast.' The Hebrew uses a cognate expression, literally 'fasted a fast,' for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''The boy'' refers to David''s child who was struck with illness (vv. 15, 18). ''The child'' is also a possible rendering of the Hebrew term here.'
    reason: lexical_alternative
