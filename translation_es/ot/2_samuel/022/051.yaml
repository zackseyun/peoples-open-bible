translation:
  language: es
  text: Él da gran salvación a su rey[a] y muestra fidelidad de pacto[b] a su ungido[c], a David y a su descendencia para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «da grandes liberaciones» o «da grandes victorias» a su rey.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «amor leal» o «muestra amor constante». El hebreo suele denotar lealtad amorosa o fidelidad de pacto.'
    reason: lexical_alternative
  - marker: c
    text: «Su ungido» también puede verterse «su Mesías»; aquí se refiere primero a David/el rey davídico, aunque también evoca la promesa mesiánica más amplia.
    reason: alternative_reading
lexical_decisions:
- source_word: מגדיל
  english_pob_choice: gives great
  chosen_spanish: da grandes
  alternatives_spanish:
  - hace grandes
  - engrandece
  lexicon: HALOT
  rationale: El participio causativo de גדל expresa hacer grande o aumentar. En español, "da grandes" con "salvaciones" conserva el sentido idiomático de acciones salvadoras abundantes sin sonar forzado. "Engrandece" sería más literal, pero aquí resulta menos natural con el sustantivo plural.
- source_word: יְשׁוּעוֹת
  english_pob_choice: salvation
  chosen_spanish: salvaciones
  alternatives_spanish:
  - liberaciones
  - victorias
  - salvación
  lexicon: HALOT
  rationale: El plural hebreo permite un valor colectivo de actos de rescate. "Salvaciones" refleja ese plural sin perder la amplitud del término. Se mantiene la tensión entre rescate, liberación y victoria.
- source_word: מַלְכּוֹ
  english_pob_choice: his king
  chosen_spanish: su rey
  alternatives_spanish:
  - su rey ungido
  - su rey escogido
  lexicon: HALOT
  rationale: La construcción posesiva simple comunica la relación de pacto entre Yahvé y el rey davídico. "Su rey ungido" explicaría de más un matiz que aparece en el verso siguiente con מְשִׁיחוֹ.
- source_word: וְעֹשֶׂה חֶסֶד
  english_pob_choice: and shows covenant faithfulness
  chosen_spanish: y muestra fidelidad de pacto
  alternatives_spanish:
  - y muestra amor leal
  - y muestra misericordia fiel
  - y hace misericordia
  lexicon: HALOT
  rationale: חֶסֶד en este marco dinástico no se reduce a emoción afectiva; incluye lealtad pactada. "Fidelidad de pacto" expresa bien esa fuerza relacional y promissoria. "Amor leal" es posible, pero en español puede sonar menos explícito en lo jurídico-covenantal.
- source_word: לִמְשִׁיחוֹ
  english_pob_choice: to his anointed
  chosen_spanish: a su ungido
  alternatives_spanish:
  - a su Mesías
  lexicon: HALOT
  rationale: Se conserva el sentido léxico de "ungido" para el referente histórico inmediato, sin borrar la resonancia mesiánica. En español, "Mesías" en el cuerpo principal podría sobreespecificar el título y debilitar el anclaje davídico del contexto.
- source_word: לְדָוִד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - para David
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar en español bíblico.
- source_word: וּלְזַרְעוֹ
  english_pob_choice: and to his offspring
  chosen_spanish: y a su descendencia
  alternatives_spanish:
  - y a su simiente
  - y a sus descendientes
  lexicon: HALOT
  rationale: '"Descendencia" conserva el valor colectivo y pactal de זֶרַע en español natural y bíblicamente claro. "Simiente" es más literal, pero menos transparente para el lector moderno.'
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por la eternidad
  lexicon: HALOT
  rationale: '"Para siempre" es el equivalente español más claro e idiomático para la duración perpetua del pacto.'
theological_decisions:
- issue: Sentido de חֶסֶד en contexto davídico
  english_pob_reading: covenant faithfulness
  chosen_spanish_reading: fidelidad de pacto
  alternative_spanish_readings:
  - amor leal
  - misericordia fiel
  - bondad pactal
  rationale: El verso culmina el cántico de David subrayando la lealtad de Yahvé a la promesa dinástica. "Fidelidad de pacto" preserva el contenido relacional, legal y promissorio sin diluirlo en una emoción genérica.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Referente de מְשִׁיחוֹ
  english_pob_reading: his anointed
  chosen_spanish_reading: su ungido
  alternative_spanish_readings:
  - su Mesías
  rationale: Se mantiene el referente inmediato a David/la dinastía davídica, dejando intacta la línea de expectativa mesiánica sin resolverla prematuramente en el texto principal.
  doctrine_reference: Translation philosophy §2 (translate titles; transliterate names) and §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Sin cambios necesarios respecto al último pase: la concordancia general fue alta y la revisión más reciente indicó texto sin modificaciones.'
  spanish_consistency_notes:
  - Yahvé se mantiene como forma para el nombre divino según la política general del proyecto, aunque este verso en particular no lo explicite en la superficie española.
  - Se conserva la distinción entre «ungido» como referente histórico inmediato y la resonancia mesiánica, evitando una equivalencia automática con «Mesías» en el cuerpo principal.
  - «Fidelidad de pacto» traduce חסד de manera consistente con su fuerza relacional y promissoria en contexto real davídico.
  - La pluralidad de יְשׁוּעוֹת se refleja con «salvaciones» para no aplanar el hebreo a un singular meramente abstracto.
