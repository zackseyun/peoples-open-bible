translation:
  language: es
  text: Porque mis días se disipan como humo, y mis huesos arden como un brasero[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mis huesos están chamuscados como un tizón», «como un horno» o «como un brasero». El término hebreo para el objeto o lugar de combustión es raro, de modo que la imagen exacta es incierta, aunque el sentido de calor intenso es claro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón del lamento; en español, 'porque' conserva bien la relación causal y suena natural al inicio de un verso poético.
- source_word: כָלוּ
  english_pob_choice: vanish
  chosen_spanish: se disipan
  alternatives_spanish:
  - desaparecen
  - se consumen
  - se extinguen
  lexicon: HALOT
  rationale: El verbo expresa algo que se agota o se desvanece; 'se disipan' mantiene la idea de desaparición gradual asociada al humo sin forzar un sentido demasiado técnico.
- source_word: בְעָשָׁן
  english_pob_choice: like smoke
  chosen_spanish: como humo
  alternatives_spanish:
  - en humo
  - como el humo
  lexicon: HALOT
  rationale: La comparación es clara y natural en español con 'como humo'. Evita la literalidad rígida de 'en humo' y preserva la imagen poética.
- source_word: יָמַי
  english_pob_choice: my days
  chosen_spanish: mis días
  lexicon: HALOT
  rationale: Traducción directa del posesivo de primera persona; conserva el lamento personal del salmista.
- source_word: וְעַצְמוֹתַי
  english_pob_choice: and my bones
  chosen_spanish: y mis huesos
  lexicon: HALOT
  rationale: Mantiene la imagen corporal hebrea sin suavizarla. 'Huesos' en poesía bíblica comunica el sufrimiento profundo físico y emocional.
- source_word: כְּמוֹ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - tal como
  lexicon: HALOT
  rationale: Partícula comparativa estándar; 'como' es la equivalencia más natural y fiel en español.
- source_word: קֵד
  english_pob_choice: a hearth
  chosen_spanish: un brasero
  alternatives_spanish:
  - un horno
  - un hogar
  - un fuego
  lexicon: HALOT
  rationale: El sustantivo es raro y el objeto exacto es incierto. 'Brasero' comunica bien un recipiente o foco de calor intenso en español, manteniendo la incertidumbre del referente con una imagen comprensible.
- source_word: נִחָרוּ
  english_pob_choice: burn
  chosen_spanish: arden
  alternatives_spanish:
  - están quemados
  - están chamuscados
  - se abrasan
  lexicon: HALOT
  rationale: El verbo indica ser quemado, abrasado o chamuscado. 'Arden' es breve, poético y transmite la intensidad del calor sin especificar más de lo que el hebreo exige.
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés coinciden en la imagen general: los días se desvanecen como humo y los huesos sufren calor intenso. La revisión más reciente no introdujo cambios, y la única tensión lexical relevante sigue siendo קֵד, cuyo referente exacto permanece incierto; por eso se conserva la alternativa en nota.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - '''Mis huesos'' se conserva literalmente para respetar la imaginería corporal hebrea.'
  - '''Brasero'' se eligió para reflejar un foco de calor sin decidir de manera innecesaria entre horno, horno pequeño o recipiente de fuego.'
