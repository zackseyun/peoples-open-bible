translation:
  language: es
  text: Permanezco despierto y soy como un ave solitaria[a] sobre un tejado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «como un gorrión solitario sobre un techo». צִפּוֹר es un término general para ave; «gorrión» es una traducción tradicional más específica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁקַדְתִּי
  english_pob_choice: I lie awake
  chosen_spanish: Despierto
  alternatives_spanish:
  - Permanezco despierto
  - No puedo dormir
  - Estoy desvelado
  lexicon: HALOT
  rationale: En este lamento, el verbo expresa vigilia/sueño interrumpido más que vigilancia activa. «Despierto» conserva la fuerza experiencial en español sin volver la frase pesada o demasiado explicativa.
- source_word: וָאֶהְיֶה
  english_pob_choice: and am
  chosen_spanish: y soy
  alternatives_spanish:
  - y estoy
  - y llego a ser
  - y he sido
  lexicon: HALOT
  rationale: La forma con waw continúa la descripción del estado del hablante. «Y soy» mantiene el presente poético del inglés auditado y de manera natural en español.
- source_word: כְּצִפּוֹר
  english_pob_choice: like a ... bird
  chosen_spanish: como un ave
  alternatives_spanish:
  - como un pájaro
  - como un ave pequeña
  - como un gorrión
  lexicon: HALOT
  rationale: צִפּוֹר es un término general para ave/pájaro. «Ave» conserva la amplitud léxica sin cerrar el sentido a una especie específica; la opción tradicional «gorrión» queda como alternativa, no como principal.
- source_word: בּוֹדֵד
  english_pob_choice: solitary
  chosen_spanish: solitaria
  alternatives_spanish:
  - sola
  - aislada
  - solitaria y sola
  lexicon: HALOT
  rationale: El adjetivo describe el estado de estar solo o aislado. «Solitaria» concuerda con «ave» y reproduce el tono poético de soledad sin añadir una carga emocional mayor que la del hebreo.
- source_word: עַל גָּג
  english_pob_choice: on a rooftop
  chosen_spanish: sobre un tejado
  alternatives_spanish:
  - sobre un techo
  - en un tejado
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «sobre un techo/tejado». «Sobre un tejado» es idiomático y fiel en español, y conserva la imagen de exposición e intemperie.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios; el inglés auditado se mantiene estable y con alta concordancia con el texto fuente.
  spanish_consistency_notes:
  - Se mantuvo la imagen concreta del ave sola en lo alto, sin expandir el verso hacia una interpretación emocional ajena al hebreo.
  - Se prefirió un español natural y sobrio, evitando calcos innecesarios, pero conservando la tensión léxica entre el término general para ave y la opción tradicional «gorrión».
