translation:
  language: es
  text: Son más deseables que el oro[a], más aún que mucho oro fino; y más dulces que la miel y la miel que destila del panal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'dignos de ser deseados ... y más dulces que la miel, incluso la miel que destila del panal'. El hebreo emplea formas participiales con frases comparativas, y la expresión final puede traducirse más literalmente como 'miel que gotea de los panales' o 'miel de panales que gotea'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנֶּחֱמָדִים
  english_pob_choice: more desirable
  chosen_spanish: más deseables
  alternatives_spanish:
  - deseables
  - más dignos de desear
  - más apetecibles
  lexicon: HALOT
  rationale: El participio pasivo funciona de modo predicativo con un antecedente implícito del versículo anterior; en español, el comparativo natural conserva la fuerza evaluativa sin volver la frase rígidamente nominal.
- source_word: מִזָּהָב
  english_pob_choice: than gold
  chosen_spanish: que el oro
  alternatives_spanish:
  - que oro
  - más que el oro
  lexicon: HALOT
  rationale: La partícula comparativa exige en español una construcción con 'que'; se mantiene el contraste directo con el metal general.
- source_word: וּמִפַּז רָב
  english_pob_choice: even than much fine gold
  chosen_spanish: sí, que mucho oro fino
  alternatives_spanish:
  - y hasta que mucho oro fino
  - aun que mucho oro refinado
  - y que mucho oro fino
  lexicon: HALOT
  rationale: פַּז expresa oro refinado/puro, y רָב intensifica la cantidad. 'Oro fino' comunica el matiz de refinamiento; 'sí,' ayuda a reproducir el escalón enfático de la comparación.
- source_word: וּמְתוּקִים
  english_pob_choice: and sweeter
  chosen_spanish: y más dulces
  alternatives_spanish:
  - y dulces
  - y más sabrosos
  lexicon: HALOT
  rationale: El adjetivo paralelo requiere en español una comparación explícita para reflejar la fuerza comparativa del hebreo en el contexto inmediato.
- source_word: מִדְּבַשׁ
  english_pob_choice: than honey
  chosen_spanish: que la miel
  alternatives_spanish:
  - que miel
  - más que la miel
  lexicon: HALOT
  rationale: Se conserva la comparación con el término común 'miel', manteniendo el paralelismo con la primera mitad del versículo.
- source_word: וְנֹפֶת צוּפִים
  english_pob_choice: and drippings from the honeycomb
  chosen_spanish: y el goteo de los panales
  alternatives_spanish:
  - y las gotas del panal
  - y la miel que destila del panal
  - y el panal que destila miel
  lexicon: HALOT
  rationale: נֹפֶת sugiere miel que gotea o destila, y צוּפִים remite a panales/celdas. 'Goteo de los panales' preserva la imagen vívida y la especificidad del hebreo sin forzar una equivalencia demasiado interpretativa.
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés, pero ajusta el español a su comparativo natural ('más deseables... más dulces') y conserva la imagen hebrea final con 'goteo de los panales' en lugar de una paráfrasis más genérica.
  spanish_consistency_notes:
  - Se mantuvo 'oro fino' para פַּז, evitando 'refinado' como única opción porque el español bíblico contemporáneo entiende bien el matiz de metal precioso y puro.
  - Se usó 'panales' en plural para reflejar el plural hebreo צוּפִים y la imagen de celdas/combs.
  - No se introdujo 'Cristo', 'SEÑOR' ni terminología no presente en el versículo.
