translation:
  language: es
  text: Me he quitado mi túnica[a]; ¿cómo me la pondré de nuevo? Me he lavado los pies; ¿cómo voy a ensuciarlos?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Me he quitado mi vestido; ¿cómo me lo pondría?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿cómo voy a mancharlos?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּשַׁטְתִּי
  english_pob_choice: I have taken off
  chosen_spanish: Me he quitado
  alternatives_spanish:
  - Me la he sacado
  - Me he desprendido de
  lexicon: HALOT
  rationale: El verbo expresa quitarse o desprenderse una prenda. «Me he quitado» suena natural en español actual y conserva el sentido concreto sin elevarlo innecesariamente a un registro más literario que el hebreo.
- source_word: כֻּתָּנְתִּי
  english_pob_choice: my tunic
  chosen_spanish: mi túnica
  alternatives_spanish:
  - mi vestido
  - mi prenda
  lexicon: HALOT
  rationale: La כֻּתֹּנֶת es una prenda básica del cuerpo; «túnica» es el equivalente más preciso y estable en español bíblico, mejor que «vestido», que puede sugerir otra prenda, o «prenda», demasiado general.
- source_word: אֵיכָכָה
  english_pob_choice: how can I
  chosen_spanish: ¿cómo... ?
  alternatives_spanish:
  - ¿cómo podría... ?
  - ¿de qué manera... ?
  lexicon: HALOT
  rationale: La interrogación comunica objeción práctica o renuencia. En español, «¿cómo me la pondré de nuevo?» reproduce esa fuerza idiomática con naturalidad.
- source_word: אֶלְבָּשֶׁנָּה
  english_pob_choice: put it on again
  chosen_spanish: me la pondré de nuevo
  alternatives_spanish:
  - la volveré a poner
  - me la vestiré de nuevo
  lexicon: HALOT
  rationale: El verbo significa ponerse/vestirse con una prenda; el sufijo femenino retoma la túnica. «Me la pondré de nuevo» hace explícita la repetición implícita y suena idiomático en español.
- source_word: רָחַצְתִּי
  english_pob_choice: I have washed
  chosen_spanish: Me he lavado
  alternatives_spanish:
  - Me lavé
  - He lavado mis pies
  lexicon: HALOT
  rationale: El perfecto hebreo presenta una acción completada con relevancia actual. El pretérito perfecto compuesto español mantiene bien ese valor y conserva la secuencia de excusas.
- source_word: רַגְלַי
  english_pob_choice: my feet
  chosen_spanish: los pies
  alternatives_spanish:
  - mis pies
  - los dos pies
  lexicon: HALOT
  rationale: La forma plural/dual se refiere naturalmente a ambos pies. En español, «los pies» es una referencia clara y fluida; el posesivo puede omitirse sin perder la referencia, apoyado por el verbo reflexivo anterior.
- source_word: אֲטַנְּפֵם
  english_pob_choice: soil them
  chosen_spanish: los ensuciaré
  alternatives_spanish:
  - los mancharé
  - los volveré a ensuciar
  lexicon: HALOT
  rationale: El piel de טנף significa hacer sucio o ensuciar. «Ensuciar» transmite el sentido físico directo y preserva el paralelismo; «manchar» sería posible, pero menos exacto en este contexto doméstico.
theological_decisions:
- issue: Alcance interpretativo del habla de la mujer
  english_pob_reading: Render as a literal domestic objection without importing sexual euphemism into the main text.
  chosen_spanish_reading: Se traduce como una objeción doméstica literal, sin convertir en el texto principal un doble sentido erótico que el hebreo no expresa de manera explícita aquí.
  alternative_spanish_readings:
  - Leer la ropa y los pies principalmente como metáfora erótica
  - Insinuar un tono sexual en la formulación principal
  rationale: 'El contexto inmediato y el léxico son concretos: ropa, pies, lavarse, ensuciarse. La traducción española preserva esa literalidad y deja las lecturas literarias o simbólicas para la interpretación, no para imponerlas en la redacción.'
  doctrine_reference: Preservar la tensión interpretativa sin resolverla; no añadir al texto afirmaciones que no están explicitadas por la fuente.
translation_notes:
  revision_awareness: 'Se siguió el pasaje fuente hebreo (WLC) y el registro auditado en inglés. No hubo revisiones aplicadas en el pasaje base; la versión española mantiene la misma decisión de equivalencia óptima: lenguaje concreto, doméstico y directo, con alternativas preservadas en nota cuando el español permite dos matices cercanos.'
  spanish_consistency_notes:
  - Se mantiene «túnica» para כֻּתָּנְתִּי en coherencia con el valor de una prenda básica del cuerpo.
  - Se usa «Me he quitado / Me he lavado» para reflejar acciones completas con relevancia actual, en línea con el perfecto hebreo y la decisión inglesa.
  - Se conserva «ensuciar» para טנף, evitando términos más interpretativos como «profanar» o «contaminar» que no corresponden al sentido físico del verso.
  - La colocación de los pronombres enclíticos («me la pondré») refleja con naturalidad la referencia al sustantivo femenino singular sin perder claridad.
