translation:
  language: es
  text: 'Entonces Moisés habló a los jefes de las tribus de los hijos de Israel[a], diciendo[b]: «Esta es la palabra que Yahvé ha mandado:»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más idiomática, «los israelitas». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O, más idiomáticamente, «Esto es lo que Yahvé ha mandado». El hebreo dice «Esta es la palabra que Yahvé ha mandado».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - Y dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva esa progresión de modo natural en español sin perder la relación secuencial del verbo.
- source_word: רָאשֵׁי הַמַּטּוֹת
  english_pob_choice: the heads of the tribes
  chosen_spanish: los jefes de las tribus
  alternatives_spanish:
  - los cabezas de las tribus
  - los líderes de las tribus
  lexicon: HALOT
  rationale: «Jefes» comunica bien la idea de cabezas/chiefs en español bíblico actual y mantiene la estructura social de las tribus sin suavizarla demasiado.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: of the sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de los hijos de Jacob
  - de los israelitas
  lexicon: HALOT
  rationale: Se conserva la expresión formal del hebreo, «hijos de Israel», porque el POB inglés también mantuvo la formulación tradicional y masculina del pacto.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y les dijo
  - al decir
  lexicon: HALOT
  rationale: Es la forma usual y transparente para introducir discurso directo; «diciendo» mantiene la función sintáctica del infinitivo hebreo.
- source_word: זֶה הַדָּבָר
  english_pob_choice: This is the word
  chosen_spanish: Esta es la palabra
  alternatives_spanish:
  - Esto es la palabra
  - Ésta es la cosa
  lexicon: HALOT
  rationale: Aquí דָּבָר introduce una declaración autorizada; «palabra» preserva ese peso formal mejor que «cosa» o una paráfrasis más libre.
- source_word: צִוָּה
  english_pob_choice: has commanded
  chosen_spanish: ha mandado
  alternatives_spanish:
  - ha ordenado
  - ha comandado
  lexicon: HALOT
  rationale: «Mandado» expresa el carácter de un mandato divino en un español natural y digno. «Ordenado» sería posible, pero aquí «mandado» suena más cercano al lenguaje bíblico sin resultar arcaico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el defecto terminológico del proyecto en español: el Tetragrámaton se vierte como «Yahvé», manteniendo el nombre divino en lugar de sustituirlo por un título.'
theological_decisions:
- issue: Preservación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La política del proyecto en español pide «Yahvé» para el nombre del pacto. Esto conserva la referencia personal al nombre revelado sin enmascararlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión pactal בְנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - hijos de los israelitas
  rationale: Se mantiene la forma masculina y covenantal del hebreo, conforme a la preferencia por la precisión morfológica sobre la neutralización interpretativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no hubo cambios necesarios en el inglés auditado, y el español sigue de cerca tanto el hebreo como la decisión inglesa de preservar la fórmula de introducción del mandato.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «hijos de Israel» para reflejar la expresión pactal masculina del hebreo.
  - «Entonces» reproduce la fuerza narrativa del waw consecutivo sin forzar un calco.
  - El cierre con dos puntos prepara adecuadamente el discurso directo en español.
