translation:
  language: es
  text: Entonces alzaron sus voces y lloraron otra vez. Orfa besó a su suegra, pero[a] Rut se aferró a ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y Rut se aferró a ella»; el hebreo puede leerse simplemente con «y», pero el contexto sugiere un contraste entre el beso de Orfa y el apego continuado de Rut.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשֶּׂנָה קוֹלָן
  english_pob_choice: they lifted up their voices
  chosen_spanish: alzaron su voz
  alternatives_spanish:
  - levantaron su voz
  - alzaron sus voces
  - clamaron
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; en español, «alzaron su voz» conserva bien la imagen y el tono lamentoso sin volverse rígida. El singular colectivo «su voz» funciona naturalmente en español y evita una redundancia poco idiomática.
- source_word: וַתִּבְכֶּינָה
  english_pob_choice: wept
  chosen_spanish: lloraron
  alternatives_spanish:
  - lloraron amargamente
  - se echaron a llorar
  - sollozaron
  lexicon: HALOT
  rationale: El verbo expresa llanto; «lloraron» es fiel y sobrio. Mantiene la distinción respecto de la expresión anterior sobre alzar la voz.
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - todavía
  - aún
  lexicon: HALOT
  rationale: En contexto marca repetición del llanto previo; «otra vez» es natural y claro en español.
- source_word: וַתִּשַּׁק
  english_pob_choice: kissed
  chosen_spanish: besó
  alternatives_spanish:
  - dio un beso a
  - besó a
  lexicon: HALOT
  rationale: El verbo significa simplemente «besar». «Besó» es la forma más directa y natural en español.
- source_word: לַחֲמוֹתָהּ
  english_pob_choice: her mother-in-law
  chosen_spanish: a su suegra
  alternatives_spanish:
  - a la suegra de ella
  - a la madre de su esposo
  lexicon: HALOT
  rationale: «Suegra» es el equivalente preciso y natural en español; el posesivo «su» refleja correctamente la relación desde el punto de vista de Orfa.
- source_word: דָּבְקָה בָּהּ
  english_pob_choice: clung to her
  chosen_spanish: se quedó pegada a ella
  alternatives_spanish:
  - se apegó a ella
  - se aferró a ella
  - se unió a ella
  lexicon: HALOT
  rationale: דבק indica adherencia o fuerte apego. «Se quedó pegada a ella» comunica la cercanía y continuidad de la acción en un español vivo, sin cargar de antemano un matiz técnico de pacto que el contexto inmediato aún no exige.
- source_word: וְ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - mas
  lexicon: HALOT
  rationale: Aunque la conjunción es formalmente «y», el contraste narrativo entre el beso de Orfa y la adhesión de Rut se expresa mejor en español con «pero», siguiendo la lectura contextual del POB inglés.
- source_word: עָרְפָּה
  english_pob_choice: Orpah
  chosen_spanish: Orfa
  alternatives_spanish:
  - Orpah
  lexicon: transliteration convention
  rationale: Se adopta la transliteración usual en español bíblico, «Orfa», para una lectura más natural y reconocible en español.
- source_word: רוּת
  english_pob_choice: Ruth
  chosen_spanish: Rut
  alternatives_spanish:
  - Ruth
  lexicon: transliteration convention
  rationale: Se usa la forma tradicional en español, «Rut», estándar y claramente identificable.
translation_notes:
  revision_awareness: 'La versión española sigue el mismo estado textual y la misma decisión auditada del inglés POB: no hay cambios revisados que incorporar. Se conserva la tensión interpretativa sobre וְ/‘and’ frente a una traducción adversativa por contexto, reflejándola en nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en este proyecto para el tetragrámaton, pero este versículo no contiene el nombre divino.
  - Se usa «Rut» y «Orfa» conforme a las formas españolas habituales.
  - El tono es sobrio y narrativo, sin ampliar el sentido de דבק más allá de la cercanía relacional señalada por el contexto.
