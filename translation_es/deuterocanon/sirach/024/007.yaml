    text: O «reposo»; el sustantivo griego puede denotar descanso o reposo, pero aquí probablemente conserva el sentido de un lugar de descanso en paralelo con «me alojaré».
    reason: lexical_alternative
  - marker: b
    text: O «acamparé». El verbo griego puede referirse a alojarse o a acampar para pasar la noche.
    reason: lexical_alternative
