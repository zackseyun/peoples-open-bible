translation:
  language: es
  text: o uno que liga un hechizo[a], o uno que consulta a un médium[b], o uno que es espiritista[c], o uno que busca a los muertos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un encantador» para «uno que liga un hechizo»; el hebreo dice literalmente «uno que ata una atadura», con referencia a un conjuro o encantamiento mágico.
    reason: lexical_alternative
  - marker: b
    text: O «uno que inquiere de un espíritu» o «uno que pregunta a un fantasma» para «consulta a un médium».
    reason: lexical_alternative
  - marker: c
    text: O «mago» para «espiritista», aunque «mago» puede sonar engañoso en el español moderno.
    reason: lexical_alternative
  - marker: d
    text: O «uno que consulta a los muertos» o «uno que inquiere de los muertos».
    reason: lexical_alternative
lexical_decisions:
- source_word: חֹבֵר חָבֶר
  english_pob_choice: one who binds a spell
  chosen_spanish: uno que ata un hechizo
  alternatives_spanish:
  - uno que liga un conjuro
  - un encantador
  - uno que ata una atadura
  lexicon: HALOT
  rationale: El hebreo expresa literalmente la idea de ‘atar/ligar’ una ‘atadura’ o ‘hechizo’; en español, ‘ata un hechizo’ conserva la imagen verbal y la carga de práctica oculta sin importar una terminología folclórica ajena. ‘Encantador’ suena menos transparente y puede desviar el sentido.
- source_word: שֹׁאֵל אוֹב
  english_pob_choice: one who consults a medium
  chosen_spanish: consulta a un médium
  alternatives_spanish:
  - consulta a un espíritu
  - inquiere de un fantasma
  - consulta a un ocultista mediúmnico
  lexicon: HALOT
  rationale: אוֹב puede referirse al medio o agente de consulta con los muertos, no solo al ‘espíritu’ en abstracto. ‘Médium’ comunica bien la práctica prohibida en español contemporáneo y evita una lectura demasiado vaga.
- source_word: יִדְּעֹנִי
  english_pob_choice: a spiritist
  chosen_spanish: espiritista
  alternatives_spanish:
  - adivino
  - hechicero
  - mago
  lexicon: HALOT
  rationale: El término apunta a un practicante de conocimiento oculto asociado con consulta espiritual. ‘Espiritista’ mantiene esa asociación en español, mientras que ‘mago’ o ‘hechicero’ pueden sonar a fantasía o a otra clase de práctica.
- source_word: דֹרֵשׁ אֶל הַמֵּתִים
  english_pob_choice: one who seeks the dead
  chosen_spanish: uno que busca a los muertos
  alternatives_spanish:
  - uno que consulta a los muertos
  - uno que inquiere de los muertos
  lexicon: HALOT
  rationale: La frase hebrea expresa consulta necromántica; ‘busca a los muertos’ sigue de cerca la forma del original y resulta natural en español. ‘Consulta a los muertos’ sería más explícito, pero ‘busca’ conserva mejor la imagen verbal del hebreo.
- source_word: וְ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - y
  lexicon: gramática española
  rationale: En la lista prohibitiva, la conjunción funciona disyuntivamente. ‘O’ refleja la estructura enumerativa y el valor de serie de prácticas distintas.
theological_decisions:
- issue: Terminología de prácticas ocultas sin folklore posterior
  english_pob_reading: Use clear modern terms ('medium,' 'spiritist,' 'binds a spell') that reflect the Hebrew practices in context.
  chosen_spanish_reading: Usar términos claros y modernos (‘médium’, ‘espiritista’, ‘ata un hechizo’) que reflejen las prácticas hebreas en su contexto.
  alternative_spanish_readings:
  - conservar ‘encantador’ y ‘mago’
  - usar ‘adivino’ para ambos términos de consulta
  rationale: La lista de Deuteronomio nombra prácticas prohibidas de adivinación y necromancia; el español debe ser claro sin importar sistemas esotéricos posteriores ni diluir la fuerza legal del pasaje.
  doctrine_reference: Principios de traducción POB sobre claridad, precisión léxica y no importar folclore ajeno
translation_notes:
  revision_awareness: Se reflejó la revisión más reciente del inglés POB, que ajustó la idea de ‘casts spells’ a ‘binds a spell’. Por eso se eligió en español una imagen verbal próxima (‘ata un hechizo’) en lugar de un verbo más interpretativo.
  spanish_consistency_notes:
  - Se usó ‘espiritista’ y no ‘mago’ como opción principal para evitar connotaciones fantásticas.
  - Se mantuvo el valor disyuntivo de la serie con ‘o’.
  - Se preservó la progresión de la lista como una enumeración de prácticas distintas, no como sinónimos exactos.
