  rationale: Se ajusta únicamente la expresión temporal del segundo hemistiquio para que el español sea natural y digno. Aunque el inglés evitó repetir «forever», en español «por todo el tiempo» suena poco idiomático; repetir «para siempre» preserva fielmente el sentido de לְעוֹלָם sin forzar la lengua meta. También se limpia la puntuación de la nota [a].
