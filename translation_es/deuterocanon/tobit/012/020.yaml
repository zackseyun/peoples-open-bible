translation:
  language: es
  text: Y ahora den gracias a Dios[a], porque subo hacia el que me envió; y escriban todo lo que ha sido cumplido en un libro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confiesen a Dios» o «alaben a Dios»; el verbo griego puede abarcar reconocimiento expresado en agradecimiento o alabanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξομολογεῖσθε
  english_pob_choice: give thanks
  chosen_spanish: den gracias
  alternatives_spanish:
  - confiesen
  - alaben
  - den reconocimiento
  lexicon: BDAG
  rationale: En este contexto dirigido a Dios, el verbo griego puede expresar agradecimiento, reconocimiento o alabanza. «Den gracias» conserva el sentido de acción de gracias y suena natural en español bíblico sin reducirlo a confesión de pecados.
- source_word: ἀναβαίνω
  english_pob_choice: am ascending
  chosen_spanish: voy a subir
  alternatives_spanish:
  - estoy ascendiendo
  - voy a ascender
  - subo
  lexicon: BDAG
  rationale: La imagen de ascenso se preserva mejor con «voy a subir», que comunica movimiento inmediato y mantiene la dirección vertical del griego sin volverlo demasiado solemne o artificial.
- source_word: τὸν ἀποστείλαντά με
  english_pob_choice: the one who sent me
  chosen_spanish: al que me envió
  alternatives_spanish:
  - al que me mandó
  - al que me ha enviado
  - a mi enviado
  lexicon: BDAG
  rationale: La cláusula participial se vierte de forma natural como relativa en español. «Al que me envió» conserva la referencia al agente sin añadir explicaciones sobre su identidad, como hace el texto griego.
- source_word: γράψατε
  english_pob_choice: write
  chosen_spanish: escriban
  alternatives_spanish:
  - registren
  - anoten
  lexicon: BDAG
  rationale: El imperativo pide fijar los hechos por escrito. «Escriban» es la equivalencia más directa y clara en español actual.
- source_word: πάντα τὰ συντελεσθέντα
  english_pob_choice: all that has been accomplished
  chosen_spanish: todo lo que ha sido llevado a término
  alternatives_spanish:
  - todo lo que ha sido cumplido
  - todo lo que ha sido realizado
  - todo lo que ha acontecido
  lexicon: BDAG
  rationale: El participio perfecto pasivo subraya hechos llevados a su conclusión. «Llevado a término» conserva esa idea de culminación mejor que un simple «pasado» o «acontecido», y evita borrar la fuerza de accomplished/completed documentada en el audit trail.
- source_word: εἰς βιβλίον
  english_pob_choice: in a book
  chosen_spanish: en un libro
  alternatives_spanish:
  - en un rollo
  - en un escrito
  lexicon: BDAG
  rationale: «Libro» reproduce el sentido general de un documento escrito sin imponer «rollo», que no es exigido por βιβλίον en este versículo.
theological_decisions:
- issue: Naturaleza del destinatario de la acción de gracias y del ascenso de Raphael
  english_pob_reading: Render the line straightforwardly as heavenly ascent to God's commission without expanding angelology.
  chosen_spanish_reading: Traducir de manera directa el ascenso hacia quien lo envió, sin explicitar más allá del texto que ese remitente es Dios en la misma cláusula.
  alternative_spanish_readings:
  - subo de regreso al que me envió
  - subo al cielo, al que me envió
  rationale: El griego sugiere una ascensión vinculada con la comisión divina, pero no repite aquí el nombre de Dios en la cláusula del envío. La versión española mantiene esa tensión teológica y no introduce una aclaración interpretativa que el texto no da.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla de forma explicativa.
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego de Tobit 12:20 y el rastro auditado en inglés: se conserva el valor de ἐξομολογεῖσθε como acción de gracias en este contexto, la imagen de ἀναβαίνω como ascenso, y συντελεσθέντα como hechos llevados a término, ajustando el español para que sea natural y publicable sin perder la fuerza semántica documentada.'
  spanish_consistency_notes:
  - Se usa «Dios» para τῷ θεῷ conforme al estándar del proyecto.
  - Se mantiene «den gracias» en lugar de «confiesen» como traducción principal, pero se deja nota de la alternativa léxica.
  - «Llevado a término» conserva la culminación de los hechos, alineado con el ajuste revisado del inglés POB.
  - No se introduce «Cristo», «SEÑOR» ni otra terminología no presente en el verso.
