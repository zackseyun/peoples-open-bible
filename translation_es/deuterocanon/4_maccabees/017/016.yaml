translation:
  language: es
  text: ¿Quién no se maravilló ante los atletas de la ley verdadera[a]? ¿Quién no quedó asombrado?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ley de la verdad». La frase griega puede entenderse como una expresión en genitivo («la ley de la verdad») o como una descripción de la ley como verdadera.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίνες
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Qué personas
  - ¿Cuáles
  lexicon: BDAG
  rationale: En preguntas retóricas con fuerza general, el español idiomático usa «¿Quién…?» para conservar la universalidad y el tono elevado del original.
- source_word: ἐθαύμασαν
  english_pob_choice: did not marvel
  chosen_spanish: no se maravilló
  alternatives_spanish:
  - no admiró
  - no se asombró
  lexicon: BDAG
  rationale: «Maravillarse» conserva mejor la carga de admiración y asombro del verbo griego que «admirar», y suena más natural en una pregunta retórica española que una forma demasiado literal.
- source_word: ἀθλητάς
  english_pob_choice: athletes
  chosen_spanish: atletas
  alternatives_spanish:
  - campeones
  - contendientes
  - luchadores
  lexicon: LSJ
  rationale: Se mantiene la metáfora atlética explícita del pasaje. «Atletas» refleja el campo semántico del término griego y evita deshacer la imagen de competición y constancia.
- source_word: τῆς ἀληθείας νομοθεσίας
  english_pob_choice: the true law
  chosen_spanish: la ley verdadera
  alternatives_spanish:
  - la ley de la verdad
  - la legislación verdadera
  lexicon: LSJ
  rationale: El griego permite tanto un sentido atributivo como genitivo. En español, «la ley verdadera» sigue la revisión inglesa más natural y conserva la posibilidad de entender la ley como caracterizada por la verdad, sin forzar una construcción pesada.
- source_word: ἐξεπλάγησαν
  english_pob_choice: was not astonished
  chosen_spanish: quedó asombrado
  alternatives_spanish:
  - se asombró
  - quedó maravillado
  lexicon: BDAG
  rationale: «Quedar asombrado» transmite la intensidad del verbo y distingue el segundo paralelismo del primero, manteniendo el tono enfático de las preguntas retóricas.
theological_decisions:
- issue: Metáfora de los mártires como ἀθλητάς
  english_pob_reading: Retain the athletic metaphor explicitly as 'athletes.'
  chosen_spanish_reading: Conservar la metáfora como «atletas».
  alternative_spanish_readings:
  - reinterpretar como «campeones»
  - reinterpretar como «luchadores»
  rationale: La imagen no se explica ni se sustituye, porque en 4 Macabeos la resistencia fiel se presenta deliberadamente en lenguaje de competición. Mantenerla preserva la teología literaria del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: τῆς ἀληθείας νομοθεσίας
  english_pob_reading: Translate as 'the true law.'
  chosen_spanish_reading: Traducir como «la ley verdadera».
  alternative_spanish_readings:
  - «la ley de la verdad»
  - «la legislación verdadera»
  rationale: 'La forma española evita una construcción demasiado áspera y sigue el sentido aprobado por la revisión inglesa: la ley descrita como verdadera. Así se conserva la tensión entre lectura atributiva y genitiva sin resolverla de manera excesiva.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
translation_notes:
  revision_awareness: La revisión inglesa reciente favoreció 'the true law' sobre 'the law of truth' por naturalidad y por un matiz más adjetival; la versión española sigue esa misma dirección con «la ley verdadera», manteniendo el paralelismo retórico y la metáfora atlética.
  spanish_consistency_notes:
  - Se conserva el registro solemne y retórico con dos preguntas paralelas.
  - «Atletas» mantiene coherencia con el vocabulario atlético de 4 Macabeos.
  - No se introducen términos eclesiásticos ajenos al griego; se prefiere una formulación directa y transparente.
  - La elección «ley verdadera» respeta la oscilación semántica documentada sin añadir una nota porque la ambigüedad ya queda suficientemente visible en español.
