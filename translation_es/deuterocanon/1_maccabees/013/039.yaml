revisions:
- from: Pero les perdonamos los yerros y los pecados hasta este día presente[a], y la corona que debían; y si alguna otra cosa se estaba cobrando en Jerusalén[b], que ya no se cobre.
  to: Pero les perdonamos los yerros y los pecados hasta el día de hoy, y el tributo de la corona[a] que debían; y si alguna otra cosa se estaba cobrando en Jerusalén, que ya no se cobre.
  rationale: Se revisa στέφανον en el texto principal a «el tributo de la corona» para reflejar el sentido fiscal exigido por el contexto y por la auditoría inglesa, mientras la nota conserva la literalidad «la corona». También se suaviza «hasta este día presente» a «hasta el día de hoy» para un español más natural y digno sin pérdida semántica. No se requieren cambios adicionales.
