translation:
  language: es
  text: y también profanar el templo de Jerusalén y darle el nombre de Zeus Olímpico[a], y al templo de Gerizim, según lo hacían[b] los que habitaban aquel lugar, el de Zeus protector de los extranjeros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «darle el nombre de Zeus Olímpios». El verbo griego puede significar asignar un nombre adicional o nuevo.'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «Zeus Xenios», es decir, Zeus como patrón de la hospitalidad y protector de huéspedes o extranjeros.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μολῦναι
  english_pob_choice: to defile
  chosen_spanish: profanar
  alternatives_spanish:
  - contaminar
  - manchar ritualmente
  lexicon: LSJ
  rationale: En este contexto cultual, μολῦναι expresa hacer impuro o violar lo sagrado. 'Profanar' comunica bien la ofensa religiosa en español y evita un término demasiado físico como 'manchar'.
- source_word: νεὼ
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  - templo sagrado
  lexicon: LSJ
  rationale: El término designa el edificio cultual; 'templo' es la equivalencia natural y clara en español para Jerusalén.
- source_word: προσονομάσαι
  english_pob_choice: to name it for
  chosen_spanish: darle el nombre de
  alternatives_spanish:
  - renombrarlo como
  - designarlo con el nombre de
  lexicon: LSJ
  rationale: El verbo puede implicar asignar un nombre adicional o nuevo. 'Darle el nombre de' conserva la fuerza de dedicación/renombramiento sin exagerar la mecánica.
- source_word: Διὸς Ὀλυμπίου
  english_pob_choice: Olympian Zeus
  chosen_spanish: Zeus Olímpico
  alternatives_spanish:
  - Zeus Olímpios
  - Zeus del Olimpo
  lexicon: LSJ
  rationale: Se traduce el epíteto para que el lector entienda la identificación pagana impuesta al templo, manteniendo el nombre propio Zeus.
- source_word: Γαριζείν
  english_pob_choice: Gerizim
  chosen_spanish: Gerizim
  alternatives_spanish:
  - monte Gerizim
  lexicon: LSJ
  rationale: Se conserva el topónimo transliterado, conforme a la política del proyecto para nombres geográficos.
- source_word: καθὼς ἐτύγχανον οἱ τὸν τόπον οἰκοῦντες
  english_pob_choice: as those who inhabited the place happened to do
  chosen_spanish: según solían hacer los que habitaban el lugar
  alternatives_spanish:
  - como resultaba que hacían los habitantes del lugar
  - conforme a la condición de los habitantes del lugar
  lexicon: LSJ
  rationale: La construcción es condensada e idiomática. 'Según solían hacer' transmite el matiz de costumbre o práctica local sin volver el español oscuro.
- source_word: Διὸς ξενίου
  english_pob_choice: Zeus the protector of strangers
  chosen_spanish: Zeus protector de los extranjeros
  alternatives_spanish:
  - Zeus hospitalario
  - Zeus Xenio
  lexicon: LSJ
  rationale: ξένιος alude a la hospitalidad y a la protección de huéspedes/extranjeros. 'Protector de los extranjeros' explicita el valor semántico para el lector español.
theological_decisions:
- issue: Traducción de epítetos paganos en un contexto de profanación del culto judío
  english_pob_reading: Translate the epithets as 'Olympian Zeus' and 'Zeus the protector of strangers'
  chosen_spanish_reading: Traducir los epítetos como 'Zeus Olímpico' y 'Zeus protector de los extranjeros'
  alternative_spanish_readings:
  - transliterar como 'Zeus Olímpios' y 'Zeus Xenio'
  rationale: La redacción española debe dejar visible que se trata de una imposición cultual pagana sobre el templo judío. Traducir los epítetos comunica el sentido sin ocultar el carácter idolátrico.
  doctrine_reference: 'Translation philosophy: translate titles; transliterate names.'
- issue: Valor de la cláusula καθὼς ἐτύγχανον οἱ τὸν τόπον οἰκοῦντες
  english_pob_reading: Render it as a circumstantial note tied to the local inhabitants' situation/custom
  chosen_spanish_reading: Mantenerla como nota circunstancial sobre la práctica de los habitantes del lugar
  alternative_spanish_readings:
  - como eran los habitantes del lugar
  - de acuerdo con la costumbre de los que habitaban allí
  rationale: El griego es breve y no del todo explícito. La traducción conserva la referencia a una práctica o situación local sin resolver de más la ambigüedad.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'El pasaje presenta una compacta construcción griega con dos centros cultuales afectados: el templo de Jerusalén y el de Gerizim. La revisión inglesa más reciente no introdujo cambios, por lo que se conserva la misma comprensión: traducir los epítetos divinos para aclarar la profanación y mantener el matiz circunstancial de καθὼς ἐτύγχανον sin sobre-interpretarlo.'
  spanish_consistency_notes:
  - Se conserva «templo» para νεώς y no «santuario», siguiendo el uso natural en español para el Templo de Jerusalén.
  - Se traduce el epíteto divino, pero se conserva 'Zeus' como nombre propio, en línea con la política del proyecto.
  - Se evita 'SEÑOR' u otras sustituciones devocionales; el texto describe una imposición pagana concreta.
  - «Profanar» se usa para μολῦναι por su fuerza cultual y su inteligibilidad en español.
  - La nota a aclara la alternativa lexical sin duplicar el sentido en el cuerpo del texto.
  - La nota b explica la designación griega sin introducir transliteración innecesaria en el texto principal.
