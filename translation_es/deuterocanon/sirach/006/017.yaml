translation:
  language: es
  text: Porque como él es[a], así es su amigo, y como su nombre, son sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «El que teme al Señor dirige rectamente su amistad, porque como él es, así también es su prójimo». El testimonio hebreo aquí difiere sustancialmente en la primera cola.'
    reason: alternative_reading
lexical_decisions:
- source_word: כָּמוֹהוּ
  english_pob_choice: as he is
  chosen_spanish: como él es
  alternatives_spanish:
  - como él
  - según él
  lexicon: HALOT
  rationale: La comparación hebrea con כ־ y sufijo pronominal se expresa de manera natural en español con «como él es». Mantiene el carácter proverbial breve del hebreo y evita añadir una interpretación que el texto no exige.
- source_word: רֵעֵהוּ
  english_pob_choice: his friend
  chosen_spanish: su amigo
  alternatives_spanish:
  - su compañero
  - su prójimo
  lexicon: HALOT
  rationale: En este dicho sapiencial, «amigo» reproduce bien el campo semántico de רֵעַ y se ajusta al tema inmediato de la amistad. «Prójimo» sería más amplio y desplazaría el sentido hacia una relación social general que aquí no domina.
- source_word: כִּשְׁמוֹ
  english_pob_choice: as his name
  chosen_spanish: como es su nombre
  alternatives_spanish:
  - según su nombre
  - como su nombre
  lexicon: HALOT
  rationale: En español, la construcción proverbial queda más natural con «como es su nombre». Conserva el sustantivo «nombre» sin expandirlo innecesariamente a «reputación», manteniendo la concisión del hebreo.
- source_word: מַעֲשָׂיו
  english_pob_choice: his deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  lexicon: HALOT
  rationale: «Obras» comunica bien el peso moral de מַעֲשִׂים en literatura sapiencial y suena natural en español bíblico contemporáneo. «Hechos» o «acciones» serían posibles, pero menos cargados éticamente.
theological_decisions:
- issue: Prioridad del hebreo frente al paralelo griego en un versículo con divergencia significativa
  english_pob_reading: El texto inglés sigue el hebreo conservado como base principal y documenta en nota el paralelo griego, que introduce una primera cola distinta centrada en el que teme al Señor.
  chosen_spanish_reading: El texto español sigue el hebreo conservado como lectura principal y registra el paralelo griego en nota, sin esconder la diferencia textual.
  alternative_spanish_readings:
  - El que teme al Señor dirige rectamente su amistad, porque como él es, así también es su prójimo.
  rationale: La política editorial da primacía al hebreo donde se conserva, pero exige honestidad sobre la divergencia con el griego. Por eso la traducción principal mantiene el proverbio hebreo y la nota preserva la alternativa griega para no borrar la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde está disponible; preservar honestamente la incertidumbre textual'
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión, que indicó que no eran necesarios cambios adicionales. La redacción española conserva esa decisión y mantiene la distinción textual documentada entre hebreo y griego.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere explícitamente; aquí no aparece el Nombre divino en la lectura hebrea principal.
  - Se evita «Cristo» porque no hay lenguaje mesiánico en este versículo.
  - Se mantiene un registro sapiencial claro y sobrio, con sintaxis española natural pero cercana a la tersa forma proverbial del hebreo.
