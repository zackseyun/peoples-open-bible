revisions:
- from: 'Y he aquí[a], toda la familia se ha levantado contra tu sierva, y han dicho: «Entrega al que hirió a su hermano, para que lo matemos por la vida de su hermano, a quien mató; y destruiríamos también al heredero. Así apagarían mi brasa que aún queda[b], dejando a mi marido sin nombre ni remanente sobre la faz de la tierra».'
  to: 'Y he aquí[a], toda la familia se ha levantado contra tu sierva, y han dicho: «Entrega al que hirió a su hermano, para que lo matemos por la vida de su hermano, a quien mató; y destruiremos también al heredero». Así apagarían mi brasa restante[b], dejando a mi marido sin nombre ni remanente[c] sobre la faz de la tierra.'
  rationale: 'Se corrige un problema significativo de fidelidad verbal: «destruiríamos» se reemplaza por «destruiremos» para reflejar la intención directa del discurso citado en hebreo. También se pule la metáfora a «mi brasa restante» para mayor naturalidad y se añade la nota necesaria sobre «nombre ni remanente», preservando la justificación cultural documentada en la auditoría inglesa.'
