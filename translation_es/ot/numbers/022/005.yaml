translation:
  language: es
  text: 'Así que envió mensajeros a Balaam hijo de Beor, en Petor[a], que está junto al Río, en la tierra de los hijos de su pueblo[b], para llamarlo, diciendo: «Mira, un pueblo ha salido de Egipto. Mira, ha cubierto la faz de la tierra[c], y está habitando frente a mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el Río»; probablemente el Éufrates.'
    reason: cross_reference
  - marker: b
    text: 'O: «en la tierra de su pueblo». La expresión hebrea «la tierra de los hijos de su pueblo» es difícil, y el referente de «su» puede entenderse de varias maneras.'
    reason: alternative_reading
  - marker: c
    text: 'Literalmente: «ha cubierto el ojo de la tierra»; la expresión se entiende como «ha cubierto la faz de la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - mensajeros celestiales
  lexicon: HALOT
  rationale: El contexto diplomático exige un término humano; 'mensajeros' conserva el sentido básico sin introducir 'ángeles' ni un tono excesivamente formal.
- source_word: פְּתוֹרָה
  english_pob_choice: at Pethor
  chosen_spanish: en Pator
  alternatives_spanish:
  - en Pethor
  - a Pator
  lexicon: HALOT
  rationale: Se conserva el topónimo como nombre propio transliterado de forma consistente para la audiencia española; la preposición 'en' refleja la ubicación del destinatario.
- source_word: אֲשֶׁר עַל־הַנָּהָר
  english_pob_choice: which is by the River
  chosen_spanish: que está junto al Río
  alternatives_spanish:
  - que está junto al río
  - que está junto al Éufrates
  lexicon: HALOT
  rationale: '''El Río'' mantiene la forma hebrea del texto fuente, en vez de resolverla directamente como Éufrates en el cuerpo principal; ''junto a'' expresa la relación espacial natural en español.'
- source_word: אֶרֶץ בְּנֵי עַמּוֹ
  english_pob_choice: in the land of the sons of his people
  chosen_spanish: en la tierra de los hijos de su pueblo
  alternatives_spanish:
  - en la tierra de su pueblo
  - en la tierra de los hijos de aquel pueblo
  - en su propia tierra
  lexicon: HALOT
  rationale: Se preserva la estructura algo áspera del hebreo, incluyendo 'hijos de su pueblo', para no borrar la ambigüedad señalada por el texto fuente y el audit trail inglés.
- source_word: לִקְרֹא לוֹ
  english_pob_choice: to call him
  chosen_spanish: para llamarlo
  alternatives_spanish:
  - para convocarlo
  - para llamarle
  lexicon: HALOT
  rationale: '''Llamarlo'' es la forma más directa y natural en español para el infinitivo de propósito; ''convocarlo'' sería más interpretativo.'
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: La fórmula de introducción de discurso se expresa con 'diciendo', que conserva el flujo narrativo sin añadir información.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, aquí
  - He aquí
  lexicon: HALOT
  rationale: '''Mira'' transmite el valor deíctico y de llamada de atención de manera idiomática en español contemporáneo; ''He aquí'' sería más tradicional pero menos natural.'
- source_word: עַם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - una nación
  - un pueblo-group
  lexicon: HALOT
  rationale: '''Pueblo'' reproduce bien el colectivo étnico/nacional del hebreo en español bíblico actual.'
- source_word: יָצָא מִמִּצְרַיִם
  english_pob_choice: has come out of Egypt
  chosen_spanish: ha salido de Egipto
  alternatives_spanish:
  - ha venido de Egipto
  - salió de Egipto
  lexicon: HALOT
  rationale: '''Ha salido'' conserva el movimiento de salida y su valor perfecto en el discurso citado, con español natural.'
- source_word: כִסָּה אֶת עֵין הָאָרֶץ
  english_pob_choice: has covered the face of the land
  chosen_spanish: ha cubierto la superficie de la tierra
  alternatives_spanish:
  - ha cubierto la faz de la tierra
  - ha cubierto el rostro de la tierra
  - ha cubierto el ojo de la tierra
  lexicon: HALOT
  rationale: '''Superficie de la tierra'' comunica la imagen hebrea de עֵין sin el literalismo opaco de ''ojo de la tierra''; mantiene la idea visible y extensa del terreno cubierto.'
- source_word: וְהוּא יֹשֵׁב
  english_pob_choice: and it is dwelling
  chosen_spanish: y está habitando
  alternatives_spanish:
  - y habita
  - y está asentado
  - y él está habitando
  lexicon: HALOT
  rationale: Se preserva el sentido colectivo singular ('it') aplicado al pueblo como unidad; 'está habitando' mantiene el aspecto durativo del participio.
- source_word: מִמֻּלִי
  english_pob_choice: opposite me
  chosen_spanish: frente a mí
  alternatives_spanish:
  - enfrente de mí
  - opuesto a mí
  - cara a cara conmigo
  lexicon: HALOT
  rationale: '''Frente a mí'' es claro y natural en español para la relación espacial de oposición; evita el tono más técnico de ''opuesto a mí''.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés: conserva la secuencia narrativa, la ambigüedad de אֶרֶץ בְּנֵי עַמּוֹ y la tensión léxica de עֵין הָאָרֶץ, pero adapta las expresiones al español natural sin suavizar el contenido ni introducir interpretaciones no sustentadas.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exija explícitamente; aquí no aparece.
  - '''Mensajeros'' se mantiene para מַלְאָכִים por el contexto humano.'
  - '''Pueblo'' y no ''nación'' para עַם, en continuidad con el audit trail inglés.'
  - '''El Río'' se conserva en el texto principal y se aclara en nota.'
  - La puntuación reproduce el discurso directo con comillas españolas y separación natural de cláusulas.
