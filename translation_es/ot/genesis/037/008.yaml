translation:
  language: es
  text: 'Sus hermanos le dijeron: «¿De veras reinarás sobre nosotros? ¿De veras gobernarás sobre nosotros?» Y lo odiaron aún más por causa de sus sueños y por causa de sus palabras[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "por lo que dijo". El hebreo דְּבָרָיו puede significar "sus palabras" o, de manera más amplia, "lo que dijo".'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos varones
  - sus hermanos
  lexicon: HALOT
  rationale: El hebreo se refiere específicamente a los hermanos de José; en español, "sus hermanos" es natural y fiel, sin necesidad de marcar el género de forma extra en el texto principal.
- source_word: הֲמָלֹךְ תִּמְלֹךְ
  english_pob_choice: Will you indeed reign
  chosen_spanish: ¿De veras reinarás?
  alternatives_spanish:
  - ¿Realmente reinarás?
  - ¿Reinarás de verdad?
  lexicon: HALOT
  rationale: La construcción con infinitivo absoluto + imperfecto intensifica la pregunta. "De veras" transmite bien la incredulidad enfática en un español sobrio y publicable, conservando el sentido de reinar/ejercer dominio real.
- source_word: עָלֵינוּ
  english_pob_choice: over us
  chosen_spanish: sobre nosotros
  alternatives_spanish:
  - encima de nosotros
  lexicon: HALOT
  rationale: Con מלך, la preposición expresa dominio jerárquico; "sobre nosotros" es la equivalencia idiomática correcta en español.
- source_word: אִם מָשׁוֹל תִּמְשֹׁל
  english_pob_choice: Will you indeed rule
  chosen_spanish: ¿De veras gobernarás?
  alternatives_spanish:
  - ¿De veras mandarás?
  - ¿De veras ejercerás dominio?
  lexicon: HALOT
  rationale: Mantiene el paralelismo con el primer hemistiquio y distingue el matiz de משל. "Gobernarás" comunica bien la idea de ejercer autoridad, sin introducir un término más técnico o más duro de lo que pide el contexto.
- source_word: בָּנוּ
  english_pob_choice: over us
  chosen_spanish: sobre nosotros
  alternatives_spanish:
  - entre nosotros
  lexicon: HALOT
  rationale: Con משל, el sentido es dominio sobre personas; por eso se repite la misma preposición idiomática para conservar la fuerza del paralelismo.
- source_word: וַיּוֹסִפוּ עוֹד שְׂנֹא
  english_pob_choice: So they hated him even more
  chosen_spanish: Así que lo odiaron aún más
  alternatives_spanish:
  - Y lo odiaron todavía más
  - Así que siguieron odiándolo cada vez más
  lexicon: HALOT
  rationale: El hebreo expresa intensificación del odio. "Aún más" reproduce con naturalidad ese aumento, y "lo odiaron" mantiene el objeto directo explícito y claro en español.
- source_word: עַל חֲלֹמֹתָיו
  english_pob_choice: because of his dreams
  chosen_spanish: por causa de sus sueños
  alternatives_spanish:
  - a causa de sus sueños
  - debido a sus sueños
  lexicon: HALOT
  rationale: עַל aquí introduce la causa o base del odio. "Por causa de" es fiel y digno; evita sonar demasiado interpretativo y preserva la relación causal que el inglés POB señaló.
- source_word: וְעַל דְּבָרָיו
  english_pob_choice: because of his words
  chosen_spanish: y por causa de sus palabras
  alternatives_spanish:
  - y por lo que dijo
  - y por sus palabras
  lexicon: HALOT
  rationale: Se conserva la posibilidad lexical de דְּבָרָיו como "palabras" y, al mismo tiempo, se deja abierta la tensión documentada por el POB entre "sus palabras" y "lo que dijo". En el texto principal, "palabras" mantiene la forma más cercana al hebreo.
theological_decisions:
- issue: No hay variante doctrinal central; el punto es el tono de incrédula arrogancia de los hermanos.
  english_pob_reading: Will you indeed reign over us? Will you indeed rule over us?
  chosen_spanish_reading: ¿De veras reinarás sobre nosotros? ¿De veras gobernarás sobre nosotros?
  alternative_spanish_readings:
  - ¿De verdad reinarás sobre nosotros? ¿De verdad gobernarás sobre nosotros?
  - ¿Acaso reinarás sobre nosotros? ¿Acaso gobernarás sobre nosotros?
  rationale: La elección preserva el tono de burla e incredulidad sin suavizarlo. "De veras" mantiene la fuerza retórica de las preguntas hebreas y el registro formal del audit trail inglés.
  doctrine_reference: Génesis 37:8
- issue: La segunda causa del odio admite una tensión léxica entre 'palabras' y 'lo que dijo'.
  english_pob_reading: because of his words
  chosen_spanish_reading: por causa de sus palabras
  alternative_spanish_readings:
  - por causa de lo que dijo
  - por sus palabras
  rationale: Se conserva el término más cercano al sustantivo hebreo דְּבָרָיו, sin negar la alternativa semántica más amplia documentada en el aparato auditado. Esto mantiene la transparencia textual del proyecto.
  doctrine_reference: Génesis 37:8
translation_notes:
  revision_awareness: El inglés auditado fue revisado de “really” a “indeed” para un registro más formal; la versión española refleja ese mismo registro con “de veras” y conserva la intensidad de la doble pregunta hebrea. También se mantuvo la nota léxica sobre דְּבָרָיו, tal como el POB inglés preservó la alternativa entre “his words” y “what he said”.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'reinar' y 'gobernar' para distinguir מלך y משל sin volver mecánico el paralelismo.
  - Se preserva el objeto directo explícito 'lo' en 'lo odiaron' para una sintaxis clara en español.
  - Se optó por 'por causa de' para ambas cláusulas causales a fin de reflejar la misma relación preposicional del hebreo.
  - La nota [a] está anclada en 'palabras' para marcar la alternativa léxica sin interrumpir la fluidez del versículo.
