revisions:
- from: Y estas salieron de la ciudad para salir al encuentro de ellos[a], y quedaron en medio de Israel, unas de un lado y otras del otro[b]; y los golpearon hasta no dejarles ni sobreviviente ni fugitivo.
  to: Y estas salieron de la ciudad al encuentro de ellos, y quedaron en medio de Israel, estas por un lado[a] y aquellas por el otro; y los abatieron[b] hasta no dejarles ni sobreviviente ni fugitivo.
  rationale: Se reubicó la nota del modismo de cerco al segmento correcto del texto. Se simplificó ‘para salir al encuentro de ellos’ a ‘al encuentro de ellos’ para evitar redundancia. Se cambió ‘golpearon’ por ‘abatieron’ para reflejar mejor el valor bélico de נכה en este contexto, manteniendo la fuerza del hebreo y la naturalidad del español.
