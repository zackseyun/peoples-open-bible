translation:
  language: es
  text: 'Y responderás y dirás delante de Yahvé tu Dios: «Mi padre fue un arameo que perecía[a], y descendió a Egipto y habitó allí como forastero, pocos en número; y allí llegó a ser una nación grande, poderosa y numerosa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Mi padre fue un arameo errante». El participio hebreo también puede llevar el sentido de «que perecía».
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָנִיתָ
  english_pob_choice: you shall answer
  chosen_spanish: y responderás
  alternatives_spanish:
  - y contestarás
  - y declararás
  lexicon: HALOT
  rationale: En este contexto litúrgico, ענה introduce una respuesta formal o recitación. «Responderás» conserva mejor el giro hebreo y la solemnidad del acto que un verbo más interpretativo como «declararás».
- source_word: וְאָמַרְתָּ
  english_pob_choice: and say
  chosen_spanish: y dirás
  alternatives_spanish:
  - y declararás
  lexicon: HALOT
  rationale: Se mantiene el par formular «responderás y dirás», que reproduce la secuencia hebrea sin sobreinterpretarla.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: «Delante de» conserva el valor espacial/ritual de לִפְנֵי con naturalidad en español. Se usa «Yahvé» conforme al criterio del proyecto para el nombre divino.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios personal
  lexicon: HALOT
  rationale: La forma posesiva se vierte de manera directa y reverente con «tu Dios», sin añadir matices no presentes en el hebreo.
- source_word: אֲרַמִּי
  english_pob_choice: Aramean
  chosen_spanish: un arameo
  alternatives_spanish:
  - un sirio
  lexicon: HALOT
  rationale: «Arameo» es la designación étnica precisa y evita la ambigüedad histórica de «sirio».
- source_word: אֹבֵד
  english_pob_choice: perishing
  chosen_spanish: que perecía
  alternatives_spanish:
  - perecedero
  - perdido
  - que vagaba
  lexicon: HALOT
  rationale: Sigo la lectura revisada de la POB inglesa que privilegia el valor de «perishing». En español, «que perecía» conserva el participio/estado incompleto del hebreo y mantiene la tensión semántica; no se resuelve hacia «vagaba», que sería una opción posible pero menos directa con esta revisión.
- source_word: אָבִי
  english_pob_choice: my father
  chosen_spanish: mi padre
  alternatives_spanish:
  - mi antepasado
  lexicon: HALOT
  rationale: Se conserva el singular literal «mi padre», que en el contexto representa al ancestro de Israel de manera retóricamente vívida.
- source_word: וַיֵּרֶד מִצְרַיְמָה
  english_pob_choice: and he went down to Egypt
  chosen_spanish: y descendió a Egipto
  alternatives_spanish:
  - y fue a Egipto
  lexicon: HALOT
  rationale: «Descendió» preserva el verbo hebreo y la direccionalidad idiomática tradicional del viaje a Egipto.
- source_word: וַיָּגָר שָׁם
  english_pob_choice: and sojourned there
  chosen_spanish: y habitó allí como forastero
  alternatives_spanish:
  - y vivió allí
  - y se quedó allí
  lexicon: HALOT
  rationale: גור implica residir como extranjero o residente temporal. «Habitó allí como forastero» explica en español la idea de sojourn without flattening it to simple residence.
- source_word: בִּמְתֵי מְעָט
  english_pob_choice: few in number
  chosen_spanish: pocos en número
  alternatives_spanish:
  - con poca gente
  - como un grupo pequeño
  lexicon: HALOT
  rationale: La expresión idiomática señala la escasez numérica del grupo. «Pocos en número» es claro y fiel sin añadir un matiz no explícito.
- source_word: וַיְהִי שָׁם לְגוֹי
  english_pob_choice: and there he became a nation
  chosen_spanish: y allí llegó a ser una nación
  alternatives_spanish:
  - y allí se convirtió en una nación
  lexicon: HALOT
  rationale: El hebreo presenta al antepasado singular como representante de sus descendientes. «Llegó a ser» suena natural en español y conserva el desarrollo histórico implícito.
- source_word: גָּדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - poderoso
  - importante
  lexicon: HALOT
  rationale: «Grande» mantiene el valor básico del adjetivo y funciona bien dentro de la tríada final.
- source_word: עָצוּם
  english_pob_choice: mighty
  chosen_spanish: poderosa
  alternatives_spanish:
  - fuerte
  - vigorosa
  lexicon: HALOT
  rationale: En la combinación final, עָצוּם apunta a fuerza o poder. «Poderosa» conserva esa fuerza en español y encaja con el sustantivo colectivo «nación».
- source_word: רָב
  english_pob_choice: numerous
  chosen_spanish: numerosa
  alternatives_spanish:
  - mucha
  - abundante
  lexicon: HALOT
  rationale: «Numerosa» reproduce directamente la idea de multiplicación cuantitativa y mantiene el paralelismo con «grande» y «poderosa».
theological_decisions:
- issue: Interpretación de אֲרַמִּי אֹבֵד אָבִי
  english_pob_reading: My father was a perishing Aramean
  chosen_spanish_reading: Mi padre fue un arameo que perecía
  alternative_spanish_readings:
  - Mi padre fue un arameo errante
  - Un arameo quiso destruir a mi padre
  rationale: La POB inglesa revisada opta por reflejar más directamente el valor de אֹבֵד como «perishing». En español, «que perecía» mantiene esa lectura sin cerrar la ambigüedad histórica del sintagma. Se evita resolverlo a «errante», que corresponde a otra posibilidad léxica, o a una lectura más interpretativa sobre un agresor arameo que el hebreo no exige aquí.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Relación entre el original hebreo y el nombre divino
  english_pob_reading: before Yahweh your God
  chosen_spanish_reading: delante de Yahvé tu Dios
  alternative_spanish_readings:
  - delante del SEÑOR tu Dios
  - en presencia de Yahvé tu Dios
  rationale: Se sigue el principio del proyecto de no enmascarar el nombre divino con una sustitución convencional. «Yahvé» mantiene la transparencia textual y el valor de auditable source-grounding.
  doctrine_reference: 'Project terminology default: יהוה / YHWH -> Yahvé'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail en la que la POB inglesa cambió de «wandering Aramean» a «perishing Aramean». Por eso se eligió «un arameo que perecía» / «que perecía» para reflejar esa corrección y se mantuvo la estructura confesional y litúrgica del versículo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» según el estándar del proyecto para יְהוָה.
  - Se mantiene la secuencia formular «responderás y dirás» para reflejar el binomio verbal hebreo.
  - «Arameo» se usa con valor étnico preciso, no como «sirio».
  - 'La frase final preserva el paralelismo intensivo: «grande, poderosa y numerosa».'
  - La nota al pie recoge la alternativa semántica documentada para אֹבֵד sin imponerla en el texto principal.
