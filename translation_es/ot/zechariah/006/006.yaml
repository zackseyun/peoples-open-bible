translation:
  language: es
  text: Los caballos negros en ella salen hacia la tierra del norte[a], y los blancos han salido tras ellos, y los moteados han salido hacia la tierra del sur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la tierra de Temán», tomando תֵּימָן como el nombre propio Temán y no como el término direccional «sur».
    reason: alternative_reading
lexical_decisions:
- source_word: אֲשֶׁר בָּהּ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - que están en ella
  - la cual está en ella
  lexicon: HALOT
  rationale: El antecedente es el carro del contexto previo. En español, «en ella» conserva la referencia locativa de forma natural y evita una construcción relativa demasiado pesada.
- source_word: הַסּוּסִים
  english_pob_choice: horses
  chosen_spanish: los caballos
  alternatives_spanish:
  - los corceles
  lexicon: HALOT
  rationale: «Caballos» es el equivalente normal y claro de סוּסִים. «Corceles» sería más literario, pero menos directo.
- source_word: הַשְּׁחֹרִים
  english_pob_choice: black
  chosen_spanish: negros
  alternatives_spanish:
  - de color negro
  lexicon: HALOT
  rationale: El adjetivo de color se traduce de manera directa; «negros» mantiene la imagen del texto hebreo.
- source_word: יֹצְאִים
  english_pob_choice: are going out
  chosen_spanish: salen
  alternatives_spanish:
  - están saliendo
  - van saliendo
  lexicon: HALOT
  rationale: Aunque el inglés refleja el aspecto progresivo, en español «salen» comunica bien la acción en la visión sin sonar forzado. «Están saliendo» sería posible, pero más pesado.
- source_word: אֶל אֶרֶץ צָפוֹן
  english_pob_choice: to the land of the north
  chosen_spanish: hacia la tierra del norte
  alternatives_spanish:
  - a la tierra del norte
  - hacia el país del norte
  lexicon: HALOT
  rationale: «Tierra del norte» conserva la expresión hebrea de manera transparente. «Hacia» expresa movimiento, coherente con el verbo de salida.
- source_word: וְהַלְּבָנִים
  english_pob_choice: the white ones
  chosen_spanish: los blancos
  alternatives_spanish:
  - los caballos blancos
  - los blancos caballos
  lexicon: HALOT
  rationale: El hebreo omite el sustantivo repetido; en español puede conservarse la elipsis con «los blancos», aunque «los caballos blancos» sería una explicitación válida. Aquí se mantiene la brevedad del original.
- source_word: יָצְאוּ
  english_pob_choice: have gone out
  chosen_spanish: han salido
  alternatives_spanish:
  - salieron
  - salen
  lexicon: HALOT
  rationale: 'El perfecto se expresa mejor como acción ya realizada dentro de la secuencia visionaria: «han salido».'
- source_word: אֶל אֲחֲרֵיהֶם
  english_pob_choice: after them
  chosen_spanish: tras ellos
  alternatives_spanish:
  - detrás de ellos
  - siguiendo tras ellos
  lexicon: HALOT
  rationale: «Tras ellos» reproduce bien la idea de seguir en secuencia o ir detrás, sin duplicar innecesariamente la preposición.
- source_word: וְהַבְּרֻדִּים
  english_pob_choice: the dappled ones
  chosen_spanish: los overos
  alternatives_spanish:
  - los manchados
  - los pintos
  lexicon: HALOT
  rationale: ברֻדִּים describe una coloración moteada o mezclada de los caballos. «Overos» es un término español natural para caballos de pelaje jaspeado o mezclado y preserva mejor la especificidad equina que «manchados».
- source_word: אֶל אֶרֶץ הַתֵּימָן
  english_pob_choice: to the land of the south
  chosen_spanish: hacia la tierra del sur
  alternatives_spanish:
  - a la tierra del sur
  - hacia la tierra de Temán
  lexicon: HALOT
  rationale: La lectura direccional «sur» encaja con el paralelismo con «la tierra del norte» y con el movimiento de los carros en la visión. La posibilidad de «Temán» se mantiene como alternativa documentada.
theological_decisions:
- issue: Sentido de תֵּימָן en la visión
  english_pob_reading: south, with a footnoted alternative 'Teman'
  chosen_spanish_reading: sur, con nota alternativa 'Temán'
  alternative_spanish_readings:
  - Temán
  rationale: El paralelismo con «norte» favorece una lectura geográfica direccional. Sin embargo, como el término también puede funcionar como nombre propio, la nota conserva la tensión sin resolverla de forma indebida.
  doctrine_reference: Principio POB de preservar ambigüedad real con documentación explícita.
translation_notes:
  revision_awareness: El borrador sigue el sentido y las decisiones léxicas del POB inglés auditado. No se detectaron revisiones posteriores que alteraran el lema central; se mantiene la alternativa sobre תֵּימָן/Temán en nota, reflejando la misma tensión documentada en el contexto inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva la elipsis de «los blancos» y «los overos» para reflejar la economía del hebreo, aunque la explicitación de «caballos» sería idiomática.
  - «Tierra» traduce fielmente אֶרֶץ sin forzar «país», que podría sonar demasiado moderno o político en este contexto visionario.
