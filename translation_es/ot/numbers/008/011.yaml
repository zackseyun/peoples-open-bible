review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Aarón presenta a los levitas como תְּנוּפָה delante de Yahvé, procedentes/representando a los hijos de Israel, con propósito de servicio cultual. Conserva correctamente «Yahvé», «los hijos de Israel» y la nota alternativa sobre el valor representativo de מֵאֵת. Sin embargo, hay un problema de naturalidad y precisión en la cláusula final: «estarán para servir el servicio de Yahvé» suena forzado en español y «estarán» no expresa tan bien como «serán» la idea resultativa/identitaria de וְהָיוּ en este contexto.'
  spanish_quality_summary: La redacción es mayormente fiel y digna, pero requiere un ajuste menor para español bíblico natural. «Y Aarón» es aceptable por continuidad narrativa. «Ofrenda mecida» funciona bien para תְּנוּפָה. El principal tropiezo es «estarán para servir el servicio de Yahvé», que resulta poco idiomático; «serán para servir en el servicio de Yahvé» mejora la fluidez y mantiene la repetición cultual sin paráfrasis excesiva.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: יהוה → «Yahvé» correctamente; בני ישראל → «los hijos de Israel» conforme al criterio de fidelidad formal; תְּנוּפָה → «ofrenda mecida» adecuadamente técnica. No hay conflicto doctrinal relevante. La única corrección propuesta afecta la sintaxis española de וְהָיוּ לַעֲבֹד אֶת עֲבֹדַת יְהוָה.'
  issues:
  - severity: medium
    issue: 'Cláusula final poco natural en español: «estarán para servir el servicio de Yahvé»'
    rationale: Aunque intenta conservar el cognado hebreo, en español suena rígido y poco claro. «Serán para servir en el servicio de Yahvé» conserva mejor el valor resultativo de וְהָיוּ y la fuerza cultual de עֲבֹדַת sin perder fidelidad.
  revised_spanish_text: Y Aarón presentará a los levitas como ofrenda mecida[a] delante de Yahvé, de entre[b] los hijos de Israel, y serán para servir en el servicio de Yahvé.
  revised_footnotes:
  - marker: a
    text: O «mecerá a los levitas como ofrenda mecida». El verbo hebreo comparte raíz con el sustantivo técnico y alude a una presentación ritual.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «de parte de los hijos de Israel», indicando que los levitas son presentados como representantes de Israel en el servicio de Yahvé.
    reason: alternative_reading
  revision_rationale: 'Se ajusta únicamente la cláusula final para mejorar la naturalidad y precisión del español: «serán» refleja mejor la idea resultativa de וְהָיוּ que «estarán», y «servir en el servicio de Yahvé» mantiene el énfasis cultual del hebreo sin la rigidez de «servir el servicio». Se conservan intactos los términos clave del proyecto y las notas del audit trail.'
