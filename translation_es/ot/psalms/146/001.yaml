  glossary_alignment: Se alinea bien con la terminología del proyecto al usar «Yah» para יָהּ y «Yahvé» para יְהוָה. La nota sobre «Aleluya» también conserva adecuadamente la alternativa tradicional. El único ajuste necesario es estilístico-gramatical en la forma verbal plural del español meta.
