translation:
  language: es
  text: 'Entonces los setenta y dos regresaron con alegría[a], diciendo: «Señor, aun los demonios se nos someten en tu nombre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos dicen «los setenta» en lugar de «los setenta y dos».
    reason: textual_variant
lexical_decisions:
- source_word: Ὑπέστρεψαν
  english_pob_choice: returned
  chosen_spanish: regresaron
  alternatives_spanish:
  - volvieron
  - retornaron
  lexicon: BDAG
  rationale: El aoristo de ὑποστρέφω expresa que vuelven de la misión; «regresaron» es natural en español y conserva la idea de retorno sin sonar arcaico.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ marca avance narrativo; «Entonces» comunica esa transición de manera fluida en español.
- source_word: οἱ ἑβδομήκοντα δύο
  english_pob_choice: the seventy-two
  chosen_spanish: los setenta y dos
  alternatives_spanish:
  - los setenta
  lexicon: BDAG
  rationale: Se sigue el texto griego base que lee «setenta y dos». En español se mantiene la cifra completa para reflejar la lectura principal y no borrar la variante textual documentada.
- source_word: μετὰ χαρᾶς
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - alegres
  lexicon: BDAG
  rationale: La preposición con sustantivo de χαρά se vierte de forma directa con «con alegría», que conserva el matiz nominal y suena natural en español.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decían
  lexicon: BDAG
  rationale: El participio presente introductorio se refleja con «diciendo», manteniendo el vínculo con el discurso directo sin añadir material narrativo extra.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: El vocativo de κύριος dirigido a Jesús se traduce con «Señor», el equivalente reverente y eclesialmente comprensible en español.
- source_word: καὶ
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - también
  - incluso
  lexicon: BDAG
  rationale: 'En este contexto ascendente, καί expresa énfasis: «aun los demonios». «Aun» preserva el matiz de sorpresa resaltado por la lectura inglesa.'
- source_word: τὰ δαιμόνια
  english_pob_choice: the demons
  chosen_spanish: los demonios
  alternatives_spanish:
  - los espíritus malos
  - los malos espíritus
  lexicon: BDAG
  rationale: δαιμόνια designa seres espirituales hostiles; «demonios» es el equivalente directo y más transparente en español bíblico contemporáneo.
- source_word: ὑποτάσσεται
  english_pob_choice: submit
  chosen_spanish: se nos someten
  alternatives_spanish:
  - están sujetos a nosotros
  - se sujetan a nosotros
  lexicon: BDAG
  rationale: La forma pasiva/média expresa sujeción efectiva. «Se nos someten» comunica bien la idea de subordinación a nosotros sin forzar una traducción demasiado técnica.
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: se nos
  alternatives_spanish:
  - a nosotros
  - para nosotros
  lexicon: BDAG
  rationale: El dativo con ὑποτάσσω se integra en español con la construcción pronominal «se nos», que conserva el sentido relacional y la naturalidad sintáctica.
- source_word: ἐν τῷ ὀνόματί σου
  english_pob_choice: in your name
  chosen_spanish: en tu nombre
  alternatives_spanish:
  - por tu nombre
  - mediante tu nombre
  lexicon: BDAG
  rationale: 'La expresión idiomática se mantiene en su forma usual: «en tu nombre», que en español transmite autoridad/representación y evita sobreinterpretar el giro.'
theological_decisions:
- issue: Variante textual en el número de discípulos
  english_pob_reading: the seventy-two
  chosen_spanish_reading: los setenta y dos
  alternative_spanish_readings:
  - los setenta
  rationale: El texto griego proporcionado lee ἑβδομήκοντα δύο. La variante «los setenta» es importante y conocida, por lo que se preserva en nota sin sustituir la lectura principal.
  doctrine_reference: Principio de transparencia textual de la POB; preservación de variantes significativas
- issue: Título cristológico en el vocativo Κύριε
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: Como vocativo dirigido a Jesús, κύριος se conserva con el título reverente «Señor». Esta elección coincide con el valor doctrinal y lingüístico del pasaje sin reducirlo a un simple trato cortesano.
  doctrine_reference: 'Terminología cristológica POB: κύριος -> Lord/Señor'
- issue: Matiz de ascenso enfático en καί
  english_pob_reading: even
  chosen_spanish_reading: aun
  alternative_spanish_readings:
  - también
  - incluso
  rationale: 'El contexto exclamativo muestra un valor ascensivo: los discípulos se sorprenden de que hasta los demonios se sometan. «Aun» preserva esa fuerza sin añadir interpretación excesiva.'
  doctrine_reference: Retención de fuerza pragmática del original
translation_notes:
  revision_awareness: Se mantuvo la lectura principal del texto griego SBLGNT («los setenta y dos») y se preservó en nota la variante textual conocida («los setenta»). La sintaxis española se ajustó para sonar natural y fiel al valor aspectual/narrativo del griego, sin perder el énfasis de καί ni el carácter técnico de ὑποτάσσομαι.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en vocativo dirigido a Jesús, en coherencia con la terminología cristológica del proyecto.
  - Se usa «demonios» para δαιμόνια por transparencia léxica y consistencia con el uso bíblico contemporáneo en español.
  - Se mantiene «en tu nombre» como giro idiomático de autoridad/representación, sin sustituirlo por una paráfrasis explicativa.
