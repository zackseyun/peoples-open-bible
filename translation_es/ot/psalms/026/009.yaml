translation:
  language: es
  text: No reúnas[a] mi alma con los pecadores, ni mi vida con hombres de sangre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No arrastres mi alma con los pecadores». El verbo puede implicar ser quitado o reunido junto con los impíos en juicio.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «hombres de sangres», un modismo hebreo para hombres violentos o culpables de sangre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֶּאֱסֹף
  english_pob_choice: gather
  chosen_spanish: juntes
  alternatives_spanish:
  - reúnas
  - saques
  - arrastres
  lexicon: HALOT
  rationale: אָסַף puede significar 'reunir/juntar', y en este contexto de súplica judicial conserva la imagen de ser contado o reunido con los impíos en su destino. 'Juntes' suena natural en español y mantiene la fuerza del pedido negativo sin volverlo interpretativo de más.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - a mí
  lexicon: HALOT
  rationale: Se conserva 'alma' para mantener el paralelismo poético con 'mi vida' al final del verso. Aunque נֶפֶשׁ puede abarcar 'vida' o 'yo', aquí la distinción con חַיַּי favorece una traducción diferenciada.
- source_word: חַטָּאִים
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - gente pecadora
  - personas pecadoras
  lexicon: HALOT
  rationale: El sustantivo designa a quienes se caracterizan por el pecado. 'Pecadores' es un equivalente directo, claro y acorde con el registro bíblico en español.
- source_word: אַנְשֵׁי דָמִים
  english_pob_choice: men of bloodshed
  chosen_spanish: hombres de sangre
  alternatives_spanish:
  - hombres de sangre derramada
  - hombres sanguinarios
  - hombres de sangre derramada y violencia
  lexicon: HALOT
  rationale: El hebreo literal es 'hombres de sangres', un modismo para personas violentas o culpables de sangre. 'Hombres de sangre' preserva la expresión idiomática y deja visible la dureza del original sin restringirla solo a 'asesinos'.
- source_word: חַיָּי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi ser
  - mi existencia
  lexicon: HALOT
  rationale: En paralelo con נַפְשִׁי, חַיַּי se traduce naturalmente como 'mi vida'. Así se mantiene la segunda mitad del paralelismo sin nivelar ambos miembros en una sola glosa.
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagas que
  - No permitas que
  lexicon: HALOT
  rationale: אַל introduce una negativa súplica/prohibición. En español, comenzar con 'No' es conciso, idiomático y suficientemente solemne para el tono de oración del salmo.
theological_decisions:
- issue: Paralelismo antropológico entre 'alma' y 'vida'
  english_pob_reading: 'Retain both as distinct poetic terms: ''my soul'' and ''my life''.'
  chosen_spanish_reading: Mantener 'mi alma' y 'mi vida' como términos distintos del paralelismo poético.
  alternative_spanish_readings:
  - '''mí'' y ''mi vida'''
  - '''mi vida'' y ''mi ser'''
  rationale: El verso no exige resolver la antropología en términos técnicos; el hebreo usa dos términos relacionados pero distintos. La traducción conserva esa tensión poética y evita diluir una de las mitades del paralelismo.
  doctrine_reference: Preservar la tensión teológica sin imponer una antropología más precisa que la del texto.
translation_notes:
  revision_awareness: El texto griego/inglés de control mantiene la tensión entre אָסַף como 'gather' y la posible idea de ser 'taken away' o 'swept away' en juicio. La versión española conserva esa ambigüedad con 'No juntes' y una nota alternativa. También preserva el paralelismo entre נַפְשִׁי y חַיָּי mediante 'mi alma' / 'mi vida'.
  spanish_consistency_notes:
  - Se usa 'alma' para נַפְשִׁי en armonía con la decisión inglesa de distinguirlo de חַיָּי.
  - Se evita 'SEÑOR' porque el verso no contiene el Tetragrámaton ni κύριος.
  - Se mantiene un registro bíblico claro, sin sustituir 'hombres de sangre' por un término más interpretativo como 'asesinos'.
