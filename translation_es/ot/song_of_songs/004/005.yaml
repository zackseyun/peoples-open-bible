translation:
  language: es
  text: Tus dos pechos son como dos cervatillos[a], gemelos de una gacela, que pacen entre los lirios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gemelos de una cierva». El hebreo צְבִיָּה puede referirse de manera más general a una hembra de animal parecido al ciervo; se retiene «gacela» para conservar la imaginería recurrente de Cantares.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁנֵי שָׁדַיִךְ
  english_pob_choice: your two breasts
  chosen_spanish: tus dos pechos
  alternatives_spanish:
  - tus pechos
  lexicon: HALOT
  rationale: Conservo el numeral explícito «dos», porque el hebreo lo presenta de forma marcada y prepara el paralelo con «dos cervatillos». «Pechos» es el equivalente directo y natural en español para el sentido anatómico del pasaje.
- source_word: כִּשְׁנֵי
  english_pob_choice: are like two
  chosen_spanish: son como dos
  alternatives_spanish:
  - como dos
  lexicon: HALOT
  rationale: El hebreo usa la comparación con כִּ. En español se expresa con claridad mediante «son como», manteniendo el número explícito por la paralela intensificación poética.
- source_word: עֳפָרִים
  english_pob_choice: fawns
  chosen_spanish: cervatillos
  alternatives_spanish:
  - ciervos jóvenes
  - gamos jóvenes
  lexicon: HALOT
  rationale: «Cervatillos» transmite bien la imagen de crías de un animal cervino en español natural y poético. Mantiene la ternura y el paralelismo con la comparación animal del verso.
- source_word: תְּאוֹמֵי
  english_pob_choice: twins
  chosen_spanish: gemelos
  alternatives_spanish:
  - gemelas
  - una pareja
  lexicon: HALOT
  rationale: «Gemelos» conserva la idea de dos crías pareadas. En español funciona como adjetivo sustantivado en una construcción poética y refleja el hebreo de forma directa.
- source_word: צְבִיָּה
  english_pob_choice: of a gazelle
  chosen_spanish: de una gacela
  alternatives_spanish:
  - de una cierva
  - de una doe
  lexicon: HALOT
  rationale: Sigo la opción del POB inglés para preservar la imaginería recurrente de Cantares. «Gacela» es más específico y literariamente estable en español que una traducción más general de animal cervino.
- source_word: הָרֹעִים
  english_pob_choice: grazing
  chosen_spanish: que pacen
  alternatives_spanish:
  - que comen
  - pastando
  lexicon: HALOT
  rationale: El participio describe animales alimentándose. «Que pacen» es natural y preciso en español, y conserva la escena pastoral sin volverla explicativa de más.
- source_word: בַּשּׁוֹשַׁנִּים
  english_pob_choice: among the lilies
  chosen_spanish: entre los lirios
  alternatives_spanish:
  - entre las flores
  - en los lirios
  lexicon: HALOT
  rationale: «Lirios» sigue el valor tradicional y probable de שׁוֹשַׁנִּים. «Entre» reproduce mejor la relación espacial/poética que un simple «en».
translation_notes:
  revision_awareness: El texto coincide con el sentido y la imaginería del hebreo WLC y con el audit trail inglés de la POB; no se requirieron revisiones adicionales.
  spanish_consistency_notes:
  - Se mantiene la duplicación numérica «dos ... dos ... gemelos» para reflejar el paralelismo hebreo.
  - Se usa «gacela» como término imagístico consistente con la decisión inglesa del POB.
  - El registro es poético y claro, sin añadir interpretación sexual o alegórica no presente en el texto.
  - «Pechos» se usa en sentido anatómico directo, evitando eufemismos que debiliten el paralelismo.
