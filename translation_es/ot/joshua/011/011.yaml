    reason: lexical_alternative
  - marker: b
    text: Hebrew 'not any breath remained,' an idiom meaning that no survivor was left.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew shifts from plural ('they struck down') to singular ('he burned'), likely referring specifically to Joshua in the final clause.
    reason: alternative_reading
