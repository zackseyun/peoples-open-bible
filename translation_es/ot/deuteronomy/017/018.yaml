translation:
  language: es
  text: Y cuando se siente sobre el trono de su reino, escribirá para sí en un libro una copia de esta ley, de ante[a] los sacerdotes levitas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de la copia guardada ante los sacerdotes levitas», es decir, de un ejemplar autorizado bajo custodia sacerdotal.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «los sacerdotes, los levitas»; tradicionalmente se vierte «los sacerdotes levitas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כְשִׁבְתּוֹ
  english_pob_choice: And when he sits
  chosen_spanish: Y cuando se siente
  alternatives_spanish:
  - Y cuando se siente
  - Y cuando esté sentado
  lexicon: HALOT
  rationale: La construcción introduce una circunstancia temporal legal. En español, «cuando se siente» comunica bien el inicio/estado de su asiento en el trono sin sonar forzado.
- source_word: עַל כִּסֵּא מַמְלַכְתּוֹ
  english_pob_choice: on the throne of his kingdom
  chosen_spanish: sobre el trono de su reino
  alternatives_spanish:
  - en el trono de su reino
  - sobre su trono real
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de «trono» y la relación posesiva «de su reino». «Sobre» refleja el valor de עַל con naturalidad en español bíblico.
- source_word: וְכָתַב לוֹ
  english_pob_choice: he shall write for himself
  chosen_spanish: escribirá para sí
  alternatives_spanish:
  - deberá escribir para sí
  - escribirá para él mismo
  lexicon: HALOT
  rationale: El dativo לוֹ tiene valor de ventaja/reflexivo; «para sí» expresa bien que la copia es para uso propio del rey. «Escribirá» conserva el matiz prescriptivo del contexto legal.
- source_word: מִשְׁנֵה
  english_pob_choice: a copy
  chosen_spanish: una copia
  alternatives_spanish:
  - un duplicado
  - una segunda copia
  lexicon: HALOT
  rationale: En este contexto, מִשְׁנֵה indica un ejemplar/copia autorizada, no una repetición abstracta. «Una copia» es la opción más clara y natural.
- source_word: הַתּוֹרָה הַזֹּאת
  english_pob_choice: this law
  chosen_spanish: esta ley
  alternatives_spanish:
  - esta instrucción
  - esta Torá
  lexicon: HALOT
  rationale: En el contexto jurídico de Deuteronomio, תּוֹרָה se entiende como cuerpo normativo. «Ley» es la equivalencia más natural y precisa en español para este pasaje.
- source_word: עַל סֵפֶר
  english_pob_choice: in a book
  chosen_spanish: en un libro
  alternatives_spanish:
  - en un rollo
  - sobre un documento
  lexicon: HALOT
  rationale: Aunque el referente antiguo puede ser un rollo, el español «libro» mantiene la referencia a un escrito/copia de manera entendible. «En un libro» sigue el valor comunicativo del texto base.
- source_word: מִלִּפְנֵי
  english_pob_choice: from before
  chosen_spanish: de delante de
  alternatives_spanish:
  - de la presencia de
  - de ante
  lexicon: HALOT
  rationale: Se preserva la literalidad de la preposición compuesta para no ocultar la relación espacial/textual con el ejemplar custodiado por los sacerdotes. «De delante de» mantiene la transparencia del hebreo.
- source_word: הַכֹּהֲנִים הַלְוִיִּם
  english_pob_choice: the Levitical priests
  chosen_spanish: los sacerdotes levitas
  alternatives_spanish:
  - los sacerdotes, los levitas
  - los levitas sacerdotales
  lexicon: HALOT
  rationale: El hebreo es una construcción apposicional; «sacerdotes levitas» expresa de forma natural en español la relación entre sacerdocio y tribu de Leví. Se evita una traducción excesivamente segmentada.
theological_decisions:
- issue: Naturaleza de תּוֹרָה en este contexto
  english_pob_reading: Rendered as 'this law' rather than 'this instruction' or 'this Torah.'
  chosen_spanish_reading: «esta ley»
  alternative_spanish_readings:
  - «esta instrucción»
  - «esta Torá»
  rationale: El versículo está en un contexto de obligación real y normativa. «Ley» comunica el alcance jurídico inmediato sin expandir el sentido más allá de lo que exige el pasaje.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido de la fuente de la copia
  english_pob_reading: Main text keeps 'from before the Levitical priests' with explanatory footnote.
  chosen_spanish_reading: «de delante de los sacerdotes levitas»
  alternative_spanish_readings:
  - «de la copia conservada ante los sacerdotes levitas»
  - «en presencia de los sacerdotes levitas»
  rationale: La frase hebrea probablemente alude a un ejemplar autorizado custodiado por los sacerdotes. La redacción principal se mantiene cercana al hebreo, y la nota aclara la posible implicación sin convertirla en paráfrasis en el texto principal.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de control cruzado fue alto, con observaciones menores, así que se mantiene una redacción cercana al hebreo y transparente en el punto de la fuente de la copia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma preferida en el proyecto cuando el Tetragrámaton aparezca; aquí no ocurre.
  - «Ley» traduce תּוֹרָה en su sentido jurídico inmediato, coherente con Deuteronomio.
  - «Sacerdotes levitas» conserva la construcción apposicional del hebreo sin recurrir a un eclesiasticismo innecesario.
