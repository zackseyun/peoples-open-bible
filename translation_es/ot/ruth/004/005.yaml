base_translation:
  language: en
  yaml_path: translation/ot/ruth/004/005.yaml
  text: Then Boaz said[a], “On the day you acquire the field from the hand of Naomi, you also acquire Ruth the Moabite, the wife of the dead man[c][b], in order to raise up the name of the dead on his inheritance.”
  footnotes:
  - marker: a
    text: Hebrew text reads literally, 'I acquired' (or 'I have acquired') Ruth the Moabite; many understand the sense here as 'you also acquire' in context.
    reason: textual_variant
  - marker: b
    text: Or 'the dead man’s wife.'
    reason: lexical_alternative
  - marker: c
    text: That is, to preserve the deceased man’s family line and claim within his inherited property.
    reason: cultural_note
