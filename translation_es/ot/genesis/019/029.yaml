    issue: «sacó a Lot» sobreinterpreta וַיְשַׁלַּח אֶת לוֹט
    rationale: El hebreo usa שׁלח, 'enviar', no un verbo explícito de 'sacar'. En contexto de liberación, «hizo salir a Lot» conserva mejor el matiz causativo sin añadir demasiado.
  - severity: medium
