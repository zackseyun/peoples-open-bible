revisions:
- from: También él anduvo[a] según su consejo, y fue con Joram, hijo de Acab, rey de Israel, a la guerra contra Hazael, rey de Aram, en Ramot-galaad[b][c]; y los arameos hirieron a Joram.
  to: Él también anduvo[a] según sus consejos, y fue con Jehoram, hijo de Acab, rey de Israel, a la guerra contra Hazael, rey de Aram, en Ramot de Galaad[b][c]; y los arameos hirieron a Joram.
