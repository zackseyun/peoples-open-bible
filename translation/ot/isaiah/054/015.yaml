id: ISA.54.15
reference: Isaiah 54:15
source:
  edition: WLC
  text: הֵ֣ן גּ֥וֹר יָג֛וּר אֶ֖פֶס מֵֽ/אוֹתִ֑/י מִי גָ֥ר אִתָּ֖/ךְ עָלַ֥יִ/ךְ יִפּֽוֹל־׃
translation:
  text: Look[a], if anyone stirs up strife, it is not from me[c][b]; whoever stirs up strife with you will fall before you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'surely gathers'; the Hebrew verb גור can denote gathering/sojourning, but in this context it refers to hostile opposition.
    reason: lexical_alternative
  - marker: b
    text: Or 'not by me' / 'apart from me.'
    reason: lexical_alternative
  - marker: c
    text: Or 'will fall before you' or, more literally, 'will fall upon you.' The context favors the sense of the aggressor's downfall rather than successful attack.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Surely
  lexicon: HALOT
  rationale: Introduces an emphatic assertion or attention-getter. 'Look' is natural modern English while preserving the deictic force better than a flat omission.
- source_word: גּוֹר יָגוּר
  chosen: stirs up strife
  alternatives:
  - surely gathers
  - attacks
  - sojourns/assembles
  lexicon: HALOT
  rationale: The infinitive absolute + imperfect of גור intensifies the verbal idea. In this context of hostile opposition against Zion, the sense is not neutral 'sojourn' but hostile gathering/attacking. 'Stirs up strife' captures adversarial mobilization in readable English without over-specifying military imagery.
- source_word: אֶפֶס מֵאוֹתִי
  chosen: it is not from me
  alternatives:
  - not by me
  - apart from me
  - without me
  lexicon: HALOT
  rationale: This phrase denies YHWH as the source or authorization of the hostile action. 'It is not from me' is idiomatic and preserves the causal/source nuance better than the more wooden 'not by me.'
- source_word: מִי
  chosen: whoever
  alternatives:
  - who
  - anyone who
  lexicon: HALOT
  rationale: Indefinite/interrogative used here in a relative-like sense. 'Whoever' fits the conditional-proverbial force in English.
- source_word: גָר
  chosen: stirs up strife
  alternatives:
  - gathers himself
  - attacks
  - sojourns
  lexicon: HALOT
  rationale: Same lemma as earlier in the verse; consistency is maintained with a hostile sense demanded by context. Repeating the same English phrase reflects the Hebrew repetition.
- source_word: אִתָּךְ
  chosen: with you
  alternatives:
  - against you
  lexicon: HALOT
  rationale: Literally 'with you.' In context it refers to hostile engagement involving Zion. The main text keeps the more literal 'with you' and lets the surrounding clause convey the adversarial sense.
- source_word: עָלַיִךְ יִפּוֹל
  chosen: will fall because of you
  alternatives:
  - will fall against you
  - will fall before you
  - will fall upon you
  lexicon: HALOT
  rationale: נפל with על can be construed in several ways here. In context of promised vindication, the sense is that the attacker comes to ruin in relation to Zion, not that he successfully falls upon her. 'Will fall because of you' communicates defeat tied to opposition against her while avoiding a misleading image of successful assault.
