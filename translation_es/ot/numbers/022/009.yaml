- from: 'Entonces Dios vino a Balaam y dijo: «¿Quiénes son estos hombres que están contigo?»'
  to: 'Entonces Dios vino a Balaam y dijo: «¿Quiénes son estos hombres contigo?»'
  rationale: Se elimina «que están» porque no corresponde a ningún elemento explícito del hebreo y añade una pequeña explicación innecesaria. El resto del versículo es fiel, claro y terminológicamente adecuado.
  reviewer_model: gpt-5.4
