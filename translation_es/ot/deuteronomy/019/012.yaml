review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido del hebreo: los ancianos envían, toman al hombre de allí, lo entregan al vengador de la sangre y el resultado legal es que muere. También conserva la nota léxica sobre גֹּאֵל הַדָּם. Sin embargo, en español "lo enviarán" desaline­a el objeto directo con el hebreo y con el inglés POB: no se envía al homicida, sino que los ancianos "enviarán" en el sentido de despachar a alguien/mandar por él. Dado que el hebreo no expresa objeto para וְשָׁלְחוּ, conviene evitar introducir "lo".'
  spanish_quality_summary: El texto es generalmente claro y digno, pero "lo enviarán" suena poco natural en contexto y puede hacer pensar que el hombre es enviado, cuando acto seguido es tomado de allí. Una formulación más natural y fiel es "mandarán por él", que refleja el valor administrativo/jurídico de שׁלח aquí y enlaza bien con "lo sacarán/tomarán de allí". Además, "entregarán en manos de" es idiomático, aunque "entregarán al" también sería posible; no hace falta cambiarlo.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. "Ancianos", "ciudad" y "vengador de la sangre" son aceptables y coherentes con el rastro léxico. La nota alternativa "el vengador de sangre" también está bien. El único ajuste necesario es el verbo de שׁלח para no introducir un objeto que el hebreo no tiene.
  issues:
  - severity: medium
    issue: '"lo enviarán" añade un objeto directo incorrecto a וְשָׁלְחוּ'
    rationale: El hebreo dice simplemente "enviarán"; en este contexto legal significa que los ancianos mandarán por él o enviarán a buscarlo. Decir "lo enviarán" sugiere que envían al homicida, lo cual choca con la acción siguiente "lo tomarán de allí" y no refleja bien el source evidence ni el inglés POB.
  - severity: low
    issue: Posible mejora de naturalidad en la extracción desde la ciudad de refugio
    rationale: '"Lo tomarán de allí" es defendible y bastante literal, pero "lo sacarán de allí" suena más natural en español para remover a alguien de un lugar de asilo. Aun así, no es obligatorio; el problema principal es el primer verbo.'
  revised_spanish_text: Entonces los ancianos de su ciudad mandarán por él, lo tomarán de allí y lo entregarán en manos del vengador de la sangre[a], y morirá.
  revised_footnotes:
  - marker: a
    text: O «el vengador de sangre». La expresión hebrea גֹּאֵל הַדָּם es un término jurídico técnico para la persona responsable de vengar la sangre derramada.
    reason: lexical_alternative
  revision_rationale: Se corrige únicamente el primer verbo para reflejar mejor el hebreo sin objeto expreso y evitar el sentido erróneo de que el homicida es enviado. "Mandarán por él" transmite de manera natural que los ancianos disponen su captura/traslado desde allí. Se conservan las demás elecciones, incluida la nota técnica sobre גֹּאֵל הַדָּם, porque son fieles y claras.
