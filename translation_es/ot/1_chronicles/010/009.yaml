translation:
  language: es
  text: Lo despojaron, tomaron su cabeza y sus armas, y enviaron aviso por toda la tierra de los filisteos, para proclamar la noticia a sus ídolos[a] y al pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus imágenes». El término hebreo puede referirse a imágenes idolátricas; «ídolos» se eligió porque el contexto es cultual y polémico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּפְשִׁיטֻהוּ
  english_pob_choice: They stripped him
  chosen_spanish: Lo despojaron
  alternatives_spanish:
  - Lo desvistieron
  - Lo despojaron de sus ropas
  lexicon: HALOT
  rationale: El verbo expresa quitarle algo al cuerpo o al vencido; en este contexto bélico, «despojaron» comunica la acción con naturalidad y mantiene la concisión del hebreo. «Lo desvistieron» suena demasiado literal y puede sugerir desnudez más que saqueo bélico.
- source_word: וַיִּשְׂאוּ אֶת רֹאשׁוֹ
  english_pob_choice: took his head
  chosen_spanish: tomaron su cabeza
  alternatives_spanish:
  - llevaron su cabeza
  - alzaron su cabeza
  lexicon: HALOT
  rationale: נשא puede significar tomar, llevar o levantar. En este contexto de trofeo de guerra, «tomaron su cabeza» sigue de cerca el valor de captura sin añadir más de lo que dice el texto.
- source_word: כֵּלָיו
  english_pob_choice: his weapons
  chosen_spanish: sus armas
  alternatives_spanish:
  - su armamento
  - su equipo
  - sus utensilios
  lexicon: HALOT
  rationale: כְּלִי es amplio, pero en un contexto de combate la referencia más probable es el armamento. «Armas» es la opción más natural en español y reproduce la decisión contextual del inglés POB.
- source_word: וַיְשַׁלְּחוּ
  english_pob_choice: sent word
  chosen_spanish: enviaron aviso
  alternatives_spanish:
  - enviaron palabra
  - mandaron aviso
  - enviaron mensaje
  lexicon: HALOT
  rationale: El hebreo dice simplemente «enviaron», y el infinitivo siguiente aclara el propósito de anunciar. «Enviaron aviso» conserva la idea de comunicación pública sin introducir explícitamente mensajeros, siguiendo la revisión inglesa que prefirió no añadir un objeto no expresado.
- source_word: בְאֶרֶץ פְלִשְׁתִּים סָבִיב
  english_pob_choice: throughout the land of the Philistines
  chosen_spanish: por toda la tierra de los filisteos
  alternatives_spanish:
  - en toda la tierra de los filisteos
  - alrededor de la tierra de los filisteos
  lexicon: HALOT
  rationale: סָבִיב funciona adverbialmente con sentido distributivo de totalidad alrededor. «Por toda la tierra de los filisteos» suena natural en español y comunica la extensión del recorrido o difusión.
- source_word: לְבַשֵּׂר
  english_pob_choice: to proclaim the news
  chosen_spanish: para proclamar la noticia
  alternatives_spanish:
  - para anunciar
  - para dar la noticia
  - para pregonar la noticia
  lexicon: HALOT
  rationale: בשר aquí no tiene tono de «evangelio» sino de anuncio público de una victoria. «Proclamar la noticia» conserva ese carácter ceremonial y evita un sentido doctrinal ajeno.
- source_word: עֲצַבֵּיהֶם
  english_pob_choice: their idols
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus imágenes
  - sus estatuas
  - sus ídolos tallados
  lexicon: HALOT
  rationale: El término puede referirse a imágenes idolátricas con carga polémica. «Ídolos» mantiene la valoración negativa implícita en el contexto bíblico y es la opción más clara para lectores de español.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de ellos
  - la población
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo definido. «El pueblo» conserva esa forma colectiva y suena más fiel y formal que «la gente».
theological_decisions:
- issue: עֲצַבֵּיהֶם como referencia cultual negativa
  english_pob_reading: their idols
  chosen_spanish_reading: sus ídolos
  alternative_spanish_readings:
  - sus imágenes
  rationale: El texto presenta la noticia como proclamada ante objetos cultuales paganos. «Ídolos» preserva la carga polémica del hebreo y la lectura del POB inglés sin añadir una explicación doctrinal extrabíblica.
  doctrine_reference: Éxodo 20:3-5; Salmo 115:4-8
- issue: Valor de לְבַשֵּׂר en un contexto de victoria militar
  english_pob_reading: to proclaim the news
  chosen_spanish_reading: para proclamar la noticia
  alternative_spanish_readings:
  - para anunciar la noticia
  rationale: En este versículo, el verbo no sugiere «buena nueva» en sentido técnico, sino la difusión pública de un hecho bélico. «Proclamar la noticia» evita una lectura cristianizada del término y conserva su fuerza informativa.
  doctrine_reference: 2 Samuel 1:20; 1 Samuel 31:9
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del POB en inglés: se evitó introducir «mensajeros» y se optó por una fórmula de envío más directa («enviaron aviso»). También se mantuvo la decisión de traducir עֲצַבֵּיהֶם con un término de tono polémico y cultual, no neutralizando el matiz.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «ídolos» en lugar de «imágenes» en el texto principal para conservar la carga negativa del contexto; la alternativa queda documentada en nota.
  - «Pueblo» traduce el colectivo definido הָעָם sin añadir posesivo, en línea con el hebreo y con el registro bíblico español.
  - «Sus armas» sigue la decisión contextual del inglés POB para כֵּלָיו en un escenario de guerra, aunque el término hebreo es más amplio.
