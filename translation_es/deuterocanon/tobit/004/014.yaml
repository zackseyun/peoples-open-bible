base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/004/014.yaml
  text: Do not let the wages of any person who works for you stay overnight with you[a], but pay him at once. If you serve God, it will be repaid to you. Watch yourself, child, in all your works[b], and be disciplined in all your conduct.
  footnotes:
  - marker: a
    text: Or, more literally, 'Do not let the wages ... spend the night with you.' The Greek uses overnight imagery to forbid delaying payment.
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'it will be repaid to you,' leaving the agent implicit; the sense is that God will repay.
    reason: alternative_reading
