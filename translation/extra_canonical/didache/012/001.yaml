translation:
  text: 'But let everyone who comes in the name of the Lord be received; then, after testing him, you will know him, for you will have understanding of right and left. But if the one who comes is a traveler, help him as much as you can; he shall not remain with you for more than two or three days, should there be a need. But if he wants to settle among you and is a craftsman, let him work and eat. But if he has no trade, plan, according to your understanding, how a Christian may not live idle among you. But if he is not willing to do so, he is a Christ-trader; watch out for such people.'
