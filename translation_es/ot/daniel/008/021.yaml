translation:
  language: es
  text: Y el macho cabrío peludo es el rey de Grecia[a][b], y el gran cuerno que está entre sus ojos es el primer rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'el macho cabrío' o simplemente 'el cabrío'. La expresión hebrea es más vívida, pues describe un macho cabrío con pelo abundante.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'Javán', un término que aquí suele referirse a Grecia o al ámbito griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצָּפִיר הַשָּׂעִיר
  english_pob_choice: the shaggy male goat
  chosen_spanish: el macho cabrío peludo
  alternatives_spanish:
  - el macho cabrío
  - el macho cabrío de pelo largo
  - el macho cabrío áspero/peludo
  lexicon: HALOT
  rationale: La doble expresión hebrea combina la idea de un macho cabrío con un rasgo visible de pelambre. 'Macho cabrío peludo' conserva el color descriptivo sin perder naturalidad en español. 'Cabrío' mantiene el valor zoológico y evita suavizar la imagen a solo 'cabra' o 'goat' genérico.
- source_word: מֶלֶךְ יָוָן
  english_pob_choice: the king of Greece
  chosen_spanish: el rey de Grecia
  alternatives_spanish:
  - el rey de Javán
  - el rey del reino griego
  - el rey de la tierra de Javán
  lexicon: HALOT
  rationale: En este contexto יָוָן designa Grecia o el poder griego, no simplemente el nombre propio antiguo 'Javán'. 'Rey de Grecia' refleja la interpretación adoptada por la POB inglesa y mantiene la singularidad personal de מֶלֶךְ.
- source_word: הַקֶּרֶן הַגְּדוֹלָה
  english_pob_choice: the great horn
  chosen_spanish: el gran cuerno
  alternatives_spanish:
  - el gran cuerno
  - el cuerno grande
  - el cuerno poderoso
  lexicon: HALOT
  rationale: '''Cuerno'' preserva la imagen simbólica y ''gran'' reproduce el matiz de prominencia/tamaño con la misma sencillez que el inglés auditado. ''Gran cuerno'' es más idiomático que ''cuerno grande'' en español bíblico actual.'
- source_word: אֲשֶׁר בֵּין עֵינָיו
  english_pob_choice: that is between his eyes
  chosen_spanish: que está entre sus ojos
  alternatives_spanish:
  - que estaba entre sus ojos
  - que estaba entre sus ojos
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula relativa descriptiva sin énfasis temporal fuerte. 'Está' funciona bien en español para una descripción visual presente; 'sus' sigue el sufijo masculino singular y conserva la personificación del animal/visión.
- source_word: הוּא הַמֶּלֶךְ הָרִאשׁוֹן
  english_pob_choice: is the first king
  chosen_spanish: es el primer rey
  alternatives_spanish:
  - es el primer rey
  - es el rey primero
  - es el primer gobernante
  lexicon: HALOT
  rationale: '''Primer rey'' reproduce el valor ordinal de רִאשׁוֹן y mantiene la correspondencia terminológica con מֶלֶךְ. ''Primer'' es más fiel que ''anterior'' o ''primero'' como adjetivo pospuesto.'
theological_decisions:
- issue: Identidad simbólica del macho cabrío y el cuerno grande
  english_pob_reading: 'The verse is rendered as the angelic interpretation of the vision: the goat represents the king of Greece, and the great horn represents the first king.'
  chosen_spanish_reading: 'El versículo presenta la interpretación del ángel: el macho cabrío representa al rey de Grecia, y el gran cuerno representa al primer rey.'
  alternative_spanish_readings:
  - El macho cabrío representa al reino griego en conjunto.
  - El gran cuerno representa al primer gobernante.
  rationale: El hebreo nombra explícitamente 'rey de Grecia' y luego identifica el cuerno como 'el primer rey'. La redacción española conserva esa interpretación sin extenderla en el texto principal a una identificación histórica posterior que el versículo no formula por sí mismo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La POB inglesa mantuvo la interpretación simbólica del texto y no requirió revisiones en el pasaje auditado; el presente borrador sigue esa lectura con equivalencia óptima y conserva las alternativas léxicas relevantes en notas.
  spanish_consistency_notes:
  - Se usa 'Grecia' en el texto principal, no 'Javán', porque el contexto interpreta el término como el poder griego.
  - Se mantiene 'rey' y no 'reino' para respetar el singular de מֶלֶךְ en el hebreo.
  - '''Gran cuerno'' conserva la imaginería profética sin introducir un lenguaje más explicativo que el fuente.'
  - Se prefiere 'macho cabrío' frente a 'cabra' por precisión zoológica y por concordar con la imagen masculina del hebreo.
