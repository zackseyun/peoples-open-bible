base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/019/004.yaml
  text: Jonathan spoke well of David to Saul his father[a], and said to him, “Let not the king sin against his servant David, because he has not sinned against you[b], and because his deeds have been very good for you.”
  footnotes:
  - marker: a
    text: Or 'spoke favorably about David.' The Hebrew idiom literally says 'spoke good concerning David.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Let not the king sin against his servant, against David' repeats the object for emphasis.
    reason: lexical_alternative
