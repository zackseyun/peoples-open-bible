review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura general del versículo y conserva las notas clave sobre la ambigüedad de לַמְצַד מִדְבָּרָה y el valor idiomático de עֹרְכֵי צִנָּה וָרֹמַח. Sin embargo, dos decisiones debilitan la fidelidad: «para ir a David» añade una finalidad/movimiento más explícito que el simple אֶל דָּוִיד, y «refugio» atenúa el sentido militar de מְצַד, que en este contexto se entiende mejor como «fortaleza». También conviene ajustar «hombres valientes» a una formulación que preserve mejor גִּבֹּרֵי הַחַיִל.'
  spanish_quality_summary: El español es claro y legible, pero puede sonar más natural y preciso con pequeños ajustes. «Se separaron hacia David» o «se unieron a David» serían opciones, pero para máxima cercanía al texto base conviene «se separaron para ir con David, a la fortaleza en el desierto» solo si se justificara; mejor aún, simplificar a «se separaron para ir a David» corrigiendo luego el lugar. Para evitar adición interpretativa, la mejor solución es «se apartaron hacia David, a la fortaleza en el desierto». Además, «hombres poderosos y valientes» refleja mejor la fuerza militar del hebreo que solo «hombres valientes».
  glossary_alignment: 'No hay términos teológicos sensibles del glosario principal en este versículo. La revisión propuesta mejora la correspondencia léxica con las decisiones POB: מְצַד -> «fortaleza» en vez de «refugio»; גִּבֹּרֵי הַחַיִל -> «hombres poderosos y valientes»; אֶל דָּוִיד -> una forma más directa sin ampliar indebidamente el sentido.'
  issues:
  - severity: medium
    issue: «para ir a David» sobretraduce אֶל דָּוִיד
    rationale: El hebreo dice simplemente «a/hacia David». «Para ir a» introduce una finalidad o matiz verbal no expresado directamente en el original.
  - severity: medium
    issue: «refugio» debilita el sentido de מְצַד
    rationale: מְצַד en este contexto militar y narrativo se entiende mejor como «fortaleza» o «baluarte». «Refugio» suena menos fortificado y menos preciso.
  - severity: low
    issue: «hombres valientes» queda algo corto para גִּבֹּרֵי הַחַיִל
    rationale: La expresión hebrea apunta a hombres de fuerza/proeza militar, no solo valentía. Una formulación como «hombres poderosos y valientes» o «valientes guerreros» preserva mejor la densidad del original.
  revised_spanish_text: Algunos de los gaditas se apartaron hacia David, a la fortaleza en el desierto[a]; hombres poderosos y valientes, hombres entrenados para la guerra, capaces de manejar escudo y lanza[b], cuyos rostros eran como rostros de león, y que eran veloces como gacelas sobre los montes[c].
