theological_decisions:
- issue: Purpose/result force of Jesus' citation of Isaiah and the potential implication that parables prevent repentance
  chosen_reading: Retain the Greek's purpose-like wording ('so that ... lest ...') without softening it into mere result or explanatory paraphrase.
  alternative_readings:
  - so that ... otherwise they might turn
  - with the result that ... and not understand
  rationale: The verse is intentionally difficult and the Greek preserves the tension of divine judgment and human unresponsiveness. Per doctrine, the translation should preserve theological tension rather than resolve it toward either a deterministic or merely descriptive reading.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Meaning of ἐπιστρέψωσιν in relation to repentance
  chosen_reading: Translate as 'turn back' in the main text, preserving repentance as an interpretive possibility in a footnote.
  alternative_readings:
  - repent
  - turn
  rationale: The verb can carry covenantal/repentance overtones, especially in Isaiah allusion contexts, but the Greek term itself is broader than an explicit technical term for repentance. The main text stays closer to the lexical image while the footnote preserves the theological nuance.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve ambiguity where genuine.'
