review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa del hebreo: retirada de la mano, sorpresa, salida del hermano, exclamación con juego de palabras sobre פרץ, y fórmula de imposición del nombre. Sin embargo, no preserva con suficiente fidelidad dos decisiones auditadas: la nota sobre el hebreo literal del juego de palabras se perdió por completo, y la fórmula final «Y llamó su nombre Pérez» no es español natural ni refleja bien la impersonalidad de וַיִּקְרָא שְׁמוֹ.'
  spanish_quality_summary: El texto es generalmente claro, pero «Y sucedió que» + «he aquí que» suena recargado en español contemporáneo, y «Y llamó su nombre Pérez» resulta poco idiomático. Una redacción más fluida y fiel es «Y cuando retiró su mano, de pronto salió su hermano… Así fue llamado Pérez».
  glossary_alignment: No hay términos teológicos sensibles aquí. «Pérez» es aceptable como forma tradicional española del nombre y mantiene la relación con «brecha». «Brecha» es una buena elección para preservar el juego léxico de פרץ. Conviene conservar una nota que explique el hebreo literal y la relación con el nombre.
  issues:
  - severity: medium
    issue: Falta la nota lexical sobre el juego de palabras de פרץ.
    rationale: El English POB preserva explícitamente la alternativa literal «What a breach you have breached for yourself!» porque documenta el juego de raíces que da origen al nombre Pérez. El español debe conservar una nota equivalente.
  - severity: medium
    issue: «Y llamó su nombre Pérez» es antinatural en español.
    rationale: Aunque intenta calcar la fórmula hebrea, en español moderno y digno suena incorrecto. La auditoría inglesa prefirió una fórmula impersonal; en español «Así fue llamado Pérez» o «Y fue llamado Pérez» preserva mejor el sentido sin imponer sujeto.
  - severity: low
    issue: La apertura «Y sucedió que… he aquí que…» es pesada.
    rationale: No es errónea, pero el inglés ya eliminó «And it happened» por torpeza estilística. En español también puede simplificarse sin pérdida semántica, manteniendo la sorpresa con «de pronto» o «he aquí».
  revised_spanish_text: 'Y cuando retiró su mano, de pronto salió su hermano. Entonces ella dijo[a]: «¡Qué brecha te has abierto!» Así fue llamado Pérez.'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «¡Qué brecha te has abierto por ti mismo!». La exclamación juega con la raíz פרץ, de la cual también viene el nombre Pérez.'
    reason: lexical_alternative
  revision_rationale: Se simplifica la apertura para evitar una construcción recargada en español y seguir la revisión ya aplicada en inglés. Se mantiene «brecha» para preservar el juego de palabras con Pérez, y se restaura la nota explicativa del hebreo literal. La fórmula final se rehace como impersonal natural («Así fue llamado Pérez»), que refleja mejor וַיִּקְרָא שְׁמוֹ sin calco extraño.
