translation:
  language: es
  text: 'Porque un hombre irreprochable se apresuró y combatió en la primera línea, llevando el arma de su propio servicio: la oración y la expiación[a] mediante incienso; se opuso a la ira y puso fin a la calamidad, mostrando que él es tu siervo[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la oración y el atonamiento por incienso» o «la oración y la expiación por incienso». El griego ἐξιλασμός puede traducirse de varias maneras relacionadas en contextos cultuales.
    reason: lexical_alternative
  - marker: b
    text: O «mostrando que él es tu servidor». θεράπων denota a un servidor o asistente en servicio honroso.
    reason: lexical_alternative
lexical_decisions:
- source_word: σπεύσας
  english_pob_choice: hurried forward
  chosen_spanish: se apresuró
  alternatives_spanish:
  - se dio prisa
  - corrió adelante
  lexicon: LSJ
  rationale: El participio aoristo expresa acción pronta e intensa. «Se apresuró» suena natural en español y conserva la urgencia sin añadir matices innecesarios.
- source_word: ἀνὴρ ἄμεμπτος
  english_pob_choice: a blameless man
  chosen_spanish: un hombre irreprochable
  alternatives_spanish:
  - un hombre sin culpa
  - un hombre intachable
  lexicon: LSJ
  rationale: ἄμεμπτος indica alguien contra quien no puede levantarse reproche. «Irreprensible» o «intachable» serían posibles, pero «irreprochable» es claro y solemne en español.
- source_word: προεμάχησεν
  english_pob_choice: fought in the front line
  chosen_spanish: combatió en la primera línea
  alternatives_spanish:
  - peleó al frente
  - luchó en la vanguardia
  lexicon: LSJ
  rationale: El verbo conserva una imagen marcial de ir delante de otros en el combate. «En la primera línea» mantiene la metáfora militar con buena naturalidad.
- source_word: λειτουργίας
  english_pob_choice: service
  chosen_spanish: servicio
  alternatives_spanish:
  - ministerio
  - servicio sagrado
  - servicio sacerdotal
  lexicon: LSJ
  rationale: En este contexto cultual, λειτουργία alude al desempeño sacerdotal. «Servicio» sigue la revisión inglesa reciente y evita imponer «ministerio», que en español puede sonar más eclesiástico moderno que cultual.
- source_word: ὅπλον
  english_pob_choice: weapon
  chosen_spanish: arma
  alternatives_spanish:
  - instrumento
  - arma de guerra
  lexicon: LSJ
  rationale: 'La metáfora es militar: la oración y la expiación se presentan como su arma. «Arma» reproduce mejor esa imagen que un término más neutro.'
- source_word: προσευχὴν καὶ θυμιάματος ἐξιλασμόν
  english_pob_choice: prayer and atonement by incense
  chosen_spanish: la oración y la expiación mediante incienso
  alternatives_spanish:
  - la oración y la expiación por incienso
  - la oración y la propiciación por el incienso
  lexicon: LSJ
  rationale: Se conserva la relación cultual entre oración e incienso. «Expiación» refleja bien ἐξιλασμός sin cerrar la tensión entre expiación, apaciguamiento y atonement; por eso se mantiene como opción principal y se deja implícita la alternativa semántica.
- source_word: ἀντέστη τῷ θυμῷ
  english_pob_choice: he stood against the wrath
  chosen_spanish: se opuso a la ira
  alternatives_spanish:
  - resistió a la ira
  - se mantuvo contra la ira
  lexicon: LSJ
  rationale: ἀντέστη expresa oposición firme. En este contexto, θυμός remite a la ira/juicio amenazante; «se opuso a la ira» es más natural en español que una calca más rígida.
- source_word: πέρας ἐπέθηκε τῇ συμφορᾷ
  english_pob_choice: put an end to the disaster
  chosen_spanish: puso fin a la calamidad
  alternatives_spanish:
  - dio término a la desgracia
  - puso fin al desastre
  lexicon: LSJ
  rationale: La expresión idiomática comunica poner límite o término a un mal sobrevenido. «Calamidad» conserva mejor el tono grave del contexto que «desastre» en español contemporáneo.
- source_word: θεράπων
  english_pob_choice: servant
  chosen_spanish: siervo
  alternatives_spanish:
  - servidor
  - attendente
  lexicon: LSJ
  rationale: θεράπων puede denotar un servidor o asistente con dignidad. «Siervo» es bíblico y respetuoso en español, y mantiene la idea de servicio honrado a Dios sin rebajarla a servidumbre forzada.
theological_decisions:
- issue: Sentido de ἐξιλασμός en contexto cultual
  english_pob_reading: atonement
  chosen_spanish_reading: expiación
  alternative_spanish_readings:
  - propiciación
  - atonamiento
  rationale: En español, «expiación» comunica el acto cultual de remover culpa o culpa-ira en un registro bíblico inteligible. Se evita tecnicismo excesivo y se conserva la tensión semántica del término griego, que puede abarcar expiación y apaciguamiento.
  doctrine_reference: 'DOCTRINE.md: preservar peso teológico sin sobreespecificar mecanismos'
- issue: Referencia implícita de θυμός
  english_pob_reading: the wrath
  chosen_spanish_reading: la ira
  alternative_spanish_readings:
  - el furor
  - la cólera
  rationale: El griego deja implícito el sujeto de la ira; la traducción no añade explícitamente «de Dios» para no exceder el texto. «La ira» conserva esa ambigüedad controlada y el tono judicial del pasaje.
  doctrine_reference: 'DOCTRINE.md: no introducir afirmaciones doctrinales no explicitadas por el texto'
- issue: Valor de θεράπων
  english_pob_reading: servant
  chosen_spanish_reading: siervo
  alternative_spanish_readings:
  - servidor
  - ministro
  rationale: Aunque θεράπων puede tener matiz de asistente honrado, «siervo» en español conserva mejor la dignidad religiosa del servicio a Dios y armoniza con el cierre del versículo.
  doctrine_reference: 'DOCTRINE.md: mantener terminología bíblica cuando el contexto la favorece'
translation_notes:
  revision_awareness: 'He seguido la línea revisada del POB inglés en dos puntos relevantes: λειτουργία se ha entendido como «servicio» y θεράπων como «servant/siervo» en vez de «ministerio/attendant». También he preservado la imagen militar de «fought in the front line» con «combatió en la primera línea», y he mantenido la ambigüedad cultual de ἐξιλασμός en una nota alternativa.'
  spanish_consistency_notes:
  - Uso de «Yahvé» no aplica en este versículo; no se introduce lenguaje divino añadido.
  - Se conserva un registro bíblico sobrio y contemporáneo, evitando arcaísmos innecesarios.
  - «Expiación» se usa como término principal, con nota para la alternativa cultual, para reflejar la tensión lexical del griego.
  - «Siervo» se eligió para θεράπων por su dignidad religiosa y consistencia con el cierre del versículo.
