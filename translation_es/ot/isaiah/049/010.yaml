translation:
  language: es
  text: No tendrán hambre ni sed[a]; ni los herirá el calor abrasador ni el sol; porque el que tiene compasión por ellos los guiará[b], y los conducirá junto a manantiales de agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ni el calor abrasador ni el sol los herirá».
    reason: lexical_alternative
  - marker: b
    text: O «y los conducirá junto a manantiales de agua».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְעָבוּ
  english_pob_choice: will hunger
  chosen_spanish: tendrán hambre
  alternatives_spanish:
  - hambre tendrán
  - estarán hambrientos
  lexicon: HALOT
  rationale: En español, la construcción natural y fiel es «tener hambre», que conserva el sentido verbal de la forma hebrea sin sonar forzada.
- source_word: יִצְמָאוּ
  english_pob_choice: will thirst
  chosen_spanish: tendrán sed
  alternatives_spanish:
  - sed tendrán
  - estarán sedientos
  lexicon: HALOT
  rationale: «Tener sed» comunica con claridad el paralelismo poético de hambre/sed y respeta el valor verbal del hebreo.
- source_word: יַכֵּם
  english_pob_choice: strike them
  chosen_spanish: los herirá
  alternatives_spanish:
  - los golpeará
  - los abatirá
  - los castigará
  lexicon: HALOT
  rationale: El verbo hebreo expresa un golpe o impacto dañino; «herirá» preserva la fuerza concreta de la imagen con un español natural.
- source_word: שָׁרָב
  english_pob_choice: scorching heat
  chosen_spanish: el calor abrasador
  alternatives_spanish:
  - el calor quemante
  - el calor sofocante
  - el calor del desierto
  lexicon: HALOT
  rationale: «Calor abrasador» transmite bien la intensidad del sustantivo hebreo y mantiene el tono poético sin volverlo técnico.
- source_word: שָׁמֶשׁ
  english_pob_choice: sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el sol del día
  lexicon: HALOT
  rationale: El sentido ordinario es el astro físico; se conserva literalmente porque el paralelismo con «calor abrasador» lo hace claro.
- source_word: מְרַחֲמָם
  english_pob_choice: he who has compassion on them
  chosen_spanish: el que tiene compasión de ellos
  alternatives_spanish:
  - el que se compadece de ellos
  - el que les muestra misericordia
  lexicon: HALOT
  rationale: El participio hebreo conserva un sentido continuo y descriptivo. «El que tiene compasión de ellos» mantiene esa idea sin introducir un título doctrinal distinto.
- source_word: יְנַהֲגֵם
  english_pob_choice: will lead them
  chosen_spanish: los guiará
  alternatives_spanish:
  - los conducirá
  - los llevará
  lexicon: HALOT
  rationale: En este contexto pastoral, «guiará» expresa mejor la dirección cuidadosa del verbo que un simple traslado físico.
- source_word: מַבּוּעֵי מַיִם
  english_pob_choice: springs of water
  chosen_spanish: manantiales de agua
  alternatives_spanish:
  - fuentes de agua
  - nacimientos de agua
  lexicon: HALOT
  rationale: «Manantiales de agua» es una expresión natural en español y conserva la imagen concreta de fuentes vivas de provisión.
- source_word: יְנַהֲלֵם
  english_pob_choice: he will guide them beside
  chosen_spanish: los conducirá junto a
  alternatives_spanish:
  - los guiará junto a
  - los llevará junto a
  lexicon: HALOT
  rationale: El hebreo final puede expresar conducción hacia o junto a un lugar; «junto a» refleja mejor la revisión inglesa y evita fijar indebidamente el matiz como si fuera solo destino.
- source_word: וְעַל
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - por
  - al lado de
  - sobre
  lexicon: HALOT
  rationale: Aunque עַל suele significar «sobre/upon», en este contexto poético de provisión puede indicar relación espacial cercana; «junto a» es la forma española más natural y fiel al sentido contextual.
theological_decisions:
- issue: Referente del que guía con compasión
  english_pob_reading: The verse speaks of God as the one who compassionately leads and guides his people.
  chosen_spanish_reading: El versículo describe a Dios de manera implícita como el que se compadece, guía y conduce a su pueblo.
  alternative_spanish_readings:
  - El versículo habla de un guía compasivo sin nombrarlo expresamente.
  - El versículo mantiene el referente divino implícito sin añadir el nombre de Dios al texto.
  rationale: El hebreo usa un participio descriptivo sin nombrar explícitamente a Dios. La redacción española conserva ese referente implícito sin expandirlo, pero dejando claro en la nota teológica que la figura apunta a Dios.
  doctrine_reference: Primacía del texto original; preservar la tensión referencial sin sobreinterpretar.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del texto inglés, que prefirió un matiz espacial de cercanía («beside springs of water») y mantuvo el referente descriptivo («he who has compassion on them»). La versión española refleja esa misma decisión con «junto a manantiales de agua» y «el que tiene compasión de ellos», sin forzar una explicitación del sujeto divino en el cuerpo del versículo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma estándar del proyecto, pero aquí no aparece porque el hebreo de este versículo usa un referente descriptivo implícito.
  - Se eligieron formas verbales naturales en español («tendrán hambre», «tendrán sed», «los guiará») para conservar el paralelismo poético sin calcos innecesarios.
  - «Manantiales de agua» conserva la imagen concreta del hebreo y evita introducir un término litúrgico más cargado que el original.
