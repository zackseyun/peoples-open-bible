source:
  edition: WLC
  text: עַ֤יִן תִּֽלְעַ֣ג לְ/אָב֮ וְ/תָב֪וּז לִֽ/יקֲּהַ֫ת אֵ֥ם יִקְּר֥וּ/הָ עֹרְבֵי נַ֑חַל וְֽ/יֹאכְל֥וּ/הָ בְנֵי נָֽשֶׁר׀־־־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/030/017.yaml
  text: The eye that mocks a father and despises obedience to a mother—the ravens of the valley will peck it out[c][b][a], and the young of the eagle will eat it.
  footnotes:
  - marker: a
    text: Or 'a mother's command/instruction'; the rare Hebrew term likely refers to the obedience or heed owed to one's mother.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'ravens of the valley'; 'valley' may also be understood as 'wadi' or 'brook-bed.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew nesher can refer to an eagle or a vulture; traditionally rendered 'eagle.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
