    rationale: El English POB conserva una alternativa para 'Gibeah of Saul' / 'Saul’s Gibeah'. El borrador español solo incluye la nota para מַעְבָּרָה y omite esta alternativa documentada, lo que rompe la trazabilidad requerida.
  - severity: low
    issue: El artículo en 'la Guibeá de Saúl' no es necesario.
    rationale: El hebreo no lleva artículo en la cadena constructa, y en español el topónimo compuesto suena más limpio como 'Guibeá de Saúl'. No es un error grave, pero la forma sin artículo es más fiel y estilísticamente mejor.
