translation:
  language: es
  text: Entonces los hombres de Israel salieron de Mizpa, persiguieron a los filisteos y los derrotaron[a] hasta debajo de Bet-car[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y los abatieron». El verbo hebreo puede indicar golpear en combate con el sentido de derrotar, no solo dar golpes físicos.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «debajo de Bet-car», probablemente una indicación de un lugar situado a menor altura que Bet-car.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּצְאוּ
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron
  - partieron
  - salieron de
  lexicon: HALOT
  rationale: El verbo narrativo de יצא se expresa de forma natural en español con «salieron». Conserva el movimiento desde Mizpa sin forzar un calco como «fueron». La preposición de origen ya queda clara con «de Mizpa».
- source_word: אַנְשֵׁי יִשְׂרָאֵל
  english_pob_choice: the men of Israel
  chosen_spanish: los hombres de Israel
  alternatives_spanish:
  - los israelitas
  - los varones de Israel
  lexicon: HALOT
  rationale: Se mantiene la referencia explícita a los hombres, como en el hebreo, en vez de generalizar a «los israelitas». Esto conserva el matiz militar del pasaje.
- source_word: מִן הַמִּצְפָּה
  english_pob_choice: from Mizpah
  chosen_spanish: de Mizpa
  alternatives_spanish:
  - desde Mizpa
  - de la atalaya
  lexicon: HALOT
  rationale: «Mizpa» se conserva como topónimo transliterado. «De Mizpa» reproduce de modo natural el valor de origen de מִן.
- source_word: וַיִּרְדְּפוּ
  english_pob_choice: pursued
  chosen_spanish: persiguieron
  alternatives_spanish:
  - dieron caza a
  - siguieron persiguiendo a
  lexicon: HALOT
  rationale: רדף en contexto bélico se rinde con «persiguieron», que es fiel, claro y natural en español.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  - a los filisteos
  lexicon: HALOT
  rationale: Se usa el etnónimo tradicional y transparente en español.
- source_word: וַיַּכּוּם
  english_pob_choice: struck them down
  chosen_spanish: los derrotaron
  alternatives_spanish:
  - los hirieron
  - los golpearon
  - los abatieron
  lexicon: HALOT
  rationale: Aunque נכה puede significar golpear, en este contexto de batalla el sentido resultante es la derrota militar del enemigo. «Los derrotaron» refleja ese alcance sin afirmar más de lo que el hebreo exige. Se preserva así la tensión documentada entre golpe físico y derrota bélica.
- source_word: עַד מִתַּחַת לְבֵית כָּר
  english_pob_choice: as far as below Beth-car
  chosen_spanish: hasta debajo de Bet-car
  alternatives_spanish:
  - hasta un punto debajo de Bet-car
  - hasta lo bajo de Bet-car
  lexicon: HALOT
  rationale: «Hasta debajo de Bet-car» reproduce la relación topográfica de עַד מִתַּחַת y conserva el topónimo como nombre propio. Se evita explicar más de la cuenta dentro del texto principal.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y coincide con la auditoría inglesa de alta concordancia. Se conserva la alternativa semántica de וַיַּכּוּם en una nota, y se mantiene el valor topográfico de מִתַּחַת mediante una formulación natural en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece.
  - Se mantiene «Mesías/Cristo» fuera de este versículo porque no hay término correspondiente.
  - 'Se conserva la terminología militar concreta: «salieron», «persiguieron», «derrotaron».'
  - 'Los topónimos se transliteran como en la práctica POB, con ortografía española estable: Mizpa, Bet-car.'
