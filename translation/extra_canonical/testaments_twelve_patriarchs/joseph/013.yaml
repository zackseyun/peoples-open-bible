  text: XIII. Ὁ δὲ ⌜Πεντεφρὶς¹⁾ πεισθεὶς² τοῖς λόγοις ⌜αὐτῆς¹³ ἐκέλευσεν⁴ †ἐλθεῖν⁵ τὸν μετάβολον, *καὶ λέγει αὐτῷ⁶· *Τί τοῦτο ὃ ἀκούω ⌜περί σου¹⁷, ὅτι κλέπτεις⁸ ψυχὰς⁹ ἐκ γῆς¹⁰ Χαναάν¹¹, *καὶ εἰς παῖδας μεταπωλεῖς¹²; 2. *Ὁ δὲ μετάβολος πεσὼν εἰς τοὺς πόδας αὐτοῦ¹³ *ἐδέετο λέγων¹⁴· Δέομαί σου¹⁵, κύριε, *οὐκ οἶδα¹⁶ ὃ¹⁷ λέγεις. 3. *Καὶ λέγει αὐτῷ ὁ Πεντεφρής¹⁸· Πόθεν ⌜οὖν⌉ *ἐστιν ὁ παῖς¹⁹ ὁ Ἑβραῖος²⁰; καὶ²¹ εἶπεν²²· Οἱ²³ Ἰσμαηλῖται παρέθεντό²⁴ μοι αὐτόν, ἕως ὅτου²⁵ ἐπιστρέψωσιν²⁶. 4. *Ὁ δὲ οὐκ²⁷ ἐπίστευσεν αὐτῷ²⁸, ἀλλ’ ἐκέλευσεν γυμνὸν τύπτεσθαι²⁹. Ἐπιμένοντος δὲ αὐτοῦ *τούτοις τοῖς λόγοις³⁰, λέγει³¹ *ὁ Πεντεφρής³²· Ἐναχθήτω³³ οὖν³⁴ ὁ νεανίσκος. 5. Καὶ εἰσαχθεὶς προσεκύνησα τῷ Πεντεφρῇ³⁵, τρίτος³⁶ γὰρ ἦν *ἐν ἀξιώματι παρὰ τῶν³⁷ Φαραὼ ⌜ἀρχόντων⌉. 6. Καὶ διαχωρίσας³⁸ με³⁹ ἀπ᾿ αὐτοῦ⁴⁰ λέγει⁴¹ μοι⁴²· Δοῦλος εἶ ἢ ἐλεύθερος; *ἐγὼ δὲ⁴³ εἶπον⁴⁴· Δοῦλος⁴⁵. 7. *Καὶ λέγει· Τίνος; καὶ λέγω⁴⁶· Τῶν Ἰσμαηλιτῶν. 8. *Ὁ δὲ εἶπε⁴⁷· Πῶς αὐτῶν ἐγένου⁴⁸ δοῦλος; καὶ⁴⁹ εἶπον· Ὅτι ἐκ γῆς⁵⁰ Χαναὰν ἐπριάσαντό⁵¹ με. 9. *Εἶπε δὲ πρός με⁵²· ⌜Ὄντως⌉⁵³ ψεύδῃ⁵⁴. Καὶ ⌜εὐθὺς⌉⁵⁵ *ἐκέλευσε κἀμὲ γυμνὸν⁵⁶ τύπτεσθαι.
