translation:
  language: es
  text: Su corazón se enalteció en los caminos de Yahvé[a], y además quitó los lugares altos y los asherim[b] de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su corazón cobró ánimo» o «fue fortalecido en los caminos de Yahvé». El hebreo puede expresar elevación interior o valentía; aquí el contexto es favorable, no soberbio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los postes sagrados». El término hebreo se refiere a objetos cultuales asociados con la adoración de Aserá.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְבַּהּ
  english_pob_choice: was exalted
  chosen_spanish: fue exaltado
  alternatives_spanish:
  - se elevó
  - fue alzado
  - se enalteció
  lexicon: HALOT
  rationale: El hebreo expresa elevación/altura del corazón; en este contexto es positiva, no orgullosa en sentido pecaminoso. «Fue exaltado» conserva la metáfora y el tono formal de la revisión inglesa.
- source_word: לִבּוֹ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su ánimo
  - su mente
  - su interior
  lexicon: HALOT
  rationale: לֵב/לֵבָב designa el centro interior de la persona. «Corazón» es la equivalencia más transparente y mantiene la antropología bíblica del original.
- source_word: בְּדַרְכֵי יְהוָה
  english_pob_choice: in the ways of Yahweh
  chosen_spanish: en los caminos de Yahvé
  alternatives_spanish:
  - en los caminos de Yahvé
  - en las sendas de Yahvé
  - en el camino de Yahvé
  lexicon: HALOT
  rationale: דֶּרֶךְ en plural funciona como metáfora de conducta o estilo de vida. «Caminos» es natural en español bíblico y preserva el plural metafórico. Se mantiene «Yahvé» según la política terminológica del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé», no la sustitución por título. Eso preserva el nombre propio divino revelado en el texto fuente.'
- source_word: וְעוֹד
  english_pob_choice: and furthermore
  chosen_spanish: y además
  alternatives_spanish:
  - y además
  - y asimismo
  - y todavía
  lexicon: HALOT
  rationale: La partícula agrega una acción ulterior. «Y además» transmite el valor aditivo de forma natural en español actual.
- source_word: הֵסִיר
  english_pob_choice: he removed
  chosen_spanish: quitó
  alternatives_spanish:
  - removió
  - eliminó
  - apartó
  lexicon: HALOT
  rationale: En contexto de reforma cultual, הֵסִיר indica retirar o quitar. «Quitó» es claro y idiomático en español; «removió» suena más técnico y menos natural.
- source_word: הַבָּמוֹת
  english_pob_choice: the high places
  chosen_spanish: los lugares altos
  alternatives_spanish:
  - los lugares altos
  - los altos lugares
  - los santuarios de altura
  lexicon: HALOT
  rationale: «Lugares altos» es una traducción estable y comprensible del término cultual בָּמוֹת. Se evita sobreexplicar dentro del texto principal.
- source_word: הָאֲשֵׁרִים
  english_pob_choice: the Asherim
  chosen_spanish: los asherim
  alternatives_spanish:
  - los aserim
  - los postes sagrados
  - las imágenes de Aserá
  lexicon: HALOT
  rationale: El POB inglés revisado optó por la transliteración «Asherim» para no interpretar de más. En español se conserva esa decisión como préstamo técnico, pues no hay una equivalencia simple que no pierda la referencia cultual específica.
- source_word: מִיהוּדָה
  english_pob_choice: from Judah
  chosen_spanish: de Judá
  alternatives_spanish:
  - de Judá
  - fuera de Judá
  - de la tierra de Judá
  lexicon: HALOT
  rationale: La preposición marca retirada o eliminación desde el ámbito de Judá. «De Judá» es natural y fiel al sentido de procedencia/remoción.
theological_decisions:
- issue: Cómo interpretar וַיִּגְבַּהּ לִבּוֹ en un contexto positivo o negativo
  english_pob_reading: positive elevation of heart in devotion to the LORD's ways
  chosen_spanish_reading: elevación positiva del corazón en fidelidad a los caminos de Yahvé
  alternative_spanish_readings:
  - su corazón se enorgulleció en los caminos de Yahvé
  - su corazón cobró ánimo en los caminos de Yahvé
  rationale: 'El hebreo puede ser ambivalente, pero el contexto inmediato es elogioso: se trata de una reforma religiosa, no de soberbia. La traducción conserva la metáfora de elevación sin convertirla en condena ni desplazarla a una paráfrasis psicológica.'
  doctrine_reference: Preservar la tensión lexical del original; primacía del hebreo sobre la tradición receptora.
- issue: Cómo verter אֲשֵׁרִים sin borrar su carga cultual
  english_pob_reading: Asherim
  chosen_spanish_reading: asherim
  alternative_spanish_readings:
  - postes de Aserá
  - estacas sagradas
  - imágenes de Aserá
  rationale: El término designa objetos o símbolos cúlticos asociados con la adoración prohibida. Como el inglés POB revisado optó por la transliteración técnica, el español mantiene esa opción para no imponer una identificación demasiado precisa que el texto no explicita.
  doctrine_reference: Consistencia terminológica y respeto por la ambigüedad documentada del término cultual.
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa más reciente al preferir un tono formal equivalente a «was exalted» y al transliterar אֲשֵׁרִים como «Asherim» en vez de interpretarlo como «Asherah poles». También mantiene la lectura positiva del corazón en su contexto reformador.
  spanish_consistency_notes:
  - Se conserva «Yahvé» conforme a la terminología del proyecto para יהוה.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - «Corazón» se usa para לֵב en sentido antropológico bíblico.
  - «Lugares altos» mantiene la expresión cultual tradicional sin añadir explicación en el texto principal.
  - La transliteración «asherim» sigue la decisión inglesa revisada y evita una interpretación excesiva.
