translation:
  language: es
  text: Respóndeme[a], oh Yahvé, porque tu amor fiel es bueno; conforme a la abundancia de tus misericordias, vuélvete a mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «conforme a la abundancia de tus compasiones, vuélvete a mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲנֵנִי
  english_pob_choice: Answer me
  chosen_spanish: Respóndeme
  alternatives_spanish:
  - Respóndeme
  - Contéstame
  - Atiéndeme
  lexicon: HALOT 6030
  rationale: En el contexto de una súplica a Dios, el imperativo pide una respuesta. «Respóndeme» comunica el valor peticionario sin sonar mecánico y conserva la relación personal implícita en el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La política del proyecto para el Tetragrámaton es usar «Yahvé» en español, preservando el nombre propio divino en vez de sustituirlo por un título. Se mantiene la referencia directa al nombre del pacto.
- source_word: חַסְדֶּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu amor constante
  alternatives_spanish:
  - tu amor constante
  - tu fiel amor
  - tu misericordia leal
  lexicon: HALOT 2617
  rationale: חֶסֶד tiene un campo semántico de lealtad bondadosa y amor pactal. «Amor constante» comunica bien esa fidelidad amorosa en español y evita reducir el término a simple afecto.
- source_word: כְּרֹב
  english_pob_choice: according to your abundant
  chosen_spanish: conforme a la abundancia de
  alternatives_spanish:
  - conforme a la abundancia de
  - según la abundancia de
  - en proporción a
  lexicon: HALOT 7230
  rationale: La preposición כ con רֹב expresa medida o estándar. «Conforme a la abundancia de» conserva esa relación comparativa de manera natural en español.
- source_word: רַחֲמֶיךָ
  english_pob_choice: mercies
  chosen_spanish: tus misericordias
  alternatives_spanish:
  - tus misericordias
  - tus compasiones
  - tus entrañas de misericordia
  lexicon: HALOT 7356
  rationale: El plural hebreo intensifica la idea de compasión entrañable. «Misericordias» preserva el plural y es idiomático en español bíblico sin perder el matiz afectivo.
- source_word: פְּנֵה אֵלַי
  english_pob_choice: turn to me
  chosen_spanish: vuélvete hacia mí
  alternatives_spanish:
  - vuélvete hacia mí
  - mira hacia mí
  - vuelve tu rostro hacia mí
  lexicon: HALOT 6437
  rationale: El verbo פנה con אֶל indica volverse o dirigirse hacia alguien. «Vuélvete hacia mí» conserva el movimiento relacional y el imperativo directo del hebreo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: oh Yahvé
  alternative_spanish_readings:
  - oh Yahvé
  - oh Yahveh
  rationale: Se sigue la convención del proyecto de transparentar el nombre divino en español. «Yahvé» evita la sustitución por un título y mantiene la continuidad con la decisión inglesa de no enmascarar el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Matiz de חֶסֶד como amor pactal leal
  english_pob_reading: your steadfast love
  chosen_spanish_reading: tu amor constante
  alternative_spanish_readings:
  - tu amor constante
  - tu misericordia leal
  - tu amor fiel
  rationale: No se diluye el valor covenantal de חֶסֶד. «Amor constante» conserva la idea de fidelidad perseverante y bondad activa sin convertir el término en una simple emoción.
  doctrine_reference: Lexical theology of חֶסֶד in the Hebrew Psalter
translation_notes:
  revision_awareness: Revisado contra la fuente hebrea y el audit trail inglés; la propuesta inglesa permanece intacta en lo esencial. Se ajustó el nombre divino a la terminología española del proyecto («Yahvé») y se mantuvo la fuerza semántica de חֶסֶד y רַחֲמִים sin atenuar la súplica.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme a la política terminológica del proyecto.
  - Se evitó «SEÑOR» como sustituto del nombre divino.
  - «amor constante» intenta preservar חֶסֶד sin perder inteligibilidad en español.
  - «misericordias» conserva el plural hebreo de רַחֲמִים.
  - La nota textual/lexical ofrece la alternativa «compasiones» para reflejar el matiz del plural hebreo.
