lexical_decisions:
- source_word: ὃς
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quien
  - el cual
  lexicon: LSJ
  rationale: En español, una oración relativa con antecedente humano suena más natural y fluida con «que»; conserva la relación anafórica sin añadir énfasis innecesario.
- source_word: ἐδίδασκεν
  english_pob_choice: taught
  chosen_spanish: les enseñó
  alternatives_spanish:
  - les enseñaba
  - estaba enseñándoles
  lexicon: BDAG
  rationale: El imperfecto griego puede expresar acción continua o habitual pasada; aquí se vierte con un pretérito natural en español, siguiendo la revisión inglesa que optó por «taught» sin perder el matiz de acción pasada en curso o repetida.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - os
  - a ustedes
  lexicon: BDAG
  rationale: El objeto plural se expresa en español con clítico dativo por el verbo «enseñar»; el destinatario queda claro en el contexto.
- source_word: ἔτι ὢν σὺν ἡμῖν
  english_pob_choice: while he was still with us
  chosen_spanish: mientras aún estaba con nosotros
  alternatives_spanish:
  - cuando aún estaba con nosotros
  - mientras seguía con nosotros
  lexicon: LSJ
  rationale: «Mientras aún estaba con nosotros» reproduce con naturalidad el valor temporal de ἔτι ὢν σὺν ἡμῖν, manteniendo «aún» para ἔτι y «con nosotros» para σὺν ἡμῖν.
- source_word: τὸν νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la instrucción
  lexicon: BDAG
  rationale: Se mantiene el valor legal/scriptural de νόμος con «ley», una forma clara y ampliamente inteligible en español; no se impone mayúscula editorial.
- source_word: τοὺς προφήτας
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los escritos proféticos
  lexicon: BDAG
  rationale: La pareja fija «la ley y los profetas» se conserva de forma directa, como referencia al conjunto de las Escrituras de Israel.
theological_decisions:
- issue: Referencia a las Escrituras de Israel en la expresión «la ley y los profetas»
  english_pob_reading: The expression 'the law and the prophets' refers to Israel's sacred Scriptures, especially the Torah and the prophetic writings.
  chosen_spanish_reading: La expresión «la ley y los profetas» se entiende como referencia a las Escrituras sagradas de Israel, especialmente la Torá y los escritos proféticos.
  alternative_spanish_readings:
  - la Ley y los Profetas
  - la Ley de Moisés y los profetas
  rationale: La traducción conserva la fórmula sin sobrecargar el texto principal con una explicación; la nota aclara el alcance canónico reconocido por el POB inglés.
  doctrine_reference: Tradición canónica de Israel; equivalencia funcional moderada en términos bíblicos.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español: [a] y [b] están anclados en sus respectivos lugares. La redacción sigue de cerca el griego y la revisión inglesa, que prefirió «taught» para el imperfecto en este contexto.'
  spanish_consistency_notes:
  - Se preserva la fórmula bíblica estable «la ley y los profetas» sin capitalización editorial.
  - «Mientras aún estaba con nosotros» mantiene el matiz temporal de ἔτι ὢν σὺν ἡμῖν con español natural.
  - El objeto plural se expresa con «les» para concordar con «enseñó».
