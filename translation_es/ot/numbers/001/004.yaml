- from: Y con ustedes habrá un hombre[a] por cada tribu, un hombre que sea cabeza de la casa de sus padres.
  to: Y con ustedes habrá un hombre[a] por cada tribu, cada uno cabeza de la casa de sus padres.
  rationale: Se ajusta la segunda mitad para reflejar mejor la aposición hebrea (‘cada uno cabeza de...’) sin volver el español rígido. Se conserva ‘cabeza’ por fidelidad léxica y ‘casa de sus padres’ por su valor social patrilineal. También se pule la nota al pie para español más natural y tipográficamente correcto.
