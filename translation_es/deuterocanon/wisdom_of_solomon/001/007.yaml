base_translation:
  language: en
  yaml_path: translation/deuterocanon/wisdom_of_solomon/001/007.yaml
  text: For the Spirit of the Lord has filled the inhabited world[b][a], and that which holds all things together has knowledge of every utterance.
  footnotes:
  - marker: a
    text: Or 'what contains all things' or 'the one who holds all things together.' The Greek expression is a neuter participle and can emphasize either containing, sustaining, or holding together all things.
    reason: lexical_alternative
  - marker: b
    text: Literally 'has knowledge of voice.' The sense is that God's all-pervading Spirit is aware of every utterance.
    reason: lexical_alternative
