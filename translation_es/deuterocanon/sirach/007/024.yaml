translation:
  language: es
  text: ¿Tienes hijas? Guarda su castidad[a], y no les muestres un rostro alegre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «no hagas brillar tu rostro hacia ellas». El sentido probable es «no seas demasiado indulgente o complaciente con ellas».
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּנוֹת לְךָ / θυγατέρες σοί εἰσιν
  english_pob_choice: Do you have daughters?
  chosen_spanish: ¿Tienes hijas?
  alternatives_spanish:
  - ¿Si tienes hijas?
  - ¿Tienes hijas para ti?
  lexicon: HALOT / LSJ
  rationale: La apertura hebrea y griega es elíptica y expresa posesión/existencia. En español, la pregunta directa conserva la fuerza exhortativa sin sonar forzada.
- source_word: נְצוֹר / πρόσεχε
  english_pob_choice: Guard
  chosen_spanish: Guarda
  alternatives_spanish:
  - Vela por
  - Cuida de
  - Protege
  lexicon: HALOT / BDAG
  rationale: El imperativo pide vigilancia y custodia. «Guarda» mantiene el valor de protección con naturalidad en español bíblico contemporáneo.
- source_word: שְׁאֵרָם / τῷ σώματι αὐτῶν
  english_pob_choice: their chastity
  chosen_spanish: su castidad
  alternatives_spanish:
  - su honor
  - su pureza
  - su cuerpo
  lexicon: HALOT / LSJ
  rationale: Aunque el griego dice literalmente «su cuerpo», el audit trail inglés revisado entendió el hebreo como una advertencia sobre honor/pureza. En español, «castidad» comunica esa lectura ética sin reducirla a una mera referencia anatómica.
- source_word: וְאַל תָּאִיר ... פָּנִים / καὶ μὴ ἱλαρώσῃς ... τὸ πρόσωπόν σου
  english_pob_choice: do not show them a cheerful face
  chosen_spanish: no les muestres un rostro alegre
  alternatives_spanish:
  - no les muestres una cara alegre
  - no seas demasiado complaciente con ellas
  - no les sonrías
  lexicon: HALOT / LSJ
  rationale: Se conserva la imagen concreta del rostro, porque tanto el hebreo como el griego usan una metáfora facial. «Rostro alegre» es una forma española clara que deja espacio a la nota para explicar la posible idea de indulgencia excesiva.
theological_decisions:
- issue: Tensión entre la imagen literal del rostro y su sentido ético
  english_pob_reading: Retain the concrete idiom about the face rather than interpretively flattening it into 'do not be indulgent.'
  chosen_spanish_reading: Conservar la imagen de «rostro alegre» en el texto principal.
  alternative_spanish_readings:
  - no seas indulgente con ellas
  - no las favorezcas demasiado
  - no les muestres demasiada complacencia
  rationale: La imagen corporal forma parte del peso retórico del dicho. Mantenerla evita imponer una paráfrasis moral más precisa de lo que el texto dice explícitamente, mientras la nota puede aclarar el sentido probable.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que ajustó «bodies» a «chastity» y sustituyó la imagen de «brighten your face» por la expresión más natural «show them a cheerful face». En español se conservó la metáfora facial, pero se eligió «castidad» para reflejar la interpretación ética del hebreo en el audit trail.
  spanish_consistency_notes:
  - Se mantuvo «hijas» para la apertura elíptica posesiva/existencial.
  - Se prefirió «guarda» como equivalente breve y fuerte del imperativo de custodia.
  - «Castidad» recoge la lectura ética aprobada por la revisión inglesa; no se tradujo literalmente «cuerpos».
  - La nota desarrolla la ambigüedad idiomática sin reemplazar el texto principal.
  - Se usó registro bíblico moderno, claro y no arcaizante.
