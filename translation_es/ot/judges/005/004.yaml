translation:
  language: es
  text: Yahvé, cuando saliste de Seir, cuando marchaste desde el campo de Edom[a], la tierra tembló[b]; también los cielos destilaron, también las nubes destilaron agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘desde la región de Edom’. El hebreo dice literalmente ‘desde el campo de Edom’.
    reason: lexical_alternative
  - marker: b
    text: O ‘la tierra se estremeció’.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: La fuente hebrea nombra directamente al pacto divino con el tetragrámaton. Siguiendo el criterio del proyecto y el paralelo inglés 'Yahweh', en español se conserva el nombre propio 'Yahvé' en vez de ocultarlo como 'SEÑOR'.
- source_word: בְּצֵאתְךָ
  english_pob_choice: when you went out
  chosen_spanish: cuando saliste
  alternatives_spanish:
  - al salir
  - cuando salías
  lexicon: HALOT
  rationale: El infinitivo constructo con prefijo temporal expresa aquí una acción pasada en marco poético. 'Cuando saliste' reproduce bien el valor temporal y mantiene el tono de segunda persona divina.
- source_word: מִשֵּׂעִיר
  english_pob_choice: from Seir
  chosen_spanish: de Seir
  alternatives_spanish:
  - desde Seir
  lexicon: HALOT
  rationale: Seir es nombre propio geográfico; 'de Seir' comunica con naturalidad el movimiento de procedencia sin añadir matices innecesarios.
- source_word: בְּצַעְדְּךָ
  english_pob_choice: when you marched
  chosen_spanish: cuando marchaste
  alternatives_spanish:
  - cuando diste pasos
  - cuando avanzaste
  lexicon: HALOT
  rationale: צעד denota avanzar a paso firme, incluso marchar. 'Marchaste' conserva ese movimiento deliberado y encaja con el paralelismo poético del versículo.
- source_word: מִשְּׂדֵה אֱדוֹם
  english_pob_choice: from the field of Edom
  chosen_spanish: desde el campo de Edom
  alternatives_spanish:
  - desde el país de Edom
  - desde la campiña de Edom
  lexicon: HALOT
  rationale: שָׂדֶה significa literalmente 'campo' u 'open country'. Se mantiene la imagen concreta del hebreo con 'campo de Edom', siguiendo de cerca la elección inglesa y preservando la alternativa geográfica frente a una paráfrasis más general.
- source_word: אֶרֶץ רָעָשָׁה
  english_pob_choice: the earth trembled
  chosen_spanish: la tierra tembló
  alternatives_spanish:
  - la tierra se estremeció
  - la tierra se sacudió
  lexicon: HALOT
  rationale: En paralelo con 'los cielos' y 'las nubes', 'la tierra' expresa el sentido cósmico de אֶרֶץ. רָעַשׁ se traduce de forma directa con 'tembló', un verbo natural en español que conserva la sacudida poética.
- source_word: שָׁמַיִם נָטָפוּ
  english_pob_choice: the heavens also dripped
  chosen_spanish: los cielos destilaron
  alternatives_spanish:
  - los cielos también gotearon
  - los cielos derramaron
  lexicon: HALOT
  rationale: נָטַף significa 'gotear/ destilar'. 'Destilaron' mantiene la imagen verbal y suena más digno en español bíblico que 'gotearon'; además conserva el paralelismo con el agua que sigue explícitamente.
- source_word: עָבִים נָטְפוּ מָיִם
  english_pob_choice: the clouds also dripped water
  chosen_spanish: las nubes destilaron agua
  alternatives_spanish:
  - las nubes gotearon agua
  - las nubes derramaron agua
  lexicon: HALOT
  rationale: עָבִים son nubes, frecuentemente nubes cargadas de lluvia. 'Nubes' es suficiente y claro en español; 'destilaron agua' preserva el verbo repetido y la concreción de מָיִם sin exagerar el valor de derramamiento.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: La lectura inglesa documenta explícitamente el nombre divino. En español, 'Yahvé' es la forma estándar del proyecto para preservar el nombre del pacto, evitando la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión más reciente marcó el versículo como sin cambios necesarios; se conserva el sentido del audit trail inglés y se adapta al español con equivalencia óptima, sin introducir paráfrasis no respaldadas.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como nombre divino principal, coherente con el estándar del proyecto.
  - '''Campo de Edom'' conserva la imagen concreta del hebreo y la alternativa geográfica queda registrada en nota.'
  - '''Destilaron'' se usó de forma consistente para נָטַף en ambas líneas poéticas, preservando repetición y registro elevado.'
  - 'Se mantuvo el paralelismo sintáctico del versículo: dos cláusulas temporales seguidas de dos cláusulas de resultado.'
