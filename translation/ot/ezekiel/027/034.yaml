id: EZK.27.34
reference: Ezekiel 27:34
source:
  edition: WLC
  text: עֵ֛ת נִשְׁבֶּ֥רֶת מִ/יַּמִּ֖ים בְּ/מַֽעֲמַקֵּי מָ֑יִם מַעֲרָבֵ֥/ךְ וְ/כָל קְהָלֵ֖/ךְ בְּ/תוֹכֵ֥/ךְ נָפָֽלוּ־־׃
translation:
  text: At the time you were broken by the seas in the depths of the waters[b][a], your merchandise and all your assembly in your midst fell.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When you were broken by the seas in the depths of the waters.'
    reason: lexical_alternative
  - marker: b
    text: '''Your assembly'' may refer broadly to all the people gathered within Tyre—its inhabitants, traders, and seafaring company.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵת
  chosen: At the time
  alternatives:
  - When
  lexicon: HALOT
  rationale: Temporal noun introducing the circumstance/time of the event. 'At the time' preserves the nominal construction more closely than the smoother 'when,' while remaining natural English.
- source_word: נִשְׁבֶּרֶת
  chosen: you were broken
  alternatives:
  - you were shattered
  - you were wrecked
  lexicon: HALOT
  rationale: Niphal of שבר, feminine singular agreeing with Tyre as a feminine addressee. 'Broken' is the broad, literal sense and fits the lament imagery without over-specifying maritime wreck language, though 'wrecked' is contextually possible.
- source_word: מִיַּמִּים
  lemma: מִן
  chosen: by the seas
  alternatives:
  - from the seas
  - by the sea
  lexicon: HALOT
  rationale: The preposition מִן can mark source or agency/cause in context. Here, with the passive 'were broken,' 'by the seas' best conveys the destructive force coming from the maritime setting. The plural 'seas' reflects the Hebrew form.
- source_word: בְּמַעֲמַקֵּי מָיִם
  chosen: in the depths of the waters
  alternatives:
  - in the deep waters
  - in the depths of the sea
  lexicon: HALOT
  rationale: Construct phrase literally 'in the depths of waters.' The chosen rendering preserves both the concrete imagery and the Hebrew plurality/collective sense without collapsing it into a singular 'sea.'
- source_word: מַעֲרָבֵךְ
  chosen: your merchandise
  alternatives:
  - your wares
  - your trade goods
  - your exchange
  lexicon: HALOT
  rationale: In Ezekiel 27 the term refers to Tyre's commercial goods/cargo. 'Merchandise' is idiomatic and suitably broad for the city's trading wealth.
- source_word: וְכָל קְהָלֵךְ
  chosen: and all your assembly
  alternatives:
  - and all your company
  - and all your multitude
  lexicon: HALOT
  rationale: קהל commonly denotes an assembled group. In this lament over Tyre's ship-city metaphor, it likely refers to all those gathered within her (crew, traders, inhabitants). 'Assembly' keeps the collective sense without narrowing it too much.
- source_word: בְּתוֹכֵךְ
  chosen: in your midst
  alternatives:
  - within you
  - inside you
  lexicon: HALOT
  rationale: A common idiom for what is located within the city/ship figure. 'In your midst' is natural and preserves the metaphorical spatial sense.
- source_word: נָפָלוּ
  chosen: fell
  alternatives:
  - have fallen
  - sank
  lexicon: HALOT
  rationale: Qal perfect plural of נפל, basic sense 'fell.' In context it can imply perishing/sinking, but 'fell' preserves the Hebrew verb and lets the maritime catastrophe be inferred from context.
