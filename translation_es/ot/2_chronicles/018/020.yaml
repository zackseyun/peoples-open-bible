translation:
  language: es
  text: 'Entonces el espíritu se adelantó[a], se presentó ante Yahvé y dijo: «Yo lo induciré». Y Yahvé le dijo: «¿De qué manera?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo engañaré» o «lo persuadiré». El verbo hebreo puede expresar inducir, persuadir o engañar según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרוּחַ
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el viento
  - el aliento
  lexicon: HALOT
  rationale: 'En este escenario de consejo celestial, el sujeto actúa personalmente: sale, se presenta y habla. Por eso ''el espíritu'' conserva mejor la fuerza personal del hebreo que ''viento'' o ''aliento''.'
- source_word: וַיֵּצֵא
  english_pob_choice: came forward
  chosen_spanish: salió
  alternatives_spanish:
  - salió al frente
  - se presentó
  lexicon: HALOT
  rationale: El verbo básico es 'salir/ir afuera'. En español, 'salió' mantiene la literalidad suficiente y funciona bien dentro de la escena formal sin añadir más de lo que el hebreo dice.
- source_word: וַיַּעֲמֹד לִפְנֵי
  english_pob_choice: stood before
  chosen_spanish: se puso delante de
  alternatives_spanish:
  - se mantuvo delante de
  - estuvo ante
  lexicon: HALOT
  rationale: La expresión idiomática indica comparecer o presentarse ante una autoridad. 'Se puso delante de' comunica esa postura de audiencia de manera natural en español y conserva el sentido de presentación ante Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrama: usar la forma transliterada ''Yahvé'' en vez de sustituirlo por un título. Es la opción más consistente con la transparencia hacia el nombre divino del original.'
- source_word: אֲפַתֶּנּוּ
  english_pob_choice: I will entice him
  chosen_spanish: lo induciré
  alternatives_spanish:
  - lo seduciré
  - lo persuadiré
  - lo engañaré
  lexicon: HALOT
  rationale: El piel de פתה puede abarcar inducir, persuadir, seducir o engañar según el contexto. 'Lo induciré' conserva la amplitud semántica y no resuelve prematuramente la tensión moral; 'engañar' sería más explícito pero más interpretativo, y 'persuadir' puede sonar demasiado neutral.
- source_word: בַּמָּה
  english_pob_choice: By what means?
  chosen_spanish: ¿De qué manera?
  alternatives_spanish:
  - ¿Cómo?
  - ¿Por medio de qué?
  lexicon: HALOT
  rationale: La pregunta pide el modo o medio. '¿De qué manera?' es natural en español y mantiene el carácter formal e interrogativo del hebreo sin cargar el texto con una explicación adicional.
theological_decisions:
- issue: Tetragrama en el texto español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto sigue el principio del POB de no enmascarar el nombre divino. 'Yahvé' preserva la referencia explícita al nombre propio de Dios y evita sustituirla por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor moral de פתה en el consejo celestial
  english_pob_reading: I will entice him
  chosen_spanish_reading: lo induciré
  alternative_spanish_readings:
  - lo persuadiré
  - lo engañaré
  - lo seduciré
  rationale: La escena presenta la propuesta del espíritu sin detallar aún el mecanismo completo; la naturaleza engañosa se aclara en el versículo siguiente. 'Lo induciré' conserva esa tensión y no adelanta una glosa doctrinal más fuerte de la que el verso por sí solo exige.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión sigue de cerca el texto hebreo y el audit trail inglés, sin cambios relevantes respecto al pasaje fuente. Se mantiene la misma decisión lexical sobre פתה y el nombre divino, con adaptación natural al español.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - '''El espíritu'' conserva el valor personal del sujeto en la escena celestial.'
  - '''Lo induciré'' mantiene abierta la tensión semántica de פתה, que el versículo siguiente desarrolla.'
