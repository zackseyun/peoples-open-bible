translation:
  language: es
  text: Entonces se volvieron y huyeron hacia el desierto, a la roca de Rimón. Y abatieron[a] a cinco mil hombres de ellos en las calzadas, y los persiguieron hasta Gidom[b], y abatieron a dos mil hombres de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «lo espigaron»; aquí es un modismo para ir abatiendo o recogiendo a los sobrevivientes que huían.
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa sufijos singulares en algunos puntos («tras él», «de él») con referencia colectiva al grupo que huye; en español se explicita con plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְנוּ
  english_pob_choice: they turned
  chosen_spanish: se volvieron
  alternatives_spanish:
  - se giraron
  - volvieron
  lexicon: HALOT
  rationale: פנה expresa un cambio de dirección dentro de la secuencia narrativa; en español, «se volvieron» comunica ese giro de manera natural sin añadir la idea de retroceso total.
- source_word: וַיָּנֻסוּ
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - tomaron la fuga
  - escaparon
  lexicon: HALOT
  rationale: נוס en contexto militar significa huir. «Huyeron» conserva el sentido de derrota y fuga con fluidez en español.
- source_word: הַמִּדְבָּרָה
  english_pob_choice: toward the wilderness
  chosen_spanish: hacia el desierto
  alternatives_spanish:
  - al desierto
  - hacia la región desértica
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia una zona, no solo ubicación estática. «Hacia el desierto» refleja bien esa orientación y es idiomático en español.
- source_word: סֶלַע הָרִמּוֹן
  english_pob_choice: the rock of Rimmon
  chosen_spanish: la roca de Rimón
  alternatives_spanish:
  - la peña de Rimón
  - Rimón Roca
  lexicon: HALOT
  rationale: סֶלַע es «roca» o «peña»; aquí el nombre propio se mantiene transliterado. «La roca de Rimón» preserva la estructura semántica del hebreo y su transparencia toponímica.
- source_word: וַיְעֹלְלֻהוּ
  english_pob_choice: they cut down
  chosen_spanish: abatieron
  alternatives_spanish:
  - mataron
  - los segaron
  lexicon: HALOT
  rationale: El verbo עלל aquí tiene un matiz idiomático de tratar con dureza a los fugitivos, como en la imagen de rebuscar/recoger restos. «Abatieron» comunica la acción bélica y evita una metáfora opaca, sin perder la fuerza del golpe.
- source_word: בַּמְסִלּוֹת
  english_pob_choice: on the highways
  chosen_spanish: en los caminos
  alternatives_spanish:
  - en las carreteras
  - por las calzadas
  lexicon: HALOT
  rationale: מְסִלּוֹת son vías elevadas o rutas principales. «En los caminos» suena natural en español y mantiene la referencia a las rutas de escape, aunque «calzadas» sería más literal pero menos actual.
- source_word: חֲמֵשֶׁת אֲלָפִים אִישׁ
  english_pob_choice: five thousand men
  chosen_spanish: cinco mil hombres
  alternatives_spanish:
  - cinco mil varones
  - cinco mil soldados
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «cinco mil hombre(s)». «Hombres» conserva el lenguaje militar/censal sin introducir «soldados», que sería interpretativo.
- source_word: וַיַּדְבִּיקוּ אַחֲרָיו
  english_pob_choice: pursued them as far as Gidom
  chosen_spanish: los persiguieron hasta Gidom
  alternatives_spanish:
  - fueron tras ellos hasta Gidom
  - los siguieron de cerca hasta Gidom
  lexicon: HALOT
  rationale: דבק en este contexto expresa una persecución insistente y pegada al fugitivo. Dado que el inglés revisado eliminó «hard» por no estar explícito, en español «los persiguieron» conserva el sentido sin añadir intensidad no indicada. El objeto plural refleja el referente colectivo del sufijo singular hebreo.
- source_word: עַד גִּדְעֹם
  english_pob_choice: as far as Gidom
  chosen_spanish: hasta Gidom
  alternatives_spanish:
  - así como Gidom
  - hasta la ciudad de Gidom
  lexicon: HALOT
  rationale: עַד marca el límite de la persecución. «Hasta Gidom» es la forma más directa y natural en español para una frontera geográfica.
- source_word: וַיַּכּוּ מִמֶּנּוּ
  english_pob_choice: struck down two thousand men of them
  chosen_spanish: derribaron a dos mil hombres de ellos
  alternatives_spanish:
  - mataron a dos mil hombres de ellos
  - abatieron a dos mil hombres de ellos
  lexicon: HALOT
  rationale: נכה en lenguaje bélico suele significar golpear mortalmente o abatir. «Derribaron» mantiene el valor de caída por la acción militar y deja visible el partitivo «de ellos» para reflejar מִמֶּנּוּ como «de entre el grupo».
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail que eliminó «hard» de la traducción inglesa de «pursued them», por no estar sustentado por el hebreo. La redacción española evita añadir intensidad extra y sigue la equivalencia óptima documentada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Mesías/Cristo» no aparece en el pasaje.
  - Se conserva el nombre propio «Gidom» conforme a la transliteración del inglés auditado y del hebreo vocalizado en la tradición textual aportada.
  - El sufijo colectivo hebreo se resuelve con plurales naturales en español para no oscurecer el referente militar.
