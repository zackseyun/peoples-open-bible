    rationale: La nota sobre «tu hueso y tu carne» aparece anclada en «Israel[a]», pero debe ir en la frase idiomática a la que explica, según la disciplina de notas requerida.
  - severity: medium
    issue: Marcador de nota lexical sobre Hebrón anclado en «Mira»
    rationale: La nota que explica la terminación direccional de «Hebrón» debe anclarse en «Hebrón», no en «Mira», para corresponder exactamente al elemento textual relevante.
