translation:
  language: es
  text: 'Por tanto, así dice el Señor Dios Yahvé: Como la madera de la vid entre los árboles del bosque[a], que he entregado al fuego para ser consumida, así he entregado a los habitantes de Jerusalén.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «al fuego para consumo»; es decir, como algo para ser quemado hasta quedar destruido. O, más literalmente, «al fuego para ser consumida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: La partícula inferencial introduce la conclusión del símil anterior; «Por tanto» conserva el valor consecutivo con tono profético natural en español.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - esto dice
  - así ha dicho
  lexicon: HALOT
  rationale: La fórmula profética se mantiene con la cadencia clásica y comprensible de «así dice», sin volverla excesivamente arcaica.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino YHWH como «Yahvé» según el criterio del proyecto, y אֲדֹנָי se vierte «Señor». No se usa la convención de ocultarlo como «SEÑOR».
- source_word: עֵץ הַגֶּפֶן
  english_pob_choice: the wood of the vine
  chosen_spanish: la madera de la vid
  alternatives_spanish:
  - la madera de la vid de uva
  - el leño de la vid
  lexicon: HALOT
  rationale: עֵץ aquí designa la materia leñosa, no un árbol abstracto; «madera» suena natural en español y conserva la imagen de combustible.
- source_word: בְּעֵץ הַיַּעַר
  english_pob_choice: among the trees of the forest
  chosen_spanish: entre los árboles del bosque
  alternatives_spanish:
  - en medio de los árboles del bosque
  - con los árboles del bosque
  lexicon: HALOT
  rationale: La preposición comparativa/locativa se expresa con «entre» para mantener el contraste visible entre la vid y los árboles del bosque.
- source_word: נְתַתִּיו
  english_pob_choice: which I have given
  chosen_spanish: que he entregado
  alternatives_spanish:
  - que he dado
  - que entregué
  lexicon: HALOT
  rationale: «Entregar» conserva mejor la idea de poner algo en manos del fuego como destino, evitando que «dar» suene demasiado neutro en español.
- source_word: לָאֵשׁ לְאָכְלָה
  english_pob_choice: to the fire for fuel
  chosen_spanish: al fuego para ser consumida
  alternatives_spanish:
  - al fuego para ser quemada
  - al fuego para consumo
  lexicon: HALOT
  rationale: 'Se preserva la tensión lexical del hebreo: literalmente es «al fuego para consumo», es decir, para ser devorada/quemada. «Para ser consumida» mantiene esa amplitud sin imponer una sola imagen.'
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de la misma manera
  - de ese modo
  lexicon: HALOT
  rationale: Marca la correspondencia del símil con una partícula breve y natural en español.
- source_word: נָתַתִּי
  english_pob_choice: I have given
  chosen_spanish: he entregado
  alternatives_spanish:
  - he dado
  - entregué
  lexicon: HALOT
  rationale: Se mantiene el perfecto para la fuerza retórica de juicio ya dispuesto; «entregar» enlaza con el mismo matiz de destino/abandono al fuego.
- source_word: יֹשְׁבֵי יְרוּשָׁלִָם
  english_pob_choice: the inhabitants of Jerusalem
  chosen_spanish: los habitantes de Jerusalén
  alternatives_spanish:
  - los moradores de Jerusalén
  - los que habitan en Jerusalén
  lexicon: HALOT
  rationale: «Habitantes» reproduce bien el participio sustantivado y el sentido colectivo del grupo señalado.
theological_decisions:
- issue: Cómo verter el nombre divino יְהוָה dentro del título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahweh
  rationale: El texto hebreo contiene el Tetragrámaton de forma explícita, por lo que el proyecto pide «Yahvé» en el texto principal. Se conserva «Señor» para אֲדֹנָי y no se recurre a «SEÑOR» como máscara editorial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el audit trail inglés. Se retuvo la comparación imagética completa de la vid entre los árboles del bosque y se evitó suavizar la sentencia final. La única tensión lexical explícita del inglés («for fuel» / «to be consumed») se preserva en español con una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוִה conforme al criterio del proyecto.
  - «Señor» se reserva para אֲדֹנָי dentro del título compuesto.
  - Se eligió «madera» por el valor material de עֵץ en este contexto.
  - El perfecto español con «he entregado» reproduce el valor retórico del hebreo y del inglés auditado.
