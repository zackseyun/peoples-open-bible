    reason: textual_variant
  - marker: b
    text: O 'el comandante de su ejército'. El sufijo hebreo es singular.
    reason: lexical_alternative
  revision_rationale: 'Se corrige el punto principal de fidelidad al rastro auditado: רֶכֶב pasa al texto principal como referente humano/militar (''aurigas''), y la incertidumbre textual/léxica queda en nota. Se mueve la nota al lugar correcto y se conserva la alternativa sobre ''su/su ejército''. También se ajusta ''hirió'' a ''abatió'' para reflejar mejor el valor mortal de הִכָּה en este contexto sin borrar la distinción con ''mató''.'
