translation:
  language: es
  text: y su partida de nosotros fue considerada una ruina[a][b], pero ellos están en paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se consideró un desastre».'
    reason: alternative_reading
  - marker: b
    text: Griego «en paz», frase que puede sugerir no solo ausencia de conflicto, sino también reposo y bienestar.
    reason: lexical_alternative
lexical_decisions:
- source_word: πορεία
  english_pob_choice: departure
  chosen_spanish: partida
  alternatives_spanish:
  - partida
  - salida
  - ida
  lexicon: LSJ
  rationale: πορεία aquí designa el irse o partir de los justos; «partida» conserva el movimiento de alejamiento sin convertirlo de manera explícita en «muerte», que el griego de esta cláusula no dice de forma directa.
- source_word: ἀφʼ ἡμῶν
  english_pob_choice: from us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - de nosotros
  - de entre nosotros
  - alejándose de nosotros
  lexicon: LSJ
  rationale: 'La relación es espacial y humana: su partida se entiende desde la perspectiva de quienes quedan. «De nosotros» sigue de cerca el griego y mantiene esa referencia relacional.'
- source_word: σύντριμμα
  english_pob_choice: ruin
  chosen_spanish: ruina
  alternatives_spanish:
  - destrucción
  - quebranto
  - desmoronamiento
  lexicon: LSJ
  rationale: σύντριμμα puede expresar quebranto, ruina o destrucción. «Ruina» funciona bien en español después de «fue considerada» y conserva la idea de calamidad percibida sin exceder el valor léxico.
- source_word: οἱ δὲ
  english_pob_choice: but they
  chosen_spanish: pero ellos
  alternatives_spanish:
  - pero ellos
  - y ellos
  - mas ellos
  lexicon: LSJ
  rationale: El δέ introduce contraste. «Pero ellos» reproduce esa oposición entre la evaluación humana y la realidad de su condición.
- source_word: ἐν εἰρήνῃ
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - en paz
  - en bienestar
  - en descanso
  lexicon: LSJ
  rationale: '«En paz» conserva la frase griega de forma clara y admite su amplitud semántica: ausencia de conflicto, reposo y bienestar.'
theological_decisions:
- issue: Si el verbo debe expresar percepción humana o afirmar la realidad objetiva de la partida como ruina
  english_pob_reading: was thought to be ruin
  chosen_spanish_reading: fue considerada ruina
  alternative_spanish_readings:
  - era ruina
  - parecía desastre
  - se juzgó ruina
  rationale: El contexto más amplio contrasta la evaluación de los impíos con la verdadera condición de los justos. Por eso conviene dejar explícito el matiz de percepción humana para no convertir una valoración en una afirmación objetiva del texto.
  doctrine_reference: Preservar la tensión teológica del pasaje y la primacía del original frente a una resolución interpretativa excesiva.
- issue: 'El alcance de ἐν εἰρήνῃ: paz meramente negativa o plenitud de bienestar'
  english_pob_reading: Greek 'in peace,' a phrase that can suggest not only absence of conflict but also rest and well-being.
  chosen_spanish_reading: en paz
  alternative_spanish_readings:
  - en tranquilidad
  - en reposo
  - en bienestar
  rationale: «En paz» es suficientemente literal y, en español, puede abarcar tanto ausencia de conflicto como reposo y bienestar, sin necesidad de añadir glosa al texto principal.
  doctrine_reference: Mantener la amplitud semántica del término bíblico sin reducirlo a una sola dimensión.
translation_notes:
  revision_awareness: Se ha seguido el sentido del griego de Swete 1909 y el audit trail inglés. No hay revisión textual adicional aplicada; la redacción española conserva la tensión entre la percepción humana de ruina y la realidad de paz.
  spanish_consistency_notes:
  - Se mantiene «paz» para ἐν εἰρήνῃ, coherente con el valor amplio reconocido en el expediente inglés.
  - Se evita «muerte» o «fallecimiento» en la primera cláusula para no ir más allá de πορεία.
  - La secuencia «fue considerada ruina» refleja la lectura de percepción sin desplazar el sujeto gramatical del griego.
