base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/022/002.yaml
  text: And everyone in distress[a], everyone who was in debt, and everyone bitter in soul gathered to him, and he became commander over them[b]. About four hundred men were with him.
  footnotes:
