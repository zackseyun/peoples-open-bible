id: JHN.17.12
reference: 'John 17:12'
language:
  code: ko
  name: Korean
  variant: '표준어 / modern formal-polite (합쇼체)'
source:
  edition: SBLGNT
  text: ὅτε ἤμην μετ’ ⸀αὐτῶν ἐγὼ ἐτήρουν αὐτοὺς ἐν τῷ ὀνόματί σου ⸀ᾧ δέδωκάς μοι, ⸀καὶ ἐφύλαξα, καὶ οὐδεὶς ἐξ αὐτῶν ἀπώλετο εἰ μὴ ὁ υἱὸς τῆς ἀπωλείας, ἵνα ἡ γραφὴ πληρωθῇ.
base_translation:
  language: en
  yaml_path: translation/nt/john/017/012.yaml
  text: While I was with them[a], I kept them in your name, which you have given me, and I guarded them, and not one of them perished except the son of destruction[b], so that the Scripture might be fulfilled.
  footnotes:
  - marker: a
    text: Or 'none of them was lost.'
    reason: lexical_alternative
  - marker: b
    text: '''The son of destruction'' is a Hebrew-style expression; alternatively, ''the one destined for destruction'' or traditionally ''the son of perdition.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 내가 그들과 함께 있을 때, 아버지께서 내게 주신 아버지의 이름으로 그들을 지켰고 보호하였습니다. 그들 가운데 아무도 멸망하지 않았으며, 오직 멸망의 아들만 멸망하였습니다. 이는 성경이 이루어지게 하려는 것이었습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그들 가운데 아무도 잃어버려지지 않았다」.
    reason: lexical_alternative
  - marker: b
    text: '「멸망의 아들」은 히브리식 표현으로, 「멸망에 정해진 자」 혹은 전통적으로 「멸망의 자식」으로 옮길 수 있다. 가룟 유다를 가리킨다(요 13:18).'
    reason: lexical_alternative
