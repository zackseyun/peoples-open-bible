translation:
  language: es
  text: Y los hijos de Israel[a] volvieron a hacer lo malo ante los ojos de Yahvé después de que Ehud murió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, “los israelitas”. Hebreo: “los hijos de Israel”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסִפוּ
  english_pob_choice: again did
  chosen_spanish: siguieron haciendo
  alternatives_spanish:
  - volvieron a hacer
  - continuaron haciendo
  lexicon: HALOT
  rationale: El verbo יסף con infinitivo expresa repetición/continuación. En español, 'siguieron haciendo' comunica bien la idea de recaída recurrente sin sonar mecánico; 'volvieron a hacer' sería también posible, pero 'siguieron' mantiene el matiz de persistencia narrativa.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la forma corpórea masculina y transparente del hebreo ('sons/children of Israel'). 'Los israelitas' es una alternativa natural, pero menos cercana a la forma fuente; 'hijos' funciona bien en español bíblico sin perder claridad.
- source_word: לַעֲשׂוֹת הָרַע
  english_pob_choice: did what was evil
  chosen_spanish: siguieron haciendo lo malo
  alternatives_spanish:
  - siguieron haciendo el mal
  - volvieron a hacer lo malo
  lexicon: HALOT
  rationale: La fórmula hebrea de juicio moral se vierte en español como un predicado verbal natural. 'Lo malo' conserva el sustantivo evaluativo del original; 'el mal' sería posible, pero puede sonar más abstracto. Se evita paraphrasear más allá del juicio moral básico.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en los ojos de Yahvé
  lexicon: HALOT
  rationale: Se preserva la imagen idiomática de 'eyes' con una preposición natural en español. 'Ante los ojos de' es clara y fiel al hebreo; 'en los ojos de' suena menos idiomático en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrama: ''Yahvé''. No se sustituye por ''SEÑOR'', porque la lectura auditada preserva el nombre divino personal.'
- source_word: וְאֵהוּד מֵת
  english_pob_choice: after Ehud died
  chosen_spanish: y Ehud murió
  alternatives_spanish:
  - después de la muerte de Ehud
  - y Ehud había muerto
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula temporal de fondo con waw + sujeto + verbo perfecto. En español, la forma más natural y fiel es 'y Ehud murió', sin introducir un pluscuamperfecto innecesario. El valor temporal queda inferido por el contexto narrativo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La traducción sigue la decisión doctrinal de conservar el Nombre divino en transliteración. 'Yahvé' preserva el carácter propio del Tetragrama y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered corporate designation בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se mantiene la estructura masculina plural del hebreo. En español, 'hijos de Israel' es transparente y respeta la forma fuente; 'israelitas' se reserva como opción más inclusiva/explicativa, pero menos cercana al término hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'La versión española corrige la validación anterior asegurando que el marcador de nota [a] aparezca en el texto principal. Además, se alineó la clausula final con la revisión más reciente: no se usa pluscuamperfecto; se mantiene una forma directa y narrativa.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para el Tetragrama.
  - Se conserva 'los hijos de Israel' para reflejar el hebreo masculino plural.
  - La fórmula moral 'hacer lo malo' es idiomática y no diluye el juicio ético del original.
  - Se evita 'SEÑOR' para no ocultar el nombre divino según la convención del proyecto.
