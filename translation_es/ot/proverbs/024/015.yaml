translation:
  language: es
  text: No aceches, oh malvado[a], la morada del justo; no devastes su lugar de reposo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'No embosques la casa del justo.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''su lugar de echarse'' o ''su lugar de reposo''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No debes
  - Nunca
  lexicon: HALOT
  rationale: La partícula prohibitiva se vierte con una negativa directa en español; 'No' conserva la fuerza imperativa breve y natural.
- source_word: תֶּאֱרֹב
  english_pob_choice: lie in wait
  chosen_spanish: aceches
  alternatives_spanish:
  - tender una emboscada
  - estar al acecho
  lexicon: HALOT
  rationale: '''Acechar'' transmite bien la idea de esconderse para atacar, sin forzar una imagen militar más específica que el hebreo no exige.'
- source_word: רָשָׁע
  english_pob_choice: wicked man
  chosen_spanish: malvado
  alternatives_spanish:
  - malvado hombre
  - impío
  lexicon: HALOT
  rationale: En vocativo, el español suena más natural con el adjetivo sustantivado 'malvado'. Mantiene la caracterización moral y la dirección al destinatario.
- source_word: לִנְוֵה
  english_pob_choice: against the dwelling
  chosen_spanish: la morada
  alternatives_spanish:
  - la casa
  - la vivienda
  - el hogar
  lexicon: HALOT
  rationale: '''Naveh'' designa una morada o vivienda; ''morada'' conserva el registro bíblico sin caer en arcaísmo excesivo. La preposición hostil del inglés se resuelve de forma idiomática en el contexto español con la estructura verbal ''aceches ... la morada''.'
- source_word: צַדִּיק
  english_pob_choice: of the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - del justo
  - de los rectos
  lexicon: HALOT
  rationale: El plural genérico 'los justos' expresa correctamente la clase moral en español y resulta más natural que un singular abstracto en esta construcción.
- source_word: תְּשַׁדֵּד
  english_pob_choice: devastate
  chosen_spanish: devastes
  alternatives_spanish:
  - destruyas
  - arrases
  - saquees
  lexicon: HALOT
  rationale: '''Shadad'' implica despojar/arruinar violentamente; ''devastar'' en español conserva la amplitud de ruina sin reducirse solo al saqueo material.'
- source_word: רִבְצוֹ
  english_pob_choice: his resting place
  chosen_spanish: su lugar de reposo
  alternatives_spanish:
  - su sitio de descanso
  - su lecho
  - su lugar donde reposa
  lexicon: HALOT
  rationale: La expresión hebrea puede significar 'lugar de reposo' o 'lugar de echarse'. 'Lugar de reposo' comunica la imagen sin exagerar el matiz zoológico de 'lying-down place'.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: ''lie in wait'' se mantuvo con un verbo de acecho en español; ''wicked man'' se adaptó al vocativo ''malvado'' para una lectura natural; y ''resting place'' se conservó como ''lugar de reposo'' para no perder el paralelismo semántico con el hebreo.'
  spanish_consistency_notes:
  - Se prefirió 'morada' para נוה por consistencia con el registro bíblico y porque evita una interpretación demasiado moderna.
  - Se usó 'justos' en plural genérico para la clase moral, coherente con el español bíblico contemporáneo.
  - Los signos de exclamación no se usaron para no añadir énfasis no presente en el hebreo.
