- from: Así que me volví para considerar la sabiduría[a], la locura y la necedad; porque ¿qué puede hacer el hombre que viene después del rey? Solo lo que ya se había hecho.
  to: Así que me volví para considerar la sabiduría[a], la locura y la necedad; porque ¿qué puede hacer el hombre que viene después del rey? Solo lo que ya se ha hecho.
  rationale: Se conserva la estructura y las decisiones léxicas sólidas del borrador, pero se corrige la cláusula final para alinearla mejor con el perfecto hebreo ambiguo y con la auditoría inglesa. «Ya se ha hecho» es más fiel y natural que «ya se había hecho», porque no introduce una anterioridad adicional no marcada en el original.
