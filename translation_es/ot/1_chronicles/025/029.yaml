translation:
  language: es
  text: 'Para el vigésimo segundo[a]: a Gidalti, sus hijos varones y sus hermanos, doce.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Para el vigésimo segundo lote, a Gidalti, sus hijos varones y sus hermanos: doce». El hebreo presenta un estilo muy comprimido; «lote» está implícito por el contexto de la secuencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁנַיִם וְעֶשְׂרִים
  english_pob_choice: For the twenty-second
  chosen_spanish: Para el vigésimo segundo[a]
  alternatives_spanish:
  - Para el veintidós
  - Para el vigésimo segundo lote
  lexicon: HALOT
  rationale: La fórmula introduce el turno numerado dentro de la lista. En español, «vigésimo segundo» conserva el valor ordinal con naturalidad; «Para» refleja el ל de asignación/encabezamiento de la lista. Mantengo la ambigüedad documental entre orden y lote en una nota.
- source_word: לְגִדַּלְתִּי
  english_pob_choice: to Giddalti
  chosen_spanish: a Gidalti
  alternatives_spanish:
  - para Gidalti
  lexicon: HALOT
  rationale: El ל marca la asignación al individuo nombrado. «A Gidalti» es natural en español para destinatario o asignación en una lista, y preserva la función direccional sin añadir más de lo que el hebreo dice.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus descendientes
  lexicon: HALOT
  rationale: Aunque el hebreo es específicamente masculino plural, en español «hijos» puede abarcar aquí la descendencia masculina implícita en la lista, sin necesidad de sobrecargar el texto. La POB inglesa optó por «sons»; en español se mantiene la referencia filial directa.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  lexicon: HALOT
  rationale: La equivalencia básica y precisa es «hermanos». No se amplía a parentesco más general, porque el texto no lo exige.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - eran doce
  lexicon: HALOT
  rationale: El numeral final funciona como total del grupo en aposición. En español, «doce» es suficiente y evita introducir un verbo inexistente en el hebreo.
translation_notes:
  revision_awareness: El texto hebreo y la POB inglesa coinciden en una lectura altamente estable. No se requieren revisiones textuales ni ajustes doctrinales; la única cuestión relevante es la condensación sintáctica de la lista y la posibilidad de hacer explícito «lote» en español como nota alternativa.
  spanish_consistency_notes:
  - Se usa «Gidalti» para reflejar la transliteración hispana del nombre propio, manteniéndola consistente con una ortografía española legible.
  - Se preserva el orden breve de lista, con puntuación mínima para reflejar la sintaxis comprimida del original.
  - No se introduce «era/eran» porque el hebreo no lo expresa y la apposición numeral es suficiente en español bíblico moderno.
