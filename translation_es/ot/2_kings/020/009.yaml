    issue: «hará la cosa que ha dicho» suena antinatural en español
    rationale: Aunque דָּבָר puede significar «cosa», en español esta formulación resulta torpe. «hará lo que ha dicho» conserva el contenido de cumplimiento prometido y mejora claramente la legibilidad sin alejarse del hebreo.
  - severity: low
    issue: «Esta es para ti la señal» es algo rígido
    rationale: La secuencia es comprensible, pero «Esta será para ti la señal» refleja bien la función anunciadora de la señal y suena más natural en contexto narrativo-profético.
