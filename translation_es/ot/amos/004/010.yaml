revisions:
- from: Yo envié entre ustedes una plaga en el modo de Egipto[a]; maté a sus jóvenes con la espada, junto con el cautiverio[b] de sus caballos, e hice subir el hedor de sus campamentos hasta sus narices; pero no volvieron a mí, declara Yahvé.
  to: Envié entre ustedes una plaga al modo de Egipto[a]; maté a sus jóvenes con la espada, junto con sus caballos capturados[b], e hice subir el hedor de sus campamentos hasta sus narices; pero no volvieron a mí, declara Yahvé.
  rationale: La revisión corrige dos calcos que debilitaban la legibilidad sin mejorar la fidelidad. «Al modo de Egipto» expresa de forma idiomática el valor alusivo de בְּדֶרֶךְ מִצְרַיִם. «Sus caballos capturados» traduce el sentido documentado de עִם שְׁבִי סוּסֵיכֶם mejor que el abstracto «el cautiverio de sus caballos». También se elimina el «Yo» inicial por estilo español más natural, sin pérdida de significado.
