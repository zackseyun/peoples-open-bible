translation:
  language: es
  text: 'Y Salomón sacrificó el sacrificio de ofrendas de paz[a], que ofreció a Yahvé: veintidós mil reses y ciento veinte mil ovejas. Así el rey y todos los hijos de Israel[b] dedicaron la casa de Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ofrendas de comunión' u 'ofrendas de bienestar'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''los hijos de Israel''; es decir, los israelitas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְבַּח
  english_pob_choice: sacrificed
  chosen_spanish: sacrificó
  alternatives_spanish:
  - ofreció
  lexicon: HALOT
  rationale: En contexto sacrificial, זבח expresa el acto de sacrificar; en español, 'sacrificó' conserva mejor la acción cultual que 'ofreció', que resulta más genérico.
- source_word: זֶבַח הַשְּׁלָמִים
  english_pob_choice: the sacrifice of peace offerings
  chosen_spanish: el sacrificio de ofrendas de paz
  alternatives_spanish:
  - el sacrificio de ofrendas de comunión
  - el sacrificio de ofrendas de bienestar
  lexicon: HALOT
  rationale: Mantiene la estructura formal 'sacrificio de...' y traduce שְׁלָמִים con un término bíblico comprensible en español. 'Ofrendas de paz' conserva la tradición terminológica sin ocultar la fuerza cultual del hebreo; las alternativas expresan matices legítimos, pero son menos establecidas.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  lexicon: HALOT
  rationale: La forma hebrea contiene el nombre divino; por norma del proyecto se preserva 'Yahvé' en el texto principal, no una máscara como 'SEÑOR'.
- source_word: בָּקָר
  english_pob_choice: cattle
  chosen_spanish: reses
  alternatives_spanish:
  - ganado vacuno
  - bovinos
  lexicon: HALOT
  rationale: בָּקָר designa el ganado bovino como colectivo. 'Reses' es natural en español bíblico para un gran número de animales sacrificiales y evita la estrechez de 'toros' u 'oxen'.
- source_word: צֹאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado menor
  - ovejas y cabras
  lexicon: HALOT
  rationale: צֹאן puede abarcar ovejas y cabras; aquí, como en el POB inglés, 'ovejas' comunica la escala del sacrificio con claridad. La alternativa más literal 'ganado menor' es correcta pero menos fluida.
- source_word: וַיַּחְנְכוּ
  english_pob_choice: dedicated
  chosen_spanish: dedicaron
  alternatives_spanish:
  - consagraron
  - inauguraron
  lexicon: HALOT
  rationale: En este contexto, חנך se refiere a poner el edificio al servicio sagrado. 'Dedicaron' es idiomático y fiel; 'consagraron' y 'inauguraron' son posibles, pero una enfatiza lo cultual y la otra lo ceremonial.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahvé
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea 'casa de Yahvé' siguiendo de cerca el original; 'templo' interpreta el sustantivo, aunque es comprensible.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la fórmula covenantal y formal del hebreo. 'Hijos de Israel' reproduce la expresión de manera transparente; 'israelitas' sería más idiomático pero menos literal.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton, así que el español debe preservar el nombre divino en forma audible. Se evita 'SEÑOR' porque esa convención enmascara la forma original y no refleja la política textual del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Terminología de שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: '''Shlamim'' tiene un campo semántico amplio. ''Ofrendas de paz'' conserva la tradición bíblica y sigue siendo entendible; las alternativas aclaran aspectos del término, pero cambian el registro y pueden sonar más explicativas que la fuente.'
  doctrine_reference: HALOT; DOCTRINE.md Translation philosophy §2
- issue: Expresión étnica בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: La frase hebrea es una designación formal del pueblo del pacto. 'Hijos de Israel' mantiene la correspondencia estructural y el peso tradicional; las alternativas son legítimas, pero menos transparentes respecto del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el POB inglés. Se preservan las elecciones auditadas: el verbo sacrificial fuerte (''sacrificó''), la fórmula cultual ''sacrificio de ofrendas de paz'', el nombre divino ''Yahvé'' y la designación formal ''hijos de Israel''. No se detectaron revisiones posteriores aplicadas en el expediente; el estado más reciente indica sin cambios.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con la política del proyecto para יְהוָה.
  - Se evita 'SEÑOR' en el texto principal porque el expediente inglés ya optó por 'Yahweh'.
  - La frase 'casa de Yahvé' conserva la metáfora del hebreo; no se suaviza a 'templo' en el texto principal.
  - '''Hijos de Israel'' mantiene la fórmula bíblica formal y queda explicada en nota para lectores que prefieran el equivalente idiomático.'
