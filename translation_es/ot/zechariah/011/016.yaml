review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del hebreo y del audit trail inglés: Yahvé levanta a un pastor negligente y depredador; se conservan las cuatro omisiones pastorales y la imagen final violenta. Sin embargo, hay dos desajustes relevantes. Primero, הַנִּשְׁבֶּרֶת y הַנִּצָּבָה son femeninos singulares en la imaginería del rebaño; en español, «al quebrantado» y «al sano» suenan demasiado masculinos/personales y menos naturales para ovejas. Segundo, «los engordados» resulta algo forzado y menos idiomático que una opción como «las más gordas», que refleja mejor הַבְּרִיאָה en contexto animal.'
  spanish_quality_summary: 'La redacción es clara y digna, pero puede sonar algo rígida en tres puntos: «yo levanto» en presente simple después de «he aquí» funciona, aunque «estoy levantando» o «levanto» ambos son posibles; «al quebrantado» y «al sano» no son la mejor solución en español por concordancia e imaginería; «los engordados» es comprensible pero poco natural. También conviene evitar el punto y coma antes de «pero», ya que la coordinación adversativa fluye mejor con coma en este versículo.'
  glossary_alignment: 'La terminología principal está alineada con POB: «pastor», «atenderá», «dispersos», «sanará», «sostendrá», «pezuñas». No hay conflicto con glosario teológico mayor. La decisión de seguir la revisión inglesa con «dispersos» y «sano» es aceptable, pero en español conviene ajustar la forma superficial para legibilidad sin perder la nota literal.'
  issues:
  - severity: medium
    issue: «al quebrantado» y «al sano» suenan masculinos y poco naturales en contexto de rebaño
    rationale: El hebreo usa participios/adjetivo femeninos singulares, muy plausiblemente refiriéndose a una oveja o res del rebaño. En español, «la quebrantada» y «la sana» preservan mejor la imaginería pastoral y evitan una lectura antropológica innecesaria.
  - severity: medium
    issue: «los engordados» es poco idiomático
    rationale: Aunque transmite el sentido de animales cebados, no suena natural en español bíblico general. «Las más gordas» o «las gordas» comunica mejor el valor contextual de הַבְּרִיאָה dentro de la metáfora de rebaño.
  - severity: low
    issue: Puntuación antes de «pero»
    rationale: El punto y coma no es incorrecto, pero una coma da mejor fluidez y se ajusta más a un español natural en una enumeración verbal continua.
  revised_spanish_text: Porque he aquí[a], yo levanto a un pastor en la tierra que no atenderá a los que perecen[b], no buscará a los dispersos, no sanará a la quebrantada, no sostendrá a la sana[c], pero comerá la carne de las más gordas y arrancará sus pezuñas.
  revised_footnotes:
