translation:
  language: es
  text: Antes del placer hay deseo, y después del placer, gozo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πρὸ μὲν οὖν
  english_pob_choice: before
  chosen_spanish: Antes de
  alternatives_spanish:
  - Antes
  - Previo a
  lexicon: LSJ
  rationale: πρό con genitivo expresa prioridad temporal; en español, «antes de» comunica con naturalidad esa relación sin añadir elementos que no están en el griego. Se conserva el enlace argumentativo de μέν οὖν mediante la simple secuencia de la frase.
- source_word: τῆς ἡδονῆς
  english_pob_choice: pleasure
  chosen_spanish: el placer
  alternatives_spanish:
  - el deleite
  - la satisfacción
  lexicon: LSJ
  rationale: Ἡδονή denota placer o gratificación. «Placer» es la correspondencia más directa y mantiene la diferencia con χαρά en la segunda cola.
- source_word: ἐπιθυμία
  english_pob_choice: desire comes
  chosen_spanish: el deseo
  alternatives_spanish:
  - deseo
  - anhelo
  lexicon: LSJ
  rationale: 'El griego dice literalmente «hay/demora deseo» en una relación de anterioridad; el español más fiel y natural es nominal: «está el deseo». No se añade un verbo de movimiento para no sobreinterpretar el giro griego.'
- source_word: μετὰ δὲ τὴν ἡδονήν
  english_pob_choice: after pleasure
  chosen_spanish: después del placer
  alternatives_spanish:
  - tras el placer
  - luego del placer
  lexicon: LSJ
  rationale: Μετά con acusativo marca sucesión temporal. «Después del placer» reproduce bien esa secuencia y mantiene el paralelismo con la primera mitad del versículo.
- source_word: χαρά
  english_pob_choice: joy
  chosen_spanish: el gozo
  alternatives_spanish:
  - la alegría
  - el júbilo
  lexicon: LSJ
  rationale: Χαρά es «gozo» o «alegría». Se eligió «gozo» para diferenciarlo con claridad de ἡδονή («placer») y conservar la distinción conceptual que el griego hace entre ambos términos.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión inglesa que prefirió una estructura más cercana al griego («Before pleasure is desire…») y evita expandir el verbo. En español, esa misma economía se refleja con una copulativa nominal: «Antes del placer está el deseo, y después del placer, el gozo».'
  spanish_consistency_notes:
  - Se mantiene «placer» para ἡδονή en ambos miembros para preservar el contraste con χαρά.
  - Se usa «gozo» para χαρά, evitando sinonimia con «placer» y respetando la distinción lexical del griego.
  - La sintaxis es concisa y publicación-readable, sin convertir el pasaje en una paráfrasis explicativa.
