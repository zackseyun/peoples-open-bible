translation:
  language: es
  text: cuando puse una nube como su vestido, y densas tinieblas como su pañal[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su paño de envolver». El hebreo evoca la imagen de envolver a un recién nacido, continuando la metáfora del nacimiento del mar en el contexto circundante.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשׂוּמִי
  english_pob_choice: when I made
  chosen_spanish: cuando puse
  alternatives_spanish:
  - cuando hice
  - cuando establecí
  - al poner
  lexicon: HALOT
  rationale: 'El infinitivo constructo con ב y sufijo de 1ª persona expresa un momento temporal: «cuando puse/coloqué». «Puse» comunica la acción divina de manera natural en español y mantiene el valor poético del verso sin añadir explicaciones.'
- source_word: עָנָן
  english_pob_choice: a cloud
  chosen_spanish: una nube
  alternatives_spanish:
  - nube
  lexicon: HALOT
  rationale: עָנָן es «nube». En español, el artículo indefinido conserva la fluidez poética y refleja el valor no marcado del sustantivo en este contexto.
- source_word: לְבֻשׁוֹ
  english_pob_choice: its garment
  chosen_spanish: su vestido
  alternatives_spanish:
  - su ropa
  - su cobertura
  - su manto
  lexicon: HALOT
  rationale: לְבוּשׁ remite a ropa/vestido/vestidura. «Vestido» preserva la metáfora de vestimenta y resulta más natural que un calco literal de «garment» en español.
- source_word: וַעֲרָפֶל
  english_pob_choice: and thick darkness
  chosen_spanish: tinieblas espesas
  alternatives_spanish:
  - y densa oscuridad
  - y tiniebla espesa
  - y negrura densa
  lexicon: HALOT
  rationale: עֲרָפֶל denota oscuridad densa, tenebrosa o brumosa. «Tinieblas espesas» reproduce la densidad poética del paralelo con «nube» y evita reducir el término a mera oscuridad genérica.
- source_word: חֲתֻלָּתוֹ
  english_pob_choice: its swaddling band
  chosen_spanish: faja de fajarlo
  alternatives_spanish:
  - paño de envolverlo
  - lienzo de envolverlo
  - su faja de envolver
  lexicon: HALOT
  rationale: El sustantivo procede de la idea de envolver/empolvar como faja o vendaje de recién nacido. «Faja de fajarlo» conserva el metáforo-imagen del envolvimiento natal que la POB documenta, aunque suene marcado; se usa para no aplanar la imagen a una mera «cobertura».
theological_decisions:
- issue: Metáfora del nacimiento aplicada al mar/océano
  english_pob_reading: The Hebrew evokes the imagery of wrapping a newborn, continuing the birth metaphor for the sea in the surrounding context.
  chosen_spanish_reading: El hebreo evoca la imagen de envolver a un recién nacido, continuando la metáfora del nacimiento para el mar en el contexto cercano.
  alternative_spanish_readings:
  - simplemente describirlo como cobertura
  - neutralizar la imagen a un paño o manto
  rationale: Mantener la imagen de fajado/envoltura evita perder la línea metafórica del discurso divino en Job 38, donde la creación del mar se presenta con lenguaje de parto y crianza.
  doctrine_reference: Job 38:8-11; imagen poética de la creación
- issue: Tensión lexical entre claridad y literalidad en חֲתֻלָּתוֹ
  english_pob_reading: Or 'its swaddling cloth.'
  chosen_spanish_reading: '«faja de fajarlo» para conservar el envolvimiento infantil; alternativa más lisa: «paño de envolverlo».'
  alternative_spanish_readings:
  - paño de envolverlo
  - su lienzo de envolver
  rationale: La forma elegida mantiene la referencia al acto de envolver a un recién nacido, que es el punto teológico y poético relevante. La alternativa más natural se registra, pero se prefiere la más cercana a la imagen documentada por la POB.
  doctrine_reference: Poética hebrea; imagen de Dios como creador soberano
translation_notes:
  revision_awareness: Se siguió el texto hebreo de Job 38:9 y el auditor inglés de la POB. No hubo revisiones aplicadas; se conservó la metáfora de vestidura y envoltura, especialmente la imagen de recién nacido en חֲתֻלָּתוֹ, sin neutralizarla.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» no porque aparezca explícitamente aquí, sino por coherencia del proyecto cuando el contexto lo requiera; en este versículo no aparece un término divino que exija esa decisión.
  - Se usó «tinieblas espesas» para reflejar la densidad semántica de עֲרָפֶל y evitar un simple «oscuridad».
  - No se sustituyó la imagen de swaddling por una explicación doctrinal; se mantuvo la poesía concreta del hebreo.
