  from: You—listen to me; call to me. If you have not listened, I am the defense.
  to: You hear me in your calling of me, in a [...] that you utter. You did not hear.
    I am the defense.
  rationale: The draft misconstrues the grammar of almost every clause. ⲧⲉⲧⲛⲥⲱⲧⲙ is
    Present I ('you hear'), not imperative. ⲡⲉⲧⲛⲙⲟⲩⲧⲉ (OCR ⲛⲉⲧⲛ ⲙⲟⲩⲧⲉ) is a nominalized
    infinitive ('your calling'), not imperative. ⲉⲧⲉⲧⲛⲧⲁⲩⲟ is a relative clause ('which
    you utter'), which the draft omits by misreading ⲉⲧⲉ as a conditional particle.
    ⲙⲡⲉⲧⲛⲥⲱⲧⲙ is Negative Perfect I ('you did not hear'), not a conditional 'if you
    have not listened'.
