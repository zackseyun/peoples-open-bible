translation:
  language: es
  text: ¿Por qué los impíos siguen viviendo, envejecen y aun se hacen poderosos en riqueza[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en poder', 'en fuerza' o 'en recursos'; el hebreo חָיִל puede denotar riqueza, recursos, fuerza o poder militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿Por qué es que
  lexicon: HALOT
  rationale: La pregunta retórica de protesta se conserva mejor con una forma breve y natural en español. '¿Por qué' transmite la fuerza interrogativa sin añadir explicación.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  lexicon: HALOT
  rationale: En lenguaje bíblico y sapiencial, 'impíos' mantiene el contraste moral del hebreo רשעים y suena digno en español eclesiástico sin sonar técnico o jurídico.
- source_word: יִחְיוּ
  english_pob_choice: live on
  chosen_spanish: viven
  alternatives_spanish:
  - siguen viviendo
  - viven todavía
  lexicon: HALOT
  rationale: El matiz de continuidad está en la queja de Job, pero en español puede expresarse de manera natural con el presente 'viven' dentro de la pregunta general; la idea de persistencia queda en el contexto completo.
- source_word: עָתְקוּ
  english_pob_choice: grow old
  chosen_spanish: envejecen
  alternatives_spanish:
  - se hacen viejos
  - crecen en edad
  lexicon: HALOT
  rationale: '''Envejecen'' refleja bien el avance en años señalado por el inglés POB y evita una construcción artificial. Conserva el paralelo con la vida prolongada de los impíos.'
- source_word: גַּם
  english_pob_choice: and even
  chosen_spanish: aun
  alternatives_spanish:
  - y aun
  - incluso
  lexicon: HALOT
  rationale: '''Aun'' conserva la escalada enfática del hebreo. En español funciona bien antes del verbo siguiente y evita una repetición pesada de ''y''.'
- source_word: גָּבְרוּ
  english_pob_choice: become mighty
  chosen_spanish: se hacen poderosos
  alternatives_spanish:
  - se fortalecen
  - se vuelven poderosos
  lexicon: HALOT
  rationale: El hebreo indica incremento en fuerza o poder; 'se hacen poderosos' conserva la idea de aumento y permite enlazarla con el sustantivo siguiente sin forzar un sentido exclusivamente físico.
- source_word: חָיִל
  english_pob_choice: in wealth
  chosen_spanish: en riqueza
  alternatives_spanish:
  - en poder
  - en fuerzas
  - en recursos
  lexicon: HALOT
  rationale: '''Riqueza'' sigue la decisión contextual del inglés POB en este pasaje sapiencial, donde el poder de los malvados se manifiesta concretamente como prosperidad material. ''En poder'' queda como alternativa válida del campo semántico amplio de חיל.'
translation_notes:
  revision_awareness: Coincide con el último pasaje revisado sin cambios sustanciales; se mantiene la lectura del inglés POB que entiende חָיִל aquí como 'wealth', dejando constancia de su amplitud semántica.
  spanish_consistency_notes:
  - Se mantiene 'impíos' para רשעים conforme al registro sapiencial.
  - '''Aun'' se usa con valor enfático, no adversativo.'
  - No se emplea 'SEÑOR' ni términos de sustitución del nombre divino porque el versículo no contiene el Tetragrámaton.
