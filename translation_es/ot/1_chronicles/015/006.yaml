translation:
  language: es
  text: 'Para los hijos de Merari: Asaías, el jefe[a], y doscientos veinte de sus hermanos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «parientes» para «hermanos», pues el hebreo puede referirse más ampliamente a varones del mismo clan o grupo familiar.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/בְנֵי
  english_pob_choice: For the sons of
  chosen_spanish: De los hijos de
  alternatives_spanish:
  - Para los hijos de
  - De la casa de
  lexicon: HALOT
  rationale: El hebreo introduce un subgrupo dentro de una lista clanica; en español, «De los hijos de» conserva esa relación partitiva y resulta natural en una enumeración genealógica. Se mantiene «hijos» para reflejar el término familiar/clánico sin neutralizarlo indebidamente.
- source_word: מְרָרִי
  english_pob_choice: Merari
  chosen_spanish: Merari
  alternatives_spanish:
  - Mérari
  lexicon: HALOT
  rationale: Nombre propio transliterado. «Merari» sigue la convención bíblica habitual en español y conserva identificabilidad.
- source_word: עֲשָׂיָה
  english_pob_choice: Asaiah
  chosen_spanish: Asaías
  alternatives_spanish:
  - Asaía
  lexicon: HALOT
  rationale: Nombre propio transliterado a la forma usual en español bíblico. Se evita una grafía más mecánica para favorecer la lectura pública sin alterar la identidad del nombre.
- source_word: הַ/שָּׂר
  english_pob_choice: the chief
  chosen_spanish: el jefe
  alternatives_spanish:
  - el líder
  - el príncipe
  - el oficial
  lexicon: HALOT
  rationale: En este contexto de lista tribal/levítica, שַׂר denota una cabeza o responsable del grupo. «Jefe» comunica bien la función de autoridad sin introducir connotaciones monárquicas que «príncipe» podría sugerir en español.
- source_word: וְ/אֶחָי/ו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus deudos
  - y sus hermanos de clan
  lexicon: HALOT
  rationale: «Hermanos» reproduce de modo directo אחים/אחיו. Aunque el término puede abarcar miembros del mismo clan, el texto base y la elección inglesa conservan la forma literal; la posible amplitud semántica queda documentada en la nota.
- source_word: מָאתַ֥יִם וְ/עֶשְׂרִֽים
  english_pob_choice: '220'
  chosen_spanish: doscientos veinte
  alternatives_spanish:
  - '220'
  lexicon: HALOT
  rationale: Se expresa el número en palabras para un registro bíblico fluido en español y para mantener el tono de recitación pública, sin cambiar el valor numérico.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente permaneció sin cambios tras revisión (no se indicaron revisiones aplicadas). El presente borrador sigue esa lectura estable: un encabezado clanico simple, con el cargo de Asaías y el número de sus compañeros, sin añadir detalles ausentes en el hebreo.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene un registro sobrio y genealógico, adecuado para una lista de servicio levítico.
  - El número se verbaliza («doscientos veinte») para lectura natural; el valor coincide con el hebreo y con la edición inglesa.
