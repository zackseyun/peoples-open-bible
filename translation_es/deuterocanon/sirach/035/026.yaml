translation:
  language: es
  text: ¿Quién confiará en una tropa armada[a], que salta de ciudad en ciudad?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego suministrado para este versículo dice otra cosa por completo: «Comprendan que no he trabajado para mí solo, sino para todos los que buscan instrucción». Por eso se sigue aquí el hebreo como texto principal.'
    reason: textual_variant
lexical_decisions:
- source_word: מי
  english_pob_choice: Who will
  chosen_spanish: ¿Quién confiará…?
  alternatives_spanish:
  - ¿Quién confía…?
  - ¿Quién habría de confiar…?
  lexicon: HALOT
  rationale: La pregunta hebrea tiene fuerza proverbial y retórica; en español, «confiará» conserva esa orientación prospectiva sin volverla demasiado rígida.
- source_word: יאמין
  english_pob_choice: trust
  chosen_spanish: confiará
  alternatives_spanish:
  - creerá
  - tendrá confianza en
  lexicon: HALOT
  rationale: En este contexto, la idea es poner confianza en alguien o algo, no simplemente aceptar una proposición como verdadera.
- source_word: בגדוד
  english_pob_choice: an armed troop
  chosen_spanish: una tropa armada
  alternatives_spanish:
  - una banda armada
  - una tropa militar
  lexicon: HALOT
  rationale: «Tropa» mantiene el matiz de grupo militar o de incursión; «armada» recoge el sentido bélico que el auditor inglés actualizó a partir del hebreo.
- source_word: צבא
  english_pob_choice: of an army
  chosen_spanish: armada
  alternatives_spanish:
  - militar
  - de guerra
  lexicon: HALOT
  rationale: El hebreo añade el campo militar; en español, una construcción más natural es integrar ese rasgo en el adjetivo «armada» en vez de una frase pesada como «de un ejército».
- source_word: המדלג
  english_pob_choice: leaping
  chosen_spanish: que salta
  alternatives_spanish:
  - que brinca
  - que va saltando
  - que se desplaza a saltos
  lexicon: HALOT
  rationale: El verbo denota salto o brinco; «salta» conserva la imagen de movimiento rápido e inestable sin sobreexplicar la intención.
- source_word: מעיר אל עיר
  english_pob_choice: from city to city
  chosen_spanish: de ciudad en ciudad
  alternatives_spanish:
  - de una ciudad a otra
  lexicon: HALOT
  rationale: Expresa el movimiento repetido de manera idiomática y concisa en español.
theological_decisions:
- issue: Prioridad del testimonio hebreo frente al paralelo griego distinto
  english_pob_reading: The supplied Greek parallel for this verse differs completely; the Hebrew witness is followed as the primary text.
  chosen_spanish_reading: Se sigue el hebreo como texto principal; el griego paralelo se registra como una variante sustancial de contenido.
  alternative_spanish_readings:
  - «Comprendan que no he trabajado para mí solo, sino para todos los que buscan instrucción».
  - Una armonización que intentara combinar ambos testigos en una sola frase.
  rationale: 'Sirácida presenta una divergencia textual material: el hebreo conservado dice un proverbio sobre confiar en una tropa armada, mientras que el griego paralelo transmite otro enunciado sobre haber trabajado para los que buscan instrucción. Traducir el hebreo como base respeta la política del proyecto y preserva honestamente la incertidumbre textual.'
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; preservar con honestidad las divergencias textuales'
translation_notes:
  revision_awareness: El español sigue la revisión inglesa más reciente, que prefirió «armed troop» sobre una expresión más literal pero menos natural. En español se optó por «tropa armada», manteniendo el mismo equilibrio entre naturalidad y fuerza militar, y por «salta» para reflejar el movimiento vivo de המדלג. No se intentó armonizar con el griego paralelo, porque el auditor inglés ya documentó que diverge completamente del hebreo.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología litúrgica ajena al versículo, porque no hay aquí el Tetragrámaton.
  - «Confiará» comunica la fuerza proverbial de la pregunta hebrea sin introducir matices doctrinales ajenos.
  - La nota al pie preserva explícitamente la divergencia textual ya documentada en el audit trail inglés.
