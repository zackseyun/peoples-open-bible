translation:
  language: es
  text: Y harás para ellos prendas interiores de lino[a], para cubrir su carne desnuda; serán desde las caderas[b] hasta los muslos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «calzones de lino» o «pantalones cortos de lino». El hebreo se refiere a una prenda para la parte baja del cuerpo que se llevaba debajo de las vestiduras sacerdotales.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «desde los lomos hasta los muslos». «Caderas» se usa aquí como una traducción moderna y natural del punto superior de la prenda.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲשֵׂה
  english_pob_choice: And make
  chosen_spanish: Y harás
  alternatives_spanish:
  - Haz
  - Y haz
  lexicon: HALOT
  rationale: El hebreo es un mandato en contexto instruccional. En español, «harás» conserva el valor directivo con una forma natural en este registro; el «Y» reproduce la conexión secuencial del waw con la instrucción anterior.
- source_word: לָהֶם
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - para ellos
  lexicon: HALOT
  rationale: 'El dativo indica destinatario/beneficio: los sacerdotes. «Para ellos» es directo y fiel al sentido del texto.'
- source_word: מִכְנְסֵי בָד
  english_pob_choice: linen undergarments
  chosen_spanish: calzoncillos de lino
  alternatives_spanish:
  - breeches de lino
  - pantalones de lino
  - prenda interior de lino
  lexicon: HALOT
  rationale: מִכְנָסַיִם designa una prenda para la parte baja del cuerpo usada debajo de otras vestiduras. En español, «calzoncillos» comunica mejor esa función que un término demasiado técnico o arcaico; se mantiene «de lino» para בָד.
- source_word: לְכַסּוֹת
  english_pob_choice: to cover
  chosen_spanish: para cubrir
  alternatives_spanish:
  - para cubrir
  - a fin de cubrir
  lexicon: HALOT
  rationale: El infinitivo de propósito pide una expresión final natural en español. «Para cubrir» conserva la finalidad sin añadir matices.
- source_word: בְּשַׂר עֶרְוָה
  english_pob_choice: their naked flesh
  chosen_spanish: la desnudez de su carne
  alternatives_spanish:
  - su carne desnuda
  - la carne desnuda
  - sus partes desnudas
  lexicon: HALOT
  rationale: La expresión hebrea combina «carne» con la idea de desnudez. «La desnudez de su carne» mantiene la tensión literal y el tono reverente del texto, evitando una paráfrasis demasiado moderna o una eufemización excesiva.
- source_word: מִמָּתְנַיִם
  english_pob_choice: from the hips
  chosen_spanish: desde las caderas
  alternatives_spanish:
  - desde los lomos
  - desde la cintura
  - desde las caderas
  lexicon: HALOT
  rationale: מָתְנַיִם puede significar cintura, lomos o caderas. «Caderas» es claro en español actual y describe bien el inicio superior de la prenda sin recurrir a «lomos», que suena más arcaico.
- source_word: וְעַד יְרֵכַיִם
  english_pob_choice: to the thighs
  chosen_spanish: hasta los muslos
  alternatives_spanish:
  - hasta los muslos
  - hasta los muslos superiores
  lexicon: HALOT
  rationale: יָרֵךְ se refiere al muslo. «Hasta los muslos» es preciso y natural para el límite inferior de la prenda.
- source_word: יִהְיוּ
  english_pob_choice: they shall be
  chosen_spanish: serán
  alternatives_spanish:
  - serán
  - deberán quedar
  lexicon: HALOT
  rationale: En una descripción de medida o extensión, el hebreo usa simplemente «serán». En español, «serán» respeta esa correspondencia sin forzar una idea de extensión que el verbo no expresa explícitamente.
theological_decisions:
- issue: Terminología de la desnudez sacerdotal y su cobertura
  english_pob_reading: their naked flesh
  chosen_spanish_reading: la desnudez de su carne
  alternative_spanish_readings:
  - su carne desnuda
  - sus partes desnudas
  - su desnudez
  rationale: El texto regula la cobertura ritual del cuerpo del sacerdote. La traducción conserva el lenguaje concreto del hebreo y no lo convierte en una explicación más amplia que pudiera suavizar el énfasis ritual sobre la desnudez.
  doctrine_reference: Éxodo 28:42; santidad y reverencia en el servicio sacerdotal
- issue: Prenda inferior específica para los sacerdotes
  english_pob_reading: linen undergarments
  chosen_spanish_reading: calzoncillos de lino
  alternative_spanish_readings:
  - prenda interior de lino
  - pantalones de lino
  - breeches de lino
  rationale: La función de la prenda es inferior y bajo las demás vestiduras; por eso se mantiene una denominación funcional. No se adopta un término litúrgico tradicional que pueda ocultar la especificidad corporal del mandato.
  doctrine_reference: Éxodo 28:42; vestiduras sacerdotales
- issue: Rango corporal del vestido
  english_pob_reading: from the hips to the thighs
  chosen_spanish_reading: desde las caderas hasta los muslos
  alternative_spanish_readings:
  - desde los lomos hasta los muslos
  - desde la cintura hasta los muslos
  rationale: Se preserva la indicación espacial del texto para mostrar el alcance de la prenda. «Caderas» y «muslos» son comprensibles en español y mantienen el registro descriptivo.
  doctrine_reference: Éxodo 28:42; cobertura ritual
translation_notes:
  revision_awareness: La redacción inglesa auditada pasó de «they shall extend» a «they shall be» para ajustarse con mayor fidelidad al verbo hebreo; la versión española sigue ese mismo ajuste al usar «serán» en vez de una paráfrasis de extensión. También se mantuvo la distinción entre la prenda interior y el tramo corporal indicado por el hebreo, sin borrar la tensión léxica de בשר ערוה.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca, aunque este versículo no lo contiene.
  - Se conserva «carne» en la fórmula ritual, en vez de sustituirla por un eufemismo más general.
  - La prenda se expresa con un término funcional en español («calzoncillos de lino») para reflejar su uso bajo las vestiduras sacerdotales.
  - No se introduce «Mesías/Cristo» ni vocabulario doctrinal ajeno al versículo.
