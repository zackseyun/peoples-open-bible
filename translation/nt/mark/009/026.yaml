id: MRK.9.26
reference: Mark 9:26
source:
  edition: SBLGNT
  text: καὶ ⸂κράξας καὶ πολλὰ σπαράξας⸃ ἐξῆλθεν· καὶ ἐγένετο ὡσεὶ νεκρὸς ὥστε ⸀τοὺς πολλοὺς λέγειν ὅτι ἀπέθανεν.
translation:
  text: And after crying out and convulsing him greatly[a], it came out; and he became like a dead man, so that many were saying[b], “He is dead.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “after throwing him into severe convulsions.”
    reason: lexical_alternative
  - marker: b
    text: 'Greek: “he became as if dead,” indicating that he appeared dead to the onlookers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κράξας
  chosen: after crying out
  alternatives:
  - crying out
  - having cried out
  - with a shriek
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb ἐξῆλθεν is rendered as antecedent action. 'Crying out' preserves the verbal sense without over-specifying tone; 'with a shriek' is possible contextually but more interpretive.
- source_word: πολλὰ σπαράξας
  chosen: convulsing him severely
  alternatives:
  - after throwing him into severe convulsions
  - after tearing him greatly
  - after convulsing him violently
  lexicon: BDAG
  rationale: σπαράσσω in this exorcism context refers to causing convulsions, not literal tearing. πολλὰ functions adverbially/intensively, so 'severely' captures the force in natural English. An explicit object 'him' is supplied from context because the demon is acting on the boy.
- source_word: ἐξῆλθεν
  chosen: it came out
  alternatives:
  - he came out
  - it went out
  lexicon: BDAG
  rationale: The implied subject is the unclean spirit/demon from the context, best rendered as 'it' in English. 'Came out' is idiomatic for expulsion and matches the narrative setting.
- source_word: ἐγένετο ὡσεὶ νεκρός
  chosen: he became like a dead man
  alternatives:
  - he became as if dead
  - he seemed like a corpse
  lexicon: BDAG
  rationale: ἐγένετο with ὡσεὶ expresses resultant appearance/state, not actual death. 'Like a dead man' preserves the comparison and avoids overstating the condition.
- source_word: ὥστε τοὺς πολλοὺς λέγειν
  chosen: so that many were saying
  alternatives:
  - so that most were saying
  - with the result that many said
  lexicon: BDAG
  rationale: τοὺς πολλούς most naturally means 'many' here, not necessarily 'most.' The present infinitive λέγειν after ὥστε is well represented by the progressive 'were saying,' conveying the ongoing reaction of the crowd.
- source_word: ὅτι ἀπέθανεν
  chosen: He has died
  alternatives:
  - that he died
  - that he is dead
  lexicon: BDAG
  rationale: English direct speech is more natural here than indirect. The aorist can be rendered idiomatically as 'has died' in this immediate observational context, expressing the crowd's conclusion that death has occurred.
