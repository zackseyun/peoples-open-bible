translation:
  language: es
  text: Y ofrecerás cada día un toro como ofrenda por el pecado[a], y purificarás el altar cuando hagas expiación por él, y lo ungirás para consagrarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ofrenda de purificación’. El término hebreo חַטָּאת puede denotar tanto el pecado como, en contextos sacrificiales, la ofrenda usada para purificar del pecado o de la impureza.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַר
  english_pob_choice: a bull
  chosen_spanish: un toro
  alternatives_spanish:
  - un novillo
  - un toro joven
  lexicon: HALOT
  rationale: פַר designa un toro/buey para sacrificio. 'Toro' es claro y natural en español moderno; 'novillo' o 'toro joven' explicitan una edad no exigida por el término aquí.
- source_word: חַטָּאת
  english_pob_choice: sin offering
  chosen_spanish: ofrenda por el pecado
  alternatives_spanish:
  - ofrenda de purificación
  - ofrenda por el pecado / de purificación
  lexicon: HALOT
  rationale: En contexto sacrificial, חַטָּאת puede referirse tanto al pecado como a la ofrenda asociada con la purificación del pecado/impureza. 'Ofrenda por el pecado' mantiene la forma tradicional inteligible en español, mientras que la nota preserva la alternativa de 'ofrenda de purificación'.
- source_word: לַיּוֹם
  english_pob_choice: each day
  chosen_spanish: cada día
  alternatives_spanish:
  - diariamente
  - por día
  lexicon: HALOT
  rationale: 'El sentido distributivo del hebreo pide una expresión natural en español: ''cada día'' comunica mejor la repetición ritual que un calco.'
- source_word: עַל הַכִּפֻּרִים
  english_pob_choice: for atonement
  chosen_spanish: como expiación
  alternatives_spanish:
  - para expiación
  - para la expiación
  - para los ritos de expiación
  lexicon: HALOT
  rationale: El plural hebreo aquí apunta a los ritos de expiación/purificación. 'Como expiación' conserva el valor cultual sin forzar un plural poco natural en español; en contexto puede leerse como finalidad ritual.
- source_word: וְחִטֵּאתָ
  english_pob_choice: you shall purify
  chosen_spanish: purificarás
  alternatives_spanish:
  - limpiarás ritualmente
  - harás expiación sobre
  lexicon: HALOT
  rationale: En usos cultuales, el piel de חטא aplicado al altar expresa purificación ritual, no culpa moral. 'Purificarás' comunica esa acción directamente en español.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar del sacrificio
  lexicon: HALOT
  rationale: Renderización estándar y exacta del término en su contexto tabernacular.
- source_word: בְּכַפֶּרְךָ עָלָיו
  english_pob_choice: when you make atonement for it
  chosen_spanish: cuando hagas expiación por él
  alternatives_spanish:
  - al hacer expiación por él
  - mientras hagas expiación por él
  lexicon: HALOT
  rationale: La construcción con ב + infinitivo apunta bien a un valor temporal. 'Cuando hagas expiación por él' preserva la secuencia ritual y mantiene el referente del sufijo en español con claridad.
- source_word: וּמָשַׁחְתָּ
  english_pob_choice: you shall anoint
  chosen_spanish: lo ungirás
  alternatives_spanish:
  - lo consagrarás con aceite
  - lo aceitarás
  lexicon: HALOT
  rationale: משׁח es el verbo ritual de ungir con aceite. 'Ungirás' conserva el lenguaje bíblico y la carga cultual sin explicar de más.
- source_word: לְקַדְּשׁוֹ
  english_pob_choice: to consecrate it
  chosen_spanish: para consagrarlo
  alternatives_spanish:
  - para santificarlo
  - para hacerlo santo
  lexicon: HALOT
  rationale: קדשׁ en este contexto significa apartar el altar para uso sagrado. 'Consagrarlo' es claro y digno en español; 'santificarlo' y 'hacerlo santo' son posibles pero menos naturales aquí.
theological_decisions:
- issue: Mantener el lenguaje cultual de expiación y purificación sin moralizar el altar
  english_pob_reading: Use 'sin offering,' 'purify,' and 'make atonement' in their ritual-tabernacle sense
  chosen_spanish_reading: Usar 'ofrenda por el pecado', 'purificarás' y 'harás expiación' en sentido ritual-tabernacular
  alternative_spanish_readings:
  - usar 'ofrenda de purificación'
  - renderizar וְחִטֵּאתָ como 'limpiarás' o 'descontaminarás'
  rationale: La escena trata de la consagración ritual del altar. El altar no es perdonado moralmente; es purificado y apartado para uso santo. La redacción española conserva esa categoría cultual y evita trasladar ideas posteriores ajenas al contexto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia con la revisión auditada: no hay cambios de fondo respecto del sentido inglés POB. La principal decisión española es conservar la tensión lexical de חַטָּאת mediante una nota, mientras que el resto sigue de cerca la secuencia ritual del hebreo.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como nombre divino en este proyecto cuando aparezca; en este versículo no aparece.
  - '''Expiación'' y ''purificar'' se usan en su sentido ritual, no como equivalentes morales generales.'
  - '''Ungir'' y ''consagrar'' conservan el registro litúrgico bíblico sin sustituirlo por vocabulario eclesiástico más tardío.'
