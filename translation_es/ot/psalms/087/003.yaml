    issue: «se han dicho» añade un perfecto no presente en el hebreo ni en la auditoría inglesa
    rationale: מְדֻבָּר es participio pual con valor predicativo; en poesía sapiencial/alabanzadora española, «se dicen» o «son dichas» reproduce mejor la cualidad general y atemporal del enunciado.
  - severity: low
    issue: La nota al pie sobre בָּךְ no preserva del todo el matiz documentado en la auditoría inglesa
    rationale: El inglés explica que la preposición puede traducirse de más de una manera y que «about you» capta mejor la alabanza dirigida a Sion, mientras preserva «of you» como alternativa. En español, si el texto principal queda «de ti», conviene notar «acerca de ti» o «sobre ti» y «en ti» como posibilidades, indicando que «de ti» suena más natural/literario en este contexto.
