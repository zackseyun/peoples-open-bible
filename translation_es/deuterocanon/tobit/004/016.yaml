translation:
  language: es
  text: Da de tu pan al hambriento[a], y de tus vestidos al desnudo. Todo lo que te sobre, hazlo limosna, y que tu ojo no sea mezquino[b] cuando des limosna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «Todo lo que tengas en abundancia, dalo como limosna».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «que tu ojo no sea envidioso»; es decir, no te resientas ni seas mezquino al dar limosna.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ τοῦ ἄρτου σου δίδου
  english_pob_choice: Give from your bread
  chosen_spanish: Da de tu pan
  alternatives_spanish:
  - Da de tu alimento
  - Comparte tu pan
  lexicon: LSJ / BDAG
  rationale: ἄρτος significa literalmente ‘pan’, aunque en sentido amplio puede abarcar alimento. En español, ‘pan’ conserva la concreción y la resonancia bíblica del original; ‘de tu’ refleja ἐκ sin calco pesado.
- source_word: πεινῶντι
  english_pob_choice: to the hungry
  chosen_spanish: al hambriento
  alternatives_spanish:
  - a quien tiene hambre
  - a una persona hambrienta
  lexicon: BDAG
  rationale: El participio funciona como sustantivo para una clase de necesitados. ‘Al hambriento’ es natural en español y mantiene el valor genérico.
- source_word: ἐκ τῶν ἱματίων σου
  english_pob_choice: from your garments
  chosen_spanish: de tus vestidos
  alternatives_spanish:
  - de tus ropas
  - de tus prendas
  lexicon: BDAG
  rationale: ἱμάτια designa prendas/vestidos. ‘Vestidos’ conserva un registro bíblico claro en español y el plural concreto del término griego.
- source_word: τοῖς γυμνοῖς
  english_pob_choice: to the naked
  chosen_spanish: a los desnudos
  alternatives_spanish:
  - a los que no tienen ropa
  - a los mal vestidos
  lexicon: BDAG
  rationale: γυμνός puede significar desnudo o insuficientemente vestido. ‘Desnudos’ preserva la fuerza directa del griego sin suavizarla indebidamente.
- source_word: πᾶν ὃ ἐὰν περισσεύσῃ σοι
  english_pob_choice: Whatever may be left over for you
  chosen_spanish: Todo lo que te sobre
  alternatives_spanish:
  - Todo lo que te sobreabunde
  - Todo lo que tengas en abundancia
  lexicon: BDAG
  rationale: περισσεύω expresa exceder, sobrar o abundar. ‘Te sobre’ comunica con naturalidad lo que queda más allá de la necesidad inmediata y evita una construcción forzada.
- source_word: ποίει ἐλεημοσύνην
  english_pob_choice: make into almsgiving
  chosen_spanish: hazlo limosna
  alternatives_spanish:
  - dale como limosna
  - haz limosna con ello
  lexicon: BDAG
  rationale: ἐλεημοσύνη es limosna/donativo caritativo. Se conserva el valor concreto de la acción, y ‘hazlo limosna’ refleja la construcción verbal sin perder naturalidad en español.
- source_word: μὴ φθονεσάτω σου ὁ ὀφθαλμός
  english_pob_choice: do not let your eye be begrudging
  chosen_spanish: no deje tu ojo de ser envidioso
  alternatives_spanish:
  - no te dé envidia en tu ojo
  - no seas mezquino al dar
  lexicon: BDAG
  rationale: La imagen literal habla del ojo que envidia o se resiente al dar. Se preserva la metáfora del ojo, y ‘envidioso’ comunica el matiz de renuencia/resentimiento que el POB inglés marcó como ‘begrudging’.
- source_word: ἐν τῷ ποιεῖν σε ἐλεημοσύνην
  english_pob_choice: when you give alms
  chosen_spanish: cuando hagas limosna
  alternatives_spanish:
  - cuando des limosna
  - al hacer limosna
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν es temporal. Se conserva la repetición de ἐλεημοσύνη mediante ‘limosna’, y ‘cuando hagas’ expresa con claridad la relación temporal.
theological_decisions:
- issue: Renderización de ἐλεημοσύνη
  english_pob_reading: almsgiving
  chosen_spanish_reading: limosna
  alternative_spanish_readings:
  - caridad
  - obra de misericordia
  rationale: En este contexto sapiencial judío, el término remite a dar concretamente a los pobres. ‘Limosna’ preserva esa especificidad y la repetición léxica del verso mejor que ‘caridad’, que en español puede sonar más general o abstracta.
  doctrine_reference: Translation philosophy §1, §5
- issue: Metáfora del ojo en la dádiva
  english_pob_reading: preserve the eye-idiom in the main text
  chosen_spanish_reading: preservar la metáfora del ojo en el texto principal
  alternative_spanish_readings:
  - no te dé envidia al dar
  - no seas mezquino al dar
  rationale: El verso usa una imagen moral semítica/grecorromana muy marcada. Mantener ‘tu ojo’ conserva el relieve retórico y deja visible la tensión entre metáfora literal e intención ética, en vez de aplanarla de inmediato.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste final del inglés POB: ''garments'' -> ''vestidos''/''vestidos'' con matiz bíblico; ''whatever may be left over for you'' -> ''todo lo que te sobre''; ''make into almsgiving'' -> ''hazlo limosna''; y el cierre idiomático del ''eye'' se mantiene literal para respetar la imagen del griego. Se evitó traducir mecánicamente desde el inglés cuando el español pedía una formulación más natural, pero sin perder las tensiones léxicas documentadas.'
  spanish_consistency_notes:
  - Se mantiene 'limosna' para ἐλεημοσύνη en todo el versículo, para conservar repetición y especificidad.
  - Se conserva el singular colectivo 'el hambriento' / 'los desnudos' como formas naturales y acordes al griego substantivado.
  - No se usa 'SEÑOR' ni terminología eclesiástica no presente en el texto.
  - La metáfora del ojo se conserva en el texto principal y se explica en nota, siguiendo el tratamiento del POB inglés.
