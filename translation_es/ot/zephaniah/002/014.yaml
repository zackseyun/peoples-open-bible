review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva en general la escena de ruina habitada por animales y refleja bien la segunda mitad del versículo. Sin embargo, falla gravemente en עֲדָרִים al traducirlo como «Hogares», lo cual contradice el hebreo y rompe el sentido. También las notas están mal ancladas: la nota [a] sobre un animal incierto aparece en «Hogares», donde no corresponde, y falta una nota para el segundo animal incierto (קִפֹּד), que el rastro inglés sí preserva. La frase difícil כָּל חַיְתוֹ גוֹי puede mantenerse cercana al inglés auditado como «toda bestia de las naciones» con nota aclaratoria, o aclararse en el texto; aquí conviene mantener la cercanía y explicar la dificultad en nota.'
  spanish_quality_summary: El español es mayormente claro y digno, con buenas opciones como «se echarán», «pasarán la noche», «capiteles», «umbral» y «ha quedado al descubierto». Pero «Hogares» es un error léxico severo e ininteligible en contexto. Además, «toda bestia» suena algo rígido, aunque aceptable por fidelidad. El resto del verso fluye bien en español eclesial moderno.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son compatibles con el expediente inglés, salvo el error de עֲדָרִים. Deben preservarse las incertidumbres zoológicas con notas: קָאַת como «lechuza del desierto» con alternativa «pelícano», y קִפֹּד como «erizo» con alternativa «puercoespín».'
  issues:
  - severity: high
    issue: «Hogares» traduce erróneamente עֲדָרִים.
    rationale: El hebreo significa «rebaños/manadas/herds», no «hogares». Cambia por completo la imagen del verso y produce un sinsentido contextual.
  - severity: high
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota trata de la identificación incierta de קָאַת, pero está colocada sobre «Hogares» en vez de sobre el nombre del animal correspondiente.
  - severity: medium
    issue: Falta una nota para קִפֹּד.
    rationale: El expediente inglés conserva la alternativa «porcupine». En español debe preservarse como «puercoespín» para reflejar la incertidumbre léxica.
  - severity: low
    issue: La decisión léxica registrada para עֲדָרִים contiene un comentario interno inválido.
    rationale: El rationale mismo reconoce que «Hogares» es un placeholder/valor inválido. Esto confirma que se requiere corrección editorial.
