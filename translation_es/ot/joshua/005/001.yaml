    rationale: La nota [a] en el expediente inglés explica «by the sea / on the coast», pero en el borrador español se colocó sobre «Y sucedió». Eso desordena la evidencia y confunde al lector.
  - severity: medium
    issue: «Se derritió su corazón» es demasiado literal y poco natural en español.
    rationale: Aunque el hebreo usa singular colectivo, en español «se derritieron sus corazones» comunica mejor la reacción plural y coincide con la revisión auditada, sin alterar el significado.
