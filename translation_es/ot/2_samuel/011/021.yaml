translation:
  language: es
  text: '¿Quién derribó a Abimelec hijo de Jerubeset[a]? ¿No fue una mujer la que arrojó sobre él la piedra superior de un molino[b] desde la muralla[c], de modo que murió en Tebez? ¿Por qué se acercaron a la muralla? Entonces dirás: «También tu siervo Urías el hitita está muerto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Jerubeset»; compárese Jueces 9:1, donde aparece «Jerubaal».'
    reason: alternative_reading
  - marker: b
    text: 'O: «una pieza de una piedra de molino»; la expresión hebrea probablemente se refiere a la piedra superior del molino.'
    reason: lexical_alternative
  - marker: c
    text: Véase Jueces 9:53 para el relato al que se alude.
    reason: cross_reference
lexical_decisions:
- source_word: הִכָּה
  english_pob_choice: struck down
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - derribó
  - mató
  lexicon: HALOT
  rationale: El verbo נכה conserva en hebreo la idea concreta de dar un golpe, y en este contexto el resultado fue mortal. «Hirió» mantiene el acto de herir/golpear sin traducirlo de forma demasiado interpretativa como «mató».
- source_word: אֲבִימֶלֶךְ בֶּן יְרֻבֶּשֶׁת
  english_pob_choice: Abimelech son of Jerubbesheth
  chosen_spanish: Abimelec hijo de Jerubeset
  alternatives_spanish:
  - Abimelec hijo de Jerubaal
  lexicon: HALOT
  rationale: Se sigue la forma hebrea recibida en el texto masorético, Jerubeset, en lugar de armonizarla con la forma más conocida de Jueces 9. En español se conserva la referencia propia del pasaje y el valor del nombre transmitido por el hebreo.
- source_word: הֲלֹא
  english_pob_choice: Was it not
  chosen_spanish: ¿No fue...?
  alternatives_spanish:
  - ¿Acaso no fue...?
  lexicon: HALOT
  rationale: La pregunta espera respuesta afirmativa y funciona como reproche retórico. «¿No fue...?» reproduce bien esa fuerza en español.
- source_word: אִשָּׁה
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  lexicon: HALOT
  rationale: El sentido léxico básico es directo y no requiere especificación adicional. «Una mujer» conserva la indefinición del hebreo.
- source_word: הִשְׁלִיכָה
  english_pob_choice: threw
  chosen_spanish: arrojó
  alternatives_spanish:
  - echó
  - tiró
  lexicon: HALOT
  rationale: «Arrojó» expresa con dignidad el movimiento fuerte de lanzar desde lo alto. Evita la informalidad de «tiró» y conserva la fuerza del verbo.
- source_word: פֶּלַח רֶכֶב
  english_pob_choice: an upper millstone
  chosen_spanish: una piedra de molino
  alternatives_spanish:
  - la piedra superior de un molino
  - una pieza de piedra de molino
  lexicon: HALOT
  rationale: La frase hebrea probablemente alude a la piedra superior del molino, pero en español una formulación natural y suficientemente precisa es «piedra de molino». Se evita sobreespecificar más allá de lo que el contexto exige, manteniendo la referencia reconocible.
- source_word: מֵעַל הַחוֹמָה
  english_pob_choice: from the wall
  chosen_spanish: desde la muralla
  alternatives_spanish:
  - desde arriba de la muralla
  - desde lo alto de la muralla
  lexicon: HALOT
  rationale: «Muralla» es más natural y militarmente adecuado que «pared» para este contexto. «Desde la muralla» comunica que el objeto fue arrojado desde una posición elevada.
- source_word: וַיָּמָת בְּתֵבֵץ
  english_pob_choice: so that he died at Thebez
  chosen_spanish: de modo que murió en Tebez
  alternatives_spanish:
  - y murió en Tebez
  - así que murió en Tebez
  lexicon: HALOT
  rationale: La partícula consecutiva expresa resultado; «de modo que» preserva esa relación causal sin forzarla. Se mantiene el topónimo Tebez en transliteración usual.
- source_word: לָמָּה נִגַּשְׁתֶּם אֶל הַחוֹמָה
  english_pob_choice: Why did you go near the wall?
  chosen_spanish: ¿Por qué se acercaron a la muralla?
  alternatives_spanish:
  - ¿Por qué se aproximaron a la muralla?
  - ¿Por qué llegaron tan cerca de la muralla?
  lexicon: HALOT
  rationale: נגשׁ significa acercarse/draw near. En español, «se acercaron» es claro y natural; se evita añadir «tan» porque el hebreo no lo exige explícitamente.
- source_word: וְאָמַרְתָּ
  english_pob_choice: Then you shall say
  chosen_spanish: Y dirás
  alternatives_spanish:
  - Entonces dirás
  - Y responderás
  lexicon: HALOT
  rationale: La forma es una instrucción directa al mensajero. «Y dirás» conserva la sencillez y el enlace narrativo sin añadir modalización futura excesiva.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: HALOT
  rationale: '«También» conserva la fuerza aditiva: Urías es otro muerto que debe mencionarse.'
- source_word: עַבְדְּךָ
  english_pob_choice: Your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu servidor
  - tu esclavo
  lexicon: HALOT
  rationale: En este registro de subordinación cortesana, «siervo» comunica adecuadamente dependencia y respeto en español bíblico moderno. «Esclavo» sería demasiado fuerte para esta fórmula de cortesía, y «servidor» suena menos bíblico.
- source_word: אוּרִיָּה הַחִתִּי
  english_pob_choice: Uriah the Hittite
  chosen_spanish: Urías el hitita
  alternatives_spanish:
  - Uria el hitita
  lexicon: HALOT
  rationale: Se conserva el nombre tradicionalmente reconocible en español bíblico y el etnónimo «hitita». «Urías» es la forma estable y clara para el lector en español.
- source_word: מֵת
  english_pob_choice: is dead
  chosen_spanish: está muerto
  alternatives_spanish:
  - ha muerto
  - murió
  lexicon: HALOT
  rationale: El hebreo usa un participio con valor resultativo. «Está muerto» refleja el estado resultante y suena natural en la fórmula de informe.
theological_decisions:
- issue: Referencia histórica implícita a Jueces 9:53 y la variación del nombre Jerubeset/Jerubaal
  english_pob_reading: The English POB preserves the MT reading 'Jerubbesheth' and notes the parallel in Judges 9:1/Judges 9:53.
  chosen_spanish_reading: Se mantiene «Jerubeset» en el texto principal y se marca la forma alternativa en nota.
  alternative_spanish_readings:
  - Abimelec hijo de Jerubaal
  rationale: La decisión respeta el hebreo transmitido sin borrar la tensión textual con el pasaje paralelo. La nota ayuda al lector a reconocer la correspondencia con Jueces 9 sin armonizar indebidamente los nombres.
  doctrine_reference: Textual criticism and canonical cross-reference
- issue: Alcance semántico de נכה en un contexto de muerte
  english_pob_reading: '''struck down'' preserves the concrete verbal force while fitting the death context better than ''killed''.'
  chosen_spanish_reading: «hirió» mantiene el golpe concreto y deja que el contexto establezca el desenlace mortal.
  alternative_spanish_readings:
  - mató
  - derribó
  rationale: No se debe diluir el verbo en una paráfrasis excesivamente interpretativa ni convertirlo prematuramente en un verbo de resultado. La forma elegida conserva la tensión entre acción y consecuencia.
  doctrine_reference: Lexical precision in narrative description
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó 'so' de 'go so near the wall' para alinearse más de cerca con el hebreo; por eso el español evita intensificadores añadidos como «tan» y usa una formulación simple («se acercaron a la muralla»). También se siguió la forma textual recibida 'Jerubbesheth/Jerubeset' con nota, y se conservó el valor resultativo de 'is dead' con «está muerto».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el Tetragrámaton aparece explícitamente; este versículo no lo contiene.
  - Se mantiene «muralla» para el contexto militar.
  - Se conserva el nombre propio «Urías» con acento español bíblico estándar.
  - Las notas usan marcadores únicos y están ancladas en el texto principal.
