translation:
  language: es
  text: No temas, gusano de Jacob[b], hombres de Israel[a]; yo mismo te ayudo[c], declara Yahvé, tu Redentor, el Santo de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase hebrea también puede sugerir «mortales de Israel» o «pueblo de Israel»; el texto mantiene «hombres de Israel» para seguir la forma masculina plural y la paralelización con «gusano de Jacob».
    reason: lexical_alternative
  - marker: b
    text: «Gusano de Jacob» conserva la metáfora hebrea de debilidad y humillación; no describe literalmente a Jacob como un gusano.
    reason: cultural_note
  - marker: c
    text: 'El verbo hebreo puede entenderse con valor de seguridad profética: «te he ayudado» o «te ayudaré». Aquí se traduce como presente de garantía: «te ayudo».'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּֽירְאִי
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No temas, no
  lexicon: HALOT
  rationale: אַל con el imperfecto expresa prohibición. «No temas» es la fórmula bíblica natural en español y conserva la fuerza directa del mandato sin añadir explicación.
- source_word: תּוֹלַ֣עַת יַֽעֲקֹ֔ב
  english_pob_choice: worm Jacob
  chosen_spanish: gusanillo de Jacob
  alternatives_spanish:
  - gusano de Jacob
  - gusano, Jacob
  - tú, gusano de Jacob
  lexicon: HALOT
  rationale: El hebreo usa una metáfora de bajeza y fragilidad. «Gusanillo» intenta mantener el valor despectivo/lígero de la imagen sin sonar tan áspero como una traducción literal más dura; aun así conserva la metáfora y su tensión poética.
- source_word: מְתֵ֖י יִשְׂרָאֵל
  english_pob_choice: men of Israel
  chosen_spanish: hombres de Israel
  alternatives_spanish:
  - mortales de Israel
  - pueblo de Israel
  - hombres mortales de Israel
  lexicon: HALOT
  rationale: La forma hebrea es masculina plural y la lectura básica es «hombres». Se mantiene la referencia masculina y la paralela fragilidad del miembro anterior, sin neutralizar el texto. «Mortales» sería posible, pero menos directo.
- source_word: אֲנִ֤י
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo
  - yo mismo, sí
  lexicon: HALOT
  rationale: El pronombre explícito es enfático. «Yo mismo» reproduce esa prominencia de manera natural en español y prepara la seguridad divina del enunciado.
- source_word: עֲזַרְתִּי/ךְ֙
  english_pob_choice: help you
  chosen_spanish: te ayudo
  alternatives_spanish:
  - te he ayudado
  - te ayudaré
  - te ayudo y te ayudaré
  lexicon: HALOT
  rationale: Aunque la forma verbal puede leerse con valor perfecto, en el contexto profético funciona como garantía de ayuda divina. «Te ayudo» comunica una promesa vigente y abierta, sin cerrar indebidamente el tiempo verbal.
- source_word: נְאֻם יְהוָ֔ה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: נְאֻם es una fórmula profética que en español bíblico se expresa bien con «declara». YHWH se rinde como «Yahvé» según la terminología del proyecto.
- source_word: וְ/גֹאֲלֵ֖/ךְ
  english_pob_choice: your Redeemer
  chosen_spanish: tu Redentor
  alternatives_spanish:
  - tu rescatador
  - tu redentor
  lexicon: HALOT
  rationale: גאל en este marco tiene fuerza redentora y de reivindicación pactal. «Redentor» conserva el título teológico y el vínculo relacional con Israel.
- source_word: קְד֥וֹשׁ יִשְׂרָאֵֽל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de Israel
  - el Santo que es de Israel
  lexicon: HALOT
  rationale: Es el título isaiano estable y debe conservarse con su forma reconocible. «Santo de Israel» mantiene el peso teológico y la construcción del hebreo.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se sigue la convención del proyecto para el Tetragrammaton, evitando el ocultamiento convencional con «SEÑOR». «Yahvé» es la forma estable en español del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Metáfora degradante en תּוֹלַעַת יַעֲקֹב
  english_pob_reading: worm Jacob
  chosen_spanish_reading: gusanillo de Jacob
  alternative_spanish_readings:
  - gusano de Jacob
  - Jacob, gusano
  - tú, Jacob, gusano
  rationale: 'La imagen no se suaviza ni se elimina: comunica pequeñez, vulnerabilidad y desprecio. La elección busca equilibrio entre fidelidad semántica y lectura pública en español.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Fuerza aspectual de עֲזַרְתִּיךְ
  english_pob_reading: help you
  chosen_spanish_reading: te ayudo
  alternative_spanish_readings:
  - te he ayudado
  - te ayudaré
  rationale: El verbo puede funcionar como seguridad profética más que como simple pasado. «Te ayudo» deja abierta esa garantía continua sin forzar una temporalidad única.
  doctrine_reference: 'DOCTRINE.md: Prophetic perfect / assurance contexts'
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo masorético (WLC) y armoniza con el audit trail inglés sin depender mecánicamente de él. Se mantuvo la tensión poética entre la humillación figurada («gusanillo de Jacob») y la afirmación divina de auxilio, además de la terminología del proyecto para YHWH como «Yahvé». No se incorporaron revisiones textuales adicionales porque el expediente indica pass final sin cambios.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme al estándar del proyecto, no «SEÑOR».
  - Se conserva la metáfora degradante sin convertirla en una paráfrasis neutral.
  - «Redentor» se mantiene como título teológico estable y no se reemplaza por una formulación más general.
  - La puntuación sigue la cadencia profética del hebreo con una serie de vocativos y predicados breves.
