translation:
  language: es
  text: Entonces los hice entrar en la tierra de los amorreos[a], que habitaban al otro lado del Jordán, y pelearon con ustedes. Y los entregué en manos de ustedes, y ustedes tomaron posesión de su tierra, y los destruí de delante de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pelearon contra ustedes'. El hebreo dice literalmente 'pelearon con ustedes', pero el contexto deja claro que se trató de hostilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲבִיאָה / ו/אבא/ה
  english_pob_choice: Then I brought
  chosen_spanish: Entonces los llevé
  alternatives_spanish:
  - Y los llevé
  - Entonces los conduje
  lexicon: HALOT
  rationale: El verbo causativo de בוא expresa que Yahvé hizo que el pueblo llegara; en español, 'llevar' o 'conducir' comunica bien la acción sin perder el movimiento hacia la tierra prometida. Se usa el complemento pronominal 'los' para reflejar el objeto directo explícito.
- source_word: אֶל אֶרֶץ הָאֱמֹרִי
  english_pob_choice: into the land of the Amorites
  chosen_spanish: a la tierra de los amorreos
  alternatives_spanish:
  - hacia la tierra de los amorreos
  - a la tierra de los amorreos
  lexicon: HALOT
  rationale: Con un verbo de movimiento, el hebreo אֶל puede traducirse de forma natural como 'a' en español; 'a la tierra de los amorreos' mantiene el sentido direccional sin forzar un 'en' o 'dentro de' menos natural aquí. 'Amorreos' conserva el etnónimo plural natural en español.
- source_word: הַיּוֹשֵׁב בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: who lived beyond the Jordan
  chosen_spanish: que habitaban al otro lado del Jordán
  alternatives_spanish:
  - que vivían al otro lado del Jordán
  - que moraban al otro lado del Jordán
  lexicon: HALOT
  rationale: El participio singular colectivo se vierte en plural español porque el referente es el pueblo amorreo; 'habitaban' mantiene el carácter descriptivo y un registro digno. 'Al otro lado del Jordán' conserva la expresión espacial sin precisar una orientación geográfica que el texto no explicita aquí.
- source_word: וַיִּלָּחֲמוּ אִתְּכֶם
  english_pob_choice: and they fought with you
  chosen_spanish: y pelearon con ustedes
  alternatives_spanish:
  - y pelearon contra ustedes
  - y combatieron con ustedes
  lexicon: HALOT
  rationale: לָחַם con אִתְּ puede reflejar la relación de enfrentamiento; en español, 'pelear con' conserva la cercanía formal con el hebreo, pero puede sonar ambigua. 'Pelearon con ustedes' mantiene la literalidad permitida por el audit trail, dejando la hostilidad clara por el contexto.
- source_word: וָאֶתֵּן אוֹתָם בְּיֶדְכֶם
  english_pob_choice: And I gave them into your hand
  chosen_spanish: Yo los entregué en su mano
  alternatives_spanish:
  - Y los entregué en su mano
  - Yo los di en su mano
  lexicon: HALOT
  rationale: El hebreo usa la idiomática 'dar en mano', pero en español 'entregar en la mano' o 'entregar en poder' comunica mejor la idea de poner al enemigo bajo control. Se mantiene 'su mano' para reflejar el sufijo de segunda persona plural sin alargar la frase.
- source_word: וַתִּירְשׁוּ אֶת אַרְצָם
  english_pob_choice: and you took possession of their land
  chosen_spanish: y ustedes tomaron posesión de su tierra
  alternatives_spanish:
  - y heredaron su tierra
  - y ocuparon su tierra
  lexicon: HALOT
  rationale: ירש puede implicar heredar, poseer o desposeer; aquí el sentido narrativo es la adquisición efectiva de la tierra. 'Tomaron posesión de' preserva ese valor sin introducir 'heredaron' como si el énfasis fuera principalmente dinástico o legal.
- source_word: וָאַשְׁמִידֵם
  english_pob_choice: and I destroyed them
  chosen_spanish: y los destruí
  alternatives_spanish:
  - y los exterminé
  - y los aniquilé
  lexicon: HALOT
  rationale: שׁמד denota destrucción/remoción severa; 'destruí' conserva la fuerza del verbo sin ir más allá con una traducción excesivamente interpretativa. En español, 'destruir' es el equivalente más sobrio y fiel al uso del audit trail.
- source_word: מִפְּנֵיכֶם
  english_pob_choice: from before you
  chosen_spanish: de delante de ustedes
  alternatives_spanish:
  - de su presencia
  - de ante ustedes
  lexicon: HALOT
  rationale: La locución idiomática se expresa en español con 'de delante de ustedes', que mantiene la idea de remoción del frente o de la presencia de Israel. Se evita 'ante' por sonar más arcaico en este contexto.
theological_decisions:
- issue: Conservación del lenguaje fuerte sobre la conquista y la destrucción
  english_pob_reading: 'Retain the direct divine speech and strong verbs: ''I gave them into your hand ... you took possession ... I destroyed them.'''
  chosen_spanish_reading: 'Mantener el discurso directo de Yahvé y los verbos fuertes: ''Yo los entregué en su mano ... ustedes tomaron posesión ... y los destruí.'''
  alternative_spanish_readings:
  - Yo los derroté
  - Yo los removí
  - Yo los puse bajo su poder
  rationale: El hebreo presenta explícitamente guerra, entrega y destrucción; la traducción no debe suavizar esas acciones ni sustituirlas por eufemismos. La redacción española conserva la misma tensión narrativa y teológica del texto fuente.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Never paraphrase beyond what the source text warrants.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje mantiene alto acuerdo con el texto fuente y solo presenta una observación menor sobre la preposición de enfrentamiento en וַיִּלָּחֲמוּ אִתְּכֶם.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del proyecto cuando el discurso es divino, aunque en este versículo el foco recae en la acción histórica relatada.
  - Se usa 'amorreos' en plural español por naturalidad etnónima, sin perder el referente colectivo singular del hebreo.
  - '''Tomaron posesión de'' preserva la fuerza jurídica/narrativa de ירש sin forzar ''heredaron''.'
  - El pronombre de segunda persona plural se refleja de forma consistente en 'ustedes' para registro neutral latinoamericano.
