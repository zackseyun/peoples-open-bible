base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/023/028.yaml
  text: For their duty was to assist the sons of Aaron in the service of the house of Yahweh[a], over the courts and the chambers, and the purification of all that is holy[c][b], and the work of the service of the house of God.
