  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Καὶ ὁ πέμπτος ἄγγελος ἐσάλπισεν· καὶ εἶδον ἀστέρα ἐκ τοῦ οὐρανοῦ πεπτωκότα εἰς τὴν γῆν, καὶ ἐδόθη αὐτῷ ἡ κλεὶς τοῦ φρέατος τῆς ἀβύσσου·
base_translation:
  language: en
  yaml_path: translation/nt/revelation/009/001.yaml
  text: 'And the fifth angel sounded the trumpet[a], and I saw a star that had fallen from heaven to the earth[c][b], and the key to the shaft of the abyss was given to him.'
  footnotes:
  - marker: a
    text: Or, 'a star fallen from heaven to the earth.' The Greek participle can be rendered more compactly, but likely indicates that the fall had already occurred when John saw it.
    reason: lexical_alternative
  - marker: b
    text: The 'star' may symbolize a personal being, since the text continues, 'the key ... was given to him.'
    reason: alternative_reading
  - marker: c
    text: 'Traditional: ''the key to the pit of the abyss'' or ''the bottomless pit.'''
    reason: lexical_alternative
translation:
  language: ko
  text: '다섯째 천사가 나팔을 불었습니다. 그러자 내가 보니, 한 별이 하늘에서 땅으로 떨어졌고[a], 그에게 무저갱[b]의 굴의 열쇠가 주어졌습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '또는 「하늘에서 땅으로 떨어진 한 별」. 헬라어 완료 분사는 요한이 보았을 때 이미 떨어져 있었음을 가리킨다.'
    reason: lexical_alternative
  - marker: b
    text: '전통적으로 「무저갱의 굴」 혹은 「밑이 없는 구덩이」.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ φρέατος τῆς ἀβύσσου
  english_pob_choice: the shaft of the abyss
  chosen_korean: 무저갱의 굴
  alternatives_korean:
  - 무저갱의 입구
  lexicon: BDAG
  rationale: '한국 교회 전통의 「무저갱」을 유지하되, φρέαρ를 「굴」로 옮겨 깊은 갱의 이미지를 살린다.'
