revisions:
- from: Por tanto, los haré ir al exilio más allá de Damasco —dice Yahvé[a], cuyo nombre es el Dios de los ejércitos.
  to: Por tanto, los exiliaré[a] más allá de Damasco —dice Yahvé, cuyo nombre es el Dios de las huestes.
  rationale: Se reemplaza «los haré ir al exilio» por «los exiliaré» para lograr un español más natural sin perder la fuerza causativa del hebreo; la alternativa se conserva en nota. También se cambia «el Dios de los ejércitos» por «el Dios de las huestes» para reflejar mejor la decisión auditada sobre צבאות como título amplio, no restringido a ejércitos. Se mantiene «Yahvé» según la política del proyecto y la cláusula final según la revisión inglesa auditada.
