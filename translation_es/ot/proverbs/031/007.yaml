translation:
  language: es
  text: Beba, y olvide su pobreza, y no recuerde más su sufrimiento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘su trabajo’ para ‘su sufrimiento’; el hebreo puede referirse a labor, penuria o miseria.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁתֶּה
  english_pob_choice: Let him drink
  chosen_spanish: Beba
  alternatives_spanish:
  - Que beba
  - Déjelo beber
  lexicon: HALOT
  rationale: El imperfecto jussivo en contexto expresa permiso/exhortación. En español, el imperativo de tercera persona por medio del subjuntivo captura mejor esa fuerza que un futuro simple.
- source_word: וְיִשְׁכַּח
  english_pob_choice: and forget
  chosen_spanish: y olvide
  alternatives_spanish:
  - y que olvide
  - para que olvide
  lexicon: HALOT
  rationale: Se conserva la secuencia verbal breve del hebreo sin forzar una relación puramente final. ‘Olvide’ reproduce bien el matiz exhortativo/resultativo del contexto.
- source_word: רִישׁוֹ
  english_pob_choice: his poverty
  chosen_spanish: su pobreza
  alternatives_spanish:
  - su destitución
  - su necesidad
  - su miseria
  lexicon: HALOT
  rationale: ‘Pobreza’ es la equivalencia más directa y natural en español para רִישׁ en este proverbio, manteniendo el sentido de condición empobrecida.
- source_word: וַעֲמָלוֹ
  english_pob_choice: his trouble
  chosen_spanish: su afán
  alternatives_spanish:
  - su trabajo
  - su toil
  - su sufrimiento
  lexicon: HALOT
  rationale: עָמָל puede abarcar labor, fatiga, afán o penuria. ‘Afán’ permite reflejar la carga o penosidad del término en un español digno y breve, sin reducirlo solo a trabajo físico ni a un sufrimiento más fuerte de lo que exige el contexto.
- source_word: לֹא יִזְכָּר עוֹד
  english_pob_choice: remember ... no more
  chosen_spanish: no recuerde más
  alternatives_spanish:
  - no lo recuerde más
  - no se acuerde ya
  lexicon: HALOT
  rationale: 'La negación con עוֹד expresa cese continuo: ‘ya no’ / ‘no más’. ‘No recuerde más’ conserva la finalización del acto de recordar y suena natural en español.'
translation_notes:
  revision_awareness: El texto hebreo y la traducción inglesa auditada están en alta concordancia; no se detectaron revisiones aplicadas en el registro fuente. Se mantuvo la lectura exhortativa del verbo inicial y la alternancia semántica de עָמָל con una opción española amplia, sin introducir interpretaciones ajenas al versículo.
  spanish_consistency_notes:
  - Se usa un tono proverbial breve y sobrio, acorde con el hebreo.
  - ‘Beba’ y ‘olvide’ mantienen la fuerza exhortativa sin volver la frase excesivamente literal.
  - ‘Su pobreza’ y ‘su afán’ preservan el paralelismo semántico del versículo.
  - La nota al pie conserva la alternativa lexical documentada para עָמָל.
