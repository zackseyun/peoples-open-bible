    rationale: La revisión inglesa cambió «for me» a «to me» para reflejar mejor el hebreo y sonar más natural. En español bíblico, «consagran a mí» es incorrecto, pero «consagran a Yahvé» en nota y la reestructuración de la frase resuelven el problema sin forzar «para mí».
