translation:
  language: es
  text: Las vigas de nuestra casa[a] son cedros[c]; nuestros largueros[b] son cipreses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nuestras casas»; la forma hebrea es plural, aunque el sentido puede ser colectivo: «nuestra casa» o «nuestro hogar».'
    reason: lexical_alternative
  - marker: b
    text: El término hebreo para «largueros» es incierto; también puede referirse a paneles o galerías.
    reason: lexical_alternative
  - marker: c
    text: 'O: «juníperos» o «abetos»; la especie exacta del árbol es incierta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קֹרוֹת
  english_pob_choice: beams
  chosen_spanish: vigas
  alternatives_spanish:
  - vigas de techo
  - maderos
  - vigas maestras
  lexicon: HALOT
  rationale: El término designa piezas estructurales de madera; en español, 'vigas' comunica con naturalidad la función arquitectónica sin forzar un tecnicismo.
- source_word: בָּתֵּינוּ
  english_pob_choice: our house
  chosen_spanish: nuestra casa
  alternatives_spanish:
  - nuestras casas
  - nuestro hogar
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural con sufijo de primera persona, el contexto poético puede funcionar como un singular colectivo. 'Nuestra casa' conserva el sentido compartido y fluye bien en español.
- source_word: אֲרָזִים
  english_pob_choice: cedars
  chosen_spanish: cedros
  alternatives_spanish:
  - madera de cedro
  - cedros
  lexicon: HALOT
  rationale: La imagen pide el árbol/material en plural predicativo; 'cedros' mantiene la correspondencia directa con el inglés POB y con el paralelismo de la línea.
- source_word: רַחִיטֵנוּ
  english_pob_choice: our rafters
  chosen_spanish: nuestros rafters
  alternatives_spanish:
  - nuestras vigas
  - nuestros listones
  - nuestro entablado
  lexicon: HALOT
  rationale: El hebreo es incierto; el POB opta por 'rafters'. Para no ocultar la decisión léxica documentada, se conserva el préstamo 'rafters' como marca de incertidumbre técnica, apoyado por la nota a pie de página.
- source_word: בְּרוֹתִים
  english_pob_choice: cypresses
  chosen_spanish: cipreses
  alternatives_spanish:
  - enebros
  - abetos
  lexicon: HALOT
  rationale: La identificación del árbol es debatida, pero 'cipreses' es una equivalencia común y plenamente inteligible en español, manteniendo la pareja poética con 'cedros'.
translation_notes:
  revision_awareness: Se corrigió la validación anterior haciendo que cada marcador de nota aparezca anclado en el texto; además, se evitó dejar notas sin ancla. El contenido sigue el audit trail en inglés y el hebreo fuente, preservando la incertidumbre de רַחִיטֵנוּ y בְּרוֹתִים.
  spanish_consistency_notes:
  - Se prefirió 'vigas' para קֹרוֹת por naturalidad y paralelismo.
  - Se mantuvo la imagen colectiva de 'nuestra casa' para בָּתֵּינוּ, aunque la morfología sea plural.
  - Se conservó la incertidumbre léxica de רַחִיטֵנוּ mediante nota y un término técnico no normalizado.
  - Se eligió 'cipreses' como equivalente idiomático de בְּרוֹתִים, dejando alternativas botánicas en nota.
