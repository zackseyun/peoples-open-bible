review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo: dos imperativos paralelos dirigidos a interlocutores caracterizados como sabios/conocedores, con «mis palabras» correctamente preservado. Sin embargo, «préstenme atención» debilita el matiz más literal de הַאֲזִינוּ (‘den oído / presten oído’), precisamente reforzado en la auditoría inglesa. También la nota al pie actual no refleja la alternativa documentada en inglés para el verbo auditivo, sino una alternativa sobre «mis palabras» que no corresponde al rastro principal de auditoría.'
  spanish_quality_summary: El español es claro y natural, pero la repetición de «ustedes» dos veces suena algo pesada. «Oigan mis palabras, hombres sabios, y préstenme oído, ustedes que saben» mantiene mejor el paralelismo poético y un registro digno. «Préstenme oído» suena más formal y más cercano al hebreo que «préstenme atención».
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. Las decisiones léxicas principales son adecuadas en general: «mis palabras» para מִלָּי, «hombres sabios» para חֲכָמִים, y «ustedes que saben» para וְיֹדְעִים. La principal corrección necesaria es alinear הַאֲזִינוּ con una expresión española de ‘oído’ y ajustar la nota al pie para reflejar la alternativa lexical pertinente.'
  issues:
  - severity: medium
    issue: La traducción de הַאֲזִינוּ como «préstenme atención» pierde el matiz de ‘oído’ presente en el hebreo y preservado en la revisión inglesa.
    rationale: El verbo אזן en hiphil es literalmente ‘dar oído / prestar oído’. La auditoría inglesa cambió precisamente a «give ear to me» para conservar esa fuerza; el español debe reflejarlo de forma equivalente.
  - severity: medium
    issue: La nota al pie [a] está anclada en «mis palabras», pero la nota relevante en la auditoría inglesa se refiere al verbo auditivo, no a מִלָּי.
    rationale: La traza inglesa documenta una alternativa lexical para el campo semántico de ‘oír / dar oído’. Mantener una nota distinta sobre «mi discurso» desvía la justificación auditada.
  - severity: low
    issue: La doble repetición de «ustedes» hace la línea menos fluida en español literario.
    rationale: 'El vocativo puede expresarse con menos carga pronominal sin perder claridad: «hombres sabios» y «ustedes que saben» bastan para conservar el sentido y el paralelismo.'
  - severity: low
    issue: 'Hay un error tipográfico en las alternativas léxicas: «mi խոսa».'
    rationale: Es un artefacto evidente y debe corregirse en revisión editorial, aunque no afecta directamente el texto bíblico principal.
  revised_spanish_text: Oigan mis palabras, hombres sabios, y préstenme oído[a], ustedes que saben.
  revised_footnotes:
  - marker: a
    text: O también «escúchenme»; el verbo hebreo es más literalmente un mandato relacionado con el oído.
    reason: lexical_alternative
