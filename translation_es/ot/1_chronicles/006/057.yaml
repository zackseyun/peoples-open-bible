translation:
  language: es
  text: 'Y de la tribu de Isacar: Quedes con sus pastizales, y Daberat[a] con sus pastizales.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Daberat» también aparece como «Dabareth» en algunas traducciones en inglés y en la lista paralela de Josué 21:28.
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/מִ/מַּטֵּה
  english_pob_choice: And from the tribe of
  chosen_spanish: Y de la tribu de
  alternatives_spanish:
  - De la tribu de
  - Y de la tribu de Isacar
  lexicon: HALOT
  rationale: En el contexto de repartos tribales, מַטֵּה designa la tribu como unidad territorial. En español, «de la tribu de» conserva bien la relación de pertenencia y la continuidad de la lista.
- source_word: יִשָׂשכָר
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Issacar
  lexicon: Nombre propio bíblico estándar
  rationale: Se usa la forma hispana tradicional y ampliamente reconocible «Isacar», que comunica con naturalidad el nombre tribal sin perder identificabilidad.
- source_word: קֶדֶשׁ
  english_pob_choice: Kedesh
  chosen_spanish: Quedes
  alternatives_spanish:
  - Cedes
  - Kedesh
  lexicon: Nombre propio bíblico estándar
  rationale: Como topónimo, se translitera al español. «Quedes» es una adaptación hispana clara y lecturable; se evita traducir el nombre.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - sus tierras de pasto
  - sus campos abiertos
  - sus pastos
  lexicon: HALOT
  rationale: מִגְרָשׁ se refiere al terreno abierto asociado a una ciudad levítica. «Pastizales» transmite la idea de terreno de pastoreo de manera natural en español, sin caer en el arcaísmo de «suburbios» ni en una generalización excesiva.
- source_word: דָּבְרַת
  english_pob_choice: Daberath
  chosen_spanish: Daberat
  alternatives_spanish:
  - Daberath
  - Dabareth
  lexicon: Nombre propio bíblico estándar
  rationale: Se conserva el topónimo con transliteración española. «Daberat» es una forma breve y natural en español; la variación tradicional inglesa se refleja en la nota.
translation_notes:
  revision_awareness: El borrador sigue el acuerdo alto del control cruzado y no introduce cambios sustantivos respecto del análisis auditado. La principal adaptación al español es la naturalización de los nombres propios y de «pasturelands» como «pastizales», manteniendo el sentido territorial levítico.
  spanish_consistency_notes:
  - Se mantiene el patrón enumerativo con dos ciudades y su respectiva expresión de terreno asociado.
  - «Y de la tribu de» conserva la continuidad sintáctica de la lista iniciada en el versículo anterior.
  - Se evita «SEÑOR» u otra terminología teológica no presente en el versículo.
  - La grafía de los topónimos se adapta al uso hispano sin añadir identificadores no atestiguados en el texto base.
