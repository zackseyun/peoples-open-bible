    text: Hebrew reads 'five hundred thirty-five priests’ tunics.' The parallel in Ezra 2:69 reads 'one hundred priests’ tunics,' and some translations harmonize or reflect a different textual tradition.
    reason: textual_variant
  - marker: b
    text: Or 'the Tirshatha,' a Persian administrative title.
    reason: lexical_alternative
  - marker: c
    text: That is, Persian gold darics.
    reason: cultural_note
