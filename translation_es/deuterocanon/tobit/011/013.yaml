translation:
  language: es
  text: Y las capas blancas se desprendieron de las comisuras de sus ojos. Y cuando vio a su hijo[a], se le echó al cuello,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «cayó sobre su cuello»; es una expresión convencional de abrazo afectuoso y emotivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεπίσθη
  english_pob_choice: peeled away
  chosen_spanish: se desprendieron
  alternatives_spanish:
  - se pelaron
  - se descascararon
  - se fueron desprendiendo
  lexicon: LSJ
  rationale: El verbo sugiere que algo se quita o se separa en láminas o escamas. En español, 'se desprendieron' conserva el movimiento físico sin sonar forzado; 'se fueron desprendiendo' sería más descriptivo, pero menos directo.
- source_word: κανθῶν
  english_pob_choice: corners
  chosen_spanish: las esquinas
  alternatives_spanish:
  - las comisuras
  - los ángulos
  - los bordes
  lexicon: LSJ
  rationale: En este contexto anatómico, se refiere a los ángulos o esquinas de los ojos. 'Esquinas' es claro y natural en español; 'comisuras' sería más técnico.
- source_word: ὀφθαλμῶν
  english_pob_choice: eyes
  chosen_spanish: ojos
  lexicon: LSJ
  rationale: Es el equivalente normal y exacto del término anatómico griego.
- source_word: λευκώματα
  english_pob_choice: white films
  chosen_spanish: opacidades blancas
  alternatives_spanish:
  - películas blancas
  - manchas blancas
  - placas blanquecinas
  lexicon: LSJ
  rationale: El término apunta a opacidades blanquecinas del ojo. 'Opacidades blancas' comunica el fenómeno visual con precisión en español; 'películas blancas' preservaría la imagen de capa, pero suena menos natural y más ambiguo.
- source_word: ἰδών
  english_pob_choice: when he saw
  chosen_spanish: cuando vio
  alternatives_spanish:
  - al ver
  - viendo
  lexicon: LSJ
  rationale: El participio temporal se vierte de forma natural como 'cuando vio' en esta secuencia narrativa.
- source_word: ἐπέπεσεν ἐπὶ τὸν τράχηλον αὐτοῦ
  english_pob_choice: he fell on his neck
  chosen_spanish: se echó sobre su cuello
  alternatives_spanish:
  - se arrojó a su cuello
  - cayó sobre su cuello
  - se lanzó a su cuello
  lexicon: LSJ
  rationale: La expresión es un giro idiomático de abrazo emotivo. 'Se echó sobre su cuello' conserva la imagen de contacto corporal y funciona en español bíblico contemporáneo; 'se arrojó a su cuello' sería más enfático, pero menos idiomático.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés coinciden plenamente en la escena: desaparición de las opacidades oculares y el abrazo emotivo al reconocer al hijo. No se registran revisiones aplicadas; se ha mantenido esa lectura sin expansión interpretativa.'
  spanish_consistency_notes:
  - Se evita el calco mecánico de 'cayeron sobre su cuello' y se conserva la imagen idiomática con español natural.
  - '''Opacidades blancas'' refleja con precisión el sentido ocular de λευκώματα sin introducir un tecnicismo médico excesivo.'
  - La puntuación y la coordinación reproducen la cadencia narrativa de dos acciones consecutivas.
