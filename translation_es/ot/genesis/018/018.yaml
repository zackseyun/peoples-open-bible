review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido hebreo general: la intensificación de הָיוֹ יִהְיֶה, la promesa de que Abraham llegará a ser una nación grande y poderosa, y la bendición de todas las naciones en relación con él. También conserva correctamente en nota la lectura alternativa de נִבְרְכוּ como reflexiva. Sin embargo, el anclaje de la nota [a] está mal colocado: en el inglés POB la nota alternativa corresponde a la cláusula final sobre «serán bendecidas», no a «una nación».'
  spanish_quality_summary: El español es claro y natural, pero «seguramente llegará a ser» suena un poco adverbial/probabilístico en español contemporáneo, mientras que el hebreo expresa énfasis de certeza. «Ciertamente llegará a ser» o «sin duda llegará a ser» transmite mejor la fuerza. Además, la nota debe anclarse en la frase de bendición, no en «nación».
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Nación», «bendecidas» y «en él» están bien elegidos y siguen el razonamiento léxico auditado. La decisión principal pasiva con nota alternativa también concuerda con la pauta teológica documentada.
  issues:
  - severity: medium
    issue: Marcador de nota al pie colocado en «una nación[a]» en vez de la cláusula «serán bendecidas en él[a]».
    rationale: La nota explica una lectura alternativa de וְנִבְרְכוּ בּוֹ («serán bendecidas en él / se bendecirán por él»), no de לְגוֹי («una nación»). El anclaje actual induce a error sobre qué parte del texto se discute.
  - severity: low
    issue: «Seguramente llegará a ser» puede sonar a probabilidad más que a certeza enfática.
    rationale: La construcción hebrea infinitivo absoluto + imperfecto intensifica con certeza. En español bíblico natural, «ciertamente» expresa mejor esa fuerza que «seguramente», que a veces suena menos categórico.
  revised_spanish_text: Abraham ciertamente llegará a ser una nación grande y poderosa, y todas las naciones de la tierra serán bendecidas en él[a].
  revised_footnotes:
  - marker: a
    text: 'O: «todas las naciones de la tierra se bendecirán a sí mismas por él». La forma hebrea también puede entenderse de ese modo; aquí se sigue la lectura pasiva: «serán bendecidas en él».'
    reason: alternative_reading
  revision_rationale: Se corrige el anclaje de la nota para que corresponda a la cláusula hebrea debatida (וְנִבְרְכוּ בּוֹ) y se ajusta «seguramente» a «ciertamente» para reflejar mejor la fuerza enfática del hebreo sin perder naturalidad en español.
