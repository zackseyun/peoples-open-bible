- from: Con hechos asombrosos en justicia[a] tú nos respondes, oh Dios de nuestra salvación, la confianza de todos los confines de la tierra y del mar lejano.
  to: Con hechos asombrosos en rectitud[a] tú nos respondes, oh Dios de nuestra salvación, la confianza de todos los confines de la tierra y del mar lejano.
  rationale: Se ajusta צֶדֶק para que el texto principal siga la decisión auditada del POB ('righteousness') y se preserva 'justicia' como alternativa léxica en nota. El resto del versículo ya era fiel al hebreo y natural en español.
