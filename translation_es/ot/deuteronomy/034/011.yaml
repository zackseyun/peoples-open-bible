translation:
  language: es
  text: por todas las señales y las maravillas que Yahvé lo envió a hacer en la tierra de Egipto, a Faraón y a todos sus siervos y a toda su tierra[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra toda su tierra» / «y por toda su tierra». La preposición hebrea puede entenderse aquí con distintos matices relacionales.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכָל
  english_pob_choice: for all
  chosen_spanish: por todas
  alternatives_spanish:
  - con respecto a todas
  - en cuanto a todas
  lexicon: HALOT
  rationale: La preposición ל con כָּל continúa la relación del verso anterior. En español, “por todas” mantiene la amplitud y suena natural en esta construcción enumerativa.
- source_word: הָאֹתֹת
  english_pob_choice: the signs
  chosen_spanish: las señales
  alternatives_spanish:
  - los signos
  - las señales milagrosas
  lexicon: HALOT
  rationale: אֹת puede ser “señal” o “signo”. “Señales” conserva el sentido amplio y evita añadir explícitamente “milagrosas” como explicación no exigida por el hebreo.
- source_word: וְהַמּוֹפְתִים
  english_pob_choice: and the wonders
  chosen_spanish: y las maravillas
  alternatives_spanish:
  - y los prodigios
  - y los milagros
  lexicon: HALOT
  rationale: מֹפְתִים suele acompañar a אֹתוֹת para actos extraordinarios. “Maravillas” preserva el par tradicional “señales y maravillas” sin forzar un tecnicismo más interpretativo.
- source_word: אֲשֶׁר שְׁלָחוֹ יְהוָה
  english_pob_choice: that Yahweh sent him
  chosen_spanish: que Yahvé lo envió
  alternatives_spanish:
  - que Yahvé lo mandó
  - que Yahvé lo comisionó
  lexicon: HALOT
  rationale: שׁלח con sufijo objeto expresa envío/encargo. “Lo envió” es directo y fiel; “comisionó” sería más explicativo que el hebreo no exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino en la forma de trabajo del POB en español: “Yahvé”, conforme al criterio del proyecto y al audit trail inglés.'
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: a hacer
  alternatives_spanish:
  - para hacer
  - a realizar
  lexicon: HALOT
  rationale: עָשָׂה es amplio. Tras “lo envió”, “a hacer” reproduce bien la relación con el infinitivo y conserva la sencillez del hebreo.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  - en el país de Egipto
  lexicon: HALOT
  rationale: “Tierra” refleja con mayor plenitud אֶרֶץ y mantiene el registro elevado del relato; “Egipto” solo sería más breve, pero menos preciso respecto del término hebreo.
- source_word: לְפַרְעֹה
  english_pob_choice: to Pharaoh
  chosen_spanish: para Faraón
  alternatives_spanish:
  - a Faraón
  - contra Faraón
  lexicon: HALOT
  rationale: La ל puede indicar dirección o relación. “Para Faraón” deja abierta la función de destinatario/objeto de las señales, sin cerrar el matiz contextual de oposición o repercusión.
- source_word: וּלְכָל עֲבָדָיו
  english_pob_choice: and to all his servants
  chosen_spanish: y para todos sus siervos
  alternatives_spanish:
  - y para todos sus servidores
  - y para todos sus oficiales
  lexicon: HALOT
  rationale: עֲבָדִים puede ser “siervos” o “sirvientes”. “Siervos” preserva mejor la fuerza relacional del término y sigue la preferencia del proyecto por no suavizarlo innecesariamente.
- source_word: וּלְכָל אַרְצוֹ
  english_pob_choice: and to all his land
  chosen_spanish: y para toda su tierra
  alternatives_spanish:
  - y contra toda su tierra
  - y por toda su tierra
  lexicon: HALOT
  rationale: אַרְץ puede referirse al territorio. “Toda su tierra” es una traducción natural y amplia; en español “para” conserva la simetría con la serie anterior, aunque el contexto también puede sugerir impacto sobre el territorio.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la decisión doctrinal del POB de no sustituir el Tetragrámaton por un título. “Yahvé” preserva el nombre personal divino de forma auditable y coherente con el texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Relación de la preposición ל en la secuencia final
  english_pob_reading: to Pharaoh ... and to all his servants and to all his land
  chosen_spanish_reading: para Faraón ... y para todos sus siervos y para toda su tierra
  alternative_spanish_readings:
  - contra Faraón ... y contra todos sus siervos y contra toda su tierra
  - a Faraón ... y a todos sus siervos y a toda su tierra
  rationale: 'La preposición hebrea permite más de una relación: dirección, destinatario o impacto. Mantener “para” preserva la ambigüedad sin imponer una lectura polémica; la nota de pie de página recoge la alternativa contextual.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy — preserve documented lexical tension'
translation_notes:
  revision_awareness: 'El texto base inglés y el control de revisión más reciente indican concordancia alta y ningún cambio necesario. Esta versión española sigue ese estado: conserva la estructura del hebreo, mantiene Yahvé como nombre divino y preserva la ambigüedad relacional final señalada en el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa “Yahvé” de manera consistente para יְהוָה.
  - Se mantiene “siervos” para עֲבָדִים según la preferencia léxica del proyecto.
  - Se conserva la pareja “señales y maravillas” como equivalente estable de אֹתֹת / מוֹפְתִים.
  - La nota [a] recoge la ambigüedad de ל al final sin desplazar el texto principal.
