    reason: lexical_alternative
  - marker: c
    text: O «los bueyes». El término hebreo puede referirse colectivamente al ganado vacuno o más específicamente a bovinos usados para labor o sacrificio. En 1 Crónicas 21:25, David paga seiscientos siclos de oro por el sitio; aquí se especifican cincuenta siclos de plata por la era y el ganado.
    reason: lexical_alternative
  revision_rationale: 'La revisión conserva el sentido del original y la teología del expediente POB, pero corrige tres puntos: preserva la nota de referencia cruzada ausente, devuelve הַבָּקָר a un valor colectivo más fiel (''el ganado'') dejando ''los bueyes'' como alternativa, y reubica la nota de חִנָּם en la frase correspondiente. También suaviza levemente la sintaxis para un español más natural.'
