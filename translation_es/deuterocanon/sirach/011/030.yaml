translation:
  language: es
  text: Un buen día hace olvidar la desgracia, y un mal día hace olvidar la prosperidad; y el fin de una persona estará sobre ella[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: "y el fin de una persona estará sobre ella". El sentido puede ser que el desenlace final de la persona la confronte o la alcance. El paralelo griego en este punto difiere mucho del hebreo conservado y no aclara la cláusula.'
    reason: alternative_reading
lexical_decisions:
- source_word: טוֹב יוֹם
  english_pob_choice: A good day
  chosen_spanish: Un buen día
  alternatives_spanish:
  - Un día bueno
  - Un día de bien
  - Un día próspero
  lexicon: HALOT
  rationale: Sigo el hebreo breve y paralelo con una expresión natural en español. 'Buen día' conserva la concisión idiomática de 'good day' sin añadir matices ajenos; 'próspero' explicita demasiado una interpretación contextual.
- source_word: תִּשָּכַח רָעָה
  english_pob_choice: makes one forget trouble
  chosen_spanish: hace olvidar el mal
  alternatives_spanish:
  - hace olvidar la desgracia
  - hace que se olvide el mal
  - hace olvidar la miseria
  lexicon: HALOT
  rationale: El hebreo usa un valor experiencial de רָעָה en paralelo con la fortuna adversa; en español 'mal' puede abarcar calamidad o desgracia sin moralizar en exceso. Mantengo la sencillez del paralelismo y no reduzco el sentido a 'mal moral'.
- source_word: וְרָע יוֹם
  english_pob_choice: and a bad day
  chosen_spanish: y un mal día
  alternatives_spanish:
  - y un día malo
  - y un día adverso
  - y un día de desgracia
  lexicon: HALOT
  rationale: '''Mal día'' es la contraparte natural de ''buen día'' en español y refleja el hebreo antitético. ''Adverso'' sería más explicativo, pero menos directo.'
- source_word: תִּשָׁכַח טוֹבָה
  english_pob_choice: makes one forget prosperity
  chosen_spanish: hace olvidar la prosperidad
  alternatives_spanish:
  - hace olvidar el bien
  - hace olvidar el bienestar
  - hace olvidar la dicha
  lexicon: HALOT
  rationale: '''Prosperidad'' comunica mejor la oposición contextual a ''mal/trouble'' que ''bien'' o ''dicha'', y conserva el alcance de טובה como bienestar favorable, no solo emoción.'
- source_word: וְאַחֲרִית אָדָם
  english_pob_choice: and a person's end
  chosen_spanish: el fin de un hombre
  alternatives_spanish:
  - el final de una persona
  - el final de un ser humano
  - el fin del hombre
  lexicon: HALOT
  rationale: El hebreo tiene אָדָם en singular genérico. En español, 'un hombre' puede funcionar como singular representativo y mantiene la fuerza proverbial. No uso 'persona' en el texto principal porque suaviza la forma tradicional del enunciado hebreo y pierde algo del sabor proverbial.
- source_word: תִּהְיֶה עָלָיו
  english_pob_choice: will be upon him
  chosen_spanish: estará sobre él
  alternatives_spanish:
  - vendrá sobre él
  - le sobrevendrá
  - estará delante de él
  lexicon: HALOT
  rationale: Sigo de cerca עָלָיו con 'sobre él', que conserva la imagen de una realidad que pesa o recae sobre la persona. Evito una paráfrasis más interpretativa porque el hebreo deja abierto si la referencia es a destino, desenlace u ocasión final.
theological_decisions:
- issue: Valor genérico de אָדָם
  english_pob_reading: a person's end
  chosen_spanish_reading: el fin de un hombre
  alternative_spanish_readings:
  - el fin de una persona
  - el fin del ser humano
  rationale: La forma hebrea es singular genérica, no exclusiva de varones concretos. En español, 'un hombre' puede leerse de modo representativo y conserva la formulación proverbial del original. No introduce una afirmación doctrinal sobre género; simplemente mantiene la sintaxis sapiencial.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
- issue: Sentido de עָלָיו
  english_pob_reading: will be upon him
  chosen_spanish_reading: estará sobre él
  alternative_spanish_readings:
  - vendrá sobre él
  - recaerá sobre él
  rationale: 'La cláusula final es semánticamente tensa: puede expresar el destino final que recae sobre la persona o su desenlace que la alcanza. ''Estará sobre él'' preserva esa ambigüedad sin cerrar el sentido de forma innecesaria.'
  doctrine_reference: POB source-note on lexical ambiguity; Sirach 11:30 Hebrew/Greek divergence
translation_notes:
  revision_awareness: Alineé la primera mitad con el hebreo base, manteniendo el paralelismo 'buen día / mal día'. En la cláusula final seguí la revisión más reciente del inglés POB, que prefirió 'upon him' por ajustarse más a עָלָיו; en español se conservó esa relación con 'estará sobre él'. También se evitó introducir una nota sin anclaje en el texto, corrigiendo el fallo de validación previo.
  spanish_consistency_notes:
  - Usé 'mal' y 'prosperidad' para respetar el contraste experiencial del hebreo, sin moralizar los términos.
  - Mantuve 'un hombre' como genérico representativo del hebreo אָדָם, coherente con el registro sapiencial.
  - Conservé la ambigüedad de la última cláusula mediante una nota vinculada al marcador [a].
