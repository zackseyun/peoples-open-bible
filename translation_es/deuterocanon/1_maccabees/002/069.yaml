translation:
  language: es
  text: Y los bendijo, y fue reunido con sus padres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «fue añadido a sus padres»; expresión tradicional para la muerte.'
