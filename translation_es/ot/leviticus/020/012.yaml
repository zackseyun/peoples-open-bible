translation:
  language: es
  text: Si un hombre se acuesta con su nuera, ambos ciertamente serán puestos a muerte. Han cometido una perversión[a]; su sangre está sobre ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confusión», «un ultraje» o «un acto vergonzoso». El término hebreo תֶּבֶל designa aquí un acto moralmente desordenado en un contexto legal.
    reason: lexical_alternative
  - marker: b
    text: O «su culpabilidad de sangre está sobre ellos». El modismo hebreo asigna a los propios culpables la responsabilidad por su muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ / אֲשֶׁר
  english_pob_choice: If a man
  chosen_spanish: Si un hombre
  alternatives_spanish:
  - Y un hombre
  - Un hombre
  lexicon: HALOT
  rationale: En esta fórmula legal casuística, el hebreo introduce un caso con valor condicional. En español, «Si un hombre» expresa de manera natural ese valor sin perder el sujeto masculino singular.
- source_word: יִשְׁכַּב אֶת
  english_pob_choice: lies with
  chosen_spanish: se acuesta con
  alternatives_spanish:
  - tiene relaciones con
  - duerme con
  lexicon: HALOT
  rationale: La expresión hebrea es un eufemismo sexual legal. «Se acuesta con» conserva el giro idiomático y su alcance sexual sin volverlo excesivamente técnico o demasiado coloquial.
- source_word: כַּלָּתוֹ
  english_pob_choice: his daughter-in-law
  chosen_spanish: su nuera
  alternatives_spanish:
  - su hija política
  - la esposa de su hijo
  lexicon: HALOT
  rationale: El término designa a la esposa del hijo; en español el equivalente kinship más claro y preciso es «nuera».
- source_word: מוֹת יוּמְתּוּ
  english_pob_choice: shall surely be put to death
  chosen_spanish: serán puestos ciertamente a muerte
  alternatives_spanish:
  - deben ser muertos
  - serán sin duda muertos
  lexicon: HALOT
  rationale: La construcción intensiva hebrea refuerza la sanción legal. «Serán puestos ciertamente a muerte» mantiene el valor forense y la intensidad sin suavizar la pena.
- source_word: שְׁנֵיהֶם
  english_pob_choice: both of them
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos dos
  lexicon: HALOT
  rationale: El hebreo especifica que la pena alcanza a las dos personas involucradas. En español, «ambos» comunica esa inclusión de manera breve y natural.
- source_word: תֶּבֶל
  english_pob_choice: perversion
  chosen_spanish: una perversión
  alternatives_spanish:
  - confusión
  - un acto vergonzoso
  - una infamia
  lexicon: HALOT
  rationale: El término hebreo nombra una acción sexual moralmente desordenada. «Perversión» reproduce la fuerza valorativa del original sin diluirla en una descripción más neutral.
- source_word: עָשׂוּ
  english_pob_choice: have committed
  chosen_spanish: han cometido
  alternatives_spanish:
  - han hecho
  - han practicado
  lexicon: HALOT
  rationale: Con un objeto abstracto como «una perversión», en español jurídico-moral resulta más idiomático «han cometido» que un literal «han hecho».
- source_word: דְּמֵיהֶם בָּם
  english_pob_choice: their blood is upon them
  chosen_spanish: su sangre está sobre ellos
  alternatives_spanish:
  - su culpa de sangre recae sobre ellos
  - la sangre de ellos está sobre ellos
  lexicon: HALOT
  rationale: La frase hebrea es un modismo de responsabilidad por la propia condena. «Su sangre está sobre ellos» conserva el giro figurado y la imputación de responsabilidad sin explicarla en exceso.
theological_decisions:
- issue: Carácter legal y forense de la sentencia
  english_pob_reading: The verse states a judicial penalty for the offenders, with responsibility assigned to them.
  chosen_spanish_reading: La pena se presenta como sentencia legal dirigida a ambos culpables, y la responsabilidad recae sobre ellos mismos.
  alternative_spanish_readings:
  - La frase podría suavizarse como una advertencia moral general.
  - Podría explicitarse como «culpa de sangre», pero eso añade interpretación.
  rationale: El hebreo mantiene el registro jurídico. La versión española conserva la sanción y el modismo de responsabilidad sin desplazar el énfasis a una mera exhortación moral.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Valor moral de תֶּבֶל
  english_pob_reading: Or 'confusion,' 'an outrage,' or 'a disgraceful act.' The Hebrew term תֶּבֶל denotes a morally disordered act in this legal context.
  chosen_spanish_reading: «Perversión» en el texto principal, con alternativa de lectura en nota.
  alternative_spanish_readings:
  - confusión
  - un ultraje
  - un acto vergonzoso
  rationale: La palabra hebrea no es neutral; califica la acción como desorden moral grave. «Perversión» comunica esa carga valorativa en español contemporáneo, y la nota preserva las opciones alternativas del audit trail.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail en inglés y no requiere revisión adicional; se conserva la fuerza jurídica del hebreo, la relación de parentesco específica de כַּלָּה como «nuera», la intensificación de מוֹת יוּמְתּוּ y el modismo final de responsabilidad de sangre.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología por defecto cuando aparezca el nombre divino, pero este versículo no contiene el tetragrámaton.
  - Se conserva un estilo jurídico sobrio y contemporáneo, sin introducir vocabulario eclesiástico no solicitado.
  - «Perversión» se usa como término valorativo principal, coherente con el registro legal-moral del pasaje.
