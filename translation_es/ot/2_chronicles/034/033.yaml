translation:
  language: es
  text: Y Josías quitó todas las abominaciones de todas las tierras[a] que pertenecían a los hijos de Israel, e hizo que todos los que se hallaban[b] en Israel sirvieran a Yahvé su Dios. Durante todos sus días no se apartaron de seguir a Yahvé, el Dios de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de todos los territorios del pueblo de Israel». El hebreo dice literalmente «de todas las tierras que pertenecían a los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «presentes en Israel». El participio hebreo puede expresar a los que estaban allí o se encontraban en esa región.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסַר
  english_pob_choice: removed
  chosen_spanish: quitó
  alternatives_spanish:
  - removió
  - apartó
  lexicon: HALOT
  rationale: El verbo tiene fuerza de retirar o eliminar. «Quitó» suena natural en español y mantiene el acto de remover elementos idolátricos sin suavizarlo.
- source_word: הַתּוֹעֵבוֹת
  english_pob_choice: abominations
  chosen_spanish: las abominaciones
  alternatives_spanish:
  - las cosas detestables
  - las repugnancias
  lexicon: HALOT
  rationale: «Abominaciones» conserva la fuerza cultual y moral del hebreo, especialmente en contexto de idolatría y reforma.
- source_word: מִכָּל הָאֲרָצוֹת אֲשֶׁר לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: from all the lands that belonged to the sons of Israel
  chosen_spanish: de todas las tierras[a] que pertenecían a los hijos de Israel
  alternatives_spanish:
  - de todos los territorios del pueblo de Israel
  - de todas las tierras de los hijos de Israel
  lexicon: HALOT
  rationale: «Tierras» refleja אֲרָצוֹת. «Que pertenecían a» expresa bien la relación posesiva del hebreo y evita una paráfrasis más amplia.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la formulación familiar del hebreo. En español «hijos de Israel» es natural y mantiene la referencia textual precisa.
- source_word: וַיַּעֲבֵד
  english_pob_choice: he made ... serve
  chosen_spanish: obligó ... a servir
  alternatives_spanish:
  - hizo ... servir
  - causó que ... sirvieran
  lexicon: HALOT
  rationale: La forma causativa indica que Josías hizo que otros sirvieran. «Obligó» transmite esa iniciativa coercitiva/administrativa sin añadir un detalle físico no explicitado.
- source_word: כָּל הַנִּמְצָא בְּיִשְׂרָאֵל
  english_pob_choice: all who were found in Israel
  chosen_spanish: a todos los que se hallaban[b] en Israel
  alternatives_spanish:
  - a todos los presentes en Israel
  - a todos los que estaban en Israel
  lexicon: HALOT
  rationale: «Hallarse» reproduce bien el participio pasivo sin sonar artificial. En español la idea contextual es de presencia/localización, no de búsqueda y hallazgo.
- source_word: לַעֲבֹד אֶת יְהוָה אֱלֹהֵיהֶם
  english_pob_choice: serve Yahweh their God
  chosen_spanish: a servir a Yahvé su Dios
  alternatives_spanish:
  - a adorar a Yahvé su Dios
  - a servir al Señor su Dios
  lexicon: HALOT
  rationale: «Servir» preserva la amplitud cultual y covenantal del hebreo עבד. Se mantiene «Yahvé» conforme al criterio del proyecto para el Tetragrammaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se usa la forma establecida por el proyecto para el nombre divino, manteniendo el nombre propio y no un sustituto titulado.
- source_word: כָּל יָמָיו
  english_pob_choice: All his days
  chosen_spanish: Todos sus días
  alternatives_spanish:
  - Durante toda su vida
  - Mientras vivió
  lexicon: HALOT
  rationale: «Todos sus días» es una equivalencia directa y natural en español para la duración total de la vida o del reinado según el contexto.
- source_word: לֹא סָרוּ מֵאַחֲרֵי יְהוָה
  english_pob_choice: they did not turn away from following Yahweh
  chosen_spanish: no se apartaron de seguir a Yahvé
  alternatives_spanish:
  - no se desviaron de seguir a Yahvé
  - no dejaron de seguir a Yahvé
  lexicon: HALOT
  rationale: «Apartarse de seguir» capta la imagen de retirarse detrás de alguien. Evita el calco duro «de detrás de» y conserva la relación de fidelidad.
- source_word: אֱלֹהֵי אֲבוֹתֵיהֶם
  english_pob_choice: the God of their fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  - el Dios de sus padres y madres
  lexicon: HALOT
  rationale: Se conserva la fórmula bíblica tradicional «el Dios de sus padres», que refleja el hebreo y su valor pactual e histórico.
theological_decisions:
- issue: Divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrammaton; conforme al criterio del proyecto, se traslada como nombre propio «Yahvé» en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Causative force of וַיַּעֲבֵד
  english_pob_reading: he made all who were found in Israel serve
  chosen_spanish_reading: obligó a todos los que se hallaban en Israel a servir
  alternative_spanish_readings:
  - hizo servir a todos los que se hallaban en Israel
  - causó que todos los que se hallaban en Israel sirvieran
  rationale: La forma verbal expresa acción causativa. «Obligó» comunica que Josías impuso esa conducta sin exagerar el grado de coerción más allá de lo que el hebreo exige.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Masculine familial terms
  english_pob_reading: sons of Israel / fathers
  chosen_spanish_reading: hijos de Israel / padres
  alternative_spanish_readings:
  - israelitas / antepasados
  rationale: Se conserva el lenguaje familiar masculino cuando es natural y fiel al hebreo, evitando neutralizaciones innecesarias.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «present» a «found» y luego volvió a «found» para reflejar mejor el término hebreo sin perder naturalidad. En español se optó por «se hallaban» para mantener el valor contextual de presencia/localización y evitar la idea de búsqueda implícita en «hallados». También se preservó la fuerza causativa de וַיַּעֲבֵד mediante «obligó a ... a servir».
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה.
  - Se mantuvo la fórmula bíblica «el Dios de sus padres» para אֱלֹהֵי אֲבוֹתֵיהֶם.
  - La segmentación de la primera cláusula sigue el orden del hebreo sin calco excesivo.
  - Los marcadores de nota [a], [b] y [c] aparecen exactamente en el texto principal y corresponden a notas ancladas.
