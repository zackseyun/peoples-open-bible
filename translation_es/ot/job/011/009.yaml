translation:
  language: es
  text: Su medida es más larga que la tierra y más ancha que el mar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su extensión es más larga que la tierra y más ancha que el mar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרֻכָּה
  english_pob_choice: longer
  chosen_spanish: más larga
  alternatives_spanish:
  - larga
  - más extensa
  lexicon: HALOT
  rationale: El hebreo funciona como adjetivo femenino singular en comparación; en español, «más larga» conserva el valor comparativo de manera natural y fiel.
- source_word: מֵאֶרֶץ
  english_pob_choice: than the earth
  chosen_spanish: que la tierra
  alternatives_spanish:
  - que el mundo
  - que la tierra firme
  lexicon: HALOT
  rationale: Aquí מִן marca comparación, no separación. «La tierra» mantiene el paralelismo con «el mar» y preserva la imagen cósmica del verso.
- source_word: מִדָּהּ
  english_pob_choice: its measure
  chosen_spanish: su medida
  alternatives_spanish:
  - su extensión
  - su dimensión
  lexicon: HALOT
  rationale: «Medida» reproduce el sustantivo concreto del hebreo y conserva el referente femenino con sufijo posesivo.
- source_word: וּרְחָבָה
  english_pob_choice: and broader
  chosen_spanish: y más ancha
  alternatives_spanish:
  - y ancha
  - y más amplia
  lexicon: HALOT
  rationale: La forma femenina paralela pide una comparación en español; «más ancha» refleja bien el segundo miembro del paralelismo.
- source_word: מִנִּי יָם
  english_pob_choice: than the sea
  chosen_spanish: que el mar
  alternatives_spanish:
  - que el océano
  - que el mar del oeste
  lexicon: HALOT
  rationale: «Mar» es la correspondencia directa de יָם y conserva la imagen poética sin introducir una equivalencia más interpretativa como «océano».
translation_notes:
  revision_awareness: El texto inglés auditado traduce el verso de forma consistente y sin cambios en la última revisión; la presente versión sigue el mismo sentido comparativo, manteniendo el paralelismo hebreo y la ambigüedad controlada entre «medida» y «extensión».
  spanish_consistency_notes:
  - Se mantiene el paralelismo adjetival con «más larga / más ancha».
  - «Tierra» y «mar» reproducen el contraste cósmico del hebreo sin paráfrasis.
  - La nota ofrece la alternativa léxica documentada en el audit trail («extent»).
