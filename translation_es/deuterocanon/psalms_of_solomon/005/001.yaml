review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: alabanza futura, tono gozoso y contexto comunitario entre quienes conocen/entienden los juicios de Dios. También preserva correctamente «tus juicios justos» para κρίματά σου τὰ δίκαια. Sin embargo, la decisión de traducir Κύριε como «Yahvé» no está suficientemente sustentada por la evidencia inmediata: el texto griego dice κύριε, no el tetragrámaton, y no se trata de una cita explícita que exija introducir «Yahvé».'
  spanish_quality_summary: El español es claro y digno. No obstante, «Oh» suena menos natural que «Oh,» o mejor aún omitirlo; además, la nota actual introduce una racionalización editorial no bien anclada al texto fuente. La frase principal es plenamente legible y bíblica en español.
  glossary_alignment: «Dios», «juicios», «justos» y «con júbilo» están bien alineados. El punto principal de desalineación es el uso de «Yahvé» para κύριε en ausencia de evidencia de יהוה en la fuente inmediata. Dado que la instrucción del proyecto pide explicar decisiones cuando el griego usa κύριος, aquí corresponde mantener «Señor» y no forzar «Yahvé».
  issues:
  - severity: high
    issue: Κύριε fue vertido como «Yahvé».
    rationale: La fuente inmediata griega tiene vocativo κύριε, no יהוה ni una cita reconocible que obligue a restaurar el nombre divino. Introducir «Yahvé» aquí excede la evidencia fuente y altera la forma de apelación preservada por el texto griego.
  - severity: medium
    issue: La nota al pie actual justifica «Yahvé» por convención editorial en vez de por la evidencia textual específica.
    rationale: Las notas deben aclarar alternativas o ambigüedades reales del pasaje. Aquí la nota desplaza la atención desde el sentido de ἐπισταμένων, que sí tiene alternativa documentada en el English POB, hacia una decisión menos defendible.
  - severity: low
    issue: Falta la nota léxica equivalente a la del English POB sobre ἐπισταμένων.
    rationale: El rastro inglés preserva la alternativa «those who understand». En español conviene mantener una nota como «O “los que entienden tus juicios justos”» para conservar esa opción semántica.
  revised_spanish_text: Oh Señor Dios, alabaré tu nombre con júbilo, en medio de los que conocen[a] tus juicios justos.
  revised_footnotes:
  - marker: a
    text: O «los que entienden tus juicios justos».
    reason: lexical_alternative
  revision_rationale: Se corrige «Yahvé» a «Señor» porque la evidencia fuente inmediata dice κύριε y no exige restaurar el nombre divino. Se elimina la nota editorial sobre el nombre divino y se restituye la alternativa léxica pertinente para ἐπισταμένων, conforme al audit trail inglés. El resto del versículo se conserva porque refleja fielmente el griego y suena natural en español.
