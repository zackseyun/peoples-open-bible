id: 4MA.14.27
reference: 4 Maccabees 14:27
source:
  edition: lxx-swete-1909
  text: καὶ διὰ πολλὰς τὰς καθʼ ἕκαστον αὐτῶν ὠδῖνας ἠναγκασμένην τὴν εἰς αὐτοὺς ἔχειν συμπάθειαν, διὰ τὸν πρὸς τὸν θεὸν φόβον ὑπερείδειν τὴν τῶν τέκνων πρόσκαιρον σωτηρίαν.
  language: Greek
