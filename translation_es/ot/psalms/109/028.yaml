review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el contraste del hebreo: los adversarios maldicen, Dios bendice, ellos se levantan y quedan avergonzados, mientras el siervo de Dios se alegra. Sin embargo, la distribución de notas está desalineada con el texto y con la auditoría inglesa: la nota sobre la alternativa de יְקַֽלְלוּ debe anclarse en «maldigan», no en «Ellos», y la nota sobre «se levantan» no debe anclarse en «maldigan». Además, se añadió una nota extra para «son puestos en vergüenza» que no corresponde a una necesidad real del español ni a la traza inglesa.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «son puestos en vergüenza» suena forzado; «son avergonzados» o «quedan avergonzados» sería más natural. Para mantener la fuerza resultativa destacada por la POB inglesa, «son avergonzados» ofrece mejor equilibrio entre fidelidad y legibilidad. También conviene corregir el anclaje de notas para que el lector no reciba información equivocada.
  glossary_alignment: No hay conflictos con la terminología de proyecto. «siervo» para עבד está bien justificado en este contexto oracional. No aparecen términos como Yahvé, Mesías, etc. La elección de «siervo» frente a «esclavo» concuerda con la excepción contextual documentada.
  issues:
  - severity: high
    issue: Los marcadores de notas están anclados a palabras equivocadas.
    rationale: La nota a explica una lectura alternativa de יְקַֽלְלוּ, pero está puesta en «Ellos» en vez de en «maldigan». La nota b trata de קָמוּ («se levantan»), pero está puesta también en «maldigan». Esto distorsiona la relación entre texto y evidencia fuente.
  - severity: medium
    issue: Se añadió una tercera nota no necesaria para «son puestos en vergüenza».
    rationale: 'La auditoría inglesa ya justificó la decisión principal para וַיֵּבֹשׁוּ; una nota española adicional con «O: quedan avergonzados» no preserva una alternativa fuente significativa distinta y complica innecesariamente el aparato.'
  - severity: medium
    issue: «Son puestos en vergüenza» es poco natural en español.
    rationale: Aunque intenta reflejar el valor causativo/resultativo de la vergüenza pública, la expresión suena calcada. «Son avergonzados» conserva mejor ese matiz sin sacrificar legibilidad.
  revised_spanish_text: Ellos maldigan[a], pero tú bendecirás. Se levantan[b] y son avergonzados, pero tu siervo se alegrará.
  revised_footnotes:
