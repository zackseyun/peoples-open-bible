translation:
  language: es
  text: 'Mientras ellos se estaban alegrando el corazón, he aquí que los hombres de la ciudad, hombres despreciables[a], rodearon la casa, golpeando la puerta. Y dijeron al anciano, dueño de la casa: «Saca al hombre que entró en tu casa, para que lo conozcamos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «hijos de Belial»; es decir, hombres sin ley o perversos.
    reason: lexical_alternative
  - marker: b
    text: «Conocerlo» es aquí un eufemismo sexual; indica que pretendían abusar sexualmente de él.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵיטִיבִים אֶת לִבָּם
  english_pob_choice: making their hearts merry
  chosen_spanish: se estaban alegrando el corazón
  alternatives_spanish:
  - se estaban divirtiendo
  - estaban festejando
  - se estaban poniendo alegres
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice 'hacer bien su corazón' y en contexto describe regocijo festivo. 'Alegrando el corazón' conserva la imagen idiomática sin sonar rígido en español.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí que
  alternatives_spanish:
  - y he aquí
  - mira
  - de pronto
  lexicon: HALOT
  rationale: El marcador introduce un giro abrupto y solemne. 'He aquí que' preserva la fuerza narrativa y la interrupción repentina que el POB quiso mantener.
- source_word: אַנְשֵׁי הָעִיר
  english_pob_choice: the men of the city
  chosen_spanish: los hombres de la ciudad
  alternatives_spanish:
  - los varones de la ciudad
  - los hombres del poblado
  - los habitantes varones de la ciudad
  lexicon: HALOT
  rationale: Es una construcción directa y transparente. 'Hombres de la ciudad' reproduce el paralelismo nominal hebreo con naturalidad en español.
- source_word: אַנְשֵׁי בְנֵי בְלִיַּעַל
  english_pob_choice: worthless men
  chosen_spanish: hombres hijos de Belial
  alternatives_spanish:
  - hombres perversos
  - hombres de Belial
  - hombres malvados
  lexicon: HALOT
  rationale: En este pasaje la expresión está ligada al nombre/título 'Belial'. En español, 'hijos de Belial' conserva la carga bíblica e intertextual; añadir 'hombres' antes ayuda a la fluidez. Se evita reducirlo a un adjetivo moral genérico para no perder la alusión tradicional y la tensión lexical.
- source_word: נָסַבּוּ אֶת הַבַּיִת
  english_pob_choice: surrounded the house
  chosen_spanish: rodearon la casa
  alternatives_spanish:
  - encircilaron la casa
  - cerraron el cerco alrededor de la casa
  - dieron la vuelta a la casa
  lexicon: HALOT
  rationale: El verbo indica rodear/circundar. 'Rodearon la casa' es la equivalencia española más natural y precisa.
- source_word: מִתְדַּפְּקִים עַל הַדָּלֶת
  english_pob_choice: pounding on the door
  chosen_spanish: golpeando la puerta
  alternatives_spanish:
  - llamando con violencia a la puerta
  - aporreando la puerta
  - golpeando con fuerza la puerta
  lexicon: HALOT
  rationale: El participio hitpael expresa un golpeteo repetido y enérgico. 'Golpeando la puerta' conserva la violencia sin sobreespecificar el gesto.
- source_word: בַּעַל הַבַּיִת
  english_pob_choice: the master of the house
  chosen_spanish: el dueño de la casa
  alternatives_spanish:
  - el señor de la casa
  - el anfitrión
  - el amo de la casa
  lexicon: HALOT
  rationale: Aunque 'dueño' no agota toda la fuerza social de בַּעַל, en español suena más natural que 'maestro' o 'señor' y comunica la función de cabeza del hogar. El POB inglés usó 'master of the house'; aquí se opta por una equivalencia idiomática inteligible.
- source_word: הַזָּקֵן
  english_pob_choice: the old man
  chosen_spanish: el anciano
  alternatives_spanish:
  - el viejo
  - el hombre mayor
  - el anciano hombre
  lexicon: HALOT
  rationale: En este contexto la edad identifica al anfitrión. 'Anciano' mantiene la referencia a la edad con dignidad y lectura natural en español.
- source_word: הוֹצֵא
  english_pob_choice: Bring out
  chosen_spanish: Saca
  alternatives_spanish:
  - Haz salir
  - Tráelo afuera
  - Sácalo
  lexicon: HALOT
  rationale: El imperativo exige que el hombre sea llevado fuera. 'Saca' es breve, imperativo y fiel al sentido.
- source_word: וְנֵדָעֶנּוּ
  english_pob_choice: so that we may know him
  chosen_spanish: para que lo conozcamos
  alternatives_spanish:
  - para que tengamos relaciones con él
  - para que lo viollemos
  - para que lo sepamos
  lexicon: HALOT
  rationale: El hebreo usa ידע como eufemismo sexual. El texto principal conserva la fórmula literal 'conocer' para respetar la forma y la alusión bíblica, mientras que la nota explicita el sentido sexual para evitar ambigüedad indebida.
theological_decisions:
- issue: Eufemismo sexual en וְנֵדָעֶנּוּ
  english_pob_reading: Preserve the Hebrew euphemism in the main text as 'so that we may know him' and clarify the sexual meaning in a footnote.
  chosen_spanish_reading: Mantener 'para que lo conozcamos' en el cuerpo del texto y explicarlo en nota como eufemismo sexual.
  alternative_spanish_readings:
  - para que tengamos relaciones con él
  - para que lo viollemos
  rationale: La formulación hebrea conserva deliberadamente el eufemismo de 'conocer'. En español, mantenerlo en el texto principal respeta la forma literaria y la conexión con Génesis 19; la nota preserva la claridad ética y semántica sin borrar la tensión textual.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el consenso de la auditoría inglesa se mantuvo sin cambios y fue trasladado al español con ajustes idiomáticos y de transparencia lexical.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se preservó la alusión intertextual a «hijos de Belial» en lugar de sustituirla por un adjetivo genérico, por fidelidad al registro bíblico.
  - Se usó «conocer» en sentido eufemístico en el texto principal y se aclaró en nota para no perder la tensión semántica documentada.
  - «Anciano» y «dueño de la casa» se eligieron por naturalidad en español, sin borrar la referencia al anfitrión ni la marca de edad.
