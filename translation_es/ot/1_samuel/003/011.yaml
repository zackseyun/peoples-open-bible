translation:
  language: es
  text: 'Entonces Yahvé dijo a Samuel: «Mira, yo estoy por hacer una cosa en Israel que hará que a todo el que la oiga[a] le zumben ambos oídos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que oiga de ello»; el hebreo puede expresar oír del acontecimiento, es decir, enterarse de él.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «le tintinarán ambos oídos» o «le resonarán ambos oídos»; el hebreo usa un modismo para describir la conmoción producida por una noticia impactante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa directamente el Tetragrámaton. En el proyecto español se conserva el nombre divino como 'Yahvé', en continuidad con la política del POB de no ocultarlo tras un título. 'Jehová' queda descartado por ser una forma tradicional menos ajustada al consenso académico moderno.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Y dijo entonces
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo. 'Entonces' comunica con naturalidad ese progreso en español sin perder la secuencia del relato.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - He aquí
  - Ve
  lexicon: HALOT
  rationale: El interjección introduce una proclamación solemne y llama la atención. 'Mira' mantiene la fuerza deíctica en un español moderno y digno; 'He aquí' suena más arcaico.
- source_word: עֹשֶׂה
  english_pob_choice: am about to do
  chosen_spanish: estoy por hacer
  alternatives_spanish:
  - voy a hacer
  - estoy haciendo
  lexicon: HALOT
  rationale: El participio con הִנֵּה expresa inminencia. 'Estoy por hacer' refleja mejor esa proximidad que un futuro simple, y mantiene el matiz de acción a punto de ocurrir.
- source_word: דָבָר
  english_pob_choice: a thing
  chosen_spanish: una cosa
  alternatives_spanish:
  - un hecho
  - un asunto
  lexicon: HALOT
  rationale: Aquí דָבָר es deliberadamente general y alude a un evento/acto extraordinario. 'Una cosa' preserva esa amplitud sin especificar más de lo que el hebreo dice.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - contra Israel
  lexicon: HALOT
  rationale: La preposición ב indica la esfera o ubicación del acontecimiento. 'En Israel' es la correspondencia directa y clara.
- source_word: אֲשֶׁר כָּל שֹׁמְעוֹ
  english_pob_choice: that ... everyone who hears of it
  chosen_spanish: de la cual a todo el que la oiga
  alternatives_spanish:
  - que todo el que la oiga
  - que cualquiera que la oiga
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'que todo el que la oiga'. La construcción española mantiene el carácter relativo y general del enunciado. Se evita ampliar innecesariamente a 'oiga de ello' porque el objeto ya queda implícito en el pronombre.
- source_word: תְּצִלֶּינָה
  english_pob_choice: will tingle
  chosen_spanish: le zumbarán
  alternatives_spanish:
  - le resonarán
  - le temblarán
  lexicon: HALOT
  rationale: El verbo hebreo describe el efecto idiomático de un rumor impactante sobre los oídos. En español, 'zumbarán' reproduce bien la imagen auditiva y la impresión de zumbido, sin traducir mecánicamente por 'temblar' o 'sonar'.
- source_word: שְׁתֵּי אָזְנָיו
  english_pob_choice: both ears
  chosen_spanish: ambos oídos
  alternatives_spanish:
  - las dos orejas
  - sus dos oídos
  lexicon: HALOT
  rationale: El hebreo dice 'sus dos oídos' con fuerza distributiva. 'Ambos oídos' conserva esa duplicación de forma idiomática y evita la familiaridad de 'orejas' en un registro bíblico.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la decisión doctrinal del POB de transliterar el nombre del pacto en vez de sustituirlo por un título. En español, 'Yahvé' es la forma que mejor preserva esa decisión y la lectura directa del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Imagen idiomática de oídos que 'zumban'
  english_pob_reading: will tingle
  chosen_spanish_reading: le zumbarán ambos oídos
  alternative_spanish_readings:
  - le resonarán ambos oídos
  - le tintinarán ambos oídos
  rationale: El hebreo no describe una sensación física ordinaria, sino el impacto de una noticia sobre el oyente. 'Zumbarán' conserva la dimensión auditiva e idiomática y deja ver que se trata de un efecto de conmoción, no de un zumbido literal.
  doctrine_reference: HALOT, צלל (idioma de impacto auditivo)
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés al usar una fórmula más formal para הִנֵּה y al conservar la estructura relativa cercana al hebreo. En español se ajusta la sintaxis para que suene natural, pero sin perder la inminencia ('estoy por hacer') ni el carácter idiomático del efecto en los oídos.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se evita 'SEÑOR' porque ocultaría el nombre divino y no refleja el texto fuente.
  - Se conserva el valor idiomático de 'oídos' en vez de reemplazarlo por una explicación interpretativa extensa dentro del cuerpo del versículo.
  - El registro es bíblico y sobrio, sin arcaísmos innecesarios.
