translation:
  language: es
  text: Y no tomarán de ti piedra para una esquina[a] ni piedra para cimientos, porque tú serás desolaciones perpetuas[b], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «piedra angular»; el hebreo dice literalmente «una piedra para una esquina».
    reason: lexical_alternative
  - marker: b
    text: O «desolaciones eternas».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִקְחוּ
  english_pob_choice: they will take
  chosen_spanish: tomarán
  alternatives_spanish:
  - tomarán
  - han de tomar
  lexicon: HALOT
  rationale: 'El imperfecto hebreo con negación expresa una acción futura en el oráculo. En español, el futuro simple comunica bien la predicción: "no tomarán".'
- source_word: מִמְּךָ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de ti
  - de vosotros
  lexicon: HALOT
  rationale: El sufijo de segunda persona singular mantiene el trato directo a Babilonia personificada; por eso se conserva "ti" y no una forma plural.
- source_word: אֶבֶן לְפִנָּה
  english_pob_choice: a stone for a corner
  chosen_spanish: piedra para esquina
  alternatives_spanish:
  - piedra angular
  - piedra de esquina
  - piedra para un rincón
  lexicon: HALOT
  rationale: La imagen es literalmente "una piedra para una esquina". "Piedra para esquina" conserva la cercanía al hebreo y evita fijar demasiado pronto el sentido técnico de "piedra angular", que el POB deja abierto con nota.
- source_word: וְאֶבֶן לְמוֹסָדֹת
  english_pob_choice: or a stone for foundations
  chosen_spanish: ni piedra para cimientos
  alternatives_spanish:
  - o piedra para fundamentos
  - o piedra para la cimentación
  - ni piedra de cimiento
  lexicon: HALOT
  rationale: Aunque el inglés POB usa "or", en español la repetición negativa natural es "ni" dentro de la misma cláusula. "Cimientos" transmite bien el plural de מוֹסָדֹת y su valor de base estructural.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: HALOT
  rationale: 'Introduce la razón de la imposibilidad de reutilizar piedras: Babilonia quedará arruinada. "Porque" es la conexión causal más natural en español.'
- source_word: שִׁמְמֹת עוֹלָם
  english_pob_choice: everlasting desolations
  chosen_spanish: desolaciones perpetuas
  alternatives_spanish:
  - desolaciones eternas
  - una desolación perpetua
  - ruinas perpetuas
  lexicon: HALOT
  rationale: Se conserva el plural intensivo y la permanencia. "Perpetuas" mantiene la fuerza de עוֹלָם sin forzar una formulación menos natural que "eternas" en este contexto de juicio.
- source_word: תִּהְיֶה
  english_pob_choice: you will be
  chosen_spanish: serás
  alternatives_spanish:
  - serás
  - estarás
  - llegarás a ser
  lexicon: HALOT
  rationale: El hebreo afirma el estado resultante de Babilonia. El POB revisado optó por "will be"; en español, "serás" reproduce con sobriedad ese estado permanente sin añadir un matiz de proceso.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  - declara Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el criterio del POB para el Nombre divino: YHWH se vierte como "Yahvé". "Declara" conserva la fórmula profética solemne.'
theological_decisions:
- issue: Tratamiento del Nombre divino יְהוָה
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - declara el SEÑOR
  - oráculo de Yahvé
  rationale: El texto hebreo usa explícitamente el Tetragrámaton; el POB documenta Yahweh/Yahvé como forma para traducirlo. Se evita el enmascaramiento litúrgico "SEÑOR" para mantener la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Imagen de construcción con piedra de esquina y de cimientos
  english_pob_reading: a stone for a corner / a stone for foundations
  chosen_spanish_reading: piedra para esquina / piedra para cimientos
  alternative_spanish_readings:
  - piedra angular / piedra de cimiento
  - piedra de esquina / piedra para fundamentos
  rationale: El inglés POB conserva la literalidad y añade nota sobre la posibilidad de "cornerstone". En español se mantiene la imagen abierta, sin resolverla de manera demasiado técnica en el cuerpo del texto.
  doctrine_reference: HALOT lexical note preserved through POB audit trail
translation_notes:
  revision_awareness: La versión inglesa revisada cambió "will become everlasting desolations" por "will be everlasting desolations" para reflejar más directamente el verbo hebreo. La redacción española sigue ese ajuste con "serás desolaciones perpetuas", evitando un giro de proceso como "llegarás a ser".
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה, conforme al criterio del proyecto.
  - Se conserva el plural semántico de מוֹסָדֹת con «cimientos».
  - La cláusula negativa usa «ni» para naturalidad española, sin alterar la relación coordinada de las dos piedras.
  - 'La fórmula profética se ha mantenido breve y solemne: «declara Yahvé».'
