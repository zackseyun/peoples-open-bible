id: 1CO.15.44
reference: 1 Corinthians 15:44
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: σπείρεται σῶμα ψυχικόν, ἐγείρεται σῶμα πνευματικόν. ⸀Εἰ ἔστιν σῶμα ψυχικόν, ⸂ἔστιν καὶ⸃ πνευματικόν.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/015/044.yaml
  text: It is sown a natural body; it is raised a spiritual body. If there is a natural body[a], there is also a spiritual body.
  footnotes:
  - marker: a
    text: Or 'soulish body' ... 'spiritual body.' Paul’s contrast is not between a material body and an immaterial one, but between a body animated by ordinary human life and one animated by the Spirit.
    reason: lexical_alternative
translation:
  language: ko
  text: 혼적인 몸으로 뿌려지고, 영적인 몸으로 일어납니다. 혼적인 몸이 있다면, 영적인 몸도 있는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 σῶμα ψυχικόν / σῶμα πνευματικόν의 대조는 「물질 vs. 비물질」이 아니라 「혼(ψυχή)이 생명력으로 작동하는 몸 vs. 영(πνεῦμα)이 생명력으로 작동하는 몸」이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: σῶμα ψυχικόν
  english_pob_choice: natural body
  chosen_korean: 혼적인 몸
  alternatives_korean:
  - 자연적 몸
  - 육의 몸
  lexicon: BDAG
  rationale: ψυχικόν은 「ψυχή(혼)이 생명력으로 작동하는」을 가리킨다. 「자연적」으로 번역하면 본 절의 대조축(ψυχή vs. πνεῦμα)이 흐려지므로 「혼적인 몸」으로 직역한다.
- source_word: σῶμα πνευματικόν
  english_pob_choice: spiritual body
  chosen_korean: 영적인 몸
  alternatives_korean:
  - 성령의 몸
  lexicon: BDAG
  rationale: πνευματικόν은 「πνεῦμα(영)이 생명력으로 작동하는」을 가리킨다. 비물질적인 몸이 아니라, 성령의 능력으로 살리어진 몸이다.
theological_decisions:
- issue: '부활체의 본질: 영적인 몸 = 성령으로 살리어진 실체적 몸'
  chosen_reading: 혼적인 몸 / 영적인 몸
  alternative_readings:
  - 자연적 몸 / 영적 몸
  - 육의 몸 / 신령한 몸
  rationale: 바울이 본 절에서 ψυχικόν과 πνευματικόν을 대립시키는 것은 물질성/비물질성이 아니라, 어떤 생명 원리에 의해 몸이 살아 움직이는가의 대립이다. 부활체는 결코 「영혼」이 아니라, 성령에 의해 살리어진 새로운 몸이다. 글로사리에 따라 「혼적인 몸 / 영적인 몸」으로 직역하여 본문의 인류학·종말론적 무게를 보존한다.
  doctrine_reference: 'DOCTRINE.md: bodily resurrection; preserve anthropological vocabulary'
