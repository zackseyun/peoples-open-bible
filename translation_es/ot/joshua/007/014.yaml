translation:
  language: es
  text: Por la mañana se acercarán por sus tribus; y sucederá que la tribu que Yahvé escoja[a] se acercará por clanes, y el clan que Yahvé escoja[a] se acercará por hogares, y el hogar que Yahvé escoja[a] se acercará hombre por hombre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tome». El verbo hebreo también puede significar «capturar» o «apresar», pero aquí se refiere al grupo que Yahvé señala, probablemente por medio del sorteo sagrado.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hombre por hombre», especificando la identificación final al nivel de los varones individuales dentro del hogar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִקְרַבְתֶּם
  english_pob_choice: you shall come near
  chosen_spanish: se acercarán
  alternatives_spanish:
  - se presentarán
  - se acercarán ante
  lexicon: HALOT
  rationale: קרב en esta secuencia procedimental mantiene la idea de acercarse para ser identificado; 'se acercarán' conserva el paralelismo repetido del versículo y evita añadir una noción judicial que el hebreo no explicita.
- source_word: לְשִׁבְטֵיכֶם
  english_pob_choice: by your tribes
  chosen_spanish: por sus tribus
  alternatives_spanish:
  - según sus tribus
  - tribu por tribu
  lexicon: HALOT
  rationale: La preposición distributiva del hebreo se vierte naturalmente con 'por' en español; 'sus tribus' mantiene el referente colectivo y el movimiento de agrupación escalonada.
- source_word: יִלְכְּדֶנּוּ / יִלְכְּדֶנָּה
  english_pob_choice: selects
  chosen_spanish: tome
  alternatives_spanish:
  - escoja
  - elija
  - capture
  lexicon: HALOT
  rationale: Although לכד can mean 'capturar/seize,' en este contexto por sorteo o señal divina el sentido funcional es de selección. 'Tome' deja abierta la fuerza de la elección sin forzar un término técnico moderno ni perder la posible tensión con el verbo hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración española estable 'Yahvé', según la política del proyecto, en lugar de sustituirlo por un título.
- source_word: לַמִּשְׁפָּחוֹת
  english_pob_choice: by clans
  chosen_spanish: por clanes
  alternatives_spanish:
  - por familias
  - por linajes
  lexicon: HALOT
  rationale: מִשְׁפָּחָה en organización tribal designa una unidad mayor que la familia nuclear; 'clanes' expresa bien esa unidad social sin reducirla a la familia doméstica.
- source_word: לַבָּתִּים
  english_pob_choice: by households
  chosen_spanish: por casas
  alternatives_spanish:
  - por hogares
  - por hogares domésticos
  lexicon: HALOT
  rationale: בַּיִת puede referirse a casa/linaje doméstico; aquí la gradación paralela permite 'casas' en español, manteniendo la progresión tribu–clan–casa sin sobreexplicar.
- source_word: לַגְּבָרִים
  english_pob_choice: man by man
  chosen_spanish: hombre por hombre
  alternatives_spanish:
  - varón por varón
  - por cada hombre
  lexicon: HALOT
  rationale: La expresión distributiva final conserva el matiz masculino explícito del hebreo y la identificación individual dentro de la casa. 'Hombre por hombre' sigue de cerca la fórmula idiomática del original.
theological_decisions:
- issue: Uso del nombre divino en lugar de una sustitución titulada
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo contiene explícitamente el Tetragrama. La lectura española mantiene el nombre propio del pacto en vez de ocultarlo bajo un sustituto litúrgico, en coherencia con la política textual del POB.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de יִלְכְּדֶנּוּ / יִלְכְּדֶנָּה en contexto de identificación por sorteo
  english_pob_reading: selects
  chosen_spanish_reading: tome
  alternative_spanish_readings:
  - escoja
  - elija
  - capture/seize
  rationale: La raíz לכד normalmente puede significar 'capturar' o 'apresar', pero aquí la selección divina por niveles de agrupación demanda una traducción que no introduzca una imagen violenta injustificada. 'Tome' conserva la ambigüedad léxica documentada y permite la mediación del sorteo/sello divino implícito en el contexto.
  doctrine_reference: HALOT lexical range for לכד; contextual procedure in Joshua 7
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el paralelismo hebreo y el audit trail inglés: mantiene la progresión tribu → clan → casa → hombre, preserva el nombre divino como Yahvé y conserva la ambigüedad de לכד sin convertirla en una imagen de captura física. No se detectaron cambios posteriores en la revisión más reciente, por lo que esta redacción refleja el estado estable del texto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, no «SEÑOR».
  - Se mantiene la gradación social del hebreo con «tribus», «clanes», «casas» y «hombre por hombre».
  - Se evita «familias» en los dos niveles intermedios para no borrar la distinción entre clan y household.
  - La puntuación reproduce una sola cadena procedimental con comas y punto y coma para facilitar la lectura sin romper el paralelismo.
