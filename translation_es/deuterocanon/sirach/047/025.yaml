translation:
  language: es
  text: Yahvé dio a Efraín una piedra de tropiezo[a], para expulsarlos de su tierra; y su pecado se engrandeció mucho, y se vendió a toda maldad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'LXX: «y sus pecados se multiplicaron grandemente ... y buscaron toda maldad, hasta que la venganza viniera sobre ellos». El testimonio hebreo aquí es más singular y más breve.'
    reason: alternative_reading
lexical_decisions:
- source_word: ויתן / He gave
  english_pob_choice: He gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - dio en
  lexicon: HALOT
  rationale: El hebreo פשוט ויתן es un verbo básico de dar; en español, «dio» mantiene la correspondencia más directa. No se añadió una paráfrasis como «entregó» salvo donde el contexto exigiera una interpretación más fuerte.
- source_word: לאפרים / Ephraim
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraím
  - Israel
  lexicon: HALOT
  rationale: Se conserva el nombre propio tribal/nacional «Efraín», como en el hebreo, sin sustituirlo por «Israel».
- source_word: מכשול / a stumbling block
  english_pob_choice: a stumbling block
  chosen_spanish: un tropiezo
  alternatives_spanish:
  - una piedra de tropiezo
  - un obstáculo
  - una causa de caída
  lexicon: HALOT
  rationale: «Tropiezo» conserva la imagen metafórica de caída/fracaso y suena natural en español; evita la formulación más literal pero menos idiomática «piedra de tropiezo».
- source_word: להדיחם / to drive them
  english_pob_choice: to drive them
  chosen_spanish: para echarlo
  alternatives_spanish:
  - para echarlos
  - para expulsarlos
  - para arrojarlos
  lexicon: HALOT
  rationale: El hebreo apunta a expulsar o hacer salir. Dado que el sujeto singular del hebreo sigue al rey o agente mencionado en contexto, se mantuvo el singular «lo» en línea con la lectura hebrea principal; la forma plural queda implícita en el referente colectivo de Efraín, pero no se impone como en la versión griega plural.
- source_word: מאדמתם / from their land
  english_pob_choice: from their land
  chosen_spanish: de su tierra
  alternatives_spanish:
  - de su país
  - de su suelo
  - de su territorio
  lexicon: HALOT
  rationale: «Tierra» reproduce el valor covenantal/nacional de אדמה mejor que «suelo» o «territorio», y mantiene la naturalidad en español.
- source_word: ותגדל חטאתו מאד / his sin grew very great
  english_pob_choice: his sin grew very great
  chosen_spanish: su pecado se engrandeció mucho
  alternatives_spanish:
  - su pecado creció muchísimo
  - su pecado se hizo muy grande
  - sus pecados se multiplicaron enormemente
  lexicon: HALOT
  rationale: Se conserva el sujeto singular del hebreo («su pecado»). «Se engrandeció» refleja היטב la idea de crecer en magnitud sin sonar tan literal como «creció»; «mucho» intensifica con sobriedad.
- source_word: ולכל רעה התמכר / he sold himself to every evil
  english_pob_choice: he sold himself to every evil
  chosen_spanish: y se vendió a toda maldad
  alternatives_spanish:
  - y se entregó a toda maldad
  - y se vendió a todo mal
  - y se dio a toda maldad
  lexicon: HALOT
  rationale: El hitpael de מכר preserva la imagen de auto-venta. «Se vendió» mantiene la fuerza metafórica y la responsabilidad moral; «maldad» funciona como equivalente amplio de רעה en español bíblico contemporáneo.
theological_decisions:
- issue: Hebreo singular frente a la alternativa griega plural en la segunda mitad del versículo
  english_pob_reading: The English POB follows the Hebrew singular in the main text and preserves the Greek plural reading in a footnote.
  chosen_spanish_reading: 'Seguir el hebreo singular: «su pecado se engrandeció mucho, y se vendió a toda maldad».'
  alternative_spanish_readings:
  - sus pecados se multiplicaron enormemente, y buscaron toda maldad
  rationale: La edición fuente marca un desajuste importante entre hebreo y griego. En un texto con primacía de la fuente original hebrea cuando está disponible, se mantiene la lectura singular del hebreo en el cuerpo principal, y se deja constancia de la alternativa griega para auditoría textual.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy; preserve source uncertainty honestly'
- issue: Referencia del sujeto en la cláusula de expulsión
  english_pob_reading: to drive them from their land
  chosen_spanish_reading: para echarlo de su tierra
  alternative_spanish_readings:
  - para echarlos de su tierra
  - para expulsarlos de su tierra
  rationale: 'La construcción hebrea puede leerse con referencia colectiva, pero el contexto inmediato de la tradición hebrea refleja un agente singular. El español mantiene esa tensión sin borrarla: el referente es Efraín como colectivo, aunque la morfología favorece una concordancia singular en la cláusula traducida.'
  doctrine_reference: 'DOCTRINE.md: do not erase documented lexical/theological tension'
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del POB en el miembro inicial: «dio a Efraín un tropiezo», en lugar de una formulación más interpretativa como «dio a Efraín en tropiezo» o «lo entregó a un tropiezo». También conserva la decisión revisada de acercarse más al hebreo en la primera cola, sin introducir la expansión griega como texto principal.'
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme a la convención POB para el tetragrámaton, dado que el verso hebreo no lo contiene explícitamente pero el contexto canónico español del proyecto lo requiere cuando el sujeto divino está implícito.
  - «Efraín» se mantuvo como nombre propio tribal, no como una glosa interpretativa.
  - «Tropiezo» conserva el valor metafórico sin cambiarlo por un lenguaje doctrinal ajeno al hebreo.
  - Se mantuvo el singular hebreo en la segunda mitad, mientras la nota registra la lectura griega alternativa plural.
  - «Maldad» se eligió como equivalente amplio y natural de רעה en este contexto moral.
