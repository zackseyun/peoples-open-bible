id: 2TI.2.9
reference: 2 Timothy 2:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐν ᾧ κακοπαθῶ μέχρι δεσμῶν ὡς κακοῦργος. ἀλλὰ ὁ λόγος τοῦ θεοῦ οὐ δέδεται·
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/002/009.yaml
  text: for which I am suffering hardship, even to the point of chains, as a criminal. But the word of God is not bound.
translation:
  language: ko
  text: 이 복음을 위하여 나는 죄인처럼 쇠사슬에 매이기까지 고난을 받고 있습니다. 그러나 하나님의 말씀은 매여 있지 않습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κακοπαθῶ
  english_pob_choice: I am suffering hardship
  chosen_korean: 고난을 받고 있습니다
  alternatives_korean:
  - 고난을 겪고 있습니다
  - 고생하고 있습니다
  lexicon: BDAG
  rationale: 1:12, 2:3, 4:5와 일관되게 「고난을 받다」로 옮긴다.
- source_word: μέχρι δεσμῶν
  english_pob_choice: even to the point of chains
  chosen_korean: 쇠사슬에 매이기까지
  alternatives_korean:
  - 결박되기까지
  - 옥에 갇히기까지
  lexicon: BDAG
  rationale: δεσμός는 「쇠사슬·결박」을 가리킨다. 1:16의 「쇠사슬」(ἅλυσις)과 통일하여 「쇠사슬에 매이기까지」로 옮긴다.
- source_word: κακοῦργος
  english_pob_choice: a criminal
  chosen_korean: 죄인
  alternatives_korean:
  - 범죄자
  - 악행자
  lexicon: BDAG
  rationale: κακοῦργος는 「악행을 행하는 자」를 뜻한다. 한국 성서 전통의 「죄인」이 자연스러우며, 본문 맥락에서 형사적 죄수의 의미를 함의한다.
- source_word: ὁ λόγος τοῦ θεοῦ οὐ δέδεται
  english_pob_choice: the word of God is not bound
  chosen_korean: 하나님의 말씀은 매여 있지 않습니다
  alternatives_korean:
  - 하나님의 말씀은 결박되지 않습니다
  - 하나님의 말씀은 갇히지 않습니다
  lexicon: BDAG
  rationale: δέω(매다)의 완료 수동을 「매여 있다」로 옮겨, 바울의 매임과 말씀의 자유 사이의 강한 대조를 살린다.
