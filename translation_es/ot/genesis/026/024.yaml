translation:
  language: es
  text: 'Yahvé se le apareció aquella noche y dijo: «Yo soy el Dios de Abraham, tu padre. No temas[a], porque yo estoy contigo, y te bendeciré y multiplicaré tu descendencia[b] por amor de Abraham, mi siervo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No tengas miedo».
    reason: lexical_alternative
  - marker: b
    text: O «multiplicaré tu simiente»; «descendencia» expresa el sentido colectivo de la expresión hebrea.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton, en línea con la decisión auditada de la POB en inglés. En español, «Yahvé» comunica el nombre revelado sin sustituirlo por un título.
- source_word: וַיֵּרָא אֵלָיו
  english_pob_choice: appeared to him
  chosen_spanish: se le apareció
  alternatives_spanish:
  - se mostró a él
  - se manifestó a él
  lexicon: HALOT
  rationale: 'El verbo pasivo/medio de aparición se expresa de forma natural en español como una teofanía: «se le apareció». Mantiene la inmediatez del encuentro sin añadir interpretación.'
- source_word: בַּלַּיְלָה הַהוּא
  english_pob_choice: that night
  chosen_spanish: aquella noche
  alternatives_spanish:
  - esa noche
  - durante aquella noche
  lexicon: HALOT
  rationale: «Aquella noche» reproduce el valor demostrativo del hebreo y suena fluido en español bíblico moderno.
- source_word: אָנֹכִי אֱלֹהֵי אַבְרָהָם אָבִיךָ
  english_pob_choice: I am the God of Abraham your father
  chosen_spanish: Yo soy el Dios de Abraham, tu padre
  alternatives_spanish:
  - Yo soy el Dios de Abraham, tu padre.
  - Yo soy Dios, el Dios de Abraham, tu padre
  - Yo soy el Dios de tu padre Abraham
  lexicon: HALOT
  rationale: Se conserva la autoidentificación divina y la relación de pacto. La coma tras «Abraham» ayuda a reflejar el sintagma hebreo sin volverlo rígido en español.
- source_word: אַל תִּירָא
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No temas, no
  lexicon: HALOT
  rationale: «No temas» es la fórmula más natural y solemne en español para la exhortación divina. Mantiene el registro breve del hebreo.
- source_word: כִּי אִתְּךָ אָנֹכִי
  english_pob_choice: for I am with you
  chosen_spanish: porque yo estoy contigo
  alternatives_spanish:
  - pues yo estoy contigo
  - ya que yo estoy contigo
  lexicon: HALOT
  rationale: «Porque» preserva la relación causal/explicativa que fundamenta el mandato de no temer. «Contigo» expresa la presencia divina personal, como en la POB inglesa.
- source_word: וּבֵרַכְתִּי/ךָ
  english_pob_choice: I will bless you
  chosen_spanish: te bendeciré
  alternatives_spanish:
  - yo te bendeciré
  - ciertamente te bendeciré
  lexicon: HALOT
  rationale: El verbo promesivo se vierte de modo directo al futuro. «Te bendeciré» es claro y fiel al valor de la promesa.
- source_word: וְהִרְבֵּיתִי אֶת זַרְעֲךָ
  english_pob_choice: and multiply your offspring
  chosen_spanish: y multiplicaré tu descendencia
  alternatives_spanish:
  - y multiplicaré tu simiente
  - y haré numerosa tu descendencia
  - y multiplicaré tu semilla
  lexicon: HALOT
  rationale: «Descendencia» transmite mejor en español el sentido colectivo de זֶרַע que «semilla» o «simiente», sin perder el referente genealógico. Se mantiene la fuerza de multiplicación del Hifil.
- source_word: זַרְעֲךָ
  english_pob_choice: offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tus descendientes
  lexicon: HALOT
  rationale: 'La elección sigue la explicación auditada de la POB inglesa: un singular colectivo. «Descendencia» es idiomático y conserva la amplitud del término hebreo.'
- source_word: בַּעֲבוּר
  english_pob_choice: for the sake of
  chosen_spanish: por amor de
  alternatives_spanish:
  - por causa de
  - a causa de
  - por el bien de
  lexicon: HALOT
  rationale: La preposición introduce el fundamento del favor divino respecto de Abraham. «Por amor de» mantiene bien en español la idea de beneficio/causa relacional sin volverla mecánica.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi servidor
  - mi esclavo
  lexicon: HALOT
  rationale: Aquí «siervo» conserva la relación de servicio y elección pactal asociada a Abraham. A diferencia de otros contextos, la formulación tradicional es la más natural en español y no borra el matiz vocacional.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre del pacto. La traducción española conserva el nombre propio para no ocultar el referente con un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación de pacto en «Yo soy el Dios de Abraham, tu padre»
  english_pob_reading: I am the God of Abraham your father
  chosen_spanish_reading: Yo soy el Dios de Abraham, tu padre
  alternative_spanish_readings:
  - Yo soy el Dios de tu padre Abraham
  - Yo soy el Dios de Abraham, tu antepasado
  rationale: La formulación mantiene la autoidentificación divina y la continuidad del pacto con Abraham. No se suaviza la relación genealógica implícita en el hebreo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Promesa fundamentada en la lealtad divina a Abraham
  english_pob_reading: for the sake of Abraham my servant
  chosen_spanish_reading: por amor de Abraham, mi siervo
  alternative_spanish_readings:
  - por causa de Abraham, mi siervo
  - a causa de Abraham, mi siervo
  - por el bien de Abraham, mi siervo
  rationale: La frase expresa fundamento causal y benefactivo de la bendición. «Por amor de» comunica esa base relacional sin expandir el sentido más allá del hebreo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'No se requieren cambios respecto del control más reciente: la versión auditada en inglés muestra acuerdo alto y sin revisiones aplicadas. La redacción española sigue directamente el hebreo con apoyo del criterio lexical ya validado por la POB en inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה según el estándar del proyecto.
  - Se evita «SEÑOR» como sustituto, para conservar el nombre propio divino.
  - «Descendencia» traduce el sentido colectivo de זֶרַע, en paralelo a la decisión auditada de «offspring» en inglés.
  - Se mantiene «siervo» para עַבְדִּי, coherente con el valor pactal y vocacional del término en este contexto.
