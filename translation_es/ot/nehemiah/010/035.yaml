revisions:
- from: Echamos suertes acerca de la ofrenda de madera[a]—los sacerdotes, los levitas y el pueblo—para traerla a la casa de nuestro Dios, según las casas de nuestros padres, en tiempos señalados, año tras año, para quemarla sobre el altar de Yahvé nuestro Dios, como está escrito en la Ley.
  to: Echamos suertes acerca de la ofrenda de madera[a]—los sacerdotes, los levitas y el pueblo—para llevar madera a la casa de nuestro Dios, según las casas de nuestros padres, en tiempos señalados, año tras año, para quemarla sobre el altar de Yahvé nuestro Dios, como está escrito en la Ley.
  rationale: Se reemplaza 'traerla' por 'llevar madera' para explicitar el referente material implícito en el contexto y evitar que 'la ofrenda' parezca el objeto directo principal. Se conserva 'quemarla' porque ahora su referente inmediato es claramente 'madera'. También se normaliza la puntuación de la nota al pie. El resto del texto ya preserva bien el significado fuente, la terminología del proyecto y la legibilidad en español.
  reviewer_model: gpt-5.4
