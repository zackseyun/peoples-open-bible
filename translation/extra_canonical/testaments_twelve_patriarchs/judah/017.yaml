  text: "XVII. *Καὶ νῦν ἐντέλλομαι ὑμῖν, τέκνα μου, μὴ ἀγαπᾶτε⁵ ἀργύριον⁶ μηδὲ ἐπιβλέπει⁷ *εἰς κάλλος⁸ γυναικῶν, ὅτι κἀγὼ διὰ χρυσίον καὶ εὐμορφίαν¹⁰ ἐπλανήθην εἰς Βησουὲ¹¹ τὴν Χαναναίαν. 2. *Καὶ οἶδα ὅτι διὰ τὰ δύο ταῦτα ἔσται¹² τὸ γένος μου¹⁴ *εἰς ἀπώλειαν πορνείας¹⁵, καὶ¹⁶ καίγε σοφοὺς ἄνδρας τῶν υἱῶν μου ἀλλοιώσουσι, καὶ βασιλείαν¹⁷ Ἰούδα σμικρυνθῆναι ποιήσουσιν¹⁸, ἣν ἔδωκέ μοι Κύριος ἐν ὑπακοῇ πατρός μου¹⁹. 3. Ἐγὼ⁴ *οὐδέποτε²⁰ *παρελάλησα Ἰακὼβ τὸν πατέρα μου²¹, ὅτι²² πάντα *ὅσα μοι ἔλεγεν²³ ἐποίουν²⁴. 4. *Καὶ Ἀβραὰμ²⁵ ὁ πρόπατός μου²⁶ εὐλόγησέ²⁷ με βασιλεύειν ἐν Ἰσραήλ²⁸, *καὶ Ἰακὼβ εὐλόγησέ με οὕτως³⁰. 5. *Καὶ ἐγὼ οἶδα ὅτι ἐξ ἐμοῦ στήσεται *τὸ βασίλειον³²."
  language: Greek
  source_pages:
