translation:
  language: es
  text: Yahvé, por la mañana oyes mi voz; por la mañana presentaré mi petición delante de ti[a] y esperaré con expectativa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «yo dispongo las cosas para ti», probablemente aludiendo a ordenar o presentar su oración delante de Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y miraré expectante». El verbo hebreo puede expresar vigilar, aguardar o mirar con esperanza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El hebreo usa el Tetragrama directamente. La política del POB en inglés lo vierte como ‘Yahweh’; en español, la forma equivalente auditable y reconocible es ‘Yahvé’, preservando el nombre propio divino sin sustituirlo por un título.
- source_word: בֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - por la madrugada
  lexicon: HALOT
  rationale: El sustantivo temporal funciona adverbialmente. ‘Por la mañana’ suena natural en español y mantiene la repetición enfática de ambas apariciones.
- source_word: תִּשְׁמַע
  english_pob_choice: you hear
  chosen_spanish: oirás
  alternatives_spanish:
  - oyes
  - escucharás
  lexicon: HALOT
  rationale: El imperfecto puede tener valor habitual o prospectivo en la poesía de oración. ‘Oirás’ conserva la orientación futura/confidente del hablante sin forzar una paráfrasis mayor.
- source_word: קוֹלִי
  english_pob_choice: my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - mi clamor
  - mi grito
  lexicon: HALOT
  rationale: ‘Voz’ es la equivalencia más directa de קוֹל en este contexto de oración. ‘Clamor’ o ‘grito’ intensifican sin necesidad el hebreo.
- source_word: אֶעֱרָךְ
  english_pob_choice: I lay my request before you
  chosen_spanish: presentaré mi petición
  alternatives_spanish:
  - pondré en orden mi petición
  - dispondré mi causa
  lexicon: HALOT
  rationale: El verbo puede significar ‘ordenar, disponer, presentar’. En el contexto de oración, la idea es poner la petición delante de Dios; ‘presentaré mi petición’ conserva la acción sin volverla opaca en español.
- source_word: לְךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - para ti
  lexicon: HALOT
  rationale: Aunque la preposición básica es ‘a/para ti’, con ערך el sentido contextual es de presentación en la presencia de Dios. ‘Delante de ti’ mantiene esa imagen relacional.
- source_word: וַאֲצַפֶּה
  english_pob_choice: and watch expectantly
  chosen_spanish: y esperaré expectante
  alternatives_spanish:
  - y velaré expectante
  - y aguardaré con esperanza
  lexicon: HALOT
  rationale: צפה puede abarcar mirar, vigilar y esperar con expectativa. En español, ‘esperaré expectante’ transmite bien la espera confiada y evita una repetición demasiado visual de ‘mirar’.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura del POB en inglés preserva el nombre divino como transliteración. En español, ‘Yahvé’ es la forma estándar de esa transliteración y evita la sustitución por un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Alineado con el pasaje fuente y con la revisión inglesa más reciente, que no requirió cambios sustantivos; se conserva la duplicación de ‘por la mañana’ y la tensión semántica de ערך/צפה mediante formulación natural en español.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ para el nombre divino, conforme al criterio POB y a la transparencia textual.
  - Se evitó ‘SEÑOR’ como sustituto del Tetragrama.
  - ‘Petición’ traduce de forma natural el objeto implícito de ערך en contexto oracional, sin añadir contenido doctrinal.
  - La segunda cláusula conserva el matiz de expectativa, no solo de espera pasiva.
