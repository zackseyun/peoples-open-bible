translation:
  language: es
  text: Y cuando el impío se aparta de su impiedad y hace justicia y rectitud[a], por ellas vivirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «a causa de ellas», «por medio de ellas» o «sobre ellas»; la expresión hebrea vuelve sobre «justicia y rectitud» como el fundamento en relación con el cual él vive.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְשׁוּב
  english_pob_choice: And when ... turns
  chosen_spanish: Y cuando ... se aparta
  alternatives_spanish:
  - Y al volver
  - Y cuando vuelve
  - Y en apartarse
  lexicon: HALOT
  rationale: La construcción temporal con infinitivo se expresa naturalmente en español con «cuando»; «se aparta» comunica el giro desde el mal sin forzar una calca rígida.
- source_word: רָשָׁע
  english_pob_choice: a wicked man
  chosen_spanish: el impío
  alternatives_spanish:
  - un hombre impío
  - el malvado
  - una persona impía
  lexicon: HALOT
  rationale: El sustantivo/adjetivo sustantivado describe al culpable en sentido moral. «Impío» mantiene la carga ética y funciona con naturalidad en español bíblico sin perder fuerza.
- source_word: מֵרִשְׁעָתוֹ
  english_pob_choice: from his wickedness
  chosen_spanish: de su impiedad
  alternatives_spanish:
  - de su maldad
  - de su pecado
  - de su perversidad
  lexicon: HALOT
  rationale: «Impiedad» conserva la relación léxica con «impío» y el matiz moral de רִשְׁעָה, sin reducirlo a un mero acto aislado.
- source_word: וְעָשָׂה
  english_pob_choice: and does
  chosen_spanish: y hace
  alternatives_spanish:
  - y practica
  - y obra
  - y realiza
  lexicon: HALOT
  rationale: «Hace» reproduce bien el verbo amplio עשה y permite coordinar de modo directo con los objetos éticos siguientes.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - derecho
  - juicio
  - lo justo
  lexicon: HALOT
  rationale: En la pareja ética con צְדָקָה, «justicia» es la equivalencia más clara en español y mantiene el valor de conducta recta, no de sentencia judicial.
- source_word: וּצְדָקָה
  english_pob_choice: and righteousness
  chosen_spanish: y rectitud
  alternatives_spanish:
  - y justicia
  - y justicia recta
  - y rectitud moral
  lexicon: HALOT
  rationale: Aunque «justicia» sería posible, aquí «rectitud» ayuda a distinguirla de מִשְׁפָּט y conserva el paralelismo ético sin suavizar el término.
- source_word: עֲלֵיהֶם
  english_pob_choice: by them
  chosen_spanish: por ellas
  alternatives_spanish:
  - por medio de ellas
  - a causa de ellas
  - sobre ellas
  lexicon: HALOT
  rationale: El hebreo puede entenderse de modo instrumental o de base. «Por ellas» deja abierto que la vida viene en relación con esas obras, sin resolver del todo la tensión lexical.
- source_word: הוּא יִחְיֶה
  english_pob_choice: he shall live
  chosen_spanish: vivirá
  alternatives_spanish:
  - él vivirá
  - vivirá él
  - seguirá viviendo
  lexicon: HALOT
  rationale: El español puede omitir el pronombre enfático sin perder sentido. «Vivirá» mantiene el registro profético y el resultado prometido.
theological_decisions:
- issue: Relación entre arrepentimiento, obras éticas y vida
  english_pob_reading: The verse states that when the wicked man turns from wickedness and practices justice and righteousness, he shall live by these deeds.
  chosen_spanish_reading: El verso afirma que, cuando el impío se aparta de su impiedad y hace justicia y rectitud, vivirá por ellas.
  alternative_spanish_readings:
  - '... vivirá a causa de ellas'
  - '... vivirá sobre ellas'
  - '... vivirá por medio de ellas'
  rationale: La redacción conserva la secuencia del hebreo y mantiene la ambigüedad legítima de עֲלֵיהֶם. No se interpreta en exceso si la vida es «por» mérito, base, o consecuencia relacional; la tensión queda visible como en el original.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: La revisión más reciente marcó el texto como sin cambios necesarios; se ha mantenido esa estabilidad y se ha preservado el punto crítico de עֲלֵיהֶם con una nota breve de alternativa léxica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando aparezca el nombre divino; en este versículo no se requiere.
  - «Impío/impiedad» conserva la coherencia interna entre el sustantivo y su derivado.
  - Se evita duplicar «justicia» para no borrar el paralelismo con צְדָקָה; por eso se usa «rectitud».
  - La nota a pie de página queda anclada en «por ellas» para documentar la ambigüedad del hebreo sin recargar el cuerpo del texto.
