base_translation:
  language: en
  yaml_path: translation/ot/habakkuk/003/013.yaml
  text: You went out for the salvation of your people[a], for the salvation of your anointed; you crushed the head of the house of the wicked, laying bare the foundation up to the neck[c][b]. Selah
  footnotes:
  - marker: a
    text: Or 'for the salvation of your anointed'; the Hebrew repeats 'for salvation' in parallel with 'your people.'
    reason: lexical_alternative
  - marker: b
    text: '''Your anointed one'' may refer to the Davidic ruler, to the people in representative form, or typologically to the Messiah; the Hebrew does not force a single interpretation here.'
    reason: alternative_reading
  - marker: c
    text: Or 'stripping bare the foundation up to the neck.' The Hebrew imagery is difficult and may mix the picture of demolishing a house with exposing a body.
    reason: lexical_alternative
