translation:
  language: es
  text: 'Pero él les dijo[a]: «No me demoren, porque Yahvé ha hecho prosperar mi camino. Envíenme para que vaya a mi amo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mi camino»; aquí se refiere al viaje o la misión del siervo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But he said
  chosen_spanish: Pero él les dijo
  alternatives_spanish:
  - Y dijo él
  - Y él dijo
  lexicon: HALOT
  rationale: El waw narrativo avanza la escena; en español, «Pero» conserva el giro discursivo observado en la auditoría inglesa frente al retraso implícito, y «les dijo» expresa con naturalidad el destinatario plural.
- source_word: אֲלֵהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a estos
  lexicon: HALOT
  rationale: El sufijo pronominal plural se expresa de forma natural en español con el dativo «les» dentro de la construcción verbal.
- source_word: אַל תְּאַחֲרוּ אֹתִי
  english_pob_choice: Do not delay me
  chosen_spanish: No me detengan
  alternatives_spanish:
  - No me demoren
  - No me retengan
  lexicon: HALOT
  rationale: El hebreo expresa una prohibición con el sentido de demorar o retener. «Detengan» comunica bien la idea de impedir la partida sin sonar excesivamente mecánico; «demoren» sería más literal pero menos idiomático en este contexto.
- source_word: וַיהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Siguiendo la directriz del proyecto para יהוה, se mantiene el nombre divino «Yahvé» en el texto principal, en lugar de la convención de enmascararlo como «SEÑOR».
- source_word: הִצְלִיחַ
  english_pob_choice: has made ... successful
  chosen_spanish: ha hecho prosperar
  alternatives_spanish:
  - ha hecho exitoso
  - ha dado éxito a
  lexicon: HALOT
  rationale: El causativo hebreo de צלח comunica que Yahvé hizo que la empresa resultara favorable. «Ha hecho prosperar» conserva esa causación divina y suena natural en español.
- source_word: דַּרְכִּי
  english_pob_choice: my journey
  chosen_spanish: mi camino
  alternatives_spanish:
  - mi viaje
  - mi ruta
  lexicon: HALOT
  rationale: La expresión hebrea literalmente significa «mi camino»; como en la nota inglesa, aquí alude al viaje o misión del siervo. Se conserva la imagen básica del hebreo con «mi camino» y se evita borrar la metáfora.
- source_word: שַׁלְּחוּנִי
  english_pob_choice: Send me away
  chosen_spanish: Despáchennme
  alternatives_spanish:
  - Envíenme
  - Déjenme ir
  lexicon: HALOT
  rationale: El imperativo de enviar con el sufijo de primera persona singular pide la liberación para partir. «Despáchennme» expresa formalmente la petición de salida; la doble n refleja la asimilación gráfica esperable en español cuando se une el pronombre enclítico a la forma verbal.
- source_word: וְאֵלְכָה
  english_pob_choice: so that I may go
  chosen_spanish: para que yo vaya
  alternatives_spanish:
  - y yo vaya
  - a fin de que vaya
  lexicon: HALOT
  rationale: La cohortativa expresa intención o propósito. «Para que yo vaya» reproduce bien la finalidad en español y mantiene el matiz volitivo del hablante.
- source_word: לַאדֹנִי
  english_pob_choice: to my master
  chosen_spanish: a mi amo
  alternatives_spanish:
  - a mi señor
  - a mi señor amo
  lexicon: HALOT
  rationale: Aquí אֲדֹנִי se refiere a un superior humano, Abraham, no al título divino. Se elige «amo» para mantener con claridad la relación amo-siervo que el contexto exige, en línea con la decisión inglesa de evitar ambigüedad con «Lord».
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  rationale: La fuente hebrea emplea explícitamente el Tetragrámaton. Conforme al estándar del proyecto en español, se traduce por «Yahvé» para preservar el nombre del pacto, en lugar de una sustitución reverencial que lo oculte.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La auditoría inglesa final quedó en alto acuerdo y sin cambios en la última revisión. Esta versión española sigue esas decisiones, pero adapta la formulación a un español natural, preservando las tensiones lexicográficas relevantes: el valor de דַּרְכִּי como «camino/journey» y la referencia de לַאדֹנִי a un señor humano.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en coherencia con la terminología del proyecto para יהוה.
  - Se usa «amo» para לַאדֹנִי en este contexto humano, evitando ambigüedad con el título divino.
  - «No me detengan» comunica la prohibición de retrasar/retener sin perder la fuerza imperativa.
  - La nota [a] preserva la alternativa semántica de דַּרְכִּי sin borrar la imagen hebrea del «camino».
