base_translation:
  language: en
  yaml_path: translation/ot/proverbs/010/016.yaml
  text: The labor of the righteous leads to life[c][b][a]; the produce of the wicked leads to sin.
  footnotes:
  - marker: a
    text: Or 'for life' / 'results in life.' The Hebrew preposition can mark purpose or result.
    reason: lexical_alternative
  - marker: b
    text: Or 'income,' 'yield,' or 'harvest' for 'produce.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew חַטָּאת can also mean 'sin offering' in sacrificial contexts, but here the sense is 'sin.'
    reason: alternative_reading
