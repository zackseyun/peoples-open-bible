translation:
  language: es
  text: Y murió Samuel, y se reunió todo Israel y lo lamentó[a], y lo sepultaron en su casa[b], en Ramá. Entonces David se levantó y descendió al desierto de Parán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hizo duelo por él». El verbo hebreo se refiere a ritos de duelo por los muertos.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en su casa», probablemente refiriéndose al lugar familiar asociado con su casa, no necesariamente dentro de la vivienda.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: Now Samuel died
  chosen_spanish: Ahora Samuel murió
  alternatives_spanish:
  - Y Samuel murió
  - Entonces Samuel murió
  lexicon: WLC/halot
  rationale: La forma narrativa con waw consecutiva avanza la escena. En español, «Ahora» da un enlace natural de transición sin añadir contenido interpretativo ni perder el valor simple de «murió».
- source_word: וַיִּקָּבְצוּ כָל יִשְׂרָאֵל
  english_pob_choice: all Israel gathered
  chosen_spanish: se reunió todo Israel
  alternatives_spanish:
  - se juntó todo Israel
  - se congregó todo Israel
  lexicon: WLC/halot
  rationale: «Todo Israel» conserva el colectivo nacional del hebreo. «Se reunió» expresa bien el nifal y suena natural en español actual, manteniendo el sentido de asamblea.
- source_word: וַיִּסְפְּדוּ לוֹ
  english_pob_choice: mourned for him
  chosen_spanish: lo lamentó
  alternatives_spanish:
  - lo lloró
  - se lamentó por él
  lexicon: WLC/halot
  rationale: El verbo describe lamentos y ritos fúnebres por el muerto. «Lo lamentó» conserva esa amplitud; aunque el sujeto es plural en hebreo, en español puede entenderse colectivamente con «todo Israel» como sujeto previo.
- source_word: וַיִּקְבְּרֻהוּ
  english_pob_choice: they buried him
  chosen_spanish: lo sepultaron
  alternatives_spanish:
  - lo enterraron
  - lo sepultaron a él
  lexicon: WLC/halot
  rationale: «Sepultar» mantiene la dignidad del acto funerario y corresponde bien al verbo hebreo. Es una opción natural y reverente en español bíblico contemporáneo.
- source_word: בְּבֵיתוֹ
  english_pob_choice: at his house
  chosen_spanish: en su casa
  alternatives_spanish:
  - en su hogar
  - en su casa paterna
  lexicon: WLC/halot
  rationale: El hebreo puede referirse al ámbito doméstico o familiar asociado con su casa, no necesariamente al interior del edificio. «En su casa» conserva la ambigüedad útil y es fiel al giro hebreo; la nota explica el matiz funerario.
- source_word: בָּרָמָה
  english_pob_choice: in Ramah
  chosen_spanish: en Ramá
  alternatives_spanish:
  - en la Ramá
  lexicon: WLC/halot
  rationale: Se translitera el topónimo tradicionalmente como «Ramá», con preposición locativa normal en español.
- source_word: וַיָּקָם
  english_pob_choice: Then David arose
  chosen_spanish: Entonces David se levantó
  alternatives_spanish:
  - Y David se levantó
  - David se levantó entonces
  lexicon: WLC/halot
  rationale: «Se levantó» reproduce el valor dinámico de la forma verbal en narrativa y comunica el inicio de una nueva acción. «Entonces» marca la secuencia de manera natural.
- source_word: וַיֵּרֶד אֶל מִדְבַּר פָּארָן
  english_pob_choice: went down to the wilderness of Paran
  chosen_spanish: y descendió al desierto de Parán
  alternatives_spanish:
  - y bajó al desierto de Parán
  - y fue al desierto de Parán
  lexicon: WLC/halot
  rationale: «Descendió» conserva la imagen direccional de ירד, y «desierto» es una alternativa aceptable en español para מִדְבָּר cuando el contexto destaca la aridez más que la mera extensión despoblada. Se mantiene «Parán» como nombre propio.
translation_notes:
  revision_awareness: The English POB audit trail is high-agreement and unchanged on this verse. I preserved its narrative sequencing, its broad rendering of וַיִּסְפְּדוּ as mourning/lamentation, and its understanding of בְּבֵיתוֹ as a burial location associated with Samuel’s house. I adjusted Spanish diction to read naturally while keeping the same source-driven lexical decisions.
  spanish_consistency_notes:
  - Mantengo «Yahvé» como forma por defecto, pero este versículo no contiene el tetragrámaton.
  - Uso «Ramá» y «Parán» como topónimos transliterados de forma estándar.
  - Conservo la secuencia narrativa con marcadores simples («Ahora», «Entonces») sin sobreexplicar el hilo del relato.
  - No he sustituido el matiz funerario de וַיִּסְפְּדוּ por un verbo más débil; «lamentó» sigue la amplitud del original.
