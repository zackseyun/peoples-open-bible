review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien el sentido del griego y sigue de cerca las decisiones del POB en la doble expresión de gozo, la necesidad implícita de ἔδει, el énfasis relacional de «este hermano tuyo», y el contraste metafórico muerte/vida, perdido/hallado. Sin embargo, una nota al pie invierte indebidamente la alternativa documentada para εὑρέθη.
  spanish_quality_summary: El texto es claro, natural y digno en español general. «Celebrar y alegrarse» funciona bien, y «ha vuelto a la vida» comunica adecuadamente el matiz restaurativo. «Ha sido hallado» es comprensible y de registro bíblico; no obstante, la nota alternativa correspondiente debe corregirse para no presentar como alternativa la opción ya usada en el texto.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. Las elecciones léxicas principales son apropiadas: «celebrar», «alegrarse», «era necesario», «este hermano tuyo», «estaba perdido», «ha sido hallado».'
  issues:
  - severity: medium
    issue: La nota [c] presenta una alternativa incorrecta para εὑρέθη.
    rationale: El texto principal ya dice «ha sido hallado», mientras que la nota dice «O “ha sido encontrado”». Según el rastro inglés, la alternativa es «was found», no «has been found». En español, si el texto principal mantiene «ha sido hallado», la alternativa adecuada es «fue hallado» o «fue encontrado», no repetir el mismo valor aspectual con otro verbo.
  - severity: low
    issue: En las decisiones léxicas aparece la alternativa inglesa «era fitting».
    rationale: Es un desliz metalingüístico en el campo de alternativas españolas, no en el texto bíblico. No afecta directamente el versículo, pero convendría normalizarlo en edición posterior.
  revised_spanish_text: Pero era necesario celebrar y alegrarse[a], porque este hermano tuyo estaba muerto y ha vuelto a la vida[b]; estaba perdido y ha sido hallado[c].
  revised_footnotes:
