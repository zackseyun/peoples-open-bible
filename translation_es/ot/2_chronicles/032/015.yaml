  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios» está bien en singular para אֱלֹהֵיכֶם; «librar» representa bien לְהַצִּיל/יַצִּילוּ; «mano» preserva el hebraísmo auditado. No aparece el nombre divino Yahvé en este versículo.
