translation:
  language: es
  text: Y no ha vuelto a surgir en Israel un profeta como Moisés[a], a quien Yahvé conoció cara a cara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todavía'; el adverbio hebreo puede indicar que no había surgido en Israel un profeta semejante desde entonces.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  english_pob_choice: And no
  chosen_spanish: Y no
  alternatives_spanish:
  - Y ningún
  - Pero no
  lexicon: HALOT
  rationale: La secuencia continua la conclusión narrativa; en español, 'Y no' conserva la negación sin añadir contraste que el hebreo no exige.
- source_word: קָם
  english_pob_choice: has arisen
  chosen_spanish: ha surgido
  alternatives_spanish:
  - se levantó
  - ha aparecido
  lexicon: HALOT
  rationale: El verbo describe la aparición/emergencia de un profeta en la historia de Israel. 'Ha surgido' comunica bien la retrospectiva del texto y evita una calca menos natural.
- source_word: נָבִיא
  english_pob_choice: prophet
  chosen_spanish: profeta
  alternatives_spanish:
  - vidente
  - mensajero
  lexicon: HALOT
  rationale: Es el equivalente directo y normal de נָבִיא en este contexto.
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - todavía
  - aún
  - ya
  lexicon: HALOT
  rationale: Aquí marca la ausencia de un profeta semejante después de Moisés. 'Otra vez' reproduce el valor temporal retrospectivo que el inglés auditado rinde con 'again'.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - dentro de Israel
  lexicon: HALOT
  rationale: La preposición ב expresa el ámbito en el que no surgió tal profeta; 'en Israel' es natural y fiel.
- source_word: כְּמֹשֶׁה
  english_pob_choice: like Moses
  chosen_spanish: como Moisés
  alternatives_spanish:
  - semejante a Moisés
  lexicon: HALOT
  rationale: La comparación simple con כ se conserva de modo directo y claro.
- source_word: אֲשֶׁר
  english_pob_choice: whom
  chosen_spanish: a quien
  alternatives_spanish:
  - que
  lexicon: HALOT
  rationale: El relativo introduce a Moisés como objeto de 'conocer'; 'a quien' preserva esa función sin sonar forzado en español.
- source_word: יְדָעוֹ
  english_pob_choice: knew
  chosen_spanish: conocía
  alternatives_spanish:
  - conoció
  - sabía
  lexicon: HALOT
  rationale: ידע con objeto personal expresa conocimiento relacional. 'Conocía' mantiene la relación continua e íntima sugerida por el contexto y por la idiomática 'cara a cara'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino en lugar de sustitución por un título.'
- source_word: פָּנִים אֶל פָּנִים
  english_pob_choice: face to face
  chosen_spanish: cara a cara
  alternatives_spanish:
  - frente a frente
  - personalmente
  lexicon: HALOT
  rationale: Es el equivalente idiomático natural en español y conserva la imagen concreta de encuentro directo sin diluirla en una explicación abstracta.
theological_decisions:
- issue: El antropomorfismo implícito en 'cara a cara' aplicado a Yahvé
  english_pob_reading: Retain the idiom 'face to face' without reduction
  chosen_spanish_reading: Mantener 'cara a cara' sin reinterpretarlo como 'personalmente'
  alternative_spanish_readings:
  - personalmente
  - directamente
  rationale: El texto hebreo usa lenguaje concreto de encuentro relacional; traducirlo de forma abstracta suavizaría una tensión deliberada del pasaje. 'Cara a cara' preserva la imaginería y la singularidad de la relación de Moisés con Yahvé.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: No se requirieron cambios recientes; la revisión más reciente indicó que no había modificaciones necesarias y el acuerdo interrevisor fue alto, con solo observaciones menores.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יהוה, conforme al criterio del proyecto.
  - Se prefiere 'profeta', 'conocía' y 'cara a cara' para conservar el sentido relacional y la imaginería del hebreo.
  - '''Otra vez'' refleja el matiz temporal de עוֹד en este contexto, con la alternativa ''todavía'' preservada en nota.'
