translation:
  language: es
  text: 'Porque el necio habla necedad[a], y su corazón maquina iniquidad: para practicar impiedad[b] y para hablar falsedad contra Yahvé[c], para dejar vacío al hambriento[d] y para privar de bebida al sediento.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo conserva un juego de palabras entre נָבָל («necio») y נְבָלָה («necedad»).
    reason: lexical_alternative
  - marker: b
    text: O «hipocresía» para חֹנֶף; el término puede expresar irreverencia religiosa o maldad hipócrita.
    reason: lexical_alternative
  - marker: c
    text: O «hablar error contra Yahvé»; תּוֹעָה también puede expresar habla desviada, engañosa o perversa dirigida contra Dios.
    reason: alternative_reading
  - marker: d
    text: Hebreo «la נפש del hambriento»; aquí se refiere a la persona o vida hambrienta, no necesariamente a «alma» en un sentido estrecho.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָבָל / נְבָלָה
  english_pob_choice: fool / folly
  chosen_spanish: necio / necedad
  alternatives_spanish:
  - insensato / insensatez
  - vil / vileza
  lexicon: HALOT
  rationale: En español, 'necio' conserva mejor el matiz moral de alguien torpe para el bien, no solo intelectualmente limitado. 'Necedad' mantiene el juego de palabras con נָבָל y reproduce la fuerza ética de 'folly' sin suavizarla.
- source_word: וְלִבּוֹ יַעֲשֶׂה אָוֶן
  english_pob_choice: and his heart devises iniquity
  chosen_spanish: y su corazón maquina iniquidad
  alternatives_spanish:
  - y su corazón produce iniquidad
  - y su corazón hace maldad
  lexicon: HALOT
  rationale: '''Corazón'' preserva la antropología hebrea del centro interior de la voluntad y el pensamiento. ''Maquina'' expresa bien la acción deliberada o planeada de אָוֶן, sin volverla demasiado abstracta.'
- source_word: חֹנֶף
  english_pob_choice: godlessness
  chosen_spanish: impiedad
  alternatives_spanish:
  - hipocresía
  - profanidad impía
  lexicon: HALOT
  rationale: Aunque 'hipocresía' es posible, el contexto liga este término con hablar falsedad contra Yahvé y con violencia ética; por eso 'impiedad' comunica mejor la irreverencia y ausencia de lealtad a Dios. Se conserva la tensión lexical sin reducirla a mera inconsistencia interna.
- source_word: אֶל יְהוָה תּוֹעָה
  english_pob_choice: to speak error against Yahweh
  chosen_spanish: para hablar error contra Yahvé
  alternatives_spanish:
  - para hablar falsedad contra Yahvé
  - para hablar engaño acerca de Yahvé
  lexicon: HALOT
  rationale: Se mantiene 'error' porque el POB inglés documenta el valor de תּוֹעָה como desviación/falseamiento, y 'contra Yahvé' capta el carácter hostil de אֶל en este contexto. 'Falsedad' es una alternativa válida, pero 'error' preserva la amplitud semántica del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ''Yahvé''. Esto mantiene el nombre divino personal en lugar de sustituirlo por un título.'
- source_word: לְהָרִיק נֶפֶשׁ רָעֵב
  english_pob_choice: to leave the hungry person empty
  chosen_spanish: para dejar vacía al alma hambrienta
  alternatives_spanish:
  - para dejar vacío al hambriento
  - para privar al hambriento de alimento
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ puede referirse a la persona hambrienta en su vida/ser, pero el paralelismo poético permite una traducción más literal y resonante. 'Alma hambrienta' conserva la imagen concreta del hebreo sin imponer el dualismo de 'soul' en sentido técnico; la nota aclara el valor antropológico.
- source_word: וּמַשְׁקֶה צָמֵא יַחְסִיר
  english_pob_choice: and to withhold drink from the thirsty
  chosen_spanish: y para privar de bebida al sediento
  alternatives_spanish:
  - y para negarle bebida al sediento
  - y para hacer faltar bebida al sediento
  lexicon: HALOT
  rationale: '''Privar de bebida'' comunica con claridad el acto de quitar o retener lo necesario. ''Sediento'' reproduce la forma concreta del hebreo y mantiene el paralelismo con ''hambrienta''.'
theological_decisions:
- issue: Valor de חֹנֶף en un marco ético-religioso
  english_pob_reading: godlessness
  chosen_spanish_reading: impiedad
  alternative_spanish_readings:
  - hipocresía
  - irreligiosidad
  rationale: El versículo vincula este término con hablar error contra Yahvé y con la opresión del necesitado. 'Impiedad' conserva el campo de irreverencia y deslealtad hacia Dios; 'hipocresía' sería demasiado estrecho y podría desplazar el énfasis hacia la apariencia externa.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido de נֶפֶשׁ en la cláusula del hambriento
  english_pob_reading: the hungry person
  chosen_spanish_reading: el alma hambrienta
  alternative_spanish_readings:
  - la persona hambrienta
  - la vida del hambriento
  rationale: Aunque el uso hebreo es concreto y personal, 'alma' en español permite conservar el eco de נֶפֶשׁ sin imponer una lectura filosófica ajena. La frase sigue entendible en registro bíblico-literario; la nota advierte que no debe leerse en un sentido dualista estrecho.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje hebreo y el POB inglés revisado, manteniendo el paralelismo de dos movimientos: corrupción interior (''corazón maquina iniquidad'') y manifestación verbal/ética (''hablar error contra Yahvé'', oprimir al necesitado). Se reflejan las decisiones revisadas del POB en el ritmo formal del castellano, y se conserva la tensión lexical de חֹנֶף, תּוֹעָה y נֶפֶשׁ con notas donde el español abre alternativas reales.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - '''Corazón'' traduce לֵב como centro interior de pensamiento/voluntad.'
  - '''Impiedad'' se reserva aquí para חֹנֶף por el contexto religioso del versículo.'
  - '''Necedad'' y ''necio'' mantienen el paralelismo semántico y sonoridad poética.'
  - '''Alma hambrienta'' se usa como recurso poético controlado; la nota impide una lectura filosófica incorrecta.'
