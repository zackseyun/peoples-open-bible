review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo principal: mantiene «Yahvé», «mi Padre», «mi salvación» y la diferencia textual con el griego en notas. También conserva correctamente la imagen hebrea de debilidad en vez de armonizar con «abandonar». Sin embargo, «Y te exaltaré» suena impropio en español cuando el objeto es Dios; el sentido de וַאֲרוֹמֵם aquí pide «te exaltaré/ensalzaré», pero idiomáticamente conviene más «te ensalzaré» o «te exaltaré» solo en un registro más natural. Además, «No me dejes debilitar» es gramaticalmente incompleto o poco idiomático en español; requiere «debilitarme» o, mejor, «debilitarme/flaquear».'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero tiene dos tropiezos de naturalidad importantes: «Y te exaltaré» resulta poco natural en español eclesial moderno, y «No me dejes debilitar» es una construcción defectuosa. El resto del verso es legible y fiel. Las notas son útiles, pero la nota b debe ajustarse para coincidir exactamente con la nueva formulación principal.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: «Yahvé» se usa correctamente; no hay conflicto con Mesías/Cristo ni otros términos base. «El poderoso de mi salvación» conserva bastante bien גבור ישעי, aunque «el poderoso de mi salvación» sigue siendo algo rígido; se puede mantener por fidelidad. La principal corrección necesaria es idiomática, no terminológica.'
  issues:
  - severity: medium
    issue: «No me dejes debilitar» es español poco natural e incompleto
    rationale: 'Para reflejar אַל תַּרְפֵּנִי, el español necesita una forma pronominal o una perífrasis natural: «no me dejes debilitarme» o mejor «no me dejes flaquear / no permitas que me debilite». La forma actual suena gramaticalmente truncada.'
  - severity: medium
    issue: «Y te exaltaré» suena forzado en español bíblico natural
    rationale: Aunque calca bien el inglés, en español dirigido a Dios suena más natural «te ensalzaré» o «te exaltaré» en contextos muy literales. Dado el registro buscado, «te ensalzaré» conserva elevación y mejora la fluidez.
  - severity: low
    issue: La nota b debe concordar con la formulación del texto principal revisado
    rationale: Si se corrige el verbo principal a «flaquear» o formulación similar, la nota debe reflejar ese ajuste para mantener coherencia entre texto y aparato.
