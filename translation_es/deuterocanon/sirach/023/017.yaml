translation:
  language: es
  text: A un hombre promiscuo, todo pan[a] le es dulce; no cesará hasta que llegue a su fin[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "todo tipo de pan". La imagen probablemente sugiere un apetito indiscriminado más que pan en sentido literal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "hasta que muera". El griego puede referirse específicamente a la muerte, aunque "llegue a su fin" también conserva un sentido más amplio de ruina final.'
    reason: alternative_reading
lexical_decisions:
- source_word: πόρνῳ
  english_pob_choice: promiscuous
  chosen_spanish: disoluto
  alternatives_spanish:
  - lascivo
  - promiscuo
  - fornicario
  lexicon: BDAG
  rationale: El griego modifica a ἄνθρωπῳ y describe una conducta sexualmente inmoral de manera general. En español, 'disoluto' comunica vida sexual desordenada y habitual sin reducir el sentido solo a prostitución ni sonar excesivamente técnico.
- source_word: πᾶς ἄρτος
  english_pob_choice: every bread
  chosen_spanish: todo pan
  alternatives_spanish:
  - todo tipo de pan
  - todo alimento
  - cada pan
  lexicon: LSJ
  rationale: La imagen debe conservarse como metáfora proverbial. 'Todo pan' mantiene la literalidad y la ironía del texto sin explicitar indebidamente el referente sexual.
- source_word: ἡδύς
  english_pob_choice: sweet
  chosen_spanish: dulce
  alternatives_spanish:
  - agradable
  - sabroso
  - delicioso
  lexicon: BDAG
  rationale: '''Dulce'' preserva la metáfora sensorial del griego y encaja naturalmente con ''pan'' en español.'
- source_word: οὐ μὴ κοπάσῃ
  english_pob_choice: he will not stop
  chosen_spanish: no cesará
  alternatives_spanish:
  - no se detendrá
  - no desistirá
  - no aflojará
  lexicon: BDAG
  rationale: La negación fuerte del griego se expresa con 'no cesará', que resulta idiomático y conserva la idea de persistencia sin suavizarla.
- source_word: ἕως ἂν τελευτήσῃ
  english_pob_choice: until he comes to his end
  chosen_spanish: hasta que llegue a su fin
  alternatives_spanish:
  - hasta que muera
  - hasta que termine
  - hasta que llegue su muerte
  lexicon: BDAG
  rationale: '''Llegue a su fin'' preserva la amplitud del griego entre muerte literal y ruina final, como lo hace la solución inglesa auditada.'
theological_decisions:
- issue: Mantener la metáfora del pan sin explicitar el objeto sexual del proverbio
  english_pob_reading: 'Preserve the metaphor in the main text: ''every bread is sweet.'''
  chosen_spanish_reading: 'Conservar la metáfora en el texto principal: ''todo pan le es dulce''.'
  alternative_spanish_readings:
  - todo alimento le es dulce
  - toda mujer le es deseable
  rationale: El texto griego usa lenguaje proverbial con imagen alimentaria; explicitar el referente sexual iría más allá de lo que el verso dice y borraría la tensión literaria del símbolo.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Decidir si τελευτήσῃ debe entenderse como muerte o como final/ruina
  english_pob_reading: Render broadly as 'comes to his end.'
  chosen_spanish_reading: 'Traducir con amplitud: ''llegue a su fin''.'
  alternative_spanish_readings:
  - hasta que muera
  - hasta que perezca
  rationale: El verbo puede referirse a muerte, pero el contexto sapiencial admite también ruina moral o final completo. La redacción amplia preserva esa tensión interpretativa.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Pasaje estable según el último pase de revisión; no se registraron cambios en la versión auditada más reciente.
  spanish_consistency_notes:
  - Se conservó 'pan' en singular para reflejar la metáfora del griego πᾶς ἄρτος.
  - Se evitó 'Cristo', 'Señor' y otras fórmulas no pertinentes; no aparecen nombres divinos en este verso.
  - '''Disoluto'' se eligió por claridad pública en español y por su capacidad de cubrir inmoralidad sexual habitual sin estrechar el sentido.'
  - La puntuación separa las dos cláusulas principales con punto y coma, siguiendo el paralelismo del original.
