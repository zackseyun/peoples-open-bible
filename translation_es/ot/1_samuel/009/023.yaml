translation:
  language: es
  text: 'Entonces Samuel dijo al cocinero[a]: «Trae la porción que te di, de la cual te dije: “Resérvala contigo”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «carnicero» o «chef». El hebreo designa al encargado de preparar la comida; en este contexto, «cocinero» expresa mejor la función inmediata.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַטַּבָּח
  english_pob_choice: cook
  chosen_spanish: cocinero
  alternatives_spanish:
  - cocinero de la casa
  - cocinero/a
  lexicon: HALOT
  rationale: El término designa al encargado de preparar la comida en este contexto de banquete. En español, “cocinero” comunica naturalmente la función sin cargar con la idea más específica de “carnicero”, que aquí sería menos idiomática.
- source_word: תְּנָה
  english_pob_choice: Bring
  chosen_spanish: Trae
  alternatives_spanish:
  - Da
  - Entrega
  lexicon: HALOT
  rationale: Aunque el verbo básico es “dar”, el contexto muestra a Samuel pidiendo que se presente o saque una porción reservada. “Trae” reproduce bien esa fuerza idiomática en español sin perder la idea de movimiento hacia el hablante.
- source_word: הַמָּנָה
  english_pob_choice: portion
  chosen_spanish: porción
  alternatives_spanish:
  - ración
  - parte asignada
  lexicon: HALOT
  rationale: La palabra se refiere a una parte asignada de comida. “Porción” es la equivalencia española más natural y conserva tanto la idea de una parte de un banquete como la de algo previamente apartado.
- source_word: אֲשֶׁר נָתַתִּי לָךְ
  english_pob_choice: that I gave you
  chosen_spanish: que te di
  alternatives_spanish:
  - que te entregué
  - que te asigné
  lexicon: HALOT
  rationale: 'La cláusula es directa y retrospectiva: Samuel ya había dado esa porción al cocinero. “Te di” mantiene la sencillez del hebreo sin añadir matices no explícitos.'
- source_word: אֲשֶׁר אָמַרְתִּי אֵלֶיךָ
  english_pob_choice: of which I said to you
  chosen_spanish: de la cual te dije
  alternatives_spanish:
  - sobre la cual te dije
  - acerca de la cual te dije
  lexicon: HALOT
  rationale: El relativo repetido retoma y especifica la porción. “De la cual te dije” conserva el encadenamiento relativamente formal del hebreo y refleja la redacción auditada en inglés más literalmente que una paráfrasis más libre.
- source_word: שִׂים אֹתָהּ עִמָּךְ
  english_pob_choice: Set it aside with you
  chosen_spanish: Ponla contigo
  alternatives_spanish:
  - Guárdala contigo
  - Déjala contigo
  lexicon: HALOT
  rationale: El hebreo literalmente dice colocarla/ponerla con uno mismo. En español, “ponla contigo” preserva esa imagen breve y natural; además, permite la idea de mantenerla reservada, sin sobreexplicar el acto.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo de forma cercana y toma en cuenta la revisión inglesa que prefirió una formulación más literal en la cláusula relativa (“of which I said to you”) sin perder fluidez en español. También conserva el paralelismo de las dos relativas y el imperativo breve final.
  spanish_consistency_notes:
  - Se emplea el tratamiento de segunda persona singular coherente con el hebreo.
  - Se mantiene un registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - La nota al pie marca la alternativa léxica más relevante para טַּבָּח; no se añaden notas textuales porque no hay variante textual indicada en el paquete fuente.
