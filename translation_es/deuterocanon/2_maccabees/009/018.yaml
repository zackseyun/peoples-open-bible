translation:
  language: es
  text: 'Pero cuando sus dolores se habían aliviado un poco[a], porque había venido sobre él el justo juicio de Dios, y al reconocer su propia condición[b], escribió a los judíos la carta escrita abajo, con el carácter de una súplica[c], y que dice así:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando sus dolores estaban cediendo un poco». El adverbio raro ἰουδαϊσμῶς es difícil; el sentido es que los dolores se aliviaban en alguna medida, no que hubieran terminado.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «habiendo reconocido las cosas acerca de sí mismo».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «con la forma de una súplica».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰουδαϊσμῶς
  english_pob_choice: somewhat
  chosen_spanish: un poco
  alternatives_spanish:
  - algo
  - en cierta medida
  - ligeramente
  lexicon: LSJ
  rationale: El adverbio griego es raro y difícil; en contexto con ληγόντων τῶν πόνων indica que los dolores se estaban aliviando, no que hubieran cesado. «Un poco» mantiene esa cautela sin fingir una precisión que el griego no garantiza.
- source_word: ληγόντων
  english_pob_choice: had ... let up
  chosen_spanish: habían disminuido
  alternatives_spanish:
  - iban cediendo
  - se habían aliviado
  - habían aflojado
  lexicon: LSJ
  rationale: Con τῶν πόνων, λήγω expresa que los dolores se estaban reduciendo. «Habían disminuido» es natural en español y conserva el matiz de alivio progresivo.
- source_word: πόνων
  english_pob_choice: pains
  chosen_spanish: dolores
  alternatives_spanish:
  - penas
  - tormentos
  - sufrimientos
  lexicon: LSJ
  rationale: Se refiere a los padecimientos físicos inmediatos de Antíoco. «Dolores» es directo y más natural que «tormentos», que intensificaría innecesariamente el tono.
- source_word: δικαία ἡ τοῦ θεοῦ κρίσις
  english_pob_choice: the just judgment of God
  chosen_spanish: el justo juicio de Dios
  alternatives_spanish:
  - el juicio justo de Dios
  - el juicio recto de Dios
  - la justa sentencia de Dios
  lexicon: LSJ
  rationale: κρίσις aquí es juicio en sentido judicial, y δικαία lo califica moralmente. «Justo juicio de Dios» conserva la fuerza teológica y el orden natural del español.
- source_word: τὰ κατʼ αὐτὸν ἐπιγνούς
  english_pob_choice: he recognized his own condition
  chosen_spanish: reconoció su propia condición
  alternatives_spanish:
  - comprendió lo que le concernía
  - se dio cuenta de su estado
  - reconoció la situación en que se hallaba
  lexicon: LSJ
  rationale: 'La expresión griega es comprimida: literalmente, «habiendo reconocido las cosas acerca de sí mismo». En contexto alude a que entendió su propia situación bajo juicio; «su propia condición» expresa eso con naturalidad.'
- source_word: ὑπογεγραμμένην
  english_pob_choice: written below
  chosen_spanish: transcrita abajo
  alternatives_spanish:
  - escrita abajo
  - puesta abajo
  - subscrita
  lexicon: LSJ
  rationale: En la introducción epistolar, el participio señala el texto que sigue. «Transcrita abajo» comunica bien que la carta viene a continuación, sin sonar anticuado.
- source_word: ἱκετηρίας τάξιν
  english_pob_choice: the character of a petition
  chosen_spanish: con el carácter de una súplica
  alternatives_spanish:
  - con la forma de una súplica
  - con tono de petición
  - con carácter de petición
  lexicon: LSJ
  rationale: ἱκετηρία denota súplica o petición, y τάξις aquí apunta a forma o carácter. «Con el carácter de una súplica» conserva ese matiz formal y el tono humilde del texto.
- source_word: περιέχουσαν δὲ οὕτως
  english_pob_choice: and reading as follows
  chosen_spanish: y que dice así
  alternatives_spanish:
  - y que reza así
  - y cuyo contenido es el siguiente
  - y que contiene lo siguiente
  lexicon: LSJ
  rationale: Es una fórmula estándar para introducir el contenido de la carta. «Que dice así» es idiomático en español y cumple la misma función textual.
theological_decisions:
- issue: Atribución del sufrimiento al juicio divino
  english_pob_reading: Rendered ἐπεληλύθει γὰρ ἐπʼ αὐτὸν δικαία ἡ τοῦ θεοῦ κρίσις as an explicit statement that God's just judgment had come upon him.
  chosen_spanish_reading: Se mantiene la afirmación explícita de que sobre él había venido el justo juicio de Dios.
  alternative_spanish_readings:
  - Se suaviza la causalidad divina dejando el sufrimiento como mera circunstancia
  - Se traduce de modo menos directo, aludiendo solo a un castigo general
  rationale: El griego atribuye sin ambigüedad su estado al juicio de Dios. La traducción conserva esa afirmación teológica sin atenuarla ni convertirla en simple coincidencia.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: Se revisó el griego de Swete 1909 y el aparato auditado en inglés. La decisión principal es mantener el valor de alivio parcial en ἰουδαϊσμῶς/ληγόντων, el carácter judicial de δικαία ἡ τοῦ θεοῦ κρίσις, y la fórmula epistolar final como introducción al texto citado, sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y no se introduce ninguna convención de ocultamiento del nombre divino, porque el texto griego aquí tiene θεοῦ.
  - Se prefirió «juicio» para κρίσις por su fuerza judicial; «sentencia» quedaría posible, pero menos directa en español bíblico de este contexto.
  - Se eligió «súplica» para ἱκετηρία por su resonancia de petición humilde y porque reproduce mejor el tono del griego que «petición» sola.
