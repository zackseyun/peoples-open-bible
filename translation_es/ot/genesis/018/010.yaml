review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: mantiene el sujeto no especificado («él»), la intensidad de שׁוֹב אָשׁוּב, el valor idiomático de כָּעֵת חַיָּה, la promesa de nacimiento a Sara y la escena de Sara escuchando en la entrada. Sin embargo, las notas no siguen fielmente la auditoría inglesa: la nota [a] está anclada en «dijo» pero no corresponde a la nota inglesa sobre כָּעֵת חַיָּה; y la nota [c] mezcla indebidamente las alternativas inglesas sobre la cláusula final con «he aquí».'
  spanish_quality_summary: El español es mayormente natural y digno. «Volveré sin falta» es entendible, pero «sin duda volveré» o «ciertamente volveré» suena algo más bíblico-natural. «Y he aquí que» es aceptable, aunque «y he aquí» basta. La mayor necesidad de corrección está en la organización y contenido de las notas, no en la legibilidad del texto principal.
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto en este versículo. «Sara», «esposa», «hijo», «tienda» y «él» son adecuados. Se preserva correctamente la decisión teológica de no identificar al hablante como «Yahvé» en el texto principal.
  issues:
  - severity: high
    issue: La nota [a] del borrador está mal asignada
    rationale: En la POB inglesa la nota anclada tras «said» en realidad explica el modismo כָּעֵת חַיָּה («about this time next year»), no la forma narrativa de וַיֹּאמֶר. La nota española actual altera la función documental del aparato.
  - severity: high
    issue: La nota [c] no preserva fielmente las alternativas documentadas
    rationale: La nota [c] inglesa corresponde a una traducción previa alternativa de la cláusula final («at the entrance of the tent, and it was behind him»), no a «he aquí». En español actual, el anclaje y el contenido crean confusión exegética.
  - severity: medium
    issue: Falta una nota separada para la alternativa de וְהוּא אַחֲרָיו
    rationale: 'La auditoría inglesa conserva dos notas distintas para la parte final: una sobre la lectura más literal de los pronombres, y otra sobre una formulación previa. El español debería reflejar ambas por separado si conserva notas.'
  - severity: low
    issue: «Volveré sin falta» puede sonar algo coloquial
    rationale: Aunque fiel, una formulación como «sin duda volveré» encaja mejor con el registro bíblico moderno y la fuerza enfática del hebreo.
