translation:
  language: es
  text: Ahora tengo en mi corazón hacer un pacto con Yahvé[a], el Dios de Israel, para que su ira ardiente se aparte de nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «cortar un pacto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - En este momento
  - Ahora mismo
  lexicon: HALOT
  rationale: El adverbio temporal marca la inmediatez de la resolución de Ezequías; «Ahora» es natural en español y conserva esa urgencia sin añadir matiz interpretativo.
- source_word: עִם לְבָבִי
  english_pob_choice: it is in my heart
  chosen_spanish: está en mi corazón
  alternatives_spanish:
  - lo tengo en mi corazón
  - lo llevo en mi corazón
  - estoy resuelto
  lexicon: HALOT
  rationale: La imagen hebrea expresa intención interior o resolución. «Está en mi corazón» preserva la metáfora y suena idiomático en español bíblico contemporáneo.
- source_word: לִכְרֹת בְּרִית
  english_pob_choice: to make a covenant
  chosen_spanish: hacer un pacto
  alternatives_spanish:
  - cortar un pacto
  - establecer un pacto
  lexicon: HALOT
  rationale: El hebreo dice literalmente «cortar un pacto», pero en español «hacer un pacto» comunica con claridad el acto pactal sin caer en una literalidad poco natural. Se conserva la alternativa literal en nota.
- source_word: לַיהוָה
  english_pob_choice: with Yahweh
  chosen_spanish: con Yahvé
  alternatives_spanish:
  - con Yahweh
  - para Yahvé
  lexicon: HALOT
  rationale: 'La preposición funcional en español debe expresar al socio del pacto: «con». Se mantiene el nombre divino «Yahvé» según la terminología del proyecto.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  lexicon: HALOT
  rationale: Es un título genitivo directo y transparente; «el Dios de Israel» conserva el referente pactal e identitario del original.
- source_word: וְיָשֹׁב
  english_pob_choice: may turn away
  chosen_spanish: para que se aparte
  alternatives_spanish:
  - y se aparte
  - para que vuelva atrás
  lexicon: HALOT
  rationale: El verbo expresa el resultado deseado de la intención de Ezequías. «Para que se aparte» reproduce bien la orientación de alejamiento del peligro o juicio.
- source_word: מִמֶּנּוּ
  english_pob_choice: from us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - de encima de nosotros
  - de nuestro lado
  lexicon: HALOT
  rationale: El sufijo de primera persona plural indica el objeto colectivo afectado; «de nosotros» es directo y natural en español.
- source_word: חֲרוֹן אַפּוֹ
  english_pob_choice: his burning anger
  chosen_spanish: su ardiente ira
  alternatives_spanish:
  - su ardor de ira
  - su ira ardiente
  - su furor encendido
  lexicon: HALOT
  rationale: La expresión hebrea intensifica la ira divina con la imagen del calor. «Ardiente ira» conserva esa metáfora y evita aplanarla en un simple «ira».
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. Siguiendo la política del proyecto, se translitera como «Yahvé» y no se oculta tras «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: 'Dirección de la cláusula final: propósito/resulto'
  english_pob_reading: so that his burning anger may turn away from us
  chosen_spanish_reading: para que se aparte de nosotros su ardiente ira
  alternative_spanish_readings:
  - y se aparte de nosotros su ardiente ira
  - para que su ardiente ira se aparte de nosotros
  rationale: El hebreo usa una cláusula con valor volitivo/de resultado. En español, «para que» expresa bien la finalidad buscada sin convertirlo en una afirmación independiente. Se mantiene el sujeto pospuesto («su ardiente ira») como en la sintaxis natural española.
  doctrine_reference: Gramática española de subordinación final; sentido volitivo del yiqtol jussivo
translation_notes:
  revision_awareness: Se revisó contra el audit trail inglés y no se detectaron cambios de sentido relevantes respecto de la lectura aprobada; se mantuvo la equivalencia óptima con preservación de la imaginería pactal y de la ira ardiente.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con el estándar del proyecto para יהוה.
  - Se prefirió «pacto» sobre «alianza» por cercanía semántica al hebreo בְּרִית y por consistencia con el registro bíblico.
  - Se conservó la metáfora de «corazón» para la intención interior, sin traducirla como simple resolución abstracta.
  - 'Se mantuvo el orden natural del español sin perder el sujeto teológico del juicio: «su ardiente ira».'
