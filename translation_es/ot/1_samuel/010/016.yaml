translation:
  language: es
  text: 'Saúl le dijo a su tío[a]: «Nos dijo claramente que las burras[b] habían sido halladas». Pero no le dijo nada acerca del asunto de la realeza[c], del que Samuel había hablado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pariente». El hebreo דּוֹדוֹ puede designar a un tío; aquí el contexto narrativo favorece ese parentesco concreto.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «las burras» o «las asnas». Se usa el término más natural en español, pero el hebreo especifica hembras.'
    reason: lexical_alternative
  - marker: c
    text: O «el asunto del reino». El hebreo probablemente se refiere aquí a la realeza de Saúl más que al reino como territorio.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁאוּל אֶל דּוֹדוֹ
  english_pob_choice: Saul said to his uncle
  chosen_spanish: Saúl le dijo a su tío
  alternatives_spanish:
  - Saúl le dijo a su pariente
  - Saúl le dijo a su familiar
  lexicon: HALOT
  rationale: En este contexto narrativo, דּוֹדוֹ funciona como relación familiar concreta, no como 'amado'. 'Tío' reproduce la decisión auditada del inglés y es natural en español.
- source_word: הַגֵּד הִגִּיד
  english_pob_choice: He plainly told us
  chosen_spanish: De veras nos dijo
  alternatives_spanish:
  - Nos dijo claramente
  - Nos dijo expresamente
  lexicon: HALOT
  rationale: La combinación de infinitivo absoluto + verbo finito intensifica la afirmación. 'De veras' comunica énfasis sin sonar mecánico, y mantiene el sentido de 'dijo claramente/expresamente'.
- source_word: הָאֲתֹנוֹת
  english_pob_choice: the donkeys
  chosen_spanish: las burras
  alternatives_spanish:
  - las asnas
  - los asnos
  lexicon: HALOT
  rationale: El hebreo especifica hembras. En español, 'burras' conserva ese rasgo de manera directa; 'asnas' también sería posible, pero 'burras' suena más natural en registro bíblico contemporáneo.
- source_word: נִמְצְאוּ
  english_pob_choice: had been found
  chosen_spanish: habían sido halladas
  alternatives_spanish:
  - habían sido encontradas
  - se habían encontrado
  lexicon: HALOT
  rationale: El pasivo se conserva con 'habían sido halladas', que expresa con claridad el resultado ya ocurrido en el discurso reportado.
- source_word: דְּבַר הַמְּלוּכָה
  english_pob_choice: the matter of the kingship
  chosen_spanish: el asunto de la realeza
  alternatives_spanish:
  - el asunto del reino
  - el asunto del reinado
  - la cuestión de la realeza
  lexicon: HALOT
  rationale: דָּבָר aquí es 'asunto/materia', no simplemente 'palabra'. מְלוּכָה en este contexto apunta a la condición o dignidad real conferida a Saúl; 'realeza' preserva mejor esa fuerza que 'reino' como territorio.
- source_word: לֹא הִגִּיד לוֹ
  english_pob_choice: he did not tell him
  chosen_spanish: no le dijo nada
  alternatives_spanish:
  - no se lo dijo
  - no le informó
  lexicon: HALOT
  rationale: El hebreo niega el acto de comunicar; 'no le dijo nada' fluye bien en español y conserva la omisión de este tema en la conversación.
- source_word: אֲשֶׁר אָמַר שְׁמוּאֵל
  english_pob_choice: that Samuel had spoken of
  chosen_spanish: que Samuel había hablado
  alternatives_spanish:
  - que Samuel había dicho
  - de lo que Samuel había hablado
  lexicon: HALOT
  rationale: La relativa modifica el asunto de la realeza. 'Había hablado' mantiene la referencia al contenido comunicado por Samuel sin añadir especificaciones no presentes en el hebreo.
theological_decisions:
- issue: מְלוּכָה como realeza/reinado vs. reino
  english_pob_reading: the matter of the kingship, not the kingdom as a realm
  chosen_spanish_reading: el asunto de la realeza
  alternative_spanish_readings:
  - el asunto del reino
  - el asunto del reinado
  rationale: La nota inglesa distingue el cargo o dignidad real, no un reino territorial. 'Realeza' permite conservar esa tensión entre oficio y condición real sin desplazarse a una lectura geopolítica.
  doctrine_reference: 1 Samuel 10:1, 10:17-24; 1 Samuel 12
- issue: Intensificación verbal en הַגֵּד הִגִּיד
  english_pob_reading: He plainly told us
  chosen_spanish_reading: De veras nos dijo
  alternative_spanish_readings:
  - Nos dijo claramente
  - Nos dijo expresamente
  rationale: Se preserva el valor enfático del hebreo sin forzar una reiteración literal extraña al español. La traducción mantiene que Saúl subraya con seguridad la exactitud del mensaje sobre las burras.
  doctrine_reference: Principios de traducción de intensificación verbal en hebreo bíblico
translation_notes:
  revision_awareness: 'Este borrador sigue de cerca la lectura auditada del inglés POB y mantiene sus decisiones clave: דּוֹדוֹ como parentesco familiar, la intensificación de הַגֵּד הִגִּיד, el pasivo de נִמְצְאוּ y la distinción entre el asunto de la realeza y un reino territorial. No se detectaron revisiones posteriores que alteren esas opciones.'
  spanish_consistency_notes:
  - Se usó 'Saúl' como sujeto explícito, de acuerdo con el hebreo y el inglés auditado.
  - Se mantuvo una solución verbal natural para el discurso directo, sin calcos innecesarios.
  - '''Realeza'' se eligió para evitar confundir מְלוּכָה con un dominio territorial.'
  - El estilo busca ser bíblico y publicable en español latinoamericano, sin arcaísmos innecesarios.
