translation:
  text: And not only that[a], but there will be an inspection of them, because they received the foreigners with hostility.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there will be a visitation upon them'; the Greek can imply divine visitation for judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μόνον
  chosen: not only that
  alternatives:
  - not only
  - and not only
  lexicon: LSJ
  rationale: Idiomatic continuation from the previous argument; the phrase introduces an additional point rather than standing alone as a bare negation.
- source_word: ἐπισκοπή
  chosen: inspection
  alternatives:
  - visitation
  - oversight
  - punishment
  lexicon: LSJ
  rationale: The noun can denote visitation or oversight, often with punitive force in context. Here the future 'there will be' and the causal clause imply divine scrutiny/judgment. 'Inspection' preserves the core sense of examination without over-interpreting, while allowing the judicial nuance to remain implicit from context.
- source_word: ἀπεχθῶς
  chosen: with hostility
  alternatives:
  - hatefully
  - in a hostile way
  - with aversion
  lexicon: LSJ
  rationale: An adverb describing the manner of reception. 'With hostility' is natural modern English and preserves the negative moral force better than the awkward 'hatefully.'
- source_word: προσεδέχοντο
  chosen: received
  alternatives:
  - welcomed
  - accepted
  lexicon: LSJ
  rationale: The verb means to receive or welcome. Because the adverb ἀπεχθῶς sharply qualifies the action, 'received' better fits the irony of admitting outsiders in a hostile manner; 'welcomed' would sound too positive unless heavily qualified.
- source_word: τοὺς ἀλλοτρίους
  chosen: the foreigners
  alternatives:
  - strangers
  - outsiders
  - aliens
  lexicon: LSJ
  rationale: The term refers to those belonging to another people. 'Foreigners' is clear, contemporary, and contextually appropriate in this contrast between peoples; 'strangers' could sound merely unfamiliar, and 'aliens' is misleading in modern English.
