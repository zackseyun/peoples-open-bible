lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; en español, «Entonces» conserva mejor la secuencia que un simple «Y». «Habló» mantiene el sentido de discurso dirigido y resulta más natural que «dijo» en esta fórmula introductoria.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de transliterar el nombre divino como «Yahvé», preservando el nombre personal del pacto y evitando la sustitución por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla; en español, «a» es la equivalencia directa y más natural para introducir el complemento indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Mosés
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma española asentada.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - y dijo,
  - para decir,
  lexicon: HALOT
  rationale: El infinitivo constructo funciona como marcador de discurso directo; «diciendo,» reproduce la fórmula narrativa con fidelidad y sin sobretraducir.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura auditada del POB inglés usa el nombre divino explícito. En español, «Yahvé» es la forma consistente con la política terminológica del proyecto y evita la ocultación del Tetragrámaton bajo un sustituto titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no hubo cambios necesarios y el acuerdo con el control cruzado fue alto; por eso se mantiene la solución estable del audit trail: fórmula narrativa breve, nombre divino explícito y marcador de discurso directo conservado.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» de manera coherente con el estándar del proyecto para יְהוָה.
  - «Entonces ... habló» refleja mejor la progresión narrativa que una traducción plana por «Y dijo» en este contexto formulaico.
  - Se usa «Moisés» como forma española convencional del nombre propio bíblico.
  - El marcador [a] se coloca sobre «Yahvé» porque la nota explica la alternativa histórica de traducción del nombre divino.
