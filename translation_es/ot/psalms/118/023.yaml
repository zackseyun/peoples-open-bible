translation:
  language: es
  text: Esto viene de Yahvé[a]; es maravilloso[b] a nuestros ojos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Esto fue de Yahvé» o «Esto ha sucedido por obra de Yahvé».'
    reason: alternative_reading
  - marker: b
    text: 'O: «admirable».'
    reason: lexical_alternative
  - marker: c
