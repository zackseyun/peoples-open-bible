translation:
  language: es
  text: 'De igual modo[a], así como sucedió en los días de Lot: comían, bebían, compraban, vendían, plantaban y construían.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Asimismo, tal como sucedió en los días de Lot».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμοίως
  english_pob_choice: Likewise
  chosen_spanish: De igual modo
  alternatives_spanish:
  - Asimismo
  - Igualmente
  lexicon: BDAG
  rationale: Como adverbio de enlace, conserva la relación comparativa con el contexto anterior. «De igual modo» suena natural en español y mantiene el valor de correspondencia sin forzar un calco.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - del mismo modo que
  lexicon: BDAG
  rationale: Introduce la comparación explícita de manera clara y natural. «Así como» refleja bien la relación de semejanza del griego y permite una construcción fluida con el resto de la oración.
- source_word: ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: sucedió
  alternatives_spanish:
  - aconteció
  - pasó
  - tuvo lugar
  lexicon: BDAG
  rationale: El uso eventivo de γίνομαι pide un verbo que indique ocurrencia histórica. «Sucedió» comunica el hecho sin arcaísmo y sin perder el matiz de acontecimiento.
- source_word: ἐν ταῖς ἡμέραις Λώτ
  english_pob_choice: in the days of Lot
  chosen_spanish: en los días de Lot
  alternatives_spanish:
  - durante los días de Lot
  - en tiempos de Lot
  lexicon: BDAG
  rationale: Es el modismo temporal estándar. Se conserva el nombre propio transliterado y la formulación bíblica usual, que en español sigue siendo clara y sobria.
- source_word: ἤσθιον
  english_pob_choice: they were eating
  chosen_spanish: comían
  alternatives_spanish:
  - estaban comiendo
  - estaban comiendo habitualmente
  lexicon: BDAG
  rationale: El imperfecto describe actividad continua o habitual en el trasfondo narrativo. En español, el imperfecto simple «comían» expresa bien ese valor aspectual sin sobrecargar la frase.
- source_word: ἔπινον
  english_pob_choice: drinking
  chosen_spanish: bebían
  alternatives_spanish:
  - estaban bebiendo
  lexicon: BDAG
  rationale: Se mantiene la serie de imperfectos con un verbo simple y natural en español, preservando el paralelismo con «comían».
- source_word: ἠγόραζον
  english_pob_choice: buying
  chosen_spanish: compraban
  alternatives_spanish:
  - hacían compras
  - adquirían
  lexicon: BDAG
  rationale: El verbo imperfectivo señala actividad comercial ordinaria. «Compraban» es la forma más natural en español para este catálogo de acciones cotidianas.
- source_word: ἐπώλουν
  english_pob_choice: selling
  chosen_spanish: vendían
  alternatives_spanish:
  - comerciaban
  lexicon: BDAG
  rationale: Se conserva el contraste directo con «compraban», como en el griego, y se mantiene el sentido literal de la acción.
- source_word: ἐφύτευον
  english_pob_choice: planting
  chosen_spanish: plantaban
  alternatives_spanish:
  - sembraban
  lexicon: BDAG
  rationale: El imperfecto presenta una actividad agrícola habitual. «Plantaban» reproduce el sentido básico de φυτεύω y encaja con la lista de ocupaciones ordinarias.
- source_word: ᾠκοδόμουν
  english_pob_choice: building
  chosen_spanish: construían
  alternatives_spanish:
  - edificaban
  - levantaban
  lexicon: BDAG
  rationale: Aquí οἰκοδομέω tiene sentido literal de construir, no metafórico. «Construían» es claro, moderno y mantiene el carácter ordinario de la enumeración.
translation_notes:
  revision_awareness: El texto griego y el contexto auditado en inglés muestran alta concordancia y no requieren revisión sustantiva; la versión española mantiene la comparación adverbial, el modismo temporal y la cadena de imperfectos que describen acciones habituales en la época de Lot.
  spanish_consistency_notes:
  - Se preserva la secuencia de imperfectos con verbos simples y naturales en español para reflejar el aspecto durativo/habitual del griego.
  - Se conserva «Lot» como nombre propio transliterado, conforme al patrón del material fuente.
  - La puntuación con dos puntos reproduce la introducción de la lista de acciones y ayuda a mantener la estructura retórica del verso.
