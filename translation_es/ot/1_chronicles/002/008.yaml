lexical_decisions:
- source_word: וּ/בְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Y los descendientes de
  - Los hijos de
  lexicon: HALOT
  rationale: El hebreo usa la fórmula genealógica בְנֵי, literalmente «hijos de». En español, «hijos de» conserva mejor la forma y el registro genealógico que «descendientes de», y «Y» refleja la unión narrativa del ו inicial.
- source_word: אֵיתָן
  english_pob_choice: Ethan
  chosen_spanish: Ethan
  alternatives_spanish:
  - Etán
  lexicon: HALOT
  rationale: Es nombre propio. Se conserva la transliteración usual «Ethan» para mantener la continuidad onomástica del texto base y del aparato auditado.
- source_word: עֲזַרְיָה
  english_pob_choice: Azariah
  chosen_spanish: Azarías
  alternatives_spanish:
  - Azarías
  - Azaríah
  lexicon: HALOT
  rationale: Nombre propio hebreo. En español bíblico estándar, «Azarías» es la forma más natural y reconocible; mantiene la identificación del nombre sin añadir interpretación.
theological_decisions:
- issue: Fórmula genealógica con un plural seguido de un solo nombre
  english_pob_reading: Hebrew "sons of Ethan" is followed by a single name, "Azariah." This may function as a genealogical formula introducing Ethan's line, or "sons" may be used idiomatically for descendants.
  chosen_spanish_reading: 'Se conserva la construcción literal «los hijos de Ethan: Azarías» sin suavizarla a «descendiente» o reescribirla como lista normalizada.'
  alternative_spanish_readings:
  - '«los descendientes de Ethan: Azarías»'
  - '«la línea de Ethan: Azarías»'
  rationale: El texto hebreo presenta la tensión entre un plural genealógico y un solo nombre. La traducción española debe mantener esa forma para no borrar la posible función formularia ni resolver artificialmente la irregularidad.
  doctrine_reference: Sin implicación doctrinal directa; decisión de fidelidad textual y genealógica.
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con el texto hebreo transmitido y con el juicio del audito inglés: no se requieren correcciones textuales ni normalizaciones genealógicas. La única tensión significativa es la forma plural «hijos de» seguida por un solo nombre propio, que se mantiene y se explica en nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «hijos de» en sentido genealógico, coherente con el registro bíblico del hebreo.
  - Los nombres propios se conservan en formas españolas habituales cuando existen y son estables en la tradición bíblica castellana.
