    text: O «mi presencia». El hebreo dice literalmente «mi rostro».
    reason: lexical_alternative
  - marker: b
    text: Aquí «el hombre» significa cualquier ser humano; la afirmación se aplica a la humanidad en general.
    reason: cultural_note
  revision_rationale: Se ajusta solo la cláusula final para lograr un español más natural y transparente sin perder el singular genérico ni el antropomorfismo del hebreo. También se mueve el anclaje de la nota cultural al término que realmente explica.
