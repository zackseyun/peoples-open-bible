    issue: «Vengan» no reproduce de la mejor manera la invitación inclusiva de לְכוּ
    rationale: Aunque formalmente puede funcionar como convocatoria, en español suele sonar como invitación del hablante a otros, mientras que el siguiente «cantemos» incluye al hablante. «Vamos» o «Vengan, vamos a…» reflejaría mejor la fuerza exhortativa compartida.
  - severity: low
    issue: «cantemos con alegría» atenúa ligeramente el matiz de júbilo vocal de נְרַנְּנָה
    rationale: La expresión es comprensible y buena, pero «cantemos con gozo» o «cantemos de gozo» se acerca mejor al audit trail «sing for joy» y al tono del salmo.
  - severity: low
