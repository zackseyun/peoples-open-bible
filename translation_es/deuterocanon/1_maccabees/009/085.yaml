  lexicon: LSJ
  rationale: La preposición expresa adición a un total previo o implícito. «Junto con» conserva esa fuerza aditiva de manera natural en español.
- source_word: τοῖς ἐμπυρισθεῖσιν
  english_pob_choice: those burned
  chosen_spanish: los quemados
  alternatives_spanish:
  - los que fueron quemados
  - los incendiados
  lexicon: LSJ
  rationale: El participio pasivo aoristo de ἐμπυρίζω indica personas que fueron quemadas. «Los quemados» es breve, directo y fiel al valor del griego preservado.
- source_word: εἰς
  english_pob_choice: to
  chosen_spanish: en número de
  alternatives_spanish:
  - hasta
  - para un total de
  lexicon: LSJ
  rationale: Aquí εἰς introduce el total resultante. En español, «en número de» comunica con claridad la cifra acumulada sin forzar una calca literal.
- source_word: ἄνδρας
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - personas
  lexicon: LSJ
  rationale: El griego usa ἄνδρας, término masculino específico. «Hombres» mantiene esa referencia de género y la fuerza léxica del original.
- source_word: ὀκτακισχιλίους
  english_pob_choice: eight thousand
  chosen_spanish: ocho mil
  alternatives_spanish:
  - '8.000'
  lexicon: LSJ
  rationale: Número cardinal directo, sin matiz adicional.
- source_word: ἀπῆρεν
  english_pob_choice: he departed
  chosen_spanish: se retiró
  alternatives_spanish:
  - partió
  - se fue
  lexicon: LSJ
  rationale: El aoristo indica que se marchó o se retiró del lugar. «Se retiró» suena narrativo y natural en español; «partió» queda como alternativa cercana.
translation_notes:
  revision_awareness: El audit trail inglés indica que el versículo está preservado solo de forma fragmentaria; por eso la redacción española evita completar el contexto narrativo ausente y conserva la secuencia mínima transmitida por el griego.
  spanish_consistency_notes:
  - Se mantiene el número masculino plural «hombres» para reflejar ἄνδρας.
  - Se evita «SEÑOR» o terminología teológica ajena porque el pasaje no contiene nombres divinos ni fórmulas cultuales.
  - «Se retiró» traduce el cierre narrativo de ἀπῆρεν sin añadir especificaciones no atestiguadas.
