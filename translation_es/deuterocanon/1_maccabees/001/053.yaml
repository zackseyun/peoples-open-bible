lexical_decisions:
- source_word: ἔθεντο
  english_pob_choice: they drove
  chosen_spanish: pusieron
  alternatives_spanish:
  - arrojaron
  - empujaron
  - metieron
  lexicon: LSJ
  rationale: El aoristo medio de τίθημι expresa aquí la acción de colocar o hacer quedar a Israel en una condición determinada. En español, «pusieron» conserva la fuerza agentiva sin añadir violencia no explicitada por el griego. Se evita un verbo más interpretativo como «expulsaron» o «dieron caza» porque el texto no los exige.
- source_word: τὸν Ἰσραήλ
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - a los israelitas
  - al pueblo de Israel
  lexicon: LSJ
  rationale: El singular con artículo funciona colectivamente. «Israel» mantiene la forma del original y su valor corporativo mejor que expandirlo a una perífrasis.
- source_word: ἐν κρυφίοις
  english_pob_choice: into hiding
  chosen_spanish: en ocultamiento
  alternatives_spanish:
  - en escondrijos
  - en lugares ocultos
  - en secreto
  lexicon: LSJ
  rationale: La expresión señala estado o ubicación de ocultación. «En ocultamiento» conserva el sentido de esconderse sin duplicar innecesariamente la idea de refugio ya presente en la segunda mitad del verso. Otras opciones serían más idiomáticas pero menos compactas.
- source_word: ἐν παντὶ φυγαδευτηρίῳ
  english_pob_choice: into every refuge they had
  chosen_spanish: en todo refugio
  alternatives_spanish:
  - en cada lugar de refugio
  - en cada escondite
  - en todo lugar de escape
  lexicon: LSJ
  rationale: φυγαδευτήριον designa un lugar de refugio o escape para fugitivos. «Refugio» es la correspondencia más clara en español y evita repetir el elemento de ocultamiento de ἐν κρυφίοις.
- source_word: αὐτῶν
  english_pob_choice: they had
  chosen_spanish: que tenían
  alternatives_spanish:
  - suyo
  - de ellos
  - que poseían
  lexicon: LSJ
  rationale: El pronombre posesivo se entiende naturalmente como referencia a los lugares de refugio disponibles para ellos. «Que tenían» reproduce la relación posesiva de manera fluida en español.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que sustituyó «put» por «drove» para marcar más fuerza en la acción, pero en español se optó por «pusieron» porque el griego permite una formulación más sobria sin sobretraducir la violencia implícita.
  spanish_consistency_notes:
  - Se mantiene «Israel» como colectivo singular, conforme al griego.
  - «Refugio» se usa una sola vez para no duplicar el matiz de ocultación.
  - La nota alternativa queda anclada en el texto con [a], sin pies sueltos.
