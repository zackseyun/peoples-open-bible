translation:
  language: es
  text: Y el rey David dejó de salir hacia Absalón[a], porque se había consolado por Amnón, porque había muerto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y el espíritu del rey David dejó de salir hacia Absalón», o «el rey David dejó de salir contra Absalón». El hebreo de la cláusula inicial es difícil, y algunos lo entienden como el apaciguamiento de la ira de David más que como su deseo de ver a Absalón.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתְּכַל
  english_pob_choice: ceased to go out
  chosen_spanish: dejó de salir
  alternatives_spanish:
  - cesó de salir
  - dejó de ir
  - anheló salir
  lexicon: HALOT
  rationale: 'El hebreo es difícil en esta cláusula inicial. Dado el ajuste revisado en el inglés POB, tomo el valor de cese/terminación en un español natural: «dejó de salir». Conserva la idea de interrupción sin sobrecargar la frase con una paráfrasis interpretativa.'
- source_word: לָצֵאת אֶל
  english_pob_choice: to go out to
  chosen_spanish: salir hacia
  alternatives_spanish:
  - ir hacia
  - salir a
  - salir para
  lexicon: HALOT
  rationale: יצא con אֶל conserva la imagen de movimiento dirigido. «Salir hacia» comunica bien la dirección y evita un giro demasiado literal o pesado.
- source_word: דָּוִד הַמֶּלֶךְ
  english_pob_choice: King David
  chosen_spanish: David, el rey
  alternatives_spanish:
  - el rey David
  - David el rey
  lexicon: uso idiomático / orden sintáctico español
  rationale: El inglés POB usa la inversión idiomática «King David». En español, «David, el rey» mantiene la aposición clara y digna sin perder el referente real.
- source_word: נִחַם עַל
  english_pob_choice: was comforted concerning
  chosen_spanish: se había consolado respecto de
  alternatives_spanish:
  - se había consolado sobre
  - había sido consolado acerca de
  - se había resignado respecto de
  lexicon: HALOT
  rationale: נחם en nifal suele expresar consuelo. «Se había consolado respecto de» conserva el valor básico y la relación con la persona afectada, sin convertirlo en una interpretación más fuerte que el hebreo.
- source_word: עַל אַמְנ֖וֹן
  english_pob_choice: concerning Amnon
  chosen_spanish: respecto de Amnón
  alternatives_spanish:
  - acerca de Amnón
  - por Amnón
  - sobre Amnón
  lexicon: uso preposicional español
  rationale: «Respecto de» es formal y transparente, apto para registrar que la consolación/reconciliación de David está vinculada a Amnón.
- source_word: כִּי מֵת
  english_pob_choice: since he was dead
  chosen_spanish: ya que estaba muerto
  alternatives_spanish:
  - puesto que estaba muerto
  - porque había muerto
  - pues estaba muerto
  lexicon: HALOT
  rationale: 'La segunda כִּי introduce la base causal del consuelo: Amnón estaba muerto. «Ya que» suena natural en español y preserva la relación causal sin añadir matices no presentes.'
theological_decisions:
- issue: 'Cláusula inicial hebrea ambigua: cese de movimiento vs. cese de anhelo/ira'
  english_pob_reading: The Hebrew of the opening clause is difficult; some understand it as David's anger subsiding rather than his longing to see Absalom.
  chosen_spanish_reading: David dejó de salir hacia Absalón
  alternative_spanish_readings:
  - David anhelaba salir hacia Absalón
  - El espíritu de David dejó de salir hacia Absalón
  - David dejó de ir contra Absalón
  rationale: La evidencia permite más de una lectura. Elijo una forma principal neutra y comunicativa que siga la revisión inglesa más reciente, sin borrar la tensión textual. La nota preserva las alternativas donde el hebreo puede sugerir también un movimiento interior o incluso una lectura adversativa.
  doctrine_reference: N/A
- issue: 'נחם con עַל: consuelo real, no simple cambio de opinión'
  english_pob_reading: was comforted concerning Amnon
  chosen_spanish_reading: se había consolado respecto de Amnón
  alternative_spanish_readings:
  - se había arrepentido respecto de Amnón
  - se había resignado respecto de Amnón
  rationale: No hay base suficiente para traducir נחם aquí como arrepentimiento; el contexto de la muerte de Amnón favorece el consuelo o la aceptación del hecho. Mantengo el consuelo como sentido primario, reconociendo que el hebreo puede incluir la idea de acomodarse a la pérdida.
  doctrine_reference: HALOT; uso contextual de נחם
translation_notes:
  revision_awareness: El inglés POB revisó esta línea desde «longed to go out» a «ceased to go out», por considerar que la lectura de cese se ajusta mejor al hebreo y al contexto. El español sigue esa revisión principal, pero conserva la ambigüedad documentada de la cláusula inicial mediante nota.
  spanish_consistency_notes:
  - Mantengo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Uso «Amnón» y «Absalón» con acentos habituales en español bíblico.
  - Conservo un tono sobrio y narrativo, sin añadir matices devocionales que el hebreo no exige.
