translation:
  language: es
  text: Y llamaron a Achior de la casa de Ozías. Cuando llegó y vio la cabeza de Holofernes en la mano de un hombre en la asamblea del pueblo, cayó rostro en tierra, y su espíritu[a] desfalleció.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se le fue el aliento» / «perdió el conocimiento». El griego dice literalmente: «su espíritu desfalleció», un modismo para un colapso físico o desmayo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάλεσαν
  english_pob_choice: they called
  chosen_spanish: llamaron
  alternatives_spanish:
  - convocaron
  - llamaron para que viniera
  lexicon: BDAG
  rationale: «Llamaron» refleja el verbo simple del griego con naturalidad narrativa. «Convocaron» sería algo más fuerte y más institucional de lo que exige el contexto.
- source_word: τὸν Ἀχιὼρ
  english_pob_choice: Achior
  chosen_spanish: Achior
  lexicon: BDAG
  rationale: Nombre propio transliterado de forma directa, sin adaptación interpretativa.
- source_word: ἐκ τοῦ οἴκου Ὀζεία
  english_pob_choice: out of the house of Ozias
  chosen_spanish: de la casa de Ozías
  alternatives_spanish:
  - fuera de la casa de Ozías
  - desde la casa de Ozías
  lexicon: BDAG
  rationale: En español, «de la casa de» transmite el origen o procedencia de manera más natural que una calca rígida de «fuera de». Mantiene el sentido de extracción desde esa casa sin forzar el español.
- source_word: ὡς δὲ ἦλθεν
  english_pob_choice: When he came
  chosen_spanish: Cuando llegó
  alternatives_spanish:
  - Y cuando llegó
  - Cuando vino
  lexicon: BDAG
  rationale: «Cuando llegó» expresa bien el inicio temporal de la cláusula y evita sobrecargar δέ con una oposición que no es necesaria en español.
- source_word: ἴδεν τὴν κεφαλὴν Ὀλοφέρνου
  english_pob_choice: saw the head of Holofernes
  chosen_spanish: vio la cabeza de Holofernes
  alternatives_spanish:
  - vio la cabeza de Holofernes
  - vio a Holofernes decapitado
  lexicon: BDAG
  rationale: Se conserva la referencia explícita a «la cabeza de Holofernes», sin ampliar el sentido con una paráfrasis que el griego no dice directamente.
- source_word: ἐν χειρὶ ἀνδρὸς ἑνός
  english_pob_choice: in the hand of a man
  chosen_spanish: en la mano de un hombre
  alternatives_spanish:
  - en la mano de un solo hombre
  - en la mano de un hombre
  lexicon: BDAG
  rationale: «En la mano de un hombre» es la forma más natural en español y mantiene el dato singular. No se destaca «uno» de modo artificial, aunque el griego sí subraya la singularidad.
- source_word: ἐν τῇ ἐκκλησίᾳ τοῦ λαοῦ
  english_pob_choice: in the assembly of the people
  chosen_spanish: en la asamblea del pueblo
  alternatives_spanish:
  - en la congregación del pueblo
  - en la reunión del pueblo
  lexicon: BDAG
  rationale: «Asamblea» conserva el valor contextual de ἐκκλησία como reunión pública en este relato judío precristiano, sin introducir el sentido eclesiástico posterior de «iglesia».
- source_word: ἔπεσεν ἐπὶ πρόσωπον
  english_pob_choice: he fell on his face
  chosen_spanish: cayó sobre su rostro
  alternatives_spanish:
  - cayó de rostro en tierra
  - se postró rostro en tierra
  lexicon: BDAG
  rationale: «Cayó sobre su rostro» es fiel al hebraísmo/idioma griego y, aunque solemne, suena idiomático en español bíblico. «Se postró» podría sugerir una acción más voluntaria de adoración que aquí no está en primer plano.
- source_word: ἐξελύθη τὸ πνεῦμα αὐτοῦ
  english_pob_choice: his spirit failed
  chosen_spanish: su espíritu desfalleció
  alternatives_spanish:
  - se le fue el aliento
  - perdió el conocimiento
  - su espíritu se desvaneció
  lexicon: BDAG
  rationale: '«Desfalleció» preserva la ambigüedad del griego: puede referirse a desmayo, colapso físico o abatimiento súbito. En español mantiene mejor la tensión entre literalidad e idiomatismo que una explicación más interpretativa.'
theological_decisions:
- issue: Sentido de ἐκκλησία en un contexto judío anterior al cristianismo
  english_pob_reading: in the assembly of the people
  chosen_spanish_reading: en la asamblea del pueblo
  alternative_spanish_readings:
  - en la congregación del pueblo
  - en la iglesia del pueblo
  rationale: Se evita «iglesia», porque el pasaje describe una reunión del pueblo, no una institución cristiana posterior. «Asamblea» respeta el contexto histórico y el valor semántico de ἐκκλησία aquí.
  doctrine_reference: Historia de la salvación / uso contextual del vocabulario comunitario
- issue: ἐξελύθη τὸ πνεῦμα αὐτοῦ como colapso físico o pérdida del aliento
  english_pob_reading: his spirit failed
  chosen_spanish_reading: su espíritu desfalleció
  alternative_spanish_readings:
  - se le fue el aliento
  - perdió el conocimiento
  - su espíritu se desvaneció
  rationale: El texto griego permite una lectura idiomática de debilitamiento súbito o desmayo. «Desfalleció» conserva esa tensión sin cerrar indebidamente el sentido a una sola explicación.
  doctrine_reference: Antropología bíblica / lenguaje idiomático del espíritu
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado desde «But when he came...» a «When he came...», y de «one man» a «a man». La versión española sigue esa revisión con una cláusula temporal simple («Cuando llegó») y una expresión natural («un hombre») sin perder la singularidad implícita del griego.
  spanish_consistency_notes:
  - Se mantiene «Achior» y «Ozías» como transliteraciones consistentes con el proyecto.
  - Se usa «asamblea» para ἐκκλησία, evitando el término eclesiástico cristiano.
  - Se conserva la imagen corporal directa de «cayó sobre su rostro», acorde con el griego.
  - «Su espíritu desfalleció» deja abierta la ambigüedad idiomática del original.
