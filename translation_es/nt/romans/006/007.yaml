  source_alignment_summary: 'El borrador refleja bien la sintaxis y el sentido básico del griego: ὁ ... ἀποθανών se vierte naturalmente como «el que ha muerto», γάρ como explicación, δεδικαίωται conserva el valor judicial principal con «ha sido justificado», y ἀπὸ τῆς ἁμαρτίας como separación «del pecado». Sin embargo, la nota [b] introduce «absuelto», que no corresponde al audit trail inglés revisado, donde las alternativas preservadas son «justified» y contextualmente «freed».'
  spanish_quality_summary: 'El español es claro y digno. La frase principal suena natural y fiel. La única reparación necesaria es en las notas: [a] es defendible, pero [b] debe alinearse mejor con la decisión léxica/auditada y con el hecho de que «justificado del pecado» ya aparece en el texto principal, por lo que la alternativa debe priorizar la liberación contextual y, si se conserva otra, no desplazar indebidamente el término con «absuelto».'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «justificado» para δικαιόω y «pecado» para ἁμαρτία están bien. La revisión propuesta mantiene la tensión teológica documentada entre sentido forense y resultado liberador.
  issues:
  - severity: medium
    issue: La nota [b] usa «ha sido absuelto del pecado» como alternativa principal.
    rationale: El audit trail inglés revisado fijó «has been justified from sin» en el texto principal y preservó como alternativas «has been justified from sin» y contextualmente «has been freed from sin». «Absuelto» puede ser explicativo, pero no es la alternativa preservada y desplaza el campo semántico más de lo deseable.
  - severity: low
    issue: La nota [b] repite implícitamente una alternativa demasiado cercana al texto principal sin reflejar con precisión la tensión documentada.
    rationale: Conviene que la nota haga explícita la opción contextual de liberación y mantenga «justificado» como base, en vez de introducir un reemplazo forense distinto.
  revised_spanish_text: Porque el que ha muerto[a] ha sido justificado[b] del pecado.
  revised_footnotes:
  - marker: a
    text: O, «murió»; el participio aoristo puede expresar simplemente el hecho de haber muerto.
