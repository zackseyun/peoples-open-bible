translation:
  text: But there was no food in the holy place[a], because it was the seventh year[b], and those who had escaped into Judea from the nations had eaten up the remnant of the supplies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the seventh-year sabbatical year, when agricultural production was restricted; this explains the shortage of food.
    reason: cultural_note
  - marker: b
    text: Or 'from the Gentiles.' The Greek says 'from the nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βρώματα
  chosen: food
  alternatives:
  - provisions
  - things to eat
  lexicon: LSJ
  rationale: A broad term for edible supplies. 'Food' is natural English and fits the military-siege context without over-specifying.
- source_word: ἐν τοῖς ἁγίοις
  chosen: in the sanctuary
  alternatives:
  - in the holy places
  - in the holy precincts
  lexicon: LSJ
  rationale: The plural neuter with article literally means 'in the holy [places],' but in context refers to the temple complex/holy precinct where supplies were lacking. 'In the sanctuary' gives clear English while preserving the sacred location.
- source_word: διὰ τὸ ἕβδομον ἔτος εἶναι
  chosen: because it was the seventh year
  alternatives:
  - because it was a sabbatical year
  - because the seventh year had come
  lexicon: LSJ
  rationale: The Greek states the reason plainly. 'Because it was the seventh year' is closest to the wording; the implication of the sabbatical year is real but better left implicit in the main text rather than imported.
- source_word: οἱ ἀνασωζόμενοι
  chosen: those who had escaped
  alternatives:
  - those who were being saved
  - the survivors
  - those who had been rescued
  lexicon: LSJ
  rationale: In this context the participle refers to people who had gotten away safely and come into Judea. 'Those who had escaped' best captures the sense in idiomatic English.
- source_word: εἰς τὴν Ἰουδαίαν
  chosen: into Judea
  alternatives:
  - to Judea
  lexicon: LSJ
  rationale: εἰς naturally indicates movement into the region; 'into Judea' preserves that nuance.
- source_word: ἀπὸ τῶν ἐθνῶν
  chosen: from the nations
  alternatives:
  - from the Gentiles
  - from the foreign peoples
  lexicon: LSJ
  rationale: ἐθνῶν here denotes surrounding non-Jewish peoples/territories. 'From the nations' is a transparent rendering that preserves the Jewish-Greek idiom without forcing the more theologically loaded 'Gentiles'.
- source_word: κατέφαγον
  chosen: had eaten up
  alternatives:
  - consumed
  - devoured
  lexicon: LSJ
  rationale: 'The compound verb is intensive: they had consumed what remained. ''Had eaten up'' is vivid and natural.'
- source_word: τὸ ὑπόλιμμα
  chosen: the remnant
  alternatives:
  - what was left
  - the remainder
  lexicon: LSJ
  rationale: The noun denotes what remains. 'The remnant' is concise and faithful, though here it refers to supplies rather than a theological remnant.
- source_word: τῆς παραθέσεως
  chosen: of the stored provisions
  alternatives:
  - of the reserve supply
  - of the laid-up stores
  - of the setting forth
  lexicon: LSJ
  rationale: The noun can denote a setting out or presentation, but in this context of food shortage it refers to provisions set aside or laid up. 'Stored provisions' best fits the immediate sense.
