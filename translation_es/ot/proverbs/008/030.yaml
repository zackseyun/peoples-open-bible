revisions:
- from: Entonces yo estaba junto a él[a], como un maestro obrero; y yo era su delicia día tras día, regocijándome delante de él en todo tiempo[b],
  to: Entonces yo estaba junto a él[a], como un artífice experto; y yo era su delicia día tras día, alegrándome delante de él en todo tiempo[b],
  rationale: Se propone una reparación menor, no exegética sino estilístico-lexical. ‘Artífice experto’ expresa con mayor naturalidad en español la lectura principal de אָמוֹן adoptada por el POB inglés, sin suprimir la ambigüedad preservada en la nota. ‘Alegrándome’ mantiene el valor de מְשַׂחֶקֶת como actividad gozosa y deja la alternativa más literal ‘jugando’ en la nota, conforme al rastro de auditoría.
