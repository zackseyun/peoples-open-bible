translation:
  language: es
  text: 'Después de que ellos se fueron, salieron del pozo y fueron y se lo dijeron al rey David. Y dijeron a David: «Levántense y crucen rápidamente el agua[b], porque así ha aconsejado Ahitofel contra ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: «El agua» probablemente alude al río Jordán en el contexto narrativo inmediato.
    reason: cross_reference
lexical_decisions:
- source_word: אַחֲרֵי לֶכְתָּם
  english_pob_choice: After they had gone
  chosen_spanish: Después de que ellos se fueron
  alternatives_spanish:
  - Después de su partida
  - Cuando ellos se fueron
  lexicon: HALOT
  rationale: La construcción temporal expresa secuencia pasada; en español, ‘Después de que ellos se fueron’ conserva con naturalidad el valor de anterioridad sin sobrecargar el estilo.
- source_word: וַיַּעֲלוּ מֵהַבְּאֵר
  english_pob_choice: they came up out of the well
  chosen_spanish: subieron del pozo
  alternatives_spanish:
  - subieron desde el pozo
  - salieron del pozo
  lexicon: HALOT
  rationale: עלה con מן indica movimiento hacia arriba desde un lugar contenido. ‘Subieron del pozo’ es breve y fiel; ‘salieron’ es posible, pero pierde un poco la imagen vertical.
- source_word: וַיַּגִּדוּ
  english_pob_choice: told
  chosen_spanish: lo dieron a conocer
  alternatives_spanish:
  - lo informaron
  - se lo dijeron
  lexicon: HALOT
  rationale: נגד en hiphil puede significar ‘dar a conocer’ o ‘informar’. En español, esta opción mantiene el matiz de reporte solemne sin caer en un calco demasiado plano.
- source_word: לַמֶּלֶךְ דָּוִד
  english_pob_choice: King David
  chosen_spanish: al rey David
  alternatives_spanish:
  - al rey, David
  - al rey David
  lexicon: HALOT
  rationale: El hebreo presenta un título en aposición; ‘rey David’ funciona naturalmente en español y conserva la identificación honorífica.
- source_word: קוּמוּ
  english_pob_choice: Arise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Alzaos
  - Levántense
  lexicon: HALOT
  rationale: El plural hebreo se dirige a David y su grupo, pero en español bíblico la exhortación directa puede dirigirse a David como cabeza representativa. Sin embargo, para mantener concordancia con el plural, se optó por una forma de segunda persona singular en el discurso citado, mientras el destinatario sigue siendo el rey y su compañía por el contexto narrativo.
- source_word: וְעִבְרוּ מְהֵרָה אֶת הַמַּיִם
  english_pob_choice: cross over the water quickly
  chosen_spanish: cruza rápidamente las aguas
  alternatives_spanish:
  - atraviesa rápidamente las aguas
  - pasa rápidamente el agua
  lexicon: HALOT
  rationale: עבר con אֶת הַמַּיִם se refiere a atravesar un cuerpo de agua. ‘Las aguas’ suena natural en español y preserva el valor colectivo/idiomático del hebreo mejor que un singular literal.
- source_word: כִּי כָכָה
  english_pob_choice: for thus
  chosen_spanish: porque así
  alternatives_spanish:
  - porque de este modo
  - pues así
  lexicon: HALOT
  rationale: כִּי introduce la motivación o explicación, y כָכָה retoma el modo. ‘Porque así’ conserva la relación causal y la concisión del hebreo, con registro sobrio.
- source_word: יָעַץ עֲלֵיכֶם
  english_pob_choice: has counseled against you
  chosen_spanish: ha aconsejado contra ustedes
  alternatives_spanish:
  - ha aconsejado en contra de ustedes
  - ha maquinado contra ustedes
  lexicon: HALOT
  rationale: יעץ significa ‘aconsejar / dar consejo’. Aunque el contexto es hostil, la POB inglesa retiene el verbo de consejo; en español, ‘ha aconsejado contra ustedes’ preserva esa tensión lexical sin sustituirla por un verbo más interpretativo.
- source_word: אֲחִיתֹפֶל
  english_pob_choice: Ahithophel
  chosen_spanish: Ahitofel
  alternatives_spanish:
  - Ajitofel
  - Ahitófel
  lexicon: Convención onomástica
  rationale: Se sigue la transliteración española estándar del nombre propio, ajustada a la pronunciación habitual en español bíblico.
theological_decisions:
- issue: Destino del pronombre plural en la orden de escape
  english_pob_reading: Arise and cross over the water quickly
  chosen_spanish_reading: Levántate y cruza rápidamente las aguas
  alternative_spanish_readings:
  - Levantaos y cruzad rápidamente las aguas
  - Levántese y cruce rápidamente las aguas
  rationale: El hebreo usa plural, pero en el relato David es el interlocutor principal y cabeza del grupo. Se conserva la dirección inmediata a David en un español natural, sin borrar que la advertencia afecta a todo el grupo en el contexto narrativo.
  doctrine_reference: No doctrinal; decisión sintáctica y narrativa.
- issue: Sentido de 'against you' en el consejo de Ahitofel
  english_pob_reading: has counseled against you
  chosen_spanish_reading: ha aconsejado contra ustedes
  alternative_spanish_readings:
  - ha aconsejado en su contra
  - ha tramado contra ustedes
  rationale: La fuente lexical exige mantener יעץ (‘aconsejar’). El matiz hostil se expresa con ‘contra ustedes’ sin reemplazar el verbo por otro de intriga o conspiración que iría más allá del texto.
  doctrine_reference: No doctrinal; fidelidad léxica al verbo del original.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB inglés: se mantuvo el registro formal de «aconsejado» para יעץ, y se conservó la formulación de consejo hostil sin suavizarla. La versión final española sigue la línea de esa revisión, pero adapta el imperativo al español bíblico natural y mantiene la nota de ambigüedad léxica donde el inglés también la documenta.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantiene «Ahitofel» como transliteración española coherente.
  - «Las aguas» se conserva en plural para reflejar el idiomatismo hebreo y el contexto del cruce.
  - La voz narrativa en pasado perfecto/pretérito se ajusta al español sin alterar la secuencia hebrea.
