id: 1TH.3.2
reference: 1 Thessalonians 3:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἐπέμψαμεν Τιμόθεον, τὸν ἀδελφὸν ἡμῶν καὶ ⸀συνεργὸν τοῦ ⸀θεοῦ ἐν τῷ εὐαγγελίῳ τοῦ Χριστοῦ, εἰς τὸ στηρίξαι ὑμᾶς καὶ παρακαλέσαι ⸀ὑπὲρ τῆς πίστεως ὑμῶν
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/003/002.yaml
  text: and we sent Timothy[a], our brother and God's fellow worker in the gospel of the Messiah, to strengthen you and to encourage you concerning your faith[b],
  footnotes:
  - marker: a
    text: Or, 'co-worker with God.' Some manuscripts and translations have a different wording here, such as 'servant of God.'
    reason: alternative_reading
  - marker: b
    text: Greek 'Christ'; translated 'Messiah' here because the title sense is prominent.
    reason: lexical_alternative
translation:
  language: ko
  text: 그리고 우리는 우리의 형제이며 메시아[b]의 복음 안에서 하나님의 동역자[a]인 디모데를 보내어, 여러분을 굳건하게 하고 여러분의 믿음을 위하여 권면하게 하였습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「하나님과 함께 일하는 자」. 일부 사본과 번역은 「하나님의 일꾼」 등 다른 표현을 가진다.
    reason: alternative_reading
  - marker: b
    text: 헬라어 「그리스도」. 본 번역은 칭호로서의 의미가 분명한 곳에서 「메시아」로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸν ἀδελφὸν ἡμῶν καὶ συνεργὸν τοῦ θεοῦ
  english_pob_choice: our brother and God's fellow worker
  chosen_korean: 우리의 형제이며 ... 하나님의 동역자
  alternatives_korean:
  - 우리의 형제요 하나님과 함께 일하는 자
  - 우리 형제이며 하나님의 일꾼
  lexicon: BDAG
  rationale: συνεργός τοῦ θεοῦ는 신학적으로 무게 있는 표현. 「하나님의 동역자」가 한국 교회 전통에 정착되어 있으며 신학적 함의를 그대로 담는다.
- source_word: ἐν τῷ εὐαγγελίῳ τοῦ Χριστοῦ
  english_pob_choice: in the gospel of the Messiah
  chosen_korean: 메시아의 복음 안에서
  alternatives_korean:
  - 그리스도의 복음 안에서
  - 메시아에 관한 복음 안에서
  lexicon: BDAG
  rationale: 칭호 Χριστός를 일관되게 「메시아」로 옮긴다. 「안에서」가 사역의 영역을 자연스럽게 표현한다.
- source_word: στηρίξαι
  english_pob_choice: to strengthen
  chosen_korean: 굳건하게 하고
  alternatives_korean:
  - 견고하게 하고
  - 강하게 하고
  lexicon: BDAG
  rationale: στηρίζω의 「확고히 세우다」 의미. 「굳건하게 하다」가 영적 견고함을 자연스럽게 담는다.
- source_word: παρακαλέσαι ὑπὲρ τῆς πίστεως ὑμῶν
  english_pob_choice: to encourage you concerning your faith
  chosen_korean: 여러분의 믿음을 위하여 권면하게
  alternatives_korean:
  - 여러분의 믿음에 관하여 권면하게
  - 여러분의 믿음을 격려하게
  lexicon: BDAG
  rationale: ὑπέρ + 속격의 「~을 위하여·관하여」 의미. 여기서는 「위하여」가 권면의 목적을 더 분명히 담는다.
