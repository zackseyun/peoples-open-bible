translation:
  language: es
  text: Israel es salvo[a] por Yahvé con una salvación eterna; no serán avergonzados[b] ni humillados por siempre jamás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en Yahvé'; la preposición hebrea puede expresar esfera además de agencia.
    reason: alternative_reading
  - marker: b
    text: O 'no se avergonzarán ni serán humillados'.
    reason: lexical_alternative
lexical_decisions:
- source_word: נוֹשַׁע
  english_pob_choice: is saved
  chosen_spanish: es salvado
  alternatives_spanish:
  - ha sido salvado
  - será salvado
  - es liberado
  lexicon: HALOT
  rationale: El nifal de ישׁע expresa aquí la acción salvadora efectiva de Yahvé sobre Israel. En español, el presente pasivo 'es salvado' conserva bien el valor de estado/resultación profética sin forzar un tiempo pasado o futuro más cerrado de lo que el hebreo permite.
- source_word: בַּ/יהוָה
  english_pob_choice: by Yahweh
  chosen_spanish: por Yahvé
  alternatives_spanish:
  - en Yahvé
  - por medio de Yahvé
  lexicon: HALOT
  rationale: La preposición ב puede expresar esfera o instrumento/agencia. En una construcción pasiva, 'por Yahvé' comunica de manera natural la agencia efectiva, mientras que la nota conserva la alternativa de esfera que el hebreo también permite.
- source_word: יהוה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: ''Yahvé''. Esto preserva el nombre pactal en lugar de enmascararlo con un título.'
- source_word: תְּשׁוּעַת עוֹלָמִים
  english_pob_choice: with an everlasting salvation
  chosen_spanish: con una salvación eterna
  alternatives_spanish:
  - con una salvación perpetua
  - con una salvación de siglos
  lexicon: HALOT
  rationale: La construcción en hebreo literalmente dice 'salvación de eternidades/siglos'. 'Salvación eterna' es la equivalencia más natural en español y mantiene la fuerza durativa. Se evita expandirla a una paráfrasis más interpretativa.
- source_word: לֹא תֵבֹשׁוּ
  english_pob_choice: you will not be put to shame
  chosen_spanish: no serán avergonzados
  alternatives_spanish:
  - no se avergonzarán
  - no serán puestos en vergüenza
  lexicon: HALOT
  rationale: בושׁ expresa la experiencia de vergüenza o deshonra pública. 'Ser avergonzados' conserva esa dimensión resultativa y evita reducirlo a una simple emoción interna.
- source_word: וְלֹא תִכָּלְמ֖וּ
  english_pob_choice: or disgraced
  chosen_spanish: ni humillados
  alternatives_spanish:
  - ni deshonrados
  - ni confundidos
  lexicon: HALOT
  rationale: כלם añade el matiz de humillación/deshonra. 'Humillados' permite mantener la distinción poética con בושׁ sin volverlo mera repetición exacta. Se conserva la fuerza negativa del paralelo.
- source_word: עַד עוֹלְמֵי עַד
  english_pob_choice: forever and ever
  chosen_spanish: para siempre y para siempre
  alternatives_spanish:
  - por los siglos de los siglos
  - para siempre jamás
  lexicon: HALOT
  rationale: El idiomático hebreo intensifica la perpetuidad. 'Para siempre y para siempre' refleja la repetición enfática del original sin introducir una fórmula eclesiástica que no sea necesaria.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio del pacto, conforme al criterio doctrinal del proyecto, en lugar de sustituirlo por un título. Esto conserva la transparencia respecto del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de ב en ביהוה
  english_pob_reading: by the LORD
  chosen_spanish_reading: por Yahvé
  alternative_spanish_readings:
  - en Yahvé
  - por medio de Yahvé
  rationale: El hebreo admite agencia y esfera. Dado el pasivo, la lectura agentiva es la más natural en español; sin embargo, se deja constancia de que el hebreo también puede sugerir esfera.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El testimonio inglés reciente no requirió cambios de fondo; se mantiene la línea de traducción óptima con las decisiones léxicas y teológicas ya auditadas, pero ajustadas al criterio español del proyecto para el nombre divino.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar para יהוה en español.
  - Se evita 'Cristo' o terminología eclesial no pertinente.
  - Se conserva la paridad poética entre vergüenza/humillación sin diluirla en una sola idea.
  - La repetición intensiva final se traduce de manera literal-natural para respetar el énfasis del hebreo.
