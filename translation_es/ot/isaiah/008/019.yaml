  - severity: medium
    issue: La nota existente no reproduce plenamente las alternativas documentadas para אֹבוֹת.
    rationale: La nota inglesa menciona como alternativas ‘los fantasmas’ / ‘los que tienen espíritus familiares’ y explica que probablemente se refiere a practicantes necrománticos; el español actual resume esto, pero no preserva claramente esas alternativas.
