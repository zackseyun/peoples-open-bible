review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el contraste básico del hebreo: el necio exterioriza sin freno su רוּחַ y el sabio la contiene. Sin embargo, «Todo espíritu lo saca el necio» suena poco natural en español y debilita la referencia posesiva de רוּחוֹ («su espíritu»). Además, el orden español actual hace ambiguo el sujeto y el objeto.'
  spanish_quality_summary: La redacción necesita un ajuste menor para sonar idiomática y clara en español bíblico moderno. «El necio deja salir todo su espíritu» preserva mejor la imagen hebrea y evita la construcción forzada «Todo espíritu lo saca». La segunda mitad, «pero el sabio lo retiene», es aceptable y natural.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Espíritu» para רוּחַ sigue la decisión auditada; la nota con alternativas es apropiada, aunque conviene incluir «su» también en la glosa principal para reflejar el hebreo. No hay términos teológicos sensibles aquí.
  issues:
  - severity: medium
    issue: Falta el posesivo de רוּחוֹ en el texto principal.
    rationale: El hebreo dice literalmente «su espíritu». Omitir «su» hace la frase más abstracta y menos fiel al referente interno del proverbio.
  - severity: medium
    issue: La construcción «Todo espíritu lo saca el necio» es poco idiomática en español.
    rationale: Aunque intenta conservar la imagen de «sacar», en español suena forzada y puede dificultar la comprensión inmediata. «Deja salir» o «saca todo su espíritu» funcionan mejor.
  - severity: low
    issue: La nota al pie puede alinearse mejor con la formulación revisada del texto principal.
    rationale: Conviene que la alternativa refleje también el posesivo y la posibilidad de «carácter/temperamento» o «ánimo» sin sobreinterpretar.
