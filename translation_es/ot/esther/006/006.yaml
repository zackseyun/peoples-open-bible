translation:
  language: es
  text: 'Entonces Hamán entró, y el rey le dijo: «¿Qué se debe hacer por el hombre a quien el rey se complace en honrar?». Y Hamán dijo en su corazón[a]: «¿A quién querría el rey honrar más que a mí?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y Hamán se dijo a sí mismo». El hebreo dice literalmente: «dijo en su corazón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבוֹא
  english_pob_choice: So Haman came in
  chosen_spanish: Así que Haman entró
  alternatives_spanish:
  - Entonces Haman entró
  - Y Haman entró
  lexicon: HALOT
  rationale: La forma wayyiqtol avanza la narración; «Así que» conserva la continuidad narrativa del hebreo y «entró» expresa de manera natural la llegada a la presencia real.
- source_word: וַיֹּאמֶר לוֹ הַמֶּלֶךְ
  english_pob_choice: and the king said to him
  chosen_spanish: y el rey le dijo
  alternatives_spanish:
  - y el rey le preguntó
  - y el rey habló con él
  lexicon: HALOT
  rationale: אָמַר se traduce de forma directa como «decir». Aunque el contenido es una pregunta, mantener «le dijo» respeta la forma verbal del hebreo sin perder naturalidad en español.
- source_word: מַה לַעֲשׂוֹת
  english_pob_choice: What should be done
  chosen_spanish: ¿Qué se debe hacer?
  alternatives_spanish:
  - ¿Qué habría que hacer?
  - ¿Qué ha de hacerse?
  lexicon: HALOT
  rationale: La construcción expresa qué corresponde hacer en esta situación. «Se debe hacer» reproduce bien el valor impersonal/pasivo de la frase hebrea y su sentido normativo.
- source_word: בָּאִישׁ
  english_pob_choice: for the man
  chosen_spanish: para el hombre
  alternatives_spanish:
  - para ese hombre
  - al hombre
  lexicon: HALOT
  rationale: Con este giro idiomático, el español más natural es «para el hombre». El artículo definido conserva la referencia específica, aunque todavía no nombrada.
- source_word: אֲשֶׁר הַמֶּלֶךְ חָפֵץ
  english_pob_choice: whom the king delights
  chosen_spanish: a quien el rey desea honrar
  alternatives_spanish:
  - a quien el rey se complace en honrar
  - a quien el rey quiere honrar
  lexicon: HALOT
  rationale: חָפֵץ aquí puede expresar deleite o preferencia. En español, «desea honrar» mantiene el impulso volitivo del verbo y se integra con naturalidad con el infinitivo siguiente; se evita suavizarlo excesivamente con una formulación más interpretativa.
- source_word: בִּיקָרוֹ
  english_pob_choice: to honor
  chosen_spanish: honrar
  alternatives_spanish:
  - rendir honor a
  - dar honor a
  lexicon: HALOT
  rationale: יְקָר/יקר en este contexto alude al honor conferido por el rey. «Honrar» resume bien la acción sin perder el valor de prestigio o estima inherente al sustantivo.
- source_word: וַיֹּאמֶר הָמָן בְּלִבּוֹ
  english_pob_choice: And Haman said in his heart
  chosen_spanish: Y Haman dijo en su corazón
  alternatives_spanish:
  - Y Haman pensó para sí
  - Y Haman se dijo a sí mismo
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente discurso interior. «Dijo en su corazón» preserva la imagen original; «pensó» sería más interpretativo. La nota permite ver la alternativa idiomática sin borrar la metáfora hebrea.
- source_word: לְמִי יַחְפֹּץ הַמֶּלֶךְ
  english_pob_choice: Whom would the king delight
  chosen_spanish: ¿A quién querría el rey honrar
  alternatives_spanish:
  - ¿A quién desearía el rey honrar
  - ¿A quién se complacerá el rey en honrar
  lexicon: HALOT
  rationale: 'Se mantiene la fuerza de חָפֵץ como deseo/preferencia, pero en español resulta más claro unirlo con el infinitivo posterior: «querría honrar». Esto refleja la inferencia mental de Haman y conserva el paralelismo del versículo.'
- source_word: לַעֲשׂוֹת יְקָר
  english_pob_choice: to honor
  chosen_spanish: honrar
  alternatives_spanish:
  - rendir honor
  - hacer honor
  lexicon: HALOT
  rationale: La collocación significa conferir honor. «Honrar» es la opción más directa y fluida en español, y mantiene el sentido del sustantivo יְקָר en un registro digno y bíblico.
- source_word: יוֹתֵר מִמֶּנִּי
  english_pob_choice: more than me
  chosen_spanish: más que a mí
  alternatives_spanish:
  - más que yo
  - más que a mí mismo
  lexicon: HALOT
  rationale: La comparación expresa la autoevaluación de Haman. En español, «más que a mí» es la formulación más natural dentro de la pregunta retórica y conserva el matiz de rivalidad implícita.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español. No se añadieron notas sin ancla en el versículo.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se mantuvo «honrar/honor» para יְקָר y el verbo asociado, evitando sustituirlo por vocabulario eclesiástico no atestiguado.
  - Se preservó la metáfora hebrea «dijo en su corazón» con nota alternativa para la lectura idiomática.
  - El tono es sobrio y de lectura pública, sin calcos innecesarios ni ampliaciones interpretativas.
