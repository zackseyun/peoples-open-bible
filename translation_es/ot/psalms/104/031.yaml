  - marker: b
    text: 'O: «sobre sus obras». El hebreo בְּ puede señalar también una relación más amplia con las obras de Yahvé.'
    reason: lexical_alternative
  revision_rationale: 'La revisión conserva plenamente el sentido fuente y las notas del POB, pero mejora la naturalidad y la dignidad del español: se elimina la exclamación innecesaria propia de una interpretación enfática no exigida por el hebreo, y se eleva ligeramente el registro poético con «regocíjese», que refleja bien el deseo paralelo de יִשְׂמַח.'
