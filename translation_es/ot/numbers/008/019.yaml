  text: וָ/אֶתְּנָ֨/ה אֶת הַ/לְוִיִּ֜ם נְתֻנִ֣ים לְ/אַהֲרֹ֣ן וּ/לְ/בָנָ֗י/ו מִ/תּוֹךְ֮ בְּנֵ֣י יִשְׂרָאֵל֒ לַ/עֲבֹ֞ד אֶת עֲבֹדַ֤ת בְּנֵֽי יִשְׂרָאֵל֙ בְּ/אֹ֣הֶל מוֹעֵ֔ד וּ/לְ/כַפֵּ֖ר עַל בְּנֵ֣י יִשְׂרָאֵ֑ל וְ/לֹ֨א יִהְיֶ֜ה בִּ/בְנֵ֤י יִשְׂרָאֵל֙ נֶ֔גֶף בְּ/גֶ֥שֶׁת בְּנֵֽי יִשְׂרָאֵ֖ל אֶל הַ/קֹּֽדֶשׁ־׀־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/008/019.yaml
  text: And I have given the Levites as a gift to Aaron and to his sons from among the sons of Israel[a], to do the service of the sons of Israel in the tent of meeting, and to make atonement for the sons of Israel[c][b], so that there may not be a plague among the sons of Israel when the sons of Israel come near to the holy place.
  footnotes:
  - marker: a
    text: Or 'the Levites, who are given to Aaron and to his sons.' The Hebrew repeats the root 'give' for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'from among the Israelites.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the sanctuary.'
    reason: lexical_alternative
