  spanish_quality_summary: 'El español es generalmente claro, pero algunas frases quedan poco naturales o ambiguas de forma no útil: «dolor del corazón» y especialmente «un azote de la lengua que se asocia con todos» suenan forzadas. Conviene elevar la legibilidad con una redacción más idiomática y digna, sin perder la compresión del original.'
