translation:
  text: And Judith said from a distance to those guarding the gates[a], “Open up, open up the gate, for God, our God, is with us, still to show strength in Israel and power against our enemies, just as he has done today.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''God, God of us,'' an emphatic repetition meaning ''God, our God.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: μακρόθεν
  chosen: from a distance
  alternatives:
  - from afar
  - at a distance
  lexicon: LSJ
  rationale: The adverb indicates spatial distance. 'From a distance' is idiomatic modern English and preserves the sense without archaism.
- source_word: τοῖς φυλάσσουσιν ἐπὶ τῶν πυλῶν
  chosen: to those guarding the gates
  alternatives:
  - to the watchmen at the gates
  - to those keeping watch over the gates
  lexicon: LSJ
  rationale: φυλάσσω here denotes guarding/keeping watch. The participial phrase is naturally rendered as a substantive in English. Plural 'gates' follows the Greek.
- source_word: Ἀνοίξατε, ἀνοίξατε δὴ τὴν πύλην
  chosen: Open up, open up the gate
  alternatives:
  - Open, open the gate
  - Open at once the gate
  lexicon: LSJ
  rationale: The repetition should be preserved for urgency. δὴ adds immediacy/emphasis; 'open up' conveys the force naturally. Singular 'the gate' is retained because the direct object is singular even though the guards are at the gates.
- source_word: μεθʼ ἡμῶν
  chosen: is with us
  alternatives:
  - with us
  lexicon: LSJ
  rationale: The phrase is predicative with ὁ θεός understood in a verbless clause; supplying 'is' is required in English.
- source_word: ὁ θεὸς ὁ θεὸς ἡμῶν
  chosen: God, our God
  alternatives:
  - God—our God
  - our God
  lexicon: LSJ
  rationale: The doubled expression is emphatic. Rendering both occurrences preserves the rhetorical force better than collapsing to a single 'our God'.
- source_word: ποιῆσαι ἔτι ἰσχὺν
  chosen: still to show strength
  alternatives:
  - to do strength still
  - still to work might
  - to continue showing strength
  lexicon: LSJ
  rationale: The infinitive after the verbless clause expresses purpose or expected action. ἔτι conveys continuation ('still/yet'). Because 'do strength' is unnatural in English, 'show strength' captures the idiom while staying close to the Greek sense of manifesting might.
- source_word: ἰσχὺν
  chosen: strength
  alternatives:
  - might
  lexicon: LSJ
  rationale: ἰσχύς commonly denotes strength or might. 'Strength' pairs well with the following κράτος rendered 'power,' preserving a slight distinction between the two terms.
- source_word: κράτος
  chosen: power
  alternatives:
  - dominion
  - might
  lexicon: LSJ
  rationale: In this military-deliverance context, κράτος denotes manifested power or prevailing force. 'Power' is clear and avoids overreading as political 'dominion.'
- source_word: κατὰ τῶν ἐχθρῶν ἡμῶν
  chosen: against our enemies
  alternatives:
  - over our enemies
  lexicon: LSJ
  rationale: κατά with the genitive here has adversative force. 'Against our enemies' is the most straightforward rendering.
- source_word: καθὰ καὶ σήμερον ἐποίησεν
  chosen: just as he has done today
  alternatives:
  - as indeed he did today
  - just as today he did
  lexicon: LSJ
  rationale: καθά introduces comparison, and the aorist refers to the action just accomplished. English present perfect ('has done today') naturally connects the completed action with the present moment of speech.
