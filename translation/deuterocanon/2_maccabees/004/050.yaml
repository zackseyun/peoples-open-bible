translation:
  text: But Menelaus[a], because of the greed of those in power, remained in office, growing in wickedness and having become a great plotter against his fellow citizens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the covetousness of the rulers.' The Greek phrase can be rendered more formally, but the main text uses a natural English expression for the causal sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τὰς τῶν κρατούντων πλεονεξίας
  chosen: because of the greed of those in power
  alternatives:
  - through the covetousness of the rulers
  - because of the avarice of those in authority
  lexicon: LSJ
  rationale: διά with the accusative gives causal force here ('because of'). πλεονεξία denotes greed/covetousness/avarice. κρατοῦντες are those exercising power or authority; 'those in power' is idiomatic modern English and preserves the political sense.
- source_word: ἔμενεν ἐπὶ τῇ ἀρχῇ
  chosen: remained in office
  alternatives:
  - stayed in power
  - remained in authority
  lexicon: LSJ
  rationale: ἀρχή here refers to office/rule/position of authority. 'Remained in office' fits the administrative context and avoids overstating the scope as absolute political power.
- source_word: ἐπιφυόμενος τῇ κακίᾳ
  chosen: growing in wickedness
  alternatives:
  - increasing in evil
  - adding to his wickedness
  lexicon: LSJ
  rationale: The participle conveys development or increase. τῇ κακίᾳ is moral badness/wickedness. 'Growing in wickedness' captures the progressive sense naturally in English.
- source_word: μέγας τῶν πολιτῶν ἐπίβουλος καθεστώς
  chosen: having become a great plotter against his fellow citizens
  alternatives:
  - having become a great enemy of the citizens
  - standing as a great schemer against his countrymen
  lexicon: LSJ
  rationale: 'ἐπίβουλος denotes one plotting against, a schemer or conspirator. τῶν πολιτῶν is objective/genitival: against the citizens. ''Fellow citizens'' brings out the civic relationship in natural English. μέγας intensifies his notoriety; ''great plotter'' preserves that force without implying praise. καθεστώς is rendered as a resultant state, ''having become''.'
