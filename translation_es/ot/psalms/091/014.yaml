translation:
  language: es
  text: Porque se apega a mí[a], yo lo libraré; lo pondré en un lugar alto y seguro[b], porque conoce mi nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''me ama'' o ''pone su amor en mí''. El verbo hebreo expresa una adhesión fuerte o un apego firme.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''lo pondré en alto'' o ''lo protegeré''. El verbo hebreo sugiere colocarlo en un lugar alto y seguro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: Introduce la razón de la acción divina. 'Porque' mantiene la fuerza causal de ambos כִּי y suena natural en español bíblico contemporáneo.
- source_word: בִי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - en mí
  - sobre mí
  lexicon: HALOT
  rationale: Con חָשַׁק, el vínculo se dirige a Dios. 'A mí' expresa de forma natural en español esa orientación relacional sin perder el matiz de adherencia.
- source_word: חָשַׁק
  english_pob_choice: clings
  chosen_spanish: se apega
  alternatives_spanish:
  - me ama
  - se adhiere
  - se aferra
  lexicon: HALOT
  rationale: '''Se apega'' conserva la idea de fuerte adherencia o unión afectiva sin reducir el verbo a un mero sentimiento ni volver demasiado duro el lenguaje.'
- source_word: וַאֲפַלְּטֵהוּ
  english_pob_choice: I will rescue him
  chosen_spanish: yo lo libraré
  alternatives_spanish:
  - lo rescataré
  - lo libraré de peligro
  - lo sacaré
  lexicon: HALOT
  rationale: '''Libraré'' comunica bien la acción de liberar o salvar de peligro. Mantiene el tono de promesa divina y funciona de manera natural en español bíblico.'
- source_word: אֲשַׂגְּבֵהוּ
  english_pob_choice: I will set him securely on high
  chosen_spanish: lo pondré en alto con seguridad
  alternatives_spanish:
  - lo pondré en alto
  - lo protegeré
  - lo exaltaré
  lexicon: HALOT
  rationale: La imagen hebrea combina altura y seguridad. 'En alto con seguridad' preserva la metáfora de elevación y su sentido de protección, sin aplastarla en una sola abstracción.
- source_word: יָדַע
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - ha conocido
  - reconoce
  - está al tanto de
  lexicon: HALOT
  rationale: '''Conoce'' conserva el valor relacional y de pacto del verbo sin introducir una paráfrasis más interpretativa.'
- source_word: שְׁמִי
  english_pob_choice: my name
  chosen_spanish: mi nombre
  alternatives_spanish:
  - mi reputación
  lexicon: HALOT
  rationale: Se mantiene la expresión literal 'mi nombre', que en hebreo puede implicar carácter revelado y persona. La carga teológica queda implícita en el texto.
theological_decisions:
- issue: Verbo de adhesión/amor a Dios en חָשַׁק
  english_pob_reading: Rendered חָשַׁק as 'clings to me' rather than 'loves me' or 'sets his love on me.'
  chosen_spanish_reading: Traducido como 'se apega a mí' en lugar de 'me ama' o 'pone su amor en mí'.
  alternative_spanish_readings:
  - me ama
  - pone su amor en mí
  - se adhiere a mí
  rationale: Preserva la imagen de fuerte adhesión y evita reducir el verbo a una sola emoción. También evita una fórmula más tradicional que podría sonar menos directa en español actual.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Metáfora protectora de altura en אֲשַׂגְּבֵהוּ
  english_pob_reading: Kept the elevation metaphor in 'set him securely on high.'
  chosen_spanish_reading: Mantuve la metáfora con 'lo pondré en alto con seguridad'.
  alternative_spanish_readings:
  - lo protegeré
  - lo exaltaré
  - lo pondré en alto
  rationale: La imagen de altura comunica acceso restringido y protección. La formulación elegida conserva esa imagen y añade de modo sobrio el matiz de seguridad implícito.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El texto coincide con el paquete fuente y con la decisión auditada en inglés; no se registran revisiones aplicadas y el último pase marcó 'unchanged'.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo donde corresponde al Tetragrámaton; en este versículo no aparece.
  - Se evitó 'SEÑOR' como sustituto convencional y se mantuvo un estilo bíblico claro pero moderno.
  - '''Mi nombre'' se conserva literalmente para no perder la posible referencia al carácter revelado de Dios.'
  - La puntuación y el orden siguen de cerca la sintaxis hebrea sin forzar un calco.
