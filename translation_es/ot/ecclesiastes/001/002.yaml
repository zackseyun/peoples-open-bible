  text: הֲבֵ֤ל הֲבָלִים֙ אָמַ֣ר קֹהֶ֔לֶת הֲבֵ֥ל הֲבָלִ֖ים הַ/כֹּ֥ל הָֽבֶל׃
base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/001/002.yaml
  text: Breath of breaths[a], says Qoheleth; breath of breaths[b], all is mere breath.
  footnotes:
  - marker: a
    text: Hebrew הֶבֶל (hevel), literally 'breath' or 'vapor.' Qoheleth uses this word across 38 occurrences in the book, metaphorically carrying three linked senses at once — transient (like a breath that's already gone), elusive (can't be grasped), and ironic (what was expected and what happens don't match). No single English word covers all three. We render with the concrete image — 'breath' in the superlative, 'mere breath' in the predicate — and let context develop each sense. Traditional English renderings include 'vanity' (KJV — misread in modern English as 'pride') and 'meaninglessness' (NIV — imports a nihilism Qoheleth's argument does not assert). The construct הֲבֵל הֲבָלִים is a Hebrew absolute-superlative, like 'song of songs' or 'holy of holies.'
    reason: lexical_choice
  - marker: b
    text: Qoheleth is the Hebrew title/name traditionally rendered 'the Teacher' or 'the Preacher' — both interpretive and each narrowing the semantic range differently. We transliterate to preserve the openness.
    reason: lexical_alternative
