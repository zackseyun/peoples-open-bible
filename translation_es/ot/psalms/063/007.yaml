  text: אִם זְכַרְתִּ֥י/ךָ עַל יְצוּעָ֑/י בְּ֝/אַשְׁמֻר֗וֹת אֶהְגֶּה בָּֽ/ךְ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/063/007.yaml
  text: If I remember you on my bed[c][b][a], I meditate on you in the night watches.
  footnotes:
  - marker: a
    text: Or, 'If I remember you on my bed, I meditate on you in the night watches.' The Hebrew particle can be read conditionally ('if') or temporally ('when'); the temporal sense fits the poetic flow here.
    reason: alternative_reading
  - marker: b
    text: '''Night watches'' refers to the divisions of the night used for keeping watch.'
    reason: cultural_note
  - marker: c
    text: The verb translated 'I meditate' can also carry the sense 'I muse' or 'I mutter,' suggesting quiet, sustained reflection.
    reason: lexical_alternative
