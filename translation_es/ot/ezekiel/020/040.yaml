review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y sentido general del hebreo: monte santo/monte alto, servicio de toda la casa de Israel, aceptación divina y requerimiento de contribuciones/ofrendas. También preserva el énfasis de totalidad en כָּל בֵּית יִשְׂרָאֵל כֻּלֹּה. Sin embargo, hay pequeños puntos que conviene ajustar para mayor fidelidad y naturalidad: «pediré» suaviza demasiado אֶדְרוֹשׁ frente a la decisión auditada «require», y «cosas santas» suena poco idiomático en español eclesial; «cosas sagradas» o similar conserva mejor el alcance de קָדְשֵׁיכֶם.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta dos problemas de calidad: el marcador [v] rompe la secuencia requerida de notas y no sigue el esquema a, b, c..., y «cosas santas» resulta rígido y poco natural. Además, «declara el Señor Yahvé» funciona, pero la puntuación con rayas y coma puede simplificarse para mejor fluidez.'
  glossary_alignment: 'Alineación generalmente buena con la terminología del proyecto: יְהוָה → «Yahvé», עבד → «servirá», primicias/ofrendas bien encaminado. La principal desviación está en אֶדְרוֹשׁ, donde «requeriré» se ajusta mejor a la rationale documentada que «pediré». Para קָדְשֵׁיכֶם, «cosas sagradas» mantiene amplitud mejor que «cosas santas» en español natural.'
  issues:
  - severity: medium
    issue: Marcador de nota no secuencial «[v]»
    rationale: La instrucción exige marcadores únicos en orden (a, b, c...). El texto usa [a], [v], [b], [c], lo cual incumple el formato requerido.
  - severity: medium
    issue: «Pediré» debilita el matiz de אֶדְרוֹשׁ
    rationale: Según la auditoría inglesa, el verbo aquí expresa que Dios requiere o reclama lo debido en contexto de ofrendas. «Pediré» suena más opcional; «requeriré» preserva mejor la fuerza sin llegar a «exigiré».
  - severity: low
    issue: «Cosas santas» suena poco idiomático
    rationale: Aunque literalmente defendible, en español moderno eclesial «cosas sagradas» o «cosas consagradas» resulta más natural y claro para קָדְשֵׁיכֶם, manteniendo además la amplitud semántica.
  - severity: low
    issue: Puntuación algo recargada en la fórmula profética
    rationale: La secuencia «—declara el Señor Yahvé—, allí» puede aligerarse sin pérdida de sentido. Es un ajuste estilístico menor.
