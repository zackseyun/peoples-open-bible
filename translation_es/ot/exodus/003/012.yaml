revisions:
- from: 'Y él dijo[a]: «Ciertamente yo estaré contigo, y esta será la señal para ti de que yo te he enviado: cuando saques al pueblo de Egipto, servirán a Dios[b] en este monte».'
  to: 'Y él dijo[a]: «Ciertamente yo estaré contigo, y esta será la señal para ti de que yo te he enviado: cuando saques al pueblo de Egipto, ustedes servirán a Dios[b] en este monte».'
  rationale: Se corrige la persona verbal de la cláusula final para reflejar fielmente el 2º plural hebreo תַּעַבְדוּן. 'Ustedes servirán' mantiene el sentido del POB inglés, preserva la amplitud léxica de עבד y mejora la precisión gramatical sin cambiar la estructura del versículo.
