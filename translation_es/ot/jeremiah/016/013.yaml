translation:
  language: es
  text: Y los expulsaré[a] de esta tierra a una tierra que ni ustedes ni sus padres[b] han conocido, y allí servirán[c] a otros dioses día y noche, porque no les mostraré favor[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los arrojaré» o «los echaré». El verbo hebreo es enérgico y describe una expulsión violenta.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ancestros». El hebreo dice literalmente «padres».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «adorarán a otros dioses». El verbo hebreo suele significar «servir» y puede incluir culto religioso.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «porque no les concederé gracia/merced». El sustantivo hebreo denota favor o benignidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵטַלְתִּי
  english_pob_choice: cast you out
  chosen_spanish: los expulsaré
  alternatives_spanish:
  - los arrojaré
  - los echaré
  lexicon: HALOT
  rationale: El verbo hebreo es fuerte y expresa expulsión violenta. «Expulsaré» comunica bien la acción de sacar del territorio con fuerza, sin sonar tan brusco o artificial como una traducción demasiado literal.
- source_word: מֵעַל הָאָרֶץ הַזֹּאת
  english_pob_choice: from this land
  chosen_spanish: de esta tierra
  alternatives_spanish:
  - fuera de esta tierra
  - de sobre esta tierra
  lexicon: HALOT
  rationale: «Tierra» conserva el sentido territorial del contexto del pacto. «De esta tierra» reproduce la salida desde el territorio sin calcar de manera extraña la preposición hebrea.
- source_word: עַל הָאָרֶץ
  english_pob_choice: onto a land
  chosen_spanish: hacia una tierra
  alternatives_spanish:
  - sobre una tierra
  - a una tierra
  lexicon: HALOT
  rationale: La dirección del movimiento se mantiene con «hacia». «Tierra» sigue el valor contextual de land/land as territory.
- source_word: אֲשֶׁר לֹא יְדַעְתֶּם אַתֶּם וַאֲבֹתֵיכֶם
  english_pob_choice: that neither you nor your fathers have known
  chosen_spanish: que ni ustedes ni sus padres han conocido
  alternatives_spanish:
  - que ustedes ni sus padres no han conocido
  - que ni ustedes ni sus ancestros han conocido
  lexicon: HALOT
  rationale: «Conocido» conserva el sentido simple de ידע. Se mantiene «sus padres» porque el hebreo dice literalmente «vuestros padres», y «ni… ni…» expresa bien la exclusión doble.
- source_word: וַעֲבַדְתֶּם שָׁם אֶת אֱלֹהִים אֲחֵרִים
  english_pob_choice: and there you will serve other gods
  chosen_spanish: y allí servirán a otros dioses
  alternatives_spanish:
  - y allí adorarán a otros dioses
  - y allí rendirán servicio a otros dioses
  lexicon: HALOT
  rationale: עבד con «dioses» puede significar servir y, por extensión, rendir culto. «Servirán» preserva la ambigüedad teológica del hebreo y la ironía del exilio, sin imponer «adorarán» como si fuera solo culto interno.
- source_word: יוֹמָם וָלַיְלָה
  english_pob_choice: day and night
  chosen_spanish: día y noche
  alternatives_spanish:
  - continuamente
  - sin cesar
  lexicon: HALOT
  rationale: Se conserva el giro idiomático literal, natural en español, para expresar duración continua sin paráfrasis.
- source_word: אֲשֶׁר לֹא אֶתֵּן לָכֶם חֲנִינָה
  english_pob_choice: for I will show you no favor
  chosen_spanish: porque no les mostraré favor
  alternatives_spanish:
  - porque no les concederé favor
  - porque no les daré gracia
  - porque no les mostraré gracia
  lexicon: HALOT
  rationale: חֲנִינָה denota favor/graciosidad. «Mostraré favor» sigue de cerca la decisión auditada de la POB inglesa y suena natural en español, sin convertirlo en un término técnico ni añadir «misericordia» donde el hebreo no lo exige.
theological_decisions:
- issue: Tratamiento del sustantivo relacional וַאֲבוֹתֵיכֶם
  english_pob_reading: your fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus ancestros
  - sus antepasados
  rationale: Se conserva el término masculino explícito del hebreo, como hace la POB inglesa, en lugar de neutralizarlo. El contexto permite entenderlo como la generación paterna/ancestral sin perder la forma del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Valor de וַעֲבַדְתֶּם con אֱלֹהִים אֲחֵרִים
  english_pob_reading: serve other gods
  chosen_spanish_reading: servirán a otros dioses
  alternative_spanish_readings:
  - adorarán a otros dioses
  - quedarán al servicio de otros dioses
  rationale: '«Servir» retiene el rango semántico de עבד y la ironía del texto: en el exilio serán obligados a una lealtad religiosa desviada. «Adorar» estrecha demasiado el sentido y hace perder la fuerza lexical.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: חֲנִינָה como retirada del favor divino
  english_pob_reading: I will show you no favor
  chosen_spanish_reading: no les mostraré favor
  alternative_spanish_readings:
  - no les concederé gracia
  - no les daré misericordia
  rationale: El hebreo habla de favor/gracia en sentido relacional y judicial. La formulación elegida evita cargar el verso con una terminología doctrinal más técnica que la del original, manteniendo la severidad del juicio.
  doctrine_reference: HALOT; DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue la revisión auditada de la POB inglesa que prefirió una formulación de expulsión más natural que «hurl», manteniendo el contraste territorial, la referencia explícita a «sus padres», el valor amplio de «servir» respecto de los otros dioses y el cierre con falta de favor/gracia. También conserva la ambigüedad lexical documentada donde el hebreo la exige.
  spanish_consistency_notes:
  - Se usa «tierra» para land en un contexto territorial-covenantal, no «mundo» ni «suelo».
  - 'Se conserva la estructura de movimiento: salida de esta tierra y llegada a otra tierra.'
  - «Otros dioses» se mantiene como expresión fija y directa; no se sustituye por «dioses ajenos» sin necesidad contextual.
  - El paralelismo «día y noche» permanece literal para reflejar continuidad.
  - La puntuación y el registro buscan ser publicables, sobrios y claros en español bíblico moderno.
