id: WIS.10.5
reference: Wisdom of Solomon 10:5
source:
  edition: lxx-swete-1909
  text: αὕτη καὶ ἐν ὁμονοίᾳ πονηρίᾳ ἐθνῶν συγχυθέντων εὗρεν τὸν δίκαιον, καὶ ἐτήρησεν αὐτὸν ἄμεμπτον θεῷ, καὶ ἐπὶ τέκνου σπλάγχνοις ἰσχυρὸν ἐφύλαξεν.
  language: Greek
  pages:
  - 638
  confidence: high
  validation: agree
  note: This verse is being loaded from the normalized translation-ready override layer derived from the adjudicated corpus. Translation-ready override derived from final_corpus_adjudicated; dropped duplicate chapter 20 and spillover beyond Wisdom 19:22.
translation:
  text: She also[a], when the nations were thrown into confusion in their wicked conspiracy, found the righteous man and kept him blameless before God[c][b], and kept him strong against his compassion for his child.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in wicked unanimity' or 'in evil concord.' The phrase describes the nations' shared evil purpose.
    reason: lexical_alternative
  - marker: b
    text: '''The righteous man'' likely refers to Abraham in context, but the Greek does not name him here.'
    reason: cross_reference
  - marker: c
    text: Or 'kept him steadfast despite his tender feelings for his son.' The Greek speaks of inward affections or compassion for a child.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὕτη
  chosen: She
  alternatives:
  - This one
  - Wisdom
  lexicon: LSJ
  rationale: The feminine demonstrative refers back to personified Wisdom in the surrounding context. English 'She' preserves the personal feminine reference naturally without repeating the antecedent.
- source_word: ἐν ὁμονοίᾳ πονηρίᾳ
  chosen: in their wicked agreement
  alternatives:
  - in wicked unanimity
  - in evil concord
  lexicon: LSJ
  rationale: ὁμονοία denotes oneness of mind or concord; with πονηρίᾳ it describes a shared evil purpose. 'Wicked agreement' is idiomatic modern English and preserves the moral force.
- source_word: ἐθνῶν συγχυθέντων
  chosen: when nations were thrown into confusion
  alternatives:
  - when the nations were confounded
  - amid the confusion of the nations
  lexicon: LSJ
  rationale: The genitive absolute marks the circumstance. συγχέω here carries the sense of being confounded or thrown into disorder, likely alluding to Babel. 'Thrown into confusion' is clear and suitably vivid.
- source_word: εὗρεν τὸν δίκαιον
  chosen: found the righteous man
  alternatives:
  - found the righteous one
  - found the just man
  lexicon: LSJ
  rationale: The phrase likely refers to Abraham in context. 'The righteous man' keeps the masculine singular and the substantive force of τὸν δίκαιον.
- source_word: ἐτήρησεν αὐτὸν ἄμεμπτον θεῷ
  chosen: kept him blameless before God
  alternatives:
  - preserved him blameless to God
  - guarded him irreproachable before God
  lexicon: LSJ
  rationale: τηρέω means keep/preserve/guard. ἄμεμπτον is 'blameless' or 'irreproachable.' The dative θεῷ is best expressed relationally in English as 'before God.'
- source_word: ἐπὶ τέκνου σπλάγχνοις
  chosen: against his compassion for his child
  alternatives:
  - over his feelings for his child
  - against tender affection for his child
  lexicon: LSJ
  rationale: σπλάγχνα in plural often denotes inward affections or compassion. With ἐπί after ἰσχυρόν ἐφύλαξεν, the sense is that Wisdom kept him strong in the face of paternal compassion during the testing involving his son.
- source_word: ἰσχυρὸν ἐφύλαξεν
  chosen: kept him strong
  alternatives:
  - guarded him strong
  - preserved him steadfast
  lexicon: LSJ
  rationale: φυλάσσω is guard/keep, and ἰσχυρός here functions predicatively. 'Kept him strong' is concise and natural, preserving both protection and steadfastness.
