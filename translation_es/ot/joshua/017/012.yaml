    issue: «despojar estas ciudades» es ambiguo y poco idiomático para לְהוֹרִישׁ
    rationale: En español, 'despojar' normalmente requiere indicar a quién se despoja y de qué. Tal como está, parece que las ciudades son el objeto despojado, no que sus ocupantes sean desposeídos. El hebreo expresa desposesión territorial de los habitantes previos.
  - severity: low
