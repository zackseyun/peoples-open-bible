revisions:
- from: 'Cuando los habitantes de la tierra, los cananeos, vieron el duelo en la era de Atad, dijeron: «Este es un duelo muy grave para los egipcios». Por eso se llamó Abel-mizraim[a][b], que está al otro lado del Jordán.'
  to: 'Cuando los habitantes de la tierra, los cananeos, vieron el duelo en la era de Atad, dijeron: «Este es un duelo muy grave para los egipcios». Por eso aquel lugar se llamó Abel-mizraim[a][b], el cual está al otro lado del Jordán.'
  rationale: Se revisa solo para eliminar la ambigüedad del sujeto en «se llamó», haciendo explícito que el nombre corresponde al lugar, no al duelo. Se conserva el sentido, la estructura y las notas del borrador, con un ajuste menor de fluidez en la cláusula final.
