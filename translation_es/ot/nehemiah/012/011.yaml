translation:
  language: es
  text: Y Joiadá engendró a Jonatán[a], y Jonatán engendró a Jadúa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos y traducciones leen «Johanán» en lugar de «Jonatán». El hebreo usado aquí lee «Jonatán».
    reason: textual_variant
lexical_decisions:
- source_word: וְ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: HALOT
  rationale: La conjunción inicial enlaza de forma simple este dato genealógico con el versículo anterior. En español, "Y" conserva esa continuidad sin añadir matiz temporal o explicativo.
- source_word: יוֹיָדָע
  english_pob_choice: Joiada
  chosen_spanish: Joiadá
  alternatives_spanish:
  - Jehoiada
  lexicon: HALOT
  rationale: Es un nombre propio; se translitera, no se traduce. "Joiadá" sigue de cerca la forma hebrea y mantiene la correspondencia auditiva con el texto fuente mejor que una forma más tradicional pero menos directa.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue el padre de
  - procreó
  lexicon: HALOT
  rationale: En contextos genealógicos, el hifil de ילד expresa la acción de engendrar o ser padre de. "Engendró" conserva ese valor genealógico con naturalidad en español bíblico y evita una perífrasis más larga.
- source_word: יוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Johanán
  lexicon: HALOT
  rationale: La forma consonántica dada es יוֹנָתָן, que corresponde naturalmente a "Jonatán" en español. Se mantiene esta lectura en el texto principal, siguiendo el hebreo aportado y la auditoría inglesa.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La segunda conjunción mantiene la secuencia genealógica. "Y" es la equivalencia normal y más transparente.
- source_word: יַדּוּעַ
  english_pob_choice: Jaddua
  chosen_spanish: Jadúa
  alternatives_spanish:
  - Jaddua
  lexicon: HALOT
  rationale: Nombre propio transliterado desde el hebreo. "Jadúa" ofrece una adaptación española legible y cercana a la forma original.
theological_decisions:
- issue: Variante textual del nombre de Jonatán/Johanán
  english_pob_reading: Some manuscripts and translations read 'Johanan' instead of 'Jonathan.' The Hebrew text used here reads 'Jonathan.'
  chosen_spanish_reading: Algunos manuscritos y traducciones leen «Johanán» en lugar de «Jonatán». El texto hebreo usado aquí lee «Jonatán».
  alternative_spanish_readings:
  - «Johanán» en lugar de «Jonatán»
  - «Jonatán» como lectura principal sin nota
  rationale: 'La decisión española conserva la tensión documental: la forma del hebreo recibido es Jonatán, pero existe una variante textual conocida. La nota mantiene abierta la alternativa sin sustituir indebidamente el texto base.'
  doctrine_reference: Crítica textual / transmisión manuscrita del texto bíblico
translation_notes:
  revision_awareness: La auditoría inglesa indica estado de alta concordancia (high_agreement) y que no se requirieron cambios en la última pasada. Esta versión española sigue de cerca la decisión inglesa de mantener la lectura hebrea de Jonathan/Jonatán, preservando la nota de variante textual sin ampliar el contenido.
  spanish_consistency_notes:
  - Se usó «engendró» de forma consistente para el verbo genealógico הוֹלִיד.
  - 'Se mantuvieron transliteraciones españolas coherentes para los nombres propios: Joiadá, Jonatán y Jadúa.'
  - Se evitó introducir títulos o equivalentes eclesiásticos que no están en el hebreo.
  - La nota al pie está anclada en el nombre «Jonatán» para reflejar la variante textual documentada.
