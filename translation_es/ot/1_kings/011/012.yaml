review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: aplazamiento del juicio hasta después de los días de Salomón, motivado por consideración a David, y ejecución en relación con el hijo. Sin embargo, la nota [b] no corresponde al punto léxico documentado en el inglés. El inglés anota la alternativa de מִיַּד בִּנְךָ (''de la mano de tu hijo'' / ''de manos de tu hijo''), pero el borrador puso una nota sobre לְמַעַן דָּוִד. Además, conviene ajustar «lo arrancaré» a «la arrancaré» para concordar con el referente implícito femenino (''el reino'') que el hebreo marca con sufijo femenino.'
  spanish_quality_summary: El español es claro y digno. «Sin embargo» y «en tus días» funcionan bien. «Por amor a David» es defendible, aunque más interpretativo; puede mantenerse. El principal problema de calidad editorial es la ubicación y contenido de la nota [b], que hoy crea una justificación léxica distinta de la auditada. También mejora la naturalidad y precisión decir «de la mano de tu hijo la arrancaré» o equivalente, en concordancia con el objeto implícito femenino.
  glossary_alignment: No hay conflictos con la terminología global del proyecto. No aparecen Yahvé, Mesías/Cristo ni otros términos de glosario sensible. La decisión clave es mantener el modismo «de la mano de» y reflejar correctamente la nota alternativa correspondiente.
  issues:
  - severity: high
    issue: La nota [b] está anclada al segmento equivocado y explica el término equivocado.
    rationale: La auditoría inglesa pone la nota léxica en «from the hand of your son», con alternativa «out of your son's hand». El borrador español la colocó tras «tu padre» y la dedicó a «por amor a / por causa de / por el bien de», lo cual no preserva la decisión auditada.
  - severity: medium
    issue: «Lo arrancaré» no refleja bien la concordancia femenina implícita del objeto.
    rationale: El hebreo usa sufijo femenino en אֶקְרָעֶנָּה, que remite al reino. Aunque el español puede usar pronombre no marcado, «la arrancaré» preserva mejor la referencia implícita y evita una leve discordancia con «haré» referido a una acción femenina implícita en el contexto.
  - severity: low
    issue: La nota sobre «por amor a David» no es necesaria aquí según el rastro auditado.
    rationale: La decisión inglesa principal para לְמַעַן דָּוִד אָבִיךָ ya está bien representada en el texto; la alternativa que debía preservarse en nota era otra.
  revised_spanish_text: Sin embargo[a], en tus días no lo haré, por amor a David, tu padre; de la mano de tu hijo[b] la arrancaré.
  revised_footnotes:
  - marker: a
    text: Es decir, el reino anunciado en el versículo anterior.
    reason: cross_reference
  - marker: b
    text: 'O: «de manos de tu hijo». El hebreo dice literalmente «de la mano de tu hijo».'
    reason: lexical_alternative
  revision_rationale: Se corrige la nota [b] para que preserve la alternativa léxica documentada en el inglés para מִיַּד בִּנְךָ, y se ajusta el pronombre final a femenino («la arrancaré») para reflejar mejor el objeto implícito femenino del hebreo, es decir, el reino.
