  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido del hebreo: Isaías da la orden, toman la preparación de higos, la aplican a la lesión y Ezequías se recupera. Sin embargo, הַשְּׁחִין está mejor representado por «forúnculo» o «úlcera/llaga inflamada» que por la sola «llaga», porque el hebreo y el POB inglés apuntan más específicamente a un hervor/lesión inflamada. También conviene mejorar la naturalidad de «Ellos la tomaron».'
  spanish_quality_summary: 'El español es claro y legible, pero tiene dos asperezas menores: «Ellos la tomaron» suena innecesariamente explícito en español narrativo, y «la pusieron sobre la llaga» pierde algo de precisión médica y de la imagen de aplicación. «La aplicaron sobre el forúnculo» o «la pusieron sobre el forúnculo» suena más natural y más fiel al campo semántico. Las notas están bien ancladas y ordenadas.'
  glossary_alignment: No hay términos del glosario maestro especialmente disputados en este versículo. «Isaías», «higos» y «se recuperó» están alineados. La principal desviación es léxica respecto de הַשְּׁחִין, donde «llaga» resulta demasiado amplia frente a la decisión auditada «boil».
  issues:
  - severity: medium
    issue: «la llaga» debilita la especificidad de הַשְּׁחִין
    rationale: El inglés auditado eligió «the boil» con alternativas «inflamed sore» y «ulcer». «Llaga» sola en español puede abarcar una lesión mucho más general y no refleja tan bien la idea de lesión inflamada localizada.
  - severity: low
    issue: «Ellos la tomaron» suena poco idiomático
    rationale: El español narrativo normalmente omite el pronombre sujeto aquí. «La tomaron» o «Entonces la tomaron» conserva mejor la fluidez sin perder sentido.
  - severity: low
    issue: La nota a sobre «dijo Isaías» no aporta una alternativa significativa
    rationale: El orden verbal en español no refleja una diferencia de sentido relevante del hebreo; la nota puede eliminarse para evitar ruido editorial.
  revised_spanish_text: 'E Isaías dijo: «Tomen una torta de higos». La tomaron y la pusieron sobre el forúnculo[a], y él se recuperó[b].'
  revised_footnotes:
