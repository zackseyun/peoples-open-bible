  spanish_quality_summary: El español es claro y digno, pero ‘cesan de la turbulencia’ suena algo rígido y menos natural que ‘dejan atrás la agitación’ o ‘cesan su agitación’. Para conservar mejor la cercanía léxica con חדל + רֹגֶז y mantener buena legibilidad, ‘cesan su agitación’ funciona mejor. ‘Los exhaustos de fuerza’ es aceptable y bastante fiel, aunque algo duro; aun así, encaja bien con la nota literal.
  glossary_alignment: No hay conflictos con la terminología marco del proyecto. ‘Impíos’ para רְשָׁעִים y ‘fuerza’ para כֹחַ son apropiados. No hay nombres divinos ni términos teológicos sensibles aquí.
