revisions:
- from: ¡Oh, si tuviera quien me oyera! Aquí está mi señal[a]; que el Todopoderoso me responda, y que mi acusador escriba el documento de la acusación[b].
  to: ¡Oh, si tuviera quien me escuchara! Aquí está mi firma[a]; que el Todopoderoso me responda, y que mi acusador escriba la acusación por escrito[b].
  rationale: Se ajusta תָּוִי a 'mi firma' para alinearlo con la decisión principal del POB y mantener explícita la imaginería forense, dejando las alternativas más literales en nota. También se mejora la naturalidad jurídica de la última cláusula con 'la acusación por escrito' y se pule ligeramente la primera cláusula para mejor legibilidad en español contemporáneo.
