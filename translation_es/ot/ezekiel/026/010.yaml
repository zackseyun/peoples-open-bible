  language: en
  yaml_path: translation/ot/ezekiel/026/010.yaml
  text: From the abundance of his horses their dust will cover you[a]; at the sound of horsemen and wheel and chariot your walls will quake when he enters your gates[b], as one enters a city that has been breached.
