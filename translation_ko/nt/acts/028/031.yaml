  yaml_path: translation/nt/acts/028/031.yaml
  text: proclaiming the kingdom of God and teaching the things concerning the Lord Jesus Messiah with all boldness[a], unhindered.
  footnotes:
  - marker: a
    text: "Or: 'Jesus Christ.' The Greek Χριστός can function as a title ('Messiah') or, in some contexts, as a name-like designation ('Christ')."
