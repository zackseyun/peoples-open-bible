translation:
  language: es
  text: Por tanto, pondrán estas palabras mías sobre el corazón y sobre el alma[a] de ustedes, y las atarán como una señal sobre su mano, y serán como frontales entre sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'filacterias', refiriéndose a pequeños contenedores de Escritura usados después en la práctica judía; el término hebreo es raro y su matiz exacto es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתֶּם
  english_pob_choice: you shall place
  chosen_spanish: pondrán
  alternatives_spanish:
  - colocarán
  - pondrán, pues
  lexicon: HALOT
  rationale: שׂים significa 'poner/colocar'. En español, 'pondrán' conserva el mandato futuro del hebreo y suena natural en un registro bíblico digno. El 'Así' inicial refleja la continuidad exhortativa del contexto.
- source_word: דְּבָרַי אֵלֶּה
  english_pob_choice: these words of mine
  chosen_spanish: estas palabras mías
  alternatives_spanish:
  - estas mis palabras
  - estas palabras de mí
  lexicon: HALOT
  rationale: La construcción con sufijo de primera persona se expresa de forma natural como posesivo en español. 'Palabras mías' preserva el énfasis en la procedencia personal del hablante sin sonar forzado.
- source_word: עַל לְבַבְכֶם
  english_pob_choice: on your heart
  chosen_spanish: sobre su corazón
  alternatives_spanish:
  - en su corazón
  - en el corazón de ustedes
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sobre'. 'Sobre su corazón' mantiene la imagen concreta y la relación con la fórmula paralela del verso.
- source_word: וְעַל נַפְשְׁכֶם
  english_pob_choice: and on your soul
  chosen_spanish: y sobre su alma
  alternatives_spanish:
  - y sobre su vida
  - y sobre su ser
  lexicon: HALOT
  rationale: נֶפֶשׁ abarca 'alma, vida, ser'. En este contexto de exhortación pactual, 'alma' conserva el peso antropológico tradicional sin cerrar indebidamente el sentido.
- source_word: וּקְשַׁרְתֶּם אֹתָם
  english_pob_choice: and you shall bind them
  chosen_spanish: y las atarán
  alternatives_spanish:
  - y las amarrarán
  - y las sujetarán
  lexicon: HALOT
  rationale: קשר es 'atar, ligar, bind'. 'Atarán' preserva la fuerza concreta del verbo y funciona bien para la posible doble referencia literal y simbólica del pasaje.
- source_word: לְאוֹת
  english_pob_choice: as a sign
  chosen_spanish: como una señal
  alternatives_spanish:
  - como un signo
  - como una marca
  lexicon: HALOT
  rationale: אוֹת puede ser 'signo/señal'. 'Señal' es natural en español y mantiene abierta la dimensión simbólica sin introducir una explicación ajena al texto.
- source_word: עַל יֶדְכֶם
  english_pob_choice: on your hand
  chosen_spanish: sobre su mano
  alternatives_spanish:
  - sobre su brazo
  - en su mano
  lexicon: HALOT
  rationale: יד normalmente es 'mano'. 'Sobre su mano' sigue el hebreo de manera clara y conserva el paralelismo con 'entre sus ojos'.
- source_word: וְהָיוּ
  english_pob_choice: and they shall be
  chosen_spanish: y serán
  alternatives_spanish:
  - y estarán
  - y llegarán a ser
  lexicon: HALOT
  rationale: El valor consecutivo se refleja bien con 'serán', que suena natural y mantiene la secuencia instructiva del hebreo.
- source_word: לְטוֹטָפֹת
  english_pob_choice: as frontlets
  chosen_spanish: como frontales
  alternatives_spanish:
  - como frontletes
  - como filacterias
  lexicon: HALOT
  rationale: טוֹטָפֹת es un término raro. 'Frontales' conserva la referencia a algo llevado en la frente sin imponer en el texto principal el término técnico posterior 'filacterias'.
- source_word: בֵּין עֵינֵיכֶם
  english_pob_choice: between your eyes
  chosen_spanish: entre sus ojos
  alternatives_spanish:
  - sobre su frente
  - en medio de sus ojos
  lexicon: HALOT
  rationale: La expresión hebrea es literal. 'Entre sus ojos' preserva la imagen original y evita resolver de antemano si la referencia es física o figurada.
theological_decisions:
- issue: Si el mandato de atar las palabras en la mano y entre los ojos es literal, figurado o ambos
  english_pob_reading: Retain the concrete wording without resolving whether the command is purely metaphorical, purely literal, or both.
  chosen_spanish_reading: Mantener la formulación concreta sin decidir si el mandato es solo metafórico, solo literal o ambas cosas.
  alternative_spanish_readings:
  - Interpretarlo solo como exhortación figurada a recordar y obedecer
  - Entenderlo como base de una práctica ritual literal
  rationale: El hebreo usa imágenes corporales concretas, pero el verso por sí solo no obliga a elegir una sola lectura. La traducción conserva la tensión teológica en vez de cerrarla para el lector.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indicó sin cambios necesarios; este borrador sigue de cerca el texto hebreo y el trazado auditado en inglés, manteniendo la tensión interpretativa del verso.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo tiene יהוה; este versículo no lo contiene.
  - Se evita 'Cristo' porque no hay lenguaje mesiánico en el pasaje.
  - Se mantiene la imaginería corporal ('corazón', 'alma', 'mano', 'entre sus ojos') para no interpretar en exceso.
  - '''Frontales'' se eligió para reflejar el término raro טוֹטָפֹת sin borrar la ambigüedad documentada.'
