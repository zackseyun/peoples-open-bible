translation:
  language: es
  text: Entonces fue, los tomó y los llevó a su madre; y su madre preparó comida sabrosa[a], tal como le gustaba a su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «alimentos sabrosos» o «delicadezas»; se traduce «comida sabrosa» para claridad en español actual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: So he went
  chosen_spanish: Así que fue
  alternatives_spanish:
  - Entonces fue
  - Y fue
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «así que» comunica bien la secuencia en español sin sonar rígido. «Fue» mantiene el verbo simple del hebreo.
- source_word: וַיִּקַּח
  english_pob_choice: and took them
  chosen_spanish: tomó
  alternatives_spanish:
  - y tomó
  - tomó eso
  lexicon: HALOT
  rationale: El hebreo dice simplemente «tomó»; el complemento se entiende por el contexto inmediato. En español, omitir el objeto explícito aquí evita una repetición innecesaria.
- source_word: וַיָּבֵא לְאִמּוֹ
  english_pob_choice: and brought them to his mother
  chosen_spanish: se lo llevó a su madre
  alternatives_spanish:
  - y lo llevó a su madre
  - y se lo llevó a su madre
  lexicon: HALOT
  rationale: El hebreo expresa llevar/traer a la madre; en español «se lo llevó» reproduce naturalmente el movimiento hacia ella y conserva el referente implícito del objeto previo. El dativo «a su madre» mantiene לְאִמּוֹ.
- source_word: וַתַּעַשׂ אִמּוֹ
  english_pob_choice: and his mother prepared
  chosen_spanish: su madre preparó
  alternatives_spanish:
  - y su madre hizo
  - y su madre elaboró
  lexicon: HALOT
  rationale: Para comida, עשה se entiende mejor como «preparó»; es una equivalencia precisa y natural en español.
- source_word: מַטְעַמִּים
  english_pob_choice: tasty food
  chosen_spanish: comida sabrosa
  alternatives_spanish:
  - manjares
  - viandas sabrosas
  - alimentos sabrosos
  lexicon: HALOT
  rationale: La palabra designa alimentos sabrosos o delicadezas. «Comida sabrosa» preserva el sentido sin cargar el texto con un término excesivamente literario.
- source_word: כַּאֲשֶׁר אָהֵב אָבִיו
  english_pob_choice: just as his father loved
  chosen_spanish: tal como su padre la amaba
  alternatives_spanish:
  - tal como a su padre le gustaba
  - tal como su padre la prefería
  lexicon: HALOT
  rationale: El verbo אָהֵב se refleja mejor con «amar» o «gustar» según contexto; aquí se mantiene «amaba» para seguir de cerca el hebreo y porque el texto habla de la preferencia afectiva de Isaac por esa comida. El pronombre «la» retoma «comida».
translation_notes:
  revision_awareness: El texto inglés POB y el hebreo concuerdan en el flujo narrativo y en el sentido de מַטְעַמִּים como comida especialmente sabrosa o delicada. La versión española sigue esa lectura y conserva la comparación final sin suavizarla.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
  - Se preservó la referencia implícita del objeto en los verbos «tomó» y «se lo llevó», siguiendo el contexto inmediato del versículo anterior.
  - No se usó «SEÑOR» ni terminología teológica especial porque el versículo no contiene el Tetragrámaton ni vocabulario doctrinal técnico.
