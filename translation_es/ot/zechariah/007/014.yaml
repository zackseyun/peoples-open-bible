translation:
  language: es
  text: Y los esparcí con un viento tempestuoso entre todas las naciones que no habían conocido[a], y la tierra quedó desolada detrás de ellos, sin que nadie pasara ni regresara; así hicieron de la tierra deleitosa[b] una desolación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los hice girar entre todas las naciones». El verbo hebreo lleva imaginería de tormenta, no solo de dispersión ordinaria.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la tierra deseable» o «la tierra deleitosa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵסָעֲרֵם
  english_pob_choice: I scattered them with a storm wind
  chosen_spanish: los esparcí con un viento tempestuoso
  alternatives_spanish:
  - los esparcí
  - los arremoliné con un viento de tormenta
  - los dispersé con un viento tempestuoso
  lexicon: HALOT
  rationale: El verbo סער en piel conserva imaginería de tormenta y movimiento violento; en español, «esparcí con un viento tempestuoso» mantiene esa fuerza sin volverlo una dispersión plana.
- source_word: עַל כָּל הַגּוֹיִם
  english_pob_choice: among all the nations
  chosen_spanish: entre todas las naciones
  alternatives_spanish:
  - entre todos los pueblos
  - sobre todas las naciones
  - contra todas las naciones
  lexicon: HALOT
  rationale: Con un verbo de dispersión, el valor distributivo es el natural. «Entre todas las naciones» preserva la idea de dispersión geográfica y relacional sin forzar un matiz hostil no explicitado por el contexto inmediato.
- source_word: אֲשֶׁר לֹא יְדָעוּם
  english_pob_choice: that they had not known
  chosen_spanish: que no habían conocido
  alternatives_spanish:
  - a quienes no habían conocido
  - que no conocían
  lexicon: HALOT
  rationale: El antecedente son las naciones; en español, «que no habían conocido» reproduce bien el valor de relación previa y el sentido de extrañeza extranjera del hebreo.
- source_word: וְהָאָרֶץ נָשַׁמָּה
  english_pob_choice: and the land was left desolate
  chosen_spanish: y la tierra quedó desolada
  alternatives_spanish:
  - y la tierra fue desolada
  - y la tierra se volvió desolada
  lexicon: HALOT
  rationale: נשׁמה describe un estado resultante de ruina. «Quedó desolada» expresa el resultado sin añadir un agente distinto ni perder el matiz de aftermath.
- source_word: אַחֲרֵיהֶם
  english_pob_choice: behind them
  chosen_spanish: detrás de ellos
  alternatives_spanish:
  - tras ellos
  - después de ellos
  lexicon: HALOT
  rationale: «Detrás de ellos» mantiene el valor espacial-resultativo del hebreo, acorde con la imagen de la tierra vaciada a su paso.
- source_word: מֵעֹבֵר וּמִשָּׁב
  english_pob_choice: with no one passing through or returning
  chosen_spanish: sin que nadie pasara ni regresara
  alternatives_spanish:
  - sin paso ni retorno
  - sin transeúnte ni quien volviera
  lexicon: HALOT
  rationale: Los participios expresan ausencia total de tránsito en ambas direcciones. «Sin que nadie pasara ni regresara» es natural en español y conserva la privación completa.
- source_word: וַיָּשִׂימוּ
  english_pob_choice: thus they made
  chosen_spanish: así hicieron
  alternatives_spanish:
  - y hicieron
  - de modo que hicieron
  lexicon: HALOT
  rationale: La waw consecutiva introduce resultado. «Así hicieron» comunica la consecuencia de modo claro y sobrio en español.
- source_word: אֶרֶץ חֶמְדָּה
  english_pob_choice: the pleasant land
  chosen_spanish: la tierra deleitosa
  alternatives_spanish:
  - la tierra agradable
  - la tierra deseable
  - la tierra preciosa
  lexicon: HALOT
  rationale: חמדה expresa algo digno de deseo o deleite. «Deleitosa» conserva el valor positivo y poético del hebreo mejor que un término más técnico o genérico.
- source_word: לְשַׁמָּה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - desolada
  - una ruina
  - un lugar desolado
  lexicon: HALOT
  rationale: El sustantivo final nombra el estado resultante. «Una desolación» sigue de cerca la forma nominal hebrea y mantiene el contraste retórico con «tierra deleitosa».
theological_decisions:
- issue: Agencia divina en el juicio y responsabilidad humana en la ruina
  english_pob_reading: The verse is rendered with God as the explicit first-person agent of scattering and the people as responsible for making the land desolate through their conduct.
  chosen_spanish_reading: El texto conserva a Dios como agente explícito del esparcimiento y mantiene la ruina de la tierra como resultado de la conducta humana.
  alternative_spanish_readings:
  - Una traducción impersonal que atenúe la agencia divina en el destierro
  - Una formulación que atribuya la desolación solo a la acción divina
  rationale: El hebreo pone en primer plano la acción divina en el verbo inicial y, al final, la acción humana en el verbo plural. La versión española preserva ambas dimensiones sin suavizarlas ni fusionarlas.
  doctrine_reference: Fidelidad al agente explícito del texto; juicio divino y responsabilidad humana
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés y el hebreo: conserva la imaginería de סער como movimiento de tormenta, el valor distributivo de עַל כָּל הַגּוֹיִם, el estado resultante de נשׁמה y el contraste final entre la tierra valiosa y su desolación. No se detectaron revisiones posteriores que alteren el contenido.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton explícito.
  - Se prefirió «tierra» para אֶרֶץ en todo el verso para mantener la coherencia con «tierra desolada» y «tierra deleitosa».
  - Se conservó la tensión entre esparcimiento divino y desolación causada por la conducta humana, sin convertir el final en una pura pasiva impersonal.
  - Se mantuvo el registro bíblico moderno y digno, evitando un calco duro como «sobre todas las naciones» o «paserí» que sonaría menos natural en español.
