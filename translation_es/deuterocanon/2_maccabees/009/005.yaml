revisions:
- from: Pero el Señor[a], el Dios de Israel, que todo lo ve, lo hirió con un golpe incurable e invisible; y, apenas había terminado de hablar, lo alcanzó un dolor incurable en sus entrañas, y amargos tormentos en sus partes internas[b].
  to: Pero Yahvé[a], el Dios de Israel, que todo lo ve, lo hirió con un golpe incurable e invisible[b]; y apenas terminó de hablar, se apoderó de él un dolor incurable en sus entrañas, y amargos tormentos en su interior[c].
  rationale: La revisión alinea el texto principal con la terminología del proyecto («Yahvé»), mejora la naturalidad del español temporal («apenas terminó de hablar»), refuerza el matiz súbito de ἔλαβεν αὐτόν con «se apoderó de él», y reemplaza la expresión rígida «partes internas» por «su interior». También separa mejor las notas para que cada una documente con claridad una decisión fuente-significado relevante.
