translation:
  language: es
  text: Ahora, pues, da un paso al frente primero y cumple la orden del rey, como han hecho todas las naciones, y los gobernantes de Judá, y los que quedaron en Jerusalén; y tú y tu casa serán contados entre los Amigos[a] del rey; y tú y tus hijos serán honrados con plata y oro y con muchos dones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «amigos»; el griego puede aludir al título cortesano «Amigos», un grupo reconocido de consejeros y compañeros favorecidos.
    reason: lexical_alternative
  - marker: b
    text: O «beneficios» o «dádivas». El término puede referirse a recompensas o distribuciones reales adicionales junto con la plata y el oro.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρόσελθε
  english_pob_choice: come forward
  chosen_spanish: preséntate
  alternatives_spanish:
  - acércate
  - preséntate adelante
  lexicon: LSJ
  rationale: El imperativo pide que el interlocutor se ponga al frente de manera visible. «Preséntate» comunica bien la acción pública y la presión del contexto sin sonar torpe en español.
- source_word: πρῶτος
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - como el primero
  - antes que los demás
  lexicon: LSJ
  rationale: «Primero» conserva la idea de precedencia e imitación ejemplar que exige el contexto.
- source_word: τὸ πρόσταγμα τοῦ βασιλέως
  english_pob_choice: carry out the king’s command
  chosen_spanish: la orden del rey
  alternatives_spanish:
  - el mandato del rey
  - el decreto del rey
  lexicon: LSJ
  rationale: πρόσταγμα denota una orden autoritativa. En español, «orden» es natural y preciso; «cumple» expresa obediencia activa sin añadir matiz ajeno.
- source_word: τὰ ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: LSJ
  rationale: Se mantiene el alcance amplio del griego sin introducir una categoría teológica más estrecha que el texto no explicita aquí.
- source_word: οἱ ἄρχοντες Ἰούδα
  english_pob_choice: the rulers of Judah
  chosen_spanish: los gobernantes de Judá
  alternatives_spanish:
  - los dirigentes de Judá
  - los jefes de Judá
  lexicon: LSJ
  rationale: ἄρχοντες apunta a autoridades políticas. «Gobernantes» es claro y conserva esa fuerza de autoridad.
- source_word: οἱ καταλειφθέντες ἐν Ἰερουσαλήμ
  english_pob_choice: those left in Jerusalem
  chosen_spanish: los que quedaron en Jerusalén
  alternatives_spanish:
  - los que permanecieron en Jerusalén
  - los sobrevivientes de Jerusalén
  lexicon: LSJ
  rationale: La frase puede expresar simplemente a los que permanecen o han sido dejados allí. «Los que quedaron» es natural y no sobreinterpreta el matiz.
- source_word: τῶν φίλων τοῦ βασιλέως
  english_pob_choice: among the king’s Friends
  chosen_spanish: entre los Amigos del rey
  alternatives_spanish:
  - entre los amigos del rey
  - entre los íntimos del rey
  lexicon: LSJ
  rationale: Se conserva la posible acepción de título cortesano. La mayúscula en «Amigos» refleja esa lectura histórica sin abandonar la inteligibilidad en español.
- source_word: δοξασθήσεσθε
  english_pob_choice: will be honored
  chosen_spanish: serán honrados
  alternatives_spanish:
  - serán glorificados
  - serán distinguidos
  lexicon: LSJ
  rationale: El pasivo aquí indica recibir honor o distinción real, no gloria divina. «Serán honrados» reproduce bien el valor social y político.
- source_word: ἀποστολαῖς πολλαῖς
  english_pob_choice: many gifts
  chosen_spanish: con muchos dones
  alternatives_spanish:
  - con muchas dádivas
  - con muchos beneficios
  lexicon: LSJ
  rationale: En el contexto de plata y oro, el término apunta a recompensas o beneficios reales. «Dones» preserva amplitud semántica y suena natural en español bíblico.
theological_decisions:
- issue: Posible título cortesano en φίλοι
  english_pob_reading: Render as 'the king’s Friends' with capitalization
  chosen_spanish_reading: «Amigos» con mayúscula en «Amigos del rey»
  alternative_spanish_readings:
  - «amigos» en minúscula
  - «íntimos del rey»
  rationale: La escena trata de una oferta política de favor regio. La mayúscula ayuda a sugerir un cargo o grupo cortesano reconocido, como en la lectura inglesa auditada, sin forzar una paráfrasis extensa.
  doctrine_reference: Translation philosophy §1, §5
- issue: Alcance de ἔθνη
  english_pob_reading: Translate as 'the nations'
  chosen_spanish_reading: «las naciones»
  alternative_spanish_readings:
  - «los gentiles»
  - «los pueblos»
  rationale: El griego admite fuerza étnica, pero aquí el contraste es político e histórico. «Las naciones» conserva el vocabulario fuente sin importar una categoría más técnica que el texto no necesita.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego y coincide con la auditoría inglesa de alta concordancia: conserva el contraste político de «las naciones», mantiene la posible lectura cortesana de φίλοι y traduce ἀποστολαῖς πολλαῖς con un sustantivo amplio («dones») en línea con la nota de beneficios o recompensas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda; este versículo no lo contiene.
  - «Amigos» se capitaliza para reflejar la posible lectura de título cortesano, consistente con la POB inglesa.
  - Se evita «Cristo»/«Mesías» porque no aparece en este versículo.
  - Se mantiene la diferencia entre «orden» y «mandato» en la nota, sin introducir tecnicismo innecesario en el texto principal.
