translation:
  language: es
  text: 'Así dice Ciro, rey de los persas: el Señor de Israel[a], el Señor, el Altísimo, me ha designado rey del mundo,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo hebreo de Esdras 1:2 dice: «Yahvé, el Dios del cielo», en lugar de «el Señor de Israel, el Señor, el Altísimo». 1 Esdras conserva aquí la forma griega de la proclamación.'
    reason: alternative_reading
lexical_decisions:
- source_word: Τάδε λέγει
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Estas cosas dice
  - Esto dice
  lexicon: LSJ
  rationale: Es la fórmula profética/proclamativa natural en español y conserva el tono solemne y declarativo del griego sin volverla artificial.
- source_word: ὁ βασιλεὺς Περσῶν Κῦρος
  english_pob_choice: Cyrus king of the Persians
  chosen_spanish: Ciro, rey de los persas
  alternatives_spanish:
  - Ciro, rey de Persia
  - Rey Ciro de los persas
  lexicon: LSJ
  rationale: Mantiene el orden appositivo del griego con puntuación natural en español y conserva el etnónimo plural del texto griego, en lugar de nivelarlo con el singular del paralelo hebreo.
- source_word: Ἐμὲ ἀνέδειξεν
  english_pob_choice: has appointed me
  chosen_spanish: me ha designado
  alternatives_spanish:
  - me ha nombrado
  - me ha constituido
  lexicon: LSJ
  rationale: ἀναδείκνυμι aquí expresa investidura o designación para un cargo; 'ha designado' transmite bien esa idea en español moderno y digno.
- source_word: βασιλέα
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - como rey
  - para ser rey
  lexicon: LSJ
  rationale: La construcción predicativa en español queda natural con 'rey' tras 'ha designado', sin necesidad de añadir palabras que suavicen la fuerza del verbo.
- source_word: τῆς οἰκουμένης
  english_pob_choice: of the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - del mundo habitado
  - de la tierra habitada
  lexicon: LSJ
  rationale: '''Del mundo'' es una equivalencia natural que conserva la amplitud universal e imperial del término griego, como en la traducción inglesa auditada.'
- source_word: ὁ κύριος τοῦ Ἰσραήλ
  english_pob_choice: The Lord of Israel
  chosen_spanish: el Señor de Israel
  alternatives_spanish:
  - el Señor, el Dios de Israel
  - el Señor perteneciente a Israel
  lexicon: LSJ
  rationale: Se conserva 'Señor' para κύριος, siguiendo el valor del inglés auditado, y se mantiene la relación genitiva explícita 'de Israel' sin sustituirla por una formulación interpretativa.
- source_word: Κύριος ὁ ὕψιστος
  english_pob_choice: the Most High Lord
  chosen_spanish: el Señor Altísimo
  alternatives_spanish:
  - el Señor, el Altísimo
  - el Señor, Altísimo
  lexicon: LSJ
  rationale: En español, 'Señor Altísimo' reproduce de manera natural la aposición del griego y evita la extrañeza de una traducción demasiado literal como 'el Altísimo Señor' si esta resultara menos idiomática.
theological_decisions:
- issue: Diferencia entre los títulos divinos del griego de 1 Esdras y el paralelo hebreo de Esdras
  english_pob_reading: The Lord of Israel, the Most High Lord
  chosen_spanish_reading: el Señor de Israel, el Señor Altísimo
  alternative_spanish_readings:
  - Yahvé, el Dios del cielo
  - el Señor, el Dios de Israel
  rationale: La traducción principal sigue el testimonio griego de 1 Esdras, no el paralelo hebreo. Por eso se conservan los títulos tal como aparecen en el griego, dejando constancia de que el paralelo hebreo usa otra formulación.
  doctrine_reference: Primacía de la fuente original; YHWH se traduce 'Yahvé' en el texto principal cuando el hebreo lo exige, pero aquí el griego usa κύριος en una forma titulada distinta y debe reflejarse como 'Señor'.
translation_notes:
  revision_awareness: Se siguió de cerca el griego de Swete (1 Esdras 2:3) como ancla principal. La versión inglesa auditada confirma la sintaxis proclamativa y la elección de 'of the world'; el paralelo hebreo se mantuvo solo como apoyo para transparencia textual, no como base principal de la traducción.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος en los títulos divinos del griego, coherente con el valor de la versión inglesa auditada.
  - Se conserva el etnónimo plural 'persas' como reflejo del griego Περσῶν.
  - La puntuación con dos puntos después de 'persas' reproduce bien el tono de decreto o proclamación.
  - No se introduce 'Cristo', 'SEÑOR' en mayúsculas ni otra terminología eclesiástica no presente en la fuente.
