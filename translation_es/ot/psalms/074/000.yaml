translation:
  language: es
  text: Maskil[a] de Asaf. ¿Por qué, Dios, nos has rechazado para siempre? ¿Por qué humea tu ira contra las ovejas de tu pasto?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Maskil» es un tecnicismo del encabezamiento poético; puede indicar una composición contemplativa o instructiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשְׂכִּיל
  english_pob_choice: Maskil
  chosen_spanish: Maskil
  alternatives_spanish:
  - canto instructivo
  - poema contemplativo
  lexicon: title/heading term
  rationale: Se conserva el tecnicismo del encabezamiento porque el inglés POB lo trató como título técnico y no como una palabra común; en español, «Maskil» mantiene la señal de forma literaria/funcional sin imponer una interpretación no explicitada por el hebreo ni por el audit trail inglés.
- source_word: זָנַחְתָּ
  english_pob_choice: have you rejected
  chosen_spanish: nos has rechazado
  alternatives_spanish:
  - nos has desechado
  - nos has abandonado
  lexicon: verb of rejection/abandonment
  rationale: «Rechazado» comunica la fuerza de abandono/desestimación del verbo hebreo sin suavizarla. Se añade «nos» porque el contexto del salmo habla en nombre de la comunidad, y el plural está apoyado por la línea siguiente de la sección y por la lectura litúrgica del pasaje.
- source_word: לָנֶצַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - definitivamente
  lexicon: duration/adverb
  rationale: «Para siempre» es la equivalencia natural y transparente en español para duración indefinida o permanente, manteniendo la intensidad del reclamo del salmista.
- source_word: אַפְּךָ
  english_pob_choice: your anger
  chosen_spanish: tu ira
  alternatives_spanish:
  - tu enojo
  - tu furor
  lexicon: anger/wrath
  rationale: «Ira» preserva el registro bíblico y la fuerza judicial/teológica del hebreo mejor que un término más coloquial. El contexto del humo refuerza la imagen de juicio encendido.
- source_word: יֶעְשַׁן
  english_pob_choice: smoke
  chosen_spanish: humea
  alternatives_spanish:
  - echa humo
  - se enciende
  lexicon: smoke/smolder
  rationale: El presente descriptivo «humea» reproduce bien la imagen verbal de un enojo que exhala humo o se aviva, sin forzar una paráfrasis excesiva.
- source_word: בְּצֹאן מַרְעִיתֶךָ
  english_pob_choice: the sheep of your pasture
  chosen_spanish: las ovejas de tu prado
  alternatives_spanish:
  - las ovejas de tu pasto
  - el rebaño de tu pastizal
  lexicon: pasture/sheep imagery
  rationale: «Prado» conserva la metáfora pastoril de forma clara y literaria en español. «Ovejas» mantiene el plural concreto del hebreo y la imagen de pertenencia al cuidado divino.
theological_decisions:
- issue: Destino del rechazo divino expresado por זָנַחְתָּ לָנֶצַח
  english_pob_reading: have you rejected us forever
  chosen_spanish_reading: nos has rechazado para siempre
  alternative_spanish_readings:
  - nos has desechado para siempre
  - nos has abandonado para siempre
  rationale: 'La formulación mantiene la tensión del lamento: el hablante percibe un rechazo persistente y extremo, sin resolverlo prematuramente. «Rechazado» conserva la fuerza de la queja comunitaria.'
  doctrine_reference: Salmo de lamento comunitario; teología de la queja en oración israelita.
- issue: Antropomorfismo de la ira divina que 'humea'
  english_pob_reading: your anger smoke
  chosen_spanish_reading: tu ira humea
  alternative_spanish_readings:
  - tu furor humea
  - tu enojo humea
  rationale: Se conserva la imagen corporal/metafórica del hebreo en vez de explicarla o suavizarla. El español puede sostener esa tensión sin perder inteligibilidad.
  doctrine_reference: Lenguaje figurado sobre la ira de Dios en la poesía hebrea.
translation_notes:
  revision_awareness: La revisión inglesa corrigió una omisión inicial y completó el versículo después del encabezamiento. El español refleja esa decisión al incluir tanto el título técnico como las dos preguntas del texto hebreo, preservando el tono formal y la imaginería pastoril.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים conforme al estándar del proyecto.
  - Se mantiene el plural comunitario «nos» de acuerdo con el lamento colectivo implícito en el hebreo y explícito en la sintaxis del salmo.
  - Se conserva el tratamiento en segunda persona singular para Dios, coherente con el hebreo.
  - No se usa «SEÑOR» porque el texto hebreo aquí tiene אֱלֹהִים, no el Tetragrámaton.
