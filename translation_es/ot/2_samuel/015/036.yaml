translation:
  language: es
  text: 'Miren, allí están con ellos sus dos hijos: Ahimaaz, de Sadoc, y Jonatán, de Abiatar. Ustedes me enviarán por medio de ellos[a] todo asunto que oigan[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por su mano». El hebreo dice literalmente «por su mano», un modismo de agencia o transmisión.
    reason: lexical_alternative
  - marker: b
    text: O «todo lo que oigan» o «todo informe que oigan».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Ve
  lexicon: HALOT
  rationale: La partícula introduce una llamada enfática de atención. «Mira» conserva la fuerza deíctica y resulta natural en español moderno, sin recurrir a un arcaísmo.
- source_word: שָׁם עִמָּם
  english_pob_choice: are there with them
  chosen_spanish: allí están con ellos
  alternatives_spanish:
  - están allí
  - están con ellos allí
  lexicon: HALOT
  rationale: El hebreo sitúa a los hijos junto con los sacerdotes. En español conviene hacer explícito el verbo «están» para una frase fluida, manteniendo a la vez el valor locativo y relacional.
- source_word: שְׁנֵי בְנֵיהֶם
  english_pob_choice: their two sons
  chosen_spanish: sus dos hijos
  alternatives_spanish:
  - los dos hijos de ellos
  - sus dos hijos varones
  lexicon: HALOT
  rationale: «בנים» aquí refiere claramente a descendientes varones ya identificados por nombre. «Hijos» es el término natural en español y evita una redundancia innecesaria con los nombres posteriores.
- source_word: אֲחִימַעַץ לְצָדוֹק וִיהוֹנָתָן לְאֶבְיָתָר
  english_pob_choice: Ahimaaz for Zadok, and Jonathan for Abiathar
  chosen_spanish: Ahimaaz, de Sadoc, y Jonatán, de Abiatar
  alternatives_spanish:
  - Ahimaaz, de parte de Sadoc, y Jonatán, de parte de Abiatar
  - Ahimaaz, hijo de Sadoc, y Jonatán, hijo de Abiatar
  lexicon: HALOT
  rationale: El lamed en contexto marca pertenencia o relación filial. «De Sadoc / de Abiatar» comunica esa relación con naturalidad, mientras que «hijo de» sería más explícito pero añade una glosa interpretativa que el hebreo no formula aquí.
- source_word: וּשְׁלַחְתֶּם
  english_pob_choice: You shall send
  chosen_spanish: Ustedes enviarán
  alternatives_spanish:
  - envíen
  - deberán enviar
  lexicon: HALOT
  rationale: La forma verbal tiene fuerza directiva. En español, el futuro puede expresar mandato o instrucción; «ustedes enviarán» preserva esa fuerza sin sonar excesivamente legalista.
- source_word: בְּיָדָם
  english_pob_choice: by their hand
  chosen_spanish: por medio de ellos
  alternatives_spanish:
  - por su mano
  - por su intermediación
  lexicon: HALOT
  rationale: El hebreo usa el modismo «por la mano de ellos» para agencia o mediación. En español, «por medio de ellos» transmite el mismo valor idiomático con mayor claridad, aunque se conserva la idea de intermediación.
- source_word: כָּל דָּבָר
  english_pob_choice: every matter
  chosen_spanish: toda palabra
  alternatives_spanish:
  - todo asunto
  - cada cosa
  - todo mensaje
  lexicon: HALOT
  rationale: דבר puede significar palabra, asunto, cosa o mensaje. Dado el contexto de transmisión de información, «toda palabra» mantiene la amplitud del término sin precisar más de lo que el hebreo exige.
- source_word: אֲשֶׁר תִּשְׁמָעוּ
  english_pob_choice: that you hear
  chosen_spanish: que oigan
  alternatives_spanish:
  - que escuchen
  - que lleguen a oír
  lexicon: HALOT
  rationale: El verbo שׁמע conserva su sentido básico de «oír», especialmente apropiado aquí para noticias o información recibida. En español, «oigan» sigue de cerca el valor semántico y el registro de instrucción.
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se registran cambios necesarios en el texto base. Se mantuvo la estructura informativa del hebreo y la fuerza directiva de la oración final.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como terminología predeterminada solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se evitó «Cristo»/«Mesías», pues no aparecen en el versículo.
  - Se optó por «por medio de ellos» en el texto principal para naturalidad, dejando la literalidad «por su mano» en nota, conforme al auditable de la expresión hebrea.
  - 'Se mantuvo el orden informativo del original: deíctico inicial, ubicación de los hijos, identificación nominal, instrucción final.'
