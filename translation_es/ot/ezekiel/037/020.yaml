translation:
  language: es
  text: Y los palos[a] sobre los cuales escribes estarán en tu mano ante sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las piezas de madera». El hebreo puede referirse más ampliamente a madera, pero en este acto simbólico denota los palos que Ezequiel sostiene e inscribe.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  english_pob_choice: And ... will be
  chosen_spanish: Y ... serán
  alternatives_spanish:
  - Y ... estarán
  - Y ... llegarán a ser
  lexicon: HALOT
  rationale: En este contexto profético de acto simbólico, el hebreo expresa el resultado esperado de la acción ordenada. «Serán» conserva el valor de futuro y resulta natural en español sin introducir una idea de cambio adicional que «llegarán a ser» podría sugerir.
- source_word: הָעֵצִים
  english_pob_choice: the sticks
  chosen_spanish: los palos[a]
  alternatives_spanish:
  - los bastones
  - las piezas de madera
  lexicon: HALOT
  rationale: El término hebreo puede designar madera en general, pero en este gesto profético se trata de objetos concretos que Ezequiel sostiene e inscribe. «Palos» conserva esa concreción en español. Se añade una nota para reflejar la amplitud léxica posible sin perder el sentido del signo-acto.
- source_word: אֲשֶׁר תִּכְתֹּב עֲלֵיהֶם
  english_pob_choice: on which you write
  chosen_spanish: que tú escribirás sobre ellos
  alternatives_spanish:
  - en los que escribirás
  - sobre los cuales escribirás
  lexicon: HALOT
  rationale: Se mantiene la relación relativa y el verbo de escritura con la preposición «sobre», que corresponde de modo directo al hebreo עַל. «Sobre ellos» conserva la imagen física de inscribir en los objetos.
- source_word: בְּיָדְךָ
  english_pob_choice: in your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en la mano que tienes
  - sujetos en tu mano
  lexicon: HALOT
  rationale: El singular hebreo se refleja naturalmente con «tu mano». Esto mantiene la idea de posesión/tenencia física del signo, no solo de agencia.
- source_word: לְעֵינֵיהֶם
  english_pob_choice: before their eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - a la vista de ellos
  - ante sus ojos
  lexicon: HALOT
  rationale: La expresión idiomática conserva el énfasis visual del hebreo. «Delante de sus ojos» es una equivalencia idiomática clara y fiel en español, y mantiene la vivacidad del acto público.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el criterio auditado del POB inglés, conservando el carácter concreto del signo-acto y la secuencia verbal futura del resultado. No se introducen añadidos interpretativos; la única nota señala la amplitud semántica posible de הָעֵצִים en este contexto.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no aparece, por lo que no se añade ninguna sustitución.
  - Se mantiene un registro bíblico sobrio y moderno, evitando calcos excesivamente literales como «en tus manos» o «a sus ojos» cuando una equivalencia idiomática más natural preserva mejor el sentido.
  - La nota de pie de página acompaña al sustantivo concreto para transparentar la alternativa léxica documentada por el audit trail inglés.
