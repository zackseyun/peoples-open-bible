base_translation:
  language: en
  yaml_path: translation/ot/daniel/002/041.yaml
  text: And as you saw the feet and toes[a], partly of potter’s clay and partly of iron, the kingdom will be divided; but some of the firmness of iron will be in it[b], just as you saw the iron mixed with muddy clay.
  footnotes:
  - marker: a
    text: Or 'some of the strength of iron will be in it.' The Aramaic term can denote firmness, strength, or stability.
    reason: lexical_alternative
  - marker: b
    text: Or 'mixed with muddy clay.' The phrase combines terms for clay and mud, emphasizing the unstable mixture.
    reason: lexical_alternative
