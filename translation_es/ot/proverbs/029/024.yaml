revisions:
- from: Quien comparte con un ladrón odia su propia vida; oye una maldición[a] y no la divulga.
  to: Quien comparte con un ladrón odia su propia vida; oye una maldición[a] y no la declara.
  rationale: Se cambia «no la divulga» por «no la declara» porque representa mejor el sentido de יַגִּיד en este proverbio, especialmente dada la probable escena legal implícita en אָלָה. Se conserva «maldición» con nota sobre «adjuración», en línea con la auditoría inglesa y el campo semántico del hebreo.
