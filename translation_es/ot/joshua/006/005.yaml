translation:
  language: es
  text: Y cuando el cuerno del carnero dé un toque prolongado[a], cuando oigan el sonido de la trompeta, todo el pueblo dará un gran grito, y el muro de la ciudad caerá en su lugar[b], y el pueblo subirá[c], cada hombre directamente hacia adelante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando el cuerno del carnero suene prolongadamente», o «cuando el toque del cuerno del carnero se prolongue».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el muro de la ciudad caerá debajo de sí mismo», probablemente con el sentido de que se desplomará rectamente hacia abajo.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «cada uno directamente hacia adelante» o «cada hombre recto delante de sí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּמְשֹׁךְ
  english_pob_choice: sounds a long blast
  chosen_spanish: se extienda
  alternatives_spanish:
  - suene prolongadamente
  - dé un toque prolongado
  - se prolongue
  lexicon: HALOT
  rationale: El hebreo expresa la prolongación del toque del cuerno; en español, «se extienda» conserva la idea de duración/estiramiento del sonido sin volverlo demasiado técnico o mecánico.
- source_word: קֶרֶן הַיּוֹבֵל
  english_pob_choice: the ram's horn
  chosen_spanish: el cuerno del carnero
  alternatives_spanish:
  - el cuerno de jubileo
  - el cuerno
  - el shofar
  lexicon: HALOT
  rationale: En este contexto no se trata del término técnico posterior «jubileo», sino del cuerno de carnero usado como instrumento. «Cuerno del carnero» es transparente y fiel al valor contextual.
- source_word: ק֣וֹל הַשּׁוֹפָר
  english_pob_choice: the sound of the trumpet
  chosen_spanish: el sonido del cuerno
  alternatives_spanish:
  - el sonido de la trompeta
  - el sonido del shofar
  lexicon: HALOT
  rationale: שׁוֹפָר designa un cuerno/instrumento de cuerno; en español «cuerno» mantiene el referente concreto del hebreo. «Trompeta» sería más idiomático, pero menos preciso para el objeto ritual específico.
- source_word: יָרִיעוּ
  english_pob_choice: shall raise
  chosen_spanish: dará un gran grito
  alternatives_spanish:
  - gritará
  - alzará un gran grito
  - dará un grito de guerra
  lexicon: HALOT
  rationale: El verbo es el de levantar un clamor; con el sustantivo siguiente, en español resulta natural expresarlo como «dará un gran grito», preservando la intensidad y evitando una construcción forzada.
- source_word: תְּרוּעָה גְדוֹלָה
  english_pob_choice: a great shout
  chosen_spanish: un gran grito
  alternatives_spanish:
  - un grito muy fuerte
  - un gran clamor
  - un grito de guerra
  lexicon: HALOT
  rationale: «תְּרוּעָה» puede ser grito, clamor o grito de guerra. Aquí, dado el contexto narrativo, «gran grito» comunica bien la fuerza colectiva sin añadir una especificación militar no explicitada por el hebreo.
- source_word: וְנָפְלָה
  english_pob_choice: will fall
  chosen_spanish: caerá hacia abajo
  alternatives_spanish:
  - caerá
  - se derrumbará
  - se desplomará
  lexicon: HALOT
  rationale: El valor resultativo del qatal con waw se expresa naturalmente en futuro. «Caerá hacia abajo» conserva el movimiento descendente que el hebreo enfatiza.
- source_word: תַּחְתֶּיהָ
  english_pob_choice: beneath it
  chosen_spanish: debajo de él
  alternatives_spanish:
  - debajo de sí misma
  - en su lugar
  - bajo ella
  lexicon: HALOT
  rationale: El hebreo literaliza el colapso del muro «debajo de ella/él». En español, «debajo de él» mantiene la imagen de caída sin introducir una explicación interpretativa.
- source_word: וְעָלוּ
  english_pob_choice: shall go up
  chosen_spanish: subirá
  alternatives_spanish:
  - subirán
  - ascenderán
  - avanzarán
  lexicon: HALOT
  rationale: El hebreo usa el verbo «subir», que en contexto de sitio conserva la imagen de avanzar hacia la ciudad en altura. «Subirá» refleja el verbo básico con naturalidad, aunque el sujeto colectivo esté implícito.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  lexicon: HALOT
  rationale: La forma hebrea es singular distributiva masculina; «cada hombre» preserva esa fuerza y el contexto militar del pasaje.
- source_word: נֶגְדּוֹ
  english_pob_choice: straight before him
  chosen_spanish: derecho delante de él
  alternatives_spanish:
  - recto delante de él
  - directamente delante de él
  - en línea recta delante de él
  lexicon: HALOT
  rationale: La expresión indica avanzar rectamente hacia adelante. «Derecho delante de él» conserva el valor espacial del hebreo y la distribución individual del sujeto.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que prefirió una formulación idiomática para el sonido prolongado del cuerno y una imagen más clara para la caída del muro; en español se mantuvo la misma distinción entre la prolongación del toque, el sonido del cuerno, el grito del pueblo y el avance individual. También se conservó la ambigüedad espacial de תַּחְתֶּיהָ con una nota que permite la lectura literal del colapso.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - Se prefirió «cuerno» para שׁוֹפָר porque el referente ritual es claro en el contexto y evita introducir una equivalencia más libre.
  - «Cada hombre» mantiene la fuerza distributiva masculina del hebreo, en línea con la política de precisión de género del proyecto.
  - Se evitó «trompeta» para no borrar la especificidad del instrumento hebreo y para conservar la imagen ritual del pasaje.
