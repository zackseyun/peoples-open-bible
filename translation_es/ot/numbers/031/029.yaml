translation:
  language: es
  text: De su mitad tomarán y la darán a Eleazar el sacerdote como contribución[a] de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "ofrenda de Yahvé" o "la contribución para Yahvé"; el hebreo תְּרוּמָה designa una porción apartada para uso sagrado.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמַּחֲצִיתָם
  english_pob_choice: From their half
  chosen_spanish: De su mitad
  alternatives_spanish:
  - De la mitad de ellos
  - De su porción
  lexicon: HALOT
  rationale: El hebreo expresa el origen con מִן y el sustantivo "mitad" en sentido posesivo/refiriendo la parte asignada. "De su mitad" suena natural en español y conserva la referencia al reparto previo sin añadir contenido.
- source_word: תִּקָּחוּ
  english_pob_choice: you shall take
  chosen_spanish: tomarán
  alternatives_spanish:
  - tomarán ustedes
  - deberán tomar
  - tomen
  lexicon: HALOT
  rationale: Aunque la forma hebrea es 2mp, funciona como instrucción legal. En español, "tomarán" mantiene el valor directivo con tono sobrio y evita una construcción demasiado pesada.
- source_word: וְנָתַתָּה
  english_pob_choice: and give
  chosen_spanish: y se la darán
  alternatives_spanish:
  - y darán
  - y la darás
  lexicon: HALOT
  rationale: El hebreo continúa la secuencia imperativa/instructiva. En español, "se la darán" reproduce el acto de entregar el porción marcada para Eleazar y evita forzar la alternancia de número del hebreo.
- source_word: לְאֶלְעָזָר
  english_pob_choice: to Eleazar
  chosen_spanish: a Eleazar
  alternatives_spanish:
  - para Eleazar
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar. "A Eleazar" conserva el dativo de destinación con naturalidad en español.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote consagrado
  - el ministro
  lexicon: HALOT
  rationale: '"Sacerdote" es el equivalente directo y más claro en español para el título definido; evita sustituirlo por un término menos preciso o más interpretativo.'
- source_word: תְּרוּמַת יְהוָה
  english_pob_choice: Yahweh’s contribution
  chosen_spanish: contribución de Yahvé
  alternatives_spanish:
  - ofrenda de Yahvé
  - porción apartada para Yahvé
  - contribución para Yahvé
  lexicon: HALOT
  rationale: '"תרומה" designa una porción apartada para uso sagrado. "Contribución" sigue la decisión POB inglesa y comunica el sentido de una porción dedicada; se mantiene la referencia personal del nombre divino como "Yahvé".'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se preserva el nombre divino explícito del hebreo en la forma de la serie POB en español: "Yahvé", en lugar de sustituirlo por un título.'
theological_decisions:
- issue: La porción dedicada de los despojos como cosa sagrada
  english_pob_reading: the LORD’s contribution
  chosen_spanish_reading: contribución de Yahvé
  alternative_spanish_readings:
  - ofrenda de Yahvé
  - porción apartada para Yahvé
  rationale: El término hebreo תְּרוּמָה señala algo apartado para uso sagrado. "Contribución" conserva el matiz de una porción separada y evita cargar el versículo con un tecnicismo litúrgico que en español moderno sería menos claro.
  doctrine_reference: DOCTRINE.md Translation philosophy §6 (Readable modern English, not archaic or academic)
- issue: Representación del nombre divino en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La versión española mantiene la directriz del proyecto de rendir el Tetragrámaton con el nombre divino transliterado, no con una sustitución reverencial por título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisión posterior; la versión española sigue ese estado estable y conserva sus decisiones léxicas principales, adaptadas a un español natural y transparente.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה, conforme al criterio del proyecto.
  - Se traduce תְּרוּמָה como contribución para conservar la idea de porción apartada para uso sagrado.
  - Se conserva un tono legal/instructivo sobrio, acorde con el contexto del reparto del botín.
  - El sujeto plural del hebreo se refleja con una forma verbal plural en español para la instrucción general.
