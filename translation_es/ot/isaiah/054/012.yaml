base_translation:
  language: en
  yaml_path: translation/ot/isaiah/054/012.yaml
  text: And I will make your pinnacles of ruby[a], your gates of sparkling stone[d][c][b], and all your boundary walls of precious stones.
  footnotes:
  - marker: a
    text: Hebrew כַּדְכֹד likely names a red or brilliant gemstone; possible renderings include 'garnet' or 'red jasper.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term translated 'pinnacles' is rare and may also be understood as 'battlements' or 'windows.'
    reason: lexical_alternative
  - marker: c
    text: The expression translated 'sparkling stone' refers to a bright or fiery gemstone; older translations often render it 'carbuncle.'
    reason: lexical_alternative
  - marker: d
    text: Or 'all your borders' or 'all your territory,' though the city-building imagery here favors an architectural sense.
    reason: lexical_alternative
