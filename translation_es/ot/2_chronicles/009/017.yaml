translation:
  language: es
  text: El rey hizo un gran trono de marfil y lo recubrió de oro puro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «un trono de diente»; la expresión significa un trono de marfil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - construyó
  lexicon: HALOT
  rationale: En este contexto narrativo, עשה expresa la acción de producir o elaborar el objeto. «Hizo» es natural en español y conserva la sencillez del hebreo sin introducir una técnica de fabricación no explicitada.
- source_word: הַמֶּלֶךְ
  english_pob_choice: The king
  chosen_spanish: El rey
  alternatives_spanish:
  - El monarca
  lexicon: HALOT
  rationale: El hebreo usa el título definido, no el nombre propio. «El rey» reproduce esa forma y mantiene el referente real sin añadir información.
- source_word: כִּסֵּא
  english_pob_choice: throne
  chosen_spanish: trono
  alternatives_spanish:
  - asiento
  lexicon: HALOT
  rationale: Por el contexto real, כסא se refiere al asiento regio. «Trono» comunica con precisión el sentido monárquico que «asiento» perdería en español.
- source_word: שֵׁן
  english_pob_choice: ivory
  chosen_spanish: marfil
  alternatives_spanish:
  - de marfil
  - colmillo
  lexicon: HALOT
  rationale: La construcción כסא שן es idiomática y alude al material marfil. En español, «de marfil» sería muy explícito, pero «trono de marfil» fluye bien y preserva el valor material sin calcar «tooth».
- source_word: גָּדוֹל
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - majestuoso
  lexicon: HALOT
  rationale: גדול combina tamaño e imponencia. «Gran» mantiene en español esa idea de magnitud e importancia mejor que un adjetivo meramente dimensional.
- source_word: וַיְצַפֵּהוּ
  english_pob_choice: overlaid it
  chosen_spanish: lo recubrió
  alternatives_spanish:
  - lo cubrió
  - lo plateó
  lexicon: HALOT
  rationale: El piel de צפה con sufijo indica cubrir con una capa material. «Lo recubrió» expresa el revestimiento en español de forma natural; «plateó» sugeriría un proceso más técnico y estrecho.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  - oro
  lexicon: HALOT
  rationale: El sustantivo material se traduce directamente como «oro». En español, «oro puro» funciona de manera natural junto con el adjetivo siguiente.
- source_word: טָהוֹר
  english_pob_choice: pure
  chosen_spanish: puro
  alternatives_spanish:
  - refinado
  - limpio
  lexicon: HALOT
  rationale: Con metales preciosos, טהור expresa pureza o ausencia de mezcla. «Puro» es la colocación más clara y fiel en español.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés y no requiere cambios sustantivos. Se mantuvo la estructura simple de una sola oración y la imagen material del trono de marfil recubierto de oro puro, con una nota que preserva la expresión hebrea literal sin dejar de comunicar su sentido idiomático.
  spanish_consistency_notes:
  - Se conservó el título genérico «el rey» en lugar del nombre propio, siguiendo el hebreo.
  - «Marfil» traduce el valor idiomático de שֵׁן en esta construcción; la nota conserva la literalidad hebrea.
  - «Oro puro» reproduce la collocación natural en español y evita una paráfrasis excesiva.
  - Se mantuvo un tono bíblico moderno y digno, sin arcaísmos innecesarios.
