theological_decisions:
- issue: Meaning of the rare philosophical-moral phrase τῆς εὐλογιστίας παθοκρατία
  chosen_reading: A commendation of virtuous rational mastery over passions/sufferings, expressed as 'the mastery of reason guided by blessedness'
  alternative_readings:
  - the mastery over passions that belongs to piety
  - the dominion over suffering produced by blessedness
  rationale: The verse belongs to 4 Maccabees' sustained argument that reason, shaped by virtue and devotion, rules the passions. Because εὐλογιστία is rare and the exact nuance is debated, the translation keeps the core claim—moral-rational mastery—without importing a narrower doctrinal term not explicit in the Greek.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern English, not archaic or academic.'
