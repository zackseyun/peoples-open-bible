translation:
  language: es
  text: 'Entonces el rey David dijo a toda la asamblea: «Salomón, mi hijo, a quien solo Dios ha elegido, es joven e inexperto[a], y la obra es grande; porque el palacio[b] no es para el hombre, sino para Yahvé Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «joven y tierno». El hebreo describe a Salomón como joven y todavía no curtido para una tarea tan grande.
    reason: lexical_alternative
  - marker: b
    text: O «ciudadela» o «fortaleza». Aquí «palacio» se refiere al gran edificio preparado para Yahvé, es decir, al complejo del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקָּהָל
  english_pob_choice: the assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - la reunión del pueblo
  lexicon: HALOT
  rationale: קָהָל designa al pueblo reunido en calidad pública y corporativa. «Asamblea» conserva ese valor y evita el matiz más eclesiástico de «congregación» en este contexto narrativo.
- source_word: אֶחָד
  english_pob_choice: whom alone
  chosen_spanish: a quien solo
  alternatives_spanish:
  - a quien únicamente
  - el único a quien
  lexicon: HALOT
  rationale: 'La idea no es solo numerativa sino enfática: Solomon es el único escogido. «A quien solo» reproduce la restricción de manera natural en español y mantiene la fuerza de singularidad.'
- source_word: בָּחַר בּוֹ אֱלֹהִים
  english_pob_choice: God has chosen
  chosen_spanish: Dios ha elegido
  alternatives_spanish:
  - Dios ha escogido
  - Dios lo ha elegido
  lexicon: HALOT
  rationale: בחר expresa escoger/elegir. «Ha elegido» suena natural y solemne en español; el pronombre objeto puede omitirse porque queda claro por la construcción relativa.
- source_word: נַעַר
  english_pob_choice: young
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - un joven
  lexicon: HALOT
  rationale: Aquí se subraya la edad relativa de Salomón frente a una tarea grande. «Joven» comunica la idea sin rebajarlo a un tono infantil.
- source_word: וָרָךְ
  english_pob_choice: inexperienced
  chosen_spanish: inexperto
  alternatives_spanish:
  - sin experiencia
  - todavía tierno
  lexicon: HALOT
  rationale: רַךְ literalmente es «tierno/blando», pero en este marco de responsabilidad real la POB inglesa interpreta la inmadurez o falta de experiencia. «Inexperto» preserva esa tensión contextual con claridad.
- source_word: וְהַמְּלָאכָה גְדוֹלָה
  english_pob_choice: and the work is great
  chosen_spanish: y la obra es grande
  alternatives_spanish:
  - y el trabajo es grande
  - y la tarea es grande
  lexicon: HALOT
  rationale: מְלָאכָה se refiere a la labor/obra concreta. «Obra» es apropiado para un proyecto monumental como la edificación del templo y suena más elevado que «trabajo» en español actual.
- source_word: לְאָדָם
  english_pob_choice: for man
  chosen_spanish: para el hombre
  alternatives_spanish:
  - para un hombre
  - para la humanidad
  lexicon: HALOT
  rationale: La frase contrasta lo humano con lo divino. «El hombre» conserva el contraste representativo y la amplitud genérica del hebreo sin añadir abstracción innecesaria.
- source_word: הַבִּירָה
  english_pob_choice: the palace
  chosen_spanish: el palacio
  alternatives_spanish:
  - la fortaleza
  - la ciudadela
  - el recinto real
  lexicon: HALOT
  rationale: בִּירָה puede significar palacio, fortaleza o ciudadela. En este contexto del edificio destinado a Yahvé, la POB inglesa opta por «palace»; en español, «palacio» refleja la grandeza de la construcción sin perder la ambigüedad arquitectónica del término.
- source_word: לַיהוָה אֱלֹהִים
  english_pob_choice: for Yahweh God
  chosen_spanish: para Yahvé Dios
  alternatives_spanish:
  - para Yahvé, Dios
  - para el SEÑOR Dios
  lexicon: HALOT
  rationale: El nombre divino יהוה se rinde según la política del proyecto como «Yahvé». «Dios» conserva el segundo miembro del sintagma, que intensifica el nombre del pacto en la declaración final.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: 'Se sigue la convención del proyecto para יהוה: no enmascarar el Nombre con «SEÑOR», sino representarlo directamente. «Yahvé» mantiene la identificación del Dios del pacto en el texto principal.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Contrast between לְאָדָם and לַיהוָה אֱלֹהִים
  english_pob_reading: for man ... for the LORD God
  chosen_spanish_reading: para el hombre ... para Yahvé Dios
  alternative_spanish_readings:
  - para la humanidad ... para Yahvé Dios
  - para un hombre ... para Yahvé Dios
  rationale: La oposición retórica es entre lo meramente humano y lo perteneciente a Yahvé. «El hombre» conserva el contraste singular representativo que el hebreo permite y que la POB inglesa documenta.
  doctrine_reference: 'DOCTRINE.md Contested terms: אָדָם *adam*; Translation philosophy §4'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó la cláusula de אֶחָד a «whom alone God has chosen» para reflejar con mayor precisión la exclusividad. La redacción española incorpora ese matiz con «a quien solo Dios ha elegido».
  spanish_consistency_notes:
  - Se preserva «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se usa «asamblea» en lugar de «congregación» para mantener el registro narrativo/corporativo.
  - «Inexperto» refleja el valor contextual de רָךְ sin traducirlo mecánicamente como «tierno».
  - «Palacio» sigue la decisión auditada del POB inglés y conserva la amplitud semántica de הַבִּירָה.
  - La estructura de la cita mantiene la sintaxis y el paralelismo del hebreo sin exceder la evidencia del texto.
