translation:
  language: es
  text: 'Y Elcaná, su marido, le dijo: “Haz lo que te parezca bueno. Quédate hasta que lo hayas destetado; solo que Yahvé establezca su palabra[a]”. Entonces la mujer se quedó y amamantó a su hijo hasta que lo destetó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confirme» o «cumpla su palabra». El hebreo puede aludir a la promesa de Yahvé o al asunto recién dicho en el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: אִישָׁהּ
  english_pob_choice: her husband
  chosen_spanish: su marido
  alternatives_spanish:
  - su esposo
  - su hombre
  lexicon: HALOT
  rationale: En este contexto, אִישׁ con sufijo posesivo señala la relación conyugal de Elcaná y Ana. En español, "su marido" es natural, preciso y fiel al matiz relacional del hebreo.
- source_word: עֲשִׂי הַטּוֹב בְּעֵינַיִךְ
  english_pob_choice: Do what seems good in your eyes
  chosen_spanish: Haz lo que te parezca bueno
  alternatives_spanish:
  - Haz lo que es bueno a tus ojos
  - Haz lo que consideres mejor
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literalmente dice "haz el bien en tus ojos". "Te parezca bueno" conserva la idea de juicio personal o de lo que Ana considera adecuado, sin sonar forzado en español.
- source_word: שְׁבִי
  english_pob_choice: Stay
  chosen_spanish: Quédate
  alternatives_spanish:
  - Permanece
  - Quédate allí
  lexicon: HALOT
  rationale: El imperativo de ישׁב aquí indica permanecer en el lugar, no sentarse físicamente. "Quédate" es la equivalencia española más natural.
- source_word: עַד גָּמְלֵךְ אֹתוֹ
  english_pob_choice: until you have weaned him
  chosen_spanish: hasta que lo hayas destetado
  alternatives_spanish:
  - hasta que lo hayas criado ya sin lactancia
  - hasta que lo hayas criado
  lexicon: HALOT
  rationale: En este contexto de crianza, גמל se refiere específicamente al destete. "Destetado" preserva el sentido materno concreto del verbo.
- source_word: אַךְ
  english_pob_choice: only
  chosen_spanish: solo que
  alternatives_spanish:
  - solo
  - pero
  lexicon: HALOT
  rationale: אַךְ introduce una restricción o salvedad a la autorización anterior. "Solo que" expresa bien esa limitación en español contemporáneo.
- source_word: יָקֵם
  english_pob_choice: may ... establish
  chosen_spanish: haga cumplir
  alternatives_spanish:
  - establezca
  - confirme
  - cumpla
  lexicon: HALOT
  rationale: El jussivo con קום admite la idea de establecer, confirmar o hacer valer una palabra. En español, "haga cumplir" comunica de forma clara el sentido de que Yahvé haga efectiva su palabra, sin cerrar indebidamente la ambigüedad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: "Yahvé" como transliteración del nombre divino, en lugar de un sustituto título.'
- source_word: דְּבָרוֹ
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su promesa
  - su asunto
  lexicon: HALOT
  rationale: דבר puede significar palabra, asunto o promesa. "Su palabra" mantiene la forma más directa y conserva la ambigüedad del hebreo respecto de si se alude a la promesa de Yahvé o al asunto recién mencionado.
- source_word: וַתֵּינֶק
  english_pob_choice: nursed
  chosen_spanish: amamantó
  alternatives_spanish:
  - crió
  - dio de mamar
  - lo alimentó con su leche
  lexicon: HALOT
  rationale: Aquí el verbo describe la acción concreta de alimentar al niño al pecho. "Amamantó" es claro y preciso en español moderno, sin perder el matiz corporal del hebreo.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - Ana
  - la esposa
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo común con artículo, no el nombre propio. "La mujer" respeta ese dato textual y mantiene la referencia visible.
theological_decisions:
- issue: Ambigüedad de "su palabra"
  english_pob_reading: Kept as 'his word' without specifying whether it means the LORD's promise or the word/vow just spoken in context
  chosen_spanish_reading: Se mantiene "su palabra" sin precisar si se refiere a la promesa de Yahvé o al asunto/palabra pronunciado en el contexto inmediato
  alternative_spanish_readings:
  - su promesa
  - la palabra acerca del niño
  - tu palabra/voto confirmado por Yahvé
  rationale: El hebreo permite más de una referencia y el audit trail inglés conserva esa tensión interpretativa. En español conviene retenerla en vez de resolverla con una paráfrasis interpretativa.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés sin depender mecánicamente de él: conserva la idiomática hebrea de "hacer lo bueno a los ojos de" con español natural, mantiene la ambigüedad de דְבָרוֹ, y aplica la convención del proyecto para יְהוָה como "Yahvé".'
  spanish_consistency_notes:
  - Se usa "Yahvé" para el Tetragrámaton conforme a la convención del proyecto.
  - Se emplea "su marido" para אִישָׁהּ por precisión relacional y naturalidad en español.
  - '"Destetado" y "amamantó" mantienen el campo semántico concreto de la crianza infantil.'
  - No se sustituye la ambigüedad de "su palabra" por una lectura interpretativa cerrada.
