id: 1PE.1.25
reference: 1 Peter 1:25
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τὸ δὲ ῥῆμα κυρίου μένει εἰς τὸν αἰῶνα. τοῦτο δέ ἐστιν τὸ ῥῆμα τὸ εὐαγγελισθὲν εἰς ὑμᾶς.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/025.yaml
  text: 'But the word of the Lord remains forever." And this is the word that was proclaimed as good news to you.'
translation:
  language: ko
  text: '오직 야훼의 말씀은 영원히 머문다」[a] 함과 같습니다. 이 말씀이 곧 여러분에게 좋은 소식으로 전해진 말씀입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 이사야 40:8 인용 마무리. LXX의 κύριος는 히브리 원문(MT)의 יהוה(야훼)를 옮긴 것이다.
    reason: ot_citation
lexical_decisions:
- source_word: κυρίου
  english_pob_choice: the Lord
  chosen_korean: 야훼
  alternatives_korean:
  - 주
  - 여호와
  lexicon: BDAG
  rationale: 사 40:8의 LXX κύριος는 히브리 원문의 יהוה(야훼)를 옮긴 것이다. 본문의 인용 정확성을 보존하기 위해 「야훼」로 옮긴다.
- source_word: μένει εἰς τὸν αἰῶνα
  english_pob_choice: remains forever
  chosen_korean: 영원히 머문다
  alternatives_korean:
  - 영원히 거한다
  - 영원토록 있다
  lexicon: BDAG
  rationale: 1:23의 μένοντος(머무는)와 같은 어근. 어휘 일관성 유지를 위해 「머문다」로 통일.
- source_word: τὸ ῥῆμα τὸ εὐαγγελισθὲν εἰς ὑμᾶς
  english_pob_choice: the word that was proclaimed as good news to you
  chosen_korean: 여러분에게 좋은 소식으로 전해진 말씀
  alternatives_korean:
  - 너희에게 복음으로 선포된 말씀
  lexicon: BDAG
  rationale: 1:12의 εὐαγγελισαμένων과 통일하여 「좋은 소식」을 사용한다.
theological_decisions:
- issue: 인용 안의 κύριος를 야훼로 표기
  chosen_reading: 야훼 (각주로 LXX-MT 관계 명시)
  alternative_readings:
  - 주
  - 여호와
  rationale: 베드로전서는 1 Peter 1:25, 2:3, 3:12, 3:15(일부 사본) 등 여러 곳에서 LXX의 κύριος가 명시적으로 야훼를 가리킨다. 본 절의 인용도 사 40:8이며, LXX는 MT의 יהוה를 κύριος로 옮긴 것이다. 글로서리 정책에 따라 「야훼」로 옮기고 각주로 표기.
  doctrine_reference: 'DOCTRINE.md: 신적 칭호의 투명성; OT 인용에서의 야훼 표기'
