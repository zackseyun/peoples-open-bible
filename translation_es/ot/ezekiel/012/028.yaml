revisions:
- from: 'Por tanto, diles[a]: «Así dice el Señor Yahvé: Ya no se demorará más ninguna de mis palabras, sino que la palabra que yo hable se cumplirá», declara el Señor Yahvé.'
  to: 'Por tanto, diles: «Así dice el Señor Dios Yahvé: Ya no se demorará más ninguna de mis palabras[a], sino que la palabra que yo hable se cumplirá», declara el Señor Dios Yahvé.'
  rationale: Se corrige la nota léxica errónea y se ajusta אֲדֹנָי יְהוִה a una formulación española más fiel y natural para el título compuesto, preservando explícitamente 'Yahvé'. Se elimina la llamada de nota sobre 'diles' porque no tiene base en la evidencia inglesa ni en una ambigüedad nueva del español; la única nota necesaria corresponde a la alternativa de תִמָּשֵׁךְ.
