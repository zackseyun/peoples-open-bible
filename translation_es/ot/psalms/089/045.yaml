translation:
  language: es
  text: Has puesto fin a su esplendor[a] y has arrojado su trono al suelo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Has hecho cesar su brillo/pureza». El término hebreo puede denotar brillo, pureza o esplendor; aquí «esplendor» encaja mejor con el contexto real.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «has arrojado su trono a la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשְׁבַּ֥תָּ
  english_pob_choice: You have brought ... to an end
  chosen_spanish: Has hecho que ... llegue a su fin
  alternatives_spanish:
  - Has puesto fin a
  - Has causado que cese
  - Has terminado con
  lexicon: HALOT
  rationale: El hifil de שׁבת expresa causar que algo cese o llegue a su fin. En español, 'has hecho que ... llegue a su fin' conserva la fuerza causativa sin sonar rígido, y corresponde al ajuste revisado en inglés hacia una formulación más natural y formal.
- source_word: מִ/טְּהָר֑/וֹ
  english_pob_choice: his splendor
  chosen_spanish: su esplendor
  alternatives_spanish:
  - su pureza
  - su brillo
  - su resplandor
  lexicon: HALOT
  rationale: En este contexto real y poético, טֹהַר puede aludir a brillo, pureza o esplendor. 'Esplendor' mantiene la idea de majestad real disminuida y evita trasladar indebidamente un sentido moral de pureza.
- source_word: וְ֝/כִסְא֗/וֹ
  english_pob_choice: and his throne
  chosen_spanish: y has derribado su trono
  alternatives_spanish:
  - y su trono
  - y su silla real
  lexicon: HALOT
  rationale: כִּסֵּא significa 'trono'. En español, 'trono' es la opción directa y fiel al campo semántico regio del pasaje.
- source_word: לָ/אָ֥רֶץ
  english_pob_choice: to the ground
  chosen_spanish: hasta el suelo
  alternatives_spanish:
  - a tierra
  - a la tierra
  - al suelo
  lexicon: HALOT
  rationale: Aunque literalmente significa 'a la tierra', en la imagen poética de derribar un trono 'hasta el suelo' comunica de forma natural la humillación sin perder la dirección descendente del hebreo.
- source_word: מִגַּֽרְתָּה
  english_pob_choice: cast ... to the ground
  chosen_spanish: has derribado
  alternatives_spanish:
  - has lanzado
  - has arrojado
  - has echado abajo
  lexicon: HALOT
  rationale: El verbo transmite la acción de tirar o arrastrar hacia abajo. 'Has derribado' conserva el impacto visual y el paralelo poético con 'trono' y 'suelo'.
theological_decisions:
- issue: Referente de los sufijos de tercera persona
  english_pob_reading: Rendered as 'his,' leaving the psalm's royal referent implicit rather than specifying David, the king, or the anointed one.
  chosen_spanish_reading: Se mantiene 'su' sin especificar el referente, dejando implícito al rey del salmo.
  alternative_spanish_readings:
  - su = David
  - su = el rey
  - su = el ungido del pacto
  rationale: El hebreo usa sufijos de tercera persona sin nombrar de nuevo el antecedente. Mantener la referencia implícita preserva el flujo poético y evita cerrar una tensión interpretativa que el versículo no resuelve explícitamente.
  doctrine_reference: Preservar la tensión teológica e interpretativa en lugar de resolverla por anticipado.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del inglés POB, que prefirió una formulación más formal y natural ('brought ... to an end') y eliminó la redundancia de 'down to the ground'. Por eso se eligió 'has hecho que ... llegue a su fin' y 'hasta el suelo'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto fuente lo exija explícitamente; este versículo no lo requiere.
  - '''Esplendor'' preserva el valor regio señalado por la auditoría en inglés y evita moralizar טֹהַר como ''pureza''.'
  - '''Su'' conserva la ambigüedad referencial del hebreo y del inglés auditado.'
  - La imagen de derribo se expresa con un verbo dinámico ('derribado') compatible con el paralelismo poético del verso.
