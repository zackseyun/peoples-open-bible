translation:
  language: es
  text: Pero la nieve y el hielo soportaron el fuego y no se derritieron, para que supieran que el fuego, ardiendo en el granizo y resplandeciendo en las tormentas de lluvia, estaba destruyendo los frutos[a] de los enemigos;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «las cosechas de los enemigos» o «los productos de los enemigos». El griego dice literalmente «los frutos de los enemigos».
    reason: lexical_alternative
lexical_decisions:
- source_word: χιὼν
  english_pob_choice: snow
  chosen_spanish: nieve
  alternatives_spanish:
  - nieve caída
  - nieve
  lexicon: LSJ
  rationale: En este contexto meteorológico, χιὼν designa nieve; «nieve» preserva la distinción con χαλάζῃ («granizo») que aparece después en el versículo.
- source_word: κρύσταλλος
  english_pob_choice: ice
  chosen_spanish: hielo
  alternatives_spanish:
  - hielo
  - cristal
  - escarcha
  lexicon: LSJ
  rationale: La pareja con «nieve» y la idea de no derretirse indican una sustancia que resiste el fuego; «hielo» es la equivalencia natural y clara en español.
- source_word: ὑπέμεινε
  english_pob_choice: endured
  chosen_spanish: soportaron
  alternatives_spanish:
  - resistieron
  - permanecieron firmes
  - soportó
  lexicon: LSJ
  rationale: El verbo expresa permanecer bajo presión; «soportaron» mantiene la fuerza del contraste con el fuego sin sonar forzado en español.
- source_word: ἐτήκετο
  english_pob_choice: did not melt
  chosen_spanish: no se derritieron
  alternatives_spanish:
  - no se fundieron
  - no se licuaron
  lexicon: LSJ
  rationale: Con sujetos de clima, «derretirse» es la forma más directa y natural para reflejar la negación del verbo en este contexto.
- source_word: ἵνα γνῶσιν
  english_pob_choice: so that they might know
  chosen_spanish: para que supieran
  alternatives_spanish:
  - para que conocieran
  - a fin de que supieran
  lexicon: LSJ
  rationale: La cláusula final expresa propósito; «para que supieran» conserva la fuerza teleológica de ἵνα con un español fluido.
- source_word: τοὺς τῶν ἐχθρῶν καρπούς
  english_pob_choice: the fruits of the enemies
  chosen_spanish: los frutos de los enemigos
  alternatives_spanish:
  - las cosechas de los enemigos
  - los productos de los enemigos
  lexicon: LSJ
  rationale: Se conserva la forma casi literal «frutos» para mantener la equivalencia léxica con καρπούς y la posible amplitud semántica de productos agrícolas o de la cosecha.
- source_word: φλεγόμενον
  english_pob_choice: blazing
  chosen_spanish: ardiendo
  alternatives_spanish:
  - flamígero
  - en llamas
  - ardiente
  lexicon: LSJ
  rationale: Como participio que modifica a πῦρ, «ardiendo» expresa de forma natural la imagen activa del fuego.
- source_word: ἐν τῇ χαλάζῃ
  english_pob_choice: in the hail
  chosen_spanish: en el granizo
  alternatives_spanish:
  - entre el granizo
  - en medio del granizo
  lexicon: LSJ
  rationale: La preposición ἐν se conserva con «en»; «granizo» diferencia claramente este elemento del de la nieve/hielo inicial.
- source_word: ἐν τοῖς ὑετοῖς
  english_pob_choice: in the rainstorms
  chosen_spanish: en las tormentas de lluvia
  alternatives_spanish:
  - en las lluvias
  - en los aguaceros
  - en las tormentas
  lexicon: LSJ
  rationale: ὑετοῖς es plural y el audit trail inglés ajusta a «rainstorms»; «tormentas de lluvia» refleja el plural intensivo y mantiene el registro elevado.
- source_word: διαστράπτον
  english_pob_choice: flashing
  chosen_spanish: resplandeciendo
  alternatives_spanish:
  - fulgurando
  - relampagueando
  - brillando
  lexicon: LSJ
  rationale: El participio sugiere un fulgor semejante al relámpago; «resplandeciendo» comunica ese brillo dinámico sin sobrerresolverlo.
theological_decisions:
- issue: Referente implícito de «supieran»
  english_pob_reading: The clause can refer generally to observers or contextually to the enemies; the English preserves the ambiguity with 'they.'
  chosen_spanish_reading: «supieran» mantiene la ambigüedad del sujeto implícito sin añadir un referente no expresado.
  alternative_spanish_readings:
  - «supieran ellos»
  - «para que los enemigos supieran»
  - «para que la gente supiera»
  rationale: El griego no explicita el sujeto del subjuntivo; la versión española conserva esa indeterminación para no cerrar el sentido más allá de la evidencia del texto.
  doctrine_reference: Preservar la ambigüedad textual y el valor de señal del juicio divino sin especificar de más.
translation_notes:
  revision_awareness: La redacción sigue el ajuste final del audit trail inglés al traducir ὑετοῖς con una expresión más intensa que «lluvias»; por eso se eligió «tormentas de lluvia» en lugar de una forma más genérica. También se preservó la distinción entre nieve, hielo, granizo y tormentas de lluvia, y se mantuvo la ambigüedad del sujeto de «supieran».
  spanish_consistency_notes:
  - Se emplea «frutos» para καρπούς, siguiendo la decisión léxica documentada y evitando sustituirlo sin base por «cosechas» en el texto principal.
  - «Derritieron» funciona bien con el sujeto doble «la nieve y el hielo» y evita el calco de una forma pasiva innecesaria.
  - 'La puntuación conserva el movimiento causal-final del griego: contraste, propósito y explicación del fenómeno.'
  - Se evita introducir lenguaje tradicional no requerido; el registro es bíblico pero moderno y transparente.
