  - severity: low
    issue: Puntuación con dos puntos antes de «dos ciudades»
    rationale: El hebreo cierra con un resumen enumerativo. En español la raya larga o un punto y coma suenan más naturales que un segundo dos puntos dentro de la misma enumeración.
