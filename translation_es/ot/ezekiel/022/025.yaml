translation:
  language: es
  text: 'Una conspiración de sus profetas está en medio de ella, como un león rugiente que despedaza la presa: han devorado vidas[a], toman riqueza y cosas preciosas, han multiplicado sus viudas en medio de ella.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «personas» o, más literalmente, «almas». El hebreo nephesh suele significar un ser viviente o la vida, no solo el alma inmaterial.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֶשֶׁר
  english_pob_choice: conspiracy
  chosen_spanish: conspiración
  alternatives_spanish:
  - complot
  - trama
  lexicon: HALOT
  rationale: El sustantivo expresa una alianza secreta y hostil; «conspiración» transmite mejor la idea de acuerdo culpable y traición coordinada que una simple asociación.
- source_word: נְבִיאֶיהָ
  english_pob_choice: her prophets
  chosen_spanish: sus profetas
  alternatives_spanish:
  - los profetas de ella
  lexicon: HALOT
  rationale: El sufijo posesivo femenino se refiere a la ciudad/persona colectiva del contexto. En español, «sus profetas» suena natural y conserva la relación posesiva sin perder el referente.
- source_word: בְּתוֹכָהּ
  english_pob_choice: in her midst
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - dentro de ella
  - en su interior
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para actividad dentro de la comunidad/ciudad. «En medio de ella» preserva el paralelismo del verso y su repetición final.
- source_word: כַּאֲרִי שׁוֹאֵג טֹרֵף טָרֶף
  english_pob_choice: like a roaring lion tearing prey
  chosen_spanish: como un león rugiente que despedaza presa
  alternatives_spanish:
  - como un león rugiendo que despedaza la presa
  - como un león rugiente que desgarrra su presa
  lexicon: HALOT
  rationale: La imagen es violenta y dinámica. «León rugiente» refleja שׁוֹאֵג; «que despedaza presa» mantiene el verbo depredador y el objeto cognado sin recargar el español.
- source_word: נֶפֶשׁ אָכָלוּ
  english_pob_choice: they have devoured lives
  chosen_spanish: han devorado vidas
  alternatives_spanish:
  - han devorado personas
  - han devorado almas
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ apunta a vidas/personas vivas, no a un tecnicismo sobre el alma inmortal. «Vidas» conserva la fuerza metafórica y evita una lectura doctrinal ajena al contexto.
- source_word: חֹסֶן
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - bienes
  - riquezas
  lexicon: HALOT
  rationale: El término denota acumulación de bienes materiales. «Riqueza» es natural en español y corresponde bien al ajuste revisado del POB inglés hacia «wealth».
- source_word: וִיקָר
  english_pob_choice: precious things
  chosen_spanish: cosas preciosas
  alternatives_spanish:
  - objetos valiosos
  - preciosidades
  lexicon: HALOT
  rationale: En el contexto de saqueo, el vocablo señala objetos costosos o valiosos. «Cosas preciosas» preserva la amplitud semántica sin forzar una abstracción como «honor».
- source_word: יִקָּחוּ
  english_pob_choice: they take
  chosen_spanish: toman
  alternatives_spanish:
  - se llevan
  - arrebatan
  lexicon: HALOT
  rationale: El imperfecto describe acción característica. «Toman» es directo y suficientemente fuerte en el contexto depredador ya establecido por la comparación con el león.
- source_word: אַלְמְנוֹתֶיהָ הִרְבּוּ
  english_pob_choice: they have multiplied her widows
  chosen_spanish: han multiplicado sus viudas
  alternatives_spanish:
  - han hecho numerosas sus viudas
  - han aumentado el número de sus viudas
  lexicon: HALOT
  rationale: 'La construcción hebrea expresa el efecto de su violencia: muchas mujeres quedaron viudas. «Han multiplicado sus viudas» preserva la dureza idiomática y la repetición del sujeto posesivo.'
theological_decisions:
- issue: Sentido de נֶפֶשׁ en un contexto de juicio y violencia
  english_pob_reading: Rendered as 'lives' rather than 'souls'
  chosen_spanish_reading: «vidas» en lugar de «almas»
  alternative_spanish_readings:
  - almas
  - personas
  rationale: El verso denuncia homicidio y expolio, no una afirmación técnica sobre el alma inmaterial. «Vidas» mantiene el sentido hebreo de seres vivientes/personas y conserva la tensión semántica sin teologizarla.
  doctrine_reference: Primacía del original frente a la tradición doctrinal; mantener la ambigüedad semántica donde el hebreo la tiene.
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente del POB inglés que cambió «treasure» por «wealth» para חֹסֶן. En español se reflejó esa precisión como «riqueza», manteniendo «cosas preciosas» para וִיקָר y la repetición de «en medio de ella» para בְּתוֹכָהּ.
  spanish_consistency_notes:
  - Se mantuvo «en medio de ella» en ambas apariciones de בְּתוֹכָהּ para conservar el paralelismo hebreo.
  - Se evitó «almas» en el texto principal para no fijar una lectura doctrinal que el contexto no exige.
  - «Sus profetas» conserva el referente femenino implícito del sujeto colectivo sin introducir una glosa innecesaria.
