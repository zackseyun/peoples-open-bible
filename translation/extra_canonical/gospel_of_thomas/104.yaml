translation:
  text: They said to Jesus[a], “Come, let us pray today, and let us fast.” Jesus said,
    “For what is the sin that I have committed, or in what have I been overcome? But
    when the bridegroom goes out from the bridal chamber, then let them fast[f][e][d][c][b],
    and let them pray.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲟⲩ ⲡⲉ + noun here is interrogative (“what is…?”), hence “For what is the
      sin…?” rather than an assertion.
    reason: dialect_note
  - marker: b
    text: 'ϫⲣⲟ can mean “press, constrain, oppress, overpower.” The impersonal 3pl
      construction yields a passive sense: “in what have I been compelled/overpowered?”'
    reason: lexical_alternative
  - marker: c
    text: ⲛⲡϩⲟⲟⲩ literally “the day,” idiomatic for “today.”
    reason: dialect_note
  - marker: d
    text: ⲙⲁⲣⲟⲩ- is the 3rd plural jussive (“let them…”); Dilley’s normalized ⲙⲁⲣⲉⲛⲧⲟⲟⲩ-
      reflects subject morphology. The sense is cohortative, not simple future.
    reason: dialect_note
  - marker: e
    text: Both ⲡⲛⲩⲙⲫⲓⲟⲥ (bridegroom) and ⲡⲛⲩⲙⲫⲱⲛ (bridal chamber) are Greek loans,
      preserving wedding-imagery familiar in early Christian sayings.
    reason: cultural_note
  - marker: f
    text: Or 'or in what have I been compelled?'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲁⲙⲟⲩ
  chosen: come
  alternatives:
  - come here
  - let us go
  lexicon: Crum; Layton
  rationale: Common imperative invitation; simple “come” preserves the crisp invitation
    tone.
- source_word: ϣⲗⲏⲗ
  chosen: pray
  alternatives:
  - offer prayer
  lexicon: Crum; Layton
  rationale: Standard verb for prayer; “pray” maintains Thomas’s terseness.
- source_word: ⲛⲡϩⲟⲟⲩ
  chosen: today
  alternatives:
  - this day
  lexicon: Layton (syntax)
  rationale: Literally “the day”; idiomatic temporal use in Sahidic for “today.”
- source_word: ⲛⲏⲥⲧⲉⲩⲉ
  chosen: fast
  alternatives:
  - abstain from food
  lexicon: Crum (loan), Lambdin
  rationale: Direct loan from Gk νηστεύειν; “fast” is the established equivalent.
- source_word: ⲡⲛⲟⲃⲉ
  chosen: sin
  alternatives:
  - transgression
  - fault
  lexicon: Crum
  rationale: Core sense is moral fault; “sin” fits the rhetorical question and Thomas’s
    diction.
- source_word: ⲟⲩ ⲡⲉ (interrogative)
  chosen: what is
  alternatives:
  - what, then, is
  lexicon: Lambdin (grammar)
  rationale: Predicate interrogative pattern ⲟⲩ ⲡⲉ + noun expresses “what is…?” not
    an indefinite assertion.
- source_word: ⲉⲧⲉⲣⲉⲁⲁⲛⲟⲕ ⲉⲓⲣⲉ ⲛⲧⲟϥ
  chosen: that I have committed (it)
  alternatives:
  - that I have done (it)
  lexicon: Layton (relative clauses)
  rationale: Relative clause with pronominal object; “committed” suits the moral term
    ⲡⲛⲟⲃⲉ better than bare “done.”
- source_word: ϫⲣⲟ (with ⲉⲣⲟⲓ / ⲉⲁⲛⲟⲕ)
  chosen: compel
  alternatives:
  - oppress
  - overpower
  - force
  lexicon: Crum
  rationale: Crum glosses include “press, constrain, oppress”; in impersonal 3pl it
    yields a passive sense, hence “have I been compelled.”
- source_word: ϩⲛ ⲟⲩ (elliptic)
  chosen: in what
  alternatives:
  - by something
  - in some matter
  lexicon: Layton (syntax)
  rationale: Indefinite ⲟⲩ with preposition functions interrogatively here; “in what”
    preserves the open-endedness.
- source_word: ⲁⲗⲗⲁ
  chosen: but
  alternatives:
  - however
  lexicon: Loan from Greek
  rationale: Greek adversative; “but” is the natural concise equivalent.
- source_word: ⲡⲛⲩⲙⲫⲓⲟⲥ
  chosen: bridegroom
  alternatives: []
  lexicon: Crum (Greek loan)
  rationale: Direct Greek loan; standard rendering “bridegroom.”
- source_word: ⲡⲛⲩⲙⲫⲱⲛ
  chosen: bridal chamber
  alternatives:
  - marriage chamber
  lexicon: Crum (Greek loan)
  rationale: Direct Greek loan νυμφών; “bridal chamber” is transparent and preserves
    imagery.
- source_word: ⲉⲓ ⲉⲃⲟⲗ ϩⲛ…
  chosen: goes out from
  alternatives:
  - leaves
  lexicon: Crum; Lambdin
  rationale: Literal motion verb + ⲉⲃⲟⲗ; “goes out from” retains concrete motion.
- source_word: ⲙⲁⲣⲟⲩ- (3pl jussive)
  chosen: let them…
  alternatives:
  - they should…
  lexicon: Layton (verbal auxiliaries)
  rationale: Jussive cohortative in 3pl; “let them” keeps the imperative flavor without
    smoothing to predictive future.
textual_note: 'Dialect: Sahidic with Lycopolitan features. The invitation uses ⲛⲡϩⲟⲟⲩ
  (“the day”) idiomatically for “today.” The interrogative clause begins with ⲟⲩ ⲅⲁⲣ
  ⲡⲉ ⲡⲛⲟⲃⲉ…, where ⲟⲩ ⲡⲉ functions interrogatively (“what is…?”). The printed line
  shows ⲛ̄ⲧⲁⲩϫⲣⲟ ⲉⲣⲟⲉⲓ (“that they have compelled against me”), normalized as ⲉⲧⲉⲣⲉⲁⲛⲧⲟⲟⲩϫⲣⲟ
  ⲉⲁⲛⲟⲕ, an impersonal 3pl construction yielding a passive sense (“have I been compelled”).
  The following ϩⲛⲟⲩ is an elliptical “in a (thing),” effectively “in what.” Final
  imperatives appear in NH II with ⲙⲁⲣⲟⲩ- (3pl jussive: “let them…”); Dilley’s normalization
  represents this as ⲙⲁⲣⲉⲛⲧⲟⲟⲩ- + verb, a morphological expansion of the subject.
  Greek loanwords ⲡⲛⲩⲙⲫⲓⲟⲥ and ⲡⲛⲩⲙⲫⲱⲛ are retained in sense as “bridegroom/bridal
  chamber.” No substantive lacunae affect sense; minor bracketed letters in the name
  ⲛ[ⲓ]ⲥ are orthographic.'
