translation:
  language: es
  text: ¡Mira! Estoy contra ti —declara Yahvé de los ejércitos—, y prenderé fuego a tus carros en humo[a]; la espada devorará a tus leoncillos[b]. Cortaré de la tierra tu presa, y ya no se oirá la voz de tus mensajeros[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta humo»; la frase hebrea puede enfatizar el modo del incendio («en humo») o el resultado («hasta humo»).
    reason: lexical_alternative
  - marker: b
    text: «Leoncillos» conserva la imagen de los leones de Nínive; probablemente alude metafóricamente a sus guerreros o gobernantes.
    reason: cultural_note
  - marker: c
    text: O «embajadores». La palabra hebrea puede designar mensajeros humanos enviados en asuntos oficiales.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי אֵלַיִךְ
  english_pob_choice: Behold, I am against you
  chosen_spanish: ¡Mira! Estoy contra ti
  alternatives_spanish:
  - ¡Mira! Estoy en tu contra
  - He aquí, estoy contra ti
  lexicon: HALOT
  rationale: La fórmula profética exige una llamada de atención solemne y una declaración de confrontación. «¡Mira!» comunica bien הִנְנִי sin sonar arcaico, y «estoy contra ti» conserva el valor adversativo de אֵלַיִךְ.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  english_pob_choice: declares Yahweh of hosts
  chosen_spanish: declara Yahvé de los ejércitos
  alternatives_spanish:
  - dice Yahvé de los ejércitos
  - oráculo de Yahvé de los ejércitos
  lexicon: HALOT
  rationale: נְאֻם funciona como fórmula de declaración profética; «declara» es natural en español y mantiene el registro solemne. «Yahvé» sigue el criterio doctrinal del proyecto para יְהוָה, y «de los ejércitos» traduce צְבָאוֹת sin transliterar.
- source_word: וְהִבְעַרְתִּי בֶעָשָׁן
  english_pob_choice: I will burn your chariots in smoke
  chosen_spanish: prenderé fuego a tus carros en el humo
  alternatives_spanish:
  - quemaré tus carros en humo
  - prenderé fuego a tus carros en humo
  lexicon: HALOT
  rationale: El hebreo permite una relación instrumental o resultativa con בֶעָשָׁן; se mantiene la tensión del POB entre modo y resultado. «Prenderé fuego» comunica el causativo de הִבְעַרְתִּי, y «en el humo» conserva la preposición sin forzar una paráfrasis interpretativa.
- source_word: רִכְבָּהּ
  english_pob_choice: your chariots
  chosen_spanish: tus carros
  alternatives_spanish:
  - tus carros de guerra
  - tu carro
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular con sufijo, el contexto militar favorece un colectivo. En español «carros» resulta natural y evita una literalidad poco idiomática.
- source_word: וּכְפִירַיִךְ
  english_pob_choice: your young lions
  chosen_spanish: tus leoncillos
  alternatives_spanish:
  - tus cachorros de león
  - tus jóvenes leones
  lexicon: HALOT
  rationale: Se conserva la imagen leonina de Nínive/Asiria que el POB mantiene explícita. «Leoncillos» expresa bien el diminutivo y el valor metafórico sin interpretarlo como «guerreros».
- source_word: תֹּאכַל חָרֶב
  english_pob_choice: the sword will devour
  chosen_spanish: la espada devorará
  alternatives_spanish:
  - la espada consumirá
  - la espada comerá
  lexicon: HALOT
  rationale: El español puede reproducir la personificación hebrea de la espada como agente devorador. «Devorará» mantiene la fuerza imagética del verbo sin suavizarlo.
- source_word: וְהִכְרַתִּי
  english_pob_choice: I will cut off
  chosen_spanish: cortaré
  alternatives_spanish:
  - extirparé
  - destruiré
  lexicon: HALOT
  rationale: כרת conserva la imagen de cortar, remover o eliminar. «Cortaré» preserva esa fuerza léxica de modo transparente en español.
- source_word: מֵאֶרֶץ טַרְפֵּךְ
  english_pob_choice: your prey from the earth
  chosen_spanish: de la tierra tu presa
  alternatives_spanish:
  - de la tierra tu botín
  - de la tierra lo que has depredado
  lexicon: HALOT
  rationale: «Presa» respeta el valor literal de טֶרֶף y mantiene la metáfora depredadora. «Tierra» traduce אֶרֶץ en sentido amplio, como en el POB inglés, sin restringirlo indebidamente a «país» o «territorio».
- source_word: וְלֹא יִשָּׁמַע עוֹד קוֹל מַלְאָכֵכֵה
  english_pob_choice: the voice of your messengers will no longer be heard
  chosen_spanish: ya no se oirá la voz de tus mensajeros
  alternatives_spanish:
  - no se volverá a oír la voz de tus mensajeros
  - la voz de tus mensajeros no se oirá más
  lexicon: HALOT
  rationale: La construcción pasiva se vierte naturalmente con «se oirá». «Mensajeros» refleja מַלְאָךְ en su sentido humano contextual, como en el POB inglés; «voz» mantiene la concreción del hebreo.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto contiene explícitamente el Tetragrama. En el marco doctrinal del proyecto, se conserva el nombre divino con la forma española establecida «Yahvé», evitando la sustitución litúrgica por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Imagen de los «young lions»
  english_pob_reading: Young lions continues Nineveh's lion imagery; it likely refers metaphorically to her warriors or rulers.
  chosen_spanish_reading: leoncillos
  alternative_spanish_readings:
  - jóvenes leones
  - guerreros
  rationale: Se conserva la metáfora animal que el POB retiene explícita. Aunque la referencia probable sea metafórica a guerreros o gobernantes, la traducción no la interpreta para no borrar la imagen profética.
  doctrine_reference: Poética profética y metáfora animal en Nahúm 2
- issue: Valor de מַלְאָךְ
  english_pob_reading: messengers
  chosen_spanish_reading: mensajeros
  alternative_spanish_readings:
  - enviados
  - embajadores
  rationale: El contexto apunta a emisarios humanos de Nínive/Asiria, no a seres celestiales. «Mensajeros» mantiene esa referencia y evita una lectura angélica incorrecta.
  doctrine_reference: Uso contextual de מַלְאָךְ en profecía histórica
translation_notes:
  revision_awareness: He incorporado la revisión del POB inglés que prefirió «burn your chariots in smoke» sobre «burn up», manteniendo en español una formulación cercana al hebreo y evitando añadir una idea de consumición no explicitada. También he conservado la tensión léxica de בֶעָשָׁן con una nota alternativa, y he reflejado la metáfora de «young lions» sin interpretarla fuera del texto.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - Se evita «SEÑOR» como sustitución del Nombre divino.
  - «Espada» se mantiene en femenino singular para conservar el sujeto hebreo personificado.
  - «Mensajeros» traduce מַלְאָךְ en su sentido humano contextual, coherente con el audit trail en inglés.
  - La puntuación con guiones largos en la fórmula profética busca claridad sin perder solemnidad.
