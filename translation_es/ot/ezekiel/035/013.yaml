review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: discurso hostil y arrogante dirigido contra Dios, con buen mantenimiento de «contra mí», del paralelismo entre «boca» y «palabras», y del énfasis en «yo mismo he oído». Sin embargo, hay un problema importante de persona gramatical: el hebreo está en segunda persona plural («ustedes/vosotros»), pero el español usa tercera persona plural posesiva y verbal («su», «se engrandecieron», «multiplicaron»), lo que altera la referencia directa de la acusación divina.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero la mezcla de tratamiento produce una discordancia evidente dentro del discurso directo divino. En registro neutral latinoamericano, conviene usar segunda persona plural con «ustedes» y formas verbales correspondientes: «se engrandecieron... multiplicaron... sus palabras». Además, «con su boca» debe concordar con esa segunda persona en «con su boca» si se opta por ustedes; no obstante, para evitar ambigüedad y sonar más natural, «con su boca» sigue siendo posible en ustedes, pero toda la oración debe mantenerse consistentemente en segunda persona. Mejor aún, «con su boca» + verbos de ustedes queda natural en América Latina.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Las decisiones léxicas principales son adecuadas: «contra mí» para עָלַי, «se engrandecieron» para וַתַּגְדִּילוּ, «multiplicaron» para וְהַעְתַּרְתֶּם, y «yo mismo he oído» para el pronombre enfático más perfecto verbal. Las notas léxicas también son apropiadas. La corrección necesaria es gramatical, no terminológica ni teológica.'
  issues:
  - severity: high
    issue: Cambio indebido de segunda persona plural a tercera persona plural
    rationale: 'El hebreo usa formas de 2mp a lo largo del versículo. El español del borrador dice «se engrandecieron... multiplicaron» con posesivos «su/sus», lo que suena a tercera persona y rompe la acusación directa divina. Debe mantenerse el destinatario directo: en español latinoamericano neutral, «ustedes se engrandecieron... multiplicaron sus palabras...».'
  - severity: medium
    issue: Inconsistencia entre la justificación léxica y la redacción final
    rationale: La nota sobre בְּפִיכֶם afirma que «con su boca» funciona dentro de la segunda persona plural, pero el texto final no mantiene claramente esa segunda persona en toda la cláusula. La revisión debe alinear texto y justificación.
  revised_spanish_text: Y con su boca se engrandecieron contra mí[a], y multiplicaron sus palabras contra mí[b]; yo mismo he oído.
  revised_footnotes: *id001
  revision_rationale: Se revisa para corregir la referencia personal y mantener la acusación directa en segunda persona plural implícita propia del hebreo, usando un español natural para «ustedes». Se conservan las decisiones léxicas y las notas porque representan bien el original.
