translation:
  language: es
  text: Y los habitantes de Jerusalén huyeron por causa de ellos, y llegó a ser morada de extranjeros; llegó a ser extraña para su prole[a], y sus hijos la abandonaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llegó a ser extraña para lo producido por ella». El término griego puede referirse tanto a la descendencia como a lo producido; el paralelismo inmediato con «sus hijos» favorece «prole».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφυγον
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - tomaron la fuga
  lexicon: LSJ
  rationale: El verbo expresa una huida real bajo presión; «huyeron» es natural en español y conserva la fuerza del escape sin añadir matices no presentes.
- source_word: οἱ κάτοικοι
  english_pob_choice: the inhabitants
  chosen_spanish: los habitantes
  alternatives_spanish:
  - los residentes
  - los moradores
  lexicon: LSJ
  rationale: Se refiere a quienes vivían en Jerusalén; «habitantes» reproduce bien el valor colectivo y mantiene el registro histórico.
- source_word: διʼ αὐτούς
  english_pob_choice: because of them
  chosen_spanish: por causa de ellos
  alternatives_spanish:
  - a causa de ellos
  - por ellos
  lexicon: LSJ
  rationale: La preposición con acusativo indica causa u ocasión. «Por causa de ellos» expresa claramente que la huida ocurrió debido a los opresores del contexto.
- source_word: κατοικία ἀλλοτρίων
  english_pob_choice: a dwelling place of foreigners
  chosen_spanish: morada de extranjeros
  alternatives_spanish:
  - habitación de forasteros
  - lugar de residencia de extranjeros
  lexicon: LSJ
  rationale: La frase presenta Jerusalén como ocupada por no nativos. «Morada de extranjeros» conserva la imagen concreta y el sentido de ajenidad.
- source_word: ἐγένετο ἀλλοτρία
  english_pob_choice: she became foreign
  chosen_spanish: llegó a ser extraña
  alternatives_spanish:
  - se volvió ajena
  - se hizo extranjera
  lexicon: LSJ
  rationale: «Extraña» comunica la cualidad de ajenidad con buen español y mantiene el vínculo léxico con «extranjeros» en la cláusula anterior.
- source_word: τοῖς γενήμασιν αὐτῆς
  english_pob_choice: to her offspring
  chosen_spanish: para su prole
  alternatives_spanish:
  - para sus descendientes
  - para sus frutos
  lexicon: LSJ
  rationale: γενήματα puede significar descendencia o producto. Aquí, por el paralelismo con «sus hijos», la lectura de prole/descendencia es la más probable; «prole» preserva esa amplitud sin volverse técnica.
- source_word: τὰ τέκνα αὐτῆς
  english_pob_choice: her children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - sus descendientes
  lexicon: LSJ
  rationale: τέκνα es más amplio que «hijos varones» y en español «hijos» mantiene el paralelo familiar con la ciudad personificada como madre.
- source_word: ἐγκατέλειπον
  english_pob_choice: abandoned
  chosen_spanish: la abandonaron
  alternatives_spanish:
  - la dejaron
  - la forsajeron
  lexicon: LSJ
  rationale: El verbo denota deserción, no mera salida. «La abandonaron» transmite bien el peso afectivo y el tono de lamentación.
theological_decisions:
- issue: Personificación femenina de Jerusalén
  english_pob_reading: Retain feminine personification with 'she' and 'her' throughout the verse.
  chosen_spanish_reading: Mantener la personificación femenina de Jerusalén con «la» y las posesivas correspondientes.
  alternative_spanish_readings:
  - Repetir «Jerusalén» en lugar de pronombres
  - Neutralizar la personificación con una frase impersonal
  rationale: El griego pasa de nombrar Jerusalén a describirla como entidad femenina. Conservar esa personificación preserva la fuerza luctuosa del pasaje y la imagen materna de la ciudad.
  doctrine_reference: 'Principio de traducción: conservar imágenes significativas del texto fuente sin aplanarlas.'
- issue: Sentido de γενήματα
  english_pob_reading: Or 'she became alien to her produce.' The Greek term can refer either to offspring/descendants or to what is produced; the immediate parallel with 'her children' favors 'offspring.'
  chosen_spanish_reading: «prole» como lectura principal, con la posibilidad de entender descendencia más que producto material.
  alternative_spanish_readings:
  - «frutos»
  - «producción»
  rationale: En español, «prole» comunica la descendencia humana y evita una lectura agrícola que aquí queda debilitada por el paralelismo con «sus hijos». Aun así, se mantiene la tensión semántica del término griego al no convertirlo en una explicación estrecha.
  doctrine_reference: Respeto a la ambigüedad léxica documentada por el texto griego y por la nota inglesa.
translation_notes:
  revision_awareness: 'La versión inglesa auditada está marcada como estable (latest_revision_pass: unchanged true; applied revisions: none). La presente redacción española sigue esa lectura sin introducir cambios de sentido.'
  spanish_consistency_notes:
  - Se conserva el paralelismo entre «extranjeros» y «extraña» para reflejar el juego léxico del griego (ἀλλοτρίων / ἀλλοτρία).
  - Se mantiene la personificación de Jerusalén con tratamiento femenino implícito en el español, acorde con la imagen del texto fuente.
  - «Sus hijos la abandonaron» conserva el cierre abrupto del verso y el tono de desolación.
  - Se evita «SEÑOR» y otras convenciones no pertinentes; este versículo no contiene el nombre divino.
