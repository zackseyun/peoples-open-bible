translation:
  language: es
  text: ¿Has rechazado por completo a Judá? ¿Tu alma[a] aborrece a Sion[b]? ¿Por qué nos has herido, y no hay para nosotros sanidad? Esperábamos paz, pero no hubo bien; y un tiempo de sanidad, pero he aquí, terror.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «tu alma», una expresión vívida para el ser interior o la persona entera.
    reason: lexical_alternative
  - marker: b
    text: 'La partícula hebrea אִם puede introducir aquí la segunda pregunta en sentido disyuntivo: «¿O tu alma aborrece a Sion?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/מָאֹס מָאַסְתָּ
  english_pob_choice: Have you utterly rejected
  chosen_spanish: ¿Has rechazado por completo
  alternatives_spanish:
  - ¿Has rechazado totalmente
  - ¿Has rechazado del todo
  lexicon: HALOT
  rationale: El infinitivo absoluto con el verbo finito intensifica la acción. En español, 'rechazado por completo' comunica esa fuerza enfática sin volver la frase artificial.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: HALOT
  rationale: Nombre propio bíblico; en español se usa la forma asentada 'Judá'.
- source_word: אִם
  english_pob_choice: Does
  chosen_spanish: '[a]'
  alternatives_spanish:
  - o
  - ¿acaso
  lexicon: HALOT
  rationale: La partícula puede introducir una segunda pregunta con sentido disyuntivo. Se conserva la posibilidad en una nota, porque el español puede sonar natural como pregunta directa, pero también admite 'o'.
- source_word: בְּ/צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Sión
  lexicon: HALOT
  rationale: Nombre propio geográfico-teológico; en español bíblico es natural 'Sion' o 'Sión'. Se elige 'Sion' por uso frecuente en registros bíblicos contemporáneos y para evitar la carga acentual variable.
- source_word: גָּעֲלָה
  english_pob_choice: loathe
  chosen_spanish: aborrece
  alternatives_spanish:
  - detesta
  - rechaza con horror
  lexicon: HALOT
  rationale: געל expresa aversión/repulsión. 'Aborrece' conserva la fuerza visceral mejor que 'desprecia' o 'odia', y encaja con el paralelismo interrogativo.
- source_word: נַפְשֶׁךָ
  english_pob_choice: your soul
  chosen_spanish: Tu alma
  alternatives_spanish:
  - Tu ser
  - Tu persona
  lexicon: HALOT
  rationale: '''Alma'' mantiene la expresión hebrea y su intensidad personal. Aunque puede entenderse como el ser interior completo, el español conserva bien la imagen sin necesidad de explicitarla en el texto.'
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿A qué viene
  - ¿Cuál es la razón de
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español.
- source_word: הִכִּיתָנוּ
  english_pob_choice: have you struck us
  chosen_spanish: nos has herido
  alternatives_spanish:
  - nos has golpeado
  - nos has castigado
  lexicon: HALOT
  rationale: נכה es literalmente 'golpear/pegar', pero en el lamento español 'herido' comunica mejor el daño sufrido sin perder la concreción del acto divino.
- source_word: מַרְפֵּא
  english_pob_choice: healing
  chosen_spanish: sanidad
  alternatives_spanish:
  - curación
  - remedio
  lexicon: HALOT
  rationale: El término puede referirse a recuperación o restablecimiento. 'Sanidad' funciona bien en español bíblico y conserva el valor de restauración física/metafórica.
- source_word: קַוֵּה
  english_pob_choice: We hoped
  chosen_spanish: Esperábamos
  alternatives_spanish:
  - Confiábamos
  - Anhelábamos
  lexicon: HALOT
  rationale: Aunque la forma hebrea es peculiar, el sentido contextual es de expectativa. 'Esperábamos' expresa esa esperanza dirigida al futuro con naturalidad en español.
- source_word: לְ/שָׁלוֹם
  english_pob_choice: for peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  lexicon: HALOT
  rationale: '''Paz'' es la correspondencia estándar y conserva el valor de bienestar integral presente en שָׁלוֹם.'
- source_word: ט֔וֹב
  english_pob_choice: good
  chosen_spanish: bien
  alternatives_spanish:
  - bienestar
  - algo bueno
  lexicon: HALOT
  rationale: En la construcción negativa paralela, 'bien' suena natural y refleja el alcance amplio de טוב sin estrecharlo a una sola esfera.
- source_word: לְ/עֵת מַרְפֵּא
  english_pob_choice: for a time of healing
  chosen_spanish: para tiempo de sanidad
  alternatives_spanish:
  - para un tiempo de curación
  - para un tiempo de recuperación
  lexicon: HALOT
  rationale: '''Tiempo de sanidad'' reproduce la estructura del hebreo y mantiene la idea de un momento oportuno de restauración.'
- source_word: בְעָתָה
  english_pob_choice: terror
  chosen_spanish: terror
  alternatives_spanish:
  - espanto
  - dismayo
  - pavor
  lexicon: HALOT
  rationale: La palabra denota terror súbito o pánico. 'Terror' es breve, fuerte y fiel al impacto final del verso.
theological_decisions:
- issue: Lenguaje de rechazo divino hacia Judá y Sion
  english_pob_reading: Retain the lament's direct questions about whether the LORD has rejected Judah and loathes Zion without softening them.
  chosen_spanish_reading: Mantener las preguntas directas sobre si Yahvé ha rechazado a Judá y aborrece a Sion, sin suavizarlas.
  alternative_spanish_readings:
  - Suavizar a lenguaje de disciplina pactual
  - Interpretar como abandono temporal
  rationale: El versículo es una súplica de lamento que expone la tensión teológica de hablar a Dios en medio del juicio. La traducción debe conservar esa tensión sin resolverla interpretativamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el cotejo final reporta alta concordancia; por ello, esta propuesta sigue de cerca la lectura auditada del inglés POB y ajusta solo la expresión natural del español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como nombre divino en las decisiones teológicas, aunque este verso no contiene el tetragrámaton explícito fuera de la cita implícita del contexto.
  - Se usa 'Judá' y 'Sion' como nombres propios bíblicos estándar en español.
  - Se conservan los paralelismos interrogativos y la tensión lamentativa del hebreo sin añadir explicaciones doctrinales externas.
  - '''Sanidad'' se emplea como equivalente de restauración/healing en el sentido poético del pasaje, manteniendo la repetición del sustantivo מַרְפֵּא.'
