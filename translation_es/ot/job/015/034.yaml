base_translation:
  language: en
  yaml_path: translation/ot/job/015/034.yaml
  text: For the company of the godless is barren[b][a], and fire consumes the tents of bribery.
  footnotes:
  - marker: a
    text: Or 'the assembly of the hypocrite is barren.' The Hebrew חָנֵף can mean 'hypocrite,' but in Job it often carries the broader sense 'godless' or 'impious.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the tents of bribery' or 'the tents of a bribe.' The phrase refers to dwellings marked by corrupt gain.
    reason: lexical_alternative
