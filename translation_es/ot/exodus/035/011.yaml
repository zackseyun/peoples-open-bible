translation:
  language: es
  text: el tabernáculo, su tienda y su cubierta; sus broches, sus tablas[a], sus barras, sus columnas y sus basas[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «marcos» para קְרָשָׁיו, si el término se entiende como una construcción de entramado más que como tablas sólidas.
    reason: lexical_alternative
  - marker: b
    text: O «bases» para אֲדָנָיו, destacando los receptáculos que sostenían los elementos estructurales.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda del encuentro
  lexicon: HALOT
  rationale: En el contexto del santuario, מִשְׁכָּן designa la estructura sagrada donde Yahvé habita en medio de Israel. «Tabernáculo» es el término español más establecido y preciso, y preserva el registro técnico del original mejor que una paráfrasis más general.
- source_word: אָהֳלוֹ
  english_pob_choice: its tent
  chosen_spanish: su tienda
  alternatives_spanish:
  - su tienda de campaña
  - su pabellón
  lexicon: HALOT
  rationale: אָהֶל significa «tienda». El sufijo masculino singular se refiere al complejo del tabernáculo; en español, «su tienda» reproduce la relación posesiva de forma natural y fiel.
- source_word: מִכְסֵהוּ
  english_pob_choice: its covering
  chosen_spanish: su cubierta
  alternatives_spanish:
  - su cobertura
  - su recubrimiento
  lexicon: HALOT
  rationale: מִכְסֶה denota una cubierta o capa protectora. «Cubierta» es una equivalencia breve y transparente en español, sin especificar material ni función más allá de lo que el hebreo dice.
- source_word: קְרָסָיו
  english_pob_choice: its clasps
  chosen_spanish: sus broches
  alternatives_spanish:
  - sus ganchos
  - sus cierres
  lexicon: HALOT
  rationale: קֶרֶס alude a piezas de unión o sujeción. «Broches» comunica bien la función de fijar/enganchar sin introducir un tecnicismo demasiado moderno o una imagen ajena al texto.
- source_word: קְרָשָׁיו
  english_pob_choice: its boards
  chosen_spanish: sus tablas
  alternatives_spanish:
  - sus marcos
  - sus planchas
  lexicon: HALOT
  rationale: קֶרֶשׁ en las descripciones del tabernáculo suele referirse a elementos de madera de la estructura. Aunque el inglés POB conservó «boards» y notó la posible alternativa «frames», en español «tablas» mantiene la literalidad básica sin cerrar indebidamente la discusión estructural.
- source_word: בְּרִיחָיו
  english_pob_choice: its bars
  chosen_spanish: sus barras
  alternatives_spanish:
  - sus travesaños
  - sus pernos
  lexicon: HALOT
  rationale: בְּרִיחַ se refiere a barras que unen o aseguran la estructura. «Barras» es el equivalente directo y natural en español.
- source_word: עַמֻּדָיו
  english_pob_choice: its pillars
  chosen_spanish: sus columnas
  alternatives_spanish:
  - sus pilares
  - sus postes
  lexicon: HALOT
  rationale: עַמּוּד designa un soporte vertical. «Columnas» ofrece un español digno y claro en un inventario arquitectónico, sin perder la noción de elemento vertical de sostén.
- source_word: אֲדָנָיו
  english_pob_choice: its bases
  chosen_spanish: sus basas
  alternatives_spanish:
  - sus bases
  - sus encajes
  lexicon: HALOT
  rationale: אֶדֶן en contexto tabernacular puede describir la pieza inferior que recibe y sostiene los elementos estructurales. «Basas» conserva el sentido de apoyo/soporte y permite dejar abierta la relación exacta entre base y receptáculo, como lo hace el hebreo.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el testimonio de auditoría indica alta concordancia y solo cuestiones menores. La presente redacción conserva esa decisión estable y mantiene explícitas las alternativas léxicas donde el hebreo y la tradición de traducción permiten más de una lectura.
  spanish_consistency_notes:
  - Se mantiene «tabernáculo» como término técnico principal, en coherencia con la práctica POB para מִשְׁכָּן.
  - Se usa posesivo de tercera persona en singular («su/sus») para reflejar la cadena pronominal del hebreo de manera natural en español.
  - No se introduce una traducción eclesiástica más tradicional cuando el dato léxico favorece un equivalente más directo y auditable.
  - Las notas conservan las alternativas relevantes sin multiplicar opciones innecesarias, para no oscurecer la estructura enumerativa del versículo.
