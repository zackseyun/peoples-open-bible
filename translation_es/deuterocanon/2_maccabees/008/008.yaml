  rationale: Se reemplazó la secuencia poco natural «avanzaba poco a poco hacia el progreso y progresaba todavía más en éxitos» por «iba progresando poco a poco y avanzaba aún más en sus éxitos», que preserva las dos expresiones griegas sin calco torpe ni redundancia. Se mantuvieron las notas y los demás términos porque ya reflejaban bien la evidencia fuente y el audit trail del POB inglés.
