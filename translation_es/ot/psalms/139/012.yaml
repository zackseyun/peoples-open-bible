translation:
  language: es
  text: Aun las tinieblas no son oscuras para ti[a]; la noche resplandece como el día; las tinieblas son como la luz para ti[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Aun las tinieblas no te son oscuras». El verbo hebreo es causativo («oscurecer»), pero la cláusula también puede expresarse de forma más idiomática en español con sentido adjetival.'
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula final también puede entenderse como: «como son las tinieblas, así es la luz», expresando que ante Dios las tinieblas y la luz son equivalentes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Even
  chosen_spanish: Sí,
  alternatives_spanish:
  - También
  - Aun
  lexicon: HALOT
  rationale: En este contexto, גַּם introduce énfasis y extensión de la idea anterior. En español, “Sí” al inicio conserva el refuerzo enfático de manera natural y no mecánica.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad
  - oscuridades
  lexicon: HALOT
  rationale: El término hebreo es el sustantivo general para “oscuridad/tinieblas”. “Tinieblas” funciona bien en el paralelismo poético con “luz” y mantiene el tono bíblico sin caer en arcaísmo excesivo.
- source_word: לֹא יַחְשִׁיךְ מִמֶּךָ
  english_pob_choice: is not dark to you
  chosen_spanish: no son oscuras para ti
  alternatives_spanish:
  - no te son oscuras
  - no oscurecen para ti
  - no te hacen oscuras
  lexicon: HALOT
  rationale: El verbo הִחְשִׁיךְ es causativo, pero la revisión inglesa mostró que una formulación más idiomática puede conservar el sentido. En español, “no son oscuras para ti” preserva la imagen sin forzar una construcción verbal poco natural. Mantiene la tensión poética sin convertirla en una paráfrasis explicativa.
- source_word: וְלַיְלָה
  english_pob_choice: the night
  chosen_spanish: la noche
  alternatives_spanish:
  - y la noche
  - noche
  lexicon: HALOT
  rationale: “La noche” es la forma natural en español para el sujeto del paralelismo y mantiene la simetría con “el día”.
- source_word: כַּיּוֹם
  english_pob_choice: like the day
  chosen_spanish: como el día
  alternatives_spanish:
  - cual el día
  - igual que el día
  lexicon: HALOT
  rationale: La preposición comparativa כ se rinde con “como”, la opción más transparente y precisa en español.
- source_word: יָאִיר
  english_pob_choice: shines
  chosen_spanish: resplandece
  alternatives_spanish:
  - brilla
  - da luz
  - alumbra
  lexicon: HALOT
  rationale: El verbo en hifil de אור expresa dar luz/irradiar. “Resplandece” conserva la fuerza poética y la imagen de iluminación sin perder naturalidad.
- source_word: כַּחֲשֵׁיכָה
  english_pob_choice: darkness
  chosen_spanish: las tinieblas
  alternatives_spanish:
  - la oscuridad
  - tiniebla
  lexicon: HALOT
  rationale: La comparación final repite el campo semántico de oscuridad. Mantener “las tinieblas” ayuda a reflejar la repetición enfática del hebreo y su cadencia poética.
- source_word: כָּאוֹרָה
  english_pob_choice: like light
  chosen_spanish: como la luz
  alternatives_spanish:
  - como luz
  - igual que la luz
  lexicon: HALOT
  rationale: “Como la luz” preserva el paralelismo directo con el miembro anterior y la comparación simple del hebreo.
theological_decisions:
- issue: Cómo rendir la primera cláusula sin borrar la imagen hebrea ni resolverla demasiado
  english_pob_reading: Even darkness is not dark to you
  chosen_spanish_reading: las tinieblas no son oscuras para ti
  alternative_spanish_readings:
  - las tinieblas no te ocultan nada
  - las tinieblas no te son oscuras
  rationale: La lectura inglesa revisada evita un giro demasiado causal; en español, “no son oscuras para ti” conserva la imagen de que la oscuridad no llega a ser oscuridad en relación con Dios, sin sustituirla por una explicación sobre ocultamiento. Así se preserva la tensión metafórica del versículo.
  doctrine_reference: 'Translation philosophy #3 (preserve theological tension rather than resolve it)'
- issue: 'El posible doble sentido del cierre: equivalencia entre tinieblas y luz ante Dios'
  english_pob_reading: darkness is like light to you
  chosen_spanish_reading: las tinieblas son como la luz para ti
  alternative_spanish_readings:
  - las tinieblas son luz para ti
  - las tinieblas y la luz son iguales para ti
  rationale: 'El hebreo final puede leerse como una equivalencia poética: tinieblas y luz quedan al mismo nivel ante Dios. La traducción conserva la comparación directa y no la convierte en una afirmación más abstracta o doctrinalmente explicada.'
  doctrine_reference: 'Translation philosophy #3 (preserve theological tension rather than resolve it)'
translation_notes:
  revision_awareness: Tomé como base la revisión inglesa más reciente, que prefería “is not dark to you” frente a la formulación más causal. Por eso el español evita un calco del causativo y opta por una frase adjetival natural que conserva la imagen poética y la tensión del hebreo. También se tuvo en cuenta la nota inglesa sobre el posible valor de equivalencia del último hemistiquio.
  spanish_consistency_notes:
  - Usé “tinieblas” para mantener el paralelismo poético con “luz” y evitar mezclar registros con “oscuridad”.
  - Mantuve “como” en ambas comparaciones para reflejar el כ hebreo de manera consistente.
  - No sustituí el cierre por una explicación doctrinal; el versículo conserva su forma figurada.
  - El texto evita “SEÑOR” u otras sustituciones, pues no aparecen en este versículo.
