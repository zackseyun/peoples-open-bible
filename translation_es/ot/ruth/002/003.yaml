    text: 'Hebreo: «y le sucedió su casualidad»; es un giro idiomático que expresa aparente azar desde la perspectiva humana, mientras el libro en conjunto invita a percibir la providencia de Dios.'
    reason: theological_note
  revision_rationale: Se elimina una nota innecesaria, se conserva la única nota realmente justificada por el hebreo y por el rastro de auditoría inglés, y se corrige 'terreno del campo' a 'parte del campo' para representar mejor חֶלְקַת הַשָּׂדֶה en español natural y fiel. También se ajusta levemente la puntuación para una lectura más fluida sin alterar la secuencia narrativa.
