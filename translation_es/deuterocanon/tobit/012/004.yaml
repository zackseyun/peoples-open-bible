translation:
  language: es
  text: 'Y dijo el anciano[a]: «Él está justificado»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio griego aquí es inusualmente breve en comparación con la tradición semítica paralela más extensa para esta sección de Tobit; por eso la traducción también permanece deliberadamente concisa.
    reason: textual_variant
  - marker: b
    text: 'O: «Él está vindicado». El griego δικαιοῦται permite también esa lectura, y esta cláusula tan breve no obliga a escoger una sola matización.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πρεσβύτης
  english_pob_choice: the elder
  chosen_spanish: el anciano
  alternatives_spanish:
  - el viejo
  - el mayor
  lexicon: LSJ
  rationale: πρεσβύτης puede referirse a un hombre de edad avanzada o a un anciano/elder. En español, «el anciano» conserva la brevedad del griego y la referencia a edad sin forzar un cargo eclesial que el contexto no exige.
- source_word: Δικαιοῦται
  english_pob_choice: is justified
  chosen_spanish: está justificado
  alternatives_spanish:
  - es justificado
  - está vindicado
  - es vindicado
  lexicon: BDAG
  rationale: El pasivo de δικαιόω admite el campo semántico de ser declarado justo, justificado o vindicado. «Está justificado» mantiene la forma breve del griego y evita imponer una lectura más técnica o más narrativa de la que el texto inmediato garantiza.
- source_word: αὐτῷ
  english_pob_choice: for him
  chosen_spanish: '[implícito en la pasiva española]'
  alternatives_spanish:
  - para él
  - a favor de él
  lexicon: BDAG
  rationale: El dativo αὐτῷ es comprimido y no obliga en español a expresar un complemento aparte. La pasiva «está justificado» reproduce la concisión del griego sin añadir una preposición que podría sonar artificial o interpretar en exceso.
theological_decisions:
- issue: Alcance de δικαιόω en un dicho muy breve y sin mayor contexto inmediato
  english_pob_reading: is justified / is vindicated
  chosen_spanish_reading: está justificado
  alternative_spanish_readings:
  - está vindicado
  rationale: La decisión principal conserva la ambigüedad productiva del griego. «Está justificado» sigue la línea de la POB inglesa, mientras que «está vindicado» queda como alternativa legítima por si el contexto se entiende como una declaración de reivindicación más que de justificación forense.
  doctrine_reference: 'DOCTRINE.md: consistencia terminológica; preservar tensiones léxicas y teológicas sin resolverlas prematuramente'
translation_notes:
  revision_awareness: La tradición griega de Swete es sumamente concisa aquí. La inglesa POB ya optó por una traducción igualmente breve («He is justified»), con una nota alternativa («vindicated»). La versión española sigue esa concisión y conserva la ambigüedad léxica del verbo δικαιόω sin expandir el dativo.
  spanish_consistency_notes:
  - Se usa «anciano» para πρεσβύτης, evitando «anciano de iglesia» o «presbítero», que introducirían una función no documentada en el verso.
  - Se evita «Cristo», «SEÑOR» u otra terminología no presente en el texto fuente.
  - La pasiva española «está justificado» conserva la tersura del enunciado griego y su apertura semántica.
