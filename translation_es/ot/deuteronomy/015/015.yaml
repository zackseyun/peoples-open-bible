    text: Or 'servant' for 'slave'; the Hebrew עֶבֶד can denote either, but here the bondage of Egypt makes 'slave' the stronger rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'ransomed you.' The Hebrew verb carries the sense of redeeming or buying back from bondage.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'this thing'; that is, the instruction being given here.
    reason: lexical_alternative
