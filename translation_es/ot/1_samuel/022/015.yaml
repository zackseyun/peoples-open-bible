translation:
  language: es
  text: ¿Fue hoy la primera vez que consulté a Dios por él? ¡Lejos de mí! Que el rey no impute[a] nada a su siervo ni a toda la casa de mi padre, porque su siervo no sabía nada de todo esto, ni poco ni mucho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «atribuya». El hebreo usa aquí un verbo con sentido forense: cargar o atribuir una culpa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: El adverbio temporal introduce la pregunta retórica y en español 'hoy' es natural, claro y fiel al sentido inmediato.
- source_word: הַחִלֹּתִי
  english_pob_choice: was today the first time that I / did I begin today
  chosen_spanish: ¿Fue hoy la primera vez que consulté... ?
  alternatives_spanish:
  - ¿Comencé hoy... ?
  - ¿Fue hoy cuando empecé... ?
  lexicon: HALOT
  rationale: El hebreo expresa una pregunta retórica sobre el inicio de la acción; en contexto, niega que fuera una práctica nueva. 'Fue hoy la primera vez' conserva esa fuerza idiomática sin volverla mecánica.
- source_word: לִשְׁאוֹל לוֹ בֵאלֹהִים
  english_pob_choice: inquired of God for him
  chosen_spanish: consulté a Dios por él
  alternatives_spanish:
  - inquirí a Dios por él
  - busqué a Dios por él
  lexicon: HALOT
  rationale: שאל con בֵאלֹהִים denota buscar dirección u oráculo divino. 'Consultar a Dios' comunica bien el acto en español bíblico actual; 'por él' preserva לוֹ como beneficiario, es decir, David.
- source_word: חָלִילָה לִּי
  english_pob_choice: Far be it from me!
  chosen_spanish: ¡Lejos de mí!
  alternatives_spanish:
  - ¡Ni pensarlo!
  - ¡De ningún modo!
  lexicon: HALOT
  rationale: La fórmula hebrea es una fuerte repulsa. '¡Lejos de mí!' transmite bien la negativa enfática en español sin perder dignidad.
- source_word: אַל יָשֵׂם ... דָבָר
  english_pob_choice: Let not the king impute anything
  chosen_spanish: No permita el rey imputar nada
  alternatives_spanish:
  - No considere el rey nada
  - No ponga el rey nada
  lexicon: HALOT
  rationale: שׂים con ב y דָבָר tiene aquí sentido forense de atribuir o cargar una culpa. 'Imputar' conserva ese matiz jurídico más de cerca que 'atribuir' o 'poner'.
- source_word: בְּעַבְדּוֹ
  english_pob_choice: against his servant
  chosen_spanish: a su siervo
  alternatives_spanish:
  - contra su siervo
  - sobre su siervo
  lexicon: HALOT
  rationale: En español, con 'imputar' el complemento natural es 'a', y el tono deferente de la auto-referencia servil queda preservado con 'siervo'.
- source_word: בְּכָל בֵּית אָבִי
  english_pob_choice: against all my father’s house
  chosen_spanish: ni a toda la casa de mi padre
  alternatives_spanish:
  - ni a toda la familia de mi padre
  - ni a toda mi casa paterna
  lexicon: HALOT
  rationale: '''Casa de mi padre'' es un idiomatismo bíblico transparente en español. Mantenerlo evita aplanar el matiz de linaje/hogar extendido.'
- source_word: לֹא יָדַע עַבְדְּךָ
  english_pob_choice: your servant knew nothing
  chosen_spanish: su siervo no sabía nada
  alternatives_spanish:
  - su siervo no conocía nada
  - su siervo no estaba enterado
  lexicon: HALOT
  rationale: La negación de conocimiento es directa; 'no sabía nada' es natural y exacto en español.
- source_word: בְּכָל זֹאת
  english_pob_choice: of all this
  chosen_spanish: de todo esto
  alternatives_spanish:
  - acerca de todo esto
  - sobre todo esto
  lexicon: HALOT
  rationale: La frase refiere al conjunto del asunto en cuestión. 'De todo esto' encaja bien con la negación de saber.
- source_word: דָּבָר קָטֹן א֥וֹ גָדֽוֹל
  english_pob_choice: whether little or much
  chosen_spanish: ni poco ni mucho
  alternatives_spanish:
  - sea poco o mucho
  - ni pequeño ni grande
  lexicon: HALOT
  rationale: 'El hebreo usa un merismo para totalizar el alcance: nada, de cualquier grado. ''Ni poco ni mucho'' reproduce con naturalidad la amplitud inclusiva en español actual.'
theological_decisions:
- issue: Fórmula de repulsa y autoexculpación delante del rey
  english_pob_reading: Far be it from me! Let not the king impute anything to his servant or to all my father’s house.
  chosen_spanish_reading: ¡Lejos de mí! No permita el rey imputar nada a su siervo ni a toda la casa de mi padre.
  alternative_spanish_readings:
  - ¡De ningún modo! No considere el rey nada contra su siervo ni contra toda la casa de mi padre.
  - ¡Ni pensarlo! No ponga el rey nada a su siervo ni a toda la casa de mi padre.
  rationale: No hay cambio doctrinal, pero sí conviene preservar la fuerza judicial y retórica de la auto-defensa de Ahimelec. 'Imputar' mantiene el matiz de atribución de culpa sin suavizarlo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La versión inglesa revisada pasó de ''charge anything against'' a ''impute anything to'' y de ''small or great'' a ''little or much''. La redacción española sigue esa revisión: adopta ''imputar'' para reflejar mejor el valor forense del verbo, y ''ni poco ni mucho'' para representar el merismo totalizante de manera natural en español.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del proyecto cuando el texto no requiere el tetragrama explícito.
  - '''Siervo'' conserva la auto-referencia reverente del hablante; no se sustituye por ''servidor'' para no perder el registro bíblico y la carga relacional.'
  - '''Casa de mi padre'' se conserva como idiomatismo semítico transparente.'
  - 'La pregunta retórica se traduce sin forzar un orden sintáctico hebraizante, pero sin perder el contraste del contexto: no fue una acción nueva ni aislada.'
