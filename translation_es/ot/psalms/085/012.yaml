translation:
  language: es
  text: La verdad[a] brotará de la tierra, y la rectitud[b] mirará desde el cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la fidelidad brotará de la tierra».
    reason: lexical_alternative
  - marker: b
    text: O «la justicia mirará desde el cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֶת
  english_pob_choice: Truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la fidelidad
  - la veracidad
  lexicon: HALOT
  rationale: אֱמֶת puede expresar verdad, fidelidad o confiabilidad. En este paralelismo poético con צֶדֶק, «la verdad» preserva el sustantivo abstracto y resulta natural en español. «La fidelidad» sigue siendo viable, pero se deja como alternativa porque desplaza ligeramente el foco semántico hacia lealtad relacional.
- source_word: מֵאֶרֶץ
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - de la tierra/país
  lexicon: HALOT
  rationale: אֶרֶץ puede significar «tierra» o «país/territorio». Aquí el contraste vertical con «del cielo» favorece «tierra», que conserva la simetría cósmica y suena natural en español.
- source_word: תִּצְמָח
  english_pob_choice: will spring up
  chosen_spanish: brotará
  alternatives_spanish:
  - surgirá
  - germinará
  lexicon: HALOT
  rationale: צמח alude a brotar o crecer, con imagen vegetal. «Brotará» comunica bien la metáfora en español moderno sin endurecerla; «germinará» es posible pero más botánico, y «surgirá» pierde parte de la imaginería vegetal.
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia
  lexicon: HALOT
  rationale: צֶדֶק puede rendirse como «justicia» o «rectitud». En esta línea poética, junto a «verdad» y en paralelo con el cielo, «justicia» mantiene bien la carga moral y es una opción plenamente aceptable en español. Se conserva la alternativa de «rectitud» por la tensión semántica del término.
- source_word: מִשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - del cielo
  - desde los cielos
  lexicon: HALOT
  rationale: שָׁמַיִם puede ser «cielo» o «cielos». «Desde el cielo» funciona con fluidez en español y conserva el contraste arriba/abajo del poema. «Desde los cielos» es posible, pero menos natural en esta construcción.
- source_word: נִשְׁקָף
  english_pob_choice: will look down
  chosen_spanish: mirará
  alternatives_spanish:
  - mirará hacia abajo
  - asomará
  lexicon: HALOT
  rationale: El nifal de שׁקף expresa mirar o asomarse desde arriba. En español, «mirará» retiene el gesto de observación celeste sin introducir una expresión forzada. «Mirará hacia abajo» explicita la dirección, pero resulta más pesado; «asomará» añade una nuance que el hebreo no exige de manera principal.
theological_decisions:
- issue: Tensión semántica de צֶדֶק entre justicia y rectitud
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: La POB en inglés eligió «righteousness» y dejó «justice» como alternativa. En español, «justicia» es el equivalente más natural y robusto para este contexto poético; se preserva «rectitud» como alternativa para no cerrar indebidamente el campo semántico del hebreo.
  doctrine_reference: 'DOCTRINE.md: contested terms principle for δικαιοσύνη/righteousness vs. justice; preserve alternatives in footnotes where relevant'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo de WLC y el audit trail inglés de la POB. No se registran revisiones aplicadas en la versión fuente más reciente; por ello, la redacción española mantiene la misma decisión interpretativa básica, adaptando únicamente la idiomaticidad al español.
  spanish_consistency_notes:
  - Se mantiene el paralelismo vertical «tierra/cielo» para conservar la imagen del hebreo.
  - Se eligió «justicia» en el texto principal por naturalidad en español, dejando «rectitud» en nota para preservar la alternativa semántica del hebreo.
  - Los marcadores de nota [a] y [b] aparecen en el texto exactamente donde corresponde la alternativa lexical.
