revisions:
- from: 'Di[a] a ellos: «Vivo yo, Yahvé, como habéis hablado en mis oídos, así haré con vosotros».'
  to: 'Diles[a]: «Vivo yo, declara Yahvé, que tal como hablaron a mis oídos, así haré con ustedes».'
  rationale: Se corrige a «Diles» para reflejar de forma natural «di a ellos»; se restituye explícitamente «declara Yahvé» para נְאֻם יְהוָה; se adapta el registro a español neutral con «hablaron / ustedes»; se mejora el modismo hebreo con «a mis oídos»; y se mantiene la correspondencia «tal como … así …» con una formulación clara y fiel.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:48:17Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: mandato a Moisés, fórmula de juramento divino, nombre Yahvé, correspondencia entre lo dicho por el pueblo y lo que Dios hará. Sin embargo, omite de manera excesiva la fórmula declarativa נְאֻם יְהוָה y suaviza dos giros clave con opciones menos naturales o menos precisas para este contexto.'
  spanish_quality_summary: 'El español es comprensible, pero presenta dos problemas de registro/neutralidad: «habéis/vosotros» no sigue bien el objetivo de español latinoamericano neutral, y «en mis oídos» suena forzado donde «en mi oído»/«ante mí»/«a mis oídos» o mejor «en mi presencia auditiva» no sería tan natural como «en mi oído»; la mejor opción idiomática y fiel es «a mis oídos» o «en mi oído», pero por paralelo con el inglés auditado conviene «a mis oídos» menos. Además, «haré con vosotros» no expresa tan claramente la dirección adversativa de לָכֶם en contexto de juicio como «haré con ustedes» o mejor «les haré».'
  glossary_alignment: Se alinea correctamente con «Yahvé» para יהוה. No hay otros términos de glosario especialmente controvertidos aquí. La omisión de «declara Yahvé» no preserva bien la decisión auditada para נְאֻם יְהוָה, aunque el nombre divino sí está presente.
  issues:
  - severity: medium
    issue: Se omite la fuerza explícita de נְאֻם יְהוָה
    rationale: El hebreo incluye una fórmula profética/declarativa formal. Reducirla a una simple aposición en «Vivo yo, Yahvé» pierde el matiz de pronunciamiento solemne presente en la fuente y en la auditoría inglesa.
  - severity: medium
    issue: Uso de «habéis / vosotros» fuera del objetivo de español latinoamericano neutral
    rationale: Aunque es gramatical, el proyecto pide español neutral latinoamericano / ampliamente legible en iglesia. «Han hablado / ustedes» encaja mejor sin pérdida de sentido.
  - severity: medium
    issue: «Haré con vosotros» es menos preciso que una construcción dirigida sobre el destinatario
    rationale: אֶעֱשֶׂה לָכֶם en este contexto de juicio apunta a acción ejercida sobre ellos. «Haré con ustedes» es aceptable pero algo difuso; «les haré» o «haré esto con ustedes» sería más claro. Dado que no hay objeto expreso, «así haré con ustedes» preserva bien la elipsis y la dirección contextual.
  - severity: low
    issue: «En mis oídos» suena algo calcado en español
    rationale: Aunque inteligible, no es la opción más natural. «A mis oídos» comunica mejor el modismo hebreo sin perder la imagen auditiva.
  revised_spanish_text: 'Diles[a]: «Vivo yo, declara Yahvé, que tal como hablaron a mis oídos, así haré con ustedes».'
  revised_footnotes:
  - marker: a
    text: El hebreo dice literalmente «Vivo yo … si no»; es una fórmula de juramento que aquí expresa una afirmación solemne, algo como «ciertamente» o «sin falta».
    reason: lexical_alternative
  revision_rationale: Se corrige a «Diles» para reflejar de forma natural «di a ellos»; se restituye explícitamente «declara Yahvé» para נְאֻם יְהוָה; se adapta el registro a español neutral con «hablaron / ustedes»; se mejora el modismo hebreo con «a mis oídos»; y se mantiene la correspondencia «tal como … así …» con una formulación clara y fiel.
