translation:
  language: es
  text: Así lo hizo por ellos, y los libró de la mano de los hijos de Israel[a], y no los mataron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas'. El hebreo dice 'los hijos de Israel'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ לָהֶם כֵּן
  english_pob_choice: So he did this for them
  chosen_spanish: Así lo hizo con ellos
  alternatives_spanish:
  - Y así lo hizo con ellos
  - Así procedió con ellos
  lexicon: HALOT
  rationale: La expresión hebrea combina 'hacer' con 'así/esto'. En español, 'Así lo hizo con ellos' conserva la relación con el contexto previo sin sonar forzada.
- source_word: וַיַּצֵּל
  english_pob_choice: he delivered
  chosen_spanish: los libró
  alternatives_spanish:
  - los rescató
  - los salvó
  lexicon: HALOT
  rationale: נצל en piel/hiphil puede significar librar, rescatar o salvar. 'Libró' preserva el sentido de sacar de peligro y funciona bien con la imagen de dominio implícita.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de la autoridad de
  lexicon: HALOT
  rationale: Se mantiene el modismo concreto 'mano' para reflejar el hebreo y su idea de control o dominio.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la formulación masculina plural del hebreo, en línea con la política de precisión de género del proyecto. 'Hijos de Israel' es transparente en español y evita nivelar la forma original.
- source_word: וְלֹא הֲרָגוּם
  english_pob_choice: and they did not kill them
  chosen_spanish: y no los mataron
  alternatives_spanish:
  - y no los قتلaron
  - y no les dieron muerte
  lexicon: HALOT
  rationale: הרג significa matar. 'No los mataron' es directo, natural y fiel al verbo hebreo en el contexto narrativo.
theological_decisions:
- issue: Mantenimiento del giro 'hijos de Israel'
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se preserva la forma explícita del hebreo en lugar de suavizarla a una etiqueta nacional más idiomática. Eso mantiene la correspondencia fuente-texto y la señal de género gramatical del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: Se corrigió el problema de validación previo eliminando la nota al pie no anclada; el texto español ya no contiene marcadores de nota y queda listo para publicación sin referencias sueltas.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque el texto no contiene el Tetragrámaton.
  - Se evitó 'Cristo/Mesías' porque no aparecen en este versículo.
  - '''De la mano de'' mantiene el modismo hebreo sin sobreinterpretarlo.'
  - El verbo final en plural se reflejó naturalmente con 'mataron', alineado con el sujeto plural implícito.
