translation:
  language: es
  text: 'Nabucodonosor, rey, a todos los pueblos, naciones y lenguas que habitan en toda la tierra[a]: que se multiplique[b] su paz.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «En toda la tierra» conserva la fórmula imperial amplia del arameo; puede funcionar retóricamente como «por todo el reino».
    reason: cultural_note
  - marker: b
    text: 'O: «que abunde». El verbo arameo admite la idea de aumentar o ser multiplicado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְכָּא
  english_pob_choice: King
  chosen_spanish: rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: 'En español, el título pospuesto y sin artículo es natural en encabezamientos formales: «Nabucodonosor, rey». Mantiene la función titulativa del hebreo/aramaico sin sobrecargar la frase.'
- source_word: לְכָל עַמְמַיָּא אֻמַיָּא וְלִשָּׁנַיָּא
  english_pob_choice: to all peoples, nations, and languages
  chosen_spanish: a todos los pueblos, naciones y lenguas
  alternatives_spanish:
  - a todos los pueblos, etnias y lenguas
  - a todos los pueblos, naciones y hablas
  lexicon: HALOT
  rationale: La tríada imperial se conserva de forma directa en español. «Lenguas» mantiene el componente lingüístico concreto sin volverlo demasiado interpretativo, y «pueblos, naciones» reproduce el alcance total de la fórmula.
- source_word: דִּי דארין
  english_pob_choice: that dwell
  chosen_spanish: que habitan
  alternatives_spanish:
  - que viven
  - habitantes que
  lexicon: HALOT
  rationale: «Habitan» conserva el tono formal del edicto y refleja bien el participio relativo; evita la coloquialidad de «viven» sin alterar el sentido.
- source_word: בְּכָל אַרְעָא
  english_pob_choice: in all the earth
  chosen_spanish: en toda la tierra
  alternatives_spanish:
  - en toda la tierra habitable
  - en toda la tierra / en todo el reino
  lexicon: HALOT
  rationale: Se conserva la amplitud retórica del arameo con una expresión natural en español. «Tierra» refleja el valor idiomático universalizado que el POB inglés también reconoce.
- source_word: שְׁלָמְכוֹן
  english_pob_choice: your peace
  chosen_spanish: su paz
  alternatives_spanish:
  - vuestra paz
  - su bienestar
  lexicon: HALOT
  rationale: Se traduce con «paz» por ser la correspondencia más directa y bíblica para shalom/šlam. Se emplea «su» como forma de tratamiento respetuosa y para evitar la arcaización de «vuestra».
- source_word: יִשְׂגֵּא
  english_pob_choice: abound
  chosen_spanish: se multiplique
  alternatives_spanish:
  - abunde
  - crezca
  - sea multiplicada
  lexicon: HALOT
  rationale: La elección retiene la fuerza optativa y la alternativa textual/lexical indicada en el POB inglés («be multiplied»). «Se multiplique» es fiel, natural y mantiene el matiz de incremento abundante.
theological_decisions:
- issue: Alcance de «en toda la tierra / in all the earth» como fórmula imperial
  english_pob_reading: In all the earth is a conventional imperial expression and may function rhetorically like throughout the whole realm.
  chosen_spanish_reading: En toda la tierra conserva el universalismo retórico de la fórmula, sin obligar a una afirmación geográfica absoluta moderna.
  alternative_spanish_readings:
  - en todo el reino
  - por toda la tierra
  rationale: La frase aramea puede funcionar como fórmula de soberanía amplia. Mantener «tierra» deja visible la resonancia del original y evita reducir el texto prematuramente a un mero territorio político.
  doctrine_reference: Daniel 3:31; uso formular del lenguaje imperial en Daniel
- issue: Valor semántico de שְׁלָמְכוֹן (shalom/well-being/peace)
  english_pob_reading: your peace
  chosen_spanish_reading: su paz
  alternative_spanish_readings:
  - su bienestar
  - su prosperidad
  rationale: «Paz» preserva la amplitud semítica del término sin desviar el verso hacia prosperidad material. No se expande doctrinalmente; se mantiene el saludo benevolente del decreto.
  doctrine_reference: Daniel 3:31; שָׁלוֹם / שְׁלָמָא como fórmula de bendición
translation_notes:
  revision_awareness: 'Coincide con la última revisión del testimonio inglés: no se requieren cambios textuales. La versión española sigue el mismo perfil de equivalencia óptima, conservando la tríada imperial, la fórmula de saludo y la lectura optativa de incremento para la paz.'
  spanish_consistency_notes:
  - Se mantiene «Nabucodonosor» como forma estable del nombre propio en español.
  - Se conserva la tríada «pueblos, naciones y lenguas» para reflejar el patrón formal del arameo.
  - «Tierra» se usa de forma idiomática y retóricamente amplia, no como precisión geográfica técnica.
  - «Paz» traduce directamente el valor semítico de שְׁלָמָא/שְׁלָמְכוֹן sin introducir «bienestar» en el texto principal.
