translation:
  language: es
  text: En la luz del rostro del rey hay vida[b], y su favor es como una nube de lluvia tardía[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «su favor es como una nube de la lluvia tardía».'
    reason: lexical_alternative
  - marker: b
    text: La imagen es que la expresión favorable y la buena voluntad del rey traen vida y bendición, como la lluvia tardía benéfica para los cultivos.
    reason: cultural_note
lexical_decisions:
- source_word: בְּ/אוֹר
  english_pob_choice: In the light of
  chosen_spanish: En la luz de
  alternatives_spanish:
  - Bajo la luz de
  - En el resplandor de
  lexicon: HALOT
  rationale: La preposición ב con אוֹר expresa una relación locativa/instrumental. «En la luz de» conserva la imagen hebrea y suena natural en español sin perder el valor figurado.
- source_word: פְּנֵי
  english_pob_choice: face
  chosen_spanish: rostro
  alternatives_spanish:
  - cara
  - presencia
  - semblante
  lexicon: HALOT
  rationale: En este contexto se refiere al semblante visible del rey como señal de favor. «Rostro» mantiene la concreción hebrea y es más digno que «cara» en español bíblico actual.
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  lexicon: HALOT
  rationale: Equivalente directo y transparente.
- source_word: חַיִּים
  english_pob_choice: there is life
  chosen_spanish: hay vida
  alternatives_spanish:
  - hay vida plena
  - es vida
  lexicon: HALOT
  rationale: El sustantivo plural funciona idiomáticamente como afirmación de vida. «Hay vida» reproduce bien la cláusula sin verbo explícito del hebreo y evita sobreinterpretar.
- source_word: וּ/רְצוֹנ/וֹ
  english_pob_choice: and his favor
  chosen_spanish: y su favor
  alternatives_spanish:
  - y su buena voluntad
  - y su aceptación
  lexicon: HALOT
  rationale: רָצוֹן en contexto real expresa favor o beneplácito. «Favor» sigue la lectura del POB inglés y encaja con el paralelismo del verso.
- source_word: כְּ/עָב
  english_pob_choice: is like a cloud of
  chosen_spanish: es como nube de
  alternatives_spanish:
  - es como una nube de
  - es semejante a una nube de
  lexicon: HALOT
  rationale: El כ comparativo introduce la comparación. Se omite el artículo para conservar el estilo proverbial breve y directo, como en el hebreo.
- source_word: מַלְקוֹשׁ
  english_pob_choice: spring rain
  chosen_spanish: lluvia tardía
  alternatives_spanish:
  - lluvia de primavera
  - lluvia de la estación tardía
  lexicon: HALOT
  rationale: מַלְקוֹשׁ designa la lluvia tardía de la temporada agrícola. «Lluvia tardía» preserva el sentido técnico/agrícola; la opción más explicativa «lluvia de primavera» queda solo como alternativa interpretativa.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el acuerdo de control cruzado es alto, por lo que el español sigue de cerca la solución auditada del POB inglés, manteniendo la imagen del rostro real, el favor y la lluvia tardía.
  spanish_consistency_notes:
  - Se mantiene «favor» para רָצוֹן, en continuidad con el criterio POB y para evitar diluir el matiz real/político del texto.
  - Se conserva la metáfora agrícola «lluvia tardía» como opción principal y se documenta la alternativa más formal en nota.
  - El orden sintáctico sigue el paralelismo breve del proverbio hebreo, con puntuación simple y lectura pública fluida.
