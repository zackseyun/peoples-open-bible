translation:
  language: es
  text: 'Pero ustedes dicen[a]: «El camino del Señor no es justo». Escuchen ahora, casa de Israel: ¿No es justo mi camino? ¿No son sus caminos los que no son justos?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recto» o «equitativo» para «justo» en cada ocurrencia de «no es justo». El término hebreo aquí se refiere a lo que es apropiado o equitativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲמַרְתֶּם
  english_pob_choice: Yet you say
  chosen_spanish: Sin embargo, ustedes dicen
  alternatives_spanish:
  - Y ustedes dicen
  - Pero ustedes dicen
  lexicon: HALOT
  rationale: El hebreo introduce una réplica adversativa dentro de una disputa profética. «Sin embargo» conserva el giro refutativo con un registro natural en español y evita un calco demasiado literal de la conjunción simple.
- source_word: יִתָּכֵן
  english_pob_choice: is just
  chosen_spanish: es justo
  alternatives_spanish:
  - es correcto
  - es recto
  - es equitativo
  lexicon: HALOT
  rationale: En este contexto forense-moral, יִתָּכֵן señala lo que es apropiado o equitativo. «Justo» reproduce bien la carga judicial y ética que el POB documenta para el inglés, y se mantiene consistente en toda la frase.
- source_word: דֶּרֶךְ
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - conducta
  - modo de actuar
  - sendero
  lexicon: HALOT
  rationale: «Camino» conserva la metáfora hebrea de la manera de proceder y funciona de forma natural tanto para Yahvé como para Israel dentro del contraste del versículo.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: HALOT
  rationale: El proyecto pide renderizar el nombre divino como «Yahvé» en el texto principal. Aquí el hebreo tiene אֲדֹנָי, pero el sentido en español debe reflejar el referente divino del pasaje sin la convención de enmascaramiento. Por eso se traduce con el nombre propio divino del proyecto.
- source_word: שִׁמְעוּ נָא
  english_pob_choice: Hear now
  chosen_spanish: Escuchen ahora
  alternatives_spanish:
  - Oigan ahora
  - Escuchen, por favor
  lexicon: HALOT
  rationale: El imperativo plural con נָא exige una apelación urgente. «Escuchen ahora» conserva el tono profético directo y es idiomático en español.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: house of Israel
  chosen_spanish: casa de Israel
  alternatives_spanish:
  - casa de Israel
  - pueblo de Israel
  lexicon: HALOT
  rationale: «Casa de Israel» reproduce la fórmula covenantal/profética y preserva la imagen corporativa del hebreo.
- source_word: הֲדַרְכִּי לֹא יִתָּכֵן
  english_pob_choice: Is my way not just?
  chosen_spanish: ¿No es justo mi camino?
  alternatives_spanish:
  - ¿No es recto mi camino?
  - ¿No es correcto mi camino?
  lexicon: HALOT
  rationale: La pregunta retórica mantiene la refutación divina. Se conserva la correspondencia entre «camino» e «justo» para reflejar la misma evaluación moral del hebreo.
- source_word: הֲלֹא דַרְכֵיכֶם לֹא יִתָּכֵנוּ
  english_pob_choice: Is it not your ways that are not just?
  chosen_spanish: ¿No son más bien sus caminos los que no son justos?
  alternatives_spanish:
  - ¿No son sus caminos los que no son justos?
  - ¿No es que sus caminos no son justos?
  lexicon: HALOT
  rationale: El hebreo fronta «sus caminos» para contrastarlos con «mi camino». «Más bien» ayuda a preservar el valor enfático del contraste sin añadir contenido ajeno. Se mantiene el plural «caminos» por el hebreo.
theological_decisions:
- issue: Cómo expresar el nombre divino en una réplica profética donde el hebreo tiene אֲדֹנָי pero el proyecto evita el enmascaramiento de ‘SEÑOR’.
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Aunque el POB inglés usa la forma tradicional «the Lord», el proyecto español establece «Yahvé» como equivalente principal del nombre divino. En este pasaje, el punto teológico es la justicia del proceder divino, no una diferencia de referente; por eso se usa el nombre propio del proyecto para mantener transparencia textual.
  doctrine_reference: 'Default terminology: יהוה / YHWH -> Yahvé'
- issue: Valor semántico de יִתָּכֵן en el debate judicial-moral del versículo.
  english_pob_reading: just
  chosen_spanish_reading: justo
  alternative_spanish_readings:
  - recto
  - equitativo
  - correcto
  rationale: El contexto de Ezequiel 18 enfatiza responsabilidad moral y justicia divina. «Justo» conserva el peso judicial que el POB destaca en su nota léxica y evita diluir la acusación en un sentido meramente coloquial de ‘correcto’ o ‘justo’ como opinión.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó «The Lord’s way» a «The way of the Lord» para seguir más de cerca el hebreo; en español se reflejó esa relación con «el camino de Yahvé» en la acusación inicial y se mantuvo la repetición de «justo» en las tres ocurrencias de יִתָּכֵן, sin suavizarla. También se conservó el contraste retórico entre el camino divino y los caminos de Israel.
  spanish_consistency_notes:
  - Se mantuvo «camino» para דֶּרֶךְ en las tres ocurrencias, para conservar el paralelismo.
  - Se uniformó יִתָּכֵן como «justo» en todo el versículo, siguiendo la decisión auditada del POB en inglés.
  - Se usó «casa de Israel» como fórmula profética estable.
  - Se evitó «SEÑOR» por la convención terminológica del proyecto; se empleó «Yahvé» en el texto principal.
