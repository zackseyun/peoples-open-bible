lexical_decisions:
- source_word: καταντήσαντος
  english_pob_choice: arrived
  chosen_spanish: llegó
  alternatives_spanish:
  - arribó
  - alcanzó
  lexicon: LSJ
  rationale: El genitivo absoluto indica la llegada del rey a Tiro. «Llegó» es natural en español y conserva el sentido de alcanzar el destino sin sobrecargar el estilo.
- source_word: ἐπʼ αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: LSJ
  rationale: La frase marca que la acción ocurrió frente al rey. «Delante de él» es clara y directa; mantiene la referencia al antecedente inmediato sin introducir una expresión más jurídica de lo necesario.
- source_word: δικαιολογίαν
  english_pob_choice: made their defense
  chosen_spanish: hicieron su defensa
  alternatives_spanish:
  - presentaron su defensa
  - expusieron su justificación
  lexicon: LSJ
  rationale: 'El sustantivo tiene fuerza forense: una defensa o alegato. «Hicieron su defensa» refleja bien ἐποιήσαντο τὴν δικαιολογίαν y conserva el tono formal del griego.'
- source_word: πεμφθέντες τρεῖς ἄνδρες
  english_pob_choice: the three men sent
  chosen_spanish: los tres hombres enviados
  alternatives_spanish:
  - los tres enviados
  - los tres hombres que habían sido enviados
  lexicon: LSJ
  rationale: Se mantiene el participio pasivo y la referencia simple a la delegación. «Enviados» sigue de cerca el griego sin convertirlo en una interpretación más explícita que el texto no exige.
- source_word: γερουσίας
  english_pob_choice: council
  chosen_spanish: consejo
  alternatives_spanish:
  - senado
  - ancianato
  lexicon: LSJ
  rationale: El término alude al cuerpo gobernante de ancianos. «Consejo» es claro y natural en español; «senado» puede sonar históricamente más romano y «ancianato» resulta menos idiomático aquí.
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó «presented their case» por «made their defense» para reflejar más directamente τὴν δικαιολογίαν ἐποιήσαντο. La versión española adopta desde el inicio una formulación equivalente y formal («hicieron su defensa»), sin necesidad de nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Dios / Yahvé / Mesías» como normas del proyecto, aunque este versículo no las contiene.
  - «Consejo» se usa de forma consistente para γερουσία cuando el contexto no exige una carga institucional más específica.
  - No se introducen notas al pie porque no hay una ambigüedad que requiera anclaje textual adicional en esta línea.
