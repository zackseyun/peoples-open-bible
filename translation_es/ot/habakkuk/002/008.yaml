translation:
  language: es
  text: Porque tú has despojado a muchas naciones, todos los pueblos restantes te despojarán[a], por sangre humana[b] y por la violencia hecha a la tierra, a la ciudad y a todos los que habitan en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O "te saquearán"; el hebreo usa el mismo verbo de despojo para marcar la reversión: el despojador será despojado.'
    reason: lexical_alternative
  - marker: b
    text: Lit. "por sangres de אדם"; es una expresión genérica que aquí se refiere a sangre humana o derramamiento de sangre humana.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁלּוֹתָ
  english_pob_choice: have plundered
  chosen_spanish: has despojado
  alternatives_spanish:
  - has saqueado
  - has saqueado y despojado
  lexicon: HALOT
  rationale: El verbo expresa tomar botín por la fuerza. «Despojado» conserva el valor de quitar bienes por violencia y mantiene el paralelismo de reversión con el verbo siguiente.
- source_word: גּוֹיִם רַבִּים
  english_pob_choice: many nations
  chosen_spanish: a muchas naciones
  alternatives_spanish:
  - a muchos pueblos
  - a muchas gentes
  lexicon: HALOT
  rationale: גוֹיִם aquí tiene sentido político e internacional; «naciones» preserva mejor ese marco imperial que «pueblos».
- source_word: יְשָׁלּוּךָ
  english_pob_choice: will plunder you
  chosen_spanish: te despojará
  alternatives_spanish:
  - te saqueará
  - te despojará a ti
  lexicon: HALOT
  rationale: 'Se conserva la inversión del verbo de despojo: el que despojó será despojado. En español, el singular colectivo «todo el resto de los pueblos» admite verbo singular concordado con el sujeto colectivo.'
- source_word: כָּל יֶתֶר עַמִּים
  english_pob_choice: all the remnant of the peoples
  chosen_spanish: todo el resto de los pueblos
  alternatives_spanish:
  - todo el remanente de los pueblos
  - todos los que quedan de los pueblos
  lexicon: HALOT
  rationale: יֶתֶר comunica lo que queda/resta. «Resto» suena más natural que «remanente» en español bíblico contemporáneo, sin perder el sentido de sobrevivientes o lo que queda.
- source_word: מִדְּמֵי אָדָם
  english_pob_choice: because of human blood
  chosen_spanish: por la sangre de los hombres
  alternatives_spanish:
  - por sangre humana
  - por el derramamiento de sangre humana
  lexicon: HALOT
  rationale: El hebreo literal es «de la sangre de אדם». Se mantuvo «hombres» como singular colectivo/genérico representativo, siguiendo la tensión documentada entre literalidad y naturalidad; la relación causal queda expresada por «por».
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: los hombres
  alternatives_spanish:
  - la humanidad
  - el ser humano
  lexicon: HALOT
  rationale: En este contexto אָדָם funciona de forma genérica/colectiva, no restrictivamente masculina. «Los hombres» conserva la forma representativa del original y es idiomático en español bíblico para una pluralidad humana genérica.
- source_word: וַחֲמַס
  english_pob_choice: and violence done to
  chosen_spanish: y la violencia hecha a
  alternatives_spanish:
  - y la violencia contra
  - y el atropello contra
  lexicon: HALOT
  rationale: חָמָס designa violencia, injusticia o atropello. «Hecha a» resuelve la elipsis del hebreo y deja claro que la violencia recae sobre los objetos enumerados.
- source_word: אֶרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: En este juicio, אֶרֶץ apunta al ámbito devastado por la violencia; «tierra» mantiene la amplitud del término y suena natural en español bíblico.
- source_word: קִרְיָה
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - el poblado
  - la urbe
  lexicon: HALOT
  rationale: קִרְיָה se refiere a una ciudad o asentamiento urbano; «ciudad» es la equivalencia más directa y clara.
- source_word: וְכָל יֹשְׁבֵי בָהּ
  english_pob_choice: and to all who dwell in it
  chosen_spanish: y a todos los que habitan en ella
  alternatives_spanish:
  - y a todos sus habitantes
  - y a cuantos moran en ella
  lexicon: HALOT
  rationale: La construcción participial se conserva con un verbo de residencia/habitación. «Habitan» mantiene la fuerza verbal del hebreo y el referente femenino de la ciudad/tierra implícita en «ella».
theological_decisions:
- issue: Valor genérico de אָדָם en una expresión de sangre humana
  english_pob_reading: human blood
  chosen_spanish_reading: la sangre de los hombres
  alternative_spanish_readings:
  - la sangre humana
  - la sangre del ser humano
  rationale: El hebreo no restringe el término a varones concretos; expresa sangre humana de manera genérica. Se optó por una formulación que conserve la representación colectiva del original sin borrar la fuerza antropológica del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; tratamiento de términos genéricos de humanidad
- issue: Reversión justa del acto de despojar en el marco del oráculo de ay
  english_pob_reading: Because you have plundered many nations ... will plunder you
  chosen_spanish_reading: Porque tú has despojado a muchas naciones ... todo el resto de los pueblos te despojará
  alternative_spanish_readings:
  - Porque tú has saqueado a muchas naciones ... todo el resto de los pueblos te saqueará
  - Porque tú has despojado a muchas naciones ... todo lo que resta de los pueblos te despojará
  rationale: 'El versículo presenta una retribución medida: el despojador será despojado. «Despojado/despojará» conserva esa simetría verbal y el tono jurídico-profético del hebreo.'
  doctrine_reference: Contexto profético de retribución en Habacuc 2
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió «human blood» por naturalidad, pero en español se preserva la tensión entre literalidad y fluidez con una forma genérica («los hombres») que sigue el valor representativo de אָדָם. También se mantuvo la simetría de despojo entre el primer y segundo miembro del versículo.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto no requería aquí el tetragrámaton; este versículo no lo contiene.
  - Se prefirió «despojado/despojará» para conservar el paralelismo verbal del hebreo.
  - «Tierra» y «ciudad» reflejan el encadenamiento de objetos devastados en el original.
  - El pronombre femenino «ella» concuerda con «la ciudad» como referente implícito, sin añadir contenido nuevo.
