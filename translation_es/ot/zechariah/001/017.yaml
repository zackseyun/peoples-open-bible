    rationale: La nota explica la alternativa para תְּפוּצֶינָה ... מִטּוֹב («rebosarán de prosperidad»), no para todo el versículo. Según las reglas del proyecto, el marcador debe aparecer en la palabra o frase relevante.
  - severity: low
    issue: La repetición de «otra vez» en todas las cláusulas es algo pesada en español.
    rationale: Aunque fiel a עוֹד, «de nuevo» suena más natural y mantiene la misma fuerza de restauración. Es una mejora estilística menor, no un error de sentido.
  revised_spanish_text: 'Clama de nuevo, diciendo: «Así dice Yahvé de los ejércitos: Mis ciudades de nuevo rebosarán[a] de prosperidad, y Yahvé de nuevo consolará a Sion, y de nuevo escogerá a Jerusalén.»'
  revised_footnotes:
