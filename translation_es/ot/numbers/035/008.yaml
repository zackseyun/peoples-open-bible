    text: Hebrew literally, 'from the much you shall increase, and from the little you shall reduce'; the sense is proportional allocation from larger and smaller tribal inheritances.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites' for 'the sons of Israel.' The main text preserves the formally masculine Hebrew expression while conveying the covenant people as a whole.
    reason: lexical_alternative
