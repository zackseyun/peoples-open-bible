translation:
  language: es
  text: Todo el oro que fue usado para la obra, en toda la obra del santuario—el oro de la ofrenda mecida[b]—fue veintinueve talentos y setecientos treinta siclos, según el siclo del santuario[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «conforme al siclo del santuario».
    reason: lexical_alternative
  - marker: b
    text: «Ofrenda mecida» traduce el término técnico hebreo para una ofrenda presentada ante Yahvé con un gesto ritual.
    reason: cultural_note
lexical_decisions:
- source_word: הֶעָשׂוּי
  english_pob_choice: that was used
  chosen_spanish: que fue usado
  alternatives_spanish:
  - que fue hecho
  - que fue trabajado
  lexicon: HALOT
  rationale: El participio pasivo aquí modifica al oro en relación con la labor de construcción. «Usado» comunica con naturalidad que ese oro sirvió para la obra, sin sugerir erróneamente que el oro fue fabricado.
- source_word: לַמְּלָאכָה
  english_pob_choice: for the work
  chosen_spanish: para la obra
  alternatives_spanish:
  - para el trabajo
  - para la labor
  lexicon: HALOT
  rationale: מְלָאכָה en este contexto tabernacular se refiere a la obra de construcción artesanal. «Obra» mantiene dignidad y claridad en español.
- source_word: בְּכֹל מְלֶאכֶת הַקֹּדֶשׁ
  english_pob_choice: in all the work of the sanctuary
  chosen_spanish: en toda la obra del santuario
  alternatives_spanish:
  - en toda la obra santa
  - en todo el trabajo del lugar santo
  lexicon: HALOT
  rationale: La frase resume la totalidad de la construcción sagrada. «Santuario» es más claro que «lugar santo» en este contexto y preserva la referencia cultual concreta.
- source_word: זְהַב הַתְּנוּפָה
  english_pob_choice: the gold of the wave offering
  chosen_spanish: el oro de la ofrenda mecida
  alternatives_spanish:
  - el oro de la ofrenda alzada
  - el oro ofrecido meciéndolo
  lexicon: HALOT
  rationale: Se conserva el término técnico de la ofrenda mecida, que refleja el valor cultual del hebreo תְּנוּפָה. «Mecida» reproduce mejor la expresión establecida en español bíblico descriptivo sin perder el trasfondo ritual.
- source_word: תֵּשַׁע וְעֶשְׂרִים כִּכָּר
  english_pob_choice: twenty-nine talents
  chosen_spanish: veintinueve talentos
  alternatives_spanish:
  - nueve y veinte talentos
  lexicon: HALOT
  rationale: El orden numérico hebreo se vierte en español moderno de forma idiomática. «Talentos» conserva la unidad de peso tradicional.
- source_word: וּשְׁבַע מֵאוֹת וּשְׁלֹשִׁים שֶׁקֶל
  english_pob_choice: and seven hundred thirty shekels
  chosen_spanish: y setecientos treinta siclos
  alternatives_spanish:
  - y setecientos y treinta siclos
  lexicon: HALOT
  rationale: La cifra se traduce de manera directa y fluida. «Siclos» es el equivalente español habitual para שֶׁקֶל como unidad de peso.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: according to the sanctuary shekel
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - conforme al siclo del santuario
  - según el siclo sagrado
  lexicon: HALOT
  rationale: El hebreo indica la norma de peso usada. «Según» reproduce bien la idea de medida conforme a un patrón; «del santuario» mantiene la referencia cultual del estándar.
theological_decisions:
- issue: Naturaleza de הַקֹּדֶשׁ en la expresión final
  english_pob_reading: the sanctuary shekel
  chosen_spanish_reading: el siclo del santuario
  alternative_spanish_readings:
  - el siclo santo
  - el siclo sagrado
  rationale: El contexto no describe una cualidad moral abstracta del siclo, sino un patrón oficial de peso ligado al culto. «Del santuario» conserva esa referencia institucional y evita moralizar el término.
  doctrine_reference: Éxodo 30:13; Levítico 27:25
- issue: Sentido de זְהַב הַתְּנוּפָה
  english_pob_reading: the gold of the wave offering
  chosen_spanish_reading: el oro de la ofrenda mecida
  alternative_spanish_readings:
  - el oro de la ofrenda presentada
  - el oro de la ofrenda alzada
  rationale: Se mantiene la categoría sacrificial técnica. La traducción no borra el matiz ritual de presentación ante Yahvé, aunque el movimiento exacto no se explicite en el verso.
  doctrine_reference: Éxodo 29:24; Números 8:11
- issue: Referencia del sustantivo abstracto מְלָאכָה
  english_pob_reading: work
  chosen_spanish_reading: obra
  alternative_spanish_readings:
  - trabajo
  - labor
  rationale: En el contexto de la construcción del tabernáculo, «obra» comunica mejor la tarea artesanal y el proyecto sagrado sin sonar demasiado general.
  doctrine_reference: Éxodo 36–38
translation_notes:
  revision_awareness: El texto hebreo y el inglés auditado concuerdan sustancialmente. Se siguió la revisión inglesa más reciente en la cláusula final mediante una expresión española natural equivalente a «according to the sanctuary shekel», sin desplazar el sentido técnico del estándar de peso.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en la terminología del proyecto, aunque este versículo no lo nombra explícitamente.
  - «Siclo» se usó de manera consistente como unidad de peso; no se alternó con «shékel» ni con transliteración.
  - «Ofrenda mecida» se empleó como término técnico estable para תְּנוּפָה.
  - La puntuación con raya reproduce la segmentación explicativa del inglés POB y ayuda a separar el inciso cultual.
