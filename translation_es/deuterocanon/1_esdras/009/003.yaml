- from: Y se hizo una proclamación en toda Judea y Jerusalén para todos los que procedían de la cautividad[a], para reunirse en Jerusalén.
  to: Y se hizo una proclamación en toda Judea y Jerusalén para todos los que venían del cautiverio[a], para reunirse en Jerusalén.
  rationale: Se ajustó «procedían de la cautividad» a «venían del cautiverio» para conservar el sentido de ἐκ τῆς αἰχμαλωσίας en un español más natural y legible. También se corrigió la nota al pie, eliminando la corrupción tipográfica y manteniendo las alternativas documentadas en el rastro inglés.
