    issue: «se acostó con sus padres» suena ambiguo y poco idiomático como fórmula de muerte regia
    rationale: El hebreo שׁכב עם־אבתיו es una fórmula estable de fallecimiento real. En español bíblico, «durmió con sus padres» conserva mejor esa convención; «se acostó» puede sugerir simplemente recostarse y no comunica bien la fórmula tradicional.
  - severity: low
    issue: La nota a repite la lectura principal en vez de ofrecer una alternativa útil
    rationale: Si el texto revisado usa «durmió», la nota puede conservar la alternativa más literal «se acostó» o explicar el giro. La configuración actual no añade valor como nota alternativa.
