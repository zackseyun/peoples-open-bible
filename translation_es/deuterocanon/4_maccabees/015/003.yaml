translation:
  language: es
  text: amó más la piedad[a], que salva para vida eterna conforme a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la piedad, la que salva para vida eterna conforme a Dios», con κατὰ θεόν expresando conformidad con la voluntad o el estándar de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐσέβειαν
  english_pob_choice: piety
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción reverente
  - piedad para con Dios
  - religiosidad
  lexicon: BDAG
  rationale: En español, «piedad» comunica mejor la virtud cultual y ética de εὐσέβεια que «godliness» en inglés; mantiene el valor técnico de devoción reverente a Dios expresada en conducta fiel.
- source_word: μᾶλλον
  english_pob_choice: more
  chosen_spanish: más
  alternatives_spanish:
  - preferentemente
  - más bien
  - en mayor medida
  lexicon: LSJ
  rationale: El comparativo se conserva de forma directa con «más», manteniendo la idea de preferencia sin introducir una glosa explicativa.
- source_word: ἠγάπησεν
  english_pob_choice: loved
  chosen_spanish: amó
  alternatives_spanish:
  - amaba
  - quiso
  - estimó
  lexicon: BDAG
  rationale: «Amó» reproduce el verbo con naturalidad y fuerza en español; la comparación ya está expresada por μᾶλλον, por lo que no conviene cargar el verbo con «prefirió».
- source_word: τὴν σώζουσαν
  english_pob_choice: which saves
  chosen_spanish: la que salva
  alternatives_spanish:
  - que salva
  - la salvadora
  - la que trae salvación
  lexicon: BDAG
  rationale: 'El participio atributivo se vierte de manera directa como una relativa sustantivada: «la que salva». Así se preserva la relación estrecha con «la piedad» sin forzar una paráfrasis.'
- source_word: εἰς αἰώνιον ζωὴν
  english_pob_choice: unto eternal life
  chosen_spanish: para vida eterna
  alternatives_spanish:
  - hacia vida eterna
  - hasta vida eterna
  - para la vida eterna
  lexicon: BDAG
  rationale: «Para vida eterna» expresa bien la meta o resultado de εἰς y suena natural en español. Se evita una forma demasiado literal que sonaría forzada.
- source_word: κατὰ θεόν
  english_pob_choice: according to God
  chosen_spanish: conforme a Dios
  alternatives_spanish:
  - según Dios
  - de acuerdo con Dios
  - en conformidad con Dios
  lexicon: LSJ
  rationale: La frase es comprimida y mantiene ambigüedad; «conforme a Dios» conserva la idea de conformidad con el estándar o voluntad divina sin resolverla demasiado. No se sustituye por una expresión doctrinal más explícita.
theological_decisions:
- issue: Sentido de κατὰ θεόν en relación con la piedad que salva
  english_pob_reading: Render literally as 'according to God' without resolving whether it means 'in accordance with God's will/standard' or a similar nuance.
  chosen_spanish_reading: «conforme a Dios» mantiene abierta la posibilidad de que signifique conformidad con la voluntad, el criterio o la aprobación de Dios.
  alternative_spanish_readings:
  - según Dios
  - en conformidad con Dios
  - como Dios quiere
  rationale: La expresión no exige resolver una formulación doctrinal cerrada. El español elegido conserva la tensión semántica del griego y evita convertir la frase en una explicación interpretativa.
  doctrine_reference: DOCTRINE.md §3 Preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail al reflejar el participio con una relativa directa («la que salva») y la meta escatológica con una forma cercana a εἰς; en español se optó por «para» por naturalidad y claridad, manteniendo la relación de finalidad sin sobreexplicar.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, de acuerdo con el estándar del proyecto.
  - Se evita «Cristo» o terminología eclesial no presente en el texto fuente.
  - «Piedad» se mantiene como término técnico coherente con el uso del proyecto para εὐσέβεια.
  - La nota al pie conserva una alternativa de traducción significativa para κατὰ θεόν sin resolver la ambigüedad.
