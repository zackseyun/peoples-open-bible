translation:
  language: es
  text: Avanzaron[a] en formación de batalla, teniendo delante de ellos al aliado venido del cielo, porque el Señor les había mostrado misericordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Avanzaron, equipados para la batalla, con el aliado venido del cielo yendo delante de ellos». La construcción griega inicial es condensada y puede entenderse de manera ligeramente distinta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ πρόηγον
  english_pob_choice: They advanced
  chosen_spanish: Avanzaron
  alternatives_spanish:
  - Se adelantaron
  - Siguieron adelante
  lexicon: LSJ
  rationale: La forma griega es compacta y describe el avance del grupo. «Avanzaron» conserva el sentido de movimiento hacia adelante sin añadir elementos que el griego no exige.
- source_word: ἐν διασκευῇ
  english_pob_choice: in battle formation
  chosen_spanish: en formación de batalla
  alternatives_spanish:
  - preparados para la batalla
  - armados
  - en orden de combate
  lexicon: LSJ
  rationale: La expresión señala disposición/equipamiento militar. «En formación de batalla» comunica de manera natural tanto la preparación como el orden militar.
- source_word: σύμμαχον
  english_pob_choice: ally
  chosen_spanish: aliado
  alternatives_spanish:
  - ayudante
  - defensor
  - auxiliar
  lexicon: LSJ
  rationale: 'El término tiene fuerza militar/política: alguien que lucha junto a otro. «Aliado» preserva mejor ese matiz que «ayudante».'
- source_word: ἀπʼ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - del cielo
  - del firmamento
  lexicon: LSJ
  rationale: En español bíblico «del cielo» es la forma más clara y reverente para οὐρανός en este contexto religioso-militar.
- source_word: ἐλεήσαντος
  english_pob_choice: had shown ... mercy
  chosen_spanish: les había mostrado misericordia
  alternatives_spanish:
  - se había compadecido de ellos
  - les había tenido misericordia
  lexicon: BDAG
  rationale: El participio aoristo explica el fundamento de su avance. «Misericordia» mantiene el motivo de compasión sin perder naturalidad en español.
- source_word: τοῦ κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor
  - el Dueño
  lexicon: LSJ
  rationale: En este contexto judío reverente, κύριος se traduce como «el Señor», forma estable y reconocible en español para Dios.
theological_decisions:
- issue: Identidad del «aliado del cielo»
  english_pob_reading: left implicit as 'the ally from heaven'
  chosen_spanish_reading: se mantiene implícito como «el aliado del cielo»
  alternative_spanish_readings:
  - un ángel que los ayudaba
  - la ayuda directa de Dios
  rationale: El texto griego no identifica explícitamente a ese aliado celestial. La traducción conserva esa apertura teológica en vez de especificarlo.
  doctrine_reference: Preservar la tensión textual sin resolverla prematuramente.
translation_notes:
  revision_awareness: La base inglesa revisó «went forward» a «advanced» por mayor naturalidad formal; aquí se adoptó «Avanzaron» para reflejar ese mismo ajuste de estilo, manteniendo el resto de la estructura y la ambigüedad del «aliado del cielo».
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος por coherencia con el uso reverente en contexto bíblico judío.
  - Se eligió «aliado» para σύμμαχον en vez de «ayudante» para conservar el matiz militar del término.
  - «Del cielo» se usa de forma idiomática y clara para οὐρανοῦ en español bíblico.
  - La nota al pie marca la posible constricción sintáctica del inicio griego sin imponer una reinterpretación.
