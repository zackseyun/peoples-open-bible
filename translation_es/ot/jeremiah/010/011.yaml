review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del arameo: fórmula introductoria, ''los dioses'', la cláusula relativa, el contraste creador/no creador y el juicio de perecer. Sin embargo, hay dos fallas importantes frente al expediente auditado: (1) תֵּאמְרוּן es 2mp (''dirán'' cambia la persona y debilita la instrucción directa); (2) falta la nota teológica auditada sobre ''los dioses'' como referencia amplia a ídolos, deidades supuestas o ambos. También conviene ajustar ''a ellos'' a ''les'' para español más natural y mover la nota [a] a ''perecerán'', ya que esa nota trata del verbo יֵאבַדוּ, no de ''los dioses''.'
  spanish_quality_summary: El español es comprensible, pero 'Así dirán a ellos' suena poco natural y gramaticalmente menos adecuado que 'Así les dirán' o mejor 'Así les dirán ustedes' / 'Así les diréis'. Para un registro neutro y eclesial legible, 'Así les dirán' mantiene claridad, pero como el verbo debe conservar la segunda persona, la mejor reparación es 'Así les dirán ustedes' o 'Así les diréis'. Dado el objetivo panhispánico y la naturalidad latinoamericana, 'Así les dirán ustedes' preserva la persona sin sonar arcaico. También es preferible puntuación española con punto final dentro de las comillas.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Los dioses', 'los cielos y la tierra' y 'perecerán' están bien orientados. No intervienen Yahvé/Mesías/etc. La nota léxica debe anclarse en 'perecerán', y debe añadirse la nota de amplitud referencial de 'los dioses' conforme al inglés POB.
  issues:
  - severity: high
    issue: Cambio de persona verbal en תֵּאמְרוּן
    rationale: El arameo está en segunda persona plural ('ustedes/vosotros dirán/diréis'). El borrador usa 'dirán', tercera persona plural, alterando la instrucción directa del texto fuente.
  - severity: medium
    issue: Falta la nota auditada sobre el alcance de 'los dioses'
    rationale: El inglés POB preserva explícitamente la amplitud polémica de אֱלָהַיָּא. Omitirla pierde una decisión teológica/documental ya auditada.
  - severity: medium
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota existente explica el verbo יֵאבַדוּ, pero está colocada sobre 'Los dioses' en vez de sobre 'perecerán' o la frase verbal pertinente.
  - severity: low
    issue: 'Redacción española poco natural: ''Así dirán a ellos'''
    rationale: En español natural se espera pronombre dativo 'les'. Además, conviene explicitar la segunda persona de modo idiomático en registro latinoamericano amplio.
  revised_spanish_text: 'Así les dirán ustedes: “Los dioses[b] que no hicieron los cielos y la tierra perecerán[a] de la tierra y de debajo de los cielos.”'
  revised_footnotes:
