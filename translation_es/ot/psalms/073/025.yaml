translation:
  language: es
  text: ¿A quién tengo yo en el cielo, sino a ti? Y aparte de ti[a], no deseo nada en la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Y contigo no he deseado nada en la tierra». El hebreo es elíptico; el sentido es que, aparte de Dios, el salmista no desea nada en la tierra.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִי
  english_pob_choice: Whom
  chosen_spanish: ¿A quién
  alternatives_spanish:
  - ¿Quién
  lexicon: HALOT
  rationale: El hebreo introduce una pregunta retórica con valor de objeto; en español, «¿A quién» conserva mejor esa relación que un simple «¿Quién».
- source_word: לִי
  english_pob_choice: have I
  chosen_spanish: tengo yo
  alternatives_spanish:
  - hay para mí
  - me pertenece
  lexicon: HALOT
  rationale: La construcción hebrea expresa posesión/existencia en tono idiomático. «Tengo yo» reproduce bien el sentido de posesión relacional sin volverla rígida.
- source_word: בַשָּׁמָיִם
  english_pob_choice: in heaven
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  lexicon: HALOT
  rationale: El plural hebreo funciona de modo colectivo; «los cielos» refleja mejor la forma del original, mientras que «en el cielo» sería una alternativa más idiomática en singular.
- source_word: וְעִמְּךָ
  english_pob_choice: And besides you
  chosen_spanish: Y fuera de ti
  alternatives_spanish:
  - Y con todo, fuera de ti
  - Y aparte de ti
  lexicon: HALOT
  rationale: La forma literal es «y contigo», pero el sentido poético es de exclusión/exclusividad. «Fuera de ti» expresa esa fuerza mejor en español, manteniendo la tensión semítica del giro.
- source_word: לֹא
  english_pob_choice: nothing
  chosen_spanish: no ... nada
  alternatives_spanish:
  - ninguna cosa
  - nada en absoluto
  lexicon: HALOT
  rationale: La negación hebrea con el verbo produce una negación total del deseo. En español, «no deseo nada» conserva esa fuerza sin añadir material ajeno.
- source_word: חָפַצְתִּי
  english_pob_choice: I desire
  chosen_spanish: deseo
  alternatives_spanish:
  - me deleito en
  - tengo complacencia en
  - he deseado
  lexicon: HALOT
  rationale: El verbo puede expresar deseo, deleite o complacencia. Aquí, en paralelo con la exclusividad de Dios, «deseo» comunica con naturalidad la disposición volitiva presente.
- source_word: בָאָרֶץ
  english_pob_choice: on earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra de aquí abajo
  lexicon: HALOT
  rationale: «En la tierra» mantiene el contraste cielo/tierra del versículo y es una equivalencia clara y natural en español.
theological_decisions:
- issue: 'Sentido del segundo miembro: exclusividad del deseo'
  english_pob_reading: exclusive desire for God over all earthly things
  chosen_spanish_reading: exclusividad del deseo por Dios por encima de todo lo terrenal
  alternative_spanish_readings:
  - No deseo nada aparte de ti en la tierra
  - Con ti no deseo nada en la tierra
  rationale: El hebreo es elíptico; la traducción debe preservar la afirmación devocional sin resolver en exceso la sintaxis. «Y fuera de ti, no deseo nada en la tierra» comunica la exclusividad sin suavizar la tensión poética del texto.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica y poética en vez de resolverla)
- issue: Relación cielo/tierra
  english_pob_reading: heaven/earth contrast
  chosen_spanish_reading: contraste entre los cielos y la tierra
  alternative_spanish_readings:
  - cielo/tierra
  - realidad celestial/terrenal
  rationale: El hebreo contrapone esferas cósmicas; «los cielos» y «la tierra» conservan ese paralelismo y evitan una interpretación demasiado abstracta.
  doctrine_reference: Principio de paralelismo poético del texto hebreo
translation_notes:
  revision_awareness: 'El pasaje coincide ampliamente con la trayectoria de revisión más reciente: no hay cambios aplicados en el audit trail inglés y el consenso crítico es de alta concordancia. La redacción española sigue esa lectura estable, manteniendo la elipsis del segundo hemistiquio y la exclusividad del deseo por Dios.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton ni un equivalente directo.
  - Se eligió «los cielos» para reflejar el plural hebreo, aun cuando «el cielo» sería más idiomático; se documenta la alternativa.
  - Se mantuvo «no deseo nada» para expresar la negación total sin añadir palabras explicativas al cuerpo del texto.
  - La nota conserva la alternativa literal «contigo» porque el hebreo dice «y contigo», aunque el sentido contextual sea «fuera de ti» o «aparte de ti».
