translation:
  language: es
  text: Todo el que sea hallado será traspasado, y todo el que sea atrapado[a] caerá a espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sea barrido» para «sea atrapado». El participio hebreo de ספה puede tener un sentido más amplio que la simple captura; en este contexto de juicio militar puede referirse a quien queda envuelto en la destrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: everyone
  chosen_spanish: todo el que
  alternatives_spanish:
  - cada uno que
  - quienquiera que
  lexicon: HALOT
  rationale: El hebreo usa כָּל distributivo con participios, de modo que la referencia es a cada individuo en vista. «Todo el que» conserva ese valor distributivo en español natural y evita una formulación demasiado abstracta.
- source_word: הַנִּמְצָא
  english_pob_choice: who is found
  chosen_spanish: sea hallado
  alternatives_spanish:
  - sea encontrado
  - sea descubierto
  lexicon: HALOT
  rationale: 'El participio niphal de מצא tiene sentido pasivo/substantivo: «el que es hallado». En español, «ser hallado» mantiene la pasividad y suena más digno que «encontrado» en este contexto de juicio.'
- source_word: יִדָּקֵר
  english_pob_choice: will be pierced through
  chosen_spanish: será traspasado
  alternatives_spanish:
  - será atravesado
  - será apuñalado
  lexicon: HALOT
  rationale: El verbo expresa ser atravesado o herido de arma blanca. «Traspasado» conserva la fuerza violenta sin volver la frase coloquial ni limitarla innecesariamente a una sola forma de arma.
- source_word: הַנִּסְפֶּה
  english_pob_choice: who is caught
  chosen_spanish: sea atrapado
  alternatives_spanish:
  - sea barrido
  - sea arrastrado
  - sea reunido
  lexicon: HALOT
  rationale: El participio pasivo de ספה admite un rango semántico más amplio que «capturado». En el contexto bélico de juicio, «atrapado» transmite que alguien queda envuelto/cogido en la caída de la ciudad, sin cerrar indebidamente la ambigüedad del hebreo.
- source_word: יִפּוֹל
  english_pob_choice: will fall
  chosen_spanish: caerá
  alternatives_spanish:
  - será derribado
  - caerá muerto
  lexicon: HALOT
  rationale: El imperfecto de נפל en este contexto de guerra se traduce naturalmente por «caerá». La palabra deja que el complemento «a espada» especifique el modo de muerte.
- source_word: בֶּחָרֶב
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - con espada
  lexicon: HALOT
  rationale: En español bíblico y contemporáneo, «caer a espada» es una construcción idiomática clara para muerte en guerra. Mantiene el valor instrumental del hebreo sin sonar forzado.
theological_decisions:
- issue: Alcance distributivo del juicio
  english_pob_reading: Everyone who is found... and everyone who is caught...
  chosen_spanish_reading: Todo el que sea hallado... y todo el que sea atrapado...
  alternative_spanish_readings:
  - Todos los que sean hallados... y todos los que sean atrapados...
  - Quien sea hallado... y quien sea atrapado...
  rationale: El hebreo usa formas distributivas que presentan a cada persona individualmente bajo el juicio. «Todo el que» conserva ese efecto universal e individual a la vez, sin convertirlo en un total abstracto.
  doctrine_reference: Isaías 13:15; juicio divino sobre Babilonia
- issue: Ambigüedad de ספה en contexto de guerra
  english_pob_reading: who is caught
  chosen_spanish_reading: sea atrapado
  alternative_spanish_readings:
  - sea barrido
  - sea arrastrado
  rationale: La POB inglesa retiene una lectura contextual («caught») pero documenta el rango alternativo («swept away»). En español, «atrapado» reproduce la idea de quedar involucrado o preso en la catástrofe, mientras deja abierta la posibilidad semántica del verbo hebreo.
  doctrine_reference: Isaías 13:15; lenguaje profético de destrucción
- issue: Muerte por arma
  english_pob_reading: will be pierced through
  chosen_spanish_reading: será traspasado
  alternative_spanish_readings:
  - será atravesado
  - será herido de lanza
  rationale: El hebreo enfatiza una herida penetrante por arma. «Traspasado» comunica bien esa violencia sin añadir un arma específica que el texto no nombra.
  doctrine_reference: Isaías 13:15; imagen militar de juicio
translation_notes:
  revision_awareness: Se revisó el pasaje contra el texto hebreo consonántico-vocalizado de WLC y el aparato auditado en inglés. La traducción inglesa ya había fijado una lectura contextual para ספה («caught») con nota de alternativa («swept away»); la versión española conserva esa decisión principal y documenta la alternativa semántica sin suavizar el juicio ni perder la ambigüedad lexical del hebreo.
  spanish_consistency_notes:
  - Se mantuvo el estilo distributivo con «todo el que» para reflejar כָּל + participio.
  - Se evitó «SEÑOR»/«Yahvé» porque el versículo no contiene el tetragrámaton.
  - Se optó por «a espada» como giro bíblico natural en español para בֶּחָרֶב.
  - No se introdujo terminología eclesiástica o interpretativa ajena al hebreo; la frase sigue el paralelismo del original.
