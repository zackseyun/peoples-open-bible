translation:
  language: es
  text: También, sin conocimiento, el deseo[a] no es bueno, y el que se apresura con sus pies peca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Una persona sin conocimiento no es buena»; la frase hebrea con נֶפֶשׁ puede entenderse de más de una manera, pero aquí se toma idiomáticamente como «deseo» o «apetito».'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Also
  chosen_spanish: También
  alternatives_spanish:
  - Además
  - Asimismo
  lexicon: HALOT
  rationale: Mantiene la fuerza aditiva del hebreo con una expresión natural en español y adecuada al tono sapiencial.
- source_word: בְּלֹא דַעַת
  english_pob_choice: without knowledge
  chosen_spanish: sin conocimiento
  alternatives_spanish:
  - sin entendimiento
  - sin discernimiento
  lexicon: HALOT
  rationale: Conserva de forma directa la construcción preposicional y el sentido básico de דַעַת como conocimiento, sin estrecharlo a una sola matiz interpretativa.
- source_word: נֶפֶשׁ
  english_pob_choice: desire
  chosen_spanish: el deseo
  alternatives_spanish:
  - el alma
  - el apetito
  - la persona
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ funciona idiomáticamente como impulso interior; 'el deseo' comunica mejor en español la fuerza del proverbio que 'alma', sin perder la tensión lexical documentada.
- source_word: לֹא טוֹב
  english_pob_choice: is not good
  chosen_spanish: no es bueno
  alternatives_spanish:
  - no es beneficioso
  - no es conveniente
  lexicon: HALOT
  rationale: Reproduce la sencillez proverbial del hebreo con una cópula normal en español.
- source_word: וְאָץ
  english_pob_choice: whoever hurries
  chosen_spanish: el que se apresura
  alternatives_spanish:
  - el que corre
  - quien se da prisa
  lexicon: HALOT
  rationale: La forma participial expresa conducta característica; 'el que se apresura' conserva el valor general y la advertencia sapiencial.
- source_word: בְּרַגְלַיִם
  english_pob_choice: with his feet
  chosen_spanish: con sus pies
  alternatives_spanish:
  - con los pies
  - en sus pasos
  lexicon: HALOT
  rationale: Mantiene la imagen corporal concreta del hebreo, evitando abstraerla a una formulación menos vívida.
- source_word: חוֹטֵא
  english_pob_choice: sins
  chosen_spanish: peca
  alternatives_spanish:
  - comete pecado
  - hace mal
  lexicon: HALOT
  rationale: '''Peca'' comunica el valor moral del participio con naturalidad en español y preserva la gravedad del proverbio.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés al reflejar primero la circunstancia de carecer de conocimiento y luego la valoración del deseo; se conservó la lectura idiomática de נֶפֶשׁ como impulso interior y la imagen corporal de «con sus pies» en la segunda cláusula.
  spanish_consistency_notes:
  - Se usó 'conocimiento' para דַעַת y no 'entendimiento', en línea con la decisión inglesa auditable.
  - Se prefirió 'el deseo' para נֶפֶשׁ porque el contexto sapiencial permite una lectura idiomática; la nota mantiene la alternativa personal.
  - Se conservó el paralelismo sencillo del proverbio sin introducir explicaciones interpretativas en el cuerpo del texto.
  - '''Peca'' traduce el participio hebreo de manera directa y evita suavizar el peso moral del enunciado.'
