  rationale: Se reemplazó el calco poco natural «haré subir sanidad» por «restauraré la salud», dejando el literal hebreo en nota; se actualizó «no hay quien la busque» a «nadie se preocupa por ella» para reflejar la decisión contextual final del POB inglés; y se eliminó la nota explicativa innecesaria sobre «Sión», conservando solo notas que preservan alternativas significativas del hebreo.
