base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/038/010.yaml
  text: Then the king commanded Ebed-melech the Cushite[a], saying, “Take with you from here thirty men[b], and bring Jeremiah the prophet up from the cistern before he dies.”
  footnotes:
  - marker: a
    text: Or 'the Ethiopian.' The Hebrew says 'the Cushite,' referring to a man from Cush.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the pit' or, in older English tradition, 'from the dungeon.' The Hebrew bor can denote a pit or cistern; here 'cistern' fits the narrative setting.
    reason: lexical_alternative
