revisions:
- from: Entonces los levitas se pusieron con los instrumentos de David[a], y los sacerdotes con las trompetas[b].
  to: Entonces los levitas tomaron su puesto con los instrumentos de David[a], y los sacerdotes con las trompetas[b].
  rationale: Se reemplaza «se pusieron» por «tomaron su puesto» para reflejar mejor el sentido de עמד en contexto narrativo-cultual. Se mantiene el resto del texto, que es fiel y natural. La nota a se simplifica para evitar una alternativa redundante y conservar la explicación semántica realmente útil.
