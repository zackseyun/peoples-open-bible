base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/022/021.yaml
  text: I spoke to you in your prosperity[a], but you said, ‘I will not listen.’ This has been your way from your youth[b], for you have not listened to my voice.
  footnotes:
