translation:
  language: es
  text: 'Y sabrán todos los árboles del campo que yo soy Yahvé: he abatido al árbol alto, he elevado al árbol bajo, he secado al árbol verde[a] y he hecho florecer[b] al árbol seco. Yo soy Yahvé; he hablado, y lo he hecho.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el árbol fresco» / «el árbol húmedo» para לָח. El adjetivo hebreo denota literalmente frescura o humedad.
    reason: lexical_alternative
  - marker: b
    text: O «he hecho que el árbol seco brote/florezca». La forma hebrea puede entenderse también como «hacer brotar» además de «hacer florecer».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  english_pob_choice: shall know
  chosen_spanish: conocerán
  alternatives_spanish:
  - sabrán
  - llegarán a saber
  lexicon: HALOT
  rationale: El perfecto profético con waw consecutivo expresa un resultado seguro en el futuro. «Conocerán» conserva el valor resultativo y la solemnidad profética sin volverlo mecánico.
- source_word: כָּל עֲצֵי הַשָּׂדֶה
  english_pob_choice: all the trees of the field
  chosen_spanish: todos los árboles del campo
  alternatives_spanish:
  - todos los árboles del campo abierto
  - cada árbol del campo
  lexicon: HALOT
  rationale: La construcción se traduce de forma directa y natural. «Árboles del campo» preserva la imagen y el paralelismo del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El proyecto español usa «Yahvé» como equivalente normal del nombre divino, siguiendo el principio de preservar el Tetragrámaton en el texto principal.
- source_word: הִשְׁפַּלְתִּי
  english_pob_choice: I have brought low
  chosen_spanish: he abatido
  alternatives_spanish:
  - he humillado
  - he hecho bajar
  lexicon: HALOT
  rationale: La Hifil expresa causar que algo alto quede bajo. «He abatido» comunica bien el movimiento de descenso sin añadir una connotación moral que «humillado» podría sugerir.
- source_word: עֵץ גָּבֹהַ
  english_pob_choice: the high tree
  chosen_spanish: el árbol alto
  alternatives_spanish:
  - el árbol elevado
  - el árbol encumbrado
  lexicon: HALOT
  rationale: «Alto» reproduce el contraste del hebreo y empareja de manera natural con «árbol bajo». En español suena más directo que «encumbrado», que introduce una interpretación más marcada.
- source_word: הִגְבַּהְתִּי
  english_pob_choice: I have raised up
  chosen_spanish: he elevado
  alternatives_spanish:
  - he levantado
  - he exaltado
  lexicon: HALOT
  rationale: La forma causativa de גבה se expresa con «elevar». Mantiene el paralelismo con «he abatido» y evita una lectura demasiado teológica de «exaltado».
- source_word: עֵץ שָׁפָל
  english_pob_choice: the low tree
  chosen_spanish: el árbol bajo
  alternatives_spanish:
  - el árbol humilde
  - el árbol abatido
  lexicon: HALOT
  rationale: «Bajo» conserva el contraste espacial/posicional con «alto» y sigue la imagen arbórea sin introducir matices morales ajenos al hebreo.
- source_word: הוֹבַשְׁתִּי
  english_pob_choice: I have dried up
  chosen_spanish: he secado
  alternatives_spanish:
  - he hecho secar
  - he marchitado
  lexicon: HALOT
  rationale: La Hifil de יבש indica causar sequedad. «He secado» es la forma más natural y directa en español.
- source_word: עֵץ לָח
  english_pob_choice: the green tree
  chosen_spanish: el árbol verde
  alternatives_spanish:
  - el árbol fresco
  - el árbol húmedo
  lexicon: HALOT
  rationale: Aunque לָח denota frescura o humedad, en español «árbol verde» expresa mejor la imagen de vitalidad y mantiene el contraste con «árbol seco».
- source_word: וְהִפְרַחְתִּי
  english_pob_choice: I have made ... flourish
  chosen_spanish: he hecho florecer
  alternatives_spanish:
  - he hecho brotar
  - he causado que florezca
  lexicon: HALOT
  rationale: La Hifil de פרח puede significar hacer brotar/florecer. «He hecho florecer» conserva la idea de reactivación y es idiomático en español.
- source_word: עֵץ יָבֵשׁ
  english_pob_choice: the dry tree
  chosen_spanish: el árbol seco
  alternatives_spanish:
  - el árbol marchito
  - el árbol árido
  lexicon: HALOT
  rationale: «Seco» es el equivalente directo y forma el contraste esperado con «árbol verde».
- source_word: דִּבַּרְתִּי וְעָשִׂיתִי
  english_pob_choice: I have spoken, and I have done it
  chosen_spanish: he hablado, y lo he hecho
  alternatives_spanish:
  - he hablado, y lo he cumplido
  - he dicho, y lo he hecho
  lexicon: HALOT
  rationale: La pareja verbal subraya la eficacia de la palabra divina. «Lo he hecho» es breve y mantiene el objeto implícito con claridad natural en español.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se preserva el nombre propio divino en la forma adoptada por la línea española del proyecto, evitando la sustitución por un título y manteniendo la transparencia respecto del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Metáfora de los árboles
  english_pob_reading: Preserve the arboreal metaphor without explicating political/theological referents in the main text.
  chosen_spanish_reading: Preservar la metáfora arbórea sin explicitar sus referentes en el texto principal.
  alternative_spanish_readings:
  - Interpretar explícitamente los árboles como reyes o naciones
  rationale: El hebreo presenta la imagen y deja que el contexto la explique. Traducirla así conserva la tensión literaria y no adelanta una explicación que el texto aquí no formula.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Preserve theological tension rather than resolve it; Original-language primacy over translation tradition'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del paso final auditado; se mantiene el acuerdo alto con la revisión y la elección de «Yahvé» para יְהוָה, junto con la metáfora arbórea sin explicitar.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto en español.
  - Se mantiene el paralelismo alto/bajo, verde/seco, abatido/elevado con vocabulario natural y simétrico.
  - Los verbos en perfecto compuesto («he...») reproducen el valor resultativo-propético del hebreo y armonizan con el tono solemne del verso.
