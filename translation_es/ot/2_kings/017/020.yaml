    text: 'Hebreo: «semilla/descendencia de Israel».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los entregó en mano de saqueadores».'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «de delante de él».'
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota léxica para que recaiga sobre «descendencia», que es el término explicado. También se mejoró la naturalidad del español con «en manos de saqueadores», manteniendo en nota la forma más cercana al hebreo. «Descendencia» sustituye a «linaje» porque representa de manera más transparente el valor de זרע y armoniza mejor con la evidencia y la nota del expediente inglés.
