translation:
  language: es
  text: Recuerden las obras de nuestros padres, que hicieron en sus generaciones, y reciban gran gloria y gloria eterna.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μνήσθητε
  english_pob_choice: Remember
  chosen_spanish: Acuérdense
  alternatives_spanish:
  - Recuerden
  - Tengan presente
  lexicon: BDAG
  rationale: El imperativo exhortativo pide un recordar activo. «Acuérdense» conserva el llamado directo y suena natural en español, sin suavizar la fuerza exhortativa.
- source_word: τῶν πατέρων ἡμῶν
  english_pob_choice: of our fathers
  chosen_spanish: de nuestros padres
  alternatives_spanish:
  - de nuestros antepasados
  - de nuestros padres y madres
  lexicon: BDAG
  rationale: El griego dice literalmente «de nuestros padres». Se mantiene ese término masculino y su resonancia bíblica, sin neutralizarlo a «antepasados».
- source_word: ἔργα
  english_pob_choice: deeds
  chosen_spanish: las obras
  alternatives_spanish:
  - los hechos
  - las acciones
  lexicon: BDAG
  rationale: En este contexto ἔργα apunta a acciones notables y ejemplares. «Obras» es una equivalencia natural en español bíblico y preserva la amplitud semántica de la palabra.
- source_word: ταῖς γενεαῖς αὐτῶν
  english_pob_choice: in their generations
  chosen_spanish: en sus generaciones
  alternatives_spanish:
  - en sus tiempos
  - a través de sus generaciones
  lexicon: BDAG
  rationale: La frase dativa tiene un giro idiomático. «En sus generaciones» sigue de cerca el griego y mantiene la referencia a los períodos sucesivos de su vida y testimonio.
- source_word: δέξασθε
  english_pob_choice: receive
  chosen_spanish: reciban
  alternatives_spanish:
  - obtengan
  - reciban para sí
  lexicon: BDAG
  rationale: «Reciban» traduce de manera directa el imperativo y conserva el sentido de llegar a poseer lo que sigue por vía de fidelidad y participación.
- source_word: δόξαν μεγάλην
  english_pob_choice: great glory
  chosen_spanish: gran gloria
  alternatives_spanish:
  - gloria grande
  - gran honor
  lexicon: BDAG
  rationale: δόξα puede ser «gloria» u «honor». Aquí se conserva «gloria» por continuidad léxica y porque el paralelo inmediato exige un tono solemne y elevado.
- source_word: δόξαν αἰώνιον
  english_pob_choice: everlasting glory
  chosen_spanish: gloria eterna
  alternatives_spanish:
  - gloria perpetua
  - gloria para siempre
  lexicon: BDAG
  rationale: Se mantiene la repetición de δόξα como «gloria» para reflejar el griego de forma consistente. «Eterna» expresa el valor duradero y no altera el contenido.
theological_decisions:
- issue: Traducción del término ancestral masculino πατέρων
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: El texto griego usa un término masculino explícito. Se conserva en español por fidelidad formal y por su peso histórico en el discurso de Israel.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Repetición de δόξα en la última cláusula
  english_pob_reading: great glory and everlasting glory
  chosen_spanish_reading: gran gloria y gloria eterna
  alternative_spanish_readings:
  - gran gloria y eterno honor
  - gran gloria y gloria perpetua
  rationale: Se conserva la repetición del término para no diluir la estructura del griego ni borrar la insistencia retórica del versículo.
  doctrine_reference: DOCTRINE.md §5 Consistency of key terms, or documented exception
translation_notes:
  revision_awareness: El audito en inglés pasó por una revisión que restauró la repetición más literal de δόξα en la segunda cláusula. La presente versión española sigue esa decisión, manteniendo «gloria» en ambos lugares para reflejar la repetición griega y la lectura final aprobada.
  spanish_consistency_notes:
  - Se mantuvo el registro exhortativo plural con «Acuérdense» y «reciban».
  - Se preservó la repetición de «gloria» para reflejar la estructura del griego y la revisión final del POB en inglés.
  - Se usó español neutral latinoamericano, con tono bíblico digno y comprensible.
