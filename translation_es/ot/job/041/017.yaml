translation:
  language: es
  text: Al levantarse, los poderosos[a] temen; a causa del estruendo, quedan desconcertados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los poderosos seres»; el hebreo también puede entenderse como «dioses» o «héroes».
    reason: alternative_reading
  - marker: b
    text: La cláusula final es difícil. También puede entenderse «quedan confundidos» o, más literalmente según la forma verbal, «se purifican».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשֵּׂתוֹ
  english_pob_choice: at his rising
  chosen_spanish: al levantarse
  alternatives_spanish:
  - cuando se levanta
  - al elevarse
  - en su levantamiento
  lexicon: HALOT
  rationale: El sustantivo de שׂאת puede expresar 'levantamiento' o 'alzamiento'; en este contexto poético, el sentido temporal/ocasional es el más natural. 'Al levantarse' conserva la imagen y refleja bien el valor idiomático de מִן.
- source_word: יָגוּרוּ
  english_pob_choice: are afraid
  chosen_spanish: tiemblan
  alternatives_spanish:
  - tienen miedo
  - se aterran
  - temen
  lexicon: HALOT
  rationale: El verbo גור en qal expresa miedo o temor. 'Tiemblan' transmite en español un miedo visible y poético, sin añadir contenido ajeno al hebreo.
- source_word: אֵלִים
  english_pob_choice: the mighty
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los fuertes
  - los mighty
  - los dioses
  lexicon: HALOT
  rationale: Como en el audit trail inglés, el término puede leerse como 'dioses', 'héroes' o 'poderosos'. 'Los poderosos' comunica la fuerza de forma idiomática en español y evita fijar una lectura teológica no requerida por el contexto.
- source_word: מִשְּׁבָרִים
  english_pob_choice: because of the crashing
  chosen_spanish: a causa del estruendo
  alternatives_spanish:
  - por el crash
  - por el estrépito
  - a causa de la rotura
  lexicon: HALOT
  rationale: La forma plural de שׁבר puede aludir a 'quebraduras', 'crashes' o 'estruendos'. 'Estruendo' recoge el sentido violento y sonoro que mejor encaja con el contexto de Leviatán, sin especificar más de lo que el hebreo exige.
- source_word: יִתְחַטָּאוּ
  english_pob_choice: they are bewildered
  chosen_spanish: quedan confundidos
  alternatives_spanish:
  - se purifican
  - se desorientan
  - quedan perplejos
  lexicon: HALOT
  rationale: El hitpael de חטא es difícil aquí; aunque puede relacionarse con purificación, el contexto favorece un sentido de desconcierto o desorientación. 'Quedan confundidos' mantiene la tensión lexical documentada en la POB inglesa y su lectura revisada.
theological_decisions:
- issue: Sentido de אֵלִים en la descripción poética de Leviatán
  english_pob_reading: human or creaturely 'mighty ones,' rendered 'the mighty'
  chosen_spanish_reading: '''los poderosos'''
  alternative_spanish_readings:
  - '''dioses'''
  - '''héroes'''
  rationale: Se preserva la ambigüedad del hebreo sin convertir el verso en una afirmación doctrinal sobre deidades. La traducción mantiene la fuerza poética y el temor que provoca Leviatán en seres poderosos.
  doctrine_reference: Priorizar el primario hebreo y conservar la tensión interpretativa documentada por la POB.
translation_notes:
  revision_awareness: 'Seguí el último pase revisado del texto inglés POB: la segunda cláusula se entendió causalmente (''because of the crashing'') y el verbo final como ''bewildered''. La redacción española evita una calca rígida, pero conserva la tensión lexical del original y no resuelve indebidamente la ambigüedad de חטא.'
  spanish_consistency_notes:
  - Usé un registro bíblico moderno y sobrio.
  - Mantuve la referencia masculina singular en 'al levantarse' para reflejar el sufijo -וֹ de מִשֵּׂתוֹ.
  - Elegí 'los poderosos' como equivalente natural de אֵלִים sin introducir 'dioses' en el texto principal.
  - No añadí marcadores textuales sin anclaje; cada nota aparece en el verso.
  - La cláusula final conserva la ambigüedad semántica reconocida por la POB inglesa.
