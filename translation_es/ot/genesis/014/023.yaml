    text: 'El hebreo emplea una fórmula elíptica de juramento: literalmente, «si de un hilo y hasta una correa de sandalia, y si tomo algo que sea tuyo...». El sentido es una negativa jurada.'
    reason: lexical_alternative
  revision_rationale: Se ajustó la primera frase para reflejar mejor la construcción hebrea de rango («desde… hasta…») en vez de dos sustantivos simplemente coordinados. Se reemplazó «ninguna cosa que fuera tuya» por «nada de lo que es tuyo» para un español más natural y fiel al alcance posesivo. También se cambió «para que no digas» a «no sea que digas» para acercarse mejor al matiz preventivo preservado en el POB inglés.
