revisions:
- from: Y los días que viajamos desde Cades-barnea hasta que cruzamos el valle[a] de Zered fueron treinta y ocho años, hasta que toda la generación, los hombres de guerra, fue acabando de en medio del campamento, tal como Yahvé les había jurado.
  to: Y los días que viajamos desde Cades-barnea hasta que cruzamos el wadi[a] de Zered fueron treinta y ocho años, hasta que toda la generación de los hombres de guerra llegó a su fin de en medio del campamento, tal como Yahvé les había jurado.
  rationale: Se corrige «valle» a «wadi» para reflejar con más precisión נַחַל y la decisión léxica auditada, conservando la alternativa tradicional en nota. Se reemplaza «fue acabando» por «llegó a su fin», que es más natural en español y mantiene la idea de consumación. Además, se suaviza la construcción nominal a «toda la generación de los hombres de guerra» para mejor legibilidad sin pérdida de sentido.
