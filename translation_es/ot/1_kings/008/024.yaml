translation:
  language: es
  text: que has guardado para tu siervo David, mi padre, lo que le hablaste[a]; tú hablaste con tu boca, y con tu mano lo has cumplido[b], como es hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a tu siervo David, mi padre».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «tú hablaste con tu boca, y con tu mano lo has cumplido»; una forma vívida de decir que lo que Dios dijo, también lo cumplió.'
    reason: cultural_note
lexical_decisions:
- source_word: שָׁמַרְתָּ
  english_pob_choice: have kept
  chosen_spanish: has guardado
  alternatives_spanish:
  - has cumplido
  - has observado
  lexicon: HALOT
  rationale: שׁמר expresa la idea de guardar, preservar o cumplir una palabra dada. «Has guardado» conserva la distinción respecto de מִלֵּאתָ, que más adelante expresa con mayor fuerza la realización efectiva. En español, «guardar» mantiene bien la noción de mantener fielmente una promesa.
- source_word: לְעַבְדְּךָ
  english_pob_choice: for your servant
  chosen_spanish: para tu siervo
  alternatives_spanish:
  - a tu siervo
  lexicon: HALOT
  rationale: El ל con עבד puede equivaler a «a» o «para». «Para tu siervo» comunica mejor en español la idea de que lo guardado o cumplido fue en beneficio de David, conservando el matiz de relación humilde de pacto que tiene «siervo».
- source_word: דָּוִד אָבִי
  english_pob_choice: David my father
  chosen_spanish: David, mi padre
  alternatives_spanish:
  - mi padre David
  lexicon: HALOT
  rationale: Se mantiene el orden hebreo de forma natural en español con una coma. «David, mi padre» suena fluido y refleja el enlace apposicional del original.
- source_word: אֵת אֲשֶׁר דִּבַּרְתָּ לוֹ
  english_pob_choice: what you spoke to him
  chosen_spanish: lo que le hablaste
  alternatives_spanish:
  - lo que le dijiste
  - lo que le prometiste
  lexicon: HALOT
  rationale: El hebreo dice literalmente «lo que hablaste a él». «Le hablaste» conserva el verbo de habla sin convertirlo de entrada en «prometer», porque el verso desarrolla después la misma palabra dicha con la boca y cumplida con la mano. El pronombre «lo» mantiene el objeto directo implícito de lo dicho.
- source_word: וַתְּדַבֵּר בְּפִיךָ
  english_pob_choice: you spoke with your mouth
  chosen_spanish: tú hablaste con tu boca
  alternatives_spanish:
  - hablaste con tu boca
  - tú dijiste con tu boca
  lexicon: HALOT
  rationale: Se preserva la imagen concreta de la boca como instrumento del habla divina. «Hablaste con tu boca» mantiene la fuerza retórica sin suavizar la antropomorfía del hebreo.
- source_word: וּבְיָדְךָ מִלֵּאתָ
  english_pob_choice: and with your hand you have fulfilled it
  chosen_spanish: y con tu mano lo has cumplido
  alternatives_spanish:
  - y con tu mano lo has llevado a cabo
  - y con tu mano lo has realizado
  lexicon: HALOT
  rationale: מִלֵּאתָ se entiende aquí como llevar una palabra a su plenitud o cumplimiento. «Cumplido» reproduce bien esa culminación en español y conserva el paralelismo boca/mano. La metáfora de la mano se mantiene como en el original.
- source_word: כַּיּוֹם הַזֶּה
  english_pob_choice: as it is this day
  chosen_spanish: como sucede hasta hoy
  alternatives_spanish:
  - como es este día
  - tal como se ve hoy
  lexicon: HALOT
  rationale: La expresión hebrea señala un cumplimiento observable en el presente. «Como sucede hasta hoy» comunica en español contemporáneo esa vigencia sin alejarse del valor demostrativo del idiomа.
theological_decisions:
- issue: 'Antropomorfismo divino: «boca» y «mano»'
  english_pob_reading: Retain the concrete anthropomorphic expressions in the main text.
  chosen_spanish_reading: Conservar «boca» y «mano» en el texto principal.
  alternative_spanish_readings:
  - parafrasear como «hablaste y cumpliste»
  - decir «prometiste y realizaste»
  rationale: El hebreo usa deliberadamente la correspondencia entre la palabra dicha y la acción ejecutada. Mantener la imaginería corporal evita aplanar la retórica y respeta el modo de expresión del texto, sin implicar una negación de la trascendencia divina.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'Coincide con el último pase registrado: no se indican revisiones aplicadas y el consenso de verificación es alto (0.98). Se ha mantenido la distinción entre שׁמר («guardar») y מלא («cumplir»), junto con la imaginería antropomórfica de boca y mano, según el rastro auditado en inglés.'
  spanish_consistency_notes:
  - Se usó «siervo» para reflejar el valor de עבד en el contexto de pacto; no se sustituyó por «siervo» en un sentido eclesiástico genérico sino por fidelidad léxica al hebreo.
  - Se conservó «Yahvé» no porque aparezca aquí explícitamente en el segmento, sino como convención del proyecto para el nombre divino cuando corresponda; en este versículo no era necesario introducirlo.
  - Se mantuvo un registro moderno y digno, evitando la formulación arcaizante de algunas traducciones tradicionales, pero sin perder paralelismo ni solemnidad.
