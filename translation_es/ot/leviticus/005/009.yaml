translation:
  language: es
  text: Y rociará parte de la sangre de la ofrenda por el pecado[a] en el costado del altar, y el resto de la sangre será escurrido en la base del altar; es una ofrenda por el pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda purificadora» en ambas ocurrencias de «ofrenda por el pecado». El término hebreo חַטָּאת puede designar la ofrenda por el pecado con énfasis en su función purificadora.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִזָּה
  english_pob_choice: he shall sprinkle
  chosen_spanish: rociará
  alternatives_spanish:
  - asperjará
  - esparcirá
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo expresa la aplicación ritual de la sangre. ‘Rociará’ comunica bien la acción sin sonar forzado en español; ‘asperjará’ sería más técnico y ‘esparcirá’ puede sugerir dispersión menos precisa.
- source_word: מִדַּם
  english_pob_choice: some of the blood
  chosen_spanish: parte de la sangre
  alternatives_spanish:
  - algo de la sangre
  - una porción de la sangre
  lexicon: HALOT
  rationale: El prefijo מִן aquí es partitivo. ‘Parte de la sangre’ preserva esa fuerza y suena natural en español bíblico contemporáneo.
- source_word: הַחַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: la ofrenda por el pecado
  alternatives_spanish:
  - la ofrenda purificadora
  - el sacrificio por el pecado
  lexicon: HALOT
  rationale: Se eligió una forma pública y clara en español que refleja el uso sacrificial de חַטָּאת. ‘Ofrenda por el pecado’ mantiene la relación con el pecado, mientras la nota preserva la alternativa de énfasis purificador.
- source_word: עַל קִיר הַמִּזְבֵּחַ
  english_pob_choice: on the side of the altar
  chosen_spanish: sobre el lado del altar
  alternatives_spanish:
  - sobre la pared del altar
  - contra el costado del altar
  lexicon: HALOT
  rationale: קִיר es literalmente ‘pared’, pero en español ‘lado/costado’ describe mejor un altar y evita una imagen arquitectónica rígida. ‘Sobre’ expresa la aplicación de la sangre a esa superficie.
- source_word: וְהַנִּשְׁאָר בַּדָּם
  english_pob_choice: and the rest of the blood
  chosen_spanish: y el resto de la sangre
  alternatives_spanish:
  - y lo que queda de la sangre
  - y la sangre restante
  lexicon: HALOT
  rationale: El participio sustantivado indica lo que queda después de la primera aplicación. ‘El resto de la sangre’ reproduce bien la idea y coincide con la revisión inglesa más natural.
- source_word: יִמָּצֵה
  english_pob_choice: shall be drained out
  chosen_spanish: será drenado
  alternatives_spanish:
  - será escurrido
  - será exprimido
  lexicon: HALOT
  rationale: La forma niphal en este contexto ritual señala la salida del líquido remanente. ‘Será drenado’ conserva la idea de vaciado controlado; ‘escurrido’ o ‘exprimido’ son posibles, pero menos solemnes o más metafóricos en español.
- source_word: אֶל יְסוֹד הַמִּזְבֵּחַ
  english_pob_choice: at the base of the altar
  chosen_spanish: a la base del altar
  alternatives_spanish:
  - al fundamento del altar
  - junto a la base del altar
  lexicon: HALOT
  rationale: יְסוֹד significa ‘base/fundamento’. ‘A la base del altar’ es claro y fiel, y evita la rigidez de ‘fundamento’ en este objeto concreto.
- source_word: חַטָּאת הוּא
  english_pob_choice: it is a sin offering
  chosen_spanish: es ofrenda por el pecado
  alternatives_spanish:
  - es ofrenda purificadora
  - es sacrificio por el pecado
  lexicon: HALOT
  rationale: La cláusula final clasifica la ofrenda. Para mantener consistencia con la primera ocurrencia y la terminología del pasaje, se conserva la misma expresión; la nota explica la alternativa de ‘ofrenda purificadora’ que destaca la función ritual.
theological_decisions:
- issue: Sentido de חַטָּאת en la legislación sacrificial
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda purificadora
  - ofrenda expiatoria
  rationale: El hebreo puede subrayar la relación con el pecado o la función de purificación ritual. Se mantiene una formulación ampliamente comprensible y compatible con ambos matices, mientras la nota conserva la tensión interpretativa sin borrarla.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y aprovecha el audit trail inglés, incluyendo la revisión que prefirió una formulación más natural para ‘the rest of the blood’. Se preserva la ambigüedad teológica de חַטָּאת mediante una nota lexical, sin imponer una equivalencia exclusivamente moralizante.
  spanish_consistency_notes:
  - Se mantuvo ‘ofrenda por el pecado’ de manera uniforme para ambas ocurrencias de חַטָּאת, con nota alternativa para el matiz purificador.
  - ‘Rociará’ y ‘drenado’ se eligieron por naturalidad en español sin perder la precisión ritual.
  - ‘Base del altar’ sigue el uso idiomático recomendado por el audit trail inglés, evitando ‘fundamento’ en el texto principal.
