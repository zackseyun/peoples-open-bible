review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido básico del hebreo: lista de los hijos de Judá, muerte de Er y Onán en la tierra de Canaán, y los hijos de Fares/Pérez. También mantiene correctamente la nota sobre el verbo singular hebreo con sujeto compuesto. Sin embargo, varias transliteraciones de nombres no siguen el uso bíblico estándar en español ni el propio razonamiento auditado del POB, y algunas parecen innovaciones innecesarias que reducen legibilidad y consistencia.'
  spanish_quality_summary: 'El español es claro en la sintaxis general, pero varios nombres propios resultan poco naturales o no estándares para lectura bíblica amplia: «Zéraj», «Jesrón» y «Jamul»; además «Pérez» puede introducir ambigüedad de apellido moderno y no es la forma bíblica más estable en este contexto. «Pero» también puede ajustarse a «y» para reflejar mejor la simple coordinación hebrea sin contraste fuerte. La frase revisada queda más natural y eclesialmente reconocible.'
  glossary_alignment: 'No hay términos teológicos mayores en disputa. El principal problema es de onomástica bíblica y consistencia transliteracional. Deben preferirse formas españolas ampliamente reconocibles y fieles al uso bíblico: «Fares», «Zéraj»/«Zérah» depende de política, pero aquí conviene evitar formas demasiado idiosincrásicas; «Hezrón» es mejor que «Jesrón»; «Hamul» mejor que «Jamul». Se conserva «Judá», «Onán», «Canaán» y «hijos de».'
  issues:
  - severity: high
    issue: Transliteraciones no estándar o poco legibles en varios nombres propios
    rationale: «Jesrón» y «Jamul» no son formas bíblicas españolas ampliamente reconocibles; «Zéraj» también es una elección marcada. Esto afecta legibilidad, estabilidad terminológica y fidelidad al criterio de español eclesial amplio.
  - severity: medium
    issue: «Pérez» no es la forma bíblica española más conveniente aquí
    rationale: Aunque acerca el nombre al hebreo/inglés, en español bíblico la forma más reconocible para פֶרֶץ en este contexto es «Fares». «Pérez» puede sonar a apellido moderno y desentonar con la tradición de lectura.
  - severity: low
    issue: Uso de «Pero» donde el hebreo solo coordina
    rationale: La partícula hebrea es simplemente conjuntiva. «Pero» no distorsiona gravemente, pero añade un matiz adversativo que no es necesario; «y» refleja mejor la secuencia genealógica.
  revised_spanish_text: Y los hijos de Judá fueron Er[a], Onán, Sela, Fares y Zéraj. Y Er y Onán murieron en la tierra de Canaán. Y los hijos de Fares fueron Hezrón y Hamul.
  revised_footnotes:
  - marker: a
    text: 'El hebreo usa un verbo singular con el sujeto compuesto «Er y Onán», una construcción normal del hebreo; el sentido en español es plural: «Er y Onán murieron».'
    reason: lexical_alternative
  revision_rationale: 'Se conservó el contenido y la nota gramatical del POB, pero se normalizaron los nombres propios a formas españolas más reconocibles y adecuadas para una Biblia de lectura amplia: «Fares», «Hezrón» y «Hamul». También se sustituyó «Pero» por «Y» para reflejar mejor la coordinación simple del hebreo. No se requieren cambios doctrinales ni adjudicación adicional.'
