translation:
  language: es
  text: La tierra se lamenta y se marchita; el Líbano se avergüenza y se marchita. Sarón se ha vuelto como el Arabá[a], y Basán y Carmelo quedan despojados de sus hojas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «como la llanura desértica» o «como el desierto» para «como el Arabá».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «Basán y Carmelo sacuden»; el sentido es que quedan despojados de su follaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבַל
  english_pob_choice: mourns
  chosen_spanish: se lamenta
  alternatives_spanish:
  - se entristece
  - se lamenta como por duelo
  lexicon: HALOT
  rationale: En este contexto poético la tierra es personificada; "se lamenta" conserva el matiz de duelo sin volverlo meramente físico.
- source_word: אֻמְלְלָה
  english_pob_choice: withers
  chosen_spanish: se marchita
  alternatives_spanish:
  - se debilita
  - se agosta
  lexicon: HALOT
  rationale: El término apunta a debilidad o desecación; "se marchita" encaja con la imagen agrícola y mantiene el paralelo con el lamento de la tierra.
- source_word: אֶרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la región
  - el país
  lexicon: HALOT
  rationale: Aquí no se trata del globo entero, sino del territorio devastado por el juicio; "la tierra" transmite bien esa amplitud territorial.
- source_word: הֶחְפִּיר
  english_pob_choice: is ashamed
  chosen_spanish: se avergüenza
  alternatives_spanish:
  - queda humillado
  - se cubre de vergüenza
  lexicon: HALOT
  rationale: Para el Líbano, la personificación exige un verbo reflexivo natural en español; "se avergüenza" conserva la humillación expresada por el hebreo.
- source_word: לְבָנוֹן
  english_pob_choice: Lebanon
  chosen_spanish: el Líbano
  alternatives_spanish:
  - Líbano
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico estándar en español con artículo, que es natural y fiel al hebreo.
- source_word: קָמַל
  english_pob_choice: withers away
  chosen_spanish: se desvanece
  alternatives_spanish:
  - se marchita
  - se seca
  lexicon: HALOT
  rationale: El verbo es otro término de marchitamiento; "se desvanece" distingue este segundo verbo del anterior sin perder la idea de decadencia vegetal.
- source_word: הַשָּׁרוֹן
  english_pob_choice: Sharon
  chosen_spanish: Sarón
  alternatives_spanish:
  - la llanura de Sarón
  - Sharon
  lexicon: HALOT
  rationale: En español bíblico estable, "Sarón" es la forma tradicional y clara para este topónimo.
- source_word: כָּעֲרָבָה
  english_pob_choice: like the Arabah
  chosen_spanish: como el Arabá
  alternatives_spanish:
  - como la Arabá
  - como el desierto
  - como la llanura desértica
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico transliterado para mantener la alusión específica; la nota explica la posible fuerza léxica de "desierto/llanura desértica".
- source_word: נֹעֵר
  english_pob_choice: shake off their leaves
  chosen_spanish: sacuden sus hojas
  alternatives_spanish:
  - se despojan de sus hojas
  - sacuden las hojas
  lexicon: HALOT
  rationale: El hebreo no menciona explícitamente "hojas", pero el contexto de Basán y Carmelo como vegetación permite explicitar el sentido implícito de desfoliación en español sin alejarse del auditable POB.
- source_word: בָּשָׁן
  english_pob_choice: Bashan
  chosen_spanish: Basán
  alternatives_spanish:
  - Bashán
  lexicon: HALOT
  rationale: Se adopta la transliteración tradicional en español bíblico.
- source_word: כַּרְמֶל
  english_pob_choice: Carmel
  chosen_spanish: Carmelo
  alternatives_spanish:
  - Carmel
  lexicon: HALOT
  rationale: Carmelo es la forma hispana usual del topónimo y resulta más natural para lectores en español.
theological_decisions:
- issue: Personificación de la tierra y de regiones como seres que sienten vergüenza o lamento
  english_pob_reading: The land mourns... Lebanon is ashamed...
  chosen_spanish_reading: La tierra se lamenta... el Líbano se avergüenza...
  alternative_spanish_readings:
  - La tierra llora...
  - La tierra está desolada...
  rationale: Se preserva la personificación poética del hebreo y del POB inglés; no se reduce a una descripción impersonal porque eso aplanaría la fuerza profética.
  doctrine_reference: Poética profética; juicio sobre la creación/territorio (sin formulación doctrinal explícita)
- issue: Sentido de 'Arabah' como referencia geográfica y posible valor común de desierto/llanura árida
  english_pob_reading: like the Arabah[b]
  chosen_spanish_reading: como el Arabá[b]
  alternative_spanish_readings:
  - como el desierto
  - como la llanura desértica
  rationale: Se conserva el nombre propio para no borrar la referencia concreta del texto. La alternativa semántica se deja en nota porque el POB inglés también preserva esa ambigüedad.
  doctrine_reference: Geografía bíblica; ambigüedad léxica preservada
translation_notes:
  revision_awareness: El paquete fuente y el audit trail inglés coinciden sin cambios relevantes en la revisión más reciente; se mantuvo la equivalencia óptima del POB inglés y se ajustó el español para naturalidad sin perder la personificación ni la imagen vegetal.
  spanish_consistency_notes:
  - 'Se conservaron topónimos bíblicos en formas hispanas estables: Líbano, Sarón, Arabá, Basán, Carmelo.'
  - Se evitó usar 'SEÑOR' u otros sustitutos porque este versículo no contiene el nombre divino.
  - 'Se mantuvo el paralelismo verbal con dos matices distintos: ''se lamenta'' / ''se marchita'' / ''se desvanece''.'
  - Se explicitó 'sus hojas' en la última cola para hacer visible en español la imagen implícita que el POB inglés también aclara.
