base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/001/022.yaml
  text: But Hannah did not go up[a], for she said to her husband, “Not until the boy is weaned will I bring him[b], so that he may appear before Yahweh and remain there forever.”
  footnotes:
  - marker: a
    text: 'Or, following another construal/textual tradition: “and I will appear before the LORD, and he will stay there forever.”'
    reason: alternative_reading
  - marker: b
    text: “Forever” here refers to Samuel’s permanent dedication to the LORD’s service, that is, for the rest of his life.
    reason: cultural_note
