translation:
  language: es
  text: Y si por medio de estas cosas no son corregidos por mí, sino que andan en oposición a mí,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּאֵלֶּה
  english_pob_choice: by these things
  chosen_spanish: con estas cosas
  alternatives_spanish:
  - por medio de estas cosas
  - a causa de estas cosas
  lexicon: HALOT
  rationale: El ב con el demostrativo remite a los castigos/juicios anteriores; en español, 'con estas cosas' conserva la referencia al medio circunstancial de la corrección sin sonar tan duro como un calco literal.
- source_word: תִוָּסְרוּ
  english_pob_choice: are not corrected
  chosen_spanish: no son corregidos
  alternatives_spanish:
  - no son disciplinados
  - no reciben corrección
  - no son reprensados
  lexicon: HALOT
  rationale: El nifal expresa ser corregidos o disciplinados. 'Son corregidos' mantiene la pasividad y la idea de una corrección recibida, apta para el contexto de disciplina pactal.
- source_word: לִי
  english_pob_choice: by me
  chosen_spanish: por mí
  alternatives_spanish:
  - de mi parte
  - con respecto a mí
  lexicon: HALOT
  rationale: 'La preposición/dativo con el verbo se entiende naturalmente en español como agente de la pasiva: ''por mí''. Es una solución clara y fiel al valor del contexto.'
- source_word: וַהֲלַכְתֶּם
  english_pob_choice: but walk
  chosen_spanish: sino que andan
  alternatives_spanish:
  - y andan
  - entonces andan
  lexicon: HALOT
  rationale: El waw consecutivo introduce contraste dentro de la secuencia condicional. 'Sino que' expresa mejor la oposición al no aceptar la corrección.
- source_word: עִמִּי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - conmigo mismo
  lexicon: HALOT
  rationale: Se conserva la preposición 'con' para reflejar la forma hebrea 'conmigo', manteniendo el componente relacional del texto.
- source_word: קֶרִי
  english_pob_choice: hostility / contrary to me
  chosen_spanish: contrariamente
  alternatives_spanish:
  - con oposición
  - en contrariedad
  - con hostilidad
  lexicon: HALOT
  rationale: El término designa una actitud de oposición/contrariedad en la relación de pacto. 'Contrariamente' comunica esa postura sin forzar una expresión poco natural en español.
theological_decisions:
- issue: El modismo pactal עִמִּי קֶרִי
  english_pob_reading: walk contrary to me
  chosen_spanish_reading: andan contrariamente conmigo
  alternative_spanish_readings:
  - andan en oposición conmigo
  - andan con hostilidad conmigo
  - andan en contrariedad conmigo
  rationale: El hebreo combina 'conmigo' con un sustantivo de oposición para describir resistencia relacional al Yahvé del pacto. La redacción elegida conserva la relación marcada por 'conmigo' y la oposición implícita de קֶרִי sin reemplazarla por una paráfrasis más interpretativa.
  doctrine_reference: Levítico 26:23; disciplina pactal y respuesta humana a la corrección divina.
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y la revisión que favorece 'by me' para el valor pasivo de לִי y una traducción más formal de קֶרִי. En español se optó por una solución natural que preserve la relación personal y la noción de oposición, evitando un calco rígido.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como nombre divino según el estándar del proyecto, aunque en este versículo el texto hebreo no contiene el tetragrámaton explícito; la referencia implícita sigue siendo el mismo hablante divino en el contexto inmediato.
  - Se evitó 'SEÑOR' como sustituto editorial del nombre divino.
  - '''Corregidos'' conserva la pasividad y el matiz disciplinario de יסר sin convertirlo en mera reprensión verbal.'
  - '''Conmigo'' preserva el componente relacional de עִמִּי, y ''contrariamente'' intenta reflejar קֶרִי sin perder inteligibilidad en español.'
