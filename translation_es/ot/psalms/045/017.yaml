revisions:
- from: En lugar de tus padres estarán tus hijos; tú los pondrás como príncipes en toda la tierra[a].
  to: En lugar de tus padres serán tus hijos varones[a]; tú los pondrás como príncipes en toda la tierra[b].
  rationale: Se corrige 'estarán' a 'serán' para reflejar mejor el valor copulativo/futuro de יִהְיוּ en un contexto de sucesión dinástica. Se ajusta 'tus hijos' a 'tus hijos varones' para preservar el masculino específico de בָנֶיךָ y la fuerza hereditaria real que el inglés auditado mantuvo con 'sons'. Se añade la nota de orden alternativo que el POB inglés conservó, y se regulariza la nota sobre אָרֶץ con español más natural.
