translation:
  language: es
  text: 'Entonces David dijo al mensajero[a]: «Así dirás a Joab: “No te parezca mal este asunto ante tus ojos, porque la espada devora tanto a uno como a otro[b]. Refuerza tu ataque contra la ciudad y derríbala”. Y anímalo[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No te parezca mal este asunto». El hebreo dice literalmente: «No sea malo este asunto ante tus ojos».'
    reason: lexical_alternative
  - marker: b
    text: 'Modismo hebreo: «porque así y así devora la espada», es decir, la espada mata tanto a una persona como a otra.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «fortalécelo». El hebreo también puede leerse como una orden de fortalecerlo en sentido más literal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּלְאָךְ
  english_pob_choice: the messenger
  chosen_spanish: el mensajero
  alternatives_spanish:
  - el enviado
  - el mensajero/embajador
  lexicon: HALOT
  rationale: En este contexto narrativo se trata de un mensajero humano que lleva un encargo verbal, no de un ángel. «Mensajero» conserva el valor funcional del hebreo y es natural en español.
- source_word: כֹּה תֹאמַר
  english_pob_choice: Thus you shall say
  chosen_spanish: Así dirás
  alternatives_spanish:
  - De este modo dirás
  - Esto dirás
  lexicon: HALOT
  rationale: La fórmula introduce discurso delegado. «Así dirás» mantiene el tono formal y la estructura de encargo sin sonar rígida en español.
- source_word: אַל יֵרַע בְּעֵינֶיךָ
  english_pob_choice: Do not let ... be evil in your eyes
  chosen_spanish: No te parezca mal ... ante tus ojos
  alternatives_spanish:
  - No dejes que ... sea malo a tus ojos
  - No lo consideres malo
  lexicon: HALOT
  rationale: El hebreo usa un modismo con «ojos» que literalmente habla de que algo sea malo en la percepción de alguien. En español, «No te parezca mal» conserva la fuerza idiomática y moral sin sonar forzado.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this matter
  chosen_spanish: este asunto
  alternatives_spanish:
  - esta cosa
  - este hecho
  lexicon: HALOT
  rationale: דָבָר aquí apunta al episodio comunicado. «Asunto» es suficientemente amplio y evita especificar más de lo que el texto dice.
- source_word: כִּי כָזֹה וְכָזֶה
  english_pob_choice: for the sword devours one as well as another
  chosen_spanish: porque a uno y a otro
  alternatives_spanish:
  - porque así y así
  - porque de una y de otra manera
  lexicon: HALOT
  rationale: El hebreo es idiomático y el inglés POB lo explica como una acción indiscriminada de la espada. En español, «a uno y a otro» mantiene esa idea de manera clara y natural, dejando que el contexto complete el sentido.
- source_word: תֹּאכַל הֶחָרֶב
  english_pob_choice: the sword devours
  chosen_spanish: devora la espada
  alternatives_spanish:
  - la espada consume
  - la espada mata
  lexicon: HALOT
  rationale: «Devora» conserva la metáfora vívida del hebreo de comer/devorar aplicada a la espada. Se prefirió mantener la imagen en lugar de reducirla a «mata».
- source_word: הַחֲזֵק מִלְחַמְתְּךָ
  english_pob_choice: Strengthen your attack
  chosen_spanish: Refuerza tu ataque
  alternatives_spanish:
  - Fortalece tu ataque
  - Intensifica tu ataque
  lexicon: HALOT
  rationale: El imperativo de חזק expresa hacer más fuerte o más firme la ofensiva. «Refuerza tu ataque» reproduce esa idea con español natural y militarmente claro.
- source_word: וְהָרְסָהּ
  english_pob_choice: and overthrow it
  chosen_spanish: y derríbala
  alternatives_spanish:
  - y destrúyela
  - y arrásala
  lexicon: HALOT
  rationale: El verbo significa derribar o demoler; con «la ciudad» como objeto, «derríbala» conserva la violencia de la imagen y evita sobreinterpretar el alcance exacto.
- source_word: וְחַזְּקֵהוּ
  english_pob_choice: And encourage him
  chosen_spanish: Y anímalo
  alternatives_spanish:
  - Y fortalécelo
  - Y refuérzalo
  lexicon: HALOT
  rationale: La forma masculina singular puede referirse a Joab, que acaba de ser mencionado. «Anímalo» expresa la fuerza interpersonal y exhortativa que el inglés POB destacó, sin perder la alternativa más literal de «fortalécelo».
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que cambió «battle» por «attack» para hacer más natural la expresión militar. Por eso se eligió «ataque» en lugar de una calca como «batalla» o «guerra». También se preservó la línea idiomática del hebreo («malo ante tus ojos», «devora la espada») sin suavizarla en exceso.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton cuando aparece en otros contextos del proyecto, aunque aquí no figura en el versículo.
  - Se conservó el paralelismo entre el modismo de los ojos y la imagen de la espada que devora, evitando una paráfrasis que borre la tensión semántica del hebreo.
  - «Mensajero» se usa en sentido funcional, no angelológico.
