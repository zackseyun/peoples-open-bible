translation:
  language: es
  text: Y en aquel día el remanente de Israel y los sobrevivientes de la casa de Jacob ya no se apoyarán en el que los hirió, sino que se apoyarán en Yahvé, el Santo de Israel, en verdad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'verdaderamente' o 'con fidelidad'. La expresión hebrea puede indicar dependencia genuina, fiable o fiel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ... will
  chosen_spanish: Y ...
  alternatives_spanish:
  - Y sucederá
  - Y acontecerá
  lexicon: HALOT
  rationale: Introduce la acción futura de manera natural en español sin forzar una fórmula arcaica; la construcción queda integrada con la frase temporal siguiente.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: Conserva la fórmula profética estable y su resonancia escatológica, con español natural y digno.
- source_word: לֹא יוֹסִיף עוֹד
  english_pob_choice: will no longer continue
  chosen_spanish: ya no
  alternatives_spanish:
  - no volverá a
  - no seguirá
  lexicon: HALOT
  rationale: La combinación hebrea intensifica la cesación; en español, 'ya no' expresa con claridad esa interrupción completa sin añadir más de lo que el texto dice.
- source_word: שְׁאָר יִשְׂרָאֵל
  english_pob_choice: the remnant of Israel
  chosen_spanish: el remanente de Israel
  alternatives_spanish:
  - el resto de Israel
  - los sobrevivientes de Israel
  lexicon: HALOT
  rationale: '''Remanente'' preserva el término profético consolidado y su carga teológica en Isaías.'
- source_word: וּפְלֵיטַת בֵּית יַעֲקֹב
  english_pob_choice: and the survivors of the house of Jacob
  chosen_spanish: y los sobrevivientes de la casa de Jacob
  alternatives_spanish:
  - y los escapados de la casa de Jacob
  - y los fugitivos de la casa de Jacob
  lexicon: HALOT
  rationale: פְלֵיטָה indica los que escaparon o sobrevivieron; 'sobrevivientes' es claro y mantiene el paralelismo con 'remanente'.
- source_word: לְהִשָּׁעֵן
  english_pob_choice: to lean on
  chosen_spanish: se apoyarán en
  alternatives_spanish:
  - confiarán en
  - se sostendrán en
  lexicon: HALOT
  rationale: '''Apoyarse en'' reproduce la imagen corporal de depender sobre algo/alguien y mantiene el contraste con el apoyo en Yahvé.'
- source_word: מַכֵּהוּ
  english_pob_choice: the one who struck them
  chosen_spanish: el que los hirió
  alternatives_spanish:
  - el que los golpeó
  - su agresor
  lexicon: HALOT
  rationale: Se conserva la designación descriptiva sin identificar explícitamente al opresor; 'hirió' comunica bien el golpe/daño del participio hebreo.
- source_word: וְנִשְׁעַן
  english_pob_choice: but will lean on
  chosen_spanish: sino que se apoyarán en
  alternatives_spanish:
  - y se apoyarán en
  - pero se apoyarán en
  lexicon: HALOT
  rationale: La repetición del mismo verbo en español preserva el paralelismo; 'sino que' refuerza el contraste adversativo implícito en el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, sin reemplazarlo por una convención de ocultamiento.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de Israel
  - el Santo de Jacob
  lexicon: HALOT
  rationale: Título establecido en Isaías; 'Santo de Israel' preserva solemnidad y reconocimiento intertextual.
- source_word: בֶּאֱמֶת
  english_pob_choice: in truth
  chosen_spanish: en verdad
  alternatives_spanish:
  - verdaderamente
  - con fidelidad
  lexicon: HALOT
  rationale: La expresión admite matices de verdad, sinceridad y fidelidad; 'en verdad' conserva la amplitud semántica sin decidir prematuramente entre ellos.
theological_decisions:
- issue: Identidad del opresor implícito en "el que los hirió"
  english_pob_reading: Kept implicit as 'the one who struck them' rather than naming Assyria in the translation.
  chosen_spanish_reading: Se mantiene implícito en "el que los hirió" sin nombrar a Asiria.
  alternative_spanish_readings:
  - Asiria
  - el rey de Asiria
  rationale: El contexto inmediato apunta a Asiria, pero el hebreo emplea una descripción, no un nombre propio. Mantenerla evita añadir precisión no explicitada por el verso.
  doctrine_reference: 'Principio POB: preservar el alcance del texto fuente y la inferencia contextual sin imponerla en la traducción.'
- issue: Alcance de בֶּאֱמֶת
  english_pob_reading: Rendered 'in truth' in the main text.
  chosen_spanish_reading: Se traduce "en verdad" en el texto principal.
  alternative_spanish_readings:
  - verdaderamente
  - con fidelidad
  rationale: La frase puede señalar sinceridad, fiabilidad o fidelidad. "En verdad" deja abierta esa riqueza y conserva la tensión léxica.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del audit trail en inglés, que eliminó la idea de 'seguir continuando' para reflejar mejor el hebreo de cesación intensificada. La versión española usa 'ya no' para expresar esa misma cesación de manera natural, y conserva el paralelismo verbal entre 'se apoyarán' y 'se apoyarán' sin introducir glosas interpretativas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según la terminología estándar del proyecto para יהוה.
  - '''Remanente'' y ''sobrevivientes'' preservan el paralelismo profético entre שְׁאָר y פְלֵיטַת.'
  - '''Se apoyarán en'' reproduce la metáfora de dependencia corporal del verbo hebreo y facilita el contraste interno del versículo.'
  - No se capitaliza 'Santo' como título aislado fuera de la forma fija 'el Santo de Israel'.
