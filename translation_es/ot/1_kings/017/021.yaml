translation:
  language: es
  text: 'Entonces se tendió sobre el niño tres veces, y clamó a Yahvé y dijo: «Yahvé, mi Dios, te ruego que la vida[a] de este niño vuelva a él»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «alma». Hebreo: «que la נֶפֶשׁ de este niño vuelva a su interior».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְמֹדֵד
  english_pob_choice: stretched himself out
  chosen_spanish: se tendió
  alternatives_spanish:
  - se extendió
  - se acostó
  - se echó sobre
  lexicon: HALOT
  rationale: El verbo reflexivo raro describe la acción física de Elijah al colocarse sobre el niño. «Se tendió» comunica en español la postura corporal sin sonar artificioso ni perder el sentido narrativo.
- source_word: עַל הַיֶּלֶד
  english_pob_choice: over the boy
  chosen_spanish: sobre el niño
  alternatives_spanish:
  - encima del niño
  - sobre el muchacho
  lexicon: HALOT
  rationale: עַל expresa aquí posición corporal. «Sobre el niño» conserva la relación espacial de manera natural en español.
- source_word: שָׁלֹשׁ פְּעָמִים
  english_pob_choice: three times
  chosen_spanish: tres veces
  alternatives_spanish:
  - en tres ocasiones
  lexicon: HALOT
  rationale: La expresión numeral es directa y se traduce con el equivalente idiomático normal en español.
- source_word: וַיִּקְרָא אֶל יְהוָה
  english_pob_choice: he cried out to Yahweh
  chosen_spanish: clamó a Yahvé
  alternatives_spanish:
  - llamó a Yahvé
  - exclamó a Yahvé
  - invocó a Yahvé
  lexicon: HALOT
  rationale: En contexto de oración, קרא אל comunica una invocación intensa. «Clamó» preserva la urgencia y el tono de ruego mejor que un simple «llamó».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino revelado en el texto hebreo conforme a la convención del proyecto, en lugar de sustituirlo por un título.
- source_word: יְהוָה אֱלֹהָי
  english_pob_choice: Yahweh my God
  chosen_spanish: Yahvé, mi Dios
  alternatives_spanish:
  - Yahvé mi Dios
  - Yahvé, Dios mío
  lexicon: HALOT
  rationale: La vocativa combina el nombre divino con el posesivo. La coma ayuda a marcar la dirección de la súplica en español.
- source_word: תָּשָׁב נָא
  english_pob_choice: please let ... return
  chosen_spanish: te ruego que ... vuelva
  alternatives_spanish:
  - por favor, que ... vuelva
  - que ... regrese, te ruego
  - te suplico que ... vuelva
  lexicon: HALOT
  rationale: El jussivo con נָא expresa una petición urgente y cortés. «Te ruego que» transmite la fuerza apelativa sin forzar una estructura poco natural.
- source_word: נֶפֶשׁ
  english_pob_choice: life
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser
  - aliento
  lexicon: HALOT
  rationale: Aunque el inglés POB optó por «life» para resaltar el sentido contextual de la vida animadora, en español «alma» preserva mejor la tensión lexical y la lectura tradicional posible de נֶפֶשׁ en este ruego de restauración. Se evita fijar prematuramente una antropología técnica; la alternativa «vida» queda reflejada en la nota.
- source_word: הַיֶּלֶד הַזֶּה
  english_pob_choice: this boy
  chosen_spanish: este niño
  alternatives_spanish:
  - este muchacho
  - este pequeño
  lexicon: HALOT
  rationale: יֶלֶד puede referirse a niño o muchacho. En este contexto narrativo, «niño» es natural, claro y acorde con la escena doméstica.
- source_word: עַל קִרְבּוֹ
  english_pob_choice: to him
  chosen_spanish: a su interior
  alternatives_spanish:
  - a él
  - dentro de él
  - a sus entrañas
  lexicon: HALOT
  rationale: La expresión idiomática apunta al retorno de la vida al ser interior del niño. «A su interior» mantiene el valor idiomático sin convertirlo en una descripción anatómica moderna.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en un contexto de reanimación o resurrección
  english_pob_reading: life
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - vida
  - soul (no traducido)
  rationale: El hebreo permite tanto un sentido de vida animadora como una carga más amplia de «alma» o persona. En español, «alma» conserva mejor la tensión semántica y permite al lector percibir la posible implicación antropológica sin resolverla de antemano. La alternativa «vida» sigue siendo válida y se preserva en nota para transparencia.
  doctrine_reference: Mantener la tensión lexical y teológica; no imponer una antropología más estrecha de la que el hebreo exige.
translation_notes:
  revision_awareness: 'Se sigue de cerca el audit trail inglés: se conserva la acción corporal, la invocación intensa a Yahvé, la vocativa «Yahvé, mi Dios» y la ambigüedad de נֶפֶשׁ mediante una nota lexical. No hay revisiones posteriores que obliguen a ajustar la elección base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el Tetragrámaton.
  - Se evita «Señor» como sustituto de יְהוָה para mantener transparencia auditiva.
  - «Niño» se emplea para el referente masculino singular conforme al contexto narrativo.
  - La nota a preserva la alternativa «vida» para reflejar la tensión lexical de נֶפֶשׁ.
