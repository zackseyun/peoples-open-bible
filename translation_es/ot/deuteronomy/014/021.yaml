review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura del hebreo: prohibición de comer נְבֵלָה, permiso de darla al גֵּר o venderla al נָכְרִי, fundamento de santidad para Yahvé, y la prohibición final sobre el cabrito. También mantiene correctamente Yahvé. Sin embargo, ''res'' no representa fielmente נְבֵלָה, que aquí es un animal muerto/carroña/cadáver no sacrificado de forma permitida, no una ''res'' en sentido normal. Además, la nota d está mal anclada: trata de la alternatividad permisiva/instructiva de ''dar... comer... vender'', pero en el texto está puesta en ''extranjero''.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'No comerás ninguna res' suena semánticamente incorrecto y puede sugerir carne vacuna. 'La podrás dar' es comprensible, aunque 'Se la podrás dar' fluye mejor. 'Dentro de tus puertas' es aceptable con nota. El resto del versículo es legible y natural para un registro bíblico moderno.
  glossary_alignment: Alinea bien con los términos del proyecto en Yahvé, pueblo santo, extranjero, cabrito y leche de su madre. La principal desviación es נְבֵלָה -> 'res', que no sigue el sentido legal documentado. También conviene mantener la distinción entre גֵּר y נָכְרִי con una opción española más clara; 'forastero' es posible, pero 'residente extranjero' expresa mejor el matiz legal si se quiere máxima claridad.
  issues:
  - severity: high
    issue: נְבֵלָה fue traducido como 'res'
    rationale: '''Res'' no significa ''carcasa/animal muerto no sacrificado correctamente'' y puede inducir a pensar en ganado vacuno o en carne apta para consumo. El hebreo exige una expresión como ''animal muerto'' o ''cadáver de animal'', con nota para el matiz técnico.'
  - severity: medium
    issue: La nota d está anclada en 'extranjero' en vez de la cláusula verbal pertinente
    rationale: La nota explica la fuerza legal de 'dar/comer/vender', no el sustantivo 'extranjero'. Debe anclarse en la frase verbal correspondiente para reflejar el punto exegético.
  - severity: medium
    issue: '''Forastero'' para גֵּר puede resultar menos preciso en español actual'
    rationale: Aunque distingue de 'extranjero', 'forastero' en muchos contextos suena más coloquial o transitorio. 'Residente extranjero' o 'extranjero residente' comunica mejor el estatus social/legal del גֵּר.
  - severity: low
    issue: '''La podrás dar'' puede mejorarse a ''Se la podrás dar'''
    rationale: La forma con dativo suena más natural en español al introducir el destinatario expreso.
  revised_spanish_text: No comerás ningún animal muerto[a]. Se lo podrás dar al residente extranjero[b] que está dentro de tus puertas[c][d], y él podrá comerlo; o lo podrás vender a un extranjero. Porque tú eres un pueblo santo para Yahvé tu Dios. No cocerás un cabrito[e] en la leche de su madre.
