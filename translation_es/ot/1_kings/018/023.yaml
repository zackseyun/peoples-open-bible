translation:
  language: es
  text: Que nos den dos toros, y que ellos escojan para sí uno de los toros, lo corten en pedazos y lo pongan sobre la leña; pero no pongan fuego debajo de él[a]. Y yo prepararé el otro toro y lo pondré sobre la leña; y no pondré fuego debajo de él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: "no pongan fuego" / "no pondré fuego". Se añade "debajo de él" en español por el contexto sacrificial, ya que el fuego se aplicaría debajo de la ofrenda puesta sobre la leña.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִתְּנוּ לָנוּ
  english_pob_choice: Let them give us
  chosen_spanish: Que nos den
  alternatives_spanish:
  - Que nos provean
  - Que se nos den
  lexicon: HALOT
  rationale: 'El valor volitivo/jusivo del hebreo pide una propuesta o desafío: ''que... den''. ''Nos den'' conserva la petición directa y es natural en español contemporáneo.'
- source_word: שְׁנַיִם פָּרִים
  english_pob_choice: two bulls
  chosen_spanish: dos toros
  alternatives_spanish:
  - dos bueyes
  - dos novillos
  lexicon: HALOT
  rationale: פָּר designa un toro/bull en contexto sacrificial. 'Toros' es claro en español y mantiene la fuerza léxica; 'bueyes' sería más amplio y 'novillos' añade una edad no explicitada.
- source_word: וְיִבְחֲרוּ לָהֶם
  english_pob_choice: let them choose one bull for themselves
  chosen_spanish: que ellos escojan para sí uno de los toros
  alternatives_spanish:
  - que ellos elijan para sí
  - que escojan un toro para ellos mismos
  lexicon: HALOT
  rationale: בחר es 'escoger/elegir'. 'Para sí' expresa bien el dativo לָהֶם y el contraste competitivo del desafío.
- source_word: וִינַתְּחֻהוּ
  english_pob_choice: cut it into pieces
  chosen_spanish: lo corten en pedazos
  alternatives_spanish:
  - lo despedacen en trozos
  - lo dividan en piezas
  lexicon: HALOT
  rationale: נתח describe dividir la víctima para la preparación sacrificial. 'Corten en pedazos' preserva el sentido sin sonar excesivamente técnico o coloquial.
- source_word: וְיָשִׂימוּ עַל הָעֵצִים
  english_pob_choice: place it on the wood
  chosen_spanish: lo pongan sobre la leña
  alternatives_spanish:
  - lo coloquen sobre la madera
  - lo pongan sobre la madera
  lexicon: HALOT
  rationale: עֵצִים en este contexto es la leña preparada para el sacrificio. 'Leña' comunica mejor el material combustible que 'madera' en español litúrgico-natural.
- source_word: וְאֵשׁ לֹא יָשִׂימוּ
  english_pob_choice: but put no fire under it
  chosen_spanish: pero no pongan fuego
  alternatives_spanish:
  - pero no enciendan fuego
  - pero no pongan fuego debajo
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'no pongan fuego'. En español, 'poner fuego' suena menos natural, pero es la forma más directa y evita introducir un complemento espacial que no está en el hebreo. La nota explica la aclaración contextual.
- source_word: וַאֲנִי אֶעֱשֶׂה אֶת־הַפָּר הָאֶחָד
  english_pob_choice: And I will prepare the other bull
  chosen_spanish: Y yo prepararé el otro toro
  alternatives_spanish:
  - Y yo haré el otro toro
  - Y yo prepararé uno de los toros
  lexicon: HALOT
  rationale: עָשָׂה aquí tiene sentido de preparar en el marco sacrificial, no solo 'hacer'. 'El otro toro' refleja con naturalidad que uno ya fue asignado a ellos.
- source_word: וְנָתַתִּי עַל הָעֵצִים
  english_pob_choice: and place it on the wood
  chosen_spanish: y lo pondré sobre la leña
  alternatives_spanish:
  - y lo colocaré sobre la leña
  - y lo pondré sobre la madera
  lexicon: HALOT
  rationale: נָתַן aquí continúa la acción concreta de colocar la víctima. 'Pondré sobre la leña' conserva el paralelo con la frase anterior.
- source_word: וְאֵשׁ לֹא אָשִׂים
  english_pob_choice: and I will put no fire under it
  chosen_spanish: y no pondré fuego
  alternatives_spanish:
  - y no encenderé fuego
  - y no pondré fuego debajo
  lexicon: HALOT
  rationale: Se mantiene la cercanía al hebreo 'no pondré fuego'. La falta de 'debajo' no pierde el sentido, y evita añadir un complemento que el texto no expresa de manera explícita.
theological_decisions:
- issue: Lenguaje sacrificial concreto sin categorías doctrinales añadidas
  english_pob_reading: Use ordinary sacrificial preparation terms ('cut it into pieces,' 'place it on the wood,' 'put no fire under it')
  chosen_spanish_reading: Usar términos concretos de preparación sacrificial ('corten en pedazos', 'lo pongan sobre la leña', 'no pongan fuego')
  alternative_spanish_readings:
  - Usar lenguaje más técnico como 'dispongan' o 'ofrezcan'
  - Usar formulaciones interpretativas con 'enciendan'
  rationale: El versículo narra la disposición práctica del sacrificio en el monte Carmelo. La traducción evita introducir vocabulario teológico o ritual más cargado que lo que el hebreo dice de forma concreta.
  doctrine_reference: Principio de equivalencia óptima; no importar categorías doctrinales no presentes en el texto.
translation_notes:
  revision_awareness: 'Alineado con la auditoría inglesa: se mantiene el sentido volitivo de la propuesta, el léxico sacrificial concreto, y la aclaración contextual sobre el fuego sin añadir más de lo que el hebreo warrantiza. No se detectaron revisiones posteriores que alteren el contenido.'
  spanish_consistency_notes:
  - Se usa 'toros' para פָּר en vez de 'bueyes', por mayor precisión sacrificial.
  - '''Leña'' refleja mejor el contexto del altar que ''madera''.'
  - Se conserva el paralelismo entre 'poner' y 'preparar' sin sobrerregularizarlo con un tecnicismo ritual.
