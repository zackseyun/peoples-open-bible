translation:
  language: es
  text: 'Y así fue. Al día siguiente se levantó de madrugada, apretó el vellón[a] y sacó del vellón el rocío: un cuenco lleno de agua.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «prensó el vellón» / «lo exprimió». El hebreo usa dos verbos en secuencia para describir la compresión del vellón y la extracción del rocío.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כֵן
  english_pob_choice: And it was so
  chosen_spanish: Y así fue
  alternatives_spanish:
  - Y sucedió así
  - Y así ocurrió
  lexicon: HALOT
  rationale: La fórmula hebrea confirma que la señal pedida ocurrió. «Y así fue» conserva el sentido de confirmación con español natural y sobrio, sin añadir explicaciones.
- source_word: וַיַּשְׁכֵּם מִמָּחֳרָת
  english_pob_choice: He rose early the next day
  chosen_spanish: Al día siguiente se levantó de madrugada
  alternatives_spanish:
  - Se levantó temprano al día siguiente
  - Se levantó muy temprano al día siguiente
  lexicon: HALOT
  rationale: El verbo expresa levantarse temprano; «al día siguiente» traduce מִמָּחֳרָת. «De madrugada» comunica el matiz de prontitud que el verbo aporta en español natural.
- source_word: וַיָּזַר אֶת הַגִּזָּה
  english_pob_choice: and squeezed the fleece
  chosen_spanish: y apretó el vellón
  alternatives_spanish:
  - y exprimió el vellón
  - y prensó el vellón
  lexicon: HALOT
  rationale: El verbo describe comprimir el vellón para extraer líquido. «Apretó» es fiel y claro; «exprimió» es posible pero puede sonar más interpretativo. «Vellón» corresponde bien a גִּזָּה.
- source_word: וַיִּמֶץ טַל
  english_pob_choice: wringing dew
  chosen_spanish: exprimiendo el rocío
  alternatives_spanish:
  - sacando el rocío
  - escurriendo el rocío
  lexicon: HALOT
  rationale: El segundo verbo continúa la acción de extraer líquido. «Exprimiendo» mantiene la relación con «apretó» y preserva la secuencia verbal del hebreo; el objeto es «rocío».
- source_word: מִן הַגִּזָּה
  english_pob_choice: from the fleece
  chosen_spanish: del vellón
  alternatives_spanish:
  - desde el vellón
  - a partir del vellón
  lexicon: HALOT
  rationale: 'La preposición indica origen: el rocío sale del vellón. «Del vellón» es la forma más natural y precisa en español.'
- source_word: מְלֹא הַסֵּפֶל מָיִם
  english_pob_choice: a bowlful of water
  chosen_spanish: una vasija llena de agua
  alternatives_spanish:
  - un cuenco lleno de agua
  - una copa llena de agua
  lexicon: HALOT
  rationale: La construcción expresa plenitud medida por un recipiente. «Vasija» ofrece un término amplio y digno para הַסֵּפֶל, evitando tanto «copa» como una imagen demasiado específica; «llena de agua» conserva la cantidad.
- source_word: הַסֵּפֶל
  english_pob_choice: bowl
  chosen_spanish: vasija
  alternatives_spanish:
  - cuenco
  - tazón
  lexicon: HALOT
  rationale: El recipiente parece más amplio que una copa y no exige precisar su forma exacta. «Vasija» es neutral y abarca bien el campo semántico sin perder claridad.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo WLC y el audit trail inglés. Se mantuvo la secuencia de dos verbos para no borrar la intensificación del original; la frase final conserva la imagen de un recipiente lleno con un equivalente español natural.
  spanish_consistency_notes:
  - Se usó «vellón» para גִּזָּה de manera consistente con el campo semántico de una pieza de lana/fibra.
  - Se evitó «SEÑOR» u otras formas de sustitución porque el versículo no contiene el nombre divino.
  - Se conservó la doble acción verbal hebrea mediante «apretó... exprimiendo» y la nota textual alternativa.
  - «Rocío» traduce טַל sin confundirlo con lluvia o condensación genérica, manteniendo la imagen concreta del pasaje.
