translation:
  language: es
  text: Y aconteció en aquellos muchos días[a] que murió el rey de Egipto, y los hijos de Israel[b] gimieron a causa del trabajo[c] y clamaron, y su clamor subió a Dios a causa del trabajo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «durante aquellos muchos días»; más interpretativamente, «después de muchos días».
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «los hijos de Israel»; esta expresión se refiere colectivamente al pueblo de Israel.'
    reason: lexical_alternative
  - marker: c
    text: O «a causa de la labor» o «a causa de la servidumbre»; el término hebreo se refiere aquí al trabajo forzado y opresivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y fue así
  lexicon: HALOT
  rationale: La forma hebrea introduce un nuevo desarrollo narrativo; «aconteció» conserva ese valor de avance en la historia con un registro digno y natural en español.
- source_word: בַּיָּמִים הָרַבִּים הָהֵם
  english_pob_choice: in those many days
  chosen_spanish: en aquellos muchos días
  alternatives_spanish:
  - durante aquellos muchos días
  - después de muchos días
  lexicon: HALOT
  rationale: La expresión marca un período extenso sin precisar un momento exacto. «En aquellos muchos días» mantiene más de cerca la textura temporal del hebreo que una paráfrasis como «después de muchos días».
- source_word: וַיָּמָת מֶלֶךְ מִצְרַיִם
  english_pob_choice: the king of Egypt died
  chosen_spanish: murió el rey de Egipto
  alternatives_spanish:
  - el rey de Egipto murió
  - murió el monarca de Egipto
  lexicon: HALOT
  rationale: Es una afirmación narrativa directa; el orden español más natural conserva con precisión el referente del hebreo.
- source_word: וַיֵּאָנְחוּ
  english_pob_choice: groaned
  chosen_spanish: gimieron
  alternatives_spanish:
  - gimieron de dolor
  - suspiraron
  lexicon: HALOT
  rationale: El verbo expresa aflicción audible bajo opresión. «Gimieron» comunica bien ese peso de sufrimiento y es idiomático en español bíblico y moderno.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos del pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la forma hebrea de parentesco/ethnónimo, tal como la POB inglesa opta por «sons of Israel» para transparentar la forma original, aun cuando se refiere colectivamente al pueblo.
- source_word: מִן הָעֲבֹדָה
  english_pob_choice: because of the labor
  chosen_spanish: a causa del trabajo
  alternatives_spanish:
  - por el trabajo
  - a causa de la servidumbre
  - por la labor
  lexicon: HALOT
  rationale: En este contexto עֲבֹדָה denota labor forzada opresiva. «Trabajo» mantiene el vínculo con la palabra hebrea y, en español, permite incluir la carga de explotación sin introducir de forma explícita una interpretación más fuerte que la del término base.
- source_word: וַיִּזְעָקוּ
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - dieron un clamor
  lexicon: HALOT
  rationale: El verbo indica un grito intenso de angustia. «Clamaron» es natural en español y mantiene el registro bíblico sin volverlo arcaico.
- source_word: וַתַּעַל שַׁוְעָתָם
  english_pob_choice: their cry for help went up
  chosen_spanish: su clamor subió
  alternatives_spanish:
  - su súplica subió
  - su clamor ascendió
  lexicon: HALOT
  rationale: שַׁוְעָה es un clamor de auxilio; «clamor» preserva ese sentido y «subió» conserva la metáfora vertical del hebreo.
- source_word: אֶל הָאֱלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - hacia Dios
  lexicon: HALOT
  rationale: El hebreo dice «a Dios»; en español la preposición «a» expresa bien el movimiento dirigido al destinatario del clamor.
- source_word: מִן הָעֲבֹדָה (second occurrence)
  english_pob_choice: because of the labor
  chosen_spanish: a causa del trabajo
  alternatives_spanish:
  - por el trabajo
  - a causa de la labor
  lexicon: HALOT
  rationale: 'Se repite la misma palabra para conservar el paralelismo causal: el trabajo opresivo es el motivo tanto del gemido como del clamor que asciende.'
theological_decisions:
- issue: Cómo traducir עֲבֹדָה en el contexto de opresión egipcia
  english_pob_reading: labor
  chosen_spanish_reading: trabajo
  alternative_spanish_readings:
  - labor
  - servidumbre
  - esclavitud
  rationale: El contexto sí es opresivo y forzado, pero el audit trail inglés revisó «slavery» por «labor» para reflejar con mayor cercanía la palabra hebrea עֲבֹדָה y mantener consistencia en ambas ocurrencias. En español, «trabajo» conserva esa cercanía léxica mejor que «esclavitud», que ya interpreta más allá del término inmediato. Se evita suavizar la opresión, pero también se evita introducir una equivalencia más fuerte que la lectura revisada del POB inglés.
  doctrine_reference: Translation philosophy §1, §5
- issue: Renderizado de בְּנֵי יִשְׂרָאֵל con forma masculina plural
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos del pueblo de Israel
  rationale: Se preserva la forma masculina del hebreo y la transparencia respecto del original, siguiendo la decisión inglesa de no neutralizar el etnónimo. Aunque refiere colectivamente al pueblo, la forma elegida mantiene la huella formal del hebreo.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante: la redacción pasó de «slavery» a «labor» para traducir עֲבֹדָה con mayor cercanía al hebreo y mantener la repetición del término en ambos miembros de la oración. La versión española sigue esa revisión y evita convertir el término en una interpretación más fuerte que la adoptada en el último pase inglés. También se preserva la transparencia de «sons of Israel» y la metáfora ascendente de «their cry for help went up».'
  spanish_consistency_notes:
  - Se mantiene «trabajo» para las dos apariciones de עֲבֹדָה, en consonancia con la revisión inglesa.
  - «Los hijos de Israel» conserva la correspondencia formal con «the sons of Israel» del POB inglés.
  - «Clamaron» y «su clamor subió» reproducen el contraste entre el grito humano y la elevación del clamor hacia Dios sin agregar elementos inexistentes en el hebreo.
  - La sintaxis inicial con «Y aconteció» refleja un inicio narrativo sobrio y bíblicamente reconocible, sin caer en un calco rígido.
