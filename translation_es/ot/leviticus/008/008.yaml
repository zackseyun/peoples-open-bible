translation:
  language: es
  text: Y colocó sobre él el pectoral[a], y puso en el pectoral los Urim y los Tumim[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "la placa del pecho". El hebreo חֹשֶׁן se refiere a la pieza del pecho del sumo sacerdote; "pectoral" evita sugerir una armadura.
    reason: lexical_alternative
  - marker: b
    text: '"Urim" y "Tumim" son términos rituales hebreos tradicionalmente transliterados; su forma exacta y su modo de uso son inciertos.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: placed
  chosen_spanish: colocó
  alternatives_spanish:
  - puso
  - colocó
  lexicon: HALOT
  rationale: שׂוּם expresa 'poner/colocar/poner en su lugar'. En español, 'colocó' suena natural en un contexto ceremonial y conserva el matiz de poner con intención, sin forzar una traducción técnica.
- source_word: עָלָיו
  english_pob_choice: on him
  chosen_spanish: sobre él
  alternatives_spanish:
  - en él
  - encima de él
  lexicon: HALOT
  rationale: La preposición עַל con sufijo indica relación espacial sobre la persona vestida. 'Sobre él' conserva la imagen física del vestirse sacerdotal.
- source_word: הַחֹשֶׁן
  english_pob_choice: the breastpiece
  chosen_spanish: el pectoral
  alternatives_spanish:
  - el pectoral sacerdotal
  - la placa del pecho
  lexicon: HALOT
  rationale: En español, 'pectoral' comunica mejor la pieza sacerdotal del pecho sin sugerir armadura. Mantiene la cautela del POB inglés frente a 'breastplate', que puede inducir a error.
- source_word: וַיִּתֵּן
  english_pob_choice: put
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - puso
  lexicon: HALOT
  rationale: נָתַן aquí tiene sentido de introducir o poner un objeto en otro. 'Puso' es idiomático y corresponde bien al movimiento de introducir los objetos en el pectoral.
- source_word: אֶל הַחֹשֶׁן
  english_pob_choice: into the breastpiece
  chosen_spanish: en el pectoral
  alternatives_spanish:
  - dentro del pectoral
  - en el pectoral
  lexicon: HALOT
  rationale: Aunque אֶל puede sugerir dirección hacia, el contexto muestra depósito dentro del objeto. En español, 'en el pectoral' es natural; el sentido de inserción queda claro por el verbo 'puso'.
- source_word: הָאוּרִים
  english_pob_choice: the Urim
  chosen_spanish: los Urim
  alternatives_spanish:
  - Urim
  - las luces
  lexicon: HALOT
  rationale: Se translitera el término técnico cultual, como en la tradición auditada del POB, para preservar la incertidumbre sobre su forma y función. El plural en español acompaña el hebreo.
- source_word: הַתֻּמִּים
  english_pob_choice: the Thummim
  chosen_spanish: los Tumim
  alternatives_spanish:
  - Tumim
  - las perfecciones
  lexicon: HALOT
  rationale: También se translitera el término técnico paralelo a Urim. En español se adapta la forma al uso habitual ('Tumim'), evitando una interpretación especulativa como 'perfecciones' o 'completaciones'.
theological_decisions:
- issue: Naturaleza incierta de Urim y Tumim
  english_pob_reading: Transliterate as 'the Urim and the Thummim'
  chosen_spanish_reading: Transliterar como 'los Urim y los Tumim'
  alternative_spanish_readings:
  - las luces y las perfecciones
  - los sagrados lotes
  rationale: 'La traducción preserva la tensión documentada: el texto nombra objetos rituales cuya forma y uso exactos son inciertos. La transliteración evita resolver lo que el hebreo no aclara.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: This draft corrects the prior validation problem by anchoring every footnote marker directly in the Spanish text. It also preserves the source-grounded distinction between the priestly chest-piece and the technical ritual terms, without resolving the uncertainty about Urim and Tumim.
  spanish_consistency_notes:
  - 'Se mantiene un término único para חֹשֶׁן en toda la cláusula: ''pectoral''.'
  - Se conserva la transliteración de Urim/Tumim para reflejar su carácter técnico y la incertidumbre documentada.
  - La frase verbal distingue entre colocar sobre la persona y poner dentro del pectoral, como en el hebreo.
  - Se usa puntuación española y mayúscula inicial conforme al registro bíblico moderno.
