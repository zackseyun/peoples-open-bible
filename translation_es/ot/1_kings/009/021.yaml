translation:
  language: es
  text: sus hijos, los que quedaron después de ellos en la tierra, a quienes los hijos de Israel no habían podido dedicar[a] a la destrucción—Salomón los sometió a trabajo forzado, hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «dedicar a la destrucción»; también puede entenderse «poner bajo anatema» o «destruir por completo». El verbo alude a colocar personas o cosas bajo חרם, una dedicación irrevocable al juicio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵיהֶם
  english_pob_choice: their children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos
  - sus descendientes
  lexicon: HALOT
  rationale: בֵּן en plural con sufijo puede referirse a hijos literales o, más ampliamente, a descendientes. En español, «sus hijos» es natural y conserva el vínculo filial sin imponer una lectura exclusiva de varones; «sus descendientes» sería más explicativo pero menos directo.
- source_word: נֹתְרוּ אַחֲרֵיהֶם
  english_pob_choice: were left after them
  chosen_spanish: los que quedaron después de ellos
  alternatives_spanish:
  - los que quedaron tras ellos
  - los que sobrevivieron después de ellos
  lexicon: HALOT
  rationale: La forma expresa los que quedaron como remanente posterior a la generación anterior. «Los que quedaron después de ellos» refleja bien el valor resultativo y la relación temporal sin añadir matices de supervivencia que el hebreo no exige aquí.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en la tierra
  - en el país
  lexicon: HALOT
  rationale: En este contexto histórico, אֶרֶץ se refiere a la tierra/territorio. «La tierra» es la opción más fiel y bíblica en español; «el país» sonaría más moderno-administrativo y menos acorde al registro del pasaje.
- source_word: לֹא יָכְלוּ ... לְהַחֲרִימָם
  english_pob_choice: had not been able to devote to destruction
  chosen_spanish: no habían podido dedicar a la destrucción
  alternatives_spanish:
  - no habían podido destruir por completo
  - no habían podido poner bajo anatema
  lexicon: HALOT
  rationale: החרים conserva una tensión entre destrucción y consagración al juicio. «Dedicar a la destrucción» mantiene esa fuerza sin reducir el verbo a mera aniquilación ni sustituirlo por una expresión técnica menos transparente.
- source_word: וַיַּעֲלֵם
  english_pob_choice: conscripted
  chosen_spanish: los sometió
  alternatives_spanish:
  - los hizo servir
  - los reclutó para trabajo obligatorio
  - los sometió
  lexicon: HALOT
  rationale: En la construcción con לְמַס, el verbo comunica una acción administrativa de imposición laboral. «Los sometió» funciona bien en español con el complemento siguiente y evita perder la idea de coerción; el matiz de reclutamiento queda explicitado por «trabajo forzado».
- source_word: לְמַס עֹבֵד
  english_pob_choice: for forced labor
  chosen_spanish: a trabajo forzado
  alternatives_spanish:
  - para labor obligatoria
  - para trabajo de tributo
  - como esclavos de trabajo
  lexicon: HALOT
  rationale: מַס designa una carga/tributo de servicio, y עֹבֵד enfatiza labor. «Trabajo forzado» es claro y fiel para el lector moderno; «esclavos» iría más allá de la información del sintagma.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: HALOT
  rationale: La fórmula temporal se expresa con naturalidad en español como «hasta el día de hoy», que conserva la referencia abierta al presente del narrador.
theological_decisions:
- issue: Traducción de החרים en contexto de juicio/conquista
  english_pob_reading: devote to destruction
  chosen_spanish_reading: dedicar a la destrucción
  alternative_spanish_readings:
  - destruir por completo
  - poner bajo anatema
  rationale: El hebreo une la idea de destrucción con la de dedicar algo irrevocablemente al juicio divino. «Dedicar a la destrucción» preserva esa tensión teológica y evita suavizar el verbo o convertirlo en un tecnicismo opaco.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla'
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del audit trail: mantiene la frase final breve «hasta el día de hoy», conserva el objeto explícito con «los» antes de «sometió», y evita añadir una glosa explicativa dentro del texto principal. También refleja la decisión revisada de no expandir el pasaje con una apposición interpretativa, respetando la sintaxis compacta del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «la tierra» para אֶרֶץ, en línea con el uso bíblico estándar y con el inglés auditado «in the land».
  - Se evita «Cristo»/«SEÑOR» porque el versículo no contiene esos términos.
  - «Trabajo forzado» preserva el valor de מַס sin sobreespecificar condición jurídica como esclavitud.
  - El pie de nota usa un marcador único y anclado en «la tierra[a]», siguiendo la pauta de conservar alternativas semánticas documentadas.
