translation:
  language: es
  text: Y sus niños pequeños perdieron el ánimo[a], y las mujeres y los jóvenes iban desfalleciendo a causa de la sed, y caían en las plazas de la ciudad y en los pasajes de las puertas[b], y ya no quedaba fuerza en ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus infantes se desalentaron» o «sus niños pequeños desfallecieron». El griego τὰ νήπια puede referirse a niños muy pequeños, incluso infantes, y ἠθύμησεν puede expresar desánimo o desfallecimiento interior.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en las calles anchas de la ciudad y en los pasajes de las puertas» o «en las plazas de la ciudad y en los accesos a las puertas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠθύμησεν
  english_pob_choice: lost heart
  chosen_spanish: perdieron el ánimo
  alternatives_spanish:
  - se desanimaron
  - desfallecieron de espíritu
  - perdieron el valor
  lexicon: LSJ
  rationale: ἀθυμέω expresa abatimiento, desánimo o pérdida de ánimo. «Perdieron el ánimo» conserva ese colapso interior sin convertirlo en desesperación total ni en simple debilidad física.
- source_word: τὰ νήπια
  english_pob_choice: little children
  chosen_spanish: niños pequeños
  alternatives_spanish:
  - infantes
  - niños de corta edad
  - pequeños niños
  lexicon: LSJ
  rationale: νήπια puede abarcar niños muy pequeños, incluso lactantes, pero en este contexto conviene una expresión natural y amplia. «Niños pequeños» mantiene la vulnerabilidad sin especificar más de lo que el griego exige.
- source_word: ἐξέλιπον
  english_pob_choice: were failing
  chosen_spanish: iban desfalleciendo
  alternatives_spanish:
  - se estaban consumiendo
  - se iban agotando
  - iban flaqueando
  lexicon: LSJ
  rationale: El imperfecto indica un proceso en curso. «Iban desfalleciendo» comunica bien el deterioro progresivo por la sed y deja visible el aspecto durativo.
- source_word: ἀπὸ τῆς δίψης
  english_pob_choice: from thirst
  chosen_spanish: a causa de la sed
  alternatives_spanish:
  - por la sed
  - a causa de la sed extrema
  lexicon: LSJ
  rationale: La preposición expresa causa. «A causa de la sed» es claro y natural en español, sin perder la relación causal directa del griego.
- source_word: ἔπιπτον
  english_pob_choice: were falling
  chosen_spanish: caían
  alternatives_spanish:
  - seguían cayendo
  - iban cayendo
  - se desplomaban
  lexicon: LSJ
  rationale: El imperfecto señala acción repetida o continua. «Caían» conserva la sencillez del griego; el contexto ya comunica que no fue un solo evento aislado.
- source_word: πλατείαις
  english_pob_choice: squares
  chosen_spanish: plazas
  alternatives_spanish:
  - calles anchas
  - espacios abiertos
  - plazuelas
  lexicon: LSJ
  rationale: πλατεῖαις se refiere a espacios públicos anchos de la ciudad. «Plazas» es una equivalencia natural en español moderno y mantiene la idea de área abierta urbana.
- source_word: διόδοις τῶν πυλῶν
  english_pob_choice: passages of the gates
  chosen_spanish: pasadizos de las puertas
  alternatives_spanish:
  - pasajes de las puertas
  - pasos de las puertas
  - accesos de las puertas
  lexicon: LSJ
  rationale: La expresión apunta a los corredores o pasos asociados con las puertas de la ciudad. «Pasadizos de las puertas» conserva la imagen espacial del griego sin forzar un término técnico ajeno al español.
- source_word: κραταίωσις
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - vigor
  - fortaleza
  - resistencia
  lexicon: LSJ
  rationale: El sustantivo denota capacidad de sostenerse o resistir. En este contexto de agotamiento por sed, «fuerza» es la opción más directa y transparente.
- source_word: οὐκ ἦν ... ἔτι ἐν αὐτοῖς
  english_pob_choice: there was no strength left in them
  chosen_spanish: ya no quedaba fuerza en ellos
  alternatives_spanish:
  - no les quedaba fuerza alguna
  - ya no tenían fuerza
  - no quedaba fuerza en su interior
  lexicon: LSJ
  rationale: La construcción idiomática combina negación y valor temporal de ἔτι. «Ya no quedaba fuerza en ellos» mantiene el sentido de agotamiento total y suena natural en español.
translation_notes:
  revision_awareness: La versión española sigue de cerca el griego de Judith 7:22 y el análisis léxico del POB inglés. Se preservan los imperfectos con valor progresivo («iban desfalleciendo», «caían») y la doble dimensión física/afectiva de ἠθύμησεν, sin intensificar más allá de la evidencia textual.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al nombre divino; este versículo no lo contiene.
  - Se mantiene «fuerza» para κραταίωσις por coherencia con la elección inglesa y porque encaja con el contexto de sed y agotamiento.
  - «Niños pequeños» y «pasadizos de las puertas» buscan un español readable sin perder el matiz urbano del griego.
  - No se introducen términos doctrinales ajenos al pasaje; la traducción es descriptiva y narrativa.
