    rationale: 'La redacción no suena del todo idiomática en español. Conviene alinearla mejor con la nota inglesa: «O, más idiomáticamente: “Los días del hombre pueden llegar a muchos años: cien”» o equivalente más claro.'
  revised_spanish_text: El número de los días del hombre es, a lo sumo, de cien años[a].
