    text: El griego fuente está señalado con incertidumbre de validación textual («major_mismatch»); la redacción sigue el texto de Swete transmitido en el expediente auditado.
    reason: textual_variant
lexical_decisions:
- source_word: μηδέποτε
  english_pob_choice: Never
  chosen_spanish: Nunca
  alternatives_spanish:
  - Jamás
  - Nunca jamás
  lexicon: LSJ
  rationale: Adverbio de negación temporal enfática. «Nunca» es natural en español y conserva la fuerza prohibitiva sin añadir matiz no presente en el griego.
- source_word: δευτερώσῃς
  english_pob_choice: repeat
  chosen_spanish: repitas
  alternatives_spanish:
  - digas por segunda vez
  - reiteres
  - repitas de nuevo
  lexicon: LSJ
  rationale: El verbo griego expresa literalmente ‘hacer por segunda vez’; con λόγον, el sentido idiomático es repetir lo dicho o referido. «Repitas» comunica bien la idea verbal sin endurecer el español.
- source_word: λόγον
  english_pob_choice: a word
  chosen_spanish: una palabra
  alternatives_spanish:
  - un dicho
  - un asunto
  - una declaración
  lexicon: LSJ
  rationale: λόγος puede significar ‘palabra’, ‘asunto’ o ‘declaración’. Dado que el texto invita a no repetir λόγον, «una palabra» conserva la forma breve y proverbial del original; la alternativa de sentido más amplio se mantiene en nota.
- source_word: οὐθέν
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - en nada
  - de ningún modo
  lexicon: LSJ
  rationale: Valor neutro e intensivo; «nada» es la equivalencia más directa y idiomática en español.
- source_word: οὐ μὴ ἐλαττονωθῇ
  english_pob_choice: will be taken from you
  chosen_spanish: se te quitará
  alternatives_spanish:
  - te será disminuido
  - se te disminuirá
  - no perderás nada
  lexicon: LSJ
  rationale: La pasiva con doble negación fuerte expresa que nada será disminuido. «Se te quitará» reproduce con claridad el resultado práctico indicado por la traducción inglesa auditada, sin forzar un sujeto explícito inexistente en el griego.
translation_notes:
  revision_awareness: El expediente inglés indica alta concordancia y ninguna revisión aplicada; se ha seguido el texto griego de Swete tal como figura en el paquete de fuente, manteniendo la tensión lexical de λόγον con nota alternativa y reflejando la incertidumbre textual documentada.
  spanish_consistency_notes:
  - Se mantiene el tuteo impersonal estándar con «se te quitará» para reflejar la pasiva griega de manera natural en español.
  - Se conserva la brevedad proverbial del verso sin expandirlo a una paráfrasis interpretativa.
  - «Palabra» se usa como opción principal por fidelidad formal; la amplitud semántica de λόγος queda documentada en nota para no borrar la tensión lexical.
