translation:
  language: es
  text: 'Y dijo[a]: «¿Qué ves, Amós?» Y dije: «Una cesta de fruta de verano». Entonces Yahvé me dijo: «Ha llegado el fin sobre mi pueblo Israel; no volveré a pasar por ellos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo «fruta de verano» (qayits) suena de forma intencional como «el fin» (qets), formando un juego de palabras que vincula la visión con el anuncio de juicio.
    reason: cultural_note
  - marker: b
    text: 'O: «no volveré a perdonarlos» / «no volveré a pasar por alto a Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol de אמר introduce el discurso directo de manera natural con «Y dijo». Mantiene el avance narrativo sin añadir una relación temporal más fuerte de la que exige el hebreo.
- source_word: מָה אַתָּה רֹאֶה
  english_pob_choice: What do you see
  chosen_spanish: ¿Qué ves?
  alternatives_spanish:
  - ¿Qué estás viendo?
  lexicon: HALOT
  rationale: La pregunta en español suena más natural en presente simple. Conserva la inmediatez de la visión sin sobrecargar el aspecto verbal.
- source_word: עָמוֹס
  english_pob_choice: Amos
  chosen_spanish: Amós
  alternatives_spanish:
  - Amos
  lexicon: Nombre propio
  rationale: Se usa la forma castellana habitual del nombre del profeta, con tilde prosódica conforme al español.
- source_word: כְּלוּב קָיִץ
  english_pob_choice: a basket of summer fruit
  chosen_spanish: una cesta de fruto de verano
  alternatives_spanish:
  - una cesta de fruta de verano
  - una cesta de frutos de verano
  lexicon: HALOT
  rationale: «כְּלוּב» se expresa de forma transparente como «cesta»; «קָיִץ» se mantiene como «fruto de verano» para conservar mejor el juego de palabras con הַקֵּץ («el fin»). «Fruto de verano» deja visible la asociación fonética y semántica del pasaje.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrama: «Yahvé», preservando el nombre propio divino en lugar de sustituirlo por un título.'
- source_word: בָּא הַקֵּץ
  english_pob_choice: The end has come
  chosen_spanish: Ha llegado el fin
  alternatives_spanish:
  - El fin ha llegado
  - Ha venido el fin
  lexicon: HALOT
  rationale: '«בָּא» se traduce con un perfecto de llegada: «ha llegado». «El fin» conserva el artículo definido del hebreo y permite mantener el vínculo sonoro con «fruto de verano» en la nota.'
- source_word: אֶל עַמִּי יִשְׂרָאֵל
  english_pob_choice: upon my people Israel
  chosen_spanish: a mi pueblo Israel
  alternatives_spanish:
  - sobre mi pueblo Israel
  - contra mi pueblo Israel
  lexicon: HALOT
  rationale: El hebreo usa אֶל en un contexto de juicio; en español, «a mi pueblo Israel» es la forma más fiel y menos interpretativa, dejando el matiz de amenaza para el conjunto del versículo y la nota.
- source_word: לֹא אוֹסִיף עוֹד
  english_pob_choice: I will not again
  chosen_spanish: no volveré a
  alternatives_spanish:
  - ya no volveré a
  - no seguiré
  lexicon: HALOT
  rationale: La fórmula expresa cese de repetición. «No volveré a» comunica de modo idiomático que no habrá una acción repetida posterior.
- source_word: עֲבוֹר לוֹ
  english_pob_choice: pass by them
  chosen_spanish: pasar por él
  alternatives_spanish:
  - pasar de largo ante él
  - pasar por ellos
  - cruzar ante él
  lexicon: HALOT
  rationale: «עבר» en este contexto puede leerse como «pasar por/by» con sentido de dejar de intervenir. Se conserva una formulación relativamente transparente en español. El pronombre singular («él») sigue el referente colectivo-personal del hebreo en una construcción más natural en español, sin resolver del todo el matiz de juicio/sparing.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrama; la política del proyecto pide «Yahvé» en el texto principal. Esto preserva el nombre pactual de Dios sin la sustitución tradicional por «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de עֲבוֹר לוֹ en contexto de juicio
  english_pob_reading: I will not again pass by them
  chosen_spanish_reading: no volveré a pasar por él
  alternative_spanish_readings:
  - no volveré a pasar por ellos
  - no volveré a perdonarlos
  - no volveré a dejarlos pasar
  rationale: Se conserva la metáfora de «pasar por/by» en lugar de explicitar «perdonar» o «perdonarlos» en el texto principal. Así no se borra la tensión lexical del hebreo, aunque el contexto comunica claramente que se trata del fin de la paciencia divina.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El control de revisión indica acuerdo alto y sin cambios necesarios en el inglés auditado; esta versión española sigue esa lectura estable, manteniendo el juego de palabras y la ambigüedad de עֲבוֹר לוֹ en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la terminología del proyecto para יְהוָה.
  - Se mantiene «Amós» con acentuación española estándar.
  - Se conserva la tensión entre el literal «pasar por él» y el sentido interpretativo de cese de perdón en la nota.
  - La nota del juego de palabras no se resuelve dentro del texto principal para no perder la correspondencia sonora hebrea.
  - «Pueblo Israel» se mantiene sin añadir artículos o preposiciones explicativas innecesarias.
