source:
  edition: WLC
  text: לֹ֣א אִ֥ישׁ אֵל֙ וִֽ/יכַזֵּ֔ב וּ/בֶן אָדָ֖ם וְ/יִתְנֶחָ֑ם הַ/ה֤וּא אָמַר֙ וְ/לֹ֣א יַעֲשֶׂ֔ה וְ/דִבֶּ֖ר וְ/לֹ֥א יְקִימֶֽ/נָּה־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/023/019.yaml
  text: God is not a man[a], that he should lie, or a son of man, that he should change his mind. Has he said, and will he not do it? Or has he spoken[c][b], and will he not establish it?
  footnotes:
  - marker: a
    text: Or 'relent'; traditionally 'repent.' The Hebrew verb can denote changing one's course or relenting, but here it speaks of God's reliability, not moral repentance.
    reason: lexical_alternative
  - marker: b
    text: '''Son of man'' here is a Hebrew idiom for a human being, not a messianic title.'
    reason: cultural_note
  - marker: c
    text: Or 'fulfill it' or 'confirm it.' The Hebrew literally means 'make it stand.'
    reason: lexical_alternative
