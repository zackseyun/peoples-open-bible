translation:
  language: es
  text: Entonces los dos hombres regresaron, bajaron de la región montañosa, cruzaron y llegaron a Josué, hijo de Nun; y le contaron todo lo que les había sucedido[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «todo lo que les había acontecido»; más literalmente, «todas las cosas que los encontraron».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: returned
  chosen_spanish: regresaron
  alternatives_spanish:
  - volvieron
  - retornaron
  lexicon: HALOT
  rationale: שׁוּב en narrativa describe el regreso de los hombres; 'regresaron' suena natural en español actual y conserva el valor de retorno sin sobrerrevestirlo con estilo arcaizante.
- source_word: שְׁנֵי הָאֲנָשִׁים
  english_pob_choice: the two men
  chosen_spanish: los dos hombres
  alternatives_spanish:
  - los dos varones
  - los dos hombres [es decir, espías]
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'los dos hombres'. Se mantiene esa formulación sin introducir 'espías', que no aparece en el sintagma.
- source_word: וַיֵּרְדוּ מֵהָהָר
  english_pob_choice: came down from the hill country
  chosen_spanish: bajaron de la región montañosa
  alternatives_spanish:
  - bajaron del monte
  - descendieron de la región montañosa
  lexicon: HALOT
  rationale: הָהָר puede referirse a una zona montañosa, no necesariamente a un solo monte. 'Región montañosa' transmite bien el sentido geográfico y evita una lectura demasiado literal.
- source_word: וַיַּעַבְרוּ
  english_pob_choice: crossed over
  chosen_spanish: cruzaron
  alternatives_spanish:
  - pasaron
  - cruzaron al otro lado
  lexicon: HALOT
  rationale: עָבַר expresa cruce o paso al otro lado. En español, 'cruzaron' conserva la concisión del hebreo; el complemento implícito se entiende por el contexto narrativo.
- source_word: וַיָּבֹאוּ אֶל יְהוֹשֻׁעַ בִּן נוּן
  english_pob_choice: came to Joshua son of Nun
  chosen_spanish: llegaron a Josué, hijo de Nun
  alternatives_spanish:
  - vinieron a Josué, hijo de Nun
  - fueron a Josué, hijo de Nun
  lexicon: HALOT
  rationale: בוא con אֶל se expresa naturalmente como 'llegaron a'. Se conserva el patronímico en forma bíblica estándar y clara para el lector hispano.
- source_word: וַיְסַפְּרוּ לֹו
  english_pob_choice: they told him
  chosen_spanish: le contaron
  alternatives_spanish:
  - le relataron
  - le informaron
  lexicon: HALOT
  rationale: סִפֵּר en piel aquí significa narrar o contar. 'Le contaron' es idiomático, claro y suficientemente formal.
- source_word: אֵת כָּל הַמֹּצְאוֹת אוֹתָם
  english_pob_choice: all that had happened to them
  chosen_spanish: todo lo que les había sucedido
  alternatives_spanish:
  - todo lo que les había acontecido
  - todas las cosas que los habían encontrado
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: literalmente ''todas las cosas que los encontraron''. En español se traduce por el sentido natural ''todo lo que les había sucedido'', preservando el alcance de כָּל y evitando una literalidad extraña.'
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del contexto auditado. Se mantuvo la equivalencia óptima del original: ''regresaron'' para שוב, ''región montañosa'' para הָהָר, y una traducción idiomática de la frase final con el matiz alternativo preservado en nota, en línea con la revisión inglesa que prefirió ''all'' por corresponder mejor a כָּל.'
  spanish_consistency_notes:
  - Se mantiene 'Josué, hijo de Nun' como identificación formal estándar.
  - No se introduce el oficio de 'espías' en el texto principal, porque el hebreo aquí dice simplemente 'los dos hombres'.
  - 'La nota conserva la tensión del hebreo literal de מצא con objeto: ''las cosas que los encontraron'', sin imponer una paráfrasis interpretativa única.'
