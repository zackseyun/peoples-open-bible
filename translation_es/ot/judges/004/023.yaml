review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del hebreo: Dios es el sujeto explícito, Jabín es el objeto, y la escena ocurre ''en aquel día''. También preserva bien ''rey de Canaán'' y ''los hijos de Israel'' con nota alternativa. Sin embargo, לִפְנֵי se vierte mejor aquí como ''ante'' que como ''delante de'', porque el sentido es relacional/judicial-militar más que espacial, y en español bíblico-natural ''ante los hijos de Israel'' suena más preciso y menos físico.'
  spanish_quality_summary: El español es claro y digno, pero 'delante de los hijos de Israel' suena algo rígido y espacial. 'Ante los hijos de Israel' mejora la fluidez y mantiene el registro bíblico. La nota al pie actual repite innecesariamente la opción principal; conviene conservar solo las alternativas reales frente a la forma del texto.
  glossary_alignment: 'La terminología principal está alineada con el proyecto: אֱלֹהִים = ''Dios'', יָבִין = ''Jabín'', מֶלֶךְ כְּנָעַן = ''rey de Canaán'', בְּנֵי יִשְׂרָאֵל = ''los hijos de Israel''. La decisión de ''sometió'' para וַיַּכְנַע es adecuada y fiel al rationale auditado.'
  issues:
  - severity: medium
    issue: '''delante de'' para לִפְנֵי suena demasiado espacial'
    rationale: En este contexto de sometimiento político-militar, לִפְנֵי expresa relación respecto de Israel ('ante', 'en presencia de', 'frente a') más que ubicación física. 'Ante' suena más natural y preciso en español bíblico moderno.
  - severity: low
    issue: La nota al pie repite la lectura principal como alternativa
    rationale: Si el texto principal ya dice 'los hijos de Israel', la nota no debería presentarlo también como opción alternativa. Basta con registrar otras posibilidades como 'los israelitas' o 'los hijos de Israel' si se desea reflejar la equivalencia inglesa; mejor aún, aclarar que el hebreo literalmente dice 'los hijos de Israel'.
  revised_spanish_text: Así, en aquel día Dios sometió a Jabín, rey de Canaán, ante los hijos de Israel[a].
  revised_footnotes:
  - marker: a
    text: O “los israelitas”. El hebreo dice literalmente “los hijos de Israel”.
    reason: lexical_alternative
  revision_rationale: Se ajusta לִפְנֵי a 'ante' para un español más natural y más exacto al matiz relacional del contexto, y se simplifica la nota para evitar duplicar la lectura principal mientras se preserva la alternativa idiomática documentada en el rastro inglés.
