translation:
  language: es
  text: Y ahora tus juicios son muchos y verdaderos en lo que has hecho conmigo por causa de mis pecados y de los pecados de mis padres[a], porque no guardamos tus mandamientos[b]; pues no anduvimos en la verdad delante de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justos». El griego dice «verdaderos», y en contexto esa verdad implica la rectitud de los juicios de Dios.
    reason: lexical_alternative
  - marker: b
    text: «Andar en la verdad» es un modismo bíblico para vivir con fidelidad y sinceridad delante de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίσεις
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - sentencias
  - decisiones judiciales
  lexicon: LSJ
  rationale: En este contexto penitencial, κρίσεις alude a los actos o veredictos judiciales de Dios. «Juicios» conserva ese campo semántico en español y suena natural en registro bíblico.
- source_word: ἀληθιναί
  english_pob_choice: 'true'
  chosen_spanish: verdaderos
  alternatives_spanish:
  - justos
  - genuinos
  lexicon: LSJ
  rationale: La forma más directa es «verdaderos». Mantiene la correspondencia con el griego ἀληθιναί y deja que el contexto exprese que esos juicios son también rectos o correctos, sin resolver la tensión solo con «justos».
- source_word: ἐξ ἐμοῦ ποιῆσαι
  english_pob_choice: in what you have done to me
  chosen_spanish: en lo que has hecho conmigo
  alternatives_spanish:
  - al obrar conmigo
  - en tu trato conmigo
  - en lo que has hecho contra mí
  lexicon: LSJ
  rationale: La construcción griega es idiomática y algo compacta. «En lo que has hecho conmigo» refleja la relación directa entre la acción divina y Tobit sin añadir hostilidad que el texto no especifica.
- source_word: περὶ τῶν ἁμαρτιῶν μου καὶ τῶν πατέρων μου
  english_pob_choice: because of my sins and the sins of my fathers
  chosen_spanish: por causa de mis pecados y de los pecados de mis padres
  alternatives_spanish:
  - a causa de mis pecados y de los de mis padres
  - respecto de mis pecados y de los pecados de mis padres
  lexicon: LSJ
  rationale: περί aquí indica referencia o base causal. «Por causa de» comunica bien esa relación en español y conserva la confesión corporativa sin ampliar el texto hacia una doctrina de culpa heredada.
- source_word: ἐντολάς
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - preceptos
  - órdenes
  lexicon: LSJ
  rationale: «Mandamientos» es la equivalencia más estable para el lenguaje de alianza y obediencia moral que presupone ἐντολάς.
- source_word: ἐπορεύθημεν ἐν ἀληθείᾳ
  english_pob_choice: we did not walk in truth
  chosen_spanish: no anduvimos en la verdad
  alternatives_spanish:
  - no vivimos fielmente
  - no anduvimos fielmente
  - no nos conducimos con verdad
  lexicon: LSJ
  rationale: «Anduvimos» reproduce el idiomático hebraico-griego de conducta moral. «En la verdad» conserva el enlace léxico con ἀληθιναί y permite que el sentido de fidelidad surja del contexto.
- source_word: ἐνώπιόν σου
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - ante ti
  lexicon: LSJ
  rationale: «Delante de ti» es breve, natural y retiene el matiz de vivir expuestos a la mirada divina.
theological_decisions:
- issue: ¿Traducir el atributo de los juicios divinos como «verdaderos» o como «justos»?
  english_pob_reading: true, with a note that the context affirms the rightness of God's judgments.
  chosen_spanish_reading: «verdaderos», con nota que reconoce la posible lectura «justos».
  alternative_spanish_readings:
  - justos
  - rectos
  rationale: 'El griego dice ἀληθιναί, no δίκαιαι. «Verdaderos» preserva la palabra fuente y evita borrar la tensión: el texto confiesa que los juicios de Dios son correctos, pero lo hace usando el lenguaje de verdad.'
  doctrine_reference: Priorizar la palabra original sin imponer una aclaración doctrinal que el versículo no formula explícitamente.
- issue: ¿Cómo reflejar la confesión sobre los pecados de los padres sin convertirla en una tesis sobre culpa heredada?
  english_pob_reading: my sins and the sins of my fathers
  chosen_spanish_reading: mis pecados y los pecados de mis padres
  alternative_spanish_readings:
  - los pecados de mis antepasados
  - la culpa de mis padres
  rationale: La frase griega nombra ambos conjuntos de pecados de manera explícita. La traducción conserva la confesión corporativa/familiar sin ampliar el alcance doctrinal más allá de lo que dice el texto.
  doctrine_reference: No importar una doctrina de culpabilidad heredada que el pasaje no desarrolla.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Swete 1909 y el cierre editorial del POB en inglés: se mantiene «verdaderos» para ἀληθιναί, se conserva la confesión de los pecados de los padres sin expandirla doctrinalmente, y se resuelve ἐξ ἐμοῦ ποιῆσαι con una construcción española natural («en lo que has hecho conmigo») que refleja la revisión más reciente del audit trail. También se conserva el paralelismo entre «juicios», «mandamientos» y «andar en la verdad».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - «Juicios» mantiene coherencia con el POB inglés «judgments».
  - «Mandamientos» se reserva para ἐντολάς en sentido de alianza/obediencia.
  - «Andar en la verdad» se conserva como modismo bíblico, con nota explicativa.
  - Se evita sustituir «verdaderos» por «justos» en el texto principal para no borrar la tensión lexical del griego.
