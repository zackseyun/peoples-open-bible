id: SNG.7.7
reference: Song of Songs 7:7
source:
  edition: WLC
  text: מַה יָּפִית֙ וּ/מַה נָּעַ֔מְתְּ אַהֲבָ֖ה בַּ/תַּֽעֲנוּגִֽים־־׃
translation:
  text: How beautiful and how delightful you are[a], O love[b], with your pleasures!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among delights' or 'in delights.' The Hebrew phrase בַּתַּעֲנוּגִים is compact and may describe either the sphere of delight or the beloved as characterized by delights.
    reason: lexical_alternative
  - marker: b
    text: Or 'my love' or 'beloved.' The Hebrew אַהֲבָה is literally 'love' and functions here as a term of address.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  chosen: How
  alternatives:
  - How much
  - What
  lexicon: HALOT
  rationale: Exclamatory מַה before an adjective/verb is best rendered idiomatically as 'How,' introducing admiration rather than a question.
- source_word: יָּפִית
  chosen: beautiful you are
  alternatives:
  - fair you are
  - beautiful
  lexicon: HALOT
  rationale: From יפה, denoting beauty/fairness. 'Beautiful you are' preserves the second feminine singular address and the exclamatory sense in natural English.
- source_word: וּמַה
  chosen: and how
  alternatives:
  - and what
  - how also
  lexicon: HALOT
  rationale: 'The conjunction plus repeated exclamatory מַה creates a parallel intensification: ''and how'' fits the poetic structure.'
- source_word: נָּעַמְתְּ
  chosen: delightful
  alternatives:
  - pleasant
  - lovely
  - sweet
  lexicon: HALOT
  rationale: From נעם, expressing pleasantness or sweetness. 'Delightful' pairs well with the following noun for pleasures/delights and suits the romantic poetic register.
- source_word: אַהֲבָה
  chosen: O love
  alternatives:
  - my love
  - beloved
  - love
  lexicon: HALOT
  rationale: The noun is a direct address. 'O love' preserves the vocative force without adding the possessive 'my,' which is not explicit in the Hebrew. 'Beloved' is possible but shifts from abstract noun to relational title.
- source_word: בַּתַּעֲנוּגִים
  chosen: with your pleasures
  alternatives:
  - among delights
  - in delights
  - with delights
  lexicon: HALOT
  rationale: The preposition ב plus the plural of תענוג denotes the sphere or accompaniment of delights/pleasures. 'With your pleasures' makes good sense in English poetry and reflects the woman's delightful charms without over-paraphrasing. The possessive 'your' is implied by the direct praise of the addressee's qualities.
