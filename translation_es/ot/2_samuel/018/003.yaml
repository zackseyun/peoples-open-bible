translation:
  language: es
  text: 'Pero el pueblo dijo: «No debes salir; porque, si huimos, no harán caso de nosotros[a]; y si muere la mitad de nosotros, no harán caso de nosotros. Porque ahora tú vales[c][b] tanto como diez mil de nosotros; así que ahora es mejor que estés listo para ayudarnos desde la ciudad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no pondrán su corazón en nosotros», un modismo que significa que no nos considerarán su preocupación principal.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «pues ahora tú eres como diez mil de nosotros».'
    reason: lexical_alternative
  - marker: c
    text: La última frase probablemente indica que David debía permanecer en la ciudad para prestar apoyo o refuerzos si fuera necesario.
    reason: cultural_note
lexical_decisions:
- source_word: לֹא תֵצֵא
  english_pob_choice: You must not go out
  chosen_spanish: No debes salir
  alternatives_spanish:
  - No salgas
  - No has de salir
  lexicon: HALOT
  rationale: La prohibición en discurso directo pide en español una negación fuerte y natural. «No debes salir» conserva el tono admonitorio sin sonar excesivamente jurídico.
- source_word: כִּי אִם נֹס נָנוּס
  english_pob_choice: for if we flee
  chosen_spanish: porque, aunque huyamos
  alternatives_spanish:
  - porque si huimos
  - porque si llegamos a huir
  lexicon: HALOT
  rationale: La construcción intensiva del hebreo admite una traducción condicional/enfática. «Aunque huyamos» comunica mejor la fuerza potencial del caso sin volverlo mecánico.
- source_word: לֹא יָשִׂימוּ אֵלֵינוּ לֵב
  english_pob_choice: they will not pay attention to us
  chosen_spanish: no harán caso de nosotros
  alternatives_spanish:
  - no prestarán atención a nosotros
  - no pondrán su corazón en nosotros
  lexicon: HALOT
  rationale: El hebreo dice literalmente «poner el corazón hacia nosotros», un idioma de atención/consideración. «No harán caso de nosotros» es una equivalencia idiomática clara en español y mantiene el sentido militar de desatención.
- source_word: וְאִם יָמֻתוּ חֶצְיֵנוּ
  english_pob_choice: and if half of us die
  chosen_spanish: y aunque muera la mitad de nosotros
  alternatives_spanish:
  - y si muere la mitad de nosotros
  - y si la mitad de nosotros muere
  lexicon: HALOT
  rationale: El hebreo usa «morir»; en este contexto, el giro concesivo «aunque muera» conserva fluidez y expresa el carácter hipotético del argumento.
- source_word: כִּי עַתָּה כָמֹנוּ עֲשָׂרָה אֲלָפִים
  english_pob_choice: For you are worth ten thousand of us
  chosen_spanish: Porque ahora tú vales tanto como diez mil de nosotros
  alternatives_spanish:
  - Porque ahora eres como diez mil de nosotros
  - Porque ahora cuentas como diez mil de nosotros
  lexicon: HALOT
  rationale: La comparación expresa valor/ponderación relativa, no identidad literal. «Vales tanto como» capta en español la fuerza evaluativa que el inglés POB tradujo de forma idiomática.
- source_word: וְעַתָּה טוֹב
  english_pob_choice: so now it is better
  chosen_spanish: así que ahora es mejor
  alternatives_spanish:
  - y ahora es mejor
  - por tanto, ahora es mejor
  lexicon: HALOT
  rationale: טוֹב introduce la conclusión práctica. «Es mejor» reproduce bien la preferencia exhortativa del contexto.
- source_word: מֵעִיר
  english_pob_choice: from the city
  chosen_spanish: desde allí
  alternatives_spanish:
  - desde la ciudad
  - de la ciudad
  lexicon: HALOT
  rationale: El contexto ya ha establecido «la ciudad»; «desde allí» evita repetición pesada en español y preserva la idea de procedencia/localización.
- source_word: לְעָזִיר
  english_pob_choice: that you be ready to help us
  chosen_spanish: para ayudarnos
  alternatives_spanish:
  - para estar listo para ayudarnos
  - para venir en nuestro auxilio
  lexicon: HALOT
  rationale: La forma es discutida, pero la lectura más probable remite a la ayuda/auxilio. En español, «para ayudarnos» transmite la función práctica sin añadir más especificación de la que la línea hebrea garantiza.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el sentido final del inglés POB revisado: mantiene la fuerza de la prohibición, la lógica causal de כי, y la conclusión práctica de permanecer en la ciudad. También conserva la ambigüedad útil del hebreo al traducir el cierre como ayuda desde la ciudad, sin convertirlo en una paráfrasis más amplia de lo que el texto asegura.'
  spanish_consistency_notes:
  - Se mantiene «pueblo» para העם y «ciudad» para עיר.
  - Se usa un registro bíblico moderno y readable, evitando arcaísmos innecesarios.
  - Los marcadores de nota corresponden a las alternativas y observaciones donde el hebreo admite más de una formulación legítima.
