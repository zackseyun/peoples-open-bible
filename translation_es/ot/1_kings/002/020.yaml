translation:
  language: es
  text: 'Ella dijo[a]: «Te hago una pequeña petición; no me rechaces». Y el rey le dijo: «Pide, mi madre, porque no te rechazaré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Modismo hebreo: literalmente, ‘no apartes mi rostro’ / ‘no apartaré tu rostro’; es decir, ‘no me rechaces’ / ‘no te rechazaré’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאֵלָה אַחַת קְטַנָּה
  english_pob_choice: one small request
  chosen_spanish: una sola petición pequeña
  alternatives_spanish:
  - una pequeña petición
  - una sola solicitud pequeña
  lexicon: HALOT
  rationale: שְׁאֵלָה designa una petición o solicitud; אַחַת aporta la idea de ‘una sola’; y קְטַנָּה suaviza la petición como algo modesto. ‘Petición pequeña’ conserva ese matiz de modestia sin sonar forzado en español.
- source_word: שֹׁאֶלֶת מֵאִתָּךְ
  english_pob_choice: I am asking ... of you
  chosen_spanish: es la que te hago
  alternatives_spanish:
  - te estoy pidiendo
  - te solicito
  lexicon: HALOT
  rationale: El participio expresa acción presente en el discurso directo. En español, ‘te hago’ mantiene el valor interpersonal de la súplica y evita una construcción rígida; el complemento ‘de ti’ resultaría menos natural aquí.
- source_word: אַל תָּשֶׁב אֶת פָּנַי
  english_pob_choice: do not refuse me
  chosen_spanish: no me rechaces
  alternatives_spanish:
  - no apartes mi rostro
  - no me niegues
  lexicon: HALOT
  rationale: Aunque la imagen literal es ‘no vuelvas atrás/alejes mi rostro’, el sentido idiomático es no rechazar la petición. ‘No me rechaces’ conserva ese valor y reproduce la decisión revisada del POB inglés.
- source_word: שַׁאֲלִי
  english_pob_choice: Ask
  chosen_spanish: Pide
  alternatives_spanish:
  - Pregunta
  - Haz tu petición
  lexicon: HALOT
  rationale: El imperativo de שאל pide una forma breve y directa. ‘Pide’ comunica con naturalidad el acto de formular una solicitud.
- source_word: אִמִּי
  english_pob_choice: my mother
  chosen_spanish: madre mía
  alternatives_spanish:
  - mi madre
  - madre
  lexicon: HALOT
  rationale: El sufijo posesivo es explícito y expresa cercanía respetuosa en el contexto real. ‘Madre mía’ suena natural en el español bíblico y mantiene el matiz afectivo y reverente.
- source_word: לֹא אָשִׁיב אֶת פָּנָיִךְ
  english_pob_choice: I will not refuse you
  chosen_spanish: no te rechazaré
  alternatives_spanish:
  - no te negaré
  - no apartaré tu rostro
  lexicon: HALOT
  rationale: La frase repite el mismo idiomátismo con segunda persona femenina. En español, ‘no te rechazaré’ es la correspondencia más clara y conserva la repetición semántica del versículo.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que reemplazó la traducción demasiado literal de la expresión facial por el sentido idiomático de rechazo/aceptación. Se conservó también la repetición verbal del pedido y de la respuesta del rey, pero en español con un equivalente natural.
  spanish_consistency_notes:
  - Se usó ‘rechaces/rechazaré’ para reflejar el valor idiomático del hebreo y la revisión inglesa, evitando el calco ‘volver la cara’ en el texto principal.
  - Se mantuvo el tono reverente de la escena con ‘madre mía’, acorde con el hebreo אִמִּי.
  - ‘Petición’ y ‘pide’ preservan la raíz semántica de שאל en ambos hemistiquios.
