translation:
  language: es
  text: y el templo que había en ella era sumamente rico, y allí había coberturas de oro[a], y corazas y armas, que había dejado allí Alejandro, hijo de Filipo, el rey macedonio, quien primero reinó sobre los griegos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «coberturas doradas». El griego no especifica la forma exacta de estos objetos, solo que eran coberturas hechas de oro.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱερὸν
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  - lugar santo
  lexicon: LSJ
  rationale: En este contexto se trata del complejo/casa de culto, no de un adjetivo abstracto de santidad. «Templo» es el equivalente natural y claro en español, y conserva la referencia institucional del texto.
- source_word: πλούσιον σφόδρα
  english_pob_choice: exceedingly rich
  chosen_spanish: riquísimo
  alternatives_spanish:
  - muy rico
  - sumamente rico
  lexicon: LSJ
  rationale: La intensificación de σφόδρα se expresa bien con un superlativo idiomático. «Riquísimo» mantiene la fuerza del original sin sonar forzado en español.
- source_word: καλύμματα χρυσᾶ
  english_pob_choice: gold coverings
  chosen_spanish: coberturas de oro
  alternatives_spanish:
  - coberturas doradas
  - cubiertas de oro
  lexicon: LSJ
  rationale: El griego solo especifica que eran coberturas hechas de oro, sin precisar su forma exacta. «Coberturas de oro» conserva la apertura léxica y evita concretar más de lo que el texto dice.
- source_word: θώρακες
  english_pob_choice: breastplates
  chosen_spanish: corazas
  alternatives_spanish:
  - petos
  - armaduras
  lexicon: LSJ
  rationale: «Corazas» comunica el sentido de armadura corporal y es natural en español. «Petos» es más técnico y «armaduras» sería demasiado general.
- source_word: ὅπλα
  english_pob_choice: weapons
  chosen_spanish: armas
  alternatives_spanish:
  - armamento
  - utensilios de guerra
  lexicon: LSJ
  rationale: Aquí ὅπλα designa pertrechos militares en sentido amplio. «Armas» es el equivalente más directo y entendido en español, sin estrechar indebidamente el campo semántico.
- source_word: Ἀλέξανδρος ὁ τοῦ Φιλίππου
  english_pob_choice: Alexander son of Philip
  chosen_spanish: Alejandro, hijo de Filipo
  alternatives_spanish:
  - Alejandro, el hijo de Filipo
  - Alejandro, hijo de Felipe
  lexicon: LSJ
  rationale: El patronímico griego se vierte de manera transparente como «hijo de». Se mantiene «Filipo» porque ese es el nombre histórico representado por el griego Φιλίππου.
- source_word: ὁ βασιλεὺς ὁ Μακεδών
  english_pob_choice: the Macedonian king
  chosen_spanish: el rey macedonio
  alternatives_spanish:
  - el rey de Macedonia
  - el monarca macedonio
  lexicon: LSJ
  rationale: La aposición identifica a Alejandro. «Rey macedonio» reproduce de forma natural el valor descriptivo del griego y evita una construcción pesada.
- source_word: ὃς ἐβασίλευσεν τοῖς Ἕλλησι πρῶτος
  english_pob_choice: who first reigned over the Greeks
  chosen_spanish: quien primero reinó sobre los griegos
  alternatives_spanish:
  - quien fue el primero en reinar sobre los griegos
  - que primero gobernó a los griegos
  lexicon: LSJ
  rationale: «Reinó sobre» refleja bien ἐβασίλευσεν con dativo de destinatario/sujeción. «Primero» conserva πρῶτος sin añadir una glosa interpretativa mayor.
translation_notes:
  revision_awareness: Se siguió el testimonio griego directamente y se tuvo en cuenta el audit trail inglés. No se detectaron revisiones posteriores que exigieran alterar la línea principal; la única decisión de nota mantiene abierta la ambigüedad de καλύμματα.
  spanish_consistency_notes:
  - Se conservó la distinción léxica entre «templo» y los objetos militares enumerados, sin ampliar ni armonizar artificialmente el inventario.
  - Se mantuvo «griegos» en minúscula por norma ortográfica española para etnónimos comunes, mientras se respetó la referencia histórica al dominio de Alejandro.
  - La sintaxis española busca ser fiel al encadenamiento del griego, pero con fluidez natural para lectura bíblica pública.
