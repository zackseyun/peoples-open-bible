translation:
  language: es
  text: 'Ellos respondieron por segunda vez y dijeron[a]: «Que el rey diga el sueño a sus siervos, y nosotros mostraremos[b] la interpretación».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «otra vez». El adverbio arameo expresa más específicamente «por segunda vez».
    reason: lexical_alternative
  - marker: b
    text: O «daremos a conocer».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲנוֹ
  english_pob_choice: They answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - repusieron
  lexicon: HALOT
  rationale: El verbo arameo de respuesta en contexto narrativo se rinde naturalmente con "respondieron". Mantiene el valor de contestación sin sobrecargar el registro.
- source_word: תִנְיָנוּת
  english_pob_choice: a second time
  chosen_spanish: por segunda vez
  alternatives_spanish:
  - de nuevo
  - otra vez
  lexicon: HALOT
  rationale: La adverbialidad ordinal se preserva mejor con "por segunda vez" que con un simple "de nuevo", que debilitaría la precisión de "second time".
- source_word: וְאָמְרִין
  english_pob_choice: and said
  chosen_spanish: y dijeron
  alternatives_spanish:
  - y decían
  lexicon: HALOT
  rationale: En español bíblico narrativo, el pretérito simple transmite con claridad la introducción de discurso directo y evita una perífrasis menos natural.
- source_word: מַלְכָּא
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - oh rey
  lexicon: HALOT
  rationale: 'Sigo la decisión auditada de tomarlo como sujeto de יֵאמַר, no como vocativo. Por eso en español va como sujeto explícito: "el rey".'
- source_word: חֶלְמָא
  english_pob_choice: the dream
  chosen_spanish: el sueño
  alternatives_spanish:
  - el sueño soñado
  lexicon: HALOT
  rationale: En español, "sueño" expresa el contenido onírico de forma natural y fiel al término arameo estándar para dream.
- source_word: יֵאמַר
  english_pob_choice: let ... tell
  chosen_spanish: que ... diga
  alternatives_spanish:
  - que ... cuente
  - que ... declare
  lexicon: HALOT
  rationale: La fuerza jussiva se conserva mejor con "que el rey diga...". Esta forma reproduce la petición sin introducir un matiz de obligación más fuerte que el del original.
- source_word: לְעַבְדֹוהִי
  english_pob_choice: to his servants
  chosen_spanish: a sus siervos
  alternatives_spanish:
  - a sus servidores
  - a sus esclavos
  lexicon: HALOT
  rationale: Aunque el término puede llevar la carga de esclavitud, en este pasaje de corte real la función relacional y de servicio es la saliente. "Siervos" mantiene dignidad y cercanía al uso POB auditado, sin borrar la relación de dependencia.
- source_word: וּפִשְׁרָה
  english_pob_choice: and its interpretation
  chosen_spanish: y la interpretación
  alternatives_spanish:
  - y su interpretación
  - y la explicación
  lexicon: HALOT
  rationale: Sigo la revisión inglesa que suprimió "its" por cercanía al hebreo/arameo y fluidez. En español, "la interpretación" evita un posesivo implícito innecesario y conserva la referencia al sueño sin añadir más de lo que el arameo exige.
- source_word: נְהַחֲוֵה
  english_pob_choice: we will show
  chosen_spanish: mostraremos
  alternatives_spanish:
  - haremos saber
  - declararemos
  lexicon: HALOT
  rationale: '"Mostraremos" comunica bien el valor causativo de hacer conocer o poner de manifiesto la interpretación, con estilo natural en español. "Haremos saber" sería más explícito, pero menos fluido.'
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa más reciente al omitir un posesivo equivalente a "its" antes de "interpretation", y mantiene la precisión adverbial de "a second time" con una frase ordinal en español. También conserva la decisión auditada de tomar "the king" como sujeto y no como vocativo.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como norma general del proyecto, aunque este versículo no contiene el tetragrámaton ni una referencia directa al nombre divino.
  - Se evitó traducir mecánicamente con "Cristo" o vocabulario litúrgico ajeno al contexto, ya que el pasaje es cortesano y arameo narrativo.
  - Se optó por "siervos" como equivalente contextual de עַבְדֹוהִי, conservando la alternativa "esclavos" en nota para no borrar la tensión léxica documentada.
