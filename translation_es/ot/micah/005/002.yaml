review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo y del POB en inglés: inferencia lógica (''Por tanto''), entrega temporal bajo juicio (''los entregará''), la mujer no identificada (''la que está de parto''), y el retorno del resto de sus hermanos a Israel. Sin embargo, hay un desajuste importante en la cláusula verbal final: el hebreo יְשׁוּבוּן es 3mp y el inglés auditado traduce ''will return''; el español puso ''volverá'' en singular por concordancia colectiva con ''el resto'', lo que suaviza una elección significativa del original.'
  spanish_quality_summary: El español es claro, digno y mayormente natural. 'La que está de parto haya dado a luz' suena bien y preserva la indeterminación. No obstante, conviene ajustar 'volverá' a 'volverán' para reflejar mejor el plural hebreo y evitar que el sujeto plural implícito ('sus hermanos') quede eclipsado por el colectivo 'el resto'. También es preferible corregir la nota c, que actualmente ofrece como alternativa exactamente la misma expresión que el texto principal; debe reflejar la alternativa auditada equivalente a 'los hijos/los hijos de Israel' vs. 'los hijos/los hijos de Israel' en inglés, mejor como 'el pueblo de Israel' o, más fiel al expediente, explicar que el hebreo es literalmente 'los hijos de Israel' si se optara por otra formulación en el texto. Como el texto principal ya dice 'los hijos de Israel', esa nota sobra.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías, Cristo, Espíritu, etc. 'Hermanos' preserva adecuadamente אֶחָיו. 'Los hijos de Israel' es una opción aceptable y reconocible para בְּנֵי יִשְׂרָאֵל, aunque la nota asociada en el borrador está mal planteada y debe eliminarse si se mantiene esa frase en el texto.
  issues:
  - severity: medium
    issue: 'Verbo final en singular: ''volverá'''
    rationale: El hebreo יְשׁוּבוּן es plural masculino ('volverán'). Aunque en español a veces un colectivo admite singular, aquí el original y el POB inglés preservan el plural, y es mejor mantenerlo para no perder precisión formal ni desplazar el foco desde 'sus hermanos'.
  - severity: medium
    issue: Nota [c] no corresponde a una verdadera alternativa
    rationale: La nota dice 'O "los hijos de Israel"', pero el texto principal ya tiene exactamente 'los hijos de Israel'. Eso crea una nota redundante e incorrecta. Debe eliminarse si no hay alternativa real en el texto español.
  revised_spanish_text: Por tanto, él los entregará[a] hasta el tiempo en que la que está de parto haya dado a luz[b]; entonces el resto de sus hermanos volverán a los hijos de Israel.
  revised_footnotes:
  - marker: a
    text: O 'los entregará en manos de otros' o 'los abandonará'.
    reason: lexical_alternative
  - marker: b
    text: '''La que está de parto'' no se identifica explícitamente en el hebreo; los intérpretes la entienden de diversas maneras, como Sion/Judá personificada, la madre del gobernante prometido o alguna otra figura.'
    reason: alternative_reading
