translation:
  language: es
  text: Se halló en un escrito acerca tanto de los espartanos como de los judíos que ellos son hermanos, y que son del linaje de Abraham[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en un documento» o «en un registro». El término griego se refiere a una fuente escrita y no necesariamente a la Escritura sagrada.
    reason: lexical_alternative
  - marker: b
    text: Es decir, una afirmación de descendencia común de Abraham en la fuente escrita que se cita.
    reason: cultural_note
lexical_decisions:
- source_word: εὑρέθη
  english_pob_choice: It was found
  chosen_spanish: Se halló
  alternatives_spanish:
  - Fue hallado
  - Se encontró
  lexicon: BDAG
  rationale: El aoristo pasivo impersonal pide en español una construcción natural y sobria. «Se halló» conserva el sentido de hallazgo en una fuente escrita sin añadir sujeto explícito.
- source_word: ἐν γραφῇ
  english_pob_choice: in a writing
  chosen_spanish: en un escrito
  alternatives_spanish:
  - en un documento
  - en un registro
  - en la Escritura
  lexicon: BDAG
  rationale: γραϕῇ aquí designa una fuente escrita y no necesariamente la Escritura sagrada. «Escrito» mantiene amplitud y evita sobreatribuirle valor canónico.
- source_word: περὶ τε τῶν Σπαρτιατῶν καὶ Ἰουδαίων
  english_pob_choice: concerning both the Spartans and the Jews
  chosen_spanish: acerca de los espartanos y de los judíos
  alternatives_spanish:
  - sobre los espartanos y los judíos
  - respecto de los espartanos y los judíos
  lexicon: BDAG
  rationale: 'περί con genitivo expresa relación temática: «acerca de / respecto de». Se conserva la coordinación con «y» y se evita una formulación demasiado rígida.'
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - parientes
  - consanguíneos
  lexicon: BDAG
  rationale: «Hermanos» reproduce el lenguaje de parentesco/solidaridad del griego y mantiene la afirmación tal como está en la fuente, sin suavizarla a una mera amistad política.
- source_word: ἐκ γένους Ἀβραάμ
  english_pob_choice: of the family line of Abraham
  chosen_spanish: de la familia de Abraham
  alternatives_spanish:
  - de la línea de Abraham
  - de la descendencia de Abraham
  - del linaje de Abraham
  lexicon: BDAG
  rationale: γένος puede expresar linaje o descendencia. «Familia de Abraham» es comprensible en español y conserva la idea de pertenencia genealógica sin el tono arcaico de «linaje».
theological_decisions:
- issue: Naturaleza de la relación afirmada entre espartanos y judíos
  english_pob_reading: Render the statement straightforwardly as a claim of kinship/descent without endorsing its historical truth.
  chosen_spanish_reading: Traducir la afirmación de parentesco/descentencia como tal, sin resolver ni negar su veracidad histórica en la traducción.
  alternative_spanish_readings:
  - Convertirlo en una mera alianza o amistad política
  - suavizar «hermanos» a «aliados»
  rationale: El griego dice explícitamente que son «hermanos» y que son de la familia de Abraham. La traducción debe preservar esa afirmación textual y dejar la evaluación histórica fuera del texto principal.
  doctrine_reference: Primacía del texto original; preservar la tensión histórica sin armonizarla en la traducción.
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del audit trail en cuanto a ἐκ γένους Ἀβραάμ, evitando «de la línea/familia de Abraham» con calco excesivo y eligiendo una forma natural en español que conserva la relación de descendencia. También mantiene la distinción del griego entre una fuente escrita general y la Escritura canónica.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» como no aplicable en este versículo.
  - «Escrito» se usa de manera amplia para γραφῇ, en coherencia con la decisión inglesa de no exigir «Escritura».
  - «Hermanos» conserva el valor relacional del plural masculino griego sin expansión inclusiva no motivada por la fuente.
  - 'La puntuación en español conserva la coordinación doble: «que ellos son hermanos, y que son de la familia de Abraham».'
