translation:
  language: es
  text: Ellos mismos, sus mujeres, sus niños pequeños y su ganado —y todo extranjero residente[a] o trabajador asalariado[b] o esclavo comprado con plata[c] de entre ellos— se pusieron cilicio en la cintura[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «forastero residente».
    reason: lexical_alternative
  - marker: b
    text: O «obrero contratado».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «comprado con plata»; esto es, una persona adquirida como esclavo.
    reason: lexical_alternative
  - marker: d
    text: Es decir, se vistieron de cilicio como señal de duelo o súplica.
    reason: cultural_note
lexical_decisions:
- source_word: νήπια
  english_pob_choice: little children
  chosen_spanish: niños pequeños
  alternatives_spanish:
  - infantes
  - niños de corta edad
  lexicon: LSJ
  rationale: νήπια designa niños muy pequeños. «Niños pequeños» transmite la edad temprana de forma natural en español sin restringirla de manera excesiva a recién nacidos.
- source_word: κτήνη
  english_pob_choice: livestock
  chosen_spanish: ganado
  alternatives_spanish:
  - animales de labor
  - bestias
  lexicon: LSJ
  rationale: κτήνη se refiere de manera amplia a animales domésticos o de propiedad. «Ganado» es el término colectivo más natural y claro en español bíblico contemporáneo.
- source_word: πάροικος
  english_pob_choice: resident alien
  chosen_spanish: residente extranjero
  alternatives_spanish:
  - forastero residente
  - advenedizo
  lexicon: LSJ
  rationale: πάροικος nombra a alguien que vive entre otro pueblo sin ser originario de allí. «Residente extranjero» conserva el matiz social y legal con buena inteligibilidad en español.
- source_word: μισθωτός
  english_pob_choice: hired worker
  chosen_spanish: trabajador asalariado
  alternatives_spanish:
  - obrero contratado
  - jornalero
  lexicon: LSJ
  rationale: μισθωτός es alguien que trabaja por paga. «Trabajador asalariado» comunica con claridad la relación laboral sin recurrir a un arcaísmo.
- source_word: ἀργυρώνητος
  english_pob_choice: purchased slave
  chosen_spanish: esclavo comprado con plata
  alternatives_spanish:
  - esclavo adquirido con dinero
  - esclavo comprado
  lexicon: LSJ
  rationale: El término significa literalmente «comprado con plata» y, por su fuerza lexical, apunta a una persona adquirida como propiedad. Se conserva la explicitud de esclavitud en vez de suavizarla a «siervo».
- source_word: ἐπέθεντο σάκκους
  english_pob_choice: put sackcloth on
  chosen_spanish: se pusieron cilicio
  alternatives_spanish:
  - se vistieron de cilicio
  - se echaron cilicio
  lexicon: LSJ
  rationale: La locución describe vestirse con saco/cilicio como señal de duelo o súplica. En español, «ponerse cilicio» es una expresión idiomática comprensible y fiel al gesto ritual.
- source_word: ἐπὶ τὰς ὀσφύας αὐτῶν
  english_pob_choice: on their waists
  chosen_spanish: sobre la cintura
  alternatives_spanish:
  - sobre los lomos
  - en la cintura
  lexicon: LSJ
  rationale: ὀσφύες se refiere a la zona de los lomos/la cintura. «Sobre la cintura» suena natural en español y evita una literalidad torpe.
theological_decisions:
- issue: Conjunción de categorías sociales en la serie griega ἢ μισθωτὸς καὶ ἀργυρώνητος
  english_pob_reading: resident alien or hired worker or purchased slave
  chosen_spanish_reading: residente extranjero o trabajador asalariado o esclavo comprado con plata
  alternative_spanish_readings:
  - residente extranjero y trabajador asalariado y esclavo comprado con plata
  - residente extranjero o trabajador asalariado y esclavo comprado con plata
  rationale: El griego presenta la segunda y tercera categorías como una serie inclusiva dentro del grupo, no como una simple coordinación uniforme. El español mantiene «o» para reflejar mejor esa enumeración y no borrar la distribución social del texto.
  doctrine_reference: 'DOCTRINE.md: respeto a la sintaxis y a las distinciones léxicas del original; términos de estado servil no deben suavizarse'
translation_notes:
  revision_awareness: El inglés auditado fue revisado para hacer explícita la serie gramatical con «or purchased slave» y para mantener la fuerza servil de ἀργυρώνητος. La presente versión española sigue esa revisión, conservando la distinción entre las categorías sociales y evitando suavizar el estado de esclavitud.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino explícito; este versículo no lo contiene.
  - Se usa «esclavo» para ἀργυρώνητος conforme a la política de términos de estado servil.
  - «Cilicio» se emplea como equivalente bíblico natural de σάκκος; no se expande a una explicación en el texto principal.
  - La construcción con «o» preserva la enumeración de grupos y evita fundirlos en una sola categoría.
