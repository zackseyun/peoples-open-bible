id: 2TI.1.2
reference: 2 Timothy 1:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Τιμοθέῳ ἀγαπητῷ τέκνῳ· χάρις, ἔλεος, εἰρήνη ἀπὸ θεοῦ πατρὸς καὶ Χριστοῦ Ἰησοῦ τοῦ κυρίου ἡμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/001/002.yaml
  text: 'To Timothy[a], beloved child: grace, mercy, and peace from God the Father and Messiah Jesus our Lord.'
  footnotes:
  - marker: a
    text: Or 'Christ Jesus.' The Greek title Χριστός is rendered 'Messiah' here to preserve its meaning rather than its traditional transliteration.
    reason: lexical_alternative
translation:
  language: ko
  text: '사랑하는 아들 디모데에게 편지합니다. 아버지 하나님과 우리 주 메시아[a] 예수께로부터 은혜와 자비와 평강이 함께하기를 빕니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도」. Χριστός를 칭호로 옮기는 본 번역의 원칙에 따라 「메시아」로 번역한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαπητῷ τέκνῳ
  english_pob_choice: beloved child
  chosen_korean: 사랑하는 아들
  alternatives_korean:
  - 사랑하는 자녀
  - 사랑하는 아이
  lexicon: BDAG
  rationale: 바울이 디모데에게 보내는 사적 친밀의 호칭. 헬라어 τέκνον은 성별 중립적이나, 본 서신의 수신자가 남성(디모데)임이 분명하므로 한국어 호칭으로는 「아들」이 가장 자연스럽다.
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_korean: 자비
  alternatives_korean:
  - 긍휼
  - 자비하심
  lexicon: BDAG
  rationale: 인사 정식의 삼중 축복(은혜·자비·평강)에서 ἔλεος는 곤경에 처한 자를 향한 동정 어린 행위를 가리키므로 「자비」가 가장 자연스럽다. 「긍휼」도 가능하나 본 번역에서는 보다 일상적이고 분명한 「자비」를 택한다.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_korean: 평강
  alternatives_korean:
  - 평화
  lexicon: BDAG
  rationale: 바울 인사 정식의 εἰρήνη는 히브리어 שָׁלוֹם의 그림자가 짙으며, 「평강」은 단순한 사회적 평화(平和) 이상의 안녕·온전함을 함의해 그 무게를 살린다.
- source_word: ἀπὸ θεοῦ πατρὸς καὶ Χριστοῦ Ἰησοῦ τοῦ κυρίου ἡμῶν
  english_pob_choice: from God the Father and Messiah Jesus our Lord
  chosen_korean: 아버지 하나님과 우리 주 메시아 예수께로부터
  alternatives_korean:
  - 하나님 아버지와 우리 주 메시아 예수께로부터
  lexicon: BDAG
  rationale: 동격 구문을 자연스러운 한국어 어순으로 옮기며, κύριος를 「주」로 옮겨 신약의 기독론적 칭호를 보존한다.
