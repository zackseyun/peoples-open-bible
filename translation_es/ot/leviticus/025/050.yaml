revisions:
- from: Hará el cálculo con su comprador desde el año en que se vendió a él hasta el año del jubileo[a], y el precio de su venta será según el número de años[b]; como los días de un jornalero, estará con él.
  to: Hará el cálculo con su comprador desde el año en que se vendió a su comprador hasta el año del jubileo[a], y el precio de su venta será según el número de años[b]; como los días de un jornalero, estará con su comprador.
  rationale: Se hicieron ajustes menores de español para mejorar la naturalidad y la claridad referencial sin alterar el sentido documentado por el hebreo ni la auditoría inglesa. Se mantuvo la autoventa reflexiva, la proporcionalidad por años y la comparación con un jornalero; solo se evitó la construcción poco idiomática «se vendió a él» y el anglicismo «renderizarse» en la nota.
