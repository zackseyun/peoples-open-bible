translation:
  language: es
  text: Y lo cargó y lo llevó a su madre[a], y se sentó sobre sus rodillas hasta el mediodía; entonces murió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su regazo»; el hebreo dice «sobre sus rodillas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂאֵהוּ
  english_pob_choice: carried him
  chosen_spanish: lo cargó
  alternatives_spanish:
  - lo llevó en brazos
  - lo alzó
  lexicon: HALOT
  rationale: נשא expresa levantar o cargar. En español, «lo cargó» comunica que lo tomó y lo transportó con naturalidad narrativa, sin perder la idea de llevarlo sostenidamente.
- source_word: וַיְבִיאֵהוּ
  english_pob_choice: brought him
  chosen_spanish: lo llevó
  alternatives_spanish:
  - lo condujo
  - lo trajo
  lexicon: HALOT
  rationale: ביא en causativo suele significar «traer/llevar». Aquí, «lo llevó» conserva el movimiento hacia la madre y suena natural en español junto al verbo anterior.
- source_word: אֶל אִמּוֹ
  english_pob_choice: to his mother
  chosen_spanish: a su madre
  alternatives_spanish:
  - a su mamá
  lexicon: HALOT
  rationale: La relación de parentesco se expresa mejor con «madre» en un registro bíblico digno; evita la coloquialidad de «mamá».
- source_word: וַיֵּשֶׁב
  english_pob_choice: he sat
  chosen_spanish: estuvo sentado
  alternatives_spanish:
  - se sentó
  - permaneció sentado
  lexicon: HALOT
  rationale: ישב puede ser sentarse o permanecer sentado. Dado el contexto de duración hasta el mediodía, «estuvo sentado» conserva el estado continuado mejor que un simple momento de sentarse.
- source_word: עַל בִּרְכֶּיהָ
  english_pob_choice: on her knees
  chosen_spanish: sobre sus rodillas
  alternatives_spanish:
  - en su regazo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «rodillas» en plural. Se mantiene esa forma en la traducción principal para respetar el dato léxico; «regazo» queda como equivalente idiomático posible, pero no como texto principal.
- source_word: עַד הַצָּהֳרַיִם
  english_pob_choice: until noon
  chosen_spanish: hasta el mediodía
  alternatives_spanish:
  - hasta el mediodía exacto
  - hasta la hora del mediodía
  lexicon: HALOT
  rationale: צָהֳרַיִם designa el mediodía. «Mediodía» es el equivalente español más claro y preciso.
- source_word: וַיָּמֹת
  english_pob_choice: then he died
  chosen_spanish: entonces murió
  alternatives_spanish:
  - y murió
  - y luego murió
  lexicon: HALOT
  rationale: La waw consecutiva marca avance narrativo. «Entonces murió» refleja la secuencia sin añadir matiz no presente en el hebreo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente indica que no hubo cambios sustanciales; por eso la versión española sigue de cerca el audit trail inglés y mantiene la decisión léxica sobre בִּרְכֶּיהָ, con nota alternativa para el posible sentido idiomático.
  spanish_consistency_notes:
  - Se mantiene «madre» y no «mamá» por registro bíblico.
  - Se conserva «rodillas» en el texto principal para respetar la explicitud del hebreo.
  - «Entonces» se usa para reflejar la secuencia narrativa de la waw consecutiva.
  - No se introduce terminología eclesial ajena al pasaje.
