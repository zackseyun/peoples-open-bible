  glossary_alignment: No hay conflicto con la terminología base del proyecto. El verso no incluye Yahvé/Mesías ni otros términos de glosario sensible. Se preserva adecuadamente la fuerza teológica de שִׁקֻּץ como «abominación». La elección «Moloc» encaja con la decisión documentada del POB, y la alternativa «Milcom» queda en nota.
