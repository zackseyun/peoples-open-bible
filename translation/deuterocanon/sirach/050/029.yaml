theological_decisions:
- issue: Meaning of the metaphor τὸ ἴχνος αὐτοῦ
  chosen_reading: The clause means that the Lord's light guides or marks the person's course of life.
  alternative_readings:
  - The Lord's light is his footprint/trace, emphasizing visible evidence left by divine illumination rather than guidance.
  rationale: The Greek wording is metaphorical and slightly compressed. In context, a guidance metaphor fits wisdom literature well and yields coherent English. Because ἴχνος is more literally 'footprint' or 'track,' the concrete image is preserved in a footnote rather than flattened without notice.
  doctrine_reference: Preserve theological tension rather than resolve it; document ambiguity and preserve alternatives in footnotes.
