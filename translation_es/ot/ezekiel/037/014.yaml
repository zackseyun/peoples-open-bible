translation:
  language: es
  text: Pondré mi Espíritu[a] en ustedes, y vivirán; los estableceré en su propia tierra. Entonces sabrán que yo soy Yahvé. He hablado, y lo he hecho, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘mi aliento’, o ‘mi viento’, o ‘mi espíritu’. La palabra hebrea también puede significar ‘viento’; en Ezequiel 37 esta gama de sentidos es intencional.
    reason: lexical_alternative
lexical_decisions:
- source_word: רוּחִי
  english_pob_choice: my Spirit
  chosen_spanish: mi Espíritu
  alternatives_spanish:
  - mi aliento
  - mi viento
  - mi espíritu
  lexicon: HALOT
  rationale: רוּחַ conserva en este contexto una tensión intencional entre aliento, viento y espíritu. La forma con sufijo de primera persona y el marco de restauración favorecen en español “mi Espíritu” como lectura principal, sin negar el campo semántico más amplio, que se preserva en una nota.
- source_word: וִחְיִיתֶם
  english_pob_choice: you will live
  chosen_spanish: vivirán
  alternatives_spanish:
  - cobrarán vida
  - revivirán
  lexicon: HALOT
  rationale: El verbo חיה aquí comunica vida/restauración. “Vivirán” es natural, sobrio y suficientemente amplio para abarcar tanto la imagen de reanimación como la promesa de restauración.
- source_word: וְהִנַּחְתִּי אֶתְכֶם עַל אַדְמַתְכֶם
  english_pob_choice: I will settle you on your own land
  chosen_spanish: los estableceré sobre su propia tierra
  alternatives_spanish:
  - los pondré en su tierra
  - los asentaré en su tierra
  - los haré reposar en su tierra
  lexicon: HALOT
  rationale: El Hiphil aquí puede expresar poner, hacer reposar o establecer. En contexto de restauración, “los estableceré” comunica bien la acción divina de reinstalación. “Su propia tierra” conserva el posesivo de אַדְמַתְכֶם de modo idiomático en español.
- source_word: אַדְמַתְכֶם
  english_pob_choice: your own land
  chosen_spanish: su propia tierra
  alternatives_spanish:
  - su tierra
  - su suelo
  - su terreno
  lexicon: HALOT
  rationale: אדמה puede significar tierra/suelo/terreno, pero en contexto profético de retorno nacional la referencia es a la tierra de posesión restaurada. “Su propia tierra” expresa la posesión sin añadir contenido ajeno.
- source_word: וִידַעְתֶּם כִּי אֲנִי יְהוָה
  english_pob_choice: Then you will know that I am Yahweh
  chosen_spanish: Entonces sabrán que yo soy Yahvé
  alternatives_spanish:
  - Y sabrán que yo soy Yahvé
  - Entonces conocerán que yo soy Yahvé
  lexicon: HALOT
  rationale: וִידַעְתֶּם introduce la consecuencia de la restauración; “Entonces” hace clara la secuencia resultativa en español. יְהוָה se conserva como “Yahvé” conforme al criterio del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como “Yahvé” en el texto principal por la convención del proyecto en español, preservando el nombre personal divino en lugar de sustituirlo por un título.
- source_word: דִּבַּרְתִּי וְעָשִׂיתִי
  english_pob_choice: I have spoken, and I have done it
  chosen_spanish: Yo he hablado, y lo he hecho
  alternatives_spanish:
  - He hablado y lo he hecho
  - Yo he dicho, y lo he hecho
  - He hablado y he actuado
  lexicon: HALOT
  rationale: Los perfectos comunican la certeza y consumación de la palabra y la acción divinas. “Lo he hecho” recoge naturalmente el objeto elíptico en español y mantiene la fuerza declarativa.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética נְאֻם se traduce de manera idiomática como una declaración solemne. “Declara Yahvé” conserva el tono de fórmula profética sin sonar arcaico.
theological_decisions:
- issue: Renderización de רוּחִי entre aliento, viento y Espíritu
  english_pob_reading: my Spirit
  chosen_spanish_reading: mi Espíritu
  alternative_spanish_readings:
  - mi aliento
  - mi viento
  - mi espíritu
  rationale: El versículo mantiene un juego deliberado con el rango semántico de רוח. La lectura principal en español es “mi Espíritu” por el contexto de restauración divina y la relación posesiva con Dios, pero la nota conserva explícitamente las alternativas para no borrar la tensión lexical.
  doctrine_reference: Preservar tensión lexical y teológica; equivalencia óptima
- issue: Forma de traducir el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa directamente el Tetragrámaton. En el proyecto español se mantiene como “Yahvé” para evitar la sustitución por un título y conservar el nombre del pacto tal como se presenta en la fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה/YHWH → Yahvé'
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el paquete de fuente y con el audit trail en inglés. Se conservó la decisión principal de רוּחִי como ‘mi Espíritu’, se mantuvo la tensión semántica con una nota, y se actualizó el nombre divino al uso español del proyecto (‘Yahvé’) sin introducir cambios doctrinales o textuales adicionales.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo verbal del hebreo con dos futuros y dos perfectos en español: “vivirán / los estableceré” y “he hablado / lo he hecho”.'
  - Se evitó la sustitución de Yahvé por una forma de máscara como “SEÑOR”, conforme a la política del proyecto.
  - “Su propia tierra” conserva el matiz posesivo de אַדְמַתְכֶם sin forzar un regionalismo.
  - La puntuación separa con punto y coma la secuencia resultativa para reflejar el flujo del hebreo y la lectura natural en español.
