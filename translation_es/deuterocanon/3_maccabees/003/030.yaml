translation:
  language: es
  text: Y el texto de la carta estaba escrito como sigue[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la forma de la carta estaba escrita así» o «la copia de la carta estaba escrita así». El griego τύπος puede denotar la forma, la redacción o la copia de un documento.
    reason: lexical_alternative
lexical_decisions:
- source_word: τύπος
  english_pob_choice: text
  chosen_spanish: texto
  alternatives_spanish:
  - forma
  - copia
  - contenido
  lexicon: LSJ
  rationale: En este contexto, τύπος introduce el texto fijado de la carta. «Texto» reproduce de manera natural la elección inglesa revisada y evita precisar indebidamente si se trata de una copia literal o de la formulación establecida.
- source_word: ἐπιστολή
  english_pob_choice: letter
  chosen_spanish: carta
  alternatives_spanish:
  - epístola
  - mensaje escrito
  lexicon: LSJ
  rationale: «Carta» es el equivalente natural y claro en español para una comunicación escrita. «Epístola» sonaría más litúrgico o técnico y no añade precisión aquí.
- source_word: ἐγέγραπτο
  english_pob_choice: had been written
  chosen_spanish: había sido escrito
  alternatives_spanish:
  - estaba escrito
  - fue escrito
  lexicon: LSJ
  rationale: El pluscuamperfecto pasivo transmite que el texto ya estaba redactado antes de la cita que sigue. «Había sido escrito» conserva ese valor temporal y pasivo.
- source_word: οὕτως
  english_pob_choice: as follows
  chosen_spanish: así
  alternatives_spanish:
  - de la siguiente manera
  - de este modo
  lexicon: LSJ
  rationale: Antes de introducir una cita documental, «así» es una solución breve y natural en español. Mantiene la función de anuncio del contenido sin sobredeterminar el estilo.
translation_notes:
  revision_awareness: La revisión inglesa cambió «form» por «text» para reflejar mejor τύπος en este contexto. La versión española sigue esa revisión con «texto» en lugar de «forma», manteniendo el matiz documental y la apertura semántica del término griego.
  spanish_consistency_notes:
  - Se prefirió «carta» a «epístola» por naturalidad narrativa.
  - Se preservó el valor pasivo y anterior de ἐγέγραπτο con el pluscuamperfecto «había sido escrito».
  - La nota recoge la ambigüedad de τύπος sin forzar una única lectura.
  - No hay decisiones teológicas relevantes en este versículo, solo una formulación introductoria de un documento.
