translation:
  language: es
  text: ¿Fue tu ira contra los ríos, Yahvé? ¿Fue tu furor contra los ríos, o tu furia contra el mar, que montaste sobre tus caballos, sobre tus carros de salvación[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sobre tus carros victoriosos». El hebreo יְשׁוּעָה también puede llevar en este contexto el sentido de liberación o victoria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: El tetragrámaton se conserva como nombre propio divino en español. 'Yahvé' sigue el criterio POB de no sustituir el nombre por un título, y es la forma más reconocible y fluida en español bíblico actual.
- source_word: הֲ/בִ/נְהָרִים
  english_pob_choice: Was your anger against the rivers
  chosen_spanish: ¿Fue tu ira contra los ríos?
  alternatives_spanish:
  - ¿Ardió tu ira contra los ríos?
  - ¿Te airaste contra los ríos?
  lexicon: HALOT
  rationale: La pregunta retórica conserva el objeto con 'contra'. 'Ira' expresa el sustantivo en español con naturalidad; 'ardió' sería más literal pero menos claro en una pregunta de este tipo.
- source_word: חָרָה
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - furor
  lexicon: HALOT
  rationale: El verbo hebreo literalmente tiene la imagen de 'encenderse/arder' en ira. En español, 'ira' comunica bien el estado emotivo sin forzar una metáfora poco natural en la pregunta.
- source_word: אַפֶּךָ
  english_pob_choice: your wrath
  chosen_spanish: tu furor
  alternatives_spanish:
  - tu ira
  - tu enojo
  lexicon: HALOT
  rationale: Se distingue de la primera cláusula para reflejar el paralelismo y la variación poética. 'Furor' intensifica y evita repetir exactamente 'ira'.
- source_word: עֶבְרָתֶךָ
  english_pob_choice: your fury
  chosen_spanish: tu furia
  alternatives_spanish:
  - tu furor
  - tu ira intensa
  lexicon: HALOT
  rationale: '''Furia'' conserva el aumento de intensidad del término hebreo y mantiene la progresión poética frente a ''ira'' y ''furor''.'
- source_word: יָם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  - el océano
  lexicon: HALOT
  rationale: '''Mar'' es el equivalente natural en español y preserva el paralelismo con ''ríos''.'
- source_word: תִרְכַּב עַל סוּסֶיךָ
  english_pob_choice: you rode on your horses
  chosen_spanish: montaste sobre tus caballos
  alternatives_spanish:
  - cabalgaste sobre tus caballos
  - subiste sobre tus caballos
  lexicon: HALOT
  rationale: '''Montaste'' y ''caballos'' producen una línea más natural en español. Aunque ''caballos'' es más idiomático que ''cabalgaste sobre tus caballos'', se conserva la imagen ecuestre del hebreo.'
- source_word: מַרְכְּבֹתֶיךָ יְשׁוּעָה
  english_pob_choice: your chariots of salvation
  chosen_spanish: tus carros de salvación
  alternatives_spanish:
  - tus carros salvadores
  - tus carros de victoria
  lexicon: HALOT
  rationale: Se mantiene la construcción compacta del hebreo con 'carros de salvación'. Esto preserva יְשׁוּעָה como sustantivo y evita reducirlo solo a 'victoria'.
- source_word: בַּ/נְּהָרִים
  english_pob_choice: against the rivers
  chosen_spanish: contra los ríos
  alternatives_spanish:
  - entre los ríos
  - sobre los ríos
  lexicon: HALOT
  rationale: El valor preposicional en este contexto se comunica naturalmente en español con 'contra'. Se conserva la imagen y la pregunta sobre el objeto de la ira divina.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: Se sigue el criterio doctrinal del POB de representar el nombre propio de Dios como transliteración, no con sustitución reverencial. 'Yahvé' es la forma establecida para el español del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de יְשׁוּעָה en un contexto teofánico y bélico
  english_pob_reading: salvation
  chosen_spanish_reading: salvación
  alternative_spanish_readings:
  - victoria
  - liberación
  rationale: '''Salvación'' preserva el alcance teológico más amplio del término y no lo restringe a un triunfo militar. En español también mantiene el eco de rescate/divina intervención que el contexto sugiere.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
translation_notes:
  revision_awareness: El borrador sigue el consenso alto del auditorio inglés y mantiene sin cambios sustanciales la decisión sobre la pregunta retórica, la progresión de términos de ira y el cierre con יְשׁוּעָה como 'salvación'. No se documentaron revisiones aplicadas en la pasada más reciente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del nombre divino en el texto principal.
  - 'Se conservan tres términos distintos para la ira divina: ''ira'', ''furor'' y ''furia'', reflejando el paralelismo hebreo.'
  - '''Carros de salvación'' preserva la estructura nominal del hebreo y evita una paráfrasis interpretativa.'
  - La nota al pie marca la posible lectura alternativa del primer sintagma sin alterar la línea principal.
