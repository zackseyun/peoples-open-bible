revisions:
- from: ¿No podré hacerles[a] lo mismo, casa de Israel? —declara Yahvé—. Mira, como el barro en la mano del alfarero, así están ustedes en mi mano, casa de Israel.
  to: ¿No podré hacerles[a], casa de Israel, como hace este alfarero? —declara Yahvé—. Mira, como el barro en la mano del alfarero, así están ustedes en mi mano, casa de Israel.
  rationale: Se restituye en el texto principal la comparación explícita con 'este alfarero', en línea con el hebreo y con la decisión léxica documentada en el POB inglés. Se conserva 'hacerles' para representar לַעֲשׂוֹת לָכֶם de manera natural en español, y se corrige la nota para que preserve la alternativa pertinente de la comparación, no una reinterpretación distinta del complemento. No se requiere adjudicación adicional.
