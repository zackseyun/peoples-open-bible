translation:
  language: es
  text: Señor, oye mi voz; que tus oídos estén atentos a la voz de mis súplicas[a] por misericordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mis ruegos». El hebreo תַּחֲנוּנַי se refiere a súplicas intensas que piden favor o misericordia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - mi Señor
  lexicon: HALOT
  rationale: Aunque el hebreo aquí usa אֲדֹנָי como vocativo, en este proyecto el tratamiento español por defecto del habla dirigida a Dios distingue el nombre divino en su forma abierta. Dado el contexto de oración a Yahvé en el salterio, "Yahvé" preserva la referencia reverente sin recurrir a la máscara "SEÑOR". "Señor" o "mi Señor" son posibles, pero el audit trail inglés ya decidió mantener el título divino de forma directa.
- source_word: שִׁמְעָה
  english_pob_choice: hear
  chosen_spanish: oye
  alternatives_spanish:
  - escucha
  - oye, por favor
  lexicon: HALOT
  rationale: El imperativo de ruego se expresa naturalmente en español con "oye". "Escucha" también es válido, pero "oye" sigue de cerca la petición breve e intensa del hebreo sin añadir expansión.
- source_word: בְּקוֹלִי
  english_pob_choice: my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - a mi voz
  - el sonido de mi voz
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de "voz"; en español, "oye mi voz" es idiomático y refleja el paralelismo del original.
- source_word: תִּהְיֶינָה אָזְנֶיךָ קַשֻּׁבוֹת
  english_pob_choice: let your ears be attentive
  chosen_spanish: que tus oídos estén atentos
  alternatives_spanish:
  - que tus oídos sean atentos
  - que tus oídos atiendan
  lexicon: HALOT
  rationale: El hebreo usa la imagen corporal de los oídos; "oídos" la preserva mejor que un abstracto como "atención". "Estén atentos" transmite con claridad la cualidad durativa de קַשֻּׁבוֹת y mantiene el tono de súplica.
- source_word: לְקוֹל תַּחֲנוּנַי
  english_pob_choice: to the voice of my pleas for mercy
  chosen_spanish: a la voz de mis súplicas por misericordia
  alternatives_spanish:
  - a la voz de mis ruegos por favor
  - a la voz de mis súplicas
  lexicon: HALOT
  rationale: תַּחֲנוּנִים designa ruegos insistentes pidiendo favor o misericordia. "Súplicas por misericordia" mantiene el peso penitencial y la fuerza semántica sin caer en un tecnicismo menos transparente como "suplicaciones". El añadido "por misericordia" hace explícita la dimensión de favor divino que el inglés POB también documenta.
theological_decisions:
- issue: Antropomorfismo de los oídos de Dios
  english_pob_reading: Retain the concrete expression 'your ears be attentive'
  chosen_spanish_reading: Conservar "que tus oídos estén atentos"
  alternative_spanish_readings:
  - parafrasear como "escúchame atentamente"
  - '"presta atención a mi ruego"'
  rationale: El hebreo emplea imaginería corporal para hablar de la atención divina. Mantener "oídos" y "estén atentos" respeta esa tensión poética y evita suavizar el texto con una abstracción.
  doctrine_reference: Translation philosophy §1, §6
- issue: Traducción de תַּחֲנוּנַי en oración penitencial
  english_pob_reading: Translate as 'pleas for mercy'
  chosen_spanish_reading: '"súplicas por misericordia"'
  alternative_spanish_readings:
  - '"súplicas"'
  - '"ruegos por favor"'
  - '"peticiones de favor"'
  rationale: El contexto es un clamor angustiado ante Dios; "súplicas por misericordia" comunica la postura de dependencia y búsqueda de gracia sin introducir contenido doctrinal ajeno al texto.
  doctrine_reference: Translation philosophy §6
- issue: Tratamiento español del vocativo אֲדֹנָי
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Señor Yahvé
  rationale: Aunque el hebreo tiene la forma vocativa de señorío, el proyecto español usa "Yahvé" para el nombre divino cuando el contexto identifica una oración directa a Dios. Esto evita el enmascaramiento litúrgico y sigue la política terminológica del proyecto.
  doctrine_reference: Project-level Spanish terminology defaults
translation_notes:
  revision_awareness: El audit trail inglés no requirió cambios textuales en la última revisión; la versión española sigue de cerca la resolución ya aprobada para el hebreo, ajustándola al terminario del proyecto en español y preservando el paralelismo poético.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» conforme al criterio español del proyecto.
  - Se conserva la imaginería corporal («oídos», «voz») sin abstracción.
  - «Súplicas por misericordia» preserva la fuerza semántica de תַּחֲנוּנִים y evita un tecnicismo innecesario.
  - La puntuación reproduce el paralelismo de dos miembros con pausa fuerte tras la primera petición.
