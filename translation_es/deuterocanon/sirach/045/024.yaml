review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la línea hebrea principal y mantiene correctamente la divergencia con el griego en nota. Conserva el sentido causal de לכן, el carácter jurídico de חק, la duración de ברית עולם y la idea de sostener el santuario. La nota alternativa reproduce de forma fiel la expansión griega documentada en la auditoría inglesa.
  spanish_quality_summary: 'La redacción es clara y natural en general, pero contiene un error gramatical importante: «una estatuto» debe ser «un estatuto». Además, dado que la revisión inglesa aplicada quitó la marca de nota del texto principal, conviene eliminar también el anclaje [a] del texto español para alinearse con el registro auditado y evitar una llamada innecesaria en el verso.'
  glossary_alignment: 'La terminología principal está bien alineada con el proyecto: «alianza perpetua», «santuario» y el registro cultual/jurídico son adecuados. «Estatuto» es una buena elección para חק, pero debe corregirse el género del artículo. No hay conflictos con los términos doctrinales por defecto del proyecto.'
  issues:
  - severity: high
    issue: Error gramatical en «una estatuto»
    rationale: «Estatuto» es masculino en español; el artículo correcto es «un». Tal como está, el texto resulta incorrecto y afecta la calidad de la traducción publicada.
  - severity: medium
    issue: Marcador de nota [a] innecesario en el texto principal
    rationale: La auditoría inglesa aplicada removió el marcador del texto principal aunque conservó la nota de variante. Para mantener coherencia con el historial POB y evitar sobrecargar el verso, el español debe hacer lo mismo.
  revised_spanish_text: Por eso también le estableció un estatuto, una alianza perpetua, para sostener el santuario.
  revision_rationale: Se corrige el artículo de «estatuto» para concordancia gramatical y se elimina el marcador de nota del texto principal para alinearlo con la revisión auditada en inglés, que conservó la variante griega en el expediente pero no anclada en el verso.
