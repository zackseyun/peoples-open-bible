translation:
  language: es
  text: 'Pero él lo negó delante de todos, diciendo: «No sé lo que estás diciendo».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἠρνήσατο
  english_pob_choice: denied it
  chosen_spanish: lo negó
  alternatives_spanish:
  - lo denegó
  - lo rechazó
  lexicon: ἀρνέομαι
  rationale: En este contexto narrativo, el verbo expresa la negación pública de la acusación o afirmación previa. «Lo negó» conserva el objeto implícito exigido por el español y sigue la decisión inglesa de suplir el referente sin añadir más contenido que el texto no da.
- source_word: ἔμπροσθεν πάντων
  english_pob_choice: before them all
  chosen_spanish: delante de todos
  alternatives_spanish:
  - en presencia de todos
  - ante todos
  lexicon: ἔμπροσθεν
  rationale: La expresión señala que la negación ocurrió públicamente. «Delante de todos» comunica con naturalidad la idea de presencia pública y corresponde bien al valor local de ἔμπροσθεν con el genitivo.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: λέγω
  rationale: El participio introduce la cita directa de manera continua. «Diciendo» preserva el flujo griego sin convertirlo innecesariamente en una coordinación más cerrada.
- source_word: Οὐκ οἶδα
  english_pob_choice: I do not know
  chosen_spanish: No sé
  alternatives_spanish:
  - No conozco
  - No entiendo
  lexicon: οἶδα
  rationale: El negativo directo en español es «No sé». Mantiene la fuerza simple y grave de la negación de conocimiento, sin expandirla a «no entiendo», que sería interpretativa.
- source_word: τί λέγεις
  english_pob_choice: what you are saying
  chosen_spanish: lo que estás diciendo
  alternatives_spanish:
  - qué dices
  - lo que dices
  lexicon: τίς / λέγω
  rationale: 'La frase griega es literal y directa: «qué estás diciendo». En español, dentro de una negación, «No sé lo que estás diciendo» suena natural y fiel. Se evita una paráfrasis más libre como «de qué hablas» para no desplazar el matiz del texto.'
theological_decisions:
- issue: Objeto implícito de «denied»
  english_pob_reading: Peter denied the accusation or claim in context, without spelling out a specific object beyond what the scene supplies.
  chosen_spanish_reading: Él negó la acusación implícita en el contexto, sin añadir un objeto explícito que el versículo no menciona.
  alternative_spanish_readings:
  - Negó a Jesús
  - lo negó a él
  rationale: El griego sólo dice que «negó»; el contexto inmediato aporta el referente, pero el verso no lo formula explícitamente. El español conserva esa tensión textual con «lo negó» y no introduce un objeto más específico que el pasaje no expresa aquí.
  doctrine_reference: 'Translation philosophy: no se importan precisiones teológicas o narrativas que el versículo no enuncia de forma explícita.'
translation_notes:
  revision_awareness: El borrador sigue de cerca la revisión final del POB inglés que prefirió la equivalencia más directa de τί λέγεις como «what you are saying». También mantiene la decisión de preservar el objeto implícito de ἠρνήσατο mediante un pronombre en español, y conserva la escena pública de ἔμπροσθεν πάντων con una formulación natural en español.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda, pero este versículo no contiene esos términos.
  - Se mantiene el registro narrativo sobrio y no se sustituye «negar» por un término eclesiástico más tradicional sin base textual.
  - La cita directa en español conserva el orden y la sencillez del griego dentro de una sintaxis natural para lectura pública.
