translation:
  language: es
  text: Cuando me levanté por la mañana para dar de mamar a mi hijo, he aquí que estaba muerto. Pero cuando lo observé con atención[a] por la mañana, he aquí que no era mi hijo, el que yo había dado a luz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo examiné cuidadosamente».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el que yo di a luz».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָקֻם
  english_pob_choice: When I got up
  chosen_spanish: Cuando me levanté
  alternatives_spanish:
  - Y me levanté
  - Así que me levanté
  lexicon: HALOT
  rationale: La forma wayyiqtol narra una acción puntual en secuencia; «me levanté» reproduce con naturalidad el inicio temporal expresado por «when». Mantiene el valor narrativo sin sonar calcado.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - muy de mañana
  lexicon: HALOT
  rationale: Es la expresión temporal normal en español y conserva la repetición enfática del hebreo en ambos lugares del verso.
- source_word: לְהֵינִיק
  english_pob_choice: to nurse
  chosen_spanish: dar de mamar
  alternatives_spanish:
  - amamantar
  - amamantar al niño
  lexicon: HALOT
  rationale: El infinitivo causativo aquí indica alimentar al bebé con leche materna. «Dar de mamar» es claro, natural y conserva el sentido concreto del acto sin suavizarlo.
- source_word: אֶת־בְּנִי
  english_pob_choice: my son
  chosen_spanish: a mi hijo
  alternatives_spanish:
  - a mi hijo varón
  - a mi niño
  lexicon: HALOT
  rationale: בֵּן con sufijo posesivo refiere específicamente a un hijo; en español «hijo» es la forma natural y precisa. Se evita «niño» porque no expresa tan directamente la relación filial.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - mira
  lexicon: HALOT
  rationale: «He aquí» preserva el golpe de sorpresa y constatación súbita del hebreo, y en español bíblico sigue siendo comprensible y solemne.
- source_word: מֵת
  english_pob_choice: he was dead
  chosen_spanish: estaba muerto
  alternatives_spanish:
  - había muerto
  - estaba fallecido
  lexicon: HALOT
  rationale: El participio/predicativo describe el estado del niño al verla levantarse; «estaba muerto» comunica con claridad ese estado resultante sin alterar el punto de vista narrativo.
- source_word: וָאֶתְבּוֹנֵן
  english_pob_choice: I looked closely
  chosen_spanish: lo observé con atención
  alternatives_spanish:
  - lo examiné cuidadosamente
  - lo miré detenidamente
  lexicon: HALOT
  rationale: La forma reflexiva de בין/בון implica una inspección deliberada. «Lo observé con atención» conserva la idea de examen cuidadoso y suena natural en español.
- source_word: אֵלָיו
  english_pob_choice: at him
  chosen_spanish: lo
  alternatives_spanish:
  - hacia él
  - sobre él
  lexicon: HALOT
  rationale: Con el verbo de observación en español, el objeto directo basta para reflejar el foco de la inspección; el matiz direccional queda absorbido por la construcción verbal.
- source_word: לֹא הָיָה בְנִי
  english_pob_choice: he was not my son
  chosen_spanish: no era mi hijo
  alternatives_spanish:
  - no era mi hijo varón
  - no era mi hijo aquel
  lexicon: HALOT
  rationale: El hebreo afirma la identidad negada del niño. «No era mi hijo» reproduce la negación de filiación de forma idiomática y directa.
- source_word: אֲשֶׁר יָלָדְתִּי
  english_pob_choice: whom I had borne
  chosen_spanish: el que yo había dado a luz
  alternatives_spanish:
  - a quien yo había dado a luz
  - el que yo había parido
  lexicon: HALOT
  rationale: יַלַד en primera persona se refiere al parto. «Dar a luz» mantiene la concreción del nacimiento y es claro para lectores modernos; se evita un giro demasiado técnico o brusco.
translation_notes:
  revision_awareness: Se mantuvo la estructura narrativa y la doble repetición de «por la mañana» y «he aquí», siguiendo el hebreo y el audit trail en inglés. La principal decisión de ajuste al español fue usar expresiones idiomáticas naturales («dar de mamar», «observé con atención», «dar a luz») sin perder el énfasis dramático ni el contraste de filiación.
  spanish_consistency_notes:
  - Se preservó «he aquí» para וְהִנֵּה, en coherencia con el estilo POB de mantener la fuerza súbita del original.
  - Se evitó «SEÑOR» u otros reemplazos no pertinentes; el verso no contiene el Tetragrámaton.
  - Se mantuvo «hijo» para בֵּן por precisión lexical y por coherencia con el contraste materno-filial del pasaje.
  - El giro «había dado a luz» conserva la anterioridad relativa que en inglés se expresó con «had borne».
