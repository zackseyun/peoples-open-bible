    issue: '''Estaban siendo muertos'' es una formulación antinatural en español.'
    rationale: Aunque intenta calcar el imperfecto pasivo, en español suena torpe y poco digno. 'Eran ejecutados' o 'los mataban' serían más idiomáticos; 'eran ejecutados' preserva mejor la voz pasiva y la severidad.
  - severity: medium
    issue: La nota [a] está aplicada a ἐθανατοῦντο en vez de a ὅρια.
    rationale: La auditoría inglesa documenta la alternativa léxica en 'territories/borders/regions', no en 'were being put to death'. En español la nota debe ir con 'territorios[a]'.
