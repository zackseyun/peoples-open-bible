  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Tierra», «perecerán» y la conservación de la primera persona divina son adecuadas. No se requiere introducir «Yahvé» en el texto porque el hebreo aquí usa primera persona verbal sin nombre explícito.
