revisions:
- from: No es por tu justicia ni por la rectitud de tu corazón que entras a poseer su tierra[a], sino por la maldad de estas naciones Yahvé tu Dios las desaloja de delante de ti, y para confirmar la palabra que Yahvé juró a tus padres, a Abraham, a Isaac[c][b] y a Jacob.
  to: No es por tu justicia ni por la rectitud de tu corazón que entras a poseer su tierra, sino por la maldad de estas naciones Yahvé tu Dios las expulsa[a] de delante de ti, y para confirmar la palabra que Yahvé juró a tus padres, a Abraham, a Isaac[c][b] y a Jacob.
  rationale: Se corrige el anclaje de la nota léxica [a] para que explique el verbo hebreo relevante, y se mejora la naturalidad y precisión contextual sustituyendo «desaloja» por «expulsa», conservando en nota la alternativa de desposesión territorial documentada por el POB inglés.
