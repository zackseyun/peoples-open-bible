translation:
  language: es
  text: Porque él te ha oído y se ha puesto en guardia contra ti[a], y a su tiempo te odiará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa: «ha estado en guardia contra ti». El griego ἐφυλάξατό puede también entenderse como «se guardó de ti»; aquí el contexto favorece la idea de que se puso a la defensiva ante ti, más que la de protegerte o simplemente vigilarte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκήκοεν
  english_pob_choice: has heard
  chosen_spanish: te ha oído
  alternatives_spanish:
  - te oyó
  - te ha escuchado
  lexicon: BDAG
  rationale: El perfecto griego expresa una acción completada con efecto presente; «te ha oído» conserva ese valor mejor que un pasado simple. «Oír» sigue el matiz directo de ἀκούω sin añadir una carga de atención que el texto no exige por sí solo.
- source_word: γάρ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón del aviso anterior con fuerza explicativa. En español, «Porque» resulta natural al inicio de la cláusula y mantiene la relación causal/expositiva.
- source_word: ἐφυλάξατό
  english_pob_choice: has guarded himself against you
  chosen_spanish: se ha guardado contra ti
  alternatives_spanish:
  - se ha puesto en guardia contra ti
  - ha guardado su distancia de ti
  - te ha observado
  lexicon: BDAG
  rationale: El medio de φυλάσσω aquí no sugiere protección de la otra persona, sino ponerse en guardia o protegerse de ella. «Se ha guardado contra ti» conserva esa reflexividad y el tono ominoso del contexto, sin convertirlo en mera vigilancia neutral.
- source_word: σε
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: BDAG
  rationale: Pronombre de objeto directo singular, natural en español en registro bíblico actual.
- source_word: ἐν καιρῷ
  english_pob_choice: in time
  chosen_spanish: a su tiempo
  alternatives_spanish:
  - en su momento
  - cuando llegue el momento
  - a su debido tiempo
  lexicon: BDAG
  rationale: La expresión temporal apunta a un momento futuro señalado. «A su tiempo» comunica esa llegada posterior con claridad y dignidad.
- source_word: μισήσει
  english_pob_choice: he will hate
  chosen_spanish: te odiará
  alternatives_spanish:
  - te tendrá odio
  - te será hostil
  lexicon: BDAG
  rationale: Se conserva el sentido fuerte de μισέω. «Odiará» evita suavizar la advertencia; el objeto pronominal se integra de forma natural en español.
translation_notes:
  revision_awareness: La redacción sigue el texto griego de Swete y toma en cuenta el ajuste del audit trail inglés, que corrigió el matiz de ἐφυλάξατό desde «vigilar» hacia una idea reflexiva de ponerse en guardia o guardarse contra alguien. Se conserva también la fuerza futura de μισήσει sin atenuarla.
  spanish_consistency_notes:
  - Se mantiene «te» para la segunda persona singular en todo el verso.
  - Se evita «SEÑOR» u otras sustituciones, ya que no aparece el nombre divino en este pasaje.
  - La puntuación reproduce la estructura explicativa del griego con una pausa fuerte antes de la consecuencia futura.
