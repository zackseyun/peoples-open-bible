  to: Extranjeros[a], los despiadados de las naciones, lo cortaron y lo dejaron. Sus ramas cayeron sobre los montes y en todo valle, y su ramaje[b] fue quebrado en todos los cauces[c] de la tierra. Entonces todos los pueblos de la tierra descendieron de su sombra y lo dejaron.
