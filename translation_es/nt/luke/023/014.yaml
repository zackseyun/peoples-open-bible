translation:
  language: es
  text: 'Él les dijo[a]: «Ustedes me trajeron a este hombre como uno que estaba desviando al pueblo, y he aquí, después de examinarlo delante de ustedes[b], no hallé en este hombre ningún fundamento para los cargos que ustedes presentan contra él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como uno que estaba apartando al pueblo». El verbo griego puede significar apartar o desviar; también puede implicar extraviar.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no hallé en este hombre culpa alguna respecto de las cosas de las que ustedes lo acusan».'
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπεν πρὸς αὐτούς
  english_pob_choice: He said to them
  chosen_spanish: Él les dijo
  alternatives_spanish:
  - Les dijo
  lexicon: sin inventar número de léxico
  rationale: Mantiene el marco narrativo y la dirección del discurso. «Les dijo» sería posible, pero «Él les dijo» conserva mejor la referencia explícita del sujeto en un registro bíblico claro.
- source_word: Προσηνέγκατέ μοι
  english_pob_choice: You brought ... to me
  chosen_spanish: me trajeron
  alternatives_spanish:
  - me presentaron
  - me llevaron
  lexicon: sin inventar número de léxico
  rationale: El verbo expresa llevar/presentar a alguien ante una autoridad; en español «me trajeron» comunica naturalmente la acción judicial sin sobrecargarla.
- source_word: τὸν ἄνθρωπον τοῦτον
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - esta persona
  lexicon: sin inventar número de léxico
  rationale: ἄνθρωπος aquí es masculino singular y el contexto judicial apunta a un individuo concreto; «este hombre» es preciso y natural.
- source_word: ὡς ἀποστρέφοντα τὸν λαόν
  english_pob_choice: as one who was misleading the people
  chosen_spanish: como uno que estaba desviando al pueblo
  alternatives_spanish:
  - como uno que estaba alejando al pueblo
  - como uno que estaba extraviando al pueblo
  lexicon: sin inventar número de léxico
  rationale: ἀποστρέφω puede significar apartar/desviar/alejar. «Desviando» conserva la idea de apartar al pueblo sin decidir demasiado rápido por «engañando» o «seduciendo», que cargarían más el sentido.
- source_word: τὸν λαόν
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a la nación
  lexicon: sin inventar número de léxico
  rationale: λαός en Lucas suele referirse al pueblo como colectivo; el artículo y la preposición se ajustan de forma natural al español.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mire
  - vean
  lexicon: sin inventar número de léxico
  rationale: La partícula introduce énfasis y atención. «He aquí» preserva mejor su tono formal y discursivo que un equivalente demasiado coloquial.
- source_word: ἐνώπιον ὑμῶν
  english_pob_choice: before you
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - en presencia de ustedes
  - ante ustedes
  lexicon: sin inventar número de léxico
  rationale: La frase subraya el carácter público de la examinación. «Delante de ustedes» es claro, natural y mantiene la idea de presencia visible.
- source_word: ἀνακρίνας
  english_pob_choice: after examining him
  chosen_spanish: después de examinarlo
  alternatives_spanish:
  - tras interrogarlo
  - habiéndolo examinado
  lexicon: sin inventar número de léxico
  rationale: ἀνακρίνω tiene sentido judicial de examinar/interrogar. «Examinarlo» funciona bien en español y deja abierta la fuerza jurídica sin añadir más que el texto.
- source_word: οὐθὲν εὗρον
  english_pob_choice: I found no
  chosen_spanish: no hallé
  alternatives_spanish:
  - no encontré
  - no descubrí
  lexicon: sin inventar número de léxico
  rationale: «No hallé» es un castellano digno y sobrio para una conclusión judicial, equivalente a la fórmula negativa del griego.
- source_word: ἐν τῷ ἀνθρώπῳ τούτῳ
  english_pob_choice: in this man
  chosen_spanish: en este hombre
  alternatives_spanish:
  - respecto de este hombre
  - contra este hombre
  lexicon: sin inventar número de léxico
  rationale: La localización «en este hombre» reproduce la preposición griega y sostiene la idea de que no se encontró nada incriminatorio en él.
- source_word: αἴτιον
  english_pob_choice: basis for the charges
  chosen_spanish: ningún motivo
  alternatives_spanish:
  - ninguna base
  - ninguna causa
  lexicon: sin inventar número de léxico
  rationale: En este contexto forense, αἴτιον puede ser causa, motivo o base. «Motivo» permite una lectura natural en español y mantiene la negación de fundamento para las acusaciones.
- source_word: ὧν κατηγορεῖτε κατ’ αὐτοῦ
  english_pob_choice: the charges you bring against him
  chosen_spanish: de los cargos que ustedes presentan contra él
  alternatives_spanish:
  - de las acusaciones que ustedes hacen contra él
  - de lo que ustedes lo acusan
  lexicon: sin inventar número de léxico
  rationale: κατηγορέω es acusar/formular cargos. «Presentan contra él» conserva la dimensión formal y jurídica del contexto, y «cargos» refleja bien el lenguaje de un proceso.
theological_decisions:
- issue: Alcance de la declaración de Pilato
  english_pob_reading: Render as a judicial finding of no valid charge, not as an absolute moral verdict detached from the legal context.
  chosen_spanish_reading: Presentarlo como una conclusión judicial de que no hay fundamento para los cargos, no como una absolución moral general desconectada del proceso.
  alternative_spanish_readings:
  - No encuentro culpa en este hombre
  - No encuentro nada digno de condena en este hombre
  rationale: 'El versículo está enmarcado por vocabulario jurídico: «examinar», «motivo», «cargos». La traducción debe conservar ese contexto y no ampliar la afirmación más allá de lo que la escena inmediata establece.'
  doctrine_reference: Principio de primacía del texto original; conservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que prefirió una formulación formal de ἰδοὺ («he aquí/behold») y colocó la negación junto a «motivo/basis» en una construcción forense más cercana al griego. La redacción española intenta reflejar esa misma decisión sin perder naturalidad idiomática.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se eligió «cargos/acuse» en registro judicial para coherencia con el campo semántico de κατηγορέω.
  - Se evitó «SEÑOR» o «Cristo» porque no aparecen en el texto fuente.
  - La nota a conserva la tensión lexical de ἀποστρέφω sin decidir de forma exclusiva entre «desviar» y «apartarse»; la nota b preserva la alternativa forense del texto inglés auditado.
