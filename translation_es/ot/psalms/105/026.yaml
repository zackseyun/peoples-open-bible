translation:
  language: es
  text: Envió a Moisés, su siervo, y a Aarón, a quien había escogido[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escogió». El verbo hebreo puede traducirse como un pasado simple; «había escogido» hace explícito que la elección de Aarón precedió a su envío.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלַח
  english_pob_choice: He sent
  chosen_spanish: Envió
  alternatives_spanish:
  - Mandó
  - Despachó
  lexicon: HALOT
  rationale: El qal perfecto 3ms de שלח se expresa de manera natural en español con «envió». Mantiene el acto de enviar sin introducir una glosa más interpretativa.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moshé
  lexicon: nombre propio estándar
  rationale: Nombre propio bíblico en forma española establecida y claramente reconocible para lectores en español.
- source_word: עַבְדּוֹ
  english_pob_choice: his servant
  chosen_spanish: su siervo
  alternatives_spanish:
  - su esclavo
  lexicon: HALOT
  rationale: Aunque el sustantivo puede significar «esclavo», en este contexto honorífico y de alianza para Moisés la equivalencia más natural y fiel en español es «siervo», como en el uso bíblico consagrado.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: nombre propio estándar
  rationale: Nombre propio bíblico en forma española corriente y transparente.
- source_word: אֲשֶׁר
  english_pob_choice: whom
  chosen_spanish: a quien
  alternatives_spanish:
  - el cual
  - que
  lexicon: HALOT
  rationale: La partícula relativa introduce una cláusula que modifica a Aarón; «a quien» refleja con claridad la relación personal y el régimen del verbo «escoger» en español.
- source_word: בָּחַר בּוֹ
  english_pob_choice: he had chosen
  chosen_spanish: había escogido
  alternatives_spanish:
  - eligió
  - escogió
  lexicon: HALOT
  rationale: בחר con la preposición ב expresa la elección de una persona. «Había escogido» reproduce bien la anterioridad respecto de «envió», siguiendo la decisión inglesa de hacer explícito el tiempo previo sin añadir información nueva.
theological_decisions:
- issue: Relación temporal entre «envió» y «había escogido»
  english_pob_reading: Aaron's choosing preceded his being sent; the English uses past perfect to make that explicit.
  chosen_spanish_reading: Aarón fue escogido previamente a ser enviado; el pluscuamperfecto español lo hace explícito.
  alternative_spanish_readings:
  - Aarón escogido antes de ser enviado
  - a quien escogió
  rationale: El hebreo permite un perfecto simple, pero el contexto semántico muestra que la elección precede al envío. El pluscuamperfecto español conserva esa relación temporal sin alterar el contenido del verso.
  doctrine_reference: Temporalidad narrativa y precedencia lógica en el texto bíblico
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo de WLC y el rastro de decisiones inglés: se mantuvo el sujeto implícito, se conservó la anterioridad de la elección con pluscuamperfecto y se respetó el valor léxico de עֶבֶד sin borrar su posible sentido de «esclavo».'
  spanish_consistency_notes:
  - Se usa «Moisés» y «Aarón» como formas españolas estándar de nombres bíblicos.
  - Se emplea «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no lo nombra de forma abierta.
  - La puntuación reproduce la separación de miembros del verso en español natural.
  - La nota [a] marca la tensión léxica de עֶבֶד sin imponer una sola equivalencia.
