source:
  edition: SBLGNT
  text: μέχρι καταντήσωμεν οἱ πάντες εἰς τὴν ἑνότητα τῆς πίστεως καὶ τῆς ἐπιγνώσεως τοῦ υἱοῦ τοῦ θεοῦ, εἰς ἄνδρα τέλειον, εἰς μέτρον ἡλικίας τοῦ πληρώματος τοῦ Χριστοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/004/013.yaml
  text: until we all attain to the unity of the faith and of the knowledge of the Son of God, to a mature man, to the measure of the stature of the fullness of Messiah,
translation:
  language: ko
  text: 우리 모두가 믿음의 하나 됨과 하나님의 아들을 깊이 아는 지식의 하나 됨에 이르러, 성숙한 사람[a]이 되고, 메시아의 충만의 분량의 키[b]에 이를 때까지입니다—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ἄνδρα τέλειον은 단수 남성형으로 「온 교회의 집합적 성숙」을 표현하는 대표적 단수 어법이다. 「성숙한 사람」으로 옮긴다.
    reason: lexical_alternative
  - marker: b
    text: ἡλικία는 「키·연령」 모두를 의미한다. 메시아의 충만이 가져오는 「온전한 분량」의 상을 「키」로 보존한다.
    reason: lexical_alternative
lexical_decisions:
