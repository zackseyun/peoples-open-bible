translation:
  language: es
  text: Porque ahora me habría acostado y habría estado quieto[a]; habría dormido; entonces habría estado en reposo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «y habría estado quieto»; alternativamente, «y habría estado inmóvil» o «y habría estado en paz».
    reason: lexical_alternative
  - marker: b
    text: O «entonces habría habido descanso para mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación causal del deseo de Job. «Porque» conserva la fuerza explicativa de כִּי con buena naturalidad en español.
- source_word: עַתָּה
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - ya
  - en este momento
  lexicon: HALOT
  rationale: Marca el contraste temporal del escenario hipotético. «Ahora» corresponde de forma directa y clara al valor temporal del adverbio.
- source_word: שָׁכַבְתִּי
  english_pob_choice: I would have lain down
  chosen_spanish: me habría acostado
  alternatives_spanish:
  - habría yacido
  - me habría echado
  lexicon: HALOT
  rationale: El hebreo expresa literalmente ‘me habría recostado / acostado’. «Me habría acostado» conserva la imagen corporal de tumbarse, natural en español y compatible con el paralelismo poético de descanso y muerte.
- source_word: וְאֶשְׁקֹט
  english_pob_choice: and been quiet
  chosen_spanish: y callado
  alternatives_spanish:
  - y quieto
  - y en paz
  lexicon: HALOT
  rationale: «Callado» retiene el valor de quietud/ausencia de perturbación. Se evita «en paz» como interpretación más teológica que lexical, aunque sigue siendo una alternativa semántica posible.
- source_word: יָשַׁנְתִּי
  english_pob_choice: I would have slept
  chosen_spanish: habría dormido
  alternatives_spanish:
  - me habría quedado dormido
  - habría conciliado el sueño
  lexicon: HALOT
  rationale: El verbo común ‘dormir’ refleja con fidelidad la metáfora de sueño usada por el hebreo sin explicitarla ni suavizarla. «Habría dormido» es el equivalente más directo y sobrio.
- source_word: אָז
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - luego
  - después
  lexicon: HALOT
  rationale: Introduce la secuencia consecuente del paralelismo poético. «Entonces» reproduce bien el marcador temporal y el avance lógico del verso.
- source_word: יָנוּחַ לִי
  english_pob_choice: I would have been at rest
  chosen_spanish: habría estado en reposo
  alternatives_spanish:
  - habría tenido reposo
  - habría hallado descanso
  lexicon: HALOT
  rationale: נוח con לִי puede leerse como ‘habría habido reposo para mí’ o ‘yo habría estado en reposo’. «Habría estado en reposo» mantiene la idea de estado reposado sin forzar una paráfrasis más interpretativa.
theological_decisions:
- issue: Imaginería de muerte expresada por sueño y reposo
  english_pob_reading: Retain the literal language of lying down, sleeping, and being at rest without making an explicit doctrinal claim about the state of the dead.
  chosen_spanish_reading: Conservar el lenguaje literal de acostarse, callar, dormir y estar en reposo, sin desarrollar una doctrina explícita sobre el estado de los muertos.
  alternative_spanish_readings:
  - Interpretar ‘dormir’ directamente como ‘morir’
  - Expandir a ‘reposo en la muerte’
  rationale: El verso usa verbos ordinarios para pintar poéticamente el descanso deseado de la muerte. La traducción española mantiene esa tensión y evita resolverla teológicamente más allá de lo que el texto dice.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la decisión auditada del POB en inglés: secuencia causal + temporal, tres verbos de reposo progresivo y cierre con ‘reposo’. No se introdujeron cambios textuales ni revisiones posteriores en el dossier fuente.'
  spanish_consistency_notes:
  - Se prefirió un registro bíblico moderno y sobrio, sin arcaísmos como ‘yacería’ o ‘reposaría’ que sonarían menos naturales.
  - Se evitó ‘paz’ para וְאֶשְׁקֹט, porque el audit trail inglés la trata como alternativa interpretativa, no como elección principal.
  - ‘Reposo’ se mantuvo para יָנוּחַ לִי por coherencia con la culminación del paralelismo poético.
