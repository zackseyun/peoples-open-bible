revisions:
- from: El muerto de Jeroboam[a] en la ciudad lo comerán los perros; y el muerto en el campo lo comerán las aves del cielo[b], porque Yahvé ha hablado.
  to: A cualquiera de los de Jeroboam que muera[a] en la ciudad, se lo comerán los perros; y a cualquiera que muera en el campo, se lo comerán las aves del cielo[b], porque Yahvé ha hablado.
  rationale: La revisión traslada al texto principal la fuerza distributiva que el hebreo tiene idiomáticamente y que el expediente inglés ya documentó, evitando una formulación española rígida y ambigua. Se mantiene «Yahvé», «campo», «aves del cielo» y «ha hablado». La nota a conserva la forma hebrea compacta como alternativa explicativa, y la nota b se corrige para ofrecer alternativas genuinas.
