translation:
  language: es
  text: Porque cuando yo lo introduzca en la tierra que juré a sus padres[a], una tierra que mana leche y miel, y coma y se sacie y engorde, entonces se volverá a otros dioses y los servirá, y me despreciarán[b] y romperá mi pacto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo pasa del singular («lo... coma... se volverá») al plural («me despreciarán»), tratando a Israel tanto como un solo pueblo como compuesto de muchas personas.
    reason: lexical_alternative
  - marker: b
    text: O «me menospreciarán». El verbo hebreo expresa tratar con desdén o desprecio.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For when
  chosen_spanish: Porque cuando
  alternatives_spanish:
  - pues cuando
  - porque al
  lexicon: HALOT
  rationale: La partícula introduce explicación causal y también un marco temporal. «Porque cuando» conserva ambas fuerzas de manera natural en español, sin volver la frase pesada.
- source_word: אֲבִיאֶנּוּ
  english_pob_choice: I bring him
  chosen_spanish: yo lo introduzca
  alternatives_spanish:
  - yo lo lleve
  - yo lo meta
  lexicon: HALOT
  rationale: El verbo causativo de llevar/introducir expresa la acción de hacer entrar. «Lo introduzca» mantiene el matiz causativo y el objeto singular colectivo de Israel.
- source_word: הָאֲדָמָה
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - la región
  lexicon: HALOT
  rationale: En contexto de promesa y herencia, אֲדָמָה apunta a la tierra prometida más que a suelo en sentido material. «Tierra» es la equivalencia más natural y fiel.
- source_word: נִשְׁבַּעְתִּי לַאֲבֹתָיו
  english_pob_choice: that I swore to his fathers
  chosen_spanish: que juré a sus padres
  alternatives_spanish:
  - que juré a sus antepasados
  lexicon: HALOT
  rationale: «Padres» preserva el idiomario pactal del hebreo y la referencia singular colectiva. «Antepasados» aclara, pero diluye el eco de la fórmula tradicional bíblica.
- source_word: זָבַת חָלָב וּדְבַשׁ
  english_pob_choice: a land flowing with milk and honey
  chosen_spanish: tierra que fluye leche y miel
  alternatives_spanish:
  - tierra que mana leche y miel
  - una tierra que fluye leche y miel
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de abundancia. «Fluye» reproduce el participio/adjetivo hebreo con una imagen viva, sin añadir explicaciones.
- source_word: וְאָכַל
  english_pob_choice: he eats
  chosen_spanish: coma
  alternatives_spanish:
  - coma y luego
  - y comerá
  lexicon: HALOT
  rationale: En español, la subordinación temporal con «cuando» pide subjuntivo en la secuencia futura. Mantiene la relación temporal sin forzar un futuro artificial.
- source_word: וְשָׂבַע
  english_pob_choice: is satisfied
  chosen_spanish: se sacie
  alternatives_spanish:
  - quede satisfecho
  - quede saciado
  lexicon: HALOT
  rationale: Expresa plenitud y satisfacción con un verbo natural y reverberante en la serie de acciones. «Sacie» conserva la idea de llenura.
- source_word: וְדָשֵׁן
  english_pob_choice: grows fat
  chosen_spanish: engorde
  alternatives_spanish:
  - se vuelva gordo
  - pros pere
  lexicon: HALOT
  rationale: El hebreo usa una imagen concreta de aumento de gordura/abundancia que puede implicar autosuficiencia. «Engorde» preserva la fuerza corporal y retórica sin sonar extraña.
- source_word: וּפָנָה אֶל
  english_pob_choice: will turn to
  chosen_spanish: se volverá a
  alternatives_spanish:
  - se apartará hacia
  - volverá su rostro a
  lexicon: HALOT
  rationale: «Volverse a» reproduce la orientación de conversión/infidelidad en un español claro. La idea de giro relacional se mantiene sin añadir un término doctrinal.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - dioses extraños
  lexicon: HALOT
  rationale: La equivalencia directa «otros dioses» sigue de cerca el hebreo y evita cargar con interpretaciones adicionales como «ajenos» o «extraños».
- source_word: וַעֲבָדוּם
  english_pob_choice: serve them
  chosen_spanish: les servirá
  alternatives_spanish:
  - los servirá
  - les rendirá culto
  lexicon: HALOT
  rationale: עבד en contexto religioso puede ser servir/rendir culto. «Les servirá» conserva el verbo de lealtad/servicio sin sustituirlo por un tecnicismo eclesiástico.
- source_word: וְנִאֲצוּנִי
  english_pob_choice: spurn me
  chosen_spanish: me menospreciará
  alternatives_spanish:
  - me despreciará
  - me repudiará
  lexicon: HALOT
  rationale: El verbo conlleva tratar con desdén o desprecio. «Menospreciará» comunica bien la ruptura de estima y mantiene la dureza del gesto. Aunque el hebreo tiene una forma plural en la raíz, el audit trail inglés regulariza el sujeto en singular; el español sigue esa lectura coherente.
- source_word: וְהֵפֵר אֶת בְּרִיתִי
  english_pob_choice: break my covenant
  chosen_spanish: romperá mi pacto
  alternatives_spanish:
  - quebrará mi pacto
  - anulará mi pacto
  lexicon: HALOT
  rationale: «Romper el pacto» es el equivalente idiomático más directo y comprensible en español. Mantiene la fuerza covenantal sin suavizarla.
theological_decisions:
- issue: Referencia colectiva singular para Israel
  english_pob_reading: I bring him... he eats... he will turn...
  chosen_spanish_reading: yo lo introduzca... coma... se volverá...
  alternative_spanish_readings:
  - yo los introduzca... coman... se volverán
  - yo lo introduzca... coma... se volverán
  rationale: El hebreo usa objeto y verbos singulares para Israel como pueblo. El español conserva ese tratamiento colectivo en singular, que evita perder la unidad pactal del sujeto.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Matiz de וְנִאֲצוּנִי dentro de la secuencia de infidelidad
  english_pob_reading: and spurn me
  chosen_spanish_reading: y me menospreciará
  alternative_spanish_readings:
  - y me despreciará
  - y me rechazará
  rationale: La secuencia describe infidelidad a Yahvé mediante giro a otros dioses, servicio a ellos y desdén hacia él. «Menospreciará» conserva la dureza relacional y no añade una etiqueta interpretativa como «idolatrará».
  doctrine_reference: Translation philosophy §1
- issue: Uso de «Yahvé» frente a masking de nombre divino
  english_pob_reading: the LORD / divine name context implied by covenant speech
  chosen_spanish_reading: implícitamente el hablante pactal es Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: Aunque este versículo no contiene el tetragrámaton explícito, el contexto del juramento pactal remite al nombre divino en la voz de Dios. El proyecto pide no enmascarar el nombre divino; por eso la traducción no sustituye el referente por una convención litúrgica, sino que se mantiene el discurso directo donde el hablante es Yahvé.
  doctrine_reference: 'Project terminology default: יהוה / YHWH -> Yahvé'
translation_notes:
  revision_awareness: Tomé como base el audit trail inglés y la revisión que mantiene la secuencia singular para Israel. En esta muestra no seguí la regularización plural de la primera pasaba; en cambio, reflejé el tratamiento colectivo singular del hebreo y mantuve la progresión verbal del verso en español natural. También conservé la imagen concreta de abundancia («leche y miel», «engorde») y la cadena de infidelidad sin añadir glosas interpretativas.
  spanish_consistency_notes:
  - Mantener «tierra» para אֲדָמָה en contextos pactales/geográficos.
  - Usar «otros dioses» como forma base para אֱלֹהִים אֲחֵרִים.
  - Conservar «romper mi pacto» para הֵפֵר אֶת בְּרִיתִי en todos los textos paralelos.
  - Preferir «menospreciar/despreciar» para נִאֵץ según el registro de cada contexto.
  - Evitar «SEÑOR» como máscara del nombre divino en proyectos con política de Yahvé.
