revisions:
- from: 'Y les dijeron a Josué: «Yahvé ha entregado toda la tierra en nuestras manos, y, de hecho, todos los habitantes de la tierra se han derretido[a] delante de nosotros».'
  to: 'Y le dijeron a Josué: «Yahvé ha entregado toda la tierra en nuestras manos, y de hecho todos los habitantes de la tierra se han derretido[a] delante de nosotros».'
  rationale: Se corrige el error gramatical principal cambiando «les» por «le» para reflejar fielmente el singular «a Josué». También se aligera la puntuación alrededor de «de hecho» para mejorar la naturalidad sin modificar el sentido ni las decisiones léxicas clave.
