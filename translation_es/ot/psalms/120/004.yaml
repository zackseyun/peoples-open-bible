translation:
  language: es
  text: Flechas afiladas de un guerrero,[a] con brasas de la retama[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «flechas agudas de un hombre poderoso»'
    reason: lexical_alternative
  - marker: b
    text: La retama del desierto (hebreo retam) era apreciada por producir carbón de larga duración.
    reason: cultural_note
lexical_decisions:
- source_word: חִצֵּי
  english_pob_choice: arrows of
  chosen_spanish: Flechas de
  alternatives_spanish:
  - Arcos de
  - Saetas de
  lexicon: HALOT
  rationale: El constructo plural indica 'flechas de'. En español, 'flechas de un guerrero' conserva la relación genitiva y suena natural y bíblico.
- source_word: גִבּוֹר
  english_pob_choice: a warrior
  chosen_spanish: un guerrero
  alternatives_spanish:
  - un hombre poderoso
  - un héroe
  lexicon: HALOT
  rationale: Aquí el sustantivo destaca la fuerza combatiente; 'guerrero' comunica mejor la imagen bélica que 'hombre poderoso' y evita una lectura demasiado genérica.
- source_word: שְׁנוּנִים
  english_pob_choice: sharp
  chosen_spanish: agudas
  alternatives_spanish:
  - afiladas
  - punzantes
  lexicon: HALOT
  rationale: El adjetivo expresa la idea de puntas afiladas. 'Agudas' es breve, idiomático y poético en español, sin perder el sentido de filo.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  - y con
  lexicon: HALOT
  rationale: La preposición simple 'con' reproduce bien la unión de las dos imágenes poéticas sin sobrerrepresentar la relación.
- source_word: גַּחֲלֵי
  english_pob_choice: coals of
  chosen_spanish: brasas de
  alternatives_spanish:
  - carbones de
  - ascuas de
  lexicon: HALOT
  rationale: '''Brasas'' transmite mejor que ''carbones'' la imagen incandescente sugerida por גַּחֲלֵי en este contexto poético; mantiene el valor material sin añadir una glosa explicativa.'
- source_word: רְתָמִים
  english_pob_choice: the broom tree
  chosen_spanish: retam
  alternatives_spanish:
  - retama
  - arbusto de retama
  lexicon: HALOT
  rationale: Se conserva el nombre propio de la planta en forma transliterada para mantener la referencia botánica y la tensión cultural del original. 'Retam' es más directo que una domesticación como 'retama'.
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una revisión que eliminó 'burning' de la traducción de גַּחֲלֵי, porque el hebreo dice literalmente solo 'brasas/coals'. La versión española sigue esa revisión al usar 'brasas' sin añadir un adjetivo de combustión explícito. También se tuvo en cuenta que el inglés optó por 'warrior' frente a 'mighty man'; aquí 'guerrero' conserva esa misma decisión semántica.
  spanish_consistency_notes:
  - Se mantiene un estilo sobrio y poético acorde con los Salmos.
  - No se usa 'SEÑOR' ni fórmulas de sustitución, porque este versículo no contiene el nombre divino.
  - '''Retam'' se deja transliterado para evitar perder la referencia al arbusto desértico mencionado en el aparato auditado.'
