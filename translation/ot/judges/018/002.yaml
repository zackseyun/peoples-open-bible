id: JDG.18.2
reference: Judges 18:2
source:
  edition: WLC
  text: וַ/יִּשְׁלְח֣וּ בְנֵי דָ֣ן מִֽ/מִּשְׁפַּחְתָּ֡/ם חֲמִשָּׁ֣ה אֲנָשִׁ֣ים מִ/קְצוֹתָ/ם֩ אֲנָשִׁ֨ים בְּנֵי חַ֜יִל מִ/צָּרְעָ֣ה וּ/מֵֽ/אֶשְׁתָּאֹ֗ל לְ/רַגֵּ֤ל אֶת הָ/אָ֨רֶץ֙ וּ/לְ/חָקְרָ֔/הּ וַ/יֹּאמְר֣וּ אֲלֵ/הֶ֔ם לְכ֖וּ חִקְר֣וּ אֶת הָ/אָ֑רֶץ וַ/יָּבֹ֤אוּ הַר אֶפְרַ֨יִם֙ עַד בֵּ֣ית מִיכָ֔ה וַ/יָּלִ֖ינוּ שָֽׁם־׀־־־־־׃
translation:
  text: So the sons of Dan sent five men from their clan[a], from among their whole number, valiant men from Zorah and from Eshtaol, to spy out the land and to explore it. And they said to them, “Go, explore the land.” So they came to the hill country of Ephraim, as far as the house of Micah[c][b], and spent the night there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “valiant men” or “men of valor” for “capable men.”
    reason: lexical_alternative
  - marker: b
    text: Or “to search it out” / “investigate it” for “to explore it.”
    reason: lexical_alternative
  - marker: c
    text: Hebrew “the house of Micah,” which may refer to Micah’s household compound.
    reason: cultural_note
lexical_decisions:
- source_word: בְנֵי דָן
  chosen: the sons of Dan
  alternatives:
  - the Danites
  - the people of Dan
  lexicon: HALOT
  rationale: A formally transparent rendering that preserves the tribal/familial idiom. 'Danites' is possible and idiomatic, but 'sons of Dan' better reflects the Hebrew construction while remaining readable.
- source_word: מִמִּשְׁפַּחְתָּם
  chosen: from their clan
  alternatives:
  - from their family
  - from their tribe
  lexicon: HALOT
  rationale: מִשְׁפָּחָה commonly denotes a clan-level kinship group within a tribe. 'Clan' best fits the social scale here; 'tribe' would be too broad, and 'family' too narrow in modern English.
- source_word: חֲמִשָּׁה אֲנָשִׁים
  chosen: five men
  alternatives:
  - five persons
  lexicon: HALOT
  rationale: The Hebrew explicitly uses masculine 'men'; per gender-accurate policy, this should not be neutralized.
- source_word: מִקְצוֹתָם
  chosen: from among their number
  alternatives:
  - from their extremities
  - from their borders
  - from the whole of them
  lexicon: HALOT
  rationale: In this idiom the phrase means selected from among the group, not literally 'from their ends.' 'From among their number' conveys the partitive sense naturally.
- source_word: אֲנָשִׁים בְּנֵי חַיִל
  chosen: capable men
  alternatives:
  - valiant men
  - mighty men
  - men of valor
  lexicon: HALOT
  rationale: בְּנֵי חַיִל often denotes men of strength, competence, or valor. In this scouting context, 'capable men' communicates fitness and competence without importing a purely military nuance, though valor is not excluded.
- source_word: מִצָּרְעָה וּמֵאֶשְׁתָּאֹל
  chosen: from Zorah and from Eshtaol
  lexicon: HALOT
  rationale: Standard transliteration of place names, following the philosophy of transliterating names rather than translating them.
- source_word: לְרַגֵּל
  chosen: to spy out
  alternatives:
  - to scout
  - to reconnoiter
  lexicon: HALOT
  rationale: This verb commonly refers to reconnaissance or spying. 'Spy out' preserves the purposeful investigative sense and matches biblical usage.
- source_word: וּלְחָקְרָהּ / חִקְרוּ
  chosen: to explore it / explore the land
  alternatives:
  - to search it out
  - to investigate it
  lexicon: HALOT
  rationale: The root חקר emphasizes careful examination or investigation. Rendering both occurrences with 'explore' preserves lexical consistency while sounding natural alongside 'spy out.'
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  - the territory
  lexicon: HALOT
  rationale: In context this refers to the territory they seek to occupy. 'Land' is the most natural and biblically consistent rendering.
- source_word: הַר אֶפְרַיִם
  chosen: the hill country of Ephraim
  alternatives:
  - Mount Ephraim
  - the mountains of Ephraim
  lexicon: HALOT
  rationale: This expression denotes the Ephraimite highlands rather than a single peak. 'Hill country of Ephraim' is the standard geographic sense.
- source_word: עַד בֵּית מִיכָה
  chosen: as far as the house of Micah
  alternatives:
  - to Micah's house
  lexicon: HALOT
  rationale: עַד marks extent, and בֵּית מִיכָה is literally 'the house of Micah.' 'As far as' preserves the directional nuance; 'house' may denote household compound, but the literal rendering is sufficient.
- source_word: וַיָּלִינוּ שָׁם
  chosen: spent the night there
  alternatives:
  - lodged there
  - stayed there overnight
  lexicon: HALOT
  rationale: The verb לון in this form means to lodge or remain overnight. 'Spent the night there' is clear modern English.
