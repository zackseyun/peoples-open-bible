  glossary_alignment: 'Buena alineación con la terminología del proyecto: «razón» para λογισμός, «carne» para σάρξ, y sin conflictos con términos teológicos mayores. «Miembros» para μεροὶ es defendible por la racionalidad documentada, aunque «extremidades» sería posible; no hace falta cambiarlo. «Manera» para τρόπος es aceptable en español, aunque «método» también cabría.'
