translation:
  language: es
  text: Cuando Jehú llegó a Jezreel[a], Jezabel se enteró. Se pintó los ojos con antimonio, adornó su cabeza[b] y se asomó a la ventana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «se puso kohl en los ojos».
    reason: lexical_alternative
  - marker: b
    text: O «arregló su cabello»; el hebreo literalmente dice «hizo buena/bonita su cabeza».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: HALOT
  rationale: El verbo de movimiento en este contexto narrativo introduce la llegada de Jehú a Jezreel. «Llegó» suena natural en español y conserva la idea de arribo sin añadir matices de entrada que el hebreo no exige aquí.
- source_word: יִזְרְעֶאלָה
  english_pob_choice: to Jezreel
  chosen_spanish: a Jezreel
  alternatives_spanish:
  - hacia Jezreel
  - a la ciudad de Jezreel
  lexicon: HALOT
  rationale: El sufijo direccional marca movimiento hacia el lugar; en español, «a Jezreel» reproduce bien esa dirección sin sobreexplicar la relación espacial.
- source_word: שָׁמְעָה
  english_pob_choice: heard of it
  chosen_spanish: se enteró
  alternatives_spanish:
  - oyó
  - escuchó la noticia
  lexicon: HALOT
  rationale: El hebreo deja el objeto implícito por el contexto. «Se enteró» expresa ese acceso a la noticia de manera idiomática en español y evita una construcción pesada.
- source_word: וַתָּשֶׂם בַּפּוּךְ עֵינֶיהָ
  english_pob_choice: painted her eyes with kohl
  chosen_spanish: se pintó los ojos con antimonio
  alternatives_spanish:
  - se puso kohl en los ojos
  - se pintó los ojos con kohl
  lexicon: HALOT
  rationale: פּוּךְ designa un cosmético oscuro tradicionalmente identificado con antimonio/kohl. «Antimonio» preserva el referente cultural concreto y mantiene la fuerza léxica del término, con la posibilidad alternativa de «kohl».
- source_word: וַתֵּיטֶב אֶת רֹאשָׁהּ
  english_pob_choice: adorned her head
  chosen_spanish: adornó su cabeza
  alternatives_spanish:
  - arregló su cabello
  - se arregló el cabello
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice que «hizo bien» o «embelleció» su cabeza. «Adornó su cabeza» conserva esa literalidad amplia sin reducirla necesariamente solo al cabello.
- source_word: וַתַּשְׁקֵף
  english_pob_choice: looked out
  chosen_spanish: miró
  alternatives_spanish:
  - miró hacia afuera
  - se asomó
  lexicon: HALOT
  rationale: El verbo indica mirar desde una abertura o desde arriba. El complemento con «por la ventana» ya aporta el matiz espacial; «miró» es suficiente y natural en español.
- source_word: בְּעַד הַחַלּוֹן
  english_pob_choice: through the window
  chosen_spanish: por la ventana
  alternatives_spanish:
  - a través de la ventana
  - desde la ventana
  lexicon: HALOT
  rationale: En español, «por la ventana» transmite bien la acción de observar a través de ella y resulta más fluido que una traducción más pesada.
translation_notes:
  revision_awareness: El texto inglés POB y el informe de revisión muestran acuerdo alto y sin cambios aplicados; la versión española sigue esa lectura estable y solo explicita en notas las alternativas léxicas donde el hebreo permite más de una solución.
  spanish_consistency_notes:
  - Se mantiene «Jehú» y «Jezabel» como nombres propios estándar.
  - 'Se conserva el paralelismo narrativo en tres acciones: pintarse los ojos, adornar la cabeza y mirar por la ventana.'
  - «Antimonio» se usa como equivalente cultural concreto de פּוּךְ; la nota ofrece «kohl» como alternativa transparente.
  - No se introduce terminología eclesiástica ni interpretativa ajena al hebreo; la redacción permanece descriptiva y narrativa.
