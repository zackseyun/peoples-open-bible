translation:
  language: es
  text: El espíritu de un hombre puede sostenerlo en su enfermedad[a], pero un espíritu abatido[b], ¿quién lo podrá soportar?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «El espíritu de una persona puede sostenerlo en su enfermedad». El hebreo usa el singular masculino «hombre» en sentido representativo proverbial.
    reason: lexical_alternative
  - marker: b
    text: O «quebrantado» en lugar de «abatido». El adjetivo hebreo admite la idea de algo roto, herido o aplastado.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֽוּחַ
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - aliento
  - viento
  - ánimo
  - temperamento
  lexicon: HALOT
  rationale: En la sabiduría bíblica, רוּחַ suele designar la vida interior, la disposición o la fuerza anímica de la persona. Aquí el paralelismo con enfermedad y con un espíritu abatido favorece claramente «espíritu».
- source_word: אִישׁ
  english_pob_choice: a man's
  chosen_spanish: de un hombre
  alternatives_spanish:
  - de una persona
  - de un ser humano
  lexicon: HALOT
  rationale: El hebreo usa masculino singular con valor representativo proverbial. «De un hombre» conserva esa forma sin impedir una lectura genérica en español.
- source_word: יְכַלְכֵּל
  english_pob_choice: can sustain
  chosen_spanish: puede sostener
  alternatives_spanish:
  - puede mantener
  - puede soportar
  - puede sustentar
  lexicon: HALOT
  rationale: כלכל expresa la idea de sostener, mantener o proveer apoyo. «Puede sostener» reproduce bien la capacidad de un ánimo interior para atravesar la enfermedad.
- source_word: מַחֲלֵהוּ
  english_pob_choice: him in sickness
  chosen_spanish: lo en su enfermedad
  alternatives_spanish:
  - lo en su dolencia
  - lo en su enfermedad física
  - su enfermedad
  lexicon: HALOT
  rationale: El sustantivo significa enfermedad/dolencia con sufijo posesivo. En español, «lo en su enfermedad» preserva la relación sin volverla torpe.
- source_word: נְכֵאָה
  english_pob_choice: crushed
  chosen_spanish: abatido
  alternatives_spanish:
  - quebrantado
  - aplastado
  - quebrado
  lexicon: HALOT
  rationale: El adjetivo denota algo herido, roto o aplastado. «Abatido» comunica bien el estado interior en un español natural y mantiene la tensión con el primer miembro.
- source_word: יִשָּׂאֶנָּה
  english_pob_choice: can bear it
  chosen_spanish: podrá soportar
  alternatives_spanish:
  - podrá cargarlo
  - podrá llevarlo
  - podrá resistirlo
  lexicon: HALOT
  rationale: נשא puede significar llevar, cargar o soportar. En esta pregunta retórica, «podrá soportar» expresa con naturalidad la carga de un espíritu abatido.
theological_decisions:
- issue: Lectura representativa del masculino singular
  english_pob_reading: A man's spirit ...
  chosen_spanish_reading: El espíritu de un hombre ...
  alternative_spanish_readings:
  - El espíritu de una persona ...
  - El espíritu humano ...
  rationale: Se mantiene el masculino singular del hebreo como forma proverbial representativa, sin perder inteligibilidad en español. No se neutraliza innecesariamente la forma fuente, pero el sentido sigue siendo general.
  doctrine_reference: Poética sapiencial / uso proverbial del masculino genérico
- issue: Matiz de רוּחַ como disposición interior frente a aliento o viento
  english_pob_reading: spirit
  chosen_spanish_reading: espíritu
  alternative_spanish_readings:
  - ánimo
  - aliento
  rationale: El contraste con enfermedad y con un espíritu abatido muestra que aquí se habla de la fortaleza interior de la persona. «Espíritu» conserva mejor ese campo semántico que «aliento» o «viento».
  doctrine_reference: Antropología bíblica en literatura sapiencial
translation_notes:
  revision_awareness: Se siguió de cerca el estado revisado más reciente, que no requería cambios sustanciales. La redacción española conserva el paralelismo, la pregunta retórica final y la alternancia entre una fortaleza interior que sostiene y un espíritu interior que resulta difícil de soportar.
  spanish_consistency_notes:
  - Se usó «espíritu» para רוּחַ en ambos miembros, manteniendo la coherencia semántica del contraste.
  - Se evitó «SEÑOR» u otra terminología irrelevante; el versículo no contiene el nombre divino.
  - «Hombre» se conservó como forma proverbial masculina singular, sin convertirlo automáticamente en lenguaje neutralizado.
  - '«Sostener» y «soportar» distinguen bien los dos verbos hebreos: apoyo interior frente a carga pesada.'
