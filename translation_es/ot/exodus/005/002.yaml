translation:
  language: es
  text: 'Faraón dijo[a]: «¿Quién es Yahvé, para que yo obedezca su voz y deje ir a Israel? No conozco a Yahvé, y además no dejaré ir a Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR». Otra alternativa es «Jehová».'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: El hebreo usa el Tetragrámaton directamente. Siguiendo la decisión auditada del POB inglés de preservar el nombre divino, se emplea «Yahvé» en español, forma amplia y reverente en castellano bíblico. Se evita «el SEÑOR» porque ocultaría el nombre propio revelado en el texto fuente.
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién...?
  alternatives_spanish:
  - ¿Qué...?
  lexicon: HALOT
  rationale: La pregunta pide identidad personal o de autoridad, no una descripción de clase. «¿Quién?» reproduce bien el desafío despectivo de Faraón.
- source_word: אֶשְׁמַע בְּקֹלוֹ
  english_pob_choice: that I should obey his voice
  chosen_spanish: para que yo obedezca su voz
  alternatives_spanish:
  - para que yo escuche su voz
  - para que yo atienda a su voz
  lexicon: HALOT
  rationale: El hebreo שׁמע con בְּקוֹל suele implicar obediencia. «Obedezca su voz» conserva ese valor idiomático; «escuchar» sería posible pero más débil en español.
- source_word: לְשַׁלַּח
  english_pob_choice: let ... go
  chosen_spanish: deje ir
  alternatives_spanish:
  - mande salir
  - libere
  lexicon: HALOT
  rationale: En el contexto del Éxodo, שׁלח con Israel como objeto se vierte de manera natural como «dejar ir». Esto mantiene el sentido narrativo sin volverlo mecánico.
- source_word: יָדַעְתִּי
  english_pob_choice: I do not know
  chosen_spanish: No conozco
  alternatives_spanish:
  - No he conocido
  - No reconozco
  lexicon: HALOT
  rationale: 'El perfecto expresa aquí la postura presente de Faraón: no reconoce ni acepta a Yahvé. «No conozco» es la forma más natural en español y preserva el rechazo relacional implícito.'
- source_word: וְגַם
  english_pob_choice: and moreover
  chosen_spanish: y además
  alternatives_spanish:
  - y también
  - e incluso
  lexicon: HALOT
  rationale: La partícula añade énfasis acumulativo a la negativa. «Y además» comunica bien esa intensificación en español contemporáneo.
- source_word: אֲשַׁלֵּחַ
  english_pob_choice: I will not let ... go
  chosen_spanish: no dejaré ir
  alternatives_spanish:
  - no enviaré fuera
  - no soltaré
  lexicon: HALOT
  rationale: Se conserva la repetición del verbo contextual «dejar ir», coherente con el infinitivo anterior y con el uso exodico del verbo para liberar al pueblo.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el Faraón
  lexicon: HALOT
  rationale: Título real estándar en español bíblico. Sin artículo inicial se mantiene la fluidez narrativa y coincide con el uso común en este registro.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene el nombre propio colectivo del texto fuente. En este versículo designa al pueblo, y «Israel» es suficiente y fiel.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: 'El POB inglés preserva el nombre propio divino en lugar de sustituirlo por un título. En español, «Yahvé» expresa la misma decisión teológica y filológica: mantener el nombre revelado a Moisés, no un reemplazo litúrgico.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés muestran acuerdo alto y no registran revisiones posteriores; por eso la versión española sigue de cerca la solución aprobada, manteniendo la tensión del nombre divino y la fuerza idiomática de שׁמע בְּקוֹל y שׁלח en el contexto del Éxodo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene «dejar ir» para שׁלח con Israel como objeto, evitando variación innecesaria con «enviar» o «liberar».
  - «Obedezca su voz» conserva el valor idiomático de שׁמע בְּקוֹל sin caer en un calco áspero.
  - La negación final «no dejaré ir» repite el verbo contextual para sostener la paralelía del hebreo.
