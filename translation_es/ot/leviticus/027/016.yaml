revisions:
- from: 'Si un hombre consagra a Yahvé parte del campo de su posesión[a], entonces tu valuación será conforme a su cantidad de semilla: cincuenta siclos de plata por la semilla de un homer de cebada.'
  to: 'Si un hombre consagra a Yahvé parte del campo de su posesión[a], entonces tu tasación será según la semilla que requiera: cincuenta siclos de plata por la semilla de un homer de cebada.'
  rationale: Se revisa el texto para mejorar la naturalidad y precisión del español sin apartarse del hebreo ni de la auditoría inglesa. «Tasación» comunica mejor el carácter técnico de עֶרְכְּךָ en Levítico 27 que «valuación». «Según la semilla que requiera» refleja con más fidelidad לְפִי זַרְעוֹ como base agraria de cálculo. También se afina la nota para explicar correctamente el valor partitivo del prefijo hebreo en מִשְּׂדֵה.
