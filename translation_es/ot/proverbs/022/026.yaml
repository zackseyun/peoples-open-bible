translation:
  language: es
  text: No estés entre los que dan la mano[a], entre los que salen fiadores de deudas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «No estés entre los que dan la mano en prenda, entre los que salen fiadores de préstamos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No estés
  - No te pongas a
  lexicon: HALOT
  rationale: La partícula negativa de prohibición se vierte naturalmente con 'No'. En combinación con el verbo siguiente, la prohibición queda clara en español sin añadir matices no presentes en el hebreo.
- source_word: תְּהִי
  english_pob_choice: be
  chosen_spanish: estés
  alternatives_spanish:
  - seas
  - llegues a ser
  lexicon: HALOT
  rationale: Con אַל + imperfecto, el hebreo formula una prohibición; en español, 'No estés' comunica bien la idea de pertenencia o asociación prohibida ('no estés entre...') y mantiene un registro fluido y directo.
- source_word: בְ/תֹקְעֵי
  english_pob_choice: among those who strike
  chosen_spanish: entre los que estrechan
  alternatives_spanish:
  - entre los que golpean
  - entre los que chocan
  lexicon: HALOT
  rationale: El preposición ב con participio señala asociación con un grupo. 'Estrechar la mano' reproduce de forma idiomática el gesto de cerrar un pacto o compromiso, que es el uso contextual de תקע aquí, sin perder la imagen corporal subyacente.
- source_word: כָף
  english_pob_choice: hands
  chosen_spanish: la mano
  alternatives_spanish:
  - las manos
  - la palma
  lexicon: HALOT
  rationale: כף puede significar 'palma/mano'. En español, la expresión fija 'estrechar la mano' comunica con claridad el gesto legal-social implicado; se conserva el singular idiomático para evitar una formulación poco natural.
- source_word: בַּ/עֹרְבִים
  english_pob_choice: among those who become surety for
  chosen_spanish: entre los que se hacen fiadores de
  alternatives_spanish:
  - entre los que salen fiadores de
  - entre los que garantizan
  lexicon: HALOT
  rationale: עָרַב en este contexto es asumir responsabilidad como fiador. 'Hacerse fiadores de' expresa bien la acción voluntaria y formal de asumir una obligación ajena, con un registro jurídico comprensible en español.
- source_word: מַשָּׁאוֹת
  english_pob_choice: debts
  chosen_spanish: deudas
  alternatives_spanish:
  - préstamos
  - obligaciones
  lexicon: HALOT
  rationale: La referencia financiera del contexto sapiencial pide una palabra clara y contemporánea. 'Deudas' sigue de cerca la decisión inglesa auditada y conserva la fuerza práctica del proverbio.
translation_notes:
  revision_awareness: La base inglesa revisó 'guarante debts' a 'become surety for debts' para mayor precisión léxica. La versión española sigue esa precisión con 'se hacen fiadores de deudas' y conserva la imagen idiomática del gesto de la mano como señal de compromiso.
  spanish_consistency_notes:
  - Se mantiene 'fiadores' para reflejar el matiz jurídico de ערב, en lugar de un 'garantes' más general.
  - '''Estrechan la mano'' busca conservar el gesto pactal sin forzar una calcomanía; la nota ofrece la alternativa más literal ''en prenda''.'
  - 'El orden de los dos miembros paralelos sigue el hebreo y la traducción inglesa auditada: gesto de compromiso, luego asunción de obligación.'
