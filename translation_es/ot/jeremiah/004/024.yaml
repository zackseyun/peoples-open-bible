- from: Miré a los montes[a], y he aquí, temblaban, y todas las colinas[b] fueron sacudidas.
  to: Miré las montañas[a], y he aquí, temblaban, y todas las colinas[b] fueron sacudidas.
  rationale: Se ajusta la frase inicial a un español más natural («Miré las montañas») y se alinea la elección principal con la decisión auditada del POB («mountains»). Se conservan las alternativas relevantes en notas sin perder la distinción poética con «colinas».
