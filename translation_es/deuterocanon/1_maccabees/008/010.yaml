review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja en general bien la secuencia del griego: conocimiento del asunto, envío de un solo general, combate, muchos que cayeron heridos, cautiverio de mujeres e hijos, saqueo, control de la tierra, derribo de fortificaciones y repetición final del saqueo. Sin embargo, ‘la noticia llegó a ellos’ desplaza el matiz pasivo de ἐγνώσθη (‘llegó a ser conocido / se supo’) hacia una imagen de llegada, y ‘tomaron cautivas a sus mujeres y a sus hijos’ presenta discordancia de género con ‘hijos’.'
  spanish_quality_summary: 'El español es claro y bastante natural, pero conviene pulir dos puntos para mayor corrección y fidelidad: usar una formulación más directa para ἐγνώσθη ὁ λόγος (‘cuando el asunto[a] llegó a ser conocido por ellos’ o equivalente natural) y corregir ‘tomaron cautivas a sus mujeres y a sus hijos’ por una construcción que abarque ambos objetos sin discordancia, p. ej. ‘tomaron cautivos a sus mujeres y a sus hijos’.'
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. Las decisiones militares principales son adecuadas: στρατηγός → ‘general’, ὀχυρώματα → ‘fortalezas’, ἐπρονόμευσαν → ‘despojaron’. La repetición final de ‘y los despojaron’ debe conservarse, en línea con el rastro de auditoría inglés. La nota sobre λόγος es útil, pero debe alinearse mejor con la nueva redacción.'
  issues:
  - severity: medium
    issue: ‘la noticia llegó a ellos’ para ἐγνώσθη ὁ λόγος
    rationale: Aunque es idiomático, cambia el enfoque de ‘llegó a ser conocido / se supo por ellos’ a una metáfora de llegada no explícita en el griego. Dado que el inglés auditado eligió ‘the matter became known’, conviene una formulación española más cercana a ese valor.
  - severity: high
    issue: Discordancia en ‘tomaron cautivas a sus mujeres y a sus hijos’
    rationale: ‘Cautivas’ concuerda con ‘mujeres’ pero no con el conjunto ‘mujeres e hijos’. El griego incluye ambos objetos bajo el mismo verbo; el español debe usar una forma que abarque a ambos sin incorrección gramatical.
