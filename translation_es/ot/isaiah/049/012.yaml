translation:
  language: es
  text: Mira, estos vendrán de lejos, y mira, estos del norte y del mar[a], y estos de la tierra de Sinim[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «del occidente», ya que «el mar» puede funcionar en hebreo como referencia geográfica occidental.
    reason: lexical_alternative
  - marker: b
    text: «Sinim» es un topónimo incierto. Entre las propuestas se han sugerido Siene/Asuán, en el sur de Egipto; algunos han propuesto una región más oriental y distante, pero la ubicación no es segura.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Mira, pues
  - He aquí
  lexicon: HALOT
  rationale: La interjección hebrea llama la atención del oyente. «Mira» conserva la fuerza deíctica en español moderno sin el tono arcaico de «He aquí», y refleja la repetición del original.
- source_word: אֵלֶּה
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - estos mismos
  - estos hombres
  - éstos
  lexicon: HALOT
  rationale: Pronombre demostrativo plural directo. «Estos» preserva la repetición enfática y resulta natural en español.
- source_word: מֵרָחוֹק
  english_pob_choice: from far away
  chosen_spanish: de lejos
  alternatives_spanish:
  - desde lejos
  - de una gran distancia
  lexicon: HALOT
  rationale: La frase hebrea expresa lejanía espacial. «De lejos» es la equivalencia más natural y concisa en español, sin perder el sentido de distancia.
- source_word: יָבֹאוּ
  english_pob_choice: will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - vendrán a
  - llegarán
  lexicon: HALOT
  rationale: El imperfecto tiene sentido futuro en el contexto. «Vendrán» reproduce ese valor futuro con fluidez en español.
- source_word: מִצָּפוֹן
  english_pob_choice: from the north
  chosen_spanish: del norte
  alternatives_spanish:
  - desde el norte
  - de la región del norte
  lexicon: HALOT
  rationale: La referencia direccional es literal. «Del norte» mantiene la simpleza y claridad del hebreo.
- source_word: וּמִיָּם
  english_pob_choice: from the sea
  chosen_spanish: del mar
  alternatives_spanish:
  - desde el mar
  - del occidente
  lexicon: HALOT
  rationale: Se conserva el sentido literal del hebreo «mar». Aunque el idioma hebreo puede usar «mar» con valor geográfico de occidente, el texto base dice «mar», por lo que esa forma permanece en el cuerpo principal.
- source_word: מֵאֶרֶץ
  english_pob_choice: from the land of
  chosen_spanish: de la tierra de
  alternatives_spanish:
  - de la tierra llamada
  - del país de
  lexicon: HALOT
  rationale: La construcción de estado constructo introduce un topónimo. «Tierra de» es la correspondencia formal más natural en español y reproduce la relación posesiva/toponímica.
- source_word: סִינִים
  english_pob_choice: Sinim
  chosen_spanish: Sinim
  alternatives_spanish:
  - Siené
  - Asuán
  - China
  lexicon: HALOT
  rationale: El topónimo es incierto y no debe resolverse especulativamente en el texto principal. Se translitera como en el inglés POB para respetar la incertidumbre del referente.
theological_decisions:
- issue: Sentido direccional de «del mar»
  english_pob_reading: The main text keeps 'from the sea,' with a footnote noting that the phrase may idiomatically mean 'from the west.'
  chosen_spanish_reading: El texto principal dice «del mar», con nota que señala la posible lectura geográfica «del occidente».
  alternative_spanish_readings:
  - del occidente
  - desde el occidente
  - del Mediterráneo
  rationale: La expresión hebrea puede funcionar como referencia occidental, pero el literal hebreo es «mar». Mantener «del mar» preserva el dato textual y la nota conserva la alternativa idiomática sin borrar la tensión.
  doctrine_reference: Geografía bíblica y semántica hebrea
- issue: Identidad de Sinim
  english_pob_reading: '''Sinim'' is an uncertain place-name; proposed identifications are preserved in a footnote.'
  chosen_spanish_reading: «Sinim» se translitera en el texto principal y se explica en nota como topónimo incierto.
  alternative_spanish_readings:
  - Siene
  - Asuán
  - China
  rationale: No hay base suficiente para fijar una identificación en el texto. La transliteración respeta la cautela del POB y evita convertir una hipótesis en afirmación.
  doctrine_reference: Crítica textual y geografía histórica
translation_notes:
  revision_awareness: El texto español sigue el estado revisado sin cambios sustanciales indicado en el expediente inglés. Se mantuvo la distribución de frases y la puntuación básica, con adaptación natural al español y preservando las dos notas de incertidumbre semántica/toponímica del original auditado.
  spanish_consistency_notes:
  - Se conserva «Yahvé» solo cuando el texto lo exija; este versículo no lo contiene.
  - Se usa un registro moderno y digno; se evita «He aquí» por su tono más arcaico, aunque sigue siendo una alternativa válida.
  - La repetición hebrea de los demostrativos y de la interjección se refleja en español para mantener el paralelismo.
  - Se optó por «del mar» en lugar de interpretar explícitamente «del occidente» en el cuerpo principal, siguiendo la cautela del POB.
