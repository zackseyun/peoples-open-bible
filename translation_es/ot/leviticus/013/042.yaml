translation:
  language: es
  text: Pero si hay en la calva[a] o en la frente calva una lesión rojiblanca, es una enfermedad cutánea[b] que brota en su calva o en su frente calva.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los dos términos hebreos distinguen la calvicie en la parte posterior de la cabeza y la calvicie en la parte frontal.
    reason: cultural_note
  - marker: b
    text: O tradicionalmente, «lepra». El término hebreo se refiere de manera más amplia a un conjunto de enfermedades o afecciones de la piel y no debe identificarse estrictamente con la enfermedad de Hansen.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: HALOT
  rationale: La partícula introduce un caso condicional en una sección legal; «Pero si» mantiene el matiz de transición contrastiva y la fuerza condicional sin sonar arcaico.
- source_word: יִהְיֶה
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - aparece
  - se presenta
  lexicon: HALOT
  rationale: 'Funciona existencialmente con la ubicación: en español natural, «hay» expresa bien la presencia de la lesión en la zona indicada.'
- source_word: בַקָּרַחַת
  english_pob_choice: on the bald head
  chosen_spanish: en la calva
  alternatives_spanish:
  - en la calva de la cabeza
  - en la parte calva de atrás de la cabeza
  lexicon: HALOT
  rationale: קָרַחַת nombra la calvicie, aquí con valor locativo y en contraste con גַּבַּחַת. «En la calva» es breve y natural; la distinción espacial se conserva en la nota.
- source_word: בַגַּבַּחַת
  english_pob_choice: on the bald forehead
  chosen_spanish: en la frente calva
  alternatives_spanish:
  - en la calva frontal
  - en la parte calva de delante de la cabeza
  lexicon: HALOT
  rationale: El término complementa a קָרַחַת y suele referirse a la calvicie frontal. «Frente calva» comunica la distinción de forma clara y publicable en español.
- source_word: נֶגַע
  english_pob_choice: diseased spot / infection
  chosen_spanish: lesión
  alternatives_spanish:
  - mancha
  - afección
  - marca
  lexicon: HALOT
  rationale: En Levítico 13, נֶגַע designa una marca visible examinable ritual y físicamente. «Lesión» es suficientemente neutral y evita precisar de más el tipo médico.
- source_word: לָבָן אֲדַמְדָּם
  english_pob_choice: reddish-white
  chosen_spanish: rojiblanca
  alternatives_spanish:
  - blanquecirroja
  - blanca rojiza
  - blanca con rojo
  lexicon: HALOT
  rationale: La pareja adjetival describe el color de la lesión. «Rojiblanca» conserva la compacidad del hebreo y la inversión que el inglés revisado prefirió para sonar más natural.
- source_word: צָרַעַת
  english_pob_choice: leprous disease / skin disease
  chosen_spanish: sarna
  alternatives_spanish:
  - lepra
  - enfermedad cutánea
  lexicon: HALOT
  rationale: El término hebreo es más amplio que la lepra moderna. «Sarna» reproduce una afección cutánea visible sin identificarla con Hansen, y permite conservar el peso ritual del término sin modernizarlo en exceso.
- source_word: פֹּרַחַת
  english_pob_choice: breaking out / spreading
  chosen_spanish: que brota
  alternatives_spanish:
  - que se extiende
  - que va brotando
  - en erupción
  lexicon: HALOT
  rationale: El participio de פרח describe algo que brota o se manifiesta extendiéndose. «Que brota» refleja bien la imagen verbal y mantiene el dinamismo del hebreo.
- source_word: הִוא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - es esto
  - se trata de
  lexicon: HALOT
  rationale: 'El pronombre retoma la lesión descrita e identifica la condición: en español, «es» suena natural y conserva la afirmación diagnóstica.'
- source_word: בְּקָרַחְתּוֹ
  english_pob_choice: on his bald head
  chosen_spanish: en su calva
  alternatives_spanish:
  - en su cabeza calva
  - en la calva de él
  lexicon: HALOT
  rationale: El sufijo posesivo se conserva con «su»; repetir la misma base nominal mantiene la correspondencia con la primera mitad del versículo.
- source_word: בְגַבַּחְתּוֹ
  english_pob_choice: on his bald forehead
  chosen_spanish: en su frente calva
  alternatives_spanish:
  - en la frente calva de él
  - en su calva frontal
  lexicon: HALOT
  rationale: Como en la primera ocurrencia, se preserva el posesivo y el contraste terminológico frontal/posterior.
theological_decisions:
- issue: Término tradicional «lepra» frente a designación más amplia de la afección
  english_pob_reading: The Hebrew term refers more broadly to a range of skin diseases or conditions and should not be equated strictly with modern Hansen's disease.
  chosen_spanish_reading: sarna
  alternative_spanish_readings:
  - lepra
  - enfermedad cutánea
  rationale: Se evita identificar el término con la lepra moderna. «Sarna» comunica una afección visible de la piel y, en este contexto legal-ritual, preserva el carácter no técnico-médico estricto del hebreo mejor que «lepra»; se mantiene una nota para no ocultar la alternativa tradicional.
  doctrine_reference: Levítico 13; distinción ritual de impureza y diagnóstico sacerdotal, no nosología moderna.
- issue: Distinción lexical entre קָרַחַת y גַּבַּחַת
  english_pob_reading: The two Hebrew terms distinguish baldness at the back of the head and baldness at the front of the head.
  chosen_spanish_reading: calva / frente calva
  alternative_spanish_readings:
  - calva posterior / calva frontal
  - parte calva de atrás / parte calva de delante
  rationale: Se conserva el contraste en español con dos expresiones paralelas y naturales. La nota explica que no son sinónimos exactos y que el hebreo marca dos zonas distintas de la calvicie.
  doctrine_reference: Precisión descriptiva del texto legal hebreo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del inglés POB que prefirió un giro más natural para el color («reddish-white») y una formulación más directa para פֹּרַחַת («breaking out»). En español se reflejó esa preferencia con «rojiblanca» y «que brota», sin perder el carácter legal del pasaje.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el Tetragrámaton como norma del proyecto, pero este versículo no lo contiene.
  - «Lesión» evita medicalizar en exceso el hebreo נֶגַע y encaja con el registro de Levítico 13.
  - La estructura condicional «Pero si... es...» reproduce el tono legal del hebreo sin calcarlo mecánicamente.
  - Se conservó la alternancia singular «la calva / la frente calva» con posesivos en la segunda mitad para reflejar el hebreo.
