translation:
  language: es
  text: Porque grande es la lucha del alma y el peligro que aguarda en tormento eterno para los que transgreden el mandamiento de Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «castigo eterno» o «sufrimiento eterno». El griego dice literalmente «tormento eterno», y βάσανος puede abarcar la idea de tormento o sufrimiento severo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μέγας
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - grave
  - mighty
  lexicon: LSJ
  rationale: μέγας intensifica la seriedad de lo que sigue. 'Grande' conserva esa fuerza de modo natural en español sin añadir matiz no presente en el griego.
- source_word: ψυχῆς
  english_pob_choice: of the soul
  chosen_spanish: del alma
  alternatives_spanish:
  - de la vida
  - del ser interior
  lexicon: LSJ
  rationale: Aquí ψυχή apunta a la dimensión interior de la persona bajo prueba moral y espiritual. 'Del alma' conserva ese peso antropológico con un registro claro y digno.
- source_word: ἀγὼν
  english_pob_choice: struggle
  chosen_spanish: lucha
  alternatives_spanish:
  - contienda
  - conflicto
  lexicon: LSJ
  rationale: ἀγών puede ser contienda o lucha intensa. 'Lucha' comunica bien el conflicto moral y la tensión del contexto en español moderno.
- source_word: κίνδυνος
  english_pob_choice: danger
  chosen_spanish: peligro
  alternatives_spanish:
  - riesgo
  - peril
  lexicon: LSJ
  rationale: El sustantivo significa peligro o amenaza real. 'Peligro' es la correspondencia más directa y transparente en español.
- source_word: ἐν αἰωνίῳ βασάνῳ
  english_pob_choice: in eternal torment
  chosen_spanish: en tormento eterno
  alternatives_spanish:
  - en castigo eterno
  - en sufrimiento eterno
  lexicon: LSJ
  rationale: βάσανος tiene el sentido de tormento o sufrimiento severo; αἰώνιος lo marca como duradero sin límite. 'Tormento eterno' conserva la fuerza del griego y evita suavizar el término.
- source_word: κείμενος
  english_pob_choice: lying
  chosen_spanish: que yace
  alternatives_spanish:
  - puesto
  - establecido
  - que está tendido
  lexicon: LSJ
  rationale: El participio expresa algo que está situado o yace ante los transgresores. 'Que yace' refleja esa imagen sin desplazarla hacia una idea de reserva futura.
- source_word: τοῖς παραβαίνουσι
  english_pob_choice: for those who transgress
  chosen_spanish: para los que transgreden
  alternatives_spanish:
  - para los que quebrantan
  - para los transgresores de
  lexicon: LSJ
  rationale: El participio describe a quienes violan un mandato. 'Transgreden' mantiene el tono moral y jurídico del original.
- source_word: τὴν ἐντολὴν τοῦ θεοῦ
  english_pob_choice: the commandment of God
  chosen_spanish: el mandamiento de Dios
  alternatives_spanish:
  - el mandato de Dios
  - el precepto de Dios
  lexicon: LSJ
  rationale: ἐντολή puede ser mandamiento o mandato. 'Mandamiento de Dios' preserva el singular y el registro solemne del griego.
theological_decisions:
- issue: Intensidad de βάσανος
  english_pob_reading: eternal torment
  chosen_spanish_reading: tormento eterno
  alternative_spanish_readings:
  - castigo eterno
  - sufrimiento eterno
  rationale: La frase griega es directa y fuerte; conviene conservar esa dureza sin domesticarla. 'Tormento eterno' mantiene la tensión doctrinal y léxica del pasaje.
  doctrine_reference: Preservar la tensión del texto fuente; primacía del original sobre la tradición interpretativa.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió 'laid up' por 'lying' para reflejar mejor κείμενος; por eso el español usa 'que yace' y evita una imagen de almacenamiento futuro. Se mantiene también la lectura fuerte de βάσανος como tormento.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para θεός, en línea con el estándar del proyecto.
  - Se eligió 'mandamiento' en singular para preservar la forma del griego.
  - Se evitó 'SEÑOR' porque el texto griego no contiene κύριος en esta línea.
  - '''Tormento'' conserva el valor lexical fuerte de βάσανος sin rebajarlo a simple ''castigo''.'
