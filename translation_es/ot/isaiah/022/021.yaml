translation:
  language: es
  text: Lo vestiré con tu túnica[a], y le ceñiré tu faja; pondré tu autoridad en su mano, y será padre para los habitantes de Jerusalén y para la casa de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llegará a ser padre»; la metáfora hebrea denota liderazgo protector y responsable, no paternidad biológica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִלְבַּשְׁתִּיו
  english_pob_choice: I will clothe him
  chosen_spanish: Yo lo vestiré
  alternatives_spanish:
  - Yo lo pondré
  - Yo lo cubriré con ropa
  lexicon: HALOT
  rationale: El hifil de לבש expresa hacer que alguien sea vestido. «Vestir» conserva bien la acción directa y es natural en español; «cubrir con ropa» sería más explicativo de lo necesario.
- source_word: כֻּתָּנְתֶּךָ
  english_pob_choice: your tunic
  chosen_spanish: tu túnica
  alternatives_spanish:
  - tu vestido
  - tu ropaje
  lexicon: HALOT
  rationale: כֻּתֹּנֶת designa una prenda interior o de base, y «túnica» es el equivalente más preciso y digno en español bíblico. «Ropaje» es más general y menos exacto.
- source_word: וְאַבְנֵטְךָ
  english_pob_choice: your sash
  chosen_spanish: tu cinturón
  alternatives_spanish:
  - tu faja
  - tu banda
  lexicon: HALOT
  rationale: אַבְנֵט es una banda de ceñido; aunque «sash» puede rendirse como «faja» o «banda», «cinturón» comunica con claridad el acto de ceñir en español. Se acepta como equivalente funcional, aunque algo menos ceremonial que «faja».
- source_word: אֲחַזְּקֶנּוּ
  english_pob_choice: I will fasten ... on him
  chosen_spanish: le ceñiré
  alternatives_spanish:
  - lo ajustaré firmemente
  - lo sujetaré
  lexicon: HALOT
  rationale: En este contexto, el piel de חזק junto al cinturón/sash indica asegurar o fijar la prenda. «Ceñiré» reproduce bien la imagen corporal y ceremonial, manteniendo la fuerza de fijación sin convertirla en una abstracción.
- source_word: וּמֶמְשֶׁלְתְּךָ
  english_pob_choice: your authority
  chosen_spanish: tu autoridad
  alternatives_spanish:
  - tu gobierno
  - tu dominio
  lexicon: HALOT
  rationale: מֶמְשָׁלָה refiere al poder o autoridad de gobierno. «Autoridad» es claro y fiel al contexto de investidura administrativa; «gobierno» o «dominio» desplazan el matiz.
- source_word: אֶתֵּן בְּיָדוֹ
  english_pob_choice: I will place ... into his hand
  chosen_spanish: pondré ... en su mano
  alternatives_spanish:
  - la daré en su mano
  - la confiaré a su mano
  lexicon: HALOT
  rationale: El hebreo usa el idiomático «dar en la mano» para entregar o confiar poder. «Pondré en su mano» mantiene la imagen concreta y su sentido de encargo/responsabilidad.
- source_word: וְהָיָה לְאָב
  english_pob_choice: he will become a father
  chosen_spanish: será padre
  alternatives_spanish:
  - llegará a ser padre
  - será como un padre
  lexicon: HALOT
  rationale: La construcción señala un estado resultante; en español, «será padre» preserva la metáfora sin añadir paráfrasis. Dado el contexto, el «padre» es figura de liderazgo protector, no paternidad biológica.
- source_word: לְיוֹשֵׁב יְרוּשָׁלִַם
  english_pob_choice: to the inhabitants of Jerusalem
  chosen_spanish: para los habitantes de Jerusalén
  alternatives_spanish:
  - para el que habita en Jerusalén
  - para los que viven en Jerusalén
  lexicon: HALOT
  rationale: El participio singular funciona colectivamente. «Los habitantes de Jerusalén» expresa con naturalidad el referente plural/colectivo en español.
- source_word: וּלְבֵית יְהוּדָה
  english_pob_choice: to the house of Judah
  chosen_spanish: y para la casa de Judá
  alternatives_spanish:
  - y para la casa de Judá
  - y para Judá
  lexicon: HALOT
  rationale: «Casa de Judá» conserva el giro bíblico y su carga nacional/covenantal, en lugar de reducirlo a una simple referencia étnica o territorial.
theological_decisions:
- issue: Metáfora de «padre» aplicada a una figura política
  english_pob_reading: The Hebrew metaphor denotes protective, responsible leadership, not biological paternity.
  chosen_spanish_reading: Se mantiene la metáfora de un liderazgo protector y responsable, sin convertirla en paternidad biológica.
  alternative_spanish_readings:
  - será como un padre
  - será un patrono
  rationale: El hebreo habla directamente de «padre». Conservar «será padre» evita desactivar la imagen y respeta la tensión del texto, donde el cargo designado adquiere una función de cuidado y tutela para la comunidad.
  doctrine_reference: Preservar la metáfora del texto fuente; evitar paráfrasis explicativa innecesaria.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido del paquete fuente y con la auditoría inglesa: mantiene la secuencia de investidura (vestir, ceñir, entregar autoridad) y conserva la metáfora de «padre» como liderazgo protector. No se registran revisiones previas aplicadas en el expediente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija explícitamente; en este versículo no aparece el Tetragrámaton en la superficie hebrea citada.
  - Se prefirió una correspondencia formal con ligera adaptación idiomática para preservar la imagen ceremonial sin sonar calcado.
  - «Casa de Judá» y «habitantes de Jerusalén» conservan el paralelismo colectivo del hebreo.
  - La nota al pie se ancla en «padre» porque ahí se concentra la alternativa lexical y metafórica documentada.
