    issue: La expresión 'se aprovecha con ganancia injusta' es poco natural en español.
    rationale: Aunque intenta conservar el lucro moralmente torcido, la construcción con 'aprovecharse con' no es idiomática aquí y debilita la claridad del proverbio.
  - severity: low
    issue: '''Sus poseedores'' suena algo rígido y menos claro que una formulación pronominal.'
    rationale: El hebreo permite la idea de 'quienes la poseen'; en español esta opción mantiene el antecedente 'ganancia injusta' más transparente y mejora la fluidez.
