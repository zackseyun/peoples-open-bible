translation:
  language: es
  text: Pero tú, Yahvé de los Ejércitos, que examinas al justo, que ves los riñones y el corazón[a], déjame ver tu venganza sobre ellos, porque a ti he revelado mi causa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los riñones y el corazón», una figura para los pensamientos, motivos y afectos más profundos.'
    reason: cultural_note
  - marker: b
    text: O «mi caso», «mi pleito» o «mi disputa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה / YHWH
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahvé
  lexicon: Contested divine-name rendering; project default for יהוה.
  rationale: El hebreo usa el Nombre divino directamente. Siguiendo el estándar del proyecto, se conserva como «Yahvé» en el texto principal, evitando el máscara «SEÑOR» y manteniendo la referencia explícita al nombre del pacto.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de los ejércitos celestiales
  - de los ejércitos celestiales
  lexicon: HALOT
  rationale: El plural militar se conserva con naturalidad en español como «Ejércitos», más claro que el tradicional «huestes» y fiel al sentido concreto del hebreo.
- source_word: בֹּחֵן
  english_pob_choice: who test
  chosen_spanish: que examinas
  alternatives_spanish:
  - que pruebas
  - que examinas
  - que pones a prueba
  lexicon: HALOT
  rationale: El participio describe la acción continua de Yahvé. «Examinas» comunica bien la idea de probar/investigar al justo sin perder la fuerza evaluativa del verbo.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: al justo
  alternatives_spanish:
  - al justo
  - al recto
  - al inocente
  lexicon: HALOT
  rationale: Se trata del sustantivo usado de manera substantiva. «Al justo» es la equivalencia más directa y mantiene el contraste moral/judicial del hebreo.
- source_word: רֹאֶה
  english_pob_choice: who see
  chosen_spanish: que ves
  alternatives_spanish:
  - que observas
  - que contemplas
  - que miras
  lexicon: HALOT
  rationale: Se conserva el paralelismo con «que examinas» mediante otra cláusula relativa. «Ves» es breve, natural y suficientemente fuerte para el campo semántico del verbo.
- source_word: כְלָיֹות
  english_pob_choice: the kidneys
  chosen_spanish: los riñones
  alternatives_spanish:
  - los riñones
  - las entrañas
  - el interior
  lexicon: HALOT
  rationale: El hebreo es concreto. Se mantiene la imagen corporal como en la base inglesa, porque el texto apunta a la profundidad de los motivos internos sin explicitarla.
- source_word: וָלֵב
  english_pob_choice: and the heart
  chosen_spanish: y el corazón
  alternatives_spanish:
  - y el corazón
  - y la mente
  - y el ser interior
  lexicon: HALOT
  rationale: Se conserva la pareja corporal «riñones y corazón» para no aplanar la antropología hebrea en categorías psicológicas modernas. El español lo entiende con naturalidad.
- source_word: נִקְמָתְךָ
  english_pob_choice: your vengeance
  chosen_spanish: tu venganza
  alternatives_spanish:
  - tu venganza
  - tu retribución
  - tu vindicación
  lexicon: HALOT
  rationale: «Venganza» es la equivalencia más directa y evita suavizar la intensidad judicial del sustantivo. Se preserva así el tono de apelación del profeta.
- source_word: מֵהֶם
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - sobre ellos
  - contra ellos
  - de ellos
  lexicon: HALOT
  rationale: 'Aunque el hebreo literalmente puede leerse «de ellos», en el contexto de venganza el español idiomático requiere una relación de dirección/objetivo: «sobre ellos».'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - porque
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la petición. «Porque» es claro y conservador; mantiene la relación causal sin añadir énfasis extra.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - a ti
  - delante de ti
  - ante ti
  lexicon: HALOT
  rationale: Se conserva la dirección de la declaración en segunda persona. «A ti» es la forma natural para este complemento verbal en español.
- source_word: גִּלִּיתִי
  english_pob_choice: I have revealed
  chosen_spanish: he revelado
  alternatives_spanish:
  - he revelado
  - he expuesto
  - te he dado a conocer
  lexicon: HALOT
  rationale: El perfectivo hebreo se traduce con perfecto compuesto para dar el matiz de acto ya realizado con vigencia presente. «Revelado» mantiene la imagen de descubrir/abrir algo delante de Dios.
- source_word: רִיבִי
  english_pob_choice: my case
  chosen_spanish: mi causa
  alternatives_spanish:
  - mi causa
  - mi pleito
  - mi disputa
  lexicon: HALOT
  rationale: Aunque el inglés opta por «my case», en español «mi causa» comunica mejor el registro legal y devocional del término ריב sin sonar demasiado técnico. Se conserva la posible tensión entre caso jurídico y causa personal.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahvé
  rationale: La política del proyecto exige traducir el Tetragrámaton con el nombre divino explícito. «Yahvé» respeta la decisión auditada del POB en inglés y conserva la identificación directa del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Imagen antropológica de «los riñones y el corazón»
  english_pob_reading: retain the concrete imagery 'the kidneys and the heart' in the main text
  chosen_spanish_reading: conservar «los riñones y el corazón»
  alternative_spanish_readings:
  - el interior y el corazón
  - la mente y el corazón
  - las entrañas y el corazón
  rationale: Se mantiene la imagen corporal concreta para no borrar la metáfora hebrea de la vida interior. El español puede recibir esta imagen sin necesidad de convertirla en una explicación psicológica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje quedó estable tras el pase de control, con acuerdo alto entre las evaluaciones y solo observaciones menores.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se conserva la imagen corporal hebrea «riñones y corazón» y se explica en nota.
  - «Mi causa» refleja el valor jurídico-devocional de רִיב y evita estrechar el sentido a un solo tecnicismo.
  - El registro general es bíblico y digno, con sintaxis española natural sin calcos innecesarios.
