translation:
  language: es
  text: Entonces Miriam, la profetisa, hermana de Aarón, tomó el pandero en su mano, y todas las mujeres salieron tras ella con panderos y danzas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «danzando». El sustantivo hebreo puede entenderse como la actividad de danzar o como la forma plural «danzas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקַּח
  english_pob_choice: Then ... took
  chosen_spanish: Entonces ... tomó
  alternatives_spanish:
  - Y ... tomó
  - Después ... tomó
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «entonces» mantiene el valor secuencial sin sonar forzado en español.
- source_word: מִרְיָם
  english_pob_choice: Miriam
  chosen_spanish: Miriam
  alternatives_spanish:
  - María
  lexicon: Convención transliterada
  rationale: Se conserva el nombre propio bíblico en la forma usual para evitar confusión con otras figuras llamadas María.
- source_word: הַנְּבִיאָה
  english_pob_choice: the prophetess
  chosen_spanish: la profetisa
  alternatives_spanish:
  - la profeta
  - la mujer profeta
  lexicon: HALOT
  rationale: El hebreo marca explícitamente el femenino; «profetisa» reproduce esa marca con naturalidad en español y evita neutralizar el género.
- source_word: אֲחוֹת אַהֲרֹן
  english_pob_choice: Aaron’s sister
  chosen_spanish: hermana de Aarón
  alternatives_spanish:
  - la hermana de Aarón
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de forma idiomática en español. Se conserva la identificación explícita con Aarón, tal como hace el hebreo.
- source_word: הַתֹּף
  english_pob_choice: the tambourine
  chosen_spanish: el pandero
  alternatives_spanish:
  - el tambor
  - la pandereta
  lexicon: HALOT
  rationale: El término hebreo designa un instrumento de percusión portátil; «pandero» es una equivalencia tradicional y suficientemente precisa en español bíblico, más cercana que «pandereta» por su connotación moderna.
- source_word: בְּיָדָהּ
  english_pob_choice: in her hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - con su mano
  lexicon: HALOT
  rationale: Se mantiene el valor locativo literal de la preposición, que en español resulta natural y claro.
- source_word: וַתֵּצֶאןָ
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron
  - se dirigieron
  lexicon: HALOT
  rationale: «Salir» conserva el movimiento narrativo del verbo יצא y el plural femenino del hebreo, sin sobreinterpretar la dirección.
- source_word: כָל הַנָּשִׁים
  english_pob_choice: all the women
  chosen_spanish: todas las mujeres
  alternatives_spanish:
  - todas las damas
  lexicon: HALOT
  rationale: Se mantiene la referencia específica al grupo femenino sin suavizar el término con un registro menos directo.
- source_word: אַחֲרֶיהָ
  english_pob_choice: after her
  chosen_spanish: tras ella
  alternatives_spanish:
  - detrás de ella
  lexicon: HALOT
  rationale: «Tras ella» reproduce el seguimiento procesional de manera más fluida que «detrás de ella».
- source_word: בְּתֻפִּים
  english_pob_choice: with tambourines
  chosen_spanish: con panderos
  alternatives_spanish:
  - con tamboriles
  - con panderetas
  lexicon: HALOT
  rationale: Se conserva la correspondencia con el singular previo y el carácter instrumental del plural.
- source_word: וּבִמְחֹלֹת
  english_pob_choice: and dancing
  chosen_spanish: y danzas
  alternatives_spanish:
  - y baile
  - y con danzas
  lexicon: HALOT
  rationale: El sustantivo plural admite el matiz de «danzas»; se conserva la tensión documentada entre la acción («dancing») y la forma plural del hebreo («dances»).
theological_decisions:
- issue: El género femenino explícito de «la profetisa»
  english_pob_reading: the prophetess
  chosen_spanish_reading: la profetisa
  alternative_spanish_readings:
  - la profeta
  - el profeta
  rationale: No se neutraliza el femenino del hebreo ni se masculiniza el título. Esto conserva la referencia a una figura profética femenina, coherente con el texto fuente y su énfasis narrativo.
  doctrine_reference: Lenguaje gramatical del texto; no implica una tesis doctrinal adicional.
- issue: La expresión «danzas» frente a una traducción verbal
  english_pob_reading: Or 'with dances.' The Hebrew noun can be rendered either as the activity ('dancing') or as the plural event form ('dances').
  chosen_spanish_reading: y danzas
  alternative_spanish_readings:
  - y bailando
  - y con danzas
  rationale: Se conserva la ambigüedad lexical del hebreo entre el acto de danzar y la forma nominal plural. «Danzas» permite reflejar la forma plural sin perder el sentido celebrativo del pasaje.
  doctrine_reference: Ninguna; se trata de una decisión lexical y estilística.
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en su último pase y recibió acuerdo alto en la revisión cruzada; por ello, la presente propuesta española sigue de cerca esa lectura y solo adapta las equivalencias léxicas al español natural, manteniendo la ambigüedad documentada de מְחֹלֹת.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el Tetragrámaton; este verso no lo contiene.
  - Se conserva la correspondencia entre el singular «pandero» y el plural «panderos» para reflejar el paralelismo del hebreo.
  - Se usa «profetisa» para respetar el femenino explícito del hebreo y la lectura del POB inglés.
  - La nota al pie marca únicamente la alternativa lexical documentada para מְחֹלֹת y se ancla en «danzas».
