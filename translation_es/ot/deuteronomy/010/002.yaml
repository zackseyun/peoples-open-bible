- from: Y escribiré sobre las tablas las palabras[a] que estaban sobre las primeras tablas, que quebraste, y las pondrás en el arca.
  to: Y escribiré en las tablas las palabras[a] que estaban en las primeras tablas, que quebraste, y las pondrás en el arca.
