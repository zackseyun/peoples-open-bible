translation:
  language: es
  text: para establecer estos días de Purim en sus tiempos señalados[a], así como Mardoqueo el judío y Ester la reina habían establecido para ellos, y así como ellos habían establecido para sí mismos y para su descendencia los asuntos de los ayunos y su clamor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confirmar». El verbo hebreo repetido en este versículo puede expresar la acción de dejar firmemente instituida la observancia.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «su grito» o «su lamentación». El hebreo probablemente se refiere al clamor de la comunidad asociado con los ayunos.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְקַיֵּם
  english_pob_choice: to establish
  chosen_spanish: establecer
  alternatives_spanish:
  - confirmar
  - fijar
  lexicon: HALOT
  rationale: El verbo חוזק/קום en esta forma expresa dar firmeza o dejar instituido algo. «Establecer» conserva bien el sentido administrativo y normativo del texto, y funciona de modo natural en español.
- source_word: יְמֵי הַפֻּרִים הָאֵלֶּה
  english_pob_choice: these days of Purim
  chosen_spanish: estos días de Purim
  alternatives_spanish:
  - estos días purim
  - estos días purím
  lexicon: HALOT
  rationale: La estructura hebrea destaca días concretos ya conocidos en el contexto. «Estos días de Purim» respeta el demostrativo y la referencia festiva sin forzar el español.
- source_word: בִּזְמַנֵּיהֶם
  english_pob_choice: at their appointed times
  chosen_spanish: en sus tiempos señalados
  alternatives_spanish:
  - en sus tiempos
  - en sus tiempos fijados
  - en sus momentos
  lexicon: HALOT
  rationale: זְמָן aquí indica tiempo fijado o asignado. «Tiempos señalados» comunica bien la idea de observancia programada o establecida; «señalados» mantiene la resonancia formal de un tiempo designado.
- source_word: כַּאֲשֶׁר קִיַּם עֲלֵיהֶם
  english_pob_choice: just as ... had established for them
  chosen_spanish: así como ... habían establecido para ellos
  alternatives_spanish:
  - tal como ... habían establecido para ellos
  - del mismo modo que ... habían establecido para ellos
  - así como ... habían confirmado para ellos
  lexicon: HALOT
  rationale: La repetición del verbo קים en el versículo pide continuidad lexical. «Habían establecido para ellos» conserva esa reiteración y el valor formal de instituir algo para la comunidad.
- source_word: מָרְדֳּכַי הַיְּהוּדִי
  english_pob_choice: Mordecai the Jew
  chosen_spanish: Mardoqueo el judío
  alternatives_spanish:
  - Mardoqueo el judeano
  lexicon: HALOT
  rationale: La designación étnica es la forma convencional y precisa en este contexto narrativo. «El judío» reproduce la apposición del hebreo sin añadir interpretación geográfica.
- source_word: אֶסְתֵּר הַמַּלְכָּה
  english_pob_choice: Esther the queen
  chosen_spanish: Ester la reina
  alternatives_spanish:
  - la reina Ester
  lexicon: HALOT
  rationale: La apposición hebrea se refleja de manera directa con «Ester la reina». Es una forma formal y transparente que respeta el orden del original.
- source_word: וְכַאֲשֶׁר קִיְּמוּ עַל נַפְשָׁם וְעַל זַרְעָם
  english_pob_choice: and just as they had established for themselves and for their offspring
  chosen_spanish: y así como habían establecido para sí mismos y para su descendencia
  alternatives_spanish:
  - y así como se habían comprometido ellos y su descendencia
  - y así como habían obligado sobre sí mismos y sobre su descendencia
  lexicon: HALOT
  rationale: עַל נֶפֶשׁ expresa la idea de asumir algo sobre sí mismos; en español, «para sí mismos» comunica el reflexivo sin volverlo más duro de lo necesario. זֶרַע se vierte naturalmente como «descendencia» en un registro bíblico claro.
- source_word: זַרְעָם
  english_pob_choice: their offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - sus hijos
  - su semilla
  - sus descendientes
  lexicon: HALOT
  rationale: «Descendencia» preserva la continuidad familiar y el valor colectivo de זֶרַע en un español bíblico contemporáneo. «Descendientes» también es posible, pero «descendencia» suena más sobrio en este contexto.
- source_word: דִּבְרֵי הַצֹּמוֹת
  english_pob_choice: the matters of the fasts
  chosen_spanish: los asuntos de los ayunos
  alternatives_spanish:
  - los asuntos de los ayunos rituales
  - las palabras de los ayunos
  - las observancias de los ayunos
  lexicon: HALOT
  rationale: דִּבְרֵי en prose administrativa suele significar «asuntos» o «materias». «Ayunos» traduce צֹּמוֹת de forma directa; «asuntos de los ayunos» mantiene la ambigüedad de una referencia formal a lo sucedido en relación con esos ayunos.
- source_word: וְזַעֲקָתָם
  english_pob_choice: and their cry
  chosen_spanish: y su clamor
  alternatives_spanish:
  - y su grito
  - y su cry
  - y su lamentación
  lexicon: HALOT
  rationale: זַעֲקָה denota un grito o clamor intenso, a menudo en aflicción o súplica. «Clamor» conserva la fuerza del sustantivo sin restringirlo indebidamente a una sola modalidad emocional.
theological_decisions:
- issue: El acto de instituir/fijar la observancia de Purim
  english_pob_reading: to establish these days of Purim at their appointed times
  chosen_spanish_reading: para establecer estos días de Purim en sus tiempos señalados
  alternative_spanish_readings:
  - para confirmar estos días de Purim en sus tiempos señalados
  - para fijar estos días de Purim en sus tiempos señalados
  rationale: El versículo trata de la ratificación formal de una observancia comunitaria. «Establecer» conserva la fuerza normativa sin introducir una teología ajena ni suavizar el carácter institucional del verbo.
  doctrine_reference: None
- issue: La relación de la comunidad con los ayunos y el clamor
  english_pob_reading: the matters of the fasts and their cry
  chosen_spanish_reading: los asuntos de los ayunos y su clamor
  alternative_spanish_readings:
  - las observancias de los ayunos y su clamor
  - los asuntos de los ayunos y su grito
  rationale: El hebreo menciona ayunos y clamor como elementos vinculados a la memoria de la crisis. «Clamor» mantiene la amplitud del término, que puede abarcar grito de angustia o súplica, sin encerrar el sentido en una sola práctica litúrgica.
  doctrine_reference: None
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para reemplazar 'their outcry' por 'their cry' en la clausula final, buscando mayor naturalidad sin perder intensidad. La propuesta española refleja esa decisión con 'su clamor', una forma directa y formal que conserva el peso semántico de זַעֲקָה. También se mantiene la repetición de 'establecer' para reproducir la cadena verbal del hebreo.
  spanish_consistency_notes:
  - Se usa 'Purim' sin traducción para el nombre de la fiesta, siguiendo el uso consolidado en español bíblico.
  - Se conserva 'Mardoqueo' y 'Ester' como formas españolas estándar de los nombres propios.
  - '''Yahvé'' no aparece en este versículo, por lo que no se aplica la convención del nombre divino.'
  - La frase 'sus tiempos señalados' intenta reflejar el carácter fijado del calendario sin convertirlo en una paráfrasis moderna.
  - '''Clamor'' mantiene un registro bíblico sobrio y es compatible con el valor de זַעֲקָה en contexto de ayuno y aflicción.'
