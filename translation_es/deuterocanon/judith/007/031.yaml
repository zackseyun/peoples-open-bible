    rationale: Aunque es fiel al plural de ὑμῶν, «vuestras» introduce un sabor peninsular que se aparta del objetivo de español neutral latinoamericano/broadly church-readable. «Sus palabras» preserva el plural y mejora la adecuación de estilo.
  - severity: low
