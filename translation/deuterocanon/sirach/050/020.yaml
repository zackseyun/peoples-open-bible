  edition: sefaria-ben-sira-kahana
  text: אָז יָרַד וְנָשָׂא יָדָיו, עַל כָּל קְהַל יִשְׂרָאֵל.<br><small>(כ)</small> וּבִרְכַּת יְהֹוָה בִּשְׂפָתָיו, וּבְשֵׁם יְהֹוָה הִתְפָּאֵר.
