base_translation:
  language: en
  yaml_path: translation/ot/isaiah/060/007.yaml
  text: All the flocks of Kedar will be gathered to you[a]; the rams of Nebaioth will minister to you. They will go up with acceptance on my altar[b], and I will beautify my glorious house.
  footnotes:
