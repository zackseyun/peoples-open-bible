review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido base del siríaco auditado y adopta correctamente la revisión inglesa clave: «not according to» como norma o medida del juicio, no como separación («apart from»). También conserva bien «the abundance of his mercies» y el lamento «woe to all of us who have been born».'
  spanish_quality_summary: La redacción es clara y digna, pero «nos juzgara no según» suena algo rígido en español. La colocación más natural es «no nos juzgara según» o, con subjuntivo en la prótasis, «si él no nos juzgara según…». Además, la coma antes de «los que hemos nacido» puede simplificarse para una lectura más fluida.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «misericordias» preserva bien el plural, y «¡ay de…!» es adecuado. La principal mejora es de naturalidad sintáctica, no de glosario.
  issues:
  - severity: medium
    issue: Orden poco natural de la negación verbal en «nos juzgara no según»
    rationale: Aunque comprensible, en español bíblico-legible suena menos idiomático que «no nos juzgara según». El sentido fuente se preserva mejor con una sintaxis natural sin alterar la lógica de medida/norma.
  - severity: low
    issue: La nota [a] preserva una alternativa ya superada en el audit trail
    rationale: El inglés documenta «apart from» como lectura anterior, no como alternativa viva preferible. Mantenerla como nota puede sugerir una ambigüedad más fuerte de la que la revisión auditada permite. En este versículo no es necesario conservarla en español.
  revised_spanish_text: Porque, si él no nos juzgara según la abundancia de sus misericordias, ¡ay de todos nosotros que hemos nacido!
  revision_rationale: Se ajusta el orden de la negación para un español más natural y fiel al valor de norma/medida del siríaco auditado. Se elimina la nota porque la alternativa «aparte de» pertenece al historial de revisión inglés y no necesita conservarse como ambigüedad activa en el texto español final.
