id: GEN.47.26
reference: Genesis 47:26
source:
  edition: WLC
  text: וַ/יָּ֣שֶׂם אֹתָ֣/הּ יוֹסֵ֡ף לְ/חֹק֩ עַד הַ/יּ֨וֹם הַ/זֶּ֜ה עַל אַדְמַ֥ת מִצְרַ֛יִם לְ/פַרְעֹ֖ה לַ/חֹ֑מֶשׁ רַ֞ק אַדְמַ֤ת הַ/כֹּֽהֲנִים֙ לְ/בַדָּ֔/ם לֹ֥א הָיְתָ֖ה לְ/פַרְעֹֽה־־׃
translation:
  text: 'So Joseph made it a statute that stands to this day concerning the land of Egypt: the fifth is for Pharaoh[d][c][b][a]. Only the land of the priests alone did not become Pharaoh’s.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one-fifth for Pharaoh.' The Hebrew לַחֹמֶשׁ denotes a fifth part, that is, a 20 percent levy.
    reason: lexical_alternative
  - marker: b
    text: Or 'Only the land of the priests alone'.
    reason: previous_rendering
  - marker: c
    text: Or 'made it a statute to this day'.
    reason: previous_rendering
  - marker: d
    text: 'Or '': for Pharaoh, the fifth''.'
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: made
  alternatives:
  - set
  - established
  lexicon: HALOT
  rationale: The verb שׂוּם literally means 'set/place,' but in legal-administrative context with לְחֹק it idiomatically means 'made' or 'established' as a statute.
- source_word: אֹתָהּ
  chosen: it
  alternatives:
  - this
  - that
  lexicon: HALOT
  rationale: Feminine singular object pronoun refers back to the policy/decree just described in the previous verse; English 'it' is the most natural resumptive rendering.
- source_word: לְחֹק
  chosen: a statute
  alternatives:
  - a fixed law
  - a decree
  lexicon: HALOT
  rationale: חֹק denotes an enacted fixed rule or statute. 'Statute' preserves the formal legal sense without sounding overly archaic in this context.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Standard idiom indicating continuing validity up to the narrator's present. 'To this day' is idiomatic modern English.
- source_word: עַל אַדְמַת מִצְרַיִם
  chosen: concerning the land of Egypt
  alternatives:
  - over the land of Egypt
  - upon the land of Egypt
  lexicon: HALOT
  rationale: With a legal statute, עַל can indicate scope or application. 'Concerning the land of Egypt' communicates that the rule applied to Egypt's farmland/territory.
- source_word: לְפַרְעֹה
  chosen: for Pharaoh
  alternatives:
  - belonging to Pharaoh
  - to Pharaoh
  lexicon: HALOT
  rationale: The preposition marks the beneficiary/recipient of the fifth portion. 'For Pharaoh' is concise and fits the tax context.
- source_word: לַחֹמֶשׁ
  chosen: the fifth
  alternatives:
  - one-fifth
  - twenty percent
  lexicon: HALOT
  rationale: חֹמֶשׁ means 'a fifth' or 'one-fifth.' 'The fifth' is a slightly more formal rendering that mirrors the Hebrew article while still conveying the tax share.
- source_word: רַק
  chosen: Only
  alternatives:
  - except
  - however
  lexicon: HALOT
  rationale: Marks the exception to the general rule. 'Only' preserves the restrictive force clearly.
- source_word: אַדְמַת הַכֹּהֲנִים
  chosen: the land of the priests
  alternatives:
  - the priests' land
  lexicon: HALOT
  rationale: Construct phrase straightforwardly denotes land belonging to the priests.
- source_word: לְבַדָּם
  chosen: alone
  alternatives:
  - by themselves
  - only
  lexicon: HALOT
  rationale: Adds emphasis to the exception. Rendering as 'alone' preserves the emphatic exclusivity without redundancy if paired carefully in English.
- source_word: לֹא הָיְתָה לְפַרְעֹה
  chosen: did not become Pharaoh’s
  alternatives:
  - did not belong to Pharaoh
  - was not for Pharaoh
  lexicon: HALOT
  rationale: The clause contrasts with the prior transfer of land to Pharaoh. 'Did not become Pharaoh’s' best captures the resulting state implied by היה + ל in this narrative-economic context.
