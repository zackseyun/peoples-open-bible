translation:
  language: es
  text: 'Y envió a Jonatán, el sumo sacerdote, diciendo: «Tú solo te alzas[a] contra nosotros, mientras yo he venido a ser objeto de burla y de oprobio por causa de ti[b]; ¿y por qué ejerces autoridad sobre nosotros en las montañas[c]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te levantas contra nosotros»; o «te enalteces contra nosotros». El verbo puede sugerir autoexaltación o una acción hostil de levantarse contra alguien.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «he venido a ser un hazmerreír y un oprobio por causa de ti». La expresión griega presenta vergüenza pública con dos sustantivos emparejados.'
    reason: lexical_alternative
  - marker: c
    text: «En las montañas» también puede referirse más ampliamente a la región montañosa o serrana, no solo a montañas altas.
    reason: cultural_note
lexical_decisions:
- source_word: ἀπέστειλεν πρὸς
  english_pob_choice: sent to
  chosen_spanish: lo envió a
  alternatives_spanish:
  - lo mandó a
  - le envió un mensaje a
  lexicon: BDAG
  rationale: El griego indica envío dirigido a una persona; «lo envió a» mantiene la narración breve y natural sin especificar innecesariamente el medio.
- source_word: τὸν ἀρχιερέα
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el jefe de los sacerdotes
  - el gran sacerdote
  lexicon: BDAG
  rationale: «Sumo sacerdote» es el equivalente español estándar y fiel al título del oficio, preservando el artículo definido del griego.
- source_word: μονώτατος
  english_pob_choice: you alone
  chosen_spanish: Tú solo
  alternatives_spanish:
  - Tú únicamente
  - Tú por ti solo
  lexicon: LSJ
  rationale: La superlación intensifica exclusividad; «Tú solo» expresa bien la fuerza idiomática en español sin rigidez.
- source_word: ἐπαίρῃ ἐφʼ ἡμᾶς
  english_pob_choice: are lifting yourself up against us
  chosen_spanish: te alzas contra nosotros
  alternatives_spanish:
  - te levantas contra nosotros
  - te enalteces contra nosotros
  lexicon: BDAG
  rationale: El verbo puede sugerir autoexaltación o alzarse contra alguien. En español, «te alzas contra nosotros» conserva el matiz de oposición hostil y evita una paráfrasis excesiva.
- source_word: ἐγενήθην εἰς καταγέλωτα καὶ ὀνειδισμόν
  english_pob_choice: I have become an object of ridicule and reproach
  chosen_spanish: he venido a ser objeto de burla y de oprobio
  alternatives_spanish:
  - he venido a ser un hazmerreír y un oprobio
  - me he convertido en motivo de risa y de reproche
  lexicon: BDAG
  rationale: La pareja sustantiva expresa vergüenza pública; «objeto de burla y de oprobio» reproduce el doble impacto con español digno y claro.
- source_word: διὰ σέ
  english_pob_choice: because of you
  chosen_spanish: por causa de ti
  alternatives_spanish:
  - a causa de ti
  - por ti
  lexicon: BDAG
  rationale: La relación causal de διά con acusativo se expresa con naturalidad en español como «por causa de ti», manteniendo el reproche directo.
- source_word: ἐξουσιάζῃ ἐφʼ ἡμᾶς
  english_pob_choice: do you exercise authority over us
  chosen_spanish: ejerces autoridad sobre nosotros
  alternatives_spanish:
  - dominas sobre nosotros
  - gobiernas sobre nosotros
  lexicon: BDAG
  rationale: «Ejerces autoridad sobre» conserva el valor semántico preciso de ἐξουσιάζω sin cargar el texto con una connotación más fuerte que la del griego.
- source_word: ἐν τοῖς ὄρεσιν
  english_pob_choice: in the mountains
  chosen_spanish: en las montañas
  alternatives_spanish:
  - en la región montañosa
  - en los montes
  lexicon: LSJ
  rationale: «Montañas» traduce directamente ὄρη; en español puede sonar a relieve alto, pero aquí es la opción más pegada al griego. La nota aclara el posible sentido más amplio de zona montañosa.
theological_decisions:
- issue: Título sacerdotal y autoridad de Jonatán
  english_pob_reading: the high priest
  chosen_spanish_reading: el sumo sacerdote
  alternative_spanish_readings:
  - el jefe de los sacerdotes
  - el gran sacerdote
  rationale: No hay una decisión doctrinal controvertida aquí, pero conviene mantener el título cultual reconocido de Jonatán como sumo sacerdote, tal como lo refleja el griego.
  doctrine_reference: Uso histórico-cultual del título sacerdotal en la literatura deuterocanónica
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail, que prefirió una traducción más directa de ἐπαίρῃ. Por eso se eligió «te alzas» en lugar de una paráfrasis como «te exaltas»; también se conservó la doble frase nominal «burla y oprobio» y el matiz locativo de «en las montañas», con nota de posible sentido amplio.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; en este versículo no aparece.
  - Se mantiene «sumo sacerdote» como terminología cultual estándar.
  - Se traduce ἐπαίρῃ con un verbo reflexivo de alzamiento para conservar la hostilidad implícita sin sobreinterpretar.
  - Se preserva la distinción entre «burla» y «oprobio» para reflejar el par griego καταγέλωτα καὶ ὀνειδισμόν.
  - «Montañas» se conserva en el texto principal por fidelidad formal, con la nota indicando el posible alcance de 'región montañosa'.
