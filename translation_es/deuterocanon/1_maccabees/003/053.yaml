translation:
  language: es
  text: ¿Cómo podremos mantenernos firmes[a] ante ellos, a menos que tú nos ayudes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacerles frente» o «resistirlos»; la expresión griega puede referirse a estar frente a los adversarios en conflicto y mantener la posición.
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς
  english_pob_choice: How
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿De qué manera?
  - ¿Cómo podremos?
  lexicon: LSJ
  rationale: La pregunta retórica en español queda natural con «¿Cómo?», sin perder el matiz de posibilidad o manera.
- source_word: δυνησόμεθα
  english_pob_choice: will we be able
  chosen_spanish: podremos
  alternatives_spanish:
  - seremos capaces de
  - ¿podremos
  lexicon: BDAG
  rationale: El futuro de δυνατότητα se expresa con claridad y naturalidad en «podremos», que conserva la idea de capacidad futura.
- source_word: ὑποστῆναι
  english_pob_choice: to stand
  chosen_spanish: resistirles
  alternatives_spanish:
  - mantenernos firmes ante ellos
  - hacerles frente
  lexicon: LSJ
  rationale: En este contexto de confrontación, el sentido es enfrentar al enemigo y mantenerse en pie; «resistirles» comunica bien esa fuerza adversativa en español.
- source_word: κατὰ πρόσωπον αὐτῶν
  english_pob_choice: before them
  chosen_spanish: resistirles
  alternatives_spanish:
  - delante de ellos
  - frente a ellos
  - ante ellos
  lexicon: LSJ
  rationale: La expresión idiomática apunta a estar frente al adversario en combate. En español, la idea ya queda integrada en «resistirles», por lo que no hace falta sobrecargar la frase.
- source_word: ἐὰν μὴ
  english_pob_choice: unless
  chosen_spanish: si tú no
  alternatives_spanish:
  - a menos que
  - si no
  lexicon: BDAG
  rationale: En español, la condicional negativa se expresa de modo más natural con «si tú no»; mantiene la dependencia de la ayuda divina.
- source_word: βοηθήσῃς
  english_pob_choice: help
  chosen_spanish: ayudas
  alternatives_spanish:
  - socorres
  - vienes en ayuda de
  lexicon: BDAG
  rationale: «Ayudar» es la equivalencia directa y clara para βοηθέω, sin añadir colorido innecesario.
- source_word: ἡμῖν
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: El dativo de beneficio/auxilio se vierte naturalmente con el pronombre átono «nos».
theological_decisions:
- issue: Plegaria de dependencia en contexto militar
  english_pob_reading: Retain a direct second-person appeal without expanding the object of trust or victory
  chosen_spanish_reading: Mantener una súplica directa a Dios, sin añadir explicaciones sobre el desenlace militar
  alternative_spanish_readings:
  - ¿Cómo podremos resistirles[a] si no vienes en nuestro auxilio?
  - ¿Cómo podremos hacerles frente[a] si tú no nos ayudas?
  rationale: El griego presenta una petición desnuda y dependiente; la versión española preserva esa tensión sin ampliar el contenido teológico más allá del texto.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés coinciden plenamente: pregunta retórica sobre la capacidad de resistir al enemigo y dependencia absoluta de la ayuda divina. No se introdujeron cambios sustantivos; se optó por una formulación española natural que conserva el valor de confrontación de ὑποστῆναι κατὰ πρόσωπον αὐτῶν.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento directo de segunda persona singular para Dios, en paralelo al inglés POB.
  - «Resistirles» concentra en español la idea de enfrentar al adversario; la nota conserva las alternativas documentadas.
  - «Ayudas» preserva la sencillez del verbo βοηθέω sin intensificarlo hacia «socorres» o «vienes en ayuda de».
