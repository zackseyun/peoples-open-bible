revisions:
- from: Y se levantaron contra ellos en batalla en el sábado[a]; y murieron ellos, y sus mujeres, y sus hijos, y sus animales, hasta unos mil personas.
  to: Y se levantaron contra ellos en batalla en sábado[a]; y murieron ellos, sus mujeres, sus hijos y sus animales, como mil personas.
  rationale: Se corrige la naturalidad de la expresión temporal («en sábado»), se elimina la construcción incorrecta «hasta unos mil personas» y se reemplaza por «como mil personas» para reflejar con buen español la cifra aproximada o el límite no exacto de ἕως χιλίων ψυχῶν ἀνθρώπων. También se ajusta la nota para que refleje fielmente la justificación lexical documentada en el POB inglés, sin añadir una explicación temporal ajena al caso.
