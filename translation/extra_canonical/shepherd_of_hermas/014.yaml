translation:
  text: '“Do you want to know about those who are being cut down and thrown far from the tower? These are the sons of lawlessness[a]; they believed in hypocrisy, and no wickedness departed from them. For this reason they have no salvation, because they are not fit for the building on account of their wicked deeds. Therefore they were cut down and thrown far away because of the anger of the Lord, because they provoked him.


    2. “And the others you saw—many lying there, not going into the building—these are the scabby ones: they came to know the truth, but did not remain in it, nor did they join themselves to the saints; therefore they are useless.


    3. “And those that have cracks—who are they? These are the ones who harbor things against one another in their hearts and are not at peace among themselves, but have a face of peace; yet when they depart from one another, their evils remain in their hearts. These, then, are the cracks that the stones have.


    4. “And the mutilated ones—these are those who have believed and have the greater part in righteousness, but have certain parts of lawlessness. For this reason they are mutilated and not whole.


    5. “And the white and round ones that do not fit into the building—who are they, Lady?” She answered me, saying, “How long will you be foolish and without understanding, asking about everything and understanding nothing? These are those who have faith, but also have the wealth of this age. When affliction comes, because of their wealth and their business dealings they deny their Lord.”


    6. And I answered her, “Lady, when then will they become fit for the building?” She said, “When their wealth that ensnares them has been cut away, then they will be useful to God. For just as a round stone, unless it is cut and casts off something from itself, cannot become square, so also those who are rich in this age, unless their wealth is cut away, cannot become useful to the Lord.


    7. “Learn first from yourself: when you were rich, you were useless; but now you are useful and beneficial for life. Become useful to God[b][c][d][e][f][g][h]; for you yourself also are used from the same stones.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Semitic idiom meaning people characterized by lawlessness; retained literally to preserve tone.
    reason: cultural_note
    anchor_ref: 3:vi.1 ‘sons of lawlessness’
  - marker: h
    text: 'Greek ἐψωριακότες derives from ψώρα ‘scab, itch.’ Alternatives: ‘scabby,’ ‘mange-covered.’ ‘Leprous’ is not accurate here.'
    reason: lexical_alternative
    anchor_ref: 3:vi.2 ‘scabbed ones’
  - marker: g
    text: Greek σχίσματα can also mean ‘divisions’ or ‘schisms.’ ‘Cracks’ fits the stone metaphor; the ecclesial sense is acknowledged here.
    reason: lexical_alternative
    anchor_ref: 3:vi.3 ‘cracks’
  - marker: f
    text: ψυχαγωγῶν often means to charm or entertain; the phrase highlights the seductive pull of wealth.
    reason: cultural_note
    anchor_ref: 3:vi.6 ‘which captivates their souls’
  - marker: e
    text: Literally ‘four‑cornered’ (τετράγωνος), the standard shape for stones that fit securely in ancient masonry.
    reason: lexical_alternative
    anchor_ref: 3:vi.6 ‘square’
  - marker: d
    text: 'Some witnesses include δὲ (‘and/but’) after ἀπὸ: ‘And learn first from yourself.’ The sense is unchanged.'
    reason: textual_variant
    anchor_ref: 3:vi.7 textual
  - marker: c
    text: 'Greek χρᾶσαι ἐκ τῶν αὐτῶν λίθων is syntactically awkward. Taken deponently: ‘you make use of…’; some interpret it passively, ‘you are also used from the same stones,’ i.e., selected as a stone for the building.'
    reason: lexical_alternative
    anchor_ref: 3:vi.7 ‘make use of the same stones’
  - marker: b
    text: Or 'Become useful to God; for even you yourself make use of the same stones.'.
    reason: previous_rendering
lexical_decisions:
- source_word: κατακοπτομένους
  chosen: cut down
  alternatives:
  - cut to pieces
  - hewn down
  - cut off
  lexicon: LSJ
  rationale: Maintains the violent image of stones being cut away, consistent with the tower-building metaphor.
- source_word: ῥιπτομένους
  chosen: hurled
  alternatives:
  - thrown
  - flung
  lexicon: LSJ
  rationale: Conveys force (not a gentle placing) and pairs well with ‘cut down’ to intensify the judgment image.
- source_word: υἱοὶ τῆς ἀνομίας
  chosen: sons of lawlessness
  alternatives:
  - children of lawlessness
  - lawless ones
  lexicon: BDAG
  rationale: Preserves Semitic idiom ‘sons of …’ and the moral characterization without smoothing into generic ‘lawless people.’
- source_word: ἐπίστευσαν ἐν ὑποκρίσει
  chosen: believed with hypocrisy
  alternatives:
  - believed in pretense
  - believed insincerely
  lexicon: BDAG
  rationale: Retains explicit mention of ‘hypocrisy’ rather than paraphrasing; this keeps Hermas’s moral register sharp.
- source_word: πᾶσα πονηρία οὐκ ἀπέστη
  chosen: every wickedness did not depart
  alternatives:
  - all wickedness did not leave
  - their evil did not withdraw
  lexicon: BDAG
  rationale: Echoes the somewhat formal, concrete phrasing of the Greek, preserving the moral category ‘wickedness.’
- source_word: σωτηρίαν
  chosen: salvation
  alternatives:
  - deliverance
  - rescue
  lexicon: BDAG
  rationale: ‘Salvation’ is the established soteriological term; alternatives would understate the gravity in this context.
- source_word: εὔχρηστοι εἰς οἰκοδομήν
  chosen: serviceable for the building
  alternatives:
  - useful for the building
  - fit for construction
  lexicon: LSJ
  rationale: Keeps the construction metaphor explicit (‘building’) and uses ‘serviceable’ to match the utilitarian imagery of stones.
- source_word: συνεκόπησαν
  chosen: were cut away
  alternatives:
  - were hewn down
  - were cut off
  lexicon: LSJ
  rationale: In the stone-building context, ‘cut away’ fits well and ties to later ‘trimming’ language.
- source_word: ἀπερρίφησαν πόρρω
  chosen: flung far off
  alternatives:
  - thrown far away
  - cast far off
  lexicon: LSJ
  rationale: Preserves both the rejection (‘cast off’) and the distance (‘far’), intensifying the exclusion image.
- source_word: ὀργὴ τοῦ Κυρίου
  chosen: anger of the Lord
  alternatives:
  - wrath of the Lord
  lexicon: BDAG
  rationale: ‘Anger’ conveys divine displeasure without importing later technical nuances of ‘wrath’; aligns with Cartha’s default for Kyrios as ‘Lord.’
- source_word: ἐψωριακότες
  chosen: scabbed (ones)
  alternatives:
  - scabby ones
  - mange-covered
  - scurfy
  lexicon: LSJ
  rationale: ψώρα denotes scab/itch; ‘scabbed’ retains the concrete, unflattering image without medical anachronism (‘leprous’).
- source_word: μὴ ἐπιμείναντες
  chosen: did not remain
  alternatives:
  - did not continue
  - did not persevere
  lexicon: BDAG
  rationale: ‘Remain’ is a direct, transparent rendering that preserves the simple aspect of staying in the truth.
- source_word: κολλώμενοι τοῖς ἁγίοις
  chosen: cling to the holy ones
  alternatives:
  - attach themselves to the holy ones
  - join the saints
  lexicon: BDAG
  rationale: ‘Cling’ mirrors the metaphor of adhesion and community bond; ‘holy ones’ retains the literal phrase instead of ecclesiastical ‘saints.’
- source_word: σχίσματα
  chosen: cracks
  alternatives:
  - splits
  - divisions
  - schisms
  lexicon: LSJ
  rationale: Within the stone imagery, ‘cracks’ is the most concrete; a footnote notes the ecclesial sense ‘divisions/schisms.’
- source_word: κατ᾽ ἀλλήλων ἐν ταῖς καρδίαις ἔχοντες
  chosen: harbor things against one another in their hearts
  alternatives:
  - having things against each other in their hearts
  - bearing hostility toward one another
  lexicon: BDAG
  rationale: ‘Harbor’ captures an ongoing inner posture consistent with the allegory’s interior focus.
- source_word: πρόσωπον εἰρήνης
  chosen: a face of peace
  alternatives:
  - appearance of peace
  - outward show of peace
  lexicon: LSJ
  rationale: Retains the vivid idiom (face/mask), highlighting duplicity.
- source_word: κεκολοβωμένοι / κολοβοί
  chosen: cut short / truncated
  alternatives:
  - maimed
  - mutilated
  - stunted
  lexicon: LSJ
  rationale: In the stone context, ‘cut short/truncated’ conveys incompleteness without medical connotations.
- source_word: ὁλοτελεῖς
  chosen: whole
  alternatives:
  - complete
  - entire
  lexicon: LSJ
  rationale: Simple, idiomatic opposite to ‘truncated’; matches the moral picture of integrity.
- source_word: λευκοί καὶ στρογγύλοι
  chosen: white and round
  lexicon: LSJ
  rationale: Direct description preserves the visual of clean, smooth stones that do not interlock.
- source_word: μὴ ἁρμόζοντες
  chosen: do not fit
  alternatives:
  - do not join
  - do not suit
  lexicon: LSJ
  rationale: ‘Fit’ is the standard building term for stones that interlock in construction.
- source_word: πλοῦτος τοῦ αἰῶνος τούτου
  chosen: the wealth of this age
  alternatives:
  - worldly wealth
  lexicon: BDAG
  rationale: Retains the temporal contrast (‘this age’) central to Hermas’s moral economy.
- source_word: θλῖψις
  chosen: affliction
  alternatives:
  - pressure
  - tribulation
  lexicon: BDAG
  rationale: ‘Affliction’ is natural English and matches the context of testing; ‘tribulation’ is heavier but more technical.
- source_word: πραγματεῖαι
  chosen: business dealings
  alternatives:
  - occupations
  - affairs
  - pursuits
  lexicon: LSJ
  rationale: Conveys mercantile/transactional nuance without archaic ‘traffickings.’
- source_word: περικοπῇ (πλοῦτος)
  chosen: be cut back
  alternatives:
  - be trimmed
  - be pared down
  lexicon: LSJ
  rationale: Echoes the stone-cutting metaphor and communicates reduction without suggesting total renunciation.
- source_word: ὁ ψυχαγωγῶν αὐτούς
  chosen: which captivates their souls
  alternatives:
  - which entertains them
  - which charms them
  lexicon: LSJ
  rationale: ψυχαγωγέω in classical usage means to lead/captivate the soul, often with entertainment; ‘captivates’ carries the pull/attraction idea.
- source_word: τετράγωνος
  chosen: square
  alternatives:
  - four-cornered
  lexicon: LSJ
  rationale: ‘Square’ is idiomatic; footnote notes literal ‘four-cornered,’ an ancient building ideal.
- source_word: πλουτοῦντες ἐν τούτῳ τῷ αἰῶνι
  chosen: those who are rich in this age
  alternatives:
  - those who prosper in this age
  lexicon: BDAG
  rationale: Keeps verbal aspect of ongoing wealth and the temporal frame.
- source_word: ἄχρηστος / εὔχρηστος
  chosen: useless / useful
  alternatives:
  - unserviceable / serviceable
  lexicon: LSJ
  rationale: Simple, direct antonyms that the passage repeatedly contrasts; fits the tool-like imagery.
- source_word: ὠφέλιμος τῇ ζωῇ
  chosen: beneficial for life
  alternatives:
  - profitable for life
  - helpful to life
  lexicon: BDAG
  rationale: ‘Beneficial’ captures moral/spiritual advantage without commercial overtones.
- source_word: χρᾶσαι ἐκ τῶν αὐτῶν λίθων
  chosen: make use of the same stones
  alternatives:
  - are also used from the same stones
  lexicon: LSJ
  rationale: χράομαι is middle deponent ‘to use’; prepositional ἐκ indicates source/selection. The phrasing preserves the Greek structure while a footnote notes the alternative passive-like sense some see in context.
