review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo: ריב se refleja como disputa/contienda, la petición de agua y el cohortativo de finalidad están bien captados, y מַה funciona correctamente como «¿por qué...?». También preserva adecuadamente el nombre divino como «Yahvé». El único problema relevante no es de alineación semántica principal sino de aparato: la nota b no corresponde a una alternativa real del texto, y además está anclada tras «les dijo» cuando la variante léxica concierne a «ponen a prueba».'
  spanish_quality_summary: El español es claro y digno. Sin embargo, «Denos agua» suena menos natural y ortográficamente menos cuidado en español general que «Dennos agua». Además, la nota b está mal formulada y mal ubicada. «Contendió/contienden» es aceptable, aunque algo más literario; no exige cambio.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה se traduce correctamente como «Yahvé» y no como «SEÑOR» en el texto principal. «Ponen a prueba» refleja bien נסה. No hay conflictos con otras directrices terminológicas.'
  issues:
  - severity: medium
    issue: La nota b no preserva la alternativa documentada del inglés.
    rationale: 'El audit trail inglés ofrece como alternativa «put the LORD to the test», es decir, una variante de formulación para el verbo, no una repetición del texto principal. La nota española actual («O: “¿Por qué ponen a prueba a Yahvé?”») duplica el texto y no aporta alternativa.'
  - severity: medium
    issue: La nota b está anclada en un lugar incorrecto del texto.
    rationale: El marcador aparece después de «les dijo», pero la nota se refiere a la expresión «ponen a prueba a Yahvé». Las notas deben anclarse en la palabra o frase pertinente.
  - severity: low
    issue: «Denos agua» es menos natural que «Dennos agua» en español estándar.
    rationale: Ambas formas pueden encontrarse, pero «Dennos» es la escritura imperativa enclítica más natural y cuidada para un registro bíblico moderno y claro.
  revised_spanish_text: 'Así que el pueblo contendió con Moisés y dijo: «Dennos agua para que bebamos». Y Moisés les dijo: «¿Por qué contienden conmigo? ¿Por qué ponen a prueba[a] a Yahvé?»'
  revised_footnotes:
  - marker: a
    text: 'O: «ponen a Yahvé a prueba».'
    reason: lexical_alternative
  revision_rationale: Se corrige la nota para que refleje una alternativa léxica real y se reubica en la frase correspondiente. También se mejora la naturalidad ortográfica de «Dennos agua». El resto del versículo puede mantenerse, pues preserva fielmente el sentido del hebreo y la terminología POB.
