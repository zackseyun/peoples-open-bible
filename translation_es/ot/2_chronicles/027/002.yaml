translation:
  language: es
  text: Hizo lo recto ante los ojos de Yahvé, conforme a todo lo que había hecho su padre Uzías, excepto que no entró en el templo de Yahvé[a]. Pero el pueblo todavía actuaba corruptamente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no fue al templo de Yahvé». La cláusula contrasta probablemente a Jotam con Uzías, quien entró ilícitamente en el templo (véase 2 Crónicas 26:16–21).
    reason: cross_reference
  - marker: b
    text: O «el pueblo todavía se corrompía» o «el pueblo seguía corrompiéndose». El hebreo también puede expresar la idea de que el pueblo seguía comportándose de manera corrupta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  lexicon: HALOT
  rationale: El wayyiqtol introduce la acción narrativa siguiente; en español, el simple pretérito «hizo» comunica la secuencia sin añadir una conjunción innecesaria.
- source_word: הַיָּשָׁר
  english_pob_choice: what was right
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo justo
  - lo derecho
  - lo que era recto
  lexicon: HALOT
  rationale: El artículo sustantiva el adjetivo; «lo recto» conserva la evaluación moral de manera natural en español y evita una paráfrasis excesiva.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en la presencia de Yahvé
  lexicon: HALOT
  rationale: Se preserva la imagen evaluativa del hebreo. «Ante los ojos de» es una formulación idiomática en español bíblico moderno y mantiene el paralelismo visual de la expresión.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino como «Yahvé», no sustitución por un título.'
- source_word: כְּכֹל אֲשֶׁר עָשָׂה
  english_pob_choice: according to all that ... had done
  chosen_spanish: conforme a todo lo que había hecho
  alternatives_spanish:
  - según todo lo que había hecho
  - tal como había hecho en todo
  lexicon: HALOT
  rationale: «Conforme a todo lo que había hecho» conserva la idea de conformidad con un patrón previo y suena natural en español.
- source_word: עֻזִּיָּהוּ אָבִיו
  english_pob_choice: his father Uzziah
  chosen_spanish: su padre Uzías
  alternatives_spanish:
  - Uzzías, su padre
  - su padre Uzzías
  lexicon: HALOT
  rationale: Se mantiene el nombre propio en la forma española habitual «Uzías» y el orden natural del posesivo en español.
- source_word: רַק
  english_pob_choice: except that
  chosen_spanish: excepto que
  alternatives_spanish:
  - solo que
  - pero
  - salvo que
  lexicon: HALOT
  rationale: El hebreo introduce una restricción a la comparación anterior; «excepto que» expresa con claridad la excepción sin perder el contraste.
- source_word: לֹא בָא אֶל הֵיכַל יְהוָה
  english_pob_choice: he did not enter the temple of Yahweh
  chosen_spanish: no entró en el templo de Yahvé
  alternatives_spanish:
  - no fue al templo de Yahvé
  - no penetró en el templo de Yahvé
  lexicon: HALOT
  rationale: «Entró en el templo» corresponde bien a בוא + אֶל. «Templo» traduce הֵיכָל en este contexto de edificio/santuario.
- source_word: וְעוֹד
  english_pob_choice: But ... still
  chosen_spanish: Pero ... todavía
  alternatives_spanish:
  - Y todavía
  - Sin embargo, ... todavía
  - Mas ... todavía
  lexicon: HALOT
  rationale: La partícula marca continuación con matiz contrastivo; «Pero ... todavía» reproduce la tensión entre la conducta del rey y la persistencia del mal en el pueblo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo del país
  lexicon: HALOT
  rationale: La referencia colectiva funciona de manera directa como «el pueblo» en español bíblico contemporáneo.
- source_word: מַשְׁחִיתִים
  english_pob_choice: acted corruptly
  chosen_spanish: se corrompía
  alternatives_spanish:
  - actuaba corruptamente
  - seguía corrompiéndose
  - se estaba corrompiendo
  lexicon: HALOT
  rationale: El participio hifil expresa una acción continua de corrupción. «Se corrompía» conserva el aspecto progresivo y evita una formulación demasiado interpretativa.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El verso usa directamente el Tetragrámaton. Conforme a la política del proyecto, se translitera el nombre divino como «Yahvé» para preservar el nombre propio del pacto y no sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Matiz de la cláusula final sobre la corrupción del pueblo
  english_pob_reading: But the people still acted corruptly.
  chosen_spanish_reading: Pero el pueblo todavía se corrompía.
  alternative_spanish_readings:
  - Pero el pueblo todavía actuaba corruptamente.
  - Sin embargo, el pueblo seguía corrompiéndose.
  rationale: La forma hebrea describe una persistencia moral. «Se corrompía» mantiene el carácter continuo y deja abierto el alcance de la corrupción sin endurecerlo más de lo que el texto exige.
  doctrine_reference: HALOT sobre שׁחת en Hifil; contexto narrativo de 2 Crónicas 27:2
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el estado más reciente del registro inglés, cuya revisión quedó sin cambios tras la última pasada. La traducción española sigue ese mismo entendimiento: evaluación positiva inicial, comparación con Uzías, excepción sobre la entrada al templo y persistencia de la corrupción del pueblo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa «Uzías» como forma española habitual del nombre propio.
  - Se conserva el contraste narrativo con «Pero» en la cláusula final.
  - El participio final se vierte con aspecto continuo («se corrompía») para reflejar la acción persistente del original.
