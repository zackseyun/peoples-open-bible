base_translation:
  language: en
  yaml_path: translation/ot/1_kings/005/022.yaml
  text: Then Hiram sent to Solomon[a], saying, “I have heard what you sent to me[b]. I will do all your desire concerning cedar timber and cypress timber.”
  footnotes:
  - marker: a
    text: Or 'what you requested of me.' The Hebrew more literally says 'what you sent to me,' which may refer to Solomon's message as a request.
    reason: lexical_alternative
  - marker: b
    text: Hebrew בְּרוֹשִׁים; the species is uncertain. It is also rendered 'juniper' or 'fir.'
    reason: lexical_alternative
