review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido general del hebreo: una hipótesis concesiva extrema, la imagen de triturar a un necio en un mortero con un instrumento de machacar, y la conclusión proverbial de que su necedad no se irá. Sin embargo, el anclaje de la nota al pie está mal colocado: la nota sobre רִיפוֹת corresponde a «grano aplastado», no a «necio».'
  spanish_quality_summary: El español es mayormente claro, pero «majadero» como nombre del instrumento suena poco natural o ambiguo para lectura eclesial amplia en español latinoamericano contemporáneo, donde puede leerse primero como insulto. «Mano del mortero» comunica mejor el utensilio sin perder precisión suficiente. También conviene escribir «Aun» con tilde ausente, como ya está, y mejorar la fluidez con puntuación más limpia.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. «Necio» para אֱוִיל y «necedad» para אִוַּלְתּוֹ están bien elegidos en registro sapiencial. «Mortero» es correcto para מכתש. La principal mejora léxica es reemplazar «majadero» por «mano del mortero» por naturalidad y menor ambigüedad en español meta.
  issues:
  - severity: high
    issue: La nota al pie [a] está anclada en «necio» pero explica רִיפוֹת («grano aplastado»).
    rationale: Las instrucciones requieren que cada nota se ancle exactamente en la palabra o frase pertinente. Tal como está, la nota induce a error textual y documental.
  - severity: medium
    issue: «Majadero» para עֱלִי es demasiado ambiguo o poco natural en español latinoamericano general.
    rationale: Aunque tiene base lexicográfica tradicional, en lectura común suele entenderse como adjetivo/sustantivo para persona necia. «Mano del mortero» comunica el instrumento de manera más clara para el público objetivo.
  - severity: low
    issue: «grano aplastado» es aceptable, pero «grano triturado» suena un poco más natural en español en esta imagen culinaria.
    rationale: No es un error de fidelidad; es un ajuste menor de idiomaticidad. Puede mantenerse la alternativa en nota como en el rastro inglés.
  revised_spanish_text: Aun si machacas a un necio en un mortero, con la mano del mortero, entre grano triturado[a], su necedad no se apartará de él.
  revised_footnotes:
