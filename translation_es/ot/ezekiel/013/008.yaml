  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé», אֲדֹנָי יְהוִה → «el Señor Yahvé», שָׁוְא → «falsedad», כָּזָב → «mentira». No hay conflicto léxico mayor. La excepción inglesa «Lord GOD» está correctamente adaptada al español según la doctrina del proyecto.'
