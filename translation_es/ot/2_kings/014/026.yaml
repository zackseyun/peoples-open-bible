    text: O “muy grave” o “muy severa”. La expresión hebrea es difícil, pero claramente intensifica el sufrimiento de Israel.
    reason: lexical_alternative
  - marker: b
    text: 'Modismo hebreo: “ni esclavo ni libre”. La expresión probablemente significa que no quedó nadie para ayudar, o que toda clase de personas estaba agotada.'
    reason: alternative_reading
  revision_rationale: Se ajusta la sintaxis para que el español fluya con más naturalidad y se reemplaza «ni atado ni suelto» por «ni esclavo ni libre», que comunica mejor en español el modismo polar totalizante documentado en el audit trail, mientras la nota conserva la cautela interpretativa.
