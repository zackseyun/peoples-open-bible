translation:
  language: es
  text: Y establecieron que este día se observara[a] cada año, el día trece de Adar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «se observara» puede entenderse también como «se celebrara» o «se guardara»; se eligió una forma más amplia para no sobrecargar el carácter festivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστησαν
  english_pob_choice: they established
  chosen_spanish: establecieron
  alternatives_spanish:
  - decretaron
  - instituyeron
  - ordenaron
  lexicon: LSJ
  rationale: El aoristo de ἵστημι en esta construcción expresa el acto de establecer una observancia. «Establecieron» reproduce bien la fuerza institucional sin añadir un matiz jurídico más fuerte del que exige el griego.
- source_word: τοῦ ἄγειν
  english_pob_choice: should be observed
  chosen_spanish: se observara
  alternatives_spanish:
  - se celebrara
  - se guardara
  - se mantuviera
  lexicon: LSJ
  rationale: 'El infinitivo articular indica el contenido de lo establecido: que el día fuese mantenido como conmemoración anual. «Se observara» conserva ese sentido amplio de observancia sin sugerir necesariamente una fiesta jubilosa.'
- source_word: κατʼ ἐνιαυτόν
  english_pob_choice: year by year
  chosen_spanish: cada año
  alternatives_spanish:
  - año tras año
  - anualmente
  lexicon: LSJ
  rationale: La expresión griega significa una periodicidad anual. «Cada año» es natural en español y fiel al valor idiomático.
- source_word: τὴν ἡμέραν ταύτην
  english_pob_choice: this day
  chosen_spanish: este día
  alternatives_spanish:
  - aquel día
  - esta fecha
  lexicon: LSJ
  rationale: El demostrativo es proximal; «este día» sigue de cerca el griego y funciona bien en español.
- source_word: τῇ τρισκαιδεκάτῃ
  english_pob_choice: on the thirteenth day
  chosen_spanish: el día trece
  alternatives_spanish:
  - el trece
  - el decimotercer día
  lexicon: LSJ
  rationale: En español, la fecha se expresa con naturalidad como «el día trece». Esto comunica el valor dativo de fecha sin cargar la frase.
- source_word: τοῦ Ἀδάρ
  english_pob_choice: of Adar
  chosen_spanish: de Adar
  alternatives_spanish:
  - del mes de Adar
  lexicon: LSJ
  rationale: Ἀδάρ es un nombre de mes y se translitera. Se mantiene «Adar» sin traducir, conforme al tratamiento de nombres propios.
translation_notes:
  revision_awareness: Coincide con el texto griego de Swete (1909) y con el audit trail inglés; no se requieren correcciones textuales ni cambios de sentido.
