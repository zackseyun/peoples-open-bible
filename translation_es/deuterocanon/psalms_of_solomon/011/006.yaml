translation:
  language: es
  text: Las colinas huyeron ante su llegada[a]; los bosques les dieron sombra en su camino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de su aproximación» o «ante su entrada». La frase griega ἀπὸ εἰσόδου αὐτῶν es compacta y puede traducirse con un matiz ligeramente distinto en español.
    reason: lexical_alternative
  - marker: b
    text: O «selvas» o «matorrales» para «bosques».
    reason: lexical_alternative
lexical_decisions:
- source_word: βουνοὶ
  english_pob_choice: hills
  chosen_spanish: collados
  alternatives_spanish:
  - montes
  - cerros
  lexicon: LSJ
  rationale: βουνοί designa elevaciones menores o medianas; 'collados' conserva la imagen de altura sin subir innecesariamente el registro a 'montes'.
- source_word: ἔφυγον
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - fueron huyendo
  - escaparon
  lexicon: LSJ
  rationale: El aoristo de φεύγω expresa huida; 'huyeron' reproduce la personificación vívida del texto sin añadir matices ajenos.
- source_word: ἀπὸ εἰσόδου αὐτῶν
  english_pob_choice: from their approach
  chosen_spanish: de su llegada
  alternatives_spanish:
  - ante su entrada
  - de su entrada
  lexicon: LSJ
  rationale: La frase compacta sugiere la llegada/entrada de ellos como evento. 'De su llegada' mantiene el sentido situacional y evita una construcción demasiado literal como 'entrada' en español.
- source_word: δρυμοὶ
  english_pob_choice: forests
  chosen_spanish: bosques
  alternatives_spanish:
  - selvas
  - arboledas
  - matorrales
  lexicon: LSJ
  rationale: δρυμοί puede referirse a zonas arboladas o espesuras; 'bosques' es natural en español y conserva el paralelo con los collados.
- source_word: ἐσκίασαν αὐτοῖς
  english_pob_choice: gave them shade
  chosen_spanish: les dieron sombra
  alternatives_spanish:
  - los sombrearon
  - les hicieron sombra
  lexicon: LSJ
  rationale: La dative αὐτοῖς es benefactiva; 'les dieron sombra' reproduce de forma idiomática la acción y su beneficio.
- source_word: ἐν τῇ παρόδῳ αὐτῶν
  english_pob_choice: along their way
  chosen_spanish: en su camino
  alternatives_spanish:
  - a lo largo de su camino
  - mientras iban de paso
  lexicon: LSJ
  rationale: πάροδος aquí indica el trayecto o paso. 'En su camino' es claro y fiel en español, sin forzar una perífrasis.
theological_decisions:
- issue: Personificación poética de la creación ante la presencia de los justos o del agente implícito
  english_pob_reading: The hills fled from their approach; the forests gave them shade along their way.
  chosen_spanish_reading: Los collados huyeron de su llegada; los bosques les dieron sombra en su camino.
  alternative_spanish_readings:
  - Los collados huyeron ante su llegada; los bosques les dieron sombra en su camino
  - Los collados se apartaron de su llegada; los bosques les dieron sombra en su camino
  rationale: No hay necesidad de explicitar un referente teológico ausente en el griego. Se conserva la personificación y el movimiento poético del texto, evitando suavizar 'huyeron' en un modo menos vívido.
  doctrine_reference: Poética bíblica / personificación de la creación
- issue: Sustantivo de movimiento εἰσόδου como llegada/entrada
  english_pob_reading: approach
  chosen_spanish_reading: llegada
  alternative_spanish_readings:
  - entrada
  - arribo
  rationale: '''Llegada'' mantiene la fuerza de evento de εἴσοδος sin sugerir necesariamente una puerta o umbral físico, que en español podría estrechar indebidamente la imagen.'
  doctrine_reference: Precisión semántica y claridad de imagen
- issue: Imagen de los bosques como agente benéfico
  english_pob_reading: gave them shade
  chosen_spanish_reading: les dieron sombra
  alternative_spanish_readings:
  - les hicieron sombra
  - los sombrearon
  rationale: La elección preserva el beneficio implícito del dativo y mantiene la imagen poética intacta sin introducir una nota interpretativa adicional.
  doctrine_reference: Figuración poética / benefactivo gramatical
translation_notes:
  revision_awareness: Se siguió el audit trail inglés que corrigió la lectura de ἀπὸ εἰσόδου αὐτῶν desde un valor temporal debilitado hacia un sentido espacial/relacional más fuerte ('from their approach'), y se mantuvo la imagen paralela de los bosques dando sombra en el camino. La versión española evita depender mecánicamente del inglés, pero conserva esa decisión semántica y la poética personificación del original griego.
  spanish_consistency_notes:
  - Se usó 'bosques' para δρυμοί en continuidad con el valor natural y amplio que el audit trail inglés prefirió sobre 'woods'/'thickets'.
  - Se evitó 'SEÑOR' u otra terminología ajena, pues el versículo no contiene el nombre divino ni una cristología explícita.
  - La puntuación con punto y coma preserva el paralelismo de dos miembros del verso.
  - La nota a marca la alternativa semántica principal de ἀπὸ εἰσόδου αὐτῶν; la nota b recoge las alternativas léxicas para δρυμοί.
