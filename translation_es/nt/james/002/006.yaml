translation:
  language: es
  text: Pero ustedes han deshonrado al pobre[a]. ¿No son los ricos los que los oprimen y ellos mismos los arrastran a los tribunales[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al pobre hombre» o, en sentido más general, «a los pobres». El griego está en singular («el pobre»), probablemente eco del caso concreto mencionado antes y a la vez representación de los pobres en general.
    reason: lexical_alternative
  - marker: b
    text: O «los juzgados» o «las cortes». El griego se refiere a tribunales judiciales.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠτιμάσατε
  english_pob_choice: have dishonored
  chosen_spanish: han deshonrado
  alternatives_spanish:
  - han insultado
  - han tratado con deshonra
  lexicon: BDAG
  rationale: ἀτιμάζω expresa trato vergonzoso o deshonroso. «Han deshonrado» conserva la fuerza de honra/deshonra y suena natural en español contemporáneo.
- source_word: τὸν πτωχόν
  english_pob_choice: the poor man
  chosen_spanish: al pobre
  alternatives_spanish:
  - al pobre hombre
  - al pobre persona
  - a los pobres
  lexicon: BDAG
  rationale: El singular con artículo señala a una persona pobre concreta en el contexto inmediato, pero en español «al pobre» comunica bien ese singular representativo sin forzar género ni añadir un sustantivo innecesario.
- source_word: οἱ πλούσιοι
  english_pob_choice: the rich
  chosen_spanish: los ricos
  alternatives_spanish:
  - los adinerados
  - los poderosos
  lexicon: BDAG
  rationale: Como adjetivo sustantivado, la forma más directa y fiel en español es «los ricos», manteniendo la referencia a una clase de personas.
- source_word: καταδυναστεύουσιν
  english_pob_choice: oppress
  chosen_spanish: oprimen
  alternatives_spanish:
  - explotan
  - dominan con dureza
  lexicon: BDAG
  rationale: El verbo denota ejercer poder de manera opresiva. «Oprimen» reproduce bien esa carga sin especificar indebidamente el medio.
- source_word: ἕλκουσιν
  english_pob_choice: drag
  chosen_spanish: arrastran
  alternatives_spanish:
  - jalan
  - llevan a la fuerza
  lexicon: BDAG
  rationale: ἕλκω comunica un tironeo fuerte y coercitivo. «Arrastran» preserva la violencia del verbo y el tono hostil del contexto judicial.
- source_word: κριτήρια
  english_pob_choice: courts
  chosen_spanish: los tribunales
  alternatives_spanish:
  - los juzgados
  - las cortes
  lexicon: BDAG
  rationale: κριτήρια se refiere a instancias judiciales. «Los tribunales» es claro, digno y suficientemente amplio para abarcar el sentido legal del pasaje.
- source_word: καὶ αὐτοὶ
  english_pob_choice: and themselves
  chosen_spanish: y ellos mismos
  alternatives_spanish:
  - y aun ellos mismos
  - y precisamente ellos mismos
  lexicon: BDAG
  rationale: El pronombre es enfático. «Ellos mismos» mantiene ese énfasis en un español natural.
- source_word: οὐχ ... ;
  english_pob_choice: Is it not ... ?
  chosen_spanish: ¿No ... ?
  alternatives_spanish:
  - ¿Acaso no ... ?
  - ¿No es verdad que ... ?
  lexicon: Greek grammar
  rationale: La partícula introduce una pregunta retórica que espera respuesta afirmativa. En español, «¿No ... ?» transmite esa fuerza de manera directa.
theological_decisions:
- issue: Referencia del singular «al pobre»
  english_pob_reading: A representative poor man in the assembly scenario, with broader application to the poor as a class
  chosen_spanish_reading: Un pobre singular y representativo, ligado al caso previo del visitante pobre, pero con alcance general hacia los pobres como clase
  alternative_spanish_readings:
  - Los pobres en general
  - el pobre hombre concreto del relato
  rationale: El contexto inmediato ya presentó a un visitante pobre específico; por eso conviene conservar el singular. En español, «al pobre» permite esa referencia representativa sin perder la conexión con el caso anterior.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El borrador coincide sustancialmente con la última revisión y con el informe de alta concordancia; no se identifican cambios sustantivos necesarios respecto del sentido del griego ni del rastro auditado en inglés.
  spanish_consistency_notes:
  - Se mantuvo el singular representativo de τὸν πτωχόν con una forma natural en español.
  - «Tribunales» se eligió por su claridad jurídica y por conservar el marco procesal del término griego.
  - Se preservó el tono de pregunta retórica en la segunda oración con «¿No ... ?».
  - Se evitó traducir mecánicamente con «SEÑOR» u otras convenciones no pertinentes, ya que este versículo no contiene el nombre divino.
