review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura básica del hebreo: dos grupos de cortinas (cinco y seis), y luego la instrucción de doblar la sexta cortina en la parte frontal de la tienda. Conserva correctamente «tienda» por הָאֹהֶל y refleja el valor distributivo de לְבָד. Sin embargo, «separadamente» suena poco natural en español bíblico actual, y «doblarás la sexta cortina doble» es gramaticalmente torpe; conviene una formulación más idiomática que mantenga la idea de doblarla en dos.'
  spanish_quality_summary: 'La legibilidad general es aceptable, pero hay dos puntos de estilo importantes: «por separado» es más natural y claro que «separadamente», y «doblarás la sexta cortina en dos» expresa mejor כָפַלְתָּ ... doble en español digno y fluido. La nota al pie también debe anclarse al segmento pertinente de la revisión, no a «separadamente».'
  glossary_alignment: 'Alineado con la terminología del proyecto en los puntos relevantes: יְרִיעָה = «cortina(s)»; הָאֹהֶל = «la tienda», no «tabernáculo». No hay términos teológicos sensibles adicionales en este versículo. La revisión propuesta preserva esas decisiones y mejora la naturalidad del español.'
  issues:
  - severity: medium
    issue: «separadamente» es poco idiomático en español actual
    rationale: Aunque es comprensible, «por separado» comunica mejor el sentido distributivo de לְבָד sin sonar rígido o calcado.
  - severity: medium
    issue: «doblarás la sexta cortina doble» suena antinatural
    rationale: La combinación verbo + adjetivo/adverbio no funciona bien en español. «Doblarás la sexta cortina en dos» conserva la idea de fold double de manera clara y fiel.
  - severity: medium
    issue: La nota al pie está anclada al lugar equivocado
    rationale: La variante inglesa documenta una alternativa para la acción/ubicación de doblar la sexta cortina, no para «separadamente». El marcador debe aparecer junto a esa cláusula en el texto español.
  revised_spanish_text: Y unirás las cinco cortinas por separado, y las seis cortinas por separado; y doblarás la sexta cortina en dos[a] al frente de la tienda.
  revised_footnotes:
  - marker: a
    text: O «doblarás sobre sí misma la sexta cortina, frente al frente de la tienda»; también, «opuesta al frente de la tienda».
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el español para mayor naturalidad y claridad sin alterar el sentido fuente: «por separado» por לְבָד y «en dos» para expresar que la sexta cortina debe quedar doblada en doble. También se reubica la nota al pie al segmento correcto, porque la alternativa documentada corresponde a la cláusula de doblar/ubicar la sexta cortina. Aunque la alternativa inglesa es algo literal, se conserva su función de reflejar la opción léxica/espacial del hebreo.'
