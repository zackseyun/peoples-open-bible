    reason: lexical_alternative
  - marker: c
    text: O «el esplendor» o «la hermosura de todas las tierras».
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige dos problemas de español natural y fidelidad idiomática: cambia «a ellos» por «hacia ellos» para evitar un calco torpe, y ajusta «que fluye leche y miel» a «que fluye con leche y miel». Además, sustituye «esplendor» por «gloria» para alinearse con la decisión léxica principal del POB inglés, manteniendo las otras posibilidades en nota.'
