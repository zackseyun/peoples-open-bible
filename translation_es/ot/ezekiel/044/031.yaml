translation:
  language: es
  text: Los sacerdotes no comerán ningún animal muerto[a] ni animal despedazado por bestias, ya sea de aves o de ganado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ninguna bestia muerta por sí misma ni despedazada por bestias»; es decir, ningún animal que muere naturalmente o es despedazado por bestias.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: any
  chosen_spanish: ninguna
  alternatives_spanish:
  - ninguna clase de
  - ningún
  lexicon: HALOT
  rationale: En una prohibición legal, כָּל con sustantivos singulares se expresa de forma natural en español con una negación total como «ninguna», conservando el alcance comprehensivo del mandato.
- source_word: נְבֵלָה
  english_pob_choice: carcass
  chosen_spanish: carroña
  alternatives_spanish:
  - cadáver
  - carcasa
  lexicon: HALOT
  rationale: El término apunta a un animal muerto que no debe comerse. «Carroña» comunica bien la idea de animal muerto impropio para el consumo y evita la ambigüedad de «cadáver», que en español suele aplicarse a personas.
- source_word: טְרֵפָה
  english_pob_choice: animal torn by beasts
  chosen_spanish: animal despedazado
  alternatives_spanish:
  - animal devorado por fieras
  - animal desgarrado por bestias
  lexicon: HALOT
  rationale: «Despedazado» mantiene la fuerza concreta de טְרֵפָה sin forzar la mención de un agente específico que el hebreo no explicita en esta frase. «Desgarrado» sería posible, pero «despedazado» suena más natural en español bíblico contemporáneo.
- source_word: מִן הָעוֹף
  english_pob_choice: from birds
  chosen_spanish: de aves
  alternatives_spanish:
  - de pájaros
  - de aves voladoras
  lexicon: HALOT
  rationale: «עוֹף» abarca aves en general en este contexto dietético. «Aves» es el equivalente más claro y amplio en español.
- source_word: וּמִן הַבְּהֵמָה
  english_pob_choice: from livestock
  chosen_spanish: de ganado
  alternatives_spanish:
  - de animales domésticos
  - de bestias
  lexicon: HALOT
  rationale: Aquí בְּהֵמָה contrasta con las aves y señala animales terrestres domesticados. «Ganado» reproduce esa categoría de forma breve y comprensible en español bíblico.
- source_word: לֹא יֹאכְלוּ
  english_pob_choice: shall not eat
  chosen_spanish: no comerán
  alternatives_spanish:
  - no deberán comer
  - no han de comer
  lexicon: HALOT
  rationale: 'La forma prohibitiva legal se vierte con un futuro de mandato en español: «no comerán». Es formal y fiel al tono normativo del texto.'
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del templo
  - los ministros sagrados
  lexicon: HALOT
  rationale: El referente es la clase sacerdotal del templo. «Sacerdotes» es el equivalente directo, claro y tradicionalmente inteligible en español.
theological_decisions:
- issue: Alcance de la prohibición alimentaria
  english_pob_reading: The priests shall not eat any carcass or animal torn by beasts, whether from birds or from livestock.
  chosen_spanish_reading: Los sacerdotes no comerán ninguna carroña ni animal despedazado, ya sea de aves o de ganado.
  alternative_spanish_readings:
  - Los sacerdotes no comerán ningún animal muerto ni animal despedazado, ya sea de aves o de ganado.
  - Los sacerdotes no comerán ninguna carroña ni animal desgarrado, ya sea de aves o de ganado.
  rationale: 'No hay una diferencia doctrinal añadida, pero sí una decisión de precisión: el texto impone una restricción ritual clara sobre la comida sacerdotal. La redacción española conserva el paralelismo de los dos tipos de alimento prohibido sin suavizar la fuerza normativa.'
  doctrine_reference: Pureza ritual / leyes sacerdotales en el marco de Levítico-Éxodo-Ezequiel
translation_notes:
  revision_awareness: La base inglesa revisó «torn animal» a «animal torn by beasts» para precisar טְרֵפָה. La versión española mantiene esa precisión con «animal despedazado» y conserva la alternativa explicativa en nota para reflejar la amplitud semántica del hebreo.
  spanish_consistency_notes:
  - Se conservó la prohibición con futuro de mandato («no comerán») para mantener el tono legal.
  - «Carroña» se eligió por su concisión y por reflejar un animal muerto impropio para comer; se dejó una nota para la alternativa más explicativa.
  - «Ganado» se usó para בְּהֵמָה por contraste con «aves» y por ser natural en español bíblico.
  - No se usó «SEÑOR» ni terminología teológica no presente en el versículo.
