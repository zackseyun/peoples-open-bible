    rationale: '"nos hemos sometido a ellas" aplicado a Egipto y Asiria puede sonar menos natural en este contexto; "a ellos" o una reformulación sin pronombre mejora la fluidez, aunque al tratarse de naciones ambas opciones son posibles.'
