id: JER.9.2
reference: Jeremiah 9:2
source:
  edition: WLC
  text: וַֽ/יַּדְרְכ֤וּ אֶת לְשׁוֹנָ/ם֙ קַשְׁתָּ֣/ם שֶׁ֔קֶר וְ/לֹ֥א לֶ/אֱמוּנָ֖ה גָּבְר֣וּ בָ/אָ֑רֶץ כִּי֩ מֵ/רָעָ֨ה אֶל רָעָ֧ה יָצָ֛אוּ וְ/אֹתִ֥/י לֹֽא יָדָ֖עוּ נְאֻם יְהוָֽה־־׀־־׃ס
translation:
  text: They bend their tongue[a] like their bow for falsehood, and not for faithfulness have they grown strong in the land; for from evil to evil they go out, and they do not know me[b], declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "from one evil to another."
    reason: lexical_alternative
  - marker: b
    text: '"Know me" can also carry the sense of acknowledging the LORD relationally and covenantally.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּדְרְכוּ
  chosen: They bend
  alternatives:
  - They tread
  - They draw
  lexicon: HALOT
  rationale: The verb דרך with bow imagery commonly means to tread/draw/bend a bow in preparation to shoot. In this metaphorical construction with 'tongue' and 'bow,' 'bend' communicates the image clearly in modern English while preserving the martial metaphor.
- source_word: לְשׁוֹנָם
  chosen: their tongue
  alternatives:
  - their tongues
  lexicon: HALOT
  rationale: The Hebrew form is singular with 3mp suffix. English can keep the collective singular 'their tongue' to reflect the source more closely and preserve the image of speech as a weapon.
- source_word: קַשְׁתָּם
  chosen: like their bow
  alternatives:
  - their bow
  lexicon: HALOT
  rationale: 'The appositional relation is elliptical in Hebrew: ''their tongue, their bow, falsehood.'' English requires smoothing. ''Like their bow'' makes the simile explicit and preserves the metaphor without over-paraphrasing.'
- source_word: שֶׁקֶר
  chosen: for falsehood
  alternatives:
  - deceit
  - lies
  - lying
  lexicon: HALOT
  rationale: שׁקר denotes falsehood/deception broadly. 'Falsehood' fits the abstract noun style of the verse and pairs well with 'faithfulness' in the next clause.
- source_word: לֶאֱמוּנָה
  chosen: for faithfulness
  alternatives:
  - for truth
  - for honesty
  - for trustworthiness
  lexicon: HALOT
  rationale: אֱמוּנָה often carries the sense of faithfulness, firmness, reliability. Here it stands in contrast to שׁקר, so 'faithfulness' best preserves the ethical sense rather than a more abstract 'truth.'
- source_word: גָּבְרוּ
  chosen: have they grown strong
  alternatives:
  - they prevail
  - they have become mighty
  lexicon: HALOT
  rationale: 'The verb גבר means to be strong, prevail, become mighty. ''Have they grown strong'' captures the perfect aspect and the moral irony: their power in the land is not grounded in faithfulness.'
- source_word: בָאָרֶץ
  chosen: in the land
  alternatives:
  - in the earth
  - in the country
  lexicon: HALOT
  rationale: In Jeremiah, 'the land' naturally refers to the covenant land/society rather than the whole earth. This is the most contextually appropriate rendering.
- source_word: מֵרָעָה אֶל רָעָה
  chosen: from evil to evil
  alternatives:
  - from wickedness to wickedness
  - from one evil to another
  lexicon: HALOT
  rationale: The idiom expresses continual progression in evil. 'From evil to evil' is concise and close to the Hebrew; the more idiomatic alternative is preserved in a footnote.
- source_word: יָצָאוּ
  chosen: they go out
  alternatives:
  - they proceed
  - they advance
  - they move on
  lexicon: HALOT
  rationale: יצא literally means 'go out.' In this idiom it conveys movement/progression. Retaining 'go out' keeps the Hebrew flavor, though the sense is progression from one evil act/state to another.
- source_word: יָדָעוּ
  chosen: they do not know me
  alternatives:
  - they do not acknowledge me
  lexicon: HALOT
  rationale: ידע in covenantal contexts includes relational knowledge and acknowledgment. 'Know me' is the standard and theologically rich rendering; the fuller nuance can be noted as an alternative.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This prophetic formula is idiomatically rendered 'declares the LORD' in clear modern English. It preserves the solemn prophetic force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
