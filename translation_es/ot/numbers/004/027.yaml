base_translation:
  language: en
  yaml_path: translation/ot/numbers/004/027.yaml
  text: All the service of the sons of the Gershonites shall be at the command of Aaron and his sons[a], in all their loads and in all their service; and you shall assign to them, as a duty[b], all their loads.
  footnotes:
