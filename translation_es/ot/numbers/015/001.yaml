lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El hebreo con waw consecutiva introduce avance narrativo en una fórmula de revelación. En español, «habló» mantiene el carácter formal de comunicación divina mejor que «dijo», que suena más plano en este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre propio divino del Tetragrámaton en forma española habitual del proyecto: «Yahvé». Esto evita sustituirlo por un título y mantiene la tensión teológica documentada en el texto fuente.'
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición hebrea marca dirección del habla hacia el destinatario. En español, «a» es la forma natural y plenamente adecuada.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico asentado en español. Se conserva la forma tradicional e inteligible para lectores de iglesia.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: La construcción infinitiva introduce la fórmula de discurso que abre la cita siguiente. «Diciendo» preserva la estructura hebrea sin forzar una paráfrasis.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'La lectura inglesa audita el uso del nombre propio divino en lugar de una sustitución tradicional. En español, «Yahvé» comunica el mismo criterio: preservar el nombre del pacto revelado a Israel.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Concordancia alta con el audit trail inglés: no se introdujeron revisiones adicionales; se conservó la fórmula narrativa y el nombre divino según la política del proyecto.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - Se prefirió «habló» para reflejar la fórmula narrativa de habla divina sin perder naturalidad en español.
  - «Moisés» y «diciendo» siguen el registro bíblico estándar en español sin añadir matices no presentes en el hebreo.
