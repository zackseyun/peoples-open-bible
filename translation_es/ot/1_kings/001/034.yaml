  verdict: revise
  source_alignment_summary: 'El borrador omite dos agentes explícitos del hebreo: «Sadoc el sacerdote y Natán el profeta». El sujeto plural implícito de «ungirán» no basta, porque el texto fuente los nombra de manera prominente. El resto de la secuencia instructiva está bien encaminado: «Allí», la unción real, «sobre Israel» y la aclamación «¡Viva el rey Salomón!» reflejan bien el hebreo. La nota sobre שׁוֹפָר, sin embargo, está mal anclada: el marcador [a] aparece tras «Israel» en vez de en «shofar».'
  spanish_quality_summary: El español es claro y natural, pero incompleto por la omisión de los nombres/títulos. «Tocarán el shofar» es legible, aunque «harán sonar el shofar» sería ligeramente más preciso; no es indispensable cambiarlo. La puntuación y la fórmula de aclamación son buenas. Hace falta recolocar la nota al término correspondiente.
  glossary_alignment: No hay conflicto con los glosarios mayores del proyecto. «Ungir», «profeta», «rey» y «Israel» están bien. Mantener «shofar» con nota es aceptable dado el rastro de auditoría inglés, pero el marcador debe ir sobre «shofar[a]», no sobre «Israel[a]».
  issues:
  - severity: high
    issue: Omisión de «Sadoc el sacerdote y Natán el profeta» en el texto principal
    rationale: El hebreo nombra explícitamente a ambos agentes de la unción. Eliminarlos reduce contenido semántico y borra un detalle narrativo importante de legitimación real.
  - severity: medium
    issue: Marcador de nota [a] colocado en «Israel» en vez de «shofar»
    rationale: La nota explica שׁוֹפָר, no «Israel». El anclaje actual induce a confusión y no cumple la disciplina de notas del proyecto.
  revised_spanish_text: 'Allí Sadoc, el sacerdote, y Natán, el profeta, lo ungirán rey sobre Israel, y ustedes tocarán el shofar[a] y dirán: «¡Viva el rey Salomón!»'
  revised_footnotes:
  - marker: a
    text: «Shofar» conserva el término hebreo para el cuerno usado como señal o proclamación pública; en traducciones tradicionales suele verterse «trompeta».
    reason: lexical_alternative
  revision_rationale: Se repusieron los dos agentes explícitos de la unción presentes en el hebreo y en la auditoría inglesa, y se movió la nota al término «shofar», que es el elemento explicado por la nota léxica. Se mantuvo la redacción general del borrador porque su español es natural y fiel en los demás puntos.
