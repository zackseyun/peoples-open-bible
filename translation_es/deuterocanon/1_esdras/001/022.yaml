  glossary_alignment: La elección de «Yahvé» está alineada con la política del proyecto. No hay conflicto con términos doctrinales principales. «Le entristecieron» preserva bien λυπέω. El uso de «más que toda nación y reino» es aceptable para el comparativo de exceso, aunque «más que cualquier nación y reino» o «por encima de toda nación y reino» también serían posibles; no requiere cambio obligatorio.
