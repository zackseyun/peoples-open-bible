revisions:
- from: Y en el pórtico de la puerta había dos mesas de este lado y dos mesas de aquel lado[a], sobre las cuales se degollaban el holocausto, el sacrificio por el pecado[b] y la ofrenda por la culpa.
  to: Y en el pórtico de la puerta había dos mesas de este lado y dos mesas de aquel lado[a], sobre las cuales degollaban el holocausto, el sacrificio por el pecado[b] y la ofrenda por la culpa[c].
  rationale: Se ajusta la cláusula verbal a un español más natural y más cercano al sentido contextual auditado ('sobre las cuales degollaban'), y se añade la nota léxica faltante para אָשָׁם, preservando el aparato de alternativas del English POB sin expandir el sentido del texto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:41:22Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea: pórtico de la puerta, cuatro mesas en disposición bilateral y la lista de tres sacrificios. Sin embargo, no preserva por completo el rastro auditado del inglés en dos puntos: falta la nota léxica para הָאָשָׁם (''guilt offering'' / ''reparation offering''), y ''se degollaban'' introduce una voz media impersonal menos natural que el sentido práctico contextual ''degollaban allí/sobre ellas''.'
  spanish_quality_summary: El español es mayormente claro y digno, pero 'sobre las cuales se degollaban el holocausto...' suena algo forzado en español moderno y puede rozar una construcción poco idiomática. 'Sobre las cuales degollaban...' o 'en las cuales sacrificaban/degollaban...' lee mejor. También conviene mantener paralelismo terminológico en la serie sacrificial y añadir la nota omitida para 'ofrenda por la culpa'.
  glossary_alignment: No hay conflicto con la terminología global del proyecto. 'Holocausto' es aceptable para עֹלָה. 'Sacrificio por el pecado' y 'ofrenda por la culpa' son fieles, aunque conviene conservar también en nota la alternativa 'ofrenda de reparación' para אָשָׁם, tal como documenta el POB en inglés.
  issues:
  - severity: medium
    issue: Falta una nota al pie para הָאָשָׁם / 'ofrenda por la culpa'.
    rationale: El English POB preserva explícitamente la alternativa léxica 'reparation offering'. La revisión española debe conservar esa alternativa, especialmente porque el propio expediente léxico la documenta.
  - severity: medium
    issue: '''se degollaban'' es menos natural que una forma activa impersonal/contextual.'
    rationale: El hebreo usa infinitivo con sentido práctico en contexto; el inglés auditado lo resolvió como 'they slaughtered'. En español, 'sobre las cuales degollaban' o equivalente refleja mejor el uso y evita una pasiva refleja extraña con objetos sacrificiales singulares coordinados.
  - severity: low
    issue: El marcador [a] actual solo explica la disposición bilateral, no una alternativa relevante del listado sacrificial omitida.
    rationale: La nota [a] puede mantenerse, pero debe añadirse otra nota para completar el aparato de alternativas significativas preservadas por el POB.
  revised_spanish_text: Y en el pórtico de la puerta había dos mesas de este lado y dos mesas de aquel lado[a], sobre las cuales degollaban el holocausto, el sacrificio por el pecado[b] y la ofrenda por la culpa[c].
  revised_footnotes:
  - marker: a
    text: O ‘de un lado ... del otro lado’ para expresar la disposición bilateral de las mesas.
    reason: lexical_alternative
  - marker: b
    text: O ‘ofrenda de purificación’ para ‘sacrificio por el pecado’; el hebreo puede referirse a la ofrenda vinculada con la purificación del pecado o de la impureza.
    reason: lexical_alternative
  - marker: c
    text: O ‘ofrenda de reparación’ para ‘ofrenda por la culpa’.
    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula verbal a un español más natural y más cercano al sentido contextual auditado ('sobre las cuales degollaban'), y se añade la nota léxica faltante para אָשָׁם, preservando el aparato de alternativas del English POB sin expandir el sentido del texto.
