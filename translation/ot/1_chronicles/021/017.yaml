id: 1CH.21.17
reference: 1 Chronicles 21:17
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר דָּוִ֣יד אֶֽל הָ/אֱלֹהִ֡ים הֲ/לֹא֩ אֲנִ֨י אָמַ֜רְתִּי לִ/מְנ֣וֹת בָּ/עָ֗ם וַ/אֲנִי ה֤וּא אֲשֶׁר חָטָ֨אתִי֙ וְ/הָרֵ֣עַ הֲרֵע֔וֹתִי וְ/אֵ֥לֶּה הַ/צֹּ֖אן מֶ֣ה עָשׂ֑וּ יְהוָ֣ה אֱלֹהַ֗/י תְּהִ֨י נָ֤א יָֽדְ/ךָ֙ בִּ֚/י וּ/בְ/בֵ֣ית אָבִ֔/י וּֽ/בְ/עַמְּ/ךָ֖ לֹ֥א לְ/מַגֵּפָֽה־־־׃ס
translation:
  text: Then David said to God[a], “Was it not I who ordered the people to be counted? I am the one who has sinned and done great evil. But these sheep—what have they done? O Yahweh my God, please let your hand be against me and against my father’s house[d][c][b], but not against your people for a plague.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I said to count the people' / 'I commanded that the people be numbered.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'these sheep,' a metaphor for the people.
    reason: cultural_note
  - marker: c
    text: Or 'let your hand be upon me and upon my father’s house.' 'Hand' is a Hebrew idiom for power or judgment.
    reason: lexical_alternative
  - marker: d
    text: Or 'but not on your people with a plague.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the God
  lexicon: HALOT
  rationale: With the article, the phrase refers to Israel's God in direct address context; idiomatic English omits the article and renders simply 'God.'
- source_word: הֲלֹא
  chosen: Was it not
  alternatives:
  - Did not
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting affirmation. 'Was it not' preserves the rhetorical force in natural English.
- source_word: אָמַרְתִּי לִמְנוֹת בָּעָם
  chosen: I ... ordered the people to be counted
  alternatives:
  - I said to count the people
  - I commanded that the people be numbered
  lexicon: HALOT
  rationale: The Hebrew literally says 'I said to count the people.' In context David refers to his directive initiating the census, so 'ordered ... to be counted' captures the causative sense without over-paraphrasing.
- source_word: וַאֲנִי הוּא אֲשֶׁר
  chosen: I am the one who
  alternatives:
  - and I am he who
  - I myself am the one who
  lexicon: HALOT
  rationale: This construction is emphatic, highlighting David's personal responsibility. 'I am the one who' communicates the emphasis in clear modern English.
- source_word: חָטָאתִי
  chosen: has sinned
  alternatives:
  - sinned
  lexicon: HALOT
  rationale: Rendered with English present perfect in the quoted speech to convey completed action with present relevance; simple past would also be possible.
- source_word: וְהָרֵעַ הֲרֵעוֹתִי
  chosen: and done great evil
  alternatives:
  - and acted very wickedly
  - and surely done evil
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea. 'Done great evil' preserves the intensification without awkward literalism.
- source_word: הַצֹּאן
  chosen: these sheep
  alternatives:
  - this flock
  lexicon: HALOT
  rationale: David metaphorically refers to the people as sheep. 'These sheep' keeps the pastoral metaphor explicit and close to the Hebrew.
- source_word: מֶה עָשׂוּ
  chosen: what have they done?
  alternatives:
  - what did they do?
  lexicon: HALOT
  rationale: A direct rhetorical question asserting their innocence. Present perfect is natural in English in this appeal.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: 'Straightforward possessive form in direct address: ''my God.'''
- source_word: תְּהִי נָא יָדְךָ
  chosen: please let your hand be against
  alternatives:
  - please may your hand be upon
  - let your hand fall on
  lexicon: HALOT
  rationale: '''Hand'' is a common Hebrew idiom for active power in judgment or action. ''Be against'' makes the punitive sense explicit from context while retaining the metaphor.'
- source_word: בִּי וּבְבֵית אָבִי
  chosen: against me and against my father’s house
  alternatives:
  - on me and on my father's house
  lexicon: HALOT
  rationale: Keeps the repeated preposition and the household/family sense of 'father's house,' which here refers to David's dynasty/family line.
- source_word: וּבְעַמְּךָ לֹא לְמַגֵּפָה
  chosen: but not against your people for a plague
  alternatives:
  - but not against your people with a plague
  - but let it not be on your people as a plague
  lexicon: HALOT
  rationale: The phrase asks that the people not be the object of the plague. 'For a plague' is slightly formal but preserves the Hebrew construction and avoids over-specifying beyond the text.
