translation:
  language: es
  text: ¿No están allí contigo Sadoc y Abiatar, los sacerdotes? Y todo lo que oigas de la casa del rey informarás a Sadoc y a Abiatar, los sacerdotes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַהֲלוֹא
  english_pob_choice: Are not
  chosen_spanish: ¿No están…?
  alternatives_spanish:
  - ¿Acaso no están…?
  - ¿No es así que están…?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera respuesta afirmativa. En español, ‘¿No están…?’ conserva la fuerza interrogativa natural sin añadir énfasis innecesario.
- source_word: עִמְּךָ שָׁם
  english_pob_choice: there with you
  chosen_spanish: allí contigo
  alternatives_spanish:
  - allí con usted
  - ahí contigo
  lexicon: HALOT
  rationale: El hebreo combina compañía y ubicación. ‘Allí contigo’ preserva ambos elementos en un orden natural para el español.
- source_word: צָדוֹק וְאֶבְיָתָר
  english_pob_choice: Zadok and Abiathar
  chosen_spanish: Sadoc y Abiatar
  alternatives_spanish:
  - Zadoc y Abiatar
  - Sadoq y Abiatar
  lexicon: Nombres propios tradicionales/transliteración ajustada al español
  rationale: Se adopta la forma usual en español bíblico para los nombres, adaptando la ortografía al sistema gráfico español sin cambiar la identidad referencial.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes en función
  - los presbíteros
  lexicon: HALOT
  rationale: En español eclesial ‘sacerdotes’ comunica con claridad la función levítica del término hebreo en este contexto. ‘Presbíteros’ no corresponde al sentido del original.
- source_word: כָּל הַדָּבָר אֲשֶׁר תִּשְׁמַע
  english_pob_choice: whatever you hear
  chosen_spanish: todo lo que oigas
  alternatives_spanish:
  - cualquier cosa que oigas
  - todo cuanto oigas
  lexicon: HALOT
  rationale: El hebreo expresa una generalidad amplia (‘todo lo que’). ‘Oigas’ mantiene el sentido directo de שׁמע sin convertirlo en ‘enterarte’ o ‘averiguar’.
- source_word: מִבֵּית הַמֶּלֶךְ
  english_pob_choice: from the king’s house
  chosen_spanish: de la casa del rey
  alternatives_spanish:
  - del palacio del rey
  - de la corte del rey
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de ‘casa del rey’ en español natural. ‘Palacio’ o ‘corte’ explicitan, pero estrechan o desplazan la metáfora original.
- source_word: תַּגִּיד
  english_pob_choice: you shall report
  chosen_spanish: se lo informarás
  alternatives_spanish:
  - se lo dirás
  - lo reportarás
  lexicon: HALOT
  rationale: El verbo hiphil de נגד implica hacer saber, comunicar o reportar. ‘Informar’ refleja mejor la transmisión formal de noticias que un simple ‘decir’.
- source_word: לְצָדוֹק וּלְאֶבְיָתָר הַכֹּהֲנִים
  english_pob_choice: to Zadok and Abiathar the priests
  chosen_spanish: a Sadoc y a Abiatar, los sacerdotes
  alternatives_spanish:
  - a Sadoc y a Abiatar, los sacerdotes
  - para Sadoc y Abiatar, los sacerdotes
  lexicon: HALOT
  rationale: Se mantiene la apposición que identifica a ambos por su oficio. La preposición ‘a’ es la más natural en español para el complemento indirecto de ‘informar’.
theological_decisions:
- issue: Oficio sacerdotal de Sadoc y Abiatar
  english_pob_reading: the priests
  chosen_spanish_reading: los sacerdotes
  alternative_spanish_readings:
  - los ministros
  - los líderes religiosos
  rationale: El texto los nombra explícitamente como כהנים; ‘sacerdotes’ conserva la designación institucional sin introducir una categoría posterior o más general.
  doctrine_reference: Éxodo 28; Levítico 8; 2 Samuel 8:17
- issue: Forma de la revelación indirecta en la misión de inteligencia
  english_pob_reading: whatever you hear from the king’s house, you shall report
  chosen_spanish_reading: todo lo que oigas de la casa del rey, se lo informarás
  alternative_spanish_readings:
  - todo lo que escuches…
  - todo lo que averigües…
  rationale: La instrucción no dice que David deba investigar, sino oír y comunicar. ‘Informarás’ conserva el acto de transmitir fielmente lo oído sin añadir una inferencia no presente en el hebreo.
  doctrine_reference: Proverbios 11:13; 18:8
translation_notes:
  revision_awareness: La versión inglesa auditada se mantuvo muy cercana al hebreo y fue revisada de ‘whatever matter you hear’ a ‘whatever you hear’. La línea española sigue esa revisión y evita introducir ‘asunto’ o ‘materia’, optando por una formulación directa que preserva la amplitud semántica de כָּל הַדָּבָר.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma reservada para יהוה, pero este versículo no contiene el Nombre.
  - Se usa ‘sacerdotes’ para כהנים en coherencia con el contexto levítico.
  - Se evita ‘Cristo/Mesías’ porque no aparece en el versículo.
  - La sintaxis busca claridad pública sin perder la estructura de pregunta retórica seguida de instrucción.
