  rationale: The verse makes a moral judgment using לְהַרְשִׁיעַ. The translation should preserve that judgment clearly while not importing additional psychological nuance beyond the Hebrew.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve the text''s meaning without paraphrastic expansion.'
