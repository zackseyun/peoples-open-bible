    issue: El borrador usa «él» para אוֹתוֹ.
    rationale: El referente es el becerro/ídolo de Bet-avén en el contexto inmediato; el POB inglés auditado eligió «it» precisamente para evitar una lectura personal. En español, «él» añade una personificación innecesaria y puede confundir el referente.
  - severity: low
