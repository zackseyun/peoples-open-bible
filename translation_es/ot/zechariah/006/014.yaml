translation:
  language: es
  text: Y las coronas serán para Helem[a], Tobíah, Jedaías y Hen hijo de Sofonías, como memorial en el templo de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Helem corresponde a Heldai en Zacarías 6:10; esto puede reflejar una variante del mismo nombre.
    reason: alternative_reading
lexical_decisions:
- source_word: הָעֲטָרוֹת
  english_pob_choice: the crowns
  chosen_spanish: las coronas
  alternatives_spanish:
  - la corona
  lexicon: HALOT
  rationale: El sustantivo está en plural en el hebreo; por eso «las coronas» refleja mejor la forma del texto que un singular.
- source_word: תִּהְיֶה
  english_pob_choice: shall be
  chosen_spanish: serán
  alternatives_spanish:
  - será
  - llegarán a ser
  lexicon: HALOT
  rationale: En español, el plural del sujeto pide concordancia natural. «Serán» conserva el valor futuro/resultativo del imperfecto sin añadir matiz no exigido.
- source_word: לְחֵלֶם
  english_pob_choice: for Helem
  chosen_spanish: para Helem
  alternatives_spanish:
  - para Heldai
  lexicon: HALOT
  rationale: Se mantiene el nombre tal como aparece en este versículo, sin armonizarlo con Zacarías 6:10. La nota conserva la variante relacionada.
- source_word: וּלְטוֹבִיָּה
  english_pob_choice: Tobijah
  chosen_spanish: Tobías
  alternatives_spanish:
  - Tobías
  lexicon: HALOT
  rationale: El nombre propio se translitera a una forma natural en español. «Tobías» refleja bien la forma hebrea y es más inteligible para lectores hispanos que una transliteración más pesada.
- source_word: וְלִידַעְיָה
  english_pob_choice: Jedaiah
  chosen_spanish: Jedaías
  alternatives_spanish:
  - Jedaía
  lexicon: HALOT
  rationale: Se conserva el nombre propio con una transliteración española estándar y legible, ajustada a la forma hebrea.
- source_word: וּלְחֵן
  english_pob_choice: Hen
  chosen_spanish: Hen
  alternatives_spanish:
  - gracia
  - favor
  lexicon: HALOT
  rationale: Aquí funciona como nombre personal, no como sustantivo común. Traducirlo como «gracia» o «favor» borraría esa identificación, especialmente porque sigue «hijo de Sofonías».
- source_word: בֶּן צְפַנְיָה
  english_pob_choice: son of Zephaniah
  chosen_spanish: hijo de Sofonías
  alternatives_spanish:
  - hijo de Zephaniah
  lexicon: HALOT
  rationale: Se usa la forma española del nombre propio para una lectura más natural, conservando la relación filial del hebreo.
- source_word: לְזִכָּרוֹן
  english_pob_choice: as a memorial
  chosen_spanish: como memorial
  alternatives_spanish:
  - como recuerdo
  - para memorial
  lexicon: HALOT
  rationale: «Memorial» mantiene el sentido conmemorativo y cultual del término. «Como memorial» reproduce bien la función del hebreo sin sobreexplicar.
- source_word: בְּהֵיכַל
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el santuario
  - en el palacio
  lexicon: HALOT
  rationale: Con «de Yahvé», הֵיכָל se entiende claramente como templo/santuario, no como palacio real.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé», preservando el nombre divino en lugar de sustituirlo por un título.'
theological_decisions:
- issue: Variación de nombres propios entre este versículo y Zacarías 6:10
  english_pob_reading: Preserve the MT forms in this verse ('Helem' and 'Hen') without harmonizing them to nearby forms.
  chosen_spanish_reading: Mantener las formas de este versículo («Helem» y «Hen») sin armonizarlas con las de Zacarías 6:10.
  alternative_spanish_readings:
  - Armonizar «Helem» con «Heldai»
  - Leer «Hen» como sustantivo común («gracia» o «favor»)
  rationale: La traducción sigue la prioridad del texto hebreo de este versículo. Dado que la diferencia puede reflejar una variante de nombre o un rasgo de transmisión textual, el texto principal preserva la lectura presente y la nota registra la alternativa pertinente.
  doctrine_reference: Principio de primacía del texto original; preservar tensiones textuales en lugar de resolverlas sin base explícita.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto al pase anterior; la decisión principal se mantiene en la preservación de las formas nominales del MT y en la traducción de הֵיכָל como «templo».'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto, evitando la sustitución por «Señor».
  - Se mantienen los nombres propios en una forma española legible y consistente con la transliteración funcional del texto fuente.
  - «Memorial» se conserva por su valor cultual y conmemorativo; no se simplifica a un mero «recuerdo».
  - La concordancia verbal en español se ajusta al plural del sujeto («las coronas serán»).
