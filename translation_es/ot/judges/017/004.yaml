    text: Or 'a graven image and a molten image.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew uses a singular verb ('and it was') after 'a carved image and a cast image,' likely treating the made object or set as a unit.
    reason: lexical_alternative
