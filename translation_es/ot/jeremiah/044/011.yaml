translation:
  language: es
  text: 'Por tanto[a], así dice Yahvé de los Ejércitos, Dios de Israel: He aquí, pongo mi rostro contra ustedes para mal[b], para extirpar a toda Judá.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el SEÑOR de los ejércitos».
    reason: lexical_alternative
  - marker: b
    text: Aquí «mal» significa calamidad o desastre en juicio, no mal moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa con naturalidad en español la fuerza inferencial del hebreo, manteniendo el vínculo con el juicio anunciado en el contexto previo.
- source_word: כֹּה אָמַר
  english_pob_choice: this is what ... says
  chosen_spanish: así dice
  alternatives_spanish:
  - esto es lo que ... dice
  - así ha dicho
  lexicon: HALOT
  rationale: Conserva la fórmula profética clásica sin volverla rígida; en español, 'así dice' reproduce bien el tono solemne del mensajero divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de traducir el Nombre divino como 'Yahvé', en lugar de enmascararlo con una convención tipográfica.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los Anfitriones
  - de los Ejércitos celestiales
  lexicon: HALOT
  rationale: '''Ejércitos'' refleja con claridad el valor del título y su referencia al dominio soberano de Yahvé sobre las fuerzas celestiales y terrenales.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Reproduce de manera directa la relación de pacto y la identificación del Dios de Israel sin añadir elementos interpretativos.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: He aquí,
  alternatives_spanish:
  - Miren,
  - Yo estoy por
  lexicon: HALOT
  rationale: '''He aquí'' preserva la solemnidad y la fuerza deíctica del hebreo; el sujeto verbal queda claro por el contexto inmediato en primera persona divina.'
- source_word: שָׂם פָּנַי בָּכֶם
  english_pob_choice: setting my face against you
  chosen_spanish: pongo mi rostro contra ustedes
  alternatives_spanish:
  - vuelvo mi rostro contra ustedes
  - fijo mi rostro contra ustedes
  lexicon: HALOT
  rationale: Se mantiene la metáfora hebrea del 'rostro' como señal de oposición decidida. 'Pongo mi rostro contra ustedes' es natural en español y conserva la imagen sin explicarla en exceso.
- source_word: לְרָעָה
  english_pob_choice: for harm
  chosen_spanish: para mal
  alternatives_spanish:
  - para calamidad
  - para desastre
  lexicon: HALOT
  rationale: '''Mal'' comunica aquí la idea de juicio adverso o calamidad, no de mal moral en Dios. En español bíblico, esta fórmula es breve y fiel al sentido contextual.'
- source_word: וּלְהַכְרִית
  english_pob_choice: to cut off
  chosen_spanish: para cortar
  alternatives_spanish:
  - para exterminar
  - para destruir
  lexicon: HALOT
  rationale: El verbo hebreo de 'cortar' conserva mejor la imagen literal del juicio que un equivalente más interpretativo. En español, 'cortar' necesita el contexto de la frase para entenderse como cortar del pueblo / quitar de en medio.
- source_word: כָּל יְהוּדָה
  english_pob_choice: all Judah
  chosen_spanish: a toda Judá
  alternatives_spanish:
  - a todo Judá
  - a toda la gente de Judá
  lexicon: HALOT
  rationale: La expresión hebrea compacta puede referirse al conjunto del pueblo; 'a toda Judá' mantiene esa densidad y fluidez en español.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה junto con צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - el SEÑOR de los ejércitos
  - Yahvé de las huestes
  rationale: Se conserva el Nombre propio divino y se traduce el título צְבָאוֹת de forma transparente. 'Ejércitos' evita ocultar el Nombre detrás de una convención litúrgica y refleja el poder soberano implicado en el título.
  doctrine_reference: 'DOCTRINE.md: traducir nombres; traducir títulos; contienda terminológica para יְהוָה'
- issue: Sentido de לְרָעָה
  english_pob_reading: for harm (calamity/disaster in judgment, not moral evil)
  chosen_spanish_reading: para mal (es decir, para calamidad en juicio, no para mal moral)
  alternative_spanish_readings:
  - para calamidad
  - para desastre
  rationale: En español, 'mal' puede sonar moral si se lee sin contexto; por eso la traducción mantiene la brevedad bíblica pero reconoce explícitamente en la nota que se trata de juicio adverso, no de maldad ética en Dios.
  doctrine_reference: Principio de claridad semántica sin borrar la tensión lexical del hebreo
translation_notes:
  revision_awareness: 'Se revisó el expediente inglés y el resumen de control: la versión auditada quedó sin cambios en la pasada más reciente, con acuerdo alto y solo observaciones menores. La presente redacción sigue esas decisiones, especialmente el uso del Nombre divino, el título militar y la lectura de לְרָעָה como calamidad de juicio.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma principal del Nombre divino, coherente con el proyecto.
  - Se evitó 'SEÑOR' en el cuerpo principal para no ocultar el Nombre.
  - '''Ejércitos'' traduce צְבָאוֹת con transparencia y uniformidad.'
  - '''Para mal'' conserva la ambigüedad controlada del hebreo y queda aclarado en nota.'
  - '''Pongo mi rostro contra ustedes'' preserva la metáfora idiomática sin suavizarla.'
