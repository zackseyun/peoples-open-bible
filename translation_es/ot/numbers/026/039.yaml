translation:
  language: es
  text: De Shupam[a], el clan de los Shupamitas; de Hupam, el clan de los Hupamitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo Shupham corresponde al nombre escrito así en este versículo; algunas tradiciones en inglés reflejan grafías relacionadas, influidas por otras tradiciones textuales o listas paralelas.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/שְׁפוּפָ֕ם
  english_pob_choice: Of Shupham
  chosen_spanish: De Shupam
  alternatives_spanish:
  - Para Shupam
  - A Shupam
  lexicon: HALOT
  rationale: El prefijo ל en esta fórmula censal expresa pertenencia/descendencia de un grupo, y en español se rinde naturalmente con 'de'. Se conserva el nombre propio en transliteración. Se usa 'Shupam' para mantener consistencia con la tradición auditada en inglés y reflejar la forma del hebreo de este versículo.
- source_word: מִשְׁפַּחַת
  english_pob_choice: the clan of
  chosen_spanish: la familia de
  alternatives_spanish:
  - el clan de
  - la casa de
  lexicon: HALOT
  rationale: En listas genealógicas y censales, מִשְׁפָּחָה puede designar una subdivisión de parentesco. En español, 'familia' comunica bien la relación de descendencia sin introducir una terminología eclesiástica o tribal más técnica que el hebreo aquí no exige de manera única. Se evita 'clan' como término menos natural para muchos lectores en español bíblico moderno.
- source_word: הַ/שּׁוּפָמִי
  english_pob_choice: the Shuphamites
  chosen_spanish: los shupamitas
  alternatives_spanish:
  - la familia shupamita
  - los de Shupam
  lexicon: HALOT
  rationale: El gentilicio plural con artículo funciona colectivamente; en español, 'los shupamitas' expresa de forma directa el conjunto descendiente de Shupam. Se adopta minúscula inicial dentro de la frase nominal, por tratarse de un gentilicio derivado de un nombre propio.
- source_word: לְ/חוּפָ֕ם
  english_pob_choice: of Hupham
  chosen_spanish: de Hupam
  alternatives_spanish:
  - para Hupam
  - a Hupam
  lexicon: HALOT
  rationale: 'Se mantiene la misma solución sintáctica que en la primera mitad del versículo: el ל indica afiliación o procedencia en la lista y se traduce ''de''. El nombre propio se translitera como Hupam según el hebreo de este versículo.'
- source_word: הַ/חוּפָמִי
  english_pob_choice: the Huphamites
  chosen_spanish: los hupamitas
  alternatives_spanish:
  - la familia hupamita
  - los de Hupam
  lexicon: HALOT
  rationale: El gentilicio con artículo se entiende colectivamente; 'los hupamitas' reproduce ese valor de manera natural en español. Se conserva paralelismo con la primera cláusula para reflejar la estructura hebrea.
theological_decisions:
- issue: Fórmula censal de afiliación tribal/familiar
  english_pob_reading: Clan language is used for the kinship subdivision in the census list.
  chosen_spanish_reading: Se traduce con 'familia' para la subdivisión de parentesco, sin sobrecargar el texto con una categoría técnica única.
  alternative_spanish_readings:
  - clan
  - linaje
  - estirpe
  rationale: No hay una afirmación doctrinal en tensión aquí, pero sí una decisión terminológica. 'Familia' es suficientemente fiel al hebreo מִשְׁפָּחָה y resulta clara para lectores españoles; la alternativa 'clan' sería igualmente defendible, pero menos idiomática para este registro.
  doctrine_reference: Números 26:39; lista censal de las familias de Israel
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del audit trail en inglés, que no introdujo cambios al texto base. La única nota auditada relevante es la alternancia ortográfica del nombre propio Shupham, que se conserva y explica en nota.
  spanish_consistency_notes:
  - 'Se mantuvo un paralelismo formal entre las dos mitades del versículo: ''De X, la familia de los Xitas; de Y, la familia de los Yitas''.'
  - Se usó transliteración coherente de nombres propios y gentilicios derivados en minúscula dentro de la frase.
  - Se evitó 'SEÑOR' u otro sustituto teológico, porque el versículo no contiene el nombre divino ni un título divino contextual.
  - El término 'familia' se eligió como equivalente funcional de מִשְׁפָּחָה dentro de un registro censal; 'clan' queda documentado como alternativa lexical.
