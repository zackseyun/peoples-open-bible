translation:
  language: es
  text: Entonces proclamé allí un ayuno, junto al río Ahavá, para humillarnos[a] delante de nuestro Dios y pedirle un camino recto[b] para nosotros, para nuestros pequeños y para todos nuestros bienes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «afligirnos delante de nuestro Dios». El modismo hebreo se refiere a negarnos a nosotros mismos o humillarnos, especialmente en el contexto del ayuno.
    reason: lexical_alternative
  - marker: b
    text: O «un camino justo» o «una ruta segura». El hebreo dice literalmente «un camino recto».
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֶקְרָא
  english_pob_choice: Then I proclaimed
  chosen_spanish: Entonces proclamé
  alternatives_spanish:
  - Y proclamé
  - Entonces llamé
  lexicon: HALOT
  rationale: קרא aquí tiene el sentido de anunciar o proclamar públicamente; por eso «proclamé» comunica mejor que un simple «llamé». «Entonces» conserva el valor narrativo de la waw inicial en un español natural.
- source_word: צוֹם
  english_pob_choice: a fast
  chosen_spanish: un ayuno
  alternatives_spanish:
  - ayuno
  - un tiempo de ayuno
  lexicon: HALOT
  rationale: El sustantivo nombra la observancia misma; «un ayuno» es la forma natural y fiel en español.
- source_word: עַל הַנָּהָר אַהֲוָא
  english_pob_choice: there, at the Ahava River
  chosen_spanish: allí, junto al río Ahavá
  alternatives_spanish:
  - allí, en el río Ahavá
  - allí, a orillas del río Ahavá
  lexicon: HALOT
  rationale: עַל con un río puede indicar ubicación junto a o a la orilla de. «Junto al río» conserva esa relación espacial sin forzarla. Se translitera Ahavá como nombre propio del lugar.
- source_word: לְהִתְעַנּוֹת
  english_pob_choice: that we might humble ourselves
  chosen_spanish: para humillarnos
  alternatives_spanish:
  - para afligirnos
  - para humillarnos delante de Dios
  lexicon: HALOT
  rationale: El hitpael de ענה en contextos de ayuno expresa auto-humillación o auto-negación. «Humillarnos» mantiene la idea espiritual; «afligirnos» es más literal pero en español puede sonar a daño físico.
- source_word: לִפְנֵי אֱלֹהֵינוּ
  english_pob_choice: before our God
  chosen_spanish: delante de nuestro Dios
  alternatives_spanish:
  - en presencia de nuestro Dios
  - ante nuestro Dios
  lexicon: HALOT
  rationale: «Delante de nuestro Dios» reproduce bien la relación postural y reverente del hebreo, con registro digno y natural en español.
- source_word: לְבַקֵּשׁ מִמֶּנּוּ
  english_pob_choice: to seek from him
  chosen_spanish: y pedirle
  alternatives_spanish:
  - y buscar de él
  - y solicitarle
  lexicon: HALOT
  rationale: בקש puede significar buscar o pedir; aquí introduce una petición a Dios. En español, «pedirle» expresa de forma clara la dependencia orante sin perder el matiz de búsqueda implícito.
- source_word: דֶּרֶךְ יְשָׁרָה
  english_pob_choice: a straight path
  chosen_spanish: un camino recto
  alternatives_spanish:
  - un camino derecho
  - una senda recta
  - un camino justo
  lexicon: HALOT
  rationale: La imagen es literalmente de un «camino recto/straight». «Camino recto» preserva la metáfora y sigue siendo comprensible en español; también deja abierta la tensión entre guía correcta y trayecto seguro.
- source_word: לָנוּ וּלְטַפֵּנוּ וּלְכָל רְכוּשֵׁנוּ
  english_pob_choice: for us, for our little ones, and for all our possessions
  chosen_spanish: para nosotros, para nuestros pequeños y para todos nuestros bienes
  alternatives_spanish:
  - para nosotros, para nuestros hijos y para todas nuestras posesiones
  - para nosotros, para nuestros dependientes y para todas nuestras pertenencias
  lexicon: HALOT
  rationale: טף designa a los pequeños o dependientes vulnerables del grupo; «nuestros pequeños» preserva esa amplitud sin restringirlo solo a hijos. רְכוּשׁ es propiedad o posesiones; «bienes» resulta claro y sobrio en español.
theological_decisions:
- issue: Cómo verter לְהִתְעַנּוֹת en el contexto del ayuno
  english_pob_reading: that we might humble ourselves before our God
  chosen_spanish_reading: para humillarnos delante de nuestro Dios
  alternative_spanish_readings:
  - para afligirnos delante de nuestro Dios
  rationale: La POB entiende el verbo como auto-humillación o auto-negación en un contexto penitencial. En español, «humillarnos» evita sugerir autolesión y conserva la postura devocional implícita en el ayuno.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Cómo conservar la tensión de דֶּרֶךְ יְשָׁרָה
  english_pob_reading: a straight path
  chosen_spanish_reading: un camino recto
  alternative_spanish_readings:
  - un camino justo
  - una ruta segura
  rationale: El hebreo ofrece una imagen espacial concreta que también puede implicar dirección correcta. «Camino recto» conserva la metáfora sin reducirla solo a seguridad física o solo a rectitud moral.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el estado auditado más reciente, sin cambios necesarios según el último pase de revisión. Se conservaron las dos tensiones documentadas: el sentido idiomático de «humillarnos» en el ayuno y la imagen metafórica de «camino recto» para דֶּרֶךְ יְשָׁרָה.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por política general, pero este versículo no contiene el Tetragrámaton; por eso aparece «nuestro Dios» según el hebreo אֱלֹהֵינוּ.
  - Se prefirió «bienes» para רְכוּשׁ, en línea con un registro bíblico sobrio y comprensible.
  - «Nuestros pequeños» conserva la amplitud de טַפֵּנוּ sin limitarlo a una sola relación familiar.
