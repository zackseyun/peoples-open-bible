    text: Or 'which came to Jeremiah the prophet concerning the Philistines.' The Hebrew opens with a relative construction functioning as a heading.
    reason: lexical_alternative
  - marker: b
    text: Or 'against the Philistines.' The preposition can introduce the subject of an oracle and, in judgment contexts, may be understood adversatively.
    reason: lexical_alternative
