translation:
  language: es
  text: Mira, estoy poniendo un vellón de lana sobre la era. Si hay rocío sobre el vellón solo, y sequedad sobre todo el suelo[a], entonces sabré que salvarás a Israel por mi mano, como has hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘toda la tierra’ o ‘todo el terreno’; el hebreo puede referirse al suelo inmediato o a la tierra en sentido más amplio. En este contexto, probablemente alude al suelo circundante de la señal.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Observa
  - He aquí
  lexicon: HALOT
  rationale: El hebreo introduce la señal con fuerza deíctica. ‘Mira’ conserva esa llamada de atención en un español natural y digno; ‘He aquí’ sería más tradicional, pero menos vivo en el registro actual.
- source_word: מַצִּיג
  english_pob_choice: am placing
  chosen_spanish: estoy poniendo
  alternatives_spanish:
  - estoy colocando
  - estoy poniendo ahí
  - estoy situando
  lexicon: HALOT
  rationale: El participio con אָנֹכִי expresa acción inmediata o en curso. ‘Estoy poniendo’ comunica bien la acción concreta de disponer el vellón sin sonar excesivamente literal o técnico.
- source_word: גִּזַּת הַצֶּמֶר
  english_pob_choice: a fleece of wool
  chosen_spanish: un vellón de lana
  alternatives_spanish:
  - un vellón de oveja
  - una piel de lana esquilada
  - un copo de lana
  lexicon: HALOT
  rationale: ‘Vellón’ es el equivalente natural para גִּזָּה en este relato, y ‘de lana’ explicita el complemento del hebreo. ‘Vellón de lana’ mantiene la imagen sin forzar una perífrasis menos clara.
- source_word: בַּגֹּרֶן
  english_pob_choice: on the threshing floor
  chosen_spanish: sobre la era
  alternatives_spanish:
  - en la era
  - sobre la zona de trilla
  - en el piso de trillar
  lexicon: HALOT
  rationale: ‘Era’ es la forma tradicional y comprensible para גֹּרֶן. ‘Sobre’ refleja la colocación del objeto en esa superficie. ‘Era’ es preferible a una paráfrasis más explicativa porque el término ya es transparente en español bíblico.
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Supongamos que
  - En caso de que
  lexicon: HALOT
  rationale: Introduce la condición de manera directa y natural.
- source_word: טַל יִהְיֶה
  english_pob_choice: there is dew
  chosen_spanish: hubiera rocío
  alternatives_spanish:
  - haya rocío
  - hubo rocío
  - caiga rocío
  lexicon: HALOT
  rationale: En español, la prótasis condicional suena más natural con subjuntivo imperfecto. ‘Rocío’ preserva el sustantivo concreto del hebreo sin añadir la idea de ‘caer’ que el texto no explicita.
- source_word: עַל הַגִּזָּה לְבַדָּהּ
  english_pob_choice: on the fleece alone
  chosen_spanish: sobre el vellón solo
  alternatives_spanish:
  - solo sobre el vellón
  - sobre el vellón únicamente
  - sobre el vellón por sí solo
  lexicon: HALOT
  rationale: ‘Solo’ reproduce la exclusividad de לְבַדָּהּ. Se evita ‘únicamente’ por ser más abstracto y menos fluido, y ‘por sí solo’ añade una matiz innecesaria.
- source_word: וְעַל כָּל הָאָרֶץ חֹרֶב
  english_pob_choice: and dryness on all the ground
  chosen_spanish: y sequedad sobre toda la tierra
  alternatives_spanish:
  - y sequedad sobre todo el suelo
  - y sequedad sobre toda la tierra
  - y todo alrededor seco
  lexicon: HALOT
  rationale: חֹרֶב aquí expresa la condición de sequedad. En español, ‘sequedad’ conserva el sustantivo abstracto y permite mantener el contraste con el rocío. ‘Tierra’ sigue la amplitud posible de הָאָרֶץ, aunque en el contexto inmediato también puede referir al terreno circundante.
- source_word: וְיָדַעְתִּי
  english_pob_choice: then I will know
  chosen_spanish: entonces sabré
  alternatives_spanish:
  - y sabré
  - entonces conoceré
  - así sabré
  lexicon: HALOT
  rationale: ‘Entonces’ explicita la relación consecutiva presente en el hebreo. ‘Sabré’ mantiene el verbo de conocimiento sin sobrecargarlo con ‘conoceré’.
- source_word: כִּי תוֹשִׁיעַ
  english_pob_choice: that you will save
  chosen_spanish: que salvarás
  alternatives_spanish:
  - que librarás
  - que rescatarás
  - que vas a salvar
  lexicon: HALOT
  rationale: El verbo causativo se traduce con el núcleo semántico ‘salvar’, coherente con el uso bíblico. ‘Librar’ o ‘rescatar’ son posibles, pero ‘salvar’ conserva mejor la formulación bíblica y la correspondencia con el inglés POB.
- source_word: בְּיָדִי
  english_pob_choice: by my hand
  chosen_spanish: por mi mano
  alternatives_spanish:
  - por medio de mi mano
  - por mi intervención
  - por medio de mí
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de agencia instrumental. ‘Por mi mano’ es idiomático en español bíblico y respeta el giro sin neutralizarlo en una explicación abstracta.
- source_word: כַּאֲשֶׁר דִּבַּרְתָּ
  english_pob_choice: just as you have spoken
  chosen_spanish: como has hablado
  alternatives_spanish:
  - tal como has dicho
  - justo como has hablado
  - como lo has dicho
  lexicon: HALOT
  rationale: ‘Has hablado’ sigue de cerca el verbo hebreo דִּבַּרְתָּ sin introducir el matiz más interpretativo de ‘prometido’. Se evita ‘dicho’ por ser más plano y menos fiel al verbo elegido por el hebreo.
theological_decisions:
- issue: Alcance de הָאָרֶץ en la señal
  english_pob_reading: ground
  chosen_spanish_reading: toda la tierra
  alternative_spanish_readings:
  - todo el suelo
  - la tierra/terreno
  - la tierra en sentido local
  rationale: 'El inglés POB documenta una tensión lexical: el término puede referir al suelo cercano o a la tierra más ampliamente. En español, ‘toda la tierra’ conserva esa amplitud potencial y permite que el contexto limite el alcance a la superficie circundante de la señal, sin cerrar la opción más extensa.'
  doctrine_reference: No aplica; decisión lexical-contextual, no doctrinal.
translation_notes:
  revision_awareness: El audit trail inglés muestra alta concordancia y no registra revisiones aplicadas; por eso esta propuesta sigue de cerca las decisiones ya verificadas, adaptándolas al español con ajustes mínimos de naturalidad sintáctica y con mantenimiento de la ambigüedad lexical de הָאָרֶץ en una nota.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ fuera del versículo porque el hebreo no contiene el nombre divino aquí.
  - ‘Vellón’ se usa de manera consistente para גִּזָּה, evitando alternar con ‘lana’ como sustantivo principal.
  - Se conserva la imagen de agencia ‘por mi mano’ sin convertirla en una paráfrasis teológica.
  - ‘Rocío’ y ‘sequedad’ forman un contraste directo y transparente en español.
  - La nota al pie marca la alternativa de alcance para הָאָרֶץ sin desviar el flujo del versículo.
