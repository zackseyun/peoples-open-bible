revisions:
- from: 'Entonces subió de allí a Betel[a]. Y mientras subía por el camino, unos muchachos pequeños salieron de la ciudad y se burlaron de él, y le dijeron: “¡Sube, calvo! ¡Sube[b], calvo!”'
  to: 'Entonces subió de allí a Betel[a]. Y mientras subía por el camino, unos muchachos salieron de la ciudad y se burlaron de él, y le dijeron: «¡Sube, calvo! ¡Sube[b], calvo!»'
  rationale: Se ajusta «muchachos pequeños» a «muchachos» para lograr un español más natural sin perder la amplitud semántica, ya preservada en la nota a. También se precisa la nota b para reflejar mejor la posible alusión a la ascensión de Elías tal como aparece en la auditoría inglesa.
