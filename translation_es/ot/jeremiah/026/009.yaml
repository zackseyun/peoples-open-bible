base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/026/009.yaml
  text: Why have you prophesied in the name of Yahweh[a], saying, ‘This house will be like Shiloh, and this city will be laid waste[c][b], without inhabitant’?” Then all the people gathered against Jeremiah in the house of Yahweh.
  footnotes:
  - marker: a
    text: Or, 'this house will be like Shiloh.'
    reason: lexical_alternative
  - marker: b
    text: Shiloh was the earlier sanctuary site whose destruction became a warning example of judgment.
    reason: cultural_note
  - marker: c
    text: Or, 'all the people gathered to Jeremiah.' The Hebrew preposition can be read more neutrally, but the context suggests hostility.
    reason: alternative_reading
