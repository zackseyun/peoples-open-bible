review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: botín/despojo reunido, comparación con langostas, y segunda imagen de irrupción sobre el botín. Sin embargo, debilita dos decisiones auditadas: (1) אֹסֶף se explicitó en el POB como sustantivo cognado (''the gathering'') para preservar la intensificación, mientras que «como se reúne» la diluye; (2) כְּמַשַּׁק ... שׁוֹקֵק fue auditado como imagen de embestida/rush, y «ir y venir» cambia el movimiento de irrupción por uno pendular.'
  spanish_quality_summary: El español es legible, pero «será reunido tu despojo» suena algo rígido; «será recogido» o «se recogerá» sería más natural. Además, «la langosta» en singular genérico es posible, pero aquí «las langostas» suena más claro y encaja mejor con «enjambres». La frase puede mantenerse digna y moderna con una pequeña reparación.
  glossary_alignment: No hay términos teológicos sensibles aquí. «Despojo» es aceptable para שׁלל, aunque «botín» también sería natural. «Langostas» refleja bien חָסִיל según la decisión inglesa, con nota que preserve «langosta devoradora». «Enjambres» alinea bien con גֵּבִים. La principal corrección léxica necesaria es devolver el sustantivo de intensificación y la idea de acometida/rushing.
  issues:
  - severity: medium
    issue: Se pierde la intensificación del sustantivo cognado אֹסֶף
    rationale: El hebreo dice literalmente algo como «será reunido ... reunión de langostas». El POB inglés preservó esto con «like the gathering of locusts». «Como se reúne la langosta» lo parafrasea y atenúa el efecto.
  - severity: medium
    issue: «Como el ir y venir de enjambres» no refleja bien כְּמַשַּׁק
    rationale: La auditoría inglesa documenta una imagen de rushing/onrush/attack. «Ir y venir» introduce un matiz distinto, de movimiento de un lado a otro, no de acometida súbita.
  - severity: low
    issue: «La langosta» es menos clara que «las langostas» en este contexto
    rationale: Aunque el singular genérico es defendible, el inglés auditado eligió plural para claridad moderna, y en español la imagen comparativa con «enjambres» fluye mejor en plural.
  revised_spanish_text: Y será recogido tu despojo como la recolección de las langostas[a]; como la acometida de enjambres[b], ellos se abalanzan sobre él.
  revised_footnotes:
  - marker: a
    text: 'O: «como la recolección de la langosta devoradora»; el hebreo חָסִיל puede denotar una clase o etapa particular de langosta.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo de la segunda comparación es difícil. También puede entenderse: «como un ataque de langostas» o «como langostas que se apresuran».'
    reason: alternative_reading
  revision_rationale: 'Se revisa para reflejar mejor las decisiones léxicas auditadas: «recogido» suena más natural en español para el botín; «la recolección» preserva la intensificación del sustantivo cognado אֹסֶף; «las langostas» da mayor claridad; y «la acometida de enjambres» recupera la idea de rushing/onrush de כְּמַשַּׁק sin sobreinterpretar el hebreo difícil.'
