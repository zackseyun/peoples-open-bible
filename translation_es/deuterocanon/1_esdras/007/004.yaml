translation:
  language: es
  text: Y completaron estas cosas por el decreto de Yahvé, el Dios de Israel, y con la aprobación[a] de Ciro y Darío y Artajerjes[b], reyes de los persas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con el consentimiento' o 'de acuerdo con la decisión' de Ciro y Darío y Artajerjes.
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente 'rey de los persas'. La revisión de la POB lo entiende colectivamente como 'reyes de los persas' para abarcar a los tres soberanos nombrados.
    reason: alternative_reading
lexical_decisions:
- source_word: συνετέλεσαν
  english_pob_choice: completed
  chosen_spanish: llevaron esto a cabo
  alternatives_spanish:
  - completaron
  - terminaron
  - llevaron a cumplimiento
  lexicon: BDAG
  rationale: El verbo griego expresa consumar o llevar algo a su fin. En español, 'llevaron esto a cabo' comunica bien la realización efectiva de la obra sin sonar demasiado literal o pesado.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: esto
  alternatives_spanish:
  - estas cosas
  - estas obras
  - lo anterior
  lexicon: BDAG
  rationale: El demostrativo plural se refiere a lo ya narrado; en español, 'esto' evita una redundancia poco natural y mantiene la referencia amplia.
- source_word: διὰ προτάγματος
  english_pob_choice: by the decree
  chosen_spanish: por el decreto
  alternatives_spanish:
  - por orden
  - por mandato
  - mediante el decreto
  lexicon: BDAG
  rationale: πρόταγμα designa una orden o decreto oficial. 'Por el decreto' conserva el valor instrumental y el carácter formal del término.
- source_word: τοῦ κυρίου θεοῦ Ἰσραήλ
  english_pob_choice: of the Lord, the God of Israel
  chosen_spanish: del Señor, el Dios de Israel
  alternatives_spanish:
  - del Señor Dios de Israel
  - de Yahvé, el Dios de Israel
  lexicon: BDAG
  rationale: Se mantiene 'Señor' para κύριος según el uso doctrinal del proyecto, y se conserva la aposición 'el Dios de Israel' explícita y clara.
- source_word: μετὰ τῆς γνώμης
  english_pob_choice: with the approval
  chosen_spanish: con la aprobación
  alternatives_spanish:
  - con el consentimiento
  - de acuerdo con la decisión
  - con la resolución
  lexicon: BDAG
  rationale: γνώμη puede significar opinión, decisión, intención o aprobación. En este contexto administrativo real, 'aprobación' es la opción más natural y precisa.
- source_word: Κύρου καὶ Δαρείου καὶ Ἀρταξέρξου
  english_pob_choice: Cyrus and Darius and Artaxerxes
  chosen_spanish: Ciro y Darío y Artajerjes
  alternatives_spanish:
  - Ciro, Darío y Artajerjes
  lexicon: Transliteration standard
  rationale: Se usan formas hispanas corrientes de los nombres propios, preservando la secuencia del griego.
- source_word: βασιλέως Περσῶν
  english_pob_choice: kings of the Persians
  chosen_spanish: reyes de los persas
  alternatives_spanish:
  - rey de los persas
  - rey persa
  - reyes persas
  lexicon: BDAG
  rationale: La revisión inglesa entendió el título como plural en referencia a los tres soberanos nombrados. En español, 'reyes de los persas' mantiene esa lectura colectiva y la conexión con el genitivo plural griego.
theological_decisions:
- issue: 'Doble agencia: decreto divino y autorización imperial'
  english_pob_reading: The verse presents the completion as occurring both by the Lord's decree and with the approval of Persian rulers.
  chosen_spanish_reading: La obra se presenta como realizada tanto por el decreto del Señor como con la aprobación de los reyes persas.
  alternative_spanish_readings:
  - La aprobación persa queda subordinada al solo decreto divino.
  - El decreto del Señor se expresa mediante la aprobación de los reyes persas.
  rationale: La coordinación griega mantiene dos afirmaciones a la vez; la traducción conserva ambas sin fusionarlas ni jerarquizarlas más de lo que el texto dice.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Título singular/plural en 'βασιλέως Περσῶν'
  english_pob_reading: '''king of the Persians'' formally follows Artaxerxes, though the sense may encompass all three named rulers as Persian kings.'
  chosen_spanish_reading: '''reyes de los persas'' se entiende de forma colectiva para los tres nombrados.'
  alternative_spanish_readings:
  - '''rey de los persas'' aplicado formalmente solo a Artajerjes.'
  - '''rey persa'' como título singular con valor distributivo implícito.'
  rationale: La revisión auditada de la POB corrigió la concordancia al plural para reflejar mejor el sentido colectivo del griego y evitar restringir indebidamente el título a Artajerjes.
  doctrine_reference: 'DOCTRINE.md: Preserve documented tensions and revisions'
translation_notes:
  revision_awareness: La auditoría inglesa muestra una revisión reciente de 'king of the Persians' a 'kings of the Persians' para ajustar la concordancia con los tres nombres propios. La versión española sigue esa decisión revisada y mantiene 'aprobación' para γνώμη como el equivalente administrativo más natural.
  spanish_consistency_notes:
  - Se conserva 'Señor' para κύριος en coherencia con la terminología del proyecto.
  - Se usa 'aprobación' para γνώμη por su tono administrativo y por ajustar el sentido contextual.
  - Se traduce el título final en plural ('reyes de los persas') para reflejar la revisión auditada y el sentido colectivo.
  - No se introduce 'Mesías', 'Yahvé' ni otra terminología no presente en el texto base.
