revisions:
- from: 'Pregunta y averigua quién soy yo y quiénes son los demás que nos ayudan; y dicen[a]: «No tienen lugar donde afirmarse delante de nosotros, porque dos veces tus padres fueron derrotados en su propia tierra».'
  to: 'Pregunta y averigua quién soy yo y quiénes son los demás que nos ayudan; y dicen[a]: «No tienen dónde mantenerse en pie delante de nosotros, porque dos veces tus padres fueron derrotados en su propia tierra».'
  rationale: Se ajusta la cláusula idiomática central para conservar mejor la imagen griega de no poder mantenerse en pie frente al enemigo. También se mejora la nota al pie para explicar el literal de forma más clara y útil en español.
