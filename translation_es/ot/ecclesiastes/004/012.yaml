    rationale: יִתְקְפוֹ describe que alguien domina o sobrepasa a uno; la formulación actual parece decir que «un uno» prevalece contra «otro uno», lo cual suena antinatural y borra la explicitación idiomática ya documentada en el English POB.
  - severity: medium
