theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of גאל in an exile/restoration context
  chosen_reading: redeem
  alternative_readings:
  - rescue
  - ransom
  - reclaim
  rationale: The verse distinguishes נצל ('be rescued') from גאל, so using 'redeem' for גאל preserves the covenantal-restorative nuance rather than collapsing both verbs into the same English idea.
