translation:
  language: es
  text: y la tierra de los gebalitas, y todo el Líbano hacia el oriente, desde Baal-gad, debajo del monte Hermón, hasta Lebo-hamat[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta la entrada de Hamat». El hebreo puede leerse como una expresión descriptiva de frontera más que como un nombre fijo de lugar.'
    reason: alternative_reading
lexical_decisions:
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el territorio
  lexicon: HALOT
  rationale: «Tierra» conserva el sentido geográfico amplio de una región delimitada y es natural en español bíblico y moderno. Aquí funciona mejor que «territorio» por la cadencia de la enumeración.
- source_word: הַגִּבְלִי
  english_pob_choice: the Gebalites
  chosen_spanish: los gebalitas
  alternatives_spanish:
  - los giblitas
  - el pueblo de Gebal
  lexicon: HALOT
  rationale: Es un gentilicio ligado a Gebal. «Gebalitas» mantiene la conexión con el topónimo y sigue la decisión inglesa de preservar el nombre del pueblo.
- source_word: כָל הַלְּבָנוֹן
  english_pob_choice: all Lebanon
  chosen_spanish: todo el Líbano
  alternatives_spanish:
  - el Líbano entero
  lexicon: HALOT
  rationale: «Todo» expresa bien la totalidad de כָל, y «el Líbano» es el nombre geográfico natural en español. La forma conserva la amplitud regional sin sobreexplicar.
- source_word: מִזְרַח הַשֶּׁמֶשׁ
  english_pob_choice: toward the sunrise
  chosen_spanish: hacia el nacimiento del sol
  alternatives_spanish:
  - hacia el oriente
  - hacia el este
  lexicon: HALOT
  rationale: Sigo la revisión inglesa más literal y formal, «toward the sunrise», con una expresión española equivalente y digna. Mantiene la imagen del amanecer sin reducirla a una orientación cartográfica plana.
- source_word: מִבַּעַל גָּד
  english_pob_choice: from Baal-gad
  chosen_spanish: desde Baal-gad
  alternatives_spanish:
  - a partir de Baal-gad
  lexicon: HALOT
  rationale: Topónimo transliterado. «Desde» conserva el valor de punto de partida de la frontera.
- source_word: תַּחַת הַר חֶרְמוֹן
  english_pob_choice: below Mount Hermon
  chosen_spanish: debajo del monte Hermón
  alternatives_spanish:
  - al pie del monte Hermón
  - bajo el monte Hermón
  lexicon: HALOT
  rationale: La referencia es geográfica y direccional; «debajo» transmite el nivel más bajo relativo al monte sin fijar una topografía específica más allá de la que permite el hebreo.
- source_word: עַד לְבוֹא חֲמָת
  english_pob_choice: to Lebo-hamath
  chosen_spanish: hasta Lebo-hamat
  alternatives_spanish:
  - hasta la entrada de Hamat
  lexicon: HALOT
  rationale: Conservo el topónimo en transliteración, como hace la POB inglesa en el texto principal. La forma alternativa descriptiva queda implícita por el contexto y se registra en nota.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail inglés al preferir una formulación más literal y formal para מִזְרַח הַשֶּׁמֶשׁ («hacia el nacimiento del sol») en vez de una orientación más general. También conserva la decisión auditada de mantener Lebo-hamath como topónimo en el texto principal y registrar la lectura descriptiva alternativa en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino según norma del proyecto, pero este versículo no lo contiene.
  - Los topónimos se transliteran de modo consistente con el estilo POB cuando funcionan como nombres propios de frontera.
  - La enumeración final conserva la puntuación en serie del hebreo sin añadir explicaciones interpretativas al cuerpo del texto.
  - «Gebalitas» se usa como gentilicio transparente para evitar tanto una paráfrasis («pueblo de Gebal») como una transliteración menos clara («giblitas").
