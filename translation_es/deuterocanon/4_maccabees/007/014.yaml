translation:
  language: es
  text: por el espíritu de la razón, y por una razón semejante a la de Isaac anuló la rueda[a] de muchas cabezas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la rueda de tortura de muchas cabezas»; στρέβλα designa un instrumento de tortura, y «rueda» conserva la imagen concreta mientras el sentido más amplio puede implicarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: πνεύματι
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - mente
  - fuerza
  lexicon: BDAG
  rationale: En este contexto, πνεῦμα no se refiere al Espíritu Santo, sino a una disposición o impulso interior que anima la razón. «Espíritu» conserva la metáfora y la fuerza dinámica del griego sin convertirla en una explicación abstracta.
- source_word: λογισμοῦ / λογισμῷ
  english_pob_choice: reason / reasoning
  chosen_spanish: razonamiento
  alternatives_spanish:
  - razón
  - pensamiento
  - racionalidad
  lexicon: BDAG
  rationale: El juego repetido de λογισμός se conserva con una sola familia léxica en español para mantener la cohesión. «Razonamiento» expresa el proceso racional y suena natural en español, aunque en la segunda ocurrencia también podría decirse «razón».
- source_word: Ἰσακείῳ
  english_pob_choice: Isaac-like
  chosen_spanish: isaaco
  alternatives_spanish:
  - de Isaac
  - a la manera de Isaac
  - isáquico
  lexicon: LSJ
  rationale: El adjetivo indica semejanza con Isaac más que posesión. «Isaaco» intenta reflejar esa relación adjetival de modo breve y publicar en español un equivalente que preserve el carácter alusivo del griego.
- source_word: πολυκέφαλον
  english_pob_choice: many-headed
  chosen_spanish: de muchas cabezas
  alternatives_spanish:
  - multi-cabeza
  - multicéfala
  lexicon: LSJ
  rationale: La imagen compuesta debe mantenerse visible en español. «De muchas cabezas» es clara, idiomática y conserva la extrañeza figurativa del original.
- source_word: στρέβλαν
  english_pob_choice: wheel
  chosen_spanish: rueda
  alternatives_spanish:
  - rueda de tormento
  - instrumento de tortura
  - potro
  lexicon: LSJ
  rationale: Aunque στρέβλα puede aludir a un instrumento de tortura, el audit trail en inglés preserva «wheel» para retener la imagen concreta. «Rueda» reproduce esa concreción sin ampliar indebidamente el término.
- source_word: ἠκύρωσεν
  english_pob_choice: nullified
  chosen_spanish: anuló
  alternatives_spanish:
  - dejó sin efecto
  - invalidó
  - volvió ineficaz
  lexicon: BDAG
  rationale: El verbo expresa invalidar o hacer ineficaz. «Anuló» comunica con precisión que el suplicio quedó sin efecto en su finalidad.
theological_decisions:
- issue: Sentido de πνεύματι τοῦ λογισμοῦ
  english_pob_reading: an inner animating force of rational resolve, not the Holy Spirit
  chosen_spanish_reading: una fuerza interior de resolución racional, no una referencia al Espíritu Santo
  alternative_spanish_readings:
  - mente racional
  - poder de la razón
  rationale: El contexto exalta la razón que domina el sufrimiento y las pasiones. Por eso se evita capitalizar o teologizar «espíritu», manteniendo el sentido antropológico e interior que exige el pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Fuerza del allusion a Isaac
  english_pob_reading: a simile/allusive comparison ('Isaac-like reason')
  chosen_spanish_reading: 'una comparación alusiva: «razonamiento isaaco»'
  alternative_spanish_readings:
  - razonamiento como el de Isaac
  - razón a la manera de Isaac
  rationale: La forma adjetival griega indica semejanza, no posesión. Se conserva la alusión a Isaac sin convertirla en una paráfrasis interpretativa más amplia.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó «Isaac-like reasoning» a «Isaac-like reason» para mantener la correspondencia con λογισμός/λογισμῷ. En español se optó por una familia léxica coherente con esa decisión, aunque la primera ocurrencia se expresa como «razonamiento» para que la frase sea natural y la segunda como «razonamiento isaaco» para conservar la alusión.
  spanish_consistency_notes:
  - 'Se mantiene una sola imagen concreta para στρέβλα: «rueda».'
  - No se introduce mayúscula en «espíritu» porque no se trata del Espíritu Santo.
  - Se conserva el paralelismo semántico entre λογισμοῦ y λογισμῷ mediante la misma raíz española.
  - «Isaaco» se usa como adjetivo alusivo y no como nombre propio.
