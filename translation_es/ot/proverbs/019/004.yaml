    rationale: 'El nifal יִפָּרֵד puede ser intransitivo/pasivo: ‘es separado’, ‘queda separado’, incluso con matiz de abandono. En español, «se separa» sugiere más naturalmente que él toma la iniciativa, debilitando la ambigüedad fuente.'
  - severity: medium
