translation:
  language: es
  text: Tú visitas la tierra y la riegas[a]; la enriqueces grandemente. El río de Dios está lleno de agua; preparas el grano de ellos[b], porque así preparas la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la humedeces». La expresión hebrea es poética y también puede sugerir una corriente o cauce divino como fuente de lluvia y fertilidad.
    reason: lexical_alternative
  - marker: b
    text: O «les provees grano» o «estableces su grano». El verbo hebreo puede significar «preparar», «proveer» o «establecer».
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּקַדְתָּ
  english_pob_choice: visit
  chosen_spanish: visitas
  alternatives_spanish:
  - atiendes a
  - cuidad
  lexicon: HALOT
  rationale: En este contexto de fertilidad, פקד conserva la idea de intervención atenta y benéfica. «Visitas» mantiene el giro concreto sin volverlo una paráfrasis abstracta; en español bíblico también puede sugerir acción divina eficaz sobre la tierra.
- source_word: וַתְּשֹׁקְקֶהָ
  english_pob_choice: and water it
  chosen_spanish: y la riegas
  alternatives_spanish:
  - y la humedeces
  - y la empapas
  lexicon: HALOT
  rationale: El hebreo expresa el suministro de agua o humedad a la tierra. «Regar» es la forma natural y fiel en español para esa acción agrícola, sin perder la imagen de fertilidad dada por Dios.
- source_word: רַבַּת תַּעְשְׁרֶנָּה
  english_pob_choice: you greatly enrich it
  chosen_spanish: la enriqueces grandemente
  alternatives_spanish:
  - la enriqueces abundantemente
  - la haces muy rica
  lexicon: HALOT
  rationale: La forma intensiva comunica que Dios no solo enriquece, sino que lo hace en gran medida. «Grandemente» conserva el intensificador sin sonar mecánico.
- source_word: פֶּלֶג אֱלֹהִים
  english_pob_choice: the river of God
  chosen_spanish: el río de Dios
  alternatives_spanish:
  - el arroyo de Dios
  - el canal de Dios
  lexicon: HALOT
  rationale: פֶּלֶג puede ser arroyo, canal o río. «Río de Dios» preserva el giro poético elevado adoptado por la POB en inglés y es claro en español; mantiene la imagen de abundancia sin reducirla a una explicación.
- source_word: מָלֵא מָיִם
  english_pob_choice: is full of water
  chosen_spanish: está lleno de agua
  alternatives_spanish:
  - está colmado de agua
  lexicon: HALOT
  rationale: Es una cláusula descriptiva directa. «Está lleno de agua» es idiomático y conserva la imagen de plenitud hídrica.
- source_word: תָּכִין דְּגָנָם
  english_pob_choice: you prepare their grain
  chosen_spanish: preparas su grano
  alternatives_spanish:
  - preparas su cereal
  - dispones su grano
  lexicon: HALOT
  rationale: כּוּן en hifil puede significar preparar, poner en orden o establecer. «Preparas» sigue la decisión auditada de la POB y funciona bien en el marco agrícola. Para el sufijo plural, «su» preserva el referente plural implícito sin forzar una especificación innecesaria en español.
- source_word: כִּי כֵן תְּכִינֶהָ
  english_pob_choice: for so you prepare the earth
  chosen_spanish: porque así preparas la tierra
  alternatives_spanish:
  - pues de ese modo preparas la tierra
  - porque de esta manera dispones la tierra
  lexicon: HALOT
  rationale: El verbo final retoma la misma raíz y conviene mantener el enlace léxico con «preparas». «Así» reproduce bien el valor de כֵּן y hace explícita la relación con la tierra femenina singular.
theological_decisions:
- issue: Referente del sufijo plural en «su grano»
  english_pob_reading: The suffix refers to the people who benefit from the earth's produce, rendered literally as 'their grain.'
  chosen_spanish_reading: Se conserva la referencia plural implícita con «su» sin explicitarla como «de ellos» en el cuerpo del texto.
  alternative_spanish_readings:
  - preparas el grano de ellos
  - preparas el grano de la gente
  rationale: El hebreo distingue entre el sufijo plural de דְּגָנָם y el singular femenino de la tierra. En español, «su» permite mantener la referencia plural sin perder fluidez ni imponer una identificación demasiado estrecha que el verso no desarrolla explícitamente.
  doctrine_reference: Translation philosophy §1 (primacía del original) y §5 (consistencia y excepciones documentadas)
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el historial más reciente; el borrador sigue de cerca el texto hebreo y la solución auditada en inglés, manteniendo las decisiones léxicas y la imagen poética sin cambios sustanciales.
  spanish_consistency_notes:
  - Se usa «Dios» de forma consistente para אֱלֹהִים, sin sustituirlo por fórmulas de máscara.
  - Se conserva la repetición de la raíz de «preparar» para reflejar el paralelismo del hebreo.
  - El tono es bíblico y contemporáneo, con vocabulario natural en español latinoamericano.
  - La nota del río de Dios se deja como alternativa léxica, no como lectura teológica obligatoria.
