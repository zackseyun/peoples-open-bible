translation:
  language: es
  text: Porque siempre está en tu poder mostrar gran fuerza[a], ¿quién podrá resistir la fuerza de tu brazo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «siempre está a tu disposición ejercer gran poder».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μεγάλως ἰσχύειν
  english_pob_choice: show great strength
  chosen_spanish: mostrar gran fuerza
  alternatives_spanish:
  - ser muy fuerte
  - ejercer gran poder
  lexicon: LSJ
  rationale: La combinación adverbial e infinitiva expresa la capacidad de desplegar fuerza poderosa. 'Mostrar gran fuerza' conserva la idea de manifestación activa de poder, en un español natural y acorde con el matiz del POB en inglés.
- source_word: πάρεστίν σοι
  english_pob_choice: it is always in your power
  chosen_spanish: está en tu poder
  alternatives_spanish:
  - te está siempre disponible
  - siempre puedes
  lexicon: LSJ
  rationale: El audit trail inglés corrigió hacia la idea de disponibilidad/poder efectivo. 'Está en tu poder' transmite bien la noción de capacidad siempre a disposición, sin perder la fuerza formal del griego.
- source_word: κράτει
  english_pob_choice: the might
  chosen_spanish: el poder
  alternatives_spanish:
  - la fuerza
  - la majestad
  - el dominio
  lexicon: LSJ
  rationale: κράτος apunta a poder eficaz, fuerza manifiesta o dominio. En español, 'poder' es una opción clara y elevada; 'fuerza' quedaría ya sugerida por el primer hemistiquio, y 'majestad' introduciría un matiz no pedido por el texto.
- source_word: βραχίονός σου
  english_pob_choice: of your arm
  chosen_spanish: tu brazo
  alternatives_spanish:
  - tu brazo poderoso
  - tu brazo fuerte
  lexicon: LSJ
  rationale: Se conserva la metáfora bíblica del brazo como imagen de acción eficaz divina. No se abstrae como 'poder' porque el POB inglés decidió retener la imagen antropomórfica.
- source_word: ἀντιστήσεται
  english_pob_choice: will withstand
  chosen_spanish: resistirá
  alternatives_spanish:
  - se opondrá
  - podrá resistir
  lexicon: LSJ
  rationale: '''Resistirá'' comunica la oposición efectiva que el interrogativo retórico niega. ''Resistir'' es más directo y natural que ''aguantará'' o ''se mantendrá en pie''.'
theological_decisions:
- issue: Metáfora antropomórfica del brazo divino
  english_pob_reading: Retain the metaphor literally as 'your arm'
  chosen_spanish_reading: Conservar literalmente 'tu brazo'
  alternative_spanish_readings:
  - tu poder
  - tu fuerza
  rationale: El griego usa una imagen bíblica convencional para la acción poderosa de Dios. Mantenerla en español preserva la textura literaria y evita desactivar la figura en una abstracción.
  doctrine_reference: 'DOCTRINE.md: Preserve source meaning and avoid paraphrase beyond what the text warrants.'
translation_notes:
  revision_awareness: La traducción sigue de cerca el griego de Sabiduría 11:21 y toma en cuenta el ajuste final del audit trail inglés para πάρεστίν σοι como una idea de poder siempre disponible. Se conserva el paralelismo retórico y la imagen del brazo divino, evitando suavizarla en exceso.
  spanish_consistency_notes:
  - Se emplea 'Dios' implícito por el contexto, sin añadir el nombre divino, ya que el versículo habla en segunda persona directa.
  - 'Se conservan ''fuerza'' y ''poder'' con distinción funcional: ''fuerza'' para ἰσχύειν y ''poder'' para πάρεστίν σοι / κράτος.'
  - El tono es solemne y publicable en español latinoamericano, sin calcos innecesarios ni arcaísmos fuertes.
