translation:
  language: es
  text: que hizo avanzar su brazo glorioso a la diestra de Moisés[a], que partió las aguas delante de ellos para hacerse un nombre eterno,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a la derecha de Moisés» o «por la mano derecha de Moisés». La frase hebrea puede describir la posición del brazo de Yahvé respecto de Moisés o el medio por el cual lo guió.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹלִיךְ
  english_pob_choice: who caused his glorious arm to go
  chosen_spanish: que hizo ir
  alternatives_spanish:
  - que condujo
  - que hizo avanzar
  lexicon: HALOT
  rationale: El hebreo es un participio hifil de הלך con sentido causativo. En español, «hizo ir» preserva bien la causalidad sin volver la frase áspera o demasiado explicativa.
- source_word: לִימִין מֹשֶׁה
  english_pob_choice: at the right hand of Moses
  chosen_spanish: a la diestra de Moisés
  alternatives_spanish:
  - a la derecha de Moisés
  - a la mano derecha de Moisés
  - al lado derecho de Moisés
  lexicon: HALOT
  rationale: La imagen espacial se conserva con una expresión idiomática y reverente en español. «Diestra» mantiene el valor locativo y evita una formulación pesada.
- source_word: זְרוֹעַ תִּפְאַרְתּוֹ
  english_pob_choice: his glorious arm
  chosen_spanish: su brazo glorioso
  alternatives_spanish:
  - su brazo de gloria
  - su brazo majestuoso
  - el brazo de su gloria
  lexicon: HALOT
  rationale: Se conserva la metáfora antropomórfica de poder divino. «Brazo glorioso» es natural en español y refleja la construcción hebrea sin diluirla en abstracción.
- source_word: בּוֹקֵעַ מַיִם
  english_pob_choice: who split the waters
  chosen_spanish: que partió las aguas
  alternatives_spanish:
  - que abrió las aguas
  - que dividió las aguas
  - que separó las aguas
  lexicon: HALOT
  rationale: «Partió» reproduce bien el valor vívido de בקע y es una forma clara y bíblica en español, sin perder fuerza narrativa.
- source_word: מִפְּנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - frente a ellos
  - en su presencia
  lexicon: HALOT
  rationale: La frase es idiomática para el contexto del éxodo y conserva la ubicación de la acción sin sobrecargarla con literalidad semítica.
- source_word: לַעֲשׂוֹת לוֹ
  english_pob_choice: to make for himself
  chosen_spanish: para hacerse
  alternatives_spanish:
  - para hacerse a sí mismo
  - para hacer para sí
  - para hacerse un
  lexicon: HALOT
  rationale: El dativo reflexivo de la construcción se expresa en español con naturalidad mediante «hacerse», evitando una explicación innecesaria y manteniendo el sentido de acción en beneficio propio.
- source_word: שֵׁם עוֹלָם
  english_pob_choice: an everlasting name
  chosen_spanish: un nombre eterno
  alternatives_spanish:
  - un nombre perpetuo
  - un nombre para siempre
  - un nombre perdurable
  lexicon: HALOT
  rationale: «Eterno» comunica bien עוֹלָם y conserva la idea de renombre duradero. «Nombre» mantiene el valor semítico de fama/renombre más que una etiqueta meramente nominal.
theological_decisions:
- issue: Sujeto y secuencia de las cláusulas participiales
  english_pob_reading: The verse continues the description of the LORD as the one who acted in the exodus.
  chosen_spanish_reading: 'El verso continúa describiendo a Yahvé como el que actuó en el éxodo: hizo ir su brazo glorioso a la diestra de Moisés y partió las aguas delante de ellos.'
  alternative_spanish_readings:
  - Moisés fue guiado por el brazo glorioso de Yahvé
  - su brazo glorioso fue puesto a la diestra de Moisés
  rationale: El contexto de Isaías 63:11–14 remite al éxodo y favorece entender a Yahvé como sujeto implícito. La traducción mantiene esa continuidad narrativa y no desplaza el agente principal.
  doctrine_reference: Translation philosophy §1, §3
- issue: Lenguaje antropomórfico aplicado a Dios
  english_pob_reading: Retain 'his glorious arm' as metaphorical language for divine power.
  chosen_spanish_reading: Conservar «su brazo glorioso» como metáfora del poder divino.
  alternative_spanish_readings:
  - su poder glorioso
  - su fuerza gloriosa
  rationale: El hebreo usa imagen corporal explícita; el español debe preservarla salvo necesidad de claridad. Aquí la metáfora es comprensible y teológicamente relevante, así que no se aplana.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido de לַעֲשׂוֹת לוֹ שֵׁם עוֹלָם
  english_pob_reading: to make for himself an everlasting name
  chosen_spanish_reading: para hacerse un nombre eterno
  alternative_spanish_readings:
  - para hacerse un nombre perpetuo
  - para ganar un nombre eterno
  rationale: La formulación mantiene la idea bíblica de renombre duradero y la referencia reflexiva a la acción de Dios por su propio nombre. «Nombre eterno» evita precisar más de lo que el hebreo dice.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa, que ajustó la primera cláusula de «led his glorious arm» a «caused his glorious arm to go» para mayor precisión léxica. En español, «hizo ir su brazo glorioso» refleja esa misma causalidad sin perder fluidez. También se preservó la secuencia exódica: brazo glorioso, aguas partidas y nombre eterno.'
  spanish_consistency_notes:
  - Se usa «Yahvé» según la política del proyecto, aunque en este versículo el hebreo sólo aparece implícito por el contexto inmediato.
  - Se conserva «brazo» como metáfora antropomórfica y no se sustituye por «poder» para no aplanar el texto.
  - «Diestra» traduce la relación espacial con valor idiomático y queda alineado con el matiz locativo documentado en la nota inglesa.
  - «Nombre eterno» mantiene el sustantivo «nombre» como equivalente de שֵׁם en sentido de renombre/fama, no de simple etiqueta.
