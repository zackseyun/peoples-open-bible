translation:
  language: es
  text: ¡Canten a Yahvé un cántico nuevo; canten a Yahvé[a], toda la tierra!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH» (el nombre divino); tradicionalmente se vierte «el SEÑOR»; alternativamente, «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁירוּ
  english_pob_choice: Sing
  chosen_spanish: ¡Canten!
  alternatives_spanish:
  - Canten
  - Cántenle
  lexicon: HALOT
  rationale: El imperativo plural de שׁיר pide una exhortación directa a cantar. «Canten» conserva el tono exhortativo y es natural en español bíblico contemporáneo. No se añadió un objeto explícito porque el hebreo no lo da.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  - al Señor
  lexicon: HALOT
  rationale: La preposición ל marca dirección/objeto del canto. Se conserva el nombre divino como «Yahvé» conforme al criterio del proyecto para יְהוָה, en vez de ocultarlo con «Señor».
- source_word: שִׁיר
  english_pob_choice: song
  chosen_spanish: cántico
  alternatives_spanish:
  - canción
  - canto
  lexicon: HALOT
  rationale: En este contexto cultual y poético, «cántico» comunica mejor el valor de שִׁיר que el más general «canción», y mantiene un registro digno. Se evita forzar una expresión más interpretativa que el hebreo.
- source_word: חָדָשׁ
  english_pob_choice: new
  chosen_spanish: nuevo
  alternatives_spanish:
  - nuevo
  - fresco
  lexicon: HALOT
  rationale: Se mantiene el sentido estándar de «nuevo», que en español es la correspondencia más directa y natural para חָדָשׁ en esta colocación estable.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra
  - toda la tierra habitable
  - toda la tierra
  lexicon: HALOT
  rationale: «Toda la tierra» reproduce la amplitud universal de כָּל הָאָרֶץ en un español idiomático. «Tierra» aquí conserva el alcance cósmico y poético mejor que «país» o «territorio».
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el proyecto establece «Yahvé» como forma principal en español. Se evita el reemplazo litúrgico por «el Señor» porque borraría una distinción textual explícita.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance universal de כָּל הָאָרֶץ
  english_pob_reading: all the earth
  chosen_spanish_reading: toda la tierra
  alternative_spanish_readings:
  - toda la tierra
  - toda la tierra entera
  rationale: La expresión se entiende como convocatoria universal al culto, no como referencia local restringida. «Toda la tierra» preserva esa amplitud sin añadir explicación ausente del hebreo.
  doctrine_reference: Contexto poético universal de los Salmos
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado sin cambios en el último pase; no hubo enmiendas aplicadas. La versión española sigue de cerca las decisiones léxicas y teológicas auditadas, manteniendo el paralelismo del hebreo y la lectura de Yahvé como nombre divino.
  spanish_consistency_notes:
  - Se mantiene el imperativo plural en ambas cláusulas para reflejar שִׁירוּ... שִׁירוּ.
  - «Yahvé» se usa de forma consistente para יְהוָה.
  - «Toda la tierra» conserva el paralelismo universal del segundo hemistiquio.
  - «Cántico nuevo» evita una paráfrasis excesiva y conserva el registro poético.
