translation:
  language: es
  text: 'Y sus profetas han recubierto para ellos con cal[a], viendo falsedad y adivinando mentira para ellos, diciendo: «Así dice el Señor Yahvé[b]», cuando Yahvé no ha hablado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con mortero sin mezclar» o «con revoque endeble». La imagen hebrea describe un recubrimiento engañoso que oculta defectos.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el Señor Yahvé» (אֲדֹנָי יְהוִה). La fórmula mantiene el nombre divino explícito; en otras tradiciones se vierte «el Señor Dios» o se oculta el nombre tras «SEÑOR».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְבִיאֶיהָ
  english_pob_choice: And her prophets
  chosen_spanish: Y sus profetas
  alternatives_spanish:
  - Y los profetas de ella
  lexicon: HALOT
  rationale: El sufijo femenino singular se refiere a la ciudad; en español, «sus profetas» es natural y conserva la relación posesiva sin añadir interpretación.
- source_word: טָחוּ
  english_pob_choice: have plastered
  chosen_spanish: han recubierto
  alternatives_spanish:
  - han enlucido
  - han revestido
  lexicon: HALOT
  rationale: El verbo describe una acción de cubrir una superficie con un material aplicado. «Han recubierto» conserva la imagen de cobertura engañosa sin sonar demasiado técnico o regional.
- source_word: לָהֶם
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a favor de ellos
  - para su beneficio
  lexicon: HALOT
  rationale: La preposición expresa dirección/beneficio respecto de los destinatarios de la falsa cobertura; «para ellos» sigue de cerca el valor relacional del hebreo.
- source_word: תָּפֵל
  english_pob_choice: with whitewash
  chosen_spanish: con yeso
  alternatives_spanish:
  - con mortero sin mezclar
  - con revoque endeble
  - con encalado
  lexicon: HALOT
  rationale: El POB inglés opta por una imagen de recubrimiento superficial y engañoso. En español, «yeso» comunica un material de recubrimiento claro y mantiene la metáfora, aunque admite alternativas más interpretativas en nota.
- source_word: חֹזִים שָׁוְא
  english_pob_choice: seeing falsehood
  chosen_spanish: viendo falsedad
  alternatives_spanish:
  - viendo vanidad
  - viendo lo falso
  lexicon: HALOT
  rationale: «Falsedad» transmite el carácter engañoso y vacío de la visión profética denunciada; conserva la fuerza del participio sin suavizarla.
- source_word: וְקֹסְמִים לָהֶם כָּזָב
  english_pob_choice: and divining lies for them
  chosen_spanish: y adivinando mentira para ellos
  alternatives_spanish:
  - y practicando adivinación mentirosa para ellos
  - y adivinando falsedad para ellos
  lexicon: HALOT
  rationale: «קֹסְמִים» apunta a adivinación ilícita, no a profecía legítima. «Adivinando mentira» mantiene el paralelismo y la denuncia de actividad engañosa.
- source_word: אֹמְרִים
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  lexicon: HALOT
  rationale: Participio de acompañamiento que introduce la fórmula de cita; «diciendo» es el equivalente directo y natural.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así ha dicho
  alternatives_spanish:
  - Así dice
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética se conserva con un registro solemne y reconocible en español. El perfecto respeta el valor reportativo de la proclamación.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Yahveh
  - el Señor Dios
  lexicon: HALOT
  rationale: La política del proyecto para יְהוָה es «Yahvé». En la combinación אֲדֹנָי יְהוִה, «el Señor Yahvé» evita la convención de ocultar el nombre y mantiene el compuesto divino con claridad.
- source_word: וַיהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo repite explícitamente el nombre divino; por consistencia con el criterio del proyecto, se traduce «Yahvé» sin máscara reverencial.
- source_word: לֹא דִבֵּר
  english_pob_choice: has not spoken
  chosen_spanish: no ha hablado
  alternatives_spanish:
  - no habló
  - no ha dicho
  lexicon: HALOT
  rationale: 'El perfecto hebreo se expresa bien con presente perfecto en español para destacar la vigencia de la negación: Yahvé no ha hablado.'
theological_decisions:
- issue: Traducción del Tetragrámaton en esta cláusula y en la fórmula divina
  english_pob_reading: Yahweh / the Lord GOD
  chosen_spanish_reading: Yahvé / el Señor Yahvé
  alternative_spanish_readings:
  - el SEÑOR / el Señor Dios
  - el Señor Yahveh
  rationale: El texto hebreo usa el nombre divino dos veces, una en la fórmula de mensajero y otra en la clausula final. Mantener «Yahvé» hace auditable el nombre propio y evita la convención de sustitución por mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Sentido metafórico de תָּפֵל en la imagen de la pared
  english_pob_reading: whitewash
  chosen_spanish_reading: yeso
  alternative_spanish_readings:
  - mortero sin mezclar
  - revoque endeble
  - encalado
  rationale: La imagen denuncia un recubrimiento superficial que oculta defectos. «Yeso» es breve, natural en español y conserva el valor de cobertura engañosa; se deja constancia de alternativas más explícitas.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Relación entre profecía falsa y adivinación ilícita
  english_pob_reading: seeing falsehood and divining lies
  chosen_spanish_reading: viendo falsedad y adivinando mentira
  alternative_spanish_readings:
  - viendo lo falso y adivinando falsedad
  - teniendo visiones falsas y profetizando mentiras
  rationale: El hebreo distingue la pretensión de visión profética y la práctica de adivinación. La traducción conserva ambos rasgos para no borrar la tensión entre visión falsa y magia adivinatoria.
  doctrine_reference: HALOT; contexto profético de Ezequiel 22
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión menor: se eliminó ''over'' de ''have plastered over'' para acercarse al hebreo, que simplemente dice que ''plastered for them with whitewash''. La versión española sigue esa precisión con ''han recubierto para ellos con yeso'' sin añadir una partícula equivalente a ''sobre''.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - Se evitó «SEÑOR» como máscara del nombre divino, porque el hebreo aquí lo escribe explícitamente.
  - Se conservó el paralelismo semántico entre la denuncia de falsedad visionaria y la adivinación ilícita.
  - La puntuación con comillas angulares y dos puntos se ajusta al español bíblico moderno sin arcaizar el registro.
