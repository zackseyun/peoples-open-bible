    issue: «Y lo llamó[a]; y él entró» suena poco natural en español.
    rationale: Aunque es formalmente fiel, la repetición de «y» con el pronombre explícito «él» produce una cadencia más rígida de la necesaria. El griego no exige esa explicitación; el español narrativo fluye mejor sin ella.
  - severity: low
    issue: «Se saludaron mutuamente» es redundante.
    rationale: La reciprocidad de ἀλλήλους ya queda suficientemente expresada por el verbo pronominal «se saludaron». «Mutuamente» no es incorrecto, pero añade peso sin necesidad.
