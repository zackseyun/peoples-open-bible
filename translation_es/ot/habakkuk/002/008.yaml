    text: Lit. "por sangres de אדם"; es una expresión genérica que aquí se refiere a sangre humana o derramamiento de sangre humana.
    reason: lexical_alternative
  revision_rationale: Se ajusta 'la sangre de los hombres' a 'sangre humana' para reflejar mejor el hebreo genérico y la revisión auditada del POB inglés. También se cambia el sujeto a plural ('todos los pueblos restantes ... te despojarán') para una concordancia más natural y clara en español, manteniendo la distinción entre 'naciones' y 'pueblos' y la reversión léxica de שלל.
