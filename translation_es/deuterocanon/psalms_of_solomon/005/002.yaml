translation:
  language: es
  text: Porque tú eres bondadoso y misericordioso, el refugio[a] de los pobres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Porque el refugio de los pobres es bondadoso y misericordioso».
    reason: Preserva la alternativa sintáctica documentada en el English POB y el historial de revisión del pasaje.
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la base o explicación del enunciado anterior; en español, «porque» expresa con naturalidad esa relación causal/explanatoria.
- source_word: ἐχρηστὸς
  english_pob_choice: kind
  chosen_spanish: bondadoso
  alternatives_spanish:
  - amable
  - benigno
  - bueno
  lexicon: BDAG
  rationale: El adjetivo χρηστός describe una benevolencia activa y amable. «Bondadoso» conserva el matiz moral y relacional sin sonar forzado en español.
- source_word: ἐλεήμων
  english_pob_choice: merciful
  chosen_spanish: misericordioso
  alternatives_spanish:
  - compasivo
  - lleno de misericordia
  lexicon: BDAG
  rationale: «Misericordioso» es la equivalencia directa y estable para ἐλεήμων, y mantiene el peso teológico de la misericordia hacia los necesitados.
- source_word: καταφυγή
  english_pob_choice: refuge
  chosen_spanish: refugio
  alternatives_spanish:
  - amparo
  - shelter
  lexicon: LSJ
  rationale: El sustantivo conserva la imagen de lugar o medio de resguardo; «refugio» es la forma más transparente y natural en español.
- source_word: τοῦ πτωχοῦ
  english_pob_choice: of the poor
  chosen_spanish: de los pobres
  alternatives_spanish:
  - del pobre
  - de los necesitados
  lexicon: BDAG
  rationale: πτωχός suele designar a los pobres o indigentes; en español, el plural generaliza correctamente el grupo al que se refiere el salmo.
theological_decisions:
- issue: Sujeto explícito implícito en el griego transmitido
  english_pob_reading: For you are kind and merciful, the refuge of the poor.
  chosen_spanish_reading: Porque tú eres bondadoso y misericordioso, el refugio de los pobres.
  alternative_spanish_readings:
  - Porque el refugio de los pobres es bondadoso y misericordioso.
  rationale: La revisión auditada indica que los adjetivos masculinos se refieren a Dios, mientras que καταφυγή es una apposición femenina; por eso el español debe conservar el sujeto implícito/recuperado como «tú» y no hacer de «refugio» el sujeto.
  doctrine_reference: Gramática del texto y concordancia del griego transmitido; no se introduce una lectura doctrinal ajena al pasaje.
translation_notes:
  revision_awareness: 'Se siguió la revisión aplicada que corrige la sintaxis: los adjetivos masculinos califican al sujeto divino, y «el refugio de los pobres» funciona en aposición, no como sujeto. Se evitó reproducir la lectura errónea que hacía de «refugio» el sujeto.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico natural y no arcaizante.
  - Se preservó la imagen de refugio sin reemplazarla por una explicación interpretativa.
  - Se evitó «SEÑOR» o «Cristo» porque el texto griego aquí no lo exige.
