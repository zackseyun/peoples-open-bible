- from: 'Cuando Saúl volvió de perseguir a los filisteos, le avisaron, diciendo: «Mira, David está en el desierto de En-gadi».'
  to: 'Cuando Saúl volvió de perseguir a los filisteos, le dijeron, diciendo: «He aquí, David está en el desierto de En-gedi».'
  rationale: Se ajusta «le avisaron» a «le dijeron» para reflejar mejor וַיַּגִּדוּ לוֹ; se eleva «Mira» a «He aquí» para corresponder al registro del הִנֵּה auditado como «Behold»; y se corrige el topónimo a «En-gedi» conforme a la evidencia fuente y al rastro POB. No hacen falta notas adicionales.
