translation:
  language: es
  text: Y restauraré tus jueces como al principio, y tus consejeros como al comienzo. Después de esto se te llamará ciudad de rectitud[a], ciudad fiel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ciudad de justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָשִׁיבָה
  english_pob_choice: And I will restore
  chosen_spanish: Y haré volver
  alternatives_spanish:
  - Y restauraré
  - Y devolveré
  lexicon: HALOT
  rationale: El hebreo hitpael/hiphil de שוב expresa causar el regreso o restablecer. En español, "haré volver" conserva la idea de retorno causado por Dios y suena natural; "restauraré" también sería posible, pero "haré volver" mantiene más visible la imagen de retorno que está en la raíz.
- source_word: שֹׁפְטַיִךְ
  english_pob_choice: your judges
  chosen_spanish: tus jueces
  alternatives_spanish:
  - tus magistrados
  - tus gobernantes
  lexicon: HALOT
  rationale: שֹׁפֵט designa primariamente a un juez. "Jueces" preserva el valor léxico directo y sigue bien el paralelismo con "consejeros".
- source_word: כְּבָרִאשֹׁנָה
  english_pob_choice: as at the first
  chosen_spanish: como al principio
  alternatives_spanish:
  - como antes
  - como en un comienzo
  lexicon: HALOT
  rationale: La comparación temporal apunta a un estado anterior ideal. "Como al principio" es natural en español y conserva la referencia a una condición primera sin precisar indebidamente cuál.
- source_word: וְיֹעֲצַיִךְ
  english_pob_choice: and your counselors
  chosen_spanish: y a tus consejeros
  alternatives_spanish:
  - y a tus asesores
  - y a tus consejeras/consejeros
  lexicon: HALOT
  rationale: יעץ aquí funciona como sustantivo/participio con sentido de quienes aconsejan. "Consejeros" mantiene el paralelismo con "jueces" y el contexto de liderazgo cívico.
- source_word: כְּבַתְּחִלָּה
  english_pob_choice: as at the beginning
  chosen_spanish: como al comienzo
  alternatives_spanish:
  - como al principio
  - como al inicio
  lexicon: HALOT
  rationale: La frase paralela refuerza la idea de restauración a un estado originario. "Como al comienzo" evita repetir exactamente "principio" y conserva el paralelismo semántico.
- source_word: אַחֲרֵי כֵן
  english_pob_choice: Afterward
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Luego
  - Después
  lexicon: HALOT
  rationale: Marca la secuencia temporal posterior a la restauración de líderes. "Después de esto" es claro y fluido en español.
- source_word: יִקָּרֵא לָךְ
  english_pob_choice: you will be called
  chosen_spanish: se te llamará
  alternatives_spanish:
  - serás llamada
  - te nombrarán
  lexicon: HALOT
  rationale: El nifal de קרא puede expresar nombramiento o ser llamado. En español, "se te llamará" conserva la pasiva impersonal y la personificación de la ciudad sin forzar un sujeto explícito.
- source_word: עִיר הַצֶּדֶק
  english_pob_choice: the city of righteousness
  chosen_spanish: ciudad de justicia
  alternatives_spanish:
  - ciudad de rectitud
  - ciudad de justicia y rectitud
  lexicon: HALOT
  rationale: El POB inglés mantiene una nota alternativa entre righteousness y justice; en español, "justicia" es una opción léxica plenamente válida para צדק en este contexto cívico. Se preserva así la tensión entre justicia judicial y rectitud moral/covenantal, que el contexto también permite.
- source_word: קִרְיָה נֶאֱמָנָה
  english_pob_choice: a faithful city
  chosen_spanish: ciudad fiel
  alternatives_spanish:
  - ciudad leal
  - ciudad confiable
  lexicon: HALOT
  rationale: קִרְיָה es un sinónimo poético de "ciudad", y נֶאֱמָנָה comunica fidelidad/fiabilidad. "Ciudad fiel" suena natural en español y conserva la cualidad moral del término sin añadir matices no presentes en el hebreo.
theological_decisions:
- issue: Rango semántico de צדק en una promesa de restauración cívica
  english_pob_reading: righteousness, with a footnoted alternative 'justice'
  chosen_spanish_reading: justicia, con nota alternativa 'rectitud' o 'justicia' según el matiz
  alternative_spanish_readings:
  - rectitud
  - justicia y rectitud
  rationale: El contexto habla de restauración del gobierno de la ciudad, por lo que צדק puede leerse en clave de justicia pública y también de rectitud moral. En español, "justicia" conserva el campo legal y cívico que el verso sugiere, mientras que la nota permite no perder la posibilidad de una lectura más amplia de rectitud.
  doctrine_reference: 'Contested terms: justice/righteousness principle applied to Hebrew צדק in civic-restoration contexts'
translation_notes:
  revision_awareness: 'El texto inglés POB está marcado como acuerdo alto y sin cambios en la última revisión. Mantengo esa lectura estable: restauración de jueces y consejeros, seguida del nuevo nombre de la ciudad. La única tensión lexical relevante del audit trail es צדק, donde el inglés ofrece ''righteousness'' con nota alternativa ''justice''; en español se opta por ''justicia'' en el texto principal y se preserva la alternativa mediante nota.'
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el hebreo contiene el nombre divino; este verso no lo contiene.
  - Se mantiene "jueces" para שֹׁפְטַיִךְ y "consejeros" para וְיֹעֲצַיִךְ por paralelismo léxico.
  - '"Ciudad fiel" conserva el valor de נֶאֱמָנָה sin suavizarlo a una simple descripción sociológica.'
  - La nota de pie de página marca la alternativa léxica para צדק sin introducir una divergencia doctrinal mayor.
