translation:
  language: es
  text: Y Jacob llamó Betel[a] al lugar donde allí Dios había hablado con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Betel significa “casa de Dios”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - nombró
  - llamó por nombre
  lexicon: HALOT
  rationale: En este contexto, קרא con אֶת שֵׁם (“el nombre de”) expresa el acto de dar nombre. En español, “llamó” conserva el giro idiomático bíblico sin sonar forzado; “llamó por nombre” sería más literal pero menos natural.
- source_word: שֵׁם
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - nombre
  lexicon: HALOT
  rationale: Se mantiene explícito porque el hebreo dice “llamó el nombre del lugar”. En español, el artículo definido preserva el valor idiomático del hebreo.
- source_word: הַמָּקוֹם
  english_pob_choice: the place
  chosen_spanish: del lugar
  alternatives_spanish:
  - del sitio
  lexicon: HALOT
  rationale: “Lugar” es la equivalencia directa y formal para המקום. “Sitio” sería posible, pero menos neutral en un registro bíblico.
- source_word: אֲשֶׁר דִּבֶּר אִתּוֹ שָׁם אֱלֹהִים
  english_pob_choice: where God had spoken with him there
  chosen_spanish: donde Dios había hablado con él allí
  alternatives_spanish:
  - donde Dios había hablado con él
  - donde Dios le había hablado allí
  lexicon: HALOT
  rationale: Se conserva la relativa con “donde” y el tiempo pluscuamperfecto para reflejar la anterioridad del habla divina respecto del nombramiento. “Con él” sigue de cerca אִתּוֹ; “allí” reproduce שָׁם, que el texto hebreo incluye expresamente.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים lleva sentido singular y se refiere al Dios de Jacob. “Dios” es la forma correcta y evita una lectura plural inapropiada.
- source_word: בֵּית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Bet-el
  - Casa de Dios
  lexicon: HALOT
  rationale: Se translitera el topónimo según el uso español estándar “Betel”. No se traduce como “Casa de Dios” en el texto principal porque el nombre propio ya funciona como designación del lugar.
theological_decisions:
- issue: Mantener שָׁם (‘allí’) en una construcción aparentemente redundante
  english_pob_reading: where God had spoken with him there
  chosen_spanish_reading: donde Dios había hablado con él allí
  alternative_spanish_readings:
  - donde Dios había hablado con él
  rationale: El hebreo conserva el pleonasmo relativo + adverbio de lugar. Aunque en inglés se simplificó en una revisión por fluidez, la versión final del auditable trail reintroduce ‘there’; en español conviene mantener ‘allí’ para dar cuenta completa del texto fuente.
  doctrine_reference: Precisión de correspondencia textual / equivalencia formal del hebreo
- issue: Nombre propio Bethel y su sentido etimológico
  english_pob_reading: Bethel means 'house of God.'
  chosen_spanish_reading: Betel[a]
  alternative_spanish_readings:
  - Casa de Dios
  rationale: El texto del versículo nombra el lugar como Betel; el significado etimológico no pertenece al cuerpo del versículo, pero se conserva como nota para no perder la tensión entre nombre propio y glosa semántica.
  doctrine_reference: Topónimos bíblicos / nota lexical
- issue: אֱלֹהִים en singular
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - dioses
  rationale: El contexto narrativo exige referencia singular al Dios que habló con Jacob. Traducirlo pluralizaría indebidamente el referente y alteraría el sentido del pasaje.
  doctrine_reference: Gramática hebrea / referencia monoteísta
translation_notes:
  revision_awareness: 'Tomé como base el texto hebreo (WLC) y verifiqué el audit trail inglés: la versión final restauró ‘there’ para reflejar שָׁם, aunque una revisión intermedia lo había omitido por fluidez. Por eso la redacción española conserva ‘allí’. También mantuve el nombre propio Betel en el cuerpo del texto y trasladé su sentido etimológico a nota, siguiendo la práctica auditada del POB.'
  spanish_consistency_notes:
  - Se usa “Y Jacob” para reproducir el inicio narrativo con וַ־ sin sobrecargar la sintaxis española.
  - “Hablado con él allí” conserva tanto אִתּוֹ como שָׁם, evitando perder el matiz espacial del hebreo.
  - Se eligió “Betel” en vez de “Bet-el” para alinearse con la forma española habitual y legible.
  - No se introdujo “SEÑOR” ni otra sustitución reverencial, porque el texto usa אֱלֹהִים y el referente es singular, “Dios”.
