    changes_summary: 'Changed ''slave'' to ''servant'' for better lexical/register fit with הָעֶבֶד; changed ''it greatly displeased them'' to ''it was very displeasing to them'' to reflect the Hebrew construction more closely; changed ''the good'' to ''the welfare'' for more natural rendering of טוֹבָה in context. [Regression fix applied: slave restored (revision_pass had changed δοῦλος → servant against DOCTRINE.md policy)]'
translation:
  language: es
  text: Cuando Sambalat el horonita y Tobías el esclavo amonita oyeron esto, les desagradó mucho[a] que un hombre hubiera venido a buscar el bien[b] de los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fue para ellos un gran mal'; el hebreo repite la raíz רע ('malo/mal') para dar énfasis.
    reason: lexical_alternative
  - marker: b
    text: O 'el bienestar' de los hijos de Israel. El hebreo טוֹבָה puede traducirse como 'bien', 'beneficio' o 'bienestar'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard this
  chosen_spanish: oyeron esto
  alternatives_spanish:
  - oyeron
  lexicon: HALOT
  rationale: En español conviene explicitar el objeto implícito, como hace la POB inglesa con 'this'. Mantiene la referencia al informe previo sin añadir contenido ajeno al hebreo.
- source_word: הַחֹרֹנִי
  english_pob_choice: the Horonite
  chosen_spanish: el horonita
  alternatives_spanish:
  - el de Horón
  - el hombre de Horón
  lexicon: HALOT
  rationale: Es un gentilicio; 'horonita' conserva el valor identificador de origen del hebreo y el formato estable de nombre étnico en español.
- source_word: הָעֶבֶד
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  lexicon: HALOT
  rationale: Se mantiene la fuerza lexical de עֶבֶד como dependencia/estatus subordinado. 'Esclavo' es más transparente que 'siervo' y sigue la preferencia terminológica del proyecto cuando el término es marcado.
- source_word: הָעַמֹּנִי
  english_pob_choice: the Ammonite
  chosen_spanish: amonita
  alternatives_spanish:
  - el amonita
  - de Amón
  lexicon: HALOT
  rationale: Adjetivo gentilicio; en español, tras el sustantivo propio, funciona naturalmente como identificación étnica/nacional.
- source_word: וַיֵּרַע לָהֶם רָעָה גְדֹלָה
  english_pob_choice: it was very displeasing to them
  chosen_spanish: les desagradó mucho
  alternatives_spanish:
  - fue muy desagradable para ellos
  - les pareció muy malo
  lexicon: HALOT
  rationale: La secuencia hebrea repite רע para intensificar. En español, 'les desagradó mucho' comunica la intensidad sin perder el sentido de malestar/aversión; se evita borrar la repetición con una paráfrasis demasiado débil.
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: Se conserva el sustantivo masculino singular del hebreo. La POB inglesa también retuvo la referencia masculina por fidelidad léxica y claridad contextual.
- source_word: לְבַקֵּשׁ טוֹבָה
  english_pob_choice: to seek the welfare
  chosen_spanish: a buscar el bien
  alternatives_spanish:
  - a buscar el bienestar
  - a procurar el bien
  lexicon: HALOT
  rationale: טוֹבָה aquí expresa beneficio/bien para otros. 'Buscar el bien' conserva el vínculo semántico con טוב y suena natural en español; 'bienestar' sería posible, pero desplaza el matiz más general de benevolencia/beneficio.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: of the children of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de los hijos de Israel
  - de los israelitas
  lexicon: HALOT
  rationale: Se conserva la fórmula covenantal tradicional 'hijos de Israel', equivalente directo de בני ישראל, sin reducirla a un etnónimo más genérico.
theological_decisions:
- issue: Valor de אָדָם en un contexto individual masculino
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - alguien
  rationale: El hebreo usa un singular masculino y el contexto identifica a Nehemías. Mantener 'un hombre' evita neutralizar indebidamente el referente y sigue la lectura auditada de la POB inglesa.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; contested terms table for אָדָם'
- issue: Intensificación del doble רעע en hebreo
  english_pob_reading: it was very displeasing to them
  chosen_spanish_reading: les desagradó mucho
  alternative_spanish_readings:
  - fue muy desagradable para ellos
  - les pareció muy malo
  rationale: La repetición hebrea 'malo/evil' no debe eliminarse sin dejar huella. El español elegido transmite la intensidad y permite una nota que preserve la alternativa literal 'gran mal' como eco del hebreo.
  doctrine_reference: 'DOCTRINE.md: lexical transparency and preserved tensions'
- issue: Rendering of the relational phrase לטובָה with בני ישראל
  english_pob_reading: to seek the welfare of the children of Israel
  chosen_spanish_reading: a buscar el bien de los hijos de Israel
  alternative_spanish_readings:
  - a buscar el bienestar de los hijos de Israel
  - a procurar el bien de los hijos de Israel
  rationale: '''Bien'' conserva la raíz טוב y evita restringir el término a prosperidad material. La frase expresa benevolencia hacia Israel, no simple éxito económico.'
  doctrine_reference: 'DOCTRINE.md: semantic range of טוב / טובָה'
translation_notes:
  revision_awareness: La POB inglesa pasó por una revisión que movió 'slave' a 'servant' por registro y luego lo restauró para respetar la política léxica; también ajustó la frase verbal para reflejar mejor la construcción hebrea. Esta versión española sigue la restauración de 'slave' con 'esclavo' y mantiene una intensificación natural ('les desagradó mucho') que conserva el doble רעע sin caer en calco rígido.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma predeterminada para el nombre divino, pero este versículo no contiene el tetragrámaton.
  - '''Hijos de Israel'' conserva la fórmula tradicional y auditable de בני ישראל.'
  - '''Esclavo'' se usa aquí por fidelidad léxica; no se sustituye por ''siervo'' sin una razón textual explícita.'
  - La puntuación y el orden de los complementos buscan sonar naturales en español sin alterar la relación sintáctica del hebreo.
