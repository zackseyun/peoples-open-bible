translation:
  language: es
  text: Por esta razón, la ciudad está alborotada[a] por la expectativa, y mientras crece con multitudes[b], ya está en peligro de ser saqueada muchas veces[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «alborotada» traduce ὀχλεῖ como conmoción cívica; también puede entenderse «en tumulto», «agitada» o «perturbada».
    reason: lexical_alternative
  - marker: b
    text: «multitudes» refleja συστροφαῖς; también puede leerse «con grupos reunidos» o «con aglomeraciones».
    reason: lexical_alternative
  - marker: c
    text: «muchas veces» sigue de cerca πολλακὶς; también es posible «repetidamente» o «a menudo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὧν χάριν
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por lo cual
  - Por eso
  lexicon: LSJ
  rationale: La expresión causal introduce el efecto de lo anterior. «Por esta razón» conserva el valor resultativo sin volverse mecánica.
- source_word: ἡ πόλις
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la población
  - la urbe
  lexicon: LSJ
  rationale: El griego designa la ciudad como entidad; en español conviene mantener esa imagen, sin reducirla solo a sus habitantes.
- source_word: διὰ τὴν προσδοκίαν
  english_pob_choice: because of the expectation
  chosen_spanish: por la expectativa
  alternatives_spanish:
  - por la anticipación
  - por la espera tensa
  lexicon: LSJ
  rationale: προσδοκία expresa expectativa o anticipación. «Expectativa» es el equivalente más directo y natural en español, conservando el estado de tensión pública.
- source_word: ὀχλεῖ
  english_pob_choice: is in turmoil
  chosen_spanish: está alborotada
  alternatives_spanish:
  - está en tumulto
  - está agitada
  - está perturbada
  lexicon: LSJ
  rationale: El verbo indica trastorno o conmoción. «Está alborotada» transmite desorden cívico en un español claro y no excesivamente técnico.
- source_word: πληθύνουσα
  english_pob_choice: as it grows
  chosen_spanish: mientras crece
  alternatives_spanish:
  - a medida que crece
  - al crecer
  lexicon: LSJ
  rationale: El participio expresa aumento progresivo. «Mientras crece» conserva el valor de desarrollo continuo y enlaza bien con la frase siguiente.
- source_word: συστροφαῖς
  english_pob_choice: with crowds
  chosen_spanish: con multitudes
  alternatives_spanish:
  - con grupos reunidos
  - con aglomeraciones
  - con masas
  lexicon: LSJ
  rationale: El término puede sugerir grupos reunidos o acumulación de gente. «Multitudes» mantiene el sentido de gente congregada sin imponer una lectura de motín.
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya en este momento
  - ya ahora
  lexicon: LSJ
  rationale: Marca que el peligro es presente. «Ya» es el equivalente más natural y fiel.
- source_word: κινδυνεύει
  english_pob_choice: is ... in danger
  chosen_spanish: corre el peligro
  alternatives_spanish:
  - está en peligro
  - arriesga
  lexicon: LSJ
  rationale: La construcción española «corre el peligro» reproduce bien la noción de riesgo inminente.
- source_word: πολλακὶς
  english_pob_choice: many times
  chosen_spanish: muchas veces
  alternatives_spanish:
  - repetidamente
  - a menudo
  lexicon: LSJ
  rationale: El adverbio literalmente significa «muchas veces»; se conserva esa intensidad, como en el testimonio inglés.
- source_word: διαρπασθῆναι
  english_pob_choice: to be plundered
  chosen_spanish: ser saqueada
  alternatives_spanish:
  - ser despojada
  - ser pillada
  - ser arrasada por el saqueo
  lexicon: LSJ
  rationale: El verbo indica despojo violento. En español, «saqueada» es la forma más natural y precisa para una ciudad amenazada por destrucción y robo.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura causal de ὧν χάριν y la imagen de la ciudad como sujeto afectado. Se adoptó un español más natural que la estructura inglesa auditada, pero sin suavizar la tensión del texto: la ciudad está en conmoción por la expectativa, crece con multitudes y ya corre repetidamente el peligro de ser saqueada.'
  spanish_consistency_notes:
  - Se preservó «Yahvé» solo cuando el contexto lo exija; en este versículo no aparece el nombre divino.
  - Se mantuvo «ciudad» como sujeto literal para no sustituir indebidamente la imagen urbana por una paráfrasis sociológica.
  - «Saqueada» conserva el matiz concreto de despojo violento y se ajusta al uso bíblico en español.
  - «Expectativa» se eligió para προσδοκία sin forzar una interpretación psicológica más estrecha que el griego.
