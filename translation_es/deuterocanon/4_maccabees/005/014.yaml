translation:
  language: es
  text: Cuando el tirano lo instaba de esta manera a comer carne ilícitamente[a], Eleazar pidió hablar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la ilícita ingestión de carne» o «a comer carne de manera contraria a la ley».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποτρύνοντος
  english_pob_choice: was urging
  chosen_spanish: lo instaba
  alternatives_spanish:
  - lo urgía
  - lo apremiaba
  - lo presionaba
  lexicon: LSJ
  rationale: El participio expresa presión insistente o apremio activo. «Lo instaba» transmite bien esa presión coercitiva en español natural y mantiene el tono del contexto de martirio.
- source_word: ἔκθεσμον
  english_pob_choice: unlawful
  chosen_spanish: ilícita
  alternatives_spanish:
  - ilegal
  - fuera de la ley
  - contraria a la ley
  lexicon: LSJ
  rationale: La palabra griega significa literalmente «fuera de la ley». «Ilícita» conserva la idea de acción no permitida y suena digna y natural en español, sin volver el texto más explicativo de lo que permite el original.
- source_word: σαρκοφαγίαν
  english_pob_choice: eating of flesh
  chosen_spanish: comida de carne
  alternatives_spanish:
  - comer carne
  - carne comestible
  - ingesta de carne
  lexicon: LSJ
  rationale: El compuesto se refiere de manera concreta a comer carne. «Comida de carne» mantiene esa materialidad y el tono sobrio del griego; no se especifica qué carne es, porque el verso tampoco lo hace.
- source_word: λόγον ᾔτησεν
  english_pob_choice: asked to speak
  chosen_spanish: pidió hablar
  alternatives_spanish:
  - solicitó hablar
  - pidió permiso para hablar
  - pidió una palabra
  lexicon: LSJ
  rationale: La expresión idiomática apunta a solicitar oportunidad para dirigirse al interlocutor. «Pidió hablar» es la formulación más natural y fiel al sentido comunicativo.
- source_word: ὁ τύραννος
  english_pob_choice: the tyrant
  chosen_spanish: el tirano
  alternatives_spanish:
  - el rey
  - el gobernante
  - el soberano
  lexicon: LSJ
  rationale: El griego usa explícitamente «tirano», con carga moral negativa. Debe conservarse sin suavizarlo a un título neutral.
theological_decisions:
- issue: Alcance de la expresión sobre la comida prohibida
  english_pob_reading: Rendered ἔκθεσμον as 'unlawful' and left the object as 'eating of flesh,' allowing the context to signal the violation of divine law without adding a more specific object.
  chosen_spanish_reading: Se dejó la referencia como «comida de carne» y se calificó como «ilícita», dejando que el contexto del relato señale la infracción de la ley sin añadir un objeto más específico.
  alternative_spanish_readings:
  - «comida de carne contra la ley»
  - «carne prohibida»
  - «ingesta ilícita de carne»
  rationale: El texto griego no nombra aquí un tipo específico de carne. La traducción debe conservar la generalidad del original y no introducir una precisión que el versículo no expresa.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase beyond what the source warrants.'
translation_notes:
  revision_awareness: El inglés auditado pasó de 'lawless' a 'unlawful' por naturalidad; en español se optó por «ilícita» para conservar la idea de contravención legal/religiosa con un registro más idiomático. Se mantuvo la estructura causal-temporal del verso y no se añadió contenido ausente del griego.
  spanish_consistency_notes:
  - Se conserva «tirano» para ὁ τύραννος, alineado con la carga negativa del griego.
  - Se evita traducir σαρκοφαγίαν como un término más interpretativo o eclesiástico; se mantiene el referente concreto a comer carne.
  - «Pidió hablar» reproduce el valor idiomático de λόγον ᾔτησεν sin forzar un giro demasiado formal.
  - La nota al pie preserva una alternativa léxica útil sin introducir especificaciones textuales no presentes en el versículo.
