translation:
  language: es
  text: Hizo varas de madera de acacia y las recubrió de oro.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de עשה se expresa naturalmente en español con pretérito simple. Se omite la conjunción inicial como en el inglés POB, salvo que el flujo narrativo requiera explícitamente «y».
- source_word: בַּדֵּי
  english_pob_choice: poles
  chosen_spanish: varas
  alternatives_spanish:
  - poles
  - bastones
  - barras
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, בַּדֵּי se refiere a las piezas de madera usadas para portar los objetos sagrados. «Varas» comunica bien esa función en español sin sonar tan técnico como «barras» ni tan arcaico como «bastones».
- source_word: עֲצֵי שִׁטִּים
  english_pob_choice: of acacia wood
  chosen_spanish: de madera de acacia
  alternatives_spanish:
  - de acacia
  - de madera de shittim
  lexicon: HALOT
  rationale: La cadena constructa indica madera procedente de acacia. «Madera de acacia» es claro y fiel; se evita transliterar «shittim» porque no añade precisión para el lector español.
- source_word: וַיְצַף
  english_pob_choice: and overlaid
  chosen_spanish: las recubrió
  alternatives_spanish:
  - las revistió
  - las plateó
  - las cubrió
  lexicon: HALOT
  rationale: צפה en este contexto artesanal describe aplicar una capa metálica. «Recubrió» conserva la idea de cubrir con un material valioso y funciona con naturalidad en español; «plateó» sería más técnico, pero menos transparente para lectura pública.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: las
  alternatives_spanish:
  - los
  lexicon: HALOT
  rationale: El pronombre retoma las varas/piezas femeninas en español por concordancia con «varas». En hebreo el pronombre es plural masculino genérico; el español exige ajuste de concordancia sin cambiar la referencia.
- source_word: זָהָב
  english_pob_choice: with gold
  chosen_spanish: de oro
  alternatives_spanish:
  - con oro
  - con dorado
  lexicon: HALOT
  rationale: El hebreo nombra el material del recubrimiento. En español, tras «recubrir» es idiomático decir «de oro»; mantiene la sustancia y evita una construcción forzada.
translation_notes:
  revision_awareness: El texto inglés auditado ya refleja un acuerdo alto con la fuente hebrea; no hubo revisiones aplicadas ni variantes textuales relevantes para esta unidad.
  spanish_consistency_notes:
  - Se mantiene un registro claro y literal-idiomático propio de descripciones tabernaculares.
  - No se usa terminología eclesiástica ajena al objeto descrito; se conserva la función material de las piezas.
  - La concordancia pronominal en español se ajusta al referente 'varas' sin alterar el sentido del hebreo.
