translation:
  language: es
  text: 'Además[a], incluso los mismos caldeos deshonran a los ídolos: cada vez que ven a un mudo que no puede hablar, lo llevan a Bel[b] y le piden que lo haga hablar, como si él pudiera percibir[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «los mismos caldeos deshonran a los ídolos», subrayando que incluso sus propios adoradores los tratan con desprecio.
    reason: lexical_alternative
  - marker: b
    text: Bel era un nombre o título divino babilónico asociado con Marduc.
    reason: cultural_note
  - marker: c
    text: O bien, «como si él pudiera entender» o «darse cuenta».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτι δὲ καὶ
  english_pob_choice: Moreover, even
  chosen_spanish: Además, incluso
  alternatives_spanish:
  - Todavía, incluso
  - Y además, incluso
  lexicon: LSJ
  rationale: Conserva el valor aditivo y enfático de la frase inicial en un español natural y sobrio, apto para introducir otro argumento contra los ídolos.
- source_word: αὐτῶν τῶν Χαλδαίων
  english_pob_choice: the Chaldeans themselves
  chosen_spanish: los mismos caldeos
  alternatives_spanish:
  - los caldeos mismos
  - aquellos mismos caldeos
  lexicon: LSJ
  rationale: El genitivo intensivo subraya que son los propios caldeos; en español, «los mismos caldeos» mantiene esa fuerza sin sonar forzado.
- source_word: ἀτιμαζόντων
  english_pob_choice: dishonor
  chosen_spanish: los deshonran
  alternatives_spanish:
  - los tratan con desprecio
  - los desprecian
  lexicon: LSJ
  rationale: «Deshonran» reproduce el acto de trato vergonzoso o despreciativo en un registro conciso y fiel al tono polémico.
- source_word: αὐτά
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a los ídolos
  - a esas cosas
  lexicon: LSJ
  rationale: El pronombre retoma a los ídolos; en español, el objeto directo masculino plural «los» conserva la referencia sin explicitarla en exceso en el texto principal.
- source_word: ἐνεὸν
  english_pob_choice: a mute person
  chosen_spanish: a un mudo
  alternatives_spanish:
  - a una persona muda
  - a alguien mudo
  lexicon: LSJ
  rationale: El griego describe a alguien sin voz; «un mudo» es breve y fiel, y encaja con el contraste retórico del pasaje.
- source_word: οὐ δυνάμενον λαλῆσαι
  english_pob_choice: who cannot speak
  chosen_spanish: que no puede hablar
  alternatives_spanish:
  - incapaz de hablar
  - que no logra hablar
  lexicon: LSJ
  rationale: Aclara la incapacidad verbal expresada por el participio sin añadir matices ajenos al texto.
- source_word: προσενεγκάμενοι τὸν Βῆλον
  english_pob_choice: they bring him to Bel
  chosen_spanish: lo llevan a Bel
  alternatives_spanish:
  - lo presentan a Bel
  - lo traen a Bel
  lexicon: LSJ
  rationale: «Llevarlo a Bel» representa de forma natural la acción de conducir al mudo ante el ídolo para la prueba; evita una literalidad pesada.
- source_word: Βῆλον
  english_pob_choice: Bel
  chosen_spanish: Bel
  alternatives_spanish:
  - Belus
  lexicon: LSJ
  rationale: Se mantiene la transliteración del nombre divino siguiendo el uso del texto fuente y la práctica auditada de la POB.
- source_word: ἐξιοῦσιν φωνῆσαι
  english_pob_choice: ask that he make him speak
  chosen_spanish: le piden que lo haga hablar
  alternatives_spanish:
  - le suplican que le dé habla
  - le piden que le conceda hablar
  lexicon: LSJ
  rationale: El infinitivo causativo se vierte con naturalidad como una petición para que el ídolo produzca el habla del mudo.
- source_word: ὡς δυνατοῦ ὄντος αὐτοῦ αἰσθέσθαι
  english_pob_choice: as though he were able to perceive
  chosen_spanish: como si él pudiera percibir
  alternatives_spanish:
  - como si pudiera entender
  - como si pudiera darse cuenta
  lexicon: LSJ
  rationale: «Percibir» conserva el sentido de conciencia/sensación de αἰσθέσθαι y mantiene la ironía del argumento.
theological_decisions:
- issue: Referencia del desprecio hacia los ídolos y el alcance de la acusación
  english_pob_reading: The Chaldeans are said to dishonor the idols by exposing their impotence through appeals to Bel on behalf of a mute person.
  chosen_spanish_reading: Los caldeos mismos deshonran a los ídolos al recurrir a Bel en favor de un mudo, exhibiendo así la impotencia del ídolo.
  alternative_spanish_readings:
  - Los caldeos deshonran a sus propios dioses en general.
  - La frase puede entenderse como un trato de desprecio hacia las imágenes mismas.
  rationale: La sintaxis y el contexto inmediato favorecen entender la escena como una exposición práctica de la impotencia idolátrica. Se conserva la tensión polémica sin resolver en exceso el matiz exacto del desprecio.
  doctrine_reference: Preservar la tensión textual y la crítica a la idolatría sin homogeneizar el referente.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail: se prefirió «los mismos caldeos» para reflejar el valor intensivo de αὐτῶν τῶν Χαλδαίων, se mantuvo la progresión temporal con «cuando/siempre que» en sentido de ocurrencia repetida mediante «cuando», y se conservó una formulación breve para el cierre comparativo. En español, «además, incluso» y «como si él pudiera percibir» sostienen la misma lógica argumentativa con fluidez.'
  spanish_consistency_notes:
  - Se mantiene «Bel» como transliteración estable del nombre divino.
  - Se conserva «mudo» / «no puede hablar» para reproducir la duplicación explicativa del griego sin añadir interpretación.
  - El tono del pasaje permanece polémico y sobrio, acorde con la crítica a la idolatría en el contexto de la Carta de Jeremías.
  - Se evita sustituir el referente por «SEÑOR» o términos eclesiásticos no presentes en la fuente.
