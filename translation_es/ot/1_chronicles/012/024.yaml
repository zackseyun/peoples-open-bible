revisions:
- from: Y estos son los números de los jefes de los hombres armados[a] para la guerra, que vinieron a David en Hebrón, para transferir el reino de Saúl a él, conforme a la palabra de Yahvé.
  to: Y estos son los números de los jefes de las tropas armadas para la guerra, que vinieron a David en Hebrón para pasar el reino de Saúl a él, conforme a la palabra[a] de Yahvé.
  rationale: Se ajusta הֶחָלוּץ a un colectivo militar más natural en español («tropas armadas»), se sustituye «transferir» por «pasar» para un tono narrativo más fiel, y se alinea la nota al pie con la evidencia fuente y el audit trail inglés en כְּפִי יְהוָה. No hace falta adjudicación adicional.
