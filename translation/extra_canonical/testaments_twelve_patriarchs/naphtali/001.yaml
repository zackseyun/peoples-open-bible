  text: Διαθήκη Νεφθαλεὶμ τοῦ ὀγδόου υἱοῦ Ἰακὼβ καὶ Βάλλας¹. I. Ἀντίγραφον διαθήκης Νεφθαλείμ ἧς² διέθετο³ ἐν καιρῷ ⸀τῆς ἐξόδου⁴ αὐτοῦ ἐν ἔτει *ἑκατοστῷ καὶ τριακοστῷ⁵ τῆς⁶ ζωῆς αὐτοῦ⁷. 2. Συνελθόντων⁸ τῶν υἱῶν αὐτοῦ⁹ ἐν τῷ¹⁰ ἑβδόμῳ μηνί, μιᾷ¹¹ τοῦ μηνός¹², ἐποίησε δεῖπνον αὐτοῖς¹³. 3. *Καὶ τὸ πρωὶ¹⁴ μετὰ τὸ ἐξυπνισθῆναι¹⁵ αὐτὸν εἶπεν αὐτοῖς¹⁶ ὅτι¹⁷ Ἀποθνήσκω· καὶ¹⁸ οὐκ ἐπίστευσαν¹⁹ αὐτῷ. 4. Καὶ²⁰ *δοξάζων τὸν²¹ Κύριον²² *ἐκραταιώθη καὶ εἶπεν²³, ὅτι Μετὰ τὸ δεῖπνον τὸ χθὲς *ἀπέθανεν ἡ σάρξ μου²⁴. 5. *Ἥρξατο δὲ²⁵ λέγειν²⁶· Ἀκούσατε, τέκνα *μου, υἱοὶ Νεφθαλείμ, ἀκούσατε λόγους πατρὸς ὑμῶν²⁷. 6. Ἐγὼ ἐγεννήθην ἀπὸ Βάλλας²⁸, Γκαὶ¹²⁹ ὅτι³⁰ ἐν πανουργίᾳ ἐποίησε³¹ Ῥαχιήλ³², καὶ ἔδωκεν *ἀντʼ αὐτῆς³³ Βάλλαν³⁴ *τῷ Ἰακώβ³⁵, καὶ *συλλαβοῦσα ἔτεκέ με ἐπὶ τῶν γονάτων τῆς Ῥαχιήλ³⁶, Γκαὶ³⁷ διὰ τοῦτο *ἐκάλεσε τὸ ὄνομά μου³⁸ Νεφθαλείμ. 7. *Ἠγάπησε γάρ³⁹ με Ῥαχιὴλ⁴⁰ πάνυ⁴¹, ὅτι ἐπὶ *τῶν γονάτων⁴² αὐτῆς ἐγεννήθην, καὶ ἔτι⁴³ ἁπαλὸν ὄντα *με κατεφίλει⁴⁴ λέγουσα· *Δοίη μοι ἀδελφόν⁴⁵ σου ἐκ τῆς κοιλίας μου κατά σε. 8. Ὅθεν καὶ ὅμοιός μου⁴⁶ ἦν Γκατὰ πάντα¹⁴⁷ Ἰωσὴφ⁴⁸ κατὰ τὰς †εὐλογίας⁴⁹ Ῥαχιήλ.
