translation:
  language: es
  text: Ahora[a], mi Dios, te ruego que tus ojos estén abiertos y tus oídos atentos a la oración de este lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O "la oración ofrecida en este lugar" o "la oración desde este lugar". El hebreo dice más literalmente: "la oración de este lugar".'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  - Pues ahora
  lexicon: HALOT
  rationale: Marca temporal y discursiva que introduce la petición conclusiva. 'Ahora' es natural en español y conserva el giro sin añadir una conjunción innecesaria.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - Oh, mi Dios
  - Dios mío
  lexicon: HALOT
  rationale: La forma con sufijo de primera persona expresa apelación directa. 'Mi Dios' preserva esa dirección personal en un español claro y reverente.
- source_word: יִהְיוּ נָא
  english_pob_choice: please let ... be
  chosen_spanish: por favor, que ... estén
  alternatives_spanish:
  - que ... estén, por favor
  - quiera Dios que ... estén
  lexicon: HALOT
  rationale: El jussivo plural con נָא expresa ruego cortés. 'Por favor, que ... estén' transmite la súplica sin perder el matiz volitivo.
- source_word: עֵינֶיךָ פְּתֻחוֹת
  english_pob_choice: your eyes be open
  chosen_spanish: tus ojos estén abiertos
  alternatives_spanish:
  - tus ojos permanezcan abiertos
  - tus ojos sean abiertos
  lexicon: HALOT
  rationale: Se conserva la imagen antropomórfica de atención divina. 'Estén abiertos' es la forma más natural en español y mantiene la metáfora sin interpretarla en exceso.
- source_word: וְאָזְנֶיךָ קַשֻּׁבוֹת
  english_pob_choice: your ears attentive
  chosen_spanish: tus oídos atentos
  alternatives_spanish:
  - tus oídos escuchen atentos
  - tus oídos estén atentos
  lexicon: HALOT
  rationale: קַשֻּׁבוֹת comunica disponibilidad para oír. 'Atentos' funciona con 'oídos' en español y conserva la imaginería de escucha.
- source_word: לִתְפִלַּת
  english_pob_choice: to the prayer
  chosen_spanish: a la oración
  alternatives_spanish:
  - a la plegaria
  - a la súplica
  lexicon: HALOT
  rationale: El objeto de la atención divina se expresa con ל. 'Oración' es la opción más directa y natural en español para mantener el sentido básico del sustantivo.
- source_word: הַמָּקוֹם הַזֶּה
  english_pob_choice: of this place
  chosen_spanish: de este lugar
  alternatives_spanish:
  - de este sitio
  - hecha en este lugar
  lexicon: HALOT
  rationale: El hebreo presenta una relación genitiva literal ('la oración de este lugar'). 'De este lugar' conserva la construcción sin introducir una interpretación más específica en el texto principal.
theological_decisions:
- issue: Lenguaje antropomórfico aplicado a Dios
  english_pob_reading: Retain the concrete imagery ('eyes be open,' 'ears attentive')
  chosen_spanish_reading: Conservar la imagen concreta ('tus ojos estén abiertos', 'tus oídos atentos')
  alternative_spanish_readings:
  - Interpretar como 'vela por' y 'escucha'
  - Parafrasear como 'mantén tu atención'
  rationale: El hebreo usa imágenes corporales para la atención divina a la oración. Mantenerlas en español conserva la textura literaria y la tensión teológica del original, sin resolverla por paráfrasis.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés: se conserva el valor discursivo de ''Now'', la apelación directa ''my God'', la súplica jussiva con נָא, y la imaginería antropomórfica de ojos y oídos. No hubo revisiones aplicadas en el inglés, así que el español sigue de cerca la lectura establecida.'
  spanish_consistency_notes:
  - Se usó 'Ahora' para עַתָּה, evitando 'Y ahora' salvo que el contexto requiera un enlace más explícito.
  - '''Mi Dios'' conserva la vocación directa sin añadir exclamación no exigida por el hebreo.'
  - '''Oración'' mantiene el término general; la nota preserva las lecturas alternativas sobre el genitivo ''de este lugar''.'
  - Se evitó 'SEÑOR' o 'mi Señor' porque el texto hebreo aquí usa אֱלֹהַי, no el Tetragrámaton.
