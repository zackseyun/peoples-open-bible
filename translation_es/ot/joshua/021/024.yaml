translation:
  language: es
  text: 'Ayalón con sus pastizales[a], y Gat-rimón con sus pastizales: cuatro ciudades.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su terreno comunal» o «su terreno circundante»; el término hebreo se refiere al terreno que pertenece a una ciudad, a menudo usado para el pastoreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיָּלוֹן
  english_pob_choice: Aijalon
  chosen_spanish: Ayalón
  alternatives_spanish:
  - Aijalón
  lexicon: HALOT
  rationale: Es un nombre propio de lugar y debe transliterarse, no traducirse. En español, «Ayalón» reproduce bien la forma hebrea y evita depender de una convención inglesa.
- source_word: מִגְרָשֶׁהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - su terreno comunal
  - su tierra alrededor
  - su terreno de pasto
  lexicon: HALOT
  rationale: מִגְרָשׁ designa el terreno perteneciente a la ciudad, a menudo usado para pastoreo. «Pastizales» comunica bien esa función en español y mantiene la tensión entre uso agrícola/comunal y uso de pastoreo.
- source_word: גַּת רִמּוֹן
  english_pob_choice: Gath-rimmon
  chosen_spanish: Gat-rimón
  alternatives_spanish:
  - Gat Rimón
  lexicon: HALOT
  rationale: Es un topónimo compuesto. El guion ayuda a mostrar que se trata de un solo nombre, y la transliteración española conserva la forma propia del hebreo.
- source_word: עָרִים אַרְבַּע
  english_pob_choice: four cities
  chosen_spanish: cuatro ciudades
  alternatives_spanish:
  - cuatro pueblos
  lexicon: HALOT
  rationale: La frase final resume el total de la lista. «Ciudades» conserva el sentido administrativo de עָרִים en textos de reparto territorial.
- source_word: אֶת ... וְאֶת ... אֶת ... וְאֶת
  english_pob_choice: '[not separately represented in English beyond direct listing with ''with'' and ''and'']'
  chosen_spanish: '[representado por la simple enumeración coordinada]'
  alternatives_spanish:
  - —
  lexicon: Hebrew grammar
  rationale: El marcador de objeto directo no tiene equivalente natural en español. La lista coordinada expresa de forma idiomática la misma estructura sin forzar calcos.
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene la equivalencia óptima y no requirió revisiones recientes; el español sigue la misma línea, preservando la toponimia, la lista territorial y la nota léxica sobre מִגְרָשׁ sin añadir contenido interpretativo ajeno al hebreo.
  spanish_consistency_notes:
  - Se conserva la transliteración de nombres propios de lugar con acentuación española cuando corresponde.
  - «Pastizales» mantiene la referencia funcional del hebreo sin borrar la posibilidad de terreno comunal o circundante.
  - La puntuación reproduce el cierre enumerativo del versículo con dos puntos antes del resumen numérico final.
