id: GEN.46.34
reference: Genesis 46:34
source:
  edition: WLC
  text: וַ/אֲמַרְתֶּ֗ם אַנְשֵׁ֨י מִקְנֶ֜ה הָי֤וּ עֲבָדֶ֨י/ךָ֙ מִ/נְּעוּרֵ֣י/נוּ וְ/עַד עַ֔תָּה גַּם אֲנַ֖חְנוּ גַּם אֲבֹתֵ֑י/נוּ בַּ/עֲב֗וּר תֵּשְׁבוּ֙ בְּ/אֶ֣רֶץ גֹּ֔שֶׁן כִּֽי תוֹעֲבַ֥ת מִצְרַ֖יִם כָּל רֹ֥עֵה צֹֽאן־־־־־׃
translation:
  text: then you shall say[a], ‘Your servants have been men of livestock from our youth until now, both we and our fathers,’ so that you may live in the land of Goshen[b], for every shepherd is detestable to the Egyptians.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'for every shepherd is an abomination to the Egyptians.'
    reason: lexical_alternative
  - marker: b
    text: Or 'every shepherd of sheep'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַאֲמַרְתֶּם
  chosen: then you shall say
  alternatives:
  - and you shall say
  - you must say
  lexicon: HALOT
  rationale: The waw with perfect after prior instruction carries a sequential sense in context; 'then you shall say' reads naturally in English while preserving the directive force.
- source_word: אַנְשֵׁי מִקְנֶה
  chosen: men of livestock
  alternatives:
  - keepers of livestock
  - livestock men
  - cattlemen
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew construct expression. 'Men of livestock' communicates people occupied with animal husbandry without narrowing too quickly to one English occupational label.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here it functions as a conventional deferential self-reference before Pharaoh rather than emphasizing bonded status. 'Your servants' best fits the courtly register.
- source_word: מִנְּעוּרֵינוּ
  chosen: from our youth
  alternatives:
  - since our youth
  - from our boyhood
  lexicon: HALOT
  rationale: This idiom marks duration beginning in early life. 'From our youth' is natural and sufficiently formal.
- source_word: וְעַד עַתָּה
  chosen: until now
  alternatives:
  - even until now
  - to this day
  lexicon: HALOT
  rationale: A straightforward temporal continuation phrase.
- source_word: גַּם אֲנַחְנוּ גַּם אֲבֹתֵינוּ
  chosen: both we and our fathers
  alternatives:
  - we also, and also our fathers
  - both we and also our ancestors
  lexicon: HALOT
  rationale: The repeated גַּם emphasizes continuity across generations. 'Fathers' is retained as the gender-accurate familial term matching the Hebrew.
- source_word: בַּעֲבוּר
  chosen: so that
  alternatives:
  - in order that
  - for the sake of
  lexicon: HALOT
  rationale: 'Here the preposition introduces purpose/result: Joseph tells them what to say in order that they may be settled in Goshen.'
- source_word: תֵּשְׁבוּ
  chosen: you may live
  alternatives:
  - you may dwell
  - you may settle
  lexicon: HALOT
  rationale: ישב often means dwell/live/settle. 'Live' is idiomatic modern English here, while the location phrase still conveys settlement.
- source_word: בְּאֶרֶץ גֹּשֶׁן
  chosen: in the land of Goshen
  alternatives:
  - in Goshen
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'land,' so it is preserved.
- source_word: תוֹעֲבַת מִצְרַיִם
  chosen: detestable to the Egyptians
  alternatives:
  - an abomination to the Egyptians
  - abhorrent to the Egyptians
  lexicon: HALOT
  rationale: The construct phrase literally means 'an abomination of Egypt/Egyptians.' Rendering it predicatively as 'detestable to the Egyptians' is clear modern English while preserving the strong negative sense.
- source_word: כָּל רֹעֵה צֹאן
  chosen: every shepherd of sheep
  alternatives:
  - every shepherd
  - everyone who shepherds flocks
  - every keeper of sheep
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'shepherd of sheep/flock.' Retaining 'of sheep' preserves the wording, even though English could shorten it to 'every shepherd.'
