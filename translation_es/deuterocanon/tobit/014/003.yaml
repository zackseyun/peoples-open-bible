translation:
  language: es
  text: 'Ahora bien, había envejecido mucho[a]; y llamó a su hijo y a sus nietos, y le dijo: «Hijo, toma a tus hijos. Mira, ya he envejecido[b], y estoy a punto de partir de esta vida».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «se había hecho muy viejo»; el griego subraya el grado de vejez.'
    reason: lexical_alternative
  - marker: b
    text: La expresión griega dice, más literalmente, «estoy hacia el apartarme del vivir», una manera idiomática de decir que la muerte está cerca.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεγάλως
  english_pob_choice: very
  chosen_spanish: mucho
  alternatives_spanish:
  - grandemente
  - en gran manera
  - muchísimo
  lexicon: LSJ
  rationale: Con ἐγήρασεν intensifica el grado de vejez; en español, 'se había envejecido mucho' comunica naturalmente esa intensificación sin añadir una noción extra de grandeza.
- source_word: ἐγήρασεν
  english_pob_choice: had grown ... old
  chosen_spanish: se había envejecido
  alternatives_spanish:
  - había envejecido
  - se hizo viejo
  - había llegado a la vejez
  lexicon: LSJ
  rationale: La forma verbal expresa un estado ya alcanzado de vejez avanzada. 'Se había envejecido' conserva el matiz resultante y funciona bien con el perfecto siguiente 'he envejecido'.
- source_word: τοὺς υἱοὺς αὐτοῦ
  english_pob_choice: his grandsons
  chosen_spanish: sus nietos
  alternatives_spanish:
  - los hijos de su hijo
  - los hijos de su hijo
  - sus nietos varones
  lexicon: LSJ
  rationale: Tras 'llamó a su hijo', la repetición apunta naturalmente a los hijos de ese hijo, es decir, sus nietos. 'Nietos' desambigua en español y sigue la lectura ya asentada en el audit trail inglés.
- source_word: Τέκνον
  english_pob_choice: Child
  chosen_spanish: Hijo
  alternatives_spanish:
  - Hijo mío
  - Hijo,
  - Niño
  lexicon: LSJ
  rationale: En el contexto filial, 'Hijo' reproduce el vocativo afectuoso con naturalidad en español. 'Hijo mío' sería más explícito, pero añade un elemento no presente en el griego.
- source_word: λάβε
  english_pob_choice: take
  chosen_spanish: toma
  alternatives_spanish:
  - recibe
  - lleva
  - coge
  lexicon: LSJ
  rationale: Imperativo directo y sencillo. 'Toma' conserva el valor básico del mandato sin sobreinterpretarlo como 'llevar' o 'hacerse cargo'.
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Observa
  - He aquí
  lexicon: LSJ
  rationale: Introducción enfática de atención. 'Mira' es idiomático en español moderno y evita el tono arcaizante de 'He aquí'.
- source_word: γεγήρακα
  english_pob_choice: I have grown old
  chosen_spanish: ya he envejecido
  alternatives_spanish:
  - estoy viejo
  - he llegado a viejo
  - ya soy anciano
  lexicon: LSJ
  rationale: El perfecto marca el estado presente resultante del envejecimiento. 'Ya he envejecido' conserva esa fuerza y evita un giro más rígido o más interpretativo.
- source_word: πρὸς τὸ ἀποτρέχειν ἐκ τοῦ ζῇν εἰμί
  english_pob_choice: I am about to depart from life
  chosen_spanish: estoy a punto de partir de esta vida
  alternatives_spanish:
  - estoy por salir de la vida
  - estoy a punto de morir
  - estoy cerca de partir de la vida
  lexicon: LSJ
  rationale: El griego usa una expresión idiomática y suavizada para la cercanía de la muerte. 'Partir de esta vida' conserva el matiz eufemístico; 'estoy a punto de' refleja la inminencia.
theological_decisions:
- issue: Eufemismo para la cercanía de la muerte
  english_pob_reading: I am about to depart from life
  chosen_spanish_reading: estoy a punto de partir de esta vida
  alternative_spanish_readings:
  - estoy a punto de morir
  - estoy por morir
  - mi muerte está cerca
  rationale: El texto griego evita decir simplemente 'morir'. La traducción mantiene el tono sobrio y reverente del original sin volverlo oscuro para el lector español.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El auditorio inglés revisó la frase equivalente a 'his son's sons' y la normalizó a 'grandsons'. En español se adopta 'nietos' para evitar ambigüedad y mantener la lectura aprobada. También se conserva el eufemismo de la muerte en una forma española natural.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como término por defecto solo cuando corresponda; aquí no aparece.
  - Se mantiene un registro bíblico moderno y digno, evitando calcos como 'he aquí' donde 'mira' comunica mejor el imperativo.
  - '''Esta vida'' preserva el alcance de ζῇν y hace natural la frase idiomática en español.'
  - No se introduce 'Cristo', 'Señor' ni otros términos teológicos ajenos al pasaje.
