  to: 'Entonces respondí por segunda vez y le dije: «¿Qué son estas dos ramas de olivo[a] que están junto a los dos tubos[b] de oro, que vierten de sí el oro[c]?»'
  rationale: Se ajusta «brotes» a «ramas» para seguir más de cerca la elección principal documentada del POB inglés, manteniendo en nota la rareza del término hebreo. También se mejora la naturalidad española de la cláusula final con «vierten de sí el oro», que conserva la dificultad y la imaginería del hebreo sin el calco más duro «de sí mismos».
