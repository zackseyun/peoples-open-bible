lexical_decisions:
- source_word: βάσανισον
  english_pob_choice: Punish
  chosen_spanish: Castiga
  alternatives_spanish:
  - Someter a tormento
  - Aflige
  - Corrige con castigo
  lexicon: LSJ
  rationale: El imperativo aoristo pide una acción judicial o punitiva. «Castiga» comunica bien esa fuerza en español natural sin concretar indebidamente el modo como «tormentar».
- source_word: τοὺς καταδυναστεύοντας
  english_pob_choice: those who oppress
  chosen_spanish: a los que oprimen
  alternatives_spanish:
  - a los que tiranizan
  - a los que dominan con dureza
  lexicon: LSJ
  rationale: El participio expresa ejercer poder opresivo sobre otros. «Oprimen» conserva la acción continua y es idiomático en español.
- source_word: καὶ ἐξυβρίζοντας
  english_pob_choice: and outrage
  chosen_spanish: y actúan con insolencia
  alternatives_spanish:
  - y ultrajan
  - y abusan
  - y tratan con insolencia
  lexicon: LSJ
  rationale: «ἐξυβρίζοντας» puede abarcar insolencia, abuso o ultraje. «Actúan con insolencia» mantiene el matiz de conducta arrogante y ofensiva, mientras la nota recoge la amplitud semántica más fuerte.
- source_word: ἐν ὑπερηφανίᾳ
  english_pob_choice: in arrogance
  chosen_spanish: en arrogancia
  alternatives_spanish:
  - con orgullo
  - con altivez
  - en soberbia
  lexicon: LSJ
  rationale: La frase señala la actitud o manera con que se oprime y ultraja. «En arrogancia» reproduce de forma clara y sobria el rasgo moral del griego.
theological_decisions:
- issue: Alcance de la petición punitiva
  english_pob_reading: Translate the extant Greek clause as a prayer petition without importing surrounding context.
  chosen_spanish_reading: Traducir la cláusula griega tal como está, como una petición de castigo, sin reconstruir contexto faltante.
  alternative_spanish_readings:
  - Restituir una oración más amplia a partir de tradición o memoria
  - Suavizar a una petición genérica de corrección
  rationale: El testimonio dado es una cláusula breve con desajuste de fuente; por fidelidad auditada, el español debe ceñirse al griego disponible y no ampliar ni armonizar con otros pasajes.
  doctrine_reference: 'PHILOSOPHY.md: primacía del idioma original; preservar honestamente la incertidumbre de la fuente'
translation_notes:
  revision_awareness: 'La traducción sigue la revisión más reciente del audit trail: se prefirió una expresión más fuerte para ἐξυβρίζοντας que no se quede en «insultar», manteniendo el resto del enunciado estable y alineado con el griego extantemente provisto.'
  spanish_consistency_notes:
  - Se usó «castiga» para βάσανισον, evitando «tormenta» por sonar demasiado técnico y porque el contexto pide fuerza judicial más que descripción del medio.
  - Se mantuvo «arrogancia» para ἐν ὑπερηφανίᾳ, en continuidad con el valor moral del término y con el estilo bíblico moderno.
  - No se introdujo «Señor» ni otros elementos contextuales ausentes en la cláusula griega suministrada.
  - La nota de pie b recoge explícitamente el desajuste textual, como exige el expediente auditado.
