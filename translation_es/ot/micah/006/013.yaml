translation:
  language: es
  text: Por eso también yo he comenzado a golpearte[a], dejándote desolado por tus pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te he hecho enfermar al golpearte». El verbo hebreo también puede expresar causar enfermedad o debilidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/גַם
  english_pob_choice: Therefore ... too
  chosen_spanish: Por eso también
  alternatives_spanish:
  - Y también
  - Así que también
  lexicon: HALOT
  rationale: La combinación de conjunción y adverbio expresa continuación con énfasis. «Por eso» comunica la relación inferencial con el contexto previo, y «también» conserva el valor aditivo de גַם.
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: HALOT
  rationale: El pronombre explícito se conserva para reforzar que es el propio hablante quien actúa en juicio. En español puede mantenerse de forma natural con «yo» dentro de la flexión verbal.
- source_word: הֶחֱלֵיתִי
  english_pob_choice: have begun
  chosen_spanish: he comenzado
  alternatives_spanish:
  - te he hecho enfermar
  - te he debilitado
  - te he herido
  lexicon: HALOT
  rationale: 'En esta construcción con el infinitivo siguiente, el valor inceptivo es el más probable: no se presenta principalmente como «enfermar», sino como el inicio del acto de golpear. «He comenzado» reproduce esa lectura y evita cargar el texto con una enfermedad física que el contexto no exige.'
- source_word: הַכּוֹתֶךָ
  english_pob_choice: to strike you
  chosen_spanish: a herirte
  alternatives_spanish:
  - a golpearte
  - a castigarte con golpes
  - a herirte con mi mano
  lexicon: HALOT
  rationale: El infinitivo constructo de נכה admite «golpear», «herir» o «castigar». «Herte» es claro y digno en español, y conserva el matiz de acción punitiva sin sonar arcaico.
- source_word: הַשְׁמֵם
  english_pob_choice: making you desolate
  chosen_spanish: haciéndote desolación
  alternatives_spanish:
  - dejándote desolado
  - arrasándote
  - convirtiéndote en ruina
  lexicon: HALOT
  rationale: El hifil de שמם expresa el resultado devastador del golpe. «Haciéndote desolación» conserva la fuerza nominal del hebreo y el sentido de devastación judicial, aunque en español también puede entenderse como «dejándote desolado».
- source_word: עַל
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  lexicon: HALOT
  rationale: Aquí la preposición introduce fundamento o causa del juicio. «A causa de» comunica claramente esa relación causal en español contemporáneo.
- source_word: חַטֹּאתֶךָ
  english_pob_choice: your sins
  chosen_spanish: tus pecados
  alternatives_spanish:
  - tu pecado
  - tus culpas
  lexicon: HALOT
  rationale: El plural hebreo apunta a una serie de transgresiones, no a una sola falta. «Pecados» refleja mejor ese plural distributivo que «pecado».
theological_decisions:
- issue: El sentido de הֶחֱלֵיתִי en relación con el juicio divino
  english_pob_reading: 'Rendered as an inceptive judgment formula: ''have begun to strike you'''
  chosen_spanish_reading: he comenzado a herirte
  alternative_spanish_readings:
  - te he hecho enfermar al herirte
  - te he herido
  - he comenzado a golpearte
  rationale: 'Se conserva la lectura inceptiva del juicio: el texto no describe primero una enfermedad literal, sino el inicio de una acción castigadora de Yahvé. «Herirte» permite mantener la severidad sin sobreespecificar un matiz médico que el contexto inmediato no privilegia.'
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Relación causal del castigo con el pecado
  english_pob_reading: making you desolate because of your sins
  chosen_spanish_reading: haciéndote desolación a causa de tus pecados
  alternative_spanish_readings:
  - dejándote desolado por tus pecados
  - arrasándote por tus pecados
  rationale: 'La cláusula final expresa motivo judicial: la devastación no es arbitraria, sino consecuencia de los pecados de Israel. «A causa de» mantiene esa lógica sin suavizarla.'
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores al texto base; la lectura sigue el acuerdo mayoritario del audit trail inglés, con atención al valor inceptivo de הֶחֱלֵיתִי y al resultado devastador de הַשְׁמֵם.
  spanish_consistency_notes:
  - Se usa «Yahvé» implícitamente en la voz del hablante divina cuando el contexto lo requiere, pero aquí el versículo mantiene la primera persona sin nombrar explícitamente el nombre divino.
  - Se prefirió «herirte» antes que «golpearte» para conservar un registro bíblico sobrio y al mismo tiempo evitar arcaísmos excesivos.
  - «Desolación» se mantiene como sustantivo para reflejar el peso del hebreo שמם y no diluir el juicio en una simple descripción de tristeza.
