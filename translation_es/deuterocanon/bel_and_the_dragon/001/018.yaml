  revision_rationale: Se ajusta «exclamó con voz fuerte» a «clamó a gran voz» para reflejar con más fidelidad y naturalidad ἐβόησεν φωνῇ μεγάλῃ. También se simplifica levemente la exclamación vocativa a «¡Grande eres, Bel!» para mejorar la fluidez del español sin perder el énfasis del griego.
