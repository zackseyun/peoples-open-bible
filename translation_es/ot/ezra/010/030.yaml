translation:
  language: es
  text: 'Y de los hijos de Pahat-moab: Adna, Chelal, Benaía, Maaseías, Matanía, Bezalel, Binnui y Manasés.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  english_pob_choice: And from the sons of
  chosen_spanish: Y de los hijos de
  alternatives_spanish:
  - Y de entre los hijos de
  - Y de los descendientes de
  lexicon: WLC; HALOT
  rationale: Mantiene la estructura genealógica/lista del hebreo y refleja tanto la conjunción inicial como el valor partitivo de מִן. 'Hijos' conserva la forma directa de בְּנֵי, sin neutralizarla a 'descendientes' salvo necesidad contextual.
- source_word: פַּחַת מוֹאָב
  english_pob_choice: Pahath-moab
  chosen_spanish: Pahat-moab
  alternatives_spanish:
  - Pahat-moab
  - Pahat Moab
  lexicon: WLC; HALOT
  rationale: Se conserva como nombre propio de familia/clan. En español, 'Pahat' evita una transliteración inglesa innecesaria como 'Pahath' y mantiene la forma compuesta unida por guion, clara y estándar para una lista de nombres.
- source_word: עַדְנָא
  english_pob_choice: Adna
  chosen_spanish: Adna
  alternatives_spanish:
  - Adná
  lexicon: WLC; HALOT
  rationale: Nombre propio transliterado en forma breve y reconocible. No se añade vocalización castellana artificial; la forma sin tilde sigue el uso bíblico habitual en español.
- source_word: וּ/כְלָל
  english_pob_choice: Chelal
  chosen_spanish: Chelal
  alternatives_spanish:
  - Kelal
  lexicon: WLC; HALOT
  rationale: Se adopta la forma ya asentada en la tradición bíblica en inglés para este nombre, pero en español no se fuerza una transliteración distinta que rompa la uniformidad de la lista. La grafía conserva el valor de la consonante inicial sin paraphrasear el nombre.
- source_word: בְּנָיָה
  english_pob_choice: Benaiah
  chosen_spanish: Benaía
  alternatives_spanish:
  - Benaiah
  - Benaya
  lexicon: WLC; HALOT
  rationale: Nombre propio transliterado al español con acentuación natural. 'Benaía' refleja la terminación -iah de manera inteligible para lector hispano y evita una forma híbrida excesivamente inglesa.
- source_word: מַעֲשֵׂיָה
  english_pob_choice: Maaseiah
  chosen_spanish: Maaséya
  alternatives_spanish:
  - Maaseía
  - Maasías
  lexicon: WLC; HALOT
  rationale: Se preserva la secuencia sonora aproximada del nombre y se evita confundirlo con otros nombres bíblicos similares. La forma 'Maaséya' busca legibilidad española sin borrar la terminación teofórica implícita en la transliteración.
- source_word: מַתַּנְיָה
  english_pob_choice: Mattaniah
  chosen_spanish: Matanías
  alternatives_spanish:
  - Mataniah
  - Matanías
  lexicon: WLC; HALOT
  rationale: La forma española 'Matanías' es fluida y reconocible, y conserva la estructura del nombre semítico sin depender de la ortografía inglesa con doble t. La acentuación respeta la pronunciación natural en español.
- source_word: בְצַלְאֵל
  english_pob_choice: Bezalel
  chosen_spanish: Bezalel
  alternatives_spanish:
  - Bezaleel
  lexicon: WLC; HALOT
  rationale: Se mantiene la transliteración más extendida y transparente en español, cercana a la forma bíblica tradicional del nombre, sin añadir elementos interpretativos.
- source_word: וּ/בִנּוּי
  english_pob_choice: Binnui
  chosen_spanish: Binnui
  alternatives_spanish:
  - Binui
  lexicon: WLC; HALOT
  rationale: Se conserva la forma breve y estable del nombre propio. La doble n se mantiene porque corresponde a la convención transliteradora y ayuda a distinguirlo de otras posibles formas similares.
- source_word: וּ/מְנַשֶּׁה
  english_pob_choice: and Manasseh
  chosen_spanish: y Manasés
  alternatives_spanish:
  - y Manasé
  - y Manasés
  lexicon: WLC; HALOT
  rationale: Se usa la forma española asentada 'Manasés', que corresponde al nombre propio bíblico y es inteligible para lectores de habla hispana. Se conserva el enlace final con 'y' para la coordinación del listado.
translation_notes:
  revision_awareness: El texto base en inglés y la revisión más reciente muestran acuerdo alto y ningún cambio necesario; por eso el español sigue de cerca la estructura del hebreo y limita la intervención a la transliteración y adaptación ortográfica natural de nombres propios.
  spanish_consistency_notes:
  - Se mantuvo la coordinación serial con dos puntos tras el grupo de filiación, como en el inglés auditado.
  - Los nombres propios se presentan uniformemente sin notas explicativas, porque el pasaje es una lista nominal sin tensiones semánticas o textuales documentadas.
  - Se prefirió una sola estrategia de transliteración hispanizada para evitar mezcla de grafías inglesas y españolas dentro de la misma serie.
