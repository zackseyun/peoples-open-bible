    rationale: La nota sobre שַׁעַר debe anclarse a «puerta», y la nota sobre «length» debe anclarse a «longitud de la puerta» o a «longitud». Tal como está, el lector entenderá erróneamente que las notas explican la cifra o la unidad de medida.
  - severity: low
