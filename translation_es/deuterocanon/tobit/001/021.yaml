translation:
  language: es
  text: Y antes de que pasaran cincuenta días[a], sus dos hijos lo mataron y huyeron a los montes de Ararat. Y Sacherdonos, su hijo, reinó en su lugar, y nombró a Achiacharos, hijo de Anael, sobrino mío[b], sobre todas las cuentas de su reino y sobre toda la administración.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sacherdonos es la forma griega del nombre real asirio que en español suele rendirse como Esarhadón.
    reason: lexical_alternative
  - marker: b
    text: Achiacharos es la forma griega del nombre que a menudo se conoce como Ahikar. El griego dice literalmente «hijo de Anael, hijo de mi hermano», es decir, «sobrino mío».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ διῆλθον ἡμέραι πεντήκοντα ἕως οὗ
  english_pob_choice: before fifty days had passed
  chosen_spanish: antes de que pasaran cincuenta días
  alternatives_spanish:
  - no pasaron cincuenta días hasta que
  - a los cincuenta días no habían pasado
  lexicon: LSJ
  rationale: El griego expresa un límite temporal breve con la idea de que no transcurrieron cincuenta días antes del hecho; en español, «antes de que pasaran cincuenta días» conserva esa relación temporal sin sonar forzado.
- source_word: ἀπέκτειναν
  english_pob_choice: killed
  chosen_spanish: lo mataron
  alternatives_spanish:
  - lo asesinaron
  - lo dieron muerte
  lexicon: BDAG
  rationale: «Lo mataron» es la forma directa y neutral, y no añade una valoración moral explícita que el griego aquí no exige.
- source_word: ἔφυγον εἰς τὰ ὄρη Ἀραράθ
  english_pob_choice: fled to the mountains of Ararat
  chosen_spanish: huyeron a los montes de Ararat
  alternatives_spanish:
  - escaparon a los montes de Ararat
  - fueron huyendo a los montes de Ararat
  lexicon: LSJ
  rationale: «Huyeron» preserva el sentido de fuga posterior al homicidio; «montes» mantiene el plural del griego y suena natural en español.
- source_word: ἐβασίλευσεν ... ἀντʼ αὐτοῦ
  english_pob_choice: reigned in his place
  chosen_spanish: reinó en su lugar
  alternatives_spanish:
  - reinó en su puesto
  - gobernó en su lugar
  lexicon: LSJ
  rationale: La expresión española transmite con naturalidad la sucesión al trono y el reemplazo del rey anterior.
- source_word: ἔταξεν
  english_pob_choice: appointed
  chosen_spanish: puso
  alternatives_spanish:
  - nombró
  - designó
  lexicon: BDAG
  rationale: En este contexto administrativo, «puso» reproduce bien la colocación en un cargo, pero sin imponer un tecnicismo excesivo; «nombró» es posible, aunque menos cercano al matiz amplio del griego.
- source_word: ἐπὶ πᾶσαν τὴν ἐκλογιστείαν
  english_pob_choice: over all the accounts
  chosen_spanish: sobre todas las cuentas
  alternatives_spanish:
  - sobre toda la contabilidad
  - sobre todos los registros
  lexicon: LSJ
  rationale: «Cuentas» refleja el campo de cálculo/rendición de cuentas del sustantivo griego y mantiene el paralelo con la otra esfera administrativa.
- source_word: διοίκησιν
  english_pob_choice: administration
  chosen_spanish: administración
  alternatives_spanish:
  - gobierno
  - gestión
  lexicon: LSJ
  rationale: «Administración» es el equivalente español más directo para la supervisión general de los asuntos del reino.
- source_word: Σαχερδονός / Ἀχιάχαρον / Ἀναήλ
  english_pob_choice: Sacherdonos / Achiacharos / Anael
  chosen_spanish: Sacherdonos / Achiacharos / Anael
  alternatives_spanish:
  - Esarhadón / Ahikar / Hananiel
  - Sacherdón / Ahiajaros / Anael
  lexicon: 'DOCTRINE.md: Translate titles; transliterate names.'
  rationale: Se conservan las formas transliteradas del griego, conforme a la política del proyecto de seguir el testimonio de la fuente base sin armonizar con formas históricas o más familiares.
theological_decisions:
- issue: Forma de los nombres propios en una traducción bíblica de base griega
  english_pob_reading: Use transliterations reflecting the Greek source text in the main line
  chosen_spanish_reading: Mantener las transliteraciones griegas en la línea principal
  alternative_spanish_readings:
  - usar formas tradicionales históricas como Esarhadón y Ahikar
  rationale: 'No hay una cuestión doctrinal, pero sí una decisión de política traductora relevante: la línea principal conserva las formas griegas porque el texto base es la Septuaginta de Swete y el proyecto prioriza la evidencia de la fuente original traducida.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
translation_notes:
  revision_awareness: 'Se siguió la corrección del repaso final que aclara la genealogía: el griego significa «Achiacharos, hijo de Anael, hijo de mi hermano», no «hijo de Anael mi hermano». Por eso la redacción española coloca ambas relaciones de filiación de modo explícito: «hijo de Anael, hijo de mi hermano».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero no aparece en este versículo.
  - Se prefirió «montes de Ararat» para conservar el plural del griego.
  - «Cuentas» y «administración» reproducen la doble esfera administrativa del original sin fusionarlas.
  - Los nombres propios se dejaron transliterados desde el griego, en coherencia con el audit trail en inglés.
