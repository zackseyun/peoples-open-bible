revisions:
- from: 'Pero, al apoderarnos de ella, la interrogamos: «¿Quién era el hombre?» Y ella no nos reveló quién era; de esto damos testimonio.'
  to: 'Pero, tras sujetarla, la interrogamos: «¿Quién era el hombre?». Pero ella no nos dijo quién era; de esto damos testimonio.'
  rationale: Se ajusta la primera cláusula para reflejar con mayor naturalidad en español la aprehensión física de ἐπιλαβόμενοι, sin el matiz impropio de posesión que puede tener «apoderarnos de». También se simplifica «no nos reveló» a «no nos dijo» para corresponder mejor a ἀπήγγειλεν en este contexto. Se conserva el tono forense de «damos testimonio».
