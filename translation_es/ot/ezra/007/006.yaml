translation:
  language: es
  text: Este Esdras subió de Babilonia, y era un escriba hábil en la Ley de Moisés, que Yahvé, el Dios de Israel, había dado. Y el rey le concedió toda su petición, según la mano de Yahvé su Dios sobre él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «según la mano de Yahvé su Dios sobre él», un modismo para el favor, el poder o la ayuda providencial de Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָה מִבָּבֶל
  english_pob_choice: went up from Babylon
  chosen_spanish: subió de Babilonia
  alternatives_spanish:
  - subió desde Babilonia
  - fue a Babilonia
  lexicon: HALOT
  rationale: עלה con מן expresa movimiento ascendente o de salida desde un lugar. «Subió» conserva la dirección hebrea y su resonancia geográfica hacia Jerusalén mejor que un simple «vino»; «de Babilonia» mantiene el origen sin forzar el matiz idiomático.
- source_word: סֹפֵר
  english_pob_choice: scribe
  chosen_spanish: escriba
  alternatives_spanish:
  - secretario
  - erudito
  lexicon: HALOT
  rationale: En este contexto, reforzado por «en la Ley de Moisés», «escriba» preserva el oficio textual y legal-religioso. «Secretario» estrecha demasiado el sentido administrativo; «erudito» pierde el vínculo con el oficio de los textos.
- source_word: מָהִיר
  english_pob_choice: skilled
  chosen_spanish: hábil
  alternatives_spanish:
  - diestro
  - rápido
  - experto
  lexicon: HALOT
  rationale: El adjetivo puede aludir a rapidez, disposición o competencia. En español, «hábil» comunica competencia funcional sin introducir una idea física de velocidad. «Experto» suena más interpretativo; «rápido» sería engañoso en este contexto.
- source_word: בְּתוֹרַת מֹשֶׁה
  english_pob_choice: in the Law of Moses
  chosen_spanish: en la Ley de Moisés
  alternatives_spanish:
  - en la instrucción de Moisés
  - en la Torá de Moisés
  lexicon: HALOT
  rationale: Aunque תּוֹרָה puede significar «instrucción», en el marco posexílico de Esdras la equivalencia habitual y más clara es «Ley». «Torá» conserva el término técnico, pero sería menos transparente para lectores generales; «instrucción» debilita el valor jurídico-covenantal.
- source_word: אֲשֶׁר נָתַן יְהוָה אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: which Yahweh, the God of Israel, had given
  chosen_spanish: que Yahvé, el Dios de Israel, había dado
  alternatives_spanish:
  - que Yahvé, el Dios de Israel, dio
  - que el Dios de Israel, Yahvé, había dado
  lexicon: HALOT
  rationale: La cláusula relativa modifica «la Ley de Moisés». El tiempo pluscuamperfecto en español refleja la anterioridad respecto a la descripción de Esdras. «Yahvé» preserva el nombre divino sin sustitución litúrgica; «el Dios de Israel» sigue el hebreo sin invertir el orden de forma innecesaria.
- source_word: וַיִּתֶּן ל֣וֹ הַמֶּלֶךְ
  english_pob_choice: the king granted him
  chosen_spanish: el rey le concedió
  alternatives_spanish:
  - el rey le dio
  - el rey le otorgó
  lexicon: HALOT
  rationale: Como el objeto es una petición, «concedió» expresa mejor la respuesta favorable a una solicitud que un simple «dio». Mantiene el valor de נתן sin perder naturalidad en español.
- source_word: כְּיַד יְהוָה אֱלֹהָיו עָלָיו
  english_pob_choice: according to the hand of Yahweh his God upon him
  chosen_spanish: según la mano de Yahvé su Dios sobre él
  alternatives_spanish:
  - conforme a la mano de Yahvé su Dios sobre él
  - según el favor de Yahvé su Dios sobre él
  lexicon: HALOT
  rationale: 'Se retiene la imagen concreta de «la mano» para no resolver la tensión interpretativa del hebreo. «Sobre él» reproduce עָלָיו y deja abierta la gama de sentidos: favor, poder o ayuda providencial. «Favor» explicita demasiado el idiomA y pierde la metáfora.'
- source_word: כֹּל בַּקָּשָׁתוֹ
  english_pob_choice: all his request
  chosen_spanish: todo lo que pidió
  alternatives_spanish:
  - toda su petición
  - todo su pedido
  lexicon: HALOT
  rationale: El sustantivo singular con כֹּל puede representarse naturalmente en español como una frase verbal. «Todo lo que pidió» comunica la totalidad de la solicitud sin sonar artificioso; «petición» sería más formal, pero menos idiomático en esta construcción.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa el Tetragrama directamente. En esta serie, el español debe transliterar el nombre propio divino como «Yahvé» en lugar de sustituirlo por un título. Esto conserva la distinción entre nombre y título y sigue el criterio del proyecto para יְהוָה.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Whether to preserve the hand idiom without interpretation
  english_pob_reading: Retain the hand idiom in the main text
  chosen_spanish_reading: Retener el modismo de la mano de Yahvé sobre él
  alternative_spanish_readings:
  - porque Yahvé su Dios lo favorecía
  - por el poder de Yahvé su Dios sobre él
  rationale: 'El hebreo admite más de una lectura legítima: favor, poder o ayuda providencial. La traducción conserva la metáfora para no eliminar esa amplitud semántica ni imponer una sola explicación.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador sigue de cerca la decisión revisada del texto inglés, que mantuvo sin cambios la lectura principal y preservó el modismo de la mano divina. No se incorporaron expansiones como «buena mano», porque el hebreo de este versículo no incluye el adjetivo correspondiente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - «Ley de Moisés» conserva la terminología establecida del proyecto para תּוֹרָה en este contexto.
  - La cláusula de la mano divina permanece metafórica en el cuerpo del texto y solo se explica en nota.
  - «Concedió» se usa para reflejar una petición atendida, sin añadir contenido no explícito en el hebreo.
