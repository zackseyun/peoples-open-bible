id: HOS.11.4
reference: Hosea 11:4
source:
  edition: WLC
  text: בְּ/חַבְלֵ֨י אָדָ֤ם אֶמְשְׁכֵ/ם֙ בַּ/עֲבֹת֣וֹת אַהֲבָ֔ה וָ/אֶהְיֶ֥ה לָ/הֶ֛ם כִּ/מְרִ֥ימֵי עֹ֖ל עַ֣ל לְחֵי/הֶ֑ם וְ/אַ֥ט אֵלָ֖י/ו אוֹכִֽיל׃
translation:
  text: I drew them with cords of a man[a], with ropes of love; and I was to them like those who lift a yoke from their jaws[b], and I bent down to him and fed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with human cords.' The Hebrew idiom may emphasize humane, gentle leading rather than literal cords belonging to a man.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to him ... fed him'; many translations smooth this to 'to them ... fed them' to match the surrounding plurals.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּחַבְלֵי אָדָם
  chosen: with cords of man
  alternatives:
  - with human cords
  - with cords of humankind
  lexicon: HALOT
  rationale: חַבְלֵי denotes cords/bands. אָדָם is singular and, per doctrine guidance, should be rendered gender-accurately; here the phrase likely contrasts humane/gentle leading with animal handling. I retained the more formal 'of man' in the main text to preserve the Hebrew idiom and parallelism, while preserving the more interpretive 'human cords' as an alternative.
- source_word: אֶמְשְׁכֵם
  chosen: I drew them
  alternatives:
  - I led them
  - I pulled them
  lexicon: HALOT
  rationale: משך commonly means draw/pull. 'Drew' fits both literal and metaphorical attraction and works naturally with the following imagery of cords and love.
- source_word: בַּעֲבֹתוֹת אַהֲבָה
  chosen: with ropes of love
  alternatives:
  - with bands of love
  - with cords of love
  lexicon: HALOT
  rationale: עֲבֹתוֹת are thick cords/ropes. Because חַבְלֵי already uses 'cords,' I varied here to 'ropes' to preserve the lexical distinction while keeping the poetic parallel. אַהֲבָה is straightforwardly 'love.'
- source_word: וָאֶהְיֶה לָהֶם
  chosen: and I was to them
  alternatives:
  - and I became to them
  - and I was for them
  lexicon: HALOT
  rationale: A simple existential/copular sense best fits the simile that follows.
- source_word: כִּמְרִימֵי עֹל
  chosen: like those who lift a yoke
  alternatives:
  - like one who lifts a yoke
  - like lifters of a yoke
  lexicon: HALOT
  rationale: The participial plural is somewhat unusual. 'Like those who lift a yoke' preserves the plural form without over-resolving whether it is an abstract plural or a singular comparison.
- source_word: עַל לְחֵיהֶם
  chosen: from their jaws
  alternatives:
  - from their cheeks
  - from upon their jaws
  lexicon: HALOT
  rationale: לְחִי can mean jaw/cheek. In the context of removing or lifting a yoke from an animal, 'jaws' better conveys the area where the yoke presses and suits the husbandry image.
- source_word: וְאַט
  chosen: and I bent down
  alternatives:
  - and I gently lowered myself
  - and I stooped
  lexicon: HALOT
  rationale: The verb conveys bending/stooping. 'Bent down' is clear modern English and preserves the image of condescending care.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - to them
  lexicon: HALOT
  rationale: The Masoretic text has singular pronominal suffix. I retained the singular in translation rather than smoothing it to the preceding plural, since the shift may be stylistic or collective-singular. The plural alternative is worth preserving in a footnote because many readers will expect agreement.
- source_word: אוֹכִיל
  chosen: fed him
  alternatives:
  - gave him food
  - caused him to eat
  lexicon: HALOT
  rationale: The Hiphil of אכל means cause to eat/feed. 'Fed him' is the most natural concise rendering.
