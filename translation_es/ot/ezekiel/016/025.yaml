translation:
  language: es
  text: En cada cruce de caminos edificaste tu lugar alto[a], e hiciste detestable tu belleza. Abriste tus piernas a todo transeúnte y multiplicaste tu prostitución[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en cada cabeza del camino'; es decir, en cada cruce o encrucijada de caminos.
    reason: lexical_alternative
  - marker: b
    text: O 'multiplicaste tu prostituirte' no es adecuado en español; otra opción más literal y fuerte sería 'multiplicaste tu prostitución' o 'multiplicaste tu prostituirte/tu ramera conducta', según estilo. También puede expresarse como 'multiplicaste tu fornicación', aunque es menos natural hoy.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל כָּל רֹאשׁ דֶּרֶךְ
  english_pob_choice: At every street corner
  chosen_spanish: En cada encrucijada de camino
  alternatives_spanish:
  - En cada esquina de calle
  - En cada cruce de caminos
  - En cada cabezo de camino
  lexicon: HALOT; WLC morphology
  rationale: The Hebrew literally says 'to/at every head of the way,' an idiom for a public road junction. 'En cada encrucijada de camino' preserves the literal road-junction sense and the public, exposed setting without forcing a modern urban image like 'street corner'.
- source_word: רָמָה
  english_pob_choice: high place
  chosen_spanish: tu altura
  alternatives_spanish:
  - tu lugar alto
  - tu alto lugar
  - tu altares alto
  lexicon: HALOT
  rationale: In this prophetic context רָמָה can refer to a cultic height/high place. Spanish 'altura' keeps the elevation idea while leaving the cultic implication to the context. I avoided 'lugar alto' in the main line because it sounds explanatory and less compact; the English POB kept 'high place' for the cultic sense.
- source_word: וַתְּתַעֲבִי אֶת יָפְיֵךְ
  english_pob_choice: you made your beauty detestable
  chosen_spanish: hiciste detestable tu belleza
  alternatives_spanish:
  - volviste abominable tu belleza
  - tu belleza te resultó abominable
  - profanaste tu belleza
  lexicon: HALOT
  rationale: תעב means to make detestable/abominable. 'Hiciste detestable tu belleza' is direct, idiomatic Spanish, and retains the tension that what was beautiful became repulsive.
- source_word: וַתְּפַשְּׂקִי אֶת רַגְלַיִךְ
  english_pob_choice: You spread your legs
  chosen_spanish: Abriste tus piernas
  alternatives_spanish:
  - Diste apertura a tus piernas
  - Separaste tus piernas
  - Extendiste tus piernas
  lexicon: HALOT
  rationale: The Hebrew image is a blunt sexual gesture. 'Abriste tus piernas' is a direct, publication-readable Spanish rendering that preserves the shame and concreteness without sounding unnaturally colloquial in all dialects.
- source_word: לְכָל עוֹבֵר
  english_pob_choice: to every passerby
  chosen_spanish: para todo transeúnte
  alternatives_spanish:
  - a todo el que pasaba
  - para todo el que pasaba
  - a cada passerby
  lexicon: HALOT
  rationale: עוֹבֵר is a participle meaning 'one passing by.' 'Transeúnte' is natural in Spanish and keeps the indefinite public sense of 'every passerby.'
- source_word: תַּרְבִּי
  english_pob_choice: multiplied
  chosen_spanish: multiplicaste
  alternatives_spanish:
  - aumentaste
  - hiciste crecer
  - incrementaste
  lexicon: HALOT
  rationale: The form intensifies the action of making more numerous. 'Multiplicaste' preserves that force more clearly than a weaker 'aumentaste'.
- source_word: תַּזְנוּתֵךְ
  english_pob_choice: your prostitution
  chosen_spanish: tu prostitución
  alternatives_spanish:
  - tu fornicación
  - tu deshonra sexual
  - tu prostitución ritual
  lexicon: HALOT
  rationale: The noun denotes prostitution/whoredom as prophetic imagery for covenant unfaithfulness. 'Prostitución' is the closest contemporary Spanish equivalent and preserves the sexual-commercial force without reverting to archaic church diction.
theological_decisions:
- issue: Preserving the public sexual-idolatrous metaphor without euphemism
  english_pob_reading: Use direct sexual language in the main text
  chosen_spanish_reading: Usar lenguaje sexual directo ('Abriste tus piernas', 'tu prostitución')
  alternative_spanish_readings:
  - '''Te ofreciste'''
  - '''Te prostituiste'''
  - '''Jugaste el papel de infiel'''
  rationale: The Hebrew is intentionally shocking and public. The Spanish draft keeps that force rather than softening it into a generalized moral statement, because the metaphor is part of the prophetic indictment.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering the cultic-height image while avoiding unnecessary interpretive expansion
  english_pob_reading: high place
  chosen_spanish_reading: altura
  alternative_spanish_readings:
  - lugar alto
  - alto lugar
  - santuario en las alturas
  rationale: '''Altura'' keeps the elevated-site idea and allows the cultic meaning to emerge from context, while ''lugar alto'' would sound more interpretive. This retains the tension between literal height and idolatrous shrine imagery.'
  doctrine_reference: Lexical-theological note on רָמָה in prophetic contexts
translation_notes:
  revision_awareness: 'This draft follows the latest audited English POB reading with no applied revisions. I preserved the same major lexical choices: public road-junction imagery, cultic ''high place'' sense, direct sexual metaphor, and ''prostitution'' for תַּזְנוּתֵךְ. The Spanish wording is adjusted for natural publication readability while staying close to the source and the English audit trail.'
  spanish_consistency_notes:
  - Usé 'Yahvé' no en este versículo porque el Tetragrámaton no aparece.
  - Conservé 'prostitución' como término principal para תַּזְנוּתֵךְ, en línea con la decisión auditada de evitar suavizaciones.
  - Mantuve el singular posesivo 'tu' en toda la línea para reflejar el discurso directo a la ciudad-persona.
  - Elegí 'encrucijada de camino' para sostener el valor geográfico público del hebreo sin perder la literalidad del giro 'cabeza del camino'.
