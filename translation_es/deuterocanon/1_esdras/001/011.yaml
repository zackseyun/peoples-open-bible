  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Pascua», «sacrificios» y el lenguaje cultual están bien manejados. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión de mantener «a todo el pueblo» con nota explicativa coincide con el rastro de auditoría inglés.
