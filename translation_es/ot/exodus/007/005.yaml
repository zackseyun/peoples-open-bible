revisions:
- from: Y los egipcios sabrán que yo soy Yahvé, cuando extienda mi mano contra Egipto y saque a los hijos de Israel de en medio de ellos.
  to: Y los egipcios sabrán que yo soy Yahvé cuando extienda mi mano contra Egipto y saque a los hijos de Israel de entre ellos.
  rationale: 'Se hicieron ajustes menores de estilo y naturalidad en español: se eliminó una coma innecesaria y se reemplazó «de en medio de ellos» por «de entre ellos», manteniendo intacto el sentido del texto fuente y las decisiones léxicas principales del proyecto.'
