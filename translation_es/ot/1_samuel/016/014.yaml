translation:
  language: es
  text: Ahora bien, el Espíritu de Yahvé se había apartado de Saúl, y un espíritu malo[a] de Yahvé lo aterraba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dañino» o «perturbador». El adjetivo hebreo puede denotar lo que es malo, dañino o calamitoso en su efecto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/ר֧וּחַ יְהוָ֛ה
  english_pob_choice: the Spirit of the LORD
  chosen_spanish: el Espíritu de Yahvé
  alternatives_spanish:
  - el espíritu de Yahvé
  - el רוח de Yahvé
  lexicon: HALOT
  rationale: רוּחַ puede significar espíritu, viento o aliento. En este contexto narrativo se trata de la presencia divina activa, por lo que «Espíritu» es la mejor opción. Se usa «Yahvé» de forma consistente con el criterio del proyecto, y la mayúscula en «Espíritu» señala que no se trata de una fuerza impersonal.
- source_word: סָ֖רָה מֵ/עִ֣ם
  english_pob_choice: had departed from
  chosen_spanish: se había apartado
  alternatives_spanish:
  - había partido de
  - se había alejado de
  - había dejado de estar con
  lexicon: HALOT
  rationale: סוּר puede significar apartarse, retirarse o alejarse. «Se había apartado» comunica bien la idea de retirada o cese de presencia sin sobrecargar el texto. El complemento siguiente «de Saúl» completa de manera natural el valor de מֵעִם.
- source_word: שָׁא֑וּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - —
  lexicon: Nombre propio estándar
  rationale: Se translitera el nombre personal con la forma usual en español bíblico.
- source_word: וּ/בִֽעֲתַ֥תּ/וּ
  english_pob_choice: terrified him
  chosen_spanish: lo aterraba
  alternatives_spanish:
  - lo aterrorizaba
  - lo amedrentaba
  - lo espantaba
  lexicon: HALOT
  rationale: בעת expresa terror repentino o intenso. «Lo aterraba» mantiene el efecto continuo o repetido del imperfecto y comunica la intensidad del verbo sin volverlo demasiado idiomático en sentido leve.
- source_word: רֽוּחַ רָעָ֖ה
  english_pob_choice: an evil spirit
  chosen_spanish: un espíritu malo
  alternatives_spanish:
  - un espíritu maligno
  - un espíritu dañino
  - un espíritu de mal
  lexicon: HALOT
  rationale: רָעָה puede referirse a mal moral, daño o calamidad. En español, «espíritu malo» conserva la tensión semántica sin fijarla de modo exclusivo en una lectura demonológica o moralizante más fuerte de lo que exige el hebreo. Se evita reemplazarlo automáticamente por «maligno», que en español suele sonar más teológico y menos polisémico.
- source_word: מֵ/אֵ֥ת יְהוָֽה
  english_pob_choice: from the LORD
  chosen_spanish: de parte de Yahvé
  alternatives_spanish:
  - de Yahvé
  - procedente de Yahvé
  - enviad[o/a] por Yahvé
  lexicon: HALOT
  rationale: מֵאֵת indica procedencia u origen. «De parte de Yahvé» expresa esa fuente sin añadir explícitamente la idea interpretativa de envío. Se mantiene así la tensión teológica del texto al atribuir el origen al mismo Yahvé.
theological_decisions:
- issue: Cómo expresar el origen divino del espíritu perturbador sin suavizar la atribución a Yahvé ni resolverla por paráfrasis
  english_pob_reading: an evil spirit from the LORD
  chosen_spanish_reading: un espíritu malo de parte de Yahvé
  alternative_spanish_readings:
  - un espíritu dañino de parte de Yahvé
  - un espíritu perturbador de parte de Yahvé
  - un espíritu malo enviado por Yahvé
  rationale: El hebreo atribuye explícitamente la procedencia del espíritu a Yahvé. La traducción española conserva esa tensión, en lugar de cambiarla por una formulación explicativa como «enviado por Yahvé». Al mismo tiempo, «malo» mantiene abierta la gama de sentido de רָעָה, que puede abarcar mal, daño o calamidad.
  doctrine_reference: 'Translation philosophy §3 (preservar la tensión teológica en lugar de resolverla); término de nombre divino: יְהוָה → Yahvé'
translation_notes:
  revision_awareness: Se siguió el dictamen de alta concordancia del último pase y no hubo revisiones aplicadas en el expediente inglés. La formulación española busca ser fiel al hebreo y al mismo tiempo fluida para lectura pública, preservando la tensión semántica de רָעָה mediante una nota y evitando resolver interpretivamente el origen del espíritu.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de «SEÑOR» según el estándar del proyecto.
  - «Espíritu» se capitaliza cuando se refiere al Espíritu de Yahvé.
  - Se eligió «espíritu malo» en el texto principal y se reservó la alternativa semántica en nota.
  - «De parte de Yahvé» conserva la procedencia sin añadir la noción de envío.
  - El imperfecto hebreo se vierte con un pretérito pluscuamperfecto en la primera cláusula para reflejar el estado resultante y con imperfecto en la segunda para la acción continua o repetida.
