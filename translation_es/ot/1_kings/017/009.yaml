translation:
  language: es
  text: Levántate[a], ve a Sarepta, que pertenece a Sidón, y quédate allí. Mira[b], he mandado allí a una viuda para que te provea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «levántate», «sal» o «ponte en camino». El hebreo presenta dos imperativos encadenados que llaman a una acción inmediata.
    reason: lexical_alternative
  - marker: b
    text: O «he dispuesto» o «he preparado» a una viuda allí. El hebreo dice literalmente «he mandado», y la traducción conserva esa formulación.
    reason: alternative_reading
lexical_decisions:
- source_word: ק֣וּם
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Levántate ya
  lexicon: HALOT
  rationale: El imperativo de קום pide una acción inmediata de levantarse; «Levántate» es natural en español y conserva la fuerza directiva sin sonar arcaico.
- source_word: לֵ֤ךְ
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - anda
  - vete
  lexicon: HALOT
  rationale: El imperativo de הלך en un mandato de desplazamiento se expresa de manera directa con «ve»; es breve, idiomático y fiel al movimiento ordenado.
- source_word: צָרְפַתָ/ה֙
  english_pob_choice: Zarephath
  chosen_spanish: Sarepta
  alternatives_spanish:
  - Zarefat
  - Zarepta
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; «Sarepta» es la forma española tradicional y comprensible, adecuada para un texto bíblico en castellano.
- source_word: אֲשֶׁ֣ר לְ/צִיד֔וֹן
  english_pob_choice: which belongs to Sidon
  chosen_spanish: que pertenece a Sidón
  alternatives_spanish:
  - que está en Sidón
  - que está cerca de Sidón
  lexicon: HALOT
  rationale: La relación con ל־צידון puede expresar afiliación o pertenencia, no solo ubicación. «Pertenece a Sidón» conserva esa relación regional/política sin resolverla demasiado en una sola opción geográfica.
- source_word: וְ/יָשַׁבְתָּ֖ שָׁ֑ם
  english_pob_choice: and stay there
  chosen_spanish: y quédate allí
  alternatives_spanish:
  - y vive allí
  - y habita allí
  lexicon: HALOT
  rationale: La forma verbal funciona como continuación imperativa; «quédate allí» comunica con naturalidad la orden de residir en ese lugar.
- source_word: הִנֵּ֨ה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención sobre la declaración siguiente; «Mira» conserva esa función discursiva en español moderno mejor que «He aquí».
- source_word: צִוִּ֥יתִי
  english_pob_choice: I have commanded
  chosen_spanish: he mandado
  alternatives_spanish:
  - he ordenado
  - he dispuesto
  lexicon: HALOT
  rationale: צוה expresa mandar/ordenar. «He mandado» preserva la fuerza verbal y el tono directo del hebreo, sin suavizarlo interpretativamente.
- source_word: אִשָּׁ֥ה אַלְמָנָ֖ה
  english_pob_choice: a widow
  chosen_spanish: a una viuda
  alternatives_spanish:
  - una mujer viuda
  - una viuda
  lexicon: HALOT
  rationale: La construcción nominal apunta naturalmente a «viuda»; en español, «a una viuda» conserva el valor del objeto directo de la comisión divina y suena fluido.
- source_word: לְ/כַלְכְּלֶֽ/ךָ
  english_pob_choice: to provide for you
  chosen_spanish: para que te provea
  alternatives_spanish:
  - para sustentarte
  - para mantenerte
  lexicon: HALOT
  rationale: כלכל implica sostener/proveer sustento. «Provea» mantiene amplitud semántica de ayuda material y no restringe innecesariamente el sentido a solo comida.
theological_decisions:
- issue: El sentido teológico de que Yahvé dice haber «mandado» a la viuda
  english_pob_reading: Retain the direct wording 'I have commanded' without softening it.
  chosen_spanish_reading: Conservar «he mandado» sin convertirlo en una formulación más interpretativa como «he dispuesto» o «he preparado».
  alternative_spanish_readings:
  - he dispuesto a una viuda allí
  - he preparado a una viuda allí
  rationale: El hebreo צִוִּיתִי dice literalmente que Dios «mandó». La traducción mantiene esa afirmación y, con ella, la tensión narrativa sobre cómo se cumple el mandato en la viuda antes de que ella aparezca consciente de ello.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No hubo cambios en la revisión más reciente; el pasaje mostró alto grado de acuerdo y no requirió ajustes respecto del contexto auditado en inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en el flujo de la traducción POB, pero en este versículo el sujeto está implícito en el verbo y no necesita añadirse.
  - Se mantiene «Sarepta» como forma española habitual del topónimo, en lugar de transliteración más estrecha.
  - «Provea» conserva la amplitud de כלכל sin limitar el sentido a provisión alimentaria exclusivamente.
  - Las notas al pie preservan la tensión textual entre traducción literal y opciones interpretativas, siguiendo el registro auditado en inglés.
