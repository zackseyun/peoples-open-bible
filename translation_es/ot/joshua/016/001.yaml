revisions:
- from: Y salió la suerte para los hijos de José desde el Jordán en Jericó[a], hasta las aguas de Jericó, al oriente, por el desierto[b], subiendo desde Jericó a la región montañosa de Betel.
  to: Y salió la suerte para los hijos de José desde el Jordán junto a Jericó, hasta las aguas de Jericó al oriente, por la región desértica[a], subiendo desde Jericó a la región montañosa de Betel[b].
  rationale: Se ajustó 'en Jericó' a 'junto a Jericó' para una geografía más natural en español; se reemplazó 'desierto' por 'región desértica' para reflejar mejor הַמִּדְבָּר según la auditoría POB; y se rehízo el sistema de notas para que la nota léxica aporte una alternativa real, manteniendo la nota cultural sobre las aguas de Jericó con anclaje visible en el texto. También se movió el anclaje [b] a 'Betel' por proximidad textual, ya que la nota quedó como la única nota restante aplicable al tramo sobre 'las aguas de Jericó'.
