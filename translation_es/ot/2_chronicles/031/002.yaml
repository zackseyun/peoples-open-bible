translation:
  language: es
  text: Y Ezequías estableció las divisiones de los sacerdotes y de los levitas conforme a sus divisiones[a], cada hombre según su servicio, tanto los sacerdotes como los levitas, para holocaustos y para sacrificios de paz[b], para ministrar y para dar gracias y para alabar en las puertas del campamento[c] de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cursos», para las agrupaciones organizadas de sacerdotes y levitas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ofrendas de paz» o «ofrendas de comunión» para שְׁלָמִים.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «de los campamentos de Yahvé»; algunos entienden esto de manera más interpretativa como «de los atrios de Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲמֵד
  english_pob_choice: appointed
  chosen_spanish: estableció
  alternatives_spanish:
  - designó
  - apuntó
  - nombró
  lexicon: HALOT
  rationale: En este contexto administrativo-cultual, el verbo expresa organizar y asignar funciones. 'Estableció' comunica con naturalidad que Ezequías puso en orden esas divisiones, sin reducir el acto a una mera acción física.
- source_word: מַחְלְקוֹת
  english_pob_choice: divisions
  chosen_spanish: divisiones
  alternatives_spanish:
  - cursos
  - secciones
  - turnos
  lexicon: HALOT
  rationale: El término describe agrupaciones organizadas de sacerdotes y levitas. 'Divisiones' mantiene la transparencia estructural del hebreo y coincide con la decisión inglesa auditada.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los clérigos
  - los ministros
  lexicon: HALOT
  rationale: '''Sacerdotes'' es la equivalencia directa y cultualmente precisa para el oficio del templo.'
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levítico
  - los descendientes de Leví
  lexicon: HALOT
  rationale: '''Levitas'' es el designación tribal/cultual estándar y suficientemente clara en español.'
- source_word: עַל מַחְלְקוֹתָם
  english_pob_choice: according to their divisions
  chosen_spanish: conforme a sus divisiones
  alternatives_spanish:
  - según sus divisiones
  - por sus divisiones
  lexicon: HALOT
  rationale: La preposición hebrea y la repetición del sustantivo indican correspondencia organizativa. 'Conforme a' conserva esa idea de ajuste ordenado sin sonar forzado.
- source_word: אִישׁ כְּפִי עֲבֹדָתוֹ
  english_pob_choice: each man according to his service
  chosen_spanish: cada hombre según su servicio
  alternatives_spanish:
  - cada uno según su servicio
  - cada hombre conforme a su tarea
  lexicon: HALOT
  rationale: Se conserva el distributivo singular masculino del hebreo. 'Servicio' mantiene el sentido cultual de עבודה sin importar terminología eclesiástica posterior.
- source_word: עֲבֹדָה
  english_pob_choice: service
  chosen_spanish: servicio
  alternatives_spanish:
  - ministerio
  - trabajo
  - tarea
  lexicon: HALOT
  rationale: En contexto del templo, 'servicio' comunica la labor asignada y el carácter cultual del término.
- source_word: לַכֹּהֲנִים וְלַלְוִיִּם
  english_pob_choice: the priests and the Levites
  chosen_spanish: tanto los sacerdotes como los levitas
  alternatives_spanish:
  - para los sacerdotes y los levitas
  - los sacerdotes y los levitas
  lexicon: HALOT
  rationale: El hebreo retoma y especifica los grupos ya mencionados. 'Tanto... como...' expresa bien el valor apposicional y resalta que ambos grupos están incluidos.
- source_word: לְעֹלָה
  english_pob_choice: for burnt offerings
  chosen_spanish: para holocaustos
  alternatives_spanish:
  - para ofrendas quemadas
  - para ofrendas holocausto
  lexicon: HALOT
  rationale: '''Holocaustos'' es el término tradicional y técnicamente reconocible para la ofrenda totalmente quemada. Se mantiene la categoría sacrificial explícita del hebreo.'
- source_word: וְלִשְׁלָמִים
  english_pob_choice: and peace offerings
  chosen_spanish: y para sacrificios de paz
  alternatives_spanish:
  - y para ofrendas de paz
  - y para ofrendas de comunión
  lexicon: HALOT
  rationale: '''Sacrificios de paz'' sigue de cerca la categoría hebrea שְׁלָמִים y preserva la equivalencia directa que la auditoría inglesa defendió frente a la opción interpretativa ''fellowship offerings''.'
- source_word: לְשָׁרֵת
  english_pob_choice: to minister
  chosen_spanish: para ministrar
  alternatives_spanish:
  - para servir
  - para atender
  lexicon: HALOT
  rationale: En el marco del templo, 'ministrar' comunica servicio sagrado de manera clara y digna, acorde con el valor cultual del verbo.
- source_word: וּלְהֹדוֹת
  english_pob_choice: and to give thanks
  chosen_spanish: y para dar gracias
  alternatives_spanish:
  - y para agradecer
  - y para ofrecer acción de gracias
  lexicon: HALOT
  rationale: El verbo en este contexto litúrgico expresa acción de gracias, y 'dar gracias' es la forma natural y fiel en español.
- source_word: וּלְהַלֵּל
  english_pob_choice: and to praise
  chosen_spanish: y para alabar
  alternatives_spanish:
  - y para celebrar
  - y para ensalzar
  lexicon: HALOT
  rationale: '''Alabar'' reproduce con exactitud el sentido de הלל en contexto de adoración y evita añadir matices no explícitos.'
- source_word: בְּשַׁעֲרֵי מַחֲנוֹת יְהוָה
  english_pob_choice: in the gates of the camp of Yahweh
  chosen_spanish: en las puertas de los campamentos de Yahvé
  alternatives_spanish:
  - en las puertas del campamento de Yahvé
  - en las puertas de los atrios de Yahvé
  lexicon: HALOT
  rationale: Se preserva la imagen plural de מַחֲנוֹת y la localización en 'las puertas'. La forma plural 'campamentos' mantiene la transparencia del hebreo, aunque en una nota se deja abierta la alternativa singular más interpretativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue la terminología del proyecto para el Tetragrámaton, conservando el nombre divino 'Yahvé' en vez de una sustitución por título.
theological_decisions:
- issue: Mantenimiento del distributivo masculino singular אִישׁ
  english_pob_reading: each man according to his service
  chosen_spanish_reading: cada hombre según su servicio
  alternative_spanish_readings:
  - cada uno según su servicio
  rationale: El hebreo usa una expresión distributiva masculina singular. Aquí se preserva porque la referencia histórica son los oficios sacerdotales y levíticos, tradicionalmente masculinos en este contexto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Renderizado de שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: sacrificios de paz
  alternative_spanish_readings:
  - ofrendas de paz
  - ofrendas de comunión
  rationale: Se retiene la categoría sacrificial sin reemplazarla por una explicación más interpretativa. 'Sacrificios de paz' es directo y suficientemente reconocido para lectores bíblicos.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Imagen de מַחֲנוֹת יְהוָה
  english_pob_reading: the camp of Yahweh
  chosen_spanish_reading: los campamentos de Yahvé
  alternative_spanish_readings:
  - el campamento de Yahvé
  - los atrios de Yahvé
  rationale: Se conserva la pluralidad e imagen concreta del hebreo, en vez de normalizarla a 'atríos' o suavizarla. Esto mantiene la tensión textual documentada por la auditoría inglesa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada que ajustó la sintaxis para reflejar con mayor claridad la aposición (“tanto los sacerdotes como los levitas”) y conservó la localización en “las puertas” con la imagen singular/plural del hebreo. También mantiene la decisión de traducir el Tetragrámaton por Yahvé y de preservar la categoría sacrificial directa en vez de una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se mantiene la repetición de 'divisiones' para reflejar la estructura del hebreo.
  - '''Servicio'' y ''ministrar'' se reservan para el marco cultual del templo.'
  - La combinación 'holocaustos' / 'sacrificios de paz' conserva la taxonomía sacrificial sin explicaciones añadidas.
  - La nota de 'campamentos' deja visible la tensión textual del plural hebreo.
