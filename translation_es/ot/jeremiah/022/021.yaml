translation:
  language: es
  text: 'Te hablé en tu prosperidad[a], pero dijiste: «No escucharé».[b] Este ha sido tu camino desde tu juventud, porque no has escuchado mi voz.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en tu sosiego» o «en tu seguridad». El término hebreo puede denotar quietud, seguridad o prosperidad.
    reason: lexical_alternative
  - marker: b
    text: «Escuchar» también puede traducirse «obedecer» tanto aquí como en el uso posterior del mismo versículo; el verbo hebreo suele abarcar ambos sentidos en contextos de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבַּרְתִּי
  english_pob_choice: I spoke
  chosen_spanish: te hablé
  alternatives_spanish:
  - te hablé
  - te hablé a ti
  - te dirigí la palabra
  lexicon: HALOT
  rationale: El verbo דִּבַּרְתִּי introduce la palabra divina dirigida a la destinataria; en español, «te hablé» mantiene la relación directa y suena natural sin añadir interpretación.
- source_word: אֵלַיִךְ
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: HALOT
  rationale: El complemento con אֶל expresa dirección hacia la segunda persona femenina singular; el clítico «te» concentra esa dirección en español de forma idiomática.
- source_word: בְּשַׁלְוֺתַיִךְ
  english_pob_choice: in your prosperity
  chosen_spanish: en tu prosperidad
  alternatives_spanish:
  - en tu sosiego
  - en tu seguridad
  - en tu tranquilidad
  lexicon: HALOT
  rationale: שַׁלְוָה puede abarcar sosiego, seguridad o prosperidad. «Prosperidad» conserva bien el sentido de bienestar/bonanza del contexto, mientras que alternativas como «seguridad» o «tranquilidad» enfatizan más un matiz particular.
- source_word: אָמַרְתְּ
  english_pob_choice: you said
  chosen_spanish: dijiste
  alternatives_spanish:
  - respondiste
  - contestaste
  lexicon: HALOT
  rationale: La forma simple «dijiste» reproduce la respuesta directa sin sobredeterminar el matiz conversacional.
- source_word: לֹא אֶשְׁמָע
  english_pob_choice: I will not listen
  chosen_spanish: No escucharé
  alternatives_spanish:
  - No obedeceré
  - No oiré
  lexicon: HALOT
  rationale: שׁמע puede significar oír, escuchar y obedecer. «No escucharé» mantiene la imagen auditiva y deja abierta la implicación de obediencia, como en el texto hebreo y la decisión inglesa.
- source_word: זֶה דַרְכֵּךְ
  english_pob_choice: This has been your way
  chosen_spanish: Este ha sido tu camino
  alternatives_spanish:
  - Así has sido
  - Éste es tu camino
  lexicon: HALOT
  rationale: La cláusula nominal expresa una pauta de conducta persistente; en español, el pretérito perfecto «ha sido» comunica bien continuidad. «Camino» conserva la metáfora conductual.
- source_word: מִנְּעוּרַיִךְ
  english_pob_choice: from your youth
  chosen_spanish: desde tu juventud
  alternatives_spanish:
  - desde tus primeros años
  - desde tu niñez
  lexicon: HALOT
  rationale: La expresión idiomática se vierte de manera directa y natural con «desde tu juventud».
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón explicativa de la afirmación anterior; «porque» es claro y fiel.
- source_word: לֹא שָׁמַעַתְּ
  english_pob_choice: you have not listened
  chosen_spanish: no has escuchado
  alternatives_spanish:
  - no has obedecido
  - no escuchaste
  lexicon: HALOT
  rationale: Se conserva la repetición de שׁמע con el mismo verbo en español. «Has escuchado» refleja bien la persistencia de la falta de respuesta.
- source_word: בְּקוֹלִי
  english_pob_choice: to my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - a mi voz
  - a mi palabra
  - a mí
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; en español, «mi voz» mantiene la imagen original y funciona de manera natural con «escuchado».
theological_decisions:
- issue: Addressee personificada en femenino singular
  english_pob_reading: Retain second-person singular 'you' without specifying 'Jerusalem' or 'Judah' in the main text
  chosen_spanish_reading: Mantener la segunda persona singular femenina implícita, sin nombrar explícitamente a Jerusalén o Judá en el cuerpo del versículo
  alternative_spanish_readings:
  - Nombrar explícitamente a Jerusalén
  - Nombrar explícitamente a Judá o a la casa real
  rationale: El hebreo habla a una destinataria femenina singular, reflejo de la ciudad/nación personificada. El español puede conservar esa dirección personal con «te/tu» sin introducir una identificación interpretativa que el versículo no formula explícitamente.
  doctrine_reference: Preservar la tensión literaria y profética sin resolverla en el texto principal.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado final del inglés POB fue marcado como estable, con acuerdo alto y solo observaciones menores.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del cuerpo del versículo porque el hebreo aquí usa verbo de habla y escucha en primera persona/segunda persona sin el nombre divino explícito.
  - Se conservó la repetición de שׁמע con dos formas de «escuchar» para respetar el enlace retórico entre la negativa de la destinataria y la acusación final.
  - Se prefirió «prosperidad» como renderización principal de שַׁלְוָה por ser la opción ya auditada en inglés y por abarcar bienestar/seguridad sin cargar el texto con una interpretación demasiado estrecha.
