translation:
  language: es
  text: Entonces nos volvimos y partimos hacia el desierto por el camino del Mar Rojo[a], tal como Yahvé me había hablado, y rodeamos el monte Seír durante muchos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mar de Juncos». El nombre hebreo Yam Suf puede verterse más literalmente así.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנֵּפֶן
  english_pob_choice: Then we turned
  chosen_spanish: Entonces nos volvimos
  alternatives_spanish:
  - Entonces giramos
  - Entonces regresamos
  lexicon: HALOT
  rationale: El verbo expresa un cambio de dirección o giro en la marcha. «Nos volvimos» conserva ese giro narrativo sin añadir necesariamente la idea de “regresar”, que sería más fuerte de lo que exige el hebreo.
- source_word: וַנִּסַּע
  english_pob_choice: set out
  chosen_spanish: partimos
  alternatives_spanish:
  - salimos
  - nos pusimos en camino
  lexicon: HALOT
  rationale: En contextos de viaje, נסע comunica la partida, el levantar el campamento. «Partimos» es natural en español y mantiene la idea de salida emprendida.
- source_word: הַמִּדְבָּרָה
  english_pob_choice: for the wilderness
  chosen_spanish: hacia el desierto
  alternatives_spanish:
  - al desierto
  - en dirección al desierto
  lexicon: HALOT
  rationale: El he direccional indica movimiento hacia ese lugar. «Hacia el desierto» reproduce esa orientación de forma clara en español.
- source_word: דֶּרֶךְ יַם סוּף
  english_pob_choice: by the way of the Red Sea
  chosen_spanish: por el camino del Mar Rojo
  alternatives_spanish:
  - por el camino del mar de Juncos
  - por la ruta del Mar Rojo
  lexicon: HALOT
  rationale: דֶּרֶךְ aquí marca ruta o trayecto. «Por el camino del Mar Rojo» conserva la referencia geográfica tradicional y la relación de ruta. Se mantiene la alternativa literal en nota porque יַם סוּף puede entenderse más literalmente como «mar de juncos».
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה אֵלַי
  english_pob_choice: just as Yahweh had spoken to me
  chosen_spanish: tal como Yahvé me había hablado
  alternatives_spanish:
  - como Yahvé me habló
  - justo como Yahvé me había dicho
  lexicon: HALOT
  rationale: כַּאֲשֶׁר introduce comparación de conformidad; el sentido retrospectivo del relato se expresa bien con el pretérito pluscuamperfecto en español. «Me había hablado» mantiene la fuerza personal de דִּבֶּר אֵלַי.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé». Esto preserva el nombre propio divino en vez de sustituirlo por un título.'
- source_word: וַנָּסָב
  english_pob_choice: we went around
  chosen_spanish: rodeamos
  alternatives_spanish:
  - dimos la vuelta alrededor
  - circundamos
  lexicon: HALOT
  rationale: סבב en este contexto expresa ir alrededor o encerrar un recorrido. «Rodeamos» es idiomático y suficientemente preciso en español.
- source_word: אֶת הַר שֵׂעִיר
  english_pob_choice: Mount Seir
  chosen_spanish: el monte Seír
  alternatives_spanish:
  - el monte Seír
  - el monte de Seír
  lexicon: HALOT
  rationale: En topónimos bíblicos, הַר con nombre propio se traduce naturalmente como «el monte ...». «Seír» conserva la forma del nombre propio.
- source_word: יָמִים רַבִּים
  english_pob_choice: for many days
  chosen_spanish: por muchos días
  alternatives_spanish:
  - durante muchos días
  - muchos días
  lexicon: HALOT
  rationale: La expresión hebrea indica duración. «Por muchos días» comunica esa extensión temporal sin sobrerinterpretar.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La fuente hebrea usa directamente el Tetragrámaton. En español, la forma adoptada por defecto en este proyecto es «Yahvé», para preservar el nombre propio del pacto y no ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Treatment of יַם סוּף
  english_pob_reading: Red Sea
  chosen_spanish_reading: Mar Rojo
  alternative_spanish_readings:
  - mar de Juncos
  - Mar de Juncos
  rationale: La lectura principal del POB inglés sigue la referencia geográfica tradicional «Red Sea». En español, «Mar Rojo» es el equivalente establecido y legible; se conserva la alternativa más literal por la posibilidad lexical de יַם סוּף.
  doctrine_reference: English lexical note on יַם סוּף; lexical alternative retained in footnote
translation_notes:
  revision_awareness: Se siguió el paquete fuente con alta concordancia. No se introdujeron cambios de sentido respecto del inglés POB; la única tensión léxica relevante es יַם סוּף, donde se mantiene la referencia tradicional en el texto principal y la alternativa literal en nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה.
  - Se prefirió «desierto» para הַמִּדְבָּרָה por naturalidad en español, manteniendo la direccionalidad con «hacia».
  - «Por muchos días» conserva la duración del hebreo sin convertirla en una fórmula más interpretativa.
