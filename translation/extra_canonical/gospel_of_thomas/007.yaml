translation:
  text: Jesus said[a], “Blessed is this lion which the human will eat, so that the
    lion becomes human; and accursed is this human whom the lion will eat[d][c][b],
    and the lion will become human.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Makarios can also be rendered “happy” or “fortunate.” “Blessed” retains
      the sacral coloration of the Greek loan in Coptic.
    reason: lexical_alternative
  - marker: b
    text: “Human” translates Coptic prōme, a generic term for a person; “man” is a
      possible rendering but can be gendered in English.
    reason: lexical_alternative
  - marker: c
    text: The complement marker with ϣⲱⲡⲉ varies (r-/n-) in the manuscript, a dialectal/orthographic
      fluctuation with no change in sense (“become human”).
    reason: dialect_note
  - marker: d
    text: Or 'and the lion will become human; and accursed is this human whom the
      lion will eat, and the lion will become human.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲟⲩⲙⲁⲕⲁⲣⲓⲟⲥ
  chosen: blessed
  alternatives:
  - happy
  - fortunate
  lexicon: Crum; Greek loanword μακάριος used in Sahidic
  rationale: Maintains the traditional sacral register of the Greek loan while allowing
    the Thomasine beatitude tone; “happy/fortunate” are viable but less liturgical.
- source_word: ⲡⲙⲟⲩⲓ / ⲡⲙⲟⲩⲉⲓ (orth.)
  chosen: lion
  lexicon: Crum s.v. ⲙⲟⲩⲓ
  rationale: Standard meaning; orthographic ⲙⲟⲩⲉⲓ vs ⲙⲟⲩⲓ is not semantic.
- source_word: ⲡⲁⲓ (postposed demonstrative)
  chosen: this
  lexicon: Lambdin, Coptic Grammar (demonstratives)
  rationale: Thomas’ deictic emphasis is preserved; avoids smoothing to a generic
    article.
- source_word: ⲡⲣⲱⲙⲉ
  chosen: the human
  alternatives:
  - the man
  - a person
  lexicon: Crum s.v. ⲣⲱⲙⲉ
  rationale: Generic anthropos-sense; “man” is possible but risks gendered reading
    where Coptic is generic.
- source_word: ⲛⲁⲟⲩⲱⲙ ⲛⲧⲟϥ
  chosen: will eat it
  alternatives:
  - is going to eat it
  lexicon: Crum s.v. ⲟⲩⲱⲙ; Lambdin on future with ⲛⲁ- and object enclitic
  rationale: Future with ⲛⲁ-; enclitic ⲛⲧⲟϥ refers back to “lion,” hence “it.”
- source_word: ϣⲱⲡⲉ ⲣ̄/ⲛ ⲣⲱⲙⲉ
  chosen: become human
  alternatives:
  - become a human being
  - become a man
  lexicon: Layton, Coptic Grammar § on ϣⲱⲡⲉ + r= predicate complement
  rationale: Renders resultative “become” with human predication; keeps Thomas’ stark
    parallelism.
- source_word: ⲃⲱⲧⲉ
  chosen: accursed
  alternatives:
  - detested
  - abominable
  - woe to
  lexicon: Crum s.v. ⲃⲟⲧⲉ/ⲃⲱⲧⲉ
  rationale: Balances the polar pair with “blessed.” The term connotes being loathed/abhorred,
    hence “accursed” captures force.
- source_word: ⲛϭⲓ (topic particle)
  chosen: (untranslated; reflected in word order/emphasis)
  alternatives:
  - as for
  lexicon: Layton, Coptic Grammar (topic marking)
  rationale: English does not require an overt topic particle; emphasis is carried
    by “this” and clause structure.
- source_word: ⲉⲧⲉⲣⲉ (relative)
  chosen: which/whom
  alternatives:
  - that
  - who
  lexicon: Lambdin on relative clause with ⲉⲧⲉⲣⲉ + subject
  rationale: Preserves the headed relative structure governing the future verb.
textual_note: No lacunae or conjectural restorations are signaled by Dilley for this
  saying. Orthography shows ⲡⲙⲟⲩⲉⲓ (printed) normalized to ⲡⲙⲟⲩⲓ. The complement marker
  with ϣⲱⲡⲉ alternates between ⲣ̄- and ⲛ- (lines show ⲣ̄ⲣⲱⲙⲉ vs. ⲛⲣⲱⲙⲉ), a common
  Sahidic/Lycopolitan variation without semantic change; it introduces the predicate
  complement “(a) human.” The topic marker ⲛϭⲓ before ⲡⲣⲱⲙⲉ marks the second clause
  as a contrastive topic (“as for this human”). Enclitic ⲛⲧⲟϥ on ⲟⲩⲱⲙ indicates the
  lion as the object (“eat it”).
