revisions:
- from: Haz un recuento del botín tomado[a], tanto de hombres[b] como de animales, tú, Eleazar el sacerdote y los jefes de las casas paternas de la congregación[c].
  to: Haz un recuento del botín capturado[a], tanto de seres humanos[b] como de animales, tú, junto con Eleazar el sacerdote y los jefes de las casas paternas de la congregación[c].
  rationale: 'Se hicieron ajustes menores para mejorar fidelidad y legibilidad en español: ‘capturado’ suena más natural que ‘tomado’ con ‘botín’; ‘seres humanos’ expresa mejor el contraste de אָדָם con animales; ‘junto con’ integra mejor el pronombre enfático ‘tú’; y las notas ahora preservan de forma más directa las alternativas léxicas documentadas en el expediente inglés.'
