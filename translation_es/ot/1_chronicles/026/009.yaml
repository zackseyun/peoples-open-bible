translation:
  language: es
  text: Y Selemías tenía hijos y hermanos[a], hombres valientes[b], dieciocho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'para Selemías', una construcción hebrea que introduce a la persona que se está contando.
    reason: lexical_alternative
  - marker: b
    text: O 'hombres de valor'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לִ/מְשֶׁלֶמְיָהוּ
  english_pob_choice: And Shelemiah
  chosen_spanish: Y para Selemías
  alternatives_spanish:
  - Y Selemías
  - Y respecto de Selemías
  - Y para Shelemías
  lexicon: HALOT
  rationale: La construcción עם ל en este contexto genealógico introduce al personaje bajo consideración. En español, 'para' conserva bien ese valor de adscripción/enumeración sin forzar una paráfrasis. Se transcribe el nombre como Selemías, forma española natural y reconocible para el lector bíblico.
- source_word: בָּנִים
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - varones
  lexicon: HALOT
  rationale: El hebreo designa descendencia masculina. En español bíblico, 'hijos' comunica de manera natural esa filiación; 'hijos varones' sería más explícito pero más pesado, y 'varones' perdería la relación filial.
- source_word: וְ/אַחִים
  english_pob_choice: and brothers
  chosen_spanish: y hermanos
  alternatives_spanish:
  - y hermanos carnales
  - y parientes
  lexicon: HALOT
  rationale: La lectura básica es 'hermanos'. Aunque puede abarcar un sentido fraternal más amplio en algunos contextos, aquí la lista genealógica favorece el sentido inmediato de hermanos.
- source_word: בְּנֵי חָיִל
  english_pob_choice: valiant men
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - hombres de valor
  - hombres esforzados
  - valientes
  lexicon: HALOT
  rationale: El hebreo es un modismo, literalmente 'hijos de valor/fuerza'. 'Hombres valientes' reproduce bien el valor idiomático en español sin perder el matiz de capacidad y fuerza personal. 'Hombres de valor' también es posible, pero suena algo más abstracto.
- source_word: שְׁמוֹנָה עָשָׂר
  english_pob_choice: eighteen
  chosen_spanish: dieciocho
  alternatives_spanish:
  - '18'
  lexicon: HALOT
  rationale: Número cardinal estándar en español.
theological_decisions:
- issue: Valor de ל en una fórmula genealógica/enumerativa
  english_pob_reading: Literally, 'for Shelemiah,' a Hebrew construction introducing the person being counted.
  chosen_spanish_reading: '''para Selemías'' conserva la introducción del individuo listado sin convertirla en una frase explicativa.'
  alternative_spanish_readings:
  - '''respecto de Selemías'''
  - '''para Selemías'''
  rationale: No hay una tensión doctrinal, sino una cuestión sintáctica. En español, la preposición 'para' permite reflejar el hebreo con suficiente naturalidad y mantener la transparencia del texto fuente.
  doctrine_reference: N/A
- issue: Reproducción del apposicional final 'valiant men, eighteen'
  english_pob_reading: The revision reordered the English to reflect the Hebrew apposition more closely.
  chosen_spanish_reading: '''hombres valientes, dieciocho'' respeta la apposición final.'
  alternative_spanish_readings:
  - '''dieciocho hombres valientes'''
  - '''hombres valientes, dieciocho'''
  rationale: La revisión inglesa indica que el número funciona en aposición y no como adjetivo antepuesto. En español, colocar 'dieciocho' al final mantiene esa estructura y evita sugerir que se trata de 'dieciocho hombres valientes' como una sola unidad adjetival.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa reciente movió el número al final para reflejar la aposición hebrea ('valiant men, eighteen' en vez de 'eighteen valiant men'). La versión española sigue esa misma decisión sintáctica con 'hombres valientes, dieciocho'.
  spanish_consistency_notes:
  - Se conservó el nombre propio en forma española 'Selemías' para una lectura pública fluida.
  - No se usó 'SEÑOR' ni terminología no presente en el versículo.
  - Se mantuvo el orden final con el número en aposición, conforme al ajuste revisado del texto inglés.
