translation:
  language: es
  text: Envió entre ellos enjambres de moscas[a], que los devoraron, y ranas, que los destruyeron[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enjambres»; el hebreo עָרֹב puede denotar un enjambre de insectos más ampliamente, aunque tradicionalmente se entiende como moscas.
    reason: lexical_alternative
  - marker: b
    text: O «y los devoraron, y ranas, y las destruyeron». El hebreo permite también una coordinación más literal con verbos finitos repetidos.
    reason: alternative_reading
lexical_decisions:
- source_word: יְשַׁלַּח
  english_pob_choice: He sent
  chosen_spanish: Envió
  alternatives_spanish:
  - Mandó
  - Lanzó
  lexicon: HALOT
  rationale: El verbo piel de שׁלח aquí expresa el envío activo de una plaga sobre Egipto. «Envió» conserva esa acción causativa con una forma natural en español.
- source_word: בָּהֶם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - contra ellos
  lexicon: HALOT
  rationale: La preposición con sufijo marca la presencia de la plaga dentro de su ámbito. «Entre ellos» comunica bien la idea locativa sin endurecerla como «contra ellos».
- source_word: עָרֹב
  english_pob_choice: swarms of flies
  chosen_spanish: enjambres de moscas
  alternatives_spanish:
  - enjambres
  - un enjambre mixto
  - enjambres de insectos
  lexicon: HALOT
  rationale: El hebreo puede señalar un enjambre/plaga de insectos; en el contexto del Éxodo, la tradición lo entiende como moscas. «Enjambres de moscas» mantiene la imagen de enjambre y aclara el referente en español.
- source_word: וַיֹּאכְלֵם
  english_pob_choice: which devoured them
  chosen_spanish: que los devoraron
  alternatives_spanish:
  - que los consumieron
  - que los comieron
  lexicon: HALOT
  rationale: «Devoraron» conserva la fuerza destructiva de אכל en lenguaje de plaga. El español permite concordar con el colectivo plural «enjambres».
- source_word: וּצְפַרְדֵּעַ
  english_pob_choice: and frogs
  chosen_spanish: y ranas
  alternatives_spanish:
  - y las ranas
  lexicon: HALOT
  rationale: El singular hebreo funciona colectivamente; en español el plural natural es «ranas».
- source_word: וַתַּשְׁחִיתֵם
  english_pob_choice: which destroyed them
  chosen_spanish: que los destruyeron
  alternatives_spanish:
  - que los arruinaron
  - que los devastaron
  lexicon: HALOT
  rationale: El verbo שׁחת comunica ruina o destrucción. «Destruyeron» refleja adecuadamente el tono de juicio plaguero y mantiene la concordancia con el plural colectivo.
theological_decisions:
- issue: Tratamiento del equivalente de la plaga עָרֹב en el texto principal
  english_pob_reading: swarms of flies
  chosen_spanish_reading: enjambres de moscas
  alternative_spanish_readings:
  - enjambres
  - un enjambre mixto
  - enjambres de insectos
  rationale: No se atenúa la identificación tradicional de la plaga. La traducción conserva la referencia concreta a moscas, pero deja visible la idea de enjambre que el hebreo permite.
  doctrine_reference: Éxodo 8:21-24; Salmo 78:45
- issue: Concordancia verbal con nombres colectivos singulares hebreos
  english_pob_reading: which devoured them ... which destroyed them
  chosen_spanish_reading: que los devoraron ... que los destruyeron
  alternative_spanish_readings:
  - que lo devoró ... que lo destruyó
  - que los devoraban ... que los destruían
  rationale: El hebreo usa sustantivos singulares con verbos singulares, pero la lectura inglesa ya resolvió la coordinación con plurales por claridad. En español, el plural colectivo 'enjambres' y el plural 'ranas' hacen natural la concordancia plural sin perder el sentido del original.
  doctrine_reference: Gramática hebrea de sustantivos colectivos en narración poética
translation_notes:
  revision_awareness: La auditoría inglesa mantiene la lectura óptima-equivalente con relativo 'which' para suavizar una coordinación hebrea algo áspera; en español se opta por una solución igualmente natural usando relativos («que...») y concordancia plural con los colectivos, sin perder la fuerza destructiva del original. No hubo cambios sustantivos de revisión en el último pase.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' por defecto, pero este versículo no contiene el nombre divino.
  - Se mantiene 'devoraron' y 'destruyeron' para reflejar el léxico intenso de juicio.
  - No se introduce 'Cristo' ni otra terminología ajena al salmo.
  - La nota a aclara la ambigüedad léxica de עָרֹב sin ocultar la lectura tradicional.
