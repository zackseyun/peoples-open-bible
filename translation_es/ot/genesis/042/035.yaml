revisions:
- from: Y aconteció que, mientras vaciaban sus costales[a], he aquí, en el costal de cada uno estaba su atado de plata; y vieron sus atados de plata, ellos y su padre, y tuvieron miedo.
  to: Y mientras vaciaban sus sacos, he aquí, el atado de plata de cada uno estaba en su saco[a]; y vieron sus atados de plata, ellos y su padre, y tuvieron miedo.
  rationale: Se corrigió la ubicación y el contenido de la nota para que corresponda al término hebreo צְרוֹר («atado/bolsa») y no a «sacos». También se aligeró la apertura para un español más natural, en línea con la revisión auditada en inglés, y se ajustó el orden sintáctico de la cláusula distributiva para mayor claridad sin perder la forma ni el énfasis del original.
