review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia hebrea y las decisiones del POB inglés: «acercó» para וַיַּקְרֵב, «clan» para מִשְׁפַּחַת, «fue tomado» para וַיִּלְכֹּד/וַיִּלָּכֵד, y «hombre por hombre» para לַגְּבָרִים. La nota alternativa también preserva adecuadamente el matiz literal. Sin embargo, el anclaje de la nota está mal colocado en «Judá» en vez de en la expresión correspondiente a «hombre por hombre / por los hombres».'
  spanish_quality_summary: El español es claro y legible. «Entonces... Luego...» funciona, aunque la corrección principal es mover la nota al lugar pertinente. También conviene capitalizar el gentilicio derivado del nombre propio como «Zerahitas» para mayor consistencia con nombres de clanes y con «Zabdi/Zera».
  glossary_alignment: No hay términos teológicos sensibles en juego. La transliteración de nombres está en general alineada, pero «zarhitas» es menos consistente que «Zerahitas» con la base inglesa y con la forma del nombre Zera/Zerah; una forma con mayúscula y vocal interna explícita mejora la alineación onomástica.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «Judá» en lugar de en «hombre por hombre».
    rationale: La nota explica la alternativa de לַגְּבָרִים («por los hombres»), no el nombre «Judá». El proyecto exige que el marcador aparezca exactamente en la palabra o frase relevante.
  - severity: low
    issue: «zarhitas» es una transliteración menos clara y menos consistente que «Zerahitas».
    rationale: El hebreo הַזַּרְחִי corresponde al grupo descendiente de Zerah. En español bíblico, «Zerahitas» comunica mejor la relación con el nombre propio y evita una forma visualmente extraña.
  revised_spanish_text: Entonces acercó el clan de Judá, y fue tomado el clan de los Zerahitas. Luego acercó el clan de los Zerahitas, hombre por hombre[a], y fue tomado Zabdi.
  revised_footnotes:
  - marker: a
    text: O «por los hombres». El hebreo probablemente quiere decir que el clan de los Zerahitas fue presentado individualmente, hombre por hombre.
    reason: lexical_alternative
