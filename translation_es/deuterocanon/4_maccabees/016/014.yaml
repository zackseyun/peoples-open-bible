translation:
  language: es
  text: ¡Oh madre[a], soldado de la devoción a Dios! Aunque anciana y mujer, por la constancia venciste incluso a un tirano, y en obras y palabras fuiste hallada más fuerte que un hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la piedad hacia Dios». El griego εὐσέβεια puede denotar reverencia, piedad o devoción.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐσέβειαν θεοῦ
  english_pob_choice: godliness
  chosen_spanish: la piedad de Dios
  alternatives_spanish:
  - devoción a Dios
  - piedad hacia Dios
  - devoción de Dios
  lexicon: LSJ
  rationale: εὐσέβεια puede abarcar piedad, reverencia o devoción; con θεοῦ conviene expresar la relación dirigida a Dios. 'La piedad de Dios' conserva la cercanía formal al griego y el campo religioso sin volverla una fórmula extraña en español.
- source_word: στρατιῶτι
  english_pob_choice: soldier
  chosen_spanish: soldado
  alternatives_spanish:
  - guerrera
  - combatiente
  lexicon: LSJ
  rationale: El vocativo metafórico conserva la imagen marcial de la madre como participante en una lucha espiritual o moral. 'Soldado' mantiene esa fuerza y es natural en español.
- source_word: πρεσβῦτι
  english_pob_choice: though old
  chosen_spanish: aunque anciana
  alternatives_spanish:
  - aunque vieja
  - aunque de edad avanzada
  lexicon: LSJ
  rationale: El participio señala avanzada edad con valor concesivo. 'Aunque anciana' reproduce bien el contraste retórico de debilidad aparente frente a la victoria.
- source_word: γυνή
  english_pob_choice: a woman
  chosen_spanish: mujer
  alternatives_spanish:
  - hembra
  - esposa
  lexicon: LSJ
  rationale: Aquí el contraste final con 'hombre' exige el sentido de sexo/género humano, no 'esposa'. 'Mujer' es fiel y claro.
- source_word: διὰ καρτερίαν
  english_pob_choice: by endurance
  chosen_spanish: por la constancia
  alternatives_spanish:
  - por la perseverancia
  - por la fortaleza
  lexicon: LSJ
  rationale: καρτερία denota resistencia firme bajo presión. 'Constancia' comunica bien esa firmeza sostenida y suena natural en español; 'por' conserva el valor instrumental de διά.
- source_word: τύραννον ἐνίκησας
  english_pob_choice: you conquered even a tyrant
  chosen_spanish: venciste incluso a un tirano
  alternatives_spanish:
  - derrotaste a un tirano
  - dominaste incluso a un tirano
  lexicon: LSJ
  rationale: ἐνίκησας es 'vencer/derrotar'. 'Venciste' es directo y bíblico; 'incluso' refleja la fuerza enfática del contexto, donde el tirano representa poder extremo.
- source_word: ἔργοις δυνατωτέρα
  english_pob_choice: stronger in deeds
  chosen_spanish: más fuerte en obras
  alternatives_spanish:
  - más poderosa en acciones
  - más fuerte en hechos
  lexicon: LSJ
  rationale: La comparación se mantiene con 'más fuerte'. 'Obras' traduce ἔργοις con resonancia bíblica y conserva el paralelismo con 'palabras'.
- source_word: λόγοις
  english_pob_choice: in words
  chosen_spanish: en palabras
  alternatives_spanish:
  - en discurso
  - en lo que dijiste
  lexicon: LSJ
  rationale: λόγοις contrasta con ἔργοις; 'palabras' mantiene la oposición simple y clara.
- source_word: εὑρέθης ἂν ἀνδρός
  english_pob_choice: you were found stronger than a man
  chosen_spanish: fuiste hallada más fuerte que un hombre
  alternatives_spanish:
  - resultaste más fuerte que un hombre
  - fuiste encontrada más fuerte que un hombre
  lexicon: LSJ
  rationale: El aoristo pasivo con ἄν expresa una valoración o constatación. 'Fuiste hallada' reproduce el matiz de ser reconocida/constatada y mantiene el comparativo explícito con 'un hombre'.
theological_decisions:
- issue: Tratamiento de εὐσέβεια
  english_pob_reading: godliness
  chosen_spanish_reading: piedad de Dios
  alternative_spanish_readings:
  - devoción a Dios
  - piedad hacia Dios
  - devoción
  rationale: No se trata de un tecnicismo doctrinal sino de una virtud religiosa central. 'Piedad de Dios' conserva la densidad del término griego y su orientación teocéntrica sin reducirlo a un simple 'devoción' si eso suaviza demasiado el vínculo con θεοῦ.
  doctrine_reference: DOCTRINE.md §6 Readable modern Spanish, not archaic or academic
- issue: Comparación final de género
  english_pob_reading: Retain the explicit contrast 'a woman' / 'a man'
  chosen_spanish_reading: Conservar el contraste explícito 'mujer' / 'hombre'
  alternative_spanish_readings:
  - neutralizar como 'persona'
  - traducir de forma genérica
  rationale: 'La frase subraya retóricamente la victoria pese a marcadores sociales de debilidad: edad y condición femenina. Neutralizar el contraste borraría una tensión textual documentada.'
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Valor del pasivo final
  english_pob_reading: you were found stronger than a man
  chosen_spanish_reading: fuiste hallada más fuerte que un hombre
  alternative_spanish_readings:
  - te mostraste más fuerte que un hombre
  - resultaste más fuerte que un hombre
  rationale: El pasivo conserva el matiz de constatación en el texto griego. En español, 'fuiste hallada' mantiene esa resonancia sin sobreinterpretar causalmente el resultado.
  doctrine_reference: DOCTRINE.md §2 Preserve source distinctions where meaningful
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el auditable paso del POB inglés: se mantuvo la estructura retórica, el contraste edad/sexo, y la clausula comparativa final. Donde el registro español lo pedía, se prefirió una formulación natural (''por la constancia'', ''fuiste hallada'') sin perder el valor semántico del griego. La decisión principal es εὐσέβεια θεοῦ, donde el inglés pasó de ''devotion to God'' a ''godliness''; en español se optó por ''piedad de Dios'' para conservar la referencia explícita a θεοῦ y la densidad del término.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεοῦ, conforme al estándar del proyecto.
  - Se usa 'mujer'/'hombre' sin neutralización, por fidelidad al contraste del original.
  - '''Obras'' y ''palabras'' preservan el paralelismo ἔργοις / λόγοις.'
  - El vocativo '¡Oh madre!' conserva el tono exclamativo del griego.
