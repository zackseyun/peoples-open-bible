translation:
  language: es
  text: No añadan a la palabra que yo les mando, ni le quiten, para que guarden los mandamientos de Yahvé su Dios[a] que yo les mando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo YHWH; tradicionalmente se ha vertido «el SEÑOR». Aquí se conserva el nombre divino como «Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: תֹסִפוּ עַל
  english_pob_choice: add to
  chosen_spanish: añadirán a
  alternatives_spanish:
  - agregarán a
  - sumarán a
  lexicon: HALOT
  rationale: El hebreo expresa la prohibición de sumar algo al contenido ya dado; «añadir a» comunica de forma natural y precisa la idea de no suplementar la instrucción divina.
- source_word: הַדָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el asunto
  - la cosa
  - el mandato
  lexicon: HALOT
  rationale: Aunque דָּבָר puede ser «asunto» o «cosa», aquí designa el contenido verbal de la instrucción. «La palabra» conserva el singular y el sentido de un mensaje/mandato pronunciado.
- source_word: מְצַוֶּה
  english_pob_choice: am commanding
  chosen_spanish: yo les mando
  alternatives_spanish:
  - yo les estoy mandando
  - yo les ordeno
  lexicon: HALOT
  rationale: El participio en contexto presenta la acción en curso de Moisés hablando. En español, «yo les mando» es natural y mantiene la fuerza directiva sin volverlo más rígido de lo necesario.
- source_word: תִגְרְעוּ מִמֶּנּוּ
  english_pob_choice: take away from it
  chosen_spanish: le quitarán nada
  alternatives_spanish:
  - no le restarán nada
  - no disminuirán nada de ello
  lexicon: HALOT
  rationale: גרע significa disminuir o quitar. «Quitar» es el par natural de «añadir» en español y conserva la oposición retórica del hebreo.
- source_word: לִשְׁמֹר
  english_pob_choice: so that you may keep
  chosen_spanish: para que guarden
  alternatives_spanish:
  - a fin de que guarden
  - para guardar
  lexicon: HALOT
  rationale: El infinitivo con ל expresa propósito. «Para que» comunica claramente la finalidad sin perder la relación lógica del mandato previo.
- source_word: מִצְוֺת
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los preceptos
  - las órdenes
  lexicon: HALOT
  rationale: En contexto pactal/legal, מצוות se traduce de manera estándar como «mandamientos», un término adecuado y solemne en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino con la forma española establecida por el proyecto, «Yahvé», en vez de sustituirlo por un título como «Señor».
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - vuestro Dios
  lexicon: HALOT
  rationale: El posesivo de segunda persona plural se expresa de forma reverente y natural con «su Dios» en español latinoamericano, sin perder el referente comunitario.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el criterio del proyecto es no ocultarlo detrás de una sustitución tradicional. «Yahvé» preserva el nombre propio del pacto en una forma española reconocible.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés POB confirma una lectura estable sin revisiones aplicadas; se conserva la estructura prohibitiva binaria («no añadir / no quitar») y el cierre final finalidad-obediencia con el nombre divino explícito.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo «añadir / quitar» para reflejar la fuerza retórica del hebreo.
  - «Mandamientos» se usa de forma consistente para מִצְוֺת en contexto de pacto.
  - Se evita la sustitución por «SEÑOR» para יהוה, conforme a la pauta del proyecto.
  - El posesivo «su Dios» conserva el plural de destinatarios sin sonar arcaico.
