review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la fórmula itineraria hebrea: וַיִּסְעוּ = «Partieron», מִמִּדְבַּר סִינַי = «del desierto de Sinaí», וַיַּחֲנוּ = «y acamparon», y el topónimo בְּקִבְרֹת הַתַּאֲוָה se mantiene como nombre de lugar con nota explicativa. La única corrección recomendable es estilística/terminológica en la nota, para ajustarla mejor al glosado documentado del POB inglés.'
  spanish_quality_summary: El español principal es claro, natural y digno. «Partieron… y acamparon…» suena bien en una lista de etapas. El topónimo transliterado es legible. La nota actual, sin embargo, usa «sepulcros del deseo», que se aparta del rationale auditado («graves of craving») y puede sonar más interpretativo o menos preciso que «tumbas de la avidez» o «sepulcros de la avidez».
  glossary_alignment: No hay términos teológicos sensibles aquí. El tratamiento del topónimo como transliteración en el texto principal concuerda con la filosofía del proyecto. La nota debe alinearse mejor con el valor léxico de הַתַּאֲוָה como «avidez / ansia / codicia intensa» más que el genérico «deseo».
  issues:
  - severity: medium
    issue: La nota léxica «sepulcros del deseo» debilita el sentido de הַתַּאֲוָה.
    rationale: El audit trail inglés preserva específicamente «graves of craving». «Deseo» en español es demasiado amplio y puede sonar neutral o incluso positivo; el contexto y la decisión inglesa apuntan a un deseo intenso/desordenado. Conviene una glosa como «tumbas de la avidez» para conservar mejor la fuerza semántica.
  revised_spanish_text: Partieron del desierto de Sinaí y acamparon en Kibrot-hataavá[a].
  revised_footnotes:
  - marker: a
    text: Kibrot-hataavá significa «tumbas de la avidez».
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel y natural. Solo se ajusta la nota para reflejar con mayor precisión la decisión léxica documentada por el POB inglés sobre el significado del topónimo.
