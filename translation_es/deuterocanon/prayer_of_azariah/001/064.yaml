    rationale: El griego llama directamente a los destinatarios («ὅσιοι καὶ ταπεινοὶ τῇ καρδίᾳ»). En español litúrgico, «santos y humildes de corazón» funciona mejor sin el pronombre explícito.
  - severity: medium
    issue: «engrándezcanlo» suena menos natural y menos idiomático
    rationale: Aunque comunica magnificación, no es la opción más clara ni más habitual para ὑπερυψοῦτε. «Exáltenlo en gran manera» preserva mejor el matiz intensivo y el registro solemne.
  revised_spanish_text: Bendigan al Señor[a], santos y humildes de corazón; cántenle alabanzas y exáltenlo en gran manera por los siglos.
