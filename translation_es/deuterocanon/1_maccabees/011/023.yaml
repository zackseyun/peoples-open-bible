translation:
  language: es
  text: Pero cuando Jonathan lo oyó, mandó que lo rodearan; y escogió a algunos de los ancianos de Israel y a algunos de los sacerdotes, y se expuso al peligro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «y dio a él al peligro». La redacción es áspera; el sentido probable es que Jonathan se expuso al peligro.'
    reason: textual_variant
lexical_decisions:
- source_word: ὡς δὲ ἤκουσεν Ἰωνάθαν
  english_pob_choice: But when Jonathan heard
  chosen_spanish: Pero cuando Jonathan lo oyó
  alternatives_spanish:
  - Pero cuando Jonathan escuchó
  - Cuando Jonathan lo oyó
  lexicon: LSJ
  rationale: «Oír» conserva bien el valor narrativo simple del aoristo y evita sobreinterpretar el acto como mera escucha atenta.
- source_word: ἐκέλευσεν περικαθίσθαι
  english_pob_choice: he ordered them to surround him
  chosen_spanish: mandó que lo rodearan
  alternatives_spanish:
  - ordenó que lo rodearan
  - mandó rodearlo
  lexicon: LSJ
  rationale: El infinitivo en este contexto admite una idea de rodear/ceñir al objetivo; en español, «rodearlo» expresa de forma natural la acción sin cargarla de lenguaje técnico de asedio.
- source_word: ἐπέλεξεν
  english_pob_choice: he chose
  chosen_spanish: escogió
  alternatives_spanish:
  - eligió
  - seleccionó
  lexicon: LSJ
  rationale: «Escogió» conserva el sentido ordinario y narrativo del verbo griego, con tono claro y sobrio.
- source_word: τῶν πρεσβυτέρων Ἰσραήλ
  english_pob_choice: some of the elders of Israel
  chosen_spanish: de entre los ancianos de Israel
  alternatives_spanish:
  - algunos de los ancianos de Israel
  - entre los ancianos de Israel
  lexicon: LSJ
  rationale: 'Se mantiene el valor partitivo del genitivo con ἐπέλεξεν: Jonathan no tomó a todos, sino a algunos de entre ellos.'
- source_word: τῶν ἱερέων
  english_pob_choice: some of the priests
  chosen_spanish: de entre los sacerdotes
  alternatives_spanish:
  - algunos de los sacerdotes
  - entre los sacerdotes
  lexicon: LSJ
  rationale: Igual que con «ancianos», el griego sugiere selección parcial, no del grupo entero.
- source_word: ἔδωκεν αὐτὸν τῷ κινδύνῳ
  english_pob_choice: put himself in danger
  chosen_spanish: se expuso al peligro
  alternatives_spanish:
  - se puso en peligro
  - se arriesgó
  - se entregó al peligro
  lexicon: LSJ
  rationale: La forma transmitida es difícil y el inglés POB ya documenta la tensión textual. En español, «se expuso al peligro» comunica la lectura idiomática más coherente con el contexto y preserva la idea de autoexposición sin resolver de manera excesiva la rareza del griego.
theological_decisions:
- issue: Tratamiento del griego difícil ἔδωκεν αὐτὸν τῷ κινδύνῳ
  english_pob_reading: 'Render idiomatically as Jonathan''s self-endangerment: ''put himself in danger.'''
  chosen_spanish_reading: se expuso al peligro
  alternative_spanish_readings:
  - lo puso en peligro
  - se entregó al peligro
  - se puso en peligro
  rationale: No es una cuestión doctrinal, sino de interpretación textual. Dado que el sujeto sigue siendo Jonathan y el griego transmitido presenta una construcción áspera con αὐτόν, la versión española sigue la lectura idiomática ya adoptada en el audit trail y evita forzar un objeto masculino ambiguo sin apoyo contextual.
  doctrine_reference: Preservar la ambigüedad textual documentada y no sobre-precisar el referente.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail, que ajustó la comprensión de περικαθίσθαι hacia una acción transitiva: no meramente “estar rodeado”, sino ordenar que rodearan a Jonathan. Se mantuvo la solución idiomática para ἔδωκεν αὐτὸν τῷ κινδύνῳ como autoexposición al peligro.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como terminología por defecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantuvo «ancianos» y «sacerdotes» con valor partitivo explícito en español para reflejar τῶν + genitivo tras ἐπέλεξεν.
  - Se evitó «Cristo/Mesías» y otras terminologías no pertinentes al pasaje.
  - La nota al pie está anclada en «lo rodearan[a]» para cumplir la trazabilidad requerida.
