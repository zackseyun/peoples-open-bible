translation:
  language: es
  text: Ella guio al hombre justo, fugitivo de la ira de su hermano, por sendas rectas; le mostró el reino de Dios, y le dio conocimiento de cosas santas[a]; le dio prosperidad en sus labores, y aumentó los frutos de su trabajo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'conocimiento de seres santos'. La frase griega puede referirse tanto a cosas sagradas como a seres o personas santos.
    reason: alternative_reading
  - marker: b
    text: Literalmente, 'multiplicó/aumentó sus trabajos o fatigas'; aquí el contexto sugiere los resultados o frutos asociados con su labor.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὕτη
  english_pob_choice: She
  chosen_spanish: Ella
  alternatives_spanish:
  - Esta
  - Sabiduría
  lexicon: LSJ
  rationale: El demostrativo femenino apunta a la Sabiduría personificada del contexto inmediato. En español, 'Ella' conserva la referencia anafórica y la personificación sin introducir un sustantivo ausente en el versículo.
- source_word: φυγάδα ὀργῆς ἀδελφοῦ
  english_pob_choice: a fugitive from his brother’s anger
  chosen_spanish: fugitivo de la ira de su hermano
  alternatives_spanish:
  - huido de la ira de su hermano
  - desterrado por la ira de su hermano
  lexicon: LSJ
  rationale: φυγάδα expresa la idea de alguien que huye o está en fuga/exilio; el genitivo indica la causa. 'Fugitivo' y 'ira' mantienen el sentido y la fuerza del pasaje en español contemporáneo.
- source_word: δίκαιον
  english_pob_choice: the righteous man
  chosen_spanish: el hombre justo
  alternatives_spanish:
  - el justo
  - el hombre recto
  lexicon: LSJ
  rationale: El adjetivo está usado sustantivamente y en masculino singular. 'Hombre justo' conserva la referencia masculina y la carga ética/legal de δίκαιος.
- source_word: ὡδήγησεν ἐν τρίβοις εὐθείαις
  english_pob_choice: guided ... in straight paths
  chosen_spanish: guio ... por sendas rectas
  alternatives_spanish:
  - lo condujo ... por caminos rectos
  - lo llevó ... por sendas rectas
  lexicon: LSJ
  rationale: ὁδηγέω significa guiar/conducir, y τρίβοις εὐθείαις son literalmente 'caminos/sendas rectas'. 'Por sendas rectas' preserva la metáfora bíblica sin sonar forzado en español.
- source_word: βασιλείαν θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - la realeza de Dios
  lexicon: LSJ
  rationale: La expresión es directa y establecida. 'Reino de Dios' conserva la formulación bíblica y no necesita paráfrasis.
- source_word: γνῶσιν ἁγίων
  english_pob_choice: knowledge of holy things
  chosen_spanish: conocimiento de cosas santas
  alternatives_spanish:
  - conocimiento de seres santos
  - conocimiento de lo santo
  lexicon: LSJ
  rationale: ἁγίων puede entenderse como 'cosas santas' o como 'santos/seres santos'. 'Cosas santas' es la opción más sobria y deja abierta la ambigüedad sin resolverla de manera indebida.
- source_word: εὐπόρησεν αὐτὸν ἐν μόχθοις
  english_pob_choice: she prospered him in his labors
  chosen_spanish: le dio prosperidad en sus labores
  alternatives_spanish:
  - lo prosperó en sus labores
  - le hizo prosperar en sus trabajos
  lexicon: LSJ
  rationale: εὐπορέω puede significar prosperar, proveer o dar abundancia. 'Le dio prosperidad' expresa bien la idea benéfica en un español natural, y 'en sus labores' mantiene el ámbito del trabajo/esfuerzo.
- source_word: ἐπλήθυνεν τοὺς πόνους αὐτοῦ
  english_pob_choice: increased the fruits of his toil
  chosen_spanish: incrementó los frutos de su afán
  alternatives_spanish:
  - multiplicó sus trabajos
  - aumentó el fruto de su labor
  lexicon: LSJ
  rationale: πόνοι puede referirse a trabajos, fatigas o los resultados asociados con ellos. Dado el contexto favorable, 'los frutos de su afán' conserva la idea de resultado benéfico y evita la contradicción de hacer crecer el sufrimiento.
theological_decisions:
- issue: Sujeto femenino personificado
  english_pob_reading: The subject is personified Wisdom, rendered with feminine pronoun 'She.'
  chosen_spanish_reading: El sujeto es la Sabiduría personificada, reflejada con 'Ella'.
  alternative_spanish_readings:
  - Repetir 'Sabiduría'
  - usar una perífrasis nominal
  rationale: El griego usa un demostrativo femenino que remite a la Sabiduría personificada del contexto. 'Ella' preserva la personificación sin añadir contenido ajeno al versículo.
  doctrine_reference: 'DOCTRINE.md: Preserve source meaning and readable modern Spanish'
- issue: Sentido de γνῶσιν ἁγίων
  english_pob_reading: '''knowledge of holy things'''
  chosen_spanish_reading: '''conocimiento de cosas santas'''
  alternative_spanish_readings:
  - '''conocimiento de seres santos'''
  - '''conocimiento de los santos'''
  rationale: La frase admite más de una lectura. El contexto de revelación divina y bendición favorece una referencia a realidades sagradas; la alternativa queda abierta sin forzar una identificación con personas.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Sentido positivo de τοὺς πόνους αὐτοῦ
  english_pob_reading: '''the fruits of his toil'''
  chosen_spanish_reading: '''los frutos de su afán'''
  alternative_spanish_readings:
  - '''sus trabajos'''
  - '''sus fatigas'''
  rationale: Aunque una traducción literal podría sonar negativa, el contexto presenta la acción de la Sabiduría como benéfica. 'Los frutos de su afán' conserva el valor productivo/resultado del trabajo sin invertir el sentido del pasaje.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; consistency with context'
translation_notes:
  revision_awareness: El texto sigue la línea del último pase revisado del inglés, que prefirió reflejar con más precisión el plural de τοὺς πόνους y evitar una lectura que convierta πόνους en 'fruto'. En español, por eso se optó por una formulación que preserve la idea de resultados benéficos del esfuerzo, sin hacer explícito un singular de 'fruto' que no está en la forma griega.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεοῦ conforme al estándar del proyecto.
  - Se usa 'Sabiduría' implícita mediante la anáfora 'Ella', sin añadir el sustantivo en el cuerpo del versículo.
  - '''Cosas santas'' conserva la ambigüedad de ἁγίων sin normalizarla a lenguaje eclesiástico tradicional.'
  - '''Afán'' y ''labores'' se alternan para cubrir el campo semántico de μόχθος/πόνος sin endurecer el español.'
