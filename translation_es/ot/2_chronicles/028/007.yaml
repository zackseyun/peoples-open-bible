translation:
  language: es
  text: Y Zicri[a], un hombre poderoso de Efraín, mató a Maasías, hijo del rey, a Azricam, supervisor de la casa[b], y a Elcaná, segundo después del rey[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "un guerrero de Efraín" o "un héroe de Efraín".
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "la casa"; en contexto real puede referirse a la casa real o al palacio.'
    reason: lexical_alternative
  - marker: c
    text: O "segundo en rango después del rey" o "el segundo al mando del rey".
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּהֲרֹג
  english_pob_choice: killed
  chosen_spanish: mató
  alternatives_spanish:
  - mató
  - dio muerte a
  - asesinó
  lexicon: HALOT
  rationale: El verbo hebreo הרג expresa matar de forma directa. En español, 'mató' es claro, natural y conserva el registro narrativo sin volverlo arcaico como 'dio muerte a' ni cargarlo interpretativamente como 'asesinó'.
- source_word: זִכְרִי
  english_pob_choice: Zikri
  chosen_spanish: Zicri
  alternatives_spanish:
  - Zikri
  - Zicrí
  lexicon: Transliteración de nombre propio
  rationale: Se translitera el nombre propio. 'Zicri' mantiene una forma española legible y cercana al hebreo; se evita 'Zikri' por menor adaptación gráfica al español.
- source_word: גִּבּוֹר אֶפְרַיִם
  english_pob_choice: a mighty man of Ephraim
  chosen_spanish: un hombre poderoso de Efraín
  alternatives_spanish:
  - un guerrero de Efraín
  - un héroe de Efraín
  - un hombre valiente de Efraín
  lexicon: HALOT
  rationale: גִּבּוֹר puede significar 'fuerte/poderoso', 'guerrero' o 'héroe'. 'Hombre poderoso' conserva la amplitud semántica y evita decidir demasiado pronto entre fuerza, valor militar o estatus heroico. 'De Efraín' refleja la identificación tribal.
- source_word: מַעֲשֵׂיָהוּ
  english_pob_choice: Maaseiah
  chosen_spanish: Maasías
  alternatives_spanish:
  - Maaseías
  - Maasiah
  lexicon: Transliteración de nombre propio
  rationale: Se translitera el nombre con una forma española usual y fluida. 'Maasías' mantiene cercanía fonética y lectura natural en español.
- source_word: בֶּן הַמֶּלֶךְ
  english_pob_choice: the king’s son
  chosen_spanish: hijo del rey
  alternatives_spanish:
  - el hijo del rey
  - un hijo del rey
  lexicon: HALOT
  rationale: El sintagma constructo con artículo en 'rey' se rinde idiomáticamente como 'hijo del rey'. Es claro y corresponde al valor relacional específico del hebreo.
- source_word: עַזְרִיקָם
  english_pob_choice: Azrikam
  chosen_spanish: Azricam
  alternatives_spanish:
  - Azrikam
  lexicon: Transliteración de nombre propio
  rationale: Se translitera el nombre propio con adaptación ortográfica española mínima. 'Azricam' facilita lectura en español sin alterar el referente.
- source_word: נְגִיד הַבָּיִת
  english_pob_choice: the overseer of the house
  chosen_spanish: supervisor de la casa
  alternatives_spanish:
  - superintendente de la casa
  - encargado de la casa
  - mayordomo de la casa
  lexicon: HALOT
  rationale: נְגִיד denota un oficial, jefe o supervisor; הַבָּיִת es literalmente 'la casa'. Se conserva la correspondencia lexical del inglés auditado ('house') con una frase española sobria y transparente. 'Supervisor' evita introducir la carga específica de 'mayordomo'.
- source_word: אֶלְקָנָה
  english_pob_choice: Elkanah
  chosen_spanish: Elcaná
  alternatives_spanish:
  - Elcana
  - Elkaná
  lexicon: Transliteración de nombre propio
  rationale: Se translitera el nombre propio con acentuación española para lectura natural. 'Elcaná' es una forma clara y reconocible en español.
- source_word: מִשְׁנֵה הַמֶּלֶךְ
  english_pob_choice: second to the king
  chosen_spanish: segundo del rey
  alternatives_spanish:
  - segundo en rango del rey
  - segundo del rey en el cargo
  - el segundo del rey
  lexicon: HALOT
  rationale: מִשְׁנֵה indica 'segundo' en rango o posición. 'Segundo del rey' preserva la brevedad del hebreo y del inglés auditado, sin convertirlo en un título más técnico de lo que el texto exige.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y coincide con la revisión inglesa que prefirió 'house' sobre 'palace' para נְגִיד הַבָּיִת. En español se mantuvo esa mayor cercanía lexical con 'casa' y se evitó una especificación más interpretativa. También se conservó la estructura enumerativa del versículo y el paralelismo de cargos cortesanos.
  spanish_consistency_notes:
  - Se usó 'Y' al inicio para reflejar la apertura narrativa del hebreo con וַ- sin forzar un estilo excesivamente bíblico arcaizante.
  - 'Se mantuvo la transliteración de nombres propios con adaptación española uniforme: Zicri, Maasías, Azricam, Elcaná.'
  - '''Casa'' se preserva por fidelidad al hebreo, aunque en contexto real apunta a la casa real; no se sustituyó por ''palacio'' porque la pista auditada del inglés también volvió a ''house''.'
  - '''Segundo del rey'' conserva la ambigüedad de rango sin imponer un cargo técnico posterior.'
