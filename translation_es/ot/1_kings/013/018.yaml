translation:
  language: es
  text: 'Y le dijo: «Yo también soy profeta como tú, y un ángel[a] me habló por la palabra de Yahvé, diciendo: “Hazlo volver contigo a tu casa, para que coma pan y beba agua”». Pero le mintió.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mensajero». El hebreo מַלְאָךְ puede significar tanto «ángel» como «mensajero»; el contexto narrativo favorece la lectura «ángel», pero la ambigüedad léxica permanece.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָבִיא
  english_pob_choice: prophet
  chosen_spanish: profeta
  alternatives_spanish:
  - vidente
  - mensajero de Dios
  lexicon: HALOT
  rationale: נָבִיא designa aquí a un profeta; en español, «profeta» conserva el sentido técnico y el paralelismo con la afirmación del personaje, sin añadir explicaciones no presentes en el hebreo.
- source_word: מַלְאָךְ
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: HALOT
  rationale: El contexto narrativo permite la lectura sobrenatural, y el POB inglés la prefirió. En español, «ángel» mantiene esa lectura; la alternativa «mensajero» queda reflejada en nota porque el hebreo también la permite.
- source_word: דִּבֶּר אֵלַי
  english_pob_choice: spoke to me
  chosen_spanish: me habló
  alternatives_spanish:
  - me dijo
  - habló conmigo
  lexicon: HALOT
  rationale: «Habló» reproduce de modo natural la comunicación directa del hebreo sin endurecer la frase. «Me habló» conserva el dativo de destinatario.
- source_word: בִּדְבַר יְהוָה
  english_pob_choice: by the word of Yahweh
  chosen_spanish: por la palabra de Yahvé
  alternatives_spanish:
  - por la palabra de Yahvé
  - por mandato de Yahvé
  - a la palabra de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética con el sustantivo «palabra», y se traduce el nombre divino como «Yahvé» según el criterio del proyecto, sin enmascararlo con «SEÑOR».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: El texto hebreo contiene el Tetragrámaton; el criterio del proyecto pide «Yahvé» para preservar el nombre del pacto.
- source_word: הֲשִׁבֵהוּ
  english_pob_choice: Bring him back
  chosen_spanish: Hazlo volver
  alternatives_spanish:
  - Tráelo de vuelta
  - Haz que regrese
  lexicon: HALOT
  rationale: El causativo de שוב expresa hacer volver a alguien; «Hazlo volver» comunica el imperativo de forma natural y fiel al valor causativo.
- source_word: אִתְּךָ אֶל בֵּיתֶךָ
  english_pob_choice: with you to your house
  chosen_spanish: contigo a tu casa
  alternatives_spanish:
  - conmigo a tu casa
  - con ustedes a tu casa
  lexicon: HALOT
  rationale: «Contigo a tu casa» reproduce la relación de acompañamiento y destino; «casa» es la equivalencia más directa de בַּיִת en este contexto doméstico.
- source_word: וְיֹאכַל לֶחֶם
  english_pob_choice: that he may eat bread
  chosen_spanish: para que coma pan
  alternatives_spanish:
  - y coma pan
  - para que coma alimento
  lexicon: HALOT
  rationale: Se conserva el idiomatismo hebreo «pan» para לֶחֶם, porque el contexto no exige generalizar a «alimento». La construcción final expresa adecuadamente el propósito.
- source_word: וְיֵשְׁתְּ מָיִם
  english_pob_choice: and drink water
  chosen_spanish: y beba agua
  alternatives_spanish:
  - y tome agua
  lexicon: HALOT
  rationale: La pareja formulaica «pan y agua» se conserva de manera natural en español, con el verbo en subjuntivo dentro de la cláusula final de propósito.
- source_word: כִּחֵשׁ לוֹ
  english_pob_choice: But he lied to him
  chosen_spanish: Pero le mintió
  alternatives_spanish:
  - Pero lo engañó
  - Pero habló falsamente con él
  lexicon: HALOT
  rationale: כִּחֵשׁ implica falsear o mentir; «mintió» es la forma más directa y transparente en español. Se mantiene la contraposición narrativa con «Pero».
theological_decisions:
- issue: Nombre divino יְהוָה en una cita profética
  english_pob_reading: by the word of Yahweh
  chosen_spanish_reading: por la palabra de Yahvé
  alternative_spanish_readings:
  - por la palabra del Señor
  - por la palabra de Dios
  rationale: El hebreo nombra explícitamente a יְהוָה. Siguiendo la convención del proyecto, se traduce como «Yahvé» y no se lo reemplaza por una máscara reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: 'מַלְאָךְ: ¿ángel o mensajero?'
  english_pob_reading: an angel spoke to me
  chosen_spanish_reading: un ángel me habló
  alternative_spanish_readings:
  - un mensajero me habló
  - un enviado me habló
  rationale: La ambigüedad lexical existe en hebreo. El POB inglés optó por «angel» por el contexto narrativo; la nota conserva la alternativa «mensajero» para no borrar la tensión semántica.
  doctrine_reference: HALOT
- issue: Finalidad de וְיֹאכַל... וְיֵשְׁתְּ
  english_pob_reading: that he may eat bread and drink water
  chosen_spanish_reading: para que coma pan y beba agua
  alternative_spanish_readings:
  - a fin de que coma pan y beba agua
  - y coma pan y beba agua
  rationale: La cláusula expresa propósito/resultad​​o, no mero futuro. «Para que» mantiene la función final y suena natural en español.
  doctrine_reference: Sintaxis hebrea de yiqtol volitivo/final
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que ajustó la cláusula final de «so that» a «that» sin cambiar el sentido. En español se eligió «para que» para reflejar con naturalidad el valor final del hebreo וְיֹאכַל... וְיֵשְׁתְּ, manteniendo la estructura de propósito y la formulación breve del original.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma consistente para יְהוָה, conforme al criterio del proyecto.
  - Se tradujo נָבִיא como «profeta» y no se suavizó a una perífrasis.
  - Se preservó la fórmula «pan y agua» por su transparencia y porque el hebreo usa vocabulario concreto.
  - La puntuación española se ajustó a estilo editorial, con comillas angulares y cierre narrativo claro.
