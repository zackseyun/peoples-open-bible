review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: ''sus hermanos'', el total de 128, y Zabdiel como encargado sobre ellos. También preserva correctamente en nota la alternativa de entender הַגְּדוֹלִים como frase descriptiva y no como nombre propio. Sin embargo, ''hombres valientes'' atenúa la fuerza idiomática de גִּבּוֹרֵי חַיִל, que en este contexto apunta más a hombres de valor/esfuerzo militar o capacidad sobresaliente que a simple valentía.'
  spanish_quality_summary: 'El español es claro y natural, pero puede mejorarse en dos puntos: ''hombres valientes'' suena algo débil frente al original, y ''el supervisor sobre ellos'' es comprensible pero menos idiomático que ''el encargado de ellos'' o ''el supervisor de ellos''. Además, la nota al pie necesita limpieza de formato en español.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Los nombres propios están bien conservados. La principal cuestión léxica es reforzar גִּבּוֹרֵי חַיִל con una expresión española más fiel, como 'hombres de valor'.
  issues:
  - severity: medium
    issue: גִּבּוֹרֵי חַיִל se tradujo como 'hombres valientes'
    rationale: La expresión hebrea normalmente comunica más que valentía básica; 'hombres de valor' preserva mejor la fuerza idiomática y el matiz tradicional reconocido en la auditoría inglesa.
  - severity: low
    issue: '''el supervisor sobre ellos'' suena algo calcado'
    rationale: Aunque fiel, en español resulta más natural 'el supervisor de ellos' o 'el encargado de ellos'. Conviene mantener la función administrativa sin calcar la preposición hebrea/inglesa.
  - severity: low
    issue: La nota al pie tiene formato poco natural
    rationale: Empieza con comillas y 'O:' de manera torpe. Debe normalizarse a un estilo español claro, manteniendo el contenido de la alternativa léxica.
  revised_spanish_text: Y sus hermanos[a], hombres de valor, eran ciento veintiocho; y el supervisor de ellos era Zabdiel, hijo de Haggedolim.
  revised_footnotes:
