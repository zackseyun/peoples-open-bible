translation:
  language: es
  text: Pero ellos actuaron con presunción y se rebelaron contra ti, y echaron tu ley[a] detrás de sus espaldas. Mataron a tus profetas, que les habían advertido[b] para hacerlos volver a ti[c], y cometieron grandes blasfemias[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu instrucción». תּוֹרָה puede significar también «instrucción», aunque aquí «ley» conserva mejor el tono pactal e histórico del pasaje.
    reason: lexical_alternative
  - marker: b
    text: O «habían testificado contra ellos»; el hebreo puede llevar el sentido de advertencia solemne o de testimonio judicial.
    reason: lexical_alternative
  - marker: c
    text: O «para volverlos a ti» o «para restaurarlos a ti».
    reason: lexical_alternative
  - marker: d
    text: O «grandes ultrajes», «grandes desprecios», «grandes insultos» o «grandes provocaciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּמְרוּ
  english_pob_choice: acted presumptuously
  chosen_spanish: actuaron con presunción
  alternatives_spanish:
  - fueron desobedientes
  - actuaron con arrogancia
  - provocaron
  lexicon: HALOT
  rationale: El verbo expresa resistencia insolente o desafiante. En español, «actuaron con presunción» conserva la idea de atrevimiento orgulloso sin igualar el segundo verbo, «se rebelaron», lo que preserva la intensificación retórica del hebreo.
- source_word: וַיִּמְרְדוּ בָּךְ
  english_pob_choice: rebelled against you
  chosen_spanish: se rebelaron contra ti
  alternatives_spanish:
  - se revoltaron contra ti
  lexicon: HALOT
  rationale: מרד es el término más explícito para rebelión. «Contra ti» mantiene el objeto personal del hebreo y la relación directa con Dios.
- source_word: וַיַּשְׁלִכוּ ... אַחֲרֵי גַוָּם
  english_pob_choice: they cast your law behind their backs
  chosen_spanish: echaron tu ley detrás de sus espaldas
  alternatives_spanish:
  - arrojaron tu ley detrás de sus espaldas
  - lanzaron tu ley detrás de sus espaldas
  - echaron tu instrucción detrás de sus espaldas
  lexicon: HALOT
  rationale: La imagen idiomática expresa rechazo despectivo. «Detrás de sus espaldas» reproduce con naturalidad el hebreo; «echaron» mantiene el registro formal y la fuerza concreta del gesto.
- source_word: תּוֹרָתְךָ
  english_pob_choice: your law
  chosen_spanish: tu ley
  alternatives_spanish:
  - tu instrucción
  lexicon: HALOT
  rationale: En este contexto confesional e histórico, «ley» es la forma más reconocible y fiel en español; «instrucción» sigue siendo una alternativa semántica válida, pero menos directa para esta frase.
- source_word: הֵעִידוּ בָם
  english_pob_choice: had warned them
  chosen_spanish: les habían advertido
  alternatives_spanish:
  - habían testificado contra ellos
  - los habían amonestado
  lexicon: HALOT
  rationale: El hiphil de עוּד puede significar testificar solemnemente o advertir. Aquí, junto con el propósito siguiente, «les habían advertido» comunica de modo natural la advertencia profética con matiz de testimonio.
- source_word: לַהֲשִׁיבָם אֵלֶיךָ
  english_pob_choice: in order to bring them back to you
  chosen_spanish: para volverlos a ti
  alternatives_spanish:
  - para hacerlos volver a ti
  - para restaurarlos a ti
  lexicon: HALOT
  rationale: El infinitivo causativo de שוב expresa el intento de hacer regresar al pueblo. «Volverlos a ti» es breve, natural y conserva la dirección relacional hacia Dios.
- source_word: נֶאָצוֹת גְּדוֹלֹת
  english_pob_choice: great blasphemies
  chosen_spanish: grandes ultrajes
  alternatives_spanish:
  - grandes blasfemias
  - grandes desprecios
  - grandes insultos
  - grandes provocaciones
  lexicon: HALOT
  rationale: El sustantivo abarca actos de desprecio o afrenta contra Dios. «Ultrajes» preserva la gravedad teológica sin forzar un sentido exclusivamente verbal como «blasfemias»; aun así, se mantiene la posibilidad semántica de blasfemia en la alternativa.
theological_decisions:
- issue: Doble secuencia de rebelión en וַיַּמְרוּ / וַיִּמְרְדוּ
  english_pob_reading: Differentiate them as 'acted presumptuously and rebelled'
  chosen_spanish_reading: Diferenciar «actuaron con presunción» y «se rebelaron»
  alternative_spanish_readings:
  - «fueron desobedientes y se rebelaron»
  - «provocaron y se rebelaron»
  rationale: El hebreo usa dos verbos emparentados pero no idénticos. La traducción diferenciada conserva la intensificación retórica y evita aplanar el texto en una sola noción de desobediencia.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Valor teológico de נֶאָצוֹת
  english_pob_reading: Use 'blasphemies' in the main text
  chosen_spanish_reading: Usar «ultrajes» en el texto principal
  alternative_spanish_readings:
  - «blasfemias»
  - «desprecios»
  - «insultos»
  - «provocaciones»
  rationale: El contexto ciertamente implica ofensa contra Dios, pero el hebreo es más amplio que una blasfemia meramente verbal. «Ultrajes» comunica afrenta grave y mantiene abierta la amplitud semántica del término.
  doctrine_reference: Translation philosophy §6 (readable modern Spanish, not archaic or academic)
translation_notes:
  revision_awareness: El texto inglés auditado fue afinado de «threw» a «cast» por registro; en español se optó por «echaron» para un equivalente natural y formal. También se preservó la distinción entre los dos verbos de rebelión y se mantuvo la ambigüedad semántica de נֶאָצוֹת mediante «ultrajes», con nota de alternativas más específicas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo lo exige explícitamente; este versículo usa pronombres directos a Dios, por lo que no aparece aquí.
  - «Ley» se usa para תּוֹרָה según el patrón POB auditado, con nota de alternativa «instrucción».
  - «Profetas» y la estructura causal final siguen el sentido de advertencia profética con intención restauradora.
  - Se preserva un registro bíblico moderno y sobrio, evitando tanto arcaísmos fuertes como paráfrasis interpretativa excesiva.
