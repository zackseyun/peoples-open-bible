translation:
  language: es
  text: Las puertas de los ríos[a] se abren, y el palacio[b] se deshace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los canales», si el término se entiende de las vías de agua de Nínive más que de ríos en sentido ordinario.
    reason: lexical_alternative
  - marker: b
    text: O «el templo», pues el hebreo heikhal puede referirse tanto a un palacio como a un templo; aquí el contexto favorece «palacio».
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁעֲרֵי
  english_pob_choice: gates of
  chosen_spanish: las puertas de
  alternatives_spanish:
  - los portales de
  - las compuertas de
  lexicon: HALOT
  rationale: El constructo plural de שַׁעַר expresa puertas/portones. En español, "puertas de" comunica de forma natural la relación constructa con "los ríos" y conserva el valor imagístico sin endurecer el giro.
- source_word: הַנְּהָרוֹת
  english_pob_choice: the rivers
  chosen_spanish: los ríos
  alternatives_spanish:
  - los cauces
  - los canales
  lexicon: HALOT
  rationale: El plural de נָהָר designa normalmente ríos. Mantengo "ríos" como sentido principal, dejando abierta la posibilidad histórica de canales mediante nota, tal como en el audit trail inglés.
- source_word: נִפְתָּחוּ
  english_pob_choice: are opened
  chosen_spanish: se abren
  alternatives_spanish:
  - son abiertos
  - han sido abiertos
  lexicon: HALOT
  rationale: El nifal de פָּתַח pide pasivo/reflexivo. En español, "se abren" suena natural, presente y vívido, sin introducir una pasiva menos idiomática.
- source_word: הַהֵיכָל
  english_pob_choice: the palace
  chosen_spanish: el palacio
  alternatives_spanish:
  - el templo
  - el gran edificio
  lexicon: HALOT
  rationale: הֵיכָל puede ser templo o palacio. En el contexto de Nínive, la referencia favorece "palacio"; por eso se conserva la lectura contextual principal, con la alternativa disponible en nota.
- source_word: נָמוֹג
  english_pob_choice: melts away
  chosen_spanish: se derrite
  alternatives_spanish:
  - se deshace
  - se derrumba
  - se derrite y se deshace
  lexicon: HALOT
  rationale: El verbo transmite disolución, colapso o derretimiento figurado. "Se derrite" mantiene la metáfora con claridad en español y permite captar la imagen de desintegración total.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el sentido del hebreo y el juicio lexical del POB inglés: mantiene la imagen de puertas/ríos y conserva la ambigüedad de הֵיכָל mediante nota, sin suavizar la metáfora final de נָמוֹג.'
  spanish_consistency_notes:
  - Se usó «palacio» por coherencia contextual con Nínive, no «templo» como valor por defecto.
  - Se prefirió «se abren» como pasivo/reflexivo natural del nifal.
  - La imagen final «se derrite» conserva la fuerza metafórica del original, evitando una paráfrasis interpretativa.
