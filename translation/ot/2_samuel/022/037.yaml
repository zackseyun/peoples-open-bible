id: 2SA.22.37
reference: 2 Samuel 22:37
source:
  edition: WLC
  text: תַּרְחִ֥יב צַעֲדִ֖/י תַּחְתֵּ֑/נִי וְ/לֹ֥א מָעֲד֖וּ קַרְסֻלָּֽ/י׃
translation:
  text: You widen my steps beneath me[b][a], and my ankles have not given way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'You widen my steps beneath me.' The Hebrew idiom expresses giving secure or ample footing.
    reason: lexical_alternative
  - marker: b
    text: Or 'my ankles have not slipped.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּרְחִיב
  chosen: You widen
  alternatives:
  - You make broad
  - You enlarge
  lexicon: HALOT
  rationale: Hiphil of רחב conveys causing breadth or spaciousness. 'You widen' is natural modern English and preserves the causative sense addressed to God.
- source_word: צַעֲדַי
  chosen: the ground
  alternatives:
  - my steps
  - my stride
  lexicon: HALOT
  rationale: The noun from צעד commonly means 'step' or 'stride.' In the idiom 'widen my steps beneath me,' English can sound opaque or misleading. Rendering the object idiomatically as 'the ground' captures the sense of making secure footing or ample room for movement. The more formal alternative 'my steps' is preserved in a footnote.
- source_word: תַּחְתֵּנִי
  chosen: beneath me
  alternatives:
  - under me
  lexicon: HALOT
  rationale: The preposition means 'under/beneath.' 'Beneath me' is slightly more natural in this poetic line while preserving the spatial imagery.
- source_word: וְלֹא
  chosen: and ... not
  alternatives:
  - so that ... not
  lexicon: HALOT
  rationale: Simple conjunction plus negation. The coordinate sense fits the Hebrew parallelism without importing a stronger purposive nuance.
- source_word: מָעֲדוּ
  chosen: have not given way
  alternatives:
  - have not slipped
  - have not tottered
  - have not staggered
  lexicon: HALOT
  rationale: From מעד, 'slip, totter, give way.' With ankles/feet as subject, 'have not given way' communicates stability in idiomatic English. 'Have not slipped' is also possible and is preserved in a footnote.
- source_word: קַרְסֻלַּי
  chosen: my ankles
  alternatives:
  - my feet
  - my ankles/joints
  lexicon: HALOT
  rationale: The noun refers specifically to the ankle area rather than feet in general. 'My ankles' is the most precise rendering and preserves the bodily imagery of secure footing.
