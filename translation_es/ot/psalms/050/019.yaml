translation:
  language: es
  text: Has soltado tu boca para el mal[a], y tu lengua trama engaño[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «has dado rienda suelta a tu boca para el mal».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tu lengua se apega al engaño» o «tu lengua se une al engaño».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּיךָ
  english_pob_choice: your mouth
  chosen_spanish: tu boca
  alternatives_spanish:
  - tu boca
  - tu habla
  lexicon: HALOT
  rationale: Se conserva la imagen corporal del hebreo para mantener el paralelismo con «tu lengua». En español, «boca» sigue siendo la expresión más natural y fiel aquí; «habla» suaviza demasiado la metáfora.
- source_word: שָׁלַחְתָּ
  english_pob_choice: you let loose
  chosen_spanish: has soltado
  alternatives_spanish:
  - has dejado libre
  - has dado rienda suelta a
  - has lanzado
  lexicon: HALOT
  rationale: El verbo hebreo es idiomático en este contexto. «Has soltado» comunica bien la idea de dejar salir libremente la boca hacia el mal sin perder la fuerza de la imagen.
- source_word: בְרָעָה
  english_pob_choice: for evil
  chosen_spanish: para el mal
  alternatives_spanish:
  - para la maldad
  - hacia el mal
  - en maldad
  lexicon: HALOT
  rationale: La preposición con רָעָה expresa dirección o esfera. «Para el mal» es natural en español y conserva el valor moral del término sin hacerlo más abstracto.
- source_word: וּלְשׁוֹנְךָ
  english_pob_choice: and your tongue
  chosen_spanish: y tu lengua
  alternatives_spanish:
  - y tu lengua, por su parte
  - y en cuanto a tu lengua
  lexicon: HALOT
  rationale: Se conserva la paralela literal del hebreo entre boca y lengua, necesaria para la fuerza poética del versículo.
- source_word: תַּצְמִיד
  english_pob_choice: frames
  chosen_spanish: se adhiere a
  alternatives_spanish:
  - se pega a
  - se une a
  - se enlaza con
  lexicon: HALOT
  rationale: La forma causativa de צמד implica unir o hacer pegarse. En español, «se adhiere a» expresa de manera fiel y sobria la idea de quedar ligado al engaño; evita una paráfrasis demasiado libre como «inventa» o «fabrica».
- source_word: מִרְמָה
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - decepción
  - fraude
  - astucia
  lexicon: HALOT
  rationale: «Engaño» es el equivalente más amplio y natural en español para el ámbito sapiencial/poético del término. Mantiene el sentido moral de falsedad deliberada.
translation_notes:
  revision_awareness: La versión inglesa final pasó de «harnesses deceit» a «frames deceit» para reflejar mejor la idea de unir o fijar. En español, se optó por «se adhiere a», que conserva esa relación de unión sin introducir la metáfora de “armar” o “forjar” que no aparece en el hebreo.
  spanish_consistency_notes:
  - Se mantiene «boca» y «lengua» para preservar la paralela hebrea.
  - Se traduce רָעָה como «mal» y מִרְמָה como «engaño» para evitar una escalada interpretativa innecesaria.
  - Los corchetes de nota aparecen solo donde hay alternativa real de traducción.
  - Se evita «SEÑOR» u otra convención de sustitución porque el versículo no contiene el nombre divino.
