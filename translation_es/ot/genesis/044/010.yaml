  to: 'Y él dijo: «Incluso ahora, sea conforme a sus palabras. El que sea hallado con ella será mi esclavo[a], y ustedes quedarán inocentes».'
  rationale: Se elimina la nota estilística innecesaria sobre «dijo», para ajustarse a la disciplina de notas del proyecto. Se mantiene la nota léxica sobre עָבֶד. Además, se cambia «Aun ahora» por «Incluso ahora» para un español más natural sin pérdida de fidelidad. El resto del texto ya preserva bien la pausa fuerte tras «sus palabras», evitando confundir la aceptación parcial del mayordomo con una simple repetición de la propuesta de los hermanos.
