theological_decisions:
- issue: Reference of 'the city'
  chosen_reading: Rendered generically as 'the city' without specifying Jerusalem in the main text.
  alternative_readings:
  - from Jerusalem
  rationale: The Hebrew says 'from the city,' and while Jerusalem is contextually intended, the translation should not replace the source wording with the referent. The contextual identification can be preserved in a footnote if needed.
  doctrine_reference: Translation philosophy §1, §5
- issue: Nuance of וַיַּעַל אֶבְיָתָר
  chosen_reading: Preserved the literal motion verb 'went up' rather than resolving the narrative detail more interpretively.
  alternative_readings:
  - Abiathar came up
  - Abiathar offered sacrifices
  rationale: Some interpreters connect the clause with priestly activity or a different narrative nuance, but the Hebrew form from עלה most directly indicates upward movement. The translation preserves the textual wording and leaves interpretation open.
  doctrine_reference: Translation philosophy §3
