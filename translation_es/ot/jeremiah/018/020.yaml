translation:
  language: es
  text: ¿Se pagará mal por bien? Porque han cavado una fosa contra mi vida[a]. Acuérdate de que estuve delante de ti para hablar en favor de ellos[b], para apartar de ellos tu furor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra mi alma». Aquí el hebreo a menudo significa «vida» o «yo mismo» en contextos de peligro mortal.
    reason: lexical_alternative
  - marker: b
    text: O «para hablar por su bien» o «para hablar favorablemente de ellos». El sentido es la intercesión de Jeremías en su favor delante de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיְשֻׁלַּם
  english_pob_choice: Should ... be repaid
  chosen_spanish: ¿Se pagará ...?
  alternatives_spanish:
  - ¿Se devolverá ...?
  - ¿Se recompensará ...?
  lexicon: HALOT
  rationale: El pual imperfecto en forma interrogativa expresa retribución. En español, «¿Se pagará...?» conserva el valor pasivo y la fuerza retórica sin forzar una construcción antinatural.
- source_word: תַּחַת
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en lugar de
  - a cambio de
  lexicon: HALOT
  rationale: En el contraste recíproco de «bien» y «mal», «por» comunica de manera natural la idea de retribución o intercambio.
- source_word: טוֹבָה ... רָעָה
  english_pob_choice: good ... evil
  chosen_spanish: bien ... mal
  alternatives_spanish:
  - bondad ... maldad
  - lo bueno ... lo malo
  lexicon: HALOT
  rationale: Aquí el contraste es ético y relacional. «Bien / mal» reproduce con naturalidad la antítesis del hebreo; «bondad / maldad» sería más interpretativo.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la pregunta retórica. «Porque» es claro en español y mantiene el enlace causal.
- source_word: כָר֥וּ שׁוּחָה
  english_pob_choice: they have dug a pit
  chosen_spanish: han cavado una fosa
  alternatives_spanish:
  - han cavado un hoyo
  - han abierto una trampa
  lexicon: HALOT
  rationale: «Fosa» conserva el sentido de hoyo cavado con intención de atraparlo; en español suena más natural y grave que una traducción demasiado literal de «pit».
- source_word: לְנַפְשִׁי
  english_pob_choice: for my life
  chosen_spanish: para mi vida
  alternatives_spanish:
  - para mí
  - para mi alma
  lexicon: HALOT
  rationale: «נפשׁ» aquí se refiere a la vida/persona en peligro. «Para mi vida» mantiene la concreción del peligro, siguiendo la decisión inglesa de no espiritualizar el término.
- source_word: זְכֹר
  english_pob_choice: Remember
  chosen_spanish: Acuérdate
  alternatives_spanish:
  - Recuerda
  - Ten presente
  lexicon: HALOT
  rationale: Imperativo de oración dirigido a Dios. «Acuérdate» es reverente, claro y natural en registro bíblico contemporáneo.
- source_word: עָמְדִי לְפָנֶיךָ
  english_pob_choice: that I stood before you
  chosen_spanish: de que estuve delante de ti
  alternatives_spanish:
  - que estuve en tu presencia
  - de que me puse delante de ti
  lexicon: HALOT
  rationale: La locución expresa la postura de intercesión delante de Dios. «Delante de ti» comunica bien la imagen espacial sin añadir explicación.
- source_word: לְדַבֵּר עֲלֵיהֶם טוֹבָה
  english_pob_choice: to speak good on their behalf
  chosen_spanish: para hablar bien de ellos
  alternatives_spanish:
  - para hablar por su bien
  - para interceder por ellos
  lexicon: HALOT
  rationale: El hebreo permite el sentido de hablar favorablemente/interceder. La opción española mantiene esa ambivalencia sin imponer una paráfrasis más explícita que el texto.
- source_word: לְהָשִׁיב אֶת חֲמָתְךָ מֵהֶם
  english_pob_choice: to turn your wrath away from them
  chosen_spanish: para apartar de ellos tu furor
  alternatives_spanish:
  - para desviar de ellos tu ira
  - para hacer volver tu furor de ellos
  lexicon: HALOT
  rationale: El hiphil de שוב expresa hacer volver/apartar. «Apartar de ellos» es idiomático en español y conserva el movimiento de alejamiento. «Furor» refleja היטב la intensidad de חמה en este contexto de juicio; se mantiene una posible tensión con «ira» sin resolverla artificialmente.
theological_decisions:
- issue: Término divino חֲמָה
  english_pob_reading: wrath
  chosen_spanish_reading: furor
  alternative_spanish_readings:
  - ira
  - cólera
  rationale: En el marco de una intercesión ante el juicio divino, «furor» conserva la gravedad y la fuerza afectiva/judicial del término hebreo. «Ira» también es posible, pero «furor» evita suavizar la intensidad.
  doctrine_reference: Translation philosophy §6
- issue: Sentido de נֶפֶשׁ
  english_pob_reading: my life
  chosen_spanish_reading: mi vida
  alternative_spanish_readings:
  - mi alma
  - mi persona
  rationale: El contexto es una amenaza contra Jeremías, no una discusión antropológica. «Mi vida» mantiene el sentido concreto de peligro mortal y evita introducir una dicotomía alma/cuerpo ajena al versículo.
  doctrine_reference: Translation philosophy §1
- issue: Intercesión de Jeremías ante Dios
  english_pob_reading: to speak good on their behalf
  chosen_spanish_reading: para hablar bien de ellos
  alternative_spanish_readings:
  - para hablar por su bien
  - para interceder por ellos
  rationale: La frase puede entenderse como mediación favorable o como hablar bien en su favor. La versión española conserva esa amplitud, de acuerdo con el audit trail que preserva la tensión lexical sin cerrarla en exceso.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La base inglesa fue revisada de «how I stood before you» a «that I stood before you» para mayor naturalidad formal; la versión española sigue esa lectura y mantiene el tono de oración e intercesión sin añadir elementos ajenos al hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca explícitamente el nombre divino; aquí el hebreo usa pronombres y no requiere inserción del nombre.
  - Se preserva la distinción entre «vida» y «alma» mediante nota, conforme al valor de נֶפֶשׁ en un contexto de amenaza mortal.
  - «Furor» se eligió para reflejar la intensidad de חמה sin neutralizarla; en otros contextos narrativos podría preferirse «ira».
  - La puntuación conserva el paralelismo y la relación causal del hebreo con una división natural en dos oraciones en español.
