translation:
  language: es
  text: 'Y el padre de la joven dirá a los ancianos: «Yo di mi hija a este hombre como esposa, y él la odia».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וְאָמַר
  english_pob_choice: And ... shall say
  chosen_spanish: dirá
  alternatives_spanish:
  - y dirá
  - entonces dirá
  lexicon: HALOT
  rationale: En este contexto legal-procedural, el hebreo funciona como fórmula prescriptiva. En español, el futuro simple expresa con naturalidad la instrucción normativa sin sonar a relato pasado.
- source_word: אֲבִי הַנַּעַר
  english_pob_choice: the young woman’s father
  chosen_spanish: el padre de la joven
  alternatives_spanish:
  - el padre de la muchacha
  - el padre de la doncella
  lexicon: HALOT
  rationale: נַעַר/נַעֲרָה aquí apunta a una persona joven en edad matrimonial. «Joven» conserva esa idea con español natural y evita tanto el infantilismo de «niña» como el arcaísmo de «doncella».
- source_word: הַזְּקֵנִים
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los mayores
  - los ancianos del pueblo
  lexicon: HALOT
  rationale: En este marco jurídico, el término designa a los líderes reconocidos de la comunidad. «Ancianos» es el equivalente tradicional y preciso en español bíblico.
- source_word: אֶת בִּתִּי
  english_pob_choice: my daughter
  chosen_spanish: mi hija
  alternatives_spanish:
  - a mi hija
  lexicon: HALOT
  rationale: El marcador de objeto directo no se traduce en español. «Mi hija» expresa de forma directa y natural la posesión familiar en la confesión legal.
- source_word: נָתַתִּי
  english_pob_choice: I gave
  chosen_spanish: di
  alternatives_spanish:
  - he dado
  - entregué
  lexicon: HALOT
  rationale: En arreglos matrimoniales, נָתַן conserva su sentido básico de «dar». El pretérito simple encaja bien en la cita directa y mantiene la sobriedad legal del hebreo.
- source_word: לָאִישׁ הַזֶּה
  english_pob_choice: to this man
  chosen_spanish: a este hombre
  alternatives_spanish:
  - a este varón
  - a este marido
  lexicon: HALOT
  rationale: «Hombre» reproduce el valor básico de אִישׁ sin introducir de antemano una reinterpretación como «marido». El demostrativo conserva la referencia acusatoria concreta.
- source_word: לְאִשָּׁה
  english_pob_choice: as a wife
  chosen_spanish: por mujer
  alternatives_spanish:
  - como esposa
  - en matrimonio
  lexicon: HALOT
  rationale: La frase hebrea pertenece al lenguaje matrimonial de entrega. «Por mujer» suena algo más literal que «como esposa» y mantiene la relación con el varón sin añadir matices no explicitados por el hebreo. Se conserva una ligera tensión entre el uso legal y el español corriente, pero es comprensible y fiel.
- source_word: וַיִּשְׂנָאֶהָ
  english_pob_choice: and he hates her
  chosen_spanish: y él la odia
  alternatives_spanish:
  - y la aborrece
  - y ha llegado a odiarla
  lexicon: HALOT
  rationale: שָׂנֵא significa «odiar/aborrecer». «Odia» mantiene la fuerza semántica sin suavizarla; el pronombre explícito ayuda a la claridad en español. No se atenúa la tensión léxica del verbo.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo masorético y refleja la decisión inglesa de no suavizar שָׂנֵא. No se introdujeron cambios respecto del criterio auditado: se mantuvo el valor legal-procedural de la fórmula inicial y la ambigüedad aspectual del verbo final se consignó en nota.'
  spanish_consistency_notes:
  - Se usó «ancianos» como término técnico comunitario/judicial, en línea con el uso bíblico habitual.
  - Se evitó «Cristo», «SEÑOR» y otros términos no pertinentes al versículo.
  - «Joven» traduce la idea de persona en edad de casarse sin recurrir a arcaísmos.
  - La frase «por mujer» preserva el giro matrimonial del hebreo, aunque en español pueda sonar menos idiomática que una paráfrasis más libre.
