review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo y sigue la decisión auditada de entender תְּנוּ עֹז como un modismo exhortativo: no ''dar'' fuerza literal a Dios, sino reconocerla/atribuirla. ''Su majestad sobre Israel'' y ''su fuerza ...'' preservan adecuadamente el paralelismo. Sin embargo, el manejo de בַּשְּׁחָקִים y su nota no queda bien resuelto: el texto principal usa ''en los cielos'', pero la nota ofrece ''en los cielos'' como alternativa a sí mismo, perdiendo la alternativa inglesa ''in the skies'' y creando una nota defectuosa.'
  spanish_quality_summary: El español es claro, digno y bastante natural. 'Atribuyan fuerza a Dios' funciona, aunque suena algo más técnico que otras opciones posibles; no requiere cambio. La reparación necesaria es la nota b, que actualmente es incoherente y no aporta información útil. Conviene ajustar el texto principal a 'en los cielos altos' para distinguirlo de la alternativa 'en los cielos' y reflejar mejor la imaginería elevada de שְׁחָקִים sin caer en repetición impropia en la nota.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: אֱלֹהִים = ''Dios'' está correcto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. La elección de ''fuerza'' para עֹז es consistente y la repetición poética se conserva.'
  issues:
  - severity: medium
    issue: La nota b es defectuosa porque ofrece 'en los cielos' como alternativa a un texto principal que ya dice 'en los cielos'.
    rationale: La nota no preserva correctamente las alternativas documentadas en la auditoría inglesa y resulta inútil/confusa para el lector español.
  - severity: low
    issue: La elección principal 'en los cielos' aplana un poco el matiz poético de שְׁחָקִים.
    rationale: El inglés auditado eligió 'in the skies' precisamente para mantener la imaginería elevada y evitar sobreespecificar. En español, 'en los cielos altos' reproduce mejor ese matiz y permite una nota significativa con 'en las nubes' o 'en los cielos'.
  revised_spanish_text: Atribuyan[a] fuerza a Dios; su majestad está sobre Israel, y su fuerza está en los cielos altos[b].
  revised_footnotes:
  - marker: a
    text: 'O: «Den fuerza a Dios»; el hebreo usa el verbo «dar», pero aquí funciona idiomáticamente como un llamado a reconocer o atribuir la fuerza de Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en las nubes» o «en los cielos».'
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción principal del imperativo idiomático con 'Atribuyan'. Se corrige la nota b para que no repita el texto principal y se ajusta בַּשְּׁחָקִים a 'en los cielos altos', que suena natural en español, refleja mejor la imaginería poética del hebreo y deja espacio para alternativas reales en la nota.
