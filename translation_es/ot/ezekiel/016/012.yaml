translation:
  language: es
  text: Y puse un anillo en tu nariz[a], pendientes en tus orejas, y una corona espléndida sobre tu cabeza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un anillo para la nariz en tu nariz». נזם puede referirse específicamente a un ornamento nasal de este tipo en este contexto.
    reason: lexical_alternative
  - marker: b
    text: Lit. «una corona de belleza» o «una corona de esplendor».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתֵּן
  english_pob_choice: And I put
  chosen_spanish: Y puse
  alternatives_spanish:
  - Y di
  - Entonces puse
  lexicon: HALOT
  rationale: En este contexto de adorno corporal, נתן expresa la acción concreta de colocar; «puse» comunica ese acto de forma natural en español sin perder la literalidad básica.
- source_word: נֶזֶם
  english_pob_choice: a ring
  chosen_spanish: un anillo
  alternatives_spanish:
  - un aro
  - un anillo para la nariz
  - un adorno nasal
  lexicon: HALOT
  rationale: נזם puede designar un aro o anillo ornamental. Como el texto especifica «en tu nariz», «un anillo» conserva la forma general del objeto y evita sobreespecificar sin necesidad.
- source_word: עַל אַפֵּךְ
  english_pob_choice: on your nose
  chosen_spanish: en tu nariz
  alternatives_spanish:
  - sobre tu nariz
  - en la nariz
  lexicon: HALOT
  rationale: Aunque el hebreo usa עַל, en español la colocación de un adorno nasal se expresa mejor con «en tu nariz». Mantiene la referencia corporal directa y suena idiomático.
- source_word: וַעֲגִילִים
  english_pob_choice: earrings
  chosen_spanish: aretes
  alternatives_spanish:
  - pendientes
  - aros
  lexicon: HALOT
  rationale: עגילים son ornamentos para las orejas; «aretes» es un equivalente claro y ampliamente comprensible en el español latinoamericano.
- source_word: עַל אָזְנָיִךְ
  english_pob_choice: on your ears
  chosen_spanish: en tus orejas
  alternatives_spanish:
  - sobre tus orejas
  - en tus oídos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sobre tus orejas», pero en español «en tus orejas» es la formulación natural para un adorno puesto allí, sin perder la localización corporal.
- source_word: וַעֲטֶרֶת תִּפְאֶרֶת
  english_pob_choice: a splendid crown
  chosen_spanish: una corona espléndida
  alternatives_spanish:
  - una corona magnífica
  - una corona de esplendor
  - una corona hermosa
  lexicon: HALOT
  rationale: תפארת añade la idea de esplendor, belleza o gloria. «Espléndida» refleja mejor esa carga que un simple «hermosa», y conserva el tono elevado del original.
- source_word: בְּרֹאשֵׁךְ
  english_pob_choice: on your head
  chosen_spanish: sobre tu cabeza
  alternatives_spanish:
  - en tu cabeza
  - sobre tu cabeza
  lexicon: HALOT
  rationale: Para una corona, «sobre tu cabeza» es la forma más natural y precisa en español, y mantiene el sentido de colocación del hebreo.
translation_notes:
  revision_awareness: El texto español sigue la última revisión inglesa al reflejar «splendid crown» con «corona espléndida», y conserva la decisión auditada de mantener el objeto principal de נזם como «anillo» con la localización corporal explícita en la frase.
  spanish_consistency_notes:
  - Se mantiene un registro moderno y reverente, apto para lectura pública.
  - Se evita «SEÑOR» u otra terminología no pertinente; no hay tensiones teológicas en este versículo.
  - «Aretes» funciona bien para el español latinoamericano y conserva la claridad del paralelo con las orejas.
  - La nota sobre la corona preserva la alternativa literal que el inglés documentó como «crown of beauty».
