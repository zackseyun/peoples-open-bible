translation:
  language: es
  text: Los herí con tizón, con moho y con granizo[a], toda obra de sus manos; pero no se volvieron a mí, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y no estuvieron para mí» o «y ninguno de ustedes estuvo hacia mí»; el sentido en contexto es que no se volvieron a Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכֵּ֨יתִי
  english_pob_choice: I struck
  chosen_spanish: Yo los herí
  alternatives_spanish:
  - Yo los golpeé
  - Yo los castigué
  lexicon: HALOT
  rationale: נכה expresa un golpe o herida infligidos por Dios en juicio. En español, «herí» comunica el daño real y mantiene el tono judicial sin sonar demasiado literalista como «golpeé».
- source_word: בַּשִּׁדָּפוֹן
  english_pob_choice: with blight
  chosen_spanish: con tizón
  alternatives_spanish:
  - con blight
  - con quemadura
  - con blasto
  lexicon: HALOT
  rationale: El término hebreo designa una plaga agrícola que seca o quema las plantas. «Tizón» es un equivalente español tradicional y natural para ese daño de los cultivos, más preciso que un préstamo como «blight».
- source_word: וּבַיֵּרָקוֹן
  english_pob_choice: and mildew
  chosen_spanish: con añublo
  alternatives_spanish:
  - con mildiú
  - con enfermedad vegetal
  - con mildew
  lexicon: HALOT
  rationale: יֵרָקוֹן alude a una afección vegetal de palidez o amarilleo. «Añublo» conserva el campo agrícola y el matiz de enfermedad de las plantas; «mildiú» sería posible, pero menos clásico en este contexto.
- source_word: וּבַבָּרָד
  english_pob_choice: and hail
  chosen_spanish: con granizo
  alternatives_spanish:
  - y granizo
  - con piedra
  lexicon: HALOT
  rationale: בָּרָד significa claramente «granizo». Se mantiene la coordinación instrumental que corresponde al hebreo y al inglés auditado.
- source_word: אֵת כָּל מַעֲשֵׂה יְדֵיכֶם
  english_pob_choice: all the work of your hands
  chosen_spanish: toda la obra de sus manos
  alternatives_spanish:
  - todo el trabajo de ustedes
  - todo lo producido por sus manos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para el fruto del trabajo humano. En español, «toda la obra de sus manos» preserva el giro bíblico sin volverse oscuro; el posesivo «sus» mantiene el referente colectivo del versículo.
- source_word: וְאֵין אֶתְכֶם אֵלַי
  english_pob_choice: yet you did not turn to me
  chosen_spanish: pero no se volvieron a mí
  alternatives_spanish:
  - pero no vinieron a mí
  - pero no estaban para mí
  - y no estuvieron hacia mí
  lexicon: HALOT
  rationale: El hebreo es elíptico e idiomático. Siguiendo la lectura auditada, el sentido en contexto es de no volver/volverse a Yahvé tras el castigo. «No se volvieron a mí» conserva la tensión sin explicitar más de lo que el contexto pide.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: נְאֻם es la fórmula profética solemne estándar. «Declara Yahvé» es natural en español y mantiene la fuerza declarativa del original y del texto inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según el estándar del proyecto, en lugar de sustituirlo por un título o por una forma tradicional menos precisa.
theological_decisions:
- issue: Sentido de וְאֵין אֶתְכֶם אֵלַי
  english_pob_reading: 'A covenantal failure to return/respond to God after judgment: ''yet you did not turn to me.'''
  chosen_spanish_reading: 'Un fracaso de respuesta de pacto: ''pero no se volvieron a mí.'''
  alternative_spanish_readings:
  - pero no estuvieron conmigo
  - pero ninguno de ustedes vino a mí
  - pero no fueron hacia mí
  rationale: La frase hebrea no expresa solo ausencia, sino la falta de retorno obediente después del juicio. La versión española evita volverla demasiado mecánica y conserva la lectura de arrepentimiento implícita del contexto profético.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del texto inglés, que ajustó solo la puntuación: se conservó el contenido léxico y la relación causal/judicial entre el castigo y la falta de retorno. En español se reflejó esa misma estructura con una coma antes de la cláusula final, manteniendo un tono formal y bíblico.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrama.
  - Se prefirió «volvieron» para capturar la lectura covenantal de retorno, en línea con el audit trail inglés.
  - Se eligieron términos agrícolas españoles corrientes («tizón», «añublo», «granizo») para preservar la inteligibilidad sin perder el juicio sobre la cosecha.
  - Se mantuvo el posesivo plural «sus» para reflejar que el juicio alcanza colectivamente a la comunidad.
