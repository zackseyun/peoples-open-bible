translation:
  language: es
  text: 'Le dijeron[a]: «José todavía vive, y él gobierna sobre toda la tierra de Egipto». Pero su corazón quedó entumecido, porque no les creyó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su corazón se desvaneció» o «su corazón desfalleció». El hebreo describe la respuesta interior atónita y debilitada de Jacob al oír el informe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגִּדוּ
  english_pob_choice: They told
  chosen_spanish: Le informaron
  alternatives_spanish:
  - Le dijeron
  - Le reportaron
  lexicon: HALOT
  rationale: El verbo higgid en hiphil puede significar contar, informar o declarar. «Le informaron» conserva el sentido de comunicar una noticia importante y mantiene un tono digno y natural en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - 'y le dijeron:'
  - —
  lexicon: HALOT
  rationale: Se mantiene la fórmula introductoria del discurso directo sin volver el español mecánico.
- source_word: עוֹד יוֹסֵף חַי
  english_pob_choice: Joseph is still alive
  chosen_spanish: José todavía vive
  alternatives_spanish:
  - José sigue vivo
  - José aún vive
  lexicon: HALOT
  rationale: עוֹד marca continuidad del estado. «Todavía vive» expresa bien la permanencia de la vida de José con naturalidad en español.
- source_word: וְכִי הוּא מֹשֵׁל
  english_pob_choice: and he is ruler
  chosen_spanish: y él es gobernante
  alternatives_spanish:
  - y él gobierna
  - y es el que gobierna
  lexicon: HALOT
  rationale: מֹשֵׁל denota ejercicio de autoridad. «Gobernante» conserva el valor amplio de gobierno sin restringirlo a un cargo técnico específico; se mantuvo «él» para reflejar el énfasis del hebreo.
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  english_pob_choice: over all the land of Egypt
  chosen_spanish: sobre toda la tierra de Egipto
  alternatives_spanish:
  - en toda la tierra de Egipto
  - a lo largo de toda la tierra de Egipto
  lexicon: HALOT
  rationale: La preposición ב en este contexto expresa esfera/dominio. «Sobre» comunica la autoridad de José de manera idiomática y fiel.
- source_word: וַיָּפָג לִבּוֹ
  english_pob_choice: his heart went numb
  chosen_spanish: su corazón quedó entumecido
  alternatives_spanish:
  - su corazón se desvaneció
  - su corazón desfalleció
  - su corazón quedó sin fuerzas
  lexicon: HALOT
  rationale: פוג describe debilidad, adormecimiento o desfallecimiento interior. «Quedó entumecido» preserva la imagen corporal y la reacción atónita de Jacob, sin decidir de forma exclusiva por «desfalleció» o «se desvaneció».
- source_word: כִּי לֹא הֶאֱמִין לָהֶם
  english_pob_choice: for he did not believe them
  chosen_spanish: porque no les creía
  alternatives_spanish:
  - porque no les creyó
  - pues no les creía
  lexicon: HALOT
  rationale: כִּי introduce la causa de la reacción de Jacob. «No les creía» conserva el sentido continuo o habitual del acto de no darles crédito en ese momento.
theological_decisions:
- issue: 'La reacción interior de Jacob: idiomática pero no simplificada'
  english_pob_reading: his heart went numb; the Hebrew idiom describes Jacob's stunned, weakened inner response when he heard the report.
  chosen_spanish_reading: su corazón quedó entumecido
  alternative_spanish_readings:
  - su corazón se desvaneció
  - su corazón desfalleció
  rationale: El hebreo presenta una metáfora somática de respuesta emocional intensa. «Entumecido» mantiene la imagen y permite la tensión entre estupor, debilidad y shock sin resolverla por completo hacia una sola paráfrasis.
  doctrine_reference: Lexical/theological sensitivity to Hebrew idiom; no doctrinal issue.
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo de forma directa y coincide en alta medida con el análisis inglés POB. Se preserva la ambigüedad del idiomatismo de וַיָּפָג לִבּוֹ sin eliminar la posibilidad de otras equivalencias españolas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; aquí no aplica.
  - Se mantiene «Dios/Mesías/Jesús» según los estándares del proyecto, pero no aparecen en este versículo.
  - «Gobernante» se usa como equivalente amplio de מֹשֵׁל, evitando «gobernador» por posible restricción administrativa innecesaria.
  - La puntuación conserva el discurso directo y la relación causal final del versículo.
