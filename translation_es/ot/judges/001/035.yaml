base_translation:
  language: en
  yaml_path: translation/ot/judges/001/035.yaml
  text: But the Amorites persisted in dwelling in Mount Heres[a], in Aijalon, and in Shaalbim; then the hand of the house of Joseph grew heavy[b], and they became subject to forced labor.
  footnotes:
  - marker: a
    text: Or 'the hand of the house of Joseph prevailed,' literally 'grew heavy.' The Hebrew idiom can express increasing strength or oppressive power.
    reason: lexical_alternative
  - marker: b
    text: Or 'they were put to forced labor' or 'they became tributary laborers.' The Hebrew term refers to compulsory labor service.
    reason: lexical_alternative
