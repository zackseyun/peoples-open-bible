translation:
  language: es
  text: 'Esta es la palabra que Yahvé ha hablado acerca de él[a]: «La virgen hija de Sión[b] te desprecia y se burla de ti; la hija de Jerusalén menea la cabeza detrás de ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘contra él’ para ‘acerca de él’; la preposición hebrea puede llevar ambos sentidos en habla profética.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘Virgen Hija de Sion’, una personificación poética de Sion/Jerusalén.'
    reason: cultural_note
lexical_decisions:
- source_word: הַדָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el asunto
  lexicon: HALOT
  rationale: דָּבָר puede significar ‘palabra’, ‘cosa’, ‘asunto’ o ‘mensaje’. En la fórmula profética, ‘la palabra’ conserva bien la introducción oracular y suena natural en español.
- source_word: דִּבֶּר יְהוָה
  english_pob_choice: the LORD has spoken
  chosen_spanish: Yahvé ha hablado
  alternatives_spanish:
  - Yahvé habló
  - Yahvé ha dicho
  lexicon: HALOT
  rationale: El perfecto verbal funciona como introducción de una declaración profética. Se mantiene el tiempo compuesto para reflejar el valor reportativo y se usa ‘Yahvé’ según la política del proyecto para יְהוָה.
- source_word: עָלָיו
  english_pob_choice: concerning him
  chosen_spanish: acerca de él
  alternatives_spanish:
  - contra él
  - sobre él
  lexicon: HALOT
  rationale: La preposición עַל con דִּבֶּר en este tipo de contexto puede ser ‘acerca de’ o ‘contra’. Se conserva una opción amplia en español sin cerrar de antemano la fuerza hostil del oráculo.
- source_word: בָּזָה לְךָ
  english_pob_choice: despises you
  chosen_spanish: te desprecia
  alternatives_spanish:
  - te menosprecia
  - te desdeña
  lexicon: HALOT
  rationale: בזה expresa desprecio o desdén. ‘Te desprecia’ es la equivalencia directa y digna en español moderno.
- source_word: לָעֲגָה לְךָ
  english_pob_choice: mocks you
  chosen_spanish: se burla de ti
  alternatives_spanish:
  - te escarnece
  - te mofa
  lexicon: HALOT
  rationale: לעג comunica burla, mofa o escarnio. ‘Se burla de ti’ es natural en español y mantiene el paralelo con ‘te desprecia’.
- source_word: בְּתוּלַת בַּת צִיּוֹן
  english_pob_choice: Virgin Daughter Zion
  chosen_spanish: la virgen hija de Sion
  alternatives_spanish:
  - la virgen hija de Sión
  - la doncella hija de Sion
  lexicon: HALOT
  rationale: Se conserva la personificación poética y la tensión semántica de בְּתוּלַת. En español, ‘virgen’ y ‘hija de Sion’ reproducen el paralelismo sin suavizar el término.
- source_word: אַחֲרֶיךָ
  english_pob_choice: behind you
  chosen_spanish: detrás de ti
  alternatives_spanish:
  - tras de ti
  - a tus espaldas
  lexicon: HALOT
  rationale: 'El sentido espacial es literal: la ciudad personificada ridiculiza al enemigo mientras este se retira. ‘Detrás de ti’ es claro y fiel.'
- source_word: רֹאשׁ הֵנִיעָה
  english_pob_choice: shakes her head
  chosen_spanish: menea la cabeza
  alternatives_spanish:
  - sacude la cabeza
  - hace un gesto con la cabeza
  lexicon: HALOT
  rationale: El hebreo describe un gesto de desprecio. ‘Menear la cabeza’ preserva el modismo y el matiz de burla mejor que una paráfrasis más libre.
- source_word: בַּת יְרוּשָׁלִָם
  english_pob_choice: Daughter Jerusalem
  chosen_spanish: la hija de Jerusalén
  alternatives_spanish:
  - la hija Jerusalén
  - la doncella Jerusalén
  lexicon: HALOT
  rationale: Se conserva el título personificado como expresión poética paralela a ‘la virgen hija de Sion’. ‘La hija de Jerusalén’ es transparente en español y fiel a la construcción.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Conforme a la política del proyecto, se mantiene el nombre divino como ‘Yahvé’ en lugar de una sustitución convencional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Personified Zion/Jerusalem imagery
  english_pob_reading: Virgin Daughter Zion / Daughter Jerusalem
  chosen_spanish_reading: la virgen hija de Sion / la hija de Jerusalén
  alternative_spanish_readings:
  - la virgen hija de Sión / la hija de Jerusalén
  - la doncella de Sion / la doncella de Jerusalén
  rationale: La expresión hebrea es una personificación poética de la ciudad. Se conserva la estructura titulada y el tono figurado sin convertirlo en un mero nombre propio.
  doctrine_reference: 'Poética profética: personificación de Sion/Jerusalén'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el pasado editorial del POB en inglés: la revisión más reciente ajustó la sintaxis para hacer más natural la personificación (‘the virgin daughter of Zion’, ‘the daughter of Jerusalem’) sin perder la literalidad estructural. La versión española refleja esa decisión con artículos definidos y mantiene el paralelismo poético.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה.
  - Se mantiene ‘Sion’ sin tilde por coherencia editorial con la tradición textual del proyecto; puede normalizarse a ‘Sión’ si el corpus español adopta esa ortografía de manera uniforme.
  - Se conserva el paralelismo desprecio/burla con verbos distintos para no aplanar el hebreo.
  - La puntuación con comillas angulares respeta el estilo editorial en español y delimita claramente el discurso directo.
