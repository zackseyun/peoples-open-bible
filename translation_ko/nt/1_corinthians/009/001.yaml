lexical_decisions:
- source_word: ἐλεύθερος
  english_pob_choice: free
  chosen_korean: 자유롭다
  lexicon: BDAG
  rationale: 바울은 사도적 권리를 자유의 문제로 제기하므로 직접적이고 평이한 「자유롭다」가 본문 흐름에 맞는다.
- source_word: ἀπόστολος
  english_pob_choice: apostle
  chosen_korean: 사도
  lexicon: BDAG
  rationale: 바울의 직무적 호칭으로 굳어진 신약 용어. 「사도」가 한국어 표준 등가어.
- source_word: ἑόρακα
  english_pob_choice: have seen
  chosen_korean: 보지 않았습니까
  lexicon: BDAG
  rationale: 완료형의 지속적 의미를 한국어 부정 의문문으로 자연스럽게 살린다.
- source_word: ἔργον
  english_pob_choice: work
  chosen_korean: 일의 결실
  lexicon: BDAG
  rationale: 고린도 교회가 바울의 사도 사역의 결과물임을 가리키는 문맥에서, 단순 「일」보다 「일의 결실」이 의미를 분명히 전달한다.
