translation:
  language: es
  text: Y tú, mi señor el rey, los ojos de todo Israel están puestos sobre ti[a], para decirles quién se sentará en el trono de mi señor el rey después de él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «los ojos de todo Israel están sobre ti».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, después del rey David.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi señor, oh rey
  - mi amo el rey
  lexicon: HALOT
  rationale: אֲדֹנִי es un tratamiento deferente, no un simple posesivo; en español, «mi señor» conserva la cortesía cortesana. «El rey» mantiene el título real sin introducir una fórmula litúrgica ajena al contexto.
- source_word: עֵינֵי כָל יִשְׂרָאֵל עָלֶיךָ
  english_pob_choice: the eyes of all Israel are on you
  chosen_spanish: los ojos de todo Israel están puestos sobre ti
  alternatives_spanish:
  - los ojos de todo Israel están sobre ti
  - todo Israel está mirando hacia ti
  lexicon: HALOT
  rationale: La imagen idiomática se conserva en español con «están puestos sobre ti», que mantiene la metáfora visual y expresa expectativa/atención. «De todo Israel» reproduce el sentido colectivo del hebreo sin forzar una estructura posesiva más pesada.
- source_word: לְהַגִּיד לָהֶם
  english_pob_choice: to tell them
  chosen_spanish: para decirles
  alternatives_spanish:
  - para declarárselo
  - para hacerles saber
  lexicon: HALOT
  rationale: El infinitivo causativo de נגד aquí comunica simplemente el acto de informar en un contexto de corte; «decirles» es natural y fiel, sin intensificar innecesariamente el tono jurídico.
- source_word: מִי יֵשֵׁב
  english_pob_choice: who will sit
  chosen_spanish: quién se sentará
  alternatives_spanish:
  - quién habrá de sentarse
  - quién ha de sentarse
  lexicon: HALOT
  rationale: Con lenguaje de trono, ישב alude a la entronización o sucesión. «Se sentará» conserva la imagen verbal del hebreo y su valor futuro de designación sucesoria.
- source_word: עַל כִּסֵּא
  english_pob_choice: on the throne
  chosen_spanish: en el trono
  alternatives_spanish:
  - sobre el trono
  - en el asiento real
  lexicon: HALOT
  rationale: Aunque עַל sería literalmente «sobre», en español «en el trono» suena más natural y sigue transmitiendo la entronización. Se evita una calca rígida sin perder el contenido real.
- source_word: אַחֲרָיו
  english_pob_choice: after him
  chosen_spanish: después de él
  alternatives_spanish:
  - tras él
  - como su sucesor
  lexicon: HALOT
  rationale: El sufijo pronominal de tercera persona singular se conserva con un antecedente personal explícito. «Después de él» mantiene la sucesión dinástica y deja claro el referente sin explicitarlo más allá del hebreo.
theological_decisions:
- issue: Referente de «después de él»
  english_pob_reading: after him = after King David
  chosen_spanish_reading: después de él = después del rey David
  alternative_spanish_readings:
  - después de esto
  - luego
  rationale: El hebreo usa un sufijo masculino singular que naturalmente remite al rey recién mencionado. En español conviene conservar el pronombre explícito para no perder la referencia personal a David y la cuestión de sucesión real.
  doctrine_reference: Consistencia contextual y respeto al referente pronominal; no se resuelve mediante paráfrasis temporal genérica.
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado de revisión más reciente, que indica que no hubo cambios necesarios y que el acuerdo general con la auditoría inglesa es alto. Por eso la redacción española sigue de cerca las decisiones léxicas ya establecidas, sin introducir ajustes innecesarios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí no aparece el nombre divino.
  - Se conserva «mi señor el rey» para reflejar el tratamiento cortesano del hebreo.
  - «Trono» se usa de manera coherente con el campo semántico real/sucesorio de la perícopa.
  - La metáfora de la vista colectiva se expresa con un giro natural en español sin perder la imagen original.
