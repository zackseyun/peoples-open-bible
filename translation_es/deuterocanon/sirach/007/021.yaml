translation:
  language: es
  text: Ama a un esclavo inteligente[a] como a ti mismo, y no le niegues la libertad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''inteligente''; el paralelo griego dice ''bueno''.'
    reason: alternative_reading
lexical_decisions:
- source_word: עֶבֶד / οἰκέτην
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - sirviente
  lexicon: HALOT; LXX οἰκέτης
  rationale: El contexto hace explícita la condición de dependencia porque se ordena no privarlo de libertad. Por eso 'esclavo' conserva mejor la fuerza social del término que 'siervo' o 'sirviente'.
- source_word: מַשְׂכִּיל / ἀγαθὸν
  english_pob_choice: intelligent
  chosen_spanish: inteligente
  alternatives_spanish:
  - prudente
  - sabio
  - bueno
  lexicon: HALOT; LXX ἀγαθός
  rationale: '''Inteligente'' sigue la lectura hebrea de alguien con entendimiento o discernimiento y mantiene la tensión documentada con el griego, que dice ''bueno''.'
- source_word: חַבֵּב / ἀγαπάτω
  english_pob_choice: love
  chosen_spanish: ama
  alternatives_spanish:
  - quiere
  - ama entrañablemente
  - ten cariño a
  lexicon: HALOT; LXX ἀγαπάτω
  rationale: '''Ama'' expresa el mandato afectivo con naturalidad en español y corresponde bien al griego ἀγαπάτω.'
- source_word: כְּנֶפֶש / σου ἡ ψυχή
  english_pob_choice: as yourself
  chosen_spanish: como a ti mismo
  alternatives_spanish:
  - como a tu propia alma
  - como a tu propia vida
  lexicon: HALOT; LXX σου ἡ ψυχή
  rationale: La equivalencia idiomática en español es 'como a ti mismo'. Mantiene el sentido de estima personal sin volverlo artificialmente literal.
- source_word: וְאַל תִּמְנַע / μὴ στερήσῃς
  english_pob_choice: do not withhold
  chosen_spanish: no le niegues
  alternatives_spanish:
  - no le retengas
  - no lo prives de
  lexicon: HALOT; LXX στερέω
  rationale: '''No le niegues'' comunica de forma fluida la acción de privar o retener la libertad. Dado que el objeto explícito es ''la libertad'', esta formulación suena natural en español y conserva el valor de privación.'
- source_word: חֹפֶשׁ / ἐλευθερίας
  english_pob_choice: freedom
  chosen_spanish: la libertad
  alternatives_spanish:
  - la libertad personal
  - la manumisión
  lexicon: HALOT; LXX ἐλευθερία
  rationale: '''La libertad'' es la traducción más clara y fiel del sustantivo. ''Manumisión'' sería más técnica y menos apta para el texto bíblico principal.'
theological_decisions:
- issue: Terminología de dependencia social para עֶבֶד / οἰκέτης
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - sirviente
  rationale: Se preserva la fuerza moral del mandamiento, que presupone una relación de esclavitud real y la posibilidad de liberar al dependiente. Esto evita suavizar el texto con un término más débil.
  doctrine_reference: 'DOCTRINE.md: δοῦλος servant / slave (context-dependent); usar ''esclavo'' cuando el estatus ligado es salientable'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la única nota al término 'inteligente' en el texto principal y eliminando toda nota no anclada. No se hicieron cambios de sentido respecto al borrador anterior, solo de formato y anclaje de la nota.
  spanish_consistency_notes:
  - Se usó 'esclavo' en coherencia con la terminología POB para estatus servil saliente.
  - Se mantuvo 'la libertad' para חֹפֶשׁ / ἐλευθερία por claridad y naturalidad en español.
  - La nota [a] queda exactamente anclada en 'inteligente' para reflejar la tensión hebreo-griego documentada.
