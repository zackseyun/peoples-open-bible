    issue: Falta la nota léxica alternativa correspondiente a כִּי אִם
    rationale: 'El inglés POB conservó explícitamente una alternativa: «except at the place that the LORD will choose». Dado que el proyecto pide preservar alternativas significativas cuando el inglés las preservó, el español también debe incluir una nota equivalente anclada en la frase restrictiva.'
