revisions:
- from: No moverás el lindero[a] de tu prójimo, que los primeros pusieron, en tu herencia que heredarás en la tierra que Yahvé tu Dios te da para que la poseas.
  to: No desplazarás el mojón[a] de tu prójimo, que fijaron las generaciones anteriores, en tu herencia que heredarás en la tierra que Yahvé tu Dios te da para poseerla.
  rationale: Se ajusta «lindero» a «mojón» para reflejar mejor el objeto físico implícito en el contexto legal y explicitado por el POB inglés; la nota conserva las alternativas españolas. Se cambia «los primeros» por «las generaciones anteriores» para corresponder al valor de רִאשֹׁנִים según la documentación léxica. También se prefiere «desplazarás» por mayor naturalidad jurídica y mejor matiz de alteración del límite sin sobretraducir. No se requiere adjudicación superior porque son mejoras léxicas y estilísticas de baja complejidad doctrinal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:34:12Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido global del hebreo: prohibición de alterar el límite de propiedad del prójimo dentro de la herencia recibida en la tierra que Yahvé da. También mantiene correctamente «Yahvé» para יְהוָה y «herencia/heredarás» para la pareja נַחֲלָה / תִּנְחַל. Sin embargo, dos elecciones debilitan precisión respecto del audit trail: «los primeros» no expresa con suficiente claridad רִאשֹׁנִים como generaciones anteriores, y «lindero» por sí solo tiende a sonar como la línea límite más que como el marcador físico explicitado por el POB inglés.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «No moverás» suena menos idiomático en una prohibición legal que «No desplazarás», y «lindero» sin apoyo puede dejar ambigüedad entre línea y mojón. «Los primeros pusieron» también resulta algo brusco y menos natural que una referencia a «las generaciones anteriores» que fijaron el límite. Una revisión menor mejora fidelidad y legibilidad sin paráfrasis excesiva.
  glossary_alignment: 'Alineación buena en términos clave: יְהוָה → «Yahvé» correctamente; נַחֲלָה / נחל → «herencia / heredarás» bien preservados. No hay conflicto doctrinal. La principal cuestión léxica es גְּבוּל, donde conviene reflejar mejor la concreción de «boundary marker», y רִאשֹׁנִים, donde conviene explicitar «generaciones anteriores» según la justificación documentada.'
  issues:
  - severity: medium
    issue: «los primeros» para רִאשֹׁנִים es insuficientemente específico
    rationale: El audit trail inglés justificó «the former generations» para aclarar que se trata de generaciones anteriores que establecieron los lotes. «Los primeros» es posible, pero en español queda más vago y menos natural en este contexto legal.
  - severity: medium
    issue: «lindero» no refleja con bastante claridad el marcador físico
    rationale: Aunque «lindero» puede funcionar, suele referirse al límite o lindes de la propiedad. El inglés POB explicitó «boundary marker» para evitar ambigüedad y la nota habla de una señal fija; en español conviene «mojón de tu prójimo» o «marca de lindero».
  - severity: low
    issue: «No moverás» suena algo menos idiomático que otras opciones legales en español
    rationale: «Mover» es fiel, pero con un objeto como «mojón» o «marca» la prohibición suena más natural como «no desplazarás», manteniendo además la idea de corrimiento sin sugerir eliminación total.
  revised_spanish_text: No desplazarás el mojón[a] de tu prójimo, que fijaron las generaciones anteriores, en tu herencia que heredarás en la tierra que Yahvé tu Dios te da para poseerla.
  revised_footnotes:
