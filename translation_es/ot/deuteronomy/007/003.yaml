review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo y el rastro de auditoría en casi todo: mantiene la prohibición de alianzas matrimoniales con ''ellos'', conserva ''hija/hijo'' en singular y no añade la motivación del v. 4. También preserva adecuadamente la alternativa léxica formal en nota. Sin embargo, ''emparentarás con ellos'' suena menos preciso que el valor recíproco-matrimonial de תִתְחַתֵּן y en español bíblico-legible puede sugerir parentesco en sentido más amplio, no necesariamente contraer alianzas matrimoniales.'
  spanish_quality_summary: El texto es claro y natural, pero 'emparentarás' no es la mejor opción de legibilidad ni de precisión semántica en español moderno eclesial. 'Te casarás con ellos' sería demasiado individual y menos recíproco; una formulación como 'te unirás en matrimonio con ellos' expresa mejor el sentido sin sonar forzada. El resto del versículo está bien construido y fluye con naturalidad.
  glossary_alignment: No hay términos de glosario de alto riesgo en este versículo. La decisión principal es תִתְחַתֵּן; conviene alinearla más estrechamente con la rationale inglesa ('intermarry' = alianzas matrimoniales recíprocas) evitando la amplitud semántica de 'emparentar'.
  issues:
  - severity: medium
    issue: '''Emparentarás con ellos'' es semánticamente más amplio que el hebreo.'
    rationale: תִתְחַתֵּן en hitpael se refiere específicamente a unirse por matrimonio / contraer alianzas matrimoniales. 'Emparentar' puede incluir cualquier relación de parentesco y no necesariamente destaca el acto matrimonial.
  - severity: low
    issue: La nota alternativa 'no harás matrimonios con ellos' es aceptable pero algo rígida.
    rationale: Preserva bien la alternativa formal documentada por el inglés. Puede mantenerse, aunque no es una expresión muy idiomática fuera de un registro más literal.
  revised_spanish_text: 'Y no te unirás en matrimonio con ellos[a]: no darás tu hija a su hijo, ni tomarás su hija para tu hijo.'
  revised_footnotes:
  - marker: a
    text: 'O, más formalmente: "no harás matrimonios con ellos".'
    reason: lexical_alternative
  revision_rationale: Se ajusta la primera cláusula para expresar con mayor precisión el valor matrimonial y recíproco de תִתְחַתֵּן, manteniendo un español natural y digno. Se conserva la nota alternativa ya que refleja la opción formal documentada por el POB inglés.
