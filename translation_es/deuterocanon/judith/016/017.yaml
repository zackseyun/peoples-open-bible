review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del griego: denuncia contra las naciones que se levantan contra el pueblo de Judit, venganza divina en el día del juicio, fuego y gusanos en la carne, y llanto duradero. Sin embargo, hay un desajuste importante en la nota [b]: el POB inglés documenta la dificultad léxica de ἐν αἰσθήσει (''en sensación/percepción'', contextualizado como ''in pain''), pero la nota española [b] se ancla en ''carne'' y no preserva esa decisión auditada. Además, ''Yahvé Todopoderoso'' suena algo abrupto en español; ''Yahvé, el Todopoderoso'' refleja mejor el título divino sin perder fidelidad.'
  spanish_quality_summary: El texto es legible y digno. '¡Ay de las naciones que se levantan contra mi pueblo!' y 'llorarán con dolor para siempre' son naturales. La principal mejora estilística es puntuar el título divino como aposición ('Yahvé, el Todopoderoso'), más idiomático en español eclesial. También conviene reubicar la nota [b] sobre 'con dolor' para reflejar correctamente αἴσθησις y evitar una nota engañosa.
  glossary_alignment: Buen alineamiento con la terminología del proyecto en 'Yahvé', 'carne', 'juicio' y el tono judicial. No obstante, la justificación de αἴσθησις debe conservarse en español como nota léxica, tal como en el rastro auditado inglés. La traducción de Κύριος como 'Yahvé' es aceptable aquí por la política del proyecto, aunque el griego tenga Κύριος.
  issues:
  - severity: medium
    issue: La nota [b] está aplicada al segmento equivocado.
    rationale: El inglés auditado usa la nota b para explicar ἐν αἰσθήσει ('in sensation/perception' > 'in pain'). En el borrador español, [b] está anclada en 'carne' y comenta 'en su carne', lo cual no preserva la decisión léxica documentada.
  - severity: low
    issue: El título divino 'Yahvé Todopoderoso' suena menos natural que una aposición.
    rationale: Aunque es comprensible, en español bíblico contemporáneo 'Yahvé, el Todopoderoso' o 'Yahvé el Todopoderoso' suena más idiomático para Κύριος Παντοκράτωρ. La coma ayuda a leer el nombre y el título con claridad.
  revised_spanish_text: ¡Ay de las naciones que se levantan contra mi pueblo[a]! Yahvé, el Todopoderoso, se vengará de ellos en el día del juicio, para poner fuego y gusanos en su carne, y llorarán con dolor[b] para siempre.
  revised_footnotes:
  - marker: a
    text: O «mi linaje» o «mi nación». El griego génos puede referirse al pueblo al que pertenece Judit.
    reason: lexical_alternative
  - marker: b
    text: El griego dice «en sensación/percepción». Aquí se traduce «con dolor» porque el contexto es de castigo corporal.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota [b] para que explique ἐν αἰσθήσει, conforme al rastro auditado inglés, y se mejora la naturalidad del título divino con 'Yahvé, el Todopoderoso'. El resto del texto se mantiene por ser fiel al griego y claro en español.
