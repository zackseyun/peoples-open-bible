translation:
  language: es
  text: Esta es la ley para el holocausto[a], la ofrenda de grano, la ofrenda por el pecado[b], la ofrenda por la culpa[c], los ritos de ordenación[d], y el sacrificio de paz[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ofrenda quemada' para 'holocausto'. El hebreo עֹלָה nombra la ofrenda que asciende en humo; la traducción tradicional mantiene la terminología cultual reconocible.
    reason: lexical_alternative
  - marker: b
    text: O 'ofrenda de purificación' para 'ofrenda por el pecado'. El término hebreo puede enfatizar la eliminación de la impureza además del trato con el pecado.
    reason: lexical_alternative
  - marker: c
    text: O 'ofrenda de reparación' para 'ofrenda por la culpa'. El término hebreo puede destacar la responsabilidad y la restitución requerida.
    reason: lexical_alternative
  - marker: d
    text: Hebreo 'ritos de ordenación' o 'ofrenda de consagración'; el término está en plural y se refiere a procedimientos de instalación sacerdotal.
    reason: lexical_alternative
  - marker: e
    text: O 'sacrificio de comunión' o 'sacrificio de bienestar'.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת הַתּוֹרָה
  english_pob_choice: This is the law
  chosen_spanish: Esta es la ley
  alternatives_spanish:
  - Esto es la instrucción
  lexicon: HALOT
  rationale: En este resumen legal-sacrificial, תּוֹרָה funciona como 'ley' en sentido normativo y prescriptivo. 'Esta es la ley' conserva la forma resumptiva del hebreo y suena natural en español bíblico actual.
- source_word: לָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - la ofrenda holocausto
  lexicon: HALOT
  rationale: Para עֹלָה, 'holocausto' es un término bíblico reconocido en español y conserva la idea de ofrenda totalmente ascendida/quemada. Aunque 'ofrenda quemada' es más transparente etimológicamente, 'holocausto' mantiene mejor la terminología cultual establecida.
- source_word: לַמִּנְחָה
  english_pob_choice: the grain offering
  chosen_spanish: la ofrenda vegetal
  alternatives_spanish:
  - la ofrenda de grano
  - la ofrenda de cereal
  lexicon: HALOT
  rationale: מִנְחָה en Levítico designa la ofrenda de cereal/grano. 'Ofrenda vegetal' es una opción tradicional en español bíblico que sigue siendo comprensible, aunque 'de grano' es más explícita.
- source_word: וְלַחַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: la ofrenda por el pecado
  alternatives_spanish:
  - la ofrenda de purificación
  - la ofrenda por la impureza
  lexicon: HALOT
  rationale: Mantengo la lectura tradicional 'ofrenda por el pecado' para la main text, porque el español puede expresar bien la función del sacrificio sin forzar una reinterpretación. La alternativa 'purificación' se preserva por la tensión lexical documentada en el hebreo.
- source_word: וְלָאָשָׁם
  english_pob_choice: the guilt offering
  chosen_spanish: la ofrenda por la culpa
  alternatives_spanish:
  - la ofrenda de reparación
  lexicon: HALOT
  rationale: אָשָׁם puede referir tanto a culpa como a responsabilidad y reparación. 'Por la culpa' conserva la referencia al estado de culpa sin borrar la posible carga reparadora que el término tiene en el contexto sacrificial.
- source_word: וְלַמִּלּוּאִים
  english_pob_choice: the ordination offering
  chosen_spanish: las ordenanzas de la consagración
  alternatives_spanish:
  - los ritos de ordenación
  - la ofrenda de consagración
  lexicon: HALOT
  rationale: El hebreo es plural y se refiere a procedimientos de instalación sacerdotal, no solo a una ofrenda aislada. Por eso opto por 'ordenanzas de la consagración', que respeta el plural y el alcance ritual; evita reducir indebidamente el término a un solo objeto sacrificial.
- source_word: וּלְזֶבַח הַשְּׁלָמִים
  english_pob_choice: the sacrifice of peace offerings
  chosen_spanish: el sacrificio de las ofrendas de paz
  alternatives_spanish:
  - el sacrificio de las ofrendas de comunión
  - el sacrificio de las ofrendas de bienestar
  lexicon: HALOT
  rationale: שְׁלָמִים admite matices de paz, comunión y bienestar. 'Ofrendas de paz' preserva la terminología conocida sin perder del todo el valor relacional del término; 'sacrificio' conserva זֶבַח como acto sacrificial específico.
theological_decisions:
- issue: Tratamiento de la pluralidad de מִלּוּאִים
  english_pob_reading: the ordination offering
  chosen_spanish_reading: las ordenanzas de la consagración
  alternative_spanish_readings:
  - los ritos de ordenación
  - la ofrenda de consagración
  rationale: El hebreo plural sugiere un conjunto de ritos de instalación sacerdotal. La redacción española evita singularizar indebidamente lo que el texto presenta como procedimientos/ordenanzas plurales, manteniendo la tensión del original.
  doctrine_reference: Consagración sacerdotal en Éxodo 29; Levítico 8
- issue: Alcance semántico de שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: '''Paz'' reproduce la forma tradicional y mantiene la conexión intertextual con el inventario sacrificial. No se excluyen los matices de comunión o bienestar, pero no se elevan al texto principal porque el hebreo permite ese campo semántico sin exigir una sola expansión interpretativa.'
  doctrine_reference: Ofrendas de comunión/fellowship offerings en la legislación sacrificial
translation_notes:
  revision_awareness: Se siguió el pasaje fuente hebreo y se tomó como contexto auditado la traducción inglesa POB con sus notas léxicas; no hubo revisiones posteriores aplicadas en la fuente consultada, y el estado de revisión más reciente indica que el texto permanece sin cambios.
  spanish_consistency_notes:
  - Se conserva 'ofrenda por el pecado' y 'ofrenda por la culpa' para alineación con la serie sacrificial bíblica en español, sin borrar las alternativas técnicas documentadas en el aparato.
  - '''Ofrendas de paz'' se usa como equivalente comprensible y tradicional de שְׁלָמִים, manteniendo la posibilidad de lectura relacional en la nota.'
  - Se evitó 'SEÑOR' porque el versículo no contiene el nombre divino; el texto enumera categorías sacrificiales sin referencia directa a יהוה.
