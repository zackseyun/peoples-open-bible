review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y preserva correctamente la distinción entre אשם y חטאת, además de usar «Yahvé» conforme al proyecto. Sin embargo, hay dos puntos de alineación que conviene reparar: (1) la nota [b] explica mal מֵחַטָּאתוֹ, porque dice «Literalmente, “por su pecado”» cuando el hebreo es más literalmente «de/desde su pecado» o «de su pecado», con matiz de remoción; y (2) «una cabra» es comprensible, pero «una cabra hembra» o mejor «una cabra» dentro de una estructura ya marcada por «una hembra del rebaño» es aceptable; no obstante, el texto gana precisión y fluidez si se reordena levemente.'
  spanish_quality_summary: El español es claro y bastante natural. «Ofrenda por la culpa» y «ofrenda por el pecado» son legibles y mantienen la tensión léxica. Aun así, «para ofrenda por el pecado» suena algo más pesado que «como ofrenda por el pecado», y la secuencia completa puede fluir mejor con una redacción mínima. La frase final «hará expiación por él por su pecado» es fiel, aunque la repetición de «por» resulta un poco rígida; puede mantenerse por fidelidad, pero conviene ajustar el resto del verso para mejorar la naturalidad.
  glossary_alignment: 'Alineación buena con el glosario del proyecto: יהוה -> «Yahvé» correctamente; terminología sacrificial distinguida entre אשם («ofrenda por la culpa») y חטאת («ofrenda por el pecado»); no hay conflictos con otras entradas doctrinales principales. La única desalineación real está en la formulación de la nota [b], que no refleja bien el valor más literal de מן.'
  issues:
  - severity: medium
    issue: La nota [b] da una literalidad incorrecta.
    rationale: El texto de la nota dice «Literalmente, “por su pecado”», pero el hebreo מֵחַטָּאתוֹ contiene מן y se entiende más literalmente como «de su pecado» / «desde su pecado», con posible matiz de remoción. La nota actual no preserva la evidencia fuente ni el audit trail inglés.
  - severity: low
    issue: «para ofrenda por el pecado» es algo pesado en español.
    rationale: Aunque fiel a לְחַטָּאת, en español suena más natural «como ofrenda por el pecado» sin perder el valor sacrificial ni la distinción terminológica.
  - severity: low
