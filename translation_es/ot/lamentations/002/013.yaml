translation:
  language: es
  text: ¿Qué puedo atestiguar de ti[a]? ¿Con qué puedo compararte, hija de Jerusalén? ¿A qué puedo compararte, para consolarte, virgen hija de Sion? Porque grande como el mar es tu ruina[b]; ¿quién te puede sanar?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo del primer miembro es difícil; puede entenderse como «atestiguar», «dar testimonio de ti» o, más ampliamente, «decir de ti». Se conserva una traducción que mantenga el matiz de testimonio sin precisar en exceso el giro.
    reason: lexical_alternative
  - marker: b
    text: 'También: «tu quebranto», «tu herida» o «tu fractura». El término hebreo expresa una ruptura o colapso; se eligió «ruina» siguiendo el contexto inmediato y la lectura revisada del texto fuente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה אֲעִידֵךְ
  english_pob_choice: What can I testify to you?
  chosen_spanish: ¿Qué puedo atestiguar para ti?[a]
  alternatives_spanish:
  - ¿Qué puedo dar testimonio de ti?
  - ¿Qué puedo testificar para ti?
  lexicon: HALOT
  rationale: El verbo admite un matiz forense de testimonio; en español, «atestiguar para ti» conserva la idea de dar testimonio en favor de la ciudad sin forzar una sintaxis extraña. Se mantiene la dificultad del hebreo mediante nota.
- source_word: מָה אֲדַמֶּה לָּךְ
  english_pob_choice: What can I compare you to?
  chosen_spanish: ¿Con qué puedo compararte, hija de Jerusalén?
  alternatives_spanish:
  - ¿A qué puedo compararte?
  - ¿Con qué puedo asemejarte?
  lexicon: HALOT
  rationale: דמה en este contexto expresa comparación. «Compararte» es natural en español y conserva el golpe retórico de la pregunta repetida.
- source_word: הַבַּת יְרוּשָׁלִַם
  english_pob_choice: daughter Jerusalem
  chosen_spanish: hija de Jerusalén
  alternatives_spanish:
  - hija Jerusalén
  - Jerusalén, hija
  lexicon: HALOT
  rationale: La personificación de la ciudad se expresa mejor en español con «hija de Jerusalén». Mantiene el paralelismo con «virgen hija de Sion».
- source_word: מָה אַשְׁוֶה לָּךְ
  english_pob_choice: What can I liken to you?
  chosen_spanish: ¿Con qué puedo asemejarte,
  alternatives_spanish:
  - ¿Con qué puedo igualarte?
  - ¿A qué te puedo comparar?
  lexicon: HALOT
  rationale: אַשְׁוֶה refuerza la serie de comparaciones. «Asemejarte» preserva la repetición sin reducirla a mera sinonimia con el verbo anterior.
- source_word: וַאֲנַחֲמֵךְ
  english_pob_choice: that I may comfort you
  chosen_spanish: para consolarte
  alternatives_spanish:
  - para darte consuelo
  - y consolarte
  lexicon: HALOT
  rationale: El valor consecutivo/final del verbo se expresa con «para consolarte», una solución española clara que conserva la intención del hablante.
- source_word: בְּתוּלַת בַּת צִיּוֹן
  english_pob_choice: virgin daughter Zion
  chosen_spanish: virgen hija de Sion
  alternatives_spanish:
  - doncella hija de Sion
  - virgen, hija de Sion
  lexicon: HALOT
  rationale: «Virgen» refleja el sentido léxico de בְּתוּלָה y se mantiene la personificación tradicional de Sion sin suavizarla.
- source_word: כִּי גָדוֹל כַּיָּם שִׁבְרֵךְ
  english_pob_choice: For your ruin is as great as the sea
  chosen_spanish: Porque grande como el mar es tu ruina[b]
  alternatives_spanish:
  - Porque tan grande como el mar es tu quebranto
  - Porque tu quebranto es grande como el mar
  lexicon: HALOT
  rationale: שבר en este contexto puede denotar ruptura, quebranto o ruina; se elige «ruina» siguiendo la revisión inglesa más reciente, pero se preserva la posibilidad alternativa en nota. «Grande como el mar» mantiene la comparación con el hebreo y su fuerza poética.
- source_word: מִי יִרְפָּא לָךְ
  english_pob_choice: who can heal you?
  chosen_spanish: ¿quién te puede sanar?
  alternatives_spanish:
  - ¿quién puede curarte?
  - ¿quién te puede curar?
  lexicon: HALOT
  rationale: רפא es «sanar/curar». «Sanar» conserva mejor el registro bíblico y la correspondencia con la imagen de enfermedad/herida implícita.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que afinó la sintaxis de comparación y consolidó שבר como «ruina» en lugar de «fractura». La versión española sigue esa decisión principal, pero conserva en nota el rango semántico del hebreo para no borrar la tensión léxica.
  spanish_consistency_notes:
  - 'Se preservó la serie retórica de tres preguntas con verbos distintos en español: atestiguar, comparar, asemejar.'
  - Se mantuvo «hija de Jerusalén» y «virgen hija de Sion» como personificaciones, evitando neutralizarlas.
  - Se usó «sanar» para enlazar con la imagen de herida/ruina y mantener un registro bíblico claro.
  - Se evitó introducir «SEÑOR» o una sustitución no presente en este versículo.
