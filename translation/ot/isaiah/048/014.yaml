id: ISA.48.14
reference: Isaiah 48:14
source:
  edition: WLC
  text: הִקָּבְצ֤וּ כֻלְּ/כֶם֙ וּֽ/שֲׁמָ֔עוּ מִ֥י בָ/הֶ֖ם הִגִּ֣יד אֶת אֵ֑לֶּה יְהוָ֣ה אֲהֵב֔/וֹ יַעֲשֶׂ֤ה חֶפְצ/וֹ֙ בְּ/בָבֶ֔ל וּ/זְרֹע֖/וֹ כַּשְׂדִּֽים־׃
translation:
  text: 'Gather yourselves[a], all of you, and listen: who among them has declared these things? Yahweh loves him; he will carry out his purpose in Babylon, and his arm will be against the Chaldeans.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The LORD loves him; he will carry out his purpose in Babylon, and his arm will be on the Chaldeans,' with the pronouns understood of the LORD rather than of his chosen agent.
    reason: alternative_reading
lexical_decisions:
- source_word: הִקָּבְצוּ
  chosen: Gather yourselves
  alternatives:
  - Assemble yourselves
  - Come together
  lexicon: HALOT
  rationale: Niphal imperative plural of קבץ, reflexive/passive in form but functioning as an exhortation to assemble. 'Gather yourselves' preserves the direct summons and the plural address.
- source_word: כֻלְּכֶם
  chosen: all of you
  alternatives:
  - all of you together
  - all of you
  lexicon: HALOT
  rationale: Explicitly includes the whole audience; 'all of you' is natural modern English and preserves the emphatic comprehensiveness.
- source_word: וּשֲׁמָעוּ
  chosen: and listen
  alternatives:
  - and hear
  lexicon: HALOT
  rationale: Imperative plural from שׁמע. 'Listen' better conveys the call to attentive hearing in contemporary English while remaining close to the Hebrew.
- source_word: מִי בָהֶם
  chosen: who among them
  alternatives:
  - which of them
  - who among these
  lexicon: HALOT
  rationale: The phrase asks which one among the referenced group has announced the matters in view. 'Who among them' is the most straightforward rendering.
- source_word: הִגִּיד אֶת־אֵלֶּה
  chosen: has declared these things
  alternatives:
  - has told these things
  - has announced these things
  lexicon: HALOT
  rationale: Hiphil of נגד commonly means declare, announce, make known. Present perfect English fits the rhetorical question about prior declaration.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲהֵבוֹ
  chosen: loves him
  alternatives:
  - has loved him
  - takes pleasure in him
  lexicon: HALOT
  rationale: Qal perfect 3ms + 3ms suffix from אהב. The object is singular masculine, referring to the agent the LORD has chosen for Babylon's downfall. English present 'loves him' expresses the state naturally; the perfect may also imply established favor.
- source_word: יַעֲשֶׂה חֶפְצוֹ
  chosen: he will carry out his purpose
  alternatives:
  - he will do his pleasure
  - he will accomplish his desire
  - he will perform what pleases him
  lexicon: HALOT
  rationale: עשה + חפץ idiomatically conveys accomplishing a will, desire, or purpose. 'Carry out his purpose' is idiomatic and preserves the sense of effective execution without archaic 'pleasure.' The pronouns are best taken as the favored agent carrying out the LORD's purpose.
- source_word: בְּבָבֶל
  chosen: against Babylon
  alternatives:
  - in Babylon
  - on Babylon
  lexicon: HALOT
  rationale: Although ב normally means 'in,' in this context with an action of judgment/dominion it is commonly understood in a hostile sense toward Babylon. 'Against Babylon' makes the force clear in English and matches the parallel hostile clause about the Chaldeans.
- source_word: וּזְרֹעוֹ כַּשְׂדִּים
  chosen: and his arm will be against the Chaldeans
  alternatives:
  - and his arm will be on the Chaldeans
  - and his power will be against the Chaldeans
  lexicon: HALOT
  rationale: '''Arm'' is retained as a vivid Hebrew metaphor for power/force. The verbless clause is rendered with supplied future sense from the preceding verb. The relation to ''Chaldeans'' is adversative in context, so ''against'' is supplied for intelligibility.'
