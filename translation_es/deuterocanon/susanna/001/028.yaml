  yaml_path: translation/deuterocanon/susanna/001/028.yaml
  text: But the lawless men turned back[a], threatening among themselves and lying in wait in order to put her to death. And when they came to the assembly of the city, they were not absent[b], and all the sons of Israel who were there gathered together.
