translation:
  language: es
  text: 'Por tanto, escucha ahora esto[a], afligida, ebria[b], pero no de vino:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo femenino singular; la destinataria es Sion/Jerusalén personificada como mujer.
    reason: cultural_note
  - marker: b
    text: 'O: «borracha, aunque no de vino». La imagen es metafórica y describe tambaleo bajo juicio, no intoxicación literal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  - Entonces
  lexicon: HALOT
  rationale: Expresa con naturalidad en español la fuerza inferencial de conclusión que introduce el mandato.
- source_word: שִׁמְעִי
  english_pob_choice: hear
  chosen_spanish: escucha
  alternatives_spanish:
  - oye
  - oye con atención
  lexicon: HALOT
  rationale: Imperativo femenino singular; 'escucha' transmite la llamada directa sin añadir objeto inexistente en hebreo.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: esto
  alternatives_spanish:
  - ahora
  - te ruego
  lexicon: HALOT
  rationale: La partícula נָא aporta una fuerza de ruego o urgencia, pero en español se integra mejor sin un equivalente explícito muy marcado; se mantiene el deíctico 'esto' como el objeto del llamado, siguiendo el hebreo.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - estas palabras
  lexicon: HALOT
  rationale: Demostrativo neutro/femenino en contexto; 'esto' conserva la referencia inmediata y la brevedad del original.
- source_word: עֲנִיָּה
  english_pob_choice: afflicted one
  chosen_spanish: afligida
  alternatives_spanish:
  - afligida mujer
  - oprimida
  - desdichada
  lexicon: HALOT
  rationale: Sustantivo/adjetivo femenino que personifica a Sion/Jerusalén; en español basta el femenino adjetival para conservar la personificación sin endurecer el texto con un sustantivo no exigido por el hebreo.
- source_word: וּשְׁכֻרַת
  english_pob_choice: drunk
  chosen_spanish: borracha
  alternatives_spanish:
  - ebria
  - embriagada
  lexicon: HALOT
  rationale: Reproduce la imagen fuerte y directa del hebreo; 'borracha' mantiene el impacto metafórico y la coordinación con el predicado anterior.
- source_word: וְלֹא מִיָּיִן
  english_pob_choice: but not from wine
  chosen_spanish: pero no de vino
  alternatives_spanish:
  - aunque no de vino
  - y no por vino
  - pero no con vino
  lexicon: HALOT
  rationale: La negación explicita que la embriaguez es figurada; 'de vino' conserva la relación de origen/cause de manera natural en español.
theological_decisions:
- issue: Dirección femenina singular a Sion/Jerusalén personificada
  english_pob_reading: Retain the feminine-personified address implicitly with 'afflicted one' rather than neutralizing to a plural or abstract phrase.
  chosen_spanish_reading: Conservar el femenino singular implícito en 'afligida' y 'borracha' sin convertirlo en plural ni abstraerlo.
  alternative_spanish_readings:
  - afligida mujer
  - afligido pueblo
  - ustedes, afligidos
  rationale: El hebreo interpela a Sion/Jerusalén como figura femenina singular; la traducción mantiene esa personificación literaria y teológica.
  doctrine_reference: Personificación profética de Sion/Jerusalén en Isaías 51
- issue: Embriaguez metafórica y no literal
  english_pob_reading: Or 'drunk, though not with wine.' The image is metaphorical, referring to staggering under judgment rather than literal intoxication.
  chosen_spanish_reading: Entender 'borracha, pero no de vino' como embriaguez figurada, es decir, conmoción bajo juicio y no intoxicación real.
  alternative_spanish_readings:
  - ebria, aunque no con vino
  - borracha, aunque no por vino
  rationale: El contraste del hebreo niega el vino como causa y obliga a preservar la imagen metafórica sin suavizarla.
  doctrine_reference: Lectura profética/poética del juicio divino en Isaías
translation_notes:
  revision_awareness: Se revisó la frase para mantener el mandato al femenino singular y la metáfora de embriaguez no literal, con la conclusión inferencial de לָכֵן. Se evitó una traducción mecánica desde el inglés y se preservó la economía del hebreo.
  spanish_consistency_notes:
  - Se mantuvo el registro sobrio y bíblico, sin arcaísmos innecesarios.
  - '''afligida'' conserva la personificación femenina sin añadir ''mujer'' en el texto principal.'
  - '''borracha'' retiene la fuerza metafórica del original; la nota aclara la posible alternativa ''ebria''.'
  - '''pero no de vino'' preserva la negación de la causa literal, en paralelo con el hebreo.'
