id: GEN.30.16
reference: Genesis 30:16
source:
  edition: WLC
  text: וַ/יָּבֹ֨א יַעֲקֹ֣ב מִן הַ/שָּׂדֶה֮ בָּ/עֶרֶב֒ וַ/תֵּצֵ֨א לֵאָ֜ה לִ/קְרָאת֗/וֹ וַ/תֹּ֨אמֶר֙ אֵלַ֣/י תָּב֔וֹא כִּ֚י שָׂכֹ֣ר שְׂכַרְתִּ֔י/ךָ בְּ/דוּדָאֵ֖י בְּנִ֑/י וַ/יִּשְׁכַּ֥ב עִמָּ֖/הּ בַּ/לַּ֥יְלָה הֽוּא־׃
translation:
  text: When Jacob came in from the field in the evening[a], Leah went out to meet him and said, “You must come in to me, for I have hired you with my son’s mandrakes.” So he lay with her that night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I have indeed hired you for my son’s mandrakes.” The Hebrew links Leah’s claim to the mandrakes as the price or means of the arrangement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came in
  alternatives:
  - came
  - entered
  lexicon: HALOT
  rationale: בוא commonly means 'come/enter.' 'Came in' fits the movement from outside the field back to the household setting and prepares for Leah's invitation.
- source_word: מִן הַשָּׂדֶה
  chosen: from the field
  alternatives:
  - out of the field
  lexicon: HALOT
  rationale: Straightforward locative phrase; 'field' preserves the agricultural setting.
- source_word: בָּעֶרֶב
  chosen: in the evening
  alternatives:
  - at evening
  lexicon: HALOT
  rationale: Natural modern English for the temporal phrase while remaining close to the Hebrew.
- source_word: לִקְרָאתוֹ
  chosen: to meet him
  alternatives:
  - to encounter him
  lexicon: HALOT
  rationale: Idiomatic rendering of לקראת with motion verb יצא.
- source_word: אֵלַי תָּבוֹא
  chosen: You must come in to me
  alternatives:
  - Come in to me
  - You shall come to me
  lexicon: HALOT
  rationale: The phrase is a direct sexual summons in context. 'Come in to me' preserves the idiomatic force without becoming crass; 'must' reflects Leah's assertive claim rather than a mere invitation.
- source_word: שָׂכֹר שְׂכַרְתִּיךָ
  chosen: I have surely hired you
  alternatives:
  - I have hired you
  - I have indeed hired you
  - I have paid for you
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the statement. 'Surely hired' captures the emphasis. 'Paid for you' is interpretive; 'hired' stays closer to the lexical repetition.
- source_word: בְּדוּדָאֵי בְּנִי
  chosen: with my son’s mandrakes
  alternatives:
  - for my son's mandrakes
  - at the price of my son's mandrakes
  lexicon: HALOT
  rationale: The preposition ב here marks the means or price by which the arrangement was made. 'With my son's mandrakes' is concise and natural, while preserving the transactional sense established in the context.
- source_word: וַיִּשְׁכַּב עִמָּהּ
  chosen: he lay with her
  alternatives:
  - he slept with her
  lexicon: HALOT
  rationale: This is the standard biblical euphemism for sexual relations. 'Lay with her' preserves the source idiom and tone better than the more colloquial 'slept with her.'
- source_word: בַּלַּיְלָה הוּא
  chosen: that night
  alternatives:
  - on that night
  - during that night
  lexicon: HALOT
  rationale: Idiomatic English condensation of the temporal phrase; the pronoun הוּא is naturally absorbed into 'that' rather than translated woodenly.
