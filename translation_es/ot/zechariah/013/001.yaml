review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la estructura básica del hebreo: fórmula temporal profética, existencia de una fuente abierta, beneficiarios (la casa de David y los habitantes de Jerusalén) y propósito relacionado con el pecado y la impureza. Sin embargo, «para pecado y para impureza» suena poco natural en español y no expresa con claridad la finalidad limpiadora que el contexto y la decisión léxica inglesa preservan.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero «habrá una fuente abierta» puede mejorarse a «se abrirá una fuente» para reflejar más directamente el pasivo de נפתח, y «para pecado» necesita reparación idiomática. La lectura más natural y fiel en español es «para el pecado y la impureza», que conserva la concisión formal sin introducir explicación doctrinal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, ni otros términos sensibles del glosario. «Fuente» para מָקוֹר e «impureza» para נִדָּה concuerdan bien con la línea del POB. Conviene además conservar en notas las alternativas léxicas que el inglés documentó para «fuente», «pecado» y «impureza».
  issues:
  - severity: medium
    issue: «para pecado» es español poco idiomático
    rationale: Aunque reproduce de cerca el hebreo, en español suena defectuoso. «Para el pecado» mantiene la relación semántica con לְחַטָּאת y resulta claramente comprensible sin paráfrasis.
  - severity: low
    issue: Faltan las notas léxicas preservadas por el English POB
    rationale: El rastro de auditoría inglés documenta alternativas significativas para מָקוֹר, חַטָּאת y נִדָּה. Deben conservarse en español mediante notas, especialmente porque algunas alternativas afectan la interpretación.
  - severity: low
    issue: «habrá una fuente abierta» es aceptable pero menos directo que «se abrirá una fuente»
    rationale: La revisión aplicada en inglés prefirió una formulación verbal más natural frente a una construcción adjetival rígida. En español, «se abrirá una fuente» refleja mejor el participio pasivo נפתח y mejora la fluidez.
  revised_spanish_text: En aquel día se abrirá una fuente[a] para la casa de David y para los habitantes de Jerusalén, para el pecado[b] y la impureza[c].
