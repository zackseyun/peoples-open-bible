translation:
  language: es
  text: El justo está atento y declarará justo[a] a Yahvé; cae, y mira qué hará Dios por él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justificará a Yahvé».
    reason: lexical_alternative
  - marker: b
    text: O «qué le hará Dios».
    reason: alternative_reading
lexical_decisions:
- source_word: προσέχων
  english_pob_choice: is attentive
  chosen_spanish: está atento
  alternatives_spanish:
  - presta atención
  - está vigilante
  - atiende
  lexicon: BDAG
  rationale: El participio expresa una actitud continua de atención o vigilancia. «Está atento» conserva el matiz durativo y suena natural en español, sin convertirlo en una acción puntual ni añadir una idea distinta.
- source_word: ὁ δίκαιος
  english_pob_choice: the righteous man
  chosen_spanish: el justo
  alternatives_spanish:
  - el hombre justo
  - el recto
  lexicon: BDAG
  rationale: El sustantivo adjetival singular designa al justo como tipo representativo. En español, «el justo» transmite bien el valor sustantivado y evita una redundancia innecesaria.
- source_word: δικαιώσει
  english_pob_choice: will declare the Lord just
  chosen_spanish: declarará justo
  alternatives_spanish:
  - justificará
  - vindicará
  - reconocerá justo
  lexicon: BDAG
  rationale: Se preserva el campo semántico de δικαιόω como acto de afirmar la justicia de alguien. «Declarará justo» refleja el enlace léxico con δίκαιος y evita la carga doctrinal ambigua de «justificar» en español, sin borrar la tensión teológica del texto.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al Señor
  lexicon: BDAG
  rationale: Por la política del proyecto, el nombre divino se vierte como «Yahvé». Aquí κύριος se usa en sentido reverente para el Dios de Israel, por lo que se explicita la referencia divina en español.
- source_word: ἔπεσεν
  english_pob_choice: he falls
  chosen_spanish: cae
  alternatives_spanish:
  - ha caído
  - cayó
  lexicon: BDAG
  rationale: Aunque el griego usa aoristo, el contexto gnómico favorece una traducción general o proverbial. «Cae» mantiene la fuerza aspectual de un hecho característico y encaja con los otros verbos presentes/futuros.
- source_word: ἀποβλέπει
  english_pob_choice: he looks to see
  chosen_spanish: mira
  alternatives_spanish:
  - mira para ver
  - espera ver
  - observa
  lexicon: BDAG
  rationale: El verbo expresa una mirada dirigida, expectante. «Mira» es breve y natural; el complemento «qué hará Dios» ya aporta la expectativa del resultado.
- source_word: τί ποιήσει αὐτῷ ὁ θεός
  english_pob_choice: what God will do for him
  chosen_spanish: qué hará Dios por él
  alternatives_spanish:
  - qué le hará Dios
  - qué hará Dios para él
  - qué hará Dios con él
  lexicon: BDAG
  rationale: El dativo αὐτῷ admite lectura beneficiosa o neutra/adversa. Se adopta «por él» porque en el flujo inmediato la expectativa es de ayuda o intervención favorable, pero la ambigüedad se conserva en nota.
theological_decisions:
- issue: 'Sentido de δικαιώσει respecto a Dios: afirmar su justicia o resolver la acción humana sobre Dios'
  english_pob_reading: will declare the Lord just
  chosen_spanish_reading: declarará justo a Yahvé
  alternative_spanish_readings:
  - justificará a Yahvé
  - vindicará a Yahvé
  rationale: El versículo articula una cadena léxica con δίκαιος/δικαιόω. «Declarará justo» conserva la idea de reconocer y afirmar la justicia de Dios sin sugerir que el justo le otorgue justicia a Yahvé. Se preserva así la tensión teológica del texto, tal como exige el expediente auditado.
  doctrine_reference: Mantener la tensión teológica documentada; consistencia léxica en la cadena δίκαιος/δικαιόω.
- issue: 'Valor de αὐτῷ: beneficio o daño potencial'
  english_pob_reading: what God will do for him
  chosen_spanish_reading: qué hará Dios por él
  alternative_spanish_readings:
  - qué le hará Dios
  - qué hará Dios con él
  - qué hará Dios para él
  rationale: El contexto favorece una expectativa de intervención favorable, aunque el griego no elimina por completo la posibilidad de una acción simplemente dirigida hacia él. La nota conserva esa alternativa sin forzar el sentido.
  doctrine_reference: Preservar alternativas de lectura donde el griego admite tensión semántica.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del expediente inglés: δικαιώσει se entiende como «declarar justo» y ἔπεσεν como valor gnómico/presente general. Se evita la solución anterior «vindicar» por no reflejar tan bien la cadena léxica δίκαιος/δικαιόω destacada en la revisión, y se mantiene la alternativa semántica del dativo αὐτῷ en nota.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para τὸν κύριον conforme a la norma del proyecto, no «Señor» como máscara textual.
  - 'Se mantuvo el paralelismo verbal del griego con presente/futuro español: «está atento / declarará / cae / mira».'
  - «Declarará justo» conserva la raíz justicia-justo sin introducir una tecnicidad confesional ajena al verso.
  - La nota sobre αὐτῷ preserva la ambigüedad de dirección/beneficio que el expediente inglés documenta.
