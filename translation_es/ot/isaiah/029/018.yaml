translation:
  language: es
  text: Y en aquel día los sordos oirán las palabras de un libro[a], y de la oscuridad y de las tinieblas los ojos de los ciegos verán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las palabras de un rollo' o 'las palabras de un documento'; el hebreo סֵפֶר puede referirse ampliamente a un texto escrito.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמְעוּ
  english_pob_choice: And ... will hear
  chosen_spanish: oirán
  alternatives_spanish:
  - y oirán
  - entonces oirán
  lexicon: HALOT
  rationale: El perfecto con waw en contexto profético expresa futuro; en español, el futuro simple comunica bien la promesa sin añadir explicación.
- source_word: בַיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: La fórmula profética se conserva con un demostrativo solemne y natural en español.
- source_word: הַחֵרְשִׁים
  english_pob_choice: the deaf
  chosen_spanish: los sordos[o]
  alternatives_spanish:
  - los deaf
  - las personas sordas
  lexicon: HALOT
  rationale: Se mantiene el sustantivo/adjetivo substantivado en sentido personal. 'Sordos' es la forma más natural en español; se marca la nota porque el hebreo puede aludir a personas sordas o, en sentido figurado, a incapacidad de oír/entender.
- source_word: דִּבְרֵי סֵפֶר
  english_pob_choice: the words of a book
  chosen_spanish: las palabras de un libro[a]
  alternatives_spanish:
  - las palabras de un rollo
  - las palabras de un documento
  lexicon: HALOT
  rationale: '''Sēfer'' cubre libro, rollo o documento escrito. ''Libro'' es la opción española más amplia y legible, sin cerrar la ambigüedad textual que el propio POB documenta.'
- source_word: וּמֵאֹפֶל
  english_pob_choice: out of gloom
  chosen_spanish: desde la oscuridad
  alternatives_spanish:
  - desde la penumbra
  - fuera de la oscuridad
  lexicon: HALOT
  rationale: El hebreo usa מִן con valor de procedencia/salida. 'Desde' conserva ese origen; 'oscuridad' mantiene la imagen fuerte del contraste.
- source_word: וּמֵחֹשֶׁךְ
  english_pob_choice: out of darkness
  chosen_spanish: y desde la tiniebla
  alternatives_spanish:
  - y desde las tinieblas
  - y desde la oscuridad
  lexicon: HALOT
  rationale: Se preserva el paralelismo poético con un segundo término distinto. 'Tiniebla' evita repetir exactamente 'oscuridad' y refleja bien el intensificador paralelo del hebreo.
- source_word: עֵינֵי עִוְרִים
  english_pob_choice: the eyes of the blind
  chosen_spanish: los ojos de los ciegos
  alternatives_spanish:
  - los ojos de personas ciegas
  - ojos ciegos
  lexicon: HALOT
  rationale: Se conserva la construcción de genitivo de manera transparente. 'Ciegos' mantiene la concisión y la imagen corporal del original.
- source_word: תִּרְאֶינָה
  english_pob_choice: will see
  chosen_spanish: verán
  alternatives_spanish:
  - verán claramente
  - mirarán
  lexicon: HALOT
  rationale: El imperfecto femenino plural concuerda con 'ojos' y expresa restauración de la vista; 'verán' es directo y fiel.
theological_decisions:
- issue: Si el versículo debe explicitar una lectura física o espiritual
  english_pob_reading: Use concrete sensory language ('the deaf,' 'the blind,' 'hear,' 'see') without adding interpretive qualifiers.
  chosen_spanish_reading: 'Mantener el lenguaje sensorial concreto: ''sordos'', ''oirán'', ''ciegos'', ''verán'', sin añadir glosas interpretativas.'
  alternative_spanish_readings:
  - expresar de forma más explícita una restauración espiritual o de entendimiento
  - parafrasear para indicar comprensión interior
  rationale: Isaías usa términos corporales literales que también pueden funcionar simbólicamente en su contexto. La traducción conserva esa tensión y no resuelve la lectura hacia un solo sentido.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de revisión fue alto y no se detectaron problemas de acuerdo.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; aquí no se requiere.
  - Se evita 'Cristo' porque el texto no contiene lenguaje mesiánico explícito en esta línea.
  - Se mantiene un estilo bíblico moderno y digno, sin arcaísmos innecesarios.
  - La nota de 'libro' preserva la amplitud semántica de סֵפֶר sin forzar una sola opción.
  - No se introducen interpretaciones doctrinales ajenas al texto; la imagen corporal queda abierta a su posible valor metafórico en contexto.
