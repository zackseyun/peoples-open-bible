    reason: lexical_alternative
  - marker: b
    text: O «producto», «cosechas» o «rendimiento» para «cosecha».
    reason: lexical_alternative
  revision_rationale: 'Se ajustó la redacción para un español más natural («hay abundante cosecha») y se realinearon las notas con el aparato léxico documentado del POB inglés: una para אֵבוּס («pesebre/comedero») y otra para תְּבוּאוֹת («cosecha/producto/cosechas/rendimiento»). No se requirió cambio en las decisiones centrales «bueyes», «pesebre», «limpio» y «por la fuerza de un buey».'
