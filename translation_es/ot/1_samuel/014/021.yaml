  to: Ahora bien, los hebreos que antes habían estado con los filisteos[a], que habían subido con ellos al campamento de los alrededores[c], hasta ellos también vinieron a estar con Israel[b], los que estaban con Saúl y Jonatán.
  rationale: La revisión hace explícito en el texto principal el matiz temporal de כְּאֶתְמוֹל שִׁלְשׁוֹם con «antes», mejora la naturalidad de בַּמַּחֲנֶה סָבִיב con «al campamento de los alrededores» y restaura la nota auditada sobre esa frase difícil. Se mantiene el énfasis inclusivo y el cambio implícito de alineación hacia Israel sin parafrasear en exceso.
