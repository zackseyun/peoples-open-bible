  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: correspondencia precisa (כְּכֹל אֲשֶׁר), aspecto progresivo en «te estoy mostrando», término técnico «tabernáculo», y el plural de תַּעֲשׂוּ con nota explicativa. Sin embargo, «modelo» para תַּבְנִית se aleja del término elegido y razonado por el POB inglés («pattern») más de lo deseable, y «utensilios» para כָּל כֵּלָיו suena algo estrecho frente al sentido colectivo más amplio de los objetos/mobiliario del santuario.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para mayor fidelidad y naturalidad. Los dos puntos y el punto y coma son aceptables, aunque una raya larga o coma sería más fluida. La frase principal funciona bien. Conviene ajustar «modelo» a «patrón» y «utensilios» a «todos sus objetos» o «todos sus enseres»; «objetos» es más neutral y amplio en contexto cultual.
  glossary_alignment: No hay conflicto con los términos troncales del proyecto. «Tabernáculo» está bien. La principal desalineación es con la decisión léxica auditada para תַּבְנִית, donde el POB inglés documentó «pattern» precisamente para preservar la tensión teológica; en español «patrón» es la correspondencia más cercana, con alternativas en nota. También conviene evitar que «utensilios» reduzca כֵּלִים a herramientas o implementos menores.
  issues:
  - severity: medium
    issue: תַּבְנִית traducido como «modelo» en vez de «patrón»
    rationale: Aunque «modelo» es posible, el expediente auditado favorece «pattern» por su valor técnico-teológico de forma/patrón mostrado. «Patrón» conserva mejor esa decisión sin cerrar la ontología del referente.
  - severity: medium
    issue: כָּל כֵּלָיו traducido como «todos sus utensilios»
    rationale: «Utensilios» puede sonar demasiado restringido a implementos. El hebreo es más amplio para los diversos artículos del santuario. «Todos sus objetos» o «todos sus enseres» preserva mejor el alcance.
  - severity: low
    issue: La nota a debe priorizar la equivalencia principal elegida en español
    rationale: Si el texto principal usa «patrón», la nota debe ofrecer las alternativas restantes sin presentar la principal como mera opción paralela.
