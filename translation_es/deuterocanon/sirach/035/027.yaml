translation:
  language: es
  text: Así es el hombre que no tiene nido[a][b], que descansa donde lo sorprende la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'que no tiene hogar'. El hebreo literalmente dice 'que no tiene nido', y conserva la imagen de una criatura sin un lugar fijo donde posarse o establecerse.
    reason: lexical_alternative
  - marker: b
    text: El texto hebreo es algo escueto y puede ser textualmente incierto. Esta línea se traduce del hebreo conservado, teniendo en cuenta la tradición griega solo como verificación de coherencia.
    reason: textual_variant
lexical_decisions:
- source_word: כן
  english_pob_choice: So also
  chosen_spanish: Así es
  alternatives_spanish:
  - De igual modo
  - Así también
  lexicon: HALOT
  rationale: La partícula introduce una comparación proverbial. 'Así es' mantiene la relación analógica con español natural y sin añadir una forma más pesada que no pide el contexto.
- source_word: איש
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un hombre
  - una persona
  lexicon: HALOT
  rationale: El hebreo es singular masculino y proverbial. 'El hombre' conserva la forma representativa del original sin convertirla innecesariamente en genérica abstracta.
- source_word: אשר לא קן
  english_pob_choice: who has no nest
  chosen_spanish: que no tiene nido
  alternatives_spanish:
  - que no tiene hogar
  - que no tiene lugar donde morar
  lexicon: HALOT
  rationale: '''קן'' significa literalmente ''nido''. Se conserva la imagen para no borrar la transparencia léxica del hebreo; ''hogar'' sería una paráfrasis interpretativa más que una traducción directa.'
- source_word: המרגיע
  english_pob_choice: resting
  chosen_spanish: descansando
  alternatives_spanish:
  - reposando
  - hallando descanso
  lexicon: HALOT
  rationale: El participio expresa la acción de descansar o aquietarse. 'Descansando' fluye bien en español y mantiene el aspecto durativo sin forzar una terminología técnica sobre el matiz verbal.
- source_word: כאשר יערב
  english_pob_choice: wherever evening overtakes him
  chosen_spanish: donde lo alcanza la tarde
  alternatives_spanish:
  - cuando cae la tarde
  - donde lo sorprende la tarde
  lexicon: HALOT
  rationale: La frase señala la llegada de la tarde como circunstancia determinante del descanso. 'Lo alcanza la tarde' conserva la idea de encuentro accidental y la falta de morada fija; 'donde' reproduce la orientación espacial implicada por la imagen.
theological_decisions:
- issue: Texto hebreo escueto y posible incertidumbre textual; el griego es un paralelo de control, no base principal aquí
  english_pob_reading: Hebrew text is somewhat terse and may be textually uncertain. The line is translated from the surviving Hebrew, with the Greek tradition kept in view as a consistency check.
  chosen_spanish_reading: El hebreo conservado se traduce tal como está, manteniendo su concisión, y la tradición griega se tiene en cuenta solo como verificación de coherencia.
  alternative_spanish_readings:
  - El versículo se reconstruye principalmente desde el griego
  - Se armoniza libremente con el griego para aclarar el sentido
  rationale: La fuente principal disponible en este expediente es el hebreo sobreviviente; el griego confirma que la línea pertenece a una imagen proverbial de falta de hogar. No conviene desplazar la base textual hacia una reconstrucción no documentada.
  doctrine_reference: Principio textual de prioridad de la fuente transmitida y control por testigos paralelos; no implica una decisión doctrinal
translation_notes:
  revision_awareness: La versión inglesa revisada simplificó el arranque a 'So is the man...' y prefirió 'resting' frente a 'finding rest'. En español, por economía y naturalidad, se refleja con 'Así es el hombre... descansando...'; se evitó añadir equivalentes como 'también' para no cargar la comparación. El cierre se mantuvo espacial-temporalmente abierto con 'donde lo alcanza la tarde', siguiendo la imagen de falta de asiento fijo.
  spanish_consistency_notes:
  - Se usa 'nido' y no 'hogar' en el texto principal para preservar la imagen del hebreo.
  - '''Tarde'' traduce la llegada del crepúsculo sin introducir una precisión temporal innecesaria.'
  - La construcción participial 'descansando' mantiene el valor descriptivo del original sin convertirlo en una cláusula explicativa.
  - No se introdujo 'Señor', 'Mesías' ni terminología doctrinal ajena al versículo.
