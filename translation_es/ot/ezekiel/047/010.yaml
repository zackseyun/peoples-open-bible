  to: Y acontecerá que los pescadores estarán junto a ella; desde En-gadi hasta En-eglaim habrá un lugar para tender las redes. Sus peces serán de muchas clases[a], como los peces del Mar Grande[b], muy numerosos.
  rationale: Se ajusta «se pondrán» a «estarán» para reflejar mejor יעמדו, y «de muchos géneros» a «de muchas clases» para un español más natural y fiel al sentido de variedad de לְמִינָה, manteniendo la alternativa más literal en nota. No se requieren cambios doctrinales ni adjudicación adicional.
