lexical_decisions:
- source_word: ܐܝܠܝܢ ܕܕܡ̇ܝܢ ܠܟܘܢ
  chosen: all who are like you
  alternatives:
  - those like you
  - those who resemble you
  lexicon: Payne Smith
  rationale: The phrase marks Jeremiah and a like-minded circle rather than a vague crowd, so the rendering keeps the comparison personal and concrete.
- source_word: ܕܬܚܙܘܢ ܠܟܘܢ ܡܢ ܗܕܐ ܡܕܝܢܬܐ
  chosen: to leave this city
  alternatives:
  - to withdraw from this city
  - to remove yourselves from this city
  lexicon: Payne Smith
  rationale: The idiom is more than merely ‘look to yourselves’; in context it functions as a command to depart before judgment falls.
- source_word: ܥܡܗܕܐ ܡܪܝܪܐ (OCR-corrupt at this point; control sense points to a protective pillar metaphor)
  chosen: firm pillar
  alternatives:
  - sure pillar
  - supporting pillar
  lexicon: Payne Smith
  rationale: 'The Ceriani bucket is visibly unstable here, but the clause’s sense is preserved by the control tradition: Baruch’s circle functions as a stabilizing support for the city.'
- source_word: ܫܘܕܐ ܚܠܝܬܐ (OCR-corrupt at this point; control sense points to a defensive wall metaphor)
  chosen: strong wall
  alternatives:
  - mighty wall
  - fortified wall
  lexicon: Payne Smith
  rationale: The paired metaphor with ‘pillar’ calls for a defensive image. ‘Strong wall’ preserves the protective force without over-expanding the line.
- source_word: ܥܒܕ̈ܝܟܘܢ / implied protective activity
  chosen: your deeds
  alternatives:
  - your works
  - your actions
  lexicon: Payne Smith
  rationale: ‘Deeds’ keeps the concrete force of lived righteous action while reading naturally in English; ‘works’ was possible but sounded more wooden here.
