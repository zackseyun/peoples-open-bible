base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/004/038.yaml
  text: And[a], inflamed with anger, he immediately stripped off Andronikos's purple robe and tore off his garments, and after leading him around through the whole city to the very place where he had committed his impiety against Onias, there he dispatched the murderer[b], the Lord rendering to him the punishment he deserved.
  footnotes:
  - marker: a
    text: 'Greek μιαφόνον carries a stronger sense than simply ''murderer'': one defiled by bloodshed, a blood-guilty killer.'
    reason: lexical_alternative
  - marker: b
    text: The verb translated 'cut down' is vivid and may imply killing with a spear or similar weapon; the broader sense is that he was executed there.
    reason: lexical_alternative
