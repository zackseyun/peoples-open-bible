lexical_decisions:
- source_word: וּ/בַ/יּוֹם
  english_pob_choice: And on the ... day
  chosen_spanish: Y en el ... día
  alternatives_spanish:
  - Y en el día ...
  - En el ... día
  lexicon: HALOT
  rationale: La construcción hebrea introduce una secuencia ritual; en español, «Y en el cuarto día» conserva la conexión narrativa y la marca temporal sin sonar forzada.
- source_word: הָרְבִיעִי
  english_pob_choice: fourth
  chosen_spanish: cuarto
  alternatives_spanish:
  - el cuarto
  lexicon: HALOT
  rationale: Es el ordinal que modifica «día». En español, el artículo puede integrarse en la preposición y conservarse de forma natural en la frase completa.
- source_word: פָּרִים
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - machos bovinos
  lexicon: HALOT
  rationale: En listas sacrificiales, el término designa bovinos machos aptos para ofrenda; «toros» comunica bien la referencia zoológica y ceremonial en español bíblico actual.
- source_word: עֲשָׂרָה
  english_pob_choice: ten
  chosen_spanish: diez
  lexicon: HALOT
  rationale: Número cardinal directo para la cantidad de toros.
- source_word: אֵילִם
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - rams
  lexicon: HALOT
  rationale: «Carneros» es el equivalente natural y claro en español para el animal sacrificial designado por el hebreo.
- source_word: שְׁנָיִם
  english_pob_choice: two
  chosen_spanish: dos
  lexicon: HALOT
  rationale: Número cardinal directo para la cantidad de carneros.
- source_word: כְּבָשִׂים
  english_pob_choice: lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - corderos machos
  - lambs
  lexicon: HALOT
  rationale: En español bíblico, «corderos» transmite con naturalidad el sentido sacrificial de כבשׂים; el contexto y la edad especificada evitan ambigüedad.
- source_word: בְּנֵי שָׁנָה
  english_pob_choice: one-year-old
  chosen_spanish: de un año
  alternatives_spanish:
  - de un año de edad
  - añoos
  lexicon: HALOT
  rationale: La expresión hebrea indica animales en su primer año. «De un año» es idiomática en español y evita una formulación pesada.
- source_word: אַרְבָּעָה עָשָׂר
  english_pob_choice: fourteen
  chosen_spanish: catorce
  lexicon: HALOT
  rationale: Número cardinal directo para la cantidad de corderos.
- source_word: תְּמִימִם
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin defecto alguno
  - sin tara
  lexicon: HALOT
  rationale: En el lenguaje sacrificial, el adjetivo denota animales sin defecto físico. «Sin defecto» conserva la precisión cultual y suena natural en español moderno.
translation_notes:
  revision_awareness: El texto sigue de cerca el packet hebreo y coincide con la solución establecida en el audit trail inglés, con ajustes de registro para un español bíblico moderno y publicación-readable. No se detectaron tensiones textuales o teológicas adicionales en este versículo.
  spanish_consistency_notes:
  - Se mantuvo la secuencia numérica y la lista sacrificial en el mismo orden del hebreo.
  - Se evitó «SEÑOR» u otros sustitutos porque este versículo no contiene el nombre divino.
  - Se usaron términos zoológicos claros y corrientes en español, conservando el matiz sacrificial sin añadir explicaciones innecesarias.
