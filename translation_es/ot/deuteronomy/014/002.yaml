review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: causalidad («Porque»), identidad pactal («un pueblo santo»), elección divina, y selección «de entre todos los pueblos». Sin embargo, «un pueblo especial» debilita el valor léxico de סְגֻלָּה, que en el rastro POB se documenta como posesión/pueblo atesorado o especialmente valioso, no meramente ‘especial’.'
  spanish_quality_summary: El español es claro, natural y digno. «Porque», «pueblo santo», «Yahvé», «de entre todos los pueblos» y «sobre la faz de la tierra» funcionan bien. La principal mejora necesaria es fortalecer «especial» hacia una formulación que preserve mejor el matiz de tesoro/posesión valiosa sin sonar rígida.
  glossary_alignment: 'Se alinea bien con los términos del proyecto en «Yahvé», «Dios» y el tono general. No hay conflicto terminológico mayor. La única desviación relevante del razonamiento léxico auditado está en סְגֻלָּה: conviene evitar una atenuación excesiva con «especial».'
  issues:
  - severity: medium
    issue: «un pueblo especial[a]» atenúa demasiado סְגֻלָּה
    rationale: El hebreo expresa una posesión especialmente valiosa/atesorada. Aunque la nota ayuda, el texto principal debe conservar mejor ese peso semántico. «Pueblo atesorado» o similar refleja mejor la decisión léxica del POB sin perder naturalidad.
  - severity: low
    issue: La nota usa «posesión especial»
    rationale: Es comprensible, pero «posesión atesorada» o «posesión especialmente valiosa» armoniza mejor con la explicación inglesa y con el matiz semántico de סְגֻלָּה.
  revised_spanish_text: Porque tú eres un pueblo santo para Yahvé tu Dios, y Yahvé te ha escogido para que seas para él un pueblo atesorado[a], de entre todos los pueblos que hay sobre la faz de la tierra.
  revised_footnotes:
  - marker: a
    text: O «un pueblo para su posesión atesorada». El hebreo סְגֻלָּה designa una posesión especialmente valiosa.
    reason: lexical_alternative
  revision_rationale: Se revisa únicamente סְגֻלָּה para preservar mejor el valor léxico documentado en el expediente POB. «Pueblo atesorado» mantiene la repetición de «pueblo» presente en el hebreo y comunica con más fidelidad la idea de algo especialmente valioso, mientras que la nota conserva la alternativa posesiva explícita.
