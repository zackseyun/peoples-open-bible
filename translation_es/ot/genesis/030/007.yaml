translation:
  language: es
  text: Bilhá[a], la esclava de Raquel, concibió de nuevo y le dio a Jacob un segundo hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sierva». El término hebreo puede referirse a una esclava o a una servidora de menor estatus social; aquí se usa «esclava» para hacer explícita su condición de esclavitud.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהַר
  english_pob_choice: conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó encinta
  - se embarazó
  lexicon: HALOT
  rationale: הרה expresa llegar a estar embarazada / concebir. «Concibió» es natural en español bíblico moderno y mantiene el avance narrativo breve del hebreo.
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - aún
  lexicon: HALOT
  rationale: En este contexto narrativo, עוֹד marca repetición del evento. «De nuevo» transmite esa repetición con buen tono literario en español.
- source_word: וַתֵּלֶד
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: HALOT
  rationale: ילד en qal con objeto directo puede rendirse como «dio a luz» o «parió». Se prefirió «dio a luz» por ser claro, digno y natural en español actual.
- source_word: שִׁפְחַת
  english_pob_choice: female slave
  chosen_spanish: esclava
  alternatives_spanish:
  - sierva
  - criada
  - sirvienta
  lexicon: HALOT
  rationale: שִׁפְחָה denota una mujer esclavizada o de estatus servil. Como la POB inglesa eligió explicitar la condición de esclavitud, «esclava» conserva esa fuerza social sin suavizarla.
- source_word: בֵּן שֵׁנִי
  english_pob_choice: a second son
  chosen_spanish: un segundo hijo
  alternatives_spanish:
  - otro hijo
  - un hijo segundo
  lexicon: HALOT
  rationale: La construcción hebrea significa literalmente «un segundo hijo». «Un segundo hijo» suena natural en español y conserva el orden del dato narrativo.
- source_word: לְיַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: a Jacob
  alternatives_spanish:
  - para Jacob
  - de Jacob
  lexicon: HALOT
  rationale: 'La preposición ל indica relación de destinatario/parentesco en este contexto: Bilhá dio a luz un hijo para Jacob. En español conviene explicitarlo con «a Jacob».'
- source_word: בִּלְהָה ... רָחֵל
  english_pob_choice: Bilhah, Rachel’s female slave
  chosen_spanish: Bilhá, la esclava de Raquel
  alternatives_spanish:
  - Bilhá, la sierva de Raquel
  - Bilhá, la esclava femenina de Raquel
  lexicon: HALOT
  rationale: La estructura appositiva identifica a Bilhá por su relación con Raquel. «La esclava de Raquel» preserva la relación de pertenencia/estatus sin introducir formulaciones ajenas al español corriente.
translation_notes:
  revision_awareness: El texto español sigue de cerca la lectura aprobada del original hebreo y la decisión inglesa de explicitar el estatus social de שִׁפְחָה. No se registran revisiones posteriores con cambios sustantivos; la concordancia general del paquete fuente es alta.
  spanish_consistency_notes:
  - Se mantiene «Bilhá» con tilde y «Raquel» conforme a uso español.
  - 'Se conserva el orden narrativo del hebreo: concepción, nacimiento y especificación del hijo.'
  - «Esclava» se usa de forma consistente con la terminología POB para reflejar estatus servil cuando el contexto lo exige.
  - «Dio a luz» evita un calco rígido y sigue siendo fiel a ילד en este contexto.
