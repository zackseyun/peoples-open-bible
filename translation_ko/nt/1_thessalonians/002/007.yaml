id: 1TH.2.7
reference: 1 Thessalonians 2:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: δυνάμενοι ἐν βάρει εἶναι ὡς Χριστοῦ ἀπόστολοι· ἀλλὰ ἐγενήθημεν ⸀ἤπιοι ἐν μέσῳ ὑμῶν, ὡς ⸀ἐὰν τροφὸς θάλπῃ τὰ ἑαυτῆς τέκνα·
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/002/007.yaml
  text: though we could have been a burden as apostles of the Messiah[a], yet we became gentle among you[c][b], as a nursing mother cherishes her own children.
  footnotes:
  - marker: a
    text: Or 'could have asserted our authority' or 'could have made demands' as apostles of the Messiah. The Greek literally says 'could have been weighty.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''apostles of Christ.'''
    reason: alternative_reading
  - marker: c
    text: Or 'as a nurse' or 'as a wet nurse'; the image is of tender maternal care.
    reason: lexical_alternative
translation:
  language: ko
  text: 우리가 메시아[b]의 사도로서 권위를 내세울 수도 있었지만[a], 도리어 여러분 가운데서 마치 유모[c]가 자기 자녀를 품어 기르듯이 부드러운 사람이 되었습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「짐이 될 수도 있었습니다」, 「요구를 할 수도 있었습니다」. 헬라어는 문자적으로 「무게 가운데 있을 수 있었다」.
    reason: lexical_alternative
  - marker: b
    text: 전통 번역은 「그리스도」. 본 번역은 칭호 Χριστός를 「메시아」로 옮긴다.
    reason: alternative_reading
  - marker: c
    text: 또는 「젖먹이를 기르는 사람」, 「유모」. 어머니의 다정한 돌봄의 이미지를 담는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: δυνάμενοι ἐν βάρει εἶναι
  english_pob_choice: could have been a burden
  chosen_korean: 권위를 내세울 수도 있었지만
  alternatives_korean:
  - 짐이 될 수도 있었지만
  - 무게를 부과할 수도 있었지만
  lexicon: BDAG
  rationale: ἐν βάρει는 문자적으로 「무게 가운데」이나 문맥에서 사도적 권위 행사·재정적 부담 부과를 함께 가리킨다. 「권위를 내세움」이 7-9절 흐름(자기 손으로 일하여 짐 되지 않음)과 자연스럽게 이어진다.
- source_word: Χριστοῦ ἀπόστολοι
  english_pob_choice: apostles of the Messiah
  chosen_korean: 메시아의 사도
  alternatives_korean:
  - 그리스도의 사도
  lexicon: BDAG
  rationale: 칭호 Χριστός를 일관되게 「메시아」로 옮긴다.
- source_word: ἤπιοι
  english_pob_choice: gentle
  chosen_korean: 부드러운 사람
  alternatives_korean:
  - 온유한 자
  - 다정한 사람
  lexicon: BDAG
  rationale: ἤπιος는 「온유·부드러움·다정함」. 「부드러운 사람」이 어머니의 돌봄 비유와 자연스럽게 어울린다.
- source_word: τροφὸς θάλπῃ τὰ ἑαυτῆς τέκνα
  english_pob_choice: a nursing mother cherishes her own children
  chosen_korean: 유모가 자기 자녀를 품어 기르듯이
  alternatives_korean:
  - 유모가 자기 자녀를 따뜻이 돌보듯이
  - 젖먹이는 어머니가 자기 자식을 품어주듯이
  lexicon: BDAG
  rationale: θάλπω의 「품어 따뜻이 함」 의미를 「품어 기르다」가 잘 담는다. τροφός는 영어 POB의 「nursing mother」와 한국어 「유모」를 함께 고려해, 모성적 돌봄의 어감이 분명한 「유모」를 택한다.
theological_decisions:
- issue: ἐν βάρει εἶναι의 해석
  chosen_reading: 권위를 내세울 수도 있었지만
  alternative_readings:
  - 짐이 될 수도 있었지만
  - 무게를 부과할 수도 있었지만
  rationale: ἐν βάρει는 사도적 권위의 행사와 재정적 부담의 두 가지 의미를 모두 담을 수 있다. 이어지는 9절의 「짐이 되지 않으려」 표현(τὸ μὴ ἐπιβαρῆσαι)이 재정적 의미를 분명히 하므로, 본문 7절의 표현은 권위의 무게 자체로 보존하고 두 의미를 모두 살린다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
