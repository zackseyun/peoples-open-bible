translation:
  language: es
  text: 'Sin embargo, estos no comerán, de entre los que rumian y de entre los que tienen la pezuña hendida: el camello, la liebre[a] y el damán[b], porque rumian, pero no tienen la pezuña hendida. Son impuros para ustedes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «conejo». El término hebreo probablemente se refiere a una liebre, aunque la identificación zoológica exacta es debatida.
    reason: lexical_alternative
  - marker: b
    text: O «hyrax». El hebreo probablemente designa al damán; la identificación zoológica exacta ha sido debatida.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: However
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Solo
  - No obstante
  - Pero
  lexicon: HALOT
  rationale: La partícula introduce una restricción o excepción respecto de la regla anterior; «Sin embargo» conserva ese valor adversativo de manera natural en español.
- source_word: מִמַּעֲלֵי הַגֵּרָה
  english_pob_choice: from among those that chew the cud
  chosen_spanish: de entre los que rumian
  alternatives_spanish:
  - de entre los que mastican el rumen
  - de entre los rumiantes
  - de entre los que hacen subir el rumen
  lexicon: HALOT
  rationale: El giro hebreo describe el comportamiento de rumiar; «rumian» es la expresión clara y fiel en español bíblico contemporáneo, sin volver la frase innecesariamente técnica o opaca.
- source_word: וּמִמַּפְרִיסֵי הַפַּרְסָה הַשְּׁסוּעָה
  english_pob_choice: from among those that have a split hoof
  chosen_spanish: de entre los que tienen la pezuña hendida
  alternatives_spanish:
  - de entre los que parten la pezuña
  - de entre los de pezuña dividida
  - de entre los que tienen pezuña partida
  lexicon: HALOT
  rationale: «Pezuña hendida» reproduce bien la imagen del hebreo y es una formulación tradicional y entendible en español; mantiene la fuerza descriptiva sin caer en un calco duro.
- source_word: הַגָּמָל
  english_pob_choice: the camel
  chosen_spanish: el camello
  alternatives_spanish:
  - el dromedario
  lexicon: HALOT
  rationale: Nombre común y directo del animal.
- source_word: הָאַרְנֶבֶת
  english_pob_choice: the hare
  chosen_spanish: la liebre
  alternatives_spanish:
  - el conejo
  lexicon: HALOT
  rationale: La identificación zoológica más probable se expresa bien con «liebre»; se preserva la posibilidad alternativa sin fijarla como traducción principal.
- source_word: הַשָּׁפָן
  english_pob_choice: the rock badger
  chosen_spanish: el damán
  alternatives_spanish:
  - el hyrax
  - el conejillo de las rocas
  - el coney
  lexicon: HALOT
  rationale: Se prefiere «damán» porque identifica con mayor precisión el animal del hebreo y evita una equivalencia tradicional más interpretativa como «tejón de roca» o «coney»; en español moderno puede explicitarse en nota si se desea.
- source_word: כִּי מַעֲלֵה גֵרָה הֵמָּה
  english_pob_choice: because they chew the cud
  chosen_spanish: porque rumian
  alternatives_spanish:
  - porque hacen subir el rumen
  - pues son rumiantes
  lexicon: HALOT
  rationale: Se conserva la misma expresión idiomática de la primera cláusula para mantener cohesión y transparencia léxica.
- source_word: וּפַרְסָה לֹא הִפְרִיסוּ
  english_pob_choice: but do not split the hoof
  chosen_spanish: pero no tienen pezuña hendida
  alternatives_spanish:
  - pero no parten la pezuña
  - pero no dividen la pezuña
  lexicon: HALOT
  rationale: Se usa la misma terminología de la primera mitad para que la regla legal quede clara y consistente en español.
- source_word: טְמֵאִים הֵם לָכֶם
  english_pob_choice: They are unclean for you
  chosen_spanish: son impuros para ustedes
  alternatives_spanish:
  - son inmundos para ustedes
  - son ritualmente impuros para ustedes
  lexicon: HALOT
  rationale: «Impuro» comunica el valor legal-cúltico del término sin forzar una glosa interpretativa como «ritualmente impuros». Se mantiene «para ustedes» para conservar la orientación normativa del texto.
theological_decisions:
- issue: Naturaleza de la impureza en la ley dietética
  english_pob_reading: unclean
  chosen_spanish_reading: impuros
  alternative_spanish_readings:
  - ritualmente impuros
  - ceremonialmente impuros
  rationale: El hebreo טָמֵא en este contexto pertenece a las categorías legales de pureza/impureza; la traducción principal conserva el término general «impuro» sin reducirlo a una explicación doctrinal o ritualizante que no está explicitada en el verso.
  doctrine_reference: 'Principio de transparencia léxica: preservar la categoría bíblica sin añadir interpretación más allá del texto.'
- issue: Identificación del animal שָּׁפָן
  english_pob_reading: rock badger
  chosen_spanish_reading: damán
  alternative_spanish_readings:
  - hyrax
  - conejo de roca
  - tejón de roca
  rationale: La traducción busca evitar una equivalencia zoológica imprecisa o demasiado tradicionalizada. «Damán» refleja mejor la identificación moderna del referente hebreo y deja espacio para una nota explicativa si se requiere.
  doctrine_reference: 'Principio de no ocultar tensiones léxicas: cuando la identificación zoológica no es totalmente segura, la traducción principal no debe fingir certeza absoluta.'
translation_notes:
  revision_awareness: 'La redacción española sigue el último ajuste del audit trail inglés: se mantiene la correspondencia uniforme entre el verbo de rumiar y la imagen de la pezuña hendida/split hoof, y se conserva el valor restrictivo de אַךְ al inicio. También se toma en cuenta la nota inglesa sobre la identificación debatida de los animales, especialmente הָאַרְנֶבֶת y הַשָּׁפָן, trasladando esa tensión al español mediante una nota sobre la identificación zoológica.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» y no hay nombres divinos en el verso.
  - Se mantiene un registro legal-dietético claro y sobrio.
  - «Rumian» y «pezuña hendida» se usan de manera consistente en ambas cláusulas relacionadas.
  - «Impuros» conserva la categoría bíblica general sin añadir «ceremonialmente» o «ritualmente» en el texto principal.
  - Se adopta un español neutral y publicable, sin arcaísmos innecesarios.
