translation:
  language: es
  text: Habiendo sido salvados por Dios de grandes peligros[a], le damos muchas gracias, como quienes van a ponerse en formación contra un rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como si estuvieran formados contra un rey»; o «como quienes se disponen en orden de batalla contra un rey». La comparación griega es compacta y de imaginería militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ μεγάλων κινδύνων
  english_pob_choice: from great dangers
  chosen_spanish: de grandes peligros
  alternatives_spanish:
  - de grandes peligros
  - de grandes riesgos
  lexicon: LSJ
  rationale: κινδύνων expresa peligros o riesgos, y el plural con μεγάλων debe conservarse. «De grandes peligros» es natural en español y mantiene el énfasis del plural y la intensidad.
- source_word: ὑπὸ τοῦ θεοῦ
  english_pob_choice: by God
  chosen_spanish: por Dios
  alternatives_spanish:
  - por Dios
  - por el Dios
  lexicon: LSJ
  rationale: ὑπό con genitivo marca agencia; en español, «por Dios» expresa de forma directa que Dios es el agente de la salvación.
- source_word: σεσωσμένοι
  english_pob_choice: having been saved
  chosen_spanish: habiendo sido salvados
  alternatives_spanish:
  - habiendo sido librados
  - siendo salvados
  lexicon: LSJ
  rationale: El participio perfecto pasivo comunica una acción completada con resultado presente. «Habiendo sido salvados» mantiene bien ese valor verbal.
- source_word: μεγάλως εὐχαριστοῦμεν
  english_pob_choice: we give him great thanks
  chosen_spanish: le damos muchas gracias
  alternatives_spanish:
  - le damos grandes gracias
  - le agradecemos mucho
  lexicon: LSJ
  rationale: εὐχαριστοῦμεν lleva un objeto indirecto explícito y el adverbio intensifica la acción. En español, «le damos muchas gracias» suena natural y conserva la intensificación.
- source_word: ὡς ἂν
  english_pob_choice: as
  chosen_spanish: como quienes
  alternatives_spanish:
  - como si
  - como
  lexicon: LSJ
  rationale: La comparación está comprimida y prepara la imagen militar siguiente. «Como quienes» permite mantener el matiz comparativo sin forzar una lectura excesivamente hipotética.
- source_word: πρὸς βασιλέα
  english_pob_choice: against a king
  chosen_spanish: contra un rey
  alternatives_spanish:
  - frente a un rey
  - ante un rey
  lexicon: LSJ
  rationale: Con παρατάσσω en contexto militar, πρὸς adquiere fuerza adversativa. «Contra un rey» conserva esa orientación de oposición.
- source_word: παρατασσόμενοι
  english_pob_choice: as those about to array ourselves against a king
  chosen_spanish: a punto de alinearse contra un rey
  alternatives_spanish:
  - dispuestos en orden de batalla contra un rey
  - a punto de formarse en batalla contra un rey
  lexicon: LSJ
  rationale: 'El participio medio/pasivo es militar: ponerse en formación. En español, «alinearse» comunica la disposición ordenada sin añadir más de lo que el texto requiere; «a punto de» refleja el matiz prospectivo sugerido por la construcción.'
theological_decisions:
- issue: Agencia divina de la salvación
  english_pob_reading: God is explicitly the agent who saved the writers from dangers.
  chosen_spanish_reading: Dios es explícitamente el agente que los salvó de los peligros.
  alternative_spanish_readings:
  - Dios es quien los libró de los peligros
  - Dios aparece como el agente de su liberación
  rationale: El griego ὑπὸ τοῦ θεοῦ + participio perfecto pasivo atribuye claramente la acción a Dios. La traducción mantiene esa agencia sin suavizarla.
  doctrine_reference: Principio de primacía del texto original y agencia divina explícita
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del contexto inglés al reflejar el valor medio/pasivo de παρατασσόμενοι y evita introducir explícitamente «batalla» donde el griego lo sugiere por contexto pero no lo nombra de manera directa. También conserva la comparación comprimida con una formulación española natural.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός conforme al criterio del proyecto.
  - Se traduce el perfecto pasivo con una perífrasis que conserva la acción completada y el resultado presente.
  - Se mantiene la imagen militar de παρατασσόμενοι sin volverla más explícita de lo que el griego permite.
  - El tono es reverente pero contemporáneo, apto para lectura eclesial en español neutro.
