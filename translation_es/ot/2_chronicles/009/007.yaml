review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: mantiene la duplicación de אַשְׁרֵי, distingue אֲנָשֶׁיךָ de עֲבָדֶיךָ, conserva el demostrativo «estos», y refleja la secuencia «los que están delante de ti continuamente y oyen tu sabiduría». Sin embargo, omite una nota importante del rastro inglés sobre el modismo cortesano «stand before you», y «están delante de ti» suena menos idiomático en español que una formulación más natural que preserve la imagen.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse ligeramente. «Bienaventurados» funciona, aunque «dichosos» sería más natural; no es necesario cambiarlo. La principal mejora es usar «están en tu presencia» para sonar más natural en español mientras conserva la idea cortesana, y añadir la nota cultural correspondiente. También conviene suavizar la nota léxica para evitar «felicidad/ventura» con barra, que suena poco pulido.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Siervos» para עֲבָדֶיךָ está bien justificado por el contexto cortesano. No aparecen términos sensibles del glosario mayor. La decisión sobre אַשְׁרֵי como «Bienaventurados» es aceptable dentro del registro eclesial, con alternativa en nota.
  issues:
  - severity: medium
    issue: Falta la nota cultural sobre «estar delante de» como expresión cortesana.
    rationale: El English POB preservó explícitamente esta información. Debe mantenerse en español porque ayuda a entender que no se trata solo de ubicación física, sino de asistencia real en la corte.
  - severity: low
    issue: «Que están delante de ti» es comprensible, pero algo tieso en español.
    rationale: Una leve mejora a «que están en tu presencia» conserva el sentido literal-funcional y lee mejor en español eclesial moderno.
  - severity: low
    issue: 'La redacción de la nota a usa una barra poco natural: «felicidad/ventura».'
    rationale: Una formulación corrida mejora la legibilidad sin alterar el contenido léxico documentado.
