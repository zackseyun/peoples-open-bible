translation:
  language: es
  text: Entonces el rey[a], después de disponer todo el banquete según las mismas reglas, los animó a entregarse a la alegría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las mismas leyes». El griego νόμοι puede significar leyes, reglas o disposiciones consuetudinarias; en este contexto de banquete, «reglas» resalta mejor el sentido procedimental.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κατὰ
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - de acuerdo con
  - conforme a
  lexicon: LSJ
  rationale: Con el acusativo τοὺς αὐτοὺς νόμους, κατά expresa conformidad. En español, «según» comunica bien esa relación sin sonar pesado.
- source_word: τοὺς αὐτοὺς νόμους
  english_pob_choice: the same rules
  chosen_spanish: las mismas reglas
  alternatives_spanish:
  - las mismas leyes
  - las mismas normas
  - los mismos reglamentos
  lexicon: LSJ
  rationale: En el contexto de un banquete, νόμοι funciona mejor como disposiciones o reglas prácticas que como leyes civiles; «reglas» conserva ese matiz procedimental.
- source_word: συστησάμενος
  english_pob_choice: having arranged
  chosen_spanish: habiendo dispuesto
  alternatives_spanish:
  - habiendo organizado
  - habiendo preparado
  - habiendo puesto en orden
  lexicon: LSJ
  rationale: El participio indica una acción previa del rey al poner en orden el banquete; «dispuesto» refleja bien esa organización previa en español.
- source_word: πᾶν τὸ συμπόσιον
  english_pob_choice: the whole banquet
  chosen_spanish: todo el banquete
  alternatives_spanish:
  - todo el banquete entero
  - el banquete completo
  - toda la fiesta
  lexicon: LSJ
  rationale: συμπόσιον es un banquete o banquete de convivencia; «todo el banquete» conserva la totalidad de πᾶν y suena natural.
- source_word: εἰς εὐφροσύνην
  english_pob_choice: to rejoicing
  chosen_spanish: al regocijo
  alternatives_spanish:
  - a la alegría
  - a la dicha
  - al júbilo
  lexicon: LSJ
  rationale: La frase marca orientación hacia un estado de alegría; «al regocijo» preserva el movimiento de εἰς y la tonalidad festiva.
- source_word: τραπῆναι
  english_pob_choice: to turn
  chosen_spanish: volverse
  alternatives_spanish:
  - cambiar
  - pasar
  - convertirse
  lexicon: LSJ
  rationale: El infinitivo aoristo pasivo de τρέπω puede expresar un giro o cambio de estado. «Volverse» conserva esa imagen verbal en español.
- source_word: παρεκάλει
  english_pob_choice: urged them
  chosen_spanish: los exhortaba
  alternatives_spanish:
  - los instaba
  - los animaba
  - los invitaba
  lexicon: LSJ
  rationale: En este contexto festivo, παρακαλέω tiene fuerza exhortativa o animadora; «exhortaba» transmite mejor esa presión amable que un mero «invitaba».
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto español junto a «rey».
  spanish_consistency_notes:
  - Se mantuvo el estilo sobrio y narrativo propio de la POB.
  - Se evitó traducir νόμοι de forma demasiado jurídica, dado el contexto del banquete.
  - Se conservó la relación de finalidad/resultado en εἰς εὐφροσύνην con una construcción natural en español.
