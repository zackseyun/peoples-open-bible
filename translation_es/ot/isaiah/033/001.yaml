review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura de denuncia y reversión del hebreo, y mantiene correctamente el campo léxico de destruir/traicionar en gran parte del verso. Sin embargo, falla de manera importante en la cláusula media: «que no han sido traicionados contra él» no corresponde ni al hebreo ni al POB inglés. El hebreo בָגְדוּ בוֹ significa ''han traicionado/han obrado con traición contra él'', no una voz pasiva ''han sido traicionados''. Además, el POB inglés resolvió la línea principal con segunda persona (''you'') por la dirección discursiva y dejó la tercera persona en nota; el borrador español invierte esa decisión y además produce una frase española poco inteligible.'
  spanish_quality_summary: El español tiene buen tono profético en «¡Ay de ti!» y «Cuando acabes de destruir, serás destruido». Pero la secuencia «y traidor, que no han sido traicionados contra él» es gramaticalmente torpe y de baja legibilidad. También conviene ajustar «traidor» a «traicionero» o mantener una formulación que suene natural en aposición vocativa; aun así, puede conservarse «traidor» si el resto se corrige. La revisión propuesta mejora fidelidad y fluidez sin perder solemnidad.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. La decisión léxica principal debe respetar la rationale auditada: שׁוֹדֵד/שָׁדוּד/תּוּשַּׁד con «destructor/destruido», y בוגד/בגד con una familia léxica coherente como «traicionero/traicionar» o «traidor/traicionar». También debe seguirse el criterio documentado del POB inglés para בָגְדוּ בוֹ: texto principal en segunda persona, con nota para la lectura más literal en tercera persona.'
  issues:
  - severity: high
    issue: La cláusula «que no han sido traicionados contra él» traduce erróneamente la voz verbal.
    rationale: בָגְדוּ es activo plural ('ellos traicionaron/obraron con traición'), no pasivo ('han sido traicionados'). Esto altera el sentido básico del hebreo.
  - severity: high
    issue: El texto principal español contradice la decisión auditada del POB sobre el pronombre de בָגְדוּ בוֹ.
    rationale: El POB inglés usa segunda persona en el texto principal por el discurso directo y deja la tercera persona en nota. El borrador español pone la tercera persona en el texto principal y hasta añade una segunda nota redundante, apartándose sin justificación suficiente del audit trail.
  - severity: medium
    issue: La nota [b] es redundante y nace de un problema creado por la propia redacción principal.
    rationale: Si el texto principal vuelve a «no te han traicionado», basta una sola nota que preserve la lectura literal 'a él'/'contra él', como en el POB inglés.
  - severity: medium
    issue: «Traidor» funciona, pero «traicionero» suena más natural en esta serie atributiva.
    rationale: Como paralelo de «destructor», el adjetivo sustantivado «traicionero» encaja bien en español bíblico contemporáneo. No obstante, esto es estilístico y no imprescindible si se prefiere mantener cercanía al audit trail.
  revised_spanish_text: ¡Ay de ti[a], destructor, aunque tú mismo no has sido destruido, y traicionero, aunque no te han traicionado! Cuando acabes de destruir, serás destruido; cuando ceses de traicionar[c], te traicionarán.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «y no han traicionado contra él» o «y no lo han traicionado». El texto principal sigue el sentido de la interpelación directa y del paralelismo; también puede entenderse la lectura más literal en tercera persona.'
    reason: alternative_reading
  - marker: c
    text: 'O: «cuando acabes de traicionar» / «cuando dejes de obrar con traición».'
    reason: lexical_alternative
  revision_rationale: Se corrigió la cláusula media para reflejar correctamente el verbo activo hebreo y para seguir la decisión auditada del POB de mantener la segunda persona en el texto principal, dejando la tercera persona en nota. Se eliminó la nota redundante [b]. También se suavizó la sintaxis para que el español sea natural y digno, manteniendo el paralelismo y la reversión del hebreo.
