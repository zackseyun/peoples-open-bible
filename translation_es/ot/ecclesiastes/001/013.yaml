translation:
  language: es
  text: Y puse mi corazón a buscar y a explorar con sabiduría todo lo que se hace bajo el cielo. Es una tarea penosa que Dios ha dado a los hijos del hombre[a] para ocuparse de ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la humanidad» o «a los seres humanos». El hebreo dice «a los hijos del hombre», una expresión masculina usada en sentido genérico para la humanidad.
    reason: lexical_alternative
  - marker: b
    text: O «para ser afligidos por ella» o «para trabajar en ella». El hebreo puede llevar tanto la idea de ocuparse de algo como la de ser cargado u oprimido por ello.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי אֶת לִבִּי
  english_pob_choice: And I set my heart
  chosen_spanish: Y puse mi corazón
  alternatives_spanish:
  - Y di mi corazón
  - Y apliqué mi mente
  lexicon: HALOT
  rationale: El hebreo usa el idiomático «dar el corazón», que expresa intención deliberada y orientación interior. «Puse mi corazón» conserva ese matiz volitivo en español natural; se mantiene «corazón» porque en Qohelet incluye voluntad e ինտención, no solo emoción.
- source_word: לִדְרוֹשׁ וְלָתוּר
  english_pob_choice: to seek and to explore
  chosen_spanish: a buscar y a explorar
  alternatives_spanish:
  - a inquirir y a buscar
  - a investigar y a examinar
  lexicon: HALOT
  rationale: Los dos infinitivos son próximos pero no idénticos. «Buscar» corresponde bien a דרש, y «explorar» conserva el matiz de תור como recorrer, indagar o examinar por experiencia. La pareja mantiene el énfasis doble sin forzar un tecnicismo.
- source_word: בַּחָכְמָה
  english_pob_choice: by wisdom
  chosen_spanish: con sabiduría
  alternatives_spanish:
  - por sabiduría
  - mediante sabiduría
  lexicon: HALOT
  rationale: La preposición hebrea marca medio o modo. En español, «con sabiduría» suena natural y conserva la idea de que la sabiduría es el instrumento o la manera de la investigación.
- source_word: עַל כָּל אֲשֶׁר נַעֲשָׂה
  english_pob_choice: all that is done
  chosen_spanish: todo lo que se hace
  alternatives_spanish:
  - todo lo que ha sido hecho
  - todo cuanto se hace
  lexicon: HALOT
  rationale: La construcción expresa el alcance universal de la pesquisa. «Todo lo que se hace» mantiene el valor general y gnómico del texto, sin introducir más pasado del que exige el hebreo.
- source_word: תַּחַת הַשָּׁמָיִם
  english_pob_choice: under heaven
  chosen_spanish: debajo del cielo
  alternatives_spanish:
  - bajo el cielo
  - bajo los cielos
  lexicon: HALOT
  rationale: Es una fórmula característica de Eclesiastés para la esfera humana. «Debajo del cielo» es natural en español y conserva el tono proverbial de la expresión.
- source_word: עִנְיַן
  english_pob_choice: task
  chosen_spanish: tarea
  alternatives_spanish:
  - ocupación
  - asunto
  - negocio
  lexicon: HALOT
  rationale: En Eclesiastés el término puede denotar ocupación, tarea o asunto que absorbe a la persona. «Tarea» es breve, clara y suficientemente abierta para reflejar ese campo semántico.
- source_word: רָע
  english_pob_choice: unhappy
  chosen_spanish: penosa
  alternatives_spanish:
  - desdichada
  - grave
  - mala
  lexicon: HALOT
  rationale: Aquí el adjetivo describe el carácter gravoso, frustrante o aflictivo de la tarea, no una maldad moral en Dios. «Penosa» comunica esa carga y evita atribuir al don divino una maldad ética que el contexto no pide.
- source_word: לִבְנֵי הָאָדָם
  english_pob_choice: to the sons of man
  chosen_spanish: a los hijos del hombre
  alternatives_spanish:
  - a la humanidad
  - a los seres humanos
  - a los hijos de Adán
  lexicon: HALOT
  rationale: El hebreo es masculino y genérico. Se conserva la forma fuente en «los hijos del hombre», que mantiene la fuerza representativa del original; las alternativas inclusivas quedan como posibilidad secundaria.
- source_word: לַעֲנוֹת בּוֹ
  english_pob_choice: to be occupied with
  chosen_spanish: para ocuparse en ella
  alternatives_spanish:
  - para ser afligidos por ella
  - para trabajar en ella
  - para estar ocupados en ella
  lexicon: HALOT
  rationale: ענה en este contexto admite el sentido de ocuparse, ser absorbido o incluso ser oprimido por algo. La frase española conserva la idea de ocupación con una leve resonancia de carga, y «ella» retoma naturalmente «tarea».
theological_decisions:
- issue: Cómo traducir רָע sin atribuir maldad moral a Dios
  english_pob_reading: Rendered as 'unhappy' rather than 'evil'
  chosen_spanish_reading: «penosa» en lugar de «mala» o «malvada»
  alternative_spanish_readings:
  - tarea mala
  - tarea malvada
  - tarea desdichada
  rationale: El texto dice que Dios da esta tarea, así que la valoración negativa debe entenderse como pesadumbre, frustración o carga, no como maldad moral. «Penosa» preserva el juicio negativo del versículo sin implicar que Dios otorgue algo éticamente malo.
  doctrine_reference: 'Principio de traducción: no introducir una afirmación doctrinal que el texto no hace; mantener el sentido llano de la fuente.'
- issue: Cómo reflejar el género gramatical de לִבְנֵי הָאָדָם
  english_pob_reading: '''the sons of man'' in the main text with inclusive alternative footnoted'
  chosen_spanish_reading: «los hijos del hombre» en el texto principal
  alternative_spanish_readings:
  - la humanidad
  - los seres humanos
  - los hijos de Adán
  rationale: La forma hebrea es masculina pero genérica. Se conserva en español para no diluir la estructura del original, y el valor inclusivo queda sugerido por el contexto humano universal.
  doctrine_reference: 'Política de precisión de género: preferir una forma fiel al original cuando el texto usa una expresión masculina genérica.'
translation_notes:
  revision_awareness: He seguido el texto hebreo de WLC y el hilo de decisiones del POB en inglés, incluyendo la revisión reciente de 'a grievous task' a 'an unhappy task' para רָע. La versión española conserva esa misma valoración negativa no moral mediante 'penosa', mantiene la expresión proverbial 'debajo del cielo' / 'bajo el cielo' como fórmula de Eclesiastés, y refleja el doble matiz de דרש/תור con 'buscar' y 'explorar'.
  spanish_consistency_notes:
  - Se usa 'corazón' para לֵב con su sentido volitivo e intelectual, coherente con Qohelet.
  - Se mantiene 'hijos del hombre' por fidelidad al masculino genérico del hebreo; no se sustituye por una forma neutra en el texto principal.
  - '''Penosa'' evita una lectura de maldad moral en la tarea dada por Dios.'
  - La expresión 'debajo del cielo' conserva el carácter formular de Eclesiastés y la coherencia con el registro bíblico en español.
