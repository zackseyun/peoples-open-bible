translation:
  language: es
  text: Los labios mentirosos encubren el odio[a], y el que difunde calumnia[b] es un necio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Labios de mentira encubren el odio». El hebreo puede entenderse más literalmente, con «labios de falsedad» como el sujeto.'
    reason: alternative_reading
  - marker: b
    text: 'O: «el que saca un mal informe». La expresión hebrea puede referirse también a hacer circular un reporte dañino en sentido más amplio, no solo a la calumnia formal.'
    reason: alternative_reading
lexical_decisions:
- source_word: מְכַסֶּה
  english_pob_choice: conceal
  chosen_spanish: encubren
  alternatives_spanish:
  - cubren
  - ocultan
  lexicon: HALOT
  rationale: El participio transmite la idea de cubrir o esconder. «Encubren» conserva la acción de ocultar algo moralmente negativo con un matiz idiomático natural en español.
- source_word: שִׂנְאָה
  english_pob_choice: hatred
  chosen_spanish: odio
  alternatives_spanish:
  - odio
  - enemistad
  lexicon: HALOT
  rationale: El sustantivo expresa odio/hostilidad. «Odio» es claro y directo en español; se eligió sobre «enemistad» por su mayor correspondencia inmediata con el contraste del proverbio.
- source_word: שִׂפְתֵי שָׁקֶר
  english_pob_choice: lying lips
  chosen_spanish: los labios mentirosos
  alternatives_spanish:
  - labios de mentira
  - labios falsos
  - labios engañosos
  lexicon: HALOT
  rationale: La construcción hebrea literalmente es «labios de mentira/falsehood». «Los labios mentirosos» mantiene la imagen personificada de labios como instrumento de engaño y suena natural en español.
- source_word: וּ/מוֹצִא
  english_pob_choice: whoever spreads
  chosen_spanish: el que difunde
  alternatives_spanish:
  - el que saca
  - el que divulga
  - quien hace circular
  lexicon: HALOT
  rationale: El hifil de יצא con דִּבָּה puede significar sacar o hacer salir un reporte; en este contexto sapiencial se entiende como propagarlo. «Difunde» comunica esa circulación de manera fiel y fluida.
- source_word: דִבָּה
  english_pob_choice: slander
  chosen_spanish: calumnia
  alternatives_spanish:
  - mala noticia
  - difamación
  - chisme dañino
  lexicon: HALOT
  rationale: La palabra puede referirse a un informe desfavorable, a veces falso o malicioso. «Calumnia» recoge bien la fuerza dañina del término en un contexto de sabiduría, aunque el sentido también puede ser más amplio que la calumnia técnica.
- source_word: הוּא כְסִיל
  english_pob_choice: is a fool
  chosen_spanish: es un insensato
  alternatives_spanish:
  - es un necio
  - es un necio insensato
  - es un tonto
  lexicon: HALOT
  rationale: כְּסִיל es un término sapiencial fijo para el necio moralmente torpe. «Insensato» transmite la nota de falta de juicio sin rebajar demasiado el registro; se evita «tonto» por ser demasiado coloquial.
theological_decisions:
- issue: 'El sujeto del primer hemistiquio puede entenderse de dos maneras: como «labios mentirosos» o como «labios de mentira» que esconden el odio.'
  english_pob_reading: Lying lips conceal hatred[b][a] ... The Hebrew may be construed more literally with 'lips of falsehood' as the subject.
  chosen_spanish_reading: Los labios mentirosos encubren el odio...
  alternative_spanish_readings:
  - Labios de mentira encubren el odio...
  - Los labios falsos encubren el odio...
  rationale: La POB inglesa preserva la alternativa textual/constructiva. En español, «labios mentirosos» comunica bien el sujeto implícito y evita una frase menos idiomática, sin perder la posibilidad de la lectura más literal indicada en la nota.
  doctrine_reference: Sabiduría proverbial; decisión sintáctica/semántica, no doctrinal.
- issue: El segundo hemistiquio puede significar más que «calumnia» en sentido técnico; puede abarcar un reporte dañino o malicioso.
  english_pob_reading: whoever spreads slander ... Or 'whoever brings out a bad report.' The Hebrew expression can denote circulating a harmful report more broadly, not only formal slander.
  chosen_spanish_reading: y el que difunde calumnia...
  alternative_spanish_readings:
  - y el que difunde una mala noticia...
  - y el que hace circular un mal informe...
  - y el que divulga difamación...
  rationale: Se mantiene una palabra fuerte y natural en español que recoge bien el peso ético del proverbio. La nota conserva la amplitud semántica que la POB documenta, sin restringir indebidamente el hebreo a la categoría jurídica de calumnia.
  doctrine_reference: Sabiduría proverbial; alcance semántico del sustantivo hebreo דִּבָּה.
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del contexto hebreo y del aparato inglés. La traducción inglesa está marcada como sin cambios en la última revisión; aun así, el registro español conserva la alternativa sintáctica del primer hemistiquio y la amplitud semántica de דִּבָּה documentada por la POB. No se detectan revisiones textuales adicionales del versículo en el paquete dado.
  spanish_consistency_notes:
  - Se mantuvo un tono sapiencial sobrio y publicación-readable.
  - Se prefirió una solución natural en español que no aplana la tensión entre la lectura idiomática y la más literal del hebreo.
  - «Insensato» se usa para כְּסִיל en coherencia con el registro de Proverbios.
  - No se introdujo vocabulario eclesiástico innecesario ni se sustituyó el léxico moral del proverbio por paráfrasis blandas.
