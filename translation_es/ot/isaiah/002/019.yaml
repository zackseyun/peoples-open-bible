translation:
  language: es
  text: Y entrarán en las cuevas de las peñas y en los agujeros del polvo[a], ante el terror de Yahvé y ante el esplendor de su majestad, cuando se levante para aterrar la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los agujeros de la tierra' o 'las madrigueras del polvo'.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבָאוּ
  english_pob_choice: And they will enter
  chosen_spanish: Y entrarán
  alternatives_spanish:
  - y vendrán
  - y irán
  lexicon: HALOT
  rationale: El contexto de refugio y ocultamiento favorece en español 'entrarán' para expresar movimiento hacia dentro, más preciso que el genérico 'vendrán' o 'irán'.
- source_word: בִּמְעָרוֹת צֻרִים
  english_pob_choice: the caves of the rocks
  chosen_spanish: las cuevas de las peñas
  alternatives_spanish:
  - las cuevas de las rocas
  - cuevas rocosas
  - las cuevas en las peñas
  lexicon: HALOT
  rationale: '''Cuevas de las peñas'' conserva el constructo hebreo y su imaginería concreta. ''Peñas'' comunica bien la dureza de צֻרִים sin sonar excesivamente técnico.'
- source_word: וּבִמְחִלּוֹת עָפָר
  english_pob_choice: the holes of the dust
  chosen_spanish: los agujeros del polvo
  alternatives_spanish:
  - los agujeros de la tierra
  - las madrigueras del polvo
  - los huecos del polvo
  lexicon: HALOT
  rationale: Se mantiene la literalidad imagética de עָפָר como 'polvo', junto con el paralelo con las cuevas. 'Agujeros del polvo' suena extraño, pero esa extrañeza refleja la imagen hebrea de escondites ínfimos y bajos.
- source_word: מִפְּנֵי
  english_pob_choice: from before
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - ante
  - de delante de
  lexicon: HALOT
  rationale: En español, la locución 'por el terror...' expresa de manera natural la causa del movimiento. La idea de 'desde delante de' o 'de delante de' resulta más dura y menos idiomática; el valor de separación ya está implícito en el contexto de huida.
- source_word: פַּחַד יְהוָה
  english_pob_choice: the terror of Yahweh
  chosen_spanish: el terror de Yahvé
  alternatives_spanish:
  - el pavor de Yahvé
  - el miedo de Yahvé
  - el temor de Yahvé
  lexicon: HALOT
  rationale: Se conserva 'terror' porque el término hebreo aquí no apunta al temor reverente sino al espanto judicial que provoca la presencia divina. Se mantiene 'Yahvé' según la convención del proyecto.
- source_word: וּמֵהֲדַר גְּאוֹנוֹ
  english_pob_choice: and from the splendor of his majesty
  chosen_spanish: por el esplendor de su majestad
  alternatives_spanish:
  - y por la gloria de su majestad
  - y por la magnificencia de su majestad
  - y por el esplendor de su exaltación
  lexicon: HALOT
  rationale: '''Esplendor de su majestad'' reproduce bien la duplicación honorífica del hebreo sin perder naturalidad en español. ''Majestad'' comunica el sentido contextual de גָּאוֹן aplicado a Yahvé.'
- source_word: בְּקוּמוֹ
  english_pob_choice: when he rises
  chosen_spanish: cuando se levante
  alternatives_spanish:
  - al levantarse
  - cuando se alce
  - en su levantarse
  lexicon: HALOT
  rationale: El infinitivo temporal se vierte con 'cuando se levante', que suena natural y conserva el valor circunstancial del hebreo.
- source_word: לַעֲרֹץ
  english_pob_choice: to terrify
  chosen_spanish: para aterrar
  alternatives_spanish:
  - para atemorizar
  - para hacer temblar
  - para infundir terror
  lexicon: HALOT
  rationale: '''Aterrar'' mantiene el fuerte efecto causativo del verbo y encaja con el contexto de juicio y pánico cósmico.'
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - el país
  lexicon: HALOT
  rationale: En este contexto universal de juicio, 'la tierra' comunica mejor el alcance cósmico que 'el país'.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la convención del proyecto de renderizar directamente el Tetragrámaton como 'Yahvé', preservando el nombre del pacto sin máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה / YHWH'
translation_notes:
  revision_awareness: El texto base en inglés ya estaba evaluado como de alta concordancia y sin cambios en la última revisión. La presente versión sigue ese juicio, manteniendo la imagen concreta y el orden de las dos causas del escondite, con ajuste idiomático mínimo para español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del nombre divino en el texto principal.
  - Se conserva el paralelismo entre 'cuevas' y 'agujeros' para reflejar el hebreo.
  - '''Tierra'' se usa en sentido cósmico, no meramente local.'
  - La nota al pie se ancla en 'agujeros del polvo' para preservar la ambigüedad lexical documentada.
