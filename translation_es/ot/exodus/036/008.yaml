base_translation:
  language: en
  yaml_path: translation/ot/exodus/036/008.yaml
  text: And every skillful man among those doing the work made the tabernacle with ten curtains of finely twisted linen[a], and blue, and purple, and scarlet yarn; he made them with cherubim[b], the work of a skillful designer.
  footnotes:
  - marker: a
    text: Hebrew literally, 'wise of heart,' an idiom for a skilled artisan.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew ends with a singular verb, 'he made them,' though the verse began with a plural subject; some translations smooth this to 'they made them.'
    reason: alternative_reading
