translation:
  language: es
  text: Y sucedió en el año treinta y siete del exilio de Joaquín, rey de Judá, en el mes duodécimo, a los veinticinco días del mes, que Evil-merodac, rey de Babilonia, en el primer año de su reinado[b], levantó la cabeza[a] de Joaquín, rey de Judá, y lo sacó de la cárcel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa: «mostró favor a Joaquín, rey de Judá»; literalmente, «levantó la cabeza de».'
    reason: lexical_alternative
  - marker: b
    text: Evil-merodac también es conocido históricamente como Amel-Marduc.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y fue
  lexicon: HALOT
  rationale: La fórmula narrativa introduce un nuevo episodio. 'Y sucedió' conserva la función discursiva del wayyiqtol en un español moderno y digno, sin sonar arcaico.
- source_word: לְגָלוּת
  english_pob_choice: of the exile
  chosen_spanish: del exilio
  alternatives_spanish:
  - de la cautividad
  - del cautiverio
  lexicon: HALOT
  rationale: El sustantivo señala el estado o período de deportación. 'Exilio' es la equivalencia más clara y natural en español para este contexto histórico.
- source_word: יְהוֹיָכִין
  english_pob_choice: Jehoiachin
  chosen_spanish: Jeconías
  alternatives_spanish:
  - Joaquín
  lexicon: Uso bíblico castellano tradicional y concordancia histórica
  rationale: En español bíblico, 'Jeconías' es una forma conocida y transparente para el rey de Judá; evita la transliteración menos natural en este contexto y mantiene reconocimiento lector.
- source_word: בִּשְׁנֵים עָשָׂר חֹדֶשׁ
  english_pob_choice: in the twelfth month
  chosen_spanish: en el mes duodécimo
  alternatives_spanish:
  - en el duodécimo mes
  lexicon: HALOT
  rationale: Se preserva la fórmula de fecha hebrea con una expresión idiomática en español. 'Mes duodécimo' mantiene el orden y la sobriedad del original.
- source_word: בְּעֶשְׂרִים וַחֲמִשָּׁה לַחֹדֶשׁ
  english_pob_choice: on the twenty-fifth day of the month
  chosen_spanish: a los veinticinco días del mes
  alternatives_spanish:
  - el día veinticinco del mes
  lexicon: HALOT
  rationale: La construcción de fecha requiere una expresión natural en español. 'A los veinticinco días del mes' reproduce el valor temporal sin añadir interpretaciones.
- source_word: אֱוִיל מְרֹדַךְ
  english_pob_choice: Evil-merodach
  chosen_spanish: Evil-merodac
  alternatives_spanish:
  - Amel-Marduc
  lexicon: Tradición onomástica bíblica en español y adaptación gráfica
  rationale: Se mantiene la forma histórica conocida en español, con adaptación ortográfica final para la pronunciación española. La forma acadia histórica queda como alternativa documentada.
- source_word: בִּשְׁנַת מַלְכֻתוֹ
  english_pob_choice: in the first year of his reign
  chosen_spanish: en el primer año de su reinado
  alternatives_spanish:
  - en el año de su reinado
  - en el año de su realeza
  lexicon: HALOT
  rationale: La expresión indica el primer año regnal; el español requiere explicitar 'primer' para reflejar la lectura histórica y cronológica del contexto y del paralelo en 2 Reyes 25:27.
- source_word: נָשָׂא אֶת־רֹאשׁ
  english_pob_choice: lifted up the head of
  chosen_spanish: levantó la cabeza de
  alternatives_spanish:
  - alzó la cabeza de
  - mostró favor a
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea para transparencia al texto fuente. La expresión literal queda inteligible en español y permite mantener la tensión entre metáfora y sentido relacional.
- source_word: וַיֹּצֵא אוֹתוֹ
  english_pob_choice: and brought him out
  chosen_spanish: y lo sacó
  alternatives_spanish:
  - y lo hizo salir
  - y lo llevó fuera
  lexicon: HALOT
  rationale: El causativo de יצא se expresa de forma natural con 'sacó'. En español comunica el movimiento causado sin perder la dirección semántica del hebreo.
- source_word: מִבֵּית הַכְּלִיא
  english_pob_choice: from the prison
  chosen_spanish: de la cárcel
  alternatives_spanish:
  - de la prisión
  - de la casa de confinamiento
  lexicon: HALOT
  rationale: '''Cárcel'' es la opción idiomática y clara en español contemporáneo. ''Casa de confinamiento'' conserva más literalidad, pero suena forzada para publicación general.'
theological_decisions:
- issue: Traducción de נָשָׂא אֶת־רֹאשׁ como metáfora de elevación/favor
  english_pob_reading: lifted up the head of; or, more interpretively, showed favor to Jehoiachin
  chosen_spanish_reading: levantó la cabeza de Jeconías
  alternative_spanish_readings:
  - mostró favor a Jeconías
  - restituyó la dignidad de Jeconías
  rationale: Se conserva la metáfora hebrea en el texto principal para no borrar la tensión lexical. La nota permite al lector ver el sentido interpretativo documentado en la tradición de traducción, sin reemplazar la forma fuente por una paráfrasis.
  doctrine_reference: Principio de transparencia textual y preservación de idiomatismos bíblicos
- issue: Identidad del monarca babilónico
  english_pob_reading: Evil-merodach; also known historically as Amel-Marduk
  chosen_spanish_reading: Evil-merodac
  alternative_spanish_readings:
  - Amel-Marduc
  - Amel-Marduk
  rationale: Se mantiene la forma bíblica tradicional en español por reconocimiento lector y continuidad con la recepción bíblica, mientras que la forma histórica acadia queda disponible como alternativa documentada.
  doctrine_reference: Onomástica bíblica y fidelidad a la tradición textual recibida
translation_notes:
  revision_awareness: 'El inglés POB mantiene la metáfora de נָשָׂא אֶת־רֹאשׁ en el texto principal y aclara su sentido en nota; también conserva la forma tradicional Evil-merodach con una nota histórica sobre Amel-Marduk. Esta versión española sigue la misma estrategia: retiene la metáfora ''levantó la cabeza de'' y la forma onomástica tradicional ''Evil-merodac'', con notas que preservan las alternativas interpretativas e históricas.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrámaton en otros contextos, pero este versículo no lo contiene.
  - '''Jeconías'' se mantiene de forma consistente para el rey de Judá en español bíblico tradicional; el nombre no se armoniza con ''Joaquín'' para evitar ruptura estilística en este pasaje histórico.'
  - La fecha se expresa con un registro sobrio y natural, manteniendo la estructura hebrea sin modernizarla excesivamente.
  - Se conserva la metáfora de 'la cabeza' para no diluir el idiomatismo del original.
