revisions:
- from: No te creas entre los altos del pueblo; recuerda que el pasar no pasará.[a][b]
  to: No te cuentes entre los muertos del pueblo; recuerda que el morir[a] no pasará de largo.[b]
  rationale: Se corrige el error semántico principal restituyendo «los muertos del pueblo» conforme al hebreo y al expediente inglés. «No te cuentes entre» expresa mejor el valor reflexivo de חשב. En la segunda línea, «el morir … no pasará de largo» mantiene el eco verbal de עבר y a la vez suena más claro en español que «el pasar no pasará». Se conservan las dos notas, con anclajes únicos y en orden.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:05:26Z'
