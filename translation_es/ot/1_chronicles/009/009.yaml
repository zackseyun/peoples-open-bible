translation:
  language: es
  text: Y sus hermanos, según sus generaciones[a], eran novecientos cincuenta y seis. Todos estos hombres eran jefes de casas paternas[b] en las casas de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “por sus genealogías”. El término hebreo se refiere a líneas de descendencia o registros familiares.
    reason: lexical_alternative
  - marker: b
    text: 'Expresión genealógica y clánica: literalmente, “cabezas de casas paternas”.'
    reason: cultural_note
lexical_decisions:
- source_word: וַאֲחֵיהֶם
  english_pob_choice: And their brothers
  chosen_spanish: Y sus hermanos
  alternatives_spanish:
  - Y sus parientes
  - Y sus allegados
  lexicon: HALOT
  rationale: En contextos genealógicos, אָח puede abarcar vínculos de clan, pero el término literal ‘hermanos’ conserva la relación de parentesco que el texto hebreo presenta y coincide con la lectura genealógica del pasaje.
- source_word: לְתֹלְדוֹתָם
  english_pob_choice: according to their generations
  chosen_spanish: según sus generaciones
  alternatives_spanish:
  - por sus genealogías
  - según sus registros familiares
  lexicon: HALOT
  rationale: תּוֹלְדוֹת aquí apunta a líneas de descendencia. ‘Según sus generaciones’ mantiene el registro genealógico y evita sobreinterpretar con una formulación más explicativa de lo que exige el hebreo.
- source_word: תְּשַׁע מֵאוֹת וַחֲמִשִּׁים וְשִׁשָּׁה
  english_pob_choice: nine hundred and fifty-six
  chosen_spanish: novecientos cincuenta y seis
  lexicon: HALOT
  rationale: Es la correspondencia cardinal directa e idiomática en español.
- source_word: כָּל אֵלֶּה אֲנָשִׁים
  english_pob_choice: All these men
  chosen_spanish: Todos هؤلاء hombres
  alternatives_spanish:
  - Todas estas personas
  - Todos estos varones
  lexicon: HALOT
  rationale: El hebreo אֲנָשִׁים es masculino plural y se refiere a los varones enumerados en la genealogía. La redacción debía ser ‘Todos estos hombres’; se preserva así la referencia masculina del texto fuente.
- source_word: רָאשֵׁי אָבוֹת
  english_pob_choice: heads of fathers’ houses
  chosen_spanish: jefes de casas paternas
  alternatives_spanish:
  - cabezas de casas paternas
  - jefes de casas de padres
  lexicon: HALOT
  rationale: La expresión es técnica en Crónicas. ‘Jefes de casas paternas’ conserva el sentido de unidad de clan/linaje sin perder la estructura hebrea, y ‘jefes’ comunica mejor que un calco como ‘cabezas’ en español.
- source_word: לְבֵית אֲבֹתֵיהֶם
  english_pob_choice: in their fathers’ households
  chosen_spanish: en las casas de sus padres
  alternatives_spanish:
  - en sus casas paternas
  - en los hogares de sus padres
  lexicon: HALOT
  rationale: La frase amplía la designación genealógica previa. ‘En las casas de sus padres’ es natural en español y conserva el campo semántico de casa/linaje/household sin introducir un sentido más moderno que el del hebreo.
translation_notes:
  revision_awareness: El texto sigue de cerca el registro genealógico del hebreo y la solución inglesa auditada. Se evitó suavizar la designación técnica de casas paternas, pero se eligió ‘jefes’ en lugar de ‘cabezas’ por naturalidad en español. La nota sobre תּוֹלְדוֹת preserva la alternativa genealogía/registros familiares tal como la auditoría inglesa la documenta.
  spanish_consistency_notes:
  - Se mantiene ‘casas paternas’ como equivalente consistente de fathers’ houses en el marco genealógico de Crónicas.
  - Se conserva el masculino plural ‘hombres’ para אֲנָשִׁים, en línea con la precisión de género del hebreo.
  - La numeración se expresa de forma estándar en español sin alterar el valor textual.
