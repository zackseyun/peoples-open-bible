  glossary_alignment: Se alinea correctamente con la política del proyecto al usar «Yahvé» para יְהוָה. No hay conflicto terminológico mayor. La principal corrección léxica necesaria es representar mejor יוּמָת con «ser puesto a muerte» o equivalente, conforme a la decisión inglesa auditada.
