translation:
  language: es
  text: ¿Y quién es el hombre que se ha comprometido con una mujer y no la ha tomado?[a][b] Que vaya y vuelva a su casa, no sea que muera en la batalla y otro hombre la tome[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «se ha desposado con una mujer».
    reason: lexical_alternative
  - marker: b
    text: «No la ha tomado» significa que aún no ha completado el matrimonio al tomarla como esposa.
    reason: cultural_note
  - marker: c
    text: O «y otro hombre se case con ella».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִי הָאִישׁ
  english_pob_choice: And who is the man
  chosen_spanish: ¿Y quién es el hombre
  alternatives_spanish:
  - ¿Quién es el hombre
  - ¿Y qué hombre hay
  lexicon: HALOT
  rationale: Mantiene el valor interrogativo-retórico y la referencia masculina singular del hebreo. En español, iniciar con «¿Y quién es el hombre» conserva el tono de proclamación pública y fluidez natural.
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quien
  lexicon: HALOT
  rationale: «Que» funciona de manera natural como relativo en español dentro de una pregunta definida por antecedente personal, sin añadir énfasis indebido.
- source_word: אֵרַשׂ
  english_pob_choice: has become engaged
  chosen_spanish: se ha comprometido
  alternatives_spanish:
  - está desposado
  - se ha desposado
  - se ha prometido
  lexicon: HALOT
  rationale: El español «se ha comprometido» comunica bien la fase previa al matrimonio que el audit trail inglés decidió destacar. Se evita «desposado» como forma más técnica o tradicional, aunque sigue siendo una alternativa válida.
- source_word: אִשָּׁה
  english_pob_choice: a woman
  chosen_spanish: con una mujer
  alternatives_spanish:
  - a una mujer
  - con su esposa
  lexicon: HALOT
  rationale: Se mantiene el matiz preconyugal del hebreo y del inglés POB, que evita «esposa» en esta primera mención para no adelantar el estado marital pleno.
- source_word: וְלֹא לְקָחָהּ
  english_pob_choice: and has not taken her
  chosen_spanish: y no la ha tomado
  alternatives_spanish:
  - y no se ha unido a ella
  - y no la ha llevado a su casa
  - y no la ha desposado
  lexicon: HALOT
  rationale: «Tomar» preserva el modismo hebreo de לקח aplicado al matrimonio y mantiene la correspondencia con la primera mitad del versículo. En español suena algo directo, pero es la forma más transparente para el sentido lexical que el POB audita.
- source_word: יֵלֵךְ וְיָשֹׁב
  english_pob_choice: Let him go and return
  chosen_spanish: Que vaya y vuelva
  alternatives_spanish:
  - Que se vaya y regrese
  - Vaya y vuelva
  - Que vaya y regrese
  lexicon: HALOT
  rationale: El hebreo tiene fuerza directiva; en español «Que vaya y vuelva» reproduce bien el tono de instrucción sin volverlo demasiado coloquial.
- source_word: לְבֵיתוֹ
  english_pob_choice: to his house
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su hogar
  - a su casa
  lexicon: HALOT
  rationale: «Casa» traduce directamente el sustantivo y mantiene el paralelo con la casa del hombre en la orden militar. «Hogar» sería más interpretativo.
- source_word: פֶן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: HALOT
  rationale: Aunque «lest» es el valor del inglés POB, en español «para que no» expresa con naturalidad la advertencia de finalidad negativa. «No sea que» sería igualmente posible, pero algo más marcado.
- source_word: יָמוּת בַּמִּלְחָמָה
  english_pob_choice: he die in the battle
  chosen_spanish: muera en la batalla
  alternatives_spanish:
  - muera en la guerra
  - perezca en la batalla
  - muera en el combate
  lexicon: HALOT
  rationale: «La batalla» conserva el artículo y la referencia al conflicto concreto del contexto inmediato. «Combate» o «guerra» son posibles, pero menos exactos respecto del artículo definido hebreo.
- source_word: וְאִישׁ אַחֵר
  english_pob_choice: and another man
  chosen_spanish: y otro hombre
  alternatives_spanish:
  - y otro hombre más
  - y un hombre diferente
  lexicon: HALOT
  rationale: «Otro hombre» reproduce bien el contraste con el primer hombre y el sentido simple del hebreo.
- source_word: יִקָּחֶנָּה
  english_pob_choice: take her
  chosen_spanish: la tome
  alternatives_spanish:
  - la despose
  - se case con ella
  lexicon: HALOT
  rationale: Se conserva el mismo verbo «tomar» para mantener consistencia lexical con לְקָחָהּ y reflejar el idioma matrimonial hebreo. En español, el sentido marital queda claro por el contexto.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado final se mantiene sin modificaciones respecto del pasaje base. La concordancia con el contexto auditado es alta y no se detectaron discrepancias relevantes en la lectura fuente/inglés.
  spanish_consistency_notes:
  - Se preservó la distinción entre compromiso previo y matrimonio consumado mediante «se ha comprometido» / «la ha tomado».
  - Se mantuvo el paralelismo verbal «tomar» para ambos miembros del versículo, como en el hebreo y el inglés POB.
  - Se optó por una construcción imperativa de tercera persona con «Que vaya y vuelva», natural en español bíblico moderno.
  - No se usó «SEÑOR» ni terminología teológica ajena al versículo, porque el texto no contiene el Tetragrámaton ni referencias cristológicas.
