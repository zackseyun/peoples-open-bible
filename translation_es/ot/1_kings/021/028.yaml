translation:
  language: es
  text: Y vino la palabra de Yahvé a Elías el tisbita[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - sucedió
  lexicon: HALOT
  rationale: En la fórmula profética ויהי דבר־יהוה אל..., el español natural y bíblicamente reconocible es «vino la palabra de Yahvé a...». «Vino» conserva la idea de movimiento de la palabra hacia su destinatario sin calcar de modo rígido «y fue».
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: דָּבָר puede ser «palabra» o «mensaje», pero en esta fórmula profética la equivalencia más fiel y resonante es «la palabra de Yahvé». Conserva el giro técnico del relato y su vínculo intertextual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se preserva el nombre divino propio como «Yahvé», conforme a la decisión doctrinal del POB, en lugar de sustituirlo por un título. En español, «Yahvé» es la forma establecida para esta transliteración.
- source_word: אֵלִיָּהוּ
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Eliyahu
  lexicon: HALOT
  rationale: Los nombres propios bíblicos se usan en su forma española ampliamente reconocible. «Elías» es la forma natural y transparente para el lector en español.
- source_word: הַתִּשְׁבִּי
  english_pob_choice: the Tishbite
  chosen_spanish: el tisbita
  alternatives_spanish:
  - el de Tisbe
  - el hombre de Tisbe
  lexicon: HALOT
  rationale: El gentilicio se conserva como «tisbita», que corresponde al inglés «Tishbite» y mantiene la identificación apposicional del personaje. «El de Tisbe» explicita el origen, pero pierde la forma breve tradicional del apelativo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: El infinitivo לֵאמֹר introduce el discurso siguiente; «diciendo» reproduce de forma natural la función sintáctica de enlace sin adelantar contenido del versículo siguiente.
theological_decisions:
- issue: Representación del nombre divino יְהוָה en la fórmula profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo presenta explícitamente el Tetragrammaton. La decisión doctrinal del POB es no enmascararlo con un título. En español, «Yahvé» preserva el nombre personal del pacto y mantiene la misma lectura teológica que el inglés POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no hubo cambios en la evaluación textual ni en la decisión de lectura. La versión española sigue la misma lectura alta de acuerdo del original hebreo y del audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene el tono formular profético con «vino la palabra de Yahvé a...».
  - «Elías» y «tisbita» siguen las convenciones bíblicas españolas habituales, sin perder la identificación original.
  - La puntuación conserva la apertura de cita con «diciendo,» para enlazar con el discurso inmediato del versículo siguiente.
