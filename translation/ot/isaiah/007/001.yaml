theological_decisions:
- issue: Rendering אֲרָם
  chosen_reading: Aram
  alternative_readings:
  - Syria
  rationale: This is not a doctrinal issue but an interpretive translation choice with historical implications. 'Aram' follows original-language primacy over translation tradition and avoids importing the later geopolitical label 'Syria' into the Hebrew text.
  doctrine_reference: Translation philosophy §1
- issue: Singular verb יָכֹל after compound subject
  chosen_reading: but he was not able
  alternative_readings:
  - but they were not able
  rationale: The Hebrew verb is singular, likely referring primarily to the nearer or principal subject, or functioning as a collective simplification. The translation preserves the grammatical tension rather than resolving it by harmonizing to English expectation.
  doctrine_reference: Translation philosophy §3
