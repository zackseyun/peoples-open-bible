translation:
  language: es
  text: 'Oigan esta palabra que Yahvé ha hablado contra ustedes, hijos de Israel[a], contra toda la familia que yo hice subir de la tierra de Egipto, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: ''pueblo de Israel''. El hebreo dice ''hijos de Israel'', preservando el lenguaje familiar del pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  - Oigan atentamente
  lexicon: HALOT
  rationale: El imperativo plural convoca a la audiencia con fuerza profética. 'Oigan' conserva el llamado solemne y suena natural en español, sin debilitar la carga de advertencia.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this word
  chosen_spanish: esta palabra
  alternatives_spanish:
  - este mensaje
  - este asunto
  lexicon: HALOT
  rationale: דָּבָר puede ser 'palabra', 'mensaje' o 'asunto'. En este contexto profético, 'palabra' mantiene el valor de una declaración divina concreta y transparente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: ''Yahvé''. Preserva el nombre propio del Dios del pacto en vez de sustituirlo por un título.'
- source_word: עֲלֵיכֶם
  english_pob_choice: against you
  chosen_spanish: contra ustedes
  alternatives_spanish:
  - acerca de ustedes
  - sobre ustedes
  lexicon: HALOT
  rationale: En este contexto de denuncia profética, la preposición comunica dirección adversa. 'Contra ustedes' reproduce mejor la fuerza confrontativa que una lectura neutral como 'acerca de'.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: sons of Israel
  chosen_spanish: hijos de Israel
  alternatives_spanish:
  - hijos varones de Israel
  - pueblo de Israel
  lexicon: HALOT
  rationale: El hebreo es literalmente masculino plural y expresa un vínculo familiar/covenantal. 'Hijos de Israel' conserva ese idioma en español de manera más natural que 'hijos varones' y sin neutralizarlo a 'pueblo'.
- source_word: עַל כָּל הַמִּשְׁפָּחָה
  english_pob_choice: against the whole family
  chosen_spanish: contra toda la familia
  alternatives_spanish:
  - contra todo el clan
  - contra todo el linaje
  lexicon: HALOT
  rationale: מִשְׁפָּחָה designa aquí un grupo corporativo de parentesco. 'Familia' comunica bien la idea y conserva el tono judicial al repetir 'contra'.
- source_word: הֶעֱלֵיתִי
  english_pob_choice: I brought up
  chosen_spanish: hice subir
  alternatives_spanish:
  - saqué
  - hice salir
  lexicon: HALOT
  rationale: El hebreo usa el Hiphil de עלה, con el sentido de 'hacer subir'. 'Hice subir' reproduce el idiomático exodus language y mantiene la dirección vertical del original.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - fuera de la tierra de Egipto
  lexicon: HALOT
  rationale: '''Tierra de Egipto'' es una formulación natural y fiel al sintagma hebreo. ''De'' se ajusta bien al verbo ''hice subir'' sin sobrecargar la frase.'
- source_word: לֵאמֹר
  english_pob_choice: 'saying:'
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'así:'
  - 'y dijo:'
  lexicon: HALOT
  rationale: Es la fórmula estándar de introducción de discurso. 'Diciendo:' señala con claridad que sigue la continuación inmediata en el versículo siguiente.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo nombra directamente al Dios del pacto. Se mantiene el nombre propio en español para no ocultar el Tetragrámaton detrás de un título y para seguir la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Idioma de pacto en בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - pueblo de Israel
  - hijos de Israel
  rationale: El hebreo preserva una designación familiar y corporativa marcada. Se retiene la forma masculina para no borrar esa textura del pacto, aunque en español puede leerse de modo colectivo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que el pasaje mantiene alto acuerdo con la evaluación cruzada. Por ello, esta propuesta sigue de cerca el audit trail inglés sin introducir decisiones nuevas no sustentadas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según la terminología del proyecto, evitando la sustitución por 'SEÑOR'.
  - Se conserva la repetición de 'contra' para reflejar la fuerza judicial del hebreo עַל en este contexto.
  - '''Hijos de Israel'' reproduce el masculino plural del original y se acompaña de nota para ofrecer la alternativa idiomática sin neutralizar el texto.'
  - '''Hice subir'' preserva el valor direccional del Hiphil de עלה, importante para el eco del éxodo.'
