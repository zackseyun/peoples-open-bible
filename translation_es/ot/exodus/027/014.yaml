  to: Quince codos de colgaduras para el costado[a], con sus tres pilares y sus tres bases[b].
  rationale: 'Se ajusta la terminología arquitectónica para reflejar mejor el hebreo y el rastro del POB inglés: ‘colgaduras’ por קְלָעִים y ‘pilares’ por עַמֻּדֵיהֶם. Se mantiene ‘costado’ con nota por el sentido literal ‘hombro’. Se conserva ‘bases’ como texto principal, pero se añade una nota para la alternativa documentada de tipo ‘zócalos/sockets’.'
