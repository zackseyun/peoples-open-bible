translation:
  text: Before enemies he left behind an avenger[a], and for friends one who repays kindness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a vindicator' or 'a defender'; the Greek term can denote one who exacts justice or vengeance on another's behalf.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐναντίον
  chosen: In the face of
  alternatives:
  - before
  - against
  - in the presence of
  lexicon: LSJ
  rationale: The preposition here introduces the sphere in which the son functions relative to enemies. 'In the face of' preserves the adversarial/public sense more naturally than the stiffer 'before,' while avoiding overreading the preposition as direct hostility ('against').
- source_word: ἐχθρῶν
  chosen: enemies
  alternatives:
  - foes
  lexicon: LSJ
  rationale: Standard rendering for the genitive plural; 'enemies' is clear modern English and fits the familial-honor context.
- source_word: κατέλιπεν
  chosen: left behind
  alternatives:
  - left
  - bequeathed
  lexicon: LSJ
  rationale: The verb indicates what a man leaves after himself, especially a surviving son in context. 'Left behind' makes the implied succession explicit without adding content beyond the Greek.
- source_word: ἔκδικον
  chosen: an avenger
  alternatives:
  - one who takes vengeance
  - a defender
  - a vindicator
  lexicon: LSJ
  rationale: ἔκδικος/ἔκδικον denotes one who exacts justice or vengeance. In this context of a son continuing the father's cause against enemies, 'an avenger' is the most direct and idiomatic rendering. 'Defender' softens the retaliatory force too much; 'vindicator' is possible but less natural here.
- source_word: τοῖς φίλοις
  chosen: to friends
  alternatives:
  - for friends
  - toward friends
  lexicon: LSJ
  rationale: The dative marks the relational counterpart to 'before enemies.' 'To friends' is concise and idiomatic in English.
- source_word: ἀνταποδιδόντα
  chosen: one who repays
  alternatives:
  - one who returns
  - one who recompenses
  lexicon: LSJ
  rationale: The participle describes reciprocal return. 'Repays' captures the responsive sense and works naturally with χάριν. 'Recompenses' is too formal; 'returns' is too vague.
- source_word: χάριν
  chosen: kindness
  alternatives:
  - favor
  - grace
  - gratitude
  lexicon: LSJ
  rationale: In this social context χάρις commonly refers to favor or kindness shown and returned. 'Kindness' communicates the interpersonal benefit clearly. 'Grace' would sound overly theological here, and 'gratitude' shifts the sense from the benefit received to the feeling produced.
