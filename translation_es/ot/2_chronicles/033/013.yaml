translation:
  language: es
  text: Le oró[a], y él fue movido por su súplica, oyó su ruego, y lo hizo volver a Jerusalén, a su reino[c][b]. Entonces Manasés supo que Yahvé es Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «se dejó implorar por él» / «respondió favorablemente a él».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «a su reino»; es decir, a su dominio real o realeza.'
    reason: lexical_alternative
  - marker: c
    text: O, «fue movido por su súplica, oyó su ruego y lo hizo volver».
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּתְפַּלֵּל אֵלָיו
  english_pob_choice: He prayed to him
  chosen_spanish: Oró a él
  alternatives_spanish:
  - Le oró
  - Le dirigió su oración
  lexicon: HALOT
  rationale: התפלל en hitpael se usa aquí en el sentido normal de 'orar'. Mantengo la referencia personal con 'a él' para reflejar el objeto indirecto hebreo y la dirección explícita de la oración.
- source_word: וַיֵּעָתֶר לוֹ
  english_pob_choice: he was moved by his entreaty
  chosen_spanish: fue movido por su súplica
  alternatives_spanish:
  - le fue propicio
  - se dejó suplicar por él
  lexicon: HALOT
  rationale: עתר en nifal puede expresar ser atendido favorablemente o dejarse interceder. 'Fue movido por su súplica' conserva el matiz de respuesta favorable sin resolver demasiado la ambigüedad, y encaja con un registro bíblico natural en español.
- source_word: וַיִּשְׁמַע תְּחִנָּתוֹ
  english_pob_choice: heard his supplication
  chosen_spanish: oyó su ruego
  alternatives_spanish:
  - escuchó su súplica
  - oyó su súplica
  lexicon: HALOT
  rationale: תְּחִנָּה es una súplica insistente o imploración. 'Ruego' comunica ese matiz devocional y solemne en español, sin sonar excesivamente técnico como 'súplica' en una línea poética/narrativa compacta.
- source_word: וַיְשִׁיבֵהוּ יְרוּשָׁלַם לְמַלְכוּתוֹ
  english_pob_choice: he brought him back to Jerusalem to his kingdom
  chosen_spanish: lo hizo volver a Jerusalén, a su reino
  alternatives_spanish:
  - lo restituyó a Jerusalén, a su reino
  - lo devolvió a Jerusalén y a su reino
  lexicon: HALOT
  rationale: שׁוּב en hiphil significa causar el regreso. 'Lo hizo volver' mantiene la causatividad sin forzar un verbo más interpretativo. 'A su reino' conserva la literalidad de לְמַלְכוּתוֹ y deja abierta la nota explicativa sobre su reinado.
- source_word: וַיֵּדַע מְנַשֶּׁה
  english_pob_choice: Then Manasseh knew
  chosen_spanish: Entonces Manasés supo
  alternatives_spanish:
  - Y Manasés supo
  - Entonces Manasés llegó a saber
  lexicon: HALOT
  rationale: ידע expresa conocimiento o reconocimiento. 'Supo' es la opción más directa y sobria en español, adecuada para el giro narrativo de consecuencia introducido por la cadena verbal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: DOCTRINE.md contested terms
  rationale: El proyecto pide renderizar el nombre divino como 'Yahvé' en el texto principal, evitando el ocultamiento con 'SEÑOR'. Mantengo la forma establecida del proyecto para el Tetragrámaton.
- source_word: ה֥וּא הָאֱלֹהִים
  english_pob_choice: is God
  chosen_spanish: es Dios
  alternatives_spanish:
  - él es Dios
  - es el Dios
  lexicon: HALOT
  rationale: La frase hebrea afirma la identidad divina de Yahvé. En español, 'es Dios' transmite la confesión con naturalidad; el pronombre enfático hebreo se sobreentiende sin necesidad de forzar 'él' en la cláusula final.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. En coherencia con la norma del proyecto para español, se conserva el nombre divino como 'Yahvé' en vez de sustituirlo por un título litúrgico o enmascararlo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza de la confesión כִּי יְהוָה הוּא הָאֱלֹהִים
  english_pob_reading: that Yahweh is God
  chosen_spanish_reading: que Yahvé es Dios
  alternative_spanish_readings:
  - que Yahvé, él es Dios
  - que Yahvé es el único Dios
  rationale: La confesión expresa el reconocimiento de la verdadera deidad de Yahvé. No añado 'único' porque el hebreo no lo dice explícitamente; preservar esa tensión evita sobreinterpretar la fórmula.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una pequeña revisión estilística: se prefirió una expresión más cercana a ''entreaty'' y se mantuvo la serie verbal paralela (''was moved..., heard..., and brought...''). El español refleja esa secuencia con tres acciones coordinadas sin romper el paralelismo. También se conserva la decisión doctrinal del proyecto de traducir יְהוָה como ''Yahvé''.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma del nombre divino, consistente con el estándar español del proyecto.
  - '''Súplica/ruego'' se usa para preservar el tono solemne del hebreo תְּחִנָּה sin caer en tecnicismo excesivo.'
  - '''Lo hizo volver'' refleja la causatividad de וַיְשִׁיבֵהוּ sin perder naturalidad en español.'
  - La cláusula final conserva la identificación directa 'Yahvé es Dios' sin añadir exclusividad no explícita.
