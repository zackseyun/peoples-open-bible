  glossary_alignment: No hay términos del glosario de proyecto en juego que entren en conflicto. Los nombres propios «Saúl» y «David» están bien. La nota léxica mantiene adecuadamente la distinción entre el literal «con nosotros» y la traducción contextual «entre nosotros».
