translation:
  language: es
  text: Y toda carne[a] verá que yo, Yahvé, lo he encendido; no se apagará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todas las personas' para el modismo 'toda carne'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאוּ
  english_pob_choice: will see
  chosen_spanish: verá
  alternatives_spanish:
  - verán
  - llegará a ver
  lexicon: HALOT
  rationale: El perfecto narrativo/profético se expresa naturalmente en futuro en español. Aunque el hebreo es plural, el sujeto colectivo 'toda carne' puede concordar en singular en español más fluido, sin perder el sentido colectivo.
- source_word: כָּל בָּשָׂר
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda la humanidad
  - todas las personas
  lexicon: HALOT
  rationale: Conservo la imagen idiomática 'carne' para mantener la fuerza profética y la conexión bíblica del giro hebreo. 'Toda la humanidad' aclara, pero atenúa la literalidad del idiomа.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: '''Que'' introduce de manera natural en español el contenido de lo que verá ''toda carne'', igual que el inglés ''that'' en el análisis auditado.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms'
  rationale: 'Sigo el estándar del proyecto para el Nombre divino en español: ''Yahvé''. Mantiene la referencia explícita al Tetragrámaton sin sustituirla por una designación genérica.'
- source_word: בִּעַרְתִּי/הָ
  english_pob_choice: have kindled it
  chosen_spanish: lo he encendido
  alternatives_spanish:
  - lo he prendido
  - lo he avivado
  - lo he incendiado
  lexicon: HALOT
  rationale: '''Encendido'' transmite el acto de prender fuego en un español claro y sobrio. ''Incendiado'' sería más fuerte, pero puede sugerir destrucción mayor de la que el verbo por sí mismo exige.'
- source_word: לֹא תִּכְבֶּה
  english_pob_choice: it will not be quenched
  chosen_spanish: no se apagará
  alternatives_spanish:
  - no se extinguirá
  - no será apagado
  lexicon: HALOT
  rationale: Para el fuego, 'apagarse' es la equivalencia española más natural y comunica bien la pasiva/intransitiva del hebreo. 'Quedar extinguido' sería más pesado; 'no será apagado' suena menos idiomático.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Nombre pactual. En español, 'Yahvé' es la forma adoptada por el proyecto para preservarlo de modo reconocible y reverente, sin enmascararlo como título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Idiomatic force of כָּל בָּשָׂר
  english_pob_reading: all flesh
  chosen_spanish_reading: toda carne
  alternative_spanish_readings:
  - toda la humanidad
  - todas las personas
  rationale: La expresión conserva el alcance universal del hebreo y su color profético. No se suaviza a 'personas' porque esa opción pierde el eco bíblico del idiomа.
  doctrine_reference: HALOT / prophetic idiom usage
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: el marcador [a] ahora aparece en el texto español exactamente en ''verá[a]''. No se añaden notas sin anclaje.'
  spanish_consistency_notes:
  - Se preserva el Nombre divino como 'Yahvé' conforme al estándar del proyecto.
  - Se mantiene el giro profético 'toda carne' en vez de una paráfrasis explicativa.
  - 'El verbo final se traduce con una forma natural en español para fuego: ''no se apagará''.'
