base_translation:
  language: en
  yaml_path: translation/ot/exodus/001/012.yaml
  text: But the more they afflicted them[a], the more they multiplied and the more they spread out[c][b], so that they dreaded the sons of Israel.
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'him,' referring collectively to Israel; English renders the collective sense as 'them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they were in dread of' or 'they loathed.' The Hebrew verb can express strong dread or abhorrence.
    reason: lexical_alternative
