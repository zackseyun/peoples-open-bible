  yaml_path: translation/ot/2_kings/002/016.yaml
  text: Then they said to him[a], “Look now, there are fifty mighty men among your servants. Please let them go and seek your master, lest the Spirit of Yahweh has carried him away and cast him on one of the mountains or in one of the valleys.” But he said, “Do not send them.”
