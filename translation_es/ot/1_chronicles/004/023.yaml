translation:
  language: es
  text: Estos eran los alfareros y los habitantes de Netaim y Gederah[a]; vivían allí con el rey para su trabajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «Estos eran los alfareros, y los que vivían entre plantíos y cercas». Los términos hebreos Netaim y Gederah pueden leerse como nombres de lugar o como sustantivos comunes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵמָּה
  english_pob_choice: These were
  chosen_spanish: Estos eran
  alternatives_spanish:
  - Ellos eran
  - Estos fueron
  lexicon: HALOT
  rationale: El demostrativo retoma al grupo anterior en una frase de identificación sin verbo expreso; en español, «Estos eran» suena natural y conserva la relación anafórica.
- source_word: הַיּוֹצְרִים
  english_pob_choice: the potters
  chosen_spanish: los alfareros
  alternatives_spanish:
  - los artesanos
  - los formadores
  lexicon: HALOT
  rationale: En este contexto, el oficio de trabajar el barro es el sentido más probable; «alfareros» mantiene la especificidad semántica de la POB en inglés.
- source_word: וְיֹשְׁבֵי
  english_pob_choice: and the inhabitants of
  chosen_spanish: y los habitantes de
  alternatives_spanish:
  - y los que vivían en
  - y los moradores de
  lexicon: HALOT
  rationale: El participio constructo expresa residentes asentados; «habitantes de» reproduce bien el valor nominal y es idiomático en español.
- source_word: נְטָעִים
  english_pob_choice: Netaim
  chosen_spanish: Netaim
  alternatives_spanish:
  - plantíos
  - plantaciones
  lexicon: HALOT
  rationale: La lectura principal de la POB lo toma como topónimo; se conserva la forma propia en español. La posibilidad de sentido común queda registrada en la nota.
- source_word: וּגְדֵרָה
  english_pob_choice: and Gederah
  chosen_spanish: y Gederah
  alternatives_spanish:
  - y cerca
  - y corral
  lexicon: HALOT
  rationale: También se mantiene como nombre de lugar, siguiendo la lectura preferida por la POB inglesa. El valor común «cerco/enclosure» queda como alternativa textual.
- source_word: עִם הַמֶּלֶךְ
  english_pob_choice: with the king
  chosen_spanish: con el rey
  alternatives_spanish:
  - al servicio del rey
  - cerca del rey
  lexicon: HALOT
  rationale: «Con el rey» conserva la preposición básica עִם sin sobreexplicar la relación; el matiz de servicio queda sugerido por el contexto y por la frase siguiente.
- source_word: בִּמְלַאכְתּוֹ
  english_pob_choice: for his work
  chosen_spanish: para su trabajo
  alternatives_spanish:
  - en su trabajo
  - para su servicio
  - en su servicio
  lexicon: HALOT
  rationale: מְלָאכָה puede significar trabajo, oficio o labor. «Para su trabajo» sigue la solución inglesa y evita imponer de antemano «servicio», aunque ese matiz permanezca posible.
- source_word: יָשְׁבוּ שָׁם
  english_pob_choice: they lived there
  chosen_spanish: allí vivían
  alternatives_spanish:
  - allí habitaron
  - allí se asentaron
  lexicon: HALOT
  rationale: El verbo ישב expresa residencia estable; el imperfecto español «vivían» o «habitaban» comunica bien el estado de morar en ese lugar.
theological_decisions:
- issue: Relación con el rey y la función laboral
  english_pob_reading: with the king for his work
  chosen_spanish_reading: con el rey para su trabajo
  alternative_spanish_readings:
  - al servicio del rey
  - en su servicio
  rationale: No se fuerza una lectura administrativa o cortesana más precisa de lo que el hebreo exige. La formulación deja abierta la relación de asociación laboral sin borrar la ambigüedad documental.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La POB inglesa se mantuvo sin cambios en su última revisión; el español sigue la misma decisión principal de leer Netaim y Gederah como topónimos, preservando en nota la alternativa léxica documentada. No se registran revisiones aplicadas al texto base.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se mantiene «alfareros» para el oficio, siguiendo la precisión léxica de la POB.
  - «Trabajo» conserva la neutralidad de מְלָאכָה sin introducir una interpretación excesivamente técnica.
  - La puntuación con punto y coma refleja la división sintáctica del hebreo y el efecto de lista del pasaje.
