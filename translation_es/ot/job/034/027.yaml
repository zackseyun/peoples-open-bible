translation:
  language: es
  text: porque se desviaron de seguirlo[a], y no entendieron sus caminos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «de detrás de él»; es un modismo hebreo que significa «de seguirlo».
    reason: lexical_alternative
  - marker: b
    text: 'O: «y no consideraron todos sus caminos».'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲשֶׁר עַל כֵּן
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - así que
  - por eso
  - pues
  lexicon: HALOT
  rationale: La construcción funciona causalmente. «Porque» expresa de manera natural la razón dada por el contexto y conserva el valor explicativo sin añadir matices innecesarios.
- source_word: סָרוּ
  english_pob_choice: they turned aside
  chosen_spanish: se desviaron
  alternatives_spanish:
  - se apartaron
  - se volvieron atrás
  - se torcieron
  lexicon: HALOT
  rationale: El verbo hebreo comunica apartarse de la ruta o conducta debida. «Se desviaron» mantiene la idea de apartamiento moral y relacional en un español claro y sobrio.
- source_word: מֵאַחֲרָיו
  english_pob_choice: from following him
  chosen_spanish: de seguirlo
  alternatives_spanish:
  - de ir tras él
  - de seguir tras él
  - de seguir después de él
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo literal «de detrás de él». En español, «de seguirlo» comunica el sentido idiomático con naturalidad y preserva la relación personal implícita.
- source_word: וְכָל דְּרָכָיו
  english_pob_choice: any of his ways
  chosen_spanish: ninguno de sus caminos
  alternatives_spanish:
  - todas sus sendas
  - todas sus maneras
  - alguno de sus caminos
  lexicon: HALOT
  rationale: 'Con la negación, el sentido no es solo cognitivo sino total: no atendieron ninguna de sus vías de acción. «Ninguno de sus caminos» refleja la integralidad del hebreo y evita una lectura suavizada.'
- source_word: לֹא הִשְׂכִּילוּ
  english_pob_choice: they did not understand
  chosen_spanish: no entendieron
  alternatives_spanish:
  - no consideraron
  - no tuvieron discernimiento
  - no comprendieron
  lexicon: HALOT
  rationale: El hifil de שׂכל puede abarcar comprender, discernir o actuar sabiamente. Dado el paralelismo con «sus caminos», «no entendieron» sigue de cerca la revisión inglesa y mantiene la formalidad.
theological_decisions:
- issue: Referente implícito de los sufijos de tercera persona en «lo» y «sus»
  english_pob_reading: God is the referent
  chosen_spanish_reading: Dios es el referente implícito
  alternative_spanish_readings:
  - un gobernante humano
  - un juez terrenal
  rationale: La línea se mantiene con pronombres no capitalizados, pero el contexto inmediato de la sección habla de la acción y la retribución de Dios. La traducción conserva esa referencia contextual sin explicitarla en el texto principal.
  doctrine_reference: Preservar la tensión contextual sin resolverla artificialmente
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que sustituyó «gave no thought to» por «did not understand» para reflejar más directamente הִשְׂכִּילוּ. En español se optó por «no entendieron» para alinearse con esa decisión sin perder naturalidad ni la fuerza del paralelismo.
  spanish_consistency_notes:
  - Se mantuvo «caminos» para דְּרָכָיו, coherente con el uso bíblico de «ways» como conducta o manera de obrar.
  - Se evitó «Señor» como máscara devocional, porque el texto fuente y el audit trail tratan el referente como Dios por contexto, no por sustitución litúrgica.
  - Se prefirió un español contemporáneo y digno, sin calco excesivo de la estructura hebrea.
