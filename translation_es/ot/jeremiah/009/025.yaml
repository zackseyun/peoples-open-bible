translation:
  language: es
  text: contra Egipto[a], contra Judá, contra Edom, contra los hijos de Amón, contra Moab, y contra todos los que tienen recortadas las puntas del cabello, los que habitan en el desierto; porque todas las naciones son incircuncisas, y toda la casa de Israel es incircuncisa de corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos los que se cortan las puntas del cabello»; el hebreo probablemente alude a un peinado distintivo de pueblos del desierto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - acerca de
  lexicon: HALOT
  rationale: En este contexto de juicio, עַל introduce a los pueblos objeto de la sentencia; «contra» comunica mejor la fuerza hostil y judicial que «sobre» o «acerca de».
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - Misraim
  lexicon: HALOT
  rationale: Nombre geográfico establecido en español para la nación.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judea
  lexicon: HALOT
  rationale: Corresponde al nombre propio nacional/tribal del hebreo.
- source_word: אֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: Edom
  alternatives_spanish:
  - Idumea
  lexicon: HALOT
  rationale: Se conserva el nombre bíblico de la nación tal como aparece en la fuente.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  - los hijos de Amón
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente filial y masculina; se mantiene esa forma transparente en español, como hizo la POB en inglés, en vez de sustituirla por el etnónimo más idiomático.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  alternatives_spanish:
  - Moabitas
  lexicon: HALOT
  rationale: Nombre propio estándar de la nación.
- source_word: כָּל קְצוּצֵי פֵאָה
  english_pob_choice: all those with the corners of their hair cut off
  chosen_spanish: todos los de las esquinas cortadas de su cabello
  alternatives_spanish:
  - todos los que se cortan las orillas del cabello
  - todos los de las puntas rapadas del cabello
  lexicon: HALOT
  rationale: Se preserva la imagen concreta del hebreo sin decidir demasiado pronto la reconstrucción etnográfica. Aunque la expresión resulte menos idiomática que una paráfrasis, mantiene la tensión lexical que la POB quiso dejar visible en inglés.
- source_word: הַיֹּשְׁבִים בַּמִּדְבָּר
  english_pob_choice: who dwell in the wilderness
  chosen_spanish: los que habitan en el desierto
  alternatives_spanish:
  - los que viven en el desierto
  - los que moran en el desierto
  lexicon: HALOT
  rationale: «Habitan» reproduce el valor de residencia estable y «desierto» es un equivalente natural en español, aunque «desierto» puede estrechar algo el rango de מִדְבָּר respecto de «wilderness».
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la lista precedente; «porque» comunica bien el enlace causal en español bíblico moderno.
- source_word: כָל הַגּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los gentiles
  lexicon: HALOT
  rationale: En este pasaje se trata de pueblos/naciones circundantes, no del contraste técnico judíos/gentiles; «naciones» es la opción más natural y fiel.
- source_word: עֲרֵלִים
  english_pob_choice: uncircumcised
  chosen_spanish: incircuncisas
  alternatives_spanish:
  - sin circuncidar
  - no circuncisas
  lexicon: HALOT
  rationale: Se conserva el valor literal y el peso covenantal del término. En español, el adjetivo en plural concuerda con «naciones».
- source_word: כָל בֵּית יִשְׂרָאֵל
  english_pob_choice: all the house of Israel
  chosen_spanish: toda la casa de Israel
  alternatives_spanish:
  - todo el linaje de Israel
  - todo el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene el idiomático colectivo hebreo con la misma fuerza tradicional, sin reemplazarlo por una explicación más libre.
- source_word: עַרְלֵי לֵב
  english_pob_choice: uncircumcised in heart
  chosen_spanish: incircuncisa de corazón
  alternatives_spanish:
  - sin circuncisión de corazón
  - incircuncisa en el corazón
  - de corazón incircunciso
  lexicon: HALOT
  rationale: Se preserva la metáfora del hebreo sobre la condición interna. «De corazón» es una forma natural en español que retiene el paralelo con la circuncisión física y evita diluir la imagen en una mera descripción psicológica.
theological_decisions:
- issue: Metáfora de la circuncisión aplicada al corazón
  english_pob_reading: uncircumcised in heart
  chosen_spanish_reading: incircuncisa de corazón
  alternative_spanish_readings:
  - espiritualmente incircuncisa
  - de corazón endurecida
  rationale: La frase hebrea denuncia una condición interior de rebelión y no solo una actitud emocional. Se conserva la metáfora para no resolver prematuramente su fuerza teológica en una paráfrasis interpretativa.
  doctrine_reference: Translation philosophy §3, §6
- issue: Traducción de בְּנֵי עַמּוֹן
  english_pob_reading: the sons of Ammon
  chosen_spanish_reading: los hijos de Amón
  alternative_spanish_readings:
  - los amonitas
  rationale: La forma filial masculina refleja de manera más directa la estructura del hebreo y evita borrar un rasgo transparente del texto fuente.
  doctrine_reference: Translation philosophy §4
- issue: Alcance de מִדְבָּר
  english_pob_reading: wilderness
  chosen_spanish_reading: desierto
  alternative_spanish_readings:
  - yermo
  - región desértica
  rationale: «Desierto» es la equivalencia natural más clara en español, aunque se reconoce que «wilderness» puede abarcar una noción geográfica algo más amplia que un desierto arenoso. La opción se mantiene dentro del rango semántico general sin sobreinterpretar.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El texto base en inglés y la revisión auditada mantienen alta concordancia; no se detectaron cambios sustantivos en el pasaje. La draft española sigue la misma solución principal, preservando la metáfora de «incircuncisos» y la imagen concreta de la expresión hebrea sobre el cabello.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma POB cuando aparezca el nombre divino; en este versículo no se presenta.
  - «Incircuncisa de corazón» mantiene el paralelismo con «incircuncisas» y preserva la metáfora covenantal.
  - «Hijos de Amón» sigue la construcción fuente, aunque «amonitas» sería la forma más idiomática; se privilegia la transparencia.
  - La nota[a] acompaña solo la expresión ambigua del peinado, siguiendo el patrón del inglés POB.
