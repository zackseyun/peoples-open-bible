translation:
  language: es
  text: ¡Cómo quedaron en desolación[a] en un momento! Llegaron a su fin[b]; fueron consumidos[c] por terrores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Desolación» también puede tener el sentido de llegar a ser objeto de horror o espanto a causa de la ruina.
    reason: lexical_alternative
  - marker: b
    text: «Llegaron a su fin» también puede entenderse como «perecieron».
    reason: lexical_alternative
  - marker: c
    text: «Consumidos» conserva el paralelo del hebreo; el matiz puede ser también «perecieron» o «fueron barridos».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  english_pob_choice: How
  chosen_spanish: ¡Cómo!
  alternatives_spanish:
  - ¡Cuán!
  - ¡Cómo de repente!
  lexicon: HALOT
  rationale: El hebreo introduce una exclamación retórica de asombro ante el giro inesperado; «¡Cómo!» reproduce bien esa admiración/consternación en español sin convertirla en una pregunta informativa.
- source_word: הָיוּ לְשַׁמָּה
  english_pob_choice: they became a desolation
  chosen_spanish: quedaron convertidos en desolación
  alternatives_spanish:
  - se volvieron desolación
  - se convirtieron en desolación
  lexicon: HALOT
  rationale: 'El verbo con לְשַׁמָּה tiene sentido resultativo: pasaron a un estado de ruina. «Quedaron convertidos» conserva el cambio de estado y mantiene el valor de desolación/ruina sin aplanarlo a un simple estado estático.'
- source_word: כְרָגַע
  english_pob_choice: in a moment
  chosen_spanish: en un momento
  alternatives_spanish:
  - en un instante
  - de repente
  lexicon: HALOT
  rationale: La comparación con רָגַע señala brevedad súbita. «En un momento» es natural y fiel al efecto de rapidez abrupta.
- source_word: סָפוּ
  english_pob_choice: They came to an end
  chosen_spanish: Llegaron a su fin
  alternatives_spanish:
  - perecieron
  - fueron barridos
  lexicon: HALOT
  rationale: El verbo expresa terminación/consunción. «Llegaron a su fin» preserva la idea de culminación total sin forzar una imagen más específica que el hebreo no exige.
- source_word: תַמּוּ
  english_pob_choice: they were consumed
  chosen_spanish: fueron consumidos
  alternatives_spanish:
  - fueron acabados
  - fueron destruidos
  lexicon: HALOT
  rationale: Se mantiene la intensidad paralela del segundo verbo con un participio pasivo que refleja la consumación total. Esto también conserva la revisión inglesa que prefirió «consumed» frente a opciones más idiomáticas pero menos precisas.
- source_word: מִן בַּלָּהוֹת
  english_pob_choice: by terrors
  chosen_spanish: por terrores
  alternatives_spanish:
  - a causa de terrores
  - por horrores
  lexicon: HALOT
  rationale: מִן puede funcionar causalmente. «Por terrores» conserva la fuerza causal sin introducir una glosa más interpretativa; «terrores» mantiene el campo semántico de pavor/horror.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión aplicada en el audit trail, que prefirió «consumed» para תַמּוּ en lugar de una formulación más libre. La versión española sigue esa decisión y evita un término más interpretativo como «acabados» o «destruidos» cuando el paralelo hebreo y la revisión inglesa favorecen la idea de consumición/agotamiento total.
  spanish_consistency_notes:
  - Se usa un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - «Desolación» se conserva por su valor concreto de ruina devastada, en línea con el inglés auditado.
  - Los dos verbos finales se distinguen para reflejar el paralelismo intensivo del hebreo.
  - Los marcadores [a] y [b] están anclados exactamente en el texto español para cumplir con la trazabilidad de variantes.
