  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: advertencia inferencial («Por tanto»), construcción preventiva («no sea que también ustedes»), repetición enfática de ἀφομοιωθέντες ... ἀφομοιωθῆτε, y cierre causal («por causa de ellos»). Sin embargo, la nota al pie no preserva fielmente la alternativa inglesa documentada, porque invierte el sentido hacia una orden positiva («háganse») en vez de una alternativa pasiva/assimilativa negativa del verbo repetido.'
  spanish_quality_summary: El español es claro y digno, pero «habiéndose hecho como los extranjeros» suena algo forzado y menos natural que una formulación con «llegar a ser como». Además, la nota actual crea confusión semántica. El resto del registro y la sintaxis son adecuados y legibles.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Extranjeros» refleja bien ἀλλόφυλοι; «temor» es apropiado para φόβος; no hay términos teológicos sensibles del glosario principal en disputa.
  issues:
  - severity: medium
    issue: La nota al pie altera el sentido de la alternativa léxica.
    rationale: El inglés documenta una alternativa del tipo «ser asimilados ... ser asimilados», pero la nota española dice «háganse como ... háganse como ellos», que suena imperativa y positiva, no como alternativa de traducción del mismo verbo repetido en contexto de advertencia.
  - severity: low
    issue: «Habiéndose hecho como» es gramatical pero poco natural en español bíblico actual.
    rationale: Una formulación como «habiendo llegado a ser como» o «después de hacerse como» preserva mejor el participio y suena más idiomática sin perder la repetición.
  revised_spanish_text: Por tanto, estén en guardia[a], no sea que también ustedes, habiendo llegado a ser como los extranjeros, lleguen a ser como ellos, y el temor los alcance por causa de ellos,
