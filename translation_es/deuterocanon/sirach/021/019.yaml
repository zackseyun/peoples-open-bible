translation:
  language: es
  text: La instrucción[a] es grilletes en los pies de los insensatos, y como esposas en la mano derecha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La disciplina es grilletes en los pies de los insensatos, y como manillas en la mano derecha».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πέδαι
  english_pob_choice: shackles
  chosen_spanish: grilletes
  alternatives_spanish:
  - cadenas
  - fierros
  lexicon: LSJ
  rationale: πέδαι designa sobre todo un medio de sujeción para los pies; en español, "grilletes" comunica con claridad la imagen concreta de restricción física sin perder el matiz de inmovilización.
- source_word: ἐν ποσὶν
  english_pob_choice: on the feet
  chosen_spanish: en los pies
  alternatives_spanish:
  - sobre los pies
  - para los pies
  lexicon: LSJ
  rationale: La preposición con la imagen de πέδαι indica ubicación/uso respecto de los pies; "en los pies" conserva la concreción corporal del griego y resulta natural en español.
- source_word: ἀνοήτοις
  english_pob_choice: the senseless
  chosen_spanish: los insensatos
  alternatives_spanish:
  - los faltos de entendimiento
  - los necios
  - los insensatos
  lexicon: LSJ
  rationale: ἀνόητος expresa falta de entendimiento o sensatez. "Insensatos" mantiene el registro sapiencial y evita reducir el sentido a una simple falta intelectual.
- source_word: παιδεία
  english_pob_choice: instruction
  chosen_spanish: la instrucción
  alternatives_spanish:
  - la disciplina
  - la formación
  - la enseñanza
  lexicon: LSJ
  rationale: En este contexto sapiencial, παιδεία puede ser instrucción, disciplina o formación. "Instrucción" sigue de cerca la decisión inglesa y preserva el contraste entre la enseñanza y la manera en que el necio la percibe como restricción.
- source_word: χειροπέδαι
  english_pob_choice: handcuffs
  chosen_spanish: esposas
  alternatives_spanish:
  - manillas
  - grilletes de mano
  - manos
  lexicon: LSJ
  rationale: χειροπέδαι son ataduras para las manos. "Esposas" es el equivalente moderno más transparente en español y conserva la imagen de sujeción manual.
- source_word: ἐπὶ χειρὸς δεξιᾶς
  english_pob_choice: on the right hand
  chosen_spanish: en la mano derecha
  alternatives_spanish:
  - sobre la mano derecha
  - en la diestra
  - sobre la diestra
  lexicon: LSJ
  rationale: El griego especifica la mano derecha; "mano derecha" es claro y fiel, y conserva la singularidad de la imagen. "Dieztra" sería más tradicional, pero menos transparente para el lector general.
translation_notes:
  revision_awareness: 'El texto griego coincide sustancialmente con el audit trail inglés: se mantuvo la metáfora de restricción física y se reflejó la ambigüedad léxica de παιδεία mediante una nota alternativa. No se registran revisiones textuales que alteren la base de traducción.'
  spanish_consistency_notes:
  - Se preserva la correspondencia concreta entre πέδαι/χειροπέδαι y ataduras físicas distintas para pies y manos.
  - Se evitó traducir ἀνοήτοις como un juicio más fuerte que el del griego; "insensatos" mantiene el tono sapiencial.
  - La nota al pie recoge la alternativa léxica documentada en el audit trail inglés para παιδεία, sin introducir lecturas no atestiguadas.
