translation:
  language: es
  text: No he permitido que mi boca peque, pidiendo su vida con una maldición[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘con un juramento’. El sustantivo hebreo puede significar ‘maldición/imprecación’ o ‘juramento’; aquí el contexto de desear daño favorece ‘maldición’.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתַתִּי
  english_pob_choice: have not allowed
  chosen_spanish: no he permitido
  alternatives_spanish:
  - no he dejado
  - no he consentido
  lexicon: HALOT
  rationale: El hebreo usa 'dar' con infinitivo para expresar permiso o concesión. En español, 'permitir' comunica con naturalidad la negativa de Job a consentir en esa acción verbal.
- source_word: לַחֲטֹא
  english_pob_choice: to sin
  chosen_spanish: que peque
  alternatives_spanish:
  - a pecar
  - para pecar
  - a hacer mal
  lexicon: HALOT
  rationale: El infinitivo conserva el sentido moral directo de חטא en este contexto. En español, 'peque' mantiene el valor verbal y la fuerza ética sin sonar forzado.
- source_word: חִכִּי
  english_pob_choice: my mouth
  chosen_spanish: mi boca
  alternatives_spanish:
  - mi paladar
  - mi lengua
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'mi paladar', aquí funciona como metonimia de la խոս habla. 'Mi boca' es el equivalente idiomático más claro en español para una declaración sobre palabras de maldición.
- source_word: לִשְׁאֹל
  english_pob_choice: by asking for
  chosen_spanish: pidiendo
  alternatives_spanish:
  - al pedir
  - para pedir
  - solicitando
  lexicon: HALOT
  rationale: El infinitivo introduce el contenido de la acción pecaminosa. 'Pidiendo' reproduce esa relación de manera natural en español y mantiene la conexión con el acto verbal prohibido.
- source_word: בְּאָלָה
  english_pob_choice: with a curse
  chosen_spanish: con una maldición
  alternatives_spanish:
  - con una maldición invocada
  - con una imprecación
  - con un juramento
  lexicon: HALOT
  rationale: En este contexto hostil, אָלָה se entiende mejor como 'maldición'. Se conserva el posible matiz alternativo de 'juramento' en la nota, pero el texto principal sigue la lectura que mejor encaja con el deseo de daño.
- source_word: נַפְשׁוֹ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - a él
  lexicon: HALOT
  rationale: נפשׁ aquí no apunta a una afirmación metafísica sobre el alma, sino a la vida de la persona. 'Su vida' es el equivalente español más preciso y natural.
translation_notes:
  revision_awareness: La versión inglesa reciente se mantuvo sin cambios; no hubo revisiones aplicadas. La redacción española sigue de cerca la resolución léxica auditada, especialmente en אָלָה y en la metonimia de חִכִּי.
  spanish_consistency_notes:
  - Se mantiene el tono sobrio y forense propio del discurso de Job en este pasaje.
  - Se evitó 'señor'/'alma' por no corresponder al sentido contextual del verso.
  - La nota conserva la alternativa semántica relevante de אָלָה sin debilitar la lectura principal.
