  text: לַ֭/מְנַצֵּחַ לְ/דָוִ֣ד מִזְמ֑וֹר אֱלֹהֵ֥י תְ֝הִלָּתִ֗/י אַֽל תֶּחֱרַֽשׁ־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/109/000.yaml
  text: For the choirmaster[a]. Of David. A psalm. O God of my praise[b], do not be silent.
  footnotes:
  - marker: a
    text: Or 'By David,' 'For David,' or 'To David'; the Hebrew superscription is ambiguous.
    reason: alternative_reading
  - marker: b
    text: Or 'do not keep silent.'
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:36:28Z'
    unchanged: false
    changes_summary: Added the omitted final clause, rendering אֱלֹהֵי תְהִלָּתִי אַל תֶּחֱרַשׁ as 'O God of my praise, do not be silent.'
translation:
  language: es
  text: Para el director[a]. De David. Salmo. Oh Dios de mi alabanza, no guardes silencio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Por David', 'Para David' o 'A David'; la superscripción hebrea es ambigua.
    reason: alternative_reading
  - marker: b
    text: O 'no permanezcas en silencio'.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַ֭/מְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director
  alternatives_spanish:
  - Al director
  - Para el músico principal
  lexicon: מְנַצֵּחַ
  rationale: Se traduce como una indicación funcional al encargado de la ejecución musical. 'Director' comunica bien la función sin imponer una formulación eclesiástica más tradicional que el hebreo no exige.
- source_word: לְ/דָוִ֣ד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  - A David
  lexicon: דָוִד
  rationale: La preposición hebrea admite varias relaciones. 'De David' conserva la ambigüedad base que el POB inglés documenta.
- source_word: מִזְמ֑וֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Cántico
  lexicon: מִזְמוֹר
  rationale: '''Salmo'' es el equivalente directo y natural en español; el artículo indefinido se sobreentiende en una cabecera breve.'
- source_word: אֱלֹהֵ֥י תְ֝הִלָּתִ֗י
  english_pob_choice: O God of my praise
  chosen_spanish: Dios de mi alabanza
  alternatives_spanish:
  - Dios de mi gloria
  - Dios a quien alabo
  lexicon: אֱלֹהֵי + תְהִלָּה
  rationale: Se mantiene la construcción posesiva/genitiva del hebreo. 'Alabanza' refleja תְהִלָּה con fidelidad; 'gloria' sería más interpretativo y 'a quien alabo' diluye la forma nominal del original.
- source_word: אַל תֶּחֱרַשׁ
  english_pob_choice: do not be silent
  chosen_spanish: no guardes silencio
  alternatives_spanish:
  - no calles
  - no permanezcas en silencio
  lexicon: חָרַשׁ
  rationale: El verbo puede significar callar/guardar silencio. 'No guardes silencio' suena natural en español y conserva el valor aspectual de la prohibición.
theological_decisions:
- issue: Tratamiento del nombre divino en una cabecera que cita a Dios como 'Dios de mi alabanza'
  english_pob_reading: O God of my praise
  chosen_spanish_reading: Dios de mi alabanza
  alternative_spanish_readings:
  - Dios de mi gloria
  - Dios de mi adoración
  rationale: No se introduce 'Yahvé' porque aquí el texto hebreo usa אֱלֹהִים, no el Tetragrámaton. La frase describe a Dios como objeto/fuente de alabanza sin sustituir el término original.
  doctrine_reference: Distinción léxica entre אֱלֹהִים y יהוה en el texto hebreo.
- issue: Ambigüedad de la superscripción 'לְדָוִד'
  english_pob_reading: Of David
  chosen_spanish_reading: De David
  alternative_spanish_readings:
  - Por David
  - Para David
  - A David
  rationale: La cabecera hebrea admite varias lecturas de relación autoral/dedicatoria. Se preserva esa ambigüedad en español para no resolver indebidamente lo que el texto no fija.
  doctrine_reference: Principio de modestia exegética ante superscripciones hebreas ambivalentes.
translation_notes:
  revision_awareness: La revisión inglesa más reciente añadió la cláusula final 'O God of my praise, do not be silent'. Esta versión española la incorpora íntegramente y la integra de forma natural en la cabecera.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים y no se sustituye por 'Yahvé', porque el hebreo aquí no usa el Tetragrámaton.
  - Se conserva el registro de cabecera litúrgica breve, con puntuación que separa las unidades del superscrito.
  - Se evita 'SEÑOR' como máscara de nombre divino, siguiendo la política del proyecto.
