    rationale: 'El griego presenta primero el cargo y luego el nombre; en español puede mantenerse una formulación natural con aposición: ''Y Hermón, el jefe de los elefantes...''.'
  - severity: low
    issue: '''Cumplió'' es aceptable, pero ''llevó a cabo'' refleja mejor συνετέλει en contexto administrativo.'
    rationale: La acción no es solo obedecer sino ejecutar/completar la orden; 'llevó a cabo' preserva mejor ese matiz.
