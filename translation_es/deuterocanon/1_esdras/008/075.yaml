base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/008/075.yaml
  text: And now[a], for a little while, mercy has come to us from the Lord, the Lord, to leave us a remnant and a name in this holy place[c][b],
  footnotes:
  - marker: a
    text: Or 'to some extent' or 'for a brief measure'; the Greek phrase is idiomatic and may emphasize a limited measure of mercy rather than strictly its duration.
    reason: lexical_alternative
  - marker: b
    text: '''A root and a name'' is a metaphor for continued survival and identity; compare the idea of a surviving remnant or lasting standing.'
    reason: lexical_alternative
  - marker: c
    text: Some translators smooth 'the Lord, the Lord' to 'the Lord God,' but the Greek text repeats 'Lord,' and that repetition is preserved here.
    reason: alternative_reading
