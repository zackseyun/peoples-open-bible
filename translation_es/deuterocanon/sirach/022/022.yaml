review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido global del griego y del POB inglés: hablar contra un amigo, no temer porque puede haber reconciliación, y la lista de excepciones que hacen huir a todo amigo. Sin embargo, la construcción española ''pero no en caso de'' introduce una negación suplementaria no expresada directamente por πλὴν y suena menos precisa que una formulación exceptiva explícita.'
  spanish_quality_summary: 'El español es claro y natural en general. La mayor mejora necesaria es estilística y semántica menor: reemplazar ''pero no en caso de'' por ''excepto en caso de'' o equivalente, para representar mejor la lógica de excepción del original y evitar una frase algo pesada. El resto es legible y digno.'
  glossary_alignment: 'No hay términos del glosario principal en juego que entren en conflicto. Las decisiones léxicas clave están bien alineadas: ''contra un amigo'', ''reconciliación'', ''arrogancia'', ''revelación de un secreto'', ''golpe traicionero'', ''huirá''. La nota sobre μὴ εὐλαβηθῇς está bien conservada en español.'
  issues:
  - severity: medium
    issue: La frase 'pero no en caso de' no representa con la suficiente precisión el valor exceptivo de πλὴν.
    rationale: El griego introduce excepciones a la posibilidad de reconciliación. En español, 'excepto en caso de' o 'salvo en caso de' expresa mejor esa función que 'pero no en caso de', que añade un giro adversativo-negativo menos directo y algo más torpe.
  revised_spanish_text: Si abres la boca contra un amigo[a], no temas, porque hay reconciliación, excepto en caso de insulto, arrogancia, revelación de un secreto y golpe traicionero; en estas cosas, todo amigo huirá.
  revised_footnotes:
  - marker: a
    text: 'O: «no te asustes». El verbo griego puede incluir temor o cautela; aquí el contexto favorece no perder la esperanza de reconciliación.'
    reason: lexical_alternative
