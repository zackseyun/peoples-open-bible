  - severity: low
    issue: Nota al pie no del todo paralela al audit trail inglés
    rationale: La nota debe preservar alternativas léxicas de כַּף ('pan', 'bowl', tradicionalmente 'spoon') más que proponer una reformulación completa como 'fuente de oro'.
