translation:
  language: es
  text: 'Porque habrá semilla de paz: la vid dará su fruto[a], la tierra dará su produce, y los cielos darán su rocío; y haré que el remanente de este pueblo herede todas estas cosas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'semilla próspera', 'la siembra será pacífica' o 'la semilla de bienestar'. La frase hebrea es compacta y puede resumir todo el cuadro de bendición agrícola restaurada.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque ciertamente
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento de la promesa anterior. En español, 'Porque' conserva bien el valor causal/explanatorio de כִּי sin sobrecargar el estilo.
- source_word: זֶרַע הַשָּׁלוֹם
  english_pob_choice: seed of peace
  chosen_spanish: la semilla de paz
  alternatives_spanish:
  - la semilla de bienestar
  - la siembra de paz
  - la semilla de prosperidad
  lexicon: HALOT
  rationale: Mantiene la metáfora compacta del hebreo y la relación entre זֶרַע y שָׁלוֹם. 'Semilla de paz' preserva tanto la imagen agrícola como la amplitud semántica de paz/bienestar sin reducirla a mera prosperidad.
- source_word: הַגֶּפֶן תִּתֵּן פִּרְיָהּ
  english_pob_choice: the vine will give its fruit
  chosen_spanish: la vid dará su fruto
  alternatives_spanish:
  - la vid producirá su fruto
  - la vid rendirá su fruto
  lexicon: HALOT
  rationale: '''Dar'' reproduce naturalmente el verbo נתן y conserva el paralelismo con los otros miembros de la frase. ''Vid'' y ''fruto'' son equivalentes directos y claros en español.'
- source_word: יְבוּל
  english_pob_choice: produce
  chosen_spanish: producto
  alternatives_spanish:
  - producción
  - cosecha
  - rendimiento
  lexicon: HALOT
  rationale: Para español, 'producto' comunica el resultado agrícola de la tierra sin restringirlo a una sola cosecha. Conserva la amplitud del término hebreo en este contexto de abundancia.
- source_word: הַשָּׁמַיִם יִתְּנ֣וּ טַלָּ֑ם
  english_pob_choice: the heavens will give their dew
  chosen_spanish: los cielos darán su rocío
  alternatives_spanish:
  - los cielos enviarán su rocío
  - el cielo dará su rocío
  lexicon: HALOT
  rationale: '''Los cielos'' conserva el plural del hebreo y el lenguaje bíblico de la provisión divina. ''Rocío'' es el equivalente natural de טַל y ''darán'' mantiene el patrón repetido de נתן.'
- source_word: וְהִנְחַלְתִּי
  english_pob_choice: I will cause ... to inherit
  chosen_spanish: haré que ... herede
  alternatives_spanish:
  - causaré que ... herede
  - haré que ... reciba en herencia
  - haré poseer
  lexicon: HALOT
  rationale: '''Hacer que herede'' conserva el valor causativo del hifil y la fuerza de herencia/covenán del verbo נחל. En español suena natural y no diluye el matiz teológico.'
- source_word: שְׁאֵרִית הָעָם הַזֶּה
  english_pob_choice: the remnant of this people
  chosen_spanish: el remanente de este pueblo
  alternatives_spanish:
  - el resto de este pueblo
  - los sobrevivientes de este pueblo
  lexicon: HALOT
  rationale: '''Remanente'' es el término profético habitual en español para שְׁאֵרִית y preserva la carga teológica de preservación y restauración. ''Este pueblo'' sigue de cerca el hebreo.'
- source_word: אֶת כָּל אֵלֶּה
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - todo ello
  - todas estas
  lexicon: HALOT
  rationale: 'Aunque el hebreo es más compacto, en español ''todas estas cosas'' hace explícito el referente de las bendiciones mencionadas: fruto, producto y rocío.'
theological_decisions:
- issue: Sentido de שָׁלוֹם en un contexto agrícola de restauración
  english_pob_reading: Rendered as 'seed of peace,' preserving both peace and prosperity overtones.
  chosen_spanish_reading: '''semilla de paz'' se mantiene literalmente, dejando que ''paz'' abarque bienestar, plenitud y prosperidad implícita.'
  alternative_spanish_readings:
  - '''semilla de prosperidad'''
  - '''siembra pacífica'''
  - '''semilla de bienestar'''
  rationale: El hebreo es breve y condensado. En este contexto, la bendición agrícola expresa restauración integral, no solo abundancia económica. 'Paz' conserva la amplitud teológica del término sin reducirlo a prosperidad material.
  doctrine_reference: Translation philosophy §3, §5
- issue: Lenguaje de herencia en וְהִנְחַלְתִּי
  english_pob_reading: Kept explicit inheritance wording rather than reducing to simple possession.
  chosen_spanish_reading: '''haré que herede'' conserva la idea de herencia otorgada por Yahvé, no mera posesión general.'
  alternative_spanish_readings:
  - '''haré que posea'''
  - '''le daré posesión de'''
  - '''haré que reciba'''
  rationale: El verbo causativo apunta a un acto de concesión pactal. Mantener 'herede' preserva esa resonancia de herencia dada por Dios y la conecta con el tema bíblico de promesa y restauración.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente que añadió el artículo definido en 'the seed of peace'. En español, ese valor definido queda reflejado de manera natural con 'la semilla de paz'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como nombre divino solo cuando el texto lo requiriera; en este versículo no aparece.
  - Se conservaron imágenes agrícolas concretas sin convertirlas en paráfrasis abstractas.
  - '''Remanente'' se usó de forma consistente con el lenguaje profético habitual y con la carga covenantal del hebreo.'
  - La repetición verbal de 'dar' se mantuvo en la medida posible para reflejar el paralelismo del original.
