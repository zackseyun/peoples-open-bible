revisions:
- from: 'Dirán: «Es el sacrificio de la Pascua para Yahvé[c][b], quien pasó por alto[a] las casas de los hijos de Israel en Egipto, cuando hirió a Egipto y libró nuestras casas». Y el pueblo se inclinó y adoró.'
  to: 'Dirán: «Es el sacrificio de la Pascua para Yahvé, quien pasó de largo[b] las casas de los hijos de Israel[a] en Egipto, cuando hirió a Egipto y libró[c] nuestras casas». Y el pueblo se inclinó y adoró.'
  rationale: Se corrigieron los anclajes de las notas para que correspondan exactamente a las frases que explican. Además, se reemplazó «pasó por alto» por «pasó de largo» para reflejar mejor פָּסַח en este contexto pascual, evitando la connotación moderna de 'ignorar' y conservando el enlace léxico con «Pascua». El resto del texto se mantuvo por ser fiel, claro y alineado con la terminología del proyecto.
  reviewer_model: gpt-5.4
