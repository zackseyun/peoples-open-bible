translation:
  language: es
  text: 'Entonces Balaam dijo a Balac: «Ponte junto a tu holocausto, y yo iré. Quizá Yahvé salga a mi encuentro, y lo que me muestre te lo diré». Después fue a una altura desnuda[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una altura desnuda de vegetación» / «un cerro pelado». El término hebreo designa un lugar alto expuesto, sin cobertura vegetal.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְיַצֵּב
  english_pob_choice: Stand by
  chosen_spanish: Ponte junto a
  alternatives_spanish:
  - Párate junto a
  - Toma tu lugar junto a
  lexicon: HALOT
  rationale: El hitpael imperativo expresa tomar posición; en español, «ponte junto a» comunica de manera natural la postura y la relación espacial con la ofrenda sin volverlo rígido.
- source_word: עַל עֹלָתֶךָ
  english_pob_choice: your burnt offering
  chosen_spanish: tu holocausto
  alternatives_spanish:
  - tu ofrenda quemada
  - tu ofrenda de holocausto
  lexicon: HALOT
  rationale: עֹלָה designa específicamente el holocausto. «Holocausto» conserva el valor técnico del sacrificio y mantiene la fuerza cultual del término.
- source_word: וְאֵלְכָה
  english_pob_choice: and I will go
  chosen_spanish: y yo iré
  alternatives_spanish:
  - y déjame ir
  - y me iré
  lexicon: HALOT
  rationale: El cohortativo de primera persona singular expresa intención resuelta. «Yo iré» es una forma fluida y fiel en español, con el matiz volitivo conservado por el contexto.
- source_word: אוּלַי
  english_pob_choice: Perhaps
  chosen_spanish: Quizá
  alternatives_spanish:
  - Tal vez
  - Puede ser que
  lexicon: HALOT
  rationale: La partícula marca incertidumbre o posibilidad; «Quizá» preserva bien ese tono tentativo sin añadir énfasis excesivo.
- source_word: יִקָּרֵה יְהוָה לִקְרָאתִי
  english_pob_choice: Yahweh will come to meet me
  chosen_spanish: Yahvé venga a encontrarme
  alternatives_spanish:
  - Yahvé me salga al encuentro
  - Yahvé venga a recibirme
  lexicon: HALOT
  rationale: נקרה en nifal puede implicar un encuentro que acontece. «Venga a encontrarme» mantiene la idea de encuentro personal y la expectativa incierta del hablante. Se conserva «Yahvé» para el nombre divino YHWH.
- source_word: וּדְבַר מַה יַּרְאֵנִי
  english_pob_choice: whatever he shows me
  chosen_spanish: y lo que me muestre
  alternatives_spanish:
  - y cualquier cosa que me muestre
  - y lo que él me haga ver
  lexicon: HALOT
  rationale: דבר introduce aquí el contenido de la revelación; en español, «lo que me muestre» evita una traducción demasiado literal de «palabra» y reproduce el sentido revelatorio del hebreo.
- source_word: יַּרְאֵנִי
  english_pob_choice: he shows me
  chosen_spanish: me muestre
  alternatives_spanish:
  - me haga ver
  - me revele
  lexicon: HALOT
  rationale: 'El hiphil de ראה tiene valor causativo: hacer ver, mostrar. «Me muestre» conserva esa causatividad con naturalidad.'
- source_word: וְהִגַּדְתִּי לָךְ
  english_pob_choice: I will tell you
  chosen_spanish: te lo diré
  alternatives_spanish:
  - te lo declararé
  - te lo comunicaré
  lexicon: HALOT
  rationale: הגיד significa decir, declarar, informar. «Te lo diré» es directo y proporciona el objeto implícito de la revelación sin añadir explicaciones.
- source_word: שֶׁפִי
  english_pob_choice: a bare height
  chosen_spanish: una altura desnuda
  alternatives_spanish:
  - una altura desnuda de vegetación
  - un cerro pelado
  - una altura árida
  lexicon: HALOT
  rationale: El sustantivo denota un lugar alto expuesto, sin cobertura vegetal. «Altura desnuda» reproduce la imagen topográfica de manera transparente y conservando la posible ambigüedad entre altura, loma o collado.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se translitera como «Yahvé» para preservar el nombre personal de Dios y no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El inglés auditado revisó «beside» a «by» para la primera cláusula; en español, la formulación «ponte junto a» conserva esa relación espacial inmediata sin sobrerrefinarla. También se mantiene la decisión estable de traducir יְהוָה como «Yahvé» y el cierre topográfico como una imagen abierta equivalente a «bare height».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para YHWH, en coherencia con el estándar del proyecto.
  - «Holocausto» se usa como término sacrificial técnico para עֹלָה.
  - 'La secuencia verbal conserva el orden narrativo del hebreo: orden, salida, posibilidad de encuentro, declaración, marcha.'
  - La nota al pie se ancla en «altura desnuda» para reflejar la ambigüedad léxica del hebreo sin duplicar marcas.
