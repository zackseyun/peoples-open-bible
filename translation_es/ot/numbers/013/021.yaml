    rationale: 'La fórmula «''O: ...''» es torpe y no sigue bien el estilo editorial esperado en español. Debe reformularse como «O bien,» o equivalente, sin comillas sobrantes.'
  - severity: low
    issue: Topónimo final mejorable en su adaptación ortográfica al español
    rationale: «Lebo-Hamat» transmite la idea, pero «Lebó-hamat» refleja mejor la pronunciación y se ve más natural en español, manteniendo el valor toponímico sin perder la conexión con la nota alternativa.
  revised_spanish_text: Así subieron y reconocieron la tierra desde el desierto de Zin hasta Rehob[a], en Lebó-hamat.
