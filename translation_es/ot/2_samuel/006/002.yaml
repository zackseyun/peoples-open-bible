revisions:
- from: 'David se levantó y fue[a], con todo el pueblo que estaba con él, desde Baalé-judá para subir de allí el arca de Dios, sobre la cual es invocado el Nombre: el nombre de Yahvé de los Ejércitos[b][c][d], que está entronizado sobre los querubines.'
  to: David se levantó y fue[a], con todo el pueblo que estaba con él, desde Baalé-judá para traer de allí el arca de Dios, que es llamada por el Nombre, el nombre de Yahvé de los Ejércitos[c][b], que está entronizado sobre los querubines[d].
  rationale: Se corrige la cláusula central para seguir la decisión auditada del POB sobre la fórmula de nombramiento del arca («es llamada por el Nombre») en vez de reinterpretarla como invocación. También se mejora la naturalidad y fidelidad de לְהַעֲלוֹת מִשָּׁם con «para traer de allí», y se reorganizan las notas para que correspondan a alternativas reales del texto fuente y del expediente inglés.
