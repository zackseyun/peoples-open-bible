id: LUK.1.38
reference: Luke 1:38
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἶπεν δὲ Μαριάμ· Ἰδοὺ ἡ δούλη κυρίου· γένοιτό μοι κατὰ τὸ ῥῆμά σου. καὶ ἀπῆλθεν ἀπ’ αὐτῆς ὁ ἄγγελος.
base_translation:
  language: en
  yaml_path: translation/nt/luke/001/038.yaml
  text: And Mary said[a], “Behold, I am the Lord’s servant[b]. May it happen to me according to your word.” And the angel departed from her.
  footnotes:
  - marker: a
    text: Or “the Lord’s slave.” The Greek δούλη can denote a female slave or servant; here the main text uses “servant” because the context emphasizes humble submission to God.
    reason: alternative_reading
  - marker: b
    text: Or “Let it be to me according to your word.”
    reason: lexical_alternative
translation:
  language: ko
  text: 마리아가 말했습니다. 「보십시오, 저는 주의 종입니다. 당신의 말씀대로 제게 이루어지기를 바랍니다.」 그러자 천사는 그에게서 떠났습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἡ δούλη κυρίου
  english_pob_choice: the Lord's servant
  chosen_korean: 주의 종
  alternatives_korean:
  - 주의 여종
  - 주의 노예
  lexicon: BDAG
  rationale: 마리아의 자기 헌신적 응답에서는 매임의 굴종성보다 언약적 종됨이 본문 의도이므로 「종」을 채택한다. 여기서 「주」는 야훼와 동일 지시이나, 마리아의 1인칭 신앙 고백 어법으로는 한국어 「주」가 더 자연스럽다.
