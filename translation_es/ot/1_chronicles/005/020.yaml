    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «fueron entregados en su mano», modismo para derrota y sujeción.'
    reason: lexical_alternative
  revision_rationale: Se reubicó la nota del etnónimo al lugar correcto, se eliminaron notas redundantes sobre el mismo nombre de pueblo, y se ajustó «en su mano» a «en sus manos» para un español más natural, manteniendo en nota la imagen idiomática hebrea y su sentido militar.
