translation:
  language: es
  text: Él es el que está sentado sobre[a] el círculo de la tierra, y sus habitantes son como saltamontes[b]; él extiende los cielos como una cortina y los despliega como una tienda para habitar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como "bóveda" o "horizonte" de la tierra. El término hebreo puede denotar una extensión circular o un límite de aspecto domeado.
    reason: lexical_alternative
  - marker: b
    text: 'O: "como langostas". El término hebreo puede referirse a insectos semejantes; aquí comunica sobre todo pequeñez.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיֹּשֵׁב
  english_pob_choice: He is the one who sits
  chosen_spanish: Él es el que se sienta
  alternatives_spanish:
  - el que está sentado
  - el que se sienta entronizado
  lexicon: HALOT
  rationale: El participio funciona de manera sustantiva y describe a Dios por una acción/estado continuo. En español, "el que se sienta" conserva esa fuerza verbal sin añadir la idea de entronización, que es posible por el contexto pero no está expresada explícitamente por el verbo.
- source_word: עַל
  english_pob_choice: above
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - por encima de
  lexicon: HALOT
  rationale: En este contexto exaltativo y cosmológico, "sobre" comunica adecuadamente la trascendencia respecto de la tierra sin forzar una lectura física demasiado concreta.
- source_word: חוּג
  english_pob_choice: circle
  chosen_spanish: círculo
  alternatives_spanish:
  - bóveda
  - horizonte
  - dome
  lexicon: HALOT
  rationale: '"Círculo" es el equivalente más directo y tradicional. Conserva la imagen hebrea sin especificar de más la cosmología antigua.'
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - el país
  lexicon: HALOT
  rationale: En este contexto cósmico, "la tierra" comunica el ámbito universal mejor que "el país" y evita una restricción indebida.
- source_word: וְיֹשְׁבֶיהָ
  english_pob_choice: its inhabitants
  chosen_spanish: sus habitantes
  alternatives_spanish:
  - los que habitan en ella
  - sus moradores
  lexicon: HALOT
  rationale: '"Sus habitantes" es natural en español y conserva el sentido de quienes viven en la tierra.'
- source_word: כַּחֲגָבִים
  english_pob_choice: like grasshoppers
  chosen_spanish: como langostas
  alternatives_spanish:
  - como saltamontes
  lexicon: HALOT
  rationale: El término puede abarcar saltamontes/langostas. Aquí "langostas" respeta el campo léxico amplio del hebreo y mantiene el efecto de pequeñez de la comparación.
- source_word: הַנּוֹטֶה
  english_pob_choice: who stretches out
  chosen_spanish: él extiende
  alternatives_spanish:
  - el que extiende
  - el que despliega
  lexicon: HALOT
  rationale: El participio sustantivado sigue describiendo a Dios. "Extiende" es la correspondencia natural y adecuada para la imagen de los cielos.
- source_word: כַדֹּק
  english_pob_choice: like a curtain
  chosen_spanish: como un toldo
  alternatives_spanish:
  - como una cortina
  - como un velo
  lexicon: HALOT
  rationale: דֹק designa algo fino o extendido. En español, "toldo" transmite mejor la imagen de una tela desplegada por encima, manteniendo la idea de cobertura del texto poético, aunque no sea un término técnico exacto.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  lexicon: HALOT
  rationale: '"Los cielos" conserva el registro poético y la amplitud cósmica del hebreo mejor que el singular "el cielo".'
- source_word: וַיִּמְתָּחֵם
  english_pob_choice: and spreads them out
  chosen_spanish: los despliega
  alternatives_spanish:
  - los extiende
  - los tiende
  lexicon: HALOT
  rationale: El verbo expresa extender o tensar. "Los despliega" evita una repetición áspera con "extiende" y conserva la imagen de una tela abierta o tendida.
- source_word: כָּאֹהֶל
  english_pob_choice: like a tent
  chosen_spanish: como una tienda
  alternatives_spanish:
  - como una carpa
  - como un tabernáculo
  lexicon: HALOT
  rationale: En español bíblico amplio, "tienda" reproduce de forma natural la imagen nómada del hebreo y encaja bien con el paralelo poético.
- source_word: לָשָׁבֶת
  english_pob_choice: to dwell in
  chosen_spanish: para habitar
  alternatives_spanish:
  - para morar
  - para vivir en ella
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad. "Para habitar" conserva la finalidad del símil de la tienda y sugiere residencia, no solo permanencia física.
theological_decisions:
- issue: Imagen cosmológica de חוּג הָאָרֶץ
  english_pob_reading: Rendered phenomenologically as 'the circle of the earth' without importing a modern scientific claim or flattening the poetic image.
  chosen_spanish_reading: Se rinde fenomenológicamente como "el círculo de la tierra", sin convertir la frase en una afirmación científica moderna ni reducir la imagen poética.
  alternative_spanish_readings:
  - la bóveda de la tierra
  - el horizonte de la tierra
  rationale: El verso es poético y exalta la trascendencia y el poder creador de Dios. La traducción debe preservar la imagen y no usarla para sostener un modelo cosmológico específico.
  doctrine_reference: Filosofía de traducción §1, §3
- issue: Fuerza semántica de participios sustantivados en hebreo
  english_pob_reading: '''He is the one who sits'' / ''who stretches out'' preserve ongoing action/state without over-royalizing the verbs.'
  chosen_spanish_reading: '"Él es el que se sienta" / "él extiende" conservan la acción continua sin añadir una lectura regia que no está lexicalmente explícita.'
  alternative_spanish_readings:
  - el que está sentado
  - el que extiende
  rationale: En español, la estructura con relativo preserva mejor la descripción continua de Dios; donde la segunda cláusula ya fluye con el contexto, la forma verbal simple mantiene naturalidad sin perder la imagen.
  doctrine_reference: Filosofía de traducción §2
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó 'thin curtain' por 'curtain' para ajustarse más de cerca a דֹק. En español, se evitó añadir un equivalente interpretativo como 'fino' y se prefirió una solución natural, 'toldo', que conserva la imagen de tela extendida sin sobreespecificarla. También se observó la preferencia final por un término más cercano al hebreo en la segunda comparación, reflejada aquí con 'los despliega como una tienda'.
  spanish_consistency_notes:
  - Se mantiene 'círculo de la tierra' para חוּג, siguiendo la decisión lexical principal y evitando un giro tradicionalizante como 'globo' o 'redondez'.
  - Se usa 'los cielos' en plural, coherente con el hebreo שָׁמַיִם y con el registro poético.
  - Se conserva el paralelismo verbal 'extiende / despliega' para reflejar los dos verbos hebreos sin borrarlos en una sola imagen.
  - '''Tienda'' se prefiere a ''carpa'' por su alcance bíblico más amplio y por su mejor ajuste al símil de habitar.'
