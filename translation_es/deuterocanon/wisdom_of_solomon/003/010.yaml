translation:
  language: es
  text: Pero los impíos recibirán castigo[a] según lo que pensaron[b], porque desatendieron al justo[c] y se apartaron del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pena». ἐπιτιμία puede denotar castigo o sanción retributiva; «castigo» conserva bien el peso judicial del contexto.
    reason: lexical_alternative
  - marker: b
    text: O «según lo que razonaron» o «según lo que tramaron». El griego vincula la pena con su propio cálculo o diseño previo.
    reason: lexical_alternative
  - marker: c
    text: O «al hombre justo» o «al justo varón». El singular probablemente señala una figura representativa del justo en la argumentación del libro.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ δὲ ἀσεβεῖς
  english_pob_choice: the ungodly
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los irreverentes
  - los impíos y sin Dios
  lexicon: LSJ
  rationale: ἀσεβής expresa impiedad e irreverencia hacia Dios. En español, «impíos» conserva bien el peso religioso y moral sin sonar forzado.
- source_word: καθʼ ἃ ἐλογίσαντο
  english_pob_choice: according to what they reasoned
  chosen_spanish: según lo que pensaron
  alternatives_spanish:
  - según lo que razonaron
  - de acuerdo con lo que pensaron
  - conforme a lo que maquinaban
  lexicon: LSJ
  rationale: 'λογίζομαι tiene fuerza cognitiva: calcular, considerar, pensar. «Pensaron» mantiene esa base sin convertir innecesariamente la frase en una lectura exclusivamente de complot; la gravedad del contexto sigue implícita.'
- source_word: ἕξουσιν ἐπιτιμίαν
  english_pob_choice: will have punishment
  chosen_spanish: recibirán castigo
  alternatives_spanish:
  - tendrán castigo
  - recibirán pena
  - tendrán pena
  lexicon: LSJ
  rationale: ἐπιτιμία puede significar pena o castigo. En español, «recibirán castigo» comunica con naturalidad la idea de sanción retributiva y evita una construcción demasiado literal con «tener castigo».
- source_word: τοῦ δικαίου
  english_pob_choice: the righteous man
  chosen_spanish: al justo
  alternatives_spanish:
  - al hombre justo
  - al justo hombre
  - al justo varón
  lexicon: LSJ
  rationale: El singular puede referirse a una figura representativa. «Al justo» preserva la singularidad y la referencia personal sin imponer más especificación de la que el griego da en este verso.
- source_word: ἀμελήσαντες
  english_pob_choice: having neglected
  chosen_spanish: pues descuidaron
  alternatives_spanish:
  - porque descuidaron
  - ya que desatendieron
  - habiendo descuidado
  lexicon: LSJ
  rationale: ἀμελέω indica descuidar o desatender. En español, una subordinada causal con «pues» fluye mejor que un gerundio pesado y conserva la relación lógica del participio.
- source_word: τοῦ κυρίου ἀποστάντες
  english_pob_choice: having departed from the Lord
  chosen_spanish: se apartaron del Señor
  alternatives_spanish:
  - se alejaron del Señor
  - apostataron del Señor
  - se retiraron del Señor
  lexicon: LSJ
  rationale: ἀποστάντες transmite apartarse o separarse. «Se apartaron del Señor» es fiel, claro y suficientemente fuerte; «apostataron» sería más técnico de lo que exige el contexto inmediato.
theological_decisions:
- issue: Referente de τοῦ δικαίου
  english_pob_reading: the righteous man as a representative singular figure
  chosen_spanish_reading: al justo como figura singular representativa
  alternative_spanish_readings:
  - a los justos en sentido colectivo
  - a la justicia como principio abstracto
  rationale: El singular se mantiene para no diluir la continuidad literaria con el argumento previo de Sabiduría 2–5. «Al justo» conserva la ambigüedad productiva entre un individuo representativo y una figura paradigmática, sin resolverla de más.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; Gender-accurate over gender-neutral.'
- issue: Rendering of κύριος
  english_pob_reading: Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Maestro
  - el Dueño
  rationale: En este contexto sapiencial judío, κύριος remite a Dios. «El Señor» es la forma española estable para ese referente y preserva la carga teológica del término.
  doctrine_reference: 'DOCTRINE.md contested terms table: κύριος → Lord'
translation_notes:
  revision_awareness: La revisión inglesa más reciente afinó καθʼ ἃ de «in keeping with» a «according to», reforzando una relación directa entre el pensamiento previo y el castigo. La versión española sigue esa decisión con «según lo que pensaron». También conserva la singularidad de τοῦ δικαίου y la relación verbal de ἀποστάντες con κύριος como un apartarse del Señor.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, conforme al estándar del proyecto para este contexto.
  - Se evita «Cristo» porque el verso habla de κύριος y no de Χριστός; no hay base textual para introducirlo.
  - «Impíos» se usa para ἀσεβεῖς por su valor religioso, no simplemente moral.
  - Se preserva la tensión interpretativa de τοῦ δικαίου sin resolverla dogmáticamente en el texto principal.
  - El orden español busca naturalidad sin perder la conexión causal y participial del griego.
