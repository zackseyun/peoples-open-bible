  to: 'Entonces los filisteos llamaron a los sacerdotes y a los adivinos, diciendo: «¿Qué haremos con el arca de Yahvé? Dígannos con qué[a] debemos enviarla a su lugar».'
  rationale: Se corrige el tratamiento verbal a plural («Dígannos») para concordar con los destinatarios del mandato, y se ajusta «la enviaremos» a «debemos enviarla» para conservar mejor el matiz deliberativo/advisory del hebreo y del POB inglés. Se simplifican las notas para retener la alternativa léxica realmente significativa en בַּמֶּה.
