translation:
  language: es
  text: porque la creación misma también será liberada de la esclavitud de la decadencia a la libertad de la gloria de los hijos de Dios.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: Aquí ὅτι funciona de manera causal, explicando la base de la esperanza previa; por eso 'porque' comunica bien la relación lógica en español sin volverla meramente explicativa de contenido.
- source_word: καὶ αὐτὴ
  english_pob_choice: creation itself also
  chosen_spanish: la creación misma también
  alternatives_spanish:
  - la creación misma
  - la propia creación también
  lexicon: BDAG
  rationale: Se conserva el énfasis de αὐτὴ con 'misma' y la fuerza aditiva de καὶ con 'también'. 'La creación' refleja κτίσις como el orden creado en conjunto.
- source_word: κτίσις
  english_pob_choice: creation
  chosen_spanish: la creación
  alternatives_spanish:
  - el mundo creado
  - la creación entera
  lexicon: BDAG
  rationale: En este contexto κτίσις se refiere a la creación en sentido amplio, no a una criatura individual; 'la creación' es natural y fiel al alcance del término.
- source_word: ἐλευθερωθήσεται
  english_pob_choice: will be set free
  chosen_spanish: será liberada
  alternatives_spanish:
  - será puesta en libertad
  - será libertada
  lexicon: BDAG
  rationale: El futuro pasivo indica una liberación venidera hecha a la creación. 'Será liberada' conserva el pasivo y suena natural en español bíblico contemporáneo.
- source_word: ἀπὸ τῆς δουλείας
  english_pob_choice: from slavery
  chosen_spanish: de la esclavitud
  alternatives_spanish:
  - del yugo
  - de la servidumbre
  lexicon: BDAG
  rationale: δουλεία tiene una fuerza fuerte de esclavitud/bondaje. 'Esclavitud' preserva esa intensidad mejor que un término más suavizado como 'servidumbre'.
- source_word: τῆς φθορᾶς
  english_pob_choice: to decay
  chosen_spanish: de la corrupción
  alternatives_spanish:
  - de la decadencia
  - de la descomposición
  lexicon: BDAG
  rationale: Aunque el audit trail inglés opta por 'decay' para resaltar el sentido de deterioro, en español 'corrupción' mantiene la amplitud semántica de φθορά (corrupción, deterioro, perecibilidad) sin reducirlo sólo a moralidad; el contexto creado permite esta elección.
- source_word: εἰς τὴν ἐλευθερίαν
  english_pob_choice: into the freedom
  chosen_spanish: hacia la libertad
  alternatives_spanish:
  - a la libertad
  - en la libertad
  lexicon: BDAG
  rationale: εἰς marca movimiento hacia un nuevo estado. 'Hacia la libertad' conserva la direccionalidad y evita cerrar prematuramente el matiz de transición.
- source_word: τῆς δόξης
  english_pob_choice: of the glory
  chosen_spanish: de la gloria
  alternatives_spanish:
  - gloriosa
  - de esplendor
  lexicon: BDAG
  rationale: 'Se mantiene el genitivo de manera transparente: ''de la gloria''. Así no se transforma interpretativamente en un adjetivo y se preserva la tensión del giro genitival.'
- source_word: τῶν τέκνων τοῦ θεοῦ
  english_pob_choice: of the children of God
  chosen_spanish: de los hijos de Dios
  alternatives_spanish:
  - de los hijos de Dios y de las hijas de Dios
  - de los hijos de Dios
  lexicon: BDAG
  rationale: τέκνα significa 'hijos/niños' en sentido filial amplio. 'Hijos de Dios' respeta el lenguaje bíblico usual en español y mantiene la referencia familiar del texto.
theological_decisions:
- issue: Cómo reflejar τὴν ἐλευθερίαν τῆς δόξης τῶν τέκνων τοῦ θεοῦ sin resolver la relación genitiva
  english_pob_reading: the freedom of the glory of the children of God
  chosen_spanish_reading: la libertad de la gloria de los hijos de Dios
  alternative_spanish_readings:
  - la libertad gloriosa de los hijos de Dios
  - la libertad que pertenece a la gloria de los hijos de Dios
  rationale: Se conserva la cadena genitiva en forma bastante literal para no domesticar la relación entre 'libertad' y 'gloria'. En español, como en el griego, la frase puede leerse como libertad caracterizada por la gloria o como libertad vinculada a la gloria de los hijos de Dios; no se decide una glosa doctrinal más estrecha.
  doctrine_reference: Preservar la tensión exegética, no imponer una paráfrasis interpretativa.
- issue: Decidir entre 'corrupción' y un término más físico como 'decadencia' para φθορά
  english_pob_reading: slavery to decay
  chosen_spanish_reading: esclavitud de la corrupción
  alternative_spanish_readings:
  - esclavitud de la decadencia
  - esclavitud de la descomposición
  rationale: El contexto de la creación permite el sentido de perecibilidad/deterioro. 'Corrupción' en español bíblico abarca tanto deterioro material como desorden resultante, por lo que conserva mejor el peso del término sin limitarlo a una sola dimensión.
  doctrine_reference: Mantener la amplitud del estado de la creación sometida a deterioro.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que prefirió mantener la cadena genitiva más literal ('the freedom of the glory of the children of God') en lugar de una paráfrasis adjetival. La redacción española sigue esa misma cautela y evita convertir 'de la gloria' en 'gloriosa'.
  spanish_consistency_notes:
  - Se mantuvo 'creación' para κτίσις, coherente con el uso bíblico de la creación en su conjunto.
  - Se eligió 'esclavitud' para δουλεία conforme a la fuerza léxica fuerte del término.
  - Se preservó 'de la gloria' en vez de 'gloriosa' para reflejar el genitivo τῆς δόξης sin interpretarlo.
  - Se usó 'hijos de Dios' como fórmula bíblica estable en español y equivalente familiar de τέκνα τοῦ θεοῦ.
  - La puntuación y el orden general siguen una sintaxis natural en español sin introducir explicaciones no presentes en el texto.
