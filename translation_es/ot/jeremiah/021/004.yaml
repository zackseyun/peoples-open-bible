translation:
  language: es
  text: 'Así dice Yahvé, Dios de Israel: He aquí, yo hago volver atrás las armas de guerra que están en sus manos, con las cuales ustedes combaten contra el rey de Babilonia y contra los caldeos que los sitian fuera de la muralla; y las reuniré[a] en medio de esta ciudad.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «y las reuniré», refiriéndose no a las armas sino al rey de Babilonia y a los caldeos; es decir, que Dios introduciría a las fuerzas enemigas en la ciudad.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahvéh
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, siguiendo la convención del proyecto en español. "Yahvé" comunica el nombre personal sin sustituirlo por un título.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La expresión hebrea es un sintagma nominal directo; en español, "Dios de Israel" reproduce con naturalidad la relación de pertenencia/covenio sin perder claridad.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - He aquí
  - Vean
  lexicon: HALOT
  rationale: En español, "Miren" conserva la fuerza deíctica y solemne de la fórmula profética sin sonar tan arcaica como "He aquí". Aquí funciona como introducción retórica a una declaración divina.
- source_word: מֵסֵב
  english_pob_choice: am turning back
  chosen_spanish: estoy volviendo
  alternatives_spanish:
  - estoy haciendo retroceder
  - estoy volviendo atrás
  - estoy invirtiendo
  lexicon: HALOT
  rationale: El participio expresa una acción divina en curso o inminente. "Estoy volviendo" mantiene la idea de retorno/reversión del movimiento y suena natural en español; el contexto militar hace explícita la inversión de uso de las armas.
- source_word: כְּלֵי הַמִּלְחָמָה
  english_pob_choice: the weapons of war
  chosen_spanish: las armas de guerra
  alternatives_spanish:
  - los utensilios de guerra
  - el armamento
  lexicon: HALOT
  rationale: '"Armas de guerra" es una equivalencia natural y fiel al sentido militar del constructo. "Armas" por sí solo podría ser suficiente, pero el complemento preserva el énfasis del hebreo.'
- source_word: בְּיֶדְכֶם
  english_pob_choice: that are in your hands
  chosen_spanish: que están en sus manos
  alternatives_spanish:
  - que tienen en sus manos
  - que llevan
  lexicon: HALOT
  rationale: Se conserva el modismo concreto del hebreo. "En sus manos" mantiene la imagen de instrumentos actualmente manejados por los defensores.
- source_word: נִלְחָמִים בָּם
  english_pob_choice: with which you are fighting
  chosen_spanish: con las cuales ustedes combaten
  alternatives_spanish:
  - con las que ustedes luchan
  - con las cuales ustedes hacen guerra
  lexicon: HALOT
  rationale: '"Combatir" reproduce bien el sentido bélico y permite una construcción fluida en español. Se evita oscurecer el valor instrumental de בָּם.'
- source_word: אֶת מֶלֶךְ בָּבֶל וְאֶת הַכַּשְׂדִּים
  english_pob_choice: against the king of Babylon and against the Chaldeans
  chosen_spanish: contra el rey de Babilonia y contra los caldeos
  alternatives_spanish:
  - contra el rey de Babilonia y contra los babilonios
  lexicon: HALOT
  rationale: '"Contra" expresa en español la relación hostil que en hebreo está implícita en el uso de אֶת con un verbo de combate. "Caldeos" conserva el etnónimo histórico del texto.'
- source_word: הַצָּרִים עֲלֵיכֶם
  english_pob_choice: who are besieging you
  chosen_spanish: que los sitian
  alternatives_spanish:
  - que los cercan
  - que los asedian
  lexicon: HALOT
  rationale: El verbo de צר en este contexto de muralla y asedio se rinde mejor con lenguaje de sitio. "Sitian" es claro, natural y mantiene la imagen militar específica.
- source_word: מִחוּץ לַחוֹמָה
  english_pob_choice: outside the wall
  chosen_spanish: fuera de la muralla
  alternatives_spanish:
  - fuera del muro
  - al exterior de la muralla
  lexicon: HALOT
  rationale: '"Muralla" comunica mejor que "muro" una fortificación urbana en contexto de asedio. "Fuera de" conserva el valor espacial directo del hebreo.'
- source_word: וְאָסַפְתִּי אֹתָם
  english_pob_choice: and I will gather them
  chosen_spanish: y las reuniré
  alternatives_spanish:
  - y las juntaré
  - y las congregaré
  lexicon: HALOT
  rationale: '"Reunir" reproduce bien el verbo de recoger/juntar y funciona con el referente femenino plural implícito en español para "armas". Se preserva la acción divina de concentrar esos instrumentos en la ciudad.'
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: las
  alternatives_spanish:
  - los
  lexicon: HALOT
  rationale: En español debe concordar con "armas"; por ello se usa "las" si el referente son las armas. Esta elección también deja abierta, en nota, la lectura alternativa del pronombre como referencia a los invasores.
- source_word: אֶל תּוֹךְ הָעִיר הַזֹּאת
  english_pob_choice: into the midst of this city
  chosen_spanish: en medio de esta ciudad
  alternatives_spanish:
  - dentro de esta ciudad
  - al centro de esta ciudad
  lexicon: HALOT
  rationale: '"En medio de" preserva la idea de interioridad/centro de תּוֹךְ mejor que un simple "dentro de". Es una equivalencia idiomática clara y elevada en español.'
theological_decisions:
- issue: Referencia de "las" / "them" en la clausula final
  english_pob_reading: The pronoun refers to the weapons of war, not to the Babylonian forces.
  chosen_spanish_reading: El pronombre se entiende, en la lectura principal, como referencia a las armas de guerra; Dios las reunirá en medio de la ciudad.
  alternative_spanish_readings:
  - El pronombre puede referirse al rey de Babilonia y a los caldeos, es decir, a las fuerzas enemigas que Dios introduciría en la ciudad.
  rationale: La secuencia inmediata en hebreo une la acción de volver atrás las armas con la de reunir "las" en la ciudad; por cercanía sintáctica y coherencia del oráculo, el referente principal son las armas. La alternativa queda preservada porque es gramaticalmente posible y aparece en la tradición de traducción.
  doctrine_reference: Jeremías 21:4; lectura sintáctica del antecedente cercano
translation_notes:
  revision_awareness: La revisión más reciente indicó concordancia alta y sin cambios necesarios; se mantiene la lectura principal tradicional del audit trail y se conserva la ambigüedad documentada en nota.
  spanish_consistency_notes:
  - Se usa "Yahvé" para el Tetragrámaton, conforme al estándar del proyecto.
  - '"Caldeos" se conserva como etnónimo histórico, no se sustituye por "babilonios".'
  - '"En medio de" se retiene para reflejar el valor espacial de תּוֹךְ.'
  - La nota textual se ancla en el verbo final para preservar la ambigüedad del referente del pronombre.
