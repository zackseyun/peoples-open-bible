review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: voto de alabanza a Yahvé, motivo introducido por כִּי, rescate expresado con la metáfora de sacar hacia arriba, y la negación del triunfo enemigo. Sin embargo, «me has sacado» queda algo demasiado general para דִלִּיתָנִי y «se alegren sobre mí» suena poco idiomático en español para el valor de לִי como triunfo hostil.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero hay dos puntos mejorables para naturalidad y fidelidad: conviene hacer más explícita la idea ascendente de דלה con «me has sacado de lo hondo» o similar, y sustituir «sobre mí» por una expresión idiomática de triunfo enemigo, como «a costa mía». Además, el pronombre inicial «Yo» es innecesario y ligeramente enfático sin apoyo en el hebreo.'
  glossary_alignment: Alineado con la política del proyecto en «Yahvé». «Exaltaré» para אֲרוֹמִמְךָ está bien. No hay conflictos con terminología doctrinal mayor. La nota léxica sobre דִלִּיתָנִי es pertinente, pero el texto principal puede acercarse mejor al matiz de extracción ascendente sin volverse pesado.
  issues:
  - severity: medium
    issue: «me has sacado» debilita el matiz concreto de דִלִּיתָנִי
    rationale: El verbo evoca sacar algo hacia arriba, como de un pozo. «Me has sacado» es posible, pero demasiado amplio; una formulación como «me has sacado de lo hondo» conserva mejor la imagen sin sobretraducir.
  - severity: medium
    issue: «se alegren sobre mí» es poco idiomático en español
    rationale: Aunque calca el inglés «over me», en español suena extraño. El sentido es triunfo hostil respecto del salmista; «se alegren a costa mía» o «triunfen sobre mí» comunica mejor ese valor.
  - severity: low
    issue: El pronombre «Yo» introduce énfasis innecesario
    rationale: El hebreo no requiere énfasis contrastivo aquí; «Te exaltaré» suena más natural y litúrgicamente fluido en español.
  revised_spanish_text: Te exaltaré[a], Yahvé, porque me has sacado de lo hondo y no has permitido que mis enemigos se alegren a costa mía.
  revised_footnotes:
  - marker: a
    text: O «me has levantado»; el verbo hebreo evoca literalmente sacar algo hacia arriba, como de un pozo.
    reason: lexical_alternative
  revision_rationale: Se ajusta el español para reflejar mejor la metáfora concreta de דִלִּיתָנִי y para expresar de manera idiomática el triunfo hostil implicado en לִי. También se elimina el «Yo» inicial por naturalidad, sin cambiar el sentido.
