translation:
  language: es
  text: 'Jesús dijo: «Bienaventurados[a] los pobres[b], porque de ustedes es el reino[c] de los cielos[d].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Bienaventurados» también podría traducirse «Dichosos» o «Felices», pero la fórmula de bienaventuranza y el tono evaluativo favorecen «Bienaventurados».
    reason: lexical_alternative
  - marker: b
    text: El copto usa un singular genérico («el pobre») con sentido colectivo; en español se vierte naturalmente en plural.
    reason: dialect_note
  - marker: c
    text: ⲡⲙⲛⲧⲣⲣⲟ también puede traducirse «reinado» o «soberanía»; «reino» sigue la decisión auditada por su sentido de realidad presente.
    reason: lexical_alternative
  - marker: d
    text: La expresión copta es plural («de los cielos»), no «del cielo»; se conserva el plural explícito del original.
    reason: source_note
lexical_decisions:
- source_word: ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ
  english_pob_choice: Jesus said
  chosen_spanish: Jesús dijo
  alternatives_spanish:
  - Dijo Jesús
  - Jesús habló diciendo
  lexicon: Crum s.v. ⲡⲉϫⲉ; Gramática coptológica sobre ϫⲉ con fórmula introductoria de discurso
  rationale: La fórmula introduce el discurso de manera directa y natural en español. ‘Jesús dijo’ conserva la función del introductor sin añadir contenido ajeno.
- source_word: ϩⲉⲛⲙⲁⲕⲁⲣⲓⲟⲥ
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Dichosos
  - Felices
  lexicon: Crum s.v. ⲙⲁⲕⲁⲣⲓⲟⲥ; uso beatitudinal
  rationale: El tono es el de una bienaventuranza; ‘Bienaventurados’ preserva el registro evaluativo y tradicional sin reducirlo a mera emoción momentánea.
- source_word: ⲡϩⲏⲕⲉ
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - el pobre
  - los necesitados
  - los indigentes
  lexicon: Crum s.v. ⲡϩⲏⲕⲉ ‘poor person’
  rationale: Aunque el coptico es singular genérico, en español conviene el plural colectivo para expresar la clase social/condición general, como en la versión inglesa auditada.
- source_word: ⲡⲙⲛⲧⲣⲣⲟ
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el reinado
  - la soberanía
  lexicon: Layton NHS; Crum s.v. ⲙⲛⲧⲣⲣⲟ
  rationale: Sigo la decisión auditada de ‘kingdom/reino’ porque en Tomás designa una realidad presente de dominio o ámbito, no solo la abstracción de ‘kingship’. En español ‘reino’ es la opción más idiomática y mantiene esa amplitud.
- source_word: ⲛⲡⲡⲉ
  english_pob_choice: of the heavens
  chosen_spanish: de los cielos
  alternatives_spanish:
  - del cielo
  - de los cielos
  lexicon: Crum s.v. ⲡⲉ ‘sky, heaven’; plural Thomasine note
  rationale: El coptico marca plural. En español bíblico, ‘los cielos’ reproduce ese plural y es claro para lectores eclesiales; ‘de los cielos’ refleja también la pluralidad explícita del original.
theological_decisions:
- issue: Traducción de ⲡⲙⲛⲧⲣⲣⲟ en Thomas (dominio presente vs. abstracción de soberanía)
  english_pob_reading: ‘kingdom’ was chosen over ‘kingship’ to capture Thomasine usage as a present, perceivable reality.
  chosen_spanish_reading: ‘reino’
  alternative_spanish_readings:
  - ‘reinado’
  - ‘soberanía’
  - ‘realeza’
  rationale: En español, ‘reino’ comunica mejor la realidad concreta y accesible que Thomas suele describir. ‘Reinado’ o ‘soberanía’ podrían sonar más abstractos y desplazar el matiz de ámbito/presencia que la revisión auditada quiso proteger.
  doctrine_reference: Uso Thomasino de la ‘basileia’/ⲙⲛⲧⲣⲣⲟ como realidad presente
- issue: Referencia a ‘los cielos’ en plural
  english_pob_reading: ‘of the heavens’ reproduces the explicit plural in Coptic and should not be conflated with ‘of God’.
  chosen_spanish_reading: ‘de los cielos’
  alternative_spanish_readings:
  - ‘del cielo’
  - ‘del Cielo’
  rationale: Mantengo el plural explícito para no neutralizar la forma Thomasina. ‘Del cielo’ perdería esa señal; ‘del Cielo’ podría introducir una mayúscula teológica no exigida por el texto.
  doctrine_reference: Pluralidad lexical de ⲡⲡⲉ en Tomás
- issue: Beatitud y tono evaluativo
  english_pob_reading: ‘Blessed’ favored over ‘Happy’ or ‘How fortunate’.
  chosen_spanish_reading: ‘Bienaventurados’
  alternative_spanish_readings:
  - ‘Dichosos’
  - ‘Felices’
  rationale: La forma de bienaventuranza tiene peso litúrgico y exegético; ‘Bienaventurados’ mantiene ese registro mejor que opciones más coloquiales.
  doctrine_reference: Forma beatitudinal en tradición sinóptica y Tomás
translation_notes:
  revision_awareness: He tenido en cuenta la revisión más reciente, que mantuvo sin cambios la decisión de traducir ⲡⲙⲛⲧⲣⲣⲟ como ‘kingdom/reino’ en lugar de ‘kingship/reinado’, por su uso tomasino como realidad presente. La redacción española sigue esa decisión y conserva también el plural explícito de ‘los cielos’.
  spanish_consistency_notes:
  - Se mantiene el vocabulario bíblico habitual ‘Bienaventurados’ para la fórmula beatitudinal.
  - ‘Reino’ se usa de manera consistente para ⲡⲙⲛⲧⲣⲣⲟ en este dicho.
  - Se conserva el plural ‘cielos’ para reflejar la forma coptica explícita.
  - No se introduce ‘Dios’, conforme al texto base de Tomás y al audit trail inglés.
