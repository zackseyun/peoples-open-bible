translation:
  language: es
  text: 'Así dirás a ellos[a]: «Así dice el Señor Yahvé: Vivo yo; ciertamente los que están en las ruinas caerán a espada, y al que esté sobre la faz del campo[b] lo he entregado a los animales salvajes para que lo devoren[c], y los que estén en las fortalezas y en las cuevas morirán de peste[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a ellos».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sobre la faz del campo», una manera más literal de conservar el matiz de superficie y exposición del original.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «lo he dado como alimento a los animales salvajes». El hebreo usa un sufijo singular, probablemente con valor distributivo.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «plaga».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה תֹאמַר ... כֹה אָמַר
  english_pob_choice: Thus you shall say ... Thus says
  chosen_spanish: Así dirás ... Así ha dicho
  alternatives_spanish:
  - Esto dirás ... Esto ha dicho
  - De esta manera dirás ... De esta manera ha dicho
  lexicon: HALOT
  rationale: Conserva la fórmula profética de envío y la cadencia solemne en español sin volverla rígida. «Así dirás» y «Así ha dicho» reflejan bien el paralelismo del hebreo.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Adonay Yahvé
  alternatives_spanish:
  - el Señor Yahvé
  - Señor Yahvé
  lexicon: HALOT
  rationale: Se conserva el título compuesto y el nombre divino como nombre propio, según la convención del proyecto para יְהוָה. «Adonay Yahvé» evita ocultar el Tetragrámaton y mantiene el peso del título.
- source_word: חַי אָנִי
  english_pob_choice: As I live
  chosen_spanish: Vivo yo
  alternatives_spanish:
  - Tan cierto como que vivo
  - Por mi vida
  lexicon: HALOT
  rationale: Es la fórmula de juramento divina. «Vivo yo» es breve, idiomática y reproduce la afirmación enfática del hebreo sin añadir explicación.
- source_word: אִם לֹא
  english_pob_choice: surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - en verdad
  - de seguro
  lexicon: HALOT
  rationale: En este contexto no introduce condición, sino una aseveración enfática. «Ciertamente» comunica bien el valor de refuerzo del hebreo.
- source_word: אֲשֶׁר בֶּחֳרָבוֹת
  english_pob_choice: those who are in the ruins
  chosen_spanish: los que están en las ruinas
  alternatives_spanish:
  - los que están en los lugares desolados
  - los que habitan entre ruinas
  lexicon: HALOT
  rationale: «Ruinas» es la equivalencia natural y concreta para חֳרָבוֹת en este contexto de juicio.
- source_word: בַּחֶרֶב יִפֹּלוּ
  english_pob_choice: will fall by the sword
  chosen_spanish: caerán a espada
  alternatives_spanish:
  - caerán por la espada
  - morirán a espada
  lexicon: HALOT
  rationale: «Caerán a espada» reproduce la expresión bíblica clásica y mantiene la fuerza idiomática del hebreo. Es más fiel al giro que una paráfrasis más explicativa.
- source_word: אֲשֶׁר עַל פְּנֵי הַשָּׂדֶה
  english_pob_choice: whoever is on the face of the field
  chosen_spanish: el que esté sobre la faz del campo
  alternatives_spanish:
  - el que esté en la superficie del campo
  - el que esté en el campo abierto
  lexicon: HALOT
  rationale: «Faz del campo» sigue de cerca פְּנֵי הַשָּׂדֶה y conserva el matiz de exposición en la superficie. Aunque menos común, es transparente y auditable.
- source_word: לַחַיָּה
  english_pob_choice: to the wild animals
  chosen_spanish: a las bestias
  alternatives_spanish:
  - a los animales salvajes
  - a las fieras
  lexicon: HALOT
  rationale: Se opta por «bestias» porque refleja el registro bíblico y la agencia de juicio del término sin suavizarlo.
- source_word: נְתַתִּיו לְאָכְלוֹ
  english_pob_choice: I have given to be devoured
  chosen_spanish: lo he dado para que lo devoren
  alternatives_spanish:
  - lo he dado como alimento
  - lo he dado para comerlo
  lexicon: HALOT
  rationale: 'El hebreo tiene un sufijo singular con fuerza distributiva; en español se resuelve con una construcción natural que conserva el sentido: haberlo entregado para ser devorado.'
- source_word: בַּמְּצָדוֹת
  english_pob_choice: in the strongholds
  chosen_spanish: en las fortalezas
  alternatives_spanish:
  - en los baluartes
  - en los refugios fortificados
  lexicon: HALOT
  rationale: «Fortalezas» es una equivalencia clara y amplia para מְצָדוֹת, sin especificar más de lo que el texto dice.
- source_word: וּבַמְּעָרוֹת
  english_pob_choice: and in the caves
  chosen_spanish: y en las cuevas
  alternatives_spanish:
  - y en las cavernas
  lexicon: HALOT
  rationale: Coincide directamente con el valor léxico de מְעָרוֹת y suena natural en español.
- source_word: בַּדֶּבֶר יָמוּתוּ
  english_pob_choice: will die by pestilence
  chosen_spanish: morirán de peste
  alternatives_spanish:
  - morirán por peste
  - morirán de pestilencia
  lexicon: HALOT
  rationale: «Peste» comunica el juicio epidémico del hebreo דֶּבֶר en un español bíblico pero claro. Se evita una forma excesivamente técnica que oscurezca la lectura.
theological_decisions:
- issue: Render of the divine name יְהוָה in the compound title
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Adonay Yahvé
  alternative_spanish_readings:
  - el Señor Yahvé
  - Señor Yahvé
  rationale: El proyecto español sigue la decisión documental de representar יְהוָה como «Yahvé», sin enmascararlo como «SEÑOR». En el título compuesto con אֲדֹנָי se preserva la duplicidad del hebreo mediante «Adonay Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh/Yahvé'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail en inglés, que afinó la frase correspondiente a עַל־פְּנֵי הַשָּׂדֶה hacia una formulación más cercana a «on the face of the field». La redacción española conserva ese ajuste con «sobre la faz del campo».
  spanish_consistency_notes:
  - Se mantuvo Yahvé como representación del Tetragrámaton, conforme al estándar del proyecto.
  - Se prefirió un registro bíblico claro y digno, evitando calcos innecesarios pero conservando las fórmulas proféticas y de juramento.
  - «Bestias» se eligió deliberadamente para sostener el tono de juicio del texto; no se suavizó a «animales» en el texto principal.
