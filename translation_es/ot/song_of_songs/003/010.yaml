translation:
  language: es
  text: Hizo sus columnas de plata, su parte trasera[a] de oro, su asiento de púrpura[b]; su interior estaba incrustado con amor[c] por las hijas de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su base» o «su soporte»; el término hebreo es raro e incierto en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O «su carroza»; el término hebreo puede referirse de manera más amplia al lugar de montar o a la estructura de la litera.
    reason: lexical_alternative
  - marker: c
    text: O «estaba pavimentado con amor». La expresión hebrea es inusual y probablemente poética; presenta el interior como lujosamente adornado.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמּוּדָיו
  english_pob_choice: its pillars
  chosen_spanish: sus columnas
  alternatives_spanish:
  - sus pilares
  - sus postes
  lexicon: HALOT
  rationale: En español, «columnas» conserva la imagen arquitectónica y es natural para una litera o palanquín. «Pilares» también sería posible, pero «columnas» fluye mejor en lectura pública sin perder el sentido del hebreo.
- source_word: עָשָׂה
  english_pob_choice: He made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Fabricó
  - Construyó
  lexicon: HALOT
  rationale: El verbo común עשה se rinde de forma directa con «hizo». Mantiene el sujeto implícito masculino singular del contexto y evita sobreinterpretar la acción.
- source_word: כֶסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - plata fina
  lexicon: HALOT
  rationale: «Plata» es el equivalente estándar y claro en español para el metal.
- source_word: רְפִידָתוֹ
  english_pob_choice: its back
  chosen_spanish: su respaldo
  alternatives_spanish:
  - su dorso
  - su parte trasera
  - su base
  lexicon: HALOT
  rationale: La raíz es rara y la referencia del objeto es incierta. La decisión española sigue la revisión inglesa que pasó de «backrest» a «back», pero «respaldo» comunica de modo natural una parte trasera o soporte del asiento sin forzar demasiado el texto.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  lexicon: HALOT
  rationale: «Oro» es el equivalente normal y preciso del metal en español.
- source_word: מֶרְכָּבוֹ
  english_pob_choice: its seat
  chosen_spanish: su asiento
  alternatives_spanish:
  - su litera
  - su carroza
  - su lugar de montar
  lexicon: HALOT
  rationale: En este contexto poético de una litera real, «asiento» reproduce la función del lugar donde se va sentado. «Litera» sería más interpretativa; se conserva una formulación más cercana y sobria.
- source_word: אַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - tela púrpura
  lexicon: HALOT
  rationale: «Púrpura» conserva tanto el color como la connotación de lujo del término hebreo, y es más fiel al registro poético que «morado».
- source_word: תּוֹכוֹ
  english_pob_choice: its interior
  chosen_spanish: su interior
  alternatives_spanish:
  - su parte interior
  - su dentro
  lexicon: HALOT
  rationale: «Su interior» es el español natural y corresponde directamente al sentido del hebreo.
- source_word: רָצוּף
  english_pob_choice: was inlaid
  chosen_spanish: estaba incrustado
  alternatives_spanish:
  - estaba pavimentado
  - estaba recubierto
  lexicon: HALOT
  rationale: El participio expresa algo colocado o trabajado sobre la superficie. «Incrustado» comunica bien la idea de adorno artesanal; se mantiene la tensión del hebreo sin normalizarla excesivamente. La alternativa tradicional «pavimentado» queda preservada implícitamente por el contexto, pero no se adopta por sonar menos natural en español.
- source_word: אַהֲבָה
  english_pob_choice: with love
  chosen_spanish: de amor
  alternatives_spanish:
  - con amor
  lexicon: HALOT
  rationale: La lectura del texto masorético conserva «amor» en sentido literal y poético. En español, «incrustado de amor» reproduce la construcción nominal y mantiene la rareza expresiva del hebreo sin explicarla en exceso.
- source_word: מִ/בְּנ֖וֹת יְרוּשָׁלִָֽם
  english_pob_choice: by the daughters of Jerusalem
  chosen_spanish: por las hijas de Jerusalén
  alternatives_spanish:
  - de las hijas de Jerusalén
  - por las doncellas de Jerusalén
  lexicon: HALOT
  rationale: La preposición admite valor de agente; «por» funciona bien en español y conserva el papel coral recurrente de las hijas de Jerusalén en el Cantar.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «backrest» por «back» para una correspondencia más directa con el hebreo. La redacción española sigue esa línea con «respaldo», que mantiene la idea de la parte posterior/soporte sin añadir más interpretación que la necesaria. También se conserva la rareza de «incrustado de amor», reflejando la decisión inglesa de no suavizar la expresión.
  spanish_consistency_notes:
  - Se mantiene «Jerusalén» con mayúscula según uso español.
  - Se usa «púrpura» para preservar el matiz de lujo del término hebreo.
  - No se sustituye «amor» por una glosa explicativa, para no borrar la tensión poética del original.
  - La traducción adopta un tono formal y publicable, pero evita recalcar con demasiada precisión partes del mueble cuya identificación sigue siendo incierta.
