    issue: La frase 'porque el sorteo les pertenecía' no representa con precisión הַגּוֹרָל.
    rationale: En español, 'sorteo' suele referirse al acto de echar suertes, mientras que el hebreo aquí se refiere más naturalmente al lote/porción que les tocó. La construcción actual es además poco idiomática.
  revised_spanish_text: Estas eran sus moradas, según sus asentamientos dentro de su territorio[a], para los hijos de Aarón, de la familia de los coatitas; porque el lote era de ellos.
