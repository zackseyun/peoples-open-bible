revisions:
- from: ¿No fue Acan hijo de Zérah quien actuó infielmente en lo dedicado al anatema[a], y vino la ira sobre toda la congregación de Israel? Y aquel hombre no pereció solo en su iniquidad[b].
  to: ¿No fue Acán hijo de Zéraj quien actuó infielmente en lo dedicado a destrucción[a], y vino la ira sobre toda la congregación de Israel? Y aquel hombre no pereció solo en su iniquidad[b].
  rationale: Se ajusta חֵרֶם a «lo dedicado a destrucción» para seguir mejor la decisión léxica principal del POB y sonar más natural en español. Se normalizan los nombres a formas bíblicas españolas más reconocibles («Acán», «Zéraj»). Se conserva intacta la estructura retórica, la sobriedad sobre la ira implícitamente divina, y la cláusula final cercana al hebreo con su nota de lectura alternativa.
  reviewer_model: gpt-5.4
