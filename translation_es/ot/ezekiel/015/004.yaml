revisions:
- from: Mira[a], se entrega al fuego como combustible. El fuego ha consumido ambos extremos de ella, y su medio está carbonizado[b]. ¿Será apta para alguna obra?
  to: Mira[a], es dado al fuego como combustible. El fuego ha consumido sus dos extremos, y su parte de en medio está carbonizada. ¿Será apto para algún trabajo?[b]
  rationale: Se corrige la sobreespecificación de género ('de ella'), se mejora la precisión de לִמְלָאכָה con 'trabajo', y se reubica la nota lexical [b] al lugar correspondiente en la cláusula final. También se ajusta el pasivo inicial para reflejar mejor נִתַּן y mantener un tono más cercano al hebreo.
