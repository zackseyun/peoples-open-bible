translation:
  language: es
  text: 'Así dice Yahvé, tu Redentor, el que te formó desde el vientre: yo soy Yahvé, que hago todas las cosas, que yo solo extendí los cielos, y extendí la tierra por mí mismo[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, siguiendo otra interpretación de las difíciles palabras finales del hebreo, «¿quién estaba conmigo?». En cualquier caso, el sentido es que Yahvé creó solo, sin ayuda de nadie.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se conserva como nombre propio divino. En español, el equivalente POB proyectado es 'Yahvé', que mantiene la referencia al nombre revelado sin sustituirlo por un título litúrgico.
- source_word: גֹּאֲלֶךָ
  english_pob_choice: your Redeemer
  chosen_spanish: tu Redentor
  alternatives_spanish:
  - tu rescatador
  - tu pariente redentor
  lexicon: HALOT
  rationale: גאל expresa la acción de rescatar/redimir con peso pactal y familiar. 'Redentor' es el equivalente español más natural y conserva esa carga teológica sin sobredeterminar el matiz de parentesco.
- source_word: וְיֹצֶרְךָ
  english_pob_choice: who formed you
  chosen_spanish: el que te formó
  alternatives_spanish:
  - tu formador
  - el que te modeló
  lexicon: HALOT
  rationale: יצר comunica formar/modelar con imagen de alfarero o artesano. 'El que te formó' refleja bien el participio hebreo y su fuerza descriptiva.
- source_word: מִבָּטֶן
  english_pob_choice: from the womb
  chosen_spanish: desde el vientre
  alternatives_spanish:
  - desde el seno materno
  - desde el nacimiento
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'desde el vientre'. En español, 'vientre' puede sonar algo duro; 'desde el vientre' conserva la literalidad y la imagen prenatal, mientras que 'seno materno' sería más explicativo que el original.
- source_word: עֹשֶׂה כֹּל
  english_pob_choice: who makes all things
  chosen_spanish: que hago todas las cosas
  alternatives_spanish:
  - que hace todo
  - creador de todo
  lexicon: HALOT
  rationale: עשה כל expresa agencia creadora universal. En primera persona, 'que hago todas las cosas' refleja la sintaxis del discurso directo y mantiene la amplitud totalizadora del hebreo.
- source_word: נֹטֶה שָׁמַיִם
  english_pob_choice: who alone stretched out the heavens
  chosen_spanish: que solo extendí los cielos
  alternatives_spanish:
  - que extendí los cielos yo solo
  - que desplegué los cielos
  lexicon: HALOT
  rationale: נטה con 'cielos' se traduce naturalmente con 'extender'. Se eligió 'solo' para conservar la exclusividad de לְבַדִּי, y 'extendí' para mantener el paralelismo verbal en español.
- source_word: לְבַדִּי
  english_pob_choice: who alone
  chosen_spanish: solo
  alternatives_spanish:
  - yo solo
  - únicamente
  lexicon: HALOT
  rationale: 'El adverbio de exclusividad se expresa mejor en español dentro de la cláusula verbal: ''que solo extendí''. Así se conserva el énfasis en la agencia exclusiva de Yahvé.'
- source_word: רֹקַע הָאָרֶץ
  english_pob_choice: who spread out the earth
  chosen_spanish: desplegué la tierra
  alternatives_spanish:
  - extendí la tierra
  - aplané la tierra
  lexicon: HALOT
  rationale: רקע puede significar golpear/laminar o extender una superficie. 'Desplegué la tierra' comunica la imagen de expansión creadora sin cargar el español con un tecnicismo metálico innecesario.
- source_word: מֵאִתִּי
  english_pob_choice: by myself
  chosen_spanish: por mí mismo
  alternatives_spanish:
  - yo solo
  - sin ayuda
  lexicon: HALOT
  rationale: La frase final difícil se entiende en el contexto como afirmación de agencia exclusiva. 'Por mí mismo' preserva esa idea y mantiene abierta la tensión del hebreo, sin eliminar la alternativa textual.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio de Dios en vez de una sustitución reverencial. Esto sigue la línea doctrinal POB de transliterar el Tetragrámaton y evita enmascarar el texto original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Cláusula final difícil del hebreo
  english_pob_reading: by myself / who was with me?
  chosen_spanish_reading: por mí mismo
  alternative_spanish_readings:
  - ¿quién estaba conmigo?
  - conmigo
  rationale: 'La lectura principal preserva la tesis contextual: Yahvé creó sin ayuda. La forma hebrea final sigue siendo difícil, por lo que la traducción no la resuelve de manera absoluta y deja espacio a la alternativa textual.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión que unificó la estructura appositiva: ''tu Redentor, el que te formó desde el vientre''. También conserva la tensión del final hebreo difícil, como en el audit trail inglés, sin sobreexplicarlo en el cuerpo principal.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - '''Redentor'' mantiene el término teológico establecido para גאל.'
  - '''Desde el vientre'' conserva la imagen prenatal del hebreo.'
  - La cláusula final se traduce con 'por mí mismo' para expresar agencia exclusiva sin eliminar la variante textual.
  - Se evitó 'Cristo' o 'SEÑOR' para no introducir sustituciones no justificadas por el texto fuente.
