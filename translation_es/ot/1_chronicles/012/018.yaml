base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/012/018.yaml
  text: David went out before them and answered and said to them[a], “If you have come to me in peace to help me, my heart will be united with you; but if you have come to betray me to my enemies, though there is no violence in my hands[b], may the God of our fathers see and judge.”
  footnotes:
  - marker: a
    text: Or 'to deceive me.' The Hebrew verb can denote treacherous deception; 'betray' is chosen here because the context involves being handed over to enemies.
    reason: lexical_alternative
  - marker: b
    text: Or 'see and rebuke' / 'see and decide.' The final verb can carry the sense of reproving, arbitrating, or rendering judgment.
    reason: alternative_reading
