translation:
  language: es
  text: Entonces la virgen[a] se regocijará en la danza, y los jóvenes y los hombres mayores[b] juntos; y convertiré su duelo en alegría[c], y los consolaré y haré que se regocijen de su dolor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la doncella» o «la joven mujer». El singular hebreo probablemente funciona de manera representativa para las jóvenes de la comunidad.
    reason: lexical_alternative
  - marker: b
    text: O «los ancianos», si se toma como rol social más que como contraste de edad; aquí el paralelo con «los jóvenes» favorece «los hombres mayores».
    reason: lexical_alternative
  - marker: c
    text: O «en gozo» para «en alegría».
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese tiempo
  lexicon: HALOT
  rationale: Marca la secuencia temporal y el resultado de las promesas de restauración; «Entonces» es natural y directo en español.
- source_word: תִּשְׂמַח
  english_pob_choice: will rejoice
  chosen_spanish: se alegrará
  alternatives_spanish:
  - se regocijará
  - gozará
  lexicon: HALOT
  rationale: El verbo expresa alegría futura. «Se alegrará» es claro y digno en español, aunque «regocijarse» mantiene más de cerca el tono celebrativo del contexto.
- source_word: בְּתוּלָה
  english_pob_choice: the virgin
  chosen_spanish: la virgen
  alternatives_spanish:
  - la doncella
  - la joven mujer
  lexicon: HALOT
  rationale: El sustantivo puede referirse a una joven virgen o doncella. Se conserva «la virgen» como equivalente léxico más directo, manteniendo el singular representativo del hebreo.
- source_word: בְּמָחוֹל
  english_pob_choice: in the dance
  chosen_spanish: en la danza
  alternatives_spanish:
  - bailando
  - con danza
  lexicon: HALOT
  rationale: La preposición con el sustantivo indica el ámbito o expresión del gozo. «En la danza» conserva la imagen concreta sin sonar forzado.
- source_word: וּבַחֻרִים
  english_pob_choice: young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los varones jóvenes
  lexicon: HALOT
  rationale: El término designa varones jóvenes en la plenitud de la vida. «Los jóvenes» comunica bien la referencia generacional y permite la coordinación natural con «los ancianos».
- source_word: וּזְקֵנִים
  english_pob_choice: old men
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los viejos
  - los mayores
  lexicon: HALOT
  rationale: Aunque puede significar «ancianos» como edad u oficio, aquí el contraste con «los jóvenes» favorece el sentido de edad. «Los ancianos» mantiene ese contraste en español.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - todos juntos
  - a la vez
  lexicon: HALOT
  rationale: Expresa participación común. «Juntos» es la forma más natural y concisa en español.
- source_word: וְהָפַכְתִּי
  english_pob_choice: and I will turn
  chosen_spanish: y convertiré
  alternatives_spanish:
  - y transformaré
  - y cambiaré
  lexicon: HALOT
  rationale: El verbo indica un cambio de estado de una cosa a otra. «Convertiré» comunica bien la transformación idiomática sin perder naturalidad.
- source_word: אֶבְלָם
  english_pob_choice: their mourning
  chosen_spanish: su lamento
  alternatives_spanish:
  - su duelo
  - su duelo fúnebre
  lexicon: HALOT
  rationale: אֵבֶל denota duelo o luto, y puede incluir la expresión audible del dolor. «Lamento» conserva el tono de duelo colectivo y suena más fluido junto a «alegría».
- source_word: לְשָׂשׂוֹן
  english_pob_choice: into gladness
  chosen_spanish: en alegría
  alternatives_spanish:
  - en gozo
  - en regocijo
  lexicon: HALOT
  rationale: El sustantivo expresa gozo exultante. «Alegría» es una opción clara y amplia; en contexto funciona como equivalente natural de «gladness».
- source_word: וְנִחַמְתִּים
  english_pob_choice: and I will comfort them
  chosen_spanish: y los consolaré
  alternatives_spanish:
  - y los confortaré
  - y los animaré
  lexicon: HALOT
  rationale: El piel de נחם aquí es consolar/acompañar en la aflicción. «Consolaré» es el equivalente más directo y corriente en español.
- source_word: וְשִׂמַּחְתִּים
  english_pob_choice: and make them rejoice
  chosen_spanish: y los haré regocijarse
  alternatives_spanish:
  - y los alegraré
  - y les daré gozo
  lexicon: HALOT
  rationale: La forma causativa indica que Dios provoca la alegría. «Los haré regocijarse» conserva con fuerza esa causación y enlaza con el verbo inicial de alegría.
- source_word: מִיגוֹנָם
  english_pob_choice: from their sorrow
  chosen_spanish: de su tristeza
  alternatives_spanish:
  - de su dolor
  - a partir de su aflicción
  lexicon: HALOT
  rationale: יָגוֹן es tristeza, dolor o aflicción. «De su tristeza» es idiomático en español y mantiene la idea de salida o transición desde ese estado.
theological_decisions:
- issue: Singular representativo en בְּתוּלָה
  english_pob_reading: Retain the singular 'the virgin' as a collective/representative figure within the restored community.
  chosen_spanish_reading: Conservar el singular «la virgen» como figura representativa de las jóvenes de la comunidad restaurada.
  alternative_spanish_readings:
  - 'Traducir en plural: «las jóvenes»'
  - «la doncella» como adaptación más libre
  rationale: El hebreo usa un singular. Mantenerlo respeta la forma del texto y evita borrar la figura representativa documentada por el análisis del POB inglés.
  doctrine_reference: Principios de consistencia y fidelidad formal del proyecto POB; evitar suavizar una tensión lexical documentada.
- issue: Contraste generacional en וּזְקֵנִים
  english_pob_reading: Translate as 'old men' rather than 'elders.'
  chosen_spanish_reading: Traducir como «los ancianos» para reflejar el contraste con «los jóvenes».
  alternative_spanish_readings:
  - «los viejos»
  - «los mayores»
  - «los ancianos» como oficio comunitario
  rationale: En español, «ancianos» comunica mejor la oposición de edad respecto de «los jóvenes» sin imponer una función institucional que el contexto no exige. Aunque el inglés POB eligió «old men», en español «ancianos» logra el mismo valor contrastivo con dignidad natural.
  doctrine_reference: Evitar importar un sentido institucional no requerido por el paralelismo del texto.
translation_notes:
  revision_awareness: 'El contexto de auditoría en inglés indica un acuerdo alto y sin revisiones sustanciales en la versión base. La presente propuesta conserva esa lectura, ajustando al español las elecciones léxicas clave y manteniendo las tensiones documentadas: singular representativo en בְּתוּלָה, contraste generacional en זְקֵנִים, y la cadena verbal de gozo/consuelo como transformaciones divinas sucesivas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo o el griego lo requieran explícitamente; este versículo no lo contiene.
  - Se conserva «regocijarse» para reflejar la continuidad con «alegría» y con el verbo causativo hebreo.
  - «Ancianos» se emplea en sentido etario, no como cargo eclesial.
  - 'La puntuación mantiene la coordinación hebrea: sujeto singular representativo, luego pares plurales, luego acciones divinas en serie.'
