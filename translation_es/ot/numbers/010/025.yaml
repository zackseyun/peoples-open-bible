  language: en
  yaml_path: translation/ot/numbers/010/025.yaml
  text: Then the banner of the camp of the sons of Dan set out[a], serving as the rear guard for all the camps by their divisions[c][b]; and over its company was Ahiezer the son of Ammishaddai.
