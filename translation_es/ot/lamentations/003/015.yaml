  revision_rationale: 'Se conserva el texto principal porque es fiel y natural. Se corrige únicamente la nota para que siga con precisión la decisión léxica auditada en inglés: las alternativas pertenecen al segundo verbo y mantienen «ajenjo» como imagen concreta de לענה.'
