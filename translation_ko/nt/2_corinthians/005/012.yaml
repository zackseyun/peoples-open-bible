  text: We are not commending ourselves to you again, but giving you an opportunity to boast about us, so that you may have an answer for those who boast in outward appearance and not in heart.
  footnotes:
  - marker: a
    text: Or 'an occasion for boasting about us.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'those who boast in face and not in heart,' that is, who boast in outward appearance rather than inward reality.
