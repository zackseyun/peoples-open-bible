translation:
  language: es
  text: 'Los hijos de Nearías: Elioenai[a], Hezequías y Azricam—tres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "hijo de Nearías"; en este contexto genealógico funciona como encabezado para varios descendientes, por eso se traduce "Los hijos de Nearías".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בֶן
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y el hijo de
  - El hijo de
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, en este contexto genealógico introduce una lista colectiva de descendientes. En español, "Los hijos de" comunica mejor la función de encabezado familiar sin perder el dato genealógico que culmina en "tres".
- source_word: נְעַרְיָה
  english_pob_choice: Neariah
  chosen_spanish: Nearías
  alternatives_spanish:
  - Neariah
  lexicon: Nombre propio (transliteración)
  rationale: Es un nombre propio; se translitera al español siguiendo la forma normalizada de los nombres bíblicos, conservando la referencia a la misma persona.
- source_word: אֶלְיוֹעֵינַי
  english_pob_choice: Elioenai
  chosen_spanish: Elioenai
  alternatives_spanish:
  - Elihoenai
  lexicon: Nombre propio (transliteración)
  rationale: Se mantiene la forma de transliteración más reconocible y fiel al nombre hebreo, sin añadir adaptación interpretativa.
- source_word: וְחִזְקִיָּה
  english_pob_choice: Hezekiah
  chosen_spanish: Hezequías
  alternatives_spanish:
  - Hizquías
  - Hizquijah
  lexicon: Nombre propio (transliteración)
  rationale: En español bíblico estándar, la forma establecida es "Hezequías". Esta opción preserva la identificación del nombre con la tradición onomástica castellana sin alterar el referente hebreo.
- source_word: וְעַזְרִיקָם
  english_pob_choice: and Azrikam
  chosen_spanish: y Azricam
  alternatives_spanish:
  - y Azrikam
  lexicon: Nombre propio (transliteración)
  rationale: Se translitera al español con grafía naturalizada "Azricam", manteniendo el valor de nombre propio y la conjunción coordinante.
- source_word: שְׁלֹשָׁה
  english_pob_choice: three
  chosen_spanish: tres
  alternatives_spanish:
  - tres
  lexicon: HALOT
  rationale: El cardinal resume el total de los descendientes enumerados y debe conservarse explícitamente en español, como en el hebreo y en la traducción auditada al inglés.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y la decisión auditada en inglés de leer וּבֶן como encabezado genealógico colectivo. Se mantuvo el número final "tres" para reflejar el cierre del verso.
  spanish_consistency_notes:
  - Se usa "hijos" en plural por la función genealógica del hebreo, en paralelo con la traducción POB en inglés.
  - Los nombres propios se conservan en transliteración española habitual.
  - Se emplea puntuación con dos puntos para introducir la lista nominal y raya para el cierre enfático del cardinal final.
