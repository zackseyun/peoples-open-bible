review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura y el sentido general del hebreo: alegría compartida con Jerusalén, personificación de la ciudad, y contraste con los que antes hacían duelo por ella. También preserva las dos notas léxicas del POB sobre אֶת y sobre el sustantivo cognado מָשׂוֹשׂ. Sin embargo, hay dos ajustes importantes: (1) «gócense en ella» suena menos natural y algo forzado en español eclesial actual; «alégrense en ella» o «regocíjense en ella» preserva mejor בָהּ sin extrañeza innecesaria. (2) El inglés auditado fue revisado de «exult» a «rejoice» por naturalidad; en español «exulten con ella en gozo» también suena demasiado rígido. Conviene una formulación más natural que aún preserve el énfasis hebreo.'
  spanish_quality_summary: 'El español es en general claro y digno, pero contiene giros algo poco naturales: «gócense en ella» y «exulten con ella en gozo». «Todos los que hacen duelo por ella» es comprensible, aunque algo pesado; «todos los que están de duelo por ella» o «todos los que hacen duelo sobre ella» serían opciones, pero la forma actual no exige corrección. La revisión propuesta mejora fluidez sin alejarse del original.'
  glossary_alignment: No hay términos del glosario maestro especialmente conflictivos en este versículo. La personificación de Jerusalén se conserva correctamente con «ella». La decisión de no usar una paráfrasis adverbial simple para מָשׂוֹשׂ es adecuada, pero la ejecución española debe suavizarse para mayor legibilidad.
  issues:
  - severity: medium
    issue: «gócense en ella» es poco natural en español actual
    rationale: Aunque formalmente posible, «gozarse en» con este objeto suena rígido y menos claro para lectores contemporáneos. «Alégrense en ella» mantiene la preposición hebrea ב y la imagen de Jerusalén personificada con mejor legibilidad.
  - severity: medium
    issue: «exulten con ella en gozo» resulta demasiado calcado
    rationale: El hebreo usa verbo + sustantivo cognado para énfasis, pero en español esta combinación suena dura. Dado que el English POB ya optó por una formulación más natural («rejoice with her in joy»), conviene reflejar esa naturalidad en español con «regocíjense con ella con gozo», manteniendo además la alternativa en nota.
  revised_spanish_text: Alégrense con Jerusalén y alégrense en ella[a], todos los que la aman; regocíjense con ella con gozo[b], todos los que hacen duelo por ella.
