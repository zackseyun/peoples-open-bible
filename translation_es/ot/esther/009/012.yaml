translation:
  language: es
  text: 'Entonces el rey dijo a la reina Ester[a]: «En Susa, la ciudadela, los judíos han matado y destruido a quinientos hombres, junto con los diez hijos de Amán. ¿Qué habrán hecho entonces en el resto de las provincias del rey? Ahora, ¿cuál es tu petición? Te será concedida. ¿Y cuál es tu petición adicional? Se hará».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué habrán hecho en el resto de las provincias del rey?». El hebreo puede leerse de forma más simple; «entonces» en el texto principal expresa la inferencia del rey a partir del informe de Susa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשׁוּשַׁן הַבִּירָה
  english_pob_choice: In Susa the citadel
  chosen_spanish: En Susa la ciudadela
  alternatives_spanish:
  - En la ciudadela de Susa
  - En Susa la fortaleza
  lexicon: HALOT
  rationale: בִּירָה designa un recinto fortificado o complejo real; «ciudadela» conserva esa fuerza mejor que «palacio» y suena natural en español. Se mantiene «Susa» como nombre propio del centro persa.
- source_word: הָרְגוּ ... וְאַבֵּד
  english_pob_choice: have killed and destroyed
  chosen_spanish: han matado y destruido
  alternatives_spanish:
  - han matado y aniquilado
  - han matado y arrasado
  lexicon: HALOT
  rationale: Los dos verbos intensifican la acción. «Destruido» conserva la amplitud de אבד sin volverlo demasiado interpretativo, y «matado» mantiene el primer golpe verbal de forma directa.
- source_word: חֲמֵשׁ מֵאוֹת אִישׁ
  english_pob_choice: five hundred men
  chosen_spanish: quinientos hombres
  alternatives_spanish:
  - quinientas personas
  - quinientos varones
  lexicon: HALOT
  rationale: אִישׁ está en singular distributivo tras el número; «hombres» refleja con precisión el valor masculino/combativo del contexto narrativo y evita neutralizar sin necesidad.
- source_word: וְאֵת עֲשֶׂרֶת בְּנֵי הָמָן
  english_pob_choice: along with the ten sons of Haman
  chosen_spanish: junto con los diez hijos de Amán
  alternatives_spanish:
  - y los diez hijos de Amán
  - además de los diez hijos de Amán
  lexicon: HALOT
  rationale: El acusativo נוסף con אֵת añade un segundo objeto; «junto con» expresa bien el valor aditivo en español y conserva el paralelo con el número anterior.
- source_word: בִּשְׁאָר מְדִינוֹת הַמֶּלֶךְ
  english_pob_choice: in the rest of the king’s provinces
  chosen_spanish: en el resto de las provincias del rey
  alternatives_spanish:
  - en las demás provincias del rey
  - en el resto de las provincias del rey
  lexicon: HALOT
  rationale: מְדִינוֹת en el marco persa son «provincias»; שְׁאָר es «resto». Se evita una paráfrasis más amplia para conservar el contraste geográfico con Susa.
- source_word: מֶה עָשׂוּ
  english_pob_choice: What then have they done
  chosen_spanish: ¿Qué habrán hecho entonces
  alternatives_spanish:
  - ¿Qué han hecho entonces?
  - ¿Qué habrán hecho?
  lexicon: HALOT
  rationale: La pregunta es inferencial y retórica. El futuro perfecto en español («habrán hecho») reproduce bien la inferencia del rey sin borrar el matiz de deducción que el inglés POB marcó con «then».
- source_word: שְּׁאֵלָתֵךְ
  english_pob_choice: your petition
  chosen_spanish: tu petición
  alternatives_spanish:
  - tu solicitud
  - tu ruego
  lexicon: HALOT
  rationale: En Ester, שְׁאֵלָה suele referirse a una petición formal al rey. «Petición» conserva ese registro cortesano en español mejor que un simple «pedido».
- source_word: וְיִנָּתֵן לָךְ
  english_pob_choice: It will be granted to you
  chosen_spanish: Te será concedida
  alternatives_spanish:
  - Te será dada
  - Se te concederá
  lexicon: HALOT
  rationale: El pasivo de נתן aquí funciona idiomáticamente como concesión de una solicitud. «Concedida» transmite el valor real en español de manera más natural que «dada».
- source_word: בַּקָּשָׁתֵךְ
  english_pob_choice: your further request
  chosen_spanish: tu ulterior solicitud
  alternatives_spanish:
  - tu petición adicional
  - tu siguiente solicitud
  lexicon: HALOT
  rationale: בַּקָּשָׁה se solapa con שְׁאֵלָה, pero aquí se distingue por el añadido de עוֹד. «Ulterior» preserva la secuencia y el carácter de petición adicional sin repetir exactamente el primer sustantivo.
- source_word: עוֹד
  english_pob_choice: further
  chosen_spanish: ulterior
  alternatives_spanish:
  - adicional
  - todavía
  lexicon: HALOT
  rationale: עוֹד marca una petición adicional. En español, «ulterior» funciona aquí como adjetivo de continuidad/añadidura y mantiene la relación con la pregunta anterior.
- source_word: וְתֵעָשׂ
  english_pob_choice: It will be done
  chosen_spanish: Se hará
  alternatives_spanish:
  - Se llevará a cabo
  - Será hecho
  lexicon: HALOT
  rationale: La pasiva resultante en contexto expresa ejecución de la petición. «Se hará» es conciso y fiel al hebreo sin sobreexplicar el agente.
theological_decisions:
- issue: Referencia al rey persa y lenguaje de concesión cortesana
  english_pob_reading: 'Royal petition language is rendered with courtly but plain English: petition, granted, done.'
  chosen_spanish_reading: 'Se usa un registro cortesano sobrio: «petición», «concedida», «se hará».'
  alternative_spanish_readings:
  - ruego / favor
  - pedido / dado
  rationale: El texto no plantea una tesis doctrinal; requiere conservar la etiqueta de corte propia del relato. El español debe sonar formal sin introducir lenguaje eclesiástico que no está en el hebreo.
  doctrine_reference: N/A — narrativo histórico-literario
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y no se registraron revisiones posteriores; el draft español refleja el estado estable del texto fuente y preserva el matiz inferencial de מֶה עָשׂוּ con una solución natural en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma de proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se conserva «Amán» con acentuación española estándar para el nombre propio.
  - Se usa «ciudadela» para בִּירָה en coherencia con el criterio del POB inglés.
  - Se evita el calco «será hecho» en favor de «se hará», más natural en español y suficientemente fiel al pasivo hebreo.
