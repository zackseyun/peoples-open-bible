    text: Or, 'proclaim, for his name is exalted.' The Hebrew conjunction can be read causally ('for') rather than as introducing the content of the proclamation ('that').
    reason: alternative_reading
  - marker: b
    text: Hebrew 'the LORD' represents the divine name YHWH; alternatively, 'Yahweh.'
    reason: lexical_alternative
