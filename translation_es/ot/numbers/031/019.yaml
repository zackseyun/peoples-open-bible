translation:
  language: es
  text: 'Y ustedes, acampen fuera del campamento por siete días. Todo el que haya matado a una persona, y todo el que haya tocado a un muerto[a], deben purificarse el tercer día y el séptimo día: ustedes y sus cautivos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a uno muerto' o 'a un caído'. El hebreo literalmente se refiere a 'uno muerto/el caído'; en este contexto implica contacto con un cadáver y la impureza ritual resultante.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתֶּם / אַתֶּם
  english_pob_choice: And you / you
  chosen_spanish: Y ustedes
  alternatives_spanish:
  - Y vosotros
  - Y ustedes mismos
  lexicon: WLC; HALOT
  rationale: El hebreo enfatiza al grupo con pronombre explícito. 'Ustedes' conserva ese énfasis en español neutro y es apto para registro bíblico contemporáneo.
- source_word: חֲנוּ
  english_pob_choice: camp
  chosen_spanish: acampen
  alternatives_spanish:
  - permanezcan acampados
  - acampen ustedes
  lexicon: HALOT
  rationale: El imperativo plural de חנה pide una acción de establecerse/estar acampados. 'Acampen' es natural en español y mantiene la imagen militar y del desierto.
- source_word: מִחוּץ לַמַּחֲנֶה
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - fuera del campamento de guerra
  - fuera del recinto
  lexicon: HALOT
  rationale: '''Campamento'' reproduce bien el contexto del desierto y la repetición del campo semántico de חנה/מַחֲנֶה.'
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - siete días
  lexicon: HALOT
  rationale: En español la duración se expresa naturalmente con 'por'. Mantiene el valor temporal de la prescripción ritual.
- source_word: כֹּל הֹרֵג נֶפֶשׁ
  english_pob_choice: everyone who has killed a person
  chosen_spanish: Todo el que haya matado a una persona
  alternatives_spanish:
  - Todo el que haya matado a alguien
  - Todo el que mate a una persona
  lexicon: HALOT
  rationale: La forma participial en este contexto posterior a la batalla tiene fuerza de referencia pasada; el subjuntivo perfecto español comunica ese valor mejor que un presente general. 'Persona' evita ambigüedad con 'alma'.
- source_word: נֶפֶשׁ
  english_pob_choice: a person
  chosen_spanish: una persona
  alternatives_spanish:
  - alguien
  - una vida
  lexicon: HALOT
  rationale: En esta ley ritual, נֶפֶשׁ se refiere a un ser humano concreto. 'Persona' es claro y evita una lectura metafísica de 'alma'.
- source_word: וְכֹל נֹגֵעַ בֶּחָלָל
  english_pob_choice: and everyone who has touched one slain
  chosen_spanish: y todo el que haya tocado a un muerto
  alternatives_spanish:
  - y todo el que haya tocado a un caído
  - y todo el que haya tocado a un cadáver
  lexicon: HALOT
  rationale: חָלָל puede designar al caído/slain, pero aquí el contexto exige contacto con un cadáver para la impureza ritual. 'Un muerto' comunica el sentido resultante con naturalidad en español.
- source_word: בֶּחָלָל
  english_pob_choice: one slain
  chosen_spanish: a un muerto
  alternatives_spanish:
  - a un caído
  - a un cadáver
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'el caído/uno muerto por violencia'. En español, 'muerto' conserva la brevedad del término y mantiene el vínculo con el contacto funerario/ritual.
- source_word: תִּתְחַטְּאוּ
  english_pob_choice: shall purify yourselves
  chosen_spanish: se purificarán
  alternatives_spanish:
  - se limpiarán ritualmente
  - se purificarán ritualmente
  lexicon: HALOT
  rationale: El hitpael de חטא en contexto ritual indica purificación de impureza, no arrepentimiento moral. La forma refleja el futuro/obligación de la instrucción; aunque la concordancia estilística en español puede sentirse algo abierta, preserva la orden ritual.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי וּבַיּוֹם הַשְּׁבִיעִי
  english_pob_choice: on the third day and on the seventh day
  chosen_spanish: el tercer día y el séptimo día
  alternatives_spanish:
  - en el tercer día y en el séptimo día
  - al tercer día y al séptimo día
  lexicon: HALOT
  rationale: Se conserva la fórmula temporal fija del mandato ritual. En español, el artículo definido con ordinales es la opción más natural y fiel.
- source_word: אַתֶּם וּשְׁבִיכֶם
  english_pob_choice: you and your captives
  chosen_spanish: ustedes y sus cautivos
  alternatives_spanish:
  - ustedes y sus prisioneros
  - ustedes y los cautivos que tomaron
  lexicon: HALOT
  rationale: שְׁבִי alude a cautivos de guerra. 'Cautivos' es más preciso que 'prisioneros' y mantiene el registro bíblico sin introducir un matiz carcelario moderno.
theological_decisions:
- issue: Naturaleza de la purificación requerida después de matar o tocar un muerto
  english_pob_reading: ritual purification from corpse impurity
  chosen_spanish_reading: purificación ritual de la impureza por contacto con un muerto
  alternative_spanish_readings:
  - purificación moral
  - limpieza de sangre
  rationale: La mención del tercer y séptimo día apunta al procedimiento ritual asociado con la impureza por cadáver, no principalmente a absolución moral. Por eso 'purificar(se)' se conserva en sentido ritual y no se sustituye por lenguaje penitencial.
  doctrine_reference: Números 19; filosofía de traducción POB §1 y §3
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado estable de la revisión más reciente (sin cambios) y el cruce de control con observaciones menores. El principal punto de atención fue la expresión בֶּחָלָל, que en español se resolvió de forma idiomática sin perder la referencia ritual al contacto con un muerto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Cautivos'' se usa en sentido militar, coherente con la situación narrada.'
  - '''Purificar(se)'' se emplea en sentido ritual, no moral, para conservar la distinción semántica de חטא en este pasaje.'
